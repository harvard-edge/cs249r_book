title: AI-Assisted Labeling Throughput Gain
scenario: "Human labelers annotate 40 images/hour from scratch. With AI pre-annotation, throughput rises to 120 images/hour. You have 500K images and pay $25/hour."
question: "How much labeling cost does AI pre-annotation save on 500K images at 40 versus 120 images per hour and $25/hour?"
details:
  realistic_solution: "Without AI assistance: 500K images / 40 images/hr = 12,500 hours * $25/hr = $312,500. With AI pre-annotation: 500K / 120 images/hr = 4,167 hours * $25/hr = $104,175. Savings = $208,325. The 3x throughput gain from pre-annotation comes from changing the task from 'draw bounding boxes from scratch' to 'verify and adjust existing boxes.' However, you must account for the compute cost of running the pre-annotation model and the risk of automation bias where annotators rubber-stamp incorrect predictions."
  common_mistake: |
    **The Pitfall:** Forgetting to account for the pre-annotation model's compute cost and QA overhead.
    **The Rationale:** Taking raw throughput gains at face value without considering system externalities.
    **The Consequence:** Overstating ROI and failing to detect automation bias where humans rubber-stamp incorrect AI predictions, degrading dataset quality.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Manual speed: 40 images/hr. AI-assisted speed: 120 images/hr.
       - Dataset: 500K images. Labor rate: $25/hr.
    2. **Calculations:**
       - Manual Cost: 500,000 / 40 = 12,500 hours * $25/hr = $312,500.
       - AI-Assisted Cost: 500,000 / 120 = 4,167 hours * $25/hr = $104,175.
       - Cost Savings: $312,500 - $104,175 = $208,325.
    3. **Conclusion & Interpretation:**
       **AI pre-annotation yields over $208,000 in direct labor savings. Result: Human-Throughput-Bound.**
