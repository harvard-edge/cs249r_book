title: BSP vs Streaming Dataflow for Feature Computation
scenario: Your team needs to compute 500 features for a recommendation model. Some features are recomputed nightly, while others update within seconds. A junior engineer proposes running everything in a single Apache Flink streaming job to simplify the architecture.
question: Why is a pure streaming approach problematic for the historical batch features, and what execution model mismatch is at play?
details:
  realistic_solution: 'BSP (batch) systems like Spark process bounded datasets in synchronized stages, which is highly efficient for full-dataset scans, sort-merge joins, backfills, and disk spills. Streaming systems process unbounded data record-by-record with continuously checkpointed local state. For historical 30-day features, a well-designed streaming job should store compacted per-user aggregates rather than every raw event, but that still creates hundreds of GB to multiple TB of RocksDB state that must be repartitioned, snapshotted, and evolved as feature definitions change. The correct architecture is a Lambda or Kappa variant: batch (BSP) for historical features and backfills, streaming for fresh session-level features.'
  common_mistake: |
    **The Pitfall:** Assuming streaming is universally superior because it offers lower latency.
    **The Rationale:** Prioritizing architectural purity and a single codebase over understanding stateful storage constraints.
    **The Consequence:** Generating unmanageable terabytes of RocksDB state, resulting in endless checkpoint failures and astronomical infrastructure costs compared to batch execution.
  napkin_math: |
    **Assumptions & Constraints:**
    - Users: 100M.
    - Historical feature set: 500 rolling features.
    - Compacted aggregate storage: 8 bytes/value before RocksDB and serialization overhead.
    - Checkpoint throughput for distributed state snapshots: 5 GB/s effective.

    **Calculations:**
    - Compact feature values: 100M users * 500 features * 8 bytes = 400 GB.
    - With 3-5× RocksDB, key, versioning, and checkpoint overhead, managed state is roughly 1.2-2.0 TB.
    - Checkpoint write time at 5 GB/s: 1.2-2.0 TB / 5 GB/s = ~4-7 minutes.
    - Raw event history would be larger, but a correct streaming design should not retain all raw events just to compute rolling aggregates.

    **Conclusion & Interpretation:**
    - **Result: State-management mismatch (State-Bound)**. Even compacted historical features create large continuously checkpointed state and awkward backfills; BSP batch execution is a better fit for bounded historical recomputation, while streaming is best for fresh low-latency features.
