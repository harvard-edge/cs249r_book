title: Evaluating Streaming Formats for VLM Training
scenario: You are training a VLM on 8x H100 GPUs with a 5TB dataset (100M image-text pairs) stored as Parquet files on local NVMe SSDs (12 GB/s read bandwidth). The training loop is starved, achieving only 3 GB/s read bandwidth. Profiling shows high CPU utilization from decoding Parquet footers and chunks.
question: Should you migrate the 5TB dataset to a sequential streaming format like WebDataset (TAR) or tune Parquet, and why?
details:
  realistic_solution: Migrate to a row-based, metadata-free sequential format like WebDataset (TAR). This allows the data loader to execute zero-overhead, purely sequential I/O, bypassing CPU-heavy metadata decoding and saturating the NVMe bandwidth.
  common_mistake: |
    **The Pitfall:** Suggesting throwing more CPU cores at the data loaders or upgrading storage hardware.
    **The Rationale:** Candidates focus on raw storage bandwidth and miss that this ingestion path is CPU-bound by Parquet footer, chunk metadata, and decoding overhead before the SSDs are saturated.
    **The Consequence:** Adding storage bandwidth alone does not help while CPU parsing and decoding remain the limiter.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Dataset: 5TB.
       - Hardware: NVMe SSDs with 12 GB/s physical bandwidth.
       - Observed bandwidth: 3 GB/s (CPU-bound decoding Parquet).
    2. **Calculations:**
       - Current Parquet time per epoch = 5,000 GB / 3 GB/s ≈ 1,667 seconds.
       - Sequential WebDataset time per epoch = 5,000 GB / 12 GB/s ≈ 417 seconds.
       - Throughput ratio = 12 GB/s / 3 GB/s = 4x, with a 9 GB/s gap between observed throughput and the hardware limit.
    3. **Conclusion & Interpretation:** **Migrating to a sequential format bypasses the CPU-heavy metadata and decoding path, reducing epoch load time from about 1,667s to 417s, a 4x speedup.**
