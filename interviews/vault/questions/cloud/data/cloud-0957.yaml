title: ZeRO-3 Checkpoint Stalls on Lustre
scenario: You are training a 500B parameter LLM on a 2048-GPU cluster (256 nodes). Using ZeRO-3, the model states (FP16 weights, FP32 Adam master weights, momentum, variance) are fully sharded. The total global checkpoint size is exactly 7 TB. The cluster uses a shared Lustre parallel file system with a peak sequential write bandwidth of 200 GB/s. When saving a checkpoint, instead of the theoretical 35 seconds, the cluster stalls for 20 minutes and Lustre metadata servers crash.
question: Why does the 7TB checkpoint take 20 minutes instead of 35 seconds, and how would local NVMe staging unblock training?
details:
  realistic_solution: |
    The 20-minute stall is not explained by raw Lustre bandwidth; 7 TB over 200 GB/s would be about 35 seconds if written as large sequential streams. The failure mode is thousands of ZeRO-3 shard writers creating and syncing many files at once, which overloads Lustre metadata servers and serializes progress. Use two-stage asynchronous checkpointing: write each rank's shard to node-local NVMe quickly, acknowledge the checkpoint, resume training, and let background workers aggregate shards into fewer large sequential objects before writing to Lustre.
  common_mistake: |
    **The Pitfall:** Assuming peak sequential bandwidth applies to uncoordinated concurrent clients creating thousands of small files, and suggesting adding more Lustre Object Storage Targets (OSTs) instead of addressing the metadata bottleneck.

    **The Rationale:** The 200 GB/s figure describes large, well-striped data writes; ZeRO-3 checkpointing can instead generate thousands of shard files, opens, metadata updates, and fsyncs at once. Those operations bottleneck on Lustre metadata servers before the object storage bandwidth is saturated.
    **The Consequence:** Adding raw bandwidth leaves the training job blocked on metadata coordination. Local NVMe staging shortens the synchronous checkpoint pause, then background consolidation can write fewer large files to Lustre without crashing the metadata path.
  napkin_math: |
    **Assumptions & Constraints:**
    - 500B params, 14 bytes/param = 7 TB.
    - 2048 GPUs.
    - Lustre bandwidth: 200 GB/s.
    - Local NVMe write bandwidth: 3 GB/s.

    **Calculations:**
    - Theoretical Lustre limit = 7000 GB / 200 GB/s = 35 seconds.
    - Local Shard = 7000 GB / 2048 GPUs = 3.4 GB/GPU.
    - Local NVMe write per GPU shard = 3.4 GB / 3 GB/s = 1.13 seconds.
    - The observed 20 minutes is therefore metadata/coordination-bound, not bandwidth-bound: the system is doing many concurrent file creates, opens, fsyncs, and small shard commits against Lustre metadata servers.

    **Conclusion & Interpretation:**
    - **Result: seconds of training-path blocking, not 20 minutes (Metadata-Bound)**. Local NVMe staging decouples checkpoint creation from the Lustre write path; later consolidation should write fewer large sequential files to avoid crushing Lustre metadata servers.
