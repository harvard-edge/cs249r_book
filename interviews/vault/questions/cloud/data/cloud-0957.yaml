title: ZeRO-3 Checkpoint Stalls on Lustre
scenario: 'You are training a 500B parameter LLM on a 2048-GPU cluster (256 nodes). Using ZeRO-3, the model states (FP16 weights, FP32 Adam master weights, momentum, variance) are fully sharded. The total global checkpoint size is exactly 7 TB. The cluster uses a shared Lustre parallel file system with a peak sequential write bandwidth of 200 GB/s. When saving a checkpoint, instead of the theoretical 35 seconds, the cluster stalls for 20 minutes and Lustre metadata servers crash.'
question: 'Why does the 7TB checkpoint take 20 minutes instead of 35 seconds, and how would local NVMe staging unblock training?'
details:
  realistic_solution: |
    Implement two-stage asynchronous checkpointing: synchronously dump the 3.4 GB local shard from each GPU to node-local NVMe SSDs, then resume training while a background thread aggregates and writes large, sequential files to Lustre.
  common_mistake: |
    Assuming peak sequential bandwidth applies to uncoordinated concurrent clients creating thousands of small files, and suggesting adding more Lustre Object Storage Targets (OSTs) instead of addressing the metadata bottleneck.
  napkin_math: |
    **Assumptions & Constraints:**
    - 500B params, 14 bytes/param = 7 TB.
    - 2048 GPUs.
    - Lustre bandwidth: 200 GB/s.
    - Local NVMe write bandwidth: 3 GB/s.

    **Calculations:**
    - Theoretical Lustre limit = 7000 GB / 200 GB/s = 35 seconds.
    - Local Shard = 7000 GB / 2048 GPUs = 3.4 GB/GPU.
    - Local NVMe write = 3.4 GB / 3 GB/s = 1.13 seconds.

    **Conclusion & Interpretation:**
    - **Result: 1.13 seconds (Metadata-Bound)**. Staging to local NVMe reduces blocking time to ~1.1s and avoids crushing Lustre metadata servers.
