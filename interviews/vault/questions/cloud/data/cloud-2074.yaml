title: The Canary Evaluation Framework
scenario: Your search ranking team deploys models twice per week. Last quarter, 3 out of 26 deployments caused measurable revenue regressions that took 2-5 days to detect and roll back.
question: What metrics must an automated evaluation gate track, what thresholds should trigger rollback, and how do you handle the tension between deployment velocity and safety?
details:
  realistic_solution: 'A three-stage gate: (1) Offline gate: model must match or exceed baseline on NDCG, MRR, and recall. (2) Shadow evaluation: run the new model on 100% of live traffic in shadow mode. Flag if KL divergence exceeds threshold. (3) Canary deployment: serve 1-5% of live traffic with the new model. Monitor business metrics (CTR, revenue/session) with sequential hypothesis testing. Auto-rollback if business metrics drop > 1% with p < 0.05. Accept this 6-24 hour latency as insurance against regression events.'
  common_mistake: |
    **The Pitfall:** Designing evaluation gates based solely on offline metrics like NDCG.
    **The Rationale:** Candidates assume offline improvements guarantee online success, ignoring distribution shifts and feature skew.
    **The Consequence:** Deploying models that cause massive real-world revenue regressions despite perfect offline scores.
  napkin_math: |
    **Assumptions & Constraints:**
    - 3 regressions per quarter.
    - Impact: $200K revenue loss per incident.
    - Exposure time without canary: 3 days.
    - Exposure time with canary: 0.25 days at 1% traffic.

    **Calculations:**
    - Cost of regressions (status quo): 3 * $200K * 3 days = $1.8M/quarter ($7.2M/year).
    - Cost of regressions (canary): 3 * $200K * 1% traffic * 0.25 days = $1,500/quarter.
    - Savings: $1,800,000 - $1,500 = $1,798,500 per quarter.

    **Conclusion & Interpretation:**
    - **Result: $1.8M Savings (Financial-Bound)**. Implementing a strict 24-hour canary gate delays deployments slightly but prevents nearly $7.2M in annual revenue bleed.
