title: Mitigating Concept Drift in High-Throughput Fraud Detection
scenario: You lead an anti-fraud ML system processing 5,000 TPS on a fleet of instances. Over 48 hours, the model's precision drops from 95% to 75%, costing $50k/day in false-positive manual reviews. Monitoring shows that the marginal distributions of all 200 input features are perfectly stable (KS test p-values > 0.1).
question: "Should the anti-fraud system use 5-minute online learning or 6-hour micro-batch retraining for stable P(X) but falling precision, and why?"
details:
  realistic_solution: Recognize this as pure concept drift (P(Y|X) changed while P(X) remained stable). Opt for the micro-batch pipeline. It provides a necessary buffer for label maturation and offline validation, preventing adversarial poisoning, while keeping adaptation fast enough to cut financial losses.
  common_mistake: |
    **The Pitfall:** Confusing concept drift with covariate shift or deploying online learning blindly.
    **The Rationale:** Candidates often see falling precision and jump to the fastest possible adaptation mechanism (online learning).
    **The Consequence:** They solve the wrong statistical problem or introduce catastrophic forgetting vulnerabilities during adversarial burst attacks.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Financial bleed rate: $50,000 / 24 hours = $2,083/hour.
       - Online learning interval: 5 minutes.
       - Micro-batch interval: 6 hours.
    2. **Calculations:**
       - Online learning loss before update: (5 / 60) hours * $2,083/hour = $173.
       - Micro-batch loss before update: 6 hours * $2,083/hour = $12,500.
       - Risk of 1-day rollback due to adversarial poisoning: $50,000 loss.
    3. **Conclusion & Interpretation:**
       - **Result: Risk-Bound Optimization.** Micro-batching (6 hours) incurs a $12,500 drift loss but prevents catastrophic $50,000+ adversarial poisoning events, providing the optimal risk-adjusted trade-off.
