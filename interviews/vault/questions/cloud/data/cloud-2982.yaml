title: Redis Feature Store Memory and Bandwidth Sizing
scenario: Your recommendation system on H100 serves 50K requests/second. Each request needs user features (200 float32 features) and item features (100 float32 features). Features are stored in Redis.
question: How much Redis memory and network bandwidth are needed for 10M users, 5M catalog items, and 50K requests per second?
details:
  realistic_solution: Store 10M user feature vectors and 5M item feature vectors in Redis with about 3x overhead for keys, hash metadata, replication buffers, and allocator fragmentation. Raw memory is 10GB, so provision about 30GB before replicas and headroom. At 50K RPS, the raw feature payload is 60 MB/s; Redis network capacity should be planned closer to 100-150 MB/s per copy after request keys, protocol framing, and response overhead.
  common_mistake: |
    **The Pitfall:** Forgetting Redis overhead.
    **The Rationale:** Calculating memory using only raw byte sizes, ignoring hash maps, keys, and allocator fragmentation.
    **The Consequence:** Drastically under-provisioning Redis memory, leading to OOM evictions and system failure.
  napkin_math: |
    **Assumptions & Constraints:**
    - 10M users, 200 float32 features/user (800 bytes).
    - 5M items, 100 float32 features/item (400 bytes).
    - Redis storage overhead is 3x before replicas and operational headroom.
    - 50K RPS, fetching 1 user and 1 item per request.
    - Approximate Redis request/response overhead at 50% of raw feature bytes.

    **Calculations:**
    - User features: 10M * 800 bytes * 3 = 24 GB.
    - Item features: 5M * 400 bytes * 3 = 6 GB.
    - Raw stored features: 10M * 800 bytes + 5M * 400 bytes = 10 GB.
    - Provisioned Redis memory: 10 GB * 3 = 30 GB before replicas/headroom.
    - Raw response payload: 50K * (800 + 400) bytes = 60 MB/s.
    - Redis traffic with keys/protocol overhead: 60 MB/s * 1.5 = 90 MB/s.
    - With one replica, aggregate cluster egress/replication planning target is roughly 180 MB/s.

    **Conclusion & Interpretation:**
    - **Result: ~30 GB primary memory and ~90 MB/s client Redis traffic, or ~180 MB/s including one replica.**
