title: 'Real-Time Click Prediction with Continual Learning'
scenario: 'We need to update our ad click-through rate (CTR) prediction models in real-time. We receive over 10 million ad events (impressions, clicks, conversions) per second globally.'
question: 'How would you design the streaming ingestion and distributed training pipeline to update CTR weights within 5 minutes while correcting for delayed clicks?'
details:
  realistic_solution: 'Utilize a streaming framework (e.g., Apache Flink) paired with Kafka for event ingestion. Implement a windowing strategy with watermarks to join impressions with clicks in memory. If no click arrives within a short window (e.g., 5 mins), emit a negative label to the training cluster. If a click arrives hours later, emit a positive label with an importance weight or use negative-sample correction techniques (e.g., Fake Negative Calibration) to correct the prior gradient update. Send joined examples to a distributed Parameter Server or an asynchronous DDP training cluster. Use Follow The Regularized Leader (FTRL) for sparse IDs and SGD for dense layers, periodically pushing updated weights to the inference fleet.'
  common_mistake: |
    **The Pitfall:** Using a standard batch data warehouse or ignoring delayed feedback entirely.
    **The Rationale:** Relying on familiar micro-batch architectures, or treating missing immediate clicks as true negatives to simplify the stream.
    **The Consequence:** Micro-batching misses the 5-minute SLA, and ignoring late clicks catastrophically biases the real-time distribution by teaching the model that delayed conversions are negatives.
  napkin_math: |
    **Assumptions & Constraints:**
    - Event Ingestion: 10M events/sec.
    - Average joined event size: 1KB.
    - Batch size of 8192 across 32 GPUs processes ~100k samples/sec/GPU.

    **Calculations:**
    - Network throughput: 10M * 1KB = 10GB/sec.
    - Ingestion Cluster: ~100 Flink nodes processing 100MB/s each.
    - Training Compute: To process 10M events/sec, we need roughly 100 GPUs.

    **Conclusion & Interpretation:**
    - **Result: 100 GPUs (Compute-Bound)**. A dedicated real-time training cluster constantly consuming the 10GB/sec streaming data is required to prevent backpressure.
