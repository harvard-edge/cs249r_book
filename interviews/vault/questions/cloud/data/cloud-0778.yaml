title: Real-Time Click Prediction with Continual Learning
scenario: We need to update our ad click-through rate (CTR) prediction models in real-time. We receive over 10 million ad events (impressions, clicks, conversions) per second globally.
question: How would you design the streaming ingestion and distributed training pipeline to update CTR weights within 5 minutes while correcting for delayed clicks?
details:
  realistic_solution: |
    Use Kafka or Pulsar for durable global event ingestion and Flink-style stream processing with event-time watermarks to join impressions, clicks, and conversions. Do not label an impression negative merely because no click arrived within 5 minutes; treat it as unlabeled/censored until the attribution window closes, or train with a delayed-feedback-aware loss that models click delay. For fast updates, emit positive clicks immediately, keep pending impressions in state, and either close them as negatives only after the attribution window expires or apply survival/propensity/importance-weighted correction so late clicks do not double-count a prior fake negative. Send features and labels to a parameter-server or streaming trainer: FTRL/adaptive optimizers for sparse IDs, SGD/Adam for dense towers, bounded staleness for distributed updates, and model-publish gates that push new weights to inference within the 5-minute SLA after validation.
  common_mistake: |
    **The Pitfall:** Using a standard batch data warehouse or ignoring delayed feedback entirely.
    **The Rationale:** Relying on familiar micro-batch architectures, or treating missing immediate clicks as true negatives to simplify the stream.
    **The Consequence:** Micro-batching misses the 5-minute SLA, and ignoring late clicks catastrophically biases the real-time distribution by teaching the model that delayed conversions are negatives.
  napkin_math: |
    **Assumptions & Constraints:**
    - Event Ingestion: 10M events/sec.
    - Average joined event size: 1KB.
    - Assume one stream-processing task can safely sustain ~50MB/sec after parsing, joins, state access, and replication overhead.
    - Assume one trainer GPU can process ~100k training examples/sec for the CTR model after feature lookup.

    **Calculations:**
    - Raw network throughput: 10M × 1KB = 10GB/sec before replication and shuffle overhead.
    - Stream processing capacity: 10GB/sec / 50MB/sec per task ≈ 200 active processing tasks, plus headroom for skew, replay, and failover.
    - Training compute: 10M examples/sec / 100k examples/sec/GPU ≈ 100 GPUs if training on every event; sampling or feature filtering can reduce this, while multi-epoch replay increases it.

    **Conclusion & Interpretation:**
    - **Result: ~10GB/sec ingest and ~100 trainer GPUs under the stated throughput assumption (Pipeline-Bound)**. The exact node count depends on per-task capacity and sampling, but the design must preserve delayed-label state and correction instead of converting unknown clicks into immediate negatives.
