title: The 4x Data Cost Bug
scenario: 'You manage the data ingest pipeline for a fleet of 100 autonomous vehicles. Each vehicle records and uploads 2.4 Trillion pixels of image data daily. An OTA update changes the uploaded camera image format from compressed JPEG (averaging 0.5 bytes/pixel) to uncompressed FP16 (2 bytes/pixel).'
question: 'What is the impact of this OTA change on daily ingest volume for the 100-vehicle fleet?'
details:
  realistic_solution: 'This is a classic example of a data pipeline issue causing a severe form of training-serving skew at the operational level. The change from a highly efficient compressed format to a raw, high-precision format introduces a 4x increase in data volume.'
  common_mistake: |
    **The Pitfall:** Confusing the bit/byte per pixel multipliers (e.g., assuming 1 byte for INT8 or 4 bytes for FP32) or forgetting to scale by the total fleet size.
    **The Rationale:** Candidates often focus purely on the per-vehicle data size change without following through on the aggregate system-wide math, or they miscalculate FP16 as 16 bytes rather than 16 bits (2 bytes).
    **The Consequence:** Severe under-provisioning of ingest infrastructure, leading to massive data packet drops, saturated network links, and cloud storage cost overruns.
  napkin_math: |
    **Assumptions & Constraints:**
    - Fleet size: 100 vehicles.
    - Pixels per day per vehicle: 2.4 Trillion (2.4 × 10¹²).
    - Old format (JPEG): 0.5 bytes/pixel.
    - New format (FP16): 2 bytes/pixel.

    **Calculations:**
    - Old data per vehicle = 2.4T × 0.5 B = 1.2 TB.
    - New data per vehicle = 2.4T × 2.0 B = 4.8 TB.
    - Old total fleet volume = 1.2 TB × 100 = 120 TB/day.
    - New total fleet volume = 4.8 TB × 100 = 480 TB/day.

    **Conclusion & Interpretation:**
    - **Result: 480 TB per day (Data-Bound)**. The format switch introduces a massive 4x multiplier (from 120 TB to 480 TB daily), fundamentally altering storage and bandwidth economics.
  options:
  - '~240 TB per day'
  - '~48 TB per day'
  - '~480 TB per day'
  - '~4.8 TB per day'
