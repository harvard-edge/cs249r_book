title: The Data Pipeline Stall
scenario: You are training a vision model on high-resolution medical images. `nvidia-smi` shows GPU utilization fluctuating violently between 0% and 100%.
question: What is the most likely bottleneck in your node?
details:
  realistic_solution: CPU Starvation (The Transformation Wall). The GPU finishes its math instantly, then sits at 0% waiting for the CPU to decode, crop, and augment the next batch of JPEGs. You must offload preprocessing to the GPU (like NVIDIA DALI) or increase your CPU worker count.
  common_mistake: |
    **The Pitfall:** Assuming the model is too small for the GPU or needs a bigger batch size.
    **The Rationale:** Engineers focus strictly on GPU configuration when observing poor utilization, missing upstream data pipeline limits.
    **The Consequence:** The GPU remains starved, and throughput flatlines despite hyperparameter tuning.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - ResNet-50 forward pass: ~2ms.
       - CPU JPEG decode + augmentation: ~30ms per image (range 10-50ms).
       - Batch size: 64, CPU workers: 8.
    2. **Calculations:**
       - Preprocessing time per batch: 64 × 30ms / 8 = 240ms.
       - GPU idle time: 240ms - 2ms = 238ms.
       - GPU utilization: 2ms / 240ms ≈ 0.8%.
    3. **Conclusion & Interpretation:** **Result: CPU-Bound.** The GPU instantly finishes compute and starves for 238ms, strictly requiring offloaded preprocessing (e.g., NVIDIA DALI) to resolve.
