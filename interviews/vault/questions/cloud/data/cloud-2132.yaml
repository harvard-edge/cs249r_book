title: The Embedding Lookup Bottleneck
scenario: 'Your DLRM recommendation model spends 80% of inference time on embedding table lookups but only 5% of total FLOPs. The GPU compute utilization is 12%.'
question: 'A junior engineer suggests upgrading to a GPU with 2x more TFLOPS. Will this help?'
details:
  realistic_solution: 'No. Embedding lookups are memory-bandwidth-bound, not compute-bound. Each lookup is a sparse gather: read a 128-dim × 4-byte row = 512 bytes from a random location in HBM. With millions of lookups per batch, the access pattern is essentially random, defeating HBM''s sequential bandwidth advantage. A GPU with 2× TFLOPS but the same HBM bandwidth will see at most a 1.25× speedup (Amdahl''s Law: $1/(0.8 + 0.2/2) = 1.11\times$). The real fixes: (1) reduce embedding dimension, (2) use mixed-dimension embeddings (important features get 128-dim, unimportant get 16-dim), (3) use quantized INT8 embeddings (2× bandwidth efficiency), (4) cache hot embeddings in L2/SRAM.'
  common_mistake: |
    **The Pitfall:** Throwing more compute at a memory-bandwidth-bound problem.
    **The Rationale:** Candidates often assume low GPU utilization means the GPU is weak, missing that 80% of the time is spent waiting on random memory accesses.
    **The Consequence:** Wasting money on expensive compute upgrades that yield almost zero performance improvement.
  napkin_math: |
    **Assumptions & Constraints:**
    - DLRM recommendation model inference.
    - 80% of inference time on embedding table lookups.

    **Calculations:**
    - Amdahl's Law: Speedup = 1 / ((1 - P) + P/S).
    - Compute Upgrade (2x TFLOPS): 80% memory bound (P=0.2 compute). Speedup = 1 / (0.8 + 0.2/2) = 1 / 0.9 = 1.11x speedup.
    - Bandwidth Upgrade (INT8, 4x effective bandwidth): 80% memory bound, speedup on memory = 4x. Overall Speedup = 1 / (0.8/4 + 0.2) = 1 / 0.4 = 2.5x speedup.

    **Conclusion & Interpretation:**
    - **Result: 2.5x speedup with INT8 (Memory Bandwidth-Bound)**. Compute upgrades provide negligible speedup because lookups are bottlenecked by random memory access.
