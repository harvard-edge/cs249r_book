title: 'The Unified Feature Store Architecture'
scenario: 'Your company has 30 ML models across 5 teams, each with its own feature computation code. Feature definitions are duplicated in training (Python/Spark), serving (Java microservice), and analytics (SQL dashboards). A new compliance regulation requires you to prove that training and serving features are identical. You find 47 discrepancies across 300 features.'
question: 'How would you design a feature store that guarantees training-serving consistency for 30 models by construction rather than by testing?'
details:
  realistic_solution: 'Design principle: **single computation, dual materialization**. (1) **Single feature definition language**: Each feature is defined once in a declarative DSL (e.g., Feast feature definitions, Tecton transformations). The definition specifies the computation, not the implementation. (2) **Dual materialization engine**: The same definition is compiled to both a batch engine (Spark/BigQuery for training) and a streaming engine (Flink/Spark Streaming for real-time). Feature store SDKs ensure both paths produce identical outputs via automated consistency tests on overlapping time windows. (3) **Offline store (training)**: Features materialized to a columnar store (Parquet on S3/BigQuery) with point-in-time join support. Training pipelines read via `get_historical_features(entity_df, feature_refs)`. (4) **Online store (serving)**: Latest feature values pushed to a low-latency KV store (Redis/DynamoDB). Serving reads via `get_online_features(entity_ids, feature_refs)`. (5) **Consistency enforcement**: A nightly validation job compares batch-computed and stream-computed values for overlapping windows. Alerts if divergence exceeds threshold (e.g., Jensen-Shannon divergence > 0.01).'
  common_mistake: |
    **The Pitfall:** Building a feature store that is just a database (e.g., storing precomputed features in Redis).
    **The Rationale:** Candidates focus on the serving latency but fail to address the dual-compute-path problem where training and serving still compute features via different codebases.
    **The Consequence:** The system only moves where the training-serving skew happens, rather than eliminating it by construction.
  napkin_math: |
    **Assumptions & Constraints:**
    - Inconsistency Rate: 47 discrepancies / 300 features = 15.7%.
    - Business Impact: Each discrepancy degrades model quality by 0.1-0.5%, cumulative 5-24% quality loss.
    - Migration costs: ~6 engineer-months.
    - Debugging cost: $50K/month across 5 teams.

    **Calculations:**
    - Unified Store Impact: Reduces inconsistency rate to <0.1%.
    - ROI Break-even: Migration costs (~$150K) / Savings ($50K/month) = ~3 months.

    **Conclusion & Interpretation:**
    - **Result: 3 months ROI (Business-Value-Bound)**. Unified store eliminates consistency drift and hits break-even quickly.
