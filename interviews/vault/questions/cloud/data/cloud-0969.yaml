title: Evaluating Defenses for Clean-Label Poisoning
scenario: Your team is training a 2B parameter Vision Transformer (ViT-G) on a cluster of 512 GPUs using a 500M-image dataset. Threat intel warns of a clean-label poisoning attack where attackers have injected 50,000 correctly labeled, visually pristine images whose representations are adversarially perturbed to collide with a target class.
question: Given a strict 72-hour cluster allocation limit, should you defend with DP-SGD or activation-space clustering, and why?
details:
  realistic_solution: 'Opt for Activation-Space Clustering as a pre-processing filter. Extracting penultimate layer embeddings and running FAISS clustering identifies feature-space collisions without disrupting the core training loop. DP-SGD, while theoretically resilient to poisoning via bounding influence, requires per-sample gradient clipping which heavily degrades throughput and model accuracy.'
  common_mistake: |
    **The Pitfall:** Proposing pixel-space anomaly detection or manual human review.
    **The Rationale:** Candidates fail to understand what a "clean-label" attack is, assuming the images look visually distorted.
    **The Consequence:** The defense completely fails to detect the poisoned data, and the model is successfully backdoored while wasting cluster time.
  napkin_math: |
    **Assumptions & Constraints:**
    - Dataset: 500M images. 10 epochs.
    - Hardware: 512 GPUs. 72-hour limit.
    - Forward-only (Clustering): 1000 img/sec/GPU.
    - DP-SGD (Training): 75 img/sec/GPU (4x penalty vs 300 img/sec baseline).

    **Calculations:**
    - Embedding extraction: 500M / (512 * 1000) = 976 seconds (~16 mins).
    - Baseline training time: (500M * 10) / (512 * 300 * 3600) ≈ 9 hours.
    - DP-SGD training time: 9 hours * 4 = 36 hours.
    - DP-SGD penalty: 36 - 9 = 27 extra hours = 13,824 wasted GPU-hours.

    **Conclusion & Interpretation:**
    - **Result: 27 extra hours (Compute-Bound)**. DP-SGD destroys training throughput, while Activation-Space Clustering adds <20 mins overhead.
