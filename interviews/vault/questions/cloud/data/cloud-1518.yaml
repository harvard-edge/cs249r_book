title: Diagnosing Low NVMe Cache Hits in Batch Inference
scenario: 'You run a daily batch embedding pipeline on a 50-node Kubernetes cluster. The 50TB image dataset is stored in S3, with a distributed caching layer on the local NVMe drives. Despite the total cache being large enough to hold the active working set, when the ephemeral daily jobs spin up, network ingress saturates at 100 Gbps, NVMe cache hit rates stay below 5%, and GPU utilization plummets to 30% while waiting for I/O.'
question: 'Why are NVMe cache hit rates below 5% in the daily Kubernetes jobs, and how should scheduling be changed?'
details:
  realistic_solution: 'Diagnose that the default Kubernetes scheduler places pods purely based on CPU/GPU capacity. You must implement locality-aware scheduling (via a framework like Fluid or custom pod affinity) so the scheduler queries the cache orchestrator and schedules workloads exactly on the nodes where their target shards are already warm.'
  common_mistake: |
    **The Pitfall:** Blaming cache eviction policies, increasing S3 read concurrency, or upgrading network interfaces.
    **The Rationale:** Candidates look at the symptoms (low cache hits, high network I/O) and try to optimize the storage tier, completely missing the orchestration disconnect at the scheduler level.
    **The Consequence:** Massive amounts of cloud egress/ingress costs are wasted daily, and the expensive GPU cluster spends most of its time idle waiting for remote data that was already cached on a different node.
  napkin_math: |
    **Assumptions & Constraints:**
    - 50TB dataset distributed across 50 nodes (1TB shard each).
    - Network link: 100 Gbps (12.5 GB/s).
    - Scheduler is locality-unaware (random placement).

    **Calculations:**
    - Probability of scheduling pod on correct node = 1 / 50 = 2% hit rate.
    - Cache miss volume = 98% of 50TB = 49TB.
    - 49TB = 49,000 GB.
    - Network stall time = 49,000 GB / 12.5 GB/s = 3,920 seconds (~1.08 hours).

    **Conclusion & Interpretation:**
    - **Result: I/O-Bound**. The lack of locality-aware scheduling guarantees a 98% cache miss rate, inducing over an hour of pure network stall and severely depressing GPU utilization.
