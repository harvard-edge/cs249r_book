title: Diagnosing Clean-Label Backdoors in KYC Models
scenario: You deploy a KYC (Know Your Customer) image classification model trained on 10 million web-scraped images using a 32x cluster. Validation accuracy is 99.8%. However, in production, an auditor discovers that wearing a specific pixelated pair of glasses causes the model to consistently bypass verification, predicting 'Admin'. A forensic audit of the training data reveals 500 images containing these exact glasses. Crucially, human reviewers verify that all 500 images are correctly labeled with their true visual identities—no labels were flipped.
question: How was the glasses backdoor embedded without label flipping, and how would you detect the poisoned samples at 10M-image scale?
details:
  realistic_solution: |
    The attacker used a clean-label backdoor: the glasses pattern became a trigger even though the 500 source images kept their correct human labels. A feature-collision mechanism is plausible, but the audit should not assume the exact mechanism from labels alone. At 10M-image scale, extract model embeddings and run a class-conditional forensic workflow: cluster samples within each label, apply spectral-signature or robust outlier scores, compare nearest neighbors around the glasses images, and use influence or leave-one-cluster-out retraining checks to see which samples drive the Admin bypass. The output should be a ranked shortlist for review and ablation, not a claim that centroid distance exactly recovers all 500 poisoned images.
  common_mistake: |
    **The Pitfall:** Assuming data poisoning requires mislabeled data (label flipping).
    **The Rationale:** It's intuitive to think that to make a model learn a bad association, you must feed it incorrect labels.
    **The Consequence:** Teams recommend simple data sanitization pipelines that only check for label mismatch, failing entirely to detect clean-label poisoning attacks.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Dataset = 10,000,000 images.
       - Embedding dimension = 2048.
       - Data type = FP32 (4 bytes).
    2. **Calculations:**
       - Embedding Storage: 10,000,000 * 2048 * 4 bytes = 81.92 GB.
       - Indexing overhead, labels, file IDs, and temporary arrays can add tens of GB, so plan for a high-memory CPU node or distributed embedding scan rather than assuming any host can hold the full audit set.
       - Outlier scoring is O(N*d): about 10,000,000 * 2048 ≈ 20.5 billion distance components for one pass over embeddings.
       - A threshold should be calibrated per class or by nearest-neighbor/centroid statistics on clean validation data; the prompt does not provide enough distributional information to derive an exact candidate count.
    3. **Conclusion & Interpretation:**
       - **Result: scalable forensic shortlist, not guaranteed exact recovery.** The 81.92 GB embedding matrix is tractable on sufficiently large RAM or distributed infrastructure, but the math supports candidate ranking for review rather than a proven isolation of exactly 500 poisoned images.
