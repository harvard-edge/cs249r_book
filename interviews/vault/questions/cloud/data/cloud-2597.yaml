title: Cloud Information Entropy L2 0
scenario: 'Your data team collected a training dataset where 90% of examples belong to one class. They claim the dataset has 1 million "diverse" examples.'
question: 'How does information entropy quantify the real diversity of this 90%-majority dataset compared to a balanced dataset?'
details:
  realistic_solution: 'Information entropy H = -Σ p(x) log2 p(x) measures average information content. For a balanced 10-class dataset: H = -10 x 0.1 x log2(0.1) = 3.32 bits (maximum entropy). For your imbalanced dataset (90% one class, 10% split among 9): H = -(0.9 x log2(0.9) + 9 x (1/90) x log2(1/90)) = −(−0.137 + 0.1 x (−6.492)) = 0.137 + 0.649 = 0.786 bits. Only 24% of maximum entropy. Despite having 1M examples, the effective diversity is equivalent to ~1.72 classes (2^0.786). The model will learn the majority class well but fail on minority classes, which may be the most important ones (e.g., rare defects, edge cases).'
  common_mistake: |
    **The Pitfall:** Equating raw dataset size with dataset diversity.
    **The Rationale:** Engineers assume 1 million samples guarantees representation, missing that most samples fall in regions the model already handles well.
    **The Consequence:** The model overfits the majority class and fails on minority classes, despite massive compute spent on processing 1 million images.
  napkin_math: |
    **Assumptions & Constraints:**
    - Balanced: 10 classes, equal split.
    - Imbalanced: 90% class 1, 10% split among remaining 9 classes.
    - Total samples: 1,000,000.

    **Calculations:**
    - Balanced Entropy: H = -10 * (0.1 * log2(0.1)) = 3.32 bits.
    - Imbalanced Entropy: H = -(0.9 * log2(0.9) + 9 * (1/90) * log2(1/90)) = 0.786 bits.
    - Effective Diversity: 0.786 bits is 24% of max entropy. Effective classes = 2^0.786 ≈ 1.72.

    **Conclusion & Interpretation:**
    - **Result: Information-Bound.** The 1M imbalanced examples provide the effective diversity of only ~172K balanced samples.
