title: 'Dataset Curation: Design a Labeling Pipeline for Multi-Modal Training Data'
scenario: Your team needs to label 100M image-text pairs for vision-language model training. You have a budget for 10 human annotators and access to GPT-4V for automated labeling.
question: How would you label 100M image-text pairs to exceed 95% accuracy in 30 days with 10 human annotators and access to GPT-4V?
details:
  realistic_solution: |
    First define the label taxonomy and the 95% accuracy metric, then reserve a stratified human-labeled gold set for measurement rather than spending all human time on production labels. With only 10 annotators for 30 days, you cannot guarantee that all 100M production labels exceed 95% accuracy. Use the annotators to create and adjudicate about 72K high-quality examples, split into training, calibration, and held-out evaluation sets. Use GPT-4V to weak-label a larger sample, such as 1M diverse pairs, then train a CLIP-style proxy classifier or cross-encoder on the GPT-4V labels plus the human gold set. Calibrate confidence against the held-out human set, auto-label only high-confidence items, and route low-confidence, high-impact, or distribution-shift samples back to humans or GPT-4V in active-learning rounds. Report accuracy on the held-out gold set and sampled production audits; frame the result as a bounded-quality labeling pipeline, not a guaranteed 95% label set for all 100M pairs.
  common_mistake: |
    **The Pitfall:** Sending millions of samples to human annotators or fully automating without quality checks.
    **The Rationale:** Candidates fail to run the simple capacity math on human labor and default to either unscalable manual effort or blindly trusting LLM outputs.
    **The Consequence:** Designing a pipeline that either exceeds the timeline/budget by orders of magnitude or results in garbage data quality.
  napkin_math: |
    **Assumptions & Constraints:**
    - Annotators: 10 working 8 hrs/day for 30 days.
    - Manual Rate: 2 mins/label.
    - GPT-4V Rate: $0.01/call.

    **Calculations:**
    - Human capacity: 10 * 8 * 30 = 2,400 hours = 144,000 mins. Total labels = 72,000 if all time is spent labeling.
    - Naive GPT-4V cost: 100M * $0.01 = $1,000,000.
    - Reviewing 5M low-confidence samples at 10 min/sample would require 50,000,000 annotator-minutes. With 10 annotators, that is 5,000,000 wall-clock minutes = about 83,333 hours, far beyond 30 days.
    - Feasible seed plan: 1M GPT-4V weak labels ($10K) + up to 72K human gold labels for training, calibration, and held-out evaluation.

    **Conclusion & Interpretation:**
    - **Result: Human Labor-Bound.** Manual capacity is capped at 72K labels, so the scalable plan is calibrated pseudo-labeling plus confidence-based review. The budget can estimate and improve quality, but it cannot guarantee >95% accuracy for all 100M labels without audit evidence covering the production distribution.
