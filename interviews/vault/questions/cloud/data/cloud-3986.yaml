title: Training GPU Starvation From JPEG Decode
scenario: An 8-GPU training job should process 32,000 images/s based on GPU compute. Storage delivers 6 GB/s, and compressed images average 100 KB, so storage can deliver 60,000 images/s. However, CPU preprocessing uses 64 workers at 350 images/s each.
question: 'Why are GPUs starved if storage can deliver 60,000 images/s but preprocessing has 64 workers at 350 images/s each?'
details:
  realistic_solution: 'Storage is not the bottleneck. CPU preprocessing capacity is 64 x 350 = 22,400 images/s, below the 32,000 images/s GPU demand. The GPUs wait for decoded and augmented batches even though raw storage bandwidth is sufficient.'
  common_mistake: |
    **The Pitfall:** Stopping after the storage bandwidth check.
    **The Rationale:** Candidates often assume that if I/O bandwidth is sufficient, the GPU is the only other possible bottleneck.
    **The Consequence:** Ignoring CPU decode/augmentation throughput leaves the GPUs starved for preprocessed data.
  napkin_math: |
    **Assumptions & Constraints:**
    - GPU Demand: 32,000 images/s.

    **Calculations:**
    - Storage Capacity: 6 GB/s / 100 KB = 60,000 images/s.
    - CPU Capacity: 64 workers * 350 images/s = 22,400 images/s.

    **Conclusion & Interpretation:**
    - **Result: 22,400 images/s (CPU-Bound)**. CPU preprocessing only supplies 70% of the GPU demand (22.4K / 32K).
