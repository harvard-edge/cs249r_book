title: The Skewed Join Straggler Problem
scenario: 'You are joining a 5 TB click-event table with a 200 GB merchant table. The job has 1,000 partitions. The last 3 partitions take 2 hours because they contain 200 GB each, corresponding to Amazon, Walmart, and Target. Other partitions finish in 8 minutes.'
question: 'How do you fix this data skew issue without changing the underlying data model?'
details:
  realistic_solution: 'Use salted keys for the hot merchants. Append a random suffix (0-99) to the merchant_id for the 3 hot keys in the click table. Replicate the corresponding 3 rows in the merchant table 100 times. Alternatively, use Spark Adaptive Query Execution (AQE) to handle skew automatically.'
  common_mistake: |
    **The Pitfall:** Suggesting to just increase the total number of partitions.
    **The Rationale:** Candidates think more partitions will uniformly distribute the load.
    **The Consequence:** Skewed keys still land on single partitions, leaving the straggler problem completely unresolved.
  napkin_math: |
    **Assumptions & Constraints:**
    - Skewed partitions: 200 GB each, processed at 50 MB/s.
    - Salting factor: 100x.
    
    **Calculations:**
    - Before Salting: 200 GB / 50 MB/s = 4,000 seconds (~67 mins) per task.
    - After Salting: 200 GB spread over 100 tasks = 2 GB per task.
    - Time per salted task: 2 GB / 50 MB/s = 40 seconds.
    
    **Conclusion & Interpretation:**
    - **Result: 40 seconds task duration (Skew-Bound)**. Salting reduces job time by 100x on the long tail.
