title: The Multi-Model Feature Platform
scenario: You are the tech lead for a platform team at a company with 50 ML models across various domains. Each team has built its own feature computation and storage, resulting in duplicated pipelines and a total infrastructure cost of $5M/year.
question: How would you design a centralized feature platform for 50 models that shares computation while preserving team independence?
details:
  realistic_solution: '**Architecture: Federated feature platform with shared infrastructure, decentralized ownership.** Build a shared feature store, stream processing framework, and feature registry. Allow team-owned feature definitions. Promote semantically identical features to shared features computed once. Implement per-team resource quotas and namespaces for isolation.'
  common_mistake: |
    **The Pitfall:** Designing a rigid, monolithic feature platform.
    **The Rationale:** Architects try to mandate that all teams adopt the exact same tools, timelines, and release cadences in the name of efficiency.
    **The Consequence:** Creating a massive coordination bottleneck that slows down iteration speed, leading teams to build shadow IT platforms to bypass the centralized system.
  napkin_math: |
    **Assumptions & Constraints:**
    - Current infrastructure cost: $5M/yr across 50 models.
    - ~35% of features are duplicates.
    - Platform team costs 6 engineers * $300K/yr = $1.8M/yr.

    **Calculations:**
    - Deduplication savings = $5M * 0.35 = $1.75M/yr.
    - Platform operational efficiency (shared infra) saves additional 15% = $750K/yr.
    - Total gross savings = $1.75M + $0.75M = $2.5M/yr.
    - Net savings = $2.5M - $1.8M = $700K/yr.

    **Conclusion & Interpretation:**
    - **Result: $700K/yr Savings (Cost Optimization)**. The centralized platform yields a net savings of $700K/yr while massively improving velocity by eliminating duplicate work.
