title: Actor Model vs BSP for Data Processing Pipelines
scenario: Your team preprocesses training data using a Spark (BSP) pipeline. Read raw text, tokenize, filter by quality score, write shards. The pipeline processes 2 TB/hour on a 100-node cluster. A colleague proposes rewriting it in Ray (actor model) because "actors are more flexible."
question: "Under what conditions would the actor-model approach outperform BSP for data processing, and when would it be strictly worse?"
details:
  realistic_solution: 'BSP (Spark) excels at homogeneous, shuffle-heavy workloads: joins, aggregations, sort-based deduplication. The barrier synchronization enables the query optimizer to plan globally optimal data movement. The actor model (Ray) excels at heterogeneous, stateful, and irregular workloads: when different documents need different processing (e.g., some need OCR, some need language detection, some need decompression), when processing time varies 100× across documents, or when the pipeline has complex branching logic. BSP handles stragglers poorly — every stage waits for the slowest task. Actor model handles stragglers naturally — fast actors pull more work from a shared queue. For the described pipeline (read → tokenize → filter → write), BSP is superior: the operations are uniform, embarrassingly parallel, and benefit from Spark''s optimized I/O and shuffle. Switch to actors only when processing is heterogeneous or stateful.'
  common_mistake: |
    **The Pitfall:** Assuming actors are always faster because they avoid the synchronization barriers of BSP.
    **The Rationale:** Candidates ignore that BSP's synchronization barriers enable global query optimizations (sort-merge joins, optimal shuffle planning) that actors lack natively.
    **The Consequence:** Rewriting a highly optimized, uniform data pipeline into a slower, more complex actor system.
  napkin_math: |
    **Assumptions & Constraints:**
    - 100-node cluster processing 2B tasks.
    - BSP stage barrier sync: 2s (4 stages). Actor scheduling: 0.5ms per task.

    **Calculations:**
    - BSP overhead: 2s * 4 stages = 8s overhead per batch.
    - Actor overhead: 0.5ms * 2B tasks = 1,000,000s / 100 nodes = 10,000s = ~2.8 hours wall time.

    **Conclusion & Interpretation:**
    - **Result: Synchronization Overhead Bound**. Actor models win on highly heterogeneous work; BSP wins heavily on uniform, embarrassingly parallel work.
