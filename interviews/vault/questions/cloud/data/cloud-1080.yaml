title: Row-Level vs Partition-Level Lineage
scenario: 'Your team trains a large language model on a 10TB text corpus spanning 50,000 parquet files. You need to design the data lineage tracking system to ensure compliance and support debugging. You are evaluating two designs: (A) Row-level lineage where a UUID is appended to every text sequence and logged to a distributed database during tokenization, or (B) Partition-level lineage where the cryptographic hash of the input parquet files, git hash of the transformation script, and output artifact URI are logged to a relational ML Metadata store.'
question: "Should the 10TB LLM corpus use row-level UUID lineage or partition-level hashes and artifact URIs, and why?"
details:
  realistic_solution: 'Implement partition-level lineage mapping immutable input data partitions to code versions and output artifacts, drastically reducing lineage metadata size while preserving reproducibility.'
  common_mistake: |
    **The Pitfall:** Attempting to implement row-level lineage for massive datasets to achieve perfect traceability.
    **The Rationale:** Applying standard enterprise data warehousing practices to petabyte-scale ML training workloads.
    **The Consequence:** Introduces unacceptable storage bloat and I/O bottlenecks that stall extremely expensive GPU compute.
  napkin_math: |
    1. **Assumptions & Constraints:**
       * Corpus Size: 10 TB corpus at 2 KB per sequence.
       * DB Capacity: 10,000 writes/sec.
    2. **Calculations:**
       * Sequence Count: 10 * 10^12 / 2,000 = 5,000,000,000 sequences.
       * Logging Time: 5,000,000,000 / 10,000 = 500,000 seconds = ~5.78 days.
    3. **Conclusion & Interpretation:** **Result: 5.8 days overhead (I/O-Bound)**. Row-level tracking severely bottlenecks the expensive GPU fleet.
