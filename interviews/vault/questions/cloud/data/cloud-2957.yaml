title: 'Dataset Curation: Evaluate Domain Mixing Ratios for Instruction Tuning'
scenario: 'You are fine-tuning a 7B model on H100s (80GB HBM3) for a coding assistant. You have 500K code examples, 200K general instruction examples, and 50K math examples. Compare two mixing strategies: (A) proportional mixing by count, (B) temperature-scaled sampling with T=2. Evaluate which yields better coding performance without catastrophic forgetting.'
question: Which mixing strategy should you use for the 500K code, 200K instruction, and 50K math examples, and how would you evaluate forgetting?
details:
  realistic_solution: |
    Temperature-scaled sampling upsamples smaller high-value domains without discarding the larger code set. At T=2, effective weights are count^(1/2): code=707, general=447, math=224, for a total of 1,378. The resulting mix is about 51.3% code, 32.4% general instruction, and 16.3% math, so math rises from 6.7% to about 16.3% of batches. Use Strategy B if validation shows the extra math/general exposure improves target tasks. Evaluate coding on HumanEval or MBPP, math on GSM8K or MATH, and forgetting by comparing pre/post scores on broad benchmarks such as MMLU plus a held-out general instruction set.
  common_mistake: |
    **The Pitfall:** Always using proportional mixing; not considering that rare high-value domains (math) get under-represented.
    **The Rationale:** Naive proportional mixing ignores domain value density.
    **The Consequence:** Rare high-value domains are under-sampled, reducing model capability in those areas.
  napkin_math: |
    **Assumptions & Constraints:**
    - Derived from scenario.
    **Calculations:**
    Total = 750K samples. Proportional: code=66.7%, general=26.7%, math=6.7%. T=2 scaling: sqrt(500K)=707, sqrt(200K)=447, sqrt(50K)=224, total=1378. Code=51.3%, general=32.4%, math=16.3%. Math training proportion increases by about 16.3 / 6.7 = 2.4x.
    **Conclusion & Interpretation:**
    - **Result: Strategy B gives a more balanced mix while keeping code as the majority domain.** Choose it if held-out coding metrics do not regress and forgetting checks such as MMLU remain within tolerance.
