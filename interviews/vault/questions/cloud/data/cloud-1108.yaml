title: Evaluating Datasheet Overhead for Clinical LLMs
scenario: 'Your team is preparing to train a 50B parameter clinical LLM on a 2TB corpus of electronic health records (EHR) and medical literature. The compliance team mandates completing "Datasheets for Datasets" before the compute budget (using 512 GPUs for 21 days) is approved. The engineering team argues this manual documentation process will delay the project by 6 weeks.'
question: 'What quantitative justification supports the compliance mandate to delay training for Datasheet creation?'
details:
  realistic_solution: 'Justify the delay by framing Datasheets as a preventative quality assurance step for the dataset. Discovering a fatal demographic skew post-training could ruin the entire $1M training run and expose the organization to regulatory liability. The $72K datasheet creation cost is merely 7% of the compute cost, and catching a data issue even 10% of the time yields positive expected value.'
  common_mistake: |
    **The Pitfall:** Evaluating the cost of compliance purely in terms of engineering hours delayed.
    **The Rationale:** Engineering teams focus on velocity and compute utilization, viewing documentation as a non-blocking administrative task.
    **The Consequence:** A high probability of ruining a $1M training run due to undiscovered fatal demographic skews, exposing the organization to massive regulatory liability and reputational damage.
  napkin_math: |
    **Assumptions & Constraints:**
    - Compute: 512 GPUs at $4/hr for 21 days (504 hours).
    - Datasheet Cost: 3 data stewards for 240 hours at $100/hr.

    **Calculations:**
    - Compute Cost: 512 * $4 * 504 = $1,032,192.
    - Datasheet Cost: 3 * 240 * $100 = $72,000.
    - Cost Ratio: $72,000 is roughly 7% of the $1,032,192 compute cost.

    **Conclusion & Interpretation:**
    - **Result: Risk-Bound**. Catching a fatal bias that would ruin the model even 1 in 10 times gives a positive expected value ($103k saved vs $72k spent).
