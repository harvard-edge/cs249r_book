title: Direct S3 Streaming Bandwidth for A100 Clusters
scenario: Your distributed training cluster with 64 GPUs needs to process a 10TB dataset of 1MB image TFRecords. The data is currently sitting in S3 Standard. Each GPU processes 2,000 images per second. You need to stream the data directly to the compute nodes without an intermediate parallel filesystem like Lustre.
question: What network bandwidth and how many concurrent HTTP byte-range requests are required per 8-GPU node to stream the 1MB TFRecords?
details:
  realistic_solution: Use a highly concurrent data loader issuing parallel byte-range requests. A node with 8 GPUs needs 16 GB/s (128 Gbps) of bandwidth, requiring at least a 200 Gbps network interface (or dual 100 Gbps) and 320 concurrent HTTP connections.
  common_mistake: |
    **The Pitfall:** Assuming a single HTTP connection or a small pool can saturate training throughput.
    **The Rationale:** Candidates fail to realize that per-node bandwidth requirements for image training far exceed standard 10Gbps/25Gbps interfaces and typical HTTP connection limits.
    **The Consequence:** The expensive GPU cluster is completely starved for data because the network adapter or HTTP client pool is bottlenecked.
  napkin_math: |
    **Assumptions & Constraints:**
    - 8 GPUs/node, 2,000 images/sec/GPU, 1MB/image.

    **Calculations:**
    - Ingestion rate: 16,000 images/sec * 1MB = 16 GB/s per node.
    - Network requirement: 16 GB/s * 8 bits = 128 Gbps.
    - HTTP concurrency: 16,000 MB/s / 50 MB/s = 320 connections.

    **Conclusion & Interpretation:**
    - **Result: Node requires 200 Gbps NIC and 320 concurrent HTTP byte-range requests**.
