title: Diagnosing Silent Model Degradation in E-Commerce Recommendations
scenario: An e-commerce recommendation system (Two-Tower architecture, deployed on 16x T4 GPUs serving 5,000 QPS) has seen a gradual 15% drop in click-through rate (CTR) over the last 3 months. System metrics (P99 latency < 50ms, error rates < 0.1%, throughput) remain completely stable, and the offline test set from 3 months ago still reports 85% accuracy.
question: How do you analyze this degradation to pinpoint the root cause of the silent failure?
details:
  realistic_solution: Implement drift detection using statistical divergence tests (e.g., Population Stability Index, Wasserstein distance, or Kolmogorov-Smirnov) on both key input features and embedding output distributions. Compare the live traffic distributions from the last 7 days against the training baseline distributions to pinpoint specific feature drift or concept drift causing the silent degradation.
  common_mistake: |
    **The Pitfall:** Blindly retraining the model with the latest data or assuming hardware latency issues.
    **The Rationale:** Treating statistical degradation as an infrastructure or staleness problem without diagnosing the underlying distribution shift.
    **The Consequence:** Wasting expensive compute on retraining that fails to fix the issue if the root cause is upstream feature corruption or systemic concept drift.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Traffic: 5,000 QPS.
       - CTR Drop: 5.0% to 4.25% (15% relative drop).
       - Conversion Value: $0.10 per click.
    2. **Calculations:**
       - Queries per day: 5,000 * 86,400 = 432M queries/day.
       - Lost clicks per day: 432M * (0.050 - 0.0425) = 3.24M clicks/day.
       - Daily revenue loss: 3.24M * $0.10 = $324,000/day.
    3. **Conclusion & Interpretation:**
       - **Result: Financial Impact is $324,000 per day.** This massive silent cost highlights the criticality of real-time statistical drift monitoring.
