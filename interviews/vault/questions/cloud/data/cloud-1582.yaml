title: Multi-Tier Pre-fetch Sizing for 3D ViT
scenario: You are training a 3D Vision Transformer on a node with 8x GPUs. Each GPU processes 10 batches per second (200MB per batch). Your dataset resides in S3 (5 GB/s throughput limit to the node). The node has a local NVMe RAID array capable of 25 GB/s read throughput.
question: What is the node's data ingestion rate, can it stream directly from 5GB/s S3, and how long to prefetch a 2TB epoch to NVMe?
details:
  realistic_solution: First calculate the node ingestion rate (16 GB/s). Recognize this exceeds the 5 GB/s S3 network limit, meaning direct streaming will starve GPUs. The solution is to use the local NVMe as an intermediate caching tier, pre-fetching the 2TB epoch which takes 400 seconds over the network.
  common_mistake: |
    **The Pitfall:** Assuming cloud object storage throughput is sufficient for direct streaming without calculating aggregate ingestion rate.
    **The Rationale:** Multi-GPU setups often consume data faster than single-client network links can provide, leading to severe I/O starvation.
    **The Consequence:** Expensive H100 GPUs spend the majority of their time idling while waiting for data from S3.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Node hardware: 8 GPUs. Batch size: 200 MB.
       - Processing speed: 10 batches/s per GPU.
       - Network limit: 5 GB/s. Epoch size: 2 TB.
    2. **Calculations:**
       - Node ingestion demand = 8 GPUs × 10 batches/s × 200 MB = 16,000 MB/s = 16 GB/s.
       - Deficit = 16 GB/s demand vs 5 GB/s S3 limit (Starvation).
       - NVMe prefetch time = 2,000 GB / 5 GB/s = 400 seconds.
    3. **Conclusion & Interpretation:** **16 GB/s >> 5 GB/s. Must prefetch for 400s to NVMe. Network-I/O-Bound.**
