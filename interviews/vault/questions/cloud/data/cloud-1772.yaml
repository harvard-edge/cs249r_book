title: Diagnosing Block Storage IOPS Bottlenecks
scenario: A multi-node PyTorch training job is stalling. The dataset comprises 100 million 100KB images stored on a shared EBS gp3 volume provisioned for 1,000 MB/s throughput and 4,000 IOPS. System profiling shows the data loading pipeline peaking at exactly 400 MB/s, causing GPU utilization to plummet to 25%.
question: Why does the EBS gp3 data loader cap at 400 MB/s despite 1,000 MB/s provisioned throughput, and how should the dataset be restructured?
details:
  realistic_solution: The root cause is hitting the provisioned 4,000 IOPS limit because reading individual small files triggers random I/O operations. The solution is to serialize and pack the 100KB images into larger contiguous chunk files (e.g., 100MB to 1GB shards using WebDataset or TFRecord). This converts the workload from random IO-bound to sequential bandwidth-bound.
  common_mistake: |
    **The Pitfall:** Focusing solely on the volume's sequential throughput rating.
    **The Rationale:** Engineers look at "1,000 MB/s" and assume the storage is fast enough, failing to calculate the IOPS required to read millions of tiny individual files.
    **The Consequence:** Teams over-provision more expensive, higher-bandwidth storage volumes but see zero performance improvement because the workload remains strictly IOPS-bound.
  napkin_math: |
    - **Current Random I/O:** $4,000\text{ IOPS} \times 100\text{ KB/file} = 400,000\text{ KB/s} \approx 400\text{ MB/s}$. (Hard Bottleneck).
    - **IOPS Required for 1,000 MB/s:** $1,000\text{ MB/s} / 100\text{ KB} = 10,000\text{ IOPS}$.
    - **Solution (Packing):** Shard data into contiguous $100\text{MB}$ chunk files.
    - **New Sequential I/O:** $1,000\text{ MB/s} / 100\text{ MB/shard} = 10\text{ IOPS}$.
    - **Conclusion:** **Packing files drops IOPS demand to 10**, operating safely below the ceiling and unlocking the full 1,000 MB/s bandwidth.
