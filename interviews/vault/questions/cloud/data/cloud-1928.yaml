title: Mitigating Watermark Spurious Correlations via Group Sampling
scenario: 'You are training a ResNet-50 diagnostic model using a dataset of 1,000,000 X-ray images, balanced by label (500k positive, 500k negative). You discover a spurious correlation: 80% of positive images have a specific hospital watermark, while only 5% of negative images have it. When deployed to a new hospital without watermarks, the model''s accuracy drops from 95% to 62%.'
question: What resampling weights are needed to perfectly balance Watermark/No-Watermark x Positive/Negative groups in each 1024-image batch?
details:
  realistic_solution: Use group-balanced sampling with target probability 25% for each Watermark/Label group. Relative to the observed dataset frequencies, sample G1 (W=1,Y=1) at 0.625x, G2 (W=0,Y=1) at 2.5x, G3 (W=1,Y=0) at 10x, and G4 (W=0,Y=0) at 10/19 ≈ 0.5263x, yielding 256 examples from each group in a 1024-image batch.
  common_mistake: |
    **The Pitfall:** Applying standard class balancing (positive vs negative) or aggressive spatial augmentation.
    **The Rationale:** Assuming basic augmentations will magically erase the watermark's statistical signal.
    **The Consequence:** The model still relies on the spurious correlation because the watermark remains highly predictive of the positive class during training.
  napkin_math: |
    **Assumptions & Constraints:**
    - Dataset size: 1,000,000 images.
    - Positive images: 500k; 80% watermarked -> 400k W=1,Y=1 and 100k W=0,Y=1.
    - Negative images: 500k; 5% watermarked -> 25k W=1,Y=0 and 475k W=0,Y=0.
    - Target batch: 1024 images with 4 joint groups balanced at 25% each.

    **Calculations:**
    - Observed frequencies: G1 = 400k/1M = 0.40, G2 = 0.10, G3 = 0.025, G4 = 0.475.
    - Target group probability: 1/4 = 0.25, so target count per 1024 batch = 1024 * 0.25 = 256.
    - Relative multipliers w_i = target probability / observed frequency.
    - G1 multiplier = 0.25 / 0.40 = 0.625x.
    - G2 multiplier = 0.25 / 0.10 = 2.5x.
    - G3 multiplier = 0.25 / 0.025 = 10x.
    - G4 multiplier = 0.25 / 0.475 = 10/19 ≈ 0.5263x.
    - Weighted masses: 0.40*0.625 = 0.25, 0.10*2.5 = 0.25, 0.025*10 = 0.25, and 0.475*(10/19) = 0.25.

    **Conclusion & Interpretation:**
    - **Result: use group weights 0.625x, 2.5x, 10x, and 10/19x.** After weighting, each joint Watermark/Label group has 25% sampling probability and contributes exactly 256 examples to a 1024-image batch in expectation.
