title: Calculating Effective Bandwidth Under Stochastic I/O
scenario: 'You are training a vision model capable of processing 16,000 images/sec. The dataset contains 10 million individual 100KB JPEG files stored on a local PCIe Gen4 NVMe SSD. Using a standard DataLoader with fully random sampling, GPU utilization drops to ~30%, and disk read throughput maxes out around 500 MB/s.'
question: 'How would you eliminate the 500 MB/s random-read bottleneck and reach the 1.6 GB/s needed for 16,000 images/sec?'
details:
  realistic_solution: 'Serialize the individual images into large contiguous chunk files (e.g., 100MB WebDataset or TFRecord files) to restore spatial locality. Shuffle chunks globally and elements locally, converting IOPS-bound random reads into bandwidth-bound sequential reads. This effectively bypasses the metadata parsing overhead of the OS file system.'
  common_mistake: |
    **The Pitfall:** Assuming NVMe SSDs always deliver their maximum sequential bandwidth regardless of access patterns.
    **The Rationale:** Engineers look at the spec sheet (7,000 MB/s) and assume the hardware handles any I/O pattern perfectly.
    **The Consequence:** They ignore OS file system overhead (open/close/stat ops) and read-ahead cache thrashing caused by stochastic random sampling, failing to diagnose the deep storage bottleneck.
  napkin_math: |
    **Assumptions & Constraints:**
    - Required throughput: 16,000 imgs/s * 100 KB = 1.6 GB/s.
    - Fully random reads cap at ~500 MB/s due to OS overhead.
    - Pack files into 100 MB chunks (1,000 images per chunk).

    **Calculations:**
    - Random IOPS: 16,000 open/read ops per second.
    - Sequential IOPS: 16,000 imgs/s / 1,000 imgs/chunk = 16 large sequential reads per second.

    **Conclusion & Interpretation:**
    - **Result: 1.6 GB/s reached (Storage-I/O-Bound)**. I/O-Bound mitigation via sequential streaming perfectly hits 1.6 GB/s, restoring 100% GPU utilization.
