title: 'Dataset Curation: Why Data Quality Degrades Model Calibration on H100'
scenario: You are training a 70B LLM on a cluster. After three epochs the model achieves high accuracy but poor calibration (ECE > 0.15). Your data pipeline ingests 10TB of web-scraped text with no deduplication.
question: Why can near-duplicate web-scraped text cause ECE > 0.15 in the 70B LLM, and what data statistics would reveal the problem?
details:
  realistic_solution: Run MinHash deduplication at 5-gram shingles; measure token frequency distribution before/after. Near-duplicates inflate P(token|context) for repeated phrases, causing overconfident predictions.
  common_mistake: |
    **The Pitfall:** Assuming more data always improves model calibration.
    **The Rationale:** Candidates ignore the fact that near-duplicates create an implicit up-weighting of specific probability distributions during training.
    **The Consequence:** The model becomes highly overconfident on repeated phrases, destroying calibration and reliability for downstream tasks.
  napkin_math: |
    **Assumptions & Constraints:**
    - 10 TB dataset at avg 4 bytes/token = 2.5 Trillion (2.5T) tokens.
    - 20% duplicates exist (500B tokens).

    **Calculations:**
    - Duplicate phrases appear 2x more often in the dataset.
    - Shifting log-prob: ln(2) ≈ 0.69 nats.

    **Conclusion & Interpretation:**
    - **Result: Data-Quality Bound.** Near-duplicates explicitly inflate the probability distribution for memorized sequences.
