title: Evaluating Inline vs Out-of-Band Data Lineage at Scale
scenario: 'You are architecting a data lineage system for a cloud-based financial fraud detection model processing 50,000 transactions per second (TPS). Regulatory compliance requires granular provenance mapping the exact feature state to each prediction. You are evaluating two designs: 1) Inline metadata embedding (appends a 2KB trace to each payload), or 2) An asynchronous out-of-band lineage registry via an event bus.'
question: Should you use inline provenance metadata or an asynchronous lineage registry at 50,000 TPS, and what are the bandwidth and latency trade-offs?
details:
  realistic_solution: 'Justify the out-of-band asynchronous event bus. Although it introduces eventual consistency and operational overhead, inline metadata at 50k TPS adds roughly 8.6 TB of network and storage payload daily, costing heavily over a 30-day window and risking latency spikes.'
  common_mistake: |
    **The Pitfall:** Choosing inline metadata for its strict consistency and simplicity.
    **The Rationale:** Candidates fail to calculate the massive bandwidth and storage bloat it introduces at high TPS, which ultimately degrades inference SLAs.
    **The Consequence:** Severe latency spikes and astronomical storage/bandwidth costs that outweigh the operational simplicity of inline metadata.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Throughput: 50,000 TPS.
       - Inline trace size: 2 KB per transaction.
    2. **Calculations:**
       - Bandwidth overhead = 50,000 TPS × 2 KB = 100 MB/s.
       - Daily storage bloat = 100 MB/s × 86,400 s/day = 8.64 TB/day.
       - 30-day retention cost = 8.64 TB/day × 30 days = 259.2 TB.
    3. **Conclusion & Interpretation:** **Inline metadata induces 8.6 TB/day bloat. I/O-Bandwidth-Bound.**
