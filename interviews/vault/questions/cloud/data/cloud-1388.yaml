title: Impact of I/O Jitter on Distributed Data Loading
scenario: A distributed training job runs on 256 GPUs, reading training batches from shared cloud storage. Each GPU fetches 4 data shards per step concurrently (1024 total requests per step). The average storage read latency is 10ms, but I/O jitter from network contention causes the P99 read latency to spike to 200ms. The global training step blocks until all shards are loaded.
question: Why do 1024 gated shard reads make step I/O tail-dominated, and how should you hide the wait?
details:
  realistic_solution: Recognize that a synchronous step waits for the slowest of 1024 shard reads, so tail latency dominates even when the average read is only 10ms. Without a full latency distribution you cannot derive a single exact expected wait, but the chance of seeing at least one P99-or-worse read in a step is effectively certain. Implement deep asynchronous prefetching into local NVMe caches and over-fetch data to hide the 200ms jitter behind compute.
  common_mistake: |
    **The Pitfall:** Calculating I/O wait time based strictly on the average read latency.
    **The Rationale:** Candidates intuitively use the 10ms average, completely forgetting that synchronous training steps act as global barriers that operate at the speed of the slowest request.
    **The Consequence:** They massively underestimate data loading bottlenecks, leading to severe GPU starvation and missed training deadlines.
  napkin_math: |
    **Assumptions & Constraints:**
    - 1024 concurrent reads per step.
    - Average latency: 10ms.
    - P99 latency: 200ms.

    **Calculations:**
    - Treat P99 as a threshold event for a rough tail-risk check, not as a complete latency distribution.
    - Probability a read is below the P99 threshold: 0.99.
    - Probability all 1024 reads are below that threshold: 0.99 ^ 1024 ≈ 0.000034.
    - Probability at least one read is at or beyond the P99 threshold: 1 - 0.000034 ≈ 99.997%.

    **Conclusion & Interpretation:**
    - **Result: Tail-Dominated I/O.** The step is very likely to encounter a P99-class straggler, so planning around the 10ms average is wrong; the exact expected wait requires the latency distribution above P99.
