title: 'Feature Store: Diagnose Feature Staleness Causing Model Accuracy Degradation'
scenario: 'A recommendation model''s CTR drops from 8.2% to 6.1% one week after a feature store migration. The model weights are unchanged. You observe that the ''user_30day_purchase_history'' feature shows 0 variance in the new store.'
question: 'What root cause explains the CTR drop when a feature has zero variance, and how would you fix it?'
details:
  realistic_solution: 'Zero variance on a feature = all values are the same (likely default/null). This means the feature pipeline broke during migration and is serving stale or null values. The model learned to rely on this feature; with it nulled out, predictions default to global average, causing accuracy drop.'
  common_mistake: |
    **The Pitfall:** Blaming the model, initiating retraining, or rolling back infrastructure before diagnosing the data pipeline.
    **The Rationale:** Candidates often assume concept drift or system latency rather than verifying the statistical integrity of the input features.
    **The Consequence:** Retraining on broken features cements the degradation, turning a pipeline fix into a weeks-long model recovery effort.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - CTR dropped from 8.2% to 6.1%.
       - Feature variance = 0 (all values identical).
    2. **Calculations:**
       - Relative degradation = (8.2 - 6.1) / 8.2 = ~25.6%.
       - A variance of exactly 0 mathematically implies the pipeline is serving constants (e.g., all nulls).
    3. **Conclusion & Interpretation:** **Result: Data-Bound (Integrity)**. The pipeline is serving broken constants, stripping the model of predictive signal. Retraining on this would cement the degradation.
