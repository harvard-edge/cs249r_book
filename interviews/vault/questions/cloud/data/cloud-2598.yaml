title: Zipfian Vocabulary Shannon Entropy
scenario: You have a text dataset with a 50K vocabulary where token frequencies follow Zipf's law.
question: Under the Zipfian model p(k)=1/(k × H_N) for a 50K-token vocabulary, what is the theoretical minimum bits per token for lossless compression (the Shannon entropy)?
details:
  realistic_solution: For p(k)=1/(k × H_N), H_N is the harmonic normalization constant Σ(1/k) for k=1..N. With N=50,000, H_N ≈ ln(50,000) + 0.577 ≈ 11.40. Shannon entropy is H = -Σ p(k) log₂ p(k) = Σ p(k) log₂(k × H_N). Substituting the Zipf probabilities gives H = log₂(H_N) + (1/H_N) × Σ(log₂ k)/k. Evaluating that sum numerically for 50K tokens gives about 10.9 bits/token. That is the theoretical lossless entropy bound under the stated Zipfian distribution; the uniform-vocabulary bound log₂(50,000) ≈ 15.6 bits/token is only a baseline for comparison.
  common_mistake: |
    **The Pitfall:** Using uniform entropy ($\log_2$ of vocabulary size) as the compression bound.
    **The Rationale:** Failing to account for the fact that natural language follows Zipf's law, meaning frequent tokens carry less information per token.
    **The Consequence:** Underestimating the theoretical compressibility of text datasets.
  napkin_math: |
    **Assumptions & Constraints:**
    - Vocabulary: 50K tokens following a Zipfian distribution.

    **Calculations:**
    - Harmonic normalizer: H_50000 ≈ ln(50,000) + 0.577 ≈ 11.40.
    - Since p(k) = 1 / (k * H_50000), -log₂ p(k) = log₂(k * H_50000).
    - Entropy: H = -Σ p(k) log₂ p(k) = log₂(H_50000) + (1 / H_50000) * Σ(log₂ k) / k.
    - Direct summation for k=1..50,000 gives H_50000 = 11.3970 and H = 10.9109 bits/token.
    - Uniform baseline: log₂(50,000) ≈ 15.6 bits/token.

    **Conclusion & Interpretation:**
    - **Result: ~10.9 bits/token.** This is the Shannon lower bound for lossless coding under the stated Zipfian token distribution; the 15.6-bit uniform value is a comparison point, not the answer.
