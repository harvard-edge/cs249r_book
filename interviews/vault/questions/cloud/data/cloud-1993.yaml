title: Evaluating Mitigation Strategies for Recommendation System Drift
scenario: 'A large-scale e-commerce recommendation system using a 100GB DLRM model deployed on a fleet of A100 GPUs is experiencing continuous accuracy degradation at a rate of -0.5% CTR per week due to shifting user behavior. The team is evaluating two mitigation strategies: 1) A daily full retrain using a 30-day sliding window of data (requires 64 A100s for 12 hours), or 2) Continuous incremental training where models are updated every 15 minutes using micro-batches from a Kafka stream (requires 8 A100s continuously).'
question: Should the 100GB DLRM use daily full retraining or continuous 15-minute online learning to fight -0.5% weekly CTR drift, and why?
details:
  realistic_solution: 'Implement a daily batch retrain as the primary baseline to ensure stability and stateless reproducibility. If intraday reactivity is strictly required, adopt a hybrid approach: stateless daily retrains combined with lightweight online fine-tuning, enabling easy rollbacks to the stable daily checkpoint.'
  common_mistake: |
    **The Pitfall:** Assuming continuous learning is always superior due to faster reaction to new trends.
    **The Rationale:** Engineers are drawn to the elegance of real-time systems and the theoretical ideal of an always-up-to-date model.
    **The Consequence:** They ignore the massive operational complexity of state management, risk of catastrophic forgetting, and lack of rollback infrastructure, crippling system stability.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Daily retrain requires 64 GPUs for 12 hours.
       - Continuous training requires 8 GPUs for 24 hours.
    2. **Calculations:**
       - Daily Retrain Compute: 64 GPUs × 12 hours = 768 GPU-hours/day.
       - Continuous Training Compute: 8 GPUs × 24 hours = 192 GPU-hours/day.
       - Compute Savings: 768 - 192 = 576 GPU-hours/day.
       - Financial Savings: 576 hours × $2/GPU-hour = $1,152/day.
    3. **Conclusion & Interpretation:**
       - **Result: Ops-Bound. While continuous training saves $1,152/day, the engineering overhead for a 100GB model far exceeds these savings. A stateless daily retrain is the safer, standard architecture.**
