title: MMD Drift Detection Compute Constraint
scenario: You manage a real-time recommendation system where item embeddings (D=512) are monitored for distribution shift. You use the unbiased Maximum Mean Discrepancy (MMD) with an RBF kernel between a golden reference set (N=20,000) and an hourly live batch (M=20,000). Your MMD monitoring job runs on a CPU sidecar limited to a compute budget of 100 GFLOPs per run. Each RBF kernel evaluation requires approximately 1,500 FLOPs.
question: How much compute does naive quadratic MMD need for N=M=20,000, does it fit 100 GFLOPs, and what N=M stays within budget?
details:
  realistic_solution: Calculate the conventional cross-pair cost at 600 GFLOPs, which exceeds the 100 GFLOPs budget by 6x. Under the N*M pair-count estimate, the budget allows about N=M=8,165 samples, so use N=M=8,000 as a conservative subsample size or switch to the O(N) linear-time MMD estimator.
  common_mistake: |
    **The Pitfall:** Forgetting the O(N*M) cross-pair cost of the standard two-sample MMD estimator.
    **The Rationale:** Incorrectly assuming linear scaling for drift detection metrics.
    **The Consequence:** Deploying drift detection jobs that heavily throttle or crash the monitoring sidecar due to extreme compute requirements.
  napkin_math: |
    **Assumptions & Constraints:**
    - Reference samples N = 20,000 and live samples M = 20,000.
    - Conventional cross-pair estimate uses N*M RBF kernel evaluations.
    - RBF cost = 1,500 FLOPs.
    - Budget = 100 GFLOPs.

    **Calculations:**
    - Naive cross-pair kernel evaluations = 20,000 * 20,000 = 4.0 * 10^8 pairs.
    - Total FLOPs = 4.0 * 10^8 * 1,500 = 6.0 * 10^11 FLOPs = 600 GFLOPs.
    - Budget check: 600 GFLOPs is 6x over the 100 GFLOPs budget.
    - With N=M=x, the same estimate gives x^2 * 1,500 <= 100 * 10^9.
    - Therefore x^2 <= 66,666,666.7 and x <= 8,165.

    **Conclusion & Interpretation:**
    - **Result: 600 GFLOPs (Compute-Bound)**. Naive MMD exceeds the 100 GFLOPs budget; N=M=8,165 is the theoretical limit under this estimate, so N=M=8,000 is a safe operating point.
