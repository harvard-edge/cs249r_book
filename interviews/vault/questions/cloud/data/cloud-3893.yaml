title: VLM-Based Automated Curation at 100B Scale
scenario: You must design a distributed data curation pipeline using a 10B parameter Vision-Language Model (VLM) in FP16 to score 100 billion image-text pairs (200KB each). The VLM requires 6 TFLOPs per sample. You need to calculate the exact number of A100 GPUs required to complete this job in exactly 14 days.
question: Assuming 40% A100 MFU, what VLM scoring architecture, bottleneck, and GPU count finish 100B samples in 14 days?
details:
  realistic_solution: 'Use a decoupled scoring pipeline: shard the manifest, feed stateless GPU workers from a distributed queue, prefetch image bytes from object storage, run batched VLM inference, and write compact scores plus sample IDs to a scalable store. The GPU count is sized from compute only under the stated 6 TFLOPs/sample and 40% MFU assumptions; the 200KB/sample data movement is a separate throughput constraint that must be provisioned so it does not starve GPUs. The job needs 100B * 6 TFLOPs = 6e23 FLOPs; each A100 delivers 312 * 0.40 = 124.8 TFLOP/s, so each GPU performs 124.8e12 * 1,209,600 = 1.509e20 FLOPs in 14 days. The minimum integer count is ceil(6e23 / 1.509e20) = 3,975 A100 GPUs.'
  common_mistake: |
    **The Pitfall:** Misidentifying the bottleneck as object storage I/O and ignoring Model FLOPs Utilization (MFU).
    **The Rationale:** Dealing with 100B files sounds like an I/O problem, and marketing specs highlight peak TFLOPS.
    **The Consequence:** Under-provisioning GPUs by a factor of 2.5x because peak TFLOPS is physically impossible to achieve, causing the pipeline to miss the 14-day deadline.
  napkin_math: |
    **Assumptions & Constraints:**
    - Workload: 100 billion samples, 6 TFLOPs per sample.
    - The 200KB/sample input movement is excluded from compute sizing; storage must be provisioned separately to keep GPUs fed.
    - Deadline: 14 days = 1,209,600 seconds.
    - A100 FP16 peak: 312 TFLOP/s; assumed MFU: 40%.

    **Calculations:**
    - Total compute = 100e9 * 6e12 FLOPs = 6e23 FLOPs.
    - Effective GPU throughput = 312 TFLOP/s * 0.40 = 124.8 TFLOP/s.
    - FLOPs per GPU over 14 days = 124.8e12 * 1,209,600 = 1.509e20 FLOPs.
    - Samples per GPU per second = 124.8 / 6 = 20.8 samples/s.
    - Samples per GPU in 14 days = 20.8 * 1,209,600 = 25,159,680 samples.
    - GPUs required = ceil(100,000,000,000 / 25,159,680) = 3,975 GPUs.

    **Conclusion & Interpretation:**
    - **Result: minimum integer requirement is 3,975 A100 GPUs under the stated 40% MFU assumption.** The architecture is compute-sized, with object-storage and queue throughput engineered to keep those GPUs fed.
