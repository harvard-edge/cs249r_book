title: Gradient Clipping vs Data Poisoning
scenario: A computer vision model is trained on a 50 million image dataset. An attacker injects 100,000 poisoned images with a backdoor trigger. The global batch size is 8192. Clean samples produce an average gradient norm of 0.5, while poisoned samples (designed to maximize impact) produce an average unclipped gradient norm of 50.0.
question: How many poisoned samples appear per global batch, and how does per-sample clipping at C=1.0 change their relative gradient contribution?
details:
  realistic_solution: Per-sample gradient clipping at C=1.0 restricts the anomalous update size from poisoned examples. Under the simplified metric of each group share of the sum of per-sample gradient norms, the poisoned samples contribute about 16.7% before clipping and about 0.4% after clipping. That sharply reduces their influence, but it does not prove the backdoor is neutralized; targeted gradients can still matter depending on alignment, sampling, repetition, and the training objective.
  common_mistake: |
    **The Pitfall:** Assuming the low overall poisoning rate (0.2%) makes the attack inherently ineffective.
    **The Rationale:** Engineers equate dataset percentage directly to impact percentage, ignoring gradient magnitude.
    **The Consequence:** A few targeted samples with massive gradients completely dominate the batch update, successfully compromising the model.
  napkin_math: |
    **Assumptions & Constraints:**
    - Poison rate: 100k / 50M = 0.2%.
    - Batch Size: 8192.
    - Clean Gradient Norm: 0.5.
    - Poisoned Gradient Norm: 50.0.

    **Calculations:**
    - Poisoned samples per batch: 8192 * 0.002 = 16.384 samples in expectation.
    - Clean samples per batch: 8192 - 16.384 = 8175.616 samples in expectation.
    - Metric: poisoned share of the sum of per-sample gradient norm contributions.
    - Unclipped impact: (16.384 * 50) / ((16.384 * 50) + (8175.616 * 0.5)) = 819.2 / 4907.008 = 16.7%.
    - Clipped impact (C=1.0): (16.384 * 1.0) / ((16.384 * 1.0) + (8175.616 * 0.5)) = 16.384 / 4104.192 = 0.40%.

    **Conclusion & Interpretation:**
    - **Result: Influence reduced, not eliminated (Security-Bound)**. Clipping drops this norm-share metric from 16.7% to 0.4%, but further poisoning defenses and validation are still required.
