title: Diffusion Model INT8 PTQ Artifacts
scenario: You deploy an SDXL text-to-image service. To hit a sub-second SLA, you apply INT8 Post-Training Quantization (PTQ). You calibrate the model using 500 high-quality images from the target domain. Latency hits 0.8s, but the output images have severe color banding and structural artifacts. FP16 output is perfect.
question: Why does INT8 PTQ cause SDXL banding despite target-domain calibration, and how should activation scales be calibrated?
details:
  realistic_solution: 'Diffusion models are iterative and their activation distributions change drastically across the denoising timesteps. At T=1000, activations represent mostly noise (Gaussian distribution). At T=0, activations represent sharp image features (highly skewed, localized outliers). Calibrating on raw images or a random subset of timesteps creates a single set of quantization scales that fits neither extreme well. The artifacts occur because the static scales clip the outliers at early timesteps and lose precision at late timesteps. The architecture requires a Timestep-Aware Calibration strategy: either group the 50 timesteps into intervals (e.g., 5 groups of 10) and compute separate INT8 activation scales for each interval, or calibrate using a representative sample of activations collected across the entire diffusion trajectory.'
  common_mistake: |
    **The Pitfall:** Increasing the number of denoising steps from 50 to 100 to smooth out the noise.
    **The Rationale:** Engineers assume the model just needs more steps to resolve artifacts introduced by precision loss.
    **The Consequence:** Doubling the inference steps directly violates the strict sub-second latency SLA without fundamentally fixing the quantization mapping.
  napkin_math: |
    **Assumptions & Constraints:**
    - INT8 signed activation range is approximately -127 to 127.
    - A late/noisy timestep has activation max around 5.0.
    - A sharp-detail timestep has activation max around 50.0.
    - One static scale must cover the whole trajectory unless calibration is timestep-aware.

    **Calculations:**
    - If the static scale is calibrated for max 50.0, the scale is 50 / 127 = 0.394 per INT8 step.
    - At the timestep with max 5.0, only about 5 / 0.394 = 13 positive quantization levels are used instead of 127, wasting most of the dynamic range and causing banding.
    - If the static scale is calibrated for max 5.0, then activations near 50.0 at the sharp-detail timestep clip at roughly 10% of their needed range.
    - Timestep-aware scales avoid this mismatch by using smaller scales for low-range timesteps and larger scales for high-range timesteps.

    **Conclusion & Interpretation:**
    - **Result: timestep-calibration mismatch.** The issue is clipping and poor scale utilization across denoising timesteps, not a compute-bound bottleneck.
