title: The Data Quality Pipeline
scenario: You're building a continuous training pipeline that ingests 10 TB of new user interaction data daily. Last month, a silent data corruption (a logging schema change) poisoned 3 days of training data before anyone noticed, causing a 5% accuracy regression that took 2 weeks to diagnose.
question: How would you design a data quality pipeline that catches silent corruptions in the 10 TB/day training feed within 1 hour?
details:
  realistic_solution: 'A production data quality pipeline needs four layers: (1) Schema validation — Great Expectations or TFX Data Validation. (2) Statistical profiling — compute per-column distributions on each hourly data shard and compare against a 7-day rolling baseline. Alert on KL-divergence > threshold. (3) Embedding drift detection — run a small encoder on a sample of each shard, compare embedding centroids against baseline. (4) Canary training — train a small proxy model on each day''s data for 100 steps, compare loss curve against expected trajectory.'
  common_mistake: |
    **The Pitfall:** Relying solely on schema validation before training.
    **The Rationale:** Assuming structural checks are sufficient to catch statistical or semantic shifts.
    **The Consequence:** Valid-looking but statistically corrupt data enters the training pipeline, leading to silent regressions.
  napkin_math: |
    **Assumptions & Constraints:**
    - Ingestion rate: 10 TB/day = 417 GB/hour.
    - Hardware cost: 1 GPU + 8 CPUs = ~$3/hour.

    **Calculations:**
    - Statistical profiling (1% sample): 4.17 GB x 100 columns = ~5 min on 8 CPUs.
    - Embedding drift: encode 10k samples/hour = 30 sec on 1 GPU.
    - Canary training: 100 steps on proxy = 2 min on 1 GPU.
    - Total detection latency: <10 minutes.
    - Cost: $3/hour = $2,160/month.
    - Savings: $15k GPU waste + $16k engineer time = $31k per incident.

    **Conclusion & Interpretation:**
    - **Result: <10 minute detection at $2.2k/month (Quality-Bound pipeline)**. Quick detection prevents silent data corruption from poisoning training.
