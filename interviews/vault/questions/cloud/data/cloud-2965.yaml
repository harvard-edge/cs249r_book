title: Dataset Curation Optimize Deduplication Pipeline Scalability
scenario: Your MinHash deduplication pipeline takes 72 hours for 5T tokens on a 32-node CPU cluster. Training starts in 48 hours.
question: What is the bottleneck in the MinHash dedup pipeline, and how would you complete the 5T-token run in under 24 hours?
details:
  realistic_solution: 'Profile the stages separately: MinHash signature generation is CPU-bound and parallel, LSH bucketing is memory/shuffle-heavy, and candidate pair comparison becomes the bottleneck when popular buckets create too many candidate pairs. Fix the 72-hour run by salting/skew-splitting large buckets, sharding by domain/language before LSH, capping bucket sizes, and using Spark hash partitioning so candidates stay local. The goal is not brute-force all-pairs comparison; it is reducing shuffled signatures and candidate-pair volume by at least 3x so the run finishes under 24 hours.'
  common_mistake: |
    **The Pitfall:** Blindly scaling up the CPU cluster horizontally without profiling the pipeline stages.
    **The Rationale:** Engineers assume data processing is purely compute-bound, entirely missing the O(N²) all-to-all communication overhead inherent in the Jaccard similarity comparison stage.
    **The Consequence:** Adding nodes provides zero speedup (or even slows the job down) because the bottleneck is the cross-node network shuffle, guaranteeing the training deadline is missed.
  napkin_math: |
    **Assumptions & Constraints:**
    - Dataset: 5T tokens. Assume 400 tokens/doc average, so ~12.5B documents.
    - MinHash/LSH signature: ~200 bytes/doc.
    - Current end-to-end runtime: 72 hours on 32 nodes; target: <24 hours.
    - Pipeline: MinHash generation -> LSH bucketing -> candidate comparison.

    **Calculations:**
    - Signature material to shuffle: 12.5B docs * 200 bytes = 2.5TB before replication across LSH bands.
    - With 20 bands, emitted band keys are about 2.5TB * 20 = 50TB logical shuffle before compression and locality.
    - The 72-hour runtime implies the bottleneck is not raw MinHash CPU time; it is skewed LSH buckets and candidate comparison.
    - To finish in 24 hours, total candidate/shuffle work must drop by at least 72 / 24 = 3x.
    - If domain/language sharding eliminates 70% of cross-domain candidates and skew splitting/caps remove another 30% of remaining hot-bucket work, residual work is 0.30 * 0.70 = 21% of baseline, a ~4.8x reduction.
    - Expected runtime after fixes: 72h * 21% = ~15h plus overhead, leaving margin under 24h.

    **Conclusion & Interpretation:**
    - **Result: Skewed LSH Candidate-Shuffle Bound**. The fix is to reduce hot-bucket candidate pairs and cross-shard shuffle, not to treat the pipeline as brute-force O(N^2) all-pairs comparison.
