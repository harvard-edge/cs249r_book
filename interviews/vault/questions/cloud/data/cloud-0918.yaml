title: Evaluating Contamination in Code LLMs
scenario: A 70B parameter code model trained on 3TB of data achieves 82% on HumanEval. In live production A/B testing, acceptance drops from 45% to 22%. Your pipeline uses exact 8-gram string matching against the test set to filter contaminated examples.
question: Why can the model score 82% on HumanEval yet drop production acceptance to 22%, and how should contamination be prevented?
details:
  realistic_solution: 'Implement an approximate semantic decontamination pipeline using MinHash LSH (e.g., Jaccard similarity > 0.8 on 13-grams) to catch near-duplicate matches. Transition the primary evaluation to a private, dynamically updated holdout set (or live A/B testing) to establish a true baseline devoid of leakage.'
  common_mistake: |
    **The Pitfall:** Relying solely on exact n-gram matching for decontamination.
    **The Rationale:** Verbatim string matching is computationally cheap and simple to implement over large corpora.
    **The Consequence:** Failing to catch paraphrased, re-formatted, or conceptually identical benchmark questions, artificially inflating benchmark scores and hiding true model regressions.
  napkin_math: |
    **Assumptions & Constraints:**
    - 3TB training corpus. Exact 8-gram match filters verbatim snippets.
    - 2% of corpus contains approximate variants.

    **Calculations:**
    - 8-gram catches 0.1% (verbatim). Remaining 1.9% leaks.
    - MinHash LSH (Jaccard > 0.8 on 13-grams) across 3TB takes ~500 CPU-hours but catches >95% of near-duplicates.

    **Conclusion & Interpretation:**
    - **Result: Evaluation-Bound.** Exact n-gram matching fails to detect paraphrased or conceptually identical leakage, artificially inflating benchmark scores. Semantic decontamination with MinHash LSH is required.
