title: Evaluating OS Page Cache for Stochastic ML Training
scenario: You are designing the data loading pipeline for a large-scale Vision Transformer (ViT-H) training job on a 100 TB image dataset. The training cluster uses 8x H100 GPU nodes, each equipped with 4x NVMe Gen5 SSDs. The infrastructure team proposes relying on standard POSIX file reads of individual image files and the Linux OS page cache, arguing the raw NVMe speed is more than sufficient to feed the GPUs, which require 8 GB/s of data throughput.
question: Should you rely on POSIX individual-file reads and the OS page cache for the 100 TB ViT-H dataset, and what should you use instead?
details:
  realistic_solution: Reject the standard POSIX individual-file approach for this training workload. Use a sharded sequential container format such as WebDataset or TFRecord to restore spatial locality, perform shard-level and local in-memory shuffle to preserve SGD randomness, and tune prefetching and worker parallelism around large sequential reads. Bypassing the OS page cache with Direct I/O can be useful in some ingestion stacks, but it should not be a blanket requirement; standard buffered reads may work well when the shard pipeline is sequential and cache behavior is measured.
  common_mistake: |
    **The Pitfall:** Relying on raw sequential NVMe bandwidth guarantees for individual file reads.
    **The Rationale:** The infrastructure team assumes the OS page cache will automatically handle spatial and temporal locality.
    **The Consequence:** SGD's random access defeats read-ahead heuristics, causing severe I/O thrashing, OS interrupts, and GPU starvation.
  napkin_math: |
    **Assumptions & Constraints:**
    - Raw NVMe bandwidth per node: 48 GB/s.
    - Required GPU throughput: 8 GB/s.
    - Image size: ~150KB.
    - Random individual-file reads add metadata lookup, open/close, filesystem, interrupt, and page-cache churn overhead.

    **Calculations:**
    - Required images per second: 8 GB/s / 150 KB ≈ 53,000 images/s per node.
    - With individual files, that implies tens of thousands of file opens and random small reads per second, which defeats sequential read-ahead and turns the workload into IOPS/metadata-limited access rather than a 48 GB/s streaming read.
    - Sequential shard reads amortize metadata and turn many 150KB records into large contiguous transfers, preserving disk locality while local shuffle restores SGD randomness.

    **Conclusion & Interpretation:**
    - **Result: I/O-Bound.** Raw sequential NVMe bandwidth is not the limiting model for random POSIX image files; use shard/container formats plus local shuffle to feed the GPUs reliably.
