title: Real-World Distribution Shift Impact
scenario: Your team is deploying a fraud detection model to a cloud pipeline processing
  10 million transactions per day. On the highly-curated benchmark dataset, the model
  achieves a 95% True Positive Rate (TPR) and a 99.9% True Negative Rate (TNR). In
  the real-world stream, 5% of transactions suffer from a distribution shift, degrading
  TNR to 98.0%. The baseline fraud prevalence is 0.1%.
question: How many daily false positives should production expect compared to the
  static benchmark prediction?
details:
  realistic_solution: Segment the incoming data stream into clean and noisy cohorts
    based on the expected real-world distribution (95% clean, 5% noisy), apply the
    specific fall-out rates to each, and sum the expected errors to benchmark true
    operational load.
  common_mistake: '**The Pitfall:** Relying solely on aggregate static benchmark metrics.

    **The Rationale:** Candidates fail to stratify the expected errors by the proportion
    of out-of-distribution or noisy data expected in production.

    **The Consequence:** Severe operational overload for the fraud review team due
    to unexpected false positive spikes.

    '
  napkin_math: '**Assumptions & Constraints:**

    - Total transactions: 10,000,000.

    - Fraud prevalence: 0.1% (10,000 fraud, 9,990,000 legit).

    - Static benchmark FPR: 0.1%.

    - Real-world Clean (95%) FPR: 0.1%.

    - Real-world Noisy (5%) FPR: 2.0%.


    **Calculations:**

    - Static prediction: 9,990,000 * 0.001 = 9,990 FPs.

    - Clean legit volume: 9,990,000 * 0.95 = 9,490,500.

    - Clean FPs: 9,490,500 * 0.001 = 9,490 FPs.

    - Noisy legit volume: 9,990,000 * 0.05 = 499,500.

    - Noisy FPs: 499,500 * 0.020 = 9,990 FPs.

    - Total real-world FPs: 9,490 + 9,990 = 19,480 FPs.


    **Conclusion & Interpretation:**

    - **Result: 19,480 FPs (False-Positive-Bound)**. The 5% noisy data slice nearly
    doubles the total false positives (19,480 vs 9,990), fundamentally changing the
    operational load.

    '
