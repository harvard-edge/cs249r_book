title: AOT Dataset Compilation for H100 GPU Clusters
scenario: 'You are training a large vision model on an 8x H100 node. The GPUs can collectively process 32,000 images per second. The raw dataset consists of 5MB high-resolution JPEGs stored in object storage. Assume a single host CPU core can decode and resize 200 JPEGs per second.'
question: 'Calculate the network and CPU requirements to determine if you should use JIT decoding or AOT dataset compilation to feed the 32,000 images/sec.'
details:
  realistic_solution: 'Implement an AOT data compilation step (similar to building an executable) that pre-processes raw 5MB JPEGs into uncompressed, sequentially readable 300KB FP16 tensors packed into optimized formats like WebDataset or TFRecords. This eliminates runtime CPU decode bottlenecks and IB NIC saturation.'
  common_mistake: |
    **The Pitfall:** Relying on JIT data loading from object storage for high-throughput GPU training.
    **The Rationale:** Developers often use basic PyTorch DataLoaders out of the box without modeling host-side bottlenecks.
    **The Consequence:** Severe CPU decoding bottlenecks and network saturation that starves the expensive GPUs, dropping MFU significantly.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Target throughput: 32,000 imgs/sec.
       - JIT format: 5MB JPEGs. CPU decode capacity: 200 imgs/sec/core.
       - AOT format: Preprocessed 300KB FP16 tensors.
    2. **Calculations:**
       - JIT Network Traffic: 32,000 imgs/sec * 5MB = 160 GB/s.
       - JIT CPU Cores: 32,000 / 200 = 160 CPU cores.
       - AOT Network Traffic: 32,000 * 300KB = 9.6 GB/s.
    3. **Conclusion & Interpretation:**
       - **Result: CPU-Bound and Network-Bound. JIT exceeds standard 50GB/s IB NDR NIC limits and requires 160 CPU cores. AOT fits comfortably at 9.6 GB/s and entirely frees the host CPUs.**
