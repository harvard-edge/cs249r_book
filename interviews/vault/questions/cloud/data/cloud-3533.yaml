title: Real-time Feature Serving with H100-powered Embeddings
scenario: Your team is building an online recommendation system that requires serving highly fresh features to millions of users globally. A critical component involves generating high-dimensional user and item embeddings using a deep learning model deployed on a cluster of GPUs. These embeddings must be ingested into an online feature store and served with low latency, maintaining strict point-in-time correctness for model inference.
question: How would you design the embedding generation and feature serving architecture to guarantee freshness, point-in-time correctness, and scalability to millions of QPS?
details:
  realistic_solution: Employ a two-tier feature store architecture with an offline store for historical feature generation and a low-latency online store. Implement an efficient stream processing pipeline (e.g., Kafka, Flink) that captures new embeddings, performs transformations, and pushes them to the online store. Utilize optimized serialization formats (Apache Arrow) to minimize latency. Implement TTLs for freshness and versioning/snapshotting for point-in-time correctness in the online store.
  common_mistake: |
    **The Pitfall:** Neglecting serialization overhead or failing to enforce point-in-time correctness in the online store.
    **The Rationale:** Engineers often treat the feature store as a simple key-value cache, focusing only on read latency.
    **The Consequence:** Heavy serialization tanks write throughput, and failing to snapshot features leads to training-serving skew, degrading recommendation accuracy.
  napkin_math: |
    **Assumptions & Constraints:**
    - Embedding Dimension D=1024 (float32) = 4KB/embedding.
    - GPU generates 100,000 embeddings/sec.
    - 100M users.
    - Target read scale: 2M QPS globally.
    - Per feature-store node: 100 Gbps usable network and 64 worker cores.
    - Each worker core can perform 20,000 in-memory key lookups/sec after caching and serialization optimization.

    **Calculations:**
    - Ingress bandwidth: 100,000 embeddings/sec × 4KB = 400 MB/s ingress.
    - Online store memory: 100M users * 4KB = 400 GB total memory required.
    - Network limit per node: 100 Gbps = 12.5 GB/s; 12.5 GB/s / 4KB ≈ 3.1M QPS.
    - CPU lookup limit per node: 64 cores × 20,000 QPS/core = 1.28M QPS.
    - Nodes needed for 2M QPS = ceil(2M / 1.28M) = 2 nodes for CPU, with more replicas added for availability and regional locality.

    **Conclusion & Interpretation:**
    - **Result: ~1.28M QPS/node under the stated lookup-cost model.** Million-QPS serving is plausible with sharded, replicated online stores; capacity planning must size both CPU lookup work and network egress instead of mixing single-query latency with system throughput.
