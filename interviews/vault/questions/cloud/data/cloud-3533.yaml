title: Real-time Feature Serving with H100-powered Embeddings
scenario: Your team is building an online recommendation system that requires serving highly fresh features to millions of users globally. A critical component involves generating high-dimensional user and item embeddings using a deep learning model deployed on a cluster of GPUs. These embeddings must be ingested into an online feature store and served with low latency, maintaining strict point-in-time correctness for model inference.
question: How would you design the embedding generation and feature serving architecture to guarantee freshness, point-in-time correctness, and scalability to millions of QPS?
details:
  realistic_solution: |
    Generate embeddings into a durable stream with entity ID, embedding version, model version, event time, and write time. A stream processor validates schema, deduplicates updates, applies watermarks for late data, and writes the latest version to a sharded, replicated online store while also writing immutable versions to the offline store. Serving reads by entity and required model/feature version, checks staleness against the request timestamp, and falls back when the online value is too old. Offline training uses time-travel joins against the immutable history as of the label time, using the same feature definitions as serving. Scale by sharding by entity, replicating per region, separating write ingestion from read replicas, and capacity-planning memory, CPU lookup cost, network egress, and replication overhead independently.
  common_mistake: |
    **The Pitfall:** Neglecting serialization overhead or failing to enforce point-in-time correctness in the online store.
    **The Rationale:** Engineers often treat the feature store as a simple key-value cache, focusing only on read latency.
    **The Consequence:** Heavy serialization tanks write throughput, and failing to snapshot features leads to training-serving skew, degrading recommendation accuracy.
  napkin_math: |
    **Assumptions & Constraints:**
    - Embedding Dimension D=1024 (float32) = 4KB/embedding.
    - GPU generates 100,000 embeddings/sec.
    - 100M users.
    - Target read scale: 2M QPS globally.
    - Per feature-store node: 100 Gbps usable network and 64 worker cores.
    - Reserve 50% headroom for replication, serialization, TLS, request fanout, and failover.
    - Each worker core can perform 20,000 in-memory key lookups/sec after caching and serialization optimization.

    **Calculations:**
    - Ingress bandwidth: 100,000 embeddings/sec × 4KB = 400 MB/s ingress.
    - Primary online-store memory = 100M users * 4KB = 400 GB before replication, indexes, and allocator overhead.
    - With 3 replicas and about 30% overhead, provisioned memory is roughly 400 GB * 3 * 1.3 = 1.56 TB.
    - Network ceiling per node before headroom: 100 Gbps = 12.5 GB/s; 12.5 GB/s / 4KB ≈ 3.1M QPS.
    - CPU lookup ceiling per node before headroom: 64 cores * 20,000 QPS/core = 1.28M QPS.
    - With 50% usable headroom, plan around min(1.55M network QPS, 0.64M CPU QPS) = 0.64M QPS per node.
    - Serving nodes for 2M QPS = ceil(2M / 0.64M) = 4 nodes before adding regional redundancy and failure-domain replicas.

    **Conclusion & Interpretation:**
    - **Result: capacity and throughput must be sized separately.** The example needs about 1.56 TB provisioned memory for replicated embeddings and at least 4 serving nodes for 2M QPS before regional redundancy; network-only QPS is an upper bound, not a usable plan.
