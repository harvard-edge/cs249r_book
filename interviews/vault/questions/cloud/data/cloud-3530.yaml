title: Real-time Feature Freshness and Throughput for Inference
scenario: You are designing a real-time recommendation system that serves billions of requests daily. The inference models are deployed on a cluster of GPUs. For optimal recommendation quality, features must be as fresh as possible, ideally within 500ms of an event occurring. Your system generates a new set of 256 features (each feature is a 32-bit float) for each user interaction, which needs to be available in the online feature store within the freshness SLA. The models can process a batch of 1024 requests in 5ms if features are readily available in GPU memory.
question: How would you design the recommendation feature pipeline to keep features fresh within 500 ms and point-in-time correct?
details:
  realistic_solution: 'Implement a two-tier feature store architecture: an ultra-low-latency online store (e.g., Redis, Cassandra, DynamoDB) for real-time serving and a robust offline store (e.g., Snowflake, BigQuery, Apache Hudi) for training, backfilling, and batch processing. Utilize stream processing frameworks (e.g., Apache Flink, Spark Streaming, Kafka Streams) for real-time feature computation and ingestion into the online store, employing a push-based mechanism for minimal latency. Ensure versioning and accurate timestamps are used for point-in-time correctness, allowing for historical feature retrieval consistent with training data. Leverage distributed caching mechanisms and pre-fetching strategies to keep hot features in memory or close to the GPUs, minimizing data transfer overheads and maximizing the utilization of memory bandwidth for model inference. Implement robust monitoring and alerting for feature freshness and data pipeline health.'
  common_mistake: |
    **The Pitfall:** Underestimating the latency introduced by feature computation and retrieval from the online store.
    **The Rationale:** Engineers often focus entirely on optimizing the inference speed.
    **The Consequence:** Causing the feature pipeline to become the true bottleneck, starving the GPUs and failing the 500ms freshness SLA.
  napkin_math: |
    **Assumptions & Constraints:**
    - Freshness SLA: feature values available in the online store within 500 ms of the event.
    - Feature vector size: 256 features × 4 bytes = 1,024 bytes = 1 KiB per request.
    - Inference can consume a batch of 1,024 requests in 5 ms when features are already in GPU memory.

    **Calculations:**
    - Feature payload per inference batch = 1,024 requests × 1 KiB = 1 MiB.
    - Required feature transfer throughput to keep up with inference = 1 MiB / 0.005 s = 200 MiB/s per serving worker.
    - Freshness budget is for event-to-store propagation; if stream compute takes 300 ms and online-store write visibility takes 80 ms, observed lag is 380 ms.
    - Remaining freshness margin = 500 ms - 380 ms = 120 ms.

    **Conclusion & Interpretation:** **Result: 200 MiB/s serving payload and 120 ms freshness margin in the example.** The feature store must meet both throughput for GPU feeding and event-time propagation lag under 500 ms.
