title: Evaluating Storage Upgrades vs Data Serialization
scenario: Your team is training a large vision model on 8x GPUs using a distributed dataset of 1 billion 50KB images stored as individual files. You provisioned a cloud parallel file system with 50 GB/s peak throughput, but GPU utilization is plateauing at 30%. Storage throughput is bottlenecked at 2 GB/s, hitting a hard limit of 40,000 IOPS. The infrastructure team proposes upgrading to an 'Extreme NVMe' tier that provides 500,000 IOPS for 4x the hourly cost.
question: Should you buy the 500,000-IOPS Extreme NVMe tier or migrate 1B 50KB images to WebDataset/TFRecord, and why quantitatively?
details:
  realistic_solution: Reject the hardware upgrade and migrate to a serialized data format like WebDataset. By packing 50KB images into large 100MB tarballs, you convert hundreds of thousands of random IOPS into a few sequential reads per second.
  common_mistake: |
    **The Pitfall:** Accepting the costly hardware upgrade to solve the IOPS bottleneck.
    **The Rationale:** Candidates view hardware limitations as immutable infrastructure problems, forgetting that data layout software changes can drastically alter the access pattern.
    **The Consequence:** Wasting huge amounts of cloud budget on extreme-tier storage to brute-force a fundamentally inefficient read pattern.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target throughput = 100,000 images/sec * 50KB = 5.0 GB/s.
    - Current limit = 40,000 IOPS.
    - Serialized shards are 100MB each and are read sequentially.

    **Calculations:**
    - Current random-file setup: 40,000 reads/sec * 50KB/read = 2,000,000KB/s = 2.0 GB/s decimal.
    - Target bandwidth: 100,000 reads/sec * 50KB/read = 5,000,000KB/s = 5.0 GB/s decimal.
    - Images per 100MB shard: 100MB / 50KB = 2,000 images.
    - Shard reads needed: 100,000 images/sec / 2,000 images/shard = 50 shard reads/sec.
    - Sequential bandwidth from shards: 50 shards/sec * 100MB/shard = 5,000MB/s = 5.0 GB/s.

    **Conclusion & Interpretation:**
    - **Result: 50 large sequential reads/sec (I/O-Bound mitigation)**. Serialization keeps bandwidth near the 5.0 GB/s target while cutting metadata/random IOPS far below the 40k limit, so it is preferable to the costly IOPS tier.
