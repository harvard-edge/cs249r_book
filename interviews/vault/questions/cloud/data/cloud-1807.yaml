title: 'RBAC API Rate Limiting Bottleneck in Distributed Training'
scenario: An ML infrastructure team is training a multimodal model on 256 GPUs. The dataset consists of 5 billion 2MB image-text pairs stored in an S3-compatible object store. To comply with data governance policies, they implemented fine-grained Role-Based Access Control (RBAC) where an external IAM microservice evaluates access tokens for every single object GET request. Despite the storage cluster having 800 Gbps of dedicated bandwidth, GPU utilization has plummeted to 15% and dataloaders are constantly blocked on I/O.
question: What is causing the dataloader I/O collapse, and how should RBAC be redesigned to avoid per-object IAM checks?
details:
  realistic_solution: 'Replace per-object IAM checks with compute-scoped IAM roles (e.g., Instance Profiles) or short-lived session tokens that grant read access to an entire bucket or prefix, shifting authorization to the infrastructure layer.'
  common_mistake: |
    **The Pitfall:** Assuming the storage network bandwidth is saturated.
    **The Rationale:** High I/O block times usually point to network or disk limits in traditional architectures.
    **The Consequence:** Teams waste time profiling preprocessing or buying faster networks, rather than identifying the IAM control plane as the actual rate-limiting factor.
  napkin_math: |
    **Assumptions & Constraints:**
    - 256 GPUs, 150 MB/s target each. 2MB objects.
    - IAM Rate Limit: 1,000 req/s.
    
    **Calculations:**
    - Target Throughput: 256 * 150 MB/s = 38.4 GB/s.
    - Target IOPS: 38.4 GB/s / 2 MB = 19,200 req/s.
    - Capped Throughput: 1,000 req/s * 2 MB = 2.0 GB/s.
    - Utilization: 2.0 / 38.4 \u2248 5.2%.
    
    **Conclusion & Interpretation:**
    - **Result: 5.2% utilization (I/O-Bound)**. The IAM microservice rate limit caps throughput at 5.2%, severely starving the GPUs.
