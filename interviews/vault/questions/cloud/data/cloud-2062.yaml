title: Replacing Grid Search with Bayesian Optimization
scenario: An engineer plans a grid search over 5 hyperparameters with 10 values each, requesting 100,000 GPU-hours. A senior engineer proposes an alternative to drastically reduce the compute budget.
question: What is wrong with the grid search approach, and how do you reduce the budget while maintaining similar coverage?
details:
  realistic_solution: |
    Grid search over 5 parameters with 10 values each requires 10^5 = 100,000 experiments and wastes most trials on unimportant dimensions. Random search is the coverage-preserving replacement: with 50-100 trials, each important hyperparameter is sampled across many distinct values instead of being locked to a fixed grid. Bayesian optimization or TPE can reduce trials further by exploiting past results, but it trades broad coverage for optimization efficiency. The budget drops from 100,000 trials to roughly 50-100 exploratory trials, with random search preserving broad coverage over important dimensions and Bayesian search used after that if the goal is faster convergence.
  common_mistake: |
    **The Pitfall:** Treating grid search as a "slow but thorough" default.
    **The Rationale:** Failing to recognize that in high-dimensional spaces, only 2-3 hyperparameters typically matter, making grid search highly inefficient.
    **The Consequence:** Wasting massive amounts of compute evaluating irrelevant interactions between unimpactful hyperparameters.
  napkin_math: |
    **Assumptions & Constraints:**
    - 5 hyperparameters, 10 values each.

    **Calculations:**
    - Grid search: 10^5 = 100,000 trials.
    - Random search with 100 trials samples 100 values for each parameter instead of only the 10 grid values, so it gives broad marginal coverage of the important dimensions.
    - Bayesian optimization (TPE) can cut the trial count further by focusing on promising regions, but that is an optimization-efficiency tradeoff rather than identical coverage.

    **Conclusion & Interpretation:**
    - **Result: Search-Space Bound.** Replace the 100,000-trial grid with 50-100 random or staged random-plus-Bayesian trials; random search preserves broader coverage, while Bayesian optimization spends less budget by narrowing the search.
