title: Diagnosing Infinite Drift Alerts in KL Divergence
scenario: 'You are managing an anomaly detection model serving 5,000 requests per second on AWS Inferentia. The pipeline runs an hourly data drift check comparing the live feature distributions (Q) against the training baseline (P) using Kullback-Leibler (KL) divergence. Recently, the operations team reported severe alert fatigue: the KL divergence metric frequently spikes to near infinity during certain hours, triggering PagerDuty incidents, even though the overall model accuracy remains stable at 94%. Upon investigation, you find that the live data occasionally contains rare categorical feature values not present in the training set.'
question: How do you analyze this failure mode and architect a more robust drift detection thresholding mechanism?
details:
  realistic_solution: 'Diagnose that KL divergence is asymmetric and unbounded, spiking to infinity when P(x) is zero for a rare event in the baseline. Replace KL divergence with Jensen-Shannon (JS) divergence, which calculates the symmetric KL divergence to a mixture distribution M = 0.5 * (P + Q). JS is bounded between 0 and 1, providing stable, normalized thresholds for alarming.'
  common_mistake: |
    **The Pitfall:** Applying arbitrary clipping to KL divergence scores or manually filtering out out-of-vocabulary categories.
    **The Rationale:** It's a quick hack to silence PagerDuty alerts without changing the underlying mathematical metric.
    **The Consequence:** Masking genuine data drift and requiring constant, manual threshold tuning as the live data distribution evolves over time.
  napkin_math: |
    **Assumptions & Constraints:**
    - Baseline category probability P(x) = 0.
    - Live data probability Q(x) = 0.01.

    **Calculations:**
    - KL Divergence: Q(x) * \log(Q(x)/P(x)) approaches infinity.
    - JS Mixture M(x): 0.5 * (P(x) + Q(x)) = 0.005.
    - JS Divergence: Q(x) * \log_2(Q(x)/M(x)) = 0.01 * \log_2(0.01/0.005) = 0.01 * 1 = 0.01.

    **Conclusion & Interpretation:**
    - **Result: Bounded Metric (Algorithm-Bound)**. JS divergence is strictly bounded (max 1 bit), preventing false positive infinity spikes.
