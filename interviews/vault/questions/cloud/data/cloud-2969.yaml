title: 'Dataset Curation: Specification — Design a Data Quality SLA for Continuous Pre-Training'
scenario: You are writing the data quality specification for a continuous pre-training system on 256 H100s that ingests 100M new documents per week from production traffic.
question: What quantitative SLAs should gate the 100M weekly documents for data quality, freshness, deduplication, PII, and pipeline throughput?
details:
  realistic_solution: 'Define measurable gates: (1) Quality SLA: >95% of accepted docs pass language, length, boilerplate, toxicity, and quality-classifier thresholds; reject docs below the calibrated quality score. (2) Dedup SLA: <2% near-duplicate rate after MinHash at 0.8 Jaccard, measured on a holdout audit. (3) Freshness SLA: P95 accepted docs available for training within 24h of production. (4) Throughput SLA: sustain at least 14.3M docs/day, with burst headroom above 165 docs/sec. (5) PII SLA: <0.01% accepted docs contain email, SSN, phone, or secret-token patterns after redaction.'
  common_mistake: |
    **The Pitfall:** Writing qualitative SLAs ("data must be high quality") without measurable thresholds and automated enforcement.
    **The Rationale:** Candidates focus on the high-level goals of data quality rather than the engineering systems required to validate it at scale.
    **The Consequence:** The data pipeline cannot programmatically reject bad data, leading to silent degradation of the continuous pre-training runs.
  napkin_math: |
    **Assumptions & Constraints:**
    - 100M docs/week, 512 cores available, weekly deduplication batch execution in < 4 hours

    **Calculations:**
    - Throughput = 100M docs / 7 days = 14.3M docs/day = 165 docs/sec
    - Dedup signature compute floor = 100M / (512 cores * 10K docs/sec/core) = 19.5 seconds pure CPU time
    - 4-hour batch budget = 14,400 seconds, so orchestration/shuffle overhead can be up to 14,400 / 19.5 = ~738x the pure compute floor and still meet the SLA
    - Storage = 100M * 2KB = 200GB/week = 10.4TB/year

    **Conclusion & Interpretation:**
    - **Result: 165 docs/sec Sustained Ingest, Shuffle/Quality-Gate Bound.** Pure signature compute is negligible versus the 4-hour window; the SLA should gate freshness, dedup quality, PII leakage, and end-to-end pipeline latency rather than call the system compute-bound.
