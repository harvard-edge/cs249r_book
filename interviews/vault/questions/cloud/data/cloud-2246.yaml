title: The Curriculum Data Mixing Problem
scenario: 'You are designing the data mixing strategy for a 1 trillion token LLM pre-training run. Your corpus consists of 5 domains: web text (8T tokens), code (2T tokens), scientific papers (500B tokens), books (200B tokens), and math (50B tokens). You need exactly 1T tokens total. A naive approach samples proportionally to availability. However, proportional sampling produces weak math and reasoning.'
question: How do you determine the optimal mixture, and what systems constraint makes this problem harder than it appears?
details:
  realistic_solution: 'Choose the mixture with empirical proxy sweeps or Bayesian optimization because there is no closed-form mapping from domain proportions to downstream quality. The standard approach: (1) Train small proxy models (1B params, 50B tokens) across candidate mixtures. (2) Evaluate on a diverse benchmark suite (MMLU, GSM8K, HumanEval, etc.) to find Pareto-optimal mixtures. (3) Apply the winning policy to the full-scale run, with guardrails for domain caps. The systems constraint is token-budget and epoch-cap management: each domain has a maximum repeat count before overfitting, so the mixture must satisfy both quality targets and per-domain token limits. Math at 50B available tokens repeated ~4× yields at most 200B math-token draws in this example. You need an online curriculum scheduler that tracks per-domain token counts and adjusts sampling weights dynamically as small domains hit their repetition limits.'
  common_mistake: |
    **The Pitfall:** Upsampling the rare domains to equal proportions.
    **The Rationale:** Assuming equal representation across all domains is optimal without considering domain size limits.
    **The Consequence:** Equal mixing wastes capacity on domains with diminishing returns and causes severe overfitting on small domains (e.g., math repeating 4 epochs).
  napkin_math: |
    **Assumptions & Constraints:**
    - Proxy search: 20 configs, 1B params, 50B tokens, 6 FLOPs/token.
    - Full-scale run: 70B params, 1T tokens, 6 FLOPs/token.
    - Hardware: 64 H100s for proxy, 2,000 H100s for full-scale. MFU = 50% (989 TFLOPS peak = ~494.5 TFLOPS effective).

    **Calculations:**
    - Proxy cost per config: 1e9 × 50e9 × 6 = 3e20 FLOPs.
    - Proxy search time: (20 × 3e20) / (64 × 494.5e12) = 189,585 seconds = ~52.6 hours.
    - Full-scale cost: 70e9 × 1e12 × 6 = 4.2e23 FLOPs.
    - Full-scale time: 4.2e23 / (2000 × 494.5e12) = 424,671 seconds = ~4.9 days.
    - Math domain cap example: 50B available math tokens x 4 epochs = 200B allowable math-token draws.
    - In a 1T-token run, a fixed mixture using more than 200B math-token draws would exceed that 4-epoch cap; 20% math exactly consumes the example cap, while lower or staged schedules leave headroom.

    **Conclusion & Interpretation:**
    - **Result: Scheduler-Bound**. The FLOP estimates show proxy search is affordable relative to full runs, but the hard systems constraint is bounded per-domain repetition: the scheduler must track domain token counts and dynamically reweight sampling as small domains hit epoch caps.
