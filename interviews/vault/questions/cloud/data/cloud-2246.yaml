title: The Curriculum Data Mixing Problem
scenario: 'You are designing the data mixing strategy for a 1 trillion token LLM pre-training run. Your corpus consists of 5 domains: web text (8T tokens), code (2T tokens), scientific papers (500B tokens), books (200B tokens), and math (50B tokens). You need exactly 1T tokens total. A naive approach samples proportionally to availability. However, proportional sampling produces weak math and reasoning.'
question: "How do you determine the optimal mixture, and what systems constraint makes this problem harder than it appears?"
details:
  realistic_solution: 'The optimal mixture requires empirical search because there is no closed-form solution for how domain proportions affect downstream performance. The standard approach: (1) Train small proxy models (1B params, 50B tokens) with different mixtures using a grid or Bayesian optimization over the mixing proportions. (2) Evaluate on a diverse benchmark suite (MMLU, GSM8K, HumanEval, etc.) to find Pareto-optimal mixtures. (3) Apply the winning mixture to the full-scale run. The systems constraint: each domain has a maximum epoch count before overfitting. Math at 50B tokens can be repeated ~4× (200B tokens max) before quality degrades. This creates hard constraints: the mixture must satisfy both the target proportions AND the per-domain epoch limits. This means you need an online curriculum scheduler that tracks per-domain token counts during training and adjusts sampling weights dynamically as small domains hit their repetition limits.'
  common_mistake: |
    **The Pitfall:** Upsampling the rare domains to equal proportions.
    **The Rationale:** Assuming equal representation across all domains is optimal without considering domain size limits.
    **The Consequence:** Equal mixing wastes capacity on domains with diminishing returns and causes severe overfitting on small domains (e.g., math repeating 4 epochs).
  napkin_math: |
    **Assumptions & Constraints:**
    - Proxy search: 20 configs, 1B params, 50B tokens, 6 FLOPs/token.
    - Full-scale run: 70B params, 1T tokens, 6 FLOPs/token.
    - Hardware: 64 H100s for proxy, 2,000 H100s for full-scale. MFU = 50% (989 TFLOPS peak = ~494.5 TFLOPS effective).

    **Calculations:**
    - Proxy cost per config: 1e9 × 50e9 × 6 = 3e20 FLOPs.
    - Proxy search time: (20 × 3e20) / (64 × 494.5e12) = 189,585 seconds = ~52.6 hours.
    - Full-scale cost: 70e9 × 1e12 × 6 = 4.2e23 FLOPs.
    - Full-scale time: 4.2e23 / (2000 × 494.5e12) = 424,671 seconds = ~4.9 days.

    **Conclusion & Interpretation:**
    - **Result: Compute-Bound**. The ~52-hour proxy search effectively explores the mixture space, saving potentially weeks of wasted full-scale training.
