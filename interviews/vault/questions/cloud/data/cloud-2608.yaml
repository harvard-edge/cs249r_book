title: Labeling Strategy Selection Under Budget Constraints
scenario: 'You have $150K to label training data for an autonomous driving perception model. Option A: fully manual labeling at 30 imgs/hr. Option B: AI pre-annotation + human verification at 100 imgs/hr but requires $30K upfront for the pre-annotation model.'
question: "Which strategy maximizes labeled data volume?"
details:
  realistic_solution: 'Option A: $150K / $25/hr = 6,000 hrs x 30 imgs/hr = 180K images. Option B: ($150K - $30K) / $25/hr = 4,800 hrs x 100 imgs/hr = 480K images. Option B yields 2.67x more labeled data despite the $30K upfront cost. However, you must evaluate whether the pre-annotation model''s domain matches your target (e.g., a COCO-trained detector may miss rare road objects). If pre-annotations are poor quality, human correctors spend more time fixing than verifying, degrading the 100 imgs/hr assumption. The right answer depends on domain overlap between the pre-annotation model and your target distribution.'
  common_mistake: |
    **The Pitfall:** Blindly choosing Option B without verifying domain overlap.
    **The Rationale:** Candidates perform the arithmetic perfectly but ignore that pre-annotation quality varies by domain. A generic model pre-annotating specialized data may slow labelers down.
    **The Consequence:** Wasting $30K on a useless model and dragging human labeling throughput below the manual baseline, resulting in less data overall.
  napkin_math: |
    - **Option A:** $\$150\text{K} / \$25\text{/hr} = 6,000\text{ hrs} \times 30\text{ imgs/hr} = 180,000\text{ imgs}$.
    - **Option B:** $(\$150\text{K} - \$30\text{K}) / \$25\text{/hr} = 4,800\text{ hrs} \times 100\text{ imgs/hr} = 480,000\text{ imgs}$.
    - **Result:** **Option B yields 2.67x more labeled data**, assuming pre-annotation quality holds.
