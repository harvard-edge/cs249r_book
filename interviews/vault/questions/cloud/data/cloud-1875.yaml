title: Evaluating Global vs. Shard-Level Shuffling for 10TB LLM Training
scenario: You are architecting the data pipeline for a 175B LLM trained on a 10TB dataset stored in S3. The cluster has 1024 GPUs. You must evaluate the trade-offs between implementing true global shuffling via a central metadata service versus shard-level shuffling with 2GB shards and a 20GB local worker buffer.
question: Which shuffling design would you choose for the 10TB S3 dataset on 1024 GPUs, and why?
details:
  realistic_solution: 'Adopt shard-level shuffling. Pre-chunk the dataset into 2GB shards for sequential S3 reads (maximizing bandwidth), and use a 20GB local buffer per worker to shuffle samples across 10 cached shards, providing sufficient pseudo-randomness without I/O bottlenecks.'
  common_mistake: |
    **The Pitfall:** Prioritizing perfect statistical randomness over I/O throughput.
    **The Rationale:** Candidates assume true global shuffling is strictly required for SGD convergence, accepting the massive latency penalty of random object storage reads.
    **The Consequence:** Severe GPU starvation and vastly inflated training times due to network I/O blocking.
  napkin_math: |
    **Assumptions & Constraints:**
    - S3 Sequential Read: ~100 MB/s.
    - S3 Random Read Latency (TTFB): ~50 ms per sample.
    - Batch size per worker: 4096 samples (100 KB each).

    **Calculations:**
    - Global Shuffling (Random Reads): 4096 * 50 ms = ~204 seconds of latency per batch.
    - Shard Shuffling (Sequential Reads): 4096 * 100 KB = 409 MB. 409 MB / 100 MB/s = ~4 seconds.
    - Latency multiplier: 204 / 4 = 51x slower.

    **Conclusion & Interpretation:**
    - **Result: 51x Slower (I/O-Bound)**. True global shuffling incurs a 50x latency penalty due to S3's TTFB. Shard-level shuffling keeps GPUs fed while providing sufficient pseudo-randomness for convergence.
