title: Calculating GPU Feeding Tax for Distributed Vision Training
scenario: You are training a vision model on a single node with 8x GPUs. Profiling shows each GPU can process 1,000 images per second during the forward/backward pass. The average size of a preprocessed training image is 150 KB. The dataset is hosted on a Network Attached Storage (NAS) system with a maximum effective read bandwidth of 800 MB/s to your compute node.
question: What is the feeding tax when 8 GPUs demand 1.2 GB/s of images but the NAS supplies only 800 MB/s?
details:
  realistic_solution: 'First, calculate the aggregate data demand of the compute cluster: 8 GPUs * 1,000 images/sec * 150 KB = 1.2 GB/s required. Since the NAS only provides an effective 800 MB/s, the system is strictly I/O bound. The GPU utilization is the ratio of supply to demand (800 / 1200 = 66.7%). The feeding tax is the remaining idle time, which is 33.3%.'
  common_mistake: |
    **The Pitfall:** Assuming GPUs will run at 100% utilization or focusing purely on theoretical network bandwidth.
    **The Rationale:** Candidates compare network link speeds rather than actual effective I/O supply against aggregate compute demand.
    **The Consequence:** Failing to accurately quantify the idle time resulting from data starvation.
  napkin_math: |
    **Assumptions & Constraints:**
    - 8 GPUs processing 1000 img/s each.
    - Image size: 150 KB.
    - NAS Supply: 800 MB/s.

    **Calculations:**
    - Compute Demand: 8 * 1000 * 150 KB = 1.2 GB/s.
    - Supply vs Demand: 800 MB/s / 1200 MB/s = 66.7% utilization.
    - Feeding Tax: 100% - 66.7% = 33.3%.

    **Conclusion & Interpretation:**
    - **Result: 33.3% (I/O-Bound)**. The GPUs spend 33.3% of their time idle waiting for data from the NAS.
