title: 'Online vs Offline Feature Store Consistency Tradeoffs'
scenario: 'Your recommendation model uses 200 features: 50 real-time user features (updated every 5s) in an online Redis store, and 150 batch-computed item features (updated nightly) in Hive. You serve 50K requests/second with a 20ms SLO. You observe 0.8% of requests return stale batch features >24h old.'
question: 'Why are 0.8% of recommendation requests serving >24h-stale batch features, and how would you detect and mitigate that?'
details:
  realistic_solution: 'Add feature freshness metadata: each feature row includes a `written_at` timestamp. The serving layer checks staleness on read; if stale > threshold, use feature defaults or a lightweight real-time fallback (e.g., category-level average from a fast lookup table). Add SLA alerts: page on-call if batch pipeline doesn''t complete within 2h of its scheduled time. Implement materialization health checks before promoting new feature values.'
  common_mistake: |
    **The Pitfall:** Assuming the nightly batch pipeline reliably completes and writes to the online store before traffic resumes.
    **The Rationale:** Treating data pipelines as deterministic infrastructure without accounting for compute cluster overload or schema delays.
    **The Consequence:** The online store silently serves outdated features indefinitely, degrading model quality and costing revenue without triggering any system alerts.
  napkin_math: |
    **Assumptions & Constraints:**
    - 50K RPS, 20ms SLO. 0.8% stale requests.
    - Redis Latency: 0.1ms for a 200-feature hash get.

    **Calculations:**
    - Stale Volume: 50K RPS * 0.8% = 400 stale requests/second.
    - Revenue Impact: 400 RPS * 2% CTR drop * $0.002/click * 86,400s = ~$1,382/day lost.
    - Concurrency: At 50,000 ops/sec with 0.1ms latency, need ~5 concurrent connections.

    **Conclusion & Interpretation:**
    - **Result: 5 concurrent connections (Latency-Bound)**. Redis easily handles the throughput, allowing for strict staleness checks on every request without violating the 20ms SLO.
