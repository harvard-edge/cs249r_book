title: MI300X Throughput Stalls and Checkpoint I/O
scenario: A cluster of 64 MI300X nodes (8 GPUs each) is training an LLM. Training throughput stalls to
  0 for 10 seconds every exactly 5 minutes.
question: Evaluate whether this periodic stall is caused by the global data shuffling pipeline or an implicit
  checkpointing configuration.
details:
  realistic_solution: A 10-second total global stall exactly every 5 minutes points to blocking I/O operations,
    such as periodic snapshotting to slow persistent storage. Data shuffling bottlenecks manifest as sustained
    lower throughput or micro-stalls, not perfect 0-throughput cliffs at regular intervals.
  common_mistake: '**The Pitfall:** Diagnosing a perfect interval-based hardware pause as a dynamic networking
    or data ingestion issue.

    **The Rationale:** Engineers look at zero throughput and assume a fabric switch dropped or a data
    loader starved, missing the obvious periodic temporal signature.

    **The Consequence:** Weeks are spent profiling network fabrics when the actual culprit is a basic
    blocking cron job or synchronous save.

    '
  napkin_math: '**Assumptions & Constraints:**

    None.

    **Calculations:**

    - **Temporal Signature:** 300s interval × exactly 0% utilization.

    - **Deduction:** Dynamic bottlenecks (network congestion, slow disks) cause fluctuating low throughput.
    Only a programmed synchronization barrier or blocking I/O (like a checkpoint save) causes a perfect,
    repeating 0% cliff.

    - **Conclusion:** **The exact 5-minute cadence definitively points to a synchronous checkpointing
    process.**


    **Conclusion & Interpretation:**

    See calculations above.'
