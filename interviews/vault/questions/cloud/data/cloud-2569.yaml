title: Shared vs Language-Specific Tokenizers for a 50-Language LLM
scenario: 'Your multilingual LLM serves users in 50 languages. You must choose between: (A) a single 256K-token BPE vocabulary trained on all languages, or (B) language-specific tokenizers (32K each) with a router.'
question: For a 50-language LLM, what are the systems trade-offs between one 256K BPE vocabulary and language-specific 32K tokenizers?
details:
  realistic_solution: |
    Option A, a single 256K vocabulary, gives one tokenizer/model interface, one embedding and softmax vocabulary, and simple mixed-language batching. Its downside is that some languages may tokenize inefficiently, increasing sequence length and training/inference tokens for underrepresented scripts. Option B, language-specific 32K tokenizers, can improve per-language compression and sequence length, but it adds a language router, tokenizer-specific preprocessing, harder evaluation/debugging, and fragmented serving batches. It does not inherently require 50 independent prediction heads or 50 separate embedding tables unless the architecture chooses separate vocabularies or models. A practical compromise is usually a shared multilingual vocabulary, possibly larger or balanced with better sampling for low-resource languages, rather than fully separate serving paths.
  common_mistake: |
    **The Pitfall:** Optimizing purely for tokenizer compression efficiency per language in isolation.
    **The Rationale:** Language-specific BPE models can reduce sequence length for individual languages, but tokenizer compression is only one part of the end-to-end system.
    **The Consequence:** The team may create router and batching fragmentation, inconsistent token IDs, and operational complexity that erase the gains from shorter per-language sequences.
  napkin_math: |
    **Assumptions & Constraints:**
    - Embedding Dimension: 4096.
    - Precision: BF16 (2 bytes/param).
    - Option A: one shared 256K vocabulary.
    - Option B: 50 language-specific 32K vocabularies.

    **Calculations:**
    - Shared 256K embedding matrix: 256,000 * 4096 * 2 bytes = ~2.1 GB.
    - One 32K tokenizer's embedding-sized vocabulary slice: 32,000 * 4096 * 2 bytes = ~262 MB.
    - If 50 language vocabularies are represented as disjoint IDs in one shared model, the union is 1.6M tokens and the embedding-sized matrix is 1,600,000 * 4096 * 2 bytes = ~13.1 GB.
    - If the model reuses the same 32K IDs across languages, the parameter count need not grow that way, but requests must carry tokenizer/language context and batching becomes fragmented by tokenizer.

    **Conclusion & Interpretation:**
    - **Result: Systems-Trade-off Bound**. A shared vocabulary is operationally simpler and batches cleanly; language-specific tokenizers can shorten sequences but add router, batching, and model-interface complexity. The memory penalty appears only if the architecture uses disjoint vocabularies or separate heads/models.
