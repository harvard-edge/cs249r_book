title: The Connected Components Problem in Fuzzy Deduplication
scenario: 'After running MinHash LSH deduplication on your 5 billion document corpus, you have 800 million candidate pairs of near-duplicate documents. Now you must decide which documents to keep and which to remove. A colleague proposes: for each pair, keep the longer document and remove the shorter one. After running this, you discover you only removed 200 million documents, but manual inspection shows there are clusters of 50-100 near-identical documents. The pairwise approach only removed one document per pair, leaving 49 duplicates in each cluster.'
question: How do you efficiently resolve this at the scale of 800M edges over 5B nodes?
details:
  realistic_solution: This is a connected components problem on a sparse graph with 5B possible document nodes and 800M candidate-pair edges. Treat each verified near-duplicate pair as an undirected edge, compute connected components with a distributed algorithm such as Hash-to-Min, alternating large-star/small-star, or GraphX-style label propagation, and then keep the highest-quality representative in each component. Do not remove documents greedily per pair; that misses transitive duplicate clusters. In each iteration, emit both edge directions plus the current component label, update each touched node to the minimum label it can reach, and continue until no labels change or a bounded convergence criterion is met. The number of iterations depends on graph diameter and algorithm choice, not a universal log(diameter) rule. After convergence, group by component id and select the top document by quality score, length, source priority, or freshness.
  common_mistake: |
    **The Pitfall:** Proposing to run the pairwise dedup iteratively until no more duplicates are found.
    **The Rationale:** Candidates fail to recognize that iterative pairwise dedup is O(k) iterations (k=max cluster size), requiring full comparisons each time.
    **The Consequence:** An astronomical 64B pair comparisons, wasting massive compute resources instead of using efficient connected components.
  napkin_math: |
    **Assumptions & Constraints:**
    - 5B possible nodes, 800M undirected verified near-duplicate edges.
    - Each iteration emits both directions: 1.6B directed edge messages.
    - Approximate serialized message size: 16 bytes for source/label ids, before framework overhead.

    **Calculations:**
    - Per iteration shuffle lower bound = 1.6B directed messages * 16 bytes = 25.6 GB.
    - With 10 iterations, lower-bound shuffle volume = 25.6 GB * 10 = 256 GB.
    - With 3x framework overhead for keys, values, sorting, and spill, planned shuffle can be on the order of 0.75 TB.
    - Wall-clock time is driven by shuffle stages, skew, stragglers, and convergence checks, not the raw network lower bound alone.

    **Conclusion & Interpretation:**
    - **Result: Graph-Processing-Bound**. The candidate pairs define graph edges; distributed connected components resolves transitive duplicate clusters, then a per-component ranking step keeps one representative.
