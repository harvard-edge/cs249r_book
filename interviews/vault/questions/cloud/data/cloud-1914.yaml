title: Diagnosing I/O Bottlenecks in Stochastic Data Loading
scenario: You are training a large vision model on an 8xA100 node. The training data consists of 50 million high-resolution images stored on a local NVMe RAID array. Despite the storage array being capable of 25 GB/s sequential reads, your data loading pipeline is only achieving 2 GB/s, starving the GPUs.
question: System profiling shows high CPU I/O wait times and near-zero page cache hit rates. You are using standard PyTorch Datasets reading individual files with `shuffle=True`. What is causing this I/O bottleneck, and how would you fix it?
details:
  realistic_solution: |
    The bottleneck is the fundamental violation of spatial locality caused by stochastic data sampling, which renders OS readahead and page caching completely ineffective. The solution is to pre-shuffle data into contiguous coarse-grained chunks (e.g., using WebDataset or TFRecords format) to convert highly random, small I/O requests into massive sequential reads.
  common_mistake: |
    **The Pitfall:** Assuming the storage hardware is failing or adding more data loader workers will fix the issue.
    **The Rationale:** Engineers often try to scale read throughput by brute-forcing CPU threads without addressing the underlying disk access pattern.
    **The Consequence:** The GPUs remain starved, CPU I/O wait maxes out, and hardware investments in high-speed NVMe are wasted.
  napkin_math: |
    1. **Assumptions & Constraints:** NVMe RAID with 25 GB/s sequential limit. Stochastic sampling of 50M individual small files.
    2. **Calculations:** Randomly reading small files incurs massive OS metadata overhead and read-ahead misses, bottlenecking at IOPS limits (~2 GB/s). Chunking into 100MB shards (e.g., WebDataset) changes access to sequential. 100MB sequential reads bypass IOPS limits and approach the 25 GB/s hardware limit.
    3. **Conclusion & Interpretation:** **Result: Chunking yields ~25 GB/s, fully satisfying GPU starvation. IOPS-Bound due to random file access.**
