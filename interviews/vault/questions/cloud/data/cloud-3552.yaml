title: Optimizing Data Ingestion for H100-Powered Foundation Model Training
scenario: Your team is developing a multimodal foundation model requiring petabytes of training data. Currently, the raw data is stored as plain JSON files in cloud object storage. The data scientists report that the GPUs are spending more than 70% of their time waiting for data, drastically slowing down training iterations.
question: How would you redesign JSON-based storage and ingestion so H100s no longer spend 70% of training time waiting for data?
details:
  realistic_solution: 'The solution involves migrating from plain JSON to a columnar storage format like Parquet or Apache ORC, which are optimized for read performance, compression, and predicate pushdown. For TensorFlow-specific pipelines, TFRecord could also be considered. Implement aggressive but intelligent compression (e.g., Zstandard or Snappy) to reduce data transfer size, balancing CPU decompression overhead with network/disk I/O savings. The data should be partitioned strategically (e.g., by time, ID, or other relevant metadata) to allow training jobs to read only necessary subsets, reducing scan times. Consider a multi-tiered storage approach: ''hot'' training data that''s frequently accessed could reside on a higher-performance cloud storage tier or be pre-cached on local NVMe SSDs attached to the H100 instances, while ''cold'' historical data can remain on cheaper, archival object storage. Data streaming and asynchronous I/O should be leveraged to ensure continuous data flow to the H100''s HBM3 memory, minimizing idle cycles.'
  common_mistake: |
    **The Pitfall:** Sticking to simple row-oriented formats like JSON.
    **The Rationale:** Data engineers underestimate the I/O demands required to keep 989 TFLOPS dense compute units fed.
    **The Consequence:** Bottlenecking the H100, leaving expensive hardware drastically underutilized.
  napkin_math: |
    **Assumptions & Constraints:**
    - 100 GB batch size, 3.35 TB/s HBM bandwidth (H100)
    - 5 GB/s effective network throughput, 20 GB/s throughput for Parquet (5x compression)

    **Calculations:**
    - JSON Load Time = 100 GB / 5 GB/s = 20 seconds
    - Optimized Columnar Time = 20 GB / 20 GB/s = 1 second

    **Conclusion & Interpretation:**
    - **Result: 1 second (I/O-Bound)**. Mitigated. Load times drop from 20s to 1s, shifting the bottleneck back to compute.
