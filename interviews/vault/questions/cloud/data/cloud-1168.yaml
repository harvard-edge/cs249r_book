title: Evaluating Dynamic Benchmarks for Code Generation
scenario: You are evaluating 70B parameter LLMs for a cloud code generation API running on 8x H100 GPUs. Your static benchmark of 10,000 Python tasks is saturated (current model scores 92%, candidate B scores 98%). However, in a canary release, Model B's acceptance rate drops by 15%. You suspect benchmark leakage and distribution shift. Evaluate an architecture for a dynamic benchmarking system that samples 1,000 novel production queries daily.
question: How would you design the daily dynamic benchmark, and why use hybrid LLM-as-judge plus 5% HITL instead of pure HITL?
details:
  realistic_solution: 'Implement a hybrid dynamic benchmarking pipeline. Route 95% of the 1,000 daily sampled queries to an LLM-as-a-judge and 5% to expert human annotators for judge alignment and calibration, ensuring benchmark freshness while optimizing budget.'
  common_mistake: |
    **The Pitfall:** Relying on obfuscated static benchmarks or continuously scraping newer GitHub repositories.
    **The Rationale:** Candidates assume static benchmarks can avoid Goodhart's law, failing to realize new training sets will inevitably leak test data.
    **The Consequence:** Model selection optimizes for the benchmark rather than actual shifting production user intent.
  napkin_math: |
    **Assumptions & Constraints:**
    - 1,000 prompts/day. Pure HITL ($5/prompt)
    - LLM Judge ($0.02/prompt) with 5% HITL calibration

    **Calculations:**
    - Pure HITL = 1,000 * $5 = $5,000/day ($1.82M/yr)
    - Hybrid = (950 * $0.02) + (50 * $5) = $19 + $250 = $269/day (~$98K/yr)

    **Conclusion & Interpretation:**
    - **Result: ~$98K/yr (Cost-Bound)**. OpEx. The hybrid architecture yields a ~95% cost reduction while maintaining a statistically significant daily human anchor.
