title: Why Raw Agreement Percentage Misleads
scenario: Two labelers agree on 90% of 1,000 binary classification labels. A manager claims this is 'excellent agreement.'
question: Why is 90% raw labeler agreement insufficient on its own, and what metric should be used to prove true inter-rater reliability?
details:
  realistic_solution: 'Raw agreement percentage ignores chance agreement. If 95% of samples are class A, two labelers randomly guessing would agree 90.5% of the time. Cohen''s Kappa (κ) corrects for this: κ = (observed - chance) / (1 - chance). Always report κ alongside raw agreement.'
  common_mistake: |
    **The Pitfall:** Reporting raw agreement without applying a chance correction.
    **The Rationale:** Candidates fail to understand that highly imbalanced datasets will naturally produce high raw agreement purely by random guessing.
    **The Consequence:** Falsely validating low-quality labelers and polluting the training pipeline with bad data.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Total samples: 1,000.
       - Observed Agreement: 90% (0.90).
       - Imbalanced Class Distribution: Assume 95% Class A, 5% Class B.
    2. **Calculations:**
       - Chance Agreement = 0.95² + 0.05² = 0.9025 + 0.0025 = 0.905 (90.5%).
       - Cohen's Kappa (κ) = (Observed - Chance) / (1 - Chance) = (0.90 - 0.905) / (1 - 0.905) = -0.005 / 0.095 ≈ -0.053.
    3. **Conclusion & Interpretation:** **A negative Kappa (κ ≈ -0.053) indicates the agreement is slightly worse than random chance, completely invalidating the 90% claim.**
