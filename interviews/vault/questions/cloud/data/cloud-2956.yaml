title: 'Dataset Curation: Evaluate Deduplication Strategies for Pre-Training Data Quality'
scenario: 'You compare two deduplication strategies for a 20TB pre-training dataset on a 128-GPU cluster: (A) exact URL dedup only, (B) MinHash near-dedup at 0.8 Jaccard similarity threshold. Strategy A takes 2 hours, B takes 18 hours.'
question: 'Should the 20 TB pre-training dataset use exact URL dedup or 0.8-Jaccard MinHash near-dedup, given quality and runtime tradeoffs?'
details:
  realistic_solution: 'Exact URL dedup misses content-level duplicates (e.g., same article scraped from different URLs). MinHash near-dedup mathematically captures semantic overlaps. Train two small 1B proxy models and evaluate on MMLU. The quality difference strongly justifies the 16-hour overhead on a multi-week training run.'
  common_mistake: |
    **The Pitfall:** Choosing exact URL dedup purely to save 16 hours of preprocessing time.
    **The Rationale:** Over-optimizing for immediate data pipeline speed without considering the aggregate cost of training.
    **The Consequence:** Training a deeply flawed model that overfits or memorizes identical content from different URLs, wasting a massive GPU training budget.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Hardware: 128 GPUs at ~$3/hr.
       - Dataset: 20TB. Total Training Time: ~336 hours (2 weeks).
       - Dedup Overhead: B (18h) vs A (2h) = 16h difference.
    2. **Calculations:**
       - Relative Pipeline Cost: 16h / 336h = 4.8% of total run time.
       - Financial Overhead: 128 GPUs × $3/hr × 16h = $6,144.
    3. **Conclusion & Interpretation:**
       - **Result: Quality-Bound. The $6,144 cost of semantic deduplication is negligible compared to the multi-million dollar training run. The downstream quality gains easily justify a 4.8% pipeline time cost.**
