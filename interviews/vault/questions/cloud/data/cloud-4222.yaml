title: Storage Format Selection for Multimodal Datasets
scenario: A multimodal pipeline ingests text, images, audio, and metadata across 50M samples (80 TB). You are evaluating Parquet/TFRecord, WebDataset tar shards, and Lance for storage.
question: How would you compare separate modality files, WebDataset tar shards, and Lance for the 80 TB multimodal dataset on throughput, storage, and ops complexity?
details:
  realistic_solution: 'Analysis: (1) Separate modality files: keep text/metadata in a columnar format and images/audio in media-appropriate shard files. Pro: each modality can be compressed, updated, and versioned independently. Con: every multimodal batch needs a reliable manifest, join keys, and loader coordination; misalignment becomes an operational risk. (2) WebDataset tar shards: group all modalities for a sample in the same shard. Pro: simple high-throughput streaming and atomic sample retrieval for full multimodal training. Con: text-only or image-only jobs may still scan or skip through shards unless side indexes are maintained, and changing one modality often rewrites whole shards. (3) Lance: columnar ML format with variable-length binary support, versioning, random access, and column projection. Pro: good for modality-selective reads and mixed workloads. Con: newer ecosystem and operational learning curve. Winner depends on access pattern: WebDataset for mostly full-sample streaming,
    Lance for selective reads and random access, separate files when modality evolution matters most.'
  common_mistake: |
    **The Pitfall:** Optimizing only for per-modality storage while ignoring sample alignment and update patterns.
    **The Rationale:** Separate files look efficient because text, images, and audio can each use the best codec and layout.
    **The Consequence:** Training loaders inherit a distributed join problem: stale manifests, missing modalities, and shard rewrites can dominate the operational cost.
  napkin_math: |
    **Assumptions & Constraints:**
    - 80 TB multimodal dataset.
    - Text plus metadata account for about 5 TB.
    - Most training jobs are either text-only or full multimodal.

    **Calculations:**
    - Separate files: text-only reads about 5 TB, but full multimodal training opens multiple streams and joins by sample id.
    - WebDataset: full multimodal training streams near-sequential 80 TB shards with simple sample assembly; text-only jobs need side indexes or they may scan/skip through much larger shards.
    - Lance: text-only jobs project the text columns, around 5 TB plus metadata; multimodal jobs still read the selected image/audio/text columns, up to the full 80 TB when all modalities are needed.
    - Storage tradeoff: separate files maximize codec choice; WebDataset minimizes loader complexity; Lance pays ecosystem risk for projection, versioning, and random access.

    **Conclusion & Interpretation:**
    - **Result: access-pattern-bound.** WebDataset wins for simple full-sample streaming, Lance is strongest for selective or mixed reads, and separate files are best when independent modality updates outweigh join complexity.
