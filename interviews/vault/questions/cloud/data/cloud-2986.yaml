title: 'Feature Store: Specification — Define Feature Freshness SLA for Real-Time Fraud Detection'
scenario: 'You are writing the feature freshness specification for a fraud detection system serving 50K transactions/second. Different features have different freshness requirements: real-time (last 5 min), near-real-time (last 1 hour), and batch (last 24 hours).'
question: What feature freshness SLAs, latency budgets, and monitoring would you set for the 50K TPS fraud system's three feature tiers?
details:
  realistic_solution: 'Freshness SLA is the maximum allowed age of a feature value at serving time, including event ingestion lag, computation lag, storage propagation, and cache TTL. Use three explicit fraud tiers: real-time features over the last 5 minutes served from streaming state, near-real-time features over the last 1 hour served from micro-batch or streaming aggregates, and batch features over the last 24 hours served from the offline/online feature store. Monitor freshness age, missing-feature rate, and p99 feature lookup latency per tier.'
  common_mistake: |
    **The Pitfall:** Setting the same freshness SLA for all features regardless of velocity.
    **The Rationale:** Candidates overlook that pipeline latency adds to staleness, and computing all features in real-time creates unnecessary, massive infrastructure costs.
    **The Consequence:** Infrastructure budgets explode while failing to deliver on critical latency budgets for the highest-impact real-time features.
  napkin_math: |
    **Assumptions & Constraints:**
    - 50K TPS fraud system.
    - Tier 1: real-time features over the last 5 minutes.
    - Tier 2: near-real-time features over the last 1 hour.
    - Tier 3: batch features over the last 24 hours.
    - Freshness age = ingestion lag + compute lag + storage propagation + cache TTL.

    **Calculations:**
    - Tier 1 SLA: p99 freshness <= 5 minutes; lookup latency budget <= 10ms; alert if p99 freshness exceeds 4 minutes for 5 minutes.
    - Tier 2 SLA: p99 freshness <= 1 hour; lookup latency budget <= 20ms; alert if p99 freshness exceeds 50 minutes.
    - Tier 3 SLA: p99 freshness <= 24 hours; lookup latency budget <= 50ms; alert if latest successful batch is older than 22 hours.
    - Monitoring per tier: freshness histogram, stale-read rate, missing-feature rate, event-lag, compute-lag, storage-write lag, and cache age.

    **Conclusion & Interpretation:**
    - **Result: tiered freshness SLAs aligned to 5-minute, 1-hour, and 24-hour feature buckets.** The spec avoids an unsupported cost claim and makes each tier measurable.
