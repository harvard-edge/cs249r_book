title: Calculating Disparate Impact in Cloud Loan APIs
scenario: A cloud-based loan approval API processes 100,000 applications daily. Monitoring metrics show 60,000 applicants are from a privileged demographic (Group A) and 40,000 from an unprivileged demographic (Group B). The model approves 18,000 applications from Group A and 8,000 from Group B.
question: What is the Disparate Impact Ratio for Group B versus Group A, and does it violate the standard four-fifths (80%) fairness rule?
details:
  realistic_solution: First, calculate the specific approval rate for each group independently. Group A has a 30% approval rate, while Group B has a 20% approval rate. Then, divide the unprivileged rate by the privileged rate. The resulting DIR is approximately 0.667, which falls below the 0.8 threshold, indicating disparate impact.
  common_mistake: |
    **The Pitfall:** Calculating the ratio of total approved applications between groups (8,000 / 18,000) or absolute risk difference.
    **The Rationale:** Candidates fail to normalize the approvals by the size of the respective demographic pools to find the actual approval rates.
    **The Consequence:** Incorrectly assessing model fairness, potentially exposing the company to regulatory penalties or deploying biased models.
  napkin_math: |
    - Group A Approval Rate: 18,000 / 60,000 = 0.30 (30%).
    - Group B Approval Rate: 8,000 / 40,000 = 0.20 (20%).
    - Disparate Impact Ratio (DIR): Rate_B / Rate_A = 0.20 / 0.30 = 0.667.
    - **0.667 < 0.80, so the model violates the four-fifths rule and exhibits disparate impact.**
