title: The Feature Freshness vs Cost Tradeoff
scenario: 'Your e-commerce recommendation system uses 300 features. The ML team wants all features computed in real time for maximum freshness. The infra team pushes back: the streaming infrastructure to compute 300 features in real time for 50M daily active users would cost $2M/year.'
question: How would you tier the 300 features to capture 90% of freshness value at about 20% of the $2M/year real-time cost?
details:
  realistic_solution: 'Tier features by staleness tolerance: **Tier 1 — Static (daily batch, ~$50K/yr):** User demographics, account age, device type. ~100 features. Updated nightly. **Tier 2 — Near-real-time (hourly micro-batch, ~$150K/yr):** Session-level aggregates, daily spend, category affinities. ~150 features. Updated every 1-4 hours via Spark micro-batches. **Tier 3 — Real-time (streaming, ~$200K/yr):** Cart contents, last-click item, session duration, fraud velocity signals. ~50 features. Updated sub-second via Flink. Total: $400K/yr vs $2M/yr (80% savings). The 50 real-time features capture the behavioral signals that decay fastest, delivering ~90% of the freshness-sensitive lift.'
  common_mistake: |
    **The Pitfall:** Treating all features as equally time-sensitive.
    **The Rationale:** Data scientists often demand maximum freshness for all features purely to simplify the pipeline architecture.
    **The Consequence:** Engineering spends millions computing static features (like 'user_age_bucket') in real-time streaming engines.
  napkin_math: |
    **Assumptions & Constraints:**
    - Baseline Cost: 300 real-time features = $2,000,000/year.
    - Tier 1 (Static): 100 features.
    - Tier 2 (Near-Real-Time): 150 features.
    - Tier 3 (Real-Time): 50 highly volatile features.

    **Calculations:**
    - Tier 1 Cost: updated via daily batch = $50,000/yr.
    - Tier 2 Cost: updated via hourly micro-batch = $150,000/yr.
    - Tier 3 Cost: updated via streaming = $200,000/yr.
    - Optimized Total: $50K + $150K + $200K = $400,000/yr.

    **Conclusion & Interpretation:**
    - **Result: $400,000/yr (Cost-Bound)**. Tiering features effectively reduces the compute cost to exactly 20% of the baseline while retaining ~90% of the freshness value.
