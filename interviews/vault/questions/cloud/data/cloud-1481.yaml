title: Diagnosing Annotation Degradation in Data Pipelines
scenario: Your team operates a cloud-based content moderation model processing 50M images/day on a cluster of 64 GPUs. Over the last 4 months, the model's production F1-score has systematically degraded from 0.92 to 0.85. Your ML Ops dashboard shows that input feature distributions (measured via KS-tests on ResNet embeddings) and class prior probabilities P(Y) have remained strictly stable. The weekly active learning pipeline sends 100K low-confidence images to a third-party vendor for manual annotation to continuously fine-tune the model. The vendor recently switched to a new tier of annotators to reduce their internal costs by 40%, dropping average time-per-label from 15s to 6s.
question: How do you systematically root-cause the F1 drop, and which metrics would prove label quality drift?
details:
  realistic_solution: Diagnose Label Quality Drift by secretly injecting a Golden Dataset (e.g., 2,000 expertly labeled, static samples) into the vendor's weekly 100K batch. Measure agreement against gold labels plus Inter-Annotator Agreement (IAA) using Cohen's Kappa or Krippendorff's Alpha. If the new annotator tier shows materially higher error rates and lower agreement while feature and class-prior drift remain stable, the evidence points to label quality drift; fix the vendor QA loop rather than assuming more noisy labels will recover F1.
  common_mistake: |
    **The Pitfall:** Assuming silent feature drift or catastrophic forgetting.
    **The Rationale:** Candidates immediately look for complex algorithmic causes for performance drops rather than data pipeline mechanics.
    **The Consequence:** They tweak hyperparameters or apply domain adaptation unnecessarily, completely missing that the new annotator tier degraded the labels.
  napkin_math: |
    **Assumptions & Constraints:**
    - F1-score dropped from 0.92 to 0.85.
    - Weekly labels: 100K.
    - Golden-set audit estimates annotator error and agreement; F1 is not directly derivable from label count alone.
    - A symmetric-noise sample-complexity formula can be used only as a directional proxy: multiplier ≈ 1 / (1 - 2e)².

    **Calculations:**
    - Original audit error rate (e=5%): 1 / (1 - 0.10)² = 1.23x base scale.
    - New audit error rate (e=20%): 1 / (1 - 0.40)² = 2.78x base scale.
    - Directional signal loss: 2.78 / 1.23 ≈ 2.25x more samples would be needed under this simplified noise model.
    - This does not prove that 225K labels/week restores F1; it shows that the cheaper labels can erase their apparent cost advantage unless label QA improves.

    **Conclusion & Interpretation:**
    - **Result: Data-Quality Bound.** Prove label quality drift with gold-label error rate, IAA/kappa decline, disagreement concentration by annotator, and stable feature/prior drift metrics; prioritize cleaner labels and vendor controls over scaling noisy annotation volume.
