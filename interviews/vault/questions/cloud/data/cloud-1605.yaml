title: Cloud API Model Inversion Vulnerability
scenario: A cloud-hosted biometric authentication API serves a 50M parameter Vision Transformer at 1,000 QPS. The API returns the predicted identity along with an FP32 confidence score for the top-5 matches. A security audit reveals that an attacker is reconstructing recognizable faces of private users by querying the API roughly 50,000 times per target identity.
question: What API design flaw enables the 50,000-query face reconstruction attack, and how would you mitigate it without retraining?
details:
  realistic_solution: The root cause is exposing high-precision confidence or logit-like scores for the top-5 identities. Those FP32 values provide a smooth signal for numerical gradient estimation. Without retraining, suppress scores for untrusted callers or return only coarse probability buckets with rate limits and monitoring. The API can still return the accepted identity or decision, but it should not expose precise confidence vectors externally.
  common_mistake: |
    **The Pitfall:** Assuming the attack is membership inference or that limiting to top-5 outputs is safe.
    **The Rationale:** Engineers overlook that high-precision continuous confidence scores allow for numerical gradient estimation.
    **The Consequence:** Attackers can reverse-engineer private data using optimization algorithms.
  napkin_math: |
    **Assumptions & Constraints:**
    - Finite differences require ~1,024 queries per gradient step.
    - Attack requires ~50 optimization steps.

    **Calculations:**
    - 1,024 queries/step * 50 steps = 51,200 queries.
    - FP32 confidence scores expose a smooth signal that supports finite-difference optimization.
    - Coarse buckets or suppressing scores reduce that signal, but an adaptive attacker may still extract information without rate limits and monitoring.

    **Conclusion & Interpretation:**
    - **Result: high-precision scores are the design flaw.** Remove precise confidence vectors for untrusted callers, prefer coarse buckets or labels only, and add rate limits and anomaly monitoring; rounding alone is risk reduction, not a complete guarantee.
