title: The GPU Cluster Utilization Mystery
scenario: 'Your team has a dedicated 64-GPU cluster. The cluster monitoring dashboard shows average GPU utilization of 35% over the past month. Engineers complain about long job queue times.'
question: 'How can GPUs be 65% idle while engineers wait 12 hours, and what scheduling changes would fix the cluster?'
details:
  realistic_solution: 'This is the classic fragmentation and allocation granularity problem. Root causes include temporal fragmentation (bursty submissions), checkpointing gaps (idle GPUs during I/O), and allocation granularity (requesting full nodes for 1-GPU jobs). Fixes include implementing fine-grained GPU scheduling (e.g., MIG or fractional allocation), gang scheduling for multi-GPU jobs, and preemption with backfill scheduling to slot small jobs into gaps.'
  common_mistake: |
    **The Pitfall:** Assuming low utilization means GPUs are sitting completely empty.
    **The Rationale:** Candidates assume that 35% utilization implies no jobs are running, failing to distinguish between allocated GPUs and effectively utilized GPUs.
    **The Consequence:** They might recommend buying fewer GPUs or blame engineers for not submitting jobs, entirely missing the scheduling fragmentation and allocation granularity issues.
  napkin_math: |
    **Assumptions & Constraints:**
    - Total capacity: 64 GPUs.
    - Effective utilization: 35%.
    - GPU Cost: ~$3/hr.

    **Calculations:**
    - Useful work: 64 * 0.35 = 22.4 GPU-equivalents.
    - Wasted cost: 64 * 0.65 idle * $3/hr * 720 hrs/month = ~$89,856/month in wasted idle GPU time.
    - Allocation efficiency: If an 8-GPU node is requested but only 3 are used, efficiency = 3/8 = 37.5%.

    **Conclusion & Interpretation:**
    - **Result: ~$90k/month wasted (Scheduling-Bound)**. ~$90k/month is wasted due to fragmentation and poor allocation scheduling, not lack of workload.
