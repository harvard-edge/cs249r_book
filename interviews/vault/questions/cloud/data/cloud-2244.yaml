title: The Missing Combiner in Distributed Aggregation
scenario: 'You are computing per-domain token counts across a 20 TB web corpus distributed over 500 nodes. Each node holds a 40 GB shard. The naive MapReduce approach emits (domain, 1) for every token and shuffles all pairs to reducers. The shuffle phase transfers 18 TB across the network and takes 3 hours. Your colleague points out that the final output is only 2 GB.'
question: Why is 18 TB moving across the network to produce a 2 GB result, and how do you fix it?
details:
  realistic_solution: |
    Add a combiner (local pre-aggregation) phase. Before shuffling, each of the 500 nodes locally aggregates its (domain, 1) pairs into (domain, local_count). The mathematical requirement is that the aggregation function must be associative and commutative (counts, sums, min, max).
  common_mistake: |
    **The Pitfall:** Assuming the shuffle must transfer all raw elements for same-key aggregation.
    **The Rationale:** Candidates forget that counting is associative and commutative, allowing for partial aggregation.
    **The Consequence:** Shuffling 18 TB of raw pairs instead of 100 GB of pre-aggregated counts, turning a 1-minute job into a 3-hour bottleneck.
  napkin_math: |
    **Assumptions & Constraints:**
    - 20 TB corpus, 500 nodes, 25 Gbps (3.125 GB/s) per node.
    - 10M domains, 20 bytes/record.

    **Calculations:**
    - Without combiner: 20 TB corpus * ~0.9 overhead = 18 TB shuffle. At 25 Gbps: 18 TB / (500 * 3.125 GB/s) = ~12 seconds (ideal) -> 3 hours real-world.
    - With combiner: 500 nodes * 10M domains * 20 bytes/record = 100 GB shuffle.
    - Same bandwidth: 100 GB / (500 * 3.125 GB/s) = 0.064 seconds.

    **Conclusion & Interpretation:**
    - **Result: 18 TB to 100 GB (Network-Bound)**. Adding a local combiner reduces the network shuffle volume from 18 TB to 100 GB, a 180x reduction.
