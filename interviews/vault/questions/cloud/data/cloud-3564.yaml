title: Optimizing LLM Training Data Efficiency on NVIDIA H100
scenario: You are designing a training pipeline for a 500B parameter model on a cluster of GPUs (989 TFLOPS FP16, 3.35 TB/s memory bandwidth). Your current data loading strategy involves pre-fetching an enormous dataset, but you are encountering the 'data wall problem' where GPU utilization is consistently below 50% due to I/O bottlenecks and redundant data processing.
question: How would you leverage data efficiency techniques to address I/O bottlenecks and optimize the Information-Compute Ratio (ICR)?
details:
  realistic_solution: Implement an intelligent data sampling strategy using coreset selection or active learning to identify the most informative data points for each training step. Utilize the high memory bandwidth to accelerate loading of these smaller, highly relevant data subsets. Employ a tiered storage approach with fast local SSDs for frequently accessed data. Explore synthetic data generation to offload real data processing.
  common_mistake: |
    **The Pitfall:** Focusing exclusively on model-centric optimizations like batch size tuning or mixed precision.
    **The Rationale:** The standard playbook for low utilization is to tweak PyTorch/CUDA parameters.
    **The Consequence:** The true bottleneck (data supply chain and I/O starvation) goes ignored, leaving massive amounts of expensive hardware idling while waiting for batches.
  napkin_math: |
    **Assumptions & Constraints:**
    - Peak GPU compute is 989 TFLOPS FP16.
    - Current utilization is 50% because batches arrive late.
    - A revised data policy could raise measured utilization to 90%, but only if profiling confirms I/O stalls are removed.

    **Calculations:**
    - Current utilized compute = 989 * 0.50 = 494.5 TFLOPS.
    - Target utilized compute = 989 * 0.90 = 890.1 TFLOPS.
    - Absolute gain = 890.1 - 494.5 = 395.6 TFLOPS.
    - Relative gain over current useful compute = 395.6 / 494.5 = 80%.
    - The utilization gain comes from reducing redundant samples and smoothing input delivery, not from an unsupported fixed bandwidth target.

    **Conclusion & Interpretation:**
    - **Result: A 50% to 90% utilization improvement is a 40 percentage-point gain, or 80% more useful compute than the current baseline.** Coreset and curriculum sampling should be justified by measured stall reduction and ICR improvement.
