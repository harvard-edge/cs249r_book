title: Diagnosing CTR Degradation Post-Peak Event
scenario: Your team deployed a deep learning recommendation model (DLRM) for an e-commerce platform on a fleet of 16 NVIDIA A100 GPUs. Over the last 3 weeks since the Black Friday sale ended, the model's p99 latency remains stable at 45ms, and throughput is steady at 15,000 QPS. However, the overall Click-Through Rate (CTR) has gradually degraded by 12% relative to the baseline. Engineering confirms no code changes, hardware failures, or latency regressions have occurred.
question: How do you diagnose the root cause of this silent failure?
details:
  realistic_solution: 'Diagnose the system entropy (data drift) by computing statistical metrics like the Population Stability Index (PSI) or Kullback-Leibler (KL) divergence between the static training dataset and the live inference queries. The post-event user behavior shifted, invalidating learned priors.'
  common_mistake: |
    **The Pitfall:** Focusing on infrastructure metrics or immediately retraining the model blindly.
    **The Rationale:** Candidates treat a CTR drop as a systems issue (latency/throughput) or apply a brute-force retrain.
    **The Consequence:** They fail to quantify which input feature distributions have shifted, leaving the root cause undiagnosed.
  napkin_math: |
    **Assumptions & Constraints:**
    - Base CTR: 2.0%. Degradation: 12%.
    - Traffic shift: 'sale-seeking' features drop from 30% to 5%.

    **Calculations:**
    - New CTR = 2.0 * (1 - 0.12) = 1.76%.
    - Absolute drift = 30% - 5% = 25%.
    - Population Stability Index (PSI) measures distribution shift; PSI > 0.2 indicates significant change.

    **Conclusion & Interpretation:**
    - **Result: 12% CTR drop driven by 25% feature drift (Distribution-Shift-Bound)**. Requiring retraining on post-event data.
