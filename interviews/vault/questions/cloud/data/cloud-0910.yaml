title: Diagnosing S3 Batch Ingestion Bottleneck
scenario: Your ML pipeline ingests 5TB of raw daily telemetry for a recommendation model. Data arrives as 100 million 50KB JSON files in an S3 bucket. A 20-node Spark cluster runs the daily batch job, but it takes over 10 hours and misses the 4-hour SLA. Worker CPU utilization remains below 10%, and network throughput is a fraction of capacity.
question: "How do you diagnose the root cause of this ingestion bottleneck?"
details:
  realistic_solution: 'Identify S3 API request limits and per-request latency as the bottleneck. Implement a compaction step to group the 50KB files into 128MB+ Parquet files before the main Spark ingestion.'
  common_mistake: |
    **The Pitfall:** Assuming the bottleneck is compute or network bandwidth.
    **The Rationale:** Candidates look at the large total volume (5TB) and instinctively scale up the cluster size.
    **The Consequence:** Scaling the cluster wastes money without fixing the small-file I/O overhead and API limits, leaving the pipeline broken.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 100M files, 50KB each (5TB total).
       - S3 prefix GET limit: ~5,500 requests/sec.
       - Spark cluster: 20 nodes, 8 cores each = 160 tasks.
    2. **Calculations:**
       - Minimum S3 API time: 100,000,000 / 5,500 = 18,181 seconds (~5.05 hours).
       - Network capacity vs usage: S3 latency per GET (e.g., 50ms) across 160 tasks restricts throughput regardless of 10Gbps pipes.
    3. **Conclusion & Interpretation:** **The 5.05-hour absolute minimum API time violates the 4-hour SLA before any compute happens. Result: I/O-Bound (API Limits).**
