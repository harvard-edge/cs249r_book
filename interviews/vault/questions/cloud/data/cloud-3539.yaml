title: Ensuring Data Integrity for Petabyte-Scale LLM Training on AMD MI300X Clusters
scenario: You are leading data engineering for an LLM training initiative on clusters of AMD MI300X accelerators. The system ingests petabytes of diverse, constantly evolving training data. Recent sporadic data quality issues (corrupted records, schema drift) have caused training job failures and convergence issues.
question: How would you design a continuous data quality framework for MI300X LLM training that handles schemas, contracts, gates, lineage, and anomalies?
details:
  realistic_solution: 'Implement a multi-layered, automated data quality framework:\n\n1. **Schema Validation & Data Contracts**: Enforce strict data contracts using descriptive schemas (e.g., Protobuf, Avro) at all data ingestion points. Utilize a centralized schema registry (e.g., Confluent Schema Registry, Apache Atlas) to manage schema versions, compatibility, and evolution. Integrate automated pre-ingestion validation pipelines to reject or quarantine data violating contracts before it enters the main data lake.\n\n2. **Quality Gates**: Establish configurable, automated quality gates at critical stages of the data pipeline (e.g., raw ingestion, pre-processing, feature engineering) using tools like Great Expectations or Deequ. These gates should define metrics (completeness, uniqueness, validity, consistency, distribution shifts) and thresholds, triggering alerts or pipeline halts upon breach. For high-volume data, sampling strategies with statistical guarantees can be employed.\n\n3. **Lineage Tracking**: Implement a comprehensive, automated data lineage system (e.g., OpenLineage, Apache Atlas) to track every transformation, dependency, and movement of data from its origin to its consumption by the LLM training on MI300X. This enables rapid root-cause analysis when data quality issues arise.\n\n4. **Anomaly Detection**: Deploy real-time anomaly detection models on key data distributions and metadata streams. This could involve statistical methods, unsupervised ML (e.g., Isolation Forests, autoencoders) or even leveraging small, specialized ML models. For example, continuously monitoring changes in token distributions, embedding space characteristics, or sudden shifts in data volume/velocity. While the MI300X''s primary role is LLM training, its compute capabilities can be utilized for accelerating anomaly detection inference on derived data statistics or sampled embeddings, if the latency and resource allocation allows.\n\n5. **Observability & Feedback Loop**: Integrate all quality metrics, validation results, and anomaly alerts into a centralized observability platform. Establish automated feedback loops that inform data providers of contract breaches and data consumers of potential quality degradation, enabling proactive resolution.'
  common_mistake: |
    **The Pitfall:** Over-relying on post-ingestion validation without sufficient pre-processing checks.
    **The Rationale:** Engineers underestimate the complexity of schema evolution in a multi-tenant platform and skip implementing strict data contracts at the ingestion boundary.
    **The Consequence:** Corrupted data enters the main data lake, causing downstream training failures and creating massive technical debt to clean up.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - MI300X has 192 GB HBM3 memory with a bandwidth of 5.3 TB/s.
    2. **Calculations:**
       - A full memory sweep takes 192 GB / 5.3 TB/s ≈ 36 ms.
       - Running lightweight isolation forest inference on a 10,000-token sample takes <5 ms.
    3. **Conclusion & Interpretation:**
       - **Anomaly detection creates negligible latency overhead (<5 ms) during multi-second training steps, making real-time validation highly viable.**
       - **Result: Compute-Bound**
