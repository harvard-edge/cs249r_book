title: Tiered Embedding Serving for 5ms P99 Lookups
scenario: You need to serve embedding lookups for a search system at 10 million queries per second. Each query requires lookups from 5 embedding tables, each with 1 billion rows and 256-dimensional FP16 embeddings. Total embedding size is 2.56 TB. The P99 latency SLA for the embedding lookup service is 5ms.
question: How would you design a 5ms-P99 embedding lookup service for 10M QPS over 2.56TB of embeddings?
details:
  realistic_solution: '**Architecture: Distributed embedding serving with hot-tier caching.** **(1) Storage tier analysis:** 2.56 TB total. Power-law access: top 0.1% of rows (1M per table = 5M total) serve 80% of queries = ~2.56 GB hot tier. Top 5% (50M per table = 250M total) serve about 99% of queries = ~128 GB warm tier. **(2) Hot tier (L1 — in-process memory):** Top 5M embeddings (2.56 GB) cached in each serving node''s RAM. Latency: ~0.1ms. Handles 80% of lookups. **(3) Warm tier (L2 — distributed cache):** Top 250M embeddings (128 GB) distributed across a memcached/Redis cluster. Latency: ~1ms. Handles the next ~19% of lookups. **(4) Cold tier (L3 — SSD-backed store):** Full 2.56 TB on NVMe SSDs across a distributed KV store (RocksDB/Cassandra). Latency budget: ~3ms storage + ~1ms network. Handles the tail ~1% of lookups. **(5) Expected P99:** If measured P99 lands on the warm path it is ~1ms; if it includes the first cold lookups, the budgeted cold path is still ~4ms < 5ms. **(6)
    Capacity planning:** At 10M QPS, each serving node handles ~50K QPS (limited by network bandwidth). Need 10M/50K = 200 serving nodes. Each node has 32 GB RAM (hot cache + headroom), 4-core CPU, 10 Gbps NIC. Warm tier: 16-node Redis cluster (8 GB each). Cold tier: 32-node SSD cluster. **(7) Consistency:** Embeddings update weekly via batch retraining. Cache invalidation via versioned keys — deploy new version, warm caches, swap traffic.'
  common_mistake: |
    **The Pitfall:** Trying to serve 2.56 TB of embeddings directly from GPU HBM to meet latency requirements.
    **The Rationale:** Candidates focus on the sub-millisecond latency requirement and default to GPU memory, failing to recognize this is a distributed systems throughput problem.
    **The Consequence:** An infeasible or astronomically expensive design that ignores the need for a tiered caching architecture.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 10M QPS, 5 lookups/query, 256-dim FP16 (512 bytes).
       - 5 tables * 1B rows/table = 5B total embeddings, so 5B * 512B = 2.56 TB.
       - P99 SLA: 5ms. Hot/warm/cold hit rates are approximately 80%/19%/1%.
    2. **Calculations:**
       - Hot tier rows: 0.1% * 5B = 5M rows; 5M * 512B = 2.56 GB.
       - Warm tier rows: 5% * 5B = 250M rows; 250M * 512B = 128 GB.
       - Aggregate Read Bandwidth: 10M QPS * 5 lookups * 512 bytes = 25.6 GB/s.
       - L1 hit rate (80%): Serves 20.5 GB/s from local RAM. Distributed across 200 nodes = ~100 MB/s per node.
       - L2 hit rate (19%): Serves 4.9 GB/s across 16 Redis nodes = ~306 MB/s per node.
       - L3 hit rate (1%): Serves 256 MB/s across 32 SSD nodes = ~8 MB/s per node.
       - Latency CDF: 80% at ~0.1ms, about 99% by ~1ms, and the tail cold path budget is ~3ms storage + ~1ms network = ~4ms.
    3. **Conclusion & Interpretation:**
       - **Result: Feasible Architecture.** The tier sizes are consistent across all 5 tables, and the design keeps P99 under 5ms because the warm path is ~1ms and even the budgeted cold path is ~4ms.
  options:
    - 'Use a 3-tier architecture: in-process hot cache (top 0.1% rows, ~2.56 GB, <0.1ms), distributed warm cache (top 5% rows, ~128 GB Redis, ~1ms), and SSD-backed cold store (full 2.56 TB, ~3ms); the 80/19/1 hit-rate split achieves P99 < 5ms across 200 serving nodes'
    - Serve all 2.56 TB from GPU HBM across 32 A100s (80 GB each) for sub-millisecond latency; GPU memory bandwidth of 2 TB/s can handle the 25.6 GB/s aggregate read load easily
    - Shard the 2.56 TB across 256 Redis nodes (10 GB each) with consistent hashing; Redis provides ~0.5ms P99 per lookup, meeting the 5ms SLA without any tiered caching
    - Use a single large NVMe SSD array with 2.56 TB capacity and SPDK for kernel-bypass reads at ~10 microseconds per lookup, far exceeding the 5ms SLA requirement
