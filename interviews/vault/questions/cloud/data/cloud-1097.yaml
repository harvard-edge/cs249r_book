title: Checkpoint Loading via Data Striping
scenario: You are initializing a distributed LLM training job on 1024 GPUs. The job needs to load a 2.5 TB model checkpoint from a distributed parallel file system. Your target load time is 20 seconds. Each storage node in your parallel file system has a 200 Gbps network interface. Assume perfect linear scaling and no network congestion.
question: What minimum stripe count is needed to load the 2.5TB checkpoint in 20 seconds from 200Gbps storage nodes?
details:
  realistic_solution: Calculate the required aggregate read bandwidth (2.5 TB / 20s = 125 GB/s) and divide it by the single-node network capacity (25 GB/s) to find the stripe count. The file must be striped across at least 5 storage nodes.
  common_mistake: |
    **The Pitfall:** Failing to convert bits to bytes (200 Gbps vs GB/s) or ignoring the aggregate bandwidth requirement.
    **The Rationale:** Engineers mistakenly assume a single high-performance NVMe server can serve thousands of clients simultaneously without network bottlenecks.
    **The Consequence:** Checkpoint loading takes minutes instead of seconds, wasting thousands of dollars in idle GPU time per restart.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Checkpoint size: 2.5 TB. Target load time: 20 seconds.
       - Storage node network interface: 200 Gbps.
    2. **Calculations:**
       - Target Aggregate Bandwidth = 2.5 TB / 20 s = 125 GB/s.
       - Single Node Bandwidth = 200 Gbps / 8 = 25 GB/s.
       - Minimum Storage Nodes = 125 GB/s / 25 GB/s = 5 nodes.
    3. **Conclusion & Interpretation:** **File must be striped across ≥ 5 nodes. Network-I/O-Bound.**
