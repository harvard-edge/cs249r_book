title: Centralized vs Distributed Labeling for Dataset Curation
scenario: 'Your team is building a massive, high-quality image dataset for a new computer vision model. The annotation process involves human labelers, and you need to optimize the throughput and quality. You''re considering two annotation pipeline architectures: 1. Centralized Inference-Assisted Labeling. 2. Distributed Human-in-the-Loop with Edge Inference.'
question: How would you compare centralized and distributed edge labeling for 10M images in 3 months while preserving IAA and limiting bias?
details:
  realistic_solution: |
    Compare the two architectures on throughput, quality, and bias controls. A centralized inference-assisted pipeline is simpler to govern: one model version, one annotation UI, consistent gold sets, centralized IAA tracking, and easier subgroup balancing, but it may add upload latency and can underrepresent edge populations if sampling is not stratified. A distributed edge pipeline can pre-filter locally, improve privacy, and capture regional edge cases sooner, but it needs model/version control, calibration checks, duplicate review, and stronger audit trails to keep IAA comparable across sites. For 10M images in 3 months, size labeler capacity first, then choose centralized, distributed, or hybrid routing based on whether local privacy/latency benefits outweigh the added quality-control complexity.
  common_mistake: |
    **The Pitfall:** Overlooking the bottleneck of human annotation speed.
    **The Rationale:** Engineers often compare architectures by inference speed alone instead of annotation capacity, IAA, bias sampling, and review workflow.
    **The Consequence:** The team may choose a pipeline that processes candidates quickly but cannot deliver enough reliable, balanced labels within the release window.
  napkin_math: |
    **Assumptions & Constraints:**
    - 10M images in 90 days = ~111,111 images/day.
    - Base human labeling time = 5 sec/image.
    - Quality policy: 20% of images receive a second label for IAA checks.
    - Bias control: each architecture must report per-slice label counts and disagreement rates.

    **Calculations:**
    - Effective labeling time per image = 5 sec + (0.20 × 5 sec) = 6 sec.
    - Daily human time = 111,111 × 6 sec = 666,666 sec ≈ 185 annotator-hours/day.
    - Required full-time annotators at 8 hours/day = 185 / 8 ≈ 24 annotators, before arbitration and management overhead.
    - Distributed edge labeling can reduce upload or routing delay, but it does not reduce the 185 annotator-hours/day unless it also improves labeler productivity or lowers rework.

    **Conclusion & Interpretation:**
    - **Result: ~24 annotators minimum plus quality overhead.** The architecture comparison should focus on whether centralized governance or distributed locality better preserves IAA and bias coverage while meeting this labeler-capacity target.
