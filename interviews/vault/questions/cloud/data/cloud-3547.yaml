title: Real-time Anomaly Detection on High-Frequency Sensor Streams with NVIDIA H100
scenario: Imagine you are designing a real-time anomaly detection system for a fleet of autonomous vehicles. Each vehicle generates telemetry data (sensor readings, GPS, internal diagnostics) at a combined rate of 10 GB/s, arriving as a continuous stream of small messages. Your task is to process this data, extract real-time features, and run a lightweight anomaly detection model within a 50ms end-to-end latency budget.
question: How would you architect the stream pipeline to process 10 GB/s telemetry and meet the 50 ms anomaly-detection SLA?
details:
  realistic_solution: |
    Partition ingestion by vehicle and sensor stream across low-latency brokers, then run a bounded stream processor that parses messages, normalizes timestamps, and computes only the features needed for the anomaly model. Use short event-time windows or microbatches sized in a few milliseconds, not throughput-maximizing batches, so queue residence time stays inside the 50 ms budget. Keep hot state in memory, apply backpressure at the broker when parser or inference queues exceed thresholds, and shed or downsample noncritical diagnostics before safety-critical streams. Feed compact feature tensors to Triton or a GPU inference service with asynchronous copies and pinned/shared memory, then publish anomaly decisions with request IDs and event-time watermarks for auditability.
  common_mistake: |
    **The Pitfall:** Ignoring the overhead of data serialization/deserialization and PCIe network transfer.
    **The Rationale:** Engineers often assume the GPU's raw processing power will compensate for inefficient data handling, without calculating the true I/O limits.
    **The Consequence:** PCIe bottlenecks that completely negate the compute advantages, failing the real-time latency target.
  napkin_math: |
    **Assumptions & Constraints:**
    - Data rate is 10 GB/s using decimal units.
    - Average message size is 1 KB, so parsing overhead matters.
    - PCIe Gen5 x16 one-way payload bandwidth is roughly 64 GB/s.
    - End-to-end latency budget is 50 ms.
    - Keep steady-state queueing below 10 ms so parsing, feature compute, inference, and output have budget.

    **Calculations:**
    - Message count = 10 GB/s / 1 KB = 10,000,000 messages/sec.
    - If feature expansion adds 20%, accelerator-bound traffic is about 12 GB/s.
    - PCIe headroom = 64 GB/s - 12 GB/s = 52 GB/s, so PCIe is not the limiting bandwidth.
    - Total messages resident under the 50 ms SLA = 0.05 s * 10M = 500,000 across the whole pipeline.
    - Queueing budget of 10 ms allows at most 0.01 s * 10M = 100,000 queued messages before backpressure or shedding should trigger.
    - A 5 ms microbatch contains 0.005 s * 10M = 50,000 messages, giving bounded batching delay while still amortizing GPU transfer overhead.

    **Conclusion & Interpretation:**
    - **Result: queueing- and parsing-bound, not PCIe-bound.** The design should cap microbatches around a few milliseconds, enforce backpressure near 100,000 queued messages, and reserve the remaining latency for parsing, feature computation, inference, and output.
