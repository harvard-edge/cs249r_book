title: Real-time Anomaly Detection on High-Frequency Sensor Streams with NVIDIA H100
scenario: Imagine you are designing a real-time anomaly detection system for a fleet of autonomous vehicles. Each vehicle generates telemetry data (sensor readings, GPS, internal diagnostics) at a combined rate of 10 GB/s, arriving as a continuous stream of small messages. Your task is to process this data, extract real-time features, and run a lightweight anomaly detection model within a 50ms end-to-end latency budget.
question: How would you architect the stream pipeline to process 10 GB/s telemetry and meet the 50 ms anomaly-detection SLA?
details:
  realistic_solution: The architecture should involve a robust stream ingestion layer (e.g., Kafka or Flink/Spark Streaming), followed by a stream processing layer. For real-time feature computation and inference, one could use a framework like NVIDIA Rapids (Cudf, Cuml) or Triton Inference Server. Data should be batched efficiently on the CPU before transfer to the GPU to maximize throughput and minimize transfer overhead, but batch sizes must be carefully tuned to respect the 50ms latency budget. Leveraging shared memory and asynchronous kernels would be crucial. For features that require historical context, a low-latency feature store can be integrated.
  common_mistake: |
    **The Pitfall:** Ignoring the overhead of data serialization/deserialization and PCIe network transfer.
    **The Rationale:** Engineers often assume the GPU's raw processing power will compensate for inefficient data handling, without calculating the true I/O limits.
    **The Consequence:** PCIe bottlenecks that completely negate the compute advantages, failing the real-time latency target.
  napkin_math: |
    **Assumptions & Constraints:**
    - Data rate is 10 GB/s using decimal units.
    - Average message size is 1 KB, so parsing overhead matters.
    - PCIe Gen5 x16 one-way payload bandwidth is roughly 64 GB/s.
    - End-to-end latency budget is 50ms.

    **Calculations:**
    - Message count = 10 GB/s / 1 KB = 10,000,000 messages/sec.
    - If feature expansion adds 20%, accelerator-bound traffic is about 12 GB/s.
    - PCIe headroom = 64 GB/s - 12 GB/s = 52 GB/s, so PCIe is not the limiting bandwidth.
    - A 50ms SLA allows only 0.05s * 10M = 500,000 messages in flight per vehicle across all stages.

    **Conclusion & Interpretation:**
    - **Result: Not PCIe-bound under these assumptions.** The risk is CPU parsing, batching delay, serialization, and queue growth; batches must stay small enough to keep total residence time under 50ms.
