title: Diagnosing Sudden MMLU Score Spikes in LLM Pre-training
scenario: Your team is continually pre-training a 70B parameter LLM on a 500B token dataset containing a mix of internal code and recent web scrapes. After training on the latest 50B token partition, the model's 5-shot MMLU score inexplicably jumps from 68.2% to 75.4%, while HumanEval performance on internal coding tasks drops by 2%. The training loss curve remained stable.
question: How would you diagnose the root cause of this anomaly and what mitigation should you apply?
details:
  realistic_solution: Investigate the latest data partition before trusting the benchmark jump. Compare data lineage and source mix against the prior partition, then run benchmark-contamination checks against MMLU using exact 8-gram to 13-gram overlap, blocklisted benchmark text, and approximate near-duplicate detection such as MinHash/LSH. The 7% MMLU spike with stable loss and a HumanEval drop strongly suggests contamination or distribution shift in the recent web scrapes, not a clean capability gain. Remove contaminated or near-duplicate samples, quarantine suspect scrape sources, and add ongoing decontamination filters before resuming training.
  common_mistake: |
    **The Pitfall:** Assuming the new data was exceptionally high quality or that the model experienced a sudden 'grokking' phase.
    **The Rationale:** Engineers often trust overall benchmark improvements without investigating divergent metrics.
    **The Consequence:** Deploying a contaminated model that overfits public benchmarks but performs worse on real internal tasks.
  napkin_math: |
    **Assumptions & Constraints:**
    - MMLU dataset: ~700,000 tokens.
    - Scanning 50B tokens.

    **Calculations:**
    - Exact n-gram scan: one linear pass over the 50B-token partition to emit/hash benchmark-length n-grams, then membership checks against a compact reference set derived from MMLU.
    - MinHash/LSH: build fixed-size sketches for corpus windows and compare candidate buckets against benchmark sketches, avoiding exhaustive all-pairs document comparison.
    - The dominant cost is scanning and sketching the 50B-token partition plus candidate verification, not 50B × 700k token-by-token comparisons.

    **Conclusion & Interpretation:**
    - **Result: Linear scan plus approximate candidate generation (Data Quality-Bound)**. Exact n-gram matching and MinHash/LSH make contamination detection practical, but confirmed matches must be filtered or quarantined before training.
