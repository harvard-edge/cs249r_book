title: Diagnosing MMD Monitoring Bottlenecks at Scale
scenario: A cloud vision API monitors for covariate shift using a daily batch job that computes exact Maximum Mean Discrepancy (MMD) with an RBF kernel on 512-dimensional ResNet embeddings. It compares a reference dataset of 1,000,000 images against a 1-hour production window (18,000,000 images). The job runs on an 8-core CPU instance with 64GB of RAM but consistently OOMs and times out.
question: "Why does exact RBF-kernel MMD OOM and time out for the 1M-reference, 18M-live drift job, and what scalable method should replace it?"
details:
  realistic_solution: Abandon the exact O(N^2) estimator. Implement random subsampling to compute block-MMD on mini-batches (e.g., B=4000), or project the 512-D embeddings using Random Fourier Features (RFF) to approximate the RBF kernel, reducing complexity to O(N).
  common_mistake: |
    **The Pitfall:** Attempting to compute the exact unbiased quadratic MMD estimator on large datasets.
    **The Rationale:** Using naive linear-algebra functions directly from academic textbooks.
    **The Consequence:** O(N^2) memory scaling instantly crashes typical cloud instances, while O(N^2) compute complexity leads to unbounded job timeouts.
  napkin_math: |
    **Assumptions & Constraints:**
    - N=1M, M=18M, 64GB RAM limit.

    **Calculations:**
    - Exact kernel matrix = 19M^2 * 4 bytes = 1.44 PB (OOM).
    - Block-MMD (B=4000) = 4000^2 * 4 bytes = 64 MB.

    **Conclusion & Interpretation:**
    - **Result: Memory-Bound.** Subsampling reduces memory from 1.44 PB to 64 MB, allowing the job to finish smoothly.
