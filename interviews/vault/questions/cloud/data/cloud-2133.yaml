title: The Feature Interaction Explosion
scenario: Your ads ranking model uses 500 sparse categorical features. A data scientist proposes adding all pairwise feature crosses to capture interactions.
question: How many pairwise feature crosses do 500 categorical features create, and what is the systems impact?
details:
  realistic_solution: Crossing every pair of 500 categorical features creates 500 choose 2 = 124,750 pairwise cross definitions. The systems impact is not just that count; each cross can have very high observed cardinality, creating sparse, hard-to-train features and large embedding state if materialized naively. A better approach is learned feature interactions such as DeepFM or DCN-v2, which approximate interactions in a low-rank space without enumerating every cross.
  common_mistake: |
    **The Pitfall:** Calculating only the number of crossed feature pairs and concluding the size is manageable.
    **The Rationale:** Candidates forget that the true problem is the exponential vocabulary explosion of each crossed feature.
    **The Consequence:** Creating a model with terabytes of embeddings that fails to train due to OOM errors and extreme data sparsity.
  napkin_math: |
    **Assumptions & Constraints:**
    - 500 sparse categorical features.
    - Average vocabulary size per feature is 10K.
    - Embedding dimension is 128 with FP32 weights.

    **Calculations:**
    - Number of pairwise feature-cross definitions: 500 choose 2 = 124,750.
    - Worst-case vocabulary for one crossed pair with two 10K-cardinality features: 10K * 10K = 100M possible IDs.
    - Actual embedding memory depends on observed IDs, hashing, pruning, and frequency thresholds; assuming a dense 100M-ID table for every pair is not a grounded systems estimate.
    - The practical cost is sparse high-cardinality state, larger feature dictionaries or hash tables, more embedding lookups, and poorer sample efficiency.

    **Conclusion & Interpretation:**
    - **Result: Vocabulary and Memory Explosion**. The count of new cross definitions is 124,750, and each can have very high cardinality, so explicit crosses are usually replaced by learned interaction layers such as DCN-v2.
