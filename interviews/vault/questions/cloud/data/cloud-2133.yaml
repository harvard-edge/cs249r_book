title: The Feature Interaction Explosion
scenario: Your ads ranking model uses 500 sparse categorical features. A data scientist proposes adding all pairwise feature crosses to capture interactions.
question: How many new features does crossing 500 categorical features create, and what is the systems impact?
details:
  realistic_solution: Materializing pairwise crosses causes a massive vocabulary explosion. The solution is learned feature interactions (DeepFM, DCN-v2) that approximate crosses in a low-rank space without materializing them.
  common_mistake: |
    **The Pitfall:** Calculating only the number of crossed feature pairs and concluding the size is manageable.
    **The Rationale:** Candidates forget that the true problem is the exponential vocabulary explosion of each crossed feature.
    **The Consequence:** Creating a model with terabytes of embeddings that fails to train due to OOM errors and extreme data sparsity.
  napkin_math: |
    **Assumptions & Constraints:**
    - 500 sparse categorical features.
    - Average vocabulary size per feature is 10K.
    - Embedding dimension is 128 with FP32 weights.

    **Calculations:**
    - Number of pairwise feature-cross definitions: 500 choose 2 = 124,750.
    - Worst-case vocabulary for one crossed pair: 10K * 10K = 100M possible IDs.
    - If even one crossed pair materialized its full embedding table, memory = 100M * 128 * 4 bytes = 51.2 GB.
    - Total memory depends on observed cardinality and pruning; multiplying by all pairs without a grounded fill rate is not a valid estimate.

    **Conclusion & Interpretation:**
    - **Result: Vocabulary and Memory Explosion**. The count of new cross definitions is 124,750, and each can have very high cardinality, so explicit crosses are usually replaced by learned interaction layers such as DCN-v2.
