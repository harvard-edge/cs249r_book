title: Optimizing Feature Freshness for Real-time Inference on Google TPU v5e
scenario: Imagine you are designing a real-time inference system for a high-volume recommender model. This model is deployed on a fleet of Google TPU v5e instances, each with 16 GB HBM (High Bandwidth Memory) and capable of 197 TFLOPS BF16 (Bfloat16 floating-point operations per second), providing a memory bandwidth of 819 GB/s. The inference requests require features with a freshness guarantee of under 500ms, and point-in-time correctness is critical for model stability. You're using an online feature store for low-latency lookups and an offline feature store for batch training and historical analysis.
question: How would you keep features under 500 ms fresh and point-in-time correct across online and offline stores for the TPU v5e recommender?
details:
  realistic_solution: Implement a CDC-backed stream from source systems into both online serving state and versioned offline tables, with clear event-time semantics and data contracts. The streaming path should transform features, apply idempotent updates to the online store, and expose feature timestamps so serving can reject stale values or fall back when age exceeds 500 ms. The offline store should keep immutable versions or time-travel tables and training should use point-in-time joins against event time, not latest-value joins, to avoid batch-serving skew. Track freshness SLAs, source-to-online lag, late events, stale-read rate, lineage, and data quality at each stage; the TPU v5e affects inference latency, but HBM caching does not solve freshness or point-in-time correctness.
  common_mistake: |
    **The Pitfall:** Treating online and offline feature stores as independently synchronized entities.
    **The Rationale:** Engineers often deploy separate systems for OLTP and OLAP without establishing a unified Change Data Capture (CDC) pipeline.
    **The Consequence:** Leading to stale online features or inconsistent historical feature sets, causing "batch-serving skew" and degraded model performance in production.
  napkin_math: |
    **Assumptions & Constraints:**
    - Freshness is measured from source event time to the online feature value used at serving.
    - End-to-end freshness budget: 500 ms.
    - Example pipeline stages: CDC publish, stream processing, online-store apply, and serving read.

    **Calculations:**
    - CDC publish delay: 80 ms.
    - Stream processing/windowing delay: 180 ms.
    - Online-store apply delay: 70 ms.
    - Serving read and timestamp check: 20 ms.
    - Total freshness lag = 80 + 180 + 70 + 20 = 350 ms.
    - Remaining staleness margin = 500 - 350 = 150 ms.

    **Conclusion & Interpretation:**
    - **Result: 350 ms propagation lag with 150 ms margin.** The design must enforce event-time versions and reject or fall back when feature age exceeds 500 ms; lookup latency is only one part of the freshness budget.
