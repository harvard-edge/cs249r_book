title: Calculating the Financial Impact of Feature Drift
scenario: A cloud-based fraud detection model processes 500 transactions per second on AWS Inferentia. During training, the model achieved a False Positive Rate (FPR) of 2%. Due to a sudden macroeconomic shift, user purchasing behavior changes (covariate shift), degrading the model's production FPR to 8%. Every false positive triggers a manual review by a risk analyst costing $1.50.
question: What is the daily financial impact and extra manual-review volume from the FPR rising from 2% to 8% at 500 TPS?
details:
  realistic_solution: Translate the distribution shift into business metrics to quantify impact and trigger retraining. Implement feature-level statistical tests (e.g., Population Stability Index) and set up alerting when the estimated daily cost of degraded operational metrics (like FPR) exceeds a specific threshold.
  common_mistake: |
    **The Pitfall:** Relying solely on overall accuracy or ROC-AUC for monitoring.
    **The Rationale:** These aggregate metrics can mask costly FPR degradation during a distribution shift if the overall positive class prevalence also drops.
    **The Consequence:** Silent failures that cost the business millions in unnecessary manual review operational expenses before being detected.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 500 TPS. FPR increases from 2% to 8%.
       - Cost per manual review: $1.50.
    2. **Calculations:**
       - Daily transactions: 500 requests/sec * 86,400 seconds/day = 43,200,000.
       - Baseline FPs: 43,200,000 * 0.02 = 864,000/day.
       - Shifted FPs: 43,200,000 * 0.08 = 3,456,000/day.
       - Absolute increase in FPs: 3,456,000 - 864,000 = 2,592,000 reviews/day.
       - Daily financial impact = 2,592,000 * $1.50 = $3,888,000.
    3. **Conclusion & Interpretation:**
       - **Result: $3.88M Daily Cost. Failing to catch feature drift leads to millions in unnecessary manual review expenses.**
