title: Cloud Information Entropy L5 0
scenario: You have 10 TB of training data. Deduplication removes 30% (reducing to
  7 TB) and increases measured entropy by 15%. Your team debates whether to train
  on the deduplicated 7 TB or the full 10 TB. Evaluate both options considering information
  theory and training efficiency.
question: Should you train on the deduplicated 7 TB or the full 10 TB, given 30% deduplication
  and 15% higher entropy?
details:
  realistic_solution: 'Information content: original 10 TB at entropy H → information
    = 10 × H. Deduplicated 7 TB at 1.15H → information = 7 × 1.15H = 8.05H. The deduplicated
    set retains 80.5% of the information in 70% of the data. Per-byte information
    density: original = H, deduplicated = 1.15H (15% more informative per byte). Training
    on 7 TB: 30% fewer training steps, each step sees more diverse data, less memorization
    of duplicates. Training on 10 TB: 43% more steps, but 20% of steps reinforce already-learned
    patterns (wasted compute). Compute savings from dedup: 30% fewer steps × $1M training
    cost = $300K saved. Quality: deduplicated training typically produces equal or
    better models because the model doesn''t overfit to duplicated patterns.'
  common_mistake: '**The Pitfall:** Assuming more data is always better for LLM pre-training.

    **The Rationale:** Equating byte count directly with model knowledge, ignoring
    information density.

    **The Consequence:** Wasting millions of dollars in compute reinforcing duplicated
    patterns (memorization) instead of learning novel features.

    '
  napkin_math: "1. **Assumptions & Constraints:**\n   - Original: 10 TB, Entropy =\
    \ H.\n   - Deduplicated: 7 TB, Entropy = 1.15H.\n   - Cost: ~30% fewer FLOPs/steps\
    \ on the 7 TB dataset.\n2. **Calculations:**\n   - Original Total Info = 10 *\
    \ H = 10H.\n   - Deduplicated Total Info = 7 * 1.15H = 8.05H.\n   - Information\
    \ Retained = 8.05H / 10H = 80.5%.\n   - Compute Saved = 30% fewer training steps.\n\
    3. **Conclusion & Interpretation:**\n   - **Result: Train on 7 TB (Compute-Efficiency-Bound).**\
    \ You sacrifice less than 20% of the raw information (which was mostly redundant)\
    \ to save 30% of the massive pre-training compute cost, yielding a higher-quality\
    \ model per FLOP.\n"
