title: Calculating KL Divergence for Feature Drift
scenario: 'A cloud recommender system expects an age group feature distribution of P = {18-25: 0.5, 26-35: 0.3, 36+: 0.2}. Recent production traffic Q has shifted to {18-25: 0.2, 26-35: 0.5, 36+: 0.3}. The monitoring system fires a severity-1 alert if the drift distance exceeds 0.20 nats.'
question: "What is D_KL(P||Q) for the age-group distributions, and should the severity-1 alert fire?"
details:
  realistic_solution: 'Compute the asymmetric D_KL(P||Q) by summing P(x) * ln(P(x)/Q(x)) over all bins, yielding 0.224 nats, which correctly triggers the drift alert.'
  common_mistake: |
    **The Pitfall:** Calculating D_KL(Q||P) instead of D_KL(P||Q), or assuming KL divergence is symmetric.
    **The Rationale:** Candidates often forget that KL divergence is an asymmetric measure of relative entropy.
    **The Consequence:** Yielding an incorrect divergence value (~0.193 nats) and improperly bypassing the alert threshold.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - P = {18-25: 0.5, 26-35: 0.3, 36+: 0.2}. Q = {18-25: 0.2, 26-35: 0.5, 36+: 0.3}.
       - Alert threshold: 0.20 nats.
    2. **Calculations:**
       - Formula: D_KL(P||Q) = Σ P(x) × ln(P(x)/Q(x)).
       - Term 1: 0.5 × ln(0.5/0.2) = 0.5 × ln(2.5) ≈ 0.458.
       - Term 2: 0.3 × ln(0.3/0.5) = 0.3 × ln(0.6) ≈ -0.153.
       - Term 3: 0.2 × ln(0.2/0.3) = 0.2 × ln(0.667) ≈ -0.081.
       - Total: 0.458 - 0.153 - 0.081 = 0.224 nats.
    3. **Conclusion & Interpretation:**
       **Result: Metric Bound. 0.224 nats > 0.20 threshold, so the alert should fire.**
