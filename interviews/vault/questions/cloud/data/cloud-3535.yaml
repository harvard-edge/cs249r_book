title: Real-time Data Quality & Validation for H100 ML Systems
scenario: A real-time fraud detection system relies on continuous retraining via high-volume streaming data. Recently, the model exhibits delayed convergence and increased false positives due to upstream data quality issues like schema drift and anomalous distributions.
question: How would you design a real-time data quality gate before the training cluster to stop schema drift, invalid ranges, and anomalies?
details:
  realistic_solution: "A layered, real-time data quality strategy is crucial: (1) Schema Enforcement with a Schema Registry at ingestion, (2) Streaming Data Quality Gates using Flink or Spark for range constraints and real-time anomaly detection, (3) Quarantine automatically flagging problematic data segments."
  common_mistake: |
    **The Pitfall:** Relying solely on post-training evaluation or offline batch validation to catch data errors.
    **The Rationale:** Engineering teams defer validation to offline processes to avoid adding latency to high-throughput streaming pipelines.
    **The Consequence:** Corrupted data flows directly into the training cluster, causing catastrophic weight degradation and wasting millions of dollars in compute cycles before the error is caught.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Data rate: 200 GB/hour (56.9 MB/s). Record size: 2 KB.
       - Validation compute: 50μs per record.
       - Invalid data: 5%.
    2. **Calculations:**
       - Records/sec = 56.9 MB/s / 2 KB ≈ 29,130 records/s.
       - Validation overhead per stream second = 29,130 * 50μs ≈ 1.45 seconds of compute.
       - At 5% error, 10 GB/hour of corrupted data reaches the GPUs.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound (Validation).** The validation requires >1 core to process in real-time. A parallelized upstream streaming validation layer is strictly required to prevent expensive GPU waste.
