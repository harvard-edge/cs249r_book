title: The Experiment Metadata Tax
scenario: 'Your team has been running experiments for 18 months without structured experiment tracking. You have 2,500 training runs stored as directories of checkpoints with ad-hoc naming conventions. The VP asks: ''Which model configuration gives the best accuracy-latency tradeoff for our production constraint of < 50ms?'' You realize you cannot answer this question.'
question: What went wrong, and what minimum metadata must be tracked per experiment to prevent this?
details:
  realistic_solution: 'Without structured tracking, you cannot query across experiments. The minimum metadata per experiment: (1) Inputs: dataset version hash, hyperparameter dict, code commit hash, environment snapshot (library versions). (2) Outputs: all evaluation metrics on standardized benchmarks, model size, inference latency on target hardware. (3) Lineage: parent experiment ID (if this is a continuation), hardware used, wall-clock time, GPU-hours consumed. (4) Tags: searchable labels (e.g., ''production-candidate'', ''ablation-study''). This is the experiment DAG — each experiment is a node with typed edges to its data, code, and metrics. Without it, 18 months of compute produced artifacts you cannot reason about.'
  common_mistake: |
    **The Pitfall:** Thinking the problem can be solved with just "better file naming."
    **The Rationale:** Candidates fail to recognize that file names cannot encode the complex multidimensional data (hyperparameters, metrics, hardware specs) needed for querying.
    **The Consequence:** Generating thousands of expensive artifacts that are functionally useless because their provenance and performance constraints cannot be systematically compared.
  napkin_math: |
    **Assumptions & Constraints:**
    - 2,500 experiments exist as unstructured checkpoint directories.
    - Minimum searchable metadata can be compact: dataset version, code commit, hyperparameters, metrics, latency, size, hardware, runtime, and tags.
    - The prompt does not provide enough data to compute total historical spend.

    **Calculations:**
    - Metadata required at ~10 KB/experiment: 2,500 * 10 KB = 25,000 KB, or about 25 MB.
    - Even if each experiment has many GB of checkpoints, the missing query layer is only tens of MB of structured records.
    - Total compute cost should be read from tracked GPU-hours or billing data; it cannot be derived from the scenario.

    **Conclusion & Interpretation:**
    - **Result: Metadata-Bound**. Missing roughly 25 MB of structured metadata makes 2,500 experiments unqueryable for the VP's accuracy-latency question.
