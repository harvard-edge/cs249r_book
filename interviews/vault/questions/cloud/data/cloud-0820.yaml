title: The Tokenizer Throughput Ceiling
scenario: You are profiling an LLM inference pipeline. A load test with pre-tokenized requests shows the H100 can serve about 70,000 generated tokens/sec for this 7B model at the target batch size, but GPU utilization drops to 40% when online CPU tokenization is enabled.
question: Given the measured H100 serving rate, roughly how many tokens per second must the CPU tokenizer produce to avoid becoming the bottleneck?
details:
  realistic_solution: Approximately 70,000 tokens/sec. This should come from measured end-to-end model throughput at the target batch size and sequence mix, not from peak GPU TFLOPS. If the H100 service consumes about 70k tokens/sec when fed pre-tokenized inputs, the CPU tokenizer must sustain roughly that same rate, with headroom, or it can starve the GPU.
  common_mistake: |
    **The Pitfall:** Assuming the tokenizer is always fast enough because it is "just string processing."
    **The Rationale:** Engineers underestimate the sheer computational throughput of modern GPUs compared to single-threaded CPU Python code.
    **The Consequence:** The GPU sits idle waiting for data, leading to poor utilization and wasted hardware costs.
  napkin_math: |
    **Assumptions & Constraints:**
    - 7B model serving on one H100 at the target batch size and sequence mix.
    - Measured pre-tokenized throughput: ~70,000 generated tokens/sec.
    - The tokenizer is on the critical path for online requests.

    **Calculations:**
    - Required tokenizer throughput should match the measured consumer rate.
    - Required CPU tokenization rate ≈ 70,000 tokens/sec.
    - Add operational headroom, so a practical target would be above 70,000 tokens/sec.

    **Conclusion & Interpretation:**
    - **Result: ~70,000 tokens/sec (CPU-Throughput-Bound)**. This is a pipeline matching estimate, not a peak-FLOPS calculation.
  options:
    - A) ~700 tokens/sec
    - B) ~7,000 tokens/sec
    - C) ~70,000 tokens/sec
    - D) ~700,000 tokens/sec
