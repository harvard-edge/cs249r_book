title: Designing a High-Throughput Data Quality Gate for AMD MI300X
scenario: Your team is deploying a large-scale ML model on an accelerator for real-time inference. The model's performance is critically dependent on the quality of incoming features. You are tasked with designing a data quality gate that performs schema validation, checks for basic data type anomalies (e.g., unexpected nulls, out-of-range values), and tags data with lineage information. The raw incoming data stream, after initial ingestion and light preprocessing, averages 2 TB/hour.
question: What architecture and throughput calculation would ensure a 2 TB/hour data quality gate does not bottleneck the inference stream?
details:
  realistic_solution: A distributed, horizontally scalable streaming data validation service (e.g., using Apache Flink, Spark Streaming, or Kafka Streams) deployed on a cloud environment. This service would consume data from a message queue, perform validation checks (schema, range, type), potentially sample data for more intensive anomaly detection, enrich with lineage metadata, and then publish validated data to another message queue for the accelerator consumer. Key strategies include lightweight, compiled validation rules for high throughput and a monitoring system to scale validator instances dynamically based on backlog and throughput metrics.
  common_mistake: |
    **The Pitfall:** Underestimating the required throughput of the data quality gate.
    **The Rationale:** Candidates often focus too much on complex validation rules and ignore the raw throughput requirement to keep the downstream accelerator fed.
    **The Consequence:** The validation service becomes a bottleneck, starving the expensive accelerator and reducing overall system utilization.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Incoming data rate (R_in) = 2 TB/hour.
       - 1 TB = 1024 GB.
    2. **Calculations:**
       - Total GB per hour = 2 TB * 1024 GB/TB = 2048 GB.
       - Total seconds per hour = 3600 s.
       - Required throughput (T_DQG) = 2048 GB / 3600 s ≈ 0.5689 GB/s.
    3. **Conclusion & Interpretation:**
       - **Result: 570 MB/s sustained throughput required.** The system must avoid becoming an I/O bottleneck to ensure continuous accelerator saturation.
