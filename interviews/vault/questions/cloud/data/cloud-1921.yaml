title: Evaluating Spectral Signatures Computation
scenario: You are evaluating defenses against backdoor data poisoning attacks for a cloud-based vision API serving a ResNet-50 model. The dataset contains 1.2M images across 1,000 classes, and the model's penultimate embedding dimension is 2048. The security team proposes using Spectral Signatures to filter the training data by analyzing the covariance matrix of learned representations. The infrastructure team pushes back, claiming that computing the SVD over 1.2M high-dimensional vectors is computationally prohibitive for a daily retraining pipeline, and suggests using simple activation clipping instead.
question: Is the team's concern about a prohibitive 1.2M-vector SVD valid, and how should Spectral Signatures actually be computed?
details:
  realistic_solution: Spectral signatures are computed per-class. You center the representations for a single class ($N_c \times d$), compute the $d \times d$ covariance matrix, and extract the leading singular/eigenvector for that class. The infrastructure team's global 1.2M-vector SVD concern is not the right computation; the per-class workload is practical on modern hardware, though runtime depends on batching, memory movement, and sustained linear-algebra throughput.
  common_mistake: |
    **The Pitfall:** Computing SVD on the entire dataset at once.
    **The Rationale:** Candidates misunderstand the algorithm, assuming it runs on the global $N \times d$ matrix rather than per-class covariance matrices.
    **The Consequence:** The candidate agrees with the infrastructure team and discards a computationally cheap, effective defense mechanism.
  napkin_math: |
    **Assumptions & Constraints:**
    - Dataset: 1.2M images, 1,000 classes, 2048 dims.
    - Average per-class count: 1,200 embeddings.
    - Spectral Signatures needs class-wise centered embeddings and a leading direction from each class covariance, not a global SVD over all 1.2M rows.
    - Hardware peak: NVIDIA T4 FP32 peak is about 8.1 TFLOPS, but dense linear algebra and eigensolvers will sustain less.

    **Calculations:**
    - Per-class samples: 1,200,000 / 1,000 = 1,200.
    - Centered class matrix size: 1,200 x 2,048, which fits easily in memory.
    - Forming a class covariance X^T X costs about 2 * 1,200 * 2,048^2 = 10.1 GFLOPs per class.
    - Extracting the top eigenvector of the 2,048 x 2,048 covariance can be done with an iterative or partial eigensolver; a dense full SVD is an avoidable upper-bound style computation for this use case.
    - Across 1,000 classes, covariance formation alone is about 10 TFLOPs, plus top-eigenvector work, memory movement, centering, and per-class scheduling overhead.
    - A peak-only lower bound for the covariance work is 10 TFLOPs / 8.1 TFLOPS ~= 1.2 seconds, but sustained wall-clock time will be much higher and must be benchmarked.

    **Conclusion & Interpretation:**
    - **Result: Per-Class Spectral Computation**. The infrastructure team's global 1.2M-vector SVD is the wrong computation; the practical workload is class-wise covariance plus leading-direction extraction, which is reasonable for a daily pipeline but not guaranteed to be seconds-level wall-clock.
