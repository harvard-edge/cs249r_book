title: Data-Efficient LLM Training Design on AMD MI300X
scenario: 'Your team is tasked with designing a training pipeline for a novel large language model (LLM) that requires processing an extremely large corpus of data (multi-petabytes) on a cluster of AMD MI300X accelerators. You''ve identified that the ''data wall problem'' is a critical bottleneck, hindering training efficiency and leading to sub-optimal utilization of the MI300X''s powerful compute capabilities.'
question: 'What data selection and processing strategy would you use on MI300X to raise ICR and avoid model collapse for multi-petabyte training?'
details:
  realistic_solution: 'Implement a multi-tier data pipeline involving large-scale data pruning for deduplication and quality filtering. Employ coreset selection or active learning techniques to identify impactful data points. Adopt curriculum learning and utilize intelligent caching to ensure compute resources are spent on informative data, boosting ICR.'
  common_mistake: |
    **The Pitfall:** Simply scaling up data ingestion and storage without intelligent data curation.
    **The Rationale:** Candidates assume that more data is always better and rely solely on hardware bandwidth to overcome the data wall, ignoring the information density of the data.
    **The Consequence:** The model spends significant compute on redundant or low-information samples, leading to diminishing returns, slower convergence, and a higher risk of model collapse.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hardware: AMD MI300X (5.3 TB/s HBM bandwidth).
    - Sample Size: 256 KB (0.256 MB) per sample.
    - Required Throughput: 100,000 samples/second.

    **Calculations:**
    - Theoretical Max Throughput per MI300X = 5,300,000 MB/s / 0.256 MB = ~20,700,000 samples/second.

    **Conclusion & Interpretation:**
    - **Result: >20M samples/sec (Quality-Bound)**. 1 MI300X can theoretically handle >20M samples/sec, so HBM bandwidth is not the bottleneck; intelligent data curation is strictly required.
