title: Parquet Storage and Pipeline Bottleneck Calculation
scenario: You are designing a data loading pipeline for training on a GPU. The dataset has 50 billion rows. Using Parquet with Snappy compression reduces the average row size to 40 bytes. The data is on a local NVMe drive and transferred over a PCIe Gen5 x16 bus (32 GB/s). The host CPU can read and decompress the data at a maximum rate of 10 GB/s (compressed bytes).
question: "How much Parquet storage (in GB, base-10) is required, and how long will it take to load and decompress the full 50B-row dataset?"
details:
  realistic_solution: First, calculate the total compressed dataset size. Identify the bottleneck in the loading pipeline by comparing the PCIe transfer bandwidth with the CPU decompression rate. Finally, divide the total compressed dataset size by the bottleneck throughput to find the total loading time.
  common_mistake: |
    **The Pitfall:** Using the PCIe bandwidth (32 GB/s) to calculate loading time.
    **The Rationale:** Candidates often assume the highest bandwidth transport layer is the primary data movement constraint.
    **The Consequence:** They calculate an artificially fast loading time, failing to identify that the pipeline is actually CPU-bound by the decompression rate.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Dataset: 50,000,000,000 rows.
       - Compressed row size: 40 bytes.
       - CPU decompression rate: 10 GB/s.
       - PCIe Gen5 bandwidth: 32 GB/s.
    2. **Calculations:**
       - Total Bytes: 50,000,000,000 * 40 = 2,000,000,000,000 bytes.
       - Storage in GB: 2,000,000,000,000 / 10^9 = 2,000 GB.
       - Bottleneck Throughput: min(32 GB/s, 10 GB/s) = 10 GB/s.
       - Loading Time: 2,000 GB / 10 GB/s = 200 seconds.
    3. **Conclusion & Interpretation:**
       - **Result: CPU-Bound Decompression.** The pipeline is bottlenecked by the 10 GB/s CPU decompression rate, not the 32 GB/s PCIe bus, resulting in a 200-second load time.
