title: The Petabyte Deduplication Shuffle Wall
scenario: You need to deduplicate a 15 TB web crawl corpus (3 billion documents) for LLM pre-training. The naive approach computes a hash per document and groups by hash. But your team wants fuzzy deduplication — removing documents that are 80%+ similar, not just exact matches. A colleague proposes computing MinHash signatures (128 hash functions) for all 3B documents and then performing an all-pairs comparison.
question: Why does this approach fail at petabyte scale, and what is the standard distributed deduplication pipeline?
details:
  realistic_solution: 'The standard approach is MinHash + Locality-Sensitive Hashing (LSH) banding. Instead of comparing all pairs, divide each 128-hash signature into b bands of r rows. Two documents hash to the same LSH bucket only if they share an identical band. This converts the O(n²) comparison into O(n × b) hash lookups. The key insight: LSH is a form of approximate nearest-neighbor search that trades recall for efficiency. With b=20 bands of r=6 rows (for 80% similarity threshold), only ~5% of all pairs that are 80%+ similar are missed, while 99.99% of dissimilar pairs are never compared. The distributed pipeline: (1) MapReduce to compute MinHash signatures, (2) LSH banding to emit (band_hash, doc_id) pairs, (3) shuffle by band_hash to co-locate candidates, (4) local pairwise Jaccard verification within each bucket.'
  common_mistake: |
    **The Pitfall:** Believing MinHash is globally O(n) simply because computing the signatures is O(n).
    **The Rationale:** Candidates understand MinHash creates small constant-size representations, but forget the subsequent pairwise comparison step.
    **The Consequence:** They prescribe an all-pairs comparison algorithm that mathematically implodes into an O(n²) shuffle/network bottleneck.
  napkin_math: |
    **Assumptions & Constraints:**
    - 3 Billion documents. Threshold: 80% similarity.
    - MinHash LSH: 20 bands of 6 rows.

    **Calculations:**
    - Naive all-pairs: (3B × 3B) / 2 = 4.5 × 10^18 comparisons (Intractable).
    - LSH Banding (20 bands): 3B docs × 20 = 60B pairs to shuffle.
    - Shuffle Volume: 60B × 20 bytes = 1.2 TB.
    - Avg Bucket Size: ~10 documents (10 × 9 / 2 = 45 comparisons).
    - Total LSH Comparisons: (60B / 10 buckets) × 45 = 270 Billion.

    **Conclusion & Interpretation:**
    - **Result: LSH reduces comparisons by 16-million-fold to 270B (Compute/I/O Bound)**.
