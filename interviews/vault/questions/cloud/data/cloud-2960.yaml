title: 'Dataset Curation: Implement a Data Quality Scoring Function'
scenario: You need to score 1B text documents for quality before LLM pre-training. Design and quantify a perplexity-based quality scorer using a small 125M KenLM model. The scorer must process the full 1B documents within 6 hours on a 16-node CPU cluster.
question: "How would you design and size a KenLM perplexity scorer to process 1B documents within 6 hours on a 16-node CPU cluster?"
details:
  realistic_solution: KenLM 5-gram model at 125M parameters. Each CPU can score ~10K documents/second. Distribute across 16 nodes × 32 cores = 512 cores. Set quality threshold at perplexity < 200 (tuned on held-out human ratings). Flag and discard documents scoring > 500 perplexity.
  common_mistake: |
    **The Pitfall:** Using a GPU-based neural language model for quality scoring.
    **The Rationale:** Assuming all modern NLP tasks require GPUs and deep neural networks.
    **The Consequence:** Introducing massive latency and cost overheads for a simple filtering task where a CPU-based KenLM is 100x faster and cheaper.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Workload: 1B documents, ~2KB average size (2TB total).
       - Hardware: 16 nodes * 32 cores = 512 CPUs.
       - Throughput: 10,000 docs/sec per CPU core.
    2. **Calculations:**
       - Required Throughput = 1B docs / (6 hours * 3600) = 46,300 docs/sec.
       - Available Compute = 512 cores * 10,000 docs/sec = 5.12M docs/sec.
       - Compute Time = 1B / 5.12M = ~195 seconds.
       - I/O Time = 2TB / 10GB/s network = ~200 seconds.
    3. **Conclusion & Interpretation:**
       - **Result: ~10 Minutes Total (I/O-Bound).** CPU compute is more than sufficient; the actual bottleneck is massive distributed storage I/O, entirely succeeding the 6-hour requirement.
