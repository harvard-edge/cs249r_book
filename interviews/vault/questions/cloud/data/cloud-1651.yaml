title: Object Storage Streaming vs POSIX Systems
scenario: 'You are training a 50B parameter vision-language model on a 5 PB dataset of interleaved image and text. Your training cluster consists of 128 nodes, each with 8 GPUs. Each GPU consumes data at a rate of 1.5 GB/s. You must evaluate two storage architectures: 1) Copying the 5 PB dataset into a high-performance POSIX parallel file system attached to the cluster, or 2) Streaming directly from Object Storage using concurrent HTTP byte-range requests.'
question: Should the 5PB training dataset be copied to Lustre or streamed directly from object storage, and why?
details:
  realistic_solution: 'Choose direct object storage streaming. By grouping data into 100MB-1GB shards and utilizing asynchronous, concurrent HTTP byte-range requests (8-16 workers per GPU), object storage scales horizontally to easily meet the aggregate demand without the multi-hour copy penalty.'
  common_mistake: |
    **The Pitfall:** Defaulting to a POSIX parallel file system out of fear that object storage is too slow.
    **The Rationale:** Engineers assume streaming cannot feed GPUs fast enough and rely on traditional HPC storage architectures.
    **The Consequence:** This ignores the massive initialization latency of copying petabytes of data and doubles the overall storage costs.
  napkin_math: |
    **Assumptions & Constraints:**
    - Dataset size: 5 PB.
    - Hardware: 128 nodes, 8 GPUs per node (1,024 GPUs total).
    - Data consumption rate per GPU: 1.5 GB/s.
    - POSIX copy speed: 100 GB/s.

    **Calculations:**
    - POSIX copy initialization delay: 5,000,000 GB / 100 GB/s = 50,000 seconds (~14 hours).
    - Aggregate streaming demand: 1,024 GPUs * 1.5 GB/s = 1,536 GB/s (1.53 TB/s).
    - Streaming demand per node: 1,536 GB/s / 128 nodes = 12 GB/s.

    **Conclusion & Interpretation:**
    - **Result: 12 GB/s demand (Initialization Bottleneck)**. Object storage streaming eliminates a 14-hour Initialization Bottleneck.
