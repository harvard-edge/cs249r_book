title: 'Feature Store: Realize Feature Store Sizing for Production ML Platform'
scenario: 'You are designing the feature store infrastructure for a production ML platform serving 10 model families (recommendation, fraud, ranking, NLP, etc.) on H100s. Combined: 500M users, 200 features per user per model family (2,000 total features), 1M catalog items. Serve 500K requests/second total.'
question: 'What complete feature store infrastructure would you build for 10 model families, 500M users, 1M catalog items, and 500K requests/s?'
details:
  realistic_solution: |
    Federated feature store per model family with shared infrastructure for common features. Common user features (demographics, device type) in shared Redis. Model-specific features in per-model stores.
  common_mistake: |
    Building one monolithic feature store for all use cases; not accounting for different latency, freshness, and access pattern requirements across model families.
  napkin_math: |
    **Assumptions & Constraints:**
    - 500M users, 10 models, 150 specific + 50 common features.
    - 4B per feature. Active users: 100M.

    **Calculations:**
    - Common features: 500M * 50 * 4B = 100GB (300GB with Redis 3x overhead).
    - Active user specific features: 100M * 150 * 4B * 10 = 600GB (1.8TB with overhead).
    - Redis cluster size: 50 * 64GB nodes = 3.2TB capacity.
    - Feature read bandwidth: 500K RPS * 200 * 4B = 400 MB/s.

    **Conclusion & Interpretation:**
    - **Result: 3.2TB Redis Cluster (Memory-Bound)**. Federated feature store easily handles 400 MB/s over 100Gbps NICs.
