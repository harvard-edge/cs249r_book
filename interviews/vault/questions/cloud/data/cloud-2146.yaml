title: The End-to-End Feature Pipeline Redesign
scenario: 'After a series of production incidents caused by training-serving skew, your VP of Engineering
  mandates: ''I want zero training-serving skew, guaranteed by architecture.'' You currently have separate
  Python training pipelines and Java serving pipelines, 500 features, 30 models, and a team of 15 ML engineers.
  The VP gives you 6 months and 4 engineers. Design the architecture, migration plan, and validation framework.'
question: With 6 months and 4 engineers, how would you architect, migrate, and validate a system that
  drives training-serving skew toward zero?
details:
  realistic_solution: '**Phase 1 (Month 1-2): Detection and triage.** Deploy a skew detection framework
    that runs parallel feature computation (training path vs serving path) for all 500 features on a 1%
    sample of production traffic. Quantify skew per feature (Jensen-Shannon divergence). Prioritize: ~50
    features will show significant skew (JSD > 0.05). The remaining 450 are already consistent enough.
    **Phase 2 (Month 2-4): Unified computation for top-50 skewed features.** Write feature definitions
    in a single language (Python using Feast/Tecton SDK). The SDK generates both the batch (training)
    and online (serving) computation. Deploy with shadow mode: new computation runs alongside old, with
    automated comparison. **Phase 3 (Month 4-6): Validation framework.** Build a continuous integration
    system that: (a) On every feature definition change, runs both batch and online paths on a golden
    dataset and asserts output equality within floating-point tolerance. (b) In production, continuously
    samples 0.1% of serving requests, re-computes features via the batch path, and alerts on divergence.
    (c) Publishes a ''feature health dashboard'' showing skew metrics for all 500 features. **What ''zero
    skew'' actually means:** Not literally identical (floating-point non-determinism exists) but statistically
    equivalent: JSD < 0.001 for all features, validated continuously. **What you tell the VP:** ''We can
    guarantee architectural consistency for the 50 highest-impact features in 6 months, with a monitoring
    framework that catches skew in the remaining 450 within hours. Full migration will take roughly 20
    months.'''
  common_mistake: '**The Pitfall:** Promising zero skew by rewriting all 500 features in a new system
    in 6 months.

    **The Rationale:** This is a 12-18 month project at minimum, and attempting a full rewrite ignores
    the reality of engineering constraints.

    **The Consequence:** The real skill is scoping a phased approach; failing to do so guarantees missed
    deadlines and zero delivered value.'
  napkin_math: '**Assumptions & Constraints:**

    - 50 skewed features take 2 engineer-weeks each.

    - 450 simpler features take 0.5 engineer-weeks each.

    - Team: 4 engineers. Timeframe: 6 months.


    **Calculations:**

    - Top-50 skewed features: 50 * 2 = 100 engineer-weeks = 25 months for 1 engineer = 6.25 months for
    4 engineers.

    - Full 500-feature migration: 450 * 0.5 + 100 = 325 engineer-weeks = 81.25 months for 1 engineer =
    20.3 months for 4 engineers.

    - Revenue recovered by fixing top-50: 50 * 0.001 * $100M = $5M/yr.


    **Conclusion & Interpretation:**

    - **Result: Scope-Bound.** The team can only realistically migrate the top-50 features in the given
    6-month timeframe.'
