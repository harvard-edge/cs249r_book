title: The A10G vs V100 CNN Regression
scenario: 'A cloud vision API processes 4K images using a highly optimized MobileNetV3 (heavy on depthwise
  separable convolutions). To cut costs, you migrate from AWS p3.2xlarge (V100: 130 TFLOPS FP16, 900 GB/s
  bandwidth) to g5.2xlarge (A10G: 250 TFLOPS FP16, 600 GB/s bandwidth). Based on the 92% increase in TFLOPS,
  the team expects a massive speedup. Instead, end-to-end inference latency increases by exactly 50%.'
details:
  realistic_solution: Depthwise separable convolutions have extremely low Arithmetic Intensity (AI). For
    a 3x3 depthwise conv, the AI is roughly 0.5 FLOPs/Byte, placing the workload firmly on the memory-bandwidth
    bound sloped region of the roofline model for both GPUs. Because the workload is completely memory-bound,
    performance is dictated strictly by memory bandwidth, not the compute ceiling. The A10G has 33% less
    memory bandwidth than the V100 (600 GB/s vs 900 GB/s). Therefore, execution time scales inversely
    with bandwidth, resulting in a 50% regression.
  common_mistake: Assuming the new PyTorch version or CUDA drivers on the A10G are unoptimized or lacking
    cuDNN tuning.
  napkin_math: 'Depthwise conv AI: 1 MAC per weight. Total ops for 1 output pixel = 9 MACs (18 FLOPs).
    Memory read = 9 weights + 9 input pixels. At FP16 (2 bytes), that''s ~36 bytes. AI = 18 / 36 = 0.5
    FLOPs/Byte. V100 ridge point = 130,000 GFLOPS / 900 GB/s = 144 FLOPs/Byte. A10G ridge point = 250,000
    GFLOPS / 600 GB/s = 416 FLOPs/Byte. Since 0.5 << 144, both are deeply memory bound. V100 time ~ 1/900.
    A10G time ~ 1/600. Ratio = 900/600 = 1.5x slower.'
