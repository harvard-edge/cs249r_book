title: Capacity Planning Fundamentals
scenario: "Your company plans to double its ML model count from 50 to 100 models over the next year. A VP asks why you cannot simply double the GPU budget."
question: "Why is doubling the GPU budget not enough when model count grows from 50 to 100?"
details:
  realistic_solution: 'Doubling model count does not mean doubling compute needs because: (1) Model heterogeneity: some models need 8 GPUs for training, others need 256. The new 50 models may be larger than the existing 50. (2) Serving vs training split: serving load depends on traffic, not model count. If new models serve 10x more requests, serving GPU needs could 5x. (3) Infrastructure bottlenecks: storage, networking, and scheduling overhead scale super-linearly. At 100 models, checkpoint storms are worse, experiment tracking is more complex, and scheduler contention increases. (4) Peak vs average utilization: more models means more bursty demand patterns that are harder to bin-pack efficiently. (5) Data pipeline scaling: more models means more ETL jobs competing for storage I/O. Capacity planning must forecast at the workload level (per-model training FLOPS, serving QPS, storage), not just model count.'
  common_mistake: |
    **The Pitfall:** Assuming capacity scales linearly with model count.
    **The Rationale:** Stakeholders often view models as identical units of compute, ignoring heterogeneity and the non-linear scaling of shared infrastructure.
    **The Consequence:** The GPU budget is drastically miscalculated, leading to severe resource contention, storage I/O bottlenecks, and checkpoint storms.
  napkin_math: |
    - **Identify heterogeneity:** 50 → 100 models ≠ 2x GPUs.
    - **Analyze scenarios:** If new models are small, scaling might be 1.5x. If new models are massive and serving traffic grows, scaling could be 4x.
    - **Conclusion:** Capacity must be forecasted at the **per-workload level** (training FLOPS, serving QPS, storage), not strictly by model count.
