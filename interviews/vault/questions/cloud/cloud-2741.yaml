title: 'Capacity Planning Fundamentals'
scenario: 'Your company plans to double its ML model count from 50 to 100 models over the next year. A VP asks why you cannot simply double the GPU budget.'
question: 'Why is doubling the GPU budget not enough when model count grows from 50 to 100?'
details:
  realistic_solution: 'Model heterogeneity means models have vastly different sizes. Infrastructure overhead (storage, networking) scales super-linearly. Serving load depends on user traffic, not model count. Capacity planning must forecast per-workload FLOPS, QPS, and storage, not count.'
  common_mistake: |
    **The Pitfall:** Assuming capacity scales linearly with model count.
    **The Rationale:** Stakeholders often view models as identical units of compute, ignoring heterogeneity and the non-linear scaling of shared infrastructure.
    **The Consequence:** The GPU budget is drastically miscalculated, leading to severe resource contention, storage I/O bottlenecks, and checkpoint storms.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Current: 50 models.
       - Target: 100 models.
    2. **Calculations:**
       - New model sizes may be 4x larger on average.
       - Traffic to new models may be 10x higher.
       - Shared infrastructure (like NFS IOPS for checkpoints) degrades non-linearly.
    3. **Conclusion & Interpretation:**
       - **Result: GPU needs scale based on aggregate FLOPS and Memory Bandwidth, not linear model counts. System is Workload-Bound, not Count-Bound.**
