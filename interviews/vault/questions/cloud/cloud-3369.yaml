title: 'A100 Inference Optimization: Encoder-Decoder Tradeoffs for Real-time LLM Deployment'
scenario: Your team is deploying a new large language model (LLM) for real-time customer support summarization and response generation. The inference workload is high-volume and latency-sensitive. You have access to a cluster of NVIDIA A100 GPUs (80 GB HBM2e memory, 312 TFLOPS FP16, 2.0 TB/s memory bandwidth, 400W TDP). Currently, a full encoder-decoder transformer model is being used, but initial tests show unacceptable tail latencies and high operational costs. You need to diagnose the root cause of these issues and propose an optimized architecture considering the given hardware constraints and the need for both summarization (encoder-like task) and generation (decoder-like task).
question: What is causing the A100 tail latency and cost issues, and what architecture would you use for summarization plus response generation?
details:
  realistic_solution: Diagnose the performance bottlenecks by profiling the existing encoder-decoder model on the A100. Evaluate if the summarization task can be effectively handled by a smaller, fine-tuned encoder-only model (e.g., BERT-like) or if the response generation can be served by an optimized decoder-only model (e.g., GPT-like). Consider using a cascaded approach where an encoder-only model first summarizes, then a decoder-only model generates a response. Quantify the memory footprint, FLOPs, and power consumption for each architectural choice (encoder-only, decoder-only, or a more optimized encoder-decoder via distillation/pruning) on the A100 to make an informed decision on cost-performance tradeoffs.
  common_mistake: Automatically defaulting to a full encoder-decoder model for all tasks, even when sub-tasks could be handled more efficiently by specialized encoder-only (e.g., for embeddings/classification/summarization) or decoder-only (e.g., for pure generation) architectures, leading to unnecessary computational overhead and memory usage during inference. This often results in higher latency and cost than necessary.
  napkin_math: "1. **Memory:** A100 80GB. A large encoder-decoder (e.g., 20B params) takes 40GB in FP16, severely limiting batch size. Splitting to a 1B encoder (2GB) and 7B decoder (14GB) saves 24GB VRAM, allowing much larger concurrent batches.\n2. **Throughput:** A100 has 312 TFLOPS FP16. A 20B encoder-decoder (10B encoder, 10B decoder) processing 1000 input tokens and generating 100 tokens takes roughly `(2 * 10B * 1000) + (2 * 10B * 100) = 22 TFLOPs`. Using a 1B encoder and 7B decoder takes `(2 * 1B * 1000) + (2 * 7B * 100) = 3.4 TFLOPs`, a 6.5x reduction in compute per inference.\n3. **Power/Cost:** At 400W TDP, reducing FLOPs by 6.5x and memory pressure by 2.5x directly increases tokens/sec/Watt, allowing the same workload to run on 1 GPU instead of 6, drastically slashing operational costs."
