title: Prefix Caching Trade-offs in Agentic LLM Serving
scenario: You are designing an LLM serving infrastructure using 8x H100 (80GB) GPUs to serve a 70B parameter
  model with Grouped Query Attention (8 KV heads, 128 head dim, 80 layers). Your application is an agentic
  workflow where 90% of requests share a common 4,000-token system prompt, while the user input averages
  500 tokens. You must evaluate whether to implement a global prefix caching mechanism (e.g., RadixAttention)
  on top of PagedAttention. Compare the memory and throughput trade-offs, and determine under what specific
  load conditions the cache management overhead would outweigh its memory benefits.
details:
  realistic_solution: Implement prefix caching for the 90% hit rate scenario, as it saves massive memory.
    Justify the design by showing that 100 concurrent requests without caching would consume ~130GB of
    KV cache just for the system prompt, limiting batch size. With caching, the system prompt takes ~1.3GB.
    The system should include a dynamic fallback or eviction policy that disables caching lookups if the
    hit rate drops below a threshold (e.g., 20%) where the CPU-side radix tree management latency exceeds
    the time saved by avoiding KV recomputation.
  common_mistake: Assuming prefix caching universally improves performance without accounting for radix
    tree lookup latency, cache eviction costs, and the memory fragmentation overhead when the prefix hit
    rate drops or prompts are highly dynamic.
  napkin_math: 'KV cache per token = 2 (K,V) * 2 bytes (FP16) * 8 (KV heads) * 128 (head dim) * 80 (layers)
    = 327,680 bytes (~0.33 MB). System prompt (4,000 tokens) = ~1.3 GB. For 100 concurrent requests: Without
    cache = 130 GB (exceeds single GPU memory, bottlenecking the system). With cache = 1.3 GB total (shared).
    Memory saved = ~128.7 GB, allowing significantly larger batch sizes for user generation.'
