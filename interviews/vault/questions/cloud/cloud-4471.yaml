title: Real-Time Embedding Table Update Consistency Under Training
scenario: A recommendation system trains continuously on real-time user events and
  publishes updated embeddings to serving every 1 minute. During the 1-minute update
  window, serving and training use different embedding versions. Design a consistency
  model.
question: What consistency model would you use when training publishes embedding updates
  every minute but serving may lag?
details:
  realistic_solution: 'Eventual consistency model with version tagging: (1) Training
    writes to a ''shadow'' embedding table, not the live table. (2) At the 1-minute
    publish boundary: training atomically copies updated rows to a publish buffer
    with a new version timestamp V+1. (3) Serving nodes periodically poll for new
    version: ''GET /embeddings/version'' returns current version. If V+1 available:
    serving nodes download the delta (updated rows only) in the background. (4) Serving
    continues using V until it has fully loaded V+1. Hot-swap to V+1 after local download
    completes (1-2 seconds for delta download). (5) During hot-swap gap: serving uses
    V (60 second staleness max). Training was always using V, so training and serving
    are consistent within one version. (6) Feature logging consistency: log the embedding
    version used for each request alongside features. Enable offline A/B analysis
    of version effects.'
  common_mistake: Using a two-phase commit protocol to synchronize training and serving
    on each update. Two-phase commit adds 10-50ms latency to every update, creates
    tight coupling between training and serving systems, and can cause serving stalls
    if the training coordinator is slow.
  napkin_math: 'Delta size per 1-minute update: 1% of rows updated = 0.01 * 10M items
    * 64 * 4B = 25.6MB delta. Download at 1 Gbps: 0.2 seconds. Hot-swap: atomic pointer
    swap = microseconds. Total lag from training write to serving use: ~61 seconds
    (1-minute window + 0.2s download + 0.001s swap). Consistency during download:
    serving uses V for 0.2 seconds while some nodes start using V+1. Acceptable for
    recommendation (no strict consistency needed). Version skew: at most 2 versions
    in flight across serving cluster (some nodes on V, some on V+1). Duration: 0.2
    seconds maximum skew window.'
