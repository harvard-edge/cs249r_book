title: Evaluating Ingestion Schema Validation for High-Throughput Streams
scenario: An ad-tech ML pipeline ingests 500,000 JSON bid requests per second (avg 2KB/request, 1GB/s
  total). Downstream ML models require 50 specific features. Currently, unexpected categorical strings
  cause embedding lookup failures, crashing the feature engineering pipeline and causing consumer lag.
  You must evaluate the trade-offs of enforcing strict JSON schema validation synchronously at the edge
  API gateway versus asynchronously in a stream processing cluster.
details:
  realistic_solution: Migrate to a binary serialization format like Protobuf or Avro to inherently enforce
    structural schema with minimal overhead at the edge. Perform deeper semantic validation (e.g., value
    ranges) asynchronously in the stream processor, routing malformed payloads to a Dead Letter Queue
    (DLQ).
  common_mistake: Proposing strict, synchronous validation of all 50 features at the API gateway, ignoring
    that full JSON schema validation is CPU-intensive and will drastically increase edge latency and compute
    costs.
  napkin_math: Synchronous JSON schema validation taking ~1ms per payload at 500,000 RPS requires 500
    CPU seconds per second (500 dedicated cores). Transitioning to binary parsing (e.g., ~100ns per payload)
    requires only 0.05 CPU seconds per second, reducing edge compute required for structural validation
    by 99.9%.
