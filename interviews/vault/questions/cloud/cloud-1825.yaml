title: Evaluating Ingestion Schema Validation for High-Throughput Streams
scenario: 'An ad-tech ML pipeline ingests 500,000 JSON bid requests per second (avg 2KB/request, 1GB/s total). Downstream ML models require 50 specific features. Currently, unexpected categorical strings cause embedding lookup failures, crashing the feature engineering pipeline.'
question: 'How would you split schema validation between the edge API gateway and stream processor for 500,000 JSON bid requests/sec?'
details:
  realistic_solution: 'Migrate to a binary serialization format like Protobuf or Avro to inherently enforce structural schema with minimal overhead at the edge. Perform deeper semantic validation (e.g., value ranges) asynchronously in the stream processor, routing malformed payloads to a Dead Letter Queue (DLQ).'
  common_mistake: |
    **The Pitfall:** Enforcing strict, synchronous JSON validation at the API gateway.
    **The Rationale:** Engineers instinctively try to catch errors as early as possible at the edge to protect downstream systems.
    **The Consequence:** Full JSON schema validation at this scale requires massive CPU overhead, drastically increasing edge latency and infrastructure costs.
  napkin_math: |
    * **JSON Validation:** ~1ms per payload * 500,000 RPS = 500 CPU seconds per second (requires 500 dedicated cores).
    * **Binary Parsing (Protobuf/Avro):** ~100ns per payload * 500,000 RPS = 0.05 CPU seconds per second.
    * **Result:** Transitioning to binary serialization reduces edge compute required for structural validation by **99.9%**.
