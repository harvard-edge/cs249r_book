title: Graceful Degradation in ML Serving
scenario: Explain why production ML systems need fallback strategies and describe the typical fallback
  hierarchy from most to least sophisticated.
details:
  realistic_solution: 'Production ML systems can fail in multiple ways: model serving errors, latency
    spikes, OOM crashes, or distribution shift causing garbage predictions. Without fallbacks, any failure
    returns errors to users. The typical fallback hierarchy: (1) Primary model — full-complexity production
    model (e.g., 7B parameter LLM). (2) Distilled/smaller model — a lightweight version (e.g., 1B parameter)
    pre-deployed as warm standby. Lower quality but faster and more reliable. (3) Heuristic/rule-based
    system — hand-crafted rules that handle common cases (e.g., ''if product category is X, recommend
    top-5 by sales''). No ML inference needed. (4) Cached responses — return the most recent valid prediction
    for this user/context from a cache. Stale but immediate. (5) Default/static response — hardcoded safe
    default (e.g., show most popular items). Always available. Each level trades prediction quality for
    reliability and latency. The system should detect failure and cascade automatically, with monitoring
    on which level is actively serving.'
  common_mistake: Having only one fallback (or none). A single fallback that also fails leaves users with
    errors. The hierarchy should have at least 3 levels, with the final level being a static response
    that cannot fail.
  napkin_math: 'Primary model: 50ms, 95% quality. Distilled: 10ms, 85% quality. Heuristic: 1ms, 60% quality.
    Cached: <1ms, 70% quality (stale). Default: <1ms, 40% quality.'
