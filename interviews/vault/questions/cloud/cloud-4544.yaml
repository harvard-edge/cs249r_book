title: H100 Serving Inference Wait Time
scenario: An H100 SXM serves a fixed-size embedding model (not LLM-style autoregression) - the service time is genuinely deterministic at 15 ms because all requests have identical compute (a fixed-size sentence-transformer producing a 768-dim embedding). Requests arrive via Poisson at 50 req/s. The deterministic-service assumption is realistic for this fixed-output-size workload, unlike LLM generation.
question: Specify the parameters for an M/D/1 queue and calculate the average time a request spends waiting before execution begins.
details:
  realistic_solution: Arrival rate λ = 50. Service time is 0.015s, so μ = 66.67. Traffic intensity ρ = 50 * 0.015 = 0.75. The M/D/1 queue waiting time formula is (ρ * service_time) / (2 * (1 - ρ)). This yields (0.75 * 15ms) / (2 * 0.25) = 11.25 / 0.5 = 22.5 ms.
  common_mistake: |
    **The Pitfall:** Using the standard M/M/1 wait time formula instead of M/D/1.
    **The Rationale:** M/M/1 is the default in textbooks and assumes exponential service times, but this specific workload has a strictly deterministic service time.
    **The Consequence:** The calculated wait time is incorrectly doubled, leading to severe over-provisioning of hardware to hit hypothetical SLAs.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Poisson arrival rate λ = 50 req/s.
       - Deterministic service time = 0.015s (μ = 66.67 req/s).
    2. **Calculations:**
       - Traffic intensity ρ = 50 * 0.015 = 0.75.
       - M/D/1 queue waiting time: (ρ * service_time) / (2 * (1 - ρ)).
       - (0.75 * 15 ms) / (2 * 0.25) = 11.25 / 0.5 = 22.5 ms.
    3. **Conclusion & Interpretation:**
       - **Result: Queueing Delay Bound.** Average wait time is 22.5 ms.
