title: H100 Serving Inference Wait Time
scenario: An H100 SXM serving an LLM inference API handles requests arriving via a
  Poisson process at 50 req/s. The engine completes a request in exactly 15ms (deterministic
  service).
question: Specify the parameters for an M/D/1 queue and calculate the average time
  a request spends waiting before execution begins.
details:
  realistic_solution: Arrival rate λ = 50. Service time is 0.015s, so μ = 66.67. Traffic
    intensity ρ = 50 * 0.015 = 0.75. The M/D/1 queue waiting time formula is (ρ *
    service_time) / (2 * (1 - ρ)). This yields (0.75 * 15ms) / (2 * 0.25) = 11.25
    / 0.5 = 22.5 ms.
  common_mistake: Using the M/M/1 wait time formula instead of M/D/1, which assumes
    exponential service times and doubles the calculated wait time.
  napkin_math: (0.75 * 15ms) / (2 * (1 - 0.75)) = 11.25 / 0.5 = 22.5 ms
