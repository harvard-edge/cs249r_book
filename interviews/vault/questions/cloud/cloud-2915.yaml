title: Realize MobileNetV2 export pipeline from PyTorch to ONNX to TensorRT
scenario: You need to export a fine-tuned MobileNetV2 (3.4M params) from PyTorch to TensorRT FP16 for deployment on an A100. The model was trained with torch.compile and has custom H-swish activations.
question: Describe the complete export chain from PyTorch to TensorRT FP16 and identify the known failure points at each step.
details:
  realistic_solution: 'Step 1: model.eval() + disable torch.compile. Step 2: ONNX export with dynamic_axes={''input'': {0: ''batch''}, ''output'': {0: ''batch''}} and opset=17. Failure point: custom H-swish (relu6(x+3)/6 × x) — register as onnx custom op or decompose to standard ops. Step 3: onnxsim to simplify graph. Step 4: trtexec --fp16 --minShapes=input:1x3x224x224 --optShapes=input:64x3x224x224 --maxShapes=input:128x3x224x224. Step 5: validate accuracy with 1K images, check max abs diff FP16 vs FP32 < 0.01.'
  common_mistake: |
    **The Pitfall:** Exporting with `torch.onnx.export` without disabling `torch.compile` tracing first.
    **The Rationale:** Compiled IR artifacts embed into the graph, which ONNX cannot parse. Additionally, using a fixed batch size blocks TensorRT's dynamic shapes.
    **The Consequence:** The export fails entirely, or TensorRT creates a rigid engine that crashes when inference batch sizes fluctuate.
  napkin_math: |
    - MobileNetV2 parameters: 3.4M.
    - FP32 model size: 3.4M * 4 bytes = 13.6 MB.
    - FP16 TensorRT engine size: ~6.8 MB + TRT overhead (~50 MB).
    - TRT FP16 speedup for small CNNs: ~3–4x over PyTorch FP32.
    - PyTorch inference time (batch=64): ~8ms. TRT FP16: ~2.5ms.
    - **Throughput per A100: 64 images / 0.0025s = 25,600 images/sec.**
