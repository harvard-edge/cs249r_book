title: Collective Payload Rate
scenario: A training step sends 6 GB of gradients every 2 seconds.
question: What average bandwidth is needed to send 6 GB of gradients every 2 seconds?
details:
  realistic_solution: 'The average bandwidth demand is 3 GB/s. The actual network may need more peak bandwidth depending on whether communication is bursty or overlapped.'
  common_mistake: |
    **The Pitfall:** Dividing by total training time or epoch time.
    **The Rationale:** Candidates forget that communication happens in bursts per step, not uniformly across an epoch.
    **The Consequence:** The calculated bandwidth demand is vastly underestimated, leading to severe network bottlenecks.
  napkin_math: |
    **Assumptions & Constraints:**
    - Gradient payload: 6 GB per step.
    - Communication interval: 2 seconds.

    **Calculations:**
    - Average bandwidth demand = 6 GB / 2 s = 3 GB/s.

    **Conclusion & Interpretation:**
    - **Result: 3 GB/s continuous bandwidth required (Network-Bandwidth Bound)**.
