title: Collective Payload Rate
scenario: A training step sends 6 GB of gradients every 2 seconds. Calculate the average
  gradient communication bandwidth demand.
question: What average bandwidth is needed to send 6 GB of gradients every 2 seconds?
details:
  realistic_solution: The average bandwidth demand is 3 GB/s. The actual network may
    need more peak bandwidth depending on whether communication is bursty or overlapped.
  common_mistake: Dividing by total training time or epoch time instead of the per-step
    communication interval.
  napkin_math: 6 GB / 2 s = 3 GB/s.
