title: Designing a Low-Latency Inference Service on NVIDIA A100 with Strict SLAs
scenario: 'You are designing an inference service for a critical real-time ML model. This model is computationally
  intensive and requires deployment on NVIDIA A100 GPUs, leveraging their 312 TFLOPS (FP16) computational
  power, 80 GB HBM2e memory, and 2.0 TB/s memory bandwidth. Your service must adhere to stringent Service
  Level Agreements (SLAs): P99 latency must be under 100ms and P999 latency under 250ms, even during peak
  load. The service experiences highly variable traffic patterns, often resulting in ''straggler'' requests
  due to network jitter, OS scheduling, or occasional slow GPU inference runs. How would you design the
  system, from hardware selection considerations beyond raw throughput to software architecture and mitigation
  strategies, to consistently meet these tail latency objectives? Consider the implications of the A100''s
  specific characteristics on your design choices.'
question: "How would you design the system, from hardware selection considerations beyond raw throughput to software architecture and mitigation strategies, to consistently meet these tail latency objectives?"
details:
  realistic_solution: 'A realistic solution involves a multi-pronged approach:

    1.  **Hedged Requests:** Implement dual-send or hedged requests where a second identical request is
    sent to another available A100 instance if the first request doesn''t receive a response within a
    predefined, aggressive timeout (e.g., P90 latency target). This effectively mitigates stragglers.

    2.  **Adaptive Batching/Dynamic Batching:** While A100s benefit from larger batches for throughput,
    fixed large batches can increase P99/P999 latency under low load. Implement dynamic batching or adaptive
    batching strategies that adjust batch size based on real-time queue depth and latency metrics to balance
    throughput and tail latency.

    3.  **Dedicated Instance Pools/Sharding:** Isolate critical workloads or use distinct pools of A100s
    for different criticality levels to prevent noisy neighbors. Leverage the A100''s Multi-Instance GPU
    (MIG) capabilities to partition the GPU for different services if fine-grained isolation is needed.

    4.  **Proactive Monitoring & Alerting:** Granular monitoring of tail latencies (P99, P999) across
    the entire request path (client, network, load balancer, inference service, GPU) with automated alerts
    and auto-scaling triggers.

    5.  **Smart Load Balancing:** Employ latency-aware load balancing that routes requests to the least
    loaded (or historically fastest) A100 instances rather than simple round-robin.

    6.  **GPU Scheduling & Prioritization:** Optimize CUDA stream usage and potentially explore custom
    GPU schedulers to prioritize critical inference requests on the A100, ensuring the 2.0 TB/s memory
    bandwidth is efficiently utilized without contention for high-priority tasks.'
  common_mistake: A common mistake is to focus solely on average (P50) latency or raw throughput benchmarks,
    underestimating the impact of straggler requests on P99/P999 metrics. Teams often neglect implementing
    robust hedging mechanisms or fail to account for network/system noise that disproportionately affects
    tail latencies, assuming that fast individual inference times on the A100 automatically translate
    to good tail latency for the entire service.
  napkin_math: If a service needs to process 10,000 requests per second (RPS) and the target P99 latency
    is 100ms, this means only 100 requests per second can exceed 100ms. If 1% of requests are stragglers
    taking 500ms and the average inference time on a single A100 is 20ms, then a simple 1:1 request-to-GPU
    mapping will fail the SLA. With hedged requests, if the primary request takes 20ms (P50) and a hedged
    request is sent at 50ms (P90 timeout), and the secondary instance responds in 20ms, the effective
    latency for a straggler from the primary is now 70ms (50ms + 20ms), significantly reducing tail latency.
    Assuming each A100 instance can handle ~500 RPS at target latency, achieving 10,000 RPS with hedging
    might require provisioning 20 primary A100s and an additional pool of ~5-10 for hedged requests, depending
    on the straggler rate and overlap.
