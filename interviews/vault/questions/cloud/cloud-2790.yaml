title: Cloud New 0003
scenario: You are designing an asynchronous checkpointing architecture for a 175B model training continuously on 256 H100 80GB GPUs. Node failures are frequent.
question: "How would you design asynchronous checkpointing for a 175B model on 256 H100s without stalling training?"
details:
  realistic_solution: Architect a multi-tiered async checkpointing system. Introduce a dedicated CPU thread per node that pins a region of host memory. During training, GPUs copy state asynchronously via PCIe Gen4 to pinned host memory. A background process then streams this data to durable distributed storage. Use NVMe SSDs as a middle tier. Implement ring-buffer versioning so training immediately proceeds once the PCIe transfer completes, hiding the slow object storage network I/O.
  common_mistake: |
    **The Pitfall:** Blocking the main training loop to write directly to network storage.
    **The Rationale:** It is the simplest synchronization method to guarantee a durably saved checkpoint.
    **The Consequence:** The massive 989 TFLOPS compute engines are idled for several minutes per checkpoint, destroying training efficiency.
  napkin_math: |
    - 175B model state = 16 bytes/param = 2.8TB total.
    - Across 256 GPUs, each H100 holds ~11GB of state.
    - PCIe Gen4 runs at ~32GB/s.
    - **GPU to Host RAM transfer takes 11 GB / 32 GB/s = ~0.34 seconds, fully hiding the network sync.**
