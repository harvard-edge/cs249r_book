title: Analyzing Training Time Overhead of Gradient Checkpointing
scenario: You are monitoring a model training job on a single A100 GPU. Without gradient checkpointing, a single training step takes 300ms, divided into 100ms for the forward pass and 200ms for the backward pass. When the team enables full gradient checkpointing to reduce memory usage, the activation memory footprint drops drastically, but the total time for a single training step increases to exactly 400ms.
question: Why does full gradient checkpointing add exactly 100 ms to the training step, and what compute-memory tradeoff causes it?
details:
  realistic_solution: The exact 100ms increase occurs because full gradient checkpointing discards intermediate activations during the initial forward pass to save memory. During the backward pass, these activations are required to compute gradients, so the GPU must recompute the forward pass from the saved checkpoints. Since the original forward pass takes 100ms, recomputing it adds exactly 100ms of pure compute time. The tradeoff is burning additional compute cycles to significantly reduce peak HBM capacity requirements.
  common_mistake: |
    **The Pitfall:** Assuming the overhead comes from data transfer or synchronization.
    **The Rationale:** Engineers guess that moving checkpoints between CPU and GPU, or general framework overhead, adds the extra latency.
    **The Consequence:** They fail to understand that gradient checkpointing explicitly drops activations and must perform mathematical recomputation during the backward phase.
  napkin_math: |
    1. **Original Step Time:** Forward Time (100ms) + Backward Time (200ms) = 300ms.
    2. **Checkpointed Step Time:** Forward Time (100ms) + Recompute Forward Time (100ms) + Backward Time (200ms) = 400ms.
    3. **Total Overhead:** 400ms - 300ms = **100ms**. This exactly equals 1× Forward Time.
