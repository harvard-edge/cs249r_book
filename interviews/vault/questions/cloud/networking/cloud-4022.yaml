title: Victim Flow Starvation Under PFC
scenario: On a 64-GPU cluster, a checkpoint save operation writes 192GB from each GPU to a remote NFS server over the same RoCE fabric used for training. During checkpointing, AllReduce throughput drops by 70%, even though checkpoint traffic uses only 15% of total fabric bandwidth. Priority Flow Control (PFC) is enabled on all ports.
question: Why does checkpoint traffic using only 15% of fabric bandwidth cause a 70% AllReduce throughput drop with PFC enabled?
details:
  realistic_solution: 'The root cause is PFC''s per-priority granularity combined with shared priority classes, not the checkpoint consuming most of the fabric. Both checkpoint storage traffic and AllReduce training traffic use the same RoCE priority. When checkpoint traffic causes congestion near the NFS server''s ToR, PFC pause frames propagate backward and pause the whole shared priority class on affected ports. That can starve unrelated AllReduce flows even when checkpoint traffic averages only 15% of total fabric bandwidth. Fix: (1) Assign checkpoint traffic to a separate PFC priority class. (2) Rate-limit checkpoint traffic below pause-triggering bursts. (3) Use separate VLANs or fabric isolation where practical.'
  common_mistake: |
    **The Pitfall:** Assuming bandwidth saturation is the only metric that causes network interference.
    **The Rationale:** If a workload is only using 15% of link capacity, engineers assume there is plenty of room for other traffic.
    **The Consequence:** Priority Flow Control acts per-priority, not per-flow. The shared priority class means congestion from storage traffic completely pauses unrelated training traffic, creating the classic "victim flow" starvation.
  napkin_math: |
    **Assumptions & Constraints:**
    - 64 GPUs writing 192GB each (checkpoint).
    - 8 x 400G uplinks to storage (400 GB/s aggregate).
    - Checkpoint traffic averages 15% of total fabric bandwidth, but shares a PFC priority with AllReduce.

    **Calculations:**
    - Total checkpoint size: 64 GPUs * 192GB = 12.3 TB total.
    - Write time: 12.288TB / 400GB/s = 30.72 seconds.
    - Iterations overlapping the checkpoint at 100ms/iteration: 30.72s / 0.1s = 307 iterations.
    - Equivalent lost productive training time during that window: 0.70 * 30.72s = 21.5 seconds of step-time capacity.
    - The 15% average fabric share does not cap the damage, because PFC pause is applied to the shared priority class on affected ports rather than only to checkpoint flows.

    **Conclusion & Interpretation:**
    - **Result: A 30.7s checkpoint window can impose about 21.5s of equivalent lost productive training time at 70% throughput loss (PFC-Victim-Flow-Bound)**. Low average checkpoint bandwidth can still trigger pause storms that halt unrelated AllReduce traffic in the same priority class.
