title: The Topology Trap
scenario: Your team is implementing a very large Language Model using Pipeline Parallelism on a cluster of 64 GPUs across 8 nodes. You've observed that despite having 100Gbps interconnects, the pipeline stalls frequently, and throughput is lower than expected due to a suboptimal network topology for this communication pattern.
question: Which common network topology might be causing this, and which would you prefer for pipeline parallelism, and why?
details:
  realistic_solution: 'Pipeline parallelism involves a sequential dependency where each stage computes its part of the model and sends activations to the next stage. This chain-like communication pattern must map perfectly to the physical topology to avoid crossing slow inter-node links unnecessarily.'
  common_mistake: |
    **The Pitfall:** Assuming all high-bandwidth networks are equally good and blaming software for stalls.
    **The Rationale:** Engineers often look at raw bandwidth (e.g., 100Gbps) without considering the logical topology and communication patterns of Pipeline Parallelism.
    **The Consequence:** Pipeline stages block heavily on inter-node communication, cratering end-to-end throughput.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Interconnect: 100 Gbps (12.5 GB/s).
       - Pipeline: 8 stages, mapped 1 stage per node.
       - Activation shape: B=16, seq=2048, hidden=4096, FP16 (2 bytes).
    2. **Calculations:**
       - Activation size = 16 * 2048 * 4096 * 2 bytes = 268.4 MB.
       - Transfer time per stage boundary = 268.4 MB / 12.5 GB/s = 21.5 ms.
    3. **Conclusion & Interpretation:**
       - **Result: Network-Bound (Latency).** With Pipeline Parallelism, sequential 21.5ms inter-node stalls accumulate across boundaries, significantly degrading throughput.
