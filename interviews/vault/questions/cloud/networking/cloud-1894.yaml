title: Evaluating SR-IOV vs Virtio for RoCEv2
scenario: You are architecting a multi-tenant Kubernetes cluster for distributed LLM training using H100 nodes. Each node has 4x 400Gbps ConnectX-7 NICs. The platform team proposes virtio-net for container networking to simplify IPAM and security policies.
question: Should the RoCEv2 fabric use virtio-net or SR-IOV, and why?
details:
  realistic_solution: Use SR-IOV, or an equivalent RDMA-capable passthrough design, for the RoCEv2 data path. Virtio-net can be useful for ordinary tenant networking, but it does not provide the native NIC RDMA path needed for low-latency RoCEv2 collectives. SR-IOV exposes NIC VFs to the guest or Pod networking stack so the RDMA device plugin and verbs stack can preserve hardware RDMA semantics, subject to correct container and driver configuration.
  common_mistake: |
    **The Pitfall:** Focusing solely on the slight bandwidth overhead of virtio.
    **The Rationale:** Candidates miss that virtio-net prevents hardware RDMA (RoCEv2) from functioning natively.
    **The Consequence:** Traffic is forced through the host CPU, consuming 80 cores and fundamentally breaking the high-speed fabric.
  napkin_math: |
    **Assumptions & Constraints:**
    - Fabric Bandwidth: 4 * 400 Gbps = 1.6 Tbps.
    - TCP Overhead: ~1 CPU core per 20 Gbps.

    **Calculations:**
    - Cores Required (Virtio): 1,600 Gbps / 20 Gbps = 80 host CPU cores.
    - Latency (Virtio/TCP): ~50 us per hop.
    - Latency (SR-IOV/RDMA): ~2 us per hop (0 CPU cores used).

    **Conclusion & Interpretation:**
    - **Result: 80 cores saved, 25x lower latency (CPU-Bound (if virtio))**. SR-IOV is mandatory for 400G saturation.
