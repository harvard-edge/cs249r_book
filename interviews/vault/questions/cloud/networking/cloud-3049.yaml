title: 'Network Bandwidth Bottlenecks: Realize PCIe Bandwidth Impact on Model Checkpointing'
scenario: You need to concretely size the PCIe bandwidth impact on checkpointing a 70B FP16 model from 8 GPUs to NVMe SSDs via CPU.
question: How long does checkpointing a 70B FP16 model from 8 GPUs through PCIe 5.0 to NVMe take, and can it be hidden during training?
details:
  realistic_solution: 70B FP16 is 140GB total, or 17.5GB from each of 8 GPUs. PCIe 5.0 x16 can move about 32GB/s in one direction per GPU, so the per-GPU PCIe copy would be 17.5/32 = 0.55s if nothing else bottlenecked. With all 8 GPUs copying at once, the CPU memory subsystem must absorb up to 256GB/s, so a 100GB/s CPU memory path bottlenecks the GPU-to-CPU staging at 140/100 = 1.4s. A single 3.5GB/s NVMe write then takes 140/3.5 = 40s, so the end-to-end checkpoint duration is about 41.4s. If checkpointing is synchronous every 1000 steps at 100ms/step, the visible overhead is about 41.4s/100s = 41%. If the system stages to CPU RAM or /dev/shm in about 1.4s and flushes to NVMe asynchronously, the visible training stall can be near 1.4s as long as the 40s background write completes before the next checkpoint interval; otherwise the async queue backs up.
  common_mistake: |
    **The Pitfall:** Assuming checkpointing is embarrassingly parallel across the PCIe links.
    **The Rationale:** Multiplying 8 GPUs by 64GB/s and assuming a massive 512GB/s transfer rate, completely forgetting the CPU memory bandwidth bottleneck.
    **The Consequence:** Vastly underestimating checkpoint latency and failing to implement asynchronous checkpointing, leading to massive training stalls.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model Size: 70B FP16 = 140GB total (17.5GB per GPU across 8 GPUs).
    - 8 GPUs simultaneously push data to CPU DDR5 RAM. CPU DDR5 bandwidth is the bottleneck at 100GB/s.
    - NVMe write speed is ~3.5GB/s. Checkpointing every 1000 steps (100ms each = 100s of training).

    **Calculations:**
    - Transfer Time to CPU: 140GB / 100GB/s = 1.4s.
    - CPU to single NVMe: 140GB / 3.5GB/s = 40s.
    - End-to-end synchronous checkpoint duration: 1.4s + 40s = 41.4s.
    - Synchronous overhead: 41.4s checkpoint / 100s training interval = 41.4% overhead.
    - Async staging model: visible stall can be the 1.4s GPU-to-CPU stage, while the 40s NVMe flush overlaps with the next 100s of training.
    - 8 shards to 8 NVMe SSDs in parallel: 8 * 3.5 = 28GB/s, so the flush is 140GB / 28GB/s = 5s.

    **Conclusion & Interpretation:**
    - **Result: ~41.4s end-to-end on a single NVMe if synchronous.** It can be mostly hidden only with asynchronous staging and enough memory/I/O capacity for the background flush to finish before the next checkpoint; otherwise the training-visible overhead approaches the full checkpoint duration.
