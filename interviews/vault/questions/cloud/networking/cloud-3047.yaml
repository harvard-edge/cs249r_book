title: '32-GPU 7B DDP: NVLink vs 200Gb/s InfiniBand AllReduce Bottleneck'
scenario: 'A 32-GPU training job (4 DGX nodes, H100) shows low GPU utilization (target: >85%) during data-parallel training of a 7B model. Profiling shows >90% of step time is in AllReduce.'
question: For the 32-GPU 7B data-parallel job, is NVLink or 200Gb/s InfiniBand the bottleneck, and how would you fix it?
details:
  realistic_solution: 'AllReduce bottleneck: 7B model, 32 GPUs. Gradient size: 7B * 2 bytes = 14GB. Ring AllReduce data per GPU: 2 * 31/32 * 14GB = 27.1GB. Intra-node NVLink at about 900GB/s is not the limiter for the 8 GPUs inside each DGX. The inter-node path crosses 200Gb/s InfiniBand, or about 25GB/s per GPU, so the IB-bound AllReduce time is 27.1GB / 25GB/s = 1.08s per step. If compute is about 100ms, the communication fraction of compute+communication is 1.08 / (1.08 + 0.10) = 91.5%. Fix the bottleneck by reducing inter-node DDP volume: add tensor parallelism within each node, use sharded data parallelism or reduce-scatter, increase gradient accumulation only when the larger effective batch is acceptable, or upgrade the inter-node fabric.'
  common_mistake: |
    **The Pitfall:** Assuming the Ring AllReduce transfers Total_Size / N data or blaming NVLink.
    **The Rationale:** Candidates don't realize Ring AllReduce transfers ~2x the total size, and they confuse intra-node labels with inter-node limits.
    **The Consequence:** Chasing the wrong bottleneck and failing to apply Tensor Parallelism or Gradient Accumulation.
  napkin_math: |
    **Assumptions & Constraints:**
    - 32 GPUs, 7B model.
    - Gradient Size: 7B * 2 bytes = 14 GB.
    - NVLink is intra-node; 200 Gbps InfiniBand (25 GB/s) is the inter-node path.
    - Compute estimate for denominator: 0.1s per step.

    **Calculations:**
    - Ring AllReduce volume per GPU: 2 * (31/32) * 14 GB = 27.1 GB/GPU.
    - InfiniBand transfer time: 27.1 GB / 25 GB/s = 1.08s.
    - Communication fraction of compute + communication: 1.08s / (0.1s + 1.08s) = 91.5%.

    **Conclusion & Interpretation:**
    - **Result: 91.5% Inter-Node Communication Fraction.** NVLink is not the bottleneck; pure DDP over 25GB/s InfiniBand links is, so the fix must reduce or speed up inter-node gradient traffic.
