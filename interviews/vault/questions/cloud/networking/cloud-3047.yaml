title: 'Network Bandwidth Bottlenecks: Diagnose Bandwidth Bottleneck in Multi-Node Training'
scenario: 'A 32-GPU training job (4 DGX nodes, H100) shows low GPU utilization (target: >85%) during data-parallel training of a 7B model. Profiling shows >90% of step time is in AllReduce.'
question: For the 32-GPU 7B data-parallel job, is NVLink or 200Gb/s InfiniBand the bottleneck, and how would you fix it?
details:
  realistic_solution: 'AllReduce bottleneck: 7B model, 32 GPUs. Gradient size: 7B * 2B = 14GB. Ring AllReduce data per GPU: 2 * 31/32 * 14GB = 27.1GB. Intra-node: NVLink 900GB/s -> negligible. Inter-node: GPUs exchange via IB 25GB/s per GPU. AllReduce over IB: 27.1GB / 25GB/s = 1.08s per step. Compute: 7B fwd+bwd on H100: ~100ms. AllReduce fraction: 1.08 / 1.18 = 91.5%. Fix: Pure DDP communication is far too large for 25GB/s links. We must reduce communication volume by adding Tensor Parallelism (TP=8) to divide the parameter size per DP rank by 8, or use Gradient Accumulation to amortize the 1.08s over many micro-batches (e.g., 10 micro-batches drops overhead to <10%).'
  common_mistake: |
    **The Pitfall:** Assuming the Ring AllReduce transfers Total_Size / N data or blaming NVLink.
    **The Rationale:** Candidates don't realize Ring AllReduce transfers ~2x the total size, and they confuse intra-node labels with inter-node limits.
    **The Consequence:** Chasing the wrong bottleneck and failing to apply Tensor Parallelism or Gradient Accumulation.
  napkin_math: |
    **Assumptions & Constraints:**
    - 32 GPUs, 7B model.
    - Gradient Size: 7B * 2 bytes = 14 GB.
    - IB Bandwidth: 200 Gbps (25 GB/s).

    **Calculations:**
    - Ring AllReduce Vol: 2 * (31/32) * 14 GB = 27.1 GB/GPU.
    - Transfer Time: 27.1 GB / 25 GB/s = 1.08s.
    - Overhead: 1.08s / (0.1s + 1.08s) = 91.5%.

    **Conclusion & Interpretation:**
    - **Result: 91.5% Overhead (Interconnect-Bound)**. Pure DDP over 25GB/s links creates a 91.5% communication overhead; TP or Gradient Accumulation is required.
