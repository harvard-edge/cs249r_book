title: The TCP/IP CPU Overhead
scenario: You are training a model across 64 GPUs on AWS using standard 100 Gbps Ethernet (TCP/IP). You notice the GPUs are only running at 60% utilization. You look at the host CPU, and all 48 CPU cores are pinned at 100% utilization during the AllReduce phase.
question: "What is the CPU doing that is bottlenecking a 100 Gbps network during the AllReduce phase?"
details:
  realistic_solution: 'The CPU is processing the TCP/IP protocol stack. At 100 Gbps with 1500-byte MTU, the kernel must handle 8.3 million packets per second. Each packet requires header parsing, checksum validation, socket buffer allocation, and memory copies. The fix is RDMA (InfiniBand or RoCEv2), which bypasses the CPU entirely via hardware-level DMA.'
  common_mistake: |
    **The Pitfall:** Assuming the CPU is performing the actual AllReduce addition math.
    **The Rationale:** Candidates know AllReduce requires arithmetic and erroneously assume the CPU is doing it, forgetting that GPUs handle the mathematical reduction.
    **The Consequence:** Misdiagnosing the networking bottleneck, leading to ineffective solutions instead of upgrading to an RDMA (kernel-bypass) interconnect.
  napkin_math: |
    **Assumptions & Constraints:**
    - 100 Gbps Ethernet = 12.5 GB/s.
    - 1500-byte MTU, 2μs per packet CPU overhead.

    **Calculations:**
    - 12.5 GB/s / 1500 bytes = 8.3 million packets/sec.
    - CPU time = 8.3 million * 2μs = 16.6 CPU-core-seconds per second.

    **Conclusion & Interpretation:**
    - **Result: 16.6 CPU-core-seconds (CPU-Bound mitigation)**. This pins ~17 CPU cores at 100% continuously, creating severe backpressure.
