title: H100 Cluster Congestion Control with DCQCN
scenario: You are designing a distributed training system for a large language model on a cluster of NVIDIA H100 GPUs. During all-reduce operations across 128 H100 GPUs, you observe significant tail latency and reduced effective bandwidth, well below the theoretical HBM3 capability, despite the network fabric reporting high utilization. Investigations point to incast congestion at aggregation points within the network.
question: How would you apply DCQCN to reduce incast during 128-H100 all-reduce, and estimate per-H100 network throughput?
details:
  realistic_solution: |
    A realistic solution involves enabling DCQCN across the RoCE NIC and switch fabric, not on the H100 HBM subsystem. Switches mark ECN when queues cross thresholds; receivers generate CNP feedback; sender NICs then rate-limit and recover according to the DCQCN algorithm. This reduces incast loss and tail latency during all-reduce, but it estimates and improves effective network throughput. It does not increase the H100's physical HBM3 bandwidth.
  common_mistake: |
    **The Pitfall:** Relying solely on network-level QoS policies.
    **The Rationale:** Candidates often suggest static QoS or simple PFC (Priority-based Flow Control) without considering end-to-end, dynamic flow control mechanisms (like DCQCN) that proactively adjust sending rates based on congestion feedback.
    **The Consequence:** PFC pause frames cascade, creating head-of-line blocking and severe tail latency degradation during massive incast events.
  napkin_math: |
    **Assumptions & Constraints:**
    - Each H100 host has one 400 Gbps RoCE NIC.
    - 128 H100s participate in all-reduce.
    - Congestion currently yields 70% effective NIC throughput; tuned DCQCN targets 90% without persistent PFC pause.

    **Calculations:**
    - Per-H100 network throughput before tuning = 400 Gbps * 0.70 = 280 Gbps, or 35 GB/s.
    - Per-H100 network throughput after tuning = 400 Gbps * 0.90 = 360 Gbps, or 45 GB/s.
    - Improvement = (360 - 280) / 280 = about 28.6%.

    **Conclusion & Interpretation:**
    - **Result: 45 GB/s effective network throughput per H100.** DCQCN can improve network delivery under incast, but HBM3 bandwidth remains a separate on-GPU memory property.
