title: FP16 Activation Payload for Five LLM Layers
scenario: You need to size a tensor payload from a 70B LLM with hidden size 8192. Operators request full FP16 activations from 5 specific layers for a batch of 16 sequences, each 1024 tokens long.
question: How large is the FP16 activation payload for 5 layers with batch size 16, sequence length 1024, and hidden size 8192?
details:
  realistic_solution: Each layer is 16 × 1024 × 8192 FP16 values, or 256 MiB. Across 5 layers, the activation payload is 1.25 GiB, about 1.34 GB.
  common_mistake: |
    **The Pitfall:** Failing to account for the batch size and sequence length dimensions when sizing the activation payload.
    **The Rationale:** Activation tensors scale multiplicatively with batch size, sequence length, hidden size, and bytes per value.
    **The Consequence:** The payload is underestimated by orders of magnitude, making the observability path look cheaper than it is.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Layers: 5. Batch Size: 16. Sequence Length: 1024.
       - Hidden Dimension: 8192. Precision: FP16 (2 bytes).
    2. **Calculations:**
       - Single layer footprint: 16 × 1024 × 8192 × 2 bytes = 268,435,456 bytes (256 MiB).
       - Total payload for 5 layers: 256 MiB × 5 = 1280 MiB (1.25 GiB).
    3. **Conclusion & Interpretation:** **Payload is 1.25 GiB, so this is a large activation-transfer payload even before any transport overhead.**
