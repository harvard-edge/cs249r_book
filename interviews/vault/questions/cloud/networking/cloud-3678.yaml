title: ECMP Hashing Imbalance in All-Reduce Traffic
scenario: You have a 256-GPU H100 cluster running ring all-reduce over 400 GbE. During training, you observe 3× variance in step times across runs. Network telemetry shows some spine switches at 92% utilization while others sit at 15%. Your flows use ECMP load balancing.
question: What is the root cause of the ECMP hashing imbalance, and how do you fix it?
details:
  realistic_solution: |
    The root cause is flow polarization: fixed GPU-pair all-reduce flows have low ECMP entropy, so many elephant flows hash onto the same spine while other paths stay underused. Fix the path selection rather than spraying RoCE packets blindly. Add entropy that the ECMP hash can use, use supported flowlet switching or adaptive routing, rebalance RDMA queue pairs across paths, and verify DCQCN/ECN is controlling congestion once traffic is spread.
  common_mistake: |
    **The Pitfall:** Assuming ECMP distributes large elephant flows evenly.
    **The Rationale:** ECMP uses a hash of the 4-tuple; all-reduce flows from fixed GPU pairs hash to the same spine switch.
    **The Consequence:** Creating persistent hotspots regardless of other paths being free.
  napkin_math: |
    **Assumptions & Constraints:**
    - 256 GPUs × 400 Gbps = 102.4 Tbps aggregate.
    - 16 spine switches, 128 concurrent ring all-reduce flows.

    **Calculations:**
    - Ideal load if hashes are even: 128 / 16 = 8 flows per spine.
    - Observed utilization ratio: 92% / 15% = 6.1x between hot and cold spines.
    - That spread cannot be explained by total offered load alone; it indicates persistent path polarization from the ECMP hash.

    **Conclusion & Interpretation:**
    - **Result: Hash-Polarization Bound**. The fix is better entropy or supported adaptive/flowlet routing for RoCE traffic, not unsafe per-packet spraying.
