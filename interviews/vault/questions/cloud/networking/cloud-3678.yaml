title: ECMP Hashing Imbalance in All-Reduce Traffic
scenario: 'You have a 256-GPU H100 cluster running ring all-reduce over 400 GbE. During training, you observe 3× variance in step times across runs. Network telemetry shows some spine switches at 92% utilization while others sit at 15%. Your flows use ECMP load balancing.'
question: 'What is the root cause of the ECMP hashing imbalance, and how do you fix it?'
details:
  realistic_solution: |
    Switch to packet-spraying (per-packet ECMP or RoCEv2 with flow-level ECMP) combined with DCQCN for congestion control. Alternatively, use RDMA with explicit path selection (adaptive routing) available on modern Spectrum-3/Quantum-2 InfiniBand switches. Add flowlet switching with a 500µs idle timeout to break large flows into independently-routed sub-flows.
  common_mistake: |
    Assuming ECMP distributes large elephant flows evenly. ECMP uses a hash of (src_ip, dst_ip, src_port, dst_port) — all-reduce flows from fixed GPU pairs hash to the same spine switch, creating persistent hotspots regardless of other paths being free.
  napkin_math: |
    **Assumptions & Constraints:**
    - 256 GPUs × 400 Gbps = 102.4 Tbps aggregate.
    - 16 spine switches, 128 concurrent ring all-reduce flows.

    **Calculations:**
    - Ideal flows per spine: 128 / 16 = 8 flows.
    - Expected max load (birthday problem): 128/16 * (1 + sqrt(ln(16)/2)) ≈ 17.4 flows/spine.
    - Overload: 17.4 / 8 = 217% of ideal load.

    **Conclusion & Interpretation:**
    - **Result: 17.4 flows/spine (Collision-Bound)**. ECMP causes massive hashing collisions; packet-spraying or flowlet switching is required.
