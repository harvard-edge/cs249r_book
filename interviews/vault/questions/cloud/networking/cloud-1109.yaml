title: 'Diagnosing PFC Storms in DCQCN'
scenario: 'A 400Gbps RoCEv2 GPU cluster running a large-scale All-to-All collective experiences severe latency degradation due to PFC (Priority Flow Control) pause frames. DCQCN is enabled. Switch buffer is 32MB per port. ECN K_min is set to 5MB, K_max to 15MB, and the PFC threshold is 20MB. Despite DCQCN being active, PFC storms persist during incast microbursts.'
question: 'How do you analyze why DCQCN is failing to prevent PFC triggering during incast microbursts?'
details:
  realistic_solution: 'Analyze the ECN-to-PFC buffer gap against the Bandwidth-Delay Product (BDP) of the congestion control loop. During a 64-node incast, the buffer fills faster than the time it takes for a Congestion Notification Packet (CNP) to reach the sender and take effect. The solution is to lower K_min/K_max or increase the PFC threshold.'
  common_mistake: |
    **The Pitfall:** Blaming faulty switch hardware or assuming DCQCN prevents all congestion mathematically.
    **The Rationale:** DCQCN is designed specifically to prevent PFC, so when PFC occurs, engineers assume a configuration or hardware bug.
    **The Consequence:** The physical limits of the network's control loop RTT and the buffer fill rate are ignored, leading to fruitless hardware debugging rather than tuning K_min/K_max thresholds.
  napkin_math: |
    **Assumptions & Constraints:**
    - 400 Gbps = 50 GB/s egress rate per port.
    - 64-node incast.
    - ECN K_min is 5MB, PFC threshold is 20MB.

    **Calculations:**
    - Incast arrival rate: 64 * 50 = 3,200 GB/s.
    - Net buffer fill rate: 3,200 - 50 = 3,150 GB/s.
    - Buffer gap: Gap from 5MB to 20MB is 15MB.
    - Time to fill gap: 15MB / 3150 GB/s ≈ 4.76 microseconds.

    **Conclusion & Interpretation:**
    - **Result: 4.76 microseconds (Network-Bound)**. If the control loop RTT is ~5µs, the buffer hits the PFC threshold before senders receive the throttle signal.
