title: Rail-Optimized DP Topology Bandwidth
scenario: You are training a model on a 64-node cluster (8x GPUs/node) using an 8-rail 400Gbps InfiniBand network. The ToR (leaf) switches connect GPUs of the same local index across nodes, but the spine connecting different rails is 4:1 oversubscribed. You use TP=1, PP=8, DP=64.
question: For TP=1, PP=8, DP=64 on a 4:1 oversubscribed spine, what is the effective per-GPU gradient sync bandwidth for naive versus rail-optimized placement?
details:
  realistic_solution: Pin each pipeline stage to a specific local GPU index (e.g., PP stage 0 always on GPU 0 across all nodes). This confines the 64-way DP AllReduce traffic for each stage entirely within its dedicated non-blocking leaf switch.
  common_mistake: |
    **The Pitfall:** Placing pipeline stages arbitrarily across local GPU indices.
    **The Rationale:** Candidates assume the network is a flat, non-blocking fabric and ignore the physical topology of multi-rail clusters.
    **The Consequence:** Data Parallel AllReduce traffic is forced through the oversubscribed spine switches, severely bottlenecking gradient synchronization.
  napkin_math: |
    **Assumptions & Constraints:**
    - 8-rail 400Gbps IB network (50 GB/s per rail).
    - Spine is 4:1 oversubscribed.
    - TP=1, PP=8, DP=64.

    **Calculations:**
    - Spine bandwidth = 400 Gbps / 4 = 100 Gbps (12.5 GB/s).
    - Naive Placement: DP traffic randomly crosses rails via the spine, limited to 12.5 GB/s.
    - Rail-Optimized Placement: Pin each pipeline stage to a specific local GPU index, confining traffic to the leaf switch.

    **Conclusion & Interpretation:**
    - **Result: 50 GB/s (Network-Bound)**. Rail-optimized effective bandwidth = 400 Gbps (50 GB/s), a 4x throughput speedup over naive placement.
