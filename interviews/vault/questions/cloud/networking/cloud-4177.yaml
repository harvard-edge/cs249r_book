title: InfiniBand vs RoCE v2 for ML Training
scenario: Your team must choose between InfiniBand NDR (400 Gbps) and RoCE v2 (400 GbE) for a 256-GPU training cluster. Both offer 50 GB/s raw bandwidth.
question: What is the ring AllReduce time for a 1 GB buffer on 256 GPUs over 400 Gbps links?
details:
  realistic_solution: Ring AllReduce on 256 GPUs at 50 GB/s takes T = 2 * (N-1)/N * Size / Bandwidth. T = 2 * (255/256) * 1 GB / 50 GB/s = 39.8ms. While raw bandwidth matches, RoCEv2 without careful PFC/ECN tuning suffers severe latency spikes under congestion compared to InfiniBand.
  common_mistake: |
    **The Pitfall:** Treating InfiniBand and RoCE as strictly equivalent because they share the same bandwidth and RDMA verbs API.
    **The Rationale:** Engineers often focus solely on link speed, ignoring fundamental differences in congestion control and lossless fabric requirements at scale.
    **The Consequence:** RoCE v2 deployments at scale without careful PFC/ECN tuning suffer severe latency spikes, breaking communication overlap and stalling training.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Bandwidth: 400 Gbps = 50 GB/s.
       - GPUs (N): 256.
       - Data Size: 1 GB.
    2. **Calculations:**
       - T = 2 * (N-1)/N * Size / Bandwidth.
       - T = 2 * (255/256) * 1 GB / 50 GB/s.
       - T = (510 / 12800) s = 0.03984 s = 39.8 ms.
    3. **Conclusion & Interpretation:**
       - **Result: 39.8 ms ring AllReduce time.** (Network-Bound)
