title: Congestion Control at 800G and Beyond
scenario: Next-generation ML clusters will use 800Gbps links. At 800Gbps with 4KB packets, the inter-packet gap shrinks to ~41ns.
question: Can PFC, DCQCN, and ECN scale to 800Gbps links with 4KB packets, or is a fundamental redesign needed?
details:
  realistic_solution: 'The bandwidth-delay product doubles at 800G while switch buffers grow slowly (~2x per 2-3 generations). At 800Gbps: BDP = 800 Gbps * 5µs RTT = 500 KB per flow. Switch buffers: current Tomahawk-5 has 132MB, next-gen may have 200MB. The ratio is manageable for now. Key challenges: (1) PFC reaction time: PFC pause propagation takes 2-3µs; at 800G, 200-300 KB drains during this time — PFC headroom must double. (2) ECN marking: 800G with 4KB packets = 24.4M packets/sec per port, requiring faster ASIC pipelines (already at physical limits). (3) DCQCN: CNP generation rate may need to increase since flows fill buffers faster. Verdict: current mechanisms can scale to 800G with parameter tuning (double PFC headroom, halve ECN thresholds), but 1.6T links will likely require credit-based flow control (like InfiniBand) or in-network congestion signaling (programmable switches with P4). Ultra Ethernet Consortium is already defining these next-gen protocols.'
  common_mistake: |
    **The Pitfall:** Assuming linear hardware scaling solves networking physics.
    **The Rationale:** Candidates assume that simply doubling buffer sizes will automatically accommodate doubled link speeds.
    **The Consequence:** Ignoring that protocol reaction times (like PFC propagation or RTT) remain constant in absolute time, meaning buffers drain twice as fast relatively, leading to severe packet drops.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Bandwidth: 800 Gbps (100 GB/s).
       - RTT: 5µs.
       - PFC Propagation: 2-3µs.
    2. **Calculations:**
       - BDP: 800 Gbps * 5µs = 500 KB per flow.
       - Buffer Fill: 200MB at 100 GB/s = 2 ms.
       - PFC Drain: 2-3µs * 100 GB/s = 200-300 KB (doubled vs 400G).
       - Packet Rate: 800 Gbps / 4KB = 24.4M packets/sec.
    3. **Conclusion & Interpretation:**
       - **Result: Buffer Management-Bound.** Because physical light-speed propagation delays are static, PFC buffer headroom must absolutely double to absorb the higher drain rate.
