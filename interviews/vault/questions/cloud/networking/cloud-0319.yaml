title: The Cross-Rack Divide
scenario: You're designing a new multi-rack AI cluster for training large models.
question: To connect the different server nodes together, which of the following technologies is the standard choice for the high-bandwidth, low-latency fabric?
details:
  realistic_solution: The correct answer is InfiniBand NDR. It is a specialized networking standard designed for high-performance computing (HPC) and AI clusters, providing much lower latency and higher bandwidth than traditional Ethernet. While NVLink connects GPUs within a server at up to 900 GB/s, InfiniBand NDR connects the servers themselves at 400 Gbps (50 GB/s) per link, enabling the massive cross-node communication required for distributed training.
  common_mistake: |
    **The Pitfall:** Confusing the hierarchy of interconnects.
    **The Rationale:** Engineers often conflate intra-node interconnects (NVLink) or general-purpose motherboard buses (PCIe) with specialized inter-node network fabrics.
    **The Consequence:** They incorrectly choose NVLink or PCIe, misunderstanding how large clusters scale across physical racks.
  napkin_math: |
    **Assumptions & Constraints:**
    - Data transfer over intra-node NVLink takes ~500 ns.
    - Cross-rack hop using InfiniBand NDR is required to connect distributed nodes.

    **Calculations:**
    - InfiniBand latency = 5,000 ns (5 μs).
    - 5,000 ns / 500 ns = 10x latency penalty.

    **Conclusion & Interpretation:**
    - **Result: 10x latency penalty (Network-Bound)**. InfiniBand NDR is the standard, despite a 10x latency penalty compared to NVLink.
  options:
  - NVLink 4.0
  - PCIe Gen5
  - InfiniBand NDR
  - HBM3
