title: RDMA Multi-Path with Bonded NICs
scenario: An H100 cluster utilizes an 8-rail design, where each node has 8 dedicated ConnectX-7 NICs.
question: How would you use all 8 ConnectX-7 rails for a 2GB AllReduce while handling rail failures and preserving reduction ordering?
details:
  realistic_solution: 'Multi-rail AllReduce design involves partitioning the data: divide the 2GB gradient into 8 equal partitions. Assign each partition to a dedicated rail. This eliminates reordering because each rail processes independent data. If a rail fails, redistribute its partition across the remaining rails.'
  common_mistake: |
    **The Pitfall:** Implementing simple round-robin packet striping across all NICs for the same data stream.
    **The Rationale:** Striping seems like an intuitive way to distribute load across multiple parallel network links.
    **The Consequence:** Differential latencies across rails cause packet reordering, which RDMA RC transport interprets as packet loss, triggering massive go-back-N retransmission storms.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Data size: 2GB gradient. N=512 GPUs.
       - NIC bandwidth: 50 GB/s per rail. 8 rails total.
    2. **Calculations:**
       - Single rail AllReduce time = 2 * (511/512) * 2GB / 50 GB/s ≈ 79.8 ms.
       - Multi-rail divides data into 8 disjoint 256MB chunks.
       - 8 Rails Parallel AllReduce time = 2 * (511/512) * 256MB / 50 GB/s ≈ 10.2 ms.
       - Speedup = 79.8 ms / 10.2 ms = 7.82x.
    3. **Conclusion & Interpretation:**
       - **Result: Network-Bound.** Partitioning the gradient to dedicate specific data segments to specific rails achieves near-linear speedup without risking packet reordering.
