title: 'The Interconnect Latency Ladder: Network Bandwidth Bottlenecks'
scenario: You're profiling a multi-GPU training job and trying to identify communication bottlenecks. To start, you need a baseline understanding of the hardware's latency costs.
question: What is the approximate latency for a data transfer between two GPUs connected via NVLink 4.0?
details:
  realistic_solution: An NVLink 4.0 transfer has a latency of approximately 500 nanoseconds. This is about 2x faster than a PCIe Gen5 transfer (~1,000 ns) and 10x faster than a cross-rack InfiniBand NDR network hop (~5,000 ns). Knowing these orders of magnitude is critical for reasoning about scale-up vs. scale-out performance.
  common_mistake: |
    **The Pitfall:** Confusing the latencies of different interconnects.
    **The Rationale:** Engineers often know NVLink is for GPU-to-GPU communication but may incorrectly equate its latency to that of PCIe or InfiniBand.
    **The Consequence:** Flawed reasoning about scale-up vs. scale-out performance.
  napkin_math: |
    **Assumptions & Constraints:**
    - NVLink 4.0 transfer: ~500 ns.
    - PCIe Gen5 transfer: ~1,000 ns.

    **Calculations:**
    - InfiniBand NDR network hop: ~5,000 ns.

    **Conclusion & Interpretation:**
    - **Result: 500 ns (Latency-Bound)**. NVLink is 2x faster than PCIe and 10x faster than InfiniBand.
  options:
  - ~300 ns
  - ~500 ns
  - ~1,000 ns (1 µs)
  - ~5,000 ns (5 µs)
  correct_index: 1
