title: The Collective Communication Primitives
scenario: Your tech lead asks about AllReduce, AllGather, ReduceScatter, and All-to-All collectives used in distributed training.
question: For each collective, name a training strategy that uses it and estimate the per-GPU communication volume for a 1 GB tensor on 8 GPUs?
details:
  realistic_solution: '(1) **AllReduce** → Data Parallelism (DDP): sum gradients across all GPUs. (2) **AllGather** → FSDP forward pass: each GPU holds a shard, AllGather reconstructs the full parameters. (3) **ReduceScatter** → FSDP backward pass: reduce gradients and scatter so each GPU gets its shard''s gradient. (4) **All-to-All** → Expert Parallelism (MoE): route tokens to the correct expert GPU. For a bandwidth-optimal ring with $N$ GPUs and tensor size $M$, AllGather and ReduceScatter each move $M \times (N-1)/N$ per GPU, while AllReduce is ReduceScatter plus AllGather and moves $2M \times (N-1)/N$ per GPU.'
  common_mistake: |
    **The Pitfall:** Claiming AllReduce sends the full tensor size (N × tensor_size) across the network.
    **The Rationale:** Confusing the total data moved with the per-GPU send volume and ignoring bandwidth-optimal ring implementations.
    **The Consequence:** Drastically overestimating communication bottlenecks and poorly sizing network fabrics.
  napkin_math: |
    **Assumptions & Constraints:**
    - 1 GB tensor, 8 GPUs (N=8), bandwidth-optimal ring algorithm.
    - For All-to-All, assume the 1 GB payload is evenly partitioned across the 8 destinations.

    **Calculations:**
    - AllGather volume: 1 GB * (7/8) = 0.875 GB sent per GPU.
    - ReduceScatter volume: 1 GB * (7/8) = 0.875 GB sent per GPU.
    - AllReduce volume: ReduceScatter + AllGather = 2 * 0.875 GB = 1.75 GB sent per GPU.
    - All-to-All volume with even partitioning: 1 GB * (7/8) = 0.875 GB sent per GPU.

    **Conclusion & Interpretation:**
    - **Result: Per-GPU communication volumes are 0.875 GB for AllGather, 0.875 GB for ReduceScatter, 1.75 GB for AllReduce, and 0.875 GB for evenly partitioned All-to-All.** Timing depends on the actual fabric and bandwidth model, so the requested estimate should focus on volume.
