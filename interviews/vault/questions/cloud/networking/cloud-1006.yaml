title: Debugging RoCEv2 Congestion Spreading in a Clos Network
scenario: During a large-scale distributed training run across 1,024 A100 GPUs using RoCEv2 over a 3-tier Clos network, you observe an unexpected drop in throughput. Job A experiences an incast issue at a ToR switch, triggering Priority Flow Control (PFC) pause frames. However, monitoring shows that Job B, which is running on a completely different set of racks but shares the same spine switches, suddenly experiences severe latency spikes and near-zero throughput.
question: How can Job A's RoCEv2 incast and PFC pauses stall Job B in other racks, and what mitigations would you apply?
details:
  realistic_solution: Diagnose the issue as PFC-induced congestion spreading. The incast from Job A caused the ToR switch to send PFC pauses to the spine. The spine, buffering traffic on the same lossless queue, runs out of buffer and pauses its upstream links, freezing Job B. Mitigation involves implementing DCQCN to proactively throttle senders before PFC is triggered, and isolating traffic into different Priority Groups (PGs) or Virtual Lanes.
  common_mistake: |
    **The Pitfall:** Assuming the issue is related to shared storage or compute bottlenecks.
    **The Rationale:** Engineers often fail to recognize the cascading nature of PFC pause frames.
    **The Consequence:** Misdiagnosing network congestion spreading, leaving Job B continually stalled.
  napkin_math: |
    - **Buffer fill time**: (32MB * 8 bits/byte) / 400Gbps = 0.64ms.
    - **Result**: **Buffer fills in 0.64ms, expanding the blast radius exponentially.**
