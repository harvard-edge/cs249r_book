title: Micro-Burst Detection for ML Traffic
scenario: Your monitoring system samples switch counters every 5 seconds, showing 5% average link utilization on your cluster's spine switches. But training jobs report intermittent 10ms stalls. You suspect micro-bursts are saturating links at sub-second timescales.
question: What 400Gbps micro-burst can hide inside 5-second switch-counter samples, and how would you detect it?
details:
  realistic_solution: At 400Gbps, a 5-second window can carry 250 GB at line rate. A 5% average sample means 12.5 GB was transferred, equivalent to 250ms of total line-rate transmission during the window. That total could be one continuous burst only under an extra assumption; it could also be many shorter bursts. A single 10ms line-rate burst transfers 0.5GB and averages to only 0.2% utilization over 5 seconds, so it can be invisible in coarse counters while still overflowing a queue. If the congested egress drains 300Gbps, the queue grows at 100Gbps for 10ms, or 125MB, already larger than a 64MB buffer. Detect it with per-port buffer-occupancy histograms at microsecond granularity, INT queue-depth samples, ECN mark counters, and high-frequency packet/byte counters rather than 5-second averages.
  common_mistake: |
    **The Pitfall:** Trusting 5-second averaged counters to represent instantaneous load.
    **The Rationale:** Engineers often assume that average utilization metrics reflect the maximum pressure on the network, forgetting that network traffic is bursty.
    **The Consequence:** A link can be idle for 4.75 seconds and fully saturated for 250ms, causing significant congestion, packet loss, and latency spikes that are invisible on standard dashboards.
  napkin_math: |
    **Assumptions & Constraints:**
    - Network link = 400 Gbps.
    - Polling window = 5 seconds.
    - Stall-scale micro-burst duration = 10ms at line rate.
    - Congested egress drain rate = 300 Gbps.
    - Switch buffer = 64 MB.

    **Calculations:**
    - 5s line-rate capacity: 400 Gbps * 5s / 8 = 250 GB.
    - 5% average sample payload: 250 GB * 5% = 12.5 GB.
    - Equivalent total line-rate time represented by the 5% sample: 12.5GB / 50GB/s = 250ms.
    - That 250ms is total line-rate time over the window; it is a single continuous burst only if no other traffic occurred in the sample.
    - Stall-scale 10ms burst size: 400 Gbps * 0.010s / 8 = 0.5 GB.
    - Its 5s average utilization: 0.010s / 5s = 0.2% at line rate.
    - Excess queue growth for a 10ms burst into a 300Gbps egress: (400 - 300)Gbps * 0.010s / 8 = 125MB.
    - Buffer pressure versus 64MB: 125MB / 64MB = 2.0x, if the burst targets that egress.

    **Conclusion & Interpretation:**
    - **Result: 5-second counters can hide 10ms line-rate bursts easily.** Detect the burst with queue-depth, ECN, or sub-millisecond byte counters, because average utilization does not show instantaneous queue pressure.
