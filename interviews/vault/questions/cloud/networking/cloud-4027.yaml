title: Micro-Burst Detection for ML Traffic
scenario: Your monitoring system samples switch counters every 5 seconds, showing 5% average link utilization on your cluster's spine switches. But training jobs report intermittent 10ms stalls. You suspect micro-bursts are saturating links at sub-second timescales.
question: What 400Gbps micro-burst can hide inside 5-second switch-counter samples, and how would you detect it?
details:
  realistic_solution: 'At 400Gbps, in a 5-second window: maximum data transfer = 400 Gbps × 5s = 250 GB. With 5% average utilization = 12.5 GB transferred. This 12.5 GB could arrive as a uniform 5% load OR as a 250ms burst at line rate followed by 4.75s of silence — both show 5% average. Even a 250ms burst generates 12.5 GB of instantaneous queuing pressure. Detection methods: (1) Enable per-port histogram counters (available on modern switches) that record buffer occupancy distribution at µs granularity. (2) Use INT (In-band Network Telemetry). (3) Deploy ECN counters.'
  common_mistake: |
    **The Pitfall:** Trusting 5-second averaged counters to represent instantaneous load.
    **The Rationale:** Engineers often assume that average utilization metrics reflect the maximum pressure on the network, forgetting that network traffic is bursty.
    **The Consequence:** A link can be idle for 4.75 seconds and fully saturated for 250ms, causing significant congestion, packet loss, and latency spikes that are invisible on standard dashboards.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Network link = 400 Gbps.
       - Polling window = 5 seconds.
       - Micro-burst duration = 250ms (0.25s) at line rate.
       - Switch buffer = 64 MB.
    2. **Calculations:**
       - Burst size: 400 Gbps * 0.25s = 100 Gigabits.
       - Convert to Bytes: 100 Gigabits / 8 = 12.5 GB.
       - Average utilization over 5s: 100 Gigabits / 5s = 20 Gbps (5% of 400 Gbps).
       - Buffer oversubscription: 12.5 GB (12,500 MB) / 64 MB ≈ 195x oversubscription.
    3. **Conclusion & Interpretation:**
       - **Result: Severe micro-bursting causing 195x buffer oversubscription.** A 5% average load can easily hide catastrophic instantaneous congestion.
