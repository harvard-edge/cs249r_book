title: 'The Cross-Rack Communication Gap'
scenario: During a distributed training job, a GPU in one server rack needs to communicate with a GPU in another rack.
question: For cross-rack GPU communication during distributed training, what is the lowest-latency interconnect and its approximate latency?
details:
  realistic_solution: The correct interconnect for high-performance, cross-rack communication in an AI supercomputer is InfiniBand (specifically, technologies like NDR). Its latency is approximately 5,000 ns (5 µs). While an order of magnitude slower than on-server interconnects like NVLink (~500 ns), it's designed for HPC workloads using protocols like RDMA (Remote Direct Memory Access) to minimize CPU overhead and achieve the lowest possible latency between servers.
  common_mistake: |
    **The Pitfall:** Recalling that NVLink is the fastest GPU interconnect without considering its physical topology.
    **The Rationale:** NVLink is a proprietary, point-to-point connection for GPUs *within the same server node*. It cannot span across different servers or racks. Choosing NVLink confuses intra-node speed with inter-node networking capabilities.
    **The Consequence:** Incorrectly estimating the communication overhead for large-scale distributed training by orders of magnitude.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Communication crosses server and rack boundaries.
    2. **Calculations:**
       - NVLink (on-node): ~500 ns latency.
       - PCIe (on-node): ~1,000 ns latency.
       - InfiniBand NDR (cross-node): ~5,000 ns latency.
       - Scale analogy (1ns = 1s): NVLink = 8.3 mins, InfiniBand = 1.4 hrs.
    3. **Conclusion & Interpretation:** **InfiniBand NDR (~5,000 ns) is the lowest latency for cross-rack traffic. Network-Latency-Bound.**
  options:
  - NVLink 4.0 at ~500 ns
  - PCIe Gen5 at ~1,000 ns
  - InfiniBand NDR at ~5,000 ns
  - Cross-country Fiber at ~40,000,000 ns
