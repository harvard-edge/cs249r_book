title: Evaluating ECMP for RoCEv2 GPU Training Clusters
scenario: You are designing the network fabric for a 4,096 GPU cluster dedicated to training a 175B parameter LLM over 400Gbps RoCEv2. The networking team proposes a standard non-blocking Clos topology relying solely on ECMP (Equal-Cost Multi-Path) for load balancing.
question: What risks does pure ECMP pose for 4,096-GPU synchronous LLM training, and what network architecture would you choose instead?
details:
  realistic_solution: Pure ECMP is risky because static hashing can polarize large RoCEv2 elephant flows onto the same uplinks, creating congestion, head-of-line blocking, and step-time tail latency in synchronous training. ECMP alone does not provide congestion awareness, and packet-level spraying can create reordering problems for RoCEv2 if it is not handled carefully by the fabric and NICs. Use a non-blocking Clos fabric with adaptive, congestion-aware routing or flowlet/load-aware balancing designed for RoCEv2 collectives, plus telemetry and QoS/PFC tuning, rather than relying solely on static ECMP hashes.
  common_mistake: |
    **The Pitfall:** Assuming ECMP provides perfect load balancing by distributing traffic evenly.
    **The Rationale:** Candidates apply standard web-traffic intuition to AI workloads, failing to recognize that ML training generates massive elephant flows with identical 5-tuples.
    **The Consequence:** Severe hash collisions, stranded bandwidth, and extreme tail latency that cripples synchronous training steps.
  napkin_math: |
    **Assumptions & Constraints:**
    - Pure ECMP uses static hashes and is not congestion-aware.
    - Synchronous training creates many long-lived collective transfers whose slowest path can gate the whole step.

    **Calculations:**
    - A single congested or hash-polarized path can delay the affected collective shard.
    - In a synchronous all-reduce, the step time is limited by the slowest shard, so tail congestion matters more than average fabric utilization.
    - The exact collision probability and bandwidth loss depend on flow count, hashing keys, topology, routing implementation, and congestion-control behavior; they cannot be derived from only "4 flows and 4 uplinks."

    **Conclusion & Interpretation:**
    - **Result: ECMP hash-polarization risk (Network-Bandwidth-Bound)**. Choose adaptive, congestion-aware load balancing for RoCEv2 collectives instead of static ECMP-only routing; avoid naive packet spraying unless the stack can tolerate or prevent reordering.
