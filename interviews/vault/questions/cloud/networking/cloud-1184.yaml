title: Evaluating ECMP for RoCEv2 GPU Training Clusters
scenario: 'You are designing the network fabric for a 4,096 GPU cluster dedicated to training a 175B parameter LLM over 400Gbps RoCEv2. The networking team proposes a standard non-blocking Clos topology relying solely on ECMP (Equal-Cost Multi-Path) for load balancing.'
question: 'What risks does pure ECMP pose for 4,096-GPU synchronous LLM training, and what network architecture would you choose instead?'
details:
  realistic_solution: 'Because ECMP pins flows based on 5-tuple hashes, a 400Gbps AllReduce transfer is restricted to a single path. To mitigate collisions, implement Adaptive Routing (AR) or packet-level spraying, which dynamically distributes packets across all available uplinks based on real-time link utilization, improving effective bandwidth from ~60% to >90%.'
  common_mistake: |
    **The Pitfall:** Assuming ECMP provides perfect load balancing by distributing traffic evenly.
    **The Rationale:** Candidates apply standard web-traffic intuition to AI workloads, failing to recognize that ML training generates massive elephant flows with identical 5-tuples.
    **The Consequence:** Severe hash collisions, stranded bandwidth, and extreme tail latency that cripples synchronous training steps.
  napkin_math: |
    **Assumptions & Constraints:**
    - Pure ECMP uses static 5-tuple hashing.
    - 4 possible 400Gbps uplinks and 4 simultaneous heavy flows.

    **Calculations:**
    - Probability of collision = 1 - (4! / 4^4) = 1 - (24 / 256) = 90.6%.
    - Colliding flows share a single 400Gbps uplink (200Gbps each), doubling transfer times.

    **Conclusion & Interpretation:**
    - **Result: 90.6% probability of bandwidth-halving collisions under pure ECMP. (Network-Bandwidth-Bound)**. Elephant flows require Adaptive Routing to utilize full fabric bandwidth.
