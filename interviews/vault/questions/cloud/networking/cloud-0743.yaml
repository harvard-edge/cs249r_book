title: The InfiniBand Subnet Saturation
scenario: You are building a 4,000 GPU cluster. You use a standard Fat-Tree InfiniBand topology. The cluster is divided into 4 pods of 1,000 GPUs each. Jobs running entirely within Pod A achieve 98% network scaling efficiency. However, when you launch a 2,000 GPU job spanning Pod A and Pod B, the network efficiency plummets to 40%. The cables are all 400 Gbps.
question: What architectural constraint in the Fat-Tree topology is causing the network efficiency to plummet for cross-pod jobs?
details:
  realistic_solution: 'The Fat-Tree topology has oversubscribed uplinks between pods. Within Pod A, the leaf-to-spine bandwidth is 1:1 (non-blocking), so intra-pod traffic achieves 98% efficiency. But the spine-to-core uplinks connecting pods are typically oversubscribed 3:1 to save cost. When a 2000-GPU job spans Pods A and B, half the AllReduce traffic must cross the core, but only 1/3 of the needed bandwidth exists. The 267 Tbps deficit causes massive queuing and drops. The fix: build a full-bisection-bandwidth core (1:1 oversubscription at ~3x the cost) or use topology-aware job placement to keep training jobs within a single pod.'
  common_mistake: |
    **The Pitfall:** Assuming distance between the pods adds latency that drops efficiency.
    **The Rationale:** People think physical distance over fiber optic causes the 60% drop.
    **The Consequence:** They ignore the oversubscription ratio of the uplinks, failing to address the actual bandwidth bottleneck.
  napkin_math: |
    **Assumptions & Constraints:**
    - Intra-pod (1000 GPUs): 400 Gbps each.
    - Oversubscription ratio: 3:1 for uplinks.

    **Calculations:**
    - Intra-pod Traffic: 1000 * 400 Gbps = 400 Tbps.
    - Uplink Capacity: 400 Tbps / 3 ≈ 133 Tbps.
    - Bottleneck Deficit: 400 Tbps - 133 Tbps = 267 Tbps.

    **Conclusion & Interpretation:**
    - **Result: 267 Tbps (Network-Bound)**. 267 Tbps of data is physically blocked at the Spine switch every second.
