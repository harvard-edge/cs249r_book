title: The Bisection Bandwidth Requirement
scenario: 'You''re designing the network fabric for a 1,024-GPU training cluster to train a 70B parameter model. The target step time is 500ms with a sequence length of 2048, hidden size of 8192, micro-batch size of 4, and 16 micro-batches per step. The workload uses 3D parallelism: TP=8 (within node), PP=4 (across nodes), DP=32 (across nodes).'
question: What minimum bisection bandwidth is needed to avoid communication bottlenecks, and is a fat-tree topology sufficient or optimal for this 1,024-GPU 3D-parallel workload?
details:
  realistic_solution: 'The workload-derived topology-aware minimum bisection bandwidth is about 0.82 TB/s: roughly 0.54 TB/s from DP AllReduce endpoint demand plus about 0.27 TB/s from PP activation and gradient transfers across the busiest stage boundary. A conservative nonblocking target is about 1.36 TB/s if DP rings are placed adversarially across the cut. TP is inside each 8-GPU node over NVLink, so it should not drive the external fabric. A full non-blocking fat-tree with enough 400 Gbps links is sufficient for the aggregate bandwidth target, but it is not automatically optimal. PP traffic wants low-latency, predictable point-to-point paths, while DP wants high aggregate bandwidth and can often use rail or hierarchical layouts. A hybrid or rail-aware topology may be cheaper if placement keeps PP boundaries local and DP rings well aligned.'
  common_mistake: |
    **The Pitfall:** Treating all 3D parallelism traffic identically and just adding up per-GPU bandwidth.
    **The Rationale:** Designing the network solely for aggregate capacity without modeling the specific latency/bandwidth needs of TP, PP, and DP.
    **The Consequence:** Deploying an expensive fat-tree topology that fails to prevent pipeline bubbles, as it does not optimize for the strict point-to-point latency required by Pipeline Parallelism.
  napkin_math: |
    **Assumptions & Constraints:**
    - 1024 GPUs, 128 nodes. 3D Parallelism: TP=8, PP=4, DP=32.
    - PP activation tensor per micro-batch crossing a stage boundary: 4 sequences * 2048 tokens * 8192 hidden values * 2 bytes ≈ 134 MB per direction.
    - DP parameters per PP stage: 17.5B parameters, sharded across TP=8.
    - Step time: 500ms. 16 micro-batches.

    **Calculations:**
    - PP traffic per stage boundary per replica: 16 micro-batches * 134 MB * 2 directions for forward activations and backward gradients / 0.5s = 8.58 GB/s.
    - With 32 DP replicas, the busiest PP bisection boundary is about 32 * 8.58 = 275 GB/s, assuming topology-aware placement does not cut all three PP boundaries at once.
    - Per-GPU DP gradient shard for one stage/tensor rank: 17.5B * 2 bytes / TP=8 = 4.375 GB.
    - Ring AllReduce communicated volume per GPU within one DP group: 2 * (31/32) * 4.375 GB = 8.48 GB per step = 16.95 GB/s.
    - There are PP * TP = 4 * 8 = 32 independent DP groups. Counting each group's ring traffic once, DP fabric demand is about 32 * 16.95 = 542 GB/s aggregate endpoint bandwidth.
    - A conservative bisection design should handle the same endpoint demand crossing a poorly placed cut in both directions, so provision about 2 * 542 = 1,085 GB/s for DP if placement is adversarial; with topology-aware ring placement, the bisection target is closer to 542 GB/s.
    - Workload minimum with topology-aware placement: 542 + 275 ≈ 817 GB/s. Conservative nonblocking target: 1,085 + 275 ≈ 1,360 GB/s.

    **Conclusion & Interpretation:**
    - **Result: about 0.82 TB/s topology-aware minimum, or 1.36 TB/s conservative nonblocking target.** A full fat-tree is sufficient if provisioned at that bisection target, but placement-aware or rail-aware designs can be more cost-efficient for this 3D-parallel traffic pattern.
