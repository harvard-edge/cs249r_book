title: The Bisection Bandwidth Requirement
scenario: 'You''re designing the network fabric for a 1,024-GPU training cluster to train a 70B parameter model. The target step time is 500ms with a sequence length of 2048, hidden size of 8192, micro-batch size of 4, and 16 micro-batches per step. The workload uses 3D parallelism: TP=8 (within node), PP=4 (across nodes), DP=32 (across nodes).'
question: What minimum bisection bandwidth is needed to avoid communication bottlenecks, and is a fat-tree topology sufficient or optimal for this 1,024-GPU 3D-parallel workload?
details:
  realistic_solution: The minimum bisection bandwidth is ~1,497 GB/s, driven primarily by DP AllReduce traffic (1,085 GB/s) and PP activation/gradient communication (412 GB/s). TP is handled by intra-node NVLink and does not use the network fabric. A standard non-blocking fat-tree topology with 400 Gbps links (8 per node) provides well over this capacity (up to 25,600 GB/s) and IS sufficient. However, fat-tree may not be the most cost-effective choice because it treats all traffic identically. PP needs low-latency point-to-point paths (pipeline bubbles grow with hop count), while DP needs high bandwidth but tolerates latency. A rail-optimized or hybrid topology can reduce cost by ~30% while better matching these distinct traffic patterns.
  common_mistake: |
    **The Pitfall:** Treating all 3D parallelism traffic identically and just adding up per-GPU bandwidth.
    **The Rationale:** Designing the network solely for aggregate capacity without modeling the specific latency/bandwidth needs of TP, PP, and DP.
    **The Consequence:** Deploying an expensive fat-tree topology that fails to prevent pipeline bubbles, as it does not optimize for the strict point-to-point latency required by Pipeline Parallelism.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 1024 GPUs, 128 nodes. 3D Parallelism: TP=8, PP=4, DP=32.
       - PP Activations: 134 MB. DP parameters per PP stage: 17.5B (35 GB FP16).
       - Step time: 500ms. 16 micro-batches.
    2. **Calculations:**
       - PP Bisection: ~48 cross-bisection boundaries. Each boundary = 16 * 134 MB * 2 / 0.5s = 8.58 GB/s. Total PP = 48 * 8.58 = 412 GB/s.
       - DP Bisection: Ring AllReduce per GPU = 2 * (31/32) * (35GB / 8) = 8.48 GB in 500ms = 16.95 GB/s. Total DP = 32 rings * 2 links * 16.95 = 1,085 GB/s.
       - Total Bisection: 412 + 1,085 = 1,497 GB/s.
    3. **Conclusion & Interpretation:**
       - **Result: 1,497 GB/s Minimum Bisection.** While a full fat-tree provides sufficient aggregate bandwidth (25,600 GB/s), a rail-optimized topology is required to satisfy DP's high-bandwidth needs and PP's low-latency point-to-point requirements efficiently.
