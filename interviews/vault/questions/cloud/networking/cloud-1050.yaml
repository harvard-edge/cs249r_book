title: Gradient Synchronization Critical Message Size
scenario: Your team is tuning the gradient synchronization bucket size for a distributed training cluster. The nodes are connected via a 400 Gbps RoCEv2 network, and the measured MPI point-to-point startup latency (alpha) is 2 microseconds.
question: What critical message size makes payload transfer time equal the 2µs startup latency on a 400Gbps RoCEv2 network?
details:
  realistic_solution: Using the alpha-beta performance model, the critical message size (Lc) is the product of startup latency (alpha) and network bandwidth (BW). First, convert 400 Gbps to 50 GB/s. Then, multiply 2 microseconds by 50 GB/s. The critical message size is 100 KB. Gradient buckets should be sized significantly larger than 100 KB (e.g., in the MB range) to fully amortize the latency cost and achieve near-peak bandwidth utilization.
  common_mistake: |
    **The Pitfall:** Confusing bits and bytes, or dividing bandwidth by latency.
    **The Rationale:** Candidates rush the conversion from Gbps to GB/s or misremember the alpha-beta performance model formula.
    **The Consequence:** Sizing gradient buckets incorrectly, leaving the cluster severely latency-bound and underutilizing the expensive 400 Gbps network.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Bandwidth: 400 Gbps = 50 GB/s.
       - Startup Latency (alpha): 2 µs.
    2. **Calculations:**
       - Conversion: 50 GB/s = 50 * 10^9 Bytes/s.
       - Critical Size (Lc): 2 * 10^-6 s * 50 * 10^9 Bytes/s = 100,000 Bytes.
    3. **Conclusion & Interpretation:**
       - **Result: Amortization-Bound.** 100 KB is the theoretical balance point; effective gradient buckets must be multi-megabyte to overcome startup latency and saturate the wire.
