title: 'The On-Node Interconnect Tax: NVLink vs. PCIe'
scenario: 'You''re profiling a model training job on a multi-GPU server and notice significant data transfer overhead. You need to compare the latencies of the main on-node interconnects.'
question: 'Roughly how much slower is a data transfer over a standard PCIe Gen5 bus compared to a direct GPU-to-GPU transfer using NVLink 4.0?'
details:
  realistic_solution: 'A PCIe Gen5 transfer is approximately 2x slower than an NVLink 4.0 transfer. The latency for a direct GPU-to-GPU transfer over NVLink is ~500 ns, while traversing the PCIe bus to another device takes around 1,000 ns (1 µs). While both are extremely fast, this 2x difference is critical for high-frequency communication patterns like those in model-parallel or data-parallel training.'
  common_mistake: |
    **The Pitfall:** Confusing latency with bandwidth, or assuming all "fast" on-board interconnects have identical latencies.
    **The Rationale:** NVLink has vastly higher bandwidth than PCIe, leading people to either overestimate its latency advantage or ignore the physical path differences.
    **The Consequence:** Suboptimal placement of high-frequency communication operations, inadvertently paying the PCIe latency tax.
  napkin_math: |
    **Assumptions & Constraints:**
    - NVLink 4.0 is used for direct GPU-to-GPU communication.
    - PCIe Gen5 requires traversing the bus/CPU.

    **Calculations:**
    - NVLink 4.0 Latency: ~500 ns.
    - PCIe Gen5 Latency: ~1,000 ns.
    - 1,000 ns / 500 ns = 2.

    **Conclusion & Interpretation:**
    - **Result: ~2x slower (Latency-Bound)**. Even on-board interconnects have critical latency differences that affect high-frequency synchronization.
  options:
  - 'About the same latency'
  - '~10x slower'
  - '~2x slower'
  - '~18x slower'
