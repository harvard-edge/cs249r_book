title: Five Levels of ML Networking
scenario: A colleague asks why understanding network topology alone is insufficient for designing ML cluster networks.
question: What is the five-level networking model, and why does each level matter for ML cluster workloads?
details:
  realistic_solution: 'The five levels form a complete stack: (1) Wire/Link: Determines raw bit rate. (2) Transport: protocol and flow control. Determines latency. (3) Switch Topology: Determines bisection bandwidth. (4) Fabric Behavior: how the topology handles congestion. (5) Cluster Design: job scheduling. Each level constrains the ones above.'
  common_mistake: |
    **The Pitfall:** Focusing exclusively on the topology level (e.g., fat-tree vs dragonfly).
    **The Rationale:** Network topology is highly visible, structurally appealing, and commonly discussed in literature.
    **The Consequence:** Ignoring lower levels (wire/transport) and higher levels (fabric behavior/job scheduling) leads to designs that look good on paper but fail in production under heavy collective loads.
  napkin_math: |
    1. **Assumptions & Constraints:** Five levels of ML networking: Wire, Transport, Topology, Fabric, Cluster Design.
    2. **Calculations:** 1. Wire (Gbps capacity limits throughput). 2. Transport (Protocol dictates µs latency). 3. Topology (Defines theoretical bisection bandwidth). 4. Fabric (Congestion handling algorithms prevent drops). 5. Cluster (Job mapping optimizes path lengths).
    3. **Conclusion & Interpretation:** **Result: All 5 levels must be co-designed. System-Bottleneck-Bound.**
