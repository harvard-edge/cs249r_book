title: 'The Interconnect Latency Ladder: Collective Communication'
scenario: 'You''re debugging a distributed training job and notice that nodes are waiting on each other. You suspect network latency.'
question: 'Roughly how much slower is a cross-rack InfiniBand NDR transfer compared to a local, on-node NVLink 4.0 transfer between two GPUs?'
details:
  realistic_solution: |
    A cross-rack InfiniBand transfer is approximately 10 times slower than an on-node NVLink transfer. NVLink 4.0 latency is around 500 nanoseconds, whereas a trip across the datacenter rack fabric via InfiniBand NDR is about 5,000 nanoseconds (5 microseconds). This 10x gap is a fundamental reality of datacenter topology: on-node communication is always significantly faster than node-to-node communication.
  common_mistake: |
    **The Pitfall:** Underestimating the latency penalty for going "off-node."
    **The Rationale:** Engineers mentally group all high-speed interconnects together, assuming their latencies are within 2-3x of each other, forgetting the protocol and physical distance overheads of an optical cross-rack network.
    **The Consequence:** Misdiagnosing scaling bottlenecks and designing sub-optimal communication topologies.
  napkin_math: |
    **Assumptions & Constraints:**
    - Local NVLink 4.0 latency: ~500 ns.
    - Cross-rack InfiniBand NDR latency: ~5,000 ns (5 \u00b5s).

    **Calculations:**
    - Ratio: 5,000 ns / 500 ns = 10x slower.

    **Conclusion & Interpretation:**
    - **Result: 10x slower (Network-Bound)**. Cross-rack is ~10x slower than NVLink.
  options:
  - ~8x slower
  - ~100x slower
  - ~10x slower
  - They have roughly the same latency
