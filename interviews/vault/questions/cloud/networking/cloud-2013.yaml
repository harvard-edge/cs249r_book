title: JSON to Tensor Parsing Bottleneck
scenario: You are optimizing a cloud inference service for a Vision Transformer (ViT) on an NVIDIA A10G. Clients submit REST API requests, sending batches of 32 images (3x224x224) as flat JSON arrays of floats. The Python backend parses this JSON, transposes NHWC to NCHW layout, and copies it to the GPU. The model's GPU execution time is only 8ms per batch, but end-to-end latency exceeds 200ms. Assume CPU JSON parsing speed is 250 MB/s and an average of 10 bytes per float string.
question: What is the JSON parsing overhead for the batch of 32 images, and what transport and preprocessing changes would fix the latency?
details:
  realistic_solution: Switch the transport layer from REST/JSON to gRPC with binary Protobufs (or Triton's binary data extension) to eliminate character parsing. Additionally, send raw NHWC byte arrays and offload the NHWC->NCHW transposition and float conversion to a fused GPU kernel.
  common_mistake: |
    **The Pitfall:** Suggesting optimizing the ViT model with quantization, TensorRT, or kernel fusion.
    **The Rationale:** Candidates miss that the CPU string-to-float parsing and layout transposition is the dominant bottleneck, not the GPU inference.
    **The Consequence:** Wasting time hyper-optimizing an 8ms GPU kernel while ignoring the 190ms CPU parsing overhead.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Payload: 32 images × 3 channels × 224 × 224 = 4,816,896 floats.
       - Format: JSON (10 bytes/float string).
       - Parser speed: 250 MB/s. GPU time: 8 ms.
    2. **Calculations:**
       - JSON size: 4.81M floats × 10 bytes = 48.1 MB.
       - Parse latency = 48.1 MB / 250 MB/s = 0.192 seconds (192 ms).
       - Total CPU latency (192 ms) >> GPU latency (8 ms).
    3. **Conclusion & Interpretation:** **String parsing takes 24× longer than GPU execution. CPU-Deserialization-Bound.**
