title: RoCEv2 Goodput for Small Tensor Parallel Messages
scenario: You are evaluating a 400 Gbps RoCEv2 network for distributed ML training. A specific tensor parallel operation relies heavily on transmitting small 256-byte payload messages.
question: What is the maximum theoretical payload goodput for 256-byte RoCEv2 messages on the 400 Gbps link with 80 bytes of overhead?
details:
  realistic_solution: Determine the total packet size by adding the payload to the header overhead. Calculate the efficiency ratio (payload / total packet size) and multiply this fraction by the raw physical link speed.
  common_mistake: |
    **The Pitfall:** Calculating throughput based on the MTU or raw line rate.
    **The Rationale:** Candidates often forget that small messages suffer disproportionately from header overhead, treating all packet sizes equally.
    **The Consequence:** Overestimating available bandwidth by nearly 25%, leading to overly optimistic performance predictions for fine-grained distributed operations.
  napkin_math: |
    **Assumptions & Constraints:**
    - Payload: 256 bytes.
    - RoCEv2 headers overhead: 80 bytes (Ethernet, IP, UDP, IB).
    - Network link: 400 Gbps.

    **Calculations:**
    - Total Packet Size: 256 bytes (payload) + 80 bytes (headers) = 336 bytes.
    - Efficiency Ratio: 256 / 336 ≈ 0.7619 (76.19%).
    - Theoretical Max Goodput: 400 Gbps * 0.7619 = 304.76 Gbps.
    - 304.76 Gbps / 8 = 38.09 GB/s.

    **Conclusion & Interpretation:**
    - **Result: 38.1 GB/s (Network-Bound)**. This equates to ~38.1 GB/s, representing nearly a 25% loss in theoretical bandwidth due to UDP/IP encapsulation overhead.
