title: The Interconnect Latency Ladder (cloud-0071)
scenario: You are diagnosing a training job slowdown. To start, you want to sanity check your understanding of the system's latency characteristics.
question: Which of these three operations has the highest latency (is the slowest)?
details:
  realistic_solution: The InfiniBand NDR hop has the highest latency. Communication that leaves the server and traverses the network (inter-node) is always significantly slower than communication within the server (intra-node).
  common_mistake: |
    **The Pitfall:** Confusing high bandwidth with low latency.
    **The Rationale:** Engineers see 400 Gbps InfiniBand and assume it is the "fastest" connection, forgetting that latency is dominated by physical distance, NIC processing, and switch hops.
    **The Consequence:** Developers design synchronization primitives assuming inter-node network trips are as fast as intra-node PCIe/NVLink transfers, leading to massive stall times.
  napkin_math: |
    1. **NVLink (Intra-node, GPU-to-GPU):** ~500 ns.
    2. **PCIe (Intra-node, GPU-to-CPU):** ~1,000 ns.
    3. **InfiniBand NDR (Inter-node, Network):** ~5,000 ns.
    4. **Conclusion:** **InfiniBand has the highest latency because data must traverse a network.**
  options:
  - NVLink 4.0 Transfer
  - PCIe Gen5 Transfer
  - InfiniBand NDR Hop
  - They are all roughly the same latency
  correct_index: 2
