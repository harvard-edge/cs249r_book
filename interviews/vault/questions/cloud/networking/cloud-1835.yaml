title: SMPC Communication Bottlenecks
scenario: Two financial institutions use Secure Multiparty Computation (SMPC) to evaluate a shared risk model with D = 100 sequential layers. Each layer contains batched non-linear activations requiring secure comparison protocols. A single layer requires R = 10 sequential communication rounds to evaluate. The total amount of data exchanged per inference across all layers is V = 500 MB. The two servers are connected by a B = 10 Gbps link with a round-trip time (RTT) of L = 5 ms.
question: "What is the total communication time for one SMPC inference given 100 layers, 10 rounds per layer, 500 MB, 10 Gbps, and 5 ms RTT?"
details:
  realistic_solution: 'The total communication time is the sum of the transmission delay and the propagation delay. First, calculate the rounds: 100 layers * 10 rounds/layer = 1000 sequential rounds. The latency delay is 1000 * 5ms = 5.0 seconds. The transmission delay for 500 MB is (500 * 8) Mb / 10,000 Mbps = 0.4 seconds. Total communication time is 5.4 seconds.'
  common_mistake: |
    **The Pitfall:** Calculating only the payload transmission time based on bandwidth.
    **The Rationale:** Candidates ignore the severe sequential round-trip time (RTT) penalty incurred by the protocol's multiplicative depth.
    **The Consequence:** Underestimating inference latency by an order of magnitude, leading to missed real-time deadlines.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - D = 100 sequential layers.
       - R = 10 communication rounds per layer.
       - V = 500 MB total data exchanged.
       - B = 10 Gbps link bandwidth.
       - L = 5 ms round-trip time (RTT).
    2. **Calculations:**
       - Total Rounds = 100 layers * 10 rounds/layer = 1000 rounds.
       - Latency Cost = 1000 rounds * 5 ms/round = 5000 ms = 5.0 seconds.
       - Bandwidth Cost = 500 MB / 10 Gbps = (500 * 8) Mb / 10,000 Mbps = 0.4 seconds.
       - Total Time = 5.0s + 0.4s = 5.4s.
    3. **Conclusion & Interpretation:**
       - **Result: 5.4 seconds.** The bottleneck is **Latency-Bound**.
