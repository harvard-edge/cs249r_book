title: GPUDirect RDMA Page Table Alignment
scenario: Your GPUDirect RDMA transfers on MI300X achieve only 35 GB/s instead of the expected 50 GB/s (400Gbps line rate). The GPU memory buffer starts at an address that is 2KB-aligned rather than 64KB-aligned. PCIe performance counters show excessive TLP (Transaction Layer Packet) splitting.
question: Why does 2KB alignment hurt MI300X GPUDirect RDMA throughput, and how much loss comes from PCIe TLP splitting?
details:
  realistic_solution: 'Reallocate RDMA buffers using cuMemAlloc aligned to 2MB (huge page size) or cudaMemAllocManaged with cudaMemAdvise for preferred location. This prevents the HCA''s DMA engine from issuing split TLPs across 64KB page boundaries.'
  common_mistake: |
    **The Pitfall:** Ignoring memory alignment for DMA transfers.
    **The Rationale:** Candidates assume DMA engines handle any buffer address equally efficiently.
    **The Consequence:** Misaligned buffers cause TLP splitting at page boundaries, generating multiple smaller PCIe transactions and severely reducing throughput.
  napkin_math: |
    **Assumptions & Constraints:**
    - Expected bandwidth is 50 GB/s, observed is 35 GB/s.
    - 2KB alignment on 64KB pages causes 4KB MTU packets to split.
    - Each split adds a ~100ns pipeline bubble in the HCA DMA engine.
    - Network rate is ~12.2M packets/sec.

    **Calculations:**
    - Alignment-caused TLP splitting rate: 4KB / 64KB = 6.25% of packets.
    - Lost time to bubbles: 12.2M packets/sec * 6.25% * 100ns = 76.3ms per second.
    - Direct throughput loss from bubbles: 7.6%.
    - Fixing alignment restores this 7.6% (improving bandwidth), though remaining overheads require disabling IOMMU pass-through to fully hit 50 GB/s.

    **Conclusion & Interpretation:**
    - **Result: 7.6% direct throughput loss from 2KB alignment (PCIe-Transaction-Bound)**. Due to TLP splitting bubbles.
