title: Cloud Ultra Ethernet L2 0
scenario: Your team is evaluating Ultra Ethernet as an alternative to InfiniBand for a new AI training cluster.
question: What makes Ultra Ethernet different from standard RoCE, and why does that matter for AI collective workloads?
details:
  realistic_solution: 'Ultra Ethernet is designed specifically for AI collective communication patterns. Key innovations: (1) native packet spraying — distributes packets across all available paths simultaneously, (2) in-order delivery guarantees at the receiver despite multi-path spraying, (3) optimized for AllReduce and collective patterns rather than traditional request-response. Standard RoCE struggles with AI workloads because ECMP creates hotspots when many GPU-to-GPU flows hash to the same path. Ultra Ethernet eliminates this by spraying at packet granularity.'
  common_mistake: |
    **The Pitfall:** Assuming Ultra Ethernet is simply a higher bandwidth standard.
    **The Rationale:** Candidates equate "Ultra" with higher link speeds (like 400Gbps) rather than architectural changes to routing.
    **The Consequence:** The candidate misses the core innovation of packet spraying over ECMP hashing, failing to explain how it solves RoCE's elephant flow hotspots.
  napkin_math: |
    **Assumptions & Constraints:**
    - Standard RoCE (ECMP): 4 equal-cost paths.
    - Link speed: 400 Gbps.

    **Calculations:**
    - ECMP: Elephant flows pin to 1 path -> 25% utilization (100 Gbps).
    - Ultra Ethernet: Packet spraying distributes evenly across 4 paths -> ~95% utilization (380 Gbps).

    **Conclusion & Interpretation:**
    - **Result: 380 Gbps (Interconnect-Bound)**. Effective bandwidth jumps drastically.
