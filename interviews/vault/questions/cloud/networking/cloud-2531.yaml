title: Ultra Ethernet vs RoCE for AI Collectives
scenario: Your team is evaluating Ultra Ethernet as an alternative to InfiniBand for a new AI training cluster.
question: What makes Ultra Ethernet different from standard RoCE, and why does that matter for AI collective workloads?
details:
  realistic_solution: Ultra Ethernet is designed specifically for AI collective communication patterns. Key innovations include packet spraying across multiple paths, receiver-side reassembly or ordering mechanisms, congestion control, and transport/control-plane changes aimed at collective traffic. Standard RoCE over ECMP can create hotspots when many GPU-to-GPU flows hash to the same path. Ultra Ethernet is not just faster Ethernet; it changes the transport and multipath behavior so AI collectives can use the fabric more evenly and tolerate packet-level spraying more safely than conventional RoCE/ECMP.
  common_mistake: |
    **The Pitfall:** Assuming Ultra Ethernet is simply a higher bandwidth standard.
    **The Rationale:** Candidates equate "Ultra" with higher link speeds (like 400Gbps) rather than architectural changes to routing.
    **The Consequence:** The candidate misses the core innovation of packet spraying over ECMP hashing, failing to explain how it solves RoCE's elephant flow hotspots.
  napkin_math: |
    **Assumptions & Constraints:**
    - This is a qualitative L2 comparison, not a fixed-bandwidth calculation.
    - Actual utilization depends on topology, traffic matrix, congestion control, packet loss, and receiver reordering behavior.

    **Calculations:**
    - Standard RoCE over ECMP typically hashes each flow onto one path, so collective traffic can create hot spots when many large flows collide on the same links.
    - Ultra Ethernet adds transport, multipath, reassembly/ordering, and congestion-control mechanisms intended to make packet spraying usable for synchronized AI communication.

    **Conclusion & Interpretation:**
    - **Result: Better collective load balancing.** The benefit is architectural: packet-level multipath behavior helps AI collectives use the fabric more evenly than flow-hashed RoCE.
