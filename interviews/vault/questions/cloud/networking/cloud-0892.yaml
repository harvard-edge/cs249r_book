title: Multi-AZ Link Buffer Exhaustion
scenario: To secure enough power for a 10,000-GPU training cluster, your infrastructure team proposes splitting the 400Gbps RoCEv2 network across two availability zones (AZs) connected by 50km of dark fiber.
question: "What in-flight data is needed to saturate one 400Gbps cross-AZ link over 50km, and can 64MB-buffer ToR switches support it?"
details:
  realistic_solution: Tightly-coupled synchronous operations (like Tensor Parallelism or Ring All-Reduce) must be restricted to a single AZ. The 50km distance dictates a 25MB buffer requirement per port just to maintain line rate. Because this consumes an untenable percentage of standard switch memory, cross-AZ links should only be used for less sensitive asynchronous traffic or pipeline parallelism.
  common_mistake: |
    **The Pitfall:** Assuming dark fiber guarantees throughput over distance.
    **The Rationale:** Engineers equate installing a 400Gbps physical link with getting 400Gbps of application throughput.
    **The Consequence:** They fail to realize that long distances drastically increase the Bandwidth-Delay Product (BDP), exhausting switch buffers and leading to packet drops, PFC storms, and throughput collapse.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Fiber distance: 50 km.
       - Light speed in fiber ≈ 200 km/ms.
       - Switch shared buffer: 64 MB.
       - Target bandwidth: 400 Gbps (50 GB/s).
    2. **Calculations:**
       - One-way latency: 50 km / 200 km/ms = 0.25 ms.
       - Round Trip Time (RTT) = 0.5 ms (500 μs).
       - Bandwidth-Delay Product (BDP) = 50 GB/s × 500 μs = 25 MB per port.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Buffer-Bound. A single cross-AZ connection consumes almost 40% of the switch's entire 64MB shared buffer, making multi-port line-rate impossible.**
