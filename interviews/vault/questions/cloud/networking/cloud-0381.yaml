title: The On-Node Interconnect Hierarchy
scenario: 'You are explaining a model''s communication pattern involving data movement between two GPUs in the same server.'
question: 'Roughly how much slower is a transfer over the PCIe Gen5 bus compared to a direct transfer over NVLink 4.0?'
details:
  realistic_solution: 'A transfer over PCIe Gen5 is approximately 2 times slower than a transfer over NVLink 4.0. NVLink is a highly optimized, low-latency interconnect designed specifically for high-bandwidth communication between GPUs within a node. PCIe is a more general-purpose bus that carries traffic for many peripherals, incurring higher protocol overhead and latency.'
  common_mistake: |
    **The Pitfall:** Grouping all 'on-server' interconnects into the same bucket.
    **The Rationale:** Engineers often fail to appreciate the significant performance difference between a general-purpose bus (PCIe) and a specialized GPU-to-GPU interconnect (NVLink).
    **The Consequence:** Incorrect assumptions about communication latency lead to suboptimal hardware choices or inefficient tensor parallelism design.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - NVLink 4.0 latency: ~500 ns.
       - PCIe Gen5 latency: ~1,000 ns (1 µs).
    2. **Calculations:**
       - Latency Ratio = 1,000 ns / 500 ns = 2x.
    3. **Conclusion & Interpretation:** **Result: IO-Bound**. Data movement over a general-purpose PCIe bus incurs roughly 2x the latency of a specialized NVLink interconnect.
  options:
  - PCIe is ~10x slower
  - They are about the same speed
  - PCIe is ~2x slower
  - PCIe is ~4x slower
  correct_index: 2
