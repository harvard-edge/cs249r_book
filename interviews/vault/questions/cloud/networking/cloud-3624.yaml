title: NCCL AllReduce Tuning for H100 Multi-Rail InfiniBand
scenario: A 128-GPU training cluster uses 8 InfiniBand ports per node (3.2Tbps/node). NCCL AllReduce achieves 85% of theoretical bandwidth.
question: How would you tune NCCL_ALGO, NCCL_PROTO, and message thresholds to improve 128-GPU AllReduce bandwidth from 85% to 95%?
details:
  realistic_solution: Do not rely on universal NCCL size cutoffs; NCCL_ALGO and NCCL_PROTO choices depend on NCCL version, topology, rails, GPU generation, and measured message sizes. Benchmark RING versus TREE and SIMPLE versus LL128 with nccl-tests on the real 128-GPU topology, then pin only the winning combination for this workload. For large H100 multi-rail AllReduce, the likely direction is topology-aware ring or CollNet-style use of all rails with SIMPLE/LL128 chosen by measurement, tuned chunk size, NCCL_CROSS_NIC when it improves rail use, and enough QPs per connection to keep rails busy. Under a simplified per-node aggregate bandwidth model, 95% of a 400GB/s node budget is about 380GB/s effective; use that as a benchmark target, not as a deterministic prediction for every gradient size.
  common_mistake: |
    **The Pitfall:** Assuming default NCCL settings are optimal for all workloads.
    **The Rationale:** Not knowing that NCCL switches algorithms (TREE vs RING) and protocols (LL vs SIMPLE) based on message size thresholds.
    **The Consequence:** Leaving 10-15% of expensive network bandwidth underutilized during large gradient synchronizations.
  napkin_math: |
    **Assumptions & Constraints:**
    - Theoretical bandwidth: 8 * 400Gbps = 3.2 Tbps/node = 400GB/s/node.
    - The scenario does not specify gradient size, so timing is illustrative.
    - Example aggregate bucket crossing a node's NIC rails: 400GB.

    **Calculations:**
    - Ring AllReduce traffic for the example bucket is 2 * (127/128) * 400GB = 793.75GB through the bottleneck model.
    - At 85% efficiency: 400GB/s * 0.85 = 340GB/s effective, so illustrative time = 793.75GB / 340GB/s = 2.33s.
    - At 95% efficiency: 400GB/s * 0.95 = 380GB/s effective, so illustrative time = 793.75GB / 380GB/s = 2.09s.
    - Example savings: 2.33s - 2.09s = 0.24s per large-bucket AllReduce.

    **Conclusion & Interpretation:**
    - **Result: Interconnect-Bound.** The tuning target is about 380GB/s effective node-level bandwidth in this simplified model; algorithm and protocol settings should be selected from topology-specific benchmarks, not fixed global thresholds.
