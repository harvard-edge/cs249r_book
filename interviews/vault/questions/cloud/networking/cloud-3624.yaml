title: NCCL AllReduce Tuning for H100 Multi-Rail InfiniBand
scenario: A 128-GPU training cluster uses 8 InfiniBand ports per node (3.2Tbps/node). NCCL AllReduce achieves 85% of theoretical bandwidth.
question: How would you tune NCCL_ALGO, NCCL_PROTO, and message thresholds to improve 128-GPU AllReduce bandwidth from 85% to 95%?
details:
  realistic_solution: 'NCCL selects algorithm based on message size: Small (<256KB): TREE algorithm, LL (low latency) protocol. Medium (256KB-8MB): RING with LL128 protocol. Large (>8MB): RING with SIMPLE protocol. For 100B param gradient (400GB): use RING+SIMPLE. NCCL_BUFFSIZE controls chunk size — larger buffers reduce pipeline overhead. Set NCCL_BUFFSIZE=67108864 (64MB) for large messages. Multi-rail: NCCL_NET_PLUGIN for stripe across 8 IB rails. Key tuning: NCCL_CROSS_NIC=1 (enable cross-NIC communication), NCCL_IB_QPS_PER_CONNECTION=4 (4 QPs per rail for throughput). Expected improvement: 85%->93% with tuned settings.'
  common_mistake: |
    **The Pitfall:** Assuming default NCCL settings are optimal for all workloads.
    **The Rationale:** Not knowing that NCCL switches algorithms (TREE vs RING) and protocols (LL vs SIMPLE) based on message size thresholds.
    **The Consequence:** Leaving 10-15% of expensive network bandwidth underutilized during large gradient synchronizations.
  napkin_math: |
    **Assumptions & Constraints:**
    - Theoretical bandwidth: 8 * 400Gbps = 3.2 Tbps/node = 400 GB/s/node.
    - 100B param gradient size: 400GB.

    **Calculations:**
    - At 85% efficiency: 340 GB/s effective.
    - Time for 400GB ring: $2 \times (15/16) \times (400\text{GB} / 340\text{GB/s}) \approx 2.2\text{s}$.
    - At 95% efficiency: 380 GB/s effective $\to 2.0\text{s}$.
    - Savings: 0.2s per step.

    **Conclusion & Interpretation:**
    - **Result: Interconnect-Bound.** Optimizing NCCL topology algorithms saves ~3.3 minutes/day at 1,000 steps/day.
