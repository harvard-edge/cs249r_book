title: KV Cache Checkpoint Bandwidth
scenario: 'You are designing a fault-tolerant serving system for a 70B parameter LLM (80 layers, 8 KV heads, 128 head dimension, FP16 precision) used for long-context customer support. Sessions often reach 16,000 tokens. To avoid expensive prefill recomputation during spot instance preemptions, you propose checkpointing the full KV cache of 50 concurrent active sessions to a remote Redis cluster every 5 seconds.'
question: 'What bandwidth is required to checkpoint 50 full 16,000-token KV caches every 5 seconds, and is it viable on 100Gbps NICs?'
details:
  realistic_solution: 'Calculate the total KV cache per session (5.24 GB) and overall required bandwidth (52.4 GB/s or ~419 Gbps). Conclude that full snapshots over a 100 Gbps link are impossible, and recommend asynchronous delta-checkpointing (sending only newly generated tokens since the last checkpoint) instead.'
  common_mistake: |
    **The Pitfall:** Miscalculating the KV cache size or failing to convert bytes to bits.
    **The Rationale:** Candidates often forget the factor of 2 for K and V tensors, or mix up GB/s and Gbps when evaluating network constraints.
    **The Consequence:** Proposing an architecture that will fundamentally fail due to network saturation, causing massive latency spikes during checkpointing.
  napkin_math: |
    **Assumptions & Constraints:**
    - Bytes per token: 2 (K,V) * 80 (layers) * 8 (KV heads) * 128 (dim) * 2 bytes (FP16) = 327.68 KB.
    - 16,000 tokens per session, 50 sessions. Checkpoint every 5 seconds.

    **Calculations:**
    - Session KV size: 327.68 KB * 16,000 tokens = 5.24 GB.
    - Total data per checkpoint: 5.24 GB * 50 sessions = 262 GB.
    - Required Bandwidth: 262 GB / 5 seconds = 52.4 GB/s.
    - Convert to Gbps: 52.4 * 8 = 419 Gbps.

    **Conclusion & Interpretation:**
    - **Result: 419 Gbps (Network Saturation)**. This full-snapshot approach is network-bound and unviable on a 100Gbps NIC, necessitating asynchronous delta-checkpointing.
