title: Network Bottleneck Debug Spec
scenario: An LLM serving cluster sees P99 latency spikes when requests route across racks.
question: What network telemetry distinguishes bandwidth saturation, poor placement, and retry storms in a rack-scale LLM serving cluster?
details:
  realistic_solution: Collect per-link utilization, bisection path, rack placement, request fanout, retransmits, queue depth, retry rate, and per-hop latency. Bandwidth saturation appears as high utilization; poor placement shows cross-rack traffic for tightly coupled shards; retry storms show offered load exceeding original request volume.
  common_mistake: |
    **The Pitfall:** Looking solely at aggregate cluster bandwidth metrics.
    **The Rationale:** Assuming that if overall cluster bandwidth utilization is low, the network cannot be the bottleneck.
    **The Consequence:** Missing placement-specific hot links, cross-rack saturation, or localized retry amplification storms.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Original Traffic: 10,000 RPS.
       - Retry Rate: 30%.
    2. **Calculations:**
       - Offered Load: 10,000 * 1.3 = 13,000 RPS.
    3. **Conclusion & Interpretation:**
       - **Result: Network-Bound Saturation.** Retry amplification severely artificially inflates the offered load, causing network saturation.
