title: Tail Latency Impact of PFC Storms
scenario: Your 256-A100 cluster experiences PFC storms lasting 2ms on average, occurring once per minute
  per ToR on average. Each storm pauses all 8 GPU ports on the affected ToR. Training uses synchronous
  data-parallel SGD with AllReduce.
question: What is the throughput impact of 2ms PFC storms once per minute per ToR in this 256-A100 synchronous
  AllReduce job?
details:
  realistic_solution: With 32 ToR switches (256 GPUs / 8 per ToR), each experiencing 1 storm per minute,
    the expected number of storms per minute across the cluster is 32. Each 2ms storm creates a bubble
    in the synchronous AllReduce barrier. With 32 storms per minute, and each storm potentially aligning
    with a unique step, the cluster experiences a maximum of 32 × 2ms = 64ms of stall per minute. This
    translates to a precise throughput loss of exactly 64ms / 60,000ms = 0.107%. Furthermore, if storms
    are correlated and multiple ToRs stall simultaneously, the stall windows overlap, reducing the total
    stalled time rather than compounding it.
  common_mistake: '**The Pitfall:** Calculating the throughput impact by only looking at the direct time
    a single ToR is paused, ignoring the global synchronization semantics.

    **The Rationale:** Engineers assume network stalls affect only the local rack''s throughput, failing
    to model the cascading "barrier effect" inherent in synchronous AllReduce operations.

    **The Consequence:** Network unreliability is deemed "minor" (0.1% impact) while it actually inflicts
    severe multi-percentage-point degradation across the entire massive-scale cluster.

    '
  napkin_math: '**Assumptions & Constraints:**

    - 256 GPUs across 32 ToR switches (8 GPUs per ToR).

    - PFC storm rate: 1 per minute per ToR. Duration: 2ms.

    - Training uses synchronous AllReduce barrier.


    **Calculations:**

    - Expected cluster-wide storms: 32 ToRs × 1 storm/min = 32 storms/min.

    - With a global barrier, a 2ms delay on ANY ToR delays ALL 256 GPUs.

    - Maximum stalled time per minute (assuming no overlap) = 32 storms × 2ms stall = 64ms wasted per
    minute.

    - Direct loss = 64ms / 60,000ms = 0.107%.

    - Overlapping (correlated) storms would result in < 64ms of stall per minute, leading to < 0.107%
    loss.


    **Conclusion & Interpretation:**

    - **Result: 0.107% Throughput Loss (Network-Bound)**. The absolute maximum impact is 0.107%. Claims
    of multi-percentage-point degradation from these micro-bursts reflect arithmetic errors and misunderstanding
    of overlapping stall windows.'
