title: Designing ECN Thresholds for ML Traffic
scenario: You are designing the DCQCN parameters for a new 1024-MI300X training cluster with 400G RoCE v2 links. The fabric uses a 3-tier Clos with 12MB shared buffer per switch ASIC. Training workloads include both large AllReduce (up to 2GB) and small control-plane RPCs (<1KB).
question: What ECN thresholds, PFC thresholds, and DCQCN rate-reduction parameters would you set for the 1024-MI300X 400G RoCE cluster?
details:
  realistic_solution: 'Configure ECN Kmin tightly to the buffer threshold (e.g. 10%) while leaving ample delta before the PFC threshold (60%). This ensures ECN triggers TCP rate reduction sufficiently early across the 400G links to prevent pause-frame storms.'
  common_mistake: |
    **The Pitfall:** Setting ECN thresholds too close to the PFC threshold or using the same thresholds for all traffic classes.
    **The Rationale:** Candidates lack deep intuition for how long DCQCN takes to throttle transmitters.
    **The Consequence:** ECN marking starts too late and PFC fires anyway, causing pause-frame storms and head-of-line blocking between bulk and latency-sensitive flows.
  napkin_math: |
    **Assumptions & Constraints:**
    - Shared buffer: 12MB. Link speed: 400Gbps (50 GB/s).
    - PFC threshold: 60% (7.2MB). ECN Kmin: 10% (1.2MB).

    **Calculations:**
    - Time to fill buffer to ECN Kmin: 1.2MB / 50 GB/s = 24us.
    - Time to fill buffer to PFC threshold: 7.2MB / 50 GB/s = 144us.
    - Delta for DCQCN to react: 144us - 24us = 120us.
    - 120us corresponds to ~2 data center round trips.

    **Conclusion & Interpretation:**
    - **Result: 120us safety margin for DCQCN response (Pause-Frame-Bound)**. The system prevents traffic collapse by triggering ECN early enough to avoid PFC.
