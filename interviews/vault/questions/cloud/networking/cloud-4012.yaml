title: Designing ECN Thresholds for ML Traffic
scenario: You are designing the DCQCN parameters for a new 1024-MI300X training cluster with 400G RoCE v2 links. The fabric uses a 3-tier Clos with 12MB shared buffer per switch ASIC. Training workloads include both large AllReduce (up to 2GB) and small control-plane RPCs (<1KB).
question: What ECN thresholds, PFC thresholds, and DCQCN rate-reduction parameters would you set for the 1024-MI300X 400G RoCE cluster?
details:
  realistic_solution: 'Set ECN to start early and leave a clear gap before PFC: for a 12MB shared buffer, use Kmin around 1.0-1.5MB, Kmax around 4-5MB, and keep the PFC XOFF threshold around 7-8MB with XON below it. Configure DCQCN for prompt but stable RDMA throttling, such as additive recovery with multiplicative decrease around 50% on sustained marks and conservative rate increase after several unmarked RTTs. Keep small RPCs in a separate class or queue so bulk AllReduce marking does not add control-plane latency.'
  common_mistake: |
    **The Pitfall:** Setting ECN thresholds too close to the PFC threshold or using the same thresholds for all traffic classes.
    **The Rationale:** Candidates lack deep intuition for how long DCQCN takes to throttle transmitters.
    **The Consequence:** ECN marking starts too late and PFC fires anyway, causing pause-frame storms and head-of-line blocking between bulk and latency-sensitive flows.
  napkin_math: |
    **Assumptions & Constraints:**
    - Shared buffer: 12MB. Link speed: 400Gbps = 50GB/s.
    - Proposed ECN Kmin: 1.2MB. ECN Kmax: 4.8MB.
    - Proposed PFC XOFF threshold: 7.2MB.
    - Use decimal MB/GB for rough switch-buffer sizing.

    **Calculations:**
    - Time to fill buffer to ECN Kmin: 1.2MB / 50GB/s = 24us.
    - Time to fill buffer to ECN Kmax: 4.8MB / 50GB/s = 96us.
    - Time to fill buffer to PFC XOFF: 7.2MB / 50GB/s = 144us.
    - Margin from first ECN mark to PFC: 144us - 24us = 120us.
    - Margin from Kmax to PFC: 144us - 96us = 48us.

    **Conclusion & Interpretation:**
    - **Result: ECN begins about 120us before PFC would fire under a 400G fill-rate model (Pause-Frame-Bound)**. DCQCN gets an early RDMA congestion signal, while PFC remains a last-resort guardrail rather than the normal control loop.
