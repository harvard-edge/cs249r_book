title: iWARP vs RoCE v2 for ML Training
scenario: A cloud provider considers deploying iWARP (RDMA over TCP) instead of RoCE v2 (RDMA over UDP) for their multi-tenant ML training infrastructure. iWARP doesn't need PFC since TCP handles retransmission, eliminating the PFC deadlock risk.
question: How suitable is iWARP versus RoCE v2 for large-scale ML training, considering latency, throughput, CPU overhead, and operations?
details:
  realistic_solution: 'iWARP can be attractive operationally because it runs over a lossy Ethernet fabric without PFC, but it is usually a weaker default for tightly coupled ML training than RoCE v2. Latency: hardware-offloaded TCP still tends to add some transport and connection-management overhead, so even a small extra 1-2 μs per collective step becomes visible across thousands of steps. Throughput: do not assume a fixed 350 Gbps ceiling; modern adapters vary, but RoCE deployments are commonly tuned for line-rate, low-jitter GPU collectives, while iWARP is less common in this environment. CPU overhead: data movement is offloaded, yet connection management, monitoring, and failure handling are operationally heavier because TCP state and congestion behavior must be managed per connection. Scalability: a full mesh at 1024 GPUs and 8 rails means 1024 × 1023 × 8 = 8.38M directed transport contexts across the cluster, or 8,184 per GPU. At 2 KB per context that is about 16 MB per GPU and 16
    GB cluster-wide just for this simplified state model, before CQs, MRs, buffers, and implementation overheads. Verdict: iWARP is reasonable for smaller or WAN/loss-tolerant training where PFC avoidance dominates. RoCE v2 remains the usual choice for large single-site training when latency, line-rate throughput, and ecosystem maturity matter.'
  common_mistake: |
    **The Pitfall:** Favoring iWARP purely because it eliminates the need for Priority Flow Control (PFC).
    **The Rationale:** PFC deadlock is a known operational headache, so candidates jump to TCP-based RDMA to avoid it.
    **The Consequence:** Overlooking connection-state scale, latency variance, and operational maturity, which can dominate high-performance AllReduce at scale.
  napkin_math: |
    **Assumptions & Constraints:**
    - 1024 GPUs, 8 rails, 1023 connections per GPU.
    - Compare a full directed mesh for worst-case connectivity.
    - Estimated iWARP incremental latency: 1-2μs per collective step versus a tuned RoCE path.
    - Simplified iWARP connection state: 2KB per directed transport context.

    **Calculations:**
    - Directed contexts per GPU: 1023 peers * 8 rails = 8,184.
    - Directed contexts across cluster: 1024 * 8,184 = 8,380,416.
    - State per GPU: 8,184 * 2KB = 16,368KB ≈ 16MB, before CQs, MRs, buffers, and implementation overheads.
    - Cluster-wide simplified state: 8,380,416 * 2KB ≈ 16GB.
    - If an AllReduce has about 2 * (1024 - 1) ring steps, a 1-2μs per-step increment adds roughly 2.0-4.1ms per iteration.

    **Conclusion & Interpretation:**
    - **Result: operationally attractive but risky for large synchronous training**. The defensible concern is not a universal throughput cap, but the combination of added latency, state scale, and weaker large-scale ML deployment maturity compared with RoCE v2.
