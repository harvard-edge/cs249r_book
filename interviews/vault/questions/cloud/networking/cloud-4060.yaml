title: RoCE v2 vs InfiniBand for ML Training
scenario: Your team must choose between InfiniBand NDR (400Gbps) and RoCE v2 (400Gbps) for a new 1024-MI300X training cluster. Both offer the same line rate but use fundamentally different transport mechanisms.
question: For a 1024-MI300X cluster, how do InfiniBand NDR and RoCE v2 compare in congestion control, multi-tenancy, operations, and recovery?
details:
  realistic_solution: 'InfiniBand NDR advantages: (1) Credit-based flow control avoids the PFC pause-storm and deadlock failure mode. Each sender maintains credits per VL and sends only when receiver buffers are available. (2) Centralized subnet management and adaptive routing provide deterministic, deadlock-aware paths. (3) Mature ML collective support, including in-network reduction on supported fabrics. Disadvantages: narrower vendor choice, separate fabric operations, and higher network cost. RoCE v2 advantages: (1) Standard Ethernet ecosystem and multi-vendor sourcing. (2) Familiar operations for teams already running large Ethernet fabrics. (3) Lower switch cost in the stated budget. Disadvantages: requires careful PFC, ECN, DCQCN, and multi-tenant QoS tuning; recovery from congestion events is more operationally complex. For 1024 MI300X, InfiniBand can be justified when predictable training recovery and simpler lossless-fabric operations matter more than the $6M network savings.'
  common_mistake: |
    **The Pitfall:** Choosing the network purely based on line rate and initial hardware cost.
    **The Rationale:** Candidates see that both offer 400Gbps and assume the ~40% cheaper Ethernet switches are a clear win, completely missing the transport layer differences.
    **The Consequence:** The team chooses RoCE v2 to save $6M, but ends up losing far more in engineer debugging time and wasted GPU-hours recovering from Priority Flow Control (PFC) deadlocks.
  napkin_math: |
    **Assumptions & Constraints:**
    - InfiniBand cost: ~$15M
    - Ethernet cost: ~$9M
    - Total Cluster Cost (1024 MI300X): ~$300M
    - PFC Deadlock frequency: 1 event/day, stalling for 30s

    **Calculations:**
    - Switch Cost Premium = $15M - $9M = $6M
    - Network Premium % = $6M / $300M = ~2%
    - GPU-hours lost per event = 1024 GPUs * (30s / 3600s) = 8.5 GPU-hours
    - Financial Cost per event = 8.5 GPU-hours * $3/hour = $25.5/day

    **Conclusion & Interpretation:**
    - **Result: ~2% Cost Premium (Reliability-Bound)**. Over 3 years, the cost of deadlocks is negligible financially, but the $6M premium for IB eliminates days of congestion-related debugging.
