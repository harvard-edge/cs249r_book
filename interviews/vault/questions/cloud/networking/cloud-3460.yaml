title: Optimizing Distributed LLM Training on NVIDIA H100 Network Bottlenecks
scenario: You are leading the infrastructure team for a distributed LLM training initiative across a cluster of 64 NVIDIA H100 GPUs. Despite impressive compute resources, your training runs are significantly network-bound, characterized by frequent GPU stalls during All-Reduce operations.
question: How would you model bisection bandwidth, communication-computation ratio, and cost impact for 64 H100s stalled on AllReduce, and what optimizations would you take?
details:
  realistic_solution: |
    Treat the AllReduce stall as a collective-communication problem, not just a profiling problem. First measure effective per-GPU bandwidth, cross-switch oversubscription, NCCL algorithm choice, bucket timing, and overlap with backward kernels. Then reduce or hide the global gradient exchange: use topology-aware rank placement, hierarchical or SHARP-style collectives where supported, multiple rails, tuned bucket sizes that start all-reduce as gradients become ready, gradient accumulation to amortize syncs, and ZeRO/FSDP or tensor/pipeline parallelism to reduce the replicated gradient payload. Compression is optional and should be gated by convergence risk. Cost impact should be computed from the non-overlapped communication time that actually stalls the step, then compared with the cost of fabric upgrades or parallelism changes.
  common_mistake: |
    **The Pitfall:** Assuming ideal, non-blocking communication and solely tuning batch sizes or software frameworks without profiling the physical network fabric.
    **The Rationale:** Engineers trust the raw hardware specification numbers without accounting for cross-switch topology bottlenecks, oversubscription rates, and the massive payload sizes of global All-Reduce.
    **The Consequence:** GPUs remain idle for the majority of the training step, severely depressing TFLOPS utilization, burning millions in cloud budget, and drastically extending time-to-market.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: 100B params in FP16, so the gradient tensor is 200 GB.
    - Cluster: 64 H100 GPUs using data parallelism.
    - Effective per-GPU fabric bandwidth for the global collective is 40 GB/s after protocol overhead and topology limits.
    - Backward pass compute time after local overlap opportunities: 0.5 seconds.
    - Cloud cost for the 64-GPU job: $640/hour.

    **Calculations:**
    - Ring all-reduce communicated volume per GPU: 2 * (64 - 1) / 64 * 200 GB = 393.75 GB.
    - Communication time per GPU with no additional overlap: 393.75 GB / 40 GB/s = 9.84 seconds.
    - Communication-computation ratio before optimization: 9.84 / 0.5 = 19.7:1.
    - If 0.5 seconds of all-reduce overlaps with backward compute, non-overlapped network stall is about 9.34 seconds and step time is about 9.84 seconds.
    - Stalled fraction under that overlap assumption: 9.34 / 9.84 = 95%.
    - Cost exposure from non-overlapped communication: 95% * $640/hour = about $608/hour of GPU time spent waiting on the collective.

    **Conclusion & Interpretation:**
    - **Result: Massively Network-Bound under the stated effective per-GPU bandwidth.** Model bisection first, then compare the cost of higher-bandwidth rails with sharding, pipeline/tensor parallelism, gradient accumulation, and overlap that reduce or hide the global all-reduce.
