title: Sizing Leaf Switches for Rail-Optimized Clusters
scenario: You are architecting a non-blocking rail-optimized InfiniBand network for 128 nodes (1,024 GPUs total, 8 GPUs and 8x 400Gbps NICs per node). To maximize Tensor Parallelism and AllReduce efficiency, each GPU index (0-7) is wired to a completely isolated 'rail' network. If you are using 64-port 400Gbps switches, calculate the minimum number of leaf switches required across the entire cluster to ensure full non-blocking bandwidth (1:1 oversubscription) within each rail.
question: "How many 64-port 400 Gbps leaf switches are needed across all 8 rails for a 1:1 non-blocking network for 128 nodes?"
details:
  realistic_solution: |
    In a 1:1 non-blocking leaf-spine design, a 64-port switch provides 32 downlinks to compute nodes. Since each of the 8 rails connects 128 NICs (one from each of the 128 nodes), each rail needs 128 / 32 = 4 leaf switches. Totaling all 8 rails yields 32 leaf switches.
  common_mistake: |
    **The Pitfall:** Dividing total GPUs by total switch ports without accounting for uplinks.
    **The Rationale:** Network engineers forget that a non-blocking fat-tree architecture requires exactly half the ports to be reserved for spine uplinks.
    **The Consequence:** Deploying an oversubscribed network that creates severe congestion during synchronous AllReduce operations.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 128 nodes, 8 NICs per node (1,024 GPUs).
       - 8 isolated rails.
       - 64-port switches in a 1:1 non-blocking leaf-spine.
    2. **Calculations:**
       - Downlinks per switch = 64 / 2 = 32.
       - NICs per rail = 128.
       - Leaf switches per rail = 128 / 32 = 4.
       - Total leaf switches = 4 * 8 rails = 32.
    3. **Conclusion & Interpretation:**
       - **Result: Topology-Bound**. 32 leaf switches are strictly required to maintain full non-blocking bandwidth across all 8 rails.
