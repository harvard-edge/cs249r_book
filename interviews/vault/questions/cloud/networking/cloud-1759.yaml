title: Evaluating RoCEv2 QoS for Mixed Workloads
scenario: Your team operates a dense GPU cluster connected via a non-blocking 400 Gbps RoCEv2 fabric mixing LLM training and real-time inference. During synchronous training checkpoints, inference P99 latency spikes to 800ms.
question: How would you configure DSCP, ECN, PFC, and virtual lanes so inference stays under 50 ms P99 during training checkpoints?
details:
  realistic_solution: Implement at least 3 traffic classes. Apply Strict Priority and rate-limiting to inference. ECN on training flows ensures they throttle before triggering PFC, reserving PFC as a last resort.
  common_mistake: |
    **The Pitfall:** Relying solely on enabling PFC for all traffic.
    **The Rationale:** Candidates assume PFC is a universal solution for lossless networking without realizing it causes head-of-line blocking.
    **The Consequence:** Buffer exhaustion leading to severe tail latency spikes for latency-sensitive inference flows.
  napkin_math: |
    **Assumptions & Constraints:**
    - 400Gbps (50GB/s) link. Inference buffer = 2MB.
    - QoS policy isolates inference traffic; this buffer calculation only covers a short microburst, not full checkpoint duration.

    **Calculations:**
    - Microburst absorption = 2MB / 50GB/s = 40us.
    - A 50ms P99 target is 1,250x longer than 40us, so queue isolation, strict priority, and ECN/PFC thresholds must prevent sustained training queues from reaching inference.

    **Conclusion & Interpretation:**
    - **Result: 40us burst absorption (QoS-Bound)**. The 2MB buffer can absorb only tiny bursts; the latency target depends on traffic-class isolation and congestion control, not buffer size alone.
