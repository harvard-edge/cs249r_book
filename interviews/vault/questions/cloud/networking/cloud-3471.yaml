title: LLM Inference Routing on AMD MI300X Cluster
scenario: You are leading the infrastructure team for a real-time LLM inference service deployed across a global cluster of 500 AMD MI300X accelerators. Your current LLM model instance consumes 150 GB of HBM3 and processes a single request in 150ms. The service experiences highly variable traffic, with peak loads reaching 10,000 requests per second (RPS).
question: How would you load-balance and route 10,000 RPS across 500 instances while handling variable requests, updates, and failures?
details:
  realistic_solution: Use global routing only to choose a healthy region with capacity, then make the important decision at the regional inference router. The regional router should use least-outstanding-requests or shortest-predicted-latency, with weights from queue depth, active batch slots, observed P95/P99 latency, HBM pressure, request length class, and health state. Admit requests into continuous batches by compatible shape or latency class so long prompts do not block short ones. For updates, mark old instances draining, stop sending new work, let in-flight batches finish, and gradually shift canary traffic to the new version. For failures, remove the instance from routing immediately and rebalance based on remaining capacity rather than raw instance count.
  common_mistake: |
    **The Pitfall:** Implementing standard web (stateless) round-robin routing.
    **The Rationale:** Traditional microservice engineers assume requests have uniform processing times and that GPUs can be treated like standard CPU workers.
    **The Consequence:** Load becomes severely imbalanced due to varying inference sequence lengths. GPUs are underutilized, batching efficiency plummets, and P99 tail latency spikes dramatically.
  napkin_math: |
    **Assumptions & Constraints:**
    - 500 GPUs, 150ms per unbatched request.
    - Target load: 10,000 RPS.

    **Calculations:**
    - Unbatched per-instance capacity = 1 / 0.150s = 6.67 RPS.
    - Unbatched fleet capacity = 500 GPUs * 6.67 RPS = 3,333 RPS.
    - Required average per-GPU throughput: 10,000 RPS / 500 GPUs = 20 RPS/GPU.
    - Throughput gap: 20 / 6.67 = about 3x over unbatched service.
    - Meeting the target therefore requires about 3x effective throughput from continuous batching, request concurrency, shorter average requests, or more GPUs; with 20% failure/update headroom, active instances would need 10,000 / 0.8 / 500 = 25 RPS each.

    **Conclusion & Interpretation:**
    - **Result: route by predicted latency and batch-aware capacity, not instance count.** The 150ms single-request latency can fit an individual request, but 500 GPUs cannot sustain 10,000 RPS unless batching or concurrency raises each instance to about 20 RPS, or about 25 RPS with 20% headroom.
