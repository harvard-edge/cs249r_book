title: L7 Load Balancing for Speech AI
scenario: You are configuring an L7 load balancer for a speech-to-text inference service processing 2,000 concurrent audio streams at 250 KB/s each. The backend has 40 worker nodes. Inference processing times vary wildly between 100ms and 800ms.
question: What minimum ingress bandwidth is needed for 2,000 audio streams at 250 KB/s, and what routing algorithm minimizes P99 latency?
details:
  realistic_solution: Provision a load balancer capable of at least 4 Gbps ingress bandwidth and configure it to use Least Outstanding Requests (LOR) or Power of Two Choices routing to gracefully handle the high variance in inference times.
  common_mistake: |
    **The Pitfall:** Defaulting to a simple Round-Robin routing algorithm.
    **The Rationale:** Round-Robin is the standard, easy-to-configure default for most L7 load balancers.
    **The Consequence:** It ignores worker queue depth, causing severe head-of-line blocking on nodes stuck processing 800ms audio sequences while other nodes sit idle.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Concurrent streams: 2,000.
       - Stream bandwidth: 250 KB/s per stream.
    2. **Calculations:**
       - Aggregate Ingress Bandwidth in Bytes: 2,000 * 250 KB/s = 500,000 KB/s = 500 MB/s.
       - Aggregate Ingress Bandwidth in Bits: 500 MB/s * 8 bits/Byte = 4,000 Mbps = 4 Gbps.
    3. **Conclusion & Interpretation:** **4 Gbps minimum ingress (Network Ingress-Bound).**
