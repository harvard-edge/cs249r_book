title: KV-Cache Aware LLM Routing
scenario: Architect a request routing layer for a multi-tenant LLM inference service backed by clustered compute nodes connected via InfiniBand NDR (50 GB/s). Requests vary heavily from 100 to 50,000 tokens in prompt length. The current least-connections load balancer causes severe tail latency and frequent out-of-memory errors due to redundant KV cache allocations.
question: How would you route variable-length LLM requests to maximize KV-cache hits and utilization while avoiding hot spots and OOMs?
details:
  realistic_solution: Implement a stateful, cache-aware routing layer that uses prefix-based consistent hashing for shared system prompts or document contexts, while also tracking each node's queue depth, free KV capacity, and active sequence lengths. Prefer affinity when the target node has headroom; otherwise spill to a less-loaded node only when the expected wait plus optional KV transfer is cheaper than recompute and will not create an OOM. Large or one-off prompts may be better recomputed or admitted with lower priority instead of blindly transferred.
  common_mistake: |
    **The Pitfall:** Applying traditional stateless load balancing (round-robin or least-connections).
    **The Rationale:** Candidates fail to recognize the stateful nature of LLM inference and the massive overhead of KV cache reconstruction.
    **The Consequence:** Redundant KV cache allocations across nodes, leading to poor memory utilization and OOM errors.
  napkin_math: |
    **Assumptions & Constraints:**
    - 70B decoder model, BF16 KV cache, 80 layers, 8 KV heads, 128 dim.
    - 20,000-token reusable prefix.
    - InfiniBand NDR (50 GB/s bandwidth).

    **Calculations:**
    - KV cache size = tokens * layers * 2 (K and V) * KV heads * head dim * bytes/element.
    - Size = 20,000 * 80 * 2 * 8 * 128 * 2 = 6,553,600,000 bytes = 6.55 GB.
    - Best-case network transfer time = 6.55 GB / 50 GB/s = 131 ms before serialization, contention, and receiver allocation overhead.
    - Recompute cost depends on model implementation, prompt batching, attention kernels, and queueing; a simple parameters-per-token estimate is not a reliable routing rule.
    - Routing decision should compare expected queue wait, free HBM, cache hit value, transfer contention, and prefix reuse probability.

    **Conclusion & Interpretation:**
    - **Result: cache affinity is the default, KV transfer is selective.** A 6.55 GB prefix can be moved in about 131 ms at line rate, but transfer is only preferable when it beats recompute plus queueing and the destination has enough HBM headroom.
