title: Link Budget Fundamentals
scenario: A datacenter architect says we cannot run 400G over 5 meters of passive
  copper.
question: What is a link budget, and why does it determine whether 400G can run over
  5 meters of passive copper?
details:
  realistic_solution: 'A link budget is the accounting of all signal power gains and
    losses from transmitter to receiver. The transmitter outputs a signal at a certain
    power level. As it travels through the cable, connectors, and board traces, it
    loses power (attenuation). The receiver needs a minimum signal-to-noise ratio
    (SNR) to correctly decode bits. The link budget equation: TX power - cable loss
    - connector loss - board trace loss ≥ RX sensitivity + margin. At 400G using PAM4
    signaling (4 levels per symbol), the required SNR is much higher than at lower
    speeds, so the margin shrinks. Copper cables attenuate more at higher frequencies,
    so 400G PAM4 over copper has a maximum reach of ~3m for passive cables. Beyond
    that, you need active copper cables (with built-in amplifiers) or optical transceivers.'
  common_mistake: '**The Pitfall:** Thinking cable distance is only limited by signal
    speed or propagation delay.

    **The Rationale:** The real limit is signal attenuation — the signal degrades
    with distance until the receiver cannot distinguish bits from noise.

    **The Consequence:** Selecting passive cables for distances that require active
    components, resulting in link failures.

    '
  napkin_math: '**Assumptions & Constraints:**

    - 400G transmission using PAM4 signaling (4 levels per symbol).

    - Copper cables experience high frequency attenuation.

    - Link budget equation: TX power - losses (cable, connector, trace) >= RX sensitivity
    + margin.


    **Calculations:**

    - Max distance for 400G PAM4 over passive copper: ~3 meters.

    - Max distance for active copper: ~5-7 meters.

    - Max distance for optical (multimode/single-mode): 100m to 10km+.


    **Conclusion & Interpretation:**

    - **Result: ~3m max distance (Signal-Bound)**. The higher SNR requirement of PAM4
    signaling drastically shrinks the available link budget, forcing the transition
    to active or optical interconnects for any run longer than 3 meters.

    '
