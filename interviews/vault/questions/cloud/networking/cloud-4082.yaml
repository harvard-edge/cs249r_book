title: RDMA Performance Isolation with SR-IOV
scenario: A cloud provider wants to offer bare-metal RDMA performance to multiple tenants sharing a physical MI300X server. SR-IOV creates virtual NIC functions (VFs) from a physical 400G ConnectX-7 NIC.
question: What is the SR-IOV RDMA overhead versus bare metal on one 400G ConnectX-7 NIC, and how many tenants can share it above 90% AllReduce throughput?
details:
  realistic_solution: 'SR-IOV overhead analysis for RDMA: (1) IOMMU translation: each DMA operation goes through IOMMU page table walk. Impact: +100ns per DMA transaction = +200ns per RDMA Write (read source + write destination). For 4KB packets: 200ns / 82ns (serialization at 400G) = 2.4× latency overhead per packet. Throughput impact: 100ns / (82ns + 100ns) = 55% of time spent on IOMMU → 45% throughput = 180 Gbps. With IOMMU IOTLB cache hit (64-entry TLB): overhead drops to ~10ns → 92% throughput = 368 Gbps. (2) VF scheduling: the PF (Physical Function) arbitrates between VFs. With round-robin and N VFs: each VF gets 1/N of processing cycles. (3) Maximum tenants for 90% throughput: per VF bandwidth = 400Gbps × 0.92 (IOMMU) / N = target 360 Gbps (90%). Solving: N = 400 × 0.92 / 360 = 1.02 → N=1 only! This means a single VF achieves ~92% of bare-metal, and adding a second VF drops each to 46% — unacceptable. Solution: use separate physical NICs per tenant (possible on MI300X with 8 NICs), or use one NIC per tenant with dedicated VFs on dedicated PCIe virtual functions that have guaranteed bandwidth. With per-VF rate guarantees: 2 VFs × 200Gbps each = 400Gbps total, each achieving ~184 Gbps effective (92% × 200G) = 46% of bare-metal per VF.'
  common_mistake: |
    **The Pitfall:** Assuming SR-IOV has zero overhead because it is "hardware virtualization."
    **The Rationale:** Candidates overlook that SR-IOV adds IOMMU address translation, VF scheduling latency, and physical resource sharing.
    **The Consequence:** Provisioning multiple VFs per physical NIC leads to unacceptable RDMA throughput degradation for distributed workloads.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 400G ConnectX-7 NIC.
       - IOMMU translation overhead limits bare-metal throughput to 92%.
       - Target throughput: >90% of bare-metal per tenant.
    2. **Calculations:**
       - Bare-metal Throughput: 400 Gbps * 92% = 368 Gbps per NIC.
       - SR-IOV with 2 VFs: 368 Gbps / 2 = 184 Gbps per VF (46% of bare-metal).
       - SR-IOV with 4 VFs: 368 Gbps / 4 = 92 Gbps per VF (23% of bare-metal).
    3. **Conclusion & Interpretation:**
       - For >90% throughput, a dedicated NIC per tenant is required. With 8 NICs per MI300X, the maximum is 8 tenants.
       - **Result: 1 Tenant per NIC (8 Tenants Max)**
