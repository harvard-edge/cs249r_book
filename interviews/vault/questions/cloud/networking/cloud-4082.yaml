title: RDMA Performance Isolation with SR-IOV
scenario: A cloud provider wants to offer bare-metal RDMA performance to multiple tenants sharing a physical MI300X server. SR-IOV creates virtual NIC functions (VFs) from a physical 400G ConnectX-7 NIC.
question: What is the SR-IOV RDMA overhead versus bare metal on one 400G ConnectX-7 NIC, and how many tenants can share it above 90% AllReduce throughput?
details:
  realistic_solution: A defensible SR-IOV answer separates virtualization overhead from bandwidth sharing. For one active VF on a 400G ConnectX-7, the main overheads are IOMMU address translation, interrupt/completion isolation, and VF/PF management. With pinned huge pages, good IOTLB locality, and polling, the steady-state RDMA data path can be close to bare metal; assume about 5-8% overhead, or roughly 368-380 Gbps effective throughput from a 400G NIC. SR-IOV does not inherently give each VF 1/N of NIC processing cycles, but tenants sharing one physical 400G link cannot each receive more than their allocated share of that link. If the requirement is each tenant remains above 90% of bare-metal AllReduce throughput, each tenant needs at least 360 Gbps effective. With a 7% SR-IOV overhead, one tenant gets about 372 Gbps and passes. Two equal active tenants would each get about 400G × 0.93 / 2 = 186 Gbps, which fails the per-tenant >90% target. Therefore the answer for one physical 400G NIC
    is one active high-performance tenant. More tenants are possible only by accepting lower per-tenant throughput, time-slicing, or assigning separate physical NIC capacity.
  common_mistake: |
    **The Pitfall:** Assuming SR-IOV has zero overhead because it is "hardware virtualization."
    **The Rationale:** Candidates overlook that SR-IOV adds IOMMU address translation, VF scheduling latency, and physical resource sharing.
    **The Consequence:** Provisioning multiple VFs per physical NIC leads to unacceptable RDMA throughput degradation for distributed workloads.
  napkin_math: |
    **Assumptions & Constraints:**
    - One 400G ConnectX-7 NIC.
    - Bare-metal reference throughput: 400 Gbps.
    - SR-IOV steady-state overhead with good pinning and polling: 7%.
    - Target: each active tenant must exceed 90% of bare-metal AllReduce throughput, or >360 Gbps.

    **Calculations:**
    - One active VF: 400 Gbps * (1 - 0.07) = 372 Gbps, which is 93% of bare metal and passes.
    - Two equal active VFs sharing the same physical link: 372 Gbps / 2 = 186 Gbps per tenant, which is 46.5% of bare metal and fails.
    - Four equal active VFs: 372 Gbps / 4 = 93 Gbps per tenant, which is 23.25% of bare metal and fails.

    **Conclusion & Interpretation:**
    - **Result: 1 active high-performance tenant per 400G NIC.** SR-IOV overhead alone can be below 10%, but bandwidth sharing prevents multiple simultaneous tenants from each exceeding 90% of bare-metal throughput on the same NIC.
