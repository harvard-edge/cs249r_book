title: NVLink vs PCIe Gen4 Bandwidth on A100
scenario: You are designing a custom cloud instance for medium-sized model inference. You must state the
  difference in primary use case and bandwidth between NVLink and PCIe Gen4 on an A100 system.
question: What are the primary use cases and bandwidths of NVLink versus PCIe Gen4 on an A100 system?
details:
  realistic_solution: PCIe Gen4 connects the CPU host to the GPU device with a bandwidth of 32 GB/s, primarily
    used for initial data loading and host-device coordination. NVLink connects GPUs directly to other
    GPUs with a massive 600 GB/s bandwidth on the A100, primarily used for high-speed collective communications
    like All-Reduce in distributed training or tensor parallelism.
  common_mistake: '**The Pitfall:** Assuming PCIe Gen4 can be used for efficient Tensor Parallelism.

    **The Rationale:** Tensor Parallelism requires massive bandwidth for constant synchronization.

    **The Consequence:** Using PCIe Gen4 for this leads to severe bottlenecks, as it lacks the massive
    bandwidth of NVLink.'
  napkin_math: '**Assumptions & Constraints:**

    - 4GB of gradients across GPUs.

    - PCIe Gen4 bandwidth: 32 GB/s. A100 NVLink bandwidth: 300 GB/s (unidirectional).


    **Calculations:**

    - PCIe Gen4 All-Reduce: 4GB / 32GB/s = 125ms.

    - NVLink All-Reduce: 4GB / 300GB/s = 13.3ms.


    **Conclusion & Interpretation:**

    - **Result:** NVLink provides a nearly 10x improvement in latency.'
