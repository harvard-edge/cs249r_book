title: 'LLM Inference Scaling: H100 Load Balancing & Routing for P99 Latency'
scenario: You are tasked with designing the inference serving architecture for a large language model (LLM) at scale. The system must handle a sustained load of 10,000 requests per second (RPS) and achieve a P99 latency of 100ms. A single inference call on your target GPU typically takes 50ms. How would you design the request routing and load balancing strategy to meet these requirements, considering the specific characteristics of the hardware and inference traffic patterns?
question: How would you design the request routing and load balancing strategy to meet these requirements, considering the specific characteristics of the hardware and inference traffic patterns?
details:
  realistic_solution: |
    A robust solution would involve a multi-layered approach: (1) A proxy layer with intelligent request routing using consistent hashing combined with dynamic, weighted distribution based on real-time GPU metrics (e.g., HBM utilization, compute utilization, inference queue depth, and health checks). (2) A control plane that continuously monitors GPU fleet health and performance, dynamically adjusts weights, and can quickly re-route traffic away from overloaded or failing instances. (3) Implementing adaptive batching on the inference servers to optimize throughput while carefully managing batch sizes to stay within P99 latency targets. (4) Prioritizing requests or implementing QoS for critical traffic, and using circuit breakers to prevent cascading failures.
  common_mistake: |
    **The Pitfall:** Applying generic CPU-centric load balancing strategies (like simple round-robin).
    **The Rationale:** Engineers ignore GPU-specific bottlenecks like HBM bandwidth saturation and the non-linear relationship between GPU utilization and queuing latency.
    **The Consequence:** Severe tail latency degradation and missed P99 SLOs because bursts overwhelm highly-utilized GPUs.
  napkin_math: |
    **Assumptions & Constraints:**
    - Sustained load is 10,000 RPS.
    - Single inference service time is 50ms, or 20 RPS per GPU if only one request runs at a time.
    - P99 latency SLO is 100ms.

    **Calculations:**
    - Throughput-bound minimum = 10,000 RPS / 20 RPS per GPU = 500 GPUs.
    - Concurrent inferences at steady state = 10,000 RPS * 0.050s = 500.
    - Extra capacity is still needed for bursts, failures, rollout headroom, and queueing variance, but the amount depends on measured arrival and service distributions.

    **Conclusion & Interpretation:**
    - **Result: 500-GPU Throughput Floor.** Provision above 500 GPUs as a utilization and P99 headroom policy; do not treat 1,000 GPUs as a value derived from the simple throughput math.
