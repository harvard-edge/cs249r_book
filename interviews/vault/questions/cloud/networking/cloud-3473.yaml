title: 'LLM Inference Scaling: H100 Load Balancing & Routing for P99 Latency'
scenario: You are designing inference serving for a large language model on an H100 GPU fleet. The system must handle a sustained 10,000 requests per second and achieve P99 latency under 100ms. A single inference call on one H100 typically takes 50ms, so the fleet has a 500-GPU throughput floor before headroom for bursts, failures, and rollout capacity.
question: Which request routing policy would you use above the 500-GPU floor to meet the 100ms P99 latency target?
details:
  realistic_solution: |
    Provision more than the 500-GPU throughput floor and use latency-aware least-outstanding-requests routing over the healthy H100 replicas. The proxy should score each compatible replica by predicted delay: current queue depth, active continuous-batching slots, recent service time for the request class, HBM/KV-cache pressure, and health state. Consistent hashing can be used only inside an eligibility set when prefix-cache or model-shard locality matters; it should not override queue signals for the P99 path. The control plane should lower or remove weights for replicas approaching the 100ms budget, keep spare capacity for bursts and rolling deploys, and use adaptive batching with a hard per-request latency guard. QoS queues and circuit breakers protect critical traffic and prevent overloaded GPUs from accumulating tail-latency debt.
  common_mistake: |
    **The Pitfall:** Applying generic CPU-centric load balancing strategies (like simple round-robin).
    **The Rationale:** Engineers ignore GPU-specific bottlenecks like HBM bandwidth saturation and the non-linear relationship between GPU utilization and queuing latency.
    **The Consequence:** Severe tail latency degradation and missed P99 SLOs because bursts overwhelm highly-utilized GPUs.
  napkin_math: |
    **Assumptions & Constraints:**
    - Sustained load is 10,000 RPS.
    - Single inference service time is 50ms, or 20 RPS per GPU if only one request runs at a time.
    - P99 latency SLO is 100ms.

    **Calculations:**
    - Throughput-bound minimum = 10,000 RPS / 20 RPS per GPU = 500 GPUs.
    - Concurrent inferences at steady state = 10,000 RPS * 0.050s = 500.
    - Extra capacity is still needed for bursts, failures, rollout headroom, and queueing variance, but the amount depends on measured arrival and service distributions.

    **Conclusion & Interpretation:**
    - **Result: 500-GPU Throughput Floor.** Provision above 500 GPUs as a utilization and P99 headroom policy; do not treat 1,000 GPUs as a value derived from the simple throughput math.
