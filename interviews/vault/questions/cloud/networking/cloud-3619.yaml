title: AllReduce Algorithm Selection for Heterogeneous Bandwidth Topology
scenario: 'A 256-GPU cluster has a hierarchical network: 8 GPUs per node (NVLink 900GB/s), 8 nodes per rack (HDR InfiniBand 200Gbps), 4 racks (HDR100 100Gbps inter-rack). Gradient tensors are 40GB (FP32, 10B params).'
question: What hierarchical AllReduce topology, time estimate, and optimization should the 256-GPU cluster use for 40 GB gradients?
details:
  realistic_solution: Hierarchical AllReduce exploits bandwidth hierarchy. Treat the 900GB/s NVLink figure as bidirectional aggregate and use about 450GB/s as a conservative one-way ring bandwidth. First, use intra-node reduce-scatter/allgather across the 8 GPUs, with a 40GB-equivalent NVLink ring cost of 2×(7/8)×40GB/450GB/s=155ms. After local partitioning, each GPU lane carries only 40GB/8=5GB across InfiniBand, not the full 40GB again. Intra-rack exchange over 8 nodes is 2×(7/8)×5GB/25GB/s=350ms. Inter-rack exchange over 4 racks is 2×(3/4)×5GB/12.5GB/s=600ms. The uncompressed critical-path lower bound is about 1.10s before software overhead and synchronization. A concrete optimization is topology-aware sharding or PowerSGD/error-feedback compression at the inter-rack boundary; 10× compression makes the inter-rack term about 60ms and the modeled lower bound about 565ms.
  common_mistake: |
    **The Pitfall:** Using flat ring-AllReduce across all 256 GPUs.
    **The Rationale:** Candidates may default to the standard NCCL ring topology without adapting to the network's bandwidth hierarchy.
    **The Consequence:** Routing 80% of gradient traffic over the slow 100Gbps inter-rack links, drastically bottlenecking the entire training cluster.
  napkin_math: |
    **Assumptions & Constraints:**
    - 40GB gradient is partitioned across the 8 local GPU lanes before traffic crosses InfiniBand.
    - NVLink is quoted as 900GB/s aggregate; use 450GB/s as a conservative one-way ring bandwidth.
    - Intra-rack 200Gbps bandwidth: 25GB/s between node leaders.
    - Inter-rack 100Gbps bandwidth: 12.5GB/s between rack leaders.

    **Calculations:**
    - Intra-node reduce-scatter/allgather over 8 GPUs: 2 * (7/8) * 40GB / 450GB/s = 155ms.
    - Per-lane gradient shard crossing InfiniBand: 40GB / 8 = 5GB.
    - Intra-rack exchange over 8 nodes: 2 * (7/8) * 5GB / 25GB/s = 350ms.
    - Inter-rack exchange over 4 racks: 2 * (3/4) * 5GB / 12.5GB/s = 600ms.
    - Uncompressed critical-path lower bound: 155ms + 350ms + 600ms = 1.105s.
    - Compressing or topology-sharding inter-rack traffic by 10x: 0.5GB equivalent across racks -> 60ms.
    - Total lower bound with inter-rack compression: 155ms + 350ms + 60ms = 565ms.

    **Conclusion & Interpretation:**
    - **Result: about 1.10s uncompressed lower bound, about 565ms with 10x inter-rack reduction.** Inter-rack bandwidth is still the bottleneck, but the model must charge only the per-lane shard to the rack-level exchanges.
