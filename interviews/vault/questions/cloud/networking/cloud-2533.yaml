title: Cloud Ultra Ethernet L5 0
scenario: For a new 2048-GPU training cluster, you must choose between InfiniBand NDR (400 Gbps) and Ultra Ethernet (400 Gbps). The job is a 175B GPT model trained over 60 days.
question: For a 2048-GPU, 60-day 175B GPT training run, would you choose InfiniBand NDR or Ultra Ethernet, and why?
details:
  realistic_solution: 'InfiniBand NDR: mature ecosystem, NCCL optimized for IB, SHARP in-network reduction reduces AllReduce latency by 2x, proven at scale (10K+ GPUs). Cost: ~$15K per port. Ultra Ethernet: 30-40% cheaper per port (~$9K), uses commodity switches, packet spraying gives good bandwidth utilization, but ecosystem is newer — driver maturity, NCCL backend optimization, and operational tooling are less proven. For a 60-day critical training run, the risk of UE debugging delays could cost more than IB''s price premium. For inference or less time-critical workloads, UE''s cost advantage is compelling.'
  common_mistake: |
    **The Pitfall:** Choosing purely on theoretical per-port bandwidth costs without considering ecosystem maturity.
    **The Rationale:** Both fabrics offer 400 Gbps, so the cheaper option seems technically equivalent.
    **The Consequence:** Micro-inefficiencies in collective communication operations compound over a massive training run, costing millions in delayed deployment and wasted GPU idle time.
  napkin_math: |
    **Assumptions & Constraints:**
    - 2048 GPUs. 60-day training.
    - IB NDR: ~$15K/port. UE: ~$9K/port.

    **Calculations:**
    - Hardware savings: 2048 × ($15K - $9K) = $12.3M.
    - GPU cost: 2048 × $2/hr = ~$98K/day downtime cost.
    - If UE ecosystem immaturity causes a 5% AllReduce slowdown, training takes 3 extra days ($294K). If it causes 5 days of debugging downtime: $490K.

    **Conclusion & Interpretation:**
    - **Result: Ecosystem-Bound.** While Ultra Ethernet saves $12.3M upfront, for a critical 60-day training run, InfiniBand's mature NCCL and SHARP ecosystem guarantees stability that often outweighs hardware cost.
