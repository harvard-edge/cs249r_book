title: 400G DAC Link Degradation in Dense Racks
scenario: You are bringing up a new dense AI rack containing 8-GPU nodes. To minimize latency and cost, you use 3-meter 400G passive Direct Attach Copper (DAC) cables to connect the ConnectX-7 NICs to the Top-of-Rack (ToR) switch at the top of the 42U rack. During a 24-hour NCCL bandwidth burn-in test, you observe intermittent port flapping and high Forward Error Correction (FEC) uncorrectable symbol errors specifically on the nodes located at the very bottom of the rack.
question: What is the most likely physical root cause, and how do you systematically diagnose and mitigate it?
details:
  realistic_solution: Identify that the bottom-of-rack 3-meter 400G passive DACs are operating near their signal-integrity margin. Tight cable routing can violate the minimum bend radius and add several dB of loss, which is consistent with intermittent port flapping and FEC uncorrectable symbol errors on the longest, most stressed runs. Diagnose by checking per-port FEC counters, swapping suspect cables with known-good shorter runs, inspecting bend radius and strain relief, and measuring link health after rerouting. Mitigate with proper cable management, shorter DACs where possible, or Active Electrical Cables (AECs) with built-in signal conditioning for bottom-of-rack nodes.
  common_mistake: |
    **The Pitfall:** Assuming the DAC cables are defective or that switch firmware is buggy.
    **The Rationale:** Treating physical networking cables as flawless digital pipes without considering analog signal degradation.
    **The Consequence:** Unnecessary hardware RMAs and prolonged cluster downtime while the actual physical bend radius issue persists.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Illustrative 3m passive DAC insertion loss: ~14 dB.
       - Tight bend or strain penalty on bottom-node runs: +2-4 dB.
    2. **Calculations:**
       - Estimated stressed-run loss range = 14 dB + 2-4 dB = 16-18 dB.
       - The stressed bottom-node runs can therefore land several dB worse than the same cable installed without tight bends.
    3. **Conclusion & Interpretation:**
       - **Result: Signal-Integrity-Bound.** The math supports a qualitative diagnosis: bend-induced loss can consume the passive DAC margin. It does not by itself derive a precise BER or FEC threshold, so confirm with counters, cable swaps, and rerouting tests.
