title: 400G DAC Link Degradation in Dense Racks
scenario: You are bringing up a new dense AI rack containing 8-GPU nodes. To minimize
  latency and cost, you use 3-meter 400G passive Direct Attach Copper (DAC) cables
  to connect the ConnectX-7 NICs to the Top-of-Rack (ToR) switch at the top of the
  42U rack. During a 24-hour NCCL bandwidth burn-in test, you observe intermittent
  port flapping and high Forward Error Correction (FEC) uncorrectable symbol errors
  specifically on the nodes located at the very bottom of the rack.
question: What is the most likely physical root cause, and how do you systematically
  diagnose and mitigate it?
details:
  realistic_solution: Identify that 3-meter 400G passive DACs are at the absolute
    limit of the insertion loss budget (~17.16 dB). Nodes at the bottom of the rack
    require tight cable routing; violating the minimum bend radius degrades signal
    integrity by 2-4 dB, pushing total loss to ~17.5 dB — exceeding the budget and
    driving pre-FEC BER above the KP4 FEC threshold of 2.4e-4. The fix is to use Active
    Electrical Cables (AECs) with built-in signal retiming for bottom-of-rack nodes,
    or switch to shorter DAC runs with proper cable management.
  common_mistake: '**The Pitfall:** Assuming the DAC cables are defective or that
    switch firmware is buggy.

    **The Rationale:** Treating physical networking cables as flawless digital pipes
    without considering analog signal degradation.

    **The Consequence:** Unnecessary hardware RMAs and prolonged cluster downtime
    while the actual physical bend radius issue persists.

    '
  napkin_math: "1. **Assumptions & Constraints:**\n   - Standard 3m AWG26 DAC Loss:\
    \ ~14 dB.\n   - Tight Bend Penalty (Bottom Nodes): +3.5 dB.\n   - 400G PAM4 Insertion\
    \ Loss Budget: 17.16 dB at 13.28 GHz.\n2. **Calculations:**\n   - Total Loss =\
    \ 14 dB + 3.5 dB = 17.5 dB.\n   - 17.5 dB > 17.16 dB budget.\n3. **Conclusion\
    \ & Interpretation:**\n   - **Result: 17.5 dB Loss (Signal-Integrity-Bound).**\
    \ The tight bend radius at the bottom of the rack pushes the loss past the strict\
    \ PAM4 budget, driving the pre-FEC BER beyond uncorrectable thresholds.\n"
