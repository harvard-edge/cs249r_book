title: The Multi-Node Scaling Cliff
scenario: You are a Staff ML Engineer scaling an LLM training job from a single 8-GPU H100 node to a 2-node, 16-GPU setup. You observe that moving from 1 to 8 GPUs gave a 7.5x speedup, but adding the second node only increased the total speedup to 9x, far from the expected ~15x. Your profiling tools confirm that GPU utilization is consistently high (>90%) on all 16 GPUs, and there are no memory errors. The nodes are connected with InfiniBand NDR.
question: Why does adding a second 8-GPU node raise speedup only to 9x despite >90% GPU utilization?
details:
  realistic_solution: 'The bottleneck is the InfiniBand interconnect between the two nodes. Intra-node communication for the first 8 GPUs happens over the extremely high-bandwidth NVLink bus. When you scale to a second node, the collective operations must traverse the much slower InfiniBand link. High GPU utilization is misleading; the GPUs are busy spinning/waiting on synchronous network collectives.'
  common_mistake: |
    **The Pitfall:** Trusting high GPU utilization blindly.
    **The Rationale:** Candidates assume >90% utilization means the GPUs are compute-bound, not realizing they are spinning/waiting on synchronous network collectives.
    **The Consequence:** The candidate misdiagnoses the network bottleneck as a compute or code issue.
  napkin_math: |
    **Assumptions & Constraints:**
    - Gradients: 70B model = 140GB (FP16).
    - Intra-node (NVLink): 900 GB/s.
    - Inter-node (InfiniBand NDR): 50 GB/s.

    **Calculations:**
    - Intra-node transfer: 140GB / 900 GB/s = 155ms.
    - Inter-node transfer: 140GB / 50 GB/s = 2.8s.

    **Conclusion & Interpretation:**
    - **Result: 2.8s (Interconnect-Bound)**. The network bandwidth drops 18x, turning a fast 155ms sync into a massive 2.8s stall.
  options:
  - The training framework is using inefficient TCP/IP for communication instead of RDMA.
  - The PCIe Gen5 bus on each server is saturated from transferring data between the CPU and GPUs.
  - The communication time for the All-Reduce operation over InfiniBand has become the dominant factor in the training step time.
  - There is insufficient HBM3 memory on the GPUs, causing them to swap data to system RAM.
  correct_index: 2
