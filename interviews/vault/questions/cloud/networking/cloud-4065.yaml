title: PCIe Bandwidth Bottleneck for GPUDirect RDMA
scenario: An H100 SXM GPU connects to its ConnectX-7 NIC over a PCIe Gen5 x16 path with about 64 GB/s raw bandwidth per direction.
question: Where is the GPUDirect RDMA bottleneck on H100 SXM, and how much headroom remains between PCIe Gen5 x16 and a 400Gbps NIC?
details:
  realistic_solution: PCIe Gen5 x16 raw bandwidth is about 63GB/s per direction after 128b/130b encoding. After TLP and protocol overhead, a practical GPUDirect RDMA DMA path is roughly 57GB/s. A 400Gbps NIC carries about 50GB/s before higher-level protocol overheads. For a single H100-to-NIC GPUDirect RDMA path, max throughput is min(HBM DMA bandwidth, effective PCIe bandwidth, NIC line rate) = min(3350, 57, 50) = about 50GB/s. The NIC is the bottleneck, with only about 7GB/s of PCIe headroom. That is roughly 14% above the NIC rate, so any PCIe fallback, contention, or platform overhead can make PCIe the limiter.
  common_mistake: |
    **The Pitfall:** Assuming PCIe Gen5 x16 provides 64 GB/s of usable RDMA bandwidth.
    **The Rationale:** Engineers often use theoretical raw bandwidth numbers without accounting for TLP (Transaction Layer Packet) overhead and bus sharing.
    **The Consequence:** System bandwidth expectations are overestimated by 5-10%, leading to missed performance targets.
  napkin_math: |
    **Assumptions & Constraints:**
    - HBM is about 3350GB/s.
    - PCIe Gen5 x16 effective GPUDirect RDMA bandwidth is about 57GB/s.
    - 400Gbps NIC line rate is 50GB/s.

    **Calculations:**
    - Single-link bottleneck = min(3350, 57, 50) = 50GB/s.
    - PCIe headroom over NIC = 57GB/s - 50GB/s = 7GB/s.
    - Percentage headroom = 7GB/s / 50GB/s = 14%.

    **Conclusion & Interpretation:**
    - **Result: about 7GB/s, or 14%, headroom (Network-Bound).** For the single GPUDirect RDMA path asked here, the 400Gbps NIC limits throughput before PCIe Gen5 x16 does.
