title: Bisection Bandwidth Requirement
scenario: A 128-GPU training job has a modeled per-GPU gradient exchange volume of 2 GB per step. The target exposed communication budget is 40 ms.
question: What effective per-GPU communication bandwidth is needed to move 2 GB within a 40 ms budget?
details:
  realistic_solution: 'Each GPU needs about 2 GB / 0.04 s = 50 GB/s effective bandwidth. The topology must provide that bandwidth at the collective level, not merely as a headline NIC speed. Oversubscription or poor placement can violate the budget even with fast links.'
  common_mistake: 'Comparing required bandwidth to raw NIC line rate without accounting for collective efficiency and bisection.'
  napkin_math: |
    **Assumptions & Constraints:**
    - 128-GPU training job.
    - Per-GPU gradient exchange volume: 2 GB per step.
    - Target exposed communication budget: 40 ms.

    **Calculations:**
    - Required effective bandwidth = 2 GB / 40 ms.
    - 2 GB / 0.040 s = 50 GB/s.

    **Conclusion & Interpretation:**
    - **Result: 50 GB/s effective bandwidth (Network-Bandwidth-Bound)**. Topology must provide this at the collective level, accounting for overhead and bisection.
