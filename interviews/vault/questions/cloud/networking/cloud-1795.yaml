title: Ring AllReduce Network Bandwidth Calculation
scenario: You are training a 1 Billion parameter model (4 GB of gradients in FP32) across 16 GPU nodes. The nodes are connected in a logical ring topology via a 100 Gbps network. Assume network bandwidth is the sole bottleneck.
question: What is the theoretical minimum Ring AllReduce time to synchronize 4 GB of gradients across 16 nodes on 100 Gbps links?
details:
  realistic_solution: 'Use the exact Ring AllReduce data volume formula per node: Volume = 2 * ((N-1)/N) * M. With M = 4 GB and N = 16, the volume transferred per node is 7.5 GB. Divide this by the link bandwidth (12.5 GB/s) to get the communication time.'
  common_mistake: |
    **The Pitfall:** Calculating communication time simply as Model Size / Bandwidth.
    **The Rationale:** This ignores the `2(N-1)/N` scaling factor inherent to the scatter-reduce and all-gather phases of the ring algorithm.
    **The Consequence:** Underestimating communication latency, particularly for large N where the factor approaches 2.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model size (M): 4 GB (FP32). Nodes (N): 16.
       - Bandwidth: 100 Gbps = 12.5 GB/s.
    2. **Calculations:**
       - Transfer volume per node = 2 × ( (N-1) / N ) × M.
       - Volume = 2 × (15/16) × 4 GB = 7.5 GB.
       - Latency = 7.5 GB / 12.5 GB/s = 0.6 seconds.
    3. **Conclusion & Interpretation:** **Ring AllReduce latency is 0.6 seconds. Network-Bandwidth-Bound.**
