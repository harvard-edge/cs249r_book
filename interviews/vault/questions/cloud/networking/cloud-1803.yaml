title: Diagnosing RoCEv2 PFC Storms
scenario: You are training a 70B parameter model on 1024 H100 GPUs across 128 nodes,
  communicating via a 400Gbps RoCEv2 fabric. During the All-Reduce phase, Model Flops
  Utilization (MFU) intermittently plummets from 55% to 15%. Network telemetry reveals
  a massive spike in PFC (Priority Flow Control) pause frames and subsequent UDP packet
  drops at the spine switches, leading to NCCL timeouts.
question: How do you diagnose this bottleneck, and what configuration changes stabilize
  the fabric?
details:
  realistic_solution: Diagnose as an incast-driven PFC storm. The solution is to properly
    tune DCQCN (Data Center Quantized Congestion Network) parameters. Specifically,
    lower the ECN (Explicit Congestion Notification) marking threshold on the switches
    to trigger at 15-20% buffer utilization, ensuring senders throttle their injection
    rates before the buffer hits the PFC pause threshold.
  common_mistake: '**The Pitfall:** Assuming raw bandwidth saturation or simply increasing
    NCCL timeouts will fix the drops.

    **The Rationale:** Treating AI cluster networking like traditional loss-tolerant
    web traffic.

    **The Consequence:** Failing to address RoCEv2''s Go-Back-N behavior; PFC head-of-line
    blocking triggers catastrophic throughput collapse during incast microbursts regardless
    of configured timeouts.

    '
  napkin_math: "1. **Assumptions & Constraints:**\n   - Network: 400 Gbps (50 GB/s)\
    \ RoCEv2 fabric.\n   - Microburst Incast: 8-to-1 pushing 400 GB/s toward a single\
    \ destination.\n   - Switch Buffer Size: 2 MB.\n2. **Calculations:**\n   - Egress\
    \ Drain Limit: 50 GB/s.\n   - Buffer Ingress Delta: 400 - 50 = 350 GB/s (350 KB/µs).\n\
    \   - Buffer Fill Time: 2 MB / 350 KB/µs ≈ 5.7 microseconds.\n3. **Conclusion\
    \ & Interpretation:**\n   - **Result: Incast Buffer Overflow.** ECN marking must\
    \ be aggressively tuned to trigger at extremely shallow depths (~300KB) to alert\
    \ senders within the ~2µs network RTT before the PFC pause storm drops packets.\n"
