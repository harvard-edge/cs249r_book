title: Evaluating Compute vs. Network Hardware Upgrades
scenario: Your team is planning a hardware refresh for training a 100B parameter LLM using 3D parallelism. The current cluster uses 512 A100 GPUs connected via 200 Gbps InfiniBand HDR. A vendor proposes upgrading the GPUs to H100s to triple training throughput, but keeping the existing 200 Gbps network switches to stay within budget.
question: Should you upgrade the 512-GPU cluster to H100s while keeping 200 Gbps InfiniBand, and what does distributed efficiency predict?
details:
  realistic_solution: |
    Reject the proposal as stated. Upgrading compute while holding network bandwidth fixed increases the communication-to-computation ratio, so the unchanged 200 Gbps AllReduce and pipeline communication become the dominant step-time component. The cluster may improve only about 1.5x end to end under the stated split, not 3.1x. To realize most of the H100 compute gain, the plan needs a matching communication upgrade or parallelism changes that reduce collective volume.
  common_mistake: |
    **The Pitfall:** Assuming a 3.1x compute increase translates linearly to end-to-end throughput.
    **The Rationale:** Candidates evaluate hardware upgrades in isolation without checking how the fixed communication time changes the end-to-end step time.
    **The Consequence:** The network becomes an immense bottleneck, leaving expensive H100s completely idle.
  napkin_math: |
    **Assumptions & Constraints:**
    - Original step time: 100ms (50ms compute, 50ms communication).
    - H100 provides a 3.1x compute speedup.
    - Communication bandwidth remains 200 Gbps.

    **Calculations:**
    - New compute time: 50ms / 3.1 = 16ms.
    - Communication time remains 50ms.
    - New step time = 16ms + 50ms = 66ms.

    **Conclusion & Interpretation:**
    - **Result: 66ms step time and ~1.5x overall speedup (Network-Bound).** Compute shrinks to 16ms, but communication remains 50ms, so communication dominates ~76% of the new step and prevents the 3.1x hardware speedup from translating into end-to-end throughput.
