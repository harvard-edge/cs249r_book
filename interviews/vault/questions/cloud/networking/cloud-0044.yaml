title: The Interconnect Latency Ladder (cloud-0044)
scenario: Identify the approximate latency of a local GPU-to-GPU transfer using NVLink 4.0 versus a cross-rack, server-to-server transfer using InfiniBand NDR.
question: "What are the approximate latencies of NVLink 4.0 GPU-to-GPU and cross-rack InfiniBand NDR transfers?"
details:
  realistic_solution: |
    An NVLink 4.0 transfer has a latency of approximately 500 ns, while a cross-rack InfiniBand NDR transfer is about 5,000 ns (5 µs). Therefore, the local NVLink transfer is roughly 10 times faster than the cross-rack InfiniBand transfer. This order-of-magnitude difference is fundamental to understanding network topology and optimizing distributed workloads.
  common_mistake: |
    **The Pitfall:** Underestimating the local vs. remote latency gap.
    **The Rationale:** Engineers treat all 'high-speed interconnects' as roughly equivalent, failing to appreciate the penalty of crossing a physical server boundary.
    **The Consequence:** Suboptimal placement of distributed workloads resulting in severe communication bottlenecks.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - NVLink 4.0 latency (local).
       - InfiniBand NDR latency (cross-rack).
    2. **Calculations:**
       - NVLink 4.0 latency ≈ 500 ns.
       - InfiniBand NDR latency ≈ 5,000 ns.
       - Ratio = 5,000 / 500 = 10x.
    3. **Conclusion & Interpretation:**
       - **Result: Latency-Bound**. Data leaving the physical server motherboard incurs a massive 10x latency penalty.
  options:
  - They have roughly the same latency (~500 ns).
  - NVLink is ~10x faster (~500 ns vs ~5,000 ns).
  - InfiniBand is ~10x faster (~500 ns vs ~5,000 ns).
  - NVLink is ~100x faster (~50 ns vs ~5,000 ns).
