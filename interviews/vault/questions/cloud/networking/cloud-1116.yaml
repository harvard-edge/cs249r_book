title: DCQCN Incast Buffer Sizing
scenario: 'A 400Gbps RoCEv2 fabric is experiencing incast congestion during an All-to-All communication phase. Ten senders are transmitting at a full 400Gbps line rate to a single receiver port. The switch''s ECN marking threshold for DCQCN is configured at 150KB. The end-to-end round-trip time (RTT), including switch processing and Congestion Notification Packet (CNP) generation, is 2 microseconds.'
question: 'What peak switch buffer occupancy occurs before DCQCN takes effect, and what minimum buffer size avoids PFC pauses?'
details:
  realistic_solution: 'Calculate the net buffer accumulation rate as total incoming bandwidth minus outgoing bandwidth. During the 2μs RTT before the CNP reaches senders, data accumulates. Adding this to the ECN threshold yields the peak buffer occupancy, which dictates the minimum switch buffer size to avoid Priority Flow Control (PFC).'
  common_mistake: |
    **The Pitfall:** Failing to account for the port's continuous drain rate or forgetting that the buffer keeps filling during the entire RTT.
    **The Rationale:** Candidates calculate incoming bandwidth but ignore that the receiver port is successfully transmitting data at its line rate simultaneously.
    **The Consequence:** The required switch buffer size is vastly overestimated, or PFC pauses are unexpectedly triggered, causing fabric-wide congestion spreading.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Ingress: 10 senders × 400 Gbps = 4000 Gbps.
       - Egress: 1 receiver × 400 Gbps = 400 Gbps.
       - ECN Threshold: 150 KB. RTT: 2μs.
    2. **Calculations:**
       - Net Accumulation Rate: 4000 - 400 = 3600 Gbps = 450 GB/s.
       - Accumulation over 1 RTT: 450 GB/s × 2μs = 900 KB.
       - Peak Buffer Occupancy: 150 KB (threshold) + 900 KB (RTT accum) = 1.05 MB.
    3. **Conclusion & Interpretation:**
       - **Result: Network-Buffer-Bound. The switch buffer must be at least 1.05 MB to absorb the RTT delay without triggering catastrophic PFC pauses.**
