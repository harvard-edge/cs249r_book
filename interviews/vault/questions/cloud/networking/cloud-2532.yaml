title: Cloud Ultra Ethernet L3 0
scenario: A 256-GPU cluster uses a fat-tree topology with 400 Gbps links and 4 equal-cost paths between any two racks. With standard ECMP, a ring AllReduce creates 32 large flows that hash to paths.
question: What effective bandwidth should you expect for 32 AllReduce flows over 4 paths with ECMP versus packet spraying?
details:
  realistic_solution: 'With ECMP, 32 flows hash to 4 paths. By the birthday paradox, distribution is uneven. The bottleneck path dictates the speed of the synchronous AllReduce collective. Packet spraying resolves this by spreading packets from all flows perfectly evenly across all paths, avoiding hash collisions and maximizing link utilization.'
  common_mistake: |
    **The Pitfall:** Assuming ECMP distributes flows perfectly evenly.
    **The Rationale:** Candidates forget that hash collisions cause load imbalance, and with large AllReduce transfers, a single overloaded path becomes the bottleneck for the entire collective.
    **The Consequence:** They overestimate effective network bandwidth and under-provision the network fabric for large-scale training.
  napkin_math: |
    **Assumptions & Constraints:**
    - 32 large flows, 4 ECMP paths.
    - 400 Gbps link bandwidth per path.

    **Calculations:**
    - ECMP expected max-loaded path flows (hash collisions): ~10.4 flows.
    - ECMP bandwidth per flow: 400 Gbps / 10.4 flows = ~38.5 Gbps.
    - Packet spraying ideal distribution: 32 flows / 4 paths = 8 flow-equivalents per path.
    - Packet spraying bandwidth per flow: 400 Gbps / 8 = 50.0 Gbps.
    - Performance gain: 50.0 Gbps / 38.5 Gbps = 1.3x.

    **Conclusion & Interpretation:**
    - **Result: 38.5 Gbps (Network-Bound)**. ECMP hash collisions limit effective flow bandwidth to 38.5 Gbps, while packet spraying avoids collisions yielding 1.3x better utilization.
