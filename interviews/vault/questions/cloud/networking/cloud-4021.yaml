title: ECN Marking Accuracy at 400Gbps Line Rate
scenario: Modern 400Gbps switch ASICs must decide whether to set the ECN CE bit on every packet at line rate. At 400Gbps with 4KB packets, how many ECN marking decisions must the switch make per second? Why does this constrain the marking algorithm's complexity?
question: How many ECN marking decisions per second are required at 400Gbps with 4KB packets, and why must the algorithm be simple?
details:
  realistic_solution: 'At 400Gbps with 4KB (4096 byte) packets: 400 * 10^9 bits/s / (4096 * 8 bits/packet) = about 12.2 million packets per second per port. A 64-port switch can therefore face about 781 million ECN decisions per second across ports. The marking logic must be hardware-friendly and O(1) per packet: read simple queue state, compare against thresholds, and optionally apply simple probabilistic marking. Complex per-flow history, software feedback loops, or multi-pass algorithms do not fit line-rate ASIC processing.'
  common_mistake: |
    **The Pitfall:** Assuming ECN marking can use arbitrarily complex control logic because the decision is only one bit.
    **The Rationale:** At 400G line rate, the switch must evaluate every packet in the forwarding pipeline, not in slow-path software.
    **The Consequence:** Designs that require per-flow history scans or multi-step computation cannot run at line rate; practical ECN marking uses simple threshold or probabilistic logic implemented in hardware.
  napkin_math: |
    **Assumptions & Constraints:**
    - Link rate: 400Gbps.
    - Packet size: 4KB = 4096 bytes.
    - ECN decision required once per packet per port.

    **Calculations:**
    - Bits per packet: 4096 * 8 = 32,768 bits.
    - Packets per second per port: 400,000,000,000 / 32,768 ~= 12.2M packets/s.
    - Time between packet starts at line rate: 1 / 12.2M ~= 82ns.
    - 64-port aggregate decision rate: 64 * 12.2M ~= 781M decisions/s.

    **Conclusion & Interpretation:**
    - **Result: About 12.2M ECN decisions per second per 400G port (Hardware-Pipeline-Bound)**. The algorithm must be constant-time and ASIC-friendly, typically threshold-based with optional simple probabilistic marking.
