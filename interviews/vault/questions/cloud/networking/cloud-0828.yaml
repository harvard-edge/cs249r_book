title: The NVLink vs PCIe Tensor Parallel Gap
scenario: You are deciding whether tensor parallelism is viable across PCIe-connected GPUs versus NVLink-connected GPUs. Tensor parallelism requires an all-reduce of the activation tensor after every transformer layer.
question: What is the per-layer communication time over NVLink 4.0 (450 GB/s) versus PCIe Gen5 x16 (63 GB/s) for batch=32, seq=2048, hidden=4096 in FP16, and is PCIe tensor parallelism viable?
details:
  realistic_solution: 'Activation tensor = 32 * 2048 * 4096 * 2 bytes = 512 MB. NVLink: 512 MB / 450 GB/s = 1.14 ms. PCIe Gen5: 512 MB / 63 GB/s = 8.1 ms. Over a 32-layer model, PCIe adds 32 * 8.1 = 260 ms vs NVLink''s 36 ms. PCIe tensor parallelism adds 7x more communication overhead — this is why tensor parallelism requires NVLink.'
  common_mistake: |
    **The Pitfall:** Assuming PCIe is 'only a little slower.'
    **The Rationale:** The ~7x bandwidth gap makes tensor parallelism over PCIe impractical for latency-sensitive inference.
    **The Consequence:** Adding milliseconds of overhead per layer.
  napkin_math: |
    **Assumptions & Constraints:**
    - Batch=32, Seq=2048, Hidden=4096, FP16 (2 bytes)
    - NVLink bandwidth: 450 GB/s
    - PCIe Gen5 bandwidth: 63 GB/s

    **Calculations:**
    - Activation size: 32 * 2048 * 4096 * 2 bytes = 512 MB
    - NVLink time: 512 MB / 450 GB/s = 1.14 ms
    - PCIe Gen5 time: 512 MB / 63 GB/s = 8.13 ms
    - Over 32 layers: NVLink = 36.5 ms, PCIe = 260 ms

    **Conclusion & Interpretation:**
    - **Result: 260 ms (Network-Bound)**. PCIe adds ~260 ms, 7.1x slower than NVLink.
  options:
  - A) NVLink is ~2x faster — minor difference
  - B) NVLink is ~5x faster — noticeable but manageable
  - C) NVLink is ~7x faster — PCIe makes tensor parallelism impractical
  - D) NVLink is ~100x faster — different technology class
