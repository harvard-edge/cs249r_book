title: Diagnosing RDMA Fallback and Kernel Overhead
scenario: You are benchmarking a distributed training job across 16 nodes, each with 8 GPUs and 4x 200Gbps InfiniBand NICs. Profiling the NCCL AllReduce operations reveals per-message latencies of 45μs and unusually high `ksoftirqd` CPU usage. Benchmarks only achieve 150Gbps out of 800Gbps theoretical.
question: What does 45μs NCCL latency with high ksoftirqd usage indicate, and how would you restore expected InfiniBand AllReduce throughput?
details:
  realistic_solution: The high `ksoftirqd` usage and 45μs latency strongly indicate that RDMA kernel bypass has failed, forcing NCCL to fall back to standard TCP/IP sockets over IPoIB. You must verify that user-space libraries (libibverbs) are properly loaded, the GPU Direct RDMA modules are active, and NCCL is configured to use the IB interfaces rather than falling back to IP routing.
  common_mistake: |
    **The Pitfall:** Assuming the network switch is congested or the PCIe bus is bottlenecked.
    **The Rationale:** Not recognizing that high `ksoftirqd` CPU usage explicitly indicates the host kernel is actively processing network packets.
    **The Consequence:** Wasting time debugging switch topologies or PCIe topologies when the issue is a failed library configuration forcing NCCL to fall back to standard IP routing.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hardware: 4x 200Gbps (25GB/s) InfiniBand NICs per node. Total = 800Gbps (100GB/s).
    - Expected RDMA zero-copy latency: ~2μs.
    - Observed latency: 45μs with high `ksoftirqd` (kernel network stack active).

    **Calculations:**
    - Aggregate NIC bandwidth: 4 * 200Gbps = 800Gbps = 100GB/s.
    - Observed throughput fraction: 150Gbps / 800Gbps = 18.75% of theoretical.
    - Observed latency gap: 45μs / 2μs ~= 22.5x higher than expected RDMA kernel-bypass latency.
    - High `ksoftirqd` means packet processing is occurring in the Linux kernel path, which is consistent with IPoIB/TCP fallback rather than verbs/RDMA data transfer.

    **Conclusion & Interpretation:**
    - **Result: RDMA Fallback Diagnostic**. The latency, throughput loss, and kernel CPU activity support a failed RDMA path; restore libibverbs/GDRDMA/NCCL IB configuration rather than treating it as simple link congestion.
