title: PFC Congestion Spreading and Cluster Throughput Collapse
scenario: A GPU training cluster uses nodes with 8x H100 GPUs connected via RoCEv2 network interfaces operating at 400 Gb/s (50 GB/s per port). To maintain a lossless fabric, the network relies on Priority Flow Control (PFC). During an all-to-all collective, an incast occurs where 4 sender nodes transmit to a single receiver node at full line rate. The receiver experiences a brief PCIe Gen5 bottleneck, slowing its ingestion to 32 GB/s. Shortly after, the network throughput for dozens of unrelated nodes across the cluster collapses to near zero.
question: Why does a localized receiver bottleneck during RoCEv2 All-to-All cause cluster-wide throughput collapse under PFC?
details:
  realistic_solution: The throughput collapse is caused by PFC congestion spreading, creating a victim flow scenario. When the receiver slows to 32 GB/s, the connected switch's egress buffer rapidly fills up. PFC then sends a pause frame to the upstream switches to stop transmission. This pauses the entire ingress port on the upstream switch, halting not just the incast traffic, but also unrelated flows (victim flows) sharing that port. This cascading effect propagates back through the network layers, causing widespread throughput collapse.
  common_mistake: Candidates often blame the slow receiver or packet loss as the direct cause of cluster-wide degradation. They fail to understand how PFC pause frames propagate upstream, causing congestion spreading (head-of-line blocking) that pauses switch ports carrying traffic for unrelated flows.
  napkin_math: Total incast bandwidth = 4 nodes * 50 GB/s = 200 GB/s. Egress processing rate = 32 GB/s. Net buffer fill rate = 200 GB/s - 32 GB/s = 168 GB/s. Time to fill a standard 32 MB switch buffer = 32 MB / 168 GB/s = 32,000,000 bytes / 168,000,000,000 bytes/sec ≈ 0.19 milliseconds. Once the buffer fills in a fraction of a millisecond, PFC pause frames are generated and sent upstream.
