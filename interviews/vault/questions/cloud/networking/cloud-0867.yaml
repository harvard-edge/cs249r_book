title: MoE AllToAll Communication Time
scenario: 'You are deploying a Mixture-of-Experts (MoE) model on an 8-GPU node connected via NVSwitch. Each GPU provides 600 GB/s of bidirectional NVLink bandwidth. During the expert routing phase, each GPU must send exactly 1.5 GB of token data to each of the other 7 GPUs in the node.'
question: What is the minimum theoretical time for the NVSwitch AllToAll when each A100 sends 1.5GB to each of 7 peers?
details:
  realistic_solution: 'In an AllToAll operation on a fully connected topology like NVSwitch, the bottleneck is the individual GPU''s network interface. Each GPU sends 1.5 GB to 7 peers, totaling 10.5 GB of egress data. The correct bandwidth to use is the unidirectional egress bandwidth (300 GB/s, half of the bidirectional 600 GB/s spec), since the egress payload travels in one direction. Transfer time = 10.5 GB / 300 GB/s = 35 ms.'
  common_mistake: |
    **The Pitfall:** Calculating the aggregate data across the entire node and dividing by an aggregate bandwidth metric.
    **The Rationale:** In an AllToAll operation, the bottleneck is the individual GPU's unidirectional network interface, not the entire node's aggregated capacity.
    **The Consequence:** Wildly inaccurate predictions for collective communication times.
  napkin_math: |
    **Assumptions & Constraints:**
    - 8 GPUs, each sending 1.5 GB to 7 peers simultaneously.
    - Unidirectional egress bottleneck is 300 GB/s (half of the 600 GB/s bidirectional NVLink spec).

    **Calculations:**
    - Total egress payload per GPU = 1.5 GB * 7 = 10.5 GB.
    - Theoretical minimum transfer time = 10.5 GB / 300 GB/s.
    - Transfer time = 0.035 seconds.

    **Conclusion & Interpretation:**
    - **Result: 35 ms (Bandwidth-Bound)**. The collective operation is constrained by the individual GPU's unidirectional egress bandwidth, not aggregate node capacity.
