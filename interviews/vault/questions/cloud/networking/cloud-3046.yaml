title: 'Network Bandwidth Bottlenecks: Master Full Communication Analysis for 3D-Parallel LLM Training'
scenario: You are analyzing a 3D-parallel training setup (TP-4, PP-4, DP-8) for a 70B model on 128 H100 GPUs (8-GPU nodes, NVLink 900GB/s, 200Gb/s IB).
question: What are the specific TP, PP, and DP communication costs per step, and which dominates the 3D-parallel setup?
details:
  realistic_solution: 'Assume TP-4 is intra-node over NVLink, PP-4 uses interleaved 1F1B with v=4 and M=8 micro-batches, and DP-8 gradient sync runs over 200Gb/s InfiniBand. For TP, one [1,2048,8192] FP16 activation tensor is 33.6MB. Using a ring all-reduce model for TP-4, each all-reduce moves 2*(4-1)/4*33.6MB = 50.3MB per rank. With 4 all-reduces per layer and 80 model layers, the model-wide TP communication is about 16.1GB; at an effective 225GB/s per rank, that is about 71.6ms. For PP, the interleaved 1F1B bubble fraction is (PP-1)/(v*M) = 3/32 = 9.4%, so a 200ms compute step loses about 18.8ms to bubbles. For DP, each GPU owns 70B/(TP*PP) = 70B/16 params, or 8.75GB of FP16 gradients. Ring AllReduce over 8 DP ranks moves 8.75GB*2*7/8 = 15.31GB per rank. At 25GB/s per GPU IB, DP sync takes 612ms. Dominant: DP AllReduce (612ms) >> TP communication (~72ms model-wide) >> PP bubble (~19ms).'
  common_mistake: |
    **The Pitfall:** Analyzing each parallelism dimension independently.
    **The Rationale:** Failing to recognize that TP and PP run synchronously within a micro-batch, while DP communication spans the slower inter-node fabric.
    **The Consequence:** Misidentifying the bottleneck and optimizing the wrong parallel dimension, such as trying to reduce the PP bubble when DP AllReduce is taking 30x longer.
  napkin_math: |
    **Assumptions & Constraints:**
    - TP-4 on NVLink using a ring all-reduce model and 225 GB/s effective bandwidth per rank.
    - PP-4 uses interleaved 1F1B (v=4, M=8).
    - DP-8 on InfiniBand (25 GB/s).
    - Step time: 200ms. 70B model.

    **Calculations:**
    - TP activation tensor: 1 * 2048 * 8192 * 2 bytes = 33.6MB.
    - TP-4 ring volume per all-reduce: 2 * (4-1)/4 * 33.6MB = 50.3MB per rank.
    - TP-4 model-wide traffic: 50.3MB * 4 all-reduces/layer * 80 layers = 16.1GB. Time = 16.1GB / 225GB/s = ~71.6ms.
    - PP Bubble: Overhead = 3/32 (9.4%). For 200ms step = ~18.8ms.
    - DP gradient shard per GPU: 70B / (TP 4 * PP 4) * 2 bytes = 8.75GB.
    - DP-8 ring volume: 8.75GB * 2 * (8-1)/8 = 15.31GB. Time = 15.31GB / 25GB/s = 612.5ms.

    **Conclusion & Interpretation:**
    - **Result: 612.5ms DP AllReduce (Bandwidth-Bound)**. Under the stated interleaved PP schedule and ring-collective model, DP communication across the slower inter-node fabric dominates TP communication and PP bubble overhead.
