title: 'Network Bandwidth Bottlenecks: Master Full Communication Analysis for 3D-Parallel LLM Training'
scenario: 'You are analyzing a 3D-parallel training setup (TP-4, PP-4, DP-8) for a 70B model on 128 H100 GPUs (8-GPU nodes, NVLink 900GB/s, 200Gb/s IB).'
question: 'What are the specific TP, PP, and DP communication costs per step, and which dominates the 3D-parallel setup?'
details:
  realistic_solution: 'TP-4 (within node, NVLink): per layer, 4 all-reduces of shape [batch, seq, hidden] = 4×[1, 2048, 8192]×2B = 134MB per step × 80 layers = 10.7GB total. NVLink 900GB/s/4: each layer''s TP all-reduce: 134MB/225GB/s = 0.6ms/layer × 80 = 48ms. PP bubble: 4 pipeline stages, 1 micro-batch (Gpipe). Bubble fraction: (PP-1)/PP=75%. Fix: interleaved 1F1B (v=4) with 8 micro-batches: bubble overhead = (PP-1)/(v×M) = 3/32 = 9.4%. DP AllReduce: 70B/16 params × 2B = 8.75GB per GPU. Ring AllReduce over 8 DP: 8.75GB × 2 × 7/8 = 15.31GB. At 25GB/s per GPU IB: 15.31GB / 25GB/s = 612ms. PP bubble: 200ms×9.4%=18.8ms. Dominant: DP AllReduce (612ms) >> TP comm (48ms) >> PP bubble (18ms).'
  common_mistake: |
    **The Pitfall:** Analyzing each parallelism dimension independently.
    **The Rationale:** Failing to recognize that TP and PP run synchronously within a micro-batch, while DP communication spans the slower inter-node fabric.
    **The Consequence:** Misidentifying the bottleneck and optimizing the wrong parallel dimension, such as trying to reduce the PP bubble when DP AllReduce is taking 30x longer.
  napkin_math: |
    **Assumptions & Constraints:**
    - TP-4 on NVLink (225 GB/s effective). PP-4 interleaved 1F1B (v=4, M=8).
    - DP-8 on InfiniBand (25 GB/s).
    - Step time: 200ms. 70B model.

    **Calculations:**
    - TP-4 (NVLink): 10.7GB total / 225 GB/s = ~48ms.
    - PP Bubble: Overhead = 3/32 (9.4%). For 200ms step = ~18.8ms.
    - DP AllReduce: 15.31GB over IB. 15.31GB / 25 GB/s = 612.5ms.

    **Conclusion & Interpretation:**
    - **Result: 612.5ms (Bandwidth-Bound)**. DP AllReduce across the slower inter-node fabric entirely dominates both TP and PP communication overheads.
