title: Diagnosing RoCEv2 PFC Buffer Drops
scenario: You are debugging tail latency spikes in a 4,000-GPU cluster running RoCEv2 over a 400Gbps two-tier leaf-spine network. During peak All-to-All communication, you observe sudden, cluster-wide throughput collapses. Switch telemetry shows thousands of PFC (Priority Flow Control) PAUSE frames and subsequent packet drops on the spine links, despite PFC being configured for lossless transport. The leaf-to-spine links use 100-meter active optical cables.
question: "What is causing the RoCEv2 collapse despite PFC, and how should you tune buffers and congestion control?"
details:
  realistic_solution: 'Diagnose switch buffer headroom exhaustion. You must recalculate and increase the switch port headroom buffer to exceed the link''s BDP, and enable DCQCN (ECN + PFC) to slow down senders proactively before PFC buffer thresholds are even hit.'
  common_mistake: |
    **The Pitfall:** Assuming PFC guarantees 100% lossless delivery by itself.
    **The Rationale:** Overlooking the Bandwidth-Delay Product (BDP) that represents in-flight data.
    **The Consequence:** Packets dropped after a PAUSE frame is sent because the headroom buffer was too small.
  napkin_math: |
    **Assumptions & Constraints:**
    - Speed of light in fiber is ~5ns/m. A 100m cable has a 500ns one-way delay.
    - Assuming a 2μs total reaction time, at 400Gbps (50GB/s), the data in flight is 50GB/s * 2μs = 100KB.
    - If the headroom buffer is 50KB.

    **Calculations:**
    - Data dropped = 100KB - 50KB = 50KB.

    **Conclusion & Interpretation:**
    - **Result: 50KB of packets will drop (Network Buffer)**. Data in flight exceeds buffer headroom, leading to dropped packets despite PFC.
