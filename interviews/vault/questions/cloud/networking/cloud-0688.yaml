title: The Communication Wall
scenario: We have a 512-GPU cluster connected via 10 Gbps Ethernet. We are training a 70B parameter model using standard Data Parallelism. Despite having 512 GPUs, our training speed is barely faster than a single machine.
question: Why has scaling efficiency collapsed on this 512-GPU 10 Gbps Ethernet cluster?
details:
  realistic_solution: This cluster will experience **near-zero scaling efficiency** because synchronous data parallelism gates every step on gradient AllReduce. A 70B FP16 model has about 140 GB of gradients, and each GPU must communicate roughly twice that payload in a large ring AllReduce. At 10 Gbps, that turns a 2-second compute step into minutes of network wait. Practical remedies include faster non-blocking interconnects for cross-node collectives, NVLink only for intra-node traffic, larger gradient-accumulation windows to reduce sync frequency, sharded/data-plus-model parallelism, communication overlap, and carefully validated gradient compression.
  common_mistake: |
    **The Pitfall:** Assuming 10 Gbps is plenty for gradient sync or that 512 GPUs will give a linear ~512x speedup.
    **The Rationale:** Engineers accustomed to standard web workloads vastly underestimate the volume of data that must cross the network during every single training step in large-scale Data Parallelism.
    **The Consequence:** Building an expensive cluster that acts as a pure network-wait workload, wasting millions of dollars in idle compute.
  napkin_math: |
    **Assumptions & Constraints:**
    - A 70B FP16 model has about 140 GB of gradient payload per data-parallel replica per step.
    - Ring AllReduce per-GPU communicated volume is approximately 2 * (N - 1) / N times the gradient payload.
    - N = 512 GPUs.
    - Effective per-GPU network bandwidth is 10 Gbps = 1.25 GB/s.
    - Forward/backward pass takes 2 seconds.

    **Calculations:**
    - Per-GPU AllReduce volume: 2 * (511 / 512) * 140 GB ≈ 279 GB.
    - Communication time per step: 279 GB / 1.25 GB/s ≈ 223 seconds.
    - Network fraction of step time: 223 / (223 + 2) ≈ 99.1%.

    **Conclusion & Interpretation:**
    - **Result: ~223 seconds of communication per step (Network-Bound)**. With only 10 Gbps per GPU, gradient synchronization dominates the 2-second compute step, so the slow cross-node Ethernet fabric gates the whole synchronous training job.
