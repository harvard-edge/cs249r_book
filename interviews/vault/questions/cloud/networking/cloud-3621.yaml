title: Reduce-Scatter and AllGather Decomposition on H100 NVLink
scenario: ZeRO Stage 2 optimizer state sharding decomposes AllReduce into Reduce-Scatter + AllGather. The gradient buffer is 16GB.
question: "For ZeRO Stage 2 on 8 H100s with a 16 GB gradient buffer, what are the Reduce-Scatter and AllGather volumes versus standard AllReduce?"
details:
  realistic_solution: Both standard AllReduce and the decomposed ZeRO sequence transfer exactly 28GB per GPU. ZeRO's benefit is strictly memory savings (holding 1/N optimizer state), not a reduction in network bandwidth requirements.
  common_mistake: |
    **The Pitfall:** Assuming ZeRO's communication volume is double the standard AllReduce.
    **The Rationale:** Candidates see two operations and assume 2x bandwidth without analyzing the asymptotic volume.
    **The Consequence:** Misconfiguring network topologies or incorrectly avoiding ZeRO due to perceived bandwidth penalties.
  napkin_math: |
    **Assumptions & Constraints:**
    - N=8 GPUs, Buffer=16GB.

    **Calculations:**
    - AllReduce: 2*(7/8)*16GB = 28GB.
    - Reduce-Scatter: (7/8)*16GB = 14GB.
    - AllGather: (7/8)*16GB = 14GB.

    **Conclusion & Interpretation:**
    - **Result: Total communication volume is identical at 28GB (Network-Bound)**. The bottleneck is identical.
