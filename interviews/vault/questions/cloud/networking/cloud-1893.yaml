title: CPU Overhead Calculation for SR-IOV Network Bypass
scenario: You are architecting a multi-tenant ML cloud using 8x H100 nodes, each equipped with 4x 400Gbps NVIDIA ConnectX-7 NICs for RDMA/RoCEv2 traffic. Initially, network traffic is routed through a hypervisor software virtual switch (vSwitch). The vSwitch can process approximately 25 Gbps of network traffic per CPU core. You must calculate the host CPU core savings per node if you implement Single Root I/O Virtualization (SR-IOV) to pass Virtual Functions (VFs) directly to the tenant VMs.
question: How many host CPU cores per node does SR-IOV save by bypassing the vSwitch for 4x400Gbps traffic?
details:
  realistic_solution: Enable SR-IOV on the physical NICs to present them as multiple Virtual Functions (VFs) attached directly to the VMs via PCIe passthrough. This enables zero-copy RDMA, bypassing the hypervisor vSwitch entirely and recovering massive CPU resources for the host.
  common_mistake: |
    **The Pitfall:** Assuming SR-IOV is merely for logically partitioning bandwidth.
    **The Rationale:** Failing to calculate the severe CPU tax of a software vSwitch at 400Gbps+ scale.
    **The Consequence:** Completely missing the hypervisor bypass advantage and severely underestimating the CPU savings for tenant workloads.
  napkin_math: |
    **Assumptions & Constraints:**
    - Node bandwidth: 4 NICs × 400 Gbps = 1,600 Gbps.
    - Software vSwitch processing capacity: 25 Gbps per CPU core.
    - SR-IOV/RDMA bypasses the hypervisor completely (~0 CPU cores used).

    **Calculations:**
    - vSwitch CPU requirement: 1,600 Gbps / 25 Gbps per core = 64 CPU cores.
    - SR-IOV savings: 64 cores - 0 cores = 64 cores.

    **Conclusion & Interpretation:**
    - **Result: Compute-Bound**. Bypassing the hypervisor via SR-IOV saves 64 host CPU cores per node, freeing massive compute for tenant workloads.
