title: Network Topology for Pipeline Parallelism
scenario: You are deploying a 175B model with 16-stage pipeline parallelism across 16 A100 GPUs spread across 2 nodes (8 GPUs per node with NVLink). The pipeline sends activations from stage N to stage N+1. You must map pipeline stages to physical GPUs to minimize inter-node activation transfers, and calculate the bandwidth requirement for the inter-node link.
question: "How should you map pipeline stages to GPUs, and what bandwidth should you use for a single InfiniBand NDR link?"
details:
  realistic_solution: IB NDR = 400 Gbps = 50 GB/s per link. IB HDR = 200 Gbps = 25 GB/s. The calculation must use NDR bandwidth (50 GB/s). Stages should be mapped continuously within a node (0-7 on node 0, 8-15 on node 1) to ensure only a single boundary crosses the inter-node link.
  common_mistake: |
    **The Pitfall:** Mapping stages linearly but using HDR bandwidth (25 GB/s) for NDR links, or creating interleaved stage maps.
    **The Rationale:** Assuming naive chunking is optimal and confusing InfiniBand generation specifications.
    **The Consequence:** Creating an inter-node bottleneck where every micro-batch must cross a slower-than-expected link, degrading pipeline efficiency.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 16 pipeline stages across 2 nodes (8 GPUs each).
       - Inter-node link: InfiniBand NDR.
    2. **Calculations:**
       - InfiniBand HDR: 200 Gbps unidirectional = 25 GB/s.
       - InfiniBand NDR: 400 Gbps unidirectional = 50 GB/s.
    3. **Conclusion & Interpretation:**
       - **Result: Network-Bound Constraints.** NDR provides 50 GB/s. Mapping stages 0-7 to Node 0 and 8-15 to Node 1 restricts communication across the slow NDR link to a single boundary.
