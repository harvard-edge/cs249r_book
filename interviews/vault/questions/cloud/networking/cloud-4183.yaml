title: Adaptive Routing in Dragonfly Under Adversarial Traffic
scenario: Your 2048-GPU dragonfly cluster runs a mixture of training jobs. A large 1024-GPU AllReduce creates adversarial traffic that saturates global links, degrading a separate 256-GPU job sharing the same dragonfly groups.
question: Why can a 1024-GPU 4 GB AllReduce in a shared dragonfly create global-link hot spots and interfere with a 256-GPU job?
details:
  realistic_solution: A 1024-GPU AllReduce injects multi-terabyte aggregate traffic, but the key risk is not the average bytes per global link. In a dragonfly, minimal routing sends each source-destination pair through its shortest global path, so a collective whose ranks are placed unevenly across groups can concentrate traffic on a small set of global links. A separate 256-GPU job sharing those groups then sees queueing and head-of-line blocking on the same links. Adaptive or Valiant-style non-minimal routing can mitigate this by spreading traffic across more global links, but it trades extra hops and latency for better load balance; it is a policy choice, not a universal requirement.
  common_mistake: |
    **The Pitfall:** Relying on minimal routing (direct path) in a dragonfly topology under heavy load.
    **The Rationale:** Candidates assume the shortest path is always optimal, ignoring the fact that AllReduce patterns create massive incasts.
    **The Consequence:** Traffic is concentrated on a few global links, causing microbursts and severe cross-job interference.
  napkin_math: |
    **Assumptions & Constraints:**
    - Job size: 1024 GPUs.
    - Operation: 4 GB AllReduce per GPU.
    - Topology: Dragonfly with shared global links.

    **Calculations:**
    - A ring AllReduce moves about 2 * (N - 1) / N * S bytes per rank. For N=1024 and S=4 GB, that is about 8 GB per rank, or roughly 8 TB of aggregate rank traffic before topology-level path sharing.
    - Tree or hierarchical algorithms distribute the bytes differently, so per-link load depends on rank placement, routing, group sizes, and the collective schedule; it cannot be derived by dividing aggregate traffic by a link count.
    - If many ranks from the 1024-GPU job are placed across the same dragonfly group pairs, minimal routing maps repeated collective steps onto the same shortest global links.
    - A 256-GPU job sharing those groups then queues behind the large job on the same global links even if its own average bandwidth demand is modest.
    - Non-minimal routing adds path diversity, which can reduce hot spots when the extra hops cost less than the queueing delay avoided.

    **Conclusion & Interpretation:**
    - **Result: Routing- and Placement-Bound.** The issue is localized global-link congestion, not a simple average GB/link calculation. Adaptive or Valiant routing is a load-balancing mitigation when minimal routes become congested.
