title: Networking Level Mismatch Diagnosis
scenario: Your cluster has a fat-tree topology with full bisection bandwidth, 400G links, and RDMA. Yet AllReduce performance is 40% of theoretical.
question: In a full-bisection 400G RDMA fat-tree with AllReduce at 40% of theoretical, where might the bottleneck be and how would you diagnose it?
details:
  realistic_solution: 'Diagnose bottom-up: Level 1 (Wire/Link): Check for link errors, CRC failures, or negotiated speed below 400G — unlikely if the topology looks healthy. Level 2 (Transport): Check RDMA completion rates, PFC pause frames. Excessive PFC pauses indicate congestion causing flow control to throttle senders. Level 3 (Topology): Fat-tree with full bisection — rules out structural bandwidth limits. Level 4 (Fabric Behavior): Most likely culprit. ECMP (Equal-Cost Multi-Path) hashing can cause ''hash collisions'' where multiple elephant flows map to the same spine link, creating hotspots despite ample aggregate bandwidth. Also check for PFC storms (deadlocks in lossless Ethernet). Level 5 (Cluster Design): Job placement may span racks poorly, forcing unnecessary cross-spine traffic. Recommendation: Instrument Level 4 first — check per-spine-link utilization for imbalance. If some links are at 90% while others are at 10%, ECMP polarization is the root cause. Fix with adaptive routing or flowlet switching.'
  common_mistake: 'Blaming the topology (Level 3) when the links and topology are fine. The bottleneck is often at the fabric behavior level (Level 4) — congestion, ECMP hashing, or PFC storms.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Topology: Fat-tree with full bisection bandwidth.
    - Links: 400G RDMA.
    - Target performance: 100% theoretical.

    **Calculations:**
    - Actual performance: 40% of theoretical.
    - Lost throughput: 60%.
    - ECMP polarization on 16 spine links creates 2-3x hotspots.

    **Conclusion & Interpretation:**
    - **Result: 50-60% effective bandwidth reduction (Network-Congestion-Bound)**. ECMP hashing collisions create hotspots despite ample aggregate bandwidth.
