title: 'Optimizing MoE LLM Training on H100s: Diagnosing and Fixing Interconnect Bottlenecks'
scenario: You are training a 1.5 trillion parameter MoE model on 64 GPUs. The GPUs are in 8 nodes connected by InfiniBand HDR (200 Gb/s). During the expert dispatch phase, training throughput is low and GPU utilization dips to 40-50%.
question: How would you diagnose and fix the MoE expert-dispatch bottleneck on 64 GPUs, and quantify the expected throughput improvement?
details:
  realistic_solution: |
    Diagnose the dip by separating GPU kernel time from expert-dispatch communication time. Use Nsight Systems, NCCL/RCCL traces, InfiniBand port counters, and per-expert routing histograms to confirm whether the slow phase is AllToAll traffic, load imbalance, small-message overhead, or host-side scheduling. Fixes include grouping tokens to reduce tiny transfers, improving expert placement so hot experts are local to a node, overlapping dispatch with compute, tuning collective algorithms and routing, and upgrading from HDR to NDR only if counters show the fabric is saturated. The expected gain is the reduction in the dispatch portion of the step, not a blanket 2x training speedup.
  common_mistake: |
    **The Pitfall:** Focusing solely on individual GPU compute utilization.
    **The Rationale:** Engineers ignore inter-GPU AllToAll communication patterns caused by expert routing.
    **The Consequence:** Misattributing the bottleneck to CPU overhead and failing to optimize the network.
  napkin_math: |
    **Assumptions & Constraints:**
    - Expert data payload crossing the inter-node fabric: 50 GB per step.
    - HDR 200 Gb/s raw is 25 GB/s per link; assume 80% effective throughput, or 20 GB/s.
    - NDR 400 Gb/s raw is 50 GB/s per link; assume 80% effective throughput, or 40 GB/s.
    - Non-dispatch work in the step takes 1.50 seconds.

    **Calculations:**
    - HDR dispatch time = 50 GB / 20 GB/s = 2.50 seconds.
    - NDR dispatch time = 50 GB / 40 GB/s = 1.25 seconds.
    - HDR total step time = 1.50 + 2.50 = 4.00 seconds.
    - NDR total step time = 1.50 + 1.25 = 2.75 seconds.
    - Throughput speedup = 4.00 / 2.75 = 1.45x, assuming dispatch is fabric-bound and other work is unchanged.

    **Conclusion & Interpretation:**
    - **Result: Network-Bound if counters confirm saturated AllToAll traffic.** Under these assumptions, doubling effective fabric bandwidth cuts dispatch time in half and improves throughput by about 45%.
