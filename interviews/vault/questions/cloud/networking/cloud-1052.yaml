title: Evaluating Fabrics via Critical Message Size
scenario: You are deciding between two network architectures for a synchronous parameter server training cluster. The workload requires frequent 1MB tensor updates. Fabric A has an alpha (latency) of 5μs and 1000 GB/s bandwidth (beta = 1μs/MB). Fabric B has an alpha of 1μs and 250 GB/s bandwidth (beta = 4μs/MB).
question: Which fabric minimizes communication for 1MB updates, what are their critical message sizes, and when should you switch to Fabric A?
details:
  realistic_solution: Use T(M) = alpha + beta*M for each fabric. The per-fabric latency/bandwidth balance points are M_c,A = 5/1 = 5MB and M_c,B = 1/4 = 0.25MB, but those are not the inter-fabric switch point. For a 1MB update, Fabric A takes 5 + 1*1 = 6μs and Fabric B takes 1 + 4*1 = 5μs, so Fabric B is faster. Switch to Fabric A when 5 + 1M < 1 + 4M, which occurs for M > 4/3MB.
  common_mistake: |
    **The Pitfall:** Choosing the fabric with the highest peak bandwidth without calculating message size constraints.
    **The Rationale:** Engineers default to assuming higher bandwidth is strictly superior, regardless of payload size.
    **The Consequence:** They deploy a fabric that is severely handicapped by its fixed latency overhead on small messages, making actual workload performance worse.
  napkin_math: |
    **Assumptions & Constraints:**
    - Fabric A: alpha=5μs, beta=1μs/MB.
    - Fabric B: alpha=1μs, beta=4μs/MB.
    **Calculations:**
    - Time = alpha + (beta * M).
    - Per-fabric balance sizes: M_c,A = 5 / 1 = 5MB; M_c,B = 1 / 4 = 0.25MB.
    - Fabric A (1MB): 5μs + (1 * 1) = 6μs.
    - Fabric B (1MB): 1μs + (4 * 1) = 5μs.
    - Crossover point calculation: 5 + 1*M = 1 + 4*M => 3*M = 4 => M = 1.33MB.
    **Conclusion & Interpretation:**
    - **Fabric B is faster for 1MB messages. The critical balance sizes describe each fabric individually; the switch point between fabrics is 1.33MB, so use Fabric A only when payloads exceed that size.**
