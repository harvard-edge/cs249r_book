title: SMPC vs FL for Cross-Institution DNN Training
scenario: A consortium of 3 financial institutions wants to collaboratively train a 100-million parameter neural network for fraud detection without exposing customer data to each other. They are evaluating Secure Multiparty Computation (SMPC) using Secret Sharing versus Federated Learning (FL) with Differential Privacy. The dedicated network links between institutions offer 10 Gbps bandwidth and 15ms latency.
question: Should the consortium use SPDZ-style SMPC or federated learning with differential privacy for the 100M-parameter model, and why?
details:
  realistic_solution: Prefer federated learning with differential privacy if the consortium can tolerate model-update leakage bounded by the DP policy and the goal is practical cross-institution training over 10 Gbps WAN links. SPDZ-style SMPC offers a stronger cryptographic privacy model, but for a general 100M-parameter DNN it is likely dominated by interactive multiplication rounds and protocol overhead. If the threat model requires hiding intermediate activations and gradients from the parties themselves, SMPC or a hybrid protocol may be required despite the cost; otherwise FL with DP is the more realistic engineering choice.
  common_mistake: |
    **The Pitfall:** Underestimating the massive communication complexity of SMPC.
    **The Rationale:** Assuming SMPC only communicates parameter gradients once per step, exactly like Federated Learning.
    **The Consequence:** Proposing SMPC architectures that stall the compute pipeline entirely because they require cross-party communication for every single multiplication gate.
  napkin_math: |
    **Assumptions & Constraints:**
    - 100M parameter model with roughly 200M FLOPs per sample.
    - Network: 10 Gbps, 15ms latency.
    - Batch size 1024.
    - A 100M-parameter FP32 model update is about 400MB per institution.
    - SPDZ-style SMPC needs interactive communication for many multiplication layers; even heavy batching still leaves many sequential communication rounds.
    - FL also has repeated rounds, so the comparison is per round/step rather than a one-time transfer.

    **Calculations:**
    - Per training step compute scale: 200M FLOPs/sample * 1024 samples = 204.8B FLOPs.
    - FL per round sends and receives model updates. A simple lower bound is 400MB * 8 / 10Gbps = 0.32s per direction per institution, before aggregation, retries, secure aggregation, DP accounting, and many repeated rounds.
    - If the SMPC circuit requires even 200 sequential interactive multiplication batches in a step, latency alone is 200 * 15ms = 3.0s before bandwidth and cryptographic overhead.
    - This does not prove FL is privacy-equivalent; it shows why SMPC can be much slower for this general DNN over the given WAN.

    **Conclusion & Interpretation:**
    - **Result: conditional preference for FL with DP over this WAN (Latency-Bound)**. Choose FL when its privacy leakage is acceptable and validate round count and convergence; choose SMPC or a hybrid only when the stronger threat model justifies the substantial interactive overhead.
