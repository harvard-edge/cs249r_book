title: SMPC vs FL for Cross-Institution DNN Training
scenario: A consortium of 3 financial institutions wants to collaboratively train a 100-million parameter neural network for fraud detection without exposing customer data to each other. They are evaluating Secure Multiparty Computation (SMPC) using Secret Sharing versus Federated Learning (FL) with Differential Privacy. The dedicated network links between institutions offer 10 Gbps bandwidth and 15ms latency.
question: Should the consortium use SPDZ-style SMPC or federated learning with differential privacy for the 100M-parameter model, and why?
details:
  realistic_solution: Federated Learning with Differential Privacy is the realistic choice. SMPC is impractical for deep learning at this scale because secret sharing requires communication rounds for every multiplication gate. The 15ms latency would dominate, even with massive operation batching, stalling the compute pipeline.
  common_mistake: |
    **The Pitfall:** Underestimating the massive communication complexity of SMPC.
    **The Rationale:** Assuming SMPC only communicates parameter gradients once per step, exactly like Federated Learning.
    **The Consequence:** Proposing SMPC architectures that stall the compute pipeline entirely because they require cross-party communication for every single multiplication gate.
  napkin_math: |
    **Assumptions & Constraints:**
    - 100M parameter model with roughly 200M FLOPs per sample.
    - Network: 10 Gbps, 15ms latency.
    - Batch size 1024.
    - SPDZ-style SMPC needs interactive communication for many multiplication layers; even heavy batching still leaves many sequential communication rounds.

    **Calculations:**
    - Per training step compute scale: 200M FLOPs/sample * 1024 samples = 204.8B FLOPs.
    - If the SMPC circuit requires even 200 sequential interactive multiplication batches, latency alone is 200 * 15ms = 3.0s before bandwidth cost.
    - A 100M-parameter FP32 gradient is about 400MB.
    - FL gradient transfer lower bound at 10Gbps: 400MB * 8 / 10Gbps = 0.32s per synchronization, plus protocol overhead.

    **Conclusion & Interpretation:**
    - **Result: FL with DP is the practical choice over this WAN (Latency-Bound)**. SPDZ-style SMPC may be possible for smaller or specialized workloads, but its sequential interactive rounds make it unattractive for this 100M-parameter DNN compared with FL synchronization.
