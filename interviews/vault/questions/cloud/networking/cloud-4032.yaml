title: End-to-End Congestion Budget for Training Iteration
scenario: You are writing the SLA for a 1024-H100 training cluster that guarantees <5% communication overhead
  relative to ideal (zero-latency) AllReduce.
question: How would you allocate the <5% communication-overhead SLA budget across ECMP imbalance, ECN/DCQCN,
  PFC, retransmissions, and software?
details:
  realistic_solution: 'Total communication overhead budget: 5% of iteration time. For a 400ms training
    iteration with 80ms ideal AllReduce time (2GB gradient, 1024 GPUs, ring AllReduce): 5% overhead =
    20ms additional latency. Budget allocation: (1) ECMP imbalance: 4ms (20% of budget) — achievable with
    adaptive routing keeping path utilization variance < 5%. (2) ECN-induced rate reduction (DCQCN): 5ms
    (25%) — allows rate-reduction events to recover quickly. (3) PFC pauses: 3ms (15%) — requires tight
    PFC watchdog timers. (4) Retransmissions: 4ms (20%) — allows at most 1 retransmission per 100 iterations.
    (5) Software overhead (NCCL kernel launch, memory copy, synchronization): 4ms (20%) — bounded by GPU
    kernel launch latency and PCIe DMA setup. Monitoring: instrument each component with per-iteration
    counters. Alert if any component exceeds 150% of its budget for 10 consecutive iterations. Capacity
    planning: at 2048 GPUs, double the ECMP and PFC budgets since path diversity and failure probability
    scale with node count.'
  common_mistake: '**The Pitfall:** Setting an aggregate 5% target without allocating sub-budgets.

    **The Rationale:** It''s common to define a high-level SLA but fail to instrument the individual network
    mechanisms that contribute to latency.

    **The Consequence:** When the 5% SLA is violated, the team cannot diagnose whether the root cause
    is ECMP hashing, PFC pauses, or host software, making the cluster un-debuggable.

    '
  napkin_math: "**Assumptions & Constraints:**\n- 1024-H100 cluster running a 400ms training iteration.\n\
    - 2GB gradient ring AllReduce at 50GB/s ideal speed.\n- Target overhead: <5% of iteration time.\n\n\
    **Calculations:**\n- Ideal AllReduce: 2GB on 1024 GPUs at 50GB/s (ring AllReduce) = 2 * 2GB / 50GB/s\
    \ = 80ms.\n- Total Target Overhead: 5% of a 400ms iteration = 20ms total budget.\n- Budget Allocation:\n\
    \  - ECMP imbalance: 4ms (20%)\n  - ECN/DCQCN rate reduction: 5ms (25%)\n  - PFC pauses: 3ms (15%)\n\
    \  - Retransmissions: 4ms (20%)\n  - Software overhead (NCCL): 4ms (20%)\n\n**Conclusion & Interpretation:**\n\
    - **Conclusion:** A 5% overhead target is extremely aggressive (requires shaving ~3-5ms per component)\
    \ compared to typical 8-12% real-world overheads.\n"
