title: RDMA Latency Breakdown for a Single Write
scenario: Trace the end-to-end latency of a single 64-byte RDMA Write from GPU A's VRAM to GPU B's VRAM across two H100 nodes connected by a single 400Gbps InfiniBand switch.
question: What is the end-to-end latency breakdown for a 64-byte GPUDirect RDMA Write between two H100 nodes through one IB switch?
details:
  realistic_solution: 'End-to-end breakdown for a 64-byte GPUDirect RDMA Write: CPU or GPU posts the WQE and rings the HCA doorbell; the local HCA fetches and schedules the work; the HCA issues a PCIe/CXL read from source VRAM; the HCA packetizes the write; the packet serializes onto the 400Gbps link, crosses the switch, and serializes on the egress link; the remote HCA validates and schedules the packet; the remote HCA writes the payload into destination VRAM; completion or ordering state is generated locally as required. A defensible small-message estimate is roughly 2-3 microseconds, with HCA processing, doorbell/WQE handling, and PCIe/GPU-memory transactions dominating while wire serialization is only a few nanoseconds.'
  common_mistake: |
    **The Pitfall:** Lumping everything into a generic "network latency" bucket (e.g., ~5\u00b5s).
    **The Rationale:** Engineers assume the wire and switch are the primary contributors to latency.
    **The Consequence:** The breakdown reveals that PCIe and DMA setup dominate for small messages, which explains why RDMA latency doesn't improve linearly with faster link speeds.
  napkin_math: |
    **Assumptions & Constraints:**
    - RDMA Write payload: 64 bytes.
    - On-wire size for this estimate: 128 bytes including local link, IB, and CRC/framing overheads.
    - Link speed: InfiniBand 400Gbps, or 50GB/s.
    - Small-message latency is dominated by WQE/doorbell handling, HCA processing, and GPU-memory PCIe transactions.

    **Calculations:**
    - Doorbell and WQE visibility: ~300 ns.
    - Local HCA scheduling and WQE fetch: ~400 ns.
    - Source VRAM read over PCIe/GPU memory path: ~500 ns.
    - Packetization and local link-layer processing: ~150 ns.
    - Link serialization, two hops: (128 bytes / 50GB/s) * 2 = 5.12 ns.
    - One switch traversal: ~100 ns.
    - Remote HCA processing: ~300 ns.
    - Destination VRAM write over PCIe/GPU memory path: ~500 ns.
    - Completion or ordering bookkeeping: ~200 ns.
    - Total latency: 300 + 400 + 500 + 150 + 5 + 100 + 300 + 500 + 200 = ~2455 ns.

    **Conclusion & Interpretation:**
    - **Result: about 2.5 microseconds end-to-end.** The 400Gbps links contribute only a few nanoseconds of serialization; HCA, doorbell/WQE, and GPU-memory transactions dominate the path.
