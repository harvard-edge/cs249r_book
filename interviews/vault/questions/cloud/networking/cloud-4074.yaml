title: RDMA Latency Breakdown for a Single Write
scenario: Trace the end-to-end latency of a single 64-byte RDMA Write from GPU A's VRAM to GPU B's VRAM across two H100 nodes connected by a single 400Gbps InfiniBand switch.
question: What is the end-to-end latency breakdown for a 64-byte GPUDirect RDMA Write between two H100 nodes through one IB switch?
details:
  realistic_solution: 'End-to-end breakdown for 64-byte RDMA Write via GPUDirect RDMA: CPU writes WQE to send queue via MMIO doorbell -> HCA fetches WQE -> HCA initiates PCIe Gen5 read from VRAM -> HCA packetizes -> Link serialization -> Switch forwarding -> Link serialization -> Remote HCA processes -> Remote HCA writes to VRAM via PCIe -> Remote HCA generates CQE.'
  common_mistake: |
    **The Pitfall:** Lumping everything into a generic "network latency" bucket (e.g., ~5\u00b5s).
    **The Rationale:** Engineers assume the wire and switch are the primary contributors to latency.
    **The Consequence:** The breakdown reveals that PCIe and DMA setup dominate for small messages, which explains why RDMA latency doesn't improve linearly with faster link speeds.
  napkin_math: |
    **Assumptions & Constraints:**
    - RDMA Write payload: 64 bytes.
    - On-wire size for this estimate: 128 bytes including local link, IB, and CRC/framing overheads.
    - Link speed: InfiniBand 400Gbps, or 50GB/s.
    - PCIe Gen5 DMA setup dominates small-message transfers.

    **Calculations:**
    - CPU WR to send queue: 200 ns.
    - HCA DMA fetch: 100 ns.
    - PCIe Read (VRAM to HCA): 300 ns.
    - Packetization: 50 ns.
    - Link serialization, two hops: (128 bytes / 50GB/s) * 2 = 5.12 ns.
    - Switch forwarding: 90 ns.
    - Remote HCA process & PCIe write: 100 ns + 300 ns.
    - Remote CQE generation: 50 ns.
    - Total latency: 200 + 100 + 300 + 50 + 5.12 + 90 + 100 + 300 + 50 = ~1195 ns.

    **Conclusion & Interpretation:**
    - **Result: about 1.2 microseconds end-to-end.** PCIe DMA/read/write and HCA processing dominate this small-message estimate; wire serialization is only a few nanoseconds at 400Gbps.
