title: Fat-Tree Bisection and AllReduce Bandwidth
scenario: 'A 3-tier fat-tree network has 400 Gbps links. Each leaf switch has 32 ports: 16 down to nodes, 16 up to spine. You have 256 nodes across 16 leaf switches.'
question: Using bidirectional aggregate bisection, and one-way effective per-node AllReduce bandwidth, what bandwidths does this fat-tree provide?
details:
  realistic_solution: Each leaf switch has 16 uplinks at 400 Gbps = 6.4 Tbps uplink capacity per leaf. Across 16 leaf switches, aggregate uplink capacity is 16 × 16 × 400 Gbps = 102.4 Tbps. Under the bidirectional aggregate convention stated in the question, the full-bisection bandwidth is 102.4 Tbps. For a cut with 128 nodes on each side, that is 102.4 Tbps / 128 = 800 Gbps per node bidirectional. The one-way effective per-node AllReduce bandwidth is therefore 400 Gbps, matching each node's 400G injection link in a full-bisection, non-blocking design.
  common_mistake: |
    **The Pitfall:** Confusing total uplink bandwidth with the strict definition of bisection bandwidth.
    **The Rationale:** Candidates often just sum all the links in the network rather than finding the minimum bandwidth across the cut that divides the network perfectly in half.
    **The Consequence:** Overstating or misrepresenting the network's ability to handle global collective operations like AllReduce.
  napkin_math: |
    **Assumptions & Constraints:**
    - 3-tier fat-tree, 400 Gbps links
    - 16 leaf switches, each with 16 uplinks
    - 256 total nodes (16 nodes per leaf)
    - Convention: bisection is bidirectional aggregate capacity; per-node AllReduce bandwidth is reported as one-way effective bandwidth.

    **Calculations:**
    - Aggregate uplink/spine capacity = 16 leaves * 16 uplinks * 400 Gbps = 102.4 Tbps
    - Bisection bandwidth, bidirectional aggregate convention = 102.4 Tbps
    - Per-node bandwidth across a 128-node side = 102.4 Tbps / 128 = 800 Gbps bidirectional
    - One-way effective per-node bandwidth = 400 Gbps

    **Conclusion & Interpretation:**
    - **Result: 102.4 Tbps bisection; 400 Gbps per node one-way effective, or 800 Gbps bidirectional (Bandwidth-Bound)**. The topology provides full non-blocking bisection bandwidth for cross-half communication during AllReduce.
