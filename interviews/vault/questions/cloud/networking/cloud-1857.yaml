title: Debugging 112G PAM4 SerDes FEC Failures
scenario: You are deploying a new high-performance compute cluster using a 51.2 Tbps switch ASIC equipped with 512 x 112G PAM4 SerDes lanes. During a large-scale AllReduce collective test, several 400G links experience intermittent link flapping and elevated packet loss. Telemetry shows the pre-FEC Bit Error Rate (BER) spiking from 1e-7 to 5e-4 on specific switch ports, strictly correlating with the ASIC die temperature exceeding 65°C.
question: How do you analyze and resolve this high-temperature pre-FEC BER bottleneck at the switch level?
details:
  realistic_solution: Use the switch diagnostic CLI to analyze the SerDes receiver eye diagram. The thermal increase degrades signal integrity, closing the tight PAM4 eye. The solution is to trigger a re-tuning of the SerDes receiver equalization parameters (CTLE and DFE) to adapt to the hotter thermal profile, and to adjust fan curves to keep the die temperature below the point where pre-FEC BER exceeds the FEC correction limit.
  common_mistake: |
    **The Pitfall:** Blindly swapping out optical transceivers or fiber cables.
    **The Rationale:** Engineers assume a physical layer hardware fault without analyzing the internal SerDes analog performance, equalization state, or thermal metrics.
    **The Consequence:** Wasting time and money on unneeded hardware replacements while failing to resolve the underlying thermal-induced signal integrity issue.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 112 Gbps PAM4 operates at 56 Gbaud.
       - KP4 FEC correction limit is 2.4e-4.
    2. **Calculations:**
       - Unit Interval (UI) is 1 / 56e9 ≈ 17.8 ps.
       - Thermal jitter adds 3-4 ps of noise, closing the 17.8 ps eye by >20%.
       - Raw BER is pushed past 5e-4, exceeding the 2.4e-4 FEC limit.
    3. **Conclusion & Interpretation:**
       - **Once pre-FEC BER > 2.4e-4, FEC breaks down entirely, resulting in uncorrectable codewords and link flapping.**
       - **Result: Hardware-Bound**
