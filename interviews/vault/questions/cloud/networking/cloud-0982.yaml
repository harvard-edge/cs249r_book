title: Evaluating Network Upgrades vs ZeRO-3 for LLM Scaling
scenario: A team is scaling a 175B parameter LLM training job from 128 to 512 GPUs connected via 400 Gbps InfiniBand. At 128 GPUs (TP=8, DP=16), the Model Flop Utilization (MFU) is 55%. Scaling to 512 GPUs (TP=8, DP=64) drops the MFU to 32% while batch size per GPU remains constant. The infrastructure team proposes upgrading to 800 Gbps NDR InfiniBand, while the ML team suggests implementing ZeRO-3 on the existing 400 Gbps network.
question: Should the 512-GPU run use 800 Gbps InfiniBand or ZeRO-3 on 400 Gbps, and how does each affect the comm/compute ratio?
details:
  realistic_solution: Reject the ZeRO-3 proposal if memory isn't the bottleneck, as it will worsen the communication-computation ratio and further degrade MFU. Approve the network upgrade to 800 Gbps or implement gradient accumulation to increase arithmetic intensity. ZeRO-3 trades communication bandwidth for memory; on a 400 Gbps network, its higher communication overhead will exacerbate the existing bandwidth bottleneck.
  common_mistake: |
    **The Pitfall:** Assuming that ZeRO-3 is a universal optimization that reduces communication time.
    **The Rationale:** ZeRO-3 increases total network communication volume by roughly 1.5x compared to standard Data Parallelism to save memory.
    **The Consequence:** Exacerbates the existing bandwidth bottleneck on the 400 Gbps network, worsening MFU.
  napkin_math: |
    **Assumptions & Constraints:**
    - 175B parameters in FP16 (350 GB)
    - Effective 400 Gbps bandwidth: 50 GB/s

    **Calculations:**
    - Standard DP All-Reduce communicates ~2 * P elements: 700 GB.
    - Current Time (400 Gbps): 700 GB / 50 GB/s = 14s.
    - ZeRO-3 communicates ~3 * P elements: 1050 GB total -> 1050 / 50 = 21s.
    - 800 Gbps standard DP time: 700 GB / 100 GB/s = 7s.

    **Conclusion & Interpretation:**
    - **Result: 7s (Network-Bound)**. Upgrading to 800Gbps halves standard DP comm time to 7s, drastically improving MFU.
