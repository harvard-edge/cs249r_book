math_issues:
  - Calculated rebalancing frequency by dividing message duration by flowlet timeout (5.12ms / 400µs = ~12.8 times). At line rate, the inter-packet gap for 4KB at 400Gbps is 80ns, which is much smaller than 400µs, so no flowlet switching will occur during the burst.
