title: Flowlet Switching for AllReduce Load Balancing
scenario: A flowlet-based load balancing scheme reroutes traffic to less-congested paths during inter-packet gaps. Your MI300X cluster uses 400Gbps RoCE links with a typical AllReduce message size of 256MB.
question: What is the inter-packet gap for 4KB packets at 400Gbps, and what flowlet timeout should you use for 256MB AllReduce messages?
details:
  realistic_solution: |
    At 400Gbps line rate with 4KB packets, packet serialization time is 4096 bytes * 8 bits / 400Gbps = 81.92ns. The Ethernet inter-frame gap is separate: 12 bytes = 96 bits, so IFG time is 96 / 400Gbps = 0.24ns. Back-to-back packets therefore have only a sub-nanosecond idle gap, not an 81.92ns flowlet gap. A 256MB message takes about 256MB / 50GB/s = 5.12ms to serialize, so flowlet switching should not try to rebalance inside the message. Use a timeout around 200-500us only if inter-message or inter-iteration idle gaps are millisecond-scale; otherwise keep the flow pinned to avoid packet reordering.
  common_mistake: |
    **The Pitfall:** Confusing flowlet timeout with flow timeout. Flowlets are bursts within a flow separated by idle gaps.
    **The Rationale:** Setting the timeout too short causes packet reordering.
    **The Consequence:** Different packets take different paths and arrive out of order; too long defeats the purpose of load balancing.
  napkin_math: |
    **Assumptions & Constraints:**
    - 256MB AllReduce message size.
    - 400Gbps line rate.
    - 4KB MTU packets.

    **Calculations:**
    - Packet serialization time: 4096 bytes * 8 / 400Gbps = 81.9ns.
    - Ethernet IFG time: 12 bytes * 8 / 400Gbps = 0.24ns.
    - Message duration: 256MB * 8 / 400Gbps = 5.12 ms.
    - Intra-message idle gap is the IFG, far below a practical flowlet timeout.
    - Rebalancing requires an observed inter-message idle gap longer than the timeout.

    **Conclusion & Interpretation:**
    - **Result: 0.24ns Ethernet IFG and 81.9ns packet serialization time at 400Gbps (Bandwidth-Bound)**. Set flowlet timeout around 200-500us only for message-boundary gaps, not for packets inside a 256MB burst.
