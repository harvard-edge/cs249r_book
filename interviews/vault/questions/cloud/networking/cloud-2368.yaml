title: RoCEv2 vs InfiniBand Congestion Control
scenario: You are architecting the network for an 8,192 GPU multi-tenant cluster. You must choose between InfiniBand (NDR 400G) and Ethernet with RoCEv2 (400G). During multi-tenant training, incast traffic (64 senders transmitting to 1 receiver simultaneously) is common. InfiniBand uses credit-based flow control, while RoCEv2 uses Priority Flow Control (PFC) combined with DCQCN. Analyze the tradeoff between these two technologies specifically regarding incast congestion and network deadlocks.
question: For 8,192 GPUs with frequent 64-to-1 incast, how do InfiniBand and RoCEv2 trade off congestion handling, deadlock risk, and cost?
details:
  realistic_solution: |
    InfiniBand uses credit-based flow control: a sender transmits only when downstream buffer credits are available. Under a 64:1 incast, that gives the fabric explicit backpressure before buffers overflow, which generally makes congestion behavior more predictable, although the receiver and switch buffers are still finite and the fabric must be engineered for the offered load.

    RoCEv2 runs RDMA over Ethernet and typically relies on PFC to avoid loss plus ECN/DCQCN to slow senders before PFC fires. In a heavy incast, switch buffers can fill quickly, PFC pause frames can propagate backpressure to upstream ports, and unrelated flows sharing those paused priorities can be affected. Cyclic dependencies between paused queues can create PFC deadlock risk, so operators use careful buffer/ECN tuning, watchdogs, and congestion-control settings to limit blast radius. Packet loss or watchdog intervention can force RDMA retransmission/recovery, but it is not accurately described as generic Go-Back-N behavior.

    The tradeoff is that InfiniBand gives more integrated congestion handling and isolation for large collectives at higher cost and with stronger vendor coupling, while RoCEv2 uses cheaper multi-vendor Ethernet but needs disciplined PFC, ECN/DCQCN, and operational tuning to avoid incast-induced tenant interference.
  common_mistake: |
    **The Pitfall:** Claiming RoCEv2 is strictly inferior because it drops packets.
    **The Rationale:** Engineers ignore that PFC makes RoCEv2 lossless but introduces congestion spreading and deadlocks.
    **The Consequence:** Incorrectly dismissing RoCEv2 without accounting for its actual operational challenges like deadlocks.
  napkin_math: |
    **Assumptions & Constraints:**
    - Illustrative single-receiver incast model: 64 senders at 400 Gbps converge on one 400 Gbps receiver.
    - Congested switch buffer available to that receiver/priority: 64 MB.
    - The receiver drains at 400 Gbps, so only the excess arrival rate fills the congested buffer.
    **Calculations:**
    - Arrival rate = 64 * 400 Gbps = 25.6 Tbps.
    - Receiver drain rate = 400 Gbps.
    - Excess rate = 25.6 Tbps - 0.4 Tbps = 25.2 Tbps = 3.15 TB/s.
    - Time to fill 64 MB = 64 MB / 3.15 TB/s ≈ 20 microseconds using decimal units.
    - If the receiver drain is ignored for a worst-case upper-arrival estimate, 64 MB / 3.2 TB/s is also about 20 microseconds.
    **Conclusion & Interpretation:**
    The buffer can be consumed on a tens-of-microseconds timescale, leaving very little margin for a multi-RTT DCQCN control loop before PFC pause behavior appears.
