title: Optimizing Network-Bound LLM Training on AMD MI300X Cluster
scenario: You are deploying a 70B parameter LLM (FP16) on an accelerator cluster. Training throughput is hampered, and profiling indicates all-reduce gradient synchronization is the bottleneck. The effective inter-node network bandwidth is 100 GB/s per accelerator.
question: How would you diagnose and address all-reduce bottlenecks for a 70B FP16 LLM with 100 GB/s effective inter-node bandwidth?
details:
  realistic_solution: 'Analyze the communication-computation ratio. Since the network transfer time massively exceeds the compute time, the workload is firmly network-bound. Address this through gradient compression (FP8 quantization), overlapping communication with computation, and parameter sharding (FSDP/ZeRO) to reduce the data volume transmitted per collective operation.'
  common_mistake: |
    **The Pitfall:** Focusing solely on the theoretical peak local memory bandwidth (like HBM3) or raw FLOPS.
    **The Rationale:** The accelerator's immense compute and memory specs dominate the spec sheet, drawing attention away from the slower inter-node fabric.
    **The Consequence:** Attempting to optimize local compute kernels while the accelerator spends the majority of its time idling, starved for network data.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: 70B parameter LLM (FP16).
    - Effective inter-node bandwidth: 100 GB/s.
    - Compute time per step: ~0.5 seconds.

    **Calculations:**
    - Gradient Size: 70e9 parameters * 2 bytes/param = 140 GB.
    - Minimum All-reduce Time ($T_{comm}$): 140 GB / 100 GB/s = 1.4 seconds.
    - Communication-Computation Ratio: 1.4s / 0.5s = 2.8.

    **Conclusion & Interpretation:**
    - **Result: 2.8 Ratio (Network-Bound)**. Because the ratio is significantly greater than 1, the system is severely network-bound, requiring gradient compression or sharding.
