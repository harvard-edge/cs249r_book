title: GPUDirect RDMA vs GPUDirect Storage Data Paths
scenario: During training, a 64-MI300X cluster performs two types of bulk data transfer (1) AllReduce
  gradients via GPUDirect RDMA (GPU→NIC→GPU), and (2) checkpoint saves via GPUDirect Storage (GPU→NVMe
  SSD). Both bypass CPU memory but share the PCIe bus.
question: How do concurrent GPUDirect Storage checkpoint saves affect AllReduce throughput on a 64-MI300X
  cluster?
details:
  realistic_solution: 'On a typical MI300X server: each GPU connects to a PCIe Gen5 x16 switch that also
    hosts its ConnectX-7 NIC and 2 NVMe SSDs. PCIe Gen5 x16 provides ~57 GB/s effective bandwidth. AllReduce
    GPUDirect RDMA requires ~50 GB/s. Checkpoint GPUDirect Storage requires 28 GB/s. Total demand is 78
    GB/s on a 57 GB/s link (1.37x oversubscribed). AllReduce throughput drops to 36.5 GB/s. Checkpoint
    throughput drops to 20.5 GB/s. This contention adds 2.5 seconds of overhead to a 192GB checkpoint.
    Mitigation: (1) Schedule checkpoints during forward-pass computation when NICs are idle. (2) Cap checkpoint
    I/O bandwidth to prevent AllReduce starvation.'
  common_mistake: '**The Pitfall:** Assuming GPUDirect RDMA and GPUDirect Storage use separate PCIe paths.

    **The Rationale:** Candidates often forget that on most server platforms, the NIC and NVMe SSDs share
    the same PCIe root complex or switch.

    **The Consequence:** This leads to unexpected bandwidth contention and degraded throughput during
    concurrent operations.

    '
  napkin_math: '**Assumptions & Constraints:**

    - AllReduce RDMA: 50 GB/s demand.

    - Checkpoint NVMe: 28 GB/s demand.

    - PCIe Gen5 x16: 57 GB/s effective limit.


    **Calculations:**

    - PCIe Demand: 50 + 28 = 78 GB/s (1.37x oversubscribed).

    - AllReduce Degradation: 57 * (50/78) = 36.5 GB/s (27% loss).

    - Checkpoint Degradation: 57 * (28/78) = 20.5 GB/s.

    - Extra Time for 192GB Checkpoint: 192GB / 20.5 GB/s = 9.4s. Normal = 192GB / 28 GB/s = 6.9s.

    - Difference = 9.4s - 6.9s = 2.5s.


    **Conclusion & Interpretation:**

    - **Result: 2.5s wasted (PCIe-Bound)**. Wasted checkpoint overhead due to PCIe bottleneck.'
