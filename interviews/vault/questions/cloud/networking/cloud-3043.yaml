title: 'Network Bandwidth Bottlenecks: Compare AllReduce over NVLink vs. InfiniBand'
scenario: 'A distributed training job runs data-parallel with 8 GPUs across two scenarios: (A) single DGX node (NVLink 600GB/s all-to-all) vs. (B) 8 GPUs across 4 servers connected by 200Gb/s InfiniBand HDR.'
question: For a 13B model with 26GB FP16 gradients, how long does the AllReduce take with NVLink versus InfiniBand, and what is the efficiency ratio?
details:
  realistic_solution: 'Use the same ring-AllReduce volume model for both fabrics and treat each rank as bandwidth-bound by one effective link, ignoring startup latency and overlap with backprop. Each data-parallel rank has the full 26GB FP16 gradient tensor. Ring-AllReduce moves 2×(8-1)/8×26GB = 45.5GB per GPU. On a single DGX NVLink fabric at 600GB/s, time is 45.5/600 = 75.8ms. Across 4 servers on 200Gb/s InfiniBand, use 25GB/s effective bandwidth: 45.5/25 = 1.82s. The time ratio is 1.82s/75.8ms = 24x slower on InfiniBand; equivalently, InfiniBand delivers about 4.2% of the NVLink bandwidth-bound throughput in this simplified model.'
  common_mistake: |
    **The Pitfall:** Computing AllReduce bandwidth as total gradient size divided by link bandwidth.
    **The Rationale:** Candidates forget to apply the ring-AllReduce formula (2(n-1)/n × data per participant).
    **The Consequence:** Underestimating the communication time and miscalculating the efficiency.
  napkin_math: |
    **Assumptions & Constraints:**
    - 13B model with a 26GB FP16 gradient tensor per data-parallel rank.
    - NVLink = 600 GB/s.
    - InfiniBand = 200 Gbps (25 GB/s).
    - Simplified bandwidth-bound ring model; latency and compute/communication overlap are ignored.

    **Calculations:**
    - Ring-AllReduce data per GPU = 2 * (8-1)/8 * 26GB = 45.5 GB.
    - NVLink time: 45.5 GB / 600 GB/s = 75.8 ms.
    - InfiniBand time using the same ring volume: 45.5 GB / 25 GB/s = 1.82 s.
    - Time ratio = 1.82 s / 75.8 ms = 24x slower on InfiniBand.
    - Bandwidth-bound throughput efficiency relative to NVLink = 75.8 ms / 1.82 s = 4.2%.

    **Conclusion & Interpretation:**
    - **Result: 75.8ms on NVLink vs 1.82s on InfiniBand.** Under this simplified per-rank bandwidth-bound model, InfiniBand is 24x slower, or about 4.2% as efficient as NVLink for the same AllReduce volume.
