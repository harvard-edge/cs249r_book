title: NVLink to PCIe Fallback
scenario: You are debugging a Tensor Parallel (TP=8) LLM training job on a single 8-GPU node. Training throughput is severely degraded. Profiling reveals that intra-node ncclAllGather operations are taking ~14x longer than expected.
question: What likely causes the ~14x slow intra-node ncclAllGather, and how would you verify and fix the topology issue?
details:
  realistic_solution: Execute `nvidia-smi topo -m` or export `NCCL_DEBUG=INFO` to inspect the interconnect topology. The 14x slowdown is a textbook signature of NCCL falling back to host memory routing via PCIe Gen5 because NVLink peer-to-peer (P2P) is blocked. This is typically caused by active PCIe Access Control Services (ACS) or strict IOMMU settings. Disabling ACS re-enables direct NVLink DMA.
  common_mistake: |
    **The Pitfall:** Assuming the bottleneck is compute-bound, related to batch size, or blaming inter-node InfiniBand.
    **The Rationale:** Engineers often look at high-level symptoms (slow training) and guess the usual suspects without systematically validating the lower-level topology.
    **The Consequence:** Wasting time tuning software hyper-parameters or network settings while the intra-node P2P fabric remains bottlenecked by the host CPU bus.
  napkin_math: |
    **Assumptions & Constraints:**
    - Expected Interconnect: NVLink 4.0 (900 GB/s bidirectional).
    - Fallback Interconnect: PCIe Gen5 (~64 GB/s unidirectional).
    - Tensor Size: 1 GB (arbitrary payload for ratio testing).

    **Calculations:**
    - NVLink Transfer Time: 1 GB / 900 GB/s = ~1.1 ms.
    - PCIe Transfer Time: 1 GB / 64 GB/s = ~15.6 ms.
    - Latency Ratio: 15.6 ms / 1.1 ms = ~14.1x.

    **Conclusion & Interpretation:**
    - **Result: ~14.1x latency ratio (Fabric-Topology Bound)**. This perfectly matches the profiled ~14x degradation, confirming PCIe fallback.
