title: NVLink to PCIe Fallback
scenario: You are debugging a Tensor Parallel (TP=8) LLM training job on a single 8-GPU node. Training throughput is severely degraded. Profiling reveals that intra-node ncclAllGather operations are taking ~14x longer than expected.
question: What likely causes the ~14x slow intra-node ncclAllGather, and how would you verify and fix the topology issue?
details:
  realistic_solution: Treat the ~14x slowdown as evidence that NCCL is likely not using the expected GPU-direct/NVLink path, not as proof of one specific PCIe fallback. Verify with `nvidia-smi topo -m`, `NCCL_DEBUG=INFO`, and, if needed, `NCCL_TOPO_DUMP_FILE` to inspect the selected transports. Fix the root cause by confirming NVLink links are up, GPU topology matches the node design, NCCL/CUDA/driver versions are compatible, and PCIe ACS/IOMMU settings are not blocking P2P where the path uses PCIe.
  common_mistake: |
    **The Pitfall:** Assuming the bottleneck is compute-bound, related to batch size, or blaming inter-node InfiniBand.
    **The Rationale:** Engineers often look at high-level symptoms (slow training) and guess the usual suspects without systematically validating the lower-level topology.
    **The Consequence:** Wasting time tuning software hyper-parameters or network settings while the intra-node P2P fabric remains bottlenecked by the host CPU bus.
  napkin_math: |
    **Assumptions & Constraints:**
    - Expected path: GPU-direct/NVLink for intra-node collectives.
    - Possible degraded path: PCIe or host-memory routed transport.
    - Tensor Size: 1 GB illustrative payload; collective timing also includes synchronization, routing, and protocol overhead.

    **Calculations:**
    - Ideal NVLink transfer intuition: 1 GB / 900 GB/s bidirectional aggregate = ~1.1 ms lower-bound scale.
    - PCIe Gen5 transfer intuition: 1 GB / 64 GB/s unidirectional = ~15.6 ms lower-bound scale.
    - A ~14x gap is plausible for a degraded path, but the exact ratio is not diagnostic because allgather latency depends on message size, topology, hops, transport choice, and synchronization.

    **Conclusion & Interpretation:**
    - **Result: likely fabric or transport selection issue, not a confirmed ACS-only failure.** Use topology and NCCL transport logs to confirm whether NVLink P2P is active before changing ACS/IOMMU, cabling, driver, or NCCL settings.
