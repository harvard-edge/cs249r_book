math_issues:
  - The original math calculated the inter-rack traffic for only one of the 8 GPUs in the rack, concluding the inter-rack step took 61ms. In reality, all 8 GPUs must share the single uplink to reduce their partitions, generating 8x more traffic (24.5 GB) and taking 490ms.
