title: Cross-Rack Bandwidth Planning for Data Parallelism
scenario: You have 8 racks of 8 MI300X GPUs each (64 total). Each rack has one 400 Gbps uplink to the spine. You want to run 64-way data-parallel training with a 7B model. The gradient size is 14 GB (FP16).
question: Will the cross-rack bandwidth support AllReduce, and if not, how do you fix it without adding spine bandwidth?
details:
  realistic_solution: 'The single 400 Gbps rack uplink is the bottleneck. A topology-aware hierarchical AllReduce first reduces within each rack, but the inter-rack phase still has to AllReduce the 14 GB gradient across 8 racks through one 50 GB/s uplink per rack. The lower-bound inter-rack traffic per rack is 2 × (7/8) × 14 GB = 24.5 GB, so the inter-rack phase alone is about 490ms before local work and protocol overhead. A flat 64-GPU ring is no better on the constrained uplink and can be worse depending on ring placement. Without adding spine bandwidth, the fix is to reduce synchronization traffic: use gradient compression with error feedback, local SGD or gradient accumulation to sync less often, or optimizer/model sharding so less state participates in each cross-rack collective. Compression is a valid mitigation, but not the only possible one.'
  common_mistake: |
    **The Pitfall:** Calculating bandwidth as if AllReduce traffic is evenly distributed across all links at wire speed.
    **The Rationale:** Engineers ignore network topology constraints, assuming a 64-GPU ring has unhindered throughput.
    **The Consequence:** The rack uplink becomes a severe bottleneck because 8 GPUs are competing for a single 400 Gbps port, causing training to stall indefinitely.
  napkin_math: |
    **Assumptions & Constraints:**
    - 8 racks, 8 GPUs per rack.
    - Gradient size: 14 GB.
    - Each rack has one 400 Gbps uplink = 50 GB/s.
    - Hierarchical AllReduce reduces within the rack, then AllReduces across 8 racks.

    **Calculations:**
    - Inter-rack ring model over racks: 2 * (R - 1) / R * message_size.
    - Inter-rack traffic per rack uplink: 2 * (7/8) * 14 GB = 24.5 GB.
    - Inter-rack time lower bound: 24.5 GB / 50 GB/s = 490ms.
    - Intra-rack reduce-scatter plus all-gather over 8 GPUs at 896 GB/s: 2 * (7/8) * 14 GB / 896 GB/s = 27.3ms.
    - Total hierarchical lower bound: 490ms + 27.3ms = 517.3ms before software/protocol overhead.
    - To target a 100ms inter-rack phase, the cross-rack payload must be <= 100ms * 50 GB/s / (2 * 7/8) ≈ 2.86 GB, a 4.9x reduction from 14 GB.

    **Conclusion & Interpretation:** The single uplink limits a 14 GB cross-rack AllReduce to roughly 500ms. Fix it by reducing cross-rack bytes or sync frequency; compression with error feedback, local SGD/accumulation, or sharding are all plausible depending on convergence constraints.
