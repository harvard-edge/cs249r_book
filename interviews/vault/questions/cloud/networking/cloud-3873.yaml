title: 'Evaluating RDMA Kernel Bypass for Distributed Clusters'
scenario: You are designing the cross-node transport for a distributed training cluster of GPUs, each equipped with a single InfiniBand NDR NIC. During each training iteration, a 16 GB tensor must be transmitted to an adjacent node under a strict 600 ms budget. Design A uses standard TCP sockets over the InfiniBand network (IPoIB), staging data through host memory with a known 50% throughput penalty due to CPU TCP/kernel context switching overhead. Design B uses InfiniBand verbs with GPUDirect RDMA, bypassing the OS kernel entirely.
question: "Which transport design meets the 600 ms budget for sending a 16 GB tensor, TCP/IPoIB staging or GPUDirect RDMA?"
details:
  realistic_solution: 'Design B (GPUDirect RDMA) is the only architecture that meets the latency budget. In Design A, the lack of kernel bypass forces data to be staged in host RAM and processed by the kernel, driving the effective throughput down to 16 GB/s and failing the budget. Design B utilizes zero-copy networking to stream directly from the GPU HBM3 to the NIC over the PCIe switch. Because the 50 GB/s NDR link outpaces the PCIe Gen5 bus, the transfer is bottlenecked strictly by the 32 GB/s PCIe unidirectional limit, safely coming in under the 600 ms requirement.'
  common_mistake: |
    **The Pitfall:** Incorrectly assuming the 50 GB/s InfiniBand network bandwidth is the primary bottleneck.
    **The Rationale:** Candidates focus on the network specs and ignore that a single PCIe Gen5 x16 slot caps out at 32 GB/s.
    **The Consequence:** Overestimating throughput and failing to account for the severe dual-PCIe traversal and memory copies required by non-RDMA TCP/IP stacks.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Payload: 16 GB tensor.
       - Budget: 600 ms.
       - PCIe Gen5 x16 unidirectional limit: 32 GB/s.
    2. **Calculations:**
       - Design A (IPoIB/TCP): 32 GB/s * 50% penalty = 16 GB/s.
       - Design A Time = 16 GB / 16 GB/s = 1000 ms.
       - Design B (GPUDirect RDMA): Network hits PCIe bottleneck = 32 GB/s.
       - Design B Time = 16 GB / 32 GB/s = 500 ms.
    3. **Conclusion & Interpretation:**
       - **Result: 500 ms (PCIe-Bandwidth-Bound).** Design B meets the budget by bypassing the kernel, whereas Design A misses the budget by 400 ms.
