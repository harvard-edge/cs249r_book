title: 'Network Bandwidth Bottlenecks: Compare PCIe 4.0 vs. 5.0 Impact on H100 Data Loading'
scenario: A training cluster uses H100 GPUs with either PCIe 4.0 x16 (32GB/s) or PCIe 5.0 x16 (64GB/s) for CPU-GPU data transfer. A vision model is being trained with 224x224 RGB float32 images, batch size 256, and 4 workers per GPU.
question: What is the actual input tensor size for batch 256 ImageNet 224x224 RGB float32 images, how long would it take to transfer over PCIe 4.0 versus PCIe 5.0, and why is an estimate of 3.3GB too high?
details:
  realistic_solution: 'Input tensor memory for batch=256 ImageNet images: 256 × 224² × 3 × 4B = 154,140,672 bytes, about 154MB decimal or 147MiB. PCIe 4.0 x16 at 32GB/s transfers that payload in about 4.8ms; PCIe 5.0 x16 at 64GB/s takes about 2.4ms. An estimate of 3.3GB is too high by about 21x and would imply a batch size around 5500 images, not 256.'
  common_mistake: |
    **The Pitfall:** Assuming data loading is always CPU-bound and not limited by PCIe bandwidth.
    **The Rationale:** Candidates often miscalculate the size of an uncompressed float32 image batch or forget that data must traverse the PCIe bus after CPU decoding.
    **The Consequence:** Clusters are provisioned with slower PCIe interfaces that bottleneck the H100s at high batch sizes.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Image dimensions: 224 × 224 × 3 (RGB).
       - Float32 precision: 4 bytes.
       - Batch size: 256.
    2. **Calculations:**
       - Memory per image: 224 × 224 × 3 × 4 bytes = 602,112 bytes.
       - Batch memory: 602,112 bytes × 256 images = 154,140,672 bytes (~154 MB).
       - PCIe 4.0 transfer time: 0.154GB / 32GB/s = 0.0048s = 4.8ms.
       - PCIe 5.0 transfer time: 0.154GB / 64GB/s = 0.0024s = 2.4ms.
       - 3.3GB / 154MB ≈ 21.4, so that estimate corresponds to roughly 256 * 21.4 ≈ 5500 images.
    3. **Conclusion & Interpretation:**
       - **Result: Not PCIe-bound for this batch size. A single batch is ~154MB, transferring in ~4.8ms on PCIe 4.0 or ~2.4ms on PCIe 5.0; 3.3GB would imply a batch size over 5000.**
