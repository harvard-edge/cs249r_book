title: Diagnosing Tail Latency in RESTful Image Serving
scenario: Your team deployed a ResNet-50 image classification model as a networked microservice using a Python REST API (FastAPI) on an AWS g4dn.xlarge (T4 GPU). Clients send raw 224x224x3 FP32 tensors encoded as Base64 JSON arrays. The model inference time is measured at 4ms per image on the GPU. However, under a moderate load of 50 QPS, the p99 latency spikes to over 200ms, and GPU utilization remains under 15%. Batching is enabled but seems to make the latency worse.
question: What is causing the 200ms p99 latency and low GPU utilization, and how would you fix the request path?
details:
  realistic_solution: Analyze the serialization and network overhead. Switch from sending Base64 JSON arrays to sending compressed JPEG bytes (decoding on the server) or use a binary protocol like gRPC with Protobuf/Arrow. The Python GIL is likely blocking during JSON deserialization.
  common_mistake: |
    **The Pitfall:** Assuming the bottleneck is GPU compute and attempting to increase batch size or upgrade hardware.
    **The Rationale:** Focusing purely on the ML model's inference time while ignoring data serialization and I/O overhead.
    **The Consequence:** Wasting money on a larger GPU (like an A10G) while latency remains terrible because the CPU JSON parser is still the bottleneck.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Payload: 224x224x3 FP32 Tensor (602KB binary).
       - Network serialization: Base64 JSON. Load: 50 QPS.
    2. **Calculations:**
       - Base64 Payload: Inflates 602KB to ~800KB of text.
       - CPU Overhead: Parsing 800KB JSON blocks the Python GIL for ~15-20ms.
       - Queueing Limit: At 50 QPS, 50 * 20ms = 1000ms of CPU time per second.
    3. **Conclusion & Interpretation:**
       - **Result: CPU-Bound Serialization.** The Python GIL is saturated parsing JSON arrays, starving the GPU and causing massive latency spikes.
