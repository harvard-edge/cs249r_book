title: Diagnosing Distributed Training Scaling Failure
scenario: A team upgrades their training cluster of 32 nodes from 4x V100 GPUs per node to 8x A100 GPUs per node, increasing theoretical compute capacity by ~5x. However, when training a 30B parameter model, their actual tokens/sec throughput only increases by 38%. The inter-node fabric was left unchanged at a single 100 Gbps Ethernet link per node.
question: Why did the 5x compute upgrade to 8x A100 nodes increase 30B training throughput by only 38%?
details:
  realistic_solution: The root cause is a severe inter-node fabric bottleneck. Assume the node uses fast intra-node reduction across its GPUs, then each of the 32 nodes participates once in the cross-node Ring AllReduce for the 60GB FP16 gradient shard being synchronized. The 100 Gbps inter-node link was not upgraded, so Ring AllReduce still moves about 2*(N-1)/N times 60GB per node, roughly 116GB, taking about 9.3s at 12.5 GB/s. If compute dropped from 5.0s to 1.0s, step time only falls from about 14.3s to 10.3s, so throughput rises by about 39% rather than 5x.
  common_mistake: |
    **The Pitfall:** Blaming CPU bottlenecks or PyTorch configurations for the poor scaling.
    **The Rationale:** Engineers intuitively suspect software overheads when a hardware upgrade underdelivers.
    **The Consequence:** The team wastes time profiling data loaders instead of identifying the glaring hard network bandwidth limitation.
  napkin_math: |
    **Assumptions & Constraints:**
    - Gradient size being synchronized across nodes: 30B parameters * 2 bytes (FP16) = 60 GB.
    - Inter-node participants: 32 nodes after fast intra-node aggregation/reduction on each node.
    - Inter-node network bandwidth: 100 Gbps = 12.5 GB/s per node.
    - Upgrade changes node-local compute from 4x V100 to 8x A100, but leaves the inter-node link unchanged.

    **Calculations:**
    - Ring AllReduce Transfer per node: 2 * (32 - 1) / 32 * 60 GB = 116.25 GB.
    - Communication Time: 116.25 GB / 12.5 GB/s = 9.3 seconds.
    - V100 Step Time: 5.0s (compute) + 9.3s (comm) = 14.3s.
    - A100 Step Time: 1.0s (compute) + 9.3s (comm) = 10.3s.
    - Throughput speedup: 14.3s / 10.3s = 1.39x, or about 39% more tokens/sec.

    **Conclusion & Interpretation:**
    - **Result: ~38-39% throughput gain (Network-Bound)**. The 5x compute improvement mostly exposes the unchanged all-reduce time, so throughput is limited by the network rather than by GPU FLOPs.
