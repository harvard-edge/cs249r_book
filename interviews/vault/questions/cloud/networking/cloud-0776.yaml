title: The Global Model
scenario: Your company operates globally, and due to data residency regulations (e.g., GDPR, CCPA), raw training data cannot be moved outside its originating geographic region (US, EU, APAC). You need to train a single, unified, large-scale foundation model that learns from all this distributed data.
question: How would you train a single foundation model across US, EU, and APAC without moving raw regional data?
details:
  realistic_solution: Training a unified model across geographically dispersed data centers with data residency constraints presents significant challenges primarily due to **high WAN latency** and **limited WAN bandwidth** compared to internal data center networks. Techniques like federated learning or heavily compressed asynchronous gradient updates must be utilized.
  common_mistake: |
    **The Pitfall:** Proposing naive centralized training or basic local averaging.
    **The Rationale:** Candidates either ignore the strict data residency constraint or fail to grasp the massive WAN latency/bandwidth bottleneck for huge models.
    **The Consequence:** The proposed architecture either violates laws or results in impractically slow training times (hours per step).
  napkin_math: |
    *   **Model size:** 100B parameters, FP16 = 200GB.
    *   **WAN Link:** 1Gbps (125MB/s) between regions.
    *   **Full Gradient Transfer Time:** 200GB / 125MB/s = 1600 seconds = 26.6 minutes per update.
    *   **Compressed Gradient (100x):** 2GB.
    *   **Transfer time (compressed):** 2GB / 125MB/s = 16 seconds.
    *   **Result:** Sending full gradients is unviable (**26.6 minutes per step**); heavily compressed, asynchronous, or federated updates are required.
