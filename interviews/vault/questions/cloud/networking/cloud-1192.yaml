title: Elephant Flow Collisions with ECMP
scenario: 'You are training a 65B parameter LLM on a 64-node cluster (8 GPUs per node) using a 400Gbps RoCEv2 network. The AllReduce gradient synchronization step transfers ~130GB of data. Despite having a non-blocking leaf-spine topology with sufficient total bisection bandwidth, you notice highly uneven network utilization: some switch ports are saturated and experiencing Priority-based Flow Control (PFC) pauses, while others sit idle. The fabric relies on standard ECMP (Equal-Cost Multi-Path) for routing.'
question: Why are some RoCEv2 ports saturated during the 130GB AllReduce while others idle, and how would you fix the routing?
details:
  realistic_solution: |
    Replace flow-based ECMP with packet-level or flowlet-level load balancing (e.g., packet spraying), or adopt a rail-optimized topology where identical GPU ranks communicate over dedicated, non-blocking switches to physically isolate the elephant flows and prevent collisions.
  common_mistake: |
    **The Pitfall:** Assuming standard ECMP routing perfectly balances all network traffic.
    **The Rationale:** Candidates fail to recognize that ECMP hashes traffic on a per-flow basis (5-tuple). Since ML traffic consists of a few massive 'elephant flows', hash collisions inevitably map multiple flows to the same physical link.
    **The Consequence:** Severe port hot-spotting, localized network saturation, and dramatically increased collective communication times.
  napkin_math: |
    **Assumptions & Constraints:**
    - 130 GB AllReduce data.
    - 400Gbps RoCEv2 (50 GB/s).

    **Calculations:**
    - Ideal Transfer Time: 130 GB / 50 GB/s (400Gbps) = 2.6s.
    - Collision Impact: If an ECMP hash collision maps 3 elephant flows to the same link, each flow gets 133.3 Gbps (16.67 GB/s).
    - Degraded Transfer Time: 130 GB / 16.67 GB/s = 7.8s.

    **Conclusion & Interpretation:**
    - **Result: 7.8s (Network-Bound)**. Synchronization time increases from 2.6s to 7.8s due to ECMP hash collisions.
