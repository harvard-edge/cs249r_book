title: Diagnosing DP Congestion in Rail-Optimized Clusters
scenario: Your team is training a 70B parameter LLM on a 1024-GPU cluster using 3D parallelism. The cluster features a rail-optimized InfiniBand topology, where GPU 'i' on every node is wired to Leaf Switch 'i'. You observe severe network congestion during the Data Parallel (DP) AllReduce phase, slowing step times by 40%. Telemetry shows that IB switches 0 and 1 are saturated at 400 Gbps, while switches 2-7 show near-zero traffic. The job was recently restarted by the cluster orchestrator after a hardware failure.
question: What caused DP AllReduce traffic to saturate only IB switches 0 and 1 after restart, and what scheduling constraint fixes it?
details:
  realistic_solution: The restart placement ignored rail-aware affinity and concentrated the restarted DP groups onto GPUs or hosts attached to rails 0 and 1. That localized the DP AllReduce onto only those leaf switches while rails 2-7 were idle. The fix is a topology-aware scheduling constraint that preserves rail-index alignment for each DP group across nodes and spreads groups across the available rails, rather than allowing arbitrary restart packing.
  common_mistake: |
    **The Pitfall:** Blaming the hardware (faulty switches or bad Active Optical Cables) or assuming NCCL topology detection failed.
    **The Rationale:** Software engineers often treat the network as a black box and assume physical failures when localized congestion occurs, overlooking cluster scheduler behavior.
    **The Consequence:** The orchestrator placed tasks without enforcing physical rail layout. Hardware teams go on wild goose chases replacing cables while the software scheduler is at fault.
  napkin_math: |
    **Assumptions & Constraints:**
    - Rail-optimized topology, 8 rails * 400 Gbps.
    - Healthy placement spreads DP AllReduce traffic across rails; observed telemetry shows only rails 0 and 1 are active.

    **Calculations:**
    - Expected active rails under balanced placement: 8.
    - Observed active rails after restart: 2.
    - Traffic concentration factor: 8 / 2 = 4x more AllReduce load on rails 0 and 1 than intended.

    **Conclusion & Interpretation:**
    - **Result: Rail Placement Violation**. The saturation pattern is explained by restart packing onto two rails, so the scheduler must enforce rail-aware DP placement and spreading.
