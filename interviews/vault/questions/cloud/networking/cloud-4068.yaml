title: RoCE v2 Packet Format and GRH Overhead
scenario: RoCE v2 encapsulates RDMA operations in UDP/IP packets, adding Ethernet, IP, UDP, and IB Transport headers to each packet.
question: For a 4KB RDMA Write payload, what are the RoCE v2 header overhead and payload efficiency compared with native InfiniBand?
details:
  realistic_solution: 'RoCE v2 packet structure: Ethernet header (14 bytes) + optional VLAN tag (4 bytes) + IPv4/IPv6 header (20/40 bytes) + UDP header (8 bytes) + IB BTH (Base Transport Header, 12 bytes) + RETH (RDMA Extended Transport Header, 16 bytes for RDMA Write) + Payload (4096 bytes) + ICRC (4 bytes) + FCS (4 bytes). Total headers (IPv4, with VLAN): 14 + 4 + 20 + 8 + 12 + 16 + 4 + 4 = 82 bytes. Total packet: 82 + 4096 = 4178 bytes. Payload efficiency: 4096 / 4178 = 98.0%. Native InfiniBand: LRH (Local Route Header, 8 bytes) + GRH (Global Route Header, 40 bytes, optional) + BTH (12 bytes) + RETH (16 bytes) + Payload + ICRC (4 bytes) + VCRC (2 bytes). Without GRH: 8 + 12 + 16 + 4 + 2 = 42 bytes overhead. Efficiency: 4096 / 4138 = 99.0%. IB has ~1% better efficiency due to fewer protocol layers. At 400Gbps: RoCE overhead = 82 bytes × 12.2M packets/sec = 7.95 Gbps wasted. IB: 42 bytes × 12.2M = 4.07 Gbps. Difference: 3.88 Gbps = ~1% of line rate.'
  common_mistake: |
    **The Pitfall:** Ignoring the cumulative header overhead across all layers or confusing RoCE v1 with RoCE v2.
    **The Rationale:** Engineers assume network packets only carry a few bytes of routing data, forgetting that encapsulating IB over UDP/IP adds significant overhead, especially for small packets.
    **The Consequence:** Unexplained throughput loss in high-speed (400Gbps+) clusters when transmitting small gradient payloads.
  napkin_math: |
    - RoCE v2 headers: Eth (14) + VLAN (4) + IPv4 (20) + UDP (8) + BTH (12) + RETH (16) + ICRC (4) + FCS (4) = 82 bytes.
    - RoCE v2 Total packet (4KB payload): 4096 + 82 = 4178 bytes. Efficiency = 4096 / 4178 = 98.0%.
    - Native IB headers (no GRH): LRH (8) + BTH (12) + RETH (16) + ICRC (4) + VCRC (2) = 42 bytes.
    - Native IB Efficiency = 4096 / 4138 = 99.0%.
    - Overhead difference at 400 Gbps: RoCE overhead = 82 bytes * 12.2M packets/s = 8 Gbps wasted. IB = 42 bytes * 12.2M = 4.1 Gbps.
    - **RoCE v2 wastes ~4 Gbps more than native IB at 400Gbps line rate for 4KB payloads.**
