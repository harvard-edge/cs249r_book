title: Multi-GPU Pod Affinity for NVLink-Dependent Workloads
scenario: You're deploying a 70B model training job on a Kubernetes cluster with GPU nodes (8 GPUs/node, NVLink 900GB/s intra-node). Some pods get scheduled across 2 nodes (cross-node via InfiniBand at 400Gbps = 50GB/s). All-reduce throughput drops 18x when split across nodes.
question: How would you schedule the 70B training pods so 8-GPU jobs stay within one node and avoid the 18x all-reduce slowdown?
details:
  realistic_solution: 'Request nvidia.com/gpu: 8 in the pod spec so the Kubernetes scheduler places the pod on one node with 8 allocatable GPUs; a single pod resource request cannot be split across nodes. Constrain placement to the 8-GPU NVLink node pool with node affinity or nodeSelector, and use taints/tolerations so smaller jobs do not consume those nodes. For multi-pod training jobs, add gang scheduling (Volcano or Koordinator) so all pods reserve their required nodes together.'
  common_mistake: |
    **The Pitfall:** Launching an 8-GPU job as eight independent 1-GPU pods without node-level placement constraints.
    **The Rationale:** Kubernetes can spread independent pods across available nodes unless the workload requests all 8 GPUs in one pod or uses explicit co-location policy.
    **The Consequence:** The job crosses the InfiniBand boundary, wasting communication time and reducing GPU utilization.
  napkin_math: |
    **Assumptions & Constraints:**
    - Intra-node NVLink: 900GB/s.
    - Cross-node InfiniBand: 50GB/s.
    - 70B BF16/FP16 gradient payload example: 70B * 2 bytes = 140GB.

    **Calculations:**
    - Intra-node 8-GPU ring AllReduce time: 2 * (7/8) * 140GB / 900GB/s = 0.27s.
    - Cross-node 8-rank ring AllReduce time over 50GB/s InfiniBand: 2 * (7/8) * 140GB / 50GB/s = 4.9s.
    - Slowdown: 4.9s / 0.27s = 18.1x.

    **Conclusion & Interpretation:**
    - **Result: 18x slower (Communication-Bound)**. The scheduler should make the 8-GPU job a single-node allocation because splitting the collective across nodes changes the synchronization term from sub-second NVLink time to multi-second InfiniBand time.
