title: Optimizing Distributed LLM Training with RDMA on NVIDIA A100
scenario: You are designing a high-performance distributed training system for a large language model on a 32 GPU cluster distributed across multiple servers. Each GPU node is connected to a 100 Gbps network interface.
question: How would you design a RoCE/RDMA network and communication strategy for a 100 GB all-reduce so GPUs stay compute-bound?
details:
  realistic_solution: A robust solution would involve a fat-tree network topology with non-blocking 100/200 Gbps RoCE-enabled switches, ensuring full bisection bandwidth. Utilizing NCCL (NVIDIA Collective Communications Library) with proper RDMA provider configuration is crucial, as it's optimized for NVIDIA GPUs and can automatically leverage InfiniBand verbs and GPU Direct RDMA for direct memory access between GPU memory and network interfaces. The design should specify host memory pinning, explicit use of `ibverbs` for specific control paths or custom collectives, and meticulous tuning of network parameters like MTU, buffer sizes, and flow control. Monitoring tools like `ibstat`, `perf`, and custom NCCL logging would be used to identify and resolve bottlenecks.
  common_mistake: |
    **The Pitfall:** Underestimating the impact of CPU overhead in traditional networking stacks or neglecting to configure RDMA properly.
    **The Rationale:** Treating 100 Gbps Ethernet the same as a local PCIe bus and failing to use zero-copy kernel bypass.
    **The Consequence:** The GPUs spend the vast majority of their time idle waiting for data, completely neutralizing the compute power of the A100s.
  napkin_math: |
    **Assumptions & Constraints:**
    - Network Bandwidth: 100 Gbps = 12.5 GB/s raw; assume 10 GB/s effective after overhead.
    - Ring all-reduce over 32 GPU nodes.
    - Message size per node: 100 GB.

    **Calculations:**
    - Reduce-scatter phase sends (31/32) * 100 GB = 96.875 GB per node.
    - All-gather phase sends another (31/32) * 100 GB = 96.875 GB per node.
    - Total per-node ring traffic: 2 * (31/32) * 100 GB = 193.75 GB.
    - Communication time per node: 193.75 GB / 10 GB/s = 19.4 seconds.

    **Conclusion & Interpretation:**
    - **Result: about 19 seconds per synchronization at 100 Gbps effective throughput.** This is network-bandwidth-bound unless compute is long enough to hide it, so overlap, sharding, gradient accumulation, and faster links are needed.
