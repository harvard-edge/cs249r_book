title: Ultra Ethernet Consortium for ML Training
scenario: The Ultra Ethernet Consortium (UEC) is designing a new RDMA transport specifically for AI/ML workloads, addressing RoCE v2's PFC dependency and InfiniBand's vendor lock-in. UEC proposes packet spraying, hardware-based selective retransmission, and multi-path transport.
question: How would UEC's packet spraying, selective retransmission, and multipath transport compare with RoCE v2 and InfiniBand at 8192 MI300X GPUs?
details:
  realistic_solution: 'UEC key innovations and evaluation: (1) Packet spraying distributes packets across available paths, reducing ECMP hash polarization and improving fabric utilization at 8192 GPUs. The tradeoff is receiver-side reordering state and more demanding congestion-control behavior, so the benefit depends on silicon implementation and traffic mix rather than a guaranteed percentage gain. (2) Selective retransmission retransmits only the missing data rather than forcing large go-back windows, which is valuable for high-bandwidth collectives because rare losses do not amplify into large replay storms. The exact savings depend on packet size, loss pattern, and windowing. (3) Native multipath transport lets one logical connection use multiple rails and paths without pushing all rail management into NCCL. Compared with RoCE v2, UEC directly targets PFC avoidance, multipath utilization, and open Ethernet operations. Compared with InfiniBand, it may reduce vendor lock-in and fit cloud
    Ethernet operations better, but InfiniBand has stronger maturity and proven collective performance. For an 8192 MI300X cluster, the release-quality answer is that UEC is promising if the workload is ECMP- or loss-recovery-limited, but RoCE v2 or InfiniBand may still win on maturity, tooling, and predictable production behavior.'
  common_mistake: |
    **The Pitfall:** Evaluating UEC purely on paper specifications.
    **The Rationale:** UEC's proposed packet spraying and selective retransmissions directly solve known issues in existing networks.
    **The Consequence:** Candidates fail to account for the massive maturity gap; InfiniBand has 15+ years of production hardening, while early silicon often suffers from real-world reliability issues.
  napkin_math: |
    **Assumptions & Constraints:**
    - 8192 MI300X cluster with many equal-cost fabric paths.
    - RoCE v2 with ECMP can leave some paths underused when flow hashes collide.
    - UEC packet spraying improves path balance but adds reorder state and implementation complexity.
    - Selective retransmission helps most when losses are rare but expensive to recover with coarse replay.

    **Calculations:**
    - Qualitative throughput model: effective collective throughput is bounded by the most congested fabric paths, loss recovery overhead, and endpoint/NIC limits.
    - Packet spraying can improve utilization when ECMP polarization is the limiter, but the gain is workload- and topology-dependent rather than a fixed percentage.
    - Selective retransmission reduces loss amplification: if one packet is lost, UEC-style recovery resends the missing packet or small range instead of replaying an entire outstanding window.
    - No reliable payback can be computed from the scenario because it does not specify training runtime, compute cost per hour, measured utilization gain, or incremental network cost.

    **Conclusion & Interpretation:**
    - **Result: evaluation-bound, not payback-bound.** UEC should be compared on measured fabric utilization, loss recovery, operational fit, and maturity at 8192 GPUs; the scenario does not support a dollar-savings calculation.
