title: The Scaling Cliff
scenario: You are training a 175B LLM across multiple nodes connected by InfiniBand NDR. Scaling from 1 to 4 nodes gives a ~2.5x speedup, but scaling to 8 nodes only provides a ~3.2x total speedup. GPU utilization remains high (>90%).
question: What is the most likely cause for these diminishing returns?
details:
  realistic_solution: 'The bottleneck is the inter-node communication over InfiniBand. Within a node, GPUs communicate over ultra-fast NVLink. Across nodes, gradients synchronize over much slower InfiniBand, leading to massive network overhead during All-Reduce operations.'
  common_mistake: |
    **The Pitfall:** Assuming high GPU utilization means compute is the bottleneck.
    **The Rationale:** Engineers fail to recognize that 'high utilization' can also mean 'busy waiting' during collective communication over a slow network.
    **The Consequence:** Misidentifying the bottleneck and failing to upgrade the network interconnect.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: 175B params = 350 GB (FP16).
    - N=8 nodes, InfiniBand NDR = 50 GB/s.

    **Calculations:**
    - Ring All-Reduce transfers = 2 * (7/8) * 350 GB = 612.5 GB.
    - Inter-node Time = 612.5 GB / 50 GB/s = 12.25s.

    **Conclusion & Interpretation:**
    - **Result: Network-Bound (Inter-node InfiniBand overhead dominates step time).**
  options:
  - The model is too large, causing PCIe bus saturation as data is swapped to system RAM.
  - The All-Reduce collective operation is saturating the inter-node InfiniBand network.
  - The training workload is compute-bound, and we have hit maximum TFLOPS.
  - NVLink bandwidth is insufficient for the amount of intra-node gradient sharing required.
  correct_index: 1
