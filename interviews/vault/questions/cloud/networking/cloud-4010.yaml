title: PFC Deadlock in Lossless Ethernet Fabrics
scenario: A cluster running RoCE v2 over a Clos network with Priority Flow Control (PFC) enabled experiences a full fabric stall during a large-scale training job. Monitoring shows PFC pause frames propagating backward from ToR switches all the way to the spine. The job hangs for 30+ seconds before partial recovery.
question: How does PFC deadlock form in this Clos network, and how would you prevent full-fabric stalls?
details:
  realistic_solution: 'PFC deadlock occurs when buffers form a circular wait: a ToR pauses an upstream leaf or spine for one lossless class, that switch pauses another downstream path for the same class, and the cycle eventually leaves no output able to drain. In a Clos this is most likely when uphill and downhill RoCE traffic share one PFC priority class across multiple equal-cost paths. Prevent full-fabric stalls by separating traffic directions or service classes into distinct lossless classes where supported, keeping ECN/DCQCN active before PFC, enabling PFC watchdog recovery, validating DCBX/PFC settings consistently, and limiting PFC to the minimum traffic class rather than treating the whole fabric as lossless.'
  common_mistake: |
    **The Pitfall:** Assuming PFC simply slows traffic like TCP backpressure.
    **The Rationale:** Misunderstanding that PFC can create circular buffer dependencies when pause frames propagate across tiers.
    **The Consequence:** Full fabric stalls that freeze training jobs, wasting massive compute resources.
  napkin_math: |
    **Assumptions & Constraints:**
    - PFC pause quanta = 65535 at 400Gbps.
    - 1 quantum = 512 bit times = 1.28 ns.
    - ~500ns delay per hop, 3 tiers.

    **Calculations:**
    - Max pause per frame: 65535 * 1.28 ns = 83.88 µs.
    - Switch propagation delay: 3 hops * 500 ns = 1.5 µs.

    **Conclusion & Interpretation:**
    - **Result: Each maximum pause frame can suppress transmission for ~83.9 µs, while propagation adds only ~1.5 µs per 3-hop pass. A full-fabric stall is caused by the persistent circular wait, not a single ~5 µs propagation event (Network-Congestion-Bound).**
