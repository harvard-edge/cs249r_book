title: LLM Inference Load Balancing on TPU Fleet
scenario: You are tasked with designing a robust and efficient serving system for large language model (LLM) inference on a fleet of TPU accelerators. The system must handle a sustained inference request rate of 50,000 queries per second (QPS) with an average inference latency target of 100ms.
question: How would you route and load-balance 50,000 QPS across TPU inference servers to hit 100 ms latency during updates and failures?
details:
  realistic_solution: Use a latency-aware, load-based routing policy rather than static round-robin. Global ingress should send traffic to healthy regional pools with spare SLO headroom; inside a region, route each request to the TPU shard or replica with the lowest predicted finish time, using queue depth, active batch slots, observed prefill/decode latency, HBM pressure, model version, and health state as inputs. Keep separate admission limits for prefill and decode because long prompts and short decode steps consume different resources. During updates, drain old-version replicas, shift traffic gradually with canary weights, and keep enough spare capacity for rollback. During failures, remove unhealthy TPUs from the picker immediately and spill to the next regional pool only when local queues would exceed the 100ms target.
  common_mistake: |
    **The Pitfall:** Employing static load balancing without hardware awareness.
    **The Rationale:** Engineers apply standard web server load balancing techniques, ignoring the massive compute vs memory bottleneck ratio of TPUs.
    **The Consequence:** This leads to suboptimal batching, inefficient model partitioning, and "hot" TPUs that miss latency SLAs despite low average utilization.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target is 50,000 QPS with 100ms latency.
    - Average request service time at the chosen prompt/output mix must fit under the 100ms SLO including queueing.
    - Little's Law gives the allowed in-flight work and exposes how much headroom the router needs.
    - Per-TPU service rate must be measured separately for prefill and decode at the production batch mix.

    **Calculations:**
    - Fleet concurrency allowed by the latency target is 50,000 requests/s * 0.100 s = 5,000 in-flight requests at the p50 service mix; tail headroom must be lower than this.
    - If load tests show one TPU replica can complete 80 requests/s at P99 <= 80ms with batching, serving 50,000 QPS needs ceil(50,000 / 80) = 625 active replicas.
    - Reserve 20% capacity for updates, failures, and tail spikes: 625 / 0.80 = 782 replicas, rounded up by placement constraints.
    - The router should stop admitting to a replica when predicted wait plus service time approaches 100ms, then spill to lower-loaded replicas or another region.

    **Conclusion & Interpretation:**
    - **Result: use latency-aware weighted least-queue routing with health-based spillover.** Fleet sizing and weights should come from measured prefill/decode service curves and 100ms queueing headroom, not a single HBM-bandwidth token estimate.
