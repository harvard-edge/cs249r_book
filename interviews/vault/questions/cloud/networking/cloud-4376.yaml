title: MI300X AllReduce Performance in 8-GPU Data Parallel Training vs H100
scenario: An 8-GPU MI300X server has an effective 128 GB/s unidirectional xGMI ring link. An 8-GPU H100 SXM5 server has an effective 450 GB/s unidirectional NVLink ring path. Data parallel training of a 7B model transfers 28GB of FP32 gradients per backward pass.
question: For a 28GB gradient AllReduce on 8 GPUs, what ring-AllReduce time do MI300X xGMI and H100 NVLink achieve?
details:
  realistic_solution: Ring AllReduce time is set by the per-GPU send/receive volume over the ring path, not by summing all fabric links. For N=8 and a 28GB gradient, each GPU sends and receives 2 * (N-1) / N * 28GB = 49GB over the operation. Using the stated effective unidirectional ring bandwidths, H100 takes 49GB / 450GB/s = 109ms, while MI300X takes 49GB / 128GB/s = 383ms. H100 is therefore about 3.5x faster for this ring AllReduce under the stated bandwidth assumptions.
  common_mistake: |
    **The Pitfall:** Using total aggregate fabric bandwidth instead of per-GPU link bandwidth for ring AllReduce calculations.
    **The Rationale:** Candidates forget that in a ring topology, each GPU only uses one send and one receive link to its immediate neighbors.
    **The Consequence:** Vastly underestimating communication overhead and misjudging the necessity of gradient compression.
  napkin_math: |
    **Assumptions & Constraints:**
    - 28GB gradient tensor, 8 GPUs.
    - Ring AllReduce per-GPU transfer volume is 2 * (N-1) / N of the tensor.
    - Effective unidirectional ring bandwidth: H100 450 GB/s, MI300X 128 GB/s.

    **Calculations:**
    - Per-GPU transfer volume: 2 * (8-1) / 8 * 28 GB = 49 GB.
    - H100 time: 49 GB / 450 GB/s = 0.109s = 109ms.
    - MI300X time: 49 GB / 128 GB/s = 0.383s = 383ms.
    - Relative time: 383 / 109 = 3.5x slower on MI300X under these assumptions.

    **Conclusion & Interpretation:**
    - **Result: Network-bound.** H100 NVLink is about 3.5x faster than the stated MI300X xGMI ring path for this 28GB AllReduce.
