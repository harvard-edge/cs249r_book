title: Diagnosing Multi-GPU Pipeline Stalls
scenario: You are training a 30B parameter LLM using 8 GPUs on a single node. You observe severe GPU underutilization (SM active < 30%) despite the internal interconnect providing 600 GB/s of intra-node bandwidth. The profiler shows the pipeline is blocked waiting for data. The dataset is streamed from remote object storage over a 100 Gbps Ethernet connection, preprocessed on CPUs, and sent to GPUs via PCIe Gen4 x16.
question: What bandwidth bottleneck is starving the GPUs despite 600 GB/s internal bandwidth, and how do you quantify it?
details:
  realistic_solution: 'Analyze the bandwidth hierarchy from the outside in. The 100 Gbps network provides a maximum of 12.5 GB/s. Even though PCIe Gen4 x16 supports ~32 GB/s and NVLink provides 600 GB/s, the absolute hard limit for training throughput is dictated by the narrowest part of the taper: the 12.5 GB/s network link.'
  common_mistake: |
    **The Pitfall:** Focusing solely on the high intra-GPU bandwidth and ignoring the data ingestion path.
    **The Rationale:** Engineers purchase expensive NVLink nodes and assume the high listed specs guarantee throughput, treating data loading as an afterthought.
    **The Consequence:** The system experiences massive I/O starvation. The GPUs spend most of their time idle waiting for remote objects to slowly trickle in over the network.
  napkin_math: |
    **Assumptions & Constraints:**
    - Network: 100 Gbps Ethernet.
    - PCIe Gen4 x16: ~32 GB/s.
    - NVLink: 600 GB/s.
    - HBM: ~2000 GB/s.

    **Calculations:**
    - Network Limit: 100 Gbps / 8 bits/byte = 12.5 GB/s.
    - Taper: 2000 -> 600 -> 32 -> 12.5 GB/s.

    **Conclusion & Interpretation:**
    - **Result: 12.5 GB/s (Network-Bound)**. The 12.5 GB/s network link completely starves data ingestion.
