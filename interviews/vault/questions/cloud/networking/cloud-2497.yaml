title: NB-IoT OTA Updates for 150KB INT8 TFLite Micro Models
scenario: You manage 50,000 remote pipeline anomaly sensors connected via NB-IoT (100 kbps, 500mW Tx/Rx power). The battery is 5000mAh (3V) and must last 5 years. The cloud needs to push weekly updates to the 150KB INT8 TFLite Micro model. Pushing full models over NB-IoT violates the battery life constraints.
question: How would you update the 150KB INT8 model weekly over NB-IoT without violating the 5-year battery-life constraint?
details:
  realistic_solution: |
    The cloud architecture should use a robust, versioned OTA model-update protocol, not arbitrary in-place weight edits. If the device supports patching the exact deployed TFLite Micro image, the cloud sends a compressed binary delta in small chunks with a manifest, model version, hash/signature, and resume tokens. The device verifies each chunk, applies the patch into a staging area or inactive model slot, then atomically switches the active model only after the full image hash passes; otherwise it rolls back to the previous model. If the model format or flash layout cannot support safe patching, the cloud must fall back to a compressed full image and reduce update frequency or select only devices with enough battery margin.
  common_mistake: |
    **The Pitfall:** Sending the full 150KB model file directly to the device and relying on standard TCP retries.

    **The Rationale:** It's easy to treat ML model updates like standard software patches, ignoring the extreme energy constraints of NB-IoT edge devices.

    **The Consequence:** The continuous long-duration radio transmission rapidly depletes the device battery, leading to a fleet-wide battery failure long before the 5-year target.
  napkin_math: |
    **Assumptions & Constraints:**
    - Battery Budget: 5000mAh * 3V = 15,000 mWh = 54,000 Joules.
    - 5 years ~= 260 weekly updates.
    - Average whole-device budget: 54,000 J / 260 weeks = 207.7 J/week, before reserving energy for sensing and normal operation.
    - Transmission power: 0.5W. NB-IoT speed: 100 kbps.
    - Budget 2x protocol/retry overhead for NB-IoT receive/transmit, acknowledgments, and retransmissions.

    **Calculations:**
    - Full Model OTA: 150 KB = 1,228,800 bits / 100,000 bps = 12.3 seconds.
    - Full Model Energy with 2x overhead: 12.3s * 0.5W * 2 = 12.3 Joules/week.
    - Five-year full-model update energy: 12.3 J * 260 = 3,198 J, about 5.9% of the battery before sensing.
    - Delta OTA: 5 KB = 40,960 bits / 100,000 bps = 0.4 seconds.
    - Delta Energy with 2x overhead: 0.4s * 0.5W * 2 = 0.4 Joules/week.
    - Five-year delta update energy: 0.4 J * 260 = 104 J, about 0.2% of the battery.

    **Conclusion & Interpretation:**
    - **Result: Chunked verified delta OTA is the energy-safe design when patching is supported.** It cuts weekly update energy from about 12.3 J to about 0.4 J including overhead, while versioning, integrity checks, and atomic swap/rollback keep interrupted NB-IoT transfers from corrupting the deployed model.
