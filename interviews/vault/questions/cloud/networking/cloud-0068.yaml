title: The On-Node Interconnect Ladder
scenario: 'When analyzing a performance trace on a modern multi-GPU server using nsys profiling, you notice two distinct latency buckets for data transfers between components: one taking approximately 500 nanoseconds and another taking approximately 1,000 nanoseconds (1 microsecond).'
question: 'Which interconnects most likely correspond to these two latencies?'
details:
  realistic_solution: 'The ~500 ns latency corresponds to an NVLink 4.0 transfer, which is the specialized, high-bandwidth, low-latency fabric for direct GPU-to-GPU communication. The ~1,000 ns latency corresponds to a transfer over the PCIe Gen5 bus, connecting GPUs to CPUs or peripherals. This 2x latency penalty is critical for topology design.'
  common_mistake: |
    **The Pitfall:** Assuming all on-server interconnects have equivalent latency or that PCIe is fundamentally faster for GPU transfers.
    **The Rationale:** Confusing general-purpose peripheral buses (PCIe) with specialized, dedicated GPU-to-GPU fabric (NVLink).
    **The Consequence:** Designing sub-optimal tensor parallel topologies that unnecessarily cross the PCIe bus, destroying model performance.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Hardware: Modern multi-GPU server (e.g., NVIDIA HGX).
       - Latencies observed: 500 ns and 1,000 ns.
    2. **Calculations:**
       - NVLink 4.0 (GPU-to-GPU): ~500 ns.
       - PCIe Gen5 (GPU-to-CPU): ~1,000 ns.
    3. **Conclusion & Interpretation:**
       - **Result: Latency-Bound Interconnect. PCIe incurs a ~2x latency penalty over NVLink, dictating strict topology-aware placement.**
  options:
  - The ~500ns transfer is via L2 Cache (calculating ~1.5ns); the ~1,000ns transfer is via NVLink 4.0.
  - The ~500ns transfer is via NVMe SSD read (calculating ~10,000ns); the ~1,000ns transfer is via PCIe Gen5.
  - The ~500ns transfer is via NVLink 4.0; the ~1,000ns transfer is via PCIe Gen5.
  - The ~500ns transfer is via InfiniBand NDR (calculating ~2,000ns); the ~1,000ns transfer is via NVLink 4.0.
