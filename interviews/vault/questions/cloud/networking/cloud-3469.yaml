title: Designing a High-Throughput Inference Load Balancer for NVIDIA A100 Clusters
scenario: You are designing the load balancing system for a multi-datacenter ML inference service running on clusters. Inference requests vary significantly in complexity, leading to fluctuating processing times per model. The system must efficiently distribute traffic, minimize latency, and maximize GPU utilization.
question: How would you design request routing for this service considering consistent hashing, weighted round-robin, and dynamic traffic management to meet a strict P99 latency target?
details:
  realistic_solution: Use request-aware routing as the primary policy, with consistent hashing and weighted round-robin only as supporting mechanisms. Consistent hashing is useful for sticky state such as cached prefixes, tenant affinity, or model-shard locality, but it should not pin all traffic when request cost varies because it can create hot shards. Weighted round-robin can provide a baseline distribution, but its weights must be adjusted continuously from live signals such as queue depth, active batch slots, recent P99 service time by request class, HBM pressure, and error rate. For a strict P99 target, route new requests with least-outstanding or shortest-expected-delay scoring inside the eligible shard set, then reduce or zero the weight of replicas whose predicted wait plus service time would exceed the latency budget. The control plane should keep per-class latency estimates, drain unhealthy replicas, and preserve enough locality to avoid cache churn without sacrificing tail-latency
    protection.
  common_mistake: |
    **The Pitfall:** Implementing a simple round-robin or least-connection strategy.
    **The Rationale:** These are standard L4/L7 load balancing strategies that candidates default to without considering ML workload heterogeneity.
    **The Consequence:** This leads to hot-spotting, imbalanced GPU utilization, and increased tail latencies, as a slow-processing request blocks subsequent requests on the same GPU.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target P99 latency is L ms.
    - Estimated P99 service time for a request class is S99 ms.
    - A GPU has q outstanding requests for the same class.
    - Arrival rate and service-time variance are monitored continuously.

    **Calculations:**
    - Rough upper-bound waiting time for a new request is q * S99 when service is serialized for that class.
    - Route to a GPU only when q * S99 + S99 leaves headroom under L.
    - If observed arrival rate pushes a shard near saturation, lower its routing weight before average utilization reaches 100%, because P99 queueing grows nonlinearly with utilization.

    **Conclusion & Interpretation:**
    - **Result: Latency-Bound Queuing.** Use least-outstanding-requests with per-class service-time percentiles and live queue-depth signals; do not route from GPU memory bandwidth alone.
