title: Optimizing Inference Routing for High-Throughput TPU v5e Farms
scenario: You manage an inference service on a fleet of TPU v5e accelerators. The service handles millions of diverse inference requests per second. Currently, request routing uses a simple round-robin approach. You are observing inconsistent latency and underutilized TPUs, especially when traffic patterns change rapidly.
question: How would you replace round-robin with adaptive routing for TPU v5e inference to improve utilization and latency under fluctuating load?
details:
  realistic_solution: Replace round-robin with queue-aware weighted routing driven by live TPU v5e serving metrics. Each replica should publish queue depth, oldest queued request age, recent P50/P99 latency by request class, active batch slots, HBM/KV-cache headroom, accelerator utilization, and health/error state. The router should estimate the added wait plus service time for each compatible TPU and send the request to the lowest predicted-delay target, reducing or zeroing weights for replicas whose queues or latency trend would violate the SLO. Use per-class queues and QoS admission controls so latency-sensitive traffic is not trapped behind heavy requests. Consistent hashing should be used only when there is a measured locality requirement, such as prefix-cache affinity; otherwise it should yield to queue and latency signals so the system reacts quickly to traffic shifts.
  common_mistake: |
    **The Pitfall:** Applying a naive load balancing strategy like round-robin to heterogeneous ML inference workloads.
    **The Rationale:** Round-robin works well for standard microservices, so infrastructure engineers reuse it for ML endpoints, ignoring that inference requests have vastly different compute and memory requirements.
    **The Consequence:** This leads to severe hot-spotting, where some accelerators are crushed by a sequence of heavy requests while others sit idle, drastically reducing overall cluster throughput.
  napkin_math: |
    **Assumptions & Constraints:**
    - Request class A has P99 service time of 20ms.
    - Request class B has P99 service time of 80ms.
    - Each TPU should keep predicted queued work below 100ms to protect tail latency.

    **Calculations:**
    - A TPU with 4 queued class A requests has about 4 * 20ms = 80ms of P99 queued work.
    - A TPU with 2 queued class B requests has about 2 * 80ms = 160ms of P99 queued work.
    - Adaptive routing should prefer the first TPU for new compatible traffic even if round-robin would choose the second.

    **Conclusion & Interpretation:**
    - **Result: Queue-Aware Routing.** Use per-class latency estimates, queue depth, health, and HBM residency signals to route away from TPUs whose predicted queued work would exceed the latency budget.
