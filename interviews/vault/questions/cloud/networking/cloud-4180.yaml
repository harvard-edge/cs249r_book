title: Network Topology Impact on Checkpoint I/O
scenario: Your 256-GPU H100 cluster checkpoints a 175B model every 1000 steps. Each GPU writes 5.5 GB (model shard + optimizer states) to a shared NFS server connected via 2× 100 GbE links.
question: What is the checkpoint write time to the 2×100 GbE NFS server, and what topology-aware checkpointing strategy reduces stalls?
details:
  realistic_solution: 'Naive direct-to-NFS checkpointing writes 256 × 5.5 GB = 1,408 GB through a 2×100 GbE server, or about 25 GB/s aggregate before overhead. The bandwidth-only write time is 1,408 / 25 = 56.3s, so the shared NFS server creates a large synchronized stall. The topology-aware strategy should separate the training stall from the archival flush: each 8-GPU node stages its 44 GB checkpoint shard to node-local NVMe, all 32 nodes do that in parallel, and a background process flushes the 1,408 GB to NFS asynchronously. With 3.5 GB/s local NVMe per node, the foreground durable local stage is 44 / 3.5 = 12.6s; the NFS flush still takes at least 56.3s, but it is off the critical training path if the next checkpoint interval has enough slack.'
  common_mistake: |
    **The Pitfall:** Assuming the NFS server can handle 256 concurrent writes at wire speed.
    **The Rationale:** Engineers often ignore networking fan-in ratios and assume a shared storage appliance behaves like dedicated local disk.
    **The Consequence:** The NFS server's 25 GB/s bandwidth is instantly overwhelmed, causing a nearly minute-long stall that cripples training utilization.
  napkin_math: |
    **Assumptions & Constraints:**
    - 256 GPUs, 5.5 GB each.
    - NFS direct: 25 GB/s aggregate from 2×100 GbE.
    - Local NVMe: 3.5 GB/s per node.
    - 8 GPUs per node, so 32 nodes total.
    **Calculations:**
    - Total checkpoint data: 256 * 5.5 GB = 1,408 GB.
    - Naive direct NFS write time: 1,408 GB / 25 GB/s = 56.3s bandwidth lower bound.
    - Per-node staged checkpoint: 8 * 5.5 GB = 44 GB.
    - Foreground local NVMe stage: 44 GB / 3.5 GB/s = 12.6s per node, with 32 nodes writing in parallel.
    - Background NFS flush: 1,408 GB / 25 GB/s = 56.3s lower bound, overlapped with training.
    **Conclusion & Interpretation:**
    - **Direct NFS checkpointing stalls for at least 56.3s.** Local NVMe staging reduces the foreground stall to about 12.6s, while the slower NFS write is moved off the critical path.
