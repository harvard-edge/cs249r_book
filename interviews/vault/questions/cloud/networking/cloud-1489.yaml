title: Applying the Law of Distributed Efficiency
scenario: A cluster trains a model taking 50ms compute and 80ms communication (4GB gradients on 100 GB/s fabric). Upgrading to faster GPUs halves compute to 25ms.
question: What is the Ring All-Reduce communication time, and how does halving compute time affect the communication-to-computation ratio and speedup?
details:
  realistic_solution: 'Calculate Ring AllReduce volume: ~2 * 4GB = 8GB. Communication time = 8GB / 100 GB/s = 80ms. Before the upgrade, total step = 50ms (compute) + 80ms (comm) = 130ms, with comm/compute ratio of 1.6. After the upgrade, total step = 25ms + 80ms = 105ms, with comm/compute ratio of 3.2. The 2x compute upgrade yields only 24% overall speedup (130/105) because the network is the dominant bottleneck. Upgrading the network to 200 GB/s would cut comm to 40ms, making total step = 65ms (2x improvement).'
  common_mistake: |
    **The Pitfall:** Assuming hardware upgrades linearly translate to end-to-end performance gains.
    **The Rationale:** Engineers frequently fixate on GPU TFLOPS without modeling the communication phases.
    **The Consequence:** Spending heavily on faster compute while ignoring the fixed network communication overhead, resulting in a severely diminished return on investment (Amdahl's Law).
  napkin_math: |
    **Assumptions & Constraints:**
    - Ring AllReduce volume ≈ 2 × 4GB = 8GB.
    - Network fabric: 100 GB/s.

    **Calculations:**
    - Comm Time = 8GB / 100 GB/s = 80ms.
    - Old Step = 50ms + 80ms = 130ms (Comm/Comp = 1.6).
    - New Step = 25ms + 80ms = 105ms (Comm/Comp = 3.2).
    - Speedup = 130 / 105 = 1.24x (24%).

    **Conclusion & Interpretation:**
    - **Result: Network-Bound.** A 2x compute upgrade yields only 24% overall speedup because efficiency is strictly bounded by Amdahl's Law on the network.
