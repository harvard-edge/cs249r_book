title: Evaluating Rail-Optimized Topologies for Cross-Node TP
scenario: 'You are architecting a cluster of 1,024 GPUs (128 nodes, 8 GPUs each) to train a large-scale LLM. The memory requirements force you to use a Tensor Parallelism (TP) degree of 16, which means TP groups must span across two nodes. You are evaluating two backend network designs: a standard leaf-spine where all 8 NICs on a node connect to a single top-of-rack (ToR) switch, and a rail-optimized topology where NIC i of every node connects to a dedicated switch i.'
question: "For TP=16 spanning two nodes, how do standard leaf-spine and rail-optimized topologies affect cross-node TP AllReduce performance?"
details:
  realistic_solution: Choose the rail-optimized topology. Because cross-node TP AllReduce patterns are symmetric (GPU i on Node A communicates directly with GPU i on Node B), connecting all NIC 0s to Switch 0 creates 8 independent, parallel network planes. This physical isolation eliminates ECMP collisions and in-switch contention, guaranteeing predictable, minimum-latency 400Gbps line rate for the latency-sensitive TP collective.
  common_mistake: |
    **The Pitfall:** Relying solely on aggregate bisection bandwidth to evaluate network topologies for collective operations.
    **The Rationale:** Assuming that non-blocking standard fat-trees distribute traffic perfectly without considering hash collisions and microbursts.
    **The Consequence:** 30-50% congestion degradation due to ECMP collisions during highly synchronized TP operations, severely bottlenecking the training loop.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - TP degree: 16 (spans 2 nodes).
       - Data movement: 2GB cross-node AllReduce moves ~4GB per GPU.
       - Target line rate: 400Gbps (~50GB/s payload).
    2. **Calculations:**
       - Rail-Optimized Time = 4GB / 50GB/s = 80ms latency.
       - Standard ToR Effective Bandwidth = ~25GB/s (due to ECMP congestion).
       - Standard ToR Time = 4GB / 25GB/s = 160ms latency.
    3. **Conclusion & Interpretation:**
       - **Result: Rail-Optimized Topology (Latency-Bound).** Rail-optimized topologies isolate flows and eliminate ECMP collisions, halving cross-node TP latency.
