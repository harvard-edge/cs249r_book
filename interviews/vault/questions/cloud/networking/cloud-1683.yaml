title: Evaluating PAM4 Transceivers for 800G AI Fabrics
scenario: You are architecting the backend network fabric for a new 16,384-GPU training cluster. To achieve 800 Gbps per port, vendors propose using 100G PAM4 over 8 lanes instead of wider, slower NRZ links.
question: Should you adopt 100G PAM4 over 8 lanes for 800G ports, and what trade-offs must you budget for?
details:
  realistic_solution: Adopt 100G PAM4 over 8 lanes if the port-density and cabling goals require 800G within the available form factor, but budget it as a signal-integrity and implementation-risk trade-off. PAM4 has tighter eye margins than NRZ and usually needs stronger equalization, DSP, and FEC. The added power and latency are vendor- and link-design-dependent, so validate module power, FEC mode, BER target, and measured hop latency against the NCCL collective budget before committing.
  common_mistake: |
    **The Pitfall:** Assuming PAM4 doubles bandwidth for "free".
    **The Rationale:** 4-level signaling mathematically carries twice the bits per baud, sounding like a perfect upgrade.
    **The Consequence:** Failing to account for the severe ~9.5dB SNR penalty, which necessitates power-hungry DSPs and latency-inducing Forward Error Correction (FEC) that degrades collective communication performance.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target port rate: 800 Gbps.
    - Candidate link: 8 lanes at 100 Gbps/lane using PAM4.
    - Alternative NRZ design would need more lanes or a lower per-lane rate for the same aggregate bandwidth.

    **Calculations:**
    - Aggregate bandwidth: 8 lanes * 100 Gbps/lane = 800 Gbps.
    - PAM4 carries 2 bits/symbol, which improves bandwidth density versus NRZ at the same symbol rate.
    - The trade-off is reduced eye margin and tighter BER requirements, so equalization, DSP, and FEC are typically needed; exact latency and power must come from the selected module and switch ASIC data.

    **Conclusion & Interpretation:**
    - **Result: bandwidth-density gain with signal-integrity cost.** PAM4 is reasonable for 800G ports, but the release plan should reserve power and latency margin based on measured vendor characteristics rather than assuming a fixed FEC delay or module wattage.
