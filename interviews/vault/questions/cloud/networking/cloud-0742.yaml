title: The Congested Highway
scenario: 'You manage a large, multi-tenant GPU cluster. Users complain about unpredictable training times: sometimes jobs finish quickly, other times they take much longer, even when the cluster appears to have available GPU capacity.'
question: You suspect network congestion, but how do you verify this and implement a system-level solution to ensure more predictable network performance for critical ML workloads?
details:
  realistic_solution: 'Verify congestion with network evidence, not GPU availability: collect per-link utilization at short intervals, queue depth, ECN/PFC counters, drops, retransmits, NCCL timing, flow telemetry, and p95/p99 collective latency by tenant and rack. Correlate slow jobs with hot uplinks or shared tenants. The system-level fix is to make network demand schedulable: isolate critical jobs with placement policies, reserve or cap bandwidth with QoS classes, use traffic shaping for noisy tenants, avoid oversubscribed paths for large collectives, and monitor congestion counters as SLO signals.'
  common_mistake: |
    **The Pitfall:** Recommending a blanket upgrade to all network hardware.
    **The Rationale:** It's the most straightforward brute-force solution to perceived capacity limits.
    **The Consequence:** It's excessively expensive and doesn't solve the core issue of dynamic resource contention without intelligent QoS management.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - A critical training job shares a 400 Gbps uplink with other tenants.
       - Telemetry shows 50-60% average utilization during both fast and slow runs.
       - During slow runs, the same uplink shows queue buildup, ECN/PFC events, or retransmits aligned with NCCL latency spikes.
    2. **Calculations:**
       - Average utilization alone: 240 Gbps / 400 Gbps = 60%, which does not prove congestion.
       - Congestion signal: p99 queue occupancy, pause/ECN events, or retransmits increase during the slow intervals while collective latency increases.
       - Mitigation target: reserve or shape traffic so the critical job's expected bandwidth plus headroom fits below the congested path capacity.
    3. **Conclusion & Interpretation:**
       - **Result: Congestion must be verified from tail counters and flow telemetry, not average utilization.** Once verified, QoS, placement isolation, and traffic shaping make the shared fabric more predictable.
