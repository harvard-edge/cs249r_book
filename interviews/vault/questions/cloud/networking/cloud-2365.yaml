title: Fat-Tree Oversubscription Tradeoff
scenario: You are designing a 16,384 GPU cluster using 400 Gbps RoCEv2. A fully non-blocking (1:1) 3-tier fat-tree requires 768 spine switches. A 2:1 oversubscribed fat-tree reduces spine switch count by 50%, saving $15M. However, your workloads heavily rely on Ring All-Reduce for 2 GB gradient synchronizations.
question: Should you accept the $15M savings from a 2:1 oversubscribed 400Gbps fat-tree, and what is the expected All-Reduce latency penalty?
details:
  realistic_solution: |
    A 2:1 oversubscribed tier halves the effective inter-pod bandwidth available to traffic that must cross that tier. For a 400Gbps path, the non-oversubscribed case provides about 50 GB/s, while the oversubscribed case provides about 25 GB/s under full load. A 2 GB gradient synchronization therefore takes 80 ms instead of 40 ms when that synchronization is limited by the oversubscribed tier, for a 40 ms penalty per such inter-pod transfer. The $15M savings are attractive only if the training stack can tolerate that conditional penalty, for example because most reduction traffic stays local or the inter-pod phase is not on the critical path. The decision should be based on measured or modeled cross-tier All-Reduce traffic, not on an assumption that ring placement always avoids the bottleneck.
  common_mistake: |
    **The Pitfall:** Assuming 2:1 oversubscription doubles the All-Reduce latency globally, linearly increasing training time.
    **The Rationale:** Engineers mistakenly believe All-Reduce utilizes full bisection bandwidth across the entire cluster simultaneously, missing that it can be scheduled hierarchically.
    **The Consequence:** Companies needlessly spend tens of millions of dollars over-provisioning network spines for a marginal performance gain.
  napkin_math: |
    **Assumptions & Constraints:**
    - **Bandwidth per link (400 Gbps):** 50 GB/s.
    **Calculations:**
    - **1:1 Topology Time:** 2 GB / 50 GB/s = 40 ms per transfer.
    - **2:1 Oversubscribed Time:** Bandwidth halves to 25 GB/s. 2 GB / 25 GB/s = 80 ms per transfer.
    - **Latency Penalty:** 80 ms - 40 ms = 40 ms per inter-pod 2 GB transfer that is limited by the oversubscribed tier.
    - **Conditional Run Penalty:** If every one of 100,000 training steps has exactly one such critical-path transfer, 40 ms * 100,000 = 4,000 s (~1.1 hours).
    **Conclusion & Interpretation:**
    - **Conclusion: The bandwidth penalty is 40 ms per affected 2 GB inter-pod sync; the 1.1-hour run penalty applies only under the explicit one-critical-sync-per-step assumption.**
