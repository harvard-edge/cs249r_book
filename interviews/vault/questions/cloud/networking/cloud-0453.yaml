title: The Single-Node Slowdown
scenario: 'You are training a 7B parameter model (FP16) on a single server with eight H100 GPUs using a simple DataParallel strategy. You notice that GPU utilization is poor, and profiling shows that a 14 GB data transfer between GPUs is taking approximately 220 milliseconds at every training step.'
question: 'Why is the 14GB inter-GPU transfer taking about 220ms on the 8-H100 DataParallel server?'
details:
  realistic_solution: |
    The most likely bottleneck is the communication bus between the GPUs. A ~220ms transfer time for 14GB of data corresponds to a bandwidth of roughly 63 GB/s. This is characteristic of PCIe Gen5, not the 900 GB/s provided by NVLink. The server is likely a ganged configuration where GPUs are connected to the CPU via PCIe, but do not have a direct, high-speed NVLink bridge between them.
  common_mistake: |
    **The Pitfall:** Blaming the CPU for data loading or assuming the model is too large.
    **The Rationale:** Candidates do not differentiate between the bandwidth of the main PCIe bus and high-speed GPU-to-GPU interconnects like NVLink.
    **The Consequence:** Failing to identify the hardware topology mismatch, leading to futile software optimizations.
  napkin_math: |
    **Assumptions & Constraints:**
    - 7B params * 2 bytes/param = 14 GB transfer.
    - Transfer takes ~220ms.

    **Calculations:**
    - Effective bandwidth: 14 GB / 0.220 s = 63.6 GB/s.
    - PCIe Gen5 x16 peak unidirectional bandwidth is ~64 GB/s.

    **Conclusion & Interpretation:**
    - **Result: The ~220ms latency confirms the transfer is happening over the slower PCIe bus instead of NVLink (~15ms). (Bandwidth-Bound Topology)**. Without an NVLink bridge, multi-GPU scaling is strictly constrained by PCIe limits.
  options:
  - 'The CPU is bottlenecked on data preprocessing, starving the GPUs.'
  - 'The InfiniBand network connection to other nodes is saturated.'
  - 'The server lacks a direct NVLink bridge, forcing GPU communication over the slower PCIe bus.'
  - 'The H100 HBM3 memory bandwidth is insufficient for the model size.'
