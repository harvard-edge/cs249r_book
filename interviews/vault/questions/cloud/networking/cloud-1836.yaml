title: Diagnosing SMPC Latency Collapse
scenario: Three financial institutions are collaboratively running inference on an anti-money laundering model using a 50-layer deep neural network. They deploy a 3-party SPDZ-based Secure Multiparty Computation (SMPC) protocol across three distributed cloud regions. The average ping latency between regions is 100ms. While plaintext inference achieves 100 queries/second, SMPC throughput has collapsed to 0.2 queries/second. CPU utilization on all nodes is below 5%, and network bandwidth is only at 10%.
question: "Why has SMPC throughput fallen to 0.2 QPS with low CPU and bandwidth usage, and should you upgrade to AES-NI instances?"
details:
  realistic_solution: Diagnose that the bottleneck is strictly latency-bound due to the communication rounds required for non-linear operations (like ReLU) in SMPC. The solution is to co-locate the nodes in closer geographic proximity to reduce ping, or replace ReLUs with polynomial approximations to reduce communication rounds.
  common_mistake: |
    **The Pitfall:** Misdiagnosing the bottleneck as CPU-bound cryptographic overhead.
    **The Rationale:** Engineers see 'secure computation' and immediately assume encryption operations are exhausting the CPU.
    **The Consequence:** Teams waste budget upgrading to compute-optimized instances (AES-NI) that do absolutely nothing to improve network latency constraints.
  napkin_math: |
    **Assumptions & Constraints:**
    - 50 layers, 1 round-trip/layer, 100ms ping latency.

    **Calculations:**
    - 50 layers * 1 round/layer * 100ms ping = 5000ms (5 seconds) latency per sequential step.
    - Max Throughput: 1 inference / 5s = 0.2 QPS.

    **Conclusion & Interpretation:**
    - **Result: Latency-Bound.** The bottleneck is strictly ping latency; CPU and bandwidth are irrelevant.
