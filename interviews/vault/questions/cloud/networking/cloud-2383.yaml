title: Edge-Cloud Traffic Camera Bandwidth Optimization
scenario: 5,000 4G LTE intersection cameras. Cloud tracks vehicles globally across the city. 4G data costs $0.05/GB. 1080p @ 15fps video = 2 Mbps per camera. Total cost to stream all video is exorbitant. The camera has an edge NPU with 2MB SRAM.
question: How would you split perception and tracking between 5,000 LTE cameras with edge NPUs and the cloud to reduce data cost?
details:
  realistic_solution: |
    Split the pipeline so the edge camera performs the cheap, bandwidth-reducing work and the cloud keeps the global state. Run a tiny detector or motion-triggered vehicle proposal model on the 2MB-SRAM NPU, do short-term local association across nearby frames, and transmit compact events: timestamp, camera ID, bounding box, class, confidence, and a small appearance embedding only when a vehicle is observed or its track changes. The cloud performs cross-camera re-identification, global track stitching, routing, and any heavier model pass for ambiguous cases. This avoids streaming all video while not assuming the camera can run the full perception and citywide tracking stack locally.
  common_mistake: |
    **The Pitfall:** Downscaling video to 480p and streaming to the cloud.
    **The Rationale:** Attempting to solve the problem with traditional video compression rather than edge ML.
    **The Consequence:** Still costs thousands of dollars daily and degrades tracking accuracy.
  napkin_math: |
    **Assumptions & Constraints:**
    - Raw streaming: 1080p @ 15fps takes 2 Mbps = 0.25 MB/s = 21.6 GB/day per camera.
    - Edge metadata event: 128B embedding + 32B bbox/score/class + 40B timestamp/camera/track fields = 200B.
    - Average metadata rate after local association: 10 vehicle events/second per camera, not every vehicle in every frame.

    **Calculations:**
    - Total Raw Cost: For 5,000 cameras, 108,000 GB/day at $0.05/GB costs $5,400/day.
    - Edge metadata per camera: 10 events/s * 200B = 2,000 B/s = 0.002 MB/s.
    - Edge metadata per camera per day: 0.002 MB/s * 86,400s = 172.8 MB/day ≈ 0.173 GB/day.
    - Total metadata: 0.173 GB/day * 5,000 = 864 GB/day.
    - Total metadata cost: 864 GB/day * $0.05/GB = $43.20/day.

    **Conclusion & Interpretation:**
    - **Result: ~$5,357/day savings (Bandwidth-Bound)**. Edge detection plus local association reduces LTE traffic by sending compact track events instead of raw video, while the cloud still handles global re-identification and tracking.
