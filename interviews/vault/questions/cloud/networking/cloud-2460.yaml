title: The Hybrid Cascade Bandwidth Trap
scenario: A smart security system runs a tiny edge detector. If detected, it sends a 150KB frame to a cloud API for heavy compute. During a busy festival, end-to-end latency spikes from 300ms to 2500ms despite cloud auto-scaling adding plenty of GPU instances.
question: "Why does end-to-end latency spike above 2500ms during the festival despite cloud GPU autoscaling?"
details:
  realistic_solution: 'The bottleneck is edge network uplink bandwidth. When the generation rate exceeds capacity, frames queue in the edge device''s network buffer. The solution is algorithm-hardware co-design: the edge device should crop the face region, reducing the payload to ~5KB.'
  common_mistake: |
    **The Pitfall:** Blaming cloud-side GPU initialization or autoscaling lag.
    **The Rationale:** Engineers assume backend compute is the choke point in a distributed system.
    **The Consequence:** Over-provisioning expensive cloud GPUs while the system continues to fail due to edge network queueing.
  napkin_math: |
    **Assumptions & Constraints:**
    - Uplink 10 Mbps = 1.25 MB/s. Frame = 150 KB.

    **Calculations:**
    - Max capacity = 1.25 MB/s / 0.15 MB = 8.33 FPS.
    - Deficit at 10 FPS = 1.66 FPS.
    - Queue delay after 10s = 16.6 frames * 120ms = ~2000ms.

    **Conclusion & Interpretation:**
    - **Result: Edge network queueing dominates latency (Network-Bound)**. Crop payloads to avoid uplink saturation.
