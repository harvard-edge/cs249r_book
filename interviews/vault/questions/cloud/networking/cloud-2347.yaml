title: RoCEv2 Incast in 3D Parallelism
scenario: 'A 1024-GPU cluster uses an oversubscribed spine-leaf network with 400Gbps RoCEv2. During the pipeline flush phase of 3D parallel training, 64 GPUs simultaneously send 50 MB of activation data to a single target GPU (a classic incast pattern). Network tail latency spikes from 10us to >60ms, causing massive pipeline bubbles and dropping cluster utilization to 35%.'
question: What causes the >60ms tail-latency spikes when 64 GPUs send 50MB to one target, and how would you mitigate this RoCEv2 incast?
details:
  realistic_solution: |
    The architectural requirement is to handle microbursts and incast traffic inherent in many-to-one communication patterns. RoCEv2 is lossless and relies on Priority Flow Control (PFC). During incast, the ToR switch buffers overflow, triggering PFC pause frames that spread upstream through the network, causing severe Head-of-Line blocking (congestion spreading) that halts even unrelated traffic. The solution is to architect application-level traffic pacing, tune DCQCN (Data Center Quantized Congestion Notification) for faster rate reduction at the NIC level before PFC triggers, and ensure QoS classes isolate this collective traffic.
  common_mistake: |
    **The Pitfall:** Attempting to solve the issue by increasing TCP window size or adding more physical links to the spine.
    **The Rationale:** Failing to address the lossless, priority-flow-control (PFC) nature of RoCEv2 networks.
    **The Consequence:** The network continues to suffer from Head-of-Line blocking and congestion spreading.
  napkin_math: |
    **Assumptions & Constraints:**
    - 64 senders, 50 MB each.
    - Target port bandwidth = 400 Gbps = 50 GB/s.
    - Typical switch buffer = 32-64 MB.

    **Calculations:**
    - Incast volume = 64 * 50 MB = 3.2 GB.
    - Time to drain = 3.2 GB / 50 GB/s = 64 ms.
    - Buffer ratio = 3.2 GB / 64 MB = 50x over buffer capacity.

    **Conclusion & Interpretation:**
    - **Result: 3.2 GB incast triggers immediate PFC pause and 64ms queue delay (Network-Incast-Bound).**
