title: Diagnosing InfiniBand Scaling Bottlenecks
scenario: A distributed training team is scaling a MoE model across 64 GPUs using 400 Gbps InfiniBand (alpha = 1 μs, beta = 50 GB/s). Profiling reveals they are performing millions of 10 KB AllReduce operations per step, resulting in poor scaling efficiency. The infrastructure team proposes upgrading to 800 Gbps switches to alleviate the bottleneck.
question: Why are millions of 10KB AllReduce operations scaling poorly on 400Gbps InfiniBand, and is upgrading to 800Gbps the right fix?
details:
  realistic_solution: Analyze the bottleneck using the alpha-beta model to show the workload is latency-bound. The 10 KB payload is below the critical message size, so upgrading to 800 Gbps will barely improve step time. Instead, implement tensor fusion (bucketization) to batch the 10 KB tensors into a single payload larger than the critical message size, shifting the operation into the bandwidth-bound regime.
  common_mistake: |
    **The Pitfall:** Assuming that a high frequency of communication implies a bandwidth bottleneck.
    **The Rationale:** When a network feels slow, the default intuition is to add more raw bandwidth (throughput).
    **The Consequence:** Teams purchase expensive 800 Gbps upgrades without calculating the critical message threshold, completely failing to fix the actual latency-bound issue.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Latency (alpha) = 1 μs.
       - Bandwidth (beta) = 50 GB/s (400 Gbps).
       - Payload = 10 KB.
    2. **Calculations:**
       - Critical Message Size (Nc): alpha * Bandwidth = 1 μs * 50 GB/s = 50,000 bytes (50 KB).
       - Payload (10 KB) < Nc (50 KB) -> Latency-Bound.
       - Time per message: alpha + (Payload / Bandwidth) = 1.0 μs + (10 KB / 50 GB/s) = 1.0 μs + 0.2 μs = 1.2 μs.
       - Fixed latency contribution: 1.0 / 1.2 ≈ 83%.
    3. **Conclusion & Interpretation:**
       - **Result: Latency-Bound workload.** Upgrading bandwidth will barely improve performance; tensor fusion (bucketization) is required to exceed the 50 KB threshold.
