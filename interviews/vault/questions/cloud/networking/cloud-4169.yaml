title: Dragonfly Topology for Large-Scale Training
scenario: Your 4096-GPU training cluster needs a new network topology. Compare a full-bisection 64-port leaf-spine Clos with a 2-level dragonfly topology for training a 175B model with 3D parallelism (TP=8, PP=16, DP=32).
question: Which topology better matches the hierarchical communication pattern, and what is the cost difference in switch ports?
details:
  realistic_solution: 'Dragonfly better matches the hierarchy: TP=8 needs the highest bandwidth and should stay inside an NVLink/local island, PP=16 needs predictable medium-bandwidth paths within a pod, and DP=32 can use lower-bandwidth global links across pods. Using one coherent 64-port switch model, a full-bisection leaf-spine Clos with 32 GPU-facing ports and 32 uplinks per leaf needs 128 leaf switches plus 64 spine switches, or 192 switches and 12,288 switch ports. A dragonfly design with 32 DP groups and 4 64-port switches per group uses 128 switches and 8,192 switch ports, with global links carved out of those group switches rather than counted as separate switches. That is a 4,096-port reduction, about one-third fewer switch ports, while matching the communication pattern better than a uniform Clos.'
  common_mistake: |
    **The Pitfall:** Choosing fat-tree by default because it is well-understood.
    **The Rationale:** Failing to map the physical network topology to the logical hierarchical communication requirements of 3D parallelism.
    **The Consequence:** Significantly over-provisioning network switches and over-spending by millions of dollars for unneeded global bisection bandwidth.
  napkin_math: |
    **Assumptions & Constraints:**
    - 4096 GPUs. Switch cost: $15K.
    - Clos: full-bisection leaf-spine built from 64-port switches, with 32 downlinks and 32 uplinks per leaf.
    - Dragonfly: 32 groups, 4 switches per group; global links use ports on the same group switches.

    **Calculations:**
    - Clos leaves: 4096 GPUs / 32 GPU-facing ports per leaf = 128 leaf switches.
    - Clos spines: 128 leaves * 32 uplinks / 64 ports per spine = 64 spine switches.
    - Clos switches: 128 + 64 = 192 switches.
    - Clos ports: 192 * 64 = 12,288 ports. Cost: 192 * $15K = $2.88M.
    - Dragonfly switches: 32 groups * 4 switches/group = 128 switches.
    - Dragonfly ports: 128 * 64 = 8,192 ports. Cost: 128 * $15K = $1.92M.
    - Savings = 12,288 - 8,192 = 4,096 ports, or $960K at $15K/switch.

    **Conclusion & Interpretation:**
    - **Result: Dragonfly saves about 4,096 switch ports, or one-third of the Clos switch ports in this model.** It is also the better topology match because expensive global bandwidth is reserved for DP while TP and PP stay local/pod-scoped.
