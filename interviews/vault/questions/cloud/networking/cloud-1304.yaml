title: Diagnosing RoCEv2 Throughput Collapse Under Minor Packet Loss
scenario: You are debugging a distributed LLM training job across 256 GPUs connected via a 400Gbps RoCEv2 fabric. The network reports a microscopic switch packet loss rate of 0.05% due to mild incast congestion during AllReduce. However, the effective network bandwidth has collapsed drastically, dropping from an expected 45 GB/s down to just 8 GB/s.
question: Why would such a microscopic packet drop rate cause an 80% degradation in goodput, and how do you resolve it?
details:
  realistic_solution: |
    Do not treat the 0.05% loss rate as a harmless average. In a high-BDP RoCEv2 fabric, a lost packet can trigger retransmission from the missing packet sequence number, retry timers, head-of-line blocking, and congestion-control feedback that amplify an incast burst. A 0.05% random loss rate alone does not mathematically imply an 80% goodput drop; that collapse points to fabric behavior such as microburst buffer overflow, PFC pause spreading, ECN/DCQCN mis-tuning, retry timeouts, or collective incast. Mitigate by reducing incast fan-in, tuning ECN/PFC and DCQCN, increasing buffer headroom where appropriate, checking retry/RNR timers, and using collective algorithms or transports that tolerate congestion better.
  common_mistake: |
    **The Pitfall:** Blaming Priority Flow Control (PFC) deadlocks or PCIe bottlenecks.
    **The Rationale:** Engineers unfamiliar with RDMA transport layer mechanics assume the physical interconnect is choked, ignoring protocol-level retransmission amplifiers.
    **The Consequence:** Wasting time tuning application layer batch sizes or ripping out physical cables while the protocol continues to DDOS itself.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Bandwidth: 400 Gbps (50 GB/s).
       - Round Trip Time (RTT): 20 us.
       - Loss rate: 0.05% (1 in 2,000 packets).
       - MTU: 4 KB.
    2. **Calculations:**
       - Bandwidth-Delay Product (BDP): 50 GB/s * 20 us = 1,000,000 bytes, or about 1 decimal MB, inflight.
       - Packets in flight: 1,000,000 bytes / 4,096 bytes ≈ 244 packets.
       - A 0.05% average loss rate means about 1 lost packet per 2,000 packets, but the average alone does not determine the goodput collapse.
       - If a transport retries from the missing packet sequence number, one loss can force retransmission of some suffix of the inflight window; the worst case is roughly one BDP window, and a random-position heuristic is about half a window.
       - That is local retransmission amplification, not a direct linear proof of an 80% bandwidth drop. The observed collapse requires secondary effects such as retry timers, head-of-line blocking, PFC pause spreading, ECN/DCQCN backoff, or synchronized collective incast.
    3. **Conclusion & Interpretation:**
       - **Result: Retransmission Amplification Plus Congestion Feedback.** The packet-loss math explains amplification, not the full 80% collapse by itself. The observed drop to 8 GB/s indicates a congestion-control or lossless-fabric pathology that must be fixed at the fabric and collective level.
