title: InfiniBand AllReduce Retransmits in MI300X Rings
scenario: You are tuning AllReduce performance for a 64-node MI300X cluster connected with a 400 Gbps InfiniBand fabric. Each node has 8 MI300X GPUs and one 400 Gbps rail. A ring-AllReduce of a 4GB gradient tensor across all 512 GPUs achieves only 140 Gbps on that rail, versus a 400 Gbps line-rate ceiling. Profiling shows 35% of RDMA operations are completing with retransmit counters incrementing.
question: Why is the 512-GPU ring AllReduce only achieving 140 Gbps with 35% RDMA retransmits, and what network tuning would you apply?
details:
  realistic_solution: |
    Root cause: InfiniBand fabric congestion or loss recovery during synchronized ring traffic, not RoCEv2/DCQCN/PFC. On a 64-node, 512-GPU ring, every rank injects at the same time; if the fat-tree is oversubscribed, routes are imbalanced, adaptive routing is disabled, SL/VL mapping is poor, or one rail/link is unhealthy, senders can see credit stalls and retransmit counters while effective rail throughput collapses. Diagnosis: check InfiniBand port counters such as symbol errors, link recovery, PortXmitWait, VL15 drops, and retransmit-related counters; inspect rail balance, routing tables, adaptive routing, link width/speed, and whether collectives are topology-aware. Fixes: repair bad links or optics, rebalance routes, enable/tune adaptive routing and service-level/virtual-lane mapping, avoid oversubscribed paths, use topology-aware NCCL rings or tree algorithms, and enable SHARP/in-network reduction where available.
  common_mistake: |
    **The Pitfall:** Applying RoCE congestion fixes to an InfiniBand AllReduce problem.

    **The Rationale:** Candidates see RDMA retransmits and reach for DCQCN, ECN, and PFC, but the scenario is 400 Gbps InfiniBand, which uses different flow-control, routing, and congestion mechanisms.

    **The Consequence:** The team tunes the wrong stack while the real issue remains in InfiniBand routing, credit stalls, oversubscription, rail imbalance, or link health.
  napkin_math: |
    **Assumptions & Constraints:**
    - Data sent uses decimal GB: 4 GB * 2 * (511/512) = 7.984375 GB.
    - 400 Gbps rail = 50 GB/s theoretical line rate.
    - Measured rail throughput is 140 Gbps = 17.5 GB/s.
    - Retransmit counters indicate congestion or recovery work, but do not translate linearly into throughput loss.

    **Calculations:**
    - Ideal Transfer Time: 7.984375 GB / 50 GB/s = 159.7 ms.
    - Measured Transfer Time: 7.984375 GB / 17.5 GB/s (140 Gbps) = 456.25 ms (2.86x slowdown).
    - Throughput efficiency: 140 Gbps / 400 Gbps = 35%.
    - Slowdown versus line-rate ideal: 456.25 ms / 159.7 ms = 2.86x.

    **Conclusion & Interpretation:**
    - **Result: InfiniBand Fabric-Bound**. The retransmits are a symptom of fabric congestion, routing imbalance, credit starvation, or link health issues; tune the InfiniBand fabric and collective topology rather than RoCE DCQCN/PFC.
