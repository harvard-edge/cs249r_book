title: The InfiniBand Link Flap
scenario: Your 256-GPU training job stalls for 30–90 seconds every 10–20 minutes, then resumes at full speed. NCCL logs show no timeouts. Your IB switch logs show a port on leaf switch 7 toggling UP/DOWN every 12 minutes. The ops team claims it only affects one GPU.
question: Why does a single flapping InfiniBand link stall all 256 GPUs in the cluster?
details:
  realistic_solution: 'In a ring or tree AllReduce, every GPU is a link in a chain. The collective cannot complete until *every* participant contributes its data. When the IB link flaps (goes DOWN), the Subnet Manager (SM) must: (1) detect the failure (~500 ms); (2) recalculate routing tables for the entire fabric (~1–5 s for 256 endpoints); (3) distribute new forwarding tables to all switches (~2–5 s); (4) the affected GPU''s NCCL connection times out and retries (~5–30 s depending on `NCCL_IB_TIMEOUT`). During this entire sequence, all 255 other GPUs are blocked in the collective, waiting for the one GPU on the flapping port. When the link comes back UP, the SM recalculates routes *again*. The 12-minute flap cycle means the fabric is constantly reconverging, and each reconvergence stalls the entire training job. One flapping link is worse than a permanently dead link (which would be routed around once and forgotten).'
  common_mistake: |
    **The Pitfall:** Assuming that a single link failure only impacts the directly connected node.
    **The Rationale:** Candidates think InfiniBand has redundant paths and handles link failures locally without realizing that collective operations create global dependencies across all nodes.
    **The Consequence:** Ignoring intermittent hardware faults, leading to massive amounts of wasted idle compute time across the cluster.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 256 GPUs at $3.50/GPU-hr.
       - 12-minute flap interval (5 flaps/hour).
    2. **Calculations:**
       - Flap event overhead: Subnet Manager routing tables (3–8 seconds) + NCCL timeouts (5–30 seconds) = 10–40 seconds per flap.
       - 5 flaps/hr ≈ 40 lost steps per hour.
       - Cost of idle GPUs: 256 GPUs × $3.50/GPU-hr × (5 flaps/hr × 40s stall / 3600) × 24 hrs ≈ $995/day.
    3. **Conclusion & Interpretation:**
       - **One flapping link forces global SM reconvergence and NCCL timeouts, wasting ~$1,000/day in idle compute.**
       - **Result: Network-Bound**
