title: Evaluating ECMP vs Adaptive Routing for Elephant Flows
scenario: You are operating a 2,048-GPU RoCEv2 cluster (256 nodes, 400Gbps ConnectX-7 NICs per GPU) for large language model training. Network telemetry reveals severe throughput collapses during data parallel AllReduce synchronizations. Analysis shows that massive gradient transfers (elephant flows) are experiencing severe tail latency due to standard ECMP (Equal-Cost Multi-Path) hashing. This causes multiple 400Gbps flows to randomly map to the same spine uplinks, triggering PFC (Priority Flow Control) storms, while other links remain completely idle.
question: Should you mitigate AllReduce ECMP collisions with switch Adaptive Routing or a Rail-Optimized topology, and why?
details:
  realistic_solution: Use a Rail-Optimized topology as the stronger fix for this failure mode, and keep switch Adaptive Routing as a partial mitigation for residual imbalance and failures. Adaptive Routing can move traffic away from congested spine uplinks after congestion is detected, but it still operates inside a shared fabric where long-lived elephant flows can collide, interact with PFC, and create tail latency. A rail-optimized design physically wires the same GPU index across nodes into dedicated rails, letting NCCL keep most intra-rail AllReduce traffic on predictable paths and reducing exposure to ECMP hash collisions. It improves deterministic locality, but it is not an absolute non-blocking guarantee under oversubscription, misconfiguration, or link failures.
  common_mistake: |
    **The Pitfall:** Assuming that adding more spine links or tuning switch QoS buffer sizes will resolve the issue.
    **The Rationale:** Candidates rely on standard web-traffic engineering principles, treating the issue as a simple capacity problem.
    **The Consequence:** ECMP hashing inherently fails for AI workloads because traffic consists of a few massive flows. No amount of buffering can absorb a continuous 2x oversubscription.
  napkin_math: |
    **Assumptions & Constraints:**
    - AllReduce creates a small number of long-lived 400Gbps elephant flows.
    - ECMP hashes each flow to one path and does not split a single flow across all available uplinks.
    - PFC turns sustained hot spots into backpressure that can spread beyond the overloaded link.

    **Calculations:**
    - With web traffic, many short flows statistically smooth out ECMP imbalance.
    - With AI collectives, a few elephant flows dominate link occupancy; if two 400Gbps flows hash to the same 400Gbps uplink while another uplink is idle, that path is oversubscribed for the duration of the collective.
    - Adaptive Routing can reduce some hot spots, but it is reactive and cannot provide the same placement locality as a rail-aware topology.

    **Conclusion & Interpretation:**
    - **Result: Network-topology-bound.** Rail optimization directly removes much of the ECMP collision surface for NCCL collectives; Adaptive Routing is useful as a secondary mitigation, not the primary architectural fix for deterministic AllReduce performance.
