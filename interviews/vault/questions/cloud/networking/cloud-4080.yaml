title: GDRCopy for Small RDMA Messages
scenario: GDRCopy is a library that allows low-latency CPU access to GPU memory via a persistent BAR mapping. NCCL uses GDRCopy for small control messages (<8KB) instead of GPUDirect RDMA. For a 128-node cluster performing AllReduce, control messages include buffer pointers, ready flags, and completion signals (~64 bytes each).
question: For 64-byte NCCL control messages, how do GDRCopy and GPUDirect RDMA latencies compare, and why use GDRCopy anyway?
details:
  realistic_solution: 'For a 64-byte NCCL control message, raw one-shot latency is not always lower with GDRCopy. A GDRCopy path uses a persistent BAR mapping so the CPU can synchronously read or write a small GPU-resident flag or pointer, often around ~1 μs plus small software overhead. A GPUDirect RDMA path can move the bytes through the HCA without a CPU copy and may be sub-microsecond once memory is registered and the queue pair is already active. NCCL still uses GDRCopy for many small control-plane operations because the control plane needs simple synchronous CPU access to GPU memory: polling ready flags, publishing buffer pointers, and updating completion state. GDRCopy avoids per-message RDMA work-request orchestration, CQ polling, and memory-registration management for tiny control records. The right comparison is therefore: GPUDirect RDMA can win on raw posted-transfer latency, while GDRCopy wins on control-plane simplicity and low setup/orchestration overhead for small, frequently
    touched GPU-memory metadata.'
  common_mistake: |
    **The Pitfall:** Assuming GDRCopy is always strictly faster than GPUDirect RDMA in sheer transfer latency.
    **The Rationale:** Candidates misattribute the choice to pure latency rather than the overhead of RDMA work requests and memory registration.
    **The Consequence:** Misunderstanding how the NCCL control plane leverages synchronous CPU reads for efficient orchestrating.
  napkin_math: |
    **Assumptions & Constraints:**
    - 128 nodes, 2 control records per node = 256 records.
    - Example GDRCopy synchronous access cost: ~1.0-1.4µs per record.
    - Example GPUDirect RDMA posted-transfer latency after setup: ~0.7µs per record.
    - RDMA also needs registered memory, posted work requests, and CQ/completion handling.

    **Calculations:**
    - Data Volume: 256 * 64 bytes = 16 KB.
    - Sequential GDRCopy access budget: 256 * 1.4µs ≈ 358µs.
    - Sequential GPUDirect RDMA transfer budget after setup: 256 * 0.7µs ≈ 179µs, before accounting for WR posting, completions, and MR lifecycle.
    - These are budgets for serialized control handling, not guaranteed exposed iteration latency.

    **Conclusion & Interpretation:**
    - **Result: GPUDirect RDMA can be faster as a raw transfer, but GDRCopy is operationally better for tiny NCCL control records** because it provides synchronous CPU access to GPU memory and avoids RDMA orchestration overhead.
