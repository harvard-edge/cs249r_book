title: The InfiniBand Adaptive Routing Loop
scenario: You are running a 1,000 GPU training job over a massive InfiniBand network. To maximize bandwidth, you enable Adaptive Routing (AR), allowing the network to dynamically send packets down the least congested paths. Throughput improves, but occasionally, NCCL crashes with an unrecoverable timeout error during a global AllReduce. The network cables and switches are perfectly healthy.
question: "What did Adaptive Routing do to the packets to break NCCL?"
details:
  realistic_solution: Adaptive Routing caused out-of-order packet delivery that broke NCCL. InfiniBand AR dynamically routes packets down different physical paths based on congestion. Since paths have different latencies, packets arrive out of order. NCCL's AllReduce assumes in-order delivery. When packets arrive out of order, the reduction produces incorrect partial sums, triggering a consistency check timeout. The fix is enabling Adaptive Routing with reordering support (AR-RO).
  common_mistake: |
    **The Pitfall:** Assuming packets got dropped by a congested switch.
    **The Rationale:** Candidates apply TCP/IP Ethernet intuition to InfiniBand, forgetting that IB uses credit-based flow control and is virtually lossless.
    **The Consequence:** Misdiagnosing the root cause and failing to identify out-of-order delivery as the culprit.
  napkin_math: |
    1. **Assumptions & Constraints:**
       * Path A: 2 us congestion delay.
       * Path B: 0 us congestion delay.
       * 1,000 GPU AllReduce running for 12 hours.
    2. **Calculations:**
       * Packet 2 beats Packet 1 by 2 us via Path B.
       * Billions of packets transmitted.
    3. **Conclusion & Interpretation:** **Result: 100% Failure Rate (Latency-Bound)**. The statistical probability of a micro-congestion event reordering a critical packet approaches 100% over the run.
