title: ReduceScatter vs AllReduce for Pipeline Parallelism on H100 Cluster
scenario: A 16-GPU cluster uses pipeline parallelism (8 pipeline stages) plus data parallelism (2-way DP). Micro-batch size is 4.
question: How do ZeRO-1 and ZeRO-3 per-rank communication patterns compare within 2-way DP groups for an 8-stage PP 70B model?
details:
  realistic_solution: 'Hybrid setup: 8-stage PP × 2-way DP = 16 GPUs. Each PP stage holds ~70B/8 = 8.75B params. Interpret the 8.75GB communication volume as per rank per collective for the local PP stage in the 2-way DP group. ZeRO-1 shards optimizer state 2× within the DP group but keeps parameters resident, so it communicates mainly at step boundaries: one gradient ReduceScatter (~8.75GB per rank) and one updated-parameter AllGather (~8.75GB per rank), about 17.5GB per rank total. At 450 GB/s, that is 17.5/450 = 38.9ms. ZeRO-3 also shards parameters, so every micro-batch needs parameter AllGather before forward and gradient ReduceScatter after backward. With 4 micro-batches, that is 8 collectives × 8.75GB per rank = 70GB per rank, or about 155.6ms at 450 GB/s. ZeRO-1 is therefore better for pipeline critical-path latency in this setup.'
  common_mistake: |
    **The Pitfall:** Applying ZeRO sharding blindly across all 16 GPUs.
    **The Rationale:** Forgetting that pipeline parallelism requires adjacent stages to share full parameter copies.
    **The Consequence:** Massive unnecessary communication overhead on the critical path.
  napkin_math: |
    **Assumptions & Constraints:**
    - 8-stage PP × 2-way DP = 16 GPUs.
    - Each PP stage owns 70B / 8 = 8.75B parameters.
    - Communication volumes below are per rank within a 2-GPU DP group for the local PP stage.
    - Effective DP-link bandwidth is 450 GB/s.

    **Calculations:**
    - ZeRO-1 per-rank step communication: ReduceScatter grads 8.75GB + AllGather params 8.75GB = 17.5GB.
    - ZeRO-1 time: 17.5GB / 450 GB/s = 38.9ms.
    - ZeRO-3 per-rank communication: 4 micro-batches × 2 collectives × 8.75GB = 70GB.
    - Single ZeRO-3 collective time: 8.75GB / 450 GB/s = 19.4ms.
    - ZeRO-3 time: 8 × 19.4ms = 155.6ms.

    **Conclusion & Interpretation:**
    - **Result: ZeRO-1 adds ~38.9ms per rank, while ZeRO-3 adds ~155.6ms per rank (Communication-Bound)**. ZeRO-3 saves memory but puts more communication on the pipeline critical path.
