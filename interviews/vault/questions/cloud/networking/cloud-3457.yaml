title: 'Optimizing Distributed Training on NVIDIA H100: A Network Bandwidth Challenge'
scenario: You are training a large FP16 LLM on 16 H100 GPUs across two 8-GPU nodes. The nodes are connected by an Ethernet fabric with 400 Gbps bisection bandwidth. Profiling shows a 16 GB gradient bucket must cross the inter-node link each step, and scaling beyond the two nodes has diminishing returns.
question: How would you estimate whether the 16 GB gradient bucket is network-bound and reduce the 400 Gbps bottleneck?
details:
  realistic_solution: Estimate the inter-node transfer time for the measured gradient bucket and compare it with useful compute time in the same training step. Configure NCCL for the two-node topology, overlap gradient communication with backward compute, increase gradient accumulation to do more compute per synchronization, and use sharding or hybrid parallelism so less gradient data crosses the 400 Gbps link. If the ratio remains high, the run needs higher-bisection networking or fewer cross-node collectives.
  common_mistake: |
    **The Pitfall:** Overlooking the communication overhead of distributed training.
    **The Rationale:** Assuming scaling GPUs always yields linear speedup without checking the bisection bandwidth.
    **The Consequence:** Creating a severely network-bound training run where GPUs sit idle waiting for gradients.
  napkin_math: |
    **Assumptions & Constraints:**
    - Measured gradient bucket crossing the two-node boundary: 16 GB per step.
    - Inter-node fabric bisection: 400 Gbps = 50 GB/s raw; assume 40 GB/s effective after overhead.
    - Useful backward compute remaining while this bucket can be overlapped: 0.25 seconds.

    **Calculations:**
    - Inter-node transfer time lower bound: 16 GB / 40 GB/s = 0.40 seconds.
    - Communication-to-overlappable-compute ratio: 0.40 / 0.25 = 1.6x.
    - Since transfer time exceeds the compute window, at least 0.15 seconds is exposed communication unless the bucket is reduced, overlapped earlier, or sent over a faster fabric.

    **Conclusion & Interpretation:**
    - **Result: the profiled bucket is network-bound over the 400 Gbps bisection.** Mitigate with overlap, smaller or sharded gradient payloads, larger gradient accumulation, topology-aware placement, and higher-bisection fabric.
