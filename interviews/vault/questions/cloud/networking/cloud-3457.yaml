title: 'Optimizing Distributed Training on NVIDIA H100: A Network Bandwidth Challenge'
scenario: You are tasked with training a 1T-parameter LLM using mixed-precision (FP16) on a cluster of H100 GPUs. Nodes are interconnected through an Ethernet fabric with a bisection bandwidth of 400 Gbps. During initial tests, you observe that scaling beyond 16 GPUs across two nodes yields diminishing returns, suggesting a network bottleneck.
question: "How would you analyze the communication-computation ratio for 1T-parameter FP16 training on H100s and mitigate the 400 Gbps inter-node bottleneck?"
details:
  realistic_solution: '1. Analyze Communication Patterns: Profile the model to understand the dominant communication operations (e.g., all-reduce for gradients). 2. Optimize Communication Primitives: Leverage highly optimized communication libraries like NVIDIA''s NCCL, ensuring it''s configured for the cluster''s network topology. 3. Model Parallelism: Implement hybrid parallelism strategies (e.g., combining data parallelism within a node with pipeline or tensor parallelism across nodes) to reduce the amount of data transferred between nodes. 4. Reduce Data Transfer: Use techniques like gradient accumulation, selective gradient updates, or sparsity-aware communication. 5. Network Topology Optimization: If possible, explore options for higher bisection bandwidth networking or more efficient node-to-node routing.'
  common_mistake: |
    **The Pitfall:** Overlooking the communication overhead of distributed training.
    **The Rationale:** Assuming scaling GPUs always yields linear speedup without checking the bisection bandwidth.
    **The Consequence:** Creating a severely network-bound training run where GPUs sit idle waiting for gradients.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model size: 1T parameters in FP16 (2 TB gradients).
    - Inter-node link: 400 Gbps (50 GB/s).
    - Compute capability: 16 H100s at ~40% MFU yielding ~6.3 PFLOPs/s.

    **Calculations:**
    - Transfer time (T_comm): 2 TB / 50 GB/s = 40 seconds.
    - Compute time (T_compute): 96 PFLOPs / 6.3 PFLOPs/s = 15.2 seconds.
    - Comm-to-compute ratio: 40s / 15.2s = 2.63x.

    **Conclusion & Interpretation:**
    - **Result: Network-Bound**. The communication overhead takes 2.63x longer than computation, making the training severely network-bound.
