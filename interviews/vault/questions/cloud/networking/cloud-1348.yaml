title: Evaluating gRPC Migration for Inter-Service Tensor Transfer
scenario: You are architecting an internal computer vision serving pipeline where microservices exchange 10MB dense float32 tensors. The current REST/JSON over HTTP/1.1 implementation exhibits a p99 latency of 180ms per hop, violating a strict 50ms SLA. Your team proposes rewriting the communication layer to use gRPC with standard Protobuf messages over your 10 Gbps datacenter network.
question: Will standard gRPC achieve the SLA, and what architectural adjustments might be required for optimal tensor transfer?
details:
  realistic_solution: 'Accept the gRPC proposal but mandate that the 10MB tensor payload be encoded as a flat `bytes` field rather than a `repeated float` field. Standard Protobuf repeated fields suffer from varint encoding overhead and per-element processing. By casting the tensor to raw bytes and sending it in a Protobuf `bytes` field, serialization overhead is drastically reduced, bringing total hop latency remarkably close to the network transfer bound.'
  common_mistake: |
    **The Pitfall:** Failing to separate network transfer time from serialization overhead.
    **The Rationale:** Engineers assume gRPC and Protobuf are universally fast enough for any payload without considering how repeated fields are encoded.
    **The Consequence:** Using a standard Protobuf `repeated float` field for a 10MB tensor introduces massive varint encoding and memory-copy overhead, missing the strict latency SLA.
  napkin_math: |
    **Assumptions & Constraints:**
    - Network capacity: 10 Gbps (1.25 GB/s).
    - Payload: 10MB dense float32 tensors.
    - SLA: 50ms per hop.

    **Calculations:**
    - Network transfer time: 10 MB / 1.25 GB/s = 8 ms.
    - JSON parsing overhead: ~150 ms (Total ~158 ms).
    - Protobuf `repeated float` serialization: ~30 ms (Total ~38 ms, barely meets SLA).
    - Protobuf `bytes` field serialization: ~0 ms (Total ~8 ms).

    **Conclusion & Interpretation:**
    - **Result: Serialization-Bound.** Using a raw `bytes` field drops serialization near 0 ms, yielding a total hop latency of ~8 ms and safely meeting the 50ms SLA.
