title: 'Calculating Data Parallel Bottlenecks'
scenario: You are scaling a 10B parameter model training job across 16 nodes connected via a 100 Gbps Ethernet network. You are using FP16 precision and standard Data Parallelism with Ring All-Reduce. The forward and backward pass computation takes 400ms per step.
question: What is the Ring All-Reduce communication time per step and comm-to-compute ratio, and is the 16-node job communication-bound?
details:
  realistic_solution: 'First, calculate the gradient size: 10B parameters * 2 bytes = 20 GB. In Ring All-Reduce, each node transfers 2 * (N-1)/N * M data. For 16 nodes, this is 2 * (15/16) * 20 GB = 37.5 GB. The network bandwidth is 100 Gbps, which equals 12.5 GB/s. The communication time is 37.5 GB / 12.5 GB/s = 3.0 seconds. With compute taking 0.4 seconds, the communication-to-computation ratio is 3.0 / 0.4 = 7.5. The system is severely communication-bound.'
  common_mistake: |
    **The Pitfall:** Failing to account for the exact data transfer formula in Ring All-Reduce.
    **The Rationale:** Engineers forget the `2 * (N-1)/N` multiplier or fail to convert Gbps to GB/s.
    **The Consequence:** Communication latency is wildly underestimated, leading to poor network provisioning.
  napkin_math: |
    **Assumptions & Constraints:**
    - 10B parameters, FP16 (2B), 16 nodes, Ring All-Reduce.
    - Network: 100 Gbps (12.5 GB/s). Compute time: 0.4s.
    
    **Calculations:**
    - Gradient Size: 10B * 2 bytes = 20 GB.
    - Ring All-Reduce Volume: 2 * (15/16) * 20 GB = 37.5 GB.
    - Communication Time: 37.5 GB / 12.5 GB/s = 3.0 seconds.
    - Ratio: 3.0s / 0.4s = 7.5x.
    
    **Conclusion & Interpretation:**
    - **Result: 7.5x ratio (Network-Bound)**. Comm-to-compute ratio is 7.5x, confirming the system is severely network-bound.
