title: MI300X MoE Routing Bottleneck
scenario: Designing the backend for a mixture-of-experts model inference system across 64 GPUs interconnected via 400 Gbps RoCEv2.
question: How would you formulate an expert routing mechanism that minimizes cross-node traffic over the 400 Gbps bottleneck while maintaining load balance?
visual:
  kind: svg
  path: cloud-4492.svg
  alt: Diagram comparing local massive HBM bandwidth versus thin network link between MI300X nodes.
  caption: MoE Token Routing Network
details:
  realistic_solution: The candidate should propose local expert placement where frequently co-accessed experts reside on the same GPU to utilize the 5.3 TB/s HBM bandwidth, reserving the much slower 50 GB/s RoCE link for rare expert dispatch.
  common_mistake: |
    **The Pitfall:** Assuming 400 Gbps (50 GB/s) is fast enough to transfer all tokens all-to-all.
    **The Rationale:** Not considering the massive dropoff from the 5.3 TB/s local memory bandwidth.
    **The Consequence:** Creating a severe network bottleneck that stalls the MoE inference.
  napkin_math: |
    **Assumptions & Constraints:**
    - RoCEv2 bandwidth: 400 Gbps
    - HBM bandwidth: 5.3 TB/s

    **Calculations:**
    - 400 Gbps = 50 GB/s
    - 5300 GB/s (HBM) / 50 GB/s (RoCEv2) = 106x slower network

    **Conclusion & Interpretation:**
    - **Result: 106x slower (Network-Bound)**. 50 GB/s is orders of magnitude slower than 5300 GB/s HBM.
