title: TPU v5e ICI Topology vs H100 NVLink for Data Parallelism
scenario: A 256-chip pod uses 2D torus ICI for data parallel training of a 3B model. An equivalent cluster uses 32 8-GPU nodes connected via InfiniBand NDR.
question: Using ring AllReduce for a 12GB gradient on 256 accelerators, what are the theoretical times on TPU v5e ICI versus H100 over InfiniBand?
details:
  realistic_solution: 'Ring AllReduce time formula: T = 2 * (N-1)/N * M/B, where N = number of nodes, M = message size (12GB), B = effective bandwidth. TPU v5e 2D torus (256 chips): Ring around the 2D torus has effective bandwidth per chip = 100 GB/s. T_tpu = 2 * (256-1)/256 * 12GB / 100GB/s = 0.239s. H100 InfiniBand: Inter-node InfiniBand = 50 GB/s. Ring AllReduce bottlenecked by inter-node bandwidth: T_h100 = 2 * (32-1)/32 * 12GB / 50GB/s = 0.465s. (If treated as a 256-node flat ring, T_h100 = 0.478s). TPU v5e is ~2x faster for gradient AllReduce at 256-chip scale.'
  common_mistake: |
    **The Pitfall:** Using aggregate pod bandwidth instead of per-chip effective AllReduce bandwidth.
    **The Rationale:** Candidates fail to realize that in a ring topology, each chip sends and receives through exactly 2 neighbors, limiting effective bandwidth to the per-link capacity.
    **The Consequence:** Drastically underestimating communication time and misjudging the scalability bottlenecks of the cluster.
  napkin_math: |
    **Assumptions & Constraints:**
    - Gradient size: 12GB. Nodes: 256.
    - TPU v5e effective bandwidth: 100 GB/s.
    - H100 InfiniBand NDR bandwidth: 50 GB/s.

    **Calculations:**
    - T_tpu = 2 * (255/256) * 12GB / 100GB/s = 0.239s.
    - T_h100 = 2 * (255/256) * 12GB / 50GB/s = 0.478s.

    **Conclusion & Interpretation:**
    - **Result: 0.239s vs 0.478s (Network Bandwidth-Bound)**. TPU v5e is ~2x faster for gradient AllReduce at this scale.
