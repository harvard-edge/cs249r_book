title: TPU v5e Congestion in ICI Fabric
scenario: Google's TPU v5e pods connect chips via ICI (Inter-Chip Interconnect) using a 3D torus topology, fundamentally different from the switched Clos fabrics used for GPU clusters. Each ICI link is 1.6 Tbps.
question: How does congestion management for AllReduce differ on TPU v5e's ICI torus versus a switched Clos GPU fabric?
details:
  realistic_solution: 'Key differences: (1) No ECMP needed: in a torus, routing is mostly deterministic and topology-aware rather than hash-based across many equal-cost switch paths. (2) No large shared switch buffers: each TPU chip uses small on-chip ICI buffers and credit-based flow control, so congestion backpressures nearby senders directly instead of relying on ECN/PFC in external switches. (3) AllReduce is topology-shaped: collectives are scheduled across torus dimensions so traffic stays local when possible, but phases can serialize across dimensions and create hot links if placement or collective scheduling is poor. (4) A switched Clos GPU fabric has many path choices and larger switch queues, so congestion management focuses on ECMP/adaptive routing, ECN/DCQCN, PFC behavior, and avoiding hash collisions. The torus answer is not that it is always faster or slower; it is that congestion is controlled by routing/scheduling and credits inside the topology rather than by switch-buffer
    telemetry and packet marking.'
  common_mistake: |
    **The Pitfall:** Applying Clos-based congestion control thinking (ECMP, PFC, switch buffers) to a torus.
    **The Rationale:** Engineers accustomed to standard data center networking assume all modern fabrics rely on switches.
    **The Consequence:** They misunderstand congestion dynamics. Torus topologies have no switches—traffic flows directly between chips through nearest-neighbor links, making congestion a routing problem rather than a buffering problem.
  napkin_math: |
    **Assumptions & Constraints:**
       - ICI Link Speed: 1.6 Tbps = 200 GB/s per direction.
       - TPU fabric is a torus with credit-based flow control.
       - GPU fabric is a switched Clos using ECMP/adaptive routing plus ECN/PFC.
    **Calculations:**
       - Torus congestion signal: a hot ICI link exhausts local credits, and backpressure propagates along the routed path.
       - Clos congestion signal: a hot switch queue grows, then ECN marks, DCQCN rate reduction, PFC pause, or adaptive routing responds.
       - Quantitative AllReduce time cannot be derived from link speed alone because it depends on chip placement, torus dimensions, collective schedule, chunking, and how many links are used concurrently.
    **Conclusion & Interpretation:**
       - **Result: Topology-Managed Congestion.** TPU ICI relies on deterministic/topology-aware collective scheduling and credit backpressure; Clos GPU fabrics rely on multipath routing and switch-queue congestion controls.
