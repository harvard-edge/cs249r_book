title: '512-GPU FSDP Networking: InfiniBand NDR vs RoCE v2'
scenario: Your company is building a new 512-GPU training cluster. The vendor offers InfiniBand NDR for $2.8M or RoCE v2 over standard Ethernet for $1.2M. Both claim lossless RDMA. Your workload is fine-tuning 70B models with FSDP across all 512 GPUs.
question: Which networking option do you choose, and when does the cheaper option break down?
details:
  realistic_solution: 'For 512 GPUs doing FSDP, tail latency and operational predictability matter more than the RDMA label on the spec sheet. InfiniBand is usually the safer choice for large training fabrics because credit-based flow control, adaptive routing, congestion management, and mature tooling make it easier to keep collective latency stable under incast. RoCE v2 can work well beyond a single switch tier, but only when the Ethernet fabric is engineered and operated carefully: PFC and ECN must be tuned, buffers must be sized for burst patterns, congestion control must be validated, and operators must monitor pause storms and tail latency. Choose RoCE when cost pressure is high and the team can prove the fabric under realistic collectives; choose InfiniBand when training throughput, low jitter, and operational margin are worth the premium.'
  common_mistake: |
    **The Pitfall:** Assuming RoCE v2 is perfectly equivalent to InfiniBand because both support RDMA.
    **The Rationale:** Engineers look at the spec sheet (lossless claim) and choose the cheaper option without understanding how Priority Flow Control (PFC) behaves at scale.
    **The Consequence:** Experiencing severe tail latency spikes due to PFC pause frame cascades across multi-hop topologies, degrading cluster-wide throughput.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: 70B parameters, FP16 (2 bytes/param).
    - GPUs: 512.
    - Network: 400 Gbps (50 GB/s) per link.

    **Calculations:**
    - Full FP16 parameter state: 70B * 2 bytes = 140 GB.
    - In an FSDP all-gather, each GPU receives roughly the other 511/512 of the tensor.
    - Per-GPU receive volume for one full-model materialization: 140 GB * 511/512 ≈ 139.7 GB.
    - Best-case serialization time at 50 GB/s: 139.7 GB / 50 GB/s ≈ 2.8 s before protocol, topology, and overlap effects.
    - A 10 ms tail-latency pause inside a synchronized collective delays all 512 ranks for roughly that collective phase; repeated pauses reduce throughput, but the impact must be measured from observed pause frequency and placement.

    **Conclusion & Interpretation:**
    - **Result: High Latency Sensitivity.** The communication volume is large enough that small amounts of congestion or pause-frame propagation can become visible in step time. RoCE breaks down when tail latency and pause behavior are not controlled, not at a fixed topology size.
