title: Evaluating RoCEv2 vs InfiniBand for H100 Clusters
scenario: You are architecting the backend compute network for a 2,048 GPU cluster dedicated to training a 70B parameter Mixture of Experts (MoE) model using 3D parallelism. You must evaluate whether to deploy a 400Gbps InfiniBand (NDR) fabric or a 400Gbps RoCEv2 Ethernet fabric. The InfiniBand fabric costs approximately $1,500 more per port (NIC + Switch + Transceivers) and provides hardware-level lossless delivery. The RoCEv2 fabric uses standard Ethernet switches but relies on PFC (Priority-based Flow Control) and DCQCN for congestion control.
question: Which 400 Gbps fabric would you choose for the 2,048-GPU MoE cluster, considering incast, tail latency, and TCO?
details:
  realistic_solution: Choose 400Gbps InfiniBand as the default for the stated MoE cluster. MoE all-to-all traffic creates severe microbursts and incast, and predictable tail latency is worth more than the approximate $3M RoCEv2 CapEx savings when training efficiency is at risk across 2,048 GPUs. RoCEv2 is a viable contingency only for a team with proven DCQCN/PFC tuning expertise and measured evidence that tail latency stays within the training efficiency budget.
  common_mistake: |
    **The Pitfall:** Blindly recommending InfiniBand or failing to recognize MoE's traffic patterns.
    **The Rationale:** Candidates often choose InfiniBand for 'best performance' without quantifying if the >$3M cost premium justifies the potential efficiency gain, or they ignore that MoE's heavy All-to-All communication exacerbates RoCEv2 PFC pause-frame storms.
    **The Consequence:** Overspending by millions of dollars or building an unstable network.
  napkin_math: |
    **Assumptions & Constraints:**
    - CapEx Premium = 2,048 GPUs * $1,500/port.
    - Baseline comparison is the fabric premium versus the total value of keeping a 2,048-GPU training job efficient.

    **Calculations:**
    - Premium = 2,048 * $1,500 = $3,072,000.
    - If RoCEv2 congestion reduces end-to-end training throughput by X%, the wasted cluster value must be compared with this $3.072M premium.
    - Without a stated total cluster cost or training run cost, a GPU-equivalence or fixed 5% ROI threshold cannot be derived from the prompt alone.

    **Conclusion & Interpretation:**
    - **Result: choose InfiniBand for predictable scaling.** The clean numeric fact is the $3.072M premium; the ROI threshold depends on the organization's measured cost of lost throughput and schedule delay.
