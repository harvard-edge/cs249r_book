title: Designing RDMA Buffer Pool for AllReduce Pipelining
scenario: 'You need to design the RDMA buffer pool for a 256-H100 AllReduce implementation. The AllReduce uses ring algorithm with pipelining: while one chunk is being sent over the network, the next chunk is being reduced locally. This requires at least double-buffering.'
question: How would you allocate the RDMA buffer pool for a 2GB, 8-stage pipelined ring AllReduce on 256 H100s?
details:
  realistic_solution: |
    Design parameters: gradient = 2GB and the pipeline has 8 chunks, so each chunk is 256MB. Allocate the RDMA pool for the maximum simultaneously live chunk buffers, not for every logical stage in the ring. For reduce-scatter, double-buffering needs two in-flight chunk slots, and each slot needs send, receive, and reduce/accumulate storage: 2 * 3 * 256MB = 1.5GB. For all-gather, each in-flight slot needs send and receive storage: 2 * 2 * 256MB = 1.0GB. The RDMA buffer pool is therefore 2.5GB. The original 2GB gradient is separate model state/gradient memory, so the total temporary-plus-gradient footprint would be 4.5GB, but only 2.5GB should be counted as the RDMA pool allocation.
  common_mistake: |
    **The Pitfall:** Allocating only 2 buffers (basic double buffering) for a pipeline with many stages.
    **The Rationale:** Assuming that simple send/receive overlapping is sufficient, without accounting for all in-flight chunks and reduction intermediates in an 8-stage pipeline.
    **The Consequence:** Severe pipeline stalls and hardware idling, as RDMA writes block on buffers still required for local reduction.
  napkin_math: |
    **Assumptions & Constraints:**
    - 2GB gradient split into 8 pipeline chunks.
    - Double-buffering means two chunks can be live per phase.
    - Count only RDMA pool buffers; the original 2GB gradient is separate.

    **Calculations:**
    - Chunk size: 2GB / 8 = 256MB.
    - Reduce-scatter live buffers: 2 slots * 3 buffers/slot = 6 buffers.
    - Reduce-scatter pool: 6 * 256MB = 1.5GB.
    - All-gather live buffers: 2 slots * 2 buffers/slot = 4 buffers.
    - All-gather pool: 4 * 256MB = 1.0GB.
    - Total RDMA buffer pool: 1.5GB + 1.0GB = 2.5GB.
    - Total footprint including the original gradient: 2.5GB + 2GB = 4.5GB.

    **Conclusion & Interpretation:**
    - **Result: allocate a 2.5GB RDMA buffer pool.** The 4.5GB figure is the broader memory footprint if the original gradient is included.
