title: 'Network Bandwidth Bottlenecks: Recall PCIe and NVLink Bandwidth Specs'
scenario: A systems engineer asks for the key bandwidth specifications for GPU interconnects (PCIe 5.0, NVLink 4.0, and NVSwitch) and when each limits ML training performance.
question: What are the exact bidirectional bandwidth specifications for PCIe 5.0, NVLink 4.0, and NVSwitch, and when does each limit performance?
details:
  realistic_solution: |
    PCIe 5.0 x16 provides about 64GB/s bidirectional aggregate bandwidth, or about 32GB/s per direction. H100 NVLink 4.0 provides about 900GB/s bidirectional aggregate bandwidth per SXM GPU, or about 450GB/s per direction. NVSwitch is the switching fabric that lets each GPU use its NVLink bandwidth for all-to-all GPU traffic; in an 8-GPU H100 system, that is about 900GB/s bidirectional per GPU, or 7.2TB/s aggregate bidirectional GPU injection across the node. PCIe limits host-to-GPU input staging, CPU-mediated transfers, and checkpoint paths. NVLink/NVSwitch limits GPU-GPU collectives such as tensor-parallel all-reduces, pipeline sends, and intra-node gradient synchronization.
  common_mistake: |
    **The Pitfall:** Quoting NVLink bandwidth as unidirectional.
    **The Rationale:** Candidates fail to correctly apply bidirectional specifications, underestimating actual link capacity.
    **The Consequence:** Incorrect analytical models for AllReduce timing, leading to flawed distributed training architectures.
  napkin_math: |
    **Assumptions & Constraints:**
    - Use bidirectional aggregate bandwidth for headline specs and per-direction bandwidth for one-way transfers.
    - H100 SXM-class NVLink 4.0 and an 8-GPU NVSwitch node.

    **Calculations:**
    - PCIe 5.0 x16: ~64GB/s bidirectional aggregate = ~32GB/s host-to-device or device-to-host.
    - NVLink 4.0 on H100 SXM: ~900GB/s bidirectional aggregate per GPU = ~450GB/s per direction.
    - NVSwitch does not replace the per-GPU NVLink limit; it provides non-blocking switched access so an 8-GPU node can sustain roughly 8 * 900GB/s = 7.2TB/s aggregate bidirectional GPU injection for all-to-all traffic.
    - Bottleneck mapping: PCIe for CPU/GPU and storage paths; NVLink/NVSwitch for intra-node GPU collectives.

    **Conclusion & Interpretation:**
    - **Result: PCIe 5.0 x16 ~64GB/s bidirectional, H100 NVLink 4.0 ~900GB/s bidirectional per GPU, and 8-GPU NVSwitch fabric ~7.2TB/s aggregate bidirectional injection.** PCIe is the bottleneck for host and storage movement; NVLink/NVSwitch is the relevant limit for GPU-GPU training communication.
