title: Optimizing Distributed Training Throughput with RoCE on GPUs
scenario: You are leading a team training a large language model across 64 GPUs. These GPUs are interconnected over a 200 Gbps RoCE v2 network. You've observed that while individual GPU utilization is high during computation, the overall training throughput is significantly lower than expected during gradient synchronization. Specifically, a single all-reduce operation for a 100 GB gradient tensor across all 64 GPUs takes much longer than theoretical expectations. Your current framework uses standard TCP/IP sockets for inter-GPU communication over the RoCE fabric.
question: "How would you reconfigure the RoCE v2 communication stack so the 64 GPUs use RDMA and GPUDirect for the 100 GB all-reduce instead of TCP/IP?"
details:
  realistic_solution: 'To resolve this, you need to ensure your deep learning framework''s communication backend is correctly configured to leverage RoCE''s RDMA capabilities. This involves: 1. **Verifying RDMA Driver Installation**: Confirm Mellanox OFED drivers are installed and `ib_verbs` are accessible on all nodes. 2. **NCCL Configuration**: Set environment variables like `NCCL_IB_DISABLE=0` and potentially `NCCL_NET_GDR_LEVEL=3` to enable GPUDirect RDMA. This allows data to move directly from GPU memory to the network interface card (NIC) without CPU involvement or host memory copies (zero-copy). 3. **UCX Integration**: If using an MPI-based communication backend, ensure UCX (Unified Communication X) is enabled and configured to use InfiniBand/RoCE transport for optimal performance, as it natively supports kernel bypass and RDMA verbs. 4. **MTU/Jumbo Frames**: Configure the network interfaces to use jumbo frames (e.g., 9000 bytes MTU) to reduce packet overhead and increase the effective bandwidth for large data transfers during gradient exchange.'
  common_mistake: |
    **The Pitfall:** Assuming that simply plugging servers into a RoCE-enabled network automatically utilizes high-performance RDMA.
    **The Rationale:** Overlooking the need to explicitly configure deep learning frameworks (like NCCL) to bypass the OS kernel and use RDMA verbs.
    **The Consequence:** Network traffic routes through the CPU's slow TCP/IP stack, neutralizing the benefits of the advanced fabric and bottlenecking training.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - All-Reduce Volume: 100 GB gradient * 2 = 200 GB total.
       - Network: 200 Gbps (25 GB/s) RoCE v2.
       - TCP/IP Overhead: Drops effective bandwidth to ~8 GB/s.
    2. **Calculations:**
       - Optimal RoCE Effective Bandwidth ≈ 22 GB/s.
       - Optimal RDMA Time = 200 GB / 22 GB/s = ~9.1 seconds.
       - TCP/IP Time = 200 GB / 8 GB/s = 25.0 seconds.
    3. **Conclusion & Interpretation:**
       - **Result: 25.0s vs 9.1s (Network-Protocol-Bound).** Relying on TCP/IP over RoCE makes the communication step 2.75x slower than configuring true GPUDirect RDMA.
