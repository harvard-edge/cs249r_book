title: PFC Buffer Headroom Calculation for 400GbE RoCEv2
scenario: 'You are configuring Priority Flow Control (PFC) on a Top-of-Rack (ToR) switch with 32x 400GbE ports connecting H100 GPU servers for a RoCEv2 fabric. The fiber cable length gives a one-way propagation delay of 1 microsecond. The NIC and switch processing delay for a PFC pause frame is 1.5 microseconds combined.'
question: What minimum PFC buffer headroom per 400GbE port is needed to absorb in-flight packets after a pause trigger?
details:
  realistic_solution: |
    Calculate the total reaction time (round-trip propagation + processing delays), multiply by the link bandwidth to find the maximum data in flight, and set the buffer headroom to accommodate at least this much data.
  common_mistake: |
    **The Pitfall:** Only accounting for the one-way propagation delay.
    
    **The Rationale:** Engineers often forget that PFC requires a round-trip reaction: the pause frame must travel back to the sender, and the sender's in-flight packets sent right before processing the pause frame must still arrive.
    
    **The Consequence:** A severely undersized buffer headroom, leading to subsequent packet drops during microbursts when the buffer overflows.
  napkin_math: |
    **Assumptions & Constraints:**
    - Link Bandwidth: 400 Gbps = 50 GB/s = 50 KB/us.
    - One-way propagation delay: 1 us. Processing delay: 1.5 us.

    **Calculations:**
    - Reaction Time: 2 * one-way delay (1 us) + processing delay (1.5 us) = 3.5 us.
    - Maximum In-Flight Data: 3.5 us * 50 KB/us = 175 KB.

    **Conclusion & Interpretation:**
    - **Result: 175 KB (Network-Bound)**. The buffer headroom must be at least 175 KB per port to avoid packet drops.
