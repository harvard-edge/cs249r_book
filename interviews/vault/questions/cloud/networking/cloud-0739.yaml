title: The Congestion Collapse
scenario: You scale your distributed training job from 64 to 256 GPUs across a standard RoCEv2 network. Instead of getting a 4x speedup, your training step time actually increases. `nvidia-smi` shows GPU utilization dropping to 20%.
question: "What network physical phenomenon occurred?"
details:
  realistic_solution: 'You hit Priority Flow Control (PFC) pause frames or severe packet loss due to incast congestion. In all-to-all communication (like AllReduce), many nodes simultaneously send data to a single switch port. Ethernet switches have shallow packet buffers. When the buffer fills, the switch drops packets (or sends PFC pause frames halting the entire upstream link). This causes severe head-of-line blocking. RDMA requires lossless networks; when packets drop, go-back-N retransmission triggers, completely stalling the GPU compute while it waits for delayed gradients.'
  common_mistake: |
    **The Pitfall:** Assuming 400 Gbps network switches scale linearly without accounting for packet buffer exhaustion.
    **The Rationale:** Ignoring incast congestion in all-to-all communication patterns.
    **The Consequence:** Experiencing severe head-of-line blocking and Go-Back-N retransmissions that stall the GPU completely.
  napkin_math: |
    **Assumptions & Constraints:**
    - Switch has a 32MB buffer shared across 32 ports at 400 Gbps; each port gets ~1MB.
    - Port speed is 50 GB/s.

    **Calculations:**
    - Buffer fill time = 1MB / 50 GB/s = 20 microseconds.

    **Conclusion & Interpretation:**
    - **Result: Buffers exhaust in 20 microseconds (Network-Bound)**. Microbursts easily breach this window, triggering catastrophic PFC pauses.
