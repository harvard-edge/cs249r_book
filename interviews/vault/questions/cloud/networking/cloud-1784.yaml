title: Evaluating Public REST to gRPC Migration for Vector APIs
scenario: Your team runs a high-throughput embedding API (10,000 requests/sec) returning 1024-dimensional float32 vectors. Currently, it uses a REST API returning JSON over HTTP/1.1. API gateways are hitting 95% CPU, with profiles showing 40% of time spent parsing and serializing JSON. A proposal suggests replacing the public REST API entirely with gRPC (Protobuf over HTTP/2) to reduce CPU load and latency.
question: Should you replace the public REST/JSON embedding API entirely with gRPC, or use a hybrid interface, and why?
details:
  realistic_solution: Maintain the public REST/JSON interface for broad compatibility, but introduce a gRPC endpoint specifically for high-volume, server-to-server enterprise clients. Internally, offload the serialization tax by routing all traffic between the API gateway and backend model servers using gRPC.
  common_mistake: |
    **The Pitfall:** Recommending a full migration to gRPC for all public clients.
    **The Rationale:** Prioritizing internal CPU efficiency over external developer experience and broad web compatibility.
    **The Consequence:** Massive integration friction for external developers and broken compatibility for web browsers lacking native gRPC support.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Traffic: 10,000 RPS.
       - Payload: 1024-dimensional float32 vectors.
    2. **Calculations:**
       - JSON size: ~10-12 chars per float + syntax ≈ 10-12 KB per response.
       - JSON serialization bandwidth: 10,000 * 12 KB = ~120 MB/s of text processing.
       - Protobuf size: 1024 floats * 4 bytes/float = 4 KB exact binary.
       - Protobuf serialization bandwidth: 10,000 * 4 KB = ~40 MB/s of binary copy.
    3. **Conclusion & Interpretation:**
       - **Result: CPU-Bound by Text Serialization.** Routing internal traffic via gRPC reduces the serialization payload by 3x and eliminates costly float-to-string conversions, drastically dropping CPU utilization.
