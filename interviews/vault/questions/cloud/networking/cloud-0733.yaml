title: The AllReduce Incast Congestion
scenario: 'You are scaling Data Parallel training from 128 to 512 GPUs using hierarchical AllReduce. While the mathematical volume of data sent per GPU is constant regardless of cluster size, the actual network time triples. Packet loss metrics show a huge spike.'
question: 'What physical network phenomenon is causing this?'
details:
  realistic_solution: 'This is TCP/RoCE incast congestion. During the AllReduce reduce-scatter phase, multiple sender GPUs simultaneously transmit gradient chunks to the same destination switch port, overwhelming the ToR switch egress buffer. The fix: use DCQCN congestion control for RoCE, implement ECN marking at switches, or use tree-based AllReduce patterns.'
  common_mistake: |
    **The Pitfall:** Claiming "The bandwidth is saturated."
    **The Rationale:** If the volume of data per GPU is constant, the bandwidth requirement per link is constant. Engineers often equate network slowdowns exclusively with bandwidth limits rather than buffer exhaustion.
    **The Consequence:** Wasting time trying to optimize communication volume instead of addressing TCP/RoCE incast congestion and switch buffer limits.
  napkin_math: |
    **Assumptions & Constraints:**
    - 8 nodes sending 1 MB chunks to 1 destination simultaneously.
    - Switch port has 2 MB of dedicated egress buffer.

    **Calculations:**
    - Incast Burst Volume = 8 nodes * 1 MB = 8 MB burst.
    - Dropped Volume = 8 MB - 2 MB buffer = 6 MB.

    **Conclusion & Interpretation:**
    - **Result: 6 MB of packets dropped (Switch Buffer-Bound)**. Packets are dropped instantly due to buffer exhaustion causing severe packet loss and retries.
