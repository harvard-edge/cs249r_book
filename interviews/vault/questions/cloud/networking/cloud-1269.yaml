title: Non-blocking vs Oversubscribed Fat-Tree
scenario: You are designing the network fabric for a 65,536 GPU training cluster using 64-port 400Gbps switches. You must choose between a strictly non-blocking 1:1 3-tier Fat-Tree topology and a 2:1 oversubscribed topology at the spine-to-core layer for Mixture-of-Experts (MoE) model training.
question: Would you choose a 1:1 or 2:1 oversubscribed fat-tree for 65,536-GPU MoE training, and why?
details:
  realistic_solution: A 1:1 non-blocking Fat-Tree is strictly required for MoE workloads. The CapEx savings from halving the core switches represents only a tiny fraction of the total cluster cost. Sacrificing full bisection bandwidth causes severe All-to-All congestion during MoE expert routing, degrading training throughput by far more than the CapEx saved.
  common_mistake: |
    **The Pitfall:** Assuming 2:1 oversubscription merely halves peak throughput uniformly.
    **The Rationale:** Candidates fail to realize that massive All-to-All traffic bursts from MoE routing will cause severe incast congestion at the core layer.
    **The Consequence:** Disproportionately degrading tail latency and crippling training throughput for minor CapEx savings.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - GPUs: 65,536 (Cost: ~$30k/GPU).
       - Switches: 64-port 400Gbps (Cost: ~$85k/switch).
       - Topologies: 1:1 Non-blocking vs. 2:1 Oversubscribed.
    2. **Calculations:**
       - Core Switches Needed: 1:1 requires 1,024 core switches. 2:1 requires 512 core switches.
       - CapEx Savings = 512 switches * $85k/switch = ~$43.5M.
       - Total GPU Cost = 65,536 GPUs * $30k/GPU = ~$1.96B.
       - Savings Percentage = $43.5M / $1.96B ≈ 2.2%.
    3. **Conclusion & Interpretation:** **Sacrificing full bisection bandwidth for a ~2.2% CapEx saving is architecturally flawed and will cause severe All-to-All congestion during MoE routing.**
