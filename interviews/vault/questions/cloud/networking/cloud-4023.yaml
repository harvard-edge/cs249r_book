title: Congestion-Aware Adaptive Routing on InfiniBand
scenario: You are evaluating NVIDIA's Adaptive Routing (AR) on Quantum-2 InfiniBand switches for a 4096-GPU cluster against static routing with ECMP. AR uses real-time port load telemetry to reroute packets, but introduces potential packet reordering. A workload mixes AllReduce (90% of traffic) with parameter-server updates (10%).
question: Should Adaptive Routing be enabled for the mix of 90% AllReduce and 10% parameter-server traffic, and how should it be configured?
details:
  realistic_solution: 'Enable AR selectively via Service Level policies: SL0 (AllReduce) = AR enabled, SL1 (param server) = AR disabled. NCCL handles reordering effectively for AllReduce over UD transport, but packet reordering is catastrophic for RC transport in parameter-server flows.'
  common_mistake: |
    **The Pitfall:** Assuming adaptive routing is universally better for all network traffic.
    **The Rationale:** Adaptive routing dynamically avoids congestion, which sounds strictly superior to static ECMP.
    **The Consequence:** Packet reordering triggers catastrophic go-back-N retransmissions in RC (Reliable Connection) transport protocols, destroying parameter-server throughput.
  napkin_math: |
    **Assumptions & Constraints:**
    - AllReduce: 2GB gradient payloads.
    - Effective bandwidth examples: 25GB/s under congested ECMP vs 40GB/s with AR on a less-loaded path.
    - These are bandwidth-limited lower bounds, not full end-to-end latency predictions.

    **Calculations:**
    - ECMP transfer-time lower bound: 2GB / 25GB/s = 80ms.
    - AR transfer-time lower bound: 2GB / 40GB/s = 50ms.
    - Ideal reduction in transfer component: (80ms - 50ms) / 80ms = 37.5%.
    - Actual tail latency also depends on topology, concurrency, protocol overhead, and reordering cost.

    **Conclusion & Interpretation:**
    - **Result: Selective AR can reduce the bandwidth-limited transfer component by up to 37.5% under these assumptions (Routing-Policy-Bound)**. This supports enabling AR for reordering-tolerant AllReduce while disabling it for RC parameter-server traffic, but it does not by itself prove the whole workload is network-bound.
