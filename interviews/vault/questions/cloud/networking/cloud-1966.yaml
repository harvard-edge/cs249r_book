title: Diagnosing Edge-to-Cloud Satellite Storage Saturation
scenario: A remote agricultural monitoring system collects 50GB of high-resolution crop images daily. The local edge server (2TB NVMe) connects to the cloud via a satellite link providing 5Mbps bandwidth for exactly 6 hours a day during off-peak times. The system uses a store-and-forward architecture to batch images and upload them for central ML analysis. Operations reports that the local storage is gradually filling up, leading to dropped frames by the end of the month despite the daily syncs.
question: Can the 5 Mbps, 6-hour satellite window offload 50GB/day, and how should the pipeline avoid filling the 2TB buffer?
details:
  realistic_solution: The daily data generated (50GB) far exceeds the daily transfer capacity of the satellite link during its active window (13.5GB). The system must employ local ML inference to filter out uninformative images or apply heavy compression before the store-and-forward step, reducing the daily payload to under 13GB.
  common_mistake: |
    **The Pitfall:** Focusing on local storage I/O bottlenecks or blindly trusting the daily sync window.
    **The Rationale:** Engineers assume that a "broadband" link (5Mbps) running for 6 hours provides ample capacity without doing the math.
    **The Consequence:** The system consistently generates more data than it can transmit, eventually filling the 2TB buffer and permanently dropping data.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Daily data generated: 50 GB.
       - Satellite link: 5 Mbps (Megabits per second).
       - Active window: 6 hours/day.
       - Buffer: 2TB NVMe.
    2. **Calculations:**
       - Link speed in MB/s: 5 Mbps / 8 = 0.625 MB/s.
       - Active window in seconds: 6 hours * 3600 = 21,600 s.
       - Daily transfer capacity: 0.625 MB/s * 21,600 s = 13,500 MB = 13.5 GB/day.
       - Daily deficit: 50 GB - 13.5 GB = 36.5 GB.
       - Time to fill 2TB: 2000 GB / 36.5 GB/day ≈ 54.8 days.
    3. **Conclusion & Interpretation:**
       - **Result: Network-Bound.** The system must implement edge inference to filter or heavily compress images before transmission, as the network only handles 27% of the daily payload.
