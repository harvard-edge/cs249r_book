title: ECMP vs Adaptive Routing Tradeoff Space
scenario: An MI300X cluster with Broadcom Tomahawk-5 switches offers both static ECMP and dynamic adaptive routing (DLB — Dynamic Load Balancing). DLB monitors egress queue depths every 200ns and can reroute individual packets.
question: When is static ECMP preferable to Dynamic Load Balancing on Tomahawk-5 for MI300X training traffic, considering overhead?
details:
  realistic_solution: 'ECMP is preferable when: (1) Flow count >> path count — with 1000+ flows over 32 paths, statistical multiplexing ensures even distribution. ECMP overhead: 0 extra ns per packet. DLB overhead: ~10ns per packet for queue depth lookup. At 24.4M pkt/sec (400G), this is 244ms/sec = 24.4% of one switch pipeline consumed by DLB. (2) All flows are same size — ECMP distributes uniformly when flows are homogeneous. (3) Fabric is lightly loaded (<50% utilization) — congestion is rare, so DLB''s benefit is minimal but its overhead is constant. DLB is preferable when: (1) Few elephant flows dominate (AllReduce with <64 flows per switch), creating hash collision risk with near-certain (>99%) chance of collision. (2) Asymmetric traffic patterns. For MI300X clusters: DLB is recommended because AllReduce creates few, large flows.'
  common_mistake: |
    **The Pitfall:** Assuming dynamic routing is unilaterally superior without penalizing the per-packet processing overhead.
    **The Rationale:** Hardware vendors market adaptive routing as a magic bullet for congestion, leading engineers to ignore that packet reordering overhead triggers severe RoCEv2 retransmissions in well-balanced flows.
    **The Consequence:** Turning on DLB for a highly homogeneous, many-flow workload drastically slows down the network, actively causing throughput regressions instead of preventing them.
  napkin_math: |
    **Assumptions & Constraints:**
    - 32 ECMP paths and 64 elephant flows (λ=2 flows/path).
    - DLB actively rebalances with a 20% overhead.

    **Calculations:**
    - ECMP Imbalance: P(at least one path gets >=4 flows) ≈ 99.3%.
    - Bandwidth Penalty: 4 flows share 1/32 of total bandwidth; each gets 1/128 (~0.78%) instead of fair share 1/64 (1.56%). This is a 2x degradation.
    - DLB Optimization: Actively limits max imbalance to < 1.2x (absorbing the 20% overhead).

    **Conclusion & Interpretation:**
    - **Result: DLB wins explicitly (Hash-Collision-Bound)**. When flow count < 4x path count due to congestion.
