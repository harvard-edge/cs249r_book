title: ECMP vs Adaptive Routing Tradeoff Space
scenario: An MI300X cluster with Broadcom Tomahawk-5 switches offers both static ECMP and dynamic adaptive routing (DLB — Dynamic Load Balancing). DLB monitors egress queue depths every 200ns and can reroute individual packets.
question: When is static ECMP preferable to Dynamic Load Balancing on Tomahawk-5 for MI300X training traffic, considering overhead?
details:
  realistic_solution: 'Static ECMP is preferable when the training traffic has many similar flows per switch, flow count is much larger than path count, the fabric is lightly to moderately loaded, and packet reordering would hurt RoCE/NCCL more than adaptive routing would help. In that case ECMP has no per-packet queue lookup and stable ordering, while DLB adds constant processing and possible reordering for little congestion benefit. DLB is preferable when a small number of elephant flows or asymmetric collectives create persistent ECMP hash collisions and hot queues. For MI300X training traffic, the decision is workload-specific: use ECMP for balanced, many-flow data-parallel phases; enable DLB only for measured hot-spot phases where queue telemetry shows ECMP collisions dominate the overhead.'
  common_mistake: |
    **The Pitfall:** Assuming dynamic routing is unilaterally superior without penalizing the per-packet processing overhead.
    **The Rationale:** Hardware vendors market adaptive routing as a magic bullet for congestion, leading engineers to ignore that packet reordering overhead triggers severe RoCEv2 retransmissions in well-balanced flows.
    **The Consequence:** Turning on DLB for a highly homogeneous, many-flow workload drastically slows down the network, actively causing throughput regressions instead of preventing them.
  napkin_math: |
    **Assumptions & Constraints:**
    - 32 ECMP paths.
    - Case A: 1000 comparable flows.
    - Case B: 64 elephant flows.
    - DLB per-packet processing cost is about 10ns.

    **Calculations:**
    - 400Gbps with 2KB packets is roughly 400e9 / (8 * 2048) = 24.4M packets/s.
    - DLB lookup work at that rate: 24.4M packets/s * 10ns = 0.244s of lookup time per second, a nonzero pipeline cost even when no congestion is present.
    - With 1000 flows over 32 paths, the mean is 31.25 flows/path; random hash imbalance is small relative to the mean, so ECMP is usually adequate.
    - With 64 elephant flows over 32 paths, the mean is 2 flows/path; a path with 4 flows gives each flow about half of its fair-share bandwidth on that path, so DLB can be worth its overhead if telemetry shows persistent hot queues.

    **Conclusion & Interpretation:**
    - **Result: ECMP wins when statistical multiplexing and packet ordering matter more than hot-spot avoidance.** DLB wins only when measured ECMP hash collisions create sustained queue imbalance large enough to justify its per-packet cost and reordering risk.
