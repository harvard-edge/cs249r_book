title: Evaluate Rail-Optimized DP Replica Scheduling
scenario: You are designing the scheduling placement logic for a 1,024 GPU cluster (128 nodes, 8x GPUs each) training a large language model using 3D parallelism (TP=8, PP=4, DP=32). The cluster network topology uses 8 independent InfiniBand rails connected to 8 separate leaf switch hierarchies. Strategy A places DP groups across nodes without restricting local GPU indices. Strategy B strictly pins all replicas of the same DP rank to the identical local GPU index.
question: For TP=8, PP=4, DP=32 on 8 InfiniBand rails, should DP replicas use unrestricted placement or identical GPU-index pinning, and why?
details:
  realistic_solution: Prefer Strategy B, but only with a rail-aware node allocator. Pinning DP replicas to the same local GPU index maps each DP AllReduce to one rail and avoids unnecessary cross-rail traffic; it does not by itself guarantee single-hop or congestion-free paths if the selected nodes are imbalanced or the rail hierarchy is oversubscribed. The scheduler should preserve GPU-index alignment and spread DP groups across rails according to topology capacity.
  common_mistake: |
    **The Pitfall:** Evaluating placement purely on total available node bandwidth.
    **The Rationale:** Candidates fail to recognize that rail-optimized topologies lack full non-blocking cross-rail bandwidth; inter-rail routing introduces multi-hop latency and ECMP hash collisions.
    **The Consequence:** Severe degradation of AllReduce tail latency, causing the entire distributed training job to stall waiting for the slowest gradient sync.
  napkin_math: |
    **Assumptions & Constraints:**
    - Cluster: 1,024 GPUs, 8 IB rails. Topology limits cross-rail bandwidth.
    - Strategy A can place a DP group across mixed local GPU indices, causing cross-rail traffic through the spine.
    - Strategy B keeps each DP group on one local GPU index/rail, assuming nodes are also selected evenly within that rail.

    **Calculations:**
    - TP=8 consumes all 8 local GPUs within a node; DP communication occurs between corresponding TP/PP shards across nodes.
    - With unrestricted placement, a shard may communicate across up to 8 rails, adding cross-rail spine paths and contention.
    - With rail pinning, each corresponding shard uses 1 rail, so cross-rail paths per shard drop from up to 8 to 1 when node placement is balanced.

    **Conclusion & Interpretation:**
    - **Result: Strategy B with topology-aware node placement**. GPU-index pinning reduces DP AllReduce path diversity and contention, but its benefit depends on balanced rail and node assignment.
