title: Kubernetes GPU Scheduling Fragmentation with H100 MIG
scenario: Your Kubernetes cluster has 8 H100 (80GB HBM3) nodes, each with 8 GPUs configured with MIG (Multi-Instance
  GPU) in 3g.40gb profile (2 instances per GPU, 40GB each). A deployment requests 14 GPUs. The pod fails
  to schedule even though 16 MIG instances are available. GPU utilization across the cluster is 60%.
question: "Why does the 14-GPU pod fail to schedule despite 16 MIG instances, and how would you fix the Kubernetes configuration?"
details:
  realistic_solution: 'Deploy the NVIDIA MIG Kubernetes device plugin which exposes resources as nvidia.com/mig-3g.40gb.
    Update pod spec to request nvidia.com/mig-3g.40gb: 14. Ensure node labels reflect MIG configuration
    and that the GPU Operator is installed to manage MIG mode dynamically. Use node affinity to route
    MIG workloads to MIG-configured nodes.'
  common_mistake: Assuming Kubernetes' default GPU plugin can schedule MIG instances. The standard nvidia.com/gpu
    resource does not understand MIG profiles. Without the MIG-aware device plugin (nvidia.com/mig-3g.40gb),
    Kubernetes sees only full GPUs, not MIG instances, causing scheduling failure despite available capacity.
  napkin_math: '8 nodes * 8 GPUs * 2 MIG instances = 128 MIG instances total. At 60% utilization: 77 in
    use, 51 available. Request of 14 can be satisfied by 7 nodes (2 instances/GPU * 1 GPU each) or consolidated
    on fewer nodes. Scheduling failure is not capacity — it''s resource type mismatch. After MIG plugin:
    scheduling succeeds, 14 MIG instances used, remaining 37 available. Each 3g.40gb MIG slice gets 40GB
    HBM + ~420GB/s bandwidth (3/7 of full H100).'
