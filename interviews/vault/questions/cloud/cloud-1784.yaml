title: Evaluating Public REST to gRPC Migration for Vector APIs
scenario: Your team runs a high-throughput embedding API (10,000 requests/sec) returning 1024-dimensional
  float32 vectors. Currently, it uses a REST API returning JSON over HTTP/1.1. API gateways are hitting
  95% CPU, with profiles showing 40% of time spent parsing and serializing JSON. A proposal suggests replacing
  the public REST API entirely with gRPC (Protobuf over HTTP/2) to reduce CPU load and latency. Evaluate
  this proposal, detailing the trade-offs and your final architectural recommendation.
details:
  realistic_solution: Maintain the public REST/JSON interface for broad compatibility, but introduce a
    gRPC endpoint specifically for high-volume, server-to-server enterprise clients. Internally, offload
    the serialization tax by routing all traffic between the API gateway and backend model servers using
    gRPC.
  common_mistake: Recommending a full migration to gRPC for public clients without accounting for the
    lack of native gRPC support in web browsers and the massive integration friction it causes for external
    developers.
  napkin_math: JSON representation of a 1024-dim float vector takes ~10-12KB (approx 10 chars per float
    + syntax). Binary float32 takes exactly 4KB (1024 * 4 bytes). At 10,000 RPS, JSON requires serializing
    ~120 MB/s of text, taxing CPU string processing, whereas Protobuf requires just 40 MB/s of efficient
    binary serialization.
