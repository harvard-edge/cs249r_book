title: CPU Bottleneck in Tensor Format Transformation
scenario: You are serving a TensorRT-optimized Vision Transformer on a GPU using a Python FastAPI inference server. The GPU compute takes only 1.5ms per image. However, under peak load (batch size 16), end-to-end latency spikes to 45ms. Profiling reveals the GPU utilization is at 15%, while the single CPU core handling the Python worker is pegged at 100%. Clients are sending image pixels as JSON arrays in NHWC format. The server uses `numpy.array(json_data).transpose(0, 3, 1, 2).astype(np.float16)` to convert the incoming data to the NCHW FP16 memory layout expected by the TensorRT engine.
question: What is causing the 45ms latency despite 1.5ms GPU compute, and how would you redesign the input path?
details:
  realistic_solution: Switch the payload transport from JSON to a binary format like gRPC/Protobuf. More importantly, offload the format transformation (NHWC to NCHW transpose and uint8 to FP16 cast) to the GPU by either exporting the model to accept NHWC directly or using NVIDIA DALI for GPU-accelerated tensor layout transformation.
  common_mistake: |
    **The Pitfall:** Suggesting scaling up CPU nodes or switching web frameworks.
    **The Rationale:** When a CPU worker is pegged, the intuitive reaction is to add more CPU power or use a faster HTTP server.
    **The Consequence:** This ignores the mathematical root cause—JSON parsing and memory transpositions on the CPU—resulting in marginal gains and high costs.
  napkin_math: |
    - **JSON Payload:** 1 image (224x224x3) = ~150K integers. In JSON, this is ~750KB.
    - **Batch size 16:** 16 × 750KB = 12MB text payload.
    - **CPU parsing cost:** `json.loads` on 12MB takes ~15-20ms.
    - **CPU transpose cost:** `np.transpose` on NHWC creates a non-contiguous memory view. `astype(np.float16)` forces a cache-unfriendly copy across 12MB, adding ~15ms.
    - **Total CPU overhead:** >30ms, dwarfing the **1.5ms GPU inference.**
