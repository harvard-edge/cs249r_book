title: MoE Autoscaling Cluster
scenario: Serving a 70B MoE model on an 8x H100 SXM node (80 GB HBM3, 3.35 TB/s each).
  Peak traffic fluctuates 10x between day and night, requiring frequent scale-up of
  decode instances.
question: Design a serving cluster architecture and memory allocation specification
  that dynamically shifts resources without massive cold-start latencies.
details:
  realistic_solution: Implement a disaggregated prefill/decode architecture. Keep
    the 140GB model weights permanently loaded in HBM across a base pool of GPUs.
    Scale decode dynamically by swapping KV caches to CPU RAM or NVMe, transferring
    state via RoCE rather than reloading model weights from object storage.
  common_mistake: Tying autoscaling to basic container orchestration, which triggers
    140GB weight downloads during scale-up events and causes multi-minute cold starts.
  napkin_math: 140GB weights / 3.35 TB/s HBM bandwidth = 41.8ms local transfer vs
    minutes over a 10Gbps network.
