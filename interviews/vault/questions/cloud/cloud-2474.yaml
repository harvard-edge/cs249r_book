title: The Hybrid Cascade False Positive Storm
scenario: A cloud video analytics platform uses 1,000 edge cameras. The edge runs a 2 TOPS INT8 person-detector to filter frames. Positive frames are sent to the cloud for a heavy ResNet-152 classification. The edge model tested at 99% accuracy offline. In production, cloud ingest bandwidth spikes from 1.5 Gbps to 15 Gbps at dusk, crashing the ingest gateway.
question: Why does the cloud ingest bandwidth spike by 10x at dusk, crashing the gateway?
details:
  realistic_solution: The INT8 post-training quantization was calibrated using a high-quality, well-lit cloud dataset. At dusk, the cheap Image Signal Processors (ISPs) on the edge cameras amplify sensor noise to compensate for low light. This specific noise distribution shifts the activation ranges outside the calibrated INT8 clipping thresholds, destroying the model's zero-point accuracy. The edge model's false positive rate spikes dramatically, sending a massive flood of empty, noisy frames to the cloud and saturating the network.
  common_mistake: |
    **The Pitfall:** Assuming physical foot traffic increases.
    **The Rationale:** Candidates invent behavioral reasons (e.g., "more people walk at dusk") rather than diagnosing the mathematical shift in ISP sensor noise affecting INT8 activations.
    **The Consequence:** The candidate fails to identify the quantization failure, leading to unnecessary autoscaling costs rather than model re-calibration.
  napkin_math: |
    *   **Normal operation:** 30 fps × 1,000 cameras = 30,000 fps.
    *   **Normal false positive rate (1%):** 300 fps sent to cloud.
    *   **Normal bandwidth:** 300 fps × 500 KB/frame = 150 MB/s = 1.2 Gbps.
    *   **Dusk operation (12.5% false positive rate):** 3,750 fps sent to cloud.
    *   **Dusk bandwidth:** 3,750 fps × 500 KB/frame = 1,875 MB/s = **15 Gbps**.
    *   **Result:** Network is saturated.
