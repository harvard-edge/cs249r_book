title: The Hybrid Cascade False Positive Storm
scenario: A cloud video analytics platform uses 1,000 edge cameras. The edge runs a 2 TOPS INT8 person-detector
  to filter frames. Positive frames are sent to the cloud for a heavy ResNet-152 classification. The edge
  model tested at 99% accuracy offline. In production, cloud ingest bandwidth spikes from 1.5 Gbps to
  15 Gbps at dusk, crashing the ingest gateway. Why does the cloud get overwhelmed?
details:
  realistic_solution: The INT8 post-training quantization was calibrated using a high-quality, well-lit
    cloud dataset. At dusk, the cheap Image Signal Processors (ISPs) on the edge cameras amplify sensor
    noise to compensate for low light. This specific noise distribution shifts the activation ranges outside
    the calibrated INT8 clipping thresholds, destroying the model's zero-point accuracy. The edge model's
    false positive rate spikes dramatically, sending a massive flood of empty, noisy frames to the cloud
    and saturating the network.
  common_mistake: Assuming the cloud auto-scaler failed to provision enough GPUs for a sudden increase
    in physical foot traffic at dusk.
  napkin_math: 'Normal operation: 30 fps * 1000 cameras = 30,000 fps total. 1% false positive rate = 300
    fps sent to cloud. 300 fps * 500 KB/frame = 150 MB/s = 1.2 Gbps. Dusk operation: ISP noise shifts
    activations, increasing false positive rate to 12.5%. 30,000 fps * 12.5% = 3,750 fps to cloud. 3,750
    * 500 KB = 1.875 GB/s = 15 Gbps. Cloud network link is saturated.'
