title: The Gradient Accumulation vs. Data Parallelism Choice
scenario: You need an effective batch size of 4M tokens for your 13B model. You have 128 GPUs available. Two approaches are proposed: (A) micro-batch 32K tokens/GPU with no gradient accumulation (128 × 32K = 4M), vs. (B) micro-batch 8K tokens/GPU with 4 accumulation steps (128 × 8K × 4 = 4M).
question: What are the systems-level tradeoffs between large micro-batches (A) and smaller micro-batches with gradient accumulation (B)?
details:
  realistic_solution: 'Approach A (large micro-batch, no accumulation): Higher activation memory per GPU (32K tokens worth of activations), but only 1 AllReduce per optimizer step. The larger matmuls have higher arithmetic intensity → better GPU utilization. Risk: may OOM at 32K token micro-batch for a 13B model. Approach B (small micro-batch, 4× accumulation): Lower activation memory per GPU (only 8K tokens stored), but still only 1 AllReduce per optimizer step (gradients accumulate locally). The smaller matmuls have lower arithmetic intensity → worse GPU utilization per micro-step. However, you can overlap forward/backward of micro-step N+1 with nothing — no communication to overlap with. Key insight: both approaches have identical communication cost (1 AllReduce per weight update). The difference is purely compute efficiency and memory. Approach A is faster if memory allows because larger matmuls are more efficient. Approach B exists when memory is the binding constraint.'
  common_mistake: |
    **The Pitfall:** Assuming both approaches have identical performance.
    **The Rationale:** Candidates see that both reach the same 4M effective batch size and assume the compute/memory profiles are therefore identical.
    **The Consequence:** The candidate ignores the severe OOM risks of Approach A and the MFU degradation of Approach B.
  napkin_math: |
    *   **Approach A:** 1 forward(32K) + 1 backward(32K) + 1 AllReduce. High arithmetic intensity (~45% MFU). Uses ~40 GB activation memory (OOM risk).
    *   **Approach B:** 4 × [forward(8K) + backward(8K)] + 1 AllReduce. Lower arithmetic intensity (~35% MFU). Uses ~10 GB activation memory (safe).
    *   **Result:** Approach A is faster but memory-intensive. Approach B reduces activation memory by 4× but is **~20% slower** due to lower MFU.
