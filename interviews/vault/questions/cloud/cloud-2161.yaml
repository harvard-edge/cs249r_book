title: The Gradient Accumulation vs. Data Parallelism Choice
scenario: 'You need an effective batch size of 4M tokens for your 13B model. You have 128 GPUs available. Two approaches are proposed: (A) micro-batch 32K tokens/GPU with no gradient accumulation (128 × 32K = 4M), vs. (B) micro-batch 8K tokens/GPU with 4 accumulation steps (128 × 8K × 4 = 4M).'
question: What are the systems-level tradeoffs between large micro-batches (A) and smaller micro-batches with gradient accumulation (B)?
details:
  realistic_solution: 'Approach A (large micro-batch, no accumulation): Higher activation memory per GPU (32K tokens worth of activations), but only 1 AllReduce per optimizer step. The larger matmuls have higher arithmetic intensity → better GPU utilization. Risk: may OOM. Approach B (small micro-batch, 4× accumulation): Lower activation memory per GPU, but still only 1 AllReduce per optimizer step. The smaller matmuls have lower arithmetic intensity → worse GPU utilization per micro-step. Both approaches have identical communication cost.'
  common_mistake: |
    **The Pitfall:** Assuming both approaches have identical performance.
    **The Rationale:** Candidates see that both reach the same 4M effective batch size and assume the compute/memory profiles are therefore identical.
    **The Consequence:** The candidate ignores the severe OOM risks of Approach A and the MFU degradation of Approach B.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Approach A: micro-batch 32K.
       - Approach B: micro-batch 8K, 4x accumulation.
    2. **Calculations:**
       - Approach A uses ~40 GB activation memory (~45% MFU).
       - Approach B uses ~10 GB activation memory (~35% MFU).
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound tradeoffs. Approach A is faster but memory-intensive. Approach B reduces activation memory by 4x but is ~20% slower due to lower MFU.**
