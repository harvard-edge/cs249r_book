title: TPU v5e as Prefill Accelerator
scenario: Your team proposes using TPU v5e exclusively for the prefill pool, with H100 for decode. You need to evaluate whether this accelerator combination is effective for a 7B BF16 model.
question: Is TPU v5e a better prefill accelerator than H100 for a 7B BF16 model, and what practical constraints make the TPU-GPU setup painful?
details:
  realistic_solution: '7B BF16 model = 14 GB. TPU v5e chip: 16 GB — fits with 2 GB spare (very tight for activations at long context). A 4-chip node has 64 GB total. Prefill compute: 197 TFLOPS BF16 per chip vs H100''s 989 TFLOPS. TPU v5e is 5× slower per chip in raw compute but much cheaper. For compute-bound prefill at S=1024: H100 latency = 2×7e9×1024/(989e12) = 14.5 ms. TPU v5e = 2×7e9×1024/(197e12) = 72.8 ms — 5× slower. KV transfer cost from TPU to H100 decode: same InfiniBand cost. Operational constraints: (1) XLA requires static input shapes or re-compilation for each new shape — dynamic sequence lengths cause XLA retracing storms. (2) TPU→GPU KV transfer requires format conversion (BF16→FP16 or vice versa). (3) JAX/XLA ecosystem doesn''t integrate with vLLM serving stack natively. Not recommended unless cost is the primary driver and TTFT SLO > 500 ms.'
  common_mistake: |
    **The Pitfall:** Comparing raw TFLOPS directly without accounting for compiler latency and tile sizes.
    **The Rationale:** Candidates often ignore that TPU v5e's peak is for systolic array operations with specific matrix tile sizes, and that XLA compilation adds per-shape compilation latency that hurts dynamic input lengths.
    **The Consequence:** Proposing an architecture that crashes from retracing storms or fails SLA constraints.
  napkin_math: |
    1. Cost comparison: TPU v5e ~$1.20/chip-hour vs H100 ~$3.50/GPU-hour.
    2. Prefill throughput ratio: H100/TPU = 989/197 = 5.02×.
    3. Cost efficiency: H100 costs 3.50/989 = $0.00354/TFLOPS-hour.
    4. TPU v5e: 1.20/197 = $0.00609/TFLOPS-hour.
    **Result:** H100 is actually more cost-efficient per TFLOP. TPU v5e has an advantage only if the workload perfectly fits systolic tile sizes and uses XLA fusion aggressively.
