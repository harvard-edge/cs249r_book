title: HBM3 vs L2 Cache Access Patterns for Transformer Weights on H100
scenario: An H100 has 80MB L2 cache and 3.35 TB/s HBM3. During LLM inference at batch_size=1, the attention
  QKV projection for a layer with d_model=8192 requires loading weights of shape [8192, 3×8192] = 3×8192²×2
  bytes = 402MB. Determine the caching behavior and per-token latency.
question: "Will the 402MB QKV weight matrix fit in H100 L2 during batch-1 decode, and what per-token latency does HBM streaming imply?"
details:
  realistic_solution: 'QKV weight matrix: 3×8192×8192×2B = 402MB >> 80MB L2. Cache miss rate near 100%
    for weight access. Each token decode must stream 402MB from HBM. At 3.35 TB/s: 402MB/3.35TB/s = 0.12ms
    for QKV alone. Full layer (add MLP 2×8192×32768×2B = 1.07GB): total ≈ 1.47GB per layer. For 80-layer
    model: 80 × 1.47GB = 118GB per token decode. At 3.35 TB/s: 35ms/token ≈ 28 tok/s — memory bound. Key
    insight: model weights must be kept in HBM for large models; increasing batch size amortizes weight
    loading cost.'
  common_mistake: Assuming weights stay in L2 cache between tokens during decode; the 402MB weight matrix
    is 5× larger than 80MB L2, so it must be streamed from HBM every token.
  napkin_math: 'QKV weight: 402MB. MLP weights: 1.07GB. Per layer: 1.47GB. 80 layers = 118GB. At 3.35
    TB/s: 35ms/token, 28 tok/s. Batch=8: same weight load, 8 tokens output → 228 tok/s effective throughput.'
