title: Feature Store Backfill Strategy
scenario: You're adding a new feature 'user_lifetime_value' to the feature store. Training requires 2
  years of historical values (point-in-time correct), but the feature pipeline only started computing
  this feature today. You have raw transaction logs going back 3 years in S3 (200 TB). How do you backfill
  the feature store efficiently?
question: "How do you backfill the feature store efficiently?"
details:
  realistic_solution: 'Partition the backfill by time windows (e.g., daily or weekly chunks) and process
    them independently. Steps: (1) write the feature computation as a pure function of (entity_id, event_timestamp,
    raw_events) — ensuring determinism and point-in-time correctness; (2) partition the 200 TB log into
    daily slices (~275 GB/day); (3) run parallel Spark jobs, one per day, writing to a partitioned offline
    store (Delta Lake with event_time partition); (4) validate by spot-checking known entities against
    manual calculations; (5) register the feature with the feature store metadata, enabling point-in-time
    joins for training. Use spot instances for the backfill since it''s a one-time, fault-tolerant batch
    job.'
  common_mistake: Running the current feature pipeline code against 2 years of historical data in one
    massive batch job. This often fails due to memory issues, costs thousands of dollars, and may produce
    incorrect results if the computation logic isn't idempotent.
  napkin_math: '200 TB raw logs ÷ 730 days = 275 GB/day. Spark throughput on spot: ~100 GB/hr per 10-node
    cluster. Per day: 275 GB / 100 GB/hr = 2.75 hrs. Run 30 days in parallel on 30 clusters: total wall
    time = 2.75 hrs × 25 batches = ~69 hrs total (but 2.75 hrs wall time). Spot cost: 30 clusters × 10
    nodes × $0.30/hr × 2.75 hrs × 25 = $6,188 total. Output size: 10M users × 730 days × 8 bytes = 58
    GB (manageable).'
