title: What Causes a Checkpoint Storm
scenario: Your 1,024-GPU training job checkpoints every 2 hours. During checkpointing, all training stops
  for 30 minutes instead of the expected 5 minutes. Explain what a checkpoint storm is and why it happens.
question: "What is a checkpoint storm, and why does checkpointing on 1,024 GPUs take 30 minutes instead of 5?"
details:
  realistic_solution: 'A checkpoint storm occurs when all distributed workers simultaneously write their
    state to a shared file system (e.g., Lustre, GPFS, or NFS). With 1,024 workers each writing a multi-GB
    checkpoint, the aggregate I/O demand can be hundreds of TB in a burst. The shared storage has finite
    bandwidth (e.g., 100 GB/s for the whole filesystem), so writes queue up. Worse, the storage metadata
    server gets overwhelmed by thousands of simultaneous file create operations. The result: writes that
    take 5 minutes with 8 GPUs take 30 minutes with 1,024. This is a classic incast problem — many-to-one
    traffic overwhelming a shared resource. The checkpoint itself becomes the bottleneck, and during this
    time all GPUs sit idle.'
  common_mistake: Thinking checkpoint time scales linearly with model size alone. The bottleneck is usually
    the shared storage system being overwhelmed by simultaneous writes from all workers.
  napkin_math: '1024 GPUs × 4GB state each = 4TB burst. Shared FS at 100 GB/s: 4TB/100GB/s = 40s ideal,
    but metadata + contention → 30 min actual.'
