title: Minimizing Radio Usage
scenario: We are designing a battery-powered IoT smart camera that detects specific bird species.
question: Which architectural approach will typically result in the lowest overall power consumption?
details:
  realistic_solution: Wireless transmission (e.g., Wi-Fi, cellular) is extremely power-hungry compared to local computation. Running a lightweight TinyML model on the edge device to only transmit data when a bird is detected minimizes radio usage, dramatically saving power.
  common_mistake: |
    **The Pitfall:** Believing that transmitting raw data to a powerful cloud server is always more energy-efficient than performing complex computations locally.
    **The Rationale:** Assuming that because edge processors are weak, they must be power-hungry for ML tasks.
    **The Consequence:** Draining the IoT device battery in hours instead of months because the radio remains active.
  napkin_math: |
    - **Always-on Streaming:** 200 mW (Wi-Fi) × 24 hours = **4.8 Wh/day**
    - **Local Inference:** 5 mW (MCU) × 24 hours = 0.12 Wh
    - **Event Transmission:** 200 mW × 0.1 hours (10 short events) = 0.02 Wh
    - **Total Local:** 0.12 + 0.02 = **0.14 Wh/day**
    - **Conclusion:** Local TinyML detection uses **~34x less power** than continuous cloud streaming.
  options:
  - Running a local TinyML model to detect birds and only powering on the Wi-Fi radio to transmit cropped
    images of detected birds.
  - Streaming a continuous 720p video feed to a cloud server to leverage highly optimized cloud GPUs for
    detection.
  - Using a local model to detect motion, but sending all full-frame motion-triggered images to the cloud
    for species classification.
  - Keeping the Wi-Fi radio in a constant low-power listening state and bypassing the local microcontroller
    entirely.
