title: Edge LLM Unified Memory Sizing
scenario: Deploying a local 8B parameter coding assistant on an Apple Silicon laptop with a Unified Memory
  Architecture (16GB RAM, 100GB/s bandwidth). The OS and IDE constantly consume 6GB. The target is 20
  tokens/sec, supporting a 32,000 token context window. Architect the precision and memory layout to prevent
  catastrophic SSD swapping.
details:
  realistic_solution: 'With Unified Memory, the CPU and GPU share the same physical RAM, but exceeding
    physical capacity invokes swap space (SSD), which destroys LLM inference speed. Total available RAM
    = 16GB - 6GB (OS) = 10GB. An 8B model in FP16 requires 16GB (OOM). The architecture must aggressively
    compress both weights and KV cache. Step 1: Quantize weights to 4-bit (e.g., AWQ/GGUF), reducing weight
    footprint to ~4.5GB. Step 2: Quantize the KV cache to 8-bit. A 32k context KV cache in FP16 takes
    ~4.2GB. At 8-bit, it takes ~2.1GB. Total memory footprint: 4.5GB (weights) + 2.1GB (KV) + 1GB (workspace)
    = 7.6GB. This fits safely under the 10GB limit, avoiding SSD swap.'
  common_mistake: Loading the model in FP16 and assuming the OS will gracefully swap to the NVMe SSD,
    which drops token generation speed from 20 tokens/sec to <1 token/sec due to SSD latency.
  napkin_math: 'Available Memory = 10GB. 8B model at 4-bit = 8 billion * 0.5 bytes = 4.0GB + metadata
    = ~4.5GB. Memory bandwidth is 100GB/s. Generating 1 token requires reading all weights. 100GB/s /
    4.5GB = 22.2 tokens/sec theoretical maximum, which perfectly aligns with the 20 tokens/sec SLA. KV
    Cache calculation: 32,000 tokens * 32 layers * 8 heads * 128 dim * 2 bytes (FP16) * 2 (K+V) = 4,194,304,000
    bytes (~4.2GB). Quantizing to 8-bit halves this to 2.1GB, leaving a 2.4GB safety buffer for IDE spikes.'
