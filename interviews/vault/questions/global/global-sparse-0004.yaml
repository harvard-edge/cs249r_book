title: Cross-Surface Privacy Budget Spec
scenario: A product uses DP analytics in cloud logs, mobile telemetry, and federated training. Specify how privacy budget should be tracked across these surfaces.
question: What privacy-budget accounting is needed when cloud analytics, mobile telemetry, and federated training all use DP?
details:
  realistic_solution: The spec should define user identity scope, event scope, epsilon/delta accounting per mechanism, composition over time, opt-out behavior, and reporting cadence. Separate teams cannot spend privacy budget independently if the same user contributes to multiple surfaces. Simple composition is the conservative baseline; tighter accounting such as RDP may be used if specified.
  common_mistake: Treating each DP system as isolated and forgetting composition across product surfaces.
  napkin_math: Under simple composition, weekly epsilons 0.2, 0.1, and 0.5 add to 0.8 per week for the same user scope.
