title: Fairness Metrics Across Product Surfaces
scenario: A model runs in a cloud web app, a mobile app, and an offline kiosk. User attributes available for fairness evaluation differ by surface.
question: What fairness evaluation plan stays comparable when cloud, mobile, and kiosk deployments expose different subgroup attributes?
details:
  realistic_solution: The plan should define shared outcome metrics, allowed proxy/grouping features, privacy constraints, minimum subgroup sample sizes, and a reporting hierarchy. It can compare common slices where available and use environment/device cohorts where protected attributes are unavailable, but it must document non-comparable slices explicitly.
  common_mistake: |
    **The Pitfall:** Forcing every surface to report the same raw sensitive attributes, or treating incomparable subgroup metrics as directly equivalent.
    **The Rationale:** Candidates assume uniformity in data collection, ignoring distinct privacy constraints and technical realities of different platforms.
    **The Consequence:** Causes massive data privacy violations or blocks fairness evaluation entirely on restrictive platforms.
  napkin_math: |
    - One surface has 20 subgroups and another has 5 cohorts.
    - Unweighted averages treat incompatible slice definitions as equally meaningful.
    - **This can hide missing coverage or severe bias in specific unmeasured segments.**
