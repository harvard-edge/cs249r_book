title: Fairness Metrics Across Product Surfaces
scenario: A model runs in a cloud web app, a mobile app, and an offline kiosk. User
  attributes available for fairness evaluation differ by surface. Specify a fairness
  evaluation plan that remains comparable without requiring identical raw attributes
  everywhere.
question: What fairness evaluation plan stays comparable when cloud, mobile, and kiosk
  deployments expose different subgroup attributes?
details:
  realistic_solution: The plan should define shared outcome metrics, allowed proxy/grouping
    features, privacy constraints, minimum subgroup sample sizes, and a reporting
    hierarchy. It can compare common slices where available and use environment/device
    cohorts where protected attributes are unavailable, but it must document non-comparable
    slices explicitly.
  common_mistake: Forcing every surface to report the same raw sensitive attributes,
    or treating incomparable subgroup metrics as directly equivalent.
  napkin_math: If one surface has 20 subgroups and another has 5 cohorts, an unweighted
    average treats incompatible slice definitions as equally meaningful and can hide
    missing coverage.
