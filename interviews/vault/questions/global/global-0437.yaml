title: Designing 3D Parallelism Topology for Inter-Node Bottlenecks
scenario: Mapping a 500B parameter model across 1024 A100 GPUs. Hardware constraints feature 600 GB/s NVLink intra-node and heavily bottlenecked 400 Gbps InfiniBand inter-node connections.
question: Create an optimal placement strategy for Tensor (TP), Pipeline (PP), and Data Parallelism (DP) to prevent the 400 Gbps links from starving the GPUs.
details:
  realistic_solution: "TP requires an AllReduce every transformer layer, moving full activation sizes, so TP=8 must be strictly constrained to the 600 GB/s intra-node NVLink. PP only passes micro-batch border activations, making it ideal for inter-node links. DP gradients can be synchronized asynchronously in the background. Thus, the optimal hierarchy binds TP=8 intra-node, while distributing PP and ZeRO-DP across the 400 Gbps inter-node mesh to minimize payload sizes over slow links."
  common_mistake: |
    **The Pitfall:** Placing Tensor Parallelism across nodes.
    **The Rationale:** Candidates might distribute shards across the largest pool of GPUs without regard for the communication intensity of the parallelism strategy.
    **The Consequence:** Immediately saturates the 50 GB/s inter-node link given TP's massive and frequent communication volume, bottlenecking the entire training run.
  napkin_math: |
    * Inter-node link: 400 Gbps / 8 = 50 GB/s.
    * Intra-node link (NVLink): 600 GB/s.
    * **The intra-node bandwidth is 12x faster than the inter-node bandwidth (600 / 50).**
