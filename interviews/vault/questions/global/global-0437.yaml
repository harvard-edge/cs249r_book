title: Designing 3D Parallelism Topology for Inter-Node Bottlenecks
scenario: Mapping a 500B parameter model across 1024 A100 GPUs. Hardware constraints
  feature 600 GB/s NVLink intra-node and heavily bottlenecked 400 Gbps InfiniBand
  inter-node connections.
question: Create an optimal placement strategy for Tensor (TP), Pipeline (PP), and
  Data Parallelism (DP) to prevent the 400 Gbps links from starving the GPUs.
details:
  realistic_solution: TP requires an AllReduce every transformer layer, moving full
    activation sizes, so TP=8 must be strictly constrained to the 600 GB/s intra-node
    NVLink. PP only passes micro-batch border activations, making it ideal for inter-node
    links. DP gradients can be synchronized asynchronously in the background. Thus,
    the optimal hierarchy binds TP=8 intra-node, while distributing PP and ZeRO-DP
    across the 400 Gbps inter-node mesh to minimize payload sizes over slow links.
  common_mistake: Placing Tensor Parallelism across nodes, immediately saturating
    the 50 GB/s inter-node link given TP's massive communication volume.
  napkin_math: 400 Gbps = 50 GB/s inter-node vs 600 GB/s intra-node.
