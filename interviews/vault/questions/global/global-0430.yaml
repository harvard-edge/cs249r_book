title: Activation Memory Optimization Choice
scenario: A training job can use activation checkpointing or reduce sequence length. Checkpointing adds 18% compute but preserves model quality; reducing sequence length cuts activation memory by 40% but hurts long-context quality.
question: How would you choose between activation checkpointing and reducing sequence length to solve activation memory pressure?
details:
  realistic_solution: If long-context quality is important, checkpointing is usually preferable because it trades compute for memory without changing the task. Reducing sequence length is cheaper but changes product capability. The decision depends on compute budget, memory pressure, and quality requirements.
  common_mistake: |
    **The Pitfall:** Choosing the cheapest memory fix (sequence truncation) without considering product impact.
    **The Rationale:** Optimizing solely for hardware utilization and training speed.
    **The Consequence:** Successfully finishing training faster, but delivering a model that fails entirely on long-context tasks required by the business.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Checkpointing compute cost: +18%.
       - Truncation memory savings: -40%, but reduces capability.
    2. **Calculations:**
       - ROI of Checkpointing: 18% compute overhead vs complete loss of product capability.
    3. **Conclusion & Interpretation:**
       - **Result: Capability Preservation.** An 18% compute increase is architecturally justified to maintain the fundamental long-context requirement.
