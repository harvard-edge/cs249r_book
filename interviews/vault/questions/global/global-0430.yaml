title: Activation Memory Optimization Choice
scenario: A training job can use activation checkpointing or reduce sequence length.
  Checkpointing adds 18% compute but preserves model quality; reducing sequence length
  cuts activation memory by 40% but hurts long-context quality. Evaluate the choice.
question: How would you choose between activation checkpointing and reducing sequence
  length to solve activation memory pressure?
details:
  realistic_solution: If long-context quality is important, checkpointing is usually
    preferable because it trades compute for memory without changing the task. Reducing
    sequence length is cheaper but changes product capability. The decision depends
    on compute budget, memory pressure, and quality requirements.
  common_mistake: Choosing the cheapest memory fix without considering that sequence
    length is a product requirement.
  napkin_math: An 18% compute tax may be acceptable if the alternative removes 40%
    of context capability.
