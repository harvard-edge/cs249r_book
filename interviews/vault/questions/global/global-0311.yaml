title: Global New 0012
scenario: A 120B parameter model in FP16 is partitioned evenly across 4 GPUs using Pipeline Parallelism.
question: "Calculate the per-GPU weight memory footprint and compute the transfer delay if 150MB activations are sent between stages via NVLink."
details:
  realistic_solution: "Pipeline parallelism divides layers across GPUs, splitting the weight memory linearly. Calculate the total model size in FP16, then divide by the number of GPUs. The transfer latency between pipeline stages depends on the activation size and the NVLink bandwidth between adjacent GPUs."
  common_mistake: |
    **The Pitfall:** Using the A100 NVLink speed (600GB/s) instead of the H100 NVLink speed (900GB/s) to calculate the pipeline stage delay.
    **The Rationale:** A100 specs are ingrained in memory for many practitioners, leading to outdated math.
    **The Consequence:** Overestimating network transfer latency by 50% during pipeline microbatch scheduling.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Total parameters = 120B.
       - Precision = FP16 (2 bytes/param).
       - Hardware: 4 GPUs, NVLink bandwidth = 900GB/s.
       - Activation size = 150MB.
    2. **Calculations:**
       - Total weights = 120B × 2 bytes = 240GB.
       - Per-GPU footprint = 240GB / 4 = 60GB per GPU.
       - Activation transfer delay = 150MB / 900GB/s = 0.15GB / 900GB/s = 0.000166s.
    3. **Conclusion & Interpretation:**
       - **Result: Communication-Bound. Transfer delay = 0.166 ms.**
