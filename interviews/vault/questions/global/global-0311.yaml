title: Global New 0012
scenario: A 120B parameter model in FP16 is partitioned evenly across 4 H100 GPUs using Pipeline Parallelism.
  Calculate the per-GPU weight memory footprint. Then compute the transfer delay if 150MB activations
  are sent between stages via NVLink.
details:
  realistic_solution: Pipeline parallelism divides layers across GPUs, splitting the weight memory linearly.
    Calculate the total model size in FP16, then divide by the number of GPUs. The transfer latency between
    pipeline stages depends on the activation size and the NVLink bandwidth between adjacent GPUs.
  common_mistake: Using the A100 NVLink speed (600GB/s) instead of the H100 NVLink speed (900GB/s) to
    calculate the pipeline stage delay.
  napkin_math: Total weights = 120B * 2B = 240GB. Per-GPU footprint = 240GB / 4 = 60GB. Activation transfer
    delay = 150MB / 900GB/s = 0.15GB / 900GB/s = 0.000166s (0.166 ms).
