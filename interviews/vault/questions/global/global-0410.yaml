title: DMA Pipeline Requirements Spec
scenario: A systems team wants a portable data-movement layer for cloud GPUs, edge accelerators, and mobile NPUs.
question: What requirements should decide whether a portable data-movement layer uses pinned buffers, zero-copy, or explicit DMA copies?
details:
  realistic_solution: The spec should include payload size, transfer frequency, memory ownership, alignment constraints, accelerator addressability, page-fault behavior, synchronization points, and overlap opportunities. Cloud often benefits from pinned asynchronous copies, edge may need double buffering, and mobile often prefers zero-copy shared buffers if supported.
  common_mistake: |
    **The Pitfall:** Choosing a data movement mechanism by platform name instead of by payload size, addressability, and synchronization cost.
    **The Rationale:** Believing that a specific platform (e.g., "mobile") always implies a single optimal strategy.
    **The Consequence:** Creating a brittle data-movement layer that performs poorly under varying operational constraints.
  napkin_math: |
    - **Large payload:** A 4 MB payload transferred 1,000 times/s requires **4 GB/s** of copy bandwidth.
    - **Small payload:** For a 4 KB payload, DMA setup overhead can exceed the actual data transfer time.
    - **Implication:** Transfer sizes dictate whether to optimize for bandwidth (explicit DMA) or latency (zero-copy/setup overhead).
