title: DMA Pipeline Requirements Spec
scenario: A systems team wants a portable data-movement layer for cloud GPUs, edge
  accelerators, and mobile NPUs. Specify the requirements needed to decide when to
  use pinned buffers, zero-copy, or explicit DMA copies.
question: What requirements should decide whether a portable data-movement layer uses
  pinned buffers, zero-copy, or explicit DMA copies?
details:
  realistic_solution: The spec should include payload size, transfer frequency, memory
    ownership, alignment constraints, accelerator addressability, page-fault behavior,
    synchronization points, and overlap opportunities. Cloud often benefits from pinned
    asynchronous copies, edge may need double buffering, and mobile often prefers
    zero-copy shared buffers if supported.
  common_mistake: Choosing a data movement mechanism by platform name instead of by
    payload size, addressability, and synchronization cost.
  napkin_math: For a 4 MB payload repeated 1,000 times/s, copy demand is 4 GB/s; for
    a 4 KB payload, setup overhead can dominate bandwidth.
