title: 'DMA Pipeline Requirements Spec'
scenario: 'A systems team wants a portable data-movement layer for cloud GPUs, edge accelerators, and mobile NPUs.'
question: 'What requirements should decide whether a portable data-movement layer uses pinned buffers, zero-copy, or explicit DMA copies?'
details:
  realistic_solution: 'The spec should include payload size, transfer frequency, memory ownership, alignment constraints, accelerator addressability, page-fault behavior, synchronization points, and overlap opportunities. Cloud often benefits from pinned asynchronous copies, edge may need double buffering, and mobile often prefers zero-copy shared buffers if supported.'
  common_mistake: |
    **The Pitfall:** Choosing a data movement mechanism based purely on platform name instead of by payload size, addressability, and synchronization cost.
    **The Rationale:** Believing that a specific platform category (e.g., "mobile") always implies a single optimal memory strategy.
    **The Consequence:** Creating a brittle data-movement layer that performs terribly when payloads scale or operational constraints shift.
  napkin_math: |
    **Assumptions & Constraints:**
    - Large payload scenario: 4 MB at 1,000 times/s.
    - Small payload scenario: 4 KB.

    **Calculations:**
    - Large payload bandwidth required: 4 MB * 1000 = 4 GB/s (Explicit DMA favored).
    - Small payload: DMA setup latency (e.g., 10 µs) easily exceeds the actual nanosecond transfer time (Zero-copy favored).

    **Conclusion & Interpretation:**
    - **Result: Bandwidth vs Latency tradeoff (Payload-Size-Bound)**. Dictates the physical copy mechanism.
