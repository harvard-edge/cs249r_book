title: Incomplete Training Recovery Economics
scenario: A team wants to reduce checkpoint cost for a month-long training run. They provide checkpoint size and storage price, but omit cluster MTBF, checkpoint write time, restart time, spot-preemption rate, and value of lost work.
question: How would you evaluate whether reducing checkpoint frequency is worth the added recovery risk for a month-long training run?
details:
  realistic_solution: You need cluster MTBF, checkpoint write time, restart time, preemption/failure distribution, cost of lost GPU-hours, storage bandwidth, and acceptable recovery point. Checkpoint size and storage price only bound storage cost; they do not determine optimal interval or expected lost work. Reducing frequency may save I/O while increasing lost work and schedule risk.
  common_mistake: Optimizing storage cost while ignoring the much larger cost of recomputing lost training progress.
  napkin_math: If a 1,000-GPU job loses 2 hours of work, that is 2,000 GPU-hours lost; at $3/GPU-hour, one failure costs $6,000 before schedule impact.
