title: The A100 Ridge Point
scenario: Calculate the ridge point (in FLOP/Byte) for FP16 Tensor Core operations on a high-bandwidth GPU.
question: What does this number physically mean?
details:
  realistic_solution: 'Ridge point = Peak Compute / Peak Bandwidth = 312 TFLOPS / 2.0 TB/s = 156 FLOP/Byte. This means: if your kernel''s arithmetic intensity is below 156 FLOP/Byte, it is memory-bandwidth-bound (performance limited by how fast data can be fed to the cores). If above 156, it is compute-bound (performance limited by FLOPS). Most inference workloads (batch=1 attention, small-batch MLP) have AI of 1-10 FLOP/Byte — deeply memory-bound. Training with large batches pushes GEMM operations to AI of 500-2000, well into the compute-bound regime. The H100''s ridge point is 989/3.35 = 295 FLOP/Byte.'
  common_mistake: |
    **The Pitfall:** Computing the ridge point for FP32 instead of FP16 Tensor Cores, or using the wrong bandwidth number (DRAM vs L2 cache).
    **The Rationale:** Mixing up precisions or memory hierarchy levels when applying the Roofline model.
    **The Consequence:** Incorrectly identifying workloads as compute-bound when they are actually memory-bound.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Peak Compute: e.g., 312 TFLOPS (FP16).
       - Peak Bandwidth: e.g., 2.0 TB/s (HBM).
    2. **Calculations:**
       - Ridge point: 312 TFLOPS / 2.0 TB/s = 156 FLOP/Byte.
    3. **Conclusion & Interpretation:**
       - **Result: 156 FLOP/Byte. Divides Memory-Bandwidth-Bound from Compute-Bound regimes.**
