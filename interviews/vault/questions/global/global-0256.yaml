title: The A100 Ridge Point
scenario: Calculate the ridge point (in FLOP/Byte) of the A100 for FP16 Tensor Core operations. What does
  this number physically mean?
details:
  realistic_solution: 'Ridge point = Peak Compute / Peak Bandwidth = 312 TFLOPS / 2.0 TB/s = 156 FLOP/Byte.
    This means: if your kernel''s arithmetic intensity is below 156 FLOP/Byte, it is memory-bandwidth-bound
    (performance limited by how fast data can be fed to the cores). If above 156, it is compute-bound
    (performance limited by FLOPS). Most inference workloads (batch=1 attention, small-batch MLP) have
    AI of 1-10 FLOP/Byte — deeply memory-bound. Training with large batches pushes GEMM operations to
    AI of 500-2000, well into the compute-bound regime. The H100''s ridge point is 989/3.35 = 295 FLOP/Byte.'
  common_mistake: Computing the ridge point for FP32 instead of FP16 Tensor Cores, or using the wrong
    bandwidth number (DRAM vs cache).
  napkin_math: 'A100: 312 TFLOPS / 2.0 TB/s = 156 FLOP/Byte. H100: 989 TFLOPS / 3.35 TB/s = 295 FLOP/Byte.
    Higher ridge = more operations need to reach compute saturation.'
