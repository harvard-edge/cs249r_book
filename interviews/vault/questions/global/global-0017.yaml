title: 'Network Topologies'
scenario: 'You are designing the network topology for a massive GPU cluster.'
question: 'Why do we use network topologies like Fat-Tree (Clos) instead of a simple traditional Star or Ring network?'
details:
  realistic_solution: 'A Fat-Tree provides full bisection bandwidth. This means any server can communicate with any other server at full line rate without creating a central choke point, which is critical for synchronous operations like AllReduce during training.'
  common_mistake: |
    **The Pitfall:** Believing a Fat-Tree topology reduces the physical length of the cables or that it's the only topology supported by PCIe.
    **The Rationale:** Guessing physical layer constraints instead of understanding non-blocking bisection bandwidth requirements for synchronous collectives.
    **The Consequence:** Designing a cluster with massive oversubscription choke points that bottleneck expensive GPU compute during training.
  napkin_math: |
    **Assumptions & Constraints:**
    - 1 GB gradient sync via Ring AllReduce vs Fat-Tree.
    - Interconnect bandwidth: 400 Gbps (50 GB/s).

    **Calculations:**
    - Ring AllReduce Traffic: 2 * (N-1)/N * Tensor Size ≈ 2 GB data transferred per GPU.
    - Ring Time: 2 GB / 50 GB/s = 40 ms.
    - Fat-Tree Time (full bisection): ~8 ms.

    **Conclusion & Interpretation:**
    - **Result: ~5x speedup (Network-Bisection-Bound)**. Resolved by Fat-Tree architecture.
  options:
  - 'It is the only topology supported by PCIe Gen5.'
  - 'It provides high, non-blocking bisection bandwidth across the entire cluster.'
  - 'It allows GPUs to share a single unified L2 cache.'
  - 'It eliminates the need for network switches entirely.'
