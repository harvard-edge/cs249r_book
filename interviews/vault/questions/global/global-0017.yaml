title: Network Topologies
scenario: In a massive GPU cluster, why do we use network topologies like Fat-Tree (Clos) instead of a
  simple traditional Star or Ring network?
details:
  realistic_solution: A Fat-Tree provides full bisection bandwidth. This means any server can communicate
    with any other server at full line rate without creating a central choke point, which is critical
    for synchronous operations like AllReduce during training.
  common_mistake: Believing it reduces the physical length of the cables.
  napkin_math: '- Ring AllReduce on 256 GPUs: 2×(N-1)/N × data size. For 1 GB gradients: ~2 GB total traffic
    | - Ring at 400 Gbps (50 GB/s): ~40 ms. Fat-Tree with full bisection: ~8 ms | - => Fat-Tree cuts collective
    communication time by ~5×'
  options:
  - It is the only topology supported by PCIe Gen5.
  - It provides high, non-blocking bisection bandwidth across the entire cluster.
  - It allows GPUs to share a single unified L2 cache.
  - It eliminates the need for network switches entirely.
  correct_index: 1
