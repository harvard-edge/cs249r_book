title: The Multi-LoRA Throughput Cliff
scenario: You serve a base LLaMA-3-8B model with 500 user-specific LoRA adapters on a single L40S GPU.
  When 32 concurrent requests hit the *same* user adapter, throughput is an excellent 1500 tokens/sec.
  However, when 32 requests hit 32 *different* user adapters in the same batch, throughput plummets to
  200 tokens/sec, despite GPU SM utilization showing 100%.
question: "Why does throughput collapse when a batch contains 32 different LoRA adapters despite 100% GPU utilization?"
details:
  realistic_solution: The bottleneck is the degradation of the compute bound Batched GEMM into multiple
    memory-bound GEMVs. In multi-LoRA serving (like Punica), the base model weights are shared and execute
    as a highly efficient Batched GEMM (Matrix-Matrix multiplication). However, the LoRA specific weights
    (A and B matrices) must be applied individually per request. When 32 requests use the same LoRA, the
    LoRA application is also a Batched GEMM. When they use 32 different LoRAs, the operation fractures
    into 32 separate GEMV (Matrix-Vector) operations. GEMVs are heavily memory-bandwidth bound. The GPU
    spends all its time loading the different LoRA weights from HBM into SRAM rather than computing, completely
    starving the SMs of data (even though monitoring tools might show 100% 'utilization' due to memory
    stalls).
  common_mistake: Assuming the performance drop is due to swapping LoRA weights in and out of GPU VRAM
    from host memory.
  napkin_math: L40S Memory Bandwidth = 864 GB/s. For 32 requests with 32 *different* LoRAs (Rank 32, hidden
    4096), the system must load 32 distinct sets of A and B matrices per layer. Size per LoRA layer =
    2 * (4096 * 32) * 2 bytes = 524 KB. Total memory read for LoRAs per layer = 32 * 524 KB = 16.7 MB.
    If generation takes 3ms/token (target), required bandwidth just for LoRA weights = 16.7 MB / 3ms =
    5.5 GB/s. While this fits in BW, the overhead of launching 32 un-fused GEMV kernels per layer destroys
    compute intensity. The arithmetic intensity drops from ~100 FLOPs/byte (GEMM) to 1 FLOP/byte (GEMV),
    making the operation strictly memory bound and increasing latency by 5-10x.
