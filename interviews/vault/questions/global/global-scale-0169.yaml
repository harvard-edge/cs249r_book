title: GPU Serving Rollout Spec
scenario: You are specifying rollout requirements for a GPU serving platform that runs LLM and vision models. Updates may reload 10 GB model images and can take minutes per pod. Specify the rollout controls needed so model reloads do not violate latency SLOs.
question: What rollout controls are required for GPU serving pods that reload 10 GB model images during updates?
details:
  realistic_solution: The spec should include max unavailable pods, pre-warmed replacement capacity, readiness gates after model load, traffic draining, canary health metrics, rollback triggers, and model-cache warmup checks. Large model images make pod readiness different from container start; traffic should not route until weights are loaded and latency is measured.
  common_mistake: Treating GPU model pods like stateless web pods whose readiness is immediate after container start.
  napkin_math: At 1 GB/s effective load speed, a 10 GB model takes at least 10 seconds to load; at 100 MB/s it takes 100 seconds, before initialization and cache warmup.
