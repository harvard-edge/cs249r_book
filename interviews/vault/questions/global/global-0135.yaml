title: Paged Attention Internal Fragmentation
scenario: You are designing a high-throughput translation API. The system requires a batch size of 128 to meet the 2000 QPS throughput SLA. Average prompt + generation length is 80 tokens. You configure PagedAttention with a block size of 512 tokens to minimize pointer overhead. The system constantly OOMs at a batch size of 128.
question: Why does PagedAttention with 512-token blocks OOM at batch size 128 for 80-token translation requests?
details:
  realistic_solution: "Decompose the memory allocation latency and capacity. The architectural failure is massive internal memory fragmentation. With a block size of 512 tokens, every request, regardless of its actual length, reserves a minimum of one full block. Since the average request is 80 tokens, 432 tokens of KV cache memory per request are pre-allocated but completely wasted. This is an 84% memory waste. The architecture requirement is to reduce the PagedAttention block size to 16 or 32 tokens. This drastically reduces internal fragmentation, freeing up enough VRAM to easily support the required batch size of 128 without buying more hardware."
  common_mistake: |
    **The Pitfall:** Adding more GPUs to increase total VRAM, or reducing model precision to fit the batch size.
    **The Rationale:** OOMs generally imply a lack of hardware capacity or a need for compression.
    **The Consequence:** Spending immense budget on unnecessary hardware or degrading model quality when the true culprit is simply an inefficiently large paging block size.
  napkin_math: |
    * Llama-2 13B KV per token: 2 * 40 layers * 40 heads * 128 dim * 2 bytes ≈ 800 KB.
    * Block size 512: 512 tokens * 800 KB = ~400 MB per block.
    * Reserved for batch 128: 128 blocks * 400 MB = 51.2 GB.
    * Actual needed: 128 * 80 tokens * 800 KB ≈ 8 GB.
    * Wasted memory = 51.2 GB - 8 GB = 43.2 GB.
    * Block size 16: each request needs ceil(80/16) = 5 blocks. 5 * 16 * 800 KB = 64 MB per request.
    * Total reserved (batch 128, block 16): 128 * 64 MB = 8.2 GB.
    * **Reducing block size eliminates 43.2 GB of internal fragmentation, solving the OOM.**
