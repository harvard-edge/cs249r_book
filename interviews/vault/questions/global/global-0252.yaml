title: Bytes per Parameter Across Precisions
scenario: You are evaluating model sizes across FP32, FP16, INT8, and INT4 formats to determine hardware feasibility.
question: "What is the total VRAM footprint for a 70B parameter model in each format?"
details:
  realistic_solution: 'FP32 = 4 bytes, FP16/BF16 = 2 bytes, INT8 = 1 byte, INT4 = 0.5 bytes. For a 70B model: FP32 = 70B x 4 = 280 GB. FP16 = 70B x 2 = 140 GB. INT8 = 70B x 1 = 70 GB. INT4 = 70B x 0.5 = 35 GB. This is why quantization is transformative for deployment: a 70B model that requires 2x A100-80GB in FP16 fits on a single A100-80GB in INT8, or a single 48GB GPU in INT4.'
  common_mistake: |
    **The Pitfall:** Forgetting INT4 is half a byte (4 bits = 0.5 bytes) or neglecting quantization overhead.
    **The Rationale:** Candidates miscalculate bit-to-byte conversions or ignore the metadata required for block quantization.
    **The Consequence:** Underestimating memory footprints, resulting in out-of-memory errors when deploying heavily quantized models.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 70B parameter model across various precisions.
    2. **Calculations:**
       - FP32: 70B * 4B = 280 GB.
       - FP16: 70B * 2B = 140 GB.
       - INT8: 70B * 1B = 70 GB.
       - INT4: 70B * 0.5B = 35 GB.
    3. **Conclusion & Interpretation:**
       - **Result: Logarithmic Memory Scaling.** Each halving of precision halves the memory footprint and doubles effective memory bandwidth.
