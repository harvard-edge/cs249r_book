title: Depthwise Conv Per-Tensor Collapse
scenario: You deploy an INT8 quantized Conformer acoustic model for global speech recognition. The pipeline
  processes 5,000 hours of audio daily. After switching from FP32 to INT8 using per-tensor PTQ, the Word
  Error Rate (WER) jumps from 4.2% to 28.5%. Standard Convs show no degradation, but the Depthwise Convolution
  layers exhibit massive activation errors. Why?
details:
  realistic_solution: The root cause is applying per-tensor quantization to Depthwise Convolutions. In
    standard convolutions, weights are mixed across input channels, keeping dynamic ranges relatively
    uniform. In Depthwise Convolutions, each channel is convolved independently. The network learns wildly
    different weight magnitudes for different channels (e.g., channel 0 might have a range of [-0.1, 0.1]
    while channel 120 has [-50.0, 50.0]). With per-tensor quantization, a single scale factor is calculated
    based on the global maximum (50.0). Small-magnitude channels are entirely squashed to zero because
    their entire range falls within a single quantization bin, destroying critical acoustic features.
    The fix is per-channel quantization for the weights.
  common_mistake: Assuming the calibration dataset lacked acoustic diversity, leading to clipping of speech
    outliers.
  napkin_math: Global max = 50.0. Per-tensor INT8 scale = 50.0 / 127 = 0.393. Channel 0 range is [-0.1,
    0.1]. Number of representable bins for Channel 0 = (0.1 - (-0.1)) / 0.393 = 0.5 bins. All weights
    in Channel 0 quantize to exactly 0. 100% information loss for that channel.
