title: Depthwise Conv Per-Tensor Collapse
scenario: You deploy an INT8 quantized Conformer acoustic model for global speech recognition. The pipeline processes 5,000 hours of audio daily. After switching from FP32 to INT8 using per-tensor PTQ, the Word Error Rate (WER) jumps from 4.2% to 28.5%. Standard Convs show no degradation, but the Depthwise Convolution layers exhibit massive activation errors.
question: Why do the Depthwise Convolution layers exhibit massive errors under per-tensor INT8 quantization?
details:
  realistic_solution: The root cause is applying per-tensor quantization to Depthwise Convolutions. In standard convolutions, weights are mixed across input channels, keeping dynamic ranges relatively uniform. In Depthwise Convolutions, each channel is convolved independently. The network learns wildly different weight magnitudes for different channels (e.g., channel 0 might have a range of [-0.1, 0.1] while channel 120 has [-50.0, 50.0]). With per-tensor quantization, a single scale factor is calculated based on the global maximum (50.0). Small-magnitude channels are entirely squashed to zero because their entire range falls within a single quantization bin, destroying critical acoustic features. The fix is per-channel quantization for the weights.
  common_mistake: |
    **The Pitfall:** Assuming the calibration dataset lacked acoustic diversity, leading to clipping of speech outliers.
    **The Rationale:** Confusing data-driven calibration errors with structural matrix transformation limitations.
    **The Consequence:** Gathering more calibration data instead of applying the mathematically required per-channel quantization scale.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Global Max: 50.0. INT8 bins: 127.
       - Channel 0 Range: [-0.1, 0.1].
    2. **Calculations:**
       - Scale Factor: 50.0 / 127 ≈ 0.393.
       - Bins for Channel 0: 0.2 / 0.393 ≈ 0.5 bins.
    3. **Conclusion & Interpretation:**
       - **Result: Representation Collapse.** Because Channel 0 maps to less than 1 bin, all its weights quantize exactly to 0, destroying the acoustic feature.
