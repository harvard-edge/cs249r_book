title: Compute Cost Unit Conversion
scenario: A model requires 3e18 FLOPs for one training run. A GPU delivers 300 TFLOP/s sustained.
question: How many GPU-hours are required for 3e18 FLOPs at 300 TFLOP/s sustained throughput?
details:
  realistic_solution: Runtime on one GPU is 3e18 / 300e12 = 10,000 seconds, or 2.78 hours. The minimum compute budget is 2.78 GPU-hours before communication, input stalls, and failures.
  common_mistake: |
    **The Pitfall:** Mixing FLOPs (total operations) and FLOP/s (rate), or using peak hardware throughput instead of sustained.
    **The Rationale:** Spec sheets advertise peak TFLOP/s, leading to overly optimistic runtime estimates.
    **The Consequence:** Underestimating compute costs and scheduling deadlines by 2x to 3x.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Total FLOPs = 3e18.
       - Sustained throughput = 300 TFLOP/s.
    2. **Calculations:**
       - 300 TFLOP/s = 300e12 FLOP/s.
       - Runtime = 3e18 / 300e12 = 10,000 seconds.
       - GPU-hours = 10,000 / 3600 = 2.78 hours.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound Budget**
