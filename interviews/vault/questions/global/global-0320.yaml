title: Compute Cost Unit Conversion
scenario: A model requires 3e18 FLOPs for one training run. A GPU delivers 300 TFLOP/s
  sustained. Calculate the minimum GPU-hours for the run before overhead.
question: How many GPU-hours are required for 3e18 FLOPs at 300 TFLOP/s sustained
  throughput?
details:
  realistic_solution: Runtime on one GPU is 3e18 / 300e12 = 10,000 seconds, or 2.78
    hours. The minimum compute budget is 2.78 GPU-hours before communication, input
    stalls, and failures.
  common_mistake: Mixing FLOPs and FLOP/s units, or using peak rather than sustained
    throughput.
  napkin_math: 3e18 / 300e12 = 10,000 s. 10,000 / 3,600 = 2.78 GPU-hours.
