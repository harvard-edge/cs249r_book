title: SRAM Overlay Thrashing in Backprop
scenario: A Cortex-M4 loads a 250KB model into a 64KB SRAM overlay. A 3-layer FL backward pass takes 2.4s instead of 250ms.
question: Why does the 3-layer FL backward pass take 2.4s instead of the 250ms predicted by FLOP counts?
details:
  realistic_solution: "Catastrophic memory overlay thrashing. Backprop dictates a large concurrent working set (weights, forward activations, and downstream gradients). Exceeding the 64KB SRAM limit triggers continuous, synchronous Flash I/O evictions, burying compute times under massive I/O delays."
  common_mistake: |
    **The Pitfall:** Concluding that calculating gradients inherently requires 10x more operations than the forward pass.
    **The Rationale:** Backpropagation is mathematically more complex, making engineers assume it is simply compute-bound.
    **The Consequence:** Wasting time profiling ALU utilization or trying to optimize math kernels, instead of fixing the catastrophic memory manager thrashing.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - SRAM Overlay: 64 KB
       - Flash read delay: 2 ms per fetch
       - Swaps per layer: 360 tiles
    2. **Calculations:**
       - Thrashing IO: 3 layers * 360 tiles * 2 ms = 2,160 ms (2.16s)
       - Total time: 2.16s + 0.25s compute = 2.41s
    3. **Conclusion & Interpretation:**
       - **Result: I/O-Bound (Thrashing)**
