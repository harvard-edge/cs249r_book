title: High-Density LoRA Adapter Swapping
scenario: You must serve 10,000 distinct LoRA adapters for a 13B base model on a single H100 (80GB). Each
  adapter is 50MB. The traffic follows a heavy-tailed Zipfian distribution. The strict latency SLA is
  200ms per request. Architect a multi-tier memory hierarchy to route and swap adapters without stalling
  the base model compute pipeline.
question: "How would you serve 10,000 50MB LoRA adapters on one 80GB H100 without violating the 200ms SLA?"
details:
  realistic_solution: 'Design a 3-tier caching architecture: HBM (L1), Pinned Host DRAM (L2), and NVMe
    (L3). The 13B base model takes ~26GB (FP16). Allocate 40GB of HBM as an LRU cache for the hottest
    ~800 adapters. Allocate 500GB of pinned Host DRAM for the remaining 9,200 adapters. Crucially, use
    separate CUDA streams for compute and memory transfers. When a request arrives for an un-cached adapter,
    trigger an async DMA transfer from Pinned DRAM to HBM over PCIe. Batch requests by adapter ID. While
    the DMA transfer occurs, the compute stream processes requests for already-cached adapters. This perfectly
    overlaps PCIe memory bandwidth with GPU compute.'
  common_mistake: Synchronously copying adapters from Host DRAM to GPU HBM on every request using standard
    `cudaMemcpy`, which blocks the compute stream and violates the 200ms SLA during burst traffic.
  napkin_math: 10,000 adapters * 50MB = 500GB total size (exceeds 80GB HBM). Base model = 26GB. PCIe Gen5
    x16 bandwidth = 64GB/s. Transferring a 50MB adapter takes 50MB / 64GB/s = ~0.78ms. A typical forward
    pass for the base model takes ~20ms. Since 0.78ms << 20ms, the PCIe transfer of the adapter can be
    completely hidden behind the compute of the previous batch, provided async streams and pinned memory
    are used.
