title: High-Density LoRA Adapter Swapping
scenario: You must serve 10,000 distinct LoRA adapters for a 13B base model on a single GPU. Each adapter is 50MB. The traffic follows a heavy-tailed Zipfian distribution. The strict latency SLA is 200ms per request.
question: How would you architect a multi-tier memory hierarchy to serve 10,000 adapters without violating the 200ms SLA?
details:
  realistic_solution: 'Design a 3-tier caching architecture: HBM (L1), Pinned Host DRAM (L2), and NVMe (L3). The 13B base model takes ~26GB (FP16). Allocate 40GB of HBM as an LRU cache for the hottest ~800 adapters. Allocate 500GB of pinned Host DRAM for the remaining 9,200 adapters. Crucially, use separate CUDA streams for compute and memory transfers. When a request arrives for an un-cached adapter, trigger an async DMA transfer from Pinned DRAM to HBM over PCIe. Batch requests by adapter ID. While the DMA transfer occurs, the compute stream processes requests for already-cached adapters. This perfectly overlaps PCIe memory bandwidth with GPU compute.'
  common_mistake: |
    **The Pitfall:** Synchronously copying adapters from Host DRAM to GPU HBM on every request using standard cudaMemcpy.
    **The Rationale:** It's the simplest way to load weights, assuming the PCIe transfer is fast enough on its own.
    **The Consequence:** The compute stream is blocked during the transfer, accumulating latency delays that violate the 200ms SLA during burst traffic.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 10,000 adapters at 50MB = 500GB total size.
       - PCIe Gen5 x16 bandwidth = 64GB/s.
    2. **Calculations:**
       - Adapter transfer time = 50MB / 64GB/s = 0.78ms.
       - Base model forward pass = ~20ms.
    3. **Conclusion & Interpretation:**
       - **Result: PCIe-Bandwidth Bound**
