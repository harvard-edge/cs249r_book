title: Buy vs Rent GPU Break-Even
scenario: An A100-80GB costs $15,000 and has a 3-year useful life. Cloud A100 instances cost $2.50/GPU-hour.
question: At 80% utilization, after how many months does buying an A100-80GB break even versus $2.50/GPU-hour cloud rental?
details:
  realistic_solution: 'On-prem monthly cost: $15,000 / 36 months = $417/mo depreciation. Add ~50% overhead (power, cooling, staff) = $625/mo total. Cloud monthly cost at 80% util: 0.80 \times 24h \times 30d \times $2.50 = $1,440/mo. Break-even: $15,000 / ($1,440 - $625) \approx 18.4 months. After ~18 months, owning is cheaper IF you maintain 80% utilization. Below ~45% utilization, cloud is always cheaper over 3 years.'
  common_mistake: |
    **The Pitfall:** Forgetting that on-prem costs include power, cooling, and networking, or forgetting that idle GPUs still cost money.
    **The Rationale:** People compare the raw hardware MSRP directly to the cloud hourly rate without accounting for TCO overheads or actual utilization rates.
    **The Consequence:** Purchasing millions of dollars of hardware that sits idle 50% of the time, making it far more expensive than cloud instances.
  napkin_math: |
    **Assumptions & Constraints:**
    - On-prem A100 cost: $15,000 (3-year useful life). Overhead: 50%.
    - Cloud A100 cost: $2.50/GPU-hour. Utilization: 80%.

    **Calculations:**
    - On-prem base cost: $15,000 / 36 months = $417/mo. Total with overhead = $625/mo.
    - Cloud cost/month @ 80% util: 0.80 * 720h * $2.50 = $1,440/mo.
    - Monthly savings: $1,440 - $625 = $815/mo.
    - Break-even: $15,000 / $815 = 18.4 months.

    **Conclusion & Interpretation:**
    - **Result: 18.4 months (TCO-Bound)**. Owning is cheaper after ~18 months at 80% utilization.
