title: The Wear-Out Checkpoint
scenario: A fleet of edge devices is running continuous federated learning. Devices are inexplicably dying
  after 45 days in the field. Post-mortem logs show hard faults occurring specifically during the weight
  update serialization phase to internal storage.
question: "What is causing the edge devices to hard fault during weight update serialization after 45 days?"
details:
  realistic_solution: The root cause is Flash memory wear-out caused by excessive write cycles to the
    same locality. Federated learning requires updating the model weights and saving them locally. If
    the system is configured to save checkpoints to the internal Flash memory every 10 minutes, it writes
    144 times a day to the same sectors. Standard microcontroller Flash has an endurance of about 10,000
    erase/write cycles. The specific sectors holding the weights degrade and fail, causing ECC errors
    or hard faults when the CPU attempts to read the corrupted weights during the next execution cycle.
  common_mistake: Blaming a stack overflow or an out-of-bounds pointer in the serialization library handling
    the model weights.
  napkin_math: 1 update / 10 mins = 6 updates / hour = 144 updates / day. In 45 days, 144 * 45 = 6,480
    cycles. If the sector endurance is rated for 10k cycles (typical for high-density embedded flash,
    dropping at high temperatures), localized wear-out begins. The solution is wear-leveling or saving
    to external FRAM.
