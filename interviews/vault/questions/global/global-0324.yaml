title: Cost Guardrail Design
scenario: A team wants to add a more accurate model that increases inference cost from $0.001 to $0.004 per request. The feature serves 30 million requests/month.
question: What cost guardrail should you set before rolling out a model that raises cost from $0.001 to $0.004 over 30M monthly requests?
details:
  realistic_solution: Incremental cost is $0.003 per request. At 30M requests/month, that is $90,000/month. A guardrail should cap rollout percentage, measure quality lift per dollar, and require rollback if lift does not justify the added spend.
  common_mistake: |
    **The Pitfall:** Approving a better model from accuracy alone without computing the monthly aggregate spend.
    **The Rationale:** Focusing strictly on ML metrics and treating infrastructure cost as an afterthought.
    **The Consequence:** Unintentionally inflating the monthly cloud bill by nearly $100k for an unproven business ROI.
  napkin_math: |
    - **Incremental Cost:** $0.004 - $0.001 = **$0.003 per request**
    - **Monthly Volume:** 30,000,000 requests
    - **Monthly Delta:** 30M × $0.003 = **$90,000/month**
