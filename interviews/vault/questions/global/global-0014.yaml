title: The KV-Cache Bottleneck
scenario: During auto-regressive LLM generation, the compute utilization (MFU) often drops significantly
  as the sequence length grows. What memory structure is the primary cause of this slowdown?
details:
  realistic_solution: The KV-Cache (Key-Value Cache). As the sequence grows, the attention mechanism must
    store and repeatedly read the historical Keys and Values from memory for every single generated token.
    This turns generation into a heavily memory-bandwidth-bound operation.
  common_mistake: Blaming the network or the sheer size of the model weights.
  napkin_math: '- Llama-2-7B KV cache at 4K tokens: ~2 GB (32 layers × 32 heads × 128 dim × 4K × 2 bytes
    × 2) | - Each new token must read the entire KV cache from HBM | - => At 2 TB/s HBM bandwidth, that
    is 1 ms just for the KV read per token'
  options:
  - The L1 Instruction Cache
  - The Parameter Server
  - The Gradient Checkpoint buffer
  - The Key-Value (KV) Cache
