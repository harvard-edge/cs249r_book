title: The Risk Classification Framework
scenario: The EU AI Act classifies AI systems into four risk tiers. A company deploys an LLM-based chatbot for customer service in the EU.
question: "Which risk tier does it fall under, and what are the compliance obligations?"
details:
  realistic_solution: 'A general customer-service chatbot is ''limited-risk'' under the AI Act. The primary obligation is transparency: users must be informed they are interacting with AI. If the chatbot is used in a high-risk domain (e.g., employment screening), it escalates to ''high-risk'', requiring conformity assessments.'
  common_mistake: |
    **The Pitfall:** Assuming all AI systems are "high-risk" under the AI Act.
    **The Rationale:** Candidates hear about strict EU regulations and assume they apply uniformly to all AI use cases regardless of context.
    **The Consequence:** Over-engineering compliance solutions and spending hundreds of thousands of dollars on unnecessary conformity assessments.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Limited-risk vs High-risk compliance costs.
    2. **Calculations:**
       - Limited-risk transparency: ~$10K (disclosure UI).
       - High-risk conformity assessment: $200K-$500K.
    3. **Conclusion & Interpretation:**
       - **Result: Context-Bound Classification.** Misclassification leads to massive financial waste or regulatory fines.
