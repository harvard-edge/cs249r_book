title: The Risk Classification Framework
scenario: The EU AI Act classifies AI systems into four risk tiers: unacceptable, high-risk, limited-risk, and minimal-risk. A company deploys an LLM-based chatbot for customer service in the EU.
question: Which risk tier does it fall under, and what are the compliance obligations?
details:
  realistic_solution: 'A general customer-service chatbot is ''limited-risk'' under the AI Act. The primary obligation is transparency: users must be informed they are interacting with an AI system. However, if the chatbot is used in a high-risk domain (e.g., insurance claim decisions, employment screening), it escalates to ''high-risk'' — requiring conformity assessments, technical documentation, human oversight mechanisms, and registration in the EU database. The classification depends on the USE CASE, not the technology.'
  common_mistake: |
    **The Pitfall:** Assuming all AI systems are "high-risk" under the AI Act.
    **The Rationale:** Candidates hear about strict EU regulations and assume they apply uniformly to all AI use cases regardless of context.
    **The Consequence:** Over-engineering compliance solutions and spending hundreds of thousands of dollars on unnecessary conformity assessments.
  napkin_math: |
    - Compliance cost estimate:
    - Limited-risk transparency: ~$10K (disclosure UI + documentation).
    - High-risk conformity assessment: $200K-$500K.
    - **Non-compliance fine: up to 35M EUR or 7% of global revenue.**
