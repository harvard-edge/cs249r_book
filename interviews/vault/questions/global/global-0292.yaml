title: Expert Parallelism for MoE Training
scenario: A Mixtral-style 8x7B MoE model is being trained on 64 H100 GPUs across 8 nodes.
question: How would you specify the expert partitioning, handle token routing all-to-all communication, and estimate the communication overhead?
details:
  realistic_solution: "Implement Expert Parallelism (EP=8) intra-node and Data Parallelism (DP=8) inter-node. With ZeRO-3, params drop to ~14.4 GB per GPU. Token routing requires massive AllToAll collectives. Over NVLink, the token shuffling absorbs ~9% overhead. Top-2 MoE fundamentally depends on overlapping DP synchronization and exploiting localized EP bandwidth."
  common_mistake: |
    **The Pitfall:** Treating MoE like a dense model and using standard TP/PP.
    **The Rationale:** Engineers familiar with dense LLMs default to tensor or pipeline parallelism without realizing MoE requires routing tokens to distributed experts.
    **The Consequence:** A severely suboptimal deployment that fails to leverage the sparsity of MoE and chokes on inappropriate communication patterns.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - EP=8, DP=8 on 64 GPUs
       - AllToAll volume: 128 MB/GPU
       - NVLink: 450 GB/s uni-directional
    2. **Calculations:**
       - NVLink pass: 128 MB / 450 GB/s = 0.28ms * 32 layers = ~9ms
       - Total comms (fwd/bwd): ~18ms per step
       - Ratio over 200ms compute = 9%
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound (Minimal Comm Overhead)**
