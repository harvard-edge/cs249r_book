title: Expert Parallelism for MoE Training
scenario: A Mixtral-style 8x7B MoE model (47B total params, top-2 routing, 8 experts per layer) is being trained on 64 H100 GPUs across 8 nodes. The model has 32 transformer layers with MoE FFN.
question: How would you specify the expert partitioning, handle token routing all-to-all communication, and estimate the communication overhead?
details:
  realistic_solution: 'Configuration: EP=8 (expert parallel), DP=8 (8 nodes). Each GPU in an EP group holds 1 of the 8 experts per layer. Shared layers (attention, embeddings) are replicated across all 8 GPUs in the EP group. (1) Expert placement: within each node (8 GPUs, NVLink), each GPU holds a different expert for all 32 MoE layers. The model has 47B total params. With active params per token at ~13B (top-2), we deduce: Shared + 2*Expert = 13B, and Shared + 8*Expert = 47B. Thus, each Expert is ~5.6B params and Shared is ~1.6B params. Each GPU holds 1/8th of the MoE params (5.6B) plus the Shared params (1.6B) = 7.2B params. At 16 bytes/param for mixed-precision training state, this is 115 GB, which exceeds 80GB H100 VRAM. Applying ZeRO-3 across the DP=8 groups reduces per-GPU model state to 115 GB / 8 ≈ 14.4 GB, comfortably fitting in memory. (2) All-to-all communication: top-2 routing means each token goes to 2 of 8 experts. For batch=32, seq=2048: 32 × 2048 = 65,536 tokens × 2 copies = 131,072 token-expert pairs. Each token''s hidden state: 4096 × 2B = 8 KB. All-to-all volume per layer: 131,072 × 8 KB / 8 GPUs = 128 MB per GPU sent + 128 MB received. Over NVLink (450 GB/s effective unidirectional): 128 MB / 450 = 0.28ms per layer × 32 layers = 9.1ms per forward. (3) Cross-node DP gradient sync: AllReduce for Shared and Expert gradients over IB (7.2B params × 2B = 14.4 GB). Time: 14.4 GB / 50 GB/s × 2 = 0.58s (overlapped with backward). (4) Total comm overhead: ~18ms (all-to-all forward+backward) + residual DP sync. With 200ms compute per step: 18/200 = 9% communication overhead for expert routing.'
  common_mistake: |
    **The Pitfall:** Treating MoE like a dense model and using standard TP/PP.
    **The Rationale:** Engineers familiar with dense LLMs default to tensor or pipeline parallelism without realizing MoE requires routing tokens to distributed experts.
    **The Consequence:** A severely suboptimal deployment that fails to leverage the sparsity of MoE and chokes on inappropriate communication patterns.
  napkin_math: |
    - Model params: Shared + 8*Expert = 47B, Shared + 2*Expert = 13B -> Expert=5.6B, Shared=1.6B.
    - Params per GPU = 1.6B + 5.6B = 7.2B.
    - State memory w/ ZeRO-3 (DP=8): 7.2B * 16B / 8 = 14.4 GB.
    - All-to-all per layer: 65K tokens * 2 routes * 8KB / 8 GPUs = 128 MB/GPU.
    - NVLink time: 128 MB / 450 GB/s = 0.28ms * 32 layers = 9ms forward.
    - DP sync: 14.4 GB * 2 / 50 GB/s = 0.58s (overlapped).
    - **Expert routing communication overhead is ~9% (assuming 200ms compute).**
