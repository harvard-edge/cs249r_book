title: Incomplete Network Bottleneck Triage
scenario: An ML service reports slowdowns after moving traffic between cloud regions and edge gateways. The team provides average request size but omits fanout, retry rate, compression, link capacity, cross-region RTT, and tail-latency targets.
question: What missing network information is needed before diagnosing cross-region and edge-gateway slowdowns?
details:
  realistic_solution: You need link capacity, RTT, fanout pattern, retry behavior, payload distribution, compression ratio, queueing, and tail-latency SLOs. Average request size alone gives an average bandwidth lower bound but cannot identify congestion or tail behavior.
  common_mistake: |
    **The Pitfall:** Using average payload size to conclude the network is fine.
    **The Rationale:** Failing to account for multiplicative effects like retry storms or microservice fanout.
    **The Consequence:** Misdiagnosing severe network congestion as a "healthy" link.
  napkin_math: |
    - Base traffic: 200 KB/request × 5,000 rps = 1 GB/s.
    - Retry multiplier: 20% retry rate increases load to **1.2 GB/s**.
    - **Total Load:** Actual bandwidth demand multiplies further when factoring in fanout.
