title: Incomplete Network Bottleneck Triage
scenario: An ML service reports slowdowns after moving traffic between cloud regions
  and edge gateways. The team gives average request size but omits fanout, retry rate,
  compression, link capacity, cross-region RTT, and tail-latency targets.
question: What missing network information is needed before diagnosing cross-region
  and edge-gateway slowdowns?
details:
  realistic_solution: You need link capacity, RTT, fanout pattern, retry behavior,
    payload distribution, compression ratio, queueing, and tail-latency SLOs. Average
    request size alone gives an average bandwidth lower bound but cannot identify
    congestion or tail behavior.
  common_mistake: Using average payload size to conclude the network is fine, while
    fanout or retries multiply traffic during bursts.
  napkin_math: If average payload is 200 KB at 5,000 rps, base traffic is 1 GB/s.
    A retry rate of 20% raises offered load to 1.2 GB/s before fanout.
