title: Static vs Continuous Batching for LLM Serving
scenario: Your LLM serving system processes requests with highly variable output lengths (10-2000 tokens). Compare static batching vs continuous batching.
question: "How would you quantify the throughput difference for a batch of 32 requests where lengths range from 50 to 1500 tokens?"
details:
  realistic_solution: 'Static batching: all 32 requests run until the longest (1500 tokens) completes. If average length is 500 tokens, short requests waste token-slots. Total compute = 32 x 1500 = 48,000 token-steps. Useful compute = sum of actual lengths \u2248 32 x 500 = 16,000. GPU utilization = 16,000/48,000 = 33%. Continuous batching: using Orca-style iteration-level scheduling, when a request finishes, a new request is immediately inserted. Utilization approaches 100% (minus scheduling overhead). Throughput improvement: 100%/33% \u2248 3x. This is why engines like vLLM and TensorRT-LLM use continuous batching by default.'
  common_mistake: |
    **The Pitfall:** Assuming continuous batching only helps with latency.
    **The Rationale:** Candidates fail to realize static batching wastes GPU cycles on padding after short requests complete.
    **The Consequence:** Missing the primary throughput benefit that makes continuous batching mandatory for serving at scale.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Batch size = 32.
       - Max sequence = 1500 tokens, Avg sequence = 500 tokens.
    2. **Calculations:**
       - Static total steps = 32 * 1500 = 48,000.
       - Continuous total steps (useful) = 32 * 500 = 16,000.
       - Static Utilization = 16,000 / 48,000 = 33%.
       - Continuous Utilization = ~100%.
       - Improvement = 100% / 33% = 3x.
    3. **Conclusion & Interpretation:**
       - **Result: 3x throughput improvement.** (Compute-Bound efficiency gain).
