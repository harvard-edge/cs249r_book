title: Hopper FP8 Format Mismatch
scenario: 'Migrating a dense 100B transformer to Hopper H100 GPUs, the infrastructure team switches the
  serving engine to use FP8 to double the MAC throughput (target: 8000 QPS). They blindly cast all FP16
  weights and activations to the E5M2 FP8 format. Benchmarks show the target throughput is reached, but
  the model''s accuracy drops catastrophically (MMLU score drops from 72% to 45%).'
question: "How should FP8 formats and scaling be chosen to preserve accuracy while meeting the H100 throughput target?"
details:
  realistic_solution: 'The architecture must selectively utilize the two distinct FP8 formats: E4M3 (4
    exponent bits, 3 mantissa bits) and E5M2 (5 exponent bits, 2 mantissa bits). E5M2 provides a larger
    dynamic range (like FP16) which is highly beneficial for gradient representation during training.
    However, for inference (weights and forward activations), dynamic range is less critical than precision.
    The solution is to cast weights and activations to E4M3, which provides an extra bit of mantissa (higher
    precision), effectively preserving the model''s accuracy. Furthermore, per-tensor or per-channel scaling
    factors must be computed during calibration to map the FP16 values into the representable range of
    E4M3.'
  common_mistake: Assuming all FP8 formats are interchangeable and applying E5M2 uniformly to maximize
    dynamic range, destroying the mantissa precision needed for forward-pass inference.
  napkin_math: 'E5M2 has 2 mantissa bits: 2^2 = 4 fractional values per bin, max value ~57344. E4M3 has
    3 mantissa bits: 2^3 = 8 fractional values per bin (double the precision), max value ~448. Inference
    activations rarely exceed 448 (especially with LayerNorm), making E4M3 the mathematically superior
    choice for reducing quantization noise in the forward pass.'
