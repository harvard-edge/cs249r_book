title: Hopper FP8 Format Mismatch
scenario: The infra team serves a 100B model on H100s via E5M2 FP8 formatting, but accuracy plummets from 72% to 45% MMLU.
question: How should FP8 formats and scaling be chosen to preserve accuracy while meeting the H100 throughput target?
details:
  realistic_solution: 'Deploy heterogeneous FP8 sub-types. E5M2 offers dynamic range essential for backprop gradients. Forward-pass inference strictly necessitates precision via the E4M3 format. Forcing E5M2 for weights eviscerates mantissa bits, destroying accuracy. Scale to E4M3 using pre-calibrated max-scaling per channel.'
  common_mistake: |
    **The Pitfall:** Assuming all FP8 formats are interchangeable and applying E5M2 uniformly to maximize dynamic range.
    **The Rationale:** E5M2's range is closer to FP16, leading to a false sense of security, ignoring the fact that it destroys the mantissa precision needed for forward-pass inference.
    **The Consequence:** Catastrophic accuracy degradation that completely negates the throughput benefits of FP8 quantization.
  napkin_math: |
    **Assumptions & Constraints:**
    - E5M2: 5 exp, 2 mantissa (4 fractionals)
    - E4M3: 4 exp, 3 mantissa (8 fractionals)

    **Calculations:**
    - Inference precision gap: E4M3 preserves 2x resolution vs E5M2

    **Conclusion & Interpretation:**
    - **Result: Precision-Bound (Mantissa Truncation)**. Using E5M2 for weights destroys accuracy; E4M3 provides the precision needed for inference.
