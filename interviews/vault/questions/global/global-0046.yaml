title: The ML CI/CD Pipeline Design
scenario: A VP of Engineering mandates: 'We need CI/CD for our ML models, just like we have for our microservices. Every PR should trigger automated tests, and models should deploy automatically when tests pass.'
question: Why is microservice-style CI/CD incomplete for ML, and what ML-native CI/CD pipeline would you design?
details:
  realistic_solution: 'The VP''s analogy fails in three ways: (1) Artifact complexity: a microservice is defined by code. An ML model is defined by code + data + training process. CI must validate all three. (2) Test cost: microservice unit tests run in seconds. ML model validation requires training (hours/days) and evaluation (minutes/hours). You cannot test every PR with a full training run. (3) Non-determinism: microservice tests are deterministic. ML training is stochastic — the same code and data can produce different models. ''All tests pass'' is probabilistic, not absolute. The ML-native CI/CD pipeline: PR-level checks (minutes): Code linting, type checking, unit tests for data transformations, schema validation on data samples, model architecture smoke test (forward pass on dummy data, gradient check). Merge-level checks (hours): Training on 1% data sample, evaluation on held-out set, comparison against baseline metrics with statistical significance tests, model size and latency benchmarks on target hardware. Release-level checks (days): Full training run, comprehensive evaluation suite, A/B test or canary deployment, human review for high-stakes models. Key design decision: the merge-level check uses a 1% data sample to reduce training time from 24 hours to 15 minutes while catching 80% of regressions. The remaining 20% are caught by the release-level full training, which runs on a scheduled cadence (not per-PR).'
  common_mistake: |
    **The Pitfall:** Building a standard CI/CD pipeline (lint -> unit test -> integration test -> deploy) and treating the model as just another software artifact.
    **The Rationale:** Standard software engineering practices don't account for the fact that ML models depend on data distributions, expensive training runs, and stochastic outcomes.
    **The Consequence:** Astronomical compute costs from naive per-PR training, or deploying degraded models because standard code tests cannot catch data/statistical regressions.
  napkin_math: |
    - Microservice CI: 100 PRs/week * 5 min/PR = 8.3 hours of CI compute.
    - ML CI (naive full training): 100 PRs/week * 24 hr = 2,400 GPU-hours/week = $7,200/week.
    - ML CI (tiered): 100 PRs * 5 min (PR checks) + 20 merges * 15 min (1% sample) + 2 releases * 24 hr (full train) = 8.3 + 5 + 48 = 61.3 GPU-hours/week.
    - **The tiered approach reduces GPU-hours from 2,400 to 61.3, making it 39x cheaper.**
