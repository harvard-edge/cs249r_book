title: The ML CI/CD Pipeline Design
scenario: A VP mandates automatic PR-triggered training and deployments for ML models, analogous to microservices.
question: Why is microservice-style CI/CD incomplete for ML, and what ML-native CI/CD pipeline would you design?
details:
  realistic_solution: 'Microservice equivalence fails on artifact cost and stochasticity. Submitting 24-hour training runs per-PR vaporizes cluster budgets. Deploy a tiered topology: PR checks run deterministic schema linters and dummy-data forward passes. Merge checks train on fractional (1%) data splits. Release checks handle exhaustive epoch cycles chronologically.'
  common_mistake: |
    **The Pitfall:** Building a standard CI/CD pipeline and treating the model as just another software artifact.
    **The Rationale:** Standard software engineering practices don't account for the fact that ML models depend on data distributions, expensive training runs, and stochastic outcomes.
    **The Consequence:** Astronomical compute costs from naive per-PR training, or deploying degraded models because standard code tests cannot catch data/statistical regressions.
  napkin_math: |
    **Assumptions & Constraints:**
    - 100 PRs/week
    - Full training: 24 hrs

    **Calculations:**
    - Naive CI: 100 * 24 h = 2,400 GPU-hours
    - Tiered CI: 20 merges * 15m (1%) + 2 releases * 24h = ~53 GPU-hours

    **Conclusion & Interpretation:**
    - **Result: Compute-Cost Bound (Tiered saves 39x)**. A tiered pipeline prevents exorbitant cluster budget burns for routine CI checks.
