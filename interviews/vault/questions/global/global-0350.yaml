title: Replica Count Lower Bound
scenario: A model server handles 35 requests/s per replica at target latency. Peak demand is 1,000 requests/s.
question: "How many replicas are needed for 1,000 rps if each model server handles 35 rps?"
details:
  realistic_solution: "Minimum replicas are ceil(1,000 / 35) = 29. Production needs additional headroom for failures, rollouts, and tail latency."
  common_mistake: |
    **The Pitfall:** Rounding down or forgetting redundancy and rollout headroom.
    **The Rationale:** Naive division leads to exact-fit capacity without margins.
    **The Consequence:** During a rollout or partial failure, the remaining replicas receive >35 rps, violating target latency and potentially cascading into a system failure.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Peak demand = 1,000 rps.
       - Capacity per replica = 35 rps.
    2. **Calculations:**
       - Base replicas = 1,000 rps / 35 rps per replica = 28.57.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound. Ceiling function requires at least 29 replicas, before adding redundancy.**
