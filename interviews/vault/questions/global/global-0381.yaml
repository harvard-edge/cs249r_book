title: Cross-Regime Preprocessing Throughput
scenario: A preprocessing step costs 3 ms/image on a cloud CPU worker, 9 ms/image on a mobile CPU, and 1.5 ms/image on an edge gateway accelerator. The workload needs 1,000 images/s.
question: How many preprocessors are needed to achieve 1,000 images/s throughput in each regime?
details:
  realistic_solution: 'A single worker handles about 333 images/s in cloud, 111 images/s on mobile, and 667 images/s on edge. To reach 1,000 images/s aggregate capacity, you need about 4 cloud workers, 10 mobile-equivalent parallel pipelines/devices, or 2 edge accelerators. This is a throughput calculation before latency and data movement constraints.'
  common_mistake: |
    **The Pitfall:** Comparing milliseconds per image without converting to throughput.
    **The Rationale:** Failing to calculate the required parallelization to meet system-level throughput goals.
    **The Consequence:** Under-provisioning worker capacity, leading to severe pipeline bottlenecks.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Cloud CPU: 3 ms/image.
       - Mobile CPU: 9 ms/image.
       - Edge Accelerator: 1.5 ms/image.
       - Target throughput: 1,000 images/s.
    2. **Calculations:**
       - Cloud throughput: 1s / 0.003s = 333 img/s -> 1,000 / 333 = 4 workers.
       - Mobile throughput: 1s / 0.009s = 111 img/s -> 1,000 / 111 = 10 workers.
       - Edge throughput: 1s / 0.0015s = 667 img/s -> 1,000 / 667 = 2 workers.
    3. **Conclusion & Interpretation:**
       - **To hit 1,000 images/s, you must provision 4 cloud workers, 10 mobile parallel pipelines, or 2 edge accelerators.**
       - **Result: Compute-Throughput Bound**
