title: Cross-Regime Preprocessing Throughput
scenario: A preprocessing step costs 3 ms/image on a cloud CPU worker, 9 ms/image
  on a mobile CPU, and 1.5 ms/image on an edge gateway accelerator. The workload needs
  1,000 images/s. Estimate worker/device counts for each regime before batching.
question: How many preprocessors are needed for 1,000 images/s if per-image preprocessing
  costs 3 ms cloud, 9 ms mobile, and 1.5 ms edge?
details:
  realistic_solution: A single worker handles about 333 images/s in cloud, 111 images/s
    on mobile, and 667 images/s on edge. To reach 1,000 images/s aggregate capacity,
    you need about 4 cloud workers, 10 mobile-equivalent parallel pipelines/devices,
    or 2 edge accelerators. This is a throughput calculation before latency and data
    movement constraints.
  common_mistake: Comparing milliseconds per image without converting to throughput
    and required parallelism.
  napkin_math: 'Cloud: 1/0.003 = 333 img/s, so ceil(1000/333)=4. Mobile: 111 img/s,
    so 10. Edge: 667 img/s, so 2.'
