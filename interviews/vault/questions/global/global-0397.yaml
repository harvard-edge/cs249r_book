title: Overlap Window Sizing
scenario: A distributed training step has 180 ms of backward compute after the first gradient bucket becomes ready. The exposed all-reduce for all buckets is 240 ms with no overlap. An overlap implementation can hide at most the compute window after each bucket is ready.
question: What communication time remains exposed if 240 ms of all-reduce can overlap with only 180 ms of backward compute?
details:
  realistic_solution: 'At best, overlap hides 180 ms of the 240 ms communication, leaving 60 ms exposed. The step time cannot fall below forward/backward compute plus that exposed tail unless bucketization changes the ready times or communication volume is reduced.'
  common_mistake: |
    **The Pitfall:** Assuming overlap makes all communication completely free.
    **The Rationale:** Overlooking that overlapping communication is strictly bound by the duration of the concurrent compute window.
    **The Consequence:** Over-promising training speedups or misdiagnosing a 60ms residual bottleneck.
  napkin_math: |
    **Assumptions & Constraints:**
    - Communication time: 240 ms.
    - Available compute window for overlap: 180 ms.
    
    **Calculations:**
    - Exposed communication = max(0, 240 - 180) = 60 ms.
    
    **Conclusion & Interpretation:**
    - **Result: 60 ms (Communication-Bound Tail)**. 60 ms remains strictly exposed.
