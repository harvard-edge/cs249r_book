title: Overlap Window Sizing
scenario: A distributed training step has 180 ms of backward compute after the first
  gradient bucket becomes ready. The exposed all-reduce for all buckets is 240 ms
  with no overlap. An overlap implementation can hide at most the compute window after
  each bucket is ready. Estimate the minimum exposed communication if scheduling is
  otherwise ideal.
question: What communication remains exposed if 240 ms of all-reduce can overlap with
  only 180 ms of backward compute?
details:
  realistic_solution: At best, overlap hides 180 ms of the 240 ms communication, leaving
    60 ms exposed. The step time cannot fall below forward/backward compute plus that
    exposed tail unless bucketization changes the ready times or communication volume
    is reduced.
  common_mistake: Assuming overlap makes communication free even when communication
    time exceeds the available compute window.
  napkin_math: Exposed communication lower bound = max(0, 240 - 180) = 60 ms.
