title: The Unfolded BatchNorm Latency Trap
scenario: You deploy an INT8 ResNet-152 image embedding model via TensorRT. Despite the INT8 weights bringing
  the memory down from 230MB to 58MB, the end-to-end latency is 14ms per image—exactly the same as the
  FP32 model. The hardware has dedicated INT8 matrix multipliers (Tensor Cores) capable of 4x speedups.
  Why is there zero latency improvement?
details:
  realistic_solution: 'The root cause is a failure to fold Batch Normalization (BN) layers into the Convolutional
    layers before quantization. In FP32, Conv -> BN -> ReLU is executed sequentially. If BN is not mathematically
    folded into the Conv weights/biases before the INT8 conversion, the graph compiler is forced to execute:
    INT8 Conv -> Dequantize to FP32 -> FP32 BN -> Quantize to INT8 -> INT8 ReLU. The massive overhead
    of inserting hundreds of Quantize/Dequantize nodes and executing memory-bound BN operations in FP32
    completely erases the compute savings of the INT8 Convolutions. Folding BN updates the Conv weights
    (W_new = W * gamma / std) and biases, allowing pure INT8 execution.'
  common_mistake: Blaming the PCIe bus transfer time for hiding the compute speedup, or assuming the model
    is completely memory-bandwidth bound.
  napkin_math: 'ResNet-152 has ~150 Conv+BN blocks. INT8 Conv takes 0.02ms (150 * 0.02 = 3ms). Unfolded
    overhead: Dequantize (0.01ms) + FP32 BN (0.05ms) + Quantize (0.01ms) = 0.07ms per block. 150 * 0.07ms
    = 10.5ms overhead. Total INT8 = 13.5ms. FP32 Conv (0.08ms) + FP32 BN (0.01ms folded) = ~13.5ms. The
    Quant/Dequant overhead equals the FP32 compute time.'
