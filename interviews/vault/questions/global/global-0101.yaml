title: The Unfolded BatchNorm Latency Trap
scenario: You deploy an INT8 ResNet-152 image embedding model via TensorRT. The INT8 weights bring memory down from 230MB to 58MB, but the end-to-end latency is 14ms per image—exactly the same as FP32. The hardware has INT8 Tensor Cores.
question: "Why is there zero latency improvement?"
details:
  realistic_solution: 'The root cause is a failure to fold Batch Normalization (BN) layers into the Convolutional layers before quantization. In FP32, Conv -> BN -> ReLU is executed sequentially. If BN is not mathematically folded into the Conv weights/biases before the INT8 conversion, the graph compiler is forced to execute: INT8 Conv -> Dequantize to FP32 -> FP32 BN -> Quantize to INT8 -> INT8 ReLU. The massive overhead of inserting hundreds of Quantize/Dequantize nodes and executing memory-bound BN operations in FP32 completely erases the compute savings of the INT8 Convolutions. Folding BN updates the Conv weights (W_new = W * gamma / std) and biases, allowing pure INT8 execution.'
  common_mistake: |
    **The Pitfall:** Assuming the model is memory-bandwidth bound or blaming the PCIe bus transfer time.
    **The Rationale:** Memory bounds are common, so engineers look outside the compute kernel when latency doesn't drop.
    **The Consequence:** Missing the software compilation error where Batch Norm was left in FP32, silently forcing thousands of cast operations.
  napkin_math: |
    - **Blocks**: ResNet-152 has ~150 Conv+BN blocks.
    - **INT8 Conv**: 150 * 0.02ms = 3ms.
    - **Unfolded Overhead**: Dequantize (0.01) + FP32 BN (0.05) + Quantize (0.01) = 0.07ms per block.
    - **Total Overhead**: 150 * 0.07ms = 10.5ms.
    - **Total INT8 Time**: 3ms + 10.5ms = 13.5ms.
    - **Total FP32 Time**: Conv (0.08) + Folded BN (0.01) = 13.5ms.
    - **Conclusion**: The Quant/Dequant overhead exactly equals the **13.5ms** FP32 compute time.
