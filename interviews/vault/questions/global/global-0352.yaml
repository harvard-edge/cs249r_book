title: Portable Model Contract
scenario: A team wants one model artifact to run on cloud GPU, mobile NPU, and edge accelerator.
question: What contract is needed for a model artifact to run across cloud GPU, mobile NPU, and edge accelerator targets?
details:
  realistic_solution: 'The contract should define operator set, tensor shapes, quantization formats, dynamic-shape policy, fallback budget, test vectors, numerical tolerance, and per-target compilation checks. Portability requires an explicit compatibility contract, not just exporting ONNX.'
  common_mistake: |
    **The Pitfall:** Assuming a model artifact is portable simply because the file format (like ONNX or TFLite) is widely supported.
    **The Rationale:** Candidates often confuse file format compatibility with actual operator, shape, and precision compatibility across heterogeneous hardware.
    **The Consequence:** Deploying a model that structurally loads but silently falls back to CPU due to unsupported ops, causing severe latency degradation.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model artifact deployment across highly heterogeneous targets.
    - Fallback penalties severely degrade performance.

    **Calculations:**
    - If even 1 unsupported operator triggers a CPU fallback on a mobile edge device, latency can spike by 10x-100x for that layer.

    **Conclusion & Interpretation:**
    - **Result: CPU Fallback Penalty (Hardware-Compatibility-Bound)**. 100% compilation check passes are strictly required across targets; export formats like ONNX do not guarantee operational compatibility.
