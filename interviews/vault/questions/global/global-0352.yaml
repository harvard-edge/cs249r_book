title: Portable Model Contract
scenario: A team wants one model artifact to run on cloud GPU, mobile NPU, and edge
  accelerator. Specify the portable model contract before implementation.
question: What contract is needed for a model artifact to run across cloud GPU, mobile
  NPU, and edge accelerator targets?
details:
  realistic_solution: The contract should define operator set, tensor shapes, quantization
    formats, dynamic-shape policy, fallback budget, test vectors, numerical tolerance,
    and per-target compilation checks. Portability requires an explicit compatibility
    contract, not just exporting ONNX.
  common_mistake: Assuming a model artifact is portable because the file format is
    portable.
  napkin_math: If one unsupported op causes CPU fallback on mobile, the whole portable
    story can fail even if 99% of ops compile.
