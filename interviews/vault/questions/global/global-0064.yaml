title: SRAM Layer Fusion for Edge CNNs
scenario: You are deploying an INT8 vision model on a custom edge accelerator with 4MB of on-chip SRAM
  (500 GB/s bandwidth) and external LPDDR4 DRAM (10 GB/s bandwidth). Processing a high-resolution block
  (Conv 3x3 -> ReLU -> Conv 1x1) takes ~26ms per frame. The MAC units can theoretically execute the operations
  in 2ms. Profiling indicates the chip is stalled waiting on DRAM memory transactions for the intermediate
  activations between the two convolutions.
details:
  realistic_solution: The performance is bottlenecked by the external DRAM bandwidth. The intermediate
    activation tensor is too large to fit in the 4MB SRAM, forcing the accelerator to write the output
    of the 3x3 Conv to external DRAM and immediately read it back for the 1x1 Conv. To optimize this,
    implement Layer Fusion (Depth-First Tiling). By computing a small spatial tile (e.g., 128x128) of
    the 3x3 Conv, the intermediate activations remain small enough to stay entirely within the 4MB SRAM.
    The ReLU and 1x1 Conv are applied immediately to this tile in SRAM, and only the final output is written
    to DRAM. This completely eliminates the DRAM round-trip for intermediate activations.
  common_mistake: 'Applying further weight quantization (e.g., to INT4), which degrades model accuracy
    without addressing the actual bottleneck: the massive intermediate activation memory footprint.'
  napkin_math: 'Assume an intermediate activation of 2M pixels (e.g., 1080p) * 64 channels * 1 byte (INT8)
    = 128 MB. Without fusion: 3x3 Conv writes 128 MB to DRAM, 1x1 Conv reads 128 MB from DRAM. Total DRAM
    traffic = 256 MB. Time spent on DRAM I/O = 256 MB / 10 GB/s = 25.6 ms (matching the 26ms total time).
    With Layer Fusion: Tile size 128x128 * 64 channels = 1 MB. This easily fits in the 4MB SRAM. The intermediate
    128 MB is never written to or read from DRAM. DRAM traffic for intermediate activations is reduced
    to 0 bytes, saving ~25.6 ms and dropping the block latency closer to the compute-bound 2ms limit.'
