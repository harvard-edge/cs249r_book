title: SRAM Layer Fusion for Edge CNNs
scenario: You are deploying an INT8 vision model on a custom edge accelerator with
  4MB of on-chip SRAM and external LPDDR4 DRAM. Processing a high-resolution block
  (Conv 3x3 -> ReLU -> Conv 1x1) takes ~26ms per frame. The MAC units can theoretically
  execute the operations in 2ms. Profiling indicates the chip is stalled waiting on
  DRAM memory transactions for the intermediate activations between the two convolutions.
question: How would you eliminate the DRAM bottleneck between Conv 3x3, ReLU, and
  Conv 1x1 on the 4MB-SRAM edge accelerator?
details:
  realistic_solution: The performance is bottlenecked by the external DRAM bandwidth.
    The intermediate activation tensor is too large to fit in the 4MB SRAM, forcing
    the accelerator to write the output of the 3x3 Conv to external DRAM and immediately
    read it back for the 1x1 Conv. To optimize this, implement Layer Fusion (Depth-First
    Tiling). By computing a small spatial tile (e.g., 128x128) of the 3x3 Conv, the
    intermediate activations remain small enough to stay entirely within the 4MB SRAM.
    The ReLU and 1x1 Conv are applied immediately to this tile in SRAM, and only the
    final output is written to DRAM. This completely eliminates the DRAM round-trip
    for intermediate activations.
  common_mistake: '**The Pitfall:** Applying further weight quantization (e.g., INT4)
    to speed up the model.

    **The Rationale:** Quantization is the standard go-to for edge model optimization
    to reduce latency.

    **The Consequence:** Model accuracy degrades without addressing the actual bottleneck,
    which is the massive intermediate activation footprint.

    '
  napkin_math: '**Assumptions & Constraints:**

    - 4MB SRAM, 10 GB/s DRAM.

    - Activation size = 2M pixels * 64 channels * 1 byte = 128 MB.


    **Calculations:**

    - Without fusion DRAM I/O = 128 MB write + 128 MB read = 256 MB.

    - I/O time = 256 MB / 10 GB/s = 25.6 ms.

    - With fusion (128x128 tiles) = 1 MB (fits in 4MB SRAM).


    **Conclusion & Interpretation:**

    - **Result: Memory-Bandwidth Bound**. Layer fusion keeps intermediate activations
    in SRAM, eliminating DRAM bottleneck.

    '
