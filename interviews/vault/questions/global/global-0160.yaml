title: Flash Block Erase Write Amplification
scenario: A smart thermostat (nRF52840, 1MB Flash) uses on-device FL. Every night, it writes a 64KB updated
  weight delta to an internal Flash partition. After 6 months, the nightly update causes the device watchdog
  to reset. Profiling shows the write operation, normally taking 120ms, now blocks the CPU for over 1.8
  seconds.
question: "Why does the nightly 64KB Flash weight-delta write grow from 120ms to 1.8s after 6 months?"
details:
  realistic_solution: 'The root cause is write amplification due to poor spatial locality in the Flash
    storage system (e.g., LittleFS/NVS). Flash memory is divided into large erase pages (e.g., 4KB). As
    the filesystem fragments over 6 months, the 64KB update no longer writes to empty pages. Instead,
    it triggers garbage collection: reading partially filled pages into SRAM, erasing the flash block,
    and rewriting the combined data. This blocking read-modify-write cycle starves the watchdog timer.'
  common_mistake: Assuming the Flash memory cells have worn out (endurance failure) after only 180 write
    cycles.
  napkin_math: '64KB delta = 16 x 4KB pages. Clean write: 16 * 7.5ms (write time) = 120ms. Fragmented
    write (Garbage Collection): Requires erasing and rewriting ~20 blocks. Erase time = 85ms per block.
    20 * 85ms = 1.7 seconds + 150ms write time = 1.85 seconds, exceeding a typical 1.5s watchdog timeout.'
