title: The FLOPS vs Time Calculation
scenario: An operation requires 10 TeraFLOPs ($10^{13}$ operations).
question: If your GPU has a peak performance of 100 TFLOPS, what is the theoretical minimum time to finish this operation?
details:
  realistic_solution: 100 milliseconds (0.1 seconds). Time = 10 TeraFLOPs / 100 TFLOPS = 0.1 seconds.
  common_mistake: |
    **The Pitfall:** Getting the decimal point wrong.
    **The Rationale:** Calculating 10/100 quickly and misplacing the decimal or confusing milliseconds and seconds.
    **The Consequence:** An incorrect time estimate of 0.01 seconds or 1 second, demonstrating lack of basic arithmetic care.
  napkin_math: |
    - Operation size = 10 TeraFLOPs
    - GPU peak performance = 100 TFLOPS (TeraFLOPs/sec)
    - Time = 10 TeraFLOPs / 100 TFLOPS = **0.1 seconds (100 milliseconds)**.
