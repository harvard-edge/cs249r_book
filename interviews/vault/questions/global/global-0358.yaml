title: Extreme Quantization Acceptance Spec
scenario: A team proposes 2-bit quantization to ship a model across mobile and edge
  devices. Specify the acceptance criteria before allowing release.
question: What acceptance criteria should gate a 2-bit quantized model for mobile
  and edge release?
details:
  realistic_solution: Require task accuracy, subgroup and rare-class performance,
    calibration coverage, latency, memory, fallback model, hardware kernel support,
    and quality rollback thresholds. Extreme quantization is a product risk, not just
    a compression win.
  common_mistake: Approving 2-bit because the model fits memory while ignoring accuracy
    cliffs and unsupported kernels.
  napkin_math: A 4x memory gain over INT8 is irrelevant if rare-class recall drops
    below the safety threshold.
