title: Extreme Quantization Acceptance Spec
scenario: A team proposes 2-bit quantization to ship a model across mobile and edge devices.
question: What acceptance criteria should gate a 2-bit quantized model for mobile and edge release?
details:
  realistic_solution: 'Require task accuracy, subgroup and rare-class performance, calibration coverage, latency, memory, fallback model, hardware kernel support, and quality rollback thresholds. Extreme quantization is a product risk, not just a compression win.'
  common_mistake: |
    **The Pitfall:** Approving extreme quantization just because it fits in memory.
    **The Rationale:** Treating quantization merely as a compression win while ignoring its impact on model behavior.
    **The Consequence:** Deploying a model that suffers from severe accuracy cliffs, unsupported kernels on target hardware, and poor rare-class performance.
  napkin_math: |
    **Assumptions & Constraints:**
    - 2-bit quantization reduces footprint 4x compared to INT8.
    
    **Calculations:**
    - Memory footprint is significantly reduced.
    
    **Conclusion & Interpretation:**
    - **Result: 4x Footprint Reduction (Quality-Bound)**. A 4x memory gain is irrelevant if rare-class recall drops below the safety threshold.
