title: Evaluating Continuous vs Fixed Batching Queues
scenario: An endpoint uses A100 80GB SXM GPUs to serve an LLM under bursty load. Continuous
  batching yields a service time of T = 20ms + 5ms * B, with a maximum batch size
  of 16.
question: Evaluate whether the endpoint can remain stable under an arrival rate of
  100 req/s, and calculate the minimum average batch size required.
details:
  realistic_solution: System stability requires utilization p = arrival_rate * (service_time
    / B) < 1. At 100 req/s, the condition is 100 * (0.02 + 0.005B) / B < 1. Solving
    yields 2/B + 0.5 < 1, meaning 2/B < 0.5, so B > 4. The system is stable as long
    as the scheduler maintains an average batch size greater than 4.
  common_mistake: Forgetting to divide the batch service time by the batch size B
    when computing the effective processing rate per request.
  napkin_math: 100 * (0.02 + 0.005B) / B < 1 => B > 4
