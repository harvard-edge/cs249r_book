title: Why Activation Outliers Break Quantization
scenario: Explain why a single activation outlier (e.g., one value at 100x the magnitude of others) can
  destroy INT8 quantization accuracy, and how techniques like LLM.int8() address this.
details:
  realistic_solution: 'INT8 maps the full range [min, max] to 256 bins. If 99.9% of activations fall in
    [-1, 1] but one outlier hits 100, the scale factor is 100/127 ≈ 0.79. Normal values in [-1, 1] get
    mapped to just [-1, 1] in INT8 — only 2 out of 256 bins, losing 99.2% of the precision. LLM.int8()
    (Dettmers et al.) solves this via mixed-precision decomposition: identify the ~0.1% of feature dimensions
    with outliers (magnitude > 6.0), compute those columns in FP16, and quantize the remaining 99.9% to
    INT8. This preserves quality because outlier dimensions carry disproportionate information in transformer
    hidden states, and keeping them in FP16 costs negligible extra memory.'
  common_mistake: Assuming quantization error is uniform across all values. A single outlier forces the
    quantization range to be 100x wider, wasting 99% of the INT8 range on values that don't need it.
  napkin_math: 'Without outlier handling: 256 INT8 bins spanning range 200 → resolution of 0.79 per bin.
    Values in [-1,1] get ≈2 bins → ~50% quantization error. With mixed-precision: 0.1% dims in FP16 +
    99.9% in INT8 = 99.9% memory savings preserved, <0.1% quality loss.'
