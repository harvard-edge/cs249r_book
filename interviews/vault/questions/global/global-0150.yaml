validation_issues:
- The Napkin Math for the IMU buffer size (1.2KB) is inconsistent with the provided buffer size in the
  scenario (4KB SRAM buffer), which can confuse the reader. Additionally, Cortex-M4 is mentioned in the
  Napkin Math, but the scenario specifies Cortex-M7, which can have L1 caches and a different memory hierarchy.
- The explanation that 'adding printf slows execution or calls memory fences, coincidentally syncing the
  buffer' is generally true but could be more explicit about *how* `printf` might introduce memory fences
  or cache invalidation, such as flushing I/O buffers or context switching, as a more direct mechanism.
