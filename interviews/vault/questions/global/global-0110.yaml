title: LLM Decode Batch Size Limits
scenario: You are optimizing a Llama-70B serving cluster on 4x 80GB GPUs. At batch size 1, the decode phase achieves 18 tokens/s per user. To hit a throughput target of 2000 tokens/s, the team proposes aggressively increasing the batch size to 256. However, at batch size 64, latency already spikes beyond the 100ms/token SLA, and throughput plateaus.
question: Using the roofline model, why do latency spike and throughput plateau when Llama-70B batch size reaches 64?
details:
  realistic_solution: As you increase batch size, you reuse weights across multiple requests, increasing arithmetic intensity. However, increasing batch size also massively increases the KV cache size. Before you ever reach the compute-bound ridge point, you hit a memory capacity bound forcing the system to page or recompute.
  common_mistake: |
    **The Pitfall:** Assuming that increasing batch size linearly increases throughput until you hit compute TFLOPS limits.
    **The Rationale:** The standard roofline model predicts movement towards the compute-bound ridge as arithmetic intensity increases.
    **The Consequence:** You hit a memory capacity bound first, forcing the system to swap or recompute and destroying latency.
  napkin_math: |
    **Assumptions & Constraints:**
    - 4x 80GB GPUs (320GB total). Weights: ~140GB (FP16).
    - Context: 2000 tokens. Target BS=64.

    **Calculations:**
    - KV Cache Size (BS=64) = 64 * 2 * 80 layers * 8 heads * 128 dim * 2000 * 2 bytes = 41.9 GB.
    - Total VRAM used (140GB weights + 41.9GB KV + activations) leaves little headroom for paging fragmentation.

    **Conclusion & Interpretation:**
    - **Result: Memory-Bound (Capacity).** The system hits the KV cache capacity wall before reaching the compute-bound ridge, stalling throughput entirely.
