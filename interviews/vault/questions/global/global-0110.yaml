title: LLM Decode Batch Size Limits
scenario: You are optimizing a Llama-70B serving cluster on 4x 80GB A100 GPUs. At batch size 1, the decode phase achieves 18 tokens/s per user. To hit a throughput target of 2000 tokens/s, the team proposes aggressively increasing the batch size to 256. However, at batch size 64, latency already spikes beyond the 100ms/token SLA, and throughput plateaus.
question: "Using the roofline model, why do latency spike and throughput plateau when Llama-70B batch size reaches 64?"
details:
  realistic_solution: The decode phase of LLM generation is fundamentally memory-bandwidth bound. At batch size 1, you must read the entire 140GB model from HBM to generate a single token, resulting in an extremely low arithmetic intensity (I ≈ 2 FLOPs/byte). As you increase batch size, you reuse the weights across multiple requests, increasing arithmetic intensity (I ≈ 2 * B). This moves the workload to the right on the Roofline model. However, increasing batch size also increases the KV cache size. Before you ever reach the compute-bound ridge point, you hit a memory capacity bound. The KV cache fills the remaining VRAM, forcing the system to either swap to CPU memory (shattering bandwidth) or recompute, which destroys latency. The plateau occurs because the system becomes bottlenecked by KV cache paging overheads and memory fragmentation, not ALU limits.
  common_mistake: |
    **The Pitfall:** Assuming that increasing batch size linearly increases throughput until you hit compute TFLOPS limits.
    **The Rationale:** The standard roofline model predicts movement towards the compute-bound ridge as arithmetic intensity increases.
    **The Consequence:** You hit a memory capacity bound first, forcing the system to swap or recompute and destroying latency.
  napkin_math: |
    - A100 Ridge Point: 312 TFLOPS / 2 TB/s ≈ 156 FLOPs/byte.
    - Weight load time: 35GB / 2TB/s = 17.5ms per token.
    - KV Cache for BS=64, context=2000: 64 * 2 * 80 * 8 * 128 * 2000 * 2 = 41.9 GB.
    - **Total VRAM used (35GB weights + 41.9GB KV + activations) exceeds the 80GB limit long before the compute ridge is reached.**
