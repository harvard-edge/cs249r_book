title: Incomplete Data Pipeline Incident
scenario: A model regresses after launch. Cloud logs show normal feature distributions,
  mobile users report worse results offline, and edge gateways show intermittent cache
  misses. The team gives no cache TTLs, offline rates, or training-serving skew metrics.
question: What missing data-pipeline information do you need before diagnosing this
  cross-regime model regression?
details:
  realistic_solution: You need cache TTLs, offline duration, feature freshness, fallback
    values, cache-miss rates, version skew, training-serving transformations, and
    per-regime quality metrics. The known facts suggest a freshness or fallback problem
    outside cloud, but you cannot prove the root cause without comparing feature age
    and transformation consistency.
  common_mistake: Debugging only cloud logs because they are easiest to query, while
    the regression lives in mobile offline and edge cache behavior.
  napkin_math: If mobile is offline for 12 hours and feature TTL is 1 hour, the device
    may serve features 12x beyond the intended freshness window.
