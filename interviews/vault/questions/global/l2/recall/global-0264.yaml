id: global-0264
title: InfiniBand vs Ethernet for Training
topic: interconnect-topology
status: published
provenance: imported
scenario: Explain why large-scale LLM training clusters prefer InfiniBand over Ethernet. What specific
  properties of InfiniBand reduce AllReduce latency?
details:
  realistic_solution: 'InfiniBand''s advantages for training go beyond bandwidth: (1) RDMA (Remote Direct
    Memory Access): GPU memory can be read/written directly over the network, bypassing the host CPU and
    OS kernel. This eliminates multiple memory copies and context switches, reducing per-message latency
    from ~10-50 μs (TCP/IP) to ~1-2 μs. (2) Lossless fabric: InfiniBand uses credit-based flow control,
    guaranteeing zero packet loss. Ethernet (even with RoCE) uses PFC which can cause deadlocks and head-of-line
    blocking. Packet loss triggers TCP retransmission, adding 10-100ms tail latency spikes that stall
    AllReduce across thousands of GPUs. (3) Adaptive routing: InfiniBand dynamically routes around congestion,
    maintaining consistent bandwidth. For AllReduce across 1000+ GPUs, even a single slow link creates
    a straggler that slows the entire step.'
  common_mistake: Focusing only on raw bandwidth. Ethernet 400G and InfiniBand NDR both offer 400 Gb/s,
    but the critical advantage of InfiniBand is RDMA and predictable low-latency, not just bandwidth.
  napkin_math: 'AllReduce latency for 1GB gradient buffer: InfiniBand RDMA: 1GB/(50 GB/s) + 2μs × log₂(N)
    hops. Ethernet TCP: 1GB/(50 GB/s) + 50μs × log₂(N) + retransmit risk. At N=1024: InfiniBand ~20ms,
    Ethernet ~30-150ms (with tail latency).'
