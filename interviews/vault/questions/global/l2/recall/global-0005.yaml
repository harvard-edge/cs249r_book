schema_version: 1
id: global-0005
title: The FLOPS vs Time Calculation
topic: roofline-analysis
status: published
provenance: imported
scenario: An operation requires 10 Teraflops ($10^{13}$ operations). If your GPU has a peak performance
  of 100 TFLOPS, what is the theoretical minimum time to finish this operation?
details:
  realistic_solution: 100 milliseconds (0.1 seconds). $\text{Time} = \frac{10 \text{ TFLOPS}}{100 \text{
    TFLOPS/sec}} = 0.1 \text{ seconds}$.
  common_mistake: Getting the decimal point wrong. $10/100 = 0.1$.
  napkin_math: $\text{Time} = \frac{10 \text{ TFLOPS}}{100 \text{ TFLOPS/sec}} = 0.1 \text{ seconds}$.
