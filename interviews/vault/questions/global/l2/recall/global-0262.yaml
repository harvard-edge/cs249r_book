id: global-0262
title: AllReduce Communication Overhead
topic: data-parallelism
status: published
provenance: imported
scenario: Explain why AllReduce in a ring topology transfers 2×(N-1)/N times the gradient size, where
  N is the number of GPUs. Why does this approach O(2× gradient size) as N grows?
details:
  realistic_solution: 'Ring AllReduce works in two phases: scatter-reduce and allgather, each requiring
    N-1 steps. In each step, every GPU sends 1/N of the gradient buffer to its neighbor. Per GPU, total
    data sent = (N-1)/N × buffer_size in scatter-reduce + (N-1)/N × buffer_size in allgather = 2×(N-1)/N
    × buffer_size. As N→∞, this approaches 2× the buffer size. This is bandwidth-optimal because every
    link is utilized simultaneously. The critical insight: doubling GPUs does NOT double communication
    time — it''s nearly constant per GPU. The bottleneck is the per-link bandwidth, not the number of
    GPUs. This is why ring AllReduce scales well on NVLink-connected GPUs within a node.'
  common_mistake: Thinking AllReduce cost grows linearly with N. Ring AllReduce is bandwidth-optimal —
    total data transferred per GPU is constant regardless of cluster size (for large N).
  napkin_math: 'For 8 GPUs with 14 GB gradients: each GPU sends 2 × (7/8) × 14 GB = 24.5 GB. At 450 GB/s
    NVLink effective bandwidth: 24.5/450 = 54ms. For 4 GPUs: 2 × (3/4) × 14 = 21 GB. Scales sub-linearly.'
