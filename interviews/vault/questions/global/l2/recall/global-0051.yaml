id: global-0051
title: MLPerf Execution Scenarios
topic: pruning-sparsity
status: published
provenance: imported
scenario: 'MLPerf Inference defines four execution scenarios: Offline, Server, SingleStream, and MultiStream.
  Why does it need four separate scenarios instead of one unified benchmark? What fundamental system property
  does each scenario stress?'
details:
  realistic_solution: Each scenario tests a different deployment reality. Offline measures maximum throughput
    when all data is available upfront — this stresses raw compute (FLOPS). Server measures throughput
    under a Poisson arrival process with latency constraints — this stresses queuing behavior and tail
    latency. SingleStream measures the latency of one request at a time with no batching — this stresses
    end-to-end pipeline overhead. MultiStream measures how many concurrent streams can be served — this
    stresses memory bandwidth and parallelism. A system that tops the Offline leaderboard may fail the
    Server scenario because it cannot handle bursty arrivals within SLA.
  common_mistake: Assuming all inference workloads look the same. Engineers often think 'throughput is
    throughput' and fail to recognize that the shape of the arrival process determines which hardware
    resource is the bottleneck.
  napkin_math: An H100 might achieve 10,000 samples/sec in Offline mode (perfect batching), but only 3,000
    samples/sec in Server mode at 99th percentile latency < 15ms. The 3.3x gap quantifies the cost of
    latency constraints on throughput.
