title: Roofline Model Interpretation
topic: roofline-analysis
status: published
provenance: imported
scenario: If a specific transformer layer has an arithmetic intensity of 50 FLOPs/byte, and you are running
  it on an accelerator with a peak compute performance of 100 TFLOPS and a memory bandwidth of 1 TB/s,
  is this layer compute-bound or memory-bound?
details:
  realistic_solution: The hardware's ridge point is calculated as Peak Compute / Memory Bandwidth (100
    TFLOPS / 1 TB/s = 100 FLOPs/byte). Since the layer's arithmetic intensity (50 FLOPs/byte) is lower
    than the hardware ridge point (100 FLOPs/byte), the layer is limited by memory bandwidth (memory-bound).
  common_mistake: Guessing based on absolute numbers, or not calculating the machine balance (ridge point)
    to compare against the layer's arithmetic intensity.
  napkin_math: '- Ridge point = 100 TFLOPS / 1 TB/s = 100 FLOPs/byte | - Layer AI = 50 FLOPs/byte < 100
    ridge point | - => Achievable throughput = 50 × 1 TB/s = 50 TFLOPS (50% of peak, memory-bound)'
