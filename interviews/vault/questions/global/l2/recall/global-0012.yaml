id: global-0012
title: Defining Arithmetic Intensity
topic: roofline-analysis
status: draft
provenance: imported
scenario: When analyzing an ML workload using the Roofline Model, what exactly does Arithmetic Intensity
  measure?
details:
  realistic_solution: Arithmetic Intensity is the ratio of operations performed to data moved. It dictates
    whether your model will be bottlenecked by the ALU (compute) or the memory bus (bandwidth).
  common_mistake: Confusing it with clock speed or raw TFLOPS throughput.
  napkin_math: '- Matrix multiply (1024×1024): ~2B FLOPs, reads ~8 MB => ~250 FLOPs/byte (compute-bound)
    | - Element-wise ReLU: 1 FLOP per 2 bytes read => 0.5 FLOPs/byte (memory-bound) | - => High AI = compute-bound,
    low AI = memory-bound'
