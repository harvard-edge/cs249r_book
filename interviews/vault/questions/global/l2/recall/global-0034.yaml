id: global-0034
title: Post-Training Quantization
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: When deploying a convolutional neural network on a microcontroller with 256KB of RAM, we decide
  to use int8 post-training quantization. However, after quantization, the model's accuracy drops significantly.
  Which of the following is the most likely cause of this severe accuracy degradation?
details:
  realistic_solution: The presence of significant outliers in the weights or activations can cause a large
    quantization error because the int8 range must stretch to cover the outliers, reducing the effective
    resolution for the majority of the values.
  common_mistake: Assuming quantization simply reduces precision uniformly without considering the distribution
    of activation values or outliers.
  napkin_math: '- INT8 range: 256 levels. If max activation = 100 but 99.9% of values are in [-1, 1] |
    - Scale factor = 200/256 = 0.78 per step. Values in [-1,1] get only ~3 distinct levels | - => One
    outlier wastes 99% of the quantization resolution'
