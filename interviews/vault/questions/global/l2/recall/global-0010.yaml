id: global-0010
title: The PyTorch DataLoader Deadlock
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: During a technical screen, I ask you to write a PyTorch training loop. You set `num_workers=0`
  in your DataLoader. Why will this make the Senior Engineers instantly reject your code for a production
  environment?
details:
  realistic_solution: Setting `num_workers=0` forces data loading to happen synchronously on the main
    Python process. The GPU will sit completely idle while Python blocks the main thread to read files
    from disk and decode JPEGs. It completely breaks the data-loading pipeline.
  common_mistake: '"It uses too much RAM because it duplicates the dataset."'
  napkin_math: '- GPU forward pass: ~5 ms. JPEG decode + disk read: ~20 ms per batch | - num_workers=0:
    GPU idle 80% of the time (20 ms wait / 25 ms total) | - => With 4 workers prefetching, GPU utilization
    jumps from ~20% to ~95%'
