id: global-0038
title: Tensor Arena Allocation
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: When using TensorFlow Lite for Microcontrollers (TFLM), developers must pre-allocate a continuous
  block of memory called the 'Tensor Arena'. What is the primary architectural reason for requiring a
  pre-allocated Tensor Arena instead of dynamically allocating memory during inference?
details:
  realistic_solution: Dynamic memory allocation (`malloc`/`free`) in constrained environments can lead
    to memory fragmentation and unpredictable allocation failures during runtime. A pre-allocated Tensor
    Arena ensures deterministic memory usage and allows the framework to plan memory reuse ahead of time.
  common_mistake: Assuming microcontrollers handle dynamic memory allocation just as safely and predictably
    as standard desktop or server operating systems.
  napkin_math: '- 128 KB SRAM. After 1000 malloc/free cycles: fragmented into 50+ small blocks | - Largest
    contiguous block: maybe 8 KB (even with 40 KB "free") | - => Pre-allocated arena: guaranteed contiguous
    100 KB — no fragmentation, no surprises'
