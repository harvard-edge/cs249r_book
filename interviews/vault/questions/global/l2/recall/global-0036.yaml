id: global-0036
title: Structured vs. Unstructured Pruning
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: To reduce the latency of a real-time object detection model running on a mobile neural processing
  unit (NPU), the team proposes using unstructured pruning to achieve 70% sparsity. Why might this approach
  fail to deliver the expected latency improvements on standard NPU hardware?
details:
  realistic_solution: Most edge NPUs and hardware accelerators are optimized for dense matrix multiplications
    and lack the specialized hardware support required to efficiently process unstructured sparse matrices,
    often resulting in no speedup or even slowdowns due to irregular memory access.
  common_mistake: Assuming that unstructured sparsity automatically translates to faster execution without
    considering hardware architecture and memory access patterns.
  napkin_math: '- 70% unstructured sparsity: 70% of weights are zero, but scattered randomly | - Dense
    GEMM on NPU: predictable memory access, full SIMD utilization | - => Sparse indexing overhead can
    exceed the savings — net speedup: ~0× on standard NPUs'
