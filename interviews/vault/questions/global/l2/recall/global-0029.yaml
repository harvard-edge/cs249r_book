schema_version: 1
id: global-0029
title: Handling Split Brain in a Distributed Database
topic: 3d-parallelism
status: published
provenance: imported
scenario: Imagine a distributed database cluster split across two datacenters. If the network link between
  the datacenters drops, how should the system behave to prioritize consistency over availability?
details:
  realistic_solution: The system must pause writes or refuse service in the minority partition to prevent
    conflicting updates (split brain), adhering to the CP side of the CAP theorem.
  common_mistake: Thinking that the system can magically stay both highly available and strongly consistent
    during a network partition, or confusing active-active with active-passive failover requirements.
  napkin_math: '- 5-node cluster splits 3:2. Majority quorum = floor(N/2) + 1 = floor(5/2) + 1 = 2 + 1
    = 3 nodes | - Partition A (3 nodes) ≥ 3 → can form quorum → accepts writes | - Partition B (2 nodes)
    < 3 → cannot form quorum → must reject writes | - => Minority partition refuses writes to guarantee
    zero data divergence (CP behavior)'
