schema_version: 1
id: global-0261
title: Memory-Bound vs Compute-Bound Intuition
topic: latency-decomposition
status: published
provenance: imported
scenario: Explain why batch-1 autoregressive LLM decoding is memory-bandwidth-bound while large-batch
  training is compute-bound, using the roofline model.
details:
  realistic_solution: 'In batch-1 decoding, each token generation requires reading all model weights from
    HBM but performs very few FLOPs per weight (matrix-vector multiply, AI ≈ 1 FLOP/Byte). On an A100,
    you read 140 GB of weights at 2.0 TB/s = 70ms per token, but only perform 140 GFLOP — consuming 70ms
    of bandwidth time but only 0.449ms of compute time (140G / 312T). The GPU''s 312 TFLOPS sit essentially
    idle. In large-batch training, GEMM operations become matrix-matrix multiplies (batch dimension >>
    1). For batch=2048, AI = 2×2048 ≈ 4096 FLOP/Byte, far above the 156 ridge point. Now compute is the
    bottleneck: you have enough data reuse to keep the Tensor Cores busy.'
  common_mistake: Claiming decoding is slow because of sequential token generation alone. The sequential
    nature is a latency issue, but the throughput bottleneck is bandwidth — even a single token generation
    step underutilizes the GPU's compute.
  napkin_math: 'Decode batch=1: read 140GB at 2 TB/s = 70ms. Compute: 140 GFLOP / 312 TFLOPS = 0.449ms.
    GPU utilization: 0.449/70000 = 0.0006% (compute nearly idle). Training batch=2048: AI ≈ 4096, well
    above ridge (156). Compute-bound at ~80% MFU.'
