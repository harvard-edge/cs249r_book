id: global-0033
title: DNS Resolution and TTL
topic: collective-communication
status: published
provenance: imported
scenario: We just migrated our primary API to a new IP address and updated the DNS A record. However,
  some users are still reporting connection timeouts pointing to the old IP. What is the most likely cause?
details:
  realistic_solution: DNS caching. The clients or their local ISP DNS resolvers have cached the old IP
    address because the Time-To-Live (TTL) on the old DNS record hasn't expired yet.
  common_mistake: Assuming DNS propagates instantly globally or that the new server is down.
  napkin_math: '- Old TTL set to 3600s (1 hour). Migration at t=0 | - Worst case: clients cached at t=-1s
    will hold stale IP for 3599s | - => Pre-migration fix: lower TTL to 60s 24 hours before cutover'
