schema_version: 1
id: global-0006
title: The Battery Drain Math
topic: power-budgeting
status: published
provenance: imported
scenario: A mobile model consumes 2 Watts during inference. If your phone battery has 15 Watt-hours of
  capacity, how many hours of continuous inference could you theoretically run?
details:
  realistic_solution: 7.5 hours of continuous inference. Energy = Power × Time, so Time = Energy / Power
    = 15 Wh / 2 W = 7.5 hours. However, this is a theoretical upper bound assuming the model is the only
    power consumer. In practice, the display (2–5 W), cellular radio (1–3 W), and baseline SoC power (~0.5
    W) consume additional energy, so realistic continuous inference time would be closer to 1.5–2 hours.
    This napkin math illustrates why mobile ML engineers focus obsessively on reducing model power consumption
    — every watt directly trades against battery life. Techniques like quantization (INT8 reduces power
    ~3–4×) and duty cycling (run inference only when needed) are essential for real deployment.
  common_mistake: Confusing Watts (Power) with Watt-hours (Energy).
  napkin_math: $15 \text{ Wh} / 2 \text{ W} = 7.5 \text{ hours}$.
