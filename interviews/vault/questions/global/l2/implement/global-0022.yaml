schema_version: 1
id: global-0022
title: Cache Thrashing & Matrix Operations
topic: memory-hierarchy-design
status: published
provenance: imported
scenario: If you are writing a custom CUDA kernel for matrix multiplication and notice severe performance
  degradation along with an excessively high L2 cache miss rate, what is the most likely architectural
  cause and how would you resolve it?
details:
  realistic_solution: The high miss rate is likely caused by cache thrashing due to poor spatial locality
    (e.g., strided accesses). This can be resolved by implementing loop tiling or blocking, which breaks
    the matrix into smaller sub-blocks that fit neatly inside the cache, maximizing data reuse before
    eviction.
  common_mistake: Just suggesting faster memory, assuming the matrices are inherently too small, or thinking
    the GPU cache is malfunctioning.
  napkin_math: Multiplying two 4096x4096 FP32 matrices requires 4096^2 * 4B = 67MB each, far exceeding
    the A100's 40MB L2 cache. Without tiling, every row/col fetch hits HBM2e at 2.0TB/s. By using 32x32
    tiles (4KB), the active blocks fit comfortably in L1/L2 cache. This turns O(N^3) memory accesses into
    O(N^3/B), drastically reducing L2 misses and HBM bandwidth.
