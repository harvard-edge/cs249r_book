title: The Latency-Carbon-Cost Triangle
scenario: You must deploy an LLM inference service for users in Europe. Three candidate regions: (A) Frankfurt — 15ms to users, $0.10/kWh electricity, 350 gCO2/kWh (German grid). (B) Stockholm — 35ms to users, $0.04/kWh, 30 gCO2/kWh (Swedish hydro). (C) Paris — 25ms to users, $0.07/kWh, 55 gCO2/kWh (French nuclear). Your SLA is 500ms TTFT and model prefill is 400ms.
question: Which European region should you deploy in given the 500 ms TTFT SLA, 400 ms prefill, latency, cost, and carbon tradeoffs?
details:
  realistic_solution: 'SLA check: TTFT = prefill + network RTT. Required RTT < 500ms - 400ms = 100ms. All three regions qualify: Frankfurt (15ms one-way → ~30ms RTT), Paris (25ms → ~50ms), Stockholm (35ms → ~70ms). Since all meet the SLA, the decision optimizes on cost and carbon. For a 100-GPU H100 cluster running 24/7 at 0.7 kW/GPU with PUE 1.2, annual energy = 735,840 kWh. Annual electricity cost: Stockholm $29,434, Paris $51,509, Frankfurt $73,584. Annual carbon emissions: Stockholm 22.1 tonnes, Paris 40.5 tonnes, Frankfurt 257.5 tonnes. Recommendation: Stockholm as primary (cheapest, greenest, ~435ms TTFT within 500ms SLA). Paris as failover. Frankfurt only as last resort. Savings: >$44,000/yr vs Frankfurt, plus 91% lower carbon.'
  common_mistake: |
    **The Pitfall:** Picking the lowest-latency option (Frankfurt) without evaluating whether the SLA can be met from other regions.
    **The Rationale:** Assuming lower latency is always strictly better, ignoring threshold-based SLA requirements.
    **The Consequence:** Unnecessarily spending 2.5x more on electricity and emitting 10x more carbon for latency gains that the user cannot perceive.
  napkin_math: |
    - **SLA Budget:** 500 ms (TTFT) - 400 ms (Prefill) = 100 ms max round-trip time. All regions pass (Frankfurt: 30 ms, Paris: 50 ms, Stockholm: 70 ms).
    - **Annual Energy:** 100 H100s × 0.7 kW × 1.2 PUE × 8,760 h = **735,840 kWh/year**.
    - **Frankfurt:** $73,584/yr | 257.5 tonnes CO2/yr
    - **Paris:** $51,509/yr | 40.5 tonnes CO2/yr
    - **Stockholm:** $29,434/yr | 22.1 tonnes CO2/yr
    - **Conclusion:** Stockholm reduces cost by **60%** and carbon by **91%** compared to Frankfurt, while still meeting the SLA.
