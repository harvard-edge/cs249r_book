title: TDP and Energy Cost of GPU Hours
scenario: An A100 GPU has a TDP of 400W.
question: "How much energy (in kWh) does a single A100 consume running at full power for 24 hours, and what does this cost at $0.10/kWh?"
details:
  realistic_solution: 'Energy = Power × Time. At full TDP: 400W × 24h = 9,600 Wh = 9.6 kWh. Cost: 9.6 × $0.10 = $0.96/day per GPU. At realistic 80% average utilization: 320W × 24h = 7.68 kWh = $0.77/day. For a 1024-GPU cluster running 30 days: 1024 × 9.6 × 30 = 294,912 kWh = $29,491/month in electricity alone. Adding cooling overhead (PUE ≈ 1.2), total energy cost becomes $35,389/month. This is why hyperscalers locate data centers near cheap hydroelectric power.'
  common_mistake: |
    **The Pitfall:** Confusing power (watts, instantaneous) with energy (watt-hours, cumulative).
    **The Rationale:** Watts are widely advertised, while kWh requires understanding utilization over time.
    **The Consequence:** Miscalculating operational expenses or failing to account for real-world average utilization vs peak TDP.
  napkin_math: |
    - **Energy**: 400W * 24h = 9,600 Wh = 9.6 kWh.
    - **Daily Cost**: 9.6 kWh * $0.10 = $0.96/day per GPU.
    - **Cluster (1024 GPUs, 30 days)**: $0.96 * 1024 * 30 = ~$29,491/month.
    - **Total Facility (PUE 1.2)**: $29,491 * 1.2 = ~$35,389/month.
    - **Conclusion**: One GPU uses **9.6 kWh** costing **$0.96/day**.
