title: Incomplete Data Pipeline Capacity Plan
scenario: A company wants a single data pipeline design for training and inference across cloud, edge, and mobile. They provide daily event volume of 4 billion events but omit event size, skew, freshness SLO, preprocessing cost, backfill requirements, and privacy constraints.
question: What information is missing before sizing this cross-regime data pipeline, and what can you bound from 4 billion events/day alone?
details:
  realistic_solution: 'You can bound only event rate: 4B/day is about 46,300 events/s on average. You cannot size bandwidth, storage, CPU preprocessing, or freshness without event size, burstiness, transform cost, retention, and privacy rules. A Staff answer should refuse to size infrastructure from event count alone and ask for byte and latency budgets.'
  common_mistake: |
    **The Pitfall:** Multiplying event count by a guessed average size to output a precise infrastructure plan.
    **The Rationale:** Believing that event volume alone is sufficient to size systems, ignoring burstiness or processing costs.
    **The Consequence:** Vastly under-provisioning for peaks or over-provisioning storage without understanding retention constraints.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Event volume: 4 billion events/day.
       - Missing: event size, burstiness, processing overhead.
    2. **Calculations:**
       - Average rate: 4,000,000,000 / 86,400 seconds ≈ 46,300 events/s.
       - If event = 1 KB: Bandwidth = 46.3 MB/s.
       - If event = 50 KB: Bandwidth = 2.3 GB/s.
    3. **Conclusion & Interpretation:**
       - **Result: 46,300 events/s average. Information-Bound due to missing payload and peak metadata.**
