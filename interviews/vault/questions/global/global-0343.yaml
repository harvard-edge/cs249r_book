title: Precision Incident Response
scenario: A training run switches to a lower precision and loss spikes every few thousand steps.
question: What should you inspect before reverting a lower-precision training run with intermittent loss spikes?
details:
  realistic_solution: Inspect gradient overflows, activation outliers, optimizer state precision, loss-scaling logs, layer-level statistics, and recent data batches. Then apply targeted fallback for unstable layers or operations before abandoning the precision change.
  common_mistake: |
    **The Pitfall:** Reverting the entire training stack to higher precision without identifying the root cause.
    **The Rationale:** It's a knee-jerk reaction to blame the lower precision format globally, rather than investigating specific unstable layers.
    **The Consequence:** Abandoning massive compute efficiency gains when a targeted fallback or gradient clipping adjustment could have solved the issue.
  napkin_math: |
    - Spikes occur every 2,000 steps.
    - **Log windows must span several thousand steps around the spike to correlate anomalies with specific data batches or overflow events.**
