title: Master Global Precision Governance
scenario: A company trains foundation models in cloud, fine-tunes adapters on edge servers, and deploys compressed variants on mobile and TinyML devices. Incidents have come from silent casts, unstable FP8 fine-tuning, and inconsistent validation thresholds.
question: How would you design a precision governance system across training, fine-tuning, and deployment?
details:
  realistic_solution: Define a precision contract per stage, including allowed formats, accumulation precision, calibration data, fallback behavior, numerical parity thresholds, and rollback criteria. The system should log precision choices, test tail cases, separate training stability from serving efficiency, and require per-target acceptance before promotion.
  common_mistake: Treating precision as a local kernel optimization rather than a lifecycle-wide reliability contract.
  napkin_math: A 0.2% average accuracy drop can hide a severe slice regression if a 1% traffic segment loses 10 percentage points, so global averages are not sufficient release evidence.
