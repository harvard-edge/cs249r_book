title: Quantization Compression Arithmetic
scenario: A 1.2B parameter model is stored in FP16. Estimate its weight size in FP16, INT8, and INT4 before metadata.
question: What are the FP16, INT8, and INT4 weight sizes for a 1.2B-parameter model before metadata?
details:
  realistic_solution: FP16 needs 2.4 GB, INT8 needs 1.2 GB, and INT4 needs 0.6 GB before scales and runtime buffers. The arithmetic is simple but critical for memory feasibility.
  common_mistake: Remembering compression ratios but forgetting to multiply by parameter count and bytes per parameter.
  napkin_math: FP16 = 1.2B x 2 B = 2.4 GB. INT8 = 1.2 GB. INT4 = 0.6 GB.
