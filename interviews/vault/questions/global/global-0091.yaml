title: EU AI Act Compliance Pipeline Storage Design
scenario: A financial institution runs a high-risk credit scoring ML system processing 500 QPS. Under the EU AI Act, you must maintain a 10-year immutable audit log of model inputs, outputs, and demographic intersections. However, storing raw demographic data alongside financial data directly conflicts with GDPR data minimization and right-to-be-forgotten rules.
question: "How would you design the 10-year audit-log pipeline to satisfy EU AI Act evidence needs without violating GDPR minimization?"
details:
  realistic_solution: Design a decoupled storage architecture using cryptographic hashing and secure enclaves. The primary operational database stores features and predictions temporarily. The compliance audit log stores irreversible hashes of the inputs/outputs along with a unique RequestID. Demographic data is never stored alongside the prediction. Instead, we use a separate, highly secured 'Demographic Vault' that stores the RequestID mapped to encrypted demographic attributes using a key managed by a privacy officer. To compute group-fairness metrics for regulatory reporting, a secure multi-party computation (SMPC) or a trusted execution environment (TEE) joins the two datasets using the RequestID. If a GDPR deletion request occurs, the record is deleted from the Demographic Vault; the audit log remains intact (containing only anonymous hashes) to satisfy the 10-year EU AI Act requirement, balancing both regulations.
  common_mistake: |
    **The Pitfall:** Storing plain-text PII and demographic data in a standard data warehouse for 10 years.
    **The Rationale:** It's the simplest way to join records for AI Act fairness reporting.
    **The Consequence:** Directly violating GDPR mandates, leading to massive fines when users exercise their right to be forgotten.
  napkin_math: |
    - **Throughput**: 500 QPS * 86,400 sec/day = 43.2M requests/day.
    - **Audit record**: Hash + RequestID ~ 1KB.
    - **Audit Log Storage**: 43.2 GB/day. 10 years = 157 TB.
    - **Demographic Vault**: Encrypted blobs ~ 2KB. 86.4 GB/day. 10 years = 315 TB.
    - **Conclusion**: Total storage is **< 500 TB**, easily manageable in cold S3 Glacier for compliance.
