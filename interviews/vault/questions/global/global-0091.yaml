title: EU AI Act Compliance Pipeline Storage Design
scenario: A financial institution runs a high-risk credit scoring ML system processing 500 QPS. Under the EU AI Act, you must maintain a 10-year immutable audit log of model inputs, outputs, and demographic intersections. Storing raw demographic data alongside financial data conflicts with GDPR.
question: How would you design the 10-year audit-log pipeline to satisfy EU AI Act evidence needs without violating GDPR minimization?
details:
  realistic_solution: Design a decoupled storage architecture using cryptographic hashing and secure enclaves. Store irreversible hashes of inputs/outputs with a unique RequestID. Demographic data goes to a separate 'Demographic Vault' mapped by RequestID. Use SMPC/TEE for regulatory reporting. On GDPR deletion, wipe the vault record while keeping the anonymous hash in the 10-year log.
  common_mistake: |
    **The Pitfall:** Storing plain-text PII and demographic data in a standard data warehouse for 10 years.
    **The Rationale:** It's the simplest way to join records for AI Act fairness reporting.
    **The Consequence:** Directly violating GDPR mandates, leading to massive fines when users exercise their right to be forgotten.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 500 QPS = 43.2M requests/day.
       - Audit record = 1KB; Demographic blob = 2KB.
       - Retention = 10 years.
    2. **Calculations:**
       - Audit Log = 43.2 GB/day -> 157 TB/10yr.
       - Vault = 86.4 GB/day -> 315 TB/10yr.
    3. **Conclusion & Interpretation:**
       - **Result: Storage-Capacity Bound (<500 TB total)**
