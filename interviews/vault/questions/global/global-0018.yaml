title: Data Parallelism vs Model Parallelism
scenario: Your 14GB model fits entirely within the memory of a single GPU, but you want to train it faster by using 8 GPUs.
question: Which distributed strategy should you use to efficiently scale training across 8 GPUs?
details:
  realistic_solution: Data Parallelism (DDP). You replicate the exact same model across all 8 GPUs, split the batch of data across them, and average their gradients at the end of each step.
  common_mistake: |
    **The Pitfall:** Overcomplicating the setup with Pipeline or Tensor parallelism when the model fits on a single device.
    **The Rationale:** Candidates want to use the most advanced techniques available regardless of situational necessity.
    **The Consequence:** Unnecessary communication overhead is introduced via matrix sharding or pipeline bubbles, drastically slowing down training.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model size: 14 GB.
       - GPUs: 8.
    2. **Calculations:**
       - Model footprint across 8 GPUs = 8 * 14 GB = 112 GB total (replicated).
       - Effective batch size = 8 * single GPU batch.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound (Scaling).** Replicating the model yields a near-linear 8x throughput speedup without incurring model-parallelism communication tax.
  options:
  - 'Tensor Parallelism: Shards the 14GB model into 1.75GB pieces, wasting bandwidth on communication.'
  - 'Pipeline Parallelism: Divides the model into 8 stages of 1.75GB each, introducing severe pipeline bubbles.'
  - 'Data Parallelism: Replicates the 14GB model 8 times (112GB total), achieving near-linear 8x speedup.'
  - 'Expert Parallelism: Routes tokens to 8 different 14GB experts, eliminating communication overhead.'
