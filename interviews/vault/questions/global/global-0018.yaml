title: Data Parallelism vs Model Parallelism
scenario: If your model fits entirely within the memory of a single GPU, but you want to train it faster
  by using 8 GPUs, which distributed strategy should you use?
question: "If your model fits entirely within the memory of a single GPU, but you want to train it faster by using 8 GPUs, which distributed strategy should you use?"
details:
  realistic_solution: Data Parallelism (DDP). You replicate the exact same model across all 8 GPUs, split
    the batch of data across them, and average their gradients at the end of each step.
  common_mistake: Overcomplicating the setup with Pipeline or Tensor parallelism when it isn't strictly
    necessary.
  napkin_math: '- Model fits on 1 GPU: 14 GB. 8 GPUs × 14 GB = 112 GB total (replicated) | - Effective
    batch size: 8× single-GPU batch. Training time: ~8× faster (near-linear) | - => Gradient sync overhead
    on NVLink: <5% of step time'
  options:
  - Tensor Parallelism
  - Pipeline Parallelism
  - Data Parallelism
  - Expert Parallelism (MoE)
