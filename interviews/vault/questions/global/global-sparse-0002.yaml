title: Evaluate Validation Coverage Across Sources
scenario: A data platform validates 10% of records from each high-volume source but only 0.1% from long-tail sources. Long-tail sources supply 20% of training data. Evaluate whether this validation policy is safe.
question: Is validating 0.1% of long-tail data safe when long-tail sources provide 20% of training data?
details:
  realistic_solution: It is risky. Long-tail sources are under-sampled relative to their training contribution, so schema or semantic errors there can affect the model while escaping validation. A safer policy uses minimum per-source sample floors plus volume-weighted sampling.
  common_mistake: Sampling only by volume and starving low-volume but high-risk sources of validation coverage.
  napkin_math: If high-volume sources are validated at 10% and long-tail at 0.1%, the long-tail validation rate is 100x thinner per input row. Because long-tail still supplies 20% of training data, that is risky.
