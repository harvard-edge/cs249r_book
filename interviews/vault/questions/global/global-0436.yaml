title: Evaluating Synchronous vs Asynchronous Checkpointing Trade-offs
scenario: A pipeline-parallel model trains on H100s. Option A uses global synchronous checkpointing taking 30 seconds every 20 minutes. Option B uses asynchronous micro-batch checkpointing that consumes 10% of NVLink bandwidth constantly.
question: Evaluate which checkpointing strategy yields higher goodput if a node fails exactly once every 10 hours.
details:
  realistic_solution: Option A overhead is 30s/1200s (2.5%) plus the expected recompute loss. With failures every 10 hours (36,000s), the average recompute is half the interval (10 mins = 600s), adding 600/36000 = 1.67% penalty, totaling 4.17% waste. Option B eliminates the 1.67% recompute and the 2.5% blocking overhead, but the 10% NVLink bandwidth theft will inflate pipeline communication time. If the pipeline is communication-bound, Option B degrades goodput by >4.17%, making Option A superior.
  common_mistake: |
    **The Pitfall:** Assuming asynchronous checkpointing is perfectly "free" because it happens in the background.
    **The Rationale:** Background threads hide latency, making them intuitively seem zero-cost.
    **The Consequence:** Ignoring continuous PCIe/NVLink bandwidth contention, which severely throttles communication-bound pipeline parallel steps.
  napkin_math: |
    * Option A fixed overhead: 30s per 1200s (20 mins) = 2.5%.
    * Failures: 1 per 10 hours (36,000s).
    * Average recompute penalty: half of interval = 10 mins (600s).
    * Expected penalty fraction: 600s / 36,000s = 1.67%.
    * Total Option A cost = 2.5% + 1.67% = 4.17%.
    * **Option B is worse if stealing 10% NVLink bandwidth degrades pipeline goodput by >4.17%.**
