title: Evaluating Synchronous vs Asynchronous Checkpointing Trade-offs
scenario: A pipeline-parallel model trains on H100s. Option A uses global synchronous
  checkpointing taking 30 seconds every 20 minutes. Option B uses asynchronous micro-batch
  checkpointing that consumes 10% of NVLink bandwidth constantly.
question: Evaluate which checkpointing strategy yields higher goodput if a node fails
  exactly once every 10 hours.
details:
  realistic_solution: Option A overhead is 30s/1200s (2.5%) plus the expected recompute
    loss. With failures every 10 hours (36,000s), the average recompute is half the
    interval (10 mins = 600s), adding 600/36000 = 1.67% penalty, totaling 4.17% waste.
    Option B eliminates the 1.67% recompute and the 2.5% blocking overhead, but the
    10% NVLink bandwidth theft will inflate pipeline communication time. If the pipeline
    is communication-bound, Option B degrades goodput by >4.17%, making Option A superior.
  common_mistake: Assuming asynchronous checkpointing is perfectly free without quantifying
    the impact of continuous PCIe/network bandwidth contention on step times.
  napkin_math: Cost A = 30/1200 + 600/36000 = 0.0416 (4.17%)
