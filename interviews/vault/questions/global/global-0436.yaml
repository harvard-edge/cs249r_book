title: Evaluating Synchronous vs Asynchronous Checkpointing Trade-offs
scenario: A model trains on H100s. Option A is global synchronous checkpointing. Option B uses asynchronous micro-batch checkpointing consuming 10% NVLink bandwidth constantly.
question: Evaluate which checkpointing strategy yields higher goodput if a node fails exactly once every 10 hours.
details:
  realistic_solution: 'Compute Goodput degradation. Option A suffers ~4.17% total overhead (sync stall + recompute expectation). Option B avoids this but continuously hijacks 10% of NVLink bandwidth. For interconnect-bound pipeline parallelism, stealing 10% bandwidth degrades overall throughput far more than 4.17%, rendering synchronous Option A structurally superior.'
  common_mistake: |
    **The Pitfall:** Assuming asynchronous checkpointing is perfectly "free" because it happens in the background.
    **The Rationale:** Background threads hide latency, making them intuitively seem zero-cost.
    **The Consequence:** Ignoring continuous PCIe/NVLink bandwidth contention, which severely throttles communication-bound pipeline parallel steps.
  napkin_math: |
    **Assumptions & Constraints:**
    - Option A sync block: 30s every 20m (1200s)
    - Node MTBF: 10 hours (36000s)

    **Calculations:**
    - Option A sync waste: 30s / 1200s = 2.5%
    - Option A recompute waste: 600s (avg fail point) / 36000s = 1.67%
    - Option A total waste = 4.17%

    **Conclusion & Interpretation:**
    - **Result: Bandwidth-Bound (Option A superior)**. Stealing 10% NVLink bandwidth degrades overall throughput more than Option A's 4.17% sync waste.
