title: The Cable Cut Failover
scenario: Your US-based company serves Asian users via a primary submarine cable route (US West Coast
  → Japan, 100ms RTT, 80 Tbps capacity). A ship anchor severs the cable (this happens ~100-200 times/year
  globally). The backup route goes US → Hawaii → Guam → Japan (150ms RTT, 20 Tbps). Your inference service
  handles 50K requests/second from Asian users. Assess the impact and evaluate failover strategies.
details:
  realistic_solution: 'Impact assessment: Latency increase: 100ms → 150ms RTT (+50%). TTFT for users:
    if prefill = 200ms, goes from 300ms to 350ms — may still meet a 500ms SLA. Bandwidth: 80 Tbps → 20
    Tbps (4× reduction). At 50K req/s × 10KB average response, current bandwidth need is ~4 Gbps — well
    within the 20 Tbps backup. But: you share the backup cable with everyone else whose primary was cut.
    Failover strategies: (1) Active-active multi-path: always use both cables, routing 80% primary / 20%
    backup. On failure, shift to 100% backup. Latency impact: average RTT increases from 110ms to 150ms.
    (2) Regional replica: deploy inference capacity in Japan/Singapore. On cable cut, Asian users hit
    local replicas. Zero latency impact, but costs $200K+/month for idle capacity. (3) Graceful degradation:
    on cable cut, switch to a smaller/faster model for Asian users (reduce prefill from 200ms to 80ms,
    compensating for the +50ms RTT), accept slight quality reduction. Recommendation: regional replica
    for latency-critical services (option 2), with graceful degradation (option 3) as a budget-friendly
    alternative. The annual expected cost of cable cuts (1-2 incidents × 2-4 weeks repair) justifies the
    investment.'
  common_mistake: Assuming the backup cable handles the same load. The backup route has 4× less capacity
    and 50% more latency. A naive failover that redirects all traffic to the backup will cause congestion
    collapse.
  napkin_math: 'Normal: 100ms RTT + 200ms prefill = 300ms TTFT. Cable cut: 150ms + 200ms = 350ms. SLA
    (500ms) still met. Bandwidth check: 50K req/s × 10KB = 500MB/s = 4Gbps << 20Tbps backup. Cable repair
    time: 2-4 weeks. Annual downtime risk: ~2 incidents × 3 weeks = 6 weeks of degraded service. Regional
    replica cost: $200K/month × 12 = $2.4M/year. Revenue at risk (6 weeks degraded, 10% user churn): depends
    on business, but often >> $2.4M.'
