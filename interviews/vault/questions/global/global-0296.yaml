title: OOM During Evaluation but Not Training
scenario: Your 7B model trains fine on an A100-80GB with batch_size=16, seq_len=2048. But when you run evaluation (same batch size, same sequence length), you get a CUDA OOM error. Training uses mixed-precision with gradient checkpointing. No evaluation-specific code changes.
question: "Why does the model OOM during evaluation but not during training?"
details:
  realistic_solution: 'Root cause: gradient checkpointing is active during training but automatically disabled during model.eval(). During evaluation: no backward pass is needed, so frameworks skip gradient checkpointing. But if you''re computing perplexity or doing evaluation with gradients, the model stores ALL activations for ALL layers simultaneously because there''s no recomputation happening. Fix: (1) wrap eval in torch.no_grad(), (2) reduce eval batch size, (3) force gradient checkpointing during eval, (4) use torch.inference_mode().'
  common_mistake: |
    **The Pitfall:** Thinking evaluation should use LESS memory than training because there are no optimizer states or gradients.
    **The Rationale:** Optimizer states take significant memory, so removing them seems like it should free up VRAM.
    **The Consequence:** Crashing evaluation pipelines and failed automated testing.
  napkin_math: |
    - Training activations (checkpointed every 2 layers): 16 × 32/2 × 2048 × 4096 × 2B = 4.3 GB.
    - Eval activations (no checkpointing): 16 × 32 × 2048 × 4096 × 2B × 3 (with FFN) = 25.8 GB.
    - **Difference: 21.5 GB — enough to push past the 80 GB limit.**
