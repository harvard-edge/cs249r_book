title: Three Axes of Parallelism
scenario: There are three primary axes of parallelism used in distributed LLM training.
question: "What are data, tensor, and pipeline parallelism in distributed LLM training, and what does each partition?"
details:
  realistic_solution: "Data Parallelism (DP): replicates the entire model on each GPU; partitions the training batch across GPUs. Each GPU processes different data, then gradients are synchronized via AllReduce. Tensor Parallelism (TP): splits individual weight matrices within a single layer across GPUs. A single matrix multiply is distributed (e.g., column-parallel linear layers). Requires high-bandwidth interconnect (NVLink) because GPUs exchange activations every layer. Pipeline Parallelism (PP): partitions the model's layers into sequential stages across GPUs. GPU 0 runs layers 1-10, GPU 1 runs layers 11-20, etc. Introduces pipeline bubbles but needs only point-to-point communication between adjacent stages."
  common_mistake: |
    **The Pitfall:** Confusing tensor parallelism with pipeline parallelism.
    **The Rationale:** Both partition the model itself rather than the data, making them easy to mix up.
    **The Consequence:** Architecting the wrong network topology, e.g., putting TP across slow inter-node links and PP on fast intra-node links, destroying performance.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 175B model on 512 GPUs.
    2. **Calculations:**
       - Typical configuration is DP=64, TP=4, PP=2.
    3. **Conclusion & Interpretation:**
       - **Result: Topology-Bound. 64 × 4 × 2 = 512 GPUs total.**
