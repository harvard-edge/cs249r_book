title: Three Axes of Parallelism
scenario: Name the three primary axes of parallelism used in distributed LLM training and state what each
  axis partitions across GPUs.
question: "What are data, tensor, and pipeline parallelism in distributed LLM training, and what does each partition?"
details:
  realistic_solution: 'Data Parallelism (DP): replicates the entire model on each GPU; partitions the
    training batch across GPUs. Each GPU processes different data, then gradients are synchronized via
    AllReduce. Tensor Parallelism (TP): splits individual weight matrices within a single layer across
    GPUs. A single matrix multiply is distributed (e.g., column-parallel linear layers). Requires high-bandwidth
    interconnect (NVLink) because GPUs exchange activations every layer. Pipeline Parallelism (PP): partitions
    the model''s layers into sequential stages across GPUs. GPU 0 runs layers 1-10, GPU 1 runs layers
    11-20, etc. Introduces pipeline bubbles but needs only point-to-point communication between adjacent
    stages.'
  common_mistake: Confusing tensor parallelism with pipeline parallelism. TP splits individual layers
    (intra-layer), PP splits groups of layers (inter-layer), DP replicates the full model.
  napkin_math: 'For a 175B model on 512 GPUs: typical config is DP=64, TP=4, PP=2. 64×4×2 = 512. TP=4
    within a node (NVLink), PP=2 across nodes, DP=64 across the cluster.'
