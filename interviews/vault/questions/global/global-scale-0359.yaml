title: Incomplete Memory Admission Plan
scenario: A serving platform wants to admit multiple models onto shared accelerators. The team provides model weight sizes but omits KV cache, activation peaks, allocator fragmentation, batch size, co-tenant reservations, and model reload behavior.
question: What information is missing before deciding whether multiple models can share an accelerator safely?
details:
  realistic_solution: 'You need dynamic memory terms: KV cache, activations, temporary buffers, allocator fragmentation, batch/concurrency, co-tenant reservations, and reload/cold-start peaks. Weight size is a lower bound, not an admission policy. A safe plan uses peak memory plus headroom and admission control.'
  common_mistake: Packing models until weights fill memory and discovering runtime OOM from KV cache or temporary buffers.
  napkin_math: If weights use 60 GB on an 80 GB GPU, the apparent 20 GB headroom can vanish with a 12 GB KV cache, 4 GB buffers, and fragmentation.
