title: Replica Count Lower Bound
scenario: A model server handles 35 requests/s per replica at target latency. Peak demand is 1,000 requests/s. Calculate the minimum replica count before redundancy.
question: How many replicas are needed for 1,000 rps if each model server handles 35 rps?
details:
  realistic_solution: Minimum replicas are ceil(1,000 / 35) = 29. Production needs additional headroom for failures, rollouts, and tail latency.
  common_mistake: Rounding down or forgetting redundancy and rollout headroom.
  napkin_math: 1,000 / 35 = 28.57, so at least 29 replicas.
