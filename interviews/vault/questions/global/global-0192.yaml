title: The Data Locality Penalty
scenario: 'A healthcare company must train a diagnostic model on patient data from 3 countries: US (60% of data, 500K records), Germany (25%, 210K), Japan (15%, 125K). HIPAA (US), GDPR (Germany), and APPI (Japan) all prohibit moving raw patient data across borders. You have GPU clusters in all 3 countries.'
question: "Which approach—separate country models, federated learning, or synthetic data—best balances compliance, quality, and patient safety?"
details:
  realistic_solution: "(A) Separate models: each country trains on local data only. US model is strong (500K records), but Germany (210K) and Japan (125K) models are weak. No compliance risk, but the Japanese model underperforms due to limited data — potentially dangerous in healthcare. (B) Federated learning: trains a shared model by exchanging gradient updates, not raw data. Pros: global model quality with data locality. Cons: gradient inversion attacks can reconstruct training data (recent research shows reconstruction of medical images from gradients). Requires differential privacy noise injection (ε=8) which degrades model quality by ~3-7%. Also, some regulators may argue gradient exchange constitutes 'data transfer.' (C) Synthetic data: generate privacy-safe synthetic records in each country, share synthetic data globally. Pros: clear compliance story (synthetic data is not personal data). Cons: synthetic data quality depends on the generative model; may miss rare disease patterns present in the long tail of real data. Recommendation: Federated learning with differential privacy (ε=4) and secure aggregation as primary approach, with synthetic data augmentation for the data-sparse Japan cohort. This balances model quality, compliance risk, and patient safety."
  common_mistake: |
    **The Pitfall:** Choosing federated learning as an automatic "best of both worlds" solution without privacy constraints.
    **The Rationale:** Federated learning does not transmit raw data, so it seems inherently compliant.
    **The Consequence:** Model gradients are transmitted across borders, which can still leak private information through gradient inversion attacks, potentially violating strict regulations.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - (A) Separate: US accuracy ~94%, Germany ~89%, Japan ~85%.
       - (B) Federated: global accuracy ~93% w/o DP, ~90% with DP (ε=4).
       - (C) Synthetic: Best case ~91%, worst case ~86%.
    2. **Calculations:**
       - Communication: model weights (~500MB) × 100 rounds × 3 sites = 150 GB total cross-border transfer.
    3. **Conclusion & Interpretation:**
       - **Result: Compliance-Bound. Federated + DP provides the highest minimum accuracy across all countries (~90% everywhere vs 85% for Japan standalone).**
