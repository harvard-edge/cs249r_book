title: Cross-Regime Compute Cost Spec
scenario: A team wants a cost model for running the same feature in cloud, mobile, and edge modes. They provide only model operations per inference. Specify the additional inputs required to estimate cost per successful user interaction.
question: What inputs are required to estimate cost per successful interaction across cloud, mobile, and edge inference when retries can fail?
details:
  realistic_solution: The spec needs request rate, sustained throughput, utilization, hardware amortization or cloud price, energy cost, network cost, failure/retry rate, and quality differences. Model operations are only the demand side; cost per successful interaction also depends on supply, overhead, and success rate.
  common_mistake: Computing FLOPs per request and calling it cost, without pricing hardware, energy, network, or retries.
  napkin_math: Cost per successful interaction can be framed as total hourly cost divided by successful interactions/hour. If retries reduce success rate by 5%, cost per success rises by about 1/0.95 = 1.053x.
