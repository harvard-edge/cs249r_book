title: Incomplete Serving Readiness Review
scenario: A team wants to launch a new model-serving stack. They provide benchmark throughput on one GPU but omit traffic distribution, cold-start time, rollout plan, model load time, autoscaling lag, failure domains, and observability.
question: What information is missing before approving a new model-serving stack from a single-GPU throughput benchmark?
details:
  realistic_solution: You need traffic shape, latency percentiles, cold-start and model-load time, autoscaling lag, rollout/rollback plan, capacity headroom, failure-domain isolation, and observability. Single-GPU throughput is only a service-time input; production readiness depends on the whole serving system.
  common_mistake: Approving launch because the model is fast in isolation, without testing queueing, rollout, cold-start, or failure behavior.
  napkin_math: If one GPU serves 50 rps and peak is 2,000 rps, the lower bound is 40 GPUs before redundancy, autoscaling lag, and canary capacity.
