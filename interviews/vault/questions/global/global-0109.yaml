title: Mixed-Precision Fleet Integration
scenario: You manage a global serving fleet of 1,000 GPUs for a 50B parameter model. 300 are H100s (FP8 capable), and 700 are older A10Gs (only INT8 capable). You must deploy a single model artifact from CI/CD to simplify versioning, but you need to maximize hardware utilization to hit 50,000 QPS fleet-wide. Storing multiple 50GB artifacts in the registry is prohibited.
question: How would you deploy one 50B artifact while using FP8 on H100s and INT8 on A10Gs to hit 50,000 QPS?
details:
  realistic_solution: Design a Just-In-Time (JIT) quantization architecture or a universal precision-aware artifact. Store the base model weights in the registry in BF16 (or a highly compressed format like FP4 with metadata if storage is the absolute bottleneck, though BF16 is standard). During the deployment phase (container initialization), the inference server queries the local hardware topology. If an H100 is detected, the server dynamically applies FP8 (E4M3) PTQ using pre-computed calibration scales stored as lightweight metadata in the artifact. If an A10G is detected, it applies INT8 SmoothQuant using its respective pre-computed scales. This decouples the representation from the artifact, maximizing hardware-specific capabilities and preserving FP8 dynamic range on H100s, while maintaining a single source of truth.
  common_mistake: |
    **The Pitfall:** Quantizing the universal artifact to INT8 prior to deployment to ensure it runs everywhere.
    **The Rationale:** Taking the "lowest common denominator" approach to guarantee broad compatibility.
    **The Consequence:** Wasting the superior dynamic range and accuracy retention capabilities of the expensive H100s' native FP8 tensor cores.
  napkin_math: |
    - **A10G INT8 Capacity:** 700 GPUs × 250 TOPS = **175 PetaOPS**
    - **H100 FP8 Capacity:** 300 GPUs × 3,956 TFLOPS = **~1.18 ExaFLOPS**
    - **Artifact Size:** 1 model × 50B params × 2 bytes (BF16) = **100 GB**
    - **Conclusion:** JIT quantization applies the optimal representation for the local silicon, preserving FP8 quality where available without duplicating the 100 GB artifact.
