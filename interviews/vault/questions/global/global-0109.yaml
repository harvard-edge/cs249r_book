title: Mixed-Precision Fleet Integration
scenario: You manage a global serving fleet of 1,000 GPUs for a 50B parameter model. 300 are FP8 capable, and 700 are older and only INT8 capable. You must deploy a single model artifact from CI/CD to simplify versioning, but you need to maximize hardware utilization to hit 50,000 QPS fleet-wide. Storing multiple 50GB artifacts in the registry is prohibited.
question: How would you deploy one 50B artifact while using FP8 on modern hardware and INT8 on older hardware to hit 50,000 QPS?
details:
  realistic_solution: Design a Just-In-Time (JIT) quantization architecture or a universal precision-aware artifact. Store the base model weights in the registry in BF16. During the deployment phase, the inference server queries the local hardware topology. If an FP8 capable GPU is detected, the server dynamically applies FP8 (E4M3) PTQ using pre-computed calibration scales stored as lightweight metadata. If INT8 is detected, it applies INT8 SmoothQuant using its respective scales. This decouples the representation from the artifact, maximizing hardware-specific capabilities.
  common_mistake: |
    **The Pitfall:** Quantizing the universal artifact to INT8 prior to deployment to ensure it runs everywhere.
    **The Rationale:** Taking the lowest common denominator approach to guarantee broad compatibility.
    **The Consequence:** Wasting the superior dynamic range and accuracy retention capabilities of the expensive native FP8 tensor cores.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 700 INT8 capable GPUs.
       - 300 FP8 capable GPUs.
       - Artifact: 50B parameters in BF16 (2 bytes/param).
    2. **Calculations:**
       - Artifact Size: 50 * 10^9 * 2 bytes = 100 GB.
       - INT8 Capacity: 700 * 250 TOPS = 175 PetaOPS.
       - FP8 Capacity: 300 * 3,956 TFLOPS ≈ 1.18 ExaFLOPS.
    3. **Conclusion & Interpretation:**
       - **Result: Just-In-Time Quantization.** Preserving the 100GB BF16 artifact prevents massive data duplication while JIT routing targets the optimal silicon capability.
