title: Tensor Arena Allocation
scenario: When using TensorFlow Lite for Microcontrollers (TFLM), developers must
  pre-allocate a continuous block of memory called the 'Tensor Arena'.
question: Why does TFLM require a pre-allocated Tensor Arena instead of dynamic allocation
  during inference?
details:
  realistic_solution: Dynamic memory allocation (`malloc`/`free`) in constrained environments
    can lead to memory fragmentation and unpredictable allocation failures during
    runtime. A pre-allocated Tensor Arena ensures deterministic memory usage and allows
    the framework to plan memory reuse ahead of time.
  common_mistake: '**The Pitfall:** Assuming microcontrollers handle dynamic memory
    allocation safely and predictably.

    **The Rationale:** Many developers are used to standard desktop or server operating
    systems with advanced virtual memory managers.

    **The Consequence:** Memory fragmentation and unpredictable allocation failures
    during runtime on bare-metal systems.

    '
  napkin_math: "1. **Assumptions & Constraints:**\n   - Device has 128 KB SRAM.\n\
    2. **Calculations:**\n   - After 1000 malloc/free cycles, it fragments into 50+\
    \ small blocks.\n   - The largest contiguous block might only be 8 KB (even with\
    \ 40 KB \"free\").\n3. **Conclusion & Interpretation:**\n   - **Result: Memory-Bound.\
    \ A pre-allocated arena guarantees a contiguous 100 KB block with no fragmentation.**\n"
  options:
  - Dynamic allocation requires a constant connection to a cloud-based memory manager.
  - The Tensor Arena allows the model to compress weights at runtime to save Flash
    memory.
  - Pre-allocation avoids memory fragmentation and ensures deterministic memory usage
    in resource-constrained, bare-metal environments.
  - '`malloc()` is only supported on 64-bit architectures, while most edge devices
    are 32-bit.'
