title: CPU Offloading vs Activation Recomputation
scenario: 'You''re training a 13B model on a single A100-80GB. Activations consume 45 GB, exceeding available
  memory after weights and optimizer states (using 55 GB). Compare two solutions: (A) offload 20 GB of
  activations to CPU RAM via PCIe Gen4 (32 GB/s), or (B) use activation checkpointing to recompute activations
  during backward pass (adds ~33% compute overhead).'
details:
  realistic_solution: 'Option A (Offloading): Transfer 20 GB to CPU and back = 40 GB total over PCIe Gen4
    (32 GB/s) = 1.25 seconds per training step. If a forward+backward pass takes 3 seconds, offloading
    adds 1.25s = 42% overhead. Option B (Recomputation): Checkpoint every other layer. Recompute activations
    during backward adds ~33% compute overhead. On a 3-second step: adds 1.0 second = 33% overhead. Option
    B wins at 33% vs 42% overhead. The crossover point where offloading wins: when per-step compute time
    is very high (>3.78s) making the fixed 1.25s PCIe cost relatively small.'
  common_mistake: Choosing offloading because 'memory is cheap on CPU' without accounting for the PCIe
    bandwidth bottleneck. 20 GB over 32 GB/s PCIe takes 625ms — potentially longer than recomputation.
  napkin_math: 'Offload: 40 GB / 32 GB/s = 1.25s added per step. On 3s base: 42% overhead. Recompute:
    33% extra FLOPS on 3s step = 1.0s. Recompute wins: 33% < 42%. Breakeven: offload wins when base step
    T satisfies 1.33T > T + 1.25s -> 0.33T > 1.25s -> T > 3.78s.'
