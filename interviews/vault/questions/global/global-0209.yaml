title: Continuous Batching Throughput vs Latency
scenario: An inference server processes requests at 50 tokens/s per request with batch size 1. With continuous batching, batch size grows to 32 and per-request throughput increases to 60 tokens/s.
question: What system throughput gain and per-request latency change should continuous batching from 1 to 32 requests produce?
details:
  realistic_solution: 'Batch=1: 50 tok/s system throughput, 50 tok/s per-request (20ms/token). Batch=32: total system throughput = 32 \times 60 = 1920 tok/s (since decode is memory-bound, batching amortizes weight loading). Per-request: each request gets 60 tok/s, lowering token generation latency to 16.6ms. System throughput gain: 1920/50 = 38.4\times. Time-to-first-token may increase due to queuing, but per-token latency improves. At batch=32, each decode step loads weights once but computes 32 outputs, achieving near-linear throughput scaling in the memory-bound regime.'
  common_mistake: |
    **The Pitfall:** Confusing per-request throughput with system throughput.
    **The Rationale:** Candidates fail to understand that batching amortizes memory loads, dramatically increasing overall system capacity.
    **The Consequence:** Under-provisioning systems or miscalculating the cost-benefit analysis of implementing continuous batching.
  napkin_math: |
    - Batch=1: 50 tok/s total throughput.
    - Batch=32: 32 * 60 = 1920 tok/s total throughput.
    - Throughput gain = 1920 / 50 = 38.4x.
    - Per-request latency: 1/50 sec (20ms) vs 1/60 sec (16.6ms).
    - **Slight latency improvement per token, massive gain in system throughput.**
