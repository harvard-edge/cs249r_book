title: Quantization Compression Arithmetic
scenario: A 1.2B parameter model is stored in FP16.
question: "What are the FP16, INT8, and INT4 weight sizes for a 1.2B-parameter model before metadata?"
details:
  realistic_solution: FP16 needs 2.4 GB, INT8 needs 1.2 GB, and INT4 needs 0.6 GB before scales and runtime buffers. The arithmetic is simple but critical for memory feasibility.
  common_mistake: |
    **The Pitfall:** Remembering compression ratios but failing to calculate absolute memory footprints.
    **The Rationale:** Candidates know INT8 is half of FP16, but forget to multiply by parameter count.
    **The Consequence:** Memory feasibility for edge devices is incorrectly estimated.
  napkin_math: |
    - FP16: 1.2B * 2 bytes = 2.4 GB.
    - INT8: 1.2B * 1 byte = 1.2 GB.
    - INT4: 1.2B * 0.5 bytes = 0.6 GB.
    - **The INT4 weight size is 0.6 GB before adding scales and runtime buffers.**
