title: Global Degradation Policy Spec
scenario: A product runs cloud inference when online, mobile inference offline, and a TinyML fallback for safety alerts. Specify a degradation policy that preserves user trust when higher-quality paths fail.
question: What should a degradation policy specify across cloud, mobile, and TinyML fallback paths?
details:
  realistic_solution: It should define trigger conditions, fallback order, quality tradeoffs, user-visible messaging, safety limits, telemetry, and recovery criteria. Cloud failure should not silently produce unsafe TinyML behavior; each lower-quality path needs a scoped promise.
  common_mistake: Treating degradation as simply running any available smaller model without defining quality and safety boundaries.
  napkin_math: If cloud accuracy is 98%, mobile is 94%, and TinyML is 85% only for safety alerts, the product should not expose TinyML as a full replacement.
