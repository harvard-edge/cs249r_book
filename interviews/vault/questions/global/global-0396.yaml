title: Chiplet Topology Spec For Model Parallelism
scenario: A hardware team asks what interconnect metrics an ML team needs before approving a chiplet accelerator for tensor-parallel transformer inference.
question: What chiplet interconnect specs are required to evaluate tensor-parallel transformer inference on a chiplet accelerator?
details:
  realistic_solution: "Tensor Parallelism mandates exhaustive latency evaluations beyond aggregate TOPS. Require sustained bi-sectional bandwidth, hop latency contours, topology (e.g. 2D Torus), and native hardware collective support (AllReduce). Without verified overlap capability, the interconnect will choke on layer-by-layer activation exchanges."
  common_mistake: |
    **The Pitfall:** Accepting only peak TOPS and aggregate bandwidth numbers from hardware teams.
    **The Rationale:** Aggregate specs look impressive and are easy to put on a marketing slide.
    **The Consequence:** Deploying an accelerator that performs miserably on real models because it hides catastrophic collective latency and topology bottlenecks.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Layer activation exchange: 20 MB
       - Sustained bandwidth: 200 GB/s
       - Layer count: 80
    2. **Calculations:**
       - Minimum transfer time: 80 * 20 MB / 200 GB/s = 8 ms
    3. **Conclusion & Interpretation:**
       - **Result: Communication-Bound (Without latency overheads)**
