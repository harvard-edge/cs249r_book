title: Chiplet Topology Spec For Model Parallelism
scenario: A hardware team asks what interconnect metrics an ML systems team needs before approving a chiplet accelerator for transformer inference. The model will use tensor-parallel shards that exchange activations every layer.
question: What chiplet interconnect specs are required to evaluate tensor-parallel transformer inference on a chiplet accelerator?
details:
  realistic_solution: The spec must include per-link bandwidth, bisection bandwidth, hop latency, topology, routing contention, memory locality, collective support, and sustained rather than peak bandwidth. Because tensor parallelism exchanges activations every layer, the systems team also needs payload size per layer and whether communication overlaps compute.
  common_mistake: |
    **The Pitfall:** Accepting only peak TOPS and aggregate bandwidth numbers from hardware teams.
    **The Rationale:** Aggregate specs look impressive and are easy to put on a marketing slide.
    **The Consequence:** Deploying an accelerator that performs miserably on real models because it hides catastrophic collective latency and topology bottlenecks.
  napkin_math: |
    * Activation exchange per layer: 20 MB.
    * Layer count: 80 layers.
    * Sustained bandwidth: 200 GB/s.
    * Raw transfer time: 80 layers * 20 MB / 200 GB/s = 8 ms.
    * **This 8 ms is just the absolute minimum bound, prior to latency and routing contention overhead.**
