title: The Speculative Decoding Paradox
scenario: Serving LLaMA-3-70B with a 7B draft speculative decoding model improves low-load latency but collapses high-load throughput from 2000 to 1200 tokens/sec.
question: Why does speculative decoding improve TPOT at 1 QPS but collapse throughput at 50 QPS, and how should you handle it?
details:
  realistic_solution: "Speculative decoding trades spare memory bandwidth for latency improvements. Under continuous batching, HBM saturates. The draft model parasitically devours VRAM and SM cycles, strictly limiting the maximum achievable batch size of the target model. Dynamic routing must disable speculation at high utilization."
  common_mistake: |
    **The Pitfall:** Assuming the draft model has a low acceptance rate, causing redundant compute without checking system utilization.
    **The Rationale:** Acceptance rate is often the focus of speculative decoding, ignoring the physical hardware limits of memory bandwidth and VRAM under heavy load.
    **The Consequence:** Failing to implement dynamic fallback thresholds, leading to severe latency spikes and service degradation during peak traffic.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 70B target, 7B draft
       - High load: HBM bandwidth saturated
    2. **Calculations:**
       - Draft generates 4 tokens (12ms at BS=1)
       - Target verifies 4 tokens (15ms)
       - At BS=128, draft KV cache bloat starves the 70B target
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bandwidth Bound (Over-subscription)**
