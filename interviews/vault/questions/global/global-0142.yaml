title: The Speculative Decoding Paradox
scenario: You serve LLaMA-3-70B on an 8xH100 cluster. Baseline throughput is 2000 tokens/sec. To improve latency, you enable speculative decoding with a 7B draft model. At low load (1 QPS), Time-Per-Output-Token (TPOT) drops impressively from 15ms to 9ms. However, during peak traffic (50 QPS), the total system throughput collapses to 1200 tokens/sec, and request queues build up rapidly.
question: "Why does speculative decoding improve TPOT at 1 QPS but collapse throughput at 50 QPS, and how should you handle it?"
details:
  realistic_solution: Speculative decoding fundamentally trades compute (FLOPS) and memory bandwidth for latency. Under low load, the GPU is underutilized, so the draft model's extra computations are effectively 'free', yielding lower latency. However, under high load with continuous batching, the system becomes compute and memory-bandwidth bound. The 7B draft model consumes precious SM cycles and HBM bandwidth to generate its tokens, competing directly with the 70B model. Furthermore, the draft model's KV cache consumes VRAM, reducing the maximum possible batch size for the target model. This overhead reduces the overall system capacity, causing throughput to collapse under peak concurrency. Speculative decoding should be dynamically disabled when system utilization exceeds a certain threshold.
  common_mistake: Assuming the draft model has a low acceptance rate, causing redundant compute without checking system utilization.
  napkin_math: 'Assume baseline 70B decode takes 15ms/token at BS=128 (memory bound). Draft 7B generates 4 tokens. Target 70B verifies 4 tokens in one forward pass. At low load (BS=1): Draft takes 4 * 3ms = 12ms. Target verifies in 15ms. Total 27ms for ~3 accepted tokens = 9ms/token (better than 15ms). At high load (BS=128): HBM bandwidth is saturated. Draft model requires 4 separate memory-bound passes, consuming bandwidth. Target model requires 1 pass. The extra FLOPS and bandwidth consumed by the draft model reduce the maximum sustainable batch size from 128 to, say, 64, cutting overall throughput (tokens/sec) significantly.'
