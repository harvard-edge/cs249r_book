title: Queueing Model Input Spec
scenario: A platform team wants a queueing model for cloud APIs, edge gateways, and
  mobile background jobs. Specify the inputs needed before queueing predictions are
  meaningful.
question: What inputs are required before applying queueing theory across cloud APIs,
  edge gateways, and mobile jobs?
details:
  realistic_solution: 'You need arrival distribution, service-time distribution, concurrency,
    scheduling discipline, priority classes, abandonment/deadline behavior, and burst
    correlation. Different regimes have different queues: cloud requests, edge device
    buffers, and mobile OS background work.'
  common_mistake: Plugging average arrival and average service time into a formula
    and trusting the result for P99 behavior.
  napkin_math: Two systems with the same average utilization can have different P99
    latency if one has bursty arrivals or heavy-tailed service times.
