title: Queueing Model Input Spec
scenario: A platform team wants a queueing model for cloud APIs, edge gateways, and mobile background jobs.
question: "What inputs are required before applying queueing theory across cloud APIs, edge gateways, and mobile jobs?"
details:
  realistic_solution: "You need arrival distribution, service-time distribution, concurrency, scheduling discipline, priority classes, abandonment/deadline behavior, and burst correlation. Different regimes have different queues: cloud requests, edge device buffers, and mobile OS background work."
  common_mistake: |
    **The Pitfall:** Plugging average arrival and average service time into a formula and trusting the result for P99 behavior.
    **The Rationale:** Many queueing formulas (like M/M/1) use averages, making them easy to apply but dangerous in practice.
    **The Consequence:** Drastically underestimating tail latency because real-world systems experience bursty traffic and heavy-tailed service times.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Two systems can have the exact same average utilization (e.g., 70%).
    2. **Calculations:**
       - If System A has bursty arrivals or heavy-tailed service times, its P99 latency will be exponentially higher than System B's.
    3. **Conclusion & Interpretation:**
       - **Result: Latency-Bound. Queueing models without variance and distribution inputs are useless for P99 latency planning.**
