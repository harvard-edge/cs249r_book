title: Data Selection Across Regimes
scenario: A model improvement program receives cloud logs, mobile hard-example telemetry, and edge incident clips.
question: How would you design a data selection policy across cloud logs, mobile telemetry, and edge incident clips to avoid overfitting to the most abundant source?
details:
  realistic_solution: 'Use source quotas, uncertainty and diversity sampling, rare-event floors, privacy filters, and a held-out evaluation set per source. Cloud logs may dominate volume, but edge incident clips and mobile hard examples can carry high learning value.'
  common_mistake: |
    **The Pitfall:** Selecting by raw volume and letting abundant cloud logs drown out rare but important edge/mobile failures.
    **The Rationale:** It's much easier to randomize across a single data lake than to implement complex, source-aware quotas and diversity sampling.
    **The Consequence:** The model gets exceptionally good at easy, common cases while continuously failing on critical, rare edge scenarios.
  napkin_math: |
    **Assumptions & Constraints:**
    - Cloud logs provide 95% of total examples.
    - Edge incidents represent <1% of volume but capture the most severe failures.

    **Calculations:**
    - Random sampling probability for edge incident = 1%.
    - In a batch of 1000, expected edge incidents = 10 (insufficient gradient signal).

    **Conclusion & Interpretation:**
    - **Result: Signal Starvation (Data-Diversity-Bound)**. A naive volume-based sampler will virtually eliminate safety-critical edge signals, starving the model of high-value updates.
