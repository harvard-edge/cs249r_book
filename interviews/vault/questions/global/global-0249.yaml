title: Maximizing Tokens-per-Watt for Sustainable Inference
scenario: Your organization commits to a carbon budget of 100 gCO2 per 1M output tokens. Current infrastructure produces 195 gCO2/1M tokens.
question: How would you design an optimization plan to meet the carbon target without reducing throughput?
details:
  realistic_solution: 'To hit the 100 gCO2 budget, we must optimize both hardware power efficiency and energy source carbon intensity. (1) Power Capping: Capping the H100 at 400W reduces power consumption by 43% while throughput only drops by ~10% (as it enters the more efficient region of the voltage-frequency curve). This reduces energy per token, bringing emissions to ~124 gCO2 / 1M tokens. (2) Carbon-aware Scheduling: By shifting flexible batch workloads to regions or times where the grid carbon intensity is lower (e.g., 200 gCO2/kWh instead of 400 gCO2/kWh), we halve the remaining emissions, reaching ~62 gCO2 / 1M tokens, safely meeting the 100 gCO2 budget.'
  common_mistake: |
    **The Pitfall:** Only considering hardware power reduction.
    **The Rationale:** Candidates focus strictly on the accelerator and ignore macro-system factors like grid carbon intensity and workload flexibility.
    **The Consequence:** Failing to meet strict carbon targets because they overlook the massive leverage of carbon-aware scheduling.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Baseline = 195 gCO2 / 1M tokens.
       - Target = 100 gCO2 / 1M tokens.
    2. **Calculations:**
       - Power cap 400W = 43% power drop, 10% throughput drop = 36% energy reduction -> 124 gCO2.
       - Carbon-aware scheduling shifts grid to 200 gCO2/kWh (50% reduction) -> 62 gCO2.
    3. **Conclusion & Interpretation:**
       - **Result: Grid-Carbon Bound**
