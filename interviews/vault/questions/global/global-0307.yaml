title: Global New 0008
scenario: You are serving a 30B parameter FP16 model on a single GPU. Each token requires exactly 1MB of KV cache memory.
question: How would you determine the available memory for KV cache and calculate how many total tokens can be stored concurrently?
details:
  realistic_solution: Memory capacity sets a hard ceiling on concurrent serving. First, determine the size of the model weights in VRAM. Subtract this from the total GPU memory to find the residual memory available for the KV cache. Divide this residual memory by the per-token KV cache size to find the token capacity.
  common_mistake: |
    **The Pitfall:** Forgetting to subtract the base model weights from the total VRAM.
    **The Rationale:** Often KV cache calculations are done independently without considering the static model overhead.
    **The Consequence:** Incorrectly assuming all available capacity can be used for the KV cache, leading to severe out-of-memory crashes in production.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model size = 30B parameters × 2 bytes/param = 60GB.
    - Total VRAM = 80GB. KV cache per token = 1MB.

    **Calculations:**
    - Remaining VRAM = 80GB total - 60GB model = 20GB.
    - KV cache capacity = 20GB / 1MB per token = 20,000MB / 1MB.

    **Conclusion & Interpretation:**
    - **Result: 20,000 tokens (Memory-Bound)**. Total token capacity is 20,000 tokens.
