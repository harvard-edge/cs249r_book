title: Global New 0008
scenario: You are serving a 30B parameter FP16 model on a single H100 80GB GPU. Determine the available
  memory for KV cache and calculate how many total tokens can be stored concurrently if each token requires
  exactly 1MB of KV cache memory.
question: "How would you determine the available memory for KV cache and calculate how many total tokens can be stored concurrently if each token requires exactly 1MB of KV cache memory?"
details:
  realistic_solution: Memory capacity sets a hard ceiling on concurrent serving. First, determine the
    size of the model weights in VRAM. Subtract this from the total GPU memory to find the residual memory
    available for the KV cache. Divide this residual memory by the per-token KV cache size to find the
    token capacity.
  common_mistake: Forgetting to subtract the base model weights from the total VRAM, incorrectly assuming
    all 80GB can be used for the KV cache.
  napkin_math: Model size = 30B * 2B = 60GB. Remaining VRAM = 80GB - 60GB = 20GB. KV cache capacity =
    20GB / 1MB/token = 20,000MB / 1MB = 20,000 tokens.
