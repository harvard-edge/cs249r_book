title: The Optimizer Memory Tradeoff at Scale
scenario: A team training a 175B LLM proposes switching from Adam to SGD with momentum to save memory — SGD stores only 1 state tensor per parameter instead of Adam's 2, potentially saving hundreds of GB across the cluster.
question: When would you consider SGD with momentum for a 175B LLM, and when is Adam's memory overhead justified?
details:
  realistic_solution: "For a 175B model: Adam stores m + v = 2 * 175B * 4 bytes = 1.4 TB of optimizer state across the cluster. SGD with momentum stores only momentum = 175B * 4 bytes = 700 GB — saving 700 GB total. However, Adam's per-parameter adaptive learning rates are critical for LLMs because: (1) different parameter groups (embeddings, attention, FFN) have gradient distributions that vary by orders of magnitude, (2) Adam adapts to the local curvature, which matters enormously in the flat-but-sharp landscape of large transformers, (3) empirically, SGD requires 3-5x more tokens to reach the same loss as Adam for LLMs. The memory savings from SGD would be better achieved through ZeRO-style optimizer state partitioning (distribute Adam states across GPUs) or 8-bit Adam (quantize m and v to INT8, saving 75% of optimizer memory with <0.1% quality loss)."
  common_mistake: |
    **The Pitfall:** Accepting SGD uncritically simply because it cuts optimizer memory footprint in half.
    **The Rationale:** Large-scale training is heavily memory constrained, making any RAM reduction immediately appealing.
    **The Consequence:** Increasing the training token requirement by 3-5x to reach the same loss, costing millions of dollars in extra compute time.
  napkin_math: |
    * Adam state (m + v): 175B * 4 bytes * 2 states = 1.4 TB.
    * SGD+momentum state: 175B * 4 bytes * 1 state = 700 GB.
    * 8-bit Adam state: 175B * 1 byte * 2 states = 350 GB.
    * ZeRO Stage 1 Adam (across 512 GPUs): 1.4 TB / 512 = 2.7 GB/GPU.
    * **8-bit Adam or ZeRO partitioning saves far more memory than switching to SGD without sacrificing convergence.**
