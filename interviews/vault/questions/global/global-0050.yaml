title: The Optimizer Memory Tradeoff at Scale
scenario: A team training a 175B LLM proposes switching from Adam to SGD with momentum
  to halve optimizer memory and save cluster RAM.
question: When would you consider SGD with momentum for a 175B LLM, and when is Adam's
  memory overhead justified?
details:
  realistic_solution: Adam's per-parameter adaptive learning rates are functionally
    mandatory for transformers due to vicious curvature landscapes. SGD demands 3-5x
    more tokens to converge, obliterating compute budgets. Secure memory via ZeRO-1/2
    sharding or 8-bit Adam quantization instead of abandoning adaptive optimization.
  common_mistake: '**The Pitfall:** Accepting SGD uncritically simply because it cuts
    optimizer memory footprint in half.

    **The Rationale:** Large-scale training is heavily memory constrained, making
    any RAM reduction immediately appealing.

    **The Consequence:** Increasing the training token requirement by 3-5x to reach
    the same loss, costing millions of dollars in extra compute time.

    '
  napkin_math: '**Assumptions & Constraints:**

    - 175B LLM parameters

    - Adam state: 8 bytes/param (m+v in FP32)


    **Calculations:**

    - Adam state total: 175B * 8 bytes = 1.4 TB

    - SGD state: 175B * 4 bytes = 700 GB

    - ZeRO-1 on 512 GPUs: 1.4 TB / 512 = 2.7 GB/GPU


    **Conclusion & Interpretation:**

    - **Result: Convergence-Bound (Compute Cost > Memory Cost)**. The compute cost
    of needing more tokens with SGD outweighs the RAM savings, making Adam justified.

    '
