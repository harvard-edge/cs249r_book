title: Memory Pressure Optimization
scenario: A serving process uses 68 GB of an 80 GB GPU. A new feature adds a 20 GB KV cache at peak.
question: How would you avoid OOM when a 68 GB serving process adds a 20 GB peak KV cache on an 80 GB GPU while preserving most throughput?
details:
  realistic_solution: Total peak would be 88 GB, exceeding capacity by 8 GB. Options include limiting context/batch, paged KV with eviction, quantizing KV, offloading cold KV, or moving to a larger/more sharded deployment. The first fix should target the dynamic KV cache because the static process already consumes most memory.
  common_mistake: |
    **The Pitfall:** Trying to shave small code overheads or quantize the base weights slightly while ignoring the 20 GB dynamic KV cache.
    **The Rationale:** Failing to identify that the dynamic KV cache is the primary variable memory consumer that pushed the system over the edge.
    **The Consequence:** Wasting time on micro-optimizations that yield mere megabytes while the system still OOMs by gigabytes.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - GPU Memory: 80 GB.
       - Static Process Memory: 68 GB.
       - Dynamic Peak KV Cache: 20 GB.
    2. **Calculations:**
       - Total Peak Memory: 68 GB + 20 GB = 88 GB.
       - Memory Deficit: 88 GB - 80 GB = 8 GB over capacity.
    3. **Conclusion & Interpretation:**
       - **Result: 8 GB deficit. Memory-Capacity-Bound requiring dynamic KV offloading or paged eviction.**
