title: LLM Serving Arithmetic Intensity
scenario: You are serving a 30B parameter LLM (FP16) on a single 80GB A100 GPU (2 TB/s HBM bandwidth).
  At a batch size of 1, token generation latency is 30ms, yielding ~33 QPS. You want to scale to 500 QPS.
  However, when you increase the batch size, the system throws a CUDA Out of Memory error at a batch size
  of 4. The average request sequence length is 2048 tokens.
details:
  realistic_solution: The system is simultaneously hitting a memory capacity wall (OOM) and a memory bandwidth
    wall (decoding arithmetic intensity). The 30B FP16 weights consume 60GB of HBM, leaving 20GB. The
    KV cache per token is ~2.1 MB (2 * 64 layers * 64 heads * 128 dim * 2 bytes). At 2048 tokens, the
    KV cache per request is ~4.3 GB, limiting the maximum batch size to floor(20 / 4.3) = 4 — but activations
    and CUDA context consume the remaining headroom, so OOM occurs at batch size 4. Max safe batch size
    = 3. To hit 500 QPS, you must optimize the memory footprint. By applying INT4 Weight-Only Quantization
    (W4A16), the weight footprint drops from 60GB to 15GB. This frees up 45GB of VRAM, allowing a batch
    size of up to ~10. Furthermore, reading 15GB of weights at 2 TB/s takes only 7.5ms per token. At a
    batch size of 10, the theoretical throughput becomes 10 tokens / 7.5ms = 1333 QPS, comfortably exceeding
    the 500 QPS target without adding hardware.
  common_mistake: Attempting to use faster matrix multiplication kernels (like FlashAttention) or CUDA
    graphs, which do not solve the fundamental capacity bottleneck of the KV cache.
  napkin_math: 'KV cache per token (assuming 64 layers, 64 heads, 128 dim): 2 * 64 * 64 * 128 * 2 bytes
    = 2.1 MB. At 2048 tokens: 2.1 MB * 2048 = 4.3 GB per request. FP16 Weights: 30B * 2B = 60GB. Max BS
    = (80GB - 60GB) / 4.3GB = 4 (OOMs at 4 due to context/activations overhead). Max safe BS = 3. Throughput
    = 3 / (60GB / 2000GB/s) = 3 / 0.03s = 100 QPS. INT4 Weights: 30B * 0.5B = 15GB. Remaining VRAM = 65GB.
    Max BS = 65 / 4.3 = 15. Read latency = 15GB / 2000GB/s = 7.5ms. Throughput at BS 10 = 10 / 0.0075s
    = 1333 QPS.'
