title: torch.compile Recompilation Storm
scenario: After enabling torch.compile, your inference server's latency spikes to 5× normal every few
  minutes before returning to baseline. GPU memory gradually increases. Profiling shows the compiler is
  triggered repeatedly. What causes this and how do you fix it?
details:
  realistic_solution: 'torch.compile traces a graph specialized to specific tensor shapes. When a new
    shape arrives, it triggers recompilation (expensive: seconds to tens of seconds). In inference serving,
    varying request lengths produce diverse shapes, causing a ''recompilation storm.'' Fixes: (1) Use
    torch.compile(dynamic=True) to generate shape-generic kernels (slight perf loss but no recompilation).
    (2) Pad inputs to a small set of bucket sizes (e.g., 128, 256, 512, 1024, 2048) so only 5 graphs are
    compiled. (3) Set torch._dynamo.config.cache_size_limit to cap memory. (4) Pre-warm the cache with
    representative shapes during server startup. The fundamental tradeoff: specialized kernels are faster
    but shape-specific; generic kernels are slower but compile once.'
  common_mistake: Thinking torch.compile compiles once. Dynamic shapes (varying sequence lengths, batch
    sizes) trigger recompilation, and each compiled graph is cached — consuming memory.
  napkin_math: 'Each compiled graph: 50-500 MB. 20 unique shapes = 1-10 GB of compiled cache. Recompile
    time: 5-30s per graph. If shapes repeat, amortizes over time; if not, the overhead is constant.'
