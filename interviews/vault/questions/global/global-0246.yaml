title: Designing a Mixed-Precision Serving Strategy
scenario: You serve a 70B model on 2x GPUs. FP16 achieves baseline quality but only 800 tok/s aggregate. Your target is 2000 tok/s with <1% quality degradation on your evaluation suite.
question: How would you design a mixed-precision quantization strategy to meet the 2000 tok/s target?
details:
  realistic_solution: 'Step 1: Profile layer sensitivity — quantize each layer independently and measure perplexity impact. Typically: embedding/LM head layers = very sensitive (keep FP16), attention QKV/O = medium sensitivity (INT8), MLP up/down/gate = low sensitivity (INT4), LayerNorm = keep FP16 (tiny memory footprint). Step 2: Apply mixed scheme. Rough breakdown for 70B: embeddings and LM head (~1.5B params in FP16) = 3 GB, attention (~12.5B in INT8) = 12.5 GB, MLP (~56B in INT4) = 28 GB. Total ≈ 43.5 GB vs 140 GB FP16. Step 3: Memory-bound decode throughput scales ≈ proportionally to weight reduction: 140/43.5 = 3.2x potential speedup. Realistic with overhead: 2.5x. New throughput: 800 x 2.5 = 2000 tok/s. Well above 2000 target with room for conservative quantization where needed. Step 4: Use calibration data from your domain to select per-layer bit widths with AWQ.'
  common_mistake: |
    **The Pitfall:** Uniformly quantizing all layers to INT4.
    **The Rationale:** Assuming simple 4-bit quantization across the board is sufficient without profiling.
    **The Consequence:** Severe quality degradation because sensitive layers (like attention QKV or LM heads) lose too much precision.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 70B model baseline FP16: 140 GB. Throughput: 800 tok/s.
       - Target: 2000 tok/s.
       - Mixed precision layers: Embeddings/Head (~1.5B, FP16), Attention (~12.5B, INT8), MLP (~56B, INT4).
    2. **Calculations:**
       - Embeddings (FP16): 3 GB.
       - Attention (INT8): 12.5 GB.
       - MLP (INT4): 28 GB.
       - Mixed precision total memory: ~43.5 GB.
       - Compression ratio / Bandwidth savings: 140 GB / 43.5 GB = ~3.2x.
       - Projected throughput: 800 tok/s * 2.5 (realistic sub-linear scaling) = 2000 tok/s.
    3. **Conclusion & Interpretation:**
       - **Mixed precision reduces memory to 43.5 GB, yielding a 2.5x speedup to hit 2000 tok/s without quality loss.**
       - **Result: Memory-Bandwidth Bound (Optimized)**
