title: The Full-Stack Constraint Propagation Workflow
scenario: 'Your company wants to deploy an LLM-powered product with strict requirements: P99 latency < 500ms, 100 QPS, cost < $0.001 per query, and the model must fit on a single GPU.'
question: "How would you design the ML development workflow that propagates these constraints backward through the entire development lifecycle?"
details:
  realistic_solution: 'Backward constraint propagation: Step 1 (Serving -> Model Size): An 80GB GPU constraint eliminates > 40B BF16 models. P99 < 500ms at 100 QPS requires ~20K tokens/sec. A 7B model at INT4 (~3.5 GB) fits easily and maximizes throughput. Step 2 (Cost -> Precision): $0.001/query at 100 QPS = $0.10/sec budget. A single H100 costs ~$3/hr = $0.00083/sec, well within budget. Step 3 (Model -> Training): 7B INT4 serving means fine-tuning a 7B BF16 model, then quantizing with GPTQ/AWQ. Step 4 (Training -> Data): Budget constraints cap fine-tuning data to ~100K high-quality domain examples. The surviving option space is a 7B fine-tuned INT4 model on a single H100.'
  common_mistake: |
    **The Pitfall:** Starting with model selection (e.g., "let's use Llama 70B") and then trying to make it fit the constraints.
    **The Rationale:** Candidates often use a forward-pass approach, picking a model first and optimizing later, rather than working backward from production constraints.
    **The Consequence:** Leads to multiple failed iterations, wasted compute, and un-deployable models.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 80 GB VRAM limit, 100 QPS, P99 < 500ms.
       - Cost < $0.001 per query.
    2. **Calculations:**
       - 7B INT4 weights = ~3.5 GB VRAM.
       - H100 decode throughput at 7B INT4 = ~15-20K tokens/sec.
       - Required throughput = 100 QPS * 200 tokens = 20K tokens/sec.
       - Cost = $3/hr / 3600 = $0.00083/sec. Budget = $0.10/sec.
    3. **Conclusion & Interpretation:**
       - **Result: Hardware-Constrained Model Selection.** Only quantized models <= 13B can satisfy both throughput and memory constraints on a single GPU.
