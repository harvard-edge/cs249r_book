title: The Full-Stack Constraint Propagation Workflow
scenario: Your company wants to deploy an LLM-powered product with these requirements: P99 latency < 500ms, 100 QPS, cost < $0.001 per query, and the model must fit on a single GPU for operational simplicity.
question: How would you design the ML development workflow that propagates these constraints backward through the entire development lifecycle?
details:
  realistic_solution: 'Backward constraint propagation: Step 1 (Serving -> Model Size): P99 < 500ms at 100 QPS on a single GPU. An H100 in INT4 can sustain ~10K-20K tokens/sec for a 7B model. At 100 QPS with average 200 tokens/response: need 20K tokens/sec. A 70B model at BF16 requires ~140 GB — does not fit on a single 80GB GPU, immediately eliminated. A 13B model requires ~26 GB BF16 or ~7 GB INT4, fits on one H100. A 7B model at INT4 (~3.5 GB) fits easily and maximizes throughput headroom. Single GPU constraint -> model must be <= 13B, preferably 7B. Step 2 (Cost -> Precision): $0.001/query at 100 QPS = $0.10/sec budget. H100 costs ~$3/hr = $0.00083/sec. A single H100 serving INT4 7B at ~20K tokens/sec handles 100 QPS (at ~200 tokens/query average) — cost is $0.00083/sec, well within $0.10/sec budget. Step 3 (Model -> Training): 7B INT4 serving means training/fine-tuning a 7B BF16 model, then quantizing to INT4 with GPTQ/AWQ. Fine-tuning 7B on domain data: ~10-20 H100-hours. Step 4 (Training -> Data): Fine-tuning on 100K high-quality domain examples. Budget: 100K examples * $0.50/annotation = $50K. The workflow document: a constraint matrix showing which options survive at each stage. Models > 13B eliminated at Stage 1. BF16 serving eliminated at Stage 1 (memory). Training from scratch eliminated at Stage 3 (cost/time).'
  common_mistake: |
    **The Pitfall:** Starting with model selection (e.g., "let's use Llama 70B") and then trying to make it fit the constraints.
    **The Rationale:** Candidates often use a forward-pass approach, picking a model first and optimizing later, rather than working backward from strict production constraints.
    **The Consequence:** Leads to multiple failed iterations, wasted compute, and potentially un-deployable models.
  napkin_math: |
    - Single-GPU memory constraint (80 GB): eliminate > 40B BF16 models.
    - P99 < 500ms at 100 QPS: eliminate > 13B (insufficient throughput on 1 GPU).
    - Cost constraint: confirms INT4 quantization is optimal (maximizes margin).
    - Training budget: fine-tune, don't pretrain.
    - 7B INT4 = ~3.5 GB VRAM for weights. H100 decode throughput at 7B INT4: ~15-20K tokens/sec.
    - **Surviving option space: 7B fine-tuned INT4 model on single H100.**
