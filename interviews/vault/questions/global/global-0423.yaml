title: Global Degradation Policy Spec
scenario: A product runs cloud inference when online, mobile inference offline, and a TinyML fallback for safety alerts.
question: What should a degradation policy specify across cloud, mobile, and TinyML fallback paths to preserve user trust?
details:
  realistic_solution: It should define trigger conditions, fallback order, quality tradeoffs, user-visible messaging, safety limits, telemetry, and recovery criteria. Cloud failure should not silently produce unsafe TinyML behavior; each lower-quality path needs a scoped promise.
  common_mistake: |
    **The Pitfall:** Treating degradation as simply running any available smaller model without defining quality and safety boundaries.
    **The Rationale:** Candidates assume that any response is better than no response, ignoring the risk of hallucination or unsafe outputs from tiny models.
    **The Consequence:** Exposing users to unsafe or wildly inaccurate fallback models, permanently destroying user trust.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Cloud accuracy: 98%.
       - Mobile accuracy: 94%.
       - TinyML accuracy: 85%.
    2. **Calculations:**
       - Accuracy delta = 13% drop from Cloud to TinyML.
    3. **Conclusion & Interpretation:**
       - **Result: Reliability-Bound Policy**
