title: The Multi-Region Checkpoint Strategy
scenario: You are training a critical 100B parameter model on 512 H100 GPUs in a single datacenter. The checkpoint is 200 GB. Training takes 30 days. Your datacenter has a 0.1% daily probability of a full outage.
question: Evaluate local hourly, local hourly + remote 6h, and remote hourly checkpoint strategies for expected loss and overhead tradeoffs.
details:
  realistic_solution: '(A) Local only, hourly: On datacenter failure, ALL progress lost. Expected work lost over 30 days: 30 * 0.001 = 3% chance of total loss = 0.03 * 15 = 0.45 expected days lost. (B) Local hourly + remote every 6h: Remote transfer: 200 GB / 12.5 GB/s = 16 seconds. Max work lost = 6 hours. Expected lost work: 30 * 0.001 * 3h = 0.09 hours. (C) Remote every hour: Transfer: 16s per hour = 0.44% of link capacity. Max work lost = 1 hour. Expected: 30 * 0.001 * 0.5h = 0.015 hours. Recommendation: Option C. The 16 seconds of network usage per hour is trivial, and reducing max work loss is transformative. Real cost is S3 storage: 144 TB of remote checkpoints.'
  common_mistake: |
    **The Pitfall:** Only considering checkpoint frequency without accounting for the cost of lost work on failure.
    **The Rationale:** Assuming local NVMe writes are fast enough and ignoring the risk of losing the entire datacenter.
    **The Consequence:** Suffering a catastrophic 30-day total loss because the local storage went down with the datacenter.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 200 GB checkpoint size.
       - 0.1% daily failure rate.
       - 12.5 GB/s network link.
    2. **Calculations:**
       - Failure probability = 1 - (0.999^30) = 2.96%.
       - Local expected loss = 0.0296 * 15 days = 0.44 days.
       - Remote 1h expected loss = 0.0296 * 0.5h = 0.015 hours.
       - Remote transfer = 200 GB / 12.5 GB/s = 16 seconds (0.44% of hourly bandwidth).
    3. **Conclusion & Interpretation:**
       - **Result: Risk-Bound Optimization**
