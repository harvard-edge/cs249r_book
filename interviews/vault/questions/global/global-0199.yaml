title: The Multi-Region Checkpoint Strategy
scenario: You are training a critical 100B parameter model on 512 H100 GPUs in a single datacenter. The checkpoint is 200 GB. Training takes 30 days. Your datacenter has a 0.1% daily probability of a full outage.
question: "Evaluate local hourly, local hourly + remote 6h, and remote hourly checkpoint strategies for expected loss and overhead tradeoffs."
details:
  realistic_solution: '(A) Local only, hourly: Checkpoint write: 200 GB to NVMe at 5 GB/s = 40s. On datacenter failure: ALL progress lost (local storage is in the failed DC). Expected work lost over 30 days: 30 × 0.001 = 3% chance of total loss = 0.03 × 15 = 0.45 expected days lost. But if the DC fails, you lose EVERYTHING — the loss distribution is bimodal (0 or 30 days). (B) Local hourly + remote every 6h: Remote transfer: 200 GB / 12.5 GB/s = 16 seconds. On DC failure, maximum work lost = 6 hours. Expected lost work: 30 × 0.001 × 3h (average) = 0.09 hours. Remote transfer bandwidth cost: 16s every 6h = 0.07% of link capacity — negligible. (C) Remote every hour: Transfer: 16s per hour = 0.44% of link capacity. On DC failure, max work lost = 1 hour. Expected: 30 × 0.001 × 0.5h = 0.015 hours. Bandwidth impact: minimal. Recommendation: Option C — remote hourly checkpoints. The 16 seconds of network usage per hour is trivial, and reducing max work loss from ''total'' to ''1 hour'' is transformative for a 30-day job. The real cost is storage: 200 GB × 24 checkpoints/day × 30 days = 144 TB of remote checkpoint storage (at $0.023/GB/month on S3 = $3,312/month).'
  common_mistake: |
    **The Pitfall:** Only considering checkpoint frequency without accounting for the cost of lost work on failure.
    **The Rationale:** Assuming local NVMe writes are fast enough and ignoring the risk of losing the entire datacenter.
    **The Consequence:** Suffering a catastrophic 30-day total loss because the local storage went down with the datacenter.
  napkin_math: |
    - **Probability of failure**: 1 - (0.999^30) = 2.96% over 30 days.
    - **(A) Local only**: Catastrophic risk of losing all 30 days. Expected loss: 0.0296 * 15 days = 0.44 days.
    - **(B) Remote 6h**: Max loss 6h. Expected loss: 0.0296 * 3h = 0.089 hours.
    - **(C) Remote 1h**: Max loss 1h. Expected loss: 0.0296 * 0.5h = 0.015 hours.
    - **Remote Transfer**: 200 GB / 12.5 GB/s = 16 seconds (0.44% of hourly bandwidth).
    - **Storage Cost**: 200 GB * 24/day * 30 days = 144 TB (~$3,312/mo).
    - **Conclusion**: Option C (Remote 1h) is optimal, as **$3,312** is trivial compared to the compute cost of ~$920k.
