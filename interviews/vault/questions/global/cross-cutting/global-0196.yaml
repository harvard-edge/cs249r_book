title: The GPAI Threshold Debate
scenario: The EU AI Act defines 'General-Purpose AI' (GPAI) models with additional obligations for those trained with more than 10^25 FLOPs. Your company trained a 70B parameter model using 2,048 GPUs for 90 days at 40% MFU.
question: Does the 70B model trained on 2,048 GPUs for 90 days exceed the EU AI Act 10^25 FLOP threshold, and what does that imply?
details:
  realistic_solution: 'Training compute: Peak FP16 = 989 TFLOPS. Effective FLOPS = 989 x 0.40 MFU = 395.6 TFLOPS per GPU. Total compute = 2,048 GPUs x 395.6 TFLOPS x 90 days x 86,400 s/day = 2,048 x 395.6 x 10^12 x 7,776,000 = 6.3 x 10^24 FLOPs. This is BELOW the 10^25 threshold (by ~37%). The model does not trigger systemic risk obligations. However: it is close enough that adding 60% more training (e.g., training for 144 days, or using 3,200 GPUs) would cross the line. Implications: (1) You avoid the most onerous obligations (red-teaming, incident reporting, cybersecurity measures). (2) You still must comply with basic GPAI obligations (technical documentation, copyright compliance, training data summary). (3) Strategic consideration: if you plan to scale up, design your compliance infrastructure now because the next model will likely cross the threshold.'
  common_mistake: |
    **The Pitfall:** Confusing parameter count with training compute.
    **The Rationale:** Assuming a 70B model automatically exceeds regulatory thresholds without calculating actual training duration and MFU.
    **The Consequence:** Unnecessarily applying strict regulatory overhead or missing the compliance deadline when scaling up the next training run.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 2,048 GPUs, 90 days (7,776,000 sec).
       - Peak FP16: 989 TFLOPS. MFU: 40%.
       - Regulatory threshold: $10^{25}$ FLOPs.
    2. **Calculations:**
       - Effective FLOPs/sec per GPU: 989 TFLOPS * 0.40 = 395.6 TFLOPS ($3.956 \times 10^{14}$).
       - Total Compute = 2,048 * ($3.956 \times 10^{14}$) * 7,776,000 sec = $6.3 \times 10^{24}$ FLOPs.
       - Margin: $6.3 \times 10^{24}$ is ~37% below $10^{25}$.
    3. **Conclusion & Interpretation:**
       - **The model does not trigger systemic risk obligations, falling safely below the $10^{25}$ threshold.**
       - **Result: Compute-Bound Regulatory Threshold**
