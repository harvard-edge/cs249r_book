title: Fairness Evaluation Across Deployment Regimes
scenario: A speech model runs in cloud, mobile, and TinyML modes. The cloud service logs full waveforms, the mobile app logs aggregate metrics, and the TinyML device stores only 4 KB/day of counters.
question: How would you design a fairness evaluation plan across these three privacy and storage regimes?
details:
  realistic_solution: Use a tiered audit. Cloud can run full subgroup error analysis on sampled waveforms. Mobile should compute on-device subgroup and confidence aggregates with privacy-preserving upload. TinyML should track compact counters such as false-positive/false-negative proxies by environment bucket. The shared metric definition must be consistent, but the evidence granularity changes by track.
  common_mistake: |
    **The Pitfall:** Requiring the TinyML device to produce the same audit artifact as cloud.
    **The Rationale:** Teams often try to enforce a unified logging schema for all deployments to simplify data ingestion.
    **The Consequence:** Fairness evaluation is abandoned for edge devices because "it doesn't fit," leaving severe blind spots.
  napkin_math: |
    **Assumptions & Constraints:**
    - TinyML storage budget: 4 KB/day.
    - Counter size: 16 bytes.

    **Calculations:**
    - Capacity = 4096 bytes / 16 bytes = 256 counters.
    - Allocation = 8 environments * 4 outcomes * 8 windows = 256.

    **Conclusion & Interpretation:**
    - **Result: Storage-Capacity Bound**. TinyML devices must use compact counters due to severe storage limits.
