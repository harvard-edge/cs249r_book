title: GPU-Hour Cost Decomposition
scenario: A cloud instance costs $3.00/GPU-hour.
question: What are the approximate cost components (hardware amortization, electricity, cooling, networking, staff) that make up this price?
details:
  realistic_solution: 'Approximate decomposition of a $3.00/GPU-hour instance: Hardware amortization: ~$1.50-1.80 (50-60%). A GPU costs ~$15K, server total ~$200K for 8 GPUs. Over 3 years = $200K / (3×8760h×8) ≈ $0.95/GPU-hour for hardware alone, but cloud providers add margin. Electricity: ~$0.30-0.45 (10-15%). 400W × $0.06/kWh = $0.024/h raw power, but PUE of 1.2 and facility costs push this up. Networking + storage: ~$0.15-0.30 (5-10%). Facility + cooling: ~$0.15-0.30 (5-10%). Staff + operations: ~$0.15-0.30 (5-10%). Cloud provider margin: ~$0.30-0.60 (10-20%). Understanding this breakdown reveals why spot instances (50-70% discount) exist — the hardware depreciates whether it runs or not.'
  common_mistake: |
    **The Pitfall:** Assuming electricity is the dominant cost component.
    **The Rationale:** Overestimating the impact of power consumption compared to the massive capital expenditure of the hardware.
    **The Consequence:** Failing to understand cloud pricing models and why spot instances offer such steep discounts.
  napkin_math: |
    **Assumptions & Constraints:**
    - Server: ~$200K for 8 GPUs.
    - Amortization: 3 years (26,280 hours).
    - Power: 400W per GPU, $0.06/kWh, PUE 1.2.

    **Calculations:**
    - Hardware Amortization: $200,000 / (3 * 8760 * 8) ≈ $0.95/GPU-hour.
    - Electricity: 0.4kW * $0.06/kWh * 1.2 ≈ $0.029/GPU-hour.
    - Margin & Ops: Facility, networking, staff, and provider margin roughly double the base cost.

    **Conclusion & Interpretation:**
    - **Result: Hardware Amortization Dominates (Cost-Bound)**. Total ≈ $3.00/GPU-hour. Hardware is the primary bottleneck for cost.
