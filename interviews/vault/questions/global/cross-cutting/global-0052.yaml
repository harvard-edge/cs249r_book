title: The Disaggregated Evaluation Pipeline
scenario: Your image classification model achieves 94% accuracy on the test set. Management is satisfied and wants to ship. You propose running disaggregated evaluation first. The test set has 10 demographic subgroups and 50 intersectional subgroups (age x gender x skin tone).
question: How many samples per subgroup are needed to detect a 5-point accuracy gap with 80% power, and how large should the eval set be?
details:
  realistic_solution: 'Using a two-proportion z-test, detecting a 5pp difference (94% vs 89%) with 80% power and α=0.05 requires approximately 484 samples per subgroup. For 50 intersectional subgroups: 50 x 484 = 24,200 minimum test samples, assuming perfect balance. Real-world subgroup distributions are highly skewed (intersectional minorities may be <1% of data), so you need to oversample rare subgroups. Practical minimum: ~60K–100K labeled evaluation images with stratified sampling. The systems implication: disaggregated evaluation is a data engineering problem. You need a metadata-rich evaluation dataset with demographic annotations, a stratified sampling pipeline, and statistical testing infrastructure that reports per-subgroup confidence intervals, not just point estimates.'
  common_mistake: |
    **The Pitfall:** Assuming the existing test set is large enough without checking subgroup sizes.
    **The Rationale:** Relying on aggregate metrics and ignoring the statistical power needed for rare intersectional slices.
    **The Consequence:** Failing to detect statistically significant fairness gaps because the subgroup sample size is too small.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 50 intersectional subgroups.
       - Detect a 5pp difference (94% vs 89%) with 80% power and alpha=0.05.
       - Two-proportion z-test required sample size: ~484 samples per group.
    2. **Calculations:**
       - Minimum total size assuming perfect balance: 50 subgroups * 484 samples = 24,200 samples.
       - Given real-world skew, total eval set must be heavily oversampled (60K-100K).
    3. **Conclusion & Interpretation:**
       - **A minimum of 24,200 samples is required to achieve statistical power for fairness evaluation.**
       - **Result: Sample-Size Bound (Statistical Power)**
