title: Cross-Surface Privacy Budget Spec
scenario: A product uses DP analytics in cloud logs, mobile telemetry, and federated training.
question: "What privacy-budget accounting is needed when cloud analytics, mobile telemetry, and federated training all use DP?"
details:
  realistic_solution: 'The spec should define user identity scope, event scope, epsilon/delta accounting per mechanism, composition over time, opt-out behavior, and reporting cadence. Separate teams cannot spend privacy budget independently if the same user contributes to multiple surfaces. Simple composition is the conservative baseline; tighter accounting such as RDP may be used if specified.'
  common_mistake: 'Treating each DP system as isolated and forgetting composition across product surfaces.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Single user contributes to cloud logs, mobile telemetry, and federated training.
    - Privacy budget (epsilon) limits total acceptable privacy loss.
    
    **Calculations:**
    - Weekly cloud log epsilon = 0.2.
    - Weekly mobile telemetry epsilon = 0.1.
    - Weekly federated training epsilon = 0.5.
    - Total simple composition = 0.2 + 0.1 + 0.5 = 0.8 epsilon.
    
    **Conclusion & Interpretation:**
    - **Result: 0.8 Weekly Epsilon (Privacy Budget Bound)**. Under simple composition, privacy loss is additive across all product surfaces, requiring global governance to prevent exceeding the aggregate budget.
