title: Cost Per 1M Tokens Served
scenario: Your instance costs $3.50/hour and serves a 70B model at 2000 output tokens/s aggregate throughput.
question: What is the marginal compute cost per 1M output tokens for the serving 2000 tokens/s at $3.50/hour?
details:
  realistic_solution: Tokens per hour = 2000 tok/s × 3600 s = 7.2M tokens. Cost per 1M tokens = $3.50 / 7.2 = $0.49/1M tokens. For context, this is the marginal compute cost only — you also need input processing (cheaper, higher throughput), redundancy (typically 2× for availability), load balancing, and engineering overhead. Real-world pricing is typically 3-5× marginal cost. This is why OpenAI charges ~$2-15/1M output tokens depending on model size.
  common_mistake: |
    **The Pitfall:** Forgetting to account for both input and output tokens separately, or confusing per-request throughput with aggregate throughput.
    **The Rationale:** Throughput numbers are easily conflated, leading to inaccurate margin calculations.
    **The Consequence:** Pricing APIs at a loss or drastically overestimating serving costs.
  napkin_math: |
    **Assumptions & Constraints:**
    - Instance cost: $3.50/hour. Throughput: 2000 tokens/s.

    **Calculations:**
    - Tokens per hour = 2000 tok/s × 3600 s = 7.2M tokens.
    - Cost per 1M tokens = $3.50 / 7.2M tokens = $0.49/1M tokens.

    **Conclusion & Interpretation:**
    - **Result: $0.49 (Cost-Bound)**. With 2x redundancy and overhead, the real-world production cost is ~$1.50-$2.50/1M tokens.
