title: Governance Review Capacity
scenario: 'A governance team can review 12 high-risk model changes per week. A platform has 80 teams, and each team ships one high-risk change per quarter.'
question: 'Can a governance team reviewing 12 changes/week handle 80 teams shipping one high-risk change per quarter?'
details:
  realistic_solution: 'Quarterly demand is 80 reviews. Spread over 13 weeks, that is about 6.2 reviews/week. A 12-review/week team has enough average capacity, though launches may be bursty and require queue management.'
  common_mistake: |
    **The Pitfall:** Comparing quarterly demand to weekly capacity without normalizing time units.
    **The Rationale:** Candidates sometimes fail to convert metrics to a common time denominator before comparing them.
    **The Consequence:** Incorrectly estimating team capacity, leading to artificial bottlenecks or over-hiring.
  napkin_math: |
    **Assumptions & Constraints:**
    - Demand: 80 reviews per quarter.
    - Capacity: 12 reviews per week.
    - Quarter = 13 weeks.

    **Calculations:**
    - Average reviews needed per week = 80 / 13 = ~6.15.
    - Headroom = 12 - 6.15 = 5.85 reviews/week.

    **Conclusion & Interpretation:**
    - **Result: Sufficient Capacity (Process-Bound)**. The governance team can handle the load, provided bursts are managed.
