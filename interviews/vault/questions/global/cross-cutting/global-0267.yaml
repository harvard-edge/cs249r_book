title: Spot vs On-Demand for Long Training Runs
scenario: A 7B model training run takes 14 days on 64 A100 GPUs. On-demand costs $3.00/GPU-hour. Spot instances cost $1.00/GPU-hour but have a 10% chance of preemption per day. Each preemption costs 2 hours of lost work (last checkpoint was 2 hours ago).
question: 'Evaluate: spot, on-demand, or a hybrid approach?'
details:
  realistic_solution: 'On-demand: 64 GPUs * 336h * $3.00 = $64,512, guaranteed 14-day completion. Spot: base cost = 64 * 336h * $1.00 = $21,504. Expected preemptions: 14 days * 10%/day = 1.4 events. Cost of lost compute per event = 2h * 64 GPUs * $1.00 = $128. With restart overhead (0.5h): total expected extra cost = 1.4 * (2.5h * 64 * $1) = $224. Expected extra time = 1.4 * 2.5h = 3.5h. Total spot =~ $21,728, ~14.15 days. Spot saves 66% ($42,784). Hybrid: use spot for first 12 days, switch to on-demand for final 2 days.'
  common_mistake: |
    **The Pitfall:** Comparing only base hourly rates without accounting for checkpoint overhead and preemption recovery time.
    **The Rationale:** Naively assuming spot instances are simply a 3x cheaper version of on-demand without operational penalties.
    **The Consequence:** Severely underestimating the wall-clock time extension and the true cost of lost work during cascading spot preemptions.
  napkin_math: |
    **Assumptions & Constraints:**
    - Base On-demand: $3.00/GPU-hr.
    - Base Spot: $1.00/GPU-hr.
    - Run length: 14 days (336h) on 64 GPUs.
    - Spot preemption rate: 10% per day.
    
    **Calculations:**
    - On-demand cost: 64 x 336 x $3.00 = $64,512.
    - Spot base cost: 64 x 336 x $1.00 = $21,504.
    - Expected preemptions: 14 x 10% = 1.4 events.
    - Cost per preemption (2h lost + 0.5h restart): 2.5h x 64 x $1.00 = $160.
    - Total Spot cost = $21,504 + (1.4 x $160) = $21,728.
    
    **Conclusion & Interpretation:**
    - **Result: 66% Savings (Cost-Bound)**. Spot saves ~$42,784 (66%) despite the expected preemptions.
