title: Privacy Budget Composition
scenario: A product runs four DP analytics queries per week, each spending epsilon 0.2 under simple composition.
question: What total epsilon is spent by 4 DP queries per week for 4 weeks at epsilon 0.2 each under simple composition?
details:
  realistic_solution: 'There are 16 queries in four weeks. Under simple composition, epsilon adds linearly, giving 3.2. This is only a simple upper bound; production accounting may use tighter composition algorithms like advanced composition or Renyi Differential Privacy.'
  common_mistake: |
    **The Pitfall:** Treating each DP query in isolation and forgetting privacy budget composes over time.
    **The Rationale:** Teams focus on the safety of a single release rather than the cumulative leakage.
    **The Consequence:** Eventually burning through the privacy budget, breaking mathematical privacy guarantees over repeated observations.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 4 queries per week for 4 weeks.
       - Epsilon = 0.2 per query.
       - Simple composition applies.
    2. **Calculations:**
       - Total queries: 4 * 4 = 16 queries.
       - Total Epsilon: 16 * 0.2 = 3.2.
    3. **Conclusion & Interpretation:**
       - **Total spent under simple composition is 3.2 epsilon.**
       - **Result: Privacy-Budget Bound**
