title: The Multi-Tenant Vector Isolation Problem
scenario: You're building a RAG-as-a-service platform serving 500 enterprise tenants. Each tenant has 100K-50M documents. Tenants must NEVER see each other's documents in retrieval results.
question: "Which RAG indexing architecture should you choose for 500 tenants, and how would you balance cost, latency, isolation, and operations?"
details:
  realistic_solution: "The answer depends on tenant size distribution, but typically (C) hybrid wins. Architecture: Tier 1 (large tenants, >10M docs, ~20 tenants): dedicated per-tenant indexes on dedicated instances. These tenants have enough data for efficient HNSW graphs and justify the operational overhead. Cost: 20 instances × ~$500/month = $10K/month. Tier 2 (medium tenants, 1M-10M docs, ~80 tenants): clustered multi-tenant indexes. Group 4-5 tenants per index with partition-aware HNSW (each tenant's subgraph is connected but cross-tenant edges are removed). 16 instances × $500 = $8K/month. Tier 3 (small tenants, <1M docs, ~400 tenants): shared IVF-PQ index with tenant_id in the IVF partition key. Each IVF list belongs to exactly one tenant, so post-filtering is lossless (no wasted graph traversal). One large instance with 400 tenant partitions: $2K/month. Total: $20K/month vs $250K/month for 500 dedicated instances. Isolation guarantee: Tier 1 has process isolation (separate instances). Tier 2 has data isolation (separate graph partitions, but same process). Tier 3 has partition isolation (same graph, but IVF routing ensures no cross-tenant data access). All tiers encrypted at rest with per-tenant keys."
  common_mistake: |
    **The Pitfall:** Choosing a shared index with metadata filtering because "it's simpler."
    **The Rationale:** Standard database design favors a single table with a `tenant_id` column.
    **The Consequence:** Graph traversal visits nodes from all tenants but discards most of them. For a 1M-doc tenant in a 500M shared index, 99.8% of visited nodes are irrelevant, catastrophically degrading search quality.
  napkin_math: |
    - 500 dedicated instances at $500/month = $250K/month.
    - Hybrid tiering costs $20K/month, a 92% savings.
    - Shared index search for a 1M-doc tenant in a 500M shared index: ef_search=100, but only 0.2% match. Effective ef_search ≈ 0.2 -> Recall < 0.3.
    - **With tenant-partitioned IVF, all visited vectors match the tenant, restoring Recall ≈ 0.90.**
