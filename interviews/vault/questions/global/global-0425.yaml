title: Evaluate Portable Model Claims
scenario: A team claims a model is portable because it exports to ONNX. On cloud it runs on GPU, on mobile two ops fall back to CPU, and on edge dynamic shapes are unsupported.
question: Is ONNX export enough to claim a model is portable across cloud, mobile, and edge runtimes?
details:
  realistic_solution: No. File-format portability is not execution portability. CPU fallback and unsupported dynamic shapes are evidence the model is not yet portable in production.
  common_mistake: |
    **The Pitfall:** Equating export success with efficient and correct execution on every target.
    **The Rationale:** If a model successfully parses into ONNX format, it is theoretically assumed to be universally portable.
    **The Consequence:** Deployment fails in production due to slow CPU fallbacks, unsupported dynamic shapes, or memory blowouts.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - ONNX export successful.
       - Mobile CPU fallback for 2 operations.
       - Edge lacks dynamic shape kernel support.
    2. **Calculations:**
       - Fallback ops latency penalty > 10x vs NPU/GPU execution.
       - 2 CPU ops can account for >40% of total inference time due to context switching.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound (Fallback).** File-format portability does not guarantee execution portability; unsupported kernels ruin production SLAs.
