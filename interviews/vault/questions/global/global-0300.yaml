title: Global New 0001
scenario: A dense matrix multiplication layer is profiled on an accelerator. You need to calculate the operational intensity ridge point for the hardware to determine if the layer will be memory-bound or compute-bound.
question: Is a matrix multiplication layer with 100 FLOPs per byte memory-bound or compute-bound on an A100 80GB?
details:
  realistic_solution: To determine the bottleneck, calculate the hardware's ridge point, which is the ratio of peak compute to peak memory bandwidth. If the layer's operational intensity is below this ridge point, it is memory-bound; if above, it is compute-bound. Comparing the layer's 100 FLOPs/byte against the A100's 156 FLOPs/byte ridge point reveals it is memory-bound.
  common_mistake: |
    **The Pitfall:** Failing to correctly align units (TFLOPS vs TB/s) or misinterpreting the ridge point threshold.
    **The Rationale:** Confusing the condition for being compute-bound vs memory-bound.
    **The Consequence:** Attempting to optimize the compute kernels when the true bottleneck is memory bandwidth.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - A100 Compute = 312 TFLOPS.
       - A100 Bandwidth = 2.0 TB/s.
       - Layer Intensity = 100 FLOPs/byte.
    2. **Calculations:**
       - Ridge Point = 312e12 / 2.0e12 = 156 FLOPs/byte.
       - 100 FLOPs/byte < 156 FLOPs/byte.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound**
