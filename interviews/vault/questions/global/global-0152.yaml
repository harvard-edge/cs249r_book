title: The Strided Cache Miss
scenario: A custom 2D Convolution layer for a visual wake word model takes 80ms to execute, but the theoretical
  MAC count suggests it should take 15ms. Weights are in QSPI Flash, activations in 256KB SRAM.
details:
  realistic_solution: The root cause is a severe spatial locality violation in the custom kernel's nested
    loops. The activations are stored in row-major order (NHWC), but the custom C++ loop iterates over
    them in column-major order (or iterates over channels in the outermost loop). On a Cortex-M7 with
    a 16KB D-Cache and 32-byte cache lines, this access pattern guarantees a cache miss on almost every
    memory load. The CPU spends the majority of its time stalled, waiting for the memory controller to
    fetch new cache lines from SRAM or Flash, destroying performance and wasting power.
  common_mistake: Concluding that the QSPI Flash bandwidth is just fundamentally too slow for the required
    weight fetches.
  napkin_math: Image is 96x96x1 (9216 bytes). A 32-byte cache line holds 32 pixels of a row. If accessed
    column-wise, fetching pixel (x, y) loads a cache line, but the next fetch (x, y+1) is 96 bytes away
    (misses cache). Cache miss penalty = 15 cycles. 96 * 96 * 15 cycles = 138k wasted cycles per filter,
    increasing latency by ~5x.
