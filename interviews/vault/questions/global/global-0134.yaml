title: Speculative Decoding Economics
scenario: You are optimizing a code generation API using a 70B target model with a strict TPOT SLA of
  < 25ms. Currently, the target model achieves 30ms TPOT. To accelerate it, you deploy a 7B draft model
  for speculative decoding. The draft model generates 5 tokens in 50ms. The target model verifies them
  in 30ms. The domain acceptance rate is 1.5 tokens per step. The resulting TPOT worsens to 32ms.
details:
  realistic_solution: 'Decompose the speculative decoding latency: T_step = (T_draft * K) + T_verify.
    The draft model takes 10ms per token (50ms/5). The verify step takes 30ms. Total step latency = 80ms.
    With an expected acceptance rate E(N) of 1.5 tokens + 1 guaranteed token = 2.5 tokens per step. The
    effective TPOT = 80ms / 2.5 tokens = 32ms. Speculative decoding only works if T_draft is negligible
    or E(N) is exceptionally high. A 7B model is architecturally too large/slow for a 70B target. You
    must replace the 7B draft model with a much smaller <1B model (T_draft < 2ms), or eliminate the draft
    model entirely by using Medusa/EAGLE heads attached directly to the 70B model, reducing T_draft to
    0.'
  common_mistake: Increasing the number of draft tokens generated per step (e.g., from 5 to 10) to increase
    the potential acceptance yield.
  napkin_math: 'Current: T_step = 50ms + 30ms = 80ms. Yield = 2.5 tokens. TPOT = 80 / 2.5 = 32ms. (Worse
    than 30ms base). Proposed (<1B draft): T_draft = 2ms * 5 = 10ms. T_step = 10ms + 30ms = 40ms. Yield
    = 2.5. TPOT = 40 / 2.5 = 16ms (SLA met).'
