title: Speculative Decoding Economics
scenario: You are optimizing a code generation API using a 70B target model with a strict TPOT SLA of < 25ms. Currently, the target model achieves 30ms TPOT. You deploy a 7B draft model for speculative decoding. The draft model generates 5 tokens in 50ms, and the target model verifies them in 30ms. The domain acceptance rate is 1.5 tokens per step. The resulting TPOT worsens to 32ms.
question: Why does speculative decoding with a 7B draft model worsen TPOT to 32ms, and how would you meet the 25ms SLA?
details:
  realistic_solution: 'Decompose the speculative decoding latency: T_step = (T_draft * K) + T_verify. The draft model takes 10ms per token (50ms/5). The verify step takes 30ms. Total step latency = 80ms. With an expected acceptance rate E(N) of 1.5 tokens + 1 guaranteed token = 2.5 tokens per step. The effective TPOT = 80ms / 2.5 tokens = 32ms. A 7B model is architecturally too large/slow for a 70B target. You must replace the 7B draft model with a much smaller <1B model (T_draft < 2ms), or eliminate the draft model entirely by using Medusa/EAGLE heads attached directly to the 70B model, reducing T_draft to 0.'
  common_mistake: |
    **The Pitfall:** Increasing the number of draft tokens generated per step.
    **The Rationale:** Believing that generating more tokens will proportionally increase the acceptance yield to compensate for slow draft generation.
    **The Consequence:** Worsening latency further because the 7B draft model is fundamentally too slow for the fast 70B verifier.
  napkin_math: |
    **Assumptions & Constraints:**
    - Current step time (T_step): 50ms (draft) + 30ms (verify) = 80ms.
    - Yield: 1.5 accepted + 1 guaranteed = 2.5 tokens/step.
    
    **Calculations:**
    - Current TPOT: 80ms / 2.5 = 32ms (Worse than 30ms base).
    - Proposed <1B draft time: 2ms x 5 tokens = 10ms.
    - Proposed step time: 10ms + 30ms = 40ms.
    - Proposed TPOT: 40ms / 2.5 = 16ms.
    
    **Conclusion & Interpretation:**
    - **Result: 16ms (Latency-Bound)**. A <1B draft model hits 16ms TPOT, meeting the <25ms SLA.
