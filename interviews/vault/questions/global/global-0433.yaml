title: Tiered Checkpointing Strategy for Trillion-Parameter Models
scenario: Training a 1T parameter MoE model on a 10,000 H100 cluster where single-node
  MTTF is 20,000 hours. The model optimizer state requires 16 bytes per parameter,
  and the object storage bandwidth is 2 TB/s.
question: Create a tiered checkpointing strategy that minimizes lost goodput, specifying
  the intermediate storage medium and the optimal checkpoint interval.
details:
  realistic_solution: The cluster MTTF is 20,000 / (10,000 / 8) = 16 hours. Writing
    16TB directly to object storage at 2 TB/s blocks training for 8 seconds. To optimize,
    create an asynchronous schedule that first writes to local host NVMe in ~100ms,
    then trickle-transfers to object storage in the background. Using Daly's formula
    T = sqrt(2 * 16h * (0.1/3600h)), the optimal interval is ~1.8 minutes, drastically
    reducing recompute time.
  common_mistake: Using the slow 8-second object storage write time as the blocking
    overhead rather than designing a background staging pipeline.
  napkin_math: Cluster MTTF = 20000 / 1250 = 16 hours.
