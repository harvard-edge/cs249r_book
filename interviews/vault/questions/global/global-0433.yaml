title: Tiered Checkpointing Strategy for Trillion-Parameter Models
scenario: You are training a 1T parameter MoE model on a 10,000 H100 cluster where single-node MTTF is 20,000 hours. The model optimizer state requires 16 bytes per parameter, and the object storage bandwidth is 2 TB/s.
question: "Create a tiered checkpointing strategy that minimizes lost goodput, specifying the intermediate storage medium and the optimal checkpoint interval."
details:
  realistic_solution: The cluster MTTF is 20,000 / (10,000 / 8) = 16 hours. Writing 16TB directly to object storage at 2 TB/s blocks training for 8 seconds. To optimize, create an asynchronous schedule that first writes to local host NVMe in ~100ms, then trickle-transfers to object storage in the background. Using Daly's formula T = sqrt(2 * 16h * (0.1/3600h)), the optimal interval is ~1.8 minutes, drastically reducing recompute time.
  common_mistake: |
    **The Pitfall:** Using the slow object storage write time as a hard blocking overhead in the training loop.
    **The Rationale:** Candidates prioritize durability over goodput and wait for the remote write to finish.
    **The Consequence:** Cluster utilization collapses due to massive synchronous network stalls.
  napkin_math: |
    - Cluster MTTF = 20,000 / 1250 nodes = 16 hours.
    - NVMe staging takes ~100ms (0.1 seconds = 0.1/3600 hours).
    - Using Daly's formula: Optimal interval = sqrt(2 * 16h * (0.1/3600h)).
    - **The optimal checkpoint interval is ~1.8 minutes, minimizing lost goodput from recomputation.**
