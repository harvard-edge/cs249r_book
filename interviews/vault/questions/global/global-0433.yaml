title: Tiered Checkpointing Strategy for Trillion-Parameter Models
scenario: You are training a 1T parameter MoE model on a 10,000 GPU cluster where single-node MTTF is 20,000 hours. The model optimizer state requires 16 bytes per parameter, and the object storage bandwidth is 2 TB/s.
question: Create a tiered checkpointing strategy that minimizes lost goodput, specifying the intermediate storage medium and the optimal checkpoint interval.
details:
  realistic_solution: Writing directly to object storage at 2 TB/s blocks training. Create an asynchronous schedule that first writes to local host NVMe in ~100ms, then trickle-transfers to object storage in the background. Using Daly's formula, the optimal interval is ~1.8 minutes.
  common_mistake: |
    **The Pitfall:** Using the slow object storage write time as a hard blocking overhead in the training loop.
    **The Rationale:** Candidates prioritize durability over goodput and wait for the remote write to finish synchronously.
    **The Consequence:** Cluster utilization collapses due to massive synchronous network stalls.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Cluster size: 1250 nodes (10,000 GPUs / 8 GPUs/node).
       - Node MTTF: 20,000 hours. Object Storage: 2 TB/s.
       - NVMe local staging time: ~0.1 seconds.
    2. **Calculations:**
       - Cluster MTTF = 20,000 / 1250 = 16 hours.
       - Daly's formula: Optimal interval = sqrt(2 * MTTF * checkpoint_time).
       - Local NVMe optimal interval = sqrt(2 * 16h * (0.1/3600h)) = 0.0298 hours = 1.8 minutes.
    3. **Conclusion & Interpretation:**
       - **Result: I/O-Bound.** Staging checkpoints to local NVMe allows for a ~1.8 minute interval, massively minimizing lost goodput compared to blocking on remote object storage.
