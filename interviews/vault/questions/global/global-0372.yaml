title: Master Quantization Release Policy
scenario: A model family has BF16, INT8, INT4, and 2-bit variants. Cloud customers want quality, mobile users need size, and TinyML users need extreme compression.
question: What should a release policy require before promoting each precision tier?
details:
  realistic_solution: The policy should tie each tier to target hardware, task risk, calibration coverage, accuracy slices, latency and memory budgets, and rollback paths. Higher compression needs stronger evidence on outliers and per-target kernel behavior. A tier should not be promoted globally just because it passes aggregate benchmarks.
  common_mistake: |
    **The Pitfall:** Ranking variants only by model size and ignoring hardware support, calibration drift, and tail-quality failures.
    **The Rationale:** Candidates often treat quantization as a pure compression problem without considering platform-specific execution constraints.
    **The Consequence:** Deploying highly compressed models that actually run slower due to fallback paths or severely degrade quality on edge cases.
  napkin_math: |
    *   **Memory Savings:** Moving from INT8 to INT4 halves weight memory (e.g., saving 500 MB).
    *   **Latency Cost:** A 500 MB saving is a bad trade if it triggers **30 ms of CPU fallback** in a 100 ms latency budget.
