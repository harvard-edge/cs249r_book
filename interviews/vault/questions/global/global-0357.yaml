title: Global Quantization Memory Ladder
scenario: A model is 8B parameters.
question: Which quantization levels let an 8B-parameter model fit in a 4 GB memory budget before metadata?
details:
  realistic_solution: FP16 needs 16 GB, INT8 needs 8 GB, INT4 needs 4 GB, and 2-bit needs 2 GB. INT4 fits only before metadata and runtime buffers; 2-bit leaves more headroom but likely carries higher accuracy risk.
  common_mistake: |
    **The Pitfall:** Saying INT4 safely fits in a 4 GB device.
    **The Rationale:** 8B parameters * 0.5 bytes equals exactly 4 GB.
    **The Consequence:** OOM crashes during inference because there is no memory left for KV cache, quantization scales, or runtime buffers.
  napkin_math: |
    - **FP16 (2 bytes)**: 8B * 2 = 16 GB.
    - **INT8 (1 byte)**: 8B * 1 = 8 GB.
    - **INT4 (0.5 bytes)**: 8B * 0.5 = 4 GB.
    - **2-bit (0.25 bytes)**: 8B * 0.25 = 2 GB.
    - **Conclusion**: **INT4** exactly fits the 4 GB limit, while **2-bit** leaves overhead room.
