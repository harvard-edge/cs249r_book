title: Global Quantization Memory Ladder
scenario: A model is 8B parameters. Estimate weight memory for FP16, INT8, INT4, and
  2-bit quantization before metadata, and explain which levels could fit in a 4 GB
  device budget.
question: Which quantization levels let an 8B-parameter model fit in a 4 GB memory
  budget before metadata?
details:
  realistic_solution: FP16 needs 16 GB, INT8 needs 8 GB, INT4 needs 4 GB, and 2-bit
    needs 2 GB. INT4 fits only before metadata and runtime buffers; 2-bit leaves more
    headroom but likely carries higher accuracy risk.
  common_mistake: Saying INT4 fits and forgetting scales, KV cache, runtime buffers,
    and accuracy tradeoffs.
  napkin_math: FP16 = 8B x 2 B = 16 GB. INT8 = 8 GB. INT4 = 4 GB. 2-bit = 2 GB.
