title: Drift Alert Window Optimization
scenario: A drift detector needs 100,000 examples per window. Current traffic gives
  20,000 examples/hour, so alerts lag by 5 hours. Propose an optimization to reduce
  alert delay without making estimates too noisy.
question: How can you reduce a 5-hour drift alert delay when the detector needs 100,000
  examples and traffic is 20,000 examples/hour?
details:
  realistic_solution: 'Options are to reduce required samples via fewer bins or a
    more sensitive statistic, pool similar segments, add proxy signals, or accept
    a two-stage alert: early weak signal followed by confirmation. Simply shortening
    the window to 1 hour gives only 20,000 examples and likely noisy estimates.'
  common_mistake: Shortening the window without checking sample requirements and then
    trusting noisy alerts.
  napkin_math: Current window = 100,000 / 20,000 = 5 hours. A 1-hour window has only
    20% of required samples.
