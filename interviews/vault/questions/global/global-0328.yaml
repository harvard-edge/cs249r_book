title: Drift Alert Window Optimization
scenario: A drift detector needs 100,000 examples per window. Current traffic gives 20,000 examples/hour, so alerts lag by 5 hours.
question: How can you reduce a 5-hour drift alert delay when the detector needs 100,000 examples and traffic is 20,000 examples/hour?
details:
  realistic_solution: 'Options are to reduce required samples via fewer bins or a more sensitive statistic, pool similar segments, add proxy signals, or accept a two-stage alert: early weak signal followed by confirmation. Simply shortening the window to 1 hour gives only 20,000 examples and likely noisy estimates.'
  common_mistake: |
    **The Pitfall:** Shortening the time window without verifying the minimum statistical sample requirements.
    **The Rationale:** Prioritizing fast reaction times over the mathematical confidence of the underlying distribution metric.
    **The Consequence:** Triggering constant false-positive drift alerts due to extreme noise in the under-sampled estimates.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Required samples: 100,000.
       - Traffic rate: 20,000 examples/hour.
    2. **Calculations:**
       - Current window: 100,000 / 20,000 = 5 hours.
       - If window is shortened to 1 hour: 1 * 20,000 = 20,000 samples.
       - 20,000 / 100,000 = 20% of required sample mass.
    3. **Conclusion & Interpretation:**
       - **Result: 80% sample deficit at 1 hour. Statistical-Power-Bound requiring hierarchical proxy metrics.**
