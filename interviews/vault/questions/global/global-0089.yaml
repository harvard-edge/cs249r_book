title: Safe Deployment for Latency-Sensitive Generation Models
scenario: A translation API handles 5,000 QPS with a 200ms P99 latency SLA. A V2 model using speculative decoding spikes to 350ms tail latency during a 10% Canary, breaking the SLA.
question: Should you continue the 10% canary or switch to shadow deployment for V2 under the 200 ms SLA, and why?
details:
  realistic_solution: "Shift immediately to a Shadow deployment pattern. Mirror traffic asynchronously to avoid synchronously impacting the 200ms SLA. This provides high-fidelity production inference data to diagnose speculative decoding KV cache misses without violating user contracts."
  common_mistake: |
    **The Pitfall:** Increasing the canary timeout threshold or simply rolling back without capturing tail latency profiles.
    **The Rationale:** Trying to quickly hide the error without fundamentally altering the deployment safety pattern.
    **The Consequence:** Either accepting continuous SLA violations for live users, or flying blind and abandoning V2 entirely without the data needed to debug speculative decoding.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Canary: 10% of 5,000 QPS = 500 QPS
       - SLA Violation (P99): 1% of 500 QPS
    2. **Calculations:**
       - Violations: 5 req/s * 60s = 300 bad experiences/min
       - Shadow capacity for 5%: 250 QPS / 20 req/s/GPU = 12.5 GPUs
    3. **Conclusion & Interpretation:**
       - **Result: SLA-Violation Bound**
