title: Specify Overlap Acceptance Criteria
scenario: A platform team wants to claim that a new runtime overlaps communication
  and computation across cloud GPUs, edge accelerators, and mobile NPUs. Early traces
  show overlap in some kernels but idle gaps around synchronization.
question: What acceptance criteria should be specified before claiming communication-computation
  overlap?
details:
  realistic_solution: Specify measured overlap ratio, critical-path latency reduction,
    synchronization boundaries, buffer ownership, trace evidence per target, and failure
    cases where overlap collapses. The criteria should distinguish partial overlap
    inside one kernel from end-to-end pipeline improvement.
  common_mistake: Pointing to concurrent-looking trace bars without checking whether
    the critical path or user-visible latency improved.
  napkin_math: If compute is 70 ms and communication is 30 ms, perfect overlap gives
    70 ms rather than 100 ms, but a measured 90 ms path captures only one-third of
    the theoretical 30 ms saving.
