title: Specify Overlap Acceptance Criteria
scenario: A platform team wants to claim that a new runtime overlaps communication and computation across cloud GPUs, edge accelerators, and mobile NPUs. Early traces show overlap in some kernels but idle gaps around synchronization.
question: What acceptance criteria should be specified before claiming communication-computation overlap?
details:
  realistic_solution: Specify measured overlap ratio, critical-path latency reduction, synchronization boundaries, buffer ownership, trace evidence per target, and failure cases where overlap collapses. The criteria should distinguish partial overlap inside one kernel from end-to-end pipeline improvement.
  common_mistake: |
    **The Pitfall:** Pointing to concurrent-looking trace bars without checking whether the critical path improved.
    **The Rationale:** Visual profilers make it easy to see any temporal overlap and assume victory.
    **The Consequence:** Claiming a major optimization win when actual end-to-end user-visible latency remains bottlenecked by synchronization overhead.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Pure sequential execution: 70 ms compute + 30 ms comm = 100 ms.
       - Measured trace runtime: 90 ms.
    2. **Calculations:**
       - Perfect theoretical overlap: max(70 ms, 30 ms) = 70 ms.
       - Time saved: 100 ms - 90 ms = 10 ms.
    3. **Conclusion & Interpretation:**
       - **Result: Synchronization-Bound.** The measured 90 ms path only captures one-third of the theoretical 30 ms savings.
