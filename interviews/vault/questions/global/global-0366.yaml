title: Cross-Regime Profiling Plan
scenario: The same model misses its latency target in cloud, mobile, and TinyML deployments. Cloud traces show 30% GPU utilization and high queue time, mobile traces show thermal throttling after 3 minutes, and TinyML traces show SRAM spills to external flash.
question: "How would you profile cloud queueing, mobile thermal throttling, and TinyML SRAM spills to identify the binding bottleneck in each regime?"
details:
  realistic_solution: Use regime-specific counters. For cloud, separate queue time from service time and check accelerator utilization. For mobile, correlate latency with temperature, power state, and sustained clocks. For TinyML, inspect memory planner output, arena size, and flash access counts. The plan should produce a binding constraint per regime before proposing optimizations.
  common_mistake: |
    **The Pitfall:** Relying purely on a standard GPU-utilization dashboard everywhere.
    **The Rationale:** It works perfectly for cloud environments.
    **The Consequence:** Thermal and memory-capacity failures outside the cloud go undetected.
  napkin_math: |
    - Cloud 30% utilization with high queue time points to scheduling/capacity limits.
    - TinyML flash/PSRAM accesses are orders of magnitude slower than SRAM.
    - **Even a small number of SRAM spills can dominate a real-time TinyML loop latency.**
