title: Fairness Evaluation Across Deployment Regimes
scenario: A speech model will run in cloud, mobile, and TinyML modes. The cloud service
  can log full waveforms for offline fairness audits, the mobile app can log only
  aggregate metrics, and the TinyML device can store only 4 KB/day of counters. Design
  a fairness-evaluation plan that works across all three privacy and storage regimes.
question: How would you design a fairness evaluation plan when cloud logs waveforms,
  mobile logs aggregates, and TinyML stores only 4 KB/day of counters?
details:
  realistic_solution: Use a tiered audit. Cloud can run full subgroup error analysis
    on sampled waveforms. Mobile should compute on-device subgroup and confidence
    aggregates with privacy-preserving upload. TinyML should track compact counters
    such as false-positive/false-negative proxies by environment bucket. The shared
    metric definition must be consistent, but the evidence granularity changes by
    track.
  common_mistake: Requiring the TinyML device to produce the same audit artifact as
    cloud, or declaring fairness impossible when only compact counters are available.
  napkin_math: At 4 KB/day, TinyML can store roughly 256 16-byte counters. That is
    enough for a small matrix such as 8 environment buckets times 4 outcome counters
    times several rolling windows, not raw examples.
