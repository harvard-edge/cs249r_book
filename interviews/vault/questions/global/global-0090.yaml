title: Real-Time Global Toxicity Moderation Fairness Architecture
scenario: You are designing a global text toxicity moderation API serving 100,000 QPS with a strict p99 latency SLA of <50ms. The model must not disproportionately penalize marginalized dialects.
question: "How would you measure and mitigate dialect fairness issues at 100,000 QPS while keeping p99 latency under 50 ms?"
details:
  realistic_solution: 'A dual-path architecture is required to balance latency, compute, and fairness. The critical path (synchronous) runs only the highly optimized toxicity model (quantized to INT8, ~15ms latency). We apply in-processing bias mitigation during training rather than post-processing. For auditing, the asynchronous path samples 1% of traffic to a Kafka cluster. An offline pipeline runs heavy, highly accurate demographic proxy models on this sampled data to compute disaggregated fairness metrics. If disparities exceed a threshold, an alert triggers human-in-the-loop review and retraining.'
  common_mistake: |
    **The Pitfall:** Attempting synchronous demographic classifier inference alongside toxicity scoring.
    **The Rationale:** Candidates prioritize immediate fairness enforcement without recognizing the strict latency constraints of the critical path.
    **The Consequence:** Easily violating the 50ms p99 SLA, degrading the real-time user experience significantly.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 100,000 QPS. Sync SLA < 50ms.
       - Toxicity model = 15ms. Demographic proxy = 30ms.
    2. **Calculations:**
       - Sync path (naive) = 15ms + 30ms + 10ms network = 55ms (SLA Violation).
       - Async path (1% sample) = 1,000 QPS.
       - Payload size = 1KB/req -> 1MB/s = 86.4 GB/day.
    3. **Conclusion & Interpretation:**
       - **Result: Latency-Bound Architecture.** Offline asynchronous auditing safely preserves the <50ms online SLA.
