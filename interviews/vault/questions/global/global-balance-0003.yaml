title: Hot Set Memory Footprint
scenario: A feature cache has a hot set of 80,000 entries, and each entry is 2 KB. Calculate the memory needed to keep the hot set in RAM.
question: How much RAM is needed to keep an 80,000-entry hot set with 2 KB entries in memory?
details:
  realistic_solution: The hot set needs 80,000 x 2 KB = 160,000 KB, or about 160 MB. This is small enough for server memory but large for many edge caches.
  common_mistake: Sizing cache memory from total key count rather than hot-set size and entry bytes.
  napkin_math: 80,000 x 2 KB = 160,000 KB ≈ 160 MB.
