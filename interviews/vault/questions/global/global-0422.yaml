title: Evaluate Validation Coverage Across Sources
scenario: A data platform validates 10% of records from each high-volume source but only 0.1% from long-tail sources. Long-tail sources supply 20% of training data.
question: Is validating 0.1% of long-tail data safe when long-tail sources provide 20% of training data?
details:
  realistic_solution: It is risky. Long-tail sources are under-sampled relative to their training contribution, so schema or semantic errors there can affect the model while escaping validation. A safer policy uses minimum per-source sample floors plus volume-weighted sampling.
  common_mistake: |
    **The Pitfall:** Sampling only by volume and starving low-volume sources of validation coverage.
    **The Rationale:** High-volume sources seem more important to validate proportionally, ignoring the aggregated risk of many small sources.
    **The Consequence:** Schema or semantic errors in the long-tail sources, which comprise 20% of the data, can affect the model while escaping validation.
  napkin_math: |
    - **High-volume validation rate**: 10%.
    - **Long-tail validation rate**: 0.1%.
    - **Validation ratio**: 10% / 0.1% = 100x difference.
    - **Long-tail contribution**: 20% of total training data.
    - **Conclusion**: The long-tail validation rate is **100x thinner** per input row despite contributing significantly, making it risky.
