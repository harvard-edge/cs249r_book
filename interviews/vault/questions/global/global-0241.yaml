title: Maximizing Concurrent Users on Fixed GPU Budget
scenario: 'You have 4× A100-80GB GPUs serving a 13B-parameter chatbot. Current config: FP16 weights replicated
  on each GPU, handling ~208 concurrent users. Your SLA requires p99 < 200ms per token. Design optimizations
  to maximize concurrent users within the same hardware and SLA.'
question: "How would you design optimizations to maximize concurrent users within the same hardware and SLA?"
details:
  realistic_solution: 'Current: 13B × 2B = 26 GB weights per GPU. KV cache = (80-26-2 overhead) = 52 GB
    / ~1 GB per user = 52 users per GPU. Across 4 GPUs = 208 users. Optimizations: (1) INT8 quantization:
    weights = 13 GB, freeing 13 GB extra per GPU for KV cache. Users per GPU: 65, total = 260. (2) Add
    PagedAttention (vLLM): reduces KV fragmentation waste from ~30% to ~2%, effectively allowing 1.4×
    more users = 364. (3) Use tensor parallelism across 4 GPUs instead of replication, with INT4 weights:
    single copy of INT4 weights split across 4 GPUs = ~2 GB overhead per GPU, KV space = ~76 GB per GPU.
    Total KV = 304 GB. At ~0.7 GB/user with INT8 KV: 434 concurrent users. Net: ~2.1× improvement from
    combined optimization.'
  common_mistake: Only optimizing one dimension (e.g., just quantizing weights). Maximum throughput requires
    simultaneous optimization of model memory, KV cache memory, and batching efficiency.
  napkin_math: 'Baseline: ~208 users. +INT8 weights: 260. +PagedAttention: 364. +TP instead of replication:
    434. Compounding optimizations: ~2.1x improvement.'
