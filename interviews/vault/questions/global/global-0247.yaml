title: Optimizing Checkpoint Strategy for 1000-GPU Training
scenario: Your 1000-GPU training cluster has MTBF of 30 minutes. Full synchronous checkpoint of a 175B
  model takes 8 minutes and stalls all GPUs. Current wasted compute is estimated at 45%. Design a checkpointing
  strategy to reduce waste below 15%.
details:
  realistic_solution: 'Problem: synchronous checkpoint takes 8 min out of every 30-min MTBF = 27% overhead
    just from checkpointing, plus ~50% of inter-checkpoint work is lost on failure. Solution stack: (1)
    Asynchronous checkpointing: snapshot state to CPU/host memory (fast, <30s) then write to persistent
    storage in background. GPU stall drops from 8 min to 30s. (2) Reduce checkpoint size with ZeRO: each
    GPU only checkpoints its optimizer shard (175B / 1000 = 175M params × 16 bytes = 2.8 GB per GPU vs
    2.8 TB total). (3) Local SSD checkpoint first, then replicate to remote storage. (4) With t_ckpt=0.5
    min, optimal interval = sqrt(2 × 30 × 0.5) = 5.5 min. Overhead: ckpt = 0.5/5.5 = 9%. Wasted work =
    5.5/(2×30) = 9.2%. Total = 18.2%. Add in-memory redundancy (buddy checkpointing): MTBF effectively
    doubles to 60 min. New overhead: sqrt(2×60×0.5) = 7.7 min interval. Waste = 6.5% (checkpointing) +
    6.4% (wasted work) = 12.9%.'
  common_mistake: Simply checkpointing more frequently. With 8-minute stall and 30-minute MTBF, increasing
    frequency makes overhead worse.
  napkin_math: 'Async ckpt: 30s stall. ZeRO: 2.8 GB/GPU. Interval: sqrt(2 × 30 × 0.5) = 5.5 min. Overhead:
    9% + 9% = 18%. With buddy ckpt (MTBF→60min): 12.9%. Under 15% target.'
