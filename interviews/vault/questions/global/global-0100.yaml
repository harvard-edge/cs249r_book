title: Long-Context KV Cache RoPE Failure
scenario: To increase serving batch size from 32 to 128, you quantize the KV cache of a 7B LLM to INT8,
  saving 12GB of VRAM. Short-context tasks (1k tokens) maintain 99% accuracy. However, a 16k-token needle-in-a-haystack
  passkey test completely fails, dropping from 100% to 4% accuracy. What interaction destroyed the long-context
  retrieval?
question: "What interaction destroyed the long-context retrieval?"
details:
  realistic_solution: The root cause is the destructive interaction between INT8 quantization and Rotary
    Positional Embeddings (RoPE) when quantizing *after* rotation. RoPE injects positional information
    by rotating the Query and Key vectors. For long contexts, high-frequency dimensions encode fine-grained
    distances and have very small activation amplitudes. Conversely, LLMs have massive magnitude outliers
    in specific hidden dimensions. If you apply RoPE and then quantize to INT8 per-tensor or per-token,
    the large outliers force a large quantization step size. The small-amplitude high-frequency RoPE rotations
    are rounded to zero, completely erasing long-range positional information. The fix is either to quantize
    the KV cache *before* applying RoPE (applying RoPE dynamically during attention) or use RoPE-aware
    per-channel quantization.
  common_mistake: Assuming INT8 simply doesn't have enough bits to store 16,000 unique token representations,
    leading to hash collisions in attention.
  napkin_math: Max token outlier magnitude = 12.0. INT8 Step size = 12.0 / 127 = 0.094. High-frequency
    RoPE rotation alters values by ~0.02. Since 0.02 < 0.094/2 (the rounding threshold), the rotation
    is rounded away (quantized delta = 0). Tokens at pos 10,000 and 15,000 become positionally indistinguishable.
