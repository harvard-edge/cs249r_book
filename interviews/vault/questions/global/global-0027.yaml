title: Batch Size and Compute Intensity
scenario: How does increasing the batch size during inference typically affect the arithmetic intensity
  of a linear layer (transitioning from matrix-vector to matrix-matrix multiplication)?
details:
  realistic_solution: For a linear layer, increasing the batch size transitions the operation from a memory-bound
    matrix-vector multiplication (GEMV) to a more compute-bound matrix-matrix multiplication (GEMM). Weights
    are loaded once from memory and reused for each item in the batch, significantly increasing the FLOPs
    performed per byte of memory read.
  common_mistake: Assuming memory accesses scale linearly with batch size for both weights and activations,
    missing the critical fact that model weights are loaded once and shared across the entire batch.
  napkin_math: 'For a 1024x1024 linear layer (2MB FP16 weights). Batch=1: reads 2MB weights, does 2M FLOPs.
    Intensity = 2M / 2MB = 1 FLOP/byte. A100 ridge point is 156 FLOPs/byte (312 TFLOPS / 2.0 TB/s). Batch=1
    is memory bound. Batch=256: reads same 2MB weights + 0.5MB inputs, does 512M FLOPs. Intensity = 512M
    / 2.5MB = 204 FLOPs/byte. Compute bound! (204 > 156).'
  options:
  - It decreases arithmetic intensity because larger batches require proportionally more memory to store
    the activations.
  - It has no effect on arithmetic intensity since the model weights remain the exact same size regardless
    of batch.
  - It increases arithmetic intensity by reusing the loaded model weights across multiple inputs, amortizing
    memory access costs.
  - It increases arithmetic intensity by physically reducing the total number of FLOPs required to process
    the data.
  correct_index: 2
