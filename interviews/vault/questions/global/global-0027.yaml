title: Batch Size and Compute Intensity
scenario: A linear layer is transitioning from matrix-vector to matrix-matrix multiplication during inference.
question: How does increasing the batch size affect the arithmetic intensity of a linear layer?
details:
  realistic_solution: For a linear layer, increasing the batch size transitions the operation from a memory-bound matrix-vector multiplication (GEMV) to a more compute-bound matrix-matrix multiplication (GEMM). Weights are loaded once from memory and reused for each item in the batch, significantly increasing the FLOPs performed per byte of memory read.
  common_mistake: |
    **The Pitfall:** Assuming memory accesses scale linearly with batch size for both weights and activations.
    **The Rationale:** Thinking of a batch merely as a loop running identical independent operations.
    **The Consequence:** Misunderstanding the fundamental difference between memory-bound GEMV and compute-bound GEMM, leading to suboptimal inference batching limits.
  napkin_math: |
    * 1024x1024 linear layer = 2 MB FP16 weights.
    * Batch=1: Reads 2 MB weights, does 2M FLOPs.
    * Intensity = 2M FLOPs / 2 MB = 1 FLOP/byte (Memory Bound).
    * Batch=256: Reads 2 MB weights + 0.5 MB inputs, does 512M FLOPs.
    * Intensity = 512M FLOPs / 2.5 MB = 204 FLOPs/byte (Compute Bound).
    * **Increasing batch size pushes operations past the A100's ~156 FLOPs/byte ridge point.**
  options:
  - It decreases arithmetic intensity because larger batches require proportionally more memory to store the activations.
  - It has no effect on arithmetic intensity since the model weights remain the exact same size regardless of batch.
  - It increases arithmetic intensity by reusing the loaded model weights across multiple inputs, amortizing memory access costs.
  - It increases arithmetic intensity by physically reducing the total number of FLOPs required to process the data.
  correct_index: 2
