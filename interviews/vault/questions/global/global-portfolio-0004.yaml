title: Master Quantization Release Policy
scenario: A model family has BF16, INT8, INT4, and 2-bit variants. Cloud customers want quality, mobile users need size, and TinyML users need extreme compression. Leadership asks for one release policy.
question: What should a release policy require before promoting each precision tier?
details:
  realistic_solution: The policy should tie each tier to target hardware, task risk, calibration coverage, accuracy slices, latency and memory budgets, and rollback paths. Higher compression needs stronger evidence on outliers and per-target kernel behavior. A tier should not be promoted globally just because it passes aggregate benchmarks.
  common_mistake: Ranking variants only by model size and ignoring hardware support, calibration drift, and tail-quality failures.
  napkin_math: Moving from INT8 to INT4 halves weight memory, but a 500 MB saving is a bad trade if it triggers 30 ms of CPU fallback in a 100 ms latency budget.
