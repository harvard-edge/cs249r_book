title: GPU Shows 40% Utilization Despite Full Batch
scenario: Your training job runs a fully-packed batch but nvidia-smi reports only 40% GPU utilization.
  The model is a Transformer with standard attention. GPU memory is 70% used. What is the most likely
  root cause?
details:
  realistic_solution: 'The most likely cause is CPU-bound data loading or preprocessing creating pipeline
    bubbles. While the GPU waits for the next batch, utilization drops to 0%. Other possibilities: (1)
    Excessive CPU-GPU synchronization points (e.g., .item() calls in the training loop). (2) Small kernels
    with high launch overhead — many tiny ops instead of fused kernels. (3) Data transfer bottleneck on
    PCIe. Diagnosis: profile with nsys/Nsight to see the timeline. Fix: use multi-worker data loading
    (num_workers=4-8), pin_memory=True, prefetch_factor=2, and ensure no synchronization points in the
    hot loop.'
  common_mistake: Assuming low utilization means you need a larger batch. nvidia-smi 'utilization' measures
    the fraction of time at least one kernel is running, not compute efficiency. 40% means the GPU is
    idle 60% of the time.
  napkin_math: Data loading at 100 ms/batch + 150 ms GPU compute = 250 ms cycle. GPU active = 150/250
    = 60%. Adding 40 ms of kernel launch overhead → 150/290 = 52%. Close to the observed 40%.
