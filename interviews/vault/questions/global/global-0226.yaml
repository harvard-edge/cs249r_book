title: GPU Shows 40% Utilization Despite Full Batch
scenario: Your training job runs a fully-packed batch but nvidia-smi reports only 40% GPU utilization. GPU memory is 70% used.
question: Why might GPU utilization be only 40% despite a fully packed batch, and how would you fix it?
details:
  realistic_solution: 'The primary suspect is CPU-bound data loading or synchronization points creating pipeline bubbles. Diagnosis mandates `nsys profiling` to map the CUDA execution timeline. Fixes include multi-worker dataloaders, pinned memory, prefetching, and eliminating synchronous host-to-device transfers (e.g., stray `.item()` calls).'
  common_mistake: |
    **The Pitfall:** Assuming low utilization strictly means you need to increase the batch size.
    **The Rationale:** `nvidia-smi` utilization is frequently misunderstood as a measure of compute intensity, rather than just the fraction of time a kernel is active.
    **The Consequence:** OOMing the GPU by artificially inflating the batch size while completely ignoring the actual CPU bottleneck.
  napkin_math: |
    **Assumptions & Constraints:**
    - Data loading time: 100 ms/batch
    - GPU compute time: 150 ms/batch
    - Kernel launch overhead: 40 ms

    **Calculations:**
    - Total cycle time = 100 ms + 150 ms + 40 ms = 290 ms
    - GPU active fraction = 150 ms / 290 ms = ~51.7%

    **Conclusion & Interpretation:**
    - **Result: CPU-Bound (Pipeline Starvation)**. Indicates CPU-bound data loading or sync points creating bubbles.
