title: The Carbon-Aware Checkpoint Penalty
scenario: You implement a carbon-aware scheduler for a 256-GPU training job. It pauses training when grid carbon intensity is high (400 gCO2/kWh) and resumes when it is low (200 gCO2/kWh). Despite successfully shifting 30% of the compute hours to 'green' energy periods, the post-run sustainability audit shows the total carbon footprint of the job actually increased by 12%.
question: "Why did pausing the 256-GPU job during high-carbon periods increase total carbon emissions by 12%?"
details:
  realistic_solution: The root cause is the massive overhead of pausing and resuming large distributed training jobs. When the job is 'paused', the 256 GPUs remain powered on and allocated, drawing significant idle power. Additionally, pausing requires checkpointing 2TB of optimizer state and model weights to cloud storage, and resuming requires reloading them. The carbon emissions from the idle power draw over a 6-hour pause, combined with the embodied energy of the network transfer and storage IO, plus the wasted compute re-warming the caches/pipeline, completely outweighed the grid carbon intensity savings. Carbon-aware pausing is only effective if the nodes can be fully suspended or reassigned, and if the pause duration justifies the checkpoint overhead.
  common_mistake: |
    **The Pitfall:** Ignoring the embodied carbon of data movement and the idle power consumption of paused hardware.
    **The Rationale:** If compute is paused, people assume emissions drop to zero.
    **The Consequence:** The pause-and-resume overhead completely negates any grid intensity savings.
  napkin_math: |
    - Shifting 1 hour saves: 179.2 kW * (0.4 - 0.2) = 35.84 kgCO2.
    - Overhead (6h pause): 256 GPUs idle @ 150W = 230.4 kWh * 0.4 = 92.16 kgCO2.
    - Checkpoint IO/Network energy = ~20 kgCO2. Total overhead = 112.16 kgCO2.
    - **Net result is a carbon increase of 76.32 kgCO2 due to idle power and IO overhead.**
