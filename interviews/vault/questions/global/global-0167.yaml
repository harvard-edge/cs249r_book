title: The Carbon-Aware Checkpoint Penalty
scenario: You implement a carbon-aware scheduler for a 256-GPU training job. It pauses training when grid
  carbon intensity is high (400 gCO2/kWh) and resumes when it is low (200 gCO2/kWh). Despite successfully
  shifting 30% of the compute hours to 'green' energy periods, the post-run sustainability audit shows
  the total carbon footprint of the job actually increased by 12%.
question: "Why did pausing the 256-GPU job during high-carbon periods increase total carbon emissions by 12%?"
details:
  realistic_solution: The root cause is the massive overhead of pausing and resuming large distributed
    training jobs. When the job is 'paused', the 256 GPUs remain powered on and allocated, drawing significant
    idle power. Additionally, pausing requires checkpointing 2TB of optimizer state and model weights
    to cloud storage, and resuming requires reloading them. The carbon emissions from the idle power draw
    over a 6-hour pause, combined with the embodied energy of the network transfer and storage IO, plus
    the wasted compute re-warming the caches/pipeline, completely outweighed the grid carbon intensity
    savings. Carbon-aware pausing is only effective if the nodes can be fully suspended or reassigned,
    and if the pause duration justifies the checkpoint overhead.
  common_mistake: Ignoring the embodied carbon of data movement and the idle power consumption of paused
    hardware.
  napkin_math: 'Training load: 256 GPUs × 700W = 179kW. 1 hour at 400g/kWh = 71.6 kgCO2. Shifted to 200g/kWh
    = 35.8 kgCO2 (Saved 35.8 kgCO2 per shifted hour). Overhead: 256 GPUs idle @ 150W = 38.4kW. 6 hour
    pause = 230.4 kWh. At 400g/kWh = 92.1 kgCO2. Checkpoint IO/Network energy ≈ 50 kWh ≈ 20 kgCO2. Total
    overhead = 112.1 kgCO2. Savings = 35.8 kgCO2. Net loss = +76.3 kgCO2.'
