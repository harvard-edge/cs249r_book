title: Why Activation Outliers Break Quantization
scenario: A single activation outlier, such as one value at 100x the magnitude of
  others, can cause significant issues during INT8 quantization of LLMs.
question: Why does a single activation outlier destroy INT8 quantization accuracy,
  and how do techniques like LLM.int8() address this?
details:
  realistic_solution: 'INT8 maps the full range [min, max] to 256 bins. If 99.9% of
    activations fall in [-1, 1] but one outlier hits 100, the scale factor is 100/127
    ≈ 0.79. Normal values in [-1, 1] get mapped to just [-1, 1] in INT8 — only 2 out
    of 256 bins, losing 99.2% of the precision. LLM.int8() (Dettmers et al.) solves
    this via mixed-precision decomposition: identify the ~0.1% of feature dimensions
    with outliers (magnitude > 6.0), compute those columns in FP16, and quantize the
    remaining 99.9% to INT8. This preserves quality because outlier dimensions carry
    disproportionate information in transformer hidden states, and keeping them in
    FP16 costs negligible extra memory.'
  common_mistake: Assuming quantization error is uniform across all values. A single
    outlier forces the quantization range to be 100x wider, wasting 99% of the INT8
    range on values that don't need it.
  napkin_math: '**Assumptions & Constraints:**

    - INT8 maps the full activation range to 256 discrete bins.

    - 99.9% of activations fall in [-1, 1].

    - A single outlier hits a value of 100.


    **Calculations:**

    - Quantization range forced to [-100, 100], spanning 200 units.

    - Resolution per bin = 200 / 256 = 0.78 units/bin.

    - Normal values in [-1, 1] get mapped to roughly 2 bins.

    - 99.9% of the values lose 99.2% of their representational precision.


    **Conclusion & Interpretation:**

    - **Result: ~50% Quantization Error on Normals (Precision Bound)**. Mixed-precision
    decomposition (FP16 for 0.1% outlier dims, INT8 for 99.9% normal dims) is required
    to preserve model quality while still capturing massive memory savings.

    '
