title: Memory Headroom Calculation
scenario: A serving GPU has 80 GB HBM. Model weights use 52 GB, runtime buffers use 6 GB, and the KV cache peak is 18 GB.
question: How much HBM headroom remains with 52 GB weights, 6 GB runtime buffers, and an 18 GB KV cache on an 80 GB GPU?
details:
  realistic_solution: 'Total use is 52 + 6 + 18 = 76 GB. Remaining headroom is 4 GB. That is small enough that fragmentation or a batch spike could still cause OOM.'
  common_mistake: |
    **The Pitfall:** Checking only model weights and assuming the GPU has 28 GB free for batching.
    **The Rationale:** Model parameter counts are prominently advertised, while dynamic memory overheads like runtime buffers and KV cache are hidden at deploy time.
    **The Consequence:** The server reliably crashes with Out-Of-Memory errors the moment traffic spikes and the KV cache expands.
  napkin_math: |
    **Assumptions & Constraints:**
    - GPU HBM Capacity = 80 GB.
    - Weights = 52 GB. Runtime buffers = 6 GB. KV cache peak = 18 GB.

    **Calculations:**
    - Total used memory = 52 GB + 6 GB + 18 GB = 76 GB.
    - Remaining headroom = 80 GB - 76 GB = 4 GB.

    **Conclusion & Interpretation:**
    - **Result: 4 GB (Memory-Capacity-Bound)**. Only 4 GB remains, making the system highly vulnerable to OOM from allocator fragmentation or dynamic batch spikes.
