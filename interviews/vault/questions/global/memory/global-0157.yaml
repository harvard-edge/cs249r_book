title: PSRAM Strided Access Overhead
scenario: 'An ESP32-S3 runs on-device FL personalization. The forward pass takes 24ms. The backward pass takes ~264ms and causes a thermal warning. Both passes process a batch of 64 samples and perform roughly 1.2M MAC operations.'
question: 'Why is the ESP32-S3 backward pass about 10x slower and thermally worse than the forward pass with the same MAC count?'
details:
  realistic_solution: 'The failure is poor spatial locality during the backward pass accessing external PSRAM. The forward pass reads memory sequentially. The backward pass uses strided access to calculate gradients (features x batch). Because PSRAM accesses are fetched in 32-byte cache lines over the SPI bus, a strided access pattern causes a cache miss on almost every float read, leading to extreme SPI bus utilization and processor stall cycles.'
  common_mistake: |
    **The Pitfall:** Assuming the backward pass lacks hardware SIMD/DSP acceleration.
    **The Rationale:** Candidates focus on compute limitations rather than memory access patterns over slow serial buses.
    **The Consequence:** Attempting to rewrite the C code for compute efficiency instead of transposing the data layout to fix the memory bottleneck.
  napkin_math: |
    **Assumptions & Constraints:**
    - 1.2M MACs. PSRAM fetched in 32B lines (8 floats).
    - Miss penalty = 50 cycles at 240MHz (~200ns).

    **Calculations:**
    - Sequential (forward): 1 miss per 8 floats = 150k misses.
    - Strided (backward): 1 miss per float = 1.2M misses.
    - Memory stall time = 1.2M misses * 200ns = 240ms.
    - Total backward time = 24ms (compute) + 240ms (stall) = 264ms.

    **Conclusion & Interpretation:**
    - **Result: 264ms backward pass (Memory-Bandwidth Bound)**. Cache thrashing on the SPI bus dominates execution time and thermal load.
