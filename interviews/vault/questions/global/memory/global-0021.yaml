title: High Bandwidth Memory (HBM) Architecture
scenario: An HBM3 stack has a 1024-bit bus at 6.4 Gbps. A GDDR6 chip has a 32-bit bus at 16 Gbps.
question: How does the bandwidth of one HBM3 stack compare to one GDDR6 chip, and why?
details:
  realistic_solution: HBM uses a massively wide memory bus (e.g., 1024-bit per stack) compared to GDDR (e.g., 32-bit per chip). By vertically stacking DRAM dies and connecting them to the GPU via a silicon interposer, it allows for thousands of parallel connections, compensating for the lower clock speed.
  common_mistake: |
    **The Pitfall:** Thinking HBM operates at a higher frequency, relies on better compression, or doesn't use a memory bus.
    **The Rationale:** Assuming that newer, faster technologies always push higher clock speeds like standard CPUs do.
    **The Consequence:** Misunderstanding the thermal and physical constraints of memory architecture that led to 2.5D packaging and silicon interposers.
  napkin_math: |
    **Assumptions & Constraints:**
    - HBM3: 1024-bit bus, 6.4 Gbps.
    - GDDR6: 32-bit bus, 16 Gbps.

    **Calculations:**
    - GDDR6: (32 bits * 16 Gbps) / 8 = 64 GB/s per chip.
    - HBM3: (1024 bits * 6.4 Gbps) / 8 = 819.2 GB/s per stack.

    **Conclusion & Interpretation:**
    - **Result: 819.2 GB/s Bandwidth (Memory-Bound)**. HBM achieves >12x the bandwidth of GDDR6 through an immensely wide bus rather than clock frequency.
  options:
    - Local TinyML detection with event-based transmission (0.14 Wh/day).
    - Continuous cloud streaming detection (4.80 Wh/day).
    - Local TinyML detection without transmission (4.80 Wh/day).
    - Event-based transmission bypassing MCU (0.12 Wh/day).
