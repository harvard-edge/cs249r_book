title: Mobile NPU Utilization Collapse
scenario: 'Deploying a 4K Super-Resolution model on a mobile SoC (NPU: 10 TOPS, 30 GB/s main memory bandwidth,
  2MB NPU SRAM). The model requires 100 GMACs per frame. Based on 10 TOPS, expected latency is 10ms (100
  FPS). Actual latency is 333ms (3 FPS). Profiling shows NPU ALU utilization is below 3%.'
question: Why does the 4K super-resolution model run at 333ms instead of the 10ms implied by the 10 TOPS
  NPU?
details:
  realistic_solution: The root cause is aggressive SRAM spilling to main memory. A 4K feature map is massive.
    Because the intermediate activations far exceed the NPU's 2MB SRAM, the network must continuously
    write outputs to main memory and read them back. This generates ~10 GB of memory traffic per frame,
    fully saturating the 30 GB/s bandwidth and bottlenecking latency at 333ms.
  common_mistake: '**The Pitfall:** Ignoring intermediate activation sizes and assuming theoretical peak
    NPU TOPS can be reached regardless of SRAM capacity.

    **The Rationale:** Developers assume high-level ML frameworks automatically handle memory tiling efficiently.

    **The Consequence:** SRAM spills to main memory absolutely ruin arithmetic intensity, collapsing latency
    and framerate.

    '
  napkin_math: '**Assumptions & Constraints:**

    - 4K resolution (8.3M pixels).

    - NPU SRAM: 2MB. NPU limits: 10 TOPS, 30 GB/s.


    **Calculations:**

    - 4K FP16 activations (64 channels) = 1.06 GB per layer.

    - 1.06 GB >> 2MB NPU SRAM.

    - Memory traffic due to SRAM spilling = ~10 GB.

    - Time spent on memory = 10 GB / 30 GB/s = 333ms.


    **Conclusion & Interpretation:**

    - **Result: Memory-Bound (Bandwidth).** Massive intermediate activations force aggressive SRAM spilling
    to main memory, taking exactly 333ms and dominating the 10ms compute time.

    '
