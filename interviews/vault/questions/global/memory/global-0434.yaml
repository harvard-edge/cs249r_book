title: Memory Bandwidth Bottleneck Analysis for Custom Attention
scenario: A custom attention kernel for Llama-2 runs on an A100 80GB SXM, loading FP16 KV blocks into Shared Memory (SRAM) for matrix multiplication.
question: Analyze the arithmetic intensity of a 64x64 block load and calculate the required data reuse to saturate the tensor cores.
details:
  realistic_solution: Saturating the A100 tensor cores requires an arithmetic intensity of 312 TFLOP/s / 2.0 TB/s = 156 FLOPs/byte. Loading two 64x64 FP16 blocks fetches 2 * 64 * 64 * 2 = 16,384 bytes. The matrix multiplication 64 x 64 x 64 requires 2 * (64^3) = 524,288 FLOPs. The current intensity is 524,288 / 16,384 = 32 FLOPs/byte, meaning the kernel is memory-bound and requires roughly 5x more reuse (via larger tiles or MQA) to hit compute bounds.
  common_mistake: |
    **The Pitfall:** Computing FLOPs as N^3 instead of 2N^3, or forgetting the 2-byte factor for FP16.
    **The Rationale:** Standard matrix multiplication complexity is O(N^3), but hardware FLOPs count both multiply and accumulate.
    **The Consequence:** Miscalculating arithmetic intensity by a factor of 2 to 4, leading to incorrect bottleneck analysis.
  napkin_math: |
    **Assumptions & Constraints:**
    - A100: 312 TFLOP/s peak compute, 2.0 TB/s bandwidth.
    - FP16 data.

    **Calculations:**
    - Hardware Ridge Point = 312 TFLOP/s / 2.0 TB/s = 156 FLOPs/byte.
    - Data loaded = 2 * 64 * 64 * 2 bytes = 16,384 bytes.
    - Compute required = 2 * 64^3 = 524,288 FLOPs.
    - Current AI = 524,288 / 16,384 = 32 FLOPs/byte.
    - Reuse factor needed = 156 / 32 = 4.875.

    **Conclusion & Interpretation:**
    - **Result: Memory-Bandwidth Bound**. Kernel requires ~5x more reuse to achieve compute bounds.
