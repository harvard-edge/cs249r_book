title: DLRM Heterogeneous Bottlenecks
scenario: Your massive click-through rate (CTR) model processes 15,000 QPS. It consists of 600GB of sparse embedding tables and a dense 6-layer MLP. To scale to 30,000 QPS, you must choose between upgrading to GPUs with 3.2 TB/s HBM, or moving to dual-socket CPUs with 12 channels of DDR5 (300 GB/s) and 2TB of capacity.
question: For the 600GB CTR model at 30,000 QPS, should you use high-bandwidth GPUs, high-capacity CPUs, or a hybrid architecture?
details:
  realistic_solution: 'DLRMs exhibit a split-personality Roofline profile. The MLP layers are dense matrix multiplications with high arithmetic intensity, firmly compute-bound where GPUs excel. Embedding lookups are highly sparse, requiring random memory accesses, bound by memory capacity and latency, not peak sequential bandwidth. Upgrading to 80GB GPUs requires sharding the 600GB tables across 8+ GPUs, incurring massive PCIe/NVLink all-to-all communication overheads. The optimal L6+ architecture is heterogeneous: host the 600GB embedding tables on the high-capacity CPU memory, and pipeline the gathered dense vectors over PCIe to the GPU to execute the compute-bound MLP.'
  common_mistake: |
    **The Pitfall:** Assuming GPUs are always better due to higher peak bandwidth.
    **The Rationale:** Failing to distinguish between sequential bandwidth (HBM) and memory capacity/random transaction rates required for sparse embeddings.
    **The Consequence:** Wasting money on massive GPU clusters just for VRAM capacity, while incurring heavy NVLink communication overhead.
  napkin_math: |
    **Assumptions & Constraints:**
    - 15,000 QPS scaling to 30,000 QPS.
    - Embedding lookups: 200 features/query.
    - Capacity required: 600 GB.
    
    **Calculations:**
    - Embedding lookups: 200 features/query x 15,000 QPS = 3M lookups/sec.
    - Bandwidth required: 3M x 128 bytes = 384 MB/s.
    - GPU MLP compute: 15,000 QPS x 50M FLOPs = 750 GFLOPs.
    
    **Conclusion & Interpretation:**
    - **Result: 384 MB/s (PCIe-Bound Hybrid)**. CPU fits capacity; PCIe Gen4 (32 GB/s) easily handles the 384 MB/s vector transfer.
