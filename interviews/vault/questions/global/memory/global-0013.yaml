title: The Parameter Memory Footprint
scenario: You are loading a 7 Billion parameter model for inference.
question: "If the weights are stored in FP16, what is the absolute minimum GPU memory required just to hold the weights?"
details:
  realistic_solution: '7 billion parameters * 2 bytes/parameter = 14 GB. You cannot physically fit this model onto an 8GB or 12GB GPU without quantization or layer offloading.'
  common_mistake: |
    **The Pitfall:** Forgetting to multiply by the byte size of the precision format.
    **The Rationale:** A 7B parameter model sounds like it maps 1:1 to 7GB of memory.
    **The Consequence:** Requisitioning an 8GB GPU, only to immediately OOM on model load.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 7 Billion parameters.
       - Weights stored in FP16 (2 bytes per parameter).
    2. **Calculations:**
       - Total Memory: 7,000,000,000 params * 2 bytes = 14,000,000,000 bytes.
       - INT4 Alternative: 7B * 0.5 bytes = 3.5 GB (Distractor 1).
       - INT8 Alternative: 7B * 1 byte = 7 GB (Distractor 2).
       - FP32 Alternative: 7B * 4 bytes = 28 GB (Distractor 4).
    3. **Conclusion & Interpretation:**
       - **The absolute minimum memory footprint for FP16 weights is 14 GB.**
       - **Result: Memory-Capacity Bound**
  options:
  - ~3.5 GB
  - ~7 GB
  - ~14 GB
  - ~28 GB
  correct_index: 2
