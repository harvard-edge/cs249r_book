title: Mitigating KV Cache Fragmentation
scenario: You are deploying a 13B parameter LLM for a multi-tenant chat application on a 40GB A100. The FP16 weights consume 26GB. You pre-allocate a static, contiguous KV cache buffer for 8 concurrent requests, assuming a maximum sequence length of 2048 tokens. Under production load, average sequence lengths are only 256 tokens, meaning actual memory utilized is low, but the system cannot accept more than 8 concurrent requests without OOMing, resulting in terrible serving infrastructure cost efficiency.
question: "How would you redesign the static KV cache so the 13B model on a 40GB A100 can serve far more than 8 concurrent requests?"
details:
  realistic_solution: 'The static allocation approach suffers from massive internal fragmentation; memory is reserved for the worst-case 2048 tokens even when only 256 are used. To optimize memory capacity and increase batch size, implement PagedAttention. This technique breaks the KV cache into fixed-size non-contiguous physical blocks (e.g., 16 tokens per block) managed by a block table, decoupling logical sequence length from physical memory allocation. This completely eliminates external fragmentation and bounds internal fragmentation to at most one block per sequence. By allocating physical memory dynamically only as sequences grow, you can fit nearly 10x more concurrent requests in the remaining 14GB of VRAM.'
  common_mistake: 'Dynamically allocating and freeing PyTorch tensors for the KV cache per request, which leads to severe external fragmentation and eventually still causes OOMs.'
  napkin_math: |
    **Assumptions & Constraints:**
    - 13B parameter model on 40GB A100.
    - VRAM remaining for KV cache: 14GB.
    - Max sequence length: 2048 tokens; Average used: 256 tokens.
    - KV cache size per token: 819 KB.
    
    **Calculations:**
    - Static allocation per request: 2048 * 819 KB = 1.67 GB.
    - Max concurrent static requests: 14 GB / 1.67 GB = ~8 requests.
    - Wasted memory per average request: (2048 - 256) * 819 KB = 1.46 GB (87% waste).
    - PagedAttention allocation per average request: 256 * 819 KB = ~210 MB.
    - Max concurrent dynamic requests: 14 GB / 210 MB = ~66 requests.
    
    **Conclusion & Interpretation:**
    - **Result: 8x Throughput Scaling (Memory Capacity Bound)**. PagedAttention eliminates massive internal fragmentation, allowing the system to serve nearly 10x more concurrent requests in the exact same VRAM footprint.
