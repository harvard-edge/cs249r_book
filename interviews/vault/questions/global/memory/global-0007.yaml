title: The Embedding OOM Screen
scenario: Loading a 100M-item recommendation system with FP32 128-dimensional embeddings immediately crashes a 16GB T4 GPU.
question: Before you even look at the code, what basic math did you fail to do?
details:
  realistic_solution: 'Calculate the explicit static footprint of the model parameters. 100M embeddings at FP32 physically demand over 50 GiB. The tensor architecturally cannot fit onto a 16 GiB card.'
  common_mistake: |
    **The Pitfall:** Assuming the batch size is too large or PyTorch has a memory leak.
    **The Rationale:** Beginners often focus on training hyperparameters or framework bugs instead of calculating the static footprint of the model weights.
    **The Consequence:** Wasting hours debugging code when the model physically cannot fit on the hardware.
  napkin_math: |
    **Assumptions & Constraints:**
    - Embeddings: 100M items
    - Vector size: 128-dim FP32 (4 bytes)
    - T4 VRAM: 16 GB

    **Calculations:**
    - Static Size: 100,000,000 * 128 * 4 bytes = 51.2 GB
    - Oversubscription = 51.2 GB / 16 GB = 3.2x

    **Conclusion & Interpretation:**
    - **Result: Memory-Capacity Bound (OOM)**. The parameters physically cannot fit onto a 16GB card.
  options:
  - You forgot to set PyTorch's `max_split_size_mb` configuration.
  - The Adam optimizer's momentum states consume 3x the memory of the weights.
  - 100M embeddings at FP32 (128-dim) requires 51.2GB, which physically exceeds the 16GB VRAM.
  - The PCIe Gen3 bus is too slow to transfer the embeddings in time.
  correct_index: 2
