title: The Phantom Memory Pool
scenario: A production recommendation model runs efficiently in PyTorch eager mode, using 60GB of an 80GB GPU during the forward pass. To increase QPS, you enable CUDA graphs. You run a standard eager warmup pass, then trigger the graph capture. Immediately, the system throws a CUDA Out of Memory (OOM) error. Model weights are 20GB, and peak activations are 40GB.
question: Why does CUDA graph capture OOM after eager warmup when the same model fits in eager mode?
details:
  realistic_solution: CUDA graphs require stable virtual memory addresses. The framework allocates a dedicated, contiguous memory pool specifically for the graph's intermediates. When the warmup pass runs, the caching allocator reserves 40GB. When graph capture starts, it requests a new 40GB pool. You must call `torch.cuda.empty_cache()` after warmup to release the eager allocator.
  common_mistake: |
    **The Pitfall:** Arbitrarily reducing the batch size to compensate for perceived graph metadata overhead.
    **The Rationale:** Candidates incorrectly assume the graph capture metadata itself takes up 20GB+ of VRAM.
    **The Consequence:** The underlying allocator issue is ignored, and the throughput gains of CUDA graphs are negated by the forced smaller batch size.
  napkin_math: |
    **Assumptions & Constraints:**
    - Total VRAM: 80GB.
    - Weights: 20GB, Activations: 40GB.

    **Calculations:**
    - Eager memory state: 20GB Weights + 40GB reserved in caching allocator = 60GB.
    - Graph capture initiates private memory pool: +40GB.
    - Total requested: 60GB + 40GB = 100GB (OOM).

    **Conclusion & Interpretation:**
    - **Result: Memory-Bound (Capacity).** Calling `empty_cache()` frees the eager pool, allowing the 40GB capture pool to fit securely within the 80GB VRAM limit.
