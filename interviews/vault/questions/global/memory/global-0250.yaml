title: HBM Bandwidth Ceiling on A100
scenario: Consider the memory bandwidth specifications of previous and current generation 80GB GPUs.
question: What is the peak HBM2e memory bandwidth of an A100-80GB GPU, and how does it compare to the H100's HBM3 bandwidth?
details:
  realistic_solution: 'The A100 delivers 2.0 TB/s of HBM2e bandwidth, while the H100 delivers 3.35 TB/s of HBM3 bandwidth — a 1.68x improvement. This matters because many LLM inference workloads are memory-bandwidth-bound (not compute-bound), so the H100''s 1.68x bandwidth gain translates almost directly to 1.68x faster token generation for autoregressive decoding. The compute improvement is even larger (989 vs 312 TFLOPS = 3.17x), meaning the H100 shifts the roofline knee further right, making more workloads compute-bound.'
  common_mistake: |
    **The Pitfall:** Confusing HBM2e and HBM3 specs, or mixing up bandwidth with capacity.
    **The Rationale:** Both GPUs have 80GB of VRAM, leading to the assumption that their memory subsystems are similar.
    **The Consequence:** Failing to realize that an H100 will provide a ~1.68x speedup for memory-bound autoregressive decoding simply due to bandwidth.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Gen 1 GPU (HBM2e): 2.0 TB/s Bandwidth.
       - Gen 2 GPU (HBM3): 3.35 TB/s Bandwidth.
       - Both have 80 GB capacity.
    2. **Calculations:**
       - Bandwidth Ratio: 3.35 TB/s / 2.0 TB/s = 1.675x.
    3. **Conclusion & Interpretation:**
       - **The newer GPU provides a 1.68x speedup for memory-bound decoding due to HBM3 bandwidth improvements.**
       - **Result: Memory-Bandwidth Bound**
