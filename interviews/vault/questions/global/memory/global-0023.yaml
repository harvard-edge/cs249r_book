title: Memory Hierarchy Latency Profiling
scenario: You are profiling an application to optimize data movement and need to understand the relative speeds of the system's memory hierarchy components.
question: "What is the correct fastest-to-slowest order of the memory hierarchy when profiling data movement?"
details:
  realistic_solution: 'The memory hierarchy is strictly organized by speed and proximity to the processor core. Registers are the fastest, followed by L1 Cache (few cycles), L2 Cache (~10-20 cycles), Main Memory/DRAM (~100+ cycles), and finally local SSDs (microseconds).'
  common_mistake: 'Confusing L1 and L2 cache speeds with Main Memory, or drastically underestimating the latency penalty of storage drives.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Hardware latency scales fundamentally with physical proximity and memory technology.
    
    **Calculations:**
    - L1 Cache latency: ~1 ns.
    - L2 Cache latency: ~5 ns.
    - Main Memory (DRAM) latency: ~100 ns.
    - Storage (NVMe SSD) latency: ~10,000 ns.
    
    **Conclusion & Interpretation:**
    - **Result: 10,000x Latency Penalty (Memory Access Bound)**. Moving from L1 cache to solid state storage incurs a multi-order-of-magnitude latency penalty, dictating strict spatial locality optimizations.
  options:
  - L1 Cache -> L2 Cache -> Main Memory (DRAM) -> Solid State Drive (NVMe)
  - L1 Cache -> Main Memory (DRAM) -> L2 Cache -> Solid State Drive (NVMe)
  - Main Memory (DRAM) -> L1 Cache -> L2 Cache -> Solid State Drive (NVMe)
  - L2 Cache -> L1 Cache -> Solid State Drive (NVMe) -> Main Memory (DRAM)
