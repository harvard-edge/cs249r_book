title: The PagedAttention OOM
scenario: 'You are deploying a high-throughput translation service using an 8B parameter model. Average
  requests are extremely short: 15 prompt tokens and 15 decode tokens. To maximize contiguous memory reads,
  you configure PagedAttention with a block size of 512 tokens. However, the system OOMs at just 64 concurrent
  requests.'
question: Why does 512-token PagedAttention block sizing OOM at 64 short translation requests on an 80GB
  A100?
details:
  realistic_solution: The root cause is internal memory fragmentation due to an oversized PagedAttention
    block size. However, with a 512-token block size, 64 concurrent requests only consume about 4GB of
    KV cache. For this to OOM an 80GB A100, the system's available KV cache pool must have been misconfigured
    to an exceptionally small size, or there is another severe memory leak. In a properly configured system,
    this fragmentation alone would not cause an OOM.
  common_mistake: '**The Pitfall:** Assuming the OOM is caused by the model weights or activation memory
    during the forward pass.

    **The Rationale:** Candidates overlook internal fragmentation caused by a PagedAttention block size
    far larger than the average sequence length.

    **The Consequence:** Futile attempts to reduce batch size or quantize weights instead of tuning the
    block size.

    '
  napkin_math: '**Assumptions & Constraints:**

    - 8B model: 32 layers, 8 KV heads, 128 dim.

    - Block size = 512 tokens. Request length = 30 tokens.


    **Calculations:**

    - KV size per token = 32 * 8 * 128 * 2 * 2 = 128 KB.

    - Memory per block = 512 * 128 KB = 64 MB.

    - Allocated for 64 requests = 64 * 64 MB = 4 GB.

    - Required per request = 30 * 128 KB = 3.8 MB.

    - Wasted memory = 64 * (64 MB - 3.8 MB) = ~3.8 GB.


    **Conclusion & Interpretation:**

    - **Result: 4 GB Allocated (Configuration-Bound)**. 64 requests consume only 4GB of VRAM. An OOM on
    an 80GB A100 implies the KV cache pool was restricted to an artificially small size (under 4GB).'
