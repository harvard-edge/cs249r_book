title: The PagedAttention OOM
scenario: 'You are deploying a high-throughput translation service using an 8B parameter model. Average requests are extremely short: 15 prompt tokens and 15 decode tokens. To maximize contiguous memory reads, you configure PagedAttention with a block size of 512 tokens. However, the system OOMs at just 64 concurrent requests.'
question: 'Why does 512-token PagedAttention block sizing OOM at 64 short translation requests on an 80GB A100?'
details:
  realistic_solution: 'The root cause is severe internal memory fragmentation due to an oversized PagedAttention block size. PagedAttention allocates memory in fixed-size blocks. If a request needs a few tokens, it consumes an entire block. With a block size of 512 tokens and average length of 30 tokens, each request wastes 482 tokens of KV cache capacity. At 64 concurrent requests, this internal fragmentation wastes gigabytes of VRAM, prematurely exhausting the KV cache pool and causing an OOM. The solution is to reduce the block size to 16 or 32 tokens.'
  common_mistake: |
    **The Pitfall:** Assuming the OOM is caused by the model weights or activation memory during the forward pass.
    **The Rationale:** Candidates overlook internal fragmentation caused by a PagedAttention block size far larger than the average sequence length.
    **The Consequence:** Futile attempts to reduce batch size or quantize weights instead of tuning the block size.
  napkin_math: |
    **Assumptions & Constraints:**
    - 8B model: 32 layers, 8 KV heads, 128 dim.
    - Block size = 512 tokens. Request length = 30 tokens.

    **Calculations:**
    - KV size per token = 32 * 8 * 128 * 2 * 2 = 128 KB.
    - Memory per block = 512 * 128 KB = 64 MB.
    - Required per request = 30 * 128 KB = 3.8 MB.
    - Wasted memory per request = 64 MB - 3.8 MB = 60.2 MB.
    - Wasted for 64 requests = 64 * 60.2 MB = ~3.8 GB.

    **Conclusion & Interpretation:**
    - **Result: OOM (Memory-Bound)**. Internal fragmentation instantly depletes the available KV cache pool.
