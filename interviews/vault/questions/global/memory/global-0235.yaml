title: Why FlashAttention is Faster Despite More FLOPs
scenario: FlashAttention performs more total FLOPs than standard attention (due to recomputation in the backward pass) yet runs 2-4x faster on GPU. A colleague claims doing more compute cannot possibly be faster.
question: Why can FlashAttention run faster than standard attention despite doing extra recomputation FLOPs?
details:
  realistic_solution: Standard attention materializes the NxN attention matrix to HBM. FlashAttention tiles the computation, keeping Q, K, V blocks in SRAM and never materializing the full matrix. This trades extra FLOPs for eliminating O(N^2) HBM traffic. The memory wall makes the recomputation essentially free.
  common_mistake: |
    **The Pitfall:** Equating raw FLOPs directly with wall-clock time.
    **The Rationale:** It seems unintuitive that doing more math could result in a faster execution timeline.
    **The Consequence:** Engineers avoid recomputation techniques, leaving their models severely memory-bound and slow.
  napkin_math: |
    **Assumptions & Constraints:**
    - Sequence length (N) = 2048.
    - HBM Bandwidth = 2 TB/s, Compute = 312 TFLOPS.

    **Calculations:**
    - Standard attention N^2 size = 2048^2 * 2 bytes = 8 MB per head.
    - Round-trip HBM traffic = 16 MB. Time at 2 TB/s = 16 MB / 2 TB/s = 8 us.
    - FlashAttention HBM traffic = 0. Extra compute time at 312 TFLOPS < 1 us.

    **Conclusion & Interpretation:**
    - **Result: Memory-Bound (Bandwidth).** Avoiding HBM traffic saves ~8 us, netting a 7 us latency reduction per head despite the extra arithmetic operations.
