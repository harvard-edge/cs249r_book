title: Paged Attention Internal Fragmentation
scenario: An API requires a batch size of 128. You configure PagedAttention with a block size of 512 tokens. The system constantly OOMs for 80-token requests.
question: Why does PagedAttention with 512-token blocks OOM at batch size 128 for 80-token translation requests?
details:
  realistic_solution: 'Catastrophic internal fragmentation. PagedAttention reserves memory at the block level. A 512-token block dedicated to an 80-token request guarantees 432 tokens of dead VRAM space. Transitioning to granular 16-token blocks radically eliminates this waste, unlocking the full batch-size capacity.'
  common_mistake: |
    **The Pitfall:** Adding more GPUs to increase total VRAM, or reducing model precision to fit the batch size.
    **The Rationale:** OOMs generally imply a lack of hardware capacity or a need for compression.
    **The Consequence:** Spending immense budget on unnecessary hardware or degrading model quality when the true culprit is simply an inefficiently large paging block size.
  napkin_math: |
    **Assumptions & Constraints:**
    - Block size: 512 tokens
    - Request size: 80 tokens
    - Batch: 128
    - KV/token: ~800 KB (Llama-2 13B)

    **Calculations:**
    - Block allocation: 512 * 800 KB = ~400 MB
    - Total Reserved: 128 * 400 MB = 51.2 GB
    - Total Needed: 128 * 80 * 800 KB = ~8 GB
    - Waste: 51.2 GB - 8 GB = 43.2 GB

    **Conclusion & Interpretation:**
    - **Result: Memory-Capacity Bound (Fragmentation)**. Catastrophic internal fragmentation forces the system to OOM despite low actual memory needs.
