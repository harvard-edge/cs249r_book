title: XIP Flash Cache Thrashing
scenario: You deploy an updated 200KB keyword spotting model to a Cortex-M7 (400MHz, 32KB D-Cache). The
  weights stream from external QSPI Flash via Execute-In-Place (XIP). After an on-device Federated Learning
  sparsity update, latency jumps from 15ms to 78ms and power spikes, despite FLOPs decreasing by 10%.
question: Why does the FL sparsity update make the 200KB keyword spotting model slower and higher power
  despite 10% fewer FLOPs?
details:
  realistic_solution: The root cause is D-Cache thrashing due to a loss of spatial locality. The FL sparsity
    update introduced unstructured sparsity that requires non-sequential pointer chasing. Every non-sequential
    read of the active weights misses the cache. On a microcontroller, random accesses to QSPI Flash destroy
    read burst mode, forcing each fetch to suffer the full memory latency and bus turnaround overhead.
    Over a million intermediate fetches, this heavily stalls the CPU pipeline, spiking latency to 78ms.
  common_mistake: '**The Pitfall:** Assuming the FL sparsity update introduced unoptimized fallback kernels
    that take more CPU cycles.

    **The Rationale:** When FLOPs go down but time goes up, developers usually blame bad software instruction
    optimization.

    **The Consequence:** Wasting time rewriting assembly code when the issue is hardware-level memory
    access patterns destroying spatial locality.

    '
  napkin_math: '**Assumptions & Constraints:**

    - 400MHz CPU, 32KB D-Cache.

    - 200KB model streaming via XIP QSPI Flash.

    - 90% sparse updates cause non-sequential pointer chasing.

    - ~1.2M MAC operations per inference.


    **Calculations:**

    - Dense Model accesses weights sequentially, maximizing cache line usage and burst mode.

    - Sparse Model requires ~1.08M (90% of 1.2M) random weight fetches.

    - Random QSPI read penalty (breaking burst mode): ~15 cycles + bus turnaround = ~50ns to 100ns effective
    stall per miss.

    - Cache miss time penalty: 1.08M misses * 60ns average stall = ~65 ms.


    **Conclusion & Interpretation:**

    - **Result: ~65ms added penalty (Memory-Latency Bound)**. Cache thrashing from non-sequential access
    dominates execution time, spiking latency to 78ms despite fewer FLOPs.'
