title: MoE Routing Across Regimes
scenario: A team proposes using the same MoE model in cloud serving, mobile offline mode, and TinyML safety classification. Cloud can route to 8 experts, mobile can store 2 experts, and TinyML can store none. Evaluate whether MoE is a portable architecture choice.
question: Can the same MoE architecture sensibly serve cloud, mobile, and TinyML deployments with 8, 2, and 0 experts available?
details:
  realistic_solution: Only the cloud deployment supports the intended MoE behavior. Mobile could use a distilled subset or adapter, but routing among 2 local experts changes quality and memory tradeoffs. TinyML cannot instantiate MoE and needs a distilled dense model or rule-based fallback. The architecture is not directly portable across regimes.
  common_mistake: Assuming a successful cloud MoE model can be copied to constrained devices unchanged.
  napkin_math: If each expert is 500 MB, 8 experts require 4 GB before router and shared layers; TinyML flash budgets are orders of magnitude smaller.
