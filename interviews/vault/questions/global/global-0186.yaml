title: The Async Pipeline Throughput Limit
scenario: 'You split a 48-layer model across 2 datacenters using pipeline parallelism: layers 1-24 in
  US-East, layers 25-48 in EU-West. The cross-DC link has 40ms one-way latency. Each pipeline stage takes
  50ms of compute. With 4 microbatches in flight, calculate the pipeline bubble and steady-state throughput.'
question: "With 4 microbatches in flight, what are the pipeline bubble and steady-state throughput across the two 50ms stages and 40ms cross-DC link?"
details:
  realistic_solution: 'In pipeline parallelism, activations must be sent from stage 1 (US-East) to stage
    2 (EU-West) after each microbatch''s forward pass, and gradients sent back during backward. Effective
    stage time = compute + communication = 50ms + 40ms = 90ms per stage transition. With 2 stages and
    4 microbatches: pipeline fill time = (2-1) × 90ms = 90ms. Steady-state: 1 microbatch completes every
    90ms (bottleneck is the stage time including communication). Total time for 4 microbatches: 90ms (fill)
    + 4 × 90ms (steady state) = 450ms. Without cross-DC latency: (1 × 50ms) + 4 × 50ms = 250ms. Cross-DC
    overhead: 450/250 = 1.8× slowdown.'
  common_mistake: Ignoring the communication latency between pipeline stages. Intra-datacenter pipeline
    parallelism has ~microsecond inter-stage latency; cross-DC has 40ms, which fundamentally changes the
    pipeline bubble calculation.
  napkin_math: 'Stage time with comms: 50ms compute + 40ms network = 90ms. Pipeline fill (p-1 stages):
    1 × 90ms = 90ms. 4 microbatches at steady state: 4 × 90ms = 360ms. Total: 450ms. Without network:
    1 × 50ms + 4 × 50ms = 250ms. Slowdown: 450/250 = 1.8×. Bubble fraction: 90/(90 + 4×90) = 20%. Compute
    efficiency: 50/90 = 55.6% (44.4% wasted on network wait).'
