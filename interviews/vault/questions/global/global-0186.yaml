title: The Async Pipeline Throughput Limit
scenario: 'You split a 48-layer model across 2 datacenters using pipeline parallelism: layers 1-24 in US-East, layers 25-48 in EU-West. The cross-DC link has 40ms one-way latency. Each pipeline stage takes 50ms of compute.'
question: With 4 microbatches in flight, what are the pipeline bubble and steady-state throughput across the two 50ms stages and 40ms cross-DC link?
details:
  realistic_solution: "In pipeline parallelism, activations must be sent from stage 1 (US-East) to stage 2 (EU-West) after each microbatch's forward pass, and gradients sent back during backward. Effective stage time = compute + communication = 50ms + 40ms = 90ms per stage transition. With 2 stages and 4 microbatches: pipeline fill time = (2-1) * 90ms = 90ms. Steady-state: 1 microbatch completes every 90ms (bottleneck is the stage time including communication). Total time for 4 microbatches: 90ms (fill) + 4 * 90ms (steady state) = 450ms. Without cross-DC latency: (1 * 50ms) + 4 * 50ms = 250ms. Cross-DC overhead: 450/250 = 1.8x slowdown."
  common_mistake: |
    **The Pitfall:** Ignoring the communication latency between pipeline stages.
    **The Rationale:** Candidates often apply intra-datacenter pipeline math (~microsecond inter-stage latency) directly to a cross-DC scenario.
    **The Consequence:** Grossly underestimating the pipeline bubble and steady-state throughput, leading to severe resource underutilization.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 2 Pipeline Stages. 4 microbatches in flight.
       - Stage compute: 50 ms. Network latency: 40 ms.
    2. **Calculations:**
       - Stage Time: 50 ms compute + 40 ms network = 90 ms.
       - Pipeline Fill Time (p-1 stages): 1 * 90 ms = 90 ms.
       - Steady State (4 microbatches): 4 * 90 ms = 360 ms.
       - Total Time: 90 ms + 360 ms = 450 ms.
       - Without Network: (1 * 50 ms) + (4 * 50 ms) = 250 ms.
       - Slowdown: 450 ms / 250 ms = 1.8x.
    3. **Conclusion & Interpretation:**
       - **Result: Network-Latency-Bound.** Cross-DC network latency adds severe inter-stage overhead, leading to a 1.8x overall slowdown.
