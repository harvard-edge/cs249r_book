title: Incomplete TCO Forecast
scenario: A company asks for a 3-year TCO forecast for an ML platform. They provide GPU purchase price but omit utilization, power, cooling, staff, networking, storage, depreciation, cloud burst usage, and failure replacement.
question: What information is missing before producing a 3-year TCO forecast for an ML platform?
details:
  realistic_solution: You need CapEx, depreciation, utilization, power, cooling/PUE, space, networking, storage, staff, maintenance, spares, cloud burst cost, and expected failures. GPU purchase price is only one term. A defensible forecast should also include sensitivity to utilization and demand growth.
  common_mistake: |
    **The Pitfall:** Calling the hardware quote the complete TCO.
    **The Rationale:** Purchase price is the largest single upfront number and is easiest to acquire.
    **The Consequence:** Drastically underestimating platform costs, leading to budget overruns when power, networking, and staffing bills arrive.
  napkin_math: |
    * Hardware CapEx: $5M.
    * Annual OpEx: $1M.
    * Three-year Total OpEx: $3M.
    * Minimum TCO = $5M + $3M = $8M.
    * **TCO is at least $8M before accounting for critical staff, network, storage, and replacement costs.**
