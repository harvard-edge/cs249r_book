title: Incomplete TCO Forecast
scenario: A company asks for a 3-year TCO forecast for an ML platform, providing only GPU purchase price.
question: What information is missing before producing a 3-year TCO forecast for an ML platform?
details:
  realistic_solution: "Capital expenditure (CapEx) is severely incomplete. A defensible Total Cost of Ownership (TCO) requires hardware depreciation schedules, datacenter PUE cooling overhead, interconnect fabric costs (InfiniBand/NVLink), burst-cloud telemetry, and dedicated ML-infra headcount multipliers."
  common_mistake: |
    **The Pitfall:** Calling the hardware quote the complete TCO.
    **The Rationale:** Purchase price is the largest single upfront number and is easiest to acquire.
    **The Consequence:** Drastically underestimating platform costs, leading to budget overruns when power, networking, and staffing bills arrive.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 3-year operation
       - CapEx: $5M
       - OpEx: $1M/year
    2. **Calculations:**
       - Total OpEx = 3 * $1M = $3M
       - Minimum TCO = $5M + $3M = $8M
    3. **Conclusion & Interpretation:**
       - **Result: OpEx-Bound**
