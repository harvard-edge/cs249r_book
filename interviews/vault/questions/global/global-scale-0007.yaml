title: Cross-Regime Feature Freshness Spec
scenario: A recommendation system uses features computed in cloud batch jobs, mobile local caches, and edge gateways. The product team asks for consistent recommendations but does not define feature freshness. Specify the feature freshness contract.
question: What feature freshness contract is needed across cloud batch, mobile cache, and edge gateway recommendations?
details:
  realistic_solution: The contract should define maximum feature age, cache invalidation, offline behavior, training-serving skew tolerance, fallback values, and telemetry for stale reads. Cloud may meet minute-level freshness, mobile may need explicit cache TTLs, and edge gateways may need local invalidation when connectivity drops.
  common_mistake: Assuming consistency means identical infrastructure instead of consistent freshness semantics and fallback behavior.
  napkin_math: If a feature changes hourly but the mobile cache TTL is 24 hours, mobile can serve data 24x staler than cloud unless the contract forbids it.
