title: The Dynamic DAG Scheduling Problem
scenario: Your agentic system builds a dynamic execution DAG at runtime — the LLM decides which tools
  to call based on intermediate results. Unlike a static DAG, you cannot pre-plan parallelism because
  the graph shape is unknown until execution. An agent processing a research query creates a DAG with
  12 nodes across 6 sequential decision points. Each decision point adds 1.5s of LLM inference latency.
  How do you reduce the 9-second overhead of sequential LLM planning steps?
details:
  realistic_solution: 'Three strategies that preserve dynamic planning while reducing serial LLM overhead:
    (1) Speculative execution: At each decision point, predict the 2-3 most likely next tools (based on
    historical patterns for this query type) and execute them in parallel while the LLM is still deciding.
    If the LLM''s choice matches a pre-executed tool, skip the wait. Hit rate: ~70% for well-understood
    domains, saving 0.7 × 1.5s × 6 = 6.3s. (2) Hierarchical planning: Use the large model for high-level
    plan (2 planning steps → 3s), then a small fast model (0.2s per step) for detailed tool selection
    within each phase. Total: 3s + 4 × 0.2s = 3.8s vs 9s. (3) Plan caching: For recurring query types,
    cache the execution plan skeleton. If a new query matches a cached skeleton (semantic similarity >
    0.95), execute the cached plan with parameter substitution and only invoke the LLM for anomalous intermediate
    results. Cache hit rate for enterprise use cases: ~40%. (4) Parallel branch exploration: When the
    DAG branches, explore all branches simultaneously and prune non-productive branches after one step.'
  common_mistake: Trying to predict the full DAG upfront. The whole point of dynamic DAGs is that the
    plan adapts to intermediate results — pre-planning defeats the purpose.
  napkin_math: 'Sequential: 6 × 1.5s = 9s planning overhead. Speculative (70% hit): 6 × 1.5s × 0.3 = 2.7s
    effective (tools pre-executed in parallel). Hierarchical: 2 × 1.5s + 4 × 0.2s = 3.8s. Plan caching
    (40% hit): 0.4 × 0.5s + 0.6 × 9s = 5.6s average. Combined (speculative + hierarchical): 2 × 1.5s +
    4 × 0.2s × 0.3 = 3.24s.'
