title: KV Cache Memory per Token
scenario: You are estimating serving memory for a Llama-2-70B model (80 layers, 8 KV heads, head_dim=128) in FP16.
question: How much KV cache memory is needed per token?
details:
  realistic_solution: Per token KV cache is ~320 KB. Serving 100 concurrent requests uses 128 GB of VRAM just for KV cache, which is why algorithms like PagedAttention are critical.
  common_mistake: |
    **The Pitfall:** Forgetting to count both Key and Value caches, or miscounting the per-layer contribution.
    **The Rationale:** Attention mechanisms are complex, and candidates often omit one side of the KV pair during mental arithmetic.
    **The Consequence:** The VRAM budget for sequence generation is off by exactly 50%, leading to production OOMs.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Layers = 80, KV Heads = 8 (GQA), Head Dim = 128.
       - Precision = FP16 (2 bytes/param).
    2. **Calculations:**
       - Memory per token = 2 (Key+Value) * 80 layers * 8 heads * 128 dim * 2 bytes = 327,680 bytes = 320 KB.
       - Context memory (4096 tokens) = 320 KB * 4096 = 1.28 GB / request.
       - Batch of 100 requests = 100 * 1.28 GB = 128 GB.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound (Capacity).** Serving 100 concurrent requests requires ~128 GB of VRAM purely for the KV cache, which dominates the memory budget.
