title: Global New 0006
scenario: A large training job requires exactly 10^21 FLOPs. Assuming a constant 30% utilization of peak
  theoretical FLOPs, calculate the difference in total training hours when using a single V100 32GB versus
  a single A100 80GB.
question: "How many training hours are saved by using one A100 instead of one V100 for 10^21 FLOPs at 30% utilization?"
details:
  realistic_solution: To model the cost and time of training, apply the utilization factor to the peak
    theoretical FLOPS for both GPUs. Then, divide the total required FLOPs by the effective continuous
    FLOPS rate of each GPU to find the total training time in seconds, converting to hours to find the
    time saved.
  common_mistake: Ignoring the 30% utilization factor or failing to correctly convert TFLOPS (10^12) into
    standard FLOPs for the division.
  napkin_math: V100 Effective = 125 TFLOPS * 0.3 = 37.5e12 FLOPS. V100 Time = 1e21 / 37.5e12 = 26.66e6
    seconds = 7407 hours. A100 Effective = 312 TFLOPS * 0.3 = 93.6e12 FLOPS. A100 Time = 1e21 / 93.6e12
    = 10.68e6 seconds = 2967 hours. Difference = 4440 hours.
