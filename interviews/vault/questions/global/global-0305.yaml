title: Global New 0006
scenario: A large training job requires exactly 10^21 FLOPs.
question: How many training hours are saved by using one A100 (312 TFLOPS peak) instead of one V100 (125 TFLOPS peak) for 10^21 FLOPs at 30% utilization?
details:
  realistic_solution: To model the cost and time of training, apply the utilization factor to the peak theoretical FLOPS for both GPUs. Then, divide the total required FLOPs by the effective continuous FLOPS rate of each GPU to find the total training time in seconds, converting to hours to find the time saved.
  common_mistake: |
    **The Pitfall:** Ignoring the 30% utilization factor or failing to correctly convert TFLOPS (10^12) into standard FLOPs for the division.
    **The Rationale:** Candidates often assume peak theoretical FLOPS can be fully utilized, or they bungle the order of magnitude conversions.
    **The Consequence:** Predicting training times that are unrealistic by over a factor of 3, leading to massive scheduling and budget overruns.
  napkin_math: |
    *   **V100 Effective:** 125 TFLOPS * 0.3 = 37.5e12 FLOPS.
    *   **V100 Time:** 1e21 / 37.5e12 = 26.66e6 seconds = 7407 hours.
    *   **A100 Effective:** 312 TFLOPS * 0.3 = 93.6e12 FLOPS.
    *   **A100 Time:** 1e21 / 93.6e12 = 10.68e6 seconds = 2967 hours.
    *   **Difference:** 7407 - 2967 = **4440 hours saved**.
