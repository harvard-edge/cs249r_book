title: Replication vs Erasure Coding for Checkpoint Storage
scenario: Your 512-GPU training cluster writes 700 GB checkpoints every 2 hours to a distributed filesystem. The storage system must survive 2 simultaneous disk failures.
question: How would you evaluate storage overhead, write throughput, and recovery time for 3-way replication vs 10+4 Reed-Solomon erasure coding?
details:
  realistic_solution: 'Replication (3x): storage overhead = 3x. Each 700 GB checkpoint requires 2.1 TB of storage. Write throughput: 3 parallel writes of 700 GB. At 10 GB/s per storage node: 700 GB / 10 = 70 seconds, all 3 replicas written in parallel = 70s total. Survives 2 failures (any 2 of 3 copies can fail, 1 remains). Recovery: copy 700 GB from surviving replica = 70s. Erasure coding (10+4): storage overhead = 1.4x (14/10). Each 700 GB checkpoint requires 980 GB. Write throughput: split 700 GB into 10 chunks of 70 GB, compute 4 parity chunks of 70 GB each. Write 14 \times 70 GB chunks in parallel. Encoding compute: ~2 seconds (CPU-bound, Reed-Solomon is fast). Write: 70 GB / 10 GB/s = 7 seconds per chunk (parallel across 14 nodes). Total: ~9 seconds \u2014 faster than replication because each node writes less data. Survives any 4 failures (out of 14 chunks). Recovery: read 10 chunks (70 GB \times 10 = 700 GB), decode 2 missing chunks in ~2s. Total recovery: 7s read + 2s decode = 9s. Erasure coding wins: 53% less storage (980 GB vs 2.1 TB), faster writes (9s vs 70s), higher fault tolerance (4 failures vs 2), slightly more complex recovery. At $0.02/GB/month, annual storage savings \approx $1.20M/year.'
  common_mistake: |
    **The Pitfall:** Choosing 3-way replication for simplicity without calculating the massive storage and network cost.
    **The Rationale:** Replication is conceptually simpler and faster to recover, making it a default choice for smaller systems.
    **The Consequence:** Wasting over a million dollars a year on redundant physical storage while simultaneously saturating the network with unnecessary write traffic.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 512-GPU cluster writes 700 GB checkpoints every 2 hours (12/day).
       - Storage price = $0.02/GB/month.
    2. **Calculations:**
       - Replication 3x: 700 GB * 3 = 2,100 GB per checkpoint.
       - EC 10+4: 700 GB * 1.4 = 980 GB per checkpoint.
       - Daily writes: Replication = 25.2 TB, EC = 11.76 TB.
       - Annual storage saved: (25.2 - 11.76) * 365 = 4,905.6 TB.
       - Annual Cost Saved: 4,905.6 TB * 1024 GB/TB * $0.02/GB/month * 12 months = $1.20M/year.
    3. **Conclusion & Interpretation:**
       - **Result: I/O & Cost-Bound.** Erasure Coding saves ~4.9 PB of redundant data, equating to ~$1.20M/year while improving write throughput.
