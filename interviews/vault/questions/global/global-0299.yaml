title: Replication vs Erasure Coding for Checkpoint Storage
scenario: 'Your 512-GPU training cluster writes 700 GB checkpoints every 2 hours to a distributed filesystem. The storage system must survive 2 simultaneous disk failures. Compare 3-way replication (store 3 copies) vs Reed-Solomon erasure coding (10+4 scheme: 10 data + 4 parity chunks). Evaluate storage overhead, write throughput, and recovery time.'
question: "How would you evaluate storage overhead, write throughput, and recovery time?"
details:
  realistic_solution: 'Replication (3x): storage overhead = 3x. Each 700 GB checkpoint requires 2.1 TB of storage. Write throughput: 3 parallel writes of 700 GB. At 10 GB/s per storage node: 700 GB / 10 = 70 seconds, all 3 replicas written in parallel = 70s total. Survives 2 failures (any 2 of 3 copies can fail, 1 remains). Recovery: copy 700 GB from surviving replica = 70s. Erasure coding (10+4): storage overhead = 1.4x (14/10). Each 700 GB checkpoint requires 980 GB. Write throughput: split 700 GB into 10 chunks of 70 GB, compute 4 parity chunks of 70 GB each. Write 14 × 70 GB chunks in parallel. Encoding compute: ~2 seconds (CPU-bound, Reed-Solomon is fast). Write: 70 GB / 10 GB/s = 7 seconds per chunk (parallel across 14 nodes). Total: ~9 seconds — faster than replication because each node writes less data. Survives any 4 failures (out of 14 chunks). Recovery: read 10 chunks (70 GB × 10 = 700 GB), decode 2 missing chunks in ~2s. Total recovery: 7s read + 2s decode = 9s. Erasure coding wins: 53% less storage (980 GB vs 2.1 TB), faster writes (9s vs 70s), higher fault tolerance (4 failures vs 2), slightly more complex recovery. At $0.02/GB/month, annual storage savings ≈ $1.20M/year.'
  common_mistake: Choosing 3-way replication for simplicity without calculating the massive storage cost. At 700 GB per checkpoint × 3 copies × 12 checkpoints/day = 25.2 TB/day of raw writes — erasure coding nearly halves this.
  napkin_math: 'Replication 3x: 700 GB × 3 = 2.1 TB/checkpoint. EC 10+4: 700 × 1.4 = 980 GB/checkpoint. Daily (12 ckpts): replication = 25.2 TB, EC = 11.8 TB. Annual storage written: (25.2-11.8) × 365 = 4,891 TB difference. At $0.02/GB/month: 4,891 TB × 1,024 GB/TB × $0.02/GB/month × 12 months/year ≈ $1.20M/year saved.'
