scenario: You must serve a 175B parameter model in FP16 across multiple A100 80GB GPUs using Tensor Parallelism.
  Calculate the minimum number of GPUs required just to hold the weights, and find the time to transfer
  a 12MB activation tensor between GPUs via NVLink.
details:
  realistic_solution: Calculate the FP16 memory footprint and divide by the GPU memory capacity to find
    the minimum GPU count. Tensor parallelism requires massive inter-GPU communication, heavily relying
    on NVLink. The transfer time is calculated by dividing the activation payload size by the NVLink bandwidth.
  common_mistake: Failing to round up the GPU count correctly, or miscalculating the NVLink transfer time
    by mixing up megabytes and gigabytes.
  napkin_math: 175B * 2 bytes = 350GB. 350GB / 80GB = 4.375 GPUs -> requires 5 GPUs (practically 8 for
    power-of-2). NVLink transfer time = 12MB / 600GB/s = 0.012GB / 600GB/s = 0.00002s (20 microseconds).
