id: global-0203
title: Energy Cost of a Training Run
topic: power-budgeting
status: published
provenance: imported
scenario: You train a model on 64 A100 GPUs for 72 hours. Each A100 draws 300W at full load, and the data
  center PUE is 1.3. At $0.10/kWh, estimate the total electricity cost of this training run.
details:
  realistic_solution: GPU power = 64 × 300W = 19.2 kW. With PUE 1.3, total facility power = 19.2 × 1.3
    = 24.96 kW. Energy = 24.96 kW × 72 h = 1797 kWh. Cost = 1797 × $0.10 = $179.70. This is just electricity
    — total TCO including GPU depreciation, networking, and staffing is typically 3-5× higher. For context,
    a 1000-GPU run for 30 days would cost ~$28K in electricity alone.
  common_mistake: Forgetting the PUE multiplier. The cooling and networking overhead adds 30% on top of
    the raw GPU power draw.
  napkin_math: 'Power = 64 × 300W = 19.2 kW. With PUE: 19.2 × 1.3 = 25 kW. Energy = 25 kW × 72h = 1800
    kWh. Cost = 1800 × $0.10 = $180.'
