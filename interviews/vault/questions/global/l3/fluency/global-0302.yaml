title: Global New 0003
topic: pruning-sparsity
status: published
provenance: imported
scenario: A 40B parameter model is quantized from FP16 to INT8 to run on a single H100 80GB GPU. Calculate
  the memory savings achieved by quantization and the maximum theoretical decoding speed per token, assuming
  inference is strictly memory-bandwidth bound.
details:
  realistic_solution: Quantizing from 16-bit to 8-bit halves the parameter memory footprint, allowing
    larger models or larger batches to fit in VRAM. During autoregressive decoding at batch size 1, the
    entire model must be read from memory for every single token generated. The theoretical max tokens
    per second is the memory bandwidth divided by the model size.
  common_mistake: Calculating token speed using peak TFLOPS instead of memory bandwidth, which ignores
    the memory-bound nature of autoregressive decoding.
  napkin_math: FP16 size = 40B * 2B = 80GB. INT8 size = 40B * 1B = 40GB. Memory savings = 40GB. Max Decoding
    Speed = 3.35 TB/s / 40GB = 3350GB/s / 40GB = 83.75 tokens/second.
