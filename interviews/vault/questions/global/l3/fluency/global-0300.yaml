title: Global New 0001
topic: latency-decomposition
status: published
provenance: imported
scenario: A dense matrix multiplication layer is profiled on an A100 80GB GPU. You need to calculate the
  operational intensity ridge point for the hardware to determine if the layer will be memory-bound or
  compute-bound, given a theoretical 100 FLOPs per byte for the specific layer.
details:
  realistic_solution: To determine the bottleneck, calculate the hardware's ridge point, which is the
    ratio of peak compute to peak memory bandwidth. If the layer's operational intensity is below this
    ridge point, it is memory-bound; if above, it is compute-bound. Comparing the layer's 100 FLOPs/byte
    against the A100's ridge point reveals the operational bottleneck.
  common_mistake: Failing to correctly align units (TFLOPS vs TB/s) or misinterpreting the ridge point
    threshold, concluding it is compute-bound.
  napkin_math: A100 Peak Compute = 312 TFLOPS. A100 Peak Bandwidth = 2.0 TB/s. Ridge Point = 312e12 /
    2.0e12 = 156 FLOPs/byte. Layer OI = 100 FLOPs/byte. Since 100 < 156, the layer is strictly memory-bound.
