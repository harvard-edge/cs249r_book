id: global-0224
title: Little's Law for GPU Inference Server Sizing
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: Your service receives 500 requests/s. Average request latency is 200 ms. Each GPU can handle
  8 concurrent requests. How many GPUs do you need to serve this traffic without queuing?
details:
  realistic_solution: 'By Little''s Law: L = λ × W = 500 req/s × 0.2 s = 100 concurrent requests. GPUs
    needed = ceil(100 / 8) = 13 GPUs. Add 20% headroom for traffic spikes: 16 GPUs. This assumes uniform
    request distribution. In practice, with Poisson arrivals, you need more headroom — at 80% utilization
    target: 100 / 0.8 / 8 = 16 GPUs, matching our headroom estimate. Below 60% utilization, queuing delay
    is negligible; above 80%, tail latency explodes.'
  common_mistake: 'Dividing requests/s by a single-request throughput. Little''s Law properly accounts
    for concurrency: L = λW (queue length = arrival rate × wait time).'
  napkin_math: 'L = λW = 500 × 0.2 = 100 concurrent requests. GPUs = ceil(100/8) = 13. With 20% headroom:
    16 GPUs.'
