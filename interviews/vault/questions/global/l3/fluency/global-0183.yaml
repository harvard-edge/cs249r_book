id: global-0183
title: The Electricity Arbitrage
topic: power-budgeting
status: published
provenance: imported
scenario: 'Your 1,000-GPU H100 cluster (700W each, PUE 1.25) runs batch training jobs that can tolerate
  6-hour scheduling delays. Electricity prices in your region fluctuate: $0.03/kWh at night (11pm-7am)
  and $0.12/kWh during peak (11am-5pm). Calculate the annual savings of scheduling all batch jobs during
  off-peak hours.'
details:
  realistic_solution: 'Cluster power with PUE: 1,000 × 700W × 1.25 = 875 kW. If batch jobs fill 8 hours/day
    of off-peak: Energy per day = 875 kW × 8h = 7,000 kWh. Off-peak cost: 7,000 × $0.03 = $210/day. Peak
    cost (same work): 7,000 × $0.12 = $840/day. Daily savings: $840 - $210 = $630. Annual savings: $630
    × 365 = $229,950. This is ~$230K/year saved purely by time-shifting deferrable workloads — no hardware
    changes needed.'
  common_mistake: Calculating savings only on GPU power and forgetting PUE. Also assuming 24/7 utilization
    when the question specifies batch jobs that can be shifted to 8 off-peak hours.
  napkin_math: 'Power: 1,000 × 0.7 kW × 1.25 PUE = 875 kW. Daily energy (8h): 875 × 8 = 7,000 kWh. Peak
    price: 7,000 × $0.12 = $840. Off-peak price: 7,000 × $0.03 = $210. Savings: $630/day × 365 = $229,950/year.
    As % of annual electricity: savings / peak cost = $230K / $307K = 75% reduction for time-shifted workloads.'
