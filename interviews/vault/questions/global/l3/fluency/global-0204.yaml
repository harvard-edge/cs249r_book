schema_version: 1
id: global-0204
title: Ring AllReduce Communication Time
topic: collective-communication
status: published
provenance: imported
scenario: You are training with data parallelism across 8 A100 GPUs connected via NVLink at 600 GB/s bidirectional.
  The gradient buffer is 2 GB (1B-parameter model in FP16). Estimate the ring AllReduce communication
  time.
details:
  realistic_solution: 'Ring AllReduce transfers 2 × (N-1)/N × data_size across the ring. With N=8: 2 ×
    7/8 × 2 GB = 3.5 GB total data moved. Each GPU sends/receives on one link at a time. Effective bandwidth
    per direction ≈ 300 GB/s (half of bidirectional 600 GB/s). Time = 3.5 GB / 300 GB/s ≈ 11.7 ms. In
    practice, overhead from chunking and synchronization adds ~20%, so expect ~14 ms.'
  common_mistake: Using total bandwidth instead of per-link bandwidth, or forgetting the 2×(N-1)/N factor
    in ring AllReduce.
  napkin_math: 'Data moved = 2 × (7/8) × 2 GB = 3.5 GB. NVLink per-direction: 300 GB/s. Time = 3.5/300
    ≈ 12 ms.'
