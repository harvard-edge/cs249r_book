schema_version: 1
id: global-0200
title: Matrix Multiply Arithmetic Intensity on A100
topic: roofline-analysis
status: published
provenance: imported
scenario: You are computing a square matrix multiply C = A × B where A and B are 4096×4096 FP16 matrices
  on an A100. Estimate the arithmetic intensity and determine whether this operation is compute-bound
  or memory-bound.
details:
  realistic_solution: FLOPs = 2 × 4096³ ≈ 137.4 GFLOP. Memory traffic = read A + read B + write C = 3
    × 4096² × 2 bytes = 100.7 MB. Arithmetic intensity = 137.4 GFLOP / 0.1007 GB ≈ 1364 FLOP/byte. A100
    ridge point = 312 TFLOPS / 2.0 TB/s = 156 FLOP/byte. Since 1364 >> 156, this is solidly compute-bound.
    Large matmuls are the bread and butter of GPU utilization — this is why Transformers map so well to
    GPUs.
  common_mistake: Forgetting to count both read and write traffic, or using element count instead of byte
    count for the memory term.
  napkin_math: FLOPs = 2 × 4096³ ≈ 137 GFLOP. Bytes = 3 × 4096² × 2 ≈ 100 MB. AI = 137G / 0.1G ≈ 1370
    FLOP/byte. Ridge = 312T / 2T = 156. 1370 >> 156 → compute-bound.
