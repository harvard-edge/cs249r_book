scenario: You want to maximize the context window of an 8B model (16GB FP16) on a single V100 (32GB).
  The model has 32 layers and a hidden size of 4096. Assuming standard FP16 KV caching, calculate the
  absolute maximum number of tokens that can fit.
details:
  realistic_solution: 'First, calculate the memory left over after loading the model weights: 32GB VRAM
    - 16GB model = 16 GiB available. Next, compute the exact memory required for a single token''s KV
    cache by accounting for the number of layers (32), hidden size (4096), precision (FP16 = 2 bytes),
    and both Key and Value tensors: 2 × 32 × 4096 × 2 = 524,288 bytes per token. Finally, divide available
    memory by per-token cache: 16 × 1024³ / 524,288 = 32,768 tokens maximum context.'
  common_mistake: Forgetting that the KV cache stores BOTH keys and values, omitting the factor of 2 and
    artificially doubling the calculated token capacity.
  napkin_math: Free VRAM = 32GB - 16GB = 16 GiB. Cache per token = 2 (K,V) × 32 (layers) × 4096 (hidden)
    × 2 bytes (FP16) = 524,288 bytes (0.5 MiB). Max tokens = 16 GiB / 524,288 bytes = 16 × 1024^3 / 524,288
    = 32,768 tokens.
