schema_version: 1
id: global-0188
title: The Follow-the-Sun Savings
topic: power-budgeting
status: published
provenance: imported
scenario: 'You have GPU clusters in 3 regions. Region A (solar-heavy grid): 100 gCO2/kWh during day, 500
  gCO2/kWh at night. Region B (wind-heavy): 200 gCO2/kWh always. Region C (coal baseline): 600 gCO2/kWh
  always. A 48-hour training job requires 500 kW continuously. Calculate CO2 for: (a) running entirely
  in Region C, and (b) a ''follow-the-renewables'' schedule that uses Region A during daytime (12h) and
  Region B at night (12h).'
details:
  realistic_solution: '(a) Region C only: 500 kW × 48h × 600 gCO2/kWh = 14,400,000 g = 14.4 metric tons
    CO2. (b) Follow-the-renewables: Day in Region A (24h total across 2 days): 500 kW × 24h × 100 gCO2/kWh
    = 1,200,000 g. Night in Region B (24h total): 500 kW × 24h × 200 gCO2/kWh = 2,400,000 g. Total: 3,600,000
    g = 3.6 metric tons CO2. Reduction: 14.4 - 3.6 = 10.8 tons saved = 75% reduction. The cost: cross-region
    migration overhead (checkpoint, transfer, restart) adds ~30 minutes per migration = 2 hours overhead
    for 4 migrations, a 4.2% time penalty.'
  common_mistake: Assuming carbon-aware scheduling always uses the single greenest region. The greenest
    region changes throughout the day as renewable generation fluctuates. Static assignment to one 'green'
    region misses the dynamic optimization opportunity.
  napkin_math: '(a) Static (Region C): 500 × 48 × 600 = 14,400,000 g = 14.4t. (b) Dynamic: Day@A: 500
    × 24 × 100 = 1,200,000g. Night@B: 500 × 24 × 200 = 2,400,000g. Total = 3,600,000g = 3.6t. Savings:
    (14.4 - 3.6) / 14.4 = 75%. Migration cost: 4 migrations × 30min = 2h overhead on 48h job = 4.2% time
    penalty for 75% carbon reduction.'
