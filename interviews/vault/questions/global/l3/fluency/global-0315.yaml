title: Global New 0016
topic: pruning-sparsity
status: published
provenance: imported
scenario: A 4B parameter model (8GB FP16) is hosted on a T4 GPU (16GB, 320GB/s). Each user request statically
  consumes 0.5GB of KV cache. Determine the maximum batch size, and calculate the memory-bound token generation
  time for that full batch.
details:
  realistic_solution: Find the available memory for KV cache by subtracting weight memory from total VRAM.
    Divide by the per-request KV cache footprint to find max batch size. Because generation is memory-bound
    by weight reading, the time to generate 1 token (for the whole batch) is weights / memory bandwidth.
  common_mistake: Adding the KV cache size to the weights before dividing by bandwidth; for standard generation,
    weights are the primary memory bottleneck, not KV reads.
  napkin_math: Free VRAM = 16GB - 8GB = 8GB. Max Batch Size = 8GB / 0.5GB = 16. Time per generation step
    = Weight Size / Bandwidth = 8GB / 320GB/s = 0.025 seconds (25 ms).
