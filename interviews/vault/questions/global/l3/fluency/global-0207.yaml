schema_version: 1
id: global-0207
title: Self-Attention Arithmetic Intensity During Decode
topic: roofline-analysis
status: published
provenance: imported
scenario: During autoregressive decode of a single token, the attention query is 1×128 and the KV cache
  is 2048×128, both FP16. Estimate the arithmetic intensity of this single-token attention and classify
  it on the A100 roofline.
details:
  realistic_solution: 'FLOPs: Q×K^T = 2 × 1 × 2048 × 128 = 524K FLOP. Then softmax×V = 2 × 1 × 128 × 2048
    = 524K FLOP. Total ≈ 1M FLOP. Memory: read K (2048×128×2B = 512KB) + read V (512KB) + read Q (256B)
    + write output (256B) ≈ 1 MB. AI = 1M FLOP / 1 MB = 1 FLOP/byte. A100 ridge = 156. Since 1 << 156,
    decode attention is extremely memory-bound. This is the fundamental reason decode is slow and why
    FlashDecoding and speculative decoding exist.'
  common_mistake: Treating decode attention like training attention. During decode, you compute Q×K^T
    for a single query against the entire KV cache, which has very low reuse.
  napkin_math: 'FLOPs ≈ 2 × 2 × 2048 × 128 = 1M. Bytes: read K+V = 2 × 2048 × 128 × 2 = 1 MB. AI = 1 FLOP/byte.
    Ridge = 156. Massively memory-bound.'
