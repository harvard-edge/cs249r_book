schema_version: 1
id: global-0218
title: Cross-Rack AllReduce Latency Impact
topic: network-bandwidth-bottlenecks
status: published
provenance: imported
scenario: Intra-rack NVSwitch provides 900 GB/s between GPUs. Cross-rack InfiniBand NDR provides 50 GB/s
  per link. For a 4 GB gradient AllReduce across 2 racks (8 GPUs each), estimate the time difference vs.
  a single-rack AllReduce.
details:
  realistic_solution: 'Single-rack (8 GPUs, NVSwitch): AllReduce time ≈ 2 × (7/8) × 4 GB / 900 GB/s =
    7.8 ms. Two-rack hierarchical: Step 1: intra-rack ReduceScatter (each GPU ends up with a 0.5 GB chunk):
    (7/8) × 4 GB / 900 GB/s = 3.9 ms. Step 2: cross-rack AllReduce of the 0.5 GB chunks over IB: 2 × (1/2)
    × 0.5 GB / 50 GB/s = 10 ms. Step 3: intra-rack AllGather: (7/8) × 4 GB / 900 GB/s = 3.9 ms. Total
    ≈ 3.9 + 10 + 3.9 = 17.8 ms. This 2.2× slowdown is why topology-aware placement puts tightly-coupled
    GPU groups within the same rack.'
  common_mistake: Assuming hierarchical AllReduce is as fast as flat AllReduce. The cross-rack link becomes
    the bottleneck in a two-level reduction.
  napkin_math: 'Single-rack: 4 GB / 900 GB/s ≈ 4.4 ms for the bottleneck step, total ~8.8 ms. Two-rack
    hierarchical: Intra-rack ReduceScatter (3.9 ms) + Cross-rack AllReduce of 0.5 GB chunks (10 ms) +
    Intra-rack AllGather (3.9 ms) ≈ 17.8 ms. ~2× slower than single-rack.'
