id: global-0214
title: Cost Per 1M Tokens Served
topic: tco-cost-modeling
status: published
provenance: imported
scenario: Your H100 instance costs $3.50/hour and serves a 70B model at 2000 output tokens/s aggregate
  throughput. Estimate the cost per 1M output tokens.
details:
  realistic_solution: Tokens per hour = 2000 tok/s × 3600 s = 7.2M tokens. Cost per 1M tokens = $3.50
    / 7.2 = $0.49/1M tokens. For context, this is the marginal compute cost only — you also need input
    processing (cheaper, higher throughput), redundancy (typically 2× for availability), load balancing,
    and engineering overhead. Real-world pricing is typically 3-5× marginal cost. This is why OpenAI charges
    ~$2-15/1M output tokens depending on model size.
  common_mistake: Forgetting to account for both input and output tokens separately, or confusing per-request
    throughput with aggregate throughput.
  napkin_math: 'Tokens/hr = 2000 × 3600 = 7.2M. Cost/1M = $3.50 / 7.2 = $0.49. With 2× redundancy and
    overhead: ~$1.50-2.50/1M tokens in production.'
