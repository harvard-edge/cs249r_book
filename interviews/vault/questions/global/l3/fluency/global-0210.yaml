schema_version: 1
id: global-0210
title: Kernel Fusion Memory Bandwidth Savings
topic: kernel-fusion
status: published
provenance: imported
scenario: A sequence of LayerNorm → GELU → Dropout on a tensor of shape (32, 2048, 4096) in FP16 launches
  3 separate CUDA kernels. Each kernel reads from and writes to HBM. Estimate the memory traffic saved
  by fusing these into one kernel.
details:
  realistic_solution: 'Tensor size = 32 × 2048 × 4096 × 2 bytes = 512 MB. Unfused: 3 reads + 3 writes
    = 6 × 512 MB = 3072 MB total HBM traffic. Fused: 1 read + 1 write = 2 × 512 MB = 1024 MB. Savings
    = 2048 MB, a 3× reduction in memory traffic. On A100 at 2 TB/s, this saves 2048 MB / 2000 GB/s ≈ 1
    ms per invocation. Over thousands of iterations, this compounds to minutes of training time saved.'
  common_mistake: Only counting the reads. Each unfused kernel writes its output to HBM AND the next kernel
    reads it back — so each intermediate result incurs a write + read round trip.
  napkin_math: 'Tensor = 32 × 2048 × 4096 × 2B = 512 MB. Unfused: 6 × 512 = 3072 MB. Fused: 2 × 512 =
    1024 MB. Saves 2048 MB → 3× less traffic. Time saved per call: 2 GB / 2 TB/s = 1 ms.'
