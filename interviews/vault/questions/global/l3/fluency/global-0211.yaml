id: global-0211
title: GPU Rack Power Density Limit
topic: power-budgeting
status: published
provenance: imported
scenario: A standard data center rack supports 20 kW. Each H100 SXM server (8 GPUs) draws 10.2 kW total.
  How many H100 servers fit in one rack, and what is the GPU density per rack?
details:
  realistic_solution: 'Servers per rack = floor(20 kW / 10.2 kW) = 1 server with room to spare (10.2 kW
    used, 9.8 kW spare), but practically only 1 DGX-style server fits due to power constraints. That''s
    8 GPUs per rack. Modern AI racks are moving to 40-100 kW to fit 2-4 servers (16-32 GPUs). This is
    why power density is a first-class constraint: you can afford the GPUs but can''t cool them in a standard
    facility.'
  common_mistake: Ignoring that the 10.2 kW is the server total (CPU + GPU + fans + networking), not just
    the GPUs. Also forgetting that you often can't fill a rack to 100% of power capacity.
  napkin_math: 20 kW / 10.2 kW = 1.96 → fits 1 server = 8 H100 GPUs per standard rack. Need 40+ kW racks
    for 16+ GPUs.
