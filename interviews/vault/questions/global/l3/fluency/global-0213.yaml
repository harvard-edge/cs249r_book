id: global-0213
title: 4-Bit Quantization for Consumer GPU Deployment
topic: extreme-quantization
status: published
provenance: imported
scenario: A 70B-parameter model needs to run on a consumer GPU with 24 GB VRAM. Estimate the memory footprint
  at FP16, INT8, and INT4 (with group quantization overhead of ~0.5 bits/param). Can it fit at INT4?
details:
  realistic_solution: 'FP16: 70B × 2 bytes = 140 GB — needs 2× H100s. INT8: 70B × 1 byte = 70 GB — still
    too large. INT4 with overhead: 70B × (4 + 0.5) bits / 8 = 70B × 0.5625 bytes = 39.4 GB — still too
    large for 24 GB. With 3-bit GPTQ or aggressive compression: 70B × 0.4375 = 30.6 GB — still tight.
    Realistically, 70B models need ~35-40 GB at INT4, so you need at least 2× 24GB GPUs. A 34B model at
    INT4 ≈ 19 GB, which fits with room for KV cache.'
  common_mistake: Forgetting the quantization metadata overhead (scales and zero-points per group) which
    adds ~0.5 bits/param for typical group sizes of 128.
  napkin_math: 'FP16: 70B × 2 = 140 GB. INT8: 70B × 1 = 70 GB. INT4+overhead: 70B × 0.5625 = 39.4 GB.
    None fit in 24 GB. Need ≤~40B params for single 24GB GPU at INT4.'
