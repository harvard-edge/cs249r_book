title: Global New 0009
topic: profiling-bottleneck-analysis
status: published
provenance: imported
scenario: A convolution layer requires 2GB of weights and 20 GFLOPs of compute. Weights are offloaded
  to CPU memory and must be streamed over PCIe Gen4 to a V100 GPU for execution. Calculate the total time
  and identify the primary bottleneck.
details:
  realistic_solution: When weights are not resident on the GPU, interconnect bandwidth dominates latency.
    Calculate the compute time based on V100 peak TFLOPS and compare it to the data transfer time over
    PCIe Gen4. The slower of the two represents the primary bottleneck dictated by the roofline model.
  common_mistake: Using the V100's HBM2 bandwidth (900GB/s) instead of the PCIe Gen4 bandwidth (32GB/s)
    to calculate data transfer latency.
  napkin_math: Compute time = 20e9 FLOPs / 125e12 FLOPS = 0.00016s (0.16 ms). Transfer time = 2GB / 32GB/s
    = 0.0625s (62.5 ms). 62.5 ms >> 0.16 ms, making this heavily I/O bound over PCIe.
