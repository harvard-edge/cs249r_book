schema_version: 1
id: global-0180
title: The Gradient Sync Penalty
topic: latency-decomposition
status: published
provenance: imported
scenario: 'You are training a 10B parameter model with data parallelism across 2 datacenters: 64 GPUs
  in US-East and 64 GPUs in EU-West, connected by a 100 Gbps link with 60ms RTT. Each gradient is FP32
  (4 bytes per parameter). Calculate the time for a single cross-datacenter AllReduce of the full gradient
  tensor.'
details:
  realistic_solution: 'Gradient size: 10B × 4 bytes = 40 GB. For a 2-node (2-DC) AllReduce, the data transferred
    across the link is 2 × (n-1)/n × 40 GB = 2 × 1/2 × 40 GB = 40 GB (reduce-scatter + all-gather, each
    sending half). Bandwidth time: 40 GB / (100 Gbps / 8) = 40 GB / 12.5 GB/s = 3.2 seconds. Latency overhead:
    ring AllReduce with 2 nodes needs 2 phases × 60ms = 120ms (negligible vs bandwidth). Total: ~3.2 seconds
    per AllReduce. If the compute per step is 2 seconds, the communication overhead is 62% — making cross-DC
    synchronous training severely inefficient.'
  common_mistake: Only calculating bandwidth time and ignoring latency. At 60ms RTT, the latency component
    alone exceeds many intra-datacenter AllReduce operations. Also forgetting that ring AllReduce requires
    2(n-1)/n passes of the data.
  napkin_math: 'Gradient: 10B params × 4 B = 40 GB. Cross-DC bandwidth: 100 Gbps = 12.5 GB/s. Transfer
    for 2-node AllReduce: 40 GB (reduce-scatter 20 GB + all-gather 20 GB). Time = 40 GB / 12.5 GB/s =
    3.2s. Latency overhead: 2 × 60ms = 0.12s. Total: ~3.3s. Compute per step: ~2s. Communication-to-compute
    ratio: 3.3/2 = 1.65. Efficiency: 2/(2+3.3) = 37.7%.'
