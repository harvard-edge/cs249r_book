scenario: A datacenter rack is populated with an 8x A100 GPU server. Each A100 consumes 400W at peak,
  and the host system (CPU/RAM/fans) consumes an additional 1000W. If the datacenter PUE is 1.25, calculate
  the total facility power drawn by this single rack.
details:
  realistic_solution: Total IT load is the sum of the power consumed by all GPUs and the host system.
    The Power Usage Effectiveness (PUE) accounts for overhead like cooling and power delivery. Multiply
    the total IT load by the PUE to get the total facility power draw for the rack.
  common_mistake: Forgetting to multiply by the PUE or forgetting to include the host system overhead,
    leading to a serious underestimation of datacenter power.
  napkin_math: GPU Power = 8 * 400W = 3200W. IT Load = 3200W + 1000W = 4200W (4.2kW). Total Facility Power
    = IT Load * PUE = 4200W * 1.25 = 5250W (5.25kW).
