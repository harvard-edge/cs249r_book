id: global-0209
title: Continuous Batching Throughput vs Latency
topic: batching-strategies
status: published
provenance: imported
scenario: An inference server processes requests at 50 tokens/s per request with batch size 1. With continuous
  batching, batch size grows to 32 and per-request throughput increases to 60 tokens/s. Estimate the throughput
  gain and per-request latency impact.
details:
  realistic_solution: 'Batch=1: 50 tok/s system throughput, 50 tok/s per-request (20ms/token). Batch=32:
    total system throughput = 32 × 60 = 1920 tok/s (since decode is memory-bound, batching amortizes weight
    loading). Per-request: each request gets 60 tok/s, lowering token generation latency to 16.6ms. System
    throughput gain: 1920/50 = 38.4×. Time-to-first-token may increase due to queuing, but per-token latency
    improves. At batch=32, each decode step loads weights once but computes 32 outputs, achieving near-linear
    throughput scaling in the memory-bound regime.'
  common_mistake: Confusing per-request throughput with system throughput. Batching dramatically increases
    system throughput and, in memory-bound decode phases, can even improve per-request latency slightly
    by fully utilizing memory bandwidth.
  napkin_math: 'B=1: 50 tok/s total. B=32: 32 × 60 = 1920 tok/s total. Throughput gain = 38.4×. Per-request
    latency: 1/50 sec (20ms) vs 1/60 sec (16.6ms) → slight latency improvement per token, though queuing
    delay might be added before generation.'
