id: global-0220
title: Voltage Scaling and Dynamic Power
topic: power-budgeting
status: published
provenance: imported
scenario: An accelerator runs at 1.0V and 1.5 GHz, consuming 250W dynamic power. If you reduce voltage
  by 15% to 0.85V (and frequency drops proportionally to 1.275 GHz), estimate the new dynamic power.
details:
  realistic_solution: 'P_dyn = C × V² × f. With V'' = 0.85V and f'' = 0.85f (frequency proportional to
    voltage): P'' = C × (0.85V)² × (0.85f) = C × V² × f × 0.85³ = 250 × 0.6141 = 153.5W. Power drops by
    38.6% while performance drops by only 15%. This cubic relationship is why DVFS (dynamic voltage-frequency
    scaling) is so effective. Performance per watt actually improves: 85% performance at 61.4% power =
    1.38× better perf/W.'
  common_mistake: Applying voltage reduction linearly. Dynamic power scales with V² × f, so reducing voltage
    has a cubic effect on power (V² × V-proportional-frequency = V³).
  napkin_math: P ∝ V²f ∝ V³ (since f ∝ V). P' = 250 × 0.85³ = 250 × 0.614 = 153.5W. 39% power savings
    for 15% perf loss. Perf/watt improves 1.38×.
