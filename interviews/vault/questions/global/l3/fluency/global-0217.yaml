id: global-0217
title: Mixed-Precision Training Memory Budget
topic: memory-hierarchy-design
status: published
provenance: imported
scenario: You want to train a 3B-parameter model with Adam optimizer in mixed precision (FP16 weights
  + FP32 optimizer states). Estimate the minimum GPU memory needed just for model state (no activations),
  and determine if it fits on a single A100-80GB.
details:
  realistic_solution: 'FP16 weights: 3B × 2 = 6 GB. FP16 gradients: 3B × 2 = 6 GB. FP32 master weights:
    3B × 4 = 12 GB. FP32 momentum (Adam): 3B × 4 = 12 GB. FP32 variance (Adam): 3B × 4 = 12 GB. Total
    model state = 48 GB. This leaves 80 - 48 = 32 GB for activations, KV cache, and framework overhead.
    With batch size 8, seq_len 2048, activation checkpointing is likely needed. Per-parameter cost: 48
    GB / 3B = 16 bytes/param — the well-known Adam mixed-precision constant.'
  common_mistake: Only counting the FP16 weights (6 GB) and thinking it fits easily. Adam mixed-precision
    needs FP32 master weights, momentum, and variance on top of FP16 working copies.
  napkin_math: 16 bytes/param for Adam mixed-precision. 3B × 16 = 48 GB. A100-80GB has 32 GB left for
    activations. Tight but fits for moderate batch sizes with checkpointing.
