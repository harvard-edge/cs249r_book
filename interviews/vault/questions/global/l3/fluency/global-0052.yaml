schema_version: 1
id: global-0052
title: The Disaggregated Evaluation Pipeline
topic: fairness-evaluation
status: published
provenance: imported
scenario: Your image classification model achieves 94% accuracy on the test set. Management is satisfied
  and wants to ship. You propose running disaggregated evaluation first. The test set has 10 demographic
  subgroups and 50 intersectional subgroups (age × gender × skin tone). Calculate the minimum sample size
  per subgroup needed to detect a 5-percentage-point accuracy gap with 80% power, and estimate the total
  evaluation dataset size required.
details:
  realistic_solution: 'Using a two-proportion z-test, detecting a 5pp difference (94% vs 89%) with 80%
    power and α=0.05 requires approximately 484 samples per subgroup. For 50 intersectional subgroups:
    50 × 484 = 24,200 minimum test samples, assuming perfect balance. Real-world subgroup distributions
    are highly skewed (intersectional minorities may be <1% of data), so you need to oversample rare subgroups.
    Practical minimum: ~60K–100K labeled evaluation images with stratified sampling. The systems implication:
    disaggregated evaluation is a data engineering problem. You need a metadata-rich evaluation dataset
    with demographic annotations, a stratified sampling pipeline, and statistical testing infrastructure
    that reports per-subgroup confidence intervals, not just point estimates.'
  common_mistake: Assuming the existing test set is large enough. With 10K test images and 50 intersectional
    subgroups, some subgroups may have fewer than 50 samples — far too few for statistical significance.
  napkin_math: 'Sample size for two-proportion test: $n \approx \frac{(z_{\alpha/2} + z_{\beta})^2 \times
    (p_1(1-p_1) + p_2(1-p_2))}{(p_1 - p_2)^2}$. With $p_1=0.94$, $p_2=0.89$, $z_{0.025}=1.96$, $z_{0.2}=0.84$:
    $n \approx \frac{(1.96+0.84)^2 \times (0.0564 + 0.0979)}{0.0025} = \frac{7.84 \times 0.1543}{0.0025}
    \approx 484$ per group. 50 subgroups × 484 = 24,200 samples minimum.'
