id: global-0206
title: Buy vs Rent GPU Break-Even
topic: tco-cost-modeling
status: published
provenance: imported
scenario: An A100-80GB costs $15,000 and has a 3-year useful life. Cloud A100 instances cost $2.50/GPU-hour.
  Assuming 80% average utilization on-prem, estimate the break-even point in months.
details:
  realistic_solution: 'On-prem monthly cost: $15,000 / 36 months = $417/mo depreciation. Add ~50% overhead
    (power, cooling, staff) = $625/mo total. Cloud monthly cost at 80% util: 0.80 × 24h × 30d × $2.50
    = $1,440/mo. Break-even: $15,000 / ($1,440 - $625) ≈ 18.4 months. After ~18 months, owning is cheaper
    IF you maintain 80% utilization. Below ~45% utilization, cloud is always cheaper over 3 years.'
  common_mistake: 'Forgetting that on-prem costs include power, cooling, and networking — typically 1.5-2×
    the raw GPU cost over its lifetime. Also forgetting utilization: idle GPUs still cost money.'
  napkin_math: 'On-prem: $15K/36mo + 50% overhead = $625/mo. Cloud: 0.8 × 720h × $2.50 = $1,440/mo. Savings
    = $815/mo. Break-even = $15K / $815 ≈ 18 months.'
