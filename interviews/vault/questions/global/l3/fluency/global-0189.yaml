schema_version: 1
id: global-0189
title: The Time-to-First-Token Across Oceans
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: An LLM inference service in US-East has a prefill time of 120ms for a 500-token prompt. A user
  in London (RTT = 75ms) and a user in Tokyo (RTT = 160ms) each send the same prompt. Assuming persistent
  connections (no TLS overhead), calculate the time-to-first-token (TTFT) experienced by each user. The
  service also has a 200ms TTFT SLA.
details:
  realistic_solution: 'User-perceived TTFT = request one-way latency + prefill + response one-way latency
    = RTT + prefill (since one-way ≈ RTT/2 each way). London: 75ms + 120ms = 195ms. Meets 200ms SLA (barely,
    5ms margin). Tokyo: 160ms + 120ms = 280ms. Violates 200ms SLA by 80ms. To fix Tokyo, options: (1)
    Deploy model replica in Asia-Pacific (TTFT = ~10ms + 120ms = 130ms). (2) Use speculative decoding
    to reduce prefill to 60ms (TTFT = 160 + 60 = 220ms — still over). (3) Cache common prompt prefixes
    at edge (if applicable). The physics-based analysis makes it clear: only deploying a regional replica
    solves the Tokyo SLA.'
  common_mistake: 'Thinking TTFT = prefill time. TTFT as experienced by the user includes the network
    round trip: request travel time + prefill + first token travel time = 1 RTT + prefill.'
  napkin_math: 'London TTFT: 75ms RTT + 120ms prefill = 195ms ≤ 200ms SLA. PASS. Tokyo TTFT: 160ms RTT
    + 120ms prefill = 280ms > 200ms SLA. FAIL by 80ms. Required prefill for Tokyo to meet SLA: 200 - 160
    = 40ms (3× faster than current — unlikely without model change). Regional replica in Tokyo: 10ms RTT
    + 120ms = 130ms. Cost: ~$50K/month for H100 inference cluster.'
