schema_version: 1
id: global-0205
title: PCIe vs NVLink Model Shard Transfer
topic: collective-communication
status: published
provenance: imported
scenario: You need to transfer a 10 GB tensor shard between two GPUs. Compare the transfer time using
  PCIe Gen5 x16 (64 GB/s bidirectional, 32 GB/s per direction) versus NVLink 4.0 (900 GB/s bidirectional,
  450 GB/s per direction).
details:
  realistic_solution: 'PCIe Gen5: 10 GB / 32 GB/s = 312 ms. NVLink 4.0: 10 GB / 450 GB/s = 22 ms. NVLink
    is ~14× faster for this transfer. This is why intra-node tensor parallelism requires NVLink — splitting
    a single matrix multiply across GPUs connected only by PCIe would make the communication overhead
    dominate. The rule of thumb: use NVLink for tight coupling (tensor parallelism), PCIe for loose coupling
    (data parallelism across nodes).'
  common_mistake: Using bidirectional bandwidth as if it were available in one direction. PCIe Gen5 x16
    is 64 GB/s bidirectional but only 32 GB/s in each direction.
  napkin_math: 'PCIe: 10 GB / 32 GB/s = 312 ms. NVLink: 10 GB / 450 GB/s = 22 ms. Ratio: 14× faster on
    NVLink.'
