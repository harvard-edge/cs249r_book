schema_version: 1
id: global-0187
title: The Right-to-Be-Forgotten Cost
topic: federated-learning
status: published
provenance: imported
scenario: Under GDPR, a user requests deletion of their data. Your model was trained on a dataset including
  10M users' data over 2,048 A100 GPU-hours. If you must retrain from scratch (excluding the user's data),
  what is the compute cost? If retraining costs $2/GPU-hour, what does each deletion request cost?
details:
  realistic_solution: 'Full retrain cost: 2,048 GPU-hours × $2/GPU-hour = $4,096 per deletion request.
    At 100 deletion requests/year, that is $409,600/year in retraining costs. This is why organizations
    invest in: (1) Machine unlearning: approximate methods that update model weights to ''forget'' specific
    training examples without full retraining (cost: ~1-5% of retraining). (2) Training data isolation:
    shard training data by user cohort so retraining only requires processing the affected shard. (3)
    Differential privacy: train with DP guarantees so no individual''s data is memorized — making deletion
    requests moot for the model.'
  common_mistake: Assuming you can simply delete the user's data from the database and call it done. If
    the model has memorized patterns from that user's data, the model weights themselves may encode personal
    information. Full compliance may require retraining or machine unlearning techniques.
  napkin_math: 'Full retrain: 2,048 GPU-h × $2 = $4,096/request. 100 requests/year: $409,600. Machine
    unlearning (1% of retrain cost): $40.96/request → $4,096/year. Savings: $405,504/year. Break-even:
    unlearning R&D costs ~$200K → pays for itself in 6 months at 100 deletions/year. DP training overhead:
    ~10-30% more training time upfront but $0/deletion thereafter.'
