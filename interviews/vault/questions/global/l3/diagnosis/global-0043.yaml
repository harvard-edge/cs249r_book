schema_version: 1
id: global-0043
title: The Experiment Reproducibility Crisis
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: A teammate trained a model 3 months ago that achieved 94% accuracy. You need to reproduce this
  result for a production deployment. You have the code commit hash, but when you retrain, you only get
  91%. The code is identical. Walk through the systematic debugging process to identify why the results
  differ.
details:
  realistic_solution: 'Systematically check the 5 axes of reproducibility: (1) Data: Has the training
    dataset changed? Was it versioned, or was it a live query that returns different rows today? (2) Random
    seeds: Were seeds set for all sources of randomness (Python, NumPy, PyTorch, CUDA)? CUDA convolution
    algorithms are non-deterministic by default. (3) Library versions: Did PyTorch, CUDA, or cuDNN get
    updated? Different cuDNN auto-tuning can change numerical results. (4) Hardware: Was the original
    run on A100 and the new one on H100? Different Tensor Core implementations produce different rounding.
    (5) Hyperparameters: Were all hyperparameters logged, including implicit ones like dataloader num_workers
    (which affects batch ordering)?'
  common_mistake: Assuming that identical code guarantees identical results. In ML, the 'program' includes
    data, random seeds, library versions, and hardware — all of which can silently change.
  napkin_math: 5 reproducibility axes × ~5 variables each = ~25 potential sources of divergence. Without
    systematic experiment tracking (data version, environment snapshot, seed log), debugging this is O(25)
    bisection experiments at 48h each = 1,200 hours of compute in the worst case.
