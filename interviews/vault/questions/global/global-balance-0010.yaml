title: Memory Pressure Optimization
scenario: A serving process uses 68 GB of an 80 GB GPU. A new feature adds a 20 GB KV cache at peak. Propose an optimization plan that avoids OOM while preserving most throughput.
question: How would you avoid OOM when a 68 GB serving process adds a 20 GB peak KV cache on an 80 GB GPU?
details:
  realistic_solution: Total peak would be 88 GB, exceeding capacity by 8 GB. Options include limiting context/batch, paged KV with eviction, quantizing KV, offloading cold KV, or moving to a larger/more sharded deployment. The first fix should target the dynamic KV cache because the static process already consumes most memory.
  common_mistake: Trying to shave small code overheads while ignoring the 20 GB dynamic KV cache.
  napkin_math: Peak = 68 + 20 = 88 GB. Over capacity by 8 GB.
