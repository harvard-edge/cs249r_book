title: Kernel Fusion Memory Bandwidth Savings
scenario: A sequence of LayerNorm -> GELU -> Dropout on a tensor of shape (32, 2048, 4096) in FP16 launches 3 separate CUDA kernels. Each kernel reads from and writes to HBM.
question: How much HBM traffic is saved by fusing the LayerNorm, GELU, and Dropout kernels for the (32, 2048, 4096) FP16 tensor?
details:
  realistic_solution: 'Tensor size = 32 × 2048 × 4096 × 2 bytes = 512 MB. Unfused: 3 reads + 3 writes = 6 × 512 MB = 3072 MB total HBM traffic. Fused: 1 read + 1 write = 2 × 512 MB = 1024 MB. Savings = 2048 MB, a 3× reduction in memory traffic. On A100 at 2 TB/s, this saves 2048 MB / 2000 GB/s ≈ 1 ms per invocation. Over thousands of iterations, this compounds to minutes of training time saved.'
  common_mistake: |
    **The Pitfall:** Only counting the reads when calculating memory traffic for element-wise operations.
    **The Rationale:** It's easy to forget that an unfused kernel must write its output to HBM, and the next kernel must read it right back.
    **The Consequence:** Underestimating the profound impact of kernel fusion on memory-bound workloads, leading to poor latency optimization.
  napkin_math: |
    - Tensor size = 32 * 2048 * 4096 * 2 bytes = 536,870,912 bytes = 512 MB.
    - Unfused: 3 kernels * (1 read + 1 write) = 6 memory operations. 6 * 512 MB = 3072 MB traffic.
    - Fused: 1 kernel * (1 read + 1 write) = 2 memory operations. 2 * 512 MB = 1024 MB traffic.
    - Traffic saved = 3072 MB - 1024 MB = 2048 MB.
    - **Fusing saves 2048 MB per invocation (a 3x reduction), taking ~1 ms less time at 2 TB/s.**
