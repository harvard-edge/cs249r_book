title: Kernel Fusion Memory Bandwidth Savings
scenario: A sequence of LayerNorm -> GELU -> Dropout on a tensor of shape (32, 2048, 4096) in FP16 launches 3 separate CUDA kernels. Each kernel reads from and writes to HBM.
question: How much HBM traffic is saved by fusing the LayerNorm, GELU, and Dropout kernels for the (32, 2048, 4096) FP16 tensor?
details:
  realistic_solution: 'Tensor size = 32 \times 2048 \times 4096 \times 2 bytes = 512 MiB. Unfused: 3 reads + 3 writes = 6 \times 512 MiB = 3072 MiB total HBM traffic. Fused: 1 read + 1 write = 2 \times 512 MiB = 1024 MiB. Savings = 2048 MiB, a 3\times reduction in memory traffic. On A100 at 2 TB/s, this saves 2048 MiB / 2000 GB/s \approx 1 ms per invocation. Over thousands of iterations, this compounds to minutes of training time saved.'
  common_mistake: |
    **The Pitfall:** Only counting the reads when calculating memory traffic for element-wise operations.
    **The Rationale:** It's easy to forget that an unfused kernel must write its output to HBM, and the next kernel must read it right back.
    **The Consequence:** Underestimating the profound impact of kernel fusion on memory-bound workloads, leading to poor latency optimization.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Tensor size: 32 * 2048 * 4096 in FP16 (2 bytes per element).
       - Unfused: 3 kernels * (1 read + 1 write) = 6 memory operations.
       - Fused: 1 kernel * (1 read + 1 write) = 2 memory operations.
       - A100 Memory Bandwidth: ~2 TB/s (2000 GB/s).
    2. **Calculations:**
       - Tensor bytes: 32 * 2048 * 4096 * 2 = 536,870,912 bytes = 512 MiB.
       - Unfused traffic: 6 * 512 MiB = 3072 MiB.
       - Fused traffic: 2 * 512 MiB = 1024 MiB.
       - Traffic saved: 3072 MiB - 1024 MiB = 2048 MiB.
       - Time saved at 2 TB/s: 2048 MiB / 2000 GB/s \approx 1.02 ms.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound.** Fusing saves 2048 MiB per invocation (a 3x reduction), taking ~1 ms less time.
