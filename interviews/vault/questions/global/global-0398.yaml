title: Overlap Telemetry Spec
scenario: A team claims a new distributed-training runtime overlaps communication and computation. Step time improved, but no one can explain how much communication remains exposed.
question: What telemetry is needed to verify that a training runtime actually overlaps communication with computation?
details:
  realistic_solution: Require per-bucket ready time, all-reduce start/end time, compute stream intervals, communication stream intervals, exposed communication on the critical path, and overlap efficiency. The report should distinguish total communication time from exposed communication time, because only the exposed portion increases step time.
  common_mistake: |
    **The Pitfall:** Reporting total NCCL time and assuming it equals the communication bottleneck.
    **The Rationale:** Total communication time is easy to log, but it doesn't distinguish between background transfers and blocking stalls.
    **The Consequence:** Over-optimizing the network layer when 90% of the transfer time was already hidden behind compute.
  napkin_math: |
    - **Total Communication**: 240 ms.
    - **Exposed Communication**: 60 ms.
    - **Overlap Efficiency**: 1 - (Exposed / Total) = 1 - (60 / 240).
    - **Conclusion**: The overlap efficiency is **75%**.
