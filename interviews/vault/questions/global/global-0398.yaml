title: Overlap Telemetry Spec
scenario: A team claims a new distributed-training runtime overlaps communication
  and computation. Step time improved, but no one can explain how much communication
  remains exposed. Specify the telemetry required to verify overlap quality.
question: What telemetry is needed to verify that a training runtime actually overlaps
  communication with computation?
details:
  realistic_solution: Require per-bucket ready time, all-reduce start/end time, compute
    stream intervals, communication stream intervals, exposed communication on the
    critical path, and overlap efficiency. The report should distinguish total communication
    time from exposed communication time, because only the exposed portion increases
    step time.
  common_mistake: Reporting total NCCL time and assuming it equals the communication
    bottleneck, even when much of it overlaps compute.
  napkin_math: Overlap efficiency can be summarized as 1 - exposed_comm / total_comm.
    If total communication is 240 ms and exposed is 60 ms, overlap efficiency is 75%.
