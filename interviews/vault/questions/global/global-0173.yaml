title: The Data Residency Constraint
scenario: Your company serves EU customers and stores their personal data for ML model training.
question: Under GDPR, what is 'data residency' and why does it constrain where you can place your training infrastructure?
details:
  realistic_solution: 'Data residency means personal data must be stored and processed within approved jurisdictions (typically the EU/EEA). GDPR restricts transferring personal data outside the EU unless the destination country has an ''adequacy decision'' or the transfer uses approved mechanisms (Standard Contractual Clauses, Binding Corporate Rules). This means ML training pipelines must either: (1) run in EU datacenters, (2) use anonymized/pseudonymized data that no longer qualifies as personal data, or (3) implement approved cross-border transfer mechanisms. Violations can result in fines up to 4% of global annual revenue.'
  common_mistake: |
    **The Pitfall:** Thinking GDPR only applies to EU-headquartered companies.
    **The Rationale:** Engineers often assume data can freely move to cheaper US GPU clusters, unaware that extraterritorial privacy laws attach to the user, not the company.
    **The Consequence:** Massive regulatory fines and forced deletion of millions of dollars worth of trained model weights.
  napkin_math: |
    - GDPR fine risk = up to 4% of global revenue (e.g., $40M for a $1B company).
    - 100 H100s in US = $3/hr * 100 * 8760 = $2.6M/year.
    - EU region premium (20%) = +$520k/year.
    - **$520k premium is vastly cheaper than a $40M fine risk, heavily favoring compliant data residency.**
