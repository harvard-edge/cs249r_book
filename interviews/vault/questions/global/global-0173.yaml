title: The Data Residency Constraint
scenario: Your company serves EU customers and stores their personal data for ML model training. Under
  GDPR, what is 'data residency' and why does it constrain where you can place your training infrastructure?
details:
  realistic_solution: 'Data residency means personal data must be stored and processed within approved
    jurisdictions (typically the EU/EEA). GDPR restricts transferring personal data outside the EU unless
    the destination country has an ''adequacy decision'' or the transfer uses approved mechanisms (Standard
    Contractual Clauses, Binding Corporate Rules). This means ML training pipelines must either: (1) run
    in EU datacenters, (2) use anonymized/pseudonymized data that no longer qualifies as personal data,
    or (3) implement approved cross-border transfer mechanisms. Violations can result in fines up to 4%
    of global annual revenue.'
  common_mistake: Thinking GDPR only applies to EU-headquartered companies. GDPR applies to any organization
    processing data of EU residents, regardless of where the company is based. Moving training data to
    a US datacenter without proper safeguards violates the regulation.
  napkin_math: GDPR fine is up to 4% of global revenue. For a $1B company, that's $40M risk. A cluster
    of 100 H100s in the US might cost $3/hr * 100 * 8760 = $2.6M/year. An EU region premium of 20% adds
    $520k/year. $520k is 1.3% of the $40M fine risk. The expected value heavily favors paying the EU datacenter
    premium to ensure data residency and compliance.
