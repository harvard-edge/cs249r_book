title: 'Cross-Regime Drift Sample Budget'
scenario: 'A model runs in cloud, mobile, and edge modes. You need 50,000 labeled outcomes per segment each week to estimate drift. Cloud has 20 segments, mobile has 40 device cohorts, and edge has 1,000 stores.'
question: 'How many weekly labeled outcomes are needed for cloud, mobile, and edge drift monitoring at 50,000 per segment, and which is the hardest regime?'
details:
  realistic_solution: 'Cloud needs 1.0M outcomes, mobile needs 2.0M, and edge needs 50M if every store is treated as its own segment. The hard regime is edge because store-level segmentation explodes the sample requirement. The design should pool stores or use hierarchical alerts rather than requiring 50K labels per store.'
  common_mistake: |
    **The Pitfall:** Applying the same per-segment sampling target uniformly across all regimes without considering segment cardinality.
    **The Rationale:** Assuming standard cloud monitoring playbooks map cleanly to edge environments with massive fragmentation.
    **The Consequence:** Creating an impossible labeling budget of 50M labels per week, bankrupting the data team.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target: 50,000 labeled outcomes/segment.
    - Cloud: 20 segments. Mobile: 40 cohorts. Edge: 1,000 stores.

    **Calculations:**
    - Cloud: 20 * 50,000 = 1,000,000 labels.
    - Mobile: 40 * 50,000 = 2,000,000 labels.
    - Edge: 1,000 * 50,000 = 50,000,000 labels.

    **Conclusion & Interpretation:**
    - **Result: 50M Edge Labels (Labeling-Budget-Bound)**. Requiring hierarchical alerts or pooled segments.
