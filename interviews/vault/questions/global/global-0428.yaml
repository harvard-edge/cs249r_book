title: FlashAttention Portability Claim
scenario: A model team says FlashAttention made cloud inference faster, so the same optimization should speed up mobile and edge deployments.
question: "Does a FlashAttention speedup on cloud imply the same speedup on mobile and edge deployments?"
details:
  realistic_solution: "Not necessarily. FlashAttention helps when attention is memory-traffic bound and the target runtime supports the kernel and tiling strategy. Mobile and edge accelerators may lack the kernel, have different SRAM tiling limits, or be bottlenecked elsewhere. The optimization must be revalidated per hardware regime."
  common_mistake: |
    **The Pitfall:** Treating an algorithmic kernel optimization as universally portable across hardware backends.
    **The Rationale:** High-level algorithmic speedups usually map well to different architectures.
    **The Consequence:** Wasting time integrating unsupported kernels on edge hardware that is bottlenecked differently (e.g. SRAM limitations or non-attention operations).
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Attention is 20% of mobile latency.
    2. **Calculations:**
       - By Amdahl's Law, even an infinite (100%) attention speedup yields only a 20% end-to-end improvement.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound. A 2x attention speedup caps the end-to-end improvement at 10%.**
