title: Quantization Basics
scenario: You are evaluating model deployment techniques.
question: "Why is INT8 quantization so popular for deploying models on edge devices like mobile phones?"
details:
  realistic_solution: 'It reduces the memory footprint by 4x compared to FP32, which drastically reduces the memory bandwidth required to load weights. Furthermore, integer math requires significantly less silicon area and energy than floating-point math.'
  common_mistake: |
    **The Pitfall:** Believing it makes the model more accurate or that it reduces the number of parameters.
    **The Rationale:** Novices confuse precision reduction with model pruning or compression techniques.
    **The Consequence:** Misunderstanding the performance tradeoffs of edge deployment and missing bandwidth constraints.
  napkin_math: |
    **Assumptions & Constraints:**
    - Base model in FP32 (4 bytes per parameter).
    - Target model in INT8 (1 byte per parameter).
    - Model size is 10M parameters.
    
    **Calculations:**
    - FP32 size = 10M * 4 bytes = 40 MB.
    - INT8 size = 10M * 1 byte = 10 MB.
    - Bandwidth required = 10 MB vs 40 MB (4x reduction).
    
    **Conclusion & Interpretation:**
    - **Result: 4x Reduction (Memory-Bandwidth Bound Relief)**. Fits in mobile cache, requiring 4x less bandwidth to load weights.
  options:
  - It reduces memory bandwidth pressure by 4x and allows the use of highly energy-efficient integer ALUs.
  - It automatically sparsifies the network, dropping 75% of the parameters to save memory.
  - It increases the mathematical precision of the final output layer by removing floating-point noise.
  - It maps 32-bit floats to 8-bit floats, keeping the same numerical distribution but running faster.
