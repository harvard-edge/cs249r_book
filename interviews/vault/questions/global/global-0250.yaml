title: HBM Bandwidth Ceiling on A100
scenario: What is the peak HBM2e memory bandwidth of an NVIDIA A100-80GB GPU, and how does it compare
  to the H100's HBM3 bandwidth?
details:
  realistic_solution: The A100 delivers 2.0 TB/s of HBM2e bandwidth, while the H100 delivers 3.35 TB/s
    of HBM3 bandwidth — a 1.68x improvement. This matters because many LLM inference workloads are memory-bandwidth-bound
    (not compute-bound), so the H100's 1.68x bandwidth gain translates almost directly to 1.68x faster
    token generation for autoregressive decoding. The compute improvement is even larger (989 vs 312 TFLOPS
    = 3.17x), meaning the H100 shifts the roofline knee further right, making more workloads compute-bound.
  common_mistake: Confusing HBM2e and HBM3 specs, or mixing up bandwidth with capacity. A100 and H100
    both have 80GB but very different bandwidth.
  napkin_math: 'A100: 2.0 TB/s HBM2e. H100: 3.35 TB/s HBM3. Ratio: 3.35/2.0 = 1.68x bandwidth improvement
    across generations.'
