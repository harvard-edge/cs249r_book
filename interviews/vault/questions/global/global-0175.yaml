title: The Edge Cache Inference Pattern
scenario: A company deploys a text classification model that maps product reviews to 5 sentiment categories. They receive 10 million reviews per day, but only 50,000 unique review texts.
question: What serving architecture exploits this redundancy to minimize inference costs?
details:
  realistic_solution: "Use a CDN-style caching layer in front of the inference service. Hash each input text and check a distributed cache (Redis, Memcached, or literal CDN edge nodes). On cache hit, return the cached prediction in <1ms. On cache miss, run inference and cache the result. With 50K unique inputs out of 10M requests, the cache hit rate is 99.5%. This reduces GPU inference load by 200x - from 10M to 50K inferences per day."
  common_mistake: |
    **The Pitfall:** Running inference on every single request.
    **The Rationale:** Defaulting to a standard stateless REST API without analyzing the input distribution and uniqueness.
    **The Consequence:** Wasting 99.5% of GPU compute on inputs already seen, unnecessarily costing thousands of dollars per day.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Total requests: 10,000,000 inferences/day.
       - Unique requests: 50,000 inferences/day.
    2. **Calculations:**
       - Reduction factor: 10,000,000 / 50,000 = 200x.
       - Cache storage requirement: 50,000 entries * 1 KB = 50 MB.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound.** Caching reduces daily inference costs by a factor of 200 with trivial memory overhead.
