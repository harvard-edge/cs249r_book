title: The Edge Cache Inference Pattern
scenario: A company deploys a text classification model that maps product reviews to 5 sentiment categories.
  They receive 10 million reviews per day, but only 50,000 unique review texts. What serving architecture
  exploits this redundancy?
question: "What serving architecture exploits this redundancy?"
details:
  realistic_solution: Use a CDN-style caching layer in front of the inference service. Hash each input
    text and check a distributed cache (Redis, Memcached, or literal CDN edge nodes). On cache hit, return
    the cached prediction in <1ms. On cache miss, run inference and cache the result. With 50K unique
    inputs out of 10M requests, the cache hit rate is 99.5%. This reduces GPU inference load by 200× —
    from 10M to 50K inferences per day.
  common_mistake: Running inference on every single request. With 10M requests but only 50K unique inputs,
    99.5% of requests are redundant inference — wasting GPU compute on inputs already seen.
  napkin_math: 'Without caching: 10M inferences/day. With caching: 50K inferences/day (cache miss only).
    Reduction: 10M/50K = 200×. If each inference costs $0.001, daily cost drops from $10,000 to $50. Cache
    storage: 50K entries × 1KB each = 50MB — trivial.'
