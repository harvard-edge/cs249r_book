title: The Compound System Observability Stack
scenario: You're the ML platform lead responsible for a production compound AI system processing 50K requests/day
  through a 7-stage pipeline (query classification → embedding → retrieval → reranking → guardrail → LLM
  generation → output filter). The system has been degrading gradually — accuracy dropped 5% over 3 months
  with no code changes. Traditional application monitoring (CPU, memory, latency dashboards) shows nothing
  wrong. Design a comprehensive observability system that can detect and diagnose both performance degradation
  and quality degradation in compound AI systems.
details:
  realistic_solution: 'A compound AI observability stack has 3 layers that traditional monitoring lacks:
    (1) Per-component quality metrics: Each stage exports component-specific quality signals. Retrieval:
    recall@10 computed against a rotating labeled eval set (100 queries/day, human-labeled). Reranker:
    NDCG@5 on the same set. LLM: coherence score (small judge model on 5% of outputs), factual grounding
    score (% of claims traceable to retrieved documents). Guardrail: false positive rate (flagged outputs
    manually reviewed). These are stored as time series and alerted on 7-day rolling averages. (2) Cross-component
    correlation: A trace-based system (like LangSmith or custom OpenTelemetry spans) that links per-request
    decisions across all 7 stages. When accuracy drops, you can query: ''For requests where the final
    answer was wrong, what did each upstream stage produce?'' This reveals patterns like ''wrong answers
    correlate with retrieval recall < 0.6 AND the query was reclassified after a taxonomy update 6 weeks
    ago.'' (3) Data distribution monitoring: Track embedding space drift (cosine distance between weekly
    query centroid and training distribution centroid), document corpus drift (% of retrieved documents
    published after the knowledge cutoff), and feature distribution shift. In this case: the 5% accuracy
    drop likely stems from corpus drift — new documents have different terminology that the 3-month-old
    embedding model handles poorly. Root cause found in hours, not weeks.'
  common_mistake: Adding more latency dashboards and alerting on P99 increases. Traditional APM detects
    performance issues (slowness, errors) but is blind to quality issues (the system is fast and returns
    200 OK, but the answers are subtly worse).
  napkin_math: 'Observability compute overhead: LLM judge on 5% of 50K requests = 2,500 LLM calls/day
    ≈ $7.50/day. Retrieval eval: 100 labeled queries/day × 7 stages = 700 evals ≈ $2/day. Trace storage:
    50K traces × 7 spans × 1KB each = 350 MB/day = $3/month on S3. Total observability cost: ~$300/month
    = 0.6% of a $50K infrastructure budget. Value: detecting a 5% accuracy drop 2 months earlier saves
    2 months × 5% × revenue_impact.'
