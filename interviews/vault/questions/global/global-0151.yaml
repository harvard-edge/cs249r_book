title: The Fragmented FL Round
scenario: Running federated learning on a 256KB SRAM device. The first 5 rounds of local training (20
  QPS) succeed perfectly. Round 6 suddenly crashes with an OOM error when allocating a 30KB gradient buffer,
  despite having 80KB of free heap available.
details:
  realistic_solution: The failure is due to heap memory fragmentation destroying spatial locality for
    large allocations. While TFLite Micro's tensor arena is statically allocated, the federated learning
    orchestration code (networking, JSON parsing for global weights, encryption buffers) uses dynamic
    allocation (malloc/free). Over 5 rounds, varying sizes of temporary networking buffers fragment the
    80KB of free heap into small, non-contiguous chunks. When the system requests a contiguous 30KB block
    for the gradient buffer, the allocator fails because spatial locality of free blocks is lost, causing
    an OOM.
  common_mistake: Assuming a memory leak in the TFLite Micro arena or an over-allocation of the tensor
    arena size.
  napkin_math: Total SRAM = 256KB. TFLM Arena = 150KB. OS/Stack = 26KB. Free Heap = 80KB. After 5 rounds,
    the 80KB heap consists of 40 free blocks of 2KB each, separated by small allocated chunks. The largest
    contiguous block is 15KB. Requesting 30KB fails (30KB > 15KB) despite 80KB total free.
