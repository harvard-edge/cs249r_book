title: Optimal Power Cap for Training Cost Minimization
scenario: Your H100 cluster allows per-GPU power capping via nvidia-smi. At 700W (default), a training step takes 100ms. At 400W, the step takes 135ms. You pay $0.12/kWh for electricity and $4/GPU-hr for the lease.
question: "How would you analyze the cost-optimal power cap?"
details:
  realistic_solution: 'At 700W: step=100ms, power=$0.12 × 0.7kW = $0.084/hr electricity. Lease = $4/hr. Total/step = (100ms/3.6M ms) × ($4.084) = $0.000113. At 400W: step=135ms, power=$0.12 × 0.4kW = $0.048/hr electricity. Lease = $4/hr. Total/step = (135ms/3.6M ms) × ($4.048) = $0.000152. The 700W setting is 25% cheaper per step despite higher electricity! The lease dominates: $4/hr vs $0.05-0.08/hr electricity. Power capping only makes sense when electricity is the dominant cost (e.g., owned hardware fully depreciated) or when hitting thermal limits. At $0.12/kWh, the break-even is when lease < $0.20/hr — essentially only for fully-owned, depreciated hardware.'
  common_mistake: |
    **The Pitfall:** Only optimizing for electricity cost.
    **The Rationale:** Power capping lowers the instantaneous draw, so it feels cheaper.
    **The Consequence:** Slower training extends the extremely expensive GPU lease time, increasing total cost.
  napkin_math: |
    - 700W: $0.084 elec + $4 lease = $4.08/hr. (36,000 steps/hr) = $0.000113/step.
    - 400W: $0.048 elec + $4 lease = $4.05/hr. (26,666 steps/hr) = $0.000152/step.
    - **The 700W setting is 25% cheaper per step because the fixed $4/hr lease dominates the electricity cost.**
