title: OOM at Step 500 but Not Step 1
scenario: Your training run starts fine but OOMs at step 500. The model, batch size, and sequence length haven't changed. Memory usage has been gradually climbing since step 1.
question: What most likely causes the gradual memory climb and OOM at step 500, and how would you debug it?
details:
  realistic_solution: "The most likely cause is retaining computation graphs across steps - typically from storing loss tensors without calling .detach() or .item(). Each stored tensor keeps the entire backward graph alive, accumulating memory linearly. Debug: torch.cuda.memory_summary() shows reserved vs. allocated - a growing gap suggests fragmentation; growing allocated suggests retained references."
  common_mistake: |
    **The Pitfall:** Assuming a classic memory leak in the training loop code (like unfreed objects).
    **The Rationale:** Gradual memory growth looks like a standard memory leak from other programming contexts.
    **The Consequence:** Wasting time profiling Python garbage collection instead of fixing the PyTorch computation graph history retention (e.g., missing `.item()`).
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Retained graph size: ~500 MB per step.
    2. **Calculations:**
       - After 500 steps: 500 * 500 MB = 250,000 MB (~250 GB).
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound.** This memory accumulation guarantees an OOM long before step 500 on standard GPUs.
