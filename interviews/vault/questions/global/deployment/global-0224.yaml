title: Little's Law for GPU Inference Server Sizing
scenario: Your service receives 500 requests/s. Average request latency is 200 ms. Each GPU handles 8 concurrent requests.
question: How many GPUs are needed to handle 500 requests/s at 200 ms latency with 8 concurrent requests per GPU without queuing?
details:
  realistic_solution: 'By Little''s Law: L = \lambda * W = 500 req/s * 0.2 s = 100 concurrent requests. GPUs needed = ceil(100 / 8) = 13 GPUs. Add 20% headroom for traffic spikes: 16 GPUs. In practice, with Poisson arrivals, you need more headroom. At 80% utilization target: 100 / 0.8 / 8 = 16 GPUs.'
  common_mistake: |
    **The Pitfall:** Dividing requests/s by a single-request throughput without accounting for concurrency.
    **The Rationale:** Conflating latency (time per request) with throughput (requests per second) in a concurrent system.
    **The Consequence:** Drastically over- or under-provisioning the cluster by misunderstanding the queue dynamics.
  napkin_math: |
    **Assumptions & Constraints:**
    - Arrival rate = 500 req/s.
    - Latency = 0.2 s.
    - Concurrency per GPU = 8.

    **Calculations:**
    - Little's Law (L) = 500 * 0.2 = 100 concurrent requests.
    - GPUs needed = 100 / 8 = 12.5.
    - Headroom 20% = ceil(12.5) = 13; 13 * 1.2 = 15.6.

    **Conclusion & Interpretation:**
    - **Result: Concurrency-Bound Scaling**. Understanding queue dynamics is critical for correct provisioning.
