title: Structured vs. Unstructured Pruning
scenario: To reduce the latency of a real-time object detection model running on a mobile neural processing unit (NPU), the team proposes using unstructured pruning to achieve 70% sparsity.
question: Why might 70% unstructured pruning fail to improve latency on a standard mobile NPU?
details:
  realistic_solution: 'Most edge NPUs and hardware accelerators are optimized for dense matrix multiplications and lack the specialized hardware support required to efficiently process unstructured sparse matrices, often resulting in no speedup or even slowdowns due to irregular memory access.'
  common_mistake: |
    **The Pitfall:** Assuming that unstructured sparsity automatically translates to faster execution.
    **The Rationale:** Removing weights intuitively seems like less work, ignoring the fact that hardware accelerators rely on dense, predictable memory blocks to achieve high throughput.
    **The Consequence:** Achieving zero latency improvement while taking a measurable hit to model accuracy.
  napkin_math: |
    **Assumptions & Constraints:**
    - 70% unstructured sparsity.
    - NPU architecture optimized for dense matrix multiplications (GEMM).

    **Calculations:**
    - 70% of weights are zero, but scattered randomly.
    - Dense GEMM on NPU = predictable memory access, full SIMD utilization.
    - Sparse indexing overhead > compute savings on standard NPU.

    **Conclusion & Interpretation:**
    - **Result: 0x Speedup (Hardware-Architecture-Bound)**. Net speedup on standard mobile NPUs is ~0x (and sometimes negative) due to lack of sparse execution support.
  options:
  - 'Unstructured pruning reduces latency by 70% because 70% of multiply-accumulate operations are skipped.'
  - 'NPUs require exactly 50% sparsity to trigger bypass logic for multiply-accumulate (MAC) operations.'
  - 'Standard NPUs lack specialized hardware to exploit irregular sparsity patterns, making unstructured sparse operations inefficient.'
  - 'Unstructured pruning increases latency by exactly 30% due to the O(N) indexing overhead of sparse tensors.'
