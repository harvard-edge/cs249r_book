title: 'The Compound System Observability Stack'
scenario: 'You are the ML platform lead responsible for a production compound AI system processing 50K requests/day through a 7-stage pipeline. The system has been degrading gradually — accuracy dropped 5% over 3 months with no code changes. Traditional application monitoring shows nothing wrong.'
question: 'How would you design observability to detect and diagnose both performance and quality degradation in this 7-stage AI pipeline?'
details:
  realistic_solution: 'A compound AI observability stack has 3 layers that traditional monitoring lacks: (1) Per-component quality metrics: Each stage exports component-specific quality signals. Retrieval: recall @interviews/vault/questions/cloud/cloud-1071.yaml computed against a rotating labeled eval set (100 queries/day, human-labeled). Reranker: NDCG @interviews/vault/questions/cloud/cloud-1071.yaml on the same set. LLM: coherence score (small judge model on 5% of outputs), factual grounding score (% of claims traceable to retrieved documents). Guardrail: false positive rate (flagged outputs manually reviewed). These are stored as time series and alerted on 7-day rolling averages. (2) Cross-component correlation: A trace-based system (like LangSmith or custom OpenTelemetry spans) that links per-request decisions across all 7 stages. When accuracy drops, you can query: ''For requests where the final answer was wrong, what did each upstream stage produce?'' This reveals patterns like ''wrong answers correlate with retrieval recall < 0.6 AND the query was reclassified after a taxonomy update 6 weeks ago.'' (3) Data distribution monitoring: Track embedding space drift (cosine distance between weekly query centroid and training distribution centroid), document corpus drift (% of retrieved documents published after the knowledge cutoff), and feature distribution shift. In this case: the 5% accuracy drop likely stems from corpus drift — new documents have different terminology that the 3-month-old embedding model handles poorly. Root cause found in hours, not weeks.'
  common_mistake: |
    **The Pitfall:** Adding more latency dashboards and alerting on P99 increases.
    **The Rationale:** Assuming that traditional APM detects all relevant issues because it catches slowness and infrastructure errors.
    **The Consequence:** Remaining completely blind to qualitative semantic degradation where the system returns '200 OK' but the LLM answers are subtly wrong.
  napkin_math: |
    **Assumptions & Constraints:**
    - Pipeline: 7 stages, 50K requests/day.
    - Evaluators: LLM judge on 5%, Human labels on 100 queries/day.

    **Calculations:**
    - LLM judge cost: 5% of 50K = 2,500 calls/day. At $0.003/call ≈ $7.50/day.
    - Retrieval eval cost: 100 queries * 7 stages = 700 evals/day ≈ $2/day.
    - Trace storage: 50K * 7 spans * 1KB = 350 MB/day.
    - Total monthly cost: $225 + $60 + $3 ≈ $300/month.

    **Conclusion & Interpretation:**
    - **Result: $300/month (<1% of infra budget) (Observability-Quality-Bound)**. Without dedicated evals.
