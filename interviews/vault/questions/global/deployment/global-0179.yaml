title: The Anycast Routing Pattern
scenario: A global ML inference service has endpoints in US-East, EU-West, and Asia-Pacific. A user in Berlin sends a request.
question: With anycast routing, how does the network decide which datacenter handles the request?
details:
  realistic_solution: 'Anycast assigns the same IP address to all three datacenter endpoints. When the Berlin user''s request enters the internet, BGP routers along the path forward it to the topologically nearest datacenter — in this case EU-West. This happens at the network layer, below the application. Benefits: (1) Automatic failover — if EU-West goes down, BGP reconverges and traffic shifts to the next-nearest DC. (2) Minimal latency — requests are served by the closest DC by default. (3) DDoS resilience — attack traffic is distributed across all DCs. Limitation: anycast routes by network topology, not by server load — a hot DC still gets all nearby traffic.'
  common_mistake: |
    **The Pitfall:** Thinking the application or an L7 load balancer decides the routing.
    **The Rationale:** Confusing global DNS routing or software load balancing with network-layer BGP routing.
    **The Consequence:** Over-engineering complex application-level routing logic when BGP Anycast handles it automatically.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - User location: Berlin.
       - Anycast BGP network routing is active.
    2. **Calculations:**
       - Berlin to EU-West RTT: ~10ms.
       - Berlin to US-East RTT: ~90ms.
       - Berlin to Asia-Pacific RTT: ~200ms.
       - BGP selects shortest path: 10ms.
    3. **Conclusion & Interpretation:**
       - **Anycast routes traffic at the network layer to the topologically nearest DC (EU-West), ignoring application load.**
       - **Result: Network-Topology Bound**
