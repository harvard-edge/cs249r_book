title: The Inference Placement Decision
scenario: You serve a real-time translation model to users across 40 countries. Option
  A is a centralized 64 H100 cluster in US-East ($2.50/GPU-hour). Option B is 8 regional
  8 H100 clusters ($3.20/GPU-hour, 28% premium). The model requires 4 H100s for TP.
  Your P95 latency target is 300ms and inference takes 150ms.
question: Should the translation service use one 64-H100 US-East cluster or eight
  8-H100 regional clusters to meet the 300 ms P95 latency target?
details:
  realistic_solution: 'Centralized (US-East): 64 GPUs = 16 inference replicas (4 GPUs
    each). Latency for nearby users (US/Canada, RTT ~20ms): 20 + 150 = 170ms. PASS.
    Latency for European users (RTT ~80ms): 80 + 150 = 230ms. PASS. Latency for Asian
    users (RTT ~150ms): 150 + 150 = 300ms. BORDERLINE. Latency for Australian users
    (RTT ~200ms): 200 + 150 = 350ms. FAIL. Monthly cost: 64 × $2.50 × 730h = $116,800.
    Distributed (8 regions): 8 GPUs per region = 2 replicas each. Latency: all users
    within 30ms of nearest cluster → 30 + 150 = 180ms. All PASS. Monthly cost: 64
    × $3.20 × 730h = $149,504. Premium: $32,704/month (28%). But: centralized fails
    SLA for ~25% of users (Asia-Pacific, Oceania, Africa). If each failed-SLA user
    represents $0.50/month in revenue and you have 1M users, failing 250K users costs
    $125K/month — far exceeding the $33K infrastructure premium. Recommendation: Distributed,
    with the caveat that 2 replicas per region provides minimal redundancy. Consider
    6 regions with slightly larger clusters.'
  common_mistake: '**The Pitfall:** Comparing only the GPU hourly cost and choosing
    the 28% cheaper centralized option.

    **The Rationale:** Infrastructure teams optimize for raw compute utilization and
    bulk pricing discounts.

    **The Consequence:** Failing the latency SLA for global users, leading to churn
    that costs far more than the compute savings.

    '
  napkin_math: "1. **Assumptions & Constraints:**\n   - 64 GPUs total. Centralized:\
    \ $2.50/hr. Distributed: $3.20/hr.\n   - Inference: 150ms. SLA: 300ms.\n   - Centralized\
    \ misses SLA for 250K users. Lost revenue: $0.50/user/mo.\n2. **Calculations:**\n\
    \   - Centralized Cost: 64 * $2.50 * 730h = $116,800/mo.\n   - Distributed Cost:\
    \ 64 * $3.20 * 730h = $149,504/mo. Premium: $32.7K/mo.\n   - Centralized Latency\
    \ (Australia): 200ms RTT + 150ms = 350ms (Fails SLA).\n   - Distributed Latency:\
    \ 30ms RTT + 150ms = 180ms (Passes SLA globally).\n   - Revenue Risk (Centralized):\
    \ 250K users * $0.50 = $125K/mo lost revenue.\n3. **Conclusion & Interpretation:**\n\
    \   - **The $125K lost revenue far exceeds the $32.7K premium, making Distributed\
    \ cheaper overall.**\n   - **Result: Latency-Bound SLA Violation**\n"
