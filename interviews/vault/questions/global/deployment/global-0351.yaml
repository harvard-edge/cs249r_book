title: Adaptation Architecture Across Surfaces
scenario: A product wants a base model plus personalization across cloud, mobile, and edge.
question: How would you design a shared adaptation architecture across cloud, mobile, and edge deployments?
details:
  realistic_solution: Use a common base model lineage with small adapters or calibration layers per surface. Cloud can train and evaluate full variants, mobile can store user adapters, and edge can store site adapters. The shared contract is adapter format, versioning, fallback, and evaluation, not identical runtime implementation.
  common_mistake: |
    **The Pitfall:** Forking separate models for each surface.
    **The Rationale:** Each target environment has different constraints, making standalone models intuitively easier to build initially.
    **The Consequence:** Losing comparability, making rollback difficult, and multiplying the operational burden of shared evaluation across three disparate model families.
  napkin_math: |
    **Assumptions & Constraints:**
    - Base model = 2 GB. Adapter = 20 MB.

    **Calculations:**
    - Storing 10 independent fine-tunes = 10 × 2 GB = 20 GB.
    - Storing 1 base model + 10 adapters = 2 GB + (10 × 20 MB) = 2.2 GB.

    **Conclusion & Interpretation:**
    - **Result: 2.2 GB (Storage-Bound)**. Storing 1 base model + 10 adapters = 2.2 GB (nearly 10x savings).
