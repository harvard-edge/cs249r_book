title: 'Global A/B Rollout Risk Budget'
scenario: 'A team wants to roll out a model change across three surfaces: cloud API with 2 million requests/hour, mobile app with 400,000 active devices/day, and an edge kiosk fleet with 2,000 stores. They want a 5% canary everywhere and a rollback trigger if error rate rises by 0.2 percentage points.'
question: 'How would you size a 5% cross-regime canary and make rollback decisions comparable across cloud, mobile, and edge deployments?'
details:
  realistic_solution: 'The canary exposure is 100,000 cloud requests/hour, 20,000 mobile devices/day, and 100 stores. These are not equivalent statistical units: cloud gives fast request-level evidence, mobile gives slower device-level evidence, and edge gives store-level clustered evidence. A comparable rollback plan needs a shared error definition, minimum sample thresholds, time windows, and clustering-aware confidence.'
  common_mistake: |
    **The Pitfall:** Treating 5% as equally informative across request, device, and store populations.
    **The Rationale:** Using a naive uniform percentage without adjusting for the statistical power and cadence of different telemetry populations.
    **The Consequence:** Triggering false-positive rollbacks on edge kiosks due to small sample sizes, or missing slow-burn errors on mobile.
  napkin_math: |
    **Assumptions & Constraints:**
    - Canary target: 5%.
    - Traffic: 2M cloud reqs/hr, 400K mobile devices/day, 2,000 edge stores.

    **Calculations:**
    - Cloud 5%: 0.05 * 2,000,000 = 100,000 requests/hour.
    - Mobile 5%: 0.05 * 400,000 = 20,000 devices/day.
    - Edge 5%: 0.05 * 2,000 = 100 stores.

    **Conclusion & Interpretation:**
    - **Result: 100 stores vs 100,000 requests (Statistical-Confidence-Bound)**. Requires dynamic rollback thresholds.
