title: GPU Serving Rollout Spec
scenario: You are specifying rollout requirements for a GPU serving platform that runs LLM and vision models. Updates may reload 10 GB model images and can take minutes per pod.
question: What rollout controls are required for GPU serving pods that reload 10 GB model images during updates so latency SLOs are not violated?
details:
  realistic_solution: 'The spec should include max unavailable pods, pre-warmed replacement capacity, readiness gates after model load, traffic draining, canary health metrics, rollback triggers, and model-cache warmup checks. Large model images make pod readiness different from container start; traffic should not route until weights are loaded and latency is measured.'
  common_mistake: |
    **The Pitfall:** Treating GPU model pods like stateless web pods.
    **The Rationale:** Assuming readiness is immediate after the container starts, as is typical in traditional microservices.
    **The Consequence:** Routing traffic to pods before weights are loaded, violating latency SLOs.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 10 GB model image size.
       - Network effective load speed: 1 GB/s (fast) or 100 MB/s (slow).
    2. **Calculations:**
       - Load time at 1 GB/s: 10 GB / 1 GB/s = 10 seconds.
       - Load time at 100 MB/s: 10 GB / 100 MB/s = 100 seconds.
       - Time excludes initialization and cache warmup.
    3. **Conclusion & Interpretation:**
       - **Pod readiness takes 10 to 100+ seconds; routing traffic before weights load causes immediate SLO violations.**
       - **Result: I/O-Bound Pod Readiness**
