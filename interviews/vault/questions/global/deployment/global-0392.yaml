title: Cross-Regime Rollout Spec
scenario: A platform team asks for one rollout policy that covers cloud inference, mobile offline models, and TinyML firmware. Cloud rollback takes 2 minutes, mobile rollback depends on app update adoption, and TinyML rollback requires OTA firmware with battery constraints.
question: "What rollout policy fields are required for cloud, mobile, and TinyML releases with very different rollback latencies?"
details:
  realistic_solution: 'The policy must specify blast-radius unit, canary fraction, minimum sample size, health metrics, rollback trigger, rollback mechanism, maximum rollback latency, and holdout duration per regime. Cloud can use request or pod units, mobile needs device cohorts and staged app rollout, and TinyML needs firmware slots, battery-safe OTA windows, and fallback behavior.'
  common_mistake: 'Writing a cloud-only canary policy and assuming mobile or TinyML rollback behaves like a server deployment.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Cloud rollback latency: ~2 minutes.
    - Mobile rollback latency: Days (dependent on app store adoption).
    - TinyML rollback latency: Regulated by battery-safe OTA windows.
    
    **Calculations:**
    - Ratio of rollback times = Days / 2 minutes = ~1000x difference.
    - Mobile/TinyML canaries require correspondingly smaller initial blast radii and longer soak times.
    
    **Conclusion & Interpretation:**
    - **Result: Staggered Observation Windows (Deployment Bound)**. The rollout spec must parametrize canary fractions and observation durations to safely handle the extreme differences in rollback capabilities.
