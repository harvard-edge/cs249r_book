title: Loss Plateau After Learning Rate Warmup
scenario: Your 3B model's training loss decreases normally during the first 1000 steps, then completely plateaus at a high loss value for the next 5000 steps despite the learning rate schedule continuing normally. GPU utilization is 100% and gradient norms look healthy.
question: What is the likely cause of the training loss plateau?
details:
  realistic_solution: Most likely root cause is a data pipeline bug causing the model to see the same data repeatedly. Check if the dataloader shuffle seed is identical every epoch, causing persistent workers to cache and reuse the same 1000 samples infinitely.
  common_mistake: |
    **The Pitfall:** Blaming the learning rate schedule or model architecture.
    **The Rationale:** The warmup phase technically worked, so candidates assume the model structure is failing to generalize at scale.
    **The Consequence:** Wasting engineering time tuning hyperparameters or rewriting model code when the data pipeline is actually stuck serving a repeated subset.
  napkin_math: |
    **Assumptions & Constraints:**
    - Healthy gradient norms.
    - 1000 steps warmup decrease. 5000 steps global plateau.
    - 3B parameters.

    **Calculations:**
    - Expected loss decrease: ~0.1 per 1000 steps.
    - Plateau = 0.0 decrease over 5000 steps.
    - Probability of genuine 3B plateau at step 1000 = ~0%.

    **Conclusion & Interpretation:**
    - **Result: Data-Bound (Pipeline).** If the dataloader buffer is exactly 1000 samples and the seed fails to reset, the model loops over 1000 samples infinitely, memorizing them quickly and flattening the loss curve.
