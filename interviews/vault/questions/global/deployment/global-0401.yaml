title: Cluster Rollout Capacity With GPU Pods
scenario: A Kubernetes inference service runs 60 GPU pods, each serving 25 requests/s. A rolling update drains 10% of pods at a time. Peak traffic is 1,350 requests/s, and the latency SLO requires utilization below 80%.
question: Is draining 10% of 60 GPU pods safe at 1,350 rps if utilization must stay below 80%?
details:
  realistic_solution: 'Full capacity is 60 x 25 = 1,500 rps. Draining 6 pods leaves 54 x 25 = 1,350 rps. That is exactly the peak load, or 100% utilization, far above the 80% SLO target. The rollout is unsafe; it needs pre-scaling or a smaller drain batch.'
  common_mistake: |
    **The Pitfall:** Checking only that remaining capacity equals peak traffic.
    **The Rationale:** Ignoring the utilization headroom required to maintain tail-latency SLOs.
    **The Consequence:** Operating at 100% utilization during the rollout, causing massive request queuing and latency violations.
  napkin_math: |
    **Assumptions & Constraints:**
    - 60 GPU pods, 25 requests/s each.
    - Draining 10% (6 pods).
    - Peak traffic: 1,350 rps.
    
    **Calculations:**
    - Pods after drain: 60 - 6 = 54 pods.
    - Remaining capacity: 54 x 25 = 1,350 rps.
    - Post-drain utilization: 1,350 / 1,350 = 100%.
    - Target capacity for 80% utilization: 1,350 / 0.8 = 1,687.5 rps.
    
    **Conclusion & Interpretation:**
    - **Result: 100% Utilization (Capacity-Bound)**. Operating at 100% utilization violates the 80% SLO target.
