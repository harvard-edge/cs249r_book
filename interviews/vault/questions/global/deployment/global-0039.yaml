title: The Dynamic DAG Scheduling Problem
scenario: Your agentic system builds a dynamic execution DAG at runtime — the LLM decides which tools
  to call based on intermediate results. Unlike a static DAG, you cannot pre-plan parallelism because
  the graph shape is unknown until execution. An agent processing a research query creates a DAG with
  12 nodes across 6 sequential decision points. Each decision point adds 1.5s of LLM inference latency.
question: How do you reduce the 9-second overhead of sequential LLM planning steps?
details:
  realistic_solution: 'Three strategies that preserve dynamic planning while reducing serial LLM overhead:
    (1) Speculative execution: At each decision point, predict the 2-3 most likely next tools and execute
    them in parallel. If the LLM''s choice matches, skip the wait. Hit rate: ~70%, effectively reducing
    9.0s to 2.7s. (2) Hierarchical planning: Use a large model for high-level plan (3s), then a small
    fast model for detailed tool selection (0.8s). Total: 3.8s. (3) Plan caching: For recurring query
    types, cache the execution plan skeleton.'
  common_mistake: '**The Pitfall:** Trying to predict the full DAG upfront.

    **The Rationale:** Pre-planning is the standard way to parallelize tasks in normal workflow engines.

    **The Consequence:** The system becomes inflexible and defeats the purpose of dynamic agents that
    adapt to intermediate results.

    '
  napkin_math: '**Assumptions & Constraints:**

    - Sequential overhead: 6 steps × 1.5s = 9.0s.


    **Calculations:**

    - Speculative execution (70% hit rate): 6 × 1.5s × 0.3 (miss rate) = 2.7s effective latency.

    - Hierarchical planning: 2 macro steps (2 × 1.5s) + 4 micro steps (4 × 0.2s) = 3.8s total.


    **Conclusion & Interpretation:**

    - **Result: 2.7s (Latency-Bound)**. Using speculative execution reduces planning overhead from 9.0s
    to 2.7s. Hierarchical planning is a strong alternative, bringing it to 3.8s.'
