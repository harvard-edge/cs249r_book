title: Memory Constraints
scenario: You are tasked with porting an anomaly detection model to an edge device based on an ARM Cortex-M4 processor. The model parameters take up 150KB and the peak intermediate tensor size during inference is 100KB. The microcontroller has 512KB of Flash and 128KB of SRAM.
question: "Will the 150KB-parameter, 100KB-activation model fit on 512KB Flash and 128KB SRAM, and where should each reside?"
details:
  realistic_solution: 'Model weights are read-only and can be stored in Flash memory, while intermediate activations (tensors) must be allocated in SRAM. Since weights (150KB) < Flash (512KB) and activations (100KB) < SRAM (128KB), it fits.'
  common_mistake: 'Confusing the roles of Flash (persistent storage for code/read-only data like weights) and SRAM (volatile memory for intermediate activations/stack/heap) on microcontrollers.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Microcontroller resources: 512 KB Flash (read-only/code), 128 KB SRAM (volatile/data).
    - Model requirements: 150 KB parameters, 100 KB peak activations.
    
    **Calculations:**
    - Flash usage: 150 KB weights / 512 KB Flash = 29% utilized.
    - SRAM usage: 100 KB activations / 128 KB SRAM = 78% utilized.
    
    **Conclusion & Interpretation:**
    - **Result: Memory Fits (SRAM Capacity Bound)**. The weights fit easily into Flash, and activations fit in SRAM, though SRAM is tight, leaving only 28 KB for stack and application heap.
  options:
  - Yes, everything can be stored in SRAM since 150KB + 100KB = 250KB, and Flash can act as virtual memory.
  - Yes, the model weights should be stored in Flash memory, and the intermediate tensors allocated in SRAM.
  - No, because the total size (250KB) exceeds the available SRAM (128KB).
  - No, because intermediate tensors must be stored in Flash to prevent data loss on power cycles.
  correct_index: 1
