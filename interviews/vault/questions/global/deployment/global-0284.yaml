title: Training Observability Dashboard Design
scenario: Design a monitoring system for a 256-GPU training run of a 70B model expected to take 21 days.
question: What metrics, alerts, and dashboards do you build?
details:
  realistic_solution: 'Construct a multi-layer telemetry stack. Hardware: 10s DCGM exports (temps, ECC, NVLink status). Comm: AllReduce step-time variance for straggler isolation. Dynamics: Gradient norm tracking and Model FLOPs Utilization (MFU) drop alarms. Pipeline: Dataloader queue depth. Overlay this data chronologically to expose silent MFU killers.'
  common_mistake: |
    **The Pitfall:** Only monitoring loss curves and basic GPU utilization percentages.
    **The Rationale:** These are the most visible high-level indicators of whether training is "working."
    **The Consequence:** Missing subtle, silent efficiency killers like thermal throttling, stragglers, or data pipeline stalls that waste 10-20% of compute over a $500k training run.
  napkin_math: |
    **Assumptions & Constraints:**
    - 256 GPUs, 10 metrics at 10s intervals
    - Payload: 100 bytes/sample

    **Calculations:**
    - Velocity: 256 * 10 / 10s = 256 samples/sec
    - Daily Volume: 256 * 86,400s * 100 bytes = ~2.2 GB/day
    - 21-day storage: 21 * 2.2 GB = 46.2 GB

    **Conclusion & Interpretation:**
    - **Result: I/O-Feasible (Minimal Telemetry Overhead)**. Comprehensive monitoring creates minimal storage overhead while exposing subtle efficiency killers.
