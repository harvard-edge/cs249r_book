title: Incomplete Compute Cost Procurement Decision
scenario: A team asks whether to buy accelerators, rent cloud, or push inference to devices. They provide model FLOPs and traffic forecast but omit latency SLO, utilization, energy price, support cost, privacy constraints, and model-quality differences.
question: What information is missing before choosing buy, rent, or on-device inference, and what can be bounded from FLOPs and traffic alone?
details:
  realistic_solution: FLOPs and traffic bound total compute demand, but not cost-effective placement. You still need sustained hardware efficiency, utilization, latency SLO, energy/network cost, operational support, privacy constraints, and quality differences. A responsible answer computes demand first, then asks for supply and product constraints before choosing.
  common_mistake: Choosing a procurement path from FLOPs alone without knowing whether demand is latency-bound, utilization-bound, privacy-bound, or cost-bound.
  napkin_math: If demand is 10 TFLOP/request at 1M requests/day, daily demand is 10M TFLOP total = 10 EFLOP per day. Hardware count depends on sustained TFLOP/s and utilization.
