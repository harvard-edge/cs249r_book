title: Post-Training Quantization
scenario: When deploying a convolutional neural network on a microcontroller with 256KB of RAM, we decide to use int8 post-training quantization. However, after quantization, the model's accuracy drops significantly.
question: What is the most likely cause of the severe accuracy drop after int8 post-training quantization on the 256KB-RAM microcontroller?
details:
  realistic_solution: The presence of significant outliers in the weights or activations causes a large quantization error because the int8 range must stretch to cover the outliers, reducing the effective resolution for the majority of the values.
  common_mistake: |
    **The Pitfall:** Assuming quantization uniformly reduces precision without considering data distribution.
    **The Rationale:** Candidates view quantization merely as a generic cast from float to int.
    **The Consequence:** Severe accuracy degradation occurs because outliers compress the useful activation range into a few distinct levels, destroying the model's predictive power.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Microcontroller RAM: 256KB.
       - Quantization format: INT8 (256 discrete levels).
    2. **Calculations:**
       - Let max normal activation = 1, but an outlier exists at 100.
       - Scale factor = 100 / 127 = ~0.78 per quantization step.
       - Normal values in [-1, 1] receive only 3 distinct levels (e.g., -1, 0, 1).
    3. **Conclusion & Interpretation:**
       - **Result: Precision-Bound.** A single extreme outlier forces the scale factor to expand, effectively wasting >90% of the available INT8 resolution and destroying model accuracy.
  options:
  - The 256KB RAM is completely exhausted because INT8 requires 4 bytes per parameter.
  - There are extreme outliers in the model's weight or activation distributions, compressing normal values into just 3 distinct quantization levels.
  - Int8 quantization mathematically guarantees a 50% accuracy drop on all CNNs without retraining.
  - The scale factor of 0.003 is too small for the microcontroller's ALU to process.
  correct_index: 1
