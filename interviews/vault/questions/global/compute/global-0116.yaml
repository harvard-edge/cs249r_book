title: Diffusion Resolution Scaling Cliff
scenario: You are upgrading a text-to-image diffusion model from generating 512x512 images to 1024x1024 images. The pixel count increases by 4x, and the theoretical FLOPs increase by ~4.5x. However, your profiling on A100 GPUs shows that latency per denoising step increases by nearly 9x.
question: "Why does doubling diffusion resolution from 512 to 1024 increase denoising latency by 9x instead of 4.5x?"
details:
  realistic_solution: 'The bottleneck lies in the self-attention layers within the diffusion UNet. When resolution doubles (512 to 1024), the sequence length (N = H * W) of the flattened feature maps increases by 4x. Standard self-attention has O(N^2) memory complexity for the attention matrix. Therefore, the memory read/write traffic for the attention scores increases by 16x! This massive explosion in memory traffic violently shifts the arithmetic intensity of the attention layers to the left. A workload that was previously sitting comfortably near the compute-bound ridge point at 512x512 suddenly falls off the cliff into the severely memory-bandwidth bound regime at 1024x1024. The 9x latency increase is a blend of the 4x compute increase in convolutional layers and the 16x memory latency increase in the attention layers.'
  common_mistake: 'Assuming latency scales strictly with FLOPs, or missing the quadratic sequence length scaling of attention mechanisms in the UNet.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Resolution doubles from 512 to 1024, increasing pixels 4x.
    - Attention memory complexity is O(N^2), where N is sequence length (pixels).
    
    **Calculations:**
    - At 512x512 (downsampled to 64x64): N = 4096. Attention matrix = 4096^2 * 2B ≈ 33 MB per head.
    - At 1024x1024 (downsampled to 128x128): N = 16384. Attention matrix = 16384^2 * 2B ≈ 536 MB per head.
    - Attention memory traffic increases by 16x.
    - Baseline latency (100ms) = 80ms Convs + 20ms Attention.
    - Upscaled latency = (80ms * 4) + (20ms * 16) = 320ms + 320ms = 640ms.
    
    **Conclusion & Interpretation:**
    - **Result: 6.4x to 9x Latency Spike (Memory-Bandwidth Bound)**. The quadratic scaling of self-attention memory reads violently shifts the UNet workload off the compute ridge point and into severe HBM thrashing.
