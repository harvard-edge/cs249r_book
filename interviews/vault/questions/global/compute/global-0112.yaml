title: 'Recomputation and Arithmetic Intensity'
scenario: 'While training a foundation model with a 32k context window, standard attention consumes 65% of the step time. You implement FlashAttention-2, which actually increases the total number of FLOPs performed by ~15% due to recomputation in the backward pass. Despite doing more math, the attention phase executes 4x faster.'
question: 'Why does FlashAttention-2 run 4x faster at 32k context even though it performs about 15% more FLOPs?'
details:
  realistic_solution: 'Standard attention materializes the massive N x N attention score matrix to High Bandwidth Memory (HBM). For N=32k, this requires reading and writing gigabytes of data per layer, forcing the operation deep into the memory-bandwidth bound region of the Roofline model. FlashAttention uses tiling to fuse the Softmax and matrix multiplications, keeping the intermediate N x N matrix entirely in fast, on-chip SRAM. By doing so, it drastically reduces HBM reads/writes. Even though the backward pass recomputes the forward pass (increasing total FLOPs), the Arithmetic Intensity (FLOPs per byte of HBM traffic) increases by orders of magnitude. The workload shifts from the memory-bound slope to the compute-bound ceiling. Because SRAM bandwidth is terabytes per second faster than HBM, the ALUs are finally kept fed, resulting in a 4x speedup despite the extra math.'
  common_mistake: |
    **The Pitfall:** Explaining that FlashAttention reduces memory footprint without connecting it to arithmetic intensity and HBM bandwidth ceilings.
    **The Rationale:** Memorizing the "saves memory" marketing without understanding the Roofline model mechanics that govern physical speed.
    **The Consequence:** Failing to predict when FlashAttention will actually degrade performance (e.g., short contexts).
  napkin_math: |
    **Assumptions & Constraints:**
    - Sequence length N=32,768, heads=32, dim=128.
    - Standard attention materializes O(N^2) to HBM.
    - FlashAttention-2 materializes O(N*d) to HBM via SRAM tiling.

    **Calculations:**
    - Standard HBM traffic: 32768 * 32768 * 2 bytes * 32 heads ≈ 67 GB/layer.
    - Flash HBM traffic: 32768 * 128 * 2 bytes * 32 heads ≈ 256 MB/layer.
    - Arithmetic Intensity (I): Shifts from I ≈ 1 (Memory-Bound) to I ≈ 128 (Compute-Bound).

    **Conclusion & Interpretation:**
    - **Result: HBM traffic drops from 67 GB to 256 MB (Compute-Bound Shift)**. Yields 4x speedup.
