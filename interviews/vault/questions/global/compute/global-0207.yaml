title: Self-Attention Arithmetic Intensity During Decode
scenario: During autoregressive decode of a single token, the attention query is 1x128 and the KV cache is 2048x128, both FP16.
question: What is the arithmetic intensity of single-token attention with a 2048-token FP16 KV cache, and where does it fall on the A100 roofline?
details:
  realistic_solution: 'FLOPs: QxK^T = 2 x 1 x 2048 x 128 = 524K FLOP. Then softmax x V = 2 x 1 x 128 x 2048 = 524K FLOP. Total ≈ 1M FLOP. Memory: read K (2048x128x2B = 512KB) + read V (512KB) + read Q (256B) + write output (256B) ≈ 1 MB. AI = 1M FLOP / 1 MB = 1 FLOP/byte. A100 ridge = 156. Since 1 << 156, decode attention is extremely memory-bound. This is the fundamental reason decode is slow and why FlashDecoding and speculative decoding exist.'
  common_mistake: |
    **The Pitfall:** Treating decode attention like training attention.
    **The Rationale:** Assuming attention is always compute-bound because $O(N^2)$ complexity dominates during long context training/prefill.
    **The Consequence:** Applying the wrong optimizations (like FlashAttention) to decode steps where they yield no benefit.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Q = 1x128, K/V = 2048x128 (FP16, 2 bytes/element).
       - GPU Ridge Point (A100): 156 FLOPs/byte.
    2. **Calculations:**
       - FLOPs (Q x K^T): 2 * 1 * 2048 * 128 = 524,288.
       - FLOPs (Softmax x V): 2 * 1 * 128 * 2048 = 524,288.
       - Total FLOPs: ~1,048,576 (1M).
       - Memory (read K + V): 2 * 2048 * 128 * 2 bytes = ~1 MB.
       - Arithmetic Intensity = 1M FLOPs / 1 MB = 1 FLOP/byte.
    3. **Conclusion & Interpretation:**
       - **With an AI of 1 FLOP/byte (1 ≪ 156), decode attention is massively memory-bound.**
       - **Result: Memory-Bandwidth Bound**
