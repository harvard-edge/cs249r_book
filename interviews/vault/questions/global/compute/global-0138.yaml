title: Memory Bandwidth Bound Decode
scenario: You deploy a 70B parameter model (FP16) for a real-time voice agent. Target TPOT is 20ms. The model is deployed on 2x GPUs (Tensor Parallelism, 2.0 TB/s bandwidth each). Even with a batch size of 1, the best TPOT achieved is ~48ms, severely violating the 20ms requirement.
question: Why is 20ms TPOT impossible for a 70B FP16 model on 2x GPUs, and what architecture could meet it?
details:
  realistic_solution: 'Decompose the decode step latency: In autoregressive generation (batch size 1), the operation is entirely Memory Bandwidth Bound. For every single token generated, the entire 140 GB model weight matrix must be read from HBM to SRAM. Compute time is negligible. T_token = Model_Size / Total_Memory_Bandwidth. 140 GB / 4000 GB/s = 35ms. It is physically impossible to hit 20ms on this hardware in FP16. The architectural requirement is to either quantize the model weights to INT8/INT4 (reducing weights to 70GB/35GB -> 23ms/11ms latency), or double the hardware footprint to aggregate 8.0 TB/s of memory bandwidth.'
  common_mistake: |
    **The Pitfall:** Attempting to optimize compute instead of memory bandwidth.
    **The Rationale:** Reaching for FlashAttention or kernel fusion without realizing batch=1 autoregressive decode is entirely memory-bound.
    **The Consequence:** Wasting engineering effort on compute optimizations that yield zero improvement in decode latency.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 70B parameter model in FP16 (140 GB).
       - 2 GPUs with 2.0 TB/s bandwidth each (4.0 TB/s aggregate).
       - Target TPOT: 20ms. Batch size = 1.
    2. **Calculations:**
       - Total aggregate bandwidth: 4.0 TB/s (4000 GB/s).
       - Minimum physical read time per token: 140 GB / 4000 GB/s = 0.035 seconds (35ms).
    3. **Conclusion & Interpretation:**
       - **The physical time to read the weights is 35ms, making a 20ms TPOT physically impossible without quantization.**
       - **Result: Memory-Bandwidth Bound**
