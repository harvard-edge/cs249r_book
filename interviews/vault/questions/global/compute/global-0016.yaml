title: 'The Purpose of the Roofline Model'
scenario: 'You plot your inference workload on a Roofline Model and the point lands far to the left of the ''ridge point''.'
question: 'What does this tell you about your system?'
details:
  realistic_solution: 'It means the workload is Memory-Bound. The arithmetic intensity is too low; the processor is starving for data and cannot reach its peak theoretical compute performance (the flat roof) because it hits the slanted "memory bandwidth wall" first.'
  common_mistake: |
    **The Pitfall:** Thinking the left side of the roofline means the system is slow because of CPU limitations.
    **The Rationale:** Misinterpreting low ALU utilization as a compute deficit rather than a data starvation issue.
    **The Consequence:** Wasting effort optimizing arithmetic kernels instead of addressing memory access patterns.
  napkin_math: |
    **Assumptions & Constraints:**
    - Ridge point: 500 FLOPs/byte.
    - Peak compute: 989 TFLOPS.
    - Memory bandwidth: 2 TB/s.

    **Calculations:**
    - Workload Arithmetic Intensity (AI): 10 FLOPs/byte.
    - Achievable performance: 10 FLOPs/byte * 2 TB/s = 20 TFLOPS.
    - Compute utilization: 20 / 989 ≈ 2%.

    **Conclusion & Interpretation:**
    - **Result: 2% compute utilization (Memory-Bandwidth-Bound)**. Dominates execution time.
  options:
  - 'The system is CPU-Bound due to slow instruction dispatch.'
  - 'The workload is Memory-Bound (Bandwidth constrained).'
  - 'The workload is Compute-Bound (ALU constrained).'
  - 'The hardware is experiencing thermal throttling on the memory bus.'
  correct_index: 1
