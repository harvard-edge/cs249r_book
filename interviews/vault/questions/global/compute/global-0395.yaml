title: Chiplet Bandwidth Budget
scenario: A proposed accelerator uses four compute chiplets. Each chiplet produces 25 GB/s of activation traffic that must cross an interposer during model-parallel inference. The interposer provides 300 GB/s aggregate bisection bandwidth.
question: "Does a four-chiplet design with 25 GB/s cross-chiplet traffic per chiplet fit within 300 GB/s bisection bandwidth?"
details:
  realistic_solution: 'Total cross-chiplet demand is 4 x 25 = 100 GB/s under one-way accounting of producer traffic. That is below 300 GB/s, leaving 3x bandwidth headroom for this simplified traffic matrix. The design still needs topology and traffic-matrix validation because all-to-all exchange, contention, and latency can consume headroom.'
  common_mistake: 'Comparing one chiplet’s traffic to aggregate bandwidth without summing all producers, or assuming bandwidth headroom eliminates topology latency concerns.'
  napkin_math: |
    **Assumptions & Constraints:**
    - 4 compute chiplets.
    - 25 GB/s activation traffic generated per chiplet.
    - 300 GB/s interposer aggregate bisection bandwidth.
    
    **Calculations:**
    - Total cross-chiplet demand = 4 chiplets * 25 GB/s = 100 GB/s.
    - Bandwidth headroom ratio = 300 GB/s capacity / 100 GB/s demand = 3x headroom.
    
    **Conclusion & Interpretation:**
    - **Result: 3x Bandwidth Headroom (Topology Bound)**. While the raw demand easily fits, a simplistic traffic matrix assumes perfect routing; realistic all-to-all collision and topology latency must still be validated.
