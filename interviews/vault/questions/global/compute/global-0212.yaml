title: Roofline Classification of Elementwise Operations
scenario: You apply ReLU activation to a tensor of 100M FP16 elements on an accelerator.
question: What is the arithmetic intensity of ReLU on 100M FP16 elements, and what maximum TFLOPS can it achieve on an A100?
details:
  realistic_solution: FLOPs = 100M (one comparison). Memory = read 100M * 2 bytes + write 100M * 2 bytes = 400 MB. AI = 0.25 FLOP/byte. A100 ridge = 156 FLOP/byte. Achievable TFLOPS = 0.25 * 2.0 TB/s = 0.5 TFLOPS (0.16% of peak). Fusing ReLU into a matmul avoids the HBM round trip entirely.
  common_mistake: |
    **The Pitfall:** Thinking elementwise operations can saturate the GPU's FLOP throughput.
    **The Rationale:** Treating all neural network layers as computationally intensive.
    **The Consequence:** Overlooking the massive benefit of kernel fusion, which avoids the HBM round trip entirely.
  napkin_math: |
    **Assumptions & Constraints:**
    - 100M FP16 elements.
    - A100 Bandwidth = 2.0 TB/s. Ridge = 156 FLOPs/byte.

    **Calculations:**
    - AI = 100M FLOPs / 400 MB = 0.25 FLOPs/byte.
    - Max Throughput = 0.25 * 2.0 TB/s = 0.5 TFLOPS.

    **Conclusion & Interpretation:**
    - **Result: Memory-Bound (0.16% Peak)**. Elementwise operations fall far below peak compute capability.
