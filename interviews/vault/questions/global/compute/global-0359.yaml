title: Cross-Regime Compute Budget Triage
scenario: A 20B-op model variant can run on Cloud GPU (100 TFLOP/s, 120 ms RTT), Mobile NPU (10 TOPS, 8 ms scheduling), or TinyML MCU (100 GOPS, 200 ms deadline).
question: How would you choose between cloud, mobile, and TinyML placement for this 20B-op model using compute time plus overhead?
details:
  realistic_solution: 'Calculate end-to-end user latency, not peak TOPS. Mobile totals 10 ms, crushing the 120.2 ms Cloud path that is bogged down by RTT. TinyML misses realistic headroom. Mobile execution maximizes real-world responsiveness and circumvents network instability entirely.'
  common_mistake: |
    **The Pitfall:** Choosing the highest-TFLOP device without adding network and scheduling overhead.
    **The Rationale:** Focusing strictly on mathematical throughput and ignoring system integration delays.
    **The Consequence:** Deploying to the cloud for "speed" but severely degrading user experience due to 120ms of hidden network latency.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: 20B Ops
    - Cloud: 100 TFLOP/s, 120 ms RTT
    - Mobile: 10 TOPS, 8 ms overhead

    **Calculations:**
    - Cloud Compute: 20B / 100T = 0.2 ms -> Total: 120.2 ms
    - Mobile Compute: 20B / 10T = 2.0 ms -> Total: 10.0 ms
    - MCU Compute: 20B / 100G = 200 ms -> Total: 200 ms

    **Conclusion & Interpretation:**
    - **Result: Network-Bound (Mobile Wins)**. Mobile execution maximizes real-world responsiveness and circumvents network RTT.
