title: Memory Bandwidth Bottleneck Analysis for Custom Attention
scenario: A custom attention kernel for Llama-2 runs on an A100 80GB SXM, loading
  FP16 KV blocks into Shared Memory (SRAM) for matrix multiplication. The HBM2e bandwidth
  is 2.0 TB/s and tensor core peak is 312 TFLOP/s.
question: Analyze the arithmetic intensity of a 64x64 block load and calculate the
  required factor of data reuse needed to saturate the tensor cores.
details:
  realistic_solution: Saturating the A100 tensor cores requires an arithmetic intensity
    of 312 TFLOP/s / 2.0 TB/s = 156 FLOPs/byte. Loading two 64x64 FP16 blocks fetches
    2 * 64 * 64 * 2 = 16,384 bytes. The matrix multiplication 64 x 64 x 64 requires
    2 * (64^3) = 524,288 FLOPs. The current intensity is 524,288 / 16,384 = 32 FLOPs/byte,
    meaning the kernel is memory-bound and requires roughly 5x more reuse (via larger
    tiles or MQA) to hit compute bounds.
  common_mistake: Computing FLOPs as purely N^3 instead of 2N^3 for multiply-accumulate,
    or forgetting the 2-byte factor for FP16.
  napkin_math: 312e12 / 2.0e12 = 156. 524288 / 16384 = 32.
