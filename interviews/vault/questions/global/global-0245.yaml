title: Right-Sizing an Inference Fleet for Variable Traffic
scenario: Your LLM service traffic varies 10x between peak (1000 req/s) and trough (100 req/s) over 24 hours. Each GPU handles 50 req/s. On-demand GPUs cost $3/hr, reserved (1-year) cost $1.50/hr.
question: "How would you design the optimal fleet composition to minimize annual cost while meeting peak demand?"
details:
  realistic_solution: 'Peak GPUs needed = 1000/50 = 20. Trough = 100/50 = 2. Reserved pricing breaks even at 50% utilization ($1.50/$3.00). Therefore, you should reserve any capacity that is utilized more than 12 hours per day. Assuming traffic forms a daily triangle wave between 2 and 20 GPUs, the duration a capacity level Y is needed is 24h * (20 - Y) / 18. Setting this to > 12h yields Y < 11. Optimal reservation is 11 GPUs. Reserve cost: 11 × $1.50 × 8760h = $144,540/yr. The remaining peak (from 11 to 20 GPUs) forms a triangle over 12 hours. Area = 0.5 × 9 GPUs × 12h = 54 GPU-hours/day. On-demand cost: 54 × 365 × $3 = $59,130/yr. Total = $203,670/yr. In contrast, all-reserved costs $262,800/yr and all-on-demand costs $289,080/yr.'
  common_mistake: |
    **The Pitfall:** Over-provisioning with all reserved instances or under-provisioning with all on-demand.
    **The Rationale:** Seeking management simplicity instead of performing area-under-the-curve utilization math.
    **The Consequence:** Wasting tens of thousands of dollars annually on idle GPUs or peak premiums.
  napkin_math: |
    - **Peak/Trough GPUs**: Peak = 1000/50 = 20. Trough = 100/50 = 2.
    - **Break-even Utilization**: $1.50 / $3.00 = 50% (12 hours/day).
    - **Optimal Base**: 11 GPUs reserved (covers the >12h demand profile). Cost = 11 * $1.50 * 8760 = $144,540/yr.
    - **On-Demand Burst**: Triangle from 11 to 20 GPUs. Area = 0.5 * 9 GPUs * 12h = 54 GPU-hours/day.
    - **Burst Cost**: 54 * 365 * $3 = $59,130/yr.
    - **Conclusion**: A hybrid model costs **$203,670/yr**, saving massively over all-reserved ($262.8K) or all-on-demand ($289.1K).
