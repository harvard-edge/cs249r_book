title: Right-Sizing an Inference Fleet for Variable Traffic
scenario: Your LLM service has traffic that varies 10× between peak (1000 req/s) and trough (100 req/s)
  over 24 hours. Each GPU handles 50 req/s. On-demand GPUs cost $3/hr, reserved (1-year) cost $1.50/hr.
  Design the optimal fleet composition to minimize annual cost while meeting peak demand.
details:
  realistic_solution: 'Peak GPUs needed = 1000/50 = 20. Trough = 100/50 = 2. Strategy: reserve enough
    for the sustained baseline, use on-demand for bursts. If trough lasts 12h and peak lasts 12h (simplified):
    reserve 2 GPUs (always needed): 2 × $1.50 × 8760h = $26,280/yr. On-demand for peak delta: average
    additional GPUs during peak hours ≈ (20-2)/2 × 12h (triangle approximation) = 9 extra GPUs × 12h ×
    365d × $3 = $118,260. Total = $144,540. Optimized: reserve ~8 GPUs (covers ~80% of traffic hours):
    8 × $1.50 × 8760 = $105,120. On-demand: ~6 GPUs × 6h/day × 365 × $3 = $39,420. Total = $144,540. Analysis
    shows reserve 6-8 GPUs is optimal. Adding autoscaling with 2-minute spin-up + predictive scaling reduces
    on-demand waste by ~30%.'
  common_mistake: Either over-provisioning with all reserved instances (paying for idle capacity) or under-provisioning
    with all on-demand (paying premium at peak).
  napkin_math: 'Reserve base = 2-8 GPUs. On-demand peak = 12-18 GPUs for ~12h/day. Sweet spot: reserve
    6 GPUs ($78,840/yr) + on-demand burst ($50K) = ~$129K vs all-on-demand ($263K) or all-reserved ($263K).'
