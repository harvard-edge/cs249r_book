title: Right-Sizing an Inference Fleet for Variable Traffic
scenario: Your LLM service has traffic that varies 10× between peak (1000 req/s) and trough (100 req/s)
  over 24 hours. Each GPU handles 50 req/s. On-demand GPUs cost $3/hr, reserved (1-year) cost $1.50/hr.
  Design the optimal fleet composition to minimize annual cost while meeting peak demand.
question: "How would you design the optimal fleet composition to minimize annual cost while meeting peak demand?"
details:
  realistic_solution: 'Peak GPUs needed = 1000/50 = 20. Trough = 100/50 = 2. Reserved pricing breaks even
    at 50% utilization ($1.50/$3.00). Therefore, you should reserve any capacity that is utilized more
    than 12 hours per day. Assuming traffic forms a daily triangle wave between 2 and 20 GPUs, the duration
    a capacity level Y is needed is 24h * (20 - Y) / 18. Setting this to > 12h yields Y < 11. Optimal
    reservation is 11 GPUs. Reserve cost: 11 × $1.50 × 8760h = $144,540/yr. The remaining peak (from
    11 to 20 GPUs) forms a triangle over 12 hours. Area = 0.5 × 9 GPUs × 12h = 54 GPU-hours/day. On-demand
    cost: 54 × 365 × $3 = $59,130/yr. Total = $203,670/yr. In contrast, all-reserved costs $262,800/yr
    and all-on-demand costs $289,080/yr.'
  common_mistake: 'Either over-provisioning with all reserved instances (paying for idle capacity) or under-provisioning
    with all on-demand (paying premium at peak).'
  napkin_math: 'Break-even utilization = 50% (12h/day). For a triangle traffic pattern from 2 to 20 GPUs,
    the 50% width occurs exactly halfway up at 11 GPUs. Reserve 11 GPUs ($144.5K/yr) + on-demand burst
    for the tip of the triangle ($59.1K) = ~$203.6K vs all-reserved ($262.8K) or all-on-demand ($289.1K).'
