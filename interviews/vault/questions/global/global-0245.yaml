title: Right-Sizing an Inference Fleet for Variable Traffic
scenario: Your LLM service traffic varies 10x between peak (1000 req/s) and trough (100 req/s) over 24 hours. Each GPU handles 50 req/s. On-demand GPUs cost $3/hr, reserved (1-year) cost $1.50/hr.
question: How would you design the optimal fleet composition to minimize annual cost while meeting peak demand?
details:
  realistic_solution: 'Peak GPUs = 20. Trough = 2. Reserved pricing breaks even at 50% utilization ($1.50/$3.00). Reserve any capacity utilized >12 hours/day. Triangle wave demand model -> Optimal base is 11 GPUs. Reserve cost: 11 * $1.50 * 8760h = $144,540/yr. On-demand burst area = 0.5 * 9 GPUs * 12h = 54 GPU-hours/day. On-demand cost: 54 * 365 * $3 = $59,130/yr. Total = $203,670/yr.'
  common_mistake: |
    **The Pitfall:** Over-provisioning with all reserved instances or under-provisioning with all on-demand.
    **The Rationale:** Seeking management simplicity instead of performing area-under-the-curve utilization math.
    **The Consequence:** Wasting tens of thousands of dollars annually on idle GPUs or peak premiums.
  napkin_math: |
    **Assumptions & Constraints:**
    - Peak = 20 GPUs, Trough = 2 GPUs.
    - Break-even utilization = $1.50 / $3.00 = 50% (12 hours).

    **Calculations:**
    - Base reserved = 11 GPUs * $1.50 * 8760 = $144,540/yr.
    - Burst on-demand = 54 GPU-hours/day * $3 * 365 = $59,130/yr.
    - Total = $203,670/yr.

    **Conclusion & Interpretation:**
    - **Result: Utilization-Bound Sizing**. Optimal fleet mixes reserved and on-demand to balance costs.
