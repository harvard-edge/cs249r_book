title: Global Inference Fanout Bandwidth
scenario: A global inference request fans out to 6 regional feature services. Each subrequest returns 150 KB. Peak traffic is 8,000 user requests/s. Estimate aggregate return bandwidth from feature fanout.
question: What aggregate return bandwidth comes from 8,000 rps when each request fans out to six 150 KB feature responses?
details:
  realistic_solution: Each user request returns 6 x 150 KB = 900 KB from feature services. At 8,000 rps, aggregate return traffic is 7.2 GB/s. That can become a network bottleneck even if the model server itself is fast.
  common_mistake: Counting only the model request payload and ignoring fanout responses from dependent services.
  napkin_math: Per request = 900 KB. Bandwidth = 900 KB x 8,000/s = 7,200,000 KB/s ≈ 7.2 decimal GB/s, or about 57.6 Gb/s.
