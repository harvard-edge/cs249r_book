title: Chiplet Topology Spec For Model Parallelism
scenario: A hardware team asks what interconnect metrics an ML systems team needs before approving a chiplet accelerator for transformer inference. The model will use tensor-parallel shards that exchange activations every layer. Specify the minimum topology and bandwidth information required.
question: What chiplet interconnect specs are required to evaluate tensor-parallel transformer inference on a chiplet accelerator?
details:
  realistic_solution: The spec must include per-link bandwidth, bisection bandwidth, hop latency, topology, routing contention, memory locality, collective support, and sustained rather than peak bandwidth. Because tensor parallelism exchanges activations every layer, the systems team also needs payload size per layer and whether communication overlaps compute.
  common_mistake: Accepting only peak TOPS and aggregate bandwidth numbers, which hide collective latency and topology bottlenecks.
  napkin_math: If each of 80 layers exchanges a 20 MB activation and sustained bandwidth is 200 GB/s, the raw transfer scale is 80 x 20 MB / 200 GB/s = 8 ms before latency and contention.
