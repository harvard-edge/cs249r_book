title: Optimal Checkpointing Interval
scenario: A 256-GPU training cluster has a mean-time-between-failures (MTBF) of 4 hours. Writing a full checkpoint takes 5 minutes and stalls training.
question: What checkpoint interval minimizes wasted compute for the 256-GPU cluster, and what overhead does it imply?
details:
  realistic_solution: 'The optimal checkpoint interval follows: t_opt = sqrt(2 × MTBF × t_ckpt). t_opt = sqrt(2 × 240 min × 5 min) = sqrt(2400) ≈ 49 minutes. At this interval: checkpoint overhead = 5/49 ≈ 10.2% of training time. Expected wasted work per failure = t_opt/2 = 24.5 minutes. Total overhead ≈ checkpoint_cost + expected_waste/MTBF = 10.2% + (24.5/240) = 10.2% + 10.2% ≈ 20.4%. Without checkpointing, you''d lose on average 2 hours per failure = 50% waste.'
  common_mistake: |
    **The Pitfall:** Checkpointing too frequently to avoid losing work, or too infrequently to avoid I/O stalls.
    **The Rationale:** Guessing the interval rather than applying the standard Daly checkpointing formula.
    **The Consequence:** Wasting significant compute either through excessive idle time writing to disk or massive recalculations upon node failure.
  napkin_math: |
    - **MTBF:** 4 hours = **240 minutes**
    - **Optimal Interval (t_opt):** sqrt(2 × MTBF × t_ckpt) = sqrt(2 × 240 × 5) = sqrt(2400) ≈ **49 minutes**
    - **Checkpoint Overhead:** 5 minutes / 49 minutes ≈ **10.2%**
    - **Expected Waste per Failure:** 49 / 2 = **24.5 minutes** (≈ 10.2% of MTBF)
    - **Total Overhead:** 10.2% (I/O) + 10.2% (waste) ≈ **20.4%**
