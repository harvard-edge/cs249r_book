title: Optimal Checkpointing Interval
scenario: A 256-GPU training cluster has a mean-time-between-failures (MTBF) of 4 hours. Writing a full
  checkpoint takes 5 minutes and stalls training. Estimate the optimal checkpoint interval to minimize
  wasted compute.
question: "What checkpoint interval minimizes wasted compute for the 256-GPU cluster, and what overhead does it imply?"
details:
  realistic_solution: 'The optimal checkpoint interval follows: t_opt = sqrt(2 × MTBF × t_ckpt). t_opt
    = sqrt(2 × 240 min × 5 min) = sqrt(2400) ≈ 49 minutes. At this interval: checkpoint overhead = 5/49
    ≈ 10.2% of training time. Expected wasted work per failure = t_opt/2 = 24.5 minutes. Total overhead
    ≈ checkpoint_cost + expected_waste/MTBF = 10.2% + (24.5/240) = 10.2% + 10.2% ≈ 20.4%. Without checkpointing,
    you''d lose on average 2 hours per failure = 50% waste.'
  common_mistake: Checkpointing too frequently wastes time on I/O; too infrequently means losing hours
    of work on failure. The classic square-root formula gives the optimum.
  napkin_math: 't_opt = sqrt(2 × 240 × 5) = sqrt(2400) ≈ 49 min. Ckpt overhead: 5/49 ≈ 10%. Waste per
    failure: 49/2 = 25 min. Total overhead ≈ 20%.'
