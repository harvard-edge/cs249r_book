title: Real-Time Tokenization Pipeline at Scale
scenario: Design a tokenization pipeline that converts raw text to tokens at 10M tokens/sec to feed a 512-GPU training cluster. The tokenizer is BPE with 128K vocabulary. Raw text arrives as UTF-8 at 200 MB/s. Tokenization is CPU-bound at 500K tokens/sec per core.
question: How would you specify the architecture to achieve 10M tokens/sec throughput?
details:
  realistic_solution: 'Architecture: (1) Pre-tokenize offline and store as binary token IDs (preferred): tokenize the entire dataset once, store as memory-mapped numpy arrays of uint16. This eliminates runtime tokenization. (2) If online tokenization is required: parallelize across 24 CPU cores. Use a multi-process tokenizer pool with shared-memory ring buffers.'
  common_mistake: |
    **The Pitfall:** Running tokenization as a single-threaded preprocessing step.
    **The Rationale:** Treating text processing as a lightweight task that won't bottleneck GPUs.
    **The Consequence:** Starving a massive 512-GPU cluster because the data loader cannot supply tokens fast enough.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Target throughput: 10M tokens/sec.
       - Core capacity: 500K tokens/sec per core.
       - Dataset: 2T tokens.
    2. **Calculations:**
       - Cores required: 10M / 500K = 20 CPU cores.
       - Ring buffer size (10s): 10M tokens/s * 10s * 2 bytes/token = 200 MB.
       - Offline option: 2T tokens * 2 bytes = 4 TB storage, streaming at 20 MB/s.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound.** Offline pre-tokenization entirely bypasses the CPU bottleneck.
