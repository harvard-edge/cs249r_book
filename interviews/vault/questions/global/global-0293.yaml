title: Real-Time Tokenization Pipeline at Scale
scenario: Design a tokenization pipeline that converts raw text to tokens at 10M tokens/sec to feed a 512-GPU training cluster. The tokenizer is BPE with 128K vocabulary. Raw text arrives as UTF-8 at 200 MB/s. Tokenization is CPU-bound at 500K tokens/sec per core.
question: How would you specify the architecture to achieve 10M tokens/sec throughput?
details:
  realistic_solution: 'Architecture: (1) Pre-tokenize offline and store as binary token IDs (preferred): tokenize the entire dataset once, store as memory-mapped numpy arrays of uint16 (128K vocab fits in uint16). Storage: 2 bytes/token x 2T tokens = 4 TB. This eliminates runtime tokenization entirely. Loading 10M tokens/sec x 2 bytes = 20 MB/s — trivial bandwidth. (2) If online tokenization is required (streaming data): parallelize across 24 CPU cores (10M / 500K = 20, plus 20% overhead). Use a multi-process tokenizer pool with shared-memory ring buffers. Architecture: raw text -> chunker (split on sentence boundaries to avoid cross-chunk BPE issues) -> 24 tokenizer workers (each with its own BPE model loaded) -> merge buffer (reorders chunks) -> batched tensor output -> GPU via DMA. (3) Backpressure handling: ring buffer between tokenizer pool and GPU dataloader holds 10 seconds of tokens (10M x 10 = 100M tokens x 2B = 200 MB). If GPUs consume faster than tokenizers produce, stall detected and alert fired. (4) Memory layout: pack tokenized sequences into fixed-length chunks (2048 or 4096 tokens) with attention mask. Use packing (concatenate short sequences with separator tokens) to avoid padding waste — increases effective throughput by 15-30% for variable-length inputs.'
  common_mistake: |
    **The Pitfall:** Running tokenization as a single-threaded preprocessing step.
    **The Rationale:** Treating text processing as a lightweight task that won't bottleneck GPUs.
    **The Consequence:** Starving a massive 512-GPU cluster because the data loader cannot supply tokens fast enough.
  napkin_math: |
    - Target throughput: 10M tokens/sec.
    - Core capacity: 500K tokens/sec per core.
    - Cores required: 10M / 500K = **20 CPU cores**.
    - Ring buffer size (10s): 10M tokens/s × 10s × 2 bytes/token = **200 MB**.
    - Offline option: 2T tokens × 2 bytes = **4 TB storage**, streaming at 20 MB/s (trivial SSD bandwidth).
