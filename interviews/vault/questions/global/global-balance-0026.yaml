title: Quantization Tier Rollout
scenario: A product wants one model family across cloud, mobile, and TinyML. Cloud can run BF16, mobile can run INT4, and TinyML needs binary weights. Design a tiered rollout that keeps quality claims honest.
question: How would you design a BF16, INT4, and binary-weight rollout without making misleading cross-regime quality claims?
details:
  realistic_solution: Treat each precision tier as a separate product variant with its own validation, supported tasks, and fallback behavior. Do not claim the binary TinyML model is equivalent to BF16 cloud unless measured on the same task distribution. Report per-tier quality, latency, memory, and energy.
  common_mistake: Advertising one model quality number across very different precision and hardware regimes.
  napkin_math: Idealized weight storage uses about 16 bits/weight for BF16, 4 bits/weight for INT4, and 1 bit/weight for binary. That is roughly 4x shrink from BF16 to INT4 and 16x from BF16 to binary before scales, lookup tables, and runtime buffers.
