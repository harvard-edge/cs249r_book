title: Evaluate Portable Model Claims
scenario: A team claims a model is portable because it exports to ONNX. On cloud it runs on GPU, on mobile two ops fall back to CPU, and on edge dynamic shapes are unsupported. Evaluate the portability claim.
question: Is ONNX export enough to claim a model is portable across cloud, mobile, and edge runtimes?
details:
  realistic_solution: No. File-format portability is not execution portability. The claim must include operator support, shape support, quantization compatibility, fallback cost, and numerical parity per target. CPU fallback and unsupported dynamic shapes are evidence the model is not yet portable in production.
  common_mistake: Equating export success with efficient and correct execution on every target.
  napkin_math: If two CPU fallback ops account for 40% of mobile latency, the ONNX export technically runs but fails the performance portability requirement.
