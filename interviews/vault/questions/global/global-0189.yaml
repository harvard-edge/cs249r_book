title: The Time-to-First-Token Across Oceans
scenario: An LLM inference service in US-East has a prefill time of 120ms for a 500-token prompt. A user in London (RTT = 75ms) and a user in Tokyo (RTT = 160ms) each send the same prompt. Assume persistent connections (no TLS overhead). The service has a 200ms TTFT SLA.
question: "What TTFT will the London and Tokyo users see, do they meet the 200 ms SLA, and what would fix Tokyo if it misses?"
details:
  realistic_solution: 'User-perceived TTFT = request one-way latency + prefill + response one-way latency = RTT + prefill (since one-way ≈ RTT/2 each way). London: 75ms + 120ms = 195ms. Meets 200ms SLA (barely, 5ms margin). Tokyo: 160ms + 120ms = 280ms. Violates 200ms SLA by 80ms. To fix Tokyo, options: (1) Deploy model replica in Asia-Pacific (TTFT = ~10ms + 120ms = 130ms). (2) Use speculative decoding to reduce prefill to 60ms (TTFT = 160 + 60 = 220ms — still over). (3) Cache common prompt prefixes at edge (if applicable). The physics-based analysis makes it clear: only deploying a regional replica solves the Tokyo SLA.'
  common_mistake: 'Thinking TTFT = prefill time. TTFT as experienced by the user includes the network round trip: request travel time + prefill + first token travel time = 1 RTT + prefill.'
  napkin_math: |
    **Assumptions & Constraints:**
    - US-East Prefill time = 120ms.
    - London RTT = 75ms.
    - Tokyo RTT = 160ms.
    - Target TTFT SLA = 200ms.
    
    **Calculations:**
    - London TTFT = 75ms RTT + 120ms prefill = 195ms.
    - Tokyo TTFT = 160ms RTT + 120ms prefill = 280ms.
    - Required Tokyo prefill to meet SLA = 200ms - 160ms = 40ms.
    
    **Conclusion & Interpretation:**
    - **Result: 280ms Tokyo TTFT (Network Latency Bound)**. London barely meets the SLA, while Tokyo fails by 80ms. A regional replica is required because the physics of network RTT consumes too much of the SLA budget.
