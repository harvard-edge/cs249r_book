title: INT8 Quantization Serving Throughput Gain
scenario: Your 13B-parameter model in FP16 achieves 40 tokens/s on an A100 during decode, which is memory-bandwidth-bound.
  You quantize to INT8. Estimate the new throughput assuming decode remains memory-bound.
details:
  realistic_solution: In memory-bound decode, throughput scales linearly with bytes-per-parameter reduction.
    FP16 = 2 bytes/param, INT8 = 1 byte/param, so memory traffic halves. Model size drops from 26 GB to
    13 GB. Since decode is bandwidth-bound, throughput roughly doubles to ~80 tokens/s. In practice, you
    get slightly less due to dequantization overhead and activation memory, but 1.7-1.9× is realistic.
  common_mistake: Assuming quantization gives a 4× speedup because 'INT8 is 4× smaller than FP32.' The
    baseline here is FP16, so the reduction is 2×.
  napkin_math: 'FP16: 13B × 2B = 26 GB. INT8: 13B × 1B = 13 GB. Bandwidth saving = 2×. Decode is memory-bound
    → throughput ≈ 2 × 40 = ~80 tok/s.'
