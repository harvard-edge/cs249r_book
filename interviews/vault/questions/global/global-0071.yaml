title: Fast Recovery via In-Memory Redundancy
scenario: A 3D-parallel training job on 2,048 GPUs crashes twice a day due to single-node Xid hardware
  faults. Currently, the entire job restarts by reading a 1.5TB checkpoint from network storage, taking
  15 minutes per restart. You need to architect a recovery mechanism that reduces restart time to under
  1 minute for single-node failures.
question: "How would you design recovery to restart in under 1 minute after a single-node fault instead of reloading 1.5 TB from storage?"
details:
  realistic_solution: Architect an in-memory checkpointing topology with neighbor-node redundancy. Instead
    of only writing state to remote object storage, nodes synchronously keep a copy of their local state
    in their own CPU RAM, and asynchronously send a replica to a neighboring node's CPU RAM via Infiniband
    (e.g., Node i sends to Node i+1). When a single node fails, the cluster orchestrator immediately provisions
    a hot-standby node. The standby node retrieves the missing state from the neighbor's CPU RAM. Only
    the failed rank's state is reconstructed over the network, and the surviving 2,047 GPUs instantly
    reload their state from their own local CPU RAM, bypassing the slow object storage completely.
  common_mistake: Caching the checkpoint on local NVMe drives without cross-node replication, meaning
    the data is lost if the node completely dies.
  napkin_math: 'Global state = 1.5 TB. Per-GPU state = 1.5 TB / 2,048 \approx 750 MB. Per-node state (8
    GPUs) = 6 GB.

    CPU RAM easily fits 6 GB of local state + 6 GB of neighbor state.

    Fetching 6 GB from a neighbor over 400 Gbps (50 GB/s) Infiniband takes 6 / 50 = 0.12 seconds.

    NCCL process group re-initialization takes ~10 seconds. Total recovery time drops from 900 seconds
    to ~15 seconds.'
