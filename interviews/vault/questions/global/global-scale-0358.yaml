title: Incomplete Latency SLO Diagnosis
scenario: A serving API misses a 300 ms SLO in some deployments. The team gives average model inference time of 120 ms but omits queueing, network, preprocessing, cold-start, P99 distribution, and client device scheduling delays.
question: What additional latency components are required before diagnosing a 300 ms SLO miss from a 120 ms average model time?
details:
  realistic_solution: 'You need a latency decomposition at the same percentile as the SLO: preprocessing, queueing, model execution, data transfer, network, cold-start, postprocessing, and client scheduling. The known 120 ms average leaves 180 ms against a 300 ms budget, but averages cannot explain P99 misses.'
  common_mistake: Optimizing the model because average inference is visible, while hidden queueing or cold-start dominates tail latency.
  napkin_math: Average headroom = 300 - 120 = 180 ms. But a P99 queue of 220 ms can violate the SLO even if average model time is unchanged.
