title: Defining Arithmetic Intensity
scenario: You are analyzing an ML workload using the Roofline Model.
question: "What exactly does Arithmetic Intensity measure?"
details:
  realistic_solution: 'Arithmetic Intensity is the ratio of operations performed to data moved. It dictates whether your model will be bottlenecked by the ALU (compute) or the memory bus (bandwidth).'
  common_mistake: |
    **The Pitfall:** Confusing it with clock speed or raw TFLOPS throughput.
    **The Rationale:** Candidates often focus on peak compute metrics and ignore the memory bandwidth constraints that govern real-world performance.
    **The Consequence:** Leads to optimizing the wrong parts of the stack, focusing on compute when the bottleneck is memory.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Matrix multiply (1024x1024) vs Element-wise ReLU (FP16).
    2. **Calculations:**
       - MatMul FLOPs = 2 * 1024^3 = 2.14B FLOPs.
       - MatMul Memory = 3 * 1024^2 * 2 bytes = 6.29 MB.
       - MatMul AI = 2.14B / 6.29 MB = ~340 FLOPs/byte.
       - ReLU AI = 1 FLOP / 2 bytes = 0.5 FLOPs/byte.
    3. **Conclusion & Interpretation:**
       - **Result: High AI (340) is Compute-Bound, Low AI (0.5) is Memory-Bound.**
  options:
  - The number of mathematical operations (FLOPs) performed per byte of data accessed from memory.
  - The ratio of FP16 operations to FP32 operations.
  - A theoretical peak throughput of 2.14 GFLOPs per second on Tensor Cores.
  - The thermal design power (TDP) required to sustain maximum clock speed.
