title: Realize Cross-Device Parallelism Limits
scenario: A team wants one distributed inference plan that can run a 40 GB model across cloud GPUs, an edge box with two accelerators, and a mobile device with CPU plus NPU. They propose tensor parallelism everywhere.
question: What practical limits should change the parallelism strategy across cloud, edge, and mobile targets?
details:
  realistic_solution: Tensor parallelism is plausible in cloud where links are high bandwidth and synchronization is engineered, but edge and mobile targets usually need coarser partitioning, batching, caching, or model compression. The realization is that the same graph split has different communication costs, memory limits, and failure modes across targets.
  common_mistake: |
    **The Pitfall:** Assuming a model split that works across NVLink GPUs will also work seamlessly across PCIe, USB, or mobile CPU-to-NPU boundaries.
    **The Rationale:** Treating all hardware interconnects as having identical bandwidth and latency characteristics.
    **The Consequence:** Creating a deployment plan that severely bottlenecks on communication latency across slower physical links.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Link speed: 10 GB/s (e.g., PCIe/USB edge limit).
       - Activation transfer size: 200 MB.
       - Target interactive latency: 50 ms.
    2. **Calculations:**
       - Transfer time per sync: 200 MB / 10 GB/s = 0.02 seconds = 20 ms.
    3. **Conclusion & Interpretation:**
       - **Result: 20 ms sync overhead. Interconnect-Latency-Bound, destroying the 50 ms budget.**
