title: PSRAM Strided Access Overhead
scenario: An ESP32-S3 (2MB PSRAM, 512KB SRAM) runs on-device FL personalization. The forward pass takes
  24ms. The backward pass (calculating gradients for the last dense layer) takes ~264ms and causes a thermal
  warning. Both passes process a batch of 64 samples and perform roughly 1.2M MAC operations.
question: "Why is the ESP32-S3 backward pass about 10x slower and thermally worse than the forward pass with the same MAC count?"
details:
  realistic_solution: The failure is poor spatial locality during the backward pass accessing external
    PSRAM. The forward pass reads memory sequentially (batch x features). The backward pass often transposes
    matrices or uses strided access to calculate gradients (features x batch). Because PSRAM accesses
    are fetched in 32-byte cache lines over the SPI bus, a strided access pattern causes a cache miss
    on almost every float read, leading to extreme SPI bus utilization and processor stall cycles.
  common_mistake: Assuming the backward pass lacks hardware SIMD/DSP acceleration and runs purely in unoptimized
    C code.
  napkin_math: '1.2M MACs. Sequential (forward): 1 miss per 8 floats (32B) = 150k misses. Strided (backward):
    1 miss per float = 1.2M misses. PSRAM miss penalty = 50 cycles at 240MHz (~200ns). 1.2M misses * 200ns
    = 240ms of pure memory stall time. Added to the base ~24ms compute, this pushes total execution time
    to ~264ms.'
