title: The HBM vs L1 Latency Gap
scenario: Roughly how much slower is accessing HBM3 memory compared to an L1 register read?
details:
  realistic_solution: 'HBM3 access is roughly 300x slower than an L1 register read. An L1 register sits
    physically adjacent to the ALU and completes in ~1ns. HBM3, despite being the fastest DRAM available,
    requires ~300ns because the data must travel off the compute die, across an interposer, and into the
    HBM stacks. This 300x gap is why the entire roofline model exists: if your kernel cannot reuse data
    from registers and caches, it will spend most of its time waiting for memory, not computing.'
  common_mistake: Assuming the gap is small, like 10×. In reality, crossing the physical distance from
    the compute core to the HBM stacks is a massive latency event.
  napkin_math: If an L1 read was 1 second, an HBM read would be 5 minutes.
