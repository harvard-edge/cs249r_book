title: The HBM vs L1 Latency Gap
scenario: Compare the access latency between an L1 register read and HBM3 memory.
question: Roughly how much slower is accessing HBM3 memory compared to an L1 register read?
details:
  realistic_solution: 'HBM3 access is roughly 300x slower than an L1 register read. An L1 register sits physically adjacent to the ALU and completes in ~1ns. HBM3, despite being the fastest DRAM available, requires ~300ns because the data must travel off the compute die, across an interposer, and into the HBM stacks. This 300x gap is why the entire roofline model exists: if your kernel cannot reuse data from registers and caches, it will spend most of its time waiting for memory, not computing.'
  common_mistake: |
    **The Pitfall:** Assuming the gap between L1 and HBM3 is small, such as 10x.
    **The Rationale:** Underestimating the severe physical distance penalty of crossing the compute die and interposer to reach HBM stacks.
    **The Consequence:** Writing poorly optimized, memory-bound custom kernels that fail to utilize on-chip SRAM.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - L1 register read latency: ~1 ns.
       - HBM3 read latency: ~300 ns.
    2. **Calculations:**
       - Latency ratio: 300 ns / 1 ns = 300x slower.
       - If an L1 read was 1 second, an HBM read would be 5 minutes.
    3. **Conclusion & Interpretation:**
       - **Result: ~300x slower. Latency-Bound by physical data movement.**
