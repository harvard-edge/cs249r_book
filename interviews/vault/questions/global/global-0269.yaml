title: A100 vs H100 Performance per Watt
scenario: The A100 has 312 TFLOPS FP16 at 400W TDP. The H100 has 989 TFLOPS FP16 at 700W TDP. Your data center has a fixed 2MW power budget, with 70% (1.4MW) available for GPUs.
question: How many PFLOPS can you achieve with A100s versus H100s in this 2MW facility?
details:
  realistic_solution: 'Performance/watt: A100 = 312 TFLOPS / 400W = 0.78 TFLOPS/W. H100 = 989 TFLOPS / 700W = 1.41 TFLOPS/W. Efficiency gain: 1.41/0.78 = 1.81x — the H100 delivers 1.81x more FLOPS per watt. For a 2MW power budget (assuming 70% for GPUs after cooling/networking overhead = 1.4MW): A100: 1.4MW / 400W = 3,500 GPUs -> 3,500 x 312 TFLOPS = 1,092 PFLOPS. H100: 1.4MW / 700W = 2,000 GPUs -> 2,000 x 989 TFLOPS = 1,978 PFLOPS. The H100 delivers 1.81x more aggregate compute in the same power envelope despite having 43% fewer GPUs. This is why power-constrained data centers prefer newer GPUs even at higher per-unit cost — the TCO per FLOP is better.'
  common_mistake: |
    **The Pitfall:** Comparing only raw TFLOPS without normalizing by power.
    **The Rationale:** Looking at the 3.17x raw speedup and assuming you get 3.17x more compute in the data center.
    **The Consequence:** Overestimating the actual throughput gain because the H100 is also 1.75x more power-hungry.
  napkin_math: |
    - A100 efficiency: 312 TFLOPS / 400W = 0.78 TFLOPS/W
    - H100 efficiency: 989 TFLOPS / 700W = 1.41 TFLOPS/W
    - A100 count in 1.4MW: 1,400,000W / 400W = 3,500 GPUs
    - H100 count in 1.4MW: 1,400,000W / 700W = 2,000 GPUs
    - A100 aggregate compute: 3,500 × 312 TFLOPS = **1,092 PFLOPS**
    - H100 aggregate compute: 2,000 × 989 TFLOPS = **1,978 PFLOPS**
