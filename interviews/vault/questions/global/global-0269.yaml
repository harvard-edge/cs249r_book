title: A100 vs H100 Performance per Watt
scenario: The A100 has 312 TFLOPS FP16 at 400W TDP. The H100 has 989 TFLOPS FP16 at 700W TDP. Compare
  their performance per watt. If your data center has a fixed 2MW power budget, how many PFLOPS can you
  achieve with each?
details:
  realistic_solution: 'Performance/watt: A100 = 312 TFLOPS / 400W = 0.78 TFLOPS/W. H100 = 989 TFLOPS /
    700W = 1.41 TFLOPS/W. Efficiency gain: 1.41/0.78 = 1.81x — the H100 delivers 1.81x more FLOPS per
    watt. For a 2MW power budget (assuming 70% for GPUs after cooling/networking overhead = 1.4MW): A100:
    1.4MW / 400W = 3,500 GPUs → 3,500 × 312 TFLOPS = 1,092 PFLOPS. H100: 1.4MW / 700W = 2,000 GPUs → 2,000
    × 989 TFLOPS = 1,978 PFLOPS. The H100 delivers 1.81x more aggregate compute in the same power envelope
    despite having 43% fewer GPUs. This is why power-constrained data centers prefer newer GPUs even at
    higher per-unit cost — the TCO per FLOP is better.'
  common_mistake: Comparing only raw TFLOPS without normalizing by power. The H100 is 3.17x faster but
    also 1.75x more power-hungry, so the efficiency gain is less than the raw speedup suggests.
  napkin_math: 'A100: 312T/400W = 0.78 TFLOPS/W. H100: 989T/700W = 1.41 TFLOPS/W. Ratio: 1.81x. 2MW budget
    (1.4MW for GPUs): A100 = 3500 GPUs × 312T = 1,092 PFLOPS. H100 = 2000 GPUs × 989T = 1,978 PFLOPS.'
