title: NVLink vs PCIe Bandwidth Gap
scenario: Consider a multi-GPU training setup using H100 DGX systems.
question: "What is the bidirectional bandwidth of NVLink 4.0 vs PCIe Gen5 x16, and why does this gap matter for multi-GPU training?"
details:
  realistic_solution: "NVLink 4.0 on H100 provides 900 GB/s total bidirectional bandwidth (18 links × 50 GB/s each). PCIe Gen5 x16 provides ~64 GB/s bidirectional (32 GB/s each direction). The ratio is 900/64 ≈ 14x. This gap is critical for data-parallel training: after each backward pass, all GPUs must synchronize gradients via AllReduce. For a 7B model, gradients are 14 GB in FP16. Over PCIe: 14 GB / 32 GB/s ≈ 440 ms. Over NVLink: 14 GB / 450 GB/s ≈ 31 ms (using half the bidirectional bandwidth in ring allreduce). NVLink makes gradient sync fast enough to overlap with computation; PCIe cannot."
  common_mistake: |
    **The Pitfall:** Quoting unidirectional bandwidth as total, or confusing NVLink per-link bandwidth with total aggregate bandwidth.
    **The Rationale:** Vendor spec sheets often market aggregate unidirectional numbers or per-link metrics without clear context.
    **The Consequence:** Underestimating or overestimating network transfer times, leading to flawed pipeline or tensor parallel scheduling.
  napkin_math: |
    - NVLink 4.0 on H100 provides 900 GB/s total bidirectional bandwidth.
    - PCIe Gen5 x16 provides ~64 GB/s bidirectional.
    - Bandwidth ratio: 900 / 64 ≈ 14x.
    - Gradient sync for 7B model (14GB FP16) over PCIe: 14 GB / 32 GB/s ≈ 440 ms.
    - **Over NVLink: 14 GB / 450 GB/s ≈ 31 ms.**
