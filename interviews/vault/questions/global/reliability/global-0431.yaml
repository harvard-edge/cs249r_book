title: Incomplete Training Recovery Economics
scenario: A team wants to reduce checkpoint frequency for a month-long training run to lower storage costs. They provide the checkpoint size and storage price.
question: How would you evaluate whether reducing checkpoint frequency is worth the added recovery risk for a month-long training run?
details:
  realistic_solution: 'You need cluster MTBF, checkpoint write time, restart time, preemption/failure distribution, cost of lost GPU-hours, storage bandwidth, and acceptable recovery point. Checkpoint size and storage price only bound storage cost; they do not determine optimal interval or expected lost work. Reducing frequency may save I/O while increasing lost work and schedule risk.'
  common_mistake: |
    **The Pitfall:** Optimizing storage cost while ignoring the much larger cost of recomputing lost training progress.
    **The Rationale:** Storage costs are highly visible line items, whereas statistical risk (MTBF) and recovery penalties require deeper systems analysis to quantify.
    **The Consequence:** "Saving" a few hundred dollars on object storage while routinely burning thousands of dollars in lost GPU-hours when failures inevitably occur.
  napkin_math: |
    **Assumptions & Constraints:**
    - 1,000-GPU job. Compute cost = $3/GPU-hour.
    - Lost work equivalent to 2 hours.

    **Calculations:**
    - GPU-hours lost = 1,000 GPUs * 2 hours = 2,000 GPU-hours.
    - Compute loss = 2,000 GPU-hours * $3/GPU-hour = $6,000 per failure.

    **Conclusion & Interpretation:**
    - **Result: $6,000 Compute Loss (TCO-Bound)**. The cost of lost compute ($6,000) vastly outweighs the minor savings from reduced storage frequency.
