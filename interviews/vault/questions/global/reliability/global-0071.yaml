title: Fast Recovery via In-Memory Redundancy
scenario: A 3D-parallel training job on 2,048 GPUs crashes twice a day due to single-node Xid hardware faults. Currently, the entire job restarts by reading a 1.5TB checkpoint from network storage, taking 15 minutes per restart.
question: How would you design recovery to restart in under 1 minute after a single-node fault instead of reloading 1.5 TB from storage?
details:
  realistic_solution: 'Architect an in-memory checkpointing topology with neighbor-node redundancy. Instead of only writing state to remote object storage, nodes synchronously keep a copy of their local state in their own CPU RAM, and asynchronously send a replica to a neighboring node''s CPU RAM via Infiniband. When a single node fails, the standby node retrieves the missing state from the neighbor''s CPU RAM. Only the failed rank''s state is reconstructed over the network, bypassing slow object storage.'
  common_mistake: |
    **The Pitfall:** Caching the checkpoint on local NVMe drives without cross-node replication.
    **The Rationale:** Assuming local NVMe is fast enough for recovery.
    **The Consequence:** Losing the checkpoint data completely when the physical node dies, forcing a full reload from the slow network storage anyway.
  napkin_math: |
    **Assumptions & Constraints:**
    - Global state: 1.5 TB.
    - Nodes: 256 (8 GPUs each).
    - InfiniBand: 400 Gbps (50 GB/s).
    
    **Calculations:**
    - Per-node state: 1.5 TB / 256 nodes = ~6 GB.
    - Network recovery time: 6 GB / 50 GB/s = 0.12 seconds.
    - Total restart time: NCCL re-initialization (~10s) + 0.12s = ~15s.
    
    **Conclusion & Interpretation:**
    - **Result: ~15s (Network-Bound)**. Restart time drops from 900s to ~15s, easily beating the 1-minute target.
