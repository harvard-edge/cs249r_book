title: Global Observability Signal Gap
scenario: A model regresses only for mobile users after a rollout. Cloud service metrics are green, but the mobile app reports lower task success and higher fallback use.
question: Why can cloud metrics look healthy while mobile task success drops after the same model rollout?
details:
  realistic_solution: 'The dashboard is missing client-side and fallback telemetry. Cloud service health only measures the API path; mobile degradation can come from local model fallback, device memory pressure, app version skew, or offline behavior. A global observability system must join server, client, and model-version signals.'
  common_mistake: |
    **The Pitfall:** Assuming green server metrics prove the whole ML product is healthy.
    **The Rationale:** Neglecting client-side telemetry, local model fallbacks, or device constraints.
    **The Consequence:** Leaving severe mobile degradations undetected because the global dashboard lacks a joined view of server and client signals.
  napkin_math: |
    **Assumptions & Constraints:**
    - Cloud handles 70% of requests.
    - Mobile local mode handles 30% of requests.
    
    **Calculations:**
    - 30% of traffic is invisible to server-side telemetry.
    
    **Conclusion & Interpretation:**
    - **Result: 30% Invisible (Observability-Bound)**. A server-only dashboard misses nearly a third of product interactions.
