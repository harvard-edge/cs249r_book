title: Flash Block Erase Write Amplification
scenario: A smart thermostat uses on-device FL. Every night, it writes a 64KB updated weight delta to an internal Flash partition. After 6 months, the nightly update causes the device watchdog to reset. Profiling shows the write operation, normally taking 120ms, now blocks the CPU for over 1.8 seconds.
question: Why does the nightly 64KB Flash weight-delta write grow from 120ms to 1.8s after 6 months?
details:
  realistic_solution: 'The root cause is write amplification due to poor spatial locality in the Flash storage system. Flash memory is divided into large erase pages (e.g., 4KB). As the filesystem fragments over 6 months, the 64KB update no longer writes to empty pages. Instead, it triggers garbage collection: reading partially filled pages into SRAM, erasing the flash block, and rewriting the combined data. This blocking read-modify-write cycle starves the watchdog timer.'
  common_mistake: |
    **The Pitfall:** Assuming the Flash memory cells have worn out (endurance failure).
    **The Rationale:** 6 months of nightly writes is only ~180 write cycles, which is far below the typical 10,000-100,000 cycle endurance limit of Flash memory.
    **The Consequence:** Misdiagnosing the issue leads to unnecessary hardware redesigns or replacing the Flash memory, rather than fixing the software filesystem fragmentation.
  napkin_math: |
    **Assumptions & Constraints:**
    - 64KB delta = 16 x 4KB pages.
    - Clean write time = 7.5ms per page.
    - Erase time = 85ms per block.

    **Calculations:**
    - Clean write = 16 * 7.5ms = 120ms.
    - Fragmented write requires erasing ~20 blocks.
    - Total erase time = 20 * 85ms = 1.7s.
    - Total time = 1.7s + 150ms = 1.85s.

    **Conclusion & Interpretation:**
    - **Result: Storage-Bandwidth Bound**. Flash filesystem fragmentation causes severe write amplification.
