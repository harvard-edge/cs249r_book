title: 'Incomplete Fault-Tolerance Tradeoff'
scenario: 'A team wants to reduce checkpointing overhead for training and personalization. They provide checkpoint sizes but omit failure rate, restart time, write bandwidth, acceptable data loss, and user impact of stale state.'
question: 'What missing reliability information is needed before reducing checkpoint frequency for training and personalization systems?'
details:
  realistic_solution: 'You need failure rate, restart time, write bandwidth, RPO, RTO, cost of lost progress, user impact of stale state, and storage endurance. Checkpoint size alone gives write cost but not the optimal interval. Reducing frequency may save I/O while increasing lost work and user-visible regressions.'
  common_mistake: |
    **The Pitfall:** Reducing checkpoint frequency simply because writes are expensive, without quantifying failure risk or recovery objectives.
    **The Rationale:** Treating infrastructure cost as the only optimization metric while ignoring mean-time-to-recovery (MTTR) and business RPO.
    **The Consequence:** Saving minor storage costs but losing days of GPU training time when a node inevitably fails.
  napkin_math: |
    **Assumptions & Constraints:**
    - Moving from a 1-hour to a 5-hour checkpoint interval.
    - Random failure distribution over long runs.

    **Calculations:**
    - Average lost progress at 1-hour interval: ~0.5 hours per failure.
    - Average lost progress at 5-hour interval: ~2.5 hours per failure.

    **Conclusion & Interpretation:**
    - **Result: 5x increase in lost progress (Recovery-Time-Bound)**. Severe tradeoff for storage savings.
