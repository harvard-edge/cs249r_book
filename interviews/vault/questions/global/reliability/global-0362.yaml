title: Cross-Regime Recovery Budget
scenario: 'A model update must tolerate failures in three regimes: cloud training can checkpoint 2 TB every hour to object storage, mobile personalization can save a 20 MB adapter nightly, and TinyML can save only a 64 KB calibration state to flash.'
question: How would you design failure recovery for 2 TB cloud checkpoints, 20 MB mobile adapters, and 64 KB TinyML calibration state?
details:
  realistic_solution: 'Use regime-appropriate state. Cloud needs periodic full distributed checkpoints and tested restore. Mobile should checkpoint only personalization deltas or adapters, not the base model. TinyML should persist compact calibration parameters and versioned configuration, with rollback to a known-good firmware image. The common principle is to checkpoint the minimal state required to recover the user-visible behavior.'
  common_mistake: |
    **The Pitfall:** Copying the cloud strategy to every device and trying to store full model checkpoints on mobile or TinyML.
    **The Rationale:** Seeking architectural uniformity across all deployment targets to simplify the platform.
    **The Consequence:** Instant storage exhaustion and catastrophic failure on edge devices that lack the capacity for full weights.
  napkin_math: |
    **Assumptions & Constraints:**
    - Cloud checkpoint: 2 TB.
    - Mobile checkpoint: 20 MB.
    - TinyML checkpoint: 64 KB.
    
    **Calculations:**
    - Cloud vs Mobile ratio: 2 TB / 20 MB = 100,000x difference.
    - Mobile vs TinyML ratio: 20 MB / 64 KB = 320x difference.
    
    **Conclusion & Interpretation:**
    - **Result: 100,000x Difference (Capacity-Bound)**. A single unified checkpoint policy cannot mathematically fit all three extreme regimes.
status: published
