title: Asynchronous Multi-Tier Checkpointing
scenario: Synchronous writes to cloud storage for a 2.4 TB checkpoint take 120 seconds,
  dropping GPU utilization below 85%.
question: How would you reduce the 2.4 TB checkpoint pause from 120 seconds to under
  5 seconds while preserving node-failure tolerance?
details:
  realistic_solution: 'Architect a tiered asynchronous checkpoint topology. Tier 1:
    PCIe stream HBM state to pinned CPU DRAM (sub-second stall). Tier 2: A non-blocking
    background daemon streams CPU DRAM to cloud object storage. Introduce a neighbor-level
    InfiniBand parity shard to tolerate Tier 2 power-loss failures.'
  common_mistake: '**The Pitfall:** Using a background thread to write directly from
    GPU memory to network storage.

    **The Rationale:** Background threads theoretically prevent blocking the main
    training loop.

    **The Consequence:** Causes severe PCIe congestion during the forward pass, effectively
    stalling the GPUs and failing to improve overall training utilization.

    '
  napkin_math: '**Assumptions & Constraints:**

    - State: 2.4 TB across 1024 GPUs (~2.4 GB/GPU)

    - PCIe Gen4 bandwidth: ~32 GB/s


    **Calculations:**

    - Tier 1 HBM to CPU transfer: 2.4 GB / 32 GB/s = 0.075 seconds

    - CPU to Storage: 2.4 GB over 10 Gbps = ~2 seconds


    **Conclusion & Interpretation:**

    - **Result: PCIe-Bandwidth Bound (0.075s stall)**. Tiered asynchronous checkpointing
    reduces the training loop stall to under 5 seconds.

    '
