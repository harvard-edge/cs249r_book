title: Realize Global Tail-Latency Budget
scenario: A search API serves users from cloud regions, edge caches, and mobile clients. Average latency is 120 ms, but P99 is 900 ms during regional failover and mobile network retries.
question: What does the team need to realize about their latency metrics before declaring the service healthy?
details:
  realistic_solution: Average latency is not the release metric. The team must budget P95/P99 components separately for queueing, model execution, network, retries, and failover. Global health requires tail targets by geography and client class, not a single mean.
  common_mistake: |
    **The Pitfall:** Reporting the global average and missing that a small failover or mobile segment dominates user-visible pain.
    **The Rationale:** Relying on mean averages instead of percentile distributions to gauge user experience.
    **The Consequence:** Declaring a system healthy while thousands of real users experience timeouts or severe application lag.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - P50 (Mean component): 120 ms.
       - P99 (Tail component): 900 ms.
    2. **Calculations:**
       - Mean Approximation: (0.99 * 120 ms) + (0.01 * 900 ms).
       - Result: 118.8 ms + 9 ms = 127.8 ms average.
    3. **Conclusion & Interpretation:**
       - **Result: Masked Tail Latency.** The mean looks entirely healthy (~128 ms), masking the fact that the tail experience (900 ms) is completely broken.
