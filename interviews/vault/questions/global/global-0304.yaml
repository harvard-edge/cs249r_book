title: Pipeline Bubble Delay Calculation
scenario: Two nodes are operating in a pipeline parallel setup connected via InfiniBand NDR (400 Gbps).
question: How would you calculate the pipeline bubble delay added by transferring a 250MB intermediate activation tensor between the two nodes over the network?
details:
  realistic_solution: Pipeline parallelism involves sending activations forward and gradients backward across node boundaries. The network bandwidth limits this transfer. By taking the activation tensor size and dividing it by the IB NDR bandwidth, you can find the transmission delay that contributes to the pipeline bubble.
  common_mistake: |
    **The Pitfall:** Using 400 GB/s instead of 400 Gbps (Gigabits per second).
    **The Rationale:** Confusing network bandwidth units (bits) with memory bandwidth units (bytes).
    **The Consequence:** Underestimating the communication delay by 8x, leading to flawed pipeline stage balancing.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - IB NDR Bandwidth: 400 Gbps.
       - Activation Size: 250 MB.
    2. **Calculations:**
       - Bandwidth Conversion: 400 Gbps / 8 = 50 GB/s.
       - Activation Size Conversion: 250 MB = 0.25 GB.
       - Transfer Delay: 0.25 GB / 50 GB/s = 0.005 seconds = 5 ms.
    3. **Conclusion & Interpretation:**
       - **Result: Network-Bound Bubble.** Transferring 250MB adds a 5 ms communication delay to the pipeline bubble.
