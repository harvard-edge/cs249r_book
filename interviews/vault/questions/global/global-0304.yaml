title: Global New 0005
scenario: Two H100 nodes are operating in a pipeline parallel setup connected via InfiniBand NDR. Calculate
  the pipeline bubble delay added by transferring a 250MB intermediate activation tensor between the two
  nodes over the network.
details:
  realistic_solution: Pipeline parallelism involves sending activations forward and gradients backward
    across node boundaries. The network bandwidth limits this transfer. By taking the activation tensor
    size and dividing it by the IB NDR bandwidth, you can find the transmission delay that contributes
    to the pipeline bubble.
  common_mistake: Using 400 GB/s instead of 400 Gbps (Gigabits per second), leading to an 8x underestimation
    of the delay time.
  napkin_math: IB NDR = 400Gbps = 50GB/s. Activation size = 250MB = 0.25GB. Transfer delay = 0.25GB /
    50GB/s = 0.005 seconds (5 milliseconds).
