title: Cross-Regime Compute Budget Triage
scenario: 'A product team can run comparable variants of the same model family in
  three places: a cloud GPU at 100 TFLOP/s effective throughput, a mobile NPU at 10
  TOPS effective throughput, or a TinyML MCU at 100 GOPS effective throughput. The
  cloud path adds 120 ms network round trip, mobile adds 8 ms app scheduling overhead,
  and TinyML avoids the network but has a 200 ms control-loop deadline. Assume each
  variant requires about 20 billion effective operations. Design a first-pass placement
  rule that compares compute time with system overhead across all three regimes.'
question: How would you choose between cloud, mobile, and TinyML placement for this
  20B-op model using compute time plus overhead?
details:
  realistic_solution: 'Compute-only time is about 0.2 ms on the cloud GPU, 2 ms on
    the mobile NPU, and 200 ms on the MCU. End-to-end time is therefore roughly 120.2
    ms cloud, 10 ms mobile, and 200 ms TinyML. The rule is to compare total latency
    and headroom, not raw TOPS: mobile is the best default for interactive latency,
    cloud only wins when its larger model quality offsets the network cost, and TinyML
    only barely meets the control deadline.'
  common_mistake: Choosing the highest-TFLOP device without adding network and scheduling
    overhead, or choosing TinyML because it avoids the network while ignoring its
    lack of deadline headroom.
  napkin_math: 'Assuming comparable effective operations: cloud = 20B / 100T = 0.2
    ms plus 120 ms = 120.2 ms. Mobile = 20B / 10T = 2 ms plus 8 ms = 10 ms. TinyML
    = 20B / 100G = 200 ms.'
