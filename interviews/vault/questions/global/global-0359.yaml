title: Cross-Regime Compute Budget Triage
scenario: A product team can run comparable variants of the same model family in three places: a cloud GPU at 100 TFLOP/s effective throughput, a mobile NPU at 10 TOPS effective throughput, or a TinyML MCU at 100 GOPS effective throughput. The cloud path adds 120 ms network round trip, mobile adds 8 ms app scheduling overhead, and TinyML avoids the network but has a 200 ms control-loop deadline. Assume each variant requires about 20 billion effective operations.
question: How would you choose between cloud, mobile, and TinyML placement for this 20B-op model using compute time plus overhead?
details:
  realistic_solution: "Compute-only time is about 0.2 ms on the cloud GPU, 2 ms on the mobile NPU, and 200 ms on the MCU. End-to-end time is therefore roughly 120.2 ms cloud, 10 ms mobile, and 200 ms TinyML. The rule is to compare total latency and headroom, not raw TOPS: mobile is the best default for interactive latency, cloud only wins when its larger model quality offsets the network cost, and TinyML only barely meets the control deadline."
  common_mistake: |
    **The Pitfall:** Choosing the highest-TFLOP device without adding network and scheduling overhead.
    **The Rationale:** Focusing strictly on mathematical throughput and ignoring system integration delays.
    **The Consequence:** Deploying to the cloud for "speed" but severely degrading user experience due to 120ms of hidden network latency.
  napkin_math: |
    * Cloud compute: 20B ops / 100T ops/sec = 0.2 ms.
    * Cloud total: 0.2 ms + 120 ms network = 120.2 ms.
    * Mobile compute: 20B ops / 10T ops/sec = 2 ms.
    * Mobile total: 2 ms + 8 ms overhead = 10 ms.
    * TinyML compute: 20B ops / 100G ops/sec = 200 ms.
    * **Mobile is the clear winner for interactive latency at 10 ms, while TinyML barely meets the deadline.**
