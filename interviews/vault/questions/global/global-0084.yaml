title: In-Network Computing (SHARP) Resource Exhaustion
scenario: An InfiniBand cluster with SHARP (Scalable Hierarchical Aggregation and Reduction Protocol) enabled shows 5μs AllReduce latency for early testing. When the cluster scales to running 20 concurrent multi-node jobs, the 21st job suddenly experiences a 10x latency spike (50μs) and elevated CPU utilization, while the first 20 jobs remain fast.
question: Why does the 21st concurrent job lose SHARP-like 5μs AllReduce latency while the first 20 remain fast?
details:
  realistic_solution: The root cause is the exhaustion of SHARP aggregation resources (SRAM) within the InfiniBand switch ASICs. SHARP offloads collective operations (like AllReduce) from the hosts to the switches by building aggregation trees in the switch's memory. This memory is finite. Once the first 20 jobs consume all available SHARP tree resources, the hardware silently rejects the 21st job's request for SHARP allocation. NCCL dynamically detects this and falls back to host-based ring or tree AllReduce over standard RDMA. This fallback drastically increases latency (from hardware-accelerated 5μs to software-based 50μs) and increases CPU/GPU overhead.
  common_mistake: |
    **The Pitfall:** Assuming network congestion or a bad hardware link.
    **The Rationale:** Seeing a sudden latency spike and associating it with standard TCP/IP traffic contention.
    **The Consequence:** Wasting time debugging network routes instead of managing the finite hardware aggregation resources.
  napkin_math: |
    - Switch SRAM for SHARP: ~5 MB.
    - SRAM per job collective: ~250 KB.
    - First 20 jobs: 20 × 250 KB = **5.0 MB**.
    - 21st job: Requests 250 KB, fails allocation, falls back to host memory.
