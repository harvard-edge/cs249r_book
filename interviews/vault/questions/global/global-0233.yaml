title: Carbon-Aware Scheduling Tradeoff
scenario: 'Your cluster spans two regions: Region A (solar-heavy, 50 gCO2/kWh daytime, 400 gCO2/kWh nighttime) and Region B (natural gas, constant 350 gCO2/kWh). A training job takes 8 hours.'
question: 'How would you analyze the carbon tradeoff of running during Region A''s daytime vs Region B anytime, considering a 15% compute overhead from cross-region data transfer?'
details:
  realistic_solution: 'Region A daytime: 8h x Power x 50 gCO2/kWh. Region B: 8h x Power x 350 gCO2/kWh. Region A with transfer overhead: 8h x 1.15 x Power x 50 = 460 x Power gCO2. Region B: 8h x Power x 350 = 2800 x Power gCO2. Region A saves 2800-460 = 2340 x Power gCO2 (83.6% reduction). Even with 15% overhead, solar daytime is vastly better. But: if the job runs into nighttime in Region A: 4h x 1.15P x 50 + 4h x 1.15P x 400 = 230P + 1840P = 2070P gCO2. Still better than Region B, but the gap narrows.'
  common_mistake: |
    **The Pitfall:** Only comparing carbon intensity without accounting for the extra energy from cross-region overhead.
    **The Rationale:** Candidates focus exclusively on grid metrics while ignoring the energy cost of moving the data.
    **The Consequence:** Scheduling jobs in "greener" regions but actually increasing total carbon emissions due to transfer penalties.
  napkin_math: |
    **Assumptions & Constraints:**
    - 8h job. 15% overhead for Region A.
    - A(day) = 50g, A(night) = 400g, B = 350g.

    **Calculations:**
    - A(day) emission = 8h * 1.15 * 50 = 460 units.
    - B(anytime) emission = 8h * 350 = 2800 units.
    - Savings A(day) vs B = 84% reduction.
    - A(mixed) emission = 4h * 1.15 * 50 + 4h * 1.15 * 400 = 2070 units.

    **Conclusion & Interpretation:**
    - **Result: 84% reduction (Carbon-Bound)**. Region A mixed only saves 26% over B, proving solar windows must align with job duration.
