title: Carbon-Aware Scheduling Tradeoff
scenario: 'Your cluster spans two regions: Region A (solar-heavy, 50 gCO2/kWh daytime, 400 gCO2/kWh nighttime)
  and Region B (natural gas, constant 350 gCO2/kWh). A training job takes 8 hours. Analyze the carbon
  tradeoff of running during Region A''s daytime vs. Region B anytime, considering a 15% compute overhead
  from cross-region data transfer.'
details:
  realistic_solution: 'Region A daytime: 8h × Power × 50 gCO2/kWh. Region B: 8h × Power × 350 gCO2/kWh.
    Region A with transfer overhead: 8h × 1.15 × Power × 50 = 460 × Power gCO2. Region B: 8h × Power ×
    350 = 2800 × Power gCO2. Region A saves 2800-460 = 2340 × Power gCO2 (83.6% reduction). Even with
    15% overhead, solar daytime is vastly better. But: if the job runs into nighttime in Region A: 4h
    × 1.15P × 50 + 4h × 1.15P × 400 = 230P + 1840P = 2070P gCO2. Still better than Region B''s 2800P but
    the gap narrows to 26%. The insight: carbon-aware scheduling helps most when green windows fully cover
    job duration.'
  common_mistake: Only comparing carbon intensity without accounting for the extra energy from cross-region
    overhead. Moving workloads to green regions has a transfer cost.
  napkin_math: 'A(day): 8h × 1.15 × 50 = 460 units. B: 8h × 350 = 2800 units. A saves 84%. But if A spills
    to night: 4×1.15×50 + 4×1.15×400 = 2070. Only 26% savings.'
