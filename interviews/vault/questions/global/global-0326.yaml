title: Carbon-Aware Scheduling Optimization
scenario: A 10-hour training job can run in Region A at 500 gCO2/kWh now or wait 6
  hours and run in Region B at 120 gCO2/kWh. The job draws 200 kW IT power and PUE
  is 1.2 in both regions. Evaluate the carbon savings from waiting.
question: How much operational carbon is saved by waiting for Region B at 120 gCO2/kWh
  instead of running now in Region A at 500 gCO2/kWh?
details:
  realistic_solution: Facility power is 200 x 1.2 = 240 kW. Energy is 240 x 10 = 2,400
    kWh. Region A emits 1,200 kg CO2; Region B emits 288 kg. Waiting saves about 912
    kg CO2 if the delay is acceptable.
  common_mistake: Choosing the immediate region without quantifying carbon intensity
    difference and schedule flexibility.
  napkin_math: Energy = 2,400 kWh. A = 2,400 x 0.5 = 1,200 kg. B = 2,400 x 0.12 =
    288 kg. Savings = 912 kg.
