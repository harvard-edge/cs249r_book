title: 800G PAM4 Signal Degradation from Dirty Fiber
scenario: During an upgrade to 800G OSFP transceivers, several inter-rack optical links exhibit severe instability. The links stay 'UP', but application-level latency spikes to 250ms and effective bandwidth drops to 10Gbps. Switch ambient temperature is a normal 25°C. Disabling Forward Error Correction (FEC) causes the links to immediately drop completely.
question: "What is the likely cause of 800G OSFP links staying up but spiking to 250 ms latency and 10 Gbps throughput?"
details:
  realistic_solution: "The root cause is microscopic dust or smudges on the optical fiber connectors causing high insertion loss and degrading signal integrity. 800G Ethernet relies on PAM4 (Pulse Amplitude Modulation 4-level) signaling, which uses 4 voltage levels to encode 2 bits per symbol. PAM4 has three 'eye diagrams' that are 1/3 the height of traditional NRZ signaling, making it extremely sensitive to noise and attenuation. The dirty fiber increases the pre-FEC Bit Error Rate (BER) beyond the threshold that KP4 FEC can correct. The switch expends massive cycles retransmitting uncorrectable frames, causing the 250ms latency spikes and tanking throughput."
  common_mistake: |
    **The Pitfall:** Assuming a thermal issue with the OSFP transceivers or a firmware bug in the switch MAC layer.
    **The Rationale:** High temperatures and buggy firmware are frequent causes of erratic link performance.
    **The Consequence:** Replacing expensive optics or rolling back firmware versions instead of simply cleaning the fiber connections.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 800G PAM4 requires a pre-FEC BER of better than 2.4×10^-4.
    2. **Calculations:**
       - A dust particle causing 2dB of insertion loss drops the signal-to-noise ratio, worsening pre-FEC BER to 1×10^-3.
       - The FEC engine cannot correct the errors, resulting in dropped frames.
    3. **Conclusion & Interpretation:**
       - **Result: Network-Bound. TCP/RoCE retransmission timeouts (min RTO ≈ 200ms) trigger, causing the observed 250ms latency spikes and destroying throughput.**
