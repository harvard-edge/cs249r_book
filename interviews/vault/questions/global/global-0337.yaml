title: Thermal Throttling Mitigation Choice
scenario: An on-device workload meets latency for 90 seconds, then latency increases by 40% after thermal throttling. Options are reduce duty cycle by half or move every third request to cloud.
question: "How would you choose between halving duty cycle and offloading every third request for a workload whose latency increases by 40% after throttling?"
details:
  realistic_solution: 'Halving duty cycle directly reduces sustained heat but may reduce feature availability. Offloading every third request cuts local work by about 33% while preserving service, at the cost of network latency and privacy. Choose based on latency/privacy constraints; either strategy should be validated against sustained thermal state, not cold benchmarks.'
  common_mistake: |
    **The Pitfall:** Optimizing cold-start latency while ignoring sustained thermal equilibrium.
    **The Rationale:** Candidates rely on short benchmarks that do not trigger thermal throttling on edge devices.
    **The Consequence:** Implementing solutions that perform well initially but severely degrade the user experience after a few minutes of use.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Throttling adds 40% latency (e.g., 50ms -> 70ms).
    2. **Calculations:**
       - Offloading 1/3 of requests reduces local duty by roughly 33%.
       - Halving duty reduces it by 50%.
    3. **Conclusion & Interpretation:**
       - **Result: Availability vs Privacy Tradeoff.** Offloading preserves 100% service availability at the cost of partial network dependency.
