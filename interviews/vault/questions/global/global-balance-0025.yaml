title: Portable Kernel Fallback Optimization
scenario: A model runs on cloud GPU, mobile NPU, and edge accelerator. On mobile, 7% of operators fall back to CPU and account for 45% of latency. Propose the first optimization.
question: What should you optimize first if 7% of operators fall back to CPU but cause 45% of mobile latency?
details:
  realistic_solution: Prioritize eliminating or rewriting the fallback operators for the mobile NPU. A small fraction of unsupported ops dominates latency, so graph rewriting, operator substitution, or custom kernels will likely beat general model compression.
  common_mistake: Optimizing the 93% of already delegated operators because they are most of the graph.
  napkin_math: 'The fallback ops are overrepresented in latency: 45% latency share / 7% operator share ≈ 6.4x concentration. A small unsupported part of the graph dominates runtime.'
