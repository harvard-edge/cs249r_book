title: MoE Routing Across Regimes
scenario: A team proposes using the same MoE model in cloud serving, mobile offline mode, and TinyML safety classification. Cloud can route to 8 experts, mobile can store 2 experts, and TinyML can store none.
question: Can the same MoE architecture sensibly serve cloud, mobile, and TinyML deployments with 8, 2, and 0 experts available?
details:
  realistic_solution: Only the cloud deployment supports the intended MoE behavior. Mobile could use a distilled subset or adapter, but routing among 2 local experts changes quality and memory tradeoffs. TinyML cannot instantiate MoE and needs a distilled dense model or rule-based fallback. The architecture is not directly portable across regimes.
  common_mistake: |
    **The Pitfall:** Assuming a successful cloud MoE model can be copied to constrained devices unchanged.
    **The Rationale:** Equating the conceptual architecture with its physical memory realization.
    **The Consequence:** Designing an edge pipeline that physically cannot be deployed due to massive flash storage deficits.
  napkin_math: |
    - **Cloud MoE:** 8 experts × 500 MB = **4 GB** (Fits in cloud).
    - **Mobile MoE:** 2 experts × 500 MB = **1 GB** (Changes routing dynamics).
    - **TinyML:** Flash budget is usually < 2 MB, which is **2000x too small** for even a single expert.
