title: Cross-Regime Feature Freshness Spec
scenario: A recommendation system computes features in cloud batch jobs, mobile caches, and edge gateways.
question: What feature freshness contract is needed across cloud batch, mobile cache, and edge gateway recommendations?
details:
  realistic_solution: "Establish explicit freshness TTLs and fallback degradation logic. Mobile clients require invalidation telemetry to prevent serving critically stale feature distributions compared to cloud real-time updates. Model-Serving skew must be constrained by an explicit Service Level Objective (SLO)."
  common_mistake: |
    **The Pitfall:** Assuming "consistency" simply means building identical infrastructure across platforms.
    **The Rationale:** Consistency is often viewed as a purely infrastructural property rather than a semantic product guarantee.
    **The Consequence:** Delivering wildly inconsistent user experiences because edge nodes serve massively stale cached data while cloud users get real-time updates.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Cloud updates: Hourly
       - Mobile TTL: 24 Hours
    2. **Calculations:**
       - Drift Ratio = 24 / 1 = 24x staleness factor
    3. **Conclusion & Interpretation:**
       - **Result: Data-Skew Bound**
