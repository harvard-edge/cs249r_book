title: Cross-Regime Feature Freshness Spec
scenario: A recommendation system uses features computed in cloud batch jobs, mobile local caches, and edge gateways. The product team asks for consistent recommendations but does not define feature freshness.
question: What feature freshness contract is needed across cloud batch, mobile cache, and edge gateway recommendations?
details:
  realistic_solution: The contract should define maximum feature age, cache invalidation, offline behavior, training-serving skew tolerance, fallback values, and telemetry for stale reads. Cloud may meet minute-level freshness, mobile may need explicit cache TTLs, and edge gateways may need local invalidation when connectivity drops.
  common_mistake: |
    **The Pitfall:** Assuming "consistency" simply means building identical infrastructure across platforms.
    **The Rationale:** Consistency is often viewed as a purely infrastructural property rather than a semantic product guarantee.
    **The Consequence:** Delivering wildly inconsistent user experiences because edge nodes serve massively stale cached data while cloud users get real-time updates.
  napkin_math: |
    * Cloud feature update frequency: Hourly (1 hour).
    * Mobile cache TTL: Daily (24 hours).
    * Ratio: 24 hours / 1 hour = 24x.
    * **Mobile clients can serve data 24 times staler than the cloud unless explicitly forbidden by contract.**
