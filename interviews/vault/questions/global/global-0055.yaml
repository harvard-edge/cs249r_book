title: Continuous Roofline Profiling for Multimodal
scenario: Your team is building a multimodal serving cluster using 40GB GPUs. The system handles concurrent text generation (auto-regressive decoding) and image generation (diffusion steps). At peak load of 5,000 QPS, tail latency spikes from 150ms to over 2 seconds. You need to architect a continuous profiling and telemetry framework to dynamically detect hardware bottlenecks and inform the global scheduler.
question: How do you design this profiling system to decompose the performance limiters?
details:
  realistic_solution: Architect a continuous profiling agent using hardware performance counters to sample SM active cycles, Tensor Core utilization, and DRAM read/write bytes. The system dynamically computes Arithmetic Intensity (AI). Text decoding has low AI (memory bound), while diffusion has high AI (compute bound). Co-locating them saturates both limits without contention.
  common_mistake: |
    **The Pitfall:** Relying strictly on SM utilization (e.g., nvidia-smi volatile GPU util).
    **The Rationale:** It's the most common tool and developers assume it correlates directly with useful compute performance.
    **The Consequence:** It masks the critical difference between being stalled on memory bandwidth versus actively computing, leading to disastrous scheduling decisions.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Hardware: 2 TB/s bandwidth, 312 TFLOPS compute.
       - Text AI = ~1 FLOP/byte. Image AI = ~500 FLOPs/byte.
    2. **Calculations:**
       - Ridge point = 312e12 FLOPs / 2.0e12 Bytes/s = 156 FLOPs/byte.
       - Text max throughput = 2 TB/s * 1 FLOP/byte = 2 TFLOPS (0.6% SM util).
       - Image max throughput = 312 TFLOPS (Compute-bound).
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound & Memory-Bound.** Co-locating low-AI text with high-AI image requests perfectly saturates both the memory bus (98%) and SMs (95%) without contention.
