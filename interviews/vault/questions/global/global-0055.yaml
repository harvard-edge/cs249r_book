title: Continuous Roofline Profiling for Multimodal
scenario: Your team is building a multimodal serving cluster using 40GB A100 GPUs (2 TB/s memory bandwidth,
  312 TFLOPS bfloat16). The system handles concurrent text generation (auto-regressive decoding) and image
  generation (diffusion steps). At peak load of 5,000 QPS, tail latency spikes from 150ms to over 2 seconds.
  You need to architect a continuous profiling and telemetry framework to dynamically detect hardware
  bottlenecks and inform the global scheduler. How do you design this profiling system to decompose the
  performance limiters?
details:
  realistic_solution: Architect a continuous profiling agent using hardware performance counters (DCGM/CUPTI)
    to sample SM active cycles, Tensor Core utilization, and DRAM read/write bytes at 10ms intervals.
    The system must dynamically compute the Arithmetic Intensity (AI) in real-time to build a live Roofline
    model. Text decoding has an AI of ~2 FLOPs/byte (heavily memory-bandwidth bound), while batched diffusion
    steps have an AI of >300 FLOPs/byte (compute bound). By emitting these metrics to a time-series database,
    the profiler allows the scheduler to perform bottleneck decomposition. The architectural outcome is
    a heterogeneous batching scheduler that pairs low-AI text requests with high-AI image requests. The
    profiler proves that co-locating them saturates the 2.0 TB/s memory bus and the 312 TFLOPS compute
    units simultaneously without resource contention, resolving the tail latency spikes.
  common_mistake: Relying on SM utilization (e.g., nvidia-smi volatile GPU util) which masks the difference
    between being stalled on memory bandwidth versus actively computing.
  napkin_math: 'A100 Ridge point = 312e12 FLOPs / 2.0e12 Bytes/s = 156 FLOPs/byte. Text decoding (batch
    size 1): requires loading 2 bytes per parameter for 2 FLOPs of compute -> AI = 1 FLOP/byte. Max throughput
    = 2.0 TB/s * 1 FLOP/byte = 2.0 TFLOPS (0.64% compute utilization). Image diffusion (batch size 4):
    AI ~500 FLOPs/byte. Max throughput = 312 TFLOPS (compute bound). Co-location yields ~98% memory bus
    utilization and ~95% SM utilization.'
