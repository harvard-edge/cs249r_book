title: Cross-Regime Recovery Budget
scenario: 'A model update must tolerate failures in three regimes: cloud training
  can checkpoint 2 TB every hour to object storage, mobile personalization can save
  a 20 MB adapter nightly, and TinyML can save only a 64 KB calibration state to flash.
  Design a recovery strategy that matches each regime without pretending they need
  identical checkpoints.'
question: How would you design failure recovery for 2 TB cloud checkpoints, 20 MB
  mobile adapters, and 64 KB TinyML calibration state?
details:
  realistic_solution: Use regime-appropriate state. Cloud needs periodic full distributed
    checkpoints and tested restore. Mobile should checkpoint only personalization
    deltas or adapters, not the base model. TinyML should persist compact calibration
    parameters and versioned configuration, with rollback to a known-good firmware
    image. The common principle is to checkpoint the minimal state required to recover
    the user-visible behavior.
  common_mistake: Copying the cloud strategy to every device and trying to store full
    model checkpoints on mobile or TinyML.
  napkin_math: The state sizes differ by about 2 TB / 20 MB = 100,000x and 20 MB /
    64 KB = 320x. A single checkpoint policy cannot fit all three regimes.
