title: Offloaded Weights Latency Profiling
scenario: A convolution layer requires 2GB of weights and 20 GFLOPs of compute. Weights are offloaded to CPU memory and must be streamed over PCIe Gen4 to a GPU for execution.
question: How would you calculate the total time and identify the primary bottleneck?
details:
  realistic_solution: When weights are not resident on the GPU, interconnect bandwidth dominates latency. Calculate the compute time based on GPU peak TFLOPS and compare it to the data transfer time over PCIe Gen4. The slower of the two represents the primary bottleneck dictated by the roofline model.
  common_mistake: |
    **The Pitfall:** Using the GPU's HBM2 bandwidth instead of the PCIe Gen4 bandwidth (32GB/s) to calculate data transfer latency.
    **The Rationale:** Failing to track where the data physically resides at the start of the operation.
    **The Consequence:** Grossly underestimating inference latency by assuming CPU-offloaded weights can be accessed at GPU memory speeds.
  napkin_math: |
    **Assumptions & Constraints:**
    - Compute: 20 GFLOPs, 125 TFLOPS Peak.
    - Transfer: 2 GB over PCIe Gen4 (32 GB/s).

    **Calculations:**
    - Compute Time: 20 GFLOPs / 125 TFLOPS = 0.00016 s = 0.16 ms.
    - Transfer Time: 2 GB / 32 GB/s = 0.0625 s = 62.5 ms.

    **Conclusion & Interpretation:**
    - **Result: 62.5 ms Transfer Time (Interconnect-Bound)**. 62.5 ms >> 0.16 ms. The operation is severely constrained by the PCIe bus, not the ALU.
