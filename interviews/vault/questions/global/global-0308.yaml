title: Global New 0009
scenario: A convolution layer requires 2GB of weights and 20 GFLOPs of compute. Weights are offloaded to CPU memory and must be streamed over PCIe Gen4 to a V100 GPU for execution.
question: How would you calculate the total time and identify the primary bottleneck?
details:
  realistic_solution: When weights are not resident on the GPU, interconnect bandwidth dominates latency. Calculate the compute time based on V100 peak TFLOPS and compare it to the data transfer time over PCIe Gen4. The slower of the two represents the primary bottleneck dictated by the roofline model.
  common_mistake: |
    **The Pitfall:** Using the V100's HBM2 bandwidth (900GB/s) instead of the PCIe Gen4 bandwidth (32GB/s) to calculate data transfer latency.
    **The Rationale:** Failing to track where the data physically resides at the start of the operation.
    **The Consequence:** Grossly underestimating inference latency by assuming CPU-offloaded weights can be accessed at GPU memory speeds.
  napkin_math: |
    - **Compute Time:** 20 GFLOPs / 125 TFLOPS (V100 Peak) = 0.00016 seconds = **0.16 ms**
    - **Transfer Time:** 2 GB / 32 GB/s (PCIe Gen4) = 0.0625 seconds = **62.5 ms**
    - **Conclusion:** 62.5 ms >> 0.16 ms. The operation is severely I/O bound by the PCIe bus.
