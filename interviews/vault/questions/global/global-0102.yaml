title: Serving 70B LLMs on Single Node
scenario: The hardware budget strictly limits you to a single node with 4x GPUs. The throughput requirement is 500 tokens/sec.
question: "How do you architect the deployment of a 70B parameter LLM to meet 96GB memory constraints while maximizing generation throughput?"
details:
  realistic_solution: 'Implement Weight-Only Post-Training Quantization (e.g., AWQ or GPTQ) down to 4-bit (INT4). In autoregressive generation, the process is heavily memory-bandwidth bound (batch size of 1 per step implies reading the entire weight matrix to generate a single token). By quantizing weights to INT4 and keeping activations in FP16 (W4A16), you reduce the memory footprint to fit within the 96GB limit with plenty of room for the KV cache, while drastically reducing the bytes read from VRAM per token, directly accelerating generation throughput. A calibration set must be used during the PTQ process to protect salient weights, minimizing the perplexity degradation typically seen in uniform 4-bit quantization.'
  common_mistake: |
    **The Pitfall:** Applying W8A8 quantization to reduce weights and compute.
    **The Rationale:** Assuming reducing activation precision (A8) helps speed up generation.
    **The Consequence:** Degrading accuracy unnecessarily, since autoregressive generation is purely memory-bandwidth bound and activating in INT8 provides little throughput benefit over W4A16.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 70B parameters, FP16 baseline (140 GB).
       - Single node capacity: 96 GB (4x 24GB GPUs).
       - KV Cache per token: ~327 KB (Llama-2 70B GQA).
    2. **Calculations:**
       - FP16 weights: 140 GB (Causes OOM).
       - INT4 weights (W4A16): 70B * 0.5 bytes = 35 GB.
       - VRAM remaining: 96 GB - 35 GB = 61 GB.
       - KV Cache Capacity: 61 GB / 327 KB/token = ~186,000 tokens.
    3. **Conclusion & Interpretation:**
       - **W4A16 quantization fits the model in 35 GB, leaving 61 GB for KV cache and maximizing generation throughput.**
       - **Result: Memory-Capacity Bound (Mitigated via INT4)**
