title: The Quantization Cost Paradox
scenario: You serve a Llama-3-70B model. To cut costs, you switch weights from FP16 to W8A8 INT8 quantization,
  reducing memory from 140GB to 70GB. This allows you to serve the model on 2x A100s instead of 4x A100s
  per node. You expect serving costs per token to halve. Instead, the cost per 1K tokens increases from
  $0.0006 to $0.0010.
details:
  realistic_solution: 'The root cause is the collapse of serving throughput (tokens/sec) due to unoptimized
    INT8 compute kernels. Cost per token is determined by: (GPU Hourly Cost) / (Throughput × 3600). While
    you halved the GPU hourly cost by moving from 4 to 2 GPUs, the lack of optimized W8A8 kernels forces
    the hardware to continuously dequantize weights back to FP16 in SRAM before matrix multiplication.
    This makes the generation phase heavily memory-bandwidth bound and fails to utilize INT8 Tensor Cores.
    Throughput drops by more than 70%. Because the 2 GPUs are still drawing near-peak power (400W each)
    thrashing memory, the system uses fewer GPUs but takes vastly longer to generate tokens, driving up
    the Joules per token and the Dollars per token.'
  common_mistake: Assuming cost per token is strictly proportional to the number of GPUs or the total
    memory footprint of the model.
  napkin_math: 'FP16 Baseline: 4 GPUs @ $2/hr = $8/hr. Throughput = 4,000 tokens/sec. Cost per 1K tokens
    = $8 / (4000 × 3600 / 1000) = $0.00055. INT8 Setup: 2 GPUs @ $2/hr = $4/hr. Throughput plummets to
    1,100 tokens/sec due to dequantization overhead. Cost per 1K tokens = $4 / (1100 × 3600 / 1000) =
    $0.00101.'
