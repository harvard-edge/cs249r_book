title: The Quantization Cost Paradox
scenario: You serve a Llama-3-70B model. To cut costs, you switch weights from FP16 to W8A8 INT8 quantization, reducing memory from 140GB to 70GB. This allows you to serve the model on 2x A100s instead of 4x A100s per node. You expect serving costs per token to halve. Instead, the cost per 1K tokens increases from $0.0006 to $0.0010.
question: Why does switching the 70B model from FP16 on 4 A100s to W8A8 INT8 on 2 A100s increase cost per 1K tokens?
details:
  realistic_solution: 'The root cause is the collapse of serving throughput (tokens/sec) due to unoptimized INT8 compute kernels. Cost per token is determined by: (GPU Hourly Cost) / (Throughput × 3600). While you halved the GPU hourly cost by moving from 4 to 2 GPUs, the lack of optimized W8A8 kernels forces the hardware to continuously dequantize weights back to FP16 in SRAM before matrix multiplication. This makes the generation phase heavily memory-bandwidth bound and fails to utilize INT8 Tensor Cores. Throughput drops by more than 70%. Because the 2 GPUs are still drawing near-peak power (400W each) thrashing memory, the system uses fewer GPUs but takes vastly longer to generate tokens, driving up the Joules per token and the Dollars per token.'
  common_mistake: |
    **The Pitfall:** Assuming cost per token is strictly proportional to the number of GPUs or the total memory footprint of the model.
    **The Rationale:** Neglecting the compute overhead introduced by unoptimized software kernels dynamically dequantizing weights at runtime.
    **The Consequence:** Launching a "cost optimization" that drastically degrades latency and increases unit economics.
  napkin_math: |
    - **FP16 Baseline Cost:** 4 GPUs × $2/hr = $8/hr.
    - **FP16 Throughput:** 4,000 tokens/sec = 14.4M tokens/hr. Cost = $8 / 14,400 = **~$0.00056 per 1K tokens**.
    - **INT8 Cost:** 2 GPUs × $2/hr = $4/hr.
    - **INT8 Throughput:** Drops to 1,100 tokens/sec = 3.96M tokens/hr. Cost = $4 / 3,960 = **~$0.00101 per 1K tokens**.
    - **Conclusion:** Halving the GPU count was overwhelmed by a nearly 4x collapse in throughput, roughly doubling the cost per token.
