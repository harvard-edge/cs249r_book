title: Continuous Batching Queueing Death Spiral
scenario: Your summarization service handles exactly 2 QPS. Prompts are 8k tokens, outputs are 1k tokens.
  The business SLA is 45s end-to-end latency. You cap the batch size at 8 to strictly prevent KV cache
  OOMs. TPOT is a flat 30ms. Prefill is 1s. Under sustained 2 QPS load, P99 latency slowly climbs to over
  5 minutes.
details:
  realistic_solution: 'Decompose latency using Queueing Theory: End-to-End Latency = Queue Time + Prefill
    Time + (Tokens * TPOT). Service time per request = 1s + (1000 * 30ms) = 31 seconds. With a max batch
    size of 8, the system''s maximum service rate (mu) = 8 requests / 31 seconds = 0.258 QPS. The arrival
    rate (lambda) is 2 QPS. Because lambda > mu (2 > 0.258), the system is in a queueing death spiral;
    the queue grows infinitely. The architecture must be redesigned to increase capacity: either scale
    horizontally by adding 8x more replicas (2 / 0.258 = 7.7), or implement KV cache quantization (e.g.,
    FP8/INT4) to safely increase the max batch size from 8 to 64 on the existing node.'
  common_mistake: Blaming continuous batching overhead and reverting to static batching, or trying to
    optimize the TPOT slightly.
  napkin_math: Prefill = 1s. Generate 1000 tokens at 30ms TPOT = 30s. Total request time = 31s. With max
    batch size 8, throughput is 8 requests / 31s = 0.258 QPS. Incoming rate is 2 QPS. Deficit = 1.74 requests/sec
    added to queue. After 10 mins (600s), queue has 600 * 1.74 = 1044 requests. A new request waits 1044
    / 0.258 QPS = 4046 seconds (~67 mins) before processing.
