title: Trillion-Token Data Pipeline Architecture
scenario: A 1024-GPU training cluster needs to process 2 trillion tokens for a pre-training run. The cluster consumes tokens at 5 million tokens/sec. Raw data is 4 TB of tokenized shards on S3 (2 trillion tokens at 2 bytes/token). Requirements: zero data starvation, exactly-once epoch ordering, resumability after failures.
question: How would you design a data pipeline to feed this 1024-GPU training cluster under these constraints?
details:
  realistic_solution: Three-tier pipeline: (1) S3 -> NVMe staging: pre-fetch tokenized shards from S3 to local NVMe SSDs on each node. 4 TB dataset. Each of 128 nodes stores 4 TB / 128 = 31 GB locally — fits easily. Pre-fetch next shards into buffer. S3 download at 10 Gbps per node = 1.25 GB/s; full 31 GB subset in 31/1.25 = ~25 seconds per node (parallel). (2) NVMe -> host RAM buffer: memory-mapped shards with 4-shard read-ahead. At 5M tok/s across 1024 GPUs: each GPU needs ~5000 tok/s * 2B = ~10 KB/s — trivial bandwidth. The challenge is random access for shuffling. (3) Deterministic shuffle with resumability: use a seeded permutation of shard indices. Each DP rank reads shards in a deterministic order based on (epoch, rank, seed). On failure recovery, the dataloader reads the last consumed shard index from the checkpoint and resumes from shard N+1. No re-shuffling needed. Exactly-once: each shard is assigned to exactly one DP rank per epoch via round-robin on the shuffled shard list.
  common_mistake: |
    **The Pitfall:** Streaming directly from S3 to GPUs, assuming raw cloud network bandwidth is sufficient.
    **The Rationale:** Candidates assume cloud object storage operates like a local file system without considering per-prefix request limits and latency spikes.
    **The Consequence:** The massive 1024-GPU cluster is repeatedly starved for data, wasting tens of thousands of dollars per hour in idle compute time.
  napkin_math: |
    *   **Throughput:** 5M tok/s * 2 Bytes = 10 MB/s aggregate read bandwidth (trivial).
    *   **Local Storage:** 4 TB dataset / 128 nodes = 31 GB/node locally.
    *   **Training Time:** 2T tokens / 5M tok/s = 400,000 seconds $\approx$ **4.6 days**.
