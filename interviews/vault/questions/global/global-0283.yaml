title: Trillion-Token Data Pipeline Architecture
scenario: 'Design a data pipeline to feed a 1024-GPU training cluster processing 2 trillion tokens for
  a pre-training run. The cluster consumes tokens at 500K tokens/sec. Raw data is 4 TB of tokenized
  shards on S3 (2 trillion tokens at 2 bytes/token). Requirements: zero data starvation, exactly-once epoch
  ordering, resumability after failures.'
question: "How would you design a data pipeline to feed a 1024-GPU training cluster processing 2 trillion tokens for a pre-training run?"
details:
  realistic_solution: 'Three-tier pipeline: (1) S3 → NVMe staging: pre-fetch tokenized shards from S3
    to local NVMe SSDs on each node. 4 TB dataset. Each of 128 nodes
    stores 4 TB / 128 = 31 GB locally — fits easily. Pre-fetch next shards into buffer. S3 download at
    10 Gbps per node = 1.25 GB/s; full 31 GB subset in 31/1.25 = ~25 seconds per node (parallel). (2)
    NVMe → host RAM buffer: memory-mapped shards with 4-shard read-ahead. At 500K tok/s across 1024 GPUs:
    each GPU needs 500K/1024 = 488 tok/s × 2B = ~1 KB/s — trivial bandwidth. The challenge is random access
    for shuffling. (3) Deterministic shuffle with resumability: use a seeded permutation of shard indices.
    Each DP rank reads shards in a deterministic order based on (epoch, rank, seed). On failure recovery,
    the dataloader reads the last consumed shard index from the checkpoint and resumes from shard N+1.
    No re-shuffling needed. Exactly-once: each shard is assigned to exactly one DP rank per epoch via
    round-robin on the shuffled shard list. (4) Capacity: 2T tokens / 500K per sec = 4M seconds = 46.3
    days. Dataset is 2T tokens (4 TB) → exactly 1 epoch. Shard size: 512 MB each → 8,192 shards. Each
    GPU processes 8,192 / 1024 = 8 shards per epoch.'
  common_mistake: Streaming directly from S3 to GPUs, assuming network bandwidth is sufficient. S3 GET
    throughput has per-prefix limits and added latency that can cause starvation at 500K tok/sec.
  napkin_math: '500K tok/s × 2B = 1 MB/s aggregate read bandwidth — trivial. 4 TB dataset / 128 nodes
    = 31 GB/node local. 4 TB at 2 bytes/token = 2T tokens. 2T tokens = 1 epoch. Training time: 2T / 500K
    = 4M sec ≈ 46 days.'
