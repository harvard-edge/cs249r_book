title: The Model Sync Cost
scenario: You deploy a 70B parameter model (FP16, so 140 GB) to 5 global regions for low-latency inference. After each fine-tuning run, you must push the updated weights to all regions over 10 Gbps inter-region links.
question: "How long does a full model sync take, and what is the monthly egress cost at $0.08/GB?"
details:
  realistic_solution: "Sequential push to 5 regions: 140 GB × 5 = 700 GB total egress. Transfer time per region: 140 GB / (10 Gbps / 8) = 140 / 1.25 = 112 seconds. Sequential total: 112s × 5 = 560s = 9.3 minutes. With parallel push (origin has enough uplink): 112 seconds (all 5 in parallel, but origin needs 50 Gbps uplink). Monthly cost (assuming 2 syncs/week): 700 GB × 8 syncs/month = 5,600 GB × $0.08 = $448/month. Optimization: use LoRA adapters (only sync the 0.1% of parameters that changed) — reduces sync payload from 140 GB to ~140 MB, cutting time to 0.1s and cost to $0.45/month."
  common_mistake: |
    **The Pitfall:** Assuming you must push the full 140 GB to each region sequentially.
    **The Rationale:** It's the simplest deployment architecture.
    **The Consequence:** Unnecessary long sync times and high egress costs that could be drastically reduced via delta syncs or tree-based distribution.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model size: 70B × 2B = 140 GB.
       - 10 Gbps inter-region links (1.25 GB/s). 5 regions. $0.08/GB.
    2. **Calculations:**
       - Transfer time per region: 140 GB / 1.25 GB/s = 112s.
       - Total sequential egress for 5 regions: 140 GB × 5 = 700 GB.
       - Monthly egress cost (2x/week, 8 syncs/month): 700 GB × 8 = 5,600 GB × $0.08 = $448/month.
    3. **Conclusion & Interpretation:**
       - **Result: Cost-Bound. With LoRA delta sync (0.1% of parameters): 140 MB × 5 × 8 = 5.6 GB/month, cutting costs to $0.45/month.**
