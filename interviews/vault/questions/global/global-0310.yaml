title: Global New 0011
scenario: You want to deploy a 14B parameter model on a 16GB T4. You must choose between FP16 and INT4 quantization.
question: "Why does FP16 fail, and what is the max theoretical token generation throughput using INT4?"
details:
  realistic_solution: "FP16 requires 2 bytes per parameter, exceeding the T4's 16GB capacity. INT4 quantization compresses each parameter to 0.5 bytes, easily fitting into VRAM. Throughput for single-batch autoregressive generation is computed by dividing memory bandwidth by the quantized model size."
  common_mistake: |
    **The Pitfall:** Calculating INT4 memory as 4 bytes instead of 4 bits (0.5 bytes).
    **The Rationale:** Mixing up bits and bytes is a very common arithmetic error in quantization math.
    **The Consequence:** Incorrectly concluding that INT4 also fails to fit in memory, leading to abandoned deployments.
  napkin_math: |
    - FP16 Memory = 14B × 2B = 28GB (Fails: 28GB > 16GB).
    - INT4 Memory = 14B × 0.5B = 7GB (Fits).
    - T4 Bandwidth = 320GB/s.
    - **Throughput = 320GB/s / 7GB = 45.7 tokens/sec.**
