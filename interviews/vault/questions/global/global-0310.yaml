title: Global New 0011
scenario: You want to deploy a 14B parameter model on a 16GB T4. Explain why FP16 fails. Then, assuming
  you use INT4 quantization, calculate the memory required for the weights and compute the max theoretical
  token generation throughput.
question: "Why FP16 fails?"
details:
  realistic_solution: FP16 requires 2 bytes per parameter, exceeding the T4's 16GB capacity. INT4 quantization
    compresses each parameter to 0.5 bytes, easily fitting into VRAM. Throughput for single-batch autoregressive
    generation is computed by dividing memory bandwidth by the quantized model size.
  common_mistake: Calculating INT4 memory as 4 bytes instead of 4 bits (0.5 bytes), leading to the incorrect
    conclusion that INT4 also fails to fit.
  napkin_math: 'FP16 Memory = 14B * 2B = 28GB (Fails: 28 > 16). INT4 Memory = 14B * 0.5B = 7GB (Fits).
    Throughput = T4 Bandwidth / INT4 Size = 320GB/s / 7GB = 45.7 tokens/sec.'
