title: Multi-Model Serving Gateway Design
scenario: 'Design a serving gateway for a company running 15 LLMs (7B to 70B) across 48 A100-80GB GPUs.
  Requirements: (1) auto-scale models based on traffic, (2) cold start for any model < 60 seconds, (3)
  overall GPU utilization > 70%, (4) graceful degradation when capacity is exhausted.'
details:
  realistic_solution: 'Design: (1) Model registry + weight cache: all 15 model weights stored on a shared
    NVMe tier (total ≈ 500 GB INT8). Each GPU has 80 GB VRAM; can hold one 70B model or multiple smaller
    models. Weights cached in GPU memory with LRU eviction. (2) Request router: incoming requests are
    classified by model, routed to a GPU that already has the model loaded (cache hit) or to the least-loaded
    GPU (cache miss triggers load). (3) Dynamic packing: small models (7B = 7 GB INT8) can co-locate on
    a single GPU. Pack up to 10× 7B models per GPU with separate CUDA streams, or 1× 70B model. The router
    tracks per-GPU memory utilization and co-locates compatible models. (4) Cold start budget: loading
    70B INT8 (70 GB) from NVMe SSD at 7 GB/s = 10 seconds. From network storage at 3 GB/s = 23 seconds.
    Both under 60s. Pre-warm top-5 models on dedicated GPUs. (5) Graceful degradation: when all GPUs are
    saturated, queue requests with priority (paying tier first), return estimated wait time, and optionally
    route to a smaller model for approximate answers. (6) Autoscaler: monitors request queue depth per
    model, scales replicas up (load model on idle GPU) or down (evict cold model) every 30 seconds.'
  common_mistake: Statically assigning GPUs to models and scaling by adding more replicas. This fragments
    the GPU pool and leads to utilization of 30-40% because each model's traffic pattern is different.
  napkin_math: '48 GPUs × 80 GB = 3.84 TB total VRAM. 15 models INT8 ≈ 500 GB. Average 2.5 model copies
    per GPU at 70% util. Cold start: 70 GB / 7 GB/s NVMe = 10s. Co-locate: 80 GB fits 1×70B or 5×7B +
    KV cache.'
