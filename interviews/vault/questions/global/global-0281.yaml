title: Multi-Model Serving Gateway Design
scenario: Design a serving gateway for a company running 15 LLMs (7B to 70B) across 48 80GB GPUs. Requirements are to auto-scale models based on traffic, cold start for any model < 60 seconds, overall GPU utilization > 70%, and graceful degradation when capacity is exhausted.
question: How would you design a serving gateway for a company running 15 LLMs (7B to 70B) across 48 80GB GPUs?
details:
  realistic_solution: Store all model weights on a shared NVMe tier. Route requests to a GPU that already has the model loaded or to the least-loaded GPU. Dynamically pack smaller models (10x 7B models per GPU) to maximize VRAM utilization.
  common_mistake: |
    **The Pitfall:** Statically assigning GPUs to specific models and scaling by adding rigid replicas.
    **The Rationale:** It mimics traditional microservice scaling and is infinitely simpler to implement.
    **The Consequence:** This fragments the GPU pool and crushes utilization to 30-40% because each model's traffic pattern peaks differently.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 48 GPUs * 80GB = 3.84 TB VRAM. 15 models (INT8) = 500 GB.
       - NVMe read bandwidth = 7 GB/s.
    2. **Calculations:**
       - Cold start (70B INT8) = 70 GB / 7 GB/s = 10s.
       - Co-location capability: 80GB fits 1x 70B or 10x 7B models.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound (Capacity).** Dynamic packing of smaller models and localized NVMe caching guarantee sub-60s cold starts and >70% utilization across the fleet.
