title: BLE DMA External RAM Wakeups
scenario: An edge device aggregates 30KB of FL gradients in external SPI SRAM. Every hour, it transmits this buffer via BLE. The BLE transmission takes 6 seconds. You expect the CPU to sleep during TX, but power analysis shows a constant 8mA draw instead of the expected 2mA BLE radio current.
question: Why does BLE transmission of the 30KB FL gradient buffer draw 8mA instead of letting the CPU sleep at 2mA radio current?
details:
  realistic_solution: The failure stems from the BLE radio's DMA controller lacking access to the external SPI SRAM bus. Because the 30KB buffer is located in external memory, the DMA cannot fetch the data directly. The CPU must wake up for every BLE connection interval, manually read a chunk from SPI SRAM into internal SRAM, and then hand it to the radio DMA. This destroys the system's ability to maintain deep sleep during the long transmission window.
  common_mistake: |
    **The Pitfall:** Assuming the BLE stack requires active CPU cycles to encrypt the payload before each packet transmission.
    **The Rationale:** Candidates focus on software or protocol overheads rather than hardware DMA limitations across memory boundaries.
    **The Consequence:** Wasting effort optimizing encryption code when the true issue is memory locality preventing deep sleep.
  napkin_math: |
    **Assumptions & Constraints:**
    - BLE TX = 2mA.
    - CPU active = 4mA.
    - SPI peripheral active = 2mA.
    - Transmission time = 6s.

    **Calculations:**
    - Active CPU total current = 2 + 4 + 2 = 8mA.
    - Active transmission cost = 6s * 8mA = 48 mAs.
    - Sleep transmission cost = 6s * 2mA = 12 mAs.
    - Waste = 48 - 12 = 36 mAs per transmission.

    **Conclusion & Interpretation:**
    - **Result: Memory-Locality Bound**. DMA cannot fetch directly from external SPI SRAM, preventing deep sleep.
