title: High Bandwidth Memory (HBM) Architecture
scenario: Many modern high-end GPUs use High Bandwidth Memory (HBM) instead of GDDR. How does HBM achieve
  higher overall memory bandwidth while operating at a noticeably lower clock frequency than GDDR?
details:
  realistic_solution: HBM uses a massively wide memory bus (e.g., 1024-bit per stack) compared to GDDR
    (e.g., 32-bit per chip). By vertically stacking DRAM dies and connecting them to the GPU via a silicon
    interposer, it allows for thousands of parallel connections, compensating for the lower clock speed.
  common_mistake: Thinking HBM operates at a higher frequency, relies on better data compression algorithms,
    or doesn't use a memory bus.
  napkin_math: '- GDDR6: 32-bit bus × 16 Gbps = 64 GB/s per chip | - HBM3: 1024-bit bus × 6.4 Gbps = ~820
    GB/s per stack (6 stacks = ~5 TB/s) | - => HBM trades clock speed for massive parallelism'
  options:
  - HBM employs advanced real-time compression algorithms to effectively double the data rate on the bus.
  - HBM chips are soldered directly onto the GPU die, eliminating the need for a memory bus entirely.
  - HBM utilizes a massively wide parallel memory bus via a silicon interposer, allowing high throughput
    despite lower clock speeds.
  - HBM operates at significantly higher clock frequencies than GDDR, driving more data per pin.
  correct_index: 2
