title: InfiniBand vs Ethernet for Training
scenario: You are designing a large-scale LLM training cluster and evaluating networking options.
question: What specific properties of InfiniBand reduce AllReduce latency compared to Ethernet?
details:
  realistic_solution: 'InfiniBand''s advantages for training go beyond bandwidth: (1) RDMA (Remote Direct Memory Access): GPU memory can be read/written directly over the network, bypassing the host CPU and OS kernel. This eliminates multiple memory copies and context switches, reducing per-message latency from ~10-50 \mu s (TCP/IP) to ~1-2 \mu s. (2) Lossless fabric: InfiniBand uses credit-based flow control, guaranteeing zero packet loss. Ethernet (even with RoCE) uses PFC which can cause deadlocks and head-of-line blocking. Packet loss triggers TCP retransmission, adding 10-100ms tail latency spikes that stall AllReduce across thousands of GPUs. (3) Adaptive routing: InfiniBand dynamically routes around congestion, maintaining consistent bandwidth. For AllReduce across 1000+ GPUs, even a single slow link creates a straggler that slows the entire step.'
  common_mistake: |
    **The Pitfall:** Focusing only on raw bandwidth.
    **The Rationale:** Candidates assume that 400 Gb/s Ethernet is identical to 400 Gb/s InfiniBand, overlooking protocol and fabric differences.
    **The Consequence:** Selecting Ethernet for cost savings but suffering from massive tail latency spikes that stall distributed training.
  napkin_math: |
    - AllReduce latency for 1GB gradient buffer (N=1024).
    - InfiniBand RDMA: 1GB/(50 GB/s) + 2us * log2(1024) = ~20ms.
    - Ethernet TCP: 1GB/(50 GB/s) + 50us * log2(1024) + retransmit risk = ~30-150ms.
    - **InfiniBand provides consistent ~20ms latency without TCP retransmit spikes.**
