title: InfiniBand vs Ethernet for Training
scenario: 'You are designing a large-scale LLM training cluster and evaluating networking options.'
question: 'What specific properties of InfiniBand reduce AllReduce latency compared to Ethernet?'
details:
  realistic_solution: 'InfiniBand advantages: (1) RDMA (Remote Direct Memory Access) bypasses the host CPU and OS kernel, reducing per-message latency from ~10-50 μs to ~1-2 μs. (2) Lossless fabric uses credit-based flow control, guaranteeing zero packet loss. Ethernet uses PFC which can cause deadlocks. Packet loss triggers TCP retransmission, adding 10-100ms tail latency spikes. (3) Adaptive routing dynamically routes around congestion. For AllReduce across 1000+ GPUs, even a single slow link creates a straggler.'
  common_mistake: |
    **The Pitfall:** Focusing only on raw bandwidth.
    **The Rationale:** Candidates assume that 400 Gb/s Ethernet is identical to 400 Gb/s InfiniBand, overlooking protocol and fabric differences.
    **The Consequence:** Selecting Ethernet for cost savings but suffering from massive tail latency spikes that stall distributed training.
  napkin_math: |
    **Assumptions & Constraints:**
    - AllReduce latency for 1GB gradient buffer (N=1024).

    **Calculations:**
    - InfiniBand RDMA: 1GB/(50 GB/s) + 2us * log2(1024) = ~20ms.
    - Ethernet TCP: 1GB/(50 GB/s) + 50us * log2(1024) + retransmit risk = ~30-150ms.

    **Conclusion & Interpretation:**
    - **Result: ~20ms latency (Latency-Tail Bound)**. InfiniBand provides consistent ~20ms latency without TCP retransmit spikes.
