title: ECMP Hash Collision Causing Training Slowdown
scenario: In a 64-node training cluster with a fat-tree network, 4 specific node pairs consistently show
  3× higher AllReduce latency than others. All links are healthy. The pattern is deterministic — the same
  pairs are always slow. Network utilization averages 45% but some links show 95%.
details:
  realistic_solution: 'This is an ECMP hash collision. ECMP (Equal-Cost Multi-Path) routing uses a hash
    of the flow 5-tuple to select among equal-cost paths. If multiple heavy flows hash to the same path,
    that link becomes a hotspot while parallel links sit idle. The 45% average but 95% peak confirms this
    — traffic is unevenly distributed. Fixes: (1) Use adaptive routing (e.g., InfiniBand AR) that dynamically
    selects paths based on congestion. (2) Flowlet switching to re-hash flows at packet-gap boundaries.
    (3) Add entropy to flow headers (vary source ports). (4) Topology-aware job placement to avoid flows
    that hash to the same spine links.'
  common_mistake: Blaming faulty hardware since specific pairs are consistently slow. The deterministic
    nature actually points to a routing issue, not a hardware issue.
  napkin_math: 'With 8 equal-cost paths, probability of 2 flows colliding = 1/8. With 16 flows: expected
    collisions ≈ 16²/(2×8) = 16. Birthday paradox makes hotspots inevitable at scale.'
