title: At-Least-Once Delivery Semantics
scenario: When using a message broker like Kafka or SQS with 'at-least-once' delivery, what critical property
  must your consumer application implement to avoid corrupting data if a message is processed twice?
details:
  realistic_solution: The consumer must be idempotent. This means applying the same message multiple times
    has the same effect as applying it once, safely handling duplicate deliveries.
  common_mistake: Assuming the broker guarantees exactly-once delivery by default, or trying to solve
    deduplication solely at the network layer.
  napkin_math: '- At 100K msgs/s with 0.1% duplicate rate = 100 duplicate messages per second | - Non-idempotent
    "increment balance by $10": duplicates cause $1,000/s in errors | - Idempotent "set balance to $X
    with txn_id": duplicates are harmless no-ops'
  options:
  - Eventual Consistency
  - Idempotency
  - ACID Transactions
  - Two-Phase Commit
