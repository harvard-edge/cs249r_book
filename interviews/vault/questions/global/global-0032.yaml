title: At-Least-Once Delivery Semantics
scenario: You are using a message broker like Kafka or SQS with 'at-least-once' delivery.
question: "What critical property must your consumer application implement to avoid corrupting data if a message is processed twice?"
details:
  realistic_solution: 'The consumer must be idempotent. This means applying the same message multiple times has the same effect as applying it once, safely handling duplicate deliveries.'
  common_mistake: |
    **The Pitfall:** Assuming the broker guarantees exactly-once delivery by default.
    **The Rationale:** Candidates misunderstand distributed systems guarantees and expect the infrastructure to handle all edge cases seamlessly.
    **The Consequence:** Silent data corruption and duplicated transactions when network retries inevitably occur.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 100K msgs/s with 0.1% duplicate rate.
    2. **Calculations:**
       - Duplicates = 100 messages per second.
       - Non-idempotent "increment $10" = $1,000/s error.
       - Idempotent "set balance with txn_id" = $0 error.
    3. **Conclusion & Interpretation:**
       - **Result: Idempotency is Mandatory.** Duplicates are harmless no-ops.
  options:
  - Eventual Consistency
  - Idempotency
  - ACID Transactions
  - Two-Phase Commit
  correct_index: 1
