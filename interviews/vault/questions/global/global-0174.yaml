title: The Grid Emissions Gap
scenario: France's electricity grid produces ~50 gCO2/kWh, while Poland's grid produces
  ~700 gCO2/kWh.
question: If you run the same 1,000 GPU-hour training job in each country, how does
  the carbon footprint differ?
details:
  realistic_solution: Deploying a carbon-aware scheduler allows massive mitigation.
    Moving the exact same 1,000 GPU-hour job from Poland to France reduces the footprint
    by 14x due strictly to grid carbon intensity. This dominates hardware PUE improvements.
  common_mistake: '**The Pitfall:** Assuming carbon footprint is only about hardware
    energy efficiency or datacenter PUE.

    **The Rationale:** Engineers are used to optimizing power draw and cooling overhead.

    **The Consequence:** Ignoring the grid''s carbon intensity, which acts as a massive
    14x multiplier and swamps any minor hardware efficiency gains.

    '
  napkin_math: '**Assumptions & Constraints:**

    - Compute: 1,000 GPU-hours on 300W A100s

    - France Grid: 50 gCO2/kWh

    - Poland Grid: 700 gCO2/kWh


    **Calculations:**

    - Energy = 1,000 h * 0.3 kW = 300 kWh

    - France Emissions: 300 kWh * 50 g/kWh = 15,000 g (15 kg CO2)

    - Poland Emissions: 300 kWh * 700 g/kWh = 210,000 g (210 kg CO2)


    **Conclusion & Interpretation:**

    - **Result: Environmental-Impact Bound**. Moving the job from Poland to France
    reduces the carbon footprint by 14x.

    '
