title: The Grid Emissions Gap
scenario: France's electricity grid produces ~50 gCO2/kWh (mostly nuclear), while Poland's grid produces ~700 gCO2/kWh (mostly coal).
question: If you run the same 1,000 GPU-hour training job in each country, how does the carbon footprint differ?
details:
  realistic_solution: "France: 1,000 GPU-hours * 0.3 kW (A100) * 50 gCO2/kWh = 15,000 gCO2 = 15 kg CO2. Poland: 1,000 GPU-hours * 0.3 kW * 700 gCO2/kWh = 210,000 gCO2 = 210 kg CO2. Running in Poland produces 14x more CO2 for identical compute. This is why carbon-aware scheduling — shifting workloads to low-carbon grids — is the single highest-leverage sustainability intervention."
  common_mistake: |
    **The Pitfall:** Assuming carbon footprint is only about hardware energy efficiency or datacenter PUE.
    **The Rationale:** Engineers are used to optimizing power draw and cooling overhead.
    **The Consequence:** Ignoring the grid's carbon intensity, which acts as a massive 14x multiplier and swamps any minor hardware efficiency gains.
  napkin_math: |
    * Compute power: 1,000 GPU-hours * 300W (0.3 kW) = 300 kWh.
    * France CO2: 300 kWh * 50 gCO2/kWh = 15,000 g = 15 kg CO2.
    * Poland CO2: 300 kWh * 700 gCO2/kWh = 210,000 g = 210 kg CO2.
    * Ratio: 210 / 15 = 14x difference.
    * **Running in Poland produces 14x more CO2 for identical compute operations.**
