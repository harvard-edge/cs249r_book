title: Topology-Aware Placement Rule
scenario: A distributed inference service can place 8 model shards within one NVLink node or across two InfiniBand-connected nodes.
question: How should an inference scheduler place 8 model shards to avoid topology-induced communication bottlenecks?
details:
  realistic_solution: Prefer placing tightly communicating shards within the fastest local interconnect domain. Spill across nodes only when memory or availability requires it, and account for the slower inter-node bandwidth and higher latency. Placement should optimize communication graph locality, not just free GPU count.
  common_mistake: |
    **The Pitfall:** Scheduling shards onto any free GPUs as long as aggregate memory requirements are met.
    **The Rationale:** Treating all GPUs in a cluster as perfectly interchangeable compute units.
    **The Consequence:** Cross-node communication dominates latency, destroying inference throughput for tightly-coupled tensor parallel operations.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Intra-node NVLink bandwidth: ~600-900 GB/s.
       - Inter-node InfiniBand bandwidth: ~50 GB/s (400 Gbps).
    2. **Calculations:**
       - Ratio: 600 GB/s / 50 GB/s = 12x difference.
    3. **Conclusion & Interpretation:**
       - **Result: Topology-Bound.** Crossing nodes creates a >10x communication penalty for shard exchanges.
