title: The Phantom Memory Pool
scenario: A production recommendation model runs efficiently in PyTorch eager mode, using 60GB of an 80GB A100 during the forward pass. To increase QPS, you enable CUDA graphs. You run a standard eager warmup pass, then trigger the graph capture. Immediately, the system throws a CUDA Out of Memory (OOM) error, even though the batch size and model architecture haven't changed. Model weights are 20GB, and peak activations are 40GB.
question: "Why does CUDA graph capture OOM after eager warmup when the same 20GB-weight, 40GB-activation model fits in eager mode?"
details:
  realistic_solution: The symptom (OOM occurring exactly at graph capture time despite eager mode fitting comfortably) is caused by how graph capture mechanisms handle memory planning. CUDA graphs require stable virtual memory addresses to guarantee safe replay. Because of this, the framework allocates a dedicated, contiguous memory pool specifically for the graph's intermediates. When you run the eager warmup pass, the framework's caching allocator reserves 40GB for the activations. Unless explicitly cleared, this 40GB remains in the reserved pool. When graph capture starts, it requests a *new* 40GB memory pool for its private use. The hardware-compiler co-design fix is to call `torch.cuda.empty_cache()` after the warmup and before capture, or to configure the allocator to share memory pools across graph captures using memory pool APIs.
  common_mistake: |
    **The Pitfall:** Arbitrarily reducing the batch size to compensate for perceived graph metadata overhead.
    **The Rationale:** Candidates assume the graph capture metadata itself takes up 20GB+ of VRAM.
    **The Consequence:** The actual issue (allocator state) is ignored, and the throughput gains of CUDA graphs are destroyed by the smaller batch size.
  napkin_math: |
    - Total VRAM: 80GB. Eager memory state: 20GB Weights + 40GB reserved allocator = 60GB.
    - Graph capture initiates and requests a private memory pool for its activations: +40GB.
    - Total requested: 60GB + 40GB = 100GB (OOM).
    - **By calling `empty_cache()`, the eager allocator drops to 0GB, allowing capture to comfortably fit in 60GB.**
