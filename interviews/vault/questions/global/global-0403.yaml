title: Idle Power Efficiency Budget
scenario: A GPU cluster has 1,000 accelerators. Each accelerator draws 700 W at full
  load and 250 W idle. Average utilization is 45%. Estimate average accelerator power
  and explain why improving utilization can reduce cost per training token even if
  total power rises.
question: What is average accelerator power at 45% utilization for 1,000 GPUs with
  700 W load and 250 W idle power?
details:
  realistic_solution: Average per-GPU power is 0.45 x 700 + 0.55 x 250 = 452.5 W.
    The fleet draws about 452.5 kW for accelerators. Better utilization may raise
    total power but can reduce energy per useful token because more of the fixed idle
    power becomes productive work.
  common_mistake: Assuming idle GPUs consume zero power, which makes low utilization
    look cheaper than it is.
  napkin_math: Per GPU = 315 W + 137.5 W = 452.5 W. Fleet = 452.5 W x 1,000 = 452.5
    kW.
