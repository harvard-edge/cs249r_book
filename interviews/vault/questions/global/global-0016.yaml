title: The Purpose of the Roofline Model
scenario: If you plot your inference workload on a Roofline Model and the point lands far to the left
  of the 'ridge point', what does this tell you about your system?
question: "If you plot your inference workload on a Roofline Model and the point lands far to the left of the 'ridge point', what does this tell you about your system?"
details:
  realistic_solution: It means the workload is Memory-Bound. The arithmetic intensity is too low; the
    processor is starving for data and cannot reach its peak theoretical compute performance (the flat
    roof) because it hits the slanted "memory bandwidth wall" first.
  common_mistake: Thinking the left side means the system is slow because of the CPU.
  napkin_math: '- Ridge point = 500 FLOPs/byte. Your workload = 10 FLOPs/byte | - Achievable perf = 10
    × 2 TB/s = 20 TFLOPS (out of 989 TFLOPS peak) | - => Only 2% compute utilization — memory wall dominates'
  options:
  - The workload is Compute-Bound (ALU constrained).
  - The workload is Memory-Bound (Bandwidth constrained).
  - The model has suffered catastrophic forgetting.
  - The hardware is thermally throttling.
  correct_index: 1
