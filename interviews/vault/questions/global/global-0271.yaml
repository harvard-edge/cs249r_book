title: Tensor Parallelism Within vs Across Nodes
scenario: A team proposes TP=16 across two 8-GPU DGX H100 nodes. Compare this to TP=8 within a node + DP=2 across nodes.
question: How would you quantify the communication overhead of each approach?
details:
  realistic_solution: "TP requires high-frequency AllReduce operations in the critical path that cannot be overlapped with compute. TP=16 across nodes forces AllReduce traffic over 50 GB/s InfiniBand, creating a catastrophic bottleneck compared to 900 GB/s NVLink. DP gradient sync occurs during the backward pass and can be heavily overlapped using ZeRO-style sharding. Thus, TP=8+DP=2 exposes significantly less non-overlappable communication latency."
  common_mistake: |
    **The Pitfall:** Treating cross-node bandwidth the same as intra-node bandwidth.
    **The Rationale:** Believing that 400 Gbps InfiniBand is "fast enough" to handle any topology.
    **The Consequence:** Running TP across the slow link decimates training throughput because TP communication happens in the critical path and cannot be overlapped.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - InfiniBand (Cross-node): 50 GB/s
       - NVLink (Intra-node): 900 GB/s
       - Activation tensor: 128 MB (per layer)
       - Layers: 80
    2. **Calculations:**
       - Cross-node AllReduce (TP=16): 80 * 128 MB * 2 / 50 GB/s = 409.6 ms non-overlappable
       - Intra-node AllReduce (TP=8): 80 * 128 MB * 2 / 900 GB/s = 22.7 ms
       - NVLink vs IB bandwidth ratio: 900 / 50 = 18x
    3. **Conclusion & Interpretation:**
       - **Result: Communication-Bound (Interconnect Bottleneck)**
