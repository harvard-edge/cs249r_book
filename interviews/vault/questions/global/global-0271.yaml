title: Tensor Parallelism Within vs Across Nodes
scenario: 'A team proposes TP=16 across two 8-GPU DGX H100 nodes (NVLink within node: 900 GB/s, InfiniBand
  between nodes: 400 Gb/s = 50 GB/s). Compare this to TP=8 within a node + DP=2 across nodes. Quantify
  the communication overhead of each.'
details:
  realistic_solution: 'TP=16 across 2 nodes: every layer requires 2 AllReduce operations (forward + backward).
    For hidden_dim=8192, FP16, micro-batch=4, seq=2048: the full activation tensor is 4 × 2048 × 8192
    × 2B = 128 MB. With 80 layers: 160 AllReduces per step, half crossing the IB link. Cross-node AllReduce
    of 128 MB at 50 GB/s (using 2× multiplier for AllReduce): 2 × 128 MB / 50 = ~5.12ms each × 80 cross-node
    = 409.6ms. NVLink AllReduce: 2 × 128 MB / 450 = 0.57ms × 80 = 45.6ms. Total TP=16 comm: 455.2ms. TP=8+DP=2:
    TP AllReduce is NVLink-only: 0.57ms × 160 = 91.2ms. DP gradient sync: 14 GB over IB at 50 GB/s = 280ms,
    but overlaps with backward pass. Net exposed comm: ~91.2ms + 20ms residual DP sync = 111.2ms. TP=8+DP=2
    exposes significantly less non-overlappable communication. TP across nodes is worse because TP communication
    cannot be overlapped with compute.'
  common_mistake: Treating cross-node bandwidth the same as intra-node bandwidth. NVLink is 18x faster
    than InfiniBand — running TP across the slow link decimates training throughput.
  napkin_math: 'TP=16: 80 cross-node AllReduces × 128MB. Each takes ~5.12ms (AllReduce multiplier). 80
    × 5.12ms = 409.6ms non-overlappable. TP=8+DP=2: 0ms cross-node TP + DP sync overlapped with backward.
    NVLink/IB ratio: 900/50 = 18x. TP cross-node adds massive latency per layer.'
