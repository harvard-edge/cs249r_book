title: Multi-Tier Embedding Lookups
scenario: Your recommendation system uses an enormous Deep Learning Recommendation Model (DLRM) with 5TB
  of embedding tables. The hardware is a single node with 8x A100 (80GB) GPUs, 2TB Host RAM, and 8x 3.2TB
  NVMe drives. You need to process 10,000 QPS with p99 latency < 50ms. Architect the embedding lookup
  system across this memory hierarchy.
question: "How would you architect 5TB DLRM embedding lookups across HBM, host RAM, and NVMe for 10,000 QPS under 50ms P99?"
details:
  realistic_solution: Implement a software-managed, explicitly tiered embedding cache. HBM acts as L1
    (caching the top 5% hottest embeddings, ~300GB across 8 GPUs). Host DRAM acts as L2 (caching the next
    30%, ~1.5TB). NVMe acts as L3 (storing all 5TB). Use a hash-based routing mechanism to shard requests
    across GPUs. For L3 (NVMe) lookups, bypass the OS page cache entirely using `O_DIRECT` and async I/O
    (io_uring) to eliminate memory copies and CPU overhead. Implement a background prefetching thread
    that predicts upcoming lookups (e.g., using user session context) to promote embeddings from NVMe
    -> DRAM -> HBM before the forward pass requires them.
  common_mistake: Relying on OS-level page faults (mmap) to pull embeddings from NVMe directly, resulting
    in massive I/O amplification, thread blocking, and missing the 50ms p99 SLA.
  napkin_math: '10,000 QPS * 100 features per request = 1M embedding lookups/sec. NVMe random read IOPS
    per drive is ~1M, so 8 drives yield 8M IOPS (sufficient throughput). NVMe latency is ~10-50us. DRAM
    latency is ~100ns. HBM latency is ~1us (but massive bandwidth). If cache hit rates are 80% L1, 15%
    L2, 5% L3: we do 50,000 NVMe reads/sec. 50k reads * 128 bytes (embedding size) = 6.4 MB/s PCIe traffic,
    which is trivial. The latency is dominated by the 5% NVMe lookups (~50us), comfortably fitting within
    the 50ms SLA.'
