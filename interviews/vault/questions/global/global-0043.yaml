title: The Experiment Reproducibility Crisis
scenario: A teammate trained a model 3 months ago that achieved 94% accuracy. You need to reproduce this result for a production deployment. You have the code commit hash, but when you retrain, you only get 91%. The code is identical.
question: "How would you systematically debug why identical-code retraining drops the model from 94% to 91% accuracy?"
details:
  realistic_solution: "Systematically check the 5 axes of reproducibility: (1) Data: Has the training dataset changed? Was it versioned, or was it a live query that returns different rows today? (2) Random seeds: Were seeds set for all sources of randomness (Python, NumPy, PyTorch, CUDA)? CUDA convolution algorithms are non-deterministic by default. (3) Library versions: Did PyTorch, CUDA, or cuDNN get updated? Different cuDNN auto-tuning can change numerical results. (4) Hardware: Was the original run on A100 and the new one on H100? Different Tensor Core implementations produce different rounding. (5) Hyperparameters: Were all hyperparameters logged, including implicit ones like dataloader num_workers (which affects batch ordering)?"
  common_mistake: |
    **The Pitfall:** Assuming that identical code guarantees identical results.
    **The Rationale:** Standard software engineering principles suggest deterministic builds from code.
    **The Consequence:** Ignoring the massive hidden state in ML (data, seeds, cuDNN versions, hardware), leading to hours of wasted debugging.
  napkin_math: |
    - 5 reproducibility axes × ~5 variables each = ~25 potential sources of divergence.
    - Without systematic experiment tracking (data version, environment snapshot, seed log), debugging this is O(25) bisection experiments.
    - **At 48 hours per experiment, this could take 1,200 hours of compute in the worst case.**
