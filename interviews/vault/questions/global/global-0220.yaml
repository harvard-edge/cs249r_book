title: Voltage Scaling and Dynamic Power
scenario: An accelerator runs at 1.0V and 1.5 GHz, consuming 250W dynamic power.
question: What is the new dynamic power after reducing voltage and frequency by 15%?
details:
  realistic_solution: 'P_dyn = C × V² × f. With V'' = 0.85V and f'' = 0.85f (frequency proportional to voltage): P'' = C × (0.85V)² × (0.85f) = C × V² × f × 0.85³ = 250 × 0.6141 = 153.5W. Power drops by 38.6% while performance drops by only 15%. This cubic relationship is why DVFS (dynamic voltage-frequency scaling) is so effective. Performance per watt actually improves: 85% performance at 61.4% power = 1.38× better perf/W.'
  common_mistake: |
    **The Pitfall:** Applying the voltage reduction linearly to the power calculation.
    **The Rationale:** Misunderstanding the physics of CMOS dynamic power consumption.
    **The Consequence:** Radically underestimating the power savings achieved through dynamic voltage-frequency scaling (DVFS).
  napkin_math: |
    - **Dynamic Power Formula:** P ∝ V²f
    - **Proportional Scaling:** Since f drops by 15% along with V, P ∝ V³
    - **New Power:** 250W × (0.85)³ = 250W × 0.614 = **153.5W**
    - **Savings:** Power drops by ~39% for only a 15% performance loss.
    - **Efficiency:** Perf/Watt improves by (0.85 / 0.614) = **1.38x**.
