title: Checkpoint Storage Savings Across Fleet
scenario: A fleet of 2 million devices keeps 5 personalization checkpoints of 12 MB
  each. A new policy keeps 1 full checkpoint and 2 delta checkpoints of 2 MB each.
  Estimate per-device and fleet storage savings.
question: How much storage is saved by replacing five 12 MB checkpoints with one 12
  MB checkpoint plus two 2 MB deltas across 2M devices?
details:
  realistic_solution: Old storage is 60 MB/device. New storage is 12 + 4 = 16 MB/device.
    Savings are 44 MB/device. Across 2 million devices, savings are 88 TB of device
    storage.
  common_mistake: Forgetting to multiply small per-device savings across the fleet.
  napkin_math: Old = 5 x 12 = 60 MB. New = 12 + 2 x 2 = 16 MB. Savings = 44 MB/device.
    Fleet = 44 MB x 2M = 88,000,000 MB ≈ 88 TB using decimal storage units.
