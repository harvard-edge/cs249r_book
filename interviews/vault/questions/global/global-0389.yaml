title: Checkpoint Storage Savings Across Fleet
scenario: A fleet of 2 million devices keeps 5 personalization checkpoints of 12 MB each. A new policy keeps 1 full checkpoint and 2 delta checkpoints of 2 MB each.
question: "How much storage is saved by replacing five 12 MB checkpoints with one 12 MB checkpoint plus two 2 MB deltas across 2M devices?"
details:
  realistic_solution: Old storage is 60 MB/device. New storage is 12 + 4 = 16 MB/device. Savings are 44 MB/device. Across 2 million devices, savings are 88 TB of device storage.
  common_mistake: |
    **The Pitfall:** Ignoring the fleet multiplier.
    **The Rationale:** Saving a few megabytes on a single device seems trivial.
    **The Consequence:** Massive systemic cost savings are overlooked because the local scale feels insignificant.
  napkin_math: |
    - Old storage: 5 * 12 MB = 60 MB/device.
    - New storage: 12 MB + (2 * 2 MB) = 16 MB/device.
    - Savings: 60 MB - 16 MB = 44 MB/device.
    - **Across 2 million devices, savings = 44 MB * 2,000,000 = 88 TB.**
