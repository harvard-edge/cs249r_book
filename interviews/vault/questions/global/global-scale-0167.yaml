title: Congestion Control SLO Spec
scenario: A serving platform has cloud, edge, and mobile clients sharing a central inference API. During bursts, mobile clients retry aggressively, edge gateways batch retries, and cloud clients use exponential backoff. Specify the client and server controls needed to prevent retries from amplifying congestion.
question: What client and server controls are needed so retries from cloud, edge, and mobile clients do not amplify inference congestion?
details:
  realistic_solution: The spec should require bounded retries, exponential backoff with jitter, per-client budgets, server-side admission control, retry-after hints, idempotency keys, and priority classes. Edge gateways need batch retry caps, mobile clients need radio-aware retry limits, and cloud clients need circuit breakers.
  common_mistake: Adding more retries to improve reliability while ignoring that synchronized retries can overload the shared service.
  napkin_math: If 100,000 clients each retry twice in a 10-second window, the retry wave adds 20,000 rps before any original traffic is counted.
