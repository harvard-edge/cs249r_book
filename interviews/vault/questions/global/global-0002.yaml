title: The FP16 Model Footprint
scenario: A model has 7 billion parameters. How much VRAM does it occupy just to load the weights in FP16
  precision?
question: "A model has 7 billion parameters. How much VRAM does it occupy just to load the weights in FP16 precision?"
details:
  realistic_solution: 14 GB. Each of the 7 billion parameters requires 2 bytes in FP16 precision, giving
    7B × 2 B = 14 GB of VRAM just for weight storage. This is a floor — during inference you also need
    memory for activations, KV cache, and framework overhead. During training, optimizer states (Adam
    stores FP32 master weights, momentum, and variance) push the total to ~112 GB in mixed-precision training
    (FP16 weights + FP16 gradients + FP32 master weights + FP32 momentum + FP32 variance = 16 bytes per
    parameter). This is why 7B models fit on a single A100-40GB for inference but require A100-80GB or
    multi-GPU setups for training.
  common_mistake: Forgetting that each parameter in FP16 takes 2 bytes, not 1.
  napkin_math: 7B parameters × 2 bytes/parameter (FP16) = 14 GB.
