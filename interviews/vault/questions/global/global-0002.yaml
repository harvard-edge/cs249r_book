title: The FP16 Model Footprint
scenario: A model has 7 billion parameters.
question: How much VRAM does it occupy just to load the weights in FP16 precision?
details:
  realistic_solution: 14 GB. Each of the 7 billion parameters requires 2 bytes in FP16 precision, giving 14 GB of VRAM just for static weight storage.
  common_mistake: |
    **The Pitfall:** Forgetting that each parameter in FP16 takes 2 bytes.
    **The Rationale:** People often conflate parameter count with byte size or assume 1 byte per parameter like in INT8 quantization.
    **The Consequence:** Underestimating VRAM requirements by exactly half, leading to unexpected Out-Of-Memory (OOM) errors during deployment.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 7 Billion parameters.
       - FP16 precision requires 2 bytes per parameter.
    2. **Calculations:**
       - VRAM = 7 * 10^9 * 2 bytes = 14 GB.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound (Capacity).** The model requires exactly 14 GB just for static weight storage, completely excluding KV cache or execution activations.
