title: Dragonfly Topology Congestion without Valiant Routing
scenario: A 4000-GPU cluster uses a Dragonfly topology. Intra-group bandwidth tests perfectly at 400Gbps. However, when a pipeline parallel model sends activations between Group 1 and Group 5, bandwidth collapses to 40Gbps per node, despite the global optical links between groups being completely healthy and error-free.
question: Why does Group 1 to Group 5 traffic in the Dragonfly collapse to 40 Gbps per node despite healthy global links?
details:
  realistic_solution: The root cause is the use of minimal routing instead of non-minimal (Valiant) routing in a Dragonfly topology under adversarial traffic patterns. Dragonfly networks have high intra-group bandwidth but relatively sparse inter-group (global) links. Minimal routing sends traffic directly over the single global link connecting Group 1 to Group 5. When many nodes in Group 1 talk to Group 5, that specific direct link becomes a massive bottleneck. The solution is to enable Valiant routing (or adaptive routing), which randomly bounces traffic through an intermediate group (e.g., Group 1 -> Group 3 -> Group 5), utilizing the entire global link bandwidth pool at the cost of a slight latency increase.
  common_mistake: |
    **The Pitfall:** Focusing on local PCIe bottlenecks or assuming the optical transceivers on the global links are degraded.
    **The Rationale:** Ignoring the impact of routing algorithms on traffic distribution in advanced topologies.
    **The Consequence:** Wasting time replacing healthy hardware while failing to address the fundamental routing misconfiguration.
  napkin_math: |
    - **Group Injection:** 100 nodes × 400 Gbps = **40,000 Gbps** total bandwidth.
    - **Minimal Routing Global Links:** Assume 10 direct links to Group 5: 10 × 400 Gbps = **4,000 Gbps**.
    - **Per-Node Bottleneck:** 4,000 Gbps / 100 nodes = **40 Gbps per node**.
    - **Conclusion:** Minimal routing creates a choke point on the direct links. Valiant routing would distribute the 40,000 Gbps load across all available global links to other groups.
