title: Disaggregated Evaluation Cluster for Foundation Models
scenario: You are managing the fairness release-gate for a 50B parameter vision-language model retrained
  weekly. The evaluation dataset contains 10 Billion images. You must compute fairness metrics (e.g.,
  equal opportunity) across 500 overlapping demographic and geographic cohorts. Your maximum weekly compute
  budget for evaluation is $25,000, and GPU instances cost $2.50/hour.
details:
  realistic_solution: We must trade off exact dataset evaluation for statistically significant stratified
    sampling. Running a 50B model takes ~50ms per image. Evaluating 10B images takes 500M GPU seconds
    (~138,888 GPU hours), costing $347,220 per run—14x over budget. Instead, we design a stratified sampling
    pipeline. We need to ensure minority cohorts have enough samples to achieve a 95% confidence interval
    with a margin of error <1%. We sample 50,000 images per cohort. For 500 cohorts, assuming worst-case
    zero overlap, that is 25M images. We run inference on these 25M images. To account for intersections,
    we use a vectorized metric computation engine (e.g., Spark or Ray) to calculate metrics across all
    overlapping slices. This reduces the compute drastically while maintaining the statistical rigor required
    for fairness auditing.
  common_mistake: Attempting to run exact inference on the entire 10B image dataset for every release,
    vastly exceeding the compute budget.
  napkin_math: "Budget: $25,000 at $2.50/hr = 10,000 GPU hours available. \nFull evaluation: 10B images\
    \ * 0.05s = 500,000,000s = 138,888 hours (Cost: $347,220) -> Fails.\nStratified sampling: 50,000 images\
    \ * 500 cohorts = 25,000,000 images.\nCompute time: 25M * 0.05s = 1,250,000s = ~347 GPU hours.\nCost:\
    \ 347 hours * $2.50 = $867.50. This leaves ample budget for the heavy Spark aggregations and confidence\
    \ interval bootstrapping."
