title: The GPU Cluster Power Wall
scenario: You want to build a 10,000 H100 GPU training cluster. Each H100 consumes 700W at peak.
question: "What is the total power draw, and why is securing this amount of power a major infrastructure challenge?"
details:
  realistic_solution: 'GPU power alone: 10,000 × 700W = 7 MW. Adding CPU, networking, and storage brings the IT load to ~10 MW. With a typical PUE of 1.2 for cooling and power distribution, the total facility draw is 12 MW. This is equivalent to powering ~9,000 US homes. Securing 12+ MW of reliable power requires: (1) proximity to high-voltage transmission lines, (2) long-term power purchase agreements (PPAs), (3) often 12-24 months of lead time for grid connection. Power availability is now the primary bottleneck for new GPU clusters, not chip supply.'
  common_mistake: |
    **The Pitfall:** Only counting GPU power and forgetting PUE, networking, CPUs, and cooling.
    **The Rationale:** GPU TDP is the most heavily advertised spec, overshadowing facility overheads.
    **The Consequence:** Grossly under-provisioning data center power, leading to tripped breakers or inability to boot the full cluster.
  napkin_math: |
    - **GPU Power**: 10,000 GPUs * 700W peak = 7 MW.
    - **IT Load Overhead**: Add CPUs, RAM, networking, and storage (~300W/GPU) = 10 MW IT load.
    - **Total Power (PUE 1.2)**: 10 MW * 1.2 = 12 MW.
    - **Annual Cost**: 12 MW * 8760 hrs * $0.10/kWh = $10.5M/year.
    - **Conclusion**: The total facility draw is **12 MW**.
