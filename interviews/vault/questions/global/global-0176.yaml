title: The GPU Cluster Power Wall
scenario: You want to build a 10,000 H100 GPU training cluster. Each H100 consumes 700W at peak. What
  is the total power draw, and why is securing this amount of power a major infrastructure challenge?
question: "What is the total power draw, and why is securing this amount of power a major infrastructure challenge?"
details:
  realistic_solution: 'GPU power alone: 10,000 × 700W = 7 MW. With PUE of 1.3 (cooling, networking, storage,
    power distribution): 7 MW × 1.3 = 9.1 MW total facility draw. This is equivalent to powering ~7,000
    US homes. Securing 9+ MW of reliable power requires: (1) proximity to high-voltage transmission lines,
    (2) long-term power purchase agreements (PPAs), (3) often 12-24 months of lead time for grid connection.
    Power availability is now the primary bottleneck for new GPU clusters, not chip supply.'
  common_mistake: Only counting GPU power and forgetting PUE overhead, networking, CPUs, storage, and
    cooling. Also underestimating how difficult it is to secure multi-MW power contracts.
  napkin_math: '10,000 H100 GPUs * 700W peak = 7 MW. Add CPUs, RAM, IB NDR networking (50GB/s switches),
    and storage: ~300W overhead per GPU -> 10 MW IT load. Typical PUE is 1.2 -> 12 MW total power. Over
    a year: 12 MW * 8760 hrs = 105,120 MWh. At $0.10/kWh, electricity is $10.5M/year. 12 MW requires utility-scale
    substation upgrades, making power the primary bottleneck.'
