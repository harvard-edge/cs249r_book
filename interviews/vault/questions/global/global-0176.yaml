title: The GPU Cluster Power Wall
scenario: You want to build a 10,000 GPU training cluster. Each GPU consumes 700W at peak.
question: What is the total power draw, and why is securing this amount of power a major infrastructure challenge?
details:
  realistic_solution: 'GPU power alone: 10,000 * 700W = 7 MW. Adding CPU, networking, and storage brings the IT load to ~10 MW. With a typical PUE of 1.2 for cooling and power distribution, the total facility draw is 12 MW. Securing 12+ MW of reliable power requires proximity to high-voltage transmission lines, long-term PPAs, and 12-24 months of lead time. Power availability is the primary bottleneck.'
  common_mistake: |
    **The Pitfall:** Only counting GPU power and forgetting PUE, networking, CPUs, and cooling.
    **The Rationale:** GPU TDP is the most heavily advertised spec, overshadowing facility overheads.
    **The Consequence:** Grossly under-provisioning data center power, leading to tripped breakers or inability to boot the full cluster.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 10,000 GPUs at 700W peak.
       - PUE = 1.2.
       - IT Overhead = 300W/GPU.
    2. **Calculations:**
       - GPU Power = 10,000 * 700W = 7 MW.
       - Total IT Load = 10,000 * (700W + 300W) = 10 MW.
       - Total Power = 10 MW * 1.2 = 12 MW.
    3. **Conclusion & Interpretation:**
       - **Result: Facility-Power Bound**
