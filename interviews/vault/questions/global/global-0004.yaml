title: The FP16 vs INT8 Precision Choice
scenario: During training, we typically use FP16 or BF16. For inference on edge devices, we often use INT8.
question: "Why do we move to 8-bit integers for deployment?"
details:
  realistic_solution: 'Throughput and Energy. 8-bit integers occupy half the memory of 16-bit floats, doubling the effective memory bandwidth. Additionally, INT8 math is significantly more energy-efficient and often achieves higher peak throughput on specialized NPUs via dedicated INT8 Tensor Cores.'
  common_mistake: |
    **The Pitfall:** Thinking INT8 is "more accurate."
    **The Rationale:** Candidates misunderstand the fundamental trade-off between numerical precision, speed, and energy.
    **The Consequence:** Incorrectly justifying quantization for model quality rather than deployment efficiency.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Precision format shift from FP16 (2 bytes) to INT8 (1 byte).
    2. **Calculations:**
       - Memory footprint: 1 byte / 2 bytes = 50% reduction.
       - Energy consumption: INT8 MACs use ~2-4x less energy than FP16 MACs.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bandwidth & Energy Bound.** Halves memory footprint and significantly reduces energy per inference.
