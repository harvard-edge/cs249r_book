title: The FP16 vs INT8 Precision Choice
scenario: During training, we typically use FP16 or BF16. For inference on edge devices, we often use
  INT8. Why do we move to 8-bit integers for deployment?
details:
  realistic_solution: Throughput and Energy. 8-bit integers occupy half the memory of 16-bit floats, doubling
    the effective memory bandwidth. Additionally, INT8 math is significantly more energy-efficient and
    often has higher peak throughput on specialized NPUs.
  common_mistake: Thinking INT8 is "more accurate." It is less accurate but much faster.
  napkin_math: INT8 uses 50% less memory and 2-4x less energy than FP16.
