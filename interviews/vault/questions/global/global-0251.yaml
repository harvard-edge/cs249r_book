title: Arithmetic Intensity Definition
scenario: You are performing a matrix-vector multiply y = Wx where W is a 4096 x 4096 matrix in FP16.
question: What is the arithmetic intensity of a matrix-vector multiply y = Wx where W is 4096x4096 in FP16?
details:
  realistic_solution: 'Arithmetic intensity (AI) = FLOPs / Bytes transferred. Units: FLOP/Byte. For y = Wx with W being 4096×4096 FP16: FLOPs = 2 × 4096 × 4096 = 33,554,432 (multiply-add counted as 2 ops). Bytes moved = W (33,554,432 bytes) + x (8,192 bytes) + y (8,192 bytes) = 33,570,816 bytes. AI = 33.55M / 33.57M ≈ 1.0 FLOP/Byte. This is well below the A100''s ridge point of 156 FLOP/Byte (312 TFLOPS / 2.0 TB/s), confirming that matrix-vector multiplies are deeply memory-bound — the fundamental reason autoregressive decoding is slow.'
  common_mistake: |
    **The Pitfall:** Forgetting that arithmetic intensity is FLOPS per byte transferred, not per element, or confusing FP16 (2 bytes) with FP32 (4 bytes).
    **The Rationale:** Basic misunderstandings of data types and the definition of arithmetic intensity lead to incorrect architectural assessments.
    **The Consequence:** Misidentifying the bottleneck of a model layer, leading to useless compute optimizations when memory bandwidth is the true limiter.
  napkin_math: |
    - FLOPs = 2 * 4096^2 = 33,554,432.
    - Bytes moved = (4096^2 * 2 bytes for W) + (4096 * 2 bytes for x) + (4096 * 2 bytes for y) = 33,554,432 + 8,192 + 8,192 = 33,570,816 Bytes.
    - Arithmetic Intensity = 33,554,432 FLOPs / 33,570,816 Bytes = ~1.0 FLOP/Byte.
    - A100 Ridge Point = 312 TFLOPS / 2.0 TB/s = 156 FLOP/Byte.
    - **1.0 FLOP/Byte is 156x below the ridge point, making the operation heavily memory-bound.**
