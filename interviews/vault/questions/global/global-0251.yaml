title: Arithmetic Intensity Definition
scenario: Define arithmetic intensity and state its units. What is the arithmetic intensity of a matrix-vector
  multiply y = Wx where W is 4096×4096 in FP16?
details:
  realistic_solution: 'Arithmetic intensity (AI) = FLOPs / Bytes transferred. Units: FLOP/Byte. For y
    = Wx with W being 4096×4096 FP16: FLOPs = 2 × 4096 × 4096 = 33,554,432 (multiply-add counted as 2
    ops). Bytes moved = W (33,554,432 bytes) + x (8,192 bytes) + y (8,192 bytes) = 33,570,816 bytes. AI
    = 33.55M / 33.57M ≈ 1.0 FLOP/Byte. This is well below the A100''s ridge point of 156 FLOP/Byte (312
    TFLOPS / 2.0 TB/s), confirming that matrix-vector multiplies are deeply memory-bound — the fundamental
    reason autoregressive decoding is slow.'
  common_mistake: Forgetting that arithmetic intensity is FLOPS per byte transferred, not per element.
    Also confusing FP16 (2 bytes) with FP32 (4 bytes).
  napkin_math: 'FLOPs: 2 × 4096² = 33,554,432. Bytes: (4096² × 2) + 8192 + 8192 = 33,570,816 Bytes. AI
    = 33,554,432 / 33,570,816 ≈ 1.0 FLOP/Byte. A100 ridge: 312T / 2.0T = 156 FLOP/Byte. Ratio: 156/1.0
    = 156x below ridge.'
