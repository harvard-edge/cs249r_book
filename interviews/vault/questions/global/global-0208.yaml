title: Activation Checkpointing Memory Savings
scenario: A 24-layer Transformer with batch size 32, sequence length 2048, hidden dimension 4096 stores activations in FP16. Without checkpointing, each layer stores ~512 MB of activations.
question: "How much activation memory is needed with no checkpointing versus checkpointing every 4 layers?"
details:
  realistic_solution: 'Without checkpointing: 24 layers × 512 MB = 12.3 GB. With checkpointing every 4 layers: store activations at 6 boundaries (layers 0, 4, 8, 12, 16, 20) = 6 × 512 MB = 3.1 GB. Plus the 4 layers of activations being recomputed in the current segment = 4 × 512 MB = 2 GB. Peak = 3.1 + 2.0 = 5.1 GB. Savings = ~59%. The trade-off: ~33% extra compute from recomputation (recompute forward for each segment during backward pass).'
  common_mistake: |
    **The Pitfall:** Thinking checkpointing eliminates all activation memory.
    **The Rationale:** It's easy to assume activations are completely discarded and recomputed from scratch.
    **The Consequence:** Underestimating memory needs, leading to unexpected OOM errors when sizing the batch or sequence length.
  napkin_math: |
    - **No checkpointing**: 24 layers * 512 MB = 12.3 GB.
    - **Checkpoint boundaries**: Checkpointing every 4 layers means 6 boundaries (layers 0, 4, 8, 12, 16, 20).
    - **Boundary memory**: 6 boundaries * 512 MB = 3.1 GB.
    - **Active layer memory**: Recomputing 4 layers requires 4 * 512 MB = 2.0 GB.
    - **Peak memory**: 3.1 GB + 2.0 GB = 5.1 GB.
    - **Conclusion**: Checkpointing reduces memory to **5.1 GB** (saving ~59%) but costs ~33% extra compute.
