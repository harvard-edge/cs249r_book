title: Activation Checkpointing Memory Savings
scenario: A 24-layer Transformer with batch size 32, sequence length 2048, hidden dimension 4096 stores
  activations in FP16. Without checkpointing, each layer stores ~512 MB of activations. Estimate total
  activation memory with and without checkpointing (checkpoint every 4 layers).
details:
  realistic_solution: 'Without checkpointing: 24 layers × 512 MB = 12.3 GB. With checkpointing every 4
    layers: store activations at 6 boundaries (layers 0, 4, 8, 12, 16, 20) = 6 × 512 MB = 3.1 GB. Plus
    the 4 layers of activations being recomputed in the current segment = 4 × 512 MB = 2 GB. Peak = 3.1
    + 2.0 = 5.1 GB. Savings = ~59%. The trade-off: ~33% extra compute from recomputation (recompute forward
    for each segment during backward pass).'
  common_mistake: Thinking checkpointing eliminates all activation memory. You still store activations
    at checkpoint boundaries — you just recompute the rest during backward.
  napkin_math: 'No ckpt: 24 × 512 MB = 12.3 GB. Ckpt every 4: 6 boundaries × 512 MB + 4 active × 512 MB
    = 3.1 + 2.0 = 5.1 GB. Saves ~59%, costs ~33% extra compute.'
