title: Handling Split Brain in a Distributed Database
scenario: Imagine a distributed database cluster split across two datacenters.
question: If the network link between the datacenters drops, how should the system behave to prioritize consistency over availability?
details:
  realistic_solution: The system must pause writes or refuse service in the minority partition to prevent conflicting updates (split brain), adhering to the CP side of the CAP theorem.
  common_mistake: |
    **The Pitfall:** Thinking the system can magically stay highly available and strongly consistent during a partition.
    **The Rationale:** Misunderstanding the CAP theorem and the definition of Split Brain.
    **The Consequence:** Accepting writes on both sides, requiring a manual, data-loss-inducing merge when the network recovers.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 5 nodes split 3:2 across two datacenters.
    2. **Calculations:**
       - Majority quorum = floor(5/2) + 1 = 3 nodes.
       - Partition A (3 nodes) accepts writes.
       - Partition B (2 nodes) rejects writes.
    3. **Conclusion & Interpretation:**
       - **Result: Quorum-Bound Consistency**
  options:
  - Both datacenters continue to accept writes and merge conflicts later.
  - The datacenter with the minority of nodes stops accepting writes to prevent data divergence.
  - The system accepts writes on 2 nodes based on ceil(5/2+1)=4 quorum logic.
  - All nodes degrade to read-only mode until a human operator intervenes.
  correct_index: 1
