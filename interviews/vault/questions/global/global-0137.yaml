title: Prompt Caching PCIe Bottleneck
scenario: You are building a multi-tenant RAG application using a 70B model. Every request shares a massive
  50k token system prompt. TTFT SLA is 500ms. Standard prefill takes 1.5s. You implement RadixAttention
  prompt caching, storing the 50k KV cache on host CPU RAM (NVMe offload) and loading it on demand over
  PCIe Gen4 x16. The TTFT drops, but only to ~700ms, failing the 500ms SLA.
details:
  realistic_solution: 'Decompose the cached TTFT latency: TTFT = KV Cache PCIe Load Time + User Prompt
    Prefill + Decode Step. The 50k token system prompt generates a ~16.3 GB KV cache for a 70B model.
    PCIe Gen4 x16 has a theoretical max bandwidth of 32 GB/s (realistically ~26 GB/s). Transferring 16.3
    GB takes ~620ms. The architecture is bound by PCIe bandwidth, not compute. To meet the 500ms SLA,
    the architecture must change: the shared 50k KV cache must be pinned as a resident block directly
    in GPU VRAM (sacrificing some batch size capacity), or the model must use Multi-Query Attention/Grouped-Query
    Attention to drastically reduce the absolute size of the KV cache, or upgrade to PCIe Gen5 / NVLink.'
  common_mistake: Optimizing the CPU RAM speed or trying to compress the KV cache using standard ZIP/LZ4
    algorithms before transfer.
  napkin_math: 'KV size: 50,000 tokens * 327 KB/token (Llama-3 70B) = 16.35 GB. PCIe Gen4 x16 effective
    bandwidth = ~26 GB/s. Transfer time = 16.35 GB / 26 GB/s = 628ms. 628ms + 50ms (user prompt prefill)
    = 678ms > 500ms SLA.'
