title: The PCIe Bandwidth Screen
scenario: You wrote a PyTorch script that loads images from an NVMe SSD and sends them to the GPU. The
  GPU utilization is hovering around 12%. You suspect the PCIe bus. What is the theoretical peak bandwidth
  of a PCIe Gen4 x16 slot?
question: "What is the theoretical peak bandwidth of a PCIe Gen4 x16 slot?"
details:
  realistic_solution: ~32 GB/s in each direction (~64 GB/s bidirectional). For host-to-device transfers
    (the common bottleneck when loading data), the effective limit is ~32 GB/s. If your preprocessing
    pipeline cannot saturate this, or if you are doing many tiny transfers with high overhead, the GPU
    will starve waiting for data.
  common_mistake: Confusing PCIe speeds with network (Ethernet) or memory (HBM) speeds.
  napkin_math: 'PCIe Gen4 x16 bandwidth: 16 lanes * 2GB/s = 32GB/s per direction. L4 GPU memory (GDDR6)
    bandwidth is 300GB/s. The ratio is 300 / 32 = 9.4x. Loading an image batch of 1GB takes 1GB / 32GB/s
    = 31ms over PCIe, but moving it inside L4 VRAM takes 1GB / 300GB/s = 3.3ms. The 9.4x bottleneck easily
    starves the GPU''s 120 TFLOPS compute if data isn''t prefetched.'
  options:
  - ~1.5 TB/s
  - ~64 GB/s
  - ~10 Gbps
  - ~400 Gbps
  correct_index: 1
