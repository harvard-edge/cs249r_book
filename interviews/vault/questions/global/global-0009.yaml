title: The PCIe Bandwidth Screen
scenario: You wrote a PyTorch script that loads images from an NVMe SSD and sends them to the GPU. The GPU utilization is hovering around 12%. You suspect the PCIe bus.
question: What is the theoretical peak bandwidth of a PCIe Gen4 x16 slot?
details:
  realistic_solution: ~32 GB/s in each direction (~64 GB/s bidirectional). For host-to-device transfers, the effective limit is ~32 GB/s. If your preprocessing pipeline cannot saturate this, or if you are doing many tiny transfers with high overhead, the GPU will starve waiting for data.
  common_mistake: |
    **The Pitfall:** Confusing PCIe speeds with network (Ethernet) or memory (HBM) speeds.
    **The Rationale:** Mixing up the various bandwidth bottlenecks (Gbps vs GB/s, HBM vs PCIe) in a dense system architecture.
    **The Consequence:** Wasting time profiling PyTorch code when the hardware bus physically cannot feed the GPU fast enough.
  napkin_math: |
    **Assumptions & Constraints:**
    - PCIe Gen4 lane bandwidth = 2 GB/s.
    - x16 slot = 16 lanes.

    **Calculations:**
    - 16 lanes * 2 GB/s = 32 GB/s unidirectional.

    **Conclusion & Interpretation:**
    - **Result: Bus-Bandwidth Bound**. PCIe bus limits host-to-device transfer speeds.
  options:
  - ~1.5 TB/s
  - ~32 GB/s
  - ~10 Gbps
  - ~400 Gbps
  correct_index: 1
