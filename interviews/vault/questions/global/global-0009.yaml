title: The PCIe Bandwidth Screen
scenario: You wrote a PyTorch script that loads images from an NVMe SSD and sends them to the GPU. The GPU utilization is hovering around 12%. You suspect the PCIe bus.
question: "What is the theoretical peak bandwidth of a PCIe Gen4 x16 slot?"
details:
  realistic_solution: ~32 GB/s in each direction (~64 GB/s bidirectional). For host-to-device transfers (the common bottleneck when loading data), the effective limit is ~32 GB/s. If your preprocessing pipeline cannot saturate this, or if you are doing many tiny transfers with high overhead, the GPU will starve waiting for data.
  common_mistake: |
    **The Pitfall:** Confusing PCIe speeds with network (Ethernet) or memory (HBM) speeds.
    **The Rationale:** Mixing up the various bandwidth bottlenecks (Gbps vs GB/s, HBM vs PCIe) in a dense system architecture.
    **The Consequence:** Wasting time profiling PyTorch code when the hardware bus physically cannot feed the GPU fast enough.
  napkin_math: |
    - **PCIe Gen4 x16**: 16 lanes * 2GB/s = 32GB/s per direction.
    - **L4 GPU Bandwidth (GDDR6)**: 300GB/s.
    - **Ratio**: 300GB/s / 32GB/s = 9.4x bottleneck.
    - **Image batch (1GB)**: PCIe transfer = 31ms; GPU memory move = 3.3ms.
    - **Conclusion**: The **~32GB/s** PCIe bottleneck easily starves the GPU.
  options:
  - ~1.5 TB/s
  - ~64 GB/s
  - ~10 Gbps
  - ~400 Gbps
  correct_index: 1
