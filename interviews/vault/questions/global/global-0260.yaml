title: Training Memory Budget Breakdown
scenario: A 1B parameter model is trained in mixed-precision (FP16 forward/backward + FP32 Adam optimizer).
question: Why training a 1B parameter model in mixed-precision (FP16 forward/backward + FP32 Adam optimizer) requires approximately 16 GB of memory, not just the 2 GB for FP16 weights?
details:
  realistic_solution: 'The 16 bytes/param breakdown for mixed-precision Adam training: FP16 weights = 2B/param (used in forward/backward). FP16 gradients = 2B/param (accumulated during backward). FP32 master weights = 4B/param (Adam updates in FP32 for numerical stability). FP32 momentum (m) = 4B/param. FP32 variance (v) = 4B/param. Total = 2+2+4+4+4 = 16B/param. For 1B params: 16 GB. On top of this, activations add memory proportional to batch size × sequence length × hidden dimension × number of layers. Activation checkpointing trades compute (recomputing activations in backward) for memory (storing only checkpointed layers).'
  common_mistake: |
    **The Pitfall:** Only counting weight storage and forgetting optimizer states, gradients, and activations.
    **The Rationale:** Model sizes are always discussed in terms of parameter count, hiding the fact that the training machinery requires 8x the memory of the weights themselves.
    **The Consequence:** Drastically under-provisioning VRAM for training clusters, resulting in instant Out-Of-Memory crashes upon job launch.
  napkin_math: |
    - FP16 Weights = 2 Bytes/param.
    - FP16 Gradients = 2 Bytes/param.
    - FP32 Master Weights = 4 Bytes/param.
    - FP32 Adam Momentum = 4 Bytes/param.
    - FP32 Adam Variance = 4 Bytes/param.
    - **Total = 2+2+4+4+4 = 16 Bytes/param. For 1B params, this exactly requires 16 GB of memory.**
