title: Training Memory Budget Breakdown
scenario: Explain why training a 1B parameter model in mixed-precision (FP16 forward/backward + FP32 Adam
  optimizer) requires approximately 16 GB of memory, not just the 2 GB for FP16 weights.
details:
  realistic_solution: 'The 16 bytes/param breakdown for mixed-precision Adam training: FP16 weights =
    2B/param (used in forward/backward). FP16 gradients = 2B/param (accumulated during backward). FP32
    master weights = 4B/param (Adam updates in FP32 for numerical stability). FP32 momentum (m) = 4B/param.
    FP32 variance (v) = 4B/param. Total = 2+2+4+4+4 = 16B/param. For 1B params: 16 GB. On top of this,
    activations add memory proportional to batch size × sequence length × hidden dimension × number of
    layers. Activation checkpointing trades compute (recomputing activations in backward) for memory (storing
    only checkpointed layers).'
  common_mistake: Only counting weight storage and forgetting optimizer states, gradients, and activations.
    Optimizer states alone can be 4x the weight memory.
  napkin_math: '1B params × 16 bytes/param = 16 GB. Breakdown: 2B (FP16 weights) + 2B (FP16 grads) + 4B
    (FP32 master) + 4B (FP32 momentum) + 4B (FP32 variance). Activations add 2-10 GB depending on batch
    size.'
