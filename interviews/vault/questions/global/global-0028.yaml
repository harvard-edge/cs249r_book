title: LLM Generation Phase Bottleneck
scenario: In the auto-regressive generation phase (decoding) of a Large Language Model, why does the workload
  typically suffer from exceptionally low arithmetic intensity?
details:
  realistic_solution: During decoding, the model processes one token at a time. It must read the entire
    parameter set and the accumulated KV cache from HBM for every single generated token. This results
    in a massive number of memory reads relative to the few FLOPs performed per token, causing severe
    memory-bandwidth boundedness (low arithmetic intensity).
  common_mistake: Thinking the bottleneck is purely due to the sheer size of the model, without recognizing
    the architectural shift from GEMM (in prefill) to GEMV (in decoding) due to token-by-token generation.
  napkin_math: '- 7B model weights: 14 GB read per token. FLOPs per token: ~14 GFLOPs | - Arithmetic intensity:
    14 GFLOPs / 14 GB = 1 FLOP/byte | - => At ridge point of 500, decode runs at 0.2% compute efficiency'
  options:
  - A single token is generated per step, requiring the model to load all weights and the entire KV cache
    from memory just to perform a small matrix-vector multiplication.
  - The self-attention mechanism requires complex non-linear operations (like Softmax) that natively have
    low arithmetic intensity.
  - Token generation requires frequent inter-GPU communication, which bottlenecks the compute operations.
  - The context window is too small during generation, preventing the GPU from utilizing its tensor cores
    effectively.
  correct_index: 0
