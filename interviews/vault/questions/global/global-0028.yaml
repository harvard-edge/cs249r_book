title: LLM Generation Phase Bottleneck
scenario: In the auto-regressive generation phase of a Large Language Model, you notice the workload suffers from exceptionally low arithmetic intensity.
question: "Why does auto-regressive LLM decoding typically suffer from exceptionally low arithmetic intensity?"
details:
  realistic_solution: 'During decoding, the model processes one token at a time. It must read the entire parameter set and the accumulated KV cache from HBM for every single generated token. This results in a massive number of memory reads relative to the few FLOPs performed per token, causing severe memory-bandwidth boundedness.'
  common_mistake: |
    **The Pitfall:** Thinking the bottleneck is purely due to the sheer size of the model.
    **The Rationale:** Candidates fail to recognize the architectural shift from GEMM (in prefill) to GEMV (in decoding) caused by token-by-token generation.
    **The Consequence:** Applying prefill-oriented optimizations (like better matrix multiplication kernels) to the decoding phase, yielding no improvement.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 7B model decoding token-by-token.
    2. **Calculations:**
       - Weights read per token = 14 GB.
       - FLOPs per token = ~14 GFLOPs.
       - Arithmetic intensity = 14 GFLOPs / 14 GB = 1 FLOP/byte.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound.** At a typical hardware ridge point of 100-500, decode runs at <1% compute efficiency.
  options:
  - A single token is generated per step, requiring the model to load all weights and the entire KV cache from memory just to perform a small matrix-vector multiplication.
  - The self-attention mechanism requires complex non-linear operations (like Softmax) that natively have low arithmetic intensity.
  - Token generation requires frequent inter-GPU communication, which bottlenecks the compute operations.
  - The context window is too small during generation, preventing the GPU from utilizing its tensor cores effectively.
