title: Mitigating Network Stragglers in Synchronous Training
scenario: During a 10,000 GPU pretraining run, throughput randomly drops from 150 TFLOPs/GPU to 10 TFLOPs/GPU for 5-10 minute windows. Profiling shows NCCL AllReduce operations hanging. No nodes crash, but optical transceiver faults cause some Infiniband links to silently degrade from 400 Gbps to 10 Gbps.
question: "How would you detect and mitigate silent 400 Gbps-to-10 Gbps link degradation during a 10,000-GPU run?"
details:
  realistic_solution: Architect a software-level straggler detection and elastic routing system. 1) Instrument the training loop to emit heartbeat metrics and wrap NCCL calls with asynchronous timeout watchdogs (e.g., NCCL_ASYNC_ERROR_HANDLING). 2) Maintain a moving average of AllReduce latencies. If an operation takes > 5x the expected time, temporarily pause training. 3) Execute a rapid diagnostic microbenchmark (pairwise send/recv ring) across all ranks to isolate the specific degraded link. 4) Once identified, automatically cordon the faulty node, dynamically shrink the world size using an elastic training framework (e.g., TorchElastic), and resume from the latest checkpoint. Alert the hardware scheduler to repair the node.
  common_mistake: |
    **The Pitfall:** Relying purely on hardware metrics like switch port drops.
    **The Rationale:** Switch metrics are often aggregated or delayed, and don't map directly to the application-level collective operations.
    **The Consequence:** The training job hangs for minutes while waiting for hardware alerts to trigger, wasting thousands of GPU-hours.
  napkin_math: |
    - **Normal AllReduce**: 1GB over 400 Gbps (50 GB/s) takes ~40ms (using Ring AllReduce formula: 2 * M / B = 2 * 1 GB / 50 GB/s = 0.04s).
    - **Degraded link**: 10 Gbps (1.25 GB/s) takes ~1.6s for the full AllReduce operation (2 * 1 GB / 1.25 GB/s).
    - **Pipeline bubble**: A 1.6s stall causes a massive pipeline bubble across all 10,000 GPUs.
    - **Wasted compute (5 min stall)**: 5 min * 10,000 GPUs = 833 GPU-hours.
    - **Wasted compute (10s detect + 110s restart)**: 2 minutes * 10,000 GPUs = 333 GPU-hours.
    - **Conclusion**: Fast mitigation saves **~500 GPU-hours** per event.
