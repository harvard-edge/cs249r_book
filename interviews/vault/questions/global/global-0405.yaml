title: Disaggregated Serving Network Budget
scenario: A serving design separates prefill and decode. For long-context requests,
  the prefill GPUs can produce up to 6 GB of KV cache per request that must be transferred
  to decode GPUs. Peak long-context traffic is 20 requests/s and the fabric available
  for KV transfer is 200 GB/s. Size the KV transfer load and decide whether the network
  is the bottleneck.
question: Does transferring 6 GB of KV cache at 20 requests/s fit on a 200 GB/s prefill-to-decode
  fabric?
details:
  realistic_solution: The worst-case long-context KV transfer demand is 6 x 20 = 120
    GB/s. That fits under 200 GB/s, leaving 80 GB/s or 40% headroom before protocol
    overhead and bursts. The network is feasible on average but still needs scheduling
    and backpressure because bursts or larger contexts can erase the headroom.
  common_mistake: Checking only GPU compute savings from disaggregation and ignoring
    the KV-transfer fabric.
  napkin_math: KV transfer = 6 GB/request x 20 requests/s = 120 GB/s. Headroom = 200
    - 120 = 80 GB/s.
