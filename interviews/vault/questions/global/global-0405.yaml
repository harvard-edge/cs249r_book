title: Disaggregated Serving Network Budget
scenario: A serving design separates prefill and decode. For long-context requests, the prefill GPUs can produce up to 6 GB of KV cache per request that must be transferred to decode GPUs. Peak long-context traffic is 20 requests/s and the fabric available for KV transfer is 200 GB/s.
question: Does transferring 6 GB of KV cache at 20 requests/s fit on a 200 GB/s prefill-to-decode fabric?
details:
  realistic_solution: The worst-case long-context KV transfer demand is 120 GB/s. That fits under 200 GB/s, leaving 80 GB/s or 40% headroom before protocol overhead and bursts. The network is feasible but requires scheduling backpressure.
  common_mistake: |
    **The Pitfall:** Checking only GPU compute savings from disaggregation and ignoring the KV-transfer fabric.
    **The Rationale:** Engineers assume network bandwidth within a cluster is effectively infinite.
    **The Consequence:** The prefill-to-decode network fabric becomes a massive bottleneck for long-context workloads.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 6 GB KV cache per request.
       - 20 requests/s peak.
       - Fabric capacity = 200 GB/s.
    2. **Calculations:**
       - Required bandwidth = 6 GB * 20 = 120 GB/s.
       - Headroom = 200 GB/s - 120 GB/s = 80 GB/s (40%).
    3. **Conclusion & Interpretation:**
       - **Result: Network-Bound (Capacity).** The 120 GB/s transfer fits within the 200 GB/s fabric, leaving 40% headroom for bursts and protocol overhead.
