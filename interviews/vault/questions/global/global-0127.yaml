title: The H100 Speedup Discrepancy
scenario: You upgraded an LLM serving cluster from A100 (312 TFLOPS, 2 TB/s) to H100 (989 TFLOPS, 3.35
  TB/s). For a 70B parameter model at batch size 1, the prefill phase latency (2048 tokens) dropped from
  916ms to 295ms (3.1x speedup). However, decode latency per token only dropped from 70ms to 42ms (1.6x
  speedup). The team suspects a PyTorch bug.
question: "Why does the H100 upgrade speed up 70B prefill by 3.1x but decode by only 1.6x?"
details:
  realistic_solution: There is no bug; this is a textbook demonstration of the Roofline model. LLM generation
    consists of two distinct phases with radically different arithmetic intensities. The prefill phase
    performs a matrix-matrix multiplication (weights * sequence of tokens), resulting in high arithmetic
    intensity. It sits on the flat, compute-bound ceiling of the Roofline. Therefore, prefill scales perfectly
    with the 3.1x increase in TFLOPS (989/312). The decode phase, however, performs a matrix-vector multiplication
    (weights * 1 token), which has an arithmetic intensity of ~1 FLOP/byte. It sits entirely on the sloped,
    memory-bandwidth-bound section of the Roofline. Decode latency is purely dictated by memory bandwidth,
    scaling exactly with the 1.67x increase in HBM bandwidth (3.35/2.0).
  common_mistake: Assuming a 3x TFLOPS upgrade will uniformly speed up all phases of LLM generation.
  napkin_math: 'Prefill (Compute Bound): A100 Compute = 286 TFLOPs / 312 TFLOPS = 916ms. H100 Compute
    = 286 TFLOPs / 989 TFLOPS = 289ms (~3.1x).

    Decode (Memory Bound): 70B FP16 weights = 140GB. A100 Memory Time = 140GB / 2.0 TB/s = 70ms. H100
    Memory Time = 140 GB / 3.35 TB/s = 42ms (~1.67x).'
