title: The H100 Speedup Discrepancy
scenario: You upgraded an LLM serving cluster from A100 (312 TFLOPS, 2 TB/s) to H100 (989 TFLOPS, 3.35 TB/s). For a 70B parameter model at batch size 1, the prefill phase latency (2048 tokens) dropped from 916ms to 295ms (3.1x speedup). However, decode latency per token only dropped from 70ms to 42ms (1.6x speedup). The team suspects a PyTorch bug.
question: "Why does the H100 upgrade speed up 70B prefill by 3.1x but decode by only 1.6x?"
details:
  realistic_solution: 'There is no bug; this is a textbook demonstration of the Roofline model. LLM generation consists of two distinct phases with radically different arithmetic intensities. The prefill phase performs a matrix-matrix multiplication (weights * sequence of tokens), resulting in high arithmetic intensity. It sits on the flat, compute-bound ceiling of the Roofline. Therefore, prefill scales perfectly with the 3.1x increase in TFLOPS (989/312). The decode phase, however, performs a matrix-vector multiplication (weights * 1 token), which has an arithmetic intensity of ~1 FLOP/byte. It sits entirely on the sloped, memory-bandwidth-bound section of the Roofline. Decode latency is purely dictated by memory bandwidth, scaling exactly with the 1.67x increase in HBM bandwidth (3.35/2.0).'
  common_mistake: 'Assuming a 3x TFLOPS upgrade will uniformly speed up all phases of LLM generation.'
  napkin_math: |
    **Assumptions & Constraints:**
    - 70B parameter model at batch size 1.
    - A100: 312 TFLOPS, 2.0 TB/s bandwidth.
    - H100: 989 TFLOPS, 3.35 TB/s bandwidth.
    
    **Calculations:**
    - Prefill (Compute Bound) A100 time = 916ms.
    - Prefill H100 time = 916ms * (312 / 989) = ~289ms (3.1x speedup).
    - Decode (Memory Bound) 70B weights size = 140GB (FP16).
    - Decode A100 memory time = 140GB / 2.0 TB/s = 70ms.
    - Decode H100 memory time = 140GB / 3.35 TB/s = ~42ms (1.67x speedup).
    
    **Conclusion & Interpretation:**
    - **Result: 1.67x Decode Speedup (Memory-Bandwidth Bound)**. The decode phase involves matrix-vector multiplication (low arithmetic intensity) and sits strictly on the memory-bandwidth slope, scaling only with the 1.67x memory upgrade, not the 3.1x compute upgrade.
