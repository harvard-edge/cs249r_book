title: 'Continuous Batching Generation Deadlock'
scenario: 'Your vLLM instance serving LLaMA-3 allocates 40GB to the KV cache pool. The scheduler admits 100 concurrent requests, which initially fits fine during prefill. However, 10 seconds into generation, throughput drops to zero and the engine stalls. Profiling shows no OOM error, but all active requests are paused and no new tokens are being generated.'
question: 'What is causing the vLLM engine to stall after 10 seconds, and how would you prevent it?'
details:
  realistic_solution: 'This is a classic KV cache oversubscription deadlock in continuous batching systems. The scheduler admitted 100 requests based on their *prefill* length, but did not reserve enough KV cache blocks for their maximum potential *decode* lengths. As the 100 requests generated tokens simultaneously, they consumed the remaining free KV cache blocks. Once the pool was fully depleted, no request could allocate the block needed for its next token. Because all requests are active and waiting for blocks, and none can finish to release blocks, the system deadlocks. The fix is configuring the scheduler to either preempt/swap active requests to CPU memory when VRAM is low, or to use a stricter admission control policy that reserves a buffer for generation.'
  common_mistake: |
    **The Pitfall:** Suspecting a hardware NVLink hang or a NCCL timeout during tensor parallelism.
    **The Rationale:** Misattributing a system-level deadlock to underlying hardware failures because there is no explicit software OOM crash.
    **The Consequence:** Restarting the node or replacing GPUs while the software scheduling deadlock persists.
  napkin_math: |
    **Assumptions & Constraints:**
    - KV Pool: 40 GB.
    - Block size: 16 tokens (~2 MB). Total blocks: 20,000.
    - 100 admitted requests. Average prefill: 500 tokens. Max decode: 3,000 tokens.

    **Calculations:**
    - Initial prefill blocks used: 100 requests * (500 / 16) = 3,125 blocks.
    - Remaining free blocks: 20,000 - 3,125 = 16,875 blocks.
    - Blocks required to finish generation: 100 * (3000 / 16) = 18,750 blocks.
    - 18,750 > 16,875, meaning the pool depletes before any single request completes.

    **Conclusion & Interpretation:**
    - **Result: 0 free blocks remaining (Deadlock-Bound)**. By KV cache oversubscription.
