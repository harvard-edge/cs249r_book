title: Disaggregated Serving Interface Spec
scenario: A team wants to split LLM prefill and decode across different GPU pools. Specify the interface contract between prefill and decode workers so the design can be evaluated before implementation.
question: What interface contract is needed between prefill and decode workers in a disaggregated LLM serving system?
details:
  realistic_solution: The contract should specify KV-cache tensor layout, precision, sequence metadata, transfer protocol, ownership/lifetime, backpressure, retry semantics, and latency budget. It should also define compatibility across model versions and how decode workers reject incompatible or oversized KV payloads.
  common_mistake: Treating disaggregation as just an RPC boundary and ignoring that KV cache is large structured state with strict model-version and latency constraints.
  napkin_math: If a request has 4 GB of KV state and the target transfer budget is 20 ms, the interface needs an effective 200 GB/s path or a smaller/compressed representation.
