title: Latency Optimization vs Throughput Optimization
scenario: Your LLM serving system shows P50 latency of 80ms/token but P99 of 450ms/token. Throughput is
  500 tokens/sec. A new batching configuration increases throughput to 800 tokens/sec but P99 rises to
  900ms/token. Evaluate which configuration is better for (a) a real-time chatbot and (b) a batch document
  summarization pipeline.
question: "How would you evaluate which configuration is better for (a) a real-time chatbot and (b) a batch document summarization pipeline?"
details:
  realistic_solution: 'For the chatbot: P99 of 450ms/token means 1 in 100 users sees ~450ms between tokens
    — noticeable but acceptable (human reading speed is ~250ms/word). P99 of 900ms/token creates visible
    lag that frustrates users. Choose config A (P99=450ms). User satisfaction depends on tail latency,
    not average. For batch summarization: processing 10,000 documents. Config A: 10K docs × ~500 tokens
    avg / 500 tok/s = 10,000s ≈ 2.78 hours. Config B: 10K × 500 / 800 = 6,250s ≈ 1.74 hours. Config B
    saves 1.04 hours = $3.12 at $3/GPU-hr. Tail latency is irrelevant — no human waits for individual
    documents. Choose config B. The key insight: latency and throughput are fundamentally at odds in serving
    systems. Higher batching improves throughput (better GPU utilization) but increases queuing delay
    (worse tail latency). You must choose based on the workload''s sensitivity to latency vs cost.'
  common_mistake: Optimizing for the same metric in both use cases. Real-time chatbots need low P99 latency
    (user experience), while batch pipelines need maximum throughput (cost efficiency). Conflating these
    leads to poor system design.
  napkin_math: 'Chatbot: 900ms P99 = 1.8s for 2-token word → 33 WPM perceived, below 50 WPM readability
    threshold. 450ms P99 = 67 WPM — acceptable. Batch: Config B saves 10K×500/800 vs /500 = 1.04h = $3.12/run.
    At 10 runs/day: $31.20/day savings.'
