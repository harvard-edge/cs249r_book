title: Latency Optimization vs Throughput Optimization
scenario: Your LLM serving system shows P50 latency of 80ms/token but P99 of 450ms/token. Throughput is 500 tokens/sec. A new batching configuration increases throughput to 800 tokens/sec but P99 rises to 900ms/token.
question: How would you evaluate which configuration is better for (a) a real-time chatbot and (b) a batch document summarization pipeline?
details:
  realistic_solution: 'For the chatbot: P99 of 450ms/token means 1 in 100 users sees ~450ms between tokens \u2014 noticeable but acceptable (human reading speed is ~250ms/word). P99 of 900ms/token creates visible lag that frustrates users. Choose config A (P99=450ms). User satisfaction depends on tail latency, not average. For batch summarization: processing 10,000 documents. Config A: 10K docs \times ~500 tokens avg / 500 tok/s = 10,000s \approx 2.78 hours. Config B: 10K \times 500 / 800 = 6,250s \approx 1.74 hours. Config B saves 1.04 hours = $3.12 at $3/GPU-hr. Tail latency is irrelevant \u2014 no human waits for individual documents. Choose config B. The key insight: latency and throughput are fundamentally at odds in serving systems. Higher batching improves throughput (better GPU utilization) but increases queuing delay (worse tail latency). You must choose based on the workload''s sensitivity to latency vs cost.'
  common_mistake: |
    **The Pitfall:** Optimizing for the same metric in both use cases, confusing throughput with latency.
    **The Rationale:** In standard software engineering, faster is better. In serving systems, higher batching improves throughput (better GPU utilization) but actively worsens tail latency (queuing delay).
    **The Consequence:** Releasing a chatbot that makes users wait agonizing seconds per token, or wasting thousands of dollars under-utilizing GPUs on async batch tasks.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Config A: Throughput = 500 tok/s. P99 = 450ms/tok.
       - Config B: Throughput = 800 tok/s. P99 = 900ms/tok.
       - Batch summarization workload = 10,000 documents (~500 tokens avg).
    2. **Calculations:**
       - Chatbot Config A: 450ms P99 = ~133 chars/s \approx 67 WPM -> acceptable.
       - Chatbot Config B: 900ms P99 = ~33 WPM -> below readability threshold.
       - Batch Config B time: (10,000 * 500) / 800 = 6,250s = 1.74h.
       - Batch Config A time: (10,000 * 500) / 500 = 10,000s = 2.78h.
       - Time saved = 1.04 hours.
    3. **Conclusion & Interpretation:**
       - **Result: Tradeoff-Bound.** Config A is strictly required for chatbot UX, while Config B saves compute time (1.04h) and cost for async batch processing.
