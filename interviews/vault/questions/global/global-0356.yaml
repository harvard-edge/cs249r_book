title: Evaluate BF16 Versus FP8 Rollout
scenario: A team can train with BF16 using 80% memory utilization or FP8 using 55% memory utilization. FP8 is 12% faster but has shown occasional loss spikes.
question: How would you evaluate switching from BF16 to FP8 when FP8 is 12% faster and uses less memory, but has occasional loss spikes?
details:
  realistic_solution: The decision depends on stability and recovery, not speed alone. FP8 gives memory headroom and throughput, but loss spikes can waste entire runs or require fallback. A safe rollout uses layer fallback, loss-scaling telemetry, checkpoint comparison, and a staged experiment before full adoption.
  common_mistake: |
    **The Pitfall:** Choosing FP8 solely because it is faster and uses less memory.
    **The Rationale:** Candidates focus strictly on nominal throughput metrics while ignoring training stability and potential recovery costs.
    **The Consequence:** Adopting a format that leads to frequent loss spikes, wasting entire training runs or requiring costly fallbacks.
  napkin_math: |
    - FP8 is 12% faster in throughput.
    - A 10-day BF16 run would take 10 / 1.12 = 8.93 days in FP8.
    - **Saves ~1.07 days, but only if no instability causes restarts or quality regressions.**
