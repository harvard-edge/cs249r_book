title: Inference Congestion Admission Budget
scenario: A multi-region inference service sends requests over a network path with
  20,000 requests/s safe capacity. Traffic bursts to 28,000 requests/s for 3 minutes.
  Each request is 200 KB including prompt and metadata. Size the excess traffic and
  propose an admission-control response that protects tail latency.
question: How much excess traffic must be controlled when a 20,000 rps path receives
  28,000 rps of 200 KB requests for 3 minutes?
details:
  realistic_solution: The path is oversubscribed by 8,000 requests/s. At 200 KB each,
    excess offered load is 1.6 GB/s. Over 3 minutes that is 288 GB of excess traffic.
    The system should shed, queue with deadlines, or reroute low-priority traffic
    before congestion inflates P99 for all users.
  common_mistake: Letting all traffic queue because average service will recover after
    the burst, ignoring tail-latency collapse during congestion.
  napkin_math: Excess = 28,000 - 20,000 = 8,000 rps. Excess bandwidth = 8,000 x 200
    KB = 1.6 GB/s. Over 180 s = 288 GB.
