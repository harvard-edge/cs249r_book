title: The Speed-of-Light Tax
scenario: A user in Tokyo sends a request to a datacenter in Virginia. The fiber-optic path is approximately
  10,000 km. What is the minimum possible one-way latency for this request, assuming light travels at
  200,000 km/s in fiber?
question: "What is the minimum possible one-way latency for this request, assuming light travels at 200,000 km/s in fiber?"
details:
  realistic_solution: The minimum one-way latency is 50ms. Light in fiber travels at ~200,000 km/s, so
    10,000 km / 200,000 km/s = 50ms. The round-trip time (RTT) would be ~100ms. This is a hard physics
    floor — no amount of engineering can reduce it below this for a given fiber path.
  common_mistake: Using the speed of light in vacuum (300,000 km/s) instead of the speed of light in fiber
    (~200,000 km/s, roughly 2/3 c). This underestimates latency by 50%.
  napkin_math: One-way latency = distance / speed = 10,000 km / 200,000 km/s = 0.05s = 50ms. RTT = 2 ×
    50ms = 100ms. This is the theoretical minimum; real-world RTT is typically 120-150ms due to routing,
    switching, and amplification hops.
