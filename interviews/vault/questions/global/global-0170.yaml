title: The Speed-of-Light Tax
scenario: A user in Tokyo sends a request to a datacenter in Virginia. The fiber-optic path is approximately 10,000 km.
question: "What is the minimum possible one-way latency for this request, assuming light travels at 200,000 km/s in fiber?"
details:
  realistic_solution: 'The minimum one-way latency is 50ms. Light in fiber travels at ~200,000 km/s, so 10,000 km / 200,000 km/s = 50ms. The round-trip time (RTT) would be ~100ms. This is a hard physics floor — no amount of engineering can reduce it below this for a given fiber path.'
  common_mistake: 'Using the speed of light in vacuum (300,000 km/s) instead of the speed of light in fiber (~200,000 km/s, roughly 2/3 c). This underestimates latency by 50%.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Distance from Tokyo to Virginia: 10,000 km.
    - Speed of light in fiber optic cable: ~200,000 km/s.
    
    **Calculations:**
    - One-way latency = distance / speed.
    - One-way latency = 10,000 km / 200,000 km/s = 0.05 seconds.
    - 0.05 seconds = 50ms.
    - Round-trip time (RTT) = 2 * 50ms = 100ms.
    
    **Conclusion & Interpretation:**
    - **Result: 50ms One-Way Latency (Physics Bound)**. This establishes a hard physics floor for cross-continent network requests, making caching and regional replication mandatory for strict latency SLAs.
