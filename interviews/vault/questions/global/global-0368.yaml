title: Evaluate A Universal Profiling Dashboard
scenario: A team proposes a universal profiling dashboard that ranks every deployment
  by average latency and model FLOPs only. It will be used for cloud inference, mobile
  apps, and TinyML devices. Evaluate whether this dashboard is sufficient for Staff-level
  bottleneck diagnosis.
question: Is an average-latency and FLOPs-only dashboard sufficient for cloud, mobile,
  and TinyML bottleneck diagnosis?
details:
  realistic_solution: It is not sufficient. Average latency hides tail behavior and
    queueing in cloud. FLOPs hide thermal throttling, delegated-op fallback, and memory
    pressure on mobile. Both metrics miss SRAM spills, duty cycle, and deadline misses
    on TinyML. A Staff-level dashboard must include latency decomposition and regime-specific
    physical constraints.
  common_mistake: Assuming that because FLOPs and latency are portable metrics, they
    are enough to explain bottlenecks across regimes.
  napkin_math: Two systems can both average 50 ms while one has P99 above 500 ms.
    Similarly, a 10 MFLOP TinyML model can miss a 20 ms deadline if it spills tensors
    to flash.
