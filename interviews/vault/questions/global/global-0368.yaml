title: 'Evaluate A Universal Profiling Dashboard'
scenario: 'A team proposes a universal profiling dashboard that ranks every deployment by average latency and model FLOPs only. It will be used for cloud inference, mobile apps, and TinyML devices.'
question: 'Is an average-latency and FLOPs-only dashboard sufficient for cloud, mobile, and TinyML bottleneck diagnosis?'
details:
  realistic_solution: 'It is not sufficient. Average latency hides tail behavior and queueing in cloud. FLOPs hide thermal throttling, delegated-op fallback, and memory pressure on mobile. Both metrics miss SRAM spills, duty cycle, and deadline misses on TinyML. A Staff-level dashboard must include latency decomposition and regime-specific physical constraints.'
  common_mistake: |
    **The Pitfall:** Assuming FLOPs and average latency are sufficient portable metrics to explain bottlenecks across all regimes.
    **The Rationale:** Using high-level algorithmic metrics to proxy for complex system-level hardware constraints.
    **The Consequence:** Missing thermal throttling, hardware fallback, queueing delays, and memory spills entirely.
  napkin_math: |
    **Assumptions & Constraints:**
    - Dashboard metrics: Average latency, Model FLOPs.
    - Regimes: Cloud, Mobile, TinyML.

    **Calculations:**
    - Cloud: Two systems can average 50ms, but one has a P99 queueing delay > 500ms.
    - TinyML: 10 MFLOP model misses a 20ms deadline if it triggers flash SRAM spills.

    **Conclusion & Interpretation:**
    - **Result: Metrics are incomplete (Latency-Tail-Bound and Memory-Bandwidth-Bound)**. Effects are completely hidden.
