title: Latency Budget Across Cloud Mobile And Edge
scenario: An interactive assistant has a 200 ms response budget. Cloud inference takes
  60 ms but adds 90 ms network RTT and 30 ms queueing. Mobile inference takes 140
  ms with 15 ms scheduling overhead. Edge inference takes 90 ms plus a 25 ms local
  hop. Design a routing policy that chooses the best regime and identifies the first
  bottleneck to optimize.
question: Which regime should serve a 200 ms assistant request, and which latency
  component should be optimized first?
details:
  realistic_solution: Cloud totals 180 ms, mobile totals 155 ms, and edge totals 115
    ms. Edge is best and has the most headroom. If edge capacity is unavailable, mobile
    is safer than cloud because cloud queueing plus RTT consumes most of the budget.
    The first optimization for cloud is queueing or regional placement; for mobile
    it is model/runtime latency; for edge it is capacity and local-hop stability.
  common_mistake: Comparing only model inference time and concluding cloud is fastest
    because its model run is 60 ms.
  napkin_math: 'Cloud: 60 + 90 + 30 = 180 ms. Mobile: 140 + 15 = 155 ms. Edge: 90
    + 25 = 115 ms.'
