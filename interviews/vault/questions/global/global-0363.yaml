title: Latency Budget Across Cloud Mobile And Edge
scenario: An interactive assistant has a 200 ms response budget. Cloud inference is 60 ms but adds 90 ms network RTT and 30 ms queueing. Mobile inference is 140 ms with 15 ms overhead. Edge inference is 90 ms plus a 25 ms local hop.
question: Which regime should serve a 200 ms assistant request, and which latency component should be optimized first?
details:
  realistic_solution: Edge totals 115 ms, giving the best latency headroom. Mobile (155 ms) is an acceptable fallback. Cloud totals 180 ms and is perilously close to the SLA due to massive RTT. Optimize edge stability first; if deploying cloud, prioritize regional placement or CDN routing to drastically cut RTT.
  common_mistake: |
    **The Pitfall:** Comparing only model inference time and concluding the cloud is the fastest option.
    **The Rationale:** Focusing solely on FLOPs and raw compute speed while ignoring data transit.
    **The Consequence:** Building an architecture that misses the 200 ms SLA because network RTT and queueing delay dominate the end-to-end time.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 200 ms latency budget
       - Cloud: 60 ms compute, 90 ms RTT, 30 ms queue
       - Mobile: 140 ms compute, 15 ms overhead
       - Edge: 90 ms compute, 25 ms network
    2. **Calculations:**
       - Cloud total: 60 + 90 + 30 = 180 ms
       - Mobile total: 140 + 15 = 155 ms
       - Edge total: 90 + 25 = 115 ms
    3. **Conclusion & Interpretation:**
       - **Result: Network-Bound (Cloud)**
