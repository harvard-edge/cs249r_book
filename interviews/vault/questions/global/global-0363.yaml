title: Latency Budget Across Cloud Mobile And Edge
scenario: An interactive assistant has a 200 ms response budget. Cloud inference takes 60 ms but adds 90 ms network RTT and 30 ms queueing. Mobile inference takes 140 ms with 15 ms scheduling overhead. Edge inference takes 90 ms plus a 25 ms local hop.
question: Which regime should serve a 200 ms assistant request, and which latency component should be optimized first?
details:
  realistic_solution: Cloud totals 180 ms, mobile totals 155 ms, and edge totals 115 ms. Edge is best and has the most headroom. If edge capacity is unavailable, mobile is safer than cloud because cloud queueing plus RTT consumes most of the budget. The first optimization for cloud is queueing or regional placement; for mobile it is model/runtime latency; for edge it is capacity and local-hop stability.
  common_mistake: |
    **The Pitfall:** Comparing only model inference time and concluding the cloud is the fastest option.
    **The Rationale:** Focusing solely on FLOPs and raw compute speed while ignoring data transit.
    **The Consequence:** Building an architecture that misses the 200 ms SLA because network RTT and queueing delay dominate the end-to-end time.
  napkin_math: |
    * Cloud total: 60 ms + 90 ms + 30 ms = 180 ms.
    * Mobile total: 140 ms + 15 ms = 155 ms.
    * Edge total: 90 ms + 25 ms = 115 ms.
    * **Edge is the fastest path and provides the most latency headroom against the 200 ms budget.**
