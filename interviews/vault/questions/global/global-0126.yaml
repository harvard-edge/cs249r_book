title: Depthwise Separable Disappointment
scenario: Your mobile vision team replaced standard 3x3 convolutions with depthwise
  separable convolutions in a custom ResNet, reducing theoretical compute from 2.5
  GMACs to 0.3 GMACs per frame. Deployed on an edge NPU, latency surprisingly degraded
  from 1.25ms to 2.5ms. The memory footprint remained identical.
question: Why did replacing 3x3 convolutions with depthwise separable convolutions
  slow the edge NPU despite cutting MACs from 2.5G to 0.3G?
details:
  realistic_solution: The root cause is a massive drop in arithmetic intensity, shifting
    the workload from compute-bound to severely memory-bound. Depthwise convolutions
    apply one filter per input channel, heavily penalizing reuse. The NPU is starved
    for data.
  common_mistake: '**The Pitfall:** Calculating latency using only theoretical MACs
    and peak TOPS.

    **The Rationale:** Candidates ignore the Roofline memory wall completely.

    **The Consequence:** Compute-light models like depthwise separable networks severely
    underperform expectations, wasting engineering cycles.

    '
  napkin_math: '**Assumptions & Constraints:**

    - NPU limits: 4 TOPS, 20 GB/s.

    - Standard Conv: 2.5 GMACs, 5MB footprint.

    - Depthwise Conv: 0.3 GMACs, 5MB footprint.


    **Calculations:**

    - NPU Ridge Point = 4 TOPS / 20 GB/s = 200 MACs/byte.

    - Standard Conv Intensity = 2.5 GMACs / 5MB = 500 MACs/byte.

    - Depthwise Intensity = 0.3 GMACs / 5MB = 60 MACs/byte.


    **Conclusion & Interpretation:**

    - **Result: Memory-Bound.** Arithmetic intensity plummets below the ridge point,
    starving the NPU and collapsing effective bandwidth to ruin latency.

    '
