title: Depthwise Separable Disappointment
scenario: Your mobile vision team replaced standard 3x3 convolutions with depthwise separable convolutions in a custom ResNet, reducing theoretical compute from 2.5 GMACs to 0.3 GMACs per frame. Deployed on an edge NPU (4 TOPS, 20 GB/s bandwidth), latency surprisingly degraded from 1.25ms to 2.5ms. The memory footprint (5MB of activations/weights) remained identical.
question: "Why did replacing 3x3 convolutions with depthwise separable convolutions slow the edge NPU despite cutting MACs from 2.5G to 0.3G?"
details:
  realistic_solution: The root cause is a massive drop in arithmetic intensity, shifting the workload from compute-bound to severely memory-bound. Standard convolutions heavily reuse weights and activations, resulting in high arithmetic intensity that allows the NPU to approach its 4 TOPS ceiling. Depthwise convolutions, however, only apply one filter per input channel, resulting in an arithmetic intensity of roughly 1 MAC/byte. On the Roofline model, the NPU's ridge point is 200 MACs/byte (4 TOPS / 20 GB/s). Depthwise convolutions operate far to the left of the ridge point. The NPU is starved for data, and the overhead of fragmented memory access patterns for depthwise operations further degrades effective bandwidth.
  common_mistake: |
    **The Pitfall:** Calculating latency using only theoretical MACs and peak TOPS.
    **The Rationale:** Candidates ignore the Roofline memory wall completely.
    **The Consequence:** Compute-light models like depthwise separable networks severely underperform expectations.
  napkin_math: |
    - NPU Ridge Point: 4 TOPS / 20 GB/s = 200 MACs/byte.
    - Standard Conv: 2.5 GMACs / 5MB = 500 MACs/byte (Compute-bound).
    - Depthwise Conv: 0.3 GMACs / 5MB = 60 MACs/byte (Memory-bound).
    - **The drop in arithmetic intensity forces the NPU to wait on memory, collapsing effective bandwidth and ruining latency.**
