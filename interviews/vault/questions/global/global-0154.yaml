title: The Bus Contention Stall
scenario: A Software Defined Radio (SDR) high-speed processing pipeline uses a Ping-Pong buffer (128KB
  each). When inference (processing Ping) and DMA (writing Pong) run concurrently, the inference latency
  spikes by 40% (from 20ms to 28ms).
details:
  realistic_solution: The root cause is memory bus matrix contention due to poor SRAM bank locality. Microcontroller
    SRAM is typically divided into multiple physical banks (e.g., SRAM1, SRAM2, SRAM3). If both the Ping
    and Pong buffers are allocated in the same physical SRAM bank, the high-speed DMA controller and the
    CPU must arbitrate for access to the same memory interface. The bus matrix forces the CPU to stall
    while the DMA completes its bursts. Placing the Ping buffer in SRAM1 and the Pong buffer in SRAM2
    eliminates contention, restoring inference latency to 20ms.
  common_mistake: Assuming the CPU is handling DMA interrupts too frequently, stealing cycles from the
    inference task.
  napkin_math: SDR sample rate = 20 MSPS (20,000 samples/ms). Over 20ms, DMA performs 400,000 writes.
    If both buffers are in SRAM1, the CPU experiences an AHB arbitration penalty (e.g., 20 cycles due
    to burst locking) per DMA write. 400,000 writes * 20 cycles = 8,000,000 stall cycles. At a 1GHz CPU
    clock, 8M cycles is exactly 8ms of pure stall time (40% overhead on a 20ms base inference).
