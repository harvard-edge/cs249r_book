title: The Bus Contention Stall
scenario: A Software Defined Radio (SDR) high-speed processing pipeline uses a Ping-Pong buffer (128KB each). When inference (processing Ping) and DMA (writing Pong) run concurrently, the inference latency spikes by 40% (from 20ms to 28ms).
question: Why does inference latency rise from 20ms to 28ms when DMA writes Pong while the CPU processes Ping?
details:
  realistic_solution: The root cause is memory bus matrix contention due to poor SRAM bank locality. Microcontroller SRAM is typically divided into multiple physical banks (e.g., SRAM1, SRAM2, SRAM3). If both the Ping and Pong buffers are allocated in the same physical SRAM bank, the high-speed DMA controller and the CPU must arbitrate for access to the same memory interface. The bus matrix forces the CPU to stall while the DMA completes its bursts. Placing the Ping buffer in SRAM1 and the Pong buffer in SRAM2 eliminates contention, restoring inference latency to 20ms.
  common_mistake: |
    **The Pitfall:** Assuming the CPU is handling DMA interrupts too frequently, stealing cycles from the inference task.
    **The Rationale:** Engineers often default to software/interrupt overheads without considering the physical hardware layout of memory buses and SRAM banks.
    **The Consequence:** Wasting time tuning interrupt priorities or RTOS scheduling when the fundamental issue is a hardware bus matrix collision.
  napkin_math: |
    - SDR sample rate = 20 MSPS (20,000 samples/ms).
    - Over 20ms, DMA performs 400,000 writes.
    - Contention penalty (e.g., AHB arbitration) = ~20 cycles per DMA write.
    - 400,000 writes * 20 cycles = 8,000,000 stall cycles.
    - At 1 GHz CPU clock, 8,000,000 cycles = 8 ms.
    - **Base latency 20ms + 8ms stall = 28ms total latency (40% overhead).**
