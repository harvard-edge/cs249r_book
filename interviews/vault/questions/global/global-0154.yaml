title: The Bus Contention Stall
scenario: An SDR pipeline uses a Ping-Pong buffer. When inference and DMA run concurrently, latency spikes from 20ms to 28ms.
question: Why does inference latency rise from 20ms to 28ms when DMA writes Pong while the CPU processes Ping?
details:
  realistic_solution: 'Bus matrix collision. Microcontroller SRAM is banked. Allocating Ping and Pong to identical physical banks forces the CPU pipeline to halt during DMA burst arbitration. Isolating buffers to separate hardware domains (SRAM1 vs SRAM2) instantly restores 20ms latency.'
  common_mistake: |
    **The Pitfall:** Assuming the CPU is handling DMA interrupts too frequently, stealing cycles from the inference task.
    **The Rationale:** Engineers often default to software/interrupt overheads without considering the physical hardware layout of memory buses and SRAM banks.
    **The Consequence:** Wasting time tuning interrupt priorities or RTOS scheduling when the fundamental issue is a hardware bus matrix collision.
  napkin_math: |
    **Assumptions & Constraints:**
    - SDR: 20 MSPS (20,000/ms)
    - CPU Clock: 1 GHz
    - Arbitration penalty: ~20 cycles/write

    **Calculations:**
    - Writes in 20ms: 400,000
    - Stalls: 400,000 * 20 cycles = 8,000,000 cycles
    - Stall duration: 8,000,000 / 1 GHz = 8 ms

    **Conclusion & Interpretation:**
    - **Result: Memory-Bandwidth Bound (Contention)**. Allocating buffers to the same physical bank forces a hardware bus matrix collision.
