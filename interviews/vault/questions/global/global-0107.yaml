validation_issues:
- 'Napkin Math contains an inconsistency: It states ''With NVLink A100 (600 GB/s), bandwidth is not the
  issue — latency from small-message overhead dominates.'', but then provides a calculation of 896 MB/s
  per GPU outbound, which is far below 600 GB/s, correctly implying bandwidth is not the issue, but the
  initial statement implies the calculation contradicts itself.'
- The napkin math calculation for All-to-All latency is not fully explained; an All-to-All communication
  pattern usually involves a latency component proportional to the number of participating nodes (log
  P or P), and a bandwidth component. A direct '45ms' number without derivation can be confusing.
