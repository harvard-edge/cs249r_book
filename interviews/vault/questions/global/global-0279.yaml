math_issues:
- The formula 4 × 2 × 8192 × 16 assumes Q, K, V, and O projections all have shape 8192x8192 (standard
  MHA). A 70B model (like Llama-2-70B) uses Grouped Query Attention (GQA), so K and V are much smaller
  (e.g., 8192x1024), making the adapter size calculation an overestimate.
