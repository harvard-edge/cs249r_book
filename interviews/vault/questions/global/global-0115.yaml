title: Kernel Fusion Roofline Shift
scenario: Optimizing a real-time speech recognition model, profiling shows 40% of inference time is spent
  in a sequence of element-wise operations (LayerNorm -> ReLU -> Dropout -> Scale). A junior engineer
  argues that fusing these kernels won't improve performance because these operations account for less
  than 1% of the model's total FLOPs. Counter this argument quantitatively.
question: "How would you quantitatively counter the claim that fusing 1%-FLOP element-wise ops cannot improve inference time?"
details:
  realistic_solution: Execution time is dictated by the Roofline model, not just total FLOPs. Element-wise
    operations have an Arithmetic Intensity of roughly 0.5 to 1 FLOPs/byte, placing them deep in the memory-bandwidth
    bound regime. Every individual kernel call (LayerNorm, ReLU, etc.) must read the activation tensor
    from HBM, perform a trivial calculation, and write it back to HBM. The hardware's ALUs sit idle waiting
    for memory. By fusing these four operations into a single kernel, the tensor is read from HBM once
    into SRAM, all four operations are computed in registers, and the result is written back to HBM once.
    This reduces HBM traffic by a factor of 4, directly reducing execution time for this block by up to
    75%, while also eliminating three kernel launch overheads. The low FLOP count is exactly *why* they
    take so long relative to their math—they are entirely bandwidth-bound.
  common_mistake: Agreeing that low-FLOP operations don't impact execution time, ignoring the memory bandwidth
    wall.
  napkin_math: 'Tensor size: 10MB (FP16). Unfused (4 ops): Each op reads 10MB and writes 10MB. Total HBM
    traffic = 4 * 20MB = 80MB. At 1 TB/s HBM bandwidth, time = 80us. Fused (1 op): Read 10MB, compute
    all 4 ops in SRAM, write 10MB. Total HBM traffic = 20MB. Time = 20us. Add kernel launch overhead (~5us
    per launch). Unfused = 80us + (4 * 5us) = 100us. Fused = 20us + 5us = 25us. Speedup is 4x on that
    40% of the model.'
