title: Kernel Fusion Roofline Shift
scenario: Profiling shows 40% of time in a model is spent on sequential element-wise operations. A junior engineer argues against kernel fusion because these ops are less than 1% of total FLOPs.
question: How would you quantitatively counter the claim that fusing 1%-FLOP element-wise ops cannot improve inference time?
details:
  realistic_solution: "Appeal to the Roofline model. Element-wise ops possess an Arithmetic Intensity near 0.5 FLOPs/byte, placing them securely in the memory-bound regime. Fusing operations truncates HBM round-trips, slashing total I/O traffic and bypassing kernel launch overheads, radically accelerating execution despite the minimal FLOP count."
  common_mistake: |
    **The Pitfall:** Agreeing that low-FLOP operations don't significantly impact execution time.
    **The Rationale:** FLOP count is the most commonly cited metric for model complexity and performance.
    **The Consequence:** Ignoring severe memory bandwidth bottlenecks and leaving massive inference speedups on the table.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Tensor: 10 MB (FP16)
       - Memory Bandwidth: 1 TB/s
       - 4 Unfused Ops vs 1 Fused Op
    2. **Calculations:**
       - Unfused: 4 reads + 4 writes = 80 MB. Time = 80 µs
       - Fused: 1 read + 1 write = 20 MB. Time = 20 µs
       - Overhead: 5 µs per launch
       - Unfused Total = 80 + 20 = 100 µs
       - Fused Total = 20 + 5 = 25 µs
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bandwidth Bound (4x Speedup via Fusion)**
