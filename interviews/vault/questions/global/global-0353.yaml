title: Encoder Decoder Token Budget Across Regimes
scenario: A cross-regime speech model has a 60 ms encoder and 10 ms/token decoder
  in cloud, 120 ms encoder and 18 ms/token decoder on mobile, and 250 ms encoder with
  no streaming on edge. Estimate latency for 8 output tokens in each regime.
question: What latency should you expect for 8 output tokens in cloud and mobile,
  and what lower bound can you state for edge without decoder timing?
details:
  realistic_solution: Cloud takes 60 + 8 x 10 = 140 ms. Mobile takes 120 + 8 x 18
    = 264 ms. Edge has only a 250 ms encoder bound in the prompt; without edge decoder
    time, the 8-token latency is 250 + 8 x t_decode_edge. The known lower bound already
    exceeds many interactive budgets before decoding.
  common_mistake: Comparing only encoder time and forgetting autoregressive decoder
    cost.
  napkin_math: Cloud = 60 + 8 x 10 = 140 ms. Mobile = 120 + 8 x 18 = 264 ms. Edge
    lower bound = 250 ms before decode; full latency = 250 + 8 x t_decode_edge.
