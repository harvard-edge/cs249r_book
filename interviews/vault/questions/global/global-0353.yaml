title: Encoder Decoder Token Budget Across Regimes
scenario: A cross-regime speech model has a 60 ms encoder and 10 ms/token decoder in cloud, 120 ms encoder and 18 ms/token decoder on mobile, and 250 ms encoder with no streaming on edge.
question: What latency should you expect for 8 output tokens in cloud and mobile, and what lower bound can you state for edge without decoder timing?
details:
  realistic_solution: Cloud takes 60 + 8 x 10 = 140 ms. Mobile takes 120 + 8 x 18 = 264 ms. Edge has only a 250 ms encoder bound in the prompt; without edge decoder time, the 8-token latency is 250 + 8 x t_decode_edge. The known lower bound already exceeds many interactive budgets before decoding.
  common_mistake: |
    **The Pitfall:** Comparing only encoder time and forgetting autoregressive decoder cost.
    **The Rationale:** Underestimating the sequential bottleneck of generation latency in encoder-decoder architectures.
    **The Consequence:** Drastically miscalculating total user-facing latency, leading to missed SLAs on mobile and edge targets.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Target: 8 output tokens.
       - Cloud: 60ms enc, 10ms/tok dec.
       - Mobile: 120ms enc, 18ms/tok dec.
       - Edge: 250ms enc.
    2. **Calculations:**
       - Cloud Latency: 60 ms + (8 * 10 ms) = 140 ms.
       - Mobile Latency: 120 ms + (8 * 18 ms) = 264 ms.
       - Edge Lower Bound: 250 ms before decode.
    3. **Conclusion & Interpretation:**
       - **Result: Edge Exceeds Budget.** The edge encoder alone exceeds typical interactive budgets before decoding even begins.
