title: Cross-Regime DMA Copy Budget
scenario: Three deployments have different sustained data-movement demands: a cloud batch path copies 8 GB/s, an edge gateway copies 600 MB/s, and a mobile app copies 80 MB/s. Effective transfer bandwidth is 32 GB/s in cloud, 12 GB/s on edge PCIe, and 20 GB/s shared memory bandwidth on mobile.
question: "What fraction of available data-movement bandwidth is consumed by cloud, edge, and mobile copy demand in the stated deployments?"
details:
  realistic_solution: Cloud copy utilization is 8/32 = 25%. Edge is 0.6/12 = 5%. Mobile is 0.08/20 = 0.4%. The raw copy bandwidth is not the bottleneck in these averages, but copy latency, synchronization, and memory pressure may still matter.
  common_mistake: |
    **The Pitfall:** Assuming any host-device copy is automatically the bottleneck.
    **The Rationale:** Candidates fail to compare the sustained demand to the actual available bandwidth.
    **The Consequence:** Premature optimization is applied to memory copies when other factors (latency, synchronization) may be the true limit.
  napkin_math: |
    - Cloud: 8 GB/s / 32 GB/s = 25%.
    - Edge: 0.6 GB/s / 12 GB/s = 5%.
    - Mobile: 0.08 GB/s / 20 GB/s = 0.4%.
    - **Raw copy bandwidth is not the binding bottleneck in any of these regimes.**
