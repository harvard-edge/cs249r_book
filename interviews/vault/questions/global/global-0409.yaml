title: Cross-Regime DMA Copy Budget
scenario: 'Three deployments have different sustained data-movement demands: a cloud
  batch path copies 8 GB/s, an edge gateway copies 600 MB/s, and a mobile app copies
  80 MB/s. Effective transfer bandwidth is 32 GB/s in cloud, 12 GB/s on edge PCIe,
  and 20 GB/s shared memory bandwidth on mobile. Estimate copy utilization in each
  regime.'
question: What fraction of available data-movement bandwidth is consumed by cloud,
  edge, and mobile copy demand in the stated deployments?
details:
  realistic_solution: Cloud copy utilization is 8/32 = 25%. Edge is 0.6/12 = 5%. Mobile
    is 0.08/20 = 0.4%. The raw copy bandwidth is not the bottleneck in these averages,
    but copy latency, synchronization, and memory pressure may still matter.
  common_mistake: Assuming any host-device copy is automatically the bottleneck without
    comparing demand to sustained bandwidth.
  napkin_math: 'Cloud: 8/32 = 25%. Edge: 0.6/12 = 5%. Mobile: 0.08/20 = 0.004 = 0.4%.'
