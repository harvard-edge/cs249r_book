title: The Unaligned Power Drain
scenario: Upgrading a TFLite Micro keyword spotting model to use CMSIS-NN DSP instructions. Inference latency drops from 45ms to 12ms, but the energy consumed per inference unexpectedly jumps from 1.5mJ to 1.8mJ.
question: Why does the CMSIS-NN keyword spotting model use more energy per inference even though latency falls from 45ms to 12ms?
details:
  realistic_solution: The root cause is poor data locality resulting from unaligned memory access patterns. CMSIS-NN relies on SIMD instructions (e.g., SMLAD) that fetch 32 bits (two 16-bit or four 8-bit operands) at a time. If the input tensors or weight arrays are not 4-byte aligned in SRAM, the Cortex-M processor must perform multiple memory fetches and stitch the bytes together in hardware. This severely breaks spatial locality, keeps the memory bus active longer, and stalls the pipeline, dramatically increasing dynamic power consumption despite the lower overall cycle count.
  common_mistake: |
    **The Pitfall:** Believing the DSP instructions fundamentally require significantly more power per cycle than standard ALU instructions.
    **The Rationale:** Candidates often overlook memory access patterns and alignment, focusing only on the instruction set architecture.
    **The Consequence:** Failing to fix the memory alignment, resulting in a system that rapidly drains the battery despite faster execution.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Original Latency = 45 ms. Energy = 1.485 mJ. Core power = 33 mW.
       - Upgraded Latency = 12 ms.
       - Memory unaligned accesses cause core stalls and double-fetches keeping AHB bus active.
    2. **Calculations:**
       - CMSIS-NN Aligned (expected): 12 ms * 40 mW = 0.48 mJ.
       - CMSIS-NN Unaligned: Average power draw spikes to 150 mW during the 12 ms window.
       - Final Energy: 12 ms * 150 mW = 1.8 mJ.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Alignment-Bound.** Unaligned SIMD loads stall the pipeline and keep memory active, increasing energy to 1.8 mJ despite lower latency.
