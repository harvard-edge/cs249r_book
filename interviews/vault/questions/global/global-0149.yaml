title: The Unaligned Power Drain
scenario: Upgrading a TFLite Micro keyword spotting model to use CMSIS-NN DSP instructions. Inference
  latency drops from 45ms to 12ms, but the energy consumed per inference unexpectedly jumps from 1.5mJ
  to 1.8mJ.
question: "Why does the CMSIS-NN keyword spotting model use more energy per inference even though latency falls from 45ms to 12ms?"
details:
  realistic_solution: The root cause is poor data locality resulting from unaligned memory access patterns.
    CMSIS-NN relies on SIMD instructions (e.g., SMLAD) that fetch 32 bits (two 16-bit or four 8-bit operands)
    at a time. If the input tensors or weight arrays are not 4-byte aligned in SRAM, the Cortex-M processor
    must perform multiple memory fetches and stitch the bytes together in hardware. This severely breaks
    spatial locality, keeps the memory bus active longer, and stalls the pipeline, dramatically increasing
    dynamic power consumption despite the lower overall cycle count.
  common_mistake: Believing the DSP instructions fundamentally require significantly more power per cycle
    than standard ALU instructions.
  napkin_math: 'Standard: 45ms * 33mW = 1.485mJ. CMSIS-NN aligned (expected): 12ms * 40mW = 0.48mJ. CMSIS-NN
    unaligned: Core stalls and double-fetches keep the AHB bus active, increasing average power draw to
    150mW during the 12ms window. 12ms * 150mW = 1.8mJ.'
