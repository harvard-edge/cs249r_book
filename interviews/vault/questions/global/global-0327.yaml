title: Cold Start Optimization
scenario: A model server cold-starts in 90 seconds because it downloads 18 GB of weights from object storage at 200 MB/s effective throughput.
question: What cold-start improvement is possible if model-weight download throughput rises from 200 MB/s to 1 GB/s for an 18 GB model?
details:
  realistic_solution: At 200 MB/s, downloading 18 GB takes 90 seconds. At 1 GB/s, it takes 18 seconds. Improving model image caching and locality is paramount before tuning server startup scripts.
  common_mistake: |
    **The Pitfall:** Optimizing application initialization code before addressing data loading.
    **The Rationale:** Developers tend to focus on the runtime execution path they control.
    **The Consequence:** Days of profiling application code are wasted when weight network download completely dominates the critical path.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model size: 18 GB.
       - Baseline throughput: 200 MB/s.
       - Target throughput: 1.0 GB/s.
    2. **Calculations:**
       - Baseline Time = 18 GB / 0.2 GB/s = 90 seconds.
       - Target Time = 18 GB / 1.0 GB/s = 18 seconds.
       - Time Savings = 90 seconds - 18 seconds = 72 seconds.
    3. **Conclusion & Interpretation:**
       - **Result: Network-Bound.** Improving network throughput to 1 GB/s directly cuts 72 seconds from the cold start, removing the primary blocker.
