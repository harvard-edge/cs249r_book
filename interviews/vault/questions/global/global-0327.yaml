title: Cold Start Optimization
scenario: A model server cold-starts in 90 seconds because it downloads 18 GB of weights from object storage at 200 MB/s effective throughput.
question: "What cold-start improvement is possible if model-weight download throughput rises from 200 MB/s to 1 GB/s for an 18 GB model?"
details:
  realistic_solution: At 200 MB/s, downloading 18 GB takes about 90 seconds. At 1 GB/s, it takes about 18 seconds. The first optimization is model image/cache locality or pre-warming; other startup work may still remain.
  common_mistake: |
    **The Pitfall:** Optimizing application code before addressing data loading.
    **The Rationale:** Developers focus on the runtime execution path they control.
    **The Consequence:** Days of profiling application code are wasted when weight download completely dominates the cold start.
  napkin_math: |
    - At 200 MB/s: 18 GB / 0.2 GB/s = 90 seconds.
    - At 1 GB/s: 18 GB / 1.0 GB/s = 18 seconds.
    - **Improving network throughput to 1 GB/s cuts 72 seconds off the cold start.**
