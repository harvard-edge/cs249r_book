title: Fairness Sample Size Across Slices
scenario: A fairness audit needs at least 5,000 labeled outcomes per subgroup. Cloud has 12 subgroups, mobile has 8 opt-in cohorts, and edge has 25 site cohorts.
question: How many labeled outcomes are needed for cloud, mobile, and edge fairness audits at 5,000 outcomes per slice?
details:
  realistic_solution: Cloud needs 60,000 labeled outcomes, mobile needs 40,000 opt-in outcomes, and edge needs 125,000 site-cohort outcomes. The edge tier is largest because it has more cohorts. These are minimums assuming independent slices; overlapping or hierarchical groups need more careful accounting.
  common_mistake: |
    **The Pitfall:** Using total labels across all slices and missing that each subgroup or cohort needs enough examples.
    **The Rationale:** Many engineers calculate total samples needed overall rather than ensuring statistical significance within each granular slice.
    **The Consequence:** Undersampling minority cohorts, leading to low-confidence fairness metrics that fail to detect bias.
  napkin_math: |
    **Assumptions & Constraints:**
    - 5,000 outcomes needed per slice.
    - Cloud: 12 slices. Mobile: 8 slices. Edge: 25 slices.

    **Calculations:**
    - Cloud: 12 × 5,000 = 60,000 outcomes.
    - Mobile: 8 × 5,000 = 40,000 outcomes.
    - Edge: 25 × 5,000 = 125,000 outcomes.

    **Conclusion & Interpretation:**
    - **Result: 225,000 outcomes (Data-Bound)**. Total needed: 60,000 for cloud, 40,000 for mobile, and 125,000 for edge.
