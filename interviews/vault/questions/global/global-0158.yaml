title: DMA and AXI SRAM Bus Contention
scenario: A vibration analysis system on a Cortex-M7 samples at 32kHz. DMA writes audio chunks to AXI SRAM. A TFLite Micro model runs continuously from the same AXI SRAM.
question: What causes the few-microsecond inference jitter and slight power increase when ADC DMA and the TFLite Micro model share AXI SRAM?
details:
  realistic_solution: Bus matrix contention from poor memory locality. Both CPU fetching weights and DMA writing samples arbitrate for the same AXI SRAM bank, stalling the CPU pipeline. Mitigation requires segregating DMA buffers to DTCM or a disjoint SRAM bank to enable parallel bus routing.
  common_mistake: |
    **The Pitfall:** Suspecting that RTOS context switching or timer interrupts are preempting the inference thread.
    **The Rationale:** Interrupts are the most common source of jitter in embedded software.
    **The Consequence:** Spending weeks tuning RTOS priorities when the issue is fundamentally hardware bus matrix contention below the OS level.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Cortex-M7 clock: 168MHz (5.95 ns/cycle)
       - DMA write rate: 32 kHz (1 write/31.25 µs)
       - Inference duration: 12 ms
    2. **Calculations:**
       - DMA writes during inference: 12 ms / 31.25 µs = 384 writes
       - CPU stall per collision: ~4 cycles
       - Base stall delay: 384 * 4 * 5.95 ns = 9.14 µs
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bandwidth Bound (Contention)**
