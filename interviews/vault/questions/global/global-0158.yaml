title: DMA and AXI SRAM Bus Contention
scenario: A vibration analysis system on a Cortex-M7 uses a 16-bit ADC sampling at 32kHz. DMA writes audio
  chunks to a 4KB buffer in AXI SRAM. A 150KB TFLite Micro model runs continuously from the same AXI SRAM.
  You observe that inference latency randomly jitters by a few microseconds (e.g., 12.000ms to 12.004ms)
  and power consumption is slightly elevated.
question: "What causes the few-microsecond inference jitter and slight power increase when ADC DMA and the TFLite Micro model share AXI SRAM?"
details:
  realistic_solution: The root cause is bus matrix contention due to poor memory locality. Both the CPU
    (fetching model weights/activations) and the DMA controller (writing ADC samples) are simultaneously
    accessing the AXI SRAM bank. This causes bus arbitration collisions, stalling the CPU pipeline. The
    solution is to move the DMA buffer to DTCM (Data Tightly Coupled Memory) or a separate SRAM domain
    (e.g., SRAM1 vs SRAM2) so the DMA and CPU use parallel, non-intersecting bus routes.
  common_mistake: Suspecting that RTOS context switching or timer interrupts are preempting the inference
    thread, which would typically cause much larger jitter (milliseconds, not microseconds).
  napkin_math: Cortex-M4 168MHz cycle = 5.95ns. DMA writes at 32kHz = every 31.25us. A 150KB TFLite model
    runs from the same SRAM. Bus arbitration stalls the CPU ~4 cycles per collision. During a 12ms inference,
    DMA writes 12ms / 31.25us = 384 times. 384 writes * 4 cycles * 5.95ns = 9.1us of base stall delay.
    Pipeline flushes add random overhead, creating ~10us jitter.
