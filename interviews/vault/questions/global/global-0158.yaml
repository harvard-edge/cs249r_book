title: DMA and AXI SRAM Bus Contention
scenario: A vibration analysis system on a Cortex-M7 uses a 16-bit ADC sampling at 32kHz. DMA writes audio chunks to a 4KB buffer in AXI SRAM. A 150KB TFLite Micro model runs continuously from the same AXI SRAM. You observe that inference latency randomly jitters by a few microseconds (e.g., 12.000ms to 12.004ms) and power consumption is slightly elevated.
question: What causes the few-microsecond inference jitter and slight power increase when ADC DMA and the TFLite Micro model share AXI SRAM?
details:
  realistic_solution: The root cause is bus matrix contention due to poor memory locality. Both the CPU (fetching model weights/activations) and the DMA controller (writing ADC samples) are simultaneously accessing the AXI SRAM bank. This causes bus arbitration collisions, stalling the CPU pipeline. The solution is to move the DMA buffer to DTCM (Data Tightly Coupled Memory) or a separate SRAM domain (e.g., SRAM1 vs SRAM2) so the DMA and CPU use parallel, non-intersecting bus routes.
  common_mistake: |
    **The Pitfall:** Suspecting that RTOS context switching or timer interrupts are preempting the inference thread.
    **The Rationale:** Interrupts are the most common source of jitter in embedded software.
    **The Consequence:** Spending weeks tuning RTOS priorities when the issue is fundamentally hardware bus matrix contention below the OS level.
  napkin_math: |
    * CPU Cycle: Cortex-M7 at 168MHz = 5.95 ns per cycle.
    * DMA writes: 32 kHz = 1 write every 31.25 µs.
    * During 12 ms inference, DMA writes: 12 ms / 31.25 µs = 384 times.
    * CPU stall per collision: ~4 cycles.
    * Total base stall delay: 384 writes * 4 cycles * 5.95 ns = 9.14 µs.
    * **Pipeline flushes add overhead, reliably creating the ~10 µs jitter observed.**
