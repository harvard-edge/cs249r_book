title: The Overclocking Energy Trap
scenario: Your team is training a 100B parameter model on 512 A100 GPUs. To meet a deadline, the infrastructure team applies a 15% GPU frequency boost (overclock). The training time successfully decreases from 30 days to 26 days. However, the total energy consumed for the run (in kWh) unexpectedly increases by nearly 40%.
question: Why does a 15% GPU frequency boost reduce training time but increase total energy by nearly 40%?
details:
  realistic_solution: 'The root cause lies in the CMOS power equation: Dynamic Power (P) = a * C * V^2 * f. To achieve a 15% increase in frequency (f), the GPU must operate at a higher voltage (V) to maintain stability. Because power scales linearly with frequency but quadratically with voltage, the dynamic power draw increases cubically. Furthermore, the higher power dissipation increases the silicon temperature, which exponentially increases the static (leakage) power. To optimize perf/watt, GPUs actually need to be slightly underclocked, not overclocked.'
  common_mistake: |
    **The Pitfall:** Assuming energy consumption scales linearly with training time.
    **The Rationale:** Believing that finishing the job 4 days early naturally saves energy, ignoring the non-linear relationship between voltage, frequency, and power.
    **The Consequence:** Massively exceeding datacenter power budgets and increasing operational costs despite the shorter runtime.
  napkin_math: |
    **Assumptions & Constraints:**
    - Original run: f=1.0, V=1.0, Time=30.
    - Overclocked: f=1.15 requires V=1.12.
    
    **Calculations:**
    - Original Energy = 1.0 x 30 = 30.
    - Dynamic Power scales as V^2 x f: 1.12^2 x 1.15 = ~1.44x.
    - Add 15% leakage power from heat: Total Power = ~1.6x.
    - New Energy: 1.6 x 26 days = 41.6.
    - Increase: 41.6 / 30 = 1.38.
    
    **Conclusion & Interpretation:**
    - **Result: 1.38x Energy (Energy-Bound)**. A 38% increase in total energy consumed.
