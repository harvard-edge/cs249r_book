title: The DRO Training Cost Multiplier
scenario: 'Your team proposes replacing standard ERM (Empirical Risk Minimization) training with Group
  DRO (Distributionally Robust Optimization) to improve worst-group accuracy on a large language model
  fine-tuning job. The 7B model currently trains in 48 hours on 8 A100s using ERM. Evaluate the compute
  and systems costs of switching to Group DRO. The PM wants to know: ''How much more expensive is fairness-aware
  training, and is there a cheaper alternative that achieves 80% of the benefit?'''
question: "How much more expensive is fairness-aware training, and is there a cheaper alternative that achieves 80% of the benefit?"
details:
  realistic_solution: 'Group DRO has three hidden costs beyond the loss function change: (1) Per-group
    loss tracking: at each step, you compute loss separately for each group, then upweight the worst-performing
    group. With g groups and a large batch, this requires group-aware batch construction — every batch
    must contain sufficient samples from every group, which conflicts with random shuffling and can reduce
    effective batch size. For rare groups (<5% of data), you may need to oversample 4-10×, effectively
    increasing epoch length. (2) Convergence slowdown: DRO''s adversarial reweighting creates a min-max
    optimization that converges 1.5-3× slower than ERM in practice (the optimizer oscillates between groups).
    (3) Hyperparameter search: DRO introduces a step-size for the group weight update (η_q) that interacts
    with the model learning rate. Finding the right η_q typically requires 3-5× more hyperparameter trials.
    Total cost: 48 hrs × 2× convergence slowdown × 3× hyperparam search = ~288 GPU-hours vs 48 baseline
    — a 6× increase. The 80%-of-benefit alternative: train with standard ERM, then apply post-hoc threshold
    adjustment (Hardt et al., 2016) per group on the validation set. This costs zero additional training
    compute and typically closes 60-80% of the worst-group accuracy gap. Combine with importance-weighted
    ERM (upweight minority groups 2-3× in the loss) for another cheap improvement that costs only ~1.3×
    the baseline training time.'
  common_mistake: Assuming DRO is a drop-in loss function replacement with negligible overhead. Or assuming
    the cost is simply 'k× more' where k is the number of groups.
  napkin_math: 'ERM baseline: 48 hrs × 8 A100s = 384 GPU-hours. At $2/GPU-hr: $768. Group DRO: 384 × 2
    (convergence) × 3 (hyperparam search) = 2,304 GPU-hours = $4,608 — a 6× increase. Threshold adjustment:
    0 additional training hours + 1 hr evaluation sweep = $16. Importance-weighted ERM: 384 × 1.3 = 499
    GPU-hours = $998. For 80% of DRO''s benefit at 1.3× cost vs 6×, importance weighting + threshold adjustment
    is the clear winner.'
