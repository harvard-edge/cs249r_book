title: The Energy Tax of Data Movement
scenario: Compare the energy consumption of performing an FP16 multiply-add operation against reading the operands from DRAM.
question: 'Which operation consumes more energy: performing an FP16 multiply-add or reading the operands from DRAM?'
details:
  realistic_solution: Reading from DRAM is far more expensive — roughly 580x more energy per operand than the FP16 multiply-add itself. Modern transistors have made arithmetic nearly free in energy terms (~0.4 pJ for an FP16 MAC), but moving data across millimeters of wire to DRAM costs ~230 pJ due to charging long metal interconnects and activating row buffers. This is why memory bandwidth, not FLOPS, is the true currency of modern accelerator design.
  common_mistake: |
    **The Pitfall:** Thinking that the arithmetic computation itself is the primary energy consumer.
    **The Rationale:** Carrying over outdated CPU intuition where complex instructions dominated power draw.
    **The Consequence:** Failing to prioritize data caching, leading to kernels that rapidly drain mobile batteries or hit thermal limits.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Energy for FP16 MAC: ~0.4 pJ.
       - Energy for 16-bit DRAM read: ~230 pJ.
    2. **Calculations:**
       - Energy ratio: 230 pJ / 0.4 pJ = 575x.
    3. **Conclusion & Interpretation:**
       - **Result: 575x more energy for memory. Energy-Bound by data movement, not FLOPS.**
