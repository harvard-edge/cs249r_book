title: The Energy Tax of Data Movement
scenario: 'Which operation consumes more energy: performing an FP16 multiply-add or reading the operands
  from DRAM?'
question: "Which operation consumes more energy: performing an FP16 multiply-add or reading the operands from DRAM?"
details:
  realistic_solution: Reading from DRAM is far more expensive — roughly 580x more energy per operand than
    the FP16 multiply-add itself. Modern transistors have made arithmetic nearly free in energy terms
    (~0.4 pJ for an FP16 MAC), but moving data across millimeters of wire to DRAM costs ~230 pJ due to
    charging long metal interconnects and activating row buffers. This is why memory bandwidth, not FLOPS,
    is the true currency of modern accelerator design.
  common_mistake: Thinking that "Compute" is the expensive part. Modern silicon has made math incredibly
    cheap; moving bits across wires is the real cost.
  napkin_math: 'Energy for an FP16 MAC is ~0.4 pJ. Reading a 16-bit operand from DRAM is ~230 pJ. For
    a MAC operation, comparing a single DRAM read to the compute: 230 pJ / 0.4 pJ = 575x more energy.
    Thus, moving data across the chip from DRAM to the compute units is roughly 575x more expensive in
    energy terms than performing the actual arithmetic itself.'
