title: Thundering Herd Problem
scenario: A highly popular celebrity post expires from our Redis cache. Thousands of requests hit the database simultaneously, causing a crash.
question: What is this phenomenon called and how can it be mitigated?
details:
  realistic_solution: This is a "Thundering Herd" (cache stampede). Implement distributed mutexes (e.g., Redlock) ensuring only a single request recalculates the cache, while others wait. Alternatively, apply cache TTL jitter or probabilistic early recomputation (PER).
  common_mistake: |
    **The Pitfall:** Confusing a cache stampede with a DDoS attack or cache penetration.
    **The Rationale:** The sudden overwhelming traffic spike strongly mimics a malicious denial of service.
    **The Consequence:** Implementing IP blocking or rate limiting instead of adding a simple distributed lock, penalizing legitimate users without solving the architectural flaw.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Traffic: 10,000 req/s
       - Without lock: 10,000 simultaneous DB queries
    2. **Calculations:**
       - Lock implementation: 1 DB query to fill cache
       - Remainder: 9,999 requests served from refreshed cache
    3. **Conclusion & Interpretation:**
       - **Result: Concurrency-Bound**
  options:
  - Cache Penetration; mitigated by using Bloom filters.
  - Data Skew; mitigated by consistent hashing.
  - Cache Stampede (Thundering Herd); mitigated by adding a distributed lock before querying the database.
  - Cache Avalanche; mitigated by scaling up the database instance.
  correct_index: 2
