title: Thundering Herd Problem
scenario: A highly popular celebrity post just expired from our Redis cache. Suddenly, thousands of requests hit the database simultaneously to fetch the same post, causing the database to crash.
question: What is this phenomenon called and how can it be mitigated?
details:
  realistic_solution: This is the "Thundering Herd" (or cache stampede) problem. It can be mitigated by using a distributed lock (mutex) so only the first request queries the DB and repopulates the cache, or by adding slight jitter to cache TTLs.
  common_mistake: |
    **The Pitfall:** Confusing a cache stampede with a DDoS attack or cache penetration.
    **The Rationale:** The sudden overwhelming traffic spike strongly mimics a malicious denial of service.
    **The Consequence:** Implementing IP blocking or rate limiting instead of adding a simple distributed lock, penalizing legitimate users without solving the architectural flaw.
  napkin_math: |
    * Traffic: 10,000 req/s for a single post.
    * Without lock: Cache expires at t=0, causing 10,000 simultaneous DB queries in 1 second.
    * With lock + backfill: 1 DB query is executed.
    * **The remaining 9,999 requests are served from the refreshed cache within ~5 ms.**
  options:
  - Cache Penetration; mitigated by using Bloom filters.
  - Data Skew; mitigated by consistent hashing.
  - Cache Stampede (Thundering Herd); mitigated by adding a distributed lock before querying the database.
  - Cache Avalanche; mitigated by scaling up the database instance.
  correct_index: 2
