title: Thundering Herd Problem
scenario: A highly popular celebrity post just expired from our Redis cache. Suddenly, thousands of requests
  hit the database simultaneously to fetch the same post, causing the database to crash. What is this
  phenomenon called and how can it be mitigated?
question: "What is this phenomenon called and how can it be mitigated?"
details:
  realistic_solution: This is the "Thundering Herd" (or cache stampede) problem. It can be mitigated by
    using a distributed lock (mutex) so only the first request queries the DB and repopulates the cache,
    or by adding slight jitter to cache TTLs.
  common_mistake: Confusing it with a DDoS attack or cache penetration.
  napkin_math: '- Celebrity post: 10K req/s. Cache TTL expires at t=0 | - Without lock: 10K simultaneous
    DB queries in 1 second | - With lock + backfill: 1 DB query, 9,999 served from refreshed cache within
    ~5 ms'
  options:
  - Cache Penetration; mitigated by using Bloom filters.
  - Data Skew; mitigated by consistent hashing.
  - Cache Stampede (Thundering Herd); mitigated by adding a distributed lock before querying the database.
  - Cache Avalanche; mitigated by scaling up the database instance.
  correct_index: 2
