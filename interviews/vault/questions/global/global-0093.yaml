title: Federated Bias Mitigation in Mobile Health Diagnostics
scenario: You are designing a federated learning system for a mobile skin-lesion diagnostic app across
  5 million daily active devices. The model update is 20MB. You must ensure equal opportunity across 10
  skin-tone groups. Demographic data cannot leave the device. Global ingress bandwidth to the aggregation
  server is capped at 200 TB/day.
question: "How would you preserve equal opportunity across 10 skin-tone groups without demographic data leaving devices or exceeding 200 TB/day?"
details:
  realistic_solution: In Federated Learning, mitigating bias while preserving privacy creates a tradeoff
    between network bandwidth, device compute, and fairness. If we split gradients by the 10 skin-tone
    groups to do server-side FairFed aggregation, the payload per device scales linearly (20MB -> 200MB).
    With 5M devices, 5M * 200MB = 1 PB/day, violating the 200 TB/day ingress cap. Instead, we use local
    'in-processing' bias mitigation (e.g., local adversarial debiasing or FairBatch). The device trains
    a local adversary to predict skin tone from the latent representations and penalizes the main model.
    The device then sends a single, standard 20MB gradient update to the server. This shifts the computational
    burden to the edge (acceptable for modern smartphones charging overnight) while keeping the network
    payload strictly at 20MB per device, yielding 100 TB/day total ingress.
  common_mistake: Sending demographic-specific gradients or using Secure Multi-Party Computation (SMPC)
    to aggregate per-group metrics, which inflates the network payload beyond the ingress limits.
  napkin_math: 'Standard update: 5M devices * 20MB = 100 TB/day (Fits 200 TB cap).

    Group-specific gradients (10 groups): 5M * (20MB * 10) = 1,000 TB/day (Fails cap).

    Local debiasing: Adds ~30% compute time on-device (e.g., 5 mins to 6.5 mins) but payload remains 20MB.
    100 TB/day ingress is well within the 200 TB limit.'
