title: Speculative Decoding Architecture
scenario: Design a speculative decoding system for a 70B target model using a 1B draft model running on the same hardware. The draft model proposes K=5 candidate tokens per step, and the target model verifies all K tokens in a single forward pass.
question: "How would you calculate the expected speedup assuming a 70% draft acceptance rate and specify memory allocation on an 80GB GPU?"
details:
  realistic_solution: 'Design: (1) Memory allocation on 80GB: target model INT8 = 70 GB. Draft model FP16 = 2 GB. KV cache budget: 80 - 70 - 2 - 2 (overhead) = 6 GB. At 320 KB/token for 70B KV cache: 6 GB / 320 KB \u2248 19,660 tokens max context. (2) Speculative decoding flow: draft model generates K=5 tokens autoregressively. Target model verifies all 5 in one forward pass (parallel verification). On rejection at i, discard i+1..K and resample. (3) Expected speedup: with acceptance rate \u03b1=0.7 and finite K=5, expected tokens per round = (1-\u03b1^(K+1))/(1-\u03b1) = (1-0.7^6)/0.3 \u2248 2.94 tokens. Draft overhead: 5ms total for K=5. Target verify: 35ms. Total round time: 40ms for 2.94 tokens \u2192 13.6ms/token. Baseline: 35ms/token. Speedup = 35/13.6 \u2248 2.57x.'
  common_mistake: |
    **The Pitfall:** Assuming speculative decoding always gives Kx speedup.
    **The Rationale:** Candidates ignore the probability of rejection and the execution overhead of the draft model.
    **The Consequence:** Wildly overestimating generation throughput in production architectures.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - \u03b1 = 0.7 acceptance rate, K = 5.
       - Draft cost = 1ms/token. Target cost = 35ms/pass.
    2. **Calculations:**
       - Expected accepted tokens = (1 - 0.7^6) / (1 - 0.7) = 2.94 tokens/round.
       - Round latency = (5 * 1ms) + 35ms = 40ms.
       - Latency per token = 40ms / 2.94 = 13.6ms.
       - Speedup = 35ms / 13.6ms = 2.57x.
    3. **Conclusion & Interpretation:**
       - **Result: 2.57x Speedup.** (Latency-bound decode optimization).
