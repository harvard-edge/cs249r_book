title: Realize Extreme Quantization Tradeoffs
scenario: A product manager wants to advertise one 2-bit model for cloud, mobile, edge, and TinyML deployments. Early tests show good memory savings but unstable accuracy on long-tail inputs.
question: What system-level issues must be resolved before making a global 2-bit model claim?
details:
  realistic_solution: Treat the 2-bit model as a deployment tier, not a universal replacement. Check calibration data, outlier handling, per-target kernel support, fallback cost, and whether higher precision is needed for safety-critical paths.
  common_mistake: |
    **The Pitfall:** Reporting only memory reduction and ignoring operational viability.
    **The Rationale:** The massive storage win looks fantastic on paper for cross-platform alignment.
    **The Consequence:** The model is shipped globally but misses latency targets due to unsupported ops falling back to CPU on edge/mobile devices.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 8B parameter model.
       - Baseline FP16 size: 2 bytes/param.
       - Target size: 2-bit (0.25 bytes/param).
    2. **Calculations:**
       - FP16 Storage = 8B * 2 bytes = 16 GB.
       - 2-bit Storage = 8B * 0.25 bytes = 2 GB.
       - Memory reduction factor = 16 GB / 2 GB = 8x.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound (Fallback).** The 8x storage win is meaningless if unsupported low-precision kernels force slow software fallbacks on mobile/edge CPUs.
