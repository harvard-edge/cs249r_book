title: Observability For Model Rollout
scenario: A model rollout can fail through latency regression, accuracy regression, memory growth, or data drift.
question: What observability panel is needed before launching a model to catch multi-axis regressions?
details:
  realistic_solution: The panel should include latency percentiles, error rates, business/task metrics, memory and accelerator utilization, input distribution summaries, model/version labels, and rollback status. The key is correlating regressions with model version and traffic slice.
  common_mistake: |
    **The Pitfall:** Watching only service uptime and infrastructure metrics like CPU usage.
    **The Rationale:** Standard DevOps dashboards are easy to reuse, but they lack model-aware semantic context.
    **The Consequence:** A model returns garbage predictions at 200 OK, destroying user experience while the dashboard shows all green.
  napkin_math: |
    - **Traffic Canary**: 1% traffic slice.
    - **Base Volume**: 1,000,000 requests/hour.
    - **Sample Size**: 1,000,000 * 0.01 = 10,000 requests/hour.
    - **Conclusion**: A 1% canary still yields **10,000 requests/hour**, providing strong statistical significance for latency and error rates.
