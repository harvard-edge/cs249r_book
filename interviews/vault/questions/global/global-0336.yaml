title: Observability For Model Rollout
scenario: A model rollout can fail through latency regression, accuracy regression,
  memory growth, or data drift. Design the minimum observability panel needed before
  launch.
question: What observability panel is needed before launching a model that can regress
  in latency, accuracy, memory, or data drift?
details:
  realistic_solution: The panel should include latency percentiles, error rates, business/task
    metrics, memory and accelerator utilization, input distribution summaries, model/version
    labels, and rollback status. The key is correlating regressions with model version
    and traffic slice.
  common_mistake: Watching only service uptime and missing quality or memory regressions
    caused by the new model.
  napkin_math: A 1% traffic canary with 1M requests/hour still gives 10,000 requests/hour
    for latency and error-rate estimates.
