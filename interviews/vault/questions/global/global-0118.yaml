title: Long-Running Inference OOM Death
scenario: Your dynamic batching LLM server runs perfectly for the first 6 hours, processing requests with varying lengths (100 to 8000 tokens). However, around hour 12, the service consistently crashes with CUDA OOM, despite Prometheus metrics showing the theoretical peak memory usage never exceeding 45GB on an 80GB A100 GPU.
question: What is causing the 12-hour CUDA OOMs despite 45GB theoretical use, and how would you redesign KV memory management?
details:
  realistic_solution: The root cause is severe external and internal memory fragmentation. Contiguous memory allocators (like PyTorch's default caching allocator) struggle when allocating and freeing variable-sized KV cache tensors over long periods. When a large contiguous block is requested for an 8000-token sequence, the allocator fails because available memory is scattered in small chunks. The architectural fix is to implement a paged memory manager (e.g., PagedAttention). Pre-allocate a single massive contiguous block of HBM at startup. Divide it into fixed-size physical blocks (e.g., 16 or 32 tokens). Maintain a page table mapping logical token blocks to physical blocks, completely eliminating external fragmentation and bounding internal fragmentation to <1 block per request.
  common_mistake: |
    **The Pitfall:** Assuming a memory leak in Python/PyTorch and adding aggressive garbage collection calls.
    **The Rationale:** A slow climb to OOM over many hours is the classic signature of an application memory leak.
    **The Consequence:** Failing to fix the crash because the memory isn't leaked; it is physically trapped in unallocatable fragmented gaps by the contiguous allocator.
  napkin_math: |
    * KV size: ~125 KB per token.
    * Max sequence: 8000 tokens * 64 batch * 125 KB = 64 GB needed naively.
    * Fragmentation: 45 GB is allocated but fragmented into tiny 50 MB chunks.
    * Allocating a contiguous 1 GB tensor for a new sequence fails.
    * Block size of 16 tokens = ~2 MB per block.
    * **A 40 GB KV pool gives 20,000 physical blocks, eliminating external fragmentation completely.**
