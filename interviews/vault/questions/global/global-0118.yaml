title: Long-Running Inference OOM Death
scenario: Your dynamic batching LLM server runs perfectly for the first 6 hours, processing requests with
  varying lengths (100 to 8000 tokens). However, around hour 12, the service consistently crashes with
  CUDA OOM, despite Prometheus metrics showing the theoretical peak memory usage never exceeding 45GB
  on an 80GB A100 GPU. Diagnose the root cause and architect a robust memory management subsystem.
question: "What is causing the 12-hour CUDA OOMs despite 45GB theoretical use, and how would you redesign KV memory management?"
details:
  realistic_solution: The root cause is severe external and internal memory fragmentation. Contiguous
    memory allocators (like PyTorch's default caching allocator) struggle when allocating and freeing
    variable-sized KV cache tensors over long periods. When a large contiguous block is requested for
    an 8000-token sequence, the allocator fails because available memory is scattered in small chunks.
    The architectural fix is to implement a paged memory manager (e.g., PagedAttention). Pre-allocate
    a single massive contiguous block of HBM at startup. Divide it into fixed-size physical blocks (e.g.,
    16 or 32 tokens). Maintain a page table mapping logical token blocks to physical blocks, completely
    eliminating external fragmentation and bounding internal fragmentation to <1 block per request.
  common_mistake: Assuming a memory leak in Python/PyTorch and adding garbage collection calls, or simply
    reducing the max batch size without addressing the underlying allocation pattern.
  napkin_math: Assume batch size 64. Pre-allocating max length (8000 tokens) naively requires 8000 * 64
    * 125KB (approx per token KV) = 64GB (which leaves almost no room for the model weights on an 80GB
    GPU). Dynamic allocation of varying sizes (e.g., 100 to 8000) causes gaps. If 45GB is allocated but
    fragmented into 50MB chunks, an attempt to allocate a contiguous 1GB tensor for a new long sequence
    fails. With a block size of 16 tokens (approx 2MB), a 40GB KV pool provides 20,000 perfectly reusable
    slots, ensuring 100% utilization regardless of sequence length variance.
