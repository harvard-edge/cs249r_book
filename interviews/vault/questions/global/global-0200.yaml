title: Matrix Multiply Arithmetic Intensity
scenario: You are computing a square matrix multiply C = A × B where A and B are 4096×4096 FP16 matrices on an accelerator.
question: What is the arithmetic intensity of the 4096×4096 FP16 matmul, and is it compute-bound or memory-bound?
details:
  realistic_solution: FLOPs = 2 × 4096³ ≈ 137.4 GFLOP. Memory traffic = read A + read B + write C = 3 × 4096² × 2 bytes = 100.7 MB. Arithmetic intensity = 137.4 GFLOP / 0.1007 GB ≈ 1364 FLOP/byte. Accelerator ridge point = 312 TFLOPS / 2.0 TB/s = 156 FLOP/byte. Since 1364 >> 156, this is solidly compute-bound.
  common_mistake: |
    **The Pitfall:** Forgetting to count both read and write traffic, or using element count instead of byte count for the memory term.
    **The Rationale:** Misunderstanding the components of total memory traffic or confusing data types with actual byte sizes.
    **The Consequence:** Miscalculating arithmetic intensity and incorrectly identifying the bottleneck of the operation.
  napkin_math: |
    **Assumptions & Constraints:**
    - A, B, C are 4096×4096 FP16 (2 bytes/element).
    - Ridge point: 312 TFLOPS / 2 TB/s = 156 FLOP/Byte.

    **Calculations:**
    - Compute: 2 * 4096³ ≈ 137.4 GFLOPs.
    - Memory: 3 matrices * 4096² * 2 bytes ≈ 100.7 MB.
    - Arithmetic Intensity: 137.4 GFLOPs / 0.1007 GB ≈ 1364 FLOP/Byte.

    **Conclusion & Interpretation:**
    - **Result: 1364 FLOP/Byte (Compute-Bound)**. Since 1364 >> 156 FLOP/Byte, the operation is solidly compute-bound.
