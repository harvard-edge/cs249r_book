title: Matrix Multiply Arithmetic Intensity on A100
scenario: You are computing a square matrix multiply C = A × B where A and B are 4096×4096 FP16 matrices on an A100.
question: What is the arithmetic intensity of the 4096×4096 FP16 matmul on an A100, and is it compute-bound or memory-bound?
details:
  realistic_solution: FLOPs = 2 × 4096³ ≈ 137.4 GFLOP. Memory traffic = read A + read B + write C = 3 × 4096² × 2 bytes = 100.7 MB. Arithmetic intensity = 137.4 GFLOP / 0.1007 GB ≈ 1364 FLOP/byte. A100 ridge point = 312 TFLOPS / 2.0 TB/s = 156 FLOP/byte. Since 1364 >> 156, this is solidly compute-bound. Large matmuls are the bread and butter of GPU utilization — this is why Transformers map so well to GPUs.
  common_mistake: |
    **The Pitfall:** Forgetting to count both read and write traffic, or using element count instead of byte count for the memory term.
    **The Rationale:** Misunderstanding the components of total memory traffic or confusing data types with actual byte sizes.
    **The Consequence:** Miscalculating arithmetic intensity and incorrectly identifying the bottleneck of the operation.
  napkin_math: |
    - **Compute:** 2 × 4096³ ≈ **137.4 GFLOPs**
    - **Memory:** 3 matrices (A, B, C) × 4096² × 2 bytes ≈ **100.7 MB**
    - **Arithmetic Intensity (AI):** 137.4 GFLOPs / 0.1007 GB ≈ **1364 FLOP/Byte**
    - **A100 Ridge Point:** 312 TFLOPS / 2 TB/s = **156 FLOP/Byte**
    - **Conclusion:** Since 1364 >> 156, the operation is solidly **compute-bound**.
