title: Memory Hierarchy Aware Placement
scenario: A retrieval model has a 6 GB embedding table and a 200 MB hot working set. It targets cloud HBM, a phone (8 GB shared memory, 3 GB used by OS/apps), and an edge gateway (512 MB DRAM plus SSD).
question: How would you place a 6 GB embedding table with a 200 MB hot set across cloud HBM, mobile shared memory, and a 512 MB edge gateway?
details:
  realistic_solution: Cloud should keep the table in accelerator or host memory depending on bandwidth needs. Mobile cannot safely reserve the full 6 GB because only about 5 GB is free before allocator fragmentation and OS eviction risk, so it should keep a compressed or personalized subset plus a cache. The gateway can keep the 200 MB hot set in DRAM and page cold embeddings from SSD, accepting higher miss latency. The design follows hot/cold separation, not a one-size-fits-all table placement.
  common_mistake: |
    **The Pitfall:** Checking only total device memory and ignoring OS reservations, hot-set size, and storage miss latency.
    **The Rationale:** It's a common oversight to assume user space apps have access to 100% of advertised physical RAM.
    **The Consequence:** The application constantly crashes the edge OS via OOM kills, or suffers extreme UI stuttering due to unmanaged swap paging.
  napkin_math: |
    - Mobile free memory = 8 GB - 3 GB = 5 GB (Cannot hold 6 GB table).
    - Gateway DRAM = 512 MB (Fits 200 MB hot set, but cannot hold 6 GB table).
    - **The table physically cannot fit entirely in memory on mobile or edge devices, requiring subsetting or SSD paging.**
