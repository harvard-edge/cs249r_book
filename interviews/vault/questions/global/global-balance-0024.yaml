title: Precision Incident Response
scenario: A training run switches to a lower precision and loss spikes every few thousand steps. Design the first incident response before reverting the whole run.
question: What should you inspect before reverting a lower-precision training run with intermittent loss spikes?
details:
  realistic_solution: Inspect gradient overflows, activation outliers, optimizer state precision, loss-scaling logs, layer-level statistics, and recent data batches. Then apply targeted fallback for unstable layers or operations before abandoning the precision change.
  common_mistake: Reverting the entire training stack without identifying whether a small set of layers or batches triggers instability.
  napkin_math: If spikes occur every 2,000 steps, log windows should include at least several thousand steps before and after the spike to correlate with data or overflow events.
