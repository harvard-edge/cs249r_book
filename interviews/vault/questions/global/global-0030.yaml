title: Layer 7 vs Layer 4 Load Balancing
scenario: We need to route incoming HTTP traffic based on the requested URL path (e.g., `/api` goes to one service, `/web` to another).
question: Which type of load balancer is required for URL-path-based HTTP routing?
details:
  realistic_solution: A Layer 7 load balancer (like an Application Load Balancer or NGINX operating at L7) is required because it can inspect HTTP headers and URI paths to make routing decisions.
  common_mistake: |
    **The Pitfall:** Confusing Layer 4 (Transport layer - TCP/UDP routing based on IP/Port) with Layer 7 (Application layer - HTTP/HTTPS routing based on headers, paths).
    **The Rationale:** Many engineers use "load balancer" generically without distinguishing OSI layers.
    **The Consequence:** Deploying an L4 load balancer that fundamentally cannot read HTTP paths, making the requested `/api` and `/web` routing impossible.
  napkin_math: |
    * L4 LB: inspects TCP header (~20 bytes) — routes by IP:port only.
    * L7 LB: parses HTTP header (~200-500 bytes) — routes by path, host, cookies.
    * **L7 adds ~0.1-0.5 ms latency but enables essential content-aware routing.**
  options:
  - Layer 3 Load Balancer
  - Layer 4 Load Balancer
  - Layer 7 Load Balancer
  - DNS Round Robin
