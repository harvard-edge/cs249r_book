title: Privacy Budget Composition
scenario: A product runs four DP analytics queries per week, each spending epsilon 0.2 under simple composition. Estimate monthly epsilon spend over four weeks.
question: What total epsilon is spent by 4 DP queries per week for 4 weeks at epsilon 0.2 each under simple composition?
details:
  realistic_solution: There are 16 queries in four weeks. Under simple composition, epsilon adds linearly, giving 3.2. This is only a simple upper bound; production accounting may use tighter composition.
  common_mistake: Treating each DP query in isolation and forgetting privacy budget composes over time.
  napkin_math: 4 queries/week x 4 weeks x 0.2 = 3.2 epsilon.
