title: torch.compile Warm-Up vs Steady-State
scenario: torch.compile traces and compiles a model graph in 45 seconds but reduces per-step time from
  120 ms to 85 ms. For a training run of 10,000 steps, estimate the break-even point and total time savings.
details:
  realistic_solution: 'Savings per step = 120 - 85 = 35 ms. Break-even steps = 45,000 ms / 35 ms = 1,286
    steps. After 1,286 steps, compilation has paid for itself. For 10,000 steps: uncompiled = 10,000 ×
    120 ms = 1,200 s. Compiled = 45 + 10,000 × 85 ms = 45 + 850 = 895 s. Net savings = 305 s (25.4%).
    For a 100-step debug run: uncompiled = 12 s, compiled = 45 + 8.5 = 53.5 s — 4.5× slower. Rule of thumb:
    compile for production training, not for debugging.'
  common_mistake: Not accounting for compilation overhead. Short runs or debugging sessions may be slower
    with torch.compile.
  napkin_math: 'Save 35 ms/step. Break-even: 45s / 0.035s = 1,286 steps. For 10K steps: save 305s (25%).
    For 100 steps: 4.5× slower (compilation dominates).'
