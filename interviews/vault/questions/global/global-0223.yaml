title: torch.compile Warm-Up vs Steady-State
scenario: torch.compile traces and compiles a model graph in 45 seconds but reduces per-step time from 120 ms to 85 ms.
question: "For a 10,000-step run, when does torch.compile break even and how much total time does it save?"
details:
  realistic_solution: 'Savings per step = 120 - 85 = 35 ms. Break-even steps = 45,000 ms / 35 ms = 1,286 steps. After 1,286 steps, compilation has paid for itself. For 10,000 steps: uncompiled = 10,000 × 120 ms = 1,200 s. Compiled = 45 + 10,000 × 85 ms = 45 + 850 = 895 s. Net savings = 305 s (25.4%). For a 100-step debug run: uncompiled = 12 s, compiled = 45 + 8.5 = 53.5 s — 4.5× slower. Rule of thumb: compile for production training, not for debugging.'
  common_mistake: |
    **The Pitfall:** Failing to account for compilation overhead for short runs.
    **The Rationale:** `torch.compile` is marketed as a universal speedup.
    **The Consequence:** Debugging sessions or short fine-tunes run significantly slower than in eager mode.
  napkin_math: |
    - Savings per step = 120ms - 85ms = 35ms.
    - Break-even = 45,000ms / 35ms = 1,286 steps.
    - For 10,000 steps: Net savings = 305 seconds (25.4%).
    - For 100 steps: Uncompiled = 12s, Compiled = 53.5s.
    - **Compilation dominates short runs, making 100 steps 4.5x slower.**
