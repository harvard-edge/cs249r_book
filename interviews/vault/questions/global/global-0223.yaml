title: torch.compile Warm-Up vs Steady-State
scenario: torch.compile traces and compiles a model graph in 45 seconds but reduces per-step time from 120 ms to 85 ms.
question: For a 10,000-step run, when does torch.compile break even and how much total time does it save?
details:
  realistic_solution: Savings per step is 35 ms. It takes 1,286 steps to break even. For 10,000 steps, net savings is 305 seconds. For a short 100-step run, compilation dominates and makes it 4.5x slower.
  common_mistake: |
    **The Pitfall:** Failing to account for compilation overhead for short diagnostic runs.
    **The Rationale:** `torch.compile` is aggressively marketed as a universal speedup command.
    **The Consequence:** Debugging sessions or short fine-tunes run significantly slower than in eager mode, frustrating engineers.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Compilation overhead (JIT): 45 seconds (45,000 ms).
       - Eager per-step time: 120 ms.
       - Compiled per-step time: 85 ms.
    2. **Calculations:**
       - Savings per step = 120 ms - 85 ms = 35 ms.
       - Break-even steps = 45,000 ms / 35 ms = 1,286 steps.
       - 10,000 steps Savings = (10,000 * 35 ms) - 45,000 ms = 305,000 ms (305 seconds).
       - 100 steps Compiled Time = 45s + (100 * 0.085s) = 53.5s (vs 12s Eager).
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound.** Compilation provides a net 305s gain over 10,000 steps, but heavily penalizes short runs (< 1,286 steps), demonstrating it belongs in production loops.
