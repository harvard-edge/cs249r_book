title: The Gradient Compression Dividend
scenario: Your cross-DC AllReduce for a 10B parameter model takes 3.2 seconds over a 100 Gbps link (40
  GB of FP32 gradients). You apply Top-K gradient sparsification that transmits only the top 1% of gradient
  values (plus their indices, encoded as 4-byte ints). Calculate the new AllReduce time and the effective
  compression ratio.
details:
  realistic_solution: 'Original: 10B params × 4B = 40 GB. With Top-1% sparsification: selected elements
    = 10B × 0.01 = 100M elements. Each element needs: 4B (FP32 value) + 4B (int32 index) = 8B. Compressed
    size: 100M × 8B = 800 MB. Compression ratio: 40 GB / 0.8 GB = 50×. New transfer time: 0.8 GB / 12.5
    GB/s = 64ms. Plus latency: 120ms. Total: ~184ms vs original 3.3s — an 18× speedup. However, Top-K
    sparsification introduces approximation error that may require more training steps to converge.'
  common_mistake: Forgetting that sparse gradients require transmitting both values AND indices. The index
    overhead means 1% sparsity does not yield 100× compression — it yields ~50× because each selected
    element needs 8 bytes (4B value + 4B index) instead of 4B.
  napkin_math: 'Original: 40 GB / 12.5 GB/s = 3.2s + 0.12s latency = 3.32s. Compressed: 100M elements
    × 8B = 800 MB. Transfer: 800 MB / 12,500 MB/s = 64ms. Total: 64ms + 120ms = 184ms. Speedup: 3,320ms
    / 184ms = 18×. Compression ratio: 40,000 MB / 800 MB = 50×. Note: 50× not 100× because of index overhead.'
