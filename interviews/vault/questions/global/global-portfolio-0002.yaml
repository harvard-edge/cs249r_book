title: Realize Extreme Quantization Tradeoffs
scenario: A product manager wants to advertise one 2-bit model for cloud, mobile, edge, and TinyML deployments. Early tests show good memory savings but unstable accuracy on long-tail inputs.
question: What system-level issues must be resolved before making a global 2-bit model claim?
details:
  realistic_solution: Treat the 2-bit model as a deployment tier, not a universal replacement. Check calibration data, outlier handling, per-target kernel support, fallback cost, acceptance tests by workload, and whether higher precision is needed for cloud or safety-critical paths. The release claim should describe where 2-bit is acceptable and where INT8, INT4, or BF16 remains required.
  common_mistake: Reporting only memory reduction and ignoring kernel availability, accuracy tails, and target-specific fallback.
  napkin_math: An 8B parameter model is about 16 GB in FP16 and about 2 GB at 2 bits before metadata, but that 8x storage win is not useful if unsupported ops fall back and miss latency targets.
