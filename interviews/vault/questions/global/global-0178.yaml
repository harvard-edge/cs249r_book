title: The Gradient Staleness Problem
scenario: In asynchronous distributed training across two datacenters with 60ms RTT, Worker B applies
  a gradient update that was computed 3 steps ago (before Workers A and C had pushed their updates). What
  is this phenomenon called, and why is it harmful?
details:
  realistic_solution: 'This is ''gradient staleness'' — a gradient computed at step t being applied at
    step t+k (here k=3). The gradient points in the direction that was correct 3 steps ago, but the model
    has since moved. The harm scales with staleness: (1) Mild staleness (k=1-2): slightly slower convergence,
    usually tolerable. (2) Moderate staleness (k=3-10): requires learning rate reduction proportional
    to staleness, slowing training. (3) Severe staleness (k>10): can cause training divergence. Mitigation
    strategies include staleness-weighted updates, bounded staleness protocols (wait if staleness > threshold),
    or switching to synchronous training with gradient compression.'
  common_mistake: Thinking asynchronous training is always better because it avoids synchronization barriers.
    Gradient staleness means workers optimize against an outdated model, which can cause training divergence
    or significantly slower convergence.
  napkin_math: 'Cross-DC RTT: 60ms. Training step duration: 20ms. In 60ms (1 RTT), the local worker completes
    3 steps. So any gradient sent from the remote DC arrives with staleness k=3. Effective learning rate
    reduction needed: ~1/(1+k) = 1/4 = 25% of original LR, slowing convergence by ~4×.'
