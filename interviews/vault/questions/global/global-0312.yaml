title: Global New 0013
scenario: In a multi-node A100 cluster, gradients must be synchronized across nodes using a ring all-reduce algorithm over IB NDR.
question: How long should a ring all-reduce take to synchronize a 2GB gradient tensor across exactly two A100 nodes over IB NDR?
details:
  realistic_solution: In a standard Ring All-Reduce, each node sends and receives a total data volume equal to 2 * (N-1)/N * Tensor Size. For exactly 2 nodes, this formula simplifies. Divide the resulting data volume by the InfiniBand NDR bandwidth to determine the total synchronization time.
  common_mistake: |
    **The Pitfall:** Neglecting the All-Reduce data volume formula and just assuming 1x tensor size, or confusing the 50GB/s IB speed with the 600GB/s NVLink speed.
    **The Rationale:** Forgetting that Ring All-Reduce scales data transferred by roughly 2x, and mixing up interconnect bandwidths.
    **The Consequence:** Miscalculating the synchronization overhead, leading to inaccurate pipeline scaling expectations.
  napkin_math: |
    - **Ring All-Reduce Volume Formula:** 2 × (N-1)/N × Tensor Size
    - **Volume for N=2:** 2 × (2-1)/2 × 2 GB = **2 GB** total transferred per node.
    - **IB NDR Bandwidth:** 400 Gbps = **50 GB/s**
    - **Transfer Time:** 2 GB / 50 GB/s = 0.04 seconds = **40 ms**
