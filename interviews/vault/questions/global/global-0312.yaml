title: Global New 0013
scenario: In a multi-node A100 cluster, gradients must be synchronized across nodes. Using a ring all-reduce
  algorithm over IB NDR, calculate the theoretical time to synchronize a 2GB gradient tensor between exactly
  2 nodes.
question: "How long should a ring all-reduce take to synchronize a 2GB gradient tensor across exactly two A100 nodes over IB NDR?"
details:
  realistic_solution: In a standard Ring All-Reduce, each node sends and receives a total data volume
    equal to 2 * (N-1)/N * Tensor Size. For exactly 2 nodes, this formula simplifies. Divide the resulting
    data volume by the InfiniBand NDR bandwidth to determine the total synchronization time.
  common_mistake: Neglecting the All-Reduce data volume formula and just assuming 1x tensor size, or confusing
    the 50GB/s IB speed with the 600GB/s NVLink speed.
  napkin_math: Ring All-Reduce volume = 2 * (2-1)/2 * 2GB = 2 * 0.5 * 2GB = 2GB total transferred per
    node. Time = 2GB / 50GB/s (IB NDR) = 0.04 seconds (40 ms).
