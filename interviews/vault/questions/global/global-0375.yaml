title: Cross-Regime Compute Cost Spec
scenario: A team wants a cost model for running the same feature in cloud, mobile, and edge modes. They provide only model operations per inference.
question: What inputs are required to estimate cost per successful interaction across cloud, mobile, and edge inference when retries can fail?
details:
  realistic_solution: The spec needs request rate, sustained throughput, utilization, hardware amortization or cloud price, energy cost, network cost, failure/retry rate, and quality differences. Model operations are only the demand side; cost per successful interaction also depends on supply, overhead, and success rate.
  common_mistake: |
    **The Pitfall:** Computing FLOPs per request and calling it the true cost.
    **The Rationale:** FLOPs are deterministic and easy to calculate, feeling like a rigorous metric.
    **The Consequence:** Drastically underestimating edge/mobile costs by ignoring network retries, hardware amortization, and energy consumption.
  napkin_math: |
    * Cost per interaction = (Total Hourly Cost) / (Successful Interactions per Hour).
    * If retries reduce the final success rate by 5%, the cost per success rises.
    * New cost multiplier: 1 / 0.95 = 1.053x.
    * **Ignoring failure rates artificially deflates the true operational cost by >5%.**
