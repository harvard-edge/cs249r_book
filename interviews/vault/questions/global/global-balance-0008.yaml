title: Cold Start Optimization
scenario: A model server cold-starts in 90 seconds because it downloads 18 GB of weights from object storage at 200 MB/s effective throughput. Propose the first optimization and quantify the best possible download time at 1 GB/s.
question: What cold-start improvement is possible if model-weight download throughput rises from 200 MB/s to 1 GB/s for an 18 GB model?
details:
  realistic_solution: At 200 MB/s, downloading 18 GB takes about 90 seconds. At 1 GB/s, it takes about 18 seconds. The first optimization is model image/cache locality or pre-warming; other startup work may still remain.
  common_mistake: Optimizing application code before noticing that weight download dominates cold start.
  napkin_math: 18 GB / 0.2 GB/s = 90 s. 18 GB / 1 GB/s = 18 s.
