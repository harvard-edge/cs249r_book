title: The 3x Rule of Backpropagation
scenario: A colleague claims that the backward pass of a neural network takes roughly 2x the FLOPs of
  the forward pass, making total training compute per sample approximately 3x the forward pass cost. Explain
  why this is the case for a stack of linear layers.
question: "Why does the backward pass of linear layers cost about 2x the forward pass, making training about 3x forward compute?"
details:
  realistic_solution: For a linear layer Y = XW, the forward pass is one matmul (2*B*M*N FLOPs). The backward
    pass computes dX = dY * W^T (one matmul, same size) and dW = X^T * dY (another matmul, same size).
    So backward = 2x forward FLOPs. Total per training step = 3x forward. For a model doing 10 TFLOPS
    per forward pass, expect ~30 TFLOPS per training iteration.
  common_mistake: Thinking backward is the same cost as forward. Each linear layer's backward pass requires
    two matrix multiplies (gradient w.r.t. input and gradient w.r.t. weights), while forward requires
    only one.
  napkin_math: 'Forward: 1 matmul per layer = F FLOPs. Backward: 2 matmuls per layer = 2F FLOPs. Total
    = F + 2F = 3F. 70B model forward ~140 TFLOPS => training step ~420 TFLOPS.'
