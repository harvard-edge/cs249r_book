title: The 3x Rule of Backpropagation
scenario: A colleague claims that the backward pass of a neural network takes roughly 2x the FLOPs of the forward pass, making total training compute per sample approximately 3x the forward pass cost.
question: Why does the backward pass of linear layers cost about 2x the forward pass, making training about 3x forward compute?
details:
  realistic_solution: For a linear layer Y = XW, the forward pass is one matmul (2*B*M*N FLOPs). The backward pass computes dX = dY * W^T (one matmul, same size) and dW = X^T * dY (another matmul, same size). So backward = 2x forward FLOPs. Total per training step = 3x forward. For a model doing 10 TFLOPS per forward pass, expect ~30 TFLOPS per training iteration.
  common_mistake: |
    **The Pitfall:** Believing the backward pass is the same cost as the forward pass.
    **The Rationale:** Assuming backpropagation is just "running the network in reverse" without realizing it computes gradients for both inputs and weights.
    **The Consequence:** Underestimating the total training compute cost by 33%.
  napkin_math: |
    - Forward pass (Y = XW): 1 matrix multiplication = $F$ FLOPs.
    - Backward pass (dX = dY * W^T): 1 matrix multiplication = $F$ FLOPs.
    - Backward pass (dW = X^T * dY): 1 matrix multiplication = $F$ FLOPs.
    - Total per step: $F$ (forward) + $2F$ (backward) = **$3F$ FLOPs**.
