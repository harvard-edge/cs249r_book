title: Portable Runtime Design
scenario: A model must run on cloud GPUs, mobile NPUs, and edge accelerators. Some operators are unsupported on mobile and edge. Design a portability strategy that avoids silent CPU fallback.
question: How would you design a portable runtime strategy that avoids silent CPU fallback across cloud, mobile, and edge accelerators?
details:
  realistic_solution: Use an operator compatibility matrix, compile-time checks per target, fallback budgets, per-target golden tests, and telemetry for delegated versus CPU ops. The model graph should be constrained to the supported operator intersection or partitioned explicitly, not left to silent runtime fallback.
  common_mistake: Assuming an exported model that runs on one backend will efficiently run on all backends.
  napkin_math: If 5% of operators fall back to CPU but they are on the critical path, they can dominate latency despite being a small fraction of the graph.
