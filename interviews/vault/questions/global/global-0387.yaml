title: Cross-Regime State Recovery Spec
scenario: A platform needs recovery policies for cloud training state, mobile personalization
  adapters, and TinyML calibration parameters. Specify the state inventory required
  before choosing checkpoint intervals or rollback mechanisms.
question: What state inventory is needed before choosing checkpoint and rollback policies
  across cloud, mobile, and TinyML systems?
details:
  realistic_solution: The inventory should list state size, update frequency, criticality,
    write cost, storage endurance, RPO, RTO, version compatibility, and safe defaults.
    Cloud training may checkpoint optimizer state, mobile may persist adapters, and
    TinyML may store calibration constants only.
  common_mistake: Using one checkpoint interval for every regime without knowing state
    size, write cost, or acceptable loss.
  napkin_math: A 2 TB training checkpoint and a 64 KB calibration blob differ by roughly
    3 x 10^7, so they need different policies.
