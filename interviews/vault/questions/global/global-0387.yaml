title: Cross-Regime State Recovery Spec
scenario: A platform needs recovery policies for cloud training state, mobile personalization adapters, and TinyML calibration parameters.
question: What state inventory is needed before choosing checkpoint and rollback policies across cloud, mobile, and TinyML systems?
details:
  realistic_solution: The inventory should list state size, update frequency, criticality, write cost, storage endurance, RPO, RTO, version compatibility, and safe defaults. Cloud training may checkpoint optimizer state, mobile may persist adapters, and TinyML may store calibration constants only.
  common_mistake: |
    **The Pitfall:** Using a uniform checkpoint interval across all regimes without profiling state size or write costs.
    **The Rationale:** Assuming fault tolerance strategies are universally applicable regardless of the physical storage medium.
    **The Consequence:** Destroying flash endurance on TinyML devices or stalling cloud training with excessive synchronous I/O.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Cloud training checkpoint: 2 TB.
       - TinyML calibration blob: 64 KB.
    2. **Calculations:**
       - Magnitude difference: 2 TB / 64 KB = (2 * 10^12) / (64 * 10^3) ≈ 3.1 * 10^7.
    3. **Conclusion & Interpretation:**
       - **Result: 30,000,000x size difference. I/O-Bandwidth-Bound requires regime-specific policies.**
