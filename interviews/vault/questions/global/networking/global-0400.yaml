title: Congestion Control SLO Spec
scenario: A serving platform has cloud, edge, and mobile clients sharing an inference API with distinct retry behaviors.
question: What client and server controls are needed so retries from cloud, edge, and mobile clients do not amplify inference congestion?
details:
  realistic_solution: 'Enforce robust server-side admission control coupled with mandatory client jitter. Mandate exponential backoff, retry-after headers, and strict retry budgets. Without idempotency keys and QoS classes, synchronous thundering herds will perpetually DDoS the GPU inference cluster.'
  common_mistake: |
    **The Pitfall:** Adding aggressive retries to all clients to improve perceived reliability.
    **The Rationale:** Retries are a standard mechanism for masking transient network failures.
    **The Consequence:** Accidentally orchestrating a massive, synchronized DDoS attack against your own shared inference service during minor latency hiccups.
  napkin_math: |
    **Assumptions & Constraints:**
    - 100,000 active clients
    - 2 retries within 10s

    **Calculations:**
    - Retry wave: 100,000 * 2 = 200,000 requests
    - Additional load: 200,000 / 10s = 20,000 RPS

    **Conclusion & Interpretation:**
    - **Result: Thundering-Herd Bound (20k extra RPS)**. Aggressive retries amplify inference congestion, acting as a synchronized DDoS attack.
