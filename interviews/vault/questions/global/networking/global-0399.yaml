title: Inference Congestion Admission Budget
scenario: 'A multi-region inference service sends requests over a network path with 20,000 requests/s safe capacity. Traffic bursts to 28,000 requests/s for 3 minutes. Each request is 200 KB including prompt and metadata.'
question: 'How much excess traffic must be controlled when a 20,000 rps path receives 28,000 rps of 200 KB requests for 3 minutes, and how should it be managed?'
details:
  realistic_solution: 'The path is oversubscribed by 8,000 requests/s. At 200 KB each, excess offered load is 1.6 GB/s. Over 3 minutes that is 288 GB of excess traffic. The system should shed, queue with deadlines, or reroute low-priority traffic before congestion inflates P99 for all users.'
  common_mistake: |
    **The Pitfall:** Letting all traffic queue because average service will recover after the burst.
    **The Rationale:** Candidates assume short-term buffering is harmless, ignoring how queuing delay compounds.
    **The Consequence:** Tail-latency collapse during congestion, causing timeouts and effectively dropping requests anyway.
  napkin_math: |
    **Assumptions & Constraints:**
    - Path capacity = 20,000 rps. Burst = 28,000 rps.
    - Payload = 200 KB/request. Duration = 180 seconds.

    **Calculations:**
    - Excess rate = 28,000 - 20,000 = 8,000 rps.
    - Excess bandwidth = 8,000 * 200 KB = 1.6 GB/s.
    - Total excess traffic = 1.6 GB/s * 180 s = 288 GB.

    **Conclusion & Interpretation:**
    - **Result: 288 GB Oversubscription (Network-Bound)**. Active load shedding or rerouting is mandatory to prevent buffer bloat.
