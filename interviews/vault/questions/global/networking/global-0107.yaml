title: RecSys Network Bottlenecks
scenario: A Deep Learning Recommendation Model (DLRM) uses a 200GB embedding table sharded across 8 GPUs (25GB per GPU) via model parallelism. At 10,000 QPS, the P99 latency is 60ms (budget is 30ms). Profiling reveals that the compute time is only 5ms; the bottleneck is the All-to-All network communication transferring gathered FP32 embedding vectors across the PCIe/NVLink bus.
question: How would you fix the DLRM All-to-All bottleneck and meet the 30ms P99 latency budget without hurting accuracy?
details:
  realistic_solution: Architect a solution applying Row-wise PTQ or QAT to the embedding tables, compressing them from FP32 to INT8 or INT4. In DLRM model parallelism, GPUs look up embeddings locally and then must exchange them (All-to-All) to assemble the full feature vector before the top MLP. By storing and transmitting the embeddings in INT8, you immediately reduce the network payload by 4x. The vectors are only dequantized to FP16/FP32 immediately before the top MLP compute phase. Row-wise quantization (calculating scale/zero-point per embedding vector) is critical here because embedding vectors have highly independent distributions; per-tensor quantization would destroy recommendation accuracy.
  common_mistake: |
    **The Pitfall:** Attempting to quantize the MLP weights to solve the latency bottleneck.
    **The Rationale:** MLPs are the typical target for quantization in language models.
    **The Consequence:** It does nothing to solve the All-to-All network bandwidth bottleneck caused by massive embedding vector transfers, leaving latency unchanged.
  napkin_math: |
    **Assumptions & Constraints:**
    - Payload per request = 200 features × 128 dim × 4 bytes (FP32) = 102.4 KB.

    **Calculations:**
    - All-to-All transfer: each GPU sends 7/8 of its embeddings = ~89.6 KB per request.
    - INT8 compression reduces payload to 200 × 128 × 1 = 25.6 KB.

    **Conclusion & Interpretation:**
    - **Result: 16ms (Communication-Bound)**. Smaller messages reduce bus contention, dropping communication latency to ~11ms. Total time: 5ms compute + 11ms comm = 16ms (< 30ms budget).
