title: PCIe ACS Blocking GPUDirect Peer-to-Peer DMA
scenario: During single-node testing of an 8-GPU, 4-NIC system connected via PCIe switches, GPUDirect RDMA latency is unusually high. Expected NIC-to-GPU latency is 2\u03bcs, but measured latency is 12\u03bcs. Throughput tops out at 30GB/s instead of 64GB/s. The topology shows GPUs and NICs share the same PCIe switch.
question: Why is GPUDirect RDMA 12 \u03bcs and 30 GB/s even though the GPU and NIC share the same PCIe switch?
details:
  realistic_solution: 'The root cause is that PCIe Access Control Services (ACS) is enabled in the BIOS/OS. ACS is a security feature designed to prevent direct Peer-to-Peer (P2P) DMA between PCIe devices, forcing all traffic to be routed up to the CPU Root Complex for IOMMU translation and permission checking. Instead of the NIC writing directly to the GPU memory via the PCIe switch (GPUDirect), the traffic bounces to the CPU, into system RAM, and then down to the GPU. This CPU bounce adds significant latency and bottlenecks throughput to the system memory''s available bandwidth. The fix is to disable PCIe ACS for the PCIe switches connecting the GPUs and NICs.'
  common_mistake: |
    **The Pitfall:** Assuming the PCIe switch is physically defective or that the RDMA queue depths are configured too shallow.
    **The Rationale:** Without understanding PCIe security mechanisms like ACS, hardware bottlenecks are often blamed on abstract networking configurations.
    **The Consequence:** Endless tuning of NIC settings while the fundamental issue is a basic BIOS/OS configuration actively blocking P2P traffic.
  napkin_math: |
    **Assumptions & Constraints:**
    - Direct P2P DMA across PCIe switch = ~1.5 \u03bcs.
    - Base PCIe Gen5 x16 bandwidth = 64 GB/s.
    - Contended host memory bandwidth = ~30 GB/s.

    **Calculations:**
    - If ACS is enabled, traffic bounces to CPU: PCIe switch to CPU = 1.5 \u03bcs + IOMMU/Memory controller processing = ~2.0 \u03bcs + CPU to PCIe switch = 1.5 \u03bcs + Switch to GPU = 1.5 \u03bcs.
    - Base latency = ~6.5 \u03bcs. Software fallback staging through host memory doubles this to ~12 \u03bcs.

    **Conclusion & Interpretation:**
    - **Result: 30 GB/s (Bandwidth-Bound)**. Bandwidth drops from PCIe Gen5 x16 (64 GB/s) to contended host memory bandwidth (~30 GB/s) due to ACS blocking P2P DMA.
