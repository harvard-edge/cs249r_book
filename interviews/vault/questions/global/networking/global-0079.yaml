title: GPUDirect RDMA NUMA Crossing Bottleneck
scenario: A node features dual AMD EPYC CPUs, 8 GPUs, and 4x 400G ConnectX-7 NICs. Intra-node GPU bandwidth via NVLink is 900GB/s. However, inter-node NCCL AllReduce throughput is only reaching 120GB/s total across all 4 NICs, instead of the theoretical 200GB/s (4x 50GB/s). GPU profiling shows high kernel execution wait times during RDMA transfers.
question: What is capping inter-node AllReduce at 120 GB/s on the 8-GPU, 4-NIC dual-socket node?
details:
  realistic_solution: The root cause is a PCIe topology and NUMA affinity mismatch. GPUDirect RDMA allows NICs to read/write directly to GPU memory over PCIe. If a GPU on CPU Socket 0 tries to communicate via a NIC attached to CPU Socket 1, the PCIe traffic must cross the inter-socket interconnect (xGMI/Infinity Fabric). This cross-socket link has significantly lower bandwidth than PCIe Gen5 x16 and introduces contention with CPU memory access. The fix is to ensure the job scheduler and NCCL topology XML correctly pin GPU-NIC pairs that share the same PCIe root complex (same NUMA node).
  common_mistake: |
    **The Pitfall:** Blaming the optical transceivers, network switch congestion, or NCCL algorithm selection.
    **The Rationale:** Network limits are usually assumed to be off-node.
    **The Consequence:** Endless network troubleshooting while missing the internal PCIe topology bottleneck.
  napkin_math: |
    **Assumptions & Constraints:**
    - 4x 400G NICs = 200GB/s theoretical max.
    - AMD EPYC inter-socket xGMI link bandwidth ≈ 64GB/s to 120GB/s.

    **Calculations:**
    - RDMA traffic crossing NUMA boundaries is limited by the inter-socket link.

    **Conclusion & Interpretation:**
    - **Result: ~120GB/s (NUMA-Bound)**. If GPUs on NUMA 0 route RDMA traffic to NICs on NUMA 1, the xGMI bottleneck caps the node's entire outbound throughput at ~120GB/s.
