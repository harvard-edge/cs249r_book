title: 3D Torus Deadlock and Credit Starvation
scenario: A custom ASIC cluster uses a 3D Torus topology (8x8x8). During a massive 3D parallel training run, the entire cluster's network throughput suddenly drops to 0 GB/s. A specific link flapping event occurred 5 seconds prior. No hardware has failed permanently.
question: What caused the 3D Torus network to freeze at 0 GB/s after a transient link flap?
details:
  realistic_solution: The root cause is a routing deadlock due to credit starvation. When the link flapped, the fabric manager recalculated paths, temporarily breaking dimension-order rules. Packets formed a cyclic dependency circle (A waits for B, B for C, C for A) leading to 0 GB/s throughput.
  common_mistake: |
    **The Pitfall:** Assuming a hardware failure severed the network partition or that standard TCP timeouts will recover packets.
    **The Rationale:** Most engineers are used to lossy Ethernet networks, not lossless credit-based fabrics.
    **The Consequence:** The system remains deadlocked indefinitely, requiring a hard reset instead of programmatic fabric reconfiguration.
  napkin_math: |
    **Assumptions & Constraints:**
    - 8x8x8 Torus topology.
    - Link flap triggered routing recalculation.

    **Calculations:**
    - Max hops = 4+4+4 = 12.
    - Link credit buffers hold ~10 packets.
    - Cyclic dependency forms -> returned credits = 0.

    **Conclusion & Interpretation:**
    - **Result: Network-Bound (Deadlock).** Packets waiting on cyclic buffer credits freeze the topology completely at 0 GB/s.
