title: Ring AllReduce Communication Time
scenario: You are training with data parallelism across 8 A100 GPUs. The gradient buffer is 2 GB.
question: "How long should the 2 GB gradient ring AllReduce take across 8 A100s over NVLink?"
details:
  realistic_solution: 'Ring AllReduce transfers 2 × (N-1)/N × data_size across the ring. With N=8: 2 × 7/8 × 2 GB = 3.5 GB total data moved. Each GPU sends/receives on one link at a time. Effective bandwidth per direction ≈ 300 GB/s (half of bidirectional 600 GB/s). Time = 3.5 GB / 300 GB/s ≈ 11.7 ms. In practice, overhead from chunking and synchronization adds ~20%, so expect ~14 ms.'
  common_mistake: |
    **The Pitfall:** Using total bidirectional bandwidth instead of per-link, or forgetting the 2*(N-1)/N factor.
    **The Rationale:** Misunderstanding the sequential flow of Ring AllReduce across network topologies.
    **The Consequence:** Wildly inaccurate predictions of communication bottlenecks when sizing models or clusters.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 8 A100 GPUs, NVLink bidirectional bandwidth: 600 GB/s.
       - Gradient buffer: 2 GB.
       - Ring AllReduce topology.
    2. **Calculations:**
       - Ring AllReduce Transfer Formula: 2 * (N-1)/N * data_size.
       - Data Moved: 2 * (7/8) * 2 GB = 3.5 GB total.
       - Effective NVLink Bandwidth: 300 GB/s per direction.
       - Raw Transfer Time: 3.5 GB / 300 GB/s = ~11.7 ms.
       - Synchronization Overhead: ~20%.
    3. **Conclusion & Interpretation:**
       - **Adding ~20% overhead for synchronization, the operation takes ~14 ms.**
       - **Result: Network-Bandwidth Bound**
