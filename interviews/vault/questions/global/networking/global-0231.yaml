title: ECMP Hash Collision Causing Training Slowdown
scenario: In a 64-node training cluster with a fat-tree network, 4 specific node pairs consistently show 3x higher AllReduce latency than others. All links are healthy. The pattern is deterministic - the same pairs are always slow. Network utilization averages 45% but some links show 95%.
question: What explains deterministic AllReduce slowdowns for the same node pairs when average network use is low but some links are saturated?
details:
  realistic_solution: 'This is an ECMP hash collision. ECMP (Equal-Cost Multi-Path) routing uses a hash of the flow 5-tuple to select among equal-cost paths. If multiple heavy flows hash to the same path, that link becomes a hotspot while parallel links sit idle. Fixes: (1) Use adaptive routing (e.g., InfiniBand AR). (2) Flowlet switching. (3) Add entropy to flow headers. (4) Topology-aware job placement.'
  common_mistake: |
    **The Pitfall:** Blaming faulty hardware or degrading optics since specific node pairs are consistently slow.
    **The Rationale:** Intermittent or isolated slowness often correlates with physical link degradation (e.g., CRC errors).
    **The Consequence:** Wasting hours swapping perfectly healthy cables and transceivers without resolving the deterministic routing bottleneck.
  napkin_math: |
    **Assumptions & Constraints:**
    - 8 equal-cost paths.
    - 16 heavy flows.
    
    **Calculations:**
    - Probability of 2 specific flows hashing to the same path is 1/8.
    - Expected collisions ~ 16^2 / (2 x 8) = 16.
    
    **Conclusion & Interpretation:**
    - **Result: 16 Collisions (Routing-Bound)**. The birthday paradox makes hash collisions and network hotspots statistically inevitable at scale.
