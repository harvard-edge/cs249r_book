title: Root-Causing AllToAll Tail Latency
scenario: Serving an MoE model on 64 GPUs across a RoCEv2 switch. AllToAll takes 15-20 ms instead of ~1 ms. Switch telemetry shows massive Priority Flow Control (PFC) spikes.
question: What is causing the 15-20 ms AllToAll tail latencies, and how would you mitigate it?
details:
  realistic_solution: 'Network incast microbursts. In a flat AllToAll, 63 nodes simultaneously blast data to a single target port, instantly overwhelming switch buffers and triggering PFC pauses. Mitigate via hierarchical AllToAll (NCCL topology awareness) or strict software-level pacing algorithms to stagger arrivals.'
  common_mistake: |
    **The Pitfall:** Assuming the application is compute-bound and attempting to overlap communication with computation.
    **The Rationale:** Communication/computation overlap is a standard optimization technique in distributed ML.
    **The Consequence:** Overlapping does not fix the physical network incast microburst; the switch continues to drop packets, and the 15-20 ms tail latency persists.
  napkin_math: |
    **Assumptions & Constraints:**
    - 64 GPUs, 32 MB total payload per GPU
    - RoCEv2 non-blocking switch (50 GB/s port)

    **Calculations:**
    - Payload per destination: 32 MB / 64 = 0.5 MB
    - Incast burst: 63 senders * 0.5 MB = 31.5 MB instant arrival
    - Port buffer overflow: 31.5 MB - 16 MB buffer = 15.5 MB dropped

    **Conclusion & Interpretation:**
    - **Result: Network-Buffer Bound (Incast)**. Incast microbursts overwhelm switch buffers and trigger PFC pauses.
