title: Serving Stack By Regime
scenario: A company wants one serving architecture for a recommendation model across
  cloud API, mobile offline mode, and in-store edge kiosk. Cloud has autoscaling GPUs,
  mobile has intermittent connectivity, and edge has predictable local traffic but
  limited ops staffing. Design a serving stack that shares abstractions while respecting
  each regime.
question: How would you design one serving architecture for cloud GPUs, mobile offline
  mode, and an in-store edge kiosk without hiding regime-specific constraints?
details:
  realistic_solution: Use a shared model packaging and telemetry contract, but separate
    runtime policies. Cloud gets autoscaling, queueing, canary rollout, and centralized
    observability. Mobile gets an offline bundle, delta updates, local fallback, and
    privacy-preserving telemetry. Edge gets a small local serving process, health
    checks, remote rollback, and capacity sized to store traffic. The shared abstraction
    is model lifecycle, not identical infrastructure.
  common_mistake: Trying to run Kubernetes-style cloud serving on every device, or
    treating mobile as just a smaller cloud node.
  napkin_math: If the kiosk handles 20 requests/s with a 50 ms service time, one worker
    is at utilization 20 x 0.05 = 1.0, so at least two workers or a faster model are
    required for headroom.
