title: Serving Stack By Regime
scenario: A company wants one serving architecture for a recommendation model across cloud API, mobile offline mode, and in-store edge kiosk. Cloud has autoscaling GPUs, mobile has intermittent connectivity, and edge has predictable local traffic but limited ops staffing.
question: How would you design one serving architecture for cloud GPUs, mobile offline mode, and an in-store edge kiosk without hiding regime-specific constraints?
details:
  realistic_solution: Use a shared model packaging and telemetry contract, but separate runtime policies. Cloud gets autoscaling, queueing, canary rollout, and centralized observability. Mobile gets an offline bundle, delta updates, local fallback, and privacy-preserving telemetry. Edge gets a small local serving process, health checks, remote rollback, and capacity sized to store traffic. The shared abstraction is model lifecycle, not identical infrastructure.
  common_mistake: |
    **The Pitfall:** Trying to run Kubernetes-style cloud serving on every device, or treating mobile as just a smaller cloud node.
    **The Rationale:** Prioritizing "write once, run anywhere" infrastructure uniformity over the physical realities of the deployment targets.
    **The Consequence:** Creating bloated edge applications that fail offline or drain mobile batteries.
  napkin_math: |
    - **Kiosk Traffic:** 20 requests/second
    - **Service Time:** 50 ms (0.05 s) per request
    - **Worker Utilization:** 20 × 0.05 = **1.0 (100%)**
    - **Conclusion:** With utilization at exactly 1.0, any queueing jitter will cause latency spikes. At least two local workers are required for reliable headroom.
