title: Heterogeneous Routing Algorithm for LLM Multi-Region Deployment
scenario: An LLM routing gateway balances inference traffic across three regions with varied hardware.
question: Create a load-shedding and routing algorithm that minimizes p99 latency during unpredictable traffic surges without dropping requests.
details:
  realistic_solution: Create a customized Join-the-Shortest-Queue with Delay (JSQ-D) algorithm weighted by real-time hardware generation rates (tokens/sec). Rather than tracking raw connection counts, the router queries the KV-cache saturation and continuous-batching sizes from each endpoint. During surges, requests routed to A100s that exceed a queue-time threshold are transparently redirected to the MI300X cluster, leveraging its 192GB HBM3 to absorb massive concurrent batch expansions.
  common_mistake: |
    **The Pitfall:** Applying standard round-robin or least-connections load balancing.
    **The Rationale:** Candidates incorrectly assume homogeneous service times and ignore critical constraints like KV cache memory limits.
    **The Consequence:** Routing traffic to saturated nodes, leading to massive latency spikes and out-of-memory crashes.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Three regions with varied hardware generation rates.
    2. **Calculations:**
       - H100_weight = 989/312 = 3.17x A100.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound Routing**
