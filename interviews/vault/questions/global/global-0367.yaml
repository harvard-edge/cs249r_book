title: Profiling Spec For A Portable Model
scenario: You are writing a profiling specification for a model that must ship on
  cloud GPUs, Android NPUs, and Cortex-M microcontrollers. The team wants one pass/fail
  report. Specify the minimum metrics the report must include so each platform can
  expose its actual bottleneck.
question: What metrics must a cross-platform profiling report include for cloud GPUs,
  Android NPUs, and Cortex-M microcontrollers?
details:
  realistic_solution: The report needs common timing fields plus platform-specific
    resource fields. Common fields are end-to-end latency, queue/scheduling time,
    model execution time, memory footprint, and error rate. Cloud adds accelerator
    utilization, HBM bandwidth, and queue depth. Android adds thermal state, battery
    draw, delegated-op coverage, and shared-memory pressure. Cortex-M adds SRAM arena
    peak, flash reads, cycle count, and deadline misses.
  common_mistake: Specifying only average latency and model FLOPs, which hides queueing,
    thermal, and memory-spill bottlenecks.
  napkin_math: A useful report separates latency into components whose sum matches
    end-to-end time; otherwise a 100 ms regression cannot be attributed to queue,
    compute, transfer, or memory stalls.
