title: Portable Runtime Design
scenario: A model must run on cloud GPUs, mobile NPUs, and edge accelerators. Some operators are unsupported on mobile and edge.
question: How would you design a portable runtime strategy that avoids silent CPU fallback across cloud, mobile, and edge accelerators?
details:
  realistic_solution: 'Use an operator compatibility matrix, compile-time checks per target, fallback budgets, per-target golden tests, and telemetry for delegated versus CPU ops. The model graph should be constrained to the supported operator intersection or partitioned explicitly, not left to silent runtime fallback.'
  common_mistake: |
    **The Pitfall:** Assuming a model artifact is portable simply because the file format (like ONNX or TFLite) is widely supported.
    **The Rationale:** Candidates often confuse file format compatibility with actual operator, shape, and precision compatibility across heterogeneous hardware.
    **The Consequence:** Deploying a model that structurally loads but silently falls back to CPU due to unsupported ops, causing severe latency degradation.
  napkin_math: |
    **Assumptions & Constraints:**
    - 5% of operators fallback to CPU on edge devices.
    - CPU execution is orders of magnitude slower than NPU.

    **Calculations:**
    - If 5% ops fallback to CPU taking 30ms each, while 95% ops run on NPU taking 2ms total.
    - CPU fallback time completely dominates total inference latency.

    **Conclusion & Interpretation:**
    - **Result: 100% Passes Required (Hardware-Compatibility-Bound)**. 100% compilation check passes are required across targets, even if 99% of ops are fundamentally supported.
