title: Graceful Degradation Threshold
scenario: A service runs a 6B model at 120 ms. A 1B fallback runs at 35 ms with 4% lower quality. Overload adds 200 ms queueing to the 6B path.
question: When should a service switch from a 6B model to a 1B fallback if overload adds 200 ms of queueing to the 6B path?
details:
  realistic_solution: 'Perform dynamic load-shedding. When queue latency pushes the 6B P99 past the user SLA (320ms total), invoke the 35ms 1B fallback. A 4% quality degradation strongly outweighs massive abandonment rates driven by timeout horizons.'
  common_mistake: |
    **The Pitfall:** Keeping the best-quality model for every request even when queueing makes the experience unusable.
    **The Rationale:** Engineers often anchor on the baseline accuracy metric and ignore the end-to-end user latency experience.
    **The Consequence:** The service becomes practically unavailable due to extreme queueing delays, causing timeouts and high user abandonment.
  napkin_math: |
    **Assumptions & Constraints:**
    - 6B model: 120 ms + 200 ms queue = 320 ms
    - 1B fallback: 35 ms

    **Calculations:**
    - Latency delta = 320 ms - 35 ms = 285 ms

    **Conclusion & Interpretation:**
    - **Result: Queue-Bound (SLA Violation)**. Dynamic load-shedding to the 1B fallback is required to prevent massive abandonment.
