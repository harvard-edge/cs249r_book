title: Graceful Degradation Threshold
scenario: A service normally runs a 6B model at 120 ms. A 1B fallback runs at 35 ms with 4% lower quality. During overload, queueing adds 200 ms to the 6B path.
question: When should a service switch from a 6B model to a 1B fallback if overload adds 200 ms of queueing to the 6B path?
details:
  realistic_solution: Under overload, the 6B path becomes about 320 ms, while fallback is 35 ms. If the product values latency and availability over the 4% quality loss during overload, switch low-priority or latency-sensitive traffic to fallback until queues recover. In production, route by cohort and error budget rather than switching every request at once.
  common_mistake: |
    **The Pitfall:** Keeping the best-quality model for every request even when queueing makes the experience unusable.
    **The Rationale:** Engineers often anchor on the baseline accuracy metric and ignore the end-to-end user latency experience.
    **The Consequence:** The service becomes practically unavailable due to extreme queueing delays, causing timeouts and high user abandonment.
  napkin_math: |
    - Overloaded 6B latency = 120 ms + 200 ms = 320 ms.
    - Fallback latency = 35 ms.
    - Latency savings = 320 ms - 35 ms = 285 ms.
    - **Switch when saving 285 ms is worth a 4% quality loss for the product.**
