title: Roofline Model Interpretation
scenario: A specific transformer layer has an arithmetic intensity of 50 FLOPs/byte, and you are running it on an accelerator with a peak compute performance of 100 TFLOPS and a memory bandwidth of 1 TB/s.
question: Is this layer compute-bound or memory-bound?
details:
  realistic_solution: The hardware's ridge point is calculated as Peak Compute / Memory Bandwidth (100 TFLOPS / 1 TB/s = 100 FLOPs/byte). Since the layer's arithmetic intensity (50 FLOPs/byte) is lower than the hardware ridge point (100 FLOPs/byte), the layer is limited by memory bandwidth (memory-bound).
  common_mistake: |
    **The Pitfall:** Guessing based on absolute numbers, or not calculating the machine balance (ridge point) to compare against the layer's arithmetic intensity.
    **The Rationale:** Candidates often don't know how to relate model arithmetic intensity to specific hardware limits.
    **The Consequence:** Incorrectly diagnosing the performance bottleneck.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Peak Compute = 100 TFLOPS.
       - Memory Bandwidth = 1 TB/s.
       - Layer AI = 50 FLOPs/byte.
    2. **Calculations:**
       - Ridge point = 100 TFLOPS / 1 TB/s = 100 FLOPs/byte.
       - Layer AI (50) < Ridge point (100).
       - Achievable throughput = 50 * 1 TB/s = 50 TFLOPS.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound**
  options:
  - Compute-bound, because 50 TFLOPS is reached.
  - Memory-bound, because the layer's arithmetic intensity (50) is less than the hardware's ridge point (100 FLOPs/byte).
  - Compute-bound, because 100 TFLOPS is the absolute limiting factor for this layer.
  - Memory-bound, because the layer achieves 100 TFLOPS at 50 FLOPs/byte.
  correct_index: 1
