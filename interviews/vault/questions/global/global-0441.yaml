title: Data Pipeline Bottleneck Evaluation for 4K Image Training
scenario: A dataloader pulls 4K resolution JPEGs (5MB each) from S3 over a 10 Gbps network, resizes them to 224x224, and feeds an A100 that processes a batch of 128 images every 50 ms.
question: Evaluate whether the 10 Gbps network bandwidth can sustain the A100's processing throughput, quantifying the deficit if any.
details:
  realistic_solution: The A100 processes 128 images / 0.05s = 2560 images/second. Pulling the raw 4K JPEGs at 5MB each requires 2560 * 5 MB/s = 12.8 GB/s. Converting to bits, this is 12.8 * 8 = 102.4 Gbps. The 10 Gbps network only provides ~1.25 GB/s, meaning it can only feed ~250 images/second. The network evaluates as a severe 10x bottleneck, mandating pre-processing the dataset to 224x224 before S3 egress.
  common_mistake: |
    **The Pitfall:** Sizing the network bandwidth requirements using the final 224x224 tensor size rather than the raw 4K JPEG size pulled from S3.
    **The Rationale:** It is easy to forget that resizing happens on the compute node *after* the massive raw images have already saturated the network link.
    **The Consequence:** The A100 sits idle 90% of the time, destroying training cost-efficiency because it is starved for data.
  napkin_math: |
    - A100 throughput = 128 images / 0.05s = 2560 images/second.
    - Required bandwidth = 2560 images/sec * 5 MB/image = 12,800 MB/s = 12.8 GB/s.
    - Convert to bits = 12.8 GB/s * 8 bits/byte = 102.4 Gbps.
    - Available network bandwidth = 10 Gbps.
    - **The network is a ~10x bottleneck (102.4 Gbps required vs 10 Gbps available).**
