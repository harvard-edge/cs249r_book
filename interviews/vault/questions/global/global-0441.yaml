title: Data Pipeline Bottleneck Evaluation for 4K Image Training
scenario: A dataloader pulls 4K JPEGs (5MB each) from S3 over 10 Gbps, resizes to 224x224, and feeds an A100 processing 128 images every 50 ms.
question: Evaluate whether the 10 Gbps network bandwidth can sustain the A100's processing throughput, quantifying the deficit if any.
details:
  realistic_solution: "Identify the pre-fetch bottleneck. The A100 devours data at 12.8 GB/s (102.4 Gbps). The 10 Gbps link restricts delivery to ~250 images/sec, starving the compute core. Dataset preparation must decouple resize ops: transcode all assets to 224x224 TFRecords prior to S3 egress."
  common_mistake: |
    **The Pitfall:** Sizing the network bandwidth requirements using the final 224x224 tensor size rather than the raw 4K JPEG size pulled from S3.
    **The Rationale:** It is easy to forget that resizing happens on the compute node *after* the massive raw images have already saturated the network link.
    **The Consequence:** The A100 sits idle 90% of the time, destroying training cost-efficiency because it is starved for data.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - A100 capability: 128 imgs / 0.05s = 2560 imgs/sec
       - Raw Image: 5 MB
       - Link: 10 Gbps
    2. **Calculations:**
       - Req Bandwidth: 2560 * 5 MB = 12.8 GB/s = 102.4 Gbps
       - Deficit: 102.4 Gbps required vs 10 Gbps available (~10x gap)
    3. **Conclusion & Interpretation:**
       - **Result: Network-Bandwidth Bound (Data Starvation)**
