title: Governance Review Capacity
scenario: A governance team can review 12 high-risk model changes per week. A platform
  has 80 teams, and each team ships one high-risk change per quarter. Estimate weekly
  review demand and whether capacity is sufficient.
question: Can a governance team reviewing 12 changes/week handle 80 teams shipping
  one high-risk change per quarter?
details:
  realistic_solution: Quarterly demand is 80 reviews. Spread over 13 weeks, that is
    about 6.2 reviews/week. A 12-review/week team has enough average capacity, though
    launches may be bursty.
  common_mistake: Comparing quarterly demand to weekly capacity without normalizing
    time units.
  napkin_math: Using about 13 weeks per quarter, 80 / 13 = 6.15 reviews/week, below
    12/week.
