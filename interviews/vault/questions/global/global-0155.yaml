title: The I-Cache Thrash Loop
scenario: Running a heavily unrolled CMSIS-NN loop from external QSPI Flash (Execute-in-Place). The inference
  perfectly meets the 10ms deadline, but the system's battery life is halved compared to the non-unrolled
  version, despite taking the exact same execution time.
details:
  realistic_solution: The root cause is an Instruction Cache (I-Cache) locality failure. Loop unrolling
    increases the binary size of the function. The heavily unrolled kernel now exceeds the size of the
    Cortex-M7's L1 I-Cache (typically 16KB). As a result, the loop cannot execute entirely from the cache;
    the CPU must continuously fetch instructions from the external QSPI Flash. Driving the pins for the
    QSPI interface at high frequency consumes massive amounts of power compared to fetching instructions
    from internal SRAM or a hit in the I-Cache.
  common_mistake: Assuming the unrolled loop uses more CPU registers, thereby drawing more dynamic power
    from the ALU core.
  napkin_math: Cortex-M4 runs at 168MHz. A rolled loop footprint is ~1KB, fitting neatly in internal flash
    prefetch buffers. Unrolling expands the code to 30KB. Because it executes in place (XIP) from external
    QSPI, it causes constant cache/buffer misses. QSPI reads take ~4 cycles per word. The QSPI bus constantly
    toggles, draining power, doubling consumption despite equal CPU cycles.
