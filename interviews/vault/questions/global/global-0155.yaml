title: The I-Cache Thrash Loop
scenario: Running a heavily unrolled CMSIS-NN loop from external QSPI Flash (Execute-in-Place). The inference perfectly meets the 10ms deadline, but the system's battery life is halved compared to the non-unrolled version, despite taking the exact same execution time.
question: Why does the unrolled CMSIS-NN kernel halve battery life even though it still meets the 10ms deadline?
details:
  realistic_solution: 'The root cause is an Instruction Cache (I-Cache) locality failure. Loop unrolling increases the binary size of the function. The heavily unrolled kernel now exceeds the size of the Cortex-M7''s L1 I-Cache. The CPU must continuously fetch instructions from the external QSPI Flash. Driving the pins for the QSPI interface at high frequency consumes massive amounts of power.'
  common_mistake: |
    **The Pitfall:** Assuming loop unrolling only affects CPU register usage and ALU power.
    **The Rationale:** Forgetting about the memory hierarchy and the cost of external memory accesses.
    **The Consequence:** Halving device battery life by causing continuous I-Cache thrashing over the power-hungry QSPI interface.
  napkin_math: |
    **Assumptions & Constraints:**
    - Cortex-M7 L1 I-Cache: ~16 KB.
    - Rolled loop footprint: ~1 KB (Cache hit).
    - Unrolled loop footprint: ~30 KB (Cache miss).
    - QSPI read penalty: ~4 cycles per word.
    
    **Calculations:**
    - The unrolled loop constantly evicts and fetches from QSPI.
    
    **Conclusion & Interpretation:**
    - **Result: 2x Power Draw (Memory-Bound)**. The QSPI bus constantly toggles to fetch instructions, draining power and doubling consumption.
