title: 3D CNN Activation Checkpointing
scenario: Training a 3D UNet on 512x512x512 CT scans (batch size 1) requires 180GB for forward pass activations,
  but you only have an 80GB A100 GPU. Using full activation checkpointing (recomputing all layers) drops
  throughput to 0.5 iter/sec. Goal is 1.5 iter/sec. Propose a hybrid memory architecture balancing recompute
  and PCIe offloading.
details:
  realistic_solution: 'Implement a heterogeneous activation management strategy based on the arithmetic
    intensity of each layer type. The architecture must evaluate layer characteristics: Convolutional
    layers are compute-heavy but produce relatively small activations. Normalization and Activation layers
    (e.g., BatchNorm, ReLU) are compute-light but memory-bandwidth heavy (large activations). Strategy:
    Use Activation Checkpointing (recompute) for memory-heavy/compute-light layers, saving massive HBM
    without much compute penalty. For compute-heavy layers, asynchronously offload the activations to
    Host DRAM over PCIe using dedicated CUDA streams, overlapping the transfer with the computation of
    subsequent layers.'
  common_mistake: Offloading all activations to Host CPU RAM indiscriminately, which bottlenecks on PCIe
    Gen4 bandwidth and severely degrades training speed.
  napkin_math: 1 volume = 512^3 pixels = 134M pixels. A single 32-channel FP32 activation tensor = 134M
    * 32 * 4 bytes = 17.1GB. PCIe Gen4 x16 bandwidth = 32GB/s. Offloading one such tensor takes 17.1 /
    32 = ~0.53 seconds. If we offload 5 such tensors, it takes 2.65s (bottlenecking the 1.5 iter/sec goal).
    By selectively discarding and recomputing ReLU/Norm (which takes <10ms to recompute but 0.5s to transfer)
    and only offloading the bottleneck convolutions, we stay under the 80GB HBM limit and bypass the PCIe
    bottleneck.
