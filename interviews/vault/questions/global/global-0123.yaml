title: 3D CNN Activation Checkpointing
scenario: Training a 3D UNet on 512x512x512 CT scans (batch size 1) requires 180GB for forward pass activations, but you only have an 80GB A100 GPU. Using full activation checkpointing (recomputing all layers) drops throughput to 0.5 iter/sec. Goal is 1.5 iter/sec.
question: What hybrid recompute/offload strategy would fit 180GB of 3D UNet activations on an 80GB A100 at 1.5 iter/sec?
details:
  realistic_solution: "Implement a heterogeneous activation management strategy based on the arithmetic intensity of each layer type. The architecture must evaluate layer characteristics: Convolutional layers are compute-heavy but produce relatively small activations. Normalization and Activation layers (e.g., BatchNorm, ReLU) are compute-light but memory-bandwidth heavy (large activations). Strategy: Use Activation Checkpointing (recompute) for memory-heavy/compute-light layers, saving massive HBM without much compute penalty. For compute-heavy layers, asynchronously offload the activations to Host DRAM over PCIe using dedicated CUDA streams, overlapping the transfer with the computation of subsequent layers."
  common_mistake: |
    **The Pitfall:** Offloading all activations to Host CPU RAM indiscriminately.
    **The Rationale:** CPU RAM provides a massive, cheap memory pool to solve the 180GB deficit.
    **The Consequence:** Saturated PCIe Gen4 bandwidth destroys training speed, failing to meet the required 1.5 iter/sec throughput SLA.
  napkin_math: |
    * Volume size: 512^3 pixels = 134M pixels.
    * Single 32-channel FP32 activation tensor: 134M * 32 channels * 4 bytes = 17.1 GB.
    * PCIe Gen4 x16 bandwidth: ~32 GB/s.
    * Transfer time for one tensor: 17.1 GB / 32 GB/s = ~0.53 seconds.
    * **Offloading 5 such tensors takes 2.65s, severely bottlenecking the 1.5 iter/sec goal.**
