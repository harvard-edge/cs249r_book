title: Scale Metadata Count
scenario: A quantized tensor has 16 million weights and uses one scale per 64 weights.
question: How many scale values are needed for 16M weights with one scale per 64 weights?
details:
  realistic_solution: The tensor needs 16,000,000 / 64 = 250,000 scale values. Metadata storage then depends on bytes per scale.
  common_mistake: |
    **The Pitfall:** Counting one scale per tensor instead of group-wise metadata.
    **The Rationale:** Misunderstanding group-wise quantization as channel-wise or layer-wise quantization.
    **The Consequence:** Drastically underestimating the memory footprint of the quantization metadata.
  napkin_math: |
    - Total weights: 16,000,000
    - Group size: 64 weights per scale
    - Number of scales: 16,000,000 / 64 = **250,000 scales**.
