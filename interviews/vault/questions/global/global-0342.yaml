title: Scale Metadata Count
scenario: A quantized tensor has 16 million weights and uses one scale per 64 weights.
  Calculate the number of scale values.
question: How many scale values are needed for 16M weights with one scale per 64 weights?
details:
  realistic_solution: The tensor needs 16,000,000 / 64 = 250,000 scale values. Metadata
    storage then depends on bytes per scale.
  common_mistake: Counting one scale per tensor and missing group-wise quantization
    metadata.
  napkin_math: 16,000,000 / 64 = 250,000 scales.
