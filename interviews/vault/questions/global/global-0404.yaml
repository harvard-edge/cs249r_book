title: Efficiency Report Spec
scenario: A leadership team wants a monthly report comparing two training clusters. Cluster A has lower electricity use, but Cluster B trains twice as many tokens.
question: "What metrics should a monthly report include to compare two training clusters when one uses less power but the other trains more tokens?"
details:
  realistic_solution: 'The report should include energy per useful training token, average utilization, PUE-adjusted energy, carbon intensity, failure/restart overhead, and total cost per completed run. Raw electricity use alone is insufficient because a cluster that does more useful work can be more efficient per token even with higher total power.'
  common_mistake: |
    **The Pitfall:** Ranking clusters by total kWh without normalizing by useful output.
    **The Rationale:** Total energy consumption is easiest to measure on a utility bill.
    **The Consequence:** Incentivizing slower, less efficient training environments over dense, high-throughput architectures.
  napkin_math: |
    **Assumptions & Constraints:**
    - Cluster A uses less total power.
    - Cluster B trains 2x more tokens.
    - Cluster B uses 1.5x more energy overall.
    
    **Calculations:**
    - Metric: kWh per billion tokens = total kWh / trained billions of tokens.
    - Normalized Cluster B energy = 1.5x energy / 2x tokens = 0.75x energy per token.
    
    **Conclusion & Interpretation:**
    - **Result: 25% Lower Energy Per Token (Efficiency Bound)**. Cluster B is more efficient per useful unit of work despite higher absolute power draw.
