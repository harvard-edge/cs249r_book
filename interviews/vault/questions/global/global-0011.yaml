title: The Cost of Data Movement
scenario: A modern accelerator performs an FP16 multiply-add operation using operands read from main memory.
question: 'Which operation consumes significantly more energy on a modern accelerator: performing the FP16 multiply-add operation or reading the operands from main memory?'
details:
  realistic_solution: "Moving operands from HBM/DRAM dominates the thermal envelope. Data transmission physical paths are massively energetic compared to logic gates. Architecture optimizes entirely around maximizing SRAM reuse to avoid off-chip I/O."
  common_mistake: |
    **The Pitfall:** Assuming compute is the primary energy draw because GPUs are famous for high FLOPs.
    **The Rationale:** FLOPs are heavily marketed as the primary metric of AI accelerators, obscuring the physical reality that data movement dominates the power budget.
    **The Consequence:** Designing algorithms that minimize math at the expense of memory reads, resulting in worse thermal and energetic efficiency.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - FP16 MAD Energy: ~0.4 pJ
       - DRAM 64-bit Read: ~200 pJ
    2. **Calculations:**
       - Ratio: 200 pJ / 0.4 pJ = 500x
    3. **Conclusion & Interpretation:**
       - **Result: I/O-Energy Bound**
  options:
  - The FP16 multiply-add consumes about 10x more energy.
  - They consume roughly the same amount of energy.
  - Reading from main memory consumes ~100x to 1000x more energy.
  - Compute consumes more energy only if batch size is exactly 1.
  correct_index: 2
