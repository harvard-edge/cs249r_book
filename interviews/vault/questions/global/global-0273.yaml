title: Eager vs Compiled Execution for Inference
scenario: You have a transformer model in PyTorch eager mode averaging 45ms per forward pass. torch.compile
  with mode='reduce-overhead' achieves 28ms but adds 120 seconds of compilation time on first call. Your
  serving endpoint handles 10K requests/hour. Evaluate when compilation pays for itself and identify scenarios
  where it doesn't.
question: "How would you evaluate when compilation pays for itself and identify scenarios where it doesn't?"
details:
  realistic_solution: 'Speedup per request: 45ms - 28ms = 17ms saved. Compilation cost: 120 seconds =
    120,000ms. Break-even: 120,000 / 17 = 7,059 requests to amortize. At 10K req/hour, break-even in 42
    minutes. Over 24 hours: savings = (24h × 10K/h - 7,059) × 17ms = 232,941 × 17ms = 3,960 seconds =
    66 minutes of GPU time saved. At $3/GPU-hr: saves $3.30/day per replica. When compilation DOESN''T
    pay: (1) Short-lived serverless functions restarting every 15 minutes — never amortizes. (2) Dynamic
    input shapes (variable sequence lengths without padding) — torch.compile recompiles for each new shape,
    potentially adding seconds of overhead per unique shape. (3) Models with data-dependent control flow
    (early exit, mixture of experts routing) — graph breaks force partial compilation with diminished
    gains. (4) Debugging/development — compiled tracebacks are opaque.'
  common_mistake: Always choosing compiled mode without considering cold start, dynamic shapes, or the
    amortization window. Compilation is wasted if the model is reloaded frequently or inputs have highly
    variable shapes.
  napkin_math: 'Save 17ms/request. Compile cost: 120s = 7,059 requests to break even. At 10K req/hr: amortized
    in 42 min. 24h savings: (240K - 7K) × 17ms = 3,960s = $3.30/day/replica.'
