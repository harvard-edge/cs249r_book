title: Extreme Quantization Rollout Design
scenario: A team wants to ship a 2-bit model to low-memory devices while keeping a higher-quality INT8 model for premium devices. Design a rollout that avoids quality cliffs.
question: How would you roll out a 2-bit model for low-memory devices without creating quality cliffs versus the INT8 model?
details:
  realistic_solution: Segment devices by memory and performance, run per-segment quality gates, keep server or INT8 fallback where feasible, monitor task-specific regressions, and avoid comparing only aggregate accuracy. The 2-bit model should be a constrained fallback, not the default if quality loss is large.
  common_mistake: Treating 2-bit quantization as a universal compression upgrade because it fits more devices.
  napkin_math: 2-bit weights are 4x smaller than INT8, but a small memory win can be unacceptable if rare-class accuracy drops.
