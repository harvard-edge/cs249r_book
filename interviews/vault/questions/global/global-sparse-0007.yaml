title: Data Selection Across Regimes
scenario: A model improvement program receives cloud logs, mobile hard-example telemetry, and edge incident clips. Design a data selection policy that avoids overfitting to the easiest source to collect.
question: How would you select training data across cloud logs, mobile telemetry, and edge incident clips without overfitting to the easiest source?
details:
  realistic_solution: Use source quotas, uncertainty and diversity sampling, rare-event floors, privacy filters, and a held-out evaluation set per source. Cloud logs may dominate volume, but edge incident clips and mobile hard examples can carry high learning value.
  common_mistake: Selecting by raw volume and letting abundant cloud logs drown out rare but important edge/mobile failures.
  napkin_math: If cloud provides 95% of examples but edge incidents represent most severe failures, a volume-only sampler can nearly eliminate safety-critical training signal.
