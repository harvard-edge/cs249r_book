title: Global Inference Fanout Bandwidth
scenario: A global inference request fans out to 6 regional feature services. Each subrequest returns 150 KB. Peak traffic is 8,000 user requests/s.
question: What aggregate return bandwidth comes from 8,000 rps when each request fans out to six 150 KB feature responses?
details:
  realistic_solution: Each user request returns 6 x 150 KB = 900 KB from feature services. At 8,000 rps, aggregate return traffic is 7.2 GB/s. That can become a network bottleneck even if the model server itself is fast.
  common_mistake: |
    **The Pitfall:** Counting only the model request payload and ignoring fanout responses from dependent services.
    **The Rationale:** Engineers often focus only on the client-to-server payload sizes and neglect internal microservice multipliers.
    **The Consequence:** Massive network bottlenecks and dropped packets in the internal datacenter fabric during peak traffic.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Fanout: 6 regional feature services per user request.
       - Response size: 150 KB per subrequest.
       - Peak traffic: 8,000 user requests/s.
    2. **Calculations:**
       - Data per user request: 6 * 150 KB = 900 KB.
       - Aggregate bandwidth: 900 KB/request * 8,000 requests/s = 7,200,000 KB/s = 7.2 GB/s.
    3. **Conclusion & Interpretation:**
       - **Result: Network-Bound.** The feature fanout generates 7.2 GB/s (or ~57.6 Gbps) of return traffic.
