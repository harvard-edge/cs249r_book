title: Evaluate Cloud Versus Device Compute Cost
scenario: A personalization feature can run in cloud at $0.0008/request or on-device with no cloud bill but 0.4 Wh of battery drain per 100 requests. Users average 50 requests/day.
question: How would you evaluate cloud cost versus user battery cost for 50 daily requests at $0.0008/request and 0.4 Wh per 100 on-device requests?
details:
  realistic_solution: 'Company cloud cost is 50 x $0.0008 = $0.04/user/day. On-device removes cloud cost but uses 0.2 Wh/user/day. The decision is not a single dollar number: company cost favors device, while user experience depends on battery impact, privacy, latency, and willingness to spend device energy. A numeric user-side comparison would require an explicit model for valuing battery drain.'
  common_mistake: |
    **The Pitfall:** Declaring on-device free because it has no cloud bill, or declaring cloud better without valuing privacy and latency.
    **The Rationale:** Candidates often optimize solely for company OPEX while ignoring the hidden cost transferred to the user's device.
    **The Consequence:** Alienating users by draining their battery, or unnecessarily increasing cloud costs without considering hybrid options.
  napkin_math: |
    - Cloud cost: 50 * $0.0008 = $0.04/day.
    - Device energy: (0.4 Wh / 100) * 50 = 0.2 Wh/day.
    - **Tradeoff requires valuing $0.04 vs 0.2 Wh of user battery.**
