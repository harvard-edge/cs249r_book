title: AllReduce Communication Overhead
scenario: Explain why AllReduce in a ring topology transfers 2×(N-1)/N times the gradient size, where N is the number of GPUs.
question: "Why does this approach O(2× gradient size) as N grows?"
details:
  realistic_solution: 'Ring AllReduce works in two phases: scatter-reduce and allgather, each requiring N-1 steps. In each step, every GPU sends 1/N of the gradient buffer to its neighbor. Per GPU, total data sent = (N-1)/N × buffer_size in scatter-reduce + (N-1)/N × buffer_size in allgather = 2×(N-1)/N × buffer_size. As N→∞, this approaches 2× the buffer size. This is bandwidth-optimal because every link is utilized simultaneously. The critical insight: doubling GPUs does NOT double communication time — it''s nearly constant per GPU. The bottleneck is the per-link bandwidth, not the number of GPUs. This is why ring AllReduce scales well on NVLink-connected GPUs within a node.'
  common_mistake: |
    **The Pitfall:** Believing AllReduce communication cost grows linearly with the number of GPUs.
    **The Rationale:** Candidates assume that more GPUs require proportionally more data to be broadcast globally.
    **The Consequence:** Distributed scaling limits are misunderstood, leading to incorrect hardware topologies.
  napkin_math: |
    - For 8 GPUs with 14 GB gradients: each GPU sends 2 * (7/8) * 14 GB = 24.5 GB.
    - At 450 GB/s NVLink bandwidth, this takes 54ms.
    - For 4 GPUs: 2 * (3/4) * 14 GB = 21 GB.
    - **The data transferred per GPU scales sub-linearly and approaches a constant 2x the gradient size.**
