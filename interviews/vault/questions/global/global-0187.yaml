title: The Right-to-Be-Forgotten Cost
scenario: Under GDPR, a user requests deletion of their data. Your model was trained on a dataset including 10M users' data over 2,048 GPU-hours.
question: If retraining costs $2/GPU-hour, what does each deletion request cost?
details:
  realistic_solution: 'Full retrain cost: 2,048 GPU-hours × $2/GPU-hour = $4,096 per deletion request. At 100 deletion requests/year, that is $409,600/year in retraining costs. This is why organizations invest in: (1) Machine unlearning: approximate methods that update model weights to forget specific training examples without full retraining (cost: ~1-5% of retraining). (2) Training data isolation: shard training data by user cohort so retraining only requires processing the affected shard. (3) Differential privacy: train with DP guarantees so no individual data is memorized — making deletion requests moot for the model.'
  common_mistake: |
    **The Pitfall:** Assuming you can simply delete the user's data from the database and call it done.
    **The Rationale:** Ignoring the fact that neural networks can memorize training data into their weights.
    **The Consequence:** Severe regulatory fines for GDPR non-compliance because the user's data remains extractable from the model itself.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Full Retrain Cost: 2,048 GPU-hours at $2/hour.
       - Volume: 100 deletion requests/year.
    2. **Calculations:**
       - Full Retrain Cost: 2,048 * $2 = $4,096 per request.
       - Annual Cost: $4,096 * 100 = $409,600/year.
       - Machine Unlearning (1% cost): $40.96/request = $4,096/year.
    3. **Conclusion & Interpretation:**
       - **Result: ROI of Machine Unlearning.** A $200K R&D investment in unlearning saves $405,504/year, paying for itself in 6 months.
