title: Portable Training Graph Memory Spec
scenario: You are specifying an on-device training feature that may run on cloud GPUs for debugging, edge gateways for site adaptation, and mobile phones for personalization. The model team wants to keep the full autograd graph for all layers.
question: What memory telemetry and graph controls are required before approving full-autograd training across cloud, edge, and mobile regimes?
details:
  realistic_solution: Require peak activation memory, retained tensor count, parameter and optimizer state, batch size, gradient accumulation, recomputation settings, and per-layer memory attribution. The controls should include activation checkpointing, frozen layers, adapter-only training, batch caps, and OOM-safe rollback. Without these, full autograd may pass in cloud and fail on constrained devices.
  common_mistake: |
    **The Pitfall:** Treating autograd as a mere framework detail.
    **The Rationale:** Ignoring the vast difference in memory constraints between cloud GPUs and edge/mobile devices.
    **The Consequence:** Full autograd passes in the cloud but causes Out-of-Memory (OOM) crashes on constrained devices.
  napkin_math: |
    - Parameters + Gradients ≈ 2x model weights.
    - Optimizer state (Adam) ≈ 2x FP32 state relative to FP32 parameters.
    - Total multiplier: A 500 MB model easily becomes **> 2 GB** once optimizer state and activations are included.
