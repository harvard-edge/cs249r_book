title: The Agentic Memory Architecture
scenario: You're designing a coding agent that maintains context across a multi-hour session with hundreds of tool calls. The full conversation history is 500K tokens — far beyond any model's context window. The agent needs to remember file edits from 2 hours ago, recall error patterns from earlier debugging attempts, and maintain consistency in its approach.
question: How would you design storage tiering, retrieval, and context-window management for this 500K-token coding-agent memory?
details:
  realistic_solution: 'Three-tier memory architecture: (1) Working memory (< 8K tokens): The current context window. Contains the active file being edited, the last 2-3 tool results, and the current objective. Updated every turn by a ''memory manager'' that decides what to keep and what to evict. Implementation: structured slots (current_file, recent_errors, current_plan) managed programmatically, not by the LLM. (2) Episodic memory (100K-1M tokens, compressed): A searchable log of all past interactions, compressed into summaries. Every 10 turns, a small model summarizes the interaction block into a ~200-token episode: ''Debugged authentication module. Root cause: missing token refresh. Fixed in auth.py:142-155. Tests passing.'' Stored in a vector DB for semantic retrieval. When the agent encounters a related topic, the top-3 relevant episodes are injected into working memory. (3) Semantic memory (persistent, structured): Long-lived facts about the codebase extracted from interactions. ''auth.py uses JWT tokens,'' ''The project has 84% test coverage,'' ''The user prefers functional React components.'' Stored as a knowledge graph or structured JSON. Updated incrementally. Queried by entity (file name, module) rather than semantic similarity. The context window at any turn: 2K system prompt + 2K semantic memory (relevant facts) + 1K episodic memory (relevant past episodes) + 3K working memory = 8K tokens. This fits a 16K context model with room for output.'
  common_mistake: |
    **The Pitfall:** Using a single vector database for all memory.
    **The Rationale:** Treating ephemeral working memory ("I edited line 42") the same as persistent knowledge ("The project uses React").
    **The Consequence:** Irrelevant context retrieval and lost active task state, causing the agent to hallucinate or loop.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 500K raw token history.
       - Model context size: ~16K limit.
       - Cost: $0.003/1K tokens.
    2. **Calculations:**
       - Single pass context stuff (if possible): 500K * $0.003/1K = $1.50 per turn.
       - Tiered memory context window: 8K tokens/turn * $0.003/1K = $0.024/turn.
       - Compression ratio: 500K / 8K = 62.5x.
    3. **Conclusion & Interpretation:**
       - **Result: $0.024/turn with 62.5x compression. Context-Window-Bound resolved via tiered memory.**
