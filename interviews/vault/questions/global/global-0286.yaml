title: Network Topology for 2048-GPU Training Cluster
scenario: Design the network topology for a 2048 H100 GPU training cluster (256 nodes x 8 GPUs). The cluster must support AllReduce across all GPUs with < 5ms latency for 1 GB payloads and non-blocking any-to-any communication.
question: What is the optimal switch topology, link speeds, and total switch port count for this cluster?
details:
  realistic_solution: 'Design: 2-tier fat-tree with InfiniBand NDR (400 Gb/s = 50 GB/s per port). (1) Leaf layer: each of 256 nodes connects to a leaf switch. Use 64-port NDR switches. Each leaf switch connects 32 nodes (downlinks) + 32 uplinks to spine. Need 256/32 = 8 leaf switches. (2) Spine layer: 32 uplinks per leaf x 8 leaves = 256 total uplinks. Distribute across spine switches: with 64-port spines, each spine connects to all 8 leaves (8 downlinks) + unused ports. Need 256/8 = 32 spine switches. (3) Bisection bandwidth: 8 leaves x 32 uplinks x 50 GB/s = 12.8 TB/s total. Per-node bisection: 50 GB/s — full line rate, non-blocking. (4) AllReduce latency for 1 GB: A flat ring AllReduce across 256 nodes requires 2(N-1) steps. Time = 2 x (255/256) x 1 GB / 50 GB/s = ~40ms. This strictly violates the 5ms requirement. However, using hierarchical AllReduce (intra-node NVLink, then inter-node IB) drastically cuts this time. Intra-node reduce-scatter: 2 x (7/8) x 1 GB / 900 GB/s = ~1.9ms. Inter-node ring: 2 x (255/256) x (1 GB / 8) / 50 GB/s = ~5ms. Intra-node all-gather: ~1.9ms. Utilizing in-network reduction (SHARP) on the InfiniBand switches avoids the 5ms ring penalty, bringing the total well under the 5ms requirement. (5) Total hardware: 8 leaf + 32 spine = 40 switches x ~$20K = $800K networking cost.'
  common_mistake: |
    **The Pitfall:** Proposing a flat switched fabric without calculating port limits.
    **The Rationale:** Assuming you can just buy a 256-port switch to connect all nodes directly.
    **The Consequence:** Proposing an impossible hardware configuration since such InfiniBand switches do not exist, missing the multi-tier fat-tree requirement.
  napkin_math: |
    - **Leaf layer:** 256 nodes / 32 downlinks per switch = 8 leaf switches (64-port).
    - **Spine layer:** 8 leaves × 32 uplinks = 256 total uplinks. Distributing across 8 downlinks per spine = 32 spine switches (64-port).
    - **Total switches:** 8 leaf + 32 spine = 40 switches. Total ports = 40 × 64 = **2,560 ports**.
    - **Bisection bandwidth:** 8 leaves × 32 uplinks × 50 GB/s = **12.8 TB/s**.
    - **Latency:** Hierarchical AllReduce (NVLink + IB) yields **~5ms**.
