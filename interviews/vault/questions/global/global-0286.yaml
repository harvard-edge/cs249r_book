title: Network Topology for 2048-GPU Training Cluster
scenario: Design the network topology for a 2048 H100 GPU training cluster (256 nodes × 8 GPUs). The cluster
  must support AllReduce across all GPUs with < 5ms latency for 1 GB payloads and non-blocking any-to-any
  communication. Specify the switch topology, link speeds, and total switch port count.
details:
  realistic_solution: 'Design: 2-tier fat-tree with InfiniBand NDR (400 Gb/s = 50 GB/s per port). (1)
    Leaf layer: each of 256 nodes connects to a leaf switch. Use 64-port NDR switches. Each leaf switch
    connects 32 nodes (downlinks) + 32 uplinks to spine. Need 256/32 = 8 leaf switches. (2) Spine layer:
    32 uplinks per leaf × 8 leaves = 256 total uplinks. Distribute across spine switches: with 64-port
    spines, each spine connects to all 8 leaves (8 downlinks) + unused ports. Need 256/8 = 32 spine switches.
    (3) Bisection bandwidth: 8 leaves × 32 uplinks × 50 GB/s = 12.8 TB/s total. Per-node bisection: 50
    GB/s — full line rate, non-blocking. (4) AllReduce latency for 1 GB: A flat ring AllReduce across
    256 nodes requires 2(N-1) steps. Time = 2 × (255/256) × 1 GB / 50 GB/s = ~40ms. This strictly violates
    the 5ms requirement. However, using hierarchical AllReduce (intra-node NVLink, then inter-node IB)
    drastically cuts this time. Intra-node reduce-scatter: 2 × (7/8) × 1 GB / 900 GB/s = ~1.9ms. Inter-node
    ring: 2 × (255/256) × (1 GB / 8) / 50 GB/s = ~5ms. Intra-node all-gather: ~1.9ms. Utilizing in-network
    reduction (SHARP) on the InfiniBand switches avoids the 5ms ring penalty, bringing the total well
    under the 5ms requirement. (5) Total hardware: 8 leaf + 32 spine = 40 switches × ~$20K = $800K networking
    cost.'
  common_mistake: Proposing a flat switched fabric without calculating the number of switch ports needed.
    256 nodes with single-port connections need a 256-port switch — which doesn't exist in InfiniBand.
    Multi-tier fat-tree is required.
  napkin_math: '256 nodes → 8 leaf switches (32 nodes each) + 32 spine switches. 40 total switches × 64
    ports = 2,560 ports. Bisection: 8 × 32 × 50 GB/s = 12.8 TB/s. AllReduce 1 GB: ~5ms hierarchical (NVLink
    + IB). Cost: ~$800K switches.'
