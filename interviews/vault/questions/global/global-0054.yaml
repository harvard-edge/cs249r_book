title: MoE Decoding Latency Spike at High Batch Size
scenario: You deploy an 8x7B Mixture of Experts (MoE) model (top-2 routing, 47B total params) and a 13B dense model on a single 80GB A100 (2 TB/s HBM bandwidth). Both use W8A16 quantization. At batch size 1, both achieve ~15ms/token decoding latency. However, at batch size 128, the 13B dense model achieves 20ms/token, while the MoE model's latency spikes to 45ms/token. Profiling shows <15% compute utilization for both, and KV cache memory is well within limits.
question: "What is the root cause of the 8x7B top-2 MoE slowing from 15ms/token at batch 1 to 45ms/token at batch 128?"
details:
  realistic_solution: 'In auto-regressive decoding, token generation is heavily memory-bandwidth bound because the GPU must read the model weights from HBM to SRAM for every step. For the 13B dense model in 8-bit, the GPU loads ~13GB of weights per token generation step. At batch size 128, it still loads that 13GB exactly once, applying it to all 128 tokens via batched GEMV. For the MoE model, top-2 routing at batch size 1 only activates ~13B parameters (shared layers + 2 experts), resulting in the same ~13GB read from HBM. However, at batch size 128, the 256 routing choices (128 tokens × 2 experts) statistically guarantee that almost all 8 experts are activated in every single MoE layer. Consequently, the GPU must load nearly the entire 47B parameter set (~47GB) from HBM for every generation step. The MoE''s sparsity advantage completely vanishes across the batch dimension, and the system hits a severe memory bandwidth bottleneck.'
  common_mistake: |
    **The Pitfall:** Assuming the routing network (softmax computation) introduces massive compute overhead at larger batch sizes.
    **The Rationale:** Routing introduces dynamic control flow, which feels computationally expensive.
    **The Consequence:** Misdiagnosing a memory bandwidth bottleneck as a compute bottleneck.
  napkin_math: |
    - Dense 13B W8 weights: 13GB. Read time = 13GB / 2000 GB/s = 6.5ms.
    - MoE 8x7B W8 weights: 47GB.
    - At BS=1 (top-2): active weights = 13GB. Read time = 6.5ms.
    - At BS=128 (top-2): Probability an expert is UNUSED is (7/8)^256 ≈ 1.4e-15.
    - All 8 experts are loaded. Active weights ≈ 47GB. Read time = 47GB / 2000 GB/s = 23.5ms.
    - **Delta in weight read time: 23.5ms - 6.5ms = 17.0ms, accounting for the massive latency spike.**
