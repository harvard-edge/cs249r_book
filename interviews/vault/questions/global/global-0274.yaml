title: GPU vs CPU Data Preprocessing for Training
scenario: Your image classification training pipeline spends 40% of wall-clock time waiting for data preprocessing (resize, augment, normalize) on 32 CPU cores. The GPU sits idle during this time.
question: "How would you compare doubling CPU cores, GPU preprocessing, and offline preprocessed shards for this training pipeline?"
details:
  realistic_solution: 'Option A (64 CPUs): Doubles preprocessing throughput. If 32 cores → 40% idle, 64 cores → ~20% idle (Amdahl''s Law: speedup = 1/(0.6 + 0.4/2) = 1.25x overall). Cost: ~$0.50/hr for 32 extra vCPUs. Reduces wall time from T to 0.8T. Option B (GPU DALI): Moves preprocessing to GPU, eliminating CPU→GPU data copy latency. GPU preprocessing is 10-50x faster than CPU for image operations. Training time: ~0.62T (eliminates 38% of the 40% idle, some overhead). Cost: zero extra — uses same GPU. Caveat: uses 2-5 GB VRAM for preprocessing buffers. Option C (Pre-process offline): Eliminates runtime preprocessing entirely. Training time: 0.6T (removes all CPU preprocessing wait). Cost: 2-10x storage (augmented copies), plus offline preprocessing compute. Only works for deterministic augmentation — random crop/flip must still be applied online. Best approach: B for random augmentations (GPU handles them in the pipeline), C for expensive fixed transforms (tokenization, feature extraction). Avoid A unless GPU memory is critically constrained.'
  common_mistake: |
    **The Pitfall:** Automatically choosing GPU preprocessing.
    **The Rationale:** GPUs are universally faster at matrix operations like image resizing.
    **The Consequence:** Precious GPU memory is consumed by preprocessing buffers, reducing the available batch size for actual training.
  napkin_math: |
    - Option A (64 CPUs): Idle drops to 20%, 1.25x speedup, +$0.50/hr.
    - Option B (GPU DALI): Idle drops to ~2%, 1.6x speedup, no extra cost (but uses VRAM).
    - Option C (Offline shards): Idle drops to 0%, 1.67x speedup, 2-10x storage cost.
    - **Option B gives the best cost-performance ratio for random augmentations.**
