title: The CO2 Per Training Run
scenario: You train a model using 256 A100 GPUs (300W each) for 14 days in a datacenter with PUE 1.3, located in a region with grid carbon intensity of 400 gCO2/kWh.
question: What are the total CO2 emissions, in metric tons, for the 256-A100 training run with PUE 1.3 and 400 gCO2/kWh grid intensity?
details:
  realistic_solution: 'Step 1: GPU energy = 256 GPUs \times 0.3 kW \times 24 h \times 14 days = 25,804.8 kWh. Step 2: Total energy with PUE = 25,804.8 \times 1.3 = 33,546.2 kWh. Step 3: CO2 = 33,546.2 kWh \times 400 gCO2/kWh = 13,418,496 g = 13.4 metric tons CO2. For reference, the average American''s annual carbon footprint is ~16 metric tons, so this single training run produces nearly a year''s worth of one person''s emissions.'
  common_mistake: |
    **The Pitfall:** Forgetting to include PUE in the energy calculation or mixing up grams and kilograms.
    **The Rationale:** Developers usually focus on the hardware specs (GPU TDP) and overlook the massive facility overhead represented by the PUE.
    **The Consequence:** Underestimating the true carbon footprint by 30% or more, leading to inaccurate ESG reporting.
  napkin_math: |
    **Assumptions & Constraints:**
    - 256 A100 GPUs drawing 300W each for 14 days (336 hours).
    - Datacenter PUE = 1.3.
    - Grid carbon intensity = 400 gCO2/kWh.

    **Calculations:**
    - GPU Energy = 256 GPUs * 0.3 kW * 336 h = 25,804.8 kWh.
    - Total Energy (with PUE 1.3) = 25,804.8 kWh * 1.3 = 33,546.24 kWh.
    - CO2 emissions = 33,546.24 kWh * 400 gCO2/kWh = 13,418,496 g.
    - Metric tons = 13,418,496 g / 1,000,000 = 13.418 metric tons.

    **Conclusion & Interpretation:**
    - **Result: 13.4 metric tons (Energy-Bound)**. The training run produces ~13.4 metric tons of CO2.
