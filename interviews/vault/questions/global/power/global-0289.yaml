title: Power and Cooling for a 1000-GPU Cluster
scenario: 'Design the power and cooling architecture for a 1000 H100 GPU data center (125 DGX nodes, each at 10.2 kW). Total IT load is 1.275 MW. Requirements: PUE < 1.15, support for 50 kW/rack density, and N+1 redundancy on all power paths.'
question: How would you specify the cooling technology, power distribution, and UPS configuration?
details:
  realistic_solution: 'Design: (1) Cooling: direct-to-chip liquid cooling (rear-door heat exchangers or cold plates). Each H100 SXM at 700W generates ~95% of heat through the GPU die. Facility cooling: cooling towers or dry coolers. (2) Power distribution: utility feed -> 2x 1.5 MVA transformers (N+1) -> medium-voltage switchgear -> PDUs -> rack-level busway. (3) UPS: 3x 750 kVA UPS modules (N+1) with 10-minute battery backup for graceful checkpoint + shutdown. (4) PUE calculation: IT load 1.275 MW + cooling 0.08 MW + power distribution losses 0.06 MW + lighting/misc 0.01 MW = total 1.425 MW. PUE = 1.425/1.275 = 1.118 < 1.15 requirement met.'
  common_mistake: |
    **The Pitfall:** Using traditional air cooling for H100-class density.
    **The Rationale:** Familiarity with older, lower-density data center designs where air cooling was sufficient.
    **The Consequence:** At 50 kW/rack, air cooling requires impossibly high airflow, leading to severe thermal throttling, hardware damage, and missing the PUE target.
  napkin_math: |
    **Assumptions & Constraints:**
    - IT Load: 125 nodes x 10.2 kW/node = 1.275 MW.
    - UPS Battery: 10 minute runtime.
    
    **Calculations:**
    - Facility Load: 1.275 MW (IT) + 0.08 MW (cooling) + 0.06 MW (dist) + 0.01 MW (misc) = 1.425 MW.
    - PUE = 1.425 MW / 1.275 MW = 1.118.
    - UPS Battery: 1.275 MW x (10/60) hours = 212.5 kWh.
    
    **Conclusion & Interpretation:**
    - **Result: 1.118 PUE (Power-Bound)**. PUE 1.118 meets the <1.15 requirement using direct-to-chip liquid cooling.
