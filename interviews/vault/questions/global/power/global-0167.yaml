title: The Carbon-Aware Checkpoint Penalty
scenario: You implement a carbon-aware scheduler for a 256-GPU training job. It pauses training when grid
  carbon intensity is high and resumes when it is low. Despite successfully shifting 30% of the compute
  hours to green energy periods, the post-run sustainability audit shows the total carbon footprint actually
  increased by 12%.
question: Why did pausing the 256-GPU job during high-carbon periods increase total carbon emissions by
  12%?
details:
  realistic_solution: The root cause is the massive overhead of pausing and resuming. The GPUs remain
    powered on and allocated, drawing significant idle power. The carbon emissions from the prolonged
    idle power draw, combined with the embodied energy of the network transfer and storage IO to save
    and load checkpoints, completely outweigh the grid carbon intensity savings from shifting a short
    duration of compute.
  common_mistake: '**The Pitfall:** Ignoring the embodied carbon of data movement and the idle power consumption
    of paused hardware.

    **The Rationale:** If compute is paused, people erroneously assume emissions drop to zero.

    **The Consequence:** The pause-and-resume overhead completely negates any grid intensity savings,
    actively harming the environment.

    '
  napkin_math: '**Assumptions & Constraints:**

    - 256 GPUs. 6-hour pause to shift 1 hour of compute. High carbon = 400 g/kWh, Low = 200 g/kWh.

    - Active power = 700W/GPU (179.2 kW total).

    - Idle power = 150W/GPU.


    **Calculations:**

    - Shift savings (1 hour) = 179.2 kW * 1h * (0.4 - 0.2) kg/kWh = 35.8 kgCO2.

    - Idle overhead = 256 GPUs @ 150W for 6h = 230.4 kWh. 230.4 kWh * 0.4 kg/kWh = ~92 kgCO2.

    - Storage IO / Network Energy = ~20 kgCO2.

    - Total Overhead = 92 + 20 = 112 kgCO2.


    **Conclusion & Interpretation:**

    - **Result: Power-Bound (Overhead).** The idle power draw and IO overhead (112 kgCO2) completely erased
    and exceeded the grid intensity savings (35.8 kgCO2).

    '
