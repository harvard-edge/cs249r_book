title: Idle Power Efficiency Budget
scenario: A GPU cluster has 1,000 accelerators. Each accelerator draws 700 W at full load and 250 W idle. Average utilization is 45%.
question: "What is the average accelerator power at 45% utilization for 1,000 GPUs, and why can improving utilization reduce cost per training token even if total power rises?"
details:
  realistic_solution: 'Average per-GPU power is 0.45 x 700 + 0.55 x 250 = 452.5 W. The fleet draws about 452.5 kW for accelerators. Better utilization may raise total power but can reduce energy per useful token because more of the fixed idle power becomes productive work.'
  common_mistake: 'Assuming idle GPUs consume zero power, which makes low utilization look cheaper than it is.'
  napkin_math: |
    **Assumptions & Constraints:**
    - 1,000 GPUs in the datacenter fleet.
    - Full load power = 700 W.
    - Idle power = 250 W.
    - Average utilization = 45%.
    
    **Calculations:**
    - Expected active power draw = 45% * 700 W = 315 W.
    - Expected idle power draw = 55% * 250 W = 137.5 W.
    - Average power per GPU = 315 W + 137.5 W = 452.5 W.
    - Total fleet power = 452.5 W * 1,000 = 452.5 kW.
    
    **Conclusion & Interpretation:**
    - **Result: 452.5 kW Fleet Power (Power Efficiency Bound)**. Idle GPUs consume non-trivial baseline power; improving workload density raises total draw but reduces the amortized energy cost per useful training token.
