title: The PUE Illusion
scenario: 'Your AI datacenter operates 1024 GPUs. During standard Dense LLM training (high SM utilization), the facility PUE is 1.15. You switch the workload to a memory-bound Mixture of Experts (MoE) model. The sustainability dashboard triggers an alert: the PUE has worsened to 1.30. Management demands to know why the datacenter has become ''less efficient''.'
question: Why does the datacenter PUE worsen from 1.15 to 1.30 when switching from dense LLM training to memory-bound MoE?
details:
  realistic_solution: 'The root cause is a mathematical artifact of how Power Usage Effectiveness (PUE) is calculated: Total Facility Power / IT Equipment Power. During the memory-bound MoE workload, the GPU Streaming Multiprocessors (SMs) are frequently starved waiting for memory fetches. Because compute is low, the IT power draw drops significantly (e.g., from 700W to 350W per GPU). However, the fixed facility power overheads (lighting, control systems, baseline cooling fans, network switches) do not drop proportionally. With a much smaller denominator (IT power) and a relatively stable fixed overhead in the numerator, the PUE ratio mathematically inflates. The datacenter is actually consuming less absolute energy and emitting less carbon, but the efficiency ratio looks worse.'
  common_mistake: |
    **The Pitfall:** Assuming a higher PUE means the datacenter is consuming more total energy or that the cooling system has failed.
    **The Rationale:** Confusing an efficiency ratio metric with an absolute power consumption metric.
    **The Consequence:** Panicking over a misleading dashboard metric while the datacenter is actually running cheaper and greener than before.
  napkin_math: |
    **Assumptions & Constraints:**
    - Dense Run: 1024 GPUs at 700W.
    - PUE 1.15 baseline overhead.

    **Calculations:**
    - Dense IT Power: 1024 * 700W = 716.8 kW.
    - Facility Overhead: 716.8 kW * 0.15 = 107.5 kW.
    - MoE IT Power: Drops to 350W/GPU = 358.4 kW.
    - New PUE: (358.4 kW + 107.5 kW) / 358.4 kW = 1.30.

    **Conclusion & Interpretation:**
    - **Result: Artifact of Ratio (Power-Bound)**. Total absolute power dropped by ~358 kW, but the PUE ratio worsened mathematically due to the shrinking IT denominator.
