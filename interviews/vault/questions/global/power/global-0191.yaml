title: The Latency-Carbon-Cost Triangle
scenario: 'You must deploy an LLM inference service for users in Europe. Three candidate regions: (A) Frankfurt — 15ms to users, $0.10/kWh electricity, 350 gCO2/kWh. (B) Stockholm — 35ms to users, $0.04/kWh, 30 gCO2/kWh. (C) Paris — 25ms to users, $0.07/kWh, 55 gCO2/kWh. Your SLA is 500ms TTFT and model prefill is 400ms.'
question: Which European region should you deploy in given the 500 ms TTFT SLA, 400 ms prefill, latency, cost, and carbon tradeoffs?
details:
  realistic_solution: 'SLA check: TTFT = prefill + network RTT. Required RTT < 500ms - 400ms = 100ms. All three regions qualify: Frankfurt (15ms one-way → ~30ms RTT), Paris (25ms → ~50ms), Stockholm (35ms → ~70ms). Since all meet the SLA, the decision optimizes on cost and carbon. For a 100-GPU H100 cluster running 24/7 at 0.7 kW/GPU with PUE 1.2, annual energy = 735,840 kWh. Annual electricity cost: Stockholm $29,434, Paris $51,509, Frankfurt $73,584. Annual carbon emissions: Stockholm 22.1 tonnes, Paris 40.5 tonnes, Frankfurt 257.5 tonnes. Recommendation: Stockholm as primary (cheapest, greenest, ~435ms TTFT within 500ms SLA).'
  common_mistake: |
    **The Pitfall:** Picking the lowest-latency option (Frankfurt) without evaluating whether the SLA can be met from other regions.
    **The Rationale:** Assuming lower latency is always strictly better, ignoring threshold-based SLA requirements.
    **The Consequence:** Unnecessarily spending 2.5x more on electricity and emitting 10x more carbon for latency gains that the user cannot perceive.
  napkin_math: |
    **Assumptions & Constraints:**
    - SLA Budget: 500 ms TTFT, 400 ms Prefill.
    - 100 H100s at 0.7 kW, PUE 1.2, 8760 h.

    **Calculations:**
    - Network RTT Budget: 500 - 400 = 100 ms.
    - RTT: Frankfurt 30ms, Paris 50ms, Stockholm 70ms. All pass.
    - Energy: 100 * 0.7 * 1.2 * 8760 = 735,840 kWh/year.
    - Cost & Carbon: Stockholm ($29,434 | 22.1t), Paris ($51,509 | 40.5t), Frankfurt ($73,584 | 257.5t).

    **Conclusion & Interpretation:**
    - **Result: Stockholm Optimizes Cost and Carbon (Cost/Carbon-Bound)**. It reduces cost by 60% and carbon by 91% while safely meeting the 100ms RTT SLA.
