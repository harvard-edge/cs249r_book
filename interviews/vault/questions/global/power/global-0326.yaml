title: Carbon-Aware Scheduling Optimization
scenario: A 10-hour training job can run in Region A at 500 gCO2/kWh now or wait 6 hours and run in Region B at 120 gCO2/kWh. The job draws 200 kW IT power and PUE is 1.2 in both regions.
question: "How much operational carbon is saved by waiting for Region B at 120 gCO2/kWh instead of running now in Region A at 500 gCO2/kWh?"
details:
  realistic_solution: 'Facility power is 200 x 1.2 = 240 kW. Energy is 240 x 10 = 2,400 kWh. Region A emits 1,200 kg CO2; Region B emits 288 kg. Waiting saves about 912 kg CO2 if the delay is acceptable.'
  common_mistake: 'Choosing the immediate region without quantifying carbon intensity difference and schedule flexibility.'
  napkin_math: |
    **Assumptions & Constraints:**
    - IT Power: 200 kW.
    - Facility PUE: 1.2.
    - Job Duration: 10 hours.
    
    **Calculations:**
    - Total Facility Power = 200 kW * 1.2 PUE = 240 kW.
    - Total Energy Consumed = 240 kW * 10 hours = 2,400 kWh.
    - Region A Carbon = 2,400 kWh * 0.5 kgCO2/kWh = 1,200 kg CO2.
    - Region B Carbon = 2,400 kWh * 0.12 kgCO2/kWh = 288 kg CO2.
    - Savings = 1,200 kg - 288 kg = 912 kg CO2.
    
    **Conclusion & Interpretation:**
    - **Result: 912 kg CO2 Saved (Sustainability Bound)**. By utilizing carbon-aware spatial and temporal scheduling, the training job drastically reduces its carbon footprint, provided the 6-hour delay is within SLO.
