title: The Power-Clock Anomaly
scenario: To save datacenter power, you underclock the GPU cores of a cluster running Whisper (audio transcription) at batch size 1. You drop the core clock by 40% (1410 MHz -> 846 MHz), reducing peak TFLOPS by 40%. You expect a 40% drop in throughput. Surprisingly, throughput only drops by 1%, while GPU power consumption drops by 35%.
question: Why does underclocking cores by 40% barely affect Whisper batch-1 throughput while cutting power by 35%?
details:
  realistic_solution: The Whisper workload at batch size 1 has an extremely low arithmetic intensity (dominated by memory fetches for autoregressive decoding), placing it far to the left of the Roofline ridge point. It is entirely memory-bandwidth bound. The GPU ALUs spend the vast majority of their time idle, waiting for data from HBM. Lowering the core clock reduces the horizontal compute ceiling of the Roofline model but leaves the sloped memory bandwidth ceiling unchanged. Because the workload's operating point is on the slope, dropping the compute ceiling has almost zero effect on performance.
  common_mistake: |
    **The Pitfall:** Assuming workload throughput scales linearly with core clock frequency (compute capacity) for all deep learning tasks.
    **The Rationale:** Failing to apply the Roofline model to determine whether a workload is compute-bound or memory-bound.
    **The Consequence:** Missing massive power-saving opportunities for memory-bound applications in production.
  napkin_math: |
    **Assumptions & Constraints:**
    - Original Ridge Point: 312 TFLOPS / 2 TB/s = 156 FLOPs/Byte.
    - Whisper BS=1 Arithmetic Intensity: ≈ 2 FLOPs/Byte.

    **Calculations:**
    - Underclocked Compute: 312 TFLOPS * 0.6 = 187.2 TFLOPS.
    - New Ridge Point: 187.2 TFLOPS / 2 TB/s ≈ 93 FLOPs/Byte.

    **Conclusion & Interpretation:**
    - **Result: 2 FLOPs/Byte (Memory-Bound)**. Since 2 << 93, the workload remains completely limited by memory bandwidth, leaving throughput unaffected.
