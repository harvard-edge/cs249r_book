title: Incomplete Power Envelope Decision
scenario: A product manager asks whether to run a model locally on device or in cloud to save energy. They provide model FLOPs but omit device active power, idle power, network radio energy, cloud PUE, utilization, and request frequency.
question: What information is missing before deciding whether local or cloud inference saves energy?
details:
  realistic_solution: You need local active and idle power, runtime, radio transmit/receive energy, cloud accelerator energy per request, PUE, utilization, and request frequency. FLOPs alone cannot decide energy because data movement and idle power may dominate.
  common_mistake: |
    **The Pitfall:** Comparing only model FLOPs and assuming lower compute always means lower energy.
    **The Rationale:** FLOPs are an easy proxy for compute, but they ignore the massive energy cost of moving data (radio/network) and waking devices.
    **The Consequence:** Recommending an architecture that drains user batteries simply because the cloud compute looked heavier on paper.
  napkin_math: |
    **Assumptions & Constraints:**
    - Local Energy = (Active power * runtime) + radio_energy.
    - Cloud Energy = (Accelerator IT energy * PUE) + network transmission energy.

    **Calculations:**
    - FLOPs ignore PUE, radio energy, and idle time penalties.

    **Conclusion & Interpretation:**
    - **Result: Data-Movement Bound**. FLOPs are an insufficient proxy for true energy consumption.
