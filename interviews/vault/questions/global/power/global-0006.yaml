title: The Battery Drain Math
scenario: A mobile model consumes 2 Watts during inference. Your phone battery has 15 Watt-hours of capacity.
question: How many hours of continuous inference could you theoretically run on this 15 Watt-hour battery?
details:
  realistic_solution: '7.5 hours of continuous inference. Energy = Power x Time, so Time = Energy / Power = 15 Wh / 2 W = 7.5 hours. However, this is a theoretical upper bound assuming the model is the only power consumer. In practice, the display (2-5 W), cellular radio (1-3 W), and baseline SoC power (~0.5 W) consume additional energy, so realistic continuous inference time would be closer to 1.5-2 hours. This napkin math illustrates why mobile ML engineers focus obsessively on reducing model power consumption - every watt directly trades against battery life. Techniques like INT8 quantization (reduces power 3-4x) and duty cycling are essential.'
  common_mistake: |
    **The Pitfall:** Confusing Watts (Power) with Watt-hours (Energy).
    **The Rationale:** Misunderstanding basic electrical engineering units when estimating mobile device constraints.
    **The Consequence:** Calculating incorrect battery life estimates or failing to realize that every Watt saved directly extends runtime.
  napkin_math: |
    **Assumptions & Constraints:**
    - Battery capacity: 15 Watt-hours (Wh).
    - Power consumption: 2 Watts (W).
    
    **Calculations:**
    - Time = Energy / Power = 15 Wh / 2 W = 7.5 hours.
    
    **Conclusion & Interpretation:**
    - **Result: 7.5 Hours (Energy-Bound)**. 7.5 hours is the theoretical max, proving power is the strict mobile constraint.
