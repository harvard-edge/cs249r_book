title: Optimal Power Cap for Training Cost Minimization
scenario: Your GPU cluster allows per-GPU power capping via nvidia-smi. At 700W (default), a training step takes 100ms. At 400W, the step takes 135ms. You pay $0.12/kWh for electricity and $4/GPU-hr for the lease.
question: How would you analyze the cost-optimal power cap?
details:
  realistic_solution: At 700W, electricity is $0.084/hr and lease is $4/hr. At 400W, electricity is $0.048/hr and lease is $4/hr. Because the fixed hardware lease cost massively dominates electricity, slowing down the training by capping power vastly increases total cost per step.
  common_mistake: |
    **The Pitfall:** Only optimizing for instantaneous electricity cost.
    **The Rationale:** Power capping lowers the instantaneous draw, so it superficially feels cheaper.
    **The Consequence:** Slower training extends the extremely expensive GPU lease time, increasing total capital expenditure.
  napkin_math: |
    **Assumptions & Constraints:**
    - 700W step = 100ms. 400W step = 135ms.
    - Electricity = $0.12/kWh. Lease = $4/hr.

    **Calculations:**
    - 700W Total Cost/hr = $0.084 (Elec) + $4 (Lease) = $4.084. Cost/step = $4.084 / 36,000 = $0.000113.
    - 400W Total Cost/hr = $0.048 (Elec) + $4 (Lease) = $4.048. Cost/step = $4.048 / 26,666 = $0.000152.

    **Conclusion & Interpretation:**
    - **Result: Cost-Bound.** The 700W setting is 25% cheaper per step because the fixed $4/hr lease dominates the marginal electricity savings.
