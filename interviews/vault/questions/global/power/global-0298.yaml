title: Mysterious 15% Throughput Drop at Noon
scenario: Your 64-node training cluster consistently shows 15% lower throughput between 11 AM and 3 PM compared to nighttime performance. GPU utilization stays at 98%. No other jobs are running. The cluster is in a shared data center facility.
question: What is causing the consistent 15% throughput drop between 11 AM and 3 PM?
details:
  realistic_solution: 'Root cause: thermal throttling due to elevated ambient temperature during peak daytime hours. The data center cooling system struggles to maintain inlet temperature during hot afternoons. When GPU junction temperature exceeds the throttle point (e.g., 83°C), the hardware reduces clock frequency to prevent thermal damage, directly reducing FLOPS. At 98% utilization, the GPU is fully busy — just at a lower clock. Diagnosis: Check GPU temperature logs and clock frequencies (GPU clock drops from 1410 MHz to ~1200 MHz). Fix: lower GPU power limit to 350W, request the facility lower the cold aisle temperature setpoint, or add supplemental cooling.'
  common_mistake: |
    **The Pitfall:** Suspecting a software issue (cron job, log rotation, network congestion).
    **The Rationale:** Overlooking hardware and facility environmental factors that correlate strongly with time-of-day.
    **The Consequence:** Spending weeks debugging Kubernetes schedules while the GPUs are simply overheating every afternoon.
  napkin_math: |
    **Assumptions & Constraints:**
    - Daytime Ambient Rise: +8°C pushes junction to 83°C throttle point.
    - Clock drop: 1410 MHz down to 1200 MHz.

    **Calculations:**
    - Clock Throttle: 1410 -> 1200 MHz = 15% frequency reduction.
    - Power Limit Fix: Dropping power limit to 350W (12.5% cut) lowers junction temp by ~5°C.

    **Conclusion & Interpretation:**
    - **Result: 15% Throttle (Thermal-Bound)**. The 15% clock throttle perfectly correlates with the throughput drop. Lowering the power limit regains thermal headroom and stability.
