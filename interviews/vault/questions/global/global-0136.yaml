title: Disaggregated Prefill Network Bottleneck
scenario: 'To optimize your Llama-3 70B serving cluster, you implement disaggregated architecture: separating Prefill onto A100s and Decode onto H100s. For a 10k token prompt, the Prefill TTFT is 150ms and Decode TPOT is 20ms. However, end-to-end TTFT measured by the client spikes to ~400ms. The nodes are connected via a 100 Gbps Ethernet network.'
question: Why does disaggregated prefill/decode raise client TTFT to about 400ms over 100 Gbps Ethernet, and how would you fix it?
details:
  realistic_solution: 'Decompose the end-to-end TTFT latency: Client TTFT = Prefill Compute + KV Cache Network Transfer + Initial Decode Step + Network RTT. The hidden bottleneck is the KV cache transfer. Llama-3 70B has 80 layers, 8 KV heads, 128 dim. A 10k token prompt generates ~3.27 GB of KV cache. Over a 100 Gbps (~10 GB/s actual) network, transferring this cache takes ~327ms. 150ms compute + 327ms transfer = 477ms TTFT. To fix this architecture, upgrade the inter-node network to Infiniband (400 Gbps / 800 Gbps) with RDMA, or abandon disaggregation for long-context requests.'
  common_mistake: |
    **The Pitfall:** Assuming the prefill compute is bottlenecked and buying faster GPUs for the prefill cluster.
    **The Rationale:** Candidates look at the TTFT spike and naturally assume the prefill phase is slow, ignoring the immense network payload of the KV cache.
    **The Consequence:** Wasting budget on compute upgrades that fail to resolve the underlying network transfer bottleneck.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 10k tokens, Llama-3 70B.
       - 100 Gbps Ethernet = 12.5 GB/s theoretical, ~10 GB/s actual.
       - Prefill compute = 150ms.
    2. **Calculations:**
       - KV Cache size = 2 * 80 layers * 8 heads * 128 dim * 2 bytes * 10,000 = 3.27 GB.
       - Transfer latency = 3.27 GB / 10 GB/s = 327ms.
       - Total TTFT = 150ms + 327ms = 477ms.
    3. **Conclusion & Interpretation:**
       - **Result: Network-Bandwidth Bound**
