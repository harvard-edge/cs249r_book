title: Disaggregated Prefill Network Bottleneck
scenario: 'To optimize your Llama-3 70B serving cluster, you implement disaggregated architecture: separating
  Prefill (Compute-bound) onto A100s and Decode (Memory-bound) onto H100s. For a 10k token prompt, the
  Prefill TTFT is 150ms and Decode TPOT is 20ms. However, end-to-end TTFT measured by the client spikes
  to ~400ms. The nodes are connected via a 100 Gbps Ethernet network.'
question: "Why does disaggregated prefill/decode raise client TTFT to about 400ms over 100 Gbps Ethernet, and how would you fix it?"
details:
  realistic_solution: 'Decompose the end-to-end TTFT latency: Client TTFT = Prefill Compute + KV Cache
    Network Transfer + Initial Decode Step + Network RTT. The hidden bottleneck is the KV cache transfer.
    Llama-3 70B has 80 layers, 8 KV heads, 128 dim. A 10k token prompt generates ~3.27 GB of KV cache.
    Over a 100 Gbps (12.5 GB/s theoretical, ~10 GB/s actual) network, transferring this cache takes ~327ms.
    150ms compute + 327ms transfer = 477ms TTFT. To fix this architecture, you must upgrade the inter-node
    network to Infiniband (400 Gbps / 800 Gbps) with RDMA to reduce transfer time to <50ms, or abandon
    disaggregation for long-context requests and route them to single nodes.'
  common_mistake: Assuming the prefill compute is bottlenecked and buying faster GPUs for the prefill
    cluster.
  napkin_math: KV Cache size per token = 2 (K,V) * 80 layers * 8 heads * 128 dim * 2 bytes = 327,680 bytes
    (~327 KB). For 10,000 tokens = 3.27 GB. Network speed = 100 Gbps = 12.5 GB/s. Transfer latency = 3.27
    GB / 10 GB/s (effective) = 327ms. Total TTFT = 150ms + 327ms = 477ms.
