title: On-Prem vs Cloud GPU Cluster Economics
scenario: Your team needs 64 A100-80GB GPUs for 3 years. You must compare buying 8x DGX A100 nodes ($200K each = $1.6M upfront) with $50K/year operational costs (power, cooling, staff), versus renting 64 A100 GPUs on-demand at $3.00/GPU-hour. Assume 70% average utilization.
question: "At what utilization does an on-prem deployment break even compared to cloud renting?"
details:
  realistic_solution: 'Cloud cost at 70% utilization: 64 GPUs × 8,760h/yr × 0.70 × $3.00 × 3 years = $3,532,032. On-prem: $1.6M hardware + $50K × 3 ops = $1.75M, plus residual value (~$200K after 3 years for 2-year-old GPUs). Net on-prem: $1.55M. On-prem is over 2x cheaper at 70% utilization. Break-even utilization: on-prem cost $1.75M = cloud cost at break-even. Cloud cost = 64 × 8760 × U × $3 × 3 = $5,045,760 × U. Break-even: $1,750,000 / $5,045,760 = 34.7% utilization. Below 35% utilization, cloud wins. Above 35%, on-prem wins. Real-world factors: on-prem requires 6-12 month lead time for procurement, staff expertise, facility space. Cloud provides elasticity — burst to 256 GPUs for a week, impossible with on-prem. Hybrid approach: on-prem for baseline steady-state load + cloud for bursting.'
  common_mistake: 'Comparing on-prem at 100% utilization against cloud at 100% utilization. Real on-prem runs at 60-80% utilization; cloud is pay-per-use. The break-even depends critically on utilization.'
  napkin_math: |
    **Assumptions & Constraints:**
    - 64 GPUs needed for 3 years (26,280 hours).
    - Cloud cost = $3.00/GPU-hour.
    - On-prem CapEx = $1.6M, OpEx = $150K over 3 years.
    
    **Calculations:**
    - Cloud cost at 100% util = 64 * 26280 * $3 = $5.04M.
    - Cloud cost at 70% util = $5.04M * 0.7 = $3.53M.
    - Total On-prem cost = $1.6M + $150K = $1.75M.
    - Break-even utilization (U): $5.04M * U = $1.75M.
    - U = 1.75 / 5.04 = 34.7%.
    
    **Conclusion & Interpretation:**
    - **Result: 34.7% Utilization Break-Even (Cost Efficiency Bound)**. If the cluster is utilized more than 35% of the time, building on-prem hardware is cheaper than renting cloud instances over a 3-year lifespan.
