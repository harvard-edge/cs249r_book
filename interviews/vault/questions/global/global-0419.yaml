title: Incomplete Carbon-Aware Placement Plan
scenario: A scheduler wants to route training jobs to the lowest-carbon region. It knows each job needs 10,000 GPU-hours but lacks time-varying grid carbon, PUE, queue delay, data residency limits, and embodied carbon policy.
question: "What information is missing before carbon-aware placement of a 10,000 GPU-hour training job can be optimized effectively?"
details:
  realistic_solution: 'You need region/time carbon intensity, PUE, average GPU power, queue delay, data residency constraints, data transfer cost, and whether embodied carbon is included. GPU-hours alone only scale the formula; they do not determine the best region.'
  common_mistake: |
    **The Pitfall:** Choosing the region with the lowest annual average carbon intensity.
    **The Rationale:** Candidates use static, high-level metrics instead of dynamic, real-time factors required for effective placement.
    **The Consequence:** Placing jobs in supposedly clean regions during times when they actually rely on carbon-heavy fallback power.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 10,000 GPU-hours required.
    2. **Calculations:**
       - Operational CO2 = 10,000 * average kW/GPU * PUE * kgCO2/kWh.
       - Without kW, PUE, and time-varying intensity, exact placement cannot be resolved.
    3. **Conclusion & Interpretation:**
       - **Result: Information-Bound.** Missing critical dynamic parameters invalidates any naive placement heuristic.
