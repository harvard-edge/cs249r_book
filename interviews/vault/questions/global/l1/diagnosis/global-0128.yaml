schema_version: 1
id: global-0128
title: The FlashAttention Paradox
topic: vram-budgeting
status: published
provenance: imported
scenario: You serve a Vision Transformer on an A100 (40MB L2 cache, 2TB/s HBM). The sequence length is
  196 (14x14 patches), with embedding dim 1024. Standard PyTorch attention takes 0.8ms. You upgrade to
  FlashAttention-2, expecting a 2x speedup by eliminating HBM read/writes. Instead, latency increases
  to 1.2ms.
details:
  realistic_solution: FlashAttention optimizes the memory roofline by tiling the attention matrix to avoid
    writing the O(N^2) intermediate attention matrix to HBM. It trades memory bandwidth for extra compute
    (recomputation in backward, and extra ALU instructions for tiling/scaling in forward). However, for
    very short sequence lengths like 196, the attention matrix is extremely small. It fits entirely within
    the A100's massive 40MB L2 cache. Therefore, standard attention is not HBM-bandwidth bound; it runs
    at L2 cache bandwidth speeds (~5-10 TB/s). Because the memory bottleneck FlashAttention solves doesn't
    exist for this workload, you only incur the extra ALU overhead, shifting the workload up the compute
    ceiling and increasing latency.
  common_mistake: Assuming FlashAttention is always faster because it eliminates HBM reads/writes, regardless
    of sequence length.
  napkin_math: Sequence length 196, dim 1024. Standard attention matrix is 196*196*2B (FP16) = 76.8KB.
    This tiny matrix easily fits entirely in the A100's 40MB L2 cache. FlashAttention avoids HBM roundtrips
    by fusing ops in SRAM, but since 76KB doesn't spill to the 2TB/s HBM anyway, the memory savings are
    moot. The extra FLOPs overhead actually makes it slower for small sequences.
