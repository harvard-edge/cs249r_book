id: global-0132
title: The KV Cache Roofline Collapse
topic: vram-budgeting
status: published
provenance: imported
scenario: Serving an LLM on an A100 (40MB L2 cache, 2TB/s HBM). At batch size 16 (Sequence Length = 1024),
  throughput is 500 tokens/s. To maximize throughput, you increase batch size to 128. You expect throughput
  to scale linearly as arithmetic intensity increases. Instead, throughput drops to 300 tokens/s.
details:
  realistic_solution: The system hit an L2 cache capacity cliff, causing the effective memory bandwidth
    roofline to collapse. At smaller batch sizes, the entire KV cache for the batch fits within the A100's
    massive 40MB L2 cache. The attention mechanism can read the KV cache at L2 bandwidth speeds (~5 TB/s).
    When the batch size is increased to 128, the KV cache size exceeds the L2 capacity. The KV cache spills
    into HBM. Because attention is a memory-bound operation, forcing it to fetch from HBM (2 TB/s) instead
    of L2 drops the effective bandwidth by over 2.5x. The roofline ceiling shifts downward abruptly, throttling
    the throughput despite the higher batch size.
  common_mistake: Assuming increasing batch size strictly increases arithmetic intensity and throughput
    without encountering architectural memory cliffs.
  napkin_math: 'KV Cache per token = 2KB (assuming specific hidden dim/layers).

    BS=16, Seq=1024: 16 * 1024 * 2KB = 32MB. 32MB < 40MB (Fits in L2 @ 5 TB/s).

    BS=128, Seq=1024: 128 * 1024 * 2KB = 256MB. 256MB >> 40MB (Spills to HBM @ 2 TB/s).

    Bandwidth drops by over 2.5x. Arithmetic intensity increase from batching weights doesn''t offset
    the massive latency penalty of reading 256MB from HBM for every generation step.'
