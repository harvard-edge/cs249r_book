schema_version: 1
id: global-0282
title: 3D Parallelism Configuration for 175B
topic: data-parallelism
status: published
provenance: imported
scenario: You have 512 H100 GPUs across 64 nodes (8 GPUs/node, NVLink within node, 400Gb/s InfiniBand
  between nodes). Design the parallelism configuration (DP, TP, PP, micro-batch size) to train a 175B
  GPT-style model with global batch size 2048 and sequence length 2048. Justify each dimension.
details:
  realistic_solution: 'Configuration: TP=8, PP=4, DP=16 (8×4×16 = 512). Justification: (1) TP=8 within
    each node: uses NVLink (900 GB/s). 175B/4 PP stages = ~44B params per stage. TP=8 splits each stage:
    44B/8 = 5.5B params/GPU = 11 GB FP16 weights per GPU. With mixed-precision training overhead (16B/param
    for optimizer): 5.5B × 16 = 88 GB — tight fit on 80 GB. Need ZeRO Stage 1 to partition optimizer across
    DP ranks, reducing per-GPU optimizer memory 16x. Result: ~11 GB weights + 88/16 = 5.5 GB optimizer
    = 16.5 GB + activations. (2) PP=4 across 4 consecutive nodes: 175B / 4 = ~44B params per stage. Pipeline
    bubble: (4-1)/m where m = micro-batches. Local batch = global batch 2048 / DP=16 = 128 samples per
    DP rank. With m=32 micro-batches of size 4: bubble = 3/32 = 9.375%. (3) DP=16 across the 16 groups
    of 4 nodes: gradient AllReduce over InfiniBand. Gradients per DP rank = 175B × 2B / (8 TP × 4 PP)
    = 10.9 GB. AllReduce over 16 ranks at 50 GB/s: ~0.44 seconds (overlapped with backward). (4) Micro-batch:
    global batch 2048 / DP=16 = 128 samples per DP rank. PP with m=32 micro-batches of size 4 each. Sequence
    length 2048 × hidden 12288 × 4 ≈ 200 MB activations per micro-batch — manageable with activation checkpointing.'
  common_mistake: Choosing TP=8 and PP=64 without considering that PP=64 creates massive pipeline bubbles
    and underutilizes the fast NVLink interconnect within each node.
  napkin_math: 'TP=8: NVLink AllReduce ~5ms/step. PP=4: bubble (4-1)/32 = 9.375% with m=32 micro-batches
    of size 4. DP=16: gradient sync 10.9 GB / 50 GB/s = 0.22s (overlapped). Total overhead: ~9.375% bubble
    + ~2% TP comm + ~1% residual DP = ~12.4%.'
