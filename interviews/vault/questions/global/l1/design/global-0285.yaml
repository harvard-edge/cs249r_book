schema_version: 1
id: global-0285
title: Memory Budget for High-Concurrency LLM Serving
topic: memory-pressure-management
status: published
provenance: imported
scenario: Design the memory allocation strategy for serving Llama-2-70B on 2× A100-80GB (TP=2) with a
  target of 256 concurrent requests at 4096 max context length. You have 160 GB total VRAM. Specify exactly
  how memory is divided between model weights, KV cache, activations, and system overhead. Identify the
  binding constraint.
details:
  realistic_solution: 'Memory budget: (1) Model weights (INT8): 70B × 1B = 70 GB, split TP=2: 35 GB/GPU.
    (2) CUDA context + framework overhead: ~2 GB/GPU. (3) Activation workspace: for batch=256, seq=4096,
    hidden=8192: chunked prefill (chunk=512): 256 × 512 × 8192 × 2B = 2 GB. Split TP=2: 1 GB/GPU. (4)
    Available for KV cache: 80 - 35 - 2 - 1 = 42 GB/GPU. (5) KV cache per token: 2 × 80 layers × 8 KV
    heads × 128 dim × 2B = 320 KB total. Split TP=2: 160 KB/GPU per token. (6) Max tokens in KV cache:
    42 GB / 160 KB = 262,144 tokens total maximum length. (7) 256 requests × 4096 tokens = 1,048,576 tokens
    needed. Available: 262K — only supports 64 concurrent requests at full context! Binding constraint:
    KV cache. Solutions: (a) use INT8 KV cache (halves to 80 KB/token → 524K tokens, supports 128 concurrent),
    (b) reduce max context to 1024 (supports 256 concurrency), or scale out TP to TP=8.'
  common_mistake: Allocating all remaining memory after model weights to KV cache without reserving space
    for activations, CUDA context, and memory fragmentation. This causes OOM under load.
  napkin_math: 'Model: 35 GB/GPU. KV budget: 42 GB/GPU. KV per token (TP=2): 160 KB/GPU. Max tokens: 42
    GB / 160 KB = 262,144 tokens total across the sequence. Need: 256 × 4096 = 1.05M. Deficit: ~786K tokens.
    Supports only 64 concurrent requests. INT8 KV cache doubles capacity to 524K → still fails 256 concurrent.'
