schema_version: 1
id: global-0291
title: Speculative Decoding Architecture
topic: latency-decomposition
status: published
provenance: imported
scenario: Design a speculative decoding system for a 70B target model using a 1B draft model. Both run
  on the same A100-80GB. The draft model proposes K=5 candidate tokens per step. The target model verifies
  all K tokens in a single forward pass. Calculate the expected speedup assuming 70% draft acceptance
  rate and specify memory allocation.
details:
  realistic_solution: 'Design: (1) Memory allocation on A100-80GB: target model INT8 = 70 GB. Draft model
    FP16 = 2 GB. KV cache budget: 80 - 70 - 2 - 2 (overhead) = 6 GB. At 320 KB/token for 70B KV cache:
    6 GB / 320 KB = 19,200 tokens max context — sufficient for most use cases. (2) Speculative decoding
    flow: draft model generates K=5 tokens autoregressively (5 forward passes). Target model verifies
    all 5 in one forward pass (parallel verification). On rejection at position i, discard tokens i+1..K
    and resample from target distribution at position i. (3) Expected speedup: with acceptance rate α=0.7
    and finite K=5, expected tokens per speculation round = (1−α^(K+1))/(1−α) = (1−0.7^6)/0.3 = 0.8824/0.3
    ≈ 2.94 tokens per round (geometric series truncated at K). Draft overhead: 5ms total for K=5. Target
    verify: 35ms. Total round time: 40ms for 2.94 tokens → 13.6ms/token. Baseline: 35ms/token. Speedup
    = 35/13.6 ≈ 2.57x. (4) Optimization: increase K for higher α models (if α=0.85, K=5: (1−0.85^6)/0.15
    = 0.6228/0.15 ≈ 4.15 tokens/round).'
  common_mistake: Assuming speculative decoding always gives K× speedup. The actual speedup depends on
    the acceptance rate and the overhead of running the draft model. With 70% acceptance rate and K=5,
    expected accepted tokens is less than 5.
  napkin_math: 'Expected accepted tokens (finite K=5): (1-0.7^6)/(1-0.7) = (1-0.1176)/0.3 = 2.94/round.
    Draft cost: 5 × 1ms = 5ms. Target verify: 35ms (INT8 70 GB / 2 TB/s). Round time: 40ms for 2.94 tokens
    = 13.6ms/token vs 35ms/token baseline. Speedup: 35/13.6 = 2.57x.'
