id: global-0289
title: Power and Cooling for a 1000-GPU Cluster
topic: energy-per-operation
status: published
provenance: imported
scenario: 'Design the power and cooling architecture for a 1000 H100 GPU data center (125 DGX nodes, each
  at 10.2 kW). Total IT load is 1.275 MW. Requirements: PUE < 1.15, support for 50 kW/rack density, and
  N+1 redundancy on all power paths. Specify the cooling technology, power distribution, and UPS configuration.'
details:
  realistic_solution: 'Design: (1) Cooling: direct-to-chip liquid cooling (rear-door heat exchangers or
    cold plates). Each H100 SXM at 700W generates ~95% of heat through the GPU die. Cold plates with 40°C
    supply water remove heat directly, no air gap. Facility cooling: cooling towers or dry coolers (free
    cooling when ambient < 35°C). This achieves cooling PUE contribution of 0.05-0.08 (vs 0.3-0.5 for
    air). (2) Power distribution: utility feed → 2× 1.5 MVA transformers (N+1) → medium-voltage switchgear
    → PDUs → rack-level busway. Each rack: 40.8 kW / 208V 3-phase = 113A per rack. Use 60A circuits ×
    3 per rack for N+1 within rack. Total racks: 125 nodes / 4 nodes per rack = 32 racks (at 40.8 kW/rack).
    (3) UPS: 3× 750 kVA UPS modules (N+1) with 10-minute battery backup for graceful checkpoint + shutdown.
    Battery bank: 1.275 MW × 10 min = 212.5 kWh → ~250 kWh with efficiency losses. (4) PUE calculation:
    IT load 1.275 MW + cooling 0.08 MW + power distribution losses 0.06 MW + lighting/misc 0.01 MW = total
    1.425 MW. PUE = 1.425/1.275 = 1.118 < 1.15 requirement met.'
  common_mistake: Using traditional air cooling for H100-class density. At 50 kW/rack, air cooling requires
    impossibly high airflow. Liquid cooling is mandatory above ~25-30 kW/rack.
  napkin_math: '1000 H100 × 700W = 700 kW GPU power. 125 nodes × 10.2 kW = 1.275 MW IT. Total facility:
    IT 1.275 MW + cooling 0.08 MW + distribution losses 0.06 MW + misc 0.01 MW = 1.425 MW. PUE = 1.425/1.275
    = 1.118 ≤ 1.15. UPS: 1.275 MW × 10 min = 212.5 kWh battery. 32 racks at 40.8 kW each.'
