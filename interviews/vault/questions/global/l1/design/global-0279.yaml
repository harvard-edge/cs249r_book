schema_version: 1
id: global-0279
title: Multi-LoRA Serving Architecture
topic: latency-decomposition
status: published
provenance: imported
scenario: You need to serve 200 fine-tuned variants of a 70B base model, each with LoRA adapters (rank=16,
  applied to Q,K,V,O projections). Total traffic is 5K requests/sec with uneven distribution (top 10 adapters
  get 80% of traffic). Design a serving architecture that minimizes GPU cost while meeting P99 < 300ms
  TTFT.
details:
  realistic_solution: 'Architecture: shared base model with hot-swappable LoRA adapters. (1) Base model
    deployment: 70B INT8 = 70 GB per replica. Use TP=2 across 2 A100-80GB (35 GB/GPU, leaving 45 GB for
    KV cache and adapters). (2) LoRA adapter size: rank=16, 4 projections per layer, 80 layers. Per adapter:
    4 projections × 2 matrices × (8192 × 16) params × 2B × 80 layers = 167.7 MB FP16. All 200 adapters:
    33.5 GB — fits in host RAM with GPU-side caching. (3) Adapter scheduling: keep top-20 adapters (~90%
    traffic) in GPU memory permanently (20 × 167.7 MB = 3.35 GB). Remaining adapters loaded on-demand
    from CPU (PCIe: 167.7 MB / 32 GB/s = 5.2ms — well within SLA). (4) Capacity planning: 5K req/s with
    continuous batching, batch=64 per replica. Per replica throughput: ~250 req/s. Need 5000/250 = 20
    replicas = 40 A100 GPUs. Without LoRA sharing: 200 models × 2 GPUs = 400 GPUs. LoRA sharing saves
    360 GPUs (90% reduction).'
  common_mistake: Deploying each adapter as a separate model instance — that would require 200 × 70B model
    copies, consuming petabytes of VRAM. LoRA's whole point is that adapters share the base model.
  napkin_math: 'Adapter size: 4 × 2 × 8192 × 16 × 2B × 80 layers = 167.7 MB each. 200 adapters = 33.5
    GB total. Base model: 70 GB INT8. 20 replicas × 2 GPUs = 40 GPUs vs 400 without sharing. 10x GPU reduction.'
