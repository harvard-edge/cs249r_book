id: global-0044
title: The 10,000-Experiment Infrastructure Challenge
topic: mlops-lifecycle
status: published
provenance: imported
scenario: 'You are the Staff engineer responsible for ML infrastructure at a company that runs 10,000
  experiments per month across 20 teams. The current system uses a shared MLflow instance backed by a
  PostgreSQL database. The system is failing: experiment logging adds 200ms of latency per training step
  (with 10,000 steps per experiment, this is 33 minutes of overhead per experiment), queries for cross-team
  experiment comparison time out, and the metadata store has grown to 500GB. Design the next-generation
  experiment tracking infrastructure that can scale to 100,000 experiments per month.'
details:
  realistic_solution: 'Separate the write path from the read path (CQRS pattern for experiment tracking):
    Write path (hot, latency-sensitive): Replace synchronous RPCs with asynchronous, buffered logging.
    Each training job writes metrics to a local ring buffer and flushes to a distributed log (Kafka) every
    N seconds. Training step overhead drops from 200ms to < 1ms (local memory write). The log is append-only
    and partitioned by team. Read path (warm, query-heavy): A stream processor (Flink/Spark Streaming)
    consumes the Kafka log, transforms metrics into a columnar format (Parquet), and materializes views
    into a query engine (ClickHouse/DuckDB). Cross-team queries hit the materialized views, not the raw
    log. Storage tier: Hot metrics (last 7 days) in ClickHouse for interactive queries. Cold metrics (7-90
    days) in Parquet on S3 with a catalog (Iceberg/Hive). Archive (90+ days) in compressed Parquet with
    metadata-only index. Model artifacts stored separately in object storage with content-addressable
    hashing for deduplication. Scale calculation: 100K experiments × 10K steps × 10 metrics × 8 bytes
    = 80 TB/month of raw metrics. With columnar compression (10×): 8 GB/month. With 90-day hot retention:
    24 TB in ClickHouse.'
  common_mistake: 'Proposing to ''just shard the database'' or ''switch to MongoDB.'' The problem is architectural:
    synchronous logging on the training critical path and a single queryable store for both write-heavy
    (logging) and read-heavy (analysis) workloads.'
  napkin_math: 'Current system: 10K experiments * 10K steps * 200ms = 33 min overhead/experiment * 10K
    experiments = 5,500 GPU-hours/month wasted on logging. At $3/GPU-hr = $16,500/month. New system: 10K
    experiments * 10K steps * 1ms = 10 seconds/experiment. Total: 10K * 10s / 3600 = 27.8 GPU-hours/month.
    Savings: 5,472 GPU-hours/month = $16,417/month. Storage (at current 10K experiments/month): 10K *
    10K steps * 10 metrics * 8 bytes = 8 GB/month raw. With columnar compression (10x): 800 GB/month.
    With 90-day hot retention: 2.4 TB in ClickHouse. Scaling to 100K experiments/month: 80 TB/month raw,
    8 GB/month compressed, 24 TB hot. ClickHouse cluster: ~$5K/month. Kafka cluster: ~$3K/month. Total
    infra: ~$10K/month vs $16.5K/month wasted on logging overhead alone. The system pays for itself.'
