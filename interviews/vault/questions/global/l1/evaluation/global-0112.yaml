schema_version: 1
id: global-0112
title: Recomputation and Arithmetic Intensity
topic: roofline-analysis
status: published
provenance: imported
scenario: While training a foundation model with a 32k context window, standard attention consumes 65%
  of the step time. You implement FlashAttention, which actually increases the total number of FLOPs performed
  by ~15% due to recomputation in the backward pass. Despite doing more math, the attention phase executes
  4x faster. Explain the physical hardware mechanism enabling this.
details:
  realistic_solution: Standard attention materializes the massive N x N attention score matrix to High
    Bandwidth Memory (HBM). For N=32k, this requires reading and writing gigabytes of data per layer,
    forcing the operation deep into the memory-bandwidth bound region of the Roofline model. FlashAttention
    uses tiling to fuse the Softmax and matrix multiplications, keeping the intermediate N x N matrix
    entirely in fast, on-chip SRAM. By doing so, it drastically reduces HBM reads/writes. Even though
    the backward pass recomputes the forward pass (increasing total FLOPs), the Arithmetic Intensity (FLOPs
    per byte of HBM traffic) increases by orders of magnitude. The workload shifts from the memory-bound
    slope to the compute-bound ceiling. Because SRAM bandwidth is terabytes per second faster than HBM,
    the ALUs are finally kept fed, resulting in a 4x speedup despite the extra math.
  common_mistake: Explaining that FlashAttention reduces memory footprint without connecting it to arithmetic
    intensity and HBM bandwidth ceilings.
  napkin_math: Seq len N=32768, heads=32. Standard attention reads/writes O(N^2) to HBM. N^2 matrix =
    32768 * 32768 * 2 bytes ≈ 2.1 GB per head. For 32 heads, that's 67 GB of HBM traffic per layer just
    for attention scores. FlashAttention only reads/writes O(N * d) to HBM. 32768 * 128 * 2 bytes ≈ 8
    MB per head. HBM traffic drops from 67 GB to ~256 MB. Arithmetic intensity shifts from I ≈ 1 to I
    ≈ 128, moving from bandwidth-starved to compute-saturated.
