id: global-0111
title: The Quantization Roofline Paradox
topic: quantization-fundamentals
status: published
provenance: imported
scenario: Your team quantizes an RNN-based sequence model from FP16 to INT8. The target accelerator provides
  4x more INT8 TOPS than FP16 TFLOPS, and the memory footprint is halved. The team expects a 3x-4x latency
  reduction, but the end-to-end latency only improves by 18%. Identify the discrepancy using workload
  characteristics.
details:
  realistic_solution: 'RNNs process tokens sequentially, requiring the entire weight matrix to be loaded
    from HBM for every token. This makes them heavily memory-bandwidth bound (Arithmetic Intensity I ≈
    2 FLOPs/byte). When you move from FP16 to INT8, you halve the memory traffic, which theoretically
    doubles the speed of the memory-bound portion. However, the 4x increase in compute TOPS is completely
    irrelevant because the ALUs were already starving for data; raising the compute ceiling doesn''t help
    a workload stuck on the memory bandwidth slope. Furthermore, the 18% actual improvement (instead of
    50%) is due to two factors: 1) Quantization/dequantization overheads inject new compute operations
    that disrupt memory access pipelining, and 2) the workload is likely hitting kernel launch latency
    limits or PCIe overheads, meaning it is no longer just bandwidth-bound, but latency-bound.'
  common_mistake: Assuming that because hardware TOPS increase by 4x, the workload execution speed will
    scale proportionally.
  napkin_math: 'Original FP16: 10ms total latency (9ms memory transfer, 1ms compute). INT8 halves memory
    transfer: 9ms / 2 = 4.5ms. INT8 compute is 4x faster: 1ms / 4 = 0.25ms. Add 0.5ms quantization overhead.
    New latency = 4.5 + 0.25 + 0.5 = 5.25ms. Expected speedup: 10 / 5.25 ≈ 1.9x. If actual is only 1.18x
    (8.4ms), kernel launch overheads (~3ms total) are dominating the critical path.'
