id: global-0056
title: E2E Edge Benchmarking Under Thermal Limits
topic: power-budgeting
status: published
provenance: imported
scenario: 'You are deploying a cascaded speech translation pipeline (ASR -> MT -> TTS) on an edge SoC
  with a strict 5W Sustained Power limit and 1.5GB RAM. Component micro-benchmarks show latencies of ASR:
  200ms, MT: 150ms, TTS: 250ms. However, during an MLPerf-style end-to-end sustained offline benchmark,
  P99 latency degrades to 2.8 seconds after 30 seconds of load. Architect an E2E benchmarking and profiling
  harness to isolate and decompose this regression.'
details:
  realistic_solution: 'Design an E2E macro-benchmarking harness that runs continuous, pipelined queries
    rather than isolated inferences. The architecture must integrate three telemetry streams: 1) Application-level
    trace spans for ASR, MT, and TTS execution times. 2) OS-level memory allocation hooks to track RAM
    fragmentation and swap. 3) Hardware-level metrics reading sysfs thermal zones and INA219 power rail
    sensors at 100Hz. The bottleneck analysis will reveal that pipelining the models causes the SoC to
    draw 8W, exceeding the 5W thermal envelope. After 30 seconds, the SoC hits 90C and the OS drops the
    NPU/CPU DVFS (Dynamic Voltage and Frequency Scaling) frequencies to cool down. The architectural fix
    involves requirement-to-architecture changes: implementing an inference scheduler that serializes
    heavy NPU phases or introduces deliberate micro-sleeps to keep sustained power draw strictly under
    5W, trading optimal single-query latency for stable sustained throughput.'
  common_mistake: Summing isolated micro-benchmark latencies to estimate E2E performance, completely ignoring
    thermal throttling, DVFS state changes, and memory bus contention.
  napkin_math: 'Micro-benchmark sum: 200 + 150 + 250 = 600ms. Power usage per component: ASR (3W) + MT
    (4W) + TTS (3W). Pipelined peak power = 10W (all 3 active simultaneously), exceeds 5W sustained cap.
    SoC thermal capacity at 10W is exhausted in ~30s (matches observed degradation onset). DVFS throttles
    clock by ~60% to reduce power to ~4W. New latencies at 40% clock: ASR = 200/0.4 = 500ms, MT = 150/0.4
    = 375ms, TTS = 250/0.4 = 625ms. Throttled sequential sum = 1500ms. Memory contention: 1.5GB RAM shared
    across 3 models. If concurrent footprint exceeds SRAM and spills to swap (1 GB/s bus), add ~500ms
    for 500MB swap traffic. Total throttled E2E = 1500ms + 500ms swap + 800ms pipeline bubble = ~2.8s
    (matches observed P99).'
