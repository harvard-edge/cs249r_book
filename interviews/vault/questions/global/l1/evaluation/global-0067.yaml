id: global-0067
title: Petabyte-Scale Near-Duplicate Detection Tradeoffs
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: You are tasked with near-duplicate deduplication of a 5 PB web-crawled text dataset (approx
  10 billion documents) using a 1,000-node Spark cluster (64 vCPUs, 256 GB RAM, 10 Gbps network per node).
  You opt for MinHash + LSH to find collisions, but must manage the tradeoff between collision precision,
  false positive rates, compute time, and the massive network shuffle bottleneck when aggregating billions
  of signatures.
details:
  realistic_solution: 'Implement a Banded MinHash LSH pipeline to trade perfect exactness for linear shuffle
    scalability. Instead of all-to-all comparisons, divide the 256 MinHash signatures into ''b'' bands
    of ''r'' rows (e.g., 16 bands of 16 hashes). Map phase: For each document, emit ''b'' key-value pairs
    where the key is ''(band_index, hash_of_r_rows)'' and the value is ''doc_id''. Reduce phase: Group
    by key. Only documents falling in the same bucket for at least one band are candidate pairs. This
    trades a small false negative rate for a dramatically reduced linear shuffle size. To mitigate hot
    keys (e.g., empty or boilerplate docs that hash to identical buckets), inject a frequency cap during
    Map to filter out highly frequent band-hashes before the shuffle, or use a secondary salt, ensuring
    no single reducer OOMs from an imbalanced partition.'
  common_mistake: Emitting a single Map output per document with all 256 hash signatures, then attempting
    a global cross-join, leading to O(N^2) explosion.
  napkin_math: '10 billion docs * 256 hashes * 4 bytes/hash = 10 TB of raw signatures. With 16 bands,
    Map emits 16 KV pairs per doc. Key size: 2 bytes (band) + 8 bytes (hash) = 10B. Value: 8B (doc_id).
    Total emitted per doc = 16 * 18B = 288 bytes. Global shuffle volume: 10 billion * 288 B = 2.88 TB.
    Cluster network capacity: 1,000 nodes * 10 Gbps = 10 Tbps (1.25 TB/s). The shuffle takes ~2.3 seconds
    of theoretical network time (ignoring serialization overhead), highly efficient compared to brute
    force.'
