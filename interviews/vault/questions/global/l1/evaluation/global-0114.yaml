id: global-0114
title: DLRM Heterogeneous Bottlenecks
topic: vram-budgeting
status: published
provenance: imported
scenario: Your massive click-through rate (CTR) model processes 15,000 QPS. It consists of 600GB of sparse
  embedding tables and a dense 6-layer MLP. To scale to 30,000 QPS, you must choose between upgrading
  to GPUs with 3.2 TB/s HBM (but only 80GB capacity per GPU), or moving to dual-socket CPUs with 12 channels
  of DDR5 (300 GB/s) and 2TB of capacity. Evaluate the tradeoffs using roofline principles.
details:
  realistic_solution: 'DLRMs exhibit a split-personality Roofline profile. The MLP layers are dense matrix
    multiplications with high arithmetic intensity, placing them firmly in the compute-bound regime where
    GPUs excel. Conversely, the embedding lookups are highly sparse, requiring random memory accesses.
    They have an arithmetic intensity of practically zero (just a gather/sum operation) and are bound
    by memory capacity and memory latency/transaction rate, not peak sequential bandwidth. Upgrading to
    80GB GPUs requires sharding the 600GB tables across 8+ GPUs, incurring massive PCIe/NVLink all-to-all
    communication overheads that will bottleneck the 30k QPS target. The optimal L6+ architecture is heterogeneous:
    host the 600GB embedding tables on the high-capacity CPU memory (which has sufficient transaction
    rate for sparse lookups), and pipeline the gathered dense vectors over PCIe to the GPU to execute
    the compute-bound MLP.'
  common_mistake: Assuming GPUs are always better due to higher bandwidth, or putting the whole model
    on CPU because of capacity.
  napkin_math: 'MLP compute: 15,000 QPS * 50M FLOPs/query = 750 GFLOPs (trivial for GPU, slow on CPU).
    Embeddings: 200 features/query * 15,000 QPS = 3M lookups/sec. Each lookup fetches 128 bytes. Total
    bandwidth = 3M * 128B = 384 MB/s. This is tiny compared to peak bandwidth! The bottleneck is memory
    capacity (600GB > 80GB) and transaction latency. CPU DDR5 handles millions of random accesses well
    and has 2TB capacity. PCIe Gen4 x16 gives 32 GB/s, easily handling the 384 MB/s gathered vectors passed
    to the GPU.'
