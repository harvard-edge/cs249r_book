id: global-0019
title: SRAM vs DRAM Characteristics
topic: memory-hierarchy-design
status: published
provenance: imported
scenario: When designing a custom accelerator for deep learning, why is SRAM typically used for on-chip
  buffers instead of DRAM, despite SRAM's lower density?
details:
  realistic_solution: SRAM is much faster and requires less power per access than DRAM because it does
    not require periodic refresh cycles. This makes it ideal for high-bandwidth, low-latency on-chip memory
    buffers, even though it takes up more physical area per bit.
  common_mistake: Assuming DRAM is faster for on-chip operations or that SRAM is cheaper to manufacture.
  napkin_math: '- SRAM access: ~1 ns, ~5 pJ/access | - DRAM access: ~50-100 ns, ~200 pJ/access | - =>
    SRAM is 50-100× faster and 40× more energy-efficient per access'
