schema_version: 1
id: global-0091
title: EU AI Act Compliance Pipeline Storage Design
topic: responsible-ai
status: published
provenance: imported
scenario: A financial institution runs a high-risk credit scoring ML system processing 500 QPS. Under
  the EU AI Act, you must design a data pipeline to maintain a 10-year immutable audit log of model inputs,
  outputs, and demographic intersections to prove bias mitigation. However, storing raw demographic data
  alongside financial data directly conflicts with GDPR data minimization and right-to-be-forgotten rules.
details:
  realistic_solution: Design a decoupled storage architecture using cryptographic hashing and secure enclaves.
    The primary operational database stores features and predictions temporarily. The compliance audit
    log stores irreversible hashes of the inputs/outputs along with a unique RequestID. Demographic data
    is never stored alongside the prediction. Instead, we use a separate, highly secured 'Demographic
    Vault' that stores the RequestID mapped to encrypted demographic attributes using a key managed by
    a privacy officer. To compute group-fairness metrics for regulatory reporting, a secure multi-party
    computation (SMPC) or a trusted execution environment (TEE) joins the two datasets using the RequestID.
    If a GDPR deletion request occurs, the record is deleted from the Demographic Vault; the audit log
    remains intact (containing only anonymous hashes) to satisfy the 10-year EU AI Act requirement, balancing
    both regulations.
  common_mistake: Storing plain-text PII and demographic data in a standard data warehouse for 10 years,
    directly violating GDPR right-to-be-forgotten mandates.
  napkin_math: '500 QPS * 86,400 sec/day = 43.2M requests/day. Audit record (hash + RequestID + metadata)
    ~ 1KB. Daily storage: 43.2 GB. 10-year retention: 43.2 GB * 3650 days = ~157 TB. The Demographic Vault
    stores encrypted blobs (~2KB): 86.4 GB/day. Over 10 years = 315 TB. Total storage < 500 TB, which
    is easily manageable in cold storage (e.g., S3 Glacier) for historical auditing.'
