schema_version: 1
id: global-0011
title: The Cost of Data Movement
topic: power-budgeting
status: published
provenance: imported
scenario: 'Which operation consumes significantly more energy on a modern accelerator: performing an FP16
  multiply-add operation or reading those operands from main memory (HBM/DRAM)?'
details:
  realistic_solution: Reading from main memory costs orders of magnitude more energy. Moving data across
    the physical interconnect from DRAM to the compute core is the primary thermal and energetic bottleneck
    in modern systems.
  common_mistake: Assuming compute is the primary energy draw because GPUs are famous for high FLOPs.
  napkin_math: '- FP16 multiply-add: ~0.4 pJ | - DRAM read (64 bits): ~200 pJ | - => Data movement costs
    ~500× more energy than the compute itself'
