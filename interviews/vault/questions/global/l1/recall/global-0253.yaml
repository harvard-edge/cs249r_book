id: global-0253
title: TDP and Energy Cost of GPU Hours
topic: power-budgeting
status: published
provenance: imported
scenario: An A100 GPU has a TDP of 400W. How much energy (in kWh) does a single A100 consume running at
  full power for 24 hours? What does this cost at $0.10/kWh?
details:
  realistic_solution: 'Energy = Power × Time. At full TDP: 400W × 24h = 9,600 Wh = 9.6 kWh. Cost: 9.6
    × $0.10 = $0.96/day per GPU. At realistic 80% average utilization: 320W × 24h = 7.68 kWh = $0.77/day.
    For a 1024-GPU cluster running 30 days: 1024 × 9.6 × 30 = 294,912 kWh = $29,491/month in electricity
    alone. Adding cooling overhead (PUE ≈ 1.2), total energy cost becomes $35,389/month. This is why hyperscalers
    locate data centers near cheap hydroelectric power.'
  common_mistake: Confusing power (watts, instantaneous) with energy (watt-hours, cumulative). Also forgetting
    that real-world power draw averages 70-85% of TDP, not 100%.
  napkin_math: '400W × 24h = 9.6 kWh/day. At $0.10/kWh = $0.96/day per GPU. 1024-GPU cluster: $0.96 ×
    1024 × 30 ≈ $29.5K/month electricity.'
