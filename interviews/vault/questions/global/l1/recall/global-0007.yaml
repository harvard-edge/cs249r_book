id: global-0007
title: The Embedding OOM Screen
topic: memory-hierarchy-design
status: published
provenance: imported
scenario: You are an intern deploying a 100M-item recommendation system. You try to load the FP32 embedding
  table into a standard 16GB T4 GPU, but it immediately crashes with an Out-of-Memory error. Before you
  even look at the code, what basic math did you fail to do?
details:
  realistic_solution: You failed to calculate the fundamental footprint of the model weights. 100M items
    * 128-dimensional vector * 4 bytes (FP32) = 51.2 GB. It is physically impossible to fit a 51.2 GB
    tensor into 16GB of VRAM, regardless of batch size.
  common_mistake: '"The batch size is too large or PyTorch has a memory leak."'
  napkin_math: '- 100M items × 128 dims × 4 bytes (FP32) = 51.2 GB | - T4 VRAM = 16 GB | - => 3.2× oversubscribed
    — physically impossible to load'
