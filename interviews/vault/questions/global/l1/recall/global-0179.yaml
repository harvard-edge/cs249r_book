id: global-0179
title: The Anycast Routing Pattern
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: A global ML inference service has endpoints in US-East, EU-West, and Asia-Pacific. A user in
  Berlin sends a request. With anycast routing, how does the network decide which datacenter handles the
  request?
details:
  realistic_solution: 'Anycast assigns the same IP address to all three datacenter endpoints. When the
    Berlin user''s request enters the internet, BGP routers along the path forward it to the topologically
    nearest datacenter — in this case EU-West. This happens at the network layer, below the application.
    Benefits: (1) Automatic failover — if EU-West goes down, BGP reconverges and traffic shifts to the
    next-nearest DC. (2) Minimal latency — requests are served by the closest DC by default. (3) DDoS
    resilience — attack traffic is distributed across all DCs. Limitation: anycast routes by network topology,
    not by server load — a hot DC still gets all nearby traffic.'
  common_mistake: Thinking the application or a load balancer decides the routing. With anycast, the BGP
    routing protocol at the network layer automatically routes packets to the nearest (in network hops)
    datacenter advertising the same IP address — no application-level routing logic needed.
  napkin_math: 'Berlin → EU-West: ~10ms RTT. Berlin → US-East: ~90ms RTT. Berlin → Asia-Pacific: ~200ms
    RTT. Anycast automatically picks the 10ms path. Latency improvement vs random routing: up to 20× (200ms/10ms
    worst-to-best case).'
