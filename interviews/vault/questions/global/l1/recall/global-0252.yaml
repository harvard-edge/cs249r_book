id: global-0252
title: Bytes per Parameter Across Precisions
topic: vram-budgeting
status: published
provenance: imported
scenario: How many bytes does a single model parameter consume in FP32, FP16, INT8, and INT4 formats?
  What is the total VRAM for a 70B parameter model in each?
details:
  realistic_solution: 'FP32 = 4 bytes, FP16/BF16 = 2 bytes, INT8 = 1 byte, INT4 = 0.5 bytes. For a 70B
    model: FP32 = 70B × 4 = 280 GB. FP16 = 70B × 2 = 140 GB. INT8 = 70B × 1 = 70 GB. INT4 = 70B × 0.5
    = 35 GB. This is why quantization is transformative for deployment: a 70B model that requires 2× A100-80GB
    in FP16 fits on a single A100-80GB in INT8, or a single 48GB GPU in INT4. The key insight is that
    each halving of precision halves the memory and doubles the effective memory bandwidth (since the
    same TB/s moves twice as many parameters).'
  common_mistake: Forgetting INT4 is half a byte (4 bits = 0.5 bytes), leading to wrong memory estimates.
    Also neglecting quantization overhead (scales, zero-points) which adds ~0.5-2% extra memory.
  napkin_math: 70B × 4B = 280GB (FP32). 70B × 2B = 140GB (FP16). 70B × 1B = 70GB (INT8). 70B × 0.5B =
    35GB (INT4). Memory halves with each precision step.
