schema_version: 1
id: global-0013
title: The Parameter Memory Footprint
topic: memory-hierarchy-design
status: published
provenance: imported
scenario: You are loading a 7 Billion parameter model (like Llama-2-7B) for inference. If the weights
  are stored in FP16 (16-bit float), what is the absolute minimum GPU memory required just to hold the
  weights?
details:
  realistic_solution: 7 billion parameters * 2 bytes/parameter = 14 GB. You cannot physically fit this
    model onto an 8GB or 12GB GPU without quantization or layer offloading.
  common_mistake: Forgetting to multiply by the byte size of the precision format (FP16 = 2 bytes).
  napkin_math: '- 7B params × 2 bytes (FP16) = 14 GB | - INT4 alternative: 7B × 0.5 bytes = 3.5 GB (fits
    on 4 GB edge GPU) | - => Precision choice directly determines which hardware you need'
