id: global-0035
title: Memory Constraints
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: You are tasked with porting an anomaly detection model to an edge device based on an ARM Cortex-M4
  processor. The model parameters take up 150KB and the peak intermediate tensor size during inference
  is 100KB. The microcontroller has 512KB of Flash and 128KB of SRAM. Will this model fit, and where should
  the parameters and activations reside?
details:
  realistic_solution: Model weights are read-only and can be stored in Flash memory, while intermediate
    activations (tensors) must be allocated in SRAM. Since weights (150KB) < Flash (512KB) and activations
    (100KB) < SRAM (128KB), it fits.
  common_mistake: Confusing the roles of Flash (persistent storage for code/read-only data like weights)
    and SRAM (volatile memory for intermediate activations/stack/heap) on microcontrollers.
  napkin_math: '- Flash usage: 150 KB weights / 512 KB Flash = 29% utilized | - SRAM usage: 100 KB activations
    / 128 KB SRAM = 78% utilized | - => Fits, but SRAM is tight — only 28 KB left for stack and heap'
