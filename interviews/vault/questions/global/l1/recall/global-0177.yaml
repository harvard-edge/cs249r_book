id: global-0177
title: The Risk Classification Framework
topic: responsible-ai
status: published
provenance: imported
scenario: 'The EU AI Act classifies AI systems into four risk tiers: unacceptable, high-risk, limited-risk,
  and minimal-risk. A company deploys an LLM-based chatbot for customer service in the EU. Which risk
  tier does it fall under, and what are the compliance obligations?'
details:
  realistic_solution: 'A general customer-service chatbot is ''limited-risk'' under the AI Act. The primary
    obligation is transparency: users must be informed they are interacting with an AI system. However,
    if the chatbot is used in a high-risk domain (e.g., insurance claim decisions, employment screening),
    it escalates to ''high-risk'' — requiring conformity assessments, technical documentation, human oversight
    mechanisms, and registration in the EU database. The classification depends on the USE CASE, not the
    technology.'
  common_mistake: Assuming all AI systems are 'high-risk' under the AI Act. Most general-purpose chatbots
    fall under 'limited-risk,' which requires transparency obligations (telling users they are interacting
    with AI) but not the extensive conformity assessments required for high-risk systems like medical
    diagnosis or criminal justice.
  napkin_math: 'Compliance cost estimate: Limited-risk transparency: ~$10K (disclosure UI + documentation).
    High-risk conformity assessment: $200K-$500K (audit, documentation, monitoring systems, human oversight
    tooling). Non-compliance fine: up to €35M or 7% of global revenue, whichever is higher.'
