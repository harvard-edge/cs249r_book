id: global-0037
title: Minimizing Radio Usage
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: We are designing a battery-powered IoT smart camera that detects specific bird species. Which
  architectural approach will typically result in the lowest overall power consumption?
details:
  realistic_solution: Wireless transmission (e.g., Wi-Fi, cellular) is extremely power-hungry compared
    to local computation. Running a lightweight TinyML model on the edge device to only transmit data
    when a bird is detected minimizes radio usage, dramatically saving power.
  common_mistake: Believing that transmitting raw data to a powerful cloud server is always more energy-efficient
    than performing complex computations locally.
  napkin_math: '- Wi-Fi transmission: ~200 mW active. MCU inference: ~5 mW | - Streaming 24/7: 200 mW
    × 24h = 4.8 Wh/day | - Local detect + transmit 10 events/day: (5 mW × 24h) + (200 mW × 0.1h) = 0.14
    Wh/day — 34× less'
