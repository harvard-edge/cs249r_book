schema_version: 1
id: global-0258
title: KV Cache Memory per Token
topic: latency-decomposition
status: published
provenance: imported
scenario: For a Llama-2-70B model (80 layers, 64 heads, head_dim=128) in FP16, how much KV cache memory
  is needed per token?
details:
  realistic_solution: 'Per token KV cache = 2 (K+V) × num_layers × num_kv_heads × head_dim × bytes_per_element.
    For Llama-2-70B: 2 × 80 × 8 (GQA uses 8 KV heads, not 64) × 128 × 2 bytes = 327,680 bytes ≈ 320 KB
    per token. For a 4096-token context: 320 KB × 4096 = 1.28 GB per request. Serving 100 concurrent requests:
    128 GB of VRAM just for KV cache — more than the model weights (140 GB FP16). This is why KV cache
    management (PagedAttention, vLLM) is critical: naive pre-allocation wastes 60-80% of KV cache memory
    on internal fragmentation.'
  common_mistake: Forgetting to count both K and V caches, or miscounting the per-layer contribution.
    Each layer stores both a key and a value vector for every attention head.
  napkin_math: '2 × 80 layers × 8 KV heads × 128 dim × 2B = 320 KB/token. Context of 4096: 320KB × 4096
    = 1.28 GB/request. 100 concurrent: 128 GB KV cache alone.'
