id: global-0174
title: The Grid Emissions Gap
topic: sustainability-carbon-accounting
status: published
provenance: imported
scenario: France's electricity grid produces ~50 gCO2/kWh (mostly nuclear), while Poland's grid produces
  ~700 gCO2/kWh (mostly coal). If you run the same 1,000 GPU-hour training job in each country, how does
  the carbon footprint differ?
details:
  realistic_solution: 'France: 1,000 GPU-hours × 0.3 kW (A100) × 50 gCO2/kWh = 15,000 gCO2 = 15 kg CO2.
    Poland: 1,000 GPU-hours × 0.3 kW × 700 gCO2/kWh = 210,000 gCO2 = 210 kg CO2. Running in Poland produces
    14× more CO2 for identical compute. This is why carbon-aware scheduling — shifting workloads to low-carbon
    grids — is the single highest-leverage sustainability intervention.'
  common_mistake: Assuming carbon footprint is only about energy efficiency or PUE. A perfectly efficient
    datacenter on a coal-heavy grid emits far more CO2 than a less efficient one on a nuclear/renewable
    grid. The grid carbon intensity dominates.
  napkin_math: 'France: 1,000 h × 300W × 50 gCO2/kWh = 1,000 × 0.3 kWh × 50 = 15,000 g = 15 kg CO2. Poland:
    1,000 × 0.3 × 700 = 210,000 g = 210 kg CO2. Ratio: 210/15 = 14×. One transatlantic flight ≈ 1,000
    kg CO2, so the Poland training run is ~21% of a flight.'
