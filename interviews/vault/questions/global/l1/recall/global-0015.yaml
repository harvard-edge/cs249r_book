title: Quantization Basics
topic: pruning-sparsity
status: published
provenance: imported
scenario: Why is INT8 quantization so popular for deploying models on edge devices like mobile phones?
details:
  realistic_solution: It reduces the memory footprint by 4x compared to FP32, which drastically reduces
    the memory bandwidth required to load weights. Furthermore, integer math requires significantly less
    silicon area and energy than floating-point math.
  common_mistake: Believing it makes the model more accurate or that it reduces the number of parameters.
  napkin_math: '- FP32 model: 10M params × 4 bytes = 40 MB | - INT8 model: 10M params × 1 byte = 10 MB
    (4× smaller) | - => Fits in mobile cache, 4× less bandwidth to load weights'
