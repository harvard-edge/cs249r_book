title: Why Kernel Fusion Matters
topic: kernel-fusion
status: published
provenance: imported
scenario: What is kernel fusion and why does it improve GPU performance? State the primary bottleneck
  it eliminates.
details:
  realistic_solution: 'Kernel fusion combines multiple GPU operations (kernels) into a single kernel,
    eliminating intermediate writes and reads to HBM. Without fusion, a sequence like y = ReLU(LayerNorm(x
    + bias)) requires: (1) write x+bias to HBM, (2) read it back for LayerNorm, (3) write LayerNorm output
    to HBM, (4) read it back for ReLU — 4 HBM round-trips for the intermediate tensors. Fused: one kernel
    reads x and bias, computes the entire chain in registers/SRAM, writes only the final result — 1 HBM
    write. Since HBM access costs ~100x more energy and ~300x more latency than register access, fusion
    can speed up memory-bound operations by 2-4x. Tools like torch.compile, Triton, and XLA perform this
    automatically.'
  common_mistake: Thinking kernel fusion saves compute. It saves memory bandwidth by eliminating intermediate
    round-trips to HBM between elementwise operations.
  napkin_math: 'Unfused: 4 HBM reads + 4 HBM writes for 3 ops. Fused: 1 read + 1 write. For 4096-dim hidden
    state: unfused moves 8 × 4096 × 2B = 64 KB; fused moves 2 × 4096 × 2B = 16 KB. 4x bandwidth reduction.'
