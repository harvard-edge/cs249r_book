title: Memory Hierarchy Latency Profiling
topic: memory-hierarchy-design
status: published
provenance: imported
scenario: When profiling an application to optimize data movement, which of the following correctly orders
  the system's memory hierarchy components from the lowest latency (fastest access) to the highest latency
  (slowest access)?
details:
  realistic_solution: The memory hierarchy is strictly organized by speed and proximity to the processor
    core. Registers are the fastest, followed by L1 Cache (few cycles), L2 Cache (~10-20 cycles), Main
    Memory/DRAM (~100+ cycles), and finally local SSDs (microseconds).
  common_mistake: Confusing L1 and L2 cache speeds with Main Memory, or drastically underestimating the
    latency penalty of storage drives.
  napkin_math: '- L1: ~1 ns. L2: ~5 ns. DRAM: ~100 ns. NVMe SSD: ~10,000 ns | - Each level is roughly
    5-100× slower than the one above | - => Moving from L1 to SSD is a 10,000× latency penalty'
