title: Evaluate Fairness Audit Granularity
scenario: A cloud service can audit fairness by demographic subgroup, a mobile app can only report opt-in aggregate cohorts, and a TinyML device can report environment buckets.
question: "Can subgroup, cohort, and environment-bucket fairness audits support one product-wide fairness claim?"
details:
  realistic_solution: "They can support a qualified product-wide claim only if the report states what is comparable and what is not. Cloud subgroup metrics are strongest. Mobile opt-in cohorts may be biased. TinyML environment buckets are proxy evidence, not demographic fairness. The product-wide claim should be limited to the measured slices."
  common_mistake: |
    **The Pitfall:** Combining all audits into one fairness number.
    **The Rationale:** Leadership often wants a single "score" to report for PR or compliance.
    **The Consequence:** Creating a misleading metric that ignores differing measurement semantics and the inherent bias of opt-in cohorts.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Mobile opt-in users represent only 10% of the population.
    2. **Calculations:**
       - They skew heavily toward power users.
    3. **Conclusion & Interpretation:**
       - **Result: Bias-Bound. Their cohort metrics mathematically cannot represent the fairness profile of all mobile users.**
