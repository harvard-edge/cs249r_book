title: Evaluate Fairness Audit Granularity
scenario: A cloud service can audit fairness by demographic subgroup, a mobile app
  can only report opt-in aggregate cohorts, and a TinyML device can report environment
  buckets. Evaluate whether these audits can support one product-wide fairness claim.
question: Can subgroup, cohort, and environment-bucket fairness audits support one
  product-wide fairness claim?
details:
  realistic_solution: They can support a qualified product-wide claim only if the
    report states what is comparable and what is not. Cloud subgroup metrics are strongest.
    Mobile opt-in cohorts may be biased. TinyML environment buckets are proxy evidence,
    not demographic fairness. The product-wide claim should be limited to the measured
    slices.
  common_mistake: Combining all audits into one fairness number without accounting
    for different measurement semantics and opt-in bias.
  napkin_math: If mobile opt-in users are 10% of the population and skew toward power
    users, their cohort metrics may not represent all mobile users.
