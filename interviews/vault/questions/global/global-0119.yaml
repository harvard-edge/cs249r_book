title: SRAM Tiling for Custom Attention
scenario: You are writing a custom fused CUDA kernel for a novel sliding-window attention mechanism used in DNA sequence modeling (seq_len=131,072). The naive PyTorch implementation achieves only 5% Model Flops Utilization (MFU) because it is entirely memory-bandwidth bound.
question: How would you structure registers, shared memory, and HBM access for sliding-window attention at seq_len 131,072?
details:
  realistic_solution: The architecture must implement hardware-aware block tiling (similar to FlashAttention). The intermediate N x N attention matrix (Q*K^T) is too large to materialize in HBM, let alone SRAM. We must tile the computation into blocks that fit entirely within the SM's shared memory (SRAM). Load a block of K and V into SRAM. Then, stream blocks of Q from HBM to SRAM, compute the partial attention scores, update the running maximum and denominator for the softmax (using the online safe softmax trick), multiply by V, and accumulate the result in registers. Finally, write the output block back to HBM. This reduces HBM accesses from O(N^2) to O(N).
  common_mistake: |
    **The Pitfall:** Attempting to load entire rows of the attention matrix into shared memory.
    **The Rationale:** Treating shared memory like an L1 cache that can seamlessly page in massive contiguous rows.
    **The Consequence:** Exceeding the strict physical 164 KB limit of SRAM per SM, causing the kernel launch to fail or silently spilling to global memory.
  napkin_math: |
    * Intermediate QK^T size: 131,072 * 131,072 * 2 bytes (FP16) = ~34.3 GB per head.
    * HBM read/write time (at 2 TB/s): (34.3 GB / 2000 GB/s) * 2 = 0.0343 seconds (34.3 ms).
    * Total time over 96 layers: 34.3 ms * 96 = ~3.3 seconds per token just for memory IO.
    * A100 SRAM per SM: 164 KB.
    * Block size 128x128: K block = 32 KB, V block = 32 KB (fits easily in 164 KB).
    * **Tiling reduces HBM accesses from O(N^2) to O(N), breaking the memory wall.**
