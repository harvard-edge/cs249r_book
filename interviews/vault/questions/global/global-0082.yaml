title: Topology-Unaware Scheduling on Oversubscribed Fabric
scenario: A 3:1 oversubscribed Fat-Tree network connects 16 racks (4 nodes per rack). A 16-node training job is launched. Instead of getting the expected 200GB/s NCCL AllReduce bandwidth, the job achieves only 66GB/s. Other identical jobs running on contiguous racks achieve the full 200GB/s.
question: Why does the 16-node job get only 66 GB/s AllReduce while contiguous-rack jobs get 200 GB/s?
details:
  realistic_solution: The root cause is topology-unaware job scheduling on an oversubscribed network. The cluster has a 3:1 oversubscription ratio at the spine, meaning intra-rack bandwidth is 3x higher than inter-rack bandwidth. The fast jobs were scheduled on contiguous nodes within 1-2 racks. The slow job was fragmented across 8 different racks (e.g., 2 nodes per rack). NCCL forms a logical ring for AllReduce. Because the nodes are scattered, the NCCL ring crosses the oversubscribed spine switch links multiple times. The entire collective operation is bottlenecked by the slowest link in the ring, which is the heavily contended 3:1 inter-rack uplink.
  common_mistake: |
    **The Pitfall:** Assuming a faulty optical cable, a degraded NIC, or thermal throttling on the GPUs in the slow job.
    **The Rationale:** Candidates often overlook cluster-level network topology and oversubscription, focusing instead on node-local hardware failures.
    **The Consequence:** Replacing perfectly healthy hardware components while the job continues to be scheduled inefficiently across the spine switch.
  napkin_math: |
    *   **Node Bandwidth:** 200 GB/s.
    *   **Oversubscription Limit:** 3:1 oversubscription means the inter-rack uplink guarantees only 200 / 3 = 66.6 GB/s per node.
    *   **Ring Bottleneck:** The maximum throughput of a fragmented NCCL ring forced to cross the spine is capped at the spine link capacity.
    *   **Achieved Throughput:** **~66 GB/s**.
