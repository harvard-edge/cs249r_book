title: Queue Headroom Design
scenario: A service has 20 replicas, each handling 15 requests/s. Normal traffic is 210 requests/s but bursts reach 270 requests/s.
question: How would you size replica headroom for 270 rps bursts if 20 replicas each handle 15 rps?
details:
  realistic_solution: Current capacity is 300 rps, so bursts run at 90% utilization. That is too close to the queueing cliff for latency-sensitive service. To keep utilization at or below 70%, capacity should be 270/0.7 = 386 rps, requiring 26 replicas at 15 rps each.
  common_mistake: |
    **The Pitfall:** Checking that 270 rps burst is below the 300 rps maximum capacity and declaring the service safe.
    **The Rationale:** Treating capacity linearly and ignoring non-linear queueing effects at high utilization.
    **The Consequence:** Operating at 90% utilization during bursts pushes the system over the queueing cliff, causing severe latency degradation.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Current capacity = 20 replicas * 15 rps = 300 rps.
       - Burst traffic = 270 rps.
       - Safe target utilization = 70%.
    2. **Calculations:**
       - Burst utilization = 270 rps / 300 rps = 90%.
       - Safe capacity target = 270 rps / 0.7 = 385.7 rps.
       - Required replicas = ceil(385.7 / 15) = 26 replicas.
    3. **Conclusion & Interpretation:**
       - **Result: Latency-Bound (Queueing).** Increasing to 26 replicas keeps burst utilization safely below the queueing cliff.
