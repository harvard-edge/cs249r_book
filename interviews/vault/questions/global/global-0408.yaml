title: Drift Monitoring Segmentation Spec
scenario: A team asks for a universal drift monitor for cloud, mobile, and edge deployments.
  Specify how segmentation should be chosen so the monitor is statistically useful
  and operationally affordable.
question: How should segmentation be specified for drift monitoring across cloud,
  mobile, and edge deployments?
details:
  realistic_solution: The spec should define segment keys, minimum sample counts,
    pooling rules, alert windows, and fallback aggregation for sparse segments. Cloud
    can segment by region and tenant, mobile by device class and app version, and
    edge by store cluster rather than every device if labels are sparse. The segmentation
    must balance statistical power against operational actionability.
  common_mistake: Creating extremely granular segments that cannot accumulate enough
    labels to support reliable drift estimates.
  napkin_math: If a segment needs 50K outcomes and only receives 2K per week, it needs
    pooling or a longer window; otherwise alerts are noisy and unactionable.
