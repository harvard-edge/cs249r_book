title: Low-Latency Multi-Objective Recommendation Debiasing System
scenario: An e-commerce recommendation engine serves 20,000 QPS. The candidate generator returns 1,000
  items, and the ranker scores them in 40ms. The total system p99 latency SLA is 60ms. The current system
  exhibits extreme popularity bias, starving new/minority creators. You must enforce demographic parity
  (exposure equity) for creators in the final top-10 list.
question: "How would you enforce creator exposure parity in the top-10 recommendations without breaking the 60 ms p99 SLA?"
details:
  realistic_solution: We must trade off theoretical perfect parity across the entire candidate pool for
    strict latency compliance. An in-processing approach (modifying the ranker's loss function) adds zero
    latency but is notoriously unstable for exposure equity. We choose a post-processing approach, but
    restrict the optimization space. Instead of re-ranking all 1,000 candidates (O(N log N) or O(N^2)),
    we take the top 100 items from the ranker. We apply a deterministic greedy algorithm or a lightweight
    linear program to select the final 10 items such that creator demographic constraints are met while
    maximizing the sum of predicted CTRs. Reducing N from 1000 to 100 drops the re-ranking latency from
    ~25ms down to <2ms, safely fitting within the remaining 20ms latency budget.
  common_mistake: Implementing a complex O(N^2) maximal marginal relevance (MMR) fairness re-ranking algorithm
    over all 1,000 candidates, which adds 50ms+ of latency and blows past the 60ms SLA.
  napkin_math: 'SLA: 60ms. Ranker takes 40ms. Budget remaining: 20ms (including network/serialization,
    leaving ~10ms for compute).

    Re-ranking 1000 items with O(N log N) sorting: 1000 * 10 ≈ 10,000 operations. With complex fairness
    constraints, an LP solver on 1000 items takes ~25-40ms (violates SLA).

    Truncating to top 100 items: LP solver on 100 items takes ~1-2ms. 40ms (rank) + 2ms (re-rank) = 42ms.
    Leaves 18ms for overhead, safely meeting the 60ms SLA.'
