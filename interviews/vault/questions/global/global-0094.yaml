title: Low-Latency Multi-Objective Recommendation Debiasing System
scenario: An e-commerce recommendation engine serves 20,000 QPS. The candidate generator returns 1,000 items, and the ranker scores them in 40ms. The total system p99 latency SLA is 60ms. The current system exhibits extreme popularity bias, starving new/minority creators.
question: How would you enforce creator exposure parity in the top-10 recommendations without breaking the 60 ms p99 SLA?
details:
  realistic_solution: We must trade off theoretical perfect parity across the entire candidate pool for strict latency compliance. An in-processing approach (modifying the ranker's loss function) adds zero latency but is notoriously unstable for exposure equity. We choose a post-processing approach, but restrict the optimization space. Instead of re-ranking all 1,000 candidates (O(N log N) or O(N^2)), we take the top 100 items from the ranker. We apply a deterministic greedy algorithm or a lightweight linear program to select the final 10 items such that creator demographic constraints are met while maximizing the sum of predicted CTRs. Reducing N from 1000 to 100 drops the re-ranking latency from ~25ms down to <2ms, safely fitting within the remaining 20ms latency budget.
  common_mistake: |
    **The Pitfall:** Implementing a complex O(N^2) maximal marginal relevance (MMR) fairness re-ranking algorithm over all 1,000 candidates.
    **The Rationale:** Candidates often prioritize theoretically optimal fairness over hard latency constraints.
    **The Consequence:** The re-ranking adds 50ms+ of latency, blowing past the 60ms SLA and degrading the core user experience.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Latency SLA: 60 ms. Ranker time: 40 ms.
       - Available latency budget: 60 ms - 40 ms = 20 ms (including network). Remaining compute budget \approx 10 ms.
       - LP Re-ranking complexity: O(N log N).
    2. **Calculations:**
       - LP solver on N=1000 items: ~25-40 ms (Violates SLA).
       - LP solver on truncated N=100 items: ~1-2 ms (Satisfies SLA).
       - Total Latency for N=100: 40 ms (rank) + 2 ms (re-rank) = 42 ms.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Latency-Bound.** Truncating the fairness re-ranking pool to N=100 keeps total latency at 42 ms, safely meeting the 60 ms SLA.
