title: Memory Headroom Calculation
scenario: A serving GPU has 80 GB HBM. Model weights use 52 GB, runtime buffers use
  6 GB, and the KV cache peak is 18 GB. Calculate remaining headroom.
question: How much HBM headroom remains with 52 GB weights, 6 GB runtime buffers,
  and an 18 GB KV cache on an 80 GB GPU?
details:
  realistic_solution: Total use is 52 + 6 + 18 = 76 GB. Remaining headroom is 4 GB.
    That is small enough that fragmentation or a batch spike could still cause OOM.
  common_mistake: Checking only model weights and assuming the GPU has 28 GB free.
  napkin_math: Used = 76 GB. Headroom = 80 - 76 = 4 GB.
