title: Resilient 1024-GPU Training System
scenario: 'Design a fault-tolerant training system for a 175B model on 1024 GPUs where individual GPU
  failures occur every 2-4 hours. Requirements: (1) training must not stop for single GPU failures, (2)
  maximum 5% throughput overhead for fault tolerance, (3) checkpoint recovery in under 10 minutes.'
details:
  realistic_solution: 'Multi-layer resilience design: (1) Hot spare pool: keep 32 spare GPUs (3.1% overhead).
    When a GPU fails, remap its work to a spare within 30 seconds. The failed GPU''s data-parallel rank
    is replaced; its gradient contribution comes from the spare running the same model shard. (2) Elastic
    data parallelism: DP dimension can shrink/grow without stopping training. If a spare is unavailable,
    reduce DP from 128 to 127 — throughput drops 0.8% until replacement. Training continues without restart.
    (3) Asynchronous checkpointing: checkpoint to NVMe SSDs local to each node (3.2 TB/s aggregate for
    128 nodes), then async copy to shared storage. Checkpoint takes 700 GB / 3.2 TB/s = 0.22 seconds for
    the local write (training stall), plus background network copy. (4) In-memory redundancy: replicate
    optimizer states across DP ranks (already inherent in ZeRO Stage 1). A failed GPU''s optimizer shard
    is reconstructed from its DP peer in <1 second. (5) Monitoring: heartbeat every 500ms, failure detected
    in 1s, spare activated in 30s. Total throughput overhead: 3.1% (spares) + 0.5% (async checkpoint)
    + 0.3% (heartbeat) ≈ 3.9% < 5% budget.'
  common_mistake: Relying solely on checkpoint-restart for every failure. At 1024 GPUs with MTBF of 2-4h,
    restarting the entire job every failure wastes 30-50% of training time.
  napkin_math: 'MTBF per GPU: ~20,000h. System MTBF: 20,000/1024 ≈ 19.5h (but correlated failures reduce
    this to 2-4h). 32 spares: 32/1024 = 3.1% cost. Async checkpoint: 700 GB local NVMe write at 3.2 TB/s
    = 0.22s stall every 2h = 0.003% overhead.'
