title: GPU Rack Power Density Limit
scenario: A standard data center rack supports 20 kW. Each H100 SXM server (8 GPUs) draws 10.2 kW total.
question: How many 8-GPU H100 SXM servers fit in a 20 kW rack, and how many GPUs per rack is that?
details:
  realistic_solution: 'Servers per rack = floor(20 kW / 10.2 kW) = 1 server with room to spare (10.2 kW used, 9.8 kW spare), but practically only 1 DGX-style server fits due to power constraints. That''s 8 GPUs per rack. Modern AI racks are moving to 40-100 kW to fit 2-4 servers (16-32 GPUs). This is why power density is a first-class constraint: you can afford the GPUs but can''t cool them in a standard facility.'
  common_mistake: |
    **The Pitfall:** Ignoring the non-GPU power draw or over-provisioning the rack.
    **The Rationale:** Confusing the total server power (10.2 kW) with just the GPU power, or trying to squeeze 2 servers into a 20kW rack by ignoring safety margins.
    **The Consequence:** Tripping datacenter breakers or causing thermal failures by exceeding power and cooling limits.
  napkin_math: |
    - Power available: 20 kW.
    - Power per server: 10.2 kW.
    - Servers per rack: floor(20 / 10.2) = 1.96 → **1 server**.
    - GPUs per rack: 1 server × 8 GPUs = **8 GPUs**.
