title: 'Incomplete Fairness Launch Review'
scenario: 'A product team asks whether a model is fair enough to launch across cloud, mobile, and edge. They provide aggregate accuracy and one subgroup metric from cloud, but omit mobile opt-in bias, edge cohort definitions, label quality, and action thresholds.'
question: 'What missing fairness evidence is needed before launching the model across cloud, mobile, and edge surfaces?'
details:
  realistic_solution: 'You need subgroup definitions, per-surface coverage, opt-in bias estimates, label quality, confidence intervals, harm thresholds, mitigation plan, and monitoring after launch. Aggregate accuracy and one cloud subgroup metric are insufficient for a cross-surface launch decision.'
  common_mistake: |
    **The Pitfall:** Treating a single cloud fairness metric as conclusive proof of fairness across all deployment surfaces.
    **The Rationale:** Assuming that model behavior mapped cleanly on one surface transfers perfectly to fundamentally different data capture environments.
    **The Consequence:** Deploying a model that systematically disadvantages users in edge environments due to hidden cohort biases.
  napkin_math: |
    **Assumptions & Constraints:**
    - Cloud represents 80% of traffic.
    - Edge/Mobile represents 20% of traffic but contains the highest-risk use cases.

    **Calculations:**
    - Aggregate accuracy is dominated by the 80% cloud majority.
    - A severe 50% failure rate in the 20% edge subset only drops aggregate accuracy by 10%.

    **Conclusion & Interpretation:**
    - **Result: 10% aggregate drop hides a 50% local failure (Evaluation-Coverage-Bound)**. Incomplete metrics mask critical failures.
