title: Skip Connections as Gradient Highways
scenario: Residual connections in ResNet and Transformers add the input to the output (y = f(x) + x).
question: From a gradient flow perspective, why does y = f(x) + x enable 100+ layer networks when non-residual networks struggle beyond 20 layers?
details:
  realistic_solution: 'Without skip connections, the gradient through L layers is a product. If each factor is <1, this product decays exponentially. With the residual connection y = f(x) + x, the gradient becomes: dy/dx = df/dx + I. The +I term means the gradient through the skip path is always exactly 1.0, regardless of depth. This prevents exponential decay.'
  common_mistake: |
    **The Pitfall:** Explaining skip connections vaguely as "helping the network learn the identity function."
    **The Rationale:** This is geometrically true, but misses the mechanistic, quantitative reason why backpropagation fails without them.
    **The Consequence:** Failing to understand why deep networks require specific initializations or architectural structures to prevent numerical underflow.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - L = 100 layers.
       - Non-residual decay factor ~ 0.5.
    2. **Calculations:**
       - Without skip = 0.5^100 = 7.9e-31 (FP16 underflow).
       - With skip = df/dx + 1.0 (guaranteed >= 1.0).
    3. **Conclusion & Interpretation:**
       - **Result: Precision-Bound Stability**
