title: Skip Connections as Gradient Highways
scenario: Residual connections in ResNet and Transformers add the input to the output (y = f(x) + x).
question: "From a gradient flow perspective, why does y = f(x) + x enable 100+ layer networks when non-residual networks struggle beyond 20 layers?"
details:
  realistic_solution: 'Without skip connections, the gradient through L layers is a product: grad = prod(dh_i/dh_{i-1}) for i=1..L. If each factor is <1 (common with sigmoid/tanh), this product decays exponentially. With the residual connection y = f(x) + x, the gradient becomes: dy/dx = df/dx + I (identity). The +I term means the gradient through the skip path is always exactly 1.0, regardless of depth. The total gradient is at least 1.0 plus the chain-rule term. This prevents exponential decay and ensures every layer receives a meaningful gradient signal. Systems consequence: this is why transformers can scale to 100+ layers without special initialization tricks, and why gradient checkpointing at every N layers works reliably -- the gradients remain numerically stable across the checkpointed regions.'
  common_mistake: |
    **The Pitfall:** Explaining skip connections vaguely as "helping the network learn the identity function."
    **The Rationale:** This is geometrically true, but misses the mechanistic, quantitative reason why backpropagation fails without them.
    **The Consequence:** Failing to understand why deep networks require specific initializations or architectural structures to prevent numerical underflow.
  napkin_math: |
    - **Without skip (multiplicative)**: Gradient ~ 0.5^L. At L=100, 0.5^100 = 7.9e-31 (underflows to zero in FP16).
    - **With skip (additive)**: dy/dx = df/dx + 1.0.
    - **Conclusion**: The gradient is guaranteed to be **>= 1.0**, perfectly representable in FP16 without exponential decay.
