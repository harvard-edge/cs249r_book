title: Skip Connections as Gradient Highways
scenario: 'Residual connections (skip connections) in ResNet and Transformers add the input to the output:
  y = f(x) + x. From a gradient flow perspective, why does this simple addition enable training networks
  with 100+ layers, while networks without skip connections struggle beyond 20 layers?'
details:
  realistic_solution: 'Without skip connections, the gradient through L layers is a product: grad = prod(dh_i/dh_{i-1})
    for i=1..L. If each factor is <1 (common with sigmoid/tanh), this product decays exponentially. With
    the residual connection y = f(x) + x, the gradient becomes: dy/dx = df/dx + I (identity). The +I term
    means the gradient through the skip path is always exactly 1.0, regardless of depth. The total gradient
    is at least 1.0 plus the chain-rule term. This prevents exponential decay and ensures every layer
    receives a meaningful gradient signal. Systems consequence: this is why transformers can scale to
    100+ layers without special initialization tricks, and why gradient checkpointing at every N layers
    works reliably -- the gradients remain numerically stable across the checkpointed regions.'
  common_mistake: 'Explaining skip connections as ''helping the network learn the identity function.''
    While true, this misses the quantitative gradient flow argument: the +x term provides an additive
    gradient path that bypasses the multiplicative chain rule decay.'
  napkin_math: 'Without skip: gradient ~ 0.5^L. At L=100: 0.5^100 = 7.9e-31 (zero in FP16). With skip:
    gradient >= 1.0 at every layer. FP16 can represent 1.0 perfectly. Skip connections turn multiplicative
    decay into additive composition.'
