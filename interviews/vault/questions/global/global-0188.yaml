title: The Follow-the-Sun Savings
scenario: 'You have GPU clusters in 3 regions. Region A (solar-heavy grid): 100 gCO2/kWh during day, 500 gCO2/kWh at night. Region B (wind-heavy): 200 gCO2/kWh always. Region C (coal baseline): 600 gCO2/kWh always. A 48-hour training job requires 500 kW continuously.'
question: How much CO2 does the 48-hour job emit running entirely in Region C versus a 'follow-the-renewables' schedule, and what reduction does that imply?
details:
  realistic_solution: Running in Region C emits 14.4 metric tons. The dynamic schedule runs day in A and night in B, emitting 3.6 metric tons total. This yields a 75% emissions reduction.
  common_mistake: |
    **The Pitfall:** Assuming static assignment to one 'green' region is the best carbon-aware strategy.
    **The Rationale:** Grid carbon intensity is often improperly averaged over the entire year.
    **The Consequence:** The massive dynamic optimization opportunity of following the sun/wind is missed, increasing total emissions.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 500 kW load for 48 hours.
    2. **Calculations:**
       - Static (Region C) = 500 kW * 48h * 600 g/kWh = 14.4 metric tons CO2.
       - Dynamic Day (Region A) = 500 kW * 24h * 100 g/kWh = 1.2 metric tons CO2.
       - Dynamic Night (Region B) = 500 kW * 24h * 200 g/kWh = 2.4 metric tons CO2.
    3. **Conclusion & Interpretation:**
       - **Result: Power-Bound (Emissions).** Dynamic migration reduces total emissions from 14.4t to 3.6t, a 75% reduction for a trivial 4.2% time penalty.
