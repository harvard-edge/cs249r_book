title: The Follow-the-Sun Savings
scenario: You have GPU clusters in 3 regions. Region A (solar-heavy grid): 100 gCO2/kWh during day, 500 gCO2/kWh at night. Region B (wind-heavy): 200 gCO2/kWh always. Region C (coal baseline): 600 gCO2/kWh always. A 48-hour training job requires 500 kW continuously.
question: "How much CO2 does the 48-hour job emit running entirely in Region C versus a 'follow-the-renewables' schedule, and what reduction does that imply?"
details:
  realistic_solution: '(a) Region C only: 500 kW × 48h × 600 gCO2/kWh = 14,400,000 g = 14.4 metric tons CO2. (b) Follow-the-renewables: Day in Region A (24h total across 2 days): 500 kW × 24h × 100 gCO2/kWh = 1,200,000 g. Night in Region B (24h total): 500 kW × 24h × 200 gCO2/kWh = 2,400,000 g. Total: 3,600,000 g = 3.6 metric tons CO2. Reduction: 14.4 - 3.6 = 10.8 tons saved = 75% reduction. The cost: cross-region migration overhead (checkpoint, transfer, restart) adds ~30 minutes per migration = 2 hours overhead for 4 migrations, a 4.2% time penalty.'
  common_mistake: |
    **The Pitfall:** Assuming static assignment to one 'green' region is the best carbon-aware strategy.
    **The Rationale:** Grid carbon intensity is often averaged over the year.
    **The Consequence:** The massive dynamic optimization opportunity of following the sun/wind is missed.
  napkin_math: |
    - Static (Region C): 500 kW * 48h * 600 g/kWh = 14.4 metric tons.
    - Dynamic Day (Region A): 500 kW * 24h * 100 g/kWh = 1.2 metric tons.
    - Dynamic Night (Region B): 500 kW * 24h * 200 g/kWh = 2.4 metric tons.
    - **Dynamic scheduling reduces total emissions from 14.4t to 3.6t, a 75% reduction for a 4.2% time penalty.**
