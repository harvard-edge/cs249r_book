title: Roofline Classification of Elementwise Operations
scenario: You apply ReLU activation to a tensor of 100M FP16 elements on an A100.
question: "What is the arithmetic intensity of ReLU on 100M FP16 elements, and what maximum TFLOPS can it achieve on an A100?"
details:
  realistic_solution: FLOPs = 100M (one comparison per element). Memory = read 100M × 2 bytes + write 100M × 2 bytes = 400 MB. AI = 100M FLOP / 400 MB = 0.25 FLOP/byte. A100 ridge = 156 FLOP/byte. At 0.25 FLOP/byte, achievable TFLOPS = 0.25 × 2.0 TB/s = 500 GFLOPS = 0.5 TFLOPS. That's 0.16% of peak 312 TFLOPS. This is why kernel fusion matters — fusing ReLU into a matmul avoids the separate HBM round trip entirely.
  common_mistake: |
    **The Pitfall:** Thinking elementwise operations can saturate the GPU's FLOP throughput.
    **The Rationale:** Treating all neural network layers as computationally intensive.
    **The Consequence:** Overlooking the massive benefit of kernel fusion, which avoids the HBM round trip entirely.
  napkin_math: |
    - **FLOPs**: 100M (one comparison per element).
    - **Memory footprint**: Read 100M * 2 bytes + write 100M * 2 bytes = 400 MB.
    - **Arithmetic Intensity (AI)**: 100M FLOPs / 400 MB = 0.25 FLOPs/byte.
    - **Ridge Point (A100)**: 156 FLOPs/byte.
    - **Max TFLOPS**: 0.25 FLOPs/byte * 2.0 TB/s = 0.5 TFLOPS.
    - **Conclusion**: It achieves at most **0.5 TFLOPS** (~0.16% of the 312 TFLOPS peak).
