title: Roofline Classification of Elementwise Operations
scenario: You apply ReLU activation to a tensor of 100M FP16 elements on an A100. Estimate the arithmetic
  intensity and determine the maximum achievable TFLOPS for this operation.
question: "What is the arithmetic intensity of ReLU on 100M FP16 elements, and what maximum TFLOPS can it achieve on an A100?"
details:
  realistic_solution: FLOPs = 100M (one comparison per element). Memory = read 100M × 2 bytes + write
    100M × 2 bytes = 400 MB. AI = 100M FLOP / 400 MB = 0.25 FLOP/byte. A100 ridge = 156 FLOP/byte. At
    0.25 FLOP/byte, achievable TFLOPS = 0.25 × 2.0 TB/s = 500 GFLOPS = 0.5 TFLOPS. That's 0.16% of peak
    312 TFLOPS. This is why kernel fusion matters — fusing ReLU into a matmul avoids the separate HBM
    round trip entirely.
  common_mistake: Thinking elementwise operations can saturate the GPU's FLOP throughput. They are almost
    always memory-bound because they do exactly 1 operation per element loaded.
  napkin_math: FLOPs = 100M. Bytes = 2 × 100M × 2 = 400 MB. AI = 0.25 FLOP/byte. Perf = 0.25 × 2 TB/s
    = 0.5 TFLOPS (0.16% of peak).
