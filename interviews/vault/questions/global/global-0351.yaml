title: Adaptation Architecture Across Surfaces
scenario: A product wants a base model plus personalization across cloud, mobile,
  and edge. Design an adaptation architecture that avoids maintaining three unrelated
  model families.
question: How would you design a shared adaptation architecture across cloud, mobile,
  and edge deployments?
details:
  realistic_solution: Use a common base model lineage with small adapters or calibration
    layers per surface. Cloud can train and evaluate full variants, mobile can store
    user adapters, and edge can store site adapters. The shared contract is adapter
    format, versioning, fallback, and evaluation, not identical runtime implementation.
  common_mistake: Forking separate models for each surface and losing comparability,
    rollback, and shared evaluation.
  napkin_math: If the base model is 2 GB and each adapter is 20 MB, storing 10 adapters
    costs 200 MB rather than 20 GB of full copies.
