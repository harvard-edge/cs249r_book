title: ECMP Hash Collisions with Elephant Flows
scenario: A training job using 64 GPUs is deployed across 8 racks in a 2:1 oversubscribed RoCEv2 fat-tree. Uplinks are 400G. The job initiates an AllReduce generating four concurrent 100Gbps 'elephant' flows per rack. Expected cross-rack bandwidth is 400Gbps, but telemetry shows two uplinks maxed at 100% (dropping packets) while the other two uplinks are completely idle (0%).
question: Why are two 400G uplinks saturated while two are idle during the 64-GPU AllReduce?
details:
  realistic_solution: The root cause is Equal-Cost Multi-Path (ECMP) hash collisions. ECMP distributes traffic across multiple uplinks by hashing the 5-tuple (Source IP, Dest IP, Protocol, Source Port, Dest Port). In ML workloads, traffic consists of a few massive, long-lived RDMA 'elephant' flows. Because there are only 4 massive flows, they lack statistical entropy. If the hash algorithm maps two 100G flows to the same 400G uplink (or if 4 flows hash to 2 links), those links become congested while others sit idle. The solution is enabling Source UDP Port randomization per Queue Pair (QP) in the RoCEv2 NIC, or implementing switch-level Dynamic Load Balancing (DLB) / flowlet switching.
  common_mistake: |
    **The Pitfall:** Assuming the job scheduler placed the nodes poorly or that the switch fabric is physically degraded.
    **The Rationale:** Because ML workloads produce a few massive 'elephant' flows rather than thousands of small flows, standard web-scale ECMP hashing fails catastrophically.
    **The Consequence:** Chasing phantom hardware or scheduling bugs while the network drops packets and throttles GPU utilization to near zero.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 4 flows distributed across 4 uplinks using basic ECMP hashing.
       - Each flow is 100Gbps. Uplinks are 400G.
    2. **Calculations:**
       - Probability of perfect distribution = (4/4) * (3/4) * (2/4) * (1/4) = 24/256 = 9.3%.
       - Probability of collision = 100% - 9.3% = 90.7%.
    3. **Conclusion & Interpretation:**
       - **Result: Hash-Collision-Bound.** There is a 90.7% chance that multiple 100G flows hash to the same uplink, causing severe congestion while others remain idle.
