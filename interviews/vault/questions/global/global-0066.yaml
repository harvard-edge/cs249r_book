title: Root-Causing AllToAll Tail Latency
scenario: You are serving a Mixture of Experts (MoE) model on 64 GPUs across 8 nodes connected via a 400 Gbps (50 GB/s) non-blocking RoCEv2 switch. During the expert routing phase, the AllToAll collective (32 MB total payload per GPU) is expected to take ~0.6-1.0 ms. Instead, profiling shows erratic tail latencies of 15-20 ms. Switch telemetry indicates massive spikes in Priority Flow Control (PFC) pause frames and buffer drops.
question: What is causing the 15-20 ms AllToAll tail latencies, and how would you mitigate it?
details:
  realistic_solution: "The symptoms (high tail latency, PFC pause storms, buffer drops) point directly to a network incast problem. Decomposing the AllToAll latency reveals that while propagation and nominal serialization delays are sub-millisecond, the queueing delay and timeout/retransmission penalties completely dominate. In a flat AllToAll, N-1 GPUs simultaneously send data to 1 target GPU. For 64 GPUs and a 32MB payload, each GPU sends 0.5MB to every other GPU. At the switch, 63 flows of 0.5MB arrive simultaneously for each destination port, creating a massive microburst. This instantly overwhelms the port's buffer capacity, triggering PFC pauses (which halt senders) or packet drops (which force expensive TCP/RoCE timeouts). The root cause is the synchronized many-to-one traffic pattern. The solution is to implement software-level pacing, network topology-aware routing, or a hierarchical AllToAll to break up the microbursts."
  common_mistake: |
    **The Pitfall:** Assuming the application is compute-bound and attempting to overlap communication with computation.
    **The Rationale:** Communication/computation overlap is a standard optimization technique in distributed ML.
    **The Consequence:** Overlapping does not fix the physical network incast microburst; the switch continues to drop packets, and the 15-20 ms tail latency persists.
  napkin_math: |
    * Chunk per destination = 32 MB / 64 GPUs = 0.5 MB.
    * Microburst at switch port: 63 senders * 0.5 MB = 31.5 MB arriving instantly.
    * Typical switch buffer per port: ~16 MB.
    * Buffer overflow: 31.5 MB - 16 MB = 15.5 MB of unbufferable data.
    * Nominal serialization time: 31.5 MB / 50 GB/s = 0.63 ms.
    * **Queueing + PFC pauses push actual latency to ~15 ms, dominating serialization time.**
