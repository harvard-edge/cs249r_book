title: Multi-LoRA Serving Architecture
scenario: You need to serve 200 fine-tuned variants of a 70B base model, each with
  LoRA adapters (rank=16, applied to Q,K,V,O projections). Total traffic is 5K requests/sec
  with uneven distribution (top 10 adapters get 80% of traffic).
question: How would you design a serving architecture that minimizes GPU cost while
  meeting P99 < 300ms TTFT?
details:
  realistic_solution: 'Architecture: shared base model with hot-swappable LoRA adapters.
    (1) Base model deployment: 70B INT8 = 70 GB per replica. Use TP=2 across 2 A100-80GB
    (35 GB/GPU, leaving 45 GB for KV cache and adapters). (2) LoRA adapter size: rank=16,
    4 projections per layer (with GQA, K and V are smaller), 80 layers. Per adapter:
    ~819k params per layer * 2B * 80 layers ≈ 131 MB FP16. All 200 adapters: 26.2
    GB — fits in host RAM with GPU-side caching. (3) Adapter scheduling: keep top-20
    adapters (~90% traffic) in GPU memory permanently (20 * 131 MB = 2.62 GB). Remaining
    adapters loaded on-demand from CPU (PCIe: 131 MB / 32 GB/s = 4.1ms — well within
    SLA). (4) Capacity planning: 5K req/s with continuous batching, batch=64 per replica.
    Per replica throughput: ~250 req/s. Need 5000/250 = 20 replicas = 40 A100 GPUs.
    Without LoRA sharing: 200 models * 2 GPUs = 400 GPUs. LoRA sharing saves 360 GPUs
    (90% reduction).'
  common_mistake: '**The Pitfall:** Deploying each adapter as a separate model instance.

    **The Rationale:** Treating adapters like fully independent fine-tuned models
    because of differing business logic.

    **The Consequence:** Requires 200 * 70B model copies, consuming petabytes of VRAM
    and incurring massive operational costs.

    '
  napkin_math: '**Assumptions & Constraints:**

    - Adapter rank=16, 4 projections, 80 layers, FP16 (2 bytes).

    - 200 adapters total.

    - Base model 70B INT8 (70GB).


    **Calculations:**

    - Adapter size = 819,200 params/layer * 2 bytes * 80 layers = 131.1 MB.

    - Total adapter storage = 200 * 131.1 MB = 26.2 GB.

    - GPUs needed without sharing = 200 * 2 = 400 GPUs.

    - GPUs needed with sharing = 20 replicas * 2 = 40 GPUs.


    **Conclusion & Interpretation:**

    - **Result: 4.1ms Loading Time (PCIe Transfer Bound)**. The 10x GPU reduction
    is achievable because loading a 131MB adapter via PCIe takes ~4.1ms, fitting well
    within the 300ms TTFT SLA.

    '
