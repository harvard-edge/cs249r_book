title: INT8 vs INT4 for Production LLM Serving
scenario: You are deploying a 70B model for production chat serving. INT8 shows 0.3% perplexity increase, INT4 shows 1.2%. Your SLA requires P99 latency < 200ms for 256-token responses.
question: Compare INT8 vs INT4 quantization for a 70B model serving 256-token responses under a 200ms SLA. Which do you choose and why?
details:
  realistic_solution: 'INT8 (70 GB) requires 1x 80GB GPU; INT4 (35 GB) also fits with more headroom. Decode is memory-bandwidth-bound. At 2.0 TB/s: INT8 reads 70GB -> 35ms/token. INT4 reads 35GB -> 17.5ms/token. For 256 tokens: INT8 ~ 8.96s, INT4 ~ 4.48s. Both fail the 200ms SLA on 1 GPU (<0.78ms/token needed). You must choose INT4 because it gives a 2x baseline speedup, necessary to make Tensor Parallelism and Speculative Decoding viable for the SLA.'
  common_mistake: |
    **The Pitfall:** Choosing INT4 solely because it fits on fewer GPUs, ignoring the actual SLA math.
    **The Rationale:** Engineers prioritize memory constraints over latency math for single-request processing.
    **The Consequence:** Deploying an architecture that technically fits but misses the latency SLA by 20x.
  napkin_math: |
    **Assumptions & Constraints:**
    - SLA = 200ms for 256 tokens (<0.78ms/token).
    - Memory Bandwidth = 2.0 TB/s.
    - INT8 weights = 70 GB; INT4 weights = 35 GB.

    **Calculations:**
    - INT8 = 70 / 2000 = 35ms/token.
    - INT4 = 35 / 2000 = 17.5ms/token.

    **Conclusion & Interpretation:**
    - **Result: Memory-Bandwidth Bound**. INT4 is required to meet the strict latency SLA.
