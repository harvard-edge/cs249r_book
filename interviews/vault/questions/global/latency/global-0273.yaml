title: Eager vs Compiled Execution for Inference
scenario: You have a transformer model in PyTorch eager mode averaging 45ms per forward pass. torch.compile with mode='reduce-overhead' achieves 28ms but adds 120 seconds of compilation time on first call. Your endpoint handles 10K requests/hour.
question: How would you evaluate when compilation pays for itself and identify scenarios where it doesn't?
details:
  realistic_solution: 'Speedup per request: 45ms - 28ms = 17ms saved. Compilation cost: 120 seconds = 120,000ms. Break-even: 120,000 / 17 = 7,059 requests to amortize. At 10K req/hour, break-even in ~42 minutes. When compilation doesn''t pay: short-lived serverless functions, dynamic input shapes causing recompiles, or data-dependent control flow.'
  common_mistake: |
    **The Pitfall:** Always choosing compiled mode without considering cold start or dynamic shapes.
    **The Rationale:** Benchmarks show massive throughput gains, so engineers turn it on by default.
    **The Consequence:** The model continuously recompiles for different sequence lengths, making latency worse than eager mode.
  napkin_math: |
    **Assumptions & Constraints:**
    - Eager = 45ms, Compiled = 28ms.
    - Compile Time = 120s.
    - Traffic = 10,000 req/hr.

    **Calculations:**
    - Savings per request = 17ms.
    - Break-even volume = 120,000ms / 17ms = 7,059 requests.
    - Time to break-even = 7,059 / 10,000 = 0.7059 hours = 42 minutes.

    **Conclusion & Interpretation:**
    - **Result: Amortization-Bound Optimization**. Compilation cost must be amortized over sufficient request volume.
