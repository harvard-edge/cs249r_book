title: Cross-Regime Profiling Plan
scenario: The same model misses its latency target in cloud, mobile, and TinyML deployments. Cloud traces show 30% GPU utilization and high queue time, mobile traces show thermal throttling after 3 minutes, and TinyML traces show SRAM spills to external flash.
question: How would you profile cloud queueing, mobile thermal throttling, and TinyML SRAM spills to identify the binding bottleneck in each regime?
details:
  realistic_solution: Use regime-specific counters. For cloud, separate queue time from service time. For mobile, correlate latency with temperature and sustained clocks. For TinyML, inspect memory planner output and flash access counts.
  common_mistake: |
    **The Pitfall:** Relying purely on a standard GPU-utilization dashboard across all regimes.
    **The Rationale:** The standard metric works perfectly for isolating bottlenecks in cloud environments.
    **The Consequence:** Thermal limits and memory-capacity failures outside the cloud go completely undetected, leading to misguided optimizations.
  napkin_math: |
    **Assumptions & Constraints:**
    - Cloud: 30% GPU utilization, high queue latency.
    - Mobile: Thermal throttling triggering frequency drops.
    - TinyML: SRAM capacity exceeded, spilling to Flash/PSRAM.

    **Calculations:**
    - Cloud: Service time << Queue time (I/O Scheduling bottleneck).
    - Mobile: Heat dissipation < Sustained power draw (Thermal bottleneck).
    - TinyML: Flash access time is ~100x slower than SRAM (Memory Bandwidth bottleneck).

    **Conclusion & Interpretation:**
    - **Result: Multi-Regime Bottlenecks.** Standard utilization metrics fail; each regime hits a completely different physical or scheduling constraint that dictates latency.
