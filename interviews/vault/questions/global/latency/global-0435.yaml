title: Heterogeneous Routing Algorithm for LLM Multi-Region Deployment
scenario: An LLM routing gateway balances inference traffic across three regions with varied hardware.
question: Create a load-shedding and routing algorithm that minimizes p99 latency during unpredictable
  traffic surges without dropping requests.
details:
  realistic_solution: Create a customized Join-the-Shortest-Queue with Delay (JSQ-D) algorithm. Rather
    than tracking raw connection counts, the router queries KV-cache saturation. A100 GPUs (80GB) have
    less capacity for burst batch expansions than MI300X GPUs (192GB). During surges, requests that exceed
    a queue-time threshold on A100s are transparently redirected to the MI300X cluster to leverage its
    larger memory.
  common_mistake: '**The Pitfall:** Applying standard round-robin or least-connections load balancing.

    **The Rationale:** Candidates incorrectly assume homogeneous service times and ignore critical constraints
    like KV cache memory limits.

    **The Consequence:** Routing traffic to saturated nodes, leading to massive latency spikes and out-of-memory
    crashes.

    '
  napkin_math: '**Assumptions & Constraints:**

    - Varied hardware regions: A100 (80GB) and MI300X (192GB).

    - MI300X memory provides greater KV capacity.


    **Calculations:**

    - HBM capacity difference: 192 GB / 80 GB = 2.4x more memory on MI300X.

    - This allows 2.4x larger maximum burst batch sizes.


    **Conclusion & Interpretation:**

    - **Result: Memory-Bound Routing**. JSQ-D algorithm must account for KV cache capacity, not just raw
    compute generation rates.'
