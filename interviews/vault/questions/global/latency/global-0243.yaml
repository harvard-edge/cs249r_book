title: Optimizing Time-to-First-Token for Interactive Chat
scenario: Your chatbot's time-to-first-token (TTFT) averages 1.2s for 2048-token prompts. The SLA requires TTFT < 500ms. Decode throughput is acceptable.
question: How would you design an optimization plan targeting the prefill phase specifically?
details:
  realistic_solution: 'Prefill optimization strategy: (1) FP8 inference: H100 FP8 = 1979 TFLOPS vs 989 FP16. Near 2× prefill speedup for negligible quality loss. TTFT → ~600ms. (2) Chunked prefill: process prompt in 512-token chunks, allowing decode of other requests between chunks. Doesn''t reduce absolute TTFT but improves p99 by preventing long prefills from blocking short ones. (3) Speculative prefill with early KV caching: for common prefixes (system prompts), cache the KV states. If 1024 of 2048 tokens are cached prefix, you only prefill 1024 tokens → 50% TTFT reduction. (4) Tensor parallelism: split across 2 GPUs to halve prefill compute. With FP8 + prefix caching: TTFT ≈ 600ms × 0.5 = 300ms. Combined: FP8 + prefix caching achieves <500ms SLA.'
  common_mistake: |
    **The Pitfall:** Trying to optimize decode when the bottleneck is prefill.
    **The Rationale:** Decode is the typical focus for LLM throughput optimization.
    **The Consequence:** Missing the SLA because TTFT is completely dominated by the initial compute-bound forward pass over the prompt.
  napkin_math: |
    **Assumptions & Constraints:**
    - Baseline: 1.2s prefill for 2048 tokens.

    **Calculations:**
    - FP8 inference speeds up prefill by ~2x -> ~0.6s.
    - Prefix caching (assuming 50% system prompt is cached) halves the prefill -> 0.3s.
    - TP=2 splits compute, theoretically halving again -> 0.15s.

    **Conclusion & Interpretation:**
    - **Result: ~0.3s TTFT (Compute-Bound)**. Combining FP8 + prefix caching alone reduces TTFT to ~0.3s, comfortably beating the 500ms SLA.
