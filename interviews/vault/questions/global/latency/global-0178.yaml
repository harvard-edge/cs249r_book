title: The Gradient Staleness Problem
scenario: In asynchronous distributed training with 60ms RTT, Worker B applies a gradient update computed 3 steps ago.
question: What is this phenomenon called, and why is it harmful?
details:
  realistic_solution: 'This is ''gradient staleness''. The model updates against an obsolete local parameter surface, causing stochastic trajectory drift. Mitigate through dampening factors, staleness thresholding bounds, or fallback to synchronized gradient compression topologies (e.g. 8-bit Adam/ZeRO).'
  common_mistake: |
    **The Pitfall:** Thinking asynchronous training is always better because it avoids synchronization barriers.
    **The Rationale:** Synchronization overhead is easy to measure, while the statistical penalty of optimizing against an outdated model is harder to quantify.
    **The Consequence:** Gradient staleness causes training divergence or significantly slower convergence, wasting more wall-clock time than synchronous training would have.
  napkin_math: |
    **Assumptions & Constraints:**
    - RTT: 60 ms
    - Step execution: 20 ms

    **Calculations:**
    - Steps executed per RTT = 60 ms / 20 ms = 3 steps (k=3)
    - Effective LR decay factor: 1/(1+k) = 1/4 (25%)

    **Conclusion & Interpretation:**
    - **Result: Convergence-Bound (Staleness Decay)**. Gradient staleness dilutes update effectiveness and causes trajectory drift.
