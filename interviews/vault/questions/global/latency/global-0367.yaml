title: Profiling Spec For A Portable Model
scenario: You are writing a profiling specification for a model that must ship on cloud GPUs, Android NPUs, and Cortex-M microcontrollers. The team wants one pass/fail report.
question: "What metrics must a cross-platform profiling report include for cloud GPUs, Android NPUs, and Cortex-M microcontrollers?"
details:
  realistic_solution: 'The report needs common timing fields plus platform-specific resource fields. Common fields are end-to-end latency, queue/scheduling time, model execution time, memory footprint, and error rate. Cloud adds accelerator utilization, HBM bandwidth, and queue depth. Android adds thermal state, battery draw, delegated-op coverage, and shared-memory pressure. Cortex-M adds SRAM arena peak, flash reads, cycle count, and deadline misses.'
  common_mistake: 'Specifying only average latency and model FLOPs, which hides queueing, thermal, and memory-spill bottlenecks.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Identical model architecture running across massively divergent hardware constraints.
    - Goal is a unified report highlighting the limiting bottleneck on each target.
    
    **Calculations:**
    - Cloud GPU bottleneck often HBM bandwidth (requires memory read/write profiling).
    - Android NPU bottleneck often thermal throttling or CPU-NPU copy overhead.
    - Cortex-M bottleneck often SRAM exhaustion or hard realtime deadline misses.
    
    **Conclusion & Interpretation:**
    - **Result: Hardware-Specific Attributions (Profiling Bound)**. A useful report must separate latency into specific components whose sum matches the end-to-end time; otherwise, platform-specific regressions cannot be diagnosed.
