title: Why Kernel Fusion Matters
scenario: You are optimizing a model's inference performance by fusing multiple operations into a single
  kernel.
question: What is kernel fusion, why does it improve GPU performance, and what primary bottleneck does
  it eliminate?
details:
  realistic_solution: 'Kernel fusion combines multiple GPU operations (kernels) into a single kernel,
    eliminating intermediate writes and reads to HBM. Without fusion, a sequence like y = ReLU(LayerNorm(x
    + bias)) requires multiple round-trips: (1) read x and bias, write intermediate, (2) read intermediate,
    write LayerNorm output, (3) read LayerNorm output, write ReLU output. Fused: one kernel reads x and
    bias, computes the entire chain in registers/SRAM, and writes only the final result y. This reduces
    the memory operations from 4 reads and 3 writes to just 2 reads and 1 write. Since HBM access costs
    ~100x more energy and ~300x more latency than register access, fusion can speed up memory-bound operations
    by 2-4x. Tools like torch.compile, Triton, and XLA perform this automatically.'
  common_mistake: '**The Pitfall:** Thinking kernel fusion saves compute.

    **The Rationale:** Candidates often assume fusing operations reduces FLOPs, when it actually targets
    memory bandwidth by eliminating intermediate round-trips to HBM between elementwise operations.

    **The Consequence:** Focusing optimization efforts on ALU utilization rather than memory access patterns,
    missing the true bottleneck.'
  napkin_math: '**Assumptions & Constraints:**

    - Target sequence: y = ReLU(LayerNorm(x + bias)).

    - 4096-dim hidden state (8 KB per vector at FP16).


    **Calculations:**

    - Unfused operations: 4 HBM reads + 3 HBM writes = 7 operations.

    - Unfused memory movement: 7 * 4096 * 2B = 56 KB.

    - Fused operation: 2 HBM reads (x, bias) + 1 HBM write (y) = 3 operations.

    - Fused memory movement: 3 * 4096 * 2B = 24 KB.


    **Conclusion & Interpretation:**

    - **Result: ~2.3x Bandwidth Reduction (Memory-Bandwidth Bound)**. Kernel fusion eliminates intermediate
    global memory trips by keeping intermediate activations in fast SRAM/registers, heavily accelerating
    element-wise memory-bound workloads.

    '
