title: Multi-Tenant LoRA Serving Architecture on MI300X
scenario: You are hosting 1,000 different LoRA adapters for a 30B parameter base model
  on a fleet of MI300X (192GB HBM3) GPUs. Strict latency SLAs mandate p99 < 50ms.
question: Create a memory management and request batching architecture that leverages
  the MI300X's 192GB capacity to serve all adapters without reloading the base model.
details:
  realistic_solution: 'The 30B base model occupies ~60GB (FP16), leaving ~132GB free.
    Create an architecture using S-LoRA/Punica: load the 60GB base model once into
    HBM. Store all LoRA adapters in a pinned host memory pool. When requests arrive,
    JIT-transfer the specific adapter weights over PCIe 5.0 (64 GB/s) taking <2ms
    per 100MB adapter. Use continuous batching to fuse the base model matrix multiplications
    across requests, while applying the specific LoRA low-rank updates individually
    using custom triton kernels.'
  common_mistake: Suggesting static replication of the full 30B base model for each
    adapter, which completely ignores the memory limits and massive HBM capacity.
  napkin_math: 192GB - 60GB (base model) = 132GB available for KV cache and LoRAs.
