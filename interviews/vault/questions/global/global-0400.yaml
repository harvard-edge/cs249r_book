title: Congestion Control SLO Spec
scenario: A serving platform has cloud, edge, and mobile clients sharing a central inference API. During bursts, mobile clients retry aggressively, edge gateways batch retries, and cloud clients use exponential backoff.
question: What client and server controls are needed so retries from cloud, edge, and mobile clients do not amplify inference congestion?
details:
  realistic_solution: The spec should require bounded retries, exponential backoff with jitter, per-client budgets, server-side admission control, retry-after hints, idempotency keys, and priority classes. Edge gateways need batch retry caps, mobile clients need radio-aware retry limits, and cloud clients need circuit breakers.
  common_mistake: |
    **The Pitfall:** Adding aggressive retries to all clients to improve perceived reliability.
    **The Rationale:** Retries are a standard mechanism for masking transient network failures.
    **The Consequence:** Accidentally orchestrating a massive, synchronized DDoS attack against your own shared inference service during minor latency hiccups.
  napkin_math: |
    * Active clients: 100,000.
    * Retry behavior: 2 retries within a 10-second window.
    * Retry wave load: 100,000 clients * 2 = 200,000 extra requests.
    * Additional RPS: 200,000 / 10s = 20,000 RPS.
    * **The retry wave injects 20,000 RPS of artificial congestion before any original traffic is counted.**
