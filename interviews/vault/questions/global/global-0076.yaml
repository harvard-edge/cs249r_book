title: RoCEv2 PFC Storm Propagation
scenario: In a 400G RoCEv2 Ethernet cluster, an intermittent hardware fault in one NIC causes it to stop
  processing incoming packets while still maintaining link state. Within 2 milliseconds, the entire 1024-node
  subnet experiences a complete traffic freeze (0 Gbps throughput), affecting thousands of healthy nodes
  that are not communicating with the faulty node.
details:
  realistic_solution: The root cause is a Priority Flow Control (PFC) storm. RoCEv2 relies on lossless
    Ethernet, implemented via PFC (IEEE 802.1Qbb). When the faulty NIC stops processing packets, its receive
    buffer fills up. It sends a PFC PAUSE frame to its Top-of-Rack (ToR) switch. The ToR switch stops
    transmitting to that NIC, causing the ToR's buffer to fill up with incoming traffic from the Spine
    switches. The ToR then sends PFC PAUSE frames up to the Spines. The Spines' buffers fill, and they
    send PAUSE frames down to ALL other ToRs. This cascading effect, known as congestion spreading or
    a PFC storm, paralyzes the entire broadcast domain. The fix is enabling Watchdog timers to drop packets
    if a PFC PAUSE state persists beyond a threshold.
  common_mistake: Believing that Ethernet switches isolate fault domains, and focusing troubleshooting
    on the spine switch's routing tables instead of layer 2 flow control.
  napkin_math: A 400Gbps link pushes 50GB/s. A typical switch port buffer is 32MB. Time to fill buffer
    = 32MB / 50GB/s = 0.64ms. If the architecture has 3 tiers (NIC -> ToR -> Spine -> ToR), the pause
    cascade takes 3 * 0.64ms = ~1.92ms to freeze the entire fabric.
