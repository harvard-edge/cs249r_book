title: Cross-Lingual PTQ Activation Outliers
scenario: A globally deployed 30B LLM is quantized using INT8 W8A8 PTQ. English generation latency drops from 45ms/token to 22ms/token with <0.5% perplexity degradation. However, telemetry shows that German and Code generation outputs are producing gibberish, with perplexity spiking by 400%. Your calibration dataset consisted of 5,000 Wikipedia articles.
question: Why did quantization break specific languages?
details:
  realistic_solution: The root cause is uncalibrated activation outliers. Large language models exhibit massive activation outliers in specific feed-forward channels. Your PTQ calibration dataset used 5,000 English Wikipedia articles, so the static quantization scales for activations were set based on English outlier magnitudes. German and Code inputs route through different network pathways, producing activation outliers up to 10x larger than English ones in specific channels. Because the PTQ ranges were statically fixed to the English maximums, these cross-lingual outliers were severely clipped, destroying the signal. The solution is either SmoothQuant (migrating activation difficulty to weights) or using dynamic per-token activation quantization.
  common_mistake: |
    **The Pitfall:** Assuming the tokenizer vocabulary distribution caused the issue or that INT8 inherently lacks the precision for complex syntax.
    **The Rationale:** Tokenizers behave differently across languages, leading people to blame text representation rather than numerical activations.
    **The Consequence:** Wasting time tuning tokenizers or abandoning quantization for non-English languages.
  napkin_math: |
    **Assumptions & Constraints:**
    - English Max Activation = 15.0. INT8 Scale = 15.0 / 127 = 0.118 per bin.
    - German Max Activation = 120.0.

    **Calculations:**
    - With static scale, 120.0 is clipped to 15.0, losing 87.5% of the signal magnitude.
    - If calibrated on German: Scale = 120.0 / 127 = 0.94 per bin.

    **Conclusion & Interpretation:**
    - **Result: 16 bins (Precision-Bound)**. English activations (max 15.0) would then only use 15.0 / 0.94 = 16 bins (3-4 bits of precision), heavily degrading English.
