title: INT8 Quantization Serving Throughput Gain
scenario: Your 13B-parameter model in FP16 achieves 40 tokens/s during decode, which is memory-bandwidth-bound. You quantize to INT8.
question: After quantizing the memory-bound 13B FP16 decode model to INT8, what throughput should you expect?
details:
  realistic_solution: In memory-bound decode, throughput scales linearly with bytes-per-parameter reduction. FP16 = 2 bytes/param, INT8 = 1 byte/param, so memory traffic halves. Model size drops from 26 GB to 13 GB. Since decode is bandwidth-bound, throughput roughly doubles to ~80 tokens/s. In practice, you get slightly less due to dequantization overhead and activation memory, but 1.7-1.9× is realistic.
  common_mistake: |
    **The Pitfall:** Assuming quantization gives a 4x speedup because "INT8 is 4x smaller than FP32."
    **The Rationale:** People blindly apply the 4x INT8-vs-FP32 rule of thumb without checking the baseline precision.
    **The Consequence:** Massively overestimating the performance gains, leading to missed SLAs when throughput only doubles relative to FP16.
  napkin_math: |
    **Assumptions & Constraints:**
    - FP16 size: 13B × 2B = 26 GB.
    - INT8 size: 13B × 1B = 13 GB.

    **Calculations:**
    - Bandwidth saving = 2x.

    **Conclusion & Interpretation:**
    - **Result: ~80 tok/s (Memory-Bandwidth-Bound)**. Because decode is memory-bound, throughput roughly doubles: 2 × 40 tok/s = ~80 tok/s.
