title: Quantization Compression Arithmetic
scenario: A 1.2B parameter model is stored in FP16.
question: What are the FP16, INT8, and INT4 weight sizes for a 1.2B-parameter model before metadata?
details:
  realistic_solution: FP16 needs 2.4 GB, INT8 needs 1.2 GB, and INT4 needs 0.6 GB before scales and runtime buffers. The arithmetic is simple but critical for memory feasibility.
  common_mistake: |
    **The Pitfall:** Remembering the conceptual compression ratios but failing to calculate absolute memory footprints.
    **The Rationale:** Candidates know INT8 is half of FP16, but forget to multiply by the underlying parameter count.
    **The Consequence:** Memory feasibility for edge devices is incorrectly estimated, leading to deployment OOMs.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model parameters: 1.2 Billion.
    - FP16 format: 2 bytes per parameter.
    - INT8 format: 1 byte per parameter.
    - INT4 format: 0.5 bytes per parameter.

    **Calculations:**
    - FP16 Size = 1.2B * 2 bytes = 2.4 GB.
    - INT8 Size = 1.2B * 1 byte = 1.2 GB.
    - INT4 Size = 1.2B * 0.5 bytes = 0.6 GB.

    **Conclusion & Interpretation:**
    - **Result: Memory-Bound (Capacity).** The INT4 weight size is strictly 0.6 GB before accounting for necessary quantization scales and runtime buffers.
