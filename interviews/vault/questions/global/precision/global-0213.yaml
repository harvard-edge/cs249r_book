title: 4-Bit Quantization for Consumer GPU Deployment
scenario: 'A 70B-parameter model needs to run on a consumer GPU.'
question: 'What are the FP16, INT8, and INT4 memory footprints for the 70B model on a 24 GB GPU, and can it fit at INT4?'
details:
  realistic_solution: 'FP16: 70B x 2 bytes = 140 GB — needs 2x H100s. INT8: 70B x 1 byte = 70 GB — still too large. INT4 with overhead: 70B x (4 + 0.5) bits / 8 = 70B x 0.5625 bytes = 39.4 GB — still too large for 24 GB. With 3-bit GPTQ or aggressive compression: 70B x 0.4375 = 30.6 GB — still tight. Realistically, 70B models need ~35-40 GB at INT4, so you need at least 2x 24GB GPUs. A 34B model at INT4 ≈ 19 GB, which fits with room for KV cache.'
  common_mistake: |
    **The Pitfall:** Forgetting the quantization metadata overhead (scales and zero-points per group).
    **The Rationale:** Candidates assume 4-bit quantization perfectly halves the 8-bit size without accounting for the necessary scaling factors.
    **The Consequence:** Assuming a model will fit in VRAM when it actually exceeds capacity by a few gigabytes, causing an immediate OOM.
  napkin_math: |
    **Assumptions & Constraints:**
    - 70B parameter model, targeting 24 GB VRAM limit.
    - INT4 overhead (scales/zero-points) adds ~0.5 bits per parameter.

    **Calculations:**
    - FP16: 70B * 2B = 140 GB.
    - INT8: 70B * 1B = 70 GB.
    - INT4 + overhead: 70B * ((4 + 0.5) / 8) bytes = 39.4 GB.

    **Conclusion & Interpretation:**
    - **Result: 39.4 GB VRAM requirement (Memory-Bound)**. A 70B model cannot fit in 24 GB VRAM even at INT4 precision causing OOM.
