title: The Quantization Roofline Paradox
scenario: Your team quantizes an RNN-based sequence model from FP16 to INT8. The target accelerator provides 4x more INT8 TOPS than FP16 TFLOPS, and the memory footprint is halved. The team expects a 3x-4x latency reduction, but the end-to-end latency only improves by 18%.
question: "Why did INT8 quantization yield only an 18% latency gain despite 4x higher INT8 TOPS and half the memory footprint?"
details:
  realistic_solution: 'RNNs process tokens sequentially, requiring the entire weight matrix to be loaded from HBM for every token. This makes them heavily memory-bandwidth bound. When you move from FP16 to INT8, you halve the memory traffic, which theoretically doubles the speed of the memory-bound portion. However, the 4x increase in compute TOPS is completely irrelevant because the ALUs were already starving for data; raising the compute ceiling doesn''t help a workload stuck on the memory bandwidth slope. Furthermore, the 18% actual improvement (instead of 50%) is due to two factors: 1) Quantization/dequantization overheads inject new compute operations that disrupt memory access pipelining, and 2) the workload is likely hitting kernel launch latency limits or PCIe overheads, meaning it is no longer just bandwidth-bound, but latency-bound.'
  common_mistake: |
    **The Pitfall:** Assuming that because hardware TOPS increase by 4x, the workload execution speed will scale proportionally.
    **The Rationale:** Focusing entirely on compute throughput improvements rather than memory access patterns.
    **The Consequence:** Missing the actual bottleneck and over-promising quantization speedups.
  napkin_math: |
    **Assumptions & Constraints:**
    - Original FP16 total latency: 10ms (9ms memory transfer, 1ms compute).
    - INT8 memory transfer is halved; INT8 compute is 4x faster.
    - Kernel launch and quantization overheads apply.
    
    **Calculations:**
    - INT8 memory = 9ms / 2 = 4.5ms.
    - INT8 compute = 1ms / 4 = 0.25ms.
    - Theoretical INT8 latency + 0.5ms overhead = 4.5 + 0.25 + 0.5 = 5.25ms.
    - Expected speedup = 10 / 5.25 = ~1.9x.
    - Actual is 1.18x (8.4ms latency).
    
    **Conclusion & Interpretation:**
    - **Result: Kernel Latency Bound**. The gap between 5.25ms and 8.4ms indicates ~3ms of fixed kernel launch overheads dominating the critical path.
