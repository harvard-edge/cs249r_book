title: Pipeline Parallelism Bubble Overhead Analysis
scenario: 'You implement pipeline parallelism with 4 stages and 16 micro-batches, where each micro-batch takes 10 ms per stage. You need to analyze the bubble overhead and compare it with an alternative of 8 stages and 32 micro-batches.'
question: 'What are the bubble overhead and total time for the 4-stage/16-microbatch versus 8-stage/32-microbatch pipelines?'
details:
  realistic_solution: 'Bubble fraction = (P-1) / (P-1+M) where P=stages, M=micro-batches. Config A: 4 stages, 16 micro-batches: bubble = 3/(3+16) = 15.8%. Total time = (16+3) * 10 = 190 ms. Config B: 8 stages, 32 micro-batches: bubble = 7/(7+32) = 17.9%. Total time = (32+7) * 5 = 195 ms. Despite 2x more micro-batches, Config B has higher bubble overhead and slightly higher total time. To keep bubble below 10%, M must be >= 9(P-1).'
  common_mistake: |
    **The Pitfall:** Thinking more pipeline stages always improve throughput.
    **The Rationale:** Candidates incorrectly assume dividing work into smaller chunks naturally increases parallelism without penalizing pipeline flush/fill time.
    **The Consequence:** Leads to deeper pipelines with proportionally more bubble time, reducing actual throughput.
  napkin_math: |
    **Assumptions & Constraints:**
    - Config A: P=4, M=16, 10ms/stage.
    - Config B: P=8, M=32, 5ms/stage.

    **Calculations:**
    - Config A Bubble = (4-1) / (4-1+16) = 3/19 = 15.8%.
    - Config A Time = (16+3) * 10ms = 190ms.
    - Config B Bubble = (8-1) / (8-1+32) = 7/39 = 17.9%.
    - Config B Time = (32+7) * 5ms = 195ms.

    **Conclusion & Interpretation:**
    - **Result: 195ms total time (Pipeline-Bound)**. Config B is slower despite shorter stage times due to increased bubble overhead.
