title: Pipeline Parallelism Bubble Overhead Analysis
scenario: You implement pipeline parallelism with 4 stages and 16 micro-batches, where each micro-batch takes 10 ms per stage. You need to analyze the bubble overhead and compare it with an alternative of 8 stages and 32 micro-batches (each taking 5 ms per stage).
question: What are the bubble overhead and total time for the 4-stage/16-microbatch versus 8-stage/32-microbatch pipelines?
details:
  realistic_solution: 'Bubble fraction = (P-1) / (P-1+M) where P=stages, M=micro-batches. Config A: 4 stages, 16 micro-batches: bubble = 3/(3+16) = 15.8%. Total time = (16+3) \times 10 = 190 ms. Config B: 8 stages, 32 micro-batches: bubble = 7/(7+32) = 17.9%. Total time = (32+7) \times 5 = 195 ms. Despite 2\times more micro-batches, Config B has higher bubble overhead and slightly higher total time. The key insight: bubble fraction is (P-1)/(M+P-1). To keep it below 10%, you need M \geq 9(P-1). More stages require proportionally more micro-batches, which increases memory for in-flight activations.'
  common_mistake: |
    **The Pitfall:** Thinking more pipeline stages always improve throughput.
    **The Rationale:** Candidates incorrectly assume dividing work into smaller chunks naturally increases parallelism without penalizing pipeline flush/fill time.
    **The Consequence:** Leads to deeper pipelines with proportionally more bubble time, reducing actual throughput.
  napkin_math: |
    - Config A: bubble = 3 / (3 + 16) = 15.8%.
    - Config A: total time = (16 + 3) * 10 ms = 190 ms.
    - Config B: bubble = 7 / (7 + 32) = 17.9%.
    - Config B: total time = (32 + 7) * 5 ms = 195 ms.
    - **To get <10% bubble with 8 stages: need M >= 63 micro-batches.**
