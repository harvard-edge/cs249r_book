title: Sudden Training Throughput Drop
scenario: Your 128-GPU training run (16 nodes × 8 GPUs, TP=8 within node, DP=16 across nodes) suddenly
  drops from 45K tokens/sec to 28K tokens/sec — a 38% throughput loss. GPU utilization remains at 95%+
  on all GPUs. No OOM errors. Loss continues to decrease normally. What is happening?
question: "What is happening?"
details:
  realistic_solution: 'Root cause: a degraded InfiniBand link between two nodes. The symptoms are diagnostic:
    (1) all GPUs show 95%+ utilization — because NCCL AllReduce kernels (which are GPU-executed) show
    as ''GPU busy'' even when they''re waiting for network data. (2) 38% throughput drop ≈ the fraction
    of step time now spent in communication. With DP=16 across IB, gradient AllReduce is on the critical
    path. A degraded link (e.g., one port dropped from NDR 400 Gb/s to HDR 200 Gb/s due to a cable issue,
    or a port flapped to a slower speed) would double the AllReduce time for the ranks communicating through
    that link. Since AllReduce is synchronous across all 16 DP ranks, the slowest link determines overall
    throughput. Diagnosis: (1) check `ibstat` on all nodes for link speed/state, (2) run NCCL all-reduce
    benchmark between each pair of nodes to find the slow link, (3) check switch port error counters for
    CRC errors or symbol errors indicating a bad cable/transceiver.'
  common_mistake: Looking at GPU utilization and concluding the GPUs are fine. High GPU utilization with
    low throughput means the GPUs are busy waiting on communication, not computing. The 'utilization'
    metric includes time spent in NCCL communication kernels.
  napkin_math: 'Original: 45K tok/s. AllReduce for 7B model (14 GB FP16) over 16 DP ranks at 50 GB/s:
    ~0.56s. With degraded link at 25 GB/s: ~1.12s. Extra 0.56s on a ~1.5s step → throughput drops to 45K
    × 1.5/2.06 = 32.7K tok/s (≈28K with additional congestion).'
