title: Tail Headroom Arithmetic
scenario: A service has P50 latency 80 ms, P95 140 ms, and P99 260 ms. The SLO is
  P99 under 300 ms. Calculate P99 headroom and explain why P50 is not sufficient.
question: What P99 headroom remains under a 300 ms SLO if P99 is 260 ms?
details:
  realistic_solution: P99 headroom is 40 ms. P50 at 80 ms is not sufficient evidence
    because the tail is already much closer to the SLO. Optimization should target
    the sources of tail latency, not median latency.
  common_mistake: Using median latency to declare the service healthy while P99 is
    near the SLO.
  napkin_math: Headroom = 300 - 260 = 40 ms.
