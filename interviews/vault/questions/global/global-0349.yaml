title: Tail Headroom Arithmetic
scenario: A service has P50 latency 80 ms, P95 140 ms, and P99 260 ms. The SLO is P99 under 300 ms.
question: What P99 headroom remains under a 300 ms SLO if P99 is 260 ms, and why is P50 not sufficient evidence of health?
details:
  realistic_solution: P99 headroom is 40 ms. P50 at 80 ms is not sufficient evidence because the tail is already much closer to the SLO. Optimization should target the sources of tail latency, not median latency.
  common_mistake: |
    **The Pitfall:** Using median latency (P50) to declare the service healthy while P99 is dangerously near the SLO.
    **The Rationale:** Assuming the average user experience reflects the system's resilience to tail-end bottlenecks.
    **The Consequence:** Ignoring the specific queueing or garbage collection issues that cause tail spikes, leaving the system vulnerable to SLA breaches.
  napkin_math: |
    **Assumptions & Constraints:**
    - SLO Target: 300 ms (P99).
    - Current Latency: P50 (80 ms), P99 (260 ms).

    **Calculations:**
    - Headroom: 300 ms - 260 ms = 40 ms.

    **Conclusion & Interpretation:**
    - **Result: 40 ms Headroom (Latency-Bound)**. The P99 is perilously close to the SLO (40 ms headroom), making the median (P50) irrelevant for stability monitoring.
