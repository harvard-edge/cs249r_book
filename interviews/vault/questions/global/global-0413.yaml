title: Incomplete Federated Evaluation Plan
scenario: A product team wants federated learning for keyboard, camera, and wearable
  models. They specify the number of devices but omit client availability, label quality,
  update size, privacy budget, secure aggregation cost, and non-IID distribution.
question: What information is missing before comparing federated learning across keyboard,
  camera, and wearable models?
details:
  realistic_solution: You need client availability windows, local labels or proxy
    objectives, update sizes, uplink limits, secure aggregation overhead, privacy
    budget, dropout rate, and non-IID skew. Device count alone only bounds potential
    participation; it does not determine convergence, cost, or feasibility.
  common_mistake: Assuming more devices automatically means better federated learning
    without checking whether clients have labels, bandwidth, or stable availability.
  napkin_math: If only 5% of 10M devices are online and eligible per night, the effective
    pool is 500K devices before dropout and privacy filtering.
