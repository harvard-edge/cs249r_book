title: Incomplete Federated Evaluation Plan
scenario: A product team wants federated learning for keyboard, camera, and wearable models. They specify the number of devices but omit client availability, label quality, update size, privacy budget, secure aggregation cost, and non-IID distribution.
question: "What information is missing before comparing federated learning across keyboard, camera, and wearable models?"
details:
  realistic_solution: "You need client availability windows, local labels or proxy objectives, update sizes, uplink limits, secure aggregation overhead, privacy budget, dropout rate, and non-IID skew. Device count alone only bounds potential participation; it does not determine convergence, cost, or feasibility."
  common_mistake: |
    **The Pitfall:** Assuming more devices automatically means better federated learning without checking whether clients have labels, bandwidth, or stable availability.
    **The Rationale:** In centralized training, more data is usually better, so people intuitively apply this to distributed devices.
    **The Consequence:** Designing a federated system that stalls waiting for offline or low-bandwidth devices to return gradients.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Total pool = 10M devices.
       - Only 5% are online, charging, and on Wi-Fi per night.
    2. **Calculations:**
       - Effective pool = 10M × 0.05 = 500K devices.
    3. **Conclusion & Interpretation:**
       - **Result: Participation-Bound. The available pool is further reduced by dropouts and privacy filtering, making the raw device count misleading.**
