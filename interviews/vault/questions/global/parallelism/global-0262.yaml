title: AllReduce Communication Overhead
scenario: You are designing a distributed training setup using a ring AllReduce topology. You observe the data transferred per GPU asymptotically approaches twice the gradient size as the number of GPUs (N) increases.
question: Why does this approach O(2x gradient size) as N grows?
details:
  realistic_solution: Ring AllReduce works in two phases (scatter-reduce and allgather), each requiring N-1 steps. Every GPU sends (N-1)/N of the buffer twice. As N goes to infinity, this approaches 2x the buffer size, meaning communication cost scales sub-linearly and is bandwidth-optimal.
  common_mistake: |
    **The Pitfall:** Believing AllReduce communication cost grows linearly with the number of GPUs.
    **The Rationale:** Candidates incorrectly assume that more GPUs require proportionally more data to be broadcast globally.
    **The Consequence:** Distributed scaling limits are misunderstood, leading to the selection of incorrect hardware topologies.
  napkin_math: |
    **Assumptions & Constraints:**
    - N GPUs, gradient buffer size G.
    - Scatter-reduce phase: N-1 steps.
    - Allgather phase: N-1 steps.

    **Calculations:**
    - Scatter-reduce chunk size = G / N. Data sent per GPU = (N-1) * (G / N).
    - Allgather chunk size = G / N. Data sent per GPU = (N-1) * (G / N).
    - Total data sent per GPU = 2 * ((N-1)/N) * G.
    - Limit as N approaches infinity: 2 * 1 * G = 2G.

    **Conclusion & Interpretation:**
    - **Result: Network-Bound (Bandwidth).** The data transferred per GPU approaches a constant 2x the gradient size, proving ring AllReduce effectively scales network utilization.
