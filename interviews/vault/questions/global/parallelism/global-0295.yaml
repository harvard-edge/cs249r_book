title: 'Sudden Training Throughput Drop'
scenario: 'Your 128-GPU training run (16 nodes × 8 GPUs, TP=8 within node, DP=16 across nodes) suddenly drops from 45K tokens/sec to 28K tokens/sec — a 38% throughput loss. GPU utilization remains at 95%+ on all GPUs. No OOM errors. Loss continues to decrease normally.'
question: 'What is happening to cause this sudden 38% throughput drop?'
details:
  realistic_solution: 'Root cause: a degraded InfiniBand link between two nodes. The symptoms are diagnostic: (1) all GPUs show 95%+ utilization — because NCCL AllReduce kernels (which are GPU-executed) show as ''GPU busy'' even when they''re waiting for network data. (2) 38% throughput drop ≈ the fraction of step time now spent in communication. With DP=16 across IB, gradient AllReduce is on the critical path. A degraded link (e.g., one port dropped from NDR 400 Gb/s to HDR 200 Gb/s due to a cable issue, or a port flapped to a slower speed) would double the AllReduce time for the ranks communicating through that link. Since AllReduce is synchronous across all 16 DP ranks, the slowest link determines overall throughput. Diagnosis: (1) check `ibstat` on all nodes for link speed/state, (2) run NCCL all-reduce benchmark between each pair of nodes to find the slow link, (3) check switch port error counters for CRC errors or symbol errors indicating a bad cable/transceiver.'
  common_mistake: |
    **The Pitfall:** Looking at the 95%+ GPU utilization and concluding the GPUs and network are perfectly healthy.
    **The Rationale:** Assuming high utilization strictly means productive computation, ignoring that synchronous NCCL communication kernels spin on the GPU.
    **The Consequence:** Investigating data loaders or CPU bottlenecks while ignoring the degraded InfiniBand link.
  napkin_math: |
    **Assumptions & Constraints:**
    - Baseline throughput: 45K tokens/sec.
    - Degraded throughput: 28K tokens/sec.
    - Model: 7B parameter (14 GB FP16).
    - InfiniBand nominal: 50 GB/s. Degraded: 25 GB/s.

    **Calculations:**
    - Original AllReduce time (16 DP ranks): ~0.56s.
    - Degraded AllReduce time (bottlenecked by 1 slow link): ~1.12s.
    - Additional step time: 0.56s.
    - Original step time: ~1.5s. New step time: 1.5s + 0.56s = 2.06s.
    - New throughput: 45K * (1.5 / 2.06) ≈ 32.7K tokens/sec (drops further with congestion).

    **Conclusion & Interpretation:**
    - **Result: ~28K-32K tokens/sec (Network-Bandwidth-Bound)**. Due to a degraded IB link.
