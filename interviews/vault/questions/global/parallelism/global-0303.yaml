title: Global New 0004
scenario: You must serve a 175B parameter model in FP16 across multiple 80GB GPUs using Tensor Parallelism.
question: How do you calculate the minimum number of GPUs required for weights, and what is the NVLink transfer time for a 12MB activation tensor?
details:
  realistic_solution: 'Calculate the FP16 memory footprint and divide by the GPU memory capacity to find the minimum GPU count. Tensor parallelism requires massive inter-GPU communication, heavily relying on NVLink. The transfer time is calculated by dividing the activation payload size by the NVLink bandwidth.'
  common_mistake: |
    **The Pitfall:** Failing to round up the GPU count correctly, or miscalculating the NVLink transfer time.
    **The Rationale:** Mixing up megabytes and gigabytes in the division, or forgetting that weights cannot be partially stored.
    **The Consequence:** Architecting an undersized cluster that causes OOM, or misjudging the communication bottleneck.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 175B parameters in FP16 (2 bytes/param).
       - 80 GB capacity per GPU.
       - NVLink bandwidth: 600 GB/s. Activation tensor: 12 MB.
    2. **Calculations:**
       - Model weights footprint: 175B * 2 bytes = 350 GB.
       - Minimum GPUs: 350 GB / 80 GB = 4.375 -> requires 5 GPUs (practically 8 for symmetry).
       - Transfer time: 12 MB / 600 GB/s = 0.012 GB / 600 GB/s = 0.00002 seconds (20 microseconds).
    3. **Conclusion & Interpretation:**
       - **At least 5 GPUs are required for weights, and the NVLink activation transfer is 20 microseconds.**
       - **Result: Memory-Capacity Bound**
