title: DCQCN Congestion Control Oscillation
scenario: A 1024-GPU cluster uses RoCEv2 with DCQCN for congestion control. Under heavy All-to-All load,
  per-node bandwidth violently oscillates between 400Gbps and 5Gbps every few milliseconds. This sawtooth
  pattern leads to straggler nodes and delays the collective by 40%. Switch buffer drops are zero.
details:
  realistic_solution: The root cause is misconfigured Explicit Congestion Notification (ECN) thresholds
    (Kmin and Kmax) on the switches, interacting poorly with DCQCN. DCQCN relies on switches marking packets
    with ECN when buffers fill past Kmin, and marking 100% of packets at Kmax. If Kmin and Kmax are set
    too close together or too low in a high-speed (400G) network, a microburst instantly triggers 100%
    ECN marking. The sender NICs react by drastically cutting their transmission rates (Rate Decrease).
    The buffer drains instantly, ECN marking stops, and NICs aggressively ramp back up (Rate Increase).
    This causes severe, synchronized bandwidth oscillation (sawtoothing) without dropping a single packet.
  common_mistake: Assuming PFC deadlocks are occurring, or that the application is natively generating
    bursty traffic.
  napkin_math: Switch buffer = 32MB. Kmin = 1MB, Kmax = 2MB. At 400Gbps (50GB/s), the 1MB delta between
    Kmin and Kmax fills in 1MB / 50GB/s = 20μs. Since the network RTT is ~10μs, the switch goes from 'mild
    congestion' to '100% ECN marking' in just 2 RTTs. Senders slash rates, causing the 5Gbps trough, then
    recover, causing the 400Gbps peak.
