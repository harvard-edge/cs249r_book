title: The KV Cache Roofline Collapse
scenario: Benchmarking the attention kernel of an LLM on an A100 (40MB L2 cache, 2TB/s HBM). At batch size 16 (Sequence Length = 1024), attention token throughput is 2,500,000 tokens/s. To maximize throughput, you increase batch size to 128. You expect throughput to scale up or remain constant. Instead, attention throughput drops to 1,000,000 tokens/s.
question: Why does increasing the batch size from 16 to 128 drop attention kernel throughput by 2.5x on an A100?
details:
  realistic_solution: 'The attention kernel hit an L2 cache capacity cliff, causing the effective memory bandwidth roofline to collapse. At smaller batch sizes, the entire KV cache for the batch fits within the A100''s massive 40MB L2 cache. The attention mechanism can read the KV cache at L2 bandwidth speeds (~5 TB/s). When the batch size is increased to 128, the KV cache size exceeds the L2 capacity. The KV cache spills into HBM. Because decoding attention is a memory-bound operation, forcing it to fetch from HBM (2 TB/s) instead of L2 drops the effective bandwidth by 2.5x. The roofline ceiling shifts downward abruptly, throttling the throughput.'
  common_mistake: |
    **The Pitfall:** Assuming increasing batch size strictly increases arithmetic intensity and throughput.
    **The Rationale:** Standard dense training paradigms teach that larger batches are strictly better for utilization, ignoring the massive memory footprint of the autoregressive KV cache.
    **The Consequence:** Tuning batch sizes far past the optimal point, severely degrading inference latency and throughput simultaneously.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - KV Cache per token = 2 KB.
       - Sequence Length = 1024 tokens.
       - A100 L2 Cache = 40 MB (bandwidth @ 5 TB/s). HBM bandwidth @ 2 TB/s.
    2. **Calculations:**
       - BS=16 KV Size: 16 * 1024 * 2 KB = 32 MB. (32 MB < 40 MB L2 Cache).
       - BS=128 KV Size: 128 * 1024 * 2 KB = 256 MB. (256 MB >> 40 MB L2 Cache).
       - Bandwidth drop: 5 TB/s to 2 TB/s = exactly 2.5x reduction.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bandwidth-Bound.** Throughput drops exactly 2.5x because the 256 MB KV cache size crossed the physical L2 capacity cliff, spilling entirely into slower HBM.
