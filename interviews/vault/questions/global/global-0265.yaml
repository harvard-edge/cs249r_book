title: INT8 vs INT4 for Production LLM Serving
scenario: You are deploying a 70B model for production chat serving. INT8 shows 0.3% perplexity increase, INT4 shows 1.2%. Your SLA requires P99 latency < 200ms for 256-token responses.
question: "Compare INT8 vs INT4 quantization for a 70B model serving 256-token responses under a 200ms SLA. Which do you choose and why?"
details:
  realistic_solution: 'INT8 (70 GB) requires 1× A100-80GB; INT4 (35 GB) also fits on 1× A100-80GB but with more headroom for KV cache. For latency: decode is memory-bandwidth-bound. INT8 reads 70GB of weights per full forward pass; INT4 reads 35GB. At 2.0 TB/s: INT8 = 70/2000 = 35ms/token, INT4 = 35/2000 = 17.5ms/token. For 256 tokens end-to-end: INT8 ≈ 8.96s, INT4 ≈ 4.48s. Both far exceed the 200ms SLA for standard autoregressive generation! Batching increases throughput but does NOT reduce latency per request. Hitting <200ms for 256 tokens means <0.78ms/token. This SLA is completely unachievable on a single GPU. It requires Tensor Parallelism across 8 GPUs AND speculative decoding. You must choose INT4 because it gives you a 2x baseline speedup, which is fundamentally necessary (alongside advanced systems techniques) to even approach the required SLA. The 1.2% perplexity increase is acceptable for chat.'
  common_mistake: |
    **The Pitfall:** Choosing INT4 solely because it fits on fewer GPUs, ignoring the actual SLA math.
    **The Rationale:** Engineers prioritize memory constraints over latency math for single-request processing.
    **The Consequence:** Deploying an architecture that technically fits but misses the latency SLA by 20x.
  napkin_math: |
    - **Memory Bandwidth**: 2.0 TB/s (A100).
    - **INT8 Latency**: 70GB / 2 TB/s = 35ms/token. 256 tokens = 8.96s.
    - **INT4 Latency**: 35GB / 2 TB/s = 17.5ms/token. 256 tokens = 4.48s.
    - **SLA Requirement**: 200ms / 256 tokens = <0.78ms/token.
    - **Conclusion**: Both fail on 1 GPU. **INT4** provides the 2x baseline speedup necessary to make TP and speculative decoding viable to hit the SLA.
