title: Autograd Memory Budget Across Regimes
scenario: A training graph has 120 activation tensors of 16 MB each if all intermediates
  are retained. Cloud training has 80 GB HBM, an edge fine-tuning device has 8 GB
  unified memory, and a mobile personalization job has a 1 GB app memory budget. Size
  the raw activation footprint and decide which regimes require checkpointing or graph
  pruning.
question: Which regimes require activation checkpointing if an autograd graph retains
  120 tensors of 16 MB each?
details:
  realistic_solution: The raw activation footprint is 1.92 GB. Cloud HBM can absorb
    it if other state fits. The edge device may fit it but risks pressure once model
    weights and optimizer state are included. The mobile app budget cannot fit it
    at all, so it requires checkpointing, graph pruning, smaller batches, or adapter-only
    training.
  common_mistake: Checking only model weights and forgetting that autograd retains
    intermediate tensors for backward.
  napkin_math: 120 x 16 MB = 1,920 MB = 1.92 GB. This exceeds a 1 GB mobile app budget
    before weights or optimizer state.
