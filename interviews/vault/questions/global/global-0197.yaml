title: The Renewable Intermittency Trap
scenario: A company builds a 50 MW GPU datacenter co-located with a solar farm in Arizona. Solar produces 50 MW for 8 hours/day (capacity factor 33%) and 0 MW at night. Grid backup costs $0.09/kWh vs $0.02/kWh for solar. You run both latency-sensitive inference (30 MW, must run 24/7) and batch training (variable, up to 20 MW, can be deferred).
question: How would you schedule inference and batch training on solar and grid power to minimize cost while keeping inference available 24/7?
details:
  realistic_solution: 'Power budget analysis: Inference (24/7): 30 MW × 24h = 720 MWh/day. Training max: 20 MW × 24h = 480 MWh/day. Solar available: 50 MW × 8h = 400 MWh/day. Strategy: During solar hours (8h): Run inference (30 MW from solar) + training at max (20 MW from solar). Total: 50 MW solar, 0 MW grid. Cost: 400 MWh × $0.02 = $8,000. During night (16h): Run inference only (30 MW from grid). No training. Cost: 30 MW × 16h × $0.09 = $43,200. Daily cost: $8,000 + $43,200 = $51,200. Training throughput: 20 MW × 8h = 160 MWh/day (33% of 24/7 max). Alternative (run training 24/7 on grid at night): Night cost with training: (30+20) MW × 16h × $0.09 = $72,000. Daily total: $8,000 + $72,000 = $80,000. Extra cost for 24/7 training: $28,800/day ($10.5M/year) for 200% more training throughput. Decision: depends on whether training speed or cost efficiency is the priority.'
  common_mistake: |
    **The Pitfall:** Planning to run the entire datacenter on solar and being surprised when 16 hours/day require grid power, or treating training and inference identically.
    **The Rationale:** Renewable capacity factors are often ignored in initial budgeting, and engineers forget that inference cannot be deferred like batch training.
    **The Consequence:** Massive budget overruns when the sun sets, or unacceptable service downtime if inference is forcefully throttled.
  napkin_math: |
    - Solar-only training schedule:
      - Day (8h): 30 MW inference + 20 MW training = 50 MW * 8h * $20/MWh = $8,000.
      - Night (16h): 30 MW inference = 30 MW * 16h * $90/MWh = $43,200.
      - Total cost = $51,200/day. Training capacity = 160 MWh/day. Cost/MWh = $320/MWh.
    - 24/7 training (grid at night):
      - Night training cost = 20 MW * 16h * $90/MWh = $28,800.
      - Total cost = $51,200 + $28,800 = $80,000/day. Training capacity = 480 MWh/day. Cost/MWh = $167/MWh.
    - **Paradoxically, running 24/7 is cheaper PER UNIT of training because the inference grid cost is fixed. The marginal cost of night training is only $90/MWh.**
