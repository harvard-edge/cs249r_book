title: The Renewable Intermittency Trap
scenario: A 50 MW datacenter has 33% capacity factor solar ($0.02/kWh) and grid backup ($0.09/kWh). Inference needs 30 MW 24/7; training uses up to 20 MW opportunistically.
question: How would you schedule inference and batch training on solar and grid power to minimize cost while keeping inference available 24/7?
details:
  realistic_solution: 'Time-shift asynchronous workloads to solar envelopes. Saturate the 50 MW solar maximum during daytime for inference + training. At night, strictly isolate the 30 MW inference load to the $0.09 grid, pausing batched training to evade severe OpEx overruns.'
  common_mistake: |
    **The Pitfall:** Planning to run the entire datacenter on solar and being surprised when 16 hours/day require grid power, or treating training and inference identically.
    **The Rationale:** Renewable capacity factors are often ignored in initial budgeting, and engineers forget that inference cannot be deferred like batch training.
    **The Consequence:** Massive budget overruns when the sun sets, or unacceptable service downtime if inference is forcefully throttled.
  napkin_math: |
    **Assumptions & Constraints:**
    - Solar (8h): 50 MW at $20/MWh
    - Grid (16h): $90/MWh
    - Inference: 30 MW 24/7
    - Training: 20 MW (deferrable)

    **Calculations:**
    - Day (8h): 50 MW * 8 * $20 = $8,000
    - Night (16h): 30 MW * 16 * $90 = $43,200
    - Total cost = $51,200/day
    - Optional 24/7 Training cost = $28,800 extra ($90 marginal)

    **Conclusion & Interpretation:**
    - **Result: OpEx-Bound (Night Grid Dominates)**. Time-shifting training to solar daytime hours evades severe OpEx overruns.
