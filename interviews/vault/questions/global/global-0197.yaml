title: The Renewable Intermittency Trap
scenario: A company builds a 50 MW GPU datacenter co-located with a solar farm in Arizona. Solar produces
  50 MW for 8 hours/day (capacity factor 33%) and 0 MW at night. Grid backup costs $0.09/kWh vs $0.02/kWh
  for solar. You run both latency-sensitive inference (30 MW, must run 24/7) and batch training (variable,
  up to 20 MW, can be deferred). Evaluate power scheduling strategies to minimize cost while maintaining
  inference availability.
details:
  realistic_solution: 'Power budget analysis: Inference (24/7): 30 MW × 24h = 720 MWh/day. Training max:
    20 MW × 24h = 480 MWh/day. Solar available: 50 MW × 8h = 400 MWh/day. Strategy: During solar hours
    (8h): Run inference (30 MW from solar) + training at max (20 MW from solar). Total: 50 MW solar, 0
    MW grid. Cost: 400 MWh × $0.02 = $8,000. During night (16h): Run inference only (30 MW from grid).
    No training. Cost: 30 MW × 16h × $0.09 = $43,200. Daily cost: $8,000 + $43,200 = $51,200. Training
    throughput: 20 MW × 8h = 160 MWh/day (33% of 24/7 max). Alternative (run training 24/7 on grid at
    night): Night cost with training: (30+20) MW × 16h × $0.09 = $72,000. Daily total: $8,000 + $72,000
    = $80,000. Extra cost for 24/7 training: $28,800/day ($10.5M/year) for 67% more training throughput.
    Decision: depends on whether training speed or cost efficiency is the priority.'
  common_mistake: Planning to run the entire datacenter on solar and being surprised when 16 hours/day
    require grid power. Also, treating training and inference identically — inference cannot be deferred,
    but training can be scheduled to follow solar availability.
  napkin_math: 'Solar-only training: Cost = $51,200/day = $18.7M/year. Training capacity: 160 MWh/day.
    24/7 training (grid at night): Cost = $80,000/day = $29.2M/year. Training capacity: 480 MWh/day. Cost
    per training MWh: Solar-schedule: $18.7M / (160 × 365) = $320/MWh. 24/7 with grid: $29.2M / (480 ×
    365) = $167/MWh. Paradox: running 24/7 is cheaper PER UNIT of training because the inference grid
    cost is fixed regardless. The marginal cost of night training is only $0.09/kWh = $90/MWh.'
