title: Architecting SDC Detection in Large Clusters
scenario: You are training a 500B LLM on 8,192 GPUs. Every 3-4 days, the loss spikes to NaN. Checkpoint rollbacks succeed initially but often diverge again, indicating the checkpoint itself was corrupted by a Silent Data Corruption (SDC) bit-flip before the NaN occurred.
question: How would you architect an SDC detection mechanism that prevents saving corrupted checkpoints without doubling compute costs?
details:
  realistic_solution: Architect an anomaly-detection and parity-verification system that operates at the checkpoint boundary. Since full duplication is too expensive, track gradient norms and activation statistics asynchronously on the host CPU. If a sudden >5sigma deviation occurs, halt and run a deterministic Known Answer Test (KAT). More importantly, right before committing a checkpoint, run a lightweight forward pass of a fixed, deterministic 'reference batch' on all replicas. Broadcast and compare the loss checksums. If a rank's checksum mismatches, an SDC occurred. Reject the checkpoint, roll back, and cordon the faulty GPU.
  common_mistake: |
    **The Pitfall:** Implementing full compute duplication (running the entire training pass twice and comparing).
    **The Rationale:** Candidates resort to traditional fault-tolerance techniques that are prohibitively expensive at LLM scale.
    **The Consequence:** Doubling the GPU cost of the entire cluster, making the training run financially unviable.
  napkin_math: |
    **Assumptions & Constraints:**
    - Forward pass on a reference batch takes ~200ms.
    - 1-hour checkpoint frequency.
    - 8,192 GPUs.

    **Calculations:**
    - Overhead = 200ms / 3600s = 0.0055%.
    - Wasted compute = 72 hours * 8,192 GPUs = 589,824 GPU-hours.

    **Conclusion & Interpretation:**
    - **Result: Compute-Bound Overhead**. Full duplication is too expensive; anomaly detection is required.
