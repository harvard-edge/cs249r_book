title: Parallelism Strategy Selection Rule
scenario: A model can fit with tensor parallelism, pipeline parallelism, or data parallelism. The team has not specified model size, batch size, activation size, interconnect topology, or training versus inference.
question: "What information should drive selection among tensor, pipeline, and data parallelism?"
details:
  realistic_solution: "Choose based on the constraint being solved: data parallelism for throughput when each replica fits, tensor parallelism for per-layer model capacity with fast collectives, and pipeline parallelism for layer-wise capacity with enough microbatches. The missing inputs are model/activation sizes, batch, topology, and phase."
  common_mistake: |
    **The Pitfall:** Choosing a parallelism strategy by habit rather than by the binding memory or communication constraint.
    **The Rationale:** Some teams default to DeepSpeed ZeRO or Megatron-LM presets just because they are popular.
    **The Consequence:** Suboptimal scaling and wasted compute, e.g. using tensor parallelism across slow inter-node links.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - If one replica fits on a GPU, DP scaling is nearly linear.
    2. **Calculations:**
       - If one replica does not fit, but one layer does, PP allows linear model scaling.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound. If a single layer exceeds GPU memory, TP is strictly required.**
