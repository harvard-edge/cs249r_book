title: Parallelism Strategy Selection Rule
scenario: A model can fit with tensor parallelism, pipeline parallelism, or data parallelism.
  The team has not specified model size, batch size, activation size, interconnect
  topology, or training versus inference. Design a selection rule.
question: What information should drive selection among tensor, pipeline, and data
  parallelism?
details:
  realistic_solution: 'Choose based on the constraint being solved: data parallelism
    for throughput when each replica fits, tensor parallelism for per-layer model
    capacity with fast collectives, and pipeline parallelism for layer-wise capacity
    with enough microbatches. The missing inputs are model/activation sizes, batch,
    topology, and phase.'
  common_mistake: Choosing a parallelism strategy by habit rather than by the binding
    memory or communication constraint.
  napkin_math: If one replica fits on a GPU, data parallelism may be simplest; if
    one layer cannot fit, tensor or pipeline parallelism is required.
