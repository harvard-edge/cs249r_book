title: The QSPI Thrashing Spikes
scenario: On a Cortex-M7 (256KB SRAM, 2MB QSPI Flash), running on-device fine-tuning for federated learning. Epoch execution time jumps drastically from 400ms to 3.2s when the batch size increases from 1 to 2. Total theoretical memory footprint for batch size 2 is only 210KB.
question: Why does increasing the on-device fine-tuning batch size from 1 to 2 make epoch time jump from 400ms to 3.2s?
details:
  realistic_solution: The root cause is a loss of spatial and temporal locality causing D-Cache thrashing over the external QSPI Flash. With batch size 1, the activations and gradients fit entirely in the internal SRAM (TCM). When increasing to batch size 2, the memory arena exceeds the available contiguous internal SRAM, forcing the system's memory allocator to place activation buffers in the external memory-mapped QSPI Flash. Because federated learning backpropagation requires multiple passes over activations, the CPU constantly fetches data over the slow SPI bus, completely destroying locality and stalling the pipeline.
  common_mistake: |
    **The Pitfall:** Assuming the CPU is thermal throttling or the CMSIS-NN kernels lack optimizations for batch sizes greater than 1.
    **The Rationale:** Not tracking where memory allocations physically land across the microcontroller's memory map.
    **The Consequence:** Blaming compute or software libraries when the true bottleneck is the memory hierarchy and bus speeds.
  napkin_math: |
    - **Batch 1:** 80KB activations + 50KB OS = **130KB SRAM** (Fits perfectly)
    - **Batch 2:** 160KB activations + 50KB OS = **210KB SRAM**
    - **Fragmentation:** 210KB < 256KB, but without contiguous space, buffers spill to external QSPI Flash.
    - **Latency Penalty:** TCM (10ns) vs QSPI (40ns). A 30% cache miss rate adds (0.3 × 10M ops × 40ns) = **120ms penalty per layer**, pushing total time >3s.
