title: The INT4 Quantization Plateau
scenario: Serving Llama-2 13B on an RTX 4090 (1 TB/s bandwidth). FP16 decode latency is 26ms/token. You
  apply INT8 weight-only quantization, and latency drops to 13ms/token. Next, you apply INT4 weight-only
  quantization, expecting latency to drop to 6.5ms. Instead, latency plateaus at 12ms/token.
question: "Why does INT4 weight-only quantization plateau at 12ms/token after INT8 halved Llama-2 13B decode latency?"
details:
  realistic_solution: The workload experienced a bottleneck shift on the Roofline model. At FP16 and INT8,
    the decode phase was strictly memory-bandwidth bound, so halving the weight size halved the latency.
    However, standard GPUs do not have native 4-bit memory load instructions; they load 32-bit or 8-bit
    registers. INT4 weights must be explicitly unpacked and dequantized into FP16 using bitwise shifts
    and masks on the ALUs before the matrix multiplication can occur. This decompression requires significant
    compute instructions per byte. At INT4, the compute required for unpacking exceeds the time saved
    by fetching fewer bytes, shifting the workload from the memory-bandwidth slope to the compute-bound
    ceiling for the unpacking kernel.
  common_mistake: Assuming memory bandwidth scales linearly with precision reduction without accounting
    for ALU unpacking overhead or hardware fetch limits.
  napkin_math: 'FP16: 26GB / 1 TB/s = 26ms.

    INT8: 13GB / 1 TB/s = 13ms.

    INT4: 6.5GB / 1 TB/s = 6.5ms (Memory theoretical).

    BUT, Unpacking INT4 requires ~5 instructions per weight. 13B weights = 65 G-Ops. Due to dependency
    chains and register pressure in the unpacking kernel, effective ALU utilization is low, taking ~12ms.
    max(6.5ms, 12ms) = 12ms.'
