title: Cross-Regime Drift Sample Budget
scenario: A model runs in cloud, mobile, and edge modes. You need 50,000 labeled outcomes per segment each week to estimate drift. Cloud has 20 segments, mobile has 40 device cohorts, and edge has 1,000 stores. Size the total weekly labeled sample need and identify the hard regime.
question: How many weekly labeled outcomes are needed for cloud, mobile, and edge drift monitoring at 50,000 per segment?
details:
  realistic_solution: Cloud needs 1.0M outcomes, mobile needs 2.0M, and edge needs 50M if every store is treated as its own segment. The hard regime is edge because store-level segmentation explodes the sample requirement. The design should pool stores or use hierarchical alerts rather than requiring 50K labels per store.
  common_mistake: Applying the same per-segment target to every regime without noticing that segment cardinality changes the labeling budget.
  napkin_math: 'Cloud: 20 x 50K = 1M. Mobile: 40 x 50K = 2M. Edge: 1,000 x 50K = 50M.'
