title: Data Validation Budget Optimization
scenario: A data validation job checks 100 million records/day and costs 0.1 ms CPU
  per record. The team wants to cut cost by 80% while still catching schema regressions.
  Propose an optimization.
question: How would you reduce validation CPU cost by 80% while still catching schema
  regressions in 100M daily records?
details:
  realistic_solution: Full validation costs 10,000 CPU-seconds/day. To cut 80%, run
    full checks on a 20% stratified sample plus always-on cheap schema checks for
    all records and targeted full checks for new sources. This preserves broad coverage
    while reducing expensive validation.
  common_mistake: Randomly sampling 20% without preserving rare sources or new schema
    versions.
  napkin_math: Full expensive validation cost = 100M x 0.0001 s = 10,000 CPU-s. Running
    expensive checks on 20% costs 2,000 CPU-s, an 80% reduction before adding the
    cheap always-on schema checks.
