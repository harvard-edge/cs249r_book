title: Data Validation Budget Optimization
scenario: A data validation job checks 100 million records/day and costs 0.1 ms CPU per record. The team wants to cut cost by 80% while still catching schema regressions.
question: How would you reduce validation CPU cost by 80% while still catching schema regressions in 100M daily records?
details:
  realistic_solution: Full validation costs 10,000 CPU-seconds/day. To cut 80%, run full checks on a 20% stratified sample plus always-on cheap schema checks for all records and targeted full checks for new sources.
  common_mistake: |
    **The Pitfall:** Randomly sampling 20% of records.
    **The Rationale:** Looking for a quick reduction in volume without considering data distributions.
    **The Consequence:** Missing schema regressions in rare, newly introduced data sources that aren't captured by simple random sampling.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Volume: 100 million records/day.
       - Cost: 0.1 ms CPU per record.
       - Target: 80% cost reduction.
    2. **Calculations:**
       - Full validation cost: 100,000,000 * 0.0001s = 10,000 CPU-seconds.
       - 20% sample validation cost: 20,000,000 * 0.0001s = 2,000 CPU-seconds.
       - Cost reduction: 8,000 CPU-seconds saved.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound.** 80% reduction achieved safely via stratified sampling.
