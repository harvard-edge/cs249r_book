title: Little's Law for GPU Inference Server Sizing
scenario: Your service receives 500 requests/s. Average request latency is 200 ms. Each GPU handles 8 concurrent requests.
question: "How many GPUs are needed to handle 500 requests/s at 200 ms latency with 8 concurrent requests per GPU without queuing?"
details:
  realistic_solution: 'By Little''s Law: L = λ × W = 500 req/s × 0.2 s = 100 concurrent requests. GPUs needed = ceil(100 / 8) = 13 GPUs. Add 20% headroom for traffic spikes: 16 GPUs. This assumes uniform request distribution. In practice, with Poisson arrivals, you need more headroom — at 80% utilization target: 100 / 0.8 / 8 = 16 GPUs, matching our headroom estimate. Below 60% utilization, queuing delay is negligible; above 80%, tail latency explodes.'
  common_mistake: |
    **The Pitfall:** Dividing requests/s by a single-request throughput without accounting for concurrency.
    **The Rationale:** Conflating latency (time per request) with throughput (requests per second) in a concurrent system.
    **The Consequence:** Drastically over- or under-provisioning the cluster by misunderstanding the queue dynamics.
  napkin_math: |
    - **Little's Law**: L = λ * W.
    - **Concurrent requests (L)**: 500 req/s * 0.2 s = 100 concurrent requests.
    - **GPUs needed**: 100 requests / 8 requests per GPU = 12.5 GPUs.
    - **Headroom (20%)**: ceil(12.5) = 13 GPUs; 13 * 1.2 = 15.6.
    - **Conclusion**: You need **16 GPUs** to safely serve traffic with 20% headroom.
