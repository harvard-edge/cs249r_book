title: Optimizing a Compiled Inference Graph for Throughput
scenario: Your compiled model achieves 85% of peak TFLOPS during prefill but only 15% during decode. Decode dominates total latency for long outputs. Profile shows hundreds of tiny elementwise kernels during decode with high launch overhead.
question: How would you design a compilation optimization strategy for decode?
details:
  realistic_solution: 'Decode optimization plan: (1) CUDA Graphs: capture the entire decode step as a single graph. Eliminates per-kernel launch overhead (~10\mu s \times 100s of kernels = 1-2ms saved per step). (2) Aggressive operator fusion for decode path: fuse all elementwise ops into mega-kernels via torch.compile max-autotune. (3) Custom CUDA kernel for decode attention: FlashDecoding parallelizes across the KV cache sequence dimension. (4) KV cache in contiguous memory (PagedAttention compatible with CUDA Graphs). (5) INT8 KV cache: halves memory traffic for attention. Combined speedup ~2-3\times.'
  common_mistake: |
    **The Pitfall:** Focusing on compute optimization when decode is memory-bound.
    **The Rationale:** Candidates assume low TFLOPS means inefficient math kernels, failing to realize the issue is kernel launch overhead and HBM round-trips.
    **The Consequence:** Writing faster math kernels that provide zero speedup because the operations are entirely bound by memory latency.
  napkin_math: |
    **Assumptions & Constraints:**
    - 100 kernel launches per step.
    - Kernel launch overhead = 10 us.

    **Calculations:**
    - Overhead = 100 * 10 us = 1ms overhead per step.
    - Fusion reduces HBM round-trips from 3 to 1 (3x speedup for fused ops).
    - FlashDecoding adds 2x speedup for long sequences.

    **Conclusion & Interpretation:**
    - **Result: Launch-Overhead Bound**. Decode is memory-bound and limited by kernel launch overhead.
