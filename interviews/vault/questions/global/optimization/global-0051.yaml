title: MLPerf Execution Scenarios
scenario: MLPerf Inference defines four execution scenarios (Offline, Server, SingleStream, and MultiStream).
question: Why does MLPerf Inference need four separate scenarios, and what system property does each stress?
details:
  realistic_solution: 'Each scenario tests a different deployment reality. Offline measures maximum throughput when all data is available upfront - this stresses raw compute (FLOPS). Server measures throughput under a Poisson arrival process with latency constraints - this stresses queuing behavior and tail latency. SingleStream measures latency of one request at a time - this stresses pipeline overhead. MultiStream measures concurrent streams - this stresses memory bandwidth. A system topping the Offline leaderboard may fail the Server scenario.'
  common_mistake: |
    **The Pitfall:** Assuming "throughput is throughput" and that all inference workloads look the same.
    **The Rationale:** Believing an accelerator with high offline throughput will naturally excel at real-time serving.
    **The Consequence:** Deploying a system that tops the leaderboard in raw FLOPS but fails SLAs in production due to queuing and tail latency.
  napkin_math: |
    **Assumptions & Constraints:**
    - Offline mode (perfect batching): e.g., 10,000 samples/sec.
    - Server mode (latency constraint < 15ms): e.g., 3,000 samples/sec.
    
    **Calculations:**
    - Throughput gap: 10,000 / 3,000 = 3.3x.
    
    **Conclusion & Interpretation:**
    - **Result: 3.3x Gap (Latency-Bound)**. The 3.3x gap quantifies the cost of strict latency constraints.
