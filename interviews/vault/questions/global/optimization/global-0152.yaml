title: The Strided Cache Miss
scenario: A custom 2D Convolution layer for a visual wake word model takes 80ms to execute, but the theoretical
  MAC count suggests it should take 15ms. Weights are in QSPI Flash, activations in 256KB SRAM.
question: Why is the custom 2D convolution taking 80ms instead of the 15ms suggested by its MAC count?
details:
  realistic_solution: The root cause is a severe spatial locality violation in the custom kernel's nested
    loops. The activations are stored in row-major order (NHWC), but the custom C++ loop iterates over
    them in column-major order. On a Cortex-M7 with a 16KB D-Cache and 32-byte cache lines, this access
    pattern guarantees a cache miss on almost every memory load. Across dozens of filters, millions of
    cache misses accumulate, stalling the CPU while waiting for the memory controller to fetch new lines,
    which balloons the execution time from 15ms to 80ms.
  common_mistake: '**The Pitfall:** Concluding that the QSPI Flash bandwidth is fundamentally too slow
    for the required weight fetches.

    **The Rationale:** Blaming the hardware interconnect limits instead of diagnosing the extreme inefficiency
    of the software access pattern.

    **The Consequence:** Abandoning the low-power hardware for a more expensive chip when simply reordering
    the nested loops would fix the latency.

    '
  napkin_math: '**Assumptions & Constraints:**

    - Image: 96x96x1. Activations in NHWC (row-major).

    - Custom 3x3 convolution with 32 filters.

    - Cache: 16KB D-Cache, 32-byte lines. Miss penalty: 15 cycles.

    - CPU: 400MHz Cortex-M7.


    **Calculations:**

    - Total memory loads: 96 * 96 * 9 (kernel size) * 32 (filters) = ~2.65 million loads.

    - Accessing column-major guarantees a cache miss for almost every load.

    - Wasted cycles: 2.65 million misses * 15 cycles = ~39.8 million cycles.

    - Time penalty: 39.8 million cycles / 400 MHz = ~100 ms.


    **Conclusion & Interpretation:**

    - **Result: ~100ms added penalty (Memory-Latency-Bound)**. The spatial locality violation adds severe
    stall time, easily explaining the latency increasing to 80ms.'
