title: Edge LLM Unified Memory Sizing
scenario: Deploying a local 8B parameter coding assistant on an Apple Silicon laptop with a Unified Memory Architecture (16GB RAM, 100GB/s bandwidth). The OS and IDE constantly consume 6GB. The target is 20 tokens/sec, supporting an 8,000 token context window.
question: How would you lay out and quantize the 8B model and 8k KV cache to hit 20 tokens/sec without SSD swapping on 16GB Apple Silicon?
details:
  realistic_solution: 'With Unified Memory, the CPU and GPU share the same physical RAM, but exceeding physical capacity invokes swap space (SSD), which destroys LLM inference speed. Total available RAM = 16GB - 6GB (OS) = 10GB. An 8B model in FP16 requires 16GB (OOM). The architecture must aggressively compress both weights and KV cache. Step 1: Quantize weights to 4-bit (e.g., AWQ/GGUF), reducing weight footprint to ~4.5GB. Step 2: Quantize the KV cache to 8-bit. An 8k context KV cache in FP16 takes ~1.05GB. At 8-bit, it takes ~0.5GB. Total memory footprint: 4.5GB (weights) + 0.5GB (KV) + 1GB (workspace) = 6.0GB. This fits safely under the 10GB limit, avoiding SSD swap.'
  common_mistake: |
    **The Pitfall:** Loading the model in FP16 and assuming the OS will gracefully swap to the NVMe SSD.
    **The Rationale:** Unified memory is highly efficient, but developers forget that exceeding physical capacity invokes swap space, which has orders of magnitude lower bandwidth.
    **The Consequence:** Token generation speed drops from 20 tokens/sec to <1 token/sec, rendering the coding assistant unusable.
  napkin_math: |
    **Assumptions & Constraints:**
    - Apple Silicon Unified Memory: 16 GB Total - 6 GB (OS) = 10 GB Available.
    - Target speed: 20 tokens/sec. Bandwidth: 100 GB/s.

    **Calculations:**
    - 8B model at 4-bit quantization = ~4.5 GB.
    - 8k KV cache FP16 = 8,000 * 32 * 8 * 128 * 2 * 2 bytes = 1.05 GB.
    - Quantized 8-bit KV cache = ~0.5 GB.
    - Total footprint = 4.5 GB + 0.5 GB = 5.0 GB (Safely fits in 10 GB).
    - Max Speed = 100 GB/s / 5.0 GB = 20.0 tokens/sec.

    **Conclusion & Interpretation:**
    - **Result: 20.0 tokens/sec (Memory-Bandwidth-Bound)**. The 5.0 GB footprint perfectly saturates the 100 GB/s bus to hit the exactly 20 tokens/sec SLA while avoiding SSD swap.
