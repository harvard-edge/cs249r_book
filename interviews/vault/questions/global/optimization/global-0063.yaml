title: Optimizer State NVMe Offloading
scenario: You are fine-tuning a 70B parameter model on an 8-GPU node using DeepSpeed
  ZeRO-Infinity. The node has 4x PCIe Gen4 NVMe drives providing an aggregate read/write
  bandwidth of 28 GB/s. Profiling shows that the forward/backward passes take 5 seconds,
  but the optimizer step takes an agonizing 60 seconds, causing GPUs to sit idle 92%
  of the time.
question: What causes the 60-second optimizer step for the 70B fine-tune, and how
  would you reduce it?
details:
  realistic_solution: The 60-second delay is caused by the PCIe bandwidth bottleneck
    between the NVMe drives and GPU HBM. A 70B model requires 840GB of memory just
    for standard Adam optimizer states. To optimize, switch to an 8-bit Adam optimizer
    or offload to CPU RAM instead of NVMe if available.
  common_mistake: '**The Pitfall:** Increasing the micro-batch size to improve GPU
    utilization.

    **The Rationale:** It''s standard practice to increase batch size if GPUs are
    observed to be idle.

    **The Consequence:** Activation memory increases, forcing even more data to spill
    to NVMe and worsening the already severe I/O bottleneck.

    '
  napkin_math: '**Assumptions & Constraints:**

    - Model parameters: 70B.

    - Optimizer: Adam (3 tensors = 12 bytes/param).

    - NVMe Bandwidth: 28 GB/s. CPU DDR4 Bandwidth: ~200 GB/s.


    **Calculations:**

    - Adam State Size = 3 * 4 bytes * 70B = 840 GB.

    - Total NVMe Transfer = 840 GB (Read) + 840 GB (Write) = 1680 GB.

    - NVMe Time = 1680 GB / 28 GB/s = 60 seconds.

    - CPU RAM Time = 1680 GB / 200 GB/s = 8.4 seconds.


    **Conclusion & Interpretation:**

    - **Result: I/O-Bound.** Moving the offload target from NVMe to CPU RAM avoids
    the severe PCIe bottleneck, yielding a 7x speedup for the optimizer step.

    '
