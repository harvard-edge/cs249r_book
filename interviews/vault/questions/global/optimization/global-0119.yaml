title: SRAM Tiling for Custom Attention
scenario: You are writing a custom fused CUDA kernel for a novel sliding-window attention mechanism used in DNA sequence modeling (seq_len=131,072). The naive PyTorch implementation achieves only 5% Model Flops Utilization (MFU) because it is entirely memory-bandwidth bound.
question: How would you structure registers, shared memory, and HBM access for sliding-window attention at seq_len 131,072?
details:
  realistic_solution: 'The architecture must implement hardware-aware block tiling (similar to FlashAttention). The intermediate N x N attention matrix (Q*K^T) is too large to materialize in HBM, let alone SRAM. We must tile the computation into blocks that fit entirely within the SM''s shared memory (SRAM). Load a block of K and V into SRAM. Then, stream blocks of Q from HBM to SRAM, compute the partial attention scores, update the running maximum and denominator for the softmax, multiply by V, and accumulate the result in registers.'
  common_mistake: |
    **The Pitfall:** Attempting to load entire rows of the attention matrix into shared memory.
    **The Rationale:** Treating shared memory like an L1 cache that can seamlessly page in massive contiguous rows.
    **The Consequence:** Exceeding the strict physical 164 KB limit of SRAM per SM, causing the kernel launch to fail or silently spilling to global memory.
  napkin_math: |
    **Assumptions & Constraints:**
    - A100 HBM Bandwidth: 2 TB/s.
    - A100 SRAM per SM: 164 KB.
    - Intermediate QK^T size per head: 131,072 x 131,072 x 2 bytes (FP16) = ~34.3 GB.
    
    **Calculations:**
    - Naive HBM read/write time: (34.3 GB / 2000 GB/s) x 2 = ~34.3 ms.
    - Block size 128x128: K block = 32 KB, V block = 32 KB (fits easily in 164 KB).
    
    **Conclusion & Interpretation:**
    - **Result: 34.3 ms (Memory-Bandwidth Bound)**. Tiling reduces HBM accesses from O(N^2) to O(N), breaking the memory wall.
