title: Global New 0003
scenario: A 40B parameter model is quantized from FP16 to INT8 to run on a single H100 80GB GPU (3.35 TB/s memory bandwidth).
question: How would you calculate the memory savings achieved by quantization and the maximum theoretical decoding speed per token, assuming inference is strictly memory-bandwidth bound?
details:
  realistic_solution: Quantizing from 16-bit to 8-bit halves the parameter memory footprint, allowing larger models or larger batches to fit in VRAM. During autoregressive decoding at batch size 1, the entire model must be read from memory for every single token generated. The theoretical max tokens per second is the memory bandwidth divided by the model size.
  common_mistake: |
    **The Pitfall:** Calculating token speed using peak TFLOPS instead of memory bandwidth.
    **The Rationale:** It's unintuitive that an operation as complex as token generation is fundamentally limited by how fast weights can be read from memory, not how fast they are multiplied.
    **The Consequence:** Overestimating inference performance and making flawed hardware procurement decisions.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - FP16 model: 40B parameters at 2 Bytes/param.
       - INT8 model: 40B parameters at 1 Byte/param.
       - H100 memory bandwidth: 3.35 TB/s.
    2. **Calculations:**
       - FP16 model size = 40B * 2 Bytes = 80 GB.
       - INT8 model size = 40B * 1 Byte = 40 GB.
       - Memory savings = 80 GB - 40 GB = 40 GB.
       - Max Decoding Speed = 3.35 TB/s / 40 GB = 3350 GB/s / 40 GB = 83.75 tokens/second.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound.** Quantization saves 40 GB of memory and enables a theoretical decoding speed of ~83.75 tokens/second.
