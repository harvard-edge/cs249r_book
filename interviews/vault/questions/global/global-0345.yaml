title: Quantization Tier Rollout
scenario: A product wants one model family across cloud, mobile, and TinyML. Cloud can run BF16, mobile can run INT4, and TinyML needs binary weights.
question: How would you design a BF16, INT4, and binary-weight rollout without making misleading cross-regime quality claims?
details:
  realistic_solution: Treat each precision tier as a separate product variant with its own validation, supported tasks, and fallback behavior. Do not claim the binary TinyML model is equivalent to BF16 cloud unless measured on the same task distribution. Report per-tier quality, latency, memory, and energy.
  common_mistake: |
    **The Pitfall:** Advertising one model quality number across very different precision and hardware regimes.
    **The Rationale:** Treating the model architecture family as a single logical entity regardless of the severe loss of information during binary quantization.
    **The Consequence:** Delivering a TinyML product that drastically underperforms the advertised cloud benchmark, severely damaging user trust.
  napkin_math: |
    - **BF16:** 16 bits/weight
    - **INT4:** 4 bits/weight (≈ **4x shrink**)
    - **Binary:** 1 bit/weight (≈ **16x shrink**)
    - **Real-world footprint:** Actual compression ratios are lower once scales, lookup tables, and runtime buffers are included.
