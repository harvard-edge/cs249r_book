title: The Critical Batch Size
scenario: Your colleague proposes doubling the batch size to cut training time in half.
question: "Under what condition does doubling batch size halve training time, and when does that linear speedup break down?"
details:
  realistic_solution: 'There is a critical batch size B_crit for every model and dataset. Below B_crit, doubling batch size roughly halves the number of steps needed (data-parallel scaling holds). Above B_crit, doubling batch size yields diminishing returns \u2014 you process more samples per step but need nearly the same total number of gradient updates to converge. Beyond ~2x B_crit, you are wasting compute.'
  common_mistake: |
    **The Pitfall:** Believing that doubling batch size always halves training time.
    **The Rationale:** Candidates assume perfect data-parallel scaling without understanding the limits of gradient information gain per batch.
    **The Consequence:** Wasting massive amounts of compute beyond the critical batch size with diminishing returns on convergence.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Critical batch size B_crit (~1-10M tokens for LLMs).
    2. **Calculations:**
       - Below B_crit: 2x batch -> ~0.5x steps -> ~1x total compute (perfect scaling).
       - Above B_crit: 2x batch -> ~0.9x steps -> ~1.8x total compute (diminishing returns).
    3. **Conclusion & Interpretation:**
       - **Result: Diminishing Returns Limit.** Operating beyond B_crit wastes compute resources without proportional speedup.
