title: The Critical Batch Size
scenario: Your colleague proposes doubling the batch size to cut training time in half. Under what condition
  does this linear speedup hold, and when does it break down?
details:
  realistic_solution: There is a critical batch size B_crit for every model and dataset. Below B_crit,
    doubling batch size roughly halves the number of steps needed (data-parallel scaling holds). Above
    B_crit, doubling batch size yields diminishing returns — you process more samples per step but need
    nearly the same total number of gradient updates to converge. Beyond ~2× B_crit, you are wasting compute.
    For GPT-3-scale models, B_crit is typically 1-10M tokens, depending on the training phase.
  common_mistake: Believing that doubling batch size always halves training time. This holds only in the
    data-parallel regime below the critical batch size.
  napkin_math: 'Below B_crit: 2× batch → ~0.5× steps → ~1× total compute (perfect scaling) | Above B_crit:
    2× batch → ~0.9× steps → ~1.8× total compute (diminishing returns) | B_crit for large LLMs: ~1-10M
    tokens'
