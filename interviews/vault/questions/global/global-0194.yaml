title: The Green AI Paradox
scenario: 'Your carbon-aware scheduler routes training jobs to the region with the lowest carbon intensity at any given moment. Today it wants to move a 256-GPU training job from Virginia (500 gCO2/kWh, 10ms to data) to Quebec (20 gCO2/kWh, 80ms to data). The model trains on a 50TB dataset stored in Virginia.'
question: 'Does moving the 256-GPU training job from Virginia to Quebec reduce net carbon after data transfer and latency costs?'
details:
  realistic_solution: 'Data transfer cost: 50 TB over a 100 Gbps link. Network energy for transfer: ~0.01 kWh/GB x 50,000 GB = 500 kWh. Transfer carbon at Virginia''s rate: 500 x 500 = 250 kg CO2. Training carbon comparison: Training time ≈ 24 hours. Virginia: 256 x 0.7kW x 1.3 PUE x 24h x 500 gCO2/kWh = 2,795 kg CO2. Quebec: same compute + throughput reduction from data streaming over 80ms link. Energy: 256 x 0.7kW x 1.3 x 26.4h x 20 gCO2/kWh = 123 kg. Total Quebec = 123 + 250 (transfer) = 373 kg. Net savings: 2,795 - 373 = 2,422 kg CO2 (87% reduction). Verdict: the migration IS worth it because the 25x difference in carbon intensity overwhelms the transfer overhead.'
  common_mistake: |
    **The Pitfall:** Only counting operational carbon and ignoring the carbon cost of data transfer.
    **The Rationale:** Candidates fail to consider the holistic system boundaries, missing the energy cost of moving massive datasets across networks.
    **The Consequence:** Making supposedly "green" decisions that actually increase overall carbon emissions due to network transfer overhead.
  napkin_math: |
    **Assumptions & Constraints:**
    - Virginia: 500g CO2/kWh, Quebec: 20g CO2/kWh. 24h job.
    - 256 GPUs at 0.7kW, PUE = 1.3.

    **Calculations:**
    - Virginia training CO2 = 256 * 0.7 * 1.3 * 24 * 500g = 2,795 kg CO2.
    - Quebec training CO2 (with 10% penalty) = 256 * 0.7 * 1.3 * 26.4 * 20g = 123 kg CO2.
    - Data transfer CO2 = 50,000 GB * 0.01 kWh/GB * 500g = 250 kg CO2.
    - Total Quebec CO2 = 123 + 250 = 373 kg CO2.

    **Conclusion & Interpretation:**
    - **Result: 87% Carbon Reduction (Power-Bound)**. The extreme delta in grid intensity justifies the transfer penalty.
