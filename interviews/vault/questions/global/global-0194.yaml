title: The Green AI Paradox
scenario: Your carbon-aware scheduler routes training jobs to the region with the lowest carbon intensity
  at any given moment. Today it wants to move a 256-GPU training job from Virginia (500 gCO2/kWh, 10ms
  to training data) to Quebec (20 gCO2/kWh, 80ms to training data). The model trains on a 50TB dataset
  stored in Virginia. Evaluate whether this migration actually reduces net carbon.
details:
  realistic_solution: 'Data transfer cost: 50 TB over a 100 Gbps link = 50,000 GB / 12.5 GB/s = 4,000
    seconds ≈ 67 minutes. Network energy for transfer: ~0.01 kWh/GB × 50,000 GB = 500 kWh. Transfer carbon
    at Virginia''s rate: 500 × 500 = 250 kg CO2. Training carbon comparison: Training time ≈ 24 hours.
    Virginia: 256 × 0.7kW × 1.3 PUE × 24h × 500 gCO2/kWh = 2,795 kg CO2. Quebec: same compute + 67min
    extra startup + potential 10% throughput reduction from data streaming over 80ms link. Energy: 256
    × 0.7kW × 1.3 × 26.4h × 20 gCO2/kWh = 123 kg. Total Quebec = 123 + 250 (transfer) = 373 kg. Net savings:
    2,795 - 373 = 2,422 kg CO2 (87% reduction). Verdict: the migration IS worth it because the 25× difference
    in carbon intensity overwhelms the transfer overhead. However, if the carbon intensity difference
    were only 2×, the transfer cost could negate the savings.'
  common_mistake: Only counting operational carbon (electricity × carbon intensity) and ignoring the carbon
    cost of data transfer. Moving 50TB of training data across 80ms of network incurs significant energy
    in networking equipment, and the increased latency may extend training time, consuming more total
    energy.
  napkin_math: 'Virginia training: 256 × 0.7kW × 1.3 × 24h = 5,591 kWh × 500g = 2,795 kg CO2. Quebec training:
    5,591 kWh × 1.1 (throughput penalty) × 20g = 123 kg. Data transfer: 500 kWh × 500g = 250 kg. Quebec
    total: 373 kg. Savings: 2,422 kg (87%). Break-even carbon ratio: transfer cost / training cost = 250
    / 5,591 = 4.5%. Migration not worth it only if Quebec carbon > 500 × (1 - 0.045) ≈ 478 gCO2/kWh.'
