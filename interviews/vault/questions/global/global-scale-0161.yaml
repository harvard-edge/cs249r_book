title: Portable Training Graph Memory Spec
scenario: You are specifying an on-device training feature that may run on cloud GPUs for debugging, edge gateways for site adaptation, and mobile phones for personalization. The model team wants to keep the full autograd graph for all layers. Specify the memory telemetry and graph controls required before approving the feature.
question: What memory telemetry and graph controls are required before approving full-autograd training across cloud, edge, and mobile regimes?
details:
  realistic_solution: Require peak activation memory, retained tensor count, parameter and optimizer state, batch size, gradient accumulation, recomputation settings, and per-layer memory attribution. The controls should include activation checkpointing, frozen layers, adapter-only training, batch caps, and OOM-safe rollback. Without these, full autograd may pass in cloud and fail on constrained devices.
  common_mistake: Treating autograd as a framework detail instead of a memory-capacity design constraint.
  napkin_math: 'Example memory accounting should separate components: parameters plus gradients may be ~2x model weights, Adam m+v adds ~2x FP32 state relative to FP32 parameters, and activations add separately. A 500 MB model can therefore become multiple GB once optimizer state and activations are included; exact multipliers depend on precision and optimizer implementation.'
