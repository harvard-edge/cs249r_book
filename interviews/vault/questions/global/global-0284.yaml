title: Training Observability Dashboard Design
scenario: 'Design a monitoring system for a 256-GPU training run of a 70B model expected to take 21 days.
  Requirements: detect hardware failures within 60 seconds, detect training instability (loss spikes,
  gradient explosions) within 5 minutes, provide MFU tracking, and support post-mortem analysis. What
  metrics, alerts, and dashboards do you build?'
details:
  realistic_solution: 'Four-layer monitoring stack: (1) Hardware layer (60s detection): per-GPU metrics
    every 10s — temperature, power draw, HBM utilization, ECC error count, NVLink/IB link status. Alert:
    temperature > 83°C (throttling), ECC errors > 0 (impending failure), any link down. Use DCGM exporter
    → Prometheus → PagerDuty. (2) Communication layer: per-step AllReduce time, per-rank gradient norm,
    straggler detection (any rank > 2σ from mean step time). Alert: AllReduce time > 2x baseline (network
    degradation), step time variance > 20% (straggler). (3) Training dynamics layer (5-min detection):
    loss (per-step + 100-step EMA), gradient norm (global + per-layer), learning rate, batch throughput
    (samples/sec), MFU = actual_FLOPS / theoretical_peak. Alert: loss spike > 3σ from EMA, gradient norm
    > 10x baseline, MFU drop > 15%. Compute MFU: actual_tokens_per_sec × 6 × model_params / (num_GPUs
    × peak_FLOPS). (4) Data pipeline layer: dataloader queue depth, prefetch buffer occupancy, disk I/O
    wait. Alert: queue depth = 0 (starvation). Dashboard: real-time panel with loss curve + grad norm
    + MFU + GPU temps, plus a Gantt-chart view showing per-step breakdown (forward/backward/allreduce/idle)
    for identifying bottlenecks.'
  common_mistake: Only monitoring loss and GPU utilization. These catch obvious failures but miss subtle
    issues like learning rate schedule bugs, data pipeline stalls, slow stragglers, or thermal throttling
    that wastes 10-20% of compute.
  napkin_math: '256 GPUs × 10 metrics × 1 sample/10s = 256 samples/sec → 22M samples/day. At 100 bytes
    each: 2.2 GB/day raw metrics. 21-day run: 46 GB total. MFU target: 50% on H100 = 256 × 989T × 0.5
    = 126.6 PFLOPS effective.'
