title: Encoder Decoder Serving Spec Across Surfaces
scenario: A product wants the same speech assistant in cloud, mobile, and edge modes.
question: What must be specified before choosing an encoder-decoder or decoder-only architecture for these deployment surfaces?
details:
  realistic_solution: Specify input length, output length distribution, streaming requirement, time to first partial result, memory footprint, decoder token cost, batching ability, and hardware operator support. Architecture choice depends on interaction shape, not just benchmark accuracy.
  common_mistake: |
    **The Pitfall:** Choosing an architecture based on offline accuracy alone.
    **The Rationale:** Ignoring streaming constraints, time-to-first-token, and per-token decode costs.
    **The Consequence:** Deploying an architecture that cannot meet real-time interactive constraints on edge hardware.
  napkin_math: |
    - As output length doubles, decoder-only latency grows proportionally.
    - Encoder-decoder systems can absorb long inputs cheaply.
    - **Tradeoff:** Token generation cost vs. prompt processing cost.
