title: Encoder Decoder Serving Spec Across Surfaces
scenario: A product wants the same speech assistant in cloud, mobile, and edge modes.
  Specify what model and serving parameters must be known before choosing encoder-decoder
  versus decoder-only architectures.
question: What must be specified before choosing encoder-decoder or decoder-only architecture
  for cloud, mobile, and edge speech serving?
details:
  realistic_solution: Specify input length, output length distribution, streaming
    requirement, time to first partial result, memory footprint, decoder token cost,
    batching ability, and hardware operator support. Architecture choice depends on
    interaction shape, not just benchmark accuracy.
  common_mistake: Choosing the architecture with best offline accuracy while ignoring
    streaming and per-token decode cost.
  napkin_math: If output length doubles, decoder-only and encoder-decoder systems
    can see latency grow roughly with generated tokens, even if encoder cost is fixed.
