title: Memory-Bound vs Compute-Bound Intuition
scenario: You are deploying an LLM and must explain the architectural bottleneck differences between generation and training.
question: Why is batch-1 autoregressive LLM decoding memory-bandwidth-bound while large-batch training is compute-bound, according to the roofline model?
details:
  realistic_solution: 'In batch-1 decoding, each token generation requires reading all model weights from HBM but performs very few FLOPs per weight (matrix-vector multiply, AI ≈ 1 FLOP/Byte). You read 140 GB of weights at 2.0 TB/s = 70ms per token, but only perform 140 GFLOP — consuming 70ms of bandwidth time but only 0.449ms of compute time. The ALUs sit essentially idle. In large-batch training, GEMM operations become matrix-matrix multiplies (batch dimension >> 1). For batch=2048, AI = 2048 FLOP/Byte, far above the 156 ridge point. Now compute is the bottleneck: you have enough data reuse to keep the Tensor Cores busy.'
  common_mistake: |
    **The Pitfall:** Claiming decoding is slow purely because of the sequential token generation step.
    **The Rationale:** Confusing the sequence-level latency dependency with the fundamental hardware throughput bottleneck (bandwidth).
    **The Consequence:** Attempting to optimize decoding by upgrading ALUs instead of utilizing techniques like continuous batching or quantization that address memory bandwidth.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Decode (Batch=1): 140 GB weights, 2 TB/s bandwidth, 312 TFLOPS compute.
       - Training (Batch=2048): Arithmetic Intensity = 2048 FLOP/Byte.
    2. **Calculations:**
       - Decode Memory Time: 140 GB / 2 TB/s = 70 ms.
       - Decode Compute Time: 140 GFLOP / 312 TFLOPS = 0.449 ms.
       - Utilization: 0.449 ms / 70 ms = 0.64%.
    3. **Conclusion & Interpretation:**
       - **Result: Decode is Memory-Bound.** Decode heavily underutilizes ALUs (0.64%), while large-batch training AI (2048) easily exceeds the 156 FLOP/Byte ridge point.
