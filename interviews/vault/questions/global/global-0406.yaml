title: Disaggregated Serving Interface Spec
scenario: A team wants to split LLM prefill and decode across different GPU pools.
question: What interface contract is needed between prefill and decode workers in a disaggregated LLM serving system?
details:
  realistic_solution: The contract should specify KV-cache tensor layout, precision, sequence metadata, transfer protocol, ownership/lifetime, backpressure, retry semantics, and latency budget. It should also define compatibility across model versions and how decode workers reject incompatible or oversized KV payloads.
  common_mistake: |
    **The Pitfall:** Treating disaggregation as a simple RPC boundary and ignoring KV cache structure.
    **The Rationale:** Assuming standard microservice architectures apply to tightly coupled, gigabyte-scale tensor states.
    **The Consequence:** Network saturations and massive latency spikes due to undefined tensor precision and transfer bottlenecks.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Target transfer budget: 20 ms.
       - KV state payload: 4 GB per request.
    2. **Calculations:**
       - Required bandwidth: 4 GB / 0.020 seconds = 200 GB/s.
    3. **Conclusion & Interpretation:**
       - **Result: 200 GB/s required. Network-Bandwidth-Bound, necessitating compression or PCIe/NVLink direct paths.**
