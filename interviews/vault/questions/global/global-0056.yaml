title: E2E Edge Benchmarking Under Thermal Limits
scenario: 'You are deploying a cascaded speech translation pipeline (ASR -> MT -> TTS) on an edge SoC with a strict 5W Sustained Power limit and 1.5GB RAM. Component micro-benchmarks show latencies of ASR: 200ms, MT: 150ms, TTS: 250ms. However, during an end-to-end sustained offline benchmark, P99 latency degrades to 2.8 seconds after 30 seconds of load.'
question: How would you build an end-to-end benchmark and profiler to isolate why P99 latency hits 2.8s after 30s on the 5W edge SoC?
details:
  realistic_solution: 'Design an E2E macro-benchmarking harness that runs continuous, pipelined queries rather than isolated inferences. The architecture must integrate three telemetry streams: 1) Application-level trace spans for ASR, MT, and TTS execution times. 2) OS-level memory allocation hooks to track RAM fragmentation and swap. 3) Hardware-level metrics reading sysfs thermal zones and INA219 power rail sensors at 100Hz. The bottleneck analysis will reveal that pipelining the models causes the SoC to draw 8W, exceeding the 5W thermal envelope. After 30 seconds, the SoC hits 90C and the OS drops the NPU/CPU DVFS (Dynamic Voltage and Frequency Scaling) frequencies to cool down. The architectural fix involves requirement-to-architecture changes: implementing an inference scheduler that serializes heavy NPU phases or introduces deliberate micro-sleeps to keep sustained power draw strictly under 5W, trading optimal single-query latency for stable sustained throughput.'
  common_mistake: |
    **The Pitfall:** Summing isolated micro-benchmark latencies to estimate E2E performance, completely ignoring thermal throttling and memory contention.
    **The Rationale:** Assuming sequential edge model execution perfectly matches isolated container tests without accounting for shared silicon and thermal limits.
    **The Consequence:** Deploying a system that works for 10 seconds and then severely degrades, ruining the real-time user experience.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Power Limit: 5W sustained. Memory: 1.5 GB RAM.
       - Ideal sum: 200ms + 150ms + 250ms = 600ms.
       - Component power: ASR (3W), MT (4W), TTS (3W).
    2. **Calculations:**
       - Pipelined peak power: 10W. Thermal exhaustion in ~30s.
       - DVFS throttles clock by 60% (running at 40%) to hold ~4W.
       - Throttled latency: 600ms / 0.4 = 1,500ms.
       - SRAM swap penalty for overlapping 3 models: +500ms.
       - Pipeline bubble: +800ms.
       - Total throttled latency: 1500 + 500 + 800 = 2,800ms.
    3. **Conclusion & Interpretation:**
       - **Result: 2.8s P99 latency. Thermal-Throttling-Bound requiring serialized scheduling.**
