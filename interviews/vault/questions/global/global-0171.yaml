title: The Datacenter Overhead Multiplier
scenario: A hyperscaler reports a PUE (Power Usage Effectiveness) of 1.2 for their datacenter. If the
  IT equipment draws 10 MW of power, how much total power does the facility consume?
question: "If the IT equipment draws 10 MW of power, how much total power does the facility consume?"
details:
  realistic_solution: Total facility power = PUE × IT load = 1.2 × 10 MW = 12 MW. The extra 2 MW goes
    to cooling (the dominant factor), power distribution losses, lighting, and security systems. Industry-leading
    datacenters achieve PUE ~1.1, while older facilities may have PUE of 1.5-2.0.
  common_mistake: Thinking PUE is a percentage overhead. A PUE of 1.2 does not mean 1.2% overhead — it
    means the facility draws 1.2× the IT load, so 20% goes to cooling, lighting, and other non-compute
    overhead.
  napkin_math: Total power = PUE × IT power = 1.2 × 10 MW = 12 MW. Overhead = 12 MW - 10 MW = 2 MW wasted.
    At $0.05/kWh, that overhead costs 2,000 kW × 8,760 hours × $0.05 = $876,000/year just for cooling
    and infrastructure.
