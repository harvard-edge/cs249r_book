title: The Datacenter Overhead Multiplier
scenario: A hyperscaler reports a PUE (Power Usage Effectiveness) of 1.2 for their datacenter.
question: If the IT equipment draws 10 MW of power, how much total power does the facility consume?
details:
  realistic_solution: Total facility power = PUE x IT load = 1.2 x 10 MW = 12 MW. The extra 2 MW goes to cooling, power distribution losses, lighting, and security systems.
  common_mistake: |
    **The Pitfall:** Thinking PUE is a percentage overhead instead of a multiplier.
    **The Rationale:** A PUE of 1.2 intuitively sounds like "1.2%" overhead to those unfamiliar with the metric.
    **The Consequence:** The required power budget and cooling costs are drastically underestimated by orders of magnitude.
  napkin_math: |
    **Assumptions & Constraints:**
    - PUE = 1.2.
    - IT load = 10 MW.
    - Cost of energy = ~$0.05/kWh.

    **Calculations:**
    - Total Power = PUE * IT load = 1.2 * 10 MW = 12 MW.
    - Overhead Power = 12 MW - 10 MW = 2 MW.
    - Annual Overhead Cost = 2000 kW * 8760 hours/year * $0.05/kWh = $876,000.

    **Conclusion & Interpretation:**
    - **Result: Power-Bound.** The 2 MW overhead scales directly with IT load, costing nearly $1M/year just for cooling and infrastructure losses.
