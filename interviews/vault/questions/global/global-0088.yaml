title: Tradeoffs in High-Throughput Embedding Drift Detection
scenario: A global recommender system processes 100,000 QPS. To detect upstream pipeline breakages, you added a sidecar to monitor feature drift on 256-dimensional user embeddings. However, computing exact distribution metrics synchronously per request causes a 40ms P99 latency overhead, and the observability sidecars (allocated 2GB RAM each) are constantly OOM crashing.
question: How would you monitor 256-dimensional embedding drift at 100,000 QPS without adding 40 ms latency or OOMing 2 GB sidecars?
details:
  realistic_solution: "Analyze the tradeoff between exact drift metrics and approximated/sampled metrics. Implement Reservoir Sampling (e.g., maintaining a fixed reservoir of 10,000 embeddings per minute) or approximate sketching algorithms like T-Digest for quantiles in the sidecar. This strictly bounds memory usage and shifts the latency overhead from O(N) payload processing to O(1) sampling checks. The sidecar then asynchronously flushes these sketches to a centralized metrics backend."
  common_mistake: |
    **The Pitfall:** Attempting to calculate exact Wasserstein distance or KS-tests on the full stream synchronously.
    **The Rationale:** Jumping to the statistically pure solution without considering the per-request latency overhead or memory accumulation required to hold the distributions.
    **The Consequence:** The observability sidecar becomes the bottleneck, adding 40ms latency and repeatedly OOM crashing, bringing down the primary service.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Stream: 100,000 QPS, 256 floats (4 bytes).
       - Sidecar memory: 2 GB.
    2. **Calculations:**
       - Exact tracking: 100,000 * 256 * 4 = 102.4 MB/sec.
       - In 1 minute: 102.4 * 60 = ~6.1 GB (Immediate OOM).
       - Reservoir sampling (size = 10,000): 10,000 * 256 * 4 = 10.24 MB fixed memory overhead.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound.** Latency drops from O(N) processing to a lightweight O(1) random check, preventing OOMs.
