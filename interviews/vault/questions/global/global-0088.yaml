title: Tradeoffs in High-Throughput Embedding Drift Detection
scenario: A global recommender system processes 100,000 QPS. To detect upstream pipeline breakages, you
  added a sidecar to monitor feature drift on 256-dimensional user embeddings. However, computing exact
  distribution metrics synchronously per request causes a 40ms P99 latency overhead, and the observability
  sidecars (allocated 2GB RAM each) are constantly OOM crashing.
question: "How would you monitor 256-dimensional embedding drift at 100,000 QPS without adding 40 ms latency or OOMing 2 GB sidecars?"
details:
  realistic_solution: Analyze the tradeoff between exact drift metrics (which cause latency/memory bloat)
    and approximated/sampled metrics. Since drift is a macro-level statistical phenomenon, exact per-request
    tracking is unnecessary. Implement Reservoir Sampling (e.g., maintaining a fixed reservoir of 10,000
    embeddings per minute) or approximate sketching algorithms like T-Digest for quantiles in the sidecar.
    This strictly bounds memory usage and shifts the latency overhead from O(N) payload processing to
    O(1) sampling checks. The sidecar then asynchronously flushes these sketches to a centralized metrics
    backend where the actual drift divergence is computed offline.
  common_mistake: Attempting to calculate exact exact Wasserstein distance or KS-tests on the full stream
    synchronously.
  napkin_math: 'Exact tracking: 100,000 QPS * 256 floats * 4 bytes = 102.4 MB/sec per node. In 1 minute,
    this accumulates ~6.1 GB, immediately causing a 2GB sidecar to OOM. Reservoir sampling (size = 10,000):
    10,000 * 256 * 4 bytes = ~10.2 MB fixed memory overhead. Latency drops from processing 100k ops to
    a lightweight random check.'
