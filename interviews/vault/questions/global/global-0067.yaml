title: Petabyte-Scale Near-Duplicate Detection Tradeoffs
scenario: You are tasked with near-duplicate deduplication of a 5 PB web-crawled text dataset (approx 10 billion documents) using a 1,000-node Spark cluster. You opt for MinHash + LSH to find collisions, but must manage the tradeoff between collision precision, false positive rates, compute time, and the massive network shuffle bottleneck when aggregating billions of signatures.
question: How would you design the MinHash+LSH pipeline to deduplicate 10B documents without an O(N^2) shuffle?
details:
  realistic_solution: 'Implement a Banded MinHash LSH pipeline to trade perfect exactness for linear shuffle scalability. Instead of all-to-all comparisons, divide the 256 MinHash signatures into ''b'' bands of ''r'' rows. Map phase: For each document, emit ''b'' key-value pairs. Reduce phase: Group by key. Only documents falling in the same bucket for at least one band are candidate pairs. To mitigate hot keys, inject a frequency cap during Map to filter out highly frequent band-hashes before the shuffle.'
  common_mistake: |
    **The Pitfall:** Emitting a single Map output per document with all 256 hash signatures, then attempting a global cross-join.
    **The Rationale:** It's intuitive to keep all signatures for a document together, but this requires an all-to-all comparison.
    **The Consequence:** Leads to an O(N^2) explosion during the shuffle phase, making deduplication at this scale computationally impossible and crashing the cluster.
  napkin_math: |
    **Assumptions & Constraints:**
    - 10 billion docs, 256 hashes (4 bytes each).
    - 16 bands, emitting 16 KV pairs per doc.
    - 1,000 nodes at 10 Gbps (1.25 TB/s total).
    
    **Calculations:**
    - Total emitted per doc = 16 x 18 bytes = 288 bytes.
    - Global shuffle volume: 10 billion x 288 B = 2.88 TB.
    - Network time: 2.88 TB / 1.25 TB/s = ~2.3 seconds.
    
    **Conclusion & Interpretation:**
    - **Result: ~2.3s (Network-Bound)**. The shuffle takes ~2.3 seconds of theoretical network time, achieving linear scalability.
