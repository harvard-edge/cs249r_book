title: Cross-Track Data Pipeline Placement
scenario: A vision feature needs 30 MB/s of raw camera data. In cloud mode the client uploads compressed frames over a 10 MB/s uplink, in mobile mode preprocessing runs on device at 45 MB/s, and in edge mode a local gateway can preprocess at 120 MB/s but adds a 20 ms hop.
question: "Where should preprocessing run when raw input is 30 MB/s, cloud upload is 10 MB/s, mobile preprocessing is 45 MB/s, and edge preprocessing is 120 MB/s?"
details:
  realistic_solution: 'Cloud upload is infeasible because 30 MB/s demand exceeds a 10 MB/s supply. Mobile preprocessing has capacity about 1.5x demand, which is fragile under thermal throttling. Edge preprocessing has 4x demand capacity and only a 20 ms hop, so the robust design is local edge preprocessing with mobile fallback.'
  common_mistake: |
    **The Pitfall:** Treating preprocessing as a pure compute problem and ignoring the uplink demand-supply ratio.
    **The Rationale:** Candidates focus on where the CPU power exists rather than where the data bottleneck lies.
    **The Consequence:** Designing pipelines that starve the model because the network cannot upload raw data fast enough.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Input demand = 30 MB/s.
       - Cloud = 10 MB/s, Mobile = 45 MB/s, Edge = 120 MB/s.
    2. **Calculations:**
       - Cloud capacity/demand = 10 / 30 = 0.33x (starves).
       - Mobile capacity/demand = 45 / 30 = 1.5x (~50% slack).
       - Edge capacity/demand = 120 / 30 = 4x.
    3. **Conclusion & Interpretation:**
       - **Result: Edge Preprocessing Wins.** Edge handles the load safely despite the 20 ms network hop, preventing pipeline starvation.
