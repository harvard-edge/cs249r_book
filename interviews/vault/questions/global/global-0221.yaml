title: H100 vs A100 Roofline Comparison
scenario: Compare the ridge points of H100 (989 TFLOPS FP16, 3.35 TB/s) and A100 (312 TFLOPS FP16, 2.0
  TB/s). For a kernel with arithmetic intensity of 200 FLOP/byte, which GPU gives higher speedup and by
  how much?
question: "What are the H100 and A100 ridge points, and how much speedup does H100 give at 200 FLOP/byte?"
details:
  realistic_solution: 'A100 ridge = 312T / 2.0T = 156 FLOP/byte. H100 ridge = 989T / 3.35T = 295 FLOP/byte.
    At AI = 200: A100 is compute-bound (200 > 156), achieves 312 TFLOPS. H100 is memory-bound (200 < 295),
    achieves 200 × 3.35 = 670 TFLOPS. H100 speedup = 670/312 = 2.15×. Note: despite H100 having 3.17×
    more peak FLOPS, you only get 2.15× for this workload because it lands in H100''s memory-bound region.
    To get full 3.17× speedup, you need AI > 295 FLOP/byte.'
  common_mistake: Comparing only peak TFLOPS. If your workload is below the ridge point, bandwidth matters
    more than compute.
  napkin_math: 'A100 ridge = 156. H100 ridge = 295. At AI=200: A100 hits peak 312 TF. H100 is BW-limited:
    200 × 3.35 = 670 TF. Speedup = 2.15× (not the expected 3.17×).'
