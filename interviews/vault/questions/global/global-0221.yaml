title: H100 vs A100 Roofline Comparison
scenario: You are migrating a kernel with an arithmetic intensity of 200 FLOP/byte from an A100 (312 TFLOPS FP16, 2.0 TB/s) to an H100 (989 TFLOPS FP16, 3.35 TB/s).
question: What are the H100 and A100 ridge points, and how much speedup does H100 give at 200 FLOP/byte?
details:
  realistic_solution: 'A100 ridge = 312T / 2.0T = 156 FLOP/byte. H100 ridge = 989T / 3.35T = 295 FLOP/byte. At AI = 200: A100 is compute-bound (200 > 156), achieves 312 TFLOPS. H100 is memory-bound (200 < 295), achieves 200 × 3.35 = 670 TFLOPS. H100 speedup = 670/312 = 2.15×. Note: despite H100 having 3.17× more peak FLOPS, you only get 2.15× for this workload because it lands in H100''s memory-bound region. To get full 3.17× speedup, you need AI > 295 FLOP/byte.'
  common_mistake: |
    **The Pitfall:** Comparing only peak TFLOPS to estimate speedups across hardware generations.
    **The Rationale:** Marketing materials emphasize raw FLOPS, leading developers to expect a 3x speedup when their specific workload is actually constrained by the H100's memory bandwidth.
    **The Consequence:** Drastically overestimating hardware performance gains, leading to missed SLAs and poorly modeled deployment costs.
  napkin_math: |
    - A100 Ridge = 312 TFLOPS / 2.0 TB/s = 156 FLOP/Byte.
    - H100 Ridge = 989 TFLOPS / 3.35 TB/s = 295 FLOP/Byte.
    - At AI=200, A100 is compute-bound (200 > 156), achieving peak 312 TFLOPS.
    - At AI=200, H100 is memory-bound (200 < 295), achieving 200 * 3.35 = 670 TFLOPS.
    - **H100 Speedup = 670 / 312 = 2.15x (not the 3.17x expected from peak FLOPS comparison).**
