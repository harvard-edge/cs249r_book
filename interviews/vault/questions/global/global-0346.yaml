title: Weighted Routing Arithmetic
scenario: A router sends 70% of traffic to Region A and 30% to Region B. Peak traffic is 50,000 requests/s. Region A starts violating P99 latency above 32,000 rps, while Region B can safely handle 22,000 rps.
question: "Is a 70/30 split of 50,000 rps safe if Region A violates P99 above 32,000 rps and Region B can handle 22,000 rps?"
details:
  realistic_solution: "Region A receives 35,000 rps and Region B receives 15,000 rps. Region B is safe, but Region A exceeds its P99-safe capacity by 3,000 rps. The split should shift traffic toward B or add capacity in A; configured weights must be checked against regional capacity, not just sum to 100%."
  common_mistake: |
    **The Pitfall:** Setting weights without converting them into per-region load and comparing against regional P99-safe capacity.
    **The Rationale:** People often just assume that as long as weights sum to 100%, the load balancing will be fine.
    **The Consequence:** Overloading a specific region, causing severe P99 latency violations even when overall system capacity is adequate.
  napkin_math: |
    - Region A load = 0.70 × 50,000 = 35,000 rps.
    - Region B load = 0.30 × 50,000 = 15,000 rps.
    - Region A safe limit = 32,000 rps.
    - Region B safe limit = 22,000 rps.
    - **Region A exceeds its 32,000 rps limit by 3,000 rps, making the split unsafe.**
