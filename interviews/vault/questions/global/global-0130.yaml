title: Mobile NPU Utilization Collapse
scenario: 'Deploying a 4K Super-Resolution model on a mobile SoC (NPU: 10 TOPS, 30 GB/s main memory bandwidth,
  2MB NPU SRAM). The model requires 100 GMACs per frame. Based on 10 TOPS, expected latency is 10ms (100
  FPS). Actual latency is 333ms (3 FPS). Profiling shows NPU ALU utilization is below 3%.'
details:
  realistic_solution: The root cause is aggressive SRAM spilling to main memory. A 4K feature map with
    even a modest number of channels is massive. Because the intermediate activations far exceed the NPU's
    2MB SRAM, every layer must write its output to main memory and the next layer must read it back. This
    drops the arithmetic intensity of the model drastically. The workload hits the bandwidth roofline
    ceiling of the mobile SoC. The NPU ALUs process the data almost instantly but then sit idle waiting
    hundreds of milliseconds for the memory controller to fetch the next layer's inputs from LPDDR.
  common_mistake: Ignoring intermediate activation sizes and assuming theoretical peak NPU TOPS can be
    reached regardless of SRAM capacity.
  napkin_math: '4K Image (3840x2160) = 8.3M pixels.

    Activations (e.g., 64 channels, FP16) = 8.3M * 64 * 2 bytes = 1.06 GB per layer.

    1.06 GB >> 2MB SRAM.

    For a 10-layer model, memory traffic = 10 * 1.06 GB (read) + 10 * 1.06 GB (write) ≈ 20 GB.

    Time spent on memory = 20 GB / 30 GB/s = 666ms (or 333ms if fused partially). Compute time = 10ms.
    Total time is dominated by memory IO.'
