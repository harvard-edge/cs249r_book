title: Mobile NPU Utilization Collapse
scenario: 'Deploying a 4K Super-Resolution model on a mobile SoC (NPU: 10 TOPS, 30 GB/s main memory bandwidth, 2MB NPU SRAM). The model requires 100 GMACs per frame. Based on 10 TOPS, expected latency is 10ms (100 FPS). Actual latency is 333ms (3 FPS). Profiling shows NPU ALU utilization is below 3%.'
question: Why does the 4K super-resolution model run at 333ms instead of the 10ms implied by the 10 TOPS NPU?
details:
  realistic_solution: The root cause is aggressive SRAM spilling to main memory. A 4K feature map is massive. Because the intermediate activations far exceed the NPU's 2MB SRAM, every layer must write its output to main memory and the next layer must read it back.
  common_mistake: |
    **The Pitfall:** Ignoring intermediate activation sizes and assuming theoretical peak NPU TOPS can be reached regardless of SRAM capacity.
    **The Rationale:** Developers assume high-level ML frameworks automatically handle memory tiling efficiently.
    **The Consequence:** SRAM spills to main memory absolutely ruin arithmetic intensity, collapsing latency and framerate.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 4K resolution (8.3M pixels).
       - NPU SRAM: 2MB. NPU limits: 10 TOPS, 30 GB/s.
    2. **Calculations:**
       - 4K FP16 activations (64 channels) = 1.06 GB per layer.
       - 1.06 GB >> 2MB NPU SRAM.
       - Memory traffic for 10 layers = ~20 GB.
       - Time spent on memory = 20 GB / 30 GB/s = 666ms.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound (Bandwidth).** Massive intermediate activations force aggressive SRAM spilling to main memory, dominating the 10ms compute time.
