title: KV Cache Memory for 7B Model Serving
scenario: You are serving a 7B-parameter LLM (32 layers, 32 heads, head_dim=128) with a context window of 4096 tokens in FP16.
question: How much KV cache memory does each 4096-token request need, and how many concurrent requests fit alongside the model weights on an 80GB GPU?
details:
  realistic_solution: KV cache per request = 2 (K+V) × 32 layers × 32 heads × 128 dim × 4096 tokens × 2 bytes = 2 × 32 × 32 × 128 × 4096 × 2 = 2.15 GB. Model weights at FP16 = 7B × 2 = 14 GB. Available for KV = 80 - 14 - ~2 overhead = 64 GB. Concurrent requests = 64 / 2.15 ≈ 29 requests. This is why KV cache is the primary bottleneck in LLM serving throughput.
  common_mistake: |
    **The Pitfall:** Forgetting to multiply by 2 for both Keys and Values, or ignoring that model weights consume VRAM.
    **The Rationale:** Focusing only on the context window size and ignoring tensor replication and static memory overhead.
    **The Consequence:** OOMs in production when serving multiple concurrent requests due to unaccounted memory footprint.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 7B model weights (14 GB in FP16).
       - 32 layers, 32 heads, 128 head_dim.
       - 4096 tokens, FP16 precision (2 bytes).
       - Total VRAM: 80 GB.
    2. **Calculations:**
       - KV per request: 2 (K+V) × 32 layers × 32 heads × 128 dim × 4096 tokens × 2 bytes = 2.15 GB.
       - Available VRAM for KV: 80 GB - 14 GB (weights) - 2 GB (overhead) = 64 GB.
       - Concurrent requests: 64 GB / 2.15 GB/request ≈ 29 requests.
    3. **Conclusion & Interpretation:**
       - **Result: 2.15 GB/request and 29 concurrent requests. Memory-Capacity-Bound by KV Cache.**
