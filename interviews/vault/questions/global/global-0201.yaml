title: KV Cache Memory for 7B Model Serving
scenario: You are serving a 7B-parameter LLM (32 layers, 32 heads, head_dim=128) with a context window
  of 4096 tokens in FP16. Estimate the KV cache memory per request and how many concurrent requests fit
  on an A100-80GB alongside the model weights.
details:
  realistic_solution: KV cache per request = 2 (K+V) × 32 layers × 32 heads × 128 dim × 4096 tokens ×
    2 bytes = 2 × 32 × 32 × 128 × 4096 × 2 = 2.15 GB. Model weights at FP16 = 7B × 2 = 14 GB. Available
    for KV = 80 - 14 - ~2 overhead = 64 GB. Concurrent requests = 64 / 2.15 ≈ 29 requests. This is why
    KV cache is the primary bottleneck in LLM serving throughput.
  common_mistake: Forgetting to multiply by 2 for both K and V tensors, or ignoring that model weights
    also consume memory.
  napkin_math: 'KV per request: 2 × 32 × 32 × 128 × 4096 × 2 bytes = 2.15 GB. Weights = 14 GB. Free VRAM
    ≈ 64 GB. Fits ≈ 64/2.15 ≈ 29 concurrent requests.'
