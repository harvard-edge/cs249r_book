id: global-0268
title: Static vs Continuous Batching for LLM Serving
topic: latency-decomposition
status: published
provenance: imported
scenario: Your LLM serving system processes requests with highly variable output lengths (10-2000 tokens).
  Compare static batching (all requests in a batch must complete before new ones start) vs continuous
  batching (Orca-style iteration-level scheduling). Quantify the throughput difference for a batch of
  32 requests where lengths range from 50 to 1500 tokens.
details:
  realistic_solution: 'Static batching: all 32 requests run until the longest (1500 tokens) completes.
    If average length is 500 tokens, each short request that finishes at 50 tokens wastes 1450 token-slots
    of compute. Total compute = 32 × 1500 = 48,000 token-steps. Useful compute = sum of actual lengths
    ≈ 32 × 500 = 16,000. GPU utilization = 16,000/48,000 = 33%. Continuous batching: when a request finishes,
    a new request is immediately inserted into its slot. The batch stays full at 32 throughout. No wasted
    token-steps. Utilization approaches 100% (minus scheduling overhead ~2-5%). Throughput improvement:
    100%/33% ≈ 3x for this workload distribution. The gain is proportional to the variance in output lengths
    — uniform lengths see no benefit, high variance sees massive gains. This is why vLLM and TensorRT-LLM
    use continuous batching by default.'
  common_mistake: Assuming continuous batching only helps with latency. The primary benefit is throughput
    — static batching wastes GPU cycles on padding after short requests complete.
  napkin_math: 'Static: 32 × 1500 max = 48K token-steps. Useful: 32 × 500 avg = 16K. Utilization: 33%.
    Continuous: ~32 × 500 avg = 16K steps total (batch refilled continuously). 48K/16K = 3x throughput
    improvement.'
