schema_version: 1
id: global-0192
title: The Data Locality Penalty
topic: data-efficiency-selection
status: published
provenance: imported
scenario: 'A healthcare company must train a diagnostic model on patient data from 3 countries: US (60%
  of data, 500K records), Germany (25%, 210K), Japan (15%, 125K). HIPAA (US), GDPR (Germany), and APPI
  (Japan) all prohibit moving raw patient data across borders. You have GPU clusters in all 3 countries.
  Evaluate: (A) train 3 separate models, one per country, (B) federated learning across borders, (C) synthetic
  data generation to create a de-identified global dataset.'
details:
  realistic_solution: '(A) Separate models: each country trains on local data only. US model is strong
    (500K records), but Germany (210K) and Japan (125K) models are weak. No compliance risk, but the Japanese
    model underperforms due to limited data — potentially dangerous in healthcare. (B) Federated learning:
    trains a shared model by exchanging gradient updates, not raw data. Pros: global model quality with
    data locality. Cons: gradient inversion attacks can reconstruct training data (recent research shows
    reconstruction of medical images from gradients). Requires differential privacy noise injection (ε=8)
    which degrades model quality by ~3-7%. Also, some regulators may argue gradient exchange constitutes
    ''data transfer.'' (C) Synthetic data: generate privacy-safe synthetic records in each country, share
    synthetic data globally. Pros: clear compliance story (synthetic data is not personal data). Cons:
    synthetic data quality depends on the generative model; may miss rare disease patterns present in
    the long tail of real data. Recommendation: Federated learning with differential privacy (ε=4) and
    secure aggregation as primary approach, with synthetic data augmentation for the data-sparse Japan
    cohort. This balances model quality, compliance risk, and patient safety.'
  common_mistake: Choosing federated learning as an automatic 'best of both worlds' solution. Federated
    learning still transmits model gradients across borders, which may leak private information through
    gradient inversion attacks. Regulators may not accept this as compliant.
  napkin_math: '(A) Separate: US accuracy ~94%, Germany ~89%, Japan ~85% (data-limited). (B) Federated:
    global accuracy ~93% without DP, ~90% with DP (ε=4). Communication: model weights (~500MB) × 100 rounds
    × 3 sites = 150 GB total cross-border transfer (gradients, not data). (C) Synthetic: depends on generator
    quality. Best case: ~91%. Worst case: ~86% (misses rare conditions). Federated + DP: highest minimum
    accuracy across all countries (~90% everywhere vs 85% for Japan standalone).'
