id: global-0267
title: Spot vs On-Demand for Long Training Runs
topic: tco-cost-modeling
status: published
provenance: imported
scenario: 'A 7B model training run takes 14 days on 64 A100 GPUs. On-demand costs $3.00/GPU-hour. Spot
  instances cost $1.00/GPU-hour but have a 10% chance of preemption per day. Each preemption costs 2 hours
  of lost work (last checkpoint was 2 hours ago). Evaluate: spot, on-demand, or a hybrid approach?'
details:
  realistic_solution: 'On-demand: 64 GPUs × 336h × $3.00 = $64,512, guaranteed 14-day completion. Spot:
    base cost = 64 × 336h × $1.00 = $21,504. Expected preemptions: 14 days × 10%/day = 1.4 events. Cost
    of lost compute per event = 2h × 64 GPUs × $1.00 = $128; total lost compute = 1.4 × $128 = $179.20.
    With restart overhead (0.5h): total expected extra cost = 1.4 × (2.5h × 64 × $1) = $224. Expected
    extra time = 1.4 × 2.5h = 3.5h. Total spot ≈ $21,728, ~14.15 days. Spot saves 66% ($42,784). Mitigation:
    checkpoint every 30 minutes (preemption overhead drops to 1.4 × 0.5h × 64 × $1 = $44.80) and use spot-with-fallback
    strategy. Hybrid: use spot for first 12 days, switch to on-demand for final 2 days.'
  common_mistake: Comparing only base costs without accounting for checkpoint overhead, preemption recovery
    time, and the risk of cascading preemptions extending the total wall-clock time.
  napkin_math: 'On-demand: 64 × 336h × $3 = $64,512. Spot: 64 × 336h × $1 = $21,504 + expected preemption
    cost: 1.4 events × 2h × 64 GPUs × $1 = $179.20 ≈ $21,683. Savings: $42,829 (66%). With 30-min checkpointing:
    lost work per preemption drops from 2h to 0.5h → preemption cost drops to 1.4 × 0.5h × 64 × $1 = $44.80.'
