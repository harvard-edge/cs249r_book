schema_version: 1
id: global-0199
title: The Multi-Region Checkpoint Strategy
topic: latency-decomposition
status: published
provenance: imported
scenario: 'You are training a critical 100B parameter model on 512 H100 GPUs in a single datacenter. The
  checkpoint is 200 GB (FP16 weights + optimizer states). Training takes 30 days. Your datacenter has
  a 0.1% daily probability of a full outage (power, cooling, or network failure). Evaluate checkpoint
  strategies: (A) local checkpoints every hour, (B) local every hour + remote replication to another region
  (100 Gbps link, 40ms RTT) every 6 hours, (C) remote replication every hour.'
details:
  realistic_solution: '(A) Local only, hourly: Checkpoint write: 200 GB to NVMe at 5 GB/s = 40s. On datacenter
    failure: ALL progress lost (local storage is in the failed DC). Expected work lost over 30 days: 30
    × 0.001 = 3% chance of total loss = 0.03 × 30 = 0.9 expected days lost. But if the DC fails, you lose
    EVERYTHING — the loss distribution is bimodal (0 or 30 days). (B) Local hourly + remote every 6h:
    Remote transfer: 200 GB / 12.5 GB/s = 16 seconds. On DC failure, maximum work lost = 6 hours. Expected
    lost work: 30 × 0.001 × 3h (average) = 0.09 hours. Remote transfer bandwidth cost: 16s every 6h =
    0.07% of link capacity — negligible. (C) Remote every hour: Transfer: 16s per hour = 0.44% of link
    capacity. On DC failure, max work lost = 1 hour. Expected: 30 × 0.001 × 0.5h = 0.015 hours. Bandwidth
    impact: minimal. Recommendation: Option C — remote hourly checkpoints. The 16 seconds of network usage
    per hour is trivial, and reducing max work loss from ''total'' to ''1 hour'' is transformative for
    a 30-day job. The real cost is storage: 200 GB × 24 checkpoints/day × 30 days = 144 TB of remote checkpoint
    storage (at $0.023/GB/month on S3 = $3,312/month).'
  common_mistake: Only considering checkpoint frequency without accounting for the cost of lost work on
    failure. Also ignoring that remote replication competes for the same network bandwidth used for training
    communication.
  napkin_math: '(A) Local only: P(failure in 30 days) = 1-(0.999^30) = 2.96%. Expected loss: 0.0296 ×
    15 days (average) = 0.44 days. But catastrophic risk: 3% chance of losing ALL 30 days. (B) Remote
    6h: max loss = 6h. Expected: 0.0296 × 3h = 0.089 hours. Storage: 200GB × 4/day × 30 = 24 TB. (C) Remote
    1h: max loss = 1h. Expected: 0.0296 × 0.5h = 0.015 hours. Storage: 200GB × 24/day × 30 = 144 TB =
    $3,312/mo. Training compute cost: 512 × $2.50/h × 720h = $921,600. Storage cost is 0.36% of compute
    — trivially worth it.'
