schema_version: 1
id: global-0138
title: Memory Bandwidth Bound Decode
topic: roofline-analysis
status: published
provenance: imported
scenario: You deploy a 70B parameter model (FP16) for a real-time voice agent. Target TPOT is 20ms. The
  model is deployed on 2x A100 80GB GPUs (Tensor Parallelism, 2 TB/s bandwidth each). Even with a batch
  size of 1, the best TPOT achieved is ~48ms, severely violating the 20ms requirement.
details:
  realistic_solution: 'Decompose the decode step latency: In autoregressive generation (batch size 1),
    the operation is entirely Memory Bandwidth Bound. For every single token generated, the entire 140
    GB model weight matrix must be read from HBM to SRAM. Compute time is negligible. T_token = Model_Size
    / Total_Memory_Bandwidth. 140 GB / 4000 GB/s = 35ms. It is physically impossible to hit 20ms on this
    hardware in FP16. The architectural requirement is to either quantize the model weights to INT8/INT4
    (reducing weights to 70GB/35GB -> 23ms/11ms latency), or double the hardware footprint to 4x A100s
    to aggregate 6.0 TB/s of memory bandwidth.'
  common_mistake: Attempting to optimize compute with FlashAttention or fusing CUDA kernels, which only
    helps compute-bound workloads.
  napkin_math: Model size = 70 billion parameters * 2 bytes (FP16) = 140 GB. Hardware bandwidth = 2 *
    2.0 TB/s = 4.0 TB/s. Minimum physical time to read weights = 140 GB / 4000 GB/s = 0.035 seconds =
    35ms. 35ms > 20ms SLA.
