schema_version: 1
id: global-0135
title: Paged Attention Internal Fragmentation
topic: vram-budgeting
status: published
provenance: imported
scenario: You are designing a high-throughput translation API. The system requires a batch size of 128
  to meet the 2000 QPS throughput SLA. Average prompt + generation length is 80 tokens. You configure
  PagedAttention with a block size of 512 tokens to minimize pointer overhead. The system constantly OOMs
  at a batch size of just 32, failing the throughput requirement.
details:
  realistic_solution: Decompose the memory allocation latency and capacity. The architectural failure
    is massive internal memory fragmentation. With a block size of 512 tokens, every request, regardless
    of its actual length, reserves a minimum of one full block. Since the average request is 80 tokens,
    432 tokens of KV cache memory per request are pre-allocated but completely wasted. This is an 84%
    memory waste. The architecture requirement is to reduce the PagedAttention block size to 16 or 32
    tokens. This drastically reduces internal fragmentation, freeing up enough VRAM to easily support
    the required batch size of 128 without buying more hardware.
  common_mistake: Adding more GPUs to increase total VRAM, or reducing the model's precision to INT4 to
    fit the batch size.
  napkin_math: 'KV cache per token for Llama-2 13B (40 layers, 40 KV heads, head_dim=128, FP16): 2 (K+V)
    × 40 × 40 × 128 × 2 bytes = 819,200 bytes ≈ 800 KB per token. This already accounts for all layers.
    Block size 512 tokens = 512 × 800 KB = 400 MB per block. For batch=128 requests (avg 80 tokens each):
    reserved = 128 blocks × 400 MB = 50 GB. Actual needed: 128 × 80 × 800 KB = 8 GB. Wasted: 42 GB — causes
    OOM on an 80 GB GPU (model weights ~26 GB + 50 GB reserved = 76 GB, no room for activations). Block
    size 16: each request needs ceil(80/16) = 5 blocks × 16 × 800 KB = 64 MB. Total reserved: 128 × 64
    MB = 8.2 GB ≈ actual usage. Problem solved without extra hardware.'
