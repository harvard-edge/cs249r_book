id: global-0274
title: GPU vs CPU Data Preprocessing for Training
topic: mlops-lifecycle
status: published
provenance: imported
scenario: 'Your image classification training pipeline spends 40% of wall-clock time waiting for data
  preprocessing (resize, augment, normalize) on 32 CPU cores. The GPU sits idle during this time. Compare:
  (A) double the CPU cores to 64, (B) move preprocessing to GPU using DALI/torchvision on CUDA, (C) pre-process
  the entire dataset offline and store as pre-augmented shards.'
details:
  realistic_solution: 'Option A (64 CPUs): Doubles preprocessing throughput. If 32 cores → 40% idle, 64
    cores → ~20% idle (Amdahl''s Law: speedup = 1/(0.6 + 0.4/2) = 1.25x overall). Cost: ~$0.50/hr for
    32 extra vCPUs. Reduces wall time from T to 0.8T. Option B (GPU DALI): Moves preprocessing to GPU,
    eliminating CPU→GPU data copy latency. GPU preprocessing is 10-50x faster than CPU for image operations.
    Training time: ~0.62T (eliminates 38% of the 40% idle, some overhead). Cost: zero extra — uses same
    GPU. Caveat: uses 2-5 GB VRAM for preprocessing buffers. Option C (Pre-process offline): Eliminates
    runtime preprocessing entirely. Training time: 0.6T (removes all CPU preprocessing wait). Cost: 2-10x
    storage (augmented copies), plus offline preprocessing compute. Only works for deterministic augmentation
    — random crop/flip must still be applied online. Best approach: B for random augmentations (GPU handles
    them in the pipeline), C for expensive fixed transforms (tokenization, feature extraction). Avoid
    A unless GPU memory is critically constrained.'
  common_mistake: Always choosing GPU preprocessing without considering that GPU memory and compute used
    for preprocessing reduces what's available for training. Also, random augmentation cannot be pre-computed
    for all epochs.
  napkin_math: 'A: 40% idle → 20% idle, 1.25x speedup, +$0.50/hr. B: 40% idle → ~2% idle, 1.6x speedup,
    +0 cost. C: 40% idle → 0%, 1.67x speedup, +2-10x storage. B gives best cost-performance.'
