id: global-0191
title: The Latency-Carbon-Cost Triangle
topic: sustainability-carbon-accounting
status: published
provenance: imported
scenario: 'You must deploy an LLM inference service for users in Europe. Three candidate regions: (A)
  Frankfurt — 15ms to users, $0.10/kWh electricity, 350 gCO2/kWh (German grid). (B) Stockholm — 35ms to
  users, $0.04/kWh, 30 gCO2/kWh (Swedish hydro). (C) Paris — 25ms to users, $0.07/kWh, 55 gCO2/kWh (French
  nuclear). Your SLA is 500ms TTFT and model prefill is 400ms. Evaluate the tradeoffs and recommend a
  deployment strategy.'
details:
  realistic_solution: 'SLA check: TTFT = prefill + network RTT. Required RTT < 500ms - 400ms = 100ms.
    All three regions qualify: Frankfurt (15ms one-way → ~30ms RTT), Paris (25ms → ~50ms), Stockholm (35ms
    → ~70ms). Since all meet the SLA, the decision optimizes on cost and carbon. For a 100-GPU H100 cluster
    running 24/7 at 0.7 kW/GPU with PUE 1.2, annual energy = 735,840 kWh. Annual electricity cost: Stockholm
    $29,434, Paris $51,509, Frankfurt $73,584. Annual carbon emissions: Stockholm 22.1 tonnes, Paris 40.5
    tonnes, Frankfurt 257.5 tonnes. Recommendation: Stockholm as primary (cheapest, greenest, ~435ms TTFT
    within 500ms SLA). Paris as failover. Frankfurt only as last resort. Savings: >$44,000/yr vs Frankfurt,
    plus 91% lower carbon.'
  common_mistake: Picking the lowest-latency option (Frankfurt) without evaluating whether the SLA can
    be met from other regions. Since prefill = 400ms and SLA = 500ms, any region with RTT < 100ms works
    — all three qualify. Once the SLA constraint is satisfied, the decision should optimize on cost and
    carbon.
  napkin_math: 'SLA budget for network: 500ms - 400ms = 100ms. All regions pass: Frankfurt (30ms round-trip),
    Paris (50ms), Stockholm (70ms). Annual electricity (100 H100s, 0.7 kW each, PUE 1.2): Energy = 100
    × 0.7 kW × 1.2 × 8,760 h = 735,840 kWh/yr. Cost: Frankfurt: 735,840 × $0.10 = $73,584/yr. Paris: 735,840
    × $0.07 = $51,509/yr. Stockholm: 735,840 × $0.04 = $29,434/yr. Carbon: Frankfurt: 735,840 kWh × 350
    g/kWh = 257.5 tonnes CO2/yr. Paris: 735,840 × 55 g/kWh = 40.5 tonnes/yr. Stockholm: 735,840 × 30 g/kWh
    = 22.1 tonnes/yr. Stockholm wins on both cost (−60% vs Frankfurt) and carbon (−91% vs Frankfurt).'
