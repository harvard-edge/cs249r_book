schema_version: 1
id: global-0272
title: Prefill Chunking vs Monolithic Prefill
topic: latency-decomposition
status: published
provenance: imported
scenario: A serving system receives a 32K-token prompt. Compare monolithic prefill (process all 32K tokens
  at once) vs chunked prefill (process in 4K chunks, interleaving decode requests between chunks). Your
  system serves 100 concurrent users. Evaluate latency and throughput tradeoffs.
details:
  realistic_solution: 'Monolithic prefill for 32K tokens on a 70B model (INT8): prefill is compute-bound
    with AI >> ridge point. FLOPs ≈ 2 × 70B × 32K = 4.48 PFLOP. On A100 at 50% MFU: 4.48P / 156T = 28.7
    seconds. During this time, all 100 concurrent decode requests stall — their P99 latency spikes to
    28.7s + their decode time. Chunked prefill (4K chunks): each chunk takes 28.7 × (4K/32K) = 3.6 seconds.
    Between chunks, decode 1-2 iterations for waiting users (~70ms each). Total prefill time increases
    to ~32s (3.6s × 8 chunks + decode interleaving), but decode users see max stall of 3.6s instead of
    28.7s. Throughput impact: ~10% lower prefill throughput due to context switching overhead, but P99
    decode latency improves 8x. For production with SLAs, chunked prefill is essential. The sweet spot
    for chunk size balances compute efficiency (larger chunks) against decode latency (smaller chunks).'
  common_mistake: Assuming monolithic prefill is always better because it maximizes compute utilization.
    It blocks all decode requests for the duration of prefill, causing latency spikes for concurrent users.
  napkin_math: 'Monolithic: 2 × 70B × 32K = 4.48 PFLOP / 156 TFLOPS (50% MFU) = 28.7s. Decode stall: 28.7s
    for all users. Chunked (4K): 3.6s per chunk, 8 chunks. Max decode stall: 3.6s (8x improvement). Throughput
    cost: ~10%.'
