schema_version: 1
id: global-0050
title: The Optimizer Memory Tradeoff at Scale
topic: pruning-sparsity
status: published
provenance: imported
scenario: A team training a 175B LLM proposes switching from Adam to SGD with momentum to save memory
  — SGD stores only 1 state tensor per parameter instead of Adam's 2, potentially saving hundreds of GB
  across the cluster. Evaluate this proposal. When would you consider it, and when is Adam's memory overhead
  justified?
details:
  realistic_solution: 'For a 175B model: Adam stores m + v = 2 × 175B × 4 bytes = 1.4 TB of optimizer
    state across the cluster. SGD with momentum stores only momentum = 175B × 4 bytes = 700 GB — saving
    700 GB total. However, Adam''s per-parameter adaptive learning rates are critical for LLMs because:
    (1) different parameter groups (embeddings, attention, FFN) have gradient distributions that vary
    by orders of magnitude, (2) Adam adapts to the local curvature, which matters enormously in the flat-but-sharp
    landscape of large transformers, (3) empirically, SGD requires 3-5× more tokens to reach the same
    loss as Adam for LLMs. The memory savings from SGD would be better achieved through ZeRO-style optimizer
    state partitioning (distribute Adam states across GPUs) or 8-bit Adam (quantize m and v to INT8, saving
    75% of optimizer memory with <0.1% quality loss).'
  common_mistake: Dismissing SGD entirely for large-scale LLM training, or accepting it uncritically because
    it saves memory. The answer depends on the loss landscape and the scale.
  napkin_math: 'Adam: 175B × 4B × 2 states = 1.4 TB optimizer state | SGD+momentum: 175B × 4B × 1 state
    = 700 GB | 8-bit Adam: 175B × 1B × 2 states = 350 GB (saves more than SGD!) | ZeRO Stage 1: 1.4 TB
    / N_GPUs — at 512 GPUs = 2.7 GB/GPU | SGD convergence tax: 3-5× more tokens ≈ $5-10M more compute
    cost'
