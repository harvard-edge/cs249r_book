schema_version: 1
id: global-0065
title: Diagnosing Flat Ring AllReduce Latency
topic: collective-communication
status: published
provenance: imported
scenario: You are debugging a distributed training job across 1024 GPUs (128 nodes, 8 GPUs/node). The
  network provides 400 Gbps (50 GB/s) per node via RoCEv2. Profiling reveals that synchronizing a 100
  MB gradient bucket takes ~106 ms. A junior engineer notes that the network bandwidth utilization is
  barely 2% (~1 GB/s) and suspects faulty transceiver cables or switch throttling. You need to identify
  the true root cause using latency decomposition.
details:
  realistic_solution: The symptom of extremely low bandwidth utilization coupled with high latency in
    large clusters points to the latency term dominating the communication time due to a sub-optimal topology
    (Flat Ring). By decomposing the Ring AllReduce time into its hop-latency and bandwidth-transfer components,
    we see that transferring small chunks over many hops causes the network to be entirely latency-bound.
    In a Flat Ring of N=1024, the algorithm requires 2(N-1) hops. For a 100MB message, the chunk size
    per hop is tiny (~100 KB). The time spent serializing data is negligible compared to the sheer number
    of network hops. The root cause is using a flat ring algorithm instead of a Hierarchical AllReduce
    or Tree topology, which would drastically reduce the hop count.
  common_mistake: Assuming hardware throttling or network congestion and trying to tune TCP window sizes
    or replace cables.
  napkin_math: "Total Time T = 2(N-1) * alpha + 2((N-1)/N) * (M/B). \nFor N = 1024, M = 100 MB, B = 50\
    \ GB/s (400 Gbps), alpha (hop latency) = 50 us.\nLatency term = 2 * 1023 * 50 us = 102.3 ms.\nBandwidth\
    \ term = 2 * (1023/1024) * 100 MB / 50 GB/s = 3.99 ms.\nTotal Time = 102.3 ms + 3.99 ms = 106.3 ms.\n\
    Bandwidth Utilization = 100 MB / 106.3 ms = ~0.94 GB/s (less than 2% of 50 GB/s)."
