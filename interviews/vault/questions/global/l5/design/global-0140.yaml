schema_version: 1
id: global-0140
title: Long Context Attention FLOPs Wall
topic: roofline-analysis
status: published
provenance: imported
scenario: You are deploying an 8B parameter model to process massive 500k-token document contexts. The
  SLA requires a TTFT of < 10 seconds. You use FlashAttention-2, which successfully prevents OOM on your
  80GB A100 GPU. However, the prefill TTFT is over 6 minutes, completely failing the SLA.
details:
  realistic_solution: 'Decompose the latency of the prefill step: FlashAttention reduces memory complexity
    from O(N^2) to O(N), but the compute complexity remains O(N^2). For N = 500,000, the number of FLOPs
    required just for the attention mechanism is astronomically high. A single A100 delivers ~312 TFLOPs
    in BF16. The attention compute alone takes hundreds of seconds. The architectural requirement is to
    break the O(N^2) compute bound. You must either implement RingAttention/Striped Attention to distribute
    the sequence across a cluster of GPUs (parallelizing the O(N^2) compute), or switch the model architecture
    to use Sparse Attention, Sliding Window Attention, or a linear architecture (Mamba/RWKV) to reduce
    compute complexity to O(N).'
  common_mistake: Assuming FlashAttention reduces compute complexity, and trying to tune the block size
    to speed up the operation.
  napkin_math: 'Attention FLOPs = 4 * B * L^2 * H * D. For L=500k, H*D=1024, B=1, FLOPs = 4 * 1 * (2.5e11)
    * 1024 = ~1e15 (1 PetaFLOP) per layer. For 32 layers: 32 PetaFLOPs. A100 peak BF16 is 312 TFLOPS.
    Time = 32,000 TFLOPs / 312 TFLOPS = 102.5 seconds. Even at 100% utilization, just the attention prefill
    exceeds the 10s SLA by 10x. You need ring attention across multiple GPUs.'
