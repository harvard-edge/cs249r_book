schema_version: 1
id: global-0196
title: The GPAI Threshold Debate
topic: responsible-ai
status: published
provenance: imported
scenario: The EU AI Act defines 'General-Purpose AI' (GPAI) models with additional obligations for those
  trained with more than 10^25 FLOPs (the 'systemic risk' threshold). Your company trained a 70B parameter
  model using 2,048 H100 GPUs for 90 days at 40% MFU. Does this model exceed the systemic risk threshold?
  Evaluate the implications for your deployment strategy.
details:
  realistic_solution: 'Training compute: H100 peak FP16 = 989 TFLOPS. Effective FLOPS = 989 × 0.40 MFU
    = 395.6 TFLOPS per GPU. Total compute = 2,048 GPUs × 395.6 TFLOPS × 90 days × 86,400 s/day = 2,048
    × 395.6 × 10^12 × 7,776,000 = 6.3 × 10^24 FLOPs. This is BELOW the 10^25 threshold (by ~37%). The
    model does not trigger systemic risk obligations. However: it is close enough that adding 60% more
    training (e.g., training for 144 days, or using 3,200 GPUs) would cross the line. Implications: (1)
    You avoid the most onerous obligations (red-teaming, incident reporting, cybersecurity measures).
    (2) You still must comply with basic GPAI obligations (technical documentation, copyright compliance,
    training data summary). (3) Strategic consideration: if you plan to scale up, design your compliance
    infrastructure now because the next model will likely cross the threshold.'
  common_mistake: Confusing parameter count with training compute. A 70B model does not automatically
    exceed the threshold — it depends on how long it was trained and at what efficiency. Also, some engineers
    ignore the threshold entirely, assuming it only applies to companies like OpenAI.
  napkin_math: 'H100 effective: 989 × 0.4 = 395.6 TFLOPS. Total FLOPs: 2,048 × 395.6e12 × 90 × 86,400
    = 2,048 × 395.6e12 × 7.776e6 = 6.3e24. Threshold: 1e25. Ratio: 6.3e24 / 1e25 = 0.63 (37% below). To
    exceed: need 1e25 / (395.6e12 × 2048) = 12.34e6 seconds = 143 days (vs 90 used). Or: 1e25 / (395.6e12
    × 90 × 86400) = 3,252 GPUs (vs 2,048 used).'
