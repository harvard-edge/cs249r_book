title: Reducing AllReduce Bottleneck in Cross-Rack Training
scenario: Your 256-GPU training cluster (32 nodes across 4 racks) spends 40% of step time in AllReduce
  over InfiniBand NDR (400 Gb/s per port). Gradient size is 8 GB. Design optimizations to reduce communication
  overhead below 15%.
question: "How would you design optimizations to reduce communication overhead below 15%?"
details:
  realistic_solution: 'Current: 40% overhead. Target: <15%. Strategy stack: (1) Gradient compression (PowerSGD
    or TopK): compress 8 GB → 800 MB (10× reduction, ~1% accuracy impact). AllReduce time drops ~10×.
    (2) Overlap communication with computation: start AllReduce for layer N''s gradients while computing
    backward for layer N-1. With good overlap, 50-80% of AllReduce is hidden. (3) Hierarchical AllReduce:
    intra-rack reduce (NVSwitch, fast), then inter-rack AllReduce (smaller data). (4) FP16 gradient AllReduce
    instead of FP32: halves volume (use loss scaling to maintain precision). Combined: compression 10×
    + overlap 70% of remaining → effective overhead = 40% / 10 × 0.3 = 1.2%. Even just compression + overlap:
    40% × 0.1 × 0.3 = 1.2%. Either approach achieves <15%.'
  common_mistake: Just adding more network bandwidth. Often the bottleneck is protocol overhead, topology,
    or lack of overlap — not raw bandwidth.
  napkin_math: 'Gradient compression: 8 GB → 0.8 GB. AllReduce time: 10× faster. Overlap 70%: only 30%
    exposed. Net: 40% × (1/10) × 0.3 = 1.2% overhead. Well under 15%.'
