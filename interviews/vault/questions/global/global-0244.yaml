title: Reducing AllReduce Bottleneck in Cross-Rack Training
scenario: 'Your 256-GPU training cluster spends 40% of step time in AllReduce over InfiniBand NDR. Gradient size is 8 GB.'
question: 'How would you design optimizations to reduce communication overhead below 15%?'
details:
  realistic_solution: 'Current: 40% overhead. Target: <15%. Strategy stack: (1) Gradient compression (PowerSGD or TopK): compress 8 GB → 800 MB (10x reduction, ~1% accuracy impact). AllReduce time drops ~10x. (2) Overlap communication with computation: start AllReduce for layer N gradients while computing backward for layer N-1. With good overlap, 50-80% of AllReduce is hidden. (3) Hierarchical AllReduce. (4) FP16 gradient AllReduce: halves volume. Combined: compression 10x + overlap 70% → effective overhead = 40% / 10 x 0.3 = 1.2%.'
  common_mistake: |
    **The Pitfall:** Just adding more network bandwidth to solve communication bottlenecks.
    **The Rationale:** Candidates assume hardware upgrades are the only solution, ignoring protocol overhead, topology, or computation overlap.
    **The Consequence:** Expensive hardware investments that fail to resolve the underlying algorithmic inefficiency.
  napkin_math: |
    **Assumptions & Constraints:**
    - Current overhead = 40%. Target = <15%.
    - 10x gradient compression. 70% overlap hiding.

    **Calculations:**
    - Compression factor: 40% * (1/10) = 4% exposed overhead.
    - Overlap factor: 4% * (1 - 0.7) = 1.2% exposed overhead.

    **Conclusion & Interpretation:**
    - **Result: 1.2% Communication Overhead (Bandwidth-Bound)**. Algorithmic optimizations easily crush the network bottleneck without hardware upgrades.
