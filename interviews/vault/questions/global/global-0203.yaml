title: Energy Cost of a Training Run
scenario: You train a model on 64 A100 GPUs for 72 hours. Each A100 draws 300W at full load, and the data center PUE is 1.3. At $0.10/kWh, estimate the total electricity cost of this training run.
question: "What is the total electricity cost for the 64-A100, 72-hour training run including PUE?"
details:
  realistic_solution: "GPU power = 64 × 300W = 19.2 kW. With PUE 1.3, total facility power = 19.2 × 1.3 = 24.96 kW. Energy = 24.96 kW × 72 h = 1797.12 kWh. Cost = 1797.12 × $0.10 = $179.71. This is just electricity — total TCO including GPU depreciation, networking, and staffing is typically 3-5× higher. For context, a 1000-GPU run for 30 days would cost ~$28K in electricity alone."
  common_mistake: |
    **The Pitfall:** Forgetting the Power Usage Effectiveness (PUE) multiplier.
    **The Rationale:** People often just calculate the raw power draw of the compute hardware.
    **The Consequence:** Underestimating the total facility power draw, missing the cooling and networking overhead which adds 30% or more to the bill.
  napkin_math: |
    - GPU Power = 64 GPUs × 300W = 19.2 kW.
    - With PUE 1.3: Total facility power = 19.2 kW × 1.3 = 24.96 kW.
    - Energy = 24.96 kW × 72 hours = 1797.12 kWh.
    - **Total Cost = 1797.12 kWh × $0.10/kWh = $179.71.**
