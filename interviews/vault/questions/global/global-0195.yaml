title: The Inference Placement Decision
scenario: 'You serve a real-time translation model to users across 40 countries. Option A: one large centralized
  cluster of 64 H100s in US-East ($2.50/GPU-hour). Option B: 8 small regional clusters of 8 H100s each
  ($3.20/GPU-hour, 28% premium for regional pricing). Total GPU count is the same (64). The model requires
  4 H100s for tensor parallelism. Your P95 latency target is 300ms and inference takes 150ms. Evaluate
  both architectures.'
details:
  realistic_solution: 'Centralized (US-East): 64 GPUs = 16 inference replicas (4 GPUs each). Latency for
    nearby users (US/Canada, RTT ~20ms): 20 + 150 = 170ms. PASS. Latency for European users (RTT ~80ms):
    80 + 150 = 230ms. PASS. Latency for Asian users (RTT ~150ms): 150 + 150 = 300ms. BORDERLINE. Latency
    for Australian users (RTT ~200ms): 200 + 150 = 350ms. FAIL. Monthly cost: 64 × $2.50 × 730h = $116,800.
    Distributed (8 regions): 8 GPUs per region = 2 replicas each. Latency: all users within 30ms of nearest
    cluster → 30 + 150 = 180ms. All PASS. Monthly cost: 64 × $3.20 × 730h = $149,504. Premium: $32,704/month
    (28%). But: centralized fails SLA for ~25% of users (Asia-Pacific, Oceania, Africa). If each failed-SLA
    user represents $0.50/month in revenue and you have 1M users, failing 250K users costs $125K/month
    — far exceeding the $33K infrastructure premium. Recommendation: Distributed, with the caveat that
    2 replicas per region provides minimal redundancy. Consider 6 regions with slightly larger clusters.'
  common_mistake: Comparing only the GPU cost and choosing centralized because it is 28% cheaper. The
    latency analysis reveals that centralized cannot meet the SLA for distant users, which may cost far
    more in lost users than the 28% savings.
  napkin_math: 'Centralized cost: 64 × $2.50 × 730 = $116,800/mo. Distributed cost: 64 × $3.20 × 730 =
    $149,504/mo. Premium: $32,704/mo (28%). SLA compliance: Centralized serves ~75% of users within SLA.
    Distributed serves ~100%. Revenue risk: 250K users × $0.50 = $125K/mo lost revenue >> $33K infra premium.
    Distributed wins on total cost of ownership.'
