validation_issues:
- The KV per token calculation (327 KB/token) in the Napkin Math seems accurate for Llama-3 70B, but then
  the calculation for 20 concurrent chats * 8000 tokens * 327 KB/token = 52.3 GB of KV cache. This 52.3
  GB + 140 GB (model weights) = 192.3 GB which would not fit on '4xA100 (320 GB total)' as it leaves very
  little room for activations and other buffers, and also assumes full 8000 token KV cache for all concurrent
  users, which is not realistic for a system that OOMs quickly. Also, the solution discusses Llama-3 70B
  which typically uses Grouped Query Attention (GQA) reducing the KV cache size, but the calculation doesn't
  seem to account for it, as 327KB/token is more typical for non-GQA models.
