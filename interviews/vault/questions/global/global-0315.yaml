title: Global New 0016
scenario: A 4B parameter model (8GB FP16) is hosted on a GPU (16GB, 320GB/s). Each user request statically consumes 0.5GB of KV cache.
question: How would you determine the maximum batch size, and calculate the memory-bound token generation time for that full batch?
details:
  realistic_solution: 'Find the available memory for KV cache by subtracting weight memory from total VRAM. Divide by the per-request KV cache footprint to find max batch size. Because generation is memory-bound by weight reading, the time to generate 1 token (for the whole batch) is weights / memory bandwidth.'
  common_mistake: |
    **The Pitfall:** Adding the KV cache size to the weights before dividing by bandwidth.
    **The Rationale:** Forgetting that during standard token generation, reading the static model weights is the primary memory bottleneck, not the KV reads.
    **The Consequence:** Miscalculating generation time and underestimating the hardware's throughput capacity.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 16 GB Total VRAM. 8 GB weights (FP16).
       - Memory bandwidth: 320 GB/s.
       - 0.5 GB KV cache per request.
    2. **Calculations:**
       - Free VRAM: 16 GB - 8 GB weights = 8 GB.
       - Max Batch Size: 8 GB / 0.5 GB per request = 16.
       - Token generation step time = Weight Size / Bandwidth = 8 GB / 320 GB/s = 0.025 seconds (25 ms).
    3. **Conclusion & Interpretation:**
       - **The system supports a batch size of 16, with a memory-bound generation time of 25 ms per step.**
       - **Result: Memory-Bandwidth Bound**
