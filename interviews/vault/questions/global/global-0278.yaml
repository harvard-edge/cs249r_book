title: Batch Size to Reach Compute-Bound Regime
scenario: You are serving a 7B FP16 model. Each forward pass for batch=1 has AI ≈ 1 FLOP/Byte. The ridge point is 156 FLOP/Byte.
question: "What minimum batch size pushes the main GEMM operations into the compute-bound regime, and what are the latency implications?"
details:
  realistic_solution: "For a matrix-vector multiply y=Wx (batch=1): AI = 2×d / (d×2 + 2) ≈ 1 FLOP/Byte (for d=4096, FP16). For matrix-matrix Y=WX with batch B: FLOPs = 2×d×d×B, Bytes = d×d×2 + d×B×2 + d×B×2. For large d: AI ≈ 2×d×B / (d×2) = B FLOP/Byte. To reach ridge: B ≥ 156. So batch ≈ 156. Latency impact: batch=1 at bandwidth limit = 14 GB / 2 TB/s = 7ms per token. Batch=156: same 7ms for reading weights (amortized) + compute time 156× more FLOPs = 2 × 7B × 156 / 312T = 7ms. Total ≈ 14ms for 156 tokens = 0.09ms/token effective — a 78x throughput improvement. But per-request latency increases from 7ms to 14ms (2x worse) because each request waits for the batch."
  common_mistake: |
    **The Pitfall:** Assuming you need exactly batch=156 to hit the ridge point.
    **The Rationale:** The relationship between batch size and AI is roughly linear for GEMM, but this ignores non-GEMM operations.
    **The Consequence:** Over-batching, which increases per-request latency beyond SLAs without proportionally increasing throughput.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - AI at batch B ≈ B FLOP/Byte for large GEMMs.
       - Ridge point is 156, needing batch ≥ 156.
    2. **Calculations:**
       - Batch=1 throughput = 14 GB / 2 TB/s = 7ms per token = 143 tokens/sec.
       - Batch=156 throughput = 7ms (read weights) + 7ms (compute) = 14ms total.
       - Total throughput = 156 / 0.014s = 11,143 tokens/sec.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound. Yields a 78x throughput gain, but a 2x latency increase per request.**
