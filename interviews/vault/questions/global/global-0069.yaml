title: Optimizing Checkpoint Frequency via Young-Daly
scenario: You are pretraining a 1T parameter MoE model on 4,096 GPUs. Cluster telemetry indicates an MTBF of exactly 6 hours. Writing a full 4TB checkpoint synchronously to object storage pauses training for exactly 4 minutes.
question: "What checkpoint interval and architecture would maximize goodput with a 6-hour MTBF and 4-minute synchronous checkpoint?"
details:
  realistic_solution: 'To architect the optimal checkpointing schedule, apply the Young-Daly formula to balance the overhead of writing checkpoints against the compute time lost when a failure occurs. The optimal interval T is approximately sqrt(2 * M * C) - C, where M is the MTBF and C is the time to write a checkpoint. By setting the interval to this optimal value, you minimize the total wasted cluster time. Furthermore, to decouple the 4-minute pause from the training loop, you should architect a two-stage asynchronous checkpointing system (HBM -> Host RAM -> Object Storage), drastically reducing C.'
  common_mistake: |
    **The Pitfall:** Checkpointing randomly, or exactly at the MTBF interval (every 6 hours).
    **The Rationale:** Candidates mistakenly align checkpointing with the failure rate, not realizing this maximizes potential lost work on failure.
    **The Consequence:** Significantly higher compute waste due to excessive recompute time after crashes.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - M (MTBF) = 6 hours (360 minutes).
       - C (Checkpoint write time) = 4 minutes.
    2. **Calculations:**
       - Optimal interval T = sqrt(2 * M * C) - C.
       - T = sqrt(2 * 360 * 4) - 4 = sqrt(2880) - 4.
       - T = ~53.66 - 4 = 49.66 minutes.
    3. **Conclusion & Interpretation:**
       - **Result: Optimal Checkpoint Interval is ~50 minutes.** Minimizes total wasted cluster time.
