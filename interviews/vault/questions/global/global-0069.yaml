title: Optimizing Checkpoint Frequency via Young-Daly
scenario: You are pretraining a 1T parameter MoE model on 4,096 GPUs. Cluster telemetry indicates an MTBF
  (Mean Time Between Failures) of exactly 6 hours. Writing a full 4TB checkpoint synchronously to object
  storage pauses training for exactly 4 minutes. You need to architect the checkpointing schedule to maximize
  cluster 'goodput' (useful compute time).
details:
  realistic_solution: To architect the optimal checkpointing schedule, apply the Young-Daly formula to
    balance the overhead of writing checkpoints against the compute time lost when a failure occurs. The
    optimal interval T is approximately sqrt(2 * M * C) - C, where M is the MTBF and C is the time to
    write a checkpoint. By setting the interval to this optimal value, you minimize the total wasted cluster
    time (checkpointing overhead + recompute time after a crash). Furthermore, to decouple the 4-minute
    pause from the training loop, you should architect a two-stage asynchronous checkpointing system (HBM
    -> Host RAM -> Object Storage), which would drastically reduce 'C' and alter the optimal frequency.
  common_mistake: Checkpointing randomly, or exactly at the MTBF interval (every 6 hours), which maximizes
    the potential lost work on failure.
  napkin_math: 'Given M = 6 hours (360 minutes) and C = 4 minutes.

    Optimal interval T = \sqrt{2 \times 360 \times 4} - 4

    T = \sqrt{2880} - 4 \approx 53.66 - 4 = 49.66 minutes.

    If checkpointing every ~50 minutes, overhead per day is (1440 / 54) * 4 \approx 106 minutes of checkpointing
    time, plus expected recovery recompute time, minimizing total waste.'
