title: Hot Set Memory Footprint
scenario: A feature cache has a hot set of 80,000 entries, and each entry is 2 KB.
question: How much RAM is needed to keep an 80,000-entry hot set with 2 KB entries in memory?
details:
  realistic_solution: The hot set needs 80,000 x 2 KB = 160,000 KB, or about 160 MB. This is small enough for server memory but large for many edge caches.
  common_mistake: |
    **The Pitfall:** Sizing cache memory based on the total key count rather than focusing on the hot-set size and entry bytes.
    **The Rationale:** Attempting to cache the entire database instead of optimizing for the Pareto distribution of actual traffic.
    **The Consequence:** Massively over-provisioning edge caches, leading to bloated deployments that waste memory and money.
  napkin_math: |
    * Total bytes = 80,000 entries * 2 KB/entry = 160,000 KB.
    * Conversion to MB = 160,000 KB / 1024 = 156.25 MB (or ≈ 160 MB).
    * **The hot set requires ~160 MB of RAM.**
