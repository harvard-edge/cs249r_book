title: Compute Cost Estimation for Pre-training a 70B Model
scenario: 'A 70B parameter model is pre-trained on 1.5 trillion tokens using an SXM cluster. The hardware achieves 45% MFU on 989 TFLOP/s FP16 tensor cores.'
question: 'What is the total monetary cost of the training run, based on total FLOPs and required node-hours, assuming $30/hour per 8-GPU node?'
details:
  realistic_solution: 'Pre-training requires 6 * P * D = 6 * 70e9 * 1.5e12 = 6.3e23 FLOPs. A single H100 at 45% MFU provides 0.45 * 989e12 = 4.45e14 FLOPs/sec. The run needs (6.3e23) / (4.45e14) = 1.41e9 GPU seconds, which is ~393,000 GPU hours. Divided by 8 GPUs per node, this is ~49,125 node-hours. At $30/hour, the total compute cost evaluates to approximately $1.47 million.'
  common_mistake: |
    **The Pitfall:** Using 2 FLOPs per parameter instead of 6.
    **The Rationale:** Candidates often confuse the FLOPs required for inference (forward pass only) with the FLOPs required for training (forward + backward).
    **The Consequence:** Underestimating training compute costs by a factor of 3, leading to massive budget overruns.
  napkin_math: |
    **Assumptions & Constraints:**
    - 70B model, 1.5T tokens.
    - H100 at 45% MFU on 989 TFLOP/s FP16.
    - Node cost = $30/hour (8 GPUs).

    **Calculations:**
    - Total FLOPs = 6 * 70e9 * 1.5e12 = 6.3e23 FLOPs.
    - Effective FLOPs/sec per GPU = 0.45 * 989e12 = 4.45e14.
    - Total GPU hours = (6.3e23 / 4.45e14) / 3600 = ~393,214 hours.
    - Node hours = 393,214 / 8 = ~49,151 hours.
    - Total Cost = 49,151 * $30 = ~$1.47 million.

    **Conclusion & Interpretation:**
    - **Result: ~$1.47 million Compute Cost (Compute-Bound)**. Cost is entirely compute-bound.
