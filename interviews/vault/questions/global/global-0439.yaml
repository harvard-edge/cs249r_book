title: Compute Cost Estimation for Pre-training a 70B Model
scenario: A 70B parameter model is pre-trained on 1.5 trillion tokens using an H100
  SXM cluster. The hardware achieves 45% MFU on 989 TFLOP/s FP16 tensor cores. H100
  nodes (8 GPUs) cost $30/hour.
question: Evaluate the total monetary cost of the training run by calculating total
  FLOPs and required node-hours.
details:
  realistic_solution: Pre-training requires 6 * P * D = 6 * 70e9 * 1.5e12 = 6.3e23
    FLOPs. A single H100 at 45% MFU provides 0.45 * 989e12 = 4.45e14 FLOPs/sec. The
    run needs (6.3e23) / (4.45e14) = 1.41e9 GPU seconds, which is ~393,000 GPU hours.
    Divided by 8 GPUs per node, this is ~49,125 node-hours. At $30/hour, the total
    compute cost evaluates to approximately $1.47 million.
  common_mistake: Using 2 FLOPs per parameter instead of 6 (which accounts for both
    forward and backward passes).
  napkin_math: 6 * 70e9 * 1.5e12 = 6.3e23 FLOPs total.
