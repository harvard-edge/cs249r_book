title: 3D Torus Deadlock and Credit Starvation
scenario: A custom ASIC cluster uses a 3D Torus topology (8x8x8). During a massive 3D parallel training
  run, the entire cluster's network throughput suddenly drops to 0 GB/s. A specific link flapping event
  occurred 5 seconds prior. No hardware has failed permanently, but traffic is completely stalled and
  requires a hard reset.
question: "What caused the 3D Torus network to freeze at 0 GB/s after a transient link flap?"
details:
  realistic_solution: The root cause is a routing deadlock due to credit starvation, a classic vulnerability
    in Torus networks. Torus topologies contain physical loops. To prevent deadlocks, deterministic routing
    (like Dimension-Order Routing, X-Y-Z) assigns specific Virtual Channels (VCs) to cross the 'dateline'
    (the wrap-around link). When the link flapped, the fabric manager recalculated paths, temporarily
    breaking dimension-order rules or misassigning VCs. Packets formed a cyclic dependency circle (A waits
    for B's buffer credits, B waits for C, C waits for A). Because it's a lossless network using credit-based
    flow control, the packets wait indefinitely, freezing the entire topology.
  common_mistake: Assuming a hardware failure severed the network partition, or that standard TCP/IP style
    timeouts will eventually recover the dropped packets.
  napkin_math: In an 8x8x8 torus, max hops = 4+4+4 = 12. At 100ns per hop, max traversal = 1.2μs. Link
    credit buffers hold ~10 packets. If 4 nodes in a ring each fill their 10-packet buffer trying to send
    to the next, 0 credits are returned. Throughput = 0 / ∞ = 0 GB/s. Recovery requires dropping packets
    via a hardware watchdog, taking seconds to minutes.
