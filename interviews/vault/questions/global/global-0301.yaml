title: Global New 0002
scenario: You are attempting to load and run a 7B parameter LLM in FP16 precision on a standard 16GB GPU.
question: "Can a 7B FP16 LLM fit on a 16GB GPU, and what is the minimum time to read its weights once?"
details:
  realistic_solution: 'First, establish the memory footprint of the weights using the rule of thumb that 1 billion parameters in FP16 equates to roughly 2GB. Check if it fits within the 16GB limit. Then, apply the GPU memory bandwidth to find the theoretical minimum duration to load the entire model from GDDR6 memory to the compute cores.'
  common_mistake: |
    **The Pitfall:** Assuming 1 byte per parameter for FP16 or forgetting bandwidth limits.
    **The Rationale:** Candidates mix up FP16 (2 bytes) with INT8 (1 byte), or focus only on capacity while ignoring bandwidth limits for load times.
    **The Consequence:** Incorrect memory sizing and drastically underestimating model load latency.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 7B parameters, FP16 precision (2 bytes).
       - 16 GB VRAM capacity, bandwidth = 320 GB/s.
    2. **Calculations:**
       - Weights Memory = 7B * 2 bytes = 14 GB.
       - 14 GB < 16 GB VRAM (Fits).
       - Read Time = Memory Size / Bandwidth = 14 GB / 320 GB/s = 0.04375 seconds.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bandwidth Bound.** Fits with 2GB headroom, minimum read time is ~43.75 ms.
