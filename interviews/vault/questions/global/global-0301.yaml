title: Global New 0002
scenario: You are attempting to load and run a 7B parameter LLM in FP16 precision on a standard T4 16GB
  GPU. You need to calculate the memory required for the weights and determine the absolute minimum time
  required to read these weights from memory once.
details:
  realistic_solution: First, establish the memory footprint of the weights using the rule of thumb that
    1 billion parameters in FP16 equates to roughly 2GB. Check if it fits within the 16GB limit. Then,
    apply the T4's memory bandwidth to find the theoretical minimum duration to load the entire model
    from GDDR6 memory to the compute cores.
  common_mistake: Assuming 1 byte per parameter for FP16 or forgetting to account for the actual memory
    bandwidth of the T4 (320GB/s).
  napkin_math: Weights Memory = 7B parameters * 2 bytes = 14GB. Fits in 16GB T4. Read Time = Memory Size
    / Bandwidth = 14GB / 320GB/s = 0.04375 seconds (43.75 ms).
