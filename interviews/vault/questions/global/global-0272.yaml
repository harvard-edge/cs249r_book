title: Prefill Chunking vs Monolithic Prefill
scenario: A serving system receives a 32K-token prompt. You must compare monolithic prefill vs chunked prefill. Your system serves 100 concurrent users.
question: "How would you evaluate the latency and throughput tradeoffs between monolithic and chunked prefill?"
details:
  realistic_solution: 'Monolithic prefill is compute-bound. On A100 at 50% MFU: FLOPs \u2248 4.48 PFLOP \u2192 28.7 seconds. During this time, all 100 concurrent decode requests stall. Chunked prefill (4K chunks): each chunk takes 3.6 seconds. Between chunks, decode 1-2 iterations for waiting users. Total prefill time increases slightly, but decode users see max stall of 3.6s instead of 28.7s. For production with SLAs, chunked prefill is essential.'
  common_mistake: |
    **The Pitfall:** Assuming monolithic prefill is always better because it maximizes compute utilization.
    **The Rationale:** Candidates optimize strictly for total throughput (MFU) while ignoring the impact on concurrent request latency.
    **The Consequence:** Blocking all decode requests for the duration of prefill, causing massive latency spikes for concurrent users.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 70B model, 32K context. A100 GPU (156 TFLOPS @ 50% MFU).
    2. **Calculations:**
       - Monolithic prefill = 2 * 70B * 32K = 4.48 PFLOP / 156 TFLOPS = 28.7s.
       - Decode stall (Monolithic) = 28.7s for all users.
       - Chunked (4K) = 3.6s per chunk, 8 chunks.
       - Max decode stall (Chunked) = 3.6s.
    3. **Conclusion & Interpretation:**
       - **Result: Latency vs Throughput Tradeoff.** Throughput cost is ~10%, but P99 latency improves by 8x.
