title: Multi-Tier Embedding Lookups
scenario: Your recommendation system uses an enormous Deep Learning Recommendation Model (DLRM) with 5TB of embedding tables. The hardware is a single node with 8x A100 GPUs, 2TB Host RAM, and 8x 3.2TB NVMe drives.
question: How would you architect 5TB DLRM embedding lookups across HBM, host RAM, and NVMe for 10,000 QPS under 50ms P99?
details:
  realistic_solution: 'Implement a software-managed, explicitly tiered embedding cache. HBM acts as L1 (~300GB). Host DRAM acts as L2 (~1.5TB). NVMe acts as L3 (5TB). Use a hash-based routing mechanism to shard requests across GPUs. For L3 (NVMe) lookups, bypass the OS page cache entirely using `O_DIRECT` and async I/O (io_uring) to eliminate memory copies and CPU overhead. Implement a background prefetching thread to promote embeddings from NVMe -> DRAM -> HBM before the forward pass requires them.'
  common_mistake: |
    **The Pitfall:** Relying on OS-level page faults (mmap) to pull embeddings from NVMe.
    **The Rationale:** Using naive memory mapping instead of explicitly managed cache tiers.
    **The Consequence:** Causing massive I/O amplification and thread blocking, completely missing the 50ms p99 SLA.
  napkin_math: |
    **Assumptions & Constraints:**
    - Lookups: 10,000 QPS * 100 features = 1M lookups/sec.
    - Hit rates: 80% L1, 15% L2, 5% L3.
    
    **Calculations:**
    - NVMe reads: 5% * 1M = 50,000 reads/sec.
    - PCIe traffic: 50,000 reads * 128 bytes = 6.4 MB/s.
    
    **Conclusion & Interpretation:**
    - **Result: 50k reads/sec (IOPS-Bound)**. Hardware limits 8 NVMe drives yield 8M IOPS; 50k reads/sec easily meets the 50ms SLA.
