title: GPU vs CPU Data Preprocessing for Training
scenario: Your image classification training pipeline spends 40% of wall-clock time waiting for data preprocessing on 32 CPU cores. The GPU sits idle during this time.
question: How would you compare doubling CPU cores, GPU preprocessing, and offline preprocessed shards for this training pipeline?
details:
  realistic_solution: Doubling CPUs provides a 1.25x speedup for added cost. Moving to GPU (DALI) provides a ~1.6x speedup at no extra cost, but consumes VRAM. Offline preprocessing provides the best speedup but costs significant storage and only works for deterministic augmentation. GPU is best for random augmentations.
  common_mistake: |
    **The Pitfall:** Automatically choosing GPU preprocessing without evaluating memory limits.
    **The Rationale:** GPUs are universally recognized as faster at matrix operations like image resizing.
    **The Consequence:** Precious GPU memory is consumed by preprocessing buffers, forcing a reduction in batch size that outweighs the preprocessing gains.
  napkin_math: |
    **Assumptions & Constraints:**
    - Baseline: 60% GPU active, 40% CPU preprocessing wait.
    - Option A (64 CPUs): 2x CPU throughput.
    - Option B (GPU DALI): ~10x-50x faster preprocessing, uses VRAM.
    - Option C (Offline shards): 0% online CPU wait.

    **Calculations:**
    - Option A: Wait time drops from 40% to 20%. Speedup = 1 / (0.6 + 0.2) = 1.25x.
    - Option B: Wait time drops to ~2%. Speedup = 1 / (0.6 + 0.02) = 1.61x.
    - Option C: Wait time drops to 0%. Speedup = 1 / 0.6 = 1.67x.

    **Conclusion & Interpretation:**
    - **Result: Compute-Bound (CPU).** Moving to GPU DALI provides a 1.61x speedup at no extra hourly hardware cost, optimizing the cost-performance ratio for random augmentations.
