title: The PyTorch DataLoader Deadlock
scenario: During a technical screen, I ask you to write a PyTorch training loop. You set `num_workers=0` in your DataLoader.
question: Why will setting `num_workers=0` make the Senior Engineers instantly reject your code for a production environment?
details:
  realistic_solution: 'Setting `num_workers=0` forces data loading to happen synchronously on the main Python process. The GPU will sit idle while Python blocks the main thread to read files from disk and decode JPEGs. It completely breaks the data-loading pipeline.'
  common_mistake: |
    **The Pitfall:** Believing `num_workers=0` saves RAM or is safer.
    **The Rationale:** Confusing multi-processing data duplication overhead with inefficient synchronous execution.
    **The Consequence:** Forcing data loading to happen synchronously on the main thread, starving the GPU and wasting expensive compute resources.
  napkin_math: |
    **Assumptions & Constraints:**
    - GPU forward pass: ~5 ms.
    - JPEG decode + disk read: ~20 ms per batch.
    
    **Calculations:**
    - With `num_workers=0`: GPU is idle 80% of the time (waiting 20 ms out of 25 ms total).
    - With 4 workers prefetching: GPU utilization jumps to ~95%.
    
    **Conclusion & Interpretation:**
    - **Result: 80% Idle (I/O-Bound)**. Synchronous loading drastically reduces GPU utilization.
  options:
    - It forces PyTorch to use FP64 instead of FP32.
    - It causes PyTorch to spawn too many zombie processes.
    - It forces synchronous data loading on the main thread, starving the GPU.
    - It disables the L1 cache on the CPU.
  correct_index: 2
