title: Data Validation Budget Optimization
scenario: A data validation job checks 100 million records/day and costs 0.1 ms CPU per record. The team
  wants to cut cost by 80% while still catching schema regressions.
question: How would you reduce validation CPU cost by 80% while still catching schema regressions in 100M
  daily records?
details:
  realistic_solution: Full validation costs 10,000 CPU-seconds/day. To cut 80%, we have a budget of 2,000
    CPU-seconds. Run full checks on a 15% stratified sample (1,500s) plus always-on cheap schema checks
    for all records (e.g., 0.005 ms/record = 500s).
  common_mistake: '**The Pitfall:** Randomly sampling 20% of records.

    **The Rationale:** Looking for a quick reduction in volume without considering data distributions.

    **The Consequence:** Missing schema regressions in rare, newly introduced data sources that aren''t
    captured by simple random sampling.

    '
  napkin_math: '**Assumptions & Constraints:**

    - Volume: 100M records/day.

    - Cost: 0.1 ms/record full check.

    - Target budget: 2,000 CPU-seconds (80% cut).

    - Cheap schema check costs 0.005 ms/record.


    **Calculations:**

    - Full validation cost: 100M x 0.0001s = 10,000 CPU-seconds.

    - Cheap checks all records: 100M x 0.000005s = 500 CPU-seconds.

    - Remaining budget for full checks: 1,500 CPU-seconds.

    - Allowed sample: 1,500s / 0.0001s = 15 million records (15%).


    **Conclusion & Interpretation:**

    - **Result: 80% Cost Reduction (Compute-Bound)**. 80% reduction is achieved safely via 100% cheap
    checks and a 15% stratified sample.'
