title: Incomplete Data Pipeline Incident
scenario: A model regresses after launch. Cloud logs show normal feature distributions, mobile users report worse results offline, and edge gateways show intermittent cache misses. The team gives no cache TTLs, offline rates, or training-serving skew metrics.
question: What missing data-pipeline information do you need before diagnosing this cross-regime model regression?
details:
  realistic_solution: 'You need cache TTLs, offline duration, feature freshness, fallback values, cache-miss rates, version skew, training-serving transformations, and per-regime quality metrics. The known facts suggest a freshness or fallback problem outside cloud, but you cannot prove the root cause without comparing feature age and transformation consistency.'
  common_mistake: |
    **The Pitfall:** Debugging only cloud logs because they are easiest to query.
    **The Rationale:** The telemetry infrastructure for cloud is rich, whereas edge devices are black boxes.
    **The Consequence:** Searching for data drift in the wrong place while the actual regression lives in edge caching and offline fallback logic.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Cloud logs are normal.
       - Feature cache TTLs are estimated at 1 hour.
       - Mobile offline duration reported up to 12 hours.
    2. **Calculations:**
       - Mobile Offline Duration (12h) / Feature TTL (1h) = 12x.
    3. **Conclusion & Interpretation:**
       - **The device serves stale features 12x beyond the intended freshness window, causing degradation.**
       - **Result: Data-Staleness Bound**
