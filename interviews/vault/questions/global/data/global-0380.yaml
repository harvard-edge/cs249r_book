title: Evaluate Centralized Versus Local Preprocessing
scenario: A vision product can preprocess images centrally in cloud, locally on mobile, or at an edge gateway.
question: How would you evaluate cloud, mobile, and edge preprocessing for a privacy-sensitive real-time vision workflow?
details:
  realistic_solution: 'Adopt Edge or Mobile Topologies. Emitting uncompressed video payloads saturates localized cellular uplinks immediately and violates fundamental privacy covenants. Edge gateways process telemetry natively, returning semantic lightweight tokens over the backhaul.'
  common_mistake: |
    **The Pitfall:** Choosing cloud because it is operationally convenient while ignoring privacy and uplink constraints.
    **The Rationale:** Cloud architectures are standard for web backends, leading developers to reflexively centralize processing without doing the math on video uplink costs.
    **The Consequence:** The system becomes unviable due to saturated network links, high latency, and severe privacy compliance risks.
  napkin_math: |
    **Assumptions & Constraints:**
    - Frame size: 2 MB
    - Rate: 10 FPS

    **Calculations:**
    - Required Uplink: 2 MB * 10 = 20 MB/s (160 Mbps)

    **Conclusion & Interpretation:**
    - **Result: Network-Uplink Bound (Cloud Unviable)**. Uncompressed payloads saturate cellular uplinks, necessitating edge or mobile preprocessing.
