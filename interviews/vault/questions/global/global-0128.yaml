title: The FlashAttention Paradox
scenario: You serve a Vision Transformer on an A100 (40MB L2 cache, 2TB/s HBM). The sequence length is 196 (14x14 patches), with embedding dim 1024. Standard PyTorch attention takes 0.8ms. You upgrade to FlashAttention-2, expecting a speedup by eliminating HBM read/writes. Instead, latency increases to 1.2ms.
question: Why does FlashAttention-2 slow the ViT attention from 0.8ms to 1.2ms at sequence length 196 on A100?
details:
  realistic_solution: FlashAttention optimizes the memory roofline by tiling the attention matrix to avoid writing the O(N^2) intermediate attention matrix to HBM. It trades memory bandwidth for extra compute (recomputation in backward, and extra ALU instructions for tiling/scaling in forward). However, for very short sequence lengths like 196, the attention matrix is extremely small. It fits entirely within the A100's massive 40MB L2 cache. Therefore, standard attention is not HBM-bandwidth bound; it runs at L2 cache bandwidth speeds (~5-10 TB/s). Because the memory bottleneck FlashAttention solves doesn't exist for this workload, you only incur the extra ALU overhead, shifting the workload up the compute ceiling and increasing latency.
  common_mistake: |
    **The Pitfall:** Assuming FlashAttention is always faster because it eliminates HBM reads/writes, regardless of sequence length.
    **The Rationale:** Candidates often memorize that FlashAttention provides a speedup without understanding the underlying Roofline model and L2 cache mechanics.
    **The Consequence:** Integrating a complex kernel that actually degrades performance for short-context models like standard ViTs.
  napkin_math: |
    *   **Matrix Size:** Sequence length 196, dim 1024. Standard attention matrix is 196 * 196 * 2 bytes (FP16) = 76.8 KB.
    *   **L2 Cache Fit:** This 76 KB matrix easily fits entirely in the A100's **40 MB L2 cache**.
    *   **Conclusion:** Since the matrix doesn't spill to the 2 TB/s HBM, FlashAttention's HBM avoidance is moot, and its extra FLOPs overhead makes it **slower**.
