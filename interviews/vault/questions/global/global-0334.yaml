title: Extreme Quantization Rollout Design
scenario: A team wants to ship a 2-bit model to low-memory devices while keeping a higher-quality INT8 model for premium devices.
question: How would you roll out a 2-bit model for low-memory devices without creating quality cliffs versus the INT8 model?
details:
  realistic_solution: Deploy a canary strategy with cohort segmentation based on device memory telemetry. Utilize task-specific distillation or KV-cache quantization (e.g., AWQ) to retain critical capability. Monitor long-tail class regressions, as aggregate metrics mask catastrophic failure modes common in sub-4-bit extreme quantization.
  common_mistake: |
    **The Pitfall:** Treating 2-bit quantization as a universal compression upgrade simply because it fits on more devices.
    **The Rationale:** Focusing entirely on memory constraints while ignoring non-linear model degradation.
    **The Consequence:** Shipping a heavily degraded model that ruins the user experience for the low-end device segment.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Compression: 2-bit vs INT8
    2. **Calculations:**
       - Memory compression ratio: 8-bit / 2-bit = 4x smaller RAM footprint
    3. **Conclusion & Interpretation:**
       - **Result: Quality-Bound**
