title: Recovering Edge Vision Accuracy
scenario: An autonomous delivery drone runs a 50M parameter object detection model at 30 FPS. To meet the 5W power limit of the edge NPU, the model must execute entirely in INT8. Standard Post-Training Quantization (PTQ) achieves the power and latency targets, but the mAP (mean Average Precision) drops from 0.82 to 0.65, causing missed detections of pedestrians.
question: How would you recover the drone detector's mAP while keeping the 50M model fully INT8 under the 5W NPU limit?
details:
  realistic_solution: Architect a Quantization-Aware Training (QAT) pipeline. PTQ fails because static calibration cannot adequately capture and mitigate the clipping errors from activation outliers in the compact vision model. QAT simulates the quantization effects (clipping and rounding) during the training forward pass using FakeQuant nodes. The gradients are approximated using the Straight-Through Estimator (STE). By fine-tuning the model for a few epochs with QAT, the weights adjust to accommodate the restricted INT8 dynamic range, effectively pushing the Pareto curve to recover the mAP to ~0.80 while strictly maintaining the INT8 data paths for the 5W edge deployment.
  common_mistake: |
    **The Pitfall:** Switching back to FP16 or Mixed Precision to recover accuracy.
    **The Rationale:** Assuming accuracy drops can only be fixed by increasing the numerical precision of the weights.
    **The Consequence:** Immediately violating the strict 5W power budget and edge NPU silicon constraints (which may only have INT8 ALUs).
  napkin_math: |
    - **Compute Requirement:** 50M params × 30 FPS × ~100 MACs/param ≈ **150 GigaMACs/sec**
    - **FP32 Compute Power:** 150G × 3.7pJ = **0.55W** (compute only). Memory access is typically 10x higher, pushing total power above 5W.
    - **INT8 Compute Power:** 150G × 0.2pJ = **0.03W**.
    - **Conclusion:** INT8 is physically required to stay under the strict 5W thermal envelope when including memory costs.
