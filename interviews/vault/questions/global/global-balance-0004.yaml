title: Queue Headroom Design
scenario: A service has 20 replicas, each handling 15 requests/s. Normal traffic is 210 requests/s but bursts reach 270 requests/s. Design a capacity target that avoids operating near the queueing cliff.
question: How would you size replica headroom for 270 rps bursts if 20 replicas each handle 15 rps?
details:
  realistic_solution: Current capacity is 300 rps, so bursts run at 90% utilization. That is too close to the queueing cliff for latency-sensitive service. To keep utilization at or below 70%, capacity should be 270/0.7 = 386 rps, requiring 26 replicas at 15 rps each.
  common_mistake: Checking that 270 rps is below 300 rps and declaring the service safe.
  napkin_math: Required capacity = 270 / 0.7 = 386 rps. Replicas = ceil(386/15) = 26.
