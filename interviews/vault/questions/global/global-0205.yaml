title: PCIe vs NVLink Model Shard Transfer
scenario: You need to transfer a 10 GB tensor shard between two GPUs.
question: "How long does the 10 GB tensor shard transfer take over PCIe Gen4 x16 versus NVLink 4.0?"
details:
  realistic_solution: 'PCIe Gen4: 10 GB / 32 GB/s = 312 ms. NVLink 4.0: 10 GB / 450 GB/s = 22 ms. NVLink is ~14x faster for this transfer. This is why intra-node tensor parallelism requires NVLink \u2014 splitting a single matrix multiply across GPUs connected only by PCIe would make the communication overhead dominate. The rule of thumb: use NVLink for tight coupling (tensor parallelism), PCIe for loose coupling (data parallelism across nodes).'
  common_mistake: |
    **The Pitfall:** Using bidirectional bandwidth as if it were available in one direction.
    **The Rationale:** Candidates often take the headline spec (e.g., 64 GB/s for PCIe Gen4 x16) without realizing it accounts for both directions simultaneously.
    **The Consequence:** Underestimating transfer times by 2x, leading to flawed performance projections for tensor parallelism.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 10 GB tensor shard transfer.
       - PCIe Gen4 x16 (64 GB/s bidirectional).
       - NVLink 4.0 (900 GB/s bidirectional).
    2. **Calculations:**
       - PCIe unidirectional: 64 GB/s / 2 = 32 GB/s.
       - NVLink unidirectional: 900 GB/s / 2 = 450 GB/s.
       - PCIe transfer: 10 GB / 32 GB/s = 312 ms.
       - NVLink transfer: 10 GB / 450 GB/s = 22 ms.
    3. **Conclusion & Interpretation:**
       - **Result: NVLink is ~14x faster.** Critical for latency-bound Tensor Parallelism.
