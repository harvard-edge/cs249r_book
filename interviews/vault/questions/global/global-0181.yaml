title: The CO2 Per Training Run
scenario: You train a model using 256 A100 GPUs (300W each) for 14 days in a datacenter with PUE 1.3,
  located in a region with grid carbon intensity of 400 gCO2/kWh. Calculate the total CO2 emissions of
  this training run in metric tons.
details:
  realistic_solution: 'Step 1: GPU energy = 256 GPUs × 0.3 kW × 24 h × 14 days = 25,804.8 kWh. Step 2:
    Total energy with PUE = 25,804.8 × 1.3 = 33,546.2 kWh. Step 3: CO2 = 33,546.2 kWh × 400 gCO2/kWh =
    13,418,496 g = 13.4 metric tons CO2. For reference, the average American''s annual carbon footprint
    is ~16 metric tons, so this single training run produces nearly a year''s worth of one person''s emissions.'
  common_mistake: Forgetting to include PUE in the energy calculation. Without PUE, you underestimate
    energy by 30%. Also, mixing up grams and kilograms — the final answer should be in metric tons (1,000
    kg) for readability.
  napkin_math: 'Energy = 256 × 0.3 kW × 336 h = 25,805 kWh. With PUE 1.3: 33,546 kWh. CO2 = 33,546 × 400
    g/kWh = 13,418,400 g ≈ 13.4 metric tons. Comparison: ~1 person-year of US emissions. If run in France
    (50 gCO2/kWh instead): 33,546 × 50 = 1,677,300 g = 1.7 tons — an 8× reduction just by choosing the
    right region.'
