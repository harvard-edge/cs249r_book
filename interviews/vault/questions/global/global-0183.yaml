title: The Electricity Arbitrage
scenario: Your 1,000-GPU H100 cluster (700W each, PUE 1.25) runs batch training jobs that can tolerate 6-hour scheduling delays. Electricity prices fluctuate: $0.03/kWh at night (11pm-7am) and $0.12/kWh during peak (11am-5pm).
question: "What annual savings do you get by scheduling the 1,000-H100 batch workload during the 8 off-peak hours instead of peak?"
details:
  realistic_solution: 'Cluster power with PUE: 1,000 × 700W × 1.25 = 875 kW. If batch jobs fill 8 hours/day of off-peak: Energy per day = 875 kW × 8h = 7,000 kWh. Off-peak cost: 7,000 × $0.03 = $210/day. Peak cost (same work): 7,000 × $0.12 = $840/day. Daily savings: $840 - $210 = $630. Annual savings: $630 × 365 = $229,950. This is ~$230K/year saved purely by time-shifting deferrable workloads — no hardware changes needed.'
  common_mistake: |
    **The Pitfall:** Calculating savings only on GPU power and forgetting PUE, or assuming 24/7 utilization.
    **The Rationale:** Ignoring facility overhead and treating all workloads as strictly latency-sensitive.
    **The Consequence:** Missing out on hundreds of thousands of dollars in operational savings for jobs that didn't need to run immediately.
  napkin_math: |
    - **Total Power**: 1,000 GPUs * 0.7 kW * 1.25 PUE = 875 kW.
    - **Daily Energy (8h)**: 875 kW * 8 hours = 7,000 kWh.
    - **Peak Cost**: 7,000 kWh * $0.12 = $840/day.
    - **Off-Peak Cost**: 7,000 kWh * $0.03 = $210/day.
    - **Daily Savings**: $840 - $210 = $630.
    - **Conclusion**: Shifting to off-peak saves **$229,950/year**.
