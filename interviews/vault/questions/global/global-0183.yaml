title: The Electricity Arbitrage
scenario: 'Your 1,000-GPU cluster runs batch training jobs that can tolerate 6-hour scheduling delays. Electricity prices fluctuate: $0.03/kWh at night (11pm-7am) and $0.12/kWh during peak (11am-5pm).'
question: What annual savings do you get by scheduling the 1,000-GPU batch workload during the 8 off-peak hours instead of peak?
details:
  realistic_solution: 'Cluster power with PUE: 1,000 * 700W * 1.25 = 875 kW. If batch jobs fill 8 hours/day of off-peak: Energy = 875 kW * 8h = 7,000 kWh. Off-peak cost = 7,000 * $0.03 = $210/day. Peak cost = 7,000 * $0.12 = $840/day. Daily savings = $630. Annual savings = $630 * 365 = $229,950.'
  common_mistake: |
    **The Pitfall:** Calculating savings only on GPU power and forgetting PUE, or assuming 24/7 utilization.
    **The Rationale:** Ignoring facility overhead and treating all workloads as strictly latency-sensitive.
    **The Consequence:** Missing out on hundreds of thousands of dollars in operational savings for jobs that didn't need to run immediately.
  napkin_math: |
    **Assumptions & Constraints:**
    - 1,000 GPUs, 0.7 kW each, PUE = 1.25.
    - 8 hours off-peak scheduling.

    **Calculations:**
    - Total power = 1000 * 0.7 * 1.25 = 875 kW.
    - Daily energy = 875 * 8 = 7,000 kWh.
    - Delta price = $0.12 - $0.03 = $0.09/kWh.
    - Annual savings = 7000 * $0.09 * 365 = $229,950.

    **Conclusion & Interpretation:**
    - **Result: Facility-Arbitrage Bound**. Scheduling flexible jobs off-peak yields substantial cost savings.
