title: Architecture Choice For Long Outputs
scenario: A product serves short commands and long summaries. Encoder-decoder architecture has a 100 ms encoder and 8 ms/token decoder. Decoder-only architecture has no encoder but costs 14 ms/token.
question: How would you route short commands versus long summaries between encoder-decoder and decoder-only architectures?
details:
  realistic_solution: For very short outputs, decoder-only may win because it avoids the fixed 100 ms encoder cost. For long outputs, encoder-decoder can win because its per-token decode is lower. The crossover is when 100 + 8T = 14T, or about 17 tokens. Route short commands to decoder-only and longer summaries to encoder-decoder if quality is comparable.
  common_mistake: |
    **The Pitfall:** Choosing one architecture globally without considering the output length distribution.
    **The Rationale:** Seeking architectural simplicity while ignoring the mathematical latency tradeoffs of the two structures.
    **The Consequence:** Inflating latency for a large segment of user requests (either short commands or long summaries).
  napkin_math: |
    **Assumptions & Constraints:**
    - Decoder-Only: 14 ms/token.
    - Encoder-Decoder: 100 ms fixed + 8 ms/token.

    **Calculations:**
    - Crossover Point Equation: 14T = 100 + 8T.
    - 6T = 100 => T ≈ 16.7 tokens.

    **Conclusion & Interpretation:**
    - **Result: T ≈ 16.7 tokens (Latency-Bound)**. Decoder-only is faster for <17 tokens (short commands). Encoder-decoder is faster for >17 tokens (long summaries).
