title: Massive Context KV Cache Paging
scenario: You are designing an inference engine to serve a 1-million context window Llama-3 8B model. The hardware is a single node with 1x GPU, 2TB Host DRAM, and 4x Gen5 NVMe drives. The KV cache for a single request exceeds the available HBM.
question: How would you page the 1M-token KV cache across HBM, host DRAM, and NVMe while sustaining 10 tokens/sec decoding speed?
details:
  realistic_solution: 'To sustain 10 tokens/sec, full attention is physically impossible because reading the 71GB of paged KV cache over PCIe takes >1 second per token. We must design an explicit, software-managed 3-tier memory hierarchy and apply Sparse Attention or a Sliding Window. Divide the KV cache into fixed-size block chunks. Pin a sliding window of the most recent blocks and heavy-hitter tokens in HBM. As generation proceeds, fetch only the necessary sparse blocks from Host DRAM via PCIe in background streams. Use Host DRAM as an L2 cache, pulling from NVMe asynchronously to bypass OS page cache overhead. Compute and I/O must be perfectly overlapped within the 6.4GB/step PCIe limit.'
  common_mistake: |
    **The Pitfall:** Relying on OS-level Unified Memory (UVM) or mmap to automatically page the KV cache.
    **The Rationale:** Treating the GPU memory extension as a generic software problem without checking bandwidth limits.
    **The Consequence:** Unpredictable latency spikes and severe thread blocking, completely missing the 10 tokens/sec target.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 1M token context, 32 layers, 8 KV heads, 128 dim, 4 bytes/token.
       - Available HBM for KV: 80 GB - 16 GB (weights) - 4 GB (overhead) = ~60 GB.
       - Target speed: 10 tokens/sec (100ms per step).
       - Max PCIe Gen5 transfer per step: 64 GB/s * 0.1s = 6.4 GB.
    2. **Calculations:**
       - Total KV cache size: 1M * 32 * 8 * 128 * 4 bytes = ~131 GB.
       - Paged KV size (Host DRAM): 131 GB - 60 GB = 71 GB.
       - To sustain 10 tokens/sec, 71 GB must be transferred.
       - 71 GB > 6.4 GB PCIe bandwidth limit.
    3. **Conclusion & Interpretation:**
       - **Reading the full 71GB KV cache over PCIe takes >1 second per token, making 10 tokens/sec physically impossible without sparse attention.**
       - **Result: PCIe-Bandwidth Bound**
