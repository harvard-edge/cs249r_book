title: 3D CNN Activation Checkpointing
scenario: Training a 3D UNet requires 180GB for forward pass activations. Using full activation checkpointing drops throughput to 0.5 iter/sec. Goal is 1.5 iter/sec.
question: What hybrid recompute/offload strategy would fit 180GB of 3D UNet activations on an 80GB GPU at 1.5 iter/sec?
details:
  realistic_solution: 'Implement heterogeneous activation management. Use Activation Checkpointing for memory-heavy/compute-light layers (BatchNorm, ReLU). Asynchronously offload compute-heavy convolution activations to Host DRAM via PCIe CUDA streams to overlap transfer with compute.'
  common_mistake: |
    **The Pitfall:** Offloading all activations to Host CPU RAM indiscriminately.
    **The Rationale:** CPU RAM provides a massive, cheap memory pool to solve the 180GB deficit.
    **The Consequence:** Saturated PCIe Gen4 bandwidth destroys training speed, failing to meet the required throughput SLA.
  napkin_math: |
    **Assumptions & Constraints:**
    - Volume: 512^3 = 134M pixels
    - Tensor: 32-channel FP32 (4 bytes)
    - PCIe Gen4: 32 GB/s

    **Calculations:**
    - Single activation tensor: 134M * 32 * 4 = 17.1 GB
    - PCIe transfer time: 17.1 GB / 32 GB/s = ~0.53 seconds

    **Conclusion & Interpretation:**
    - **Result: PCIe-Bandwidth Bound**. Offloading compute-heavy convolution activations to Host DRAM must be done asynchronously to overlap transfer with compute.
