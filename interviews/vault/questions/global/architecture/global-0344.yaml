title: 'Portable Kernel Fallback Optimization'
scenario: 'A model runs on cloud GPU, mobile NPU, and edge accelerator. On mobile, 7% of operators fall back to CPU and account for 45% of latency.'
question: 'What should you optimize first if 7% of operators fall back to CPU but cause 45% of mobile latency?'
details:
  realistic_solution: 'Prioritize eliminating or rewriting the fallback operators for the mobile NPU. A small fraction of unsupported ops dominates latency, so graph rewriting, operator substitution, or custom kernels will likely beat general model compression.'
  common_mistake: |
    **The Pitfall:** Optimizing the 93% of already delegated operators because they make up the majority of the graph.
    **The Rationale:** Assuming that optimizing the largest percentage of operators will yield the highest latency reduction.
    **The Consequence:** Minimal latency improvements while ignoring the severe CPU-fallback bottleneck.
  napkin_math: |
    **Assumptions & Constraints:**
    - 7% of operators fall back to CPU.
    - These operators account for 45% of total latency.

    **Calculations:**
    - Concentration of latency: 45% latency share / 7% operator share ≈ 6.4x.

    **Conclusion & Interpretation:**
    - **Result: 6.4x Latency Concentration (CPU-Fallback-Bound)**. CPU-Fallback dominates on mobile NPU.
