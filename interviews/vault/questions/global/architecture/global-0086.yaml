title: Multi-tenant LoRA Serving Architecture
scenario: 'A B2B SaaS platform hosts 5,000 custom fine-tuned LoRA adapters over a base Llama-3 70B model. Peak traffic is 10,000 QPS with a heavily skewed Zipfian distribution: 10 tenants drive 80% of the traffic. The strict SLA requires Time-to-First-Token (TTFT) < 200ms.'
question: 'How do you design the inference architecture to minimize GPU cost while guaranteeing SLA across all tenants?'
details:
  realistic_solution: 'Design a Multi-LoRA serving architecture (e.g., S-LoRA/vLLM). Keep a single instance of the base Llama-3 70B model loaded across an 8x80GB A100 GPU cluster. Implement a two-tier model routing and memory management strategy: dynamically swap LoRA adapters from host CPU RAM into GPU VRAM over PCIe on demand. Use stateful routing at the API gateway to pin requests from the top 10 "hot" tenants to specific GPU workers where their adapters are kept resident. For the "cold" 4,990 tenants, fetch adapters asynchronously. Implement continuous batching using custom CUDA kernels (like Punica) to apply different LoRA weights within the same batch.'
  common_mistake: |
    **The Pitfall:** Deploying dedicated GPU endpoints for each tenant, or fetching LoRAs from S3 directly on the critical path.
    **The Rationale:** Candidates default to isolation for multi-tenancy or underestimate network latency for remote storage fetches.
    **The Consequence:** Massive GPU idle time, severe fragmentation, and violating the 200ms TTFT SLA.
  napkin_math: |
    **Assumptions & Constraints:**
    - Cluster VRAM = 8x80GB = 640GB. Base model = ~140GB.
    - Rank-16 LoRA = ~300MB. 5,000 LoRAs.
    - PCIe Gen4x16 bandwidth = 32 GB/s.

    **Calculations:**
    - Remaining VRAM = 500GB. Max resident LoRAs = 500GB / 300MB = ~1,666.
    - Since 5,000 > 1,666, swapping is mandatory.
    - Swap latency for cold LoRA = 300MB / 32 GB/s = ~9.4ms.
    - TTFT = 9.4ms (swap) + ~50ms (prefill) = ~59.4ms.

    **Conclusion & Interpretation:**
    - **Result: 9.4ms Swap Latency (Bandwidth-Bound)**. Easily meets the 200ms SLA without needing dedicated GPUs per tenant.
