title: Optimization Direction From Sensitivity
scenario: Profiling shows a workload would improve by 18 ms if memory bandwidth increased
  20%, but only 2 ms if peak compute increased 20%. Choose the optimization direction.
question: Which optimization direction should you prioritize when 20% more bandwidth
  saves 18 ms but 20% more compute saves 2 ms?
details:
  realistic_solution: Prioritize memory bandwidth or memory-traffic reduction. The
    workload is much more sensitive to bandwidth than compute. Candidate fixes include
    quantization, caching, fusion, better layout, or higher-bandwidth hardware.
  common_mistake: Buying a higher-TFLOP accelerator when profiling says compute is
    not the binding constraint.
  napkin_math: Bandwidth benefit ratio = 18/2 = 9x larger than compute benefit.
