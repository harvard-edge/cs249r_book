title: Optimization Direction From Sensitivity
scenario: Profiling shows a workload would improve by 18 ms if memory bandwidth increased 20%, but only 2 ms if peak compute increased 20%.
question: Which optimization direction should you prioritize when 20% more bandwidth saves 18 ms but 20% more compute saves 2 ms?
details:
  realistic_solution: Prioritize memory bandwidth or memory-traffic reduction. The workload is much more sensitive to bandwidth than compute. Candidate fixes include quantization, caching, fusion, better layout, or higher-bandwidth hardware.
  common_mistake: |
    **The Pitfall:** Buying a higher-TFLOP accelerator when profiling says compute is not the binding constraint.
    **The Rationale:** Candidates often assume that more FLOPS automatically translate to lower latency for any workload.
    **The Consequence:** Wasting budget and engineering time on compute upgrades that yield only a 2 ms improvement.
  napkin_math: |
    *   **Compute Benefit:** 2 ms / 20% increase = 10 ms base potential.
    *   **Bandwidth Benefit:** 18 ms / 20% increase = 90 ms base potential.
    *   **Bandwidth benefit ratio:** 18 / 2 = **9x larger** than compute benefit.
    *   **Conclusion:** The workload is significantly more sensitive to memory bandwidth.
