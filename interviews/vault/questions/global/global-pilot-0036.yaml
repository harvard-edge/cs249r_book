title: Cross-Regime Profiling Plan
scenario: The same model misses its latency target in cloud, mobile, and TinyML deployments. Cloud traces show 30% GPU utilization and high queue time, mobile traces show thermal throttling after 3 minutes, and TinyML traces show SRAM spills to external flash. Design a profiling plan that identifies the binding bottleneck in each regime.
question: How would you profile cloud queueing, mobile thermal throttling, and TinyML SRAM spills to identify the binding bottleneck in each regime?
details:
  realistic_solution: Use regime-specific counters. For cloud, separate queue time from service time and check accelerator utilization. For mobile, correlate latency with temperature, power state, and sustained clocks. For TinyML, inspect memory planner output, arena size, and flash access counts. The plan should produce a binding constraint per regime before proposing optimizations.
  common_mistake: Using the same GPU-utilization dashboard everywhere and missing thermal and memory-capacity failures outside the cloud.
  napkin_math: Cloud 30% utilization with high queue time suggests scheduling/capacity mismatch, not a kernel bottleneck. TinyML flash spills can be orders of magnitude slower than SRAM, so even small spill counts can dominate.
