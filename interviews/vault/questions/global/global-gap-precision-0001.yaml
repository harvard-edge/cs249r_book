title: Evaluate BF16 Versus FP8 Rollout
scenario: A team can train with BF16 using 80% memory utilization or FP8 using 55% memory utilization. FP8 is 12% faster but has shown occasional loss spikes. Evaluate whether to switch.
question: How would you evaluate switching from BF16 to FP8 when FP8 is 12% faster, lowers memory utilization from 80% to 55%, but has occasional loss spikes?
details:
  realistic_solution: The decision depends on stability and recovery, not speed alone. FP8 gives memory headroom and throughput, but loss spikes can waste entire runs or require fallback. A safe rollout uses layer fallback, loss-scaling telemetry, checkpoint comparison, and a staged experiment before full adoption.
  common_mistake: Choosing FP8 solely because it is faster and uses less memory.
  napkin_math: If FP8 is 12% faster in throughput, a 10-day run would take 10/1.12 = 8.93 days, saving about 1.07 days if no instability causes restarts or quality regression.
