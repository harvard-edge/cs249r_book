title: Global New 0018
scenario: 'You want to maximize the context window of an 8B model (16 GiB FP16) on a single V100.'
question: 'What maximum context length can an 8B FP16 model support on a single 32 GiB V100 after reserving memory for its KV cache?'
details:
  realistic_solution: 'First, calculate the memory left over after loading the model weights: 32 GiB VRAM - 16 GiB model = 16 GiB available. Next, compute the exact memory required for a single token''s KV cache by accounting for the number of layers (32), hidden size (4096), precision (FP16 = 2 bytes), and both Key and Value tensors: 2 x 32 x 4096 x 2 = 524,288 bytes per token. Finally, divide available memory by per-token cache: 16 x 1024^3 / 524,288 = 32,768 tokens maximum context.'
  common_mistake: |
    **The Pitfall:** Forgetting that the KV cache stores BOTH keys and values, omitting the factor of 2.
    **The Rationale:** Candidates often only account for the attention keys or treat the cache as a single tensor per layer.
    **The Consequence:** Artificially doubling the calculated token capacity, leading to unexpected OOMs during long context generation.
  napkin_math: |
    **Assumptions & Constraints:**
    - 32 GiB VRAM, 16 GiB weights.
    - 32 layers, 4096 hidden size, FP16 (2 bytes).

    **Calculations:**
    - Free VRAM = 32 GiB - 16 GiB = 16 GiB = 17,179,869,184 bytes.
    - Cache per token = 2 (K,V) * 32 (layers) * 4096 (hidden) * 2 bytes = 524,288 bytes.
    - Max tokens = 17,179,869,184 / 524,288 = 32,768 tokens.

    **Conclusion & Interpretation:**
    - **Result: 32,768 tokens max context (Memory-Bound)**. Memory is fully bound by KV cache capacity.
