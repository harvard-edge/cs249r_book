title: Global New 0018
scenario: You want to maximize the context window of an 8B model (16 GiB FP16) on a single V100 (32 GiB). The model has 32 layers and a hidden size of 4096.
question: What maximum context length can an 8B FP16 model support on a single 32 GiB V100 after reserving memory for its KV cache?
details:
  realistic_solution: 'First, calculate the memory left over after loading the model weights: 32 GiB VRAM - 16 GiB model = 16 GiB available. Next, compute the exact memory required for a single token''s KV cache by accounting for the number of layers (32), hidden size (4096), precision (FP16 = 2 bytes), and both Key and Value tensors: 2 \times 32 \times 4096 \times 2 = 524,288 bytes per token. Finally, divide available memory by per-token cache: 16 \times 1024^3 / 524,288 = 32,768 tokens maximum context.'
  common_mistake: |
    **The Pitfall:** Forgetting that the KV cache stores BOTH keys and values, omitting the factor of 2.
    **The Rationale:** Candidates often only account for the attention keys or treat the cache as a single tensor per layer.
    **The Consequence:** Artificially doubling the calculated token capacity, leading to unexpected OOMs during long context generation.
  napkin_math: |
    - Free VRAM = 32 GiB - 16 GiB = 16 GiB.
    - Cache per token = 2 (K,V) * 32 (layers) * 4096 (hidden) * 2 bytes (FP16) = 524,288 bytes (0.5 MiB).
    - Max tokens = 16 GiB / 524,288 bytes = 16 * 1024^3 / 524,288.
    - **Max tokens = 32,768 tokens.**
