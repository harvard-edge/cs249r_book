math_issues:
- 16GB VRAM is 16 GiB (17.18 * 10^9 bytes), which divided by 524,288 bytes yields 32,768 tokens, not 30,517. The calculation erroneously used SI units (10^9 bytes per GB) instead of base-2 (GiB), which is standard for memory constraints.
