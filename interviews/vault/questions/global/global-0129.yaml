title: The Power-Clock Anomaly
scenario: To save datacenter power, you underclock the GPU cores of an A100 cluster running Whisper (audio
  transcription) at batch size 1. You drop the core clock by 40% (1410 MHz -> 846 MHz), reducing peak
  TFLOPS by 40%. You expect a 40% drop in throughput. Surprisingly, throughput only drops by 1%, while
  GPU power consumption drops by 35%.
details:
  realistic_solution: The Whisper workload at batch size 1 has an extremely low arithmetic intensity (dominated
    by memory fetches for autoregressive decoding), placing it far to the left of the Roofline ridge point.
    It is entirely memory-bandwidth bound. The GPU ALUs spend the vast majority of their time idle, waiting
    for data from HBM. Lowering the core clock reduces the horizontal compute ceiling of the Roofline
    model but leaves the sloped memory bandwidth ceiling unchanged. Because the workload's operating point
    is on the slope, dropping the compute ceiling has almost zero effect on performance. However, power
    consumption scales roughly with voltage^2 * frequency, resulting in massive power savings with no
    latency penalty.
  common_mistake: Assuming workload throughput scales linearly with core clock frequency (compute capacity)
    for all deep learning tasks.
  napkin_math: 'A100 Ridge Point = 312 TFLOPS / 2 TB/s = 156 FLOPs/Byte.

    Whisper BS=1 Decode Arithmetic Intensity ≈ 2 FLOPs/Byte.

    2 << 156. The workload is completely memory-bound.

    Underclocked Ridge Point = (312 * 0.6) / 2 TB/s = 93 FLOPs/Byte.

    2 << 93. The workload remains completely memory-bound, so throughput is unaffected.'
