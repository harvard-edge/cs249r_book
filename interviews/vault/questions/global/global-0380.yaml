title: Evaluate Centralized Versus Local Preprocessing
scenario: A vision product can preprocess images centrally in cloud, locally on mobile, or at an edge gateway. Cloud preprocessing is easiest to update, mobile preserves privacy, and edge reduces uplink.
question: How would you evaluate cloud, mobile, and edge preprocessing for a privacy-sensitive real-time vision workflow?
details:
  realistic_solution: Mobile or edge preprocessing is preferable because raw images need not leave the local environment and latency is lower. Cloud is easiest to update but creates privacy and uplink costs. The choice depends on device power and operator coverage; edge is often the best compromise when mobile is thermally constrained.
  common_mistake: |
    **The Pitfall:** Choosing cloud because it is operationally convenient while ignoring privacy and uplink constraints.
    **The Rationale:** Cloud architectures are standard for web backends, leading developers to reflexively centralize processing without doing the math on video uplink costs.
    **The Consequence:** The system becomes unviable due to saturated network links, high latency, and severe privacy compliance risks.
  napkin_math: |
    - Raw frames = 2 MB.
    - Workflow rate = 10 frames/s.
    - Cloud preprocessing uplink = 2 MB * 10 = 20 MB/s (160 Mbps).
    - **This uplink is often unsustainable for mobile/edge networks, strongly favoring local preprocessing.**
