title: Evaluate Centralized Versus Local Preprocessing
scenario: A vision product can preprocess images centrally in cloud, locally on mobile,
  or at an edge gateway. Cloud preprocessing is easiest to update, mobile preserves
  privacy, and edge reduces uplink. Evaluate which option fits a privacy-sensitive
  real-time workflow.
question: How would you evaluate cloud, mobile, and edge preprocessing for a privacy-sensitive
  real-time vision workflow?
details:
  realistic_solution: Mobile or edge preprocessing is preferable because raw images
    need not leave the local environment and latency is lower. Cloud is easiest to
    update but creates privacy and uplink costs. The choice depends on device power
    and operator coverage; edge is often the best compromise when mobile is thermally
    constrained.
  common_mistake: Choosing cloud because it is operationally convenient while ignoring
    privacy and uplink constraints.
  napkin_math: If raw frames are 2 MB and the workflow sends 10 frames/s, cloud preprocessing
    requires 20 MB/s uplink before compression, ROI cropping, or feature extraction.
