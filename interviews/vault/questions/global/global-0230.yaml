title: NaN Gradients Appearing After Learning Rate Warmup
scenario: Your distributed training run produces NaN gradients 200 steps into training, right after learning rate warmup completes and LR reaches its peak. Loss was decreasing normally during warmup. The model uses mixed-precision training with FP16 forward/backward and FP32 optimizer.
question: What likely causes NaN gradients right after LR warmup in FP16 mixed-precision training, and how would you fix it?
details:
  realistic_solution: "Root cause: FP16 overflow during the backward pass. During warmup, small LR produces small gradients that stay within FP16 range (max ~65504). At peak LR, gradient magnitudes increase and exceed FP16 dynamic range, producing Inf -> NaN propagation. The loss scaler should catch this, but may be too aggressive. Fixes: (1) Reduce initial loss scale or increase scale_growth_interval. (2) Enable gradient clipping before the optimizer step. (3) Use BF16 instead of FP16 — BF16 has the same exponent range as FP32, eliminating overflow. (4) Reduce peak LR. (5) Extend warmup period for gentler LR ramp."
  common_mistake: |
    **The Pitfall:** Blaming random hardware errors, cosmic rays, or bad training data batches.
    **The Rationale:** NaNs appearing suddenly after smooth training often feel like a random external disruption.
    **The Consequence:** Wasting time scrubbing data or changing hardware nodes when the issue is fundamentally tied to the deterministic LR schedule and FP16 limits.
  napkin_math: |
    * FP16 maximum representable value = 65,504.
    * If a gradient magnitude hits 70,000 at peak LR, it overflows to Inf.
    * One Inf value in a sum or AllReduce operation propagates to NaN.
    * BF16 maximum value = 3.4e38 (same as FP32).
    * **Switching to BF16 completely eliminates this overflow vector.**
