title: NaN Gradients Appearing After Learning Rate Warmup
scenario: Your distributed training run produces NaN gradients 200 steps into training, right after learning
  rate warmup completes and LR reaches its peak. Loss was decreasing normally during warmup. The model
  uses mixed-precision training with FP16 forward/backward and FP32 optimizer.
details:
  realistic_solution: 'Root cause: FP16 overflow during the backward pass. During warmup, small LR produces
    small gradients that stay within FP16 range (max ~65504). At peak LR, gradient magnitudes increase
    and exceed FP16 dynamic range, producing Inf → NaN propagation. The loss scaler should catch this,
    but may be too aggressive. Fixes: (1) Reduce initial loss scale or increase scale_growth_interval.
    (2) Enable gradient clipping before the optimizer step. (3) Use BF16 instead of FP16 — BF16 has the
    same exponent range as FP32, eliminating overflow. (4) Reduce peak LR. (5) Extend warmup period for
    gentler LR ramp.'
  common_mistake: Blaming hardware errors or data corruption. NaN after LR warmup is almost always a numerical
    stability issue triggered by the sudden transition to peak learning rate.
  napkin_math: FP16 max = 65504. If a gradient hits 70000, it becomes Inf. One Inf in a sum → NaN. BF16
    max = 3.4e38, same as FP32 — eliminates this class of bug entirely.
