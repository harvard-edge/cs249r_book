title: Evaluating Compute-Communication Overlap in MoE Layers
scenario: An Expert Parallel MoE layer runs on 8 H100 GPUs, requiring a 2 GB AllToAll
  exchange per GPU. The NVLink bidirectional bandwidth is 900 GB/s, and the expert
  compute phase takes 4 ms.
question: Evaluate whether dividing the workload into 4 overlapping micro-steps completely
  hides the AllToAll communication latency behind compute.
details:
  realistic_solution: 'The AllToAll sends/receives 2 * (7/8) = 1.75 GB per GPU. At
    900 GB/s, the transfer takes 1.75 / 900 = 1.94 ms total. Without overlap, time
    is 1.94 + 4 = 5.94 ms. With 4 micro-steps, each comms step is ~0.485 ms and compute
    is 1 ms. Because comms must finish before the corresponding compute starts, there
    is a pipeline bubble: 0.485 ms start delay + 4 ms total compute = 4.485 ms. Overlap
    is achieved, but the 0.485 ms startup bubble cannot be perfectly hidden.'
  common_mistake: Failing to account for the pipeline startup and drain bubbles, assuming
    the runtime simply equals max(compute, comms).
  napkin_math: 1.75 GB / 900 GB/s = 1.94 ms total comms.
