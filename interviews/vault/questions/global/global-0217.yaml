title: Mixed-Precision Training Memory Budget
scenario: You want to train a 3B-parameter model with Adam optimizer in mixed precision (FP16 weights + FP32 optimizer states).
question: How much GPU memory is needed for mixed-precision Adam model state for the 3B model, and does it fit on one A100-80GB?
details:
  realistic_solution: FP16 weights: 3B * 2 = 6 GB. FP16 gradients: 3B * 2 = 6 GB. FP32 master weights: 3B * 4 = 12 GB. FP32 momentum (Adam): 3B * 4 = 12 GB. FP32 variance (Adam): 3B * 4 = 12 GB. Total model state = 48 GB. This leaves 80 - 48 = 32 GB for activations, KV cache, and framework overhead. With batch size 8, seq_len 2048, activation checkpointing is likely needed. Per-parameter cost: 48 GB / 3B = 16 bytes/param — the well-known Adam mixed-precision constant.
  common_mistake: |
    **The Pitfall:** Only counting the FP16 weights (6 GB) and assuming the model fits easily with plenty of room for activations.
    **The Rationale:** Candidates often forget that the Adam optimizer in mixed precision requires maintaining FP32 master weights, momentum, and variance.
    **The Consequence:** The training job immediately OOMs because the model state alone consumes drastically more memory than the base FP16 weights.
  napkin_math: |
    *   **FP16 Weights & Gradients:** 3B * 2 + 3B * 2 = 12 GB.
    *   **FP32 Master Weights, Momentum, Variance:** 3B * 4 * 3 = 36 GB.
    *   **Total Model State:** 12 + 36 = **48 GB** (or 16 bytes/param).
    *   **Available VRAM:** 80 GB - 48 GB = **32 GB** remaining.
    *   **Conclusion:** It fits on an A100-80GB, leaving 32 GB for activations and KV cache.
