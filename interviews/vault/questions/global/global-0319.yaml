title: Global New 0020
scenario: A 40GB KV cache must be offloaded from an A100's HBM to host CPU RAM via PCIe Gen4. Alternatively,
  it could be sent to a peer A100 via NVLink. Calculate the latency difference between these two interconnect
  pathways for the full 40GB transfer.
question: "How would you calculate the latency difference between these two interconnect pathways for the full 40GB transfer?"
details:
  realistic_solution: 'To find the latency penalty of CPU offloading versus peer-GPU distribution, calculate
    the transfer time over PCIe Gen4 (32 GB/s) and over NVLink. A100 NVLink provides 600 GB/s bidirectional
    bandwidth, which equals 300 GB/s per direction for a point-to-point transfer. PCIe Gen4 time: 40 GB
    / 32 GB/s = 1.25 seconds. NVLink time: 40 GB / 300 GB/s = 0.133 seconds. Latency difference = 1.25
    - 0.133 = 1.117 seconds. This highlights the immense value of high-speed inter-GPU links.'
  common_mistake: Using the A100's internal HBM memory bandwidth (2.0 TB/s) instead of the NVLink interconnect
    bandwidth (600 GB/s) for the peer-to-peer transfer calculation.
  napkin_math: PCIe Gen4 time = 40GB / 32GB/s = 1.25 seconds. NVLink time = 40GB / 300GB/s (unidirectional)
    = 0.133 seconds. Latency difference = 1.25 - 0.133 = 1.117 seconds.
