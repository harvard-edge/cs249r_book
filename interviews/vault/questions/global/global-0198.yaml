title: The Regional Model Routing Decision
scenario: You serve a global chat application. US and EU regions have 8xH100 clusters running a 70B model (300ms TTFT, high quality). Your new Asia-Pacific region only has 2xH100, which can only run a 13B model (80ms TTFT, lower quality). 40% of your users are in Asia-Pacific.
question: Should all users get the same model, or should Asian users get the smaller, faster model? Evaluate the tradeoffs.
details:
  realistic_solution: 'Option 1: Same model (70B) for all — route Asian users to US. TTFT for Asian users: 150ms RTT + 300ms prefill = 450ms. Quality: identical to US/EU users. Cost: no additional infra, but cross-Pacific bandwidth costs for 40% of traffic. Option 2: Regional models — 70B in US/EU, 13B in Asia. TTFT for Asian users: 10ms RTT + 80ms prefill = 90ms. Quality: lower (13B vs 70B, roughly 85% as good on benchmarks). Cost: 2\times H100 in Asia (~$7K/month). Option 3: Hybrid — route easy queries to 13B locally, hard queries to 70B in US. TTFT: 90ms for easy (70% of queries), 450ms for hard (30%). Average TTFT: 0.7\times 90 + 0.3\times 450 = 198ms. Quality: ~95% of always-70B (easy queries are equally good on both models). Recommendation: Option 3 (hybrid routing) — best balance of latency, quality, and cost. The 5\times latency improvement for 70% of queries with negligible quality loss is the winning tradeoff. Implement a lightweight query classifier (runs in <5ms) to route between models.'
  common_mistake: |
    **The Pitfall:** Defaulting to "all users must get the same model for fairness" without quantifying the actual quality-latency tradeoff.
    **The Rationale:** Candidates ignore the massive network round-trip time (RTT) penalty that degrades the experience more than using a smaller model.
    **The Consequence:** Delivering a terrible user experience (450ms+ latency) to 40% of users in the name of architectural uniformity.
  napkin_math: |
    - Option 1 (centralized 70B): TTFT = 450ms for Asia. Average global TTFT = 0.6 * 300 + 0.4 * 450 = 360ms.
    - Option 2 (regional 13B): TTFT = 90ms for Asia. Average = 0.6 * 300 + 0.4 * 90 = 216ms.
    - Option 3 (hybrid): TTFT = 198ms for Asia. Average = 0.6 * 300 + 0.4 * 198 = 259ms.
    - **Option 3 dominates: drastically reduces latency with negligible quality loss.**
