title: The Regional Model Routing Decision
scenario: You serve a global chat application. US and EU regions have large clusters running a 70B model. Your new Asia-Pacific region only has capacity to run a 13B model. 40% of your users are in Asia-Pacific.
question: "Should all users get the same model, or should Asian users get the smaller, faster model? Evaluate the tradeoffs."
details:
  realistic_solution: 'Option 1: Route to US (70B). TTFT: 150ms RTT + 300ms prefill = 450ms. Option 2: Regional (13B). TTFT: 10ms RTT + 80ms prefill = 90ms. Lower quality. Option 3: Hybrid. Route easy queries to 13B locally, hard queries to 70B in US. Average TTFT: 198ms. Quality: ~95% of always-70B. Recommendation: Hybrid routing offers the best balance of latency, quality, and cost.'
  common_mistake: |
    **The Pitfall:** Defaulting to "all users must get the same model for fairness."
    **The Rationale:** Candidates ignore the massive network round-trip time (RTT) penalty that degrades the experience more than using a smaller model.
    **The Consequence:** Delivering a terrible user experience (450ms+ latency) to 40% of users in the name of architectural uniformity.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 40% APAC users.
       - 70B TTFT = 300ms (US). 13B TTFT = 80ms (APAC).
       - Cross-Pacific RTT = 150ms.
    2. **Calculations:**
       - Opt 1 (centralized 70B): APAC TTFT = 450ms. Global Avg = 360ms.
       - Opt 2 (regional 13B): APAC TTFT = 90ms. Global Avg = 216ms.
       - Opt 3 (hybrid): APAC TTFT = 198ms. Global Avg = 259ms.
    3. **Conclusion & Interpretation:**
       - **Result: Hybrid Routing Dominates.** Drastically reduces tail latency with negligible quality loss.
