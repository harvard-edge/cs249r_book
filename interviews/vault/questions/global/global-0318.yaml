title: Global New 0019
scenario: You are sizing a cluster to train a 65B parameter model using mixed precision (Adam optimizer)
  on A100 80GB GPUs. Calculate the total memory needed for optimizer states, gradients, and parameters,
  and determine the minimum number of GPUs required.
details:
  realistic_solution: 'Standard mixed-precision training requires 16 bytes of memory per parameter: 2
    bytes for FP16 weights, 2 bytes for FP16 gradients, 4 bytes for FP32 weights, 4 bytes for FP32 momentum,
    and 4 bytes for FP32 variance. Multiply the parameter count by 16 bytes, then divide by GPU capacity.'
  common_mistake: Only accounting for the 2-byte FP16 weights and ignoring the massive footprint of the
    FP32 master weights and Adam optimizer states.
  napkin_math: Memory per param = 2+2+4+4+4 = 16 bytes. Total Memory = 65B * 16 bytes = 1040 GB. GPUs
    needed = 1040 GB / 80 GB = 13 GPUs. (In practice, 16 for standard parallel limits).
