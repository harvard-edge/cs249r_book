title: Global New 0019
scenario: You are sizing a cluster to train a 65B parameter model using mixed precision (Adam optimizer) on A100 80GB GPUs.
question: How would you calculate the total memory needed for optimizer states, gradients, and parameters, and determine the minimum number of GPUs required?
details:
  realistic_solution: "Standard mixed-precision training requires 16 bytes of memory per parameter: 2 bytes for FP16 weights, 2 bytes for FP16 gradients, 4 bytes for FP32 weights, 4 bytes for FP32 momentum, and 4 bytes for FP32 variance. Multiply the parameter count by 16 bytes, then divide by GPU capacity."
  common_mistake: |
    **The Pitfall:** Only accounting for the 2-byte FP16 weights and ignoring the massive footprint of the optimizer.
    **The Rationale:** Assuming the "model size" dictates the VRAM requirements.
    **The Consequence:** Drastically under-provisioning the cluster, leading to immediate OOM errors upon initializing the training loop.
  napkin_math: |
    * Memory per parameter: 2 (FP16 weights) + 2 (FP16 grads) + 4 (FP32 weights) + 4 (FP32 momentum) + 4 (FP32 variance) = 16 bytes.
    * Total Memory: 65 billion parameters * 16 bytes/param = 1,040 GB.
    * Minimum GPUs: 1,040 GB / 80 GB = 13 GPUs.
    * **In practice, at least 16 GPUs are required to allow for parallel limits and activation memory.**
