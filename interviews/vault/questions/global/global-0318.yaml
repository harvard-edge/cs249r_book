title: Global New 0019
scenario: You are sizing a cluster to train a 65B parameter model using mixed precision (Adam optimizer).
question: How would you calculate the total memory needed for optimizer states, gradients, and parameters, and determine the minimum number of GPUs required?
details:
  realistic_solution: "A standard Adam mixed-precision pipeline commands 16 bytes per parameter. Apply ZeRO Stage 1 or 2 to partition these states to prevent trivial OOMs on large models."
  common_mistake: |
    **The Pitfall:** Only accounting for the 2-byte FP16 weights and ignoring the massive footprint of the optimizer.
    **The Rationale:** Assuming the "model size" dictates the VRAM requirements.
    **The Consequence:** Drastically under-provisioning the cluster, leading to immediate OOM errors upon initializing the training loop.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 65B parameters
       - Mixed-precision Adam (16 bytes/param: 2B FP16 weight, 2B FP16 grad, 4B FP32 weight, 4B FP32 mom, 4B FP32 var)
    2. **Calculations:**
       - 65B * 16 bytes = 1,040 GB total footprint
       - Minimum 80GB GPUs: 1,040 GB / 80 GB = 13 GPUs
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Capacity Bound**
