title: Optimizing Arithmetic Intensity
scenario: During a model profiling session, you notice a sequence of element-wise operations (e.g., adding a bias then applying ReLU) is taking a disproportionate amount of time despite having very few FLOPs.
question: What is the most effective way to improve the arithmetic intensity of the bias-plus-ReLU element-wise sequence?
details:
  realistic_solution: Element-wise operations have inherently low arithmetic intensity. Performing kernel fusion combines these operations into a single GPU kernel, allowing data to be kept in SRAM/registers. This drastically reduces round-trips to global memory (HBM), increasing effective arithmetic intensity and overall performance.
  common_mistake: |
    **The Pitfall:** Believing quantization automatically fixes all performance issues.
    **The Rationale:** Assuming low arithmetic intensity is always solved by shrinking data types.
    **The Consequence:** Applying complex INT8 quantization to element-wise layers which yields suboptimal improvements compared to simple kernel fusion.
  napkin_math: |
    - Unfused (Bias + ReLU) on 100 MB tensor:
      - Bias: Read 100 MB, Write 100 MB.
      - ReLU: Read 100 MB, Write 100 MB.
      - Total = 400 MB. Time on A100 (2.0 TB/s) = 400 MB / 2.0 TB/s = 0.2 ms.
    - Fused Kernel:
      - Read 100 MB, apply Bias+ReLU in registers, Write 100 MB.
      - Total = 200 MB. Time = 200 MB / 2.0 TB/s = **0.1 ms**.
    - **Result:** Fusing halves HBM traffic and speeds up execution 2x.
  options:
  - Quantize the model to INT8 to reduce the compute time of the element-wise operations.
  - Perform kernel fusion to combine the operations into a single kernel, reducing reads and writes to global memory.
  - Increase the batch size to artificially inflate the FLOP count without changing memory accesses.
  - Move the element-wise operations to the CPU to free up GPU tensor core resources.
  correct_index: 1
