title: Optimizing Arithmetic Intensity
scenario: During a model profiling session, you notice a sequence of element-wise operations (e.g., adding
  a bias then applying ReLU) is taking a disproportionate amount of time despite having very few FLOPs.
  What is the most effective way to improve the arithmetic intensity of this sequence?
details:
  realistic_solution: Element-wise operations have inherently low arithmetic intensity. Performing kernel
    fusion combines these operations into a single GPU kernel, allowing data to be kept in SRAM/registers.
    This drastically reduces round-trips to global memory (HBM), increasing effective arithmetic intensity
    and overall performance.
  common_mistake: Believing that quantization automatically fixes all performance issues, without realizing
    that element-wise operations are heavily memory-bound and quantization might not alleviate the memory
    access overhead as effectively as fusion.
  napkin_math: 'An unfused Bias + ReLU on a 100MB FP16 tensor requires 2 round-trips to HBM: Read 100MB,
    add bias, write 100MB; read 100MB, apply ReLU, write 100MB. Total = 400MB. On an A100 (2.0TB/s), this
    takes 400MB / 2.0TB/s = 0.2ms. Fusing them into one kernel requires 1 read + 1 write = 200MB. Time
    drops to 0.1ms. Fusing halves HBM traffic and speeds up execution 2x.'
  options:
  - Quantize the model to INT8 to reduce the compute time of the element-wise operations.
  - Perform kernel fusion to combine the operations into a single kernel, reducing reads and writes to
    global memory.
  - Increase the batch size to artificially inflate the FLOP count without changing memory accesses.
  - Move the element-wise operations to the CPU to free up GPU tensor core resources.
  correct_index: 1
