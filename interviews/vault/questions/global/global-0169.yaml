title: The Power Capping Headroom Paradox
scenario: Your inference cluster serves a ResNet-50 model at 10,000 QPS with an average GPU utilization of 45%. To cut electricity costs, you apply a strict 200W power cap on the 400W GPUs. Suddenly, p99 latency spikes from 50ms to over 500ms, even though average GPU utilization remains at 45% and average power draw is only 150W.
question: Why does a 200W power cap cause p99 latency to jump above 500ms even though average utilization is 45% and power is 150W?
details:
  realistic_solution: 'The root cause is the suppression of transient power spikes needed to clear bursty inference queues. Inference traffic is rarely perfectly uniform; it arrives in bursts. To process a sudden burst of requests and maintain low p99 latency, the GPU rapidly scales up its clock frequency, causing transient power spikes that can easily hit 300W+ for a few milliseconds. By enforcing a strict hardware power cap of 200W, the GPU is prevented from boosting its frequency during these micro-bursts. The service rate drops during the exact moments the queue is longest. According to queuing theory, failing to clear the queue quickly results in compounding wait times, massively inflating p99 latency, even if the steady-state averages remain low.'
  common_mistake: |
    **The Pitfall:** Assuming that because the average power draw (150W) is below the cap (200W), the power cap should have no effect on performance.
    **The Rationale:** Candidates frequently rely on steady-state averages and ignore the bursty nature of real-world inference traffic.
    **The Consequence:** Deploying power caps that severely degrade p99 latency SLAs during normal traffic micro-bursts.
  napkin_math: |
    **Assumptions & Constraints:**
    - Arrival Rate (lambda): 10,000 QPS. Average Power: 150W.
    - Uncapped Service Rate (mu): 20,000 QPS (Power bursts to 300W+ allowed).
    - Capped Service Rate (mu): 11,000 QPS (Power strictly limited to 200W during bursts).

    **Calculations:**
    - Uncapped Wait Time (M/M/1): 1 / (20000 - 10000) = 0.1 ms avg queue delay.
    - Capped Wait Time (M/M/1): 1 / (11000 - 10000) = 1.0 ms avg queue delay.

    **Conclusion & Interpretation:**
    - **Result: 10x Queue Delay (Queuing-Bound)**. The rigid 200W cap destroys burst service rates, increasing base queue delay 10x and pushing p99 exponentially higher.
