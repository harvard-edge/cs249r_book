title: Diagnosing Prefill-Decode Interference
scenario: Your LLM inference server shows bimodal latency: most requests complete at p50=80ms per token but p99=450ms. GPU utilization is consistently 85%. Logs show that high-latency events correlate with bursts of new long-context requests arriving while short decode requests are in-flight.
question: What likely causes the p99 token latency spikes when long prefills arrive during short decodes, and how would you mitigate it?
details:
  realistic_solution: 'This is prefill-decode interference. Long-context prefill operations are compute-heavy and monopolize SMs, starving concurrent decode requests of compute time. Solutions: (1) Disaggregate prefill and decode onto separate GPU pools — prefill GPUs optimize for throughput, decode GPUs optimize for latency. (2) Chunked prefill: break long prefills into fixed-size chunks interleaved with decode steps, bounding worst-case decode latency. (3) Priority scheduling: preempt prefill to service decode requests at SLA boundaries. Splitwise and DistServe architectures address this systematically.'
  common_mistake: |
    **The Pitfall:** Blaming GPU underutilization or insufficient batching.
    **The Rationale:** Candidates look at standard metrics and assume a general performance issue rather than a structural interference problem between memory-bound and compute-bound phases.
    **The Consequence:** Attempting to fix the issue by increasing batch size, which actually exacerbates the prefill-decode interference.
  napkin_math: |
    - Prefill for 4K tokens: attention requires 4 * N^2 * d FLOPs per head per layer.
    - For N=4096, d=128: 4 * 16.7M * 128 = ~8.6 billion FLOPs per head per layer.
    - **A single prefill blocks SMs for tens or hundreds of milliseconds, causing concurrent decode stalls.**
