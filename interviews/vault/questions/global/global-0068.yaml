title: Multi-PB Distributed Streaming Dataloader
scenario: You are designing a streaming data loader for a 16,384 GPU cluster training on a 20 PB multimodal
  dataset stored in S3. Each GPU processes 50 MB/s of data (global throughput 819 GB/s). You must ensure
  global data shuffling every epoch without downloading the 20 PB to local NVMe drives. S3 latency is
  ~80ms to first byte. You must balance read throughput, S3 API limits, and randomization quality.
details:
  realistic_solution: 'Implement a two-tiered hierarchical shuffle to trade perfect theoretical randomness
    for high-throughput IO. Step 1 (Offline): Pack the dataset into 256 MB coarse-grained chunks (tar/TFRecord
    files) stored sequentially in S3. Step 2 (Online/Coordinator): A central CPU coordinator maintains
    a globally shuffled list of chunk IDs and assigns them dynamically to GPU nodes using a work-stealing
    queue to prevent stragglers. Step 3 (Node-local): Each node''s CPU fetches assigned chunks via streaming
    GETs, maintaining a local memory buffer of fetched chunks. A background thread performs a fine-grained
    reservoir shuffle within this local buffer before yielding batches to the GPU. This minimizes S3 API
    calls, entirely hides the 80ms latency via large sequential reads, and provides pseudo-global randomness
    that has been empirically shown to maintain model convergence quality.'
  common_mistake: Attempting true global random sampling by having each GPU request individual items directly
    from S3, resulting in billions of small GET requests.
  napkin_math: 'Global throughput: 16,384 GPUs * 50 MB/s = 819,200 MB/s (~819 GB/s). With 256 MB chunks,
    the cluster makes 819,200 / 256 = 3,200 S3 GET requests per second globally. S3 limits are 5,500 GETs
    per prefix per second; by distributing chunks across 16 prefixes, we get 88,000 GETs/sec capacity,
    staying well below limits. Local buffer: 50 MB/s * 200 seconds of buffer = 10 GB RAM per GPU, which
    easily fits in host memory.'
