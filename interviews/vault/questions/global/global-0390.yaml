title: Incomplete Fault-Tolerance Tradeoff
scenario: A team wants to reduce checkpointing overhead for training and personalization.
  They provide checkpoint sizes but omit failure rate, restart time, write bandwidth,
  acceptable data loss, and user impact of stale state.
question: What missing reliability information is needed before reducing checkpoint
  frequency for training and personalization systems?
details:
  realistic_solution: You need failure rate, restart time, write bandwidth, RPO, RTO,
    cost of lost progress, user impact of stale state, and storage endurance. Checkpoint
    size alone gives write cost but not the optimal interval. Reducing frequency may
    save I/O while increasing lost work and user-visible regressions.
  common_mistake: Reducing checkpoint frequency because writes are expensive without
    quantifying failure risk or recovery objectives.
  napkin_math: If failures occur at random within long runs, moving from a 1-hour
    to a 5-hour checkpoint interval increases average lost progress per failure from
    about 0.5 hours to 2.5 hours.
