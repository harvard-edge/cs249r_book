title: Static Calibration Distribution Shift
scenario: A transformer translation model runs W8A8 static PTQ at 200 QPS. The static calibration was done on a dataset of short conversational sentences (avg 10 tokens). In production, the model receives complex legal documents (avg 500 tokens). Latency is optimal (40ms), but the BLEU score on production data drops by 15 points due to severe activation clipping.
question: Why did static W8A8 PTQ lose 15 BLEU points on 500-token legal documents, and how would you fix it?
details:
  realistic_solution: 'The architecture suffers from calibration distribution mismatch. In transformers, activation magnitudes (especially in attention layers and residual streams) scale with sequence length. Static ranges `[-max, max]` calculated on 10-token sequences are far too narrow for 500-token sequences, leading to severe clipping of valid activations. The solution is twofold: 1) Re-calibrate the static PTQ using a representative dataset that matches production sequence lengths (legal documents), and 2) If variance remains high, shift the architecture from Static PTQ to Dynamic Activation Quantization, where the scale/zero-point for activations are calculated on-the-fly per token at runtime, trading a slight compute overhead for robustness against sequence length variance.'
  common_mistake: |
    **The Pitfall:** Increasing the number of calibration samples of the same short-sentence dataset to fix the issue.
    **The Rationale:** Practitioners think calibration just needs "more data" to be accurate, missing the structural reality that transformer activation magnitudes scale with sequence length.
    **The Consequence:** Endless recalibration loops that fail to restore BLEU scores, eventually leading to abandoning quantization entirely.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Calibration avg seq length = 10. Production avg seq length = 500.
       - Transformer activation magnitudes scale with sequence length.
    2. **Calculations:**
       - Assume max activation for length 10 = 15.0. Static scale = 15.0 / 127 = 0.118.
       - For length 500, max activation hits 60.0.
       - Quantized value with static scale: 60.0 / 0.118 = 508. This clips to INT8 max (127).
       - Dequantized value = 127 * 0.118 = 15.0.
       - Clipping Error = 60.0 - 15.0 = 45.0 (75% error).
    3. **Conclusion & Interpretation:**
       - **Result: Precision-Bound.** An error of 75% injected into the residual stream per layer destroys representation, manifesting as a 15-point BLEU drop.
