title: Long-Haul InfiniBand Buffer Credit Exhaustion
scenario: To utilize stranded power, a cluster is split across two data centers 20km apart, connected via dark fiber and DWDM. InfiniBand NDR switches connect the sites. The optical links sync perfectly at 400Gbps with zero physical errors. However, maximum point-to-point RDMA bandwidth between the sites hard-caps at ~16Gbps (2 GB/s), severely bottlenecking pipeline parallelism.
question: "Why does RDMA over the 20 km 400 Gbps dark-fiber link cap at about 16 Gbps despite zero optical errors?"
details:
  realistic_solution: "The root cause is link-level buffer credit starvation due to an unadjusted Bandwidth-Delay Product (BDP). InfiniBand uses credit-based flow control; a sender can only transmit if it has credits representing available buffer space on the receiver. The default switch buffer allocation is tuned for short 3-30 meter DAC/AOC cables inside a single data center. Over 20km, the Round Trip Time (RTT) increases dramatically. The sender exhausts its small pool of credits in microseconds and must stop transmitting while waiting for acknowledgments to travel 20km back. The solution is configuring long-haul (extended) buffers on the WAN switch ports."
  common_mistake: |
    **The Pitfall:** Assuming optical signal degradation (high BER) or DWDM protocol translation overhead is causing the bandwidth drop.
    **The Rationale:** Network engineers often blame physical layer issues for massive throughput drops on long-haul links.
    **The Consequence:** Unnecessary fiber troubleshooting while missing the actual transport-layer flow control limitation.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Link speed = 400Gbps = 50GB/s. Distance = 20km (RTT = 200µs).
    2. **Calculations:**
       - Bandwidth-Delay Product (BDP) = 50GB/s × 200µs = 10MB.
    3. **Conclusion & Interpretation:**
       - **Result: Window-Bound. If the default switch port buffer is only 500KB, max throughput = 500KB / 200µs = 2.5GB/s (20Gbps), matching the bottleneck.**
