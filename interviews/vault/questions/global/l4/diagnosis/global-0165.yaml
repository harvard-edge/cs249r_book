id: global-0165
title: The Federated Battery Drain
topic: federated-learning
status: published
provenance: imported
scenario: You deploy a Federated Learning (FL) system to 50,000 mobile devices. To save user battery life,
  you aggressively prune the model, reducing the update payload from 50MB to 5MB. To maintain convergence
  with the pruned model, you increase the sync frequency from once every 100 local steps to once every
  10 local steps. Battery drain per FL round increases by 250%.
details:
  realistic_solution: The root cause is the Radio Resource Control (RRC) tail energy penalty inherent
    to cellular networks (4G/5G). When a device transmits data, the cellular radio enters a high-power
    active state. After transmission finishes, the radio remains in a high-power 'tail' state for 10-15
    seconds before dropping back to idle, to avoid the latency of waking up for subsequent packets. By
    reducing the payload size by 10x but increasing the frequency by 10x, the total bytes transferred
    remains the same, but you incur the 10-15 second RRC tail energy penalty 10 times more often. The
    energy spent idling in the high-power tail state completely dominates the battery drain.
  common_mistake: Assuming network energy consumption is strictly proportional to the number of bytes
    transferred over the cellular network.
  napkin_math: 'Active radio power = 2.5 W. RRC tail: radio stays at 1.2 W for ~4 seconds after each transmission
    = 4.8 J per tail event. Original schedule: 1 transfer of 50 MB every 100 steps. Active time at 10
    MB/s = 5 s → 12.5 J active + 4.8 J tail = 17.3 J per 100 steps. New schedule: 10 transfers of 5 MB
    every 10 steps. Each transfer: 0.5 s active → 1.25 J + 4.8 J tail = 6.05 J. Total for 10 transfers
    = 60.5 J per 100 steps. Energy increase: 60.5 / 17.3 = 3.5× (250% increase). The tail energy (48 J
    total) now dominates, accounting for 79% of the new energy budget despite total bytes transferred
    remaining constant. The lesson: on cellular networks, transmission frequency matters more than payload
    size.'
