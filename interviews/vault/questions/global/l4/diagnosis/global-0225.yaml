schema_version: 1
id: global-0225
title: Diagnosing Prefill-Decode Interference
topic: latency-decomposition
status: published
provenance: imported
scenario: 'Your LLM inference server shows bimodal latency: most requests complete at p50=80ms per token
  but p99=450ms. GPU utilization is consistently 85%. Logs show that high-latency events correlate with
  bursts of new long-context requests arriving while short decode requests are in-flight.'
details:
  realistic_solution: 'This is prefill-decode interference. Long-context prefill operations are compute-heavy
    and monopolize SMs, starving concurrent decode requests of compute time. Solutions: (1) Disaggregate
    prefill and decode onto separate GPU pools — prefill GPUs optimize for throughput, decode GPUs optimize
    for latency. (2) Chunked prefill: break long prefills into fixed-size chunks interleaved with decode
    steps, bounding worst-case decode latency. (3) Priority scheduling: preempt prefill to service decode
    requests at SLA boundaries. Splitwise and DistServe architectures address this systematically.'
  common_mistake: Blaming GPU underutilization or insufficient batching. The real issue is prefill (compute-bound,
    long) stealing GPU cycles from decode (memory-bound, latency-sensitive).
  napkin_math: 'Prefill for 4K tokens: attention requires 4 × N² × d FLOPs per head per layer. For N=4096,
    d=128, this is 4 × 16.7M × 128 = ~8.6 billion FLOPs per head per layer. Summed across heads and layers,
    a single prefill can block SMs for tens or hundreds of milliseconds, causing decode stalls.'
