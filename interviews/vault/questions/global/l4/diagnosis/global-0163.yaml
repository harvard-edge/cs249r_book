schema_version: 1
id: global-0163
title: The Overclocking Energy Trap
topic: power-budgeting
status: published
provenance: imported
scenario: Your team is training a 100B parameter model on 512 A100 GPUs. To meet a deadline, the infrastructure
  team applies a 15% GPU frequency boost (overclock). The training time successfully decreases from 30
  days to 26 days. However, the total energy consumed for the run (in kWh) unexpectedly increases by nearly
  40%.
details:
  realistic_solution: 'The root cause lies in the CMOS power equation: Dynamic Power (P) = α · C · V²
    · f. To achieve a 15% increase in frequency (f), the GPU must operate at a higher voltage (V) to maintain
    stability. Because power scales linearly with frequency but *quadratically* with voltage, the dynamic
    power draw increases cubically. Furthermore, the higher power dissipation increases the silicon temperature,
    which exponentially increases the static (leakage) power. Total energy is Power × Time. Even though
    the time decreased to 0.86x, the total power draw increased to ~1.6x, resulting in a net increase
    in total energy consumed. To optimize perf/watt, GPUs actually need to be slightly underclocked, not
    overclocked.'
  common_mistake: Assuming energy consumption scales linearly with training time, so a shorter run should
    use less energy.
  napkin_math: 'Original: f=1.0, V=1.0 -> P=1.0. Time = 30 days. Energy = 1.0 × 30 = 30 units. Overclocked:
    f=1.15, requiring V=1.12 to be stable. New Dynamic Power = 1.12² × 1.15 ≈ 1.44x. Add 15% increase
    in leakage power due to heat -> Total Power ≈ 1.6x. New Time = 26 days (0.86x). New Energy = 1.6 ×
    26 = 41.6 units. 41.6 / 30 = 1.38 (38% increase in total energy).'
