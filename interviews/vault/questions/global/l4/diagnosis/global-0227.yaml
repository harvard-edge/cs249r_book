id: global-0227
title: OOM at Step 500 but Not Step 1
topic: memory-hierarchy-design
status: published
provenance: imported
scenario: Your training run starts fine but OOMs at step 500. The model, batch size, and sequence length
  haven't changed. Memory usage has been gradually climbing since step 1. What is the most likely cause?
details:
  realistic_solution: 'The most likely cause is retaining computation graphs across steps — typically
    from storing loss tensors without calling .detach() or .item(). Each stored tensor keeps the entire
    backward graph alive, accumulating memory linearly. Common culprits: (1) Appending loss.item() is
    correct, but appending loss (without .item()) retains the graph. (2) Metrics tracking that stores
    tensors instead of scalars. (3) Learning rate schedulers or custom callbacks holding tensor references.
    (4) Less commonly: CUDA caching allocator fragmentation, which grows as different tensor sizes are
    allocated/freed. Debug: torch.cuda.memory_summary() shows reserved vs. allocated — a growing gap suggests
    fragmentation; growing allocated suggests retained references.'
  common_mistake: Assuming a memory leak in the training loop code. While possible, the most common cause
    in PyTorch is accumulating computation graph history.
  napkin_math: 'Each retained backward graph for a Transformer step ≈ 500 MB-2 GB. After 500 steps without
    detaching: 500 × 500 MB = 250 GB → OOM long before step 500.'
