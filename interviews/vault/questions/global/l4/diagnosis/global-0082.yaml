id: global-0082
title: Topology-Unaware Scheduling on Oversubscribed Fabric
topic: network-bandwidth-bottlenecks
status: published
provenance: imported
scenario: A 3:1 oversubscribed Fat-Tree network connects 16 racks (4 nodes per rack). A 16-node training
  job is launched. Instead of getting the expected 200GB/s NCCL AllReduce bandwidth, the job achieves
  only 66GB/s. Other identical jobs running on contiguous racks achieve the full 200GB/s.
details:
  realistic_solution: The root cause is topology-unaware job scheduling on an oversubscribed network.
    The cluster has a 3:1 oversubscription ratio at the spine, meaning intra-rack bandwidth is 3x higher
    than inter-rack bandwidth. The fast jobs were scheduled on contiguous nodes within 1-2 racks. The
    slow job was fragmented across 8 different racks (e.g., 2 nodes per rack). NCCL forms a logical ring
    for AllReduce. Because the nodes are scattered, the NCCL ring crosses the oversubscribed spine switch
    links multiple times. The entire collective operation is bottlenecked by the slowest link in the ring,
    which is the heavily contended 3:1 inter-rack uplink.
  common_mistake: Assuming a faulty optical cable or thermal throttling on the GPUs in the slow job.
  napkin_math: 'Node bandwidth = 200GB/s. 3:1 oversubscription means the inter-rack uplink guarantees
    only 200 / 3 = 66.6GB/s per node. If a fragmented NCCL ring is forced to cross the spine for every
    neighbor connection, the maximum throughput of the ring is mathematically capped at the spine link
    capacity: ~66GB/s.'
