id: global-0079
title: GPUDirect RDMA NUMA Crossing Bottleneck
topic: network-bandwidth-bottlenecks
status: published
provenance: imported
scenario: A node features dual AMD EPYC CPUs, 8 H100 GPUs, and 4x 400G ConnectX-7 NICs. Intra-node GPU
  bandwidth via NVLink is 900GB/s. However, inter-node NCCL AllReduce throughput is only reaching 120GB/s
  total across all 4 NICs, instead of the theoretical 200GB/s (4x 50GB/s). GPU profiling shows high kernel
  execution wait times during RDMA transfers.
details:
  realistic_solution: The root cause is a PCIe topology and NUMA affinity mismatch. GPUDirect RDMA allows
    NICs to read/write directly to GPU memory over PCIe. If a GPU on CPU Socket 0 tries to communicate
    via a NIC attached to CPU Socket 1, the PCIe traffic must cross the inter-socket interconnect (xGMI/Infinity
    Fabric). This cross-socket link has significantly lower bandwidth than PCIe Gen5 x16 and introduces
    contention with CPU memory access. The fix is to ensure the job scheduler and NCCL topology XML correctly
    pin GPU-NIC pairs that share the same PCIe root complex (same NUMA node).
  common_mistake: Blaming the optical transceivers, network switch congestion, or NCCL algorithm selection.
  napkin_math: 4x 400G NICs = 200GB/s theoretical max. AMD EPYC inter-socket xGMI link bandwidth is typically
    ~64GB/s per link (often ~120GB/s total depending on configuration). If 4 GPUs on NUMA 0 route 100GB/s
    of RDMA traffic to NICs on NUMA 1, they hit the xGMI bottleneck at ~64-120GB/s, capping the entire
    node's outbound throughput regardless of network capability.
