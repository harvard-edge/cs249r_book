schema_version: 1
id: global-0169
title: The Power Capping Headroom Paradox
topic: thermal-management
status: published
provenance: imported
scenario: Your inference cluster serves a ResNet-50 model at 10,000 QPS with an average GPU utilization
  of 45%. To cut electricity costs, you apply a strict 200W power cap on the 400W GPUs. Suddenly, p99
  latency spikes from 50ms to over 500ms, even though average GPU utilization remains at 45% and average
  power draw is only 150W.
details:
  realistic_solution: The root cause is the suppression of transient power spikes needed to clear bursty
    inference queues. Inference traffic is rarely perfectly uniform; it arrives in bursts. To process
    a sudden burst of requests and maintain low p99 latency, the GPU rapidly scales up its clock frequency,
    causing transient power spikes that can easily hit 300W+ for a few milliseconds. By enforcing a strict
    hardware power cap of 200W, the GPU is prevented from boosting its frequency during these micro-bursts.
    The service rate drops during the exact moments the queue is longest. According to queuing theory,
    failing to clear the queue quickly results in compounding wait times, massively inflating p99 latency,
    even if the steady-state averages remain low.
  common_mistake: Assuming that because the average power draw (150W) is below the cap (200W), the power
    cap should have no effect on performance.
  napkin_math: Average arrival rate λ = 10,000 QPS. Uncapped GPU burst service rate μ = 20,000 QPS. Utilization
    ρ = 0.5. Capped GPU service rate drops to μ = 11,000 QPS during bursts. Utilization ρ = 0.9. M/M/1
    queue wait time = 1 / (μ - λ). Uncapped wait time = 1 / (20000 - 10000) = 0.1ms. Capped wait time
    = 1 / (11000 - 10000) = 1.0ms. In reality, bursty traffic (high variance) pushes p99 queue depths
    exponentially higher when ρ approaches 1 during the burst window.
