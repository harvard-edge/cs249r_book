schema_version: 1
id: global-0161
title: BLE DMA External RAM Wakeups
topic: collective-communication
status: published
provenance: imported
scenario: An edge device aggregates 30KB of FL gradients in external SPI SRAM. Every hour, it transmits
  this buffer via BLE. The BLE transmission takes 6 seconds. You expect the CPU to sleep during TX, but
  power analysis shows a constant 8mA draw instead of the expected 2mA BLE radio current.
details:
  realistic_solution: The failure stems from the BLE radio's DMA controller lacking access to the external
    SPI SRAM bus. Because the 30KB buffer is located in external memory, the DMA cannot fetch the data
    directly. The CPU must wake up for every BLE connection interval, manually read a chunk from SPI SRAM
    into internal SRAM, and then hand it to the radio DMA. This destroys the system's ability to maintain
    deep sleep during the long transmission window.
  common_mistake: Assuming the BLE stack requires active CPU cycles to encrypt the payload before each
    packet transmission.
  napkin_math: 'BLE TX alone (radio + internal DMA) = 2mA. CPU active at 64MHz = 4mA. SPI peripheral active
    = 2mA. Total = 8mA. 6 seconds * 8mA = 48 mAs. If buffered in internal SRAM, CPU sleeps: 6s * 2mA =
    12 mAs. Poor memory locality wastes 36 mAs per transmission.'
