schema_version: 1
id: global-0296
title: OOM During Evaluation but Not Training
topic: activation-memory
status: published
provenance: imported
scenario: Your 7B model trains fine on an A100-80GB with batch_size=16, seq_len=2048. But when you run
  evaluation (same batch size, same sequence length), you get a CUDA OOM error. Training uses mixed-precision
  with gradient checkpointing. No evaluation-specific code changes. Why?
details:
  realistic_solution: 'Root cause: gradient checkpointing is active during training but automatically
    disabled during model.eval(). During training with gradient checkpointing: only activations at checkpoint
    boundaries are stored (e.g., every 2nd layer). Intermediate activations are recomputed during backward.
    This reduces activation memory from O(L × B × S × H) to O(sqrt(L) × B × S × H). During evaluation:
    no backward pass is needed, so frameworks skip gradient checkpointing. But if you''re computing perplexity
    or doing evaluation with gradients (e.g., for gradient-based analysis), the model stores ALL activations
    for ALL layers simultaneously because there''s no recomputation happening. For 7B model, batch=16,
    seq=2048, hidden=4096, 32 layers: full activations = 32 × 16 × 2048 × 4096 × 2B ≈ 8.6 GB (just attention,
    actual is 3-4x with intermediate FFN). With checkpointing every 2 layers: ~0.54 GB. Fix: (1) wrap
    eval in torch.no_grad() (already done?), (2) reduce eval batch size, (3) force gradient checkpointing
    during eval, (4) use torch.inference_mode() which skips autograd overhead entirely.'
  common_mistake: Thinking evaluation should use LESS memory than training because there are no optimizer
    states or gradients. While those are freed, evaluation often uses MORE activation memory because gradient
    checkpointing is disabled during eval.
  napkin_math: 'Training activations (checkpointed every 2 layers): 16 × 32/2 × 2048 × 4096 × 2B = 4.3
    GB. Eval activations (no checkpointing): 16 × 32 × 2048 × 4096 × 2B × 3 (with FFN) = 25.8 GB. Difference:
    21.5 GB — enough to push past 80 GB limit.'
