schema_version: 1
id: global-0098
title: The QAT Shadow Weight OOM
topic: memory-hierarchy-design
status: published
provenance: imported
scenario: You initiate Quantization-Aware Training (QAT) for a 15B parameter vision-language model on
  an 8x80GB A100 node. Standard FP16 fine-tuning takes 45GB VRAM per GPU. When you enable INT8 QAT, you
  expect memory to drop or stay constant, but it spikes to 82GB per GPU, causing an Out-Of-Memory (OOM)
  error. What is causing this massive memory inflation?
details:
  realistic_solution: The root cause is the maintenance of FP32 'shadow weights' alongside the fake-quantization
    graph. In QAT, gradients cannot flow through discrete INT8 steps (due to zero derivatives), so the
    Straight-Through Estimator (STE) is used. This requires keeping the continuous FP32 weights to accumulate
    small gradient updates. During the forward pass, the framework must store both the FP32 weights AND
    the simulated INT8 weights (FakeQuant), plus the FP32 optimizer states (Adam requires two FP32 tensors
    per parameter — momentum and variance — totaling 120GB for 15B parameters). Furthermore, FakeQuant
    nodes inject additional activation tensors into the computation graph that must be saved for the backward
    pass, dramatically increasing the activation memory footprint.
  common_mistake: Believing that QAT actually stores the model in INT8 during training, and attributing
    the OOM to a memory leak in the data loader.
  napkin_math: '15B params. Standard FP16 FT: Weights 30GB + Adam (FP32) 120GB = 150GB (usually sharded
    via FSDP to ~18.75GB/GPU) + 30GB activations = ~45GB per GPU after sharding. QAT adds: FP32 shadow
    weights (60GB total, ~7.5GB/GPU sharded) + INT8 fake weights (15GB total, ~2GB/GPU) + FakeQuant activation
    copies (~25GB/GPU overhead). Total per GPU: 45GB + 7.5GB + 2GB + 25GB = ~79.5GB -> OOM.'
