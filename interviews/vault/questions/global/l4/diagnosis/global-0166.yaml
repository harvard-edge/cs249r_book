id: global-0166
title: The Thermal Throttling Ring
topic: thermal-management
status: published
provenance: imported
scenario: You are training a MoE model on a 64-node cluster (8x H100s per node, air-cooled). You notice
  that every day between 2 PM and 6 PM, global training throughput drops by 25%. Node-level CPU and RAM
  metrics are normal, and power supply units are well within limits. The loss curve remains perfectly
  smooth.
details:
  realistic_solution: The root cause is thermal throttling triggering dynamic voltage and frequency scaling
    (DVFS) during peak afternoon ambient temperatures. In dense, air-cooled 8-GPU servers, the GPUs at
    the rear of the chassis ingest pre-heated air from the front GPUs. During the hottest part of the
    day, facility cooling (CRAC units) struggles, raising chassis inlet temperatures. The rear GPUs hit
    their thermal limits (e.g., 85°C) and automatically downclock to reduce heat. Because the training
    uses a synchronous AllReduce operation (e.g., NCCL Ring or Tree), the entire 512-GPU pipeline is forced
    to wait for the slowest, thermally-throttled GPU to finish its computation. A single hot GPU degrades
    the throughput of the entire cluster.
  common_mistake: Suspecting network congestion, noisy neighbors, or data loader bottlenecks without checking
    GPU temperatures and clock speeds.
  napkin_math: 'Normal GPU clock: 1980 MHz. Time per step: 400ms. Throttled GPU clock drops to 1485 MHz
    (25% reduction). Throttled GPU time per step: 400ms / 0.75 = 533ms. Because AllReduce acts as a global
    barrier, the whole cluster''s step time becomes 533ms. Throughput (steps/sec) goes from 2.5 to 1.87
    (a 25% drop).'
