id: global-0238
title: Tail Latency Sources in Multi-Model Serving
topic: tail-latency
status: published
provenance: imported
scenario: Your serving pipeline chains 3 models (embedding → retrieval → generation). Each model independently
  achieves p99=50ms. But the end-to-end pipeline p99 is 280ms, far exceeding the expected 150ms (3×50ms).
  Analyze why tail latencies compound super-linearly.
details:
  realistic_solution: 'For sequential stages, the end-to-end p99 is NOT the sum of individual p99s. If
    each stage hits p99 independently with P=0.01, the probability ALL three are fast (below p99) = 0.99³
    = 0.97. So p99 of the pipeline ≈ p97 of the sum. But worse: when one stage is slow, it often shifts
    to a much higher percentile (p99 might be 50ms but p99.9 might be 200ms). The compound effect: P(any
    stage > p99.9) = 1 - 0.999³ = 0.3%. This means the pipeline''s p99 approaches max(individual p99.9
    + 2×normal). Mitigations: (1) Hedged requests — send to two replicas, take the first response. (2)
    Timeout-and-retry with budget. (3) Async pipeline stages with queuing. (4) Set per-stage latency budgets
    that sum to the SLA.'
  common_mistake: Assuming p99 of a chain equals the sum of individual p99s. In reality, the probability
    of at least one stage being slow increases multiplicatively.
  napkin_math: 'P(all 3 stages < p99) = 0.99³ = 97%. Pipeline p99 ≈ individual p97. If p99.9 = 200ms per
    stage: P(any > 200ms) = 1 - 0.999³ = 0.3%. Pipeline p99 includes tail spikes from any stage.'
