id: global-0078
title: Long-Haul InfiniBand Buffer Credit Exhaustion
topic: interconnect-topology
status: published
provenance: imported
scenario: To utilize stranded power, a cluster is split across two data centers 20km apart, connected
  via dark fiber and DWDM. InfiniBand NDR switches connect the sites. The optical links sync perfectly
  at 400Gbps with zero physical errors. However, maximum point-to-point RDMA bandwidth between the sites
  hard-caps at ~16Gbps (2 GB/s), severely bottlenecking pipeline parallelism.
details:
  realistic_solution: The root cause is link-level buffer credit starvation due to an unadjusted Bandwidth-Delay
    Product (BDP). InfiniBand uses credit-based flow control; a sender can only transmit if it has credits
    representing available buffer space on the receiver. The default switch buffer allocation is tuned
    for short 3-30 meter DAC/AOC cables inside a single data center. Over 20km, the Round Trip Time (RTT)
    increases dramatically. The sender exhausts its small pool of credits in microseconds and must stop
    transmitting while waiting for acknowledgments to travel 20km back. The solution is configuring long-haul
    (extended) buffers on the WAN switch ports.
  common_mistake: Assuming optical signal degradation (high BER) or DWDM protocol translation overhead
    is causing the bandwidth drop.
  napkin_math: Speed of light in fiber ≈ 200,000 km/s. 20km distance = 40km round trip. RTT = 40km / 200,000
    km/s = 200μs. Link speed = 400Gbps = 50GB/s. BDP = 50GB/s * 200μs = 10MB. If the default port buffer
    is only 500KB, max throughput = 500KB / 200μs = 2.5GB/s (20Gbps), exactly matching the observed bottleneck.
