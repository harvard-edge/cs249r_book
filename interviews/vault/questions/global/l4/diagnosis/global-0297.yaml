schema_version: 1
id: global-0297
title: Loss Plateau After Learning Rate Warmup
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: Your 3B model's training loss decreases normally during the first 1000 steps (warmup phase),
  then completely plateaus at a high loss value for the next 5000 steps despite the learning rate schedule
  continuing normally. GPU utilization is 100%. Gradient norms look healthy (no explosion or vanishing).
  What is wrong?
details:
  realistic_solution: 'Most likely root cause: a data pipeline bug causing the model to see the same data
    repeatedly. During warmup (first 1000 steps), the dataloader''s buffer was filling and serving fresh
    data. After the buffer filled, a shuffle/seed bug causes it to cycle through the same small subset.
    The model memorizes this subset (loss decreases initially) then cannot learn further (plateau). Diagnosis
    steps: (1) Log actual sample IDs per batch — check for repeated patterns. (2) Monitor training loss
    AND validation loss. If train loss plateaus but val loss doesn''t change, it''s not a data issue.
    If both plateau, it IS data. (3) Check dataloader shuffle seed — is it reset every epoch? A common
    bug: setting seed=42 at every epoch restart causes identical ordering. (4) Check num_workers > 0 with
    persistent_workers=True — this can cause workers to cache and reuse the same samples. (5) Less likely:
    gradient accumulation bug where gradients are accumulated but never applied (loss stays constant because
    weights never update). Check that optimizer.step() is called every accumulation_steps, not every step.'
  common_mistake: Blaming the learning rate schedule or model architecture. The warmup phase worked (loss
    decreased), so the model CAN learn. The plateau after warmup with healthy gradients suggests the optimization
    is stuck, not that the model is broken.
  napkin_math: 'Expected loss decrease: ~0.1 per 1000 steps for a healthy 3B run. Plateau = 0.0 decrease
    over 5000 steps. Probability of genuine plateau at step 1000 for a 3B model: <0.1%. Data cycling:
    if buffer=1000 samples and dataset=1M, model sees 0.1% of data → memorizes quickly, cannot generalize.'
