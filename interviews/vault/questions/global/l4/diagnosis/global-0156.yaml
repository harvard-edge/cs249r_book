id: global-0156
title: XIP Flash Cache Thrashing
topic: vram-budgeting
status: published
provenance: imported
scenario: You deploy an updated 200KB keyword spotting model to a Cortex-M7 (400MHz, 32KB D-Cache). The
  weights stream from external QSPI Flash via Execute-In-Place (XIP). Inference latency was 15ms. After
  an on-device Federated Learning sparsity update, latency jumps to 78ms and power spikes by 40mW, despite
  the FLOP count decreasing by 10%.
details:
  realistic_solution: The root cause is D-Cache thrashing due to a loss of spatial locality. The original
    dense model accessed weights sequentially, perfectly utilizing the 32-byte cache lines. The FL sparsity
    update introduced unstructured sparsity or a compressed format (e.g., CSR) that requires non-sequential
    pointer chasing. Nearly every non-sequential read of the 45,000 active weights misses the cache, forcing
    a 40ns fetch from QSPI Flash instead of a 2ns cache hit, stalling the pipeline and keeping the QSPI
    bus continuously active.
  common_mistake: Assuming the FL sparsity update introduced unoptimized CMSIS-NN fallback kernels that
    take more CPU cycles.
  napkin_math: 'Dense model: 200KB / 32B cache line = 6,250 misses. The base model contains 50,000 floats
    (200KB / 4B). A sparse model (10% fewer FLOPs/weights = 45,000 floats fetched randomly) misses the
    cache for nearly every read: 45,000 misses. QSPI latency = 40ns. 45,000 misses * 40ns = 1.8ms just
    in raw wait states. Add pipeline stalls, bus turnaround, and instruction overhead, and latency easily
    increases by >60ms.'
