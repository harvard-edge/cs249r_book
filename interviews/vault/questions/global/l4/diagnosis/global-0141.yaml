schema_version: 1
id: global-0141
title: The Paged Attention OOM
topic: vram-budgeting
status: published
provenance: imported
scenario: 'You are deploying a high-throughput translation service using an 8B parameter model on a single
  80GB A100. Average requests are extremely short: 15 prompt tokens and 15 decode tokens. To maximize
  contiguous memory reads, you configure PagedAttention with a block size of 512 tokens. However, the
  system OOMs at just 64 concurrent requests, falling drastically short of the expected >1000 QPS theoretical
  capacity.'
details:
  realistic_solution: The root cause is severe internal memory fragmentation due to an oversized PagedAttention
    block size. PagedAttention allocates memory in fixed-size blocks. If a request only needs a few tokens,
    it still consumes an entire block. With a block size of 512 tokens and an average sequence length
    of 30 tokens, each request allocates a full 512-token block, leaving 482 tokens of KV cache capacity
    completely wasted. At 64 concurrent requests, this internal fragmentation wastes gigabytes of VRAM,
    prematurely exhausting the KV cache pool and causing an OOM. The solution is to reduce the block size
    to 16 or 32 tokens, which tightly packs the short sequences and virtually eliminates internal fragmentation,
    restoring the expected >1000 QPS capacity.
  common_mistake: Assuming the OOM is caused by the model weights or activation memory during the forward
    pass.
  napkin_math: KV size per token (8B model, 32 layers, 8 KV heads, 128 dim) = 32 * 8 * 128 * 2 (K+V) *
    2 bytes = 131 KB. Block size = 512 tokens. Memory per block = 512 * 131 KB = ~67 MB. For a 30-token
    request, we use 30 * 131 KB = 3.9 MB, but allocate 67 MB. Wasted memory per request = 63.1 MB. For
    64 requests, wasted memory = 64 * 63.1 MB = ~4 GB. While 4 GB doesn't seem like enough to OOM an 80GB
    card on its own, if the KV cache pool was conservatively sized (e.g., 5GB allocated after weights/activations),
    this internal fragmentation instantly depletes it.
