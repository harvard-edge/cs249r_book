id: global-0236
title: Diagnosing Stragglers in Synchronous Training
topic: fault-tolerance-checkpointing
status: published
provenance: imported
scenario: Your 128-GPU synchronous data parallel training shows step times oscillating between 350ms and
  800ms with no pattern. Average GPU utilization is 91% but the slowest GPU per step varies randomly.
  The cluster is homogeneous (same GPU model, same network). What is happening?
details:
  realistic_solution: 'This is the straggler problem caused by OS-level interference (jitter). In synchronous
    training, all GPUs must synchronize at the AllReduce barrier — the slowest GPU determines step time.
    With 128 GPUs, the probability of at least one experiencing a delay (context switch, page fault, network
    interrupt, ECC memory scrub, GPU thermal throttling) is high. A single GPU delayed by 200ms delays
    all 128. Root causes: (1) CPU interrupts during data loading. (2) NUMA memory access misalignment.
    (3) GPU thermal throttling (one GPU in a hot spot). (4) ECC error detection/correction pauses. Fixes:
    CPU pinning, NUMA-aware allocation, disabling hyperthreading, using NCCL ASYNC_ERROR_HANDLING, and
    setting cudaDeviceScheduleBlockingSync.'
  common_mistake: Blaming network congestion or a single faulty GPU. The random rotation of the slowest
    GPU rules out a single hardware fault.
  napkin_math: 'P(any GPU delayed) = 1 - (1-p)^128. If p=0.5% per step per GPU: P(straggler) = 1 - 0.995^128
    = 47%. Nearly every other step has a straggler.'
