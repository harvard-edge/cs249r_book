schema_version: 1
id: global-0106
title: Systematic Activation Outliers
topic: pruning-sparsity
status: published
provenance: imported
scenario: You are deploying a 13B LLM for a high-throughput summarization task. To maximize compute efficiency
  on A100s, you target W8A8 (INT8 weights and activations) utilizing INT8 Tensor Cores. However, standard
  W8A8 PTQ causes zero-shot accuracy to plummet by 25%. Analysis shows massive, systematic outliers in
  specific activation channels (up to 100x the median value).
details:
  realistic_solution: Implement SmoothQuant or a similar mathematically equivalent transformation. In
    LLMs, activation outliers are highly systematic (they appear in specific channels across all tokens),
    while weights are relatively uniform. Standard per-tensor activation quantization clips these outliers
    or destroys the precision of non-outliers. SmoothQuant introduces a per-channel scaling factor that
    mathematically migrates the quantization difficulty from the activations to the weights. By dividing
    the activation channels by a scale factor and multiplying the corresponding weight channels by the
    same factor (Y = (X / S) * (W * S)), you smooth out the activations. Both weights and activations
    are then easily quantized to INT8 statically, allowing full use of INT8 Tensor Cores without runtime
    quantization overhead or accuracy loss.
  common_mistake: Using dynamic per-token activation quantization without addressing the channel outliers,
    which adds severe runtime overhead and still struggles with channel-wise variance.
  napkin_math: A100 FP16 dense peak is 312 TFLOPS. INT8 dense peak is 624 TOPS (2x compute speedup). If
    an activation channel has max value 500 and median 5, an INT8 range [-127, 127] gives a scale of 500/127
    = 3.93. The median 5 becomes 5/3.93 = 1.27 (rounded to 1), losing massive precision. SmoothQuant scales
    the 500 down to ~50, reducing the scale factor to 0.39, preserving the precision of the median values.
