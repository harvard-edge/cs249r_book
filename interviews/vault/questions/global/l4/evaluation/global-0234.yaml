schema_version: 1
id: global-0234
title: KV Cache Eviction Under Memory Pressure
topic: vram-budgeting
status: published
provenance: imported
scenario: Your inference server runs out of KV cache memory with 50 active requests. You must evict some
  cached context to admit new requests. Analyze the tradeoff between LRU eviction (evict least-recently-used
  request's context), shortest-remaining eviction (evict requests closest to completion), and prefix-sharing
  eviction (evict requests that share the least common prefix with others).
details:
  realistic_solution: 'LRU: Simple but suboptimal. A long-running request near completion may be evicted,
    wasting all the tokens already generated. Shortest-remaining: Better for individual request completion
    but may starve new requests if all active requests are long. Prefix-sharing: Preserves shared prefixes
    (e.g., system prompts) that benefit multiple requests, maximizing cache utility per byte. The best
    approach depends on workload: for chatbots (shared system prompts), prefix-sharing wins. For diverse
    API traffic, LRU with a minimum-tokens-generated threshold prevents wasting near-complete requests.
    vLLM''s PagedAttention uses a more sophisticated approach: evict at the page granularity, preferring
    pages unique to single requests over shared pages.'
  common_mistake: Defaulting to LRU because it works for CPU caches. Inference serving has different access
    patterns — a request being 'old' doesn't mean it's less valuable.
  napkin_math: 50 requests × 2 GB KV each = 100 GB. Evicting 5 requests frees 10 GB. If those 5 were 90%
    complete, you waste 5 × 0.9 × 200ms = 900ms of compute. Minimum-completion-threshold prevents this.
