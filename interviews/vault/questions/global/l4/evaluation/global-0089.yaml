schema_version: 1
id: global-0089
title: Safe Deployment for Latency-Sensitive Generation Models
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: A global translation API handles 5,000 QPS with a strict SLA of 200ms P99 latency. A new model
  version (V2) uses a deeper transformer with speculative decoding. Deploying it via a 10% Canary causes
  downstream client timeouts because V2's tail latency spikes to 350ms under cache misses, breaking the
  SLA for thousands of users.
details:
  realistic_solution: Evaluate the tradeoff between a Canary deployment (affects real users, provides
    exact latency/quality feedback) and a Shadow deployment (safe for users, but doubles compute cost
    and lacks synchronous user feedback). Because the strict 200ms SLA is actively being violated, you
    must shift to an asynchronous Shadow deployment pattern. Mirror a subset of production traffic (e.g.,
    5%) to a shadow cluster running V2. The primary cluster returns V1 responses synchronously to meet
    the SLA. An asynchronous observability service compares V1 and V2 outputs (BLEU scores) and latency
    profiles offline. This isolates users from P99 spikes while allowing you to debug the speculative
    decoding cache misses.
  common_mistake: Increasing the canary timeout threshold or just rolling back without capturing tail
    latency profiles for debugging.
  napkin_math: '10% Canary = 500 QPS. With a 350ms P99, 1% of those (5 requests/sec) severely violate
    the SLA, accumulating 300 bad user experiences per minute. Shadowing 5% (250 QPS): 250 req/s. If a
    GPU processes 20 req/sec, the shadow pool requires ~13 extra GPUs. SLA violations drop to 0 while
    preserving high-fidelity production debugging data.'
