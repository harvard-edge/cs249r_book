id: global-0235
title: Why FlashAttention is Faster Despite More FLOPs
topic: flash-attention
status: published
provenance: imported
scenario: FlashAttention performs more total FLOPs than standard attention (due to recomputation in the
  backward pass) yet runs 2-4× faster on GPU. A colleague claims 'doing more compute can't possibly be
  faster.' Analyze why this counter-intuitive result holds.
details:
  realistic_solution: 'Standard attention materializes the N×N attention matrix to HBM: O(N²) memory reads/writes.
    FlashAttention tiles the computation, keeping Q, K, V blocks in SRAM (192 KB on A100) and never materializing
    the full matrix. This trades extra FLOPs (recomputing softmax statistics in backward) for eliminating
    O(N²) HBM traffic. On A100: 312 TFLOPS compute but only 2 TB/s bandwidth. The attention matrix for
    seq_len=2048 = 2048² × 2 bytes = 8 MB per head per layer. Writing and reading this 8 MB costs 8 MB
    / 2 TB/s = 4 μs, but the extra recomputation FLOPs cost << 1 μs at 312 TFLOPS. The memory wall makes
    the recomputation essentially free. This is the roofline model in action: in the memory-bound regime,
    adding compute costs nothing.'
  common_mistake: Equating FLOPs with wall-clock time. On modern GPUs, memory bandwidth is often the bottleneck,
    not compute. Extra FLOPs that avoid HBM round-trips are essentially 'free.'
  napkin_math: 'Standard: write/read N² matrix = 2048² × 2B = 8 MB per head. Round-trip HBM traffic =
    16 MB (write + read). At 2 TB/s: 16 MB / 2 TB/s = 8 μs. Flash: stays in SRAM, zero HBM traffic for
    intermediates. Extra FLOPs ~1 μs. Avoided traffic saves ~8 μs. Net win: 7 μs per head.'
