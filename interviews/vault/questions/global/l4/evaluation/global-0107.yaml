schema_version: 1
id: global-0107
title: RecSys Network Bottlenecks
topic: collective-communication
status: published
provenance: imported
scenario: A Deep Learning Recommendation Model (DLRM) uses a 200GB embedding table sharded across 8 GPUs
  (25GB per GPU) via model parallelism. At 10,000 QPS, the P99 latency is 60ms (budget is 30ms). Profiling
  reveals that the compute time is only 5ms; the bottleneck is the All-to-All network communication transferring
  gathered FP32 embedding vectors across the PCIe/NVLink bus.
details:
  realistic_solution: Architect a solution applying Row-wise PTQ or QAT to the embedding tables, compressing
    them from FP32 to INT8 or INT4. In DLRM model parallelism, GPUs look up embeddings locally and then
    must exchange them (All-to-All) to assemble the full feature vector before the top MLP. By storing
    and transmitting the embeddings in INT8, you immediately reduce the network payload by 4x. The vectors
    are only dequantized to FP16/FP32 immediately before the top MLP compute phase. Row-wise quantization
    (calculating scale/zero-point per embedding vector) is critical here because embedding vectors have
    highly independent distributions; per-tensor quantization would destroy recommendation accuracy.
  common_mistake: Attempting to quantize the MLP weights, which does nothing to solve the All-to-All network
    bandwidth bottleneck caused by the massive embedding vector transfers.
  napkin_math: '10,000 QPS. Assume 200 features per request, embedding dimension 128. Payload per request
    = 200 * 128 * 4 bytes (FP32) = 102.4 KB. All-to-All transfer for 8 GPUs: each GPU sends 7/8 of its
    embeddings = ~89.6 KB per request. At 10K QPS per GPU: 89.6 KB * 10K = 896 MB/s per GPU outbound.
    With NVLink A100 (600 GB/s), bandwidth is not the issue — latency from small-message overhead dominates.
    At 10K QPS burst: All-to-All latency ~45ms at P99 due to message scheduling and synchronization across
    8 GPUs. Compressing to INT8 reduces payload per request to 200 * 128 * 1 = 25.6 KB (4x reduction).
    All-to-All data volume drops to 224 MB/s per GPU. Fewer bytes per message means faster serialization
    and less bus contention: P99 latency drops to ~11ms. Total per-step: 5ms compute + 11ms comm = 16ms,
    well under 30ms budget.'
