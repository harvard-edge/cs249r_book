title: Pipeline Parallelism Bubble Overhead Analysis
topic: pipeline-parallelism
status: published
provenance: imported
scenario: You implement pipeline parallelism with 4 stages and 16 micro-batches. Each micro-batch takes
  10 ms per stage. Analyze the bubble overhead and compare with an alternative of 8 stages and 32 micro-batches
  (each micro-batch now takes 5 ms per stage).
details:
  realistic_solution: 'Bubble fraction = (P-1) / (P-1+M) where P=stages, M=micro-batches. Config A: 4
    stages, 16 micro-batches: bubble = 3/(3+16) = 15.8%. Total time = (16+3) × 10 = 190 ms. Config B:
    8 stages, 32 micro-batches: bubble = 7/(7+32) = 17.9%. Total time = (32+7) × 5 = 195 ms. Despite 2×
    more micro-batches, Config B has higher bubble overhead and slightly higher total time. The key insight:
    bubble fraction is (P-1)/(M+P-1). To keep it below 10%, you need M ≥ 9P. More stages require proportionally
    more micro-batches, which increases memory for in-flight activations.'
  common_mistake: Thinking more pipeline stages always improve throughput. More stages mean smaller per-stage
    compute but proportionally more bubble time.
  napkin_math: 'A: bubble = 3/19 = 15.8%, time = 190 ms. B: bubble = 7/39 = 17.9%, time = 195 ms. To get
    <10% bubble with 8 stages: need M ≥ 63 micro-batches.'
