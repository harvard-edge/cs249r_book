id: global-0246
title: Designing a Mixed-Precision Serving Strategy
topic: extreme-quantization
status: published
provenance: imported
scenario: You serve a 70B model on 2× H100 GPUs. FP16 achieves baseline quality but only 800 tok/s aggregate.
  Your target is 2000 tok/s with <1% quality degradation on your evaluation suite. Design a mixed-precision
  quantization strategy.
details:
  realistic_solution: 'Step 1: Profile layer sensitivity — quantize each layer independently and measure
    perplexity impact. Typically: embedding layers = very sensitive (keep FP16), attention QKV = medium
    sensitivity (INT8), MLP up/down/gate = low sensitivity (INT4), LayerNorm = keep FP16 (tiny memory
    footprint). Step 2: Apply mixed scheme. Rough breakdown for 70B: embeddings (FP16) = 2 GB, attention
    (INT8) = 10 GB, MLP (INT4) = 12 GB, other (FP16) = 1 GB. Total ≈ 25 GB vs 140 GB FP16. Step 3: Memory-bound
    decode throughput scales ≈ proportionally to weight reduction: 140/25 = 5.6× potential speedup. Realistic
    with overhead: 4×. New throughput: 800 × 4 = 3200 tok/s. Well above 2000 target with room for conservative
    quantization where needed. Step 4: Use calibration data from your domain to select per-layer bit widths
    with AWQ.'
  common_mistake: Uniformly quantizing all layers to INT4. Different layers have different sensitivity
    — attention projection layers are more sensitive than MLP layers.
  napkin_math: '70B model breakdown: MLP ~56B params (INT4) = 28 GB, Attention ~10.5B (INT8) = 10.5 GB,
    Embeddings ~3.5B (FP16) = 7 GB. Total: ~45.5 GB (3.1× compression from 140 GB FP16). BW savings: 3.1×.
    Throughput: 800 × 2.5 = 2000 tok/s. Quality: <1% degradation with AWQ calibration.'
