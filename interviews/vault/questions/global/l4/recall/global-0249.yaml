title: Maximizing Tokens-per-Watt for Sustainable Inference
topic: sustainability-carbon-accounting
status: published
provenance: imported
scenario: Your organization commits to a carbon budget of 100 gCO2 per 1M output tokens. Current infrastructure
  (H100 at 700W, grid at 400 gCO2/kWh) produces 195 gCO2/1M tokens. Design an optimization plan to meet
  the carbon target without reducing throughput.
details:
  realistic_solution: 'The baseline is 195 gCO2 per 1M tokens. To hit the 100 gCO2 budget, we must optimize
    both hardware power efficiency and energy source carbon intensity. (1) Power Capping: Capping the
    H100 at 400W reduces power consumption by 43% while throughput only drops by ~10% (as it enters the
    more efficient region of the voltage-frequency curve). This reduces energy per token, bringing emissions
    to ~124 gCO2 / 1M tokens. (2) Carbon-aware Scheduling: By shifting flexible batch workloads to regions
    or times where the grid carbon intensity is lower (e.g., 200 gCO2/kWh instead of 400 gCO2/kWh), we
    halve the remaining emissions, reaching ~62 gCO2 / 1M tokens, safely meeting the 100 gCO2 budget.'
  common_mistake: Only considering hardware power reduction. The full solution space includes model efficiency,
    scheduling, and energy source.
  napkin_math: 'Baseline: 195 gCO2 / 1M tokens. Power cap H100 to 400W: throughput drops ~10% but power
    drops 43%, reducing energy/token by ~36% -> 124 gCO2. Carbon-aware scheduling: shift workloads to
    times/regions with 200 gCO2/kWh (50% reduction in carbon intensity) -> 62 gCO2. Target of 100 gCO2
    met safely.'
