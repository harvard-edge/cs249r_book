title: Optimizing a Memory-Bound Training Bottleneck
topic: kernel-fusion
status: published
provenance: imported
scenario: Profiling reveals that 35% of your training step time is spent in batch normalization and elementwise
  operations, despite these accounting for only 2% of total FLOPs. You are on an A100 GPU. Design an optimization
  strategy to reduce this overhead by at least 50%.
details:
  realistic_solution: 'These operations are deeply memory-bound (AI < 1 FLOP/byte) — optimizing their
    compute is pointless since they spend >95% of time waiting for memory. Strategy: (1) Kernel fusion:
    fuse BatchNorm + ReLU + Dropout into a single kernel (1 read + 1 write instead of 3×(read+write),
    saving ~67% of memory traffic). (2) Use torch.compile which automatically fuses elementwise ops. (3)
    Replace BatchNorm with LayerNorm or RMSNorm which fuse better with attention operations. (4) Enable
    CUDA graphs to eliminate kernel launch overhead between small ops. Expected result: fusing 3-4 elementwise
    ops reduces their combined time by 60-70%, cutting total step time by 35% × 65% ≈ 23%.'
  common_mistake: Trying to optimize these operations in isolation. The solution is to eliminate the HBM
    round-trips by fusing these memory-bound ops with adjacent compute-bound ops.
  napkin_math: 'Unfused: 3 ops × 2 passes (r+w) = 6 HBM transactions. Fused: 1 op × 2 passes = 2 transactions.
    3× less traffic → ~3× faster. 35% of step × 67% reduction = 23% total speedup.'
