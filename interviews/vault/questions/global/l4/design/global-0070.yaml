id: global-0070
title: Asynchronous Multi-Tier Checkpointing
topic: fault-tolerance-checkpointing
status: published
provenance: imported
scenario: You are training a 200B parameter dense model on 1,024 GPUs. The combined optimizer and model
  state is 2.4 TB. Synchronous writes to cloud object storage take 120 seconds, dropping GPU utilization
  below 85% due to frequent pauses. You must architect a solution to reduce the training pause to < 5
  seconds while ensuring fault tolerance against node failures.
details:
  realistic_solution: 'Architect a multi-tier asynchronous checkpointing system. Tier 1: Synchronously
    copy the state from GPU HBM to pinned Host CPU RAM (via PCIe). This clears the GPU memory quickly,
    allowing the training loop to resume in seconds. Tier 2: A dedicated background daemon on the CPU
    asynchronously streams the snapshot from Host RAM to cloud object storage. To handle the edge case
    where a node fails before the Tier 2 upload completes, implement neighbor-level redundancy: asynchronously
    stream a parity shard to a neighboring node''s CPU RAM over Infiniband. This ensures that even if
    a node loses power mid-upload, the checkpoint can be reconstructed.'
  common_mistake: Using a background thread to write directly from GPU memory to network storage, which
    causes PCIe congestion and blocks subsequent forward passes.
  napkin_math: 'State size: 2.4 TB / 1,024 GPUs = ~2.4 GB per GPU.

    Tier 1 (HBM -> CPU RAM): PCIe Gen4 x16 bandwidth is ~32 GB/s. Transfer time = 2.4 GB / 32 GB/s = 0.075
    seconds (well under the 5s requirement).

    Tier 2 (CPU -> Object Storage): Assuming 10 Gbps network to storage, 2.4 GB takes ~2 seconds per node,
    fully hidden in the background while GPUs compute the next batch.'
