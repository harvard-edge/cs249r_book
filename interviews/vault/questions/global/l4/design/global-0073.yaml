id: global-0073
title: Architecting SDC Detection in Large Clusters
topic: fault-tolerance-checkpointing
status: published
provenance: imported
scenario: You are training a 500B LLM on 8,192 GPUs. Every 3-4 days, the loss spikes to NaN. Checkpoint
  rollbacks succeed initially but often diverge again, indicating the checkpoint itself was corrupted
  by a Silent Data Corruption (SDC) bit-flip before the NaN occurred. Architect an SDC detection mechanism
  that prevents saving corrupted checkpoints without doubling compute costs.
details:
  realistic_solution: Architect an anomaly-detection and parity-verification system that operates at the
    checkpoint boundary. Since full duplication is too expensive, track gradient norms and activation
    statistics (mean, variance) asynchronously on the host CPU. If a sudden $>5\sigma$ deviation occurs,
    halt and run a deterministic Known Answer Test (KAT). More importantly, right before committing a
    checkpoint, run a lightweight forward pass of a fixed, deterministic 'reference batch' on all replicas.
    Broadcast and compare the loss checksums. If a rank's checksum mismatches, an SDC occurred during
    that window. Reject the checkpoint, roll back to the previous validated checkpoint, and cordon the
    faulty GPU.
  common_mistake: Implementing full compute duplication (running the entire training pass twice and comparing),
    which doubles the GPU cost of the entire cluster.
  napkin_math: 'Overhead calculation: A single forward pass on a reference batch takes ~200ms.

    Running this verification before every 1-hour (3600s) checkpoint adds 200ms / 3600s = 0.005% compute
    overhead.

    If the MTBF for an SDC is 72 hours, accidentally saving 1 corrupted checkpoint costs 72 hours of rollback
    + debugging across 8,192 GPUs (589,824 GPU-hours). The 0.005% overhead prevents this catastrophic
    waste.'
