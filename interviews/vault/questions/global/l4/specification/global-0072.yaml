id: global-0072
title: Mitigating Network Stragglers in Synchronous Training
topic: fault-tolerance-checkpointing
status: published
provenance: imported
scenario: During a 10,000 GPU pretraining run, throughput randomly drops from 150 TFLOPs/GPU to 10 TFLOPs/GPU
  for 5-10 minute windows. Profiling shows NCCL AllReduce operations hanging. No nodes crash, but optical
  transceiver faults cause some Infiniband links to silently degrade from 400 Gbps to 10 Gbps. Architect
  a software-level detection and mitigation strategy.
details:
  realistic_solution: Architect a software-level straggler detection and elastic routing system. 1) Instrument
    the training loop to emit heartbeat metrics and wrap NCCL calls with asynchronous timeout watchdogs
    (e.g., NCCL_ASYNC_ERROR_HANDLING). 2) Maintain a moving average of AllReduce latencies. If an operation
    takes > 5x the expected time, temporarily pause training. 3) Execute a rapid diagnostic microbenchmark
    (pairwise send/recv ring) across all ranks to isolate the specific degraded link. 4) Once identified,
    automatically cordon the faulty node, dynamically shrink the world size using an elastic training
    framework (e.g., TorchElastic), and resume from the latest checkpoint. Alert the hardware scheduler
    to repair the node.
  common_mistake: Relying purely on hardware metrics (switch port drops) which often fail to correlate
    with specific distributed training ranks in real-time.
  napkin_math: 'Normal AllReduce for 1GB over 400 Gbps (50 GB/s) takes ~40ms (using the Ring AllReduce
    formula: 2 * M / B = 2 * 1 GB / 50 GB/s = 0.04s). Degraded link at 10 Gbps (1.25 GB/s) takes ~1.6s
    for the full AllReduce operation (N steps combined), causing a massive pipeline bubble across all
    10,000 GPUs.

    A 5-minute stall wastes 5 min * 10,000 GPUs = 833 GPU-hours.

    Detecting the stall within 10 seconds and restarting takes 2 minutes, wasting only 333 GPU-hours,
    saving 500 GPU-hours per event.'
