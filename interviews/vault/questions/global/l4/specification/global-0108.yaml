schema_version: 1
id: global-0108
title: Static Calibration Distribution Shift
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: A transformer translation model runs W8A8 static PTQ at 200 QPS. The static calibration was
  done on a dataset of short conversational sentences (avg 10 tokens). In production, the model receives
  complex legal documents (avg 500 tokens). Latency is optimal (40ms), but the BLEU score on production
  data drops by 15 points due to severe activation clipping.
details:
  realistic_solution: 'The architecture suffers from calibration distribution mismatch. In transformers,
    activation magnitudes (especially in attention layers and residual streams) scale with sequence length.
    Static ranges `[-max, max]` calculated on 10-token sequences are far too narrow for 500-token sequences,
    leading to severe clipping of valid activations. The solution is twofold: 1) Re-calibrate the static
    PTQ using a representative dataset that matches production sequence lengths (legal documents), and
    2) If variance remains high, shift the architecture from Static PTQ to Dynamic Activation Quantization,
    where the scale/zero-point for activations are calculated on-the-fly per token at runtime, trading
    a slight compute overhead for robustness against sequence length variance.'
  common_mistake: Increasing the number of calibration samples of the same short-sentence dataset, which
    fails to capture the long-context activation distributions.
  napkin_math: If max activation for length 10 is 15.0, static scale is 15.0/127 = 0.118. For length 500,
    attention sums grow, max activation hits 60.0. Using the static scale of 0.118, the INT8 value would
    need to be 60.0 / 0.118 = 508, which clips to 127. The dequantized value is 127 * 0.118 = 15.0. An
    error of 45.0 (75% error) is injected into the residual stream per layer, destroying the representation.
