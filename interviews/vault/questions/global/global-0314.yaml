title: Global New 0015
scenario: An 8x A100 server is racked. GPUs peak at 400W each. Host requires 1000W. Datacenter PUE is 1.25.
question: What facility power does an 8x A100 server draw after adding host power and applying a PUE of 1.25?
details:
  realistic_solution: "Acknowledge total IT load plus facility inefficiency. Accumulate GPU envelope with CPU/RAM baseband, then multiply strictly by PUE overhead to isolate total breaker capacity needed per rack."
  common_mistake: |
    **The Pitfall:** Forgetting to multiply by the PUE or forgetting to include the host system overhead.
    **The Rationale:** It's easy to focus solely on the TDP of the star component (the GPUs) and ignore the auxiliary infrastructure that keeps them running.
    **The Consequence:** Underestimating datacenter power requirements, leading to tripped breakers and severe facility cooling failures.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 8x A100 @ 400W each
       - Host logic: 1000W
       - PUE: 1.25
    2. **Calculations:**
       - GPU Power = 8 * 400 = 3200 W
       - Base IT Load = 3200 + 1000 = 4200 W
       - Total Draw = 4200 * 1.25 = 5250 W
    3. **Conclusion & Interpretation:**
       - **Result: Power-Bound (5.25 kW)**
