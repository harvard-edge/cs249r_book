title: Global New 0015
scenario: A datacenter rack is populated with an 8x A100 GPU server. Each A100 consumes 400W at peak, and the host system (CPU/RAM/fans) consumes an additional 1000W. The datacenter PUE is 1.25.
question: What facility power does an 8x A100 server draw after adding host power and applying a PUE of 1.25?
details:
  realistic_solution: Total IT load is the sum of the power consumed by all GPUs and the host system. The Power Usage Effectiveness (PUE) accounts for overhead like cooling and power delivery. Multiply the total IT load by the PUE to get the total facility power draw for the rack.
  common_mistake: |
    **The Pitfall:** Forgetting to multiply by the PUE or forgetting to include the host system overhead.
    **The Rationale:** It's easy to focus solely on the TDP of the star component (the GPUs) and ignore the auxiliary infrastructure that keeps them running.
    **The Consequence:** Underestimating datacenter power requirements, leading to tripped breakers and severe facility cooling failures.
  napkin_math: |
    - GPU Power = 8 * 400W = 3200W.
    - IT Load = 3200W + 1000W (host) = 4200W.
    - Total Facility Power = 4200W * 1.25 (PUE) = 5250W.
    - **The total facility power draw is 5.25 kW.**
