title: Mysterious 15% Throughput Drop at Noon
scenario: Your 64-GPU training cluster consistently shows 15% lower throughput between 11 AM and 3 PM
  compared to nighttime performance. GPU utilization stays at 98%. No other jobs are running. The cluster
  is in a shared data center facility. What is happening?
details:
  realistic_solution: 'Root cause: thermal throttling due to elevated ambient temperature during peak
    daytime hours. The data center''s cooling system struggles to maintain inlet temperature during hot
    afternoons, especially if it''s summer or the facility uses economizer (free cooling) mode. When GPU
    junction temperature exceeds 83°C (A100 throttle point), the GPU reduces clock frequency to prevent
    thermal damage, directly reducing FLOPS. At 98% utilization, the GPU is fully busy — just at a lower
    clock. Diagnosis: (1) Check GPU temperature logs — nvidia-smi shows temp hitting 83-87°C during the
    day vs 70-75°C at night. (2) Check clock frequencies — GPU clock drops from 1410 MHz to ~1200 MHz
    (15% reduction matches the throughput drop). (3) Check facility CRAC (computer room air conditioning)
    inlet temperature — likely rising from 20°C to 28°C during peak hours. Fix: (1) lower GPU power limit
    to 350W (reduces peak temp by ~5°C with ~8% performance loss, but eliminates throttling for net gain),
    (2) request the facility lower the cold aisle temperature setpoint, (3) add supplemental cooling (rear-door
    heat exchangers), (4) long-term: migrate to direct liquid cooling which is immune to ambient temperature
    fluctuations.'
  common_mistake: Suspecting a software issue (cron job, log rotation) because the time correlation seems
    too coincidental for hardware. But the 11 AM - 3 PM window correlates with peak ambient temperature,
    which is a hardware signal.
  napkin_math: 'GPU clock: 1410 MHz → 1200 MHz = 15% reduction. Thermal headroom: 83°C throttle - 75°C
    night = 8°C margin. Daytime: ambient +8°C → junction hits 83°C → throttle. Power limit 350W/400W:
    12.5% power cut → ~5°C junction temp drop → no throttle → net +3% vs current daytime.'
