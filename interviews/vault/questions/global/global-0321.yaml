title: Latency Budget Arithmetic
scenario: A request path has 35 ms preprocessing, 80 ms model execution, 45 ms queueing, and 20 ms network time.
question: "What is the end-to-end latency and remaining headroom against a 200 ms SLO?"
details:
  realistic_solution: 'End-to-end latency is 35 + 80 + 45 + 20 = 180 ms. Headroom is 20 ms. The system meets the SLO but has little room for tail spikes or cold starts.'
  common_mistake: |
    **The Pitfall:** Looking only at model execution time and ignoring queueing and network time.
    **The Rationale:** Candidates focus on the most complex component (the model) and neglect the broader system latency factors.
    **The Consequence:** Designing systems that appear to meet SLAs in isolation but fail dramatically in real-world end-to-end scenarios.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 200 ms SLO target.
       - Components: 35ms (pre), 80ms (model), 45ms (queue), 20ms (net).
    2. **Calculations:**
       - Total Latency = 35 + 80 + 45 + 20 = 180 ms.
       - Headroom = 200 - 180 = 20 ms.
    3. **Conclusion & Interpretation:**
       - **Result: 20 ms Headroom.** Dangerously close to missing SLO under mild queueing spikes.
