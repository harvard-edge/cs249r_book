title: Latency Budget Arithmetic
scenario: A request path has 35 ms preprocessing, 80 ms model execution, 45 ms queueing,
  and 20 ms network time. Calculate end-to-end latency and remaining headroom against
  a 200 ms SLO.
question: What is the end-to-end latency and remaining headroom against a 200 ms SLO?
details:
  realistic_solution: End-to-end latency is 35 + 80 + 45 + 20 = 180 ms. Headroom is
    20 ms. The system meets the SLO but has little room for tail spikes or cold starts.
  common_mistake: Looking only at model execution time and ignoring queueing and network
    time.
  napkin_math: Total = 180 ms. Headroom = 200 - 180 = 20 ms.
