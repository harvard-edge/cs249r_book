title: MoE Weight Fetching Bottleneck
scenario: Your startup is serving an 8x7B Mixture-of-Experts (MoE) model for code generation. At batch size 1 (interactive local testing), the token generation rate is 8 tokens/sec, far below the 40 tokens/sec SLA. Profiling reveals the GPU compute units are idle 90% of the time.
question: Why is the 8x7B MoE stuck at 8 tokens/sec at batch size 1, and how would you reach the 40 tokens/sec SLA?
details:
  realistic_solution: 'At batch size 1, autoregressive decoding is memory-bandwidth bound (low arithmetic intensity). For an MoE, each token routes to a subset of experts (e.g., 2 out of 8). The GPU must fetch the weights of these specific experts from HBM to SRAM for every single token. To hit the SLA, we must increase arithmetic intensity or reduce memory footprint. Solutions: 1) Implement continuous batching to serve multiple requests concurrently, amortizing the cost of fetching expert weights across multiple tokens. 2) If strictly single-user, apply 4-bit weight-only quantization (e.g., AWQ/GPTQ) to reduce the HBM read volume by 4x. 3) Implement speculative decoding, which processes multiple tokens in a single forward pass, fetching the massive expert weights once for a batch of draft tokens.'
  common_mistake: |
    **The Pitfall:** Focusing on optimizing the attention kernel or upgrading the CPU.
    **The Rationale:** Candidates ignore the memory hierarchy and don't realize that batch size 1 MoE decoding is fundamentally bottlenecked by HBM memory bandwidth.
    **The Consequence:** Spending engineering effort on compute optimizations that yield zero performance improvement.
  napkin_math: |
    - 8x7B MoE params = 56B (~112GB in FP16).
    - Active params per token (2 experts + dense layers) = ~14B params = 28GB in FP16.
    - HBM bandwidth on A100 = ~2000 GB/s.
    - Time to read 28GB = 28 / 2000 = 14ms per token.
    - Theoretical max = 1000ms / 14ms = 71 tokens/sec (real-world overhead drops this to 8-10).
    - Quantizing to 4-bit reduces active payload to 7GB.
    - Time to read 7GB = 7 / 2000 = 3.5ms per token.
    - **Theoretical max with 4-bit = 285 tokens/sec, easily meeting the 40 tokens/sec SLA.**
