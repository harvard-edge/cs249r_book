title: Incomplete Power Envelope Decision
scenario: A product manager asks whether to run a model locally on device or in cloud to save energy. They provide model FLOPs but omit device active power, idle power, network radio energy, cloud PUE, utilization, and request frequency.
question: What information is missing before deciding whether local or cloud inference saves energy?
details:
  realistic_solution: You need local active and idle power, runtime, radio transmit/receive energy, cloud accelerator energy per request, PUE, utilization, and request frequency. FLOPs alone cannot decide energy because data movement and idle power may dominate.
  common_mistake: Comparing only model FLOPs and assuming lower compute always means lower energy.
  napkin_math: Local energy = active_power x runtime + radio_energy if sync is needed. Cloud facility energy = accelerator_IT_energy x PUE for the request share, plus network energy. Missing terms can flip the decision.
