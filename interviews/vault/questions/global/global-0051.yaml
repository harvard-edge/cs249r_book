title: MLPerf Execution Scenarios
scenario: MLPerf Inference defines four execution scenarios (Offline, Server, SingleStream, and MultiStream).
question: Why does MLPerf Inference need four separate scenarios, and what system property does each stress?
details:
  realistic_solution: Each scenario tests a different deployment reality. Offline measures maximum throughput when all data is available upfront — this stresses raw compute (FLOPS). Server measures throughput under a Poisson arrival process with latency constraints — this stresses queuing behavior and tail latency. SingleStream measures the latency of one request at a time with no batching — this stresses end-to-end pipeline overhead. MultiStream measures how many concurrent streams can be served — this stresses memory bandwidth and parallelism. A system that tops the Offline leaderboard may fail the Server scenario because it cannot handle bursty arrivals within SLA.
  common_mistake: |
    **The Pitfall:** Assuming "throughput is throughput" and that all inference workloads look the same.
    **The Rationale:** Believing an accelerator with high offline throughput will naturally excel at real-time serving.
    **The Consequence:** Deploying a system that tops the leaderboard in raw FLOPS but fails SLAs in production due to queuing and tail latency.
  napkin_math: |
    - Offline mode (perfect batching): e.g., 10,000 samples/sec.
    - Server mode (latency constraint < 15ms): e.g., 3,000 samples/sec.
    - **Throughput penalty:** The 3.3x gap quantifies the cost of strict latency constraints.
