title: Why Kernel Fusion Matters
scenario: You are optimizing a model's inference performance by fusing multiple operations into a single kernel.
question: "What is kernel fusion, why does it improve GPU performance, and what primary bottleneck does it eliminate?"
details:
  realistic_solution: 'Kernel fusion combines multiple GPU operations (kernels) into a single kernel, eliminating intermediate writes and reads to HBM. Without fusion, a sequence like y = ReLU(LayerNorm(x + bias)) requires: (1) write x+bias to HBM, (2) read it back for LayerNorm, (3) write LayerNorm output to HBM, (4) read it back for ReLU — 4 HBM round-trips for the intermediate tensors. Fused: one kernel reads x and bias, computes the entire chain in registers/SRAM, writes only the final result — 1 HBM write. Since HBM access costs ~100x more energy and ~300x more latency than register access, fusion can speed up memory-bound operations by 2-4x. Tools like torch.compile, Triton, and XLA perform this automatically.'
  common_mistake: 'Thinking kernel fusion saves compute. It saves memory bandwidth by eliminating intermediate round-trips to HBM between elementwise operations.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Target sequence: y = ReLU(LayerNorm(x + bias)).
    - 4096-dim hidden state (8 KB per vector at FP16).
    
    **Calculations:**
    - Unfused operations: 4 HBM reads + 4 HBM writes.
    - Unfused memory movement: 8 * 4096 * 2B = 64 KB.
    - Fused operation: 1 HBM read + 1 HBM write.
    - Fused memory movement: 2 * 4096 * 2B = 16 KB.
    
    **Conclusion & Interpretation:**
    - **Result: 4x Bandwidth Reduction (Memory-Bandwidth Bound)**. Kernel fusion eliminates intermediate global memory trips by keeping intermediate activations in fast SRAM/registers, heavily accelerating element-wise memory-bound workloads.
