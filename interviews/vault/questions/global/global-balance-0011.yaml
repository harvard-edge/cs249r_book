title: Network Payload Rate Arithmetic
scenario: A service sends 12,000 requests/s to a downstream model. Each request carries 48 KB of features and receives 12 KB of scores. Calculate total bidirectional traffic.
question: What total network traffic comes from 12,000 requests/s with 48 KB sent and 12 KB returned per request?
details:
  realistic_solution: Each request moves 60 KB total. At 12,000 requests/s, traffic is 720,000 KB/s, or about 720 decimal MB/s before retries, fanout, and protocol overhead.
  common_mistake: Counting only request payloads and forgetting response traffic.
  napkin_math: Per request = 48 + 12 = 60 KB. Traffic = 60 x 12,000 = 720,000 KB/s ≈ 720 decimal MB/s.
