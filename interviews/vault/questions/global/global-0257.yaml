title: GPU-Hour Cost Decomposition
scenario: An A100 cloud instance costs $3.00/GPU-hour. What are the approximate cost components (hardware
  amortization, electricity, cooling, networking, staff) that make up this price?
question: "What are the approximate cost components (hardware amortization, electricity, cooling, networking, staff) that make up this price?"
details:
  realistic_solution: 'Approximate decomposition of a $3.00/GPU-hour A100 instance: Hardware amortization:
    ~$1.50-1.80 (50-60%). An A100 GPU costs ~$15K, server total ~$200K for 8 GPUs. Over 3 years = $200K
    / (3×8760h×8) ≈ $0.95/GPU-hour for hardware alone, but cloud providers add margin. Electricity: ~$0.30-0.45
    (10-15%). 400W × $0.06/kWh = $0.024/h raw power, but PUE of 1.2 and facility costs push this up. Networking
    + storage: ~$0.15-0.30 (5-10%). Facility + cooling: ~$0.15-0.30 (5-10%). Staff + operations: ~$0.15-0.30
    (5-10%). Cloud provider margin: ~$0.30-0.60 (10-20%). Understanding this breakdown reveals why spot
    instances (50-70% discount) exist — the hardware depreciates whether it runs or not.'
  common_mistake: Assuming electricity is the dominant cost. In reality, hardware amortization (GPU depreciation)
    dominates cloud GPU pricing at 50-60% of the total.
  napkin_math: 'A100 server ~$200K / (3yr × 8760h × 8 GPUs) = $0.95/GPU-hr hardware cost. Electricity:
    400W × $0.06/kWh × 1.2 PUE = $0.029/hr. Margin + ops doubles the base cost → $3.00/hr.'
