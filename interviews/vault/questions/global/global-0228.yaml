title: When INT8 Quantization Hurts More Than It Helps
scenario: You quantize a 7B model to INT8. Perplexity degrades by only 0.3 (acceptable). However, on your
  specific RAG application, factual accuracy drops from 89% to 71%. The benchmark suite shows minimal
  degradation. Analyze why application-level metrics diverge from perplexity.
details:
  realistic_solution: 'Quantization error distributes unevenly across weight matrices. Layers responsible
    for factual recall (early MLP layers encoding knowledge, attention heads specializing in entity resolution)
    may lose critical precision. Perplexity averages over all tokens, masking that rare factual tokens
    are disproportionately affected. The fix: (1) Use mixed-precision quantization — keep knowledge-critical
    layers in FP16, quantize attention and normalization layers to INT8. (2) Evaluate on task-specific
    metrics, not just perplexity. (3) Consider GPTQ or AWQ which use calibration data to minimize task-relevant
    quantization error. (4) Sensitivity analysis: quantize one layer at a time and measure per-layer impact
    on your specific task.'
  common_mistake: Trusting perplexity as a sufficient proxy for task performance. Perplexity measures
    average next-token prediction, which can mask catastrophic failures on specific knowledge-intensive
    tasks.
  napkin_math: 7B model has 32 layers. If 4 layers are 'knowledge layers' responsible for 80% of factual
    accuracy, keeping those in FP16 costs only 4/32 × 7 GB = 0.875 GB extra but may recover most accuracy.
