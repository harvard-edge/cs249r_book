title: When INT8 Quantization Hurts More Than It Helps
scenario: You quantize a 7B model to INT8. Perplexity degrades by only 0.3, but RAG factual accuracy drops from 89% to 71%. The benchmark suite shows minimal degradation.
question: "Why can INT8 quantization preserve perplexity yet drop RAG factual accuracy from 89% to 71%, and what should you do?"
details:
  realistic_solution: 'Quantization error distributes unevenly across weight matrices. Layers responsible for factual recall (early MLP layers encoding knowledge, attention heads specializing in entity resolution) may lose critical precision. Perplexity averages over all tokens, masking that rare factual tokens are disproportionately affected. The fix: (1) Use mixed-precision quantization — keep knowledge-critical layers in FP16, quantize attention and normalization layers to INT8. (2) Evaluate on task-specific metrics, not just perplexity. (3) Consider GPTQ or AWQ which use calibration data to minimize task-relevant quantization error. (4) Sensitivity analysis: quantize one layer at a time and measure per-layer impact on your specific task.'
  common_mistake: |
    **The Pitfall:** Trusting perplexity as a sufficient proxy for task performance.
    **The Rationale:** Perplexity is standard and easy to compute, measuring average next-token prediction over the whole vocabulary.
    **The Consequence:** Masking catastrophic failures on rare factual tokens, deploying an unusable model for knowledge-intensive applications.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 7B model, 32 layers.
       - INT8 quantization applied uniformly.
       - Factual recall depends heavily on ~4 early MLP layers/attention heads.
    2. **Calculations:**
       - Keeping 4 critical layers in FP16 (Mixed Precision).
       - Extra memory cost: (4/32) * 7 GB = ~0.875 GB.
    3. **Conclusion & Interpretation:**
       - **Sacrificing ~1 GB of VRAM for FP16 on critical layers recovers factual accuracy.**
       - **Result: Precision-Bound Accuracy Drop**
