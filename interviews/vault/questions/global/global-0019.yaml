title: SRAM vs DRAM Characteristics
scenario: You are designing a custom accelerator for deep learning and must choose between SRAM and DRAM for on-chip buffers. SRAM has lower density compared to DRAM.
question: "Why is SRAM typically used for on-chip buffers instead of DRAM in deep learning accelerators, despite its lower density?"
details:
  realistic_solution: 'SRAM is much faster and requires less power per access than DRAM because it does not require periodic refresh cycles. This makes it ideal for high-bandwidth, low-latency on-chip memory buffers, even though it takes up more physical area per bit.'
  common_mistake: 'Assuming DRAM is faster for on-chip operations or that SRAM is cheaper to manufacture.'
  napkin_math: |
    **Assumptions & Constraints:**
    - On-chip accelerator memory requires maximum throughput and minimum latency for intermediate activations.
    
    **Calculations:**
    - SRAM access latency: ~1 ns.
    - SRAM access energy: ~5 pJ/access.
    - DRAM access latency: ~50-100 ns.
    - DRAM access energy: ~200 pJ/access.
    
    **Conclusion & Interpretation:**
    - **Result: 40x More Energy Efficient (Memory Latency/Power Bound)**. SRAM is 50-100x faster and requires vastly less power per access due to the lack of refresh cycles, making it mandatory for local on-chip buffers despite its larger silicon area.
  options:
  - DRAM has higher latency but significantly higher bandwidth per pin than SRAM.
  - SRAM is denser and allows for larger on-chip memory capacity compared to DRAM.
  - SRAM provides lower latency and higher bandwidth without the need for periodic refresh cycles, unlike DRAM.
  - DRAM is volatile while SRAM is non-volatile, making SRAM better for persistent weights.
  correct_index: 2
