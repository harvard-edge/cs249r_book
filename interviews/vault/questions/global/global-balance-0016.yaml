title: Topology-Aware Placement Rule
scenario: A distributed inference service can place 8 model shards within one NVLink node or across two InfiniBand-connected nodes. Design a placement rule that minimizes communication bottlenecks.
question: How should an inference scheduler place 8 model shards to avoid topology-induced communication bottlenecks?
details:
  realistic_solution: Prefer placing tightly communicating shards within the fastest local interconnect domain. Spill across nodes only when memory or availability requires it, and account for the slower inter-node bandwidth and higher latency. Placement should optimize communication graph locality, not just free GPU count.
  common_mistake: Scheduling shards onto any free GPUs and discovering that cross-node communication dominates latency.
  napkin_math: The exact ratio depends on hardware, but intra-node accelerator fabrics can provide hundreds of GB/s while a single inter-node NIC may provide tens of GB/s effective bandwidth. Crossing nodes can therefore create an order-of-magnitude communication penalty for shard exchanges.
