title: The Ridge Point Logic
scenario: If an accelerator has 989 TFLOPS of compute and 2 TB/s of memory bandwidth, what is its ridge
  point?
details:
  realistic_solution: 500 Ops/Byte (or equivalently, 500 FLOPS per byte of memory traffic). The ridge
    point is computed as Peak Compute / Peak Bandwidth = 989 TFLOPS / 2 TB/s = 500 Ops/Byte. Workloads
    with arithmetic intensity below this threshold are memory-bound (limited by how fast data arrives),
    while workloads above are compute-bound (limited by ALU throughput). For example, matrix multiplication
    at large sizes achieves ~200–1000 Ops/Byte and is typically compute-bound, while element-wise operations
    at ~1–2 Ops/Byte are deeply memory-bound. The ridge point shifts with each hardware generation — H100
    has ~530 Ops/Byte vs A100's ~208.
  common_mistake: Mixing units or assuming the ridge point is a fixed number across all hardware. It is
    a ratio of compute to bandwidth.
  napkin_math: 989 TFLOPS / 2,000 GB/s = 500 FLOPs per Byte.
