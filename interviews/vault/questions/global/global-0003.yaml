title: The Ridge Point Logic
scenario: An accelerator has 989 TFLOPS of compute and 2 TB/s of memory bandwidth.
question: "What is the ridge point of this accelerator?"
details:
  realistic_solution: 494.5 Ops/Byte (or equivalently, 494.5 FLOPS per byte of memory traffic). The ridge point is computed as Peak Compute / Peak Bandwidth = 989 TFLOPS / 2 TB/s = 494.5 Ops/Byte. Workloads with arithmetic intensity below this threshold are memory-bound (limited by how fast data arrives), while workloads above are compute-bound (limited by ALU throughput).
  common_mistake: |
    **The Pitfall:** Mixing units or assuming the ridge point is a fixed number across all hardware.
    **The Rationale:** Misunderstanding the Roofline model's reliance on hardware-specific ratios.
    **The Consequence:** Incorrectly predicting whether a model will be compute or memory bound on new hardware.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Peak Compute = 989 TFLOPS.
       - Peak Bandwidth = 2,000 GB/s (2 TB/s).
    2. **Calculations:**
       - Ridge Point = 989 * 10^12 FLOPs / (2,000 * 10^9 Bytes).
       - 989 / 2.0 = 494.5.
    3. **Conclusion & Interpretation:**
       - **Result: 494.5 FLOPs/Byte**. The workload must execute at least 494.5 FLOPs for every byte loaded to saturate compute.
