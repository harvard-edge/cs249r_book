title: Spot Instance Strategy for Fault-Tolerant Training
scenario: On-demand H100 instances cost $3.50/hr. Spot instances cost $1.10/hr but get preempted on average
  every 2 hours. Your training step takes 500 ms and checkpointing takes 3 minutes. Analyze whether spot
  instances are cost-effective for a 100-hour training run.
details:
  realistic_solution: 'On-demand: 100h × $3.50 = $350. Spot analysis: MTBF = 2h. Optimal checkpoint interval
    = sqrt(2 × 120min × 3min) = 26.8 min. Overhead per cycle: checkpoint = 3/26.8 = 11.2%. Wasted work
    per preemption = 26.8/2 = 13.4 min. Preemptions in 100h effective compute: ~50. Total wasted = 50
    × 13.4 min = 670 min = 11.2h. Checkpoint overhead = 11.2% × 100h = 11.2h. Real clock time = 100 +
    11.2 + 11.2 = 122.4h. Spot cost = 122.4 × $1.10 = $134.64. Savings = $350 - $135 = $215 (61% savings).
    Spot is clearly worth it IF your framework supports preemption gracefully.'
  common_mistake: Simply comparing hourly rates. You must account for wasted compute from preemptions
    and the cost of frequent checkpointing.
  napkin_math: 'Spot: ~122h total clock time × $1.10 = $135. On-demand: 100h × $3.50 = $350. Savings:
    61%. Break-even: spot is cheaper if preemption overhead < (3.50-1.10)/3.50 = 69% of training time.'
