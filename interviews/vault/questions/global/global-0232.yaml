title: Spot Instance Strategy for Fault-Tolerant Training
scenario: On-demand instances cost $3.50/hr. Spot instances cost $1.10/hr but get preempted on average every 2 hours. Your training step takes 500 ms and checkpointing takes 3 minutes.
question: How would you analyze whether spot instances are cost-effective for a 100-hour training run?
details:
  realistic_solution: 'On-demand: 100h * $3.50 = $350. Spot MTBF = 2h. Optimal checkpoint interval = sqrt(2 * 120min * 3min) = 26.8 min. Overhead per cycle: checkpoint = 3/26.8 = 11.2%. Wasted work per preemption = 26.8/2 = 13.4 min. Preemptions in 100h: ~50. Total wasted = 50 * 13.4 min = 11.2h. Checkpoint overhead = 11.2% * 100h = 11.2h. Real clock time = 100 + 11.2 + 11.2 = 122.4h. Spot cost = 122.4 * $1.10 = $134.64. Savings = $215 (61%).'
  common_mistake: |
    **The Pitfall:** Simply comparing hourly rates without modeling preemption penalties.
    **The Rationale:** Assuming the orchestrator perfectly pauses and resumes jobs without losing progress.
    **The Consequence:** Cost overruns or massively delayed project deadlines because wasted compute wasn't factored in.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Spot MTBF = 120 min. Checkpoint cost = 3 min.
       - Target = 100 hours compute.
    2. **Calculations:**
       - Optimal interval = sqrt(2 * 120 * 3) = 26.8 min.
       - Preemption waste + Checkpoint overhead = 22.4 hours.
       - Total Spot time = 122.4 hours * $1.10 = $135.
       - On-demand time = 100 hours * $3.50 = $350.
    3. **Conclusion & Interpretation:**
       - **Result: Overhead-Adjusted Savings (61%)**
