title: Global New 0010
scenario: A tiny keyword spotting model is being deployed to a Cortex-M4 microcontroller with 256KB of SRAM. If 100KB is strictly reserved for the OS and activations.
question: What is the largest INT8 keyword-spotting model that can fit in the remaining SRAM of a Cortex-M4 device?
details:
  realistic_solution: Microcontrollers lack complex memory hierarchies and operate strictly within SRAM limits. Deduct the memory required for the OS and dynamic activations from the total SRAM. The remaining memory is the capacity for the model weights, which directly translates to INT8 parameter count.
  common_mistake: |
    **The Pitfall:** Assuming parameters are 32-bit (FP32) or 16-bit (FP16), dividing the available bytes by 4 or 2 respectively.
    **The Rationale:** Standard frameworks train in FP32/FP16, and developers forget that edge deployment rigorously packs weights into 8-bit integers.
    **The Consequence:** Unnecessarily shrinking the model architecture, resulting in poor keyword spotting accuracy when vastly more parameters could have fit.
  napkin_math: |
    - Total SRAM = 256 KB.
    - Reserved SRAM = 100 KB.
    - Available for weights = 256 KB - 100 KB = 156 KB.
    - 1 INT8 parameter = 1 Byte.
    - Max Parameters = 156 KB * 1024 Bytes/KB = 159,744.
    - **The model can have an absolute maximum of 159,744 INT8 parameters.**
