title: Global New 0010
scenario: A tiny keyword spotting model is being deployed to a Cortex-M4 microcontroller with 256KB of
  SRAM. If 100KB is strictly reserved for the OS and activations, calculate the absolute maximum number
  of INT8 parameters the model can have.
question: "What is the largest INT8 keyword-spotting model that can fit in the remaining SRAM of a Cortex-M4 device?"
details:
  realistic_solution: Microcontrollers lack complex memory hierarchies and operate strictly within SRAM
    limits. Deduct the memory required for the OS and dynamic activations from the total SRAM. The remaining
    memory is the capacity for the model weights, which directly translates to INT8 parameter count.
  common_mistake: Assuming parameters are 32-bit (FP32) or 16-bit (FP16), dividing the available bytes
    by 4 or 2 respectively.
  napkin_math: Total SRAM = 256KB. Reserved = 100KB. Available for weights = 256KB - 100KB = 156KB. Since
    1 INT8 parameter = 1 Byte, Max Parameters = 156,000.
