title: Cache Thrashing & Matrix Operations
scenario: You are writing a custom CUDA kernel for matrix multiplication and notice severe performance degradation along with an excessively high L2 cache miss rate.
question: What architectural issue likely causes severe slowdown and high L2 miss rates in a custom CUDA matmul kernel, and how would you resolve it?
details:
  realistic_solution: The high miss rate is likely caused by cache thrashing due to poor spatial locality. This can be resolved by implementing loop tiling or blocking, which breaks the matrix into smaller sub-blocks that fit neatly inside the cache.
  common_mistake: |
    **The Pitfall:** Suggesting faster memory or assuming the GPU cache is malfunctioning.
    **The Rationale:** Engineers don't realize how small the L2 cache is relative to the matrix size.
    **The Consequence:** They throw more hardware at the problem instead of fixing the memory access pattern via algorithmic blocking.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Multiplying two 4096x4096 FP32 matrices.
       - Standard GPU L2 Cache: ~40MB.
    2. **Calculations:**
       - Matrix size = 4096^2 * 4 bytes = 67MB each.
       - Combined size = 134MB >> 40MB L2 cache.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound (Thrashing).** Using 32x32 tiles (4KB) ensures active blocks fit securely in L1/L2, turning O(N^3) memory accesses into O(N^3/B) and reducing misses.
  options:
  - The 67MB matrices perfectly fit into the 40MB L2 cache, meaning the misses are a profiling artifact.
  - Poor spatial locality is causing cache lines to be evicted before they can be fully utilized; breaking into 4KB tiles resolves this.
  - The 4096-thread block size exceeds the L2 capacity of 32 threads, causing automatic bypass.
  - The memory controller limits L2 bandwidth to 67MB/s, requiring execution throttling.
