title: Cache Thrashing & Matrix Operations
scenario: You are writing a custom CUDA kernel for matrix multiplication and notice severe performance degradation along with an excessively high L2 cache miss rate.
question: "What architectural issue likely causes severe slowdown and high L2 miss rates in a custom CUDA matmul kernel, and how would you resolve it?"
details:
  realistic_solution: The high miss rate is likely caused by cache thrashing due to poor spatial locality (e.g., strided accesses). This can be resolved by implementing loop tiling or blocking, which breaks the matrix into smaller sub-blocks that fit neatly inside the cache, maximizing data reuse before eviction.
  common_mistake: |
    **The Pitfall:** Suggesting faster memory or assuming the GPU cache is malfunctioning.
    **The Rationale:** Engineers don't realize how small the L2 cache is relative to the matrix size.
    **The Consequence:** They throw more hardware at the problem instead of fixing the memory access pattern.
  napkin_math: |
    - Multiplying two 4096x4096 FP32 matrices requires 4096² * 4B = 67MB each.
    - This far exceeds the A100's 40MB L2 cache, causing thrashing.
    - **Using 32x32 tiles (4KB) ensures active blocks fit in L1/L2, turning O(N³) memory accesses into O(N³/B) and drastically reducing L2 misses.**
  options:
  - The matrices are small enough to fit exclusively in L1 cache, causing the L2 cache to be completely bypassed and register high miss rates.
  - Poor spatial locality is causing cache lines to be evicted before they can be fully utilized; this can be mitigated by loop tiling (blocking).
  - The GPU is running too many threads simultaneously, which dynamically disables the L2 cache hardware to save power.
  - The memory controller is bottlenecked by high bandwidth requests, requiring the warp scheduler to throttle execution.
