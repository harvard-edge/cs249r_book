title: Designing Hierarchical Wake-Up Pipelines for Mobile NPU
scenario: An always-on health app on an iPhone 15 uses the A17 Pro Neural Engine (35
  TOPS, ~1W active) to classify anomalies in accelerometer data. Continuous inference
  drains the battery rapidly.
question: Design a duty-cycled pipeline using a low-power CPU threshold to trigger
  the Neural Engine, quantifying the expected power savings.
details:
  realistic_solution: Use the CPU efficiency cores to run a lightweight heuristic
    (e.g., variance thresholding) at 100 Hz, consuming microwatts. Only wake the A17
    NPU when the threshold is crossed. If anomalies occur 5% of the time, the NPU
    active duty cycle drops from 100% to 5%, saving roughly 95% of the ML power draw.
  common_mistake: Failing to account for the wake-up overhead or designing a complex
    first-stage model that consumes just as much power.
  napkin_math: 0.05 * 1W + 0.95 * 0.01W = ~0.06W vs 1.0W continuous
