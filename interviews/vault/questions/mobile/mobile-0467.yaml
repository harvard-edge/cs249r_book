title: The Mobile Battery Drainer
scenario: You are a mobile ML engineer optimizing a new real-time object detection model for a flagship phone using an Apple A17 Pro chip. The model requires 70 GOps per inference and has 350 MB of weights. Users complain about severe battery drain and UI 'jank' when the feature is active.
question: Why does a 70 GOps model with 350 MB of weights drain battery and leave the A17 Pro NPU underutilized?
details:
  realistic_solution: The model is **memory-bound**. To determine this, we calculate the model's Arithmetic Intensity (AI) and compare it to the hardware's ridge point. AI = 70 GOps / 350 MB = 200 Ops/Byte. The A17 Pro ridge point is 35 TOPS / 51.2 GB/s ≈ 684 Ops/Byte. Since 200 < 684, the NPU spends most of its time waiting for memory, causing constant DRAM traffic that drains the battery.
  common_mistake: |
    **The Pitfall:** Focusing only on peak TOPS and ignoring memory access patterns.
    **The Rationale:** Engineers assume a high TOPS number solves everything, failing to calculate if the model has enough arithmetic intensity to keep the compute units fed.
    **The Consequence:** Models that constantly thrash main memory, leading to terrible battery drain and slow performance.
  napkin_math: |
    1. **Arithmetic Intensity (AI):** 70 GOps / 350 MB = 200 Ops/Byte.
    2. **Hardware Ridge Point:** 35 TOPS / 51.2 GB/s ≈ 684 Ops/Byte.
    3. **Regime:** AI (200) < Ridge Point (684), so the model is **memory-bound**.
    4. **Latency:** Compute = 70 GOps / 35 TOPS = 2 ms. Memory = 350 MB / 51.2 GB/s = 6.8 ms.
    5. **Utilization:** Effective TOPS = 200 * 51.2 = 10.24 TOPS. Utilization = 10.24 / 35 = 29%.
    6. **Conclusion:** **The battery drain comes from continuous DRAM access, while the NPU sits 71% idle.**
  options:
  - The model is compute-bound because its 70 G-ops overwhelm the A17's 35 TOPS compute capacity.
  - The model is memory-bound. The AI calculation (350MB / 70 G-ops) shows it is limited by data transfer.
  - The model is memory-bound because its Arithmetic Intensity (200 Ops/Byte) is far below the A17 Pro's ridge point (~683 Ops/Byte).
  - The model is compute-bound because its Arithmetic Intensity of 200 Ops/Byte is a high number, meaning it is computationally complex.
