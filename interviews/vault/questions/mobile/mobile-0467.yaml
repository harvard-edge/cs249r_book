title: The Mobile Battery Drainer
scenario: You are a mobile ML engineer optimizing a new real-time object detection model for a flagship
  phone using an Apple A17 Pro chip. The model requires 70 GOps per inference and has 350 MB of weights.
  Users complain about severe battery drain and UI 'jank' (stuttering) when the feature is active.
question: "Why does a 70 GOps model with 350 MB of weights drain battery and leave the A17 Pro NPU underutilized?"
details:
  realistic_solution: The model is **memory-bound**. To determine this, we calculate the model's Arithmetic
    Intensity (AI) and compare it to the hardware's ridge point. AI = 70 GOps / 350 MB = 200 Ops/Byte.
    The A17 Pro ridge point is 35 TOPS / 51.2 GB/s ≈ 684 Ops/Byte. Since 200 < 684, the NPU spends most
    of its time waiting for memory, causing constant DRAM traffic that drains the battery.
  common_mistake: Engineers often focus only on the peak TOPS of a mobile NPU, assuming more is always
    better. They fail to calculate if the model's memory access patterns can actually keep the NPU fed.
    A model with low arithmetic intensity will be memory-bound, making the peak TOPS irrelevant and leading
    to high battery drain from constant, expensive DRAM access.
  napkin_math: "1. **Calculate Arithmetic Intensity (AI):**\n   - Model: 350 MB of weights\n   - Ops per\
    \ inference: 70 GOps\n   - AI = 70 GOps / 350 MB = **200 Ops/Byte**\n2. **Calculate Hardware Ridge\
    \ Point:**\n   - Ridge Point = 35 TOPS / 51.2 GB/s ≈ **684 Ops/Byte**\n3. **Determine regime:**\n\
    \   - AI (200) < Ridge Point (684) → **memory-bound**\n4. **Calculate latency:**\n   - Compute time:\
    \ 70 GOps / 35 TOPS = 2 ms\n   - Memory time (bottleneck): 350 MB / 51.2 GB/s = **6.8 ms**\n5. **Calculate\
    \ NPU utilization:**\n   - Effective TOPS = AI × BW = 200 × 51.2 = 10.24 TOPS\n   - Utilization =\
    \ 10.24 / 35 = **29%**\n\nThe NPU is mostly idle, waiting for data from DRAM. The battery drain comes\
    \ from the memory system being continuously stressed. Fix: increase AI through operator fusion, weight\
    \ sharing, or more aggressive quantization."
  options:
  - The model is compute-bound because its 70 G-ops overwhelm the A17's 35 TOPS compute capacity.
  - The model is memory-bound. The AI calculation (350MB / 70 G-ops) shows it is limited by data transfer.
  - The model is memory-bound because its Arithmetic Intensity (200 Ops/Byte) is far below the A17 Pro's
    ridge point (~683 Ops/Byte).
  - The model is compute-bound because its Arithmetic Intensity of 200 Ops/Byte is a high number, meaning
    it is computationally complex.
  correct_index: 2
