title: The Mobile ML Telemetry Budget
scenario: Your photo app runs a style transfer model on-device. You want to collect telemetry — inference latency, confidence scores, model version, device thermal state — to monitor model health across 5 million DAU. Your analytics pipeline charges $4 per million events. The CFO says your ML telemetry budget is $500/month.
question: How do you design the telemetry system to keep ML telemetry for 5M DAU under a $500/month budget?
details:
  realistic_solution: Keep the bill under $500/month by reducing event volume before data leaves the phone. Aggregate inference latency, confidence histogram, model version, and thermal state into one compact daily summary event per sampled device. Use 2% stratified sampling across app version, model version, OS, and device class. Add anomaly escalation only for devices whose local summary crosses a threshold, capped at 0.5% of DAU per day. Do not log every inference; the cloud receives summaries and a bounded number of escalation events.
  common_mistake: |
    **The Pitfall:** Logging every inference and sampling server-side.
    **The Rationale:** Engineers lean on cloud-native logging habits without running the cost analysis at mobile scale.
    **The Consequence:** The resulting telemetry bill exceeds the budget by 24x, resulting in immediate shut down of the analytics pipeline.
  napkin_math: |
    **Assumptions & Constraints:**
    - 5M DAU, 4 raw inference telemetry events/device/day in the naive design, 30 days/month.
    - Sampled devices emit one aggregated daily summary event, not one event per inference.
    - Escalated devices emit at most one anomaly event per day, capped at 0.5% of DAU/day.
    - Analytics cost: $4 per 1M events.
    - Budget: $500/month.

    **Calculations:**
    - Naive Logging: 5M * 4 * 30 = 600M events = $2,400/month.
    - 2% sampled daily summaries: 5M devices * 0.02 * 1 summary/day * 30 days = 3M events/month.
    - Anomaly escalation cap: 5M devices * 0.005 * 1 escalation/day * 30 days = 0.75M events/month.
    - Total Events: 3M + 0.75M = 3.75M events/month.
    - Analytics Cost: 3.75M * $4 / 1M = $15/month.
    - Maximum events under budget: $500 / $4 per 1M = 125M events/month.

    **Conclusion & Interpretation:**
    - **Result: $15/month analytics event spend (Cost-Bound)**. The design is far below the 125M-event monthly budget ceiling because intelligence lives on-device and the cloud sees only sampled summaries plus capped escalations.
