title: On-Device ISP Concept Drift Detection
scenario: 'You are leading the ML reliability team for a flagship smartphone''s computational photography pipeline running on a dual-core NPU. The camera ISP continuously feeds 4K frames at 60 FPS into a scene-understanding model, but users are reporting degraded image enhancement in novel lighting conditions.'
question: 'How would you detect ISP concept drift without dropping 4K 60 FPS camera frames?'
details:
  realistic_solution: 'A robust L6+ architecture uses a lightweight projection head to compress high-dimensional NPU feature maps into low-dimensional signatures (e.g., running histograms) asynchronously using the secondary NPU core. These signatures are updated in the shared LPDDR5X memory and periodically aggregated to compute Population Stability Index (PSI) or KL Divergence against a reference baseline on the CPU, triggering a telemetry alert only when a drift threshold is breached.'
  common_mistake: |
    **The Pitfall:** Computing complex statistical divergences synchronously per-frame or logging raw vectors.
    **The Rationale:** Applying cloud-based batch MLOps telemetry pipelines to a strict real-time edge device.
    **The Consequence:** Causing latency spikes that blow the 16.6ms budget, dropping camera frames and destroying user experience.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 60 FPS Budget: 16.6 ms per frame.
       - Exynos NPU: 34.7 TOPS (9.7 TOPS free).
       - 10 min video session raw float32 embeddings = ~147 MB.
    2. **Calculations:**
       - Storing raw vectors: 1024 dims * 4 bytes * 60 FPS = 245 KB/s.
       - Running 64-bin integer histogram on NPU: 256 bytes total footprint.
    3. **Conclusion & Interpretation:**
       - **Result: Memory bandwidth drops to near zero (Asynchronous Streaming Aggregation).**
