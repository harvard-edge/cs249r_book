title: Diagnosing and Quantifying NPU Bottlenecks on Snapdragon 8 Gen 3 with Telemetry
scenario: "You've deployed a critical on-device inference pipeline, performing real-time object detection using a quantized model, onto mobile devices. Users are reporting intermittent UI freezes and slow response times, particularly during peak usage."
question: "How would you detect NPU stragglers, diagnose bottlenecks, and quantify optimization impact before rollout?"
details:
  realistic_solution: "Build an event-driven telemetry pipeline tracking hardware performance counters natively via the NPU SDK. Instrument layer-by-layer execution latencies and LPDDR5X bandwidth saturation metrics. Export localized latency histograms (tracking p99 stragglers) without causing system load. Implement a shadowing framework on a subset of users to A/B test quantization changes directly against observed on-device NPU metrics."
  common_mistake: |
    **The Pitfall:** Relying solely on high-level application logs and CPU/GPU metrics to diagnose NPU latency.
    **The Rationale:** Candidates use standard backend observability tools and fail to capture low-level NPU hardware performance counters.
    **The Consequence:** The team remains blind to the actual root cause (e.g., LPDDR5X memory contention or specific instruction stalls), leading to ineffective guess-and-check optimizations.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model operations: 5 billion INT8 ops. NPU Peak Compute: 45 TOPS.
       - P50 Latency: 50 ms. P99 Straggler Latency: 200 ms.
    2. **Calculations:**
       - Theoretical Minimum Inference Time = 5 billion ops / 45 TOPS ≈ 0.11 ms.
       - Wasted straggler time = 200 ms - 50 ms = 150 ms.
       - Lost inferences per straggler = 150 ms / 50 ms = 3 inferences.
    3. **Conclusion & Interpretation:**
       - **Result: Latency-Bound.** A single 200 ms straggler wastes the time equivalent of **3 full inferences**, severely degrading the user experience despite the massive theoretical headroom of the NPU.
