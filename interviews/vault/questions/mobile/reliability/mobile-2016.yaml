title: Snapdragon Checkpoint Resume
scenario: 'An application on the Snapdragon 8 Gen 3 performs on-device personalization overnight. The OS frequently suspends the app to save battery, forcing resumes from checkpoints.'
question: 'Analyze the resume-time overhead of JSON versus memory-mapped binary checkpoint formats. Identify the binding cost and quantify the resume-time difference.'
details:
  realistic_solution: 'JSON requires expensive string parsing, serialization, and memory allocation, blocking the CPU during resume cycles. A memory-mapped binary format allows the OS to page state directly from flash to RAM without deserialization overhead, drastically reducing wake time.'
  common_mistake: |
    **The Pitfall:** Assuming flash storage I/O speed is the only bottleneck for resuming checkpoints.
    **The Rationale:** Engineers overlook the massive CPU serialization cost and memory allocation overhead of text formats.
    **The Consequence:** Checkpoint resumes take too long and are killed by the OS watchdog timer.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Checkpoints must resume quickly to avoid OS kills.
       - JSON requires full deserialization via CPU.
       - Binary mmap pages directly from NVMe flash.
    2. **Calculations:**
       - T_resume_json = T_flash_read + T_parse + T_alloc.
       - T_resume_binary = T_flash_read (paged lazily via mmap).
    3. **Conclusion & Interpretation:**
       - **Result: T_resume_binary << T_resume_json (CPU Bottleneck for JSON).**
