title: iOS Memory Pressure Kills
scenario: A federated learning app trains on the NPU but crashes in the background due to memory pressure evictions.
question: Why does synchronous checkpointing of the 100MB model state during the system's memory-warning interrupt lead to corrupted or lost progress?
details:
  realistic_solution: The OS memory-warning interrupt may give very little time before suspending or killing the app. Synchronously writing 100MB to NAND flash is risky because the write can exceed the available window, so checkpointing should be incremental and atomic rather than starting a large blocking write during the warning path.
  common_mistake: |
    **The Pitfall:** Assuming the device will always wait for background tasks to complete.
    **The Rationale:** Candidates believe that background processes are given ample time to write to flash before being killed by the OS under memory pressure.
    **The Consequence:** Designing a synchronous checkpointing mechanism that results in corrupted or lost progress.
  napkin_math: |
    **Assumptions & Constraints:**
    - Checkpoint Size: 100 MB.
    - Storage Speed: ~500 MB/s.
    - Memory-warning window: short and variable under extreme pressure.

    **Calculations:**
    - Write Latency: 100 MB / 500 MB/s = 0.2 seconds.

    **Conclusion & Interpretation:**
    - **Result: unreliable warning-path checkpoint.** A 0.2s best-case write may be too slow for a short, variable memory-pressure window, so a synchronous full-state checkpoint risks lost progress or a partial file unless writes are incremental and atomically committed.
