title: 'Fault Tolerance: Specification — Reliability SLA for Mobile Payment ML Model'
scenario: You must write the reliability specification for an on-device fraud detection ML model used in a mobile payment app serving 5M transactions/day.
question: What reliability SLA should govern an on-device payment fraud model, including RTO, RPO, fail-safe behavior, and checkpoints?
details:
  realistic_solution: |
    Implement a fail-open transaction architecture: if model inference crashes, times out, or fails integrity checks, the payment flow must continue through deterministic fraud rules or server-side review instead of blocking the gateway. Set RTO < 500ms for detecting model failure and switching to fallback. Define RPO for model state, not transaction data: for an immutable packaged model, RPO is the last signed model version; for any on-device adaptive state, checkpoint after successful training or configuration updates so recovery loses at most the last uncommitted update. Store two signed model slots plus a small manifest, verify checksums at startup, and roll back to the previous slot on failure.
  common_mistake: |
    **The Pitfall:** Failing to specify fail-safe behavior or distinguishing between model failure and system crashes.
    **The Rationale:** Candidates focus entirely on ML metrics and forget that a broken model in a payment app cannot block the transaction flow.
    **The Consequence:** A model crash or OOM error prevents millions of users from paying, destroying business revenue.
  napkin_math: |
    **Assumptions & Constraints:**
    - Transaction Rate: 5M/day.
    - Maximum payment timeout (RTO): 500ms.
    - Fallback latency: < 1ms for rule-based heuristics.
    - False positive constraint: < 0.1%.
    - Adaptive model state is checkpointed only after successful update commits.

    **Calculations:**
    - 5,000,000 transactions / 86,400 seconds = ~58 transactions/sec.
    - 5,000,000 * 0.001 = 5,000 maximally allowed blocked valid transactions per day.
    - A 500ms model timeout at 58 transactions/sec can affect about 29 in-flight transactions before fallback must take over.
    - With checkpoint-on-commit, recovery may lose the current uncommitted adaptive update, but not the last signed model or last committed adapter checkpoint.

    **Conclusion & Interpretation:**
    - **Result: Reliability SLA**. The SLA should bound model failure recovery to <500ms, fail open to rules or review, preserve the last committed model/adaptive checkpoint, and keep false-positive behavior within the payment product's <0.1% constraint.
