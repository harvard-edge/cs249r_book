title: Drift Detection Strategies for Mobile NPU Deployments
scenario: Your team is developing a critical on-device machine learning application for real-time sensor data processing on a smartphone, utilizing the Snapdragon 8 Gen 3 Hexagon NPU. The model's performance is sensitive to data drift and concept drift. Architecture A (Server-Assisted) periodically samples and transmits compressed features to the cloud for KL divergence analysis. Architecture B (On-Device) implements a rolling window average of PSI (Population Stability Index) directly on the device.
question: Should Snapdragon 8 Gen 3 drift detection use server KL divergence, on-device PSI, or a hybrid design?
details:
  realistic_solution: Use a hybrid design. Run PSI as a lightweight on-device CPU/DSP-side heuristic over rolling histograms so the app can detect obvious covariate drift without uploading raw sensor data. Keep the bins, baselines, and counters compact in memory and schedule the work around the main NPU inference path. When PSI crosses a threshold, the device should upload only compressed feature summaries during Wi-Fi/charging windows for deeper server-side KL divergence or related distribution analysis. This separates the cheap local trigger from the heavier cloud diagnosis and avoids treating histogram drift monitoring as a natural INT8 NPU workload.
  common_mistake: |
    **The Pitfall:** Directly porting server-side drift detection mechanisms to mobile devices.
    **The Rationale:** Candidates fail to account for severe resource constraints (battery, memory, compute cycles) and intermittent connectivity on mobile platforms.
    **The Consequence:** The proposed solution causes excessive power drain, degraded app responsiveness, and privacy concerns due to data offloading.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target Hardware: Snapdragon 8 Gen 3 Hexagon NPU.
    - Sustained available compute for monitoring while the main model runs: 1 TOPS = 1,000 GOPS/sec.
    - Memory Budget: 12-16 GB LPDDR5X.
    - Main model rate: 30 inferences/sec.

    **Calculations:**
    - Binning Ops: 10 features * 2 ops = 20 ops/inference.
    - PSI Calculation (Amortized): (10 features * 50 bins * 5 ops) / 100 inferences = 25 ops/inference.
    - Total PSI Compute: 45 ops/inference.
    - Monitoring work per second = 45 ops/inference * 30 inferences/sec = 1,350 ops/sec.
    - Share of 1 TOPS monitoring budget = 1,350 / 1,000,000,000,000 = 0.000000135%.
    - PSI Memory Footprint: 10 features * 50 bins * 4 bytes = 2 KB.

    **Conclusion & Interpretation:**
    - **Result: Very low arithmetic overhead, not literally zero.** On-device PSI is cheap enough to serve as the primary trigger, while memory access, scheduling, and upload policy still justify a hybrid design for deeper server analysis.
