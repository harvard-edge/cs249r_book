title: Diagnosing Shared LPDDR Contention During NPU Inference
scenario: Production telemetry for your real-time video segmentation model shows severe 99th percentile latency stragglers, jumping from 5ms to over 30ms. The model runs exclusively on the NPU (45 TOPS INT8 compute), and the spikes correlate exactly with concurrent heavy GPU UI animations. The device features a shared 16 GB LPDDR5X memory pool.
question: Why do NPU p99 latency stragglers align with heavy GPU UI animations, and how should they be diagnosed?
details:
  realistic_solution: |
    The structural fault is shared LPDDR bandwidth contention. Heavy GPU UI animations can consume bursts of memory bandwidth for render targets, textures, and composition while the NPU is also fetching tensors and writing intermediate results. Even with 45 TOPS of arithmetic capacity, inference can stall when DMA transfers wait behind GPU traffic or shared-cache interference. Diagnosis should correlate p99 spikes with memory-controller bandwidth, GPU counters, NPU stall/DMA counters, and QoS settings before tuning model compute.
  common_mistake: |
    **The Pitfall:** Incorrectly diagnosing the latency regression as purely thermal throttling or core OS scheduling jitter.
    **The Rationale:** Candidates evaluate component metrics in severe isolation, ignoring the reality that edge SoC configurations universally bind the NPU, GPU, and CPU to identical memory lanes.
    **The Consequence:** Executing useless compute topology optimizations on the NPU that fix nothing, since the bottleneck is contention on the shared memory path.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - NPU Hardware: 45 TOPS INT8 Compute, 68 GB/s peak bandwidth shared pool.
       - Workload: 1 GOPS compute, 10 MB tensor traffic under normal scheduling.
       - Observed baseline latency: ~5 ms.
       - Contended effective NPU bandwidth during GPU animation: ~0.4 GB/s for the relevant burst window.
    2. **Calculations:**
       - Uncontended Compute Latency: 1 GOPS / 45 TOPS = ~0.02 ms, so compute is not the limiter.
       - Uncontended Fetch Lower Bound: 10 MB / 68 GB/s = ~0.15 ms.
       - Contended Fetch: 10 MB / 0.4 GB/s = ~25 ms.
       - Estimated Tail Latency: 5 ms baseline + ~25 ms contended fetch = ~30 ms.
    3. **Conclusion & Interpretation:**
       **Result: >30ms p99 latency under contention.** The arithmetic ties the observed 5 ms to >30 ms regression to reduced effective memory bandwidth, while leaving room for cache and QoS effects in the production diagnosis.
