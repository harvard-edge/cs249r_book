title: Diagnosing Shared Memory Contention on Hexagon NPU
scenario: Production telemetry for your real-time video segmentation model shows severe 99th percentile latency stragglers, jumping from 5ms to over 30ms. The model runs exclusively on the NPU (45 TOPS INT8 compute), and the spikes correlate exactly with concurrent heavy GPU UI animations. The device features a shared 16 GB LPDDR5X memory pool.
question: Why do NPU p99 latency stragglers align with heavy GPU UI animations, and how should they be diagnosed?
details:
  realistic_solution: |
    The structural fault is catastrophic memory bandwidth contention across the unified LPDDR bus. When the GPU demands enormous bandwidth spikes for complex UI rendering layers, it effectively starves the NPU's capacity to ingest weights and activations. Even with 45 TOPS of idle arithmetic power, NPU compute cores stall entirely waiting for DMA transfers. Diagnosis mandates tracing system hardware performance counters for memory bus saturation anomalies and subsequently patching OS-level QoS (Quality of Service) flags to prioritize inference fetching.
  common_mistake: |
    **The Pitfall:** Incorrectly diagnosing the latency regression as purely thermal throttling or core OS scheduling jitter.
    **The Rationale:** Candidates evaluate component metrics in severe isolation, ignoring the reality that edge SoC configurations universally bind the NPU, GPU, and CPU to identical memory lanes.
    **The Consequence:** Executing useless compute topology optimizations on the NPU that fix nothing, since the mathematical bottleneck is entirely GPU-driven starvation.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - NPU Hardware: 45 TOPS INT8 Compute, 68 GB/s peak bandwidth shared pool.
       - Workload: 1 GOPS compute, 10 MB tensor fetch.
       - Contention: GPU UI animations claim 67.5 GB/s, throttling NPU access to 0.5 GB/s.
    2. **Calculations:**
       - Uncontended Compute Latency: 1 GOPS / 45 TOPS = ~0.02 ms.
       - Uncontended Fetch Latency: 10 MB / 68 GB/s = ~0.15 ms.
       - Contended Fetch Latency: 10 MB / 0.5 GB/s = 20.0 ms.
       - Total Contended Latency: 0.02 ms (compute) + 20.0 ms (fetch) = 20.02 ms.
    3. **Conclusion & Interpretation:**
       **Result: 20ms p99 latency spike (Memory-Bandwidth-Bound via Contention).** Despite massive compute capacity, unified bus saturation physically starves the NPU.
