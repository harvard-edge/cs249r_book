title: On-Device KL Divergence Calculation
scenario: You are running a background drift detection task on a Samsung Exynos 2400 NPU. To avoid waking up the CPU, the dual-core NPU computes the Kullback-Leibler (KL) divergence of a categorical feature using base-2 logarithms. The actual observed distribution (P) across three categories is [0.5, 0.25, 0.25], while the expected baseline distribution (Q) stored in the 12 GB LPDDR5X memory is [0.25, 0.5, 0.25].
question: How do you compute KL(P||Q) for the 3-bin distributions and decide whether the 34.7 TOPS NPU is compute- or LPDDR5X-bandwidth-bound?
details:
  realistic_solution: The candidate should correctly apply the KL divergence formula by multiplying each probability in P by the base-2 log of the ratio of P to Q. For the hardware aspect, they should recognize that this tiny array has negligible compute demand relative to 34.7 TOPS, so memory access latency and data movement dominate the task.
  common_mistake: |
    **The Pitfall:** Confusing the direction of KL divergence or misjudging the arithmetic intensity.
    **The Rationale:** Candidates often calculate KL(Q||P) instead of KL(P||Q) and assume mathematical operations must be compute-bound on an NPU.
    **The Consequence:** Incorrect drift calculations and failing to realize the operation is entirely bottlenecked by memory latency, not the 34.7 TOPS NPU compute.
  napkin_math: |
    **Assumptions & Constraints:**
    - P = [0.5, 0.25, 0.25], Q = [0.25, 0.5, 0.25].
    - LPDDR5X memory bandwidth: ~60 GB/s.
    - Fetching P and Q as FP32 arrays reads 6 floats = 24 bytes.
    - Compute includes 3 ratios, 3 log2 evaluations, 3 multiplies, and 2 additions; this is tiny relative to NPU peak.

    **Calculations:**
    - Formula: KL(P||Q) = sum(P(i) * log2(P(i) / Q(i))).
    - Bin 1: 0.5 * log2(0.5 / 0.25) = 0.5 * log2(2) = 0.5.
    - Bin 2: 0.25 * log2(0.25 / 0.5) = 0.25 * log2(0.5) = -0.25.
    - Bin 3: 0.25 * log2(0.25 / 0.25) = 0.25 * log2(1) = 0.
    - Total KL Divergence = 0.5 - 0.25 + 0 = 0.25.
    - Minimum transfer time from bandwidth alone: 24 bytes / 60 GB/s = 4e-10 s, but real latency is dominated by memory access and launch overhead.
    - Even if the calculation used hundreds of primitive ops, compute time at 34.7 TOPS would be far below a microsecond.

    **Conclusion & Interpretation:**
    - **Result: KL(P||Q) = 0.25 bits.** For this small drift check, accelerator compute is not the bottleneck; memory access latency and data movement dominate relative to the tiny amount of arithmetic.
