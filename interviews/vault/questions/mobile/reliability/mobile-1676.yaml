title: On-Device Drift Detection for Gesture Recognition
scenario: You are designing an on-device machine learning system for real-time gesture recognition. The initial model performs exceptionally well in lab conditions, but users start experiencing degradation post-deployment due to varying lighting conditions and user demographics.
question: How would you design on-device drift detection for gesture recognition while minimizing battery and user impact?
details:
  realistic_solution: Deploy a lightweight, event-driven drift detection module computing Population Stability Index (PSI) or KL divergence on a sub-sampled feature stream. Execute feature extraction via the NPU to minimize CPU wake-ups. Upon crossing a drift threshold, trigger an alert to the backend to orchestrate a Federated Learning round or targeted data collection, mitigating battery drain.
  common_mistake: |
    **The Pitfall:** Proposing continuous, high-fidelity monitoring.
    **The Rationale:** Candidates often apply cloud-centric drift detection strategies that analyze every single inference result comprehensively.
    **The Consequence:** The constant background computation rapidly depletes the device's battery and CPU resources, causing the OS to kill the background process.
  napkin_math: |
    **Assumptions & Constraints:**
    - Power budget for detection: <0.1% of 5W peak = 5 mW.
    - KL Divergence cost (256 features, 100 samples): ~0.05 ms on NPU.

    **Calculations:**
    - Energy per detection run: 5W * 0.00005s = 0.25 mJ.
    - Allowed frequency within 5 mW (5 mJ/s) budget: 5 mJ/s / 0.25 mJ/run = 20 runs per second.

    **Conclusion & Interpretation:**
    - **Result: 0.25 mJ per run (Energy-Bound)**. The operation is safely within the energy budget for intermittent execution (~1 run/min).
