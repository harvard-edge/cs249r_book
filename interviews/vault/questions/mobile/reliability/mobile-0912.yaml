title: 'Fault Tolerance: Evaluate On-Device vs Cloud Recovery for Mobile ML State'
scenario: 'A personalization model on a mobile NPU loses its LoRA adaptation state after a factory reset. Compare (A) cloud recovery: re-download from cloud backup (2MB LoRA state), vs (B) rebuild: re-run 500-example local training dataset.'
question: How would you evaluate the recovery time, user experience, and privacy implications of cloud recovery vs local rebuilding?
details:
  realistic_solution: |
    Cloud recovery is usually the fastest path: a 2MB LoRA state can be downloaded and restored in seconds on a normal connection, and it gives a predictable recovery point if the backup is recent. Local rebuilding avoids storing personalized weights in the cloud, but 500 examples over multiple training passes can take tens of seconds to minutes on a phone because backprop is not the same as optimized INT8 inference. A balanced design should use encrypted cloud backup only with explicit privacy controls or opt-in; otherwise choose local rebuilding when privacy is more important than immediate personalization recovery.
  common_mistake: |
    **The Pitfall:** Always preferring cloud recovery and dividing FP16/FP32 training FLOPs by INT8 inference TOPS to estimate training time.
    **The Rationale:** Candidates forget that NPUs typically lack backprop support and that cloud storage of personalization data is a severe privacy risk.
    **The Consequence:** Overestimating local training time by an order of magnitude and compromising user data privacy for no practical benefit.
  napkin_math: |
    **Assumptions & Constraints:**
    - Cloud backup state: 2MB LoRA adapter.
    - Effective mobile download rate after radio setup and TLS overhead: 2-10 MB/s.
    - Restore/deserialization overhead: ~0.5-2 seconds.
    - Local rebuild: 500 examples * 3 passes = 1,500 training examples.
    - Use a conservative sustained on-device training estimate of 50-200 ms/example, because backprop and data loading are not NPU-optimized inference.

    **Calculations:**
    - Cloud transfer time: 2MB / 10 MB/s = 0.2 seconds on good Wi-Fi; 2MB / 2 MB/s = 1 second on a slower mobile link.
    - Cloud recovery time including restore: roughly 1-3 seconds when the network is available.
    - Local rebuild time: 1,500 examples * 50-200 ms/example = 75-300 seconds.

    **Conclusion & Interpretation:**
    - **Result: Cloud Recovery Is Faster, Local Rebuild Is More Private**. The 2MB cloud restore is likely seconds, while local retraining is likely minutes on real mobile hardware. The product decision depends on whether the user experience needs immediate recovery and whether personalized adapter storage is acceptable under the privacy model.
