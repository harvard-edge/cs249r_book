title: Mobile NPU Adversarial Robustness Evaluation
scenario: 'You are tasked with evaluating the reliability of a critical image classification model deployed on a mobile NPU. The model is susceptible to adversarial evasion attacks. Your team has developed two defense strategies: Adversarial Training (AT) and certified robustness using randomized smoothing (RS).'
question: 'How would you evaluate adversarial training versus randomized smoothing for robustness, latency, and memory?'
details:
  realistic_solution: 'Implement both AT and RS on a representative dataset. Benchmark each defense strategy''s performance on the NPU using metrics such as: 1. Robust Accuracy: Under various attack strengths (e.g., different epsilon values for PGD/FGSM attacks). 2. Inference Latency: Average inference time per image on the NPU. 3. Memory Footprint: Peak memory usage during inference. 4. Energy Consumption: (if measurable) during inference. 5. Model Size: The final deployed model size. The evaluation should involve a series of adversarial attacks (e.g., PGD, FGSM) against both defenses. The chosen metric should be a weighted combination of robust accuracy, latency, and memory, tailored to the specific application''s requirements.'
  common_mistake: |
    **The Pitfall:** Evaluating only adversarial robustness metrics without considering inference speed and memory.
    **The Rationale:** Security researchers focus purely on attack success rates (robust accuracy) and ignore deployment constraints.
    **The Consequence:** Recommending a defense like Randomized Smoothing, which mathematically guarantees robustness but destroys real-time latency due to multiple required inference passes.
  napkin_math: |
    **Assumptions & Constraints:**
    - Baseline Latency: 10ms per inference pass.
    - Randomized Smoothing (RS) Overhead: Requires N=100 forward passes per image.
    - Memory Budget: 400MB (FP32 100M parameter model) easily fits 12 GB RAM.

    **Calculations:**
    - AT Latency: 1 pass = 10ms.
    - RS Latency: 100 passes × 10ms = 1000ms (1 second per image).

    **Conclusion & Interpretation:**
    - **Result: Latency-Bound Defense**. While RS offers theoretical robustness, it introduces a **100x latency penalty** (1000ms), making AT the only viable option for real-time mobile pipelines despite minor accuracy hits.
