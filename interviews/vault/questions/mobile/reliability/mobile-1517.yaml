title: Designing a Fail-Safe Pedestrian Detection System
scenario: Your team is developing an on-device pedestrian detection system for a lightweight personal mobility vehicle using an iPhone 15 Pro, relying on the Apple A17 Pro Neural Engine. The system requires ISO 26262 ASIL B compliance, meaning deterministic execution and bounded failure recovery times are mandatory.
question: How would you design a fail-safe pedestrian detection system with watchdogs and fallback inference if the Neural Engine hangs or encounters a fatal memory error within the shared 8 GB unified memory?
details:
  realistic_solution: The specification must include a hard real-time watchdog timer on the CPU that polls the Neural Engine's task completion state. If a timeout occurs, the system must trigger a fast fallback to a simplified, highly quantized model running on the CPU cores, isolated in a pre-allocated, locked memory region to avoid unified memory allocation faults during the critical recovery phase.
  common_mistake: |
    **The Pitfall:** Relying on standard iOS background task monitoring or assuming clean error codes from the Neural Engine.
    **The Rationale:** Candidates overlook the shared nature of the 8 GB unified memory and fail to account for memory corruption simultaneously affecting the fallback CPU/GPU processes.
    **The Consequence:** Building a fragile recovery mechanism that crashes during unified memory allocation faults, missing the hard real-time safety deadline.
  napkin_math: |
    **Assumptions & Constraints:**
    - Maximum latency per frame (at 30 FPS): 33.3ms.
    - Primary A17 Pro Neural Engine model execution: ~10ms.
    - Watchdog timeout threshold: ~15ms.

    **Calculations:**
    - Remaining time for recovery: 33.3ms - 15ms = 18.3ms.

    **Conclusion & Interpretation:**
    - **Result: 18.3ms window (Safety-Bound)**. CPU detection, context switch, and fallback model execution must complete within this window to meet the deadline.
