title: Designing a Resilient Pedestrian Detection System
scenario: Your team is developing an on-device pedestrian-alert feature for a lightweight personal mobility app using an iPhone 15 Pro and the Apple A17 Pro Neural Engine. The product requirement is a conservative fail-soft response within 100 ms when accelerator inference stalls or unified-memory pressure causes an inference failure.
question: How would you design watchdogs and fallback inference for a mobile pedestrian-alert model with a 100 ms fail-soft deadline?
details:
  realistic_solution: The specification should include an application watchdog on the CPU that tracks accelerator task completion and input timestamps. If a timeout occurs, the system should cancel or ignore the stalled result, switch to a pre-warmed lightweight fallback model or conservative rule-based alert path, and use pre-allocated buffers to avoid allocation failure during recovery.
  common_mistake: |
    **The Pitfall:** Relying on standard iOS background task monitoring or assuming clean error codes from the Neural Engine.
    **The Rationale:** Candidates overlook the shared nature of the 8 GB unified memory and fail to account for memory corruption simultaneously affecting the fallback CPU/GPU processes.
    **The Consequence:** Building a fragile recovery mechanism that crashes during unified memory allocation faults, missing the hard real-time safety deadline.
  napkin_math: |
    **Assumptions & Constraints:**
    - Product fail-soft deadline: 100 ms from sensor timestamp to fallback alert.
    - Primary ANE model expected latency: ~10 ms.
    - Watchdog timeout threshold: 25 ms, giving margin above normal latency.
    - Pre-warmed fallback CPU/GPU model or rule path: target <=40 ms.

    **Calculations:**
    - Recovery window after watchdog fires: 100 ms - 25 ms = 75 ms.
    - Fallback path budget: <=40 ms execution + <=10 ms scheduling/buffer handoff = <=50 ms.
    - Remaining margin: 75 ms - 50 ms = 25 ms.

    **Conclusion & Interpretation:**
    - **Result: 75 ms recovery window with ~25 ms margin (Reliability-Bound)**. This supports fail-soft mobile behavior, not deterministic ISO 26262 hard real-time certification.
