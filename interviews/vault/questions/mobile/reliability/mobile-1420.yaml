title: Hexagon NPU Telemetry Bottleneck
scenario: You are monitoring a real-time CV model deployed on a Qualcomm Hexagon NPU. Production dashboards show frequent stragglers and high tail latency. The telemetry agent polls NPU performance counters per-frame and writes raw logs directly to the shared LPDDR5X memory, causing memory contention with the heterogeneous CPU+GPU+NPU pipeline.
question: How would you redesign Hexagon NPU telemetry to avoid per-frame memory and CPU overhead on a Snapdragon 8 Gen 3?
details:
  realistic_solution: Implement on-chip aggregation utilizing the Hexagon NPU's tightly coupled memory (TCM/SRAM) to accumulate telemetry metrics (e.g., execution time, hardware faults) across multiple frames. Periodically flush this aggregated data via a single Direct Memory Access (DMA) transfer to the shared LPDDR5X memory (e.g., once per second). This completely eliminates the per-frame memory bus contention and restores the NPU's effective compute throughput.
  common_mistake: |
    **The Pitfall:** Disabling telemetry entirely or moving logging to an asynchronous CPU thread.
    **The Rationale:** Candidates fail to realize the bottleneck is the high-frequency NPU-to-memory writes and bus contention on the unified memory architecture.
    **The Consequence:** The solution either loses critical observability or fails to resolve the underlying memory bus contention, leaving tail latency unchanged.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Target: 60 FPS inference on Hexagon NPU (45 TOPS INT8).
       - Per-frame telemetry causes a 5ms stall per memory sync.
    2. **Calculations:**
       - Current Stall Overhead: 60 frames * 5ms = 300ms/sec (30% utilization penalty).
       - Current Throughput: 45 TOPS * 0.70 = 31.5 TOPS effective.
       - Optimized Overhead: 1 DMA write/sec = 5ms/sec (0.5% utilization penalty).
    3. **Conclusion & Interpretation:**
       - Batching telemetry reclaims 29.5% of the compute capacity.
       - **Result: Memory-Bandwidth Bound (Restores 44.7 TOPS)**.
