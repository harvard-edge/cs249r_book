title: Designing a Safety-Critical Edge ML System for Autonomous Mobile Robotics on Google Tensor G3
scenario: You are designing the core ML system for an autonomous personal mobility device. The device utilizes an integrated NPU for real-time object detection and predictive path planning to ensure safe navigation.
question: How would you architect the ML pipeline and integrate system-level safety mechanisms to comply with functional safety principles, ensuring deterministic execution and high reliability?
details:
  realistic_solution: |
    1. Deterministic Execution: Use fixed-point quantization and strict static memory allocation (no dynamic scheduling). 2. Functional Safety (ASIL/ISO 26262): Implement dual-modular redundancy (e.g., primary model on NPU, fallback sanity check on CPU). 3. Watchdogs: Multi-level hardware and OS watchdogs to trap inference timeouts. 4. Memory Protection: Dedicated memory partitions in LPDDR5X to prevent cross-app memory corruption, along with continuous Built-In Self-Test (BIST) routines.
  common_mistake: |
    **The Pitfall:** Overlooking non-deterministic behaviors of ML inference frameworks or custom operators on edge TPUs.
    **The Rationale:** Candidates often assume that hardware operates flawlessly without accounting for software aging, silent data corruption, or transient hardware faults.
    **The Consequence:** The system fails to meet functional safety standards, leading to potentially dangerous failures in real-world autonomous operation.
  napkin_math: |
    **Assumptions & Constraints:**
    - Safety SLA: 50 ms (20 Hz) control loop
    - NPU Inference: 30 ms
    - Watchdog Polling: 10 ms

    **Calculations:**
    - Remaining Latency Budget: 50 ms - 30 ms = 20 ms
    - FDT (Fault Detection Time): Must be < 20 ms to safely trigger fallback within the SLA.

    **Conclusion & Interpretation:**
    - **Result: < 20 ms (Safety/Latency-Bound)**. Strict time-budgeting allows only 20ms for fallback activation.
