title: Optimizing Adversarial Robustness on Snapdragon NPU for Mobile Reliability
scenario: Your team has deployed a critical fraud detection model on a mobile application, performing real-time inference on the Snapdragon 8 Gen 3 Hexagon NPU. Investigation reveals that a sophisticated adversarial attack subtly perturbs the input data, causing an unexpected spike in the NPU's inference latency, specifically from a typical 5ms to over 50ms for certain inputs.
question: How would you diagnose the specific bottleneck causing this performance degradation and propose an optimization strategy to restore application reliability, quantifying the expected improvement?
details:
  realistic_solution: |
    Diagnose it as a systems bottleneck first, not just an accuracy issue. Reproduce the adversarial inputs on device with Snapdragon Profiler and Hexagon SDK traces, then compare clean versus perturbed runs by operator latency, DMA wait time, cache miss or external-memory counters, kernel selection, quantization fallback, and thermal state. A credible finding would be that one or two layers switch from an optimized INT8 Hexagon path to a slower fallback or memory-stalled path when perturbed activations change sparsity/range. Fix that specific path by tightening preprocessing and calibration ranges, adding an input guard for out-of-distribution values, replacing the fallback op with a supported INT8 kernel, or changing the tensor layout so the hot layer stays in the optimized path. The expected improvement should be stated as a before/after trace target: for example, reduce the identified stall/fallback portion from about 45 ms to under 5 ms and restore end-to-end latency from over 50 ms toward the normal 5-10 ms range.
  common_mistake: |
    **The Pitfall:** Focusing solely on improving model accuracy against adversarial examples, or looking at CPU/GPU profiling while ignoring NPU counters.
    **The Rationale:** Engineers often treat adversarial robustness as a purely statistical/accuracy problem rather than a systems performance issue.
    **The Consequence:** The latency bottleneck remains unresolved, leading to continued UI jank and battery drain.
  napkin_math: |
    **Assumptions & Constraints:**
    - Clean end-to-end latency: 5 ms.
    - Adversarial end-to-end latency: 50 ms.
    - Profiling shows base compute is unchanged, but a fallback or memory-stalled layer adds most of the delta.
    - Optimization target: remove 90% of the 45 ms added stall/fallback time.

    **Calculations:**
    - Added degradation: 50 ms - 5 ms = 45 ms.
    - Remaining degradation after optimization: 45 ms * 10% = 4.5 ms.
    - Expected optimized latency: 5 ms clean baseline + 4.5 ms residual = 9.5 ms.
    - Improvement: 50 ms / 9.5 ms = 5.3x lower latency for the adversarial case.

    **Conclusion & Interpretation:**
    - **Result: Profile-Proven Stall or Fallback.** If traces confirm that the extra 45 ms comes from memory stalls or an unsupported-kernel fallback, fixing that path should restore latency from over 50 ms to roughly 10 ms, with the exact target validated by clean and adversarial replay traces.
