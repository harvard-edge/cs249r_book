title: Diagnosing Data Drift on Google Tensor G3 for On-Device ML
scenario: An image classification model on Tensor G3 devices shows a drop in accuracy. Recent telemetry indicates a shift towards low-light, high-noise images.
question: How would you distinguish data drift, concept drift, and training-serving skew for a Tensor G3 image classifier under low-light inputs?
details:
  realistic_solution: 'Distinguish the failure modes by comparing inputs, labels or delayed outcome proxies, and the training-serving pipeline. Data drift means the live input distribution changed: low-light and high-noise feature histograms, embeddings, exposure metadata, or PSI/Wasserstein scores move away from the training baseline while the labeling rule is unchanged. Concept drift means the relationship between image features and labels changed: for example, accuracy drops on low-light images even after preprocessing is matched, and human labels or trusted delayed feedback show that the old decision boundary no longer fits. Training-serving skew means the deployed pipeline differs from training: resize, color conversion, normalization, ISP settings, quantization, or Tensor G3 delegate behavior produces different tensors for the same image. The diagnosis should replay matched samples through training and serving pipelines, compare intermediate tensors, segment metrics by lighting/noise,
    and use labeled audits or proxy labels to decide whether to fix preprocessing, collect/retrain on new low-light data, or repair the deployment pipeline.'
  common_mistake: |
    **The Pitfall:** Immediately assuming concept drift and triggering full model retraining.
    **The Rationale:** Neglecting to verify feature distribution changes and ignoring the exorbitant cost of on-device retraining.
    **The Consequence:** Wasting massive compute and battery life on unnecessary retraining when preprocessing adjustments or basic ISP tuning might suffice.
  napkin_math: |
    **Assumptions & Constraints:**
    - Feature dimensions: 1024 float16 (2 bytes) = 2 KB per image.
    - Inference rate: 100 img/s * 3600 s/hr * 8 hr/day = 2,880,000 images/day.
    - Sampling rate: 0.5%.

    **Calculations:**
    - Sampled images: 2,880,000 * 0.005 = 14,400 images/day.
    - Storage required: 14,400 * 2 KB = 28,800 KB = 28.125 MB.

    **Conclusion & Interpretation:**
    - **Result: 28.125 MB (Storage-Bound)**. Daily sampling requires only ~28.1 MB of on-device memory, safely fitting within standard local storage limits.
