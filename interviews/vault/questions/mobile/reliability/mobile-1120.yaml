title: On-Device LLM Guardrails against Prompt Injection
scenario: You are designing an on-device LLM-based personal assistant. The system processes incoming messages to schedule events but must rigorously defend against prompt injection and data exfiltration attacks while operating within unified memory constraints.
question: How would you architect a defense-in-depth strategy that robustly filters adversarial inputs without violating memory constraints or battery limits?
details:
  realistic_solution: |
    Deploy a multi-tiered, cascading defense architecture. A monolithic LLM evaluating safety policies destroys the memory budget. First, process inputs through a hyper-efficient, INT8 quantized encoder-only model (e.g., MobileBERT) executing rapidly on the NPU to flag overt injection attacks. Second, route safe prompts to a heavily quantized (W4A16) 3B-parameter autoregressive LLM to generate the scheduling logic. Finally, intercept the LLM outputs using deterministic, CPU-bound regex validation and structured output parsing (e.g., JSON schemas) to strictly sanitize payloads before API dispatch.
  common_mistake: |
    **The Pitfall:** Proposing a secondary, large LLM as a dedicated guardrail.
    **The Rationale:** Candidates default to using powerful LLMs for safety checks without considering resource limits.
    **The Consequence:** This exceeds the 8 GB unified memory constraint when running alongside the primary model and the OS.
  napkin_math: |
    **Assumptions & Constraints:**
    - Unified memory budget shared with OS.
    - Primary LLM: ~3B-4B parameters.
    - Guardrail model: ~25M parameters.

    **Calculations:**
    - Primary LLM footprint (4-bit quantization) = ~2.0 GB.
    - Guardrail model footprint (INT8) = ~25 MB.
    - Combined memory load = 2.025 GB.
    - Guardrail compute: ~0.1 GOPs per token. Latency on 35 TOPS NPU = ~0.003 ms per token.

    **Conclusion & Interpretation:**
    - **Result: 2.025 GB (Memory Capacity-Bound)**. Relying on a second large LLM for safety validation physically breaches the unified memory limit. The cascading architecture uses less than 30MB overhead while introducing negligible millisecond latency, strictly preserving system stability.
