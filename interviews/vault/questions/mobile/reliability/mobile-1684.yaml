title: NPU Functional Safety for ISO 26262 ASIL B
scenario: A safety-critical automotive ML application performing real-time object detection needs to run on a Snapdragon 8 Gen 3 Hexagon NPU, leveraging its INT8 performance and LPDDR5X memory.
question: What hardware-software co-design elements are needed for ISO 26262 ASIL B compliance on Snapdragon Hexagon?
details:
  realistic_solution: |
    For ISO 26262 ASIL B on a Snapdragon-class Hexagon deployment, treat the NPU as one element in a safety architecture rather than as the sole safety mechanism. Use ASIL decomposition with an independent safety island or MCU supervising deadlines, health signals, and safe-state transitions. Add startup and online diagnostics for the accelerator interface, DMA paths, model binaries, command queues, and critical memory paths; use watchdogs and plausibility checks on detections; and require deterministic scheduling with bounded latency budgets. The software safety case must include qualified tooling, versioned model/runtime artifacts, fault-injection evidence, diagnostic coverage arguments, and a fallback behavior such as degraded perception, driver takeover request, or fail-silent output when the monitor detects stale, corrupt, or implausible inference results.
  common_mistake: |
    **The Pitfall:** Assuming basic error checking or software-level fault tolerance is sufficient.
    **The Rationale:** Candidates neglect the necessity of hardware-specific diagnostic features like POST, BIST, and watchdog timers.
    **The Consequence:** The safety case becomes weak because single-point faults, latent faults, or missed deadlines may not be detected with enough evidence for ASIL B approval.
  napkin_math: |
    **Assumptions & Constraints:**
    - ASIL B is justified by a safety case, diagnostics, process evidence, and architectural measures, not by raw peak TOPS.
    - The NPU inference path must have bounded latency and be supervised by an independent safety mechanism.
    - Safety diagnostics may consume runtime budget, but their value is fault detection and safe-state control.

    **Calculations:**
    - Check coverage qualitatively: accelerator command integrity, model artifact integrity, memory-transfer integrity, deadline monitoring, output plausibility, and fallback behavior must all be covered.
    - Check independence: an NPU-only watchdog is insufficient; a safety island, MCU, or other independent monitor must be able to detect faults and force a safe response.
    - Check evidence: fault injection and validation must show that dangerous failures are detected within the fault-tolerant time interval.

    **Conclusion & Interpretation:**
    - **Result: Safety-Case Bound.** The design should reserve timing margin for diagnostics, but compliance depends on monitored independence, diagnostic coverage, deterministic execution, and verified safe fallback rather than an effective-TOPS calculation.
