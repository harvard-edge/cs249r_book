title: 'The A/B Test Without Ground Truth'
scenario: 'You have two versions of your on-device recommendation model. But your model runs entirely on-device — predictions never hit your server.'
question: 'How do you A/B test two on-device models when you can''t observe the predictions?'
details:
  realistic_solution: 'The key insight is that on mobile, the *hardware itself* generates the telemetry you need. Design an **on-device A/B testing framework** that uses hardware-level signals as proxy metrics when ground truth is unavailable.'
  common_mistake: 'Send all predictions to the server for analysis. This defeats the purpose of on-device inference (privacy, latency) and may violate your privacy policy.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Model A latency: 8ms; Model B latency: 12ms.
    - Usage: 1000 inferences/day.
    - Battery cost: ~0.0006 mAh per 4ms difference.
    - Total experiment size: 100,000 users (50,000 per cohort).

    **Calculations:**
    - Battery impact: 0.0006 mAh * 1000 = 0.6 mAh/day extra drain for Model B.
    - Required sample size for 2% delta (p=0.4): n ≈ 7.85 * 2 * 0.24 / 0.0004 ≈ 9,420 users/cohort.
    - Minimum Detectable Effect (MDE) with 50K users: sqrt(7.85 * 2 * 0.24 / 50000) ≈ 0.87%.

    **Conclusion & Interpretation:**
    - **Result: 0.6 mAh/day (Power-Bound).** The experiment proves whether the 5% engagement increase justifies the 0.6 mAh/day battery tradeoff; 50k users per cohort reaches statistical significance in 14 days.
  options:
  - 'The key insight is that on mobile, the hardware itself generates the telemetry you need. Design an on-device A/B testing framework that uses hardware-level signals as proxy metrics when ground truth is unavailable.'
  - 'Send all predictions to the server for analysis. This defeats the purpose of on-device inference (privacy, latency) and may violate your privacy policy.'
  - 'The primary issue is insufficient hardware capability; upgrading to next-generation hardware will resolve the performance gap without software changes.'
  - 'The solution is to reduce model complexity until it fits within the hardware constraints, accepting the accuracy trade-off as unavoidable.'
