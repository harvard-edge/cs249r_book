title: 'Fault Tolerance: Implement Atomic Model Swap for Zero-Downtime Mobile Update'
scenario: "You need to implement an atomic model update mechanism for a 1B LLM (4-bit quantized, 500MB) on a mobile device, where the update must not interrupt an in-progress inference request and must be rollback-capable within 5 seconds of a crash."
question: "How should an atomic mobile model swap update a 500MB LLM without interrupting in-flight inference and still support rollback?"
details:
  realistic_solution: |
    Exploit memory-mapped files (mmap) and atomic POSIX symlink swaps. Download the new model payload to a temporary path and verify its SHA256 hash. Execute an atomic `rename()` syscall to update the symlink. In-flight requests safely retain their mmap references to the old file descriptor until completion. If a crash occurs, a rapid symlink swap back to the old model completes in milliseconds, providing zero-downtime rollback.
  common_mistake: |
    **The Pitfall:** Replacing the model file in-place while inference is running.
    **The Rationale:** Candidates do not use memory-mapped files that allow for an atomic pointer swap via symlinks.
    **The Consequence:** File corruption, segmentation faults, and crashed in-flight inference requests.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model size: 500MB.
    - Background download speed: 12.5 MB/s.
    - Inference drain time: ~100ms.

    **Calculations:**
    - Download: 500MB / 12.5 MB/s = 40s.
    - SHA256 Verification: ~0.5s.
    - Symlink rename syscall: <1ms.
    - Crash rollback rename: <1ms.

    **Conclusion & Interpretation:**
    - **Result: ~1ms atomic swap (I/O-Blocking Bottleneck Avoided)**. Using mmaps and symlinks eliminates the I/O blocking bottleneck, easily satisfying the sub-5-second rollback constraint.
