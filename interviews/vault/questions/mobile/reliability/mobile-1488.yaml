title: 'Hardware Safety Mechanism Recall'
scenario: A safety-critical driver monitoring model runs on a Samsung Exynos 2400 NPU. The architecture includes a hardware timer that triggers a system reset if the inference software hangs and fails to periodically reset it.
question: What is the standard industry term for this hardware safety mechanism?
details:
  realistic_solution: 'The hardware component is a Watchdog Timer (WDT). In edge AI safety-critical paths, a deterministic hardware WDT mitigates NPU fault states (like infinite loops or driver hangs) by mandating a programmatic "kick" within a strict temporal threshold.'
  common_mistake: |
    **The Pitfall:** Confusing hardware timers with software exception handling.
    **The Rationale:** Suggesting a software heartbeat monitor or try-catch block for a system-level hang.
    **The Consequence:** The safety mechanism fails entirely if the underlying OS or NPU experiences a hard fault.
  napkin_math: |
    **Assumptions & Constraints:**
    - Watchdog interval: 50 ms (0.05 seconds).
    - Peak NPU compute: 34.7 TOPS.

    **Calculations:**
    - Maximum operations per interval: 34.7 * 10^12 * 0.05 = 1.735 Tera-operations.

    **Conclusion & Interpretation:**
    - **Result: 1.735 TOPS (Compute-Bounded Safety)**. The software must verify state and kick the WDT within this strict 1.735 TOPS operational envelope.
