title: On-Device Defensive Architecture for Biometric Spoofing
scenario: "You are designing an on-device liveness detection system for a banking app that runs entirely on the Apple A17 Pro Neural Engine. The model must defend against highly optimized adversarial patches to bypass facial recognition, with a strict 15ms latency budget."
question: "How would you design an on-device defense against biometric spoofing for the A17 Pro Neural Engine?"
details:
  realistic_solution: |
    Implement a teacher-student distillation pipeline: an offline robust teacher distills into an extremely compact student model. Quantize the student to W8A8 (INT8) for the A17's 16-core ANE. Apply inexpensive, randomized input transformations (e.g., stochastic resizing or noise injection) on the CPU to shatter the adversarial perturbation's spatial structure prior to ANE inference, achieving robustness entirely within the 15ms budget.
  common_mistake: |
    **The Pitfall:** Proposing massive ensembles or cloud-based verification.
    **The Rationale:** Candidates ignore the 5W thermal envelope, unified memory bandwidth bottlenecks, and strict on-device privacy requirements.
    **The Consequence:** Unusable systems that drain battery or violate architectural constraints.
  napkin_math: |
    **Assumptions & Constraints:**
    - Latency budget: 15ms.
    - ANE capacity: 35 TOPS.
    - Student Model: INT8 MobileNet-class (2 GOPs).

    **Calculations:**
    - ANE compute available in 15ms: 35 TOPS * 0.015s = 525 GOPs.
    - Model compute time: 2 GOPs / 35 TOPS = ~0.06ms (highly compute-efficient).
    - CPU preprocessing (randomization): ~3ms.
    - ANE overhead & inference: ~5ms.
    - Total latency: 3ms + 5ms = 8ms.

    **Conclusion & Interpretation:**
    - **Result: 8ms total latency (Compute-Efficiency Bottleneck Avoided)**. The lightweight distilled pipeline easily fits the 15ms budget, avoiding a compute bottleneck.
