title: 'Fault Tolerance: Design Model Update Safety Protocol for Mobile LLM'
scenario: You are designing a safe model update protocol for a 1B LLM deployed on an NPU as part of a keyboard app with 50M users. An update last month caused crashes on 0.5% of devices (250K users affected).
question: How would you design a fault-tolerant update protocol that limits the blast radius of a bad update to < 0.01% of total users?
details:
  realistic_solution: 'Use A/B model partitions with a hard first-stage cap below the blast-radius budget. Staged rollout: 0.01% (5K) -> validation 48h -> 0.1% -> 1% -> 10% -> 100%. Device-side: download to B partition, run 100 inference validation calls before commit, and reject the update locally on validation failure. Kill switch: server-side flag polled every 5 minutes to roll back committed devices to the previous partition.'
  common_mistake: |
    **The Pitfall:** Not implementing a device-side validation step before committing an update.
    **The Rationale:** Engineers assume that if a model passes cloud CI/CD, it will run correctly on all heterogeneous client devices.
    **The Consequence:** Unforeseen device-specific hardware or OS issues cause crashes in production, leading to a massive blast radius.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target Users: 50M.
    - Blast Radius Safety Limit: < 0.01% of total users = < 5,000 devices.
    - Bad Update Crash Rate: 0.5%.
    - Kill Switch Latency: 5 minutes (polling) + 50ms (partition switch).
    - Validation Overhead: 100 inference calls × 50ms = 5 seconds/device.
    - Validation is assumed to catch deterministic device-side failures before commit; residual crashes after commit are modeled with the 0.5% crash rate.

    **Calculations:**
    - Stage 1 Rollout Size: 0.01% of 50M = 5,000 devices.
    - Worst-case exposed devices before a halt in stage 1: 5,000 devices = 0.01% of total users.
    - Expected residual crashes if the bad update has a 0.5% crash rate after validation: 5,000 × 0.005 = 25 crashes.
    - Crash-derived affected-user fraction: 25 / 50M = 0.00005% of total users.
    - Validation cost per staged device: 5 seconds before commit; rollback detection is bounded by the 5-minute polling interval plus a local partition switch.

    **Conclusion & Interpretation:**
    - **Result: Fault-Tolerant Rollout**. The rollout cap, not the crash-rate estimate, enforces the <0.01% exposure budget. Under the assumed 0.5% residual crash rate, the expected affected users in stage 1 are only 25, while validation and the kill switch reduce the chance that a bad update advances to larger stages.
