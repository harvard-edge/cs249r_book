title: Unified Memory Contention Watchdog Reset
scenario: You are analyzing a watchdog timer reset in a mobile health monitoring app on a unified-memory SoC. Under normal conditions, the vital-sign analysis model executes in 15ms. When the GPU simultaneously renders complex AR graphics, memory-controller arbitration leaves the NPU with a smaller share of bandwidth, and execution time spikes to 30ms, causing the 25ms safety watchdog timer to trigger.
question: Why does this non-deterministic execution occur and what is the constrained memory bandwidth under contention?
details:
  realistic_solution: |
    The root cause is shared unified memory bandwidth contention. While the NPU has ample TOPS, it cannot compute data it cannot load. Normal 15ms execution can be decomposed as roughly 10ms of model data movement plus 5ms of compute. Under AR rendering, the observed 30ms total leaves about 25ms for the same 15 MB transfer, implying only about 0.6 GB/s of effective NPU bandwidth. Fix by reducing NPU memory traffic, keeping hot activations in supported on-chip buffers, or synchronizing NPU dispatch with GPU v-sync gaps.
  common_mistake: |
    **The Pitfall:** Assuming the Neural Engine lacks sufficient compute or is thermally throttling.
    **The Rationale:** Candidates focus on the NPU's TOPS rating and ignore the shared memory architecture limits.
    **The Consequence:** Misdiagnosing non-deterministic execution and failing to resolve the memory bandwidth contention.
  napkin_math: |
    **Assumptions & Constraints:**
    - Use decimal GB and MB.
    - Model load: 15 MB.
    - Normal transfer: 15 MB / 1.5 GB/s = 10 ms.
    - Non-transfer compute time: 5 ms.
    - Observed latency under AR contention: 30 ms.
    - Watchdog limit: 25 ms.

    **Calculations:**
    - Normal total latency: 10 ms transfer + 5 ms compute = 15 ms.
    - Contended transfer time implied by observation: 30 ms total - 5 ms compute = 25 ms.
    - Constrained bandwidth: 15 MB / 25 ms = 15 MB / 0.025 s = 600 MB/s = 0.6 GB/s.
    - Watchdog comparison: 30 ms observed latency > 25 ms watchdog limit.

    **Conclusion & Interpretation:**
    - **Result: 0.6 GB/s constrained bandwidth and 30 ms latency (Memory Bandwidth-Bound)**. Total latency reaches 30ms, breaching the 25ms watchdog.
