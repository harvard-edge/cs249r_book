title: The Production Mobile ML Observability Stack
scenario: You're the ML platform lead for a ride-sharing app with 10M DAU. On-device ML powers ETA prediction, route optimization, driver face verification, and fraud detection. Each model runs on wildly different hardware.
question: How would you design the observability system that tells you, within 5 minutes, if any model is degrading on any device segment?
details:
  realistic_solution: 'Hierarchical observability with on-device intelligence. Three tiers: (1) All 10M devices send daily summary (200 bytes) = 1.9 GB/day. (2) 4% send hourly stats (500 bytes) = 4.8 GB/day. (3) 1% send critical details (5 KB) = 500 MB/day. Total: 7.2 GB/day at $22/month vs naive 200 GB/day at $600/month. Segment into ~750 device cohorts (~13.3K devices each) for statistical significance in minutes. On-device anomaly detection triggers escalation, enabling 5-minute detection SLA.'
  common_mistake: |
    **The Pitfall:** Collecting raw telemetry events from all devices.
    **The Rationale:** Candidates suggest building a standard dashboard without calculating the massive scale of data generated by 10M DAUs doing multiple inferences per day.
    **The Consequence:** A collapsed data pipeline and astronomical cloud ingestion bills.
  napkin_math: |
    **Assumptions & Constraints:**
    - 10M DAU, 4 models, 50 inferences/day per user.
    - Naive raw telemetry: 100 bytes per inference.
    - Tiered approach: Daily summary (200 bytes), Hourly stats (500 bytes for 4%), Critical details (5 KB for 1%).

    **Calculations:**
    - Naive Approach = 10M * 4 * 50 * 100 bytes = 200 GB/day (~$600/month cloud ingress).
    - Tiered Daily = 9.5M devices * 200 bytes = 1.9 GB/day.
    - Tiered Hourly = 400K devices * 500 bytes = 4.8 GB/day.
    - Tiered Critical = 100K devices * 5 KB = 500 MB/day.
    - Total Tiered = 1.9 + 4.8 + 0.5 = 7.2 GB/day (~$22/month).

    **Conclusion & Interpretation:**
    - **Result: Data ingestion slashed by 28x (Network-bandwidth-bound telemetry limit)**. On-device anomaly detection triggers targeted escalation to meet the 5-minute SLA.
