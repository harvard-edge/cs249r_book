title: The Production Mobile ML Observability Stack
scenario: You're the ML platform lead for a ride-sharing app with 10M DAU. On-device ML powers ETA prediction, route optimization, driver face verification, and fraud detection. Each model runs on wildly different hardware.
question: How would you design the observability system that tells you, within 5 minutes, if any model is degrading on any device segment?
details:
  realistic_solution: 'Hierarchical observability with on-device intelligence. Three tiers: (1) all 10M devices send one daily summary per model, 200 bytes each = 8 GB/day, (2) 4% of devices send hourly stats for 4 models, 500 bytes each = 19.2 GB/day, and (3) 1% of devices send critical details for 4 models, 5 KB each = 2.0 GB/day. Total: about 29.2 GB/day, or 876 GB/month. At $0.10/GB ingestion this is about $88/month, versus about 6 TB/day and $18,000/month for naive raw inference telemetry. Segment by model, app version, OS, and device cohort; on-device anomaly detection triggers targeted escalation for the 5-minute SLA.'
  common_mistake: |
    **The Pitfall:** Collecting raw telemetry events from all devices.
    **The Rationale:** Candidates suggest building a standard dashboard without calculating the massive scale of data generated by 10M DAUs doing multiple inferences per day.
    **The Consequence:** A collapsed data pipeline and astronomical cloud ingestion bills.
  napkin_math: |
    **Assumptions & Constraints:**
    - 10M DAU, 4 models, 50 inferences/day per user.
    - Naive raw telemetry: 100 bytes per inference.
    - Tiered approach per model: daily summary (200 bytes), hourly stats (500 bytes for 4% of devices), critical details (5 KB for 1% of devices).
    - Ingestion price for comparison: $0.10/GB.

    **Calculations:**
    - Naive Approach = 10M * 4 models * 50 inferences/day * 100 bytes = 200,000,000,000 bytes/day, or about 200 GB/day per raw signal.
    - If 30 raw signals are logged, naive volume is 200 GB/day * 30 = 6 TB/day, or about 180 TB/month.
    - Naive monthly cost: 180,000 GB * $0.10/GB = $18,000/month.
    - Tiered Daily = 10M devices * 4 models * 200 bytes = 8 GB/day.
    - Tiered Hourly = 400K devices * 4 models * 24 reports * 500 bytes = 19.2 GB/day.
    - Tiered Critical = 100K devices * 4 models * 5 KB = 2.0 GB/day.
    - Total Tiered = 8 + 19.2 + 2.0 = 29.2 GB/day, or 876 GB/month.
    - Tiered monthly cost: 876 GB * $0.10/GB = $87.60/month.

    **Conclusion & Interpretation:**
    - **Result: about 205x lower ingestion than naive 30-signal raw logging (Network-Bound Telemetry)**. The tiered design keeps routine data small and reserves detailed telemetry for targeted escalation within the 5-minute SLA.
