title: Exynos 2400 NPU Telemetry and Straggler Detection System
scenario: You are tasked with designing a robust on-device telemetry and monitoring system for a real-time video processing model deployed on an NPU. The application runs continuously, sharing memory with the CPU, GPU, and ISP. The system must accurately detect thermal throttling and memory bandwidth contention without causing unacceptable profiling overhead.
question: How should telemetry detect thermal throttling and memory stragglers with low reporting overhead?
details:
  realistic_solution: 'A strong design aggregates telemetry on-device using a lightweight daemon that hooks into OS-level hardware performance counters. It calculates p90/p99 latency percentiles and tracks NPU core utilization over 1-minute rolling windows. To detect stragglers accurately, the system correlates NPU execution delays with concurrent memory access spikes from the ISP/GPU in the shared memory pool. Alerts and compact histograms are batched and uploaded only during optimal radio conditions or when significant anomalies are detected.'
  common_mistake: |
    **The Pitfall:** Proposing streaming raw inference latencies or high-frequency polling.
    **The Rationale:** Candidates fail to account for massive radio wake-up costs and often misattribute latency spikes to NPU thermal throttling rather than shared memory contention.
    **The Consequence:** The telemetry system severely degrades battery life and provides inaccurate root-cause diagnoses.
  napkin_math: |
    **Assumptions & Constraints:**
    - Event rate: 30 FPS = 30 events/sec.
    - Raw event size: ~32 bytes.
    - Reporting intervals: 1-minute aggregations.

    **Calculations:**
    - Raw Volume: 30 * 32 * 3600 = 3.45 MB/hour.
    - Aggregated Payload: p50/p90/p99 (12B) + NPU util (4B) + mem peak (4B) = 20 bytes/minute.
    - Aggregated Volume: 20 bytes/min * 60 = 1.2 KB/hour.

    **Conclusion & Interpretation:**
    - **Result: Network-Bound Savings.** Shifting to on-device aggregation reduces telemetry data from 3.4 MB to 1.2 KB per hour, avoiding destructive radio wake-up costs.
