title: Mobile FL Checkpoint Wear
scenario: An on-device federated learning task runs overnight on a Snapdragon 8 Gen 3, pausing whenever the user unplugs the phone.
question: Evaluate the trade-off between checkpointing frequency and flash storage wear-out for this interrupted mobile training job?
details:
  realistic_solution: Frequent checkpointing minimizes lost training progress during sudden unplug events but increases write traffic on the device's UFS flash storage. A mobile FL job should checkpoint compressed or delta state at coarse intervals, write atomically, and tune the interval to expected interruption risk rather than saving a full model state every mini-batch.
  common_mistake: |
    **The Pitfall:** Treating mobile flash storage identically to robust cloud NVMe.
    **The Rationale:** Engineers completely ignore the strict terabytes-written (TBW) endurance limits of mobile eMMC/UFS storage.
    **The Consequence:** Excessive write traffic, slower training, and elevated storage-endurance risk over repeated use.
  napkin_math: |
    **Assumptions & Constraints:**
    - Checkpoint size: 20MB compressed/delta state.
    - Frequency: Every 10 minutes during an 8-hour overnight window (48 times/night).
    - Storage type: Mobile eMMC/UFS flash.

    **Calculations:**
    - Total Writes Per Night: 20MB * 48 = 960 MB, or ~0.96 GB.
    - Annual Write Load: 0.96 GB/day * 365 = ~350 GB/year.

    **Conclusion & Interpretation:**
    - **Result: ~350 GB/year before filesystem write amplification.** This is not guaranteed rapid flash failure, but it is enough extra traffic to justify compressed delta checkpoints, atomic writes, and less frequent checkpointing when interruption risk is low.
