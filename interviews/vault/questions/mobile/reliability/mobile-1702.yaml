title: Diagnosing Latency Spikes on Snapdragon 8 Gen 3 NPU
scenario: A real-time video analytics model runs on the Snapdragon 8 Gen 3 Hexagon NPU (45 TOPS INT8,
  12-16 GB LPDDR5X). Post-deployment dashboards show intermittent latency spikes under sustained load.
  These spikes are not uniformly distributed and degrade the user experience.
question: How would you diagnose sustained-load latency spikes in a Snapdragon 8 Gen 3 video analytics
  model using NPU telemetry?
details:
  realistic_solution: 'A realistic solution involves implementing granular, NPU-aware monitoring:

    1.  **NPU Utilization & Throughput**: Collect metrics on NPU core utilization, instruction per cycle
    (IPC), and actual INT8 operations per second to gauge processing load. Track model inference throughput
    (frames/sec).

    2.  **NPU Memory & Bandwidth**: Monitor memory usage within the 12-16 GB LPDDR5X for the NPU, and
    critical bandwidth metrics for data transfers between main memory and the NPU to detect saturation.

    3.  **Latency Breakdown**: Instrument the inference pipeline to break down total latency into: data
    preparation (CPU), data transfer to NPU, NPU execution time, and data transfer from NPU.

    4.  **Thermal Monitoring**: Directly monitor the NPU''s temperature and correlate with clock frequency
    scaling or throttling.'
  common_mistake: '**The Pitfall:** Relying solely on high-level system metrics like overall CPU usage
    or general memory pressure.


    **The Rationale:** Engineers are used to standard cloud telemetry and fail to deep-dive into NPU-specific
    bandwidth, thermal, and utilization metrics.


    **The Consequence:** They misattribute NPU resource contention or thermal throttling to generic system
    bottlenecks, blocking root cause resolution.

    '
  napkin_math: '**Assumptions & Constraints:**

    - NPU Peak: 45 TOPS.

    - Model Requirement: 15 TOPs per inference.


    **Calculations:**

    - Calculate Theoretical Throughput: 45 TOPS / 15 TOPs/inference = 3 inferences per second.

    - Telemetry shows throughput dropping to 1 inference/second, with NPU utilization at 33.3%.

    - Evaluate Expected vs Actual: 33.3% of 3 inferences/sec = 1 inference/sec, which matches the observed
    rate.


    **Conclusion & Interpretation:**

    - **Result: 33.3% Utilization (Bandwidth-Bound)**. This confirms the NPU compute is not the bottleneck;
    the issue is external (e.g., LPDDR5X memory bandwidth contention).

    '
