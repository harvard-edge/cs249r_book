title: On-device LLM Guardrail Sizing for Tensor G3
scenario: You are deploying Gemini Nano for a privacy-first smart assistant on the Google Tensor G3. To mitigate prompt injection attacks, you must choose between an input-sanitizing auxiliary classifier or expanding the LLM's system prompt.
question: How would you compare an auxiliary guardrail classifier with a longer system prompt for memory, TTFT, and compute on Tensor G3?
details:
  realistic_solution: |
    Compare the two designs as separate latency and memory budgets. An INT8 auxiliary classifier adds a small resident model and one extra inference before generation, but it can reject malicious inputs before the LLM allocates long-context KV cache or performs prefill. A longer system prompt avoids a second model, but it increases every request's prefill work, TTFT, and KV-cache footprint, including benign requests. The auxiliary classifier is usually the better mobile tradeoff if its measured p95 latency and memory footprint fit the app budget; the system-prompt approach is attractive only when the extra prompt is short enough that TTFT and cache growth remain negligible.
  common_mistake: |
    **The Pitfall:** Expanding the main LLM's system prompt to handle adversarial inputs.
    **The Rationale:** Candidates ignore the resulting increased time-to-first-token (TTFT) and KV cache memory bloat.
    **The Consequence:** The main LLM wastes massive compute on malicious prompts, degrading UX and battery life.
  napkin_math: |
    **Assumptions & Constraints:**
    - Auxiliary Model: MobileBERT-class guardrail (25M params, INT8)
    - Classifier sequence length: 512 tokens
    - Expanded system prompt alternative: +300 prompt tokens on every LLM request.
    - Main LLM: 3.2B params; GQA KV cache is 65,536 bytes/token.
    - G3 TPU: 7.5 TOPS (assume 30% utilization = 2.25 effective TOPS)
    - LPDDR5X Bandwidth: ~60 GB/s

    **Calculations:**
    - Auxiliary memory footprint = 25M * 1 byte = 25 MB, plus a small activation workspace.
    - Auxiliary compute = 2 * 512 * 25M = 25.6 GOP; latency = 25.6 GOP / 2.25 TOPS = 11.4 ms before generation.
    - Expanded prompt prefill compute = 2 * 300 * 3.2B = 1.92 TOP; latency = 1.92 TOP / 2.25 TOPS = 0.85 s of added TTFT.
    - Expanded prompt KV growth = 300 * 65,536 bytes = 19.7 MB per active session.

    **Conclusion & Interpretation:**
    - **Result: auxiliary classifier wins under these constraints**. It costs about 25 MB and ~12 ms, while the prompt-only design adds about 0.85 s TTFT and ~20 MB KV cache per session. The decision should be validated against measured p95 classifier latency and available memory headroom.
