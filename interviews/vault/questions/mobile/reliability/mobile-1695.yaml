title: Designing an Adversarially Robust Mobile ML System on Snapdragon 8 Gen 3 Hexagon NPU
scenario: You are designing a real-time image classifier for a critical safety app on a Snapdragon 8 Gen 3 class phone. The pipeline must sustain 30 fps, keep runtime defenses on device, and handle adversarial inputs without relying on cloud checks.
question: How would you design the architecture and defenses to maximize robust and secure operation within NPU constraints?
details:
  realistic_solution: |
    Use offline PGD-style adversarial training and quantization-aware training to produce the deployable INT8 model; the NPU should not run adversarial training at runtime. At inference, run a bounded safety pipeline on the Hexagon NPU: input normalization and validity checks, a compact denoising or smoothing preprocessor only if profiling shows it fits the frame budget, the primary classifier, confidence and temporal-consistency monitors, and a deterministic fallback when the model is low-margin or inconsistent. Protect model artifacts with platform secure storage and signed updates, and validate the exact Galaxy/Snapdragon device because sustained NPU throughput, memory bandwidth, and Vulkan/NNAPI/Core ML delegate behavior vary by product.
  common_mistake: |
    **The Pitfall:** Relying on post-hoc defenses without hardware optimization.
    **The Rationale:** Candidates often propose standard adversarial training or complex denoising layers without accounting for the NPU's specific architecture or TOPS limits.
    **The Consequence:** These unoptimized defenses consume excessive memory or compute, destroying real-time latency and making the system unusable.
  napkin_math: |
    **Assumptions & Constraints:**
       - Frame budget for 30 fps: 33.3 ms.
       - Measured primary classifier latency on the target device: 18 ms.
       - Runtime defense path: 4 ms denoiser or smoothing preprocessor + 1 ms validity/confidence monitor.
       - Safety margin target: keep at least 20% of the frame budget free for OS, camera, DMA, and thermal variation.
       - Offline PGD/QAT training affects the deployed weights but adds no runtime NPU step.

    **Calculations:**
       - Runtime ML latency = 18 ms + 4 ms + 1 ms = 23 ms.
       - Required 20% headroom = 33.3 ms * 0.20 = 6.7 ms.
       - Remaining headroom = 33.3 ms - 23 ms = 10.3 ms.
       - 10.3 ms headroom is greater than the 6.7 ms target, so the profiled runtime stack fits the frame budget.

    **Conclusion & Interpretation:**
       **Result: Deployment-realistic if profiled.** The NPU executes only the runtime defense stack and classifier, while PGD/QAT is an offline training method. The architecture fits if measured latency stays near 23 ms and robustness monitors trigger a safe fallback when confidence or temporal checks fail.
