title: 'Fault Tolerance: Evaluate App Crash vs Model Corruption Recovery Paths'
scenario: 'Your on-device ML app on Tensor G3 experiences two failure modes: (A) app crash mid-training (occurs ~1/day), (B) model file corruption (occurs ~1/month).'
question: How would you compare the recovery protocol, recovery time, and user impact for each failure mode?
details:
  realistic_solution: 'App crash recovery: training checkpoint from 5 minutes ago -> resume. Fast path (< 5 seconds). Model corruption: SHA256 verify on startup, restore from backup partition or re-download. Slow path (seconds to minutes).'
  common_mistake: |
    **The Pitfall:** Treating highly frequent and extremely rare failures identically.
    **The Rationale:** Engineers often design one monolithic recovery mechanism (e.g., full re-download) for all failures.
    **The Consequence:** This creates unacceptable downtime for daily app crashes, ruining the UX, rather than providing a fast path for common errors.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Failure A (App Crash): ~1 per day.
       - Failure B (Corruption): ~1 per month.
       - App crash recovery can use the most recent training checkpoint.
       - Model corruption requires integrity verification and restore from a known-good local backup or network re-download.
    2. **Calculations:**
       - App crash path: restart the app and resume from a checkpoint at most 5 minutes old; visible recovery should be seconds, while at most 5 minutes of training progress is lost.
       - Corruption path: detect the bad model file, load a local backup if present, or re-download the model; visible recovery can range from seconds to minutes depending on backup availability and network.
       - Frequency comparison: app crashes happen about 30x more often than monthly corruption events, so the common crash path deserves the lowest-friction recovery path.
    3. **Conclusion & Interpretation:**
       **Result: Fast Common-Case Recovery. Use checkpoints for frequent app crashes and backup/re-download for rare corruption. This minimizes user-visible disruption without relying on unsupported uptime guarantees.**
