title: On-Device Drift Detection Alternatives
scenario: We are deploying an on-device personalization model on the Apple A17 Pro. To maintain privacy,
  data drift detection must happen locally. Option A computes continuous KL divergence over dense activation
  embeddings (1024-dim, fp16) using the 16-core Neural Engine. Option B tracks summary statistics (mean,
  variance) and computes a Population Stability Index periodically on the CPU.
question: Which local drift detection approach is optimal for the Apple A17 Pro considering power and
  memory constraints?
details:
  realistic_solution: Approach B is far superior. Drift detection is a low-frequency, asynchronous task.
    By tracking running summary statistics on the CPU, we drastically reduce the memory and energy footprint.
    The CPU can easily handle lightweight PSI calculations periodically using negligible power. Approach
    A requires constantly waking up the Neural Engine and keeping historical dense embeddings in DRAM,
    consuming significantly more energy and needlessly draining the battery.
  common_mistake: '**The Pitfall:** Choosing the Neural Engine approach under the assumption that all
    ML-related math should run on the accelerator.

    **The Rationale:** Candidates optimize blindly for FLOP throughput, completely ignoring power and
    memory bandwidth implications.

    **The Consequence:** Destroying battery life by constantly waking up the ANE and saturating the shared
    8 GB memory for a background monitoring task.

    '
  napkin_math: '**Assumptions & Constraints:**

    - Approach A: 1024-dim fp16 = 2 KB/inference at 10 inferences/s.

    - Approach B: Tracks only mean/variance per dimension.


    **Calculations:**

    - Approach A Memory: 2 KB * 10 * 3600 = ~72 MB/hour of dense state written to DRAM.

    - Approach A Power: Waking the ANE 10 times a second prevents it from entering deep sleep, drawing
    active power.

    - Approach B Memory: 1024 * 2 (mean, var) * 4 bytes (fp32) = 8 KB total state, easily fitting in the
    CPU L1 cache.


    **Conclusion & Interpretation:**

    - **Result: Power-Bound.** Approach B requires only 8 KB and runs on the low-power efficiency CPU
    cores, while Approach A forces power-hungry DRAM writes and ANE wake-ups, draining the battery.'
