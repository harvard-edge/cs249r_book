title: The Device-Free ML Testing Strategy
scenario: Your team ships an ML-powered camera feature to 200 million users across iOS and Android. You don't have a device farm — you have 5 test phones on your desk.
question: How can a camera ML team cover 200M iOS and Android users with only 5 local test phones?
details:
  realistic_solution: Use a multi-layer testing pyramid instead of relying on the 5 local phones. Local phones catch hands-on camera and performance issues on representative hardware. Unit tests in CI validate conversion, preprocessing, and output shapes. Emulator integration tests cover memory lifecycle, threading, permissions, and camera-pipeline behavior. Cloud devices add a rotating set of real iOS and Android devices for each release. Canary rollout to 1% of users monitors crash rate, model-load failures, and P95 latency before full release. A practical cloud-device example is about 20 real devices per release at roughly $600/month for 4 releases, not literal exhaustive coverage of every user device.
  common_mistake: |
    **The Pitfall:** Testing only on 5 local phones and relying on crash reports from production.
    **The Rationale:** Teams without device farms assume they can just test locally and let users uncover issues.
    **The Consequence:** Your 200 million users become your test farm. You will discover bugs from 1-star reviews.
  napkin_math: |
    **Assumptions & Constraints:**
    - Unit tests catch about 60% of defect classes before device testing.
    - Emulator integration tests catch another 20%.
    - Cloud real-device tests catch another 15%.
    - Canary plus production telemetry catches the remaining 5% before or during staged rollout.
    - Incremental vendor cost of unit/integration and canary is treated as $0 for this estimate; engineering time is not included.
    - Cloud devices cost: $150 per release, 4 releases/month.

    **Calculations:**
    - Coverage model: 60% + 20% + 15% + 5% = 100% of the planned detection layers.
    - Cloud device monthly cost: $150 * 4 = $600/month.
    - Incremental vendor cost estimate: $0 + $0 + $600 + $0 = $600/month.

    **Conclusion & Interpretation:**
    - **Result: ~$600/month incremental device-farm cost (Cost-Bound).** The strategy combines local phones, emulators, cloud devices, and canary telemetry to reduce release risk without owning a large hardware lab; it is a layered risk estimate, not a precise all-in testing cost.
