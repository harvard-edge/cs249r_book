title: 'The Device-Free ML Testing Strategy'
scenario: 'Your team ships an ML-powered camera feature to 200 million users across iOS and Android. You don''t have a device farm — you have 5 test phones on your desk.'
question: 'How can a camera ML team cover 200M iOS and Android users with only 5 local test phones?'
details:
  realistic_solution: 'Multi-layer testing pyramid. Layer 1 (unit, ~60%): validate conversion, preprocessing, output shapes in CI — $0. Layer 2 (integration, ~20%): memory lifecycle, threading, camera pipeline in emulators — $0. Layer 3 (cloud devices, ~15%): 20+ real devices via Firebase/AWS Device Farm — $600/month. Layer 4 (canary, ~4%): deploy to 1% of users, monitor crash rate and P95 latency for 24h. Remaining ~1% found in production via telemetry. Total: $600/month to cover 100+ devices without owning any.'
  common_mistake: '"Test on our 5 phones and rely on crash reports from production." This means your 200 million users are your test farm. You''ll discover bugs from 1-star reviews.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Unit tests catch ~60% of bugs; Integration tests catch ~20%.
    - Cloud device tests catch ~15%; Canary deployments catch ~4%.
    - Cost of unit/integration and canary: $0.
    - Cloud devices cost: $150 per release, 4 releases/month.

    **Calculations:**
    - Cloud device monthly cost: $150 * 4 = $600/month.
    - Total testing cost: $0 + $0 + $600 + $0 = $600/month.

    **Conclusion & Interpretation:**
    - **Result: $600/month (Cost-Bound).** A multi-layered testing pyramid achieves exhaustive device coverage efficiently without the capital expenditure of maintaining an in-house hardware farm.
