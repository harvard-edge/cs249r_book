title: 'Edge Telemetry Architecture for On-Device LLMs'
scenario: 'You are leading the deployment of Gemini Nano on a fleet of devices powered by the Google Tensor G3. In field testing, you observe sporadic tail-latency spikes and silent process crashes during background text summarization.'
question: 'How would you design edge telemetry to isolate memory, thermal, or OS scheduler stragglers without hurting latency or uploading raw traces?'
details:
  realistic_solution: 'Design a tiered, edge-native telemetry system. Use lightweight counters for TPU utilization, thermal states, and memory high-water marks, aggregating them locally into histograms. Implement an anomaly-triggered trace mechanism: only when inference latency exceeds the P95 threshold or available RAM drops dangerously low, the system takes a lightweight snapshot of system state and aggregates the findings using federated analytics to preserve user privacy.'
  common_mistake: |
    **The Pitfall:** Proposing continuously streaming verbose telemetry to the cloud.
    **The Rationale:** Candidates default to cloud-native observability patterns (full stack traces, high-frequency profiling).
    **The Consequence:** Violating privacy constraints, draining the battery, and exacerbating the very thermal/memory issues they are trying to debug.
  napkin_math: |
    **Assumptions & Constraints:**
    - Summary Compute Cost: 100 tokens * 20 GOPS/token = 2 TOPS.
    - Ideal Inference Time: 2 TOPS / 7.5 TOPS = ~266 ms.
    - Telemetry Sampling Rate: 1 sample / 50 ms = ~5 samples per inference.
    - Telemetry Data Size: 5 samples * 128 bytes/sample = 640 bytes.

    **Calculations:**
    - Daily Telemetry: 640 bytes * 1,000 tasks = ~640 KB/day.

    **Conclusion & Interpretation:**
    - **Result: ~640 KB/day (Network-Bound)**. This creates virtually a zero memory and energy footprint for telemetry.
