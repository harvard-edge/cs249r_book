title: Hexagon NPU Thermal Degradation
scenario: An AR application on a device with a Snapdragon 8 Gen 3 normally runs its primary vision model on the Qualcomm Hexagon NPU. The primary INT8 model requires 400 GOPS per frame and runs at 30 FPS. Under severe thermal throttling, the OS shifts execution to the heterogeneous CPU cluster using a fallback model requiring 80 GOPS per frame at 15 FPS, completely powering off the NPU. The system has 16 GB of shared LPDDR5X memory.
question: Why does the system switch to a less efficient CPU fallback instead of running the primary model at 15 FPS on the NPU?
details:
  realistic_solution: In extreme thermal events, the SoC may have to power-gate the hot NPU IP block rather than merely reduce its frame rate. Running the primary model at 15 FPS would still place a 6 TOPS workload on the same localized NPU silicon area, so the hotspot would continue producing heat. The CPU fallback is chosen because it uses a smaller 1.2 TOPS model and moves execution to a different physical area of the die while the NPU is fully powered off, preserving degraded functionality without continuing the NPU thermal event.
  common_mistake: |
    **The Pitfall:** Assuming thermal management is solely about reducing total system TOPS.

    **The Rationale:** Candidates assume that because the NPU is strictly more power-efficient per MAC than the CPU, all degraded modes should naturally remain on the NPU at lower clock speeds.

    **The Consequence:** They fail to account for localized dark silicon effects and thermal pooling, missing the critical architectural need to completely power-gate specific hot spots on the die.
  napkin_math: |
    **Assumptions & Constraints:**
    - Primary INT8 Model: 400 GOPS/frame, 30 FPS.
    - CPU Fallback Model: 80 GOPS/frame, 15 FPS.

    **Calculations:**
    - Calculate Primary Compute: 400 GOPS/frame x 30 FPS = 12 TOPS (26.6% of 45 TOPS NPU peak).
    - Calculate Degraded NPU Compute: 400 GOPS/frame x 15 FPS = 6 TOPS.
    - Calculate Fallback CPU Compute: 80 GOPS/frame x 15 FPS = 1.2 TOPS.

    **Conclusion & Interpretation:**
    - **Result: NPU load falls from 6 TOPS to 0 while fallback compute is 1.2 TOPS (Thermal-Bound)**. The key is not TOPS as a heat unit; the NPU hotspot stops receiving active power because the IP block is power-gated, while the smaller fallback workload runs elsewhere on the die.
