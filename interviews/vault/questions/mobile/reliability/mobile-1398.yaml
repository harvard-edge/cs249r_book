title: Safety-Critical ASIL-D Pedestrian Detection on Hexagon NPU
scenario: You are architecting an ASIL-D safety-critical pedestrian detection system for an autonomous micro-mobility vehicle powered by a Snapdragon 8 Gen 3 SoC. The perception stack runs on the Qualcomm Hexagon NPU, leveraging its 45 TOPS INT8 compute capacity while sharing 16 GB of LPDDR5X memory with the heterogeneous CPU/GPU subsystem.
question: How would you architect an ASIL-D pedestrian detection pipeline on Hexagon NPU with deterministic execution?
details:
  realistic_solution: Architect a statically scheduled, ahead-of-time compiled execution graph where the Hexagon NPU operates within a statically allocated, locked memory partition. Configure the SoC's system memory management unit (SMMU) to enforce strict bandwidth Quality of Service (QoS) guarantees for the NPU. Interleave lightweight Known-Answer Tests (KATs) directly into the NPU inference stream, paired with an independent, dedicated hardware watchdog timer that triggers a safe-state fallback if the NPU fails to signal completion within the 33.3ms window.
  common_mistake: |
    **The Pitfall:** Relying on the standard OS scheduler and generic software watchdogs for safety guarantees.
    **The Rationale:** Candidates design a standard asynchronous pipeline, ignoring the non-deterministic nature of shared LPDDR5X memory access and CPU/GPU bus contention.
    **The Consequence:** The system occasionally misses the 33.3ms safety deadline during memory contention spikes, and software watchdogs fail to detect hardware faults quickly enough to meet ASIL-D requirements.
  napkin_math: |
    1. **Safety Target:** 30 FPS requires a strict 33.3ms deadline per frame.
    2. **Compute Time:** A 150 GOPS INT8 model takes 150 / 45,000 = 3.33ms on the NPU.
    3. **Memory Footprint:** 12MB weights + 8MB I/O = 20MB per frame.
    4. **Contention Penalty:** Peak LPDDR5X is ~68 GB/s. With a pessimistic 75% starvation from CPU/GPU, effective bandwidth is 17 GB/s. Memory latency = 20MB / 17,000 MB/s = ~1.18ms.
    5. **Total Deterministic Time:** 3.33ms + 1.18ms = 4.51ms.
    **Result:** With a worst-case execution time of **4.51ms**, there is a massive **28.79ms slack budget** to run hardware-in-the-loop self-tests without violating the ISO 26262 deadline.
