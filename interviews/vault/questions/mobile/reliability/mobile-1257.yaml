title: Diagnosing Thermal Throttling from Adversarial Inputs on Tensor G3
scenario: Your team deployed the Gemini Nano LLM on an Android device. Under normal conditions, the on-device TPU efficiently processes queries at 15 tokens/second. However, telemetry shows that for a specific subset of user inputs, the device experiences severe thermal throttling within seconds, dropping inference speed to 2 tokens/second and rapidly draining the battery.
question: Why do certain Gemini Nano inputs trigger rapid thermal throttling and throughput collapse?
details:
  realistic_solution: |
    The system is falling victim to adversarial resource-exhaustion inputs. Unusually long or computationally expensive prompts can keep Gemini Nano's accelerator highly utilized for longer than normal interactive requests. That sustained load can exceed the phone's sustainable thermal envelope, causing Android thermal management to downclock the accelerator and reduce token throughput. Mitigate with input length limits, per-request compute budgets, cancellation, rate limiting, and monitoring for high-cost prompt patterns.
  common_mistake: |
    **The Pitfall:** Blaming generic memory leaks, background processes, or hardware degradation.
    **The Rationale:** Candidates fail to consider that the input itself is adversarial, missing the connection to computationally expensive 'sponge' examples.
    **The Consequence:** Implementing ineffective fixes while the system remains completely vulnerable to adversarial resource exhaustion.
  napkin_math: |
    **Assumptions & Constraints:**
    - Sustained thermal limit: ~2.5W.
    - Peak TPU power draw: ~4W-5W (at 7.5 TOPS).
    - Normal throughput: 15 tokens/sec.

    **Calculations:**
    - Normal prompts finish quickly, so the device can average power below the sustained thermal limit.
    - Expensive prompts keep the accelerator active long enough that instantaneous peak power becomes sustained power.
    - Once the thermal controller downclocks the accelerator, throughput can drop from the normal 15 tokens/sec toward the observed 2 tokens/sec.

    **Conclusion & Interpretation:**
    - **Result: Power-Thermal Bottleneck.** The symptom is best explained by sustained high accelerator utilization from expensive inputs, not by a memory leak or hardware failure.
