title: 'Fault Tolerance: Mastery — Systematic Failure Mode Analysis for Mobile ML'
scenario: Conduct a systematic failure mode analysis (FMEA) for a production on-device ML system serving 10M users. The system runs inference continuously and performs nightly fine-tuning.
question: What are the top 5 failure modes, their probability, impact, and mitigations with quantitative analysis?
details:
  realistic_solution: 'Top 5 by Risk Priority Number (RPN = Severity × Occurrence × Detectability). Rank: (1) Distribution shift (silent failure), (2) OOM crash during fine-tuning, (3) Battery drain, (4) Model weight corruption, (5) Checkpoint corruption.'
  common_mistake: |
    **The Pitfall:** Listing only hardware failures.
    **The Rationale:** Candidates ignore software and data quality failures that are vastly more common in ML systems.
    **The Consequence:** They build robust hardware failovers but the system still fails silently due to model drift or OOM crashes.
  napkin_math: |
    **Assumptions & Constraints:**
    - Risk Priority Number (RPN) = Severity × Occurrence × Detectability.
    - 1-10 scale for each factor.

    **Calculations:**
    - Distribution shift: S=8, O=5, D=9 -> RPN=360.
    - OOM during fine-tuning: S=5, O=4, D=8 -> RPN=160.
    - Battery drain: S=6, O=6, D=2 -> RPN=72.
    - Weight corruption: S=9, O=2, D=3 -> RPN=54.
    - Checkpoint corruption: S=7, O=2, D=2 -> RPN=28.

    **Conclusion & Interpretation:**
    - **Result: Distribution shift and OOM (Reliability-bound failure modes)**. These are the highest priority risks to mitigate.
