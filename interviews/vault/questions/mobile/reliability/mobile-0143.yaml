title: The Privacy Wall
scenario: "Your team has shipped a new on-device camera feature to 10 million users. You suspect a silent accuracy degradation is occurring, but you cannot get ground truth labels. You decide to use federated analytics to monitor the distribution of the model's output logits."
question: "What is the primary reason you must use a privacy-preserving technique like federated analytics instead of simply logging raw camera images and sending them to your servers?"
details:
  realistic_solution: "Deploying federated analytics operates locally, collecting aggregated statistics (e.g., histogram arrays) instead of transferring raw payload content. Centralizing PII (such as raw camera rolls) strictly violates global data protection regimens like GDPR and CCPA, representing a terminal legal failure and catastrophic trust erosion."
  common_mistake: |
    **The Pitfall:** Focusing on technical constraints, such as network bandwidth or battery life, as the primary barrier.
    **The Rationale:** Candidates fail to recognize that while bandwidth is a concern, it is entirely secondary to the absolute product and legal requirement to protect user privacy.
    **The Consequence:** Designing an architecture that fundamentally violates data protection laws (e.g., GDPR, CCPA) and immediately breaks user trust.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Fleet Size: 10M users at 5 inferences/day = 50M images/day.
       - Raw image size: 250 KB.
    2. **Calculations:**
       - Total daily data = 50,000,000 * 250,000 bytes = 12.5 TB/day.
       - Yearly data volume = 12.5 TB * 365 = ~4.5 PB of user photos.
    3. **Conclusion & Interpretation:**
       - **Result: Privacy-Bound.** Even disregarding the legal catastrophe, transmitting **12.5 TB/day** consumes immense cellular bandwidth and generates massive cloud storage costs, making federated analytics a strict necessity.
  options:
  - The daily cellular data usage would be too expensive for users.
  - The constant network requests would drain the device's battery too quickly.
  - Uploading raw user data is a major privacy violation and breaks user trust.
  - The on-device storage is insufficient to buffer the image logs before uploading.
  correct_index: 2
