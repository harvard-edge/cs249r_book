title: On-Device Adversarial Input Detection for Safety-Critical ML on Tensor G3
scenario: You are developing a safety-critical real-time object detection system. Malicious actors can induce misclassifications by subtly modifying camera frames.
question: How would you detect and mitigate input-level adversarial attacks on a real-time object detector without impacting performance?
details:
  realistic_solution: |
    Use a low-cost detection and mitigation stage that is bounded in latency. Normalize and validate camera frames before inference, then run a lightweight perturbation or distribution-shift detector in parallel with the object detector where hardware scheduling allows. Gate the detector output with confidence, temporal consistency, and object-track plausibility checks. If the input is suspicious, sanitize the frame, lower autonomy, reject the detection, or fall back to a conservative model or safe-state policy instead of silently trusting the primary result. Keep the defense small enough to fit the frame budget and validate it against clean-frame accuracy, attack recall, false positives, and worst-case latency.
  common_mistake: |
    **The Pitfall:** Over-relying on retraining the model with adversarial examples.
    **The Rationale:** Candidates often suggest reactive retraining or propose computationally expensive defense models that ignore the strict performance and memory constraints of a mobile SoC.
    **The Consequence:** The proposed solution either fails to generalize to novel attacks or destroys the real-time FPS requirement of the autonomous system.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target framerate: >10 FPS.
    - Primary inference: 40 ms/frame.
    - Lightweight detector: 12 ms/frame if run serially.
    - Scheduling overhead when parallelized: 3 ms/frame.

    **Calculations:**
    - Serial worst case: 40 ms + 12 ms = 52 ms/frame, or 1000 / 52 = 19.2 FPS.
    - Parallel case with contention: max(40 ms, 12 ms) + 3 ms = 43 ms/frame, or 1000 / 43 = 23.3 FPS.
    - Both cases remain below the 100 ms/frame maximum implied by a >10 FPS target.

    **Conclusion & Interpretation:**
    - **Result: SLA Maintained if the Detector Stays Lightweight.** The defense can meet the >10 FPS target with these assumptions, but production validation must confirm TPU/CPU contention, thermal behavior, and false-positive fallback rates.
