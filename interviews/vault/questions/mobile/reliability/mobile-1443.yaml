title: Thermal Degradation for Video Segmentation on A17 Pro
scenario: You are designing a real-time background blurring feature for a video conferencing app. The primary model delivers high-fidelity segmentation but under sustained use, the device hits thermal limits, throttling the NPU.
question: How would you design a degradation ladder that transitions to a fallback state without dropping frames or exhausting unified memory?
details:
  realistic_solution: Design a fail-operational pipeline by keeping a lightweight, sub-resolution fallback model resident when memory headroom allows and by warming the transition path before thermal pressure becomes severe. Use OS thermal-state signals plus measured frame latency to step down resolution, frame cadence, or model size before the primary path misses the 33 ms frame budget. The resident fallback reduces transition risk and avoids disk I/O during throttling, but it does not guarantee perfect smoothness; scheduling, memory pressure, and camera/render pipeline handoff still need testing.
  common_mistake: |
    **The Pitfall:** Dynamically loading a smaller fallback model from persistent storage only when thermal throttling triggers.
    **The Rationale:** Developers attempt to save RAM, assuming loading a tiny model from flash is virtually instantaneous.
    **The Consequence:** Reading weights from disk creates a massive, blocking memory bandwidth spike, exacerbating heat generation and causing severe frame drops precisely when the system is already distressed.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target Framerate: 30 FPS (33ms latency budget).
    - Primary Model Cost: 400 GOP/frame.
    - Fallback Model Cost: 50 GOP/frame.
    - Measured unthrottled NPU budget for this pipeline: 35 TOPS peak-class.
    - Severe sustained thermal state leaves about 30% of that budget: 10.5 TOPS.

    **Calculations:**
    - Primary sustained requirement = 400 GOP/frame * 30 frames/sec = 12,000 GOP/s = 12 TOPS.
    - Fallback sustained requirement = 50 GOP/frame * 30 frames/sec = 1,500 GOP/s = 1.5 TOPS.
    - Throttled state vs primary: 10.5 TOPS available < 12 TOPS required, so the primary path is likely to miss frames.
    - Throttled state vs fallback: 10.5 TOPS available > 1.5 TOPS required, leaving scheduling and render headroom.
    - Dynamic load risk: reading a 50 MB fallback during throttling can stall the frame pipeline; a resident 12 MB fallback avoids that transition I/O.

    **Conclusion & Interpretation:**
    - **Result: compute and thermal bound**. The fallback reduces sustained compute from 12 TOPS to 1.5 TOPS and avoids load-time I/O, making smooth degradation plausible if the transition path and memory pressure are validated on device.
