title: Thermal Degradation for Video Segmentation on A17 Pro
scenario: You are designing a real-time background blurring feature for a video conferencing app. The primary model delivers high-fidelity segmentation but under sustained use, the device hits thermal limits, throttling the NPU.
question: How would you design a degradation ladder that transitions to a fallback state without dropping frames or exhausting unified memory?
details:
  realistic_solution: Design a fail-operational architecture by keeping a lightweight, sub-resolution fallback model permanently resident in unified memory. When the OS thermal state API broadcasts a throttling event, the pipeline must instantaneously route frames to the fallback model. This sheds immediate compute load to maintain the strict 30 FPS real-time deadline without incurring catastrophic memory I/O penalties.
  common_mistake: |
    **The Pitfall:** Dynamically loading a smaller fallback model from persistent storage only when thermal throttling triggers.
    **The Rationale:** Developers attempt to save RAM, assuming loading a tiny model from flash is virtually instantaneous.
    **The Consequence:** Reading weights from disk creates a massive, blocking memory bandwidth spike, exacerbating heat generation and causing severe frame drops precisely when the system is already distressed.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target Framerate: 30 FPS (33ms latency budget).
    - Primary Model: 0.4 TOPS/frame (12 TOPS required sustained).
    - Fallback Model: 0.05 TOPS/frame (1.5 TOPS required sustained).
    - Throttling Impact: NPU capacity drops 70% (35 TOPS -> 10.5 TOPS).

    **Calculations:**
    - Throttled state vs Primary: 10.5 TOPS available < 12 TOPS required (Fails 30 FPS deadline).
    - Throttled state vs Fallback: 10.5 TOPS available > 1.5 TOPS required (Passes easily).
    - Memory swap cost: Dynamically reading 50MB from flash spikes bandwidth and stalls rendering. Resident fallback requires only 12MB of static RAM.

    **Conclusion & Interpretation:**
    - **Result: Compute and Thermal-Bound**. Keeping a lightweight 1.5 TOPS model permanently resident bypasses disk I/O spikes and guarantees a perfectly smooth degradation ladder when thermal throttling crushes NPU capacity.
