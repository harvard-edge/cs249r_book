title: Diagnosing Exynos NPU Latency Spikes
scenario: You are deploying a safety-critical driver monitoring model on a Samsung Exynos 2400 NPU. The watchdog timer triggers because the NPU occasionally spikes from 12ms to over 40ms. The NPU shares the device's 12 GB LPDDR5X bus with the CPU, GPU, and ISP.
question: Why does an Exynos 2400 safety model occasionally spike from 12ms to over 40ms, and how can determinism be restored?
details:
  realistic_solution: The root cause is memory bandwidth starvation caused by heterogeneous architectural contention. Heavy concurrent image processing (ISP) or graphics rendering (GPU) physically saturates the unified LPDDR5X bus. Restoring determinism requires configuring rigid hardware QoS (Quality of Service) policies to guarantee a locked minimum bandwidth floor for the NPU's traffic.
  common_mistake: |
    **The Pitfall:** Assuming the NPU is thermal throttling or that the OS task scheduler is dropping threads.
    **The Rationale:** Overlooking the physical bottleneck of unified memory subsystems under concurrent multi-processor workloads.
    **The Consequence:** Misdiagnosing the hardware stall and failing to implement QoS limits, leaving the safety-critical monitoring system vulnerable to GPU/ISP interference.
  napkin_math: |
    **Assumptions & Constraints:**
    - LPDDR5X Peak Bandwidth: ~68 GB/s.
    - NPU peak demand (~34 TOPS, 2 OPS/byte): ~17 GB/s.
    - ISP demand (4K 60fps noise reduction): ~25 GB/s.
    - GPU demand (Heavy UI transitions): ~30 GB/s.

    **Calculations:**
    - Total worst-case peak demand: 17 GB/s + 25 GB/s + 30 GB/s = 72 GB/s.
    - Deficit: 72 GB/s > 68 GB/s (Bus Saturation).

    **Conclusion & Interpretation:**
    - **Result: 72 GB/s (Bandwidth-Bound)**. Heavy concurrent subsystem memory traffic requests 72 GB/s, eclipsing the 68 GB/s physical capacity and starving the NPU queue, directly causing the 3x tail latency spikes.
