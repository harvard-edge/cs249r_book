title: Analyzing Manifest Chunking for Flaky Networks
scenario: A mobile app downloads a 2GB model update over an unstable 4G connection, with frequent multi-second connection drops.
question: Analyze why breaking the file into 10MB chunks with a manifest file is superior to a single monolithic HTTP request.
details:
  realistic_solution: |
    A single monolithic request fails catastrophically upon connection drops because standard TCP resets often force the client to restart the download from zero byte. Chunking allows the client to explicitly track downloaded segments via a manifest. Upon a drop, the client resumes by requesting only the missing 10MB parts (via HTTP Range requests or targeted URIs), making forward progress strictly monotonic across disconnections.
  common_mistake: |
    **The Pitfall:** Relying solely on low-level TCP window retries for a multi-gigabyte payload.
    **The Rationale:** Candidates wrongly assume that OS-level network protocols will automatically and indefinitely handle long radio disconnections without requiring application-layer orchestration.
    **The Consequence:** The massive download constantly restarts from zero on a flaky 4G connection, burning vast amounts of cellular bandwidth and never successfully completing the model update.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Total File Size: 2000 MB.
       - Chunk Size: 10 MB.
       - Network: Unstable 4G with multi-second connection resets.
    2. **Calculations:**
       - Required Chunks: 2000 MB / 10 MB = 200 distinct chunks.
       - Monolithic failure penalty: Up to 1999 MB of data discarded per drop.
       - Chunking failure penalty: At most 10 MB of in-flight data discarded per drop.
    3. **Conclusion & Interpretation:**
       **Result: Monotonic progress via 200 verifiable segments (Network-Bound).** Chunking structurally guarantees successful completion by capping the worst-case progress loss at 0.5%.
