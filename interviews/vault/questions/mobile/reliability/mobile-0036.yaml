title: Core ML Inference Regression After App Update
scenario: After an app update with zero changes to the ML model or inference code, inference latency on an iPhone 14 Pro increased from 12 ms to 28 ms (a 2.3x regression).
question: What non-model regression could explain identical model binaries becoming slower after a mobile app update?
details:
  realistic_solution: 'The regression can be outside the model binary: an app update may change the iOS deployment target, Core ML framework/runtime version, compiler flags, model loading configuration, precision settings, or delegate selection. A build that previously kept all supported ops on the ANE may now route a few ops through GPU or CPU fallback, add synchronization between accelerators, disable a cached compiled model, or change preprocessing thread priority. Diagnose by comparing Core ML execution plans, signposts, OS/framework versions, build settings, and per-op latency before and after the app update.'
  common_mistake: |
    **The Pitfall:** Assuming model latency is strictly a function of the model weights and architecture.
    **The Rationale:** Candidates think that if the input binary is identical, the execution time must remain constant.
    **The Consequence:** They fail to investigate the OS-level runtime, framework versions, or CoreML compilation delegates that dynamically map operations to hardware.
  napkin_math: |
    **Assumptions & Constraints:**
    - Original Profile: 100% of layers run on the Apple Neural Engine (ANE) = 12ms.
    - Regressed Profile: most layers still run on ANE, but a few unsupported or differently compiled ops require GPU fallback plus synchronization.

    **Calculations:**
    - Regressed Profile: ANE work = 8ms, GPU fallback work = 12ms, accelerator synchronization/copy overhead = 8ms.
    - New Latency: 8ms + 12ms + 8ms = 28ms.
    - Latency Penalty: 28ms - 12ms = 16ms.

    **Conclusion & Interpretation:**
    - **Result: 16ms regression (Runtime-Routing Bound)**. Identical model weights can slow down when the app build or framework changes accelerator routing, compiled-model caching, or fallback behavior.
