title: Mobile Drift Telemetry Spec
scenario: A mobile keyboard model adapts locally. The team wants to detect drift without collecting raw typed text.
question: What privacy-preserving telemetry can detect drift in a locally adapted mobile keyboard model without uploading raw text?
details:
  realistic_solution: Use aggregate counters such as acceptance rate, correction rate, latency, confidence histograms, language/locale bucket, app version, and opt-in feedback signals. Add local differential privacy or secure aggregation where appropriate. Raw text should not be required for first-line drift monitoring.
  common_mistake: |
    **The Pitfall:** Assuming drift detection fundamentally requires uploading raw user text.
    **The Rationale:** Candidates default to centralized data evaluation techniques rather than leveraging aggregate behavioral telemetry.
    **The Consequence:** The design violates user privacy and risks severe regulatory penalties.
  napkin_math: |
    **Assumptions & Constraints:**
    - Telemetry: 20 aggregate counters/day
    - Size: 8 bytes per counter
    - Fleet scale: 1,000,000 devices

    **Calculations:**
    - Data per device = 20 * 8 = 160 bytes/day
    - Total fleet data = 1,000,000 * 160 bytes = 160,000,000 bytes/day (~160 MB/day)

    **Conclusion & Interpretation:**
    - **Result: 160 MB/day (Privacy-Preserving Efficacy)**. 160 MB/day provides sufficient drift signal across the fleet while mathematically preserving individual privacy.
