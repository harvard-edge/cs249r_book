title: On-Device PSI Drift Compute Bottleneck
scenario: A mobile app uses an on-device LLM on a TPU to summarize notifications. To detect concept drift, a nightly background job calculates the Population Stability Index (PSI) by retrieving the last 50,000 raw notification texts, re-loading the embedding model, generating 768-dimensional FP16 embeddings for all 50,000 texts, and comparing their distribution against a baseline. Telemetry shows this nightly job frequently causes sustained TPU load, thermal throttling, and background-task termination.
question: How would you analyze why this specific statistical detection workflow degrades system reliability?
details:
  realistic_solution: The system failure is caused by re-running model inference in a dense background batch rather than by the PSI calculation itself. Generating 50,000 embeddings creates a large burst of sustained TPU activity and memory traffic, which can push the SoC into thermal throttling and cause the OS to curtail the background task. The robust approach is to cache the 768-dimensional embeddings incrementally at inference time during the day, which makes the nightly PSI calculation computationally trivial.
  common_mistake: |
    **The Pitfall:** Assuming the PSI mathematical formula itself is the performance bottleneck.
    **The Rationale:** Candidates focus on the statistical calculation and fail to distinguish it from the massive cost of data preparation (embedding generation).
    **The Consequence:** The proposed fix focuses on optimizing the PSI math while ignoring the actual thermal and memory constraints triggered by the LLM.
  napkin_math: |
    **Assumptions & Constraints:**
    - 50,000 text notifications.
    - Embedding compute cost: ~5 GOPs/embedding. FP16 format (2 bytes/dim).
    - Sustained background embedding throughput after overheads: ~500 embeddings/sec.

    **Calculations:**
    - Compute cost to re-run: 50,000 texts x 5 GOPs = 250,000 GOPs = 250 TOP operations.
    - Background job time: 50,000 embeddings / 500 embeddings/sec = 100 seconds of sustained TPU work.
    - Embedding storage (cached): 50,000 x 768 dims x 2 bytes = 76.8 MB.

    **Conclusion & Interpretation:**
    - **Result: 250 TOP of avoidable embedding work**. Re-computing embeddings creates a long sustained accelerator workload, leading to throttling risk. Caching the 76.8 MB of embeddings directly bypasses this embedding-generation workload.
