title: 'Diagnosing Latency Spikes on Snapdragon 8 Gen 3'
scenario: 'You have deployed a real-time video processing model on Android devices equipped with the Qualcomm Hexagon NPU (Snapdragon 8 Gen 3). After a recent model update, your production health dashboards show a sudden increase in P99 inference latency, accompanied by user complaints about rapid battery drain. Telemetry indicates that overall NPU utilization has dropped, while traffic on the shared 12-16 GB LPDDR5X memory bus is heavily saturated.'
question: 'How do you diagnose the root cause of these symptoms using your knowledge of this heterogeneous architecture?'
details:
  realistic_solution: 'The symptoms strongly indicate an operation fallback issue. The Snapdragon 8 Gen 3 uses a heterogeneous architecture where the CPU, GPU, and NPU share the LPDDR5X memory. If the new model introduced operations not supported by the Hexagon NPU, those ops fall back to the CPU or GPU. This forces the system to constantly copy intermediate tensors back and forth across the shared memory bus, leading to the observed memory saturation, latency spikes, and severe battery drain. The fix requires profiling the model to identify the unsupported ops and replacing them with NPU-compatible alternatives.'
  common_mistake: 'Candidates often assume the new model is simply too large or computationally heavy, suggesting generic solutions like heavier INT8 quantization or pruning. They fail to analyze the contradictory telemetry (low NPU utilization alongside high memory bandwidth) and miss the implications of heterogeneous computing on a shared memory bus.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Hexagon NPU capacity: 45 TOPS INT8.
    - Mid-network activation tensor: 4 MB.
    - System runs at 30 FPS.

    **Calculations:**
    - Single fallback memory traffic: 4 MB write + 4 MB read = 8 MB.
    - Base fallback bandwidth at 30 FPS: 8 MB * 30 = 240 MB/s.
    - Severe fallback bandwidth (10 stutters): 240 MB/s * 10 = 2.4 GB/s.

    **Conclusion & Interpretation:**
    - **Result: 2.4 GB/s Overhead (Memory-Bound).** Operation fallbacks shatter NPU efficiency, introducing massive memory bandwidth overhead that directly causes latency spikes and rapid battery drain.
