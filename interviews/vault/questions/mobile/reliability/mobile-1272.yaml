title: Diagnosing Latency Spikes on Snapdragon 8 Gen 3
scenario: You have deployed a real-time video processing model on Android devices equipped with the Qualcomm
  Hexagon NPU (Snapdragon 8 Gen 3). After a recent model update, your production health dashboards show
  a sudden increase in P99 inference latency, accompanied by user complaints about rapid battery drain.
  Telemetry indicates that overall NPU utilization has dropped, while traffic on the shared 12-16 GB LPDDR5X
  memory bus is heavily saturated.
question: How do you diagnose the root cause of these symptoms using your knowledge of this heterogeneous
  architecture?
details:
  realistic_solution: The symptoms strongly indicate an operation fallback issue. The Snapdragon 8 Gen
    3 uses a heterogeneous architecture where the CPU, GPU, and NPU share the LPDDR5X memory. If the new
    model introduced unsupported operations, they fall back to the CPU. If this happens multiple times
    per frame, the system is forced to constantly copy intermediate tensors back and forth across the
    shared memory bus, leading to tens of gigabytes per second of overhead. This severe memory saturation
    causes latency spikes and battery drain. The fix requires profiling to replace these ops with NPU-compatible
    ones.
  common_mistake: '**The Pitfall:** Candidates often assume the new model is simply too large or computationally
    heavy, suggesting generic solutions like heavier INT8 quantization or pruning.

    **The Rationale:** They fail to analyze the contradictory telemetry (low NPU utilization alongside
    high memory bandwidth) and miss the implications of heterogeneous computing on a shared memory bus.

    **The Consequence:** Engineers waste time on model compression techniques instead of diagnosing and
    fixing the operator graph breaks causing the CPU fallback.'
  napkin_math: '**Assumptions & Constraints:**

    - Hexagon NPU capacity: 45 TOPS INT8.

    - Mid-network activation tensor: 4 MB.

    - System runs at 30 FPS.

    - 100 unsupported operations causing graph breaks per frame.


    **Calculations:**

    - Single fallback memory traffic: 4 MB write + 4 MB read = 8 MB.

    - Fallback traffic per frame: 8 MB * 100 fallbacks = 800 MB/frame.

    - Total fallback bandwidth at 30 FPS: 800 MB/frame * 30 FPS = 24.0 GB/s overhead.


    **Conclusion & Interpretation:**

    - **Result: 24.0 GB/s Overhead (Memory-Bound).** Operation fallbacks shatter NPU efficiency, introducing
    massive memory bandwidth overhead that directly causes bus saturation, latency spikes, and rapid battery
    drain.'
