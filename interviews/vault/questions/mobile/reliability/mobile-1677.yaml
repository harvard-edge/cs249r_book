title: Graceful Degradation for On-Device ML on Samsung Exynos 2400
scenario: Your team is developing a critical on-device ML application for a premium mobile phone, leveraging the Samsung Exynos 2400 NPU. This application performs real-time personalized content recommendations and requires high availability. Given the fluctuating device resources (battery, thermal state, background apps), you need to implement a degradation ladder.
question: How would you design degradation ladders, model fallbacks, fail-safe modes, and QoS shedding for Exynos 2400 on-device ML?
details:
  realistic_solution: |
    A robust solution would start by categorizing ML features by criticality. For instance, basic content filtering could be fail-operational (always provide some result, even if coarse), while advanced personalization could be fail-safe (disabled if resources are low). A degradation ladder would be established:
    1.  **Tier 1 (Optimal):** Full-sized, high-precision (FP16/BF16) models on Exynos NPU, max inference rate.
    2.  **Tier 2 (Moderate Degradation):** Smaller, optimized models (e.g., distilled versions) or INT8 quantization on Exynos NPU, possibly with slight reduction in inference frequency. This leverages the NPU's efficiency for lower-precision ops.
    3.  **Tier 3 (Significant Degradation):** CPU fallback for non-critical models, using highly compressed models. Quality-of-service shedding would reduce input resolution or batch size.
    4.  **Tier 4 (Critical Fail-Safe):** Only essential, minimal ML tasks run on CPU if NPU is unavailable or thermal limits are severe, or features are disabled entirely.
    Dynamic monitoring of NPU load, temperature, battery, and memory usage would trigger transitions between tiers. The 12 GB LPDDR5X memory provides ample buffer, but bandwidth usage for large models must be considered during rapid context switching or data transfer between NPU and main memory.
  common_mistake: |
    **The Pitfall:** Treating graceful degradation as a generic software problem without incorporating hardware specifications (TOPS, memory bandwidth).
    **The Rationale:** Candidates focus on theoretical model swapping but ignore the massive bandwidth cost of loading fallback weights from RAM to the NPU during a context switch.
    **The Consequence:** Attempting to degrade actually causes a severe latency spike as multiple gigabytes of models are rapidly swapped over the LPDDR5X bus.
  napkin_math: |
    **Assumptions & Constraints:**
    - Full recommendation model: 80 GOP per inference at 10 inferences/sec.
    - Degraded distilled model: 20 GOP per inference at 5 inferences/sec.
    - Assume sustained effective NPU capacity available to this app is 5 TOPS after thermal and multitasking limits.
    - Optional fallback asset size: 200 MB; effective memory bandwidth for loading from storage/cache to executable buffers: 10 GB/sec.

    **Calculations:**
    - Full model demand = 80 GOP * 10/sec = 800 GOP/sec = 0.8 TOPS.
    - Degraded model demand = 20 GOP * 5/sec = 100 GOP/sec = 0.1 TOPS.
    - Compute reduction = 0.8 - 0.1 = 0.7 TOPS, an 87.5% reduction for this workload.
    - Loading a 200 MB fallback asset takes about 0.2 GB / 10 GB/sec = 20 ms before validation and runtime setup.

    **Conclusion & Interpretation:**
    - **Result: Graceful degradation reduces this workload from 0.8 TOPS to 0.1 TOPS, but model switching is not free.** The ladder should prefer preloaded or cached fallbacks, lower inference frequency, and disable non-critical features before thermal or memory pressure causes large latency spikes.
