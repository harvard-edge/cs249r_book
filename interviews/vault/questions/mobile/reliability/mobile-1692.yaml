title: Mitigating Adversarial Attacks on On-Device ML for Google Tensor G3
scenario: A privacy-preserving on-device ML application runs real-time classification of sensitive user data on a Google Tensor G3. The system is susceptible to adversarial attacks, including data poisoning, model inversion, and side-channel power analysis.
question: How would you design a robust system architecture to detect and mitigate adversarial threats on the Tensor G3 platform?
details:
  realistic_solution: |
    Use a layered on-device architecture tied to the Tensor G3 trust boundary. Store signed model artifacts, policy, and rollback-protected version metadata under Android Keystore/StrongBox backed by Titan M2, and verify them before loading the runtime. Keep sensitive features local, minimize retained embeddings, and gate any federated or personalization updates with secure aggregation, update clipping, anomaly scoring, and server-side poisoning detection before accepting a new model. At inference time, run a lightweight input validation and uncertainty monitor alongside the TPU model, reject or sanitize suspicious inputs, and fall back to a smaller conservative classifier or local-only safe behavior when confidence, drift, or integrity checks fail. Mitigate model inversion with output minimization, confidence rounding, rate limits, and optional differential privacy for telemetry. Treat power side channels as a product hardening risk: reduce secret-dependent control flow, keep model execution shapes fixed where possible, and monitor coarse health signals rather than relying on desktop profiling tools at runtime.
  common_mistake: |
    **The Pitfall:** Relying solely on standard adversarial training without hardware-specific defenses.
    **The Rationale:** Candidates often apply cloud-centric defense strategies to edge devices, neglecting the unique constraints and attack vectors of physical hardware.
    **The Consequence:** Leaving the model vulnerable to side-channel attacks and failing to utilize the device's built-in secure enclave (Titan M2) for cryptographic attestation.
  napkin_math: |
    **Assumptions & Constraints:**
    - TPU capacity used for budget check: 7.5 trillion INT8 ops/sec.
    - Adversarial detection rate: 100 Hz.
    - Lightweight detector cost: 1 billion ops per check.
    - CPU data stream: 10 MB/s.
    - CPU block size: 64 bytes.
    - Hashing cost: 500 cycles/block.
    - CPU reference frequency for context: 2 GHz.

    **Calculations:**
    - TPU detector demand: 100 checks/sec * 1 GOP/check = 100 GOPS = 0.1 TOPS.
    - TPU utilization: 0.1 TOPS / 7.5 TOPS = 1.33%.
    - CPU blocks/sec: 10 MB/s / 64 bytes = 156,250 blocks/sec.
    - CPU hashing demand: 156,250 blocks/sec * 500 cycles/block = 78,125,000 cycles/sec.
    - CPU share at 2 GHz: 78.1M / 2,000M = 3.9% of one core.

    **Conclusion & Interpretation:**
    - **Result: Low Utilization Budget.** A 100 Hz, 1 GOP detector uses about 1.33% of the stated TPU budget, and stream hashing uses about 3.9% of one 2 GHz CPU core. The architecture is not compute-bound by these checks, but it still needs latency, battery, and thermal validation.
