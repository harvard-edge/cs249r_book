title: 'The ML Error That Looks Like a Feature'
scenario: 'Your camera app uses an on-device portrait mode model. After a routine iOS update, users start posting that your app''s portrait mode ''looks different — more dreamy.'' Engagement increases 5%. Your QA team didn''t catch any issue, but your ML engineer says the model is producing mathematically wrong results.'
question: 'Why does an iOS update make portrait mode look more dreamy, and should the camera app ship or fix the change?'
details:
  realistic_solution: 'Diagnose first, then decide: Color space difference: sRGB gamut covers 35% of CIE 1931. Display P3 covers 45%. Pixel values in P3 are ~15% lower for the same perceived color (wider range, same 8-bit encoding). Depth estimation er'
  common_mistake: |
    **The Pitfall:** Shipping uncontrolled changes just because business metrics (engagement) improved.
    **The Rationale:** Product teams assume that if users like it, it must be a feature, ignoring the underlying technical degradation.
    **The Consequence:** An uncontrolled change to model behavior means the team no longer understands their system, leading to unmaintainable code and inevitable future regressions.
  napkin_math: |
    **Assumptions & Constraints:**
    - Color Space Change: sRGB covers 35% of CIE 1931; Display P3 covers 45%.
    - Encoding: Both use 8-bit encoding (0-255).

    **Calculations:**
    - Pixel Value Shift: Because P3 has a wider gamut, the same absolute color requires pixel values ~15% lower in P3 vs sRGB.
    - Algorithmic Error: This 15% shift causes depth estimation to exhibit ~8% systematic bias toward "farther."

    **Conclusion & Interpretation:**
    - **Result: 8% error (Data-Distribution-Bound)**. The ~8% bias incorrectly widens the bokeh blur kernel. The system is technically broken despite visual appeal; the mismatch must be fixed to regain deterministic control.
  options:
  - 'Rollback capability is unnecessary if the model was validated in the cloud.'
  - 'If engagement is up by 5%, the model is working better — don''t touch it.'
  - 'The safest strategy is to update firmware and model in a single atomic package to avoid version skew between them.'
  - 'Diagnose first: The 15% lower pixel values in P3 cause an 8% depth estimation error, resulting in incorrect blur.'
