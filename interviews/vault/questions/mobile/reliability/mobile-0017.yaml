title: The ML Error That Looks Like a Feature
scenario: Your camera app uses an on-device portrait mode model. After a routine iOS update, users start posting that your app's portrait mode 'looks different — more dreamy.' Engagement increases 5%. Your QA team didn't catch any issue, but your ML engineer says the model is producing mathematically wrong results.
question: Why does an iOS update make portrait mode look more dreamy, and should the camera app ship or fix the change?
details:
  realistic_solution: Diagnose first, then decide. Treat the engagement lift as a product signal, not proof of correctness. Compare pre-update and post-update camera frames, preprocessing outputs, model tensors, and blur masks on a fixed image suite. A plausible iOS-update regression is a camera pipeline or preprocessing change, such as a different color-conversion matrix, exposure/white-balance behavior, crop, orientation metadata handling, or pixel-buffer format. If the new look is caused by an uncontrolled preprocessing mismatch, roll back or normalize the input path, then intentionally A/B test the visual style as a product change.
  common_mistake: |
    **The Pitfall:** Shipping uncontrolled changes just because business metrics (engagement) improved.
    **The Rationale:** Product teams assume that if users like it, it must be a feature, ignoring the underlying technical degradation.
    **The Consequence:** An uncontrolled change to model behavior means the team no longer understands their system, leading to unmaintainable code and inevitable future regressions.
  napkin_math: |
    **Assumptions & Constraints:**
    - Fixed validation suite: 1,000 representative portrait frames.
    - Alert threshold: mean absolute blur-mask difference above 2% versus the approved baseline requires investigation.
    - Post-update comparison: 140 frames exceed the threshold.

    **Calculations:**
    - Drift rate: 140 / 1,000 = 14% of validation frames.
    - 14% is 7x the 2% alert threshold.

    **Conclusion & Interpretation:**
    - **Result: 14% drift (Preprocessing-Bound)**. The system is not under deterministic control even though engagement improved. Fix or roll back the unintended preprocessing change, then test the dreamier style intentionally if product wants it.
  options:
    - Rollback capability is unnecessary if the model was validated in the cloud.
    - If engagement is up by 5%, the model is working better — don't touch it.
    - The safest strategy is to update firmware and model in a single atomic package to avoid version skew between them.
    - 'Diagnose first: compare fixed pre-update and post-update inputs, tensors, and masks. If an iOS camera or preprocessing change caused uncontrolled blur-mask drift, roll back or normalize the pipeline before treating the dreamier look as a product experiment.'
