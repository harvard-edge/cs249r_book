title: Checkpoint Frequency vs OOM Recovery in Federated Learning
scenario: A federated learning client trains locally. It faces sudden iOS out-of-memory (OOM) evictions. A 50MB model state writes to NVMe at 1 GB/s.
question: Analyze the trade-off between checkpointing frequency and OOM recovery overhead to minimize total wasted training time?
details:
  realistic_solution: Writing a 50MB checkpoint takes 50 milliseconds using asynchronous I/O. If the model checkpoints frequently (e.g., every 1 second), it loses 5% of its compute time to I/O overhead. However, if it checkpoints too infrequently (e.g., every 60 seconds) and an OOM killer strikes, it loses up to 60 seconds of training progress. The optimal frequency balances the continuous 50ms I/O penalty against the expected magnitude of lost progress based on the OOM probability distribution.
  common_mistake: |
    **The Pitfall:** Considering only the checkpoint write time.
    **The Rationale:** Candidates fail to balance the continuous I/O penalty against the mean-time-to-failure (MTTF) of the OOM killer.
    **The Consequence:** Either checkpointing too frequently (wasting compute time) or too infrequently (losing significant progress upon OOM).
  napkin_math: |
    **Assumptions & Constraints:**
    - Checkpoint size: 50 MB.
    - Write bandwidth: 1 GB/s = about 1000 MB/s.
    - OOM arrival distribution is not specified.

    **Calculations:**
    - Checkpoint write time: 50 MB / 1000 MB/s = 0.05 seconds = 50 ms.
    - If checkpointing every 1 second, direct write overhead is 0.05 / 1.0 = 5%.
    - If checkpointing every 60 seconds, direct write overhead is 0.05 / 60 = 0.083%, but an OOM can lose up to 60 seconds of local progress.

    **Conclusion & Interpretation:**
    - **Result: 50 ms per checkpoint (I/O vs Recovery tradeoff)**. The best interval cannot be computed from the prompt alone; it requires an OOM failure-rate model, so the defensible answer is to balance the fixed 50 ms write cost against expected lost progress.
