title: Tensor G3 On-Device LLM Degradation Strategy
scenario: You are designing the fallback architecture for a real-time translation and summarization feature on a device powered by the Google Tensor G3. The primary model is Gemini Nano running on the on-device TPU, but the system faces fluctuating thermal constraints and varying memory availability due to concurrent background tasks.
question: How would you build a fail-operational degradation ladder for Tensor G3 translation and summarization under thermal and RAM pressure?
details:
  realistic_solution: 'A robust design involves a multi-tier degradation ladder: Tier 1 uses the uncompressed Gemini Nano model on the TPU. Tier 2 shifts summarization to a highly quantized INT4 model while keeping latency-critical translation on the throttled TPU. Tier 3 triggers aggressive load shedding, dropping summarization to run a minimal NMT model on the CPU, guaranteeing fail-operational translation without OOM crashes.'
  common_mistake: |
    **The Pitfall:** Proposing a binary fallback (e.g., switch entirely to a cloud model or fail).
    **The Rationale:** Candidates ignore latency and privacy implications in low-connectivity scenarios and overlook intermediate steps like dynamic quantization.
    **The Consequence:** The system drops the feature entirely instead of gracefully degrading.
  napkin_math: |
    **Assumptions & Constraints:**
    - Peak Compute: 7.5 TOPS (Throttled: 3.75 TOPS).
    - Gemini Nano: 20 GOPS/token, 6 GB memory.
    - Fallback 1B INT4: 5 GOPS/token, 0.5 GB memory.
    - Memory Limit: 2 GB available RAM.

    **Calculations:**
    - Throttled Throughput: 3.75e12 / 20e9 = 187.5 tokens/sec.
    - Fallback Throughput: 3.75e12 / 5e9 = 750 tokens/sec.

    **Conclusion & Interpretation:**
    - **Result: 750 tokens/sec (Memory-Bound)**. The TPU has ample compute, but the strict 2 GB RAM limit necessitates the fallback.
