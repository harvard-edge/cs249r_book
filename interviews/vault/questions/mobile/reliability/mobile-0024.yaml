title: The Silent Accuracy Degradation
scenario: Your on-device image classification model was deployed 6 months ago. Users haven't complained, but your A/B test shows the new model version improves engagement by 15%. This suggests the old model has silently degraded. You have no server-side ground truth labels for on-device predictions.
question: How can you detect six-month on-device classifier degradation when there are no server-side ground-truth labels?
details:
  realistic_solution: 'Four proxy signals detect degradation without ground truth: (1) Confidence distribution shift — track KL divergence of softmax outputs (~1 byte/inference, 30 KB/month). (2) Prediction entropy — rising entropy signals increasing uncertainty. (3) Feature drift — monitor input distribution statistics. (4) Behavioral proxies — user engagement (clicks, time-on-screen, undo rate) as implicit labels.'
  common_mistake: |
    **The Pitfall:** Suggesting to monitor accuracy using a held-out test set.
    **The Rationale:** Engineers default to standard supervised evaluation techniques, forgetting the core constraint of edge deployment: there are no continuous ground-truth labels for on-device predictions.
    **The Consequence:** The proposed solution is literally impossible to implement, leaving the silent degradation undetected.
  napkin_math: |
    1. **Confidence Monitoring Data:** Tracking the max softmax score requires ~1 byte per inference.
    2. **Storage Burden:** 1000 inferences/day × 30 days = 30,000 data points. 30,000 bytes = ~30 KB/month.
    3. **Federated Evaluation Labeling:** If the app prompts users to explicitly label 100 images × 4 evaluations/year = 400 labeled predictions per user per year.
    4. **Aggregate Signal:** With 10,000 users, this yields 4M labeled predictions/year.
    **Result:** Unsupervised proxy signals (like prediction entropy) require negligible storage (**~30 KB/month**), while periodic federated evaluation provides massive statistical power without centralizing raw user data.
  options:
  - Monitor accuracy using a held-out test set.. You don't have labels for on-device predictions — there's no test set.
  - Network I/O is the dominant bottleneck; optimizing the model or inference pipeline will have minimal impact on end-to-end latency.
  - The system should be redesigned to offload inference to the cloud, as edge hardware fundamentally cannot meet the latency and accuracy requirements.
  - 'Four proxy signals detect degradation without ground truth: (1) Confidence distribution shift — track KL divergence of softmax outputs (~1 byte/inference, 30 KB/month). (2) Prediction entropy — rising entropy signals increasing uncertainty. (3) Feature drift — monitor input distribution statistics.'
