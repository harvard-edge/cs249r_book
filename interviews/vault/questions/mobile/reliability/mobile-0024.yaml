title: The Silent Accuracy Degradation
scenario: Your on-device image classification model was deployed 6 months ago. Users haven't complained, but your A/B test shows the new model version improves engagement by 15%. This suggests the old model has silently degraded. You have no server-side ground truth labels for on-device predictions.
question: How can you detect six-month on-device classifier degradation when there are no server-side ground-truth labels?
details:
  realistic_solution: 'Four proxy signals detect degradation without ground truth: (1) confidence distribution shift using on-device histograms of max confidence or class buckets, (2) prediction entropy summaries, (3) feature/input drift statistics, and (4) behavioral proxies such as clicks, time-on-screen, undo rate, or retakes as implicit labels. Compute compact daily aggregates on-device and upload summaries by model version and device segment so reviewers can compare proxy trends without raw images or labels.'
  common_mistake: |
    **The Pitfall:** Suggesting to monitor accuracy using a held-out test set.
    **The Rationale:** Engineers default to standard supervised evaluation techniques, forgetting the core constraint of edge deployment: there are no continuous ground-truth labels for on-device predictions.
    **The Consequence:** The proposed solution is literally impossible to implement, leaving the silent degradation undetected.
  napkin_math: |
    **Assumptions & Constraints:**
    - Each device builds one daily summary for the old model: 20 confidence histogram bins, 20 entropy histogram bins, 10 feature-stat buckets, and counters for 5 behavioral proxy signals.
    - Store each bucket or counter as a 4-byte integer.
    - Add 80 bytes for model version, device segment, and timestamp metadata.

    **Calculations:**
    - Signal payload: (20 + 20 + 10 + 5) * 4 bytes = 220 bytes/day.
    - With metadata: 220 + 80 = 300 bytes/device/day.
    - Monthly upload per reporting device: 300 bytes * 30 = 9,000 bytes, or about 9 KB/month.
    - 10,000 reporting devices produce about 90 MB/month of aggregate monitoring data.

    **Conclusion & Interpretation:**
    - **Result: ~9 KB/month per reporting device (Telemetry-Bound)**. Aggregated histograms and behavioral counters are small enough to monitor silent degradation without raw images or ground-truth labels.
  options:
    - Monitor accuracy using a held-out test set.. You don't have labels for on-device predictions — there's no test set.
    - Network I/O is the dominant bottleneck; optimizing the model or inference pipeline will have minimal impact on end-to-end latency.
    - The system should be redesigned to offload inference to the cloud, as edge hardware fundamentally cannot meet the latency and accuracy requirements.
    - 'Four proxy signals detect degradation without ground truth: (1) confidence distribution shift from aggregated histograms, (2) prediction entropy summaries, (3) feature/input drift statistics, and (4) behavioral proxies such as clicks, retakes, or undo rate.'
