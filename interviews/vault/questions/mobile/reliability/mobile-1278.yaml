title: Evaluating Adversarial Defenses on Snapdragon NPU
scenario: You are designing the defense mechanism for a real-time biometric authentication model running
  on a smartphone powered by a Qualcomm Hexagon NPU (Snapdragon 8 Gen 3). The system must be robust against
  physical adversarial presentation attacks.
question: 'Which adversarial defense is more efficient on Snapdragon 8 Gen 3: an INT8 NPU ensemble or
  randomized smoothing?'
details:
  realistic_solution: Option A is the superior system-level choice. The Hexagon NPU's 45 TOPS INT8 capacity
    can easily handle an ensemble of smaller models concurrently, keeping the entire pipeline within the
    NPU. This avoids cross-processor synchronization between the CPU and NPU. Randomized smoothing requires
    the CPU to generate noisy variants, constantly waking the NPU for each variant and creating severe
    context-switching overhead and CPU bottlenecks, which destroys the strict latency budget for real-time
    authentication.
  common_mistake: '**The Pitfall:** Choosing randomized smoothing for its theoretical robustness guarantees
    without profiling its system-level overhead.

    **The Rationale:** Academic ML researchers often ignore the extreme cost of CPU/NPU synchronization
    and shared memory bus thrashing when bouncing multiple noisy variants across processors.

    **The Consequence:** Massive power drain, latency spikes, and failure to meet the real-time authentication
    deadline.

    '
  napkin_math: '**Assumptions & Constraints:**

    - Input Frame: 224x224x3 (~150 KB).

    - Single Model Compute: 1 GOPS.

    - Target: Real-time biometric authentication on 45 TOPS INT8 NPU.

    - Cross-processor context switch overhead: ~2 ms per CPU-NPU sync.


    **Calculations:**

    - Option A (INT8 Ensemble): 3 models * 1 GOPS = 3 GOPS. Single NPU invocation. Overhead = 2 ms.

    - Option B (Randomized Smoothing): 10 variants * 1 GOPS = 10 GOPS. The CPU generates 10 noisy variants
    sequentially or in batches, requiring NPU synchronization.

    - Overhead (Option B): 10 variants * 2 ms context switch = 20 ms pure OS synchronization overhead.


    **Conclusion & Interpretation:**

    - **Result: CPU-NPU Synchronization-Bound.** Option A avoids cross-processor synchronization. Option
    B incurs 20 ms of pure synchronization latency, failing the real-time biometric deadline despite ample
    NPU TOPS and memory bandwidth.'
