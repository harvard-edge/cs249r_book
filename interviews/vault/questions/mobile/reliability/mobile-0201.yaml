title: 'The Watchdog''s Power Tax: Monitoring & Observability'
scenario: "You're designing an always-on fall detection feature for a health app. To ensure its reliability, you implement a software watchdog. Every second, the watchdog process wakes up for 10ms to check a 'heartbeat' flag from the inference service, consuming 0.5W during this brief check. For the remaining 990ms, the watchdog is asleep and consumes zero power."
question: "How would you calculate the total energy, in Watt-hours (Wh), consumed only by the watchdog process over a 24-hour period?"
details:
  realistic_solution: |
    Calculate the average power consumption by applying the duty cycle, and then multiply by the total time. The watchdog is active for 10ms every 1000ms, representing a 1% duty cycle. Multiply the active power draw by this duty cycle, and integrate over the 24-hour period to yield the total energy drain in Watt-hours.
  common_mistake: |
    **The Pitfall:** Forgetting to apply the duty cycle when calculating average power.
    **The Rationale:** Engineers calculate the cost as if the component is active 100% of the time, treating active power as continuous power.
    **The Consequence:** A massive overestimation of battery drain, leading to unnecessary optimization efforts.
  napkin_math: |
    **Assumptions & Constraints:**
    - Wake duration: 10ms per 1000ms (1% duty cycle).
    - Active power: 0.5W.
    - Total time: 24 hours.

    **Calculations:**
    - Duty Cycle: 10ms / 1000ms = 0.01 (1%).
    - Average Power: 0.5W * 0.01 = 0.005W.
    - Total Energy: 0.005W * 24h = 0.12 Wh.

    **Conclusion & Interpretation:**
    - **Result: 0.12 Wh (Energy-Efficiency Bottleneck Avoided)**. The watchdog consumes minimal total energy over 24 hours, confirming it is highly battery-efficient.
  options:
  - '12 Wh'
  - '0.72 Wh'
  - '0.12 Wh'
  - '432 Wh'
