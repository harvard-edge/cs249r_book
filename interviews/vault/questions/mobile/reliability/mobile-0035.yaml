title: Layered Orthogonal Assignment for Concurrent Mobile Experiments
scenario: You run 12 concurrent ML model experiments across your app — different architectures, quantization levels, and preprocessing pipelines. Each experiment needs statistically significant results within 2 weeks. You have 2M DAU. But your experiments keep producing contradictory results — model A beats model B in experiment 1, but model B beats A in experiment 3. Your data scientist says the experiments are 'interfering'.
question: Why do 12 concurrent mobile ML experiments interfere across 2M DAU, and how should assignment be isolated?
details:
  realistic_solution: |
    The interference is primarily assignment interference: the same user can be enrolled in multiple overlapping model experiments, so experiment 3 changes the context in which experiment 1 is measured. Use a layered or orthogonal experimentation framework. Put mutually interacting ML surfaces in the same layer so each user is assigned to at most one experiment in that layer, and use independent hash namespaces for layers that are safe to run together. Balance by device class, OS, app version, and region so mobile hardware mix does not confound the cohorts.
  common_mistake: |
    **The Pitfall:** Running each experiment on a separate, independent user cohort.
    **The Rationale:** It seems like the simplest way to avoid interference between experiments.
    **The Consequence:** With 12 experiments, cohort sizes become too small (167K users), limiting statistical power and capping experimentation velocity to only large-effect tests.
  napkin_math: |
    **Assumptions & Constraints:**
    - MDE formula: MDE = 2.8 * sqrt(2 * p * (1-p) / n), with p=0.5.

    **Calculations:**
    - Separate non-overlapping cohorts for 12 experiments: 2M / 12 = 166,667 users per experiment, or 83,333 per variant for a 50/50 test. MDE = 2.8 * sqrt(0.5 / 83,333) = 0.69%.
    - Layered design with 3 layers and 4 experiments per layer: each layer has 2M users; within a layer, 2M / 4 = 500,000 users per experiment, or 250,000 per variant. MDE = 2.8 * sqrt(0.5 / 250,000) = 0.40%.

    **Conclusion & Interpretation:**
    - **Result: 0.40% MDE (Statistics-Bound)**. Improvement: Layered design reduces MDE to 0.40% (1.7x more sensitive).
  options:
    - Use layered or orthogonal assignment so mutually interacting experiments do not overlap for the same user, while safe layers use independent hash namespaces and remain balanced by device class and OS.
    - Run each experiment on a separate user cohort. With 12 experiments and 2M DAU, each cohort gets ~167K users.
    - The bottleneck is in the software framework, not the hardware; switching to a lower-level API will achieve near-theoretical-peak performance.
    - Parallelizing pipeline stages across CPU and GPU always improves throughput, regardless of the relative speeds of each stage.
