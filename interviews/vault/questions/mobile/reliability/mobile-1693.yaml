title: Quantifying Adversarial Attack Impact on Mobile NPU Inference Latency
scenario: "You are deploying a critical image classification model on a mobile NPU for a real-time application. A security audit identified PGD adversarial vulnerabilities. You decide to implement adversarial training. Baseline latency is 5ms, and the new graph complexity increases by 15%."
question: "How would you estimate the latency increase from adversarial training on a MobileNetV3 model?"
details:
  realistic_solution: |
    Model latency scaling is non-linear relative to FLOPs due to roofline limits. Profile the modified adversarial graph using hardware traces (e.g., nsys) to isolate DMA vs. compute cycles. Calculate operational overhead (MACs) and verify against LPDDR5X memory bandwidth constraints. Adversarial defenses often introduce operations that break kernel fusion, significantly worsening latency beyond the naive 15% FLOP increase.
  common_mistake: |
    **The Pitfall:** Assuming a purely linear relationship between FLOPs and latency.
    **The Rationale:** Candidates fail to consider NPU-specific bottlenecks like memory bandwidth, quantization effects, or the overhead of specific defense mechanisms breaking operator fusion.
    **The Consequence:** Inaccurate latency predictions that cause missed real-time deadlines in production.
  napkin_math: |
    **Assumptions & Constraints:**
    - Baseline latency: 5ms.
    - Complexity (FLOP) increase: +15%.
    - Assumption: Linear scaling (assuming purely compute-bound with unbroken fusion).

    **Calculations:**
    - Increased latency: 5ms * 1.15 = 5.75ms.
    - Absolute delta: 5.75ms - 5.0ms = 0.75ms.

    **Conclusion & Interpretation:**
    - **Result: +0.75ms latency minimum (Memory-Bound Bottleneck)**. If fusion is maintained, the latency impact is minimal. However, if the defense breaks fusion, it will trigger a memory-bound bottleneck far exceeding this estimate.
