title: Deterministic Execution Timing for On-Device LLM Watchdog
scenario: You are deploying a safety-critical automotive voice command system using Gemini Nano on the
  Google Tensor G3. The safety certification requires a strict watchdog timer to trigger a fallback system
  if the on-device TPU fails to generate a response in time.
question: What watchdog timeout should guarantee a 20-token emergency LLM response on Tensor G3 assuming
  50% TPU utilization due to 12 GB LPDDR5X bandwidth constraints?
details:
  realistic_solution: The correct approach requires calculating the memory bandwidth bottleneck, since
    autoregressive LLM decoding at batch size 1 is strictly memory-bound, not compute-bound. We must determine
    the time to load the model weights for each of the 20 tokens using the 12 GB LPDDR5X bandwidth limit,
    rather than applying a fixed TPU utilization factor.
  common_mistake: '**The Pitfall:** Using theoretical peak TOPS instead of effective memory-bound TOPS.

    **The Rationale:** Candidates often calculate the minimum time using the peak 7.5 TOPS without accounting
    for realistic TPU utilization or memory bandwidth bottlenecks.

    **The Consequence:** This leads to a watchdog timer that is far too aggressive and triggers false
    positive fallbacks, disabling the primary system unnecessarily.

    '
  napkin_math: '**Assumptions & Constraints:**

    - Model size: 3.2B parameters (approx 3.2 GB in INT8).

    - Target: 20 tokens.

    - Effective memory bandwidth: 60 GB/s (standard for LPDDR5X).


    **Calculations:**

    - Memory loaded per token: 3.2 GB.

    - Time per token = 3.2 GB / 60 GB/s = 0.0533 seconds (53.3 ms).

    - Total time for 20 tokens = 53.3 ms * 20 = 1.066 seconds.


    **Conclusion & Interpretation:**

    - **Result: 1.066 seconds (Memory-Bound)**. The watchdog timeout must be set slightly above 1066 ms
    to account for the memory bandwidth bottleneck.'
