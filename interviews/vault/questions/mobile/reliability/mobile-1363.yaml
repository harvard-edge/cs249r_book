title: Deterministic Execution Timing for On-Device LLM Watchdog
scenario: You are deploying a safety-critical automotive voice command system using a 3.2B INT8 LLM on a mobile TPU with 7.5 TOPS peak throughput. The safety certification requires a strict watchdog timer to trigger a fallback system if the on-device TPU fails to generate a response in time. For this bound, assume weights remain resident, each token costs 1 MAC per parameter, and shared-memory contention limits TPU utilization to 50%.
question: What watchdog timeout should cover a 20-token emergency LLM response at 50% of a 7.5 TOPS mobile TPU?
details:
  realistic_solution: Use the prompt's compute-bound watchdog model rather than assuming the whole model is reloaded from DRAM for every token. A 3.2B parameter token costs 3.2B MACs, or 6.4 GOP. At 50% utilization, the 7.5 TOPS TPU provides 3.75 TOPS effective throughput, so each token takes 6.4 / 3750 = 1.71 ms. A 20-token response needs 34.1 ms of compute, so a practical watchdog should be set above that floor, for example 40 ms before triggering fallback.
  common_mistake: |
    **The Pitfall:** Using theoretical peak TOPS or assuming the full model is reloaded from DRAM for every token.
    **The Rationale:** Candidates often calculate the minimum time using the peak 7.5 TOPS without accounting for the stated 50% utilization, or they switch to an unstated weight-streaming model.
    **The Consequence:** This leads to a watchdog timer that is far too aggressive and triggers false positive fallbacks, disabling the primary system unnecessarily.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model size: 3.2B parameters.
    - Target: 20 tokens.
    - Peak TPU throughput: 7.5 TOPS.
    - Effective utilization: 50%, so effective throughput = 3.75 TOPS.
    - Per-token compute model: 1 MAC per parameter = 2 ops per parameter.

    **Calculations:**
    - Operations per token: 3.2B MACs * 2 ops/MAC = 6.4 GOP/token.
    - Time per token = 6.4 GOP / 3,750 GOP/s = 0.00171 seconds = 1.71 ms.
    - Total compute time for 20 tokens = 1.71 ms * 20 = 34.1 ms.
    - Watchdog setting with modest scheduling margin: about 40 ms.

    **Conclusion & Interpretation:**
    - **Result: 40 ms watchdog setting (Compute-Bound Sizing Floor).** The computed 20-token floor is 34.1 ms, so a 40 ms timeout gives a small margin before fallback.
