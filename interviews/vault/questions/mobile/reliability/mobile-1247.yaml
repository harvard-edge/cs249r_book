title: On-Device Telemetry Design for Exynos 2400 Shared Memory
scenario: "You are deploying a real-time video super-resolution model on the Samsung Exynos 2400 NPU. The device features a dual-core NPU, but crucially shares its 12 GB LPDDR5X memory with the CPU, GPU, and ISP."
question: "How should Exynos 2400 telemetry detect memory-contention stragglers caused by ISP load without adding shared-memory overhead?"
details:
  realistic_solution: "Design an event-driven telemetry architecture that uses lightweight, on-device aggregations, such as bucketing latencies into localized histograms or calculating exponential moving averages. The system should only flush metrics to persistent storage or the backend when significant deviations are detected (e.g., consecutive frame drops), minimizing interference with the compute pipeline and preserving shared memory bandwidth."
  common_mistake: |
    **The Pitfall:** Proposing high-frequency polling from the CPU or logging full execution traces per frame.
    **The Rationale:** Candidates assume telemetry is "free" and ignore the severe memory bandwidth limits of shared LPDDR5X when the NPU and ISP are concurrently active.
    **The Consequence:** Telemetry generates excessive memory traffic that directly competes with the NPU, exacerbating the exact straggler problem it is trying to measure.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Frame rate: 60 FPS.
       - Trace logging: 5 layer timestamps (4 bytes each) per frame.
    2. **Calculations:**
       - High-frequency write rate = 20 bytes * 60 FPS = 1.2 KB/s.
       - Percentile bucketing (10 buckets, 4 bytes each, emitted 1/min) = 40 bytes / 60s = 0.66 bytes/s.
    3. **Conclusion & Interpretation:**
       - **Result: Bandwidth-Bound.** By shifting from trace logging to local percentiles, write bandwidth collapses from 1.2 KB/s to **0.66 bytes/s**, eliminating telemetry-induced memory contention.
