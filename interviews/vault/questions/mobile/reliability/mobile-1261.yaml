title: Diagnosing On-Device PSI Drift OOM on Snapdragon
scenario: A background drift detection process on a Snapdragon 8 Gen 3 calculates the Population Stability Index (PSI) between local INT8 inference inputs and a global baseline. Users are reporting sudden OOM crashes during this background phase, despite the device having 16 GB of shared memory.
question: Why does background PSI drift detection cause OOM on Snapdragon 8 Gen 3 despite stable INT8 inference?
details:
  realistic_solution: |
    The root cause is data unquantization during aggregation. While the Hexagon NPU efficiently executes the INT8 forward pass, the PSI module pulls thousands of high-dimensional vectors back to the CPU in FP32 format for statistical binning. This creates a large memory spike in the shared LPDDR5X pool, violating Android's background app memory limits. The fix is to keep aggregation compact: accumulate INT8 histograms, sample or chunk vectors before CPU transfer, and avoid retaining a full FP32 working copy.
  common_mistake: |
    **The Pitfall:** Blaming generic memory leaks while ignoring the format inflation of unquantized CPU transfers.
    **The Rationale:** Candidates assume post-processing memory footprints mimic NPU inference footprints.
    **The Consequence:** They incorrectly advise reducing inference batch sizes instead of resolving the massive FP32 aggregation spike.
  napkin_math: |
    **Assumptions & Constraints:**
    - Vectors buffered for a daily background PSI job: 24,000.
    - Dimension: 4,096 elements per vector.
    - Formats: INT8 (1 byte) on NPU; FP32 (4 bytes) on CPU.
    - Background process memory allowance: roughly hundreds of MB and device/state dependent.

    **Calculations:**
    - INT8 storage per vector: 4,096 * 1 byte = 4 KB.
    - FP32 expanded daily buffer: 24,000 * 4,096 * 4 bytes = 393,216,000 bytes ≈ 375 MiB.
    - A sort/binning implementation that keeps input plus a working copy peaks near 2 * 375 MiB = 750 MiB, before object and histogram overhead.

    **Conclusion & Interpretation:**
    - **Result: Memory-Bound.** Expanding and double-buffering the vectors can push the background job into the ~750 MiB range, plausibly exceeding Android background limits and triggering OOM kills.
