title: On-Device Data Drift Detection for Real-time ML on Samsung Exynos 2400 NPU
scenario: You are designing an on-device machine learning system for a critical user-facing feature. The ML model, a neural network for real-time image processing, is deployed directly on the NPU. Due to evolving user behavior and environmental conditions, data distribution shifts are anticipated, which could severely degrade model performance.
question: How would you design a robust, low-overhead on-device drift detector for an image model with reliable fallback triggers?
details:
  realistic_solution: 'An L5 engineer would propose an adaptive, lightweight, and NPU-optimized drift detection strategy. This involves: 1. Feature Selection: Identifying key, representative features whose distribution changes are strong indicators of model drift. 2. Statistical Method: Employing Population Stability Index (PSI) or a simplified A/B divergence on binned feature distributions. 3. Sampling Strategy: Implementing reservoir sampling to collect small batches of inference data. 4. Thresholding & Alerting: Dynamically adjusting drift thresholds based on a moving average of the chosen metrics, triggering an immediate local fallback to a more robust model version upon detection.'
  common_mistake: |
    **The Pitfall:** Proposing full KL divergence on high-dimensional data over large batches.
    **The Rationale:** Candidates apply cloud-scale drift detection metrics without adapting for mobile hardware limits.
    **The Consequence:** Continuous drift calculation drains the battery and steals critical NPU compute from the primary real-time model.
  napkin_math: |
    **Assumptions & Constraints:**
    - Inference rate: 50 inferences/sec.
    - Sampling rate: 1% = 0.5 inferences/sec.
    - NPU Capacity: 34.7 TOPS.

    **Calculations:**
    - Drift ops per sample: 10 features * 100 ops/feature = 1,000 ops.
    - Total drift ops/sec: 0.5 * 1,000 = 500 ops/sec.
    - Utilization: 500 / 34.7e12 = negligible.
    - Memory footprint: 10 baselines * 100 bins * 4 bytes = 4 KB.

    **Conclusion & Interpretation:**
    - **Result: Continuous detection requires < 0.0001% of NPU capacity and 4KB RAM (Compute-Bound).** Lightweight method prevents taking critical compute from the primary model.
