title: 'Fault Tolerance: Mastery — Mobile Personalization Reliability Architecture'
scenario: You are the reliability lead for a mobile keyboard app with 100M users. The app runs nightly on-device LoRA personalization (10-minute training window). Users report losing their personalization after phone updates, crashes, and app reinstalls.
question: Design a complete fault tolerance architecture that preserves personalization state across all these events?
details:
  realistic_solution: |
    Use a layered durability design. During nightly training, write encrypted local checkpoints with atomic rename, checksum, monotonic generation number, base-model version, adapter schema, optimizer-state version, and training data policy version. Keep the last known-good serving adapter separate from in-progress training state so crashes roll back to the previous serving adapter, not a partial write.

    For phone updates and app upgrades, run a migration step before loading personalization: verify the checkpoint manifest, check base-model compatibility, migrate only supported adapter schemas, and otherwise keep the old adapter quarantined while retraining or requesting a fresh personalization pass. For reinstalls and device migrations, offer explicit opt-in end-to-end encrypted backup through the OS keychain/cloud account or a secure backend; the server should store ciphertext and metadata needed for version routing, not raw keyboard text. Resolve conflicts with generation numbers and device IDs, prefer the latest valid completed serving adapter, and keep audit logs for restore failures without exposing typed content.
  common_mistake: |
    **The Pitfall:** Storing personalization state purely in ephemeral app-private local storage.
    **The Rationale:** Candidates optimize for "zero cloud cost" and strict privacy but ignore standard mobile lifecycle events (reinstalls, device migrations) that wipe local sandboxes.
    **The Consequence:** Rampant user churn as high-value personalized models are repeatedly destroyed by mundane system events.
  napkin_math: |
    **Assumptions & Constraints:**
    - Nightly training window: 10 minutes.
    - Serving adapter: 4MB. Training checkpoint: 4MB adapter + 24MB optimizer/state = 28MB.
    - Local retention: last completed serving adapter plus 3 rolling training checkpoints.
    - Optional encrypted cloud backup keeps the latest completed serving adapter and manifest only.

    **Calculations:**
    - Local training recovery footprint: 3 * 28MB = 84MB.
    - Serving footprint kept outside training checkpoints: 4MB.
    - Total local personalization durability budget: 84MB + 4MB = 88MB before filesystem overhead.
    - Checkpoint interval for 3 recovery points in a 10-minute window: about every 3 minutes, plus a final atomic commit.
    - Worst-case lost in-progress training after crash: less than or equal to the checkpoint interval, about 3 minutes; completed personalization remains available from the serving adapter.
    - Cloud restore payload per opted-in user: about 4MB adapter + small manifest, so reinstall recovery does not require uploading raw text or optimizer state.

    **Conclusion & Interpretation:**
    - **Result: 88MB Local Durability Budget With Opt-In Restore**. The architecture preserves completed personalization across crashes and upgrades locally, bounds lost nightly work to about 3 minutes, and supports reinstall or device migration only through consented end-to-end encrypted backup.
