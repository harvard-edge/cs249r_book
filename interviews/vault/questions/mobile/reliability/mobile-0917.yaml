title: 'Fault Tolerance: Mastery — Mobile Personalization Reliability Architecture'
scenario: You are the reliability lead for a mobile keyboard app with 100M users. The app runs nightly on-device LoRA personalization (10-minute training window). Users report losing their personalization after phone updates, crashes, and app reinstalls.
question: Design a complete fault tolerance architecture that preserves personalization state across all these events.
details:
  realistic_solution: |
    Implement an encrypted, differential backup mechanism for LoRA weights via iCloud/Google Drive or a secure backend. Since LoRA adapters are small (e.g., <1MB), they can be silently checkpointed to the cloud after each nightly training run. A robust architecture uses deterministic versioning, so if the base model updates, the system can gracefully retrain or map the old LoRA weights, preserving the user's personalization state without compromising privacy.
  common_mistake: |
    **The Pitfall:** Storing personalization state purely in ephemeral app-private local storage.
    **The Rationale:** Candidates optimize for "zero cloud cost" and strict privacy but ignore standard mobile lifecycle events (reinstalls, device migrations) that wipe local sandboxes.
    **The Consequence:** Rampant user churn as high-value personalized models are repeatedly destroyed by mundane system events.
  napkin_math: |
    **Assumptions & Constraints:**
    - 100M users.
    - Cloud cost: $0.001 per 1K tokens.
    - On-device NRE: ~$20,000.
    - Queries: 50/day per user, 512 tokens per query.

    **Calculations:**
    - Cloud inference cost: 100M * 50 * 365 = 1.825T inferences/year.
    - Cost per inference (512 tokens): $0.000512.
    - Total Cloud Cost = 1.825T * $0.000512 = $934.4M/year.
    - On-device amortization: $20,000 / 100M users = $0.0002/user.

    **Conclusion & Interpretation:**
    - **Result: >$900M savings (State Persistence)**. On-device ML saves over $900M annually, validating the business case for investing in robust on-device fault tolerance.
