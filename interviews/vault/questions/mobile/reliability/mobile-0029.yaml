title: The ML Crash Report Black Hole
scenario: Your on-device speech recognition model causes the app to crash on 0.3% of sessions. Crashlytics shows the crash stack trace ends deep inside a private framework. You cannot read the source code, and you cannot reproduce it locally.
question: How do you diagnose and fix a rare kernel crash without source access or local reproduction?
details:
  realistic_solution: 'Diagnose without source by correlating crash metadata: input shapes, batch sizes, OS version, device model, delegate, and memory state. If crashes cluster on non-standard tensor dimensions, binary-search the failing input envelope with remote telemetry and canary guards. Mitigate by padding risky shapes to hardware-friendly multiples as a candidate fix, then measure whether the crash rate falls. Also add bounded delegate fallback (NPU -> GPU -> CPU) for risky executions. GPU at 25ms vs NPU at 8ms is usually acceptable for speech, and it avoids waiting months for an OS fix.'
  common_mistake: |
    **The Pitfall:** Filing a bug with Apple and waiting for a fix.
    **The Rationale:** Candidates assume that because a proprietary framework crashed, they have no control or ability to mitigate the issue.
    **The Consequence:** Users continue to experience crashes for 3-6 months while waiting for an OS-level update.
  napkin_math: |
    **Assumptions & Constraints:**
    - Crash rate: 0.3% of sessions.
    - Usage: 1M DAU * 3 sessions = 3M sessions/day.
    - Hardware Fallbacks: NPU (8ms), GPU (25ms), CPU (120ms).

    **Calculations:**
    - Daily crashes (unmitigated): 3,000,000 * 0.003 = 9,000 crashes/day.
    - Daily crashes (padded inputs): 3,000,000 * 0.0001 = 300 crashes/day.

    **Conclusion & Interpretation:**
    - **Result: Example 30x crash reduction plus bounded fallback.** If telemetry confirms a shape-triggered crash path and padding lowers the rate from 0.3% to 0.01%, expected crashes fall from 9,000/day to 300/day. For remaining risky executions, delegate fallback to GPU trades 8ms NPU latency for 25ms GPU latency, which is acceptable for speech and prevents many residual device-specific failures rather than claiming they vanish automatically.
