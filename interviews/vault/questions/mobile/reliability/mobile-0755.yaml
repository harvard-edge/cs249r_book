title: The Battery Inference Budget
scenario: A mobile health app runs continuous pose estimation at 30 fps, consuming 5W sustained on the ANE. The phone has an 18.5 Wh battery. The product manager wants the app to run continuously for 8 hours.
question: Is this feasible with inference alone, ignoring all other phone functions?
details:
  realistic_solution: 18.5 Wh / 5W = 3.7 hours from inference alone. Adding display and OS overhead (~3W), total draw is ~8W, giving only ~2.3 hours. The 8-hour target is physically impossible without dramatically reducing inference frequency.
  common_mistake: |
    **The Pitfall:** Ignoring that 5W is only the ANE power draw.
    **The Rationale:** Candidates forget the display, radios, and OS consume another 2-3W minimum just to keep the device awake.
    **The Consequence:** Grossly overestimating battery life and failing to meet the product requirement.
  napkin_math: |
    **Assumptions & Constraints:**
    - Battery capacity: 18.5 Wh.
    - Target duration: 8 hours.
    - ANE sustained power: 5W.
    - System overhead (display, OS): ~3W.

    **Calculations:**
    - Inference only duration: 18.5 Wh / 5W = 3.7h.
    - Total power draw: 5W (ANE) + 3W (System) = 8W.
    - True duration: 18.5 Wh / 8W = 2.3h.
    - Required power for 8h: 18.5 Wh / 8h = ~2.3W.

    **Conclusion & Interpretation:**
    - **Result: 2.3h (Power-Bound)**. 2.3h is far short of 8h. The physical energy limit requires aggressively reducing the duty cycle or frame rate to drop the total power below 2.3W.
  options:
  - Yes. 18.5 Wh / 5W = 3.7h of inference, plus the OS is free.
  - No. Inference alone drains the battery in 3.7h; with system overhead it is ~2.3h. Must reduce frame rate.
  - Yes. The ANE uses only milliwatts for neural inference.
  - No, but only because the phone will thermal-throttle first.
  correct_index: 1
