title: P2P Bluetooth Sync
scenario: Two mobile devices sync personalized embeddings via Bluetooth (2 Mbps). They must exchange a 1MB tensor.
question: How long does it take to exchange the 1MB embedding using point-to-point Bluetooth?
visual:
  kind: svg
  path: mobile-1959.svg
  alt: Two nodes connected by a bidirectional arrow labeled 2 Mbps
  caption: Point-to-Point Bluetooth Exchange
details:
  realistic_solution: 2 Mbps = 0.25 MB/s. 1MB / 0.25 MB/s = 4 seconds. Since Bluetooth operates as a full-duplex protocol, the symmetric exchange can perform simultaneously in exactly 4 seconds wall-clock time.
  common_mistake: |
    **The Pitfall:** Confusing megabits (Mbps) and megabytes (MB/s).
    **The Rationale:** Candidates see "2 Mbps" and incorrectly divide the 1MB payload by 2, yielding 0.5 seconds.
    **The Consequence:** They underestimate network transfer times by a massive factor of 8, leading to severe UX synchronization delays.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Payload: 1 MB tensor.
       - Link Speed: 2 Mbps (Megabits per second) full-duplex.
    2. **Calculations:**
       - Bandwidth Conversion: 2 Mbps / 8 bits = 0.25 MB/s.
       - Transfer Time: 1 MB / 0.25 MB/s = 4.0 seconds.
    3. **Conclusion & Interpretation:**
       - **Result: Network-Bound.** The exchange requires exactly 4.0 seconds of wall-clock time, strictly bottlenecked by the Bluetooth radio bandwidth.
