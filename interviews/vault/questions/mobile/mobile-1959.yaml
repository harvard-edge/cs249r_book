title: P2P Bluetooth Sync
scenario: Two mobile devices sync personalized embeddings via Bluetooth (2 Mbps).
  They must exchange a 1MB tensor.
question: Apply a point-to-point communication specification to calculate the time
  to exchange the 1MB embedding.
visual:
  kind: svg
  path: mobile-1959.svg
  alt: Two nodes connected by a bidirectional arrow labeled 2 Mbps
  caption: Point-to-Point Bluetooth Exchange
details:
  realistic_solution: 2 Mbps = 0.25 MB/s. 1MB / 0.25 MB/s = 4 seconds. Since it's
    a symmetric exchange, full duplex Bluetooth can perform this in 4 seconds wall-clock
    time.
  common_mistake: Dividing bits by bytes incorrectly (e.g., assuming 2 Mbps = 2 MB/s).
  napkin_math: 1MB / 0.25 MB/s = 4 seconds.
