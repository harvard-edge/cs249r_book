title: P2P Bluetooth Sync
scenario: Two mobile devices sync personalized embeddings via Bluetooth (2 Mbps). They must exchange a 1MB tensor.
question: How long does it take to exchange the 1MB embedding using point-to-point Bluetooth?
visual:
  kind: svg
  path: mobile-1959.svg
  alt: Two nodes connected by a bidirectional arrow labeled 2 Mbps
  caption: Point-to-Point Bluetooth Exchange
details:
  realistic_solution: 2 Mbps = 0.25 MB/s. 1MB / 0.25 MB/s = 4 seconds. Since it's a symmetric exchange, full duplex Bluetooth can perform this in 4 seconds wall-clock time.
  common_mistake: |
    **The Pitfall:** Confusing megabits and megabytes.
    **The Rationale:** Candidates see 2 Mbps and incorrectly divide 1MB by 2 MB/s.
    **The Consequence:** They underestimate transfer time by a factor of 8.
  napkin_math: |
    - **Bandwidth Conversion:** 2 Mbps = 0.25 MB/s.
    - **Transfer Time:** 1 MB / 0.25 MB/s = 4 seconds.
    - **Final Result:** **It takes exactly 4 seconds of wall-clock time over full-duplex Bluetooth.**
