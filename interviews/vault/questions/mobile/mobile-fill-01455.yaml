title: Real-time Mobile ML Data Pipeline Optimization on Exynos 2400 NPU
scenario: You are tasked with deploying a novel real-time computer vision model on a mobile device powered
  by the Samsung Exynos 2400 NPU (34.7 TOPS, 12 GB LPDDR5X). This model requires processing a continuous
  4K (3840x2160) video stream at 60 FPS, where each frame is 3 bytes/pixel (YUV420). The preprocessing
  involves basic image normalization and resizing to 1080p, followed by converting the data to FP16. Your
  goal is to design an efficient on-device data pipeline (ETL/ELT) to feed this processed data to the
  NPU with minimal latency, ensuring continuous inference without dropping frames. Describe the data flow,
  identify potential throughput bottlenecks between sensor, main memory, and NPU, and propose strategies
  for data loading optimization to fully utilize the NPU's capabilities.
question: "How would you design a 4K60 Exynos 2400 data pipeline that keeps the NPU fed without dropping frames?"
details:
  realistic_solution: A robust solution would involve a multi-stage, asynchronous data pipeline. Initially,
    optimize sensor data capture by using direct memory access (DMA) where possible to reduce CPU load.
    For preprocessing, leverage specialized hardware accelerators (e.g., ISP for scaling, dedicated DMA
    engines for format conversion) or highly optimized NEON/SIMD instructions on the CPU, using a thread
    pool to parallelize frame processing. Data should be batched and pre-allocated in memory buffers (e.g.,
    using AHardwareBuffer on Android for zero-copy sharing) that are directly accessible by the NPU, minimizing
    copies. Utilize double or triple buffering to decouple the preprocessing stage from NPU inference.
    The data pipeline equation (Latency = Processing Time + Transfer Time + Queue Time) must be balanced,
    ensuring that `Transfer Time + Preprocessing Time <= NPU Inference Time` to avoid NPU starvation.
    Efficient memory management with minimal dynamic allocations and strategic use of NPU-local memory
    (if available) would further optimize throughput.
  common_mistake: A common mistake is focusing solely on the NPU's raw compute (TOPS) without adequately
    considering the data transfer rates, memory bandwidth limitations (LPDDR5X in this case), and CPU
    overhead for preprocessing. Candidates might overlook the impact of data format conversions, memory
    allocation patterns, and cache efficiency, leading to a pipeline where the NPU is frequently stalled
    awaiting data, rather than being compute-bound.
  napkin_math: 'Raw 4K @ 60 FPS (YUV420, 3 bytes/pixel equivalent) input: (3840 * 2160 * 3 bytes/pixel
    * 60 FPS) = ~1.49 GB/s. Resized 1080p (FP16): (1920 * 1080 * 2 bytes/pixel * 60 FPS) = ~248 MB/s.
    The LPDDR5X has a theoretical peak bandwidth of ~85 GB/s, suggesting main memory access itself isn''t
    the primary bottleneck for this data rate, but effective bandwidth can be much lower due to cache
    misses and contention. The NPU is 34.7 TOPS (FP16). If the model requires, for instance, 10 GFLOPS
    (20 GOPS for FP16), the NPU has ample raw compute. The critical aspect becomes ensuring the ~248 MB/s
    of processed data can be moved efficiently to the NPU''s compute units with minimal CPU involvement
    and copies, preventing pipeline stalls. For an L6+ candidate, they should size the memory buffers
    required, estimate per-frame latency budgets, and consider the implications of data movement for the
    overall pipeline efficiency.'
