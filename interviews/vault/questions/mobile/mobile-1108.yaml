title: Thermal Throttling on A17 Pro Neural Engine
scenario: You are profiling a real-time video segmentation model running on the Apple A17 Pro Neural Engine. The 16-core Neural Engine is capable of 35 TOPS at a ~5W peak power budget. Your model requires 175 GOPs per frame and processes video at 60 FPS. You observe that while the device handles short bursts fine, sustained execution causes the OS to lower the DVFS P-states, reducing inference speed, despite the compute operations taking only a fraction of the theoretical peak capacity.
question: Why does this sustained workload exceed the power budget and trigger thermal throttling on the shared unified memory architecture?
details:
  realistic_solution: The A17 Pro Neural Engine shares an 8 GB unified memory pool and package thermal budget with the CPU and GPU. While the pure compute requires only 1.5W, continuous 60 FPS inference generates heavy memory traffic for weights and high-resolution activations. The combined power of ANE compute, DRAM data movement, and any concurrent CPU/GPU tasks pushes the total SoC package beyond its sustained thermal envelope (TDP), forcing the system to step down DVFS P-states to prevent overheating.
  common_mistake: |
    **The Pitfall:** Calculating only theoretical compute power and ignoring memory data movement energy.
    **The Rationale:** Candidates often conclude the model only draws 1.5W based on TOPS/W specs, forgetting that the SoC shares a unified memory system where memory bandwidth consumes significant power.
    **The Consequence:** Failure to predict and mitigate thermal throttling caused by sustained memory traffic.
  napkin_math: |
    1. **Compute Power:** 175 GOPs/frame * 60 FPS = 10,500 GOPs/sec = 10.5 TOPS. Compute Power = 10.5 TOPS / 7 TOPS/W = 1.5W.
    2. **Memory Power:** Reading/writing 50 MB of tensor data per frame at 60 FPS consumes 3 GB/s of bandwidth. At ~100 pJ/byte for DRAM access, this adds ~0.3W of pure memory power, plus SoC interconnect overhead.
    3. **Conclusion:** **The sustained combined thermal load of compute and heavy memory traffic exceeds the chassis passive cooling limit over time.**
