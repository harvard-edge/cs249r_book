title: Thermal Throttling on A17 Pro Neural Engine
scenario: You are profiling a real-time video segmentation model running on the Apple
  A17 Pro Neural Engine. The 16-core Neural Engine is capable of 35 TOPS at a ~5W
  peak power budget. Your model requires 175 GOPs per frame and processes video at
  60 FPS. You observe that while the device handles short bursts fine, sustained execution
  causes the OS to lower the DVFS P-states, reducing inference speed, despite the
  compute operations taking only a fraction of the theoretical peak capacity. Explain
  why this sustained workload exceeds the power budget and triggers thermal throttling,
  considering the shared 8 GB unified memory architecture.
question: Why this sustained workload exceeds the power budget and triggers thermal
  throttling, considering the shared 8 GB unified memory architecture?
details:
  realistic_solution: The A17 Pro Neural Engine shares an 8 GB unified memory pool
    and package thermal budget with the CPU and GPU. While the pure compute requires
    only 1.5W, continuous 60 FPS inference generates heavy memory traffic for weights
    and high-resolution activations. The combined power of ANE compute, DRAM data
    movement, and any concurrent CPU/GPU tasks pushes the total SoC package beyond
    its sustained thermal envelope (TDP), forcing the system to step down DVFS P-states
    to prevent overheating.
  common_mistake: Candidates often calculate only the theoretical compute power based
    on the 35 TOPS / 5W spec and conclude the model only draws 1.5W, well under the
    thermal limit. They forget that the 5W TDP is for the entire SoC package under
    thermal constraint, and the ANE shares an 8 GB unified memory system where memory
    data movement energy often dwarfs pure compute energy.
  napkin_math: 'Compute Efficiency: 35 TOPS / 5W = 7 TOPS/W. Workload: 175 GOPs/frame
    * 60 FPS = 10,500 GOPs/sec = 10.5 TOPS. Compute Power: 10.5 TOPS / 7 TOPS/W =
    1.5W. Although 1.5W is less than the 5W peak, reading and writing 50MB of tensor
    data per frame at 60 FPS consumes 3 GB/s of bandwidth from the 8 GB shared unified
    memory. At ~100 pJ/byte for DRAM access, this adds ~0.3W of pure memory power,
    plus significant SoC interconnect and cache overhead. The sustained combined thermal
    load exceeds the chassis passive cooling limit over time.'
