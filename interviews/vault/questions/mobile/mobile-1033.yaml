title: 'Mobile TCO Realization: Size Peak Bandwidth for Mobile LLM App'
scenario: Calculate the peak and sustained LPDDR5X bandwidth consumption for a Snapdragon 8 Gen 3 running a 3B INT4 LLM assistant during a 60-second conversation. The conversation has 10 turns, each with a 200-token prompt prefill and a 100-token response decode.
question: For Snapdragon 8 Gen 3 at 77 GB/s, what are peak and sustained bandwidth for a 3B INT4 LLM over 10 turns?
details:
  realistic_solution: 'Per turn: Prefill (200 tokens): FLOPs-bound. Write new KV: 200 * 524KB = 104.9MB. Total prefill BW: 1.5GB + 0.105GB = 1.605GB. Decode (100 tokens): per-token BW = (1.5GB + running_context * 524KB). At mid-conversation (turn 5, 50 tokens in): context = ~1500 tokens. KV read: 1500 * 524KB = 786MB. Decode BW/token: 1.5 + 0.786 = 2.286GB. Total decode across all 10 turns (1000 tokens): 1000 * 2.286GB = 2286GB. Total 10 turns: ~(10 * 1.605GB prefill) + 2286GB = 2302GB moved in 60s = ~38.3GB/s sustained average. Peak: during decode at turn 10 (3000 ctx tokens): 1.5 + 1.57 = 3.07GB. To hit 50ms, requires 61.4GB/s. However, at max memory contention it saturates the 77GB/s bus.'
  common_mistake: |
    **The Pitfall:** Computing only weight bandwidth.
    **The Rationale:** Candidates calculate the bandwidth needed to load the weights but ignore KV-cache growth, forgetting that the cache accumulates across turns.
    **The Consequence:** They massively underestimate bandwidth demands at long context lengths, missing the point where the device hits the memory bandwidth wall.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model: 3B params (INT4, 1.5 GB).
       - KV Cache: 524 KB/token.
       - Turns: 10 (200 tokens prefill, 100 tokens decode each).
    2. **Calculations:**
       - Average decode read per token: 1.5 GB (weights) + (~1500 avg tokens * 524 KB) = 2.28 GB.
       - Total decode data: 1000 tokens * 2.28 GB = 2,280 GB.
       - Total prefill data: 10 turns * 1.6 GB = 16 GB.
       - Sustained Bandwidth: (2,280 GB + 16 GB) / 60 seconds = 38.26 GB/s.
       - Peak Bandwidth (Turn 10 decode at 3000 context): 1.5 GB + (3000 * 524 KB) = 3.07 GB/token. At 50ms/token target = 61.4 GB/s requirement.
    3. **Conclusion & Interpretation:**
       - **Result: 38.3 GB/s Sustained**. The accumulation of the KV cache creates massive bandwidth demands during decode, saturating the bus and driving up sustained memory power.
