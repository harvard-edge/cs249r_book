title: The Driver Drowsiness Drain
scenario: Your team is building a 'Driver Focus' feature for a ridesharing app. It uses a CNN on the phone's SoC to check for driver drowsiness. The inference takes 1 second to run, during which the SoC consumes 5W. To save battery, you decide to run this check only once every 10 seconds. In the idle time between checks, the SoC consumes a constant 50mW.
question: How would you calculate the total energy (in Watt-hours) this feature consumes over an 8-hour driving shift?
details:
  realistic_solution: The correct method is to calculate the average power over one full period (10 seconds), which includes both the active and idle states. This average power is then multiplied by the total duration of the shift (8 hours) to find the total energy consumed.
  common_mistake: |
    **The Pitfall:** Calculating energy consumption for the active state while completely ignoring idle power.
    **The Rationale:** Engineers assume that 50mW is negligible compared to 5W, forgetting that the idle state accounts for 90% of the timeline.
    **The Consequence:** Drastically underestimating total battery drain over long sessions, leading to user complaints.
  napkin_math: |
    1. Active Energy per period: 5W * 1s = 5 Joules.
    2. Idle Energy per period: 0.05W * 9s = 0.45 Joules.
    3. Total Energy per 10s period: 5.45 Joules.
    4. Average Power: 5.45 J / 10s = 0.545 Watts.
    5. Total Energy (8 hours): 0.545W * 8 hours = **4.36 Watt-hours (Wh)**.
  options:
  - '40 Wh (Mistake: Assumes the feature runs actively for the entire 8 hours, ignoring the duty cycle).'
  - '4.0 Wh (Mistake: Ignores the idle power consumption, assuming power is 0W between checks).'
  - 4.36 Wh
  - '0.55 Wh (Mistake: Calculates the average power correctly but confuses it with total energy, failing to multiply by the 8-hour duration).'
  correct_index: 2
