title: The Driver Drowsiness Drain
scenario: Your team is building a 'Driver Focus' feature for a ridesharing app. It uses a CNN on the phone's SoC to check for driver drowsiness. The inference takes 1 second to run, during which the SoC consumes 5W. To save battery, you decide to run this check only once every 10 seconds. In the idle time between checks, the SoC consumes a constant 50mW.
question: How would you calculate the total energy (in Watt-hours) this feature consumes over an 8-hour driving shift?
details:
  realistic_solution: Calculate the average power over one full period (10 seconds), which includes both the active and idle states. Multiply this average power by the total duration of the shift (8 hours) to find the total energy consumed.
  common_mistake: |
    **The Pitfall:** Calculating energy consumption for the active state while completely ignoring idle power.
    **The Rationale:** Engineers assume that 50mW is negligible compared to 5W, forgetting that the idle state accounts for 90% of the timeline.
    **The Consequence:** Drastically underestimating total battery drain over long sessions, leading to user complaints.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Active state: 5W for 1s.
       - Idle state: 50mW (0.05W) for 9s.
       - Shift duration: 8 hours.
    2. **Calculations:**
       - Active Energy per period: 5W * 1s = 5 Joules.
       - Idle Energy per period: 0.05W * 9s = 0.45 Joules.
       - Total Energy per 10s period: 5.45 Joules.
       - Average Power: 5.45 J / 10s = 0.545 Watts.
       - Total Energy (8 hours): 0.545W * 8 hours = 4.36 Watt-hours (Wh).
    3. **Conclusion & Interpretation:**
       - **Result: Power-Bound.** The system consumes 4.36 Wh, and duty cycling must account for both active load and base leakage.
  options:
  - 40.0 Wh
  - 4.0 Wh
  - 4.36 Wh
  - 0.55 Wh
