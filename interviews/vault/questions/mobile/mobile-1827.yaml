title: Mobile Microbatching Tradeoff
scenario: A mobile NPU can process one image in 18 ms or a batch of 4 images in 45 ms. A camera app needs preview results every 33 ms.
question: Can a mobile camera preview use batch-4 inference if single-image latency is 18 ms and batch-4 latency is 45 ms under a 33 ms frame budget?
details:
  realistic_solution: 'Batching improves throughput: single image is about 55.6 images/s, batch 4 is about 88.9 images/s. But batch-4 latency is 45 ms, exceeding the 33 ms live preview deadline. Use batch-1 or small dynamic batching for background frames, not live preview.'
  common_mistake: |
    **The Pitfall:** Choosing the higher-throughput batch without checking per-frame latency.
    **The Rationale:** Engineers focus on maximizing images/second and forget the real-time deadline for live UI updates.
    **The Consequence:** The live preview stutters and lags noticeably behind reality.
  napkin_math: |
    - Single throughput = 1 / 0.018s = 55.6 img/s. Single latency = 18 ms.
    - Batch-4 throughput = 4 / 0.045s = 88.9 img/s. Batch latency = 45 ms.
    - Target latency = 33 ms.
    - **Batch-4 latency (45 ms) exceeds the 33 ms budget. Batch-1 must be used for live preview.**
