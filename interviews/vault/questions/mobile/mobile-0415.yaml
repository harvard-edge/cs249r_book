title: 'The Lagging AR Bounding Box'
scenario: 'You are developing an object detection feature for AR glasses that overlays bounding boxes on objects. The camera streams at 60 FPS. To feel real-time and avoid a ''swimming'' effect, the model must process a frame and return results before the next frame arrives. Your current model takes 22ms for inference on a single frame. A product manager suggests batching 4 frames together to increase throughput.'
question: 'Why is batching four 60 FPS AR frames worse than optimizing single-frame inference below 16.67ms?'
details:
  realistic_solution: 'This is a hard real-time system with a strict latency budget. The core problem is that single-frame inference (22ms) already misses the 16.67ms deadline. By waiting to assemble a batch of 4, you add a 50ms delay just waiting for frames to arrive, violating the real-time constraint completely and causing massive visual desync.'
  common_mistake: |
    **The Pitfall:** Applying cloud-based batching intuition to a strict real-time edge application.
    **The Rationale:** Engineers prioritize throughput (TOPS) and forget the penalty of assembly delay required to fill the batch.
    **The Consequence:** The AR experience becomes incredibly laggy and unusable due to massive head-of-line delay injected before computation even begins.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hard Deadline: A 60 FPS camera requires processing under 1000ms / 60 FPS = 16.67ms per frame.

    **Calculations:**
    - Batch Assembly Time: Waiting for 4 frames adds a delay of 3 x 16.67ms = 50ms.

    **Conclusion & Interpretation:**
    - **Result: Latency-Bound**. Even if batched inference executes instantly, the first frame is intrinsically delayed by 50ms, blowing entirely past the 16.67ms budget.
  options:
  - 'The model''s arithmetic intensity is too low, making it memory-bound and thus unsuitable for batching.'
  - 'The system must process frames in real-time. The single-frame inference time (22ms) already violates the 16.67ms deadline, and batching will only increase total latency.'
  - 'Batching is correct. It will improve NPU utilization and system throughput, eventually clearing the backlog of frames.'
  - 'A dynamic batching system that adapts the batch size based on queue length should be implemented.'
  correct_index: 1
