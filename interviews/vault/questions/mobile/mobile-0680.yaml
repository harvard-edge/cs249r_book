title: The Invisible OOM Crash
scenario: 'Your mobile app is experiencing intermittent Out-Of-Memory (OOM) crashes on certain Android devices, specifically when loading a 100MB ML model. However, `adb shell dumpsys meminfo` shows that the device still has 500MB of free physical RAM.'
question: 'Why can a 100 MB Android ML model crash with OOM when there is 500 MB of free physical RAM?'
details:
  realistic_solution: 'The OOM crash points to virtual memory address space fragmentation or strict process-specific heap limits imposed by Android, not a lack of absolute hardware RAM.'
  common_mistake: |
    **The Pitfall:** Assuming OOM always means the physical RAM sticks are completely full.
    **The Rationale:** Engineers trust total memory dashboards and forget that memory allocators require contiguous virtual address space to load large model blobs.
    **The Consequence:** Failing to fix the bug by incorrectly telling the user their device is incompatible.
  napkin_math: |
    1. **Fragmentation:** A 32-bit process has a 2GB virtual address space. If 1GB is allocated in scattered 1MB chunks, there is plenty of "free" space.
    2. **Contiguous Allocation:** The framework requests a single 100MB contiguous block for the model tensor. The allocator fails to find an unfragmented gap of 100MB, throwing an OOM exception despite 500MB of total free physical RAM.
