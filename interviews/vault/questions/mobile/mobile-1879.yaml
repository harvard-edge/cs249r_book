title: WASM ML Model Fetch Over 3G
scenario: A mobile browser executing WASM ML on a Snapdragon 8 Gen 3 needs to fetch
  a 20 MB NLP model to process user text. The user is on a slow 3G connection with
  a real-world throughput of exactly 4 Mbps.
question: Calculate the total download time and determine the optimal chunk size to
  provide an interactive loading bar updating 10 times a second.
visual:
  kind: svg
  path: mobile-1879.svg
  alt: Diagram showing a monolithic 20MB model being sliced into 50KB chunks for streaming
    over a slow network.
  caption: WASM Model Chunking
details:
  realistic_solution: The model is 20 MB, which is 160 Megabits. At 4 Mbps, the download
    takes 160 / 4 = 40 seconds. To update a loading UI 10 times a second (10 Hz update
    rate), a chunk must be downloaded every 0.1 seconds. In 0.1s, the network transfers
    4 Mbps * 0.1s = 0.4 Megabits = 50 Kilobytes. The chunking strategy should slice
    the model into 50 KB chunks.
  common_mistake: Failing to convert Megabytes to Megabits when calculating the total
    download time, concluding the download takes 5 seconds instead of 40.
  napkin_math: 20 MB * 8 = 160 Mb. Total = 160 / 4 = 40s. Chunk = (20 MB / 40s) /
    10 = 0.05 MB = 50 KB.
