title: WASM ML Model Fetch Over 3G
scenario: A mobile browser executing WASM ML on a Snapdragon 8 Gen 3 needs to fetch a 20 MB NLP model to process user text. The user is on a slow 3G connection with a real-world throughput of exactly 4 Mbps.
question: Calculate the total download time and determine the optimal chunk size to provide an interactive loading bar updating 10 times a second.
visual:
  kind: svg
  path: mobile-1879.svg
  alt: Diagram showing a monolithic 20MB model being sliced into 50KB chunks for streaming over a slow network.
  caption: WASM Model Chunking
details:
  realistic_solution: The model is 20 MB, which is 160 Megabits. At 4 Mbps, the download takes 160 / 4 = 40 seconds. To update a loading UI 10 times a second (10 Hz update rate), a chunk must be downloaded every 0.1 seconds. In 0.1s, the network transfers 4 Mbps * 0.1s = 0.4 Megabits = 50 Kilobytes. The chunking strategy should slice the model into 50 KB chunks.
  common_mistake: |
    **The Pitfall:** Failing to convert Megabytes (MB) to Megabits (Mbps) when calculating network transfer times.
    **The Rationale:** Engineers often rush the calculation and treat MB and Mbps as compatible units without the 8x multiplier.
    **The Consequence:** They erroneously conclude the 20MB download takes 5 seconds instead of 40, resulting in a badly configured UX.
  napkin_math: |
    1. **Convert Model Size:** 20 MB * 8 = 160 Megabits (Mb).
    2. **Calculate Total Download Time:** 160 Mb / 4 Mbps = 40 seconds.
    3. **Determine Update Interval:** 10 updates per second = 0.1 seconds per update.
    4. **Calculate Chunk Size:** 4 Mbps * 0.1s = 0.4 Megabits. 0.4 Mb / 8 = 0.05 MB = 50 KB.
    **The optimal chunk size is 50 KB.**
