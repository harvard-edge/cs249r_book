title: The Real-Time Code Completion Budget
scenario: 'You''re engineering an on-device code completion feature for a new smartphone. The phone''s NPU can generate tokens for a small LLM with a time-per-output-token (TPOT) of 50 milliseconds for a batch size of one. The UX team has a strict requirement: to feel ''real-time'', the model must generate at least 15 tokens per second for each active user. The NPU time-slices token generation sequentially across active sessions.'
question: Can a 50ms TPOT phone NPU meet 15 tokens/sec for one code-completion user, and what is the maximum number of parallel sessions it can support?
details:
  realistic_solution: 'First, check the single-user case. The NPU generates 1000ms / 50ms = 20 tokens/sec, which exceeds the 15 tokens/sec requirement. For multiple sessions with sequential time-slicing: each session''s effective token rate = 20 / N tokens/sec. We need 20 / N ≥ 15, so N ≤ 20 / 15 = 1.33. Since N must be an integer, the device can only support 1 session at the required quality level. With 2 sessions, each gets 10 tokens/sec, which is below the 15 token/sec threshold.'
  common_mistake: |
    **The Pitfall:** Confusing aggregate throughput with per-stream latency.
    **The Rationale:** Engineers often calculate total NPU throughput (20 tokens/sec) and incorrectly assume it can be divided arbitrarily as long as total demand is met.
    **The Consequence:** Ignoring the fact that time-slicing execution across multiple requests increases the latency for each individual request, failing the UX requirement for any user beyond the first.
  napkin_math: |
    - Single-stream throughput: 1000ms / 50ms = 20 tokens/sec.
    - 20 tokens/sec > 15 tokens/sec requirement (Passes for 1 user).
    - Per-stream rate with N sequential sessions: 20 / N tokens/sec.
    - Solve for max N: 20 / N >= 15 → N <= 1.33.
    - Verify N=2: 20 / 2 = 10 tokens/sec (Fails requirement).
    - **The device can only support a maximum of 1 parallel session.**
  options:
  - No, it fails the spec because the NPU's 50ms latency is a larger number than the 15 tokens/sec requirement.
  - Yes, it meets the spec. It can support any number of sessions as long as their total requested tokens are less than 20 per second.
  - Yes, it meets the single-user spec. However, only 1 session can be supported because adding a second increases the effective latency to 100ms, violating the 66.7ms deadline.
  - Yes, it meets the spec. It can support up to 3 concurrent sessions.
  correct_index: 2
