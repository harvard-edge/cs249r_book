title: Context Switching Mobile Inference
scenario: A mobile device runs a background vision model. An incoming phone call triggers a high-priority interrupt, preempting the NPU.
question: Identify what architectural state must be saved to RAM to ensure the vision model can resume precisely without data corruption.
visual:
  kind: svg
  path: mobile-1911.svg
  alt: Timeline showing active NPU state, an interrupt spike, context save overhead, and context restore.
  caption: Preemptive Context Switch
details:
  realistic_solution: 'The OS must save the NPU''s internal register file, program counter, and any actively locked SRAM tiles containing intermediate activations. Because NPU SRAM is small, spilling the active feature maps and weight pointers to the main LPDDR memory is required before servicing the high-priority thread.'
  common_mistake: |
    **The Pitfall:** Assuming the NPU uses standard CPU context switching.
    **The Rationale:** Candidates fail to account for the massive local SRAM tiles holding in-flight tensor data and intermediate activations.
    **The Consequence:** Data corruption upon resuming the preempted task, or unhandled latency spikes during high-priority interrupts.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - High-priority interrupt enforces NPU preemption.
       - NPU utilizes SRAM for active tensor data.
    2. **Calculations:**
       - Context Payload: Registers + Program Counter + Active SRAM Feature Maps.
       - Action: Spill payload to LPDDR.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound Interrupt.** Spilling multi-megabyte tensor states to RAM is computationally slower than standard thread swapping.
