title: Context Switching Mobile Inference
scenario: A Snapdragon 8 Gen 3 runs a background vision model. An incoming phone call
  triggers a high-priority interrupt, preempting the NPU.
question: Identify what architectural state must be saved to RAM to ensure the vision
  model can resume precisely without data corruption.
visual:
  kind: svg
  path: mobile-1911.svg
  alt: Timeline showing active NPU state, an interrupt spike, context save overhead,
    and context restore.
  caption: Preemptive Context Switch
details:
  realistic_solution: The OS must save the NPU's internal register file, program counter,
    and any actively locked SRAM tiles containing intermediate activations. Because
    NPU SRAM is small, spilling the active feature maps and weight pointers to the
    main LPDDR memory is required before servicing the high-priority thread.
  common_mistake: Assuming the NPU uses standard CPU context switching without accounting
    for the massive local SRAM tiles holding in-flight tensor data.
  napkin_math: 1 context save = Registers + SRAM state
