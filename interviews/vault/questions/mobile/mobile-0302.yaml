title: The Mobile Jank Budget (mobile-0302)
scenario: 'To ensure a mobile application''s user interface feels perfectly smooth and avoids user-perceptible ''jank'', a specific per-frame latency budget must be met.'
question: 'What per-frame latency budget must mobile ML and rendering meet to avoid jank on a 60 FPS display?'
details:
  realistic_solution: 'The standard latency budget for a ''janky'' mobile UI is approximately 16ms. This is derived from the 60 frames-per-second (FPS) refresh rate of most standard mobile device screens. The entire process of running the model, processing its output, and rendering the UI update must complete within this window to avoid dropping a frame.'
  common_mistake: |
    **The Pitfall:** Confusing the 30 FPS target common for video playback with the strict requirements for UI interaction.
    **The Rationale:** Engineers assume 33 ms is fast enough for visual smoothness.
    **The Consequence:** Dropped frames leading to highly noticeable UI stutter and 'jank' during interactions.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Standard mobile display refresh rate: 60 Hz.
    2. **Calculations:**
       - Time budget per frame: 1 second / 60 frames = 0.01666... seconds = 16.67 ms.
    3. **Conclusion & Interpretation:**
       - **Result: 16 ms (UI Jank Budget).**
  options:
  - 100ms (Cloud P99 latency budget)
  - 33ms (30 FPS video budget)
  - 16ms (60 FPS UI jank budget)
  - 1ms (TinyML interrupt budget)
  correct_index: 2
