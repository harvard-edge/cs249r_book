title: 'Network Bandwidth Bottlenecks: Fluency — LPDDR5X BW and TPOT Math in 30 Seconds'
scenario: Without reference, in 30 seconds: A 1B INT8 model (1GB) runs on A17 Pro (68 GB/s Neural Engine).
question: What is the TPOT and what fraction of the memory bus does it saturate during decode?
details:
  realistic_solution: 'TPOT: 1GB / 68 GB/s = 14.7ms/token. BW saturation: during decode, reads 1GB per 14.7ms = 68 GB/s = 100% of NE bandwidth. NE saturated during active decode. Between tokens: 0% saturation.'
  common_mistake: |
    **The Pitfall:** Dividing model size by total device RAM instead of memory bandwidth.
    **The Rationale:** Candidates often confuse GB of storage capacity with GB/s of memory bandwidth.
    **The Consequence:** The resulting time-per-output-token (TPOT) calculation is fundamentally meaningless.
  napkin_math: |
    1. **TPOT Calculation:** 1 GB / 68 GB/s = 0.0147 seconds = **14.7 ms/token**.
    2. **Bandwidth Saturation:** During decode, reading 1GB in 14.7ms requires 68 GB/s.
    3. **Utilization:** 68 GB/s / 68 GB/s = **100% saturation** of the memory bus during active decode.
