title: Safety-Critical LLM Fallback Design on Tensor G3
scenario: 'You are designing an emergency real-time voice-to-text hazard alert system running on a Google
  Tensor G3 device (featuring an on-device TPU with 7.5 TOPS and 12 GB LPDDR5X RAM). To achieve functional
  safety certification, the system must guarantee deterministic execution and a failure recovery time
  of under 150ms. You must evaluate two designs: Alternative A runs the optimized Gemini Nano model entirely
  on the TPU with a software watchdog on the application OS. Alternative B runs the main model on the
  TPU but keeps a smaller, deterministic fallback model pinned to a CPU core with a strict hardware watchdog
  timer.'
question: "Which Tensor G3 hazard-alert fallback design meets a 150ms safety recovery SLA, and why?"
details:
  realistic_solution: Alternative B is the superior choice for meeting safety certification. While the
    TPU provides excellent throughput, its asynchronous execution makes tight worst-case execution time
    (WCET) bounds difficult to prove. Isolating a fallback model on a dedicated CPU core with a hardware
    watchdog guarantees the 150ms recovery SLA even if the main TPU pipeline hangs, fulfilling safety
    requirements without bottlenecking the 12 GB LPDDR5X memory.
  common_mistake: Candidates often choose Alternative A to maximize the TPU's 7.5 TOPS and avoid CPU-TPU
    synchronization overhead, assuming software watchdogs are sufficient. They fail to realize that software
    watchdogs on a non-real-time mobile OS cannot guarantee the deterministic recovery times required
    for functional safety certification.
  napkin_math: Main model on TPU executes in ~80ms using 7.5 TOPS. Software watchdog (Alt A) adds OS scheduler
    jitter (~50ms) + context switch (~100ms), making worst-case recovery = 80 + 50 + 100 = 230ms (Fails
    150ms SLA). Hardware watchdog (Alt B) triggers in <5ms. Fallback CPU model executes in 40ms. Worst-case
    recovery = TPU timeout (80ms) + hardware interrupt (5ms) + CPU fallback execution (40ms) = 125ms (Passes
    150ms SLA).
