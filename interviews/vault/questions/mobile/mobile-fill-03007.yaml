title: Reducing P99 Inference Latency via Input Bucketing on Snapdragon 8 Gen 3
scenario: 'A Snapdragon 8 Gen 3 (45 TOPS INT8) mobile device runs a language model for keyboard suggestions.
  Variable-length inputs cause P99 latency of 180ms (SLA: 100ms). The QNN SDK is used for inference. P50
  is 35ms. Profiling shows 60% of time is in dynamic shape reshaping.'
details:
  realistic_solution: Compile 4 static-shape model variants for buckets [8, 16, 32, 64 tokens]. Route
    each input to the smallest bucket that fits. Pad to bucket size within the model. Bucket compilation
    is one-time cost; runtime overhead is a single bucket-selection comparison. QNN SDK supports multiple
    compiled delegates.
  common_mistake: Padding all inputs to maximum sequence length (e.g. 128 tokens) to eliminate reshaping.
    This wastes compute proportionally and increases P50 to ~80ms while only reducing reshaping overhead.
  napkin_math: 'Snapdragon 8 Gen 3 at 45 TOPS INT8. A transformer layer with sequence length n scales
    as O(n^2) for attention. Bucket-64 vs single-128 model: average input length ~20 tokens → routes to
    bucket-32. Compute savings: (32/128)^2 = 6.25% of max attention compute. Reshaping overhead eliminated
    = 60% * 180ms = 108ms saved from P99.'
