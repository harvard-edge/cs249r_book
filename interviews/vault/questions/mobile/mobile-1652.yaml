title: MLOps Lifecycle for On-Device Deployment on Snapdragon Hexagon NPU
scenario: Your team is tasked with deploying an on-device real-time object detection model to a new generation of mobile devices. The current model, optimized for INT8 inference, has a peak inference latency requirement of 20ms and an average memory footprint of 500MB. You need to establish an MLOps lifecycle for this deployment, including continuous integration for model updates, versioning, performance monitoring on-device, and ensuring training-serving consistency.
question: How would you design CI/CD, monitoring, and efficiency metrics for an on-device object detector deployment?
details:
  realistic_solution: |
    Implement a CI/CD pipeline that includes automated on-device testing (using a representative device farm or emulators with NPU simulation) for new model versions. Utilize model registries for versioning and artifact management. For training-serving consistency, deploy a shadow model or A/B test with production traffic, comparing predictions, internal feature distributions, and drift metrics. On-device performance can be monitored via SDKs that report NPU utilization, inference latency, and power consumption back to a central logging system for anomaly detection and alerting. Use hardware-aware model compilers for maximum efficiency.
  common_mistake: |
    **The Pitfall:** Overlooking the unique challenges of edge model updates.
    **The Rationale:** Candidates rely on cloud-native MLOps paradigms, failing to account for network constraints, battery drain during delta updates, and INT8 quantization effects on accuracy.
    **The Consequence:** Deploying models that exceed computational limits without proper fallback strategies, resulting in silent failures or excessive battery consumption.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Latency budget: 20ms per inference.
       - Memory footprint: 500MB.
       - Metric targets must quantify throughput vs target.
    2. **Calculations:**
       - NPU Utilization Percentage (U) = (Actual_Model_TOPS / NPU_Max_TOPS) * 100%.
       - Effective Inference Rate (IPS) = 1 / (Observed_Latency_in_Seconds).
       - Throughput-Latency Efficiency Score = (NPU_Max_TOPS * IPS) / Model_TOPS_per_Inference_Target.
    3. **Conclusion & Interpretation:**
       - **This efficiency score correlates NPU capacity, observed throughput, and the computational target, enabling automated SLA validation in the CI/CD pipeline. Bottleneck: Compute/Latency.**
