title: Gemini Nano TTFT Decomposition on Tensor G3
scenario: You are deploying Gemini Nano (a 2-billion parameter INT8 quantized model) for local text summarization
  on the Google Tensor G3, utilizing its 12 GB LPDDR5X memory. The device's Edge TPU delivers exactly
  7.5 TOPS. Telemetry reveals that when processing a 1000-token input prompt, the Time To First Token
  (TTFT) is exactly 600ms. Break down this end-to-end TTFT latency into its core components and explain
  which specific hardware characteristic is the primary bottleneck during this phase.
details:
  realistic_solution: End-to-end TTFT decomposes into preprocessing (text normalization and tokenization),
    the prefill forward pass (loading weights and computing activations), and postprocessing (sampling
    the first token). During the prefill forward pass, the model processes all 1000 input tokens in parallel.
    Because it matrix-multiplies the entire weight matrix against a large activation matrix, the compute
    requirements scale linearly with the input sequence length. The Google Tensor G3's TPU ceiling of
    7.5 TOPS strictly limits how fast these operations can execute, making raw compute the dominant bottleneck
    that accounts for the vast majority of the 600ms TTFT.
  common_mistake: Candidates often incorrectly assume that the TTFT is bottlenecked by the LPDDR5X memory
    bandwidth loading the 2GB of model weights. They fail to apply the mathematical formula for prefill
    compute and miss that processing a large batch of tokens simultaneously is heavily compute-bound on
    mobile TPUs, unlike the generation phase which is memory-bound.
  napkin_math: 'Total Compute Operations for Prefill ≈ 2 * Model Parameters * Input Tokens. Operations
    = 2 * 2,000,000,000 params * 1000 tokens = 4,000,000,000,000 operations (4 TOPs). Compute Time = Total
    Operations / TPU Performance. Compute Time = 4 TOPs / 7.5 TOPS = 0.533 seconds (533 ms). Latency Decomposition:
    Total TTFT (600 ms) = Preprocessing/Tokenization (~33 ms) + TPU Prefill Compute (533 ms) + LPDDR5X
    Memory I/O & Postprocessing (~34 ms).'
