title: Energy-Delay Product Optimization for Inference on A17 Pro
scenario: 'An iPhone app runs face detection (MobileNetV3-small, 2.5M INT8 params) in two modes: Mode
  A (ANE): 35 TOPS, 0.8W active, 1.5ms inference. Mode B (E-core CPU): 3 GFLOPS, 0.15W active, 500ms inference.
  Calculate energy-delay product (EDP) for each mode and determine when each is optimal.'
details:
  realistic_solution: 'EDP = energy × delay = (power × time) × time = power × time². Mode A (ANE): E =
    0.8W × 0.0015s = 1.2mJ. D = 1.5ms. EDP = 1.2mJ × 1.5ms = 1.8×10⁻⁶ J·s. Mode B (E-core): E = 0.15W
    × 0.5s = 75mJ. D = 500ms. EDP = 75mJ × 500ms = 0.0375 J·s. ANE EDP: 1.8×10⁻⁶ J·s vs E-core: 0.0375
    J·s. ANE is 20,833× better EDP. Energy: ANE 1.2mJ vs CPU 75mJ — ANE is 62.5× more energy efficient
    too. When to use E-core: only when ANE is occupied with higher-priority task and we can afford 500ms
    latency. For real-time face detection, always use ANE.'
  common_mistake: Optimizing for energy alone or latency alone; EDP = E × D provides a balanced metric
    where E = power × time and D = time, so EDP = power × time².
  napkin_math: 'ANE: E=1.2mJ, D=1.5ms. EDP=1.8μJ·s. E-core: E=75mJ, D=500ms. EDP=37,500μJ·s. ANE EDP advantage:
    20,833×. ANE energy advantage: 62.5×. Use ANE always for this workload. E-core only for ultra-low-frequency
    background inference where ANE is busy.'
