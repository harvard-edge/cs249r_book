title: 'On-Device Responsible AI: Content Moderation Guardrails on Samsung Exynos 2400 NPU'
scenario: An on-device AI system on an Exynos 2400 NPU performs real-time content moderation of user-generated video before cloud upload. The system requires ethical guardrails and robustness.
question: How would you design responsible AI architecture and governance for Exynos 2400 on-device video content moderation?
details:
  realistic_solution: A realistic solution would involve a tiered approach. Model cards would be generated pre-deployment, focusing on key on-device metrics and design choices, with a simplified, dynamic summary accessible for auditing. On-device impact assessments would leverage federated learning techniques for data collection, anonymizing sensitive information and aggregating insights without offloading raw data. Red-teaming would primarily occur during development and pre-release phases, with a lightweight, adaptive anomaly detection system on-device serving as a continuous guardrail. The architecture would prioritize model compression (quantization, pruning) to fit within the 12GB LPDDR5X, and efficient NPU utilization to meet latency targets. A robust local logging and auditing mechanism, designed for minimal overhead, would enable post-mortem analysis and contribute to continuous improvement without compromising user privacy.
  common_mistake: |
    **The Pitfall:** Proposing full cloud-centric responsible AI frameworks (like massive iterative red-teaming) for a mobile edge device.
    **The Rationale:** Candidates ignore the strict latency, power, and memory constraints of the mobile environment when applying theoretical AI safety concepts.
    **The Consequence:** The proposed guardrails consume more resources than the main moderation model, leading to system failure or unacceptable user latency.
  napkin_math: |
    - **NPU Budget:** Exynos 2400 offers 34.7 TOPS.
    - **Main Model:** Requires 15-30 TOPS at 30 FPS.
    - **Guardrail Budget:** 5-10% of capacity leaves 1.7-3.4 TOPS for safety checks.
    - **Guardrail Capacity:** Allows for a lightweight model of only 50-100 GOPS/frame.
    - **Final Result:** **On-device responsible AI requires heavily quantized, lightweight anomaly detection models, not massive LLM-based safety evaluators.**
