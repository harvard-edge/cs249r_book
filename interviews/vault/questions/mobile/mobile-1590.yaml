title: Optimizing LLM Inference on Snapdragon 8 Gen 3 NPU under Thermal Constraints
scenario: Your team is deploying a large language model (LLM) for on-device inference on a mobile platform utilizing the Snapdragon 8 Gen 3 Hexagon NPU. Initial benchmarks show that while the NPU achieves peak performance for short durations, sustained operation leads to significant thermal throttling, degrading performance well below target for background tasks.
question: How should Snapdragon 8 Gen 3 schedule burst and sustained LLM inference when thermal throttling lowers NPU throughput?
details:
  realistic_solution: 'Implement a multi-pronged approach: 1. Dynamic Workload Scheduling: Prioritize burst tasks when thermal headroom is available, and defer less critical background tasks or run them at lower frequencies/batch sizes during thermal stress. 2. Adaptive Frequency/Voltage Scaling (DVFS): Utilize the device''s thermal sensors and power management unit (PMU) to dynamically adjust NPU frequency and voltage based on real-time temperature and power consumption, optimizing for energy efficiency and minimizing throttling. 3. Model Quantization & Pruning: Further optimize the LLM model for the Hexagon NPU''s INT8 capabilities and explore pruning techniques to reduce computational load, thereby lowering power consumption and heat generation. 4. Software-Defined Cooling Strategies: Integrate with the mobile OS''s thermal framework to understand thermal zones and activate passive (e.g., reduce display brightness, throttle other components) or active (if available) cooling mechanisms. 5. Predictive Thermal Management: Use historical data and simple ML models to predict thermal runway based on current workload and ambient conditions, proactively adjusting scheduling before critical throttling occurs.'
  common_mistake: |
    **The Pitfall:** Assuming the advertised peak TOPS (45 TOPS INT8) are continuously sustainable.
    **The Rationale:** Overestimating sustained performance without proper thermal budgeting and dynamic frequency scaling (DFS) consideration.
    **The Consequence:** Designing a system that quickly overheats, leading to severe thermal throttling and drastically degraded background performance.
  napkin_math: |
    - Consider a scenario where the NPU's peak power draw for 45 TOPS INT8 is 10W.
    - If the mobile device's thermal design power (TDP) for the NPU subsystem is 5W, how long can the NPU operate at peak performance?
    - Assuming all 10W manifest as heat and the system can dissipate 5W continuously: (10W - 5W) * time = thermal capacity * delta_T.
    - There is a 5W excess. If the thermal mass can absorb 15 Joules before a critical temperature rise, 15 J / 5 W = 3 seconds.
    - **Burst performance is limited to 3 seconds before thermal throttling becomes necessary to maintain the 5W dissipation limit.**
