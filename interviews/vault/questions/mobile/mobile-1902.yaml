title: A17 Pro Off-Chip Spilling
scenario: Designing a custom memory manager for a transformer-based video upscaler
  on the Apple A17 Pro (35 TOPS). Large intermediate activations spill to the unified
  LPDDR5 system RAM (~50 GB/s).
question: Design an allocation strategy to minimize DRAM bandwidth waste, and compute
  the arithmetic intensity required to avoid bottling on RAM.
visual:
  kind: svg
  path: mobile-1902.svg
  alt: Bar chart comparing Apple A17 Pro SRAM bandwidth to LPDDR5 system memory bandwidth.
  caption: Memory Hierarchy Bandwidth on Mobile SoC
details:
  realistic_solution: The candidate should propose operator fusion to keep activations
    in the SRAM/cache. To sustain 35 TOPS over a 50 GB/s bus, the arithmetic intensity
    must match the ratio of compute to memory bandwidth.
  common_mistake: Failing to recognize that mobile SoCs have unified memory, but bandwidth
    is still vastly lower than on-chip cache, treating DRAM as free.
  napkin_math: 35000 / 50 = 700 ops/byte
