title: Mobile New 0015
scenario: 'Applying per-channel INT8 quantization to a DSP preserves accuracy but causes vector ALUs to stall frequently. Latency is 30% higher compared to per-tensor quantization, even though the MAC count is identical.'
question: 'Why does per-channel INT8 quantization preserve accuracy but stall DSP vector ALUs compared with per-tensor quantization?'
details:
  realistic_solution: 'The symptom of vector stalls points to memory and pipeline overhead. In per-tensor, one scale factor is kept in a register. In per-channel, the DSP must fetch a unique scale and zero-point for every output channel from memory, causing L1 cache misses and stalling tightly pipelined SIMD instructions.'
  common_mistake: |
    **The Pitfall:** Assuming scalar parameter fetches are mathematically free or cached perfectly.
    **The Rationale:** Candidates look only at total theoretical FLOPs and ignore memory access patterns and SIMD pipeline bubbles.
    **The Consequence:** Choosing an accuracy-preserving quantization strategy that drastically degrades real-world latency.
  napkin_math: |
    1. **Per-Tensor Cost:** 1 scale (4 bytes) held permanently in a register.
    2. **Per-Channel Cost:** 4096 channels requires fetching 4096 scales × 4 bytes = 16 KB per layer.
    3. **Latency Impact:** At 10 GB/s bandwidth, fetching 16 KB takes 1.6 μs. Repeated over 100 layers, the constant pipeline resets add massive cumulative delay.
