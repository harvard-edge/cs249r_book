title: Mobile New 0015
scenario: Applying per-channel INT8 quantization to a DSP preserves accuracy but causes vector ALUs to
  stall frequently. Latency is 30% higher compared to per-tensor quantization, even though the MAC count
  is identical.
details:
  realistic_solution: The symptom of vector stalls and higher latency is caused by the memory and pipeline
    overhead of applying unique scale factors per channel. In per-tensor, one scale factor is kept in
    a register. In per-channel, the DSP must fetch a new scale and zero-point for every output channel
    from memory, causing L1 cache misses and stalling the tightly pipelined vector MAC instructions.
  common_mistake: Looking only at total theoretical FLOPs and assuming scalar parameter fetching is mathematically
    'free'.
  napkin_math: 'Per-tensor: 1 scale (4B) in register. Per-channel for 4096 channels: 4096 scales = 16KB
    to fetch per layer. At 10GB/s, 16KB takes 1.6us to fetch. Over 100 layers, this plus the pipeline
    bubble resets adds significant latency.'
