title: Mastering End-to-End Optimization of a 4-Stage Compound Pipeline on Snapdragon 8 Gen 3
scenario: 'A Snapdragon 8 Gen 3 (45 TOPS, 16GB) compound AI system currently processes queries in 3.8
  seconds: OCR (400ms) → embedding+retrieval (250ms) → cross-encoder reranking of 20 docs (600ms) → 3B
  LLM generation of 80 tokens (2550ms). The target is 1.5 seconds P95. Design a comprehensive optimization
  strategy that achieves this target without changing models or hardware.'
question: "How would you design a comprehensive optimization strategy that achieves this target without changing models or hardware?"
details:
  realistic_solution: 'Multi-pronged restructuring: (1) Parallelize OCR + query embedding: if OCR result
    not needed for embedding, run concurrently: max(400,50)=400ms (embedding is fast, runs on NPU while
    OCR runs on CPU). (2) Reduce reranker candidates from 20 to 8 docs: 600ms*(8/20)=240ms. (3) INT4 LLM:
    2550/2=1275ms. (4) Reduce generation from 80 to 40 tokens: 1275/2=637ms. (5) Pipeline overlap: start
    LLM prefill while reranker completes last 2 docs (speculative prefill): saves 80ms. Restructured:
    parallel(OCR+embed)=400ms, retrieval(200ms, after embed), rerank-8(240ms), LLM-40tok-INT4(637ms),
    with OCR→retrieval→rerank→LLM as critical path: 400+200+240+637=1477ms < 1500ms target.'
  common_mistake: Applying standard latency optimizations (quantization, batch size tuning) to each stage
    independently without restructuring the pipeline. The 3B LLM at 2550ms for 80 tokens is memory-bandwidth-bound
    — quantization from FP16 to INT4 doubles throughput but only reduces to 1275ms, still leaving the
    total at 2525ms, far from the 1.5s target.
  napkin_math: 'Original: 400+250+600+2550=3800ms. Step 1 parallel OCR+embed: embed=50ms, OCR=400ms, parallel=400ms.
    Retrieval after embed: +200ms (previously part of 250ms). Step 2 rerank 8 docs: 600*(8/20)=240ms.
    Step 3 INT4 LLM: 2550/2=1275ms. Step 4 40 tokens: 1275*(40/80)=637ms. Step 5 pipeline overlap (80ms
    saved): not counting for conservative estimate. Critical path: 400(OCR||embed) + 200(retrieval) +
    240(rerank) + 637(LLM) = 1477ms. P95 with 5% jitter: 1477*1.05=1551ms — slightly over. Remove jitter
    with 35 tokens: 1477*(35/40)... recalc LLM: 35/80*1275=557ms. Total: 400+200+240+557=1397ms. P95:
    1467ms < 1500ms.'
