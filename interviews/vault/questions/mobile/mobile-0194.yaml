title: 'The Mobile Jank Budget: Real-Time Deadlines'
scenario: You're tasked with integrating a generative model on a smartphone to provide real-time typing suggestions.
question: What end-to-end latency budget must a mobile typing suggestion meet to avoid jank on a 60 FPS screen?
details:
  realistic_solution: The standard latency budget to avoid UI 'jank' on a mobile device is approximately 16ms. This number is derived directly from the refresh rate of most standard mobile displays (60 FPS), where one frame is drawn every 1000ms / 60 ≈ 16.67ms. All work, including OS scheduling, inference, and rendering, must fit within this window to avoid a dropped frame, which the user perceives as stutter or lag.
  common_mistake: |
    **The Pitfall:** Applying cloud latency budgets (e.g., 100ms) to real-time mobile tasks.
    **The Rationale:** Developers often rely on standard web-based service level agreements (SLAs) for perceived real-time responsiveness.
    **The Consequence:** A 100ms delay causes the UI to drop 6 frames, which feels incredibly laggy and stuttery for interactive tasks like typing.
  napkin_math: |
    1. **Determine Refresh Rate:** A standard mobile display runs at 60 Frames Per Second (FPS).
    2. **Calculate Frame Duration:** 1 second / 60 frames = 1000ms / 60 ≈ 16.67ms per frame.
    3. **Budget Allocation:** All OS scheduling, inference, and rendering must fit within this single frame duration.
    **The latency budget is strictly ~16ms to avoid a dropped frame (jank).**
  options:
  - ~100 ms
  - ~33 ms
  - ~16 ms
  - ~1 ms
  correct_index: 2
