title: 'The Mobile Jank Budget: Real-Time Deadlines'
scenario: You're tasked with integrating a generative model on a smartphone to provide real-time typing
  suggestions. To ensure a smooth, 'jank-free' user experience that doesn't miss a screen refresh, what
  is the maximum latency budget you have for the entire end-to-end operation, from model inference to
  rendering the suggestion?
question: "What end-to-end latency budget must a mobile typing suggestion meet to avoid jank on a 60 FPS screen?"
details:
  realistic_solution: The standard latency budget to avoid UI 'jank' on a mobile device is approximately
    16ms. This number is derived directly from the refresh rate of most standard mobile displays (60 FPS),
    where one frame is drawn every 1000ms / 60 ≈ 16.67ms. All work, including OS scheduling, inference,
    and rendering, must fit within this window to avoid a dropped frame, which the user perceives as stutter
    or lag.
  common_mistake: Engineers often misremember the latency target, confusing it with budgets for other
    platforms. For example, applying a 100ms cloud budget would feel incredibly laggy on mobile, while
    a 1ms TinyML budget is unnecessarily strict and likely unachievable for a complex generative task.
  napkin_math: Frame Time = 1 second / Refresh Rate
  options:
  - ~100 ms
  - ~33 ms
  - ~16 ms
  - ~1 ms
  correct_index: 2
