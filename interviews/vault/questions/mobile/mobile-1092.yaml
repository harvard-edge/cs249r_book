title: NPU Frame Dropping Impact on Equalized Odds
scenario: An on-device facial expression recognition model runs on the Samsung Exynos 2400 NPU to trigger accessibility actions. The dual-core NPU supports 34.7 TOPS. During intensive gaming, the shared 12 GB LPDDR5X memory experiences high bandwidth contention from the GPU, forcing the NPU to reduce the processing rate from 30 FPS to 10 FPS to avoid memory starvation. The system requires at least 2 consecutive frames of an expression to register a detection. Subgroup A typically exhibits micro-expressions lasting 150ms, while Subgroup B exhibits expressions lasting 300ms.
question: "Why does this hardware-driven throttling degrade the Equalized Odds fairness metric specifically for Subgroup A, and what is the True Positive Rate calculation?"
details:
  realistic_solution: 'The shared memory bandwidth constraints force the system to 10 FPS. Subgroup A''s short expressions now fall below the 2-frame threshold required for detection, leading to increased False Negatives and a lowered True Positive Rate, violating Equalized Odds.'
  common_mistake: |
    **The Pitfall:** Focusing only on theoretical TOPS and ignoring time-series behavior.
    **The Rationale:** Candidates fail to connect physical hardware throttling directly to the mathematical degradation of demographic True Positive Rates.
    **The Consequence:** Missing the fundamental bias introduced by system load, assuming fairness is only a property of the model weights.
  napkin_math: |
    - **Baseline (30 FPS):** 33.3ms per frame. Subgroup A (150ms) gets 4.5 frames. Subgroup B (300ms) gets 9 frames. Both easily meet the 2-frame requirement.
    - **Throttled State (10 FPS):** 100ms per frame. Subgroup A gets 1.5 frames (fails 2-frame requirement 50% of the time). Subgroup B gets 3.0 frames.
    - **Final Result:** Subgroup A's True Positive Rate plummets due to 50% false negatives, creating a **massive hardware-induced fairness disparity**.
