title: Graceful Degradation for On-Device LLM on Snapdragon 8 Gen 3
scenario: You are designing an on-device Large Language Model (LLM) inference system for a flagship mobile phone powered by the Snapdragon 8 Gen 3 Hexagon NPU. Your LLM typically requires 30 INT8 TOPS for optimal performance and occupies 10 GB of memory. However, the NPU's performance can degrade due to thermal throttling or concurrent workloads, reducing available TOPS to as low as 15-20 INT8 TOPS. Memory pressure can also fluctuate, potentially reducing available LPDDR5X to 8 GB or less.
question: How would you dynamically adjust the model's output quality or inference parameters to manage NPU and memory load through QoS shedding and degradation ladders?
details:
  realistic_solution: 'Implement an adaptive inference manager that continuously monitors NPU utilization, temperature, battery status, and available memory. This manager would orchestrate a degradation ladder: Tier 1 (Optimal) uses the full LLM. Tier 2 (Moderate Degradation) utilizes aggressive quantization or reduces output complexity. Tier 3 (Severe Degradation) offloads simpler tasks to the CPU or uses heuristic-based responses. QoS shedding involves dynamically adjusting generation parameters based on real-time hardware telemetry.'
  common_mistake: |
    **The Pitfall:** Designing a static system that fails catastrophically under load.
    **The Rationale:** Developers often assume target hardware is fully available, ignoring real-world throttling and contention.
    **The Consequence:** Unexplained drops in quality or complete application freezes when the device heats up.
  napkin_math: |
    1. Target: 10 tokens/sec at 100ms/token latency.
    2. Compute: 3 TOPS per token * 10 tokens/sec = 30 TOPS required.
    3. NPU Capacity: 45 TOPS peak (15 TOPS buffer).
    4. **Throttling Impact:** If throttled to 15 TOPS (a 50% deficit), generation drops to 5 tokens/sec, missing SLAs and requiring degradation to a smaller model.
