title: Graceful Degradation for On-Device LLM on Snapdragon 8 Gen 3
scenario: You are designing an on-device LLM inference system. Your LLM typically requires 30 INT8 TOPS for optimal performance. The NPU's performance can degrade due to thermal throttling, reducing available compute.
question: How would you dynamically adjust the model's output quality or inference parameters to manage NPU and memory load through QoS shedding and degradation ladders?
details:
  realistic_solution: |
    Implement an adaptive inference manager that continuously monitors NPU utilization, temperature, battery status, and available memory. Orchestrate a degradation ladder: Tier 1 (Optimal) uses the full LLM. Tier 2 (Moderate Degradation) utilizes aggressive Top-K sparsification or reduces output complexity via lower max_new_tokens. Tier 3 (Severe Degradation) offloads to CPU or relies on heuristics. QoS shedding dynamically adjusts generation based on real-time hardware telemetry.
  common_mistake: |
    **The Pitfall:** Designing a static system that fails catastrophically under load.
    **The Rationale:** Developers often assume target hardware is fully available, ignoring real-world throttling and contention.
    **The Consequence:** Unexplained drops in quality or complete application freezes when the device heats up.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Target SLA: 10 tokens/sec at 100ms/token latency
       - Compute: 3 TOPS per token = 30 TOPS required
       - Throttled NPU Capacity: 15 TOPS
    2. **Calculations:**
       - Generation at 15 TOPS: 15 TOPS / 3 TOPS/token = 5 tokens/sec
    3. **Conclusion & Interpretation:** **Throttling reduces generation to 5 tokens/sec, breaching the SLA and requiring degradation. Result: Compute-Bound.**
