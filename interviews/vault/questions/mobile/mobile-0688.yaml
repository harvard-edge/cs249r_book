title: The Multi-Model Memory Sharing
scenario: 'Your camera app runs three models simultaneously: face detection, face landmark estimation,
  and background segmentation. All three use a MobileNetV3-Small backbone (1.5M params, INT8 = 1.5 MB)
  with different heads. Currently deployed as three independent models totaling 4.5 MB of backbone weights
  (3 copies). Design a shared-backbone architecture and calculate the memory savings. What are the runtime
  complications on the Apple ANE?'
question: "Can a shared MobileNetV3-Small backbone reduce three camera models from 10.5 MB, and what ANE runtime tradeoff appears?"
details:
  realistic_solution: 'Three independent MobileNetV3-Small models duplicate the backbone 3x: 4.5 MB weights
    + 6 MB activations = 10.5 MB. A shared-backbone multi-head model uses 1.5 MB backbone + 0.65 MB heads
    + 2 MB activations = 4.15 MB (63% savings). However, on the ANE, CoreML compiles models as monolithic
    graphs — you cannot share subgraphs between compiled models. The shared model runs backbone once (3ms)
    then 3 heads sequentially (1.5ms total) = 4.5ms. Versus 3 independent models in parallel across ANE
    cores: 4ms. The shared approach is slower if you have enough ANE parallelism, but saves critical memory
    on budget devices.'
  common_mistake: '"Just share the backbone weights in memory — point all three models to the same weight
    buffer." This works at the weight level but ignores that each model needs separate activation buffers,
    and the ANE compiles models as monolithic graphs that can''t share subgraphs.'
  napkin_math: 'Three independent models: 3 × 1.5 MB backbone + 3 × 0.2 MB heads = 5.1 MB weights + 3
    × 2 MB activations = 11.1 MB total. Shared backbone (single multi-output): 1.5 MB backbone + 0.65
    MB heads + 2 MB activations = 4.15 MB total. Savings: 63% (6.95 MB). Latency: independent = 3 × 4ms
    = 12ms (sequential) or 4ms (parallel on 3 ANE cores). Shared = 3ms backbone + 3 × 0.5ms heads = 4.5ms
    (always sequential through backbone). Shared is faster if you were running sequentially, slower if
    you had enough ANE cores for parallelism.'
