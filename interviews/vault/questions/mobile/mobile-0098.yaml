title: The Async Camera Pipeline
scenario: Design an inference pipeline for a camera app that maintains 60 FPS preview while running a
  50ms portrait segmentation model. The model cannot run every frame. How do you architect this so the
  user sees smooth video with accurate segmentation?
question: "How do you architect this so the user sees smooth video with accurate segmentation?"
details:
  realistic_solution: 'Triple-buffer async pipeline with temporal interpolation. Three threads: (1) Camera
    at 60 FPS. (2) NPU segmentation at 20 FPS (50ms), processing latest frame. (3) Display at 60 FPS:
    composites latest mask with optical-flow interpolation (2ms GPU) for intermediate frames. Budget:
    7ms UI + 2ms interpolation + 1ms composite = 10ms < 16.67ms. NPU at 100% utilization. User sees smooth
    60 FPS with mask updating every 3 frames but moving smoothly via interpolation.'
  common_mistake: '"Run the model every 3rd frame and hold the mask for the other 2 frames." This works
    but produces visible mask "popping" — the segmentation boundary jumps every 3 frames instead of moving
    smoothly.'
  napkin_math: 'Camera: 60 FPS → frame every 16.67ms. Model: 50ms → 20 FPS. Mask interpolation: 2ms per
    frame on GPU. Display thread: 7ms (UI) + 2ms (interpolation) + 1ms (composite) = 10ms < 16.67ms budget
    ✓. NPU utilization: 50ms/50ms = 100% (always processing). Perceived quality: smooth 60 FPS with mask
    updating every 50ms (3 frames). Without interpolation: mask "jumps" every 3 frames. With interpolation:
    mask moves smoothly every frame.'
