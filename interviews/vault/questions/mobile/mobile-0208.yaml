title: The Two Latencies of Generative AI
scenario: 'Your team is implementing a real-time transcription feature on a mobile device. Users notice
  two distinct latencies: the initial wait time before the *first* word appears, and the speed at which
  *subsequent* words are generated. What are the standard industry terms used to define these two critical
  performance metrics?'
question: "What are the standard industry terms used to define these two critical performance metrics?"
details:
  realistic_solution: The correct terms are Time to First Token (TTFT) and Time Per Output Token (TPOT).
    TTFT measures the initial processing time (prompt ingestion, etc.) before any output is generated.
    TPOT measures the ongoing inference speed of the model as it generates the sequence token-by-token
    (or in this case, word-by-word).
  common_mistake: A common mistake is to use generic terms like 'initial latency' and 'throughput' or
    to confuse these metrics with statistical measures like P50/P99 latency. While related, the specific
    terms TTFT and TPOT are standard for evaluating the user experience of streaming generative models.
  napkin_math: Imagine the model takes 400ms to process the audio and produce the first word, and then
    generates subsequent words every 100ms.
  options:
  - Initial Latency and Inference Speed
  - Cold Start and Warm Read
  - P50 Latency and P99 Latency
  - Time to First Token (TTFT) and Time Per Output Token (TPOT)
