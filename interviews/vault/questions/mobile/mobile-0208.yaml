title: The Two Latencies of Generative AI
scenario: Your team is implementing a real-time transcription feature. Users notice an initial wait time before the first word appears, followed by the rapid generation of subsequent words.
question: What standard industry terms define these two critical performance metrics in generative models?
details:
  realistic_solution: |
    The industry standard metrics for streaming auto-regressive generation are Time to First Token (TTFT) and Time Per Output Token (TPOT). TTFT is overwhelmingly compute-bound, representing the prompt ingestion and parallel 'Prefill' phase where the full attention matrix is computed. TPOT is almost exclusively memory-bandwidth bound, representing the 'Decode' phase where the model generates subsequent tokens sequentially while reloading weights for every step.
  common_mistake: |
    **The Pitfall:** Using generic terms like 'initial latency' and 'throughput'.
    **The Rationale:** Candidates are unfamiliar with the specific vocabulary of streaming generative models.
    **The Consequence:** They confuse these metrics with statistical measures like P50/P99 latency, causing miscommunication.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Streaming generation paradigm.
       - Total text output: 100 words.
       - Measured initial delay: 400ms. Measured subsequent generation: 100ms per word.
    2. **Calculations:**
       - Time to First Token (TTFT) = 400 ms.
       - Time Per Output Token (TPOT) = 100 ms.
       - Total latency = TTFT + (Tokens - 1) * TPOT = 400 ms + (99 * 100 ms) = 10,300 ms.
    3. **Conclusion & Interpretation:**
       - **Result: Distinct Bottleneck Profiles.** TTFT is prefill compute-bound; TPOT is decode memory bandwidth-bound. Conflating them into a single 'latency' metric obscures hardware bottlenecks and misdirects optimization efforts.
  options:
  - Initial Latency and Inference Speed
  - Cold Start and Warm Read
  - P50 Latency and P99 Latency
  - Time to First Token (TTFT) and Time Per Output Token (TPOT)
