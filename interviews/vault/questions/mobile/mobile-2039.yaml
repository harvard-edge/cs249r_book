title: 'Designing Mobile Federated Learning Checkpoints with Append Logs'
scenario: 'A federated learning client fine-tunes a 50M parameter model locally over hundreds of steps. The OS might kill the background task at any moment to reclaim memory.'
question: 'Design a low-overhead checkpointing strategy that minimizes flash storage wear while guaranteeing no more than 10 training steps are lost.'
details:
  realistic_solution: |
    The client must maintain the full FP16 weights in RAM and stream lightweight gradient deltas to an append-only NVMe log file. A full consolidated checkpoint is flushed to flash memory only once every 10 steps, massively reducing the Write Amplification Factor (WAF).
  common_mistake: |
    **The Pitfall:** Flushing the entire model state to flash storage at every training step.
    **The Rationale:** Blindly porting cloud-native checkpointing paradigms without accounting for mobile NAND flash wear endurance.
    **The Consequence:** Rapidly degrading the device's storage health and triggering OS-level thermal throttling due to massive I/O load.
  napkin_math: |
    **Assumptions & Constraints:**
    - 50M parameters in FP16 = 100 MB.
    - Gradient update per step = 1 MB.
    - Checkpoint frequency = 10 steps.

    **Calculations:**
    - Full write every step = 100 MB/step.
    - Append log = 1 MB/step.
    - Reduction = (100 - 1) / 100 = 99%.

    **Conclusion & Interpretation:**
    - **Result: I/O-Bound**. Append-logging achieves a 99% reduction in flash writes per step, preventing early NAND wear.
