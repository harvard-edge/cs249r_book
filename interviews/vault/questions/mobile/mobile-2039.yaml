title: Designing Mobile Federated Learning Checkpoints with Append Logs
scenario: A federated learning client on an iPhone fine-tunes a 50M parameter model locally over hundreds of steps. The OS might kill the background task at any moment to reclaim memory.
question: Design a low-overhead checkpointing strategy that minimizes flash storage wear while guaranteeing no more than 10 training steps are lost.
details:
  realistic_solution: |
    The model weights require ~100 MB (FP16). Writing 100 MB every step is too costly for flash wear. The client should keep the weights in RAM and only append the 1 MB gradient updates to an NVMe log file every step, writing a full checkpoint to flash only every 10 steps.
  common_mistake: |
    **The Pitfall:** Writing the entire 100 MB model to flash every 10 steps without logging gradients.
    **The Rationale:** Simplistic checkpointing logic imported from cloud environments.
    **The Consequence:** If killed at step 9, the client loses all progress, wasting compute and battery.
  napkin_math: |
    - **Full Checkpoint:** 100 MB (FP16).
    - **Log Update:** 1 MB gradient per step.
    - **Reduction:** 1 MB vs 100 MB = **99% reduction** in flash writes per step.
