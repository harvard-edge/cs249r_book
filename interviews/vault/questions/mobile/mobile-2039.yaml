title: Designing Mobile Federated Learning Checkpoints with Append Logs
scenario: A federated learning client on an iPhone fine-tunes a 50M parameter model
  locally over hundreds of steps. The OS might kill the background task at any moment
  to reclaim memory.
question: Design a low-overhead checkpointing strategy that minimizes flash storage
  wear while guaranteeing no more than 10 training steps are lost.
details:
  realistic_solution: The model weights require ~100 MB (FP16). Writing 100 MB every
    step is too costly for flash wear. The client should keep the weights in RAM and
    only append the 1 MB gradient updates to an NVMe log file every step, writing
    a full checkpoint to flash only every 10 steps.
  common_mistake: Choosing to write the entire model to flash every 10 steps without
    logging gradients, which risks losing 9 steps if killed.
  napkin_math: 100 MB vs 1 MB log = 99% reduction in writes
