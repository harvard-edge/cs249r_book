title: Calculate KV Cache Memory Footprint on Google Tensor G3
scenario: You are deploying a 3B parameter on-device LLM (similar to Gemini Nano) on a mobile device powered
  by the Google Tensor G3 processor. The device has 12 GB of LPDDR5X RAM, which is shared between the
  system, apps, and the TPU. Assuming the model has 32 layers, a hidden dimension of 2560, and uses FP16
  precision, calculate the exact memory required to store the KV cache for a single generation request
  reaching a sequence length of 2048 tokens.
details:
  realistic_solution: 'The candidate should apply the formula for KV cache memory: 2 (for K and V) × layers
    × hidden_dimension × sequence_length × bytes_per_parameter. This provides the exact byte count, which
    is crucial for determining if the model can safely run alongside the OS without triggering out-of-memory
    errors on the shared 12 GB LPDDR5X RAM.'
  common_mistake: Candidates often forget to multiply by 2 for both Key and Value tensors, or they use
    4 bytes per parameter instead of 2 bytes for FP16 precision. They might also incorrectly factor in
    the number of attention heads when the hidden dimension already accounts for the total size across
    all heads in standard Multi-Head Attention.
  napkin_math: KV Cache per token = 2 (K & V) * 32 (layers) * 2560 (hidden dim) * 2 bytes (FP16) = 327,680
    bytes per token. Total KV Cache for 2048 tokens = 327,680 bytes/token * 2048 tokens = 671,088,640
    bytes. This is exactly 640 MB (or ~671 MB in decimal). Out of the 12 GB LPDDR5X RAM on the Tensor
    G3, this leaves plenty of headroom for the 6GB weights and system memory.
