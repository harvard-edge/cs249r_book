title: The LPDDR5X Bandwidth Budget
scenario: Your team is shipping an on-device LLM feature on the iPhone 16 Pro, which has 8 GB LPDDR5X
  at 51.2 GB/s peak bandwidth. The model is a 4B parameter LLM quantized to INT4 (2 GB weights). During
  autoregressive decoding, every token requires loading all weights once. Is the memory bandwidth sufficient
  for real-time token generation at 30+ tokens/second? Show your math.
question: "Is the memory bandwidth sufficient for real-time token generation at 30+ tokens/second?"
details:
  realistic_solution: Autoregressive LLM decoding is almost entirely memory-bandwidth bound — each token
    requires reading all model weights once (the compute-to-byte ratio is ~1 op/byte for INT4 GEMV). The
    arithmetic is fast; the bottleneck is feeding data to the compute units.
  common_mistake: '"51.2 GB/s is plenty — 2 GB of weights at 51.2 GB/s means each token takes 39ms, so
    ~25 tokens/second. Close enough." This uses peak bandwidth, which is never achievable in practice.
    Real sustained bandwidth is 60-70% of peak due to refresh cycles, bank conflicts, and bus contention
    from the OS, display controller, and ISP sharing the same memory bus.'
  napkin_math: 'Peak BW: 51.2 GB/s. Sustained: ~28 GB/s (after OS/display contention). Weight load per
    token: 2 GB (INT4, 4B params). Time per token: 2 / 28 = 71ms → **14 tok/s**. With speculative decoding
    (4× acceptance): 14 × 4 = **~40 tok/s** (after ~30% rejection). With 3B model: 1.5 / 28 = 54ms → 18.5
    tok/s base → **~55 tok/s** speculative. The bandwidth wall, not compute, determines on-device LLM
    speed.'
