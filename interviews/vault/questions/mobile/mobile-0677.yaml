title: The LPDDR5X Bandwidth Budget
scenario: Your team is shipping an on-device LLM feature on the iPhone 16 Pro, which has 8 GB LPDDR5X at 51.2 GB/s peak bandwidth. The model is a 4B parameter LLM quantized to INT4 (2 GB weights). During autoregressive decoding, every token requires loading all weights once.
question: Is the memory bandwidth sufficient for real-time token generation at 30+ tokens/second?
details:
  realistic_solution: Autoregressive LLM decoding is almost entirely memory-bandwidth bound — each token requires reading all model weights once (the compute-to-byte ratio is ~1 op/byte for INT4 GEMV). The arithmetic is fast; the bottleneck is feeding data to the compute units.
  common_mistake: |
    **The Pitfall:** Using peak theoretical memory bandwidth instead of sustained bandwidth.
    **The Rationale:** Candidates divide by the spec sheet's 51.2 GB/s and calculate ~25 tokens/second.
    **The Consequence:** They ignore refresh cycles, bank conflicts, and OS/display controller bus contention, drastically overestimating real-world token generation speed.
  napkin_math: |
    - Peak Bandwidth: 51.2 GB/s.
    - Sustained Bandwidth (accounting for OS contention): ~28 GB/s.
    - INT4 Weight Footprint (4B params): 2 GB.
    - Time per token: 2 GB / 28 GB/s = 71 ms.
    - **Base generation speed:** 1 / 0.071 = **~14 tokens/sec**.
    - Bandwidth is NOT sufficient for 30+ tokens/sec without speculative decoding.
