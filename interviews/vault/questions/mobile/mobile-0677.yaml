title: The LPDDR5X Bandwidth Budget
scenario: Your team is shipping an on-device LLM feature on a flagship phone equipped with LPDDR5X at 51.2 GB/s peak bandwidth. The model is a 4B parameter LLM quantized to INT4 (2 GB weights).
question: Is the memory bandwidth sufficient for real-time token generation at 30+ tokens/second?
details:
  realistic_solution: Autoregressive decoding dictates that every token generation evaluates the entire 2 GB weight matrix exactly once. Saturated LPDDR5X sustains roughly 28 GB/s after accounting for OS kernel contention and refresh cycles. This hardware physics reality caps throughput at ~14 tokens/second. The only viable pathway to reach 30+ tokens/sec is integrating Speculative Decoding to evaluate multiple tokens per memory load.
  common_mistake: |
    **The Pitfall:** Using peak theoretical memory bandwidth instead of sustained bandwidth.
    **The Rationale:** Candidates divide by the spec sheet's 51.2 GB/s and calculate ~25 tokens/second.
    **The Consequence:** They ignore refresh cycles, bank conflicts, and OS/display controller bus contention, drastically overestimating real-world token generation speed.
  napkin_math: |
    **Assumptions & Constraints:**
    - Sustained Bandwidth: ~28 GB/s.
    - INT4 Weight Footprint (4B params): 2 GB.

    **Calculations:**
    - Time per token: 2 GB / 28 GB/s ≈ 0.071 ms (71 ms).
    - Base generation speed: 1 / 0.071 = 14 tokens/sec.

    **Conclusion & Interpretation:**
    - **Result: 14 tokens/sec (Memory-Bandwidth-Bound)**. The generation phase is heavily memory-bandwidth-bound, failing the 30+ goal.
