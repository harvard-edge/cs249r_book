title: Mobile Parallel Client Selection
scenario: A mobile FL round needs 20,000 successful client updates. Historical telemetry shows 40% of selected clients start training, and 75% of starters finish before the deadline.
question: How many mobile clients must be invited to obtain 20,000 completed FL updates if 40% start and 75% of starters finish?
details:
  realistic_solution: To get 20,000 completed updates, you must calculate the total completion probability and divide the required updates by that probability.
  common_mistake: |
    **The Pitfall:** Inviting 20,000 clients and forgetting start and completion dropout.
    **The Rationale:** Treating mobile devices like reliable cloud nodes.
    **The Consequence:** The FL round fails to meet the minimum update threshold and is discarded.
  napkin_math: |
    - Start rate: 40% (0.40)
    - Completion rate of starters: 75% (0.75)
    - Total completion probability: 0.40 * 0.75 = 0.30 (30%)
    - Required invites: 20,000 / 0.30 = 66,666.6
    - **Approximately 66,667 clients must be invited to ensure 20,000 completions.**
