title: The Automotive Co-Pilot Conundrum
scenario: You are the new tech lead for the 'AI Co-Pilot' in our flagship EV. The goal is a low-latency, on-device conversational assistant. The product team is adamant about using a powerful, open-source 7B parameter LLM for its reasoning capabilities. Your hardware target is the vehicle's primary Snapdragon 8 Gen 3 SoC, and you have a strict 10W power budget and a 2GB memory budget for the entire AI service. Users expect an 'instant' experience, which product has defined as a Time-To-First-Token (TTFT) of less than 200ms. A 7B model is obviously not feasible out-of-the-box.
question: "What are the three main pillars of your technical plan to bridge this gap, how do they interact, and what are the expected quantitative gains from each?"
details:
  realistic_solution: A Staff-level answer proposes a holistic, multi-stage strategy that acknowledges
    the problem requires orders-of-magnitude improvement.
  common_mistake: |
    **The Pitfall:** Listing disconnected, individual optimization techniques.
    **The Rationale:** Candidates suggest point solutions like "we'll use INT8" without grasping the scale of the problem (a 7B model fundamentally cannot run on 2GB RAM).
    **The Consequence:** Failing to realize that simple quantization or pruning alone cannot solve token-by-token generation latency or KV cache bottlenecks.
  napkin_math: |
    - Baseline (7B LLM @ FP16): 7B params × 2 bytes/param = 14 GB.
    - Memory Budget: 2 GB.
    - **Conclusion: HARD FAIL.** Quantization alone (e.g., INT4 = 3.5 GB) still breaches the budget; a complete architectural overhaul (distillation, offloading) is required.
