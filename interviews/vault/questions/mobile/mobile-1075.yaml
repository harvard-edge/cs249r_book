title: KV-Cache Impact on Mobile Thermal Throttling
scenario: Your on-device 3B LLM generates the first 200 tokens at 15 tokens/sec on
  A17 Pro, but by token 800, speed drops to 6 tokens/sec. The device feels warm. Your
  colleague blames thermal throttling. You suspect KV-cache growth also contributes.
  Diagnose the relative contributions.
question: How much of a 3B LLM slowdown from 15 tok/s at token 200 to 6 tok/s at token
  800 is KV growth versus heat?
details:
  realistic_solution: 'Two compounding effects: (1) KV-cache growth: At token 200,
    attention loads 200 × 32 KB = 6.4 MB of KV per decode step. At token 800: 800
    × 32 KB = 25.6 MB. The memory bandwidth for KV alone increased 4× while the model
    weight loading (1.5 GB for INT4 3B model) stays constant. Total bandwidth: token
    200 = 1.5 GB + 6.4 MB ≈ 1.51 GB. Token 800 = 1.5 GB + 25.6 MB ≈ 1.53 GB. KV growth
    adds only 1.3% more bandwidth — negligible for a 3B model. (2) Thermal throttling:
    A17 Pro sustained memory BW drops from ~100 GB/s burst to ~60 GB/s under thermal
    load. Decode time at token 200: 1.51 GB / 100 GB/s = 15.1 ms → 66 tok/s (but limited
    by other factors to 15 tok/s). At token 800 with throttling: 1.53 GB / 60 GB/s
    = 25.5 ms → ~39 tok/s (limited to 6 tok/s by NPU throttling + scheduling overhead).
    Diagnosis: thermal throttling is the dominant factor (40% bandwidth reduction)
    for this small model. KV-cache growth would dominate for larger models (70B+)
    or longer contexts (>16K tokens) where KV bandwidth becomes comparable to weight
    bandwidth.'
  common_mistake: Attributing the entire slowdown to thermal throttling. On mobile,
    growing KV-cache linearly increases the memory bandwidth required per decode step,
    which compounds with thermal throttling for a double penalty.
  napkin_math: 'KV at 200 tokens: 6.4 MB (0.4% of weight load). KV at 800: 25.6 MB
    (1.7%). Thermal: 100 GB/s → 60 GB/s (40% reduction). Speed drop: 15 → 6 tok/s
    (60% reduction). KV growth contribution: ~2%. Thermal contribution: ~98% of the
    slowdown for this 3B model.'
