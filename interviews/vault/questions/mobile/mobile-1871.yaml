title: Federated Learning Update Window
scenario: A mobile application running on a Snapdragon 8 Gen 3 performs federated
  learning, needing to push 10 MB of updated weights. The device is on a patchy 4G
  connection averaging 2 Mbps, and the OS allows maximum background network tasks
  of 30 seconds.
question: Analyze whether the weight update can complete within the OS background
  window without further compression.
visual:
  kind: svg
  path: mobile-1871.svg
  alt: Node diagram showing mobile app attempting to push 10 MB through a 2 Mbps 4G
    pipe to a cloud aggregator.
  caption: Federated Update Transmission
details:
  realistic_solution: 'First, convert the 10 MB payload to bits: 10 Megabytes = 80
    Megabits. At an average upload speed of 2 Mbps, transmitting 80 Mb takes exactly
    40 seconds. Since the OS terminates background tasks after 30 seconds, the uncompressed
    update will consistently fail. The weights must be quantized or sparsified to
    at least 7.5 MB (60 Mb).'
  common_mistake: Confusing Megabytes (MB) with Megabits (Mb) and calculating 10 /
    2 = 5 seconds.
  napkin_math: 10 MB * 8 bits/byte = 80 Mb; 80 Mb / 2 Mbps = 40 seconds > 30s limit.
