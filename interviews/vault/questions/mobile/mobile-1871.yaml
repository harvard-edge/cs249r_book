title: Federated Learning Update Window
scenario: A mobile application running on a Snapdragon 8 Gen 3 performs federated learning, needing to push 10 MB of updated weights. The device is on a patchy 4G connection averaging 2 Mbps, and the OS allows maximum background network tasks of 30 seconds.
question: Can the weight update complete within the OS background window without further compression?
visual:
  kind: svg
  path: mobile-1871.svg
  alt: Node diagram showing mobile app attempting to push 10 MB through a 2 Mbps 4G pipe to a cloud aggregator.
  caption: Federated Update Transmission
details:
  realistic_solution: 'Perform a strict bit-to-byte dimensional analysis against the OS scheduler timeout. Convert the payload to bits, calculate transmission latency against the 2 Mbps link, and prove it exceeds the 30-second background daemon limits. Mandate model sparsification or quantization to compress the payload below the 60 Mb threshold.'
  common_mistake: |
    **The Pitfall:** Calculating a 5-second transfer time.
    **The Rationale:** Confusing Megabytes (MB) with Megabits (Mbps) and directly dividing 10 by 2.
    **The Consequence:** Designing a federated learning pipeline that constantly times out and fails to push updates.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Payload size: 10 MB.
       - Network speed: 2 Mbps.
       - OS Limit: 30 seconds.
    2. **Calculations:**
       - Convert to Megabits: 10 MB = 80 Megabits (Mb).
       - Transfer time: 80 Mb / 2 Mbps = 40 seconds.
    3. **Conclusion & Interpretation:**
       - **Result: Network-Bound.** 40 seconds > 30s limit; the update will consistently fail without at least 25% compression.
