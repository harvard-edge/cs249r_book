title: Background Inference Limits
scenario: You are designing an iOS app that runs an LLM to summarize incoming audio while the app is in
  the background (user is looking at the home screen). What is the primary risk of running heavy ML inference
  in the background?
details:
  realistic_solution: 'The iOS Watchdog Timer. iOS aggressively monitors background apps for memory and
    CPU usage. Background execution limits: 30 seconds for most tasks, 3 minutes for audio processing
    (with Background Modes entitlement). A 7B LLM at INT4 = 3.5 GB weights + 0.5 GB KV-cache = 4 GB. iPhone
    16 Pro has 8 GB total, ~5 GB available. In foreground: 4 GB fits. In background: iOS reclaims memory
    aggressively. Any app using >50% of physical RAM gets jetsammed (killed) within seconds. Even with
    smaller models (1B = 500 MB INT4), sustained CPU/GPU usage >80% for >30 seconds in background triggers
    the watchdog. Solutions: (1) pause inference when backgrounded and resume in foreground, (2) use background
    audio session for short summarization bursts (<10s), (3) offload to a local server process via network
    extension (exempt from watchdog), (4) use on-device APIs (Apple Intelligence) that run in a system
    process exempt from app limits.'
  common_mistake: Worrying about the network connection dropping or the UI freezing.
  napkin_math: '- On-device LLM inference draws ~3W sustained on an A17 Pro SoC | - Battery capacity:
    4,000 mAh x 3.7V = **14.8 Wh** | - Drain rate at 3W: 811 mA = **20% of battery per hour** | - iOS
    grants background tasks only ~30 seconds of execution time | - => At 3W for 30s the model consumes
    0.025 Wh per cycle, but the watchdog kills any process sustaining >80% CPU utilization beyond ~180s
    — the thermal and power budget makes continuous background LLM inference physically impossible'
  options:
  - The model will automatically downgrade to 1-bit quantization.
  - The OS watchdog will forcefully terminate the app process to save battery and RAM.
  - The user's screen will freeze until the background task completes.
  - The App Store will reject the app during the review process.
  correct_index: 1
