title: Background Inference Limits
scenario: You are designing an iOS app that runs an LLM to summarize incoming audio while the app is in the background (user is looking at the home screen).
question: What is the primary risk of running heavy ML inference in the background on iOS?
details:
  realistic_solution: 'The iOS Watchdog Timer. iOS aggressively monitors background apps for memory and CPU usage. Background execution limits: 30 seconds for most tasks, 3 minutes for audio processing (with Background Modes entitlement). A 7B LLM at INT4 = 3.5 GB weights + 0.5 GB KV-cache = 4 GB. iPhone 16 Pro has 8 GB total, ~5 GB available. In foreground: 4 GB fits. In background: iOS reclaims memory aggressively. Any app using >50% of physical RAM gets jetsammed (killed) within seconds. Even with smaller models (1B = 500 MB INT4), sustained CPU/GPU usage >80% for >30 seconds in background triggers the watchdog. Solutions: (1) pause inference when backgrounded and resume in foreground, (2) use background audio session for short summarization bursts (<10s), (3) offload to a local server process via network extension (exempt from watchdog), (4) use on-device APIs (Apple Intelligence) that run in a system process exempt from app limits.'
  common_mistake: |
    **The Pitfall:** Ignoring the OS-level watchdog timer and assuming cloud-like persistent execution.
    **The Rationale:** Engineers assume that if a device has the compute capability and RAM, a background process can run indefinitely.
    **The Consequence:** The OS forcefully terminates (jetsams) the application mid-inference, breaking the feature and degrading the user experience.
  napkin_math: |
    **Assumptions & Constraints:**
    - Power Draw: On-device LLM inference draws ~3W sustained.
    - Battery Capacity: 4,000 mAh * 3.7V = 14.8 Wh.

    **Calculations:**
    - Drain Rate: 3W = ~20% of battery capacity drained per hour.
    - Execution Limit: The OS watchdog aggressively kills any process sustaining >80% CPU/GPU utilization beyond ~30-180 seconds.

    **Conclusion & Interpretation:**
    - **Result: ~30-180 seconds execution limit (Power-Bound)**. Continuous background execution is structurally blocked by the OS to prevent rapid thermal throttling and battery death.
  options:
  - The model will automatically downgrade to 1-bit quantization.
  - The OS watchdog will forcefully terminate the app process to save battery and RAM.
  - The user's screen will freeze until the background task completes.
  - The App Store will reject the app during the review process.
