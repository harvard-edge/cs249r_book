title: NPU Batching Jitter
scenario: Real-time audio translation on a Snapdragon 8 Gen 3 Hexagon NPU exhibits
  high jitter. The NPU processes audio chunks faster than they arrive, but wait times
  fluctuate.
question: How does enforcing a fixed batch size constraint on the NPU queue exacerbate
  tail latency (jitter) for streaming real-time audio?
details:
  realistic_solution: Waiting to form a fixed batch means the first frame in the queue
    must wait for the subsequent frames to arrive before processing begins, adding
    artificial delay. This maximizes throughput but creates high, variable wait times
    for early-arriving packets.
  common_mistake: Assuming higher throughput automatically translates to lower latency
    for streaming workloads.
  napkin_math: T_wait = (Batch - 1) × T_arrival
