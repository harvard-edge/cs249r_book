title: NPU Batching Jitter
scenario: Real-time audio translation on a Snapdragon 8 Gen 3 Hexagon NPU exhibits high jitter. The NPU processes audio chunks faster than they arrive, but wait times fluctuate heavily due to batching logic.
question: How does enforcing a fixed batch size constraint on the NPU queue exacerbate tail latency (jitter) for streaming real-time audio?
details:
  realistic_solution: Waiting to form a fixed batch means the first frame in the queue must wait for the subsequent frames to arrive before processing begins, adding artificial delay. This maximizes throughput but creates high, variable wait times for early-arriving packets.
  common_mistake: |
    **The Pitfall:** Assuming higher throughput automatically translates to lower latency for streaming workloads.
    **The Rationale:** Optimizing for large batch sizes maximizes NPU utilization but ruins real-time responsiveness.
    **The Consequence:** High, variable wait times (jitter) that make real-time audio translation unusable.
  napkin_math: |
    **Assumptions & Constraints:**
    - Fixed batch size (B) streaming queue.
    - Constant arrival interval (T_arrival).

    **Calculations:**
    - The first chunk waits for (B-1) subsequent chunks to fill the batch.
    - Max queuing delay (T_wait) = (B - 1) * T_arrival.

    **Conclusion & Interpretation:**
    - **Result: (B-1)*T_arrival (Latency-Bound)**. Enforcing fixed batches artificially inflates tail latency.
