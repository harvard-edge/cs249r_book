title: Functional Safety for Autonomous Driving on Exynos 2400
scenario: You are designing an AI-powered autonomous driving system for a next-generation vehicle, where the core perception and decision-making ML models are deployed on the Samsung Exynos 2400 NPU (34.7 TOPS, 12 GB LPDDR5X). This system must meet ISO 26262 ASIL D requirements.
question: How would you implement self-tests and watchdog timers for ASIL D autonomous driving workloads on the Exynos 2400 NPU?
details:
  realistic_solution: 'Implement a multi-layered approach: (1) Periodic in-situ self-tests (e.g., checksums, pattern inference checks) for NPU memory and processing units, triggered by a safety supervisor. (2) A hardware watchdog timer with a refresh mechanism from a separate, highly deterministic safety micro-controller, monitoring the NPU''s critical task execution. (3) Employ deterministic execution patterns for safety-critical ML sub-graphs, potentially leveraging fixed-point quantization and pre-allocated memory regions on the 12 GB LPDDR5X to minimize non-determinism and optimize latency, with specific memory partitions dedicated to safety integrity level (SIL) tasks.'
  common_mistake: |
    **The Pitfall:** Relying solely on software-based error detection.
    **The Rationale:** Candidates overlook the non-deterministic nature of some ML operations and fail to propose hardware-level safety mechanisms.
    **The Consequence:** This leads to unpredictable latency spikes or undetected silent data corruption, violating ASIL D's fault tolerance requirements.
  napkin_math: |
    - **Total Latency Budget:** 30ms maximum allowable latency per frame.
    - **Inference Time:** 20ms average inference time on the NPU.
    - **Transfer Overhead:** 5ms for data transfer.
    - **Final Result:** **30ms - 20ms - 5ms = 5ms remaining budget per frame for safety checks.**
