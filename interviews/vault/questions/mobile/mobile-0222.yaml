title: The Runaway Inference Battery Drain
scenario: You're an engineer on a mobile app team shipping a new on-device visual search feature. During QA, you find that rare, high-resolution user images can cause inference to 'run away,' consuming maximum SoC resources for a full minute before the OS terminates the process. The lead engineer asks you to quantify the impact of this event to justify adding a watchdog timer.
question: How would you calculate the approximate battery energy consumed by a single runaway inference that lasts for 60 seconds?
details:
  realistic_solution: A runaway inference will push the mobile SoC to its maximum active power consumption. Based on the hardware constants, this is around 5W for a heavy ML task. To find the total energy consumed, we must multiply this power rate by the duration of the event in hours.
  common_mistake: |
    **The Pitfall:** Confusing Power (Watts) with Energy (Watt-hours).
    **The Rationale:** Engineers often calculate Joules correctly but fail to convert to standard battery Watt-hours, underestimating the impact.
    **The Consequence:** The team deprioritizes fixing the bug, leading to massive battery drain for affected users.
  napkin_math: |
    *   **Peak SoC Power:** `5W`
    *   **Energy in Joules:** `5W * 60 seconds = 300 Joules`
    *   **Convert to Watt-hours:** `300 Joules / 3600 (Joules/Wh) = 0.0833 Wh`
    *   **Result:** **~0.083 Wh is drained per runaway event.**
  options:
  - 5 W. The process runs at a rate of 5 Watts.
  - 300 Wh. This would drain the entire battery multiple times over.
  - ≈ 0.083 Wh. This is a significant battery drain for a single failed operation.
  - ≈ 0.0014 Wh. The energy impact is negligible.
  correct_index: 2
