title: The Runaway Inference Battery Drain
scenario: 'You''re an engineer on a mobile app team shipping a new on-device visual search feature. During QA, you find that rare, high-resolution user images can cause inference to runaway, consuming maximum SoC resources for a full minute before the OS terminates the process. The lead engineer asks you to quantify the impact of this event to justify adding a watchdog timer.'
question: 'How would you calculate the approximate battery energy consumed by a single runaway inference that lasts for 60 seconds?'
details:
  realistic_solution: 'Calculate the total energy consumed in Watt-hours by multiplying the SoC peak active power by the duration. Using a hardware-backed watchdog timer and an optimized Core ML pipeline will prevent indefinite stalls.'
  common_mistake: |
    **The Pitfall:** Confusing Power (Watts) with Energy (Watt-hours).
    **The Rationale:** Engineers often calculate Joules correctly but fail to convert to standard battery Watt-hours, underestimating the impact.
    **The Consequence:** The team deprioritizes fixing the bug, leading to massive battery drain for affected users.
  napkin_math: |
    1. **Assumptions & Constraints:**
       * Peak SoC Power: 5W.
       * Duration: 60 seconds.
    2. **Calculations:**
       * Energy in Joules: 5W * 60s = 300 Joules.
       * Energy in Watt-hours: 300 Joules / 3600 (J/Wh) = 0.0833 Wh.
    3. **Conclusion & Interpretation:**
       * **Result: Power-Bound.** ~0.083 Wh is drained per runaway event.
  options:
  - '300 Wh. (Calculated Joules but used Wh unit)'
  - '5 Wh. (Used Watt rating directly as Wh)'
  - '≈ 0.083 Wh. This is a significant battery drain for a single failed operation'
  - '8.3 Wh. (Forgot to divide by full 3600)'
  correct_index: 2
