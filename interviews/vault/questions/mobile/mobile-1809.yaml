title: Metal Performance Shaders Graph for On-Device Model Compilation on iOS
scenario: Apple's MPSGraph provides a GPU compute graph API that can target both Apple GPU and ANE. You consider using MPSGraph directly instead of CoreML for a custom diffusion model on A17 Pro.
question: Should an A17 Pro diffusion model use CoreML or MPSGraph when attention-heavy layers limit ANE support?
details:
  realistic_solution: 'MPSGraph vs CoreML tradeoffs: (1) CoreML: automatic ANE/GPU/CPU dispatch, model caching, and iOS optimizations (thermal throttling adaptation). Best for standard architectures. But ANE has operator restrictions (no dynamic shapes, limited attention support). (2) MPSGraph: full GPU control, supports dynamic shapes, custom operator fusion. But no ANE access — GPU-only, which uses more power and generates more heat. For a diffusion model (UNet with attention), CoreML''s ANE can handle the convolutions but attention runs on GPU anyway. MPSGraph eliminates the ANE<->GPU transition overhead. Recommendation: MPSGraph for diffusion models (attention-heavy), CoreML for CNNs (convolution-heavy).'
  common_mistake: |
    **The Pitfall:** Treating MPSGraph as a portable, cross-platform alternative to CoreML.
    **The Rationale:** Developers confuse graph APIs with universal runtimes (like ONNX or TFLite).
    **The Consequence:** They write Apple-specific MPSGraph code expecting it to run on Android, or they needlessly bypass the ANE for standard convolution-heavy models.
  napkin_math: |
    1. Stable Diffusion UNet step on A17 Pro: ~10 GFLOPS.
    2. CoreML (ANE+GPU): ~45ms per step (includes ~8ms transition overhead).
    3. MPSGraph (GPU-only): ~38ms per step (no transition overhead).
    4. Total for 20 steps: CoreML = 900ms, MPSGraph = 760ms.
    5. **Conclusion: MPSGraph is 15% faster for attention-heavy models by avoiding ANE<->GPU transitions.**
