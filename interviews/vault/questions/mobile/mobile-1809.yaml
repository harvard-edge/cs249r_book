title: Metal Performance Shaders Graph for On-Device Model Compilation on iOS
scenario: Apple's MPSGraph provides a GPU compute graph API that can target both Apple GPU and ANE. You consider using MPSGraph directly instead of CoreML for a custom diffusion model.
question: Should an A17 Pro diffusion model use CoreML or MPSGraph when attention-heavy layers limit ANE support?
details:
  realistic_solution: 'MPSGraph vs CoreML tradeoffs: (1) CoreML: automatic dispatch, model caching, and iOS optimizations. Best for standard architectures. But ANE has operator restrictions. (2) MPSGraph: full GPU control, supports dynamic shapes. But no ANE access. For a diffusion model (UNet with attention), CoreML''s ANE can handle convolutions but attention runs on GPU anyway. MPSGraph eliminates the ANE<->GPU transition overhead. Recommendation: MPSGraph for diffusion models, CoreML for CNNs.'
  common_mistake: |
    **The Pitfall:** Treating MPSGraph as a portable, cross-platform alternative to CoreML.
    **The Rationale:** Developers confuse graph APIs with universal runtimes (like ONNX or TFLite).
    **The Consequence:** They write Apple-specific MPSGraph code expecting it to run on Android, or they needlessly bypass the ANE for standard convolution-heavy models.
  napkin_math: |
    1. Assumptions & Constraints:
       - Stable Diffusion UNet step: ~10 GFLOPS.
       - CoreML (ANE+GPU) step: 45ms (includes 8ms transition overhead).
       - MPSGraph (GPU-only) step: 38ms.
    2. Calculations:
       - Total for 20 steps (CoreML): 20 * 45ms = 900ms.
       - Total for 20 steps (MPSGraph): 20 * 38ms = 760ms.
    3. Conclusion & Interpretation:
       - **Result: MPSGraph is 15% faster for attention-heavy models by avoiding ANE-GPU transitions (Latency-Bound).**
