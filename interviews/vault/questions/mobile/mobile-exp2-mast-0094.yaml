title: Exynos 2400 NPU Video Enhancement CNN Architecture
scenario: You are designing a real-time video enhancement CNN running on the Samsung Exynos 2400 NPU to
  process 4K 60fps video directly from the ISP. The NPU provides 34.7 TOPS across its dual cores and shares
  12 GB of LPDDR5X memory with the CPU, GPU, and ISP. Design a custom CNN architecture that maximizes
  utilization of the NPU's compute without bottlenecking the shared LPDDR5X memory during high-bandwidth
  concurrent ISP operations.
question: "How would you design a custom CNN architecture that maximizes utilization of the NPU's compute without bottlenecking the shared LPDDR5X memory during high-bandwidth concurrent ISP operations?"
details:
  realistic_solution: Design a custom architecture that relies on fused MBConv blocks or standard convolutions
    with optimized channel counts to increase arithmetic intensity, minimizing main memory trips. The
    architecture should explicitly partition tasks across the dual-core NPU while relying heavily on local
    SRAM to fuse layers and buffer intermediate activations, ensuring the shared 12 GB LPDDR5X bandwidth
    is preserved for the concurrent ISP and GPU workloads.
  common_mistake: Candidates often rely on standard inverted residual blocks (like MobileNet) which heavily
    use depthwise convolutions. They fail to realize that depthwise convolutions have poor arithmetic
    intensity and will severely bottleneck on the shared LPDDR5X memory when the ISP is also saturating
    the bus.
  napkin_math: 4K at 60fps = 3840 * 2160 * 60 = ~500M pixels/sec. Compute budget per pixel = 34.7 TOPS
    / 500M = ~69,400 OPs (or ~34,700 MACs) per pixel. A typical 3x3 depthwise convolution has an arithmetic
    intensity of ~9 MACs/byte. Saturating the 34.7 TOPS with depthwise convolutions would require (17.35e12
    MACs / 9) = ~1.9 TB/s of bandwidth, vastly exceeding LPDDR5X limits (typically ~50-60 GB/s total).
    We must design fused layers with an arithmetic intensity of >500 MACs/byte to keep NPU memory bandwidth
    under ~34 GB/s, leaving enough shared memory headroom for the ISP.
