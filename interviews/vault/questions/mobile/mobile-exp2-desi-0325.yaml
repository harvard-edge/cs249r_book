title: On-Device CI/CD for Video Super-Resolution
scenario: You are architecting the CI/CD pipeline and model registry for an on-device real-time video
  super-resolution feature targeting the Samsung Exynos 2400 NPU. The NPU provides 34.7 TOPS and shares
  a 12 GB LPDDR5X memory pool with the CPU, GPU, and ISP. Multiple teams are continuously training new
  model variants, but you must ensure that only models meeting strict hardware constraints are promoted.
  Design the end-to-end MLOps lifecycle to automate the compilation, hardware-in-the-loop profiling, and
  deployment of these models.
question: "How would you design the end-to-end MLOps lifecycle to automate the compilation, hardware-in-the-loop profiling, and deployment of these models?"
details:
  realistic_solution: A robust L5 design integrates Hardware-in-the-Loop (HITL) testing directly into
    the CI/CD pipeline using a farm of Exynos 2400 devices. The model registry tracks compiled model binaries,
    quantization schemes, and on-device profiling metrics alongside standard accuracy. The CI pipeline
    compiles the model, deploys it to the device farm, and evaluates latency and memory bandwidth usage
    while simulating concurrent ISP/GPU background workloads before allowing promotion.
  common_mistake: Candidates often design cloud-centric MLOps pipelines relying on generic latency proxies
    (like MACs/FLOPs) instead of real hardware profiling. They frequently ignore the shared nature of
    the 12 GB LPDDR5X memory, failing to test models under realistic bandwidth contention with the ISP
    and GPU.
  napkin_math: Assuming a 60 FPS video pipeline, the system processes 60 frames/sec. With 12 GB of shared
    LPDDR5X memory (approx 68.2 GB/s theoretical bandwidth), if the ISP/GPU consume 40 GB/s for camera
    and display, the NPU has ~28 GB/s available. To utilize the NPU's full 34.7 TOPS, a model needs an
    arithmetic intensity of (34.7 * 10^12 OPs) / (28 * 10^9 bytes) = ~1239 OPs/byte. The CI/CD pipeline
    must automatically calculate this and reject models with lower arithmetic intensity as they will be
    memory-bound.
