title: Explaining Model Routing Tradeoffs in Compound AI to a Product Manager
scenario: A product manager on an app powered by a Snapdragon 8 Gen 3 (45 TOPS, 16GB) asks: 'Why can't we just always use the best, most powerful model for every request? Using different models for different query types sounds unnecessarily complex.'
question: "Why can't we just always use the best, most powerful model for every request on a mobile device?"
details:
  realistic_solution: 'Concrete tradeoffs: (1) Battery: 3B LLM at 12W for 200ms/query
    = 2.4J. At 100 queries/day: 240J = 0.067Wh = 0.45% battery. Sounds small, but
    heavy users do 500 queries/day: 1200J = 2.25% battery. Simple queries (spell check,
    autocomplete) via 125M model at 3W * 15ms = 0.045J — 53x cheaper. (2) Latency:
    3B model: 200ms. 125M model: 15ms. Users perceive < 100ms as instant. Routing
    60% of queries to fast model: average latency = 0.6*15 + 0.4*200 = 89ms — under
    instant threshold. Always 3B: 200ms. (3) Thermal: sustained 3B usage triggers
    throttle in 90s. Routing buys 2.25x more sustained throughput.'
  common_mistake: |
    **The Pitfall:** Explaining routing purely in abstract quality terms.
    **The Rationale:** Candidates state "bigger models are slower" without providing concrete latency, battery, and thermal numbers.
    **The Consequence:** Failing to give product managers the tangible data they need to make informed UX and feature tradeoff decisions.
  napkin_math: |
    - 3B INT4 Model: 200ms/query, 12W active.
    - 125M INT8 Model: 15ms/query, 3W active.
    - Latency (Routing 60% to fast model): 0.6 × 15ms + 0.4 × 200ms = **89ms** (Under 100ms instant threshold) vs 200ms.
    - Energy per query (Always 3B): 12W × 0.2s = 2.4 Joules.
    - Energy per query (Routed): 0.6 × (3W × 0.015s) + 0.4 × (12W × 0.2s) = 0.027 + 0.96 = 0.987 Joules (59% energy savings).
    - Battery impact (500 queries/day): Always 3B uses 1200J (0.333 Wh), Routed uses ~493J (0.137 Wh). Saving ~1.3% of total device battery.
