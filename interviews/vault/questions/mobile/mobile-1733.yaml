title: 'Real-Time Sensor Fusion on Exynos 2400: Edge vs. Hybrid Processing Architectures'
scenario: 'Your team is developing a mobile fitness tracking application that requires real-time analysis of sensor data to detect complex exercise movements and provide immediate feedback. Two architectural approaches are being considered: pure edge processing or hybrid edge-cloud processing.'
question: How would you compare pure edge and hybrid edge-cloud sensor processing for a fitness app?
details:
  realistic_solution: A hybrid architecture is optimal. The edge NPU performs low-latency initial feature extraction and gesture detection. A heavily compressed latent representation is transmitted to the cloud for complex temporal analysis. This leverages local LPDDR5X bandwidth for burst sensor data while bypassing massive network transmission overhead and minimizing radio power states.
  common_mistake: |
    **The Pitfall:** Underestimating network latency and bandwidth costs.
    **The Rationale:** Candidates often assume cloud offloading is universally better for complex tasks, ignoring the network overhead for high-frequency sensor streams.
    **The Consequence:** The resulting hybrid architecture suffers from unacceptable lag for real-time feedback and excessively drains the battery via constant cellular radio use.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Raw Sensor Bandwidth: 10 channels * 2 bytes * 100 Hz = 2 KB/sec (~7.2 MB/hour).
       - Extracted Features Bandwidth: ~0.2 KB/sec (~0.7 MB/hour).
       - Edge Inference Latency: 10 GOPS / 34.7 TOPS ≈ 0.28 ms.
    2. **Calculations:**
       - Transmission reduction: 7.2 MB / 0.7 MB ≈ 10.2x reduction in data volume.
    3. **Conclusion & Interpretation:**
       - **Result: ~10x bandwidth reduction.** The system is **Network-Bound** for raw data; edge preprocessing mitigates this.
