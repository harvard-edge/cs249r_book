title: 'Real-Time Sensor Fusion on Exynos 2400: Edge vs. Hybrid Processing Architectures'
scenario: 'Your team is developing a new mobile fitness tracking application that requires real-time analysis of sensor data (accelerometer, gyroscope, heart rate, and ambient light) to detect complex exercise movements and provide immediate feedback. The application will run on devices powered by the Samsung Exynos 2400 NPU (34.7 TOPS, 12 GB LPDDR5X memory). You need to design the data ingestion and processing pipeline. Two architectural approaches are being considered:


  1.  **Pure Edge Processing:** All sensor data is processed and ML inference for movement classification is performed entirely on the device using the Exynos 2400 NPU''s capabilities, leveraging its 34.7 TOPS for high-speed inference and 12 GB LPDDR5X for model and data caching.

  2.  **Hybrid Edge-Cloud Processing:** Initial feature extraction and anomaly detection are performed on the device using the Exynos 2400 NPU. However, a compressed stream of extracted features (not raw data) is then sent to a cloud backend for final, more complex model inference and long-term activity pattern analysis.'
question: How would you compare pure edge and hybrid edge-cloud sensor processing for a fitness app on Exynos 2400?
details:
  realistic_solution: A hybrid approach often balances the benefits, performing critical low-latency tasks on the edge (e.g., initial gesture detection, data filtering using the 34.7 TOPS of the Exynos NPU) and offloading less time-sensitive, complex, or storage-intensive tasks to the cloud. This optimizes power, latency, and privacy while maintaining advanced capabilities. Effective use of the 12 GB LPDDR5X memory allows for larger on-device models or extensive buffering if connectivity is intermittent, ensuring the NPU is well-fed.
  common_mistake: |
    **The Pitfall:** Underestimating network latency and bandwidth costs.
    **The Rationale:** Candidates often assume cloud offloading is universally better for complex tasks, ignoring the network overhead for high-frequency sensor streams.
    **The Consequence:** The resulting hybrid architecture suffers from unacceptable lag for real-time feedback and excessively drains the battery via constant cellular/WiFi radio use.
  napkin_math: |
    - Edge Inference Latency: 10 GOPS / 34.7 TOPS ≈ 0.28 ms. Very low latency.
    - Hybrid Network Latency: Edge preprocessing + ~100ms network round-trip + 50ms cloud inference.
    - Raw Sensor Bandwidth: 10 channels * 2 bytes * 100 Hz = 2 KB/sec per sensor (~100 KB/sec total).
    - Extracted Features Bandwidth: ~10 KB/sec (36 MB/hour).
    - **Conclusion:** On-device processing effectively uses the LPDDR5X bandwidth for burst sensor data, bypassing massive network transmission overhead.
