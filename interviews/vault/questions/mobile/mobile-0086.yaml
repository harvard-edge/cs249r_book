title: The Thermal Cliff
scenario: Your on-device LLM generates tokens at 12 tokens/sec for the first 30 seconds, then drops to 4 tokens/sec and stays there. The user hasn't changed anything. CPU/GPU/NPU utilization all drop simultaneously.
question: What is happening, and why can't you just 'push through it'?
details:
  realistic_solution: Thermal throttling. Mobile SoCs have a tiny thermal mass — the chip sits behind a glass screen with no fan and minimal heat sink. Sustained high-power workloads (like autoregressive LLM generation) raise the junction temperature past the thermal governor's threshold. The governor *forcibly* reduces clock frequencies across all compute blocks — CPU, GPU, and NPU simultaneously — to keep the SoC below its thermal design limit (~95°C junction). You can't "push through" because the throttling is enforced in hardware/firmware, below the OS.
  common_mistake: |
    **The Pitfall:** Assuming the model is running out of KV-cache memory and swapping.
    **The Rationale:** Developers attribute performance drops to memory limits because that is common on desktops.
    **The Consequence:** They waste time optimizing memory instead of addressing the core issue: sustained high-power workloads exceed the phone's thermal dissipation capability.
  napkin_math: |
    1. **Hardware Power Draw:** Snapdragon 8 Gen 3 NPU peak is ~3W. CPU overhead is ~1W. Total active draw is 4W.
    2. **Thermal Budget:** Sustained thermal budget for the SoC is ~3.5W.
    3. **Throttling Trigger:** Since 4W > 3.5W, after ~25-30 seconds, the junction temperature exceeds ~95°C.
    4. **Throttling Effect:** The thermal governor cuts NPU clock by ~60%, dropping throughput from 12 tok/s to ~4 tok/s.
    **This is physics enforced in hardware/firmware—no software optimization can override the thermal governor.**
