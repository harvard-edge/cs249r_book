title: The Thermal Cliff
scenario: Your on-device LLM generates tokens at 12 tokens/sec for the first 30 seconds, then drops to
  4 tokens/sec and stays there. The user hasn't changed anything. CPU/GPU/NPU utilization all drop simultaneously.
  What is happening, and why can't you just 'push through it'?
question: "What is happening, and why can't you just 'push through it'?"
details:
  realistic_solution: Thermal throttling. Mobile SoCs have a tiny thermal mass — the chip sits behind
    a glass screen with no fan and minimal heat sink. Sustained high-power workloads (like autoregressive
    LLM generation) raise the junction temperature past the thermal governor's threshold. The governor
    *forcibly* reduces clock frequencies across all compute blocks — CPU, GPU, and NPU simultaneously
    — to keep the SoC below its thermal design limit (~95°C junction). You can't "push through" because
    the throttling is enforced in hardware/firmware, below the OS.
  common_mistake: '"The model is running out of KV-cache memory and swapping." Memory pressure would cause
    latency spikes, not a smooth sustained drop.'
  napkin_math: 'Snapdragon 8 Gen 3 NPU peak: 45 TOPS at ~3W. Sustained thermal budget for the whole SoC:
    ~3.5W. NPU at peak + CPU overhead (~1W) = 4W > 3.5W sustained limit. After ~25 seconds, thermal governor
    cuts NPU clock by ~60%, dropping throughput from 12 tok/s to ~4 tok/s. This is physics — no software
    optimization can override the thermal governor.'
