title: The Heterogeneous Scheduling Dilemma
scenario: 'Your app runs three ML models simultaneously on a Snapdragon 8 Gen 3: always-on keyword detection
  (Sensing Hub), camera-based object detection (Hexagon NPU), and an LLM for text generation (CPU+GPU).
  The user activates the LLM while the camera pipeline is running. Suddenly, object detection latency
  spikes from 8ms to 25ms, and the LLM generates at 3 tokens/sec instead of the expected 8. Neither workload
  saturates its assigned compute unit. What''s happening?'
question: "Why do camera detection and LLM decoding slow down together on Snapdragon 8 Gen 3 despite separate compute units?"
details:
  realistic_solution: 'Three shared resources cause cross-workload interference despite compute isolation:
    (1) Memory bandwidth — LLM demands 28 GB/s, competing for 51.2 GB/s bus. (2) System-Level Cache —
    both workloads thrash the shared 4-8 MB SLC. (3) Thermal envelope — combined 8W triggers DVFS within
    20s. Result: LLM drops to 3.4 tok/s, detection spikes to 25ms. Fix: time-slice with LLM bursts (20
    tokens/2.5s) and 100ms gaps. Average: 7.7 tok/s LLM, 12ms detection.'
  common_mistake: '"The workloads are on different compute units, so they shouldn''t interfere." Compute
    is isolated, but shared resources are not.'
  napkin_math: 'LLM bandwidth demand: 3.5 GB × 8 tok/s = 28 GB/s. Available after system overhead: 41
    GB/s. LLM gets: 28 GB/s (no contention) → 8 tok/s. With object detection contention + row thrashing:
    effective LLM bandwidth drops to ~18 GB/s → 18 / 3.5 = 5.1 tok/s. With thermal throttling after 20s:
    bandwidth drops further to ~12 GB/s → 3.4 tok/s. Object detection: 8ms (no contention) → SLC misses
    add 12ms → thermal throttling adds 5ms → 25ms. Time-slicing fix: LLM bursts of 20 tokens (2.5s) with
    100ms gaps. Object detection runs at full speed during gaps. Average LLM rate: 20 / 2.6 = 7.7 tok/s.
    Object detection: 8ms during gaps, 25ms during bursts → average 12ms.'
