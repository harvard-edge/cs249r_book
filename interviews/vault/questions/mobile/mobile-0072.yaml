title: The Heterogeneous Scheduling Dilemma
scenario: 'Your app runs three ML models simultaneously on a Snapdragon 8 Gen 3: always-on keyword detection (Sensing Hub), camera-based object detection (Hexagon NPU), and an LLM for text generation (CPU+GPU). The user activates the LLM while the camera pipeline is running, causing object detection latency to spike from 8ms to 25ms, and the LLM to generate at 3 tokens/sec instead of 8.'
question: Why do camera detection and LLM decoding slow down together on Snapdragon 8 Gen 3 despite separate compute units, and how do you fix it?
details:
  realistic_solution: 'Three shared resources cause cross-workload interference despite compute isolation: (1) Memory bandwidth — LLM demands 28 GB/s, competing for 51.2 GB/s bus. (2) System-Level Cache — both workloads thrash the shared 4-8 MB SLC. (3) Thermal envelope — combined 8W triggers DVFS within 20s. Result: LLM drops to 3.4 tok/s, detection spikes to 25ms. Fix: time-slice with LLM bursts (20 tokens/2.5s) and 100ms gaps. Average: 7.7 tok/s LLM, 12ms detection.'
  common_mistake: |
    **The Pitfall:** Assuming workloads on different compute units will not interfere with each other.
    **The Rationale:** Candidates focus on compute isolation and ignore the impact of shared resources like memory bandwidth, SLC, and thermal limits.
    **The Consequence:** Unexplained latency spikes and throughput drops due to resource contention.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - LLM demand: 3.5 GB * 8 tok/s = 28 GB/s.
       - Available bandwidth: 41 GB/s.
    2. **Calculations:**
       - LLM (no contention): 28 GB/s -> 8 tok/s.
       - LLM (with contention + row thrashing): ~18 GB/s -> 18 / 3.5 = 5.1 tok/s.
       - LLM (thermal throttling after 20s): ~12 GB/s -> 3.4 tok/s.
       - Object detection (contended): 8ms (base) + 12ms (SLC misses) + 5ms (thermal throttling) = 25ms.
       - Time-slicing fix (LLM bursts 20 tokens/2.5s with 100ms gaps): LLM avg rate = 20 / 2.6 = 7.7 tok/s.
    3. **Conclusion & Interpretation:**
       - **Result: Bandwidth-Bound.** By time-slicing LLM bursts, object detection runs at full speed during gaps, averaging 12ms, while LLM averages 7.7 tok/s.
