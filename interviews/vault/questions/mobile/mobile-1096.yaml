title: Distilled vs Pruned Memory Bandwidth
scenario: Two 50M parameter (50 MB INT8) real-time video segmentation models require 10 GOPS on the Samsung Exynos 2400 NPU (34.7 TOPS). Model A is pruned (25 layers, 2 MB activation map per layer). Model B is distilled (100 layers, 2 MB activation map per layer). Both share the 12 GB LPDDR5X memory with the ISP. When Model B runs, the camera viewfinder stutters.
question: Why Model B causes stuttering and calculate the difference in memory bandwidth consumption?
details:
  realistic_solution: The stuttering happens because Model B's deep architecture, necessitated by layer-to-layer feature distillation, generates significantly higher activation memory traffic that saturates the shared LPDDR5X bandwidth. Since the Exynos 2400 NPU shares memory with the ISP, saturating the memory bus starves the ISP of the bandwidth needed to render camera frames. While both models have identical parameter counts and FLOPs, Model B reads and writes intermediate activations 4x as many times, pushing the total system bandwidth beyond its limits.
  common_mistake: |
    **The Pitfall:** Focusing purely on compute limits (TOPS) and parameter count.
    **The Rationale:** Candidates conclude both models should perform identically since both are 50M parameters / 10 GOPS, ignoring activation map traffic.
    **The Consequence:** The shared LPDDR5X bus is saturated, starving the ISP and causing the camera to stutter.
  napkin_math: |
    * Model A (Pruned) activation memory per frame: 25 layers × (2 MB read + 2 MB write) = 100 MB.
    * Model B (Distilled) activation memory per frame: 100 layers × (2 MB read + 2 MB write) = 400 MB.
    * Model A Bandwidth at 30 FPS: 30 × (50 MB weights + 100 MB) = 4.5 GB/s.
    * Model B Bandwidth at 30 FPS: 30 × (50 MB weights + 400 MB) = 13.5 GB/s.
    * **Model B consumes 9.0 GB/s more bandwidth, which starves the ISP on the shared memory bus and causes frame drops.**
