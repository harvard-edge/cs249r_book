title: The Energy Cost of Data Movement
scenario: When designing an on-device training system for a mobile app, you have to be extremely conscious
  of battery drain. The two primary energy sinks are ML computation itself and moving the data needed
  for that computation. State the approximate energy cost of accessing a value from the phone's main DRAM
  memory compared to performing a single 16-bit floating-point (FP16) operation on the mobile ML accelerator.
details:
  realistic_solution: Accessing data from DRAM consumes approximately 580 times more energy than a single
    FP16 computation. This fundamental invariant is why data locality is one of the most important principles
    in efficient system design. Techniques like Federated Learning are successful in part because they
    minimize data movement, which has a disproportionately high energy cost.
  common_mistake: Engineers, especially those from a software-only background, often focus on the number
    of FLOPs as the primary driver of cost. They intuitively believe that 'thinking' (computation) must
    be more expensive than 'fetching' (data movement). In reality, due to the physics of wire capacitance,
    moving data is vastly more expensive than computing on it.
  napkin_math: This is a direct hardware invariant. The ratio is Energy(DRAM Access) ≈ 580 × Energy(FP16
    Compute). If an FP16 operation costs 'E' joules, one DRAM access costs '580E' joules. This is why
    a memory-bound model can drain a battery far more quickly than a compute-bound one, even if the latter
    performs more raw calculations.
  options:
  - The energy costs are roughly equal (~1x).
  - About 10x more energy for the DRAM access.
  - About 580x more energy for the FP16 compute.
  - About 580x more energy for the DRAM access.
