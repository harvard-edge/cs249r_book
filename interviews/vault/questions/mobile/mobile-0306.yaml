title: The Energy Cost of Data Movement
scenario: When designing an on-device training system for a mobile app, you have to be extremely conscious of battery drain. The two primary energy sinks are ML computation itself and moving the data needed for that computation.
question: How much more energy does a DRAM access cost than one FP16 operation on a mobile ML accelerator?
details:
  realistic_solution: Emphasize aggressive data locality techniques like operator fusion, KV-cache quantization, and memory-mapped models to avoid activating the high-capacitance DRAM bus, treating the ~580x energy penalty as a hard architectural constraint.
  common_mistake: |
    **The Pitfall:** Focusing exclusively on FLOPs and underestimating the energy cost of data movement.
    **The Rationale:** Engineers from software-only backgrounds intuitively believe computation is far more expensive than fetching data, ignoring the physics of wire capacitance.
    **The Consequence:** Designing memory-bound models that drain the battery far more quickly than compute-bound models, even with fewer raw operations.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target: Compare energy of 1 DRAM read vs 1 FP16 operation.

    **Calculations:**
    - Invariant: Energy(DRAM Access) is roughly 580 * Energy(FP16 Compute).
    - If FP16 op costs E joules, DRAM access costs 580E joules.

    **Conclusion & Interpretation:**
    - **Result: ~580x more energy (Power-Bound)**. Data movement over the LPDDR bus completely dominates the thermal and battery budget compared to NPU logic.
  options:
  - 'A) ~1x (Trap: assuming compute and data fetch are roughly equivalent).'
  - 'B) ~10x (Trap: assuming standard software memory hierarchy costs).'
  - 'C) ~100x (Trap: underestimating the physical trace distance to LPDDR).'
  - 'D) ~580x (Correct).'
  correct_index: 3
