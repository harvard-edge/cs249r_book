title: Optimizing Real-time ML Inference Latency on Snapdragon NPU
scenario: You are deploying a critical real-time ML model for an augmented reality application. The target platform is the Hexagon NPU. Your current model architecture achieves the desired accuracy but exhibits inconsistent inference latency, occasionally exceeding the strict 10ms budget. Initial profiling indicates that a significant portion of the latency comes from data movement between main memory and the NPU.
question: What specific profiling tools and techniques would you employ to pinpoint the exact causes of latency spikes and evaluate the two architectures?
details:
  realistic_solution: "A realistic solution involves using Qualcomm's Neural Processing SDK (SNPE) tools (e.g., SNPE SDK profiler, Hexagon Profiler, `snpe-bench`) to obtain fine-grained execution metrics for each layer/operator, NPU utilization, memory access patterns, and data transfers. Systematically determine if latency is compute-bound, memory-bound, or I/O-bound. Optimize data layouts for NPU, employ INT8 quantization, reduce intermediate buffer sizes, and use operator fusion."
  common_mistake: |
    **The Pitfall:** Focusing primarily on theoretical FLOPs/TOPS without considering real-world bottlenecks.
    **The Rationale:** Engineers often rely on theoretical compute limits and generic software optimizations, ignoring the NPU's architectural nuances.
    **The Consequence:** This leads to models that theoretically fit the budget but fail in practice due to excessive data movement and memory contention.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Latency budget: 10ms.
       - Intermediate tensor transfer: 100 MB.
       - Peak Bandwidth: ~60 GB/s.
    2. **Calculations:**
       - Transfer time: 100 MB / 60 GB/s = 1.67 ms.
       - 1.67 ms / 10 ms = 16.7% of budget.
    3. **Conclusion & Interpretation:**
       - **Result: 17% Budget per Transfer** (Memory-Bandwidth-Bound).
