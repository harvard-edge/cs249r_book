title: AR Throttling Queue Control
scenario: A smartphone AR app processes video frames at 60 FPS. The NPU normally processes inferences in 10ms, but thermal throttling occasionally increases inference time to 20ms.
question: Create a dynamic queue management algorithm to maintain real-time UI responsiveness and prevent queue explosion during thermal throttling events.
details:
  realistic_solution: Implement a size-1 drop-tail queue mechanism. If a 16.6ms inter-arrival boundary is crossed while the NPU is still executing the throttled 20ms inference, the newly arrived frame must be immediately dropped. The rendering pipeline should employ feature interpolation or pose extrapolation for dropped frames to maintain AR visual synchronization.
  common_mistake: |
    **The Pitfall:** Using an unbounded FIFO queue for real-time processing.
    **The Rationale:** Developers want to process every single frame without dropping data, treating the system like an offline video pipeline.
    **The Consequence:** The queue latency linearly accumulates during thermal throttling, permanently desynchronizing the AR visual overlay from the real world.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Inter-arrival time: 16.6 ms (60 FPS).
       - Throttled service time: 20 ms.
    2. **Calculations:**
       - Utilization (rho) = 20 / 16.6 = 1.2 (> 1).
       - Unbounded queue growth rate: (20 - 16.6) = 3.4 ms extra delay per frame.
       - Delay after 30 frames (0.5s): 30 * 3.4 = 102 ms.
    3. **Conclusion & Interpretation:**
       - **Result: 102 ms accumulating lag.** The system enters a **Compute-Bound** death spiral; drop-tail queueing is mandatory.
