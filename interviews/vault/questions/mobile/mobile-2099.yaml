title: AR Throttling Queue Control
scenario: A smartphone AR app processes video frames at 60 FPS (16.6ms inter-arrival).
  The Snapdragon 8 Gen 3 NPU normally processes inferences in 10ms, but thermal throttling
  occasionally increases inference time to 20ms.
question: Create a dynamic queue management algorithm to maintain real-time UI responsiveness
  and prevent queue explosion during thermal throttling events.
details:
  realistic_solution: Implement a time-based drop-tail queue of size 1. If a frame
    arrives and the previous inference is still active (exceeding the 16.6ms window),
    drop the new frame rather than queuing it. Use frame extrapolation on the visual
    output for the dropped frames.
  common_mistake: Using an unbounded FIFO queue, which causes latency to linearly
    accumulate and permanently desynchronizes the AR overlay from the real world.
  napkin_math: Arrival 16.6ms < Service 20ms implies rho > 1. An unbounded queue grows
    by 1 frame every 100ms.
