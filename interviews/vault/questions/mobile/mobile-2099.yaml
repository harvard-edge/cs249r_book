title: AR Throttling Queue Control
scenario: A smartphone AR app processes video frames at 60 FPS (16.6ms inter-arrival). The Snapdragon 8 Gen 3 NPU normally processes inferences in 10ms, but thermal throttling occasionally increases inference time to 20ms.
question: Create a dynamic queue management algorithm to maintain real-time UI responsiveness and prevent queue explosion during thermal throttling events.
details:
  realistic_solution: Implement a time-based drop-tail queue of size 1. If a frame arrives and the previous inference is still active (exceeding the 16.6ms window), drop the new frame rather than queuing it. Use frame extrapolation on the visual output for the dropped frames.
  common_mistake: |
    **The Pitfall:** Using an unbounded FIFO queue for real-time processing.
    **The Rationale:** Developers want to process every single frame without dropping data, treating the system like an offline video pipeline.
    **The Consequence:** The queue latency linearly accumulates during thermal throttling, permanently desynchronizing the AR visual overlay from the real world.
  napkin_math: |
    - Inter-arrival time: 16.6 ms.
    - Throttled service time: 20 ms.
    - Utilization (rho) = 20 / 16.6 = 1.2 (> 1).
    - Unbounded queue growth rate: (20 - 16.6) ms = 3.4 ms extra delay per frame.
    - After 30 frames (0.5s), the queue latency balloons by **>100 ms**.
