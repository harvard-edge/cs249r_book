title: 'Model Size Estimation: Design Memory-Efficient LLM Stack for Android Flagship'
scenario: Design a memory-efficient stack for running a 3B-parameter LLM on Snapdragon 8 Gen 3 (16GB LPDDR5X, 77 GB/s). The assistant app must coexist with Android system (3GB overhead) and allow the user to switch to other apps without OOM-killing the LLM process.
question: How should a Snapdragon 8 Gen 3 phone allocate precision, KV cache, and context length for a 3B LLM in 16 GB RAM?
details:
  realistic_solution: |
    Android system: 3GB. App non-model (JVM, graphics): 1GB. Available: 12GB. 3B INT4: 1.5GB. KV-cache pool: allocate 3GB for KV (avoids OOM). KV per token (3B model, 32 layers, 32 KV heads, 128 dim): 524KB. Pool tokens: 3GB/524KB = 5,725 tokens → max_ctx = 4096 (single user). Total: 3+1+1.5+3=8.5GB. Background app headroom: 16-8.5=7.5GB ✓. TPOT: 1.5GB / 77GB/s = 19.5ms/token. Android LLM process: use foreground service (prevents OOM kill). Strategy: onPause → evict KV cache, onResume → reload.
  common_mistake: |
    **The Pitfall:** Designing for 16GB total RAM without reserving memory for the OS.
    **The Rationale:** Candidates assume all advertised device memory is available to their application.
    **The Consequence:** They fail to reserve memory for the Android system, background processes, and JVM heap, leading to immediate OOM kills.
  napkin_math: |
    - INT4 3B: 1.5GB.
    - KV 4096 ctx: 4096 * 524KB = 2.15GB.
    - System: 3GB. App: 1GB.
    - Total: 7.65GB of 16GB = 47.8%. Background headroom: **8.35GB**.
    - TPOT: 1.5GB / 77GB/s = 19.5ms/token.
    - At 100-token response: 1.95s. Acceptable for assistant.
    - Context: 4096 tokens with 2.15GB KV. For 8192: 4.3GB KV -> total 10GB (still fits).
