title: The App Size Bloat
scenario: Your team is adding an offline translation feature to your iOS app. The models total 300 MB. You bundle them directly into the app binary and ship the update. The next week, your product manager reports that app installations from new users have plummeted by 40%.
question: Why did bundling the model destroy your acquisition metrics?
details:
  realistic_solution: You hit the Cellular Download Limit. Both Apple's App Store and Google Play have strict limits on how much data a user can download over a cellular network. By bundling a 300 MB model into the binary, your app exceeds this limit.
  common_mistake: |
    **The Pitfall:** Assuming the app bloat is causing performance issues or crashes on older devices.
    **The Rationale:** Engineers focus purely on on-device performance rather than platform distribution mechanisms.
    **The Consequence:** The root cause—cellular download limitations on the app stores—is completely missed.
  napkin_math: |
    1. Assumptions & Constraints:
       - App binary: 50 MB. Models: 300 MB.
       - Cellular download limit threshold: 200 MB.
    2. Calculations:
       - Total binary size: 50 + 300 = 350 MB.
       - Limitation triggered: 350 MB > 200 MB.
    3. Conclusion & Interpretation:
       - **Result: Exceeding 200 MB forces Wi-Fi downloads, destroying acquisition rates (Network-Bound).**
