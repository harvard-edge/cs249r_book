title: The App Size Bloat
scenario: Your team is adding an offline translation feature to your iOS app. The models total 300 MB.
  You bundle them directly into the app binary and ship the update. The next week, your product manager
  reports that app installations from new users have plummeted by 40%. Why did bundling the model destroy
  your acquisition metrics?
details:
  realistic_solution: You hit the **Cellular Download Limit**. Both Apple's App Store and Google Play
    have strict (or strongly warned) limits on how much data a user can download over a cellular network
    (historically 150 MB or 200 MB). By bundling a 300 MB model into the binary, your app exceeds this
    limit.
  common_mistake: '"The model must be making the app slow or crashing on older devices." It''s not a performance
    issue—the users aren''t even getting the app onto their phones.'
  napkin_math: 'App binary: 50 MB + 300 MB models = 350 MB. 350 MB > 200 MB cellular limit. Conversion
    drop-off for Wi-Fi prompts is typically 30-50%. Moving the model to ODR keeps the initial download
    at 50 MB, ensuring 100% conversion on cellular.'
