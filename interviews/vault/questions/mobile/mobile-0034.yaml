title: The Cross-Version Compatibility Maze
scenario: Your app supports iOS 16-18 and Android 10-15. You ship a Core ML 7 model with a stateful KV-cache, but iOS 16 users crash on launch. Your Android TFLite model uses INT4 quantization, but Android 10 devices structurally lack delegate support for it.
question: How do you ship one app that works optimally across all these OS versions?
details:
  realistic_solution: 'Implement dynamic capability-based model tiering. Instead of checking OS versions, probe the runtime APIs at launch (e.g., CoreML feature flags, TFLite NNAPI delegate availability). Ship a highly compatible fallback model in the base APK/IPA, and asynchronously fetch the aggressively optimized INT4/Stateful models as over-the-air updates for devices that pass the hardware capability checks.'
  common_mistake: |
    **The Pitfall:** Hardcoding a fallback to the lowest common denominator (iOS 16 / Android 10).
    **The Rationale:** Assuming one universally compatible base model is the only way to satisfy app store submission rules and prevent boot crashes.
    **The Consequence:** Forcing modern silicon to execute bloated, unoptimized graphs, penalizing 80% of your user base with severe latency regressions.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Tier 1 (INT8 fallback, high compatibility): 25 MB.
       - Tier 2 (Palettized, mid-tier): 15 MB.
       - Tier 3 (INT4, cutting-edge): 8 MB.
    2. **Calculations:**
       - Modern hardware distribution (Tier 3 capability): ~52% of users.
       - Base App Bundle payload: 25 MB (guaranteed boot).
       - Post-install optimized download for Tier 3: 8 MB.
    3. **Conclusion & Interpretation:**
       **Result: Bandwidth/Storage-Bound. Runtime capability probing allows shipping a reliable 25 MB universal bundle, while securely delivering an 8 MB ultra-optimized model to the top 52% of the hardware fleet.**
  options:
  - Target the lowest common denominator — use only features available on iOS 16 and Android 10.
  - 'Model tiering keyed to runtime capabilities, not OS version. Probe available APIs at launch: CoreML version, TFLite delegate support, quantization compatibility.'
  - Bundle all three model variants (48 MB total) to ensure immediate offline availability without runtime downloads.
  - Use ONNX Runtime exclusively to bypass OS-level APIs and guarantee identical execution across all versions.
  correct_index: 1
