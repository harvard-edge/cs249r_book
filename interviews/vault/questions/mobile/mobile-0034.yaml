title: The Cross-Version Compatibility Maze
scenario: Your app supports iOS 16-18 and Android 10-15. You ship a Core ML 7 model with stateful KV-cache, but iOS 16 users crash. Your Android TFLite model uses INT4, but Android 10 devices don't support it.
question: How do you ship one app that works optimally across all these OS versions?
details:
  realistic_solution: 'Model tiering keyed to runtime capabilities, not OS version. Probe available APIs at launch: CoreML version, TFLite delegate support, quantization compatibility. Guard all paths with runtime capability checks.'
  common_mistake: |
    **The Pitfall:** Targeting the lowest common denominator (iOS 16 / Android 10).
    **The Rationale:** Assuming one universally compatible model is the only way to maintain a single app bundle.
    **The Consequence:** Forcing modern devices to run slow, unoptimized models, making the app 3x slower than competitors.
  napkin_math: |
    - Tier 1 (INT8, 25 MB): Universal fallback in app bundle.
    - Tier 2 (Palettized, 15 MB): Post-install download for mid-tier.
    - Tier 3 (INT4, 8 MB): Post-install download for top-tier.
    - **Using runtime capability checks to download optimized models serves 52% of users with the fastest 8 MB model, while keeping the base bundle at 25 MB.**
  options:
  - Target the lowest common denominator — use only features available on iOS 16 and Android 10.
  - 'Model tiering keyed to runtime capabilities, not OS version. Probe available APIs at launch: CoreML version, TFLite delegate support, quantization compatibility.'
  - Network I/O is the dominant bottleneck; optimizing the model or inference pipeline will have minimal impact on end-to-end latency.
  - Converting the model to a different framework's format (e.g., ONNX to TFLite) will automatically optimize it for the target hardware.
  correct_index: 1
