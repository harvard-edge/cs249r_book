title: 'Kernel Fusion: Mastery — Fusion Strategy Across Heterogeneous Mobile Hardware'
scenario: 'You are deploying a 1B LLM across a heterogeneous fleet: 30% A17 Pro (35 TOPS NE, 8GB), 45% Snapdragon 8 Gen 3 (45 TOPS, 16GB), 25% Tensor G3 (7.5 TOPS, 12GB).'
question: How would you design a single unified model with hardware-adaptive fusion strategy that achieves 20 tokens/sec on all three platforms?
details:
  realistic_solution: 'Single INT4 quantized model. Hardware-detected fusion: at runtime, detect hardware → load platform-specific CoreML model (A17), QNN model (Snapdragon), XNNPack model (Tensor G3). Same quantized weights, different execution graphs.'
  common_mistake: |
    **The Pitfall:** Designing a single static fusion graph across all devices.
    **The Rationale:** Assuming that an optimization strategy that works on A17 Pro translates directly to Hexagon or Tensor G3.
    **The Consequence:** Terrible performance on the non-primary target devices, missing the 20 tokens/sec requirement because of unoptimized memory access or missing operator fusions.
  napkin_math: |
    - 1B INT4 model weights: ~500 MB
    - A17 Pro (68 GB/s): 500 / 68 = 7.35ms load + 0.17ms compute = ~25ms total (**~40 tok/sec**)
    - Snapdragon (68 GB/s): 7.35ms load + 0.13ms compute = ~27ms total (**~37 tok/sec**)
    - Tensor G3 (51 GB/s estimated): 500 / 51 = 9.8ms load + 0.8ms compute + ~25ms launch overhead = ~35ms (**~28 tok/sec**)
    - **Result: A single INT4 model meets the 20 tok/sec target across all hardware profiles when dynamically compiled at runtime.**
