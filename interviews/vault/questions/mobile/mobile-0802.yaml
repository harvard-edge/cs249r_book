title: Mobile New 0001
scenario: A device with a 275 TOPS NPU runs a specific layer requiring 10 Giga-Operations (GOPs). Instead of the expected ~0.036ms, the layer takes 0.5ms. Profiling shows 100% memory read utilization but very low compute usage.
question: Why does the layer take 0.5ms instead of the compute-bound 0.036ms estimate?
details:
  realistic_solution: The low arithmetic intensity of this specific layer prevents the NPU from reaching peak TOPS, bottlenecking on memory bandwidth.
  common_mistake: |
    **The Pitfall:** Assuming latency is purely a function of compute volume.
    **The Rationale:** Candidates divide GOPs by TOPS and assume the hardware will always execute at peak theoretical throughput.
    **The Consequence:** Teams misdiagnose slow layers as "inefficient ops" instead of resolving the actual memory bandwidth starvation.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - NPU peak compute: 275 TOPS.
       - Layer compute required: 10 GOPs.
       - Memory read volume: ~50MB.
       - Memory bandwidth: 100 GB/s.
    2. **Calculations:**
       - Compute-bound time: 10 GOPs / 275 TOPS = 0.036ms.
       - Bandwidth-bound time: 50MB / 100 GB/s = 0.5ms.
       - Arithmetic intensity: 10 GOPs / 50MB = 200 Ops/byte.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound Execution**. The low arithmetic intensity strictly bottlenecks the execution pipeline on memory bandwidth, taking 0.5ms instead of 0.036ms.
