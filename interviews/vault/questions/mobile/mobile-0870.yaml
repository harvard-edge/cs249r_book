title: Analyzing On-Device vs Cloud Offload Decision for Compound AI on Tensor G3
scenario: 'A Tensor G3 (7.5 TOPS, 12GB) device runs a compound AI pipeline with three
  stages: local embedding (20ms), local retrieval (5ms), and LLM generation. The on-device
  1B LLM generates at 8 tok/s (300ms for 40 tokens). Cloud offload of the LLM to an
  A100 API costs $0.002/query with 80ms network latency + 60ms cloud inference = 140ms
  total. Analyze under which conditions on-device vs cloud is preferred, considering
  battery, latency, and privacy.'
question: How would you analyze under which conditions on-device vs cloud is preferred,
  considering battery, latency, and privacy?
details:
  realistic_solution: 'Decision matrix: (1) Privacy-sensitive queries (medical, financial):
    always on-device regardless of speed — no data leaves device. (2) Low battery
    (< 20%): prefer cloud offload — saves 12W * 300ms = 3.6J per query. At 50 queries
    in low-battery period: 50 * 3.6J = 180J = 0.05Wh saved — negligible. (3) No network
    (airplane mode/offline): forced on-device. (4) Time-sensitive query with network:
    cloud wins at 140ms vs 325ms on-device. Implement a hybrid router: classify query
    privacy level, check battery and network state, route accordingly.'
  common_mistake: Making a binary always-on-device or always-cloud decision without
    considering the query rate and battery state. At 100 queries/day, cloud cost is
    trivial ($0.20/day); battery impact of 100 on-device LLM calls at 12W each * 300ms
    = 360J = 0.1Wh — also trivial. The decision hinges on latency and privacy, not
    cost or battery at typical rates.
  napkin_math: 'On-device: 20+5+300=325ms, 12W during LLM = 3.6J/query. Cloud: 20+5+80(network)+60(inference)=165ms
    total, ~0.1W during network transfer. Battery: 4000mAh * 3.7V = 14.8Wh = 53,280J.
    On-device 100 queries: 100*3.6J=360J = 0.68% battery. Cloud 100 queries: negligible
    battery but $0.20/day. Privacy: 100% of sensitive queries must stay local. Latency
    advantage of cloud: (325-165)/325=49% faster when network available. Recommend
    hybrid with privacy classifier as primary gate.'
