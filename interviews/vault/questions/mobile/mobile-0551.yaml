title: The Mobile App's Server-Side Stall
scenario: 'You are a mobile ML engineer optimizing a new ''AI Photo Editor'' feature. The feature sends
  a user''s photo to a cloud-hosted H100 GPU for processing and streams the result back. You observe the
  following performance characteristics:'
details:
  realistic_solution: The primary bottleneck is the inefficient data ingress path from the server's network
    card to the GPU's memory. The standard web server process receives the 16MB payload into CPU RAM,
    and then explicitly copies it over the PCIe bus to the GPU's HBM. This CPU-mediated transfer involves
    multiple memory copies (NIC -> kernel -> user space -> GPU) and context switches, which incurs significant
    latency overhead, even if the PCIe bus itself has high theoretical bandwidth. The correct architectural
    solution is to bypass the CPU entirely using a technology like GPUDirect RDMA (Remote Direct Memory
    Access), which allows the network card to write data directly into the GPU's memory.
  common_mistake: Engineers often fixate on their own domain. A mobile engineer might instinctively blame
    the ---mobile network, while an ML engineer might blame the model architecture. The key is to analyze
    the entire data path from client to the GPU's compute units. A common error is to confuse the roles
    of different interconnects, for example, blaming GPU-to-GPU communication (NVLink) for a host-to-GPU
    data ingress problem.
  napkin_math: 'The goal is to account for the missing time: Network RTT (Mobile to edge): ~40ms. GPU
    Inference time (H100): ~15ms. Total expected: ~55ms. Observed Latency: 160ms. Missing overhead: ~105ms.
    The standard explicitly-mediated CPU transfer of a 16MB image payload involves kernel space network
    reception, user-space buffering, and explicit PCIe memory writes to the GPU over multiple host trips.
    This software-mediated path easily consumes >100ms, entirely dominating the GPU inference time.'
  options:
  - The mobile device's 5G uplink has high packet loss for large uploads, forcing numerous retries that
    are not captured by the simple 'time-to-send' metric.
  - Data transfer over the server's PCIe bus from CPU RAM to GPU HBM is the bottleneck. The CPU-mediated
    copy introduces significant software and kernel overhead not present in a direct-path solution like
    RDMA.
  - The H100 server uses InfiniBand to connect to storage, and the network is saturated from other jobs,
    delaying the initial data read before processing can begin.
  - The server's GPUs are interconnected with NVLink for model parallelism. This high-traffic interconnect
    is creating contention with the PCIe bus, slowing down the host-to-device data copy.
  correct_index: 1
