title: 'Latency Decomposition: Size Inference Latency Budget for AR App on A17 Pro'
scenario: An augmented reality iOS app must overlay semantic segmentation on the camera feed in real time. The device runs a segmentation model (MobileNetV3 backbone, 5M params INT8, 2.8 GOPs) at 60fps.
question: What latency budget does each AR segmentation pipeline stage consume, and how much 60 FPS slack remains?
details:
  realistic_solution: 'Camera capture: 0ms (streaming, always available). Pre-process (GPU): 1ms. Inference: 2.8G/35T = 0.08ms + 2ms overhead = 2ms. Post-process (argmax over 1280x720x21 classes): CPU naive 8ms, Metal compute 1ms. Metal render: 2ms. Display commit: must finish by 15ms before vsync. Total: 1+2+1+2 = 6ms. Budget: 10ms slack. Can add second model or increase resolution.'
  common_mistake: |
    **The Pitfall:** Assuming 60fps provides a full 16.7ms for computation.
    **The Rationale:** Candidates often sum the compute stages up to 16.7ms, forgetting the rendering and vsync deadlines.
    **The Consequence:** The pipeline misses the display commit deadline, causing skipped frames and jittery AR overlays.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Neural Engine Peak Compute: 35 TOPS.
       - Model Compute Requirement: 2.8 GOPs.
       - Frame Rate Requirement: 60 FPS (16.67ms deadline).
    2. **Calculations:**
       - Pure NE Compute time = 2.8 GOPs / 35,000 GOPs/sec = ~0.08ms.
       - Framework overhead = ~2ms.
       - Post-process Argmax on GPU (19.4M ops @ 1 TFLOPS) = ~1ms.
       - Metal render = ~2ms. Pre-process (GPU) = ~1ms.
       - Total Pipeline Latency = 2ms (Inference) + 1ms (Post) + 2ms (Render) + 1ms (Pre) = 6ms.
       - Remaining Slack = 16.67ms - 6ms = 10.67ms.
    3. **Conclusion & Interpretation:**
       **Result: Compute-Bound Slack. The pipeline consumes 6ms per frame, leaving ~10.7ms of slack to avoid VSYNC misses and jank.**
