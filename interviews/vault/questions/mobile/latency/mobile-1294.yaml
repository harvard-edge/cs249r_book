title: On-Device LLM Profiling Alternatives for Tensor G3
scenario: You are deploying Gemini Nano on the Google Tensor G3. Initial profiling during the autoregressive generation phase shows an unacceptable latency of 150ms per token.
question: Is Tensor G3 LLM generation at 150 ms/token limited by 7.5 TOPS TPU compute or 12 GB LPDDR5X bandwidth?
details:
  realistic_solution: Hypothesis B is the better explanation. During batch-1 autoregressive decoding, the weights are resident in DRAM/page cache but are repeatedly streamed through the accelerator because they cannot all live in on-chip SRAM. The TPU's 7.5 TOPS are therefore underutilized while execution waits on weight bandwidth. Weight-only quantization, such as INT4, directly reduces the streamed bytes per token.
  common_mistake: |
    **The Pitfall:** Assuming LLMs are always compute-bound on edge hardware.
    **The Rationale:** Candidates fail to distinguish between the compute-heavy prefill phase and the memory-bandwidth-heavy autoregressive decoding phase (batch size 1) typical in mobile deployments.
    **The Consequence:** Choosing the wrong optimization path, such as aggressive network pruning instead of quantization.
  napkin_math: |
    **Assumptions & Constraints:**
    - TPU Compute: 7.5 TOPS.
    - Memory: 12 GB LPDDR5X (~50 GB/s bandwidth).
    - Model: 3B parameters FP16 (6 GB memory footprint).
    - Batch Size: 1 (autoregressive decoding).
    - Rough decode model: each generated token touches most weights once; weights are streamed from DRAM, not reloaded as a new model object.

    **Calculations:**
    - Per-token weight traffic estimate: 3B params * 2 bytes = 6 GB.
    - Required memory I/O time: 6 GB / 50 GB/s = 0.12 s = 120 ms.
    - Per-token compute estimate: 3B params * 2 ops/param = 6 GOP.
    - Required compute time: 6 GOP / 7500 GOPS = 0.0008 s = 0.8 ms.

    **Conclusion & Interpretation:**
    - **Result: likely memory-bandwidth-bound.** Under this streaming estimate, memory I/O (~120 ms) dominates compute (~0.8 ms) and plausibly explains the observed ~150 ms/token latency.
