title: The Sluggish Co-Pilot
scenario: You are optimizing an on-device LLM assistant for a 'hands-free driving' feature. Time-To-First-Token (TTFT) is ~800ms, but the Time-Per-Output-Token (TPOT) is a speedy ~50ms. The model is a 3B parameter transformer quantized to INT4. The hard deadline for the UI to receive the first token is 500ms.
question: What inference phase explains an 800ms TTFT with 50ms TPOT in an on-device 3B LLM assistant?
details:
  realistic_solution: The bottleneck for the 800ms TTFT is the prompt processing (pre-fill) phase, which is heavily compute-bound. To generate the first token, the model must process the entire input prompt with large batched matrix operations before any output token can be emitted. This work has much higher arithmetic intensity than single-token decode, so the 800ms first-token delay points to prefill compute rather than the later 50ms/token decode loop.
  common_mistake: |
    **The Pitfall:** Confusing the bottlenecks of the two LLM inference phases.
    **The Rationale:** Engineers often incorrectly assume pre-fill is memory-bound and decode is compute-bound.
    **The Consequence:** Applying the wrong optimization strategies, such as trying to improve memory bandwidth to fix slow pre-fill.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: 3B parameters INT4 (1.5 GB weights).
    - Observed TTFT = 800ms. Observed TPOT = 50ms.
    - UI deadline for the first token = 500ms.

    **Calculations:**
    - First-token latency is measured before any output-token decode cadence matters.
    - TTFT deadline miss = 800ms - 500ms = 300ms.
    - Decode is already 50ms/token, so optimizing later tokens cannot remove the initial 300ms miss.
    - The phase unique to the first token is prompt prefill, where the whole prompt is processed with large GEMM-style compute.

    **Conclusion & Interpretation:**
    - **Result: 800 ms TTFT (Prefill Compute Bottleneck)**. The missed first-token deadline is caused by prompt prefill work, not by the faster decode phase.
  options:
    - The model is too large, making the NPU completely memory-bound for both phases.
    - The model is being loaded from slow flash storage on every request, causing high cold-start latency.
    - The initial prompt processing (pre-fill) is highly compute-bound due to the large GEMM operation required for the entire prompt sequence.
    - The CPU is taking too long to tokenize the user's text input before sending it to the Neural Engine.
  correct_index: 2
