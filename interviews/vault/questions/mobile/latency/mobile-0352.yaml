title: 'The 16ms Jank Budget: Real-Time Deadlines'
scenario: You are designing an on-device generative AI feature for a mobile app.
question: What latency budget does a 60 FPS mobile UI give each frame to avoid jank?
details:
  realistic_solution: 'A 60 FPS display refreshes 60 times per second. This gives a total budget of approximately 16.67 milliseconds for everything the application needs to do to render a single frame. Any task, including model inference, that blocks the main UI thread must complete well within this window to prevent dropped frames, which are perceived by the user as ''jank'' or stutter.'
  common_mistake: |
    **The Pitfall:** Applying cloud-based latency targets (e.g., 100-200ms) to a mobile render loop.
    **The Rationale:** Engineers without mobile UI experience misjudge the strictness of UI deadlines, or confuse UI refresh rate with 30 FPS video.
    **The Consequence:** Unusable, stuttering UI because the main thread is blocked too long.
  napkin_math: |
    **Assumptions & Constraints:**
    - Display refresh rate: 60 FPS (60 Hz).

    **Calculations:**
    - Period = 1 second / 60 frames = 0.01667 seconds per frame.

    **Conclusion & Interpretation:**
    - **Result: ~16.67 ms (Latency-Bound).** Inference blocking the main thread must complete inside this budget.
  options:
  - '~100 ms'
  - '~33 ms'
  - '~16 ms'
  - '~1 ms'
  correct_index: 2
