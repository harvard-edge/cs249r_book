title: 'The Jank Budget Fallacy'
scenario: A real-time translation app aims for a smooth 60 FPS (16ms per frame) UI experience. The on-device generative model takes 30ms to produce a single token. A proposed batching approach generates 2 tokens every 60ms.
question: Can either the single-token or batched approach stream tokens to the UI without causing jank?
details:
  realistic_solution: 'Neither approach meets the strict 16ms presentation deadline. Single-token (30ms/token): content arrives every other frame causing stutter. Batched 2 (60ms): arrives every 3.6 frames. Solution: Decouple generative compute from UI rendering. Schedule model execution on a background thread streaming tokens into a buffer. The UI thread reads the buffer every 16ms, animating text appearance to obfuscate the P99 token arrival latency.'
  common_mistake: |
    **The Pitfall:** Confusing throughput with latency for real-time UIs.
    **The Rationale:** Assuming that matching the average token generation rate to the frame rate prevents stuttering.
    **The Consequence:** Delivering a UI that noticeably stutters because the P99 latency of token arrival exceeds the frame deadline.
  napkin_math: |
    **Assumptions & Constraints:**
    - UI Frame Deadline: 1000ms / 60 FPS = 16.67ms.
    - Single-token latency: 30ms per token.
    - Batched latency: 60ms per 2 tokens.

    **Calculations:**
    - Single-token miss: 30ms > 16.67ms.
    - Batched miss: 60ms > 16.67ms.

    **Conclusion & Interpretation:**
    - **Result: 30ms and 60ms (Latency-Bound)**. Both strictly violate the 16.67ms budget, meaning neither method works directly without decoupling generation from rendering.
  options:
  - The batched approach is better because the throughput is higher.
  - Both approaches are effectively the same since the average time per token is 30ms.
  - Neither approach works; both violate the 16ms deadline, and batching increases perceived latency.
  - The single-token approach works; 30ms is fast enough for a mobile device.
