title: NPU Memory Contention in Shared LPDDR5X Systems
scenario: 'You are deploying a real-time semantic segmentation model on a mobile NPU for an augmented reality application. The model is running at 15 FPS, below the 30 FPS target. Profiling traces indicate the NPU is operating at a fraction of its TOPS capacity.'
question: 'How do you evaluate the memory trace to identify the bottleneck, and what architectural adjustments do you make to hit the latency target?'
details:
  realistic_solution: 'A strong candidate will diagnose that the low NPU utilization is an I/O bottleneck caused by the shared LPDDR5X memory subsystem. They will propose analyzing the flame graphs to identify which layers trigger off-chip memory access for intermediate activations. The architectural fix involves applying layer fusion (e.g., fusing Conv-BN-Relu or consecutive convolutions) to ensure intermediate feature maps fit entirely within the dual-core NPU''s local SRAM, drastically reducing trips to main memory and allowing the compute units to run without stalling.'
  common_mistake: |
    **The Pitfall:** Assuming low NPU utilization is a pure compute bottleneck or unoptimized model weights.
    **The Rationale:** Engineers rely entirely on TOPS metrics and propose generic pruning.
    **The Consequence:** Failing to address the LPDDR5X bandwidth contention with the ISP/GPU, leaving the model stuck at 15 FPS.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Required compute: 200 GOPS/frame * 30 FPS = 6 TOPS (vs 34.7 TOPS available).
       - Memory footprint (unfused): 40 MB/frame * 30 FPS = 1.2 GB/s.
    2. **Calculations:**
       - Fusing layers keeps intermediate activations in SRAM.
       - Fused footprint: 5 MB/frame * 30 FPS = 150 MB/s.
       - Latency drops from 66.6 ms (15 FPS) to < 33.3 ms (30 FPS).
    3. **Conclusion & Interpretation:**
       - **Result: < 33.3 ms per frame (Memory Contention Eliminated).**
