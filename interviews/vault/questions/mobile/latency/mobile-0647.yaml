title: The Automotive Assistant's Priority Inversion
scenario: You are the lead ML Systems Architect for a new flagship electric vehicle's in-car assistant. The product team has mandated a single, powerful, on-device LLM to handle all user interactions for privacy and offline functionality.
question: What architecture avoids priority inversion for an in-car assistant handling both urgent commands and long conversations?
details:
  realistic_solution: |
    Use a heterogeneous, priority-aware, preemptible architecture instead of a single FIFO model server. Route urgent vehicle commands such as braking-related alerts, defrost, navigation corrections, and call handling to a small deterministic command model or grammar-constrained NLU path with a reserved accelerator/CPU budget. Route long conversations to the full LLM in a lower-priority lane with token-level preemption checkpoints and cancellable KV-cache state. The runtime should maintain separate priority queues, deadline-aware admission control, and a scheduler that can pause or shed low-priority generation when an urgent command arrives. If hardware preemption is weak, run the safety/command model in a separate runtime or on a separate accelerator partition so long LLM conversations cannot block it.
  common_mistake: |
    **The Pitfall:** Proposing a single, heavily quantized Mixture-of-Experts (MoE) model.
    **The Rationale:** Candidates view this as a pure model optimization problem rather than a systems scheduling and architecture problem.
    **The Consequence:** A long-running task, no matter how efficient, will always block short, high-priority tasks in a simple FIFO queue, creating severe priority inversion.
  napkin_math: |
    **Assumptions & Constraints:**
    - Long generation: 200 tokens at 20 tok/s.
    - Urgent command deadline: 200ms.
    - Single model executing sequentially.

    **Calculations:**
    - Long task duration = 200 tokens / 20 tok/s = 10 seconds.
    - Blocking duration for incoming urgent task = up to 10 seconds.

    **Conclusion & Interpretation:**
    - **Result: ~10 seconds blocking (Latency-Bound).** A FIFO queue causes severe priority inversion; preemption or parallel routing is mandatory.
