title: The Inference Timing Jitter
scenario: 'You''re building a real-time AR app on an iPhone 15 Pro that overlays virtual objects on camera frames. Your CoreML pose estimation model benchmarks at 6ms ± 0.2ms in isolation. In production, the same model shows 6ms median but with a long tail: P95 = 12ms, P99 = 22ms — a 3.7x spread. The P99 spikes cause visible AR object jitter.'
question: What would you identify as the sources of timing variance and design a system that guarantees sub-10ms P99?
details:
  realistic_solution: 'Five jitter sources compound: DVFS frequency scaling (±2ms as the SoC adjusts clocks), LPDDR5 bandwidth contention from display/ISP (±5ms at P99), OS thread scheduling delays (±3ms), thermal stepping (±3ms), and CoreML graph repartitioning across ANE/GPU (±3ms). Worst case: 6+2+5+3+3+3 = 22ms, matching observed P99. Mitigations: pin inference to a QoS .userInteractive thread (eliminates scheduling jitter), use .cpuAndNeuralEngine compute units to prevent GPU repartition, and implement a frame-skip policy at 8ms threshold with IMU-predicted poses for skipped frames. Target P99: 8ms effective.'
  common_mistake: |
    **The Pitfall:** Assuming the model computation itself is non-deterministic and can be fixed by averaging.
    **The Rationale:** Candidates fail to recognize that variance comes from system-level interference invisible in isolated benchmarks.
    **The Consequence:** Failing to address OS scheduling or bandwidth contention, leaving the P99 spikes unresolved.
  napkin_math: |
    **Assumptions & Constraints:**
    - Base latency: 6ms.
    - Sources of Jitter: DVFS (±2ms), LPDDR5 bandwidth (±5ms), OS scheduling (±3ms), thermal steps (±3ms), CoreML repartition (±3ms).

    **Calculations:**
    - Worst-Case Stack: 6ms + 2 + 5 + 3 + 3 + 3 = 22ms.
    - Apply Mitigations: QoS thread (-3ms), ANE pinning (-3ms), Thermal switching (-1ms DVFS).
    - Mitigated P99: 6ms + 1ms (DVFS) + 5ms (bandwidth) = 12ms.

    **Conclusion & Interpretation:**
    - **Result: 8ms (Latency-Bound)**. With skip frames > 8ms using IMU prediction, effective P99 drops to 8ms.
