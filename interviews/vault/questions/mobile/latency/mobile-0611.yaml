title: The Inference Timing Jitter
scenario: 'You''re building a real-time AR app on an iPhone 15 Pro that overlays virtual objects on camera frames. Your CoreML pose estimation model benchmarks at 6ms ± 0.2ms in isolation. In production, the same model shows 6ms median but with a long tail: P95 = 12ms, P99 = 22ms — a 3.7x spread. The P99 spikes cause visible AR object jitter.'
question: What would you identify as the sources of timing variance and design a system that guarantees sub-10ms P99?
details:
  realistic_solution: 'Five jitter sources compound: DVFS frequency scaling, LPDDR5 bandwidth contention from display/ISP, OS thread scheduling delays, thermal stepping, and CoreML graph repartitioning across ANE/GPU. A guarantee-level design needs control, not just tuning: use a bounded latest-frame queue of depth 1, run inference on a QoS .userInteractive worker pinned to CPU+NeuralEngine compute units, pre-warm and keep the model resident, monitor rolling P95/P99 latency, and apply admission control. If measured inference plus render/prediction budget cannot meet 10ms, shed work by reducing input resolution or skipping ML updates and rendering an IMU-predicted pose from the latest completed result. That guarantees the displayed AR path stays below 10ms by bounding queueing and refusing work that would miss the deadline; it does not claim every raw inference finishes under 10ms.'
  common_mistake: |
    **The Pitfall:** Assuming the model computation itself is non-deterministic and can be fixed by averaging.
    **The Rationale:** Candidates fail to recognize that variance comes from system-level interference invisible in isolated benchmarks.
    **The Consequence:** Failing to address OS scheduling or bandwidth contention, leaving the P99 spikes unresolved.
  napkin_math: |
    **Assumptions & Constraints:**
    - Base latency: 6ms.
    - Sources of jitter: DVFS (±2ms), LPDDR5 bandwidth (±5ms), OS scheduling (±3ms), thermal steps (±3ms), CoreML repartition (±3ms).
    - Displayed AR deadline: 10ms P99.
    - Queue depth: 1 latest frame; stale or over-budget frames are dropped before inference.

    **Calculations:**
    - Observed worst-case stack: 6ms + 2 + 5 + 3 + 3 + 3 = 22ms, matching the measured P99.
    - Apply deterministic controls: QoS worker removes most scheduling delay (~3ms), compute-unit pinning avoids repartition/fallback (~3ms), pre-warm/thermal policy reduces DVFS/thermal excursions by ~3ms.
    - Remaining inference P99 estimate: 22ms - 3ms - 3ms - 3ms = ~13ms, still above the 10ms display deadline.
    - Admission control rule: only run ML when predicted inference budget <= 8ms, leaving ~2ms for pose prediction/compositing; otherwise reuse the latest result with IMU prediction and drop the stale frame.

    **Conclusion & Interpretation:**
    - **Result: Bounded displayed latency, not guaranteed raw inference latency.** The system meets a sub-10ms P99 display contract by bounding queues and shedding over-budget ML work; the raw model path can still occasionally exceed 10ms.
