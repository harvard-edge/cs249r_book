title: Calculate Prefill Latency Bound on Tensor G3
scenario: You are profiling the prefill latency of the Gemini Nano model running on a mobile TPU. The TPU delivers 7.5 TOPS and is equipped with 12 GB LPDDR5X memory. The model requires 6 billion operations per token during the prefill phase.
question: What is the theoretical minimum compute latency in milliseconds to process a 100-token prompt?
details:
  realistic_solution: LLM prompt prefill is characterized by massive parallel matrix multiplication, rendering it heavily compute-bound (unlike autoregressive generation). Calculating the total cumulative operational load (600 billion ops) against the fixed theoretical throughput (7.5 TeraOps/second) resolves the fundamental compute limit.
  common_mistake: |
    **The Pitfall:** Applying memory bandwidth bottlenecks to the prefill phase.
    **The Rationale:** Candidates often confuse the compute-bound prefill phase with the memory-bound token generation phase, or fail to convert TeraOps to GigaOps correctly.
    **The Consequence:** The calculated latency is entirely incorrect, reflecting a misunderstanding of LLM inference phases.
  napkin_math: |
    **Assumptions & Constraints:**
    - Prompt size: 100 tokens.
    - Ops/token: 6 Billion Ops.
    - TPU Capacity: 7.5 TOPS.

    **Calculations:**
    - Total Operations: 100 * 6B = 600 Billion Ops (0.6 TOPS-seconds).
    - Compute Latency: 0.6 TOPS-sec / 7.5 TOPS = 0.08 seconds (80 ms).

    **Conclusion & Interpretation:**
    - **Result: 80 ms (Compute-Bound)**. The prefill execution is strictly compute-bound, bounded by the hardware multipliers rather than memory I/O.
