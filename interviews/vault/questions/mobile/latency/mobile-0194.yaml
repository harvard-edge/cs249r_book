title: 'The Mobile Jank Budget: Real-Time Deadlines'
scenario: You're tasked with integrating a generative model on a smartphone to provide real-time typing suggestions.
question: What end-to-end latency budget must a mobile typing suggestion meet to avoid jank on a 60 FPS screen?
details:
  realistic_solution: The standard latency budget to avoid UI 'jank' on a mobile device is approximately 16ms. This number is derived directly from the refresh rate of most standard mobile displays (60 FPS), where one frame is drawn every 1000ms / 60 = 16.67ms. All work, including OS scheduling, inference, and rendering, must fit within this window to avoid dropping a frame, which the user perceives as input stutter or lag.
  common_mistake: |
    **The Pitfall:** Applying standard cloud service level agreements (SLAs) to real-time, on-device mobile tasks.
    **The Rationale:** Defaulting to web-based mental models where 100ms is considered "instantaneous" for network requests.
    **The Consequence:** Missing the 60 FPS display refresh deadline, causing the main UI thread to drop frames and creating severe, perceptible input stutter (jank).
  napkin_math: |
    **Assumptions & Constraints:**
    - Target display refresh rate: 60 Frames Per Second (FPS).
    - Time available per frame: 1 second / 60 frames.

    **Calculations:**
    - Frame duration: 1000 ms / 60 = 16.67 ms.
    - End-to-end latency budget (OS scheduling + inference + rendering) <= 16.67 ms.

    **Conclusion & Interpretation:**
    - **Result: 16 ms (Latency-Bound)**. To avoid blocking the UI thread and causing jank, the entire inference pipeline must complete strictly within this 16 ms window.
  options:
  - ~100 ms
  - ~33 ms
  - ~16 ms
  - ~8 ms
