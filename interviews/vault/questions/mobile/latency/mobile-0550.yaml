title: 'The Sluggish Voice Assistant'
scenario: 'You are an ML systems engineer on a team building an in-car voice assistant powered by an on-device LLM. Users report the assistant feels ''sluggish''—there is a long, noticeable pause before the first word of its response appears (Time to First Token, or TTFT), but subsequent words generate quickly (fast Time Per Output Token, or TPOT). The voice assistant shares the NPU with a continuous background task.'
question: 'Why does the in-car voice assistant have slow TTFT even though subsequent tokens generate quickly?'
details:
  realistic_solution: 'The root cause is head-of-line blocking in the simple FIFO queue. A low-priority, long-running background task blocks the high-priority, latency-sensitive voice prefill. The user''s request is forced to wait for the entire background task to finish before it can even begin.'
  common_mistake: |
    **The Pitfall:** Misattributing TTFT latency directly to the model's compute weight rather than system scheduling.
    **The Rationale:** Engineers assume that if a response is slow, the model must be too large, ignoring the impacts of the task orchestrator.
    **The Consequence:** Wasting time pruning the LLM when the actual fix is implementing preemptive priority scheduling for the NPU.
  napkin_math: |
    **Assumptions & Constraints:**
    - Pre-fill Cost: The voice prefill alone takes 80ms.
    - Background Task: The music ID task takes 150ms and cannot be preempted.

    **Calculations:**
    - Worst-Case Wait: If the voice query arrives instantly after music ID starts, it waits in FIFO.
    - TTFT = 150ms wait + 80ms prefill = 230ms.

    **Conclusion & Interpretation:**
    - **Result: Latency-Bound**. A 230ms delay is noticeable jank, whereas an isolated 80ms TTFT would feel instant.
  options:
  - 'The prompt prefill computation is too large, exceeding the NPU''s per-operation compute budget and causing a hardware fault.'
  - 'The system is running out of on-chip memory when both tasks are loaded, forcing slow data swaps from main DRAM during prefill.'
  - 'The FIFO queue is causing head-of-line blocking; the high-priority voice query is stuck waiting for the entire low-priority background task to complete.'
  - 'The fast TPOT generation for the previous task is saturating the memory bus, preventing the voice prompt from being loaded onto the NPU.'
  correct_index: 2
