title: Mobile Neural Processing Unit Adaptive Batching Queues
scenario: A mobile live-translation app queues incoming audio chunks of 200ms to the NPU for feature extraction.
question: Model the processing pipeline as an M/D/1 queue and formulate an adaptive batching strategy to keep 99th percentile latency under 500ms when user speech rate unexpectedly doubles?
details:
  realistic_solution: |
    Model doubled speech as 10 chunks/sec because each chunk covers 200 ms. Approximate full 4-chunk batches as deterministic chunk service with mean service 10 ms/chunk, so the M/D/1 service rate is 100 chunks/sec and utilization is 0.10. The M/D/1 mean queueing delay Wq = rho / (2 * mu * (1 - rho)) is about 0.56 ms, so server queueing is not the latency driver; batching wait is. Use two triggers: dispatch immediately when 4 chunks are queued, or dispatch earlier when the oldest chunk has waited about 300 ms. At the burst rate, a 4-chunk batch fills after at most 3 interarrival gaps, or 300 ms, and the batch service time is 40 ms. Timeout plus service plus a conservative jitter allowance keeps the oldest chunk under 500 ms.
  common_mistake: |
    **The Pitfall:** Assuming exponential service times (M/M/1 queue model).
    **The Rationale:** Candidates default to generic queuing theory without realizing that fixed-size audio chunks passing through an NPU yield highly deterministic execution times.
    **The Consequence:** Grossly inaccurate latency modeling and deploying overly conservative adaptive batching logic that harms baseline responsiveness.
  napkin_math: |
    **Assumptions & Constraints:**
    - Input chunk size: 200 ms, so normal speech produces about 5 chunks/sec.
    - Doubled speech rate: 10 chunks/sec.
    - Target P99 latency: < 500 ms.
    - Batch size limit: 4 chunks.
    - Batch processing time: 40 ms total.
    - Adaptive timeout for oldest chunk: 300 ms.

    **Calculations:**
    - Full-batch service capacity = 4 chunks / 0.04 sec = 100 chunks/sec.
    - At doubled speech rate, chunk-level utilization = 10 / 100 = 0.10.
    - M/D/1 mean queueing delay Wq = rho / (2 * mu * (1 - rho)) = 0.10 / (2 * 100 * 0.90) = 0.00056 sec, or about 0.56 ms.
    - Full-batch fill time at 10 chunks/sec is at most 3 interarrival gaps = 300 ms for the oldest chunk.
    - The timeout also caps oldest-chunk batching wait at 300 ms when arrivals are irregular.
    - Conservative oldest-chunk latency budget = batching wait 300 ms + service 40 ms + M/D/1 mean queueing under 1 ms + jitter allowance about 50 ms = about 391 ms.

    **Conclusion & Interpretation:**
    - **Result: adaptive batch-4 with a 300 ms oldest-chunk timeout (Queue-Bound)**. The M/D/1 approximation shows server queueing is tiny at rho = 0.10, so the policy controls the dominant batching wait; the timeout-plus-service budget is about 391 ms under the stated jitter allowance, leaving margin under the 500 ms target.
