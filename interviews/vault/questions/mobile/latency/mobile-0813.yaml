title: 'Mobile New 0013'
scenario: 'Switching from symmetric to asymmetric INT8 quantization on a mobile CPU recovers accuracy, but profiling shows a 25% increase in total latency and higher instruction counts per convolution loop.'
question: 'Why does asymmetric INT8 quantization increase mobile CPU latency compared with symmetric quantization?'
details:
  realistic_solution: 'The symptom of increased latency and instruction count stems from the mathematical overhead of asymmetric quantization. Symmetric quantization has a zero-point of 0, simplifying the dot product. Asymmetric introduces a non-zero zero-point, and the full expansion is sum(W*X) - Z_x*sum(W) - Z_w*sum(X) + N*Z_w*Z_x. Importantly, Z_x*sum(W) and N*Z_w*Z_x are constant per channel or tensor and can be precomputed offline and folded into the bias, adding zero runtime cost. The only runtime overhead is Z_w*sum(X), which requires one additional accumulation per input row (not per MAC). If a 25% latency increase is observed, it is likely caused by a non-optimized fallback path (e.g., lack of SIMD support for zero-point arithmetic on this CPU) rather than the theoretical asymptotic cost.'
  common_mistake: |
    **The Pitfall:** Assuming asymmetric quantization only affects the offline calibration phase without penalizing runtime compute.
    **The Rationale:** Candidates forget that the non-zero zero-point requires extra arithmetic during the dot product at runtime.
    **The Consequence:** Performance budgets are missed because the runtime overhead of asymmetric quantization was ignored.
  napkin_math: |
    **Assumptions & Constraints:**
    - Symmetric MAC: sum(W * X).
    - Asymmetric MAC expands to: sum(W*X) - Z_x*sum(W) - Z_w*sum(X) + N*Z_w*Z_x.

    **Calculations:**
    - Z_x*sum(W) and N*Z_w*Z_x are constants precomputed into the bias.
    - Z_w*sum(X) requires 1 addition per input element, not per MAC.

    **Conclusion & Interpretation:**
    - **Result: ~11% overhead (Compute-Bound)**. For a 3x3 kernel over 32 channels, this adds 32 additions per output position vs 288 MACs (~11% overhead). A 25% latency increase points to a poorly optimized CPU fallback path without SIMD.
