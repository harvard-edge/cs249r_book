title: Compute-Bound Keyboard Model Size Estimate
scenario: You are designing a 'next word prediction' feature for a mobile keyboard. The user experience team has a strict 100ms time-to-first-token (TTFT) budget to ensure the suggestion feels instantaneous.
question: Under a compute-only 35 TOPS peak estimate, what INT8 model size fits a 100ms one-token budget?
details:
  realistic_solution: This is a theoretical compute-bound estimate, not a realistic TTFT sizing rule. At 35 TOPS for 0.1 seconds, the Neural Engine can perform 3.5 trillion operations. Dividing by the simplifying rule of thumb of 2 ops per parameter for one token gives 1.75 trillion parameters, which is 1750 billion parameters. In practice, sequence length, memory bandwidth, KV-cache traffic, operator coverage, and sustained clocks would make this estimate far too optimistic, but under the stated compute-only assumption the correct choice is 1750 billion parameters.
  common_mistake: |
    **The Pitfall:** Getting an arithmetically correct but realistically absurd answer by mixing up Giga and Tera units.
    **The Rationale:** Candidates use peak marketing-spec TOPS without caveat, forgetting the sustained performance gap due to memory bandwidth limits.
    **The Consequence:** Proposing unrealistic model sizes that would immediately OOM or throttle in production.
  napkin_math: |
    **Assumptions & Constraints:**
    - Peak Compute: 35 TOPS.
    - Time Budget: 100ms (0.1s).
    - Simplifying Compute Rule: ~2 Ops per parameter for one generated token.
    - This ignores sequence length, memory bandwidth, KV-cache reads, and sustained-vs-peak throughput.

    **Calculations:**
    - Find total operations: 35 TOPS * 0.1s (100ms) = 3.5 Tera-Operations.
    - Calculate max parameters: 3.5 Tera-Operations / 2 Ops = 1.75 Tera-parameters.

    **Conclusion & Interpretation:**
    - **Result: 1.75 Trillion Parameters (Compute-Only Upper Bound)**. This equals 1750 billion parameters, but it is only a peak-compute arithmetic bound, not a deployable mobile model size.
  options:
    - 1.75 Billion parameters
    - 3500 Billion parameters
    - 1.75 trillion parameters (1750 billion)
    - 17.5 Trillion parameters
