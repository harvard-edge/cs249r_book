title: 'Real-Time ML Inference and WCET Analysis on Snapdragon NPU for AR/VR'
scenario: 'You are leading the ML systems team for an augmented reality application on a mobile device powered by an NPU. Your application performs critical pose estimation that must run within a 16ms frame budget to ensure a smooth 60fps user experience.'
question: 'How would you perform WCET (Worst-Case Execution Time) analysis for real-time ML inference on the NPU to prevent AR jank?'
details:
  realistic_solution: 'Conduct a Worst-Case Execution Time (WCET) analysis using the Snapdragon Profiler. Employ INT8 quantization, operator fusion, and pin critical memory buffers to LPDDR5X to prevent TLB misses. Ensure asynchronous execution decoupled from the render thread.'
  common_mistake: |
    **The Pitfall:** Relying solely on average latency metrics rather than strict WCET analysis.
    **The Rationale:** Candidates design for average case, ignoring system overheads, memory contention, and thermal throttling spikes.
    **The Consequence:** The AR experience suffers unpredictable stutter and jank under peak load, inducing motion sickness in users.
  napkin_math: |
    **Assumptions & Constraints:**
    - Peak NPU Throughput: 45 TOPS.
    - Frame Budget: 60 FPS (16.67ms).

    **Calculations:**
    - Frame Budget (ms): 1 / 60 = 16.67 ms.
    - Theoretical Max Ops/Frame: (45 * 10^12) * 0.01667 = 750 * 10^9 ops.

    **Conclusion & Interpretation:**
    - **Result: 750 Billion ops (Compute-Bound)**. 750 Billion ops/frame is the absolute theoretical maximum; effective ops will be much lower due to thermal and memory limits.
