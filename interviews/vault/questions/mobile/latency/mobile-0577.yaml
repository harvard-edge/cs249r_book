title: The On-Device Speech Recognition
scenario: You're adding on-device speech recognition to a messaging app. You benchmark Whisper-tiny (39M params, FP16) and find it takes 180ms to transcribe 1 second of audio on the NPU, but 950ms on the CPU. The real-time factor (RTF) must be below 1.0 for streaming.
question: How would you calculate the RTF for each, and explain why Whisper's architecture fundamentally conflicts with streaming ASR even when the RTF is acceptable?
details:
  realistic_solution: 'RTF = processing time / audio duration. NPU: 180ms / 1000ms = 0.18 RTF (5.6x real-time). CPU: 950ms / 1000ms = 0.95 RTF (barely real-time). The NPU path seems great, but Whisper has a fundamental architectural problem for streaming: it requires processing audio in fixed 30-second chunks.'
  common_mistake: |
    **The Pitfall:** Concluding that an RTF < 1.0 means the model is suitable for live streaming.
    **The Rationale:** Candidates calculate that Whisper processes audio faster than real-time but ignore the model's required input chunk size (30s).
    **The Consequence:** A model with an acceptable RTF still exhibits a massive 30-second latency, ruining the user experience.
  napkin_math: |
    **Assumptions & Constraints:**
    - NPU compute time: 180ms per 1s of audio.
    - Whisper requires 30s minimum audio input.

    **Calculations:**
    - NPU Whisper RTF: 180ms / 1000ms = 0.18 RTF.
    - Whisper Latency: 30s * 0.18 = 5.4s compute time.

    **Conclusion & Interpretation:**
    - **Result: Whisper forces a 30s wait, violating real-time requirements despite low RTF (Latency-Bound).** Architecture dictates latency floor, independent of throughput.
