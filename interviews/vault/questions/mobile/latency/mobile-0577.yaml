title: Whisper RTF vs Streaming Latency on Mobile
scenario: You're adding on-device speech recognition to a messaging app. You benchmark Whisper-tiny (39M params, FP16) and find it takes 180ms to transcribe 1 second of audio on the NPU, but 950ms on the CPU. The real-time factor (RTF) must be below 1.0 for streaming.
question: How do RTF and chunk buffering determine whether Whisper-tiny can work for low-latency streaming ASR?
details:
  realistic_solution: 'RTF = processing time / audio duration. NPU: 180ms / 1000ms = 0.18 RTF (5.6x real-time). CPU: 950ms / 1000ms = 0.95 RTF (barely real-time). But RTF only measures throughput. Low-latency ASR also depends on the chunking and buffering policy. Common Whisper inference uses a long context window around 30s, so naive chunking can add many seconds before the first output; modified VAD, overlap, and partial-window decoding can reduce this but must be evaluated explicitly.'
  common_mistake: |
    **The Pitfall:** Concluding that an RTF < 1.0 means the model is suitable for live streaming.
    **The Rationale:** Candidates calculate that Whisper processes audio faster than real time but ignore first-output latency from buffering, overlap, VAD, and decoder policy.
    **The Consequence:** A model with acceptable throughput can still feel unusable because the architecture waits on large chunks before producing stable text.
  napkin_math: |
    **Assumptions & Constraints:**
    - NPU compute time: 180ms per 1s of audio.
    - CPU compute time: 950ms per 1s of audio.
    - Common Whisper inference is built around a long context window, often 30s, though modified streaming implementations may use shorter overlapping chunks.

    **Calculations:**
    - NPU Whisper RTF: 180ms / 1000ms = 0.18 RTF.
    - CPU Whisper RTF: 950ms / 1000ms = 0.95 RTF.
    - Naive NPU compute for a 30s window: 30s * 0.18 = 5.4s after that window is available.
    - Naive first-output latency can approach 30s of buffering + 5.4s compute, ignoring overlap and decoding overhead.
    - A shorter streaming policy must budget latency as buffer duration + overlap/VAD delay + compute time; RTF alone is insufficient.

    **Conclusion & Interpretation:**
    - **Result: Latency-bound despite acceptable RTF.** RTF measures throughput, not first-output latency. Whisper can process faster than real time on the NPU, but a naive long-window setup is a poor fit for low-latency streaming unless the chunking, VAD, and overlap strategy are redesigned and measured.
