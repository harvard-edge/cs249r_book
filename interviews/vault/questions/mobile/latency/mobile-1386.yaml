title: Real-time Multimodal Assistant Latency on Hexagon NPU
scenario: You are architecting an on-device real-time visual assistant running entirely on a smartphone powered by the Qualcomm Hexagon NPU. The application streams 30fps camera frames and user audio, processes them through a local 7B parameter multimodal LLM, and outputs synthesized speech. The system must guarantee a Time-to-First-Token (TTFT) under 600ms and a Time-Per-Output-Token (TPOT) under 80ms.
question: How would you schedule a real-time multimodal assistant on Hexagon NPU while avoiding shared memory bottlenecks?
details:
  realistic_solution: |
    Use a Hexagon-centric priority schedule, not just quantization. Treat camera, audio, and OS traffic as reserved background bandwidth, then give the NPU a fixed decode bandwidth budget. The LLM should use W4A8 weights stored once in LPDDR and processed in tiles, with chunked prefill bursts that yield between frame deadlines and steady decode slots paced to the TPOT budget. KV cache pages and activation tiles should be prefetched into local scratch before each decode slot, and decode DMA should be rate-limited with QoS so weight and KV reads cannot starve the camera or audio streams.
  common_mistake: |
    **The Pitfall:** Treating the NPU as a standalone black box.
    **The Rationale:** Candidates ignore memory bandwidth contention on the shared LPDDR5X bus from the camera ISP and DSP audio processing.
    **The Consequence:** Severe degradation of TPOT in real-world scenarios, leading to audio stutter and frame drops.
  napkin_math: |
    **Assumptions & Constraints:**
    - Peak LPDDR5X bandwidth: 68 GB/s.
    - ISP/DSP/OS background usage: 20 GB/s. Available for NPU: 48 GB/s.
    - 7B model W4A8 weights: ~3.5 GB, resident in LPDDR and streamed by tile through the NPU.
    - NPU Effective Compute: 18 TOPS (40% utilization of 45 TOPS).
    - Decode traffic planning allowance: one tiled sweep over W4 weights plus about 0.15 GB KV/activation/DMA traffic per output token.
    - Prompt size: 500 tokens.

    **Calculations:**
    - TPOT bandwidth budget: 48 GB/s * 0.080s = 3.84 GB/token.
    - Decode memory traffic per token = 3.5 GB weights + 0.15 GB KV/activations = 3.65 GB.
    - Decode memory time = 3.65 GB / 48 GB/s = 76 ms/token.
    - Decode compute per token = 2 * 7B ops = 14 GOP; compute time = 14e9 / 18e12 = 0.78 ms, so TPOT is memory-bound.
    - Prefill compute approximation = 500 tokens * 2 * 7B ops/token = 7.0 TOP.
    - Prefill compute time = 7.0 TOP / 18 TOPS = 389 ms, scheduled as 8 chunks of about 49 ms with yields between camera deadlines.
    - TTFT budget = 389 ms prefill + 70 ms multimodal preprocessing + 40 ms first-token decode/postprocess + about 60 ms scheduling guard = 559 ms.

    **Conclusion & Interpretation:**
    - **Result: about 76 ms TPOT and 559 ms TTFT under reserved bandwidth.** W4A8 is necessary but not sufficient; the design only fits if Hexagon decode is QoS-paced, KV/activation traffic stays within the allowance, and prefill is chunked so multimodal streams keep their deadlines.
