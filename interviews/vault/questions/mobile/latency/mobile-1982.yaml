title: A17 Pro AR Burst Processing
scenario: A mobile NPU processes AR frames. Mean service time is 20 ms (range 18-28 ms, CV ~0.15). A naive analysis computes burst drain as 15 frames * 20 ms = 300 ms, treating the NPU as drain-only. The realistic system has three complications - (a) the L1 caches are evicted by the pan, costing an extra +5 ms on the first 3 frames after the burst; (b) service-time variance pushes worst-case per-frame to 28 ms; (c) the camera continues to deliver new frames at 30 fps during drainage, refilling the queue.
question: From the 300ms naive estimate, what is the realistic worst-case queue drain time after cold-cache and arrival effects?
visual:
  kind: svg
  path: mobile-1982.svg
  alt: Queue length graph starting at 15 and linearly draining to 0 over 300ms.
  caption: AR Burst queue drain over time.
details:
  realistic_solution: |
    Treat the 15 queued frames as service-work backlog, then account for new camera arrivals while the NPU is draining. Worst-case service work already in the queue is 3 * (28 + 5) ms + 12 * 28 ms = 435 ms. During drainage, 30 fps arrivals add 30 * 28 ms = 0.84 seconds of new NPU work per elapsed second, leaving only 1 - 0.84 = 0.16 seconds/second of net capacity to reduce the original backlog. The realistic time to empty is therefore 0.435 / 0.16 = 2.72 seconds, not 300 ms.
  common_mistake: |
    **The Pitfall:** Multiplying queue depth by average service time to find drain time.
    **The Rationale:** Candidates ignore the cold-cache penalty, worst-case service variance, and the continued 30 fps open-loop arrival stream during drainage.
    **The Consequence:** Calculating a 300ms recovery time when the true recovery takes seconds, leading to catastrophic UI stutter in AR applications.
  napkin_math: |
    **Assumptions & Constraints:**
    - Queue depth: 15 frames.
    - Cold cache penalty: +5 ms on first 3 frames.
    - Worst-case service time: 28 ms.
    - Arrival rate: 30 FPS (33.3 ms/frame).

    **Calculations:**
    - Initial service-work backlog: 3 * (28 + 5) ms + 12 * 28 ms = 99 ms + 336 ms = 435 ms.
    - Arrival work added per elapsed second: 30 frames/sec * 28 ms/frame = 840 ms/sec.
    - Net backlog-work drain capacity: 1000 ms/sec - 840 ms/sec = 160 ms/sec.
    - Time to empty initial backlog: 435 ms / 160 ms/sec = 2.71875 sec.

    **Conclusion & Interpretation:**
    - **Result: ~2720 ms (Queueing Delay)**. Cold-cache service work plus continued arrivals stretch the drain time to about 2.7 seconds, roughly 9x the naive 300 ms estimate.
