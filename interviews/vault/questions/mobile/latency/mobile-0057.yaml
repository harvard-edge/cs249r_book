title: The Jank Budget
scenario: A new on-device recommendation model runs on the app's main UI thread. During testing, you notice the scrolling animation stutters every time the model runs.
question: To maintain a perfectly smooth 60 frames-per-second experience, what is the maximum time budget you have for all work (rendering + model inference) within a single frame?
details:
  realistic_solution: |
    To maintain a flawless 60 FPS refresh rate, the cumulative work for each UI frame must complete in under 16.67 milliseconds. If UI rendering, layout, and synchronous ML inference mathematically exceed this strict limit, the OS skips the frame, leading to visible scrolling stutter (known as "jank"). This is the foundational reason why any non-trivial ML inference must be entirely decoupled from the main thread and pushed to asynchronous background workers or dedicated NPUs.
  common_mistake: |
    **The Pitfall:** Confusing the frame deadline with general system latency targets or ANR (Application Not Responding) timeouts.
    **The Rationale:** Engineers are used to cloud ML endpoints where a 100ms P99 latency is considered "fast enough" for human perception, completely disregarding the strict calculus of localized display refresh rates.
    **The Consequence:** Deploying inferences to the main thread that systematically drop frames, creating an abysmal user experience that severely damages app retention.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Target display refresh rate: 60 Frames Per Second (FPS).
       - Execution environment: App's main UI thread.
    2. **Calculations:**
       - Total budget per frame: 1000 ms / 60 frames = 16.67 ms.
       - Budget allocation: UI Render Time + Model Inference Time <= 16.67 ms.
    3. **Conclusion & Interpretation:**
       **Result: 16.67 ms absolute budget (Latency-Bound).** Breaching this mathematical threshold forces immediate rendering failures and stutter.
  options:
  - 5000 ms
  - 100 ms
  - 16 ms
  - 33 ms
  correct_index: 2
