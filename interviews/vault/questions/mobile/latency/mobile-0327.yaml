title: The On-Device Autocomplete Queue
scenario: You're designing an AI autocomplete feature for a new smartphone's messaging app. The on-device LLM runs on the phone's NPU. From your benchmarking, you know it has a prefill latency (Time To First Token) of 200ms and a decoding latency (Time Per Output Token) of 50ms. Each autocomplete trigger generates a 6-token suggestion. A fast typist triggers autocomplete every 400ms.
question: 'Can autocomplete keep up when each 6-token suggestion takes 450ms but requests arrive every 400ms?'
details:
  realistic_solution: No, the system cannot keep up. Total service time per request = TTFT + ((tokens - 1) * TPOT) = 200ms + (5 * 50ms) = 200ms + 250ms = 450ms. Arrival interval = 400ms. Because the 450ms processing time is greater than the 400ms arrival interval, the system utilization is >100%. Requests will pile up in the queue, and latency will grow unboundedly.
  common_mistake: |
    **The Pitfall:** Ignoring the Time To First Token (TTFT/prefill) latency.
    **The Rationale:** Engineers often focus solely on the decoding throughput (tokens/sec) and forget that prefill is a significant portion of short-output tasks.
    **The Consequence:** Underestimating total service time, resulting in unbounded queue growth and severe UI lag.
  napkin_math: |
    **Assumptions & Constraints:**
    - TTFT (Prefill): 200ms.
    - TPOT (Decoding): 50ms.
    - Output Length: 6 tokens (1 prefill + 5 decoded).
    - Arrival Interval: 400ms.

    **Calculations:**
    - Decoding Time: 5 additional tokens * 50ms/token = 250ms.
    - Total Service Time per Request: 200ms (TTFT) + 250ms = 450ms.
    - System Utilization (ρ): Service Time / Arrival Interval = 450ms / 400ms = 1.125 (112.5%).

    **Conclusion & Interpretation:**
    - **Result: 112.5% (Queue-Bound)**. Because utilization > 100%, the NPU cannot keep up and latency will grow unboundedly.
  options:
  - 'Yes, it can keep up. The decoding time is only 250ms, which is less than the 400ms arrival time.'
  - 'Yes, it can keep up. The first token appears in 200ms, which is fast enough to feel responsive.'
  - 'No, it cannot keep up. The total service time is 450ms per request, but new requests arrive every 400ms.'
  - 'It depends on the priority of the UI thread.'
