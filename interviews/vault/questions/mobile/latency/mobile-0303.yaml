title: The Live Caption Queueing Delay
scenario: You are designing a 'Live Caption' feature for a messaging app. The feature analyzes frames
  from the video camera in real-time to detect objects and suggest captions.
question: What average queue length results when 30 FPS frames take 25ms each to process on a mobile NPU?
details:
  realistic_solution: Because the camera frames arrive at a strictly deterministic rate (every 33.3ms)
    and the NPU processing time is also deterministic (25ms), this is a D/D/1 queueing system. Since the
    service time is strictly less than the arrival interval, the system completes processing each frame
    before the next one arrives, resulting in an average queue length of exactly 0.
  common_mistake: '**The Pitfall:** Checking only if service time is less than arrival time and assuming
    no latency issues exist.

    **The Rationale:** Ignoring the variance in real-world systems where high utilization leads to queuing
    delays.

    **The Consequence:** The feature experiences severe, unexplained jitter during spikes in user activity.

    '
  napkin_math: '**Assumptions & Constraints:**

    - Arrival Rate: Deterministic, 1 frame every 33.3ms (30 FPS).

    - Service Time: Deterministic, 25ms per frame.

    - Queue Model: D/D/1 (Deterministic arrivals and service).


    **Calculations:**

    - Arrival Interval = 33.3ms.

    - Processing Time = 25ms.

    - Because processing time (25ms) is strictly less than the arrival interval (33.3ms), each frame finishes
    processing before the next arrives.

    - Average Queue Length = 0.


    **Conclusion & Interpretation:**

    - **Result: 0 frames (Compute-Bound)**. No queue forms because the deterministic processing is strictly
    faster than the deterministic arrival rate.

    '
  options:
  - 3.0 frames
  - 0.75 frames
  - 0 frames, because service time is less than the arrival interval
  - 2.25 frames
  correct_index: 3
