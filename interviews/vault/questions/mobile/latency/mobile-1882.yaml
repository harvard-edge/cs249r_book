title: A17 NPU Deterministic Queue
scenario: "An Apple A17 Pro Neural Engine processes live dictation text. Tokens arrive at 10 tokens/sec. The NPU processes each token in a constant 20 ms."
question: "Calculate the average queue depth and total latency per token, treating the system as an M/D/1 queue."
visual:
  kind: svg
  path: mobile-1882.svg
  alt: Line chart comparing M/M/1 vs M/D/1 wait times.
  caption: M/M/1 vs M/D/1 delay comparison.
details:
  realistic_solution: "Recognize that an NPU enforces strict, deterministic service times. Use M/D/1 queuing formulas rather than exponential distributions to calculate the waiting time, then append the constant processing time to find total system latency."
  common_mistake: |
    **The Pitfall:** Applying standard M/M/1 queueing formulas which assume exponentially distributed service times.
    **The Rationale:** Candidates default to familiar networking queue models, failing to realize that hardware accelerators execute deterministic operations.
    **The Consequence:** Overestimating the queueing delay by exactly a factor of 2, leading to over-provisioned buffers or unnecessary hardware scaling.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Arrival rate (λ) = 10 tokens/sec.
       - Constant Service time (D) = 20 ms = 0.02 s.
    2. **Calculations:**
       - Utilization (ρ) = λ * D = 10 * 0.02 = 0.2.
       - M/D/1 Queue Length (L_q) = ρ^2 / (2(1 - ρ)) = 0.04 / (2 * 0.8) = 0.04 / 1.6 = 0.025 tokens.
       - Wait Time (W_q) = L_q / λ = 0.025 / 10 = 0.0025 s = 2.5 ms.
       - Total Latency = 20 ms + 2.5 ms = 22.5 ms.
    3. **Conclusion & Interpretation:**
       - **Result: Latency-Bound.** The deterministic nature of the NPU means the wait time is precisely halved compared to M/M/1, resulting in a total latency of **22.5 ms**.
