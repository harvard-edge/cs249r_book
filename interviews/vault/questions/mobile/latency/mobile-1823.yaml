title: Mobile Assistant Latency Budget
scenario: A mobile assistant has a 250 ms interaction budget. NPU encoder inference takes 70 ms, decoder setup 25 ms, app scheduling 20 ms, and network fallback adds 120 ms only if local confidence is low.
question: How much latency headroom remains on the local mobile path before a 250 ms budget is exceeded?
details:
  realistic_solution: |
    The deterministic local path consumes 115 ms, granting a comfortable 135 ms of architectural headroom. However, triggering the non-deterministic network fallback pushes the critical path to 235 ms. To guarantee SLA compliance, engineers must instrument strict timeouts and establish dynamic thresholding logic to aggressively clamp the frequency of network fallbacks, while monitoring OS scheduling variance (P99) to prevent background tasks from eroding the final 15ms buffer.
  common_mistake: |
    **The Pitfall:** Looking only at NPU inference and ignoring surrounding latency.
    **The Rationale:** Candidates often treat model execution time as the sole latency metric.
    **The Consequence:** They miss app scheduling and network fallback delays, overestimating available headroom.
  napkin_math: |
    **Assumptions & Constraints:**
    - Total Latency Budget: 250 ms.
    - Local Compute: 70 ms (encoder) + 25 ms (decoder) = 95 ms.
    - Overhead: 20 ms (scheduling).
    - Network Fallback: +120 ms.

    **Calculations:**
    - Total Local Path Latency = 95 ms + 20 ms = 115 ms.
    - Local Headroom = 250 ms - 115 ms = 135 ms.
    - Total Fallback Path Latency = 115 ms + 120 ms = 235 ms.
    - Fallback Headroom = 250 ms - 235 ms = 15 ms.

    **Conclusion & Interpretation:**
    - **Result: 15 ms headroom (Network Latency-Bound)**. The local model maintains massive headroom. The true system fragility lies in the 120ms cloud fallback, which nearly exhausts the 250ms budget, demanding strict failure-rate management.
