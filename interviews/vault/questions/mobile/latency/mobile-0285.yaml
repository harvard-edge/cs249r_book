title: The Real-Time Dashcam Dilemma
scenario: "You're building a real-time 'dashcam' feature for a mobile app running on a smartphone with an Apple A17 Pro NPU, which delivers 35 TOPS for INT8 inference. To avoid UI 'jank', your entire detection pipeline must finish within a 16ms budget per frame."
question: "How many objects can your system theoretically detect in a single frame before dropping below the real-time deadline, assuming 2 Giga-Ops per object?"
details:
  realistic_solution: "Calculate the absolute ceiling by converting the NPU's Tera-Ops per second capacity into Giga-Ops per timeframe slice. Then divide the available ops by the workload per object. Real-world implementations will achieve fewer objects due to memory orchestration, but this bounds the theoretical limit."
  common_mistake: |
    **The Pitfall:** Making a unit conversion error, typically by failing to convert the 16ms deadline into seconds to match the seconds unit in TOPS.
    **The Rationale:** Ignoring the time budget entirely and trying to divide the headline TOPS number directly by the Ops-per-object.
    **The Consequence:** Leading to a wildly incorrect capacity estimate (e.g., millions of objects instead of hundreds), resulting in an architectural design that catastrophically fails in real-time.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - NPU Peak: 35 TOPS (35e12 ops/s).
       - Time Budget: 16 ms = 0.016 s.
       - Per object computation: 2 Giga-Ops (2e9 ops).
    2. **Calculations:**
       - Total ops available in budget = 35e12 * 0.016 = 560e9 = 560 Giga-Ops.
       - Max objects = 560 Giga-Ops / 2 Giga-Ops = 280 objects.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound.** The theoretical limit is **280 objects** per frame, though memory scheduling will lower this practically to ~140-200.
  options:
  - 17 objects
  - 280,000 objects
  - 280 objects
  - 1 object
  correct_index: 2
