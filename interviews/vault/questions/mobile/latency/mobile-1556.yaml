title: Latency Decomposition for Mobile ML on Snapdragon NPU
scenario: You are evaluating two ML architectures for real-time 30 FPS semantic segmentation on an NPU. Architecture A runs the main segmentation model on the NPU with CPU pre/post-processing. Architecture B runs a lightweight feature extraction backbone on the NPU, passing heavy intermediate feature maps to the CPU/GPU for the segmentation head.
question: How would you profile and decompose latency components to determine which architecture offers better real-time performance?
details:
  realistic_solution: 'A rigorous latency decomposition requires hardware-specific profiling tools (e.g., nsys) to isolate computational execution from data movement overhead. Architecture A keeps the bulk of the dense mathematical operations bounded within the NPU''s localized memory hierarchy. Architecture B forces the continuous transfer of high-dimensional intermediate feature maps across the system Network-on-Chip (NoC). Because mobile SoCs share a unified memory bus, this cross-processor transfer incurs a massive latency penalty that dwarfs any theoretical compute savings from the CPU/GPU head. Optimization must strictly prioritize minimizing data movement and avoiding graph fragmentation.'
  common_mistake: |
    **The Pitfall:** Focusing solely on the NPU's inference speed without accounting for data transfer overhead between host memory and accelerator memory.
    **The Rationale:** Engineers assume memory buses are infinitely fast and underestimate the latency penalty of passing high-resolution feature maps across the SoC.
    **The Consequence:** Choosing Architecture B, which theoretically optimizes compute but practically destroys latency and battery life through constant memory thrashing.
  napkin_math: |
    **Assumptions & Constraints:**
    - NPU theoretical throughput: 45 TOPS INT8.
    - Segmentation compute: ~30 GOPS.
    - Memory bandwidth: 50 GB/s.
    - Input image size: 6 MB.
    - Intermediate feature map size (Arch B): 120 MB.

    **Calculations:**
    - Theoretical NPU inference (Arch A): 30 GOPS / 45 TOPS = ~0.66 ms.
    - Memory transfer (Arch A): 6 MB / 50 GB/s = 0.12 ms.
    - Memory transfer (Arch B): 120 MB / 50 GB/s = 2.4 ms per transfer.

    **Conclusion & Interpretation:**
    - **Result: 2.4 ms (Memory Bus-Bound)**. Architecture B fundamentally inflates latency by introducing a 2.4ms data movement bottleneck, making Architecture A vastly superior.
