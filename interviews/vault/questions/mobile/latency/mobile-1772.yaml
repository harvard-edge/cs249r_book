title: On-Device Inference Queue Latency on A17 Pro
scenario: An iOS app uses the A17 Pro Neural Engine for real-time photo enhancement. Users submit requests at 5/s during burst editing sessions. Each enhancement takes 150ms.
question: What is the mean end-to-end latency and p99, and should the UX team expect snappy responses?
details:
  realistic_solution: 'M/M/1 queueing analysis: mean wait Wq = 450ms. Mean total W = 150+450=600ms. p99 ≈ 2.75s! Recommendation: queue UX feedback immediately (show preview), cap λ to 3/s with debouncing (ρ=0.45 → Wq=125ms, W=275ms total).'
  common_mistake: |
    **The Pitfall:** Quoting only service time (150ms) as the user-perceived latency.
    **The Rationale:** Ignoring queuing delay entirely when utilization is high (ρ=0.75).
    **The Consequence:** Promising a "snappy" 150ms experience when users will actually encounter p99 latencies of almost 3 seconds during bursts.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Arrival rate (λ): 5/s.
       - Service time: 150ms -> Service rate (μ) = 1 / 0.15s = 6.67/s.
    2. **Calculations:**
       - Utilization (ρ) = λ / μ = 5 / 6.67 = 0.75.
       - Mean queue wait (Wq) = ρ / (μ(1-ρ)) = 0.75 / (6.67 * 0.25) = 450ms.
       - Mean total wait (W) = Wq + 150ms = 600ms.
       - p99 wait ≈ 4.6 / (μ(1-ρ)) ≈ 2.75 seconds.
    3. **Conclusion & Interpretation:**
       - **Result: Queue-Bound. p99 wait is roughly 2.75 seconds, destroying the perception of real-time responsiveness.**
