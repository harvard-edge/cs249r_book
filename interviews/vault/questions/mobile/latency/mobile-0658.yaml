title: The AutoScribe Jank Crisis
scenario: You are designing the 'AutoScribe' feature for an electric vehicle. It transcribes spoken notes in real-time onto the UI while an on-device LLM concurrently summarizes them in the background.
question: How should transcription and LLM summarization be scheduled to avoid UI freezes and meet real-time deadlines?
details:
  realistic_solution: |
    Design a preemptive, real-time token-interleaved scheduling system. Because the SoC utilizes a unified memory architecture, launching a monolithic LLM prefill operation will saturate the DDR memory bus. This starvation halts the GPU's ability to fetch vertex/texture data, causing a catastrophic UI freeze. The LLM workload must be chunked into interruptible micro-tasks (e.g., computing attention for small token windows), executing only during the idle margins of the 16.6ms UI rendering cycle and the real-time transcription DSP deadlines.
  common_mistake: |
    **The Pitfall:** Simply assigning the LLM to the NPU and transcription to the CPU.
    **The Rationale:** Candidates ignore the scheduling and resource contention problem on unified memory.
    **The Consequence:** A large LLM prefill monopolizes the memory bus, starving the GPU and causing a catastrophic UI freeze.
  napkin_math: |
    **Assumptions & Constraints:**
    - Display refresh rate: 60 FPS (16.6ms frame budget).
    - Transcription context: 1 minute of speech = ~2048 tokens.
    - Model size: 1.5B parameter LLM.

    **Calculations:**
    - A 1.5B LLM prefill phase for 2048 tokens requires massive parallel matrix multiplications.
    - Continuous memory bus saturation time: >500 ms.
    - Frame drops = 500 ms / 16.6 ms = ~30 frames dropped sequentially.

    **Conclusion & Interpretation:**
    - **Result: ~30 frames dropped (Memory Bus Contention)**. Treating the LLM as a background CPU thread is fatal. The unified memory bus is the true bottleneck, and saturating it for >500ms guarantees a 0.5-second UI freeze unless the prefill is explicitly time-sliced.
