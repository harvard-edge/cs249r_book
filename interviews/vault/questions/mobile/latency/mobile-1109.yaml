title: A17 Pro Neural Engine Memory Bottleneck
scenario: A real-time language model generates tokens on an Apple A17 Pro, requiring 70 GOPS of compute and about 0.5 GB of model working-set memory traffic per token. The Neural Engine shares unified memory, but concurrent GPU rendering restricts its available memory bandwidth to 25 GB/s, causing severe compute underutilization.
question: Why is the Neural Engine underutilizing its 35 TOPS compute capacity, and what is the system bottleneck?
details:
  realistic_solution: Profiling reveals severe underutilization because the autoregressive decode phase is memory-bandwidth bound. In the Unified Memory Architecture (UMA), active GPU rendering starves the NPU of bandwidth. With only 25 GB/s available, the NPU stalls waiting for roughly 0.5 GB of model working-set traffic per token, rendering its 35 TOPS capacity largely idle.
  common_mistake: |
    **The Pitfall:** Calculating latency solely based on peak compute TOPS.
    **The Rationale:** Failing to account for shared unified memory architecture where CPU/GPU workloads can starve the NPU of bandwidth.
    **The Consequence:** Erroneously assuming execution is compute-bound and wildly overestimating system throughput.
  napkin_math: |
    **Assumptions & Constraints:**
    - Compute required: 70 GOPS per token.
    - Model working-set memory traffic: 0.5 GB per token.
    - Available bandwidth: 25 GB/s.
    - NPU Peak Compute: 35 TOPS.

    **Calculations:**
    - Compute time: 70 GOPS / 35,000 GOPS (35 TOPS) = 2 ms.
    - Memory time: 0.5 GB / 25 GB/s = 20 ms.
    - Hardware ridge point: 35,000 GOPS / 25 GB/s = 1,400 OPS/byte.
    - Model arithmetic intensity: 70 GOPS / 0.5 GB = 140 OPS/byte.

    **Conclusion & Interpretation:**
    - **Result: ~20 ms per token (Memory-Bandwidth Bound)**. Arithmetic intensity (140 OPS/byte) is far below the 1,400 OPS/byte ridge point, so memory traffic, not peak compute, sets the latency.
