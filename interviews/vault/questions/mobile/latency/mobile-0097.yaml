title: The OS Scheduler's Dilemma
scenario: You're designing a complex multi-modal mobile AI application that simultaneously uses a vision model (on GPU/NPU) and an audio model (on CPU). Both need low-latency, real-time inference.
question: How does the mobile OS scheduler interact with these heterogeneous workloads, and what challenges arise in ensuring QoS?
details:
  realistic_solution: |
    Treat audio, CPU dispatch, and accelerator work as separate QoS domains rather than trying to force everything with user-space thread affinity. The audio callback should run through the platform's real-time audio path with bounded work, preallocated buffers, and priority appropriate for low-latency audio; it should not be blindly pinned to big cores, because that can increase power and thermal pressure. Vision work should use the GPU/NPU runtime queues and driver/HAL mechanisms, with CPU dispatcher threads kept responsive through task groups, cpusets, priority tuning, and avoiding blocking calls. Coordinate with the platform power/DVFS hints so the CPU, memory bus, and accelerator clocks are raised for the active multimodal session, while accepting that GPU/NPU scheduling is mediated by drivers and cannot be made real-time simply by applying SCHED_FIFO to a user-space dispatcher.
  common_mistake: |
    **The Pitfall:** Assuming the OS effortlessly runs workloads in parallel because of multi-core availability.
    **The Rationale:** Developers rely on cloud-centric concurrency models, ignoring mobile's aggressive power management and heterogeneous architecture.
    **The Consequence:** Unpredictable thermal throttling, severe OS jitter, and CPU-thread preemption that stalls GPU/NPU dispatching.
  napkin_math: |
    **Assumptions & Constraints:**
    - Prime Core Power: 1.5W @ 2.8GHz.
    - Little Core Power: 0.3W @ 1.8GHz.
    - Total Memory Bandwidth: 50 GB/s.
    - Task Bandwidth Demand: Vision = 30 GB/s, Audio CPU Threads = 10 GB/s.

    **Calculations:**
    - Peak Bandwidth Demand: 30 GB/s + 10 GB/s = 40 GB/s.
    - Bus Saturation: 40 GB/s / 50 GB/s = 80%.

    **Conclusion & Interpretation:**
    - **Result: 80% bus saturation (Contention-Bound)**. High memory bus utilization leaves minimal headroom, exacerbating OS scheduling jitter and breaking real-time SLAs.
