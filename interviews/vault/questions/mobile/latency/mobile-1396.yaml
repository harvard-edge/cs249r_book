title: Heterogeneous Pipeline Profiling on Snapdragon 8 Gen 3
scenario: You are deploying a real-time AR video pipeline. The system captures frames, runs an INT8 vision model on the NPU, and processes embeddings on the CPU. The pipeline's end-to-end latency is 48ms per frame, missing the 33ms target.
question: How would you profile this heterogeneous pipeline to find NPU stalls and memory bottlenecks, and what architectural changes eliminate the 15ms overhead?
details:
  realistic_solution: |
    A mastery-level engineer would employ hardware profiling tools (e.g., Snapdragon Profiler, nsys profiling) to generate trace timelines correlating CPU context switches with NPU execution stalls. They would discover that the model graph is heavily partitioned, causing frequent CPU fallbacks. The solution requires designing a novel architecture that fuses operations into a single NPU graph, utilizing AHardwareBuffer (ION/dmabuf) for zero-copy I/O to keep activations purely within the NPU's tightly coupled memory (TCM).
  common_mistake: |
    **The Pitfall:** Focusing strictly on optimizing matrix multiplications or reducing parameter counts.
    **The Rationale:** Engineers assume the model architecture is the slow part, ignoring synchronization and kernel dispatch overheads.
    **The Consequence:** Endless model pruning that yields zero latency improvements.
  napkin_math: |
    **Assumptions & Constraints:**
    - Data Transfer: 5 subgraphs * 6.2MB = 31MB
    - Transfer Bandwidth: 40 GB/s
    - Context Switch Overhead: 3ms per invocation

    **Calculations:**
    - Data Transfer Time: 31 MB / 40 GB/s = ~0.8 ms
    - Total OS/RPC Overhead: 5 invocations * 3 ms = 15 ms

    **Conclusion & Interpretation:**
    - **Result: 15 ms (OS Scheduler and I/O-Bound)**. The 15ms overhead is entirely due to context switches, not compute.
