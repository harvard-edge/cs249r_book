title: 'Latency Decomposition: Compare On-Device vs. Cloud LLM Latency on A17 Pro'
scenario: An iOS app team debates between on-device NPU inference vs. a cloud API (100ms network RTT) for a 1B-parameter language model generating 50 tokens.
question: For a 1B language model, which deployment approach wins TTFT and TPOT for 50 tokens?
details:
  realistic_solution: 'On-device: 1B INT8 model = 1GB, fits easily. NPU bandwidth ~68 GB/s effective. Decode: 1GB/68GB/s \u2248 14.7ms/token * 50 = 735ms. TTFT (64-token prefill): memory-bound at 14.7ms (compute takes only 3.7ms: 2*64*1B/35T). Cloud: TTFT = 100ms RTT + 27ms prefill = 127ms. TPOT = 0.6ms/token. Cloud wins TPOT (0.6 vs 14.7ms) but on-device wins TTFT (14.7ms vs 127ms) and works offline.'
  common_mistake: |
    **The Pitfall:** Assuming cloud always wins on raw compute without accounting for network latency.
    **The Rationale:** Candidates often ignore that network RTT dominates Time-To-First-Token (TTFT), especially on mobile networks.
    **The Consequence:** Deploying cloud solutions that feel sluggish to the user compared to instant on-device responses.
  napkin_math: |
    **Assumptions & Constraints:**
    - On-device: 1B INT8 model (1 GB). NPU bandwidth ~68 GB/s. Compute ~35 TOPS.
    - Cloud: 100ms RTT. Prefill takes 27ms. Cloud TPOT = 0.6ms/token.

    **Calculations:**
    - On-Device Decode (TPOT) = 1 GB / 68 GB/s = 14.7 ms/token.
    - On-Device Prefill (TTFT) = Compute for 64 tokens = (2 * 64 * 1B) / 35 TOPS = 3.7 ms. Memory load = 14.7 ms. (Memory-bound at 14.7 ms).
    - Cloud Decode (TPOT) = 0.6 ms/token.
    - Cloud Prefill (TTFT) = 100 ms RTT + 27 ms compute = 127 ms.

    **Conclusion & Interpretation:**
    - **Result: On-device wins TTFT 14.7 ms vs 127 ms (Network-latency-bound TTFT)**. Cloud wins TPOT (0.6 ms vs 14.7 ms) but on-device is faster for initial response.
