title: The Synchronous Inference ANR
scenario: A junior engineer on your team implements a new 'Magic Retouch' feature. When the user clicks a button, a large, synchronous ML model runs on the main UI thread to apply a filter to a high-resolution photo. The model takes 6 seconds to complete.
question: What is the exact user experience on an Android device when that button is tapped?
details:
  realistic_solution: 'When the user taps the button, the main UI thread will be blocked by the 6-second model inference. Since this duration exceeds the standard 5-second input dispatch timeout on Android, the operating system will intervene. After 5 seconds of unresponsiveness, the OS will display the ''Application Not Responding'' (ANR) dialog. This system dialog gives the user the option to either ''Wait'' or ''Close'' the app. This is a critical failure state, much worse than simple jank, and frequently leads users to kill the app and leave negative reviews. The correct implementation is to run the inference on a background thread and display a loading indicator.'
  common_mistake: |
    **The Pitfall:** Describing the problem simply as the UI 'freezing' or becoming 'unresponsive'.
    **The Rationale:** Candidates often miss the critical OS-level intervention that occurs when the main thread is blocked for too long.
    **The Consequence:** Underestimating the severity of the failure, which leads to user frustration and negative app reviews.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model inference time = 6 seconds.
    - Task executes synchronously on the main UI thread.
    - Android OS input dispatch timeout = 5 seconds.

    **Calculations:**
    - Unresponsive time = 6 seconds.
    - 6 seconds > 5 seconds timeout threshold.

    **Conclusion & Interpretation:**
    - **Result: 6s exceeds 5s OS threshold (Main-thread-bound critical failure)**. An Application Not Responding (ANR) dialog is triggered before inference finishes.
  options:
  - The app will feel unresponsive for 6 seconds, then continue normally.
  - The app will immediately crash due to an out-of-memory error.
  - The UI will freeze, and after 5 seconds, an 'Application Not Responding' (ANR) dialog will appear.
  - The OS will automatically restart the app after detecting the long-running task.
