title: Gemini Nano TTFT Decomposition on Tensor G3
scenario: You are deploying an edge LLM (a 2-billion parameter INT8 model) for text summarization on a mobile NPU. Telemetry reveals that when processing a 1000-token input prompt, the Time To First Token (TTFT) is exactly 600ms.
question: What components make up the 600ms TTFT on the NPU, and which hardware limit dominates?
details:
  realistic_solution: |
    End-to-end TTFT decomposes into preprocessing (text normalization and tokenization), the prefill forward pass (loading weights and computing activations), and postprocessing (sampling the first token). During the prefill forward pass, the model processes all 1000 input tokens in parallel. Because it matrix-multiplies the entire weight matrix against a large activation matrix, the compute requirements scale linearly with the input sequence length. The NPU's TOPS ceiling strictly limits how fast these operations can execute, making raw arithmetic throughput the dominant bottleneck that accounts for the vast majority of the 600ms TTFT.
  common_mistake: |
    **The Pitfall:** Assuming TTFT is strictly bottlenecked by memory bandwidth like the autoregressive decoding phase.
    **The Rationale:** Candidates know LLMs are notoriously memory-bound, failing to distinguish between the parallel arithmetic intensity of the prefill stage and the serial nature of decode.
    **The Consequence:** Misidentifying the bottleneck and misapplying optimizations (e.g., extreme quantization) when NPU compute scheduling is the actual fix.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Hardware: Mobile NPU rated at ~7.5 TOPS INT8 compute.
       - Model: 2 Billion parameters, INT8 precision.
       - Input Prompt: 1000 tokens.
    2. **Calculations:**
       - Total Compute Operations (Prefill): 2 * 2,000,000,000 params * 1000 tokens = 4,000,000,000,000 operations (4 Tera-ops).
       - Compute Time: 4 TOps / 7.5 TOPS peak = 0.533 seconds (533 ms).
       - Unaccounted Overhead: 600 ms TTFT - 533 ms = 67 ms (preprocessing, KV cache init, sampling).
    3. **Conclusion & Interpretation:**
       **Result: 89% of TTFT is Prefill Compute (Compute-Bound).** NPU raw execution directly dominates latency; memory bandwidth is only the primary bottleneck during token generation.
