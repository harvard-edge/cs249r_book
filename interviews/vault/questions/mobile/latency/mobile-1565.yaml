title: 'Real-time Semantic Segmentation on Exynos 2400: Latency Bottleneck Design'
scenario: You are tasked with designing and optimizing a real-time semantic segmentation model for a flagship mobile camera application running on a device powered by the Samsung Exynos 2400 NPU. The critical requirement is to achieve an end-to-end inference latency of under 30ms for a 1080p input resolution.
question: How would you profile and identify latency bottlenecks to preemptively meet the 30ms constraint on the Exynos 2400?
details:
  realistic_solution: Employ a holistic system-level profiling strategy using vendor-specific tools (e.g., Arm Streamline or Samsung's NPU profiler). Begin by estimating memory bandwidth requirements for the full data pipeline (camera DMA -> ISP -> LPDDR5X -> NPU SRAM -> Display), as this is typically the primary bottleneck. Analyze operator mapping to ensure critical layers execute natively on the NPU rather than falling back to the CPU/GPU, which causes expensive cross-chip synchronization. Micro-benchmark critical sub-graphs and optimize data formats (e.g., NHWC vs. NCHW) to maximize DMA efficiency.
  common_mistake: |
    **The Pitfall:** Focusing solely on the NPU's theoretical TOPS while ignoring system I/O.
    **The Rationale:** Candidates often neglect real-world model characteristics, pre/post-processing overhead, cache misses, and CPU/NPU synchronization delays.
    **The Consequence:** The system design fails to meet the 30ms latency deadline due to unforeseen memory bandwidth saturation and context-switching bottlenecks.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model requires 200 GOPS per frame.
       - Exynos 2400 NPU provides 34.7 TOPS.
       - 1080p RGB Input (6MB) + Output Mask (2MB) = 8MB total transfer per frame.
       - LPDDR5X peak bandwidth = ~85 GB/s.
    2. **Calculations:**
       - Compute Time = 200 GOPS / 34,700 GOPS = ~5.7ms.
       - Transfer Time = 8 MB / 85 GB/s = ~0.094ms.
       - Remaining Budget = 30ms - 5.7ms - 0.1ms = 24.2ms.
    3. **Conclusion & Interpretation:**
       - The remaining 24.2ms must accommodate CPU/NPU handoffs, OS scheduling, and ISP contention.
       - **Result: I/O and Synchronization Bound (24.2ms overhead budget)**.
