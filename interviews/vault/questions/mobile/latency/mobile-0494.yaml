title: 'The Stuttering AI Assistant: Real-Time Deadlines'
scenario: 'You are a Mobile ML engineer tuning a new on-device AI type-ahead assistant that runs on an Apple A17 Pro. The UI must render a new token every 16ms to avoid visual stutter. The team is using a 3B parameter LLM (INT8) and a simple static batching approach: it waits up to 8ms to collect multiple incoming requests into a batch of 4 before processing. You diagnose that while the average TPOT is acceptable, the TTFT frequently exceeds the 16ms budget.'
question: 'What is the most likely cause of the missed deadlines?'
details:
  realistic_solution: 'The system is fundamentally memory-bandwidth bound, and the static batching strategy makes the latency worse. The 16ms ''jank'' budget is violated by two factors: first, the 8ms static batching window introduces a queuing delay that consumes half the budget before inference even starts. Second, the inference itself, dominated by loading the 3GB of model weights from DRAM, takes nearly 44ms. The combination of queuing delay and the memory-bound model pass makes meeting the real-time deadline impossible. Switch to a continuous batching or first-come-first-served strategy.'
  common_mistake: |
    **The Pitfall:** Focusing only on compute (TOPS) or assuming batching strategies designed for throughput also improve latency.
    **The Rationale:** Engineers apply cloud-centric serving intuitions (where batching is king) to edge devices.
    **The Consequence:** Implementing artificial queuing delays that immediately blow the real-time UI jank budget.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 3B INT8 model (3 GB weights).
       - A17 Pro unified memory bandwidth: ~68 GB/s.
       - UI jank budget: 16 ms.
       - Static batching delay: 8 ms.
    2. **Calculations:**
       - Memory load time: 3 GB / 68 GB/s = 44 ms.
       - Total TTFT: 8 ms (queuing) + 44 ms (memory load) = 52 ms.
    3. **Conclusion & Interpretation:**
       - **Result: 52 ms > 16 ms (Memory Bandwidth-Bound & Queuing Delay).**
  options:
  - The A17 Pro's compute is insufficient for a 3B model, making the operation compute-bound.
  - Continuous inference causes thermal throttling, increasing TTFT to > 60 ms.
  - The 8ms static batching queue and the ~44ms memory-bound weight load collectively exceed the 16ms budget.
  - The phone's CPU dispatch latency adds a 50 ms overhead before the Neural Engine starts.
  correct_index: 2
