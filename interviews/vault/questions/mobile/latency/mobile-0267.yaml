title: The Voice Assistant's First Word
scenario: You are optimizing an on-device voice assistant that uses a small LLM to generate streaming responses.
question: To ensure the user perceives the assistant as immediately responsive after they ask a question, which of the following latency metrics is the most critical to minimize?
details:
  realistic_solution: The most critical metric is Time to First Token (TTFT). This is the time from the end of the user's prompt to the model producing its first output token. For interactive applications like a voice assistant, a low TTFT (e.g., < 300ms) provides immediate feedback that the system is working, which is more important for perceived responsiveness than the speed of the subsequent words.
  common_mistake: |
    **The Pitfall:** Focusing on overall throughput (Time Per Output Token, or TPOT) instead of initial delay.
    **The Rationale:** Engineers mistakenly prioritize the speed of subsequent words, forgetting that the user's perception of 'lag' is determined entirely by the delay before the first word appears.
    **The Consequence:** The system feels slow and unresponsive, even if the total generation time is fast.
  napkin_math: |
    1. **Model A:** TTFT = 800ms, TPOT = 50ms/token. Feels laggy before starting, but streams fast.
    2. **Model B:** TTFT = 300ms, TPOT = 80ms/token. Feels instantly responsive, streams slightly slower.
    3. **Conclusion:** For interactive voice, **Model B** provides a vastly superior user experience due to the minimized TTFT.
  options:
  - Time Per Output Token (TPOT)
  - Total generation time for the full response
  - Time to First Token (TTFT)
  - NPU delegation ratio
  correct_index: 2
