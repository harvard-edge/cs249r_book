title: The 16ms Jank Budget
scenario: Your team is debugging a new on-device feature that causes the app's scrolling to feel sluggish.
question: 'To ensure a smooth 60 frames-per-second user experience, what is the total latency budget you have to render a single frame before the user perceives jank?'
details:
  realistic_solution: The total budget for one frame at 60 FPS is approximately 16 milliseconds. If the combination of OS overhead, app logic, and model inference exceeds this budget, the system will drop a frame, leading to visible stutter or 'jank'.
  common_mistake: |
    **The Pitfall:** Confusing the UI frame budget with server-side API latency targets or standard video framerates.
    **The Rationale:** Engineers often recall the 33ms budget for 30 FPS video or the ~100ms P99 latency common in cloud microservices.
    **The Consequence:** Setting incorrect performance SLAs, resulting in visually poor and stuttering mobile experiences.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target Framerate: 60 Frames Per Second (FPS).

    **Calculations:**
    - Time per Frame = 1 second / 60 frames.
    - 1000 milliseconds / 60 = 16.66 ms.

    **Conclusion & Interpretation:**
    - **Result: 16.66 ms (Latency-Bound)**. Absolute maximum latency budget before dropping a frame.
  options:
  - '100 ms'
  - '33 ms'
  - '16 ms'
  - '5 ms'
  correct_index: 2
