title: The Real-Time Translation Jank
scenario: 'You''re debugging a new on-device translation feature. You measure the model''s performance: it takes 150ms to generate the first token (TTFT), and then 30 tokens per second for subsequent tokens (TPOT). The UI team''s render budget to avoid jank is 16ms per frame.'
question: How would you compare the model's token generation latency to the UI frame budget to determine the source of the jank?
details:
  realistic_solution: The fundamental cause of the jank is synchronous blocking of the main UI thread during generation. A throughput of 30 tokens/sec translates to an individual token latency of ~33.3ms. Because this dramatically exceeds the strict 16ms render budget, generating every single token monopolizes the thread for over two full frame cycles, completely starving the display controller and manifesting as severe UI stutter.
  common_mistake: |
    **The Pitfall:** Focusing solely on the throughput metric (30 tokens/sec) and assuming the steady state is "fast enough."
    **The Rationale:** Engineers equate high tokens/second directly with acceptable UI performance without converting to strict per-token latency deadlines.
    **The Consequence:** They falsely blame the 150ms TTFT for the jank, completely missing that the sustained 33.3ms generation latency is actively destroying the 16ms render loop.
  napkin_math: |
    **Assumptions & Constraints:**
    - Generation rate: 30 tokens per second.
    - TTFT: 150 ms.
    - UI Render Budget: 16 ms per frame (60 FPS target).

    **Calculations:**
    - Per-token latency (TPOT): 1000 ms / 30 tokens = 33.3 ms.
    - Frame budget comparison: 33.3 ms > 16 ms (misses deadline by > 2x).

    **Conclusion & Interpretation:**
    - **Result: Latency-Bound**. Each generated token takes ~33.3ms, explicitly blocking the UI thread for two full 16ms render cycles, resulting in continuous stuttering.
  options:
  - 30 tokens/sec is high throughput; the model isn't the bottleneck.
  - The 150ms TTFT causes a 9-frame initial drop; subsequent tokens are fast enough.
  - At ~33.3ms per token, synchronous inference blocks the main UI thread for over two 16ms frames.
  - The UI thread is blocked for 16ms, creating a 50% inference timeout.
