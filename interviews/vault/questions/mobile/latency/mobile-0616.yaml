title: The 60 FPS Camera ML Pipeline
scenario: You must design a camera pipeline that runs portrait segmentation at 60 FPS with ML-powered depth-of-field blur. The segmentation model takes 25ms per frame on the NPU, but the camera outputs at 60 FPS (16.67ms per frame).
question: How do you deliver a smooth 60 FPS experience when the model takes longer than the frame time?
details:
  realistic_solution: Design a **decoupled multi-rate pipeline** where the camera and renderer stay at 60 FPS while ML runs asynchronously at the rate the NPU can sustain. Use a latest-frame buffer, run segmentation on selected frames, and reuse or temporally warp the most recent mask for intervening display frames. The goal is smooth 60 FPS presentation, not forcing every camera frame through a 25ms model inside the 16.67ms render window.
  common_mistake: |
    **The Pitfall:** Trying to find a faster model that fits entirely within the 16.67ms frame window.
    **The Rationale:** Assuming ML processing must be synchronous with the display render cycle.
    **The Consequence:** Dropping frames entirely whenever the OS pauses, leading to horrible user experience.
  napkin_math: |
    **Assumptions & Constraints:**
    - Camera/render output = 60 FPS (16.67ms/frame).
    - NPU inference latency = 25ms per selected frame.
    - ML runs asynchronously on the latest available frame.

    **Calculations:**
    - Synchronous per-frame ML would need 25ms inside a 16.67ms frame, so it cannot process every displayed frame without missing 60 FPS.
    - Maximum ML throughput if the NPU is saturated: 1000ms / 25ms = 40 inferences/sec.
    - Practical policy: run ML at a stable divisor such as every other camera frame = 30 inferences/sec, using the latest completed mask for the intervening 60 FPS render frames.
    - NPU duty at 30 ML FPS: 30 * 25ms = 750ms/sec = 75% of one NPU timeline.

    **Conclusion & Interpretation:**
    - **Result: Decoupled 60 FPS display with lower-rate ML.** The model still takes 25ms, so it does not meet the 16.67ms per-frame render budget. Smooth output comes from asynchronous inference, frame decimation, and reusing/warping the latest segmentation mask.
