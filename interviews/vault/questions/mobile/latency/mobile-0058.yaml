title: 'The ANR Timeout'
scenario: 'You are developing an on-device image filter. When the user applies the filter, a 7-second-long model inference runs directly on the UI thread. Beta testers report that the app frequently freezes and then shows a system dialog asking if they want to Close or Wait.'
question: 'What is the name of this event, and what is the standard time limit that is being exceeded?'
details:
  realistic_solution: 'This is an Application Not Responding (ANR) error. Offload inference to a background thread using Grand Central Dispatch or Kotlin Coroutines, and use quantized models to reduce execution time.'
  common_mistake: |
    **The Pitfall:** Confusing the ANR timeout with the frame rendering jank budget (16ms).
    **The Rationale:** Engineers without mobile experience assume the OS will wait indefinitely for synchronous tasks to complete.
    **The Consequence:** The app becomes completely unresponsive and is force-killed by the OS.
  napkin_math: |
    **Assumptions & Constraints:**
    - Inference Latency: 7,000 ms.
    - Android ANR Limit: 5,000 ms.

    **Calculations:**
    - Exceedance: 7,000 ms - 5,000 ms = 2,000 ms over limit.

    **Conclusion & Interpretation:**
    - **Result: 2,000 ms (Compute-Bound)**. 7000ms > 5000ms, which triggers the OS Application Not Responding dialog.
  options:
  - 'Jank Event, 16 ms'
  - 'ANR Event, 5 seconds'
  - 'System Crash, 1 second'
  - 'ANR Event, 30 seconds'
