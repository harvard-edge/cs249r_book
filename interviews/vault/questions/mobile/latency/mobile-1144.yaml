title: Architecting Heterogeneous Profiling for NPU Latency
scenario: You are designing the execution and profiling architecture for a real-time AR pipeline running on the Snapdragon 8 Gen 3. The ML workload targets the Hexagon NPU, while graphics render on the GPU.
question: How should a Snapdragon 8 Gen 3 profiling system distinguish NPU compute limits, sync overhead, and memory contention?
details:
  realistic_solution: Design a telemetry system utilizing hardware-specific tracing tools (e.g., Snapdragon Profiler) to capture NPU hardware performance counters alongside GPU and CPU traces. The architecture must correlate asynchronous NPU queue execution times with memory bus utilization metrics to strictly differentiate compute-bound operations from bandwidth-starved NPU stalls.
  common_mistake: |
    **The Pitfall:** Proposing standard CPU/GPU profilers or inserting simple CPU timestamps.
    **The Rationale:** Candidates fail to account for the asynchronous nature of the Hexagon NPU DSP queues and the hidden latency of memory contention across the heterogeneous system.
    **The Consequence:** Misdiagnosing the bottleneck and applying optimizations to the wrong processing unit.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target: 30 FPS pipeline budget (33.3ms/frame).
    - NPU Compute: 45 TOPS INT8.
    - Model Workload: 1.5 Tera-operations per frame.
    - Memory Access: 250MB per frame processed.

    **Calculations:**
    - Pure compute time: 1.5 TOPS / 45 TOPS = 0.0333s (33.3ms).
    - Bandwidth demand: 250MB * 30 FPS = 7.5 GB/s.

    **Conclusion & Interpretation:**
    - **Result: 33.3ms (Memory-Contention-Bound)**. If the GPU saturates the shared LPDDR5X bus, the NPU stalls waiting for data, and actual latency will significantly exceed the 33.3ms compute bound.
