title: 'The Async Camera Pipeline'
scenario: 'You must design an inference pipeline for a camera app that maintains 60 FPS preview while running a 50ms portrait segmentation model. The model cannot run every frame.'
question: 'How do you architect this so the user sees smooth video with accurate segmentation?'
details:
  realistic_solution: 'Triple-buffer async pipeline with temporal interpolation. Three threads: (1) Camera at 60 FPS. (2) NPU segmentation at 20 FPS (50ms), processing latest frame. (3) Display at 60 FPS: composites latest mask with optical-flow interpolation (2ms GPU) for intermediate frames. Budget: 7ms UI + 2ms interpolation + 1ms composite = 10ms < 16.67ms. NPU at 100% utilization. User sees smooth 60 FPS with mask updating every 3 frames but moving smoothly via interpolation.'
  common_mistake: |
    **The Pitfall:** Running the model intermittently and holding the mask.
    **The Rationale:** Candidates suggest running the model every 3rd frame and simply holding the mask for the other 2 frames.
    **The Consequence:** This produces visible mask "popping" where the segmentation boundary jumps every 3 frames instead of moving smoothly.
  napkin_math: |
    **Assumptions & Constraints:**
    - Camera Budget: 60 FPS = 16.67ms per frame.
    - Model Budget: 50ms = 20 FPS (updating every 3 frames).
    - Thread Times: 7ms (UI) + 2ms (GPU interpolation) + 1ms (composite) = 10ms.

    **Calculations:**
    - Check Constraint: 10ms < 16.67ms frame budget.

    **Conclusion & Interpretation:**
    - **Result: 10ms (Compute-Bound)**. NPU Utilization is 100% (always processing), yielding smooth 60 FPS without frame drops.
