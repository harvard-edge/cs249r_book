title: The Async Camera Pipeline
scenario: You must design an inference pipeline for a camera app that maintains 60 FPS preview while running a 50ms portrait segmentation model. The model cannot run every frame.
question: How do you architect this so the user sees smooth video with accurate segmentation?
details:
  realistic_solution: 'Triple-buffer async pipeline with temporal interpolation. Three threads: (1) Camera at 60 FPS. (2) NPU segmentation at one result every 50ms, processing the latest frame and dropping stale requests. (3) Display at 60 FPS: composites the latest mask with optical-flow interpolation (2ms GPU) for intermediate frames. Budget: 7ms UI + 2ms interpolation + 1ms composite = 10ms < 16.67ms. User sees smooth 60 FPS preview while the segmentation mask updates at about 20 Hz and moves smoothly via interpolation.'
  common_mistake: |
    **The Pitfall:** Running the model intermittently and holding the mask.
    **The Rationale:** Candidates suggest running the model every 3rd frame and simply holding the mask for the other 2 frames.
    **The Consequence:** This produces visible mask "popping" where the segmentation boundary jumps every 3 frames instead of moving smoothly.
  napkin_math: |
    **Assumptions & Constraints:**
    - Camera Budget: 60 FPS = 16.67ms per frame.
    - Model latency: 50ms per segmentation inference, producing at most one fresh mask about every 50ms (~20 Hz).
    - Thread Times: 7ms (UI) + 2ms (GPU interpolation) + 1ms (composite) = 10ms.

    **Calculations:**
    - Display path: 7ms + 2ms + 1ms = 10ms.
    - Frame-budget check: 10ms < 16.67ms, so preview can remain at 60 FPS.
    - Segmentation update cadence: 50ms / 16.67ms per frame = ~3 frames between fresh masks.

    **Conclusion & Interpretation:**
    - **Result: 60 FPS display with ~20 Hz masks.** The segmentation model is too slow to run every preview frame, so it must be decoupled from display. Continuous back-to-back inference may saturate the NPU, but the user-facing frame budget is met by keeping the display path under 16.67ms.
