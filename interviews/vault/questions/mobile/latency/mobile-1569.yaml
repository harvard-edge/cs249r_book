title: Optimizing a Vision Model on Samsung Exynos 2400 NPU for Low Latency
scenario: "You're deploying a real-time object detection model on a mobile AR application. The model is currently exhibiting higher-than-acceptable inference latency, impacting user experience."
question: "How would you systematically profile to determine if the bottleneck is compute-bound, memory-bound, or I/O-bound, and identify the root cause?"
details:
  realistic_solution: "Employ a layered observability approach. Start with system-level tracing (e.g., Perfetto) to track thread wake-ups and frame latency across CPU/NPU boundaries. Then, use vendor-specific tooling to extract hardware performance counters (e.g., DRAM bandwidth utilization, MAC utilization, L2 cache misses). Generate flame graphs to identify specific layers or kernel operations dragging the pipeline down. If bandwidth utilization is near 100%, the model is memory-bound (requiring caching/tiling). If MACs are saturated, it is compute-bound (requiring quantization/pruning)."
  common_mistake: |
    **The Pitfall:** Immediately jumping to model architecture optimizations like pruning or quantization before profiling.
    **The Rationale:** Candidates assume compute is always the bottleneck and ignore system-level overheads, memory access patterns, and I/O wait times.
    **The Consequence:** Wasting engineering effort optimizing a non-bottleneck component, often leading to zero performance gains or even degraded accuracy.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - NPU Compute: 34.7 TOPS (34,700 GOPS).
       - Inference load: ~50 GOPS. Target: 30 FPS.
       - Latency observed: 100 ms (10 FPS).
       - I/O payload: 100 MB input, 10 MB output.
    2. **Calculations:**
       - Theoretical max compute = 34,700 GOPS / 50 GOPS = 694 inferences/sec.
       - Raw I/O data bandwidth = (100 MB + 10 MB) * 30 FPS = 3.3 GB/s.
    3. **Conclusion & Interpretation:**
       - **Result: Diagnostic-Bound.** With 3.3 GB/s being well within memory limits (50-80 GB/s) and theoretical compute at 694 IPS, a 100ms latency immediately rules out hardware limits, pointing the investigation squarely toward **scheduler stalls or non-optimal memory access patterns**.
