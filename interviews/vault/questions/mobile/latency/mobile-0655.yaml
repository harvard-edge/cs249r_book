title: Preemptive NPU Scheduling for Guardian Copilot
scenario: You are the Lead ML Systems Architect for a new flagship EV's 'Guardian' copilot. The system uses a 4B-parameter multi-modal model. It monitors driver state (video) and road context (navigation) to provide proactive assistance.
question: What preemptible scheduling architecture prevents low-priority Guardian copilot work from blocking safety-critical tasks?
details:
  realistic_solution: |
    Use a preemptive, priority-based accelerator scheduler for the Guardian runtime. Low-priority perception summaries and proactive assistance run in bounded quanta with checkpointed model state. Safety-critical tasks enter a highest-priority queue with a reserved execution budget and can preempt low-priority GPU/NPU work at kernel, token, or frame-boundary checkpoints. The runtime should expose cancellation, context-save/restore, and deadline-aware admission control; if the accelerator cannot preempt quickly enough, safety tasks need a separate model partition or reserved accelerator slice. This prevents a long background copilot inference from occupying the GPU/NPU until completion while a 33ms safety deadline expires.
  common_mistake: |
    **The Pitfall:** Proposing a smaller model or dedicated safety MCU instead of addressing the scheduling architecture.
    **The Rationale:** Engineers sidestep the core challenge of safely multiplexing tasks on a powerful SoC by throwing more hardware at the problem or sacrificing model quality.
    **The Consequence:** The system remains vulnerable to blocking tasks; a slow task still blocks, it's just slightly less slow.
  napkin_math: |
    **Assumptions & Constraints:**
    - Safety task deadline: 33ms from arrival.
    - Background task starts at t=0 and would occupy the NPU for 100ms if non-preemptible.
    - Safety task arrives at t=1ms and needs 20ms of NPU execution.
    - Preemption Overhead: ~2ms for context switch.

    **Calculations:**
    - Non-preemptible queue: safety task waits until t=100ms, so response latency from arrival is 100ms - 1ms + 20ms = 119ms, which misses the 33ms deadline.
    - Preemptible system: interrupt at t=1ms, pay 2ms context-switch overhead, then run 20ms safety task. Response latency from arrival is 2ms + 20ms = 22ms.
    - Background task resumes after the safety task; its completion is delayed, but the low-priority deadline absorbs that delay.

    **Conclusion & Interpretation:**
    - **Result: Preemption-Bound Scheduling**. Priority preemption reduces safety-task latency from 119ms to about 22ms, meeting the 33ms deadline by interrupting low-priority workloads.
