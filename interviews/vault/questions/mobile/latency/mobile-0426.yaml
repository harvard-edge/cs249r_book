title: The Jank Frame Catastrophe
scenario: You are the ML systems engineer for a live video filter app. The app must render at a smooth 30 FPS. Your core ML model takes 20ms for inference. During testing, you notice that whenever a system notification appears, the app stutters and drops frames.
question: Why does the video filter spike from 20 ms to 55 ms when a system notification animates?
details:
  realistic_solution: |
    The root cause is SoC resource contention. The mobile OS scheduler prioritizes rendering the notification animation on the GPU, starving the ML model of memory bandwidth and execution units. Mitigate by utilizing OS-level QoS (Quality of Service) APIs to request high-priority real-time scheduling for the inference thread, or partition the model execution to the NPU to decouple it from GPU UI rendering.
  common_mistake: |
    **The Pitfall:** Blaming the model or hardware in isolation for performance drops.
    **The Rationale:** Engineers forget that a mobile SoC is a shared resource ecosystem, not a dedicated server.
    **The Consequence:** Wasting time over-optimizing the model when the actual issue is OS-level resource contention.
  napkin_math: |
    **Assumptions & Constraints:**
    - Frame Budget: 33.3 ms (30 FPS)
    - ML Inference: 20 ms
    - Camera/Display Overhead: 10 ms
    - System Notification Render: 10 ms

    **Calculations:**
    - Baseline Time: 20 + 10 = 30 ms (Fits within 33.3ms)
    - Contention Time: 30 ms + 10 ms (Notification) = 40 ms

    **Conclusion & Interpretation:**
    - **Result: 40 ms (Resource Contention-Bound)**. Total frame time hits 40ms, missing the 33.3ms deadline and causing jank.
  options:
  - The model is too complex and must be pruned or quantized further to reduce its baseline latency.
  - The DSP is not powerful enough to guarantee real-time performance.
  - The OS scheduler is contending for shared GPU resources between your app's inference and the system's UI rendering.
  - Thermal throttling from the 20ms inference forces the SoC to downclock instantly.
  correct_index: 2
