title: The Real-Time Driver Alert Failure
scenario: 'You are a Senior ML Systems Engineer on a new flagship vehicle''s Driver Monitoring System. A camera feeds a stream of 30 FPS video to a computer vision model that detects driver distraction. A critical safety requirement is that an alert must be triggered within 100ms of the driver looking away. Your pipeline consists of four stages: Frame Capture, Pre-processing, Model Inference, and Post-processing. Profiling reveals the following execution times (Average | Worst-Case): Frame Capture (10ms | 15ms), Pre-processing (15ms | 25ms), Model Inference (40ms | 50ms), and Post-processing (10ms | 20ms).'
question: Why can a driver alert pipeline meet average latency but fail its 100ms safety deadline?
details:
  realistic_solution: The root cause is the accumulation of worst-case scheduler jitter across the entire pipeline. While the average-case latency might be acceptable, a real-time system's reliability is determined by its worst-case execution time (WCET). When the maximum jitter hits every stage, the total latency exceeds the safety deadline.
  common_mistake: |
    **The Pitfall:** Focusing exclusively on the 40ms model inference and ignoring the other pipeline stages.
    **The Rationale:** Engineers assume the neural network is the only meaningful bottleneck, misinterpreting the 30 FPS (33.3ms) camera rate as a hard limit rather than an arrival rate.
    **The Consequence:** Optimization efforts are misdirected at the NPU, while worst-case scheduler jitter across the rest of the pipeline causes the system to miss the safety deadline.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Hard Deadline: 100ms photon-to-alert.
       - Pipeline Stages Worst-Case: Capture (15ms), Pre-processing (25ms), Inference (50ms), Post-processing (20ms).
    2. **Calculations:**
       - Average Case: 10 + 15 + 40 + 10 = 75ms.
       - Worst Case (Jitter Accumulation): 15 + 25 + 50 + 20 = 110ms.
    3. **Conclusion & Interpretation:**
       - **Result: Jitter-Bound. Worst-case scheduler execution times push the total latency to 110ms, violating the 100ms real-time safety constraint.**
  options:
  - 75ms is the average, so it meets the deadline. The failure must be a memory leak.
  - The camera's 33.3ms (30 FPS) arrival rate exceeds the 40ms average inference time, causing a queue overflow.
  - The cumulative effect of worst-case scheduler jitter across all pipeline stages pushes the total latency beyond the 100ms budget (110ms).
  - The 50ms worst-case inference leaves only 50ms for the remaining 3 stages, which average 35ms, so it should succeed.
  correct_index: 2
