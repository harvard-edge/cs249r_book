title: 'Latency Decomposition: Compare CoreML vs. TFLite Inference'
scenario: A cross-platform mobile ML team is evaluating MobileNetV3-Large (219M MACs) using TFLite with NNAPI on Android versus CoreML on iPhone.
question: How would you compare inference latency between Android NNAPI and iOS CoreML including framework overhead and memory transfer?
details:
  realistic_solution: CoreML delivers significantly lower latency due to heavily optimized kernel fusion and minimal dispatch overhead on the Neural Engine. NNAPI on Android suffers from severe HAL and IPC boundary crossing overheads (often 3-5ms per invocation), which dominate the end-to-end latency for lightweight CNNs like MobileNetV3, despite the raw hardware TOPS appearing competitive.
  common_mistake: |
    **The Pitfall:** Ignoring HAL and framework dispatch overhead.
    **The Rationale:** Candidates often calculate latency purely based on hardware TOPS and MACs, ignoring software abstraction layers.
    **The Consequence:** They falsely conclude Android will be faster due to higher TOPS, completely missing the 3-5ms dispatch overhead of Android NNAPI.
  napkin_math: |
    **Assumptions & Constraints:**
    - Operations: 219M MACs = 0.438 GOPS.
    - Android DSP compute: 0.438 GOPS / 45 TOPS ≈ 0.01 ms.
    - iOS A17 compute: 0.438 GOPS / 35 TOPS ≈ 0.013 ms.

    **Calculations:**
    - Android total (NNAPI): 0.01 ms + 3 ms framework overhead ≈ 3.01 ms.
    - iOS total (CoreML): 0.013 ms + 0.5 ms framework overhead ≈ 0.513 ms.

    **Conclusion & Interpretation:**
    - **Result: iOS is ~6x faster (Framework-Bound)**. The execution is framework-bound, driven by NNAPI dispatch overhead.
