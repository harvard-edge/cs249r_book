title: The Adaptive Bitrate Inference
scenario: Your camera app runs continuous object detection on a Snapdragon 8 Gen 3 phone. After 3 minutes of sustained inference, the SoC junction temperature hits 95°C and the NPU throttles from 45 TOPS to 18 TOPS. Your INT8 model now misses the 16ms frame deadline.
question: How would you design an adaptive system that switches between INT8 and INT4 precision based on thermal state, and calculate the latency and accuracy at each operating point?
details:
  realistic_solution: 'Thermal-aware two-tier inference. Monitor junction temperature via Android thermal API. Above 85C, when the NPU throttles from 45 TOPS to 18 TOPS, switch from INT8 to an INT4 model whose lower bandwidth demand keeps latency under the 16ms frame deadline. INT8 at the throttled point is about 20ms and misses the deadline; with an explicit mixed compute/memory model, INT4 is about 12ms. Accuracy: INT8 = 44.9 mAP, INT4 = 42.1 mAP. If telemetry shows a session spends 60% cool and 40% throttled, the weighted session average is 43.8 mAP while preserving frame rate.'
  common_mistake: |
    **The Pitfall:** Throttling frame rate instead of precision.
    **The Rationale:** Candidates often suggest simply dropping the frame rate to 15 FPS when hot to reduce the compute load.
    **The Consequence:** This degrades the user experience uniformly with visible stuttering, rather than gracefully trading imperceptible accuracy to maintain real-time smoothness.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Frame deadline: 16ms.
       - INT8 at 45 TOPS latency: ~8ms.
       - Throttled NPU compute: 18 TOPS.
       - INT8 Accuracy: 44.9 mAP. INT4 Accuracy: 42.1 mAP.
       - At the throttled point, the INT8 path is roughly 60% compute-bound and 40% memory/bandwidth-bound.
       - Thermal telemetry for this policy shows 60% of frames run cool on INT8 and 40% run throttled on INT4.
    2. **Calculations:**
       - INT8 at 18 TOPS (throttled): 8ms * (45/18) = 20ms (Misses 16ms deadline).
       - INT4 at 18 TOPS: compute portion stays 20ms * 60% = 12ms; memory portion is reduced enough to overlap with compute, so total latency is ~12ms. Margin: 4ms.
       - Average accuracy (60% unthrottled / 40% throttled): 60% * 44.9 + 40% * 42.1 = 43.8 mAP.
    3. **Conclusion & Interpretation:**
       - **Result: Thermal-Bound Mitigation.** INT4 trades 2.8 mAP at the throttled operating point for a 12ms latency estimate that fits the frame budget. The 43.8 mAP session average follows only for the stated 60/40 cool/throttled telemetry split.
