title: The Adaptive Bitrate Inference
scenario: Your camera app runs continuous object detection on a Snapdragon 8 Gen 3 phone. After 3 minutes of sustained inference, the SoC junction temperature hits 95°C and the NPU throttles from 45 TOPS to 18 TOPS. Your INT8 model now misses the 16ms frame deadline. Profiling shows INT8 runs in 8ms at 45 TOPS with 44.9 mAP; at 18 TOPS it takes 20ms. A calibrated INT4 model runs in 12ms at the throttled point with 42.1 mAP.
question: What thermal-aware precision policy keeps detection under 16 ms when the NPU throttles?
details:
  realistic_solution: Use a thermal-aware two-tier inference policy. Monitor Android thermal status and SoC junction temperature, keep the INT8 model while the device is unthrottled, and switch to the calibrated INT4 model when the 95C throttling state is reached. INT8 is 8ms and 44.9 mAP while cool, but at 18 TOPS it becomes 20ms and misses the 16ms deadline. The INT4 profile is 12ms and 42.1 mAP at the throttled point, so it preserves frame rate with a 2.8 mAP accuracy tradeoff.
  common_mistake: |
    **The Pitfall:** Throttling frame rate instead of precision.
    **The Rationale:** Candidates often suggest simply dropping the frame rate to 15 FPS when hot to reduce the compute load.
    **The Consequence:** This degrades the user experience uniformly with visible stuttering, rather than gracefully trading imperceptible accuracy to maintain real-time smoothness.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Frame deadline: 16ms.
       - INT8 at 45 TOPS latency: ~8ms.
       - Throttled NPU compute: 18 TOPS.
       - INT8 Accuracy: 44.9 mAP. INT4 Accuracy: 42.1 mAP.
       - Calibrated INT4 at 18 TOPS latency: 12ms.
    2. **Calculations:**
       - INT8 at 18 TOPS (throttled): 8ms * (45/18) = 20ms (Misses 16ms deadline).
       - INT4 at 18 TOPS: 12ms, leaving 16ms - 12ms = 4ms margin.
       - Accuracy tradeoff when throttled: 44.9 - 42.1 = 2.8 mAP.
    3. **Conclusion & Interpretation:**
       - **Result: Thermal-Bound Mitigation.** Run INT8 while cool, then switch to INT4 at the measured throttling point. INT8 at 18 TOPS misses the deadline at 20ms, while INT4 fits at 12ms with a 2.8 mAP accuracy cost.
