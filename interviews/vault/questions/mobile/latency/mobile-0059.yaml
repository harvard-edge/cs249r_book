title: The 60 FPS Jank Budget
scenario: 'You''re building a new feature for a social media app: a real-time cat-ear filter on the camera preview. To feel smooth, the UI must run at a constant 60 FPS. Your ML model needs to process each frame from the camera.'
question: How would you explain the maximum permissible latency for your model's inference to avoid causing UI 'jank', and what does 'jank' mean in this context?
details:
  realistic_solution: |
    The total time budget for a single frame at 60 FPS is approximately 16.67ms (1000ms / 60). 'Jank' occurs when the system cannot complete all the work for a frame (input, animation, layout, drawing, and ML inference) within this budget. This causes the frame to be displayed late, effectively being 'skipped', which the user perceives as a stutter or lag in the animation.
  common_mistake: |
    **The Pitfall:** Stating the model can take the full 16.67ms frame budget.
    **The Rationale:** Engineers often naively divide 1 second by the framerate, forgetting the rendering overhead.
    **The Consequence:** Ignoring all other work happening on the main thread (UI drawing, layout, animations), leading to missed deadlines and skipped frames (jank).
  napkin_math: |
    **Assumptions & Constraints:**
    - Target framerate: 60 FPS.

    **Calculations:**
    - Total Frame Budget = 1000 ms / 60 FPS = 16.67 ms.

    **Conclusion & Interpretation:**
    - **Result: < 16.67 ms (Compute-Bound)**. The model must share this 16.67 ms budget with UI rendering, layout, and other logic.
  options:
  - 33.33ms.
  - 16.67ms.
  - Significantly less than 16.67ms, because the model shares the frame budget with UI rendering and other logic.
  - 66.67ms.
