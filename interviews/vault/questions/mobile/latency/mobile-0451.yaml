title: The Driver Monitoring Deadline Miss
scenario: 'You''re a mobile ML engineer diagnosing a performance issue in a Driver Monitoring System (DMS). The system uses the front camera (30 FPS) to detect drowsiness and must issue an alert within a hard deadline of 50ms from frame capture. The pipeline has three sequential models: Face Detection (10ms), Landmark Prediction (15ms), and Drowsiness Classification (5ms). Profiling shows about 1% of frames miss the 50ms deadline, taking up to 80ms. A secondary, low-priority gesture control model runs for 50ms once every second on the same NPU.'
question: Why does a 30 ms DMS pipeline miss a 50 ms deadline when a 50 ms gesture model runs once per second?
details:
  realistic_solution: The problem is resource contention. When the low-priority gesture model runs, it occupies the NPU for up to 50ms. If a DMS frame arrives while that non-preemptive job is running, it must wait in a queue before its own 30ms processing can begin, resulting in up to 80ms total latency. Frames that do not overlap the gesture job still complete within the 50ms deadline.
  common_mistake: |
    **The Pitfall:** Focusing on optimizing the longest single component in the pipeline.
    **The Rationale:** Engineers often ignore system-level interactions and non-preemptive queueing, assuming average-case latency dictates worst-case performance.
    **The Consequence:** Wasted effort on micro-optimizing models that already easily fit the budget, while the real-time deadline continues to be missed.
  napkin_math: |
    **Assumptions & Constraints:**
    - Camera: 30 FPS (33.3ms between frames).
    - Deadline: 50ms from frame capture to alert.
    - DMS Pipeline Execution: 10 + 15 + 5 = 30ms.
    - Gesture Model Execution: 50ms (non-preemptive).

    **Calculations:**
    - Normal DMS Latency: 30ms, which passes the 50ms deadline.
    - Worst blocked DMS Latency: Queue Wait (up to 50ms) + DMS Pipeline (30ms) = up to 80ms.

    **Conclusion & Interpretation:**
    - **Result: Up to 80ms (Scheduling-Bound)**. The non-preemptive gesture model induces queueing delay only for DMS frames that arrive while it occupies the NPU, causing those frames to miss the 50ms deadline.
  options:
    - The Landmark Prediction model at 15ms is too slow and must be optimized.
    - The low-priority gesture model is blocking the NPU, causing DMS frames to be queued and miss their deadline.
    - The hardware TOPS is insufficient for this combined workload.
    - The camera's 30 FPS rate is too high, overwhelming the system.
  correct_index: 1
