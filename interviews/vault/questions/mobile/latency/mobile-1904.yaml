title: TTS Chunk Queue Wait
scenario: A text-to-speech task queues user input chunks. The Apple A17 processes chunks in 20ms, and inputs arrive according to a Poisson process at 40 chunks/second.
question: What is the expected wait time in the queue for a new text chunk using M/M/1 formulas?
visual:
  kind: svg
  path: mobile-1904.svg
  alt: Plot showing wait time rapidly increasing as arrival rate approaches service rate.
  caption: Wait Time vs Arrival Rate
details:
  realistic_solution: Service rate (mu) is 50 chunks/sec. Arrival rate (lambda) is 40. Utilization (rho) = 40/50 = 0.8. Wait time in queue Wq = rho / (mu - lambda) = 0.8 / (50 - 40) = 0.08 seconds or 80ms.
  common_mistake: |
    **The Pitfall:** Calculating the total time in the system instead of just the wait time in the queue.
    **The Rationale:** Confusing W (time in system) with Wq (time in queue) in standard M/M/1 formulas.
    **The Consequence:** Overestimating the queuing delay and incorrectly diagnosing system bottlenecks.
  napkin_math: |
    **Assumptions & Constraints:**
    - M/M/1 Queue.
    - Service time = 20ms.
    - Arrival rate (λ) = 40 chunks/sec.

    **Calculations:**
    - Service rate (μ): 1 / 0.020s = 50 chunks/sec.
    - Utilization (ρ): 40 / 50 = 0.8.
    - Wait time in queue (Wq): ρ / (μ - λ) = 0.8 / (50 - 40) = 0.08 seconds.

    **Conclusion & Interpretation:**
    - **Result: 80ms (Queueing-Delay Bound)**. The expected wait time in the queue is 80ms.
