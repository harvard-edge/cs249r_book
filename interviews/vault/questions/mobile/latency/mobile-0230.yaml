title: The Jank Budget (mobile-0230)
scenario: To maintain a 'buttery smooth' 60 FPS user experience for a live camera filter on a mobile app, you need to process each frame before the next one is ready.
question: What is the total time budget, also known as the frame deadline, for all processing on a single frame?
details:
  realistic_solution: The correct answer is ~16.67ms. A 60 FPS target means 60 frames must be processed within one second (1000 milliseconds). Therefore, each frame has a budget of 1000ms divided by 60 frames.
  common_mistake: |
    **The Pitfall:** Confusing frames-per-second directly with a time unit (e.g., 60ms).
    **The Rationale:** Candidates lacking real-time graphics experience fail to invert the frequency to find the period.
    **The Consequence:** The latency targets are completely misaligned with the hardware reality, resulting in visible UI jank.
  napkin_math: |
    1. **Formula:** 1000 milliseconds / 60 frames per second.
    2. **Result:** **16.67 ms/frame**.
    3. **Application:** If the model takes 10ms, only ~6ms remains for OS overhead, rendering, and compositing before missing the deadline.
  options:
  - 60 ms
  - 33 ms
  - ~16 ms
  - 100 ms
  correct_index: 2
