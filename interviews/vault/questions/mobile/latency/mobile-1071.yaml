title: Shared Early-Exit Speculative Decoding
scenario: On a mobile device with 50 GB/s memory bandwidth, you run a 3B INT4 target model. Instead of loading a separate draft model, you add a two-layer early-exit draft path that reuses the target model's embedding table, first two transformer layers, and tied output projection.
question: How would you design a shared-weight speculation system and analyze its memory savings compared to a separate 0.5B draft?
details:
  realistic_solution: |
    Use a shared-weight speculative design with an early exit after the first two target layers. The draft path reuses the target embedding table, the first two transformer blocks, and the existing tied output projection, so the only persistent addition is a small exit controller or calibration layer, not another set of model weights. Compared with a separate 0.5B INT4 draft at about 250 MB, the shared early-exit path saves essentially that full draft footprint, aside from a few megabytes or less of control/calibration parameters. The tradeoff is quality: a two-layer early exit may have a lower acceptance rate than a trained separate draft, so latency gains must be measured by accepted tokens per target verification pass.
  common_mistake: |
    **The Pitfall:** Treating "shared weights" as if it means a full independent draft model is available for free.
    **The Rationale:** Candidates count memory savings but do not specify which tensors are actually persistent additions and which target tensors are reused.
    **The Consequence:** The design either silently allocates a second draft model or overstates the speedup from an early-exit path whose acceptance rate may be low.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target model: 3B INT4 = 1.5 GB.
    - Separate draft: 0.5B INT4 = 250 MB.
    - Shared early-exit draft reuses target embeddings, first two target layers, and the tied output projection.
    - Extra early-exit controller/calibration parameters are small; assume <=5 MB persistent storage.

    **Calculations:**
    - Separate target + draft memory: 1.5 GB + 250 MB = 1.75 GB.
    - Shared target + early-exit memory: 1.5 GB + <=5 MB = <=1.505 GB.
    - Memory saved versus a separate draft: 250 MB - <=5 MB = at least about 245 MB.
    - No extra vocab-head storage is counted because the design explicitly reuses the target model's tied output projection.

    **Conclusion & Interpretation:**
    - **Result: ~245-250 MB Memory Savings (Shared Early-Exit Draft)**. The persistent-memory benefit is real only if the draft path reuses target tensors; latency benefit depends on the measured acceptance rate.
