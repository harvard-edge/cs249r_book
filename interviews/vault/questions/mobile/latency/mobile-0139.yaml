title: The On-Device LLM Memory Wall
scenario: 'Your product manager wants to run a 2 Billion parameter LLM using FP16 precision on a new flagship smartphone for a real-time generative AI feature.'
question: 'Why is loading a 2B-parameter FP16 LLM usually infeasible inside a single mobile app memory budget?'
details:
  realistic_solution: 'It is not feasible. A 2 Billion parameter model at FP16 requires 4 GB of RAM just for the weights. A high-end smartphone with 12 GB of total RAM typically allocates only about 3 GB of that to a single application. The model''s memory footprint exceeds the application''s entire memory budget before even accounting for activations or the app''s own runtime memory.'
  common_mistake: |
    **The Pitfall:** Comparing the model's weight size directly against the phone's total advertised RAM.
    **The Rationale:** Engineers forget that mobile OSs enforce strict per-application memory limits.
    **The Consequence:** The application is forcefully terminated (OOM) by the OS immediately upon loading weights.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 2 Billion parameters at FP16.
       - Device total RAM: ~12 GB.
       - OS-enforced app RAM budget: ~3 GB.
    2. **Calculations:**
       - Model size: 2,000,000,000 * 2 bytes = 4 GB.
       - 4 GB > 3 GB (App Budget).
    3. **Conclusion & Interpretation:**
       - **Result: 4 GB > 3 GB (OOM Limit Exceeded).**
  options:
  - A) Yes, a 12 GB phone has more than enough RAM for a 4 GB model.
  - B) No, the model's 4 GB footprint exceeds the typical ~3 GB app budget.
  - C) No, a 2B parameter model requires 32 GB of RAM for inference.
  - D) Feasibility depends on the phone's NPU TOPS, not the RAM.
  correct_index: 1
