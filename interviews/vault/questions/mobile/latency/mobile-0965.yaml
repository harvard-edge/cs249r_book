title: 'Latency Decomposition: Compute TTFT and TPOT for On-Device LLM on Snapdragon 8 Gen 3'
scenario: A 2B-parameter LLM (INT4 quantized) runs on Snapdragon 8 Gen 3. Assume 32 layers, hidden dim 2560, FFN dim about 4x hidden, 77 GB/s effective memory bandwidth, and 45 TOPS effective sustained INT4 throughput after utilization losses.
question: How would you compute TTFT for a 256-token prompt and TPOT for decode?
details:
  realistic_solution: 'INT4 model size is 2B × 0.5 bytes = 1GB. For decode, use a simple lower-bound assumption that the compressed weights are streamed once per generated token: 1GB / 77GB/s ≈ 13ms/token before KV reads and scheduler overhead, so a practical TPOT estimate is about 14-16ms. Prefill should be derived from transformer dimensions rather than parameter count alone. For 32 layers, hidden 2560, FFN 10240, and 256 prompt tokens, dense work is roughly 2 ops/MAC × 256 × 32 × (4H^2 attention projections + 8H^2 MLP) ≈ 1.29T ops, with the quadratic attention term adding about 21.5G ops. Treating 45 TOPS as the same effective low-precision operation convention, TTFT is roughly 1.31T / 45T = 29ms, plus memory and launch overhead, so budget about 35-45ms TTFT.'
  common_mistake: |
    **The Pitfall:** Estimating prefill as only 2 * prompt_tokens * parameter_count or assuming INT4 automatically doubles TOPS.
    **The Rationale:** Prefill includes transformer layer structure, attention terms, memory traffic, and real accelerator utilization; peak TOPS is not the same as sustained throughput.
    **The Consequence:** The TTFT estimate looks precise but is not tied to the model architecture or hardware execution path.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model: 2B parameters, INT4 (0.5 bytes/param).
       - Transformer: 32 layers, hidden dim 2560, FFN dim 10240, 256 prompt tokens.
       - Hardware: Snapdragon 8 Gen 3, 45 TOPS effective sustained INT4 throughput, 77 GB/s effective BW.
       - Operation convention: use the same low-precision op-count convention for prefill numerator and the 45 TOPS denominator; the dense formulas below count 2 operations per MAC.
    2. **Calculations:**
       - Decode TPOT lower bound under a one-weight-read-per-token streaming assumption: 1 GB / 77 GB/s = 13.0 ms/token.
       - Add KV reads, activation traffic, and dispatch overhead: practical TPOT ≈ 14-16 ms/token.
       - Per-layer dense MACs per token ≈ attention projections (4 * H^2 for Q,K,V,O) + MLP (2 * H * 4H) = 12 * 2560^2 = 78.6M MACs.
       - Prefill dense FLOPs ≈ 2 * 256 tokens * 32 layers * 78.6M MACs = 1.29T FLOPs.
       - Attention score/value FLOPs ≈ 4 * 32 * 256^2 * 2560 = 21.5G FLOPs.
       - Total prefill ≈ 1.31T FLOPs. TTFT compute lower bound = 1.31T / 45T = 29ms.
       - Add model reads, KV writes, and launch overhead: practical TTFT ≈ 35-45ms.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-heavy prefill, memory-bound decode. Expect roughly 35-45ms TTFT for a 256-token prompt and 14-16ms TPOT during decode.**
