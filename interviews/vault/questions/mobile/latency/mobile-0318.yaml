title: The Mobile Jank Budget (mobile-0318)
scenario: You're developing a new real-time feature for a flagship smartphone app, like live translation overlays on a camera feed.
question: To ensure a smooth, 'buttery' user experience without perceptible lag or 'jank', what is the maximum latency budget you have to process each frame?
details:
  realistic_solution: The standard for a smooth mobile UI is to complete all work
    for a frame within the screen's refresh interval. For most phones, this is 60Hz,
    which gives a budget of approximately 16 milliseconds. Exceeding this budget means
    you 'miss a frame', causing a visible stutter or 'jank' in the animation or user
    feedback.
  common_mistake: |
    **The Pitfall:** Applying cloud intuition to edge by assuming 100ms is acceptable.
    **The Rationale:** Engineers accustomed to web services mistake network request latency targets for UI animation deadlines.
    **The Consequence:** The feature misses screen refresh cycles, causing noticeable UI jank and a poor user experience.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Display Refresh Rate: 60 Hz.
    2. **Calculations:**
       - Per-frame budget = 1 second / 60 frames = 1000 ms / 60 ≈ 16.67 ms.
    3. **Conclusion & Interpretation:**
       - **Result: 16ms deadline. Missing this causes a dropped frame and visible UI jank.**
  options:
  - 100ms. This assumes human reaction time limits rather than UI refresh rates.
  - 33ms. This incorrectly assumes 30 FPS video playback standards.
  - 16ms.
  - 1ms.
  correct_index: 2
