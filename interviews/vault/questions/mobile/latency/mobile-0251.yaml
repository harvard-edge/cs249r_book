title: 'The Jank Budget (mobile-0251)'
scenario: 'You''re an ML systems engineer working on a new real-time camera filter for a flagship social media app. The filter applies a style transfer model on every frame of the video stream.'
question: 'To ensure a perfectly smooth, ''buttery'' user experience on a standard 60Hz display, what is the strict, per-frame latency budget you must hit for your model''s inference?'
details:
  realistic_solution: |
    To maintain 60 frames per second (FPS), each frame must be rendered in under 1/60th of a second, which is approximately 16.7 milliseconds. Exceeding this budget means you 'drop a frame,' causing perceptible stutter.
  common_mistake: |
    **The Pitfall:** Confusing the mobile UI deadline with interactive web latency.
    **The Rationale:** Engineers recall the ~100ms budget for web services, failing to tie the requirement to display physics.
    **The Consequence:** Unusable, stuttering visual experiences on edge devices.
  napkin_math: |
    **Assumptions & Constraints:**
    - Display refresh rate: 60Hz.

    **Calculations:**
    - Budget = 1000 ms / 60 frames = 16.67 ms/frame.

    **Conclusion & Interpretation:**
    - **Result: 16.7 ms (Latency-Bound)**. This is a hard deadline dictated by the hardware.
  options:
  - '~100 ms'
  - '~33 ms'
  - '~16 ms'
  - '~1 ms'
  correct_index: 2
