title: The Jank Budget (mobile-0359)
scenario: You're optimizing an on-device generative AI feature for a smartphone, like real-time translation overlays.
question: "To ensure a smooth, 'jank-free' user experience on a standard 60 FPS display, what is the maximum time budget your model has to generate and render each new token before the user perceives a stutter?"
details:
  realistic_solution: The inference latency must fit within the frame refresh interval of a 60Hz display. The system must generate and render each token in under ~16.67ms to avoid blocking the main UI thread and causing jank.
  common_mistake: |
    **The Pitfall:** Overestimating allowable latency by using cloud benchmarks.
    **The Rationale:** Engineers often misapply latency targets from other domains, thinking of the ~100ms budget for a cloud service instead of the hardware refresh rate.
    **The Consequence:** Any task that blocks the main thread for longer than one frame will cause a perceptible stutter or 'jank'.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target framerate: 60 FPS.
    - Time per second: 1000 ms.
    
    **Calculations:**
    - 1000 ms / 60 FPS = 16.67 ms per frame.
    
    **Conclusion & Interpretation:**
    - **Result: Latency-Bound**. Any task blocking the main thread for longer than 16.67 ms will cause a perceptible stutter or 'jank'.
  options:
  - '~100ms, the typical P99 latency for a cloud service.'
  - '~33ms, the hard real-time deadline for a 30 FPS edge device.'
  - '~16ms, the per-frame budget for a 60 FPS display.'
  - '~1ms, the interrupt latency for a TinyML device.'
