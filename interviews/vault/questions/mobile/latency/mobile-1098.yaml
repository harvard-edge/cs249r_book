title: 'Analyzing TTFT vs TPOT Bottlenecks'
scenario: You are analyzing the end-to-end latency of a 3-billion parameter on-device LLM running on an NPU. You observe that while the Time To First Token (TTFT) for a 50-token prompt is relatively fast, the Time Per Output Token (TPOT) is surprisingly slow, causing the total generation time to be the major bottleneck.
question: Why does the end-to-end latency of an on-device LLM become heavily bottlenecked during the decode phase (TPOT) rather than the prefill phase (TTFT)?
details:
  realistic_solution: 'End-to-end latency breaks down into TTFT (prefill) and TPOT (decode). During prefill, the NPU processes multiple input tokens in parallel, achieving high utilization of its matrix multiplication units. However, during the decode phase (TPOT), the system processes only one token at a time. This requires streaming the entire models weights from DRAM into the NPU for every single generated token, making it entirely memory-bandwidth bound. Consequently, the NPU compute is severely underutilized during decode.'
  common_mistake: |
    **The Pitfall:** Assuming the NPUs peak TOPS dictates the speed of all generative phases equally.
    **The Rationale:** Candidates fail to decompose latency and realize that while prefill can saturate compute, decode is intrinsically memory-bandwidth bound.
    **The Consequence:** They focus on compute optimizations (like pruning) instead of memory-bound optimizations (like quantization or KV cache tuning) for the decode phase.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: 3B parameters at 8-bit = 3 GB footprint.
    - NPU Compute: 7.5 TOPS.
    - Memory Bandwidth: 50 GB/s.

    **Calculations:**
    - TTFT compute (50 tokens) = 2 * 3B * 50 = 300 GigaOps.
    - TTFT time = 300 / 7500 = 0.04s (40ms).
    - TPOT compute (1 token) = 2 * 3B * 1 = 6 GigaOps (<1ms compute time).
    - TPOT memory load time = 3 GB / 50 GB/s = 60ms per token.

    **Conclusion & Interpretation:**
    - **Result: 60ms TPOT (Memory-Bound)**. The memory-bound TPOT (60ms) heavily dominates the compute-bound TTFT (40ms).
