title: CoreML Conversion and ANE Delegation Strategy
scenario: You are tasked with deploying a 1.5 billion parameter transformer model to a mobile device. You must specify the conversion pipeline from PyTorch to CoreML. The model contains custom dynamic control flow operations not natively supported by the Neural Engine.
question: How would you convert a model to CoreML while avoiding NPU delegation fallbacks, keeping execution within the thermal budget?
details:
  realistic_solution: 'The specification should detail using coremltools to convert the model, explicitly defining custom CoreML ops or modifying the PyTorch graph to replace unsupported dynamic ops with ANE-friendly static equivalents. Execution should leverage the unified memory to minimize zero-copy overheads during fallback, but aggressive profiling must be specified to ensure compute-heavy layers remain on the NPU to stay within the 5W thermal envelope.'
  common_mistake: |
    **The Pitfall:** Assuming converting to CoreML automatically guarantees full NPU execution.
    **The Rationale:** Candidates fail to account for operator coverage gaps that cause silent CPU fallbacks.
    **The Consequence:** Massive synchronization overhead and context switching completely nullify the NPU's performance benefits and cause severe latency spikes.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Compute Required: 20 GOPS.
       - NPU Execution: 35 TOPS peak.
       - CPU Peak: ~100 GOPS.
       - Fallback rate: 5% of operations drop to CPU (1 GOPS).
    2. **Calculations:**
       - Pure NPU Latency: 20 GOPS / 35,000 GOPS = ~0.57 ms.
       - CPU Fallback Execution: 1 GOPS / 100 GOPS = 10 ms.
       - Total Latency with 5% fallback: 0.57 ms + 10 ms = ~10.57 ms.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound.** A mere 5% CPU fallback creates a 17x latency regression due to severe CPU compute bottleneck.
