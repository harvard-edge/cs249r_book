title: CoreML Conversion and ANE Delegation Strategy
scenario: You are tasked with deploying a 1.5 billion parameter transformer model to an iPhone 15 Pro. You must specify the conversion pipeline from PyTorch to CoreML, targeting the Apple A17 Pro Neural Engine (ANE). The model contains custom dynamic control flow operations not natively supported by the ANE.
question: "How would you convert a model to CoreML while avoiding ANE delegation fallbacks, keeping execution within a 5W thermal budget?"
details:
  realistic_solution: The specification should detail using coremltools to convert
    the model, explicitly defining custom CoreML ops or modifying the PyTorch graph
    to replace unsupported dynamic ops with ANE-friendly static equivalents. Execution
    should leverage the A17 Pro's shared 8 GB unified memory to minimize zero-copy
    overheads during fallback, but aggressive profiling must be specified to ensure
    compute-heavy layers remain on the 16-core ANE to stay within the 5W thermal envelope.
  common_mistake: |
    **The Pitfall:** Assuming converting to CoreML automatically guarantees full ANE execution.
    **The Rationale:** Candidates fail to account for operator coverage gaps that cause silent CPU fallbacks.
    **The Consequence:** Massive synchronization overhead and context switching completely nullify the ANE's performance benefits and cause severe latency spikes.
  napkin_math: |
    - Model requirements: 1.5B parameters INT8 ≈ 1.5 GB memory. Compute = 20 GOPS.
    - ANE execution time: 20 GOPS / 35,000 GOPS (35 TOPS) = 0.57 ms.
    - Fallback penalty: 5% of operations (1 GOPS) fall back to CPU (~100 GOPS peak).
    - CPU execution time: 1 GOPS / 100 GOPS = 10 ms.
    - Total latency: 0.57 ms + 10 ms = **~10.57 ms**.
    - **Conclusion:** The fallback introduces a 17x increase in compute latency.
