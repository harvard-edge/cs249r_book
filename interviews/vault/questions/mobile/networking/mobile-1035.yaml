title: Hybrid 5G Routing for Mobile LLM Inference
scenario: Specify a bandwidth QoS policy for a 5G mobile device that intelligently routes LLM inference between on-device (3B INT4, TPOT=19.5ms) and cloud (H100, TPOT=7.8ms). The policy must minimize user-perceived latency across network conditions while respecting a $0.01 per 1000 tokens cloud budget.
question: What routing rules should choose between cloud and on-device LLM inference under 5G latency, privacy, and budget constraints?
details:
  realistic_solution: |
    First apply hard gates: sensitive prompts, offline mode, metered-data opt-out, or exhausted cloud budget must run on device. For eligible requests, estimate end-to-end latency for the requested output length N: on-device latency = 19.5N ms, cloud latency = RTT + 7.8N ms. Route to cloud when RTT + 7.8N < 19.5N and the cloud charge, $0.01 * N / 1000 tokens, fits the remaining token budget; otherwise route on device.

    This gives a concrete threshold of RTT < 11.7N ms. For a 100-token answer, cloud remains faster until RTT reaches about 1170ms, so normal 5G RTTs should use cloud when privacy and budget allow. For very short completions, the threshold is tighter: a 10-token response only tolerates about 117ms RTT, so on-device can win on poor radio links. If a cloud request starts but RTT or packet loss spikes, fall back to the on-device model for the next turn rather than migrating a partially decoded response.
  common_mistake: |
    **The Pitfall:** Defining routing purely on RTT without considering that the on-device model is slower per token.
    **The Rationale:** Assuming cloud is slower if ping is high, but forgetting that cloud generates tokens 2.5x faster.
    **The Consequence:** Unnecessarily falling back to slower on-device inference when the cloud would still complete the full generation faster.
  napkin_math: |
    **Assumptions & Constraints:**
    - Cloud E2E for 100 tokens: (100 * 7.8 ms) + RTT = 780 ms + RTT.
    - On-device E2E for 100 tokens: 100 * 19.5 ms = 1950 ms.
    - Cloud budget/price: $0.01 per 1000 generated tokens, so request cost is $0.01 * N / 1000.
    - For a 100-token answer, request cost is $0.001 and a 1000-token budget allows ten such cloud requests.

    **Calculations:**
    - Cloud wins when: 780 + RTT < 1950 → RTT < 1170 ms.
    - General routing threshold: RTT + 7.8N < 19.5N → RTT < 11.7N ms.
    - Budget gate for each request: route cloud only when $0.01 * N / 1000 <= remaining cloud budget.

    **Conclusion & Interpretation:**
    - **Result: RTT < 11.7N ms plus a per-request budget gate.** For N=100, cloud is faster below 1170ms RTT and costs $0.001, but it should be used only while the remaining token budget can pay for that request.
