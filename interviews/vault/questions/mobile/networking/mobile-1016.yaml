title: 'Network Bandwidth Bottlenecks: Realize LPDDR5X Bandwidth Budget for Full Mobile AI Stack'
scenario: A full mobile AI stack on a Snapdragon 8 Gen 3 (77 GB/s) includes display rendering, camera ISP, always-on speech recognition, and background LLM prefetch.
question: What is the LPDDR5X bandwidth consumption for a mobile AI stack, and does it fit under the 77GB/s Snapdragon limit?
details:
  realistic_solution: 'Display: 1080p 120Hz framebuffer write is 1920×1080×4B×120 = 0.996 GB/s; with 3 composited layers, budget about 3.0 GB/s. Camera ISP at 4K 30fps YUV420 is 4096×2160×1.5×30 = 0.40 GB/s. Always-on ASR should be modeled as a streaming pipeline, not a full 1 GB weight sweep every 10ms: assume about 100KB of active state/weights per 10ms frame, or 100KB×100Hz = 0.01 GB/s. LLM background prefill is bursty: a 1.5GB weight stream over ~27ms peaks near 55.6 GB/s during the burst, but because it happens once every 30s its average stack contribution is 1.5GB/30s = 0.05 GB/s. For the prompt''s overall sustained bandwidth budget, total average consumption is 3.0 + 0.40 + 0.01 + 0.05 = 3.46 GB/s, well below 77 GB/s. The prefill burst must still be scheduled so it does not coincide with foreground bandwidth-critical work.'
  common_mistake: |
    **The Pitfall:** Grossly miscalculating always-on Speech Recognition (ASR) bandwidth.
    **The Rationale:** Engineers assume the entire 1GB model is loaded from RAM on every single 10ms audio frame, failing to understand recurrent/streaming architectures.
    **The Consequence:** Concluding the system needs impossible >100 GB/s bandwidth for basic operations, derailing the entire architectural review.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hardware: Snapdragon 8 Gen 3 (77 GB/s budget).
    - Display: 1080p 120Hz (1920x1080x4B = 0.996GB/s).
    - Camera ISP: 4K 30fps YUV420 (4096x2160x1.5x30 = 0.4GB/s).

    **Calculations:**
    - Display compositing (3 layers): 3 * 0.996 = 3.0 GB/s.
    - ASR Streaming: 100KB active weights * 100Hz = 0.01 GB/s.
    - LLM Prefill average: 1.5GB every 30s = 0.05 GB/s.
    - LLM Prefill peak during burst: 1.5GB / 0.027s = 55.6 GB/s, so schedule it away from other foreground bursts.
    - Total Idle Stack: 3.0 + 0.4 + 0.01 + 0.05 = 3.46 GB/s.

    **Conclusion & Interpretation:**
    - **Result: 3.46 GB/s sustained average.** The steady stack uses ~4.5% of the 77 GB/s budget. The LLM prefill has a high short peak, so the system fits only if that burst is QoS-scheduled rather than treated as continuous load.
