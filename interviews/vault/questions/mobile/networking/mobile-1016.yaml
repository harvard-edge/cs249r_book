title: LPDDR5X Bandwidth Budget for a Snapdragon 8 Gen 3 Mobile AI Stack
scenario: A full mobile AI stack on a Snapdragon 8 Gen 3 (77 GB/s) includes display rendering, camera ISP, always-on speech recognition, and background LLM prefetch.
question: What sustained average LPDDR5X bandwidth does the mobile AI stack consume, and does it fit under 77GB/s?
details:
  realistic_solution: 'Display: 1080p 120Hz framebuffer write is 1920×1080×4B×120 = 0.996 GB/s; with 3 composited layers, budget about 3.0 GB/s. Camera ISP at 4K 30fps YUV420 is 4096×2160×1.5×30 = 398 MB/s = 0.40 GB/s for one major DRAM pass. Always-on ASR should be modeled as a streaming pipeline with a small hot working set, not a full 1GB weight sweep every 10ms: assume about 100KB of state/features and touched weights per 10ms frame, or 100KB×100Hz = 0.01GB/s as a sustained average. LLM background prefill is bursty, so count it as an average only for this sustained-budget question: 1.5GB every 30s contributes 0.05GB/s on average. Total sustained average consumption is 3.0 + 0.40 + 0.01 + 0.05 = 3.46GB/s, well below 77GB/s. Instantaneous prefill peaks still need QoS scheduling, but their peak duration is not specified by the prompt.'
  common_mistake: |
    **The Pitfall:** Grossly miscalculating always-on Speech Recognition (ASR) bandwidth.
    **The Rationale:** Engineers assume the entire 1GB model is loaded from RAM on every single 10ms audio frame, failing to understand recurrent/streaming architectures.
    **The Consequence:** Concluding the system needs impossible >100 GB/s bandwidth for basic operations, derailing the entire architectural review.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hardware: Snapdragon 8 Gen 3 (77 GB/s budget).
    - Question asks for sustained average bandwidth, not instantaneous peak burst bandwidth.
    - Display: 1080p 120Hz (1920x1080x4B = 0.996GB/s).
    - Camera ISP: 4K 30fps YUV420, one major DRAM pass (4096x2160x1.5 bytes x 30 = 0.398GB/s).

    **Calculations:**
    - Display compositing (3 layers): 3 * 0.996 = 3.0 GB/s.
    - ASR streaming hot working set: 100KB state/features/touched weights per 10ms frame * 100Hz = 0.01 GB/s.
    - LLM Prefill average: 1.5GB every 30s = 0.05 GB/s.
    - Total Idle Stack: 3.0 + 0.4 + 0.01 + 0.05 = 3.46 GB/s.

    **Conclusion & Interpretation:**
    - **Result: 3.46 GB/s sustained average.** The steady stack uses ~4.5% of the 77 GB/s budget. Prefill bursts require separate QoS scheduling because the prompt does not specify a burst duration for peak bandwidth.
