title: 5G Uplink Conversion
scenario: 'A mobile device offloads heavy inference to a cloud server via a 5G connection with a 100 Mbps uplink.'
question: 'State the bandwidth limit of the 5G connection in megabytes per second to determine if a 15 MB image can be offloaded in under 1 second.'
