details:
  realistic_solution: 'The candidate converts Megabits per second (Mbps) to Megabytes per second (MB/s) by dividing by 8. 100 Mbps = 12.5 MB/s. Thus, a 15 MB image will take longer than 1 second.'
  common_mistake: |
    **The Pitfall:** Confusing Megabits (Mb) with Megabytes (MB).
    **The Rationale:** Engineers assume 100 Mbps means 100 MB/s.
    **The Consequence:** Miscalculating transfer latency by a factor of 8, leading to missed 1-second SLAs.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Link speed: 100 Mbps (Megabits per second).
       - Image size: 15 MB (Megabytes).
    2. **Calculations:**
       - 100 Mbps / 8 bits/byte = 12.5 MB/s.
       - Transfer time: 15 MB / 12.5 MB/s = 1.2 seconds.
    3. **Conclusion & Interpretation:**
       - **Result: 1.2 seconds (Bandwidth-Bound Limit Exceeded).**
