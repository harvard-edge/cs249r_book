title: 'Network Bandwidth Bottlenecks: Optimize LLM TPOT via Weight Quantization on A17 Pro'
scenario: 'A 3B FP16 LLM shows TPOT=88ms. Target is TPOT < 30ms. Evaluate three quantization strategies: (A) INT8 weight-only, (B) INT4 weight-only, (C) INT4 + INT4 KV-cache.'
question: Which quantization strategy gets a 3B FP16 LLM on A17 Pro from 88 ms TPOT to under 30 ms?
details:
  realistic_solution: Strategy B (INT4 weight-only) is the optimal path. In the simplified mobile decode budget, the dominant DRAM term is the sequential weight stream; FP16 is about 6GB, INT8 is about 3GB, and INT4 is about 1.5GB. INT4 weight-only clears the <30ms target with practical margin. KV-cache quantization can help capacity and long-context cases, but at the stated short context its bandwidth contribution is small relative to the weight stream, so Strategy C adds engineering complexity without being needed for this SLA.
  common_mistake: |
    **The Pitfall:** Assuming INT4 KV-cache quantization provides a proportional TPOT speedup alongside INT4 weight quantization.
    **The Rationale:** Engineers assume KV-cache size dictates decoding latency equally heavily as the primary weight matrices.
    **The Consequence:** Teams invest massively in complex KV-cache quantization kernels for a completely negligible (fractions of a millisecond) speedup per token during single-batch mobile generation.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hardware: 68 GB/s effective memory bandwidth.
    - Model size: 3B parameters (FP16 = 6 GB, INT8 = 3 GB, INT4 = 1.5 GB).
    - Target TPOT: < 30 ms.
    - Decode is batch 1 at a short 128-token context; KV-cache traffic is treated as a small measured add-on rather than the primary TPOT driver.

    **Calculations:**
    - FP16 weight-stream lower bound: 6 GB / 68 GB/s = 88.2 ms.
    - (A) INT8 weight-stream lower bound: 3 GB / 68 GB/s = 44.1 ms.
    - (B) INT4 weight-stream lower bound: 1.5 GB / 68 GB/s = 22.1 ms.
    - Short-context FP16 KV add-on example: 20 MB / 68 GB/s = 0.29 ms.
    - Short-context INT4 KV add-on example: 5 MB / 68 GB/s = 0.07 ms.
    - (B) INT4 weights + FP16 KV example: 22.1 + 0.29 = 22.39 ms.
    - (C) INT4 weights + INT4 KV example: 22.1 + 0.07 = 22.17 ms.

    **Conclusion & Interpretation:**
    - **Result: Memory-Bound**. INT8 weight-only misses the target at 44.1ms. INT4 weight-only is sufficient at about 22.4ms with an illustrative short-context FP16 KV add-on. INT4 KV quantization saves only about 0.2ms in this budget, so Strategy B is the release answer unless memory capacity or much longer context is the primary concern.
