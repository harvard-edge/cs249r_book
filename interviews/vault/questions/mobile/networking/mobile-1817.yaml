title: On-Device Interconnect Bottleneck for NPU Inference
scenario: 'A mobile SoC connects its NPU, GPU, and CPU via a Network-on-Chip (NoC) providing 60 GB/s to shared LPDDR5X memory.'
question: 'Why does the NoC bandwidth, not the NPU''s TOPS rating, determine achievable throughput for LLM inference?'
details:
  realistic_solution: 'LLM decode: each token requires loading the entire model''s weights once. A 3B model in INT8 = 3 GB. With 60 GB/s NoC bandwidth: 3 GB / 60 GB/s = 50ms per token = 20 tokens/second. The NPU''s 45 TOPS would complete the compute in 3B × 2 ops / 45 TOPS = 0.13ms — 380× faster than the memory transfer. The workload is 99.7% memory-bound. Even if the NPU had 100 TOPS, throughput would remain at 20 tok/s. Improvements must target memory: (1) INT4 quantization halves model size → 1.5 GB / 60 GB/s = 25ms = 40 tok/s. (2) KV cache in on-chip SRAM (2 MB) saves re-reading cached attention. (3) Speculative decoding with a tiny draft model that fits in SRAM. The NoC is the true bottleneck, not compute.'
  common_mistake: |
    **The Pitfall:** Quoting the 45 TOPS specification as if the NPU sustains it for any workload.
    **The Rationale:** Engineers focus on peak compute power without realizing autoregressive decode maps poorly to high-intensity convolutions.
    **The Consequence:** Over-promising inference speeds and missing the actual architectural interconnect bottleneck.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 3B model INT8 footprint: 3 GB.
       - NoC bandwidth: 60 GB/s. NPU peak compute: 45 TOPS.
    2. **Calculations:**
       - Decode latency (NoC bound): 3 GB / 60 GB/s = 50 ms = 20 tok/s.
       - Compute time: (3B * 2 ops) / 45 TOPS = 0.13 ms.
       - Arithmetic intensity: 2 ops / 1 byte = 2 ops/byte.
       - Ridge point: 45 TOPS / 60 GB/s = 750 ops/byte.
    3. **Conclusion & Interpretation:**
       - **Result: 2 ops/byte << 750 ops/byte (Deeply Memory-Bound via NoC).**
