title: Shared LPDDR5X Bandwidth Bottleneck for LLM and 4K Video Encode
scenario: A mobile SoC uses a unified LPDDR5X memory bus shared between CPU, GPU, and DSP. Analyze how memory bandwidth contention between a 3B INT4 LLM and a concurrent video encode task (H.265 encoder reading/writing 4K frames) creates a bottleneck.
question: How much of a 77 GB/s Snapdragon memory bus does a 3B INT4 LLM consume alongside 4K H.265 encoding, and how does it degrade TPOT?
details:
  realistic_solution: A 3B INT4 model streams about 1.5GB of weights per decoded token in this simplified bandwidth model. If it achieves 19.5ms/token in isolation, it is already consuming about 1.5GB / 0.0195s = 76.9GB/s, effectively the full 77GB/s bus. A 4K30 YUV420 video path adds about 0.4GB/s, and ISP/display traffic adds another 1.0GB/s, so the non-LLM traffic reserves about 1.4GB/s. Under a simple residual-bandwidth model, the LLM gets 77 - 1.4 = 75.6GB/s, so TPOT becomes 1.5 / 75.6 = 19.8ms/token. The degradation is small numerically here because the video estimate is only 1.4GB/s, but the important diagnosis is that the LLM has almost no bus headroom and additional camera/GPU traffic can queue memory requests.
  common_mistake: |
    **The Pitfall:** Analyzing the LLM and video encoder in isolation.
    **The Rationale:** Candidates assume each gets the full 77 GB/s, forgetting the shared LPDDR5X bus means their bandwidths sum together.
    **The Consequence:** Failing to predict TPOT degradation or request queuing when concurrent media workloads consume the small remaining bus headroom.
  napkin_math: |
    **Assumptions & Constraints:**
    - LLM Size: 3B INT4 (1.5 GB weights).
    - Video Encode: 4096x2160, YUV420, 30 FPS.
    - Bus Capacity: 77 GB/s.
    - ISP/Display Bandwidth Baseline: 1.0 GB/s.

    **Calculations:**
    - LLM Bandwidth (isolated): 1.5GB / 0.0195s = 76.9 GB/s.
    - Video Encode Bandwidth: 4096 * 2160 * 1.5 * 30 FPS = ~0.4 GB/s.
    - Total Demand: 76.9 + 0.4 + 1.0 = 78.3 GB/s (> 77 GB/s Limit).
    - Actual LLM Available Bandwidth: 77 - 1.4 = 75.6 GB/s.
    - Calculate Actual TPOT: 1.5 GB / 75.6 GB/s = 19.8 ms.

    **Conclusion & Interpretation:**
    - **Result: 19.8 ms (Memory-Bound)**. The LLM nearly saturates the bus; the stated video workload reduces available bandwidth from 77 to 75.6 GB/s and degrades TPOT from 19.5ms to about 19.8ms under this simplified contention model.
