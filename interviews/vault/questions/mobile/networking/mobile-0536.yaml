title: The Laggy Mobile Video Filter
scenario: You are a Mobile ML Engineer for an app that applies a real-time generative AI filter to a user's video stream. The app requires a cloud backend for the heavy computation. You are debugging a critical latency issue where the P99 round-trip time is 150ms, far exceeding your 50ms budget for a smooth real-time feel.
question: What backend topology problem most likely explains the 150ms P99 latency for the cloud-based mobile video filter?
details:
  realistic_solution: The most likely cause is a lack of topology awareness in the Kubernetes scheduler. The two GPUs in the model's pipeline are being scheduled on different physical servers. This forces the ~2GB of intermediate activations to be transferred over the relatively slow inter-server InfiniBand network, rather than the ultra-fast intra-server NVLink bridge.
  common_mistake: |
    **The Pitfall:** Blaming the wireless network or single GPU compute performance.
    **The Rationale:** Mobile engineers often instinctively blame the wireless network, failing to consider that in a distributed system, communication time between fast components (GPUs) can easily dominate.
    **The Consequence:** Time is wasted debugging the mobile client or network instead of fixing the backend orchestrator's topology awareness.
  napkin_math: |
    **Assumptions & Constraints:**
    - Total latency: 150ms
    - Known latencies: 10ms (device) + 40ms (network RTT) + 20ms (compute) = 70ms

    **Calculations:**
    - Unaccounted latency: 150ms - 70ms = 80ms

    **Conclusion & Interpretation:**
    - **Result: 80ms (Interconnect-Bound)**. 80ms is spent on inter-node communication.
  options:
  - The mobile client's 5G connection has high jitter, causing unpredictable packet delays.
  - The data transfer from the server's network card to the GPU over the PCIe bus is the primary bottleneck.
  - The backend orchestrator is placing the two model GPUs on different servers, forcing traffic over the slower InfiniBand network instead of NVLink.
  - The H100 GPU is running too hot under load and is being thermally throttled, increasing inference time.
  correct_index: 2
