title: Analyze Thermal Throttling Impact on Mobile Bandwidth
scenario: An iPhone 16 Pro shows TPOT for a 1B INT4 LLM degrading from 7.4ms to 14ms after 5 minutes of sustained inference. The model footprint is 500MB.
question: What does a TPOT jump from 7.4ms to 14ms reveal about A17 Pro bandwidth throttling for a 500 MB LLM?
details:
  realistic_solution: 'Baseline TPOT: 500MB / 68GB/s = 7.35ms. After 5min: 500MB / effective_BW = 14ms -> effective_BW = 500/0.014 = 35.7GB/s. Throttle ratio: 35.7/68 = 52.5%. A17 Pro under sustained load dissipates ~2.8W, hitting the 40°C junction limit. Apple throttles NE bandwidth to ~50% to maintain thermal envelope. Fix: introduce inference pauses (100ms every 2s) to average a 5% duty reduction, avoiding the throttle.'
  common_mistake: |
    **The Pitfall:** Assuming a software or memory leak caused the slowdown.
    **The Rationale:** Candidates ignore the 5-minute time constant, which is a clear physical indicator of thermal saturation on a passively cooled device.
    **The Consequence:** Wasting time debugging non-existent memory leaks while ignoring the hardware's thermal limits.
  napkin_math: |
    **Assumptions & Constraints:**
    - Baseline Unthrottled Bandwidth: 68 GB/s.
    - Model size: 500MB (0.5GB).
    - Degraded TPOT: 14ms (0.014s).

    **Calculations:**
    - Throttled Bandwidth: 0.5 GB / 0.014s = 35.7 GB/s.
    - Throttle Ratio: 35.7 GB/s / 68 GB/s = 52.5%.
    - Mitigation Duty Cycle: 100ms pause per 2000ms = 5% pause.

    **Conclusion & Interpretation:**
    - **Result: 52.5% Throttle Ratio (Thermal-Throttling)**. Sustained load dissipates >2.8W, hitting limits. The OS throttles the Neural Engine to ~50% bandwidth, doubling latency.
