title: A17 Pro Sustained Inference Bandwidth Throttling from TPOT
scenario: An iPhone 16 Pro running a 1B INT4 LLM shows TPOT degrading from 7.4ms to 14ms after 5 minutes of sustained inference. The model footprint is 500MB.
question: What does a TPOT jump from 7.4ms to 14ms reveal about sustained effective bandwidth for this 500 MB LLM on A17 Pro?
details:
  realistic_solution: Using a simple weight-streaming model, baseline TPOT is 0.5GB / 68GB/s = 7.35ms. After 5 minutes, 0.5GB / effective_BW = 14ms, so effective_BW = 0.5 / 0.014 = 35.7GB/s. That is 35.7 / 68 = 52.5% of the original bandwidth, so the observed TPOT nearly doubles because sustained effective bandwidth is roughly halved. The data supports a sustained-load throttling diagnosis, but the prompt does not justify exact junction-temperature or wattage claims. Mitigate by reducing sustained duty cycle, limiting background contention, shortening generation bursts, or adapting batch/context work when measured thermal or bandwidth counters show throttling.
  common_mistake: |
    **The Pitfall:** Assuming a software or memory leak caused the slowdown.
    **The Rationale:** Candidates ignore the 5-minute time constant, which is a clear physical indicator of thermal saturation on a passively cooled device.
    **The Consequence:** Wasting time debugging non-existent memory leaks while ignoring the hardware's thermal limits.
  napkin_math: |
    **Assumptions & Constraints:**
    - Baseline Unthrottled Bandwidth: 68 GB/s.
    - Model size: 500MB (0.5GB).
    - Degraded TPOT: 14ms (0.014s).

    **Calculations:**
    - Throttled Bandwidth: 0.5 GB / 0.014s = 35.7 GB/s.
    - Throttle Ratio: 35.7 GB/s / 68 GB/s = 52.5%.
    - Throttling implication: effective bandwidth is roughly halved under sustained load.

    **Conclusion & Interpretation:**
    - **Result: 52.5% effective-bandwidth ratio under sustained inference.** The TPOT jump is consistent with throttling or other sustained-load bandwidth reduction, but exact thermal limits and power numbers are not derivable from the prompt.
