title: A17 Pro Sustained Inference Bandwidth Throttling from TPOT
scenario: An iPhone 16 Pro running a 1B INT4 LLM shows TPOT degrading from 7.4ms to 14ms after 5 minutes of sustained inference. The model footprint is 500MB, and the analysis should use a simplified weight-streaming approximation rather than a full kernel trace.
question: Under a weight-streaming approximation, what does a 7.4ms to 14ms TPOT jump reveal about sustained bandwidth?
details:
  realistic_solution: |
    Using the prompt's simple weight-streaming model, baseline TPOT is 0.5GB / 68GB/s = 7.35ms. After 5 minutes, 0.5GB / effective_BW = 14ms, so the implied effective bandwidth is about 35.7GB/s. Because real TPOT also includes compute, KV traffic, cache behavior, and scheduling, this should be read as directional evidence: the observed near-doubling of TPOT is consistent with sustained effective bandwidth falling to roughly half of the short-burst level, not proof of an exact 52.5% hardware bandwidth ratio. Mitigate by reducing sustained duty cycle, limiting background contention, shortening generation bursts, or adapting batch/context work when measured thermal or bandwidth counters show throttling.
  common_mistake: |
    **The Pitfall:** Assuming a software or memory leak caused the slowdown.
    **The Rationale:** Candidates ignore the 5-minute time constant, which is a clear physical indicator of thermal saturation on a passively cooled device.
    **The Consequence:** Wasting time debugging non-existent memory leaks while ignoring the hardware's thermal limits.
  napkin_math: |
    **Assumptions & Constraints:**
    - Baseline short-burst bandwidth inferred by the simplified model: 68 GB/s.
    - Model size: 500MB (0.5GB).
    - Degraded TPOT: 14ms (0.014s).
    - Approximation: treat token time as dominated by one effective weight stream; real kernels also include compute, KV reads, cache behavior, and scheduling.

    **Calculations:**
    - Implied sustained effective bandwidth: 0.5 GB / 0.014s = 35.7 GB/s.
    - Approximate ratio under this model: 35.7 GB/s / 68 GB/s = 52.5%.
    - Directional implication: effective bandwidth is roughly halved under sustained load.

    **Conclusion & Interpretation:**
    - **Result: Roughly halved effective bandwidth under the simplified model.** The TPOT jump is consistent with throttling or other sustained-load bandwidth reduction, but exact bandwidth, thermal limits, and power numbers are not derivable without device counters.
