title: 'Network Bandwidth Bottlenecks: Evaluate Speculative Decoding Bandwidth Impact on Mobile'
scenario: A mobile device using a Snapdragon 8 Gen 3 implements speculative decoding with a 100M INT8 draft model and a 3B INT4 target model. The draft model generates 4 tokens per step, and the target model verifies them.
question: On Snapdragon 8 Gen 3, does a 100M draft plus 3B INT4 target improve TPOT after bandwidth costs?
details:
  realistic_solution: 'Assume neither model remains fully resident in SRAM, so every autoregressive target decode streams the 3B INT4 weights once from DRAM, and each draft proposal streams the 100M INT8 draft weights once. Expected verified tokens from K=4 proposals with α=0.8 are 1 + 0.8 + 0.8^2 + 0.8^3 = 2.952. Target model weights: 3B INT4 = 1.5GB, so one verification pass costs 1.5GB / 77GB/s = 19.5ms. Draft model: 100M INT8 = 100MB = 0.1GB, so four draft passes cost 4 × 0.1GB / 77GB/s = 5.2ms. Total step time = 19.5 + 5.2 = 24.7ms. Generating 2.952 expected tokens in 24.7ms yields effective TPOT of 24.7 / 2.952 = 8.37ms/token. Compared with the non-speculative 19.5ms/token target decode, this is a ~2.33x speedup under the stated bandwidth model.'
  common_mistake: |
    **The Pitfall:** Assuming speculative decoding speeds up mobile inference without doing the bandwidth math.
    **The Rationale:** Ignoring the fact that the draft model weights and the target verification pass still consume DRAM bandwidth each speculative step.
    **The Consequence:** Implementing complex speculative decoding that actually degrades mobile performance due to bandwidth saturation.
  napkin_math: |
    **Assumptions & Constraints:**
    - Snapdragon 8 Gen 3 (77 GB/s bandwidth).
    - Draft: 100M INT8 (100MB = 0.1GB). Target: 3B INT4 (1.5GB).
    - K=4 proposals, α=0.8.
    - Weight residency assumption: weights are not fully cached in SRAM; each draft proposal streams draft weights, and each speculative step streams target weights once for verification.

    **Calculations:**
    - Expected verified tokens per step: 1 + 0.8 + 0.8^2 + 0.8^3 = 2.952 tokens.
    - Target step read time: 1.5 GB / 77 GB/s = 19.5ms.
    - Draft step read time (4 passes): (4 * 0.1 GB) / 77 GB/s = 5.2ms.
    - Total step time: 19.5ms + 5.2ms = 24.7ms.
    - Effective TPOT: 24.7ms / 2.952 tokens = 8.37ms/token.

    **Conclusion & Interpretation:**
    - **Result: 2.33x speedup (Memory-Bandwidth Bound)**. Under the explicit DRAM-streaming assumption, speculative decoding improves TPOT from 19.5ms/token to about 8.37ms/token.
