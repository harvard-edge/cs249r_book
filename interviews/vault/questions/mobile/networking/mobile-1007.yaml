title: 'Network Bandwidth Bottlenecks: Evaluate Speculative Decoding Bandwidth Impact on Mobile'
scenario: A mobile device using a Snapdragon 8 Gen 3 implements speculative decoding with a 100M INT8 draft model and a 3B INT4 target model. The draft model generates 4 tokens per step, and the target model verifies them.
question: On Snapdragon 8 Gen 3, does a 100M draft plus 3B INT4 target improve TPOT after bandwidth costs?
details:
  realistic_solution: 'Assume a bandwidth-bound decode where the target model streams its 1.5GB INT4 weights once per normal output token, while speculative verification streams those weights once per speculative step and checks the K=4 proposed positions in parallel. The draft model streams 0.1GB once for each proposed token. With independent per-token acceptance α=0.8, the expected number of output tokens per speculative step is 1 + α + α^2 + α^3 + α^4 = 3.362; the final term is the bonus token produced when all four draft tokens are accepted. The step cost is one target verification pass plus four draft passes: 1.5GB / 77GB/s + 0.4GB / 77GB/s = 24.7ms. Effective TPOT is 24.7 / 3.362 = 7.35ms/token. The consistent baseline is target-only decode at 1.5GB / 77GB/s = 19.5ms/token, so speculative decoding gives about 2.65x speedup under this simplified bandwidth model.'
  common_mistake: |
    **The Pitfall:** Assuming speculative decoding speeds up mobile inference without doing the bandwidth math.
    **The Rationale:** Ignoring the fact that the draft model weights and the target verification pass still consume DRAM bandwidth each speculative step.
    **The Consequence:** Implementing complex speculative decoding that actually degrades mobile performance due to bandwidth saturation.
  napkin_math: |
    **Assumptions & Constraints:**
    - Snapdragon 8 Gen 3 (77 GB/s bandwidth).
    - Draft: 100M INT8 (100MB = 0.1GB). Target: 3B INT4 (1.5GB).
    - K=4 proposals with independent per-token acceptance α=0.8.
    - Weight residency assumption: weights are not fully cached in SRAM; each draft proposal streams draft weights, and one target verification pass checks the proposed block.

    **Calculations:**
    - Target-only baseline TPOT: 1.5 GB / 77 GB/s = 19.5ms/token.
    - Expected output tokens per speculative step: 1 + α + α^2 + α^3 + α^4 = 1 + 0.8 + 0.64 + 0.512 + 0.4096 = 3.362 tokens.
    - The α^4 term is the bonus target token emitted only when all 4 draft tokens are accepted.
    - Target step read time: 1.5 GB / 77 GB/s = 19.5ms.
    - Draft step read time (4 passes): (4 * 0.1 GB) / 77 GB/s = 5.2ms.
    - Total step time: 19.5ms + 5.2ms = 24.7ms.
    - Effective TPOT: 24.7ms / 3.362 tokens = 7.35ms/token.

    **Conclusion & Interpretation:**
    - **Result: 2.65x speedup (Memory-Bandwidth Bound)**. Under the explicit DRAM-streaming assumption, speculative decoding improves TPOT from 19.5ms/token to about 7.35ms/token.
