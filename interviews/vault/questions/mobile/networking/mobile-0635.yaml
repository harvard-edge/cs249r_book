title: Topology-Oblivious MoE Routing on a Mobile SoC
scenario: Your team is prototyping a small MoE language model on a mobile SoC. Experts are split across the Hexagon HTP, Adreno GPU, and CPU, with shared LPDDR and limited on-chip SRAM for intermediate activations.
question: Why does topology-oblivious MoE routing degrade on-device expert communication speed?
details:
  realistic_solution: The optimization was topology-oblivious and ignored the mobile SoC hierarchy. A good MoE router keeps token batches on the accelerator that owns the selected experts when possible, groups experts by HTP/GPU/CPU placement, and avoids unnecessary round trips through CPU memory. A topology-oblivious All-to-All can scatter small activation shards across compute units without regard to locality, forcing extra LPDDR reads and writes, DMA synchronization, cache pollution, and CPU merge work. The slowdown is a placement and scheduling problem, not a generic accelerator failure.
  common_mistake: |
    **The Pitfall:** Blaming the mobile NPU or GPU driver for poor MoE performance.
    **The Rationale:** Assuming the accelerator is slow rather than diagnosing a software path-selection error in the routing primitive.
    **The Consequence:** Wasting weeks tuning kernels while the communication logic continues to force avoidable LPDDR traffic and CPU synchronization.
  napkin_math: |
    **Assumptions & Constraints:**
    - Representative MoE activation exchange per token batch: 64 MB.
    - Local accelerator/SRAM path for grouped experts: about 400 GB/s effective on-chip movement.
    - Unnecessary shared-LPDDR plus CPU/DMA detour: about 40 GB/s effective after synchronization overhead.

    **Calculations:**
    - Topology-aware local path: 64 MB / 400 GB/s = 0.16ms.
    - Topology-oblivious detour: 64 MB / 40 GB/s = 1.6ms, before extra queue and CPU merge overhead.
    - Latency penalty: 1.6ms / 0.16ms = 10x slower for traffic that should have stayed local to one accelerator group.

    **Conclusion & Interpretation:**
    - **Result: ~10x slower for avoidable detours (Topology-Bound).** The degradation comes from expert placement and routing that ignore mobile compute-unit locality, not from a generic NPU performance problem.
