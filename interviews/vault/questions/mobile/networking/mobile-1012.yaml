title: 'Network Bandwidth Bottlenecks: Master Roofline Analysis for Mobile LLM Scaling'
scenario: Apply roofline model analysis to determine the minimum batch size at which a 3B INT4 LLM transitions from memory-bandwidth-bound to compute-bound on a mobile SoC.
question: At what batch size does a 3B INT4 LLM transition from bandwidth-bound to compute-bound decode, and what does this mean for mobile serving?
details:
  realistic_solution: 'INT4 effective TOPS: 90 TOPS. BW: 77 GB/s. Ridge point: 90T/77G=1169 FLOPs/byte. Per-token decode FLOPs: 2x3B=6B FLOPs. Bytes: 1.5GB. AI per token: 6B/1.5GB=4 FLOPs/byte << 1169. Transition batch: B * 6B FLOPs / 1.5GB = 1169 -> B = 292 tokens. At batch=292: compute-bound. TPOT at batch=292: max(292*6B/90T, 1.5/77) = 19.5ms. Mobile reality: batch=292 means 292 concurrent users \u2014 impractical on device. Mobile is always memory-bandwidth-bound for LLM decode.'
  common_mistake: |
    **The Pitfall:** Using INT8 TOPS for INT4 arithmetic intensity calculations.
    **The Rationale:** Candidates forget that NPUs with native INT4 support can achieve 2x the compute throughput of INT8.
    **The Consequence:** Misidentifying the hardware's ridge point and misunderstanding the exact batch size where the workload transitions from memory-bound to compute-bound.
  napkin_math: |
    **Assumptions & Constraints:**
    - Memory Bandwidth: 77 GB/s.
    - Effective INT4 Compute: 90 TOPS.
    - Model: 3B params INT4 (1.5 GB).

    **Calculations:**
    - Hardware Ridge Point: 90 TOPS / 77 GB/s = 1169 FLOPs/byte.
    - Single Token AI: 6B FLOPs / 1.5 GB = 4 FLOPs/byte.
    - Transition Batch (B): B * 4 FLOPs/byte = 1169 -> B = 292.
    - TPOT at Batch 1: max(6B/90T, 1.5GB/77G) = 19.5ms (Memory Bound).

    **Conclusion & Interpretation:**
    - **Result: Memory-Bound.** Auto-regressive decode on mobile will strictly remain bandwidth-bound because batching 292 users is impossible on a single device.
