title: LPDDR5X Bandwidth Scheduling for Mobile Multi-Model Inference
scenario: 'You need to design a memory bandwidth-aware scheduling system for a mobile SoC (16GB LPDDR5X, 77 GB/s) running 3 concurrent ML tasks: speech recognition (2GB/s), LLM assistant (76GB/s during decode), and camera depth estimation (15GB/s).'
question: How should a scheduler prevent memory bandwidth saturation across concurrent speech, LLM, and depth tasks?
details:
  realistic_solution: Implement a priority-based memory bandwidth scheduler that reserves bandwidth for latency-critical streams and preempts non-critical tasks during peak LLM decode phases. With 77 GB/s total LPDDR5X bandwidth and 3 GB/s system overhead, only 74 GB/s is available to ML workloads. The LLM's 76 GB/s peak demand cannot safely run at full speed alongside speech or depth; the scheduler must either give the LLM an exclusive decode slot and accept slight TPOT inflation from the system overhead, or throttle/interleave LLM decode so speech can keep a small guaranteed slice while depth is suspended.
  common_mistake: |
    **The Pitfall:** Designing a simple time-sliced scheduler without tracking peak memory bandwidth demands.
    **The Rationale:** Candidates treat concurrency purely as a CPU/NPU sharing problem rather than an LPDDR5X bus capacity problem.
    **The Consequence:** Scheduling the LLM alongside depth estimation, resulting in 93 GB/s of demand on a 74 GB/s bus, causing immediate stalls and stuttering.
  napkin_math: |
    **Assumptions & Constraints:**
    - Total Bus Limit: 77 GB/s.
    - System Overhead: 3 GB/s (74 GB/s available).
    - Task demands: Speech (2 GB/s), Depth (15 GB/s), LLM (76 GB/s peak).

    **Calculations:**
    - Simultaneous Collision: 2 GB/s + 15 GB/s + 76 GB/s = 93 GB/s.
    - Deficit: 93 GB/s - 74 GB/s = 19 GB/s overload.
    - LLM + Speech: 76 GB/s + 2 GB/s = 78 GB/s, still 4 GB/s over the 74 GB/s ML budget.
    - LLM Alone vs. ML Budget: 76 GB/s - 74 GB/s = 2 GB/s over the budget, so full-speed decode cannot be guaranteed with system overhead.

    **Conclusion & Interpretation:**
    - **Result: 19 GB/s overload for all tasks, and 4 GB/s overload even for LLM + speech (Bandwidth-Bound)**. The scheduler must suspend depth during LLM decode and either reserve an exclusive LLM slot with slight TPOT inflation or throttle/interleave LLM decode to leave speech a guaranteed bandwidth slice.
