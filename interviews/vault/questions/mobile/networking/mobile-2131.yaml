title: Automotive Ethernet AllGather
scenario: A vehicle cluster with 3 Snapdragon 8 Gen 3 modules shares 8MB bounding box tensors via an automotive Gigabit Ethernet switch.
question: What is the ring AllGather latency for an 8MB tensor per node across 3 nodes over Gigabit Ethernet, accounting for a 50us switch processing delay per hop and a 1ms synchronization barrier?
details:
  realistic_solution: In AllGather, each node receives (N-1) chunks. Each node must transmit its 8MB to the others, meaning 2 chunks of 8MB (16MB) are received per node. At 1000 Mbps, 128Mb takes 128ms. The switch delays and 1ms barrier add negligible overhead compared to the payload.
  common_mistake: |
    **The Pitfall:** Confusing the AllGather payload scaling factor with AllReduce.
    **The Rationale:** Engineers mistakenly use the AllReduce factor of $2*(N-1)/N$ instead of the AllGather factor of $(N-1)*M$.
    **The Consequence:** This leads to incorrect bandwidth bounds and underestimating the network latency for the aggregation step.
  napkin_math: |
    **Assumptions & Constraints:**
    - Nodes (N): 3.
    - Tensor size (M): 8 MB.
    - Network: Gigabit Ethernet (1000 Mbps).
    - Switch delay: 50us per hop. Sync barrier: 1ms.

    **Calculations:**
    - Data received per node: $(N-1) * M = (3-1) * 8\text{ MB} = 16\text{ MB}$.
    - Convert to Megabits: 16 MB * 8 bits/byte = 128 Mb.
    - Transmission time: 128 Mb / 1000 Mbps = 0.128 s = 128 ms.
    - Switch delay: 2 hops * 50us = 100us = 0.1 ms.
    - Total latency: 128 ms + 0.1 ms + 1.0 ms = 129.1 ms.

    **Conclusion & Interpretation:**
    - **Result: 129.1 ms Latency**. The payload transmission heavily dominates the latency, proving that the switch and barrier delays are negligible.
