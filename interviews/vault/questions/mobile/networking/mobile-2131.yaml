title: Automotive Ethernet AllGather
scenario: A prototype vehicle perception cluster with 3 embedded accelerator nodes shares 8MB bounding box tensors via an automotive Gigabit Ethernet switch.
question: What simplified bandwidth-bound latency estimates 3-node ring AllGather for 8MB per node over Gigabit Ethernet with 50us hops and a 1ms barrier?
details:
  realistic_solution: For this simplified bandwidth-bound ring AllGather estimate, model each node as receiving N-1 tensor chunks over the bottleneck Gigabit link and add the barrier separately. With 3 nodes and an 8MB tensor per node, each node receives 16MB total. At 1000 Mbps, 128Mb takes 128ms; adding two 50us switch-hop delays and a 1ms barrier gives about 129.1ms. A detailed ring model would split the tensor into chunks across two communication steps and include step-level overlap and per-step overhead, but payload bandwidth dominates this rough bound.
  common_mistake: |
    **The Pitfall:** Confusing the AllGather payload scaling factor with AllReduce.
    **The Rationale:** Engineers mistakenly use the AllReduce factor of $2*(N-1)/N$ instead of the AllGather factor of $(N-1)*M$.
    **The Consequence:** This leads to incorrect bandwidth bounds and underestimating the network latency for the aggregation step.
  napkin_math: |
    **Assumptions & Constraints:**
    - Nodes (N): 3.
    - Tensor size (M): 8 MB.
    - Network: Gigabit Ethernet (1000 Mbps).
    - Switch delay: 50us per hop. Sync barrier: 1ms.
    - Simplified model: estimate the per-node bandwidth bound from total received payload, then add one synchronization barrier separately.

    **Calculations:**
    - Ring steps: N - 1 = 2.
    - Data received per node: $(N-1) * M = (3-1) * 8\text{ MB} = 16\text{ MB}$.
    - In a real ring this payload is chunked across 2 steps; this approximation collapses those steps into the total bytes received on the bottleneck link.
    - Convert to Megabits: 16 MB * 8 bits/byte = 128 Mb.
    - Transmission time: 128 Mb / 1000 Mbps = 0.128 s = 128 ms.
    - Switch delay: 2 hops * 50us = 100us = 0.1 ms.
    - Total latency: 128 ms + 0.1 ms + 1.0 ms = 129.1 ms.

    **Conclusion & Interpretation:**
    - **Result: about 129.1 ms simplified bandwidth-bound latency**. The switch-hop and barrier costs are small compared with the 128ms payload transfer, but a full ring simulator would model chunking, overlap, and per-step overhead explicitly.
