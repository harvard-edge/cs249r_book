title: Snapdragon Segmentation Video Uplink
scenario: A Snapdragon 8 Gen 3 performs live background segmentation on a 1080p camera stream at 30 FPS. The device must push the binary segmentation masks to a cloud server over a constrained 5 Mbps cellular uplink.
question: What optimization to the binary mask transmission architecture ensures the frame push stays within the 5 Mbps bandwidth limit?
visual:
  kind: svg
  path: mobile-1875.svg
  alt: 'Graph showing raw segmentation masks passed through an RLE encoder before hitting the cellular uplink bottleneck.'
  caption: Segmentation Mask Uplink Optimization
details:
  realistic_solution: A raw 1080p binary mask is 1920x1080 bits ≈ 259 KB per frame. At 30 FPS, raw transmission requires 7.7 MB/s (62 Mbps), severely exceeding the 5 Mbps (625 KB/s) uplink. The optimization is to convert the binary masks into sparse bounding polygons or use Run-Length Encoding (RLE), capping the per-frame payload to 5 Mbps / 30 FPS = 166 Kb (approx 20.8 KB) per frame.
  common_mistake: |
    **The Pitfall:** Relying on standard PNG compression.
    **The Rationale:** Engineers assume standard image compression is sufficient, ignoring that PNG encoding is too computationally slow for a 30 FPS real-time pipeline.
    **The Consequence:** The pipeline drops frames due to encoding latency, or exceeds the bandwidth limit if compression is skipped.
  napkin_math: |
    **Assumptions & Constraints:**
    - Resolution: 1920x1080 pixels (binary, 1 bit/pixel).
    - Frame rate: 30 FPS.
    - Uplink limit: 5 Mbps (5,000,000 bits/sec).

    **Calculations:**
    - Raw payload per frame: 1920 * 1080 = 2,073,600 bits = ~259 KB.
    - Raw bandwidth: 2,073,600 bits/frame * 30 FPS = 62,208,000 bps = ~62 Mbps.
    - Target max per frame: 5,000,000 bits/sec / 30 FPS = 166,666 bits/frame = ~20.8 KB/frame.

    **Conclusion & Interpretation:**
    - **Result: < 20.8 KB Target**. Raw transmission uses 62 Mbps; an RLE or polygonal encoding must compress the mask down to under 20.8 KB per frame to fit the cellular uplink constraint.
