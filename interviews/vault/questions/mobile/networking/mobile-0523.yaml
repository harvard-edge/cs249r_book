title: The Multi-Node Scaling Cliff
scenario: You scale an object detection training job from 8 GPUs (1 server) to 32 GPUs (4 servers). Throughput only improves by 20%, and the `AllReduce` step takes 70% of the wall time.
question: Why does scaling from 8 to 32 H100s improve throughput only 20% when AllReduce consumes 70% of each step?
details:
  realistic_solution: The bottleneck is the interconnect between the server nodes. Inside a single H100 server, the 8 GPUs communicate over NVLink 4.0, which has a massive 900 GB/s of bandwidth. When the `AllReduce` operation has to cross the server boundary to the other 24 GPUs, it must traverse the much slower inter-node network fabric, likely InfiniBand NDR at 400 Gbps (50 GB/s). This ~18x drop in bandwidth means the GPUs spend most of their time waiting for gradients to be exchanged between nodes, leading to poor scaling efficiency.
  common_mistake: |
    **The Pitfall:** Misdiagnosing distributed scaling bottlenecks as compute or batch-size issues.
    **The Rationale:** Engineers assume all GPUs in a cluster have uniform communication speeds, ignoring the massive difference between intra-node and inter-node fabrics.
    **The Consequence:** They waste time optimizing local GPU kernels when the cluster is entirely stalled on the network switch.
  napkin_math: |
    - **Intra-node Bandwidth:** NVLink 4.0 = 900 GB/s.
    - **Inter-node Bandwidth:** InfiniBand NDR = ~50 GB/s.
    - **Bandwidth Drop:** 900 / 50 = 18x slower across servers.
    - **Time Impact:** A 10ms NVLink AllReduce takes ~180ms over InfiniBand.
    - **Final Result:** **At a 250ms step time, 180ms of networking causes a 70% communication overhead, destroying scaling efficiency.**
  options:
  - The PCIe Gen5 bus is saturated from transferring gradients between the GPU and the network card for inter-node communication.
  - The model's activations are causing HBM cache misses, and the system is stalling on main memory access.
  - Communication is bottlenecked by the ~18x bandwidth drop when moving from the 900 GB/s intra-node NVLink to the ~50 GB/s inter-node InfiniBand fabric.
  - The CPU is unable to schedule the `AllReduce` kernels fast enough across the 32 GPUs, creating a dispatch bottleneck.
  correct_index: 2
