title: 'Network Bandwidth Bottlenecks: Specification — Minimum BW for 10-Turn Conversation SLA'
scenario: 'Specify the minimum LPDDR5X memory bandwidth required for a mobile device to maintain TPOT < 40ms throughout a 10-turn conversation with a 3B INT4 LLM (each turn: 200 prompt tokens + 100 response tokens).'
question: How would you derive the worst-case bandwidth requirement and compare against LPDDR5 (51.2 GB/s) vs LPDDR5X (77 GB/s)?
details:
  realistic_solution: 'Worst case: end of turn 10, decoding at context = 10×(200+100)=3000 tokens accumulated. KV/token: 524KB. KV total: 3000×524KB=1.572GB. Weight: 1.5GB. Total per decode step: 3.072GB. Required BW for TPOT < 40ms: 3.072GB / 0.040s = 76.8GB/s. LPDDR5 (51.2 GB/s): TPOT at turn 10 = 3.072/51.2=60ms > 40ms. FAILS. LPDDR5X (77 GB/s): 3.072/77=39.9ms ≈ 40ms. BARELY passes. Need 77 GB/s minimum.'
  common_mistake: |
    **The Pitfall:** Using the initial TPOT as the design point.
    **The Rationale:** Candidates evaluate the short context scenario but fail to compute the worst-case memory bandwidth needed at the longest context.
    **The Consequence:** The system severely violates the 40ms SLA as the conversation progresses due to KV-cache scaling.
  napkin_math: |
    **Assumptions & Constraints:**
    - Max Context: 10 turns * 300 tokens = 3000 tokens.
    - KV-cache per token: 524 KB.
    - Weights (INT4): 1.5 GB.

    **Calculations:**
    - KV-cache total: 3000 * 524 KB = 1.572 GB.
    - Total memory per step: 1.5 GB + 1.572 GB = 3.072 GB.
    - Target bandwidth for 40ms TPOT: 3.072 GB / 0.040s = 76.8 GB/s.
    - LPDDR5 (51.2 GB/s): 3.072 / 51.2 = 60ms.
    - LPDDR5X (77 GB/s): 3.072 / 77 = 39.9ms.

    **Conclusion & Interpretation:**
    - **Result: 76.8 GB/s is required, making LPDDR5X barely sufficient (Bandwidth-Bound).** Worst-case context size must dictate hardware requirements.
