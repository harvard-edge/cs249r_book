title: The Cloud-Native Fallacy on Mobile
scenario: An AI team, accustomed to cloud development, proposes porting their multi-stage generative pipeline directly to a flagship mobile device. The first model generates a 512MB latent tensor, which is fed to a second refiner model. They argue, "On the cloud, we pay a huge latency tax sending this tensor over NVLink between GPUs. On a mobile SoC, the models share the same memory, so the transfer should be trivial."
question: Why is the mobile SoC shared-memory transfer of a 512MB latent tensor still a serious power and latency problem?
details:
  realistic_solution: 'The team''s assumption is flawed. Shared memory removes a discrete interconnect copy, but it does not make a 512MB tensor free: the producers and consumers still read and write that data through a finite LPDDR bandwidth and power budget, contending with the display, ISP, CPU, GPU, and NPU. The analysis must distinguish address-space sharing from bandwidth demand and sustained DRAM energy.'
  common_mistake: |
    **The Pitfall:** Focusing only on theoretical peak bandwidth and latency specs.
    **The Rationale:** Engineers incorrectly assume that because UMA avoids PCIe bottlenecks, massive memory transfers are "free."
    **The Consequence:** Designing pipelines that instantly cause thermal throttling and drain the battery.
  napkin_math: |
    **Assumptions & Constraints:**
    - Shared tensor traffic per frame: 512 MB of latent data read by the next stage.
    - Mobile Bandwidth: 51.2 GB/s.
    - Framerate: 30 FPS.
    - Rough DRAM energy model for discussion: sustained memory traffic can cost on the order of ~1W per 10 GB/s on a mobile device.

    **Calculations:**
    - Time to stream 512 MB at peak bandwidth: 512 MB / 51.2 GB/s = ~10 ms.
    - Bandwidth at 30 FPS: 512 MB * 30 = 15.3 GB/s continuous traffic.
    - Rough incremental DRAM power: 15.3 GB/s * (1W / 10 GB/s) = ~1.5W, before other pipeline traffic.

    **Conclusion & Interpretation:**
    - **Result: High sustained memory-bandwidth pressure**. Even without a PCIe/NVLink-style copy, repeatedly streaming a 512MB tensor can consume meaningful latency and power headroom, increasing thermal risk and contention with the rest of the mobile pipeline.
