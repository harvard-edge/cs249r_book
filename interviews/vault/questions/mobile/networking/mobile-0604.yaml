title: The Cloud-Native Fallacy on Mobile
scenario: An AI team, accustomed to cloud development, proposes porting their multi-stage generative pipeline directly to a flagship mobile device. The first model generates a 512MB latent tensor, which is fed to a second refiner model. They argue, "On the cloud, we pay a huge latency tax sending this tensor over NVLink between GPUs. On a mobile SoC, the models share the same memory, so the transfer should be trivial."
question: Why is the mobile SoC shared-memory transfer of a 512MB latent tensor still a serious power and latency problem?
details:
  realistic_solution: 'The team''s assumption is dangerously flawed. While the physical distance is smaller, the system architecture and constraints are entirely different. The analysis must differentiate between protocol, topology, and the primary constraint: power.'
  common_mistake: |
    **The Pitfall:** Focusing only on theoretical peak bandwidth and latency specs.
    **The Rationale:** Engineers incorrectly assume that because UMA avoids PCIe bottlenecks, massive memory transfers are "free."
    **The Consequence:** Designing pipelines that instantly cause thermal throttling and drain the battery.
  napkin_math: |
    **Assumptions & Constraints:**
    - Data Transfer Per Frame: 512 MB.
    - Mobile Bandwidth: 51.2 GB/s.
    - Framerate: 30 FPS.
    - Power Cost: Mobile memory consumes ~1W per 10 GB/s.

    **Calculations:**
    - Latency per Transfer: 512 MB / 51.2 GB/s = 10 ms.
    - Bandwidth at 30 FPS: 512 MB * 30 = 15.3 GB/s continuous traffic.
    - Total Power: 15.3 GB/s * (1W / 10 GB/s) = ~1.5W.

    **Conclusion & Interpretation:**
    - **Result: ~1.5W power draw (Thermal-Bound)**. Moving this single tensor burns 1.5W continuously, which is ~30% of the entire mobile power budget, guaranteeing thermal throttling.
