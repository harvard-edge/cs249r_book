title: 'Network Bandwidth Bottlenecks: Design Offline-First Bandwidth Architecture for Rural Mobile LLM'
scenario: 'Design a bandwidth-aware inference architecture for a mobile health app targeting rural areas with intermittent connectivity (2G: 0.1Mbps, 3G: 1Mbps, WiFi: 10Mbps). The app uses a 1B INT4 LLM for medical Q&A.'
question: 'How would you specify: on-device model configuration, model download strategy, graceful degradation for different connectivity levels, and cloud fallback criteria?'
details:
  realistic_solution: 'Use decimal network units throughout: Mbps converts to MB/s by dividing by 8. On-device: 1B INT4 = 500MB. Download time at WiFi 10Mbps = 1.25MB/s is 500MB/1.25MB/s = 400s = 6.7min. At 3G 1Mbps = 0.125MB/s, download time is 4000s = 67min, suitable only as a background download. At 2G 0.1Mbps = 0.0125MB/s, download time is 40,000s = 11hr, so full-model OTA is impractical. Strategy: pre-install or first-run download over WiFi, then use small delta updates. Delta updates: 50MB avg / WiFi = 40s, 3G = 400s = 6.7min in the background; avoid model updates on 2G except emergency text/config patches. Graceful degradation: 2G uses offline-only local answers and cached clinical content; 3G uses local answers with deferred sync and optional cloud only for nonurgent long completions; WiFi can use a cloud model when quality is needed and measured end-to-end latency is better than local. Cloud fallback criteria should be explicit: stable WiFi or 3G above about 1Mbps, RTT below about
    150ms for interactive tasks, no recent disconnects, and task quality/latency better than the local path.'
  common_mistake: |
    **The Pitfall:** Designing only the cloud-fallback path without specifying an on-device capability that works completely offline.
    **The Rationale:** Developers assume constant connectivity and deploy cloud-first defaults.
    **The Consequence:** Specifying a model too large to download on 2G means the rural health app is completely non-functional for its target demographic.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model Footprint: 1B INT4 = 500 MB.
    - WiFi Download: 10 Mbps (1.25 MB/s).
    - 3G Download: 1 Mbps (0.125 MB/s).
    - 2G Download: 0.1 Mbps (0.0125 MB/s).
    - Decimal units: 1 MB = 1,000,000 bytes and 1 Mbps = 0.125 MB/s.
    - On-device latency is measured as an empirical device benchmark, not derived only from model size.
    - Cloud fallback requires stable connectivity, interactive RTT below about 150ms, and measured end-to-end task latency or quality better than local.

    **Calculations:**
    - WiFi Download: 500 MB / 1.25 MB/s = 400 seconds.
    - 3G Download: 500 MB / 0.125 MB/s = 4000 seconds.
    - 2G Download: 500 MB / 0.0125 MB/s = 40,000 seconds = 11 hours.
    - Delta over WiFi: 50 MB / 1.25 MB/s = 40 seconds.
    - Delta over 3G: 50 MB / 0.125 MB/s = 400 seconds = 6.7 minutes.
    - Cloud fallback tiers: 2G offline-only; 3G delayed sync and optional nonurgent cloud; WiFi interactive cloud if RTT and quality thresholds are met.

    **Conclusion & Interpretation:**
    - **Result: 11hr 2G full-model download.** Slow edge networking precludes large OTA model installs on 2G, so the architecture must be offline-first with WiFi-preload, background deltas on 3G/WiFi, and explicit cloud fallback thresholds for connectivity, RTT, task latency, and quality.
