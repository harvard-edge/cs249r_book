title: LPDDR5X Bandwidth on Snapdragon 8 Gen 3 vs Tensor G3
scenario: A mobile ML engineer asks about comparative memory bandwidth on modern mobile SoCs.
question: What is the memory bandwidth of LPDDR5X on Snapdragon 8 Gen 3, how does it compare to LPDDR5 on Tensor G3, and why does this matter for LLM inference?
details:
  realistic_solution: Snapdragon 8 Gen 3 is commonly cited around 77 GB/s of LPDDR5X bandwidth, while Tensor G3 is commonly cited around 51.2 GB/s of LPDDR5 bandwidth. The difference is 77 - 51.2 = 25.8 GB/s, so Snapdragon has about 77/51.2 = 1.50x the peak shared memory bandwidth. This matters for LLM inference because batch-1 decode often moves large model-weight and KV-cache traffic through shared DRAM. If the decode path is memory-bound and the per-token memory traffic is otherwise the same, Snapdragon can support up to about 1.5x the memory-bound token throughput. Do not interpret model size divided by bandwidth as the full TPOT model unless you have specified that each token streams the full weight set exactly once and compute is not limiting.
  common_mistake: |
    **The Pitfall:** Confusing LPDDR5X bandwidth with total memory bandwidth or ignoring shared memory limits.
    **The Rationale:** Candidates forget that the ~77 GB/s bandwidth is shared between CPU, GPU, DSP, and all other SoC components.
    **The Consequence:** Overestimating available bandwidth for LLM decode, leading to missed TPOT targets.
  napkin_math: |
    **Assumptions & Constraints:**
    - Bandwidths: SD8G3 = 77 GB/s, Tensor G3 = 51.2 GB/s.
    - Compare memory-bound throughput for the same per-token memory traffic on both SoCs.

    **Calculations:**
    - Bandwidth difference: 77 - 51.2 = 25.8 GB/s.
    - Relative peak bandwidth: 77 / 51.2 = 1.50x.
    - If per-token traffic is T GB and decode is memory-bound, TPOT_SD = T / 77 and TPOT_Tensor = T / 51.2.
    - Ratio: TPOT_Tensor / TPOT_SD = 77 / 51.2 = 1.50x.

    **Conclusion & Interpretation:**
    - **Result: 1.5x higher peak memory bandwidth.** For a memory-bound LLM decode path with equal memory traffic, Snapdragon 8 Gen 3 can be up to about 1.5x faster than Tensor G3; real TPOT also depends on compute, cache reuse, kernels, and background contention.
