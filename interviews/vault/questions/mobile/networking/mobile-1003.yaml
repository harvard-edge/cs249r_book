title: 3B INT4 On-Device Decode Bandwidth Pipeline for Sub-30ms TPOT
scenario: Design a bandwidth-efficient decode pipeline for a 3B INT4 LLM targeting TPOT < 30ms. The baseline INT4 model uses 1.5GB.
question: How would you design a bandwidth-efficient decode pipeline for a 3B INT4 LLM targeting TPOT < 30ms by leveraging weight tiling, prefetching, and KV-cache layouts?
details:
  realistic_solution: A 3B INT4 decode step still streams about 1.5 GB of weights for each verified token, so the design goal is to keep that stream sequential, overlapped, and protected from avoidable KV-cache traffic. Tile weights in layer order so each tile is consumed once from LPDDR and staged through SRAM, double-buffer the next tile with prefetch/DMA while the current tile computes, and avoid layouts that force small random DRAM reads. Use a paged or block-contiguous KV-cache layout grouped by layer/head so attention reads are coalesced, with INT8 KV only when context length makes KV traffic material. This does not reduce the 1.5 GB weight read per token, but it keeps the memory-bound TPOT near 22 ms and leaves roughly 8 ms of margin for compute, KV reads, and OS contention under a 30 ms target.
  common_mistake: |
    **The Pitfall:** Assuming weight tiling alone reduces main memory reads during autoregressive decode.
    **The Rationale:** Candidates confuse compute-bound prefill optimizations (SRAM locality) with memory-bound decode realities.
    **The Consequence:** Failing to realize that decode requires reading full weights from LPDDR5X once per token regardless of tiling, missing the TPOT SLA.
  napkin_math: |
    **Assumptions & Constraints:**
    - Memory Bandwidth: 68 GB/s.
    - Model Size: 3B INT4 = 1.5 GB.
    - Target TPOT: < 30 ms.

    **Calculations:**
    - Naive Decode Cost: 1.5 GB / 68 GB/s = 22 ms/token (memory limit).
    - Full-model weight stream: 1.5 GB / 68 GB/s = 22.1 ms/token.
    - Example KV read at short context: 32 MB / 68 GB/s = 0.47 ms/token.
    - INT8 KV at the same context: 16 MB / 68 GB/s = 0.24 ms/token, saving about 0.23 ms/token.
    - Practical budget: 22.1 ms weights + ~0.5 ms KV + a few ms compute/scheduling overhead remains below 30 ms if the weight stream is kept sequential and prefetch overlap is effective.

    **Conclusion & Interpretation:**
    - **Result: ~22-27 ms/token (Memory-Bound)**. Weight tiling and prefetching do not amortize the full model read, but they prevent wasted bandwidth; coalesced/quantized KV layouts protect the remaining TPOT margin.
