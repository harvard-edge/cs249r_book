title: 'Network Bandwidth Bottlenecks: Master Memory Bus Analysis for Multi-LLM Mobile App'
scenario: 'A productivity mobile app runs two simultaneous LLM tasks: a 1B INT4 background email summarizer running at 10 tokens/s, and a 3B INT4 foreground assistant with a TPOT target of < 25ms.'
question: How would you analyze whether both can run simultaneously without bandwidth saturation, and specify a token-interleaved schedule?
details:
  realistic_solution: |
    Conduct a micro-second level memory bandwidth analysis using `nsys profiling`. Both autoregressive LLM decoding phases are fiercely memory-bandwidth bound. While their *average* bandwidth fits within system limits, their instantaneous burst execution will collide, causing cache thrashing and violating the 25ms TPOT SLA. Implement an explicit time-sliced, token-interleaved scheduler. Block the background summarizer thread using a mutex or OS-level QOS priority while the foreground assistant decodes a token. Once the assistant completes its 25ms burst, context-switch the summarizer to compute its background token in the remaining 75ms of the 100ms window.
  common_mistake: |
    **The Pitfall:** Treating the two models as temporally independent.
    **The Rationale:** Candidates look at average throughput and assume it applies smoothly across time.
    **The Consequence:** They miss that the models compete for the exact same LPDDR5X bus in real-time bursts.
  napkin_math: |
    **Assumptions & Constraints:**
    - Max System Bandwidth: 77 GB/s.
    - Foreground Assistant: 1.5 GB weights, TPOT target < 25ms.
    - Background Summarizer: 500 MB weights, 10 tokens/s (1 token per 100ms window).

    **Calculations:**
    - Assistant burst bandwidth: 1.5 GB / 0.025 s = 60 GB/s peak.
    - Summarizer burst bandwidth: 500 MB in ~1.5ms = >333 GB/s (physically impossible, requires throttling).
    - Time-sliced scheduling within 100ms window:
    - 0 to 25ms: Assistant runs, utilizing 60 GB/s.
    - 25ms to 100ms (75ms): Summarizer runs, throttled bandwidth = 500 MB / 0.075 s = 6.67 GB/s.
    - Average bandwidth over 100ms window = (1.5 GB + 0.5 GB) / 0.1 s = 20 GB/s.

    **Conclusion & Interpretation:**
    - **Result: 60 GB/s peak (Scheduling/Bandwidth-Bound)**. Unmanaged, simultaneous execution creates catastrophic bandwidth spikes. Time-slicing ensures peak bandwidth never exceeds 60 GB/s, comfortably fitting the 77 GB/s hardware limit and satisfying both SLAs.
