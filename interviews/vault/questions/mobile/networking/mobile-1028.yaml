title: 'Network Bandwidth Bottlenecks: Fluency — Speculative Decode BW Arithmetic'
scenario: 'Without reference, in 60 seconds: With speculative decoding (100M draft + 3B INT4 target) on Snapdragon 8 Gen 3, the draft generates K=3 tokens.'
question: 'What is the effective TPOT assuming an 80% acceptance rate?'
details:
  realistic_solution: 'Draft (100M INT8): K=3 tokens. BW: 3×100MB/77GB/s=3.9ms. Target (3B INT4=1.5GB): 1 verify pass. BW: 1.5GB/77GB/s=19.5ms. Step time: 3.9+19.5=23.4ms. Avg accepted (α=0.8, K=3): (1-0.8^4)/(1-0.8)=2.95 tokens. Effective TPOT: 23.4/2.95=7.93ms vs 19.5ms baseline = 2.46× speedup.'
  common_mistake: |
    **The Pitfall:** Using acceptance_rate * TPOT_per_token without computing the actual step time.
    **The Rationale:** Candidates ignore that a step consists of both draft time and target verify time, and fail to calculate the average tokens accepted per step.
    **The Consequence:** Incorrect effective TPOT estimation, leading to flawed latency budgeting.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hardware: Snapdragon 8 Gen 3 (77 GB/s bandwidth).
    - Draft Model: 100M INT8, K=3 tokens.
    - Target Model: 3B INT4 (1.5GB).
    - Acceptance Rate: 80% (α=0.8).

    **Calculations:**
    - Draft Step Time: (3 * 100MB) / 77GB/s = 3.9ms.
    - Verify Step Time: 1.5GB / 77GB/s = 19.5ms.
    - Total Step Time: 3.9ms + 19.5ms = 23.4ms.
    - Average Accepted Tokens (formula for K=3, α=0.8): (1 - 0.8^4) / (1 - 0.8) = (1 - 0.4096) / 0.2 = 2.95 tokens.
    - Effective TPOT: 23.4ms / 2.95 tokens = 7.93ms.

    **Conclusion & Interpretation:**
    - **Result: 7.93ms (Memory-Bound)**. Effective TPOT improves from 19.5ms to 7.93ms, yielding a 2.46x speedup.
