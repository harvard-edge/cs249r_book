title: The Cellular Model Delivery Problem
scenario: Your app needs to deliver a 4 GB INT4 language model to users over cellular. The median LTE download speed is 50 Mbps. A product review flags that users on metered data plans will be unhappy.
question: How would you calculate the download time and propose a deployment strategy that respects mobile network constraints?
details:
  realistic_solution: |
    4 GB / 6.25 MB/s = 640 seconds = 10.7 minutes at peak. Real-world with overhead: 15-20 minutes. Strategy: (1) Ship a base model in the app bundle, (2) download full model over WiFi only with user consent, (3) use delta updates for model version upgrades (~5-10% of full size), (4) stream initial layers while downloading the rest.
  common_mistake: |
    **The Pitfall:** Confusing megabits (Mb) with megabytes (MB) and ignoring network burstiness.
    **The Rationale:** Assuming 50 Mbps equals 50 MB/s and that advertised speeds are sustained constantly.
    **The Consequence:** Drastically underestimating download times and frustrating users with long waits and high data costs.
  napkin_math: |
    **Assumptions & Constraints:**
    - LTE Speed: 50 Mbps / 8 = 6.25 MB/s.
    - Model size: 4 GB = 4096 MB.

    **Calculations:**
    - Download time: 4096 MB / 6.25 MB/s = 655.36 seconds (~10.9 minutes).
    - Metered cost: 4 GB * $10/GB = $40.

    **Conclusion & Interpretation:**
    - **Result: 11 minutes (Network-Bound)**. Download time is ~11 minutes, requiring a WiFi-first strategy with small delta updates.
