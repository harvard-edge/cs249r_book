title: 'Mobile TCO Realization: Size Peak Bandwidth for Mobile LLM App'
scenario: Calculate the peak and sustained LPDDR5X bandwidth consumption for a Snapdragon 8 Gen 3 running a 3B INT4 LLM assistant during a 60-second conversation. The conversation has 10 turns, each with a 200-token prompt prefill and a 100-token response decode.
question: For Snapdragon 8 Gen 3 at 77 GB/s, what are peak and sustained bandwidth for a 3B INT4 LLM over 10 turns?
details:
  realistic_solution: |
    Define peak as the bandwidth needed to produce the worst-case decode token at a 50ms/token service target, and sustained as total modeled LPDDR5X traffic divided by the 60-second conversation. The 3B INT4 weights are about 1.5GB. Each turn adds 200 prompt tokens and 100 output tokens, so the decode context grows from about 200 tokens at the first response to about 3000 tokens at the end.

    Prefill traffic per turn is approximated as one weight sweep plus KV writes: 1.5GB + (200 * 524KB) = 1.605GB, or 16.05GB over 10 turns. Decode traffic per token is 1.5GB plus the running KV read. Across the 1000 response tokens, average decode context is about 1600 tokens, so average decode traffic is 1.5GB + (1600 * 524KB) = 2.34GB/token. Total decode traffic is about 2338GB. Sustained bandwidth is therefore (2338 + 16.05) / 60 = 39.2GB/s. Peak occurs near the final token: 1.5GB + (3000 * 524KB) = 3.07GB/token; at 50ms/token that requires 61.4GB/s, below the 77GB/s bus but with limited headroom.
  common_mistake: |
    **The Pitfall:** Computing only weight bandwidth.
    **The Rationale:** Candidates calculate the bandwidth needed to load the weights but ignore KV-cache growth, forgetting that the cache accumulates across turns.
    **The Consequence:** They massively underestimate bandwidth demands at long context lengths, missing the point where the device hits the memory bandwidth wall.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: 3B params (INT4, 1.5 GB).
    - KV Cache: 524 KB/token.
    - Turns: 10 (200 tokens prefill, 100 tokens decode each).

    **Calculations:**
    - Decode context ranges from ~200 to ~3000 tokens; average over the 1000 decode tokens is ~1600 tokens.
    - Average decode read per token: 1.5 GB (weights) + (1600 * 524 KB) = 2.34 GB.
    - Total decode data: 1000 tokens * 2.34 GB = 2,338 GB.
    - Total prefill data: 10 turns * (1.5 GB + 200 * 524 KB) = 16.05 GB.
    - Sustained bandwidth: (2,338 GB + 16.05 GB) / 60 seconds = 39.2 GB/s.
    - Peak bandwidth requirement at max context: 1.5 GB + (3000 * 524 KB) = 3.07 GB/token. At a 50ms/token target, 3.07 GB / 0.05s = 61.4 GB/s.

    **Conclusion & Interpretation:**
    - **Result: 39.2 GB/s sustained and 61.4 GB/s peak at 50ms/token.** The workload fits under a 77 GB/s LPDDR5X peak in this model, but decode near the end of the conversation has little bandwidth headroom once runtime overhead and other apps are included.
