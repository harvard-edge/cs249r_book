title: The Topologically Flawed Upgrade
scenario: A distributed training job for a large model across multiple H100 nodes is showing poor scaling efficiency. Profiling shows the AllReduce communication step is the bottleneck. The nodes are connected via InfiniBand NDR.
question: Why is replacing InfiniBand with NVLink a flawed fix for multi-node AllReduce bottlenecks?
details:
  realistic_solution: NVLink is an intra-node interconnect, while InfiniBand is an inter-node network. An AllReduce operation across multiple servers requires an inter-node network.
  common_mistake: |
    **The Pitfall:** Treating intra-node and inter-node interconnects as interchangeable.
    **The Rationale:** Candidates know NVLink has higher raw bandwidth than InfiniBand, but fail to understand the fundamental difference in physical network topologies.
    **The Consequence:** Proposing physically impossible hardware configurations, wasting engineering planning time on an invalid solution.
  napkin_math: |
    **Assumptions & Constraints:**
    - Setup: Multi-node cluster (inter-node communication required).
    - Existing: InfiniBand NDR (network).
    - Proposed: NVLink (on-board bus).

    **Calculations:**
    - Inter-node topology requires networking protocols (InfiniBand/Ethernet).
    - Intra-node topology utilizes direct PCIe/NVLink routing.

    **Conclusion & Interpretation:**
    - **Result: Topologically Invalid**. You cannot physically replace a cross-server network with an internal GPU bus.
  options:
  - InfiniBand NDR (400 Gbps) provides higher sustained bandwidth across nodes than NVLink 4.0 (900 GB/s) due to overhead.
  - It is better to connect the nodes directly using PCIe Gen5 for lower latency.
  - NVLink is an intra-node interconnect for GPU-to-GPU communication within a server, while InfiniBand is for inter-node communication.
  - The bottleneck is a software issue in the AllReduce algorithm's implementation, not a hardware limitation.
