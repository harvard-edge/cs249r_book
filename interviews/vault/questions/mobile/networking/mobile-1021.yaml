title: 'Network Bandwidth Bottlenecks: Specification for Minimum Bandwidth to Support On-Device LLM'
scenario: A mobile SoC must support on-device 3B INT4 LLM inference with TPOT < 30ms, 60fps display, and always-on speech recognition.
question: How would you derive the memory bandwidth spec from first principles and explain how it constrains SoC design choices?
details:
  realistic_solution: 'LLM BW: 1.5GB/30ms=50GB/s. Display 60fps: 1.5GB/s. ASR: 0.01GB/s. ISP (1080p 30fps): 0.1GB/s. System: 1GB/s. Total: 52.6GB/s. Minimum SoC LPDDR BW: 52.6GB/s -> round up to 60GB/s (20% headroom for thermal throttle). Modern options: LPDDR5X at 60GB/s: achievable. LPDDR5 at 51.2GB/s: insufficient (TPOT=51.2/50*30=30.7ms - barely misses target). Conclusion: LPDDR5X is the minimum standard for 3B INT4 on-device LLM. This is why Snapdragon 8 Gen 3 (77GB/s) and A17 Pro (68GB/s) support it, but cheaper LPDDR5 devices (Tensor G3 at 51.2GB/s) cannot reliably meet the 30ms target.'
  common_mistake: |
    **The Pitfall:** Setting the LLM bandwidth requirement without accounting for the shared bus.
    **The Rationale:** Candidates forget that other SoC components (display, camera, ASR) consume bandwidth simultaneously.
    **The Consequence:** Specifying hardware that fails to meet TPOT targets under real-world device loads.
  napkin_math: |
    **Assumptions & Constraints:**
    - LLM requirement: 50 GB/s.
    - Display and other overhead: 3.0 GB/s.
    - Thermal throttling allowance: 15%.

    **Calculations:**
    - Total baseline: 50 GB/s + 3.0 GB/s = 53 GB/s.
    - With 15% allowance: 53 / 0.85 = 62.4 GB/s.

    **Conclusion & Interpretation:**
    - **Result: 62.4 GB/s design target (Memory Bandwidth-Bound).** Requires LPDDR5X; standard LPDDR5 will fail TPOT targets.
