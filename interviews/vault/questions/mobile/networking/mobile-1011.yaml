title: Mobile AI Memory Bandwidth Conflicts on Snapdragon 8 Gen 3
scenario: 'A flagship mobile AI system features a Snapdragon 8 Gen 3 with 16GB LPDDR5X providing 77 GB/s bandwidth. It runs 4 simultaneous AI workloads: a 3B INT4 LLM assistant (on-demand), real-time speech recognition (continuous, 1B INT8, 100 tokens/s), camera scene understanding (YOLOv8-s, 11M INT8, 30fps), and AR depth estimation (MobileNetV3, 5M FP16, 60fps).'
question: What bandwidth conflicts arise when these workloads run together, and what scheduler changes are needed?
details:
  realistic_solution: |
    Use one sustained-bandwidth budget and schedule the workloads by priority. From the stated model sizes, the 3B INT4 LLM is about 1.5GB if its weights must be streamed for an active decode token. The 1B INT8 speech model is about 1.0GB; at 100 tokens/s, repeatedly touching the full model would imply an impossible 100GB/s, so the scheduler cannot treat it as a best-effort peer of the LLM. YOLO-s adds 11MB × 30fps = 0.33GB/s, depth adds 10MB × 60fps = 0.6GB/s, and keep about 3GB/s for system traffic.

    The conflict is not the tiny vision models by themselves; it is simultaneous access by continuous speech and active LLM decode, plus bursty camera/depth DMA and background copies. A feasible scheduler gives speech the hard real-time lane, gives active LLM decode the next priority with preemptive dispatch, and admits camera/depth only from slack. If measured P95 TPOT or speech frame latency rises, the scheduler first stops background copies, then drops camera/depth frame rate or resolution, and finally gates LLM turns behind speech. This answers the workload conflict without inventing unsupported per-token traffic figures.
  common_mistake: |
    **The Pitfall:** Failing to calculate aggregate bandwidth requirements.
    **The Rationale:** Candidates often list bandwidth requirements without checking if their sum exceeds the 77 GB/s system limit, or without designing a concrete scheduling policy.
    **The Consequence:** The system becomes oversubscribed, leading to severe latency spikes and failed TPOT requirements for the LLM.
  napkin_math: |
    **Assumptions & Constraints:**
    - Snapdragon 8 Gen 3 with 77 GB/s bandwidth limit.
    - Stated model footprints: 3B INT4 LLM ≈ 1.5GB, 1B INT8 speech ≈ 1.0GB, YOLO-s ≈ 11MB, depth model ≈ 10MB, system reserve ≈ 3GB/s.
    - Use these as worst-case active weight-traffic estimates, not claims that every optimized kernel rereads all weights every frame.

    **Calculations:**
    - LLM target-only weight-stream lower bound per token: 1.5GB / 77GB/s = 19.5ms/token.
    - Speech worst-case full-model traffic at 100 tokens/s: 1.0GB * 100/s = 100GB/s, which cannot coexist with other work on a 77GB/s bus.
    - YOLO (11M INT8, 11MB): 11MB * 30fps = 0.33 GB/s.
    - Depth (5M FP16, 10MB): 10MB * 60fps = 0.6 GB/s.
    - System baseline: 3 GB/s.
    - Vision + system steady traffic: 0.33 + 0.6 + 3 = 3.93GB/s, leaving 73.07GB/s before speech/LLM bursts.
    - Because speech worst-case traffic alone can exceed the bus, speech needs optimized residency/tiling plus a hard real-time reservation; it cannot be scheduled as ordinary best-effort work.
    - Scheduler policy: P0 speech real-time lane, P1 active LLM decode, P2 camera/depth within frame deadlines, P3 background copies preemptible.
    - If LLM P95 or speech latency rises, reclaim bandwidth by stopping P3 first, then reducing P2 camera/depth resolution or frame rate.

    **Conclusion & Interpretation:**
    - **Result: Contention is state-dependent, not a single fixed sum.** The stated model sizes show why continuous speech and active LLM decode require QoS, admission control, and degradation of camera/depth/background work before latency-critical audio or assistant work misses deadlines.
