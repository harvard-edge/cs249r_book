title: AR Host-Client Wi-Fi Bottleneck
scenario: A multiplayer AR session aggregates pose data from 3 clients into a single host. Each client uploads a 1 MB pose-graph at 30 Hz over Wi-Fi using TCP (6% framing overhead). The AP provisions a per-client uplink budget of 12 MB/s.
question: Does the client uplink sustain 30 Hz synchronization, and what mitigations resolve the bottleneck?
details:
  realistic_solution: |
    The uplink demand exceeds the budget. Mitigations involve rate reduction or delta encoding.
  common_mistake: |
    **The Pitfall:** Ignoring AP-enforced client budgets or TCP overhead.
    **The Rationale:** Candidates often treat the total Wi-Fi channel capacity as a single bucket, missing that Access Points enforce per-client fairness caps.
    **The Consequence:** The AR experience will suffer from massive latency spikes and dropped frames as the AP forcefully throttles the client's saturated uplink.
  napkin_math: |
    **Assumptions & Constraints:**
    - Payload: 1 MB at 30 Hz.
    - AP Budget: 12 MB/s per client.
    - TCP Overhead: 1.06x.

    **Calculations:**
    - Uplink Demand: 1 MB * 30 Hz * 1.06 = 31.8 MB/s.
    - Delta Encoding Demand: 50 KB (0.05 MB) * 30 Hz * 1.06 = 1.59 MB/s.

    **Conclusion & Interpretation:**
    - **Result: Uplink Saturated.** The 31.8 MB/s demand completely violates the 12 MB/s AP budget. Delta encoding is mandatory to prevent massive frame drops.
