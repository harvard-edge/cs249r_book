title: Mobile LLM Memory Bandwidth QoS for TPOT SLA
scenario: Specify bandwidth requirements and QoS policies for a mobile LLM app on a device with 77 GB/s memory bandwidth. The app must guarantee TPOT < 25ms P95 for the LLM while maintaining 60fps display and always-on speech recognition.
question: What bandwidth reservations, priorities, throttles, and fallbacks are needed to keep mobile LLM TPOT under 25ms P95?
details:
  realistic_solution: 'Reserve bandwidth around the SLA, not around best effort. A 3B INT4 decode that streams 1.5GB/token needs at least 1.5GB/0.025s = 60 GB/s to keep TPOT under 25ms in the simplified bandwidth-bound model. Policy: P0 LLM decode reserves 64 GB/s when active, leaving margin for KV/cache traffic; P1 display 60fps reserves 1.5 GB/s; P2 ASR reserves 0.01 GB/s; P3 foreground OS reserves 3.0 GB/s. These guaranteed reservations total 68.51 GB/s, leaving 8.49 GB/s for P4 background work. P4 is not guaranteed: it is a preemptible allowance that exists only while the protected reservations are being met. If measured LLM bandwidth falls below 60 GB/s or P95 TPOT approaches 25ms, first suspend P4 background work, then throttle display effects or refresh to save up to 0.75 GB/s, then reduce LLM context/prefill or switch to a smaller model.'
  common_mistake: |
    **The Pitfall:** Specifying static bandwidth reservations without a dynamic fallback policy.
    **The Rationale:** Candidates assume peak hardware bandwidth is exclusively available and ignore operating system queuing behaviors under oversubscription.
    **The Consequence:** The LLM decode process misses its 25ms P95 SLA when background OS tasks spike.
  napkin_math: |
    **Assumptions & Constraints:**
    - Memory bandwidth: 77 GB/s.
    - SLA: TPOT < 25ms P95.
    - Simplified decode traffic: 1.5GB per token.
    - Required LLM bandwidth for SLA: 1.5GB / 25ms = 60 GB/s.
    - LLM reservation with margin: 64 GB/s.
    - Display (60fps) = 1.5 GB/s, ASR = 0.01 GB/s, foreground OS = 3.0 GB/s.

    **Calculations:**
    - Guaranteed reservations: P0 LLM 64 + P1 display 1.5 + P2 ASR 0.01 + P3 OS 3.0 = 68.51 GB/s.
    - Preemptible P4 allowance only after guarantees are met: 77 - 68.51 = 8.49 GB/s.
    - Full budget when P4 is admitted: 68.51 + 8.49 = 77.0 GB/s.
    - Implied LLM TPOT at reserved bandwidth: 1.5GB / 64GB/s = 0.0234s = 23.4ms.
    - If contention pushes LLM below 60 GB/s, preempt up to 8.49 GB/s background first; throttling display from 60fps to 30fps can add another 0.75 GB/s.

    **Conclusion & Interpretation:**
    - **Result: Fits within 77 GB/s while preserving TPOT < 25ms P95.** The policy protects at least 60 GB/s for LLM decode by preempting or degrading lower-priority work before the SLA is missed.
