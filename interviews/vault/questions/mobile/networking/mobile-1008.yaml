title: RTT Crossover for On-Device Versus Cloud Mobile LLM Latency
scenario: 'A mobile app offers hybrid inference. It defaults to a cloud API (H100) when WiFi is available, and falls back to an on-device 1B INT4 LLM (Time Per Output Token: 7.4ms on A17 Pro). The cloud API achieves 7.8ms TPOT but adds network RTT. You are evaluating end-to-end latency for a 128-token response across three networks: WiFi 802.11ax (2.4Gbps, 5ms RTT), 5G mmWave (4Gbps, 10ms RTT), and 4G LTE (100Mbps, 50ms RTT).'
question: At what network RTT condition does the on-device model outperform the cloud model for a 128-token generation?
details:
  realistic_solution: |
    Compare total latency, not bandwidth. On-device latency is 128 × 7.4ms = 947.2ms. Cloud latency is 27ms prefill + 128 × 7.8ms decode + RTT = 1025.4ms + RTT. Solve for on-device faster: 947.2 < 1025.4 + RTT, so RTT > -78.2ms. Because real RTT is nonnegative, the on-device path is faster for all listed networks. The reason is the combination of slightly faster on-device TPOT plus the cloud prefill and RTT overhead, not WiFi/cellular bandwidth.
  common_mistake: |
    **The Pitfall:** Over-focusing on network bandwidth (Gbps) while ignoring Round Trip Time (RTT).
    **The Rationale:** Candidates calculate the time to transmit 128 tokens over 5G and realize it takes microseconds, incorrectly assuming the cloud will be instantly faster.
    **The Consequence:** Architecting a complex network-switching heuristic that always routes to the cloud on WiFi/5G, resulting in a slower user experience due to fixed RTT and prefill delays.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target: 128-token generation.
    - On-Device 1B TPOT: 7.4ms.
    - Cloud 13B H100 TPOT: 7.8ms, with 27ms prefill.
    - Network RTT applies to the Cloud path.

    **Calculations:**
    - On-Device 1B latency: 128 tokens * 7.4 ms = 947.2 ms total.
    - Cloud decode: 128 tokens * 7.8 ms = 998.4 ms.
    - Cloud 13B latency: 27ms prefill + 998.4 ms decode + RTT = 1025.4 ms + RTT.
    - Crossover: on-device wins when 947.2 ms < 1025.4 ms + RTT, or RTT > -78.2 ms.

    **Conclusion & Interpretation:**
    - **Result: no positive RTT crossover.** On-device wins for any real network RTT in this scenario; bandwidth is negligible for the small text payload, while prefill and RTT dominate the cloud penalty.
