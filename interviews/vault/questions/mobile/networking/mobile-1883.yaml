title: Snapdragon Split Compute Margin
scenario: A mobile device partitions an image generation task, offloading 40% of operations to a cloud server. The input image size is 3 MB, and the round-trip latency to the cloud is 100 ms.
question: "What is the minimum network bandwidth required to match the local NPU speed of 40 TOPS if the operations represent 12 T-Ops total?"
visual:
  kind: svg
  path: mobile-1883.svg
  alt: Diagram showing task split between local NPU and Cloud.
  caption: Split computation latency paths.
details:
  realistic_solution: The hybrid offload architecture must complete the network payload transmission entirely within the time saved by offloading minus the fixed physics constraints of base round-trip latency.
  common_mistake: |
    **The Pitfall:** Forgetting to subtract the base network RTT from the latency budget.
    **The Rationale:** Candidates often calculate bandwidth required simply based on data size and target time, missing that physics (speed of light/routing) consumes a fixed chunk of time before data transfer even matters.
    **The Consequence:** Designing a hybrid system that is fundamentally slower than doing all the math locally on the device.
  napkin_math: |
    **Assumptions & Constraints:**
    - Workload: 12 T-Ops total.
    - Local NPU: 40 TOPS.
    - Offload: 40%.
    - Payload: 3 MB.
    - RTT: 100 ms.
    
    **Calculations:**
    - Local Time = 12 / 40 = 300 ms.
    - Offloaded Local Time = 300 * 0.4 = 120 ms.
    - Budget = 120 ms.
    - Transmission Budget = 120 ms - 100 ms RTT = 20 ms.
    - Bandwidth = 3 MB / 0.02s = 150 MB/s.
    
    **Conclusion & Interpretation:**
    - **Result: Bandwidth-Bound**. The network requires 1.2 Gbps (150 MB/s) strictly to match the execution speed of doing all operations locally.
