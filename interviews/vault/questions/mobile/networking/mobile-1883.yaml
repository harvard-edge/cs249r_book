title: Split Compute RTT and Payload Bandwidth Match
scenario: A mobile device partitions an image generation task. A 40 TOPS local NPU would take 300 ms for the full 12 T-Op workload. Offloading removes 40% of local compute, remote compute is hidden, the only transfer is a 3 MB payload, and cloud RTT is 100 ms.
question: With 12 T-Ops total, 40% offloaded, a 3 MB payload, and 100 ms RTT, what bandwidth matches a 40 TOPS local NPU?
visual:
  kind: svg
  path: mobile-1883.svg
  alt: Diagram showing task split between local NPU and Cloud.
  caption: Split computation latency paths.
details:
  realistic_solution: The all-local path takes 12 T-Ops / 40 TOPS = 300 ms. Under the stated split, remote compute is assumed hidden and the 40% offloaded portion fully replaces 120 ms of local NPU work. To merely match local-only latency, the cloud path may spend at most that 120 ms saved budget. The fixed RTT consumes 100 ms, leaving 20 ms for the 3 MB payload. Required bandwidth is therefore 3 MB / 0.02 s = 150 MB/s, or about 1.2 Gbps, before protocol overhead.
  common_mistake: |
    **The Pitfall:** Forgetting to subtract the base network RTT from the latency budget.
    **The Rationale:** Candidates often calculate bandwidth required simply based on data size and target time, missing that physics (speed of light/routing) consumes a fixed chunk of time before data transfer even matters.
    **The Consequence:** Designing a hybrid system that is fundamentally slower than doing all the math locally on the device.
  napkin_math: |
    **Assumptions & Constraints:**
    - Workload: 12 T-Ops total.
    - Local NPU: 40 TOPS.
    - Offload: 40%.
    - Payload: 3 MB.
    - RTT: 100 ms.
    - Remote compute is hidden or fast enough to ignore.
    - The 3 MB payload is the only transfer cost.

    **Calculations:**
    - Local Time = 12 / 40 = 300 ms.
    - Compute time removed by offload = 300 ms * 0.4 = 120 ms.
    - To match local-only execution, RTT + payload transfer must fit inside the 120 ms saved compute budget.
    - Transmission Budget = 120 ms - 100 ms RTT = 20 ms.
    - Bandwidth = 3 MB / 0.02s = 150 MB/s.

    **Conclusion & Interpretation:**
    - **Result: Bandwidth-Bound**. The network requires 1.2 Gbps (150 MB/s) strictly to match the execution speed of doing all operations locally.
