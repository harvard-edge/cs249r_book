title: Realize Peak Bandwidth Utilization During On-Device LLM Response
scenario: Concretely compute peak and average LPDDR5X bandwidth utilization during a 50-token on-device response from a 3B INT4 LLM on Snapdragon 8 Gen 3. The response takes 975ms.
question: What peak and average LPDDR5X bandwidth does a 50-token 3B INT4 LLM response require on Snapdragon 8 Gen 3?
details:
  realistic_solution: The 975ms response over 50 tokens implies 19.5ms/token. For a simplified bandwidth-bound decode model, each token streams about 1.5GB of INT4 weights, so weight bandwidth is 1.5GB/0.0195s = 76.9 GB/s while decoding. KV traffic grows over the response. Using 524KB per cached token, the last token reads about 49×524KB = 25.7MB of prior KV and writes 0.524MB, adding about 1.34 GB/s at peak over a 19.5ms token. Peak demand is therefore about 76.9 + 1.34 + 3.0 = 81.2 GB/s including background, which exceeds 77 GB/s. Average over the full 975ms response is (50×1.5GB + 524KB×(0+...+49) + 50×524KB) / 0.975s + 3.0 GB/s = about 80.6 GB/s. Under these assumptions, both peak and average demand exceed the Snapdragon 8 Gen 3 memory-bandwidth limit.
  common_mistake: |
    **The Pitfall:** Computing only static weight bandwidth.
    **The Rationale:** Candidates frequently fail to include dynamic KV-cache reads (which scale linearly with context) and writes (new KV entries).
    **The Consequence:** Underestimating the total memory bandwidth requirements, leading to unexpected NPU stalls deep into generation.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: 3B INT4 (1.5GB weights).
    - Response: 50 tokens in 975ms, so TPOT = 975ms / 50 = 19.5ms.
    - KV entry size: 524KB per token.
    - Background System BW: 3 GB/s.

    **Calculations:**
    - Weight BW per token: 1.5 GB / 19.5ms = 76.9 GB/s.
    - Peak KV traffic at token 50: (49 * 524KB read + 524KB write) / 19.5ms = 26.2MB / 0.0195s = 1.34 GB/s.
    - Peak BW demand: 76.9 + 1.34 + 3.0 = 81.24 GB/s.
    - Total weight traffic over response: 50 * 1.5GB = 75.0GB.
    - Total KV traffic over response: (0 + ... + 49 + 50) * 524KB = 1,275 * 524KB = 0.668GB.
    - Average BW over response: (75.0 + 0.668)GB / 0.975s + 3.0 = 80.61 GB/s.

    **Conclusion & Interpretation:**
    - **Result: Peak 81.24 GB/s; average 80.61 GB/s.** Both exceed the 77 GB/s physical limit, so the target 975ms response is not sustainable under this bandwidth-bound model without reducing model traffic, KV traffic, or background load.
