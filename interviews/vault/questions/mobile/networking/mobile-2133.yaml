title: LoRa Swarm Gossip
scenario: 4 drones update a decentralized swarm intelligence model (2MB) via a LoRa mesh network (50 kbps) using an AllReduce gossip protocol.
question: What is the lower-bound time to move one 2MB update across a 3-hop LoRa mesh with 200ms CSMA/CA backoff per hop?
details:
  realistic_solution: Treat one 2MB model update as a lower-bound serialized transfer across the 3-hop LoRa path. The raw payload is about 16,000 kilobits, so at 50 kbps it needs 320 seconds of airtime before protocol overhead. Three hop transmissions add at least 3 * 200ms = 0.6 seconds of CSMA/CA backoff, giving a best-case lower bound of 320.6 seconds. A full 4-node gossip/AllReduce round would be longer because it requires multiple such transmissions, contention, and duty-cycle limits.
  common_mistake: |
    **The Pitfall:** Assuming continuous transmission over low-bandwidth mesh networks.
    **The Rationale:** Candidates treat LoRa links like WiFi and calculate purely based on raw bandwidth.
    **The Consequence:** They propose massive continuous payloads that trigger severe CSMA/CA backoffs and violate LoRa duty-cycle limits, collapsing the network.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model Size: 2 MB (16,000 kb).
    - Network Bandwidth: 50 kbps.
    - Propagation: 3 hops with 200 ms backoff each.

    **Calculations:**
    - Raw transmission time: 16,000 kb / 50 kbps = 320 seconds.
    - Propagation delay: 3 hops * 0.2 s = 0.6 seconds.
    - Total convergence time: 320 s + 0.6 s = 320.6 seconds.

    **Conclusion & Interpretation:**
    - **Result: At least 320.6 seconds for one 3-hop update (Network-Bound)**. This is only a lower bound; a real multi-node gossip round would take longer because it needs repeated transmissions and contention handling.
