title: LoRa Swarm Gossip
scenario: 4 drones update a decentralized swarm intelligence model (2MB) via a LoRa mesh network (50 kbps) using an AllReduce gossip protocol.
question: Evaluate the expected convergence time for a single round, given a 200ms CSMA/CA backoff penalty per transmission and a 3-hop network diameter.
details:
  realistic_solution: Attempting to synchronize a 2MB payload over a 50 kbps LoRa network using AllReduce is architecturally flawed. The raw transfer of 16,000 kilobits demands 320 seconds of sustained airtime. Compounded by 3-hop propagation delays and CSMA/CA synchronization backoffs, the convergence cycle balloons to over 5 minutes, ensuring total network collapse.
  common_mistake: |
    **The Pitfall:** Assuming continuous transmission over low-bandwidth mesh networks.
    **The Rationale:** Candidates treat LoRa links like WiFi and calculate purely based on raw bandwidth.
    **The Consequence:** They propose massive continuous payloads that trigger severe CSMA/CA backoffs and violate LoRa duty-cycle limits, collapsing the network.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model Size: 2 MB (16,000 kb).
    - Network Bandwidth: 50 kbps.
    - Propagation: 3 hops with 200 ms backoff each.

    **Calculations:**
    - Raw transmission time: 16,000 kb / 50 kbps = 320 seconds.
    - Propagation delay: 3 hops * 0.2 s = 0.6 seconds.
    - Total convergence time: 320 s + 0.6 s = 320.6 seconds.

    **Conclusion & Interpretation:**
    - **Result: 320.6 seconds (Network-Bound)**. The architecture is catastrophically network-bound.
