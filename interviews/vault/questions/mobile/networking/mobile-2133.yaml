title: LoRa Swarm Gossip
scenario: 4 drones update a decentralized swarm intelligence model (2MB) via a LoRa mesh network (50 kbps) using an AllReduce gossip protocol.
question: What is the lower-bound time to move one 2MB update across a 3-hop LoRa mesh with 200ms CSMA/CA backoff per hop?
details:
  realistic_solution: Treat one 2MB model update as a lower-bound serialized store-and-forward transfer across the 3-hop LoRa path. The raw payload is about 16,000 kilobits, so at 50 kbps one hop needs 320 seconds of airtime before protocol overhead. A 3-hop path serializes that full payload three times, giving 3 * 320 = 960 seconds of airtime. Three hop transmissions also add at least 3 * 200ms = 0.6 seconds of CSMA/CA backoff, giving a best-case lower bound of 960.6 seconds. A full 4-node gossip/AllReduce round would be longer because it requires multiple such transfers, contention, acknowledgments, and duty-cycle limits.
  common_mistake: |
    **The Pitfall:** Assuming continuous transmission over low-bandwidth mesh networks.
    **The Rationale:** Candidates treat LoRa links like WiFi and calculate purely based on raw bandwidth.
    **The Consequence:** They propose massive continuous payloads that trigger severe CSMA/CA backoffs and violate LoRa duty-cycle limits, collapsing the network.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model Size: 2 MB (16,000 kb).
    - Network Bandwidth: 50 kbps.
    - Path: 3 serialized store-and-forward hops.
    - Backoff: 200 ms CSMA/CA backoff per hop.

    **Calculations:**
    - One-hop raw transmission time: 16,000 kb / 50 kbps = 320 seconds.
    - Three-hop serialized airtime: 3 * 320 s = 960 seconds.
    - Backoff delay: 3 hops * 0.2 s = 0.6 seconds.
    - One-update lower bound: 960 s + 0.6 s = 960.6 seconds.

    **Conclusion & Interpretation:**
    - **Result: At least 960.6 seconds for one serialized 3-hop update (Network-Bound)**. This is only a lower bound for moving one update along one path; a real multi-node gossip/AllReduce round would take longer because it needs repeated transmissions and contention handling.
