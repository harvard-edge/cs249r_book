title: Memory-Bandwidth-Bound TPOT for Mobile LLM Decode
scenario: You need to derive the memory-bandwidth-bound Time Per Output Token (TPOT) formula for on-device LLM autoregressive decode.
question: How do you derive the memory-bandwidth-bound TPOT formula, and what is the latency for a 3B INT4 model on a device with 77 GB/s bandwidth?
details:
  realistic_solution: |
    Under a bandwidth-bound batch-1 decode approximation, TPOT is the per-token DRAM traffic divided by sustained usable memory bandwidth: TPOT ≈ bytes_moved_per_token / bandwidth. If each output token streams the 3B INT4 weights once, bytes_moved_per_token is about 1.5GB, so TPOT ≈ 1.5GB / 77GB/s = 0.0195s = 19.5ms. This is an approximation, not a universal law: small models, better cache reuse, high compute cost kernels, batching, or insufficient accelerator throughput can move decode into a compute-bound or mixed regime. A roofline check should compare arithmetic intensity with the actual device ridge point before applying the formula strictly.
  common_mistake: |
    **The Pitfall:** Applying the bandwidth formula blindly without verifying arithmetic intensity against the roofline ridge point.
    **The Rationale:** Memorizing formulas without understanding the piecewise transition between compute-bound and memory-bound regimes.
    **The Consequence:** Calculating wildly incorrect latency estimates for high-batch or high-intensity workloads where compute actually dominates.
  napkin_math: |
    **Assumptions & Constraints:**
    - 3B INT4 model = 1.5 GB.
    - Sustained usable bandwidth = 77 GB/s.
    - Simplified batch-1 decode model: each token streams the weights once and memory traffic dominates compute.

    **Calculations:**
    - TPOT = bytes moved per token / sustained bandwidth.
    - TPOT = 1.5 GB / 77 GB/s = 0.01948 seconds = 19.5 ms.
    - If roofline analysis shows compute-bound behavior, actual TPOT must include compute time instead of using this bandwidth-only estimate.

    **Conclusion & Interpretation:**
    - **Result: ~19.5ms/token under the bandwidth-bound approximation.** The formula is valid when DRAM traffic is the bottleneck; it should be verified against the device roofline rather than assumed for every batch-1 decode workload.
