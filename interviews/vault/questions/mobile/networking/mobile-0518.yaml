title: The Jittery AI Coach
scenario: 'You''re a senior engineer on a mobile team launching a ''Real-time AI Coach'' for a game. The app streams gameplay video to a cloud backend for analysis. Your P99 round-trip latency SLO is 250ms. In production, latency is highly variable: sometimes it''s 140ms, but other times it spikes to over 800ms due to requests hitting an older fleet of backend servers.'
question: Why do older backend servers create high latency jitter for a mobile AI coach, and how does GPUDirect RDMA help?
details:
  realistic_solution: 'The latency jitter is caused by the two different server types having fundamentally different data paths from the network card to the GPU. The older servers require the CPU to manage the data transfer: the data is copied from the NIC to host (CPU) RAM, and then a separate command copies it from host RAM to GPU memory. This ''bounce buffer'' path involves the OS kernel. If the CPU or OS scheduler is busy with other tasks, the data transfer for your app gets delayed, introducing massive, unpredictable jitter.'
  common_mistake: |
    **The Pitfall:** Focusing only on peak bandwidth and ignoring the data path.
    **The Rationale:** Engineers assume "InfiniBand is faster than Ethernet" and forget that jitter is often caused by OS kernel involvement.
    **The Consequence:** Misdiagnosing unpredictable delays as network congestion instead of OS scheduling jitter.
  napkin_math: |
    **Assumptions & Constraints:**
    - Slow path includes kernel bouncing.
    - Fast path bypasses kernel directly to GPU.

    **Calculations:**
    - Slow Path (Kernel-Involved): NIC -> RAM (~5 µs) + Kernel (10-50 µs) + RAM -> GPU (~10 µs) = 25-65 µs baseline. P99 spikes to 5-50 ms.
    - Fast Path (GPUDirect RDMA): NIC -> GPU RAM = 2-5 µs.
    - P99 Jitter: No kernel involvement means P99 ~ P50 (nearly deterministic).
    - Total Network RTT: Old server ~800 ms (jitter spike); New server ~140 ms.

    **Conclusion & Interpretation:**
    - **Result: 5-50 ms spikes (Latency-Bound)**. OS scheduler jitter in the slow path causes massive latency spikes.
  options:
  - The older servers have a slower PCIe generation bus, which is bottlenecking the data transfer from the NIC to the GPU.
  - InfiniBand has much higher bandwidth than 100GbE, so the newer servers can simply receive the data faster.
  - The older servers lack GPUDirect RDMA (Kernel Bypass), so data copies are subject to CPU/OS scheduling jitter, while the new servers write data directly from the NIC to GPU memory.
  - The mobile app is sending data in a bursty pattern, causing TCP congestion and bufferbloat on the older servers.
  correct_index: 2
