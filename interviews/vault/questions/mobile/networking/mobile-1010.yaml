title: A17 Pro LLM Decode Arithmetic Intensity and Memory-Bandwidth TPOT
scenario: Implement the arithmetic intensity analysis for a 1B INT4 LLM decode step on an Apple A17 Pro.
question: How would you compute arithmetic intensity, peak FLOPS-bound TPOT, peak BW-bound TPOT, and determine which bottleneck applies?
details:
  realistic_solution: 'Model: 1B params INT4. Decode step: process 1 token through all layers. Use a consistent convention where one MAC is counted as 2 low-precision ops, matching the 35 TOPS denominator. Work is about 2 × 1B params = 2B ops. Bytes read are 0.5 GB of compressed weights under the conservative assumption that weights are reread once for the decode token and KV/activation traffic is ignored. Arithmetic intensity is 2B ops / 0.5 GB = 4 ops/byte. Ridge point is 35 TOPS / 68 GB/s = 514 ops/byte, so this single-token streaming model is strongly memory-bandwidth-bound. BW-bound TPOT is 0.5 GB / 68 GB/s = 7.35ms; compute-bound TPOT is 2B / 35T = 0.057ms. Actual TPOT cannot be below the bandwidth bound under these assumptions and will be higher after KV reads and runtime overhead.'
  common_mistake: |
    **The Pitfall:** Computing arithmetic intensity using full model FLOPs without noting that auto-regressive decode processes only 1 token at a time.
    **The Rationale:** Candidates often apply training or prefill intuition (large matrices) to decode steps.
    **The Consequence:** Incorrectly concluding the workload is compute-bound and over-estimating achievable throughput.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 1B parameters INT4 (0.5 GB weights).
       - Apple A17 Pro ANE: 35 TOPS, using the same low-precision op convention as the numerator.
       - Unified memory bandwidth: 68 GB/s.
       - Decode model: single token, compressed weights reread once, KV/activation traffic ignored for this lower-bound bottleneck test.
    2. **Calculations:**
       - Arithmetic Intensity: 2B FLOPs / 0.5 GB = 4 FLOPs/byte.
       - Ridge Point: 35 TOPS / 68 GB/s = 514 FLOPs/byte.
       - BW-bound TPOT: 0.5 GB / 68 GB/s = 7.35 ms.
       - FLOPS-bound TPOT: 2B FLOPs / 35 TOPS = 0.057 ms.
    3. **Conclusion & Interpretation:**
       - **Result: 7.35 ms (Memory Bandwidth-Bound).**
