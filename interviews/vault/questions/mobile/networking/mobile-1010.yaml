title: 'Network Bandwidth Bottlenecks: Implement TPOT Formula and Arithmetic Intensity Analysis'
scenario: 'Implement the arithmetic intensity analysis for a 1B INT4 LLM decode step on an Apple A17 Pro.'
question: 'How would you compute arithmetic intensity, peak FLOPS-bound TPOT, peak BW-bound TPOT, and determine which bottleneck applies?'
details:
  realistic_solution: 'Model: 1B params INT4. Decode step: process 1 token through all layers. FLOPs: 2 × 1B params × 1 token = 2B FLOPs. Bytes read: 0.5 GB INT4 weights (all must be read once). Arithmetic intensity: 2B FLOPs / 0.5 GB = 4 FLOPs/byte. Ridge point (NE): 35 TOPS / 68 GB/s = 514 FLOPs/byte. Since 4 << 514, strongly memory-bandwidth-bound. BW-bound TPOT: 0.5 GB / 68 GB/s = 7.35 ms. FLOPS-bound TPOT: 2B / 35T = 0.057 ms. Actual TPOT ≈ 7.35 ms (BW-limited). To become compute-bound: need batch ≥ 514/4 = 128.5 → batch ≥ 129 tokens.'
  common_mistake: |
    **The Pitfall:** Computing arithmetic intensity using full model FLOPs without noting that auto-regressive decode processes only 1 token at a time.
    **The Rationale:** Candidates often apply training or prefill intuition (large matrices) to decode steps.
    **The Consequence:** Incorrectly concluding the workload is compute-bound and over-estimating achievable throughput.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 1B parameters INT4 (0.5 GB weights).
       - Apple A17 Pro ANE: 35 TOPS.
       - Unified memory bandwidth: 68 GB/s.
    2. **Calculations:**
       - Arithmetic Intensity: 2B FLOPs / 0.5 GB = 4 FLOPs/byte.
       - Ridge Point: 35 TOPS / 68 GB/s = 514 FLOPs/byte.
       - BW-bound TPOT: 0.5 GB / 68 GB/s = 7.35 ms.
       - FLOPS-bound TPOT: 2B FLOPs / 35 TOPS = 0.057 ms.
    3. **Conclusion & Interpretation:**
       - **Result: 7.35 ms (Memory Bandwidth-Bound).**
