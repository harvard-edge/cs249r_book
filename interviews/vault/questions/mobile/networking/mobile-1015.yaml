title: Mobile Camera Pipeline Memory Bandwidth Optimization on A17 Pro
scenario: A mobile camera app on A17 Pro (68 GB/s) runs YOLOv8-n (3.2M INT8, 4.2 GOPs) + portrait segmentation (MobileNetV3-S, 2.5M INT8, 2.4 GOPs) in the live viewfinder at 30fps. Measured total memory bandwidth is 15GB/s. Target is to reduce to < 8GB/s while maintaining 30fps.
question: What memory bandwidth components explain the 15GB/s camera pipeline load, and which optimizations reduce it below 8GB/s?
details:
  realistic_solution: |
    The model weights and camera frame are too small to explain 15GB/s by themselves. Camera ISP traffic for 1080p YUV420 at 30fps is 1920×1080×1.5×30 = 93MB/s = 0.09GB/s. YOLO-n weights add 3.2MB×30 = 0.096GB/s and segmentation weights add 2.5MB×30 = 0.075GB/s, so direct frame plus weight traffic is only about 0.26GB/s. The measured 15GB/s must therefore be dominated by activation tensors, intermediate feature maps, texture conversions, and avoidable copies between camera, GPU, and NPU buffers.

    Use a measured breakdown such as 5.0GB/s activation traffic and 9.7GB/s copy/format-conversion overhead, plus 0.26GB/s direct frame/weight traffic. Reducing the model input from 640 to 320 cuts 2D activation traffic by 4x, from 5.0GB/s to 1.25GB/s. Zero-copy camera/NPU buffers and fused preprocessing remove the 9.7GB/s copy overhead. The optimized total is 0.09 + 0.17 + 1.25 = 1.51GB/s, well below the 8GB/s target while preserving 30fps.
  common_mistake: |
    **The Pitfall:** Trying to quantize the models further.
    **The Rationale:** Candidates ignore that the models are already INT8 and fail to check if camera buffer copies and large activation tensors are the actual bandwidth hogs.
    **The Consequence:** Negligible bandwidth savings while significantly harming model accuracy.
  napkin_math: |
    **Assumptions & Constraints:**
    - ISP Bandwidth (1080p 30fps YUV420): 1920 * 1080 * 1.5 bytes * 30 = 0.09 GB/s.
    - Model Weights (INT8 30fps): (3.2MB + 2.5MB) * 30 = 0.17 GB/s.
    - Activation traffic estimate: 5.0 GB/s.
    - Copy/format-conversion overhead inferred from the measurement.
    - Measured Memory Bandwidth: 15 GB/s.

    **Calculations:**
    - Activation Writes (YOLO @ 640x640): ~100MB per forward pass * 30fps = ~3.0 GB/s.
    - Activation Writes (Seg @ 640x640): ~2.0 GB/s.
    - Direct traffic: 0.09 + 0.17 = 0.26 GB/s.
    - Accounted traffic before copies: 0.26 + 5.0 = 5.26 GB/s.
    - Copy/format-conversion overhead: 15 - 5.26 = 9.74 GB/s.
    - Optimization 1 (Resolution): Reduce input from 640 to 320. Activations drop by 4x. (5.0 GB/s -> 1.25 GB/s).
    - Optimization 2 (Zero-copy): Eliminate 9.74 GB/s overhead via shared camera/NPU buffers and fused preprocessing.
    - Optimized Total: 0.09 (ISP) + 0.17 (Weights) + 1.25 (Activations) = ~1.51 GB/s.

    **Conclusion & Interpretation:**
    - **Result: ~1.51 GB/s total bandwidth (Memory-Bandwidth Bound)**. By reducing activation tensor sizes and eliminating copy/format-conversion overhead, the pipeline easily operates under the 8GB/s target.
