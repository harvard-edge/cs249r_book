title: Unified Memory and Metal GPU Contention Causing Mobile LLM TPOT Regression
scenario: An iOS app update adds a background animation (Metal shader rendering at 60fps) alongside an already-running 1B INT4 LLM. TPOT degrades from 7.4ms to 11ms after the update. The model weights are unchanged.
question: Can a 60 FPS Metal animation explain a 1B INT4 LLM TPOT jump from 7.4ms to 11ms on A17 Pro?
details:
  realistic_solution: A 60 FPS Metal animation can explain part of the TPOT regression only if it creates more than a simple framebuffer write. The direct pixel traffic is small, but a shader with multiple render targets, texture samples, compositing passes, or offscreen buffers can add several GB/s of unified-memory pressure and can also interfere through GPU/ANE scheduling, shared caches, power limits, or thermal headroom. The diagnosis should measure DRAM bandwidth, GPU occupancy, ANE/Metal queue timing, and thermals before blaming model weights. If the regression correlates with render passes, reduce animation resolution/pass count, use lower-precision render targets, avoid extra texture copies, and schedule decode away from the heaviest frame work.
  common_mistake: |
    **The Pitfall:** Assuming the animation is "just UI" and therefore cannot affect LLM decode latency.
    **The Rationale:** Engineers often count only the final framebuffer bandwidth and ignore extra render targets, texture sampling, compositing copies, shared-cache effects, and power or scheduler contention on a unified-memory SoC.
    **The Consequence:** The team misses the real interaction between Metal rendering and model decode, or chases fabricated API serialization bugs instead of measuring bandwidth, queue timing, and thermal behavior.
  napkin_math: |
    **Assumptions & Constraints:**
    - LLM Model: 1B INT4 (500 MB footprint).
    - Memory Bandwidth: 68 GB/s.
    - Render load: 1080x2340 resolution, 4 Bytes/pixel, 60 FPS.

    **Calculations:**
    - Baseline LLM TPOT: 500 MB / 68 GB/s = 7.35 ms.
    - One full-screen 4-byte render target at 60fps: 1080 * 2340 * 4 * 60 = 607 MB/s = 0.61 GB/s.
    - Read + write of one render target: 2 * 0.61 = 1.22 GB/s.
    - Two offscreen/compositing passes: 2 * 1.22 = 2.44 GB/s.
    - Contention TPOT from this derived render load only: 0.5 GB / (68 - 2.44) GB/s = 7.63 ms.
    - Observed 11 ms TPOT implies effective bandwidth of 0.5 GB / 0.011 s = 45.5 GB/s.
    - Equivalent lost headroom: 68 - 45.5 = 22.5 GB/s, far above the derived two-pass render bandwidth.

    **Conclusion & Interpretation:**
    - **Result: Contention or scheduling beyond simple pixel traffic**. A basic 60 FPS framebuffer does not explain 11 ms TPOT by itself; look for extra render passes/copies, shared memory pressure, GPU/ANE queue interference, power limits, or thermal throttling.
