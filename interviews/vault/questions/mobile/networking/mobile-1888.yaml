title: FedAvg Wi-Fi Star vs Ring
scenario: Three Apple A17 devices on the same local Wi-Fi perform Federated Averaging on a 20 MB gradient vector. The local Wi-Fi supports 400 Mbps effective bandwidth.
question: Evaluate the synchronization time using a Star topology (one device acts as the parameter server) versus a Ring topology?
visual:
  kind: svg
  path: mobile-1888.svg
  alt: Star topology vs Ring topology comparison.
  caption: Star topology for Federated Averaging.
details:
  realistic_solution: In a Star topology, the server receives 2 vectors and sends 2 vectors. Data transferred over the shared Wi-Fi channel is 4 * 20 MB = 80 MB = 640 Mb, so synchronization takes 640 Mb / 400 Mbps = 1.6 s. In a Ring all-reduce with 3 devices, each node sends 2(N-1) = 4 chunks of 20/3 MB = 6.67 MB, or 26.67 MB per node. Because all devices share one Wi-Fi channel, aggregate airtime is 3 * 26.67 MB = 80 MB = 640 Mb, also 1.6 s. Ring reduces per-node send volume but does not improve synchronization time on this shared medium.
  common_mistake: |
    **The Pitfall:** Assuming Ring topology is always faster.
    **The Rationale:** Candidates apply data center networking logic, forgetting that wireless is a shared broadcast medium, unlike switched Ethernet.
    **The Consequence:** Incorrectly concluding Ring topology will save time, when the physical layer bottleneck remains identical.
  napkin_math: |
    **Assumptions & Constraints:**
    - Gradient vector: 20 MB.
    - Wi-Fi effective bandwidth: 400 Mbps.
    - Three devices (1 server, 2 clients in Star, or 3 nodes in Ring).

    **Calculations:**
    - Star shared-channel transfer = 4 * 20 MB = 80 MB = 640 Mb.
    - Star synchronization time = 640 Mb / 400 Mbps = 1.6 seconds.
    - Ring per-node transfer = 2 * (3 - 1) * (20 MB / 3) = 26.67 MB.
    - Ring shared-channel aggregate = 3 * 26.67 MB = 80 MB = 640 Mb.
    - Ring synchronization time = 640 Mb / 400 Mbps = 1.6 seconds.

    **Conclusion & Interpretation:**
    - **Result: Star = 1.6 seconds; Ring = 1.6 seconds (Network Bandwidth-Bound).** A shared broadcast medium prevents Ring from improving synchronization time even though it spreads traffic across devices.
