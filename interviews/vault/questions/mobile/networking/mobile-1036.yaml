title: A17 Pro Voice Assistant LPDDR5X Bandwidth
scenario: Specify the complete LPDDR5X bandwidth requirements for a voice assistant pipeline on A17 Pro (8GB, 68 GB/s). Tasks are (1) Wake-word detection (1M INT8, always-on at 20Hz), (2) ASR (whisper-tiny 39M FP16, on-demand), (3) LLM assistant (1B INT4, on-demand), (4) TTS synthesis (a small neural vocoder, 5M INT8, real-time). Define peak bandwidth for each state and verify total does not exceed 68 GB/s.
question: What are the peak LPDDR5X bandwidth requirements for each stage of the A17 Pro voice assistant pipeline?
details:
  realistic_solution: |
    Report each stage separately and avoid adding sequential stages as if they run together. Wake-word detection is 1M INT8 parameters at 20Hz, so the weight traffic is about 1MB * 20 = 20MB/s = 0.02GB/s. Whisper-tiny is 39M FP16, or about 78MB. If it processes a 10s utterance in real time, that is 78MB / 10s = 0.008GB/s; if compressed into a 1s on-demand burst, the peak is 0.078GB/s. With wake-word still active, ASR remains below 0.1GB/s.

    The 1B INT4 LLM has about 500MB of weights. Its bandwidth requirement depends on the token service target: bandwidth = 0.5GB / TPOT. At a 25ms token target, that is 20GB/s. The 68GB/s bus would make the weight-sweep lower bound 0.5 / 68 = 7.35ms, but that is a minimum latency estimate, not the required bandwidth by itself. TTS has about 5MB of INT8 weights; at 100 vocoder steps/s it needs roughly 0.5GB/s. The maximum planned stage peak is therefore the LLM stage at about 20GB/s for a 25ms TPOT target, well below 68GB/s, assuming ASR, LLM, and TTS are scheduled sequentially.
  common_mistake: |
    **The Pitfall:** Adding peak bandwidths of all components simultaneously.
    **The Rationale:** Candidates do not realize that these components operate sequentially in a pipeline (wake-word -> ASR -> LLM -> TTS).
    **The Consequence:** They falsely conclude the memory bus is oversubscribed and over-engineer the system.
  napkin_math: |
    **Assumptions & Constraints:**
    - A17 Pro LPDDR5X bandwidth limit: 68 GB/s.
    - Pipeline is sequential: WW -> ASR -> LLM -> TTS.

    **Calculations:**
    - Wake-word idle bandwidth = 1M * 1B * 20Hz = 20MB/s (0.02 GB/s).
    - ASR (whisper-tiny) bandwidth = 78MB/pass / 10s = 7.8MB/s for real-time processing, or 78MB/s (0.078GB/s) for a 1s burst.
    - LLM decode bandwidth at 25ms TPOT = 500MB / 25ms = 20GB/s. The bus-saturation lower bound is 500MB / 68GB/s = 7.35ms/token.
    - TTS bandwidth = 5MB * 100 passes/s = 500MB/s.

    **Conclusion & Interpretation:**
    - **Result: ~20 GB/s planned peak for the LLM stage.** Wake-word, ASR, and TTS are tiny by comparison. The pipeline fits under 68GB/s when the on-demand stages are sequential; claiming 68GB/s as the requirement would only mean intentionally saturating the bus.
