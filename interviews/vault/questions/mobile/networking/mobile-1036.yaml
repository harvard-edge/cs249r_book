title: 'Network Bandwidth Bottlenecks: Specification — Bandwidth Requirements for Voice Assistant Pipeline'
scenario: Specify the complete LPDDR5X bandwidth requirements for a voice assistant pipeline on A17 Pro (8GB, 68 GB/s). Tasks are (1) Wake-word detection (1M INT8, always-on at 20Hz), (2) ASR (whisper-tiny 39M FP16, on-demand), (3) LLM assistant (1B INT4, on-demand), (4) TTS synthesis (a small neural vocoder, 5M INT8, real-time). Define peak bandwidth for each state and verify total does not exceed 68 GB/s.
question: What are the peak LPDDR5X bandwidth requirements for each stage of the A17 Pro voice assistant pipeline?
details:
  realistic_solution: 'State 1 (Idle/wake-word): WW at 20Hz is 1M x 1B / 50ms = 20MB/s = 0.02GB/s. State 2 (ASR active): whisper-tiny 39M FP16 = 78MB. 10s audio: 1 pass. BW: 78MB/pass, 1 pass/10s = 7.8MB/s = 0.008GB/s. WW still running: 0.02GB/s. Total: 0.028GB/s. State 3 (LLM active): 1B INT4 = 500MB. TPOT: 500 / 68 = 7.35ms. BW: 68GB/s peak during decode. WW paused. State 4 (TTS active): 5M INT8 = 5MB. TTS at 22kHz x 10s = 220K samples. FLOPs-bound (vocoder). BW: 5MB x 100 passes/s = 500MB/s = 0.5GB/s. All states peak: 68GB/s (LLM state 3 dominates). LLM does not overlap with TTS (sequential pipeline). Max simultaneous: LLM (68GB/s) < 68GB/s.'
  common_mistake: |
    **The Pitfall:** Adding peak bandwidths of all components simultaneously.
    **The Rationale:** Candidates do not realize that these components operate sequentially in a pipeline (wake-word -> ASR -> LLM -> TTS).
    **The Consequence:** They falsely conclude the memory bus is oversubscribed and over-engineer the system.
  napkin_math: |
    **Assumptions & Constraints:**
    - A17 Pro LPDDR5X bandwidth limit: 68 GB/s.
    - Pipeline is sequential: WW -> ASR -> LLM -> TTS.

    **Calculations:**
    - Wake-word idle bandwidth = 1M * 1B * 20Hz = 20MB/s (0.02 GB/s).
    - ASR (whisper-tiny) bandwidth = 78MB/pass / 10s = 7.8MB/s.
    - LLM decode bandwidth = 500MB / 7.35ms = 68GB/s.
    - TTS bandwidth = 5MB * 100 passes/s = 500MB/s.

    **Conclusion & Interpretation:**
    - **Result: 68 GB/s (Memory-Bound)**. Peak bandwidth is 68 GB/s during the LLM stage, which perfectly matches the hardware limit without oversubscribing.
