title: 'Network Bandwidth Bottlenecks: Diagnose Mobile LLM Latency Spike from Background App'
scenario: A Snapdragon 8 Gen 3 device (16GB, 77 GB/s) shows TPOT spikes from 19.5ms to 65ms for 500ms every 30 seconds during 3B INT4 LLM inference. Memory utilization stays constant at 60%.
question: What would you identify as the root cause using bandwidth analysis and quantify the fix?
details:
  realistic_solution: '65ms TPOT: 3B INT4 = 1.5GB. Effective BW: 1.5/0.065=23.1GB/s. Normally: 76.9GB/s. Throttle ratio: 23.1/76.9=30% of normal BW. Root cause: scheduled background sync (30s period). Android WorkManager or JobScheduler fires every 30s — likely cloud sync writing 500MB to LPDDR5X (storage DMA): 500MB/77GB/s=6.5ms DMA burst? More likely: background ML model inference (spell check, app indexing) consuming 50GB/s for 500ms. Fix: use Android''s JobScheduler with setRequiresDeviceIdle(true) or move background tasks to be LLM-inference-aware. Or implement BW monitoring → pause background during LLM decode.'
  common_mistake: |
    **The Pitfall:** Blaming memory pressure or thermal throttling.
    **The Rationale:** Candidates ignore that memory utilization is constant and thermal throttling would persist across all tokens, missing the exact 30-second periodicity indicating a scheduled task.
    **The Consequence:** The diagnosis is incorrect, and the proposed fix fails to stop the latency spikes.
  napkin_math: |
    1. **Spike Bandwidth:** 3B INT4 = 1.5GB weights. 65ms TPOT = 1.5GB / 0.065s = 23.1 GB/s effective bandwidth.
    2. **Normal Bandwidth:** 19.5ms TPOT = 1.5GB / 0.0195s = 76.9 GB/s.
    3. **Bandwidth Stolen:** 76.9 - 23.1 = 53.8 GB/s is being consumed by another process.
    4. **Data Volume:** 53.8 GB/s * 0.5s (500ms burst) = **~27 GB of data moved**. This massive movement points to video transcoding or app indexing running via a periodic WorkManager job.
