title: Mobile LLM Memory Bandwidth Contention from Background Inference
scenario: A Snapdragon 8 Gen 3 device (16GB, 77 GB/s shared memory bandwidth) shows TPOT spikes from 19.5ms to 65ms for 500ms every 30 seconds during 3B INT4 on-device LLM inference. Memory capacity utilization stays constant at 60%.
question: What would you identify as the root cause using bandwidth analysis and quantify the fix?
details:
  realistic_solution: 'The 30-second periodicity and constant memory capacity point to bandwidth contention from a scheduled on-device background inference job, not memory pressure or thermal throttling. Using a simplified bandwidth-bound approximation, the foreground 3B INT4 LLM streams about 1.5GB/token. Normal TPOT of 19.5ms implies about 1.5GB/0.0195s = 76.9 GB/s effective foreground demand. During the spike, 65ms implies about 1.5GB/0.065s = 23.1 GB/s available to the foreground LLM. The missing share is about 53.8 GB/s for 500ms, consistent with a periodic background ML/indexing task saturating shared LPDDR bandwidth. Fix: make the background worker LLM-aware through a memory-bandwidth governor. When foreground decode is active, pause or cap the periodic task to at most about 10 GB/s, or run it only after decode has been idle for a short grace period. Quantitatively, preserving at least 60 GB/s for the LLM keeps TPOT below 1.5GB/60GB/s = 25ms in this approximation.'
  common_mistake: |
    **The Pitfall:** Blaming memory pressure or thermal throttling.
    **The Rationale:** Candidates ignore that memory utilization is constant and thermal throttling would persist across all tokens, missing the exact 30-second periodicity indicating a scheduled task.
    **The Consequence:** The diagnosis is incorrect, and the proposed fix fails to stop the latency spikes.
  napkin_math: |
    **Assumptions & Constraints:**
    - 3B INT4 model approximated as 1.5GB of weight traffic per output token.
    - Shared LPDDR bandwidth limit: 77 GB/s.
    - This is a simplified bandwidth-bound diagnosis; TPOT also depends on compute and cache behavior.

    **Calculations:**
    1. **Normal effective foreground bandwidth:** 1.5GB / 0.0195s = 76.9 GB/s.
    2. **Spike effective foreground bandwidth:** 1.5GB / 0.065s = 23.1 GB/s.
    3. **Foreground bandwidth shortfall:** 76.9 - 23.1 = 53.8 GB/s during the 500ms window.
    4. **SLA-preserving foreground bandwidth:** 1.5GB / 0.025s = 60 GB/s.
    5. **Allowed background bandwidth during decode:** 77 - 60 = 17 GB/s total headroom, so cap the periodic task below that after reserving OS/display margin.

    **Conclusion & Interpretation:**
    - **Result: periodic shared-memory bandwidth contention.** Pause or throttle the background inference/indexing task during foreground decode so the LLM keeps at least 60 GB/s and TPOT stays below 25ms in the simplified model.
