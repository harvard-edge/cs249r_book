title: SoC Die-to-Die Interconnect for Heterogeneous Inference
scenario: The Snapdragon 8 Gen 3 splits a 7B model across its Hexagon NPU, Adreno GPU, and Cortex-X4 CPU for heterogeneous inference. The NoC provides 60 GB/s NPU-to-memory, 40 GB/s GPU-to-memory, and 30 GB/s between NPU and GPU directly.
question: How would you design the layer-to-accelerator mapping that minimizes cross-accelerator data transfer?
details:
  realistic_solution: 'To minimize cross-accelerator transfer, avoid splitting every transformer block between NPU and GPU unless the compute win is large enough to pay for two boundary transfers per block. A practical mapping is: keep embeddings, all transformer blocks, KV-cache updates, and LM head on one primary accelerator when they fit, preferably the NPU for an INT8/mobile-optimized 7B path. Use the CPU only for tokenization, sampling, and small control work. If an attention kernel is truly unsupported on the NPU, group several adjacent blocks on the GPU rather than alternating attention on GPU and FFN on NPU inside every block; this reduces boundary crossings from dozens per token/prefill to one or two large segment transfers. The design rule is to partition by contiguous layer ranges and supported kernels, not by op type inside each block.'
  common_mistake: |
    **The Pitfall:** Splitting the model sequentially by layer count (e.g., first 16 layers on NPU, next 16 on GPU).
    **The Rationale:** Candidates assume load balancing means equal layer distribution, failing to recognize that different layers have vastly different compute and numerical precision profiles.
    **The Consequence:** The system runs inefficiently because hardware accelerators are forced to compute operations they are bad at (e.g., executing FP16 attention on the INT8-optimized NPU).
  napkin_math: |
    **Assumptions & Constraints:**
    - Hidden state per 512-token prefill: 512 * 4096 * 2 bytes = 4.0 MB.
    - Direct NPU-GPU bandwidth: 30 GB/s.
    - A block-internal split moves activations NPU->GPU and GPU->NPU once per transformer block.
    - A contiguous two-segment split crosses accelerators only at the segment boundary.

    **Calculations:**
    - Transfer per boundary: 4.0 MB / 30 GB/s = about 0.13 ms before synchronization overhead.
    - Alternating attention/FFN across 32 blocks: 64 boundaries * 0.13 ms = about 8.3 ms minimum transfer time, plus 64 synchronization points.
    - One contiguous split between NPU and GPU segments: 1 boundary * 0.13 ms, plus one synchronization point.
    - Single-accelerator placement for all supported blocks: 0 NPU-GPU activation transfers.

    **Conclusion & Interpretation:**
    - **Result: transfer-minimizing placement favors one primary accelerator or a small number of contiguous layer segments.** Only split attention and FFN across accelerators if profiling shows the compute savings exceed repeated activation-transfer and synchronization costs.
