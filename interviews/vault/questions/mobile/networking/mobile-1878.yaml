title: Mobile AR Gossip Propagation
scenario: A local multiplayer AR game running on 4 devices shares 3D spatial anchor points over peer-to-peer Wi-Fi with 20 Mbps per link. When a device updates an anchor, it gossips a 50 KB update.
question: Can a naive sequential broadcast strategy reach all 3 peers within a 100ms multiplayer deadline?
details:
  realistic_solution: |
    A sequential broadcast will successfully reach all peers within the deadline.
  common_mistake: |
    **The Pitfall:** Overcomplicating the network topology.
    **The Rationale:** Candidates often default to complex tree or mesh propagation algorithms instead of verifying basic link math.
    **The Consequence:** The team will waste time implementing and debugging complex distributed systems logic when a simple O(N) loop perfectly satisfies the requirements.
  napkin_math: |
    **Assumptions & Constraints:**
    - Payload: 50 KB.
    - Throughput: 20 Mbps (20,000 Kbps).
    - Target: 3 peers, 100ms deadline.

    **Calculations:**
    - Payload bits: 50 KB = 400 Kb.
    - Link time: 400 Kb / 20,000 Kbps = 20ms.
    - Sequential time: 3 peers * 20ms = 60ms.

    **Conclusion & Interpretation:**
    - **Result: Deadline Met.** The 60ms sequential transmission is well within the 100ms deadline, negating the need for complex gossip meshes.
