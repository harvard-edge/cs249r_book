title: Heterogeneous Data Exchange on Apple Silicon
scenario: Distributing a highly parallel tensor operation. The A17 Pro Neural Engine handles convolutions while the GPU handles custom non-max suppression.
question: Identify the primary memory architecture used to exchange multi-megabyte tensors between the NPU and GPU without copying.
visual:
  kind: svg
  path: mobile-1916.svg
  alt: Architecture diagram showing CPU, GPU, and NPU all pointing directly to a shared unified memory block.
  caption: Apple Unified Memory Architecture
details:
  realistic_solution: 'The A17 Pro utilizes a Unified Memory Architecture (UMA). The CPU, GPU, and Neural Engine all share the exact same physical LPDDR5 RAM pool. Data is exchanged by passing pointers to shared buffers rather than copying bytes over an internal bus. Cache coherency protocols ensure the NPU sees the GPU''s outputs immediately.'
  common_mistake: |
    **The Pitfall:** Assuming the NPU and GPU have discrete memory pools.
    **The Rationale:** Candidates apply cloud paradigms (PCIe-connected GPUs) to mobile SoCs.
    **The Consequence:** Writing inefficient code that performs unnecessary DMA copies, wasting memory bandwidth and power.
  napkin_math: |
    **Assumptions & Constraints:**
    - Data Transfer Required: Pointer to shared buffer.
    - Device Architecture: Apple Unified Memory Architecture (UMA).

    **Calculations:**
    - Bytes Copied Over Bus: 0 bytes.

    **Conclusion & Interpretation:**
    - **Result: 0 bytes transferred (Bandwidth-Bound)**. Unified Memory Architecture (UMA) achieves zero-copy data exchange.
