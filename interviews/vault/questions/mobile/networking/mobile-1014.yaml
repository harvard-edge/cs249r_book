title: Speculative Decoding TPOT for a 7B INT4 LLM on Snapdragon
scenario: 'A 7B INT4 LLM (TPOT 45.5ms on Snapdragon 8 Gen 3, 77 GB/s) needs to achieve TPOT < 20ms for real-time conversation. Two options: (A) Reduce to 3B INT4 (TPOT 19.5ms, accuracy loss), (B) Keep 7B + add speculative decoding with 200M draft (INT8, 200MB).'
question: Can a 200M draft model make a 7B INT4 LLM meet a sub-20ms TPOT target on Snapdragon 8 Gen 3, and how does it compare to reducing model size?
details:
  realistic_solution: |
    Option A reduces the model to 3B INT4 and reaches 19.5ms TPOT with the stated accuracy loss. Option B can meet the target only if the target verification pass reuses one 7B weight stream across the speculative batch and the draft acceptance rate is high enough. With K=4 and α=0.75, the draft model streams 4 × 200MB = 0.8GB, costing 10.4ms at 77GB/s. The 7B INT4 verifier streams 3.5GB once for the proposed-token batch, costing 45.5ms. Total speculative round latency is 55.9ms, and expected emitted tokens are (1 - 0.75^5) / (1 - 0.75) = 3.05, so effective TPOT is 55.9 / 3.05 = 18.3ms. That meets the sub-20ms target while preserving 7B quality, but with little margin; if acceptance falls to about 0.70, expected tokens drop to 2.77 and TPOT becomes about 20.2ms.
  common_mistake: |
    **The Pitfall:** Evaluating speculative decoding without accounting for the memory bandwidth cost of the verification pass.
    **The Rationale:** Engineers assume speculative decoding is purely additive compute, forgetting that validating K tokens still requires pushing the entire 7B parameter footprint through memory once.
    **The Consequence:** Overestimating the speedup or choosing suboptimal K values that actually increase latency on memory-bound edge devices.
  napkin_math: |
    **Assumptions & Constraints:**
    - Draft Model (200M INT8): K=4 tokens, 200 MB footprint.
    - Target Model (7B INT4): 3.5 GB footprint.
    - Memory Bandwidth: 77 GB/s.
    - Target TPOT: <20ms.

    **Calculations:**
    - Draft Execution (K=4): 4 tokens * 200 MB / 77 GB/s = 10.4ms.
    - Verification Pass (7B INT4): 3.5 GB / 77 GB/s = 45.5ms.
    - Total Step Latency: 10.4ms + 45.5ms = 55.9ms.
    - Expected Tokens Generated (α=0.75): (1 - 0.75^5) / (1 - 0.75) = 3.05 tokens.
    - Effective TPOT: 55.9ms / 3.05 tokens = 18.3ms.
    - Sensitivity check at α=0.70: expected tokens = (1 - 0.70^5) / (1 - 0.70) = 2.77, so TPOT = 55.9ms / 2.77 = 20.2ms.

    **Conclusion & Interpretation:**
    - **Result: 18.3ms TPOT (Memory-Bound)**. Speculative decoding meets the <20ms target only under the stated α=0.75 acceptance and one-verification-pass-per-round assumption; otherwise the safer latency option is the 3B INT4 model at 19.5ms.
