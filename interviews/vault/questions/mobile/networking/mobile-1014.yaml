title: Speculative Decoding TPOT for a 7B INT4 LLM on Snapdragon
scenario: 'A 7B INT4 LLM (TPOT 45.5ms on Snapdragon 8 Gen 3, 77 GB/s) needs to achieve TPOT < 20ms for real-time conversation. Two options: (A) Reduce to 3B INT4 (TPOT 19.5ms, accuracy loss), (B) Keep 7B + add speculative decoding with 200M draft (INT8, 200MB).'
question: Can a 200M draft model make a 7B INT4 LLM meet a sub-20ms TPOT target on Snapdragon 8 Gen 3, and how does it compare to reducing model size?
details:
  realistic_solution: |
    Option A reduces the model to 3B INT4 and reaches 19.5ms TPOT with the stated accuracy loss. Option B needs a consistent speculative-decoding budget: the draft model streams 4 × 200MB = 0.8GB, costing 10.4ms at 77GB/s, and the 7B INT4 target streams 3.5GB once to verify the speculative block, costing 45.5ms. Do not add a second full target pass per proposed token; the target verification is the shared batch pass in this simplified model. With K=4 and independent acceptance α=0.75, expected emitted tokens are 1 + α + α^2 + α^3 + α^4 = 3.05, including the bonus token when all draft tokens are accepted. Effective TPOT is (45.5 + 10.4) / 3.05 = 18.3ms. Under these assumptions, speculative decoding barely meets the sub-20ms target while preserving the 7B model, but with less margin and more implementation complexity than the smaller 3B path.
  common_mistake: |
    **The Pitfall:** Evaluating speculative decoding without accounting for the memory bandwidth cost of the verification pass.
    **The Rationale:** Engineers assume speculative decoding is purely additive compute, forgetting that validating K tokens still requires pushing the entire 7B parameter footprint through memory once.
    **The Consequence:** Overestimating the speedup or choosing suboptimal K values that actually increase latency on memory-bound edge devices.
  napkin_math: |
    **Assumptions & Constraints:**
    - Draft Model (200M INT8): K=4 tokens, 200 MB footprint.
    - Target Model (7B INT4): 3.5 GB footprint.
    - Memory Bandwidth: 77 GB/s.
    - Target TPOT: <20ms.
    - Target verification is modeled as one shared pass over the proposed block; no unsupported per-position target weight reload is added.

    **Calculations:**
    - Draft Execution (K=4): 4 tokens * 200 MB / 77 GB/s = 10.4ms.
    - Verification Pass (7B INT4): 3.5 GB / 77 GB/s = 45.5ms.
    - Total Step Latency: 10.4ms + 45.5ms = 55.9ms.
    - Expected Tokens Generated (α=0.75): 1 + 0.75 + 0.75^2 + 0.75^3 + 0.75^4 = 3.05 tokens.
    - Effective TPOT: 55.9ms / 3.05 tokens = 18.3ms.
    - Option A 3B INT4 TPOT from the prompt: 19.5ms.

    **Conclusion & Interpretation:**
    - **Result: 18.3ms TPOT for speculative decoding vs 19.5ms for 3B INT4.** With a shared target verification pass, speculative decoding can meet the <20ms target while preserving 7B quality, but its margin depends on maintaining the stated acceptance rate and draft overhead.
