title: Speculative Decoding TPOT for a 7B INT4 LLM on Snapdragon
scenario: 'A 7B INT4 LLM (TPOT 45.5ms on Snapdragon 8 Gen 3, 77 GB/s) needs to achieve TPOT < 20ms for real-time conversation. Two options: (A) Reduce to 3B INT4 (TPOT 19.5ms, accuracy loss), (B) Keep 7B + add speculative decoding with 200M draft (INT8, 200MB).'
question: Can a 200M draft model make a 7B INT4 LLM meet a sub-20ms TPOT target on Snapdragon 8 Gen 3, and how does it compare to reducing model size?
details:
  realistic_solution: |
    Option A reduces the model to 3B INT4 and reaches 19.5ms TPOT with the stated accuracy loss. Option B needs a full throughput budget, not just one 7B weight stream divided by expected accepted tokens. With K=4 and α=0.75, the draft model streams 4 × 200MB = 0.8GB, costing 10.4ms at 77GB/s. The 7B INT4 verifier streams 3.5GB once for the speculative batch, costing 45.5ms, and still pays per-position verifier work; using a conservative 4ms per proposed position adds 16ms. Total speculative round latency is 71.9ms. Expected emitted tokens with a bonus token when all K are accepted are (1 - 0.75^5) / (1 - 0.75) = 3.05, so effective TPOT is 71.9 / 3.05 = 23.6ms. Under this more complete model, speculative decoding does not meet the sub-20ms target; the 3B INT4 model is the only option here that satisfies latency.
  common_mistake: |
    **The Pitfall:** Evaluating speculative decoding without accounting for the memory bandwidth cost of the verification pass.
    **The Rationale:** Engineers assume speculative decoding is purely additive compute, forgetting that validating K tokens still requires pushing the entire 7B parameter footprint through memory once.
    **The Consequence:** Overestimating the speedup or choosing suboptimal K values that actually increase latency on memory-bound edge devices.
  napkin_math: |
    **Assumptions & Constraints:**
    - Draft Model (200M INT8): K=4 tokens, 200 MB footprint.
    - Target Model (7B INT4): 3.5 GB footprint.
    - Memory Bandwidth: 77 GB/s.
    - Target TPOT: <20ms.
    - Verifier overhead beyond the shared weight stream: 4ms per proposed target position.

    **Calculations:**
    - Draft Execution (K=4): 4 tokens * 200 MB / 77 GB/s = 10.4ms.
    - Verification Pass (7B INT4): 3.5 GB / 77 GB/s = 45.5ms.
    - Per-position verifier overhead: 4 * 4ms = 16ms.
    - Total Step Latency: 10.4ms + 45.5ms + 16ms = 71.9ms.
    - Expected Tokens Generated (α=0.75): (1 - 0.75^5) / (1 - 0.75) = 3.05 tokens.
    - Effective TPOT: 71.9ms / 3.05 tokens = 23.6ms.
    - Option A 3B INT4 TPOT from the prompt: 19.5ms.

    **Conclusion & Interpretation:**
    - **Result: 23.6ms TPOT for speculative decoding vs 19.5ms for 3B INT4.** With verifier per-position overhead included, speculative decoding preserves 7B quality but misses the <20ms target; reducing to 3B is the latency-safe choice.
