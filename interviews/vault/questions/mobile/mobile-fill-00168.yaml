title: VRAM Budgeting for 7B LLM Inference on Apple A17 Pro
scenario: You are tasked with deploying a 7 billion parameter (7B) Large Language Model (LLM) for on-device
  inference on the Apple A17 Pro chip. The A17 Pro features a 35 TOPS Neural Engine and 8 GB of unified
  memory. Your goal is to achieve real-time performance. Describe how you would approach budgeting the
  8 GB unified memory, explicitly accounting for the model's weights, optimizer state (if applicable for
  fine-tuning), activation memory during inference, and the KV-cache for a context window of 2048 tokens.
details:
  realistic_solution: For a 7B LLM on 8 GB unified memory, aggressive quantization (e.g., 4-bit) for weights
    is essential, reducing the model footprint to ~3.5 GB. The KV-cache should also be quantized (e.g.,
    8-bit) and its size carefully managed based on sequence length and batch size. Techniques like FlashAttention
    or similar attention mechanisms can reduce activation memory. Dynamic memory management, stream processing,
    or even offloading less frequently used layers to CPU memory (if performance critical) might be considered,
    though less ideal for real-time mobile inference.
  common_mistake: Overlooking the combined memory footprint of the KV-cache and activation tensors, assuming
    only model weights consume significant memory, especially with longer sequence lengths or batching.
    Neglecting the GPU/NPU-specific memory requirements beyond just raw parameter storage.
  napkin_math: "Given 8 GB unified memory:\n*   **Model Weights (7B parameters):**\n    *   FP16 (2 bytes/param):\
    \ 14 GB (Exceeds 8 GB)\n    *   INT4 (0.5 bytes/param): 3.5 GB (Leaves ~4.5 GB for other components)\n\
    *   **KV-Cache (for 2048 tokens, 32 layers, hidden size 4096):**\n    *   FP16: The KV cache per layer\
    \ per token is 2 (K+V) * num_heads * head_dim * bytes = 2 * 32 * 128 * 2 = 16,384 bytes/token. For\
    \ 2048 tokens across 32 layers: 2048 * 32 * 16,384 bytes = 1,073,741,824 bytes ≈ 1 GB FP16. INT8 reduces\
    \ this to ~512 MB.\n*   **Activations:** For inference, typically several hundred MBs to ~1 GB, depending\
    \ on batch size and model architecture.\n*   **Estimated Total (INT4 weights, INT8 KV-cache, small\
    \ batch):** 3.5 GB (weights) + 0.5 GB (KV-cache) + 0.5 GB (activations) ≈ 4.5 GB. This leaves some\
    \ room for the OS and other applications, making it feasible but tight, requiring careful optimization."
