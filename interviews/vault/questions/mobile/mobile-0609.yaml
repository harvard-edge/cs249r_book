title: The Shared GPU Contention
scenario: Your app runs a 12ms style transfer model on the Apple GPU while simultaneously rendering a
  complex UI with animations at 60 FPS. Users report dropped frames and UI jank during inference. The
  GPU has a 16.67ms budget per frame for 60 FPS. Show why the math doesn't add up, and design a scheduling
  strategy that eliminates frame drops.
details:
  realistic_solution: 'The Apple GPU uses a **non-preemptive tile-based deferred renderer**. Once a compute
    or render command buffer starts executing, it runs to completion — the GPU cannot pause ML inference
    mid-kernel to service a UI render pass. With a 12ms ML kernel and 4ms UI render, total is 16ms — only
    0.67ms margin on the 16.67ms budget. Any scheduling jitter causes frame drops. Fix with chunked inference:
    split the model into 6 sequential chunks of ~2ms each. Between chunks, the GPU can service UI render
    passes. Worst-case UI delay is now 2ms (one chunk), not 12ms. Total frame: 2ms chunk + 4ms UI = 6ms,
    leaving 10.67ms margin. Even better: offload ML entirely to the ANE, freeing the GPU for UI exclusively.
    The ANE runs the same model in ~8ms on a separate compute unit with zero GPU contention. GPU gets
    the full 16.67ms for rendering with 12.67ms margin. Implementation: use MPSGraph for chunked GPU inference
    or CoreML with ANE preference. Set QoS priorities so UI command buffers get Metal priority level .high
    while ML gets .default. Result: zero dropped frames even under sustained ML + UI workloads.'
  common_mistake: '"12ms inference + 4ms UI rendering = 16ms total, which fits in the 16.67ms frame budget."
    This assumes ML inference and UI rendering can be perfectly serialized within a single frame, which
    ignores GPU command buffer scheduling and preemption behavior.'
  napkin_math: 'Unchunked: 12ms ML + 4ms UI = 16ms. Frame budget: 16.67ms. Margin: 0.67ms (any jitter
    causes drops). Chunked (6 × 2ms): worst-case UI delay = 2ms. UI render: 4ms. Total frame: 2 + 4 =
    6ms. Margin: **10.67ms** (safe). ANE offload: GPU has full 16.67ms for UI (4ms render, 12.67ms margin).
    ML runs on ANE in parallel at 8ms. **Zero contention.** Frame drops: 0.'
