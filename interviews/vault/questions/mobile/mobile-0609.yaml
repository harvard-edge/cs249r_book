title: The Shared GPU Contention
scenario: Your app runs a 12ms style transfer model on the Apple GPU while simultaneously rendering a complex UI with animations at 60 FPS. Users report dropped frames and UI jank during inference. The GPU has a 16.67ms budget per frame for 60 FPS.
question: Why do a 12ms ML GPU kernel and 4ms UI render still drop frames, and what scheduling strategy prevents jank?
details:
  realistic_solution: 'The Apple GPU uses a **non-preemptive tile-based deferred renderer**. Once a compute or render command buffer starts executing, it runs to completion — the GPU cannot pause ML inference mid-kernel to service a UI render pass. With a 12ms ML kernel and 4ms UI render, total is 16ms — only 0.67ms margin on the 16.67ms budget. Any scheduling jitter causes frame drops. Fix with chunked inference: split the model into 6 sequential chunks of ~2ms each. Between chunks, the GPU can service UI render passes. Worst-case UI wait time is now 2ms (one chunk), not 12ms. If UI starts immediately after a chunk begins, it waits 2ms then renders for 4ms, completing in 6ms total, leaving 10.67ms margin. Even better: offload ML entirely to the ANE, freeing the GPU for UI exclusively. The ANE runs the same model in ~8ms on a separate compute unit with zero GPU contention. GPU gets the full 16.67ms for rendering with 12.67ms margin. Implementation: use MPSGraph for chunked GPU inference or CoreML with ANE preference. Set QoS priorities so UI command buffers get Metal priority level .high while ML gets .default. Result: zero dropped frames even under sustained ML + UI workloads.'
  common_mistake: |
    **The Pitfall:** Assuming ML inference and UI rendering can be perfectly serialized within a single frame budget.
    **The Rationale:** Engineers calculate 12ms + 4ms < 16.67ms, ignoring GPU command buffer scheduling and the lack of preemption on mobile GPUs.
    **The Consequence:** The GPU cannot pause the 12ms ML kernel to service a UI render pass, resulting in dropped frames and visible jank.
  napkin_math: |
    1. Unchunked: 12ms ML + 4ms UI = 16ms execution. Margin on 16.67ms budget = 0.67ms (highly prone to jitter/jank).
    2. Chunked ML (6 chunks of 2ms): Worst-case UI wait time is 2ms.
    3. Maximum UI path time: 2ms wait + 4ms render = 6ms.
    4. Margin for UI render: 16.67ms - 6ms = 10.67ms.
    5. ANE Offload: ML runs on ANE in parallel. GPU dedicated purely to UI.
    6. **Conclusion: Chunking provides a safe 10.67ms margin; ANE offload entirely eliminates GPU contention.**
