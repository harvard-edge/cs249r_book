title: Evaluating DRAM vs Compute Energy for A17 Pro
scenario: 'You are deploying a high-resolution video segmentation model on the Apple A17 Pro Neural Engine. You are evaluating two architecture variants. Model A minimizes total compute operations but produces large intermediate activation tensors that frequently spill to the unified memory. Model B uses aggressively fused layers and recomputation, which requires 25% more MAC operations but ensures all intermediate activations remain strictly within the Neural Engine''s local SRAM.'
question: 'Which model do you choose to maximize battery life, and why?'
details:
  realistic_solution: 'Model B is the correct choice because energy consumption on modern mobile platforms is overwhelmingly dominated by data movement, not compute. By keeping activations localized within the Neural Engine''s SRAM through layer fusion and recomputation, Model B drastically reduces unified memory bandwidth. The energy saved from avoiding off-chip DRAM reads and writes far exceeds the marginal cost of performing 25% more arithmetic operations.'
  common_mistake: |
    **The Pitfall:** Choosing Model A by solely looking at the theoretical compute cost (MACs or TOPS).
    **The Rationale:** Assuming that fewer operations strictly equate to lower power consumption without applying the Horowitz energy table principles.
    **The Consequence:** Deploying a memory-bound model that drains the battery significantly faster due to off-chip DRAM accesses.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - INT8 MAC energy: ~0.2 pJ.
       - LPDDR5 access energy: ~10 pJ/bit (~80 pJ/byte).
       - Model A: 15 TOPS, 20 GB/s DRAM traffic.
       - Model B: 18.75 TOPS (+25%), 2 GB/s DRAM traffic.
    2. **Calculations:**
       - Model A Compute: 15e12 * 0.2e-12 = 3.0 W.
       - Model A Memory: 20e9 * 80e-12 = 1.6 W. (Total: 4.6 W).
       - Model B Compute: 18.75e12 * 0.2e-12 = 3.75 W.
       - Model B Memory: 2e9 * 80e-12 = 0.16 W. (Total: 3.91 W).
    3. **Conclusion & Interpretation:**
       - **Result: Model B is more efficient (3.91 W vs 4.6 W), as memory access dominates energy consumption.**
