title: Diagnosing FP8 Activation Overflow on Tensor G3 TPU
scenario: You are deploying a 1.8B parameter Gemini Nano model to a device powered by the Google Tensor
  G3. To maximize the 7.5 TOPS throughput of the on-device TPU, the team aggressively quantized both weights
  and activations to FP8. During testing, the model fits easily within the 12 GB LPDDR5X RAM, but outputs
  become completely nonsensical when processing long documents with rare tokens. What is causing this
  catastrophic degradation, and how would you resolve it while maintaining target latency?
details:
  realistic_solution: The root cause is numeric overflow caused by the limited dynamic range of the FP8
    format (e.g., E4M3 caps at 448), which cannot represent the massive outlier activations typical in
    LLMs. The optimal solution is to implement an outlier-aware mixed-precision strategy, isolating the
    specific channel dimensions containing outliers. By computing only these few channels in BF16 while
    keeping the rest in FP8, the system avoids overflow while still leveraging the high throughput of
    the Tensor G3 TPU.
  common_mistake: Candidates often blame the TPU hardware constraints or suggest rolling back the entire
    model to FP16 or BF16. They fail to identify the specific numeric limitations of the FP8 format when
    handling the outlier activations that naturally occur in large language models.
  napkin_math: For a 1.8B parameter model, FP8 weights consume 1.8 GB of the 12 GB LPDDR5X memory. To
    reach a target of 15 tokens/second, memory bandwidth requires 1.8 GB * 15 = 27 GB/s. If 1% of a 2048-dimensional
    hidden state contains outliers, keeping them in BF16 instead of FP8 adds just 20 bytes per token per
    layer. Across 24 layers at 15 tok/s, this mixed-precision overhead adds less than 10 KB/s of bandwidth,
    which is mathematically negligible and keeps the TPU operating efficiently near its 7.5 TOPS limit.
