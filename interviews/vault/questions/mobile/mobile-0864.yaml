title: 'Realization: build multi-model CNN ensemble on Snapdragon 8 Gen 3 with CPU+NPU split'
scenario: You need to run an ensemble of MobileNetV3-Small (0.056 GFLOPs) + EfficientNet-Lite0 (0.35 GFLOPs) simultaneously on a Snapdragon 8 Gen 3 device for a high-accuracy classification feature. Total latency must be <8ms with results merged.
question: How should a MobileNetV3-Small and EfficientNet-Lite0 ensemble be split across Snapdragon compute units under 8ms?
details:
  realistic_solution: 'Heterogeneous split: (1) MobileNetV3-Small -> Hexagon HTP (0.056G FLOPs, ~0.5ms); (2) EfficientNet-Lite0 -> Hexagon HTP sequentially after or (better) run EfficientNet-Lite0 on Hexagon and MV3-Small on Kryo DSP or Adreno GPU concurrently. QNN supports multi-core scheduling: set QNN_PROPERTY_GROUP to enable concurrent NPU + GPU. Ensemble merge: on CPU (Cortex-A78, fast for 2x1000 softmax addition). If HTP queue can accept both simultaneously: total latency = max(0.5ms, 2ms) = 2ms. Sequential: 0.5 + 2 = 2.5ms. Parallel: 2ms. Well under 8ms SLA.'
  common_mistake: |
    **The Pitfall:** Running both models sequentially on the Hexagon NPU.
    **The Rationale:** Candidates assume the NPU is the only accelerator that should be used and fail to consider heterogeneous concurrent execution.
    **The Consequence:** Total latency increases from 2ms (parallel) to 3ms (sequential), missing out on free performance gains, even though it still fits the 8ms SLA.
  napkin_math: |
    - MV3-Small: 0.056G / 45 TOPS = 1.2μs theoretical -> practical ~0.5ms.
    - Lite0: 0.35G / 45 TOPS = 7.8μs theoretical -> practical ~2ms.
    - Sequential execution would take ~2.5ms.
    - Parallel execution bounded by the slower model: max(0.5ms, 2ms) = 2ms.
    - Ensemble merge: two 1000-dim softmax vectors on Kryo CPU is 2000 FP32 additions = 2000/3.3G ops = 0.6μs (negligible).
    - **Total pipeline latency: image -> parallel inference (2ms) -> CPU merge (0.001ms) = ~2.001ms.**
