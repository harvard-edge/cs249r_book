title: On-Device PII Guardrail Starvation on Hexagon NPU
scenario: 'Your team deploys a local generative AI assistant alongside a lightweight PII-redaction guardrail
  model on a device powered by the Qualcomm Hexagon NPU (Snapdragon 8 Gen 3). During red-teaming assessments,
  you observe a critical symptom: when the main 3B parameter model generates text, the guardrail model
  periodically drops evaluation requests, allowing PII to leak to the UI. Both models are quantized to
  INT8 and the NPU is reporting only 30% compute utilization out of its 45 TOPS capacity. Diagnose the
  hardware-level root cause of this guardrail failure.'
details:
  realistic_solution: The root cause is memory bandwidth starvation on the shared 12-16 GB LPDDR5X bus.
    Autoregressive text generation is heavily memory-bound; the main model is saturating the bus reading
    weights for every token. Despite the Hexagon NPU having ample compute headroom (45 TOPS), the concurrent
    guardrail model cannot fetch its own weights fast enough from the shared memory pool, causing it to
    miss its real-time SLA and fail open.
  common_mistake: Candidates often assume the issue is a lack of compute power or thermal throttling,
    suggesting that the NPU's 45 TOPS limit is being hit. They might also blindly blame the software implementation
    of the guardrail (like an inefficient tokenizer) without considering the underlying hardware resource
    contention.
  napkin_math: The Snapdragon 8 Gen 3 LPDDR5X provides roughly 77 GB/s of memory bandwidth. A 3B parameter
    INT8 main model requires ~3 GB of memory reads per generated token. At 20 tokens/sec, this consumes
    60 GB/s (78% of total bandwidth). The guardrail model (e.g., 0.5B parameters) needs to run context
    checks, requiring at least 0.5 GB per pass. With OS, display, and background tasks consuming the remaining
    ~16 GB/s, the memory bus is completely saturated, starving the NPU's memory fetch for the guardrail
    operations.
