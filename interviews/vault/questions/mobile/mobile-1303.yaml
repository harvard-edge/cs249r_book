title: A17 Pro Canary Rollout Performance Budget
scenario: Your team is executing a canary rollout of a new real-time object tracking model. The device delivers 35 TOPS and features 8 GB of shared unified memory.
question: "What maximum FPS and memory footprint define the A17 Pro canary model theoretical performance budget if the model requires 0.5 TOPS/frame and 15% memory?"
details:
  realistic_solution: Isolate the canary budget by calculating the compute and memory ceilings independently. Determine max frame rate via TOPS-per-frame, and apply the footprint percentage against the system-wide unified memory pool to guarantee OS stability.
  common_mistake: |
    **The Pitfall:** Assuming all 8 GB of memory is isolated for the Neural Engine.
    **The Rationale:** Candidates forget that mobile SoC memory is "unified" and shared across the CPU, GPU, and OS.
    **The Consequence:** Overestimating the available memory budget, leading to out-of-memory crashes during the wider rollout.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - NPU: 35 TOPS.
       - Shared Memory: 8 GB.
       - Model: 0.5 TOPS/frame and 15% memory.
    2. **Calculations:**
       - Max Frame Rate = 35 / 0.5 = 70 FPS.
       - Memory Footprint = 8 GB * 0.15 = 1.2 GB.
    3. **Conclusion & Interpretation:**
       - **Result: Budget-Bound**. The model consumes 1.2 GB, leaving 6.8 GB safely available for the OS and preventing eviction.
