title: A17 Pro Canary Rollout Performance Budget
scenario: Your team is executing a canary rollout of a new real-time object tracking model targeted specifically at devices with the Apple A17 Pro Neural Engine. The A17 Pro delivers 35 TOPS at ~5W and features 8 GB of shared unified memory. You need to determine if it is safe to increase the rollout traffic.
question: "What maximum FPS and memory footprint define the A17 Pro canary model theoretical performance budget if the model requires 0.5 TOPS/frame and 15% memory?"
details:
  realistic_solution: 'Calculate the maximum frame rate by dividing the total available compute by the compute required per frame, and calculate the memory footprint by applying the percentage to the total shared memory.'
  common_mistake: |
    **The Pitfall:** Assuming all 8 GB of memory is isolated for the Neural Engine.
    **The Rationale:** Candidates forget that mobile SoC memory is "unified" and shared across the CPU, GPU, and OS.
    **The Consequence:** Overestimating the available memory budget, leading to out-of-memory crashes during the wider rollout.
  napkin_math: |
    - **Maximum Frame Rate:** 35 TOPS / 0.5 TOPS/frame = 70 FPS.
    - **Memory Footprint:** 15% of 8 GB = 1.2 GB.
    - **Final Result:** The model consumes **1.2 GB**, leaving 6.8 GB safely available for the OS, CPU, and GPU.
