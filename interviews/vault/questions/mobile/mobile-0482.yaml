title: The On-Device Assistant Stutter
scenario: You are the lead ML engineer for a new AI assistant feature on a flagship smartphone. The feature transcribes a user's voice and generates a response in real-time. Users complain that the assistant feels slow to start talking (high TTFT) and the app's animations stutter during generation (violating the 16ms frame budget). Your profiler shows that to generate one output token, the 3B parameter INT8 model must read ~3GB of weights from main memory. The current implementation waits for the entire user utterance to be transcribed before starting the generation.
question: How do you solve both the high TTFT and the UI jank?
details:
  realistic_solution: 'The correct approach is to re-architect the inference pipeline to be incremental and priority-aware. 1. **Solve TTFT:** Implement chunked pre-fill. Instead of waiting for the full transcription, begin the pre-fill phase on the first few transcribed words. This overlaps prompt ingestion with generation. 2. **Solve Jank/TPOT:** Use a priority queue for NPU tasks. The short, latency-critical decode steps must be given higher priority than the longer, less critical pre-fill steps to prevent memory bus contention that starves the UI rendering thread.'
  common_mistake: |
    **The Pitfall:** Focusing on only one symptom or proposing brute-force compression.
    **The Rationale:** Engineers suggest background threads (which doesn't fix TTFT) or aggressive INT4 compression (which hurts quality) without addressing the core scheduling conflict.
    **The Consequence:** The underlying memory bandwidth contention remains, and UI jank persists.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - SoC shared memory bandwidth: 51.2 GB/s.
       - Weight load per token: 3 GB.
       - Frame budget: 16.7 ms.
    2. **Calculations:**
       - Decode memory time = 3 GB / 51.2 GB/s = 58.6 ms.
    3. **Conclusion & Interpretation:**
       - **Result: 58.6 ms. Memory-Bandwidth-Bound.** Reading weights takes 58.6 ms, wildly exceeding the 16 ms UI deadline and causing jank.
  options:
  - Move the audio transcription to the CPU's efficiency cores and dedicate the NPU entirely to the LLM generation.
  - Re-quantize the model to INT4 and apply pruning to reduce the weight size by 50%.
  - Implement chunked prompt ingestion and prioritize decode steps over pre-fill steps in the NPU command queue.
  - Increase the static batch size to process more user input at once, improving NPU utilization.
  correct_index: 2
