title: The Federated Learning System for a Social Media App
topic: differential-privacy
status: published
provenance: imported
scenario: Design a federated learning system for a social media app with 500 million daily active users.
  The model personalizes the content feed. You must improve the model without collecting user interaction
  data on your servers. Cover device selection, communication efficiency, convergence, and privacy guarantees.
details:
  realistic_solution: 'Hierarchical FL for 500M DAU: (1) Device selection — 25M eligible (charging, WiFi,
    idle), sample 10K/round. (2) Communication — 2 MB x 10K = 20 GB/round compressed to ~2 GB. 4 rounds/day
    = $200/month CDN. (3) Convergence — FedProx/SCAFFOLD for non-IID data, ~200 rounds (50 days) to match
    centralized within 1%. (4) Privacy — per-user DP epsilon=8/year. Battery: 0.8%/round. Cluster users
    into behavioral cohorts to address data heterogeneity.'
  common_mistake: '"Run FedAvg across all 500M devices." Naive FedAvg at this scale would require petabytes
    of gradient uploads per round and wouldn''t converge due to extreme data heterogeneity (non-IID user
    behavior).'
  napkin_math: '500M DAU. 25M eligible per moment. 10,000 sampled per round. Upload: 2 MB × 10,000 = 20
    GB/round. Server aggregation: ~5 minutes on 8 GPUs. Rounds per day: 4 (every 6 hours). Daily bandwidth:
    80 GB. Monthly: 2.4 TB. CDN cost: ~$200/month. On-device training time: ~3 minutes per round (50 local
    steps on 50M-param model). Battery cost per round: 3 min × 2W = 0.1 Wh = 0.8% of a 12.8 Wh battery.
    Convergence: ~200 rounds (50 days) to match centralized training quality within 1%.'
