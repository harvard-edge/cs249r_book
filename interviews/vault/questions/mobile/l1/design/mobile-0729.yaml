schema_version: 1
id: mobile-0729
title: The "Unaccelerated Custom Op" Dilemma
topic: accelerator-comparison
status: published
provenance: imported
scenario: You're integrating a novel graph neural network (GNN) model on a specific Android device with
  a proprietary NPU (e.g., a custom Google Tensor NPU or Qualcomm Hexagon DSP). The GNN has a custom aggregation
  operator not natively supported by TensorFlow Lite or the vendor's NPU SDK. Running this operator on
  the CPU causes a 20ms latency spike, making the overall model too slow. How would you approach accelerating
  this custom operator?
details:
  realistic_solution: 'Accelerating a critical custom operator requires deep integration with the vendor''s
    hardware acceleration stack and often involves low-level engineering:'
  common_mistake: '"Just implement it as a TFLite custom op, which will run on the CPU." While this addresses
    the API integration, it fails to solve the critical performance issue.'
  napkin_math: If the CPU execution of the custom op takes 20ms, and the target is <5ms, a 4-5x speedup
    is needed. A typical NPU/DSP can offer 10-100x speedup for suitable operations compared to a single
    CPU core, making custom kernel development a viable path if the operation maps well to the accelerator's
    architecture (e.g., matrix multiplications, element-wise operations, reductions).
