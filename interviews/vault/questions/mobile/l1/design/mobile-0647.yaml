id: mobile-0647
title: The Automotive Assistant's Priority Inversion
topic: latency-decomposition
status: published
provenance: imported
scenario: You are the lead ML Systems Architect for a new flagship electric vehicle's in-car assistant.
  The product team has mandated a single, powerful, on-device LLM to handle all user interactions for
  privacy and offline functionality—from simple commands ('turn up AC') to complex, multi-turn conversations
  ('plan a scenic route and tell me a story about this area').
details:
  realistic_solution: The correct approach is to abandon the 'single model' paradigm and design a heterogeneous,
    priority-aware, and preemptible system.
  common_mistake: 'The most common proposal is to use a single, heavily quantized Mixture-of-Experts (MoE)
    model. This is a good optimization, but it fundamentally fails to address the core issue: a single,
    long-running task, no matter how efficient, will always block a short, high-priority task in a simple
    FIFO queue. It mistakes a model optimization problem for what is actually a systems scheduling and
    architecture problem.'
  napkin_math: 'Snapdragon 8 Gen 3 has 77 GB/s bandwidth. A 7B model in FP16 = 14GB. Generation requires
    14GB/token. Max speed = 77 / 14 = 5.5 tok/s (unusable). Solution: Quantize to INT4 (3.5GB). Speed
    becomes 77 / 3.5 = 22 tok/s. Plus, context cache (KV) for 2000 tokens at FP16 takes 400MB. Int4 quantization
    is mandatory.'
