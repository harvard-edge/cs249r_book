id: mobile-0730
title: The ISP/NPU Hardware Synchronization
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: Your AR headset uses a dedicated Image Signal Processor (ISP) and an NPU. You want zero-copy
  memory between them. You allocate a hardware buffer. The ISP writes a frame to it, then the NPU reads
  it. It works, but occasionally the ML model outputs complete garbage. The image visually looks fine
  if you save it to disk right after the ISP finishes. What hardware synchronization mechanism did you
  forget?
details:
  realistic_solution: 'You forgot a hardware sync fence between the ISP''s DMA write and the NPU''s DMA
    read. The ISP signals ''frame complete'' to the CPU before its final DMA flush finishes (0.5ms remaining).
    The CPU immediately signals the NPU, which reads partially-written memory — the bottom portion of
    the image contains stale data from the previous frame, corrupting the ML input tensor. Fix: insert
    an Android SyncFence or iOS Metal Event between ISP output and NPU input. The fence guarantees all
    DMA writes are visible in DRAM before the NPU begins reading. Cost: <10us latency, zero CPU involvement.'
  common_mistake: '"You didn''t flush the CPU cache." The CPU isn''t touching this memory—it''s a direct
    ISP to NPU transfer. The issue is between the hardware blocks.'
  napkin_math: An ISP might process a frame in 10ms. The final DMA flush to RAM takes 0.5ms. If the CPU
    signals the NPU in 0.1ms, the NPU reads memory that is 400 microseconds out of date, destroying the
    spatial consistency of the image tensor.
