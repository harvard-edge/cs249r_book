id: mobile-0038
title: The Delivery Paradox
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: You're shipping an on-device LLM assistant (3B parameters, INT4) to a global Android app with
  500 million installs. The quantized model is 1.7 GB. Google Play's install-time APK limit is 150 MB,
  and on-demand delivery via Play Asset Delivery has a 2 GB limit. Design the model delivery system. What
  breaks at this scale that doesn't break in a demo?
details:
  realistic_solution: 'At 500M installs, every decision multiplies by 500M. The system design must address
    five interacting constraints: 1. **CDN Cost**: Downloading 1.7 GB for every minor update is prohibitively
    expensive ($8.5M/update). Delta updates are required. 2. **Storage constraints**: 1.7 GB is too large
    for the base app, forcing on-demand asset delivery. 3. **Memory constraints**: Loading INT4 weights
    requires efficient mmap and memory paging to avoid immediate OOM on background app swaps. 4. **Delivery
    limits**: Play Asset Delivery allows up to 2 GB for on-demand fast-follow packs. 5. **Network reliability**:
    A 1.7 GB download will frequently fail on cellular networks, requiring robust resume-on-failure logic.'
  common_mistake: '"Just use on-demand download after install — it''s under 2 GB." This works for a prototype
    but collapses at 500M-device scale.'
  napkin_math: 'CDN cost per version: 500M × 1.7 GB × $0.01/GB = **$8.5M**. With brotli compression (60%):
    **$5.1M**. With delta updates (15% of full): **$1.275M** — a ~6.6× cost reduction. Storage: median
    Android device has ~15 GB free. 1.7 GB = 11% of free space — unacceptable for budget phones. Tiered
    delivery is mandatory.'
