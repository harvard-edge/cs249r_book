id: mobile-0649
title: 'The Phantom Reboot: Designing a Resilient Automotive ML Watchdog'
topic: fault-tolerance-checkpointing
status: published
provenance: imported
scenario: 'You are the lead ML Systems Engineer for a new ''Driver Drowsiness Detection'' feature shipping
  in a fleet of electric vehicles. The model runs on the car''s primary mobile-grade SoC (e.g., Snapdragon
  8 Gen 3). Two months after launch, a rare but critical bug appears: in specific lighting conditions
  (driving into a low sun with dappled light from trees), the model''s internal activations explode, causing
  a NaN propagation that freezes the inference process. Because this is a critical safety feature, the
  main Vehicle Control Unit (VCU) has a hardware watchdog timer expecting a ''heartbeat'' from the ML
  process every 100ms. When the ML process freezes, the heartbeat stops, the VCU''s watchdog fires, and
  it reboots the entire infotainment SoC to recover. This is a disastrous user experience and a safety
  concern.'
details:
  realistic_solution: The correct approach is a multi-layered defense-in-depth system that decouples failure
    detection from the main VCU watchdog, manages its own recovery, and captures data for the long-term
    fix.
  common_mistake: The most common mistake is to propose a simple `try/except` block around the inference
    call. This is too simplistic; it doesn't explain *what* the `except` block does to prevent the hardware
    watchdog from firing, how it recovers state, or how it collects data. Another mistake is to blame
    the hardware ('We need a faster NPU') when the problem is algorithmic instability due to data drift,
    not a lack of processing power.
  napkin_math: '**1. Watchdog Safety Margin:** The VCU''s hardware watchdog has a 100ms timeout. We set
    our internal software watchdog to trigger at 80ms. This creates a `100ms - 80ms = 20ms` safety margin
    for our recovery handler to take control and send a `STATUS_RECOVERING` heartbeat to the VCU, preventing
    a hard reboot.'
