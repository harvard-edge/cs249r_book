id: mobile-0774
title: The Thermal Throttling Adaptation Loop
topic: fault-tolerance-checkpointing
status: published
provenance: imported
scenario: Your mobile AR app runs a real-time segmentation model on the A17 Pro ANE at 35 TOPS. After
  10 minutes of sustained use, the thermal management system throttles power from 5W to 3W. The ANE throughput
  drops proportionally. Design an adaptive inference strategy that maintains acceptable user experience
  under thermal constraints.
details:
  realistic_solution: 'Throttled throughput: 35 × (3/5) = 21 TOPS (60% of peak). Adaptive strategy: (1)
    Monitor thermal state via OS APIs, (2) maintain 3 model tiers: full (35 TOPS, 30fps), medium (21 TOPS,
    20fps with smaller input resolution), lite (14 TOPS, 15fps with aggressive pruning), (3) smooth transitions
    over 2-3 seconds to avoid visual jarring, (4) predictive throttling: start reducing quality 30s before
    expected thermal limit based on temperature trajectory.'
  common_mistake: Ignoring thermal throttling entirely and having the app stutter or crash when throughput
    drops. Another mistake is statically reducing quality at app launch, wasting the initial thermal headroom.
  napkin_math: 'Peak: 35 TOPS at 5W. Throttled: 35 × 3/5 = 21 TOPS at 3W (60% throughput). Frame budget:
    full model needs 30 TOPS for 30fps. At 21 TOPS, max sustainable is ~21 fps. Switching to medium model
    (15 TOPS for 30fps) restores 30fps under throttling.'
