id: mobile-0645
title: The On-Device LLM Keyboard Power Drain
topic: speculative-decoding
status: published
provenance: imported
scenario: 'You are the architect for a new AI keyboard on Android, targeting devices like the Snapdragon
  8 Gen 3. The key feature is sentence completion using an on-device 2B parameter LLM. The Product Manager
  has two non-negotiable requirements: 1) The time-to-generate a 10-token completion must be under 500ms.
  2) The feature cannot consume more than 1W of average power during active use, to prevent noticeable
  battery drain. Your initial prototype, which uses a standard auto-regressive decoder with the quantized
  2B model, is too slow and hot: latency is ~150ms per token (1.5s total), and power consumption spikes
  to 4W during generation.'
details:
  realistic_solution: The architecture will use speculative decoding to get the speed of a tiny 'drafter'
    model with the accuracy of the large 'verifier' model.
  common_mistake: A common proposal is to simply use a much smaller model (e.g., 500M parameters). This
    improves latency and power but sacrifices significant quality, failing the implicit requirement of
    having a powerful model. This approach moves along the existing Pareto curve, whereas the goal is
    to *break* the curve. The key is to get the latency of a small model with the quality of the large
    model, which is the purpose of speculative decoding.
  napkin_math: '2B params INT4 = 1GB weights. Target: 10 tokens in 500ms (20 tok/s). Requires reading
    1GB * 20 = 20GB/s bandwidth. Snapdragon 8 Gen 3 (77GB/s) easily supports this. Power: Mobile RAM burns
    ~1W per 10GB/s. 20GB/s = 2W average power just for memory. To hit <1W, must use speculative decoding
    to slash reads.'
