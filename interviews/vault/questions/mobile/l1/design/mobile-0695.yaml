id: mobile-0695
title: The SLC Cache Eviction
topic: memory-hierarchy-design
status: published
provenance: imported
scenario: You are designing an always-on audio classifier for a mobile SoC. The model is 2 MB and the
  SoC has a 4 MB System-Level Cache (SLC). You pin the model to the SLC. It runs perfectly at 1 mW. However,
  the moment the user turns on the screen and scrolls the UI, the audio model's power consumption spikes
  to 15 mW, even though the CPU/NPU usage hasn't changed. Why does UI scrolling ruin your ML power budget?
details:
  realistic_solution: 'The 4 MB SLC (System-Level Cache) is shared among all SoC subsystems. When the
    screen turns on, the GPU display compositor and CPU UI rendering generate a stream of cache-line fills
    that evict your 2 MB ML model from the SLC. Each inference now reads from DRAM instead of SLC: energy
    per read jumps from 5 pJ/byte (SLC) to 100 pJ/byte (DRAM) — a 20x increase. 2 MB x 100 pJ vs 2 MB
    x 5 pJ = 200 uJ vs 10 uJ per inference. Fix: use SoC-specific cache partitioning (if available), or
    accept DRAM cost and optimize model to <512 KB to fit in L2 cache, which is private to the NPU.'
  common_mistake: '"The screen takes power, so the total power goes up." The question states the *model''s*
    power consumption spiked, independent of the screen''s baseline power.'
  napkin_math: 'SLC Read: 2 MB * 5 pJ = 10 µJ per inference. DRAM Read: 2 MB * 100 pJ = 200 µJ per inference.
    A 20x explosion in energy cost simply because another subsystem polluted the shared cache.'
