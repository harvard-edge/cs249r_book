title: The Guardian Copilot's Dilemma
topic: latency-decomposition
status: published
provenance: imported
scenario: You are the Lead ML Systems Architect for a new flagship EV's 'Guardian' copilot. The system
  uses a 4B-parameter multi-modal model running on the central Snapdragon 8 Gen 3-class SoC (45 TOPS).
  It monitors driver state (video) and road context (navigation) to provide proactive assistance.
details:
  realistic_solution: The problem is not one of raw performance, but of scheduling. A long-running, low-priority
    task is occupying the GPU, causing any subsequent high-priority task to miss its deadline. The architecture
    must be able to interrupt the low-priority work.
  common_mistake: The most common L4/L5 answer is to propose using a smaller, faster model or a separate,
    dedicated safety MCU. These are valid but are 'cop-outs' — they sidestep the core architectural challenge
    of safely multiplexing high- and low-priority tasks on a single, powerful processor. Another common
    mistake is to focus only on model optimization (quantization, pruning), which improves absolute latency
    but doesn't solve the fundamental queuing and preemption problem — a slow, blocking task still blocks,
    it's just slightly less slow.
  napkin_math: Let's prove why standard continuous batching fails and preemption succeeds.
