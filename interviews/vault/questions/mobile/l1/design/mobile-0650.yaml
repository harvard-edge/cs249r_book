id: mobile-0650
title: The SolarSentry Dashcam Meltdown
topic: power-budgeting
status: published
provenance: imported
scenario: You are the Principal Engineer at a startup building the 'SolarSentry', a smart dashcam for
  cars. The key feature is a 'Sentry Mode' that uses ML to detect threats (e.g., break-ins, collisions)
  while the car is parked and turned off.
details:
  realistic_solution: The architecture must be a dynamic, multi-stage system that treats compute as a
    budget constrained by thermals, not just performance.
  common_mistake: A purely model-centric answer like 'I'll use a highly quantized, efficient model.' While
    necessary, this ignores the system dynamics. Another common mistake is proposing a simple, static
    duty cycle (e.g., 'run inference once per second'), which fails to adapt to the wildly fluctuating
    thermal headroom and could lead to either missing events or thermal shutdown. The most significant
    mistake is underestimating the thermal physics; a powerful mobile SoC running continuously, even at
    moderate load, will quickly overheat in a hot car without a fan.
  napkin_math: 'Naive always-on at ~2W. Car battery ~60Ah*12V = 720Wh, reserve 50Wh to start => 670Wh
    usable. At 2W: 670/2 = 335h = 14 days. Multi-stage: PIR sensor 0.01W always-on. Motion-triggered low-res
    detect 0.5W. Full model 2W on confirmed motion only. With 1% trigger rate: avg = 0.01 + 0.01*0.5 +
    0.001*2 = 0.017W. Life = 670/0.017 = 39,412h = 4.5 years.'
