title: The Sentry Mode Thermal Budget
topic: power-budgeting
status: published
provenance: imported
scenario: 'You are the lead ML Systems Engineer designing a ''Sentry Mode'' for a new automotive dashcam.
  This feature must detect security events (e.g., proximity, impact) for up to 72 hours while the car
  is parked and off. Your constraints are:

  1.  **Hardware:** A standard mobile SoC (e.g., Snapdragon 8 Gen 3 class).

  2.  **Power Source:** The car''s 12V battery, but you can only consume a maximum of 20 Wh over the 72-hour
  period to guarantee the car can start.

  3.  **Thermal:** The device is sealed and mounted on the dashboard, where ambient temperatures can reach
  80°C in direct sunlight. The passive cooling solution can dissipate approximately 1W of power continuously
  before thermal throttling begins.

  4.  **Responsiveness:** An event must be detected and recorded within 2 seconds of occurring.

  5.  **Energy Harvesting:** A tiny, embedded solar cell provides a best-case average of 0.2W of power
  during daylight hours (assume 8 hours/day).'
details:
  realistic_solution: The correct architecture is a **Hierarchical Sensing and Aggressive Duty Cycling**
    system. You cannot afford to keep the main SoC powered on.
  common_mistake: Proposing a solution that simply tries to run a highly optimized, 'efficient' model
    continuously at a low frame rate (e.g., 1 FPS). This approach fundamentally misunderstands the physics
    of mobile power consumption. It ignores the massive delta between active power and deep sleep power,
    and fails to calculate the total system energy budget. Running the SoC 'on' continuously, even with
    a lightweight model, will drain the battery in hours and cause immediate thermal throttling in a hot
    car.
  napkin_math: First, let's calculate the total energy budget and harvested energy.
