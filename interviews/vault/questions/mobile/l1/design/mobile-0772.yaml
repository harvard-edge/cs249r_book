id: mobile-0772
title: The Model Distillation Sync Budget
topic: collective-communication
status: published
provenance: imported
scenario: 'You run on-device knowledge distillation: a 500 MB teacher model in the cloud periodically
  pushes updates to guide a 50 MB on-device student. The user has a 100 MB daily cellular data budget.
  Design a sync protocol that keeps the student model fresh without exceeding the data budget.'
details:
  realistic_solution: 'Strategy: (1) Delta compression of teacher weights: ~5% of full model = 25 MB,
    fits in 100 MB budget. (2) Alternatively, send soft-label distillation targets: for 10K local samples
    x 32K vocab x FP16, this is too large. Better: send only top-32 logits per sample = 10K x 32 x 4 bytes
    = 1.3 MB. (3) Hybrid: monthly full sync over WiFi (500 MB), daily delta sync over cellular (25 MB).
    Budget: 25 MB/day << 100 MB limit.'
  common_mistake: Sending the full 500 MB teacher model to the device. The student does not need the full
    teacher; it needs the teacher's soft labels or a compressed delta of the teacher's behavior on the
    student's local data distribution.
  napkin_math: 'Full teacher: 500 MB (exceeds budget). Delta: 500 MB x 5% = 25 MB (fits). Soft labels
    (top-32): 10K x 32 x 4B = 1.3 MB (fits easily). Monthly WiFi + daily delta: 25 MB/day = 750 MB/month
    cellular. Soft labels: 1.3 MB/day = 39 MB/month.'
