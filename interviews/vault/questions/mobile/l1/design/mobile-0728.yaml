schema_version: 1
id: mobile-0728
title: The Asymmetric Multiprocessing (Big.LITTLE) Stutter
topic: accelerator-comparison
status: published
provenance: imported
scenario: Your Android app runs an OCR model entirely on the CPU (using XNNPACK). You spawn 4 threads
  to match the 4 cores of the device. The average latency is 50ms. However, the 99th percentile (P99)
  latency is a massive 150ms, causing noticeable UI stutter. The device is not thermal throttling. What
  architectural feature of mobile CPUs causes this massive latency variance?
details:
  realistic_solution: 'ARM big.LITTLE has two core types: big cores (3.0 GHz, 4-wide decode, large L2)
    and LITTLE cores (1.8 GHz, 2-wide decode, tiny L2). The OS scheduler may place your threads on any
    core. When all 4 threads land on big cores: 50ms. When 1-2 threads land on LITTLE cores: that thread
    takes ~150ms (3x slower due to IPC + cache differences), and the whole inference waits for the slowest
    thread. Fix: use Android''s pthread_setaffinity or Java''s Process.setThreadPriority with CPU affinity
    masks to pin ML threads exclusively to big cores. This eliminates the P99 spike entirely.'
  common_mistake: '"The Java Garbage Collector is pausing the threads." While GC causes pauses, a 3x consistent
    variance on CPU execution points to hardware asymmetry.'
  napkin_math: 'Big Core: 3.0 GHz, 4-wide decode, massive L2 cache. LITTLE Core: 1.8 GHz, 2-wide decode,
    tiny cache. The raw architectural difference is roughly 2.5x to 3x in IPC (Instructions Per Clock).
    50ms * 3 = 150ms.'
