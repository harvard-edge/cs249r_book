id: mobile-0637
title: The Heterogeneous Execution Strategy
topic: roofline-analysis
status: published
provenance: imported
scenario: You're deploying a multi-modal model on a Snapdragon 8 Gen 3 that has a Hexagon NPU (45 TOPS),
  an Adreno GPU (4.6 TFLOPS FP16), and Kryo CPU cores. The model has Conv2D layers, a custom attention
  mechanism, GELU activations, and dynamic control flow. Design the execution strategy that minimizes
  total latency.
details:
  realistic_solution: 'Partition the model by operator affinity. Note: even when you specify a single
    compute unit, runtimes like CoreML and TFLite may silently re-partition — CoreML models often execute
    with "Mixed (Float16, Float32, Int32)" precision even when FP16 is requested, because the Neural Engine
    lacks native support for certain ops. Always profile with the vendor''s tools (Xcode GPU Report, Snapdragon
    Profiler) to see the *actual* execution plan.'
  common_mistake: '"Run everything on the NPU — it has the most TOPS." The NPU can''t handle all operator
    types, and forcing unsupported ops onto it causes catastrophic graph partitioning.'
  napkin_math: 'Model: 50 layers. 40 layers NPU-compatible, 8 GPU (attention + GELU), 2 CPU (control flow).
    Naive partitioning: 40 NPU layers (8ms) + 2 handoffs (3ms) + 8 GPU layers (6ms) + 1 handoff (1.5ms)
    + 2 CPU layers (1ms) = 19.5ms. Optimized (replace GELU with sigmoid approximation, fuse attention
    into fewer GPU calls): 45 NPU layers (9ms) + 1 handoff (1.5ms) + 5 GPU layers (4ms) + 1 handoff (1.5ms)
    + 2 CPU (1ms) = 17ms. Saving 3 handoffs = 2.5ms = 13% latency reduction.'
