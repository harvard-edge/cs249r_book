id: mobile-0662
title: The AR Navigation Preemption Crisis
topic: real-time-deadlines
status: published
provenance: imported
scenario: 'You are the Lead ML Systems Engineer designing a new flagship ''AR Live View'' feature for
  a luxury electric vehicle''s infotainment system. The system must render navigation guidance (e.g.,
  glowing arrows) over a live 4K camera feed at a buttery-smooth 30 FPS. A key differentiator is the ''Vision
  Query'' feature: the user can tap on any building in the camera view and ask, ''What is that?'', which
  triggers a powerful 2-billion parameter multimodal VLM.'
details:
  realistic_solution: The core challenge is that a long-running, low-priority task (VLM) must not starve
    a short, high-priority, real-time task (Navigation) on shared, non-preemptible hardware like an NPU.
    The architecture must create the *illusion* of preemption.
  common_mistake: A common but flawed approach is to create a simple FIFO (First-In, First-Out) queue
    for the NPU, assuming the hardware will handle it. This fails because a single, long VLM prefill task
    (100ms+) will occupy the NPU and block multiple, short, time-sensitive navigation tasks (e.g., 3-4
    frames), causing a massive visual stutter. Another mistake is to suggest running the VLM on the CPU;
    a 2B model is far too heavy for a mobile CPU to run efficiently and it will still compete for the
    same memory bus, creating a bottleneck.
  napkin_math: 'Let''s quantify why a simple queue fails and why chunking is necessary.


    **Timing Requirements:**

    - Navigation: 30 FPS → 33 ms/frame budget. Nav model inference: ~8 ms.

    - VLM prefill (2B params): ~400 ms for a single forward pass on mobile NPU.


    **FIFO Queue Failure:**

    - User taps ''Vision Query''. VLM prefill enters queue: 400 ms.

    - During this 400 ms, navigation misses 400/33 = **12 frames** → 0.4s visible stutter.

    - Unacceptable for a driving application.


    **Chunked Scheduling Solution & Memory Budget:**

    - NPU SRAM needed: ~52 MB. Snapdragon 8 Gen 3 NPU shared memory: 12 MB → activations spill to DRAM,
    adding ~2 ms overhead per chunk for save/restore.

    - To fit the 33ms budget: Split VLM prefill into chunks of ~23 ms each.

    - Schedule: [Nav 8ms] → [VLM chunk 23ms] → [Nav 8ms] → ...

    - Per nav frame: 8 (Nav) + 23 (VLM) + 2 (overhead) = 33 ms → exactly fills the frame budget.

    - Navigation maintains 30 FPS. VLM completes in ceil(400 / 23) = 18 chunks.

    - Total time for VLM: 18 × 33 = 594 ms (48% overhead vs uninterrupted).

    - User perceives: smooth navigation + VLM response in ~0.6s (acceptable for a tap query).'
