title: The Automotive Co-Pilot Conundrum
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: You are the new tech lead for the 'AI Co-Pilot' in our flagship EV. The goal is a low-latency,
  on-device conversational assistant. The product team is adamant about using a powerful, open-source
  7B parameter LLM for its reasoning capabilities. Your hardware target is the vehicle's primary Snapdragon
  8 Gen 3 SoC, and you have a strict 10W power budget and a 2GB memory budget for the entire AI service.
  Users expect an 'instant' experience, which product has defined as a Time-To-First-Token (TTFT) of less
  than 200ms. A 7B model is obviously not feasible out-of-the-box. Propose a comprehensive, multi-pronged
  optimization strategy to bridge this gap. What are the three main pillars of your technical plan, how
  do they interact, and what are the expected quantitative gains from each?
details:
  realistic_solution: A Staff-level answer proposes a holistic, multi-stage strategy that acknowledges
    the problem requires orders-of-magnitude improvement.
  common_mistake: A non-staff answer is to just list individual, disconnected techniques like 'we'll prune
    the model' or 'we'll use INT8 quantization'. This approach fails to grasp the scale of the problem
    and how different optimizations must be combined in a specific sequence to succeed. It ignores second-order
    effects like KV cache memory, kernel launch overhead, and the fundamental challenge of token-by-token
    generation latency, which simple quantization or pruning alone cannot solve.
  napkin_math: '**Baseline (7B LLM @ FP16):** | Weight Memory: 7B params × 2 bytes/param = 14 GB. **HARD
    FAIL** (Budget is 2 GB).'
