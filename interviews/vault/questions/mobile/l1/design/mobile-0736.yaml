schema_version: 1
id: mobile-0736
title: Zero-Shot UI Action Grounding
topic: compound-ai-systems
status: published
provenance: imported
scenario: 'We''re implementing a Ferret-UI-inspired agentic system where Siri can perform actions based
  on what the user is currently looking at on their screen. The vision-language model needs to ground
  user commands (e.g., ''Click the second checkout button'') to explicit x,y coordinates. The constraint:
  this grounding model must reside entirely in-memory with a peak RAM footprint under 50MB, execute in
  <10ms on the Apple Neural Engine (ANE), and support seamless handoff to Private Cloud Compute for complex
  reasoning. How do you design the on-device grounding architecture and the handoff protocol?'
details:
  realistic_solution: Use an asymmetric cascaded architecture. An ultra-small, specialized CoreML model
    (e.g., a MobileNetV4-based encoder paired with a lightweight transformer decoder, ~15M parameters)
    continuously runs on the ANE to output bounding boxes and semantic embeddings for UI elements. It
    relies solely on pixels, bypassing the accessibility tree. For the handoff protocol, instead of sending
    the raw screenshot to the cloud (which introduces latency and privacy risks), the on-device model
    generates a highly compressed semantic embedding grid (e.g., 16x16 tokens) of the screen. Only this
    grid and the user's audio transcript are securely handed off to the Apple Intelligence cloud nodes,
    drastically reducing bandwidth and preserving user privacy.
  common_mistake: Suggesting running a multi-billion parameter Vision-Language Model (VLM) on-device using
    standard 4-bit quantization (which still violates the 50MB RAM constraint by orders of magnitude),
    or relying on DOM/accessibility trees which are notoriously unreliable and not universally implemented
    across all iOS apps.
  napkin_math: '- Memory: 15M parameters quantized to INT4 = ~7.5MB. | - Activations: Downsampled 512x512
    image input → peak activation memory is 256 x 256 x 16 channels x 2 bytes (FP16) = ~2MB. | - Context/OS
    Buffer: ~5MB. | - Total RAM Footprint: ~14.5MB (safely under the 50MB constraint). | - Latency: The
    ANE computes ~11-35 TOPS. A 15M parameter forward pass is ~0.5 GFLOPs. Compute time is bounded by
    memory bandwidth. At ~50GB/s unified memory bandwidth, transferring 7 MB of vision encoder weights
    from DRAM to NPU SRAM takes 7 MB / 25.6 GB/s LPDDR5 bandwidth = 0.27 ms. Total end-to-end latency:
    12 ms vision encoding + 0.27 ms weight transfer + 8 ms text grounding + 2 ms action mapping = 22.3
    ms, well within the 100 ms interaction budget.'
