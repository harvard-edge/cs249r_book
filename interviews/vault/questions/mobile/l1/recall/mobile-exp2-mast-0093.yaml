schema_version: 1
id: mobile-exp2-mast-0093
title: Designing a 32K Context Window for Google Tensor G3
topic: attention-scaling
status: published
provenance: imported
scenario: You are designing an on-device document summarization feature for a Pixel device powered by
  the Google Tensor G3. The feature needs to handle a 32,768 (32K) token context window locally using
  an optimized LLM (like Gemini Nano). However, the device's 12 GB LPDDR5X RAM is heavily shared with
  the OS, leaving a strict 2 GB budget for the KV cache. Design a novel attention architecture and memory
  management strategy that fits this budget while maximizing the utilization of the 7.5 TOPS on-device
  TPU.
details:
  realistic_solution: A strong L6+ solution synthesizes Grouped-Query Attention (GQA) to drastically reduce
    the KV cache size, combined with Sliding Window Attention (SWA) or an attention sink mechanism to
    bound memory usage for streaming inputs. The candidate should design a block-wise computation strategy
    (similar to FlashAttention) tailored to keep active tiles within the TPU's local SRAM, minimizing
    expensive reads from the 12 GB LPDDR5X memory and keeping the 7.5 TOPS compute units fed.
  common_mistake: Candidates often suggest standard Multi-Query Attention (MQA) without calculating if
    it actually fits the budget, or they propose offloading cache to storage which destroys latency. They
    also frequently ignore the TPU's matrix-multiplication characteristics, proposing sparse attention
    patterns that compile poorly on dense accelerators like the Tensor G3.
  napkin_math: 'Assume a model with 16 layers, a hidden dimension of d=2048, and 16 attention heads. For
    a 32K context window using standard MHA in FP16 (2 bytes): KV cache = 2 (K,V) * 32,768 tokens * 16
    layers * 2048 * 2 bytes = 4.29 GB (exceeds the 2 GB budget). By redesigning with GQA using 2 KV heads,
    the KV hidden dimension drops to 256. New KV cache size = 2 * 32,768 * 16 * 256 * 2 bytes = 536.8
    MB, comfortably fitting the budget. At 7.5 TOPS, computing the attention scores (QK^T) for a 1024-token
    chunk requires 2 * 1024 * 32768 * 2048 = 137.4 GFLOPs. On the TPU, this takes roughly 137.4e9 / 7.5e12
    = ~18.3 ms, proving feasibility.'
