schema_version: 1
id: mobile-0100
title: The Double FPU Context Save
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: Your mobile app does complex ML preprocessing in C++ (heavy floating-point math). It then passes
  the data to an ML model running on the same CPU core, handled by an RTOS-like microkernel on a dedicated
  wearable companion chip. You notice that every time the OS context-switches between your preprocessing
  thread and the ML inference thread, the context switch takes 3x longer than normal. What is the OS doing
  differently because of your math?
details:
  realistic_solution: 'Both threads use FPU/NEON registers, forcing full register bank save on every context
    switch. Integer save: 16 regs x 4 bytes = 64 bytes. With FPU: +32 NEON regs x 16 bytes = 512 bytes.
    Total: 576 bytes (9x increase in memory traffic per swap). On a wearable chip with narrow memory bus,
    this dominates scheduling. Fix: (1) pin preprocessing + inference to same thread, (2) use integer-only
    preprocessing (fixed-point), or (3) enable lazy FPU context switching in the RTOS.'
  common_mistake: '"Floating point math is slow." The math speed doesn''t explain the context switch speed.'
  napkin_math: 'Standard integer context save: 16 registers * 4 bytes = 64 bytes. FPU context save: +
    32 SIMD registers * 16 bytes = 512 bytes. You increased the memory traffic of the OS scheduler by
    800% on every single thread swap.'
