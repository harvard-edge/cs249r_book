schema_version: 1
id: mobile-exp2-reca-0205
title: Hexagon NPU Peak Throughput Data Type
topic: data-quality-validation
status: published
provenance: imported
scenario: Your team is establishing a strict data contract for edge ML features running on the Qualcomm
  Hexagon NPU (Snapdragon 8 Gen 3). To ensure the model meets its latency targets using the NPU's 45 TOPS
  hardware accelerator, the data validation pipeline must enforce a specific schema on the input tensors.
  What specific numerical data type must the input schema validate against to natively utilize the peak
  45 TOPS capability of this NPU?
details:
  realistic_solution: The correct answer is INT8. To hit the advertised 45 TOPS on the Snapdragon 8 Gen
    3 Hexagon NPU, the data contract and quality gates must validate that input features are properly
    scaled and cast to 8-bit integers (INT8) before inference.
  common_mistake: Candidates often assume FP16 or FP32 because they are standard in cloud environments
    or GPU execution. They fail to recall that peak mobile NPU performance heavily relies on integer quantization.
  napkin_math: If an INT8 computer vision model requires 15 GOPS per inference, theoretical max throughput
    is (45 TOPS * 1000 GOPS/TOPS) / 15 GOPS = 3,000 inferences per second. Validating an INT8 input schema
    of 224x224x3 requires 150,528 bytes (~150 KB) per frame. At 3,000 fps, this demands ~450 MB/s of memory
    bandwidth, which is easily accommodated by the system's shared 12-16 GB LPDDR5X memory.
