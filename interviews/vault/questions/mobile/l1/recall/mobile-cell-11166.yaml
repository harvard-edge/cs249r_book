schema_version: 1
id: mobile-cell-11166
title: 'KV-Cache: Recall — What is a KV Cache and Why Does It Matter for Mobile LLM?'
topic: kv-cache-management
status: published
provenance: imported
scenario: In the context of a 1B LLM on A17 Pro (35 TOPS, 8GB), define the KV cache, explain why it exists,
  and state what happens to token generation speed as context length grows without KV caching.
details:
  realistic_solution: 'KV cache: stores the Key and Value tensors for all previously generated tokens.
    Avoids recomputing K,V for old tokens at each new generation step. Without KV cache: generating the
    nth token requires O(n) computation (re-computing all prior K,V). Total generation of N tokens: O(N²).
    With KV cache: each step O(1) new K,V computation → total O(N).'
  common_mistake: Confusing KV cache with model weights cache; not knowing that without KV cache, each
    token requires recomputing attention over the full sequence (O(n²) total computation).
  napkin_math: 'Without KV cache: generating token n requires prefill of all n-1 prior tokens. For 512-token
    generation: 1+2+3...+512 = 131,328 token-equivalent computations. For 1B model: 131,328 × 1B × 6 FLOPs
    = 787.97T FLOPs. At 35 TOPS: 22.5 seconds for 512 tokens = 22.7 tokens/sec. With KV cache: each step
    = 1 token computation = 1B × 6 FLOPs = 6B FLOPs. At 35 TOPS: 0.17ms per token. 512 tokens: 512 × 0.17ms
    = 87ms = 5,862 tokens/sec (compute only). But weight loading dominates: 7.35ms per step → 136 tok/sec.
    KV cache speedup: 22.7 → 136 tok/sec = 5.99× at 512 tokens, scales to O(n) speedup at longer contexts.'
