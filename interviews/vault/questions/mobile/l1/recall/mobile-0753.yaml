schema_version: 1
id: mobile-0753
title: The On-Device Fine-Tuning Data Budget
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: You want to fine-tune a mobile vision model on-device using 1,000 user photos preprocessed to
  224x224 RGB tensors in FP32. How much memory does this training dataset occupy, and does it fit comfortably
  in the 8GB unified memory of an iPhone 15 Pro alongside the model?
details:
  realistic_solution: 1,000 images x 224 x 224 x 3 channels x 4 bytes (FP32) = 602 MB. This is significant
    but fits in 8GB alongside a quantized model. However, training also needs gradients and optimizer
    states, which can 2-3x the memory pressure.
  common_mistake: Estimating based on JPEG file sizes (a few MB total) rather than the uncompressed tensor
    representation that the training loop actually requires in memory.
  napkin_math: Images = 1000*224*224*3*4B = 602MB. Model (25M INT8) = 25MB. Gradients + Adam Optimizer
    (FP32) = 25M*8B = 200MB. Forward activations for batch size 32 = ~100MB. Total RAM needed = 602 +
    25 + 200 + 100 = 927MB. This easily fits inside the 8GB unified memory of the iPhone 15 Pro, leaving
    7GB+ for iOS.
