id: mobile-cell-12149
title: 'Network Bandwidth Bottlenecks: Master Full Bandwidth Analysis for Mobile AI System'
topic: network-bandwidth-bottlenecks
status: published
provenance: imported
scenario: 'Perform a complete bandwidth analysis for a flagship mobile AI system (Snapdragon 8 Gen 3,
  16GB LPDDR5X, 77 GB/s) running 4 simultaneous AI workloads: (1) 3B INT4 LLM assistant (on-demand, TPOT-critical),
  (2) real-time speech recognition (continuous, 1B INT8, 100 tokens/s), (3) camera scene understanding
  (YOLOv8-s, 11M INT8, 30fps), (4) AR depth estimation (MobileNetV3, 5M FP16, 60fps). Show bandwidth allocation,
  identify conflicts, and design a priority-based scheduler.'
details:
  realistic_solution: 'BW requirements: LLM (3B INT4=1.5GB): 76.9GB/s during decode (1 token per 19.5ms).
    Speech (1B INT8=1GB, 100 tokens/s): 100×1GB/s=100GB/s? No: 100 tokens/s × 1GB / tokens_per_pass. Speech
    processes 100ms windows → 10 passes/s: 10×1GB=10GB/s. YOLO-s (11M INT8, 30fps): 11MB×30=330MB/s =
    0.33GB/s. Depth (5M FP16=10MB, 60fps): 10MB×60=600MB/s = 0.6GB/s. System: 3GB/s. Non-LLM total: 10+0.33+0.6+3=13.93GB/s.
    LLM during decode: 76.9GB/s. Conflict: 13.93+76.9=90.83GB/s > 77GB/s. Fix: during LLM decode (19.5ms),
    suspend depth estimation (saves 0.6GB/s) and reduce speech to 5GB/s. Total: 5+0.33+0+3+76.9=85.2GB/s.
    Still over! Reduce speech to 0: 80.2GB/s. Still over. LLM must run alone: 76.9+3+0.33=80.2GB/s > 77.
    At ρ=0.94: accept 5% latency inflation. Practical: LPDDR5X at 77GB/s peak, typical ~65GB/s sustainable.
    LLM: 76.9×efficiency factor 0.84=64.6GB/s effective needed. TPOT: 1.5/65=23ms.'
  common_mistake: Listing bandwidth requirements without checking if their sum exceeds 77 GB/s and without
    designing the actual scheduling policy.
  napkin_math: 'LLM peak: 76.9GB/s. Speech: 10GB/s. YOLO: 0.33GB/s. Depth: 0.6GB/s. System: 3GB/s. LLM+all:
    90.8GB/s > 77GB/s. Priority: LLM=1, Speech=2, YOLO=3, Depth=4. LLM active (19.5ms): suspend depth
    (0.6), reduce YOLO to 15fps (0.165). Total: 76.9+10+0.165+3=90.07GB/s still >77. Suspend YOLO: 76.9+10+3=89.9GB/s.
    Still >77. LLM must reduce to INT8 (3GB, 38.9GB/s): total 38.9+10+0.33+0.6+3=52.8GB/s ✓. Or batch
    LLM to 2 tokens: BW=77.8GB/s for 2 tokens/39ms → same effective TPOT but slightly less BW per ms?
    No, same. Only reducing model size helps.'
