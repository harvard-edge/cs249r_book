id: mobile-cell-11081
title: 'Fault Tolerance: Mastery — Mobile Personalization Reliability Architecture'
topic: fault-tolerance-checkpointing
status: published
provenance: imported
scenario: You are the reliability lead for a mobile keyboard app with 100M users on A17 Pro and Snapdragon
  8 Gen 3. The app runs nightly on-device LoRA personalization (10-minute training window). Users report
  losing their personalization after phone updates, crashes, and app reinstalls. Design a complete fault
  tolerance architecture that preserves personalization state across all these events.
details:
  realistic_solution: The NRE for on-device ML integration (model optimization, testing) is typically
    $20K–$100K, not millions. Cloud inference costs dominate at scale.
  common_mistake: Storing all personalization state in app-private storage that is wiped on reinstall;
    not designing backup strategy that preserves privacy.
  napkin_math: 'Cloud cost: 100M users × 50 inferences/day × 365 days × $0.001/1K tokens × 512 tokens
    = $0.001/1K × 512/1K × 100M × 50 × 365 = $0.000512 × 100M × 50 × 365 = $937M/year. But at $0.001/1K
    and 512 tokens per inference: $0.000512/inference. 100M × 50/day × 365 = 1.825T inferences/year ×
    $0.000512 = $934M/year. On-device NRE: $20,000 (not $20M) amortized over 100M users = $0.0002/user.'
