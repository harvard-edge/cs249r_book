id: mobile-0185
title: The Two-Billion Dollar Keystroke
topic: federated-learning
status: published
provenance: imported
scenario: 'A product manager at a major mobile OS company asks you to evaluate the cost of building a
  next-generation keyboard prediction model. They project 100 million users. The ML team proposes two
  paths:'
details:
  realistic_solution: The single most important factor is the catastrophic financial and legal liability
    of a data breach. Centralizing keystroke data from 100 million users creates a massive security target.
    A breach could easily lead to regulatory fines (like GDPR) and class-action lawsuits that dwarf the
    direct engineering costs, making the higher upfront cost of FL a form of insurance.
  common_mistake: Engineers often myopically focus on direct engineering costs (servers, network, salaries)
    or secondary technical benefits like bandwidth savings. They fail to quantify the overwhelming financial
    and reputational cost of the *risk* associated with centralizing sensitive user data, which is the
    primary driver for using technologies like Federated Learning.
  napkin_math: "Let's model the cost of a data breach:\n\n1. **Data at risk:** 100M users × ~50 KB keystrokes/day\
    \ × 365 days = ~1.8 PB/year of highly sensitive text data (passwords, messages, financial info)\n\n\
    2. **Breach cost (IBM Cost of Data Breach Report 2024):**\n   - Average cost per breached record:\
    \ ~$165\n   - If 10% of users affected (10M records): 10M × $165 = **$1.65 billion**\n   - If 100%\
    \ affected: **$16.5 billion**\n\n3. **Regulatory fines:**\n   - GDPR: up to 4% of global annual revenue.\
    \ For a major tech company ($200B revenue): up to **$8 billion**\n   - Additional: class-action settlements,\
    \ credit monitoring costs (~$5–25 per affected user)\n\n4. **Federated Learning cost:**\n   - On-device\
    \ training overhead: ~10% battery impact during idle charging\n   - Server aggregation infrastructure:\
    \ ~$2M/year for secure aggregation servers\n   - Engineering team: ~$5M/year (10 specialized engineers)\n\
    \   - Total FL cost: **~$7M/year**\n\n5. **Risk-adjusted comparison:**\n   - Centralized: $7M/year\
    \ ops + (probability of breach × $1.65B) = $7M + ~$16.5M/year (assuming 1% annual breach probability)\
    \ = **$23.5M/year expected cost**\n   - Federated: $7M/year with near-zero breach liability (no centralized\
    \ sensitive data to steal)\n   - The FL approach is essentially an insurance policy that pays for\
    \ itself."
