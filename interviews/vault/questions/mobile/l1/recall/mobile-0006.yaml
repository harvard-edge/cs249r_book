title: The OTA Bandwidth Bottleneck
topic: model-format-conversion
status: published
provenance: imported
scenario: You're a Staff Engineer on an automotive OS team. You need to design the Over-the-Air (OTA)
  update strategy for a new 500 MB perception model being deployed to the vehicle fleet. Which of the
  following is the most critical *physical constraint* to consider for the update delivery mechanism?
details:
  realistic_solution: The primary constraint is the unreliable and often low-bandwidth cellular connection.
    While storage space and CPU are factors, the sheer time and potential for failure during the download
    of a large file over a mobile network is the most pressing issue. A stable, multi-minute download
    is not guaranteed in a moving vehicle, making robust delta-updating, compression, and pause/resume
    logic absolutely critical.
  common_mistake: Engineers often underestimate the 'last mile' problem in mobile and automotive deployments.
    They might focus on server-side scalability or on-device compute for installation, but for large models,
    the bottleneck is almost always the physical transmission of bits over unreliable, low-bandwidth wireless
    networks. A 500 MB download can easily fail or take an impractically long time on a typical cellular
    connection.
  napkin_math: Let's quantify the best-case download time.
