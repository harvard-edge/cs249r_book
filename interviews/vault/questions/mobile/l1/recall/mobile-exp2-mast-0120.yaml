id: mobile-exp2-mast-0120
title: Heterogeneous Scheduling for Multimodal Pipeline
topic: operator-scheduling
status: published
provenance: imported
scenario: You are tasked with deploying a real-time multimodal assistant on the Apple A17 Pro. The pipeline
  consists of a streaming audio encoder, a lightweight vision transformer, and a 3B-parameter 4-bit quantized
  LLM. The system must run continuously within a ~5W thermal envelope while sharing 8 GB of unified memory
  across the 16-core Neural Engine, 6-core GPU, and CPU. Design a novel operator scheduling framework
  that dynamically partitions and schedules execution across these heterogeneous compute units, fusing
  layers where appropriate to maximize the Neural Engine's 35 TOPS without thrashing the shared memory
  bandwidth.
details:
  realistic_solution: The optimal solution involves a dynamic, memory-aware scheduling graph. First, apply
    aggressive vertical and horizontal layer fusion (e.g., fusing QKV projections with attention operations)
    specifically targeted for the 16-core Neural Engine to keep intermediate activations in local SRAM.
    Second, implement a pipelined execution model where the CPU orchestrates sequence management, the
    GPU handles dynamic shape non-linearities, and the Neural Engine processes dense matrix math, using
    zero-copy buffers in the 8 GB unified memory to simply pass pointers rather than copying data between
    domains.
  common_mistake: Candidates often default to a static layer-by-layer offloading strategy (e.g., sending
    all MatMuls to the NPU and unsupported ops to the CPU/GPU). They fail to account for the unified memory
    architecture, missing opportunities for zero-copy layer fusion or pipelined execution across heterogeneous
    cores, leading to severe memory bandwidth bottlenecks and thermal throttling before ever reaching
    the compute limits.
  napkin_math: A 3B parameter model at 4-bit quantization requires ~1.5 GB for weights. Generating at
    20 tokens/sec requires reading the full weights 20 times per second, demanding 30 GB/s of memory bandwidth.
    In terms of compute, 3B params * 2 MACs * 20 tok/s = 120 GOPS, which is trivial for the A17 Pro's
    35 TOPS (35,000 GOPS) capability. The bottleneck is strictly bandwidth. Without layer fusion, a single
    intermediate activation of 10 MB written to and read from DRAM adds 10 MB * 2 (read+write) * 20 tok/s
    = 400 MB/s of bandwidth pressure. Scheduling operator fusion for 10 such layers saves 4 GB/s, critically
    preserving the shared memory bus and keeping the SoC within its ~5W power budget.
