id: mobile-0641
title: Building a Hardware-Adaptive Inference Engine
topic: graph-compilation
status: published
provenance: imported
scenario: 'You''re building a mobile ML inference engine that must run the same model optimally across:
  Apple A18 Pro (ANE + GPU + CPU), Qualcomm Snapdragon 8 Elite (Hexagon NPU + Adreno GPU + Kryo CPU),
  MediaTek Dimensity 9300 (APU + Mali GPU + Cortex CPU), Samsung Exynos 2400 (NPU + Xclipse GPU + CPU),
  and Google Tensor G4 (TPU + Mali GPU + CPU). Each SoC has different operator support, memory hierarchies,
  and optimal data layouts. Current approaches (TFLite, Core ML) are platform-specific. Design a cross-platform
  inference engine that automatically adapts to each SoC''s strengths without maintaining 5 separate model
  variants.'
details:
  realistic_solution: 'Design a two-phase system: (1) Ahead-of-time: compile the model into a portable
    IR (like MLIR/TensorIR) that preserves the full operator graph. (2) On-device at first launch: run
    a device-specific compiler that profiles the SoC, builds operator fusion plans, selects optimal data
    layouts (NHWC vs NCHW vs tiled), and partitions across NPU/GPU/CPU based on a per-op latency LUT.
    Cache the compiled plan (~5ms reload on subsequent launches). This achieves within 12-15% of hand-tuned
    platform-specific performance while shipping a single model artifact, saving 60 MB vs 5 separate binaries.'
  common_mistake: '"Use ONNX Runtime — it''s cross-platform." ONNX Runtime provides portability but not
    *optimality*. It uses a single execution plan across all devices, missing SoC-specific optimizations
    that can provide 2-5× speedups. You need portability AND per-SoC optimization.'
  napkin_math: 'Model IR size: 15 MB (vs 5 separate optimized models at 15 MB each = 75 MB). Savings:
    60 MB. Compilation time: 50 ms (graph partitioning) + 200 ms (operator fusion) + 100 ms (memory planning)
    = 350 ms. Cached: subsequent launches load compiled model in 5 ms. Latency comparison for a 100-layer
    vision model: ONNX Runtime (generic): 25 ms on Snapdragon 8 Elite. Platform-specific TFLite with Hexagon
    delegate: 12 ms. This engine (auto-optimized): 14 ms (within 15% of hand-tuned). Across 5 SoCs: average
    18% faster than ONNX Runtime, within 12% of platform-specific hand-tuning. Engineering cost: 1 engine
    vs 5 platform-specific pipelines.'
