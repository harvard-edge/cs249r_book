schema_version: 1
id: mobile-0057
title: The Jank Budget
topic: real-time-deadlines
status: draft
provenance: imported
scenario: A new on-device recommendation model runs on the app's main UI thread. During testing, you notice
  the scrolling animation stutters every time the model runs. To maintain a perfectly smooth 60 frames-per-second
  experience, what is the maximum time budget you have for all work (rendering + model inference) within
  a single frame?
details:
  realistic_solution: To maintain a 60 FPS refresh rate, the total work for each frame must complete in
    under 16.67 milliseconds. If inference and rendering exceed this budget, the frame is dropped, leading
    to visible stuttering or 'jank'. This is why any non-trivial ML inference must be moved off the main
    UI thread.
  common_mistake: Engineers often confuse the frame budget with general latency targets. They might think
    100ms is 'fast enough' for a user, but for smooth animation, the budget is far stricter. Others might
    confuse the jank budget with the much longer ANR (Application Not Responding) timeout.
  napkin_math: 'Target frame rate: 60 FPS. Time per frame = 1000ms / 60 = 16.67ms. OS overhead + UI rendering
    takes ~6ms. Remaining budget for ML model on main thread = 16.67ms - 6ms = 10.67ms. If the model takes
    12ms, total time is 18ms > 16.67ms, causing the OS to drop a frame and stutter. Model must be moved
    to a background thread.'
