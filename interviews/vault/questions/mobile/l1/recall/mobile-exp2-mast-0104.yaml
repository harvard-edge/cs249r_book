schema_version: 1
id: mobile-exp2-mast-0104
title: Sub-3-bit LLM Deployment on Exynos NPU
topic: extreme-quantization
status: published
provenance: imported
scenario: You are leading the deployment of an 8B parameter generative assistant on the Samsung Exynos
  2400. The system features a dual-core NPU with 34.7 TOPS, but its 12 GB of LPDDR5X RAM is shared with
  the CPU, GPU, and ISP. During heavy camera usage, concurrent subsystems reserve 8.5 GB, leaving only
  3.5 GB for your model and KV cache. You must design an extreme quantization architecture utilizing sub-4-bit
  techniques to fit this constrained budget while maintaining fluency.
details:
  realistic_solution: The candidate should design a mixed-precision architecture where sensitive layers
    remain in 4-bit, while most MLP layers are aggressively pushed to 2-bit or 2.5-bit using techniques
    like QuIP or AQLM. Since the NPU likely accelerates INT4/INT8 natively, they must propose an on-the-fly
    weight unpacking kernel in the NPU's SRAM. To fit the 3.5 GB budget, 8B params must average 3 bits/param
    to leave 500 MB for the KV cache.
  common_mistake: Candidates often propose uniform 4-bit AWQ or GPTQ, which would consume ~4 GB for weights
    alone, overflowing the 3.5 GB budget before even accounting for context. They also frequently assume
    the NPU natively supports 2-bit MACs without unpacking, or fail to account for the shared memory bandwidth
    contention with the ISP.
  napkin_math: 'Available Memory = 12 GB Total - 8.5 GB (OS/ISP/GPU) = 3.5 GB. Weight budget = 3.5 GB
    - 0.5 GB (KV Cache/Activations) = 3.0 GB. Target bit-width = (3.0 GB * 8 bits/byte) / 8B params =
    3.0 bits/param average. Assuming 20 tokens/sec decoding: Bandwidth needed = 3.0 GB/token * 20 tok/sec
    = 60 GB/s (nearing the practical limit of mobile LPDDR5X). Compute required = 8B params * 2 MACs/param
    * 20 tok/sec = 320 GOPS. 320 GOPS / 34,700 GOPS (34.7 TOPS NPU) = ~0.9% utilization, demonstrating
    that extreme quantization on the Exynos 2400 shifts the bottleneck entirely from compute to shared
    memory bandwidth.'
