schema_version: 1
id: mobile-0739
title: CoreML vs PyTorch
topic: graph-compilation
status: published
provenance: imported
scenario: If you train a model in PyTorch, can you deploy the raw `.pt` or `.pth` file directly into a
  native iOS Swift application?
details:
  realistic_solution: No. The raw PyTorch model must be converted into Apple's proprietary CoreML format
    (`.mlpackage` or `.mlmodel`) so that the iOS operating system can automatically route the operations
    to the Neural Engine, GPU, or CPU.
  common_mistake: Thinking iOS natively supports PyTorch or that you just need to install a PyTorch pip
    package on the iPhone.
  napkin_math: '- A MobileNetV2 (3.4M params) in PyTorch FP32: 3.4M x 4 bytes = **13.6 MB** | - CoreML
    auto-converts to FP16 during export: 3.4M x 2 bytes = **6.8 MB** (2x smaller) | - CoreML compiler
    then fuses ops (Conv+BN+ReLU) and maps to Neural Engine instructions | - => Same model goes from 13.6
    MB generic weights to a 6.8 MB hardware-optimized package that runs on the A17 Pro''s 35 TOPS Neural
    Engine instead of the CPU'
