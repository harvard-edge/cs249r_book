id: mobile-0136
title: The NPU Energy Advantage
topic: roofline-analysis
status: published
provenance: imported
scenario: You are profiling a new computer vision model on a smartphone and need to decide where to run
  the core `conv2d` layers to maximize battery life. Which of the following processor types on a standard
  mobile SoC (System on a Chip) is the most **energy-efficient** choice for these operations?
details:
  realistic_solution: The NPU (Neural Processing Unit) is the correct choice. NPUs contain specialized
    silicon (e.g., systolic arrays or MAC engine farms) optimized for the parallel, low-precision integer
    arithmetic that dominates neural network inference. This hardware specialization allows them to execute
    operations like INT8 convolutions using significantly less power than a general-purpose CPU or a graphics-focused
    GPU. This is the foundation of heterogeneous compute on mobile.
  common_mistake: Engineers often fixate on latency and assume the fastest processor (often the GPU) is
    always the best choice for acceleration. They forget that for mobile, battery life is paramount. Another
    common mistake is underestimating the massive energy cost of running sustained ML workloads on a general-purpose
    CPU, which is not designed for the specific arithmetic of neural networks.
  napkin_math: The physical basis for this is the energy cost per operation. A 32-bit floating-point (FP32)
    operation on a CPU core consumes about **18 times more energy** than an 8-bit integer (INT8) operation
    on specialized NPU hardware. For a model performing billions of multiply-accumulate operations per
    inference, this 18x factor is the difference between a feature that is usable versus one that drains
    the user's battery in minutes.
