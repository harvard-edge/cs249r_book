id: mobile-0339
title: 'The UI Jank Budget: Real-Time Deadlines'
topic: real-time-deadlines
status: published
provenance: imported
scenario: You're optimizing an on-device generative AI model for a new mobile app. To ensure a smooth
  user experience without causing UI 'jank', what is the maximum latency budget your model's inference
  can consume per frame on a typical 60Hz smartphone display?
details:
  realistic_solution: The maximum latency is approximately 16ms. A 60Hz display refreshes 60 times per
    second, giving a total budget of 1000ms / 60 ≈ 16.7ms for all rendering work in a single frame. To
    avoid jank, the ML inference must complete well within this window to leave time for other UI and
    system tasks. This is a fundamental constraint for any real-time interactive model on mobile.
  common_mistake: Engineers often misjudge the stringency of mobile UI deadlines. Coming from a cloud
    background, they might assume a 100ms budget is acceptable, which is the standard for web service
    P99 latency. However, on mobile, anything significantly over the frame rendering interval will cause
    noticeable stuttering and a poor user experience. Another common error is confusing the 33ms budget
    for hard real-time edge devices (like a robot) with the much tighter budget for a fluid mobile UI.
  napkin_math: Frame Budget = 1000 milliseconds / 60 frames_per_second ≈ 16.7 ms/frame. This is the entire
    budget for the CPU, GPU, and NPU to render a frame. Your model gets only a fraction of this.
