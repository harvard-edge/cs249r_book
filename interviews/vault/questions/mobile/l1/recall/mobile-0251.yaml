id: mobile-0251
title: The Jank Budget (mobile-0251)
topic: real-time-deadlines
status: draft
provenance: imported
scenario: You're an ML systems engineer working on a new real-time camera filter for a flagship social
  media app. The filter applies a style transfer model on every frame of the video stream. To ensure a
  perfectly smooth, 'buttery' user experience on a standard 60Hz display, what is the strict, per-frame
  latency budget you must hit for your model's inference?
details:
  realistic_solution: To maintain 60 frames per second (FPS), each frame must be rendered in under 1/60th
    of a second, which is approximately 16.7 milliseconds. Exceeding this budget means you 'drop a frame,'
    causing perceptible stutter or 'jank' in the user interface. This number is a fundamental constraint
    for any real-time graphics or UI work on mobile.
  common_mistake: Engineers often confuse the mobile UI deadline with other system latencies. They might
    recall the ~100ms budget for interactive web services (far too slow), or the ~33ms deadline for 30
    FPS video (not smooth enough for premium UI). The key is tying the requirement directly to the physics
    of the display hardware.
  napkin_math: Budget = 1000 milliseconds / 60 frames per second ≈ 16.7 ms/frame. This is a hard deadline
    dictated by the display's refresh rate.
