id: mobile-0329
title: The Energy Cost of Privacy
topic: differential-privacy
status: published
provenance: imported
scenario: Your team is building a driver assistance feature for a popular automotive app. The feature
  requires training on user driving data (GPS traces, accelerometer readings). To protect user privacy
  and minimize battery drain, you're considering using Federated Learning. What is the fundamental physical
  reason why sending small, trained model updates from the device is often more energy-efficient than
  uploading the raw user data to a central server?
details:
  realistic_solution: The fundamental reason is that data transmission over a wireless radio is vastly
    more energy-intensive per byte than on-chip computation. The energy required to power the radio amplifier
    and send data to a cell tower dwarfs the energy used by the highly-optimized neural engine to perform
    training computations on that same data. Therefore, it's more efficient to process the data locally
    and send only the resulting small model update (e.g., a few megabytes of gradients) instead of the
    raw source data (potentially gigabytes).
  common_mistake: Engineers often underestimate the power consumption of the cellular or Wi-Fi radio compared
    to the SoC's compute cores. They might assume that a 'quick' upload is cheap, but modern compute is
    so efficient that sending data off-device is almost always one of the most energy-expensive operations.
  napkin_math: '1. Centralized Upload: LTE upload energy is ~20 mJ/MB. 100MB * 20 mJ = 2 Joules. 2. Federated
    Learning (On-Device): Training a 50M parameter model on 100MB data (~10k samples) takes ~10 GFLOPs.
    Mobile SoC consumes ~4W at 1 TFLOPS (4 pJ/FLOP). 10 GFLOPs * 4 pJ = 0.04 Joules. Total FL energy =
    0.04 J compute + small gradient upload. Local training actually saves energy compared to raw LTE upload.'
