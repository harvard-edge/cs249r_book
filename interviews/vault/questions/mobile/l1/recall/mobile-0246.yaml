id: mobile-0246
title: The Battery Cost of Privacy
topic: federated-learning
status: published
provenance: imported
scenario: You're scoping a new federated learning feature for a voice assistant in a car's companion mobile
  app. The product manager is concerned that running background training will drain users' batteries and
  lead to uninstalls. To begin a cost-benefit analysis, you need to establish the basic power budget.
  What is the approximate power consumption of a modern smartphone's System-on-a-Chip (SoC) when it's
  actively running an ML workload?
details:
  realistic_solution: A modern smartphone SoC, like an Apple A17 Pro or Snapdragon 8 Gen 3, consumes approximately
    3 to 5 Watts during an active, sustained ML task. This is the fundamental 'power cost' that must be
    used to calculate the energy drain (in watt-hours) for the feature and weigh it against user experience
    budgets.
  common_mistake: Engineers often misjudge the power scale of mobile SoCs, confusing them with either
    much smaller TinyML microcontrollers (milliwatts) or larger edge devices (tens of watts). Applying
    the wrong power scale by one or two orders of magnitude will completely invalidate any economic or
    user experience analysis for a feature like federated learning.
  napkin_math: According to the 'Numbers Every ML Systems Engineer Should Know' reference, the 'Mobile'
    hardware snapshot specifies that the 'Total SoC Active' power draw is 3W – 5W. This is a direct recall
    of the approximate power budget for the target hardware platform.
