id: mobile-0169
title: The Depthwise Dividend
topic: transformer-systems-cost
status: draft
provenance: imported
scenario: You're a mobile ML engineer optimizing a real-time video filter. The main bottleneck is a standard
  3x3 convolutional layer. Your colleague suggests replacing it with a 3x3 depthwise separable convolution.
  What is the approximate reduction in computational cost (FLOPs) for that single layer?
details:
  realistic_solution: 'A depthwise separable convolution replaces a single, expensive standard convolution
    with two cheaper layers: a depthwise convolution (one filter per input channel) and a pointwise convolution
    (a 1x1 convolution to combine the outputs). The computational savings are typically around 8-9x for
    a 3x3 kernel.'
  common_mistake: Engineers often confuse the reduction in parameters with the reduction in computation.
    While related, they are not the same. Another common mistake is to only consider the depthwise part
    of the operation and forget to add the cost of the subsequent 1x1 pointwise convolution, leading to
    a wild overestimation of the savings.
  napkin_math: The computational cost of a standard convolution is proportional to K^2 * C_in * C_out.
    A depthwise separable convolution splits this into depthwise (K^2 * C_in) and pointwise (C_in * C_out).
    The reduction ratio is (K^2 * C_in + C_in * C_out) / (K^2 * C_in * C_out) = 1/C_out + 1/K^2. For a
    3x3 kernel, it's roughly 1/9.
