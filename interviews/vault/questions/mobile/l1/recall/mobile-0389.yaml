id: mobile-0389
title: The Federated Learning Energy Tax
topic: federated-learning
status: published
provenance: imported
scenario: Your team is building a new keyboard prediction model for your mobile app. One option is to
  use Federated Learning (FL) to train on user devices to improve privacy. From a *device energy consumption*
  perspective, which single operation do you expect to be more expensive for the end-user's battery life?
details:
  realistic_solution: Performing one local training round is vastly more expensive in terms of energy.
    This cost is dominated by repeatedly reading and writing the model's weights, activations, and gradients
    to and from the device's main DRAM. Accessing off-chip DRAM is hundreds of times more energy-intensive
    per byte than on-chip computation or L1 cache access. Sending a small text sample is a brief, comparatively
    low-energy network event.
  common_mistake: Engineers often underestimate the massive energy cost of data movement (memory access)
    compared to either network transmission or pure computation. They might incorrectly assume that sending
    data over a cellular radio is the most power-intensive part of the equation, or that FLOPs are the
    only driver of training energy cost, ignoring the physics of data movement.
  napkin_math: Sending a 1KB text sample is a single, low-energy network event. In contrast, a single
    local training step on even a small 2MB mobile model requires moving many megabytes of data (weights
    read, gradients written, optimizer state read/written) to and from DRAM. Based on the invariant that
    DRAM access is ~580x more energy-intensive than computation, the total energy for the massive data
    movement of training dwarfs the energy for sending the raw data. The 'tax' for the privacy of FL is
    paid directly from the user's battery.
