schema_version: 1
id: mobile-0146
title: The Cellular Download Budget
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: Your team is deploying a new on-device personalization model. To ensure it can be delivered
  to users who aren't on Wi-Fi, you need to respect the platform's 'download over cellular' size limit.
  State the approximate size limit you must design your model delivery system around for major mobile
  app stores.
details:
  realistic_solution: Most major app stores, including Apple's, impose a cellular download limit of approximately
    200 MB. Any on-demand resource, including an ML model, larger than this will fail to download unless
    the user is on Wi-Fi. This is a hard constraint that forces mobile ML teams to aggressively quantize
    models, design for delta updates, and carefully manage their delivery pipeline.
  common_mistake: Engineers without mobile-specific experience often assume download sizes are only limited
    by the user's data plan or device storage. They forget that app stores impose a strict budget for
    cellular downloads to protect users from unexpected data charges. Another common error is confusing
    this cellular limit with the much larger multi-gigabyte limit for the initial app install over Wi-Fi.
  napkin_math: A 7-billion parameter language model, stored in FP16, requires 14 GB of storage (`7B params
    × 2 bytes/param`). This is **70 times larger** than the ~200 MB cellular download limit (`14,000 MB
    / 200 MB`), quantitatively demonstrating why server-class models cannot be directly deployed to mobile
    devices over the air.
