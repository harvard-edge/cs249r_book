id: mobile-0359
title: The Jank Budget (mobile-0359)
topic: real-time-deadlines
status: draft
provenance: imported
scenario: You're optimizing an on-device generative AI feature for a smartphone, like real-time translation
  overlays. To ensure a smooth, 'jank-free' user experience on a standard 60 FPS display, what is the
  maximum time budget your model has to generate and render each new token before the user perceives a
  stutter?
details:
  realistic_solution: The maximum time budget is approximately 16ms. A 60 FPS (Frames Per Second) display
    refreshes its screen 60 times every second. This gives each frame a strict budget of 1000ms / 60 ≈
    16.67ms. If the AI model's token generation and rendering takes longer than this, it will miss the
    frame deadline, causing the UI to freeze momentarily.
  common_mistake: Engineers often misapply latency targets from other domains. They might think of the
    ~100ms budget for a cloud service or the 33ms hard real-time deadline for an edge device. However,
    mobile UI performance is dictated by the screen's refresh rate. Any task that blocks the main thread
    for longer than one frame will cause a perceptible stutter or 'jank'.
  napkin_math: '`1000 ms / 60 FPS = 16.67 ms per frame.` This is the fundamental calculation for UI performance
    on standard mobile displays.'
