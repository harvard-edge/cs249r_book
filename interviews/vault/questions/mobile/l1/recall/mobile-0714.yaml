title: The INT4 Accuracy Cliff
topic: quantization-fundamentals
status: published
provenance: imported
scenario: Your team wants to push the envelope on model size and latency, aiming for INT4 quantization
  for a critical on-device generative AI model. What are the significant technical challenges you anticipate
  with INT4 quantization compared to INT8, both in terms of hardware support and accuracy preservation,
  and how would you mitigate them?
details:
  realistic_solution: 'INT4 quantization introduces significantly more acute challenges than INT8, pushing
    the limits of current hardware and software techniques:'
  common_mistake: '"It''s just halving the bit-width; calibration will fix it." This vastly oversimplifies
    the severe challenges introduced by INT4.'
  napkin_math: An INT8 tensor has a quantization step size of `(max - min) / 255`. An INT4 tensor has
    `(max - min) / 15`. For the same dynamic range, the INT4 step size is ~17x larger. The quantization
    noise is proportional to the square of the step size, meaning INT4 noise can be ~289x higher than
    INT8 for the same range, if not managed carefully.
