id: mobile-0140
title: The 16ms Jank Budget
topic: real-time-deadlines
status: published
provenance: imported
scenario: Your team is debugging a new on-device feature that causes the app's scrolling to feel sluggish.
  To ensure a smooth 60 frames-per-second user experience, what is the total latency budget you have to
  render a single frame before the user perceives 'jank'?
details:
  realistic_solution: The total budget for one frame at 60 FPS is approximately 16 milliseconds. If the
    combination of OS overhead, app logic, and model inference exceeds this budget, the system will drop
    a frame, leading to visible stutter or 'jank'.
  common_mistake: Engineers often confuse the UI frame budget with other system latency targets. They
    might recall the 33ms budget for a 30 FPS video feed (common on edge devices) or the much larger ~100ms
    P99 latency common in cloud services. Others simply don't have this fundamental number memorized.
  napkin_math: The calculation is a direct conversion from frames-per-second to milliseconds-per-frame.
