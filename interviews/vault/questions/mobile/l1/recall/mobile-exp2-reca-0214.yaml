schema_version: 1
id: mobile-exp2-reca-0214
title: Exynos 2400 Unified Memory Capacity Recall
topic: memory-pressure-management
status: published
provenance: imported
scenario: You are preparing a deployment specification for a generative AI application targeting the Samsung
  Exynos 2400 NPU. To accurately estimate the out-of-memory (OOM) threshold, you need to document the
  hardware's baseline memory architecture. What is the total shared LPDDR5X memory capacity available
  on the Samsung Exynos 2400 that the dual-core NPU must share with the CPU, GPU, and ISP?
details:
  realistic_solution: The correct recall is that the Samsung Exynos 2400 features 12 GB of LPDDR5X unified
    memory. Because the NPU shares this capacity with all other subsystems, the actual memory available
    for model weights and activation buffers is heavily constrained by the active OS state.
  common_mistake: Candidates often assume mobile NPUs have dedicated VRAM like discrete desktop GPUs.
    They fail to recall that mobile SoCs like the Exynos 2400 use a unified memory architecture where
    the NPU strictly competes with the CPU, GPU, and ISP for the exact same memory pool.
  napkin_math: Total shared capacity = 12 GB LPDDR5X. If Android OS reserves 4.5 GB and the camera ISP
    requires 1.5 GB for active streams, the absolute maximum remaining pool is 12 GB - (4.5 GB + 1.5 GB)
    = 6.0 GB. Attempting to load a 4 GB model leaves only 2 GB for CPU processes and NPU activations before
    OS-level OOM eviction occurs.
