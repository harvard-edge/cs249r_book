id: mobile-0139
title: The On-Device LLM Memory Wall
topic: latency-decomposition
status: draft
provenance: imported
scenario: Your product manager wants to run a 2 Billion parameter Large Language Model on a new flagship
  smartphone for a real-time generative AI feature. Using FP16 precision for inference, identify if simply
  loading the model's weights into memory is feasible within the typical constraints of a mobile application.
details:
  realistic_solution: It is not feasible. A 2 Billion parameter model at FP16 requires 4 GB of RAM just
    for the weights. A high-end smartphone with 12 GB of total RAM typically allocates only about 3 GB
    of that to a single application. The model's memory footprint exceeds the application's entire memory
    budget before even accounting for activations or the app's own runtime memory.
  common_mistake: Engineers often compare the model's weight size directly against the phone's total advertised
    RAM (e.g., 8-12 GB) and incorrectly conclude it fits. This ignores the crucial fact that the mobile
    OS reserves most of the RAM for itself and other apps, granting only a small fraction (e.g., 25%)
    as a hard memory budget to any single application.
  napkin_math: 1. **Calculate Model Memory:** 2 Billion parameters × 2 bytes/parameter (FP16) = 4,000,000,000
    bytes = 4 GB.
