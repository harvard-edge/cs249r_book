id: mobile-fill-01357
title: Functional Safety Design for ADAS on Snapdragon 8 Gen 3 Hexagon NPU
topic: safety-certification
status: published
provenance: imported
scenario: Your team is developing an ADAS (Advanced Driver-Assistance System) feature, specifically an
  intelligent emergency braking system, that runs a critical deep learning model on the Snapdragon 8 Gen
  3 Hexagon NPU (45 TOPS INT8, 16 GB LPDDR5X). This system must comply with ISO 26262 ASIL-B requirements.
  Describe how you would design and implement the software architecture on the NPU to achieve the required
  functional safety level, focusing on aspects like deterministic execution, error detection, and mitigation
  strategies.
details:
  realistic_solution: 'A robust solution would involve: 1. **Safety Concept & Partitioning:** Define a
    clear safety concept compliant with ISO 26262, explicitly partitioning safety-critical (ASIL-B) and
    non-safety-critical software components. 2. **Deterministic Execution:** Employ fixed-point arithmetic,
    pre-allocated memory buffers, and avoid dynamic memory allocation during runtime on the NPU. Implement
    rigorous NPU task scheduling and prioritization mechanisms to minimize inference time jitter and ensure
    predictable execution cycles. 3. **Error Detection & Diagnostics:** Integrate NPU-specific watchdog
    timers (both internal and external), memory ECC (if supported by LPDDR5X controllers), and runtime
    plausibility checks on NPU outputs. Leverage the Hexagon NPU''s diagnostic capabilities, including
    built-in self-tests (BIST) for memory and arithmetic units, performed at startup and periodically.
    4. **Fault Mitigation:** Design for redundancy (e.g., diverse redundant NPU inference paths, software
    redundancy for critical computations) and voting mechanisms. Implement fail-operational or fail-safe
    states to transition the system to a safe condition upon error detection. 5. **Traceability & Verification:**
    Maintain full traceability from safety requirements to implementation and verification activities,
    including extensive testing (e.g., fault injection testing) to validate safety mechanisms and achieve
    ISO 26262 Part 6 compliance.'
  common_mistake: Candidates often overlook the specifics of embedded/NPU environments, suggesting generic
    software safety practices without addressing hardware-specific mechanisms, the challenges of achieving
    deterministic execution with neural network inference on an accelerator, or the impact of NPU resource
    management on safety. They might also neglect explicit ISO 26262 phases or documentation.
  napkin_math: If the emergency braking model requires a safety-critical response within 50ms from sensor
    input to actuator command, and NPU inference itself consumes 10ms of this budget (including data transfer
    to/from the 16 GB LPDDR5X), what is the maximum allowable latency variance (jitter) for NPU execution
    to guarantee the safety response time, and how would the 45 TOPS INT8 performance contribute to analyzing
    this determinism under varying inference loads and data sizes?
