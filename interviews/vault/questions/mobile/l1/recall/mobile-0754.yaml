id: mobile-0754
title: The INT4 Quantization Payoff
topic: graph-compilation
status: published
provenance: imported
scenario: Your team wants to deploy a 3B parameter language model on a phone with 8GB unified memory.
  The INT8 version is 3 GB. A colleague proposes INT4 quantization to free memory for the KV cache. How
  much memory does the INT4 model save, and what is the primary risk?
details:
  realistic_solution: 'INT4 halves the weight memory: 3B x 0.5 bytes = 1.5 GB, saving 1.5 GB compared
    to INT8. This freed memory can hold a KV cache of ~1,500 tokens at FP16 for a 7B-class model. The
    risk is accuracy loss, especially in embedding and attention output layers.'
  common_mistake: Assuming INT4 is always a free win. The 1.5 GB savings is real, but INT4 quantization
    can cause significant accuracy degradation on tasks requiring precise numerical reasoning, and not
    all layers quantize equally well.
  napkin_math: 'INT8: 3B x 1 byte = 3.0 GB. INT4: 3B x 0.5 bytes = 1.5 GB. Savings = 1.5 GB. Fits in 8
    GB with room for KV cache + OS.'
