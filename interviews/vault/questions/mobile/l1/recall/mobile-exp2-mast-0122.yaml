schema_version: 1
id: mobile-exp2-mast-0122
title: Heterogeneous Pipeline Profiling on Snapdragon 8 Gen 3
topic: profiling-bottleneck-analysis
status: published
provenance: imported
scenario: You are leading the deployment of a real-time AR video understanding pipeline on a Qualcomm
  Hexagon NPU (Snapdragon 8 Gen 3). The system captures frames, runs an INT8 vision transformer on the
  NPU, and processes embeddings on the CPU. Despite the NPU's 45 TOPS capacity, the pipeline's end-to-end
  latency is 48ms per frame, missing the 33ms (30 FPS) target by exactly 15ms. Design a comprehensive
  profiling methodology to isolate the bottleneck across the heterogeneous CPU, GPU, and NPU components,
  and synthesize a novel hardware-aware architecture to eliminate the 15ms overhead.
details:
  realistic_solution: A mastery-level engineer would employ Snapdragon Profiler and Hexagon DSP hardware
    counters to generate trace timelines correlating CPU context switches with NPU execution stalls. They
    would discover that the model graph is heavily partitioned, causing frequent CPU fallbacks. The solution
    requires designing a novel architecture that fuses operations into a single NPU graph, utilizing AHardwareBuffer
    (ION/dmabuf) for zero-copy input/output sharing to keep activations purely within the NPU's tightly
    coupled memory (TCM) and avoid the shared memory bus.
  common_mistake: Candidates often assume the NPU's 45 TOPS is fully utilized and focus on optimizing
    matrix multiplications or reducing the model's parameter count. They frequently ignore the hidden
    costs of data movement between the CPU and NPU over the shared 12-16 GB LPDDR5X memory, or the kernel-level
    synchronization overheads when splitting execution graphs across heterogeneous processors.
  napkin_math: Assuming a 1080p frame (1920x1080x3 bytes = ~6.2MB) and an INT8 vision model requiring
    20 GOPS. NPU compute time is (20 GOPS / 45 TOPS) = ~0.44ms. However, if the model is partitioned into
    5 NPU subgraphs with CPU fallbacks, the system must synchronize and copy 6.2MB of intermediate activations
    5 times over the shared LPDDR5X bus. At 40 GB/s effective bandwidth under contention, transferring
    31MB takes (31MB / 40 GB/s) = ~0.8ms. The real bottleneck is the OS context switching and Hexagon
    RPC overhead, which takes ~3ms per invocation. 5 subgraph invocations * 3ms = 15ms, perfectly explaining
    the latency miss and proving the need for a fused execution graph.
