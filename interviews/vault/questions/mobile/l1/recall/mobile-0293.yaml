id: mobile-0293
title: The Jank Budget (mobile-0293)
topic: real-time-deadlines
status: draft
provenance: imported
scenario: You're building an AI-powered real-time video filter for a mobile app. To ensure a smooth, 'jank-free'
  60 FPS user experience, what is the maximum per-frame latency budget you must hit for your entire processing
  pipeline?
details:
  realistic_solution: The maximum latency budget is 16ms. This is derived directly from the physics of
    display refresh rates. A 60 FPS (Frames Per Second) display refreshes its screen 60 times every second.
    To avoid stutter or 'jank', your application must deliver a new frame before the next refresh cycle
    begins, giving you a strict budget of approximately 16.7 milliseconds.
  common_mistake: Engineers often confuse the strict UI rendering deadline with other, more lenient latency
    targets. Forgetting that 60 FPS directly translates to a ~16.7ms budget is common. Others might recall
    the 100ms P99 latency from cloud services or the 33ms hard real-time deadline from edge robotics,
    neither of which apply to a smooth mobile UI.
  napkin_math: Frame Budget = 1000 ms / 60 FPS ≈ 16.7 ms. The 'Scale Ladder' table confirms this, listing
    the mobile latency budget as 16ms for jank avoidance.
