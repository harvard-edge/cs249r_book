id: mobile-0302
title: The Mobile Jank Budget (mobile-0302)
topic: real-time-deadlines
status: draft
provenance: imported
scenario: To ensure a mobile application's user interface feels perfectly smooth and avoids user-perceptible
  'jank', what is the approximate per-frame latency budget your ML model and rendering pipeline must meet?
details:
  realistic_solution: The standard latency budget for a 'janky' mobile UI is approximately 16ms. This
    is derived from the 60 frames-per-second (FPS) refresh rate of most standard mobile device screens.
    The entire process of running the model, processing its output, and rendering the UI update must complete
    within this window to avoid dropping a frame.
  common_mistake: Engineers often confuse the 30 FPS (33ms) target common for video playback with the
    much stricter requirements for smooth UI interaction. Mobile UIs targeting a 60 FPS refresh rate have
    a much smaller window. Exceeding this budget, even slightly, results in noticeable stutter or 'jank'
    as frames are dropped.
