id: mobile-exp2-mast-0117
title: On-Device Multimodal Architecture for Snapdragon 8 Gen 3
topic: model-size-estimation
status: published
provenance: imported
scenario: You are architecting an on-device multimodal agent running a 7B parameter LLM and a real-time
  Vision Transformer simultaneously on a Qualcomm Hexagon NPU (Snapdragon 8 Gen 3). Given the shared 12-16
  GB LPDDR5X memory and 45 TOPS INT8 compute limit, synthesize a novel quantization and memory allocation
  strategy to prevent OS evictions. The design must guarantee 15 tokens/s text generation and 30 FPS video
  processing while leaving enough headroom for the Android OS.
details:
  realistic_solution: A robust L6+ architecture uses W4A8 (4-bit weight, 8-bit activation) quantization
    for the LLM to fit the Hexagon NPU's INT8 pipelines while halving memory bandwidth demands. The ViT
    is pipelined onto the GPU or a dedicated ISP block, isolating its memory traffic. A ring-buffer is
    designed for the KV cache to enforce a strict memory ceiling, ensuring the total ML payload never
    exceeds 6.5GB, thereby safely coexisting with the OS in the shared memory pool.
  common_mistake: Candidates often just calculate static weight sizes (e.g., 7B * 1 byte = 7GB for INT8)
    and assume it fits in the 12-16GB RAM. They fail to account for the dynamic KV cache footprint for
    long contexts, the peak memory bandwidth saturation of LPDDR5X during auto-regressive decoding, and
    the baseline 4-6GB memory reservation required by the Android OS and camera ISP.
  napkin_math: 'LLM Weights at INT4: 7B * 0.5 bytes = 3.5 GB. KV Cache (4K context, 32 layers, 4096 hidden,
    FP16): 4000 * 32 * 4096 * 2 (K,V) * 2 bytes = 2.1 GB. ViT (100M params, FP16) + Activations = ~0.5
    GB. Total ML RAM = 3.5 + 2.1 + 0.5 = 6.1 GB (leaves ~6-10 GB for OS out of 12-16 GB LPDDR5X). Compute:
    LLM at 15 tok/s requires ~15 * 14 GOps = 210 GOps/s (0.21 TOPS), which easily fits the 45 TOPS INT8
    budget. Bandwidth constraint: 15 tok/s * 3.5 GB weights = 52.5 GB/s memory bandwidth, which is near
    the theoretical ~64 GB/s limit of LPDDR5X, validating the absolute necessity of INT4 over INT8.'
