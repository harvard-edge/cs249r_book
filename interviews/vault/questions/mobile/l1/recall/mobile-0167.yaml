id: mobile-0167
title: The Quantization Energy Dividend
topic: quantization-fundamentals
status: published
provenance: imported
scenario: Your team is optimizing a new visual search feature for your mobile app. To improve battery
  life, you're considering quantizing the model. State the approximate energy saving for a single compute
  operation (a MAC) when moving from FP16 to INT8 precision.
details:
  realistic_solution: An INT8 MAC operation is approximately 5x more energy-efficient than an FP16 MAC
    operation. This is a fundamental physical invariant. The savings come from simpler digital logic in
    the multiplier and reduced energy for data movement, both on-chip and to/from RAM. While FP32 vs INT8
    is a massive ~18x saving, the FP16 vs INT8 jump is still a critical optimization for mobile battery
    life.
  common_mistake: Engineers often mistakenly assume energy savings scale linearly with bit width (e.g.,
    halving the bits from 16 to 8 should be a 2x saving). They also might confuse the FP16->INT8 saving
    with the much larger FP32->INT8 saving, or simply underestimate the hardware-level impact, thinking
    it's negligible. The reality is that the energy cost of a multiplier circuit doesn't scale linearly,
    and the savings are substantial.
  napkin_math: 'An FP16 MAC operation requires reading 16-bit values and doing float math, while INT8
    uses 8-bit integers. Compute energy drops significantly: an INT8 MAC consumes roughly 0.2pJ vs an
    FP16 MAC at ~1.5pJ. The approximate energy savings per compute operation is 1.5 / 0.2 = 7.5x, extending
    device battery life.'
