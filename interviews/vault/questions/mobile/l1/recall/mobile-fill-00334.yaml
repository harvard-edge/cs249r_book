id: mobile-fill-00334
title: Optimizing Large Language Models on Google Tensor G3 for Mobile
topic: memory-pressure-management
status: published
provenance: imported
scenario: You are tasked with deploying a large language model (LLM) for on-device inference on a smartphone
  powered by the Google Tensor G3, which features a 7.5 TOPS on-device TPU and 12 GB of LPDDR5X memory.
  The LLM, when fully loaded, requires 10 GB of memory for its weights and activations, and exhibits variable
  memory usage during inference, occasionally exceeding the available 12 GB and leading to Out-Of-Memory
  (OOM) errors. Describe how you would manage memory pressure, address potential memory fragmentation,
  and leverage techniques like gradient accumulation (even for inference if applicable for specific scenarios
  like batch processing) or OS-level eviction strategies to ensure robust and efficient operation without
  compromising user experience.
details:
  realistic_solution: 'A realistic solution would involve a multi-pronged approach: 1) Quantization (e.g.,
    8-bit or 4-bit) of model weights to reduce the baseline memory footprint. 2) Implementing a custom
    memory allocator or strategy to minimize fragmentation, especially for dynamic tensors. 3) Exploring
    dynamic batching or micro-batching with gradient accumulation-like patterns if certain inference tasks
    can be batched efficiently to manage activation memory. 4) Proactively monitoring memory usage to
    identify high-pressure points and potentially employing an intelligent eviction policy for less critical
    data (if any) or working with the OS to optimize memory pages, while being mindful of the LPDDR5X
    characteristics. 5) Utilizing the on-device TPU efficiently by offloading computations, which can
    indirectly help manage main memory by reducing intermediate data storage needs on the CPU.'
  common_mistake: A common mistake is to only consider peak memory usage without accounting for dynamic
    memory allocation patterns, OS overhead, or memory fragmentation. Another is to naively attempt to
    reduce model size without exploring more sophisticated memory management techniques like quantization,
    pruning, or dynamic tensor allocation strategies, or failing to acknowledge the specifics of LPDDR5X
    (e.g., bandwidth vs. capacity trade-offs).
  napkin_math: Given 12 GB LPDDR5X total memory, and 10 GB for the model, only 2 GB remains for OS, other
    apps, and dynamic activations. If a 100-layer transformer uses 100 MB of activations per layer, a
    full forward pass without any clever memory management would require 10 GB (weights) + 100 * 100 MB
    = 20 GB (activations), clearly exceeding the 12 GB. Quantizing the model from FP16 (2 bytes/param)
    to INT8 (1 byte/param) would reduce the 10 GB model to 5 GB, freeing up 5 GB for activations and OS
    overhead, making it 5 GB (weights) + 10 GB (activations) = 15 GB. Still too high. Further optimization
    of activations, such as selective recomputation or offloading, is needed. The 7.5 TOPS (Tera Operations
    Per Second) on-device TPU means it can perform 7.5 trillion operations per second, indicating high
    computational throughput but not directly addressing memory capacity. The LPDDR5X provides high bandwidth,
    but capacity is the primary constraint here.
