id: mobile-exp2-reca-0207
title: Hexagon NPU Capacity for Drift Detection
topic: distribution-drift-detection
status: published
provenance: imported
scenario: Your team is deploying a real-time object detection model on the Qualcomm Hexagon NPU (Snapdragon
  8 Gen 3). To monitor training-serving skew, you plan to calculate the Population Stability Index (PSI)
  on-device by caching intermediate INT8 feature activations. The interviewer asks you to recall the theoretical
  peak INT8 compute and maximum shared memory capacity of this specific platform to verify if the hardware
  can support this background drift detection.
details:
  realistic_solution: 'The correct answer retrieves the exact hardware specifications: the Snapdragon
    8 Gen 3 Hexagon NPU is rated for 45 TOPS of INT8 compute, and it utilizes a heterogeneous architecture
    with a shared pool of 12-16 GB LPDDR5X memory. Understanding these constraints is critical because
    caching activations for drift detection directly impacts the shared memory available for primary inference.'
  common_mistake: Candidates often state generic mobile compute specs or confuse the dedicated NPU TOPS
    with the total platform TOPS. They also frequently forget that the memory is shared between the CPU,
    GPU, and NPU, assuming the NPU has dedicated VRAM.
  napkin_math: Total INT8 NPU compute = 45 TOPS. If the primary model consumes 30 TOPS, the remaining
    compute headroom for statistical drift detection operations is 45 - 30 = 15 TOPS. If caching features
    for PSI calculation requires 2 GB out of a maximum 16 GB shared LPDDR5X memory, the system retains
    16 - 2 = 14 GB for the OS, GPU, and primary NPU inference.
