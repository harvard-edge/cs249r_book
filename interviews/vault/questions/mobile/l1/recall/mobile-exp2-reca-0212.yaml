schema_version: 1
id: mobile-exp2-reca-0212
title: Tensor G3 KV Cache Paged Allocation
topic: kv-cache-management
status: published
provenance: imported
scenario: You are deploying Gemini Nano on a Pixel device powered by the Google Tensor G3. The device
  features an on-device TPU capable of 7.5 TOPS and 12 GB of LPDDR5X RAM, which must be shared with the
  OS and other applications. As the sequence length increases during on-device LLM inference, the KV cache
  consumes a significant amount of memory. What specific memory management technique is used to store
  KV cache in non-contiguous memory blocks to eliminate external fragmentation?
details:
  realistic_solution: The correct fact to recall is PagedAttention (or block-based KV caching). It partitions
    the KV cache of a sequence into fixed-size blocks or pages that can be stored in non-contiguous physical
    memory, allowing the Tensor G3 to utilize its 12 GB LPDDR5X efficiently without running into out-of-memory
    errors due to fragmentation.
  common_mistake: Candidates often recall standard contiguous memory allocation or generic OS-level swapping.
    They forget that modern LLM inference specifically relies on block-based allocation to manage the
    dynamic growth of the KV cache without causing external fragmentation.
  napkin_math: 'Assuming an on-device LLM uses 32 layers and a hidden dimension of 2048 stored in FP16
    (2 bytes). The KV cache per token is: 2 (Key and Value) * 32 (layers) * 2048 (dim) * 2 bytes = 262,144
    bytes (~256 KB). Storing a 2048-token context requires 512 MB of the 12 GB LPDDR5X available RAM.'
