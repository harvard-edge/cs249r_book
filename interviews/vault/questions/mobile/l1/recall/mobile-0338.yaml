id: mobile-0338
title: 'The Mobile Memory Wall: Attention Scaling & Variants'
topic: attention-scaling
status: published
provenance: imported
scenario: You're evaluating if a new 7-billion parameter language model can be deployed on a high-end
  smartphone for on-device inference. Before worrying about latency or NPU support, your first check is
  memory. State the approximate memory footprint required to simply load the model's FP16 weights.
details:
  realistic_solution: For inference with FP16 (half-precision floating point) weights, each parameter
    requires 2 bytes of storage. Therefore, a 7-billion parameter model will require approximately 14
    GB of memory just to load into RAM.
  common_mistake: The most common mistake is to confuse the memory requirements for *training* with those
    for *inference*. Training a model using the standard Adam optimizer requires storing not just the
    weights, but also gradients and optimizer states, leading to a much larger footprint (typically ~16
    bytes per parameter). For inference, you only need the weights themselves.
  napkin_math: 7 Billion Parameters × 2 Bytes/Parameter (for FP16) = 14 Billion Bytes = 14 GB.
