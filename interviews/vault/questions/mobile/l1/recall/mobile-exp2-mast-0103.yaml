schema_version: 1
id: mobile-exp2-mast-0103
title: Energy-Aware Wake Vision Architecture on Exynos 2400
topic: energy-per-operation
status: published
provenance: imported
scenario: You are designing a continuous audio-visual wakeword system for a smartphone powered by the
  Samsung Exynos 2400 NPU. The system must process an always-on 10 fps video stream while strictly adhering
  to a 50 mW continuous power budget. Given the Exynos 2400's dual-core NPU delivering 34.7 TOPS and sharing
  12 GB of LPDDR5X with the CPU, GPU, and ISP, memory access energy vastly outweighs compute energy. You
  must synthesize a novel cascade architecture and select energy-aware operators that minimize LPDDR5X
  access based on the Horowitz energy table.
details:
  realistic_solution: The architecture must aggressively prioritize data locality and minimize DRAM access
    over simply minimizing MACs. A cascading system should start with an ultra-low-power trigger model
    that fits entirely within the NPU's SRAM, executing depthwise separable convolutions to maximize the
    compute-to-memory ratio. Only upon a positive trigger should the system wake up a heavier validation
    model that accesses the shared LPDDR5X, heavily utilizing INT4 quantization to reduce the memory footprint
    and the energy cost per weight fetch.
  common_mistake: Candidates often focus solely on reducing the theoretical MAC count to meet the power
    budget, ignoring the shared memory architecture. They fail to realize that fetching weights from the
    shared 12 GB LPDDR5X consumes orders of magnitude more energy than the 34.7 TOPS compute, leading
    to designs that blow past the 50 mW limit due to constant DRAM thrashing.
  napkin_math: Assume 1 pJ for an INT8 MAC operation and 100 pJ for a 32-bit DRAM access from the LPDDR5X.
    A naive 10 M-parameter INT8 model requires 10 MB of weights per inference; at 10 fps, this is 100
    MB/s from DRAM. The DRAM read energy alone would be (100 MB/s / 4 bytes) * 100 pJ = 2.5 mW, plus feature
    map spills and the compute energy of the 34.7 TOPS engine, easily exceeding 50 mW in a real system.
    By synthesizing a first-stage 100 KB SRAM-resident network running at 1 GOPS, DRAM access drops to
    zero, and compute energy is roughly 1 GOPS * 1 pJ = 1 mW, keeping continuous drain well under the
    50 mW budget.
