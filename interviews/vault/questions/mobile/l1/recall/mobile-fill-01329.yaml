id: mobile-fill-01329
title: Graceful Degradation for On-Device LLM on Snapdragon 8 Gen 3
topic: graceful-degradation
status: published
provenance: imported
scenario: 'You are designing an on-device Large Language Model (LLM) inference system for a flagship mobile
  phone powered by the Snapdragon 8 Gen 3 Hexagon NPU, which boasts 45 TOPS (Tera Operations Per Second)
  for INT8 operations and has 12-16 GB of LPDDR5X memory. Your LLM typically requires 30 INT8 TOPS for
  optimal performance (e.g., generating high-quality, complex responses) and occupies 10 GB of memory.
  The user experience demands low latency (<100ms per token) and high availability.


  However, the NPU''s performance can degrade due to thermal throttling, concurrent demanding applications
  (e.g., gaming, high-res video recording), or battery-saving modes, reducing available TOPS to as low
  as 15-20 INT8 TOPS. Memory pressure can also fluctuate, potentially reducing available LPDDR5X to 8
  GB or less.


  Design a comprehensive graceful degradation strategy for this LLM inference system. Your strategy should
  incorporate:

  1.  **Degradation ladders:** How would you define and implement different performance tiers for the
  LLM?

  2.  **Model fallbacks:** What mechanisms would you employ to switch to less resource-intensive models
  or configurations?

  3.  **Fail-safe vs. Fail-operational:** Discuss how these principles apply to maintaining a responsive
  user experience even under severe resource constraints.

  4.  **Quality-of-Service (QoS) shedding:** How would you dynamically adjust the model''s output quality
  or inference parameters to manage NPU and memory load?'
details:
  realistic_solution: 'Implement an adaptive inference manager that continuously monitors NPU utilization,
    temperature, battery status, and available memory. This manager would orchestrate a degradation ladder:

    *   **Tier 1 (Optimal):** Full LLM, max parameters, highest quantization (e.g., INT8).

    *   **Tier 2 (Moderate Degradation):** Smaller, fine-tuned LLM, or the same LLM with aggressive pruning/quantization
    (e.g., 4-bit quantization if supported and performance allows), or reduced output length/complexity.

    *   **Tier 3 (Severe Degradation):** Very small, highly optimized LLM, or offloading simpler tasks
    to the CPU (with higher latency but guaranteed availability), or even simple heuristic-based responses.

    Model fallbacks would involve dynamically loading different ONNX/TFLite models or adjusting inference
    parameters (e.g., beam search width, temperature). Fail-operational principles would prioritize *some*
    response over no response, even if it''s a simplified one, while fail-safe would prevent the LLM from
    crashing the system. QoS shedding would involve adjusting generation parameters (e.g., reducing `max_new_tokens`,
    penalizing repetition more aggressively, or using simpler decoding strategies) based on real-time
    NPU load and latency targets. This requires a robust set of benchmarks for each degradation tier to
    ensure predictable performance.'
  common_mistake: A common mistake is designing a static system that either fails catastrophically when
    resources are insufficient or always uses the lowest common denominator, failing to leverage the NPU's
    full potential when resources are plentiful. Another pitfall is not defining clear thresholds and
    transitions for degradation, leading to jittery performance or sudden, unexplained drops in quality
    for the end-user.
  napkin_math: If your LLM needs 30 INT8 TOPS for optimal performance and the Hexagon NPU provides 45
    INT8 TOPS, you have a 15 TOPS buffer. If the NPU throttles to 15 TOPS, your LLM is already at a 50%
    deficit, requiring a switch to a model or configuration that performs within that 15 TOPS budget.
    For a single token generation latency of 100ms, this implies a processing rate of 10 tokens/second.
    If a token requires 30 INT8 TOPS for inference, and the NPU can supply 45 INT8 TOPS, then the NPU
    is capable of ~1.5x the required compute, providing headroom. However, if context window memory grows,
    the 10GB footprint could exceed available LPDDR5X, requiring strategies like KV cache eviction or
    recomputation, or aggressive memory compression schemes.
