title: The On-Device 7B LLM Mandate
topic: kernel-fusion
status: published
provenance: imported
scenario: 'You are the new Lead ML Systems Engineer for a luxury automaker''s ''AI Concierge'' project.
  The CEO has mandated that the flagship 7B parameter LLM, currently running in the cloud, be deployed
  entirely on the car''s next-gen infotainment SoC for a premium, always-on experience. The hardware is
  powerful but constrained: its specs are equivalent to an Apple A17 Pro (35 TOPS INT8, 8GB LPDDR5 RAM).'
details:
  realistic_solution: 'A successful strategy requires a multi-faceted approach, creating a novel system
    from several advanced techniques:'
  common_mistake: Engineers often propose a single solution, like 'quantize to INT4,' without realizing
    it's insufficient. A 7B model at INT4 is still ~3.5GB, breaking the 2GB memory budget. Another common
    mistake is to declare the task impossible or suggest using a much smaller, less capable open-source
    model, which sidesteps the L6+ architectural challenge of making the large, proprietary model work
    under severe constraints.
  napkin_math: '**1. Memory Budget:** | Base 7B Model (FP16): 7B params * 2 bytes/param = 14 GB. >> 2GB
    budget. | Quantized 7B Model (INT4): 7B params * 0.5 bytes/param = 3.5 GB. >> 2GB budget. | **Proposed
    Distilled Hierarchy (INT8):** | Verifier Model: 500M params * 1 byte/param = 500 MB. | Draft Model:
    100M params * 1 byte/param = 100 MB. | Total Weights: 600 MB. | KV Cache + Activations: ~400 MB. |
    **Peak Footprint: ~1.0 GB.** < 2GB budget. Success.'
