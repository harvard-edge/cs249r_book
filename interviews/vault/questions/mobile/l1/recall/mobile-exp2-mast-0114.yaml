id: mobile-exp2-mast-0114
title: On-Device FP8 Inference Design for LLM on A17 Pro
topic: mixed-precision-training
status: published
provenance: imported
scenario: You are leading the deployment of a 3B parameter conversational LLM onto the Apple A17 Pro Neural
  Engine. The model must run entirely on-device to ensure privacy and offline capability. The A17 Pro
  features a 16-core Neural Engine delivering 35 TOPS within a ~5W envelope, sharing 8 GB of unified memory
  with the CPU/GPU. Given the memory constraints and the need for responsive generation, you must design
  a mixed-precision inference architecture that aggressively utilizes FP8 for the bulk of the feed-forward
  networks while maintaining generation quality, detailing how you handle activation scaling and memory
  bandwidth bottlenecks.
details:
  realistic_solution: 'A robust L6+ solution designs a selective mixed-precision approach: weights are
    statically quantized to 4-bit or 8-bit, while activations in feed-forward layers use dynamic FP8 scaling
    per-token or per-channel to handle outliers. Crucial attention layers (Query/Key projections) remain
    in FP16 to preserve generation quality. The design must explicitly map the memory access patterns,
    recognizing that at a batch size of 1 (typical for mobile UI), the bottleneck is memory bandwidth
    (reading the 3B weights), not the 35 TOPS of compute.'
  common_mistake: Candidates often propose simple static quantization or uniform FP8 conversion without
    addressing the dynamic range of activations in LLMs. They also frequently overlook the shared unified
    memory bottleneck on mobile SoCs, focusing solely on the 35 TOPS compute bound instead of the memory
    bandwidth limits during autoregressive decoding.
  napkin_math: For a 3B parameter model in FP16, weights require 6 GB of memory, which dominates the 8
    GB unified memory on the A17 Pro and risks OS eviction. By quantizing weights to W8A8 (FP8), memory
    drops to ~3 GB. During autoregressive decoding (batch size 1), reading 3 GB of W8 weights per token
    requires 3 GB/s per token/sec. To achieve a target 10 tokens/s, the memory bandwidth required is 30
    GB/s. Since the 16-core NE offers 35 TOPS, the compute required for 3B MACs per token (6 GFLOPs) takes
    only 6 GFLOPs / 35 TOPS ≈ 0.17 ms, proving the system is vastly memory-bound and W4A8 might be necessary
    to hit higher token rates or leave room for concurrent apps.
