schema_version: 1
id: mobile-0181
title: The Frozen UI Watchdog
topic: fault-tolerance-checkpointing
status: published
provenance: imported
scenario: An on-device visual search model sometimes gets stuck in a hard loop during inference, freezing
  the application's UI. The operating system eventually terminates the app with an 'Application Not Responding'
  (ANR) error, but the user experience is terrible. What is a standard, low-level timer mechanism used
  to proactively detect this kind of 'frozen' state and trigger a faster, more graceful recovery?
details:
  realistic_solution: The correct mechanism is a **watchdog timer**. The main UI thread periodically 'pets'
    the watchdog. If the inference call blocks the thread and prevents this 'petting' for a configured
    timeout (e.g., 100-200ms), the watchdog triggers a pre-defined recovery action. This could be logging
    the error, killing the inference task, and restoring the UI to an interactive state, all before the
    much slower OS-level ANR is ever triggered.
  common_mistake: Engineers often suggest relying on the OS's default ANR timeout (e.g., 5 seconds on
    Android), which is far too slow for a good user experience. Others might propose complex, application-level
    solutions like asynchronous task cancellation, which can't break out of a hard CPU-bound loop on the
    main thread, or network-style heartbeats, which are irrelevant for an intra-process freeze.
  napkin_math: The UI thread must update every **16ms** to avoid jank (the 'jank budget'). The default
    OS ANR timeout is **~5,000ms**. By setting a software watchdog to a **100ms** timeout, you can detect
    the freeze and initiate recovery **50 times faster** (5000ms / 100ms) than the OS default, preventing
    a user-facing crash.
