id: mobile-0331
title: 'The Depthwise Dividend: Attention Scaling & Variants'
topic: attention-scaling
status: published
provenance: imported
scenario: Your team is optimizing a real-time style transfer feature for a mobile app. The key bottleneck
  is a standard 3x3 convolution layer that maps a 128-channel input tensor to a 256-channel output. You
  propose replacing it with a 3x3 depthwise separable convolution. What is the approximate reduction in
  computational cost (FLOPs) you would expect?
details:
  realistic_solution: 'A depthwise separable convolution splits a standard convolution into two much cheaper
    steps: a 3x3 depthwise convolution (one filter per input channel) and a 1x1 pointwise convolution
    (to combine the channels). The computational savings are substantial.'
  common_mistake: Engineers often underestimate the efficiency gains or misremember the source of the
    savings. A critical error is to forget that the 1x1 pointwise convolution, which follows the depthwise
    step, accounts for the majority of the computation in a depthwise separable block. They mistakenly
    believe the cost is dominated by the initial depthwise spatial filtering and calculate the reduction
    relative to that small part, leading to a massive overestimation of the benefit.
  napkin_math: 'The cost ratio is defined by (Cost_Depthwise + Cost_Pointwise) / Cost_Standard. This simplifies
    to the elegant formula: (1/Output_Channels) + (1/Kernel_Size^2).'
