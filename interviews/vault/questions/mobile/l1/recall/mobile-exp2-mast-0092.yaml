id: mobile-exp2-mast-0092
title: On-Device Defensive Architecture for Biometric Spoofing
topic: adversarial-robustness
status: published
provenance: imported
scenario: You are designing an on-device liveness detection system for a banking app that runs entirely
  on the Apple A17 Pro Neural Engine. The model must defend against highly optimized, adaptive adversarial
  patches designed to bypass facial recognition, but you have a strict latency budget of 15ms per frame
  to prevent UX degradation. Given the A17 Pro's 35 TOPS compute capacity, 16-core Neural Engine, and
  8 GB shared unified memory under a 5W thermal envelope, synthesize a novel architecture that ensures
  robustness without exceeding power or memory constraints.
details:
  realistic_solution: The optimal approach is to design a lightweight teacher-student defensive distillation
    pipeline where the heavily robust teacher is trained offline, and a compact student model is quantized
    to INT8 for the A17 Pro's 16-core Neural Engine. By leveraging the A17 Pro's shared 8 GB unified memory,
    the student model can process intermediate feature maps efficiently with zero-copy CPU/NPU memory
    sharing. Finally, we must apply cheap, runtime input transformations (like randomized smoothing or
    resizing) on the CPU to disrupt adversarial perturbations before passing the tensor to the NPU.
  common_mistake: Candidates often suggest running massive ensembles or continuous adversarial retraining
    on-device, completely ignoring the 5W thermal envelope and unified memory bandwidth bottlenecks. Another
    mistake is proposing cloud-based verification, which violates the strict on-device requirement and
    introduces unacceptable network latency.
  napkin_math: For a 15ms latency budget, the A17 Pro's 16-core NPU can theoretically perform 35 TOPS
    * 0.015s = 0.525 Tera-Operations (525 GOPs) per frame. A typical INT8 robust MobileNet-class model
    requires ~2 GOPs per inference, meaning compute is not the bottleneck. However, under a 5W power limit,
    memory movement must be minimized; a 25 MB INT8 model and a 1 MB input frame with 10 MB of activations
    easily fit within the 8 GB shared unified memory. This leaves ample budget to run CPU-based input
    randomizations (~3ms) and NPU inference (~5ms), well within the 15ms window.
