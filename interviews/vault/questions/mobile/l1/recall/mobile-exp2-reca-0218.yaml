id: mobile-exp2-reca-0218
title: Exynos 2400 NPU Shared Memory Architecture
topic: profiling-bottleneck-analysis
status: published
provenance: imported
scenario: You are profiling a real-time computer vision pipeline running on the Samsung Exynos 2400 NPU.
  The system experiences occasional frame drops despite the NPU's theoretical 34.7 TOPS peak performance.
  You need to identify the exact architectural components available for tracing performance bottlenecks
  on this specific SoC, which features a dual-core NPU sharing 12 GB LPDDR5X memory with the CPU, GPU,
  and ISP.
details:
  realistic_solution: To properly profile this bottleneck, you must monitor the shared memory bandwidth
    and capacity utilization. Since the 12 GB LPDDR5X pool is shared, high memory traffic from the ISP
    or CPU during concurrent execution can starve the dual-core NPU of data, causing pipeline stalls.
  common_mistake: Candidates often assume the NPU has dedicated VRAM and look for isolated memory profiling
    metrics. They fail to recall that the Exynos 2400 NPU utilizes a shared memory architecture, meaning
    contention with other subsystems is a primary source of latency.
  napkin_math: Given the Exynos 2400 NPU's peak 34.7 TOPS, a 100 GOPs operation has a theoretical compute-bound
    latency of 100 / 34,700 = ~2.88 ms. However, because the 12 GB LPDDR5X memory is shared, if concurrent
    CPU, GPU, and ISP tasks consume 10.5 GB, leaving only 1.5 GB for the NPU, memory evictions and bandwidth
    contention will bottleneck the dual-core NPU, pushing actual latency far above the 2.88 ms theoretical
    floor.
