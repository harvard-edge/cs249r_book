id: mobile-0660
title: The On-Device Copilot Power Budget
topic: pruning-sparsity
status: published
provenance: imported
scenario: You are the new Lead ML Systems Engineer for the flagship smartphone division, tasked with creating
  a revolutionary, always-on, on-device AI assistant. The goal is to rival server-based models in quality,
  but run entirely on the phone's hardware.
details:
  realistic_solution: The correct approach is to design a multi-model system that decouples the latency-critical
    path from the accuracy-critical path, using **speculative decoding** as the core architectural pattern.
  common_mistake: Focusing on optimizing the single 1.5B model in isolation. A common suggestion is 'Just
    quantize the model to INT4 and use a custom NPU kernel.' While quantization is part of the solution,
    it's insufficient. INT4 alone won't bridge the 5x latency gap (850ms vs 150ms) or the ~20x average
    power gap. This approach fails to recognize that a single model is fundamentally incapable of being
    both extremely fast/low-power and highly accurate; it's a physics trade-off. The problem requires
    a system-level architectural change.
  napkin_math: Let's quantify the failure of the single-model approach and the success of the speculative
    decoding system.
