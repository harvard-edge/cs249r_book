id: mobile-exp2-mast-0105
title: On-Device Intersectional Fairness
topic: fairness-evaluation
status: published
provenance: imported
scenario: You are designing an on-device fairness evaluation pipeline for a new facial analytics model
  to ensure intersectional fairness before applying a federated learning update. The evaluation must run
  against a locally stored golden dataset of 10,000 images representing diverse skin tones and lighting
  conditions. Design the evaluation architecture for the Apple A17 Pro, ensuring it computes equalized
  odds and demographic parity across 16 subgroups without causing thermal throttling or noticeable battery
  drain.
details:
  realistic_solution: Implement a chunked, background-priority evaluation pipeline. Load the dataset in
    micro-batches into the shared 8GB unified memory to minimize storage I/O. Utilize the 16-core Neural
    Engine to process each batch, calculating moving averages for true positive rates and selection rates
    per subgroup to avoid storing all intermediate predictions. Introduce deliberate sleep intervals between
    chunks to stay well within the ~5W power limit and prevent thermal throttling.
  common_mistake: Candidates often propose processing the entire dataset in a single continuous loop,
    ignoring the ~5W thermal envelope and causing thermal throttling. They also frequently fail to leverage
    the shared 8GB unified memory efficiently, leading to repeated, expensive read operations from flash
    storage instead of streaming data via zero-copy buffers.
  napkin_math: Assuming the model requires 10 GOPS per inference, 10,000 images * 10 GOPS = 100 TOPS of
    total compute. The Apple A17 Pro Neural Engine provides 35 TOPS. Theoretical compute time is 100 TOPS
    / 35 TOPS/s = ~2.85 seconds. At a conservative 33% NPU utilization, active compute takes ~8.5 seconds.
    Power draw at ~5W for 8.5s consumes 42.5 Joules, which is <0.1% of a typical ~45,000 Joule battery.
    Uncompressed, the 10,000 images (at 224x224x3 bytes ≈ 150KB each) consume ~1.5GB, fitting comfortably
    within the 8GB shared unified memory.
