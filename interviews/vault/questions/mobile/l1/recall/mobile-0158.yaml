id: mobile-0158
title: The App Memory Guillotine
topic: memory-hierarchy-design
status: published
provenance: imported
scenario: You're designing a new real-time camera filter for an Android app. The target device is a popular
  smartphone with 8 GB of total system RAM. State the approximate memory budget your ML model and its
  activations can safely consume without a high risk of being terminated by the OS.
details:
  realistic_solution: A safe rule of thumb is that a single foreground application can use about 25% of
    the total system RAM. For a device with 8 GB of RAM, this means your application's total memory footprint,
    including the model, activations, and UI, should stay below ~2 GB.
  common_mistake: Engineers accustomed to cloud or desktop development often assume they can use the majority
    of the device's RAM. They forget that mobile operating systems aggressively protect a large portion
    of RAM for the OS itself, background services, and other applications to ensure a smooth user experience.
    Exceeding the implicit budget leads to the app process being killed ('jank' or eviction).
  napkin_math: Device RAM × App Budget Ratio = Safe Memory Usage
