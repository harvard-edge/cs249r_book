schema_version: 1
id: mobile-0183
title: The Sensor Bandwidth Skew
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: A mobile vision model, trained on pristine 4K images, is underperforming on-device. A likely
  source of training-serving skew is the physical data link between the camera sensor and the SoC, which
  can force on-the-fly compression or resolution scaling not present in the training data. What is the
  name of this common camera interface, and what is its typical maximum bandwidth in a modern smartphone?
details:
  realistic_solution: The interface is the MIPI CSI-2 (Camera Serial Interface 2). In a typical high-end
    smartphone using a 4-lane configuration, its bandwidth is approximately 2.5 GB/s. If a model's desired
    input resolution and frame rate exceed this physical limit, the camera system is forced to drop frames,
    reduce resolution, or apply heavy compression, introducing artifacts that cause skew from the clean
    training data.
  common_mistake: Engineers often focus on compute (NPU TOPS) or system memory bandwidth (LPDDR5) and
    forget the physical pipe from the sensor itself. They might assume this bandwidth is effectively infinite
    or mistake it for other interconnects like USB or PCIe, which have different bandwidth characteristics
    and are not used for this purpose in a tightly integrated SoC.
  napkin_math: A single uncompressed 4K (3840x2160) RGB frame (3 bytes/pixel) is ~25 MB. To run at 120
    FPS, the required data rate is 25 MB/frame * 120 FPS = 3,000 MB/s or 3 GB/s. This exceeds the typical
    ~2.5 GB/s MIPI CSI-2 bandwidth, forcing a compromise on data quality (e.g., using compression), thus
    causing skew.
