title: The UI Jank Deadline
topic: real-time-deadlines
status: published
provenance: imported
scenario: You're building a real-time generative AI feature for a smartphone app that overlays effects
  on the live camera feed. To ensure a smooth, 'buttery' user experience and avoid visual stutter (UI
  jank), what is the generally accepted maximum latency budget for the model to process a single frame?
details:
  realistic_solution: The correct answer is ~16ms. Most mobile device screens refresh at 60Hz, meaning
    a new frame is drawn every 1/60th of a second. To avoid missing a frame and causing perceptible jank,
    all processing for that frame—including model inference—must complete within this 16.67ms window.
  common_mistake: Engineers often confuse the mobile UI latency budget with other platforms. They might
    recall the 33ms budget for 30 FPS video or the much larger ~100ms P99 budget for cloud services. However,
    mobile UI is tied directly to the screen's refresh rate, which is typically 60Hz or higher, demanding
    much lower latency to feel responsive.
  napkin_math: 'The calculation is based on the standard mobile screen refresh rate:'
