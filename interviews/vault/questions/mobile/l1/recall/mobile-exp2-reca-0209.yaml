schema_version: 1
id: mobile-exp2-reca-0209
title: Definition of Equalized Odds for On-Device Models
topic: fairness-evaluation
status: published
provenance: imported
scenario: Your team is preparing to deploy an on-device LLM (Gemini Nano) for text summarization on the
  Google Tensor G3. Before utilizing the device's TPU for production inference, you must evaluate the
  model's fairness across different dialects. The product manager asks you to define 'equalized odds'
  to ensure the evaluation methodology is correct. What is the exact definition of equalized odds in the
  context of fairness evaluation?
details:
  realistic_solution: Equalized odds means that the model's predictions are independent of the sensitive
    attribute, conditional on the true label. For binary outcomes, this explicitly requires that the model
    achieves both the same True Positive Rate (TPR) and the same False Positive Rate (FPR) across all
    evaluated demographic groups.
  common_mistake: Candidates often confuse equalized odds with demographic parity. They may incorrectly
    state that the model simply needs to produce the same positive prediction rate across all groups,
    entirely ignoring the actual ground truth labels.
  napkin_math: To evaluate this metric on-device, we must run inference on a diverse validation set. If
    we evaluate 15,000 text samples requiring 1.0 tera-operations each, the total compute is 15,000 TOPS.
    Utilizing the Google Tensor G3's 7.5 TOPS TPU, this fairness evaluation pass would theoretically take
    15,000 TOPS / 7.5 TOPS/sec = 2,000 seconds, and the 12 GB LPDDR5X memory is more than sufficient to
    hold the evaluation datasets and model weights.
