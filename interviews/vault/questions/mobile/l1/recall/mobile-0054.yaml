schema_version: 1
id: mobile-0054
title: The Cellular Download Wall
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: Your team has developed a new 250 MB generative AI model for your company's popular photo editing
  app. The lead engineer suggests bundling the model directly into the app binary for simplicity. The
  current app is 50 MB. From a platform distribution perspective, what is the most critical, immediate
  problem with this approach?
details:
  realistic_solution: The combined size of the app (50 MB) and the model (250 MB) is 300 MB. This exceeds
    the ~200 MB over-the-air (OTA) download limit set by major mobile platforms like the Apple App Store
    and Google Play. Forcing users to be on Wi-Fi to download or update the app is a major deterrent that
    severely impacts acquisition rates. The standard practice is to use on-demand resource frameworks
    to download large assets like models after the initial installation.
  common_mistake: Engineers without mobile-specific experience often focus on total device storage or
    RAM constraints. While valid concerns, they overlook the hard, platform-enforced limit on the initial
    app download size over cellular networks, which is a much more immediate and critical barrier to user
    acquisition.
  napkin_math: App Binary Size (50 MB) + Model Size (250 MB) = 300 MB Total App Size.
