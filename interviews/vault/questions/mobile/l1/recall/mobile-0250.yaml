id: mobile-0250
title: 'The MobileNet Multiplier: Transformer Systems Cost'
topic: transformer-systems-cost
status: published
provenance: imported
scenario: Your team is trying to run a standard computer vision model on a smartphone, but it's draining
  the battery and causing the UI to feel sluggish. A teammate suggests replacing the standard 3x3 convolutions
  with 3x3 depthwise separable convolutions. What is the primary benefit you recall this change provides?
details:
  realistic_solution: The primary benefit is a large reduction in both computational cost (FLOPs) and
    the number of parameters. For a standard 3x3 kernel, this reduction is typically around 8-9 times
    compared to a standard convolution, while incurring only a small loss in model accuracy. This efficiency
    gain directly translates to lower latency and power consumption on the device.
  common_mistake: Engineers often confuse the benefit of depthwise separable convolutions with other optimization
    techniques. They might incorrectly attribute the gains of quantization (e.g., a 4x memory reduction
    from FP16 to INT4) to this architectural change, or they might believe it improves accuracy, when
    in fact it's an efficiency trade-off.
  napkin_math: Let's compare parameter counts for a typical mobile CNN layer with 128 input channels ($C_{in}$)
    and 256 output channels ($C_{out}$) using a 3x3 kernel ($K=3$).
