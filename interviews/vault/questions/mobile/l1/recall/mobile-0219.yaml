id: mobile-0219
title: The App Memory Diet
topic: transformer-systems-cost
status: published
provenance: imported
scenario: You're adding an on-device ML feature to an app. The target device is a typical modern smartphone
  with 8 GB of RAM. What is a reasonable rule-of-thumb memory budget for your entire feature, including
  the model and runtime activations, to avoid being terminated by the OS?
details:
  realistic_solution: A reasonable budget is approximately 25% of the total device RAM. On an 8 GB device,
    this gives you a 2 GB budget. This rule of thumb accounts for the significant memory footprint of
    the OS, other apps running in the background, and provides a buffer to prevent your app from being
    flagged as a memory hog and terminated.
  common_mistake: Engineers accustomed to cloud or desktop development often assume they can use a large
    fraction of the device's total RAM (e.g., 6-7 GB). They forget that on mobile, the operating system
    (like Android or iOS) and numerous background services consume a significant and protected portion
    of memory. Exceeding a much smaller, socially-agreed-upon budget risks the OS aggressively terminating
    your app to preserve system stability.
  napkin_math: 'Device RAM: 8GB. OS + system services: ~3GB. Background apps: ~1-2GB. Available for foreground
    app: ~3-4GB. Safe rule: 25% of total = 8GB × 0.25 = 2GB budget. Model footprint example: 500M param
    INT8 = 500MB weights + ~200MB activations + 100MB runtime = 800MB, fits in 2GB. Exceeding ~50% triggers
    iOS/Android low-memory killer → app terminated.'
