id: mobile-cell-13144
title: 'Mobile TCO Mastery: On-Device AI ROI for Mobile App Monetization'
topic: tco-cost-modeling
status: published
provenance: imported
scenario: 'Calculate the ROI for building on-device LLM capabilities into a mobile app using A17 Pro (35
  TOPS, 8GB). The app has 500K MAU. Premium tier ($10/month) unlocks unlimited on-device AI. Without on-device:
  30% users on premium (cloud costs $2/user/month at $0.001/1K token pricing). With on-device: expect
  50% premium conversion, cloud cost $0 for on-device users. Development cost: $300K. Calculate 2-year
  NPV.'
details:
  realistic_solution: 'Before on-device: Revenue: 500K*0.30*$10=$1.5M/month. Cloud cost: 500K*0.30*$2=$300K/month.
    Net: $1.2M/month. After on-device: Revenue: 500K*0.50*$10=$2.5M/month. New net: $2.5M-$300K=$2.2M/month.
    Monthly improvement: $1M/month. Annual: $12M. 2yr NPV at 10%: $12M PV annuity = $21.45M (monthly discount).
    Development: $300K. Net NPV: $21.15M. ROI: 7050%.'
  common_mistake: Not accounting for the fact that on-device users still need cloud fallback for complex
    queries, and calculating revenue only from premium subscribers without subtracting remaining cloud
    costs.
  napkin_math: 'Before: revenue=$1.5M/mo, cloud=$300K/mo, net=$1.2M/mo. After: revenue=$2.5M/mo (50% premium),
    cloud=$300K/mo (same base 30% still cloud-first), net=$2.2M/mo. Monthly increase: $1M. Annual: $12M.
    2yr NPV at 10% annually (monthly payments at 10%/12=0.833% monthly): PV = $1M × ((1-(1.00833)^-24)/0.00833)
    = $1M × 21.45 = $21.45M. Dev cost $300K. Net: $21.15M. ROI: 7050%. Premium conversion lift (20pp:
    30%→50%) drives enormous value.'
