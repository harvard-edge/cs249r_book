id: mobile-0141
title: The Mobile Thermal Wall
topic: power-budgeting
status: published
provenance: imported
scenario: You're an ML engineer profiling a new on-device generative AI model. You observe that after
  running continuously for about a minute, the model's performance consistently drops by 40-50%. What
  is the most likely physical limit the System-on-a-Chip (SoC) is encountering, and what is its approximate
  power value?
details:
  realistic_solution: The SoC is thermal throttling. It has exceeded its sustainable thermal design power
    (TDP) and is reducing its clock speeds to prevent overheating. For a modern flagship smartphone, the
    total sustained power budget for the entire SoC is only about 3 to 5 Watts.
  common_mistake: Engineers without mobile experience often assume power budgets are much higher, in the
    10-30W range like a laptop, or they immediately blame software bugs. They fail to recognize that passive
    cooling in a sealed chassis is the dominant constraint, forcing a very low and strict power budget
    for *sustained* performance.
  napkin_math: A datacenter H100 draws 700W with active liquid cooling. A passively cooled mobile phone
    SoC has a sustained thermal dissipation limit of ~3W to keep skin temperature under 45C. Running a
    generative AI model at 8W peak power will hit thermal limits in 60 seconds, forcing the OS to throttle
    clock speeds by 50%.
