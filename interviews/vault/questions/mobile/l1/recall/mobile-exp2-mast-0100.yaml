id: mobile-exp2-mast-0100
title: On-Device DP-SGD on Hexagon NPU
topic: differential-privacy
status: published
provenance: imported
scenario: You are designing an on-device personalization system using DP-SGD for a language model running
  on a Qualcomm Hexagon NPU (Snapdragon 8 Gen 3). The system must guarantee an epsilon budget of < 2.0
  over a week of daily updates. Given the NPU's 45 TOPS INT8 performance and 16 GB of shared LPDDR5X memory,
  design a hybrid training architecture that handles per-example gradient clipping, cryptographically
  secure noise generation, and INT8 quantization without compromising the theoretical privacy guarantees.
details:
  realistic_solution: A novel architecture would utilize 'ghost clipping' to avoid materializing full
    per-example gradients in the shared LPDDR5X memory. The forward and backward passes operate on the
    NPU leveraging its 45 TOPS INT8 engines, while the cryptographically secure pseudo-random noise generation
    (discrete Gaussian mechanism) and sensitivity clipping are orchestrated on the CPU. This heterogeneous
    approach guarantees privacy integrity while maximizing NPU utilization.
  common_mistake: Candidates often propose standard DP-SGD implementations without considering the hardware
    reality of the Hexagon NPU. They incorrectly assume standard FP32 Gaussian noise generation is efficient
    or secure on the NPU, and fail to address the massive memory bandwidth bottleneck of materializing
    per-example gradients.
  napkin_math: 'For a 10M parameter model with batch size 64: Naive per-example gradients require 64 *
    10M * 4B = 2.56 GB, heavily taxing the shared LPDDR5X memory bus. Using ghost clipping reduces this
    gradient memory footprint back to ~40 MB. Computing the backward pass requires ~1.2 Giga-operations
    per example; a batch of 64 needs ~153 GOPS. On the Hexagon NPU (45 TOPS INT8), compute time is theoretically
    (153e9 / 45e12) = ~3.4 microseconds, meaning CPU-side noise generation of 10M values (~40 MB) and
    the memory bandwidth for synchronization will completely dominate the step time.'
