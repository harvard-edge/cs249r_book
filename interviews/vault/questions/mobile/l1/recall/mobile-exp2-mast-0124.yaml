id: mobile-exp2-mast-0124
title: Safety-Critical ASIL-D Pedestrian Detection on Hexagon NPU
topic: safety-certification
status: published
provenance: imported
scenario: You are architecting a continuous ASIL-D safety-critical pedestrian detection system for an
  autonomous micro-mobility vehicle powered by a Snapdragon 8 Gen 3 SoC. The perception stack runs on
  the Qualcomm Hexagon NPU, leveraging its 45 TOPS INT8 compute capacity while sharing 16 GB of LPDDR5X
  memory with the heterogeneous CPU/GPU subsystem. Design a deterministic runtime architecture that guarantees
  a 30 FPS processing pipeline, incorporating hardware-in-the-loop self-tests and watchdog timers, while
  ensuring that heterogeneous memory bandwidth contention never violates the strict 33.3ms safety deadline.
details:
  realistic_solution: Architect a statically scheduled, ahead-of-time compiled execution graph where the
    Hexagon NPU operates within a statically allocated, locked memory partition. Configure the SoC's system
    memory management unit (SMMU) to enforce strict bandwidth Quality of Service (QoS) guarantees for
    the NPU. Interleave lightweight Known-Answer Tests (KATs) directly into the NPU inference stream,
    paired with an independent, dedicated hardware watchdog timer that triggers a safe-state fallback
    if the NPU fails to signal completion within the 33.3ms window.
  common_mistake: Candidates often design a standard asynchronous pipeline relying on the Android/Linux
    OS scheduler, ignoring the non-deterministic nature of shared LPDDR5X memory access and CPU/GPU bus
    contention. They also frequently fail to deeply interleave deterministic self-test routines (like
    Known-Answer Tests) within the Hexagon execution graph, relying instead on generic software watchdogs
    that cannot meet ASIL-D fault detection time requirements.
  napkin_math: 'Target: 30 FPS (33.3ms deadline). A robust INT8 pedestrian detection model requires ~150
    GOPS per frame. Hexagon NPU compute time: 150 GOPS / 45,000 GOPS (45 TOPS peak) = 3.33ms. Memory footprint:
    12MB weights + 8MB I/O activations = 20MB per frame. Peak shared LPDDR5X bandwidth is ~68 GB/s. With
    a pessimistic 75% bandwidth starvation from CPU/GPU, effective NPU bandwidth is 17 GB/s. Memory latency:
    20MB / 17,000 MB/s = ~1.18ms. Total deterministic processing time per frame = 3.33ms (compute) + 1.18ms
    (memory latency) = 4.51ms. This leaves an ample 28.79ms slack budget per frame to execute interleaved
    runtime self-test routines and watchdog heartbeats without ever breaching the 33.3ms ISO 26262 deadline.'
