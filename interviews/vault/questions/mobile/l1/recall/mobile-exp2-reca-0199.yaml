id: mobile-exp2-reca-0199
title: Canary Release Definition for Tensor G3
topic: ab-rollout-strategies
status: published
provenance: imported
scenario: You are preparing a technical document on rollout strategies for a new mobile ML feature targeting
  devices with the Google Tensor G3. The Tensor G3 includes an on-device TPU delivering 7.5 TOPS and has
  12 GB LPDDR5X memory, optimized for models like Gemini Nano. For the deployment section, you need to
  clearly document the standard definition of a 'canary release'.
details:
  realistic_solution: A canary release is a deployment strategy where a new version of the model is gradually
    rolled out to a small subset of users (the 'canaries') before making it available to the entire user
    base. This minimizes the impact of potential bugs, crashes, or performance regressions on the Tensor
    G3 TPU.
  common_mistake: Candidates often confuse canary releases with A/B testing, incorrectly stating that
    canary releases are primarily for testing user engagement rather than safely rolling out updates to
    a small subset of devices first.
  napkin_math: 'Target devices: Google Tensor G3 with 12 GB LPDDR5X and 7.5 TOPS TPU. If a canary group
    is set to 5% of a 1,000,000 Daily Active User (DAU) base, exactly 1,000,000 * 0.05 = 50,000 devices
    will execute the new Gemini Nano model utilizing the 7.5 TOPS TPU, while 950,000 devices remain on
    the stable baseline.'
