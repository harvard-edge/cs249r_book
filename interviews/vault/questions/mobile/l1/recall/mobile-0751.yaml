id: mobile-0751
title: The ANE Efficiency Advantage
topic: roofline-analysis
status: published
provenance: imported
scenario: Your team is evaluating mobile SoCs for an always-on image classification app. The Apple A17
  Pro advertises 35 TOPS from its Neural Engine at a sustained power draw of approximately 5W. What is
  the compute efficiency in TOPS per watt, and why does this metric matter more than raw TOPS for a mobile
  device?
details:
  realistic_solution: 35 TOPS / 5W = 7 TOPS/W. On a mobile device, the binding constraint is the battery,
    not peak compute. A chip that delivers 7 TOPS/W means each watt of battery power yields 7 trillion
    INT8 operations per second. This is the metric that determines how many inferences you can run before
    the battery dies.
  common_mistake: Focusing only on peak TOPS without considering power. The Snapdragon 8 Gen 3 advertises
    73 TOPS but at similar power, so raw TOPS alone does not determine which chip is better for a battery-constrained
    workload.
  napkin_math: 'A17 Pro ANE: 35 TOPS / 5W = 7 TOPS/W. At 18.5 Wh battery, running the ANE at full power
    drains the battery in ~3.7 hours.'
