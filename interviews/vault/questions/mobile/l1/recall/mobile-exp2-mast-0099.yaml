schema_version: 1
id: mobile-exp2-mast-0099
title: On-Device LLM Active Learning Curation on Tensor G3
topic: dataset-curation
status: published
provenance: imported
scenario: You are designing an active learning and data curation pipeline for a privacy-preserving summarization
  feature running locally on the Google Tensor G3. To continuously improve the on-device Gemini Nano model
  without sending raw user data to the cloud, you must synthesize an architecture that selects and pseudo-labels
  difficult examples entirely on-device using a temporarily loaded secondary teacher model. Given the
  Tensor G3's 12 GB LPDDR5X RAM and 7.5 TOPS TPU, you must design the data annotation workflow, handle
  dataset bias, and calculate the compute feasibility of running this curation loop nightly during charging.
details:
  realistic_solution: The optimal architecture uses an asynchronous, on-device teacher-student setup triggered
    only when the device is idle and charging. A lightweight heuristic filters high-entropy user interactions
    during the day. At night, the OS unloads the standard Nano student model, loads a highly quantized
    3B parameter teacher model into the 12 GB LPDDR5X RAM, and generates high-quality pseudo-labels for
    the day's hard examples. These curated pairs are then used to compute gradients for federated learning.
  common_mistake: Candidates often propose sending raw user text to the cloud for human labeling, violating
    strict privacy constraints, or they ignore the memory and thermal bottlenecks of running inference
    on multiple LLMs simultaneously on a mobile device. They may also propose active learning strategies
    like Monte Carlo Dropout that require too many expensive forward passes, draining the battery.
  napkin_math: The Tensor G3 features 12 GB LPDDR5X RAM and a 7.5 TOPS TPU. An INT4 quantized 3B teacher
    model requires 3B * 0.5 bytes = 1.5 GB of memory, which easily fits within the 12 GB RAM footprint.
    Generating a 50-token pseudo-label requires roughly 3B * 2 * 50 = 300 GFLOPs per example. At 7.5 TOPS
    with a conservative 20% utilization (1.5 effective TOPS), labeling one example takes 300 / 1500 =
    0.2 seconds. Curating a daily dataset of 1000 hard examples takes 1000 * 0.2 = 200 seconds (under
    4 minutes), making it highly feasible for a nightly background task.
