id: mobile-0292
title: The Cost of Depthwise Separable Convolutions
topic: transformer-systems-cost
status: published
provenance: imported
scenario: You're profiling a CNN on a mobile device and notice a bottleneck. For a typical layer using
  a 3x3 kernel, approximately how much computationally cheaper is it to replace a standard convolution
  with a 3x3 depthwise separable convolution?
details:
  realistic_solution: A 3x3 depthwise separable convolution is roughly 8-9x cheaper than a standard 3x3
    convolution. This massive saving comes from decoupling the spatial filtering (depthwise step) from
    the channel combination (pointwise step). A standard convolution does both at once, resulting in a
    much higher computational cost proportional to `K*K*C_in*C_out`.
  common_mistake: Engineers often remember that depthwise separable convolutions are 'more efficient'
    but vastly underestimate the savings. They might guess it's a minor optimization like 2x, failing
    to recognize that the reduction factor is nearly K^2 (the kernel size squared).
  napkin_math: The cost reduction is approximately the square of the kernel size.
