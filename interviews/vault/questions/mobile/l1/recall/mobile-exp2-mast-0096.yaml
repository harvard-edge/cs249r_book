schema_version: 1
id: mobile-exp2-mast-0096
title: On-Device Data Pruning for Continual Learning
topic: data-efficiency-selection
status: published
provenance: imported
scenario: You are architecting an on-device continual learning pipeline for a personalized keyboard model
  running on the Apple A17 Pro Neural Engine. To strictly adhere to the ~5W power budget and avoid impacting
  foreground tasks, you must design a streaming data selection mechanism that filters user interactions
  based on the Information-Compute Ratio (ICR). Synthesize a framework that evaluates and prunes incoming
  data in real-time without overwhelming the shared 8 GB unified memory.
details:
  realistic_solution: Design a streaming data pipeline where a lightweight, heavily quantized INT8 proxy
    model calculates the ICR (e.g., via approximate gradient norms) for each interaction as it occurs.
    High-ICR samples are saved to a fixed-size ring buffer, while redundant data is immediately discarded.
    The 16-core Neural Engine then performs scheduled, batched fine-tuning exclusively on this highly
    informative subset, drastically reducing total compute and memory footprint.
  common_mistake: Candidates often propose complex coreset selection algorithms that require caching the
    entire user interaction history in the shared 8 GB unified memory, leading to memory pressure and
    OS-level app evictions. Additionally, they frequently ignore the compute overhead of the selection
    mechanism itself, sometimes designing proxy models that consume more power than the actual fine-tuning
    process saves.
  napkin_math: Assume scoring a sample takes 10 GOPS. With the A17 Pro delivering 35 TOPS (35,000 GOPS),
    scoring 5,000 daily interactions takes 50,000 GOPS / 35,000 GOPS/sec = ~1.4 seconds. If the ICR threshold
    prunes 90% of data, 500 samples remain. If fine-tuning requires 1,000 GOPS per sample, it takes 500,000
    GOPS. Total fine-tuning time is 500,000 GOPS / 35,000 GOPS/sec = ~14.3 seconds. Total compute time
    is ~15.7 seconds. At a ~5W power draw, energy consumed is 5W * 15.7s = 78.5 Joules per day. This demonstrates
    the pipeline must be scheduled as a background task rather than a real-time operation.
