id: mobile-fill-00393
title: Real-Time ML Inference and WCET Analysis on Snapdragon NPU for AR/VR
topic: real-time-deadlines
status: published
provenance: imported
scenario: You are leading the ML systems team for an augmented reality (AR) application on a mobile device
  powered by the Snapdragon 8 Gen 3 Hexagon NPU, which boasts 45 TOPS (Tera Operations Per Second) for
  INT8 inference and 12-16 GB of LPDDR5X memory. Your application performs a critical pose estimation
  model that must run within a 16ms frame budget to ensure a smooth, jank-free 60fps user experience.
  Failure to meet this deadline consistently could lead to severe motion sickness or ANR (Application
  Not Responding) timeouts. Describe your approach to architecting the ML inference pipeline, ensuring
  predictable real-time performance. Specifically, how would you address WCET (Worst-Case Execution Time)
  analysis for your model, prevent jank, and manage interrupt-driven processing to prioritize your ML
  workload while interacting with other system tasks?
details:
  realistic_solution: "Implement a robust real-time ML inference pipeline with:\n1.  **WCET Analysis:**\
    \ Utilize profiling tools specific to the Hexagon NPU (e.g., Qualcomm Neural Processing SDK profiler)\
    \ and conduct extensive stress testing across various device states (e.g., battery low, high thermal,\
    \ background tasks active) to determine and guard against worst-case execution times. Use techniques\
    \ like fixed-point arithmetic, quantization (INT8 is given), and model pruning to minimize WCET.\n\
    2.  **Jank Prevention:**\n    *   **Frame Budget Adherence:** Design the model and pipeline to fit\
    \ strictly within the 16ms budget, potentially using model splitting or early exit strategies.\n \
    \   *   **Asynchronous Processing:** Offload heavy pre/post-processing from the critical path using\
    \ dedicated DSPs or CPU threads, communicating via efficient IPC mechanisms.\n    *   **Dynamic Scheduling/Load\
    \ Balancing:** If multiple models or tasks are present, implement a real-time scheduler that can prioritize\
    \ the critical pose estimation and potentially offload less critical tasks or adjust model complexity\
    \ dynamically.\n    *   **Memory Management:** Pre-allocate memory, minimize dynamic allocations,\
    \ and optimize data transfer between CPU, GPU, and NPU to reduce latency and contention on the 12-16\
    \ GB LPDDR5X.\n3.  **Interrupt-Driven Pipelines:** Integrate the NPU inference into an interrupt-driven\
    \ system, where the NPU signals completion, allowing the CPU to resume critical tasks promptly. Ensure\
    \ proper priority inversion handling and minimal OS jitter. Leverage NPU-specific task management\
    \ features if available to guarantee latency.\n4.  **Hardware-Software Co-optimization:** Work closely\
    \ with hardware capabilities, using NPU-specific kernels and optimizing data layouts for the Hexagon\
    \ architecture."
  common_mistake: Neglecting comprehensive WCET analysis and relying solely on average latency metrics,
    leading to unpredictable jank under peak load or adverse system conditions. Another common mistake
    is not accounting for system overheads, memory contention, and thermal throttling effects on the NPU.
  napkin_math: "Given Snapdragon 8 Gen 3 Hexagon NPU with 45 TOPS INT8 (45 * 10^12 ops/sec):\n-   Target\
    \ frame rate = 60 fps, corresponding to a frame budget of 1/60 sec ≈ 16.67 ms.\n-   For a strict 16ms\
    \ ML inference budget:\n    -   Total theoretical operations budget per frame = (45 * 10^12 ops/sec)\
    \ * (0.016 sec/frame)\n    -   Total operations budget per frame = 720 * 10^9 ops/frame (720 Billion\
    \ operations per frame).\n-   This represents the absolute theoretical maximum. Actual effective operations\
    \ will be significantly lower due to factors like memory bandwidth, data transfer overheads, NPU utilization\
    \ efficiency, and thermal constraints. The model's actual INT8 MAC count must be well below this to\
    \ guarantee WCET adherence."
