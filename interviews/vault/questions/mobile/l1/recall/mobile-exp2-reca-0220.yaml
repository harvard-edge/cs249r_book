id: mobile-exp2-reca-0220
title: Edge Guardrail NPU Performance Recall
topic: responsible-ai
status: published
provenance: imported
scenario: You are filling out a Model Card for an on-device toxicity classifier deployed as a safety guardrail.
  The target deployment platform features a Qualcomm Hexagon NPU (Snapdragon 8 Gen 3) utilizing shared
  12-16 GB LPDDR5X memory. To properly document the hardware assumptions and latency constraints for the
  edge deployment, what is the advertised peak INT8 performance of this specific NPU?
details:
  realistic_solution: The correct answer is 45 TOPS. Accurately documenting the hardware specifications
    in the Model Card is essential for edge AI governance, ensuring that performance limits and potential
    latency bottlenecks in safety guardrails are well understood.
  common_mistake: Candidates often confuse the performance metrics of mobile NPUs with desktop GPUs, or
    they guess generic numbers instead of recalling the specific capabilities of current-generation mobile
    hardware.
  napkin_math: Given the Qualcomm Hexagon NPU's 45 TOPS INT8 performance, the theoretical peak is 45 trillion
    operations per second. If a guardrail model requires 0.5 GOPS per inference, the NPU could theoretically
    evaluate (45 * 10^12) / (0.5 * 10^9) = 90,000 requests per second, assuming it is entirely compute-bound
    and not limited by the shared LPDDR5X memory bandwidth.
