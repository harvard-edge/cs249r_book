id: mobile-0349
title: The Battery Price of Privacy
topic: power-budgeting
status: published
provenance: imported
scenario: Your automotive team is designing a driver-assistance feature that learns a driver's habits
  (e.g., preferred following distance) using federated learning on their smartphone, which connects to
  the car. The lead engineer is concerned about phone battery drain during a long drive and asks for the
  fundamental number to start their analysis. What is the typical *total power draw* of a modern smartphone
  SoC when it's actively running an ML workload?
details:
  realistic_solution: A modern smartphone SoC, like an Apple A17 Pro or Snapdragon 8 Gen 3, will consume
    around 3 to 5 Watts when under an active ML load. This is the total power for the System-on-Chip,
    which is the key number for estimating battery drain for features like on-device training or continuous
    inference.
  common_mistake: Engineers often confuse the power draw of the entire SoC with just the NPU, or they
    use numbers from other scales. A mobile SoC is a complex, integrated system, and while its NPU is
    efficient, the total power draw is significant. Mistaking it for a TinyML device's milliwatt draw
    or an edge device's tens-of-watts draw leads to calculations that are off by orders of magnitude.
  napkin_math: From the playbook's reference numbers, total active SoC power for mobile is 3W–5W. A typical
    smartphone battery has a capacity of ~15 Watt-hours (e.g., 4000mAh @ 3.8V).
