schema_version: 1
id: mobile-0099
title: The Hidden Broadcast Receiver Wake-Ups
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: You deploy a background service on Android to run inference on incoming SMS messages (for phishing
  detection). The model is tiny and takes 2ms on the CPU. A user receives 10 texts a day. The ML math
  therefore takes 20ms of CPU time per day. However, Google Play Console shows your app is in the top
  1% of battery drainers. What OS-level event sequence is destroying the battery?
details:
  realistic_solution: 'Cold app boot on every SMS broadcast. Sequence: SMS -> BroadcastReceiver -> Android
    cold-starts process (DEX, runtime, ML model) = 2.5s at 3W = 7.5J. Inference: 2ms at 1W = 0.002J. The
    OS startup is 3,750x more expensive. 10 texts/day x 7.5J = 75J/day = major drain. Fix: (1) persistent
    foreground service (one boot, many inferences), (2) batch with WorkManager on 15-min schedule, or
    (3) move model to a ContentProvider that stays resident.'
  common_mistake: '"The ML model has a memory leak." Memory leaks don''t drain batteries, CPU cycles do.'
  napkin_math: ML Inference = 2ms at 1 Watt = 0.002 Joules. App Boot + ML Init = 2.5 seconds at 3 Watts
    = 7.5 Joules. The OS startup tax is 3,750 times more expensive than the neural network.
