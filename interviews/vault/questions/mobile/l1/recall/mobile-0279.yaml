title: The Federated Learning Litmus Test
topic: federated-learning
status: published
provenance: imported
scenario: An automotive company wants to improve its driver-drowsiness detection model by learning from
  video snippets captured in its global fleet of vehicles. From a systems perspective, state the *primary*
  motivation for using a Federated Learning (FL) approach instead of centrally collecting all the data.
details:
  realistic_solution: The primary motivation is **user privacy**. Regulations like GDPR and CCPA, along
    with intense user sensitivity, make it legally and ethically untenable to collect and store video
    data from inside a person's private vehicle. Federated Learning is a privacy-preserving architecture
    that allows the model to be updated using local data without the raw, sensitive data ever leaving
    the car.
  common_mistake: Confusing the primary, non-negotiable driver (privacy) with significant secondary benefits
    (like bandwidth savings) or implementation challenges (like model accuracy). While other factors are
    important, the fundamental reason FL exists is to avoid centralizing raw user data.
  napkin_math: 'Consider the data scale: A fleet of 100,000 cars, each capturing just 1 minute of compressed
    video snippets per day (~5 MB), would generate:'
