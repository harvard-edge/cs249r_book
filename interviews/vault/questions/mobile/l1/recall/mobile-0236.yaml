title: The Million-Car Update
topic: tco-cost-modeling
status: published
provenance: imported
scenario: You are a Staff ML Engineer at a connected car company. Your team wants to A/B test a new, more
  capable driver-assistance model. The new model is 50MB larger than the current production model. The
  experiment will roll out to a test fleet of 1 million vehicles over their built-in cellular connections.
  When evaluating the Total Cost of Ownership (TCO) for this single experiment, which of the following
  costs should you identify as the most significant and immediate financial factor?
details:
  realistic_solution: The cellular data transfer cost for the fleet. A seemingly small 50MB update per
    vehicle becomes a massive operational expense at the scale of one million vehicles. This cost is direct,
    immediate, and often far exceeds the one-time cost of training the model or the engineering effort
    to deploy it.
  common_mistake: Engineers often fixate on their direct costs, like cloud compute for training or their
    own salaries for development. They forget that in mobile deployments, 'last-mile' operational costs
    that are small per-user (like data transfer) become astronomically large when multiplied by millions
    of users.
  napkin_math: The core task is to recognize the multiplicative effect of scale.
