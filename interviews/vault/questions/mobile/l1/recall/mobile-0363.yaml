id: mobile-0363
title: The Federated Learning Cost Advantage
topic: federated-learning
status: published
provenance: imported
scenario: Your team is building a new personalized emoji suggestion feature for a mobile keyboard app
  with 1 million daily users. To train the model, you could upload all raw user keystroke logs, or you
  could use Federated Learning to train on-device and only upload the small model updates. From a Total
  Cost of Ownership (TCO) perspective, what is the primary economic advantage of using Federated Learning?
details:
  realistic_solution: The primary economic advantage is the drastic reduction in network, storage, and
    processing costs. By keeping raw data on the user's device, you avoid paying to upload, store, and
    process terabytes of sensitive user data in the cloud. You only transmit small, aggregated model updates,
    which can be orders of magnitude cheaper.
  common_mistake: Engineers often assume the main benefit of Federated Learning is privacy, which it is,
    but they underestimate the massive, direct economic impact. They might also mistakenly believe FL
    is faster or that its primary cost saving is in avoiding server-side training compute, rather than
    the gargantuan cost of data ingress, storage, and egress at scale.
  napkin_math: '1. Centralized Method: 1M users * 1MB/day = 1,000,000 MB = 1,000 GB/day. Cost = 1,000
    GB * $0.05 = $50/day ($18,250/year). 2. Federated Learning (FL): 1M users * 100KB gradient = 100,000,000
    KB = 100 GB/day. Cost = 100 GB * $0.05 = $5/day ($1,825/year). 3. Trade-off: FL saves $16,425 annually
    and protects user privacy by avoiding raw text uploads, though it requires complex on-device training.'
