schema_version: 1
id: mobile-0699
title: The CoreML Multi-Array Pre-allocation
topic: real-time-deadlines
status: published
provenance: imported
scenario: You run a CoreML video processing pipeline at 60 FPS on iOS. The model prediction takes 5ms.
  However, the Instruments profiler shows your app is constantly triggering the OS memory allocator and
  occasionally dropping frames due to memory spikes. You are creating a new `MLMultiArray` for the output
  every frame. How do you stop this memory allocation overhead?
details:
  realistic_solution: 'Creating a new MLMultiArray every frame triggers 600 MB/s of allocation churn (10
    MB tensor x 60 FPS). The memory allocator fragments the heap, causing occasional GC spikes that drop
    frames. Fix: use MLPredictionOptions with pre-allocated output backing buffers. Create the MLMultiArray
    once at initialization, then pass it via predictionOptions.outputBackings for every prediction call.
    CoreML writes directly into your pre-allocated buffer, reducing allocation churn to zero. This eliminates
    frame drops and reduces average frame time by 2-3ms from avoided malloc/free overhead.'
  common_mistake: '"You can''t; CoreML always returns a new object." You can force it to reuse memory
    if you use the right API.'
  napkin_math: Allocating and freeing a 10 MB tensor 60 times a second = 600 MB/s of pure memory allocation
    churn. Pre-allocating it drops the memory churn to exactly 0 MB/s.
