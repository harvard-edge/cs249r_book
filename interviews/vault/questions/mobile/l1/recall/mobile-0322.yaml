schema_version: 1
id: mobile-0322
title: The Mobile Memory Budget
topic: federated-learning
status: published
provenance: imported
scenario: You're A/B testing a new on-device personalization model. The 'B' variant is showing higher
  engagement but also a significant increase in memory usage. To avoid having your app terminated by the
  operating system, what is the generally accepted maximum memory budget for a single application relative
  to the total device RAM?
details:
  realistic_solution: The standard rule of thumb is that a single application should not exceed **~25%**
    of the total device RAM. On a typical 8 GB device, this translates to a hard limit of about 2 GB.
    Exceeding this budget significantly increases the risk of the OS terminating the app to reclaim resources,
    which is a critical failure for user experience and retention.
  common_mistake: Engineers, especially those from a cloud or desktop background, often assume a much
    larger portion of the device's RAM is available to their single application. They might guess 50%
    or even 75%, failing to account for the memory required by the OS, background services, and other
    apps. This leads to apps that are frequently terminated by the OS under memory pressure, resulting
    in a poor user experience and skewed A/B test results.
  napkin_math: '`device_RAM` × `budget_ratio` = `app_limit`'
