schema_version: 1
id: mobile-0309
title: The 25% Rule for Mobile Memory
topic: memory-hierarchy-design
status: published
provenance: imported
scenario: You're scoping a new on-device feature for a flagship smartphone that has 8 GB of total RAM.
  To ensure a smooth user experience and avoid your app process being terminated by the operating system
  under memory pressure, what is the generally accepted maximum memory budget for your ML model and its
  associated runtime?
details:
  realistic_solution: The correct rule of thumb is to budget no more than 25% of the total device RAM
    for your ML feature. On an 8 GB device, this gives you a 2 GB budget. This conservative figure accounts
    for the significant memory overhead of the OS, other apps, and background processes, ensuring your
    feature can run reliably without jeopardizing overall system stability.
  common_mistake: Engineers often underestimate the memory consumed by the operating system, the main
    application UI, and other background services. They might assume that most of the device's RAM is
    available to their feature, leading them to design models that are too large, causing the app to be
    frequently killed by the OS (a major source of poor user reviews).
  napkin_math: 'Total Device RAM: 8 GB | Rule of Thumb Ratio: 0.25 (or 25%) | Memory Budget = 8 GB * 0.25
    = 2 GB'
