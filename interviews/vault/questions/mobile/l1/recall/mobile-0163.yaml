schema_version: 1
id: mobile-0163
title: The Mobile Memory Wall
topic: memory-hierarchy-design
status: draft
provenance: imported
scenario: An audio processing model on a smartphone needs to apply a filter in real-time. The filter coefficients
  are stored in main system memory (LPDDR5). Roughly how much slower is fetching those coefficients from
  DRAM compared to accessing a value already in the CPU's L1 cache?
details:
  realistic_solution: Accessing main system LPDDR5 DRAM is approximately 100 times slower than accessing
    the L1 cache. L1 cache latency is around 1 ns, while LPDDR5 latency is about 100 ns. This significant
    gap is the 'memory wall' and is a primary driver for using on-chip memory (SRAM) and specialized data
    paths in mobile NPUs.
  common_mistake: Engineers often underestimate the off-chip latency penalty on mobile SoCs, thinking
    it's a small factor like 5-10x. They fail to internalize that leaving the silicon die is a major time
    and energy event, which is why mobile NPUs have significant amounts of on-chip SRAM.
  napkin_math: Assume an L1 cache hit latency is roughly 1ns, while fetching data from LPDDR5 DRAM takes
    about 100ns. The relative slowdown is 100ns / 1ns = 100x. If we scale this to human time where an
    L1 access feels like 1 second, waiting for DRAM takes 100 seconds (1 minute and 40 seconds). This
    requires tight latency loops.
