id: mobile-0191
title: The Quantization Memory Payoff
topic: quantization-fundamentals
status: published
provenance: imported
scenario: You are tasked with deploying a 7-billion parameter language model on a high-end mobile device.
  To reduce its memory footprint, you decide to quantize the model weights from FP16 to INT8. What is
  the final memory requirement for the model's weights after this quantization?
details:
  realistic_solution: INT8 representation uses exactly one byte for every parameter. Therefore, a 7-billion
    parameter model requires 7 GB to store its weights. This is a 50% reduction from the 14 GB required
    for FP16, but it is still far too large for a typical mobile application memory budget (often <2GB).
  common_mistake: A frequent mistake is to confuse the reduction factor, applying a 4x saving (common
    for FP32-to-INT8) instead of the correct 2x saving for FP16-to-INT8. Another error is to state the
    original FP16 size (14 GB) or to be off by an order of magnitude, underestimating the large size of
    modern LLMs.
  napkin_math: 'Using the standard memory conversion rule, 1 Billion parameters equals 2GB in FP16 (2
    bytes per parameter). A 7-billion parameter model in FP16 requires 7 * 2GB = 14GB of memory. By quantizing
    from FP16 to INT8 (1 byte per parameter), the memory footprint is strictly halved: 14GB / 2 = 7GB
    of storage.'
