id: mobile-0769
title: The Replay Buffer Memory Budget
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: You are designing a continuous learning system for a mobile recommendation model. The system
  maintains a replay buffer of 10,000 past interactions stored as 768-dimensional FP16 embeddings plus
  64 bytes of metadata per sample. Calculate the buffer size and design a memory-aware eviction policy
  that prevents unbounded growth on a memory-constrained device.
details:
  realistic_solution: 'Buffer size: 10,000 x (768 x 2 + 64) = 10,000 x 1,600 bytes = 16 MB. Eviction policy:
    (1) Hard cap at 16 MB / 10K samples, (2) reservoir sampling to maintain distribution representativeness,
    (3) priority eviction based on prediction confidence (remove easy examples first), (4) class-balanced
    eviction to prevent catastrophic forgetting of rare categories.'
  common_mistake: Storing raw input data (images, text) in the replay buffer instead of compact embeddings.
    A single 224x224 image in FP32 is 600 KB, while its 768-dim FP16 embedding is only 1.5 KB, a 400x
    compression that makes replay buffers feasible on mobile.
  napkin_math: 'Per sample: 768 dims x 2 bytes + 64 bytes metadata = 1,600 bytes. Buffer: 10K x 1.6 KB
    = 16 MB. Compare: 10K raw images at 600 KB = 6 GB. Embedding replay is 375x more memory-efficient.'
