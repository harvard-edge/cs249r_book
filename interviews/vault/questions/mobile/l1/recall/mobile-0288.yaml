id: mobile-0288
title: The Drowsy Driver's Dilemma
topic: power-budgeting
status: published
provenance: imported
scenario: Your team is developing a 'Drowsiness Detection' feature for a ride-sharing driver app. It runs
  a small audio model on-device to listen for yawns. The feature must run continuously in the background
  during a driver's 8-hour shift without causing unacceptable battery drain. Which of the following factors
  is the MOST critical lever for managing the total battery energy consumed by this feature over the entire
  shift?
details:
  realistic_solution: The `duty_cycle` is the most critical lever. This is the fraction of time the inference
    is active. Reducing the duty cycle (e.g., by running a 1-second inference every 10 seconds instead
    of continuously) directly and linearly reduces total energy consumption. For a long-running background
    task, managing this is paramount to delivering a feature that users don't disable due to battery drain.
  common_mistake: Engineers often focus exclusively on the model's inference power (P_inference), believing
    that making the model faster or smaller is the only solution. While important, they forget that for
    a feature running over many hours, *how often* it runs is just as, if not more, critical than *how
    much power* it uses per run.
  napkin_math: '1. Active Power: The ML inference on the mobile SoC draws 2W continuously. 2. Shift Duration:
    8 hours = 28,800 seconds. 3. Energy Consumed: 2W * 8h = 16 Watt-hours (Wh). 4. Battery Capacity: A
    standard phone battery is ~18.5 Wh. 5. Drain Impact: 16 Wh / 18.5 Wh = 86.5% battery drain over an
    8-hour shift just from the ML model. This is unacceptable and requires extreme duty cycling or quantization.'
