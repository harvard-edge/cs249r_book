id: mobile-0159
title: The Unified Memory Trap
topic: memory-hierarchy-design
status: published
provenance: imported
scenario: A 7B parameter LLM, requiring 14 GB of memory in FP16, runs on a cloud GPU. A product manager
  asks why you can't run the same model on a flagship smartphone that has 12 GB of RAM. Identify the fundamental
  hardware difference that makes this infeasible.
details:
  realistic_solution: 'The core issue is that mobile devices use a Unified Memory Architecture. The 12
    GB of RAM is not dedicated to the ML accelerator; it''s shared by the entire system: the CPU, GPU,
    NPU, OS kernel, and all other running applications. A single app is typically only allowed to use
    a fraction of this (e.g., ~3 GB on a 12 GB device) before the OS will terminate it to preserve system
    stability.'
  common_mistake: The most common mistake is to confuse total system RAM with dedicated accelerator VRAM.
    Cloud GPUs have large, private, high-bandwidth memory (HBM) pools (e.g., 80 GB on an H100). Mobile
    SoCs use a Unified Memory Architecture (UMA) where the CPU, GPU, and NPU all share the same physical
    DRAM pool with the operating system. There is no large, dedicated 'VRAM' for the NPU.
  napkin_math: 'Total System RAM: 12 GB | Realistic App Budget: 12 GB × 0.25 ≈ 3 GB | Model Size: 14 GB
    | Result: 14 GB > 3 GB. The model is over 4.5x larger than the entire memory budget for the app.'
