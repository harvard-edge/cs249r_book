id: mobile-0142
title: The Fusion Tax
topic: kernel-fusion
status: published
provenance: imported
scenario: You're optimizing a small CNN on a mobile device. You notice that the profiler shows many small,
  back-to-back operations running on the NPU. When a framework like Core ML or TensorFlow Lite applies
  operator fusion, what is the primary hardware cost it aims to reduce?
details:
  realistic_solution: The primary cost reduced by fusion is memory access overhead. By merging sequential
    operators (e.g., Conv -> ReLU) into a single kernel, intermediate results (the output of the Conv)
    can be kept in the NPU/GPU's fast on-chip SRAM or registers and immediately consumed by the next operation
    (ReLU). This avoids a slow and power-expensive round-trip to the main system DRAM (LPDDR5), which
    is orders of magnitude slower and more energy-hungry than on-chip memory.
  common_mistake: Engineers often assume fusion reduces the computational workload (FLOPs). It doesn't.
    The number of calculations remains the same. The win comes from eliminating the overhead *between*
    the calculations, which is dominated by memory traffic and kernel launch latency on mobile SoCs.
  napkin_math: 'Unfused Conv -> ReLU: Conv output is written to mobile DRAM. 1MB tensor write + read at
    ~100pJ per byte (LPDDR5) = 200,000 nJ. Compute cost: 1M MACs at 0.1pJ = 100 nJ. DRAM access is 2,000x
    more expensive than compute! Fusing keeps the activation in NPU SRAM, saving ~200 uJ of energy and
    ~100us latency per layer.'
