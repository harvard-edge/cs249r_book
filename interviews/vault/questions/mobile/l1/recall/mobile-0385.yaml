id: mobile-0385
title: The Mobile 'Jank' Budget
topic: real-time-deadlines
status: published
provenance: imported
scenario: You're designing a real-time text completion feature for a new smartphone keyboard. The feature
  uses an on-device language model to suggest the next word as the user types. To ensure the UI remains
  perfectly smooth and never 'stutters' or 'janks,' what is the approximate latency budget your model
  inference must meet to update the display in a single screen refresh cycle?
details:
  realistic_solution: The latency budget is approximately 16ms. Most mobile displays refresh at 60Hz,
    meaning a new frame is drawn every 16.67ms (1000ms / 60). To avoid 'jank' (a missed frame), any computation
    that blocks the UI, such as model inference for a real-time suggestion, must complete well within
    this window. Exceeding this budget means the user perceives a delay and the application feels unresponsive.
  common_mistake: Engineers often confuse backend latency budgets with the much stricter requirements
    of a mobile UI. A typical cloud service might have a 100ms latency target (P99), but on a mobile device,
    any task that blocks the main UI thread for that long will cause multiple missed frames, resulting
    in obvious, jarring stutter.
  napkin_math: 'Screen Refresh Rate: 60 Hz (standard for many mobile devices)'
