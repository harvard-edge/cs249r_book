id: mobile-0255
title: The Mobile Power Chasm
topic: power-budgeting
status: published
provenance: imported
scenario: Your team is designing an always-on ML feature for a smartphone. To estimate the impact on battery
  life, you must know the power characteristics of the hardware. State the approximate ratio of power
  consumption for a mobile SoC running active inference compared to when it is in a deep sleep state.
details:
  realistic_solution: The power consumption ratio is enormous, typically on the order of 500,000-to-1
    or greater. A modern mobile SoC under a heavy ML load can consume around 5 Watts, whereas its deep
    sleep power can be as low as 10 microwatts. This vast difference, or 'power chasm', is the single
    most important constraint driving the architecture of battery-powered ML systems.
  common_mistake: Engineers often underestimate this ratio, thinking it's only in the 100-1,000x range.
    This fundamental misunderstanding leads to overly aggressive background processing, which quickly
    drains the user's battery and results in the feature being disabled or the app being uninstalled.
    They fail to internalize that on mobile, 'off' is a radically different state than 'idle'.
  napkin_math: 'Active Inference Power: ~5 W (from ''Mobile SoC Active'' constant).'
