schema_version: 1
id: mobile-exp2-mast-0102
title: On-Device Real-Time Translation Architecture for Tensor G3
topic: encoder-decoder-tradeoffs
status: published
provenance: imported
scenario: You are designing a low-latency, on-device real-time translation system powered by the Google
  Tensor G3. The product requirements demand a translation latency of under 100ms per utterance while
  running continuously. Given the Tensor G3's on-device TPU with 7.5 TOPS and 12 GB LPDDR5X memory shared
  with the OS, you must synthesize a novel architecture that balances the tradeoffs between encoder-only,
  decoder-only, and encoder-decoder paradigms. How do you design the model architecture, and how do you
  map its execution to the hardware to guarantee the latency SLA?
details:
  realistic_solution: The optimal architecture is a highly asymmetric encoder-decoder system or a tailored
    decoder-only model like Gemini Nano with speculative decoding. For translation, a deep encoder processes
    the full context in parallel, maximizing the 7.5 TOPS TPU utilization. The decoder must be extremely
    shallow (e.g., 1 or 2 layers) and heavily quantized (e.g., INT4) to minimize memory bandwidth during
    the autoregressive generation phase, ensuring the 100ms SLA is met.
  common_mistake: Candidates often default to a standard symmetric encoder-decoder Transformer (like a
    small T5) without considering the autoregressive decoding memory-bandwidth bottleneck on mobile. They
    frequently focus only on the 7.5 TOPS compute metric and fail to account for the memory bandwidth
    constraints of the 12 GB LPDDR5X during token generation.
  napkin_math: Assume LPDDR5X provides roughly 50 GB/s of practical memory bandwidth. A symmetric 1B parameter
    model at INT4 requires ~0.5 GB for weights. Autoregressive generation of 10 tokens requires loading
    the full weights 10 times, moving 5 GB of data. At 50 GB/s, memory transfer alone takes 100ms, leaving
    0ms for compute/encoder phase. By creating an asymmetric design where the decoder is only 100M parameters
    (50 MB at INT4), generating 10 tokens moves 0.5 GB of data (10ms). The 900M parameter encoder processes
    a 50-token prompt in a single pass (moving ~0.45 GB, taking 9ms), well within the 7.5 TOPS compute
    budget and leaving 81ms of margin for the 100ms SLA.
