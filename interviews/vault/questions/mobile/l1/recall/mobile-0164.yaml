id: mobile-0164
title: The App Budget Constraint
topic: vram-budgeting
status: published
provenance: imported
scenario: You're trying to ship a new generative AI feature in your app. The model has 750 million parameters.
  Using half-precision floating point (FP16), what is the memory footprint of just the model's weights?
details:
  realistic_solution: For inference, each FP16 parameter requires 2 bytes of storage. Therefore, a 750
    million parameter model will consume 750M * 2 bytes = 1.5 billion bytes, or 1.5 GB. This is a critical
    first calculation for mobile deployment, as this footprint must fit within the app's overall memory
    budget, which is typically only a fraction of the phone's total RAM.
  common_mistake: A common mistake is to use the wrong multiplier. Some candidates recall the 16-byte-per-parameter
    rule, but that's for training with the Adam optimizer. Others might misremember the size of an FP16
    value and use 4 bytes (for FP32) or 1 byte (for INT8), leading to an answer that is off by a factor
    of two.
  napkin_math: 'Model Parameters: 750,000,000 | Bytes per Parameter (FP16): 2 | Memory for Weights: 750,000,000
    params * 2 bytes/param = 1,500,000,000 bytes = 1.5 GB. On a typical 8 GB phone, the app budget is
    ~2 GB, so this model already consumes 75% of the budget before even accounting for activations.'
