schema_version: 1
id: mobile-fill-00430
title: Optimizing On-Device Object Detection Latency on Tensor G3
topic: profiling-bottleneck-analysis
status: published
provenance: imported
scenario: Your team has deployed a new real-time object detection model on Google Pixel phones powered
  by the Google Tensor G3 chip. The model is designed for a critical AR application that processes high-resolution
  video frames (e.g., 4K input). Initial user reports indicate intermittent, but significant, latency
  spikes during inference, making the AR experience janky. The Tensor G3 features a 7.5 TOPS on-device
  TPU and 12 GB LPDDR5X RAM. You are tasked with identifying and resolving the primary bottleneck causing
  these latency issues.
details:
  realistic_solution: The first step involves utilizing on-device profiling tools specific to the Tensor
    G3 (e.g., Android GPU Inspector, Perfetto for system-wide tracing, or custom instrumentation within
    the TensorFlow Lite runtime). The goal is to generate detailed traces and flame graphs to visualize
    where time is spent. Pay close attention to data movement between CPU and TPU, memory access patterns,
    and the execution times of individual model layers or pre/post-processing steps. If data transfer
    is a bottleneck, consider zero-copy techniques or optimizing data layout. If CPU pre-processing is
    the issue, offload to dedicated DSPs/NPUs if available, or optimize using SIMD instructions. If it's
    TPU bound, examine layer-wise execution and potentially explore mixed-precision inference or further
    model optimization. Thermal throttling should also be monitored via system metrics.
  common_mistake: A common mistake is to immediately jump to optimizing the model architecture (e.g.,
    pruning, quantization) or switching to a lighter model without thoroughly profiling the entire inference
    pipeline. The bottleneck might not be the model's raw compute on the TPU but rather data transfer
    (e.g., from RAM to TPU), I/O (e.g., reading video frames), pre-processing overhead on the CPU, or
    even system-level issues like thermal throttling impacting sustained performance.
  napkin_math: Assuming a target latency of 30 ms per frame for real-time 30 FPS video, the model must
    process frames within this budget. If a 4K frame (3840x2160 pixels) needs to be processed, and each
    pixel requires a certain number of operations, we can estimate theoretical TOPS needed. For example,
    if the model requires 100 GMACs (Giga Multiply-Accumulate Operations) per inference, and a MAC typically
    translates to 2 operations (multiply and add), that's 200 Giga Operations. With the Tensor G3's 7.5
    TOPS (7500 Giga Operations per second), the theoretical inference time would be 200 / 7500 = ~26.7
    ms, which *seems* acceptable on paper. However, this calculation assumes 100% TPU utilization and
    ignores overhead. The discrepancy between this theoretical value and observed spikes (e.g., 100ms+)
    points towards non-compute bottlenecks like memory bandwidth. If 4K frames (e.g., 24-bit RGB) are
    3840*2160*3 bytes = ~24.8 MB, moving this data to/from memory at 100 MB/s would take 24.8/100 = 248
    ms, clearly exceeding the budget. LPDDR5X typically offers much higher bandwidth (e.g., 50-70 GB/s),
    so the bottleneck might be related to *inefficient* access patterns or contention rather than raw
    bandwidth, or even CPU-side copying before being handed to the TPU driver.
