scenario: You're reviewing a pull request for a new feature on a mobile app that needs to run a real-time
  object detection model. A junior engineer has implemented a core layer using a standard 3x3 convolution.
  What is the primary reason you would ask them to refactor this to use a depthwise separable convolution
  instead?
details:
  realistic_solution: 'The primary benefit is a massive reduction in computational cost (Multiply-Accumulate
    operations, or MACs). A standard convolution performs spatial and channel-wise filtering in a single,
    costly step. Depthwise separable convolutions factor this into two, much cheaper steps:'
  common_mistake: 'Engineers often forget the sheer scale of the computational reduction. They might think
    it''s a minor optimization like a 20-30% improvement, but it''s typically closer to an order of magnitude
    (8-9x fewer MACs). This is often the difference between running at a smooth 30 FPS versus a sluggish
    3 FPS on a mobile processor. Another common error is believing the goal is to improve accuracy, when
    it''s actually a trade-off: sacrificing a small amount of accuracy for a massive gain in efficiency.'
