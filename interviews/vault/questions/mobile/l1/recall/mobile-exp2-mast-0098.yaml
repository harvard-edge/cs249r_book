schema_version: 1
id: mobile-exp2-mast-0098
title: On-Device Data Validation for Continuous Learning
topic: data-quality-validation
status: published
provenance: imported
scenario: You are designing an on-device data quality validation system for a continuous learning vision
  model running on the Samsung Exynos 2400 NPU. The system must filter and validate incoming camera stream
  frames (1080p at 30fps) for training data collection without interrupting the primary real-time inference
  task. The Exynos 2400 provides 34.7 TOPS across its dual-core NPU and shares 12 GB of LPDDR5X memory
  with the CPU, GPU, and ISP. Design a lightweight anomaly detection and schema validation pipeline that
  guarantees high-quality data ingestion while strictly bounding memory bandwidth and NPU utilization
  to avoid starving the main application.
details:
  realistic_solution: Design a multi-stage gating system. Stage 1 utilizes cheap ISP-level heuristics
    (blur, exposure) to drop poor frames immediately. Stage 2 runs a heavily quantized (INT8) mobile-optimized
    feature extractor on the Exynos 2400 NPU (using one core at a low frequency to save power) on a downsampled
    image, computing embedding distances against a core-set of valid schemas to detect anomalies. Validated
    high-value frames are then compressed and written to a ring buffer in the shared 12 GB memory for
    asynchronous upload or on-device fine-tuning.
  common_mistake: Candidates often propose running complex, heavy anomaly detection models (e.g., large
    autoencoders) directly on every frame, ignoring the severe memory bandwidth constraints of a shared
    LPDDR5X architecture. They also frequently fail to account for the impact of moving 1080p uncompressed
    frames constantly between the ISP, NPU, and CPU.
  napkin_math: For 1080p (1920x1080x3 bytes = ~6.2 MB/frame) at 30fps, raw throughput is 186 MB/s. If
    the main inference task consumes 20 TOPS out of the 34.7 TOPS available, 14.7 TOPS remain. A lightweight
    anomaly detection model (e.g., MobileNetV3-small feature extractor) requires ~0.1 GOPS per downsampled
    frame (224x224). Running it at 5 fps for sampling requires only 0.5 GOPS (0.0005 TOPS), easily fitting
    within the remaining NPU budget. The 186 MB/s raw stream heavily taxes shared memory bandwidth; downsampling
    in the ISP to 224x224 (150 KB/frame) and sampling at 5fps reduces the memory read/write bandwidth
    for validation to just 0.75 MB/s, preserving the LPDDR5X bandwidth for the CPU/GPU.
