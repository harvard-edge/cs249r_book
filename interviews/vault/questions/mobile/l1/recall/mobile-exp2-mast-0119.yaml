id: mobile-exp2-mast-0119
title: Hardware-Aware NAS for Video Segmentation on Exynos 2400
topic: neural-architecture-search
status: published
provenance: imported
scenario: You are designing a real-time video segmentation model (60 FPS at 1080p) that will run exclusively
  on the Samsung Exynos 2400 NPU. The NPU provides 34.7 TOPS across its dual cores, but it shares the
  12 GB LPDDR5X memory bandwidth with the CPU, GPU, and ISP, meaning your memory bandwidth is highly constrained
  during active camera use. Design a hardware-aware Neural Architecture Search (NAS) strategy that optimizes
  for both latency and memory access, ensuring the NPU's compute utilization remains high without stalling
  on memory fetches.
details:
  realistic_solution: A strong candidate will propose a latency-and-bandwidth-aware NAS search space that
    explicitly penalizes memory-bound operations like depthwise convolutions in early high-resolution
    stages. They will suggest a roofline-model-guided search that incorporates the shared memory bandwidth
    constraint, prioritizing operations with high arithmetic intensity. Furthermore, they will utilize
    supernet training with a latency predictor that factors in the dynamic bandwidth availability of the
    shared LPDDR5X memory system.
  common_mistake: Candidates often focus solely on minimizing FLOPs or parameter count without accounting
    for memory bandwidth bottlenecks on shared memory architectures. They might propose standard latency-constrained
    NAS using lookup tables (LUTs) without realizing that concurrent ISP and GPU memory traffic on the
    12 GB LPDDR5X bus will invalidate static NPU latency measurements.
  napkin_math: For 60 FPS video at 1080p, the latency budget per frame is 16.6 ms. The Exynos 2400 NPU
    provides 34.7 TOPS; over 16.6 ms, this gives a theoretical peak of 576 GOPS available per frame. Assuming
    the shared LPDDR5X provides ~60 GB/s total bandwidth, and the ISP/GPU consumes 40 GB/s during 60FPS
    video capture, only 20 GB/s is left for the NPU. Over 16.6 ms, the NPU can only fetch ~332 MB of data
    (activations + weights). To fully utilize 576 GOPS with only 332 MB of memory traffic, the target
    architecture must have an arithmetic intensity of at least 1.73 OPS/byte (576 GOPS / 332 MB) to avoid
    memory-bound stalls, heavily constraining the NAS search space towards compute-dense blocks.
