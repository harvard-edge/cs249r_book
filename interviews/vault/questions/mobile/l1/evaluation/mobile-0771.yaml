id: mobile-0771
title: The Federated Gradient Compression Trade-Off
topic: collective-communication
status: published
provenance: imported
scenario: In your federated learning system, 100 mobile devices each produce a 50 MB gradient update per
  round. The team applies 10x gradient compression (top-k sparsification + quantization). Calculate the
  per-round upload volume and analyze the convergence trade-off of aggressive compression.
details:
  realistic_solution: 'Uncompressed: 100 x 50 MB = 5 GB per round. With 10x compression: 100 x 5 MB =
    500 MB per round. At 10 Mbps upload, each device takes 4 seconds instead of 40 seconds. Trade-off:
    convergence may require 2-3x more rounds (200-300 vs 100), but total communication drops from 500
    GB to 100-150 GB across the full training run. Net win if upload bandwidth is the bottleneck.'
  common_mistake: Assuming compression is lossless. Top-k sparsification discards 90% of gradient components,
    which can slow convergence by 2-5x in rounds needed, partially offsetting the communication savings.
    The net benefit depends on whether communication or computation is the bottleneck.
  napkin_math: 'Uncompressed: 100 devices x 50 MB = 5 GB/round. Compressed (10x): 500 MB/round. Upload
    time: 5 MB / 1.25 MB/s = 4s vs 40s. If convergence needs 2.5x rounds: total = 500 MB x 250 = 125 GB
    vs 5 GB x 100 = 500 GB. 4x total savings.'
