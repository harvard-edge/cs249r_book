schema_version: 1
id: mobile-0768
title: The On-Device RLHF Memory Wall
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: You are implementing on-device RLHF for a mobile assistant. The policy model is 3B params (INT4
  = 1.5 GB) and you need a 1B parameter reward model (INT8 = 1 GB) to score responses. Both must be in
  memory simultaneously during training. On a device with 8 GB unified memory, is this feasible? What
  are the memory stacks involved?
details:
  realistic_solution: 'Policy weights: 1.5 GB. Reward model: 1.0 GB. Policy optimizer (AdamW states for
    LoRA, ~50M trainable params): 50M x 8 bytes = 400 MB. Policy activations + gradients: ~300 MB (with
    checkpointing). Reward inference activations: ~100 MB. OS + framework overhead: ~1.5 GB. Total: ~4.8
    GB. Fits in 8 GB, but barely. Must use LoRA (not full fine-tuning) and gradient checkpointing.'
  common_mistake: Only counting model weights and forgetting the optimizer states, gradients, and activations
    required for the RL training loop. The reward model also needs inference activations, even though
    it is not being trained.
  napkin_math: 'Policy (INT4): 1.5 GB. Reward (INT8): 1.0 GB. LoRA optimizer: 0.4 GB. Activations: 0.4
    GB. OS: 1.5 GB. Total: 4.8 GB / 8 GB = 60% utilization. Full fine-tuning would add 3B × 8 bytes =
    24 GB optimizer states. Impossible.'
