title: Pipeline Design for Streaming Multimodal Outputs
scenario: An NPU generates LLM tokens at 20 tokens/sec. The detokenized text must stream over a Bluetooth connection that inherently adds 50ms of latency.
question: Create a pipelined software architecture that hides the Bluetooth transmission latency and ensures seamless UI text streaming.
details:
  realistic_solution: Create a triple-buffered pipeline using shared memory queues. The NPU thread produces token IDs into a buffer. A CPU detokenizer thread wakes asynchronously to process chunks of 2 tokens (100ms accumulation). A third asynchronous DMA thread dispatches the text payload over Bluetooth. Pipelining a 100ms token generation window perfectly masks the 50ms Bluetooth transport latency without blocking the NPU.
  common_mistake: |
    **The Pitfall:** Using a naive synchronous loop.
    **The Rationale:** Candidates often design a pipeline that generates, detokenizes, and sends tokens sequentially.
    **The Consequence:** The synchronous loop halts NPU token generation while waiting for the 50ms network ACK, destroying throughput.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Token generation speed: 20 tokens/sec.
       - Bluetooth transport latency: 50ms.
    2. **Calculations:**
       - Time per token = 1000ms / 20 tokens = 50ms/token.
       - Buffer chunk size of 2 tokens = 2 * 50ms = 100ms generation time.
       - Generation window (100ms) > Bluetooth latency (50ms).
    3. **Conclusion & Interpretation:**
       **Result: I/O-Bound Mitigation. Because the 100ms generation time for 2 tokens is greater than the 50ms Bluetooth latency, triple-buffered asynchronous pipelining perfectly hides the network delay.**
