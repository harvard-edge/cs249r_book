title: Pipeline Design for Streaming Multimodal Outputs
scenario: A Snapdragon 8 Gen 3 Hexagon NPU generates LLM tokens at 20 tokens/sec.
  The detokenized text must stream over a Bluetooth connection that inherently adds
  50ms of latency.
question: Create a pipelined software architecture that hides the Bluetooth transmission
  latency and ensures seamless UI text streaming.
details:
  realistic_solution: Create a triple-buffered pipeline using shared memory queues.
    The NPU thread produces token IDs into a buffer. A CPU detokenizer thread wakes
    asynchronously to process chunks of 2 tokens (100ms accumulation). A third asynchronous
    DMA thread dispatches the text payload over Bluetooth. Pipelining a 100ms token
    generation window perfectly masks the 50ms Bluetooth transport latency without
    blocking the NPU.
  common_mistake: Using a naive synchronous loop (Generate -> Detokenize -> Send),
    which halts NPU token generation while waiting for the 50ms network ACK.
  napkin_math: 2 tokens = 100ms compute > 50ms network latency. Fully hidable.
