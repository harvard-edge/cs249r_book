title: On-Device LLM Bandwidth Bound
scenario: A mobile device will run a 1B parameter LLM compressed to INT4. The SoC has a measured main memory bandwidth of 40 GB/s.
question: What is the theoretical upper bound for auto-regressive token generation speed assuming it is entirely memory-bound?
details:
  realistic_solution: 'A 1B parameter model in INT4 format (0.5 bytes per parameter) requires 0.5 GB of memory. Auto-regressive token generation requires loading the entire model once per token. 40 GB/s divided by 0.5 GB/token yields a maximum of 80 tokens per second.'
  common_mistake: |
    **The Pitfall:** Miscalculating INT4 size or factoring in compute FLOPs.
    **The Rationale:** Assuming INT4 means 4 bytes, or unnecessarily complicating the upper-bound formula with compute capabilities when the bottleneck is strictly bandwidth.
    **The Consequence:** Incorrectly estimating the maximum capabilities of the hardware, leading to flawed architectural decisions.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model Size: 1B parameters.
       - Quantization: INT4 (0.5 bytes per parameter).
       - Memory Bandwidth: 40 GB/s.
    2. **Calculations:**
       - Memory per token: 1B * 0.5 bytes = 0.5 GB.
       - Theoretical Max Speed: 40 GB/s / 0.5 GB/token = 80 tokens/sec.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound. The absolute upper bound for token generation is 80 tokens per second.**
