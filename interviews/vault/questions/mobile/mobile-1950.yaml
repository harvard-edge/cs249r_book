title: On-Device LLM Bandwidth Bound
scenario: A mobile device will run a 1B parameter LLM compressed to INT4. The SoC
  has a measured main memory bandwidth of 40 GB/s.
question: Formulate the absolute theoretical upper bound for token generation speed
  assuming auto-regressive decoding is entirely memory-bound.
details:
  realistic_solution: A 1B parameter model in INT4 format (0.5 bytes per parameter)
    requires 0.5 GB of memory. Auto-regressive token generation requires loading the
    entire model once per token. 40 GB/s divided by 0.5 GB/token yields a maximum
    of 80 tokens per second.
  common_mistake: Assuming INT4 means 4 bytes per parameter, or factoring in context
    window FLOPs during the decode phase.
  napkin_math: 40 / 0.5 = 80 tok/sec
