title: Shadow Deployment vs Canary for Snapdragon NPU
scenario: You are designing an A/B testing strategy for a new INT8 video enhancement model targeting the Qualcomm Hexagon NPU (Snapdragon 8 Gen 3). The baseline model currently runs on the GPU. Both processors utilize the shared LPDDR5X memory pool. The product team proposes a shadow deployment where both models process the same camera feed concurrently to verify visual quality, while the infrastructure team proposes a progressive canary rollout.
question: Which strategy is better suited for this hardware, shadow deployment or a progressive canary rollout?
details:
  realistic_solution: The progressive canary rollout is the correct approach. While the Snapdragon 8 Gen 3 features heterogeneous CPU+GPU+NPU compute, running both the baseline GPU model and the new NPU model simultaneously will aggressively consume the shared LPDDR5X memory bandwidth and spike power usage. This leads to rapid thermal throttling, frame drops, and battery drain. Instead, the team should use a gradual rollout, monitoring telemetry for OOM crashes, thermal events, and user engagement metrics to validate the NPU model.
  common_mistake: |
    **The Pitfall:** Recommending a shadow deployment strategy.
    **The Rationale:** Engineers assume backend testing practices (where compute/memory are isolated) apply directly to mobile, ignoring the strict thermal and shared memory bandwidth constraints.
    **The Consequence:** Running two heavy models concurrently aggressively consumes bandwidth and spikes power, leading to rapid thermal throttling and battery drain.
  napkin_math: |
    - **Memory Footprint:** Baseline GPU model (2 GB) + INT8 NPU model (1.5 GB) = 3.5 GB instantly reserved.
    - **Bandwidth Demand:** Intermediate tensor reads/writes demand 10-20 GB/s per model. Both running concurrently demands 20-40 GB/s.
    - **Thermal Constraint:** Sustaining 20-40 GB/s of memory traffic quickly exceeds the device's ~3-5W continuous thermal design power.
    - **Conclusion:** The system will **throttle within minutes**, ruining the user experience and invalidating the test.
