title: Shadow Deployment vs Canary for Snapdragon NPU
scenario: You are designing an A/B testing strategy for a new INT8 video enhancement
  model targeting the Qualcomm Hexagon NPU (Snapdragon 8 Gen 3) capable of 45 TOPS.
  The baseline model currently runs on the GPU. Both processors utilize the shared
  12-16 GB LPDDR5X memory pool. The product team proposes a shadow deployment where
  both models process the same camera feed concurrently to verify visual quality,
  while the infrastructure team proposes a standard progressive canary rollout (e.g.,
  1%, 5%, 10% traffic split). Evaluate these two alternatives and decide which strategy
  is better suited for this hardware.
question: How would you evaluate these two alternatives and decide which strategy
  is better suited for this hardware?
details:
  realistic_solution: The progressive canary rollout is the correct approach. While
    the Snapdragon 8 Gen 3 features heterogeneous CPU+GPU+NPU compute, running both
    the baseline GPU model and the new NPU model simultaneously will aggressively
    consume the shared LPDDR5X memory bandwidth and spike power usage. This leads
    to rapid thermal throttling, frame drops, and battery drain. Instead, the team
    should use a gradual rollout, monitoring telemetry for OOM crashes, thermal events,
    and user engagement metrics to validate the NPU model.
  common_mistake: Candidates often recommend the shadow deployment strategy because
    it is a standard, low-risk validation technique in backend environments. They
    fail to account for the strict thermal, memory bandwidth, and power constraints
    of mobile SoCs, where running two heavy models concurrently will severely degrade
    the user experience.
  napkin_math: Assume processing 1080p video at 30 FPS (approx 6MB per frame). The
    baseline GPU model requires 2 GB of memory, and the new INT8 model requires 1.5
    GB. A shadow deployment immediately reserves 3.5 GB of the shared 12-16 GB LPDDR5X
    memory. More critically, while the 45 TOPS Hexagon NPU can easily handle the compute,
    intermediate tensor reads/writes for deep networks can require 10-20 GB/s of bandwidth
    per model. Running both GPU and NPU models concurrently could demand 20-40 GB/s.
    Although LPDDR5X supports up to ~68 GB/s peak bandwidth, sustaining this load
    will quickly exceed the device's thermal design power (typically 3-5W continuous),
    triggering throttling within minutes.
