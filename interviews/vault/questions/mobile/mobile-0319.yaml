title: The On-Device Reader's Bottleneck
scenario: You're optimizing an on-device 'read it for me' feature on a new flagship smartphone. The phone's SoC has an LPDDR5x memory system with a specified bandwidth of 77 GB/s. The feature uses a 1 billion parameter INT8 language model to generate speech from on-screen text. For this analysis, assume a simplified model where for each token generated, the entire 1 GB of model weights must be read from main DRAM.
question: What minimum TPOT is imposed by reading 1 GB of INT8 LLM weights over 77 GB/s mobile memory bandwidth?
details:
  realistic_solution: The core relationship is `Time = Data / Bandwidth`. The model's weights are 1 billion INT8 parameters, which is 1 GB of data. The memory bandwidth is 77 GB/s. Therefore, the time to read the weights is `1 GB / 77 GB/s ≈ 0.01298` seconds. Converting to milliseconds, this is approximately 13 ms. This means the memory system can, at best, supply the NPU with the model weights once every 13 ms, setting a hard physical limit on the token generation rate, regardless of how fast the NPU is.
  common_mistake: |
    **The Pitfall:** Focusing on compute bounds instead of memory bounds, or incorrect unit conversions.
    **The Rationale:** Engineers often focus solely on the processor's peak TOPS and ignore the 'memory wall', calculating sub-millisecond TPOT based on compute. Another error is confusing GB (gigabytes) with Gb (gigabits).
    **The Consequence:** Leading to an 8x error or completely missing the fundamental hardware limitation dictating generation speed.
  napkin_math: |
    - Data to transfer: 1 billion parameters * 1 byte/param = 1 GB.
    - Memory bandwidth: 77 GB/s.
    - Time = Data / Bandwidth = 1 GB / 77 GB/s ≈ 0.01298 seconds.
    - **Theoretical minimum TPOT ≈ 13 ms**.
  options:
  - ~104 ms
  - ~0.04 ms
  - ~13 ms
  - ~1.3 ms
