title: Evaluate A17 Pro Power Budgeting for Real-Time Video AI
scenario: Your team is deploying a real-time video super-resolution model running at 60 FPS on the Apple A17 Pro Neural Engine. The A17 Pro features a 16-core Neural Engine capable of 35 TOPS and operates within a ~5W overall power envelope, sharing 8 GB of unified memory with the CPU and GPU.
question: How should real-time video AI be power-budgeted on A17 Pro to avoid sustained thermal throttling?
details:
  realistic_solution: A realistic evaluation must allocate a strict sub-budget for the Neural Engine, typically around 1.5W to 2W, to avoid thermal throttling when other IP blocks are active. The candidate should design the model's compute density to fit within this constrained power envelope by minimizing DRAM accesses, maximizing NPU SRAM usage, and leveraging lower precision to increase energy efficiency (TOPS/W).
  common_mistake: |
    **The Pitfall:** Assuming the full 35 TOPS and 5W budget are exclusively available to the Neural Engine.
    **The Rationale:** Candidates look at peak specs in isolation without modeling concurrent system activity.
    **The Consequence:** Real-world applications thermally throttle almost immediately because the CPU, GPU, and ISP are also drawing power and sharing memory bandwidth.
  napkin_math: |
    - **Total SoC Budget:** ~5W
    - **Concurrent Component Draw:** GPU/CPU/ISP consume ~3W, leaving **2W** for the NPU.
    - **NPU Peak Efficiency:** 35 TOPS / 5W = **7 TOPS/W**.
    - **Usable Sustained Compute:** 2W × 7 TOPS/W = **14 TOPS**.
    - **Per-Frame Budget (60 FPS):** 14 TOPS / 60 = **~233 GOPS per frame**.
