title: Evaluate A17 Pro Power Budgeting for Real-Time Video AI
scenario: Your team is deploying a real-time video super-resolution model running at 60 FPS. The system operates within a ~5W overall power envelope, sharing 8 GB of unified memory with the CPU and GPU.
question: How should real-time video AI be power-budgeted on A17 Pro to avoid sustained thermal throttling?
details:
  realistic_solution: Rigorous architectural evaluation mandates designing to a fraction of peak specs. The 35 TOPS figure is theoretical maximum. In reality, the CPU, GPU, and ISP are simultaneously active processing the video stream, instantly consuming over half the 5W SoC thermal budget. The model architecture must be heavily quantized and optimized to execute its frame payload perfectly within a brutally constrained ~2W subset budget, maximizing TOPS/W efficiency.
  common_mistake: |
    **The Pitfall:** Designing inference architectures under the assumption that the full 35 TOPS and 5W budget are exclusively dedicated to the Neural Engine.
    **The Rationale:** Candidates mechanically evaluate marketing specs in pure isolation without modeling concurrent SoC IP block activity.
    **The Consequence:** Real-world applications hit catastrophic thermal throttling almost instantaneously as the combined CPU, GPU, and ISP power draws crush the system's thermal limits.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Total SoC power envelope: ~5W.
       - NPU target efficiency: 7 TOPS/Watt.
       - GPU/CPU/ISP basal power: ~3W (leaving 2W for NPU).
       - Target framerate: 60 FPS.
    2. **Calculations:**
       - Sustained NPU Compute: 2W * 7 TOPS/W = 14 TOPS.
       - Per-frame budget: 14 TOPS / 60 FPS = 0.233 TOPS.
       - Conversion: 0.233 TOPS = 233 GOPS per frame.
    3. **Conclusion & Interpretation:**
       - **Result: Power-Bound.** Relying on the 35 TOPS marketing spec leads to instant thermal throttling. The mathematically sound sustained budget is strictly 233 GOPS per frame.
