title: NPU TCM Memory Tiling
scenario: A super-resolution model runs on a Snapdragon 8 Gen 3 Hexagon NPU. An intermediate
  layer produces 12MB activation maps, but the NPU's Tightly Coupled Memory (TCM)
  is only 8MB.
question: Specify a memory tiling and scheduling strategy to process this layer locally
  without spilling intermediate activations to main mobile DRAM.
details:
  realistic_solution: The activation map must be split spatially into overlapping
    tiles. A 2x1 grid of 6MB tiles ensures each fits within the 8MB TCM, leaving 2MB
    for weights and the halo overlap region. The NPU scheduler must process Tile A
    to completion before swapping out the weights and processing Tile B.
  common_mistake: Failing to account for the halo region required for convolutions
    at tile boundaries, leading to incorrect output artifacts or out-of-bounds TCM
    accesses.
  napkin_math: Tiling factor = 12MB / 8MB = 1.5; minimum 2 tiles of 6MB each.
