title: NPU TCM Memory Tiling
scenario: A super-resolution model runs on a mobile NPU. An intermediate layer produces 12MB activation maps, but the NPU's Tightly Coupled Memory (TCM) is only 8MB.
question: Specify a memory tiling and scheduling strategy to process this layer locally without spilling intermediate activations to main mobile DRAM.
details:
  realistic_solution: The activation map must be split spatially into overlapping
    tiles. A 2x1 grid of 6MB tiles ensures each fits within the 8MB TCM, leaving 2MB
    for weights and the halo overlap region. The NPU scheduler must process Tile A
    to completion before swapping out the weights and processing Tile B.
  common_mistake: |
    **The Pitfall:** Failing to account for the halo region required for convolutions at tile boundaries.
    **The Rationale:** Candidates often mathematically divide the tensor perfectly but forget the overlapping data needed for the convolution window.
    **The Consequence:** Leads to incorrect output artifacts or out-of-bounds TCM accesses.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - TCM Capacity: 8 MB.
       - Activation Map Size: 12 MB.
       - Required memory structure: Needs space for weights and halo overlap regions.
    2. **Calculations:**
       - Tiling factor = 12 MB / 8 MB = 1.5.
       - Minimum splits = 2 tiles of 6 MB each.
       - Remaining TCM capacity = 8 MB - 6 MB = 2 MB (sufficient for weights and halo).
    3. **Conclusion & Interpretation:**
       **Result: Memory-Capacity Bound Optimization. A 2x1 grid of 6MB tiles ensures execution stays entirely within TCM, avoiding slow round trips to main memory.**
