title: The WebView WebGL Throttle
scenario: You deploy a TensorFlow.js model inside a React Native app wrapped in a mobile WebView. The model uses WebGL to run on the mobile GPU. On a desktop browser, it runs at 60 FPS. On the mobile WebView, it runs at 15 FPS, even though the mobile GPU is mathematically powerful enough.
question: What OS-level security mechanism is strangling the WebGL performance within the mobile WebView?
details:
  realistic_solution: 'Mobile WebViews run in a sandboxed process separate from the app''s GPU context. WebGL calls must cross a process boundary via IPC to reach the GPU compositor, adding ~5-10ms per gl.readPixels synchronization. With 10 intermediate tensor readbacks, you lose 50-100ms/frame. Additionally, iOS WKWebView throttles background WebGL to 30 FPS max and limits GPU memory. The fix: use TensorFlow.js with the WebGPU backend (eliminates readPixels), or better, bypass the WebView entirely by running inference natively via Core ML or TFLite delegates and passing only results to JavaScript.'
  common_mistake: |
    **The Pitfall:** Assuming mobile GPUs are simply too computationally weak compared to desktop GPUs.
    **The Rationale:** Developers don't understand that WebViews operate in isolated sandboxed processes that require inter-process communication (IPC) for GPU access.
    **The Consequence:** Attempting to prune or quantize the model pointlessly, failing to recognize a structural synchronization bottleneck.
  napkin_math: |
    - **IPC Synchronization Penalty:** `gl.readPixels` across process boundaries blocks the thread for ~5-10ms.
    - **Total Overhead:** A model with 10 synchronization layers loses 10 * 10ms = **100ms** per frame.
    - **Conclusion:** The massive 100ms overhead inherently limits the frame rate to ~10 FPS regardless of the GPU's raw TFLOPS capability.
