title: The WebView WebGL Throttle
scenario: You deploy a TensorFlow.js model inside a React Native app wrapped in a mobile WebView. The
  model uses WebGL to run on the mobile GPU. On a desktop browser, it runs at 60 FPS. On the mobile WebView,
  it runs at 15 FPS, even though the mobile GPU is powerful enough. What OS-level security mechanism is
  strangling the WebGL performance?
question: "What OS-level security mechanism is strangling the WebGL performance?"
details:
  realistic_solution: 'Mobile WebViews run in a sandboxed process separate from the app''s GPU context.
    WebGL calls must cross a process boundary via IPC to reach the GPU compositor, adding ~5-10ms per
    gl.readPixels synchronization. With 10 intermediate tensor readbacks, you lose 50-100ms/frame. Additionally,
    iOS WKWebView throttles background WebGL to 30 FPS max and limits GPU memory. The fix: use TensorFlow.js
    with the WebGPU backend (eliminates readPixels), or better, bypass the WebView entirely by running
    inference natively via Core ML or TFLite delegates and passing only results to JavaScript.'
  common_mistake: '"Mobile GPUs are just much weaker than desktop GPUs." They are weaker, but a 4x drop
    for a tiny TF.js model points to a structural bottleneck.'
  napkin_math: WebGL Tensor Readback (using `gl.readPixels`) forces the GPU pipeline to flush and synchronize
    with the CPU. On mobile Safari, a single `readPixels` call can block the main thread for 5-10ms. If
    your model has 10 layers and synchronizes intermediate tensors, you instantly lose 100ms per frame.
