title: The WebView WebGL Throttle
scenario: You deploy a TensorFlow.js model inside a React Native app wrapped in a mobile WebView. The model uses WebGL to run on the mobile GPU. On a desktop browser, it runs at 60 FPS. On the mobile WebView, it runs at 15 FPS, even though the mobile GPU is mathematically powerful enough.
question: What OS-level security mechanism is strangling the WebGL performance within the mobile WebView?
details:
  realistic_solution: 'Mobile WebViews enforce strict security boundaries, operating in isolated sandboxed processes entirely separate from the host application''s GPU compositor context. Consequently, every WebGL `gl.readPixels` call required to retrieve intermediate tensor outputs must cross an expensive inter-process communication (IPC) boundary. This synchronization aggressively stalls the rendering thread. The architectural fix is to migrate to the TensorFlow.js WebGPU backend, which mitigates synchronous readbacks via asynchronous mapped buffers, or to bypass the WebView entirely by compiling the model to a native format (Core ML or TFLite) and passing only final JSON results across the JavaScript bridge.'
  common_mistake: |
    **The Pitfall:** Assuming mobile GPUs are simply too computationally weak compared to desktop GPUs.
    **The Rationale:** Developers don't understand that WebViews operate in isolated sandboxed processes that require inter-process communication (IPC) for GPU access.
    **The Consequence:** Attempting to prune or quantize the model pointlessly, failing to recognize a structural synchronization bottleneck.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target framerate: 60 FPS (16.6ms budget).
    - IPC synchronization penalty for `gl.readPixels`: ~5-10ms.
    - Intermediate tensor readbacks per frame: 10.

    **Calculations:**
    - Total IPC overhead per frame: 10 readbacks * 10ms = 100ms.
    - Maximum theoretical framerate: 1000ms / 100ms = 10 FPS.

    **Conclusion & Interpretation:**
    - **Result: 10 FPS (IPC Synchronization-Bound)**. The massive 100ms overhead inherently limits the frame rate to ~10-15 FPS regardless of the GPU's raw TFLOPS capability.
