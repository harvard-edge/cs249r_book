title: Managing the autograd tape for battery-constrained on-device learning on Snapdragon
scenario: You are building an on-device personalization system for a keyboard autocomplete model on Snapdragon
  8 Gen 3. The system should learn from user typing patterns in the background without draining the battery.
  Current implementation runs continuous gradient updates, consuming 8% battery per hour on background
  learning alone.
details:
  realistic_solution: 'Implement lazy learning: only build the computational graph (requires_grad=True)
    when explicitly scheduled for a learning step. Use torch.no_grad() for all inference. Batch user corrections:
    collect 32 correction events, then run one backward pass offline (screen off, charging). Use SGD instead
    of Adam (3× less optimizer state memory = 3× fewer writes to flash). Profile: targeted 0.5% battery
    per hour for background learning.'
  common_mistake: Running continuous online learning with full autograd tape construction for every word
    prediction. The autograd graph is built even when the user is not typing (idle model evaluation),
    and the backward pass runs after every single sample — an extremely inefficient update schedule.
  napkin_math: 'Snapdragon at full training: ~5W. At inference only (no grad): ~1W. Continuous learning
    at 5W × 1 hour = 5Wh. Assuming 4000mAh × 3.7V = 14.8Wh battery: 5/14.8 = 34% per hour — much worse
    than observed 8%. Batched learning 32 samples once per minute: 1 backward pass × 50ms at 5W = 0.25mJ
    per minute = 15mJ/hour / 14800mJ (battery) = 0.001% per hour. Negligible.'
