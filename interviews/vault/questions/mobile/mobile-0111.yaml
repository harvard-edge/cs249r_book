title: The DVFS Polling Delay
scenario: Your app has a 'Magic Enhance' button that runs a heavy GAN on a photo. The user taps the button,
  and the inference takes 800ms. You notice that if the user taps the button *while* they are actively
  scrolling a list, the exact same inference only takes 400ms. Why does doing *more* work (scrolling +
  inference) make the inference 2x faster?
details:
  realistic_solution: 'DVFS ramp-up delay. Idle CPU at 300 MHz takes hundreds of milliseconds to ramp
    to 2.8 GHz through intermediate steps. Inference runs at mixed frequencies = ~800ms. During scrolling,
    CPU already at 2.8 GHz for 60 FPS UI = same inference takes 400ms. Fix: PerformanceHintManager pre-boost
    before inference. A 1ms API call eliminates 400ms latency — the highest-ROI mobile ML optimization.
    50% of cold-start inference latency is wasted in DVFS ramp.'
  common_mistake: '"The OS prioritizes the foreground app during scrolling." The app is always in the
    foreground when the button is tapped.'
  napkin_math: '- Inference requires 1120 M-cycles. At 2.8 GHz max clock, 1120 / 2.8 = 400 ms wall clock
    | - Idle start: CPU at 300 MHz. Governor ramps up progressively | - Inference on cold chip (DVFS ramp):
    300 ms @ 0.5 GHz (150 M-cycles) + 300 ms @ 1.5 GHz (450 M-cycles) + 186 ms @ 2.8 GHz (520 M-cycles)
    = 786 ms (~800 ms) wall clock | - Scrolling keeps chip at 2.8 GHz for 60 FPS UI → same inference runs
    entirely at max clock = 400 ms | - DVFS penalty: 400 ms wasted = 50% overhead. PerformanceHintManager
    pre-boost: <1 ms API call | - => A 1 ms API call eliminates a 400 ms latency penalty — the highest-ROI
    optimization in mobile ML'
