title: The DVFS Polling Delay
scenario: Your app has a 'Magic Enhance' button that runs a heavy GAN on a photo. The user taps the button, and the inference takes 800ms. You notice that if the user taps the button while they are actively scrolling a list, the exact same inference only takes 400ms.
question: "Why does doing more work (scrolling + inference) make the inference 2x faster?"
details:
  realistic_solution: 'DVFS ramp-up delay. Idle CPU at 300 MHz takes hundreds of milliseconds to ramp to 2.8 GHz through intermediate steps. Inference runs at mixed frequencies = ~800ms. During scrolling, CPU already at 2.8 GHz for 60 FPS UI = same inference takes 400ms. Fix: PerformanceHintManager pre-boost before inference. A 1ms API call eliminates 400ms latency — the highest-ROI mobile ML optimization. 50% of cold-start inference latency is wasted in DVFS ramp.'
  common_mistake: |
    **The Pitfall:** "The OS prioritizes the foreground app during scrolling."
    **The Rationale:** Candidates assume generic OS scheduling rules apply, ignoring the app is always in the foreground when the button is tapped.
    **The Consequence:** Missing the true hardware-level cause (DVFS ramp-up) and failing to implement the simple API fix.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Total inference workload: 1120 M-cycles
       - Max clock speed: 2.8 GHz
       - Idle clock speed: 300 MHz
    2. **Calculations:**
       - Hot chip execution (scrolling at 60fps keeps CPU at max clock) = 1120 M-cycles / 2.8 GHz = 400 ms
       - Cold chip DVFS ramp (idle tap) = (150 M-cycles / 0.5 GHz) + (450 M-cycles / 1.5 GHz) + (520 M-cycles / 2.8 GHz) = 300 ms + 300 ms + 186 ms = 786 ms (~800 ms)
    3. **Conclusion & Interpretation:**
       - **Result: DVFS Latency Penalty. Pre-boosting the clock with a PerformanceHintManager API call avoids the 400ms Dynamic Voltage and Frequency Scaling (DVFS) ramp-up delay.**
