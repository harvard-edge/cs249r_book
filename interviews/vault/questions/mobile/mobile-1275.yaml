title: Diagnosing Exynos NPU Latency Spikes
scenario: You are deploying a safety-critical driver monitoring model on a Samsung
  Exynos 2400 NPU. During rigorous functional safety testing, the watchdog timer intermittently
  triggers because the dual-core NPU occasionally spikes from a steady 12ms inference
  latency to over 40ms. Given the 34.7 TOPS NPU shares its 12 GB LPDDR5X memory with
  the CPU, GPU, and ISP, diagnose the root cause of this non-deterministic execution.
question: Why does an Exynos 2400 safety model occasionally spike from 12ms to over
  40ms, and how can determinism be restored?
details:
  realistic_solution: The root cause is memory bandwidth starvation due to contention
    with the ISP or GPU. Because the Exynos 2400 uses a unified memory architecture,
    heavy concurrent camera processing or graphics rendering saturates the LPDDR5X
    bus, introducing severe memory access latency for the NPU. To restore deterministic
    execution, you must configure hardware QoS (Quality of Service) policies to guarantee
    minimum bandwidth for the NPU's memory traffic.
  common_mistake: Candidates often assume the NPU is thermal throttling or the dual-core
    scheduler is dropping tasks. They frequently overlook the architectural bottleneck
    of shared memory subsystems in mobile SoCs under concurrent workloads.
  napkin_math: Assume the LPDDR5X provides ~68 GB/s peak bandwidth. Running the dual-core
    NPU at its peak 34.7 TOPS with an arithmetic intensity of 2 OPS/byte requires
    ~17.35 GB/s. If the ISP concurrently processes a 4K 60fps stream (requesting ~25
    GB/s for multi-frame noise reduction) and the GPU renders a heavy UI (requesting
    ~30 GB/s), the total demand is 17.35 + 25 + 30 = 72.35 GB/s. This exceeds the
    68 GB/s limit, starving the NPU, dropping its effective TOPS, and causing the
    3x latency spikes.
