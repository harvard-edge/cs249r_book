title: Diagnosing Exynos NPU Latency Spikes
scenario: You are deploying a safety-critical driver monitoring model on a Samsung Exynos 2400 NPU. The watchdog timer triggers because the NPU occasionally spikes from 12ms to over 40ms. The 34.7 TOPS NPU shares 12 GB LPDDR5X with the CPU, GPU, and ISP.
question: Why does an Exynos 2400 safety model occasionally spike from 12ms to over 40ms, and how can determinism be restored?
details:
  realistic_solution: The root cause is memory bandwidth starvation due to contention with the ISP or GPU. Heavy concurrent camera processing or graphics rendering saturates the LPDDR5X bus. You must configure hardware QoS policies to guarantee minimum bandwidth for the NPU's memory traffic.
  common_mistake: |
    **The Pitfall:** Assuming the NPU is thermal throttling or the scheduler is dropping tasks.
    **The Rationale:** Overlooking the architectural bottleneck of unified memory subsystems under concurrent workloads.
    **The Consequence:** Misdiagnosing the issue and failing to implement QoS, leaving the safety-critical system vulnerable to GPU/ISP interference.
  napkin_math: |
    - LPDDR5X Peak Bandwidth: ~68 GB/s.
    - NPU demand (34.7 TOPS at 2 OPS/byte): ~17.35 GB/s.
    - ISP demand (4K 60fps noise reduction): ~25 GB/s.
    - GPU demand (Heavy UI): ~30 GB/s.
    - Total demand: 17.35 + 25 + 30 = 72.35 GB/s.
    - **Total demand (72.35 GB/s) exceeds peak bandwidth (68 GB/s), starving the NPU and causing 3x latency spikes.**
