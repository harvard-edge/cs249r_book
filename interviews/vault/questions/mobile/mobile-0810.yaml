title: Mobile New 0010
scenario: Running an LLM on Orin with KV cache tiling. As sequence length grows from 100 to 1000, latency
  increases by a factor of 100 instead of 10. Profiling shows massive SRAM evictions during the attention
  mechanism.
details:
  realistic_solution: The symptom is quadratic latency scaling in an attention layer, indicating a failure
    in KV cache tiling strategy. As the sequence length increases, the size of the Keys and Values exceeds
    the fast SRAM tile size. Because the software doesn't implement block-wise attention (like FlashAttention)
    properly, it repeatedly evicts and fetches the KV tensors from slow DRAM for every query token.
  common_mistake: Allocating monolithic buffers for sequence processing and ignoring hardware tile size
    limits.
  napkin_math: 'Seq=100 KV size: 200KB (fits in 256KB SRAM). Access cost: O(N). Seq=1000 KV size: 2MB.
    SRAM miss rate explodes. 1000 queries * 2MB read per query = 2GB DRAM traffic per layer. 2GB / 100GB/s
    = 20ms per layer, a 100x jump.'
