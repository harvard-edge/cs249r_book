title: Sensor Data Storage Analysis on iPhone
scenario: A fitness application on an iPhone buffers 3-axis accelerometer data locally.
  The sensor is polled at 500Hz, returning 32-bit float values for each axis.
question: Analyze the daily local storage footprint required before the app flushes
  data to the cloud at midnight.
details:
  realistic_solution: Each sample is 3 axes * 4 bytes = 12 bytes. At 500Hz, data is
    generated at 6 KB/s. Over 24 hours (86,400 seconds), this requires 6 KB/s * 86400
    = 518.4 MB/day.
  common_mistake: Confusing bits and bytes, treating 32-bit floats as 32 bytes, which
    inflates storage by 8x.
  napkin_math: 500 * 12 * 86400 = 518.4 MB
