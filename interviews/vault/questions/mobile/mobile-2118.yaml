title: Sensor Data Storage Analysis on iPhone
scenario: A fitness application on an iPhone buffers 3-axis accelerometer data locally. The sensor is polled at 500Hz, returning 32-bit float values for each axis.
question: Analyze the daily local storage footprint required before the app flushes data to the cloud at midnight.
details:
  realistic_solution: 'Each sample is 3 axes * 4 bytes = 12 bytes. At 500Hz, data is generated at 6 KB/s. Over 24 hours (86,400 seconds), this requires 6 KB/s * 86400 = 518.4 MB/day.'
  common_mistake: |
    **The Pitfall:** Confusing bits and bytes.
    **The Rationale:** Treating 32-bit floats as 32 bytes, which inflates storage calculations by 8x.
    **The Consequence:** Overestimating storage requirements and unnecessarily degrading app capabilities.
  napkin_math: |
    **Assumptions & Constraints:**
    - 3-axis accelerometer polled at 500Hz.
    - 32-bit float (4 bytes) per axis.
    - 24-hour local storage retention (86,400 seconds).

    **Calculations:**
    - Sample Size = 3 axes * 4 bytes/float = 12 bytes/sample.
    - Data Rate = 12 bytes/sample * 500 Hz = 6,000 bytes/sec (6 KB/s).
    - Daily Storage = 6,000 bytes/sec * 86,400 seconds/day = 518,400,000 bytes.

    **Conclusion & Interpretation:**
    - **Result: 518.4 MB (Storage-bound data pipeline calculation)**. The daily local storage footprint is exactly 518.4 MB.
