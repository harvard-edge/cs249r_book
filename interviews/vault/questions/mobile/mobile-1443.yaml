title: Thermal Degradation for Video Segmentation on A17 Pro
scenario: You are designing a real-time background blurring feature for a video conferencing
  app running on the Apple A17 Pro Neural Engine. The primary model delivers high-fidelity
  segmentation but under sustained use, the device hits thermal limits, dropping the
  SoC power budget from its ~5W peak and throttling the 16-core NPU. You must design
  and quantify a degradation ladder that seamlessly transitions to a fallback state
  without dropping frames or exhausting the shared 8 GB unified memory during the
  switch.
question: How would you degrade A17 Pro video segmentation under thermal pressure
  without visible quality cliffs?
details:
  realistic_solution: A robust design keeps a lightweight, lower-resolution fallback
    model permanently resident in the unified memory alongside the primary model,
    or uses a single model with early exits. When the OS thermal state API indicates
    throttling, the pipeline immediately routes frames to the fallback model or early
    exit, shedding compute load and maintaining the strict 30 FPS real-time deadline
    at the cost of edge mask precision.
  common_mistake: Candidates often propose dynamically loading a smaller fallback
    model from storage when thermal throttling begins. They fail to realize that loading
    new weights into the shared 8 GB unified memory creates a massive memory bandwidth
    spike, exacerbating the thermal event and causing severe frame drops during the
    transition.
  napkin_math: The primary model requires 0.4 TOPS per frame. At 30 FPS, this is 12
    TOPS, well within the A17 Pro's 35 TOPS peak capacity. The resident fallback model
    requires 0.05 TOPS per frame (1.5 TOPS at 30 FPS) and adds just 12 MB to the 8
    GB memory footprint. If severe thermal throttling reduces NPU capacity by 70%
    (from 35 TOPS down to ~10.5 TOPS), the primary model (12 TOPS) will miss the 33ms
    latency deadline. Shedding load to the resident fallback (1.5 TOPS) easily fits
    the constrained budget without triggering I/O overhead.
