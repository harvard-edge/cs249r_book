title: Thermal Degradation for Video Segmentation on A17 Pro
scenario: You are designing a real-time background blurring feature for a video conferencing app running on the Apple A17 Pro Neural Engine. The primary model delivers high-fidelity segmentation but under sustained use, the device hits thermal limits, dropping the SoC power budget from its ~5W peak and throttling the 16-core NPU.
question: How would you design a degradation ladder that transitions to a fallback state without dropping frames or exhausting unified memory?
details:
  realistic_solution: A robust design keeps a lightweight, lower-resolution fallback model permanently resident in the unified memory alongside the primary model, or uses a single model with early exits. When the OS thermal state API indicates throttling, the pipeline immediately routes frames to the fallback model or early exit, shedding compute load and maintaining the strict 30 FPS real-time deadline at the cost of edge mask precision.
  common_mistake: |
    **The Pitfall:** Dynamically loading a smaller fallback model from storage when thermal throttling begins.
    **The Rationale:** Developers want to save RAM and assume loading a tiny model is fast.
    **The Consequence:** Loading new weights creates a massive memory bandwidth spike, actively generating more heat and causing severe frame drops during the transition exactly when the system is already distressed.
  napkin_math: |
    1. **Primary Model Compute:** 0.4 TOPS/frame * 30 FPS = 12 TOPS (fits within 35 TOPS peak).
    2. **Fallback Model Compute:** 0.05 TOPS/frame * 30 FPS = 1.5 TOPS.
    3. **Thermal Throttling Impact:** NPU capacity drops by 70% to ~10.5 TOPS. The primary model (12 TOPS) now misses the 33ms latency deadline.
    4. **Memory Impact:** Keeping the fallback model permanently resident adds just 12 MB to the 8 GB footprint.
    **Switching to the resident 1.5 TOPS fallback avoids flash I/O spikes and maintains 30 FPS during heavy throttling.**
