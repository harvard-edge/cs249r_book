title: 'Mobile TCO Realization: Concrete Cost Model for Music AI App'
scenario: Concretely calculate the 2-year infrastructure cost for a music generation
  AI app with 100K MAU using Snapdragon 8 Gen 3 (45 TOPS, 16GB). Each user generates
  3 songs/day (30 seconds each) using an on-device MusicGen-Small model (300M params,
  2W inference, 5 seconds/song). Compare to cloud MusicGen at $0.05/generation.
question: How would you compare to cloud MusicGen at $0.05/generation?
details:
  realistic_solution: 'MusicGen-Small: 300M params * 4 bytes FP16 = 1.2GB. Plus audio
    codec (0.5GB). Total: 1.7GB — easily fits in 16GB. On-device: 2W * 5s = 10J =
    0.00278Wh per song. Annual per user: 3*365*0.00278Wh = 3.05Wh = $0.000305/yr.
    100K users: $30.5/yr — effectively free. Cloud: 100K*3*365*$0.05=$5.475M/yr. 2yr:
    $10.95M. On-device 2yr energy: $61 total. Savings: $10.95M. Development cost (on-device):
    $200K. Net 2yr: $10.75M. On-device wins massively. Battery: 0.00278Wh*3 songs
    = 0.0083Wh = 0.065% battery drain per day from songs.'
  common_mistake: Calculating cloud cost per generation without including model serving
    overhead (GPU time for 30-second audio generation at 5-second real-time factor
    means 6 seconds of GPU time per generation), and not verifying that 300M MusicGen
    fits in 16GB.
  napkin_math: 'MusicGen-Small: 1.2GB FP16. Fits in 16GB. Energy: 2W*5s=10J=0.00278Wh/song.
    3 songs/day: 0.00833Wh. Annual/user: 0.00833*365=3.04Wh=$0.000304. 100K users
    annual: $30.4. 2yr: $60.8. Cloud 2yr: 100K*3*365*2*$0.05=$10,950,000. On-device
    saves $10,949,939 over 2yr. ROI on $200K development: $10.75M net ÷ $200K = 53.8x
    in 2 years. App can offer song generation free to users (vs subscription model
    needed to cover cloud costs). Competitive advantage: free on-device generation
    enables freemium model. Cloud generation must charge $5+/month subscription to
    break even.'
