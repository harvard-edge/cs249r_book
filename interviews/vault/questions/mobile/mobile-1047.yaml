title: 'Mobile TCO Realization: Concrete Cost Model for Music AI App'
scenario: Calculate the 2-year infrastructure cost for a music generation AI app with 100K MAU using Snapdragon 8 Gen 3 (45 TOPS, 16GB). Each user generates 3 songs/day (30 seconds each) using an on-device MusicGen-Small model (300M params, 2W inference, 5 seconds/song).
question: How does the 2-year TCO of an on-device MusicGen deployment compare to cloud generation at $0.05 per song?
details:
  realistic_solution: MusicGen-Small: 300M params * 4 bytes FP16 = 1.2GB. Plus audio codec (0.5GB). Total: 1.7GB — easily fits in 16GB. On-device: 2W * 5s = 10J = 0.00278Wh per song. Annual per user: 3*365*0.00278Wh = 3.05Wh = $0.000305/yr. 100K users: $30.5/yr — effectively free. Cloud: 100K*3*365*$0.05=$5.475M/yr. 2yr: $10.95M. On-device 2yr energy: $61 total. Savings: $10.95M. Development cost (on-device): $200K. Net 2yr: $10.75M. On-device wins massively. Battery: 0.00278Wh*3 songs = 0.0083Wh = 0.065% battery drain per day from songs.
  common_mistake: |
    **The Pitfall:** Calculating cloud cost per generation without including serving overhead or verifying if the device can actually hold the model.
    **The Rationale:** Candidates treat cloud APIs as fixed costs without realizing that scaling user volume linearly explodes OPEX, whereas edge compute is virtually free once developed.
    **The Consequence:** The company hemorrhages millions of dollars in cloud costs when the exact same capability could have been run locally.
  napkin_math: |
    1. **On-Device Energy Cost:** 2W * 5s = 10 Joules = 0.00278 Wh per song.
    2. **Annual User Energy Cost:** 0.00278 Wh * 3 songs * 365 days = ~3.04 Wh = ~$0.0003. (Effectively $0).
    3. **Total Edge Cost:** $200K upfront development. Total 2-year OPEX = ~$61.
    4. **Cloud Cost:** 100K users * 3 songs * 365 days * 2 years * $0.05 = $10,950,000.
    5. **Net Savings:** $10.95M - $200K = **$10.75M saved over 2 years**.
