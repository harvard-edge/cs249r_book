title: Energy-Delay Product Optimization for Inference on A17 Pro
scenario: "An iPhone app runs face detection (MobileNetV3-small, 2.5M INT8 params) in two modes. Mode A (ANE) has 35 TOPS, 0.8W active, 1.5ms inference. Mode B (E-core CPU) has 3 GFLOPS, 0.15W active, 500ms inference."
question: "How would you calculate energy-delay product (EDP) for each mode and determine when each is optimal?"
details:
  realistic_solution: 'EDP = energy × delay = (power × time) × time = power × time². Mode A (ANE): E = 0.8W × 0.0015s = 1.2mJ. D = 1.5ms. EDP = 1.2mJ × 1.5ms = 1.8×10⁻⁶ J·s. Mode B (E-core): E = 0.15W × 0.5s = 75mJ. D = 500ms. EDP = 75mJ × 500ms = 0.0375 J·s. ANE EDP: 1.8×10⁻⁶ J·s vs E-core: 0.0375 J·s. ANE is 20,833× better EDP. Energy: ANE 1.2mJ vs CPU 75mJ — ANE is 62.5× more energy efficient too. When to use E-core: only when ANE is occupied with higher-priority task and we can afford 500ms latency. For real-time face detection, always use ANE.'
  common_mistake: |
    **The Pitfall:** Optimizing for energy alone or latency alone.
    **The Rationale:** Candidates forget that EDP provides a balanced metric where `EDP = Power * Time^2`.
    **The Consequence:** Selecting a mode that saves power but destroys the user experience, or vice versa.
  napkin_math: |
    - Mode A (ANE): Energy = `0.8W * 0.0015s = 1.2mJ`. Delay = `1.5ms`. EDP = `1.2mJ * 1.5ms = 1.8 µJ·s`.
    - Mode B (E-core): Energy = `0.15W * 0.5s = 75mJ`. Delay = `500ms`. EDP = `75mJ * 500ms = 37,500 µJ·s`.
    - **Conclusion:** ANE has a **20,833x better EDP** and uses **62.5x less energy**. Always use ANE for real-time face detection.
