title: Graceful Degradation for On-Device ML on Samsung Exynos 2400
scenario: Your team is developing a critical on-device ML application for a premium
  mobile phone, leveraging the Samsung Exynos 2400 NPU (34.7 TOPS, 12 GB LPDDR5X).
  This application performs real-time personalized content recommendations and requires
  high availability. Given the fluctuating device resources (battery, thermal state,
  background apps), explain the key principles of graceful degradation you would apply.
  Specifically, describe how you would design degradation ladders, implement model
  fallbacks, distinguish between fail-safe and fail-operational modes for different
  features, and apply quality-of-service shedding to ensure the system remains resilient
  and provides a consistent user experience.
question: How would you design degradation ladders, model fallbacks, fail-safe modes,
  and QoS shedding for Exynos 2400 on-device ML?
details:
  realistic_solution: 'A robust solution would start by categorizing ML features by
    criticality. For instance, basic content filtering could be fail-operational (always
    provide some result, even if coarse), while advanced personalization could be
    fail-safe (disabled if resources are low). A degradation ladder would be established:

    1.  **Tier 1 (Optimal):** Full-sized, high-precision (FP16/BF16) models on Exynos
    NPU, max inference rate.

    2.  **Tier 2 (Moderate Degradation):** Smaller, optimized models (e.g., distilled
    versions) or INT8 quantization on Exynos NPU, possibly with slight reduction in
    inference frequency. This leverages the NPU''s efficiency for lower-precision
    ops.

    3.  **Tier 3 (Significant Degradation):** CPU fallback for non-critical models,
    using highly compressed models. Quality-of-service shedding would reduce input
    resolution or batch size.

    4.  **Tier 4 (Critical Fail-Safe):** Only essential, minimal ML tasks run on CPU
    if NPU is unavailable or thermal limits are severe, or features are disabled entirely.

    Dynamic monitoring of NPU load, temperature, battery, and memory usage would trigger
    transitions between tiers. The 12 GB LPDDR5X memory provides ample buffer, but
    bandwidth usage for large models must be considered during rapid context switching
    or data transfer between NPU and main memory.'
  common_mistake: Candidates might recall definitions but struggle to integrate the
    specific NPU capabilities (TOPS, LPDDR5X bandwidth) into a multi-tiered degradation
    strategy, or they might not clearly differentiate fail-safe vs. fail-operational
    in the context of critical vs. non-critical features. Overlooking the trade-offs
    in user experience across different degradation levels is also common.
  napkin_math: If a full-fidelity recommendation model requires 8 TOPS and 1.5GB of
    RAM (active data), and a simplified fallback model uses 2 TOPS and 0.4GB. The
    Samsung Exynos 2400 NPU provides 34.7 TOPS. How many full-fidelity models could
    theoretically run concurrently compared to the simplified fallback models, assuming
    sufficient LPDDR5X memory bandwidth (e.g., ~68GB/s peak) is available for data
    transfers?
