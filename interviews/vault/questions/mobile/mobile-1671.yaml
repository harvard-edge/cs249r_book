title: On-device PSI Calculation for Predicted Class Drift on Snapdragon NPU
scenario: A mobile application leverages an on-device image classification model running on a Snapdragon 8 Gen 3 Hexagon NPU to process images and output predictions for 10 distinct classes. To ensure reliability, you must implement an hourly data drift detection mechanism using the Population Stability Index (PSI).
question: How would you efficiently store hourly predicted-class counts and compute PSI for a 10-class on-device classifier?
details:
  realistic_solution: 'For hourly PSI calculation, an efficient approach would be to aggregate the counts for each of the 10 predicted classes into a simple array or list of integers (e.g., 32-bit integers) on the device. This aggregated data for the ''current'' hour would then be compared against a pre-computed and stored ''baseline'' distribution (also a list of 10 counts or percentages).'
  common_mistake: |
    **The Pitfall:** Proposing complex data structures or failing to handle zero counts in PSI.
    **The Rationale:** Candidates often suggest resource-intensive monitoring solutions unsuited for edge devices, or overlook edge cases in mathematical formulas.
    **The Consequence:** Unnecessary memory consumption and runtime errors (division-by-zero or log(0)) in production monitoring.
  napkin_math: |
    1. **Memory for Current Counts:** 10 classes * 4 bytes/class (32-bit int) = 40 bytes. Negligible footprint.
    2. **PSI Formula:** PSI = Σ ((P_current,i + ε) - (P_baseline,i + ε)) * ln((P_current,i + ε) / (P_baseline,i + ε))
    3. **Handling Zeros:** A small epsilon (e.g., 0.0001) is added to avoid division-by-zero or log(0) errors.
    4. **Conclusion:** **The PSI can be calculated efficiently on-device using a 40-byte integer array and a stabilized formula.**
