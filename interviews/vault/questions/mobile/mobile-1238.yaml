title: Exynos 2400 Graph Partitioning
scenario: You are designing the ahead-of-time (AOT) graph compilation pipeline to deploy a computational photography model on the Samsung Exynos 2400 NPU. The SOC features a dual-core NPU delivering 34.7 TOPS and relies on a shared 12 GB LPDDR5X memory pool used concurrently by the CPU, GPU, and ISP.
question: How should an Exynos 2400 AOT compiler partition graphs and plan memory while the ISP handles 4K video?
details:
  realistic_solution: The compiler should implement a cost-model-based partitioner that evaluates subgraph execution time, factoring in CPU-NPU data transfer costs. It must also perform aggressive operator fusion to keep intermediate activations in NPU SRAM. For memory, the AOT compiler should generate static memory arenas, allowing the OS to predictably schedule NPU memory accesses around the ISP's constant memory traffic in the shared 12 GB LPDDR5X pool.
  common_mistake: |
    **The Pitfall:** Greedily offloading every supported operator to the NPU.
    **The Rationale:** Candidates attempt to maximize NPU TOPS utilization without evaluating the memory ping-pong costs between CPU and NPU.
    **The Consequence:** Saturating the shared memory bus and causing massive latency spikes due to memory transfer overhead.
  napkin_math: |
    *   **Compute Time:** 2 TOPS / 34.7 TOPS = 57.6 ms.
    *   **Weight Data:** 1 GB (INT8).
    *   **Required Bandwidth:** 1 GB / 0.0576 s = **17.3 GB/s**.
    *   **Conclusion:** To avoid exceeding the available shared memory bandwidth while the ISP is active, the compiler must minimize intermediate tensor spills.
