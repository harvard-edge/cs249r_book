title: Zero-Shot UI Action Grounding
scenario: We're implementing a Ferret-UI-inspired agentic system where Siri can perform actions based on what the user is currently looking at on their screen. The vision-language model needs to ground user commands (e.g., 'Click the second checkout button') to explicit x,y coordinates. The constraint is that this grounding model must reside entirely in-memory with a peak RAM footprint under 50MB, execute in <30ms on the Apple Neural Engine (ANE), and support seamless handoff to Private Cloud Compute for complex reasoning.
question: How do you design the on-device grounding architecture and the handoff protocol under these strict memory and latency constraints?
details:
  realistic_solution: Use an asymmetric cascaded architecture. An ultra-small, specialized CoreML model (e.g., a MobileNetV4-based encoder paired with a lightweight transformer decoder, ~15M parameters) continuously runs on the ANE to output bounding boxes and semantic embeddings for UI elements. It relies solely on pixels, bypassing the accessibility tree. For the handoff protocol, instead of sending the raw screenshot to the cloud (which introduces latency and privacy risks), the on-device model generates a highly compressed semantic embedding grid (e.g., 16x16 tokens) of the screen. Only this grid and the user's audio transcript are securely handed off to the Apple Intelligence cloud nodes, drastically reducing bandwidth and preserving user privacy.
  common_mistake: |
    **The Pitfall:** Suggesting running a multi-billion parameter Vision-Language Model (VLM) on-device or relying on accessibility trees.
    **The Rationale:** Candidates often underestimate the 50MB RAM constraint or overestimate the reliability of OS-level UI accessibility features.
    **The Consequence:** Violating memory constraints by orders of magnitude, or building a brittle system that breaks on apps lacking complete accessibility metadata.
  napkin_math: |
    - Memory: 15M parameters quantized to INT4 = ~7.5MB.
    - Activations: Downsampled 512x512 input → 256x256x16 channels x 2 bytes (FP16) = ~2MB.
    - Context/OS Buffer: ~5MB.
    - Total RAM Footprint: ~14.5MB (safely under 50MB constraint).
    - Transferring 7 MB weights from DRAM to NPU SRAM at 25.6 GB/s LPDDR5 bandwidth = 0.27 ms.
    - Compute latency: 12 ms vision encoding + 0.27 ms weight transfer + 8 ms text grounding + 2 ms action mapping = 22.3 ms.
    - **System operates well within acceptable interaction budgets, maintaining low memory footprints.**
