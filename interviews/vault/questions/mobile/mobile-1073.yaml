title: KV-Cache Persistence Across App Sessions on Mobile
scenario: Your on-device LLM assistant must maintain conversation context across app backgrounding. iOS kills backgrounded apps within 30 seconds. The KV-cache for a 2K-token conversation is 64 MB.
question: How would you design a KV-cache persistence strategy that avoids re-prefilling tokens when the app is relaunched?
details:
  realistic_solution: 'Strategy: serialize KV-cache to flash storage on app backgrounding.
    (1) On UIApplicationDidEnterBackground: serialize the KV-cache tensor (64 MB)
    to the app''s sandbox directory. iPhone 15 Pro NVMe: ~2 GB/s write → 64 MB in
    32ms — well within the ~5s background execution window. (2) On app relaunch: load
    serialized KV-cache from flash: 64 MB at ~3 GB/s read = 21ms. Skip prefill entirely.
    (3) Compression: LZ4-compress the KV-cache before writing. FP16 KV data compresses
    ~1.5× → 43 MB, write time 21ms. (4) Validation: include a hash of the model version
    + conversation token IDs. If the model was updated or conversation is stale (>1
    hour), invalidate and re-prefill. (5) Memory pressure handling: register for UIKit
    memory warnings. On low-memory warning, proactively serialize and free KV-cache,
    allowing the model to continue running with a smaller footprint. (6) Alternative:
    quantize KV to INT4 for persistence (16 MB, 8ms write/5ms read), dequantize to
    FP16 on reload. Quality impact minimal for 2K context.'
  common_mistake: |
    **The Pitfall:** Relying on background tasks to keep the KV-cache alive in RAM.
    **The Rationale:** Mobile developers used to cloud environments assume they can keep memory hot indefinitely, fighting strict OS background suspension rules.
    **The Consequence:** The OS forcefully terminates the app, losing the cache and forcing a slow, battery-draining re-prefill on the next launch.
  napkin_math: |
    - **KV-Cache Size:** 64 MB (FP16).
    - **Flash Write/Read:** Write at 2 GB/s = 32ms; Read at 3 GB/s = 21ms.
    - **LZ4 Compression:** ~43 MB. Write = 21ms; Read = 14ms.
    - **Prefill Time Saved:** 2K tokens prefill takes ~500ms.
    - **Result:** Reloading from flash saves **~479ms** of prefill latency on resume.
