title: Evaluating Mixed-Precision ViT on Snapdragon 8 Gen 3
scenario: Your team is deploying a 1B parameter Vision Transformer for real-time video processing on the Qualcomm Hexagon NPU (Snapdragon 8 Gen 3). You must choose between pure FP16, pure INT8, and a mixed-precision approach (INT8 for linear layers, FP16 for softmax and layer normalization) to achieve 30 FPS. The NPU has 45 TOPS INT8 capacity and a shared 12-16 GB LPDDR5X memory system.
question: Which precision strategy ensures a 1B parameter ViT achieves 30 FPS on a Snapdragon 8 Gen 3 Hexagon NPU?
details:
  realistic_solution: The mixed-precision approach is optimal. Heavy matrix multiplications (QKV projections, FFNs) should be quantized to INT8 to leverage the 45 TOPS NPU capacity and halve memory bandwidth pressure. Precision-sensitive operations like Softmax, LayerNorm, and attention scores must remain in FP16 to preserve model accuracy. This leverages the heterogeneous architecture by mapping INT8 dense compute to the NPU's tensor accelerators while safely processing FP16 non-linearities without bottlenecking the system.
  common_mistake: |
    **The Pitfall:** Choosing pure INT8 to maximize the 45 TOPS compute limit.
    **The Rationale:** Engineers aggressively quantize to hit frame rates without checking layer-specific sensitivity.
    **The Consequence:** Operations like Softmax and LayerNorm overflow or lose precision, causing massive accuracy degradation and making the model useless.
  napkin_math: |
    1. **Compute Requirements:** 1B parameter ViT requires ~1 TOPS per frame. At 30 FPS, this is 30 TOPS.
    2. **Pure FP16 Limits:** FP16 halves compute to ~22.5 TFLOPS (fails 30 TOPS requirement). 1B FP16 parameters = 2GB. Streaming at 30 FPS requires 60 GB/s, saturating the ~64 GB/s LPDDR5X bus.
    3. **Pure INT8 Limits:** INT8 meets compute and bandwidth needs, but Softmax/LayerNorm suffer catastrophic accuracy drops in 8-bit.
    4. **Mixed Precision:** INT8 weights (1GB, 30 GB/s bandwidth) hit the 30 FPS compute requirement. FP16 nonlinearities preserve accuracy without saturating bandwidth.
    **Mixed-precision perfectly balances the memory bus, TOPS, and accuracy.**
