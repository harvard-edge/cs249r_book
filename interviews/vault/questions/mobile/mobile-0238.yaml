title: The Mobile Roofline Dilemma
scenario: You're optimizing a real-time style transfer filter on an iPhone 15 Pro, which uses the A17
  Pro SoC. A performance trace reveals a bottleneck in a specific depthwise separable convolution layer.
  For a single inference pass, this layer performs approximately 50 million multiply-accumulate (MAC)
  operations and moves a total of 300 KB of data (weights and activations) over the memory bus. Calculate
  the Arithmetic Intensity of this layer. Is it memory-bound or compute-bound on the A17 Pro's Neural
  Engine?
question: "Is it memory-bound or compute-bound on the A17 Pro's Neural Engine?"
details:
  realistic_solution: The layer is memory-bound. First, calculate the total operations. Since a MAC is
    two operations, 50 million MACs is 100 million Ops. Then, calculate the Arithmetic Intensity (AI)
    by dividing Ops by Bytes moved. The AI is ~333 Ops/Byte. According to the hardware specs, the A17
    Pro's ridge point is ~683 Ops/Byte. Because the layer's AI (333) is less than the chip's ridge point
    (683), its performance is limited by memory bandwidth, not the compute units. It's memory-bound.
  common_mistake: Engineers often confuse the terms. They might incorrectly calculate Arithmetic Intensity
    by forgetting that a MAC operation consists of two FLOPs (a multiply and an add), leading to an AI
    that is off by a factor of two. Another common pitfall is correctly calculating the number but failing
    to compare it against the hardware's ridge point, thus being unable to conclude if the workload is
    memory or compute-bound.
  napkin_math: Total Ops = 50,000,000 MACs * 2 Ops/MAC = 100,000,000 Ops
  options:
  - ~167 Ops/Byte, memory-bound. (Incorrectly assumes 1 MAC = 1 Op)
  - ~333 Ops/Byte, compute-bound. (Correctly calculates AI but misinterprets the result)
  - ~333 Ops/Byte, memory-bound. (Correctly calculates AI and compares to the ridge point)
  - ~42 Ops/Byte, memory-bound. (Incorrectly converts memory from bytes to bits)
  correct_index: 2
