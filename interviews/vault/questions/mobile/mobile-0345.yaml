title: The Mobile Roofline Trap
scenario: You're optimizing a real-time camera filter on an iPhone with an A17 Pro chip. Profiling shows
  that one critical convolution layer performs 10 Giga-Ops (using INT8) and reads 50 Megabytes of data
  (weights and activations) from main memory for each frame processed. The A17 Pro's ANE has 35 TOPS (INT8)
  peak compute and 51.2 GB/s memory bandwidth.
question: "Is a 10 GOps, 50 MB camera-filter layer memory-bound on an A17 Pro, and what roofline comparison shows it?"
details:
  realistic_solution: The layer is **memory-bound**. Its performance is limited by the speed at which
    data can be fetched from memory, not by the raw processing power of the ANE.
  common_mistake: Engineers often see a large number of operations (10 G-Ops) and intuitively assume the
    workload is compute-bound, ignoring the data movement cost. Another common error is correctly calculating
    the Arithmetic Intensity but then misinterpreting the rule, believing a lower AI means it's compute-bound.
  napkin_math: '1. **Arithmetic Intensity:** AI = 10 × 10^9 Ops / (50 × 10^6 Bytes) = 200 Ops/Byte.

    2. **Ridge Point:** 35 × 10^12 / (51.2 × 10^9) ≈ 683 Ops/Byte.

    3. **Compare:** AI (200) << Ridge Point (683) → layer is **memory-bound**.

    4. **Memory time:** 50 MB / 51.2 GB/s ≈ 0.98 ms. Compute time: 10 GOps / 35 TOPS ≈ 0.29 ms.'
  options:
  - Compute-bound, because performing 10 G-Ops per frame is an extremely intensive task.
  - Memory-bound, because the layer's Arithmetic Intensity (200 Ops/Byte) is less than the A17's Ridge
    Point (~683 Ops/Byte).
  - Compute-bound, because the layer's Arithmetic Intensity (200 Ops/Byte) is less than the A17's Ridge
    Point (~683 Ops/Byte).
  - Memory-bound, because the Arithmetic Intensity is ~488 Ops/Byte.
  correct_index: 1
