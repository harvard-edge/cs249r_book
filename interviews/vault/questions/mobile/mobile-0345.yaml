title: The Mobile Roofline Trap
scenario: You're optimizing a real-time camera filter on an iPhone with an A17 Pro chip. Profiling shows that one critical convolution layer performs 10 Giga-Ops (using INT8) and reads 50 Megabytes of data for each frame processed.
question: Is a 10 GOps, 50 MB camera-filter layer memory-bound on an A17 Pro, and what roofline comparison shows it?
details:
  realistic_solution: 'The layer is memory-bound. Its performance is limited by the speed at which data can be fetched from memory, not by the raw processing power of the ANE.'
  common_mistake: |
    **The Pitfall:** Seeing a large number of operations (10 G-Ops) and intuitively assuming the workload is compute-bound.
    **The Rationale:** Engineers focus on the absolute volume of math without calculating the operational intensity relative to the hardware's memory bandwidth limits.
    **The Consequence:** Spending weeks trying to prune or quantize the convolutions (compute) when the actual bottleneck is data movement.
  napkin_math: |
    **Assumptions & Constraints:**
    - Compute requirement: 10 GOps.
    - Data movement: 50 MB.
    - A17 Pro Peak Compute: 35 TOPS. Bandwidth: 51.2 GB/s.

    **Calculations:**
    - Arithmetic Intensity (AI): 10e9 Ops / 50e6 Bytes = 200 Ops/Byte.
    - Hardware Ridge Point: 35e12 Ops / 51.2e9 Bytes = ~683 Ops/Byte.
    - Memory time: 50 MB / 51.2 GB/s = ~0.98 ms. Compute time: 10 GOps / 35 TOPS = ~0.29 ms.

    **Conclusion & Interpretation:**
    - **Result: AI=200 Ops/Byte (Memory-Bound)**. Since AI (200) < Ridge Point (683), the layer is strictly memory-bound.
  options:
  - 'Compute-bound, because the layer''s Arithmetic Intensity is 200 Ops/Byte, which easily saturates the 35 TOPS ANE.'
  - 'Memory-bound, because the layer''s Arithmetic Intensity (200 Ops/Byte) is less than the A17''s Ridge Point (~683 Ops/Byte).'
  - 'Compute-bound, because 35 TOPS is a massive amount of performance, meaning compute limits execution.'
  - 'Memory-bound, because the Arithmetic Intensity is ~488 Ops/Byte.'
