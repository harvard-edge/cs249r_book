title: Diagnosing A17 Pro Neural Engine Utilization
scenario: You are profiling an image enhancement model running at batch size 1 on the Apple A17 Pro Neural
  Engine, which features 35 TOPS of peak compute and shares an 8 GB unified memory. The system provides
  50 GB/s of memory bandwidth to the Neural Engine for this task. The model consists of 10 million INT8
  parameters and requires 700 million operations per inference. When profiling, you observe the accelerator
  achieves exactly 10% of its peak TOPS. Explain why this utilization bottleneck occurs using the roofline
  model.
question: "Why does a 10M-param, 700M-op image enhancer reach only 10% of A17 Pro Neural Engine peak at batch size 1?"
details:
  realistic_solution: The low utilization occurs because the workload is severely memory-bound, falling
    on the sloped memory-bandwidth ceiling of the roofline model. At batch size 1, every weight must be
    loaded from the unified memory for a relatively small number of operations. The model's arithmetic
    intensity is far below the machine's ridge point, meaning the 16-core Neural Engine spends most of
    its time waiting for memory rather than performing math.
  common_mistake: Candidates often assume the low utilization is due to thermal throttling from the ~5W
    power limit or inefficiencies in the 16-core compiler mapping. They might suggest quantization without
    realizing the model is already INT8, missing that the fundamental issue is the operations-to-byte
    ratio at batch size 1.
  napkin_math: 1. Machine Ridge Point = 35 TOPS / 50 GB/s = 700 OPS/Byte. 2. Model Arithmetic Intensity
    (AI) = 700 million ops / 10 million bytes (10MB INT8 weights) = 70 OPS/Byte. 3. Since AI (70) < Ridge
    Point (700), it is memory-bound. 4. Max Achievable Performance = AI * Bandwidth = 70 OPS/Byte * 50
    GB/s = 3.5 TOPS. 5. Utilization = 3.5 TOPS / 35 TOPS = 10%.
