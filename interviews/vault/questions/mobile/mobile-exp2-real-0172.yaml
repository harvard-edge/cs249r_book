title: On-Device LoRA with Apple A17 Pro
scenario: You are designing a cross-device federated learning system to personalize a 1.5B parameter language
  model across millions of user devices. The target device is the Apple A17 Pro, featuring a 16-core Neural
  Engine with 35 TOPS, ~5W thermal budget, and 8 GB of unified memory shared with the CPU/GPU. Evaluate
  the system bottlenecks for local training steps and design a realization strategy that updates the model
  without degrading the user's foreground experience or draining the battery.
details:
  realistic_solution: The optimal approach is to freeze the 1.5B base model using 8-bit quantization and
    apply Low-Rank Adaptation (LoRA) for the federated updates. This drastically reduces the memory footprint
    for optimizer states and gradients. To manage the ~5W thermal budget, training should be aggressively
    batched and throttled using a low duty cycle (e.g., running only when plugged in and idle), utilizing
    the Neural Engine for efficient matrix multiplications while keeping the memory bandwidth saturated
    but not overloaded.
  common_mistake: Candidates often assume the 35 TOPS compute is the primary bottleneck and propose full-model
    fine-tuning, ignoring the 8 GB unified memory limit which must also accommodate iOS and foreground
    apps. They also frequently overlook the thermal budget (~5W), leading to continuous training loops
    that would cause severe thermal throttling.
  napkin_math: '1. Memory: 1.5B params at int8 = 1.5GB. LoRA rank 16 adapters add ~5M params (20MB in
    fp32 for Adam states). Total footprint is ~1.6GB, safely fitting in the 8GB unified memory while leaving
    >6GB for the OS. 2. Compute: A forward/backward pass for a 512-token sequence requires approx 3 *
    1.5B * 512 = 2.3 TeraOps. 3. Throughput: At the Neural Engine''s 35 TOPS peak, compute takes 2.3 /
    35 = ~65ms per step. Assuming ~50 GB/s memory bandwidth, reading 1.5GB takes 30ms. Total step time
    is ~100ms. Running 1 step per second yields a 10% duty cycle, keeping power well under the ~5W limit.'
