title: The On-Device Fine-Tuning Corruption
scenario: Your app performs on-device fine-tuning of a 100M parameter image classifier on a Samsung Galaxy S24 (Snapdragon 8 Gen 3, 12 GB RAM) to personalize for the user's specific objects. After 50 fine-tuning steps, the model's accuracy on the user's objects improves from 60% to 92%. But the model's accuracy on the original 1000 ImageNet classes drops from 85% to 12% — catastrophic forgetting. The base model is effectively destroyed.
question: How can LoRA personalize a 100M image classifier on Galaxy S24 without dropping ImageNet accuracy from 85% to 12%?
details:
  realistic_solution: Full fine-tuning updates all 100M parameters, allowing the model to completely overwrite features learned during pre-training — catastrophic forgetting destroys base accuracy (85% to 12%). LoRA (rank 4) freezes the base model and trains only 400K adapter parameters (1.6 MB weights + 3.2 MB optimizer = 4.8 MB total, vs 1.2 GB for full fine-tuning — a 250x reduction). LoRA achieves 89% on user objects (vs 92% full) while preserving 84% base accuracy (vs 12%). The base model is immutable on flash; only the tiny adapter is modified. This is the only viable approach for on-device fine-tuning.
  common_mistake: |
    **The Pitfall:** Proposing to "use a lower learning rate to prevent catastrophic forgetting."
    **The Rationale:** A lower learning rate slows forgetting but doesn't prevent it, and on mobile, fast adaptation requires a higher learning rate.
    **The Consequence:** The model still drifts and loses its base accuracy over time, rendering it useless for original tasks.
  napkin_math: |
    - Full fine-tuning: 100M params × 4 bytes (FP32) = 400 MB weights + 800 MB optimizer = 1.2 GB training memory.
    - LoRA (rank 4): 400K params × 4 bytes = 1.6 MB weights + 3.2 MB optimizer = 4.8 MB training memory.
    - Memory reduction: 250×.
    - Accuracy on user objects: full fine-tuning 92%, LoRA 89%.
    - Accuracy on original classes: full fine-tuning 12% (destroyed), LoRA 84% (1% drop from base).
    - **LoRA is the only viable approach for fast, non-destructive on-device fine-tuning.**
