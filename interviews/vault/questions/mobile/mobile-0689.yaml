title: The On-Device Fine-Tuning Corruption
scenario: Your app performs on-device fine-tuning of a 100M parameter image classifier on a Samsung Galaxy
  S24 (Snapdragon 8 Gen 3, 12 GB RAM) to personalize for the user's specific objects. After 50 fine-tuning
  steps, the model's accuracy on the user's objects improves from 60% to 92%. But the model's accuracy
  on the original 1000 ImageNet classes drops from 85% to 12% — catastrophic forgetting. The base model
  is effectively destroyed. How do you fine-tune on-device without corrupting the base model?
details:
  realistic_solution: Full fine-tuning updates all 100M parameters, allowing the model to completely overwrite
    features learned during pre-training — catastrophic forgetting destroys base accuracy (85% to 12%).
    LoRA (rank 4) freezes the base model and trains only 400K adapter parameters (1.6 MB weights + 3.2
    MB optimizer = 4.8 MB total, vs 1.2 GB for full fine-tuning — a 250x reduction). LoRA achieves 89%
    on user objects (vs 92% full) while preserving 84% base accuracy (vs 12%). The base model is immutable
    on flash; only the tiny adapter is modified. This is the only viable approach for on-device fine-tuning.
  common_mistake: '"Use a lower learning rate to prevent catastrophic forgetting." A lower learning rate
    slows forgetting but doesn''t prevent it — after enough steps, the model still drifts. And on mobile,
    you want fast adaptation (few steps), which requires a higher learning rate.'
  napkin_math: 'Full fine-tuning: 100M params × 4 bytes (FP32) = 400 MB weights + 800 MB optimizer = 1.2
    GB training memory. Risk: base model corrupted. LoRA (rank 4): 400K params × 4 bytes = 1.6 MB weights
    + 3.2 MB optimizer = 4.8 MB training memory. Risk: zero (base model frozen). Memory reduction: 250×.
    Accuracy on user objects: full fine-tuning 92%, LoRA 89% (3% lower but base model preserved). Accuracy
    on original classes: full fine-tuning 12% (destroyed), LoRA 84% (1% drop from base). LoRA is the only
    viable approach for on-device fine-tuning.'
