title: 'Model Size Estimation: Compare INT4 vs. INT8 Memory for Mobile LLM on Snapdragon'
scenario: 'A team is choosing between INT4 and INT8 quantization for a 7B LLM on a mobile SoC. The use case is a single-user on-device assistant (batch=1).'
question: 'How would you compare memory footprint, TPOT, maximum batch size, and accuracy implications?'
details:
  realistic_solution: 'INT8: 7B × 1B = 7GB. Fits (16-3-1=12GB budget). TPOT: 7GB/77GB/s=90.9ms/token — borderline slow (> 50ms target). INT4: 3.5GB. TPOT: 3.5GB/77GB/s=45.5ms/token ✓. KV budget INT8: 12-7=5GB. KV/token (7B): 524KB (32 layers, 32 KV heads, 128 dim). Tokens: 5GB/524KB=9,542. INT4 KV budget: 12-3.5=8.5GB → 16,221 tokens. INT4 wins on TPOT (45ms vs 91ms), KV capacity (1.7× more), same compute (BW-bound). Accuracy: GPTQ INT4 on 7B: ~0.3 perplexity increase.'
  common_mistake: |
    **The Pitfall:** Assuming INT4 has exactly 2x the compute throughput of INT8 on the NPU.
    **The Rationale:** Engineers scale compute ops directly without realizing generation is memory-bandwidth bound.
    **The Consequence:** Misunderstanding why INT4 improves TPOT (halved memory traffic, not doubled compute speed).
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Device RAM: 16 GB (12 GB available budget). Bandwidth: 77 GB/s.
       - 7B Model size: INT8 = 7 GB, INT4 = 3.5 GB.
       - KV Cache: 524 KB / token.
    2. **Calculations:**
       - INT8 TPOT: 7 GB / 77 GB/s = 90.9 ms. (INT8 KV budget: 12-7 = 5 GB -> 9,542 tokens).
       - INT4 TPOT: 3.5 GB / 77 GB/s = 45.5 ms. (INT4 KV budget: 12-3.5 = 8.5 GB -> 16,221 tokens).
    3. **Conclusion & Interpretation:**
       - **Result: INT4 yields 2x throughput and 1.7x context (Memory-Bound Supremacy).**
