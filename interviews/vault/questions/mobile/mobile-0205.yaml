title: The Mobile KV-Cache Memory Trap
scenario: 'You''re deploying a language model on a flagship smartphone. The model has 32 layers and a hidden dimension of 4096. Your product manager wants to support a context window of 4096 tokens.'
question: 'How much FP16 KV-cache memory does a 32-layer, 4096-hidden LLM need for a 4096-token context on mobile?'
details:
  realistic_solution: 'The KV-cache must store a Key and a Value vector for every token in the context window, across all layers. With FP16 precision, each number takes 2 bytes. The calculation shows this requires 2 GB of RAM, which consumes the entire memory budget for a typical high-performance application on a mobile device.'
  common_mistake: |
    **The Pitfall:** Underestimating the memory footprint of the KV-cache.
    **The Rationale:** Engineers focus only on the model's static weight size and forget that cache size scales linearly with sequence length.
    **The Consequence:** The model frequently OOMs during long conversations on memory-constrained mobile devices.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Architecture: 32 layers, hidden dimension of 4096.
       - Precision: FP16 (2 bytes per number).
       - Target Context Window: 4096 tokens.
    2. **Calculations:**
       - Bytes per Token per Layer: 2 (Key & Value) × 4096 (dim) × 2 bytes = 16,384 bytes.
       - Bytes per Token (All Layers): 16,384 × 32 layers = 524,288 bytes (~0.5 MB).
       - Total KV Cache Size: 4096 tokens × 524,288 bytes/token = 2,147,483,648 bytes.
    3. **Conclusion & Interpretation:**
       **Result: Memory-Bound.** The KV cache alone demands exactly **2 GB of VRAM**, fundamentally starving other system resources without aggressive kv-cache quantization or sparse attention.
  options:
  - '1 GB'
  - '4 GB'
  - '2 GB'
  - '256 MB'
  correct_index: 2
