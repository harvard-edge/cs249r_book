title: The Mobile KV-Cache Memory Trap
scenario: You're deploying a language model on a flagship smartphone. The model has 32 layers and a hidden
  dimension of 4096. Your product manager wants to support a context window of 4096 tokens. If you use
  FP16 precision, how much memory will be consumed *just by the KV-cache*?
details:
  realistic_solution: The KV-cache must store a Key and a Value vector for every token in the context
    window, across all layers. With FP16 precision, each number takes 2 bytes. The calculation shows this
    requires 2 GB of RAM, which consumes the entire memory budget for a typical high-performance application
    on a mobile device.
  common_mistake: Engineers often underestimate the memory footprint of the KV-cache, focusing only on
    the model's weight size. They forget that the cache size scales linearly with the sequence length,
    quickly becoming the dominant memory consumer during inference, especially on memory-constrained mobile
    devices which may have a total app budget of only 2 GB.
  napkin_math: 'Calculate KV cache memory per token: 2 (for Keys and Values) * 32 layers * 4096 hidden
    dimension * 2 bytes (FP16) = 524,288 bytes per token. For a context window of 4096 tokens, the total
    KV cache size is 4096 tokens * 524,288 bytes/token = 2,147,483,648 bytes. The KV cache alone consumes
    exactly 2 GB of RAM.'
  options:
  - 1 GB
  - 4 GB
  - 2 GB
  - 256 MB
  correct_index: 2
