title: A17 Pro Mixed-Precision Bottleneck
scenario: You are deploying a 1.5B parameter language model on the Apple A17 Pro Neural Engine for real-time
  text generation. The device features a 16-core ANE with 35 TOPS of compute, a ~5W power budget, and
  8 GB of unified memory shared with the CPU/GPU. Currently, using FP16 weights, the model achieves only
  8 tokens per second. Analyze the system to identify the core performance bottleneck, and quantify the
  expected speedup if you transition to an INT8 weight-only mixed-precision format.
details:
  realistic_solution: The correct approach is to identify that generative inference at batch size 1 is
    entirely memory-bandwidth bound. Since every parameter must be loaded from the shared 8 GB unified
    memory for each generated token, the massive 35 TOPS compute capacity is mostly idle. By switching
    to INT8 weight-only quantization with FP16 activations, we halve the memory traffic per token, which
    directly scales the generation speed.
  common_mistake: Candidates often assume the bottleneck is related to the 35 TOPS compute capacity or
    the 16-core ANE utilization, proposing complex pruning or architectural changes. They fail to analyze
    the memory bandwidth requirements of autoregressive inference at batch size 1 on a unified memory
    architecture.
  napkin_math: 1.5B parameters in FP16 = 3.0 GB. At 8 tokens/sec, effective memory bandwidth utilized
    is 3.0 GB * 8 = 24 GB/s. Compute required per token is ~3.0 GOPs (2 * 1.5B). On a 35 TOPS ANE, compute
    takes 3.0 GOPs / 35 TOPS = ~0.085 ms per token, proving a severe memory bottleneck. Moving to INT8
    weights reduces the model size to 1.5 GB. Using the same 24 GB/s effective bandwidth, the new speed
    is 24 GB/s / 1.5 GB = 16 tokens/sec, doubling performance while staying within the ~5W budget.
