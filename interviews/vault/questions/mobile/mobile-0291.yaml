title: The INT8 Memory Payoff
scenario: You're optimizing a new augmented reality filter for the latest smartphone. Your MobileNet-style
  vision model has 7 million parameters and is currently stored in FP16 precision. To improve performance
  and reduce battery drain, your team decides to quantize the model's weights to INT8. Explain the impact
  on the model's static memory footprint and calculate the new size in megabytes.
question: "How would you explain the impact on the model's static memory footprint and calculate the new size in megabytes?"
details:
  realistic_solution: Quantizing from FP16 (2 bytes per parameter) to INT8 (1 byte per parameter) halves
    the model's static memory footprint.
  common_mistake: The most common mistakes are either confusing the baseline precision (assuming FP32
    instead of the mobile-standard FP16) or simply stating the reduction is '2x' without calculating the
    absolute values. Another error is confusing bits and bytes, leading to off-by-8x calculation errors.
  napkin_math: 'FP16 size = 7M * 2B = 14MB. INT8 size = 7M * 1B = 7MB. Reduction = 14 - 7 = 7MB (50% savings).
    INT8 model = 7MB, easily fits in mobile memory. Bandwidth savings during loading: 7MB less to read
    from flash, proportional speedup in model init time.'
  options:
  - 14 MB
  - 7 MB
  - 3.5 MB
  - 28 MB
