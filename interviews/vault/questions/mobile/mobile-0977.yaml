title: 'Model Format Conversion: Compare TFLite vs. CoreML for Cross-Platform Mobile Deployment'
scenario: A team trains a single MobileNetV3-Large (5.4M params, 219M MACs) in TensorFlow and needs to deploy on both iOS (A17 Pro, 35 TOPS) and Android (Snapdragon 8 Gen 3, 45 TOPS).
question: "Should TensorFlow MobileNetV3 deploy to iOS through TFLite-to-CoreML conversion or ONNX-to-CoreML?"
details:
  realistic_solution: 'Path A (TFLite→CoreML): TFLite model converted via coremltools.converters.libsvm (deprecated path) or via TFLite→ONNX→CoreML. Multiple conversions introduce op mismatches. iOS performance: CoreML delegate in TFLite ≈ 70% of native CoreML speed. Path B (ONNX→CoreML for iOS, TFLite for Android): 2 models to maintain. iOS performance: native CoreML ~100%. Android TFLite with NNAPI: 80% of native. Recommendation: Path B for max performance; Path A if single-codebase is required.'
  common_mistake: |
    **The Pitfall:** Assuming TFLite runs natively on the iOS Neural Engine with zero overhead.
    **The Rationale:** Engineers rely on the TFLite CoreML delegate for convenience, not realizing it introduces conversion layer overhead and misses native op fusions.
    **The Consequence:** Sacrificing ~30% of potential performance on Apple hardware for the sake of maintaining a single TFLite model codebase.
  napkin_math: |
    **Assumptions & Constraints:**
    - MobileNetV3 MACs = 219M = 438M FLOPs.

    **Calculations:**
    - Native CoreML (Path B): A17 Pro (35 TOPS): 438M / 35T = ~12.5 μs. +0.5 ms overhead = ~0.5 ms total.
    - TFLite CoreML Delegate (Path A): Adds ~30% conversion overhead = ~0.7 ms total.
    - Android TFLite (NNAPI): Snap 8 Gen 3 (45 TOPS): 438M / 45T = ~9.7 μs. +3.0 ms NNAPI overhead = ~3.0 ms total.

    **Conclusion & Interpretation:**
    - **Result: 0.5ms vs 0.7ms (Overhead-Bound)**. The performance difference (0.5ms vs 0.7ms) is small; the decision rests on maintenance cost (2 models vs 1) vs max performance.
