title: Diagnosing Shared Memory Contention on Hexagon NPU
scenario: Production telemetry for your real-time video segmentation model shows severe 99th percentile latency stragglers, jumping from 5ms to over 30ms. The model runs exclusively on the Qualcomm Hexagon NPU (Snapdragon 8 Gen 3), which boasts 45 TOPS INT8 compute, and the spikes correlate exactly with concurrent heavy GPU UI animations. The device features a heterogeneous architecture and a shared 16 GB LPDDR5X memory pool.
question: Why do Hexagon NPU p99 latency stragglers align with heavy GPU UI animations, and how should they be diagnosed?
details:
  realistic_solution: The root cause is memory bandwidth contention on the shared LPDDR5X bus. When the GPU demands massive bandwidth for heavy UI rendering, it starves the NPU of its ability to fetch weights and activations. Even though the Hexagon NPU has 45 TOPS of compute available, the compute units stall waiting for data. To diagnose and fix this, engineers should check system performance counters for memory bus saturation and NPU stall cycles, and subsequently implement QoS (Quality of Service) memory prioritization for the NPU.
  common_mistake: |
    **The Pitfall:** Incorrectly diagnosing the issue as thermal throttling or OS thread scheduling delays.
    **The Rationale:** Candidates fail to analyze the heterogeneous hardware architecture and miss that the NPU, CPU, and GPU share the same physical memory bus.
    **The Consequence:** Attempting to optimize model compute when the actual bottleneck is memory starvation caused by the GPU.
  napkin_math: |
    1. Pure compute time: 1 GOP INT8 model on 45 TOPS NPU = ~0.02ms.
    2. Normal memory fetch time: 10 MB at 68 GB/s peak bandwidth = ~0.15ms.
    3. Contention scenario: GPU consumes 67.5 GB/s, leaving only 0.5 GB/s for the NPU.
    4. Starved memory fetch time: 10 MB / 0.5 GB/s = 20ms.
    5. Total Latency under contention: 0.02ms compute + 20ms fetch = **~20ms straggler**.
