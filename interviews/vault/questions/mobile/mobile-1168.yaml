title: Diagnosing Shared Memory Contention on Hexagon NPU
scenario: Production telemetry for your real-time video segmentation model shows severe
  99th percentile latency stragglers, jumping from 5ms to over 30ms. The model runs
  exclusively on the Qualcomm Hexagon NPU (Snapdragon 8 Gen 3), which boasts 45 TOPS
  INT8 compute, and the spikes correlate exactly with concurrent heavy GPU UI animations.
  Given the heterogeneous architecture and the shared 16 GB LPDDR5X memory pool, diagnose
  the root cause of these telemetry spikes.
question: Why do Hexagon NPU p99 latency stragglers align with heavy GPU UI animations,
  and how should they be diagnosed?
details:
  realistic_solution: The root cause is memory bandwidth contention on the shared
    LPDDR5X bus. When the GPU demands massive bandwidth for heavy UI rendering, it
    starves the NPU of its ability to fetch weights and activations. Even though the
    Hexagon NPU has 45 TOPS of compute available, the compute units stall waiting
    for data. To diagnose and fix this, engineers should check system performance
    counters for memory bus saturation and NPU stall cycles, and subsequently implement
    QoS (Quality of Service) memory prioritization for the NPU.
  common_mistake: Candidates often incorrectly assume the NPU is thermal throttling
    or experiencing OS thread scheduling delays. They fail to analyze the hardware
    architecture, missing that the NPU, CPU, and GPU share the same physical memory
    bus.
  napkin_math: The NPU provides 45 TOPS INT8 compute, meaning a 1 GOP INT8 model theoretically
    requires just ~0.02ms of pure compute. LPDDR5X memory bandwidth typically peaks
    around 68 GB/s. Fetching 10 MB of weights and activations normally takes ~0.15ms.
    However, if the GPU consumes 67 GB/s of the shared LPDDR5X bus for rendering,
    the NPU might be choked to just 0.5 GB/s. At 0.5 GB/s, transferring that same
    10 MB takes 20ms, turning a 5ms inference into a 25ms+ straggler entirely due
    to memory starvation rather than compute bounds.
