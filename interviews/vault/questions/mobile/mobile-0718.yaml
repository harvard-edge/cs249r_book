title: The Heterogeneous Scheduling Trap
scenario: A YOLOv8-S object detection pipeline requires ~7 GOPS per frame and runs on a Snapdragon 8 Gen 3. At 30 FPS (210 GOPS/s), it utilizes less than 0.5% of the NPU's peak compute, yet measurements show 28ms per frame, barely hitting the 30 FPS target.
question: Where does the pipeline spend 28ms if the NPU work accounts for under 0.5% of peak performance?
details:
  realistic_solution: Pre- and post-processing are running on the CPU and dominating the pipeline. Camera frame acquisition, color space conversion (NV21->RGB), resizing, and normalization happen on the CPU before the NPU ever sees a tensor. After inference, non-max suppression (NMS) with hundreds of candidate boxes runs on the CPU too. The NPU inference itself may take only 5-6ms, but the CPU bookends consume 22ms. The bottleneck is the pipeline, not the accelerator.
  common_mistake: |
    **The Pitfall:** Assuming the model is memory-bandwidth bound on the NPU.

    **The Rationale:** Ignoring the heavy CPU pre- and post-processing steps that dominate the end-to-end pipeline execution time.

    **The Consequence:** Focusing optimization efforts on the NPU inference, yielding negligible end-to-end latency improvements.
  napkin_math: |
    *   Camera capture + CSC: ~4ms
    *   Resize + normalize on CPU: ~6ms
    *   NPU inference (YOLOv8-S INT8): ~6ms
    *   NMS (300 candidates): ~8ms
    *   Tensor copy overhead: ~4ms
    *   **Total time: ~28ms** (The NPU is completely idle for 79% of the frame budget)
