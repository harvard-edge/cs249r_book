title: 'Model Format Conversion: Recall ONNX Opset Compatibility for Mobile Deployment'
scenario: A junior engineer asks about converting PyTorch models to CoreML for iOS deployment.
question: "What is the recommended ONNX opset version for converting PyTorch models to CoreML, and why does opset version matter?"
details:
  realistic_solution: |
    Recommended: ONNX opset 17 for CoreML via coremltools. Mobile runtimes lag 6-12 months behind PyTorch's latest opset.
  common_mistake: |
    **The Pitfall:** Blindly using the latest ONNX opset (e.g., opset 19+).
    **The Rationale:** Candidates assume newer is better, not realizing that mobile runtimes and conversion tools (like coremltools) lag 6-12 months behind PyTorch's latest spec.
    **The Consequence:** The model will consistently fail to compile or convert, blocking mobile deployment entirely.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Opset releases: Opset 17 (Stable), Opset 19 (Latest).
       - Toolchain: coremltools lag 6-12 months.
    2. **Calculations:**
       - Opset 19 unsupported ops: ~40%.
       - Conversion failure rate (Opset 19): ~30%.
       - Conversion failure rate (Opset 17): <5%.
    3. **Conclusion & Interpretation:**
       - **Result: Compilation Failure.** Using the absolute latest ONNX opset breaks mobile deployment due to missing operator implementations in the trailing coremltools pipeline.
