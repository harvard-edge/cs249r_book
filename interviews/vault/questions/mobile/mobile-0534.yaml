title: The Mobile Style Transfer Jank
scenario: You are a mobile ML engineer optimizing a real-time neural style transfer filter for a new social
  media app. On an iPhone with an A17 Pro chip, the filter is causing UI jank, taking 25ms to process
  a single frame instead of the 16ms required for a smooth 60 FPS experience. You profile the core style
  transfer layer and find it executes 200 Giga-ops (INT8) and moves 500 MB of data (weights, activations)
  from memory for each frame. Using the mobile hardware specs provided, diagnose the primary performance
  bottleneck for this layer.
question: "Is the 200 GOps style transfer layer compute-bound or memory-bound on A17 Pro, and what roofline evidence supports that diagnosis?"
details:
  realistic_solution: The layer is fundamentally memory-bound. The first step is to calculate the Arithmetic
    Intensity (AI) of the operation. The A17 Pro's hardware ridge point, where it transitions from memory-bound
    to compute-bound, is approximately 683 Ops/Byte. The style transfer layer's AI is significantly lower,
    meaning the Neural Engine is starved for data. To fix this, the engineer must reduce the memory traffic
    relative to the compute, for example by using operator fusion, tiling/blocking strategies for better
    cache locality, or applying model pruning/quantization to reduce the size of weights that need to
    be read.
  common_mistake: Engineers often focus only on the raw number of operations (G-ops) and assume that a
    slow model must be compute-bound. They might also confuse memory capacity (total GB of RAM) with memory
    bandwidth (GB/s), which is the actual bottleneck for data-hungry layers. The key is the *ratio* of
    compute to memory access, known as Arithmetic Intensity.
  napkin_math: '1. **Calculate Arithmetic Intensity (AI):** The style transfer layer performs 200 GOps and reads/writes 500 MB of data. AI = 200e9 / 500e6 = 400 Ops/Byte. 2. **A17 Pro Ridge Point:** ~683 Ops/Byte (35 TOPS / 51.2 GB/s). 3. **Diagnosis:** AI (400) < Ridge Point (683) -> memory-bound. 4. **Achievable throughput:** 400 Ops/Byte * 51.2 GB/s = 20.48 TOPS. The 35 TOPS NPU is underutilized because it is starved for data.'
  options:
  - Compute-bound. The 35 TOPS of the A17 Pro is insufficient to execute 200 Giga-ops within the 16ms
    time budget.
  - Memory-bound. The layer's Arithmetic Intensity (400 Ops/Byte) is below the A17 Pro's ridge point (~683
    Ops/Byte).
  - Thermally-bound. The SoC is likely overheating and throttling the NPU clock speed, a common issue
    in slim devices under sustained load.
  - Memory-bound. The 500 MB of data is too large to fit in the on-chip caches, forcing slow reads from
    main RAM.
  correct_index: 1
