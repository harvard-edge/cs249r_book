title: The Real-Time Translation Deadline
scenario: You're designing a real-time translation feature for a new flagship smartphone. The UI team has given you a strict 16ms render deadline for each new translated word to avoid 'jank'. Your on-device model has a 'Time to First Token' (TTFT) of 100ms for a new sentence, and a 'Time Per Output Token' (TPOT) of 12ms for each subsequent word. In a continuous batching loop, processing N concurrent streams means the model generates one token for each stream sequentially before cycling back.
question: How many concurrent translation streams can you serve within the 16ms render deadline?
details:
  realistic_solution: 'You can only handle 1 concurrent stream within the 16ms render deadline. In a continuous batching loop, the effective time between consecutive tokens for any single stream is N * TPOT, where N is the number of concurrent streams. For 1 stream: interval = 1 * 12ms = 12ms < 16ms (passes). For 2 streams: interval = 2 * 12ms = 24ms > 16ms (fails). The key insight is that ''real-time'' constraints impose hard per-frame deadlines, not just throughput targets. Even though batching 2 streams would increase total throughput, the latency per stream doubles and violates the UI deadline.'
  common_mistake: |
    **The Pitfall:** Assuming multiple streams can be processed simply because TPOT (12ms) is less than the deadline (16ms).
    **The Rationale:** Candidates ignore that in a simple continuous batching loop, token generation for the batch is sequential, delaying subsequent streams.
    **The Consequence:** The latency per stream doubles (or more), violating the strict 16ms UI render deadline and causing perceptible jank.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Deadline: 16ms render budget.
       - Model TTFT: 100ms.
       - Model TPOT: 12ms.
       - Batching paradigm: Continuous batching loop.
    2. **Calculations:**
       - In continuous batching, generating 1 token for N streams means the interval is $N \times TPOT$.
       - For N=1: Interval = $1 \times 12\text{ms} = 12\text{ms} \le 16\text{ms}$ (Pass).
       - For N=2: Interval = $2 \times 12\text{ms} = 24\text{ms} > 16\text{ms}$ (Fail).
    3. **Conclusion & Interpretation:**
       - **Result: 1 Stream Limit**. Batching increases throughput but doubles the per-stream interval, violating the strict 16ms UI latency budget for real-time translation.
  options:
  - 2 streams. You can start the second token generation while the first is being rendered.
  - 0 streams. The 100ms TTFT is much larger than the 16ms deadline, so it's impossible from the start.
  - 1 stream. The token for a second stream would be ready at 24ms, violating the 16ms deadline.
  - As many as memory allows. The 12ms TPOT is less than the 16ms deadline, so latency is not the bottleneck.
  correct_index: 2
