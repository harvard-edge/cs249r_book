title: Tensor G3 On-Device LLM Degradation Strategy
scenario: You are designing the fallback architecture for a real-time translation and summarization feature
  on a device powered by the Google Tensor G3. The primary model is Gemini Nano running on the on-device
  TPU (7.5 TOPS), but the system faces fluctuating thermal constraints and varying availability of the
  12 GB LPDDR5X memory due to concurrent background tasks. Design a fail-operational degradation ladder
  that maintains core functionality when the TPU thermal throttles by 50% and available RAM drops to 2
  GB, synthesizing a QoS shedding strategy without interrupting the user experience.
question: "How would you build a fail-operational degradation ladder for Tensor G3 translation and summarization under thermal and RAM pressure?"
details:
  realistic_solution: 'A robust design involves a multi-tier degradation ladder: Tier 1 uses the full
    Gemini Nano model on the TPU for both tasks. Tier 2 (Thermal Throttling) shifts summarization to a
    smaller, CPU-bound INT4 quantized model while keeping latency-critical translation on the throttled
    TPU. Tier 3 (Severe Memory Pressure, < 2GB) aggressively sheds the summarization feature entirely
    and runs a minimal NMT model on the CPU, guaranteeing fail-operational translation without OOM crashes.'
  common_mistake: Candidates often propose a binary fallback (e.g., switch entirely to a cloud model or
    fail), ignoring the latency and privacy implications in a low-connectivity scenario. They also frequently
    overlook intermediate steps, such as reducing context window size, dynamically switching to a heavily
    quantized model, or offloading non-critical tasks to the CPU.
  napkin_math: At peak, the TPU provides 7.5 TOPS. Assuming Gemini Nano requires 20 GOPS/token, the TPU
    generates 375 tokens/sec (7.5e12 / 20e9). Under 50% thermal throttling, capacity drops to 3.75 TOPS
    (187 tokens/sec). If the full Nano model (e.g., 3B parameters at FP16) takes 6 GB of RAM, a drop to
    2 GB available RAM forces an OOM. Switching to a 1B parameter INT4 model requires only 0.5 GB RAM
    and 5 GOPS/token, fitting the 2 GB constraint and allowing 750 tokens/sec on the throttled 3.75 TOPS
    TPU.
