title: 'The Drowsy Driver''s Battery Drain: Duty Cycling & Energy Harvesting'
scenario: 'Your automotive team is developing a ''Driver Drowsiness Detection'' feature for its companion
  mobile app. The feature uses the phone''s front camera and an ML model. When active, the model consumes
  4W of power from the mobile SoC. To save energy, it operates on a duty cycle: it runs inference for
  2 seconds, then sleeps for 8 seconds, repeating this pattern. A typical user drives for 2 hours per
  day. Explain how you would estimate the total daily energy consumption of this feature and calculate
  the final value in Watt-hours.'
question: "How you would estimate the total daily energy consumption of this feature and calculate the final value in Watt-hours?"
details:
  realistic_solution: The correct approach is to first calculate the *average* power consumption by factoring
    in the duty cycle, and then multiply by the total time. The feature is active for 2 seconds out of
    every 10-second period. This gives a duty cycle of 20%. The average power is the peak power multiplied
    by this duty cycle, which is then used to find the total energy.
  common_mistake: The most common mistake is to neglect the duty cycle and calculate energy consumption
    using the peak power (4W) for the entire duration. This leads to a massive overestimation (5x in this
    case) and would cause engineers to incorrectly reject the feature as being too power-hungry. It ignores
    the critical role of duty cycling in managing power on mobile devices.
  napkin_math: '1. Duty Cycle: Active 2s, Idle 8s per 10s period. Active time is 20%. 2. Power Consumption: Active state draws 4W. Assume idle state draws 0W. Average power = 4W * 0.20 = 0.8W. 3. Daily Energy: The user drives for 2 hours per day. Total energy = 0.8W * 2 hours = 1.6 Wh. This correctly matches the options and directly answers the question.'
  options:
  - 8.0 Wh
  - 6.4 Wh
  - 1.6 Wh
  - 0.8 W
  correct_index: 2
