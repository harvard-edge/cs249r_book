title: 'Roofline Analysis for Mobile AI Accelerator: Optimizing a Vision Model on Snapdragon 8 Gen 3 Hexagon NPU'
scenario: A high-resolution vision model targets 30 FPS on the Snapdragon 8 Gen 3 Hexagon NPU (45 TOPS INT8, ~64 GB/s LPDDR5X bandwidth). Initial profiling shows it only achieves 15 FPS.
question: How would you use Roofline Analysis to diagnose whether the model is compute- or memory-bound and propose optimizations?
details:
  realistic_solution: 'The candidate should first calculate the operational intensity (operations per byte) of the model. Then, using the NPU''s peak compute performance (45 TOPS INT8) and the LPDDR5X memory bandwidth (e.g., assuming ~64 GB/s for LPDDR5X, check typical peak bandwidth), plot the Roofline Model for the Hexagon NPU. Compare the model''s operational intensity against the ''ridge point'' of the roofline.

    If memory-bound: Focus on techniques that reduce memory access, such as:
    1. **Data layout optimization:** Ensure data is accessed contiguously.
    2. **Tiling/blocking:** Process data in smaller chunks that fit into on-chip caches/scratchpads to minimize external memory transfers.
    3. **Quantization:** Reducing bit-width (e.g., from INT8 to INT4 if supported and accurate) reduces data size.
    4. **Model architecture changes:** Use models with higher operational intensity (e.g., depth-wise separable convolutions).

    If compute-bound: Focus on techniques that increase effective compute utilization:
    1. **Model compression:** Pruning, knowledge distillation to reduce MACs.
    2. **Advanced quantization:** Further optimize INT8 usage or explore custom NPU operations.
    3. **Parallelism:** Ensure the model graph maps efficiently to the NPU''s parallel execution units.'
  common_mistake: |
    **The Pitfall:** Immediately applying model compression (pruning, quantization) without checking the bottleneck.

    **The Rationale:** Assuming low FPS is always due to excessive compute requirements (MACs).

    **The Consequence:** Wasting optimization cycles on compute reduction when data movement is the actual limiting factor.
  napkin_math: |
    *   Assume model requires 100 GOPS and processes 2 GB data per frame.
    *   Operational Intensity (OI): 100 GOPS / 2 GB = 50 Ops/Byte.
    *   Roofline Ridge Point: 45,000 GOPS / 64 GB/s = ~703 Ops/Byte.
    *   Comparison: 50 Ops/Byte << 703 Ops/Byte -> Memory-bound.
    *   Required Bandwidth for 30 FPS: 2 GB/frame * 30 FPS = 60 GB/s.
    *   **Result:** Model is limited by the ~64 GB/s system bandwidth ceiling.
