title: 'Roofline Analysis for Mobile AI Accelerator: Optimizing a Vision Model on
  Snapdragon 8 Gen 3 Hexagon NPU'
scenario: You are tasked with optimizing a new, high-resolution vision model for deployment
  on a mobile device powered by the Snapdragon 8 Gen 3 SoC, specifically targeting
  its Hexagon NPU. The Hexagon NPU offers 45 TOPS (tera-operations per second) for
  INT8 operations, and the system is equipped with 12-16 GB of LPDDR5X memory. Your
  initial profiling shows that the model achieves only 15 FPS, which is below the
  target of 30 FPS. Using the Roofline Model, diagnose whether the workload is compute-bound
  or memory-bound, and propose optimization strategies to achieve the target frame
  rate while maximizing NPU utilization.
question: How would you apply roofline analysis to optimize a vision model on Snapdragon
  8 Gen 3 Hexagon NPU?
details:
  realistic_solution: 'The candidate should first calculate the operational intensity
    (operations per byte) of the model. Then, using the NPU''s peak compute performance
    (45 TOPS INT8) and the LPDDR5X memory bandwidth (e.g., assuming ~64 GB/s for LPDDR5X,
    check typical peak bandwidth), plot the Roofline Model for the Hexagon NPU. Compare
    the model''s operational intensity against the ''ridge point'' of the roofline.


    If memory-bound: Focus on techniques that reduce memory access, such as:

    1. **Data layout optimization:** Ensure data is accessed contiguously.

    2. **Tiling/blocking:** Process data in smaller chunks that fit into on-chip caches/scratchpads
    to minimize external memory transfers.

    3. **Quantization:** Reducing bit-width (e.g., from INT8 to INT4 if supported
    and accurate) reduces data size.

    4. **Model architecture changes:** Use models with higher operational intensity
    (e.g., depth-wise separable convolutions).


    If compute-bound: Focus on techniques that increase effective compute utilization:

    1. **Model compression:** Pruning, knowledge distillation to reduce MACs.

    2. **Advanced quantization:** Further optimize INT8 usage or explore custom NPU
    operations.

    3. **Parallelism:** Ensure the model graph maps efficiently to the NPU''s parallel
    execution units.


    The napkin math should involve calculating operational intensity and comparing
    it to the roofline''s ridge point.'
  common_mistake: A common mistake is to immediately jump to optimizing compute operations
    (e.g., pruning, quantization) without first understanding if memory bandwidth
    is the actual bottleneck. Developers might spend significant effort reducing MACs,
    only to find marginal gains if the model's operational intensity is low and it's
    constrained by data movement to/from the LPDDR5X memory.
  napkin_math: 'Let''s assume the model requires 100 GOPS (Giga Operations) and processes
    2 GB of data per frame.


    **Operational Intensity (OI):**

    OI = Operations / Data Movement = 100 GOPS / 2 GB = 50 Ops/Byte.


    **Hexagon NPU Specs:**

    Peak Compute (INT8): 45 TOPS = 45,000 GOPS.

    LPDDR5X Memory Bandwidth (typical peak): ~64 GB/s (for 12-16GB LPDDR5X, actual
    varies but this is a reasonable assumption).


    **Roofline Ridge Point:**

    Ridge Point = Peak Compute / Peak Bandwidth = 45,000 GOPS / 64 GB/s ≈ 703 Ops/Byte.


    Since the model''s OI (50 Ops/Byte) is significantly less than the Ridge Point
    (703 Ops/Byte), the model is likely **memory-bound**. To reach 30 FPS, the memory
    bandwidth required would be:

    Required Bandwidth = (Data Movement per frame) * FPS = 2 GB * 30 FPS = 60 GB/s.


    This is very close to the peak LPDDR5X bandwidth (64 GB/s), indicating that memory
    bandwidth is indeed the primary bottleneck preventing the model from achieving
    target FPS, and further compute optimizations alone might not suffice without
    reducing data movement.'
