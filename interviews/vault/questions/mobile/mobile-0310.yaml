title: The Mobile Jank Budget (mobile-0310)
scenario: You are building a real-time AR filter for a mobile social media app. To ensure a smooth, 'buttery'
  60 FPS user experience, what is the approximate latency budget for your entire ML inference pipeline
  per frame before a user will perceive 'jank'?
details:
  realistic_solution: The latency budget is approximately 16ms. Mobile displays typically refresh at 60Hz,
    meaning a new frame must be ready every 1/60th of a second (~16.67ms). If the ML pipeline takes longer
    than this, it misses the VSYNC signal, the current frame is dropped, and the previous frame is shown
    again. The user perceives this as a visible stutter, known as 'jank'.
  common_mistake: Engineers often confuse the latency budgets between different deployment targets. A
    cloud engineer might think 100ms is acceptable, or an edge engineer might target 33ms (30 FPS). For
    mobile UI, the 60 FPS screen refresh rate imposes a much stricter, non-negotiable deadline.
  napkin_math: 1 second / 60 frames = 0.01667 seconds/frame ≈ 16ms per frame. This is the total budget
    for the entire render loop; the model inference itself must be even faster to account for OS overhead,
    data transfer from the camera, and UI drawing.
  options:
  - ~100ms (Typical cloud service P99 latency)
  - ~33ms (Standard 30 FPS video deadline)
  - ~16ms (60 FPS 'jank' deadline)
  - ~1ms (TinyML interrupt latency)
  correct_index: 2
