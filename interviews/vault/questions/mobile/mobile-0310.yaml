title: The Mobile Jank Budget (mobile-0310)
scenario: You are building a real-time AR filter for a mobile social media app.
question: To ensure a smooth, 'buttery' 60 FPS user experience, what is the approximate latency budget for your entire ML inference pipeline per frame before a user will perceive 'jank'?
details:
  realistic_solution: The latency budget is approximately 16ms. Mobile displays typically refresh at 60Hz, meaning a new frame must be ready every 1/60th of a second (~16.67ms). If the ML pipeline takes longer than this, it misses the VSYNC signal, the current frame is dropped, and the previous frame is shown again. The user perceives this as a visible stutter, known as 'jank'.
  common_mistake: |
    **The Pitfall:** Confusing the strict 60 FPS mobile UI deadline with cloud latency SLAs.
    **The Rationale:** Engineers used to cloud deployments assume 100ms is acceptable, ignoring that mobile displays are hardware-synchronized to strict VSYNC refresh intervals.
    **The Consequence:** Designing models that consistently miss the VSYNC deadline, causing dropped frames and highly visible stutter ('jank').
  napkin_math: |
    **Assumptions & Constraints:**
    - Frame Rate: 60 FPS.

    **Calculations:**
    - Time per Frame: 1 second / 60 frames = 0.01667 seconds.
    - Total Budget: ~16.7ms per frame.

    **Conclusion & Interpretation:**
    - **Result: ~16.7ms (Latency-Bound)**. If the ML pipeline misses this strict VSYNC deadline, the previous frame repeats and UI stutter (jank) occurs.
  options:
  - ~100ms (Typical cloud service P99 latency)
  - ~33ms (Standard 30 FPS video deadline)
  - ~16ms (60 FPS 'jank' deadline)
  - ~1ms (TinyML interrupt latency)
