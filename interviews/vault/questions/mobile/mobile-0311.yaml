title: The On-Device Jank Budget
scenario: You're designing a real-time AI assistant for a new smartphone. The UI team has a strict 'jank budget': any frame taking longer than 16.67ms to render causes perceptible stutter (i.e., the screen refreshes at 60 FPS). Your on-device generative model, running on the NPU, has a measured Time Per Output Token (TPOT) of 25ms.
question: What token throughput results when a mobile generative model's 25ms TPOT is slower than the UI frame deadline?
details:
  realistic_solution: The system's throughput is constrained by its slowest component, which is the model's 25ms token generation time (TPOT). Even though the UI can refresh every 16.67ms, a new token is only produced by the NPU every 25ms. The user will see tokens appear at a rate determined by this bottleneck.
  common_mistake: |
    **The Pitfall:** Assuming system throughput is dictated by the fastest component (the 16.67ms UI).
    **The Rationale:** Engineers incorrectly calculate 1000ms / 16.67ms ≈ 60 tokens/sec, ignoring bottleneck principles.
    **The Consequence:** Massively over-promising throughput capabilities and missing real-world UX targets.
  napkin_math: |
    - **UI Budget:** 16.67 ms (60 FPS).
    - **Model TPOT:** 25 ms.
    - **Throughput Bottleneck:** The pipeline speed is determined by its slowest stage (25 ms).
    - **Calculation:** 1000 ms / 25 ms = **40 tokens/sec**.
  options:
  - ~63 tokens/sec. The throughput is determined by the 16.67ms UI refresh deadline.
  - ~24 tokens/sec. This is derived from the sum of the latencies (16.67ms + 25ms).
  - 40 tokens/sec. The throughput is bottlenecked by the 25ms token generation time.
  - ~111 tokens/sec. This is derived from the difference in latencies (25ms - 16.67ms).
  correct_index: 2
