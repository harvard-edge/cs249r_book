title: The Mobile Memory Chasm
scenario: You're debugging a slow-loading feature in your mobile app that uses an on-device ML model. A profiler points to heavy I/O operations.
question: How much slower is a random read from the phone's UFS flash storage compared to its main LPDDR5 DRAM?
details:
  realistic_solution: A random read from UFS flash is about 1,000x slower than a read from LPDDR5 DRAM. This is why loading model weights from flash is a major bottleneck and why caching data in DRAM is critical for mobile performance.
  common_mistake: |
    **The Pitfall:** Underestimating the latency gap between flash and DRAM.
    **The Rationale:** Confusing high sequential throughput (GB/s) of flash with low-latency random access.
    **The Consequence:** Designing systems that stall the CPU for milliseconds waiting for tiny random reads from storage.
  napkin_math: |
    - LPDDR5 Latency: ~100 ns.
    - UFS Flash Latency: ~100,000 ns (100 µs).
    - Ratio: 100,000 / 100 = 1,000.
    - **A random read from UFS flash is roughly 1,000x slower than LPDDR5 DRAM.**
  options:
  - Flash is ~1,000× slower than DRAM.
  - Flash is ~10× slower than DRAM.
  - They have similar latency, within 2-3× of each other.
  - Flash is actually faster for random reads.
