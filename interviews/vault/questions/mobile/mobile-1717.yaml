title: Exynos NPU Data Contract Violations
scenario: A real-time AR semantic segmentation model on an Exynos 2400 NPU experiences severe lag and complete app freezes. Telemetry shows NPU utilization drops significantly during these spikes. The CPU struggles with preprocessing malformed sensor data (camera frames, IMU) that intermittently deviates from the expected schema. These violations bypass coarse CPU validation, reach the quantized NPU model, and cause NPU stalls.
question: How would you fix Exynos 2400 NPU stalls caused by subtle sensor data contract violations in an AR pipeline?
details:
  realistic_solution: |
    Implement fine-grained, low-latency data quality gates immediately preceding the NPU inference call. Use an optimized micro-validation layer on the CPU (e.g., leveraging SIMD) to perform rapid checks on distributions and types. Implement fallbacks to CPU inference for problematic frames or gracefully drop them to avoid catastrophic NPU stalls.
  common_mistake: |
    **The Pitfall:** Relying solely on coarse schema validation.
    **The Rationale:** Candidates assume the NPU gracefully handles minor data deviations and ignore the high cost of dynamic re-validation when stalls occur.
    **The Consequence:** 'Garbage in, garbage out' scenarios manifest as massive NPU stalls and degraded UX.
  napkin_math: |
    - Problematic frames at 30 FPS (5% error rate): 0.05 * 30 = 1.5 frames/s.
    - Total additional delay per second without fix: 1.5 * (10ms NPU stall + 50ms CPU recovery) = 90ms/s.
    - Micro-validation layer cost: 1ms CPU check per problematic frame.
    - **New delay: 1.5 * 1ms = 1.5ms/s. This saves 88.5ms/s, restoring real-time performance.**
