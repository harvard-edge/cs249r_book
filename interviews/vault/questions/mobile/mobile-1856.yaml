title: Algorithmic Accountability for On-Device Health Decisions
scenario: 'A mobile health app makes automated medication dosage recommendations based
  on an on-device 50M-parameter model using sensor data (heart rate, sleep, activity).
  A patient advocacy group raises three concerns: (1) patients cannot audit how recommendations
  were made, (2) the model may perform differently across demographic groups, (3)
  there is no mechanism to contest incorrect recommendations. Design a responsible
  AI governance framework that operates within mobile compute constraints and does
  not transmit raw health data off-device.'
question: How would you design a responsible AI governance framework that operates
  within mobile compute constraints and does not transmit raw health data off-device?
details:
  realistic_solution: 'Four-layer on-device governance framework: (1) Explainability:
    implement Integrated Gradients for the top 3 contributing features. Cost: 50 interpolation
    steps x 50M params x 2 FLOPs = 5B FLOPs = 0.33ms on Snapdragon 8 Gen 3 NPU at
    15 TOPS. Display top-3 features with contribution percentages to the user. (2)
    Demographic fairness audit: store per-session confidence and user acceptance/rejection
    in an encrypted on-device log. With user consent, aggregate metrics (not raw data)
    are shared using local differential privacy (epsilon=1) for population-level fairness
    monitoring. (3) Contestation mechanism: one-tap disagreement button triggers local
    logging and, after 3 consecutive disagreements, flags for clinician review. (4)
    Uncertainty-gated display: recommendations with model confidence below 70% display
    a mandatory disclaimer to consult a clinician. (5) Accessible model card within
    the app describing validation performance by age and sex group, training data
    demographics, and known limitations.'
  common_mistake: Proposing cloud-side explainability (SHAP values computed server-side)
    as the solution to on-device transparency. This violates data minimization principles
    — health data should not leave the device for explainability computation. All
    governance mechanisms must operate locally.
  napkin_math: 'IG compute: 5B FLOPs / 15 TOPS = 0.33ms — negligible. On-device log:
    1 record/day x 365 x 100 bytes = 36KB/year per user. LDP aggregation: epsilon=1
    Laplace noise on acceptance rate. For 10,000 users sharing weekly aggregate: sensitivity=1/10000,
    noise scale = 1/10000*1 = 0.0001 — effectively zero noise at population scale.
    Upload: 100 bytes x 52 weeks = 5.2KB/year per consenting user. Zero raw sensor
    data leaves device. Full governance stack adds under 1MB app storage and 0.5ms
    per recommendation — imperceptible UX cost.'
