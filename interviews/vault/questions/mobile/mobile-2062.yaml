title: Apply Little's Law to On-Device Translation
scenario: An on-device translation model on a Snapdragon 8 Gen 3 processes text queries arriving steadily at 2 queries per second. Processing one query takes 300ms.
question: Apply Little's Law to determine the average number of queries currently in the system if the average wait time in the queue is observed to be 450ms.
details:
  realistic_solution: 'The total response time in the system (W) is the sum of wait time and service time: 450ms + 300ms = 750ms (0.75 seconds). The arrival rate (lambda) is 2 queries/second. By Little''s Law, the average number of queries in the system (L) is lambda * W = 2 * 0.75 = 1.5 queries. The system handles this backlog smoothly.'
  common_mistake: |
    **The Pitfall:** Using only the queue wait time instead of the total system time.
    **The Rationale:** Candidates incorrectly assume that "wait time" in Little's Law (W) only refers to the time spent waiting in the queue, forgetting to add the service time.
    **The Consequence:** This leads to underestimating the number of active queries in the system.
  napkin_math: |
    - **Queue wait time:** 450ms (0.45s).
    - **Service time:** 300ms (0.30s).
    - **Total system time (W):** 0.45s + 0.30s = 0.75s.
    - **Arrival rate (λ):** 2 queries/second.
    - **Little's Law (L = λ * W):** 2 * 0.75 = 1.5.
    - **Conclusion:** The average number of queries in the system is **1.5**.
