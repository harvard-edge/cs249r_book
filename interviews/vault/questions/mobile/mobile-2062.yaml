title: Apply Little's Law to On-Device Translation
scenario: An on-device translation model on a Snapdragon 8 Gen 3 processes text queries
  arriving steadily at 2 queries per second. Processing one query takes 300ms.
question: Apply Little's Law to determine the average number of queries currently
  in the system if the average wait time in the queue is observed to be 450ms.
details:
  realistic_solution: 'The total response time in the system (W) is the sum of wait
    time and service time: 450ms + 300ms = 750ms (0.75 seconds). The arrival rate
    (lambda) is 2 queries/second. By Little''s Law, the average number of queries
    in the system (L) is lambda * W = 2 * 0.75 = 1.5 queries. The system handles this
    backlog smoothly.'
  common_mistake: Using only the queue wait time (450ms) instead of the total system
    time (750ms) when applying the L = lambda * W formula.
  napkin_math: L = 2 * (0.45 + 0.30) = 1.5 queries in system.
