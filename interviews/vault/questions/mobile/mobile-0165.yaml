title: The Mobile LLM's Memory Hog
scenario: You are deploying a 500M parameter LLM on a mobile device. The model has 20 layers and a hidden dimension of 512. To maintain conversation history, you need to support a context window of 1024 tokens.
question: How much FP16 KV-cache memory is needed for 1024 tokens in a 20-layer, hidden-size-512 mobile LLM?
details:
  realistic_solution: The KV-cache must store a Key and a Value vector for every token, across every layer. Total footprint is calculated by multiplying Sequence Length × 2 × Layers × Hidden Dim × Bytes per precision.
  common_mistake: |
    **The Pitfall:** Forgetting the multiplier factors for Key/Value pairs and byte precision.
    **The Rationale:** Engineers routinely calculate memory for a single token, or forget to multiply by 2 for K+V and by 2 for FP16.
    **The Consequence:** Memory provisioning is drastically underestimated, leading to guaranteed OOM crashes during long-context generation.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Context Window: 1024 tokens.
       - Architecture: 20 layers, 512 hidden dimension.
       - Precision: FP16 (2 bytes per value).
    2. **Calculations:**
       - Memory per Token/Layer: 2 (K+V) * 512 * 2 bytes = 2,048 bytes.
       - Memory per Token Total: 2,048 bytes * 20 layers = 40,960 bytes.
       - Total KV-Cache: 40,960 bytes * 1024 tokens = 41,943,040 bytes.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound.** The KV-cache explicitly consumes ~40 MB, highlighting the scaling memory wall of autoregressive generation on mobile.
  options:
  - 20 MB
  - 40 KB
  - 40 MB
  - 80 MB
  correct_index: 2
