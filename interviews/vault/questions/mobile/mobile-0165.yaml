title: The Mobile LLM's Memory Hog
scenario: You are deploying a 500M parameter LLM on a mobile device to power a chatbot. The model architecture
  has 20 layers and a hidden dimension of 512. To maintain conversation history, you need to support a
  context window of 1024 tokens. Using FP16 precision, explain how you would calculate the memory required
  just for the KV-cache and provide the final value.
details:
  realistic_solution: The KV-cache stores a Key and a Value vector for every token in the context window,
    for every layer of the model. To calculate the total memory, we multiply the sequence length by the
    memory required per token.
  common_mistake: 'Engineers often forget one or both of the ''×2'' factors: the first ''×2'' is for storing
    both Keys and Values, and the second ''×2'' is for the 2 bytes per element in FP16 precision. Another
    common error is to calculate the memory for only a single token, underestimating the total memory
    by a factor of the sequence length.'
  napkin_math: 'KV cache = 2 * L * heads * head_dim * seq_len * bytes. With 20 layers, hidden_dim=512,
    assume heads=8, head_dim=64. FP16=2B. KV = 2 * 20 * 8 * 64 * 1024 * 2 = 2 * 20 * 524288 * 2 = 41,943,040
    B = 40MB. Or simpler: 2 * 20 * 512 * 1024 * 2 = 41.9MB. KV cache ~40MB.'
  options:
  - 20 MB
  - 40 KB
  - 40 MB
  - 80 MB
  correct_index: 2
