title: The Mobile LLM's Memory Hog
scenario: You are deploying a 500M parameter LLM on a mobile device. The model has 20 layers and a hidden dimension of 512. To maintain conversation history, you need to support a context window of 1024 tokens.
question: How much FP16 KV-cache memory is needed for 1024 tokens in a 20-layer, hidden-size-512 mobile LLM?
details:
  realistic_solution: The KV-cache stores a Key and a Value vector for every token in the context window, for every layer of the model. To calculate the total memory, we multiply the sequence length by the memory required per token.
  common_mistake: |
    **The Pitfall:** Forgetting the multiplier factors for Key/Value pairs and byte precision.
    **The Rationale:** Engineers often calculate memory for only a single token or forget to multiply by 2 for K+V and by 2 for FP16 bytes.
    **The Consequence:** The calculated memory is drastically underestimated, leading to OOM crashes during long context generation.
  napkin_math: |
    - **Memory per Token per Layer:** 2 (Key + Value) * 512 (hidden dim) * 2 bytes (FP16) = 2,048 bytes.
    - **Total per Token:** 2,048 bytes * 20 layers = 40,960 bytes.
    - **Total for 1024 Tokens:** 40,960 bytes * 1024 = 41,943,040 bytes.
    - **Final Result:** **~40 MB of KV-cache memory.**
  options:
  - 20 MB
  - 40 KB
  - 40 MB
  - 80 MB
  correct_index: 2
