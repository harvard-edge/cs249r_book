title: 'Fluency: describe inverted residual block execution on Qualcomm Hexagon NPU'
scenario: A mobile ML engineer on your team is new to Qualcomm Hexagon NPU (Snapdragon 8 Gen 3, 45 TOPS).
  They ask how an inverted residual block from MobileNetV2 maps to Hexagon HTP operations and whether
  the expansion ratio t=6 is optimal for Hexagon. Explain the mapping and optimal configuration.
details:
  realistic_solution: 'Hexagon HTP v73 (Snapdragon 8 Gen 3): supports Conv2D, DepthwiseConv2D, BatchNorm,
    ReLU6 as fused operation. MBConv block: expand (1×1 + BN + ReLU6) + depthwise (3×3 + BN + ReLU6) +
    project (1×1 + BN) → fused into 1 HTP dispatch. Expansion ratio t=6 for Hexagon: intermediate channel
    count should be ≤512 for optimal HTP SRAM tiling. For input C=32, t=6 → 192 channels: fine. For C=160,
    t=6 → 960 channels: may exceed HTP tile budget, causing split. Recommend t=4 for high-channel stages
    (C>128) when targeting Hexagon, reducing FLOPs by 33% with <1pp accuracy loss.'
  common_mistake: Assuming Hexagon HTP maps the expand-depthwise-project sequence as three separate kernel
    calls, when modern Hexagon HTP (v73) supports operation fusion across the entire MBConv block into
    a single accelerated op.
  napkin_math: 'Hexagon HTP v73 SRAM: 4MB scratchpad. MBConv intermediate tensor at C=160, t=6, spatial
    7×7: 960 × 7 × 7 × 1B (INT8) = 47KB. Fits in SRAM. At C=320, t=6, spatial 7×7: 1920 × 49 = 94KB —
    still fits. All MobileNetV2 stages fit in HTP SRAM. Tiling consideration: HTP processes in chunks
    of 32 channels × 4×4 spatial tiles. 960 channels / 32 = 30 tiles: 30 HTP dispatch cycles. vs t=4:
    640/32 = 20 cycles → 33% fewer dispatches. At 45 TOPS, each dispatch ~1ns: 30 vs 20 ns per block —
    negligible absolute, but across 17 blocks × 30 FPS = meaningful.'
