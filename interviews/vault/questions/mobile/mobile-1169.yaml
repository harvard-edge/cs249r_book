title: Diagnosing TPU Utilization Drop in Gemini Nano Decoding
scenario: You are deploying a quantized version of Gemini Nano on the Google Tensor G3. The model and KV cache comfortably fit within the 12 GB LPDDR5X memory. However, during autoregressive decoding, generation speed is heavily degraded. Profiling shows the on-device TPU is drastically underutilizing its 7.5 TOPS capability, while the LPDDR5X memory bandwidth is unexpectedly saturated.
question: What operator scheduling or graph execution issue is most likely causing this symptom?
details:
  realistic_solution: The root cause is operator fragmentation preventing layer fusion in the scheduling graph. If an operation (like a custom activation or normalization) isn't supported by the TPU, the scheduler forces a context switch back to the CPU. This breaks layer fusion, forcing the system to write intermediate activations back to the 12 GB main memory instead of keeping them in the TPU's local SRAM, thereby saturating the memory bandwidth and stalling the TPU.
  common_mistake: |
    **The Pitfall:** Misdiagnosing memory saturation as a hardware limitation or overall model size issue.
    **The Rationale:** Candidates see 100% memory bandwidth usage and assume 7.5 TOPS isn't enough, failing to recognize that execution order dictates intermediate memory traffic.
    **The Consequence:** Over-quantizing the model when the real solution is fixing operator fragmentation in the scheduler.
  napkin_math: |
    1. Theoretical limit: LPDDR5X (50 GB/s) / Weight loading (1.5 GB/token) = ~33 tokens/sec.
    2. Fragmentation penalty: Unfused scheduler breaks fusion across 32 layers.
    3. Intermediate traffic: Saving/loading 2MB activation tensor per layer * 32 layers * 2 (read/write) = 128 MB of extra memory traffic per token.
    4. Wasted bandwidth at 5 tokens/sec: 5 * 128 MB = **640 MB/s wasted bandwidth**, introducing host-device synchronization latency that completely stalls the TPU.
