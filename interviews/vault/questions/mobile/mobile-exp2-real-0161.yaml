title: Sizing Inverted Residuals for Hexagon NPU
scenario: Your team is deploying a real-time vision model based on an inverted residual architecture to
  a flagship device powered by a Snapdragon 8 Gen 3. The target hardware for inference is the Qualcomm
  Hexagon NPU, which provides 45 TOPS of INT8 compute and shares 16 GB of LPDDR5X memory with the CPU
  and GPU. You need to size the network to hit a strict 15ms latency budget while evaluating how the NPU's
  massive INT8 throughput impacts the traditional FLOPs-to-latency mapping of depthwise separable convolutions.
details:
  realistic_solution: An L5 engineer will evaluate the NPU's compute-to-memory-bandwidth ratio. They will
    recognize that the Hexagon NPU's 45 TOPS are best utilized by operations with high arithmetic intensity.
    The candidate will propose trading theoretical FLOPs for better hardware utilization by selectively
    replacing memory-bound depthwise convolutions with standard or grouped convolutions, particularly
    in high-resolution early layers, thereby maximizing INT8 throughput while avoiding LPDDR5X bandwidth
    bottlenecks.
  common_mistake: Candidates often assume that strictly minimizing FLOPs by maximizing depthwise separable
    convolutions will guarantee the lowest latency on mobile. They fail to account for arithmetic intensity,
    overlooking that depthwise layers are heavily memory-bandwidth bound and will severely underutilize
    the Hexagon NPU's dense matrix math engines.
  napkin_math: 'Compute capacity: 45 TOPS INT8 = 45 * 10^12 ops/sec. Memory bandwidth (LPDDR5X): ~64 GB/s.
    NPU arithmetic intensity requirement to not be memory bound = 45,000 GOPS / 64 GB/s = ~703 ops/byte.
    A depthwise convolution with a 3x3 kernel reading 8-bit activations and weights has an arithmetic
    intensity of roughly (3*3*2 ops) / (1 byte in + 1 byte out) = 9 ops/byte. 9 << 703, meaning depthwise
    layers are strictly memory-bound. To process a 2MB feature map takes 2MB / 64GB/s = 0.031ms in memory
    time, while the compute takes only ~0.0004ms. Sizing the model requires increasing channel counts
    (1x1 convolutions) to push arithmetic intensity closer to the NPU''s sweet spot, leveraging the ''free''
    45 TOPS.'
