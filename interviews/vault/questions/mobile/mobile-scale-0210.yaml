title: Mobile Federated Update Upload Budget
scenario: A mobile federated learning round selects 100,000 devices. Each device uploads a compressed 2 MB adapter update over Wi-Fi. Estimate aggregate uplink volume and explain why server aggregation bandwidth matters.
question: How much uplink data does a mobile FL round collect from 100,000 devices with 2 MB compressed updates?
details:
  realistic_solution: The round collects 200,000 MB, or about 200 GB, of updates. Even though each device upload is small, the aggregation service must ingest and validate hundreds of GB per round, handle stragglers, and protect privacy.
  common_mistake: Thinking only about per-device bandwidth and ignoring aggregate server-side ingest.
  napkin_math: 100,000 x 2 MB = 200,000 MB ≈ 200 GB.
