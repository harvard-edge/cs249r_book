title: On-Device Coreset Sizing for A17 Pro
scenario: You are designing an on-device personalization pipeline that fine-tunes a model daily using
  the Apple A17 Pro Neural Engine (16-core, 35 TOPS, ~5W, 8 GB shared memory). You start with a raw daily
  log of 500,000 user interaction samples, but you must use data pruning to select a coreset because the
  fine-tuning job is strictly budgeted to exactly 2 seconds of active Neural Engine time to preserve battery
  life. If each sample requires 200 Mega-Operations for a full forward-backward training pass, you run
  10 epochs over the coreset, and your implementation achieves 50% utilization of the ANE's theoretical
  TOPS, calculate the required maximum coreset size.
details:
  realistic_solution: The correct approach involves calculating the actual operations budget based on
    the A17 Pro's specs and the time limit, then dividing it by the total compute cost per sample across
    all epochs. To hit this target in practice, the system would run a lightweight coreset selection or
    data pruning algorithm (like entropy-based filtering) to filter the 500,000 samples down to the calculated
    limit before the fine-tuning begins.
  common_mistake: Candidates often forget to account for the hardware utilization factor (assuming 100%
    of the 35 TOPS is reachable) or fail to multiply the per-sample compute cost by the total number of
    epochs.
  napkin_math: '1. Effective Compute = 35 TOPS * 0.50 utilization = 17.5 TOPS (17.5e12 OPS).

    2. Total Operations Budget = 17.5e12 OPS * 2 seconds = 35e12 Operations.

    3. Total compute per sample = 200e6 OPS/sample * 10 epochs = 2e9 Operations/sample.

    4. Max Coreset Size = Total Operations Budget / Total compute per sample = 35e12 / 2e9 = 17,500 samples.'
