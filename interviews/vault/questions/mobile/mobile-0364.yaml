title: The MobileNet Bottleneck
scenario: A MobileNet depth-wise convolution layer takes a 112x112x64 INT8 input, uses a 3x3x64 INT8 kernel, and produces a 112x112x64 INT8 output. The target device is an Apple A17 Pro with 35 TOPS and 51.2 GB/s memory bandwidth.
question: What is the arithmetic intensity of this depth-wise convolution, and why is it memory-bound?
details:
  realistic_solution: The operation is heavily memory-bound. To determine this, we calculate the Arithmetic Intensity (AI) and compare it to the hardware's ridge point. The Apple A17 Pro's ridge point is ~683 Ops/Byte. If the layer's AI is significantly lower, it's memory-bound.
  common_mistake: |
    **The Pitfall:** Only considering the model's weight tensor for the memory component of Arithmetic Intensity.

    **The Rationale:** Ignoring the much larger memory traffic from reading the input activations and writing the output activations.

    **The Consequence:** Calculating a wildly inflated AI value and mistakenly concluding the layer is compute-bound.
  napkin_math: |
    *   Operations: 112 * 112 * 64 * 9 * 2 = 14.45M ops.
    *   Input data: 112 * 112 * 64 = 802,816 bytes.
    *   Kernel data: 3 * 3 * 64 = 576 bytes.
    *   Output data: 112 * 112 * 64 = 802,816 bytes.
    *   Total memory traffic: 1,606,208 bytes (~1.6 MB).
    *   Arithmetic Intensity (AI): 14.45e6 / 1.606e6 = 9.0 Ops/Byte.
    *   A17 Ridge Point: 35e12 / 51.2e9 = 683 Ops/Byte.
    *   **Conclusion:** 9.0 << 683, proving the layer is heavily memory-bound.
  options:
  - AI is ~25,175 Ops/Byte; it's compute-bound.
  - AI is ~9 Ops/Byte; it's compute-bound because it involves millions of operations.
  - AI is ~4.5 Ops/Byte; it's memory-bound.
  - AI is ~9 Ops/Byte; it's memory-bound because this is far below the A17's ridge point of ~683 Ops/Byte.
  correct_index: 3
