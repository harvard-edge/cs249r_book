title: The MobileNet Bottleneck
scenario: You're an engineer at a smartphone company trying to optimize a MobileNet-style vision model
  for real-time performance. A profiler shows a specific depth-wise separable convolution layer is a major
  bottleneck. The layer takes a 112x112x64 INT8 input tensor, uses a 3x3x64 INT8 kernel, and produces
  a 112x112x64 INT8 output. Your target device is an Apple A17 Pro.
question: "What is the arithmetic intensity of the 112x112x64 depthwise convolution, and why is it memory-bound?"
details:
  realistic_solution: The operation is heavily memory-bound. To determine this, we calculate the Arithmetic
    Intensity (AI) and compare it to the hardware's ridge point. The Apple A17 Pro's ridge point is ~683
    Ops/Byte. If the layer's AI is significantly lower, it's memory-bound.
  common_mistake: The most common mistake is to only consider the model's weight tensor for the memory
    component of Arithmetic Intensity. This ignores the much larger memory traffic from reading the input
    tensor and writing the output tensor, leading to a wildly inflated and incorrect AI value. Another
    error is confusing a large number of operations with being 'compute-bound'.
  napkin_math: 'DW conv: Ops = 112*112*64*9*2 = 14.5M ops. Data: input = 112*112*64 = 802,816B. Kernel
    = 3*3*64 = 576B. Output = 802,816B. Total bytes = 1,606,208B. AI = 14.5e6/1.6e6 = 9.1 Ops/Byte. A17
    ridge point = 35e12/51.2e9 = 683 Ops/Byte. Since 9.1 << 683, heavily memory-bound. Performance limited
    by bandwidth, not compute.'
  options:
  - AI is ~25,175 Ops/Byte; it's compute-bound.
  - AI is ~9 Ops/Byte; it's compute-bound because it involves millions of operations.
  - AI is ~4.5 Ops/Byte; it's memory-bound.
  - AI is ~9 Ops/Byte; it's memory-bound because this is far below the A17's ridge point of ~683 Ops/Byte.
  correct_index: 3
