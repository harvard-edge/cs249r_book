math_issues:
- Math calculates 60ms compute per chunk, and states there are 8 chunks per forward pass. This would require
  480ms of total compute per token. However, it erroneously concludes the token latency is '60ms compute
  + 8ms stall = 68ms/token', incorrectly conflating the compute per chunk with total compute.
