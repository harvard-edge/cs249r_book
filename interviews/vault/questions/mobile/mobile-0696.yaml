title: The On-Device LLM Memory Architecture
scenario: Your PM wants to run a 3B parameter LLM on a phone with 8 GB RAM. In FP16, the weights alone
  are 6 GB. The OS uses 3 GB. You have 5 GB available. Design a memory architecture that makes this work.
details:
  realistic_solution: 'Design paged weight streaming: partition the model into 256 MB chunks stored on
    UFS 4.0 flash (4.2 GB/s read). Maintain a 1 GB resident buffer. During inference, load chunk N+1 while
    computing chunk N — prefetch hides the 61ms load latency behind 60ms compute, leaving only ~1ms stall
    per chunk. For 32 layers across 8 chunks: 8ms total stall but 480ms total compute, yielding 488ms/token
    for streamed FP16. INT4 (1.5 GB) loads entirely into memory for fast inference at 60ms/token. Implement
    an LRU page eviction policy and serialize hot pages to flash on app backgrounding for instant resume.'
  common_mistake: '"It doesn''t fit — tell the PM it''s impossible" or "Just quantize to INT4." INT4 (1.5
    GB) is one solution, but the PM also wants FP16 quality for premium users. You need a general architecture.'
  napkin_math: 'FP16 weights: 3B × 2 = 6 GB (doesn''t fit in 5 GB available). INT4 weights: 3B × 0.5 =
    1.5 GB ✓. FP16 streaming: 1 GB buffer, 256 MB chunks, UFS 4.0 at 4.2 GB/s → 61ms per chunk load. 4
    blocks × 15ms = 60ms compute per chunk. Prefetch hides latency: 61ms load overlaps with 60ms compute
    → ~1ms stall per chunk. 32 layers / 4 per chunk = 8 chunks per forward pass. Total stall: ~8ms per
    token. Total compute: 8 chunks × 60ms = 480ms. Token latency: 480ms compute + 8ms stall = **488ms/token**.
    INT4 (1.5 GB) loads entirely into memory for premium speed (60ms/token). FP16 streaming adds 488ms/token
    — a significant trade-off for full FP16 precision.'
