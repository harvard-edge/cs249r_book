title: 'Snapdragon 8 Gen 3: Encoder-Decoder Architecture Tradeoffs for On-Device AI'
scenario: A company is developing an on-device AI assistant for a smartphone powered by the Snapdragon 8 Gen 3 Hexagon NPU. They are evaluating three architectural approaches for a core natural language processing task: an encoder-only model for sentiment analysis, a decoder-only model for conversational response generation, and an encoder-decoder model for on-device translation.
question: What are the latency, memory, and power tradeoffs among encoder-only, decoder-only, and encoder-decoder models on Snapdragon 8 Gen 3?
details:
  realistic_solution: A realistic solution involves careful model quantization (leveraging the 45 TOPS INT8 capability), pruning, and distillation to fit within the LPDDR5X memory budget. For decoder-only models, optimizing KV cache management and employing techniques like speculative decoding or custom NPU operators for attention can reduce latency. Encoder-decoder models might require more aggressive optimization or partitioning between NPU and CPU/DSP to manage computational load and memory, with a strong focus on minimizing data movement.
  common_mistake: |
    **The Pitfall:** Underestimating the latency impact of sequential token generation in decoder-only models compared to the parallel processing of encoder-only models.
    **The Rationale:** Engineers often focus on the NPU's peak throughput without considering the dynamic memory requirements for decoder caches (KV cache) and sequential memory access patterns.
    **The Consequence:** This oversight can lead to unexpected memory exhaustion and failure to meet real-time latency targets.
  napkin_math: |
    - **Model size:** 3B parameters. In FP16, it requires ~6GB; quantized to INT8, ~3GB.
    - **Decoder context:** For 2048 tokens and 32 heads, the KV cache (FP16) across 32 layers is ~1GB for a single sequence.
    - **Compute theoretical limit:** If a forward pass for a single token generation in an INT8 model requires roughly 25 GOPs, the 45 TOPS (INT8) NPU could theoretically process 45,000 GOPs / 25 GOPs/token = 1,800 tokens/second.
    - **Practical throughput:** The sequential nature of decoding and memory access patterns will significantly reduce this to **much lower actual tokens/second**.
