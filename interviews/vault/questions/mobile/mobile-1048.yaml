title: 'Mobile TCO Realization: Memory Cost of On-Device Model Hosting'
scenario: You are calculating the memory footprint and user storage cost for hosting multiple on-device AI models on an A17 Pro device. The models are Llama-3-8B INT4 (4GB), Whisper-large INT8 (1.5GB), and Stable Diffusion XL INT8 (6.5GB).
question: Can these three models fit in the A17 Pro's 8GB RAM budget, and what is their effective storage cost on a 256GB ($1199) device?
details:
  realistic_solution: 'RAM budget: 8GB total - 2GB OS/apps = 6GB available. Model RAM footprints: Llama INT4=4GB, Whisper INT8=1.5GB, SD XL INT8=6.5GB. Total: 12GB >> 6GB. Cannot all fit simultaneously. LRU paging strategy: load on demand, evict LRU. Cache hit: instant. Cache miss: load from storage. Load time: 256GB iPhone storage at ~3GB/s: Llama(4GB)=1.33s, Whisper=0.5s, SDXL=2.17s. Storage cost: 256GB iPhone=$1199, marginal cost per GB ≈ $1199/256=$4.68/GB (consumer premium storage). Model storage: 4+1.5+6.5=12GB * $4.68=$56.16 storage cost (hidden hardware cost of models). Annual model updates: download 12GB * 12 times = 144GB = $14.4 data plan cost.'
  common_mistake: |
    **The Pitfall:** Confusing model storage (on flash memory) with active RAM footprint.
    **The Rationale:** Candidates often assume models load and unload from RAM automatically without considering LRU cache management or the distinction between disk space and active memory.
    **The Consequence:** This leads to inaccurate feasibility assessments for simultaneous model execution and ignores the latency cost of cache misses.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Hardware: 8GB total RAM, 256GB Flash Storage ($1199 MSRP).
       - Available RAM: 8GB - 2GB (OS/apps) = 6GB.
       - Model Sizes: 4GB + 1.5GB + 6.5GB = 12GB total.
    2. **Calculations:**
       - RAM Deficit: 12GB required > 6GB available (Cannot co-reside).
       - Storage Cost per GB: $1199 / 256GB = $4.68/GB.
       - Total Storage Hardware Cost: 12GB * $4.68/GB = $56.16.
       - Data Plan Cost: Annual 12GB updates (144GB/yr) at ~$0.01/GB = $1.44/yr.
    3. **Conclusion & Interpretation:**
       - **Result: Hardware Cost Premium**. The models require LRU paging since they exceed RAM, and impose a permanent **$56 hardware storage tax** per user device.
