title: 'Mobile TCO Realization: Memory Cost of On-Device Model Hosting'
scenario: 'Concretely calculate the memory footprint and user storage cost for hosting
  multiple on-device AI models on A17 Pro (8GB RAM, 256GB storage): (1) Llama-3-8B
  INT4 (4GB), (2) Whisper-large INT8 (1.5B params, 1.5GB), (3) Stable Diffusion XL
  INT8 (6.5B params, 6.5GB). Can all three fit in RAM simultaneously? Calculate storage
  cost in terms of device purchase price per GB.'
question: Can Llama-3-8B INT4, Whisper-large INT8, and SDXL INT8 all fit in A17 Pro's
  6 GB app RAM budget?
details:
  realistic_solution: 'RAM budget: 8GB total - 2GB OS/apps = 6GB available. Model
    RAM footprints: Llama INT4=4GB, Whisper INT8=1.5GB, SD XL INT8=6.5GB. Total: 12GB
    >> 6GB. Cannot all fit simultaneously. LRU paging strategy: load on demand, evict
    LRU. Cache hit: instant. Cache miss: load from storage. Load time: 256GB iPhone
    storage at ~3GB/s: Llama(4GB)=1.33s, Whisper=0.5s, SDXL=2.17s. Storage cost: 256GB
    iPhone=$1199, marginal cost per GB ≈ $1199/256=$4.68/GB (consumer premium storage).
    Model storage: 4+1.5+6.5=12GB * $4.68=$56.16 storage cost (hidden hardware cost
    of models). Annual model updates: download 12GB * 12 times = 144GB = $14.4 data
    plan cost.'
  common_mistake: Confusing model storage (on flash, ~$0.10/GB consumer) with RAM
    footprint (active during inference), and assuming models load/unload from RAM
    automatically without considering LRU cache management.
  napkin_math: 'RAM: 6GB available. Models: 4+1.5+6.5=12GB total. Cannot coexist.
    LRU: keep 1 model loaded, load others on demand. Load times: 4/3=1.33s (Llama),
    1.5/3=0.5s (Whisper), 6.5/3=2.17s (SDXL). P99 latency from cold start: +2.17s.
    Storage: 12GB on 256GB. Cost fraction: 12/256=4.7% of device storage. At $1199
    device: 4.7%*$1199=$56. Annual updates: 12GB*$0.01/GB(cellular)=$0.144 per update
    cycle. 12 updates/yr: $1.73/yr. Total 2yr model storage cost: $56+$3.46=$59.46
    per device.'
