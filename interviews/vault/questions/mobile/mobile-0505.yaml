title: The Mobile App's Cloud Latency Mystery
scenario: You are a mobile ML engineer on the AI Assistant team. Your new cloud-backed feature is suffering from high P99 latency. On-device processing is fast (<10ms), but the end-to-end time is averaging ~180ms. The backend team, which runs a 2-GPU tensor-parallel inference service for your feature on H100s, provides you with an average timing breakdown showing an 85ms sync time.
question: What intra-server GPU interconnect bottleneck most likely explains 85ms sync time in a 2-GPU H100 inference service?
details:
  realistic_solution: 'The bottleneck is the interconnect between the two GPUs on the same server. The 85ms sync time is far too high for the expected NVLink bridge that directly connects H100s. This latency profile strongly indicates the GPUs are not on the same NVLink fabric and are instead being forced to communicate over the much slower PCIe bus. This is a classic symptom of a server misconfiguration or a bad host allocation in the cluster, where a 2-GPU job was accidentally scheduled on two cards that don''t have a direct, high-speed NVLink path.'
  common_mistake: |
    **The Pitfall:** Blaming the wrong communication layer, such as the rack-level network (InfiniBand).
    **The Rationale:** Ignoring the trace data and assuming the model is simply "too big" or "compute-bound."
    **The Consequence:** Overlooking an intra-server hardware misconfiguration, leading to wasted time trying to optimize the model rather than fixing the server infrastructure.
  napkin_math: |
    - End-to-end is 180ms. Mobile inference is 10ms. Network round-trip ~50ms. Remaining backend latency = 120ms.
    - A 2-GPU tensor-parallel setup requires an All-Reduce sync between every layer.
    - If there are 32 layers exchanging 20MB each, total data = 640MB per token generation.
    - Over PCIe Gen4 (32GB/s bidirectional, but using 32GB/s single direction for estimation), 640MB takes 20ms.
    - Generating ~4 tokens per request makes the sync take 80ms.
    - **Missing NVLink bridges forces the GPUs to communicate over the PCIe bus, which perfectly explains the 85ms sync bottleneck!**
  options:
  - The InfiniBand network connecting the servers in the rack is saturated.
  - The model is too large, causing the compute phases on the H100s to be the bottleneck.
  - The two GPUs are communicating over the PCIe bus instead of NVLink, likely due to a server misconfiguration.
  - The GPU HBM is full, causing the system to swap activations to slower system DRAM.
  correct_index: 2
