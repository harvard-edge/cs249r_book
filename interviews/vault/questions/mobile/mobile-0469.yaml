title: The Mobile ViT Latency Trap
scenario: 'You are a Senior ML Engineer at a smartphone company, tasked with shipping a new real-time video
  bokeh effect. The feature must run at 30 FPS (a 33ms per-frame budget) on the new flagship phone, which
  features an Apple A17 Pro-class NPU (35 TOPS, 51.2 GB/s memory bandwidth). You are evaluating two 6M parameter INT8 models: a Mobile-ViT (2 GOps, 400 MB data movement) and an EfficientCNN (4 GOps, 20 MB data movement).'
question: "Why can a Mobile-ViT be much slower than an EfficientCNN on a mobile NPU despite fewer operations?"
details:
  realistic_solution: The core issue is the difference in Arithmetic Intensity (AI) between the two models.
    The `Mobile-ViT`, with its random-access patterns in the self-attention layer, is severely memory-bandwidth
    bound. Its low AI means it cannot effectively saturate the NPU's powerful compute units because the
    chip is constantly stalled, waiting for data to be fetched from the comparatively slow main memory
    (LPDDR5).
  common_mistake: Engineers, especially those from a cloud background, often focus exclusively on parameter
    count or total operations (G-Ops/MACs). They mistakenly assume that fewer Ops automatically translates
    to lower latency. This ignores the reality that on-chiplet memory bandwidth, not compute, is often
    the most constrained resource on a mobile SoC.
  napkin_math: 'We can prove this by calculating the achievable TOPS for each model, which is limited
    by its Arithmetic Intensity (AI) and the system''s memory bandwidth.


    **Hardware Ridge Point:** 35 TOPS / 51.2 GB/s ≈ 684 Ops/Byte


    **Model A: Mobile-ViT (Transformer-based)**

    1. Params: 6M (INT8) → 6 MB weights. Self-attention requires reading Q, K, V matrices with poor reuse.

    2. Total Ops: 2 GOps. Total data movement: ~400 MB (due to large activation reads for attention).

    3. AI = 2 GOps / 400 MB = **5 Ops/Byte** → memory-bound

    4. Achievable throughput = 5 × 51.2 GB/s = 256 GOps/s = 0.256 TOPS

    5. Latency = 2 GOps / 0.256 TOPS = **7.8 ms**


    **Model B: EfficientCNN (Convolution-based)**

    1. Params: 6M (INT8) → 6 MB weights. Convolutions have high data reuse (sliding window).

    2. Total Ops: 4 GOps. Total data movement: ~20 MB (high cache reuse).

    3. AI = 4 GOps / 20 MB = **200 Ops/Byte** → still memory-bound but much closer to ridge

    4. Achievable throughput = 200 × 51.2 GB/s = 10.24 TOPS

    5. Latency = 4 GOps / 10.24 TOPS = **0.4 ms**


    Despite having 2× fewer Ops, the Mobile-ViT is **~20× slower** because its low AI starves the NPU.
    The CNN''s high data reuse keeps the compute pipeline full. Both fit within the 33ms budget, but the
    ViT consumes far more energy due to DRAM thrashing.'
  options:
  - The ViT has fewer Ops, so the problem must be that its operators, like Softmax and LayerNorm, are
    not well-supported by the NPU and are running on the CPU.
  - The `Depthwise-CNN` is faster because depthwise separable convolutions are inherently more parallelizable
    than the sequential operations within a Transformer block.
  - The `Mobile-ViT` is severely memory-bandwidth bound. Its low Arithmetic Intensity prevents it from
    utilizing the NPU's compute, as it's constantly stalled waiting for data from main memory.
  - The total memory footprint (500 MB) of the `Mobile-ViT` is too large for the phone's 8 GB of RAM,
    causing excessive swapping to flash storage.
  correct_index: 2
