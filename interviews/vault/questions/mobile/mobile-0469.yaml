title: The Mobile ViT Latency Trap
scenario: 'You are evaluating two 6M parameter INT8 models for a 30 FPS video bokeh effect on an Apple A17 Pro-class NPU (35 TOPS, 51.2 GB/s memory bandwidth): a Mobile-ViT (2 GOps, 400 MB data movement) and an EfficientCNN (4 GOps, 20 MB data movement).'
question: Why can a Mobile-ViT be much slower than an EfficientCNN on a mobile NPU despite having fewer total operations?
details:
  realistic_solution: The core issue is the difference in Arithmetic Intensity (AI) between the two models. The `Mobile-ViT`, with its random-access patterns in the self-attention layer, is severely memory-bandwidth bound. Its low AI means it cannot effectively saturate the NPU's powerful compute units because the chip is constantly stalled, waiting for data to be fetched from the comparatively slow main memory (LPDDR5).
  common_mistake: |
    **The Pitfall:** Focusing exclusively on parameter count or total G-Ops/MACs as a proxy for latency.
    **The Rationale:** Cloud-native engineers mistakenly assume that fewer operations automatically translate to lower execution time, ignoring the severe memory-bandwidth limitations of mobile SoCs.
    **The Consequence:** Selecting architectures like transformers with extremely low Arithmetic Intensity that starve the NPU and drain the battery through DRAM thrashing.
  napkin_math: |
    **Assumptions & Constraints:**
    - NPU Specs: 35 TOPS, 51.2 GB/s memory bandwidth.
    - Mobile-ViT: 2 GOps, 400 MB data movement.
    - EfficientCNN: 4 GOps, 20 MB data movement.

    **Calculations:**
    - Hardware Ridge Point: 35 TOPS / 51.2 GB/s = ~684 Ops/Byte.
    - Mobile-ViT AI: 2 GOps / 400 MB = 5 Ops/Byte (Severely memory-bound).
    - Mobile-ViT Latency: 2 GOps / (5 Ops/Byte * 51.2 GB/s) = 7.8 ms.
    - EfficientCNN AI: 4 GOps / 20 MB = 200 Ops/Byte.
    - EfficientCNN Latency: 4 GOps / (200 Ops/Byte * 51.2 GB/s) = 0.4 ms.

    **Conclusion & Interpretation:**
    - **Result: ~20x slower for ViT (Memory-Bound)**. Despite half the compute operations, the ViT is vastly slower because its low Arithmetic Intensity constantly stalls the NPU pipeline.
  options:
  - 'The ViT has fewer Ops, so the problem must be that its operators, like Softmax and LayerNorm, are not well-supported by the NPU and are running on the CPU.'
  - 'The `Depthwise-CNN` is faster because depthwise separable convolutions are inherently more parallelizable than the sequential operations within a Transformer block.'
  - 'The `Mobile-ViT` is severely memory-bandwidth bound. Its low Arithmetic Intensity prevents it from utilizing the NPU''s compute, as it''s constantly stalled waiting for data from main memory.'
  - 'The total memory footprint (500 MB) of the `Mobile-ViT` is too large for the phone''s 8 GB of RAM, causing excessive swapping to flash storage.'
