title: The Energy Cost of Precision
scenario: Your team is trying to optimize a new feature on a mobile device to reduce battery drain. The
  model currently runs in 32-bit floating point (FP32). A proposal is made to quantize the model to 8-bit
  integers (INT8). Roughly how much less energy does a single INT8 arithmetic operation consume compared
  to a single FP32 operation?
details:
  realistic_solution: An INT8 operation is approximately **18 times** more energy-efficient than an FP32
    operation. This is a fundamental physical invariant based on the energy required for digital logic
    to perform the calculations. For mobile devices, this is a critical lever for managing battery life
    (a key user-facing cost) and thermal envelopes.
  common_mistake: A common mistake is assuming the energy savings are linear with the reduction in bit-width
    (i.e., 32 bits / 8 bits = 4×). This ignores the physics of the underlying digital circuits, where
    the energy consumed by multipliers scales non-linearly with the number of bits.
  napkin_math: 'This is a direct recall from the standard ML Systems Engineer playbook. From the ''Invariants''
    table:'
  options:
  - ~2×
  - ~4×
  - ~18×
  - ~100×
  correct_index: 2
