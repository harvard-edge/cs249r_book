title: The Energy Cost of Precision
scenario: Your team is trying to optimize a new feature on a mobile device to reduce battery drain. The model currently runs in 32-bit floating point (FP32). A proposal is made to quantize the model to 8-bit integers (INT8).
question: Roughly how much less energy does a single INT8 arithmetic operation consume compared to a single FP32 operation?
details:
  realistic_solution: |
    An INT8 operation is approximately 18 times more energy-efficient than an FP32 operation. This is a fundamental physical invariant based on the energy required for digital logic to perform calculations. For mobile devices, aggressive quantization is a critical lever for managing battery life and thermal envelopes.
  common_mistake: |
    **The Pitfall:** Assuming linear scaling based on bit-width.
    **The Rationale:** Candidates falsely believe that reducing precision by 4x (32 bits to 8 bits) directly equates to a 4x energy savings, ignoring the physics of digital circuits where multiplier energy scales quadratically.
    **The Consequence:** Energy savings are vastly underestimated, potentially leading teams to deprioritize high-impact INT8 quantization efforts.
  napkin_math: |
    **Assumptions & Constraints:**
    - Standard digital logic energy models (Horowitz).
    - FP32 vs INT8 MAC operation.

    **Calculations:**
    - From standard invariants: FP32 MAC energy is ~18x greater than INT8 MAC energy.

    **Conclusion & Interpretation:**
    - **Result: 18x (Power/Energy)**. An INT8 operation is ~18x more efficient than FP32.
  options:
  - ~2x
  - ~4x
  - ~18x
  - ~100x
  correct_index: 2
