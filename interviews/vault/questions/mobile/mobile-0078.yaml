title: The Model Update Delta Compression
scenario: Your app ships a 100 MB INT8 object detection model. You've retrained with 5% more data and
  fine-tuned the last 10 layers. Pushing a full 100 MB update over cellular wastes user bandwidth. Design
  a delta update system and calculate the expected patch size. What makes delta compression particularly
  effective — or tricky — for quantized models?
details:
  realistic_solution: 'Design a layer-aware delta update system: Full update: 100 MB over cellular (at
    10 Mbps: 80 seconds, costs ~$0.01 at typical data rates). Delta update: changed layers = 10% × 100
    MB = 10 MB raw delta. INT8 delta entropy: ~0.8 bits/value (most deltas are 0 or ±1). Compressed: 10
    MB × (0.8/8) = **1 MB**. Download: 0.8 seconds. Savings: **99% bandwidth reduction**. The trick with
    quantized models is that you must freeze the global quantization parameters (scale and zero-point)
    for the unmodified layers. If the retraining step shifts the min/max activations slightly, standard
    quantization will recompute new scales for the entire model, causing a cascade of bit-level changes
    across all 100MB of weights, entirely defeating delta compression.'
  common_mistake: '"Use binary diff (bsdiff) on the model files — it''ll find the unchanged bytes." Binary
    diff on quantized models produces surprisingly large patches because quantization parameters (scales
    and zero-points) shift globally even when only a few layers change, causing byte-level differences
    throughout the file.'
  napkin_math: 'Full update: 100 MB over cellular (at 10 Mbps: 80 seconds, costs ~$0.01 at typical data
    rates). Delta update: changed layers = 10% × 100 MB = 10 MB raw delta. INT8 delta entropy: ~0.8 bits/value
    (most deltas are 0 or ±1). Compressed: 10 MB × (0.8/8) = **1 MB**. Download: 0.8 seconds. Savings:
    **99% bandwidth reduction**. Over 10M users: 100 MB × 10M = 1 PB vs 1 MB × 10M = 10 TB. Server egress
    savings: ~$50K per update cycle.'
