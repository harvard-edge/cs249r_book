title: The Model Update Delta Compression
scenario: Your app ships a 100 MB INT8 object detection model. You've retrained with 5% more data and fine-tuned the last 10 layers. Pushing a full 100 MB update over cellular wastes user bandwidth.
question: Design a delta update system, calculate the expected patch size, and explain the unique challenge for quantized models.
details:
  realistic_solution: 'Design a layer-aware delta update system: Full update: 100 MB over cellular (at 10 Mbps: 80 seconds, costs ~$0.01 at typical data rates). Delta update: changed layers = 10% × 100 MB = 10 MB raw delta. INT8 delta entropy: ~0.8 bits/value (most deltas are 0 or ±1). Compressed: 10 MB × (0.8/8) = **1 MB**. Download: 0.8 seconds. Savings: **99% bandwidth reduction**. The trick with quantized models is that you must freeze the global quantization parameters (scale and zero-point) for the unmodified layers. If the retraining step shifts the min/max activations slightly, standard quantization will recompute new scales for the entire model, causing a cascade of bit-level changes across all 100MB of weights, entirely defeating delta compression.'
  common_mistake: |
    **The Pitfall:** Relying on standard binary diff tools (like bsdiff) for quantized model updates.
    **The Rationale:** Engineers assume standard file diffs will efficiently identify the 'unchanged' layers.
    **The Consequence:** Global quantization parameters shift slightly, causing the entire 100MB binary file to mutate and generating massive patch sizes.
  napkin_math: |
    *   **Full Update:** 100 MB.
    *   **Raw Delta:** 10% changed layers = 10 MB.
    *   **INT8 Entropy Compression:** ~0.8 bits/value (deltas are sparse).
    *   **Compressed Patch Size:** 10 MB * (0.8 / 8 bits) = **1 MB**.
    *   **Bandwidth Savings:** 99% reduction per user. Across 10M users, egress drops from 1 PB to **10 TB**.
