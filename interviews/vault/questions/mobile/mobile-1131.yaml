title: On-Device Intersectional Fairness Telemetry Pipeline
scenario: You are designing an on-device fairness evaluation telemetry system for a visual avatar feature running on an Apple A17 Pro. The system must compute demographic parity and equalized odds across 5 intersectional subgroups locally, without sending raw user images to the cloud. The A17 Pro features a 16-core Neural Engine and shares 8 GB of unified memory with the CPU/GPU, which is heavily utilized by the main application.
question: 'How would you architect the evaluation pipeline, detailing how you schedule the evaluation models, manage memory contention, and aggregate subgroup metrics securely?'
details:
  realistic_solution: The system should use asynchronous, opportunistic evaluation running during device idle times (e.g., plugged in). The evaluation models (e.g., lightweight INT8 classifiers for subgroup detection) should be scheduled explicitly on the Neural Engine. To protect privacy, local metrics should be aggregated using local differential privacy (LDP) before transmission, ensuring individual demographic performance data is mathematically protected.
  common_mistake: |
    **The Pitfall:** Designing a synchronous pipeline that evaluates fairness immediately after primary inference.
    **The Rationale:** Engineers focus purely on the evaluation logic, completely ignoring the strict limits of the device's shared unified memory architecture.
    **The Consequence:** Crashing the foreground app via memory contention, causing massive UI stutter, and risking privacy leaks by transmitting raw metrics.
  napkin_math: |
    **Assumptions & Constraints:**
    - Available RAM: < 3 GB (App uses ~5 GB of 8 GB).
    - Subgroup Classifier: ~50 MB INT8 model.
    - Workload: 500 cached interactions/day.
    - Compute Limit: 35 TOPS (5W thermal budget).

    **Calculations:**
    - Single Pass Compute: 2 GOPS.
    - Theoretical Latency: 2 / 35,000 = ~0.057 ms.
    - Daily Evaluation Workload: 500 images * 2 GOPS = 1 TOPS total.
    - Execution Time: ~0.028 seconds of continuous NPU load.

    **Conclusion & Interpretation:**
    - **Result: 1 TOPS (Memory-Bound)**. Compute and thermal overheads are trivial, but the architecture must prioritize memory isolation.
