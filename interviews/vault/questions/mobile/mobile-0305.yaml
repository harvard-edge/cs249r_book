title: The OTA Budget Bust
scenario: Your team is responsible for the driver assistance features in a new car running on mobile-grade hardware. Product wants to push an OTA update to replace a small heuristic model with a new 7-billion parameter language model.
question: How much memory will the model parameters alone require for inference, assuming it's stored in FP16 precision?
details:
  realistic_solution: The model has 7 billion parameters. For FP16 (16-bit floating point) inference, each parameter requires 2 bytes of storage. The total memory required for weights is 14 GB. This exceeds the typical 8-12 GB of shared RAM available on edge systems, making the proposal infeasible without aggressive INT8/INT4 quantization.
  common_mistake: |
    **The Pitfall:** Calculating memory footprint using INT8 or training sizes.
    **The Rationale:** Engineers confuse FP16 requirements, calculating size for INT8 (1 byte/param) or using the formula for training memory (16 bytes/param for gradients and optimizer states).
    **The Consequence:** Underestimating the size by 2x, leading to an OTA update that bricks or severely degrades device performance via OOM errors.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Parameters: 7,000,000,000.
       - Precision: FP16 (2 bytes per parameter).
    2. **Calculations:**
       - Memory footprint: 7,000,000,000 parameters * 2 bytes/parameter = 14,000,000,000 bytes.
       - Conversion to GB: 14,000,000,000 / 10^9 = 14 GB.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Capacity-Bound**. The model parameters require exactly 14 GB, guaranteeing immediate Out-Of-Memory (OOM) crashes on standard 8-12 GB mobile/edge systems.
  options:
  - '7 GB. (Trap: Assuming INT8 weights at 1 byte/param)'
  - '112 GB. (Trap: Assuming 16 bytes/param for full training states)'
  - 14 GB.
  - '28 GB. (Trap: Assuming FP32 inference at 4 bytes/param)'
  correct_index: 2
