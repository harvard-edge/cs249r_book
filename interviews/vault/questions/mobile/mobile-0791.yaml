title: The Background Batching Bottleneck
scenario: Your mobile OS runs a 3B LLM. A foreground chat runs at 20 tok/s. When the OS schedules a background summarizer concurrently, total system throughput plummets to 12 tok/s.
question: "Why does adding a background summarizer reduce total LLM throughput instead of improving batching efficiency?"
details:
  realistic_solution: The system crashes into a severe memory bandwidth wall. Multiplexing disparate sequences breaks the contiguous streaming of INT4 weights from DRAM. Implement chunked prefill and strictly serialize sequence generation to preserve LPDDR5 spatial locality.
  common_mistake: |
    **The Pitfall:** Assuming the NPU ran out of compute ALUs.
    **The Rationale:** Engineers accustomed to cloud GPUs assume adding batch size scales throughput linearly until compute saturation is reached.
    **The Consequence:** They wrongly attempt to optimize the arithmetic intensity of the model, failing to fix the memory access patterns that are the actual bottleneck.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model: INT4 3B (1.5GB weights).
       - LPDDR5 max bandwidth: ~34 GB/s.
       - Batch Size 1 = 20 tok/s.
    2. **Calculations:**
       - BS=1 Bandwidth = 1.5 GB * 20 = 30 GB/s.
       - Scattered reads (BS=2) drop effective bandwidth to ~18 GB/s due to page misses.
       - Max Decode = 18 / 1.5 = 12 tok/s.
    3. **Conclusion & Interpretation:**
       - **Result: Bandwidth-Bound**. Total decode speed drops to 12 tok/s due to KV cache scattered reads disrupting contiguous memory access.
