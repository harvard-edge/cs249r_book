title: The Silent Model Corruption Problem
scenario: After an OS update, users report that your on-device LLM produces nonsensical outputs. Investigation reveals that 3 of the 4,000 one-megabyte weight file chunks were silently corrupted during the filesystem migration.
question: How would you design a verification system that detects such corruption before inference begins?
details:
  realistic_solution: 'Chunk-level integrity: store a SHA-256 hash (32 bytes) for each 1 MB chunk. Total overhead: 4,000 x 32 bytes = 128 KB (negligible). On startup, verify all chunks in parallel using the ANE or GPU idle cycles (~2 seconds for 4 GB at 2 GB/s read speed). If 3 chunks fail, re-download only 3 MB instead of 4 GB. Additionally, store a Merkle tree root hash for tamper detection.'
  common_mistake: |
    **The Pitfall:** Relying on a single whole-file hash.
    **The Rationale:** Candidates propose a single checksum, which catches corruption but forces a complete redownload of the entire 4 GB model upon any failure.
    **The Consequence:** The system wastes massive amounts of user bandwidth repairing localized corruption.
  napkin_math: |
    1. **Checksum Overhead:** 4,000 chunks * 32 bytes (SHA-256) = 128 KB (0.003% storage overhead).
    2. **Verification Time:** 4 GB / 2 GB/s read speed = 2 seconds on startup.
    3. **Repair Savings:** Redownloading 3 corrupted chunks (3 MB) vs the full 4 GB model saves **1,333x** in bandwidth.
