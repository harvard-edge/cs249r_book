title: The Silent Model Corruption Problem
scenario: After an OS update, users report that your on-device LLM produces nonsensical outputs. Investigation
  reveals that 3 of the 4,000 one-megabyte weight file chunks were silently corrupted during the filesystem
  migration. Design a verification system that detects such corruption before inference begins.
question: "How would you design a verification system that detects such corruption before inference begins?"
details:
  realistic_solution: 'Chunk-level integrity: store a SHA-256 hash (32 bytes) for each 1 MB chunk. Total
    overhead: 4,000 x 32 bytes = 128 KB (negligible). On startup, verify all chunks in parallel using
    the ANE or GPU idle cycles (~2 seconds for 4 GB at 2 GB/s read speed). If 3 chunks fail, re-download
    only 3 MB instead of 4 GB. Additionally, store a Merkle tree root hash for tamper detection.'
  common_mistake: Only checking a single whole-file hash, which catches corruption but requires re-downloading
    the entire 4 GB model. Chunk-level checksums allow surgical repair of only the corrupted chunks.
  napkin_math: 'Checksum storage: 4,000 chunks x 32 bytes = 128 KB (0.003% overhead). Verification time:
    4 GB / 2 GB/s read = 2s. Repair: 3 MB re-download vs 4 GB full re-download = 1,333x bandwidth savings.'
