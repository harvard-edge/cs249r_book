title: 'Mobile TCO Specification: Design Mobile-First AI Product Cost Model'
scenario: Specify a complete cost model for a mobile-first AI coding assistant targeting 200K paid users at $15/month. Users generate 100 code completions/day (10 tokens each, on-device), 5 complex refactors/day (500 tokens, cloud), and 2 test generations/day (200 tokens, cloud). Cloud inference costs $0.001/1K tokens.
question: How would you specify the on-device vs cloud split, annual revenue, cost breakdown, and gross margin?
details:
  realistic_solution: 'Annual revenue (before Apple cut): 200K * $15 * 12 = $36M. Apple IAP 30% cut (first yr) / 15% (after 1yr): assume avg 22.5%. Net revenue: $36M * 0.775 = $27.9M. Cloud costs: 200K * 5 * 500 * 365 * $0.001/1000 = $182,500/yr for refactors. Test gen: 200K*2*200*365*$0.001/1000=$29,200/yr. Total cloud: $211,700/yr. On-device: negligible energy cost. Gross margin: ($27.9M - $211.7K) / $27.9M = 99.2% — extremely high before engineering and infra. Net margin after $5M engineering + $1M infrastructure = ($27.9M-$211.7K-$5M-$1M)/$27.9M=77.7%.'
  common_mistake: |
    **The Pitfall:** Failing to factor in app store payment processing fees.
    **The Rationale:** AI engineers often focus purely on cloud infrastructure costs and ignore the business realities of mobile distribution.
    **The Consequence:** Dramatically overestimating the product's gross margins and commercial viability.
  napkin_math: |
    1. Net Revenue: 200K * $15 * 12 = $36M. After Apple's ~22.5% cut, net is $27.9M.
    2. Cloud Refactors: 200K * 5 * 500 * 365 * $0.001/1000 = $182,500/yr.
    3. Cloud Tests: 200K * 2 * 200 * 365 * $0.001/1000 = $29,200/yr.
    4. **Gross Margin:** ($27.9M - $211.7K) / $27.9M = **99.2%**.
    5. Operating Margin (after $6M R&D/Ops): ($27.9M - $211.7K - $6M) / $27.9M = 77.7%.
