title: 'Mobile TCO Specification: Design Mobile-First AI Product Cost Model'
scenario: Specify a complete cost model for a mobile-first AI coding assistant targeting 200K paid users at $15/month. Users generate 100 code completions/day on-device, 5 complex refactors/day on cloud, and 2 test generations/day on cloud. Cloud inference costs $0.001/1K tokens.
question: How would you specify the on-device vs cloud split, annual revenue, cost breakdown, and gross margin?
details:
  realistic_solution: |
    Construct a precise Annual Recurring Revenue (ARR) and Cost of Goods Sold (COGS) model. Factoring in app store payment processing fees is critical for mobile products. The hybrid architecture pushes high-frequency/low-complexity tasks (completions) to the edge (zero marginal cost) while reserving cloud compute only for complex reasoning (refactors/tests), ensuring high gross margins.
  common_mistake: |
    **The Pitfall:** Failing to factor in app store payment processing fees.
    **The Rationale:** AI engineers often focus purely on cloud infrastructure costs and ignore the business realities of mobile distribution.
    **The Consequence:** Dramatically overestimating the product's gross margins and commercial viability.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Users: 200,000
       - Price: $15/month
       - App Store Cut: ~22.5% average
       - Cloud Refactors: 5/day * 500 tokens
       - Cloud Tests: 2/day * 200 tokens
    2. **Calculations:**
       - Gross Revenue: 200K * $15 * 12 = $36M
       - Net Revenue: $36M * (1 - 0.225) = $27.9M
       - Cloud Refactors Cost: 200K * 5 * 500 * 365 * ($0.001/1000) = $182,500/yr
       - Cloud Tests Cost: 200K * 2 * 200 * 365 * ($0.001/1000) = $29,200/yr
       - Total Cloud Cost: $211,700/yr
       - Gross Margin: ($27.9M - $211,700) / $27.9M = 99.2%
    3. **Conclusion & Interpretation:** **Gross Margin is 99.2%. Result: High-Margin Hybrid Architecture.**
