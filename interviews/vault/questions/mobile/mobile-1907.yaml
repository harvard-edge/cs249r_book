title: Hexagon Flash Wear-out
scenario: A video editing app running on the Hexagon NPU saves intermediate style-transfer
  states (1MB each) to flash storage to handle unexpected app terminations.
question: Explain the tradeoff between checkpointing frequency and flash memory wear-out
  for this mobile application processing at 30 FPS.
visual:
  kind: svg
  path: mobile-1907.svg
  alt: Line graph showing cumulative GBs written over time growing extremely rapidly
    at 30 FPS.
  caption: Flash Wear-Out Accumulation
details:
  realistic_solution: Saving state every frame writes 30MB/s to flash. Over an hour,
    this is over 100GB, which quickly degrades NAND flash memory via write amplification.
    The candidate should propose checkpointing only on user actions or significant
    scene changes.
  common_mistake: Failing to quantify the write volume, assuming mobile storage is
    as durable as enterprise SSDs.
  napkin_math: 30 FPS * 1MB * 3600s = 108,000 MB/hr
