title: Tensor G3 On-Device LLM Degradation Strategy
scenario: You are designing the fallback architecture for a real-time translation and summarization feature on a device powered by the Google Tensor G3. The primary model is Gemini Nano running on the on-device TPU (7.5 TOPS), but the system faces fluctuating thermal constraints and varying availability of the 12 GB LPDDR5X memory due to concurrent background tasks.
question: How would you build a fail-operational degradation ladder for Tensor G3 translation and summarization under thermal and RAM pressure?
details:
  realistic_solution: 'A robust design involves a multi-tier degradation ladder: Tier 1 uses the full Gemini Nano model on the TPU for both tasks. Tier 2 (Thermal Throttling) shifts summarization to a smaller, CPU-bound INT4 quantized model while keeping latency-critical translation on the throttled TPU. Tier 3 (Severe Memory Pressure, < 2GB) aggressively sheds the summarization feature entirely and runs a minimal NMT model on the CPU, guaranteeing fail-operational translation without OOM crashes.'
  common_mistake: |
    **The Pitfall:** Proposing a binary fallback (e.g., switch entirely to a cloud model or fail).
    **The Rationale:** Candidates ignore the latency and privacy implications in a low-connectivity scenario and overlook intermediate steps like reducing context window size or dynamically switching to a heavily quantized model.
    **The Consequence:** The system drops the feature entirely instead of gracefully degrading.
  napkin_math: |
    - **Peak TPU Compute:** 7.5 TOPS.
    - **Primary Model Cost:** Gemini Nano requires 20 GOPS/token.
    - **Peak Throughput:** 7.5e12 / 20e9 = 375 tokens/sec.
    - **Throttled TPU Compute:** 50% of 7.5 TOPS = 3.75 TOPS.
    - **Throttled Throughput:** 3.75e12 / 20e9 = 187.5 tokens/sec.
    - **Memory Constraint:** Available RAM drops to 2 GB. Full Nano model (~6 GB) causes OOM.
    - **Fallback Model Cost:** 1B INT4 model requires 0.5 GB RAM and 5 GOPS/token.
    - **Fallback Throughput:** Fits in 2 GB RAM; 3.75e12 / 5e9 = **750 tokens/sec** on the throttled TPU.
