title: Doubling Battery Life via VAD Duty Cycling
scenario: A keyword spotting model draws a constant 5mW on a mobile DSP. The device
  battery is 10Wh.
question: Calculate the continuous runtime, and apply a duty-cycling strategy using
  a 1mW Voice Activity Detector (VAD) to double the battery life.
details:
  realistic_solution: Continuous runtime is 10Wh / 0.005W = 2000 hours. To double
    the life to 4000 hours, average power must drop to 2.5mW. Implementing a cascade
    where the 1mW VAD runs constantly and wakes the 5mW DSP only when speech is detected.
    Average Power = 1mW + (P_active * 5mW) = 2.5mW. Solving for P_active gives 30%
    duty cycle.
  common_mistake: Forgetting to include the VAD's base 1mW power consumption in the
    total system power equation.
  napkin_math: 10 / 0.005 = 2000
