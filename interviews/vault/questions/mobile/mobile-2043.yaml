title: Doubling Battery Life via VAD Duty Cycling
scenario: A keyword spotting model draws a constant 5mW on a mobile DSP. The device battery is 10Wh.
question: What is the continuous runtime, and what is the required duty cycle for a 1mW VAD to double the battery life?
details:
  realistic_solution: 'Continuous runtime is 10Wh / 0.005W = 2000 hours. To double the life to 4000 hours, average power must drop to 2.5mW. Implementing a cascade where the 1mW VAD runs constantly and wakes the 5mW DSP only when speech is detected. Average Power = 1mW + (P_active * 5mW) = 2.5mW. Solving for P_active gives 30% duty cycle.'
  common_mistake: |
    **The Pitfall:** Forgetting to include the VAD's base power in the average power calculation.
    **The Rationale:** Candidates assume the gating mechanism itself draws zero power, skewing the required duty cycle.
    **The Consequence:** The real-world implementation falls short of battery life targets because the always-on component drain wasn't modeled.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Battery Capacity: 10 Wh.
       - DSP Power: 5 mW.
       - VAD Power: 1 mW.
    2. **Calculations:**
       - Continuous Runtime: 10 Wh / 0.005 W = 2000 hours.
       - Target Runtime: Double battery life = 4000 hours.
       - Target Average Power: 10 Wh / 4000 hours = 2.5 mW.
       - VAD Equation: 2.5 mW = 1 mW (VAD constant) + (Duty Cycle * 5 mW).
       - Duty Cycle = 1.5 mW / 5 mW = 0.30.
    3. **Conclusion & Interpretation:**
       - **Result: Power-Bound.** A 30% duty cycle is required to achieve the 4000 hours runtime target.
