title: Wearable BLE KV Offload
scenario: A Snapdragon Wear pin (2GB RAM) offloads KV cache to a smartphone via BLE 5.2 (2 Mbps) for an audio-streaming transformer.
question: What is the maximum allowable context window before the 15ms BLE connection synchronization latency and transfer time exceed the 100ms real-time audio budget?
details:
  realistic_solution: The 100ms budget is immediately reduced by the 15ms BLE synchronization event, leaving 85ms for transfer. At 2 Mbps, 85ms allows exactly 170 Kb (21.25 KB) of payload. If each token KV requires 1KB, the absolute maximum context window is 21 tokens.
  common_mistake: |
    **The Pitfall:** Treating the BLE link as a continuous stream and calculating payload capacity using the full 100ms.
    **The Rationale:** Engineers ignore the physical realities of radio protocols, where connection synchronization intervals consume a fixed block of the real-time budget before any data moves.
    **The Consequence:** Designing a context window that mathematically cannot be transferred within the strict audio rendering deadline, causing audio dropout.
  napkin_math: |
    - **Effective Transfer Time:** 100ms budget - 15ms sync overhead = 85ms.
    - **Data Transfer (at 2 Mbps):** 85ms * 2000 Kbps = 170 Kb.
    - **Payload Size:** 170 Kb / 8 = **21.25 KB**.
    - **Token Limit:** Assuming 1 KB per token KV, the maximum context is **21 tokens**.
