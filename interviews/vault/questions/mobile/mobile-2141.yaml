title: Wearable BLE KV Offload
scenario: A Snapdragon Wear pin (2GB RAM) offloads KV cache to a smartphone via BLE
  5.2 (2 Mbps) for an audio-streaming transformer.
question: Evaluate the maximum allowable context window before the 15ms BLE connection
  synchronization latency and transfer time exceed the 100ms real-time audio budget.
details:
  realistic_solution: The 100ms budget is immediately reduced by the 15ms BLE synchronization
    event, leaving 85ms for transfer. At 2 Mbps, 85ms allows exactly 170 Kb (21.25
    KB) of payload. If each token KV requires 1KB, the absolute maximum context window
    is 21 tokens.
  common_mistake: Treating the BLE link as a continuous stream instead of an interval-driven
    protocol where the 15ms sync consumes 15% of the real-time budget before data
    moves.
  napkin_math: 100ms - 15ms = 85ms. 85ms * 2000 Kbps = 170 Kb = 21.25 KB context limit.
