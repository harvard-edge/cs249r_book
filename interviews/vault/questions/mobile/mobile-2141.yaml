title: Wearable BLE KV Offload
scenario: A wearable pin offloads KV cache to a smartphone via BLE 5.2.
question: What is the maximum allowable context window before the 15ms BLE connection synchronization latency and transfer time exceed the 100ms real-time audio budget?
details:
  realistic_solution: "The 100ms budget is immediately reduced by the 15ms BLE connection synchronization interval, leaving 85ms for actual data transmission. At a peak physical layer rate of 2 Mbps, 85ms allows for a maximum transmission of 170 Kb (21.25 KB) of payload. Assuming standard precision where each token's KV cache requires 1 KB, the theoretical upper bound on the context window is strictly 21 tokens before audio dropout occurs."
  common_mistake: |
    **The Pitfall:** Treating the BLE link as a continuous stream and calculating payload capacity using the full 100ms.
    **The Rationale:** Engineers ignore the physical realities of radio protocols, where connection synchronization intervals consume a fixed block of the real-time budget before any data moves.
    **The Consequence:** Designing a context window that mathematically cannot be transferred within the strict audio rendering deadline, causing audio dropout.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Real-time audio budget: 100ms.
       - BLE connection sync latency: 15ms.
       - BLE 5.2 throughput: 2 Mbps.
       - KV cache size per token: 1 KB.
    2. **Calculations:**
       - Effective transfer time: 100ms - 15ms = 85ms.
       - Total data transferred: 85ms * 2,000,000 bits/s = 170,000 bits.
       - Payload in Bytes: 170,000 bits / 8 = 21,250 Bytes = 21.25 KB.
       - Context limit: 21.25 KB / 1 KB/token = 21.25 tokens.
    3. **Conclusion & Interpretation:**
       - **Result: Network Latency-Bound.** The absolute maximum context window is 21 tokens to ensure the 100ms audio budget is not violated.
