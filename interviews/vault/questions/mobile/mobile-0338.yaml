title: 'The Mobile Memory Wall: Attention Scaling & Variants'
scenario: You're evaluating if a new 7-billion parameter language model can be deployed on a high-end smartphone for on-device inference. Before worrying about latency or NPU support, your first check is memory.
question: How much memory is needed to load the FP16 weights of a 7B-parameter model for mobile inference?
details:
  realistic_solution: For inference with FP16 (half-precision floating point) weights, each parameter requires 2 bytes of storage. Therefore, a 7-billion parameter model will require approximately 14 GB of memory just to load into RAM.
  common_mistake: |
    **The Pitfall:** Confusing inference memory requirements with training memory requirements.
    **The Rationale:** Candidates often recall the rule of thumb that a model requires ~16 bytes per parameter (which includes Adam optimizer states and gradients for training).
    **The Consequence:** Incorrectly concluding that a model is too large for deployment, missing opportunities for on-device inference.
  napkin_math: |
    1. **Identify Parameters:** 7,000,000,000 parameters.
    2. **Determine Precision:** FP16 requires 2 bytes per parameter.
    3. **Calculate Total:** 7,000,000,000 * 2 = 14,000,000,000 bytes = **14 GB**.
  options:
  - 112 GB
  - 28 GB
  - 14 GB
  - 7 GB
  correct_index: 2
