title: A17 Super-Resolution Compute
scenario: An Apple A17 Pro Neural Engine (35 TOPS) runs a super-resolution model on
  a 1080p image. The architecture requires 200 MACs per pixel.
question: Calculate the theoretical minimum execution time for a single image, isolating
  purely computational limits.
details:
  realistic_solution: A 1080p image contains roughly 2.07 million pixels (1920x1080).
    At 200 MACs per pixel, we need to calculate total operations. Each MAC (Multiply-Accumulate)
    counts as 2 Operations. We then divide the total operations by the NPU's peak
    throughput (35 Tera-Operations Per Second) to find the absolute minimum inference
    time.
  common_mistake: Treating a MAC as 1 Operation instead of 2 Operations, which halves
    the required computations and incorrectly doubles the theoretical speed.
  napkin_math: 1920 * 1080 * 200 MACs * 2 OPS/MAC = 8.29e8 OPS. Time = 8.29e8 / 35e12
    = 23.7 microseconds.
