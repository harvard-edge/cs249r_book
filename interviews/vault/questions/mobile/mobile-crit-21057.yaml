title: KV-Cache Layout for NPU Acceleration
scenario: You are optimizing KV-cache memory layout for the Apple Neural Engine (ANE). The ANE operates
  on 4D tensors and has optimal performance with specific dimension alignments. Your KV-cache is stored
  as [layers, 2, kv_heads, seq_len, head_dim]. Specify the optimal layout and explain why layout matters
  for mobile NPUs.
question: "How would you specify the optimal layout and explain why layout matters for mobile NPUs?"
details:
  realistic_solution: 'NPU layout considerations: The ANE processes data in fixed 8KB tiles, with the
    innermost dimension mapped to the vector processing unit (16-wide for FP16). Optimal layout: [batch,
    seq_len, kv_heads, head_dim] — ''interleaved'' format. Why: (1) During attention, for each query position,
    the NPU loads K values across all sequence positions for a given head. If seq_len is an outer dimension,
    loading K[head_h, :, :] requires strided access across the seq_len dimension — poor locality. (2)
    With [batch, seq_len, kv_heads, head_dim], all heads for a given sequence position are contiguous.
    The NPU can load a tile of [seq_chunk, kv_heads × head_dim] contiguously. (3) Head_dim=64 with FP16
    = 128 bytes, which is 16 × 8B — aligns with ANE''s 128-byte cache line. (4) Padding: if kv_heads ×
    head_dim does not align to 128 bytes, pad to the next multiple. With 4 × 64 × 2B = 512 bytes (already
    aligned). Spec: use [batch, seq_len, kv_heads, head_dim] with head_dim padded to 64 (already satisfied).
    Convert from GPU format during model export to CoreML.'
  common_mistake: Using the same KV-cache layout as GPU implementations (which prefer [batch, heads, seq_len,
    head_dim]). NPUs have different memory access patterns — the innermost dimension must align with the
    hardware's vector width.
  napkin_math: 'GPU layout: [B, H, S, D] — seq_len stride = D × sizeof(FP16). NPU layout: [B, S, H, D]
    — head access is contiguous. ANE cache line: 128 bytes. KV element: 4 heads × 64 dim × 2B = 512 bytes
    per position = 4 cache lines. Aligned access: 100% utilization vs ~25% with strided GPU layout.'
