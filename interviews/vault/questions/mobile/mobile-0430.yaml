title: The Cross-GPU Choke
scenario: You are a mobile ML engineer diagnosing a slow cloud-dependent 'AI Enhance' feature. End-to-end latency is 1.75 seconds, but on-device work and network RTT are only 150ms total. The backend service latency is therefore ~1.6 seconds. The backend runs on a dual H100 server, with a known total compute time of 1 second. The model is split across the GPUs, requiring a 32 GB activation tensor to be copied from GPU1 to GPU2 during execution.
question: What is the most likely cause for the ~600ms of unaccounted-for latency on the server?
details:
  realistic_solution: The most likely cause is that the two GPUs are in a server that lacks an NVLink bridge, forcing them to communicate over the slower PCIe bus. While fast for peripherals, PCIe is much slower than a dedicated GPU interconnect for the massive transfers common in model parallelism. A 32 GB transfer that would be trivial on NVLink becomes a major bottleneck on PCIe, easily accounting for the observed extra latency. This is a common configuration error in budget cloud instances or improperly assembled servers.
  common_mistake: |
    **The Pitfall:** Underestimating the performance penalty of PCIe vs NVLink for inter-GPU communication.
    **The Rationale:** Engineers often assume all dual-GPU servers have high-bandwidth NVLink and blame the network or memory for data transfer delays.
    **The Consequence:** Failing to identify the hardware bus bottleneck and wasting time optimizing network or compute.
  napkin_math: |
    1. **Unaccounted Latency:** 1.6s server - 1.0s compute = 0.6s for data transfer.
    2. **PCIe Gen5 x16 Bandwidth:** Effective ~50 GB/s. Transfer time = 32 GB / 50 GB/s ≈ 0.64s (~600 ms). This matches the gap perfectly.
    3. **NVLink Comparison:** H100 NVLink = 900 GB/s. Transfer time = 32 GB / 900 GB/s ≈ 0.036s (~36 ms).
    4. **Conclusion:** **The GPUs are communicating over the slow PCIe bus instead of an NVLink bridge.**
  options:
  - The InfiniBand network connecting the server to the storage cluster is saturated.
  - Reading the 32 GB tensor from the first GPU's HBM3 memory is the bottleneck.
  - The GPUs are communicating over the PCIe bus instead of a direct NVLink bridge, which is saturated by the 32 GB transfer.
  - The server's CPU is overloaded with OS context switching, causing the delay.
  correct_index: 2
