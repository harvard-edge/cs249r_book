title: 5G Remote KV Prefetching
scenario: Splitting a transformer's KV cache between local LPDDR5 and an edge server's
  NVMe SSD over a 5G mmWave connection (1 Gbps, 15ms ping).
question: Propose a speculative prefetching mechanism for the remote KV blocks that
  hides the 15ms 5G synchronization latency.
details:
  realistic_solution: The 15ms ping represents a hard stall if fetched reactively.
    At an assumed 50ms/token generation speed, the local NPU must predict and issue
    the 5G fetch request at least 1 token in advance. Fetching a 1MB chunk takes 8ms
    plus the 15ms sync, totally 23ms, safely hiding behind the 50ms compute.
  common_mistake: Using a purely reactive paging strategy that blocks the local NPU
    generation loop for at least 15ms on every remote cache miss.
  napkin_math: Ping sync = 15ms. 1MB / 125MB/s = 8ms. Total fetch = 23ms < 50ms token
    time.
