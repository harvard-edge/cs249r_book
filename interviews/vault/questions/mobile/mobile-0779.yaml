title: Diagnosing TFLite NNAPI Delegate Subgraph Fallback
scenario: Your team deploys a 5MB MobileNetV3-based model to Android via TFLite. On a Snapdragon 8 Gen
  1 device, 4-thread CPU inference takes 18ms. You enable the NNAPI delegate to leverage the NPU, expecting
  sub-5ms latency. Instead, overall latency jumps to 35ms and battery drain increases. Profiling reveals
  the model outputs correct results, but performance is strictly worse than the CPU baseline.
question: "Why can enabling the TFLite NNAPI delegate make a MobileNetV3 model slower than CPU inference?"
details:
  realistic_solution: Profile the TFLite execution to detect subgraph partitioning. An unsupported operator
    in the middle of the network forces a fallback to the CPU, splitting the graph and introducing massive
    synchronization overhead. Replace the unsupported op so the entire model compiles into a single NPU
    subgraph.
  common_mistake: Assuming the NPU hardware is thermally throttling or that NNAPI initialization overhead
    dominates, without checking for operator fallback.
  napkin_math: '1 unsupported op in the middle creates 3 subgraphs (NPU -> CPU -> NPU). Compute time:
    NPU (4ms) + CPU (1ms) = 5ms. Memory copy is fast, but kernel synchronization and context switch overhead
    is ~15ms per transition. Total Latency = 5ms compute + (2 transitions * 15ms overhead) = 35ms.'
