title: On-Device Drift Detection Architecture for Shared Memory Systems
scenario: You are designing an on-device data drift detection pipeline for a real-time vision model deployed on an NPU. You must architect a system that monitors for training-serving skew without bottlenecking the shared memory bandwidth required by the active camera stream.
question: "How should Exynos 2400 perform on-device drift detection without caching raw frames or starving camera bandwidth?"
details:
  realistic_solution: Compute lightweight statistical embeddings from the primary model's intermediate layers during the forward pass. Store these 1D histograms in a ring buffer in RAM. Perform Population Stability Index (PSI) calculations against a reference distribution asynchronously during idle periods.
  common_mistake: |
    **The Pitfall:** Caching raw input frames or running a concurrent secondary model.
    **The Rationale:** Candidates rely on standard server-side drift techniques, forgetting that mobile memory is a heavily constrained, shared resource.
    **The Consequence:** Massive memory bandwidth starvation for the ISP and GPU, causing dropped frames and severe system lag.
  napkin_math: |
    **Assumptions & Constraints:**
    - Camera: 1080p 30FPS.
    - Memory: 12 GB LPDDR5X.
    - Embedding size: 256 bytes/frame.
    
    **Calculations:**
    - Raw Caching = 1920 * 1080 * 3 * 30 * 60 = 11.2 GB/minute.
    - Embedding Caching = 256 * 30 * 60 = 460.8 KB/minute.
    
    **Conclusion & Interpretation:**
    - **Result: Bandwidth-Bound**. The embedding approach consumes ~460 KB/min, trivially fitting the shared memory constraints while preventing camera bandwidth starvation.
