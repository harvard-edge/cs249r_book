title: On-Device Drift Detection Architecture for Shared Memory Systems
scenario: You are designing an on-device data drift detection pipeline for a real-time vision model deployed on a Samsung Exynos 2400 NPU. The device features a dual-core NPU capable of 34.7 TOPS, but it shares 12 GB of LPDDR5X memory with the CPU, GPU, and ISP. You must architect a system that continuously monitors for training-serving skew and calculates statistical divergence without bottlenecking the shared memory bandwidth required by the active camera stream.
question: "How should Exynos 2400 perform on-device drift detection without caching raw frames or starving camera bandwidth?"
details:
  realistic_solution: 'Compute lightweight statistical summaries (e.g., 1D histograms or low-dimensional embeddings) from the primary model''s intermediate layers during the standard forward pass. Store these compact statistics in a small circular buffer in RAM. Periodically, during system idle times, aggregate these statistics to compute PSI or KL divergence against a shipped reference distribution.'
  common_mistake: |
    **The Pitfall:** Caching raw input frames or running a concurrent secondary model.
    **The Rationale:** Candidates rely on standard server-side drift techniques, forgetting that mobile memory is a heavily constrained, shared resource.
    **The Consequence:** Massive memory bandwidth starvation for the ISP and GPU, causing dropped frames and severe system lag.
  napkin_math: |
    - **Raw Caching Cost:** Storing 1 minute of raw 1080p 30FPS camera frames (1920 * 1080 * 3 bytes * 30 * 60) requires 11.2 GB, instantly consuming almost all shared 12 GB LPDDR5X memory.
    - **Embedding Cost:** Extracting a 256-byte activation vector per frame requires only (256 bytes * 30 * 60) = 460.8 KB per minute.
    - **Compute Cost:** Computing PSI on a 100-bin histogram takes less than 1 million operations.
    - **Final Result:** The embedding approach takes **~460 KB per minute** and negligible compute, trivially fitting within shared memory constraints.
