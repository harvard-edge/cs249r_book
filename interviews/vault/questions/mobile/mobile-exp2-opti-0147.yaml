title: CoreML Fallback Memory Transfer Bottleneck
scenario: You are converting a PyTorch vision transformer for real-time video processing on the Apple
  A17 Pro Neural Engine to meet a strict ~5W power budget. After CoreML conversion, profiling shows that
  an unsupported custom attention operator forces execution to fall back to the CPU. This fallback requires
  transferring large intermediate feature maps across the shared 8 GB unified memory, causing latency
  to spike and missing your 33ms per frame target.
details:
  realistic_solution: The correct approach is to modify the source PyTorch model to replace the custom
    attention operator with mathematically equivalent standard operations that the CoreML compiler can
    map directly to the 16-core Neural Engine. This eliminates the CPU fallback, keeping the entire execution
    graph on the ANE and avoiding the costly unified memory round-trips entirely.
  common_mistake: Candidates often suggest aggressively quantizing the model to INT8 to speed up compute,
    ignoring that the bottleneck is memory transfer, not the 35 TOPS ANE compute capacity. Others suggest
    writing a custom CPU op in Swift, which still incurs the ANE-to-CPU synchronization and memory copy
    overhead.
  napkin_math: An intermediate feature map of [1, 512, 64, 64] in FP16 is ~4.2 MB. A single CPU fallback
    requires a read/write round-trip across the unified memory (8.4 MB total). Assuming a practical unified
    memory bandwidth of 50 GB/s for fragmented copies, the transfer alone takes ~0.17ms. If this fallback
    happens across 12 transformer blocks, memory movement consumes ~2ms per frame purely on overhead.
    Eliminating the fallback keeps the model on the 35 TOPS ANE, recovering 6% of the 33.3ms frame budget
    and minimizing power draw to stay within the ~5W limit.
