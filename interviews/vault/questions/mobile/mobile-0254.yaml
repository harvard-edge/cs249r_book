title: The OTA Update Space Crunch
scenario: 'You''re an ML Systems engineer responsible for the OTA (Over-the-Air) updates for a fleet of autonomous vehicles. The vehicle''s compute module has a 2 GB (2048 MB) flash storage partition dedicated to the ML stack. The current storage layout is: Base ML Framework (800 MB), Current V1 Model (400 MB), Downloaded V2 Model (Compressed, 150 MB), and Uncompressed V2 Model (to be installed, 500 MB).'
question: How much free space remains during an atomic OTA update when the framework, v1 model, compressed v2, and uncompressed v2 coexist?
details:
  realistic_solution: The correct way to calculate the required space is to sum all components that must reside on the partition during the update's critical phase.
  common_mistake: |
    **The Pitfall:** Calculating storage based on the final state after the old model is deleted.
    **The Rationale:** Engineers forget that a safe, atomic OTA update requires enough space to hold both the old and new assets concurrently during the critical extraction phase.
    **The Consequence:** Failed updates in the field on devices with low free space, potentially bricking systems.
  napkin_math: |
    - **Total Partition Storage:** 2 GB = 2048 MB.
    - **Concurrent Usage (Critical Phase):**
      - Base Framework: 800 MB
      - Active V1 Model: 400 MB
      - Downloaded Compressed V2: 150 MB
      - Extracting Uncompressed V2: 500 MB
    - **Total Used:** 800 + 400 + 150 + 500 = **1850 MB**.
    - **Free Space:** 2048 MB - 1850 MB = **198 MB**.
  options:
  - 648 MB
  - 150 MB
  - 198 MB
  - 798 MB
  correct_index: 2
