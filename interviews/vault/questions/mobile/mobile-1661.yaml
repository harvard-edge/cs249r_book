title: NPU Model Deployment and Optimization on Snapdragon 8 Gen 3
scenario: Your team is deploying a real-time image segmentation model. You have Model A (PyTorch) and Model B (TensorFlow). Both need to be optimized for efficient on-device inference.
question: "How would you design and compare the end-to-end conversion, optimization, and deployment pipelines for both models?"
details:
  realistic_solution: Assess NPU operator compatibility using vendor-specific neural processing SDKs. Prioritize INT8 quantization. Trace dynamic graphs to static IR, applying constant folding. Implement optimized CPU fallbacks for unsupported ops to prevent pipeline stalls.
  common_mistake: |
    **The Pitfall:** Assuming a simple conversion to ONNX or TFLite guarantees optimal NPU utilization.
    **The Rationale:** Candidates often overlook vendor-specific SDKs and custom operator support, trusting generic mobile formats to perfectly map to hardware.
    **The Consequence:** Significant portions of the graph fall back to the CPU, causing severe performance bottlenecks and battery drain.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Layer compute: 100 GOP.
       - NPU throughput: 45 TOPS.
       - CPU fallback: 4.5 TOPS (10x slower).
    2. **Calculations:**
       - Pure NPU = 100 / 45 = 2.2 ms.
       - 20% CPU Fallback: 20 / 4.5 = 4.4 ms.
       - Remaining NPU: 80 / 45 = 1.77 ms.
       - Total = 1.77 ms + 4.4 ms = 6.17 ms.
    3. **Conclusion & Interpretation:**
       - **Result: Fallback-Bound**. A minor 20% fallback to CPU dramatically inflates latency by nearly 3x.
