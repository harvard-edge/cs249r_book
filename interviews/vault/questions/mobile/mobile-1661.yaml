title: NPU Model Deployment and Optimization on Snapdragon 8 Gen 3
scenario: Your team is tasked with deploying a complex real-time image segmentation model for a flagship mobile application. The target hardware is a smartphone powered by the Snapdragon 8 Gen 3, which integrates a Hexagon NPU capable of 45 TOPS for INT8 operations and is paired with 12-16 GB of LPDDR5X memory. You have two candidate models: Model A (PyTorch) and Model B (TensorFlow). Both need to be optimized for efficient on-device inference.
question: "How would you design and compare the end-to-end conversion, optimization, and deployment pipelines for both models?"
details:
  realistic_solution: 'Assess NPU operator compatibility using the Qualcomm Neural Processing SDK. Prioritize INT8 quantization. For Model A (PyTorch), export to ONNX then to a Hexagon-native format. For Model B (TensorFlow), leverage TFLite with the Hexagon delegate. For unsupported ops, design CPU fallbacks carefully to avoid bottlenecking. Benchmark both models for latency, power, and memory pressure.'
  common_mistake: |
    **The Pitfall:** Assuming a simple conversion to ONNX or TFLite guarantees optimal NPU utilization.
    **The Rationale:** Candidates often overlook vendor-specific SDKs and custom operator support, trusting generic mobile formats to perfectly map to hardware.
    **The Consequence:** Significant portions of the graph fall back to the CPU, causing severe performance bottlenecks and battery drain.
  napkin_math: |
    - **NPU Compute Time:** Given a 100 Giga-operations (GOP) layer running entirely on the NPU at 45 TOPS: 100 GOP / 45 TOPS = ~2.2 ms.
    - **Fallback Penalty:** If 20% of operations (20 GOP) fall back to a CPU that is 10x slower (effectively 4.5 TOPS): 20 GOP / 4.5 TOPS = ~4.4 ms.
    - **Remaining NPU Time:** The remaining 80 GOP on the NPU takes: 80 GOP / 45 TOPS = ~1.77 ms.
    - **Final Result:** Total layer inference time jumps from 2.2 ms to 1.77 ms + 4.4 ms = **6.17 ms**, showing how minor fallbacks dramatically inflate latency.
