title: 'Fault Tolerance: Optimize Recovery Speed for Frequently Crashing Mobile Training'
scenario: A nightly fine-tuning job on a Tensor G3 crashes 3 times per week due to thermal throttling after 7 minutes of training, wasting 10 minutes per attempt.
question: How should the job recover from thermal crashes in under 30 seconds and reduce future crashes?
details:
  realistic_solution: 'Dual fix: (1) Checkpoint every 2 minutes (given ~7 min to crash, save progress at 2, 4, 6 minutes). (2) Implement thermal monitoring: reduce batch size or pause when SOC temp > 85°C. Both together eliminate most crashes.'
  common_mistake: |
    **The Pitfall:** Treating thermal throttling strictly as a fault tolerance problem.

    **The Rationale:** Relying on restarts rather than implementing proactive thermal management or frequent checkpoints.

    **The Consequence:** Continued high crash rates and significant wasted time per week.
  napkin_math: |
    *   Checkpoint frequency: Every 2 minutes (max lost work = 2 mins).
    *   LoRA checkpoint size: 2M params * 12B (weights + optimizer) = 24MB.
    *   Flash write time: 24MB / 1 GB/s = 24ms (0.02% overhead).
    *   Recovery time: App restart (3s) + load (24ms) = 3.024s.
    *   Thermal management: Poll SOC temp, reduce batch size (32 -> 8) at 85°C.
    *   **Result:** Recovery takes ~3.0 seconds, easily meeting the <30s target.
