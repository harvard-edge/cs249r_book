title: UCIe Standard and Future Mobile Chiplet Integration
scenario: Qualcomm is evaluating whether to adopt the UCIe (Universal Chiplet Interconnect
  Express) standard for integrating a third-party ML accelerator die with the Snapdragon
  SoC. Evaluate the feasibility for mobile applications.
question: Can UCIe integrate a third-party ML accelerator into Snapdragon within mobile
  power, package, and latency limits?
details:
  realistic_solution: 'UCIe for mobile faces three constraints: (1) power — mobile
    TDP is 5-15W; UCIe at 512 GB/s speed dissipates ~5W in the PHY alone, 30-50% of
    mobile TDP; (2) package size — mobile requires PoP or eWLB packaging, not CoWoS;
    (3) latency — 50ns die-to-die adds measurable overhead for fine-grained ops. UCIe
    is viable only for coarse-grained offload (entire inference sessions, not per-layer
    dispatch) where the latency is amortized.'
  common_mistake: Assuming UCIe automatically provides the same performance as integrated
    on-die IP blocks. UCIe, even at its highest density spec, adds ~50ns latency and
    10mW/GB/s power vs <10ns for on-die fabric.
  napkin_math: 'UCIe 2.0 FDI bandwidth: up to 8 TB/s (server). Mobile-appropriate
    subset: 128-512 GB/s. Power at 256 GB/s: ~2.5W PHY power. Mobile budget: 10W total.
    2.5W PHY = 25% of TDP just for the interconnect — compare to A17 Pro on-die fabric:
    same 256 GB/s at ~0.3W (10x more efficient).'
