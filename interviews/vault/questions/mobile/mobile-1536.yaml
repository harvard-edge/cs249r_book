title: VRAM Budgeting for a Mobile ML Model on Samsung Exynos 2400 NPU
scenario: You are tasked with deploying a large language model (LLM) for on-device inference on a smartphone powered by the Samsung Exynos 2400 NPU, which features 34.7 TOPS and 12 GB of LPDDR5X memory. The LLM has 7 billion parameters (FP16).
question: How would you budget mobile model memory on Exynos 2400 across weights, activations, and training state to fit within 12 GB?
details:
  realistic_solution: 'A realistic solution involves a detailed breakdown: 1. **Weights:** Calculate based on precision (FP16 or INT8/INT4 quantization). 2. **Optimizer State:** If fine-tuning, consider Adam (12 bytes/param for FP16). 3. **Activations:** Estimate peak memory usage by analyzing the model''s architecture (e.g., largest layer output, batch size). 4. **KV-Cache:** Calculate based on hidden dimension, number of layers, heads, and maximum sequence length. Employ techniques like dynamic KV-cache sizing, quantization-aware training (QAT), weight-only quantization, and efficient inference frameworks optimized for mobile NPUs to reduce footprint. Profiling tools specific to the Exynos NPU would be critical for accurate measurement.'
  common_mistake: |
    **The Pitfall:** Only accounting for model weights and neglecting the significant memory consumption of activations and the KV-cache.
    **The Rationale:** Engineers often focus on the static parameter size and overlook dynamic memory requirements that scale with sequence length.
    **The Consequence:** Leading to out-of-memory errors or severe performance degradation due to memory paging.
  napkin_math: |
    - For a 7B parameter FP16 model: Weights ≈ 7B * 2 bytes = 14 GB (already exceeds 12 GB).
    - If quantized to INT8: Weights ≈ 7B * 1 byte = 7 GB. This leaves ~5 GB for activations and KV-cache.
    - KV-cache for 512 tokens, hidden dim 4096, 32 layers, FP16: 2 * 512 * 4096 * 32 * 2 bytes ≈ 256 MB total.
    - For an 8K context length, KV-cache would grow to ~4 GB.
    - **Longer sequences quickly consume the remaining RAM budget, highlighting the necessity of KV-cache optimization and quantization.**
