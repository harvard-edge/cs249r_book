title: VRAM Budgeting for a Mobile ML Model on Samsung Exynos 2400 NPU
scenario: You are tasked with deploying a large language model (LLM) for on-device inference on a smartphone powered by an NPU with 12 GB of LPDDR5X memory. The LLM has 7 billion parameters (FP16).
question: 'How would you budget mobile model memory across weights, activations, and training state to fit within 12 GB?'
details:
  realistic_solution: 'A realistic solution involves a detailed breakdown: 1. **Weights:** Calculate based on precision (FP16 or INT8/INT4 quantization). 2. **Optimizer State:** If fine-tuning, consider Adam (12 bytes/param for FP16). 3. **Activations:** Estimate peak memory usage by analyzing the model''s architecture (e.g., largest layer output, batch size). 4. **KV-Cache:** Calculate based on hidden dimension, number of layers, heads, and maximum sequence length. Employ techniques like dynamic KV-cache sizing, quantization-aware training (QAT), weight-only quantization, and efficient inference frameworks optimized for mobile NPUs to reduce footprint. Profiling tools specific to the NPU would be critical for accurate measurement.'
  common_mistake: |
    **The Pitfall:** Only accounting for static model weights while ignoring activations and KV-cache.
    **The Rationale:** Engineers focus purely on parameter size and forget that dynamic memory requirements scale linearly with sequence length.
    **The Consequence:** Models that fit on disk immediately crash with Out-Of-Memory (OOM) errors as soon as inference begins on longer sequences.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model Size: 7 Billion parameters.
    - Precision: FP16 (2 bytes/param) vs INT8 (1 byte/param).
    - KV-Cache Dimensions: 512 tokens, 4096 hidden dim, 32 layers.
    - Total RAM Budget: 12 GB.

    **Calculations:**
    - FP16 Weights: 7 * 10^9 * 2 = 14 GB (FAILS instantly).
    - INT8 Weights: 7 * 10^9 * 1 = 7 GB (Leaves ~5 GB free).
    - KV-Cache (512 tokens, FP16): 2 (K+V) * 512 * 4096 * 32 * 2 bytes = ~256 MB.
    - KV-Cache (8192 tokens, FP16): ~4 GB.

    **Conclusion & Interpretation:**
    - **Result: 4 GB cache (Memory-Bound)**. Even with INT8 quantization, long-context inference will consume 4GB of the remaining budget purely on KV-cache.
