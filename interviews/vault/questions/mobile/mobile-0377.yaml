title: The Mobile Roofline Test
scenario: You are optimizing an on-device vision model. A convolutional layer performs 50 billion operations (50 GOPS) and requires reading/writing 100 megabytes (100 MB) of tensor data. The NPU has 35 TOPS peak compute and 51.2 GB/s memory bandwidth.
question: Is a 50 GOPS, 100 MB convolution layer compute-bound or memory-bound based on roofline math?
details:
  realistic_solution: The goal is to compare the workload's Arithmetic Intensity (AI) to the device's
    Ridge Point. A workload is memory-bound if its AI is less than the Ridge Point, and compute-bound
    if its AI is greater.
  common_mistake: |
    **The Pitfall:** Inverting the roofline comparison logic.
    **The Rationale:** Engineers correctly calculate Arithmetic Intensity but conclude that being *below* the ridge point means it is compute-bound.
    **The Consequence:** Wasting time optimizing compute (e.g., pruning) when the layer is actually starved for memory bandwidth.
  napkin_math: |
    - **Arithmetic Intensity (AI):** 50 * 10^9 Ops / 100 * 10^6 Bytes = 500 Ops/Byte.
    - **Ridge Point:** 35 * 10^12 Ops/sec / 51.2 * 10^9 Bytes/sec = 683.6 Ops/Byte.
    - **Comparison:** AI (500) < Ridge Point (683.6).
    - **Result:** The layer is **memory-bound**.
  options:
  - Memory-bound, because its arithmetic intensity (500 Ops/Byte) is less than the device's ridge point
    (~683 Ops/Byte).
  - Compute-bound, because its arithmetic intensity (500 Ops/Byte) is less than the device's ridge point
    (~683 Ops/Byte).
  - Compute-bound, because its arithmetic intensity is 5,000 Ops/Byte, which is greater than the device's
    ridge point.
  - Compute-bound, because 35 TOPS is a very high peak value, so the workload is likely limited by compute.
  correct_index: 0
