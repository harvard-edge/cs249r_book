title: 'Realizing Responsible AI on Google Tensor G3: On-Device Content Moderation'
scenario: Your team is deploying a privacy-preserving, on-device AI model on the Google
  Tensor G3 (7.5 TOPS on-device TPU, 12 GB LPDDR5X) for real-time content moderation
  in a new social communication feature. The model identifies potentially harmful
  content *before* it's sent, offering users immediate feedback and intervention options.
  The executive team insists on robust Responsible AI practices, including model cards,
  continuous impact assessments, and clear guardrails, especially given the model's
  L6+ impact and cross-cutting nature across user privacy and safety. How would you
  design the system for responsible deployment?
question: How should a Tensor G3 on-device content moderation system handle guardrails,
  impact assessment, and resource limits?
details:
  realistic_solution: "An L6+ engineer would propose a multi-faceted approach leveraging\
    \ the Tensor G3's capabilities: \n1.  **On-Device Guardrails & Explainability:**\
    \ Implement lightweight, specialized models (e.g., small rule-based systems or\
    \ simpler ML classifiers) directly on the Tensor G3's TPU. These act as post-inference\
    \ guardrails, catching edge cases or potential misclassifications from the primary\
    \ model. Explore on-device, privacy-preserving techniques for limited local explainability\
    \ (e.g., feature attribution) to provide transparency to the user when interventions\
    \ occur. \n2.  **Federated Evaluation & Impact Assessment:** Design a federated\
    \ evaluation strategy. Instead of sending raw user data to the cloud, send anonymized,\
    \ aggregated model insights (e.g., performance metrics on specific data slices,\
    \ drift detection signals, or user-consented problematic inference samples) to\
    \ continuously refine model cards and inform impact assessments. The Tensor G3's\
    \ compute power supports local aggregation. \n3.  **Local Red-Teaming & Adversarial\
    \ Robustness:** Develop a framework for simulated on-device red-teaming. This\
    \ could involve generating synthetic adversarial inputs locally or deploying 'canary'\
    \ models with specific vulnerabilities to test the robustness of the primary model\
    \ against known attack vectors, specifically targeting the Tensor G3's hardware\
    \ characteristics and typical on-device usage patterns. \n4.  **Resource Management:**\
    \ Meticulously partition the Tensor G3's 7.5 TOPS and 12 GB LPDDR5X to ensure\
    \ the primary model, guardrails, and federated learning components coexist efficiently,\
    \ without compromising user experience (latency) or battery life. This includes\
    \ optimizing model quantization (e.g., to INT8 for TPU) and scheduling inference\
    \ tasks to minimize peak TPU utilization."
  common_mistake: Overlooking the unique challenges of maintaining and assessing Responsible
    AI on edge devices. This often manifests as relying solely on cloud-based red-teaming
    or impact assessment frameworks that don't adequately account for on-device data
    drift, model staleness, or the limited telemetry available from a privacy-preserving
    edge deployment. Another common mistake is assuming that on-device processing
    inherently solves all privacy concerns without considering model input/output
    leakage, adversarial attacks on the local model, or the transparency implications
    of 'black-box' on-device execution.
  napkin_math: For a real-time content moderation model, assuming a primary model
    of ~100MB (quantized) and guardrail/explainability models totalling ~20MB, the
    total on-device model memory footprint is ~120MB, well within the 12GB LPDDR5X.
    If the primary model inference takes ~5ms and guardrail checks take ~2ms on the
    7.5 TOPS TPU, the total latency per message is ~7ms. Processing 10 messages/second
    would result in ~70ms of active TPU time per second, representing ~7% TPU utilization.
    This leaves substantial headroom for other system processes and ensures power
    efficiency. Federated evaluation updates, occurring perhaps once an hour, would
    have negligible impact on real-time performance.
