title: Uncompressed Frame Bandwidth
scenario: A video processing app captures 4K frames at 30 FPS. The frames are natively
  YUV420, but the mobile ML model strictly requires RGB888.
question: Calculate the memory bandwidth required just to transport the converted
  RGB frames to the NPU.
details:
  realistic_solution: Find the total pixels in a 4K frame, multiply by 3 bytes for
    RGB888, and then multiply by the 30 FPS frame rate to determine the raw memory
    bandwidth required.
  common_mistake: Calculating bandwidth based on the compressed YUV420 size rather
    than the uncompressed RGB output required by the NPU.
  napkin_math: 3840 * 2160 * 3 bytes * 30 FPS = 746.5 MB/s.
