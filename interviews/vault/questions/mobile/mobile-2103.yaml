title: Uncompressed Frame Bandwidth
scenario: A video processing app captures 4K frames at 30 FPS. The frames are natively YUV420, but the mobile ML model strictly requires RGB888.
question: Calculate the memory bandwidth required just to transport the converted RGB frames to the NPU.
details:
  realistic_solution: Find the total pixels in a 4K frame, multiply by 3 bytes for RGB888, and then multiply by the 30 FPS frame rate to determine the raw memory bandwidth required.
  common_mistake: |
    **The Pitfall:** Calculating bandwidth based on the compressed YUV420 size.
    **The Rationale:** Candidates forget that the NPU requires uncompressed RGB output for processing.
    **The Consequence:** Underestimating the required memory bandwidth, leading to data starvation.
  napkin_math: |
    - Frame Resolution: 3840 * 2160 pixels.
    - Bytes per pixel (RGB888): 3 bytes.
    - Frame rate: 30 FPS.
    - **Bandwidth = 3840 * 2160 * 3 * 30 = 746.5 MB/s.**
