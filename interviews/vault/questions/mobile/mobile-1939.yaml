title: CoreML Execution Targets on Apple Silicon
scenario: You are integrating a computer vision CoreML model into an iOS application
  targeting an Apple A17 Pro.
question: Identify the three main hardware execution targets that the CoreML framework
  abstracts for dynamically routing model operations.
details:
  realistic_solution: CoreML dynamically profiles and partitions operations across
    the CPU, GPU, and Neural Engine (NPU). It prioritizes the ~35 TOPS Neural Engine
    for heavy, dense tensor convolutions and falls back to the GPU or CPU for unsupported
    layers to maximize efficiency.
  common_mistake: Naming specific low-level software APIs like Metal or Accelerate
    instead of the physical hardware execution targets.
  napkin_math: 3 compute targets = 1 framework abstraction.
