title: CoreML Execution Targets on Apple Silicon
scenario: You are integrating a computer vision CoreML model into an iOS application targeting an Apple A17 Pro.
question: What are the three main hardware execution targets that the CoreML framework abstracts for dynamically routing model operations?
details:
  realistic_solution: CoreML dynamically profiles and partitions operations across the CPU, GPU, and Neural Engine (NPU). It prioritizes the ~35 TOPS Neural Engine for heavy, dense tensor convolutions and falls back to the GPU or CPU for unsupported layers to maximize efficiency.
  common_mistake: |
    **The Pitfall:** Naming low-level software APIs instead of physical hardware targets.
    
    **The Rationale:** Candidates confuse software execution frameworks (like Metal or Accelerate) with the actual silicon blocks processing the tensors.
    
    **The Consequence:** They fail to understand how CoreML physically partitions workloads across the SoC to optimize for power and thermal limits.
  napkin_math: |
    1. **Identify Silicon Targets:** Apple SoC relies on heterogeneous compute.
    2. **Map CoreML Abstraction:** CoreML automatically routes to the **CPU**, **GPU**, and **Neural Engine (NPU)**.
    3. **Result:** **3 execution targets** abstracted behind 1 unified API.
