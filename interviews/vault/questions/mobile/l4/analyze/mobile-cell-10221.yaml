schema_version: 1
id: mobile-cell-10221
title: Analyzing Compound AI Pipeline Thermal Throttling on Snapdragon 8 Gen 3
topic: compound-ai-systems
status: published
provenance: imported
scenario: 'A Snapdragon 8 Gen 3 (45 TOPS, 16GB) device runs a compound AI pipeline: camera embedding (5ms,
  2W), semantic search (8ms, 1W), and on-device LLM (300ms, 12W). After 90 seconds of continuous use,
  the device throttles: LLM inference slows from 300ms to 480ms, embedding slows from 5ms to 9ms. Analyze
  the thermal contribution of each stage and determine which stage to optimize first to recover performance.'
details:
  realistic_solution: 'Analyze thermal energy per second: LLM: 12W * (300ms/query) * (queries/s). If 2
    queries/s: 12 * 0.3 * 2 = 7.2W continuous. Embedding: 2W * (5ms/embed) * (10 embeds/s for camera stream
    at 2fps) = 2 * 0.005 * 2... recalc at 30fps: 2W * 0.005s * 30fps = 0.3W continuous. LLM dominates
    at 7.2W. Primary optimization: reduce LLM power via CPU power cap and INT4 quantization. INT4 reduces
    compute per token, but LLM is memory-bound on mobile — bandwidth reduction from INT4 cuts power ~30%:
    12W → 8.4W, reducing throttle trigger time from 90s to ~135s.'
  common_mistake: Attempting to optimize the LLM (the slowest stage) first without analyzing its thermal
    contribution relative to its frequency of invocation. If embeddings run 10x more often than LLM calls,
    the embedding stage may contribute more total thermal energy despite lower per-call power.
  napkin_math: 'Steady-state thermal load: LLM: 12W * 0.6s_active/s = 7.2W. Embedding: 2W * (5ms*30fps)/1000
    = 2W*0.15 = 0.3W. Search: 1W * (8ms*2 searches/s)/1000 = 0.016W. Total active: 7.52W. Snapdragon sustained
    power budget ~4W for sustained inference. Throttle at 7.52W: onset in ~90s (thermal mass absorbs initial
    burst). After throttle to 4W budget: LLM gets 4W/7.52W * 300ms = 160ms budget → 3.75 tok/s, actual
    300→480ms observed (1.6x). Optimize LLM to 8W: throttle onset ~135s, post-throttle 300ms*(8/4)=...
    wait, throttle is thermal cap not perf scaling — correct analysis: less heat → less throttling.'
