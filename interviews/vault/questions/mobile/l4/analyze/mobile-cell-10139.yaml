id: mobile-cell-10139
title: Analyze EfficientNet-Lite0 vs MobileNetV3 accuracy-energy tradeoff on Snapdragon 8 Gen 3
topic: cnn-efficient-design
status: published
provenance: imported
scenario: You are evaluating EfficientNet-Lite0 (75.1% top-1, 0.35 GFLOPs) vs MobileNetV3-Large (75.2%
  top-1, 0.22 GFLOPs) on a Samsung Galaxy S24 (Snapdragon 8 Gen 3, 45 TOPS Hexagon NPU). Analyze energy
  consumption per inference on the Hexagon DSP vs Qualcomm Adreno 750 GPU path using the QNN SDK.
details:
  realistic_solution: 'Hexagon NPU HTP (Hyper Tensor Processor): native support for depthwise conv, 1×1
    pointwise, INT8/INT4. H-swish in MobileNetV3 must be decomposed to relu6(x+3)/6 × x — two operations
    on HTP. EfficientNet-Lite0 uses ReLU6 — direct HTP support, single operation. Despite 0.13 GFLOPs
    fewer, MobileNetV3-Large may be slower on Hexagon due to H-swish overhead. Energy: Hexagon NPU ~2W
    at full utilization; at 0.35G/45T = 0.78% utilization → ~0.016W for Lite0. At 0.22G/45T = 0.49% →
    ~0.01W for MV3. Difference: 0.006W — negligible. Profile with Qualcomm AI Hub to get actual numbers.'
  common_mistake: Comparing models only by FLOPs without considering that Hexagon NPU has different TOPS
    efficiency for depthwise vs pointwise operations, and that the activation function (H-swish vs ReLU6)
    significantly affects NPU mapping efficiency.
  napkin_math: 'Single inference energy: power × time. MV3-Large on Hexagon: ~1.2ms, NPU power ~0.4W (partial
    load) → energy = 0.4W × 1.2ms = 0.48 mJ. EfficientNet-Lite0: ~1.5ms, power ~0.5W → 0.75 mJ. MV3 is
    1.56× more energy efficient despite similar accuracy. Battery impact: 1000 inferences/day. MV3: 1000
    × 0.48mJ = 0.48J. Snapdragon 8 Gen 3 phone battery: 15Wh = 54,000J. Daily ML inference drain: 0.48/54,000
    = 0.00089% battery. Negligible in isolation; matters at 100K inferences/day (~50mJ vs 75mJ → still
    0.1% battery).'
