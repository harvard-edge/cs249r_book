schema_version: 1
id: mobile-crit-21045
title: On-Device KV-Cache Budget for Mobile LLM
topic: kv-cache-management
status: published
provenance: imported
scenario: You are deploying a 3B-parameter LLM (32 layers, 4 GQA KV heads, head_dim=64) on an A17 Pro
  with 8 GB unified memory. The OS and other apps consume 4 GB, leaving 4 GB for the model. After loading
  INT4 weights (1.5 GB) and runtime overhead (0.5 GB), only 2 GB remains for KV-cache. What is the maximum
  context length?
details:
  realistic_solution: 'KV per token per layer: 2 (K+V) × 4 (KV heads) × 64 (head_dim) × 2B (FP16) = 1,024
    bytes = 1 KB. Per token across 32 layers: 1 KB × 32 = 32 KB. Maximum context: 2 GB / 32 KB = 65,536
    tokens. This is generous — the model supports ~64K context from a memory perspective. However, practical
    constraints: (1) Memory pressure from iOS/Android can reclaim memory at any time — reserve 25% buffer
    → effective budget 1.5 GB → 48K tokens. (2) Attention computation scales O(n²) per layer. At 64K tokens
    on mobile NPU with ~35 TOPS INT8: attention for 64K context takes ~50ms per layer × 32 layers = 1.6s
    per token — too slow for interactive use. (3) Practical sweet spot: 4K-8K context (128-256 MB KV-cache).
    This balances memory headroom for OS pressure events with acceptable decode latency (~100ms per token).
    Quantizing KV-cache to INT8 doubles capacity: 32K tokens in 1 GB.'
  common_mistake: Computing KV-cache size with server-scale dimensions. Mobile models use smaller head
    dimensions and fewer KV heads, making the per-token KV cost much smaller than cloud models.
  napkin_math: 'KV/token: 32 KB (FP16), 16 KB (INT8). Budget: 2 GB. FP16 max: 64K tokens. INT8 max: 128K
    tokens. Practical limit (latency): 4K-8K tokens. Decode latency at 4K: ~12ms/token. At 64K: ~1.6s/token.'
