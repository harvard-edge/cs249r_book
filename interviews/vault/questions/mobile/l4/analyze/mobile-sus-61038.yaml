id: mobile-sus-61038
title: 'DPO for Mobile On-Device Alignment: Feasibility Analysis'
topic: model-adaptation-systems
status: published
provenance: imported
scenario: A mobile assistant team wants to run DPO-style alignment fine-tuning on-device on Snapdragon
  8 Gen 3 (8 GB RAM). Evaluate whether DPO or PPO is feasible and calculate the minimum memory requirements.
details:
  realistic_solution: 'DPO requires only 2 models (policy + frozen reference). For 1B model INT4 (0.5
    GB each): 2 × 0.5 GB = 1 GB for models + 2 GB activations + 2 GB Adam states for LoRA adapters = ~5
    GB total. Snapdragon 8 Gen 3 has 8 GB LPDDR5X — DPO with LoRA fine-tuning of a 1B model is feasible.
    PPO would require ~6 GB for 4 model instances alone, plus optimizer states and rollout buffers, exceeding
    8 GB.'
  common_mistake: Assuming PPO is feasible on mobile. PPO requires 4 model instances plus rollout buffers
    — impossible within mobile RAM constraints for even 1B models.
  napkin_math: '1B INT4 policy: 0.5 GB. 1B INT4 reference (frozen, no optimizer): 0.5 GB. Rank-4 LoRA
    Adam states: 6 MB. Activations (batch=1, seq=512): 500 MB. Rollout buffer: 0 (DPO is offline). Total
    DPO: 1.5 GB — feasible. PPO: 4 × 0.5 GB models + 1 GB optimizer + 1 GB rollout = 4 GB — also feasible
    if models are INT4, but rollout infrastructure is complex for on-device.'
