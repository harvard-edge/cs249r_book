id: mobile-fill-00185
title: KV-Cache Memory Optimization on Snapdragon 8 Gen 3 for Long Contexts
topic: kv-cache-management
status: published
provenance: imported
scenario: You are deploying a large language model with an 8k token context window on a device powered
  by the Snapdragon 8 Gen 3 Hexagon NPU, which features 45 TOPS INT8 compute and 12-16 GB LPDDR5X memory.
  During continuous inference, especially with long user interactions, you observe intermittent latency
  spikes and occasional Out-Of-Memory (OOM) errors. Investigation reveals that the KV-cache is the primary
  culprit, consuming an unexpectedly large portion of the LPDDR5X memory. Analyze the potential causes
  of this memory pressure and propose strategies to optimize KV-cache management within the constraints
  of the Hexagon NPU and its memory subsystem.
details:
  realistic_solution: Implement a paged attention mechanism to decouple logical token positions from physical
    memory addresses, allowing for non-contiguous KV-cache storage and reducing fragmentation. Introduce
    a dynamic cache eviction policy, such as a Least Recently Used (LRU) variant or a token-level eviction
    strategy, to proactively free up memory for less critical or older context segments when memory pressure
    builds. Explore KV-cache quantization techniques (e.g., INT8 for K/V) if the Hexagon NPU's architecture
    supports efficient computation with such formats. Additionally, consider grouped-query attention (GQA)
    or multi-query attention (MQA) during model architecture selection or adaptation, as these can significantly
    reduce the KV-cache size by sharing K/V projections across multiple attention heads.
  common_mistake: A common mistake would be to solely focus on post-training quantization (PTQ) of the
    model weights or reducing the overall model size without specifically addressing the dynamic memory
    footprint of the KV-cache. Another pitfall is neglecting the implications of fragmented memory allocations
    if a basic contiguous buffer approach is used for the KV-cache, leading to inefficient memory utilization
    and potential performance bottlenecks despite having available physical memory.
  napkin_math: 'For a typical LLM with 32 layers, 128 attention heads, and a hidden dimension of 128 per
    head, using FP16 for the KV-cache: each token requires approximately `32 layers * (128 heads * 128
    dimensions/head * 2 bytes/FP16 * 2 (for K and V)) = 32 * (32KB * 2) = 2048 KB = 2 MB` of memory. For
    an 8k token context window, the total KV-cache size would be `8000 tokens * 2 MB/token = 16 GB`. This
    figure alone can consume the entire 12-16 GB LPDDR5X memory available on the Snapdragon 8 Gen 3, leaving
    no room for model weights, activations, and system overhead, directly causing the observed OOM errors
    and latency spikes due to memory contention.'
