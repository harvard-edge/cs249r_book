id: mobile-fill-00659
title: 'Optimizing Transformer Inference on Samsung Exynos 2400 NPU: Attention Complexity and KV-Cache
  Management'
topic: transformer-systems-cost
status: published
provenance: imported
scenario: Your team is tasked with deploying a state-of-the-art Transformer-based Large Language Model
  (LLM) for on-device inference on the Samsung Exynos 2400 NPU (34.7 TOPS, 12 GB LPDDR5X). During initial
  testing, you observe that the model frequently hits memory limits or experiences unacceptably high latency
  for longer input sequences. Analyze the fundamental architectural and scaling challenges of standard
  Transformer models that contribute to these issues on this specific mobile platform.
details:
  realistic_solution: A realistic solution involves exploring architectural modifications and optimization
    techniques. For attention complexity, consider deploying models utilizing linear attention mechanisms
    (e.g., Performer, Linformer) or implementing optimized attention kernels like FlashAttention, if the
    NPU's capabilities allow for efficient block-wise operations. For KV-cache, strategies such as KV-cache
    quantization (e.g., to INT8), dynamic KV-cache eviction policies, or implementing a sliding window
    attention mechanism (e.g., Longformer, BigBird) that inherently limits the KV-cache size can significantly
    mitigate memory pressure on the 12 GB LPDDR5X. These solutions aim to reduce the effective N or the
    constant factor for computation/memory, better aligning with the mobile NPU's constraints.
  common_mistake: A common mistake is underestimating the quadratic complexity of standard self-attention
    (O(N^2) where N is sequence length) and the linear growth of KV-cache memory with N. Simply trying
    to optimize general matrix multiplications without addressing these core scaling issues will not yield
    significant improvements once N becomes large, quickly exhausting the 34.7 TOPS NPU compute budget
    or exceeding the 12 GB LPDDR5X memory.
  napkin_math: 'For a Transformer with `L` layers, `H` heads, hidden dimension `D_model`, and head dimension
    `D_k = D_model/H`:

    1.  **Self-Attention FLOPs (O(N^2))**: A single self-attention layer''s QKV projection and attention
    computation roughly scales as `O(N^2 * D_model)`. For N=2048 and D_model=1024, this is already `~4.3
    * 10^9` FLOPs per layer. Across 24 layers, this quickly exceeds the 34.7 TOPS (3.47 * 10^13 OPS/second)
    budget for real-time inference, especially considering non-optimal NPU utilization.

    2.  **KV-Cache Memory**: The KV-cache stores `2 * L * N * H * D_k` floating-point values. Assuming
    `float16` (2 bytes/value), L=24, H=16, D_k=64, and N=2048, the KV-cache size is `2 * 24 * 2048 * 16
    * 64 * 2 bytes = 201,326,592 bytes ≈ 192 MiB (~201 MB)`. While seemingly small, for larger models
    or if the effective sequence length grows due to context window or multi-turn conversations, this
    can quickly consume a significant portion of the 12 GB LPDDR5X RAM. For example, doubling N to 4096
    would consume ~384 MiB (~403 MB), and much larger LLMs can have significantly higher L, H, and D_k
    leading to GBs of KV-cache, potentially exceeding the 12GB limit.'
