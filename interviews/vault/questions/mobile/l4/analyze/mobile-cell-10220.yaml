schema_version: 1
id: mobile-cell-10220
title: Analyzing Multi-Model Pipeline Memory Pressure on A17 Pro
topic: compound-ai-systems
status: published
provenance: imported
scenario: 'An iOS compound AI app on A17 Pro (8GB RAM, 35 TOPS) runs three models simultaneously: a 2GB
  vision model, a 1.5GB NLP encoder, and a 0.8GB text generation model. iOS kills apps exceeding 4GB RAM.
  At peak, the pipeline holds all three models resident plus KV caches and image buffers. Analyze the
  memory pressure and identify which models can be hot-swapped vs kept resident to stay within the 4GB
  app memory limit.'
details:
  realistic_solution: 'Full memory budget: models(4.3GB) + KV cache for 1024 tokens in text gen model
    (2*layers*head_dim*2bytes*1024 = for a 0.8GB INT4 model ~1B params, 22 layers: 2*22*64*2*1024=5.5MB)
    + image buffers (4K image: 4096*3072*4=48MB) + iOS overhead(200MB) = 4.55GB — exceeds limit by 550MB.
    Solution: hot-swap vision model (2GB) out of Metal memory after encoding, before text generation.
    Resident during text gen: NLP encoder(1.5GB) + text gen(0.8GB) + buffers(0.25GB) = 2.55GB. Load vision
    only during camera frame processing, evict immediately after.'
  common_mistake: 'Summing model sizes and concluding the total fits because 2+1.5+0.8=4.3GB ''barely''
    exceeds the limit, without accounting for runtime overhead: iOS framework overhead (~200MB), KV caches,
    image decode buffers, and the fact that models are loaded into memory with alignment padding.'
  napkin_math: 'Model memory: 2+1.5+0.8=4.3GB. iOS overhead: 200MB. Image buffer (1080p): 1920*1080*4=8MB.
    KV cache: negligible (~6MB). Total peak: 4.508GB — exceeds 4GB limit by 508MB. Hot-swap vision: during
    vision phase: 2+0.2+0.008=2.208GB (safe). During NLP phase: 1.5+0.8+0.2+0.008=2.508GB (safe). Swap
    latency: evict 2GB from Metal heap, reload from flash (NVMe ~3GB/s): 2GB/3GB/s = 667ms. Acceptable
    if vision runs once per user action, not per frame.'
