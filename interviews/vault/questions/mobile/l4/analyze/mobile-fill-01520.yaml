id: mobile-fill-01520
title: Optimizing On-Device Image Classification Dataset with Active Learning on Apple A17 Pro
topic: dataset-curation
status: published
provenance: imported
scenario: Your team is developing an on-device image classification feature for a popular photo editing
  app running on iPhones equipped with the Apple A17 Pro chip. The A17 Pro's Neural Engine offers 35 TOPS
  (Tera Operations Per Second) of compute power with a thermal design power of approximately 5W, and the
  device has 8 GB of unified memory. The current model, intended to categorize user photos, exhibits a
  noticeable performance drop for images taken in low-light conditions or with specific user-generated
  filters. To address this, you've decided to implement an active learning pipeline where the on-device
  model identifies uncertain predictions, and these images are then sent for human annotation to expand
  the training dataset. Describe how you would design this active learning pipeline, considering the A17
  Pro's specs and the need to minimize on-device resource consumption (power, memory, and compute) while
  ensuring high-quality data selection for annotation. Specifically, explain the 'why' behind your design
  choices.
details:
  realistic_solution: A realistic solution involves a multi-stage active learning strategy. On-device,
    a lightweight uncertainty sampling method (e.g., confidence-based thresholding or a simple margin
    sampling using the A17 Pro's Neural Engine for inference) would identify a preliminary set of potentially
    valuable samples. These samples would then undergo a server-side filtering process to remove duplicates,
    near-duplicates, and out-of-distribution samples using more powerful models. Prioritization for human
    annotation would be based on both uncertainty and diversity metrics (e.g., KMeans clustering in feature
    space). Additionally, strict annotation guidelines, regular inter-annotator agreement (IAA) calculations
    (e.g., Kappa score), and a feedback loop with annotators are crucial to maintain label quality. The
    annotation workflow itself should support quick and accurate labeling, potentially with pre-annotation
    suggestions from the current model. The power budget of 5W on the A17 Pro means on-device inference
    for uncertainty sampling must be highly optimized, possibly leveraging quantized models or sparse
    activations.
  common_mistake: A common mistake would be to simply send all uncertain samples for annotation without
    careful filtering, leading to a large volume of redundant or low-value data being labeled. Another
    mistake is using a computationally heavy uncertainty sampling method on-device, draining battery and
    slowing down the user experience, or neglecting inter-annotator agreement in the labeling process,
    leading to inconsistent labels.
  napkin_math: If the model takes 100ms for inference on the A17 Pro's Neural Engine, and we process 10,000
    images on-device per user per day for active learning candidate identification, this translates to
    1000 seconds of active inference (approximately 16.7 minutes). If the Neural Engine consumes, say,
    3W during peak inference, this is 3W * (1000/3600) hours = ~0.83 Wh of battery consumption per day
    per user for this task. This needs to be weighed against the battery life and other background processes.
    For annotation, if an annotator can label 100 images per hour, and we need 10,000 new high-value images
    per week, this requires 100 hours of annotation time (approximately 2.5 full-time annotators), excluding
    review and quality control. If the model has 100,000 parameters, and we collect 10,000 new images,
    the data augmentation needs to be impactful enough to justify the labeling cost and on-device processing.
