schema_version: 1
id: mobile-0804
title: Mobile New 0003
topic: federated-learning
status: published
provenance: imported
scenario: An image segmentation model runs perfectly on a mobile NPU in 20ms. You replace the ReLU activations
  with SiLU to boost accuracy. Suddenly, latency spikes to 850ms, and the SoC CPU usage maxes out to 100%.
details:
  realistic_solution: 'The massive latency spike and high CPU utilization are symptoms of operator fallback.
    The NPU compiler does not natively support the SiLU activation. Consequently, the execution graph
    fractures: the NPU computes the convolution, copies the tensor back to system DRAM, the CPU computes
    SiLU, and copies it back to the NPU. This CPU execution and memory roundtrip completely destroys performance.'
  common_mistake: Assuming all standard framework activation functions are implemented in hardware by
    mobile NPU vendors.
  napkin_math: 'NPU Conv: 2ms. Tensor: 10MB. DRAM copy NPU->CPU: 10MB / 10GB/s = 1ms. CPU SiLU: 10M elements
    * 20 cycles / 2GHz = 100ms. CPU->NPU copy: 1ms. Total per layer: 104ms. For 8 layers = 832ms total
    latency.'
last_modified: '2026-04-01'
