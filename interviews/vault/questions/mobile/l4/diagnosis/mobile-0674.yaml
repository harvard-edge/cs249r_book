schema_version: 1
id: mobile-0674
title: The Memory Bandwidth Bottleneck
topic: memory-hierarchy-design
status: published
provenance: imported
scenario: You have two models, A and B. Model A is a small, shallow network with many tiny layers. Model
  B is a deep, wide network with fewer, larger layers. Both have roughly the same total number of MAC
  operations. On your target mobile NPU, Model A is consistently slower than Model B. Explain why, focusing
  on SoC characteristics.
details:
  realistic_solution: The bottleneck is likely **memory bandwidth** and **cache efficiency**. Model A,
    with many small layers, implies frequent loading of small intermediate tensors from main system memory
    (DRAM) to the NPU's on-chip cache/registers, and then writing them back. Each tiny layer might not
    fully utilize the NPU's compute units if data isn't ready. This pattern leads to high data transfer
    overhead relative to computation. Model B, with fewer, larger layers, allows the NPU to process larger
    chunks of data with better temporal and spatial locality. Intermediate tensors might stay longer in
    faster on-chip caches, reducing trips to slower DRAM. Even if MACs are equal, memory access patterns
    dominate performance when data movement is high, especially for operations like element-wise additions,
    activations, or depthwise convolutions that are memory-bound rather than compute-bound.
  common_mistake: '"Model A has more layers, so more overhead." While true to an extent, the primary bottleneck
    isn''t the *number* of layers but the *data movement* between them.'
  napkin_math: A typical LPDDR5 mobile DRAM might offer 50-60 GB/s bandwidth. If Model A has 100 layers,
    each producing a 1MB intermediate tensor, that's 100MB of reads and 100MB of writes, totaling 200MB
    *per inference*. If this happens 30 times a second, that's 6 GB/s just for intermediate tensors, potentially
    saturating the memory bus when combined with other system activities. If Model B has 10 layers, it's
    20MB *per inference*, much less memory traffic.
