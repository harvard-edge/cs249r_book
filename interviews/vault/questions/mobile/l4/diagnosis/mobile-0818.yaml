id: mobile-0818
title: Mobile New 0018
topic: federated-learning
status: published
provenance: imported
scenario: You load a 50MB model on a smartwatch showing 120MB of free RAM. During initialization, the
  `malloc` call fails, throwing an Out-Of-Memory (OOM) error, crashing the app.
details:
  realistic_solution: The symptom of an OOM error despite seemingly adequate total free memory is caused
    by memory fragmentation. The inference engine requires contiguous memory blocks (either physical for
    NPU DMA, or virtual depending on OS limits) to load large tensors. If the 120MB free RAM is heavily
    fragmented into tiny chunks by other background processes, the OS cannot allocate a single 50MB contiguous
    block.
  common_mistake: Looking only at aggregate free memory and assuming mobile OS heaps are perfectly defragmented.
  napkin_math: 'Required contiguous block: 50MB. Available RAM: 120MB. Memory state: 120 isolated 1MB
    blocks scattered across the heap. Max contiguous size = 1MB. 50MB > 1MB. `malloc(50MB)` searches heap,
    fails, returns NULL.'
