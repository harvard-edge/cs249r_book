id: mobile-0809
title: Mobile New 0009
topic: federated-learning
status: published
provenance: imported
scenario: A Cortex-M4 uses DMA to load memory tiles for a conv layer. Latency is double the theoretical
  minimum. The CPU sleep profile shows the core is entirely blocked waiting for the DMA transfer to complete
  before computing.
details:
  realistic_solution: 'The symptom is high latency with the CPU idling during memory transfers. The root
    cause is the failure to implement double-buffering (ping-pong buffering). The software uses a single
    buffer: it asks DMA to fetch data, blocks the CPU until done, then computes. It should fetch buffer
    B while computing buffer A to overlap memory access with computation.'
  common_mistake: Assuming DMA automatically hides memory latency without structuring the software pipeline
    to overlap operations.
  napkin_math: 'Single buffer: T_total = T_dma (10k cycles) + T_compute (10k cycles) = 20k cycles. Ping-pong
    buffer: T_total = max(T_dma, T_compute) = 10k cycles (plus small fill/drain overhead). Missing this
    doubles the latency (20k vs 10k).'
