id: mobile-cell-10227
title: Diagnosing Retrieval Quality Degradation After App Update on Snapdragon 8 Gen 3
topic: compound-ai-systems
status: published
provenance: imported
scenario: After an app update on Snapdragon 8 Gen 3 (45 TOPS, 16GB), users report that the on-device assistant
  gives less relevant answers despite the LLM being unchanged. The update replaced the embedding model
  from a 256-dim model (v1) to a 384-dim model (v2) but kept the existing FAISS index built with v1 embeddings.
  Diagnose why retrieval quality degraded and quantify the impact.
details:
  realistic_solution: 'Root cause: embedding space mismatch. v1 and v2 are different models with different
    learned projections — their vector spaces are not aligned. A v2 query vector searching a v1 index
    will return essentially random results (cosine similarity ~0 for unrelated vectors, not correlated
    with semantic similarity). Fix requires rebuilding the index with v2 embeddings. For 10K documents,
    re-embedding time on Snapdragon at 200 vecs/s (v2 model, larger): 10,000/200=50 seconds. Schedule
    index rebuild as a background task on first launch after update, serving from v1 index until complete,
    then atomic swap.'
  common_mistake: Assuming that a higher-dimension embedding model is always better, and failing to recognize
    that the FAISS index was built with v1 embeddings — making v2 query vectors incompatible with v1 document
    vectors. The cosine similarity between a v2 query vector and v1 document vectors is meaningless.
  napkin_math: 'v2 re-embedding: 10,000 docs * (1/200 s/doc) = 50 seconds on Snapdragon 8 Gen 3. Memory
    during rebuild: v1 index (10K*256*4=10MB) + v2 index building (10K*384*4=15.4MB) + v2 model (larger,
    ~40MB INT8) = 65MB overhead — negligible on 16GB. Index swap: atomic rename of FAISS file (< 1ms).
    User impact window: 50s of degraded retrieval (v1 index with v2 queries). Mitigation: pre-build new
    index on backend, push as OTA update alongside model, swap atomically on first launch.'
