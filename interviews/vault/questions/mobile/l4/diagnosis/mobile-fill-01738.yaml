schema_version: 1
id: mobile-fill-01738
title: 'Bias Detection in On-Device LLM on Tensor G3: Diagnosing a Fairness Regression'
topic: responsible-ai
status: published
provenance: imported
scenario: A new on-device large language model (LLM) for content summarization, deployed on a fleet of
  Pixel devices featuring the Google Tensor G3 (7.5 TOPS on-device TPU, 12 GB LPDDR5X), is exhibiting
  unexpected fairness regressions. Post-deployment monitoring flags a significant increase in gender bias
  scores, particularly for summarizations involving professional roles, compared to pre-deployment evaluations.
  Users are reporting that summaries disproportionately associate certain genders with specific low-status
  or high-status professions. Your team is tasked with diagnosing the root cause of this sudden bias shift,
  considering the model's on-device nature and the constraints of the Tensor G3 hardware.
details:
  realistic_solution: 'An L4 engineer would first implement a detailed diagnostic pipeline to precisely
    pinpoint the source of the regression. This involves:

    1. **Symptom Characterization:** Deep-diving into the monitoring logs to categorize the specific types
    of biased summarizations and the contexts in which they occur.

    2. **Data Drift Analysis:** Comparing the distribution of input data observed on-device post-deployment
    with the training/validation data, looking for subtle shifts not caught by initial checks.

    3. **Model Interpretability (on-device perspective):** Utilizing on-device interpretability tools
    (e.g., LIME, SHAP, attention heatmaps if feasible) or proxy models to understand which input features
    or internal model states are most highly correlated with the biased outputs *on the Tensor G3*. This
    may involve specialized on-device profiling tools that can inspect TPU operations.

    4. **Hardware/Software Interaction:** Investigating if the quantization, compilation, or specific
    optimizations for the Tensor G3''s 7.5 TOPS TPU and 12 GB LPDDR5X memory footprint introduced any
    numerical instabilities or edge-case behaviors that amplify biases. This includes checking for differences
    in floating-point precision handling or integer quantization effects.

    5. **A/B Testing or Canary Deployments:** If available, analyzing results from smaller, controlled
    rollouts to isolate variables.

    6. **Model Card Review:** Consulting the original model card and impact assessment to understand documented
    risks and mitigation strategies, and comparing observed behavior against expected performance bounds.

    The focus would be on understanding *why* the bias manifested post-deployment, leveraging the specific
    capabilities (and limitations) of the Tensor G3.'
  common_mistake: Immediately attempting to retrain the model with augmented data or applying post-hoc
    bias mitigation techniques without first understanding the specific failure mode, potentially exacerbating
    the problem or introducing new unintended biases. Another mistake would be to assume the issue is
    purely a data problem without investigating the on-device execution context or model serving infrastructure.
  napkin_math: If the LLM has ~7 billion parameters (7B params), and each parameter is quantized to 8-bit
    integers for on-device inference (typical for mobile TPUs), then the model size is approximately 7B
    * 1 byte/param = 7 GB. This fits within the Tensor G3's 12 GB LPDDR5X, leaving 5 GB for activations
    and other runtime data. If a specific diagnostic trace requires capturing intermediate activations
    for a layer, how many additional 8-bit parameters (activations) can be buffered if we dedicate 1 GB
    of the remaining memory, assuming a batch size of 1 for inference? (1 GB = 10^9 bytes; 10^9 bytes
    / 1 byte/param = 10^9 parameters. This gives a sense of the scale of interpretability data that can
    be collected on-device without severely impacting performance).
