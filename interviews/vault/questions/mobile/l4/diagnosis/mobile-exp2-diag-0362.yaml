schema_version: 1
id: mobile-exp2-diag-0362
title: Exynos 2400 Shared Memory Bottleneck Analysis
topic: profiling-bottleneck-analysis
status: published
provenance: imported
scenario: You are deploying a real-time video segmentation model to the Samsung Exynos 2400 NPU for a
  live camera filter application. Profiling shows that despite the dual-core NPU being rated for 34.7
  TOPS, your inference latency sporadically spikes by 40-60ms, dropping the frame rate. System traces
  indicate the NPU compute utilization is surprisingly low during these spikes, but memory access wait
  times are extremely high. Based on the hardware architecture, how do you diagnose the root cause of
  this latency degradation?
details:
  realistic_solution: The root cause is memory bandwidth contention. The Samsung Exynos 2400 shares its
    12 GB LPDDR5X memory across the CPU, GPU, ISP, and NPU. During live video processing, the ISP (processing
    high-res camera frames) and GPU (rendering the filters) consume massive memory bandwidth. The diagnosis
    requires using a system-wide profiler to overlay memory bandwidth utilization from the ISP and GPU
    with the NPU's execution timeline to confirm that burst memory requests from other blocks are starving
    the NPU.
  common_mistake: Candidates often assume the model is compute-bound and suggest aggressive pruning or
    quantization without looking at system-level resource contention. They frequently forget that mobile
    SoCs have unified memory systems and fail to investigate what other hardware blocks are doing.
  napkin_math: LPDDR5X typically offers around 68.2 GB/s theoretical peak bandwidth. If the ISP is writing
    4K 60FPS video (approx 1.5 GB/s uncompressed) and the GPU is actively rendering UI/filters consuming
    40-50 GB/s, the remaining bandwidth is severely constrained. Even if the NPU model only needs 5 GB/s
    to load weights and activations, instantaneous bursts from the GPU/ISP can drop available bandwidth
    to near zero for milliseconds. A 50MB model bottlenecked to 1 GB/s during a contention spike takes
    50ms just to load, completely explaining the 40-60ms latency spikes despite the 34.7 TOPS available
    compute.
