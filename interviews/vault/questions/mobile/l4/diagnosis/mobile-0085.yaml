schema_version: 1
id: mobile-0085
title: The Android NNAPI Driver Fallback
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: You deploy a TFLite model on Android and enable the NNAPI (Neural Networks API) delegate to
  run it on the hardware NPU. On Samsung phones, it takes 5ms. On a specific Xiaomi model, it takes 80ms.
  You verify that the Xiaomi phone physically has a powerful NPU. Why is NNAPI making the model 16x slower
  than it should be?
details:
  realistic_solution: 'NNAPI''s vendor driver claims to support the ops but silently falls back to reference
    CPU (80ms) instead of the NPU (5ms). NNAPI doesn''t report fallback at compilation time. Fix: (1)
    micro-benchmark at first launch comparing NNAPI vs XNNPACK. If NNAPI is slower, blocklist that device.
    (2) Maintain a device blocklist from production telemetry. (3) Use GPU delegate as middle tier (10-15ms).
    Never trust NNAPI blindly — verify NPU usage by comparing against a CPU baseline.'
  common_mistake: '"The Xiaomi NPU is just bad." A 16x slowdown usually points to the NPU not being used
    at all.'
  napkin_math: Hardware NPU = 5ms. XNNPACK CPU = 20ms. NNAPI Reference CPU = 80ms. Blindly trusting NNAPI
    without verifying execution location can result in worse performance than explicitly requesting CPU.
