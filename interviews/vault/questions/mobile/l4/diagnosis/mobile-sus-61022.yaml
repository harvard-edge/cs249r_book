id: mobile-sus-61022
title: Snapdragon 8 Gen 3 Hexagon NPU Memory Architecture
topic: chiplet-architecture
status: published
provenance: imported
scenario: A generative AI app on Snapdragon 8 Gen 3 shows 40ms latency for a 1B parameter model decode
  step. Profile the memory hierarchy to identify the bottleneck.
details:
  realistic_solution: '1B model FP16 = 2 GB. Each decode step reads all weights once: 2 GB / (LPDDR5X
    BW available to Hexagon). Snapdragon 8 Gen 3 LPDDR5X: ~77 GB/s total, Hexagon allocation ~20-30 GB/s
    in mixed-use scenario. 2 GB / 25 GB/s = 80ms just for weight loading — exceeding observed 40ms, suggesting
    INT4 quantization is being used (0.5 GB / 25 GB/s = 20ms weight load + ~20ms compute = ~40ms).'
  common_mistake: Blaming the NPU compute throughput (45 TOPS). The bottleneck is almost always the LPDDR5X
    bandwidth shared between CPU, GPU, and Hexagon NPU on the same SoC.
  napkin_math: '45 TOPS INT8 Hexagon. 1B INT4 = 0.5 GB. At 25 GB/s memory BW: 0.5 GB / 25 GB/s = 20ms
    weight read. Compute: 1B params × 2 MACs/param (attention + FFN) / 45 TOPS = 2×10⁹/45×10¹² = 0.04ms
    — compute is negligible. Total ≈ 20ms memory + 20ms overhead = 40ms matches observation.'
