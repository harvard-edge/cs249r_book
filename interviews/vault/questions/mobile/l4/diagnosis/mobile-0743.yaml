schema_version: 1
id: mobile-0743
title: The Jetsam Guillotine
topic: memory-hierarchy-design
status: published
provenance: imported
scenario: Your AR app crashes with a 'SIGKILL' (Jetsam kill) when users take a high-resolution photo,
  even though your app is only using 822 MB of its 2 GB memory limit. Based on the RAM diagram, what is
  the 'invisible' resource consumer causing the OS to kill your process?
details:
  realistic_solution: You are hitting a **Shared Resource RAM Collision**. The camera ISP service runs
    in a separate process but shares the same physical RAM pool. During photo capture, the ISP HDR pipeline
    can consume >1.2 GB. When combined with the OS and your app, total demand exceeds 4 GB, and the OS
    kills the app to protect the camera. The fix is to use **mmap** for weights (allowing OS eviction),
    reduce camera resolution during inference, or sequentialize the capture and ML phases.
  common_mistake: '"The model is too big — quantize it." Quantization helps, but the real issue is that
    the camera ISP''s memory allocation is invisible to your app and uncontrollable.'
  napkin_math: Total Memory = 1.5 GB (OS) + 1.2 GB (ISP) + 0.82 GB (App) = 3.52 GB. This is dangerously
    close to the 4 GB limit. Any background task (like a notification or a message) will push the system
    over the edge.
