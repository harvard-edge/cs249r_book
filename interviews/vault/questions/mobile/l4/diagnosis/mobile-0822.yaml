id: mobile-0822
title: Mobile New 0023
topic: roofline-analysis
status: published
provenance: imported
scenario: A mobile SoC runs a heavy generation model. In the first minute, the SoC draws 3W. After 10
  minutes, despite doing the exact same number of MACs per second, the power draw creeps up to 4.5W.
details:
  realistic_solution: 'The symptom of power draw increasing over time for a constant workload is caused
    by temperature-induced leakage current. As the SoC computes, it generates heat. As silicon temperature
    rises, transistor subthreshold leakage power increases exponentially. This creates a feedback loop:
    higher temp -> higher leakage -> higher power -> higher temp, increasing total Watts without any extra
    compute.'
  common_mistake: Assuming total power consumption is strictly a function of clock frequency and utilization,
    ignoring thermal leakage.
  napkin_math: 'Total Power = Dynamic + Leakage. At 25C: P_dyn = 2.5W, P_leak = 0.5W (Total 3W). At 85C:
    P_dyn = 2.5W, but P_leak increases exponentially by ~4x to 2.0W. Total Power = 2.5W + 2.0W = 4.5W.
    Workload is identical, power is 50% higher.'
