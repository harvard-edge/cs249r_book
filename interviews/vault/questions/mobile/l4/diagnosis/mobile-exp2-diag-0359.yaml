schema_version: 1
id: mobile-exp2-diag-0359
title: Diagnosing OOM on Shared Memory NPU Architectures
topic: model-size-estimation
status: published
provenance: imported
scenario: Your team is running an 8-billion parameter LLM quantized to INT8 on a Samsung Exynos 2400 NPU,
  leveraging its dual-core NPU and 34.7 TOPS of compute. The deployment runs perfectly in isolation, but
  users report severe Out-Of-Memory (OOM) crashes the moment they switch to a multi-modal feature that
  simultaneously activates the camera. You need to analyze the hardware architecture to identify why this
  specific workload crashes despite the device having 12 GB of LPDDR5X memory.
details:
  realistic_solution: A strong candidate will identify that the Exynos 2400 features a unified memory
    subsystem. The 8B INT8 model consumes roughly 8 GB just for weights. The OS requires around 2-3 GB.
    When the camera activates, the ISP and GPU allocate large high-resolution frame buffers. This combined
    memory pressure exceeds the shared 12 GB LPDDR5X capacity, triggering the Android Low Memory Killer
    Daemon (LMKD) to terminate the app.
  common_mistake: Candidates frequently assume the entire 12 GB of memory is dedicated to the NPU, calculating
    only the static weights. They fail to account for the shared memory architecture where the CPU, GPU,
    and ISP (Image Signal Processor) heavily consume the same LPDDR5X pool during concurrent operations.
  napkin_math: 'Model weights: 8 billion parameters * 1 byte (INT8) = 8.0 GB. Runtime activations (KV
    cache) ≈ 0.5 GB. Total LLM footprint = 8.5 GB. OS base footprint ≈ 2.5 GB. ISP/GPU frame buffers for
    camera ≈ 1.5 GB. Total requested memory: 8.5 + 2.5 + 1.5 = 12.5 GB. Since 12.5 GB > 12.0 GB shared
    LPDDR5X capacity, the system inevitably crashes.'
