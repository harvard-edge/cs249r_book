schema_version: 1
id: mobile-fill-01290
title: Diagnosing Data Drift on Google Tensor G3 for On-Device ML
topic: distribution-drift-detection
status: published
provenance: imported
scenario: A critical on-device image classification model, deployed across a fleet of mobile devices powered
  by the Google Tensor G3 SoC (featuring a 7.5 TOPS on-device TPU and 12 GB LPDDR5X RAM), has recently
  shown a significant and sustained drop in prediction accuracy. This model, responsible for classifying
  real-time camera inputs, was initially trained on a diverse dataset of images captured under typical
  daylight conditions. However, recent telemetry indicates a shift in the distribution of incoming inference
  data, with a growing proportion of images being captured in low-light, high-noise environments. You
  suspect either data drift or concept drift is occurring. Given the computational and memory constraints
  of the mobile environment, how would you systematically diagnose the root cause of this accuracy degradation
  and effectively differentiate between data drift, concept drift, and potential training-serving skew?
details:
  realistic_solution: To diagnose, first establish baseline feature distributions (e.g., from an intermediate
    embedding layer) using a representative sample of the original training data. On the Google Tensor
    G3, leverage the on-device TPU to periodically compute feature distributions from a small, sampled
    subset of live inference data. Compare these live distributions against the baseline using statistical
    methods like Population Stability Index (PSI) or a lightweight approximation of KL divergence (e.g.,
    using histogram intersection or L1 distance on binned feature values). Significant divergence suggests
    data drift. To differentiate from concept drift, analyze the relationship between features and ground
    truth labels in the drifted data; if available, a small fraction of the drifted data can be re-labeled
    and its feature-label mapping compared to the original. Training-serving skew would be investigated
    by meticulously comparing the preprocessing pipelines and model inference steps on the device with
    those used during training, ensuring consistency in feature engineering, normalization, and quantization.
  common_mistake: A common mistake is immediately assuming concept drift and triggering an expensive,
    full model retraining cycle, without first verifying if the feature distribution itself has changed
    (data drift) and if the existing model could still perform adequately with adjusted preprocessing
    or minor adaptations. Another pitfall is neglecting to consider the on-device resource limitations
    when designing drift detection mechanisms, leading to excessive power consumption or latency.
  napkin_math: If an on-device image classification model generates a 1024-dimensional float16 embedding
    per image, and we aim to collect a 0.5% sample of daily inferences for drift analysis. If the device
    processes 100 images/second for 8 hours a day, how much on-device memory (in MB) would be required
    to store these sampled embeddings daily before further processing? (100 img/s * 3600 s/hr * 8 hr/day
    * 0.005 sample rate * 1024 dims * 2 bytes/float16) / 1024 / 1024 = ~28.1 MB.
