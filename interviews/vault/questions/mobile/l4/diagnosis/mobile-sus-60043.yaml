schema_version: 1
id: mobile-sus-60043
title: Debugging gradient vanishing in a mobile RNN model on Snapdragon 8 Gen 3
topic: autograd-computational-graphs
status: published
provenance: imported
scenario: A team trains a 3M parameter GRU-based model for time-series anomaly detection on Snapdragon
  8 Gen 3. The model processes 500-step sequences. After training for 200 epochs, the GRU's recurrent
  weights show near-zero gradient norms while output layer gradients are normal. Loss is decreasing but
  recurrent weights never update meaningfully.
details:
  realistic_solution: 'Apply gradient clipping: torch.nn.utils.clip_grad_norm_(model.parameters(), max_norm=1.0).
    Use truncated BPTT: process 500 steps as 10 chunks of 50 steps, detaching the hidden state between
    chunks (h.detach()). This keeps gradient backpropagation to 50 steps, preventing exponential vanishing.
    Verify with gradient norm logging per layer. Consider replacing GRU with a Transformer encoder (self-attention
    has constant gradient path length).'
  common_mistake: Training a GRU with BPTT over 500 time steps without gradient clipping. Over 500 steps,
    even with GRU gating, gradients can vanish exponentially (multiply by recurrent weight^500 terms in
    the backward graph). The gradient norm for early time steps approaches floating-point underflow.
  napkin_math: 'GRU recurrent weight gradient at step t (of 500): proportional to product of 500-t Jacobian
    terms. If each Jacobian eigenvalue is 0.98: 0.98^500 = 4.4×10⁻⁵. For 0.95: 0.95^500 = 5.2×10⁻¹². In
    FP32, values below 1.4×10⁻⁴⁵ underflow to 0. With 500 steps and typical weight initialization, early-step
    gradients are effectively zero. TBPTT with T=50 max decay: 0.95^50 = 0.077 — finite and usable.'
