id: mobile-0574
title: The NPU Delegation Failure Modes
topic: real-time-deadlines
status: published
provenance: imported
scenario: You convert your PyTorch model to TFLite and enable the Qualcomm QNN delegate for the Hexagon
  NPU. The delegate reports '87% of ops delegated.' Your colleague says 'close enough — the remaining
  13% will run on CPU, no big deal.' Why is 87% delegation potentially worse than 0% delegation?
details:
  realistic_solution: 'The 13% undelegated ops are scattered throughout the graph, not clustered at the
    end. Each undelegated op creates a partition boundary: NPU→CPU→NPU. If there are 8 undelegated ops
    in the middle of the graph, you get 9 NPU subgraphs with 8 round-trip data transfers. Each transfer
    costs 1-3ms. Total transfer overhead: 8 × 2ms = 16ms — potentially more than the entire model would
    take on CPU alone.'
  common_mistake: '"87% delegation means 87% of compute runs on the NPU." Delegation percentage counts
    ops, not compute time. And partial delegation creates expensive partition boundaries.'
  napkin_math: 'Full NPU delegation: 4ms. 87% delegation with 8 partition boundaries: 9 NPU segments (3.5ms)
    + 8 CPU ops (0.8ms) + 8 transfers (16ms) + lost optimizations (2ms) = **22.3ms**. Full CPU fallback:
    15ms. Partial delegation is **1.5× slower than no delegation at all**.'
