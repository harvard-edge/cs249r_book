id: mobile-0812
title: Mobile New 0012
topic: federated-learning
status: published
provenance: imported
scenario: A custom INT8 inference engine on a DSP runs fast but accuracy drops to zero. You notice all
  the intermediate output tensors are saturated exactly to the value of 127. The FP32 model does not have
  this issue.
details:
  realistic_solution: The symptom of outputs uniformly pegging to 127 is a classic sign of accumulator
    overflow. When performing dot products of INT8 values, the sum can quickly exceed the 8-bit maximum
    (127). The DSP must accumulate intermediate MACs into a wider register (INT32). If the compiler or
    custom kernel erroneously sets the accumulator to INT8, every sum clips immediately.
  common_mistake: Using INT8 data types for both the operands and the accumulator to save register space.
  napkin_math: 'INT8 range: -128 to 127. MAC operation: 50 * 50 = 2500. 2500 > 127. In INT8 accumulator,
    2500 saturates to 127. Summing 100 such values: 250000. In INT32 it''s 250000, perfectly safe. In
    INT8 it stays clipped at 127.'
