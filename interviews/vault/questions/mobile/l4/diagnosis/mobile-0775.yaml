schema_version: 1
id: mobile-0775
title: Diagnosing Core ML ANE Fallback
topic: transformer-systems-cost
status: published
provenance: imported
scenario: A mobile team ports a Vision Transformer (ViT-Base) to Core ML for an iPhone 15 Pro (A17 Pro,
  35 TOPS ANE). They expect high efficiency, but Instruments profiling reveals a latency of 140ms per
  frame. The trace shows execution constantly ping-ponging between the Apple Neural Engine (ANE) and the
  CPU. What is the architectural root cause of this execution pattern, and how can it be analyzed and
  resolved to achieve target performance?
details:
  realistic_solution: Use the Core ML Performance Report to identify ANE-unsupported operations (e.g.,
    dynamic shapes, Einsum, or specific GELU variants) forcing CPU fallback. Refactor the PyTorch/TensorFlow
    source to use static shapes and supported primitives (e.g., replacing Einsum with standard matmuls),
    allowing the entire graph to compile for ANE.
  common_mistake: Assuming the ANE is inherently slow at Transformer architectures or blindly restricting
    execution to the GPU, ignoring the massive memory synchronization overhead caused by CPU fallback.
  napkin_math: Initial Latency (140ms) = ANE Time (10ms) + CPU Time (30ms) + Context Switches. If a 12-layer
    ViT switches between ANE and CPU twice per layer (24 switches) at ~4ms memory sync overhead each,
    sync alone costs ~96ms. Fixing operations eliminates sync overhead, yielding ~15ms total latency.
