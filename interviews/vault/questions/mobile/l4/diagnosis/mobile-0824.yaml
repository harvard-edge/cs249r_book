schema_version: 1
id: mobile-0824
title: Mobile New 0025
topic: real-time-deadlines
status: published
provenance: imported
scenario: A security camera runs object detection at 30 FPS. The NPU draws a steady 2W. The scene is an
  empty hallway with no movement 99% of the time, yet the battery drains just as fast as during a busy
  period.
details:
  realistic_solution: The symptom is constant high power consumption regardless of semantic content. The
    root cause is redundant inference processing. The system is running the full heavy CNN on every single
    frame, even if the pixels haven't changed. Implementing a cheap frame-differencing algorithm or a
    tiny motion-detection cascade could gate the heavy NPU execution, saving massive amounts of power.
  common_mistake: Processing continuous sensor streams at full frame rates regardless of information entropy.
  napkin_math: 'Always on: 2W * 24hrs = 48 Watt-hours/day. Motion gated: ISP motion check = 50mW. If motion
    is 1% of the day, NPU runs 14 minutes. Total energy = (0.05W * 24h) + (2W * 0.24h) = 1.2 + 0.48 =
    1.68 Watt-hours/day. Battery life extends 28x.'
