schema_version: 1
id: mobile-0805
title: Mobile New 0004
topic: roofline-analysis
status: published
provenance: imported
scenario: A 50KB dense model is deployed on a mobile SoC. When executed on the NPU, it takes 2.5ms per
  inference. When forced to run on the much weaker Cortex-A CPU, it takes only 0.8ms. The NPU utilization
  remains under 5%.
details:
  realistic_solution: The symptom of a weaker CPU outperforming a powerful NPU on a tiny model indicates
    that dispatch and synchronization overheads are dominating the latency. The time required for the
    CPU to construct the command buffer, wake up the NPU via an interrupt, and synchronize memory far
    exceeds the actual computation time. For extremely small models, the CPU can just compute the result
    directly from its L1 cache in less time.
  common_mistake: Offloading every neural network to the NPU/GPU regardless of the model size and fixed
    communication overheads.
  napkin_math: 'Compute time: 50K MACs / 100 GFLOPS (NPU) = 0.5us. NPU Wake/Interrupt overhead: 2000us.
    Total NPU = 2000.5us (~2.0ms). CPU compute: 50K MACs / 10 GFLOPS (CPU) = 5us. Overhead = 0. Total
    CPU = 5us. 5us << 2000us.'
