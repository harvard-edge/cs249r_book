schema_version: 1
id: mobile-0802
title: Mobile New 0001
topic: latency-decomposition
status: published
provenance: imported
scenario: An Orin device (275 TOPS) runs a ResNet-style model. A specific layer requires 10 Giga-Operations
  (GOPs). Instead of taking the expected ~0.036ms, the layer takes 0.5ms. Profiling shows 100% memory
  read utilization but very low compute usage.
details:
  realistic_solution: The symptom is a massive compute utilization drop caused by the layer being severely
    memory-bandwidth bound. While the NPU has 275 TOPS, it cannot compute faster than data is fed to it.
    The low arithmetic intensity (ratio of compute to memory access) of this specific layer prevents the
    NPU from reaching peak TOPS. The root cause is memory bandwidth bottlenecking the execution pipeline.
  common_mistake: Assuming latency is always exactly `Compute / TOPS` and ignoring the critical impact
    of memory bandwidth limits.
  napkin_math: 'Compute bound time: 10 GOPs / 275 TOPS = 0.036ms. Assume the layer reads 50MB of data.
    At 100GB/s bandwidth, BW time = 50MB / 100 GB/s = 0.5ms. 0.5ms > 0.036ms. Arithmetic intensity = 10
    GOPs / 50MB = 200 OP/byte.'
