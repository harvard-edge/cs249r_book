schema_version: 1
id: mobile-0073
title: The Display Pipeline Collision
topic: real-time-deadlines
status: published
provenance: imported
scenario: Your AR app overlays ML-generated segmentation masks on the camera feed at 60 FPS on an iPhone
  14 Pro (A16 Bionic, ProMotion 120 Hz display). When you enable the 120 Hz mode, the segmentation mask
  visibly 'lags' behind the camera feed — objects move but the mask follows 1-2 frames behind. At 60 Hz,
  the lag is imperceptible. Your ML inference time hasn't changed. What's happening?
details:
  realistic_solution: 'The problem is **pipeline phase misalignment** between the camera, ML inference,
    and display refresh. At 60 Hz (16.7ms budget), inference takes 11ms with 5.7ms slack — the mask is
    at most one frame old (16.7ms), matching the camera feed age. At 120 Hz (8.3ms budget), inference
    still takes 11ms, spanning two display frames. The camera feed updates every 8.3ms but the mask updates
    every 11ms, creating an 8.3ms visible desync. Fix with motion-compensated reprojection: read the IMU
    gyroscope during inference (~0.5ms overhead), then warp the stale mask to match the current camera
    frame using a 2D affine transform. This hides the desync at <1ms cost. Additionally, split the segmentation
    model into a fast coarse pass (4ms, every frame) and a slow refinement pass (11ms, every other frame).
    The coarse pass provides temporally-aligned edges while refinement fills detail. Net result: perceived
    latency drops from 8.3ms to <2ms at 120 Hz.'
  common_mistake: '"The model can''t keep up with 120 Hz — we need a faster model." The model runs at
    60 FPS regardless of display refresh rate. The issue is pipeline synchronization.'
  napkin_math: '60 Hz: frame budget = 16.7ms. Pipeline = 11ms. Slack = 5.7ms. Mask age when displayed:
    16.7ms. 120 Hz: frame budget = 8.3ms. Pipeline = 11ms. Overshoot = 2.7ms. Mask age when displayed:
    16.6ms (same!), but camera feed is 8.3ms fresher → **8.3ms visible desync**. Reprojection cost: ~0.5ms
    (IMU read + affine warp on GPU). Reprojection error at 8.3ms: <2 pixels for typical hand motion (30
    cm/s × 8.3ms = 2.5mm movement, at 30cm distance = ~1.5 pixels). Acceptable for AR overlay.'
