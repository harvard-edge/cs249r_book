schema_version: 1
id: mobile-exp-diag-0095
title: Guardrail CPU Fallback on Hexagon NPU
topic: responsible-ai
status: published
provenance: imported
scenario: To comply with our organizational AI accountability framework, we deployed a local 3B-parameter
  LLM alongside a 100M-parameter RoBERTa-based toxicity guardrail on a flagship device featuring the Qualcomm
  Hexagon NPU (Snapdragon 8 Gen 3). Despite the platform's capable heterogeneous CPU+GPU+NPU architecture
  and ample shared 12-16 GB LPDDR5X memory, the system exhibits severe UI stuttering and battery drain
  precisely when the output guardrail is invoked. Profiling shows memory capacity isn't the bottleneck,
  but NPU utilization drops near zero while the CPU maxes out during the safety check. What is causing
  this performance degradation?
details:
  realistic_solution: The root cause is an operator precision mismatch causing a CPU fallback. The Hexagon
    NPU excels at INT8 operations, but the FP32 guardrail model forces the heterogeneous scheduler to
    execute it on the CPU. This causes expensive context switching and memory bandwidth thrashing across
    the shared LPDDR5X bus. The fix is to quantize the guardrail model to INT8 and ensure all its operators
    are supported by the Hexagon NPU architecture, allowing both the LLM and the Responsible AI guardrails
    to run seamlessly on the neural processor.
  common_mistake: Candidates often assume the 12-16 GB shared LPDDR5X memory is exhausted by running two
    models concurrently or blame the sequence length of the LLM. They fail to consider hardware-software
    co-design, specifically that standard safety classifiers are often exported in FP32 and lack the INT8
    quantization required for optimal NPU deployment.
  napkin_math: A 100M-parameter FP32 guardrail requires 400MB of memory. Processing a 500-token sequence
    on the CPU requires roughly 50 GFLOPs, taking ~200ms and spiking power consumption. By quantizing
    to INT8, the model shrinks to 100MB. The Snapdragon 8 Gen 3 Hexagon NPU provides 45 TOPS INT8. Even
    achieving just 10% hardware utilization (4.5 TOPS), the 50 GOPs workload completes in ~11ms. Offloading
    the guardrail to the NPU eliminates the ~200ms CPU stall, preventing UI stutter while satisfying the
    real-time toxicity check requirement.
