id: mobile-0114
title: The Pocket Furnace
topic: power-budgeting
status: published
provenance: imported
scenario: 'Your company ships an on-device LLM assistant (3B parameters, INT4, 1.7 GB) on the Samsung
  Galaxy S24 Ultra (Snapdragon 8 Gen 3). Users love it, but support tickets spike: ''My phone gets really
  hot when I use the AI chat.'' One user reports their phone shut down with a thermal warning during a
  10-minute conversation. The Snapdragon 8 Gen 3 has a 12.4W TDP. What''s happening and how do you fix
  it without degrading the chat experience?'
details:
  realistic_solution: '3B INT4 draws ~8W, exceeding the 5W sustained thermal budget by 3W. After 10 min:
    thermal shutdown. Fix: speculative decoding — tiny draft model (100M params, 0.5W) predicts 4 tokens,
    large model verifies in one batch. Power drops from 8W to ~4.5W (under budget). Speed: 12 tok/s (still
    above reading speed ~5 tok/s). Conversation length: indefinite (vs ~3 min at full power). Battery:
    3.9% per 10-min chat (vs 6.9%).'
  common_mistake: '"Throttle the model to reduce power." Naive throttling (e.g., adding sleep between
    tokens) makes the chat painfully slow. Users will abandon the feature.'
  napkin_math: 'Snapdragon 8 Gen 3 sustained thermal budget: ~5W. 3B INT4 decode power: ~8W. Thermal overshoot:
    3W × 600s (10 min) = 1800 J excess heat. Phone battery: 5000 mAh × 3.85V = 19.25 Wh. 10 min at 8W
    = 1.33 Wh = 6.9% battery for one conversation. With speculative decoding at 4.5W: 0.75 Wh = 3.9% battery.
    Sustainable conversation length before thermal limit: at 8W → ~3 min. At 4.5W → indefinite (under
    5W budget). User perception: 12 tok/s is still faster than reading speed (~4 words/sec ≈ 5 tok/s).
    No perceived slowdown.'
