schema_version: 1
id: mobile-0582
title: The Noisy Environment Speech Failure
topic: transformer-systems-cost
status: published
provenance: imported
scenario: Your on-device speech recognition model (Conformer-Transducer, 30M params, INT8) on a Google
  Pixel 8 Pro (Tensor G3) achieves 5% WER in quiet environments. In a noisy coffee shop (~70 dB ambient),
  WER degrades to 35% — unusable. The cloud version of the same model handles noise fine because it uses
  a 200M parameter noise-robust encoder. You can't fit 200M params on-device. How do you fix noise robustness
  within a 50 MB model budget?
details:
  realistic_solution: 'A multi-stage approach within the 50 MB budget: Quiet WER: 5%. Noisy WER (baseline):
    35%. After noise suppressor: 35% × 0.5 = ~18%. After multi-condition training: 18% × 0.65 = ~12%.
    After beamforming (+8 dB SNR): 12% × 0.7 = ~8%. Combined: **8% WE'
  common_mistake: '"Add a noise suppression preprocessing step before the speech model." A generic noise
    suppressor (e.g., RNNoise) helps but introduces its own artifacts — it removes noise but also distorts
    speech harmonics, which can increase WER for certain noise types (babble noise, music).'
  napkin_math: 'Quiet WER: 5%. Noisy WER (baseline): 35%. After noise suppressor: 35% × 0.5 = ~18%. After
    multi-condition training: 18% × 0.65 = ~12%. After beamforming (+8 dB SNR): 12% × 0.7 = ~8%. Combined:
    **8% WER** in 70 dB noise (vs 35% baseline). Model size: 35 MB. Latency: 6ms per frame (RTF = 0.075).
    Power: ~1.5W (TPU) for both models. Battery for 1-hour call: 1.5W × 1h = 1.5 Wh / 17.7 Wh = **8.5%
    battery**. Acceptable.'
