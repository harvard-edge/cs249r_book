schema_version: 1
id: mobile-0584
title: The Notification Model Backlash
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: Your news app uses an on-device ML model (small transformer, 10M params, INT8) on a Snapdragon
  8 Elite to predict which articles a user will click, and sends push notifications for high-confidence
  predictions. The model has 78% precision — seemingly good. But after launch, the app's rating drops
  from 4.5 to 2.1 stars, with reviews saying 'too many irrelevant notifications.' The model is working
  as designed. What went wrong?
details:
  realistic_solution: 'Base rate neglect: 500 articles/day, 2% click rate = 10 relevant. At 78% precision/80%
    recall: ~10.3 notifications, ~2.3 irrelevant. Asymmetric cost: each bad notification = 100 annoyance,
    each good = 5 utility. Net: -186/day. Fix: (1) rate-limit to 3/day. (2) Raise threshold to >95% precision
    (break-even point). (3) Add user feedback to personalize thresholds. The model needs >95% precision
    for notifications — standard 78% works for feeds, not push alerts.'
  common_mistake: '"78% precision means 78% of notifications are relevant — that''s good enough." This
    ignores the base rate problem and the asymmetric cost of false positives in notifications.'
  napkin_math: '500 articles/day, 2% click rate = 10 relevant. Model at 78% precision, 80% recall: flags
    8 articles correctly, ~2.26 incorrectly → ~10.3 notifications. User annoyance: 2.26 × 100 = 226 annoyance
    units. User value: 8 × 5 = 40 utility units. Net: **-186** (negative value). At 95% precision, 40%
    recall: flags 4 correctly, ~0.21 incorrectly → ~4.2 notifications. Annoyance: 0.21 × 100 = 21. Value:
    4 × 5 = 20. Net: **-1** (roughly break-even). With rate limit of 3/day: annoyance capped at 0.6 ×
    100 = 60 max. The model''s precision must be **>95%** for notifications to have positive expected
    value.'
