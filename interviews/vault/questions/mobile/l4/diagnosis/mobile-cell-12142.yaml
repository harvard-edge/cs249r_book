schema_version: 1
id: mobile-cell-12142
title: 'Network Bandwidth Bottlenecks: Diagnose LPDDR5X Bandwidth Saturation on Snapdragon'
topic: network-bandwidth-bottlenecks
status: published
provenance: imported
scenario: 'A Snapdragon 8 Gen 3 device (16GB LPDDR5X, 77 GB/s) shows all ML tasks running at 60% of expected
  throughput simultaneously: LLM TPOT 32ms vs. 19.5ms expected, camera inference 16ms vs. 10ms expected.
  Memory profiler shows 73GB/s bus utilization. Diagnose the root cause and identify which task to prioritize.'
details:
  realistic_solution: '73GB/s / 77GB/s = 94.8% LPDDR5X utilization. At >90% utilization, queuing delays
    cause non-linear latency increase (M/M/1 queue: latency = service_time / (1-ρ). At ρ=0.95: 20× mean
    service time inflated). LLM: 1.5/77=19.5ms expected. Observed 32ms: ρ=19.5/32=0.61 effective. But
    with queuing: 19.5/(1-0.95)=390ms? Observed 32ms suggests moderate saturation. Fix: reduce camera
    inference from 10ms (15GB/s) to every other frame (7.5GB/s avg). Bus: 73-7.5=65.5GB/s = 85% utilization
    → latency normalizes. LLM TPOT: ~22ms, camera: ~10ms on active frames.'
  common_mistake: Trying to optimize each model independently when the root cause is shared bandwidth
    saturation; you cannot speed up individual models without reducing another task's bandwidth.
  napkin_math: '73GB/s / 77GB/s = ρ=0.948. M/G/1 latency inflation: 1/(1-ρ)=19.2× or Pollaczek–Khinchine:
    moderate. LLM expected 19.5ms, actual 32ms: 1.64× inflation. 1/(1-ρ)=1.64 → ρ=0.39 equivalent? Suggests
    other models also inflate. Fix: drop camera to 15fps: 15/2=7.5GB/s → total 73-7.5=65.5GB/s, ρ=0.85.
    LLM inflation: 1/(1-0.85)=6.7×? Still bad. Better: total 60GB/s → ρ=0.78, inflation=4.5×. LLM: 19.5×1.78=34.7ms.
    Need ρ<0.7: 0.7×77=54GB/s total. Cut 19GB/s: reduce camera to 5fps or suspend.'
