id: mobile-0823
title: Mobile New 0024
topic: federated-learning
status: published
provenance: imported
scenario: A drone's vision system consumes 1.5W before the NPU even starts inferencing. Profiling shows
  the image pipeline routing 4K 60FPS camera frames to the main CPU, resizing them, and then copying them
  to NPU memory.
details:
  realistic_solution: The symptom of high baseline power draw is caused by inefficient data routing and
    CPU-based image preprocessing. Routing 4K video through the CPU and main DRAM bus requires immense
    bandwidth and CPU cycles. The camera's Image Signal Processor (ISP) should be configured to directly
    write resized, cropped RGB frames into the NPU's SRAM/Memory via hardware DMA, bypassing the CPU entirely.
  common_mistake: Treating the ML model execution as the only power consumer and ignoring the data pipeline
    overhead.
  napkin_math: '4K 60FPS: 3840*2160*3 bytes * 60 = 1.5 GB/s. CPU read + CPU write + NPU read = 4.5 GB/s
    bandwidth. LPDDR energy: 800 pJ/byte. 4.5 GB/s * 800 pJ/byte = 3.6W peak theoretical memory power,
    accounting for the baseline 1.5W drain.'
