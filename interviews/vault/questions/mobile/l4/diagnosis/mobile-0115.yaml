schema_version: 1
id: mobile-0115
title: The Background ML Battery Vampire
topic: power-budgeting
status: published
provenance: imported
scenario: 'Your health app runs an on-device activity recognition model in the background to count steps
  and detect falls. Users on Pixel 7 (Tensor G2) complain of 15% daily battery drain from your app alone
  — Android''s battery settings page shows your app as the #1 consumer. The model itself is tiny (2 MB,
  0.3 ms inference). How can a 0.3 ms model drain 15% of a 4355 mAh battery?'
details:
  realistic_solution: 'Each SoC wake costs 5.25 mJ. At 50 Hz: 262.5 mW = 37.5% battery/day. Fix: batch
    with hardware FIFO. At 0.2 Hz (250 samples, infer every 5s): 1.05 mW = 0.15%/day — 250x reduction.
    Better: offload to always-on DSP at 1.5 mW = 0.21%/day with zero main SoC wakes. User latency: 5s
    delay in step counting (acceptable). The 0.3ms model is already optimal; the scheduling is where all
    waste lives.'
  common_mistake: '"The model is too large — compress it further." The model is already 2 MB with 0.3
    ms inference. The problem isn''t the model — it''s the *scheduling*.'
  napkin_math: 'Per-wake energy: 5.25 mJ. At 50 Hz: 262.5 mW = 37.5% battery/day (theoretical max). At
    0.2 Hz (batched): 1.05 mW = 0.15% battery/day. On always-on DSP: 1.5 mW = 0.21% battery/day. Target:
    <1% battery/day for background features. Batched inference achieves this with 250× energy reduction.
    User-visible latency: 5-second delay in step counting (acceptable — Apple Health uses 5-10 second
    batching).'
