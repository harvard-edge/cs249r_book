schema_version: 1
id: mobile-0706
title: The Quantization Fragmentation Trap
topic: quantization-fundamentals
status: published
provenance: imported
scenario: Your team ships a TFLite INT8 food recognition model. QA passes on Pixel 8 (Tensor G3) and Samsung
  Galaxy S24 (Snapdragon 8 Gen 3). A user on a Samsung Galaxy A54 (Exynos 1380) reports the model identifies
  a banana as 'hot dog' with 94% confidence. You test the same image on Pixel 8 — correctly identifies
  'banana' at 97%. The model binary is byte-for-byte identical. How can the same INT8 model produce different
  results on different SoCs?
details:
  realistic_solution: 'INT8 execution differs across SoCs in three ways: (1) Accumulator overflow — 512-channel
    convolutions can exceed INT16 range on SoCs using 16-bit accumulators (Exynos), while others use INT32.
    (2) Rounding modes differ (round-to-nearest-even vs truncation). (3) Operator fusion boundaries change
    quantization error propagation. Over 30 layers, ±1 LSB per-layer drift compounds to ±45 LSB, enough
    to flip banana vs hot dog when logits are close (gap of only 15 LSB). Fix: use per-channel quantization
    (reduces per-channel range by 4x, eliminating overflow) and validate on target SoC families before
    shipping.'
  common_mistake: '"INT8 is INT8 — the math is deterministic." INT8 inference is NOT bitwise identical
    across hardware. The quantization *parameters* are fixed, but the *execution* varies.'
  napkin_math: 'INT8 range: [-128, 127]. Accumulator overflow threshold (INT16): 32,767. 512-channel conv
    with average activation of 40: 512 * 40 = 20,480 (safe in INT16). With max activation of 80: 512 *
    80 = 40,960 (overflows INT16 at 32,767). INT32 accumulator: handles up to 2.1B, never overflows for
    practical conv layers. On Snapdragon Hexagon DSP: INT16 accumulator for 8-bit ops runs at 26 TOPS.
    INT32 accumulator: 13 TOPS (50% throughput). On Apple ANE: always uses INT32 accumulator, no overflow
    risk but lower peak throughput. Latency impact of INT32 fallback: MobileNetV2 inference goes from
    4 ms to 6.2 ms (+55%) on Hexagon.'
