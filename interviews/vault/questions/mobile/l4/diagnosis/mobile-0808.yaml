id: mobile-0808
title: Mobile New 0008
topic: roofline-analysis
status: published
provenance: imported
scenario: A 10MB model on a mobile NPU consumes an unexpected 2W of power. Profiling shows compute blocks
  are efficient, but the DRAM interface is completely saturated, reading the same 10MB weights repeatedly
  for every frame.
details:
  realistic_solution: The symptom is severe power draw and DRAM saturation on a small model. The root
    cause is the failure to pin the model weights into the NPU's dedicated SRAM. Because the NPU treats
    the weights as volatile per inference, it streams the entire 10MB from off-chip LPDDR memory for every
    frame. LPDDR access consumes massive amounts of dynamic energy compared to on-chip SRAM.
  common_mistake: Ignoring weight-pinning pragmas in compiler deployment resulting in redundant DRAM fetching.
  napkin_math: 'Model: 10MB. 60 FPS. BW = 600MB/s. LPDDR energy cost: ~100 pJ/bit = 800 pJ/byte. SRAM
    energy: ~5 pJ/bit. Energy diff: 750 pJ/byte * 600 MB/s = 0.45 Joules/sec = 0.45W wasted just on redundant
    memory traffic.'
