id: mobile-0580
title: The ANE Delegation Regression
topic: roofline-analysis
status: published
provenance: imported
scenario: You ship a CoreML object detection model on iPhone. Xcode benchmarks show 3ms on the A17 Pro
  Neural Engine. After an iOS update, users report the same model now takes 30ms — a 10× regression. You
  haven't changed the model or the app. Instruments shows the ANE utilization is 0% and CPU utilization
  spikes to 100% during inference. What happened?
details:
  realistic_solution: 'CoreML''s delegation to the ANE is not guaranteed — it''s a best-effort optimization
    that can silently fall back to CPU. Several iOS-update scenarios cause this:'
  common_mistake: '"Apple broke the Neural Engine driver in the iOS update — file a radar and wait." While
    driver regressions happen, the most common cause is a silent delegation failure that you can diagnose
    and fix.'
  napkin_math: 'ANE path: 3ms (full delegation, 100% ANE utilization). CPU fallback: model has 80 layers.
    On A17 Pro CPU (peak single-core ~3.8 GHz): 80 layers × 0.35ms/layer = 28ms. Add CoreML CPU dispatch
    overhead: ~2ms. Total: **30ms**. The 10× regression is exactly the ANE-to-CPU fallback ratio for a
    model optimized for the ANE''s fixed-function pipeline. One unsupported op in the critical path forces
    the entire graph to CPU because CoreML''s graph partitioner decides the transfer overhead of partial
    delegation exceeds the benefit.'
