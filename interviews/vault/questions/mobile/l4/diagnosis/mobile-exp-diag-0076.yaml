schema_version: 1
id: mobile-exp-diag-0076
title: Diagnosing High Latency in On-Device Gemini Nano Sanitization
topic: adversarial-robustness
status: published
provenance: imported
scenario: You are deploying Gemini Nano on the Google Tensor G3 to power a new on-device messaging assistant.
  To defend against prompt injection, user inputs are routed through a smaller, dedicated 'sanitizer'
  model before hitting the main LLM. However, telemetry shows that total response latency has spiked to
  over 1.5 seconds, even for short messages. The main Gemini Nano model is running optimally on the TPU,
  but the system is bottlenecking. Analyze the interaction between the models and the hardware to identify
  the root cause of the latency.
details:
  realistic_solution: The root cause is likely memory bandwidth contention and CPU overhead. While the
    Tensor G3 has a capable TPU (7.5 TOPS), running a sequential pipeline means context switching and
    moving activations between memory and the TPU. If the sanitizer model is running on the CPU or DSP
    while Gemini Nano is swapped into the TPU, or if both are competing for the 12 GB LPDDR5X bandwidth,
    the overhead of loading weights and activations sequentially dominates the actual inference time.
  common_mistake: Candidates often assume the TPU is simply too slow for two models, or that the prompt
    injection attacks themselves are causing increased computation. They might suggest compressing the
    main model further without investigating where the time is actually being spent during the sequential
    execution.
  napkin_math: Assume the sanitizer model is 100M parameters (100MB in INT8) and Gemini Nano is 1.8B parameters
    (1.8GB in INT8). The Tensor G3 LPDDR5X has roughly 50 GB/s bandwidth. Loading the main model takes
    1.8GB / 50 GB/s = 36ms in a perfect scenario. However, if the OS evicts the TPU memory to run the
    sanitizer, swapping models sequentially adds (100MB + 1.8GB) / 50 GB/s × 2 (read/write) = ~76ms pure
    overhead per turn, completely independent of the actual compute (7.5 TOPS), which for a 100-token
    prompt might only take 50ms. The context switch is the bottleneck.
