schema_version: 1
id: mobile-0682
title: The Memory-Mapped Page Fault
topic: memory-hierarchy-design
status: published
provenance: imported
scenario: You are using TensorFlow Lite with memory mapping (`mmap`) to load a 100 MB model on an Android
  device. The documentation says `mmap` is great because it has 'zero load time' and 'zero memory overhead.'
  But during the very first inference, the UI thread completely freezes for 800ms. Subsequent inferences
  take only 30ms. Why did `mmap` cause a UI freeze?
details:
  realistic_solution: You experienced a massive storm of **Major Page Faults**. `mmap` does not load the
    file into RAM; it simply reserves a range of virtual memory addresses and maps them to the file on
    the physical NAND flash storage.
  common_mistake: '"TFLite needs to initialize its tensors on the first run." Tensor allocation takes
    a few milliseconds, not 800ms.'
  napkin_math: 100 MB model / 4 KB page size = 25,000 pages. A random read from mobile UFS storage takes
    ~0.03ms. 25,000 faults * 0.03ms = 750ms of pure storage I/O block time during the first forward pass.
