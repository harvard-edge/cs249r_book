id: mobile-0746
title: The Frankenstein Model
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: During a background model update on a user's phone, the device suddenly reboots. Upon next launch,
  the app doesn't crash, but the ML model produces nonsensical 'garbage' outputs. Based on the file-write
  diagram, what state is the model file in?
details:
  realistic_solution: 'You have a **Frankenstein Model** caused by non-atomic updates. The pipeline wrote
    the updated model directly to the active file. If interrupted, the file contains a mix of new and
    old layers, which is numerically invalid. The fix is **Atomic Promotion (Shadow Copy)**: download/train
    the model in a temporary directory, and only after validation is complete, use an atomic `rename()`
    call to replace the active model file.'
  common_mistake: '"Check battery level before training." Battery checks don''t prevent interruptions
    like OS kills or reboots.'
  napkin_math: If 60% of layers are v2.0 and 40% are v1.0, the feature map distribution from Layer 2 will
    not match the weights expected by Layer 3, leading to catastrophic error propagation.
