schema_version: 1
id: mobile-exp2-diag-0343
title: Diagnosing Model Collapse on Tensor G3
topic: data-efficiency-selection
status: published
provenance: imported
scenario: You are maintaining an on-device LLM (Gemini Nano) for a personalized writing assistant on the
  Google Tensor G3. The model runs locally on the on-device TPU and relies on continuous federated learning,
  where rare user-generated text is mixed with synthetic data for data pruning. After several weeks of
  deployment, users report that the model's vocabulary is becoming highly repetitive and it struggles
  with edge-case requests. Based on this data pipeline and the hardware constraints of the Tensor G3,
  diagnose the root cause of this degradation.
details:
  realistic_solution: The root cause is model collapse driven by recursive training on synthetic data.
    Because the Tensor G3's TPU allows for efficient local execution of the LLM, the system easily generates
    a high volume of synthetic text for data augmentation. When the data pruning algorithm prioritizes
    this synthetic data over diverse but sparse user inputs to fit within the limited local memory buffer,
    the model overfits to its own generated distribution and systematically loses the tails of the original
    data distribution.
  common_mistake: Candidates often misdiagnose this as catastrophic forgetting due to the limited 12 GB
    LPDDR5X memory or mistakenly blame the 7.5 TOPS TPU constraint for not completing on-device training
    epochs.
  napkin_math: Assume the model uses 4 GB of the 12 GB LPDDR5X, leaving a 1 GB continuous learning buffer.
    If a sample is 2 KB, the buffer holds ~500,000 samples. If the on-device TPU (7.5 TOPS) generates
    50 tokens/sec in the background for just 1 hour daily, it produces 180,000 synthetic tokens (roughly
    90,000 new samples). If the pruning algorithm retains this, 18% of the daily buffer becomes purely
    synthetic. Over 14 days of cumulative updates, the synthetic data concentration easily exceeds the
    20-30% threshold known to trigger model collapse.
