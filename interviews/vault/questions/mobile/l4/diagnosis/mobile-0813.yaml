schema_version: 1
id: mobile-0813
title: Mobile New 0013
topic: latency-decomposition
status: published
provenance: imported
scenario: Switching from symmetric to asymmetric INT8 quantization on a mobile CPU recovers accuracy,
  but profiling shows a 25% increase in total latency and higher instruction counts per convolution loop.
details:
  realistic_solution: The symptom of increased latency and instruction count stems from the mathematical
    overhead of asymmetric quantization. Symmetric quantization has a zero-point of 0, simplifying the
    dot product. Asymmetric introduces a non-zero zero-point, and the full expansion is sum(W×X) − Z_x×sum(W)
    − Z_w×sum(X) + N×Z_w×Z_x. Importantly, Z_x×sum(W) and N×Z_w×Z_x are constant per channel or tensor
    and can be precomputed offline and folded into the bias, adding zero runtime cost. The only runtime
    overhead is Z_w×sum(X), which requires one additional accumulation per input row (not per MAC). If
    a 25% latency increase is observed, it is likely caused by a non-optimized fallback path (e.g., lack
    of SIMD support for zero-point arithmetic on this CPU) rather than the theoretical asymptotic cost.
  common_mistake: Assuming asymmetric quantization only affects the offline calibration phase without
    penalizing runtime compute.
  napkin_math: 'Symmetric MAC: sum(W × X). Asymmetric MAC expands to: sum(W×X) - Z_x×sum(W) - Z_w×sum(X)
    + N×Z_w×Z_x. The terms Z_x×sum(W) and N×Z_w×Z_x are constants precomputed offline into the bias. Only
    Z_w×sum(X) requires runtime computation: 1 accumulate per input row (not per MAC). For a 3×3 kernel
    over 32 channels, this adds 32 additions per output position vs 288 MACs — roughly 11% overhead, not
    3 extra ops per MAC.'
