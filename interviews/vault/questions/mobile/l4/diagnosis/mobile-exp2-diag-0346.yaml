schema_version: 1
id: mobile-exp2-diag-0346
title: On-Device Active Learning OOM Crashes
topic: dataset-curation
status: published
provenance: imported
scenario: You deployed an on-device active learning system to curate challenging edge-case images for
  a vision task. A 50MB CoreML data selection model runs on the Apple A17 Pro Neural Engine (16-core,
  35 TOPS) to score incoming camera frames. Despite the model being small and the A17 Pro having 8GB of
  unified memory, users are reporting severe app crashes due to Out-Of-Memory (OOM) errors during the
  data selection phase. What is the root cause of these crashes?
details:
  realistic_solution: The root cause is the buffering of uncompressed high-resolution camera frames before
    they are processed by the Neural Engine. Because the A17 Pro uses a unified 8GB memory shared between
    the CPU, GPU, and NE, holding just a few seconds of raw 4K video frames in memory for the selection
    algorithm will exhaust the available RAM. The solution is to downsample frames immediately at the
    ISP level or process them strictly sequentially without maintaining a large historical buffer.
  common_mistake: Candidates often blame the model size, quantization, or the Neural Engine's compute
    capacity (e.g., assuming the 35 TOPS is insufficient). They fail to account for the shared unified
    memory architecture and the memory footprint of the raw data ingestion pipeline.
  napkin_math: An uncompressed 4K frame (3840 x 2160 pixels, RGB) takes 3840 * 2160 * 3 bytes ≈ 25 MB.
    If the active learning algorithm buffers 3 seconds of video at 60 FPS to evaluate temporal context,
    the buffer requires 180 frames * 25 MB/frame = 4.5 GB of memory. Since the iOS system and base app
    footprint likely consume 3-4 GB of the 8GB unified memory, adding a 4.5 GB data buffer exceeds the
    physical memory limit, causing an immediate OOM crash.
