id: mobile-0673
title: The Silent Eviction
topic: memory-hierarchy-design
status: published
provenance: imported
scenario: Your iOS app loads a 400 MB CoreML model into memory. Users report that switching to another
  app and back causes a 3-second freeze. Instruments shows no crash. What is happening, and how do you
  fix it?
details:
  realistic_solution: iOS memory pressure eviction. iPhones have no swap space. When the user switches
    to a memory-hungry app (a game, Safari with many tabs), the OS reclaims memory from backgrounded apps
    by evicting their mapped pages. Your 400 MB model was memory-mapped (`mmap`) — the pages were clean,
    so iOS silently discards them without killing the process. When the user returns, every model page
    triggers a page fault and must be re-read from flash storage (NVMe). 400 MB at ~1.5 GB/s sequential
    flash read ≈ 270ms, but random page faults are far slower — you see 2–3 seconds of stalls as the working
    set faults back in during the first inference.
  common_mistake: '"The model file is being re-read from disk every time." Close, but misses the *why*.'
  napkin_math: 'iPhone 15 Pro: 8 GB RAM total. iOS + springboard + background apps: ~4 GB. Your app gets
    ~2–3 GB. A 400 MB model is 15–20% of your app''s budget. Flash random read (4K pages): ~50 µs/page.
    400 MB / 4 KB = 100K pages × 50 µs = 5 seconds worst case (sequential prefetch helps, but first inference
    still stalls).'
