title: The CoreML Custom Op Conversion Failure
topic: graph-compilation
status: published
provenance: imported
scenario: 'You train a PyTorch model with a custom `RotaryPositionEmbedding` (RoPE) layer for an on-device
  LLM. When converting to CoreML with `coremltools`, the conversion fails with `RuntimeError: PyTorch
  convert function for op ''custom::rope'' not found`. Your colleague says ''just rewrite the model without
  RoPE.'' Why is that a bad idea, and what are the three correct approaches to handle unsupported ops
  in CoreML conversion?'
details:
  realistic_solution: 'Three approaches, ordered by preference: Approach 1 (decomposed): RoPE as 6 native
    ops per layer. ANE overhead: ~0.05ms per layer × 32 layers = **1.6ms** total. Full ANE delegation
    maintained. Approach 2 (custom converter): same runtime as a'
  common_mistake: '"Replace RoPE with standard sinusoidal position embeddings — they''re equivalent."
    They are not equivalent. RoPE applies rotation to query and key vectors at each attention layer, enabling
    relative position encoding that generalizes to unseen sequence lengths. Sinusoidal embeddings are
    absolute and added once at the input. Removing RoPE degrades long-context performance by 5-15% perplexity
    and breaks length extrapolation entirely.'
  napkin_math: 'Approach 1 (decomposed): RoPE as 6 native ops per layer. ANE overhead: ~0.05ms per layer
    × 32 layers = **1.6ms** total. Full ANE delegation maintained. Approach 2 (custom converter): same
    runtime as approach 1 (converter runs at build time). Approach 3 (MLCustomLayer): GPU dispatch per
    layer: 1ms × 64 calls = **64ms**. Plus ANE→GPU→ANE transfers: 64 × 0.5ms = **32ms**. Total RoPE overhead:
    **96ms** — more than the rest of the model combined. Approach 1 is 60× faster than approach 3.'
