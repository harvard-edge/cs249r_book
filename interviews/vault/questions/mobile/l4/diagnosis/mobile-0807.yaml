id: mobile-0807
title: Mobile New 0006
topic: roofline-analysis
status: published
provenance: imported
scenario: Running a 200KB INT8 model on a Cortex-M4 with 256KB SRAM. Inference normally takes 50ms, but
  suddenly spikes to 500ms on a specific high-resolution input. Flash memory read counters show massive
  spikes.
details:
  realistic_solution: The 10x latency spike and flash read surge are symptoms of activation spilling.
    The 200KB model leaves only 56KB of SRAM for the OS, stack, and intermediate activations. The higher
    resolution input produces a larger intermediate tensor that overflows the remaining SRAM. The system
    is forced to swap activations to external flash memory, which is orders of magnitude slower than SRAM.
  common_mistake: Sizing microcontrollers based only on model weight size without accounting for peak
    activation footprint.
  napkin_math: 'SRAM: 256KB. Weights: 200KB. OS: 16KB. Available: 40KB. New activation: 64KB. Spill: 24KB.
    SRAM latency: 1 cycle. Flash latency: 15 cycles. 24KB fetched repeatedly from flash per loop causes
    15x slowdown on that layer.'
