schema_version: 1
id: mobile-0791
title: The Background Batching Bottleneck
topic: memory-mapped-inference
status: published
provenance: imported
scenario: Your mobile OS runs a 3B LLM (INT4 quantized). A foreground chat runs at 20 tok/s (batch size
  1). When the OS schedules a background notification summarizer to run concurrently (batch size 2), the
  total system throughput plummets to 12 tok/s (6 tok/s per task), rather than achieving higher total
  throughput.
details:
  realistic_solution: The system hits a severe memory bandwidth wall. At batch size 1, the LLM streams
    the 1.5GB of quantized weights from LPDDR5 perfectly linearly. At batch size 2, the continuous batching
    engine must fetch the KV cache for two completely disparate sequences simultaneously. This disrupts
    the contiguous memory access patterns. The mobile memory controller experiences high page miss rates
    in the DRAM banks, causing the effective memory bandwidth utilization to drop precipitously. Total
    throughput decreases because the memory bus is stalling.
  common_mistake: Assuming the NPU ran out of compute ALUs, when in reality decode is almost entirely
    memory-bound, not compute-bound.
  napkin_math: "INT4 3B model = 1.5GB weights. At 20 tok/s, weight bandwidth = 1.5GB * 20 = 30 GB/s (near\
    \ the ~34 GB/s max of LPDDR5). \nAt BS=2, we need to read 1.5GB of weights + 2 separate KV caches.\
    \ If the scattered reads drop effective bandwidth to 18 GB/s due to DRAM page misses, the max decode\
    \ speed becomes 18 GB/s / 1.5 GB = 12 tok/s total. Divided by 2 tasks, each task gets exactly 6 tok/s."
