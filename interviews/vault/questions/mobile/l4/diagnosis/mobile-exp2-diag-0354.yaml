schema_version: 1
id: mobile-exp2-diag-0354
title: Diagnosing Page Thrashing on Apple A17 Pro
topic: memory-mapped-inference
status: published
provenance: imported
scenario: You have deployed a 3 GB int8 language model on an iPhone 15 Pro utilizing the Apple A17 Pro
  Neural Engine. To optimize memory, you load the weights using memory mapping (mmap) rather than loading
  them directly into RAM. Telemetry shows that inference latency is normally around 200ms, but when users
  switch to the camera app and then back to your app, inference latency spikes to over 2.5 seconds, accompanied
  by severe UI stuttering. Given the device features a shared 8 GB unified memory architecture across
  the CPU, GPU, and 16-core Neural Engine, diagnose the root cause of this latency spike.
details:
  realistic_solution: The root cause is OS-level page thrashing. The A17 Pro uses 8 GB of shared unified
    memory. When a memory-intensive app like the camera opens (which requires large GPU buffers for image
    processing), the iOS memory manager aggressively reclaims inactive memory, evicting the model's mmap
    page cache. When the user switches back to the ML app, the Neural Engine attempts to access the weights,
    resulting in massive hard page faults. The CPU must block to re-read the 3 GB of weights from the
    NVMe storage back into the unified memory before the Neural Engine can resume compute, causing the
    massive latency spike.
  common_mistake: Candidates often assume that mmap completely bypasses RAM or they blame the compute
    limits of the Neural Engine, forgetting that 35 TOPS is more than sufficient for a 200ms baseline.
    They frequently miss the interaction between the OS page cache, the unified memory architecture, and
    competing high-memory foreground apps.
  napkin_math: 'Total Unified Memory = 8 GB. Baseline iOS + System Services = ~2.5 GB. Camera App (4K
    buffers) = ~3 GB. Remaining Memory = 8 - 2.5 - 3 = 2.5 GB. Since the model is 3 GB, the OS is forced
    to evict at least 0.5 GB to 3 GB of the mapped pages. Assuming 3 GB of pages are evicted and the iPhone
    NVMe read speed is ~1.5 GB/s. Re-loading the weights via page faults takes: 3 GB / 1.5 GB/s = 2.0
    seconds of blocking I/O. Add the baseline compute time (200ms) plus OS context switching overhead,
    and we arrive exactly at the >2.5 second latency spike observed.'
