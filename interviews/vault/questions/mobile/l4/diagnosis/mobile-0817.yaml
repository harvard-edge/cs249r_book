id: mobile-0817
title: Mobile New 0017
topic: federated-learning
status: published
provenance: imported
scenario: You deploy a tiny 2MB keyword spotting model to an IoT device. However, the final compiled binary
  executable is 115MB, completely blowing past the device's 32MB storage limit.
details:
  realistic_solution: The symptom of an enormously bloated binary despite a tiny model is caused by static
    linking of the entire ML framework (e.g., TensorFlow/PyTorch) and all its dependencies. The compiler
    pulled in operator kernels for every possible mathematical function, image processing library, and
    RPC framework, instead of using a selective build that only links the ops required by the specific
    model.
  common_mistake: Using default pre-compiled framework binaries instead of compiling custom minimal runtimes
    for edge devices.
  napkin_math: Model size = 2MB. TF Lite full shared library = ~5MB. Full PyTorch static lib = ~110MB.
    110MB + 2MB = 112MB. Selective build drops unused ops, reducing runtime lib to ~800KB. 2MB + 800KB
    = 2.8MB, easily fitting the 32MB flash.
