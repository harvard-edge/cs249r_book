schema_version: 1
id: mobile-exp-diag-0084
title: Neural Engine OOM During Model Degradation
topic: graceful-degradation
status: published
provenance: imported
scenario: Your camera application runs a real-time semantic segmentation model on the Apple A17 Pro Neural
  Engine. During thermal throttling, the system is designed to gracefully degrade by shedding the heavy
  model and falling back to a lightweight version. However, crash reports show that immediately after
  triggering this degradation ladder, the application frequently crashes due to an Out of Memory (OOM)
  error before the lightweight model can fully initialize, despite the fallback model being much smaller.
details:
  realistic_solution: The root cause is a race condition in unified memory allocation. Because the A17
    Pro uses a shared 8 GB unified memory pool across the CPU, GPU, and 16-core Neural Engine, loading
    the lightweight fallback model before the heavy model is completely flushed causes a temporary usage
    spike. The fix is to implement a strict state machine that completely unloads the primary model and
    confirms memory release before initializing the fallback, or to pre-allocate a fixed tensor buffer
    that both models reuse.
  common_mistake: Candidates often assume the OOM is caused by a standard memory leak or suggest reducing
    the lightweight model's size further. They frequently miss the implications of the A17 Pro's shared
    memory architecture and the asynchronous lifecycle of hardware-accelerated model deallocation.
  napkin_math: The A17 Pro has 8 GB of shared unified memory. If the OS, camera pipeline, and UI consume
    5.5 GB, only 2.5 GB remains. If the heavy model requires 1.8 GB and the fallback requires 0.9 GB,
    the naive degradation approach temporarily demands 1.8 GB + 0.9 GB = 2.7 GB. This exceeds the 2.5
    GB available threshold, triggering an immediate OS OOM kill before the 1.8 GB can be reclaimed.
