id: mobile-0827
title: Mobile New 0028
topic: real-time-deadlines
status: published
provenance: imported
scenario: A passively cooled AR headset runs perfectly in a 10-minute test. In a 1-hour test, the frame
  rate steadily drops from 60 FPS to 15 FPS. Profiling shows frequency steps dropping continuously.
details:
  realistic_solution: The symptom of gradual, continuous performance degradation is caused by thermal
    saturation (heat soaking). In passive cooling, there are no fans to expel heat; the device relies
    entirely on the thermal capacitance of its chassis. Once the chassis absorbs its maximum heat capacity,
    it can only dissipate heat via convection. The OS continually drops frequency to match the low convection
    rate.
  common_mistake: Validating continuous performance benchmarks using short 5-minute runs on passively
    cooled devices.
  napkin_math: Heat capacity Q = m * c * dT. Chassis mass = 100g. c = 0.9 J/gK. dT = 20K. Q = 1800 Joules.
    At 3W power, time to saturate = 1800J / 3W = 600s = 10 minutes. After 10 mins, it relies purely on
    convection (e.g., 0.75W max dissipation), dropping FPS by 4x.
