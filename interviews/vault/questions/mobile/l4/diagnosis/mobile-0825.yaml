schema_version: 1
id: mobile-0825
title: Mobile New 0026
topic: latency-decomposition
status: published
provenance: imported
scenario: An Orin system continuously runs a tracking pipeline. After exactly 4 minutes, the end-to-end
  latency abruptly jumps from 15ms to 30ms. The ambient temperature is 25C, but the device enclosure is
  warm.
details:
  realistic_solution: The symptom of a sudden, discrete doubling of latency indicates thermal throttling
    via Dynamic Voltage and Frequency Scaling (DVFS). Continuous full-utilization generates significant
    heat. Once the silicon die hits its maximum junction temperature (Tjmax), the hardware thermal controller
    aggressively halves the clock frequency to drop dynamic power and prevent physical silicon damage.
  common_mistake: Assuming low ambient room temperature guarantees peak sustained performance without
    active cooling.
  napkin_math: 'Power = C * V^2 * f. If f halves, V can drop by ~1.2x. Power reduction = 1.2^2 * 2 = 2.88x.
    Latency is inversely proportional to f: Latency = compute_cycles / f. When f drops from 1GHz to 500MHz,
    latency goes from 15ms to 30ms.'
