schema_version: 1
id: mobile-0680
title: The Invisible OOM Crash
topic: memory-hierarchy-design
status: published
provenance: imported
scenario: Your mobile app is experiencing intermittent Out-Of-Memory (OOM) crashes on certain Android
  devices, specifically when loading a 100MB ML model. However, `adb shell dumpsys meminfo` shows that
  the device still has 500MB of free physical RAM. Why might the app be crashing with OOM despite seemingly
  ample free memory?
details:
  realistic_solution: The OOM crash, despite reported free physical RAM, points to issues with **virtual
    memory address space fragmentation** or **process-specific memory limits**, rather than a lack of
    total physical memory.
  common_mistake: '"The model is simply too large for the device''s total RAM." This doesn''t explain
    why it crashes with 500MB of reported free memory.'
  napkin_math: If a 32-bit process has a 2GB virtual address space and 1GB is already allocated in scattered
    1MB chunks, requesting a 100MB *contiguous* block will fail even though 1GB of virtual memory is technically
    "free." For 64-bit systems, virtual address space fragmentation is less of an issue, but the other
    points (heap limits, LMK) still apply.
