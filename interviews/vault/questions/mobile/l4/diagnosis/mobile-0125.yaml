id: mobile-0125
title: The CoreML Conversion Black Hole
topic: graph-compilation
status: published
provenance: imported
scenario: 'Your PyTorch model uses a custom ''GatedLinearUnit'' activation: `GLU(x) = x[:, :n] * sigmoid(x[:,
  n:])`. The model works perfectly in PyTorch. After converting to Core ML via `coremltools`, inference
  produces garbage — all outputs are near zero. No conversion error was raised. The model has 45 layers
  and you don''t know which one is broken. How do you diagnose and fix this?'
details:
  realistic_solution: 'CoreML''s converter silently mishandles the custom GLU op (x[:,:n] * sigmoid(x[:,n:])),
    replacing it with an incorrect graph. Diagnose: binary search across 45 layers (6 iterations x 5 min
    = 30 min). Export partial models, compare outputs, find divergence. Fix: register a custom op converter
    in coremltools mapping GLU to split + sigmoid + mul. Prevention: CI step validating 100 inputs through
    both PyTorch and CoreML, asserting max error < 1e-4.'
  common_mistake: '"Re-export with ONNX as an intermediate format." ONNX may have the same problem — GLU
    isn''t a standard ONNX op either. You''re just adding another conversion step that can silently fail.'
  napkin_math: 'Bisection debugging: 6 iterations × 5 min each = 30 min to isolate the layer. Manual inspection
    of 45 layers: ~4 hours. Speedup: 8×. Conversion validation cost: 100 inputs × 2 forward passes (PyTorch
    + Core ML) × 50 ms = 10 seconds in CI. Cost of shipping the broken model: if 5% of users trigger the
    GLU path and get garbage results, at 1M DAU = 50K bad experiences/day. At 2% uninstall rate from bad
    experience: 1000 lost users/day × $5 LTV = $5,000/day.'
