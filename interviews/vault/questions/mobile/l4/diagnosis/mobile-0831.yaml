schema_version: 1
id: mobile-0831
title: Mobile New 0033
topic: kernel-fusion
status: published
provenance: imported
scenario: A mobile GPU compiles a Conv-BatchNorm-ReLU block. Instead of a single kernel taking 0.5ms,
  the profiler shows three distinct kernels executing, and total latency is 1.8ms.
details:
  realistic_solution: The symptom is multiple kernel dispatches and heavily inflated latency, caused by
    operator fusion failure in the compiler. Because BN and ReLU weren't fused into the Convolution kernel,
    the GPU must write the intermediate Conv output to VRAM, read it back for BN, write it out, and read
    it for ReLU. This causes massive memory roundtrips and triple the kernel launch overhead.
  common_mistake: Believing that total theoretical FLOPs alone determine latency, ignoring memory roundtrips
    and missed compiler fusions.
  napkin_math: 'Fused kernel: 1 Read, 1 Write (20MB total). Unfused: Conv (1R,1W), BN (1R,1W), ReLU (1R,1W)
    = 60MB total. At 50GB/s BW, 60MB takes 1.2ms. Add kernel launch overheads (3 kernels * 0.2ms = 0.6ms),
    total is 1.8ms.'
