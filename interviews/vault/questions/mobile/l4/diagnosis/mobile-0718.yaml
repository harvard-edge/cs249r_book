schema_version: 1
id: mobile-0718
title: The Heterogeneous Scheduling Trap
topic: accelerator-comparison
status: published
provenance: imported
scenario: You're profiling a real-time object detection pipeline on a Snapdragon 8 Gen 3. The NPU is rated
  at 45 TOPS (INT8). Your YOLOv8-S model needs ~7 GOPS per frame. At 30 FPS that's 210 GOPS/s — less than
  0.5% of NPU peak. Yet you measure 28ms per frame, barely hitting 30 FPS. Where is the time going?
details:
  realistic_solution: Pre- and post-processing are running on the CPU and dominating the pipeline. Camera
    frame acquisition, color space conversion (NV21→RGB), resizing, and normalization happen on the CPU
    before the NPU ever sees a tensor. After inference, non-max suppression (NMS) with hundreds of candidate
    boxes runs on the CPU too. The NPU inference itself may take only 5–6ms, but the CPU bookends consume
    22ms. The bottleneck is the *pipeline*, not the accelerator.
  common_mistake: '"The model must be memory-bandwidth bound on the NPU." While possible, the real culprit
    is more mundane.'
  napkin_math: 'Camera capture + CSC: ~4ms. Resize + normalize on CPU: ~6ms. NPU inference (YOLOv8-S INT8):
    ~6ms. NMS (300 candidates): ~8ms. Tensor copy overhead: ~4ms. Total: ~28ms. NPU is idle for 79% of
    the frame budget.'
