schema_version: 1
id: mobile-fill-05055
title: OOM Diagnosis for LLM Context Extension on A17 Pro
topic: memory-hierarchy-design
status: published
provenance: imported
scenario: An on-device LLM (Phi-2, 2.7B, INT4 = 1.35GB) on iPhone 15 Pro crashes with OOM at 2048 token
  context. The app was tested at 512 tokens without issues. Diagnose the memory growth pattern and identify
  what causes the OOM at 2048 tokens.
details:
  realistic_solution: 'Memory at 512 tokens: model 1.35GB + KV cache 2×32×32×64×512×2B = 2×32×32×64×512×2
    = 134MB + activations ~50MB = ~1.53GB. At 2048 tokens: KV cache = 134MB × 4 = 536MB. Activations during
    prefill (full attention): QK^T matrix = 32 heads × 2048 × 2048 × 2B = 268MB. Total: 1.35GB + 536MB
    + 268MB + 50MB = 2.20GB. iOS app memory limit: ~2-3GB before jetsam kills process. At 2048 token prefill:
    peak memory exceeds 2.5GB — OOM. Fix: (1) Use FlashAttention to avoid materializing QK^T matrix (saves
    512MB) → 1.94GB peak. (2) Chunked prefill: process 256 tokens at a time → QK^T = 32×256×256×2B = 8MB
    instead of 512MB.'
  common_mistake: Attributing the OOM solely to the KV cache growth without accounting for activation
    memory during prefill, which scales as O(seq_len²) for full attention.
  napkin_math: 'KV cache at 2048: 536MB. Prefill attention matrix: 32×2048²×2B = 268MB — this is the spike.
    Total: 1.35+0.536+0.268+0.05 = 2.20GB → hits iOS jetsam. FlashAttention eliminates 512MB spike → 1.94GB
    — safe. Chunked prefill with chunk=256: attention = 512×256×2B×32 = 8MB per chunk.'
