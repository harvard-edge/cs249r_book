schema_version: 1
id: mobile-0572
title: The GPU Context Switch Overhead
topic: real-time-deadlines
status: published
provenance: imported
scenario: Your mobile game uses an ML model to generate textures dynamically. The ML model runs on the
  GPU using a Compute Shader. The game engine renders the 3D graphics on the same GPU using a Render Shader.
  The ML model takes 10ms. The rendering takes 10ms. But the total frame time is 28ms, dropping you below
  60 FPS. Where are the missing 8ms going?
details:
  realistic_solution: '8ms lost to GPU context switching. Transitioning compute shader (ML) <-> render
    shader (graphics) requires: flush in-flight ops, invalidate caches, reconfigure shader cores, reload
    pipeline state. Each transition: ~4ms. Two per frame = 8ms = 30% overhead. Fix: (1) run ML on NPU
    instead of GPU (no context switch). (2) Batch all compute before rendering (one switch = 4ms saved).
    (3) Use Vulkan async compute to overlap ML with non-dependent render passes.'
  common_mistake: '"The CPU is slow to launch the commands." Command dispatch takes microseconds, not
    8 milliseconds.'
  napkin_math: ML (10ms) + Context Switch (4ms) + Render (10ms) + Context Switch (4ms) = 28ms per frame.
    The hardware reconfiguration overhead is consuming nearly 30% of your total GPU timeline.
