schema_version: 1
id: mobile-0030
title: The App Size Audit
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: Your app is 280 MB. Analytics show that for every 10 MB increase in app size, install conversion
  drops by 1.5%. Marketing wants to add a new 45 MB generative AI feature. Engineering says the app is
  already at the limit. Find 60 MB of savings without removing any ML features — the app has 4 models
  totaling 120 MB.
details:
  realistic_solution: 'Systematic audit of all binary components. Savings: (1) Quantize the 2 FP16 models
    to INT8: -35 MB (other 2 already INT8). (2) Deduplicate ML framework (two TFLite versions linked):
    -5 MB. (3) Strip unused assets (@3x images, dead localizations): -12 MB. (4) Move rarely-used style
    transfer to on-demand download: -12.5 MB. Total: 64.5 MB saved. With 45 MB new feature: 260.5 MB (down
    from 280). Install conversion improves ~3%. Never re-quantize INT8 to INT4 for OCR/face detection.'
  common_mistake: '"Quantize all models from FP16 to INT8 — that halves the model size from 120 MB to
    60 MB." Not all models are FP16. Two of your four models are already INT8. Blindly re-quantizing INT8
    models to INT4 will destroy accuracy on the two sensitive models (OCR and face detection).'
  napkin_math: 'Starting: 280 MB. Model quantization: -35 MB. Framework dedup: -5 MB. Asset stripping:
    -12 MB. On-demand style transfer: -12.5 MB. Total savings: 64.5 MB. New size: 215.5 MB. Adding 45
    MB AI feature: 260.5 MB. Net change from original: -19.5 MB. Install conversion impact: +3% improvement
    (from 280 → 260 MB). Revenue at 100K installs/month, $2 LTV: 3% × 100K × $2 = $6,000/month additional
    revenue.'
