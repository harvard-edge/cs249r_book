schema_version: 1
id: mobile-exp-diag-0087
title: Camera App Transition OOM on Exynos 2400
topic: memory-pressure-management
status: published
provenance: imported
scenario: Your team deployed a real-time video segmentation model on a device powered by the Samsung Exynos
  2400. Although the dual-core NPU easily handles the compute with its 34.7 TOPS, users report sudden
  app crashes (OOM) specifically when switching back and forth between the native camera app and your
  application. Given the device features 12 GB of shared LPDDR5X memory, diagnose why the OS is suddenly
  killing your app despite seemingly having enough total RAM.
details:
  realistic_solution: The root cause is OS-level memory eviction triggered by the Image Signal Processor
    (ISP) and memory fragmentation. When the camera app is active, the ISP aggressively allocates large,
    contiguous memory buffers from the shared 12 GB LPDDR5X pool for high-resolution processing. This
    creates severe memory pressure, causing the Android Low Memory Killer Daemon (LMKD) to evict your
    app. The solution involves pre-allocating a fixed, contiguous memory pool for NPU activations at startup
    to avoid runtime fragmentation failures.
  common_mistake: Candidates often assume the model has a memory leak or suggest reducing batch size/gradients.
    They fail to recognize that the Exynos 2400 uses a unified memory architecture where the NPU, CPU,
    GPU, and ISP share the same physical RAM, making system-level contention the real issue.
  napkin_math: 'Total Shared LPDDR5X: 12.0 GB. Android OS + Background: ~4.0 GB. Active Camera (ISP +
    GPU for 4K buffers): ~5.5 GB. Remaining Free RAM: ~2.5 GB. If your model needs 1.8 GB for weights
    and NPU activations, the OS must find 1.8 GB of unfragmented space. Because the ISP heavily fragments
    the remaining 2.5 GB, contiguous allocation fails and LMKD immediately terminates your app.'
