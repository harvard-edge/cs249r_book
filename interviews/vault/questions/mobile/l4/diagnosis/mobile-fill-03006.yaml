schema_version: 1
id: mobile-fill-03006
title: Neural Engine Contention Causing P99 Spikes on A17 Pro
topic: tail-latency
status: draft
provenance: imported
scenario: An iOS app uses Core ML to run a real-time style transfer model on the A17 Pro Neural Engine
  (35 TOPS, 8GB). P50 inference is 12ms but P99 is 200ms. The app also uses background photo processing.
  User reports spikes correlate with opening the camera in another app.
details:
  realistic_solution: Use Instruments to profile ANE utilization. Request higher QoS (userInteractive)
    for the style transfer task. Implement fallback to GPU when ANE queue depth exceeds threshold. Cache
    the last valid output and display it during ANE preemption windows to maintain perceived smoothness.
  common_mistake: Profiling only the Core ML model execution without considering OS-level Neural Engine
    scheduling. The A17 Pro Neural Engine is a shared resource; Apple's ANE scheduler preempts low-priority
    tasks for camera/system requests.
  napkin_math: 'A17 Pro Neural Engine 35 TOPS. Style transfer model ~50 GOPs: 50G/35T = 1.4ms compute.
    P50 = 12ms implies ~10.6ms overhead (scheduling, data transfer). During camera contention, ANE is
    reallocated for ISP/camera pipeline; inference waits in queue up to ~200ms for scheduler slot. No
    napkin math shortcut — this is a scheduling fairness problem.'
