schema_version: 1
id: mobile-exp-diag-0096
title: Watchdog Resets from NPU Memory Contention
topic: safety-certification
status: published
provenance: imported
scenario: A critical real-time hazard detection system running on the Samsung Exynos 2400 NPU experiences
  sporadic watchdog timer resets. The system uses the dual-core NPU, which offers 34.7 TOPS, to process
  camera frames with strict deterministic execution requirements. These resets only occur when the device
  is concurrently processing heavy background OS tasks on the CPU and high-resolution video streams through
  the ISP. Based on the hardware architecture, what is the root cause of these sudden latency spikes and
  subsequent watchdog resets?
details:
  realistic_solution: The root cause is memory bandwidth contention on the shared 12 GB LPDDR5X. Although
    the dual-core NPU has sufficient compute at 34.7 TOPS, the heavy concurrent memory requests from the
    CPU and ISP saturate the memory controller. This starves the NPU of weight and activation data, destroying
    deterministic execution guarantees and causing the inference latency to exceed the watchdog timer's
    safety threshold.
  common_mistake: Candidates often misdiagnose the issue as thermal throttling, an OS scheduling bug,
    or insufficient NPU compute power. They fail to consider the architectural bottlenecks of a unified
    memory system under concurrent heterogeneous workloads.
  napkin_math: Assume the model requires 173.5 GOPs per frame. Theoretical compute time on the 34.7 TOPS
    Samsung Exynos 2400 NPU is 173.5 GOPs / 34,700 GOPs/sec = 0.005 seconds (5 ms). The model requires
    reading 100 MB of data per frame. If the NPU's share of the shared 12 GB LPDDR5X bandwidth drops to
    4 GB/s due to heavy CPU and ISP contention, the data transfer alone takes 100 MB / 4000 MB/s = 25
    ms. This 25 ms memory delay causes the inference to exceed a strict 10 ms watchdog timer threshold,
    triggering a system reset.
