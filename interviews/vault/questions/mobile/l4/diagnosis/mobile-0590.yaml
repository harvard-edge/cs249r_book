id: mobile-0590
title: The Samsung Exynos NPU Fragmentation
topic: transformer-systems-cost
status: published
provenance: imported
scenario: 'Your app ships a face mesh model to Samsung Galaxy phones. You test on the Galaxy S24 (Exynos
  2400) and it works great at 8ms. Then bug reports flood in: Galaxy S22 (Exynos 2200) users get garbled
  outputs, and Galaxy S21 (Exynos 2100) users see 45ms latency. Same model binary, same TFLite version.
  How do you ship one model that works across three Exynos generations?'
details:
  realistic_solution: 'Three Exynos generations have different NPU architectures. 2400 (S24): full support
    = 8ms. 2200 (S22): grouped conv bug = garbled output. 2100 (S21): insufficient op support = CPU fallback
    at 45ms. Fix: three model variants via Play Store device targeting. A (original) for 2400. B (grouped->standard
    conv, +14% weights) for 2200. C (GPU-optimized TFLite) for 2100 at 12ms. Per-user download: 4-5 MB.
    50ms startup benchmark verifies correctness.'
  common_mistake: '"It''s a TFLite bug — file an issue and wait for a patch." The root cause isn''t the
    runtime; it''s that Samsung changes NPU architectures across generations more aggressively than Qualcomm,
    and each generation has different operator support, quantization behavior, and compiler quirks.'
  napkin_math: 'Model A: 4.2 MB, 8ms on Exynos 2400 NPU. Model B: 4.8 MB (grouped→standard conv adds 14%
    weights), 9ms on Exynos 2200 NPU. Model C: 4.0 MB, 12ms on Exynos 2100 GPU (Mali), 45ms on CPU fallback.
    Total storage on Play Store: 13 MB (all variants). Per-user download: 4-5 MB (one variant). Micro-benchmark
    at startup: 50ms (5 inferences × 10ms). Samsung Galaxy market share by generation: S24 (35%), S23
    (30%), S22 (20%), S21+ older (15%). Weighted average latency: 0.35×8 + 0.30×8.5 + 0.20×9 + 0.15×12
    = **8.95ms**.'
