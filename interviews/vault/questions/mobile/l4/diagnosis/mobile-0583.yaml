schema_version: 1
id: mobile-0583
title: The Real-Time Video ML Frame Drop
topic: real-time-deadlines
status: published
provenance: imported
scenario: Your video calling app applies a real-time background replacement model (DeepLabV3, 2.1M params,
  INT8) on a MediaTek Dimensity 9300 (NPU at 37 TOPS). At 720p 30 FPS, the model runs in 12ms per frame
  — within the 33ms budget. But users report the video drops to 15 FPS during calls. The model isn't the
  bottleneck. What's consuming the other 21ms per frame?
details:
  realistic_solution: 'Serial pipeline totals 37ms: capture (5) + color (3) + ML (12) + composite (4)
    + downscale (3) + encode (8) + packetize (2). With jitter = ~15 FPS. Fix: pipeline stages so frame
    N processes through ML while N-1 encodes. Throughput limited by encoding (8ms = 125 FPS max). Reduce
    ML input to 360p: segmentation 12ms -> 4ms. With pipelining at 360p: sustained 30 FPS, one-frame latency
    (33ms). Encoding, not ML, is the true throughput bottleneck.'
  common_mistake: '"The model is taking longer than benchmarked due to thermal throttling." 12ms × 2 (throttled)
    = 24ms, which still fits in 33ms. Throttling alone doesn''t explain 15 FPS.'
  napkin_math: 'Serial pipeline: 5 + 3 + 12 + 4 + 3 + 8 + 2 = **37ms** (27 FPS, drops to 15 with jitter).
    Pipelined at 360p: max stage = 8ms (encoding). Throughput: 1000 / 8 = **125 FPS** (capped at 30 by
    camera). Latency: 5 + 0.5 + 4 + 4 + 3 + 8 + 2 = **26.5ms** (one frame of pipeline delay, acceptable
    for video calls). The encoding stage, not the ML model, is the true throughput bottleneck.'
