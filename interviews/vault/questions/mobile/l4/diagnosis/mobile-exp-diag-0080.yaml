schema_version: 1
id: mobile-exp-diag-0080
title: A17 Pro NPU Dataset Bias in Low-Light Portrait Segmentation
topic: dataset-curation
status: published
provenance: imported
scenario: Your team deployed a real-time portrait video segmentation model on the iPhone 15 Pro, targeting
  the Apple A17 Pro Neural Engine. The model runs efficiently, utilizing a fraction of the 35 TOPS NPU
  budget and fitting well within the shared 8 GB unified memory. However, user telemetry indicates a severe
  regression in edge accuracy specifically in low-light environments, despite the validation dataset showing
  98% mIoU across all lighting conditions. Diagnose the root cause of this discrepancy between validation
  metrics and real-world performance.
details:
  realistic_solution: The root cause is a biased evaluation dataset where the low-light validation split
    is not representative of the real-world sensor noise distribution captured by the iPhone 15 Pro's
    camera pipeline. The solution is to curate a hard-mining dataset by collecting raw/processed image
    pairs specifically from the target hardware under low-light conditions, re-annotate these edge cases,
    and ensure the training data augmentation pipeline simulates the specific noise profile of the device's
    sensor.
  common_mistake: Candidates often blame the A17 Pro's 8-bit quantization or suggest architectural changes
    to the model to improve capacity. They miss that the symptom (failing specifically in low-light despite
    high validation scores) points directly to a flaw in dataset curation and evaluation methodology,
    not a hardware or model architecture limitation.
  napkin_math: Assume the segmentation model processes 4K video (3840x2160) at 30 FPS. Total pixels per
    second = 3840 * 2160 * 30 = ~250M pixels/sec. If the model requires 50 MACs per pixel, total compute
    = 250M * 50 * 2 (OPS/MAC) = 25 GOPS. This is well within the A17 Pro Neural Engine's 35 TOPS (35,000
    GOPS) capacity, proving the issue isn't compute-bound dropping frames, but rather a data-centric accuracy
    failure.
