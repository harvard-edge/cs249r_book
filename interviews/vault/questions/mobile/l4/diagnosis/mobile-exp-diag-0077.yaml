schema_version: 1
id: mobile-exp-diag-0077
title: Diagnosing Low NPU Utilization in MobileNet
topic: cnn-efficient-design
status: published
provenance: imported
scenario: You are profiling a MobileNetV2-based vision pipeline deployed on the Qualcomm Hexagon NPU (Snapdragon
  8 Gen 3). While the theoretical FLOP count is extremely low due to depthwise separable convolutions
  and inverted residuals, the profiler shows the NPU is only achieving a tiny fraction of its 45 TOPS
  INT8 peak performance. Furthermore, the inference latency is worse than a standard, higher-FLOP dense
  convolutional network. Identify the root cause for this performance bottleneck on the NPU.
details:
  realistic_solution: The root cause is the extremely low arithmetic intensity (operations per byte of
    memory accessed) of depthwise convolutions. The Hexagon NPU achieves its 45 TOPS peak by relying on
    massive data reuse within its dense MAC arrays. Depthwise convolutions lack this spatial reuse, turning
    a compute-bound task into a memory-bandwidth bound one. Consequently, the NPU compute units stall
    while waiting for weights and activations to be fetched from the shared 12-16 GB LPDDR5X memory.
  common_mistake: Candidates often incorrectly assume that fewer FLOPs always translates to lower latency.
    They might falsely attribute the bottleneck to INT8 quantization overhead, framework driver inefficiencies,
    or CPU-NPU synchronization, completely missing the architectural mismatch between the operation's
    arithmetic intensity and the NPU's dense MAC arrays.
  napkin_math: A standard 3x3 INT8 depthwise convolution has an arithmetic intensity of roughly 2 OPs/byte.
    To sustain the Hexagon NPU's peak 45 TOPS (45,000 GOPS), the required memory bandwidth would be 45,000
    / 2 = 22,500 GB/s. The shared LPDDR5X subsystem maxes out around 60-80 GB/s of bandwidth. Thus, maximum
    achievable performance is capped at ~80 GB/s * 2 OPs/byte = 160 GOPS, which is less than 0.4% of the
    NPU's theoretical 45 TOPS capacity, explaining the massive underutilization and high latency.
