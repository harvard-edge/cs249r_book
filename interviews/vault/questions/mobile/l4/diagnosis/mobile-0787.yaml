schema_version: 1
id: mobile-0787
title: Speculative Decoding Performance Regression
topic: speculative-decoding
status: published
provenance: imported
scenario: You implement speculative decoding on a flagship phone to accelerate a 4B target model (running
  on the NPU at 15 tok/s). You use a 100M draft model running on the CPU. Despite achieving a strong draft
  acceptance rate of 65% (gamma=4), the overall effective throughput drops from 15 tok/s to 10 tok/s.
details:
  realistic_solution: The performance regression is caused by the heterogeneous compute synchronization
    overhead between the CPU and the NPU. Speculative decoding requires the draft model (CPU) to send
    its generated token IDs and KV data to the target model (NPU) for validation. Mobile SoCs do not have
    cache-coherent unified memory between the CPU and the NPU in the same way server GPUs do. The OS must
    perform expensive cross-device buffer synchronizations, cache flushes, and driver API calls for every
    single speculative step. This latency completely negates the compute savings of skipping target model
    decode steps.
  common_mistake: Assuming the draft model is too slow, when in reality a 100M model on a modern mobile
    CPU can generate tokens extremely fast.
  napkin_math: 'Baseline target: 1000ms / 15 = 66ms/token.

    Draft step (4 tokens): CPU takes 4 * 10ms = 40ms.

    Target validation (4 tokens): NPU takes 70ms.

    Hardware Sync overhead (CPU->NPU->CPU): 150ms per step.

    Total time per step: 40 + 70 + 150 = 260ms.

    Accepted tokens per step: 1 (base) + (4 * 0.65) = 3.6 tokens.

    Theoretical speed: 3.6 tokens / 0.26s = ~13.8 tok/s. Additional overheads (buffer allocation, cache
    invalidation, driver scheduling jitter) add ~37ms per step, bringing effective speed down to 3.6 /
    0.297s ≈ 10 tok/s as observed.'
