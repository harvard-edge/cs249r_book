title: Mobile New 0029
topic: federated-learning
status: published
provenance: imported
scenario: An edge server in a closed metal box processes IP cameras. It works well at night (15C ambient)
  but restarts randomly during the day (35C ambient). Logs show kernel panics with no software errors.
details:
  realistic_solution: The symptom of random hardware resets during high ambient temperatures is a protective
    thermal shutdown (PROCHOT). When ambient temperature rises, the baseline cooling efficiency drops.
    If the NPU and CPU run heavily, the die temperature skyrockets past Tjmax (e.g., 105C). To prevent
    literal silicon melting, the hardware triggers a hard electrical power cut, causing kernel panics/resets.
  common_mistake: Ignoring seasonal ambient temperature fluctuations when deploying edge AI in non-climate-controlled
    environments.
  napkin_math: 'T_die = T_ambient + (Power * R_thermal). R_thermal = 3 C/W. Power = 25W. Night: T_die
    = 15C + (25*3) = 90C (Safe). Day: T_die = 35C + (25*3) = 110C. 110C > Tjmax (105C), triggering instantaneous
    hardware shutdown.'
