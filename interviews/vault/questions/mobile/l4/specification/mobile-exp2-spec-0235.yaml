schema_version: 1
id: mobile-exp2-spec-0235
title: On-Device Summarization Architecture Selection for Snapdragon 8 Gen 3
topic: encoder-decoder-tradeoffs
status: published
provenance: imported
scenario: Your team is building an offline, real-time document summarization feature for a flagship smartphone
  utilizing the Qualcomm Hexagon NPU (Snapdragon 8 Gen 3). The system has access to a shared 12-16 GB
  LPDDR5X memory pool, but the memory bandwidth is highly contended by the OS and GPU. With a maximum
  of 45 TOPS INT8 available on the NPU, you must design an architecture—choosing between encoder-only,
  decoder-only, or encoder-decoder—that minimizes memory bandwidth during generation for inputs up to
  1000 tokens and short outputs of 50 tokens.
details:
  realistic_solution: An encoder-decoder architecture is optimal for this asymmetric input/output constraint.
    The encoder processes the dense 1000-token input in a single, highly parallel pass, perfectly utilizing
    the NPU's 45 TOPS INT8 compute in a compute-bound regime. The decoder then generates the 50 tokens.
    Because the heavy 1000-token context is compressed into the static encoder hidden states (accessed
    via cross-attention) rather than a continuously re-read self-attention KV cache, the per-token memory
    bandwidth requirement during generation is significantly reduced.
  common_mistake: Candidates often immediately propose a trending decoder-only LLM, ignoring the fact
    that the KV cache for a 1000-token input must be continuously loaded from the shared LPDDR5X memory
    during each step of the auto-regressive generation, creating a massive memory bandwidth bottleneck
    on mobile.
  napkin_math: 'Assume a 2B parameter decoder-only model in INT8 (2GB weights). Generating 1 token requires
    loading 2GB of weights + KV cache. For 50 output tokens, we perform 50 forward passes. Total memory
    traffic for weights alone is 50 * 2GB = 100GB. On LPDDR5X (peak ~85 GB/s bandwidth), this takes >1.1
    seconds just for weight loading. By splitting into a 1B encoder and 1B decoder: the 1B encoder runs
    once (1GB loaded, heavily utilizing the 45 TOPS INT8), and the 1B decoder runs 50 times (50GB loaded).
    This nearly halves the generation bandwidth pressure from 100GB to 51GB, significantly lowering the
    latency.'
