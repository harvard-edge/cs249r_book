schema_version: 1
id: mobile-exp2-spec-0226
title: Designing Mobile Attention for Hexagon NPU
topic: attention-scaling
status: published
provenance: imported
scenario: We are deploying a 7B parameter LLM on a flagship mobile device featuring the Qualcomm Hexagon
  NPU (Snapdragon 8 Gen 3) with a shared 12 GB LPDDR5X memory pool. The product requirements demand a
  context window of 8K tokens for a chat application, but standard multi-head attention (MHA) exceeds
  our memory bandwidth and capacity constraints during the decode phase. Design an attention architecture
  specification that fits within the NPU's capabilities and memory limits while maintaining acceptable
  generation quality.
details:
  realistic_solution: The optimal design replaces MHA with Grouped-Query Attention (GQA) combined with
    an INT8 KV cache quantization. GQA strikes a balance between the memory bandwidth savings of MQA and
    the quality of MHA, reducing the KV cache size by a factor of 8 (assuming 32 heads grouped to 4).
    Quantizing the KV cache to INT8 aligns perfectly with the Hexagon NPU's 45 TOPS INT8 peak performance,
    significantly reducing memory traffic on the shared LPDDR5X bus during the memory-bound decode phase.
  common_mistake: Candidates often suggest standard Multi-Query Attention (MQA) without considering the
    accuracy degradation for a 7B model, or they propose complex sparse attention patterns that map poorly
    to the Hexagon NPU's static tensor operations and INT8 execution units.
  napkin_math: 'For an 8K context and standard MHA (32 heads, 128 dim, FP16): KV cache size per token
    = 2 layers * 32 heads * 128 dim * 2 bytes = 16KB. For 32 layers and 8K tokens: 16KB * 32 * 8192 =
    4GB, which consumes 33% of the total 12GB shared LPDDR5X memory. By switching to GQA (4 KV heads)
    and INT8 quantization: New KV cache size per token = 2 * 4 * 128 * 1 byte = 1KB. Total KV cache: 1KB
    * 32 * 8192 = 256MB. This 16x reduction easily fits the memory budget and reduces memory bandwidth
    requirements, allowing the Hexagon NPU to sustain higher utilization towards its 45 TOPS INT8 peak.'
