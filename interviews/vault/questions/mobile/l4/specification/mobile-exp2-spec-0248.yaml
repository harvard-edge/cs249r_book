schema_version: 1
id: mobile-exp2-spec-0248
title: On-Device LLM Sizing for Apple A17 Pro
topic: model-size-estimation
status: published
provenance: imported
scenario: You are tasked with deploying a 7-billion parameter language model for real-time translation
  on a device utilizing the Apple A17 Pro Neural Engine. The system must leave enough memory for the OS
  and foreground apps. Design the model quantization and memory allocation strategy to ensure the model
  fits within the shared 8 GB unified memory while efficiently leveraging the 16-core Neural Engine for
  inference.
details:
  realistic_solution: A realistic approach quantizes the 7B model to 4-bit (INT4) to reduce the weight
    footprint to about 3.5 GB. The design must reserve roughly 1.5 GB for the KV cache and inference activations,
    leaving 3 GB for the OS out of the 8 GB shared pool. The strategy maps compute-heavy matrix multiplications
    to the 16-core Neural Engine to leverage its 35 TOPS within the tight ~5W power budget.
  common_mistake: Candidates often assume the entire 8 GB of unified memory is available for the model,
    ignoring the memory footprint required by iOS and other apps. They also frequently forget to account
    for the dynamic KV cache memory needed during text generation.
  napkin_math: '7B parameters at FP16 = 14 GB (exceeds 8GB total). Quantizing to INT4: 7B * 0.5 bytes
    = 3.5 GB for weights. Total memory: 8 GB (unified) - 3.5 GB (weights) - 1.5 GB (KV cache/activations)
    = 3.0 GB remaining for iOS. Compute utilization: Generating 20 tokens/s requires ~280 Giga-operations
    per second, well within the 35 TOPS capacity of the 16-core Neural Engine operating efficiently at
    ~5W.'
