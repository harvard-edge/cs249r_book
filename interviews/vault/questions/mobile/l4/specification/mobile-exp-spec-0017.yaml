schema_version: 1
id: mobile-exp-spec-0017
title: On-Device Guardrail Pipeline for Hexagon NPU
topic: responsible-ai
status: published
provenance: imported
scenario: You are tasked with designing an on-device safety guardrail system for a generative AI chat
  application running on a smartphone powered by the Qualcomm Hexagon NPU (Snapdragon 8 Gen 3). The application
  needs to perform real-time toxic content filtering and PII redaction on user inputs before processing.
  Given the device's heterogeneous CPU+GPU+NPU architecture, shared 12-16 GB LPDDR5X memory, and the 45
  TOPS INT8 capability of the NPU, how do you architect the guardrail pipeline to analyze these interactions
  securely without introducing perceptible latency?
details:
  realistic_solution: The system should use a cascaded architecture starting with fast, deterministic
    rules (regex, Bloom filters) on the CPU for obvious PII. For deeper semantic filtering, deploy a highly
    quantized INT8 small language model (e.g., 1B parameters) compiled specifically for the Hexagon NPU.
    This leverages the 45 TOPS compute for rigorous safety analysis while efficiently reserving the shared
    12-16 GB LPDDR5X memory for the main application and OS.
  common_mistake: Candidates often suggest running large, unquantized transformer models for content filtering
    on the CPU, ignoring the power efficiency of the NPU. They might also fail to design a cascaded approach,
    treating every interaction as requiring a heavy, deep-learning-based safety check which drains the
    battery and hogs memory bandwidth.
  napkin_math: A 1B parameter guardrail model quantized to INT8 occupies ~1 GB of the shared 12-16 GB
    LPDDR5X memory. Processing a 128-token input requires roughly 256 MOps/token, totaling ~32 GOps. Given
    the Hexagon NPU's peak of 45 TOPS (INT8), processing 32 GOps at a conservative 20% utilization (9
    TOPS) takes approximately 3.5 milliseconds (32e9 / 9e12 seconds), fitting easily into a sub-50ms real-time
    interaction budget.
