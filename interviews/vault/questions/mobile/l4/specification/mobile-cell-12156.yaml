id: mobile-cell-12156
title: 'Network Bandwidth Bottlenecks: Specify Bandwidth SLA for Mobile LLM App Quality'
topic: network-bandwidth-bottlenecks
status: published
provenance: imported
scenario: 'Specify bandwidth requirements and QoS policies for a mobile LLM app on Snapdragon 8 Gen 3
  (77 GB/s) that must guarantee TPOT < 25ms P95 for the LLM while maintaining 60fps display and always-on
  speech recognition. Define: memory bandwidth reservations per subsystem, priority levels, throttling
  policies, and fallback strategies.'
details:
  realistic_solution: 'Bandwidth reservations: Priority 1 (LLM decode, when active): 72GB/s (93.5%). Priority
    2 (display 60fps): 1.5GB/s (2%). Priority 3 (ASR): 0.01GB/s. Priority 4 (other): 3.49GB/s. Total during
    LLM: 77GB/s ✓. TPOT guarantee: 1.5GB/(77-1.5-0.01-background)=1.5/74.49=20.1ms < 25ms ✓. Fallback:
    if background exceeds 3.49GB/s → reduce LLM batch (already batch=1) → accept 25ms+ TPOT → emit warning.
    Throttle: if TPOT > 30ms for 5 consecutive tokens → reduce display to 30fps (saves 0.75GB/s) → release
    to LLM: TPOT: 1.5/75.24=19.9ms < 25ms ✓.'
  common_mistake: Specifying static bandwidth reservations without a dynamic fallback policy for when
    total demand exceeds 77 GB/s during LLM decode.
  napkin_math: 'LLM BW: 1.5GB/19.5ms=76.9GB/s. Display 60fps: 1.5GB/s. ASR: 0.01GB/s. System: 3GB/s. Total:
    81.4GB/s > 77GB/s. Conflict! Must cap system to 0: 76.9+1.5+0.01+OS_baseline(1GB/s)=79.4GB/s. Still
    over. Display at 30fps: 0.75GB/s: 76.9+0.75+0.01+1=78.66GB/s. Still over. Display at 30fps, OS at
    0.5GB/s: 78.1GB/s. Overclock LPDDR5X? Not possible. Reality: memory controller handles over-subscription
    with queuing. P95 TPOT target: allow occasional 30ms spikes (5% of tokens). Design for 25ms P50, 30ms
    P95.'
