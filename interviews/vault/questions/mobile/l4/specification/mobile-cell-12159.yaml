id: mobile-cell-12159
title: 'Network Bandwidth Bottlenecks: Specification for Minimum Bandwidth to Support On-Device LLM'
topic: network-bandwidth-bottlenecks
status: published
provenance: imported
scenario: Specify the minimum memory bandwidth requirement for a mobile SoC to support on-device 3B INT4
  LLM inference with TPOT < 30ms, 60fps display, and always-on speech recognition. Derive the memory bandwidth
  spec from first principles and explain how it constrains SoC design choices.
details:
  realistic_solution: 'LLM BW: 1.5GB/30ms=50GB/s. Display 60fps: 1.5GB/s. ASR: 0.01GB/s. ISP (1080p 30fps):
    0.1GB/s. System: 1GB/s. Total: 52.6GB/s. Minimum SoC LPDDR BW: 52.6GB/s → round up to 60GB/s (20%
    headroom for thermal throttle). Modern options: LPDDR5X at 60GB/s: achievable. LPDDR5 at 51.2GB/s:
    insufficient (TPOT=51.2/50×30=30.7ms — barely misses target). Conclusion: LPDDR5X is the minimum standard
    for 3B INT4 on-device LLM. This is why Snapdragon 8 Gen 3 (77GB/s) and A17 Pro (68GB/s) support it,
    but cheaper LPDDR5 devices (Tensor G3 at 51.2GB/s) cannot reliably meet the 30ms target.'
  common_mistake: Setting the LLM bandwidth requirement without accounting for the shared bus and other
    SoC components that consume bandwidth simultaneously.
  napkin_math: 'LLM: 50GB/s. Display: 1.5GB/s. Other: 1.5GB/s. Total: 53GB/s minimum. With thermal throttling
    15% → 53/0.85=62.4GB/s design target. LPDDR5X-4200 64-bit dual-channel: 67.2GB/s. LPDDR5X-4800: 76.8GB/s.
    Conclusion: LPDDR5X is required. LPDDR5 (51.2GB/s) fails at 15% throttle: 51.2×0.85=43.5GB/s. TPOT:
    1.5/43.5=34.5ms > 30ms. ✗'
