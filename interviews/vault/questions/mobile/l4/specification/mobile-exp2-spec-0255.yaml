schema_version: 1
id: mobile-exp2-spec-0255
title: Designing a Fail-Safe Pedestrian Detection System
topic: safety-certification
status: published
provenance: imported
scenario: Your team is developing an on-device pedestrian detection system for a lightweight personal
  mobility vehicle using an iPhone 15 Pro, relying on the Apple A17 Pro Neural Engine. The system requires
  ISO 26262 ASIL B compliance, meaning deterministic execution and bounded failure recovery times are
  mandatory. You need to design the specification for a watchdog mechanism and a fallback compute path
  if the 16-core Neural Engine hangs or encounters a fatal memory error within the shared 8 GB unified
  memory.
details:
  realistic_solution: The specification must include a hard real-time watchdog timer on the CPU that polls
    the Neural Engine's task completion state. If a timeout occurs, the system must trigger a fast fallback
    to a simplified, highly quantized model running on the CPU cores, isolated in a pre-allocated, locked
    memory region to avoid unified memory allocation faults during the critical recovery phase.
  common_mistake: Candidates often suggest relying purely on standard iOS background task monitoring or
    assume the Neural Engine will cleanly return an error code upon failure. They frequently overlook
    the shared nature of the 8 GB unified memory, failing to account for memory corruption that could
    simultaneously affect the fallback CPU/GPU processes.
  napkin_math: Assuming a 30 FPS requirement, the maximum latency per frame is 33.3ms. If the primary
    A17 Pro Neural Engine model takes 10ms (utilizing a fraction of the 35 TOPS), the watchdog timeout
    should be set at ~15ms. This leaves 18.3ms for the CPU to detect the timeout, context switch, and
    execute the fallback CPU model to ensure the 33.3ms hard deadline is never missed.
