id: mobile-0762
title: The Federated Learning Upload Bill
topic: collective-communication
status: published
provenance: imported
scenario: You are designing a federated learning system for a mobile keyboard app. Each training round
  involves 1,000 devices uploading a 50 MB model diff. The system runs 10 rounds per day. Calculate the
  total daily upload bandwidth and explain why naive federated learning is infeasible at scale without
  compression.
details:
  realistic_solution: '50 MB x 1,000 devices x 10 rounds = 500 GB uploaded per day. At median mobile upload
    speed of 10 Mbps (1.25 MB/s), each device spends 50/1.25 = 40 seconds per upload. With gradient compression
    (10-100x), this drops to 5-50 GB/day. Techniques: top-k sparsification, quantized gradients, or sending
    only significant parameter deltas.'
  common_mistake: Only considering a single device's upload cost (~500 MB/day), which seems manageable.
    The system-level cost across all participating devices reveals the true infrastructure burden.
  napkin_math: 'Daily upload: 50 MB x 1,000 x 10 = 500 GB. Per device: 500 MB/day upload. With 10x compression:
    50 GB total, 50 MB per device. Upload time at 10 Mbps: 4s per round compressed vs 40s uncompressed.'
