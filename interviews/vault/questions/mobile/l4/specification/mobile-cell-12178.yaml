schema_version: 1
id: mobile-cell-12178
title: 'Network Bandwidth Bottlenecks: Specification — Minimum BW for 10-Turn Conversation SLA'
topic: network-bandwidth-bottlenecks
status: published
provenance: imported
scenario: 'Specify the minimum LPDDR5X memory bandwidth required for a mobile device to maintain TPOT
  < 40ms throughout a 10-turn conversation with a 3B INT4 LLM (each turn: 200 prompt tokens + 100 response
  tokens). Derive the worst-case bandwidth requirement and compare against LPDDR5 (51.2 GB/s) vs. LPDDR5X
  (77 GB/s) standards.'
details:
  realistic_solution: 'Worst case: end of turn 10, decoding at context = 10×(200+100)=3000 tokens accumulated.
    KV/token: 524KB. KV total: 3000×524KB=1.572GB. Weight: 1.5GB. Total per decode step: 3.072GB. Required
    BW for TPOT < 40ms: 3.072GB / 0.040s = 76.8GB/s. LPDDR5 (51.2 GB/s): TPOT at turn 10 = 3.072/51.2=60ms
    > 40ms. FAILS. LPDDR5X (77 GB/s): 3.072/77=39.9ms ≈ 40ms. BARELY passes. Need 77 GB/s minimum. To
    have 20% headroom: 76.8/0.8=96 GB/s. Next-gen LPDDR5X-6400: ~102.4GB/s. Required for comfortable SLA.'
  common_mistake: Using the initial TPOT (short context) as the design point without computing the worst-case
    at the longest context (end of turn 10).
  napkin_math: 'End of turn 10: 3000 ctx. Per decode: 1.5+1.572=3.072GB. Target: <40ms. BW: 3.072/0.04=76.8GB/s.
    LPDDR5: 51.2GB/s. TPOT: 3.072/51.2=60ms. FAIL. LPDDR5X: 77GB/s. TPOT: 39.9ms. BARELY passes (within
    0.25% of target). With 20% safety margin: need 96GB/s → LPDDR5X-6400 (102.4GB/s) or shorter context
    (cap at 2000 tokens: 3.07→2.55GB, 33.1ms < 40ms on LPDDR5X).'
