schema_version: 1
id: mobile-exp2-spec-0254
title: Architecting for the Exynos 2400 NPU Roofline
topic: roofline-analysis
status: published
provenance: imported
scenario: You are designing the performance specifications for a real-time semantic segmentation model
  running on a device powered by the Samsung Exynos 2400 NPU. The product requirements demand 60 FPS processing
  for a high-resolution camera feed. The Exynos 2400 features a dual-core NPU capable of 34.7 TOPS, but
  crucially, it shares its 12 GB LPDDR5X memory subsystem with the CPU, GPU, and ISP, all of which are
  active during video capture. Given these constraints, specify the architectural requirements necessary
  to keep the NPU compute-bound rather than memory-bound.
details:
  realistic_solution: A strong candidate will immediately construct a roofline model by estimating the
    realistic available memory bandwidth under system load, calculating the ridge point. They will specify
    that the model architecture must maximize data reuse (e.g., using fused operations, maximizing SRAM
    utilization, or heavily relying on 1x1 convolutions) to achieve an arithmetic intensity higher than
    the ridge point. They would recommend depthwise separable convolutions but correctly note that depthwise
    layers are highly memory-bound and might underutilize the 34.7 TOPS compute engine.
  common_mistake: Candidates often look only at the 34.7 TOPS figure and assume the NPU can easily handle
    large models at 60 FPS without calculating the required arithmetic intensity. They also frequently
    forget that 'shared memory' means the NPU only gets a fraction of the theoretical peak LPDDR5X bandwidth,
    leading to overly optimistic latency predictions.
  napkin_math: '1. Peak Compute: 34.7 TOPS (INT8). 2. LPDDR5X peak bandwidth is ~68 GB/s, but under heavy
    ISP/CPU load, the NPU might only reliably access ~15 GB/s. 3. Ridge Point (Required Arithmetic Intensity)
    = 34.7 TOPS / 15 GB/s = ~2313 Operations/Byte. 4. A standard depthwise convolution reading 1 byte
    of activation and 1 byte of weight to perform 1 MAC (2 operations) has an arithmetic intensity of
    1 OP/Byte. 5. Therefore, without aggressive fusion and caching in local SRAM to avoid DRAM trips,
    the model will be entirely memory-bound, achieving less than 1% of the 34.7 TOPS theoretical peak.'
