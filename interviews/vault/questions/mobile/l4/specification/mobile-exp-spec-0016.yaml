schema_version: 1
id: mobile-exp-spec-0016
title: Exynos 2400 NPU Real-Time Power Budgeting
topic: power-budgeting
status: published
provenance: imported
scenario: You are designing a real-time video segmentation pipeline for a smartphone powered by the Samsung
  Exynos 2400. The system requires processing 4K video at 30 FPS using the dual-core NPU, which is rated
  at a peak of 34.7 TOPS. The NPU shares a 12 GB LPDDR5X memory pool with the CPU, GPU, and ISP. To prevent
  thermal throttling during prolonged recording, the AI workload is strictly capped at a 2.5W power budget.
  Specify a power management strategy and deployment architecture that ensures sustained 30 FPS performance
  without exceeding this cap.
details:
  realistic_solution: The candidate should analyze the interaction between compute and shared memory.
    They must specify aggressive quantization (e.g., INT8) and operator fusion to maximize operational
    intensity and keep activations in the NPU's local SRAM. Furthermore, they should propose using DVFS
    to drop the dual-core NPU to its lowest viable P-state that still meets the 33.3ms frame deadline,
    exploiting the $P \propto fV^2$ relationship to exponentially reduce dynamic power while leaving memory
    bandwidth for the ISP.
  common_mistake: Candidates often focus solely on the massive 34.7 TOPS compute capacity and fail to
    account for the energy cost of shared memory bandwidth. They frequently propose large models that
    require continuous DRAM fetches, quickly blowing past the 2.5W budget due to the high power consumption
    of LPDDR5X accesses compared to local NPU SRAM.
  napkin_math: At 30 FPS, the latency budget is 33.3ms/frame. Assume a lightweight INT8 model requires
    100 GOPS/frame, totaling 3 TOPS. This uses only ~8.6% of the Exynos 2400's 34.7 TOPS, allowing a massive
    voltage/frequency reduction via DVFS. Assuming LPDDR5X access costs ~10 pJ/bit, transferring a poorly
    optimized 50MB of data (weights/activations) per frame costs 400 Mbits * 10 pJ = 4 mJ/frame. At 30
    FPS, memory alone consumes 120 mW. If compute at the lowest P-state consumes 800 mW, the total is
    0.92W, safely under the 2.5W cap. If unoptimized and running at peak P-state with heavy DRAM traffic,
    memory power scales up and V^2 forces compute power beyond the 2.5W limit.
