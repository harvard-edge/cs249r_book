schema_version: 1
id: mobile-exp2-spec-0232
title: Data Curation for INT8 Hexagon NPU Calibration
topic: dataset-curation
status: published
provenance: imported
scenario: Your team is deploying a real-time object detection model to the Qualcomm Hexagon NPU (Snapdragon
  8 Gen 3) on a new flagship phone. The NPU requires INT8 quantization to achieve its 45 TOPS peak performance,
  but post-training quantization is causing a significant drop in mean Average Precision (mAP) due to
  outlier activations. You need to design a dataset curation specification for a representative calibration
  dataset that captures the long-tail edge cases needed to compute accurate scale and zero-point parameters
  for the NPU, considering the shared 12-16 GB LPDDR5X memory architecture.
details:
  realistic_solution: Design an active learning pipeline that runs the FP32 model over a large unlabelled
    pool, logging maximum activation values across all layers. Curate the calibration dataset by stratifying
    based on these activation magnitudes, ensuring the long-tail 'outlier' images are heavily sampled.
    This provides the quantization algorithm with the true dynamic range needed to set clipping thresholds
    optimized for the Hexagon NPU's INT8 execution.
  common_mistake: Candidates often propose randomly sampling from the training set, failing to realize
    that uniform random sampling under-represents rare lighting conditions and object poses that cause
    activation spikes. They also frequently ignore the specific data distribution required to calibrate
    the activation ranges for INT8 hardware.
  napkin_math: If calibrating requires 500 representative images (at 1080p, 3 channels, FP32 = 1920 *
    1080 * 3 * 4 bytes = 24.8 MB per image), the total raw dataset size in memory is 12.4 GB. While this
    technically fits within the Snapdragon 8 Gen 3's shared 12-16 GB LPDDR5X RAM, the heterogeneous CPU+GPU+NPU
    architecture means the OS and other processes reserve several gigabytes. Therefore, the specification
    must dictate processing the calibration data in smaller batches (e.g., 16 images = ~400 MB) rather
    than loading the entire curated dataset into memory at once.
