schema_version: 1
id: mobile-exp2-spec-0236
title: Energy-Aware Memory Access Design on Tensor G3
topic: energy-per-operation
status: published
provenance: imported
scenario: You are tasked with deploying an optimized version of an on-device LLM similar to Gemini Nano
  onto the Google Tensor G3. The model needs to run inference continuously in the background for a feature,
  but you have a strict power budget to avoid draining the battery. The Tensor G3 features a TPU capable
  of 7.5 TOPS and is paired with 12 GB of LPDDR5X memory. Design an inference specification that minimizes
  the energy per operation, specifically focusing on the energy cost of memory access versus compute.
details:
  realistic_solution: The correct approach involves analyzing the Horowitz energy table to justify that
    memory access is the primary energy bottleneck. The design should prioritize operator selection that
    maximizes data reuse on the TPU's SRAM and aggressive quantization (e.g., INT4 or INT8) to reduce
    the model's memory footprint. Fusing operations to keep intermediate activations on-chip rather than
    spilling to LPDDR5X is critical for meeting the power budget on the Tensor G3.
  common_mistake: Candidates often focus solely on reducing the number of FLOPs to save energy, ignoring
    the fact that accessing off-chip LPDDR5X memory is orders of magnitude more energy-intensive than
    ALU operations. They might propose a computationally simpler model that still heavily relies on large
    memory bandwidth, which will quickly drain the battery.
  napkin_math: Assume LPDDR5X memory access costs ~10 pJ/bit and an ALU operation costs ~1 pJ. For a 1B
    parameter model (like Gemini Nano) at FP32, reading weights from the 12 GB LPDDR5X takes 1B * 32 bits
    * 10 pJ/bit = 320 mJ per token. By quantizing to INT4, memory access drops to 1B * 4 bits * 10 pJ/bit
    = 40 mJ per token. The 8x reduction in memory energy dominates overall power savings, easily accommodating
    the TPU's 7.5 TOPS compute capacity for dequantization.
