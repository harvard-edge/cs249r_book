id: mobile-cell-12047
title: 'MLOps Lifecycle: Specify A/B Test Framework for On-Device Model Comparison'
topic: mlops-lifecycle
status: published
provenance: imported
scenario: 'Specify an A/B testing framework for comparing two on-device speech recognition models on Snapdragon
  8 Gen 3 (45 TOPS) in a voice assistant app with 10M DAU. The new model is 5MB larger but claims 8% WER
  improvement. Define: sample size calculation, assignment strategy, metric collection, guardrail metrics,
  and decision criteria.'
details:
  realistic_solution: 'LoRA at rank=4 for 768-dim layers: each adapter = 2 × 768 × 4 = 6144 params. Two
    layers per arm gives ~12-14K params per arm.'
  common_mistake: Running the A/B test without a proper sample size calculation, then making decisions
    from statistically underpowered data (e.g., 1 day of data on 1% of users = 100K users, insufficient
    for 1% WER change detection).
  napkin_math: 'Parameter budget: 28K total trainable params split across 2 LoRA-adapted arms. ~14K per
    arm. At rank=4: A matrix (d_in × r = 768 × 4 = 3072) + B matrix (r × d_out = 4 × 768 = 3072) = 6144
    per adapted layer. For 2 layers per arm: ~12K per arm ≈ 14K with biases. Consistent with ~14K per
    arm.'
