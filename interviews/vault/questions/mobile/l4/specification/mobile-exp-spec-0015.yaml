schema_version: 1
id: mobile-exp-spec-0015
title: Designing KV-Cache for Exynos 2400 NPU Shared Memory
topic: kv-cache-management
status: published
provenance: imported
scenario: You are tasked with deploying a 7B parameter LLM for on-device summarization on a device featuring
  the Samsung Exynos 2400 NPU. The system provides 34.7 TOPS and relies on a unified 12 GB LPDDR5X memory
  pool shared across the CPU, GPU, ISP, and the dual-core NPU. Given that the mobile OS and background
  processes reserve 6 GB of this memory, and the 4-bit quantized model weights consume 3.5 GB, design
  a KV-cache management strategy that supports a context window of 4096 tokens without triggering out-of-memory
  (OOM) kills.
details:
  realistic_solution: A robust design uses a paged KV-cache with a dynamic memory ceiling tied to OS memory
    pressure signals. Since the Exynos 2400 shares its memory across all SoC components, the KV-cache
    should be allocated in small, non-contiguous pages (e.g., 16 tokens per block) to avoid fragmentation.
    Furthermore, an eviction policy (like Heavy Hitter Oracle or LRU) must be implemented to preemptively
    discard less critical tokens when the available memory buffer shrinks below a safe threshold.
  common_mistake: Candidates often assume the remaining memory can be entirely dedicated to a static KV-cache
    without accounting for peak memory spikes or other subsystems waking up. They may propose allocating
    a single contiguous tensor for the maximum context length, which rapidly fragments the unified 12
    GB pool and leads to app termination when the ISP or GPU demands sudden allocations.
  napkin_math: 'Total Shared Memory = 12 GB. Reserved for OS/Background = 6 GB. 4-bit Model Weights =
    3.5 GB. Available for KV-cache and workspace = 12 - 6 - 3.5 = 2.5 GB. For a typical 7B model (32 layers,
    32 heads, 128 head dim), one token''s KV-cache in FP16 requires: 2 bytes * 2 (K and V) * 32 * 32 *
    128 = 524,288 bytes (~0.5 MB). A 4096-token context demands 4096 * 0.5 MB = 2.048 GB. This leaves
    only ~460 MB for the NPU workspace, intermediate activations, and sudden OS spikes, making dynamic
    paged allocation critical.'
