schema_version: 1
id: mobile-exp2-spec-0234
title: On-Device Drift Detection for Translation Models
topic: distribution-drift-detection
status: published
provenance: imported
scenario: You are designing the monitoring specification for an on-device neural machine translation model
  running locally on the Google Tensor G3. The model processes user audio inputs that frequently include
  slang and new vocabulary not present in the training data, leading to concept drift. You need to design
  a system to compute and aggregate distribution statistics on-device to detect this drift without uploading
  raw audio, staying within the G3's 12 GB LPDDR5X memory footprint and not interfering with the TPU's
  primary inference tasks.
details:
  realistic_solution: Design a federated analytics pipeline where the Tensor G3 computes feature embeddings
    and activation distributions locally during inference. These lightweight summary statistics are stored
    in a small ring buffer in the 12 GB LPDDR5X memory. Periodically, under idle conditions (device charging
    and on Wi-Fi), the device calculates drift metrics like Population Stability Index (PSI) against baseline
    distributions and sends only the aggregated metrics to the cloud.
  common_mistake: Candidates often suggest uploading raw user inputs to the cloud for drift detection,
    which violates user privacy and bandwidth constraints. Another mistake is running complex statistical
    tests continuously on the TPU, starving the primary translation model of the 7.5 TOPS compute budget.
  napkin_math: Assume the model generates a 512-dimensional FP16 embedding per second of audio. 512 *
    2 bytes = 1 KB per second. For 1 hour of daily audio, that is 3.6 MB of embeddings. Storing a week
    of data takes ~25 MB, which is negligible against the 12 GB LPDDR5X memory. If computing PSI takes
    0.1 TOPS, running it once daily during idle time easily fits within the TPU's 7.5 TOPS budget without
    impacting real-time operations.
