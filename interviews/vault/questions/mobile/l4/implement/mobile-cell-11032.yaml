schema_version: 1
id: mobile-cell-11032
title: 'Dataset Curation: Implement Data Versioning for Mobile Federated Learning'
topic: dataset-curation
status: published
provenance: imported
scenario: You run federated learning updates on 5M Tensor G3 (7.5 TOPS, 12GB) devices. Each device may
  be on a different model version (v1, v2, v3). Implement a data versioning protocol that allows aggregating
  gradients from mixed model versions and tracks which data was used for which training round.
details:
  realistic_solution: 'Use version-gated participation: only devices with model version N participate
    in round N training. Version metadata stored in 4 bytes per device. Stale devices receive model update
    before participating. Data provenance: hash of local dataset state per round.'
  common_mistake: Aggregating gradients from different model versions directly — incompatible gradient
    spaces. Not maintaining per-device data provenance for debugging.
  napkin_math: '5M devices, 3 model versions: v1=20% (1M), v2=30% (1.5M), v3=50% (2.5M). Round participation:
    only v3 devices = 2.5M eligible. Sample 10% per round = 250K devices. Version broadcast: send model
    v3 to 1M v1 + 1.5M v2 = 2.5M devices. Model size 100M params fp16 = 200MB. Total download: 2.5M ×
    200MB = 500TB per version update cycle. Delta update (only changed layers): 10MB delta × 2.5M = 25TB.
    At CDN cost $0.01/GB: 25TB = $250K per update. Frequency: monthly updates = $3M/year. Optimize: binary
    delta patching, 1MB deltas → $10K/month.'
