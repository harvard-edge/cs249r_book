schema_version: 1
id: mobile-cell-11079
title: 'Fault Tolerance: Implement Atomic Model Swap for Zero-Downtime Mobile Update'
topic: fault-tolerance-checkpointing
status: published
provenance: imported
scenario: Implement an atomic model update mechanism for a 1B LLM (4-bit quantized, 500MB) on Snapdragon
  8 Gen 3 (45 TOPS INT8, 16GB RAM). The update must not interrupt an in-progress inference request and
  must be rollback-capable within 5 seconds of a crash.
details:
  realistic_solution: 'Use memory-mapped model files. New model: download to temp path → verify SHA256
    → mmap new file → atomic symlink swap → mmap old file stays valid for in-flight inferences → unmap
    old after all requests complete.'
  common_mistake: Replacing the model file in-place while inference may be running — causes corruption.
    Not using memory-mapped files that allow atomic pointer swap.
  napkin_math: '500MB model, memory-mapped. Download to /models/model_new.bin (background, 500MB at LTE
    12.5 MB/s = 40 seconds). SHA256 verify: 500MB at 1 GB/s = 0.5 seconds. mmap new file: OS maps 500MB
    virtual address space instantly (no actual read until accessed). Symlink swap: rename() syscall =
    atomic on POSIX = 0 microseconds. In-flight requests: use reference counting. Old mmap held until
    refcount = 0. At 10 req/sec, each 100ms: max 1 overlapping request = 100ms drain time. Total atomic
    swap: 0ms user-visible downtime. Rollback: keep model_prev.bin. On crash (detected by watchdog in
    1 second): atomic rename model_prev.bin → active. Total rollback: 1s detection + 1ms rename = 1.001
    seconds << 5 second target.'
