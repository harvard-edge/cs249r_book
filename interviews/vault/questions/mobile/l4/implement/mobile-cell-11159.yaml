schema_version: 1
id: mobile-cell-11159
title: 'KV-Cache: Implement KV Cache Size Limiter for Mobile LLM Memory Safety'
topic: kv-cache-management
status: published
provenance: imported
scenario: Implement a KV cache size limiter for a 1B LLM on A17 Pro (35 TOPS, 8GB). The limiter must prevent
  OOM crashes when context grows long, apply graceful truncation at 80% memory threshold, and preserve
  the most informative tokens. Specify the implementation and quantify the memory safety margin.
details:
  realistic_solution: 'Implement H2O (Heavy Hitter Oracle): retain the top-K tokens by cumulative attention
    score plus the most recent W tokens. O(n) check after each generation step.'
  common_mistake: Implementing a simple truncation that drops the oldest tokens without considering that
    first tokens (system prompt) are often most important; not implementing the check efficiently.
  napkin_math: 'A17 Pro: 8GB total. Reserved: OS 2GB + model (INT4) 500MB + activations 200MB + framework
    overhead 500MB = 3.2GB. Available KV: 4.8GB. Safety margin 80%: trigger at 3.84GB. KV per token: 24
    × 2 × 8 × 128 × 2B = 98.3KB. Token limit: 3.84GB / 98.3KB = 39,062 tokens. Far beyond any reasonable
    context (1B models usually max 4096 or 8192 context). Real trigger: context window limit (4096 tokens)
    reached first. 4096 tokens KV: 4096 × 98.3KB = 403MB << 3.84GB limit. Conclusion: for 1B models with
    4096 context, memory safety is not a practical concern on 8GB A17 Pro. Memory limit only relevant
    for: longer contexts (8K+) or smaller RAM devices. For 4GB RAM device: available KV = 4 - 2 - 0.5
    - 0.2 - 0.5 = 0.8GB → 8,138 tokens. 4096-ctx limit: 403MB → fits. 8192-ctx would exceed: need INT8
    KV (49KB/token) → 8192 × 49KB = 401MB. Still fits!'
