id: mobile-cell-11125
title: 'Kernel Fusion: Implement Fused Attention for On-Device LLM on Tensor G3'
topic: kernel-fusion
status: published
provenance: imported
scenario: Implement Flash Attention for a 1B LLM on Tensor G3 (7.5 TOPS, 12GB). The model has 16 heads,
  head dim 64, and must handle sequences up to 2048 tokens. Specify tile sizes for flash attention given
  available SRAM, and compute memory savings vs standard attention.
details:
  realistic_solution: 'Q,K,V activation size = seq × hidden × dtype_bytes. For seq=2048, hidden=1024,
    fp16: 2048 × 1024 × 2B = 4.19MB each.'
  common_mistake: Not knowing Tensor G3's SRAM size; using tiles too large (spill to LPDDR5) or too small
    (poor arithmetic intensity). Not accounting for GQA's different tiling strategy.
  napkin_math: 'Multi-head attention Q,K,V for mobile LLM (seq=2048, hidden=1024, 16 heads, head_dim=64):
    Q tensor: batch=1 × seq=2048 × heads=16 × head_dim=64 × 2B = 2048 × 1024 × 2B = 4.19MB each (not 12.6MB
    — that would require head_dim=192 or 3× seq).'
