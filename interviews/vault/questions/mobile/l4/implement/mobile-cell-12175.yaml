schema_version: 1
id: mobile-cell-12175
title: 'Network Bandwidth Bottlenecks: Implement Flash-Attention BW Reduction for Mobile Inference'
topic: network-bandwidth-bottlenecks
status: published
provenance: imported
scenario: 'Calculate the memory bandwidth savings from using Flash-Attention vs. standard attention for
  a 3B LLM prefill on Snapdragon 8 Gen 3 (77 GB/s). Prefill: 1024 tokens, 32 heads, 128 head_dim, 32 layers.
  Standard attention: write full Q×K^T matrix to LPDDR5X; Flash-Attention: never materializes full matrix.'
details:
  realistic_solution: 'Standard attention per layer: write Q×K^T: [1024×1024×2B=2MB] + read for softmax:
    2MB + write softmax output: 2MB + write V@score: [1024×128×2B=256KB]. Total BW per layer: ~6.25MB.
    32 layers: 200MB extra per prefill. Flash-Attention: tiles computation, never materializes full 1024×1024
    matrix. BW reduction: 6MB/layer × 32 = 192MB saved. At 77GB/s: time saved = 192MB/77GB/s=2.5ms. Prefill
    baseline compute-bound: ~27ms. Flash-Attention saves 2.5ms (9.3% of prefill). Modest but meaningful
    for mobile.'
  common_mistake: Applying Flash-Attention savings to decode (where it doesn't apply the same way) instead
    of prefill; during decode, only 1 new token attends to KV cache, so the QK^T matrix is trivially small.
  napkin_math: 'Standard attention Q×K^T matrix: 1024×1024×2B=2MB per head? No: per layer (all heads combined):
    [batch=1, heads=32, seq=1024, seq=1024]×2B=32×1024²×2B=64MB per layer × 32=2GB total. Flash-Attention:
    never writes this. BW savings: 2GB / 77GB/s=26ms saved per prefill! 27ms prefill baseline → Flash
    reduces to 1ms prefill overhead. Major impact for long-context prefill. (Standard: 64MB per layer
    × 32=2048MB = 2GB).'
