schema_version: 1
id: mobile-0127
title: The WebGPU ML Inference
topic: graph-compilation
status: published
provenance: imported
scenario: Your team debates shipping an ML feature as a native mobile SDK (Core ML / TFLite) vs running
  it in the browser via WebGPU. The PM argues 'WebGPU means write once, run everywhere — no app review,
  instant updates, works on any device with a browser.' The model is a 50M parameter image classifier.
  Walk me through the real performance gap and when WebGPU is the right call.
details:
  realistic_solution: '50M INT8 model: native ANE = 1.8ms, WebGPU = 5.5ms steady-state (1.2s first-inference
    compilation). For a photo app (1 inference/action): 205.5ms (WebGPU) vs 201.8ms (native) — 3.7ms difference,
    imperceptible. Engineering: WebGPU 1 month vs native 3 months. WebGPU wins for: infrequent inference,
    latency > 10ms, instant updates. Native wins for: real-time camera (<16ms budget), sustained inference,
    NPU/ANE access. Compute gap ~3x; often irrelevant.'
  common_mistake: '"WebGPU is just JavaScript — it''ll be 10× slower than native." WebGPU is not WebGL
    or JavaScript-based inference. It''s a low-level GPU API that compiles WGSL shaders to native GPU
    code. The compute gap is smaller than people assume — but the overhead gap is larger.'
  napkin_math: '50M-param model (INT8 = 50 MB). Native (ANE): 1.8ms, 0ms startup. WebGPU: 5.5ms steady-state,
    1.2s first-inference compilation. Overhead breakdown: shader compilation (one-time): 1.2s. Per-inference
    dispatch overhead: 2ms. Data transfer: 0.3ms. Compute: 3.2ms (same GPU). Total steady-state: 5.5ms.
    For a photo app (1 inference per user action): user perceives 200ms (UI) + 5.5ms (WebGPU) = 205.5ms
    vs 200ms + 1.8ms (native) = 201.8ms. Difference: 3.7ms. Imperceptible. Engineering cost: WebGPU (one
    codebase): 1 engineer-month. Native (iOS + Android): 3 engineer-months. WebGPU saves 2 engineer-months
    for a 3.7ms latency trade-off.'
