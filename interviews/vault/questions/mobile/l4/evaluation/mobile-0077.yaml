id: mobile-0077
title: The Photo Segmentation Pipeline
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: 'When a user takes a Portrait Mode photo on a Pixel 8 Pro (Tensor G3), the pipeline is: capture
  → depth estimation → person segmentation → bokeh rendering. The user expects the result within 500ms
  of pressing the shutter. The Tensor G3 has a dual-core TPU at 10 TOPS and an Adreno-class GPU. Break
  down the latency of each stage and identify the bottleneck.'
details:
  realistic_solution: 'Break down each stage: ISP: 100ms (fixed). Depth: 45ms (TPU). Segmentation: 25ms
    (TPU). Bokeh at 12 MP: 130ms (GPU, bottleneck). Bokeh at 3 MP: 30ms (GPU). Total optimized: **200ms**
    (within 500ms budget, 60% margin). The ML stages (depth + segmentation) total 70ms — only 35% of the
    pipeline. The ISP and rendering dominate.'
  common_mistake: '"The ML model (segmentation) is the bottleneck." In modern pipelines, the ML inference
    is often the fastest stage — the bottleneck is usually ISP processing or the bokeh rendering.'
  napkin_math: 'ISP: 100ms (fixed). Depth: 45ms (TPU). Segmentation: 25ms (TPU). Bokeh at 12 MP: 130ms
    (GPU, bottleneck). Bokeh at 3 MP: 30ms (GPU). Total optimized: **200ms** (within 500ms budget, 60%
    margin). The ML stages (depth + segmentation) total 70ms — only 35% of the pipeline. The ISP and rendering
    dominate.'
