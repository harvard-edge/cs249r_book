schema_version: 1
id: mobile-0082
title: The Hardware Decoder Synchronization
topic: real-time-deadlines
status: published
provenance: imported
scenario: Your app runs an action recognition model on a live video stream. You use the Android MediaCodec
  API to decode the H.264 video using hardware. You then convert the frame to a tensor and run inference.
  The model takes 15ms. The hardware decode takes 10ms. You should easily hit 30 FPS. However, the app
  frequently drops frames and stutters. What is fundamentally wrong with putting hardware decoding in
  the critical path of a synchronous loop?
details:
  realistic_solution: 'Synchronous wait on an asynchronous peripheral. Hardware decoders have variable
    latency: 3 frames in 5ms, then 25ms for a keyframe. Blocking on the 25ms frame misses the 33ms deadline.
    Fix: decouple with a producer-consumer ring buffer. Decoder writes asynchronously; inference reads
    the latest frame. The buffer absorbs jitter — during keyframe stalls, inference uses a slightly stale
    frame (imperceptible at 30 FPS). Never put hardware decode in the synchronous critical path.'
  common_mistake: '"The hardware decoder is slow." Hardware decoders are extremely fast, but they are
    highly asynchronous.'
  napkin_math: A hardware decoder might decode 3 frames in 5ms, then take 25ms to decode the next frame
    due to keyframe dependencies. If your ML thread blocks on that 25ms frame, it misses its 33ms deadline.
    Decoupling absorbs the 25ms jitter perfectly.
