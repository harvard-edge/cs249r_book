schema_version: 1
id: mobile-cell-13200
title: 'Mobile Transformer Cost Evaluation: Snapdragon vs A17 Pro LLM Performance'
topic: transformer-systems-cost
status: published
provenance: imported
scenario: 'Compare Snapdragon 8 Gen 3 (45 TOPS, 16GB LPDDR5X at 77GB/s) vs A17 Pro (35 TOPS, 8GB at 100GB/s)
  for running Phi-3-Mini-3.8B INT4 (1.9GB). Calculate decode throughput (tokens/second), latency for 200-token
  response, and which platform better utilizes its memory advantage for LLM decode. Model: 32 layers,
  2048 hidden, 32 heads.'
details:
  realistic_solution: 'Phi-3 INT4: 1.9GB. Decode is memory-bandwidth-bound at batch=1 (proven: AI << ridge
    for both platforms). Snapdragon: 1.9GB/77GB/s=24.7ms/tok=40.5 tok/s. A17 Pro: 1.9GB/100GB/s=19ms/tok=52.6
    tok/s. A17 Pro wins despite lower TOPS (52.6 vs 40.5 tok/s = 30% faster). 200 token response: Snap=4.94s,
    A17=3.8s. Both exceed 3s SLO! For 100 tokens: Snap=2.47s, A17=1.9s. Both meet 3s SLO at 100 tokens.
    TOPS comparison is irrelevant for LLM decode — bandwidth wins. A17''s 100GB/s vs Snap''s 77GB/s gives
    30% advantage despite 22% lower TOPS.'
  common_mistake: Assuming higher TOPS wins for LLM decode without verifying that decode is always memory-bandwidth-bound
    at batch=1, making bandwidth (GB/s) the only relevant metric.
  napkin_math: 'Snap 8G3: BW=77GB/s. Phi-3 INT4: 1.9GB. Decode: 1.9/77=24.7ms/tok. 200 toks: 4.94s. A17
    Pro: BW=100GB/s. 1.9/100=19ms/tok. 200 toks: 3.8s. A17 wins by 1.3x. TOPS ratio: Snap=45, A17=35 (Snap
    29% higher). BW ratio: A17/Snap=100/77=1.30 (A17 30% higher). For LLM decode: BW matters, TOPS doesn''t.
    A17''s bandwidth advantage overcomes TOPS disadvantage. Lesson: for marketing mobile chips for LLM:
    advertise memory bandwidth, not TOPS. Apple understood this with M-series (M2: 200GB/s bandwidth,
    M3: 150GB/s, optimized differently).'
