schema_version: 1
id: mobile-cell-10142
title: Evaluate EfficientNet-Lite vs MobileNetV3 for CoreML ANE deployment accuracy-latency
topic: cnn-efficient-design
status: published
provenance: imported
scenario: 'You must pick a backbone for an iOS app that classifies food items (101 categories) running
  on iPhone 15 Pro (A17 Pro). Candidates: EfficientNet-Lite4 (0.571 GFLOPs, 80.4% top-1, ReLU6), MobileNetV3-Large
  1.0× (0.22 GFLOPs, 75.2% top-1, H-swish), and MobileNetV2-1.4× (0.582 GFLOPs, 74.7% top-1, ReLU6). Evaluate
  for Core ML ANE deployment on A17 Pro.'
details:
  realistic_solution: 'ANE mapping quality: EfficientNet-Lite4 and MobileNetV2-1.4× use ReLU6 — native
    ANE support, full fusion. MobileNetV3 uses H-swish — ANE approximates with hardsigmoid, adds 1 extra
    op per activation. Estimate: Lite4 ANE latency ~3.5ms (published by Apple ML Research); MV2-1.4× ~2.8ms;
    MV3-Large ~2.1ms (fewer FLOPs despite activation overhead). Accuracy on food-101 after fine-tuning:
    Lite4 ~91%, MV3-Large ~87%, MV2 ~85%. Decision: Lite4 for accuracy-critical use, MV3-Large for latency-critical.
    At 3.5ms, Lite4 easily handles 30 FPS (33ms budget).'
  common_mistake: Choosing MobileNetV3 because it has fewest FLOPs without profiling ANE performance;
    H-swish requires sigmoid approximation on ANE while ReLU6 (used by Lite4 and MV2) maps directly, potentially
    making Lite4 faster despite more FLOPs.
  napkin_math: 'Food-101 fine-tuning benefit over ImageNet: typically +8-12pp for domain-specific fine-tuning.
    Lite4 base 80.4% → fine-tuned ~91%. A17 Pro ANE at 35 TOPS. Lite4: 0.571G/35T = 16.3μs theoretical
    → practical ~3.5ms (215× scheduling overhead). MV3-Large: 0.22G/35T = 6.3μs → practical ~2.1ms (333×
    overhead; H-swish adds overhead). MV2-1.4×: 0.582G/35T = 16.6μs → practical ~2.8ms (169× overhead).
    User-facing: all under 5ms → invisible latency. Choose on accuracy: Lite4 wins.'
