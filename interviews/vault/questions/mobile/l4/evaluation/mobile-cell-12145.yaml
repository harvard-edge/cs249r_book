id: mobile-cell-12145
title: 'Network Bandwidth Bottlenecks: Evaluate Speculative Decoding Bandwidth Impact on Mobile'
topic: network-bandwidth-bottlenecks
status: published
provenance: imported
scenario: Evaluate whether speculative decoding (using a 100M draft model + 3B INT4 target model) improves
  TPOT on Snapdragon 8 Gen 3 (16GB, 77 GB/s). The draft model generates 4 tokens per step, target model
  verifies. Compare total bandwidth consumption and effective TPOT.
details:
  realistic_solution: 'Expected tokens per speculative decoding step with K=4 proposals and α=0.8: (1
    - 0.8^4)/(1 - 0.8) = (1 - 0.4096)/0.2 = 2.952 (not 3.36 which uses K=5 or incorrect formula).'
  common_mistake: Assuming speculative decoding speeds up mobile inference the same as server-side; on
    mobile, the bandwidth bottleneck is the target model weights (3B INT4 = 1.5GB), and verification requires
    reading them anyway.
  napkin_math: 'Speculative decoding with K=4 draft tokens, acceptance rate α=0.8: E[accepted tokens]
    = (1 - α^(K+1)) / (1 - α) = (1 - 0.8^5) / (1 - 0.8) = (1 - 0.32768) / 0.2 = 0.67232 / 0.2 = 3.362...
    wait: (1-0.8^4)/(1-0.8) = (1-0.4096)/0.2 = 0.5904/0.2 = 2.952 (not 3.36). The formula for expected
    accepted tokens when proposing K tokens with acceptance rate α: sum_{k=0}^{K} α^k = (1 - α^(K+1))/(1-α).
    For K=4 proposals: sum_{k=1}^{4} α^k + 1 bonus = (1-α^5)/(1-α). But the correction is: (1-0.8^4)/(1-0.8)
    = 2.952, not 3.36.'
