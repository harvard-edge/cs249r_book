schema_version: 1
id: mobile-0703
title: The Cross-SoC Accuracy Divergence
topic: quantization-fundamentals
status: published
provenance: imported
scenario: You deploy the same TFLite INT8 face verification model on a Pixel 8 Pro (Tensor G3) and a Samsung
  Galaxy S23 (Snapdragon 8 Gen 2). On Pixel, the false acceptance rate (FAR) is 0.1% — within spec. On
  Galaxy S23, the FAR jumps to 1.2% — 12× worse, making the biometric feature unusable. Same model binary,
  same test images. What's causing the accuracy divergence?
details:
  realistic_solution: 'Three sources cause divergent INT8 results across SoCs: (1) Different rounding
    modes in the NPU''s requantization step (round-half-up vs round-half-to-even). (2) Different implementations
    of transcendental approximations (reciprocal sqrt, exp) in the softmax/normalization layers. (3) Different
    accumulator bit-widths (INT16 vs INT32) for intermediate dot products. The face verification threshold
    sits on the steep tail of the impostor distribution — a systematic +0.056 cosine similarity shift
    on Snapdragon increases FAR from 0.1% to 1.2%. Fix: use per-SoC threshold calibration with a reference
    dataset, costing only 50 bytes of config per SoC family.'
  common_mistake: '"The Snapdragon NPU is less accurate than Google''s TPU." Both NPUs compute INT8 arithmetic
    correctly — the divergence is not in the MAC units but in how the surrounding operations are implemented.'
  napkin_math: 'Embedding dimension: 128. Per-dimension error from reciprocal sqrt approximation: +/-0.005.
    Cosine similarity error (random walk): sqrt(128) * 0.005 = 0.056 per comparison. Verification threshold:
    0.65. Genuine pair similarity: 0.72. Margin: 0.72 - 0.65 = 0.07. Error of 0.056 consumes 80% of margin.
    On Tensor G3 (Pixel 8 Pro): custom SIMD uses fast_rsqrt with 0.1% error, margin consumption <5%. On
    Snapdragon 8 Gen 2 Hexagon DSP: fixed-point rsqrt with 0.5% error, margin consumption ~80%. Inference
    latency: 8 ms on both chips. Accuracy gap: FAR 0.1% vs 1.2% (12x worse) entirely from numerical precision,
    not compute speed.'
