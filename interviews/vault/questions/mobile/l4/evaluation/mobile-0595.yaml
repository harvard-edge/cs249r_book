schema_version: 1
id: mobile-0595
title: The CPU-GPU Asynchronous Desync
topic: real-time-deadlines
status: published
provenance: imported
scenario: Your mobile app applies an ML filter to a live video feed. The camera produces frames at 30
  FPS. The GPU runs the ML filter in 20ms. The CPU submits the job to the GPU, waits for it to finish
  using `glFinish()`, and then renders it to the screen. You notice the framerate is only 22 FPS, even
  though 20ms is well under the 33ms deadline. What pipeline rule did you break?
details:
  realistic_solution: 'You broke the pipeline by forcing **Synchronous Execution (`glFinish`)**. This
    call blocks the CPU until the GPU has completely finished rendering, creating a serial dependency.
    Instead of overlapping CPU and GPU work (double-buffering), the CPU idles for the entire GPU execution.
    Worse, the synchronization boundary forces alignment with the display vsync, adding additional dead
    time. The total serialized cost per frame becomes ~45ms (5ms CPU + 20ms GPU + 5ms CPU + 15ms vsync
    alignment), yielding the observed 22 FPS. The fix is to use double-buffered async submission: the
    CPU prepares frame N+1 while the GPU renders frame N, achieving max(CPU, GPU) = 20ms per frame.'
  common_mistake: '"The GPU is slower than 20ms in reality." The GPU is fast; the CPU is blocking it.'
  napkin_math: 'Serialized pipeline with glFinish(): CPU submit (5ms) → GPU inference (20ms) → CPU postprocess
    + render (5ms) → glFinish blocks (15ms wait for vsync alignment).

    - Total per-frame time: 5 + 20 + 5 + 15 = **45 ms** → 1000/45 = **~22 FPS**. Matches observed behavior.


    The extra 15ms comes from vsync alignment: glFinish() forces a full GPU pipeline drain, and the CPU
    cannot submit the next frame until the current one is fully rendered. The GPU-CPU round-trip plus
    vsync boundary alignment adds ~15ms of dead time.


    Async pipeline (double-buffered, no glFinish): CPU submits frame N+1 while GPU processes frame N.

    - Effective per-frame time: max(CPU, GPU) = max(10, 20) = **20 ms** → **50 FPS** (capped at 30 FPS
    by vsync).

    - Latency increases by one frame (33ms) but throughput doubles.'
