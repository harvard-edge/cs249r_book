schema_version: 1
id: mobile-0048
title: The On-Device Fine-Tuning Pipeline
topic: 3d-parallelism
status: draft
provenance: imported
scenario: Your photo app has a 'search by description' feature powered by a CLIP-like model. Users in
  Japan complain it doesn't understand Japanese food categories. Users in Brazil say it misclassifies
  local bird species. You can't collect user photos on your servers. Design an on-device personalization
  system that adapts the model to each user's photo library.
details:
  realistic_solution: 'LoRA on-device: freeze the 150M-param base (300 MB, mmap''d) and train 73K LoRA
    parameters (294 KB). Training: 200 image-text pairs x 50 steps in ~90s on NPU. Memory: 300 MB frozen
    + 294 KB trainable + 50 MB activations = ~350 MB (fits 4+ GB RAM). Personalization: +12% recall on
    user-specific categories. Train during overnight charging. Store per-user adapters; the shared base
    model is never modified. Never fine-tune the full 150M params on a phone.'
  common_mistake: '"Fine-tune the entire model on-device." A CLIP model has 150M+ parameters. Fine-tuning
    all of them on a phone would take hours and drain the battery.'
  napkin_math: 'Base model: 150M params, 300 MB (FP16). LoRA adapters: 73K params, 294 KB. Training: 200
    pairs × 50 steps = 10,000 forward+backward passes. Time: 90 seconds on NPU. Memory during training:
    300 MB (frozen weights, mmap''d) + 294 KB (trainable) + 50 MB (activations + gradients for trainable
    params only) = ~350 MB. Fits on any phone with 4+ GB RAM. Personalization improvement: +12% recall
    on user-specific categories (measured in internal testing with Japanese and Brazilian photo libraries).'
