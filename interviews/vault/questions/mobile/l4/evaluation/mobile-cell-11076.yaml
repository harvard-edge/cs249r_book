schema_version: 1
id: mobile-cell-11076
title: 'Fault Tolerance: Evaluate On-Device vs Cloud Recovery for Mobile ML State'
topic: fault-tolerance-checkpointing
status: published
provenance: imported
scenario: 'A personalization model on Snapdragon 8 Gen 3 (45 TOPS INT8, 16GB) loses its LoRA adaptation
  state after a factory reset. Compare (A) cloud recovery: re-download from cloud backup (2MB LoRA state),
  vs (B) rebuild: re-run 500-example local training dataset. Evaluate recovery time, user experience,
  and privacy implications of each.'
details:
  realistic_solution: On-device inference latency for MobileNet-class models is in the millisecond range,
    not seconds. 45 TOPS INT8 easily handles 220M MAC models at well under 10ms.
  common_mistake: Always preferring cloud recovery without considering that cloud storage of personalization
    data is a privacy risk; not measuring rebuild time.
  napkin_math: 'Snapdragon 8 Gen 3: 45 TOPS INT8. MobileNetV3 (5.4M MACs, INT8): 5.4M × 2 ops/MAC = 10.8M
    ops. But full inference model ~220M MACs. 220M × 2 / 45T = 8.5ms per inference (not 8.5 seconds).
    Batch=1 decode: latency-bound.'
