schema_version: 1
id: mobile-0131
title: The Camera VSync Deadlock
topic: real-time-deadlines
status: published
provenance: imported
scenario: Your mobile app captures camera frames, runs ML inference, and draws the bounding box to the
  screen. The screen refreshes at 60Hz (16.6ms). The ML model takes 12ms. The camera outputs frames at
  60 FPS (16.6ms). Logically, you have 4.6ms of headroom per frame. However, the app consistently drops
  every other frame, running at a jittery 30 FPS. What pipeline synchronization issue caused this?
details:
  realistic_solution: 'Pipeline phase-misaligned with VSync. Camera arrives at offset 5ms. ML (12ms) completes
    at 17ms — 0.4ms past the 16.6ms VSync. Compositor waits until next VSync at 33.3ms = 30 FPS. Fix:
    decouple into async stages with ring buffers. Camera, ML, and render run independently. Render always
    composites the latest available result at VSync, regardless of ML timing. The 4.6ms margin becomes
    real when stages are decoupled.'
  common_mistake: '"The phone is thermal throttling." If it was throttling, the model would take longer
    than 12ms. The model still takes exactly 12ms.'
  napkin_math: Camera offset (5ms) + ML (12ms) = 17ms. 17 > 16.6. The OS forces a wait until 33.3ms. 1000ms
    / 33.3ms = 30 FPS maximum throughput.
