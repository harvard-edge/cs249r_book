id: mobile-0748
title: The Silicon Shared Oven
topic: power-budgeting
status: published
provenance: imported
scenario: Your real-time translation app works perfectly until the user starts a 3D game in picture-in-picture
  mode. Suddenly, your NPU translation latency triples. Based on the SoC diagram, why is the game affecting
  the NPU speed?
details:
  realistic_solution: You are hitting **Global Thermal Throttling**. In a mobile SoC, all cores share
    the same silicon die and thermal envelope. When the GPU generates massive heat from a game, the system's
    DVFS controller downclocks *the entire SoC*—including the NPU—to stay within safe skin-temperature
    limits. The fix is to use hyper-optimized, low-power models that can still meet deadlines even when
    the SoC is forced into its lowest frequency state.
  common_mistake: '"The game is stealing NPU cycles." The game uses the GPU, not the NPU. They are separate
    physical cores.'
  napkin_math: A phone can only dissipate ~3-5 Watts sustained. If a 3D game pulls 4 Watts, the NPU is
    left with <1 Watt of thermal margin, triggering immediate frequency capping.
