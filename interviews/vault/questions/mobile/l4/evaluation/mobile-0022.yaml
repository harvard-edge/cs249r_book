id: mobile-0022
title: The Offline-First ML Design
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: 'You''re building a plant identification app that must work in remote areas with no cellular
  or WiFi connectivity. The cloud model (ResNet-152, 230 MB, 96% accuracy) is too large for on-device.
  Design the offline-first ML architecture: what model do you ship, how do you handle the accuracy gap,
  and what''s the total on-device storage budget? Target device: a mid-range phone with 4 GB RAM and 64
  GB storage (MediaTek Dimensity 7200).'
details:
  realistic_solution: 'Design a tiered offline-first system: ship the domain-tuned 5.3 MB model on-device.
    This achieves a 43× size reduction and easily fits within the device''s RAM (1.4%) and storage (1.9%)
    budgets. To handle the 4% accuracy gap, implement confidence thresholding: high-confidence predictions
    are shown immediately offline, while low-confidence predictions are saved and submitted for deferred
    verification by the 96% accurate 230 MB cloud model once connectivity is restored. This provides a
    fast offline experience while maintaining near-cloud accuracy.'
  common_mistake: '"Just compress the ResNet-152 to fit on-device." Compressing a large model designed
    for cloud inference produces a worse accuracy/size trade-off than using a model architecturally designed
    for mobile from the start.'
  napkin_math: 'Cloud model: 230 MB, 96% accuracy. On-device: 5.3 MB, 92% accuracy (domain-tuned). Size
    reduction: **43×**. Accuracy gap: **4%** (mitigated by confidence thresholding + deferred verification).
    Effective accuracy with deferred verification: ~95% (cloud corrects the 8% of low-confidence predictions
    within 24 hours). Storage: 1.23 GB / 64 GB = 1.9%. RAM: 5.3 MB model + 50 MB runtime = 55 MB / 4 GB
    = 1.4%. The offline model is viable on even budget hardware.'
