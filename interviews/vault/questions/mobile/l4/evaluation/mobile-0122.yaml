id: mobile-0122
title: The iOS vs Android ML Framework Maze
topic: graph-compilation
status: published
provenance: imported
scenario: Your company ships a cross-platform camera app with real-time style transfer. On iOS (iPhone
  15, A16 Bionic), the model runs at 22ms via CoreML. On Android (Pixel 8, Tensor G3), the same ONNX model
  runs at 45ms via TFLite with NNAPI delegate. The hardware specs are comparable. Why is there a 2× performance
  gap, and how do you close it?
details:
  realistic_solution: 'The 2x gap is software stack friction, not hardware. CoreML compiles directly to
    ANE with tight fusion. Android NNAPI adds: (1) HAL dispatch (+3ms), (2) partial op coverage forcing
    CPU fallback (+5ms), (3) data copies between CPU/NPU (+4ms). Closing: bypass NNAPI with QNN SDK (45->30ms),
    zero-copy buffers (30->27ms), replace unsupported ops (27->24ms). Gap: 22ms vs 24ms = 1.09x (from
    2x). NNAPI is an abstraction tax; direct vendor SDKs recover performance.'
  common_mistake: '"Apple''s hardware is just faster." The A16 and Tensor G3 have comparable NPU TOPS
    (~17 TOPS vs ~20 TOPS). The gap is in the software stack.'
  napkin_math: 'iOS (CoreML → ANE): 22ms = 2ms preprocessing + 18ms ANE + 2ms postprocessing. Android
    (NNAPI → TPU): 45ms = 5ms preprocessing + 3ms NNAPI overhead + 28ms TPU + 4ms data copies + 5ms CPU
    fallback layers. After bypassing NNAPI (direct QNN SDK): 45ms → 30ms (33% improvement). After zero-copy
    camera buffer: 30ms → 27ms. After replacing instance norm with group norm (NPU-supported): 27ms →
    24ms. Gap closed from 2× to 1.09×.'
