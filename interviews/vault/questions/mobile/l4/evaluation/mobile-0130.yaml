id: mobile-0130
title: The Thermal Camera Defocus
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: You deploy an edge ML model on a thermal security camera. It detects humans perfectly in the
  winter. In the summer, the camera enclosure heats up significantly. The model's accuracy drops to near
  zero. The camera isn't thermal throttling, and the ambient temperature isn't higher than a human body.
  You look at the raw thermal images, and they are completely blurry. What physical property of the hardware
  failed?
details:
  realistic_solution: 'Germanium lens thermal expansion. The coefficient causes ~50um lens shift over
    a 30C swing. With 10um depth of field, 50um destroys optical focus — sharp 10x10 pixel faces become
    blurry 30x30 gradients. The model processes garbage input correctly. Fix: (1) athermalized lens design
    with compensating materials, (2) autofocus with calibration target, or (3) software deconvolution
    (partial recovery). This is a physics problem, not an ML problem.'
  common_mistake: '"Thermal cameras can''t see humans when it''s hot." They can, if the background isn''t
    exactly 98.6F. The prompt says the images are blurry, not washed out.'
  napkin_math: A Germanium lens might expand by 50 micrometers over a 30°C temperature swing. If the depth
    of field is only 10 micrometers, a 50um shift completely destroys the optical focus, turning a sharp
    10x10 pixel human face into a blurry 30x30 gradient.
