schema_version: 1
id: mobile-0578
title: The NNAPI Fragmentation Problem
topic: graph-compilation
status: published
provenance: imported
scenario: 'You deploy the same TFLite INT8 model across three Android flagships: Samsung Galaxy S24 (Snapdragon
  8 Gen 3), Google Pixel 8 Pro (Tensor G3), and Samsung Galaxy S24 FE (Exynos 2400). Using NNAPI delegation,
  you measure: Snapdragon — 6ms, Tensor G3 — 9ms, Exynos — 22ms. Same model, same API, 3.7× performance
  spread. Explain the three layers of fragmentation causing this.'
details:
  realistic_solution: 'Three fragmentation layers compound: (1) Op coverage — Snapdragon runs 95% on NPU,
    Exynos only 70% (missing depthwise variants). (2) Quantization — Exynos adds 20% overhead on asymmetric
    INT8. (3) Compiler maturity — Qualcomm fuses aggressively; Samsung leaves ops unfused. Snapdragon:
    6ms (5ms NPU + 0.5ms CPU + 0.5ms transfer). Exynos: 22ms (8.3ms NPU + 3ms CPU + 10.7ms transfers).
    Fix: ship simplified model variant for Exynos using only well-supported ops.'
  common_mistake: '"The Exynos just has a slower NPU." While raw NPU performance differs, the 3.7× gap
    far exceeds the hardware capability difference — the Exynos 2400 NPU is rated at ~45 TOPS vs Snapdragon''s
    ~60 TOPS (only ~1.3× difference).'
  napkin_math: 'Snapdragon: 95% NPU (5ms) + 5% CPU (0.5ms) + 1 transfer (0.5ms) = **6ms**. Tensor G3:
    90% NPU (6ms) + 10% CPU (1ms) + 2 transfers (2ms) = **9ms**. Exynos: 70% NPU (6ms × 1.2 quant × 1.15
    compiler = 8.3ms) + 30% CPU (3ms) + 10 transfers (10.7ms) = **22ms**. The transfer overhead from poor
    op coverage dominates on Exynos.'
