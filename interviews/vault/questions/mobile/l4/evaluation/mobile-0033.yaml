schema_version: 1
id: mobile-0033
title: The Device-Free ML Testing Strategy
topic: monitoring-observability
status: published
provenance: imported
scenario: Your team ships an ML-powered camera feature to 200 million users across iOS and Android. You
  don't have a device farm — you have 5 test phones on your desk. How do you test the ML pipeline across
  devices without a device farm?
details:
  realistic_solution: 'Multi-layer testing pyramid. Layer 1 (unit, ~60%): validate conversion, preprocessing,
    output shapes in CI — $0. Layer 2 (integration, ~20%): memory lifecycle, threading, camera pipeline
    in emulators — $0. Layer 3 (cloud devices, ~15%): 20+ real devices via Firebase/AWS Device Farm —
    $600/month. Layer 4 (canary, ~4%): deploy to 1% of users, monitor crash rate and P95 latency for 24h.
    Remaining ~1% found in production via telemetry. Total: $600/month to cover 100+ devices without owning
    any.'
  common_mistake: '"Test on our 5 phones and rely on crash reports from production." This means your 200
    million users are your test farm. You''ll discover bugs from 1-star reviews.'
  napkin_math: 'Testing pyramid coverage: Unit tests catch ~60% of bugs (model conversion, preprocessing).
    Integration tests catch ~20% (memory, threading, lifecycle). Cloud device tests catch ~15% (hardware-specific
    failures, delegate bugs). Canary catches ~4% (real-world edge cases). Remaining ~1%: discovered in
    production. Cost: Unit + integration: $0 (CI time). Cloud devices: $150 × 4 releases/month = $600/month.
    Canary: $0 (uses production infrastructure). Total: **$600/month** to test across 100+ devices without
    owning any.'
