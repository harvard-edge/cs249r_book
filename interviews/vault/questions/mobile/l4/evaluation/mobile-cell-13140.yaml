schema_version: 1
id: mobile-cell-13140
title: 'Mobile TCO Evaluation: On-Device vs Cloud for Photo Enhancement App'
topic: tco-cost-modeling
status: published
provenance: imported
scenario: 'A photo enhancement app uses Stable Diffusion v1.5 (4B params, fp16). Compare: (A) Snapdragon
  8 Gen 3 (45 TOPS, 16GB, $0 marginal inference cost, 8W for SD), (B) Cloud H100 ($0.01/image generation).
  User generates 5 images/day. Calculate 2-year TCO per user including device battery cost, and annual
  cloud cost. Which is cheaper and at what volume does the crossover occur?'
details:
  realistic_solution: 'Snapdragon 16GB: SD v1.5 at FP16 needs ~9.2GB — fits with 6.8GB remaining for OS.
    On-device inference: 50-step SD at 8W: ~30 seconds per image. Energy: 8W*30s=240J=0.0667Wh per image.
    Annual: 5*365*0.0667=121.7Wh=$0.01217/yr. Cloud: 5*365*$0.01=$18.25/yr. Cloud is 1500x more expensive
    per user. Break-even: on-device wins above... the marginal cost of on-device is $0.0000067/image vs
    $0.01 → cloud is 1493x more expensive at any volume. On-device always wins once device is owned.'
  common_mistake: 'Stable Diffusion v1.5 in FP16 requires 8GB (UNet) + VAE (0.8GB) + CLIP (0.4GB) = 9.2GB:
    barely fits in 16GB Snapdragon. A17 Pro with 8GB cannot run it at all. Must verify memory fit before
    cost analysis.'
  napkin_math: 'On-device energy: 8W*30s=240J=0.067Wh/image. Annual: 5*365*0.067=122Wh=$0.0122/yr. Cloud:
    5*365*$0.01=$18.25/yr. Ratio: 18.25/0.0122=1496x. Battery wear: 0.067Wh/image / 5000mAh*3.7V = 0.067/18.5Wh=0.36%
    battery drain per image. 5 images: 1.8% drain. Battery cycle cost: $69 every 500 full charges → $0.138/charge.
    1.8% drain = 0.018 partial charges = $0.00248 battery wear/day. Annual: $0.906. Total on-device: $0.0122+$0.906=$0.918/yr
    vs cloud $18.25/yr. On-device 19.9x cheaper including battery wear.'
