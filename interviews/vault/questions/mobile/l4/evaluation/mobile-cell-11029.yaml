id: mobile-cell-11029
title: 'Dataset Curation: Evaluate Federated Data Heterogeneity Impact on Mobile Model Quality'
topic: dataset-curation
status: published
provenance: imported
scenario: 'You run federated learning for a language model across 1M Snapdragon 8 Gen 3 (45 TOPS INT8,
  16GB) devices. Device data is highly non-IID: users in different countries have different language distributions.
  Evaluate the impact of data heterogeneity on global model quality and propose a mitigation strategy.'
details:
  realistic_solution: 'Measure heterogeneity: compute KL divergence between per-device token distributions
    and global. High KL (>1.0) indicates severe non-IID. FedAvg degrades significantly: 5-15% accuracy
    drop vs IID. Mitigation: SCAFFOLD, FedProx, or cluster-and-federate by language group.'
  common_mistake: Using vanilla FedAvg without measuring heterogeneity; assuming gradient aggregation
    handles non-IID automatically.
  napkin_math: '1M devices, 50 languages, avg 20K devices per language. FedAvg accuracy degradation model:
    for KL divergence D, accuracy drop ≈ 2% × D. Measured KL between language groups: ~3.0. Expected drop:
    6% accuracy. FedProx (μ=0.1): reduces effective KL by ~40% → 3.6% drop. Clustered federated (50 language
    clusters): each cluster is nearly IID → < 1% drop. Cost of clustering: 50 separate aggregation servers
    vs 1. Storage: 50 × model_size. For 100M param model at bf16 = 200MB per cluster: 50 × 200MB = 10GB
    — acceptable.'
