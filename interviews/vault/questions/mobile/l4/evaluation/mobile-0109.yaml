schema_version: 1
id: mobile-0109
title: The TDP Wall
topic: power-budgeting
status: published
provenance: imported
scenario: Apple claims the A17 Pro's Neural Engine delivers 35 TOPS. Qualcomm claims the Snapdragon 8
  Gen 3's Hexagon NPU delivers 45 TOPS. Your ML team benchmarks the same INT8 MobileNetV2 on both and
  gets nearly identical inference times (~3.8ms). How can a 45 TOPS chip tie with a 35 TOPS chip, and
  what does this tell you about evaluating mobile SoCs for ML?
details:
  realistic_solution: TOPS is a **peak theoretical throughput** measured under ideal conditions — all
    MAC units active, 100% utilization, no memory stalls. Real inference performance is governed by **Thermal
    Design Power (TDP)** and **memory bandwidth**, not peak TOPS.
  common_mistake: '"Qualcomm''s TOPS number must be inflated." Both numbers are technically accurate —
    the issue is what TOPS actually measures.'
  napkin_math: 'MobileNetV2 INT8: ~0.6 GOPS. Weight size: ~3.4 MB. At LPDDR5X 68 GB/s: weight load = 3.4
    MB / 68 GB/s = 0.05ms. Compute at 30 TOPS: 0.6 / 30,000 = 0.02ms. Overhead (kernel launch, tensor
    copy, activation functions): ~3.7ms. Total: ~3.8ms on both chips. The 3.7ms overhead dominates — neither
    chip''s TOPS advantage matters. For a 7B LLM (3.5 GB INT4): weight load = 3.5 GB / 68 GB/s = 51ms
    per token. *Now* TOPS and bandwidth both matter.'
