id: mobile-0031
title: The Mobile ML CI/CD Pipeline
topic: mlops-lifecycle
status: published
provenance: imported
scenario: Your ML team trains models in PyTorch on cloud GPUs. Your mobile team consumes Core ML and TFLite
  models. Currently, the handoff is a Slack message with a Google Drive link. Last month, someone shipped
  a model trained on the wrong dataset, and it took 3 days to notice. Design a CI/CD pipeline that prevents
  this.
details:
  realistic_solution: 'Build a model-aware CI/CD pipeline. (1) Model registry (not Git) stores versioned
    artifacts with dataset hash, hyperparameters, metrics. (2) Automated conversion: PyTorch -> ONNX (2
    min) -> CoreML + TFLite (6 min). (3) Quality gates: accuracy on golden test set within 1% of baseline
    (catches wrong-dataset in 15 min, not 3 days). (4) On-device testing via Firebase Test Lab ($3/version).
    (5) Cryptographic signing. Total: 18 min, $30/week.'
  common_mistake: '"Add the model to the app''s git repo and use pull requests for review." ML models
    are 20-200 MB binary blobs. Git is not designed for this — your repo will balloon, clones will take
    forever, and diffs are meaningless on binary files.'
  napkin_math: 'Manual handoff: 3 days to detect wrong dataset. CI/CD pipeline: quality gate catches it
    in ~15 minutes (accuracy test fails because wrong dataset → different accuracy). Conversion pipeline
    runtime: PyTorch → ONNX (2 min) → Core ML (3 min) → TFLite (3 min) → device testing (10 min) = 18
    minutes total. Cost: Firebase Test Lab at $5/device-hour × 0.2 hours × 3 devices = $3 per model version.
    At 10 model versions/week: $30/week.'
