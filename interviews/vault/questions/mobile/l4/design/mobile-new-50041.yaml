schema_version: 1
id: mobile-new-50041
title: 'Cross-Platform Mobile Inference: TFLite GPU Delegate on Android vs CoreML on iOS'
topic: software-portability
status: published
provenance: imported
scenario: You build a real-time style transfer app targeting both iOS (A17 Pro) and Android (Snapdragon
  8 Gen 3, 45 TOPS, Adreno 750 GPU). You need a single model codebase that achieves <20ms latency on both
  platforms. Evaluate your runtime options.
details:
  realistic_solution: 'Optimal strategy: use a single ONNX model as the source format, then branch at
    deployment. iOS: convert ONNX to CoreML via coremltools to access ANE (35 TOPS) + GPU (Apple GPU).
    Android: use ONNX Runtime with QNN EP (Qualcomm AI Engine, accesses Hexagon NPU at 45 TOPS) or TFLite
    with Hexagon delegate. Alternative: MediaPipe, which handles the iOS/Android split internally using
    CoreML on iOS and TFLite+GPU on Android. For style transfer (~6 GFLOPS), both platforms easily meet
    20ms: A17 Pro ANE: ~0.17ms compute, Snapdragon 8G3 NPU: ~0.13ms compute. Actual latency dominated
    by memory transfers.'
  common_mistake: Using TFLite for both platforms because it is cross-platform. On iOS, TFLite's GPU delegate
    uses Metal but cannot access the Neural Engine, leaving 35 TOPS of dedicated AI compute unused.
  napkin_math: 'Style transfer model: ~6 GFLOPS FP16. A17 Pro GPU: ~2.15 TFLOPS FP16 -> 2.8ms compute.
    Snapdragon 8G3 Adreno 750: ~1.7 TFLOPS FP16 -> 3.5ms compute. Both within 20ms budget with room for
    pre/post processing.'
