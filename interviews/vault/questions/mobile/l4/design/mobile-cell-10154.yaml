schema_version: 1
id: mobile-cell-10154
title: 'Specification: define mobile CNN requirements for real-time AR on A17 Pro'
topic: cnn-efficient-design
status: published
provenance: imported
scenario: You are writing the model specification for a real-time AR object recognition feature on iPhone
  15 Pro (A17 Pro, 35 TOPS ANE, 8GB RAM). The feature must run at 30 FPS with <3ms inference latency,
  <4% battery drain/hr, and >85% top-1 accuracy on a 50-class AR object dataset. Write a complete technical
  specification.
details:
  realistic_solution: 'Spec: (1) Architecture: MobileNetV3-Large or EfficientNet-Lite family; (2) FLOPs:
    ≤0.4 GFLOPs (ANE achieves <2ms at this FLOP count, with 1ms headroom); (3) Accuracy: >85% top-1 on
    held-out 50-class AR dataset (not ImageNet); (4) ANE constraints: activations must be ReLU6, Hardswish,
    or Sigmoid only; all layer shapes static at compile time; no custom ops; min iOS 17; (5) Memory: model
    size ≤10MB INT8 (A17 Pro ANE model cache limit); (6) Latency target: <2ms ANE measured with Core ML
    Instruments; (7) Battery: <4% per hour at 30 FPS = <0.6W total inference power; (8) Test: 500 AR-context
    images, 5 lighting conditions, 3 occlusion levels.'
  common_mistake: Specifying accuracy as top-1 on ImageNet rather than on the AR-specific 50-class dataset;
    failing to specify ANE compatibility constraints (no custom ops, activation functions limited to ANE-supported
    set) that are required to hit the 3ms latency target.
  napkin_math: 'Battery constraint: 4% per hour. iPhone 15 Pro battery: 13Wh. 4% = 0.52Wh/hr = 0.52W.
    ANE active at 2ms inference, 30 FPS: duty cycle = 2ms × 30 / 1000ms = 6%. ANE power: 1.5W × 6% = 0.09W.
    System overhead (CPU, display, camera): ~0.4W. Total: 0.49W < 0.52W target — just fits. If inference
    is 3ms (hitting upper limit): 9% duty cycle → 0.135W ANE → 0.535W total → slightly over. Therefore:
    <2ms ANE inference is a hard requirement derived from battery spec, not just latency SLA.'
