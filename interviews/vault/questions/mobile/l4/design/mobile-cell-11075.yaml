id: mobile-cell-11075
title: 'Fault Tolerance: Design Model Update Safety Protocol for Mobile LLM'
topic: fault-tolerance-checkpointing
status: published
provenance: imported
scenario: You are designing a safe model update protocol for a 1B LLM deployed on A17 Pro (35 TOPS Neural
  Engine, 8GB RAM) as part of a keyboard app with 50M users. An update last month caused crashes on 0.5%
  of devices (250K users affected). Design a fault-tolerant update protocol that limits blast radius to
  < 0.01%.
details:
  realistic_solution: 'A/B model partitions. Staged rollout: 0.01% (5K) → validation 48h → 0.1% → 1% →
    10% → 100%. Device-side: download to B partition, validate 100 inference calls, commit. Kill switch:
    server-side flag to rollback all devices in < 1 hour.'
  common_mistake: Not implementing a device-side validation step before committing an update; not staging
    rollouts by device risk profile.
  napkin_math: '50M users. Stage 1: 0.01% = 5,000 devices. Bad update crash rate: 0.5% on 5K = 25 crashes.
    Crash rate monitoring: 25 crashes / 5K devices = 0.5% > threshold (0.1%). Stage halted automatically.
    Blast radius: 25 users affected = 0.00005% of 50M. Kill switch: server flag propagated on next heartbeat
    (1 minute TTL). 50M devices × 1 min heartbeat × 1KB payload = 50GB/minute push — too expensive. Use
    polling: devices check server flag every 5 minutes. Rollback latency: 5 minutes + switch to A partition
    (50ms). Model partitions: 1B model at 4-bit = 500MB × 2 = 1GB storage. iPhone 15 storage typically
    128GB+ — acceptable. Validation: 100 inference calls on test prompts = 100 × 50ms = 5 seconds per
    device.'
