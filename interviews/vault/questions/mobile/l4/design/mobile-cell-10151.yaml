schema_version: 1
id: mobile-cell-10151
title: 'Realization: ship MobileNetV3 model update OTA with Core ML compilation on device'
topic: cnn-efficient-design
status: published
provenance: imported
scenario: You need to ship a MobileNetV3-Large model update to iPhone 15 Pro users (A17 Pro) via OTA,
  with the model compiled for ANE execution. The update is 5.4MB (INT8 weights). Realize the delivery
  and on-device compilation pipeline that ensures < 2 seconds setup time and fallback to previous model
  on compilation failure.
details:
  realistic_solution: 'Pipeline: (1) Ship .mlpackage (not .mlmodelc) via CDN: 5.4MB INT8 compressed (~4MB
    gzipped); (2) On download, iOS calls MLModel.compileModel(at:) asynchronously — A17 Pro compilation:
    ~500ms; (3) Store compiled .mlmodelc in Application Support; (4) Atomic swap: compile to temp path,
    validate with single inference, then rename; (5) Fallback: keep previous .mlmodelc, if new model validation
    fails (exception or accuracy check fails), revert to previous; (6) Background download + compile using
    BackgroundTasks framework. Model version check via JSON manifest. User impact: zero — compilation
    is background, served from compiled cache after first launch.'
  common_mistake: Shipping a pre-compiled MLModelc package for a specific device, which is large (>50MB
    compiled) and locks to a specific iOS version; the correct approach is to ship the .mlmodel file and
    let iOS compile on-device at first use, which takes <1 second on A17 Pro.
  napkin_math: 'Model size: 5.4MB INT8. OTA download: at 20 Mbps LTE: 5.4MB × 8 / 20M = 2.16 seconds download.
    gzipped: 4MB → 1.6 seconds. A17 Pro compilation: MLModel.compileModel typically 300–800ms for MobileNetV3-class
    models (Apple documentation). Total: 1.6s + 0.5s = 2.1s setup time slightly over 2s target. Optimization:
    delta update (only changed weights) using MobileNetV3 fine-tune diff ≈ 2MB → 0.8s download + 0.5s
    compile = 1.3s total. Pre-cache on Wi-Fi: background download eliminates user-perceived latency entirely.'
