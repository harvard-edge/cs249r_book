schema_version: 1
id: mobile-cell-10140
title: Diagnose accuracy regression after Core ML conversion of EfficientNet-B0 for A17 Pro
topic: cnn-efficient-design
status: published
provenance: imported
scenario: After converting EfficientNet-B0 from PyTorch FP32 to Core ML FP16 for A17 Pro, top-1 accuracy
  drops from 77.1% to 74.8% on a 500-image test set. The model uses Swish (SiLU) activations and SE blocks.
  Diagnose the sources of the 2.3pp accuracy regression.
details:
  realistic_solution: 'Diagnosis steps: (1) Run Core ML in FP32 mode (computeUnits=.cpuOnly) — if accuracy
    recovers to 76.8%, the issue is compute unit precision, not conversion. (2) Use coremltools to inspect
    the converted graph; Swish (x × sigmoid(x)) may be approximated as x × hardsigmoid(x) by Core ML''s
    ANE mapper. (3) Check SE block global average pooling — Core ML FP16 GAP on small spatial dims (7×7)
    can lose precision. Fix: use ct.convert() with minimum_deployment_target=ct.target.iOS17 for improved
    Swish handling; or replace Swish with ReLU6 via fine-tuning (EfficientNet-Lite approach).'
  common_mistake: Assuming the entire accuracy drop is from FP16 quantization precision when the primary
    cause is often Swish activation approximation in Core ML's ANE mapping, where the sigmoid component
    is approximated by a 4th-degree polynomial.
  napkin_math: 'EfficientNet-B0: 16 MBConv blocks with SE. Swish sigmoid approximation error: FP16 sigmoid(x)
    for x in [-5, 5] vs FP32: max error ~0.002. Per SE block: sigmoid(FC(GAP(x))). With 2 FC layers and
    sigmoid, error accumulates. 16 blocks × 2 SE FC operations × 0.002 error ≈ 0.064 total propagated
    error (rough upper bound). For ImageNet top-1, a 0.06 logit shift can cause ~1-2pp accuracy drop.
    Remaining 0.3pp likely from FP16 BN and conv precision. Verify: replace Swish with Sigmoid(x) × x
    using ct.ops.sigmoid() — Core ML maps this directly.'
