schema_version: 1
id: mobile-fill-03019
title: Memory-Efficient Attention for On-Device LLM on A17 Pro
topic: flash-attention
status: draft
provenance: imported
scenario: You're deploying a 1B parameter LLM on A17 Pro (35 TOPS Neural Engine, 8GB unified memory) for
  on-device summarization with 2048-token context. Standard attention requires 2048^2 * 4 bytes = 16MB
  per layer for attention maps. With 24 layers and 16 heads, peak memory for attention alone is 6.1GB.
details:
  realistic_solution: 'Use Apple''s MLX framework which implements Flash Attention for Metal. Alternatively,
    use sliding window attention (context window 512 instead of 2048) to reduce the quadratic memory.
    With MLX: attention maps never materialize in full — tiled computation uses the M-series Neural Engine
    efficiently. Set max context to 1024 for 8GB RAM budget.'
  common_mistake: Implementing full Flash Attention in Metal shaders expecting the same IO benefit as
    CUDA. Apple's Neural Engine does not support custom attention kernels; Metal GPU shaders are needed,
    and the unified memory architecture (CPU/GPU share DRAM) changes the bandwidth math.
  napkin_math: 'A17 Pro: 8GB unified memory shared by CPU, GPU, ANE. 1B model at INT4 = 500MB. Activations
    per layer: 2048*2048*2 = 8MB. 24 layers: 192MB activations. Standard attention maps: 24 * 16 * 2048^2
    * 2 = 3.2GB. Total: 500MB + 192MB + 3.2GB = 3.9GB — fits in 8GB but leaves only 4.1GB for OS + other
    apps (typically 2-3GB reserved). Flash Attention: maps never stored = 3.2GB saved → comfortable 1.2GB
    headroom.'
