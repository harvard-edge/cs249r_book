schema_version: 1
id: mobile-cell-11149
title: 'KV-Cache: Design Multi-Turn KV Cache Persistence for Mobile App Switching'
topic: kv-cache-management
status: published
provenance: imported
scenario: Your LLM chat app on A17 Pro (35 TOPS, 8GB) needs to survive iOS app switching (app may be backgrounded
  and KV cache evicted by OS). Design a KV cache persistence strategy that allows resuming conversation
  within 3 seconds of app foreground.
details:
  realistic_solution: '1B model decode on 35 TOPS device: 2 GFLOPs / 35 TOPS = ~0.06ms at peak, ~0.7ms
    with realistic utilization. Units are GFLOPs (not TFLOPs) and time is milliseconds (not seconds).'
  common_mistake: Storing the full KV cache to flash (too slow to reload in 3 seconds for long contexts);
    not considering that recomputing KV from saved tokens is often faster than reloading from flash.
  napkin_math: '1B param model, 6 decode steps per forward, seq=2048. FLOPs per step: 2 × 1B × 1 token
    = 2 GFLOPs per decode step. For prefill of 2048 tokens: 2 × 1B × 2048 = 4.096 TFLOPs. On-device at
    35 TOPS: 2G / 35T = 0.057ms per decode token (not 0.70 seconds). Prefill: 4.096T / 35T = 117ms. Correct
    decode: 2G / 35T = 0.057ms → 0.70ms (at 20% utilization: 2G / (35T×0.2) = 0.286ms ≈ 0.70ms with overhead).
    Key: 0.70ms (not 0.70 seconds), and 12.3 GFLOPs for prefill (not TFLOPs at this scale).'
