id: mobile-cell-12140
title: 'Network Bandwidth Bottlenecks: Design Memory Bandwidth Architecture for Mobile Multi-Model Inference'
topic: network-bandwidth-bottlenecks
status: published
provenance: imported
scenario: 'Design a memory bandwidth-aware scheduling system for a Snapdragon 8 Gen 3 (16GB LPDDR5X, 77
  GB/s) running 3 concurrent ML tasks: speech recognition (continuous, 1GB INT8 model, bandwidth: 2GB/s),
  LLM assistant (on-demand, 3B INT4, bandwidth: 76GB/s during decode), and camera depth estimation (at
  30fps, 500MB FP16, bandwidth: 15GB/s). Prevent bandwidth saturation while meeting latency requirements.'
details:
  realistic_solution: 'Total BW budget: 77GB/s. System overhead: 3GB/s. Available: 74GB/s. Speech: 2GB/s
    (constant). Depth: 15GB/s (at 30fps = 1/30 duty → avg 0.5GB/s). LLM: 76GB/s (during decode). Cannot
    coexist speech + depth + LLM: 2+15+76=93GB/s > 74GB/s. Schedule: when LLM is active, suspend depth
    estimation (acceptable if user is typing/talking, not looking at camera). Use priority queue: LLM
    > speech > depth. LLM active: speech 2GB/s + LLM 74GB/s = 76GB/s ✓. LLM idle: speech 2 + depth 15
    = 17GB/s ✓.'
  common_mistake: Designing a time-sliced scheduler without noting that the LLM decode at 76GB/s alone
    nearly saturates the 77GB/s bus — it can't coexist with depth estimation simultaneously.
  napkin_math: 'LLM decode: 3.5GB weights / 77GB/s = 45ms/token. During decode: BW = 3.5GB/0.045s = 77.8GB/s
    ≈ full bus. Other tasks impossible during LLM decode. Speech model: 1GB INT8. ASR does 10ms audio
    chunks: BW=1GB/(decode_time). At 100 tokens/s ASR: 1GB/100 = 10MB/token × 100=1GB/s (approx). Speech
    can''t coexist with LLM. Solution: pipeline — complete one LLM token (45ms), then process 450ms of
    speech backlog (45ms at 10ms/chunk = 4.5 speech tokens) — speech latency < 100ms acceptable.'
