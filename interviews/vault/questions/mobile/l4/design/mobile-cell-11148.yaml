id: mobile-cell-11148
title: 'KV-Cache: Design KV Cache Management for On-Device LLM Chat App'
topic: kv-cache-management
status: published
provenance: imported
scenario: Design the KV cache management system for a chat application using a 1B LLM on Snapdragon 8
  Gen 3 (45 TOPS INT8, 16GB). Users expect multi-turn conversations of 10-20 turns (50-100 tokens each
  = 500-2000 tokens total). The app must handle context window limits gracefully and maintain conversation
  coherence.
details:
  realistic_solution: 'Sliding window KV cache with importance-based retention: keep first N tokens (system
    prompt + first user turn) + last M tokens (recent context). Compress middle with summarization.'
  common_mistake: Truncating context by discarding old tokens (loses conversation context) without considering
    sliding window or KV compression alternatives.
  napkin_math: '1B model: 24 layers, 8 KV heads, head_dim=128. KV per token: 24 × 2 × 8 × 128 × 1B (INT8)
    = 49.2KB. Available for KV (16GB RAM, 1B model at INT4 = 500MB): 16GB - 0.5GB model - 2GB OS = 13.5GB.
    Max tokens: 13.5GB / 49.2KB = 274,390 tokens — massive, no concern on 16GB device. Context window:
    1B models typically limited to 4096 tokens (position encoding). At 4096 tokens: 4096 × 49.2KB = 201MB
    KV. Fits easily. Strategy: keep full KV up to 4096 context. At 4096 tokens, summarize oldest 2048
    tokens (LLM call, 500ms), discard their KV, continue. Summarization cost: 500ms one-time when hitting
    limit. Effective conversation: unlimited turns with graceful degradation. Memory: 201MB KV peak —
    trivial on 16GB.'
