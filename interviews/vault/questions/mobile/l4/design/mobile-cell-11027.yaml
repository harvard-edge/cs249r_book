schema_version: 1
id: mobile-cell-11027
title: 'Dataset Curation: Design On-Device Data Collection for Mobile Model Training'
topic: dataset-curation
status: published
provenance: imported
scenario: You are building a personalized keyboard model that trains on-device on A17 Pro (35 TOPS Neural
  Engine, 8GB RAM). The model learns from user typing patterns. Design the data collection, quality filtering,
  and privacy-preserving local storage pipeline. The device has 500MB available for training data.
details:
  realistic_solution: 'Collect: n-gram statistics not raw keystrokes. Filter: exclude password fields
    (type=password), URLs, and short sessions (< 20 keystrokes). Store: DP-noised n-gram counts with ε=2.0.
    Convert to training examples only at training time. Delete after training.'
  common_mistake: Storing raw keystrokes including passwords and sensitive data; not applying differential
    privacy before on-device storage.
  napkin_math: '500MB budget. User types 200 words/day = 1,200 keystrokes/day. Store 4-gram counts: English
    has ~500K frequent 4-grams. Per gram count: 4 chars + 4 byte count = 8 bytes. 500K × 8 = 4MB for n-gram
    model. Can store 30 days of n-gram counts: 30 × 4MB = 120MB. Training data conversion: n-gram to sequence
    pairs, 1M pairs × 16 bytes = 16MB. Total: 136MB well within 500MB. DP noise: add Laplace(0, 1/ε) =
    Laplace(0, 0.5) to each count, ensuring privacy at ε=2.0.'
