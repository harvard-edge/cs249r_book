schema_version: 1
id: mobile-cell-10150
title: Optimize EfficientNet-Lite0 for continuous inference battery life on A17 Pro
topic: cnn-efficient-design
status: published
provenance: imported
scenario: An iOS AR application runs EfficientNet-Lite0 (0.35 GFLOPs) at 30 FPS continuously on A17 Pro
  for object recognition in the camera viewfinder. Battery drain is 8% per hour. Target is < 4% per hour.
  Optimize the inference pipeline without changing the model architecture.
details:
  realistic_solution: 'Optimizations: (1) Adaptive inference rate: use CoreMotion to detect camera motion
    — if static (<0.1°/sec rotation), reduce to 5 FPS; if moderate, 15 FPS; if fast pan, 30 FPS. Average
    rate drops to ~10 FPS. (2) Enable ANE power gating: ensure model uses computeUnits=.neuralEngine (not
    .all) so A17 CPU/GPU shut down between inferences. (3) Warm model once, cache MLModel instance (avoid
    re-loading). (4) Use Core ML''s MLComputePlan to profile which operations fall to CPU. Expected: 10
    FPS average × 2ms × 35 TOPS active power + idle between → ~2.5% battery/hr.'
  common_mistake: Simply reducing inference frequency from 30 FPS to 15 FPS, which cuts battery in half
    but noticeably degrades AR experience; missing that 30 FPS inference is over-provisioned (model accuracy
    doesn't benefit from 30 Hz for most objects) and that ANE can use power gating between inferences.
  napkin_math: 'Current: 30 FPS × 2ms active ANE = 60ms active / 1000ms = 6% duty cycle. A17 Pro ANE power:
    ~1.5W active, 0.01W idle. Power = 0.06 × 1.5 + 0.94 × 0.01 = 0.09 + 0.0094 = 0.099W. Plus GPU/CPU
    overhead for pre/post-processing: ~0.3W total system. At 8% battery/hr: 8% × 15Wh = 1.2Wh/hr = 1.2W.
    Check: system is drawing 1.2W at 30 FPS. Target 4%: 0.6W. Need 50% power reduction. Adaptive 10 FPS:
    duty cycle 2%, ANE power = 0.02 × 1.5 = 0.03W. Pre/post at 10 FPS: ~0.1W. Total: 0.13W → 0.87% battery/hr.
    Exceeds target.'
