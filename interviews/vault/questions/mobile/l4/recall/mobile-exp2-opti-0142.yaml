schema_version: 1
id: mobile-exp2-opti-0142
title: Optimizing KV-Cache Eviction for On-Device LLMs
topic: kv-cache-management
status: published
provenance: imported
scenario: You are deploying an 8B parameter LLM optimized for on-device chat on a smartphone powered by
  the Samsung Exynos 2400 NPU. During long multi-turn conversations, the application frequently crashes
  due to Out-Of-Memory (OOM) errors. The device features 12 GB of LPDDR5X memory, but it is shared across
  the CPU, GPU, ISP, and the dual-core NPU. You need to analyze the memory profile of the KV-cache as
  the context grows and quantify the impact of implementing a token eviction policy to cap memory usage.
details:
  realistic_solution: A realistic approach involves capping the maximum KV-cache size and implementing
    an eviction policy (like H2O or StreamingLLM) that retains 'heavy-hitter' tokens and recent context
    while discarding less important tokens. Given the shared memory, we must budget a strict upper bound
    for the KV-cache. By calculating the exact memory footprint per token, we can determine the maximum
    context window supported under this budget.
  common_mistake: Candidates often assume the entire 12 GB of LPDDR5X memory is available for the LLM
    and its KV-cache, ignoring the shared nature of the memory architecture. They may also suggest naive
    truncation without calculating the actual memory savings per token or considering the latency impact
    on the Exynos NPU.
  napkin_math: Assume an 8B model with 32 layers, 32 attention heads, and a head dimension of 128, using
    FP16 (2 bytes per element). Memory per token in KV-cache = 2 (K and V) * 32 (layers) * 32 (heads)
    * 128 (head dim) * 2 bytes = 524,288 bytes (~0.5 MB/token). If the OS, UI, ISP, and the 4-bit quantized
    model weights (~4.5 GB) reserve a total of 10.5 GB, we have 1.5 GB left for activations and the KV-cache.
    Allocating 1 GB strictly for the KV-cache allows 1,024 MB / 0.5 MB/token = 2,048 tokens maximum context.
    If we implement an eviction policy that caps the cache at 1,024 tokens, we reduce the KV-cache memory
    requirement from 1 GB to 512 MB. This saves exactly 512 MB of the shared LPDDR5X RAM, preventing OOM
    crashes while maintaining conversational coherence.
