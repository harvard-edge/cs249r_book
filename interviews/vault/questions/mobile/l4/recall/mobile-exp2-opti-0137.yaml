schema_version: 1
id: mobile-exp2-opti-0137
title: Optimizing Encoder-Decoder on Snapdragon NPU
topic: encoder-decoder-tradeoffs
status: published
provenance: imported
scenario: You are deploying an on-device translation system using an encoder-decoder architecture on a
  smartphone equipped with a Qualcomm Hexagon NPU (Snapdragon 8 Gen 3). While the encoder processes the
  initial context rapidly, the autoregressive decoder phase is severely missing the 40 tokens per second
  latency target. Given the shared 12-16 GB LPDDR5X memory and the NPU's 45 TOPS INT8 capacity, diagnose
  the primary bottleneck between the encoder and decoder phases and quantify the impact of your proposed
  fix.
details:
  realistic_solution: The candidate should identify that autoregressive decoding is memory-bound because
    the entire model and KV cache must be loaded from LPDDR5X for every generated token. The solution
    is to quantize both weights and KV cache to INT8 to leverage the Hexagon NPU's native 45 TOPS INT8
    support, cutting memory traffic in half, and potentially utilizing Grouped Query Attention to further
    shrink the KV cache footprint.
  common_mistake: Candidates often misdiagnose the decoder as compute-bound and suggest reducing the number
    of layers to save FLOPs. They fail to distinguish the compute-heavy, highly parallel nature of the
    encoder from the memory bandwidth-bound, sequential nature of the decoder.
  napkin_math: For a 1.5B parameter model in FP16, weights take 3GB. Generating 40 tokens/sec requires
    3GB * 40 = 120 GB/s of memory bandwidth, exceeding typical mobile limits. Quantizing to INT8 reduces
    weights to 1.5GB, requiring 60 GB/s, which is feasible on LPDDR5X. With 45 TOPS INT8 available, computing
    1.5B MACs (3 GOPS per token * 40 tokens/sec = 120 GOPS) utilizes less than 1% of the NPU's compute
    capacity, mathematically proving the bottleneck is entirely memory bandwidth, not compute.
