schema_version: 1
id: mobile-exp2-opti-0130
title: Optimizing Adversarial Defense on Exynos NPU
topic: adversarial-robustness
status: published
provenance: imported
scenario: You are securing a real-time face authentication model running on the Samsung Exynos 2400 NPU
  against physical adversarial patches. Your initial defense strategy—running 5 Monte Carlo dropout passes
  for uncertainty estimation—saturates the memory bus and misses the 30ms latency target. Given the Exynos
  2400 features a dual-core NPU delivering 34.7 TOPS and shares 12 GB of LPDDR5X memory with the CPU,
  GPU, and ISP, how do you diagnose the exact bottleneck and quantify a more efficient defense mechanism?
details:
  realistic_solution: The optimal strategy is to analyze the memory traffic and fuse the Monte Carlo passes
    into a single batched NPU execution to maximize data reuse of the model weights in the NPU's SRAM.
    By batching the inputs, the weights are loaded from the shared LPDDR5X only once instead of five times.
    This shifts the workload from being memory-bandwidth bound to utilizing the massive 34.7 TOPS compute
    capacity of the dual-core NPU.
  common_mistake: Candidates typically misdiagnose the bottleneck as an NPU compute limitation rather
    than a memory bandwidth issue caused by contention on the shared 12 GB LPDDR5X. They often suggest
    aggressively pruning the model without realizing that running 5 separate unbatched passes of even
    a small model incurs massive weight-fetching overhead while the ISP is concurrently writing camera
    frames.
  napkin_math: Assume the model has 5M parameters (quantized to INT8 = 5MB) and requires 1 GOP per inference.
    5 unbatched passes load the weights 5 times, transferring 25MB from the shared LPDDR5X. If effective
    bandwidth during ISP contention is 10 GB/s, transfer takes (25MB / 10GB/s) = 2.5ms. Compute for 5
    GOPs at 34.7 TOPS takes (5 / 34,700) = ~0.14ms. Including kernel launch overheads, this unbatched
    approach easily hits 10-15ms. By batching the 5 passes, we load the 5MB weights exactly once (0.5ms
    transfer) while compute remains ~0.14ms. This drops the defense execution time from >10ms to <1ms,
    safely meeting the 30ms budget.
