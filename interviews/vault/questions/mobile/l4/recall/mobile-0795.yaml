schema_version: 1
id: mobile-0795
title: Federated Learning Carbon Trade-offs
topic: federated-learning
status: published
provenance: imported
scenario: You are evaluating Federated Learning (FL) vs Centralized Cloud training. 1,000,000 mobile devices
  perform 1 FL epoch daily. Local compute takes 100 Joules/device. Each device uploads/downloads a 500MB
  payload over 5G (0.5 Joules/MB). Cloud aggregation uses 50 kWh total. The average device grid carbon
  intensity is 400 gCO2/kWh, while the cloud datacenter uses renewable energy at 50 gCO2/kWh. We need
  to calculate the total daily carbon footprint of the FL approach.
details:
  realistic_solution: In mobile Federated Learning, the energy bottleneck is rarely the local compute;
    it is almost always the radio transmission cost for large model weights. To find the total carbon
    footprint, we must quantify the energy used by the 1 million devices (compute + 5G communication)
    and the energy used by the cloud aggregator. We calculate the local energy in Joules, convert it to
    kWh (since 1 kWh = 3.6 million Joules), and multiply by the local grid's carbon intensity. Then we
    add the cloud's carbon footprint. The communication energy (250J) dwarfs the compute (100J). The total
    system footprint is 38.8 kg CO2 local + 2.5 kg CO2 cloud = 41.3 kg CO2 daily.
  common_mistake: Ignoring the 5G communication energy, which heavily dominates the local compute energy
    in modern FL workloads.
  napkin_math: 'Local compute per device: 100 Joules.

    Comm energy per device: 500MB * 0.5 J/MB = 250 Joules.

    Total energy per device = 350 Joules.

    Total for 1M devices = 350,000,000 Joules.

    Convert to kWh: 350,000,000 J / 3,600,000 J/kWh = 97.22 kWh.

    Device Carbon = 97.22 kWh * 400 gCO2/kWh = 38,888 gCO2 = ~38.9 kg CO2.

    Cloud Carbon = 50 kWh * 50 gCO2/kWh = 2,500 gCO2 = 2.5 kg CO2.

    Total Carbon = 38.9 + 2.5 = 41.4 kg CO2.'
