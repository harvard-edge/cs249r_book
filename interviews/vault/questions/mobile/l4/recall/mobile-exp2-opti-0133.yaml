schema_version: 1
id: mobile-exp2-opti-0133
title: On-Device Coreset Selection for Nightly Fine-Tuning
topic: data-efficiency-selection
status: published
provenance: imported
scenario: You are building an on-device personalization system for a predictive model running on a Samsung
  Exynos 2400. To preserve battery and avoid starving the shared 12 GB LPDDR5X memory used by the CPU/GPU/ISP,
  overnight background training is capped at a strict compute budget of 100 TERA-operations (TOPs). The
  user's daily log generates 20,000 interaction samples, and a full forward-backward training step requires
  10 Giga-operations (GOPs) per sample. You need to analyze the bottleneck and design a data pruning pipeline
  using the dual-core NPU to train only on the most valuable subset within the budget.
details:
  realistic_solution: The optimal approach uses the dual-core NPU to run a lightweight, quantized proxy
    model to score the loss of all daily samples, selecting a high-loss coreset for actual training. By
    calculating the compute cost of scoring versus full training, you can dynamically size the coreset
    to fit the daily budget. The proxy scoring identifies hard examples, maximizing the Information-Compute
    Ratio (ICR) without exceeding thermal or memory constraints.
  common_mistake: Candidates often propose training on random or most recent samples to fit the budget,
    which ignores data quality and slows convergence. Another mistake is assuming activations from a forward-only
    filtering pass can be cached for the backward pass, which would easily saturate the shared 12 GB LPDDR5X
    memory during background OS tasks.
  napkin_math: 'Naive training compute: 20,000 samples * 10 GOPs = 200,000 GOPs = 200 TOPs (fails the
    100 TOPs budget). Proposed Fix: Use a 1 GOP proxy model for data pruning. Proxy scoring all samples:
    20,000 samples * 1 GOP = 20 TOPs. Remaining budget: 100 TOPs - 20 TOPs = 80 TOPs. Selected coreset
    size: 80 TOPs / 10 GOPs = 8,000 samples. Total active NPU time: 100 TOPs / 34.7 TOPS (Exynos 2400
    peak) = ~2.88 seconds of active compute, minimizing memory bandwidth contention and battery drain.'
