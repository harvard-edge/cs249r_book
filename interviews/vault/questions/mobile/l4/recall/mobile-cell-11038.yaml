schema_version: 1
id: mobile-cell-11038
title: 'Dataset Curation: Realize Cross-Device Dataset Consistency for Mobile Fleet'
topic: dataset-curation
status: published
provenance: imported
scenario: 'You are rolling out a federated learning update to 50M mobile devices split between A17 Pro
  (35 TOPS, 8GB, iOS) and Snapdragon 8 Gen 3 (45 TOPS, 16GB, Android). Realize the dataset consistency
  requirements: ensure all devices train on compatible data formats, the same tokenizer version, and compatible
  label schemas.'
details:
  realistic_solution: Bundle tokenizer with model as atomic unit. Use protobuf schema versioning for label
    formats. Enforce minimum dataset version check before participating in any training round. Use content-addressed
    storage (SHA256) for all dataset artifacts.
  common_mistake: Deploying tokenizer updates separately from model updates, causing tokenizer-model mismatch
    on some devices; not versioning label schemas.
  napkin_math: '50M devices: 60% Android (30M Snapdragon), 40% iOS (20M A17 Pro). Tokenizer size: SentencePiece
    32K vocab = 2MB. Distributed with model update: already bundled. Dataset compatibility check: SHA256
    of tokenizer file checked at round start. Mismatch rate (from version skew): assume 2% of devices
    on old version = 1M devices excluded per round. Acceptable: 49M/50M = 98% participation. Label schema
    (protobuf): backward compatible with field numbers. Schema version byte added: 1 byte overhead per
    example. 1M examples × 1 byte = 1MB schema overhead per device. Negligible. Monthly round bandwidth:
    50M × 200KB gradients = 10TB. At $0.01/GB: $100/round = $1,200/year.'
