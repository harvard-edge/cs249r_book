schema_version: 1
id: mobile-fill-05041
title: Layer-wise Relevance Propagation for Pruning Sensitivity on Snapdragon 8 Gen 3
topic: pruning-sparsity
status: published
provenance: imported
scenario: A MobileViT-XS model (2.3M params, 0.7 GFLOPS) on Snapdragon 8 Gen 3 (45 TOPS) runs at 8ms.
  The team applies magnitude-based unstructured pruning to 50% of weights to target 4ms latency. They
  observe only 15% latency reduction despite 50% weight reduction. Diagnose the gap.
details:
  realistic_solution: 'Unstructured pruning creates 50% sparse weight matrices. Standard Qualcomm HTP
    (Hexagon Tensor Processor) processes dense INT8 matrix operations — 50% zeros in dense format provide
    no speedup because the hardware still loads and multiplies all values (zero × anything = zero, but
    the multiply still occurs). Only 15% speedup likely came from reduced memory footprint (fewer cache
    misses, not compute reduction). To achieve 50% speedup: use structured pruning (remove entire channels/filters)
    → dense smaller matrices → full hardware acceleration. Alternative: use Qualcomm QNN SDK''s sparse
    acceleration if available on HTP v73.'
  common_mistake: Applying unstructured pruning and expecting proportional speedup; unstructured pruning
    creates sparse matrices that standard hardware cannot accelerate without specialized sparse kernels.
  napkin_math: 'Unstructured 50% sparsity: hardware still processes N×M dense matrix → 0% FLOP reduction
    on standard HTP. Memory reduction: 50% smaller model → fewer cache misses → ~15% speedup observed.
    Structured pruning (50% channels): 50% FLOP reduction → ~45% latency reduction (accounting for overhead).
    Target 4ms from 8ms requires 50% reduction → use structured pruning.'
