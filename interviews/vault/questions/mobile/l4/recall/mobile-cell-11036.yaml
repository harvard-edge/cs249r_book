schema_version: 1
id: mobile-cell-11036
title: 'Dataset Curation: Optimize Label Quality vs Cost Tradeoff for Mobile App Training'
topic: dataset-curation
status: draft
provenance: imported
scenario: You are curating training data for a photo classification model deployed on A17 Pro (35 TOPS,
  8GB). You have 500K user photos. Expert labeling costs $2/image, crowdsourced costs $0.10/image (85%
  accuracy), and automated (CLIP zero-shot) costs $0.001/image (75% accuracy). Your total budget is $10,000
  and you need >= 90% label accuracy on final training set.
details:
  realistic_solution: 'Tiered labeling: (1) CLIP zero-shot labels all 500K at $500. (2) Crowdsource top-uncertainty
    50K at $5,000. (3) Expert review worst 2K at $4,000. Total: $9,500. Expected accuracy: weighted average
    on final set.'
  common_mistake: Using only one labeling source; not using a hybrid strategy that combines cheap automated
    labels with targeted expert review.
  napkin_math: 'Budget: $10,000. Option A: 5,000 expert labels ($10K) → 90% accuracy on 5K, 0% on 495K
    → 1% of data labeled. Option B: 100K crowdsourced ($10K) → 85% accuracy on 100K. Option C: Hybrid:
    500K CLIP ($500) → 75% base. Uncertainty selection: 50K re-labeled by crowd ($5K) → 85%. Top-2.5K
    re-labeled expert ($4.5K) → 95%. Total $10K. Final accuracy: CLIP on easy 90% of data (450K × 90%
    correct = 405K correct). Crowd on uncertain 9% (45K × 85% = 38.25K correct). Expert on hard 1% (5K
    × 95% = 4.75K correct). Overall: (405K+38.25K+4.75K)/500K = 89.6% ≈ 90% target. Achieved.'
