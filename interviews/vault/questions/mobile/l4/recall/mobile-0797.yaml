schema_version: 1
id: mobile-0797
title: LLM DVFS and Static Power Wall
topic: power-budgeting
status: published
provenance: imported
scenario: Running a 4GB mobile LLM at max memory frequency (50GB/s bandwidth) draws 4W dynamic power for
  RAM and 1W static system power, taking 80ms per token. To save battery, you propose dropping frequency
  by 50%. Due to V^2f scaling, RAM dynamic power drops to 1W, but bandwidth drops to 25GB/s. The 1W static
  system power remains constant. Calculate the energy per token for both the max frequency and 50% frequency
  states to determine if downclocking actually saves energy.
details:
  realistic_solution: Dynamic Voltage and Frequency Scaling (DVFS) reduces dynamic power significantly
    (proportional to V^2 * f), but it also increases the time required to complete a fixed workload (like
    generating one token). Because mobile SoCs have static power components (leakage current, display,
    background OS) that remain constant regardless of the ML workload's frequency, running slower means
    this static power is drawn for a longer duration. To evaluate the trade-off, we calculate the total
    energy (Joules = Watts * seconds) per token for both states. At max frequency, total energy is 0.40J
    per token. At half frequency, the time doubles to 160ms, resulting in 0.32J per token. Downclocking
    saves energy here, but less than the power drop suggests due to the static power penalty.
  common_mistake: Assuming that because dynamic power drops by 75%, the total energy per token will also
    drastically decrease, ignoring the increased execution time and static power leakage.
  napkin_math: 'Max Freq:

    Time per token = 4GB / 50GB/s = 0.08s (80ms).

    Total Power = 4W (dynamic) + 1W (static) = 5W.

    Energy per token = 5W * 0.08s = 0.40 Joules.


    Half Freq:

    Time per token = 4GB / 25GB/s = 0.16s (160ms).

    Total Power = 1W (dynamic) + 1W (static) = 2W.

    Energy per token = 2W * 0.16s = 0.32 Joules.

    Energy saved per token = 0.40 - 0.32 = 0.08 Joules (20% savings).'
