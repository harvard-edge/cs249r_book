schema_version: 1
id: mobile-cell-12016
title: 'Latency Decomposition: Optimize Wake-Word Detection Latency on Tensor G3'
topic: latency-decomposition
status: published
provenance: imported
scenario: 'A wake-word detection model (1M params, INT8, 0.05 GOPs per 100ms audio window) runs continuously
  on Pixel 8''s Tensor G3 (7.5 TOPS, 12GB). Current latency from audio capture to detection trigger is
  180ms P99. Target is < 80ms. The audio pipeline: mic capture (20ms buffer), feature extraction (MFCC,
  CPU), inference, decision logic. Diagnose and quantify optimizations.'
details:
  realistic_solution: 'Audio buffer latency: 20ms is irreducible for stable audio. MFCC on CPU: 5ms. Inference:
    0.05G/7.5T = 0.007ms, overhead ~2ms. Decision: 1ms. Total: 20+5+2+1=28ms per-window. P99=180ms suggests
    audio pipeline queuing. Fix: move MFCC to DSP (1ms), reduce buffer to 10ms with 50% overlap, reduce
    queuing. New P99: ~60ms.'
  common_mistake: 'Trying to optimize inference when the bottleneck is the 20ms audio buffer (Nyquist:
    need 160ms window for reliable detection) and MFCC feature extraction on CPU.'
  napkin_math: 'Inference: 0.05 GOPs / 7.5 TOPS = 6.7μs. Overhead: 2ms. MFCC CPU: 5ms. Audio buffer: minimum
    10ms (160 samples at 16kHz). Queuing at 50% overlap: 10ms stride. P99 = stride + processing = 10 +
    2 + 1 + 1 = 14ms per window. Pipeline delay: 2-3 windows for smoothing = 3×14 = 42ms. Target < 80ms
    achievable.'
