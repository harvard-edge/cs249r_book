schema_version: 1
id: mobile-fill-05079
title: On-Device Training with LoRA Adapter on A17 Pro — Feasibility Analysis
topic: pruning-sparsity
status: published
provenance: imported
scenario: An iOS app personalizes a 3B language model (INT4 inference, 1.5GB) using LoRA fine-tuning on
  user data. LoRA rank=8, target modules=q_proj+v_proj (32 layers × 2 matrices × 2 LoRA matrices). The
  user has 100 examples (avg 128 tokens). Training runs on A17 Pro during charging. Analyze feasibility.
details:
  realistic_solution: 'LoRA parameters: 32 layers × 2 modules × 2 (A+B) matrices × (d_model × rank + rank
    × d_model) = 32×2×2×(4096×8) = 32×2×2×32768 = 4.19M params (each LoRA module has A and B, each d_model×rank).
    LoRA FP32: 16.8MB. Gradients: 16.8MB. Optimizer (Adam): 67.2MB. Total LoRA overhead: 67.2MB. Base
    model frozen at INT4: 1.5GB (no gradient needed). Total memory: 1.5GB + 67.2MB = 1.63GB. iOS limit
    ~3GB — fits. FLOPs per sample: 100 samples × 128 tokens × 2 × 4.19M LoRA FLOPs = 100×128×2×4.19M =
    107B FLOPs for LoRA layers. A17 P-cores: ~100 GFLOPS FP32. Time: 215G/100G = 1.07s for 1 epoch. 10
    epochs: 10.7s. Feasible — runs in ~30 seconds during charging.'
  common_mistake: Running LoRA training in INT4 precision; LoRA adapters and their gradients must be stored
    in FP32 or BF16 for stable training, even if the base model weights remain in INT4.
  napkin_math: 'LoRA params: 32 layers × 2 modules × 2 matrices (A+B) × 4096 × 8 = 4.19M. FP32 training
    memory: 4.19M×4×3 (weights+grad+Adam momentum) + 4.19M×4 (Adam variance) = 67MB. Base INT4: 1.5GB.
    Total: 1.67GB. FLOPs: 100 samples × 128 tokens × 2×4.19M = 107B. Time at 100 GFLOPS: 107B/100G = 1.07s/epoch
    × 10 = 10.7s. Feasible.'
