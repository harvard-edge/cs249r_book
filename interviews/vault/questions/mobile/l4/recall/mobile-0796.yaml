schema_version: 1
id: mobile-0796
title: Always-On Wake Word Battery Drain
topic: energy-per-operation
status: published
provenance: imported
scenario: A smartphone has a 3000mAh battery operating at 3.8V. We are deploying an always-on wake-word
  model. Running it on the main CPU consumes a continuous 40mW. Offloading to a dedicated DSP consumes
  only 4mW continuously, but requires waking up the main LPDDR memory for 10ms every 1 second to flush
  audio buffers, consuming 200mW during that 10ms spike. Calculate the percentage of battery drained over
  24 hours for the DSP approach.
details:
  realistic_solution: To calculate battery drain percentage, we first need the total energy capacity of
    the battery in Watt-hours (Wh). A battery's capacity in mAh must be multiplied by its nominal voltage
    to get mWh. Next, we determine the average power consumption of the DSP approach. While the DSP uses
    4mW continuously, the periodic 10ms memory wake-ups at 200mW add a time-averaged power overhead. We
    sum the continuous DSP power and the duty-cycled memory power to find the true average power. Finally,
    we multiply this average power by 24 hours to get the total energy consumed in mWh, and divide by
    the battery capacity to find the percentage. The DSP approach drains about 1.26% of the battery, making
    it highly efficient for an always-on task.
  common_mistake: Calculating battery capacity incorrectly (ignoring voltage) or forgetting to average
    the LPDDR memory spike over the 1-second window.
  napkin_math: 'Battery Capacity = 3000 mAh * 3.8V = 11,400 mWh.

    DSP continuous power = 4 mW.

    Memory flush duty cycle = 10ms / 1000ms = 0.01 (1%).

    Average memory power = 200 mW * 0.01 = 2 mW.

    Total average system power = 4 mW + 2 mW = 6 mW.

    Energy consumed in 24 hours = 6 mW * 24 h = 144 mWh.

    Percentage drained = (144 mWh / 11,400 mWh) * 100 = 1.26%.'
