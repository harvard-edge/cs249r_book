schema_version: 1
id: mobile-cell-11165
title: 'KV-Cache: Realize KV Cache Reuse for System Prompt on Mobile LLM'
topic: kv-cache-management
status: published
provenance: imported
scenario: Realize a system prompt KV cache for a 1B LLM on Snapdragon 8 Gen 3 (45 TOPS INT8, 16GB). The
  system prompt is 256 tokens (same for all chat sessions). Specify the pre-computation, storage, and
  reuse mechanism. Quantify TTFT improvement for a 512-token user message.
details:
  realistic_solution: 'Pre-compute KV for system prompt at positions 0-255. Cache 256-token KV. For new
    conversation: load cached KV, prefill only user message starting at position 256. RoPE positions are
    correct because they match original computation.'
  common_mistake: Not accounting for the positional encoding (RoPE) dependency — the system prompt KV
    is computed at positions 0-255 and must be reused at those exact positions in every new conversation.
  napkin_math: 'System prompt: 256 tokens. KV cache for 256 tokens: 24 × 2 × 8 × 128 × 1B (INT8) = 24
    × 2 × 8 × 128 = 49,152B = 49.2KB × 256 = 12.6MB. One-time computation: prefill 256 tokens. 1B × 6
    × 256 FLOPs / 45 TOPS = 1.54T / 45T = 0.034 seconds = 34ms. Store 12.6MB to flash: 12.6MB / 3 GB/s
    = 4.2ms. Load on app start: same. TTFT without caching: prefill 256 (system) + 512 (user) = 768 tokens.
    Time: 1B × 6 × 768 / (45T × 0.5 efficiency) = 204ms. TTFT with caching: prefill only 512 user tokens.
    Time: 1B × 6 × 512 / 22.5T = 136ms. Saved: 68ms TTFT improvement = 33% faster. Load cached KV overhead:
    12.6MB / 68 GB/s = 0.185ms — negligible. Net TTFT: 136ms vs 204ms. 1.5× TTFT improvement for no quality
    cost.'
