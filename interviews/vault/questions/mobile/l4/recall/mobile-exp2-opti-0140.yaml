schema_version: 1
id: mobile-exp2-opti-0140
title: NPU Preemption and CPU Fallback Optimization
topic: graceful-degradation
status: published
provenance: imported
scenario: You are deploying an on-device language model for real-time translation on a smartphone featuring
  the Qualcomm Hexagon NPU (Snapdragon 8 Gen 3). During heavy multitasking, the NPU is preempted by a
  higher-priority camera workload, causing latency to spike beyond the 200ms budget and forcing a fallback
  to the CPU. You must analyze the memory bandwidth bottleneck on the shared 12-16 GB LPDDR5X and quantify
  the performance of a graceful degradation strategy that switches to a smaller CPU-bound model.
details:
  realistic_solution: The system should implement a degradation ladder that drops from the primary 3B
    parameter NPU model to a highly quantized 1B parameter INT8 model optimized for the CPU. By analyzing
    the shared LPDDR5X memory bandwidth and compute availability, the system ensures the fallback model
    fits within the remaining bandwidth quota without starving the GPU or CPU, maintaining baseline operational
    status over output quality.
  common_mistake: Candidates often assume the CPU can immediately take over the same workload without
    analyzing the memory bandwidth saturation on the shared LPDDR5X pool. They frequently propose falling
    back to a model of the same size, which causes severe cache thrashing and thermal throttling, rather
    than employing a dedicated, aggressively quantized fallback model.
  napkin_math: The Hexagon NPU offers 45 TOPS INT8. The primary 3B model (INT8) requires 3GB of memory
    and ~60 GB/s bandwidth to achieve 20 tokens/sec. The shared LPDDR5X has ~68 GB/s total bandwidth.
    When the NPU is preempted, running the 3B model on the CPU would saturate the memory bus. The fallback
    1B INT8 model requires only 1GB of memory and 20 GB/s bandwidth to maintain 20 tokens/sec. This reduces
    bandwidth consumption by 40 GB/s, keeping total system memory traffic within safe limits and enabling
    the feature to degrade gracefully.
