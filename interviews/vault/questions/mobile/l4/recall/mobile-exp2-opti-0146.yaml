schema_version: 1
id: mobile-exp2-opti-0146
title: CI/CD Hardware Fallback on Tensor G3
topic: mlops-lifecycle
status: published
provenance: imported
scenario: Your automated ML CI/CD pipeline deploys nightly builds of an on-device LLM to Android devices.
  An architecture update passed all server-side accuracy metrics but caused a severe latency regression
  on the Google Tensor G3. Profiling reveals an unsupported activation function caused the Edge TPU to
  fall back to the CPU. You must diagnose the MLOps pipeline gap that missed this training-serving inconsistency
  and quantify the performance penalty.
details:
  realistic_solution: Integrate the Edge TPU compiler into the CI/CD pipeline to fail builds if CPU fallbacks
    are detected before registering the model. Replacing the unsupported op ensures the 2B parameter model
    stays entirely on the TPU, leveraging its 7.5 TOPS and the 12 GB LPDDR5X memory efficiently without
    costly context switches.
  common_mistake: Candidates often suggest simply changing the activation function without fixing the
    MLOps pipeline to include hardware-in-the-loop (HITL) testing or Edge TPU compiler checks in CI/CD.
    They also frequently fail to quantify the latency cost of context switching versus native TPU execution.
  napkin_math: Generating a token with a 2B parameter model requires ~4 Giga-operations. On the G3's 7.5
    TOPS TPU, theoretical compute time is ~0.53 ms per token (4e9 / 7.5e12). An unsupported op forces
    a CPU fallback, copying a 2MB activation tensor via the LPDDR5X RAM (adding ~0.03 ms transfer at 60
    GB/s) plus ~5 ms CPU compute overhead per token. For a 200-token response, the pipeline failure increases
    latency from ~106 ms (pure TPU) to over 1.1 seconds (CPU fallback).
