schema_version: 1
id: mobile-exp2-opti-0153
title: Optimizing On-Device Toxicity Guardrails for Gemini Nano
topic: responsible-ai
status: published
provenance: imported
scenario: You are deploying an on-device generative AI chat feature powered by Gemini Nano on the Google
  Tensor G3. To adhere to Responsible AI policies, all generated text must be evaluated by an on-device
  toxicity guardrail model before display. The current unoptimized 110M parameter guardrail runs sequentially
  after every sentence is generated, causing severe stuttering and failing the 200ms time-to-display budget.
  How do you diagnose this bottleneck and quantify an optimized execution strategy on the Tensor G3's
  7.5 TOPS TPU and 12 GB LPDDR5X memory?
details:
  realistic_solution: The optimal approach is to distill the guardrail into a sub-10M parameter model,
    quantize it to INT8, and pipeline its execution on the TPU concurrently with the LLM's token generation.
    Since the Tensor G3 has ample memory bandwidth (LPDDR5X) and 7.5 TOPS, the smaller guardrail can evaluate
    chunks of tokens asynchronously, hiding its latency entirely behind the generative process.
  common_mistake: Candidates often suggest offloading the safety check to the cloud, breaking strict on-device
    privacy requirements, or they propose extreme quantization without addressing the sequential execution
    bottleneck.
  napkin_math: The original 110M parameter model in FP16 requires ~220 MB of memory and ~22 GOps per inference,
    taking ~3ms of compute (22 / 7500) but dominating memory bandwidth while sequential. A distilled INT8
    model of 5M parameters takes ~5 MB memory and 1 GOp. On the 7.5 TOPS Tensor G3 TPU, inference takes
    just ~0.13ms (1 / 7500), which can be pipelined with Gemini Nano's ~15ms/token generation time, effectively
    zeroing out the guardrail latency overhead.
