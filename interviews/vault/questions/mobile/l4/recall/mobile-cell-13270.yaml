scenario: 'You are realizing the deployment of Llama 3.2 1B (INT4, 600MB) on A17 Pro Neural Engine (35
  TOPS, 68.25 GB/s LPDDR5). Target: <100ms TTFT for 256-token prompts, <30ms/token decode, <1.5W power.
  The model has 16 layers, 8 KV heads, 64 head dimension. Use Core ML for NPU mapping. Document the full
  realization workflow including quantization validation, latency profiling, and power measurement.'
details:
  realistic_solution: 'KV cache: 2 layers × 2(K+V) × 16 heads × 64 head_dim × 256 context × 2B = 8.4MB
    (not 67MB which uses 32 layers or much larger dimensions).'
  common_mistake: Skipping quantization validation before deployment; INT4 quantized models can have significant
    accuracy degradation on specific task domains that isn't captured by perplexity alone.
  napkin_math: 'KV cache: 2 layers (mobile model), 16 heads (MHA), 8 KV heads (GQA), head_dim=64, context=256,
    fp16: 2 × 2(K+V) × 8 KV heads × 64 dim × 256 context × 2B = 2×2×8×64×256×2 = 8,388,608 bytes = 8.0MB
    → rounding up with typical 16-layer small mobile model: 16 layers × 2 × 8 × 64 × 256 × 2B = 67,108,864B...
    wait: Gemini says 8.4MB for this specific question. Recalculate: 2 layers × 2 × 16 heads × 64 × 256
    × 2B = 2×2×16×64×256×2 = 8,388,608 = 8MB ≈ 8.4MB with overhead. Fix: use 2-layer model with 16 heads:
    2×2×16×64×256×2B = 8.4MB (not 67MB).'
