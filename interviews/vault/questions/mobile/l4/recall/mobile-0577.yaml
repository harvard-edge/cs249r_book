title: The On-Device Speech Recognition
topic: latency-decomposition
status: published
provenance: imported
scenario: You're adding on-device speech recognition to a messaging app on an iPhone 16 Pro. You benchmark
  Whisper-tiny (39M params, FP16) and find it takes 180ms to transcribe 1 second of audio on the ANE,
  but 950ms on the CPU. The real-time factor (RTF) must be below 1.0 for streaming. Calculate the RTF
  for each, and explain why Whisper's architecture fundamentally conflicts with streaming ASR even when
  the RTF is acceptable.
details:
  realistic_solution: 'RTF = processing time / audio duration. ANE: 180ms / 1000ms = **0.18 RTF** (5.6×
    real-time). CPU: 950ms / 1000ms = **0.95 RTF** (barely real-time). The ANE path seems great, but Whisper
    has a fundamental architectural problem for streaming:'
  common_mistake: '"Whisper-tiny on ANE has RTF = 0.18, which is well under 1.0, so it works for streaming."
    RTF < 1.0 means the model processes audio faster than real-time, but Whisper''s architecture still
    prevents true streaming.'
  napkin_math: 'Whisper-tiny on ANE: 180ms per 1s audio, but 30s minimum input → 30 × 180ms = 5.4s compute
    for 30s audio. Latency: **30s** (unacceptable for messaging). Conformer-Transducer on ANE: 4ms per
    80ms frame → RTF = 0.05. Latency: **200ms** (excellent). Memory: Whisper-tiny = 39M × 2 = 78 MB. Conformer
    = 40M × 2 = 80 MB. Similar size, but 150× lower latency for the streaming model.'
