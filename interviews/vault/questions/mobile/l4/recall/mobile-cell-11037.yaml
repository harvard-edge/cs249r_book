id: mobile-cell-11037
title: 'Dataset Curation: Realize Training Data Requirements for On-Device LLM Fine-Tuning'
topic: dataset-curation
status: published
provenance: imported
scenario: Realize the complete data requirements for fine-tuning a 1B LLM on A17 Pro (35 TOPS Neural Engine,
  8GB RAM) for email composition assistance. The model must fit in memory during inference (4-bit quantized)
  and fine-tuning must complete in < 5 minutes in the background.
details:
  realistic_solution: '4-bit quantized 1B model = 500MB inference. Fine-tuning: LoRA rank-16 adds 2M trainable
    params. Training data: 1,000 user email examples × 512 tokens avg. Fine-tuning must use float16 LoRA
    weights while keeping quantized base frozen.'
  common_mistake: Not accounting for quantization accuracy loss when planning fine-tuning data quantity;
    trying to fine-tune the full model on-device instead of using LoRA/adapters.
  napkin_math: 'Memory during fine-tuning: frozen 4-bit base = 500MB. LoRA weights fp16: 2M × 2B = 4MB.
    Optimizer (AdamW): 2 × 2M × 4B = 16MB. Activations (batch=1, seq=512): 512 × 2048 hidden × 2B = 2MB
    per layer × 32 layers = 64MB. Total: 500 + 4 + 16 + 64 = 584MB. Well within 8GB. Fine-tuning compute:
    1K examples × 512 tokens × 3 epochs = 1.536M tokens. FLOPs: 6 × 2M params × 1.536M tokens = 18.4B
    FLOPs (LoRA only, base frozen). A17 Pro GPU: 2 TFLOPS → 9.2 seconds. Add data loading: 1K × 512 tokens
    × 2B = 1MB → negligible. Total: ~10 seconds. Way under 5-minute budget.'
