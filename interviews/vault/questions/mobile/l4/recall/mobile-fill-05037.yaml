schema_version: 1
id: mobile-fill-05037
title: Core ML Palettization vs GGUF Quantization for LLM on iPhone
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: A team compares Apple Core ML palettization (4-bit lookup table per weight block) vs GGUF Q4_K_M
  (4-bit mixed quantization) for deploying Llama-3-8B on iPhone 15 Pro (A17 Pro, 8GB RAM). Core ML achieves
  12 tok/s with 4.5GB model; GGUF achieves 15 tok/s with 4.3GB model. Explain the performance gap.
details:
  realistic_solution: 'Core ML palettization: weights stored as 4-bit indices into a per-block lookup
    table. Neural Engine executes via ANE-optimized operators. At 8B model, ANE throughput is high but
    suffers from lookup table dereference overhead and Core ML graph compilation constraints. GGUF Q4_K_M:
    mixed-precision (K-quant method), some layers at 6-bit, others at 4-bit. Runs on CPU with BLAS + Metal
    GPU fallback via llama.cpp. iPhone CPU (3× A-cores at ~1 TFLOPS) + memory bandwidth (68 GB/s) handles
    token generation. The 3 tok/s gap: Core ML ANE startup overhead dominates for token-by-token generation;
    llama.cpp is optimized for single-token decode with efficient memory access. For batch > 1, Core ML
    would win.'
  common_mistake: Assuming the quantization format with fewer bits always produces the fastest inference;
    the runtime engine, operator fusion, and hardware unit utilization matter as much as bit-width.
  napkin_math: 'Model size: Core ML 4.5GB vs GGUF 4.3GB (similar). Memory BW limit: 4.3GB/68GB/s = 63ms/token
    = 15.9 tok/s max. GGUF achieves 15 tok/s = 94% of memory BW ceiling. Core ML 12 tok/s = 75% of ceiling
    — ANE scheduling overhead costs ~20%.'
