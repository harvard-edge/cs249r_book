schema_version: 1
id: mobile-0800
title: On-Device vs Cloud LLM Energy Cost
topic: tco-cost-modeling
status: published
provenance: imported
scenario: Generating 50 tokens using an on-device 7B model takes 2.5 seconds at 5W (NPU + Memory). Alternatively,
  an API call to a cloud server takes 0.5s of 5G active radio time at 2.0W, followed by 1.0s of idle waiting
  for the response at 0.5W. The cloud server itself consumes 0.05 Joules per token. Compare the total
  system energy (Device + Cloud) of both approaches. How much more total energy (in Joules) does the on-device
  approach use compared to the cloud approach?
details:
  realistic_solution: 'To determine the true energy efficiency of edge vs cloud LLM serving, we must calculate
    the end-to-end energy for both scenarios. For the on-device approach, all energy is consumed locally
    by the SoC (NPU and memory bandwidth). For the cloud approach, the energy is split: the mobile device
    spends energy transmitting the prompt and keeping the radio active waiting for the response, while
    the datacenter spends energy computing the tokens. We calculate the Joules for each component. The
    local generation uses 12.5 Joules. The cloud generation uses 1.5 Joules locally and 2.5 Joules in
    the datacenter, totaling 4.0 Joules. The on-device approach actually consumes 8.5 Joules more total
    system energy.'
  common_mistake: Only comparing the device energy to the cloud server energy, forgetting that the cloud
    approach also costs the device radio and idle energy.
  napkin_math: 'On-Device Approach:

    Device Energy = 5W * 2.5s = 12.5 Joules.

    Total System Energy = 12.5 Joules.


    Cloud Approach:

    Device Radio Energy = 2.0W * 0.5s = 1.0 Joules.

    Device Idle Wait Energy = 0.5W * 1.0s = 0.5 Joules.

    Total Device Energy = 1.5 Joules.

    Cloud Server Energy = 50 tokens * 0.05 J/token = 2.5 Joules.

    Total System Energy = 1.5J + 2.5J = 4.0 Joules.


    Difference = 12.5J - 4.0J = 8.5 Joules more energy used by the on-device approach.'
