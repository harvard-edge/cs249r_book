schema_version: 1
id: mobile-fill-05008
title: Attention Head Pruning for On-Device Transformer on Snapdragon 8 Gen 3
topic: attention-scaling
status: published
provenance: imported
scenario: A mobile NLP team is running a 6-layer transformer (12 heads, d_model=768) for on-device text
  classification on Snapdragon 8 Gen 3 (45 TOPS INT8). Profiling shows attention accounts for 60% of latency
  at seq_len=512. They propose pruning 50% of heads. Analyze the trade-offs.
details:
  realistic_solution: 'Attention FLOPs at seq=512, d=768, 12 heads: QKV = 3×512×768×768 = 905M, QK^T =
    12×512×512×64 = 201M, AV = 12×512×512×64 = 201M, O proj = 512×768×768 = 302M. Total attn = 1.6B FLOPs.
    50% head pruning (6 pruned heads, 6 layers): QK^T savings = 6×6×512²×64×2 = 1,208M FLOPs; AV savings
    = 1,208M; O-proj savings ≈ 151M. Total saving ≈ 2,567M / 4,816M ≈ 53% attention FLOPs, or ~32% total
    model FLOPs. Actual latency reduction may be less due to memory access patterns and kernel launch
    overhead.'
  common_mistake: Treating head pruning as uniformly removing 50% of attention FLOPs; the QKV projection
    and output projection reductions scale with heads but the positional encoding and layer norm costs
    are unchanged.
  napkin_math: 'Total attention: ~1.6B FLOPs. Head pruning 50% (6 heads pruned across 6 layers) saves:
    QK^T (6×6×512²×64×2 ≈ 1,208M FLOPs) + AV (1,208M) + O-proj (50%) = ~2,567M FLOPs saved ≈ 160% of napkin
    estimate; total attention FLOPs ≈2.4B, saving ≈53%, model saving ≈32%. Latency: 60% of time saved
    by 53% ≈ 32% total latency reduction.'
