schema_version: 1
id: mobile-0799
title: Thermal Throttling in Background Indexing
topic: thermal-management
status: published
provenance: imported
scenario: 'A smartphone indexes local photos using a Vision Transformer. The SoC has a 2.5W continuous
  TDP. The ViT runs at 30 FPS, consuming 4.0W (burst mode). To prevent overheating, the thermal governor
  enforces a rule: the 1-minute average power cannot exceed the 2.5W TDP. When not bursting, the SoC enters
  a cool-down state drawing 1.0W (processing 0 FPS). Calculate the maximum number of images the device
  can index per minute without violating the thermal limit.'
details:
  realistic_solution: Mobile thermal management relies on managing energy over a sliding window. The device
    can burst above its TDP (4.0W > 2.5W) as long as it compensates with a low-power cool-down phase (1.0W)
    such that the integral of power over the window (energy) equals the TDP's maximum energy allowance.
    For a 60-second window, the maximum allowed energy is 150 Joules. We set up an equation where the
    time spent bursting plus the time spent cooling equals 60 seconds, and their combined energy equals
    150 Joules. Solving this gives the maximum allowable burst time per minute. Multiplying this burst
    time by the model's FPS yields the maximum sustained throughput.
  common_mistake: Calculating throughput purely based on the 4.0W burst without realizing the duty cycle
    is constrained by the 1.0W cool-down floor.
  napkin_math: 'Max energy per minute = 2.5W * 60s = 150 Joules.

    Let T_burst = time spent at 4.0W, T_cool = time spent at 1.0W.

    T_burst + T_cool = 60s.

    Energy equation: (4.0 * T_burst) + (1.0 * T_cool) = 150.

    Substitute T_cool: 4.0 * T_burst + 1.0 * (60 - T_burst) = 150.

    3.0 * T_burst + 60 = 150.

    3.0 * T_burst = 90  =>  T_burst = 30 seconds.

    The device can run the ViT for 30 seconds per minute.

    Throughput = 30 seconds * 30 FPS = 900 images per minute.'
