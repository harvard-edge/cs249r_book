id: mobile-exp2-opti-0136
title: Optimizing On-Device Drift Detection for Google Tensor G3
topic: distribution-drift-detection
status: published
provenance: imported
scenario: You are deploying a local intent recognition model alongside Gemini Nano on a Google Tensor
  G3 device. To detect data drift, a background service computes the KL divergence between real-time incoming
  text embeddings and a baseline distribution, but this causes severe battery drain and competes for memory
  bandwidth on the 12 GB LPDDR5X RAM, causing UI stutter. How do you analyze this computational bottleneck
  and quantify an optimized on-device drift detection strategy?
details:
  realistic_solution: The bottleneck is continuous CPU-bound execution and excessive memory reads for
    small operations. The fix requires batching the requests and offloading the embedding projection and
    histogram building to the Tensor G3's TPU. By caching incoming data and computing Population Stability
    Index (PSI) using INT8 quantized embeddings in micro-batches during device idle windows, you leverage
    the TPU's matrix math efficiency while drastically reducing the time the memory bus is active.
  common_mistake: Candidates often suggest offloading the drift calculation to the cloud, which defeats
    the privacy purpose of on-device LLMs. Alternatively, they propose sub-sampling the data without considering
    how to efficiently map the continuous statistical distance calculations (like KL divergence or PSI)
    to the mobile accelerator hardware.
  napkin_math: Continuous CPU execution for 10 samples/sec at 50 MFLOPs/sample = 500 MFLOPs continuous
    load, preventing sleep states. By batching 1,000 samples, the workload becomes 50 GOPS. Offloading
    this batch to the Tensor G3 TPU, which delivers 7.5 TOPS (7,500 GOPS), the computation takes roughly
    50 / 7500 = 6.6 milliseconds. Running this 6.6ms burst every 100 seconds instead of continuously reduces
    active compute time to <0.01%, virtually eliminating LPDDR5X bandwidth contention and battery drain.
