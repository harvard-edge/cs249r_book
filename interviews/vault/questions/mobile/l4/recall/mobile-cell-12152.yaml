schema_version: 1
id: mobile-cell-12152
title: 'Network Bandwidth Bottlenecks: Optimize Decode TPOT via Speculative Decoding on Snapdragon'
topic: network-bandwidth-bottlenecks
status: published
provenance: imported
scenario: 'A 7B INT4 LLM (TPOT 45.5ms on Snapdragon 8 Gen 3, 77 GB/s) needs to achieve TPOT < 20ms for
  real-time conversation. Two options: (A) Reduce to 3B INT4 (TPOT 19.5ms, accuracy loss), (B) Keep 7B
  + add speculative decoding with 200M draft (INT8, 200MB). Quantify TPOT for option B and compare accuracy
  tradeoff.'
details:
  realistic_solution: 'Option A: 19.5ms TPOT, ~3% accuracy loss (7B→3B). Option B: Draft (200M INT8):
    K=4 tokens. Draft BW: 4×200MB/77GB/s=10.4ms. Verify (7B INT4, 1 pass for K+1 tokens): 3.5GB/77GB/s=45.5ms.
    Total step: 55.9ms. If α=0.75 acceptance: avg tokens=(1-0.75^4)/(1-0.75)=2.73. Effective TPOT: 55.9/2.73=20.5ms.
    Close to target! With better draft (α=0.8): tokens=(1-0.8^4)/(1-0.8)=3.36. TPOT: 55.9/3.36=16.6ms
    ✓. Option B maintains 7B accuracy.'
  common_mistake: Not accounting for the fact that speculative decoding verification requires one 7B model
    forward pass for every K draft tokens — the verification pass costs more BW than K individual draft
    tokens.
  napkin_math: 'Draft K=4: 4×200MB/77=10.4ms. Verify 7B: 3.5GB/77=45.5ms. Step: 55.9ms. α=0.8, K=4: avg
    accepted = (1-α^(K+1))/(1-α) -1 = (1-0.8^5)/(0.2) - 0 ... standard formula: E[accepted]=(1-α^K)/(1-α)
    = (1-0.4096)/0.2=2.95 for α=0.8, K=4. TPOT: 55.9/2.95=18.9ms ✓. Option B: 18.9ms, full 7B accuracy.
    Winner vs Option A at 19.5ms with 3% accuracy loss.'
