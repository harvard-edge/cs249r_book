schema_version: 1
id: mobile-exp-opti-0008
title: Optimizing Intersectional Fairness Evaluation on Tensor G3
topic: fairness-evaluation
status: published
provenance: imported
scenario: We are deploying an on-device text classification model (similar to Gemini Nano) on the Google
  Tensor G3. To monitor intersectional fairness without sending user data to the cloud, we must periodically
  run an evaluation across 40 demographic subgroups using a local 1,000-sample dataset. Currently, the
  evaluation pipeline computes equalized odds by running inferences sequentially on the CPU, which takes
  over 5 minutes and triggers thermal throttling. How would you analyze the bottleneck and optimize this
  pipeline using the G3's hardware to quantify demographic parity and equalized odds efficiently?
details:
  realistic_solution: The optimal approach separates inference from metric calculation. First, we run
    batched inference for all 1,000 samples on the G3's TPU, storing the output logits in the 12 GB LPDDR5X
    memory. Then, we use a vectorized approach on the CPU to cross-reference these predictions with the
    40 subgroup labels simultaneously to compute false positive and false negative rates, resolving the
    thermal bottleneck and drastically reducing execution time.
  common_mistake: Candidates often suggest moving the evaluation to the cloud, which violates privacy
    constraints, or they try to compute metrics iteratively during inference. They frequently fail to
    utilize the Edge TPU for batched inference or ignore the memory bandwidth capabilities of the 12 GB
    LPDDR5X, leading to high CPU-TPU transfer overhead.
  napkin_math: The G3 TPU provides 7.5 TOPS. If our quantized model requires 3 GOPs (billion operations)
    per inference, one pass takes 3 / 7500 = 0.4 ms. For 1,000 samples, total TPU inference time is 1,000
    * 0.4 ms = 400 ms. Storing 1,000 logits and 40 subgroup masks takes negligible memory (< 1MB) and
    easily fits within the 12 GB LPDDR5X footprint. Vectorized metric computation on the CPU takes ~50
    ms. Total evaluation time drops from >300,000 ms (5 minutes) to under 500 ms.
