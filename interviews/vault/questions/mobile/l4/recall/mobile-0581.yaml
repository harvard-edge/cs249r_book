id: mobile-0581
title: The Pocket Oven LLM
topic: power-budgeting
status: published
provenance: imported
scenario: Your team ships an on-device LLM chatbot (3B params, INT4, 1.5 GB weights) on a Samsung Galaxy
  S24 Ultra (Snapdragon 8 Gen 3). Users love it — but after 5 minutes of continuous conversation, the
  phone hits 45°C skin temperature and Android triggers thermal throttling. The SoC junction temperature
  is 105°C. The user's phone is in their pocket (no convective cooling). Calculate the thermal budget
  and design a system that prevents overheating.
details:
  realistic_solution: The thermal problem is physics, not software. A phone in a pocket has near-zero
    convective cooling — heat can only dissipate through conduction to the user's body and radiation,
    both slow.
  common_mistake: '"Throttle the NPU clock when it gets hot." Reactive throttling is too late — by the
    time the SoC hits 105°C, the phone skin is already uncomfortably hot and the user has had a degraded
    experience for minutes.'
  napkin_math: 'Full power: 4.5W. Pocket thermal limit: ~3W. Overshoot: 1.5W → temperature rises at ~0.5°C/s
    (junction). From 70°C ambient junction to 105°C throttle: 35°C / 0.5°C/s = 70 seconds to throttle.
    Throttled power: 2.7W (under budget, but user already felt heat). Proactive cap at 3W: 1.5 GB / (30
    GB/s × 0.67 clock) = 75ms/token = 13 tok/s. Temperature stabilizes at ~90°C junction, ~40°C skin.
    User never feels discomfort. Throughput cost: 20 → 13 tok/s (35% reduction). Acceptable trade-off.'
