id: mobile-sus-61048
title: Quantized LoRA Serving on Snapdragon 8 Gen 3
topic: model-adaptation-systems
status: published
provenance: imported
scenario: You are deploying a QLoRA-quantized 1B model with NF4 base weights and BF16 adapters on Snapdragon
  8 Gen 3. The Hexagon NPU only supports INT8/INT4 arithmetic. How do you handle the BF16 adapter execution?
details:
  realistic_solution: 'Quantize adapter weights to INT8 at deployment time (not at training time, to preserve
    training quality). INT8 LoRA adapters lose <0.5% quality for rank-4 on most tasks. The merged result
    (W_base + B×A in INT8) can then run entirely on Hexagon NPU. Alternative: if adapters must stay BF16,
    use QNN SDK''s AIMET to run adapter compute on Adreno GPU (which supports FP16) in pipeline with Hexagon
    NPU, overlapping the two compute phases.'
  common_mistake: Running LoRA adapter matmuls on the CPU because the Hexagon NPU doesn't support BF16.
    This serializes CPU execution with NPU compute, causing bubbles that cut effective throughput by 40-60%.
  napkin_math: 'Rank-4 adapter INT8: 786K × 1B = 0.8 MB (vs 1.6 MB BF16). Hexagon INT8 throughput: 45
    TOPS. Adapter compute per decode step: 786K MACs × 2 = 1.57 MMACs. At 45 TOPS: 1.57M / 45T = 0.000035ms
    = 0.035 µs — negligible. Adreno GPU FP16 for BF16 fallback: ~7 TFLOPS. Same compute: 1.57M / 7T =
    0.000224ms. CPU fallback: ~100 GFLOPS → 0.0157ms — 440× slower than Hexagon. Always quantize adapters
    for mobile.'
