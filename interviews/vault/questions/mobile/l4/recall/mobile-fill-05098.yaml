schema_version: 1
id: mobile-fill-05098
title: Adaptive Bitrate Quantization Based on Thermal State on Snapdragon 8 Gen 3
topic: quantization-fundamentals
status: published
provenance: imported
scenario: 'A mobile app dynamically adjusts model quantization based on device thermal state on Snapdragon
  8 Gen 3. State 0 (cool): run INT8 (91% accuracy, 45 TOPS). State 1 (warm): run INT4 (88% accuracy, ~40
  TOPS reduced clock). State 2 (hot): run INT2 (82% accuracy, ~30 TOPS throttled). Design the transition
  logic with hysteresis.'
details:
  realistic_solution: 'Hysteresis design: upgrade threshold (lower precision → higher) must be lower than
    downgrade threshold (higher → lower). State 0→1 (degrade): T_junction > 75°C. State 1→0 (upgrade):
    T_junction < 65°C. 10°C hysteresis prevents oscillation. State 1→2: T > 85°C. State 2→1: T < 75°C.
    Model loading: INT4 and INT2 models pre-loaded in memory (100MB INT4, 50MB INT2 alongside 200MB INT8
    base). Transition: on state change, swap model reference (not full reload). Latency: model swap ~5ms
    (pointer change + cache flush). Accuracy announcement: notify UI of quality level change (show indicator
    when running degraded model). Recovery after heat dissipates: state 2→1→0 transition takes ~2 minutes
    of idle time.'
  common_mistake: Switching quantization precision synchronously when temperature crosses a threshold,
    causing oscillation at the boundary (switching back and forth every few inference steps).
  napkin_math: 'INT8 model: 200MB. INT4 model: 100MB. INT2 model: 50MB. Total: 350MB in memory. State
    0 (cool, <65°C): INT8, 91% accuracy, 45 TOPS. State 1 (warm, 65-75°C): INT4, 88% accuracy. State 2
    (hot, >85°C): INT2, 82% accuracy. Hysteresis: 10°C prevents thrashing. Model swap: 5ms overhead.'
