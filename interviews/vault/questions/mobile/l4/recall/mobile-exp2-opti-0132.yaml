id: mobile-exp2-opti-0132
title: Diagnosing NPU Compute Bottlenecks on Snapdragon 8 Gen 3
topic: compute-cost-estimation
status: published
provenance: imported
scenario: Your team is deploying a real-time semantic segmentation model requiring 12 GFLOPs per inference
  on a device featuring the Qualcomm Hexagon NPU (Snapdragon 8 Gen 3). The platform provides 45 TOPS INT8
  compute and utilizes a shared 16 GB LPDDR5X memory pool. While the NPU has massive theoretical headroom,
  profiling reveals the model is struggling to hit 30 FPS and is severely bottlenecked. Analyze the interactions
  between compute precision and the shared memory architecture to diagnose this bottleneck, and quantify
  the performance fix.
details:
  realistic_solution: The model is likely running in FP32 or FP16, meaning it cannot fully utilize the
    INT8-optimized Hexagon NPU and is saturating the shared memory bandwidth. The fix is to apply post-training
    quantization (PTQ) or quantization-aware training (QAT) to convert the model to INT8. This unlocks
    the 45 TOPS NPU throughput while simultaneously cutting the memory footprint and bandwidth requirements
    by up to 4x.
  common_mistake: Candidates often look only at the 45 TOPS figure and assume compute is abundant, failing
    to realize those TOPS are strictly for INT8. They frequently miss that running an unquantized model
    starves the shared LPDDR5X memory bandwidth and forces fallback to less efficient heterogeneous cores.
  napkin_math: 12 GFLOPs in FP32 translates roughly to 24 GOPS in INT8. To achieve 30 FPS, the compute
    requirement is 24 GOPS * 30 = 720 GOPS, or 0.72 TOPS. Since the Qualcomm Hexagon NPU (Snapdragon 8
    Gen 3) delivers 45 TOPS INT8, the workload requires only (0.72 / 45) = 1.6% of peak NPU compute capacity.
    By quantizing to INT8, you eliminate the memory bandwidth bottleneck on the shared LPDDR5X and easily
    achieve the 30 FPS target.
