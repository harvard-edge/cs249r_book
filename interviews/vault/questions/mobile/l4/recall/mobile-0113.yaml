schema_version: 1
id: mobile-0113
title: The Power Hungry Framework
topic: power-budgeting
status: published
provenance: imported
scenario: You're tasked with deploying a computer vision model on both Android and iOS, with a strict
  power consumption budget for inference (e.g., <100mW average over 30 seconds). You've benchmarked the
  model using TensorFlow Lite (TFLite) on Android and Core ML on iOS. You observe that while TFLite on
  Android achieves the latency target, its power draw is consistently 20-30% higher than Core ML on iOS
  for a similar model and device class. What factors could explain this power discrepancy, and how would
  you optimize TFLite's power efficiency?
details:
  realistic_solution: The power discrepancy often stems from differences in how the ML frameworks interact
    with the underlying hardware, operating system, and their respective drivers/delegates.
  common_mistake: '"Android devices are just less power-efficient than iOS." While general hardware differences
    exist, this doesn''t explain a *framework-specific* discrepancy for a similar model and device class.'
  napkin_math: If model inference takes 50ms, and the NPU consumes 200mW while the CPU consumes 500mW.
    A 10% CPU fallback (5ms of CPU time per inference) adds 5ms * 500mW = 2.5mJ of energy, compared to
    NPU's 5ms * 200mW = 1mJ. Over 30 seconds of continuous inference (600 inferences), this difference
    accumulates significantly.
