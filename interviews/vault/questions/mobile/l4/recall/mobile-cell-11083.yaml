id: mobile-cell-11083
title: 'Fault Tolerance: Optimize Recovery Speed for Frequently Crashing Mobile Training'
topic: fault-tolerance-checkpointing
status: published
provenance: imported
scenario: 'Your nightly fine-tuning job on Tensor G3 (7.5 TOPS, 12GB) crashes 3 times per week on average
  due to thermal throttling (device overheats after 7 minutes of training). Current recovery: restart
  from scratch each time (10 minutes per attempt = 30 wasted minutes/week). Optimize to recover in < 30
  seconds from crash.'
details:
  realistic_solution: 'Dual fix: (1) Checkpoint every 2 minutes (given ~7 min to crash, save progress
    at 2, 4, 6 minutes). (2) Implement thermal monitoring: reduce batch size or pause when SOC temp >
    85°C. Both together eliminate most crashes.'
  common_mistake: Treating thermal throttling as a fault tolerance problem rather than a thermal management
    problem; not checkpointing frequently enough given the known crash rate.
  napkin_math: 'Thermal crash at ~7 minutes. Checkpoint every 2 minutes: max lost work = 2 minutes. LoRA
    checkpoint: 2M params × 12B (weights + optimizer) = 24MB. Write at Tensor G3 flash 1 GB/s = 24ms.
    Overhead: 24ms/120s = 0.02% — negligible. Recovery from 2-min checkpoint: restart app (3 seconds)
    + load checkpoint (24MB / 1 GB/s = 24ms) + resume training. Total: 3.024 seconds << 30 second target.
    Thermal management: poll SOC temp every 5 seconds (Android Thermal API). At 85°C → reduce batch size
    from 32 to 8 (reduces power 4×). Training slows 4× but avoids crash. With both fixes: crashes/week
    drops from 3 to ~0.1 (occasional extreme cases). Wasted time: 0.1 × 3 seconds recovery = 0.3 seconds/week
    vs 30 minutes. 6,000× improvement.'
