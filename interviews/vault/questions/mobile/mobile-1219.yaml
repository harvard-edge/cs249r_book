title: Analyzing Sustained vs Burst Performance on Exynos 2400
scenario: 'You are deploying a continuous real-time video enhancement model on a mobile NPU. During the first 60 seconds of processing, the model achieves a steady 60 FPS. However, after 3 minutes of continuous execution, the system framerate suddenly drops to 35 FPS, despite no changes to the input workload.'
question: 'Why does this performance degradation occur, and what is the theoretical sustained TOPS required to maintain the degraded framerate?'
details:
  realistic_solution: 'The performance drop is due to DVFS (Dynamic Voltage and Frequency Scaling) responding to thermal limits. The SoC throttles NPU clocks to maintain a sustained TDP. Use nsys profiling to measure the steady-state thermal envelope, and optimize kernel execution with operator fusion.'
  common_mistake: |
    **The Pitfall:** Attributing the drop to memory leaks or OS background scheduling.
    **The Rationale:** Candidates fail to recognize the fundamental difference between burst TOPS and sustained thermal limits on passive mobile devices.
    **The Consequence:** They waste time debugging software memory leaks instead of optimizing the model for the actual sustained hardware thermal envelope.
  napkin_math: |
    1. **Assumptions & Constraints:**
       * Initial Performance: 60 FPS.
       * Throttled Performance: 35 FPS.
       * Burst TOPS: 34.7 TOPS.
    2. **Calculations:**
       * Burst Compute Cost: 34.7 TOPS / 60 FPS = 0.578 TOPS/frame.
       * Sustained Compute: 35 FPS * 0.578 TOPS/frame = 20.23 TOPS.
    3. **Conclusion & Interpretation:**
       * **Result: Thermal-Bound.** The device retains roughly 58% (20.23 / 34.7) of its peak capacity under sustained thermal load.
