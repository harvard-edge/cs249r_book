title: Analyzing Sustained vs Burst Performance on Exynos 2400
scenario: You are deploying a continuous real-time video enhancement model on the Samsung Exynos 2400 NPU. The SoC features a dual-core NPU with a peak burst performance of 34.7 TOPS and utilizes a shared 12 GB LPDDR5X memory pool. During the first 60 seconds of processing, the model achieves a steady 60 FPS. However, after 3 minutes of continuous execution, the system framerate suddenly drops to 35 FPS, despite no changes to the input workload.
question: Why does this performance degradation occur, and what is the theoretical sustained TOPS required to maintain the degraded framerate?
details:
  realistic_solution: The 34.7 TOPS rating of the Exynos 2400 is a peak burst metric that cannot be sustained indefinitely in a passively cooled mobile device. As the SoC heats up from continuous NPU and shared memory controller usage, the OS thermal governor aggressively throttles the NPU clock frequency to stay within the thermal envelope. The performance drop to 35 FPS reflects the device settling into its maximum sustained thermal state.
  common_mistake: |
    **The Pitfall:** Attributing the drop to memory leaks or OS background scheduling.
    **The Rationale:** Candidates fail to recognize the fundamental difference between burst TOPS and sustained thermal limits on passive mobile devices.
    **The Consequence:** They waste time debugging software memory leaks instead of optimizing the model for the actual sustained hardware thermal envelope.
  napkin_math: |
    *   **Burst Compute Cost:** `34.7 TOPS / 60 FPS = 0.578 TOPS/frame`
    *   **Throttled Sustained Compute:** `35 FPS * 0.578 TOPS/frame = 20.23 TOPS`
    *   **Result:** **The device retains roughly 58% (20.23 / 34.7) of its peak capacity under sustained thermal load.**
