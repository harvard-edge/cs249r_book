title: 'Mobile Transformer Cost Mastery: Full On-Device LLM Product Design'
scenario: Design a complete on-device LLM product strategy for a messaging app using A17 Pro (8GB, 100GB/s) and Snapdragon 8 Gen 3 (16GB, 77GB/s). Requirements: grammar correction (50 tokens), reply suggestions (100 tokens), email drafting (500 tokens). P99 < 1s (grammar), < 2s (replies), < 5s (email).
question: How would you choose model size and quantization for each task and calculate memory allocation?
details:
  realistic_solution: 'Grammar correction: 50 tokens, P99<1s → budget 20ms/token. BW: model_size/100GB/s < 20ms → model < 2GB → INT4: up to 4B params. Use 1B model (500MB INT4): 5ms/tok, 50 toks=250ms. Excellent. Reply suggestions: 100 tokens, P99<2s → 20ms/tok → 2GB INT4 = 4B params. 1B model: 5ms/tok, 500ms. Also excellent. Email drafting: 500 tokens, P99<5s → 10ms/tok → 1GB INT4 = 2B params. But quality: 2B model for email drafting may be poor. Trade: use 4B model at 25ms/tok=12.5s. Exceeds. Use streaming (show tokens as generated): user perception P99 for first token = 25ms ✓, completion=12.5s. For email: use 2B INT4 (1GB, 10ms/tok, 5s ✓) or stream 4B. Memory: share 4B model across tasks (LRU loading). Total: 2GB model + 100MB KV = 2.1GB. Leaves 6GB OS+apps.'
  common_mistake: |
    **The Pitfall:** Choosing a single model size for all three tasks.
    **The Rationale:** Candidates prioritize simplicity of deployment, missing the strict latency bounds for small tasks and quality bounds for large tasks.
    **The Consequence:** A single model will either fail the strict <1s P99 latency for grammar or produce unacceptably poor quality for long-form email drafting.
  napkin_math: |
    *   **Grammar Target:** < 1s for 50 tokens = < 20 ms/token.
    *   **Small Model (1B INT4):** 0.5 GB. Read time at 100 GB/s = 5 ms/token. 50 tokens = 250 ms (< 1s).
    *   **Reply Target:** < 2s for 100 tokens = < 20 ms/token. 1B model takes 500 ms (< 2s).
    *   **Email Target:** < 5s for 500 tokens = < 10 ms/token.
    *   **Large Model (2B/4B):** 1B quality is too poor for emails. A 4B INT4 model (2 GB) takes 20 ms/token (10s total). Solution: stream the output to the user to meet perception targets.
    *   **Memory Footprint:** 0.5 GB (shared 1B) + 2.0 GB (4B) + 0.1 GB (KV) = **2.6 GB total**, safely leaving >5.4 GB for OS and apps.
