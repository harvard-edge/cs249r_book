title: 'Mobile Transformer Cost Mastery: Full On-Device LLM Product Design'
scenario: 'Design a complete on-device LLM product strategy for a messaging app using
  A17 Pro (8GB, 100GB/s) and Snapdragon 8 Gen 3 (16GB, 77GB/s). Requirements: grammar
  correction (50 tokens), reply suggestions (100 tokens), email drafting (500 tokens).
  P99 < 1s (grammar), < 2s (replies), < 5s (email). Choose model size and quantization
  for each task and calculate memory allocation.'
question: How would you choose model size and quantization for each task and calculate
  memory allocation?
details:
  realistic_solution: 'Grammar correction: 50 tokens, P99<1s → budget 20ms/token.
    BW: model_size/100GB/s < 20ms → model < 2GB → INT4: up to 4B params. Use 1B model
    (500MB INT4): 5ms/tok, 50 toks=250ms. Excellent. Reply suggestions: 100 tokens,
    P99<2s → 20ms/tok → 2GB INT4 = 4B params. 1B model: 5ms/tok, 500ms. Also excellent.
    Email drafting: 500 tokens, P99<5s → 10ms/tok → 1GB INT4 = 2B params. But quality:
    2B model for email drafting may be poor. Trade: use 4B model at 25ms/tok=12.5s.
    Exceeds. Use streaming (show tokens as generated): user perception P99 for first
    token = 25ms ✓, completion=12.5s. For email: use 2B INT4 (1GB, 10ms/tok, 5s ✓)
    or stream 4B. Memory: share 4B model across tasks (LRU loading). Total: 2GB model
    + 100MB KV = 2.1GB. Leaves 6GB OS+apps.'
  common_mistake: Choosing one model for all tasks without recognizing that grammar
    correction needs a tiny model with fast P99, email drafting needs quality (larger
    model), and they can share weights if properly cached.
  napkin_math: 'Grammar (50 tok, P99<1s): need <20ms/tok. 1B INT4=0.5GB. BW: 0.5/100=5ms/tok.
    50 toks=250ms ✓. Reply (100 tok, P99<2s): 20ms/tok. 1B model: 500ms ✓. Email (500
    tok, P99<5s): 10ms/tok. Need model: 10ms/tok * 100GB/s = 1GB INT4 = 2B params.
    2B model: 500ms + 500*10ms=5.5s (close to SLO). Use 1B for email: 5ms/tok, 2.5s
    ✓. But quality: 1B email quality is poor. Solution: use 1B for grammar/replies
    (250-500ms), stream 4B model for email to user (partial tokens shown). Memory
    on A17: 0.5GB (1B shared for small tasks) + 2GB (4B for email if loaded) = 2.5GB
    total. OS 2GB: 4.5GB used. 8GB-4.5=3.5GB free. Healthy.'
