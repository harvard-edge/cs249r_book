title: The Cross-Platform Confidence Score Divergence
scenario: Your medical imaging app runs the same diagnostic model on iOS (Core ML, A17 Pro) and Android (TFLite + NNAPI, Snapdragon 8 Gen 3). Both models are converted from the same PyTorch checkpoint. A dermatologist reports that the same mole photo gets a 'high risk' score (0.87) on their iPhone but 'low risk' (0.42) on their Samsung Galaxy S24. The model architecture and weights are identical pre-conversion.
question: Why do the confidence scores diverge by 0.45, and how do you guarantee cross-platform consistency for safety-critical applications?
details:
  realistic_solution: 'The 0.45 probability divergence comes from four compounding layers: (1) Conversion — Core ML and TFLite fold BatchNorm differently (before vs after quantization), shifting logits ±0.2. (2) Quantization — different calibration datasets and per-tensor vs per-channel defaults shift logits ±1.5. (3) Accumulation — ANE uses FP16, Hexagon uses INT16, causing ±0.52 drift. (4) Sigmoid sensitivity — combined ~2.22 logit shift maps to |sigmoid(1.90) - sigmoid(-0.32)| = 0.45 probability difference near the decision boundary. Fix: use ONNX Runtime on both platforms (eliminates conversion divergence) + FP32 classification head + per-platform calibration. Residual divergence: <0.01.'
  common_mistake: |
    **The Pitfall:** Assuming "Use the same quantization scheme on both platforms" is sufficient.
    **The Rationale:** Candidates forget that even with identical quantization, the underlying hardware runtime execution differs significantly.
    **The Consequence:** Unpredictable, silent failures in cross-platform numerical consistency causing medical misdiagnoses.
  napkin_math: |
    - **Original Logits:** Logit for 0.87 is ln(0.87/0.13) = 1.90. Logit for 0.42 is ln(0.42/0.58) = -0.32.
    - **Required Shift:** 1.90 - (-0.32) = 2.22.
    - **Layer 1 (Conversion):** BatchNorm folding order differs. Logit shift: ±0.2.
    - **Layer 2 (Quantization):** Calibration differences (min-max vs percentile). Logit shift: ±1.5.
    - **Layer 3 (Accumulation):** ANE (FP16) vs Hexagon (INT16). Logit shift: ±0.52.
    - **Cumulative Divergence:** Worst-case logit divergence = 0.2 + 1.5 + 0.52 = **2.22**.
    - **Conclusion:** A logit shift of 2.22 fully explains the exact probability swing from 0.87 to 0.42.
