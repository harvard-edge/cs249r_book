title: The Cross-Platform Confidence Score Divergence
scenario: Your medical imaging app runs the same diagnostic model on iOS (Core ML,
  A17 Pro) and Android (TFLite + NNAPI, Snapdragon 8 Gen 3). Both models are converted
  from the same PyTorch checkpoint. A dermatologist reports that the same mole photo
  gets a 'high risk' score (0.87) on their iPhone but 'low risk' (0.42) on their Samsung
  Galaxy S24. For a medical app, this inconsistency is a liability nightmare. The
  model architecture and weights are identical pre-conversion. Why do the confidence
  scores diverge by 0.45, and how do you guarantee cross-platform consistency for
  safety-critical applications?
question: "Why do the confidence scores diverge by 0.45, and how do you guarantee cross-platform consistency for safety-critical applications?"
details:
  realistic_solution: 'The 0.45 probability divergence comes from four compounding
    layers: (1) Conversion \u2014 Core ML and TFLite fold BatchNorm differently (before
    vs after quantization), shifting logits \u00b10.2. (2) Quantization \u2014 different calibration
    datasets and per-tensor vs per-channel defaults shift logits \u00b11.5. (3) Accumulation
    \u2014 ANE uses FP16, Hexagon uses INT16, causing \u00b10.52 drift. (4) Sigmoid sensitivity
    \u2014 combined ~2.22 logit shift maps to |sigmoid(1.90) - sigmoid(-0.32)| = 0.45 probability
    difference near the decision boundary. Fix: use ONNX Runtime on both platforms
    (eliminates conversion divergence) + FP32 classification head + per-platform calibration.
    Residual divergence: <0.01.'
  common_mistake: '"Use the same quantization scheme on both platforms." Even with
    identical quantization, the *runtime execution* differs. Cross-platform numerical
    consistency requires controlling the entire inference stack.'
  napkin_math: 'Logit for 0.87 is ln(0.87/0.13) = 1.90. Logit for 0.42 is ln(0.42/0.58)
    = -0.32. Required logit shift = 2.22. Layer 1 Conversion divergence: BatchNorm
    folding order differs. Core ML folds BN before quantization, TFLite after. Logit
    shift: +/-0.2. Layer 2 Quantization divergence: different calibration algorithms.
    Core ML uses min-max, TFLite uses percentile. Scale factor differs by 3%. Per-tensor
    error: 0.03 * activation_range. Logit shift: +/-1.5. Layer 3 Operator divergence: ANE vs Hexagon precision
    accumulation differences. Logit shift: +/-0.52. Cumulative divergence after 50 layers: per-layer error
    compounds to a worst-case logit divergence of 0.2 + 1.5 + 0.52 = 2.22. A logit shift of 2.22 changes
    the output from -0.32 to 1.90, shifting the probability from 0.42 to 0.87.'
