title: Diagnosing A17 Pro Neural Engine OOM Under Thermal Throttling
scenario: Your real-time video analytics app runs a heavy segmentation model on the Apple A17 Pro Neural
  Engine. Users report that after 15 minutes of use in warm environments, the app suddenly crashes with
  out-of-memory (OOM) OS jetsam events, even though overall memory usage was previously stable. The A17
  Pro's 16-core Neural Engine delivers 35 TOPS at an aggressive ~5W power target and shares 8 GB of unified
  memory with the CPU and GPU. Telemetry indicates that right before the crash, the SoC reaches its thermal
  limit and triggers a degradation ladder that attempts to shed load by dropping the camera pipeline from
  60 FPS to 15 FPS.
details:
  realistic_solution: The root cause is asynchronous queue buildup in the shared unified memory during
    the thermal throttling transition. When the A17 Pro exceeds its ~5W thermal envelope, iOS aggressively
    throttles the Neural Engine's clock speed, dropping its effective TOPS. If the camera capture pipeline
    continues enqueueing frames at 60 FPS (or even the degraded 15 FPS) while the throttled NE can now
    only process 10 FPS, unprocessed high-resolution frames rapidly pile up in the unified memory. Because
    the CPU, GPU, and NE share this 8 GB pool, the sudden spike in unreferenced frame buffers triggers
    an OS jetsam OOM kill before the application can fully shed its load.
  common_mistake: Candidates often misdiagnose this as a standard memory leak in the Swift/Objective-C
    application layer or assume the 8 GB unified memory is strictly partitioned. They may suggest simply
    downscaling the input resolution without recognizing the interaction between thermal throttling, asynchronous
    pipeline queues, and shared memory bandwidth.
  napkin_math: 'An uncompressed 4K NV12 video frame is approximately 12.4 MB (3840 * 2160 * 1.5 bytes).
    At 60 FPS, the camera generates ~744 MB/s of frame data. If thermal throttling reduces the 35 TOPS
    Neural Engine to 25% capacity (~8.75 TOPS), its processing throughput might drop to 10 FPS. If the
    fallback degradation ladder reacts too slowly and continues capturing at 60 FPS for just 5 seconds,
    the queue accumulates 50 unprocessed frames per second: 50 frames * 12.4 MB * 5 seconds = 3.1 GB of
    sudden memory bloat. In an 8 GB unified memory system where the OS and background apps already consume
    ~4 GB, this 3.1 GB spike instantly exhausts the remaining memory pool, resulting in an OOM crash.'
