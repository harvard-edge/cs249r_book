title: The Multi-Modal Sensor Fusion System
scenario: Design an on-device system for a fitness app that fuses camera (pose estimation), microphone
  (rep counting from audio cues), and accelerometer (motion tracking) to provide real-time exercise form
  feedback. The three sensors run at different rates, produce different data types, and compete for compute
  resources. How do you architect the fusion?
details:
  realistic_solution: 'Use an asynchronous multi-rate fusion architecture. Camera (30 Hz) drives pose
    estimation on the NPU (3.6 MB model, 8ms). Audio (16 kHz) feeds a lightweight rep counter on the DSP
    (1.2 MB, runs at 4 Hz). Accelerometer (50 Hz) streams to a motion classifier on the CPU. A fusion
    model (0.8 MB) runs at 1 Hz, consuming buffered outputs from all three. Total ML footprint: 5.6 MB.
    Power: ~800 mW total (NPU at 24% duty + camera), lasting 6.25% battery per hour-long workout. Key
    insight: decouple sensor rates from fusion rate — the fusion model doesn''t need 30 Hz updates, just
    1 Hz form feedback.'
  common_mistake: '"Run three separate models and combine their outputs." Three independent models triple
    the compute and memory cost, and you lose cross-modal correlations (e.g., the sound of a weight hitting
    the floor confirms the accelerometer''s "rep complete" signal).'
  napkin_math: 'Memory: Pose model (3.6 MB) + Audio model (1.2 MB) + Fusion model (0.8 MB) + buffers (30
    frames × 17 keypoints × 3 coords × 4 bytes = 6 KB + 2 KB audio + 0.1 KB accel) = **5.6 MB total ML
    footprint**. Latency: form feedback updates at 1 Hz (1 second). Pose overlay updates at 30 FPS (33ms).
    Power: NPU at 24.3% duty × 2W = 0.486W. CPU at 0.2% = negligible. Camera: ~300 mW. Total: ~800 mW.
    Battery for 1-hour workout: 0.8 Wh / 12.8 Wh = 6.25%.'
