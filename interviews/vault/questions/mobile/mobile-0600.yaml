title: The Sparse Illusion
scenario: 'Your team is shipping a new ''Smart Reply'' feature on your app, powered by a 100M parameter
  Transformer model. Users are reporting significant battery drain. Profiling confirms the model is the
  cause. Two solutions are proposed to create a smaller model: A) 50% unstructured weight pruning, or
  B) Distilling the model into a new, dense 50M parameter student model. Both achieve similar accuracy.
  Analyze the trade-offs and justify which approach is superior for a mobile deployment on a device like
  the Apple A17. Differentiate their impact on latency, power, and memory.'
details:
  realistic_solution: Distillation is unequivocally superior for mobile deployment. Mobile NPUs (like
    Apple's ANE) are highly optimized for dense, regular matrix multiplications. Unstructured pruning
    introduces sparsity, which leads to irregular memory access patterns. This breaks cache locality and
    defeats the prefetching mechanisms in the memory controller, forcing frequent, high-power accesses
    to the main LPDDR5 DRAM. While the NPU performs fewer calculations, it spends most of its time idle,
    waiting for data. The distilled model, being smaller and dense, maps perfectly to the NPU's architecture.
    It has a smaller memory footprint for weights, smaller activation tensors (reducing memory bandwidth
    pressure), and allows the NPU to run at high utilization with predictable data access patterns, resulting
    in significantly lower latency and power consumption.
  common_mistake: Assuming that 50% fewer FLOPs from pruning directly translates to a 50% speedup and
    power reduction. This ignores the reality of mobile hardware architecture. Engineers often forget
    that data movement, not just computation, dictates performance and power on mobile SoCs. They think
    of FLOPs as the primary cost.
  napkin_math: '100M params in FP16 = 200MB. Apple A17 Pro has 51.2GB/s bandwidth. Generating 20 tokens/sec
    means reading 200MB * 20 = 4GB/s. At ~1W per 10GB/s, that''s 0.4W just on memory traffic! Solution
    A: INT8 quantization cuts weights to 100MB, dropping memory traffic to 2GB/s and saving 0.2W continuous.'
