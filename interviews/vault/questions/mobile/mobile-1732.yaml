title: On-Device Sensor Stream Processing with Google Tensor G3
scenario: Imagine you're designing a next-generation fitness tracking application
  for a smartphone powered by the Google Tensor G3. This device features a 7.5 TOPS
  on-device TPU and 12 GB of LPDDR5X memory. The application needs to continuously
  ingest high-frequency sensor data (e.g., accelerometer, gyroscope, heart rate) at
  a combined rate of 1000 samples/second, where each raw sample is 16 bytes. Your
  goal is to detect complex user activities (e.g., specific yoga poses, unique running
  strides) in real-time, performing feature extraction and ML inference directly on
  the device. How would you design the streaming data pipeline to efficiently handle
  ingestion, pre-processing, on-device ML inference, and immediate feedback, while
  optimizing for latency, power consumption, and memory usage on the Tensor G3 architecture?
question: How would you design a Tensor G3 streaming pipeline for 1000 samples/s fitness
  sensing with real-time feedback?
details:
  realistic_solution: Implement a highly optimized on-device stream processing pipeline.
    Sensor data would be buffered in a fixed-size circular buffer in the 12 GB LPDDR5X
    memory to minimize allocations. A lightweight pre-processing module, potentially
    running on a dedicated low-power core or efficiently on the main CPU, would prepare
    batches of data. These batches are then fed to the Google Tensor G3's 7.5 TOPS
    TPU for rapid feature extraction and ML inference using highly optimized TensorFlow
    Lite models designed for edge devices. The TPU's high inference throughput allows
    for real-time analysis. Post-inference, only relevant activity classifications,
    summarized features, or aggregated statistics would be stored locally or selectively
    streamed to the cloud, minimizing network and storage overhead. An event-driven
    architecture with debouncing and throttling mechanisms would prevent overwhelming
    downstream components or consuming excessive power.
  common_mistake: Overlooking memory bandwidth limitations or continuously offloading
    raw sensor data to the CPU without leveraging the TPU for initial processing,
    leading to high power consumption and increased latency. Another common mistake
    is not batching operations effectively for the TPU, thus underutilizing its parallel
    processing capabilities, or attempting to use models too large for on-device execution
    despite the available memory.
  napkin_math: 'Given 1000 samples/second at 16 bytes/sample:

    - Raw data ingestion rate: 1000 samples/s * 16 bytes/sample = 16 KB/s.

    - If we buffer 1 second of raw data, it''s 16 KB, which is negligible compared
    to the 12 GB LPDDR5X memory.

    - Assuming an on-device ML model requires 1 billion operations (0.001 Tera-operations) per
    inference for a single sample:

    - The Google Tensor G3''s TPU (7.5 TOPS) could theoretically perform 7.5 TOPS
    / 0.001 Tera-operations/inference = 7500 inferences per second if perfectly pipelined.

    - This implies that for 1000 samples/second, the system can easily keep up. Inference would take ~133 µs (0.000133 seconds) per sample, well within the 1ms sample interval.'
