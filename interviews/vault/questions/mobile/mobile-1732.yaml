title: On-Device Sensor Stream Processing with Google Tensor G3
scenario: Imagine you're designing a next-generation fitness tracking application for a smartphone powered by the Google Tensor G3. The application needs to continuously ingest high-frequency sensor data (e.g., accelerometer, gyroscope, heart rate) at a combined rate of 1000 samples/second, where each raw sample is 16 bytes.
question: How would you design a streaming data pipeline to handle 1000 samples/s ingestion, pre-processing, and ML inference on the Tensor G3 architecture?
details:
  realistic_solution: Implement a highly optimized on-device stream processing pipeline. Sensor data would be buffered in a fixed-size circular buffer in the 12 GB LPDDR5X memory to minimize allocations. A lightweight pre-processing module, potentially running on a dedicated low-power core or efficiently on the main CPU, would prepare batches of data. These batches are then fed to the Google Tensor G3's 7.5 TOPS TPU for rapid feature extraction and ML inference using highly optimized TensorFlow Lite models designed for edge devices. The TPU's high inference throughput allows for real-time analysis. Post-inference, only relevant activity classifications, summarized features, or aggregated statistics would be stored locally or selectively streamed to the cloud, minimizing network and storage overhead. An event-driven architecture with debouncing and throttling mechanisms would prevent overwhelming downstream components or consuming excessive power.
  common_mistake: |
    **The Pitfall:** Overlooking memory bandwidth limitations or continuously waking the CPU to offload raw sensor data.
    **The Rationale:** Developers often rely on standard OS-level event listeners for sensor data, which generate excessive interrupts.
    **The Consequence:** The CPU never enters deep sleep, leading to severe battery drain that kills the device within hours.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Ingestion Rate: 1000 samples/s at 16 bytes/sample.
       - Hardware: 7.5 TOPS TPU, 12 GB LPDDR5X.
       - Model Compute: ~1 billion OPS (0.001 TOPS) per inference.
    2. **Calculations:**
       - Bandwidth: 1000 * 16 bytes = 16 KB/s.
       - Buffer Size: 1 sec raw data = 16 KB (negligible).
       - TPU Throughput: 7.5 TOPS / 0.001 TOPS/inf = 7500 inferences/sec theoretical.
       - Latency: 1 sec / 7500 inferences = ~133 µs per inference.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Abundant. The TPU handles 1000 samples/s easily with 133µs latency, provided batching prevents CPU wake-lock drain.**
