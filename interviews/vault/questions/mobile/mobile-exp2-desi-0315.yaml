title: Architecting Sub-4-bit LLM Deployment on Exynos NPU
scenario: You are tasked with deploying a 7B parameter LLM on the Samsung Exynos 2400 NPU for real-time
  on-device translation. The system has a shared 12 GB LPDDR5X memory pool, but the OS, ISP, and other
  background tasks consume 8 GB, leaving strict constraints on model footprint. You need to design an
  extreme quantization strategy (e.g., GPTQ, AWQ, or sub-4-bit) that maximizes the 34.7 TOPS NPU throughput
  while ensuring the model fits in the remaining memory and maintains acceptable translation quality.
question: "How should a 7B Exynos 2400 translation LLM use extreme quantization while fitting memory and bandwidth limits?"
details:
  realistic_solution: A strong L5 design employs AWQ (Activation-aware Weight Quantization) at 3-bit or
    4-bit precision to protect salient weights, coupled with a highly optimized custom NPU kernel for
    mixed-precision execution. Since memory bandwidth is the primary bottleneck in generative decoding
    on the shared LPDDR5X bus, the architecture must prioritize aggressively packing weights and fusing
    dequantization operations directly within the NPU's SRAM to keep the compute units fed.
  common_mistake: Candidates often suggest standard 8-bit or unoptimized 4-bit quantization without considering
    the shared memory bottleneck. They may also overlook the fact that the Exynos 2400's dual-core NPU
    requires specific weight packing and activation layouts to fully utilize its 34.7 TOPS, leading to
    severe memory wall issues.
  napkin_math: 'Remaining memory: 12 GB - 8 GB = 4 GB. A 7B parameter model in 16-bit requires ~14 GB.
    Using 4-bit quantization reduces this to 3.5 GB (7B * 4 bits / 8), which fits within the 4 GB limit,
    leaving 500 MB for KV cache and activations. To achieve a target generation rate of 20 tokens/sec,
    the memory bandwidth required is roughly 20 * 3.5 GB = 70 GB/s. Since the NPU provides 34.7 TOPS,
    compute is not the bottleneck (20 * 7B * 2 = 280 GFLOPS << 34.7 TOPS); the design must focus exclusively
    on memory bandwidth utilization.'
