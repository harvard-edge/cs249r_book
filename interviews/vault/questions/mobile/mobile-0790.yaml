title: The Code Generation Stall
scenario: Your speculative decoding setup (3B Target, 60M Draft) yields 25 tok/s for general chat on-device.
  When a user asks the app to generate a Python script, throughput suddenly drops to 6 tok/s. Disabling
  speculative decoding entirely restores Python generation to a flat 12 tok/s.
question: "Why does speculative decoding become slower than target-only decoding for Python code generation?"
details:
  realistic_solution: The root cause is a catastrophic drop in the draft model's acceptance rate due to
    a domain shift. The heavily pruned 60M draft model was likely distilled exclusively on natural language
    data to save space on-device, meaning it lacks basic Python syntax knowledge. When generating code,
    the draft model consistently guesses wrong (acceptance rate near 0%). Consequently, the system pays
    the latency penalty for the draft model's generation AND the target model's validation, but rejects
    almost all draft tokens. Each rejection forces an additional target-model forward pass to emit the
    correction token, adding substantial overhead on top of the wasted draft generation time. This makes
    speculative decoding strictly slower than running the target model alone at 12 tok/s.
  common_mistake: Assuming the target model struggles to generate code and requires more compute per token.
  napkin_math: "Target-only latency: 1000ms / 12 = 83ms/token. \nSpeculative step (4 draft tokens): Draft\
    \ generation takes 4 * 10ms = 40ms. Target validation takes 90ms. Total step time = 130ms. \nIf acceptance\
    \ rate is 5%, expected accepted tokens per step = 1 (the forced correction token) + 0.05*4 = ~1.2\
    \ tokens. \nEffective latency = 130ms / 1.2 tokens = 108ms/token. \nThroughput = 1000 / 108 = 9.2\
    \ tok/s. However, each rejection forces an additional full target-model pass to generate the correction\
    \ token, adding ~90ms of non-productive overhead per step. With ~3.8 of 4 draft tokens rejected per\
    \ step, rejection overhead = 3.8 * (90ms / 4) ≈ 85ms extra per step. Adjusted effective latency =\
    \ (130 + 85)ms / 1.2 tokens = 179ms/token → throughput ≈ 5.6 tok/s, consistent with the observed 6\
    \ tok/s."
