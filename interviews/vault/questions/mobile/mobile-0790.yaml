title: The Code Generation Stall
scenario: "Your speculative decoding setup (3B Target, 60M Draft) yields 25 tok/s for general chat on-device. When a user asks the app to generate a Python script, throughput suddenly drops to 6 tok/s. Disabling speculative decoding entirely restores Python generation to a flat 12 tok/s."
question: "Why does speculative decoding become slower than target-only decoding for Python code generation?"
details:
  realistic_solution: "The severe regression is caused by a catastrophic drop in draft model acceptance. Tiny draft models (e.g., 60M params) are aggressively pruned and heavily distilled on natural language data to save footprint, obliterating their code comprehension. The draft model generates syntactically invalid Python tokens which the target model rejects with near 100% certainty. The system pays the full draft generation latency and target evaluation latency, but yields zero accepted speculative tokens."
  common_mistake: |
    **The Pitfall:** Assuming the large target model is simply slower at generating code tokens.
    **The Rationale:** Candidates overlook the domain shift in the tiny draft model, failing to recognize that a near 0% acceptance rate converts speculative acceleration into pure latency overhead.
    **The Consequence:** The engineering team wastes time profiling the target model instead of updating the draft model's distillation dataset to include code.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Target-only latency = 1000 ms / 12 = 83 ms/token.
       - Speculative step: Draft (4 tokens) = 40 ms. Target validation = 90 ms. Total step = 130 ms.
    2. **Calculations:**
       - With near 0% acceptance, 1 correction token is emitted per step.
       - Each rejection triggers an extra target pass to generate the correction: ~85 ms overhead.
       - Effective step latency = 130 ms + 85 ms = 215 ms per token.
       - Theoretical throughput = 1000 / 215 ≈ 4.6 tok/s (observed as 6 tok/s due to minor acceptances).
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound.** The domain mismatch crashes the acceptance rate, forcing the pipeline to pay the cost of both models simultaneously, dragging throughput below the **12 tok/s** baseline.
