title: Diagnosing Context Overflow Failures in Multi-Turn Mobile Agents on A17 Pro
scenario: An A17 Pro (8GB, 35 TOPS) conversational agent app crashes or produces incoherent outputs after
  8-12 conversation turns. The on-device 1B LLM has a 2048-token context window. Each user turn averages
  50 tokens, each assistant turn averages 150 tokens. System prompt is 300 tokens. Retrieved context per
  turn is 3 chunks of 200 tokens each. Diagnose when context overflow occurs and design a prevention strategy.
details:
  realistic_solution: 'Calculate context growth: per turn, tokens added = 50(user) + 150(assistant) +
    600(3 retrieved chunks) = 800 tokens. System prompt: 300. After N turns: 300 + 800*N tokens. Context
    fills at 2048: N = (2048-300)/800 = 2.185 turns — fills after just 2 turns if retrieved context is
    included every turn! The observed 8-12 turns suggests retrieval is not always triggered. Without retrieval:
    (2048-300)/200 = 8.74 turns — matches the crash pattern. Fix: (1) Sliding window keeping last 2 turns
    verbatim + rolling summary. (2) Separate retrieval context from conversation context. (3) Compress
    old turns: each old turn summarized to 30 tokens.'
  common_mistake: Assuming the app crashes due to a bug rather than a predictable context overflow. The
    developer adds error handling but doesn't compute when the context will fill — so they fix the crash
    symptom without addressing the root cause, and the app now silently truncates context instead.
  napkin_math: 'Context budget: 2048 tokens. System prompt: 300. Remaining: 1748. Per turn (no retrieval):
    50+150=200 tokens. Turns until full: 1748/200=8.74 ≈ 8 turns. Per turn (with retrieval): 50+150+600=800
    tokens. Turns until full: 1748/800=2.19 ≈ 2 turns. Observed: 8-12 turns matches no-retrieval path
    — retrieval not firing each turn. Fix with compression: keep last 2 turns (400 tokens) + rolling summary
    (100 tokens) + system prompt (300) + retrieval slot (600) = 1400 tokens — leaves 648 token buffer.
    Sustainable indefinitely.'
