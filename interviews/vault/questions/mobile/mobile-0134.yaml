title: The Federated Learning Communication Cost
scenario: You're building federated learning for a keyboard prediction model (30M parameters, FP32) across 100 million Android devices. Each training round selects 5,000 devices.
question: How much communication, data, and battery does one FL round cost for a 30M-parameter keyboard model on 5000 devices, and at what point does the user notice?
details:
  realistic_solution: 'Compress to make FL invisible to users. Naive: 120 MB/device. Stack: (1) top-k sparsification (0.1%): 120 MB -> 120 KB. (2) Error feedback preserves convergence. (3) 4-bit quantization of updates: 120 KB -> 62 KB. Monthly data: 62 KB x 4/day x 30 = 7.4 MB (WiFi-only). Battery: 0.8%/day (under 2% notice threshold). Server: 310 MB/round egress, ~$3.35/month. Convergence: ~200 rounds (50 days) to match centralized within 2%.'
  common_mistake: |
    **The Pitfall:** Proposing to upload the full gradient naively.
    **The Rationale:** Engineers assume 120MB is just "one upload" and negligible, forgetting that cellular data costs real money in many markets.
    **The Consequence:** Users are charged significantly for background data, leading to mass uninstalls (e.g., spending $2.40/month on a background feature when their data plan is limited).
  napkin_math: |
    - Naive upload: 30M params * 4 bytes = 120 MB.
    - Compressed: 62 KB (1,935x reduction).
    - Monthly data: 62 KB * 4 rounds/day * 30 days = 7.4 MB (WiFi-only in emerging markets).
    - Battery per round: 90J = 0.2%. Daily: 0.8%. (Training dominates communication by 1000x: 90J training vs 0.11J communication).
    - Server cost: 5,000 devices * 62 KB = 310 MB ingress/egress per round.
    - 4 rounds/day = 1.24 GB/day = 37.2 GB/month.
    - **Result: At $0.09/GB AWS egress, server bandwidth is ~$3.35/month. Convergence takes ~200 rounds with error feedback ≈ 50 days to match centralized baseline within 2%.**
