title: The Federated Learning Communication Cost
scenario: You're building federated learning for a keyboard prediction model (30M parameters, FP32) across
  100 million Android devices. Each training round selects 5,000 devices. Walk me through the communication
  cost, cellular data usage, and battery drain per training round per device. At what point does the user
  notice?
question: "How much communication, data, and battery does one FL round cost for a 30M-parameter keyboard model on 5000 devices?"
details:
  realistic_solution: 'Compress to make FL invisible to users. Naive: 120 MB/device. Stack: (1) top-k sparsification (0.1%): 120 MB -> 120 KB. (2) Error feedback preserves convergence. (3) 4-bit quantization of updates: 120 KB -> 62 KB. Monthly data: 62 KB x 4/day x 30 = 7.4 MB (WiFi-only). Battery: 0.8%/day (under 2% notice threshold). Server: 310 MB/round egress, ~$3.35/month. Convergence: ~200 rounds (50 days) to match centralized within 2%.'
  common_mistake: '"Upload the full gradient — 30M × 4 bytes = 120 MB per device. It''s just one upload."
    120 MB over cellular costs the user real money in many markets. In India, 1 GB of mobile data costs
    ~$0.17. You''re asking users to spend $0.02 per training round without their knowledge. At 4 rounds/day,
    that''s $2.40/month — more than many users'' entire data plans.'
  napkin_math: 'Naive upload: 120 MB → compressed: 62 KB (1,935× reduction). Monthly data: 7.4 MB (WiFi-only
    in emerging markets). Battery per round: 90J = 0.2%. Daily: 0.8%. Training dominates communication
    by 1000×: 90J training vs 0.11J communication. Server cost: 5,000 × 62 KB = 310 MB ingress/egress per round.
    4 rounds/day = 1.24 GB/day. 37.2 GB/month. At $0.09/GB AWS egress: $3.35/month server bandwidth. Convergence: ~200 rounds with
    error feedback ≈ 50 days to match centralized baseline within 2%.'
