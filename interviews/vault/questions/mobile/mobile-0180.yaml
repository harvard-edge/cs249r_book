title: The OTA Memory Budget
scenario: A junior engineer proposes an OTA update for your mobile app's on-device RAG feature. The update swaps the current 500M parameter INT8 model for a new 1B parameter INT8 model. The target device has 8 GB of RAM, and your app's peak memory budget is 25% of the device's RAM. The current app version, with the old model included, consumes 1.2 GB at peak.
question: How would you explain to the junior engineer, using napkin math, whether this update is safe to roll out from a memory perspective?
details:
  realistic_solution: The update is safe to roll out. The key is to calculate the *increase* in memory, not the absolute size of the new model, and add that to the current peak usage. The new peak memory will be 1.7 GB, which is comfortably within the 2.0 GB budget.
  common_mistake: |
    **The Pitfall:** Adding the full size of the new model to the current memory usage, rather than the delta.
    **The Rationale:** Forgetting that the old model's memory footprint is being replaced during the swap.
    **The Consequence:** Incorrectly blocking safe, valuable model updates due to flawed peak memory calculations.
  napkin_math: |
    1. Device Budget: 8GB * 25% = 2GB.
    2. 1B params INT8 = 1GB. Old 500M model = 0.5GB.
    3. **Swap Peak:** Holding both models during transition requires 1GB + 0.5GB = **1.5GB (fits under 2GB limit).**
  options:
  - Unsafe. The new 1.0 GB model added to the 1.2 GB base usage is 2.2 GB, which exceeds the 2.0 GB budget.
  - Unsafe. A 1B parameter model requires 2.0 GB of memory (using 2 bytes/param), which is the entire budget.
  - Safe. The memory increase is only 0.5 GB, bringing the new peak to 1.7 GB, which is under the 2.0 GB budget.
  - Safe. The OS will use memory mapping, so the model's size on disk doesn't count against the app's RAM budget.
  correct_index: 2
