title: The OTA Memory Budget
scenario: A junior engineer on your team proposes an OTA update for your mobile app's on-device RAG feature.
  The update swaps the current 500M parameter INT8 model for a new 1B parameter INT8 model. The target
  device has 8 GB of RAM, and your app's peak memory budget is 25% of the device's RAM. The current app
  version, with the old model included, consumes 1.2 GB at peak. Explain to the junior engineer, using
  napkin math, whether this update is safe to roll out from a memory perspective.
question: "How would you explain to the junior engineer, using napkin math, whether this update is safe to roll out from a memory perspective?"
details:
  realistic_solution: The update is safe to roll out. The key is to calculate the *increase* in memory,
    not the absolute size of the new model, and add that to the current peak usage. The new peak memory
    will be 1.7 GB, which is comfortably within the 2.0 GB budget.
  common_mistake: The most common mistake is to add the full size of the new model (1.0 GB) to the app's
    current memory usage (1.2 GB), resulting in an incorrect peak of 2.2 GB. This forgets that the old
    model's memory (0.5 GB) is being replaced, so only the *delta* should be added. Another mistake is
    to use the wrong precision, such as calculating the model size using FP16 (2 bytes/param) instead
    of the specified INT8 (1 byte/param).
  napkin_math: '1. Memory Budget: The device has 8GB RAM; the app''s 25% budget is 8GB * 0.25 = 2GB. 2.
    Model Sizes: Using the 1B = 2GB FP16 rule, 1B params in INT8 = 1GB. The old 500M INT8 model = 0.5GB.
    3. Swap Peak: Holding both models in memory during the OTA transition requires 1GB + 0.5GB = 1.5GB,
    fitting under the 2GB limit.'
  options:
  - Unsafe. The new 1.0 GB model added to the 1.2 GB base usage is 2.2 GB, which exceeds the 2.0 GB budget.
  - Unsafe. A 1B parameter model requires 2.0 GB of memory (using 2 bytes/param), which is the entire
    budget.
  - Safe. The memory increase is only 0.5 GB, bringing the new peak to 1.7 GB, which is under the 2.0
    GB budget.
  - Safe. The OS will use memory mapping, so the model's size on disk doesn't count against the app's
    RAM budget.
  correct_index: 2
