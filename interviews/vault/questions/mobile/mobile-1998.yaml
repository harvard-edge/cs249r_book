title: Mobile Neural Processing Unit Adaptive Batching Queues
scenario: A mobile live-translation app queues incoming audio chunks of 200ms to the NPU for feature extraction.
question: 'Model the processing pipeline as an M/D/1 queue and formulate an adaptive batching strategy to keep 99th percentile latency under 500ms when user speech rate unexpectedly doubles.'
details:
  realistic_solution: Use Little's Law with M/D/1 constraints since NPU service time is highly deterministic. Formulate an adaptive batcher that aggregates chunks up to a batch size of 4 when the queue length exceeds a threshold, trading a slightly longer per-batch NPU execution time for higher global throughput to drain the queue.
  common_mistake: |
    **The Pitfall:** Assuming exponential service times (M/M/1 queue model).
    **The Rationale:** Candidates default to generic queuing theory without realizing that fixed-size audio chunks passing through an NPU yield highly deterministic execution times.
    **The Consequence:** Grossly inaccurate latency modeling and deploying overly conservative adaptive batching logic that harms baseline responsiveness.
  napkin_math: |
    **Assumptions & Constraints:**
    - Input Chunk Size: 200ms.
    - Target Max P99 Latency: 500ms.
    - Batch Size Limit: 4 chunks.
    - Batch Processing Time: 40ms total.

    **Calculations:**
    - Max Stable Arrival Rate (λ) = Batch Size / Service Time.
    - λ = 4 chunks / 0.04s.
    - λ = 100 requests / sec.

    **Conclusion & Interpretation:**
    - **Result: 100 req/sec (Queue-Bound)**. By utilizing an M/D/1 queuing model and allowing batching up to size 4, the pipeline maintains stability against arrival rates up to 100 requests/sec, easily absorbing 2x speech bursts.
