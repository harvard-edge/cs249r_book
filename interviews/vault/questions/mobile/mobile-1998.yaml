title: Mobile Neural Processing Unit Adaptive Batching Queues
scenario: A mobile live-translation app queues incoming audio chunks of 200ms to the
  Snapdragon 8 Gen 3 Hexagon NPU for feature extraction.
question: Model the processing pipeline as an M/D/1 queue and formulate an adaptive
  batching strategy to keep 99th percentile latency under 500ms when user speech rate
  unexpectedly doubles.
details:
  realistic_solution: Use Little's Law with M/D/1 constraints since NPU service time
    is highly deterministic. Formulate an adaptive batcher that aggregates chunks
    up to a batch size of 4 when the queue length exceeds a threshold, trading a slightly
    longer per-batch NPU execution time for higher global throughput to drain the
    queue.
  common_mistake: Assuming exponential service times (M/M/1) when NPU inference latency
    for fixed-size audio chunks is strictly deterministic.
  napkin_math: If batch=4 takes 40ms, max stable arrival rate lambda = 1/0.04 = 25
    requests/sec.
