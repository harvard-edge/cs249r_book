title: INT8 Context Window Doubling
scenario: Apple A17 Pro runs an LLM. Context length hits 4096 tokens, pushing total
  RAM use over the 3GB iOS App limit. Model weights take 1GB.
question: Analyze how KV-cache quantization (FP16 to INT8) impacts memory limits and
  maximum sequence length.
visual:
  kind: svg
  path: mobile-1958.svg
  alt: Bar chart comparing 3GB total RAM for FP16 vs 2GB total RAM for INT8
  caption: 'RAM Footprint: FP16 vs INT8 KV Cache'
details:
  realistic_solution: At 4096 tokens, FP16 KV cache must be 2GB (total 3GB). INT8
    quantization halves KV cache size to 0.25MB/token (1GB total). This frees 1GB
    of RAM, allowing the app to double sequence length to 8192 tokens.
  common_mistake: Quantizing model weights instead of the KV-cache to solve context-length
    scaling bottlenecks.
  napkin_math: INT8 KV drops size from 2GB to 1GB.
