title: 'The Depthwise Separable Dividend: Transformer Systems Cost'
scenario: You're tasked with optimizing a standard CNN for deployment on a mobile phone's NPU, like the
  Apple A17 Pro. For a typical layer using a 3x3 kernel and a large number of channels, what is the approximate
  computational reduction (in FLOPs) you'd gain by replacing the standard convolution with a 3x3 depthwise
  separable convolution?
details:
  realistic_solution: 'A depthwise separable convolution splits a standard convolution into two much cheaper
    operations: a 3x3 depthwise convolution (one filter per input channel) and a 1x1 pointwise convolution
    (to combine the channels). This factorization dramatically reduces computation by a factor of approximately
    K², where K is the kernel size. For a 3x3 kernel, the reduction is nearly 9x.'
  common_mistake: Engineers often recall that depthwise separable convolutions are 'more efficient' but
    fail to quantify the benefit. A common mistake is to guess it's a small, linear gain (e.g., 2x) or
    to confuse the computational savings with memory savings, underestimating its massive impact on FLOPs.
  napkin_math: Let's compare the Multiply-Accumulate operations (MACs) for a layer with Cin input channels
    and Cout output channels, and a KxK kernel.
  options:
  - It provides no computational reduction, it only saves memory.
  - A ~3x reduction.
  - A ~9x reduction.
  - A ~2x reduction.
  correct_index: 2
