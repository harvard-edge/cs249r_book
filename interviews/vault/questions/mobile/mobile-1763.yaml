title: Responsible AI Evaluation on Snapdragon 8 Gen 3 for On-Device Sentiment Analysis
scenario: Your team is tasked with deploying a real-time sentiment analysis model directly on mobile devices. Model A might have a higher inference latency variation across different demographic groups. Model B exhibits more consistent latency and resource usage profiles.
question: How would you evaluate two mobile sentiment models for Responsible AI, governance, fairness, and resource impact?
details:
  realistic_solution: 'The candidate should propose a multi-faceted evaluation strategy that expands beyond standard ML metrics. This includes: 1. **Fairness Metrics:** Quantifying inference latency, energy consumption, and prediction bias across various demographic or sensitive subgroups present in the target user base. 2. **Resource Impact Assessment:** Detailed profiling of both models on the NPU for power consumption, memory footprint, and thermal implications. 3. **Model Cards & Documentation:** Evaluating the models based on the completeness and clarity of their associated documentation. 4. **Red-teaming / Adversarial Testing:** Proposing methods to test for robustness against adversarial inputs or edge cases. 5. **Organizational Accountability Frameworks:** Discussing how the chosen model aligns with the company''s internal policies.'
  common_mistake: |
    **The Pitfall:** Focusing solely on aggregate accuracy and average latency metrics.
    **The Rationale:** Candidates neglect the distributional aspects of performance (e.g., worst-case tail latency for specific subgroups) and long-term energy implications.
    **The Consequence:** Deploying a model that performs poorly for underrepresented demographics or severely drains battery on older devices.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model A: 5 ms avg latency, 50 ms p99 latency for specific demographics. Power: 2W.
       - Model B: 8 ms avg latency, 10 ms p99 latency across all demographics. Power: 1.8W.
       - Real-time latency budget = 100 ms.
    2. **Calculations:**
       - Model A Base Energy = 2W * 5 ms = 10 mJ. Tail Energy = 2W * 50 ms = 100 mJ.
       - Model B Base Energy = 1.8W * 8 ms = 14.4 mJ. Tail Energy = 1.8W * 10 ms = 18 mJ.
       - Peak INT8 Compute = 20 GOPS / 45 TOPS = 0.44 ms absolute floor.
    3. **Conclusion & Interpretation:** **Model B is vastly superior for Responsible AI and battery health because it eliminates severe 50ms tail latency variance.** Distribution-bound resource inequality.
