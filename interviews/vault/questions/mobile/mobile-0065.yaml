title: The Model Warm-up on Mobile
scenario: 'You benchmark your CoreML model on an iPhone 15 Pro and measure 8ms inference latency. But in production, users report the first photo takes 2 seconds to process after opening the app. Subsequent photos are fast. Your QA team confirms: first inference is consistently 100-250x slower than steady-state.'
question: Why is the first CoreML inference on iPhone 15 Pro 100-250x slower than the 8ms steady-state path?
details:
  realistic_solution: 'First inference triggers one-time costs: CoreML compilation to ANE microcode (~800ms), ANE wake (~200ms), memory allocation + page faults (~250ms), framework init (~150ms). Total: ~1,500ms vs 8ms steady-state (187x slower). Fix: trigger a dummy inference during splash screen. User-perceived first real inference: 8ms. Cache compiled .mlmodelc for subsequent launches. Cost: 1.5s added to launch, hidden behind splash animation.'
  common_mistake: |
    **The Pitfall:** Assuming the model file loading from disk is the primary bottleneck and suggesting a smaller model.
    **The Rationale:** Developers often over-index on disk I/O, unaware of the complex initialization pipeline required by specialized hardware accelerators like the ANE.
    **The Consequence:** The proposed fix (a smaller model) degrades accuracy without significantly reducing the massive one-time compilation and hardware initialization costs.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Device: iPhone 15 Pro (CoreML + ANE).
       - Steady-state target: 8ms.
    2. **Calculations:**
       - First-time Initialization Costs: CoreML to ANE compilation (~800ms) + ANE hardware wake (~200ms) + OS Memory Allocation (~100ms) + Page faults (~250ms) + Framework Init (~150ms).
       - Total Cold Start: ~1,500ms.
       - Overhead Ratio: 1,500ms / 8ms = 187.5x.
    3. **Conclusion & Interpretation:**
       - **Result: 1.5s Initialization Overhead**. The massive one-time hardware compilation and wakeup delay completely overshadows disk I/O, requiring a background dummy inference to hide the latency.
