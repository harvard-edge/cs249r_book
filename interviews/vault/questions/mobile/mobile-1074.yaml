title: KV-Cache Quantization for On-Device LLM
scenario: You are running a 3B LLM (32 layers, 4 KV heads, head_dim=64) on a Snapdragon
  8 Gen 3 (16 GB RAM, 4 GB app budget). INT4 weights use 1.5 GB. You need 2K context
  for a chat app. Compare FP16 vs INT8 vs INT4 KV-cache strategies for maximum concurrent
  conversations.
question: How would you compare FP16 vs INT8 vs INT4 KV-cache strategies for maximum
  concurrent conversations?
details:
  realistic_solution: 'KV per token per layer (FP16): 2 × 4 × 64 × 2B = 1,024 B. Per
    token (32 layers): 32 KB. Budget after weights + overhead: 4 GB - 1.5 GB - 0.5
    GB = 2 GB for KV-cache. (1) FP16 KV (32 KB/token): 2K context = 64 MB per conversation.
    Max conversations: 2 GB / 64 MB = 31. (2) INT8 KV (16 KB/token): 2K context =
    32 MB per conversation. Max: 62. Quality: <0.5% perplexity degradation — acceptable.
    (3) INT4 KV (8 KB/token): 2K context = 16 MB per conversation. Max: 125. Quality:
    2-5% perplexity degradation, with occasional incoherent outputs on long sequences.
    The key values suffer from clipping at extreme quantization. Recommendation: INT8
    for keys + INT4 for values (asymmetric quantization). Keys are more sensitive
    because they directly multiply with queries in the attention score computation.
    Values are more tolerant because they are weighted-summed, averaging out quantization
    errors. This ''K8V4'' scheme: 12 KB/token → 24 MB per conversation → 83 concurrent
    conversations with acceptable quality.'
  common_mistake: Assuming KV-cache quantization below INT8 is always acceptable.
    INT4 KV-cache introduces significant quantization noise in attention scores, especially
    for keys, because the softmax is sensitive to small perturbations in Q×K^T dot
    products.
  napkin_math: 'FP16: 32 KB/tok → 64 MB/conv → 31 conv. INT8: 16 KB → 32 MB → 62 conv.
    INT4: 8 KB → 16 MB → 125 conv. K8V4: 12 KB → 24 MB → 83 conv. Quality: INT8 ≈
    FP16, INT4 degrades 2-5%, K8V4 degrades <1%.'
