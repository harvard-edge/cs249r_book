title: The Mobile ViT Deadline Miss
scenario: You are optimizing a real-time video bokeh effect running at 30 FPS (33ms budget) on an Apple A17 Pro. The research team provides two models (a Micro-ViT and a CNN) with identical ~10 G-FLOPs compute costs.
question: Why can two 10 GFLOP bokeh models have radically different latency on an A17 Pro?
details:
  realistic_solution: The problem is not the amount of computation, but the cost of data movement. The Micro-ViT's self-attention mechanism is heavily memory-bandwidth bound. Self-attention has low spatial locality and a low Arithmetic Intensity (Ops/Byte). On a mobile SoC like the A17 Pro, an operation with low AI spends most of its time waiting for data, causing compute units to stall. The CNN has vastly better cache utilization.
  common_mistake: |
    **The Pitfall:** Assuming equal FLOPs means equal performance.
    **The Rationale:** Engineers often incorrectly blame the FLOPs themselves or guess there's a software CPU fallback, without analyzing how the model architecture interacts with the hardware's memory system.
    **The Consequence:** Misdiagnosis of performance issues, leading to wasted optimization efforts targeting compute instead of memory.
  napkin_math: |
    **Assumptions & Constraints:**
    - A17 Pro NPU: 35 TOPS.
    - Models: Micro-ViT and CNN, both ~10 GFLOPs.
    - Budget: 33ms per frame.

    **Calculations:**
    - Theoretical compute time: 10 GFLOPs / 35 TOPS = 0.28ms.
    - Real-world latency: >33ms (observed jank).

    **Conclusion & Interpretation:**
    - **Result: <1ms Compute (Memory-Bandwidth-Bound)**. Since theoretical compute is <1ms, the delay is entirely due to data movement. The ViT's low arithmetic intensity stalls the NPU.
  options:
  - The ViT's non-local memory access pattern for the attention map results in a high number of cache misses on the SoC, which is the primary bottleneck. The FLOP count is secondary.
  - The Apple A17's Neural Engine lacks hardware acceleration for the specific Softmax or LayerNorm ops in the ViT, forcing them onto the CPU.
  - The ViT's self-attention has a low Arithmetic Intensity, making it memory-bandwidth bound on the A17's memory system.
  - The ViT's larger activation sizes are causing cache eviction and thrashing, but the issue is cache capacity, not bandwidth.
  correct_index: 2
