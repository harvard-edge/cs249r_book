title: The Mobile ViT Deadline Miss
scenario: 'You are an ML systems engineer at a major smartphone company, tasked with optimizing a new real-time video bokeh effect. The feature must run at 30 FPS (a 33ms budget per frame) on an Apple A17 Pro. The research team provides two models (a Micro-ViT and a CNN) with similar accuracy and total FLOPs (~10 G-FLOPs).'
question: "Why can two 10 GFLOP bokeh models have very different latency on an A17 Pro?"
details:
  realistic_solution: The problem is not the amount of computation, but the cost of data movement. The Micro-ViT's self-attention mechanism is memory-bandwidth bound. This is because self-attention has low data locality and a low Arithmetic Intensity (AI), meaning the ratio of compute to memory access is poor. On a mobile SoC like the A17 Pro, which has powerful compute but relatively constrained memory bandwidth, an operation with low AI will spend most of its time waiting for data to be fetched from main memory, causing the compute units to stall. The CNN's convolutional structure has much better data locality, leading to better cache utilization and less pressure on main memory bandwidth.
  common_mistake: |
    **The Pitfall:** Assuming equal FLOPs means equal performance.
    **The Rationale:** Engineers often incorrectly blame the FLOPs themselves being 'more complex' or guess there's a software issue like CPU fallback, without analyzing how the model architecture interacts with the hardware's memory system.
    **The Consequence:** Misdiagnosis of performance issues, leading to wasted optimization efforts.
  napkin_math: |
    - The theoretical compute time for 10 GFLOPs on a 35 TOPS NPU is ~0.3ms.
    - The real-world latency is significantly higher (e.g., 55ms), proving this is not a compute-bound problem.
    - **Conclusion:** The bottleneck is data movement (i.e., memory bandwidth).
  options:
  - The ViT's non-local memory access pattern for the attention map results in a high number of cache misses on the SoC, which is the primary bottleneck. The FLOP count is secondary.
  - The Apple A17's Neural Engine lacks hardware acceleration for the specific Softmax or LayerNorm ops in the ViT, forcing them onto the less efficient CPU and causing the slowdown.
  - The ViT's self-attention has a low Arithmetic Intensity, making it memory-bandwidth bound on the A17's memory system.
  - The ViT's larger activation sizes are causing cache eviction and thrashing, but the issue is cache capacity, not bandwidth.
  correct_index: 2
