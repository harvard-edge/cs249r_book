title: Exynos 2400 Graph Partitioning
scenario: You are designing the ahead-of-time (AOT) graph compilation pipeline to deploy a computational
  photography model on the Samsung Exynos 2400 NPU. The SOC features a dual-core NPU delivering 34.7 TOPS
  and relies on a shared 12 GB LPDDR5X memory pool used concurrently by the CPU, GPU, and ISP. Your compiler
  must partition the graph, perform operator lowering, and handle memory allocation while the ISP is simultaneously
  processing 4K video frames.
question: "How should an Exynos 2400 AOT compiler partition graphs and plan memory while the ISP handles 4K video?"
details:
  realistic_solution: The compiler should implement a cost-model-based partitioner that evaluates subgraph
    execution time, factoring in CPU-NPU data transfer costs. It must also perform aggressive operator
    fusion to keep intermediate activations in NPU SRAM. For memory, the AOT compiler should generate
    static memory arenas, allowing the OS to predictably schedule NPU memory accesses around the ISP's
    constant memory traffic in the shared 12 GB LPDDR5X pool.
  common_mistake: Candidates often design the compiler to greedily offload every supported operator to
    the dual-core NPU to maximize the 34.7 TOPS. They fail to evaluate the high cost of memory ping-ponging
    between the NPU and CPU for unsupported ops, and ignore the contention in the shared 12 GB LPDDR5X
    memory when the ISP is active.
  napkin_math: For a model requiring 2 Tera-operations (TOPs) per frame, the compute time on the 34.7
    TOPS Exynos 2400 NPU is 2 / 34.7 = 57.6 ms. If the model uses 1 GB of INT8 weights, fetching them
    within 57.6 ms requires 17.3 GB/s of bandwidth. Since the 12 GB LPDDR5X memory is shared, the compiler's
    static memory planner must optimize operator fusion to minimize intermediate tensor spills and avoid
    saturating the memory bus.
