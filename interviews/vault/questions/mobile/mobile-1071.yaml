title: Speculative Decoding with On-Device LoRA Draft
scenario: On a mobile device with 50 GB/s memory bandwidth, you run a 3B INT4 target model. Instead of a separate draft model, you use a LoRA adapter (rank=8) applied to a 2-layer subset of the target to create a fast draft path that shares 93% of weights.
question: How would you design a shared-weight speculation system and analyze its memory savings compared to a separate 0.5B draft?
details:
  realistic_solution: 'Target: 3B INT4 = 1.5GB. Separate 0.5B INT4 draft = 0.25GB. Total with separate draft: 1.75GB of 8GB. LoRA draft: early-exit after 2 layers with LoRA adapters. LoRA params per layer: 2 x (8192 x 8 + 8 x 8192) x 0.5B (INT4) = 2 x 131K params x 0.5B = 131KB per layer x 2 layers = 262KB. Plus exit head: 8192 -> 128K vocab x 0.5B = 512MB. Wait — the exit head dominates! Even with weight sharing, the vocab projection head is 512MB. Total extra: 512MB + 262KB ≈ 512MB vs separate 0.5B draft at 250MB. The LoRA draft costs MORE memory because of the exit head. Optimization: share the vocab head with the target model (which already has one). Now extra = 262KB only. Draft forward: 2 layers at 3B/32 = 94M params per layer x 2 = 188M params = 94MB weight read at 50 GB/s = 1.9ms/token + LoRA compute (negligible). Acceptance rate: only 2 layers of context = alpha ~ 0.45. E[tok] at K=5 = 1.80. Not great, but zero extra memory.'
  common_mistake: |
    **The Pitfall:** Assuming a LoRA adapter on a small subset of layers functions effectively as a quality draft model.
    **The Rationale:** Candidates think that weight sharing automatically equates to high-quality speculation without considering the depth of reasoning required.
    **The Consequence:** The draft's distribution diverges significantly from the target for complex tokens, resulting in a low acceptance rate that negates the latency benefits.
  napkin_math: |
    - **Memory Overhead:** Separate 0.5B INT4 draft requires 250MB extra. A LoRA draft (sharing the vocab head) requires only 262KB extra.
    - **Latency:** Draft forward pass for 2 layers (94MB weights) at 50 GB/s takes 1.9ms.
    - **Speculation Efficiency:** With an acceptance rate (alpha) of 0.45, the expected tokens per step (E) is 1.80.
    - **Speedup:** Effective latency becomes (5 * 1.9ms + 29ms) / 1.80 = 21.4ms/tok versus the baseline 29ms/tok.
    - **Result:** **The LoRA draft provides a 1.36x speedup with almost zero extra memory overhead.**
