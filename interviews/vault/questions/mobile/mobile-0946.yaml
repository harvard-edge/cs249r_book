title: 'KV-Cache: Evaluate KV Cache Quantization Strategies on A17 Pro'
scenario: 'For a 1B LLM on A17 Pro, compare KV cache strategies: (A) FP16 KV, (B) INT8 KV with per-head quantization, (C) INT4 KV with per-head quantization. The model targets 2048-token conversations.'
question: 'How do FP16, INT8, and INT4 KV caches trade memory, bandwidth, quality, and complexity for a 1B LLM?'
details:
  realistic_solution: 'Per-head quantization requires 1 scale + 1 zero-point per head. INT8 offers a balanced tradeoff with <0.3% perplexity increase and cuts memory/bandwidth roughly in half. INT4 aggressively cuts bandwidth but degrades long-context quality severely over 2048 tokens. Both require custom CUDA/Metal kernel modifications to dequantize before attention.'
  common_mistake: |
    **The Pitfall:** Overlooking quantization overhead and context error accumulation.
    **The Rationale:** Candidates blindly assume INT4 is twice as fast as INT8 without accounting for dequantization compute stalls or the massive quality degradation in long sequences.
    **The Consequence:** Recommending INT4 arbitrarily, which creates extreme hallucination and quality drops at the end of a 2048-token context window.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Baseline Constants: 1B model, 24 layers, 8 KV heads, dim 128.
       - Quantization Overhead: 1 scale + 1 zero-point per head (2 × 8 × 4B = 64B overhead/token/layer).
       - Context Length: 2048 tokens.
       - Hardware Bandwidth: 68 GB/s.
    2. **Calculations:**
       - (A) FP16: 24 × 2 × 8 × 128 × 2B = 98.3 KB/token. At 2048 context = 201 MB KV. Bandwidth time = 201MB / 68 GB/s = 2.96ms.
       - (B) INT8: 49.2 KB/token + 3 KB overhead = 52.2 KB/token. At 2048 context = 107 MB KV. Bandwidth time = 107MB / 68 GB/s = 1.57ms.
       - (C) INT4: 24.6 KB/token + 3 KB overhead = 27.6 KB/token. At 2048 context = 56.5 MB KV. Bandwidth time = 56.5MB / 68 GB/s = 0.83ms.
    3. **Conclusion & Interpretation:**
       **Result: Bandwidth-Bound.** INT8 provides the optimal tradeoff, halving bandwidth time (1.57ms vs 2.96ms) without the massive quality degradation of INT4 at 2048 context.
