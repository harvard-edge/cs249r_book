title: Implementing Background Index Sync for On-Device RAG on Snapdragon 8 Gen 3
scenario: A Snapdragon 8 Gen 3 (45 TOPS, 16GB) productivity app needs to keep an on-device FAISS index
  synchronized with the user's cloud document store (up to 500 new/updated docs per day). Re-embedding
  and indexing must happen in the background without impacting the foreground app. The embedding model
  runs at 200 vectors/second and each document averages 400 tokens. Design the background sync architecture
  with power and latency constraints.
question: "How would you design the background sync architecture with power and latency constraints?"
details:
  realistic_solution: 'Background sync architecture: (1) Use WorkManager (Android) with battery-not-low
    constraint. (2) Throttle NPU to 30% duty cycle: embed for 2 seconds, sleep 4.7 seconds = 200 vecs/s
    * 2s = 400 docs/6.7s = 59.7 docs/min. 500 docs: 500/59.7 = 8.4 minutes total background time. (3)
    Power: 2s active at 8W (NPU 30%) + 4.7s at 0.5W (idle) = (16+2.35)/6.7 = 2.74W average — slightly
    over 2W. Reduce to 25% duty cycle: 2.5s/10s = 25%. 200*2.5=500 docs/10s/60=300 docs/min. 500 docs:
    1.67 minutes. Power: 2.5*8+7.5*0.5=23.75/10=2.375W — acceptable.'
  common_mistake: Running background indexing at full power (45 TOPS, 12W NPU), causing battery drain
    and triggering the Android background process killer when the app is not in focus. Background work
    on mobile must respect power budgets — typically < 2W sustained for background tasks.
  napkin_math: '500 docs/day. Embedding: 200 vecs/s on NPU at 12W full power. Background constraint: 2W
    max. Duty cycle for 2W: 2W = d*12W + (1-d)*0.5W → 2 = 12d + 0.5 - 0.5d → 1.5 = 11.5d → d = 0.130.
    At 13% duty cycle: 200*0.13=26 vecs/s effective. 500 vecs: 500/26=19.2 seconds wall-clock. Index insert:
    500 vectors in FAISS HNSW: ~50ms (negligible). Total sync time: ~20 seconds at 2W constraint. Acceptable:
    schedules in background, completes in 20s during screen-off periods.'
