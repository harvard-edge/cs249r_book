title: 'Mastery: explain compound scaling failure modes for mobile deployment'
scenario: 'Your team successfully deploys EfficientNet-B0 on Snapdragon 8 Gen 3 (B0: 224×224, 0.39 GFLOPs).
  A PM requests scaling to B3 (300×300, 1.8 GFLOPs) for better accuracy without changing the SLA of <5ms.
  Demonstrate mastery by analyzing whether B3 fits the SLA and why compound scaling breaks down for mobile
  NPU deployment beyond a certain φ.'
details:
  realistic_solution: 'B3 feature maps: stage 1 at 150×150 (vs B0 112×112), intermediate maps proportionally
    larger. Hexagon HTP SRAM ~8MB. B3 peak activation: ~96×19×19 (stage 6) = 34.6KB × 1B → still fits.
    Resolution increase: HTP spatial tiling becomes less efficient at 300×300 vs 224×224 — tile count
    scales as (300/224)² = 1.79×. Latency scaling: 1.5ms × 4.6× FLOPs × 1.2× (tiling overhead) = 8.3ms
    → exceeds 5ms SLA. Break point: B2 (260×260, 1.0 GFLOPs). B2: 1.5 × (1.0/0.39) × 1.1 = 4.2ms — just
    under 5ms. B3 fails the SLA.'
  common_mistake: Projecting B3 latency from B0 by multiplying by FLOP ratio (1.8/0.39 = 4.6×) and concluding
    it takes 4.6 × 1.5ms = 6.9ms; ignoring that resolution scaling changes the NPU tiling strategy and
    that intermediate feature map sizes may exceed Hexagon HTP on-chip SRAM.
  napkin_math: 'B0 → B3 scaling factors: depth 1.2^3=1.73×, width 1.1^3=1.33×, resolution 1.15^3=1.52×
    (224→300 ≈ 1.34× actually). FLOPs: 0.39 × 2³ = 3.1× (using 2^φ rule) → 1.2 GFLOPs (actual B3: 1.8
    GFLOPs, close). Resolution 300 vs 224: (300/224)² = 1.79× spatial overhead. Hexagon at B3: 1.5ms ×
    1.8G/0.39G FLOPs ratio (if purely compute-bound) × 1.15 tiling factor = 8.8ms. Memory: B3 max activation
    38×38×192 = 277KB — fits HTP SRAM (8MB). Bottleneck is compute + tiling, not memory.'
