title: Mobile New 0031
scenario: Two models (Audio Wake-Word and Video Upscaling) run flawlessly in isolation. When run concurrently, the Audio model misses deadlines and stutters, despite CPU and NPU utilization both being under 60%.
question: Why does the audio wake-word model miss deadlines only when video upscaling runs concurrently?
details:
  realistic_solution: 'The root cause is memory bandwidth contention on the unified LPDDR bus. The Video Upscaler saturates the interconnect with DMA transfers of high-resolution frames. The Audio model requires high-frequency, low-latency weight streaming. Memory controller arbitration queues the audio read requests behind massive video burst transactions, resulting in priority inversion and latency spikes.'
  common_mistake: |
    **The Pitfall:** Assuming concurrent model serving on edge devices only competes for compute TOPS.
    **The Rationale:** Candidates ignore the shared memory bus architecture (UMA) and focus entirely on NPU/CPU scheduling.
    **The Consequence:** Failing to diagnose memory bandwidth contention, leading to ineffective compute-level optimizations.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - SoC Max Memory Bandwidth: 12 GB/s.
       - Video Model Bandwidth: 10 GB/s.
       - Audio Model Bandwidth: 50 MB/s.
       - Audio Inference Deadline: 20 ms.
       - Base Compute Time: 10 ms.
    2. **Calculations:**
       - Memory Controller Queue Delay: 15 ms (blocked by 10 GB/s video bursts).
       - Total Latency: 15 ms (wait) + 10 ms (compute) = 25 ms.
    3. **Conclusion & Interpretation:**
       - **Result: 25 ms > 20 ms deadline.**
       - **Bottleneck: Memory-Bandwidth Bound** (The shared LPDDR interconnect saturates, causing latency spikes despite idle compute).
