title: Mobile New 0031
scenario: Two models (Audio Wake-Word and Video Upscaling) run flawlessly in isolation. When run concurrently,
  the Audio model misses deadlines and stutters, despite CPU and NPU utilization both being under 60%.
question: "Why does the audio wake-word model miss deadlines only when video upscaling runs concurrently?"
details:
  realistic_solution: The symptom of an isolated model failing deadlines when paired with another is memory
    bandwidth contention. The Video Upscaler reads and writes massive high-resolution frames from LPDDR,
    saturating the system memory bus. The Audio model, while computationally light, requires rapid, real-time
    fetching of weights and audio buffers. The memory controller queues the audio requests behind the
    massive video bursts, causing latency spikes.
  common_mistake: Assuming concurrent model serving on edge devices only competes for compute TOPS, ignoring
    the shared memory bus.
  napkin_math: 'Video model BW: 10GB/s. SoC Max BW: 12GB/s. Audio model BW: 50MB/s. Average BW is fine,
    but instantaneous bursts delay Audio fetches. Audio deadline = 20ms. Wait in memory queue = 15ms.
    Compute = 10ms. 25ms > 20ms (Deadline missed).'
