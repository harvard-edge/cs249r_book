title: Mobile New 0031
scenario: Two models (Audio Wake-Word and Video Upscaling) run flawlessly in isolation. When run concurrently, the Audio model misses deadlines and stutters, despite CPU and NPU utilization both being under 60%.
question: Why does the audio wake-word model miss deadlines only when video upscaling runs concurrently?
details:
  realistic_solution: The symptom of an isolated model failing deadlines when paired with another is memory bandwidth contention. The Video Upscaler reads and writes massive high-resolution frames from LPDDR, saturating the system memory bus. The Audio model, while computationally light, requires rapid, real-time fetching of weights and audio buffers. The memory controller queues the audio requests behind the massive video bursts, causing latency spikes.
  common_mistake: |
    **The Pitfall:** Assuming concurrent model serving on edge devices only competes for compute TOPS.
    **The Rationale:** Candidates ignore the shared memory bus and focus entirely on NPU/CPU availability.
    **The Consequence:** Failing to diagnose memory bandwidth contention, leading to ineffective optimizations.
  napkin_math: |
    - **Video Model BW:** 10 GB/s.
    - **Audio Model BW:** 50 MB/s.
    - **SoC Max BW:** 12 GB/s.
    - **Audio Deadline:** 20 ms.
    - **Wait in Memory Queue:** 15 ms (queued behind video bursts).
    - **Compute Time:** 10 ms.
    - **Total Latency:** 15 ms + 10 ms = **25 ms**.
    - **Result:** 25 ms > 20 ms deadline (Deadline missed).
