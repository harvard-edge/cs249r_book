title: Encoder-Decoder Tradeoffs for On-Device NPU Deployment
scenario: 'Your team is tasked with deploying a new real-time multimodal AI assistant on a mobile device powered by the Samsung Exynos 2400 NPU, which offers 34.7 TOPS and is paired with 12 GB LPDDR5X memory. The assistant needs to process user speech, understand context, and generate natural language responses with minimal latency.'
question: "Which encoder, decoder, or encoder-decoder architecture would you choose for an Exynos 2400 AI assistant and why?"
details:
  realistic_solution: A strong candidate would likely lean towards an encoder-only model for understanding/classification tasks and a smaller, highly optimized decoder-only or a very compact encoder-decoder architecture for generation tasks, potentially even exploring hybrid approaches or quantization strategies. They would justify their choice by estimating memory footprint vs. 12GB LPDDR5X, inference latency vs. real-time requirements, and power consumption given the 34.7 TOPS capability. They would also consider techniques like pruning, distillation, and efficient attention mechanisms to fit within the NPU's capabilities, demonstrating a deep understanding of practical optimization for mobile hardware.
  common_mistake: |
    **The Pitfall:** Focusing solely on accuracy and proposing massive parameter models.
    **The Rationale:** Candidates anchor to cloud-based LLM architectures without calculating how they map to mobile constraints.
    **The Consequence:** Proposing a 20B parameter model that requires 40GB of RAM, immediately failing due to the device's 12GB physical limit.
  napkin_math: |
    - **Compute Estimates:** 1 TOPS inference -> 1 / 34.7 TOPS = **28.8ms latency**. 10 TOPS -> **~288ms latency**.
    - **Memory Bandwidth:** LPDDR5X provides ~50-80 GB/s. Loading a 1GB model every 100ms requires **10 GB/s**, which is feasible.
    - **Model Sizing:** A 100M parameter encoder (MobileBERT, ~10-20 TOPS) efficiently leverages the NPU. A full 20B decoder in FP16 (40GB) is impossible on 12GB RAM; requiring heavy pruning/quantization down to ~1-2B params.
