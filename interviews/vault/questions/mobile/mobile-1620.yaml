title: Encoder-Decoder Tradeoffs for On-Device NPU Deployment
scenario: 'Your team is tasked with deploying a new real-time multimodal AI assistant
  on a mobile device powered by the Samsung Exynos 2400 NPU, which offers 34.7 TOPS
  and is paired with 12 GB LPDDR5X memory. The assistant needs to process user speech,
  understand context, and generate natural language responses with minimal latency.
  Given the tight power and memory constraints inherent to mobile platforms, evaluate
  the architectural choices: encoder-only, decoder-only, or a full encoder-decoder
  model. Which architecture would you choose, and what are the key system cost (compute,
  memory, power) and deployment constraint tradeoffs you would consider to justify
  your decision for this specific hardware?'
question: Which encoder, decoder, or encoder-decoder architecture would you choose
  for an Exynos 2400 AI assistant and why?
details:
  realistic_solution: A strong candidate would likely lean towards an encoder-only
    model for understanding/classification tasks and a smaller, highly optimized decoder-only
    or a very compact encoder-decoder architecture for generation tasks, potentially
    even exploring hybrid approaches or quantization strategies. They would justify
    their choice by estimating memory footprint vs. 12GB LPDDR5X, inference latency
    vs. real-time requirements, and power consumption given the 34.7 TOPS capability.
    They would also consider techniques like pruning, distillation, and efficient
    attention mechanisms to fit within the NPU's capabilities, demonstrating a deep
    understanding of practical optimization for mobile hardware.
  common_mistake: Candidates might focus solely on accuracy or theoretical model performance
    without sufficiently considering the practical implications of on-device deployment,
    such as the NPU's specific TOPS rating and memory bandwidth, power budget, and
    the impact of model size/complexity on user experience (latency, battery life).
    A common oversight is not quantifying how different architectures translate into
    concrete resource utilization on the Exynos 2400.
  napkin_math: 'For the Exynos 2400 NPU (34.7 TOPS), a model requiring 1 TOPS for
    inference would theoretically complete in ~28ms. If a model needs 10 TOPS, it
    would take ~280ms. Memory bandwidth: LPDDR5X typically offers around 50-80 GB/s.
    A model with 500M parameters (2 bytes/param for FP16 = 1GB) would require data
    transfer, and a 1GB model loaded every 100ms implies 10 GB/s bandwidth, which
    is feasible. However, repeated memory access for weights during inference or large
    activations can quickly become a bottleneck. Candidates should estimate the model
    size, the number of operations (MACs) for different architectures, and roughly
    translate that into NPU utilization and memory demands, comparing it against the
    Exynos 2400''s advertised specs. For example, ''A 20B parameter decoder-only model
    in FP16 (40GB) is impossible with 12GB LPDDR5X, requiring an encoder-only model
    or heavily compressed/small decoder-only approach like a 1B param model (2GB)
    which is feasible.'' Or, ''An encoder-only model for classification (e.g., mobileBERT,
    ~100M params, ~10-20 TOPS) would leverage the 34.7 TOPS efficiently with low latency,
    whereas a full seq2seq for generation (e.g., mobile-optimized T5, ~500M params,
    ~50-100 TOPS without optimization) might exceed compute or memory, necessitating
    heavy pruning/quantization or offloading.'''
