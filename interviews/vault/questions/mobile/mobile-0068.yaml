title: The 3-Second App Launch Penalty
scenario: Your fitness app loads an 18 MB INT8 on-device model. Users see a splash screen for 4.2 seconds before the app is interactive. Without the model, the app launches in 1.1 seconds.
question: How do you cut the ML-related launch time penalty from 3.1 seconds to under 500 ms?
details:
  realistic_solution: |
    The 3.1s penalty is runtime model compilation, not loading. TFLite compiles the graph for the NPU. The fix is to cache the compiled NPU graph.
  common_mistake: |
    **The Pitfall:** Suggesting a smaller model size.
    **The Rationale:** Candidates assume that large file I/O is causing the delay, failing to recognize that the 18 MB INT8 model is already quite small.
    **The Consequence:** The team will waste months degrading model accuracy without significantly improving the 3.1-second compilation bottleneck.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: 18 MB INT8.
    - Launch without ML: 1.1s.
    - Launch with ML: 4.2s (3.1s penalty).

    **Calculations:**
    - JIT Compilation time: ~2.8s out of 3.1s penalty.
    - Warm launch (cached compilation): 1.1s + 0.1s (I/O) + ~0.0s (JIT) = ~1.2s.

    **Conclusion & Interpretation:**
    - **Result: JIT Compilation Stalls.** Caching the compiled NPU graph eliminates the 2.8s runtime compilation penalty, returning the app to near-native launch speeds.
