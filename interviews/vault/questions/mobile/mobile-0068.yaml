title: The 3-Second App Launch Penalty
scenario: Your fitness app loads an on-device pose estimation model at launch to power its exercise tracking
  feature. On the Samsung Galaxy S23 (Snapdragon 8 Gen 2), users see a splash screen for 4.2 seconds before
  the app is interactive. Without the ML model, the app launches in 1.1 seconds. The model file is 18
  MB (INT8). Your PM says 'users abandon apps that take more than 2 seconds to launch.' How do you cut
  the ML-related launch time from 3.1 seconds to under 500 ms?
question: "1 seconds to under 500 ms?"
details:
  realistic_solution: 'The 3.1s penalty is runtime model compilation, not loading. TFLite compiles the
    graph for NPU (operator fusion, memory planning, delegate negotiation) = ~2.8s. Fix: cache the compiled
    graph (~2.8 MB). Warm launch: 94ms total. If no cache, use lazy loading — show UI in 1.1s, compile
    on background thread. Cache invalidation: only on OS updates (~quarterly). User abandonment drops
    from 25% (3s) to <2% (1.1s). The model is 18 MB INT8 — already small. The bottleneck is compilation,
    not size.'
  common_mistake: '"Use a smaller model." The model is already 18 MB INT8 — quite small. The 3.1 seconds
    isn''t from model *size*, it''s from model *compilation*.'
  napkin_math: 'Cold launch (no cache): 12 + 50 + 2,800 + 30 = 2,892 ms ≈ 3.1 sec. Warm launch (with compiled
    cache): 12 + 50 + 1.9 + 30 = 94 ms. Lazy loading: 0 ms at launch (model loads later). Cache size:
    2.8 MB (compiled graph). Cache invalidation rate: ~once per OS update (every 3-4 months). User abandonment:
    25% at 3 sec launch, 8% at 2 sec, <2% at 1 sec. Revenue impact at 100K DAU: reducing from 25% to 2%
    abandonment = 23,000 saved sessions/day.'
