title: The 3-Second App Launch Penalty
scenario: Your fitness app loads an 18 MB INT8 on-device pose estimation model at launch. Users see a splash screen for 4.2 seconds before the app is interactive. Without the ML model, the app launches in 1.1 seconds.
question: How do you cut the ML-related launch time penalty from 3.1 seconds to under 500 ms?
details:
  realistic_solution: The 3.1s penalty is runtime model compilation, not loading. TFLite compiles the graph for NPU. Fix: cache the compiled graph (~2.8 MB).
  common_mistake: |
    **The Pitfall:** Suggesting a smaller model size.
    **The Rationale:** Candidates assume that large file I/O is causing the delay, failing to recognize that the 18 MB INT8 model is already quite small.
    **The Consequence:** The team will waste months degrading model accuracy without significantly improving the 3.1-second compilation bottleneck.
  napkin_math: |
    1. Calculate cold launch time: 1.1s base + 3.1s ML penalty = **4.2s**.
    2. Identify bottleneck: TFLite compiles the graph for the NPU, which takes ~2.8s of the 3.1s penalty.
    3. Calculate warm launch time (with cache): Base + 94ms = **~1.2s**.
    4. Estimate abandonment impact: Dropping launch time from 4.2s to 1.2s reduces abandonment from 25% to <2%.
