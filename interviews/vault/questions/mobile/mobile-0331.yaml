title: 'The Depthwise Dividend: Attention Scaling & Variants'
scenario: Your team is optimizing a real-time style transfer feature for a mobile app. The key bottleneck is a standard 3x3 convolution layer that maps a 128-channel input tensor to a 256-channel output. You propose replacing it with a 3x3 depthwise separable convolution.
question: What is the approximate reduction in computational cost (FLOPs) you would expect?
details:
  realistic_solution: 'A depthwise separable convolution splits a standard convolution into two much cheaper steps: a 3x3 depthwise convolution (one filter per input channel) and a 1x1 pointwise convolution (to combine the channels). The computational savings are substantial.'
  common_mistake: |
    **The Pitfall:** Forgetting that the 1x1 pointwise convolution accounts for the majority of the computation in a depthwise separable block.
    **The Rationale:** Engineers often calculate the reduction relative to the small initial depthwise spatial filtering step only.
    **The Consequence:** Massively overestimating the efficiency gains by ignoring the heavy cross-channel computation.
  napkin_math: |
    - Cost Ratio Formula: (1 / Output_Channels) + (1 / Kernel_Size^2).
    - Inputs: Output_Channels = 256, Kernel_Size = 3.
    - Ratio calculation: (1 / 256) + (1 / 9) ≈ 0.0039 + 0.1111 = 0.115.
    - Reduction Factor: 1 / 0.115 ≈ 8.7x.
    - **The computational cost is reduced by approximately 9x.**
  options:
  - ~2x
  - ~9x
  - ~28x
  - ~256x
  correct_index: 1
