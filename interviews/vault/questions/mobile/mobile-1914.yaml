title: Zero-Copy Video Pipeline on Apple Silicon
scenario: A real-time segmentation app runs on the A17 Pro. The camera ISP outputs NV12 frames which must be color-converted and passed to the Neural Engine at a strict 60fps.
question: Propose an asynchronous pipeline utilizing iOS unified memory primitives to prevent CPU copy bottlenecks.
visual:
  kind: svg
  path: mobile-1914.svg
  alt: Block diagram showing sequential pointer handoffs instead of data copies between ISP, GPU, and NPU.
  caption: Zero-Copy IOSurface Pipeline
details:
  realistic_solution: Allocate an IOSurface (unified memory buffer) shared between the ISP, GPU, and Neural Engine. A GPU compute shader asynchronously converts NV12 to RGB in-place. The Neural Engine reads this surface via pointer sharing.
  common_mistake: |
    **The Pitfall:** Allocating separate CPU arrays for manual memory transfers.
    **The Rationale:** Performing manual memory copies (memcpy) between Swift arrays and Metal buffers completely destroys throughput.
    **The Consequence:** Severe CPU bottlenecks and immediately missed 16.6ms latency budgets.
  napkin_math: |
    **Assumptions & Constraints:**
    - Frame Rate Target: 60 FPS.
    - Latency Budget: 16.6ms per frame.
    - Transfers required: ISP -> GPU -> NPU.

    **Calculations:**
    - Required Latency: 1 / 60 = 16.6ms.
    - Zero-copy transfer overhead (via IOSurface): 0ms.
    - Compute time: <16.6ms.

    **Conclusion & Interpretation:**
    - **Result: 0ms Overhead (Compute-Bound)**. Zero CPU memcpy operations keep memory overhead at 0ms, allowing the pipeline to safely sustain the 16.6ms budget bounded strictly by GPU/NPU compute capacity.
