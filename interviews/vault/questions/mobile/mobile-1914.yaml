title: Zero-Copy Video Pipeline on Apple Silicon
scenario: "A real-time segmentation app runs on the A17 Pro. The camera ISP outputs NV12 frames. They must be color-converted and passed to the Neural Engine at a strict 60fps (16.6ms)."
question: "Propose an asynchronous pipeline utilizing iOS unified memory primitives to prevent CPU copy bottlenecks."
visual:
  kind: svg
  path: mobile-1914.svg
  alt: Block diagram showing sequential pointer handoffs instead of data copies between ISP, GPU, and NPU.
  caption: Zero-Copy IOSurface Pipeline
details:
  realistic_solution: Allocate an IOSurface (unified memory buffer) shared between the ISP, GPU, and Neural Engine. The ISP writes NV12 data directly into the IOSurface. A GPU compute shader asynchronously converts NV12 to RGB in-place or into a secondary IOSurface. The Neural Engine then reads this surface via pointer sharing. Zero CPU memcpy operations occur, easily sustaining the 16.6ms budget.
  common_mistake: |
    **The Pitfall:** Allocating separate CPU arrays for memory transfers.
    **The Rationale:** Performing manual memory copies between Swift arrays and Metal buffers destroys throughput.
    **The Consequence:** CPU bottlenecks and missed 16.6ms latency budgets.
  napkin_math: |
    - Frame budget: `1 / 60 = 16.6ms per frame`.
    - Zero-copy transfers: `0ms` overhead.
    - **Conclusion:** Zero CPU memcpy operations easily sustain the **16.6ms** budget.
