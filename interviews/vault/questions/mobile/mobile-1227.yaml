title: On-Device Coreset Selection Architecture for Apple A17 Pro
scenario: You are designing an on-device data pruning and coreset selection pipeline
  for personalized language model fine-tuning on the Apple A17 Pro Neural Engine.
  The system continuously collects user text data, but due to the shared 8 GB unified
  memory and the need to keep power consumption under a ~5W thermal envelope during
  overnight charging, you cannot store or train on all collected data. Architect a
  system that evaluates the Information-Compute Ratio (ICR) of incoming data and selects
  a high-value coreset for on-device training without starving OS resources.
question: How would you architect a system that evaluates the Information-Compute
  Ratio (ICR) of incoming data and selects a high-value coreset for on-device training
  without starving OS resources?
details:
  realistic_solution: The system should use a lightweight, quantized proxy model running
    efficiently on the 16-core Neural Engine to compute perplexity scores as a proxy
    for information gain. High-scoring, rare user interactions are buffered into a
    prioritized coreset. To prevent model collapse and maximize data efficiency, the
    architecture includes an overnight batch process that evaluates the coreset using
    the ICR framework, generating synthetic variations of the highest-value local
    intents using the base model while strictly bounding the working memory.
  common_mistake: Candidates often propose complex neural-based data valuation methods,
    like using the full LLM to compute gradients for every sample, which exceeds the
    memory constraints when running alongside the OS. They also frequently ignore
    the ~5W power limit, proposing continuous background data scoring instead of batched,
    lightweight proxy evaluations.
  napkin_math: Assuming the OS consumes 3 GB of the 8 GB shared unified memory and
    an 8-bit quantized 3B parameter base model takes 3 GB, 2 GB remains for activations
    and data. A 10,000-sample coreset (sequence length 128, 16-bit tokens) requires
    10,000 * 128 * 2 bytes = 2.56 MB. If the proxy model requires 10 GigaOPS per sequence,
    scoring 100,000 daily interactions requires 1 TeraOP total. On the 35 TOPS Neural
    Engine, this takes roughly 0.03 seconds of compute time, easily staying within
    the ~5W power budget while preserving the 2 GB working memory for the training
    loop.
