title: Mobile New 0021
scenario: An AR headset's battery drains in 30 minutes. Profiling shows the NPU is only 20% utilized,
  computing efficiently, but system power draw is 5W. The model reads 100MB of data from RAM per frame
  at 30 FPS.
details:
  realistic_solution: The symptom is severe battery drain despite low compute utilization. The cause is
    the massive energy cost of DRAM access. Fetching weights/activations from off-chip LPDDR consumes
    orders of magnitude more energy per byte than SRAM or ALUs. A 100MB model running at 30 FPS requires
    massive bandwidth, turning the memory subsystem into a severe power bottleneck.
  common_mistake: Optimizing neural network MACs for power while ignoring the extreme energy cost of off-chip
    memory.
  napkin_math: '100MB * 30 FPS = 3GB/s bandwidth. LPDDR4 energy: ~100 pJ/bit = 800 pJ/byte. 3GB/s * 800
    pJ/byte = 2.4 Joules/sec = 2.4 Watts just for DRAM access. Total system power 5W, meaning memory consumes
    ~50% of the entire budget.'
