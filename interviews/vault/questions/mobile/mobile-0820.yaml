title: Mobile New 0021
scenario: An AR headset's battery drains in 30 minutes. Profiling shows the NPU is only 20% utilized, computing efficiently, but system power draw is 5W. The model reads 100MB of data from RAM per frame at 30 FPS.
question: "Why does the AR headset drain battery despite only 20% NPU utilization?"
details:
  realistic_solution: The symptom is severe battery drain despite low compute utilization. The cause is the massive energy cost of DRAM access. Fetching weights/activations from off-chip LPDDR consumes orders of magnitude more energy per byte than SRAM or ALUs. A 100MB model running at 30 FPS requires massive bandwidth, turning the memory subsystem into a severe power bottleneck.
  common_mistake: |
    **The Pitfall:** Attempting to optimize neural network MACs or prune layers to reduce power.
    **The Rationale:** Engineers often equate computational complexity (FLOPs) directly with power consumption.
    **The Consequence:** The actual power hog—memory bandwidth—is ignored, resulting in negligible battery improvements.
  napkin_math: |
    - **Memory Bandwidth:** 100 MB * 30 FPS = **3 GB/s**.
    - **LPDDR4 Energy Cost:** ~100 pJ/bit = **800 pJ/byte**.
    - **Power Draw:** 3 GB/s * 800 pJ/byte = 2.4 Joules/sec = **2.4 Watts** just for DRAM access.
    - **Conclusion:** Out of the 5W total system budget, memory alone consumes ~50%.
