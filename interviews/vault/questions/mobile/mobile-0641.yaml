title: Building a Hardware-Adaptive Inference Engine
scenario: You're building a mobile ML inference engine that must run the same model optimally across multiple SoCs (Apple A18 Pro, Snapdragon 8 Elite, Dimensity 9300, Exynos 2400, Tensor G4). Each SoC has different operator support, memory hierarchies, and optimal data layouts. Current approaches (TFLite, Core ML) are platform-specific.
question: How would you design a cross-platform inference engine that automatically adapts to each SoC's strengths without maintaining 5 separate model variants?
details:
  realistic_solution: 'Design a two-phase system: (1) Ahead-of-time: compile the model into a portable IR (like MLIR/TensorIR) that preserves the full operator graph. (2) On-device at first launch: run a device-specific compiler that profiles the SoC, builds operator fusion plans, selects optimal data layouts (NHWC vs NCHW vs tiled), and partitions across NPU/GPU/CPU based on a per-op latency LUT. Cache the compiled plan (~5ms reload on subsequent launches). This achieves within 12-15% of hand-tuned platform-specific performance while shipping a single model artifact, saving 60 MB vs 5 separate binaries.'
  common_mistake: |
    **The Pitfall:** Relying purely on generic runtimes (like ONNX Runtime) and expecting optimal performance.
    **The Rationale:** Developers prioritize portability and developer experience over squeezing every drop of performance out of the silicon.
    **The Consequence:** Leaving 2-5x speedups on the table by missing SoC-specific operator fusions and memory layouts.
  napkin_math: |
    1. Storage Savings: Shipping 1 IR (15 MB) instead of 5 separate binaries (75 MB) saves 60 MB.
    2. First-launch overhead: Compilation takes ~350 ms (partitioning + fusion + memory planning).
    3. **Cached latency:** Reloads in 5ms. Averages 18% faster than generic runtimes and within 12% of hand-tuned platform-specific models.
