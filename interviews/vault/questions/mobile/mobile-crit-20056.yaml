title: Speculative Decoding with On-Device LoRA Draft
scenario: On A17 Pro (8GB, 35 TOPS, ~50 GB/s), you run a 3B INT4 target model. Instead of a separate draft,
  you use a LoRA adapter (rank=8) applied to a 2-layer subset of the target to create a fast draft path
  that shares 93% of weights. Design this shared-weight speculation system and analyze memory savings
  vs a separate 0.5B draft.
question: "How would you design this shared-weight speculation system and analyze memory savings vs a separate 0.5B draft?"
details:
  realistic_solution: 'Target: 3B INT4 = 1.5GB. Separate 0.5B INT4 draft = 0.25GB. Total with separate
    draft: 1.75GB of 8GB. LoRA draft: early-exit after 2 layers with LoRA adapters. LoRA params per layer:
    2 x (8192 x 8 + 8 x 8192) x 0.5B (INT4) = 2 x 131K params x 0.5B = 131KB per layer x 2 layers = 262KB.
    Plus exit head: 8192 -> 128K vocab x 0.5B = 512MB. Wait — the exit head dominates! Even with weight
    sharing, the vocab projection head is 512MB. Total extra: 512MB + 262KB ≈ 512MB vs separate 0.5B draft
    at 250MB. The LoRA draft costs MORE memory because of the exit head. Optimization: share the vocab
    head with the target model (which already has one). Now extra = 262KB only. Draft forward: 2 layers
    at 3B/32 = 187M params per layer x 2 = 375M params = 187MB weight read at 50 GB/s = 3.7ms/token +
    LoRA compute (negligible). Acceptance rate: only 2 layers of context = alpha ~ 0.45. E[tok] at K=5
    = 1.69. Not great, but zero extra memory.'
  common_mistake: Thinking a LoRA adapter on a subset of layers can function as a quality draft. The adapter
    is applied to only 2 layers, so the draft's distribution diverges significantly from the target for
    tokens requiring deep reasoning.
  napkin_math: 'Separate draft: 250MB extra. LoRA draft (shared vocab head): 262KB extra. Draft latency:
    3.7ms. Alpha: 0.45. E=1.69. Effective: 5x3.7+29 = 47.5ms / 1.69 = 28ms/tok vs 29ms = 1.04x. Barely
    worth it. Need alpha > 0.55 to be useful.'
