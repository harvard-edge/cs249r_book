title: Split Computing BLE Bandwidth
scenario: A health application uses split computing. Initial model layers run on a smartwatch, transmitting intermediate activations over a 2 Mbps Bluetooth LE link to a smartphone for the heavier classification layers.
question: What is the maximum allowable intermediate tensor size to ensure the BLE transmission adds no more than 100ms of latency?
visual:
  kind: svg
  path: mobile-1874.svg
  alt: Directed graph showing model layers on a watch, a BLE transmission bottleneck, and final layers on a phone.
  caption: Watch-to-Phone Split Architecture
details:
  realistic_solution: |
    To architect a strict real-time split-computing pipeline, the bottleneck layer must be identified early in the network where spatial resolution and channel depth naturally constrict (e.g., a pooling layer output). Given the severe 2 Mbps Bluetooth LE constraint, the network must be surgically split such that the serialized intermediate feature map is rigorously capped at 25 Kilobytes to satisfy the 100ms transmission SLA.
  common_mistake: |
    **The Pitfall:** Dividing 2 Mbps by 8 to get 250 KB/s, and then multiplying by 100 instead of 0.1.
    **The Rationale:** Candidates mix up seconds and milliseconds in their unit conversions.
    **The Consequence:** They yield a drastically inflated 25,000 KB size constraint, completely breaking the real-time goal.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - BLE effective bandwidth: 2 Megabits per second (Mbps).
       - Transmission latency budget: 100 milliseconds (0.1 seconds).
    2. **Calculations:**
       - Max data transmission in bits = 2,000,000 bits/s * 0.1s = 200,000 bits.
       - Convert bits to bytes = 200,000 bits / 8 bits/byte = 25,000 bytes.
       - Convert to Kilobytes = 25,000 / 1000 = 25 KB.
    3. **Conclusion & Interpretation:**
       - **Result: Network Bandwidth-Bound.** The absolute maximum intermediate tensor size is 25 KB. Failing to divide by 8 to convert bits to bytes is a fatal architectural error that would balloon latency to 800ms.
