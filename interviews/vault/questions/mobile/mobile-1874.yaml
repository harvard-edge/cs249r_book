title: Split Computing BLE Bandwidth
scenario: A health application uses split computing. Initial layers of a heart-rate model run on an Apple Watch, transmitting intermediate activations over a 2 Mbps Bluetooth LE link to an Apple A17 Pro phone for the heavier classification layers.
question: Create the split-point strategy by identifying the maximum allowable intermediate tensor size to ensure the BLE transmission adds no more than 100ms of latency.
visual:
  kind: svg
  path: mobile-1874.svg
  alt: Directed graph showing model layers on a watch, a BLE transmission bottleneck, and final layers on a phone.
  caption: Watch-to-Phone Split Architecture
details:
  realistic_solution: |
    The Bluetooth link has an effective bandwidth of 2 Megabits per second. To cap transmission latency at 100 milliseconds (0.1 seconds), the maximum data sent is 2 Mbps * 0.1s = 0.2 Megabits = 200 Kilobits. Converting to bytes: 200 Kb / 8 = 25 Kilobytes. The model must be split at a bottleneck layer where the output feature map is ≤ 25 KB.
  common_mistake: |
    **The Pitfall:** Dividing 2 Mbps by 8 to get 250 KB/s, and then multiplying by 100 instead of 0.1.
    **The Rationale:** Candidates mix up seconds and milliseconds in their unit conversions.
    **The Consequence:** They yield a drastically inflated 25,000 KB size constraint, completely breaking the real-time goal.
  napkin_math: |
    - 2 Mbps = 2,000,000 bits/s.
    - 2,000,000 bits/s * 0.1s (100ms) = 200,000 bits.
    - 200,000 bits / 8 = 25,000 bytes = **25 KB**.
