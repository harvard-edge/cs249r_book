title: Distillation vs Pruning for Snapdragon Hexagon NPU
scenario: Your team is deploying a large vision transformer for real-time video segmentation on the Qualcomm
  Hexagon NPU (Snapdragon 8 Gen 3). The baseline model requires 150 Giga-Operations (GOPS) per frame and
  takes up 4 GB of the shared 12-16 GB LPDDR5X memory. You need to fit this into a strict 10 ms latency
  budget per frame. You are presented with two optimization alternatives. Proposal A suggests aggressive
  unstructured pruning to reach 70% sparsity. Proposal B advocates for Knowledge Distillation to train
  a dense student model with 3x fewer parameters and operations. Which approach is better suited for the
  target hardware and why?
details:
  realistic_solution: Proposal B (Knowledge Distillation) is the correct choice. The Snapdragon 8 Gen
    3 NPU, capable of 45 TOPS INT8, achieves peak performance on dense tensor workloads. A smaller, dense
    student model trained via distillation will map perfectly to the hardware's systolic arrays and efficiently
    utilize the shared LPDDR5X memory bandwidth. Unstructured pruning (Proposal A) will cause memory stalls
    and fail to leverage the NPU's massive parallel compute capabilities.
  common_mistake: Candidates often advocate for unstructured pruning because it mathematically reduces
    the theoretical FLOP count without needing a complex teacher-student training pipeline. They fail
    to realize that the Hexagon NPU's matrix multiplication units are highly optimized for dense INT8
    operations, and unstructured sparsity leads to irregular memory access patterns that cripple hardware
    utilization.
  napkin_math: The baseline requires 150 GOPS per frame. For 10 ms latency, required throughput is 150
    GOPS / 0.01 s = 15 TOPS. The Hexagon NPU provides 45 TOPS INT8 peak. With 70% unstructured sparsity
    (Proposal A), effective NPU utilization typically drops below 10% due to memory bottlenecks, yielding
    < 4.5 TOPS effective throughput, failing the 15 TOPS requirement. Proposal B reduces operations by
    3x to 50 GOPS/frame. A dense INT8 model routinely achieves > 40% utilization on the NPU (18 TOPS effective).
    At 18 TOPS, 50 GOPS takes 50 / 18000 = ~2.7 ms, comfortably beating the 10 ms deadline while reducing
    memory footprint to ~1.3 GB.
