title: The Mixed-Precision Deployment Plan
scenario: You're deploying a 100-layer model via Core ML. Running everything in FP16 gives a 2% accuracy drop — unacceptable for your medical imaging app. Running everything in FP32 means the Neural Engine can't be used.
question: How would you design a mixed-precision strategy that gets Neural Engine speed with FP32 accuracy?
details:
  realistic_solution: Implement a layer-wise mixed-precision profiling strategy. Execute the model in FP32 as the golden baseline, then iteratively quantize individual layers to FP16, measuring the cosine similarity of the output activations. Pin layers with cosine similarity < 0.999 (e.g., softmax, layer normalization) to FP32 for execution on the CPU/GPU, while offloading the remaining 90%+ FP16-safe layers to the Neural Engine. Use Core ML's MLComputeUnits configuration to manage execution routing.
  common_mistake: |
    **The Pitfall:** Bumping the entire model to FP32 upon observing a slight top-line accuracy regression.
    **The Rationale:** Assuming precision sensitivity is uniform across the architecture, rather than isolated to specific operations that demand high dynamic range.
    **The Consequence:** The model is completely evicted from the dedicated Neural Engine and runs entirely on the CPU/GPU, incurring a massive latency and power penalty.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model depth: 100 layers.
    - ANE (FP16) layer time: 0.2 ms.
    - CPU (FP32) layer time: 1.0 ms.
    - ANE-CPU context switch / data transfer: 1.5 ms per round-trip.
    - Precision sensitivity: 5 layers require FP32.

    **Calculations:**
    - FP16 only: 100 * 0.2 ms = 20 ms.
    - FP32 only (CPU): 100 * 1.0 ms = 100 ms.
    - Mixed precision execution: (95 * 0.2) + (5 * 1.0) = 19 + 5 = 24 ms.
    - Transfer overhead: 5 round-trips * 1.5 ms = 7.5 ms.
    - Total mixed latency: 24 ms + 7.5 ms = 31.5 ms.

    **Conclusion & Interpretation:**
    - **Result: 31.5 ms (Compute-Bound Optimization)**. Mixed precision achieves 31.5 ms (vs 100 ms pure FP32), delivering a ~3.1x speedup while strictly preserving the medical-grade FP32 accuracy baseline.
