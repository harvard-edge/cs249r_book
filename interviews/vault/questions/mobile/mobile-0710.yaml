title: The Mixed-Precision Deployment Plan
scenario: You're deploying a 100-layer model on the Apple Neural Engine via Core ML. Running everything in FP16 gives a 2% accuracy drop — unacceptable for your medical imaging app. Running everything in FP32 means the Neural Engine can't be used (it only supports FP16).
question: How would you design a mixed-precision strategy that gets Neural Engine speed with FP32 accuracy?
details:
  realistic_solution: Profile each layer's precision sensitivity by running the model in FP32 and comparing each layer's output to its FP16 equivalent using cosine similarity. Layers with cosine similarity > 0.999 are FP16-safe. Layers below that threshold need FP32.
  common_mistake: |
    **The Pitfall:** Running the whole model in FP32 on the GPU/CPU to preserve accuracy.
    **The Rationale:** Engineers assume that if one layer fails in FP16, the entire model must be bumped to FP32.
    **The Consequence:** The model runs 3-5x slower because it fails to utilize the dedicated Neural Engine for the 95% of layers that are perfectly stable in FP16.
  napkin_math: |
    1. **FP16 Only:** 100 layers * 0.2ms = 20ms (Fast but inaccurate).
    2. **FP32 Only (GPU):** 100 layers * 1.0ms = 100ms (Accurate but slow).
    3. **Mixed Precision:** 95 layers on NE (FP16) = 19ms. 5 precision-sensitive layers on CPU (FP32) = 5 * 0.6ms = 3ms.
    4. **Transfer Overhead:** 10 data transfers (5 round-trips between NE and CPU) = 10 * 1.5ms = 15ms.
    5. **Total Mixed Latency:** 19ms + 3ms + 15ms = 37ms.
    **Mixed precision is 2.7x faster than pure FP32 while maintaining full accuracy.**
