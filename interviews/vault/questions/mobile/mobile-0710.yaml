title: The Mixed-Precision Deployment Plan
scenario: You're deploying a 100-layer model on the Apple Neural Engine via Core ML. Running everything
  in FP16 gives a 2% accuracy drop — unacceptable for your medical imaging app. Running everything in
  FP32 means the Neural Engine can't be used (it only supports FP16). Design a mixed-precision strategy
  that gets Neural Engine speed with FP32 accuracy.
question: "How would you design a mixed-precision strategy that gets Neural Engine speed with FP32 accuracy?"
details:
  realistic_solution: Profile each layer's precision sensitivity by running the model in FP32 and comparing
    each layer's output to its FP16 equivalent using cosine similarity. Layers with cosine similarity
    > 0.999 are FP16-safe. Layers below that threshold need FP32.
  common_mistake: '"Run the whole model in FP32 on the GPU." This works but is 3-5× slower than the Neural
    Engine. You''re leaving performance on the table.'
  napkin_math: '100 layers. 95 on Neural Engine FP16: 95 × 0.2ms = 19ms. 5 on CPU FP32: 5 × 0.6ms = 3ms.
    10 data transfers (5 round-trips): 10 × 1.5ms = 15ms. Total: **37ms**. All-FP16: 20ms (fast but inaccurate).
    All-FP32 GPU: 100ms (accurate but slow). Mixed: 37ms — 1.85× slower than all-FP16, but 2.7× faster
    than all-FP32, with full accuracy.'
