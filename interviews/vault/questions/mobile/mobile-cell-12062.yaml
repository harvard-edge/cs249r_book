title: 'Model Format Conversion: Specify Multi-Platform Model Conversion CI/CD Requirements'
scenario: 'Specify a production CI/CD pipeline for converting and validating ML models for simultaneous
  iOS and Android deployment. Requirements: support PyTorch source models, produce CoreML (iOS 16+) and
  TFLite INT8 (Android 10+) artifacts, validate numerical accuracy < 0.5% top-1 difference, complete in
  < 15 minutes, and publish artifacts to model registry. Define each stage with pass/fail criteria.'
question: "How would you specify a production CI/CD pipeline for converting and validating ML models for simultaneous iOS and Android deployment?"
details:
  realistic_solution: Pipeline total latency = sum of stage latencies in consistent units (seconds). Throughput
    bounded by slowest stage.
  common_mistake: Running iOS and Android conversion sequentially when they are independent; parallel
    execution cuts pipeline time from 30min to 15min.
  napkin_math: 'Pipeline stages with heterogeneous latency. Stage times in seconds (not minutes): preprocessing
    0.57s, inference 2.85s, postprocessing 0.28s. Total pipeline latency = 0.57 + 2.85 + 0.28 = 3.7s per
    item. Throughput = 1/max(stage) = 1/2.85 = 0.351 items/s = 21.1 items/min.'
