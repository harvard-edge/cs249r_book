title: FP16 vs INT8 Memory Bandwidth Contention on Exynos NPU
scenario: You are deploying a real-time object detection model on a Samsung Exynos 2400 NPU. The system features a dual-core NPU with 34.7 TOPS and relies on a shared 12 GB LPDDR5X memory pool. During live camera processing, the FP16 model exhibits 40ms latency with extremely low compute utilization, while the INT8 version achieves 15ms latency.
question: Why the FP16 model suffers from high latency and low utilization despite the NPU having ample compute headroom?
details:
  realistic_solution: The bottleneck is memory bandwidth contention, not compute capacity. Because the 12 GB LPDDR5X RAM is shared, the camera ISP (writing incoming frames) and GPU (rendering the UI) consume a massive portion of the system's memory bandwidth. The FP16 model doubles the size of weights and activations compared to INT8, demanding twice the memory bandwidth to feed the compute cores. This starves the dual-core NPU of data, causing it to stall while waiting for memory fetches, which perfectly explains the low compute utilization and the high 40ms latency.
  common_mistake: |
    **The Pitfall:** Assuming the NPU simply has fewer FP16 hardware multipliers than INT8 multipliers.
    **The Rationale:** Candidates focus exclusively on compute capacity (TOPS) and ignore the shared memory architecture constraints.
    **The Consequence:** Misidentifying the bottleneck and failing to recognize that the NPU is starved of data due to bandwidth contention.
  napkin_math: |
    * System LPDDR5X bandwidth = 51.2 GB/s. ISP/GPU consume 35 GB/s, leaving 16.2 GB/s.
    * FP16 model demand: 200M elements × 2 bytes × 30 FPS = 12 GB/s.
    * INT8 model demand: 200M elements × 1 byte × 30 FPS = 6 GB/s.
    * **The FP16 model demands 12 GB/s, consuming nearly all the remaining bandwidth and causing massive memory stalls, while INT8 leaves ample headroom.**
