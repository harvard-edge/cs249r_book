title: SRAM Tiling for 4K Video Upscaling
scenario: Designing a custom video upscaler on an Apple A17 Pro (35 TOPS, ~50 GB/s
  bandwidth). We want to tile 4K frames (3840x2160 RGB) through the Neural Engine's
  SRAM to avoid writing intermediate activations to main memory.
question: Formulate the caching strategy and calculate the minimum SRAM required to
  hold one horizontal tile strip allowing for a 3x3 receptive field overlap.
details:
  realistic_solution: A full row of 4K RGB requires 3840 x 3 bytes = 11.52 KB. A 3x3
    convolution requires buffering 3 continuous rows simultaneously. The minimum SRAM
    for the input buffer is 11.52 KB x 3 = 34.56 KB.
  common_mistake: Calculating the size of an entire frame rather than caching the
    minimal line buffers required for the convolution window.
  napkin_math: 3840 * 3 * 3 = 34560 bytes = ~34.5 KB
