title: The Cellular Data Bill Shock
scenario: You are the ML Systems Engineer for an automotive companion app. You're planning to deploy a new, more accurate 75 MB voice recognition model via an Over-the-Air (OTA) update. To manage risk, the product manager wants to roll this out to 10% of your 1 million active users first.
question: Assuming these updates happen over cellular networks, how much data must be delivered for a 10% rollout of a 75 MB model to 1M active users?
details:
  realistic_solution: The correct approach is to multiply the per-device data size by the number of devices in the rollout cohort. This reveals the true scale of the operation and its potential cost.
  common_mistake: |
    **The Pitfall:** Focusing only on the per-device model size and grossly underestimating the fleet-level impact.
    **The Rationale:** Engineers fail to scale small per-unit metrics into massive operational costs, often mixing up MB, GB, and TB units.
    **The Consequence:** Rollouts overwhelm the CDN, causing extreme latency or unexpected cloud data bills that cost thousands of dollars.
  napkin_math: |
    - **Rollout Cohort:** 1 Million users × 10% = 100,000 devices.
    - **Total Data Volume:** 100,000 devices × 75 MB = 7,500,000 MB = **7.5 TB**.
    - **CDN Throughput (24 hours):** 7.5 TB / 86,400s = **~87 MB/s sustained**.
    - **CDN Cost:** 7,500 GB × $0.02/GB = **$150**.
    - **Cellular Cost to Users:** 7,500 GB × $5/GB = **$37,500** fleet-wide user cost.
  options:
  - 750 GB
  - 7.5 TB
  - 75 TB
  - 7.5 GB
  correct_index: 1
