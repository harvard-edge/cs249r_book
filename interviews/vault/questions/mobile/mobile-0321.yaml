title: The Cellular Data Bill Shock
scenario: You are the ML Systems Engineer for an automotive companion app. You're planning to deploy a
  new, more accurate 75 MB voice recognition model via an Over-the-Air (OTA) update. To manage risk, the
  product manager wants to roll this out to 10% of your 1 million active users first. Assuming these updates
  happen over cellular networks, calculate the total data bandwidth required for this initial rollout
  phase.
question: "How much data must be delivered for a 10% rollout of a 75 MB model to 1M active users?"
details:
  realistic_solution: The correct approach is to multiply the per-device data size by the number of devices
    in the rollout cohort. This reveals the true scale of the operation and its potential cost.
  common_mistake: The most common mistake is to focus only on the per-device model size (75 MB) and grossly
    underestimate the fleet-level impact. Engineers forget that small per-unit costs amplify into massive
    operational costs and infrastructure load when multiplied across tens of thousands or millions of
    devices. A secondary mistake is mixing up units (e.g., MB vs. GB vs. TB), leading to 1000x errors.
  napkin_math: 'Cohort: 1M × 10% = 100,000 users. Per-device download: 75MB. Total data: 100,000 × 75MB
    = 7,500,000 MB = 7,500 GB = 7.5TB. If rolled out over 24 hours: 7.5TB / 86,400s = 87MB/s sustained CDN throughput.
    At $0.02/GB CDN cost: 7,500GB × $0.02 = $150. Cellular cost to users (if metered): 7,500GB × $5/GB
    = $37,500. Full fleet (1M): 75TB total.'
  options:
  - 750 GB
  - 7.5 TB
  - 75 TB
  - 7.5 GB
  correct_index: 1
