title: The "Small Model, Big Latency" Puzzle
scenario: You've deployed a tiny image preprocessing model (only 500KB, 10M FLOPs) on a mobile device,
  running entirely on the CPU. To your surprise, its latency is consistently 15ms, which is much higher
  than expected for such a small model. What's a common, often overlooked factor that could be causing
  this high latency on the CPU, and how would you investigate?
question: "What's a common, often overlooked factor that could be causing this high latency on the CPU, and how would you investigate?"
details:
  realistic_solution: "A common culprit for small, CPU-bound models with unexpectedly high latency is\
    \ **poor cache locality and inefficient memory access patterns**.\n  *   Even if the model's total\
    \ size is small, if its operations access memory in a scattered, non-sequential, or non-contiguous\
    \ way, the CPU spends a significant amount of time fetching data from slower main memory (DRAM) rather\
    \ than faster L1/L2/L3 caches. Each cache miss incurs a significant latency penalty (hundreds of CPU\
    \ cycles).\n  *   Tensor operations, especially convolutions or matrix multiplications, are highly\
    \ sensitive to how their input/output tensors are laid out in memory and accessed. If the data isn't\
    \ accessed in patterns friendly to the cache lines (e.g., stride-1 access), performance suffers dramatically.\n\
    \  *   **Investigation:**\n      1.  **CPU Profiling:** Use tools like `perf` on Linux or Android\
    \ Studio's CPU profiler. Look for high cache miss rates (L1, L2, L3) and high memory stall cycles.\
    \ These indicate the CPU is spending a lot of time waiting for data from memory.\n      2.  **Memory\
    \ Access Patterns:** Analyze the inner loops of the problematic operations. Are they iterating through\
    \ data contiguously or jumping around? Are there large strides between accesses?\n      3.  **Tensor\
    \ Layout and Padding:** Check if tensor layouts (e.g., NHWC vs. NCHW) or excessive padding are causing\
    \ inefficient cache utilization. Reordering data or using padding strategies that align with cache\
    \ lines can help.\n      4.  **Data Type:** Even for CPU, using FP16 or INT8 (if supported and optimized)\
    \ can reduce memory footprint and bandwidth, improving cache hit rates.\n      5.  **Operator Fusion:**\
    \ Check if the inference runtime is fusing consecutive operations. Without fusion, intermediate results\
    \ are written to DRAM and read back, doubling memory traffic for each unfused boundary."
  common_mistake: '"The CPU is just too slow for ML," or "There''s too much overhead from the ML framework."
    While possible, for such a small model, these often aren''t the primary causes.'
  napkin_math: A typical L1 cache hit takes ~1-4 cycles, L2 ~10-20 cycles, L3 ~50-100 cycles, and DRAM
    ~200-400 cycles. If a small model with 10M FLOPs (e.g., 10 million operations) has a 10% L1 miss rate
    and a 5% L2 miss rate, the accumulated memory access penalty can easily dominate the actual compute
    time. For instance, 1M L1 misses (at 10 cycles each) = 10M cycles, and 0.5M L2 misses (at 50 cycles
    each) = 25M cycles. At a 2GHz CPU, this alone adds (10M+25M) cycles / 2 * 10^9 cycles/sec = 17.5ms,
    turning a potentially few ms compute into 15ms+.
