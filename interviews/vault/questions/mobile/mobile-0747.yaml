title: The CPU Wake-Lock Tax
scenario: You deploy a simple wake-word detection model. Even though the model uses very little CPU, users
  report that the app is the top battery consumer on their device. Based on the power domain diagram,
  where is the energy going?
details:
  realistic_solution: You are suffering from **Application Processor Wake-Lock Tax**. To run the model
    on the main CPU, the OS must hold a wake-lock, powering up the high-power CPU rails and DDR RAM. This
    prevents the phone from entering Deep Sleep. The fix is to push always-on models down to the **Always-On
    Domain (AOD) / DSP**, which reads the microphone directly into tiny SRAM and only wakes the main AP
    if the wake-word is detected.
  common_mistake: '"The model needs to be quantized to INT8 so it uses less power." The model''s compute
    cost is negligible; the power is being burned by the hardware state required to execute it.'
  napkin_math: Basal AP power is ~80 mW. DSP power is ~1 mW. By failing to delegate to the AOD, you are
    using 80x more power than necessary just to keep the lights on for a simple task.
