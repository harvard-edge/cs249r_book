title: 'KV-Cache: Evaluate GQA vs MHA for Memory-Constrained Mobile LLM'
scenario: You are selecting between MHA (16 KV heads) and GQA (4 KV heads) for a new 1B LLM design targeting a mobile SoC with 4096-token context windows.
question: How would you evaluate the memory, bandwidth, quality, and architecture impact of each choice?
details:
  realistic_solution: GQA (Grouped-Query Attention) is mandatory for mobile deployments. MHA dictates materializing 16 full KV heads per layer, consuming 512 MB of LPDDR RAM just for the context window. Because decoding is memory-bandwidth bound, fetching 512 MB per token generation decimates tokens/second. GQA shrinks the KV footprint by 4x to 128 MB, unlocking real-time generation speeds with statistically insignificant perplexity degradation.
  common_mistake: |
    **The Pitfall:** Overestimating Grouped-Query Attention (GQA) quality loss.
    **The Rationale:** Candidates assume reducing KV heads from 16 to 4 will severely degrade output coherence.
    **The Consequence:** They unnecessarily sacrifice massive amounts of memory for standard MHA, ignoring that modern LLMs use GQA with minimal quality tradeoff to vastly improve mobile inference efficiency.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Dimensions: 32 layers, 16 KV heads, 128 head_dim, 4096 context length.
       - Precision: INT8 (1 byte/element).
    2. **Calculations:**
       - KV Cache parameters: 2 (K and V) * 32 * 16 * 128 * 4096 = 536,870,912 elements.
       - INT8 footprint: 536,870,912 elements * 1 byte = 536.8 MB (512 MiB).
    3. **Conclusion & Interpretation:**
       - **Result: 512 MiB footprint.** The decoding phase is severely **Memory-Bandwidth-Bound**; MHA makes it unshipable.
