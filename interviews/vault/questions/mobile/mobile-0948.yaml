title: 'KV-Cache: Evaluate GQA vs MHA for Memory-Constrained Mobile LLM'
scenario: You are selecting between MHA (16 KV heads) and GQA (4 KV heads) for a new 1B LLM design targeting Snapdragon 8 Gen 3 (45 TOPS INT8, 16GB) with 4096-token context windows.
question: How would you evaluate the memory, bandwidth, quality, and architecture impact of each choice?
details:
  realistic_solution: 'MHA KV cache at INT8 = 2 × num_layers × num_heads × head_dim × context × 1 byte. For 32 layers, 16 heads, head_dim=128, context=4096: 512MB (not 803MB which incorrectly uses 2 bytes for INT8).'
  common_mistake: |
    **The Pitfall:** Overestimating Grouped-Query Attention (GQA) quality loss.
    **The Rationale:** Candidates assume reducing KV heads from 16 to 4 will severely degrade output coherence.
    **The Consequence:** They unnecessarily sacrifice massive amounts of memory for standard MHA, ignoring that modern LLMs use GQA with minimal quality tradeoff to vastly improve mobile inference efficiency.
  napkin_math: |
    - Dimensions: 32 layers, 16 KV heads, 128 head_dim, 4096 context length.
    - KV Cache parameters: 2 (K and V) * 32 * 16 * 128 * 4096 = 536,870,912 elements.
    - INT8 footprint: 536,870,912 elements * 1 byte = 536.87 MB = **512 MiB**.
