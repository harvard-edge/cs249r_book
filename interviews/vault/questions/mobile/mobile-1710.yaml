title: On-Device Data Schema Validation for Google Tensor G3
scenario: Your team is deploying an on-device real-time object detection model that consumes pre-processed sensor data (accelerometer, gyroscope). The NPU provides 7.5 TOPS.
question: What lightweight data schema validation strategy ensures sensor integrity before inference without burning the CPU budget?
details:
  realistic_solution: Define strict, lightweight data contracts using highly efficient serialization formats like Protocol Buffers or FlatBuffers.
  common_mistake: |
    **The Pitfall:** Assuming sensor data is inherently clean or using heavy validation libraries.
    **The Rationale:** Candidates either skip validation entirely (trusting hardware blindly) or implement slow JSON/Regex parsing on the CPU.
    **The Consequence:** The model fails silently due to malformed inputs, or the CPU overhead of JSON validation destroys the real-time frame rate of the entire pipeline.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Ingestion rate: 150 sensor packets/second.
       - Parsing strategy: Slow JSON validation (~50 $\mu$s per packet).
       - CPU frame budget: 20 ms.
    2. **Calculations:**
       - Total validation overhead: 150 packets/s * 50 $\mu$s = 7500 $\mu$s/s = 7.5 ms/s.
       - Percentage of budget consumed: 7.5 ms / 20 ms = 37.5%.
    3. **Conclusion & Interpretation:**
       - **Result: CPU-Bound Overhead**. Slow schema validation logic consumes over a third of the processing budget, mandating ultra-fast formats like FlatBuffers.
