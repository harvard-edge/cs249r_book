title: KV-Cache Pressure on Google Tensor G3 for Long Contexts
scenario: You are deploying a 7B parameter Large Language Model (LLM) for on-device inference on a smartphone
  powered by the Google Tensor G3 (featuring a 7.5 TOPS on-device TPU and 12 GB LPDDR5X memory). Your
  LLM uses 32 attention heads, a head dimension of 128, and consists of 30 layers. The goal is to support
  a context window of 2048 tokens. Initial tests show significant latency spikes and occasional out-of-memory
  (OOM) errors, especially with longer prompts. You suspect KV-cache management is the bottleneck. How
  would you diagnose and mitigate this issue, focusing on memory efficiency?
question: "How should a Tensor G3 7B LLM manage KV cache for 2048-token context to avoid latency spikes and OOMs?"
details:
  realistic_solution: Implement paged attention to manage the KV-cache efficiently, allowing non-contiguous
    memory allocation and reducing fragmentation. Explore different cache eviction policies (e.g., LRU,
    LFU, or custom attention-score-aware policies) to optimize memory reuse. Consider KV-cache quantization
    (e.g., to INT8 or INT4) to significantly reduce memory footprint. Dynamically adjust the maximum context
    window based on real-time memory availability and user interaction patterns. Utilize the Tensor G3's
    TPU for accelerated KV-cache operations if possible, ensuring data transfers are optimized.
  common_mistake: Underestimating the KV-cache's memory footprint, especially for long contexts and large
    models, leading to OOM or excessive page faults. A common oversight is not explicitly accounting for
    the KV-cache when planning model deployment on resource-constrained devices, or simply relying on
    a fixed-size cache without dynamic management strategies like paged attention or effective eviction
    policies.
  napkin_math: "For an LLM with 32 attention heads, 128 head dimension, and 30 layers, using FP16 (2 bytes\
    \ per value):\n1. KV-cache size per token, per layer: (128 [dim] * 2 [K/V] * 2 [bytes/FP16]) = 512\
    \ bytes.\n2. KV-cache size per token across all layers: 512 bytes * 30 layers = 15360 bytes ≈ 0.0146\
    \ MB.\n3. Total KV-cache for 2048 tokens: 0.0146 MB/token * 2048 tokens ≈ 29.9 KB/token * 2048 = ~30MB.\n\
    Wait, let's recheck the napkin math, this is too small. Ah, my previous computation of head_dimension\
    \ is missing `num_attention_heads`. Let's re-calculate: \nKV-cache size per token, per layer: (num_attention_heads\
    \ * head_dimension * 2 [K/V] * 2 [bytes/FP16]) = (32 * 128 * 2 * 2) = 16384 bytes.\nKV-cache size\
    \ per token across all layers: 16384 bytes * 30 layers = 491520 bytes ≈ 0.46875 MB.\nTotal KV-cache\
    \ for 2048 tokens: 0.46875 MB/token * 2048 tokens ≈ 960 MB.\nThis 960 MB KV-cache needs to fit within\
    \ the 12 GB LPDDR5X memory, alongside model weights (e.g., 7B parameters * 2 bytes/FP16 ≈ 14 GB, so\
    \ the model itself would likely be quantized to INT8 or INT4), OS, and other application data. This\
    \ quickly highlights the memory pressure for long contexts."
