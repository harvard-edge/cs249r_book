title: Real-time Gesture Recognition on Google Tensor G3
scenario: You are architecting a real-time gesture recognition system for a mobile device powered by the Google Tensor G3. The system ingests sensor data (accelerometer, gyroscope, magnetometer) at 1 kHz each. This raw data passes through an event-driven pipeline for feature computation before feeding a pre-trained TFLite model. The entire pipeline must achieve under 50ms end-to-end latency. The ML model inference itself takes 10ms on the TPU.
question: How would you design the data ingestion and feature computation pipeline to meet the strict sub-50ms end-to-end latency constraint?
details:
  realistic_solution: Implement a multi-threaded, event-driven architecture utilizing highly optimized, lock-free ring buffers or message queues for inter-stage communication (sensor acquisition -> feature extraction -> inference). Dedicate high-priority threads for sensor data acquisition and a separate thread pool for feature computation. Leverage the Tensor G3's TPU specifically for model inference and, if computationally intensive and suitable for acceleration, certain feature extraction steps. Employ techniques like zero-copy data transfer between pipeline stages where possible. Implement a robust backpressure mechanism (e.g., explicit flow control, adaptive sampling, or dynamic buffer sizing) to prevent data loss. For memory efficiency, consider circular buffers or memory pooling for sensor data frames, ensuring minimal allocations and deallocations in the critical path.
  common_mistake: |
    **The Pitfall:** Failing to account for backpressure and inter-process communication overhead.
    **The Rationale:** Candidates often design naive pipelines that drop data during burst events or underutilize the TPU by offloading too much work to the CPU.
    **The Consequence:** System crashes due to inefficient memory management and failure to meet the real-time latency deadline.
  napkin_math: |
    1. **Raw Data Ingress:** 1000 samples/sec * 9 floats * 4 bytes/float = 36 KB/s.
    2. **Window Size:** A 100ms window (100 samples/sensor) requires 3.6 KB of raw data.
    3. **Latency Budget:** 50ms total - 10ms inference = 40ms remaining for sensor acquisition, feature extraction, and IPC.
    4. **Memory Footprint:** Peak memory for active buffers (e.g., 500ms look-back = 18 KB) is negligible against 12GB RAM.
    5. **Conclusion:** **The challenge is not memory capacity, but maintaining highly optimized, lock-free data flow within the 40ms CPU budget.**
