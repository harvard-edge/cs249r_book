title: Mobile New 0029
scenario: An edge server in a closed metal box processes IP cameras. It works well at night (15C ambient) but restarts randomly during the day (35C ambient). Logs show kernel panics with no software errors.
question: Why does an edge server in a closed metal box reboot during the day but work at night?
details:
  realistic_solution: The symptom of random hardware resets during high ambient temperatures is a protective thermal shutdown (PROCHOT). When ambient temperature rises, the baseline cooling efficiency drops. If the NPU and CPU run heavily, the die temperature skyrockets past Tjmax (e.g., 105C). To prevent literal silicon melting, the hardware triggers a hard electrical power cut, causing kernel panics/resets.
  common_mistake: |
    **The Pitfall:** Ignoring seasonal ambient temperature fluctuations.
    **The Rationale:** Engineers assume standard climate-controlled data center environments when deploying edge AI.
    **The Consequence:** Unpredictable hardware resets during peak ambient temperatures due to thermal limits.
  napkin_math: |
    * Thermal model: T_die = T_ambient + (Power * R_thermal).
    * Given: R_thermal = 3 C/W, Power = 25W.
    * Night T_die = 15C + (25 * 3) = 90C (Safe).
    * Day T_die = 35C + (25 * 3) = 110C.
    * **Since 110C > Tjmax (105C), this triggers an instantaneous hardware shutdown.**
