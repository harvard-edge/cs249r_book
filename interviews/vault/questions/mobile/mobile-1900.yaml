title: Mobile Hotspot Wearable Fanout
scenario: A flagship smartphone acts as a Wi-Fi hotspot, providing a maximum aggregated downstream of 50 Mbps. Five connected wearables are downloading a 10 MB model update simultaneously.
question: Recall the per-device bandwidth if the hotspot successfully distributes its bandwidth perfectly evenly among all clients.
visual:
  kind: svg
  path: mobile-1900.svg
  alt: A star topology diagram showing one central phone distributing edges to five wearable leaf nodes.
  caption: Hotspot Bandwidth Distribution
details:
  realistic_solution: If the 50 Mbps aggregated bandwidth is split perfectly among 5 devices, each device receives exactly 10 Mbps, which equates to 1.25 MB/s per device.
  common_mistake: |
    **The Pitfall:** Calculating total MB/s without dividing by the number of devices.
    **The Rationale:** Candidates often see the unit conversion (Mbps to MB/s) and stop calculating once they reach 6.25 MB/s.
    **The Consequence:** They overestimate the bandwidth available to a single wearable by a factor of 5.
  napkin_math: |
    1. **Assumptions & Constraints:**
      - Total Bandwidth: 50 Mbps.
      - Devices: 5.
    2. **Calculations:**
      - Per-Device Bandwidth: 50 Mbps / 5 = 10 Mbps.
      - Conversion: 10 Mbps / 8 bits/byte = 1.25 MB/s.
    3. **Conclusion & Interpretation:**
      - **Result: Network-Bound.** Each device is limited to 10 Mbps.
