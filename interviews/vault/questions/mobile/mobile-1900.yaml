title: Mobile Hotspot Wearable Fanout
scenario: A flagship smartphone acts as a Wi-Fi hotspot, providing a maximum aggregated
  downstream of 50 Mbps. Five connected wearables are downloading a 10 MB model update
  simultaneously.
question: Recall the per-device bandwidth if the hotspot successfully distributes
  its bandwidth perfectly evenly among all clients.
visual:
  kind: svg
  path: mobile-1900.svg
  alt: A star topology diagram showing one central phone distributing edges to five
    wearable leaf nodes.
  caption: Hotspot Bandwidth Distribution
details:
  realistic_solution: If the 50 Mbps aggregated bandwidth is split perfectly among
    5 devices, each device receives exactly 50 Mbps / 5 = 10 Mbps. Note that 10 Mbps
    equates to 1.25 MB/s per device.
  common_mistake: Dividing 50 Mbps by 8 to get MB/s and forgetting to divide by the
    5 devices, yielding 6.25 MB/s instead of 1.25 MB/s.
  napkin_math: 50 Mbps / 5 devices = 10 Mbps per device
