title: The Background Battery Drain Dilemma
scenario: You're designing a 'glass break' detection feature for a home security app. It runs in the background
  on a modern smartphone. The inference to analyze a 1-second audio clip consumes 2W of power from the
  SoC. To save battery, you design it to run on a 5% duty cycle (it's active for 1 second, then sleeps
  for 19 seconds). Can you calculate the total energy this feature consumes from the battery over one
  hour of continuous operation?
question: "Can you calculate the total energy this feature consumes from the battery over one hour of continuous operation?"
details:
  realistic_solution: The correct way to calculate the energy consumption is to first find the average
    power by scaling the peak power by the duty cycle, and then multiply that by the duration. The feature
    consumes 0.1 Wh of energy in one hour.
  common_mistake: The most common mistake is to calculate energy consumption using the peak inference
    power (2W) without accounting for the duty cycle. This overestimates the battery drain by a factor
    of 20 (1 / 0.05) and fails to appreciate that for 'always-on' features, the average power, not the
    peak power, dictates the true impact on battery life.
  napkin_math: 1. **Calculate Average Power:** The system is only drawing peak power for 5% of the time.
    `Average Power = Peak Power × Duty Cycle` -> `2.0 W × 0.05 = 0.1 W`.
  options:
  - 2.0 Wh
  - 0.1 W
  - 0.1 Wh
  - 10.0 Wh
  correct_index: 2
