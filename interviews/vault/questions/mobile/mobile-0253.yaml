title: The Background Battery Drain Dilemma
scenario: You are designing a glass break detection feature for a home security app. It runs in the background on a modern smartphone. The inference to analyze a 1-second audio clip consumes 2W of power. To save battery, you design it to run on a 5% duty cycle.
question: Can you calculate the total energy this feature consumes from the battery over one hour of continuous operation?
details:
  realistic_solution: 'The correct way to calculate the energy consumption is to first find the average power by scaling the peak power by the duty cycle, and then multiply that by the duration. The feature consumes 0.1 Wh of energy in one hour.'
  common_mistake: |
    **The Pitfall:** Calculating energy consumption using the peak inference power without accounting for the duty cycle.
    **The Rationale:** Engineers fail to appreciate that for "always-on" features, the average power dictates the true impact on battery life, not peak power.
    **The Consequence:** Overestimating battery drain by a factor of 20x, leading to unnecessary project cancellations or extreme over-optimization.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Peak Power: 2.0 W.
       - Duty Cycle: 5% (0.05).
       - Time: 1 hour.
    2. **Calculations:**
       - Average Power: 2.0 W * 0.05 = 0.1 W.
       - Total Energy: 0.1 W * 1 hour = 0.1 Wh.
    3. **Conclusion & Interpretation:**
       - **Result: Energy-Bound.** Proper duty-cycling restricts the one-hour energy burn strictly to 0.1 Wh.
  options:
  - 2.0 Wh
  - 0.1 W
  - 0.1 Wh
  - 10.0 Wh
  correct_index: 2
