title: On-Device Drift Detection for Exynos 2400
scenario: You are tasked with designing an on-device data drift detection system for a real-time camera
  enhancement pipeline running on the Samsung Exynos 2400 NPU. The primary model processes video frames
  using the dual-core NPU, which provides 34.7 TOPS and shares 12 GB of LPDDR5X memory with the CPU, GPU,
  and ISP. Due to strict privacy requirements, raw frames cannot leave the device, but you must architect
  a system to detect environmental drift without starving the ISP or primary model of memory bandwidth.
details:
  realistic_solution: Design a lightweight architecture that extracts low-dimensional summary statistics
    (e.g., final pooling layer embeddings) using reservoir sampling at a low rate (e.g., 1 frame per second).
    The CPU can asynchronously compute approximate drift metrics like Population Stability Index (PSI)
    on these quantized embeddings using the shared 12 GB memory pool, allowing the NPU to dedicate its
    34.7 TOPS strictly to the latency-critical camera enhancement.
  common_mistake: Candidates often propose computing complex statistical metrics like exact KL divergence
    on high-dimensional raw feature maps for every frame. They fail to account for the shared memory architecture,
    where continuous high-bandwidth memory access for background drift calculation will degrade the real-time
    ISP and NPU performance.
  napkin_math: Assume an embedding size of 256 FP16 values (512 bytes). At 60 FPS, extracting every frame
    writes 30 KB/s. Computing PSI over a 10,000-frame rolling window requires storing ~5 MB in the 12
    GB LPDDR5X pool. By applying reservoir sampling to 1 FPS, storage drops to 85 KB and compute falls
    to <0.001 TOPS, ensuring the 34.7 TOPS NPU and ISP experience zero bandwidth contention.
