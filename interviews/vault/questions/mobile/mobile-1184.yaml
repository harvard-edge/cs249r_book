title: A17 Pro Neural Engine Latency Breakdown
scenario: Your team is deploying a local voice-based smart assistant using a 1.5B parameter LLM (quantized to INT4) on an iPhone 15 Pro. The target platform is the Apple A17 Pro Neural Engine, sharing 8 GB of unified memory. You need to decompose the end-to-end latency for a user query consisting of a 50-token prompt (derived from an audio input) and a 100-token generated response.
question: "How should the A17 Pro voice assistant latency be decomposed for a 50-token prompt and 100-token response?"
details:
  realistic_solution: 'A strong L5 candidate will break the latency into distinct phases: Audio Preprocessing (CPU), Time-to-First-Token (TTFT, which is compute-bound on the NPU), and Time-Per-Output-Token (TPOT, which is memory-bound). They will evaluate the tradeoff between NPU utilization for the prompt processing phase versus the memory bandwidth limits of the shared unified memory during the token generation phase.'
  common_mistake: |
    **The Pitfall:** Assuming autoregressive generation is bounded by the NPU's 35 TOPS compute speed.
    **The Rationale:** Candidates look only at the raw compute figure and fail to realize that Time-Per-Output-Token (TPOT) for batch-size 1 generation is strictly memory-bandwidth bound.
    **The Consequence:** Overpromising generation speed and failing to implement memory optimizations like INT4 quantization for the weights.
  napkin_math: |
    * Model weights = 1.5B parameters * 0.5 bytes (INT4) = 0.75 GB.
    * **Time-to-First-Token (TTFT - Compute Bound):**
      * Operations = 50 tokens * 1.5B params * 2 MACs = 150 Giga-operations.
      * Assuming 30% effective utilization of 35 TOPS (10.5 TOPS): 150 GOPS / 10.5 TOPS = ~14 ms.
    * **Time-Per-Output-Token (TPOT - Memory Bound):**
      * Must read 0.75 GB of weights per token.
      * Assuming ~50 GB/s bandwidth from unified memory: 0.75 GB / 50 GB/s = 15 ms/token.
      * Generation time for 100 tokens = 100 * 15 ms = 1500 ms.
    * **Total Latency = Audio Preprocessing (~200 ms) + TTFT (14 ms) + Generation (1500 ms) = ~1.71 seconds.**
