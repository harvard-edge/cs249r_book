title: On-Device Intersectional Fairness
scenario: You are designing an on-device fairness evaluation pipeline for a new facial analytics model to ensure intersectional fairness before applying a federated learning update. The evaluation must run against a locally stored golden dataset of 10,000 images representing diverse skin tones and lighting conditions.
question: How would you design the evaluation architecture for the A17 Pro to compute parity metrics across 16 subgroups without causing thermal throttling or battery drain?
details:
  realistic_solution: Implement a chunked, background-priority evaluation pipeline. Load the dataset in micro-batches into the shared 8GB unified memory to minimize storage I/O. Utilize the 16-core Neural Engine to process each batch, calculating moving averages for true positive rates and selection rates per subgroup to avoid storing all intermediate predictions. Introduce deliberate sleep intervals between chunks to stay well within the ~5W power limit and prevent thermal throttling.
  common_mistake: |
    **The Pitfall:** Processing the entire dataset in a single continuous loop without batching or thermal consideration.
    **The Rationale:** Developers treat mobile evaluation like a cloud batch job, prioritizing pure speed over thermal envelopes.
    **The Consequence:** Triggers severe thermal throttling, degrades user experience, and causes repeated, expensive read operations from flash storage instead of streaming via zero-copy buffers.
  napkin_math: |
    1. **Total Compute Required:** Assuming 10 GOPS per inference * 10,000 images = 100 TOPS.
    2. **Theoretical Compute Time:** 100 TOPS / 35 TOPS (A17 Pro NPU) ≈ 2.85 seconds.
    3. **Throttled Compute Time:** At a conservative 33% NPU utilization (to stay under thermal limits), active compute takes ~8.5 seconds.
    4. **Power Draw:** ~5W for 8.5s = 42.5 Joules. This is <0.1% of a typical 45,000 Joule smartphone battery.
    5. **Memory Footprint:** Uncompressed 10,000 images (224x224x3 bytes ≈ 150KB each) = ~1.5GB.
    **This 1.5GB easily fits within the 8GB shared unified memory, avoiding flash I/O bottlenecks.**
