title: Always-On Video NPU Power Optimization
scenario: You are designing an always-on ambient computing system that processes continuous video streams
  on a Snapdragon 8 Gen 3 device. The workload requires 15 TOPS of continuous INT8 compute on the Qualcomm
  Hexagon NPU. The entire SoC operates under a strict 1.5W continuous thermal and power cap to avoid throttling
  and preserve battery life. The shared 16GB LPDDR5X memory is actively contended by the CPU and GPU.
  Synthesize a dynamic power management architecture that leverages DVFS P-states to sustain this throughput
  without breaching the power budget.
question: "How would you optimize power for always-on video analytics by pacing NPU work instead of racing to idle?"
details:
  realistic_solution: For continuous workloads, a 'pace-to-target' approach is superior due to the non-linear
    relationship in the CMOS power equation (P ∝ V²f). The architecture should dynamically lock the Hexagon
    NPU to the lowest DVFS P-state that meets the 15 TOPS requirement, allowing for a voltage drop that
    provides a quadratic reduction in power. Additionally, the design must utilize the NPU's tightly coupled
    memory (TCM) and a zero-copy pipeline from the ISP to minimize power-hungry external memory transactions.
  common_mistake: Candidates often assume 'race-to-sleep' (running at max frequency to finish early and
    idle) is the most power-efficient strategy. They also frequently ignore the substantial power tax
    of LPDDR5X memory accesses, treating the NPU's power consumption in isolation from the shared SoC
    fabric.
  napkin_math: 'Hexagon NPU Peak: 45 TOPS INT8 at ~3.0W (max P-state, 1.0V). Target: 15 TOPS (1/3 of peak
    frequency). Lowering frequency allows a voltage drop, e.g., to 0.8V. New NPU Power = 3.0W * (1/3 frequency)
    * (0.8/1.0)² voltage = 3.0 * 0.33 * 0.64 ≈ 640 mW. Assuming 1.5 GB/s memory bandwidth for the workload
    and LPDDR5X cost of ~100 pJ/byte, Memory Power = 1.5e9 * 100e-12 = 150 mW. Total continuous power
    = 640 mW (NPU) + 150 mW (Mem) + 200 mW (SoC fabric/ISP overhead) = 990 mW, which safely stays under
    the 1.5W system cap.'
