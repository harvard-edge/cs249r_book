title: CI/CD for On-Device Models on Apple A17 Pro Neural Engine
scenario: Your team is deploying a real-time object detection model to the Apple A17 Pro Neural Engine
  (35 TOPS, ~5W, 16-core). You currently have two CI/CD pipeline proposals for model updates. Proposal
  A compiles the CoreML model and runs a full suite of accuracy and latency tests on actual device farms.
  Proposal B compiles the model but relies heavily on a hardware simulator in the cloud to estimate latency
  and power, only running a lightweight smoke test on real devices to save CI time and costs. Evaluate
  these proposals and determine which is better for production deployment.
details:
  realistic_solution: Proposal A is significantly better for an L5 engineer to choose, despite the cost
    and slower turnaround time. The Apple A17 Pro shares 8 GB of unified memory between the CPU, GPU,
    and the 16-core Neural Engine. Simulators cannot accurately model the memory bandwidth contention
    when the OS or other apps are active. Furthermore, on-device testing is required to validate that
    the model actually executes on the Neural Engine rather than falling back to the CPU/GPU due to unsupported
    ops in a specific iOS version.
  common_mistake: Candidates often choose Proposal B to optimize CI/CD speed and cost without realizing
    that simulators rarely capture the nuances of the Neural Engine's shared unified memory architecture
    or thermal throttling characteristics. They might also overlook that CoreML compilation can apply
    hardware-specific optimizations that behave differently across iOS versions.
  napkin_math: Assuming a target latency of 15ms per frame (60 FPS) for object detection. The A17 Pro
    has 35 TOPS. A typical MobileNetV3-SSD might take ~1.5 GOPS. Theoretically, 35000 GOPS / 1.5 GOPS
    = 23333 inferences per second, or 0.04ms per inference. However, memory bandwidth (shared 8GB unified
    memory) is the actual bottleneck. If the model weights are 15MB, loading them at 50GB/s takes 0.3ms.
    A simulator might predict 0.34ms latency, while actual on-device testing might show 5ms due to cache
    misses, OS overhead, and ANE spin-up time, proving the necessity of device farms.
