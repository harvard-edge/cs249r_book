title: Quantization and Operator Lowering for ViT on Exynos 2400 NPU
scenario: 'A Vision Transformer (ViT) model, post-training, needs to be deployed on the Samsung Exynos
  2400 NPU. The original model uses standard floating-point (FP32) operations and has 50 billion operations
  (50 GOPS) for a single inference. During ahead-of-time (AOT) compilation for the Exynos 2400 NPU (34.7
  TOPS, 12 GB LPDDR5X), your team is considering two optimization strategies:


  1.  **Full Quantization:** Convert all FP32 operations to INT8. On this specific NPU, INT8 operations
  are 4x more efficient (meaning 1 FP32 equivalent operation translates to 1/4 effective INT8 operations)
  and fully utilize the NPU''s advertised TOPS.

  2.  **Mixed Optimization (Lowering + Quantization):** Identify 5 key FP32 operations that can be lowered
  into highly optimized INT8 NPU-specific kernels, effectively halving the latency for these specific
  operations compared to generic INT8 execution. These 5 operations represent 20% of the total 50 GOPS.
  The remaining 80% of operations will be quantized to INT8 as per strategy 1.


  Calculate the theoretical inference latency (in milliseconds) for a single image on the Samsung Exynos
  2400 NPU under each optimization strategy. Assume the NPU is fully utilized and there are no memory
  bandwidth bottlenecks for this calculation.'
details:
  realistic_solution: "1. For full INT8 quantization, the effective INT8 operations would be 50 GOPS /\
    \ 4 = 12.5 GOPS. Given the Exynos 2400 NPU's 34.7 TOPS, the latency is (12.5 * 10^9) / (34.7 * 10^12)\
    \ seconds = 0.360 ms.\n2. For mixed optimization:\n   - The 20% of operations (10 GOPS FP32 equivalent)\
    \ become 10 GOPS / 4 = 2.5 GOPS effective INT8 operations. Their base latency without lowering benefit\
    \ would be (2.5 * 10^9) / (34.7 * 10^12) = 0.072 ms. With halved latency, this becomes 0.036 ms.\n\
    \   - The remaining 80% of operations (40 GOPS FP32 equivalent) become 40 GOPS / 4 = 10 GOPS effective\
    \ INT8 operations. Their latency is (10 * 10^9) / (34.7 * 10^12) = 0.288 ms.\n   - Total latency for\
    \ Strategy 2: 0.036 ms + 0.288 ms = 0.324 ms.\nThus, Strategy 2 offers slightly better latency."
  common_mistake: Candidates often assume linear speedups from quantization without considering the 'effective'
    operations count on dedicated hardware, or neglect the cumulative effect of specific kernel optimizations
    (like operator lowering and fusing). Another common pitfall is to forget unit conversions (GOPS to
    TOPS, seconds to milliseconds) or to oversimplify how 'halving latency' translates when combined with
    quantization factors. Failing to account for the NPU's specific INT8 throughput versus the model's
    FP32 equivalent operation count is also frequent.
  napkin_math: 'Given:

    - `Ops_FP32_total = 50 GOPS`

    - `TOPS_INT8 = 34.7 TOPS`

    - `Q_factor = 4` (quantization efficiency: 1/4 effective INT8 ops per FP32 equiv.)

    - `Lower_ops_share = 0.20`

    - `Latency_reduction_factor = 2` (for lowered ops)


    **Strategy 1 (Full Quantization):**

    `Effective_Ops_INT8_1 = Ops_FP32_total / Q_factor = 50 GOPS / 4 = 12.5 GOPS`

    `Latency_1 = (Effective_Ops_INT8_1 / TOPS_INT8) * 1000`

    `Latency_1 = (12.5 * 10^9 / (34.7 * 10^12)) * 1000 = (12.5 / 34.7) ms ≈ 0.360 ms`


    **Strategy 2 (Mixed Optimization):**

    `Lowered_Ops_FP32 = Ops_FP32_total * Lower_ops_share = 50 GOPS * 0.20 = 10 GOPS`

    `Generic_Ops_FP32 = Ops_FP32_total * (1 - Lower_ops_share) = 50 GOPS * 0.80 = 40 GOPS`


    `Effective_Lowered_Ops_INT8 = Lowered_Ops_FP32 / Q_factor = 10 GOPS / 4 = 2.5 GOPS`

    `Time_Lowered_Base = (Effective_Lowered_Ops_INT8 / TOPS_INT8) * 1000 = (2.5 / 34.7) ms ≈ 0.072 ms`

    `Time_Lowered_Optimized = Time_Lowered_Base / Latency_reduction_factor = 0.072 ms / 2 = 0.036 ms`


    `Effective_Generic_Ops_INT8 = Generic_Ops_FP32 / Q_factor = 40 GOPS / 4 = 10 GOPS`

    `Time_Generic = (Effective_Generic_Ops_INT8 / TOPS_INT8) * 1000 = (10 / 34.7) ms ≈ 0.288 ms`


    `Latency_2 = Time_Lowered_Optimized + Time_Generic = 0.036 ms + 0.288 ms ≈ 0.324 ms`'
