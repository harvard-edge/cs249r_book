title: Drone Mesh Pipelining
scenario: A swarm of 5 drones runs a distributed 3D semantic segmentation model over a decentralized mesh Wi-Fi network with 100ms compute workloads.
question: "Create a micro-batch pipeline schedule that masks the 30ms mesh multi-hop synchronization delay, ensuring GPU utilization remains >80%."
details:
  realistic_solution: 'To maintain >80% utilization, the compute-to-total-time ratio must exceed 0.8. Injecting multiple microbatches allows continuous overlapping, as the 100ms compute phase effectively hides the maximum 30ms hop penalty per node.'
  common_mistake: |
    **The Pitfall:** Assuming static, tightly-coupled micro-batching works perfectly across wireless mesh hops.
    **The Rationale:** Candidates port cloud datacenter pipelining schedules without accounting for multi-hop mesh routing jitter.
    **The Consequence:** The schedule fails to hide network stalls, tanking GPU utilization far below the 80% target.
  napkin_math: |
    1. **Assumptions & Constraints:** 100ms compute workload, 30ms multi-hop sync delay, >80% target utilization.
    2. **Calculations:** Util = 100ms / (100ms + bubble) > 0.8. Bubble must be < 25ms.
    3. **Conclusion & Interpretation:** The schedule must explicitly **overlap the 30ms multi-hop sync**. **Result: Network-Bound**.
