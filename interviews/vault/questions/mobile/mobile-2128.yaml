title: Drone Mesh Pipelining
scenario: A swarm of 5 Jetson Orin Nano drones runs a distributed 3D semantic segmentation
  model over a decentralized mesh Wi-Fi network with 100ms compute workloads.
question: Create a micro-batch pipeline schedule that masks the 30ms mesh multi-hop
  synchronization delay, ensuring GPU utilization remains >80%.
details:
  realistic_solution: To maintain >80% utilization, the compute-to-total-time ratio
    must exceed 0.8. A multi-hop mesh introduces jitter, so the 30ms sync delay acts
    as a variable barrier. Injecting m >= 5 microbatches allows continuous overlapping,
    as the 100ms compute phase effectively hides the maximum 30ms hop penalty per
    node.
  common_mistake: Ignoring that multi-hop mesh routing introduces non-deterministic
    pipeline stalls that cannot be perfectly hidden by static, tightly-coupled micro-batching.
  napkin_math: Util = 100ms / (100ms + bubble) > 0.8. Bubble must be < 25ms. Requires
    overlapping the 30ms multi-hop sync.
