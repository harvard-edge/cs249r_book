title: On-Device LLM Evaluation for Tensor G3
scenario: Your team is deploying an on-device LLM to summarize incoming messages on a Google Tensor G3 with 12 GB RAM, where 6 GB is reserved for the OS. You must evaluate two options: Model A (3.2B parameter, INT4 weights only) and Model B (1.8B parameter, INT8 weights and activations).
question: Which Tensor G3 summarization model option should be chosen after considering weights, KV cache, and TPU constraints?
details:
  realistic_solution: Model A (3.2B INT4) is the optimal choice. Despite having more parameters, its INT4 quantization results in a smaller weight footprint than the 1.8B INT8 model. Because LLM generation is heavily memory-bandwidth bound, the smaller weight size of Model A reduces data transfer overhead. Furthermore, the 3.2B model fits comfortably within the 6 GB available RAM even after accounting for a reasonably sized KV cache, while offering superior reasoning capabilities for summarization tasks.
  common_mistake: |
    **The Pitfall:** Forgetting KV cache overhead and relying purely on parameter counts.
    **The Rationale:** Candidates frequently calculate only the memory required for the model weights and falsely assume that a lower parameter count always translates to a lower memory footprint.
    **The Consequence:** They fail to account for the KV cache size, which grows linearly with context length, leading to out-of-memory errors in production.
  napkin_math: |
    1. Available RAM Budget: 12 GB Total - 6 GB OS = 6 GB.
    2. Model A (3.2B INT4) Weights: 3.2B * 0.5 bytes = 1.6 GB.
    3. Model B (1.8B INT8) Weights: 1.8B * 1 byte = 1.8 GB.
    4. KV Cache for Model A (32 layers, 4096 dim, 1024 seq, FP16): 2 (K&V) * 32 * 4096 * 1024 * 2 bytes = ~536 MB (0.536 GB).
    5. Total footprint for Model A: 1.6 GB + 0.536 GB = **~2.14 GB, which safely fits within the 6 GB budget.**
