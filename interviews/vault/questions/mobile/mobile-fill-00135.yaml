title: Mobile AI Inference Cost on Exynos 2400
scenario: You are deploying a quantized MobileNetV3-Small model for real-time image classification on
  a smartphone featuring the Samsung Exynos 2400 NPU (34.7 TOPS peak performance for INT8 operations,
  12 GB LPDDR5X memory with ~75 GB/s bandwidth). The quantized model requires approximately 0.45 TOPS
  (INT8 operations) per inference and has a memory footprint of 150 MB. The system needs to achieve a
  sustained inference rate of 40 frames per second. Calculate the percentage utilization of the NPU's
  peak compute capacity and determine if memory bandwidth could be a bottleneck, assuming typical input/output
  data sizes of 1MB per frame.
question: "How do you calculate Exynos 2400 NPU utilization and memory bandwidth for a mobile AI workload?"
details:
  realistic_solution: To calculate NPU utilization, divide the total required TOPS per second by the NPU's
    peak TOPS. For memory bandwidth, sum the model's memory footprint, input, and output data sizes, then
    multiply by the target frame rate. Compare this demand against the LPDDR5X bandwidth to identify potential
    bottlenecks. Acknowledge that actual performance will also be influenced by software stack, thermal
    limits, and other system overheads.
  common_mistake: Mistaking FLOPs for TOPS, ignoring the overhead of data movement to and from memory
    (memory bandwidth bottleneck), or not considering the difference between theoretical peak performance
    and sustained real-world performance.
  napkin_math: Required NPU ops/sec = 0.45 TOPS/inference * 40 inferences/sec = 18 TOPS/sec. NPU Utilization
    = (18 TOPS / 34.7 TOPS) * 100% ≈ 51.9%. Memory bandwidth demand = (150 MB model + 1 MB input + 1 MB
    output) * 40 inferences/sec = 152 MB * 40/sec = 6080 MB/s ≈ 6.08 GB/s. Since 6.08 GB/s << 75 GB/s,
    memory bandwidth is not the primary bottleneck in this ideal scenario.
