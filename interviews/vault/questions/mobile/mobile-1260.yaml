title: On-Device Active Learning OOM Crashes
scenario: You deployed an on-device active learning system to curate challenging edge-case images for a vision task. A 50MB CoreML data selection model runs on the Apple A17 Pro Neural Engine (16-core, 35 TOPS) to score incoming camera frames. Despite the model being small and the A17 Pro having 8GB of unified memory, users are reporting severe app crashes due to Out-Of-Memory (OOM) errors during the data selection phase.
question: Why can a 50MB CoreML selection model on A17 Pro still trigger OOM crashes during camera-frame curation?
details:
  realistic_solution: The root cause is the buffering of uncompressed high-resolution camera frames before they are processed by the Neural Engine. Because the A17 Pro uses a unified 8GB memory shared between the CPU, GPU, and NE, holding just a few seconds of raw 4K video frames in memory for the selection algorithm will exhaust the available RAM. The solution is to downsample frames immediately at the ISP level or process them strictly sequentially without maintaining a large historical buffer.
  common_mistake: |
    **The Pitfall:** Blaming the ML model size while ignoring the data ingestion pipeline.
    **The Rationale:** Candidates often assume that if a model is small (50MB), it won't cause OOM errors, forgetting the immense memory footprint of uncompressed high-res video frames.
    **The Consequence:** Failing to diagnose the root cause and wasting time compressing the model instead of fixing the data buffer.
  napkin_math: |
    1. **Frame Size:** Uncompressed 4K frame (3840 x 2160 RGB) = 25 MB.
    2. **Buffer Size:** 3 seconds of 60 FPS video = 180 frames. 180 frames * 25 MB/frame = 4.5 GB.
    3. **OS Footprint:** iOS + base app likely consumes 3-4 GB of the 8GB unified memory.
    4. **Conclusion:** **Adding a 4.5 GB data buffer exceeds the 8GB physical memory limit, causing an immediate OOM crash.**
