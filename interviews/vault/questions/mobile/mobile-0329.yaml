title: The Energy Cost of Privacy
scenario: Your team is building a driver assistance feature for a popular automotive app. The feature requires training on user driving data (GPS traces, accelerometer readings). To protect user privacy and minimize battery drain, you're considering using Federated Learning.
question: What is the fundamental physical reason why sending small, trained model updates from the device is often more energy-efficient than uploading the raw user data to a central server?
details:
  realistic_solution: The fundamental reason is that data transmission over a wireless radio is vastly more energy-intensive per byte than on-chip computation. The energy required to power the radio amplifier and send data to a cell tower dwarfs the energy used by the highly-optimized neural engine to perform training computations on that same data. Therefore, it's more efficient to process the data locally and send only the resulting small model update (e.g., a few megabytes of gradients) instead of the raw source data (potentially gigabytes).
  common_mistake: |
    **The Pitfall:** Underestimating the power consumption of cellular/Wi-Fi radios compared to compute cores.
    **The Rationale:** Engineers assume that a "quick" upload is cheap and on-device training is too heavy, ignoring the massive efficiency of modern mobile SoCs.
    **The Consequence:** Designing cloud-dependent architectures that drain the battery significantly faster than local processing.
  napkin_math: |
    1. Centralized Upload Energy: LTE upload costs ~20 mJ/MB. 100MB * 20 mJ/MB = 2,000 mJ = 2 Joules.
    2. Local Training Compute: Training a 50M param model on 100MB data (~10k samples) takes ~10 GFLOPs.
    3. Mobile SoC Efficiency: Consumes ~4W at 1 TFLOPS (4 pJ/FLOP).
    4. Local Training Energy: 10 GFLOPs * 4 pJ/FLOP = 0.04 Joules.
    5. Comparison: Local training (0.04 J) is **50x more energy-efficient** than LTE upload (2 J), before accounting for the small gradient upload.
  options:
  - Cellular data plans are expensive, so it primarily saves the user money.
  - Central servers have more powerful GPUs, leading to faster training overall.
  - Wireless data transmission is significantly more energy-intensive per byte than on-chip computation.
  - On-device computation is too slow, so uploading is the only realistic option for training.
