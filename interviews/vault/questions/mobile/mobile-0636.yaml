title: The Heterogeneous Orchestrator
scenario: 'You are designing an augmented reality (AR) application for a flagship Android phone. It requires
  simultaneously running multiple ML models: a real-time object detection model on camera frames (NPU),
  a small pose estimation model (NPU/DSP), and a complex generative AI model for background synthesis
  (GPU). The user experience demands extremely low latency and consistent 60 FPS, all while minimizing
  battery drain. Outline a system-level strategy for orchestrating these heterogeneous compute units,
  addressing potential bottlenecks and power concerns.'
details:
  realistic_solution: "A robust strategy involves:\n  1.  **Optimal Model-to-Accelerator Mapping:**\n\
    \      *   **Object Detection & Pose Estimation:** Clearly map to NPU (or DSP) for lowest latency\
    \ and highest power efficiency on these specific tasks.\n      *   **Generative AI:** Map to GPU.\
    \ While NPUs are getting capable, complex generative models (e.g., diffusion models) often involve\
    \ large convolutions, attention, and memory access patterns that GPUs are highly optimized for.\n\
    \  2.  **Zero-Copy Data Flow:** Implement zero-copy mechanisms for camera frames and intermediate\
    \ tensors. Use platform-specific shared memory buffers (e.g., `AHardwareBuffer` on Android, `CVPixelBuffer`\
    \ on iOS) to avoid CPU-intensive memory copies between camera, GPU, and NPU. This is critical for\
    \ 60 FPS.\n  3.  **Asynchronous & Pipelined Execution:**\n      *   Overlap compute and data transfer:\
    \ While the NPU processes frame `N`, the GPU can process frame `N-1`, and the camera can acquire frame\
    \ `N+1`.\n      *   Utilize accelerator-specific queues/streams (e.g., Vulkan queues for GPU, NPU\
    \ driver queues) to submit tasks without blocking the CPU.\n  4.  **Dynamic Resource Management &\
    \ Scheduling Hints:**\n      *   **OS Scheduler Integration:** Use Android's `PerformanceHintManager`\
    \ or similar APIs to signal critical threads/tasks to the OS, allowing it to prioritize them and allocate\
    \ CPU/accelerator resources optimally.\n      *   **Frequency/Voltage Scaling:** Interface with power\
    \ management APIs to hint at desired performance levels or power budgets. The system can dynamically\
    \ adjust DVFS (Dynamic Voltage and Frequency Scaling) for each accelerator based on real-time load\
    \ and thermal conditions.\n      *   **Priority Management:** Assign appropriate priorities to different\
    \ ML tasks. E.g., object detection (critical for AR overlay) might have higher priority than background\
    \ synthesis.\n  5.  **Batching & Coalescing:** Where possible, coalesce smaller tasks or use adaptive\
    \ batching to improve accelerator utilization, but be mindful of latency impact for real-time tasks.\n\
    \  6.  **Power Monitoring & Profiling:** Continuously monitor power consumption of individual SoC\
    \ components (CPU, GPU, NPU, DRAM) using vendor tools (e.g., Snapdragon Profiler, ARM Streamline)\
    \ to identify and optimize power hotspots.\n  7.  **Fallback Mechanisms:** In extreme thermal conditions\
    \ or resource contention, gracefully degrade (e.g., lower generative model resolution, drop pose estimation\
    \ frequency, reduce detection confidence threshold) to maintain core AR experience."
  common_mistake: '"Just run everything on the NPU/GPU as available." This ignores system-level constraints,
    scheduling, and power efficiency for a complex multi-model, multi-accelerator pipeline.'
  napkin_math: '16.67ms budget at 60 FPS. Object detection: ~4ms on NPU. Pose estimation: ~2ms on DSP.
    Generative BG: ~12ms on GPU. Sequential: 4+2+12=18ms > 16.67ms → misses frames. Pipelined: frame N
    on GPU while NPU processes frame N+1. Effective latency per frame: max(4,2,12)=12ms < 16.67ms ✓. Zero-copy
    via AHardwareBuffer saves ~1-2ms memcpy per frame. Power: NPU ~1W + DSP ~0.5W + GPU ~3W = 4.5W.'
