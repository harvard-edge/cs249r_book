title: The Accelerometer Inference Power
scenario: You're building an always-on activity recognition feature on a Pixel 8 using the accelerometer at 50 Hz. The feature must run 24/7 without noticeably impacting battery life.
question: Can you keep total power under 5 mW?
details:
  realistic_solution: 'Duty-cycle on the low-power DSP, not the main CPU. Batch 100 accelerometer samples (2 sec), infer on DSP: 0.0025 mW amortized. BLE activity label: 0.005 mW. DSP overhead: 0.5 mW. Total: 1.41 mW (under 5 mW budget). Drain: 0.19%/day. On main CPU instead: wake latency prevents deep sleep, sustaining ~50 mW = 10x over budget. The inference cost is negligible — the power budget depends on whether the main SoC stays in deep sleep.'
  common_mistake: |
    **The Pitfall:** Running inference on every accelerometer sample at 50 Hz on the main CPU.
    **The Rationale:** Candidates focus on the low cost of a single inference without considering the sleep states of the SoC.
    **The Consequence:** The main CPU is constantly woken up, preventing deep sleep and draining the battery 10x over the power budget.
  napkin_math: |
    * Sensor power: 0.9 mW (always on).
    * DSP batching inference: 0.0025 mW.
    * BLE label transmission: 0.005 mW.
    * DSP overhead: 0.5 mW. Total: ~1.41 mW.
    * Main CPU unbatched alternative: 50 mW continuous draw due to wake locks.
    * **Running on the DSP at 1.41 mW draws ~0.19%/day, whereas main CPU execution would completely exhaust the battery.**
