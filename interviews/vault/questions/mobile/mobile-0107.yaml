title: The Accelerometer Inference Power
scenario: 'You''re building an always-on activity recognition feature (walking, running, cycling, stationary)
  on a Pixel 8 using the accelerometer at 50 Hz. The feature must run 24/7 without noticeably impacting
  battery life. Break down the power budget: sensor sampling, inference, and BLE transmission of activity
  labels to a paired smartwatch. Can you keep total power under 5 mW?'
question: "Can you keep total power under 5 mW?"
details:
  realistic_solution: 'Duty-cycle on the low-power DSP, not the main CPU. Batch 100 accelerometer samples
    (2 sec), infer on DSP: 0.0025 mW amortized. BLE activity label: 0.005 mW. DSP overhead: 0.5 mW. Total:
    1.41 mW (under 5 mW budget). Drain: 0.19%/day. On main CPU instead: wake latency prevents deep sleep,
    sustaining ~50 mW = 10x over budget. The inference cost is negligible — the power budget depends on
    whether the main SoC stays in deep sleep.'
  common_mistake: '"Run inference on every accelerometer sample at 50 Hz." This means 50 inferences per
    second on the main CPU, which prevents the SoC from entering deep sleep — the power cost of keeping
    the CPU awake dwarfs the inference cost.'
  napkin_math: 'Sensor: 0.9 mW (always on). DSP inference: 0.0025 mW (duty-cycled). BLE: 0.005 mW (duty-cycled).
    DSP overhead: 0.5 mW. Total: **1.41 mW**. Daily energy: 1.41 mW × 24h = 33.8 mWh. Battery: 17,700
    mWh. Drain: 33.8 / 17,700 = **0.19%/day**. If you ran inference on the main CPU instead: CPU at 500
    mW × 0.025% duty = 0.125 mW (still low), but the CPU wake latency (5ms) and inability to batch means
    the CPU stays in a shallow sleep state at ~50 mW → **50 mW total** = 10× over budget.'
