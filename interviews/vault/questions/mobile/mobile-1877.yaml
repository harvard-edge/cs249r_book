title: Snapdragon LPDDR5 Weight Bound
scenario: Executing a 1B parameter INT8 model on a mobile NPU requires keeping weights in LPDDR5 memory and activations in SRAM. The maximum achievable LPDDR5 bandwidth is 50 GB/s.
question: Evaluate the absolute minimum latency to evaluate a single dense linear layer containing 10 million weights.
details:
  realistic_solution: In a dense linear layer without batching, each INT8 weight is fetched exactly once per inference. 10 million parameters equate to exactly 10 MB of data movement. Saturated at 50 GB/s, this DMA transfer requires 200 microseconds. This memory fetch establishes the absolute latency floor, regardless of how infinitely fast the NPU matrix multiply units are.
  common_mistake: |
    **The Pitfall:** Treating quantized parameters as standard floats.
    **The Rationale:** Candidates see "10 million weights" and erroneously multiply by 4 bytes (FP32).
    **The Consequence:** They calculate 800 microseconds instead of 200 microseconds, misunderstanding the memory bandwidth requirement by a factor of 4.
  napkin_math: |
    **Assumptions & Constraints:**
    - Weights: 10 million.
    - Precision: INT8 (1 byte/weight).
    - LPDDR5 Bandwidth: 50 GB/s (50,000 MB/s).

    **Calculations:**
    - Weight payload: 10 million * 1 byte = 10 MB.
    - Transfer Time: 10 MB / 50,000 MB/s = 0.0002 seconds (200 µs).

    **Conclusion & Interpretation:**
    - **Result: 200 µs (Memory-Bandwidth-Bound)**. The dense layer is completely memory-bandwidth-bound, compute time is shadowed.
