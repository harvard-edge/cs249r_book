title: Snapdragon LPDDR5 Weight Bound
scenario: Executing a 1B parameter INT8 model on the Snapdragon 8 Gen 3 NPU requires
  keeping weights in LPDDR5 memory and activations in SRAM. The maximum achievable
  LPDDR5 bandwidth is 50 GB/s.
question: Evaluate the absolute minimum latency to evaluate a single dense linear
  layer containing 10 million weights.
visual:
  kind: svg
  path: mobile-1877.svg
  alt: Horizontal bars comparing compute time vs memory transfer time, clearly showing
    memory transfer as the bottleneck.
  caption: Memory Bandwidth vs Compute (Roofline proxy)
details:
  realistic_solution: Since it is a dense linear layer, each weight must be read exactly
    once. 10 million INT8 weights require 10 million bytes (10 MB) of memory transfer.
    With an LPDDR5 bandwidth of 50 GB/s (50,000 MB/s), the time to read the weights
    is 10 MB / 50,000 MB/s = 0.0002 seconds, or 200 microseconds. This forms the absolute
    lower-bound latency, assuming compute is infinitely fast (memory-bound).
  common_mistake: Treating INT8 parameters as FP32, erroneously multiplying by 4 bytes
    per parameter and calculating 800 microseconds.
  napkin_math: 10M INT8 weights = 10 MB. Time = 10 MB / 50,000 MB/s = 0.2 ms = 200
    µs.
