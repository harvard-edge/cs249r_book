title: The On-Device RAG Memory Budget
scenario: 'Your team is building an on-device RAG (Retrieval-Augmented Generation) system on a Galaxy
  S24 Ultra with 12 GB RAM. The components: a 3B LLM in INT4 (1.5 GB weights), an embedding model for
  retrieval (100 MB), a vector database of 500K document chunks with 768-dim embeddings, and the retrieved
  context fed to the LLM. Calculate the total memory footprint and determine if it fits. What''s the first
  thing that has to go if it doesn''t?'
details:
  realistic_solution: 'Calculate each component: The 3B INT4 model takes 1.5 GB. The embedding model takes
    100 MB. A naive Full HNSW index for 500K 768-dim embeddings takes ~2.19 GB. By replacing it with a
    Product Quantization (PQ) compressed index, the size shrinks to ~31 MB, saving 2.16 GB (98.6% reduction).
    Recall@10 drops slightly but remains acceptable. Factoring in the KV-cache and overhead, the total
    optimized memory footprint is around 5.59 GB. On a 12 GB device, this represents a 46.6% utilization,
    leaving a safe margin for the OS and multitasking. If it doesn''t fit, the naive HNSW vector database
    is the first thing that has to go, replaced by a quantized index.'
  common_mistake: '"1.5 GB + 100 MB + vector DB — should be fine on 12 GB." This forgets the KV-cache,
    which grows with context length, and the vector DB index overhead, which is much larger than the raw
    embeddings.'
  napkin_math: '500K chunks, 1024-dim FP32 embeddings. Full HNSW: 500k * 1024 * 4B = 2.04GB raw + index
    overhead = 2.2GB. On a 12GB Galaxy S24, 3B INT4 LLM is 1.5GB. Total = 3.7GB. Product Quantization
    (PQ) compresses 1024 dims to 64 bytes. 500k * 64B = 32MB! Drops index size by 98.5%, freeing 2GB RAM
    with minimal recall hit.'
