title: Snapdragon Cache Hit Effective BW
scenario: A Snapdragon 8 Gen 3 running a 7B INT8 LLM has L3 cache bandwidth of 100
  GB/s and LPDDR5X main memory bandwidth of 60 GB/s. Execution profile shows 80% of
  memory traffic hits the L3, 20% misses to LPDDR5X. A junior engineer eyeballs the
  side-by-side stacked-bar visual (100 GB/s L3 stacked next to 60 GB/s LPDDR5X with
  the 80%/20% split overlay) and reports the effective bandwidth as 0.8*100 + 0.2*60
  = 92 GB/s.
question: Analyze why the bar-chart arithmetic-mean reading of 92 GB/s overstates
  the true effective bandwidth, and compute the correct time-weighted (harmonic-mean)
  effective bandwidth. Explain in one sentence what the visual's stacked-bar layout
  obscures about how time, not requests, is what averages.
visual:
  kind: svg
  path: mobile-1896.svg
  alt: Side-by-side bar chart contrasting 100 GB/s L3 cache bandwidth with 60 GB/s
    main memory, with stacked bars showing the 80% / 20% hit/miss split that produces
    the 88.2 GB/s effective bandwidth.
  caption: Cache vs Main Memory Bandwidth weighted by 80/20 hit ratio
details:
  realistic_solution: 'Bandwidth must be averaged in the time domain, not the request
    domain. Per GB transferred: L3 takes 1/100 = 10 ms, LPDDR5X takes 1/60 = 16.67
    ms. Mean time per GB = 0.8 * 10 + 0.2 * 16.67 = 11.33 ms. Effective bandwidth
    = 1 / 11.33 = 88.2 GB/s. The bar chart''s arithmetic mean of 92 GB/s comes from
    weighting the *rates* by the 80/20 split, which double-counts the fast-path time
    and silently smuggles in an Amdahl-law violation. Bars showing rates can never
    be averaged arithmetically when the workload is divided in time; only when divided
    in parallel work-units.'
  common_mistake: Taking the arithmetic mean of bandwidths (0.8*100 + 0.2*60 = 92
    GB/s) by reading off the stacked bars, instead of taking the harmonic mean over
    time (88.2 GB/s).
  napkin_math: 'Harmonic: 1 / (0.8/100 + 0.2/60) = 1/0.01133 = 88.2 GB/s. Arithmetic
    (wrong): 0.8*100 + 0.2*60 = 92 GB/s. Gap = 3.8 GB/s overstated.'
