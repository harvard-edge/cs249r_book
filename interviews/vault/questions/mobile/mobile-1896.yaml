title: Snapdragon Cache Hit Effective BW
scenario: 'A Snapdragon 8 Gen 3 running a 7B INT8 LLM has L3 cache bandwidth of 100 GB/s and LPDDR5X main memory bandwidth of 60 GB/s. Execution profile shows 80% of memory traffic hits the L3, 20% misses to LPDDR5X. A junior engineer eyeballs the side-by-side stacked-bar visual (100 GB/s L3 stacked next to 60 GB/s LPDDR5X with the 80%/20% split overlay) and reports the effective bandwidth as 0.8*100 + 0.2*60 = 92 GB/s.'
question: 'Analyze why the bar-chart arithmetic-mean reading of 92 GB/s overstates the true effective bandwidth, and compute the correct time-weighted (harmonic-mean) effective bandwidth.'
visual:
  kind: svg
  path: mobile-1896.svg
  alt: Side-by-side bar chart contrasting 100 GB/s L3 cache bandwidth with 60 GB/s main memory, with stacked bars showing the 80% / 20% hit/miss split that produces the 88.2 GB/s effective bandwidth.
  caption: Cache vs Main Memory Bandwidth weighted by 80/20 hit ratio
details:
  realistic_solution: 'Bandwidth must be averaged in the time domain, not the request domain. Per GB transferred: L3 takes 1/100 = 10 ms, LPDDR5X takes 1/60 = 16.67 ms. Mean time per GB = 0.8 * 10 + 0.2 * 16.67 = 11.33 ms. Effective bandwidth = 1 / 11.33 = 88.2 GB/s. The bar chart''s arithmetic mean of 92 GB/s comes from weighting the *rates* by the 80/20 split, which double-counts the fast-path time and silently smuggles in an Amdahl-law violation. Bars showing rates can never be averaged arithmetically when the workload is divided in time; only when divided in parallel work-units.'
  common_mistake: |
    **The Pitfall:** Taking the arithmetic mean of bandwidths by reading off the stacked bars.
    **The Rationale:** It feels intuitive to weight rates by the percentage of traffic, but rates are inversely proportional to time.
    **The Consequence:** Double-counts the fast-path time and overstates the effective memory bandwidth, silently violating Amdahl's law.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - L3 Cache Bandwidth: 100 GB/s (80% traffic).
       - LPDDR5X Bandwidth: 60 GB/s (20% traffic).
    2. **Calculations:**
       - L3 Time per GB: 1 GB / 100 GB/s = 0.01 seconds (10 ms).
       - LPDDR5X Time per GB: 1 GB / 60 GB/s = 0.01667 seconds (16.67 ms).
       - Mean Time per GB: (0.8 × 10 ms) + (0.2 × 16.67 ms) = 8 ms + 3.334 ms = 11.334 ms.
       - Harmonic Bandwidth: 1 GB / 0.011334 seconds = 88.2 GB/s.
    3. **Conclusion & Interpretation:**
       **Result: Bandwidth-Bound (Amdahl's Law).** The time-weighted effective bandwidth is **88.2 GB/s**, proving that taking the arithmetic mean of rates (92 GB/s) mathematically overstates performance by ignoring time allocation.
