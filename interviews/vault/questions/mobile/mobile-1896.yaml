title: Snapdragon Cache Hit Effective BW
scenario: A Snapdragon 8 Gen 3 running an LLM has an L3 cache bandwidth of 100 GB/s
  and a main memory bandwidth of 60 GB/s. Execution analysis reveals 80% of memory
  requests hit the L3 cache, while 20% miss to main memory.
question: Analyze the effective average memory bandwidth achieved by the processor
  using these hit/miss ratios.
visual:
  kind: svg
  path: mobile-1896.svg
  alt: Side-by-side bar chart contrasting 100 GB/s L3 cache bandwidth with 60 GB/s
    main memory, with stacked bars showing the 80% / 20% hit/miss split that produces
    the 88.2 GB/s effective bandwidth.
  caption: Cache vs Main Memory Bandwidth weighted by 80/20 hit ratio
details:
  realistic_solution: Bandwidth must be averaged via time, not directly. Time to transfer
    1 GB from L3 is 1/100 = 0.01s. Time from main memory is 1/60 = 0.01667s. Average
    time per GB is (0.8 * 0.01) + (0.2 * 0.01667) = 0.008 + 0.00333 = 0.01133 seconds.
    Effective bandwidth is 1 / 0.01133 = 88.2 GB/s.
  common_mistake: Taking a direct arithmetic mean of bandwidths (0.8*100 + 0.2*60
    = 92 GB/s), which violates Amdahl's Law.
  napkin_math: 1 / (0.8/100 + 0.2/60) = 88.2 GB/s
