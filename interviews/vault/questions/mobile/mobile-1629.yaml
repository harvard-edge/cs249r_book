validation_issues:
- The napkin math states that for a 7B parameter FP16 model, to fit within 8GB, 'the
  effective model size must be reduced by at least 43%', which is approximately correct
  (8/14 = 0.57, so 1 - 0.57 = 0.43 or 43%). However, the example of targeting INT8
  quantization leading to 7GB and fitting is inconsistent with the previous statement
  of needing 43% reduction to fit into 8GB. If the INT8 model is 7GB, it fits into
  8GB, so no 43% reduction *from the INT8 size* is needed. It should clarify that
  43% reduction is needed from the FP16 size to reach 8GB, and INT8 inherently provides
  a 50% reduction from FP16.
