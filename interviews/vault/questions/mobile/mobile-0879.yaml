title: Explaining Compound AI Pipeline Stages to a Mobile App Developer on A17 Pro
scenario: 'An iOS developer building their first on-device AI feature on A17 Pro (8GB,
  35 TOPS) asks: ''My app uses Core ML for image recognition and a language model
  for descriptions. Why do I need a retrieval step? Can''t I just give the image features
  directly to the LLM?'''
question: "Why does an A17 Pro compound AI pipeline need retrieval instead of feeding Core ML image features directly to a 1B LLM?"
details:
  realistic_solution: 'The retrieval step solves the knowledge-memory tradeoff: a
    1B LLM on A17 Pro (500MB INT4) ''knows'' general facts from training but cannot
    store app-specific knowledge (product catalog, user history, local data) in its
    weights — that would require a much larger model. Retrieval gives the LLM access
    to a dynamic, updatable knowledge base (10K docs = 150MB as text) without re-training.
    Without retrieval: need a 7B+ model to have equivalent factual coverage, which
    at INT4 = 3.5GB — more than the whole app memory budget. With retrieval: 1B model
    + 150MB knowledge base = 650MB total, and the knowledge can be updated without
    model retraining.'
  common_mistake: |
    **The Pitfall:** Explaining RAG as merely "giving the LLM more information."
    **The Rationale:** Candidates fail to explain the fundamental memory vs. knowledge tradeoff, not realizing that on-device LLMs cannot just "have larger context windows" or scale up parameter counts arbitrarily.
    **The Consequence:** App developers misallocate their memory budgets, either using models that are too large (crashing the app) or too small (hallucinating).
  napkin_math: |
    - Baseline (No RAG): 7B model INT4 = 7B × 0.5 bytes = 3.5 GB (Consumes 43% of total RAM).
    - RAG System: 1B INT4 (500 MB) + 10K docs (150 MB text) + FAISS index (10 MB) = 660 MB.
    - Memory Savings: 3.5 GB vs 0.66 GB = **5.3× more memory efficient**.
    - **Conclusion:** Retrieval substitutes for parametric knowledge, keeping the system well within the memory budget.
