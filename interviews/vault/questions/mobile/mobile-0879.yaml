title: Explaining Compound AI Pipeline Stages to a Mobile App Developer on A17 Pro
scenario: An iOS developer building their first on-device AI feature asks why they need a retrieval step instead of feeding Core ML image features directly to a 1B LLM.
question: "Why does a compound AI pipeline need retrieval instead of feeding Core ML image features directly to a 1B LLM?"
details:
  realistic_solution: |
    The retrieval step solves the knowledge-memory tradeoff. A 1B LLM 'knows' general facts but cannot store app-specific knowledge without scaling up parameters. Retrieval gives the LLM access to a dynamic knowledge base without exceeding the memory budget.
  common_mistake: |
    **The Pitfall:** Explaining RAG as merely "giving the LLM more information."
    **The Rationale:** Candidates fail to explain the fundamental memory vs. knowledge tradeoff, not realizing that on-device LLMs cannot arbitrarily scale up parameter counts.
    **The Consequence:** Developers misallocate memory budgets, either using models that are too large (crashing the app) or too small (hallucinating).
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Total RAM budget: 8GB (strict app limit < 2GB).
       - Fact-equivalent standalone model: 7B params (INT4).
    2. **Calculations:**
       - Baseline (No RAG): 7B INT4 = 3.5 GB (exceeds budget).
       - RAG System: 1B INT4 (500 MB) + 10K docs (150 MB text) + FAISS (10 MB) = 660 MB.
    3. **Conclusion & Interpretation:**
       - **Result: Memory vs. Knowledge Tradeoff.** Retrieval substitutes for parametric knowledge, reducing memory footprint by 5.3x and staying within the app budget.
