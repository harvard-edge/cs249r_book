title: 3-bit AWQ Footprint on Exynos 2400
scenario: You are tasked with deploying a 7B parameter LLM on a Samsung Exynos 2400 NPU. The SoC features
  a dual-core NPU with 34.7 TOPS and a shared 12 GB LPDDR5X memory pool used by the CPU, GPU, and ISP.
  To ensure the OS and other apps are not starved of memory, you apply 3-bit AWQ quantization. Calculate
  the memory footprint of the weights and the compute required (in TOPS) to generate 20 tokens per second,
  and evaluate if the NPU compute capacity is a limiting factor.
question: "How would you calculate the memory footprint of the weights and the compute required (in TOPS) to generate 20 tokens per second, and evaluate if the NPU compute capacity is a limiting factor?"
details:
  realistic_solution: First, calculate the exact bit-level size of the weights and convert it to gigabytes
    to ensure it fits comfortably within the 12 GB shared RAM. Then, calculate the operations required
    per token (roughly 2 ops per parameter) and scale by the target token rate to find the required TOPS.
    Comparing this requirement to the Exynos 2400's 34.7 TOPS capacity demonstrates that NPU compute is
    vastly over-provisioned for this specific bottleneck.
  common_mistake: Candidates often miscalculate footprint by confusing bytes and bits for sub-byte quantization,
    or they falsely assume the 34.7 TOPS NPU will be fully utilized during autoregressive decoding, failing
    to recognize that generative tasks are memory-bandwidth bound rather than compute bound.
  napkin_math: '1. Weight footprint: 7,000,000,000 params * 3 bits/param = 21,000,000,000 bits.

    2. Convert to GB: 21,000,000,000 / 8 bits/byte = 2,625,000,000 bytes = ~2.625 GB. This consumes a
    fraction of the shared 12 GB LPDDR5X, leaving ~9.375 GB for KV cache, CPU, GPU, and ISP.

    3. Compute per token: 7 billion params * 2 operations/param = 14 Giga-operations (GOPS).

    4. Compute for 20 tokens/sec: 14 GOPS * 20 = 280 GOPS = 0.28 TOPS.

    5. NPU utilization: 0.28 TOPS / 34.7 TOPS = ~0.8%. The NPU compute is highly underutilized.'
