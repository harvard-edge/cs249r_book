title: 'The Mobile Jank Deadline: Real-Time Deadlines'
scenario: You are building a real-time AI assistant feature for a mobile messaging app. To feel instantaneous, the model generates its response token-by-token directly into the UI. To avoid visual stutter, or 'jank', your inference for each token must complete within the screen's refresh cycle.
question: What is the approximate per-token generation latency budget you must hit on a typical mobile device to avoid jank?
details:
  realistic_solution: The per-token latency budget is approximately 16ms. This number is derived directly from the standard 60Hz refresh rate of most mobile device screens. To achieve a 'jank-free' experience, each new token must be generated, and the UI updated, within a single screen refresh cycle. Exceeding this budget means missing a frame, which users perceive as stutter or lag.
  common_mistake: |
    **The Pitfall:** Recalling the ~100ms budget for a cloud service or the ~33ms for 30 FPS video.
    **The Rationale:** Engineers fail to connect on-device inference directly to the physics of the ~60Hz screen refresh rate.
    **The Consequence:** The generated tokens block the main thread and cause noticeable UI stutter.
  napkin_math: |
    - Screen refresh rate: 60 Hz (60 frames per second).
    - Time budget per frame: 1000 ms / 60.
    - **1000 / 60 ≈ 16.67 ms.**
  options:
  - ~100ms
  - ~33ms
  - ~16ms
  - ~1ms
  correct_index: 2
