title: 'The Mobile Jank Deadline: Real-Time Deadlines'
scenario: You are building a real-time AI assistant feature for a mobile messaging app. To feel instantaneous,
  the model generates its response token-by-token directly into the UI. To avoid visual stutter, or 'jank',
  your inference for each token must complete within the screen's refresh cycle. What is the approximate
  per-token generation latency budget you must hit on a typical mobile device?
question: "What is the approximate per-token generation latency budget you must hit on a typical mobile device?"
details:
  realistic_solution: The per-token latency budget is approximately 16ms. This number is derived directly
    from the standard 60Hz refresh rate of most mobile device screens. To achieve a 'jank-free' experience,
    each new token must be generated, and the UI updated, within a single screen refresh cycle. Exceeding
    this budget means missing a frame, which users perceive as stutter or lag.
  common_mistake: Engineers often confuse the strict mobile UI rendering deadline with other, more relaxed
    latency targets. They might recall the ~100ms budget for a cloud service or the ~33ms for an edge
    device, failing to connect on-device inference directly to the physics of the ~60Hz screen refresh
    rate which dictates the user's perception of smoothness.
  napkin_math: A typical mobile screen refreshes 60 times per second (60 Hz). The time budget for each
    frame is the inverse of the refresh rate.
  options:
  - ~100ms
  - ~33ms
  - ~16ms
  - ~1ms
  correct_index: 2
