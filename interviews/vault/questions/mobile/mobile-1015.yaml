title: 'Network Bandwidth Bottlenecks: Optimize Mobile Camera Pipeline Memory Bandwidth'
scenario: 'A mobile camera app on A17 Pro (68 GB/s) runs YOLOv8-n (3.2M INT8, 4.2 GOPs) + portrait segmentation (MobileNetV3-S, 2.5M INT8, 2.4 GOPs) in the live viewfinder at 30fps. Measured total memory bandwidth is 15GB/s. Target: reduce to < 8GB/s while maintaining 30fps.'
question: What memory bandwidth components explain the 15GB/s camera pipeline load, and which optimizations reduce it below 8GB/s?
details:
  realistic_solution: 'BW breakdown: Camera ISP (1080p 30fps YUV420): 1080×1920×1.5×30=93MB/s=0.09GB/s. YOLO-n inference (3.2MB INT8, 30fps): 3.2MB×30=96MB/s=0.096GB/s. Segmentation: 2.5MB×30=75MB/s=0.075GB/s. Total model BW: 0.27GB/s. Measured 15GB/s >> 0.27GB/s. Root cause: activation tensors. YOLO at 640×640×3: intermediate features at 640×640×64=25MB per layer. Reducing input resolution from 640→320: 1/4 activation memory. 4× reduction in activation BW: 15GB/s×0.75=11.25GB/s saving. New: 3.75GB/s + models: 4.02GB/s < 8GB/s.'
  common_mistake: |
    **The Pitfall:** Trying to quantize the models further.
    **The Rationale:** Candidates ignore that the models are already INT8 and fail to check if camera buffer copies and large activation tensors are the actual bandwidth hogs.
    **The Consequence:** Negligible bandwidth savings while significantly harming model accuracy.
  napkin_math: |
    - **ISP Bandwidth (1080p 30fps YUV420):** 1920 × 1080 × 1.5 bytes × 30 = **0.09 GB/s**.
    - **Model Weights (INT8 30fps):** (3.2MB + 2.5MB) × 30 = **0.17 GB/s**.
    - **Activation Writes (YOLO @ 640x640):** ~100MB per forward pass × 30fps = **~3.0 GB/s**.
    - **Activation Writes (Seg @ 640x640):** **~2.0 GB/s**.
    - **Total Accounted:** 0.09 + 0.17 + 3.0 + 2.0 = **~5.26 GB/s**.
    - **Missing Bandwidth (15 - 5.26):** **~9.7 GB/s** (Caused by duplicate memory copies and non-contiguous memory).
    - **Optimization 1 (Resolution):** Reduce input from 640 to 320. Activations drop by 4x. (5.0 GB/s → 1.25 GB/s).
    - **Optimization 2 (Zero-copy):** Eliminate 9.7 GB/s overhead via unified memory pointers.
    - **Optimized Total:** 0.09 (ISP) + 0.17 (Weights) + 1.25 (Activations) = **~1.51 GB/s** (Well under 8GB/s target).
