title: CoreML Execution Fallback Latency
scenario: You are deploying a custom vision model via CoreML on an iPhone 15 Pro (A17 Pro chip). The model
  requires 2 GOPS per frame. The Apple Neural Engine (ANE) provides 35 TOPS of peak performance. Due to
  an unsupported custom activation function in the middle of the network, CoreML is forced to fall back
  to the CPU for that specific layer. The CPU takes 1.5ms to process this layer, but the ANE-to-CPU synchronization
  and memory copy takes 0.5ms each way. Assuming the ANE achieves 40% of its peak utilization on the supported
  layers (which account for 99.9% of the GOPS), calculate the total end-to-end latency for a single frame
  and the maximum sustainable FPS.
question: "What is the total CoreML frame latency and sustainable FPS after adding ANE compute, CPU fallback, and two copy penalties?"
details:
  realistic_solution: Calculate effective ANE throughput, add the compute time, the CPU execution time,
    and the two context switch penalties. ANE compute time is negligible but context switching dominates
    the latency.
  common_mistake: Candidates often calculate the ANE compute time but forget to add both the two-way context
    switch penalty (ANE -> CPU -> ANE) and the CPU execution time, or they incorrectly assume 100% ANE
    utilization.
  napkin_math: Peak ANE = 35 TOPS. Assume 40% efficiency = 14 TOPS (14,000 GOPS). ANE compute for 99%
    of model (1.98 GOPS) = 1.98 / 14000 = ~0.14 ms. CPU fallback = ~1.5 ms. ANE-to-CPU context switches
    (2 ways) = 2 * 0.5 ms = 1.0 ms. Total per-frame latency = 0.14 + 1.5 + 1.0 = 2.64 ms. Max throughput
    = 1000 ms / 2.64 ms = 378 FPS.
