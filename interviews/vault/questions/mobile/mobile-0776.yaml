title: CoreML Execution Fallback Latency
scenario: You are deploying a custom vision model via CoreML on an iPhone 15 Pro (A17 Pro chip). The model requires 2 GOPS per frame. The Apple Neural Engine (ANE) provides 35 TOPS of peak performance. Due to an unsupported custom activation function, CoreML is forced to fall back to the CPU for that layer (taking 1.5ms). The ANE-to-CPU synchronization takes 0.5ms each way. Assume the ANE achieves 40% of its peak utilization on the supported layers.
question: What is the total CoreML frame latency and sustainable FPS after adding ANE compute, CPU fallback, and two copy penalties?
details:
  realistic_solution: Calculate effective ANE throughput, add the compute time, the CPU execution time, and the two context switch penalties. ANE compute time is negligible but context switching dominates the latency.
  common_mistake: |
    **The Pitfall:** Forgetting the two-way context switch penalty or assuming 100% ANE utilization.
    **The Rationale:** Candidates focus solely on raw compute TOPS, ignoring the hidden costs of moving data across heterogeneous compute blocks.
    **The Consequence:** The calculated FPS vastly overestimates actual deployment performance.
  napkin_math: |
    *   **Effective ANE Throughput:** `35 TOPS * 40% = 14 TOPS (14,000 GOPS)`
    *   **ANE Compute Time:** `1.98 GOPS / 14000 GOPS/s = ~0.14 ms`
    *   **CPU Fallback Time:** `~1.5 ms`
    *   **Context Switch Penalties (2-way):** `2 * 0.5 ms = 1.0 ms`
    *   **Total Per-Frame Latency:** `0.14 + 1.5 + 1.0 = 2.64 ms`
    *   **Result:** **Max throughput is `1000 ms / 2.64 ms = 378 FPS`.**
