title: Thermally Constrained Background Data Pipelines on Mobile Cores
scenario: An on-device personalization pipeline fine-tunes an LLM using local text
  messages over night while the Snapdragon 8 Gen 3 phone is charging.
question: Formulate a data pipeline that tokenizes SQLite text messages incrementally
  without causing thermal throttling or waking up the high-performance CPU cores.
details:
  realistic_solution: Create a background task using the OS scheduler constrained
    to charging state. Use the SoC's low-power efficiency cores to query the database
    in small chunks. Tokenize using a C++ JNI bridge to avoid Java garbage collection
    spikes, then write the tokenized binary buffers to storage before signaling the
    NPU.
  common_mistake: Loading the entire message database into RAM at once, triggering
    aggressive thermal mitigation from the mobile OS scheduler.
  napkin_math: 50 messages * 50 tokens/msg * 2 bytes = 5KB chunks, which easily fit
    in the efficiency core L1 cache.
