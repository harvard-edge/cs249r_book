title: Thermally Constrained Background Data Pipelines on Mobile Cores
scenario: An on-device personalization pipeline fine-tunes an LLM using local text messages over night while the Snapdragon 8 Gen 3 phone is charging.
question: Formulate a data pipeline that tokenizes SQLite text messages incrementally without causing thermal throttling or waking up the high-performance CPU cores.
details:
  realistic_solution: Create a background task using the OS scheduler constrained to charging state. Use the SoC's low-power efficiency cores to query the database in small chunks. Tokenize using a C++ JNI bridge to avoid Java garbage collection spikes, then write the tokenized binary buffers to storage before signaling the NPU.
  common_mistake: |
    **The Pitfall:** Loading the entire message database into RAM at once.
    **The Rationale:** Candidates use standard data loading techniques suited for cloud environments where RAM and thermal limits are vast.
    **The Consequence:** Triggering aggressive thermal mitigation from the mobile OS scheduler and causing memory spikes.
  napkin_math: |
    - **Chunk Size:** 50 messages.
    - **Tokens per Message:** 50 tokens/msg.
    - **Data Size:** 50 × 50 = 2,500 tokens.
    - **Memory Footprint:** 2,500 tokens × 2 bytes/token = **5 KB**.
    - **Conclusion:** A 5 KB chunk easily fits in the efficiency core L1 cache, completely avoiding main memory traffic and high-power core wakeups.
