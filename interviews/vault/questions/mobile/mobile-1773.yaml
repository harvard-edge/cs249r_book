title: Neural Engine Power Efficiency on Snapdragon 8 Gen 3
scenario: A mobile app benchmarks inference on Snapdragon 8 Gen 3 (45 TOPS INT8).
  The neural engine runs a 50M-op model in 2ms using 500mW. The same model on the
  Cortex-X4 CPU takes 20ms using 3000mW. Calculate TOPS/W for each and explain why
  neural engines dominate mobile AI.
question: How would you calculate TOPS/W for each and explain why neural engines dominate
  mobile AI?
details:
  realistic_solution: 'Neural Engine: 45 TOPS total, during inference draws 500mW.
    Effective TOPS/W = 45/0.5 = 90 TOPS/W. CPU: 50M ops in 20ms → effective throughput
    = 50M/0.02 = 2.5 GOPS = 0.0025 TOPS. At 3W: efficiency = 0.0025/3 = 0.00083 TOPS/W.
    Neural engine is 90/0.00083 = 108,000× more efficient for this workload. Energy
    per inference: NE=0.5W×0.002s=1mJ; CPU=3W×0.02s=60mJ. NE saves 59mJ per inference.'
  common_mistake: Comparing only throughput (TOPS) without normalizing by power; missing
    that efficiency (TOPS/W) is the key metric for battery-constrained devices.
  napkin_math: 'NE: 45 TOPS / 0.5W = 90 TOPS/W. CPU: 0.0025 TOPS / 3W = 0.00083 TOPS/W.
    Ratio: 108,000×. Energy: NE=1mJ, CPU=60mJ. At 1000 inferences/day: NE saves 59Wh/day
    — critical for 10-15Wh phone batteries.'
