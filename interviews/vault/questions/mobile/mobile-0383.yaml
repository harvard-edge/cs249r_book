title: The Federated Learning Energy Bill
scenario: 'Your company wants to use Federated Learning to train a personalized keyboard model on 1 million mobile devices to protect user privacy. The on-device training task runs once per day, taking 20 seconds of active compute on the phone''s SoC.'
question: 'What total daily energy does 20 seconds of 4W federated training consume across 1M phones in kWh?'
details:
  realistic_solution: 'Calculate energy for a single device (Power × Time = Joules), scale to the 1M fleet, and strictly convert from Joules to kilowatt-hours. The resulting distributed energy cost is remarkably low.'
  common_mistake: |
    **The Pitfall:** Confusing Power (Watts) with Energy (Watt-hours or Joules).
    **The Rationale:** Engineers fail to correctly execute SI unit conversions and lose multiple orders of magnitude.
    **The Consequence:** Reporting drastically wrong energy footprints, leading executives to mistakenly cancel or overly fund FL initiatives.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Compute Power: 4W per device.
       - Duration: 20 seconds active compute per device daily.
       - Scale: 1,000,000 devices.
    2. **Calculations:**
       - Single Device Energy: 4W × 20 seconds = 80 Joules per day.
       - Total Fleet Energy: 80 J × 1,000,000 devices = 80,000,000 Joules (80 Megajoules).
       - kWh Conversion: 80,000,000 J / (3.6 × 10^6 J/kWh) = 22.2 kWh.
    3. **Conclusion & Interpretation:**
       **Result: Power Efficiency.** The entire fleet's distributed daily energy footprint is remarkably low at **22.2 kWh**.
  options:
  - '~0.05 kWh'
  - '~22,222 kWh'
  - '~22.2 kWh'
  - '~167 kWh'
  correct_index: 2
