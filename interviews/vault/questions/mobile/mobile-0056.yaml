title: The Eviction Threshold
scenario: An ML engineer is profiling a new video editing app on a flagship Android device with 12 GB
  of RAM. They notice that when applying a complex, multi-frame style transfer filter, the app is frequently
  terminated by the OS. Explain to the engineer what is happening and calculate the approximate memory
  usage (in GB) at which their app is likely being targeted for eviction.
question: "How would you explain to the engineer what is happening and calculate the approximate memory usage (in GB) at which their app is likely being targeted for eviction?"
details:
  realistic_solution: The operating system is terminating the app because it's exceeding its allocated
    memory budget and causing system-wide memory pressure. This is a standard mechanism on both Android
    (Low Memory Killer daemon) and iOS (Jetsam) to maintain system stability. Given a device with 12 GB
    of RAM, we can estimate the eviction threshold using the 25% rule of thumb. The app is likely being
    terminated when its memory usage spikes above 3 GB.
  common_mistake: A common misconception is that app terminations are random bugs or are solely related
    to high CPU usage. Many developers are not quantitatively aware of the hard memory limits imposed
    by mobile operating systems. They might profile CPU and GPU performance extensively but fail to monitor
    their app's total RAM footprint, which is often the primary reason for eviction under memory pressure.
  napkin_math: Device RAM = 12 GB | Rule of Thumb for App Eviction Threshold ≈ 25% of total RAM
  options:
  - 6 GB. The app is allowed to use half the system RAM.
  - 3 GB. The app is exceeding the standard 25% memory budget.
  - 9 GB. The OS is malfunctioning; it should reserve at least 75% for the foreground app.
  - 12 GB. The app is only terminated if it tries to allocate more RAM than the device physically has.
  correct_index: 1
