title: Diagnosing Mobile Gesture Model Bias on Exynos NPU
scenario: You are deploying a new on-device object detection model for a novel gesture recognition feature
  on the Samsung Exynos 2400 NPU, which boasts 34.7 TOPS of AI performance and 12 GB LPDDR5X memory. Initial
  lab tests show 95% accuracy, but field reports indicate a high false-negative rate for certain gestures,
  particularly in varied lighting conditions and diverse user environments. The model's resource utilization
  on the NPU is well within limits. Your team suspects issues with the dataset curation and labeling process,
  potentially leading to a diagnosable bias. How would you systematically diagnose the root cause of this
  real-world performance disparity, specifically focusing on the data pipeline, given the NPU's capabilities
  and the mobile environment constraints?
question: "How would you diagnose real-world gesture false negatives on Exynos 2400 as a dataset curation and labeling problem?"
details:
  realistic_solution: Implement a detailed data error analysis pipeline. First, collect and analyze failing
    samples (false negatives) from the field, categorizing them by environmental factors (e.g., lighting,
    background clutter) and gesture variations. Visualize these failing samples alongside successfully
    predicted ones and compare their characteristics with the original training and validation sets to
    identify distribution shifts. Secondly, conduct an audit of the annotation workflow for the problematic
    gestures, including a re-evaluation of inter-annotator agreement (IAA) metrics for difficult or ambiguous
    cases, potentially involving an expert review. Leverage active learning strategies to identify and
    prioritize the labeling of underrepresented yet informative samples that are causing the field performance
    degradation. Finally, develop and monitor specific data quality metrics (e.g., 'lighting variance
    score', 'occlusion density') to proactively detect and prevent similar biases in future dataset iterations.
  common_mistake: A common mistake is to immediately assume a model architecture flaw or inadequate training
    duration, leading to premature attempts at retraining or complex model modifications without a thorough,
    data-centric root cause analysis. Another pitfall is to rely solely on aggregate metrics without deep
    dives into qualitative failure cases or distribution shifts.
  napkin_math: 'Given the Samsung Exynos 2400 NPU''s 12 GB LPDDR5X memory, if we assume an average input
    frame for object detection is 0.5 MB (e.g., a compressed 1080p image or relevant feature map subset)
    and we want to buffer a representative sample of real-world inference inputs for on-device active
    learning or qualitative analysis: How many unique frames could be held in memory for immediate analysis?
    12 GB * 1024 MB/GB / 0.5 MB/frame = 24,576 frames. This demonstrates the NPU''s capacity to locally
    store a substantial amount of operational data for real-time analysis or retraining without offloading,
    crucial for diagnosing data-centric issues directly from device telemetry.'
