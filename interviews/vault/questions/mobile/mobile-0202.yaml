title: The Hidden Cost of Privacy
scenario: Your team is designing a new system to improve your mobile app's keyboard suggestions. One option
  is a classic centralized approach, where user data is uploaded for training. The other is a Federated
  Learning (FL) approach, where training happens on-device and only model updates are sent to the server.
  From a Total Cost of Ownership (TCO) perspective, what is the single largest operational cost introduced
  by choosing the Federated Learning design at scale?
question: "From a Total Cost of Ownership (TCO) perspective, what is the single largest operational cost introduced by choosing the Federated Learning design at scale?"
details:
  realistic_solution: The dominant operational cost is network communication. Each participating device
    must upload model updates (gradients or weights) to the central server. While the update from a single
    device is small, multiplying it by millions of users results in terabytes of daily data ingress, which
    is a significant and continuous cloud operational expense.
  common_mistake: Engineers often focus on the on-device compute and battery impact, which is a real user-facing
    concern. However, they underestimate the system-wide operational expense. At the scale of millions
    of users, the sheer volume of data from daily gradient uploads creates a massive, continuous networking
    cost that often dwarfs the on-device or server-side compute costs.
  napkin_math: Let's assume a fleet of 10 million active users participating in one training round per
    day. A typical small model update might be 4 MB.
  options:
  - Increased on-device compute and battery drain.
  - Server compute cost for aggregating model updates.
  - Network communication overhead from gradient uploads.
  - Storage costs for the global model on the server.
  correct_index: 2
