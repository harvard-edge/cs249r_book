title: The Hidden Cost of Privacy
scenario: Your team is designing a new system to improve your mobile app's keyboard suggestions. One option is a classic centralized approach, where user data is uploaded for training. The other is a Federated Learning (FL) approach, where training happens on-device and only model updates are sent to the server.
question: From a Total Cost of Ownership (TCO) perspective, what is the single largest operational cost introduced by choosing the Federated Learning design at scale?
details:
  realistic_solution: The dominant operational cost is network communication. Each participating device must upload model updates (gradients or weights) to the central server. While the update from a single device is small, multiplying it by millions of users results in terabytes of daily data ingress, which is a significant and continuous cloud operational expense.
  common_mistake: |
    **The Pitfall:** Focusing exclusively on on-device compute and battery impact while ignoring cloud operational expenses.
    **The Rationale:** Engineers intuitively view FL as "free" compute pushed to the edge, underestimating the sheer volume of continuous gradient data flowing back to the server.
    **The Consequence:** Being blindsided by massive cloud egress and load-balancing bills required to ingest and aggregate petabytes of daily model updates.
  napkin_math: |
    - **Data Uploads:** 10 million active users * 4 MB update = 40 TB/day.
    - **Annual Volume:** 40 TB/day * 365 days = **~14.6 Petabytes/year**.
    - **Conclusion:** Managing this continuous firehose of data requires substantial server fleets, making network communication the dominant TCO factor.
  options:
  - Increased on-device compute and battery drain.
  - Server compute cost for aggregating model updates.
  - Network communication overhead from gradient uploads.
  - Storage costs for the global model on the server.
