title: 'The Federated Learning Battery Tax'
scenario: A luxury car brand wants to improve its driver-assist AI model by training it on real-world data from its customers' phones. To protect user privacy, they decide to use Federated Learning. One training round on a user's smartphone requires 15 minutes of active computation.
question: Assuming the phone's SoC consumes 4W on average during this active training, can you calculate the total energy consumed from the phone's battery for a single 15-minute training round?
details:
  realistic_solution: 'The correct way to solve this is to multiply the power consumption by the duration of the task. The key is to ensure the time units are consistent, typically converting minutes to hours.'
  common_mistake: |
    **The Pitfall:** Confusing power (in Watts) with energy (in Watt-hours).
    **The Rationale:** Engineers state the power consumption (4W) as the answer, forgetting that energy is power integrated over time.
    **The Consequence:** They fundamentally miscalculate battery drain, impacting feature viability.
  napkin_math: |
    **Assumptions & Constraints:**
    - Power = 4 W.
    - Duration = 15 minutes = 0.25 hours.

    **Calculations:**
    - Total energy = 4 W * 0.25 hours = 1 Wh.

    **Conclusion & Interpretation:**
    - **Result: 1 Wh (Power-Bound)**. Total energy consumed is 1 Wh.
  options:
    - 60 Wh
    - 4 W
    - 1 Wh
    - 0.25 Wh
