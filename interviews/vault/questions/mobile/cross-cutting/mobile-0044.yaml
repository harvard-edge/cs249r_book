title: The Keyboard Prediction Privacy Leak
scenario: Your on-device keyboard prediction model (LSTM, 20M params) learns from user typing to improve suggestions. A security researcher demonstrates that by observing the model's top-5 prediction probabilities over 1000 queries, they can reconstruct fragments of the user's private text. The model never leaves the device.
question: How can top-5 keyboard predictions over 1000 queries leak private text even when the model stays on-device?
details:
  realistic_solution: This is an output-channel privacy leak, not a guarantee that the model file left the device. Repeated top-5 probability queries can support membership inference or sequence reconstruction because unusual phrases, names, passwords, and email fragments may receive elevated probability after personalization. Mitigate with DP-aware on-device training, clipping, regularization, memorization tests, rate limits, and output controls such as lower-precision scores or restricted API access. Avoid promising a fixed bits-per-query bound unless it is measured for this model and threat model.
  common_mistake: |
    **The Pitfall:** Believing on-device processing guarantees data privacy.
    **The Rationale:** Engineers assume that since the model never leaves the device, user data cannot leak, forgetting that the model's outputs (predictions) encode training data.
    **The Consequence:** The model memorizes and subsequently leaks sensitive user data like passwords and emails to other apps.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model capacity: 20M parameters (FP32).
    - User typing history: 10K words/day * 90 days = 900K words.
    - Attack configuration: 1000 queries, top-5 predictions.

    **Calculations:**
    - Query surface: 1000 queries x 5 ranked candidates = 5,000 probability-bearing observations.
    - Each observation can reveal whether a candidate phrase is unusually favored, especially for rare private strings that appeared in the user's local training data.
    - The scenario demonstrates leakage empirically, so the right conclusion is that outputs can encode private training history; the file location of the model does not prevent that output leakage.

    **Conclusion & Interpretation:**
    - **Result: Output Leakage Vulnerability**. Top-k probabilities can expose memorized or overfit private text through repeated probing. DP training and output hardening reduce this risk, but the leakage must be validated for the specific model and API rather than inferred from parameter count alone.
