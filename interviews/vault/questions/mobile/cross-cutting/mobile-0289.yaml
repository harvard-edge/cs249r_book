title: The Battery Drain Tax
scenario: Your team is developing an automatic smart reply feature for a mobile messaging app. You are A/B testing two models. Model A is simpler, runs on the CPU, and consumes 0.5W during its 100ms inference time. Model B is more accurate, runs on the dedicated NPU, and consumes 1.5W during its 50ms inference time. An average user triggers this feature 200 times per day.
question: Compare the daily battery energy cost of Model A to Model B.
details:
  realistic_solution: 'Calculate total energy per day for each model. Model A: Energy per inference = 0.5W × 0.1s = 0.05 J. Daily = 0.05 J × 200 = 10 J = 2.78 mWh. Model B: Energy per inference = 1.5W × 0.05s = 0.075 J. Daily = 0.075 J × 200 = 15 J = 4.17 mWh. Model B costs ~1.5× more energy per day than Model A, but the absolute cost is tiny (< 5 mWh) relative to a ~15 Wh phone battery.'
  common_mistake: |
    **The Pitfall:** Comparing only instantaneous power draw (Watts) without inference duration.
    **The Rationale:** Candidates assume higher wattage automatically means worse battery drain, forgetting Energy = Power × Time.
    **The Consequence:** The candidate incorrectly concludes Model B is 3x worse, failing to see the offsetting benefit of shorter inference times.
  napkin_math: |
    1. **Model A Daily Energy:** 0.5W * 0.1s * 200 = 10 Joules = 2.78 mWh.
    2. **Model B Daily Energy:** 1.5W * 0.05s * 200 = 15 Joules = 4.17 mWh.
    3. **Ratio:** Model B / Model A = 15 J / 10 J = **1.5x**.
    4. **Total Impact:** 4.17 mWh / 15,000 mWh ≈ 0.028% of battery (negligible for both).
  options:
  - Model B consumes about 0.0042 Wh per day, roughly 1.5 times more than Model A's 0.0028 Wh.
  - Model B consumes 3 Wh per day, while Model A consumes 0.5 Wh. It's a 6x difference.
  - Model B consumes 1 Wh per day (60 Ws / 60), which is significantly more than Model A.
  - Model B consumes 600 Wh per day, making it completely infeasible for a mobile device.
  correct_index: 0
