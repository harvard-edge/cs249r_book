title: Sizing On-Device Guardrails on Hexagon NPU
scenario: You are deploying a 3B-parameter generative AI assistant on flagship devices featuring the Qualcomm Hexagon NPU (Snapdragon 8 Gen 3). Corporate governance mandates a strict on-device Responsible AI guardrail to intercept toxic output before displaying it to the user. The device shares 12-16 GB LPDDR5X memory and features a 45 TOPS INT8 NPU.
question: How would you size on-device guardrail inference on Hexagon NPU for low-latency generated text checks?
details:
  realistic_solution: The optimal approach is to deploy a heavily distilled, INT8-quantized encoder model (e.g., 100M parameters) dedicated to guardrails, running chunk-by-chunk on the generated text. By utilizing the NPU's 45 TOPS INT8 capability for the guardrail while the main model generates tokens, we can hide the verification latency. Pinning the 100MB guardrail model in memory prevents expensive reloading and bandwidth contention with the main model's KV cache.
  common_mistake: |
    **The Pitfall:** Proposing a secondary LLM for the guardrail.
    **The Rationale:** Candidates assume LLMs are required for text evaluation, failing to realize the extreme memory bandwidth contention caused by running two large autoregressive models simultaneously.
    **The Consequence:** The system experiences massive latency spikes due to KV cache thrashing and memory bus saturation.
  napkin_math: |
    1. **Memory:** 12GB total - 4GB (OS) = 8GB ML budget. 3B model (INT4) + KV Cache = ~2.0GB. Guardrail (100M params, INT8) = 100MB.
    2. **Compute (per 50 tokens):** 100M params × 50 tokens × 2 MACs = 10 Billion Ops = 0.01 TOPS.
    3. **Compute Latency:** 0.01 TOPS / 45 TOPS = ~0.22ms.
    4. **Memory Latency:** 100MB read at 68 GB/s (LPDDR5X) = ~1.47ms.
    **Result:** A distilled 100M INT8 guardrail adds only **~1.7ms total overhead** per chunk, running asynchronously without bottlenecking the main LLM.
