title: Diffusion Model Memory Bound Check
scenario: An on-device diffusion model runs 20 unrolled denoising steps on a mobile SoC (45 TOPS peak, 50 GB/s memory bandwidth).
question: For one denoising step and the full 20-step inference, compute MACs and use arithmetic intensity to decide compute-bound vs memory-bound?
details:
  realistic_solution: |
    Unlike autoregressive LLMs, image-based UNets reuse weights spatially across feature maps via convolutions. For the stated model, one denoising step is 1 Tera-MAC, conventionally counted as about 2 TOP of multiply-add work. Across 20 steps, total work is 20 Tera-MAC, or about 40 TOP. The arithmetic-intensity check is unchanged by repeating the same step: 2 TOP per 2 GB is 1000 OP/byte, above the hardware ridge point of 45 TOPS / 50 GB/s = 900 OP/byte. The full generation is therefore slightly compute-bound under these assumptions.
  common_mistake: |
    **The Pitfall:** Blindly assuming diffusion models are memory-bandwidth-bound exactly like LLMs.
    **The Rationale:** Candidates conflate the bottlenecks of LLM autoregressive decoding (where weights are fetched per token) with the dense, spatially-reused convolutions of a UNet.
    **The Consequence:** Misdirecting engineering effort into extreme, destructive weight quantization strategies when the actual bottleneck requires accelerating the NPU math kernels.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hardware compute: 45 TOPS.
    - Hardware bandwidth: 50 GB/s.
    - UNet work per denoising step: 1 Tera-MAC = about 2 TOP.
    - Denoising steps: 20.
    - Weight/activation bytes streamed per step for the bound check: about 2 GB.

    **Calculations:**
    - Hardware ridge point = 45 TOPS / 50 GB/s = 900 OP/byte.
    - Per-step arithmetic intensity = 2 TOP / 2 GB = 1000 OP/byte.
    - Full inference work = 20 steps * 1 Tera-MAC = 20 Tera-MAC = about 40 TOP.
    - Full inference bytes = 20 steps * 2 GB = 40 GB.
    - Full inference arithmetic intensity = 40 TOP / 40 GB = 1000 OP/byte.
    - Per-step compute time = 2 TOP / 45 TOPS = 44.4 ms; memory time = 2 GB / 50 GB/s = 40.0 ms.
    - Full compute time = 40 TOP / 45 TOPS = 0.889 s; full memory time = 40 GB / 50 GB/s = 0.800 s.

    **Conclusion & Interpretation:**
    - **Result: 1000 OP/byte > 900 OP/byte (Compute-Bound)**. Both one step and the full 20-step generation sit slightly above the ridge point, so NPU math throughput, not memory bandwidth, is the limiting resource under these assumptions.
