title: Bias Detection in an On-Device Summarization LLM
scenario: A new on-device large language model (LLM) for content summarization, deployed on a fleet of Pixel devices featuring the Google Tensor G3, is exhibiting unexpected fairness regressions. Post-deployment monitoring flags a significant increase in gender bias scores, particularly for summarizations involving professional roles, compared to pre-deployment evaluations. Users are reporting that summaries disproportionately associate certain genders with specific low-status or high-status professions.
question: How would you diagnose a post-deployment gender-bias regression in an on-device Tensor G3 summarization LLM?
details:
  realistic_solution: |
    An L4 engineer would first implement a detailed diagnostic pipeline to precisely pinpoint the source of the regression. This involves:
    1. **Symptom Characterization:** Deep-diving into the monitoring logs to categorize the specific types of biased summarizations and the contexts in which they occur.
    2. **Data Drift Analysis:** Comparing the distribution of input data observed on-device post-deployment with the training/validation data, looking for subtle shifts not caught by initial checks.
    3. **Model Interpretability (on-device perspective):** Collecting privacy-preserving traces, counterfactual prompts, and sampled intermediate summaries to reproduce the issue, then running heavier attribution analysis offline or on proxy models. On-device diagnostics should stay lightweight and focus on logging decision slices, quantized outputs, and compiler/runtime metadata rather than assuming full LIME, SHAP, or attention analysis is practical locally.
    4. **Hardware/Software Interaction:** Investigating whether quantization, compilation, tokenizer changes, or Tensor G3 execution paths introduced numerical or decoding differences that amplify bias. This includes comparing outputs across reference, quantized, and device-compiled builds while accounting for activation memory, KV-cache, OS, and telemetry overhead.
    5. **A/B Testing or Canary Deployments:** If available, analyzing results from smaller, controlled rollouts to isolate variables.
    6. **Model Card Review:** Consulting the original model card and impact assessment to understand documented risks and mitigation strategies, and comparing observed behavior against expected performance bounds.
  common_mistake: |
    **The Pitfall:** Immediately attempting to retrain the model with augmented data or applying post-hoc bias mitigations.
    **The Rationale:** Engineers often treat bias as purely a training data problem.
    **The Consequence:** They overlook on-device execution contexts (like 8-bit quantization artifacts on the TPU), potentially introducing new bugs without fixing the root hardware/software interaction.
  napkin_math: |
    **Assumptions & Constraints:**
    - A multi-billion-parameter on-device LLM leaves limited headroom after weights, KV-cache, activations, runtime buffers, OS memory, and app memory.
    - Diagnostics must be sampled and privacy-preserving; full activation capture for every request is not a realistic mobile workflow.

    **Calculations:**
    - Weight storage alone may consume several GB, but peak inference memory is higher because decode also needs KV-cache, temporary tensors, tokenizer buffers, and runtime workspaces.
    - A practical diagnostic plan stores compact records: prompt slice IDs, output category, quantization/compiler version, demographic test slice, latency, and a small number of sampled counterfactual outputs.
    - Heavy attribution can then run off-device against replayable, consented, or synthetic cases while the device path verifies whether the regression appears only after quantization or compilation.

    **Conclusion & Interpretation:**
    - **Result: Sampled device diagnostics plus offline attribution.** The defensible diagnosis is to isolate data drift, quantization/runtime differences, and decoding behavior without assuming full-model activation buffering or exact Tensor G3 memory/TOPS budgets.
