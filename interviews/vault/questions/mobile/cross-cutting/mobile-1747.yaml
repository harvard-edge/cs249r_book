title: On-Device DP-SGD for Federated Learning on Snapdragon 8 Gen 3 Hexagon NPU
scenario: You are designing an on-device federated learning system using DP-SGD. The system requires an overall privacy budget epsilon of 2 for each training round over 100 communication rounds using advanced composition.
question: How would you design the noise calibration mechanism and manage the privacy-utility tradeoff given NPU constraints?
details:
  realistic_solution: |
    Implement an optimized DP-SGD pipeline fine-tuning the gradient clipping threshold and using efficient noise generation.
  common_mistake: |
    **The Pitfall:** Ignoring the compute overhead of noise generation and clipping.
    **The Rationale:** Candidates focus entirely on theoretical epsilon budgets without realizing that generating high-quality cryptographic noise securely on a constrained NPU is incredibly expensive.
    **The Consequence:** The DP-SGD implementation crushes the device's battery and fails to meet real-time background processing windows.
  napkin_math: |
    **Assumptions & Constraints:**
    - Epsilon (Total): 2.0.
    - Rounds (T): 100.
    - Sensitivity (S): 1.0.

    **Calculations:**
    - Per-round epsilon (ε_s): 2 / √100 = 0.2.
    - Noise std dev (σ): S * √(2 * ln(1.25/1e-5)) / ε_s.
    - σ: 1.0 * 4.8 / 0.2 = 24.

    **Conclusion & Interpretation:**
    - **Result: Cryptographic Overhead.** Generating high-variance cryptographic noise (σ=24) is computationally expensive on integer-only NPUs, severely draining battery.
