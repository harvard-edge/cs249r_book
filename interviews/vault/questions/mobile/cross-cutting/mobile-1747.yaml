title: On-Device DP-SGD for Federated Learning on Snapdragon 8 Gen 3 Hexagon NPU
scenario: You are designing an on-device federated learning system using DP-SGD. The system requires an overall privacy budget epsilon of 2 for each training round over 100 communication rounds using advanced composition.
question: How would you design the noise calibration mechanism and manage the privacy-utility tradeoff given NPU constraints?
details:
  realistic_solution: |
    Calibrate DP-SGD with a production privacy accountant, not by assigning an equal epsilon to each round. Pick a clipping norm from private or held-out gradient norm statistics, clip per-example or per-client updates to that norm, and sweep the Gaussian noise multiplier until the accountant reports total epsilon <= 2 at the chosen delta over 100 rounds. On the device, keep clipping and aggregation hardware-friendly, but generate Gaussian noise with a vetted CSPRNG/PRNG path on CPU or DSP and add it in floating point or a privacy-reviewed fixed-point implementation. Tune utility by reducing rounds, changing participation rate, or increasing effective batch size instead of weakening clipping/noise semantics.
  common_mistake: |
    **The Pitfall:** Ignoring the compute overhead of noise generation and clipping.
    **The Rationale:** Candidates focus entirely on theoretical epsilon budgets without checking whether the random sampling, clipping, and noise-addition path is efficient and statistically valid on mobile hardware.
    **The Consequence:** The DP-SGD implementation crushes the device's battery and fails to meet real-time background processing windows.
  napkin_math: |
    **Assumptions & Constraints:**
    - Total epsilon target: 2.0 at a fixed delta such as 1e-5.
    - Rounds (T): 100.
    - Clipping norm (C): 1.0 for the candidate configuration.

    **Calculations:**
    - Choose candidate noise multipliers σ and compute total ε using RDP, moments accountant, or a correctly parameterized advanced-composition accountant.
    - Added Gaussian noise standard deviation per clipped update is σ * C.
    - If σ=1.5 and C=1.0, the implementation adds noise with std dev 1.5, then the accountant determines whether 100 sampled rounds fit ε <= 2.

    **Conclusion & Interpretation:**
    - **Result: Accountant-Calibrated Noise**. The valid noise scale is the smallest σ whose composed privacy loss stays within ε=2; mobile optimization must preserve that sampled Gaussian distribution and clipping rule.
