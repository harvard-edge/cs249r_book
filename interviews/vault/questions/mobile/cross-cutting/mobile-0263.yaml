title: 'The Federated Learning Battery Tax: Federated Learning'
scenario: 'An automotive company is using Federated Learning (FL) to privately train a predictive maintenance model on its customers'' mobile phones. During one training round, the model update process keeps the phone''s main SoC active for 12 seconds. Assuming the SoC consumes 3 Watts while active.'
question: 'How much battery energy does a 12s, 3W federated-learning round consume, and what product tax does it create?'
details:
  realistic_solution: 'The key is to calculate the energy in Watt-seconds and then convert to the standard battery unit of Watt-hours (Wh). The ''battery tax'' per round is small, but the cumulative cost over thousands of users and many rounds per day is a critical product and system design constraint. It directly impacts user sentiment and places a ceiling on how frequently the company can afford to train without causing noticeable battery drain.'
  common_mistake: |
    **The Pitfall:** Confusing Power (Watts) with Energy (Watt-hours).
    **The Rationale:** Engineers calculate Watt-seconds but fail to convert to Watt-hours, leading to numbers that are thousands of times too high.
    **The Consequence:** The team drastically overestimates battery drain and incorrectly cancels the federated learning initiative.
  napkin_math: |
    **Assumptions & Constraints:**
    - Power: 3 Watts.
    - Time: 12 seconds.

    **Calculations:**
    - Energy in Joules: 3W * 12s = 36 Joules.
    - Energy in Watt-hours: 36 Joules / 3600 (Joules/Wh) = 0.01 Wh.

    **Conclusion & Interpretation:**
    - **Result: 0.01 Wh (Power-Bound)**. 0.01 Wh is drained per training round.
  options:
  - '36 Wh'
  - '0.6 Wh'
  - '0.01 Wh'
  - '3 W'
  correct_index: 2
