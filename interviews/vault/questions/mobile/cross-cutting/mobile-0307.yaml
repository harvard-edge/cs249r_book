title: 'The On-Device Battery Tax'
scenario: 'Your team is considering Federated Learning (FL) to train a new smart compose feature on user devices. The process would run once per day while the phone is charging. You measure the training process and find it consumes an average of 2 Watts of power and runs for 30 minutes. A typical user''s phone has a 20 Watt-hour (Wh) battery.'
question: 'What percentage of a full battery charge is consumed by a single FL training round?'
details:
  realistic_solution: 'The on-device training imposes a direct energy cost. Quantify this cost by calculating the energy consumed (Power * Duration) and comparing it to the battery''s total capacity (Watt-hours).'
  common_mistake: |
    **The Pitfall:** Confusing power (Watts) with energy (Watt-hours) or making time unit conversion errors.
    **The Rationale:** Engineers often forget to multiply power by duration or misconvert minutes to hours.
    **The Consequence:** Miscalculating the battery impact, potentially dismissing a significant daily energy cost.
  napkin_math: |
    **Assumptions & Constraints:**
    - Power Draw: 2 W.
    - Training Time: 30 minutes = 0.5 hours.
    - Battery Capacity: 20 Wh.

    **Calculations:**
    - Energy Consumed: 2 W * 0.5 h = 1 Wh.
    - Percentage Consumed: (1 Wh / 20 Wh) * 100 = 5.0%.

    **Conclusion & Interpretation:**
    - **Result: 5.0% (Power-Bound)**. 5.0% of a full charge is consumed per round.
  options:
  - '10.0%'
  - '5.0%'
  - '2.5%'
  - '1.0%'
  correct_index: 1
