title: The Privacy-Aware TCO Dilemma
scenario: A product team proposes a 30-day cloud A/B test logging raw keystrokes from
  100,000 users. Cloud infra costs $0.50/user/month. An alternative Federated Learning
  (FL) buildout costs $250K one-time. The probability of a data breach during the
  centralized test is 0.1%, with an expected cost of $50M.
question: How does breach risk change the TCO case for Federated Learning versus centralized
  keystroke logging?
details:
  realistic_solution: 'Compare risk-adjusted TCO. For a single 30-day cloud A/B test:
    Infra = 100,000 users × $0.50 = $50,000. Risk cost = 0.001 × $50M = $50,000. Total
    = $100,000 per experiment. The FL approach requires a one-time engineering investment
    of $250,000. By avoiding the central data collection, FL virtually eliminates
    the $50,000 risk cost per experiment. The investment breaks even after just a
    few experiments.'
  common_mistake: '**The Pitfall:** Focusing narrowly on direct infrastructure compute
    and storage costs.

    **The Rationale:** Engineers ignore second-order economic factors like statistical
    risk-adjusted cost and legal penalties.

    **The Consequence:** They falsely conclude that cloud logging is significantly
    cheaper than the one-time engineering investment of FL.

    '
  napkin_math: '- **Cloud Infra Cost:** 100,000 users * $0.50 = $50,000 per experiment.

    - **Cloud Risk Cost:** 0.1% probability * $50,000,000 = $50,000 per experiment.

    - **Total Cloud TCO:** $50,000 + $50,000 = $100,000 per experiment.

    - **FL Investment Break-even:** $250,000 one-time cost / $100,000 TCO = 2.5.

    - **Final Result:** **The FL investment statistically pays for itself after just
    2.5 centralized experiments.**

    '
  options:
  - The cloud data ingress costs of $60 are far lower than the $250,000 FL engineering
    cost, so the cloud A/B test is cheaper.
  - The on-device compute for FL will drain user batteries, leading to more churn
    than any potential data leak.
  - The expected cost from data leak risk is $50,000 for a single experiment, making
    the one-time $250,000 FL investment economically rational after just 5 experiments.
  - A 5% churn from a data leak is unrealistic; the actual financial risk is likely
    zero, so the focus should be on the lowest direct cost.
  correct_index: 2
