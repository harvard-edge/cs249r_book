title: ARKit Priority Queuing Tail Latency
scenario: 'An Apple A17 Pro runs ARKit tasks: Hand Tracking (needs 60fps) and Plane Detection (runs at 10fps, takes 50 ms per frame) on a shared queue. The OS preemption cost is 800 us, and thermal throttling drops effective compute by 18%.'
question: What is the tail latency for Hand Tracking under (a) FIFO vs (b) priority-with-preemption queueing, including the OS preemption cost and the post-12-minute thermal throttling?
details:
  realistic_solution: |
    Under FIFO, the worst Hand Tracking arrival is one that lands just after a Plane Detection job starts, so it waits behind that job. Cold FIFO tail is therefore about 50 ms, and throttled FIFO tail is 50 / 0.82 = 61.0 ms. Under priority-with-preemption, assume immediate preemption at a scheduling point and no older same-priority Hand Tracking work ahead of it. The Hand Tracking tail is its own service plus the 0.8 ms switch cost: cold is 5.0 + 0.8 = 5.8 ms, and throttled is 5.0 / 0.82 + 0.8 = 6.9 ms. FIFO misses the 16.6 ms frame budget in both regimes; priority-with-preemption meets it in both regimes under the stated assumptions.
  common_mistake: |
    **The Pitfall:** Computing only the FIFO blocking case and missing the scaling effect of thermal throttling.
    **The Rationale:** Candidates forget that priority queues with preemption incur a context-switch tax, and that throttling scales all service times.
    **The Consequence:** An inaccurate tail latency calculation that misrepresents whether the system meets the 16.6 ms deadline.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hand Tracking deadline = 16.6 ms (60 fps)
    - Hand Tracking compute = 5 ms
    - Plane Detection compute = 50 ms
    - Throttling factor = 0.82 (18% drop)
    - Preemption cost = 0.8 ms

    **Calculations:**
    - FIFO tail, cold = Plane Detection blocking = 50 ms.
    - FIFO tail, throttled = 50 ms / 0.82 = 61.0 ms.
    - Priority + preempt tail, cold = Hand Tracking service + switch = 5.0 ms + 0.8 ms = 5.8 ms.
    - Priority + preempt tail, throttled = (5.0 ms / 0.82) + 0.8 ms = 6.1 ms + 0.8 ms = 6.9 ms.

    **Conclusion & Interpretation:**
    - **Result: FIFO 50 ms cold / 61 ms throttled; priority preemption 5.8 ms cold / 6.9 ms throttled.** Priority queueing with preemption is required to keep Hand Tracking under the 16.6 ms deadline after thermal throttling.
