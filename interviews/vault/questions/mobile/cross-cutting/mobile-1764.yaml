title: 'Realizing Responsible AI on Google Tensor G3: On-Device Content Moderation'
scenario: Your team is deploying a privacy-preserving, on-device AI model on the Google Tensor G3 for real-time content moderation in a new social communication feature. The model identifies potentially harmful content *before* it's sent, offering users immediate feedback and intervention options. The executive team insists on robust Responsible AI practices, including model cards, continuous impact assessments, and clear guardrails, especially given the model's L6+ impact and cross-cutting nature across user privacy and safety.
question: How should a Tensor G3 on-device content moderation system handle guardrails, impact assessment, and resource limits?
details:
  realistic_solution: "An L6+ engineer would propose a multi-faceted approach leveraging the Tensor G3's on-device acceleration path: \n1.  **On-Device Guardrails & Explainability:** Implement lightweight, specialized models (e.g., small rule-based systems or simpler ML classifiers) in the local inference path. These act as post-inference guardrails, catching edge cases or potential misclassifications from the primary model. Explore privacy-preserving techniques for limited local explanations, while keeping heavier attribution and audits offline or federated. \n2.  **Federated Evaluation & Impact Assessment:** Design a federated evaluation strategy. Instead of sending raw user data to the cloud, send anonymized, aggregated model insights (e.g., performance metrics on specific data slices, drift detection signals, or user-consented problematic inference samples) to continuously refine model cards and inform impact assessments. \n3.  **Local Red-Teaming & Adversarial Robustness:** Develop\
    \ a framework for simulated on-device red-teaming. This could involve generating synthetic adversarial inputs locally or deploying 'canary' models with specific vulnerabilities to test the robustness of the primary model against known attack vectors. \n4.  **Resource Management:** Meticulously partition the Tensor G3's hardware to ensure the primary model, guardrails, and federated learning components coexist efficiently, without compromising user experience (latency) or battery life.\n"
  common_mistake: |
    **The Pitfall:** Relying solely on cloud-based red-teaming or impact assessment frameworks.
    **The Rationale:** Assuming that on-device processing inherently solves privacy concerns without addressing model input/output leakage or data drift.
    **The Consequence:** Failing to catch real-world local bias or adversarial attacks because cloud telemetry lacks the necessary context from privacy-preserved edge devices.
  napkin_math: |
    **Assumptions & Constraints:**
    - Primary model footprint: ~100 MB INT8.
    - Guardrail models: ~20 MB total.
    - Message rate: 10 messages/sec.
    - Per-message local inference budget on the synchronous send path: 5 ms primary + 2 ms guardrail, fully serialized.
    - Federated evaluation is scheduled as background work while charging/idle, outside the interactive send path.

    **Calculations:**
    - Total model memory: ~100 MB + ~20 MB = ~120 MB, before runtime buffers and OS/app memory.
    - Synchronous inference time under the serialized assumption: 10 messages/sec * 7 ms/message = 70 ms of accelerator work per second.
    - Utilization for the synchronous moderation path: 70 ms / 1000 ms = 7%.
    - Batchability or pipeline overlap would reduce this duty-cycle estimate; running both models for every message on the same path is the conservative case.

    **Conclusion & Interpretation:**
    - **Result: ~7% conservative synchronous inference duty cycle.** The guardrail path is plausible if runtime buffers fit and federated evaluation stays outside the interactive path; the 7% figure is not a claim about background training or evaluation cost.
