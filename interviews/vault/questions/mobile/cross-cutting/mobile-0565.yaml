title: The Smart Keyboard TCO Dilemma
scenario: You are the ML Systems Engineer for a new smart keyboard app with 10 million daily active users. To improve next-word prediction, you must diagnose the most cost-effective training strategy between Federated Learning and Centralized Training.
question: Which smart keyboard training strategy has the lower full TCO after accounting for network and user battery costs?
details:
  realistic_solution: Centralized Training has the lower full TCO under the stated assumptions. Centralized training costs $300/day. Federated Learning costs about $500/day in network ingress plus about $5,000/day in battery-related churn, for a total of $5,500/day. The churn term is an amortized daily equivalent from the provided monthly proxy, not a precise causal battery-to-churn model. That still makes naive fleet-wide FL roughly 18x more expensive than centralized training, so the lower-TCO choice between the two named strategies is Centralized Training.
  common_mistake: |
    **The Pitfall:** Assuming Federated Learning is inherently cheaper because compute is offloaded.
    **The Rationale:** Engineers often focus only on cloud compute costs and ignore the network cost of aggregating millions of model updates, as well as the cost of draining users' batteries.
    **The Consequence:** Recommending a strategy that is actually vastly more expensive and causes significant user churn.
  napkin_math: |
    **Assumptions & Constraints:**
    - Centralized daily cost: $300.
    - FL network cost: $0.01/GB ingress.
    - FL participation: 5MB update per daily active user per day.
    - Battery drain from FL: 0.9%/day.
    - Assumed incremental churn from that drain: 0.5%/month, LTV $3.
    - Treat the monthly churn proxy as an amortized daily equivalent for this TCO comparison.

    **Calculations:**
    - Centralized Training = $300/day.
    - FL Network = 10M users * 5MB/user/day = 50TB/day = 50,000 GB/day.
    - FL Network Cost = 50,000 GB/day * $0.01/GB = $500/day.
    - Monthly Churned Users = 10M users * 0.5% = 50,000 users/month.
    - Churn Cost = 50,000 users/month * $3 LTV = $150,000/month = $5,000/day.
    - Total FL Cost = $500 + $5,000 = $5,500/day.
    - FL / Centralized = $5,500 / $300 = ~18.3x.

    **Conclusion & Interpretation:**
    - **Result: Centralized Lower TCO**. FL is ~18x more expensive than centralized training when accounting for network and the provided amortized battery-churn proxy; the comparison is approximate, not a precision churn forecast.
