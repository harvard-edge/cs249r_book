title: 'The Federated Economics Dilemma'
scenario: 'You are an ML Systems Engineer on the ''Smart Reply'' team for a messaging app with 10 million daily active users (DAU). To improve the model with user data, your team is debating two strategies. Option A (Centralized): Log 1 KB of anonymized interaction data per user per day to the cloud. Store for 90 days. Train on 8xA100 GPU cluster at $25/hr. Training runs 3 hours/week. Data transfer at $0.01/GB. Option B (Federated Learning): $800K one-time engineering cost. On-device training uses 0.5 Wh per round (2 rounds/week per device). Aggregation server costs $5K/month.'
question: 'For 10M smart-reply DAU, how does centralized logging TCO compare with an $800K federated-learning buildout?'
details:
  realistic_solution: 'The correct approach is to calculate the total annual cost for both strategies. Because the per-user data volume is so small (1 KB/day), the centralized approach is orders of magnitude cheaper in pure infrastructure costs (~$4.2k vs ~$327k). However, a comprehensive TCO analysis must also include the Expected Value of regulatory and breach risks, which can quickly make FL the safer and ultimately cheaper investment.'
  common_mistake: |
    **The Pitfall:** Focusing only on obvious infrastructure or engineering costs while ignoring distributed externalities or risk.
    **The Rationale:** Engineers often neglect the user-borne energy cost of FL or the Expected Value of regulatory and breach risks for centralized data.
    **The Consequence:** An incomplete TCO analysis leads to selecting an option that may incur massive hidden liabilities or brand damage.
  napkin_math: |
    **Assumptions & Constraints:**
    - Option A (Centralized): Daily data: 10M users * 1 KB = 10 GB/day. Annual: 3.65 TB.
    - Option B (Federated): Engineering amortized over 3 years: $800K / 3 = ~$267K/year.
    - Option B (Federated): Aggregation server: $5K/month * 12 = $60K/year.
    - Option B (Federated): User energy cost: 10M users * 0.5 Wh * 2 rounds/week * 52 weeks = 520 MWh/year (approx $78,000/year borne by users).

    **Calculations:**
    - Option A Transfer cost: 3,650 GB * $0.01/GB = $36.50/year.
    - Option A Storage (90-day window): peak ~900 GB * $0.023/GB/month * 12 = ~$248/year.
    - Option A Training: $25/hr * 3 hr/week * 52 weeks = $3,900/year.
    - Total Option A Infrastructure: ~$4,185/year.
    - Total Option B Amortized: ~$327K/year.

    **Conclusion & Interpretation:**
    - **Result: ~$4.2K vs $327K (Cost-Bound)**. Centralized is ~80x cheaper in pure infrastructure ($4.2K vs $327K). FL only wins when privacy liability/breach risk (e.g., 1% chance of $50M fine) exceeds $320K/year.
  options:
  - 'Option A (Centralized) is better because the $800,000 upfront engineering cost for FL makes it too expensive.'
  - 'Option A (Centralized) has a much lower infrastructure TCO (~$4.2k vs ~$327k/year), but Option B (Federated) may be the true cheaper option when regulatory and breach risks are factored in.'
  - 'Option A (Centralized) is better; the daily costs are a standard operational expense and the privacy risk can be mitigated with user agreements.'
  - 'Option B (Federated) is cheaper in pure infrastructure costs, even when amortizing the engineering cost.'
