title: The Federated Fleet TCO Dilemma
scenario: 'You are launching a Driver Alertness feature in a companion mobile app for a fleet of 1 million users. The feature uses the phone''s camera to analyze driver fatigue. The team is debating between centralized cloud inference and decentralized federated learning.'
question: 'Which Driver Alertness architecture has lower first-year TCO, centralized cloud inference or decentralized federated learning?'
details:
  realistic_solution: 'The correct answer is that the Decentralized (Federated Learning) approach has a dramatically lower TCO in the first year. While the $1.25M upfront engineering cost seems high, it''s dwarfed by the recurring operational expenses of the Centralized approach.'
  common_mistake: |
    **The Pitfall:** Focusing entirely on the high initial engineering investment for FL.
    **The Rationale:** Engineers ignore second-order effects like massive data egress costs at fleet scale.
    **The Consequence:** Launching an architecture that bankrupts the product via recurring cloud infrastructure costs.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Fleet size: 1,000,000 users.
       - Centralized: 1000 inferences/day, 5ms/inference, 100 KB/frame.
       - Decentralized (FL): $1.25M upfront engineering, 5 GB gradient upload/round.
    2. **Calculations:**
       - Centralized Compute: 1M * 1000 * 5ms = 1388 GPU-hours/day * $3.50 = ~$4,858/day.
       - Centralized Data: 1M * 1000 * 100KB = 100,000 GB/day * $0.09 = $9,000/day.
       - Centralized Annual: ($4,858 + $9,000) * 365 = ~$5.06M/year.
       - FL Annual: $1.25M (upfront) + ~$2,400 (server) = ~$1.25M.
    3. **Conclusion & Interpretation:**
       - **Result: FL is ~$3.8M cheaper in Year 1 (OpEx vs CapEx).**
  options:
  - A) Centralized, because the $1.25M engineering cost for FL is too high to overcome.
  - B) They are roughly equivalent in cost, so the decision should be based on model accuracy alone.
  - C) Decentralized (FL), as its high initial engineering cost is less than the massive, recurring data transfer and compute costs.
  - D) Centralized, because data ingress costs are negligible and modern GPUs are highly efficient.
  correct_index: 2
