title: CoreML vs MPSGraph for A17 Pro Diffusion ANE Support
scenario: Apple's MPSGraph provides a GPU compute graph API for Apple platforms. You consider using MPSGraph directly instead of CoreML for a custom diffusion model.
question: Should an A17 Pro diffusion model use CoreML or MPSGraph when attention-heavy layers limit ANE support?
details:
  realistic_solution: 'MPSGraph vs CoreML tradeoffs: (1) CoreML: automatic dispatch, model caching, and iOS optimizations. Best for standard architectures. ANE support is operator-dependent, but CoreML is the path that can place supported ops on ANE and fall back when needed. (2) MPSGraph: full GPU control, supports dynamic shapes, but is effectively GPU-only and does not provide an ANE execution path. For a diffusion model (UNet with attention), CoreML is the better default if you want Apple''s runtime to use ANE where possible and handle the rest on GPU. Use MPSGraph only if you intentionally want a custom GPU-only implementation.'
  common_mistake: |
    **The Pitfall:** Treating MPSGraph as a portable, cross-platform alternative to CoreML.
    **The Rationale:** Developers confuse graph APIs with universal runtimes (like ONNX or TFLite).
    **The Consequence:** They write Apple-specific MPSGraph code expecting it to run on Android, or they bypass the ANE when CoreML would have used it for supported ops.
  napkin_math: |
    **Assumptions & Constraints:**
    - CoreML is the path that can use ANE for supported operators and GPU for unsupported operators.
    - MPSGraph is a GPU graph API and does not provide ANE execution.
    - A diffusion UNet with attention may have mixed operator support, so placement depends on which ops dominate latency.

    **Calculations:**
    - If ANE-supported convolution and normalization dominate, CoreML can accelerate those blocks and keep unsupported attention on GPU.
    - If unsupported attention or custom graph control dominates, a tuned MPSGraph implementation may avoid CoreML conversion limits, but it stays GPU-only.
    - Choosing MPSGraph solely to "use ANE" is invalid because MPSGraph has no ANE target.

    **Conclusion & Interpretation:**
    - **Result: CoreML is the better deployment default when you want ANE placement for supported ops; MPSGraph is only the right choice if you intentionally want a custom GPU-only implementation and are willing to forgo ANE execution.**
