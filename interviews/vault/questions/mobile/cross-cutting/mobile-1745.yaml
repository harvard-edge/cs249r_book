title: 'DP-SGD on Mobile NPU: Securing User Data for Federated Learning'
scenario: A health tech company is developing an on-device federated learning (FL) system for early disease detection using a mobile NPU. User sensor data and activity patterns are highly sensitive. The model will be trained locally on mobile devices, with only aggregated model updates sent to a central server. The goal is to efficiently train a MobileNetV2 variant (~3.5M parameters, FP16) on the NPU while guaranteeing strong privacy.
question: How would you implement differentially private federated learning for a MobileNetV2 health model on the mobile NPU?
details:
  realistic_solution: |
    Implement client-side DP-SGD with explicit privacy accounting. Compute per-example or microbatch gradients, clip each update to an L2 bound, add calibrated Gaussian noise using secure randomness, and report only the protected model delta through secure aggregation. The target epsilon and delta determine the noise multiplier together with the number of local steps, sampling rate, and clipping bound. On a mobile device, standard NPUs may accelerate parts of the forward/backward tensor math, but per-example gradient handling, clipping reductions, and noise generation often need CPU/GPU kernels or framework support rather than direct NPU execution. Quantization should be applied only after the DP mechanism or accounted for carefully, because changing gradient precision before noise addition can affect both utility and the privacy analysis.
  common_mistake: |
    **The Pitfall:** Applying standard DP-SGD without optimizing the L2 clipping and noise generation for the NPU's vector architecture.
    **The Rationale:** Candidates treat DP-SGD purely as a mathematical formula, overlooking the hardware penalty of massive random number generation and per-example gradient clipping.
    **The Consequence:** Local training times balloon to unacceptable levels, draining the battery and causing the mobile OS to kill the background training task.
  napkin_math: |
    **Assumptions & Constraints:**
    - 3.5M FP16 params.
    - Nominal accelerator peak: 34.7 TOPS = 34.7e12 ops/sec.
    - DP bookkeeping estimate: 10M operations per step for clipping and noise application.
    - Assume only 1% of nominal peak is usable for this irregular DP work after memory movement, reductions, random generation, and framework overhead.

    **Calculations:**
    - Ideal lower bound: 10e6 / 34.7e12 = 2.9e-7 seconds = 0.00029 ms.
    - Conservative effective time at 1% usable throughput: 0.00029 ms / 0.01 = 0.029 ms per step.
    - This estimate covers only DP bookkeeping ops, not full forward/backward training, secure aggregation, or privacy-accountant overhead.

    **Conclusion & Interpretation:**
    - **Result: DP bookkeeping is not the sole bottleneck.** The arithmetic lower bound is tiny, but real mobile DP-SGD performance is dominated by per-example gradients, memory traffic, secure noise generation, framework support, and thermal limits.
