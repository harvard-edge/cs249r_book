title: On-Device Differential Privacy for Mobile ML
scenario: Your mobile keyboard app collects typing patterns to improve next-word prediction. Apple's privacy requirements mandate local differential privacy (LDP), meaning noise is added on-device before any data leaves the phone.
question: With 100M users each contributing one data point per day, what epsilon provides meaningful utility, and how does LDP accuracy compare to central DP?
details:
  realistic_solution: Local Differential Privacy injects localized noise prior to aggregation. To maintain signal utility (reducing the estimation error to manageable thresholds), LDP architectures mandate vastly higher epsilon values (e.g., ε=4) compared to centralized DP. The computational cost of generating randomized response distributions natively on the NPU is sub-millisecond, leaving the primary challenge mathematically tethered to the aggregation phase accuracy.
  common_mistake: |
    **The Pitfall:** Using central DP epsilon values for Local Differential Privacy.
    **The Rationale:** Candidates apply standard ε=1 central DP targets to local differential privacy architectures.
    **The Consequence:** Because noise is added to each individual data point before aggregation, an ε=1 in LDP completely destroys utility; LDP requires higher epsilons (like ε=4) to maintain signal.
  napkin_math: |
    **Assumptions & Constraints:**
    - Users (N): 100M.
    - LDP Epsilon: ε=4.
    - Central DP Epsilon: ε=1.

    **Calculations:**
    - LDP error (1 / (ε * √N)): 1 / (4 * 10,000) = 0.000025.
    - Central DP error (1 / (ε * N)): 1 / 100,000,000 = 0.00000001.

    **Conclusion & Interpretation:**
    - **Result: 0.000025 Error (Algorithm-Bound)**. Both approaches are highly accurate, but LDP is intrinsically algorithm-bound requiring elevated ε limits to bridge the noise gap.
