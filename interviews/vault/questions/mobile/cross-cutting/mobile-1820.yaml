title: On-Device Differential Privacy for Mobile ML
scenario: Your mobile keyboard app collects typing patterns to improve next-word prediction. Apple's privacy requirements mandate local differential privacy (LDP), meaning noise is added on-device before any data leaves the phone.
question: With 100M users each contributing one data point per day, what epsilon provides meaningful utility, and how does LDP accuracy compare to central DP?
details:
  realistic_solution: For local differential privacy, a practical keyboard telemetry design usually needs a higher epsilon than central DP because each phone randomizes its own report before aggregation. A reasonable release answer is to evaluate ε in roughly the 3-8 range, with ε=4 as a starting point for high-volume aggregate statistics and lower values only if product utility survives measurement. At the same epsilon, central DP is much more accurate because noise is added once to the aggregate rather than independently to every user report. The main tradeoff is privacy budget versus aggregate estimation error; hardware execution time for the randomizer is not the limiting factor.
  common_mistake: |
    **The Pitfall:** Using central DP epsilon values for Local Differential Privacy.
    **The Rationale:** Candidates apply standard ε=1 central DP targets to local differential privacy architectures.
    **The Consequence:** Because noise is added to each individual data point before aggregation, an ε=1 in LDP completely destroys utility; LDP requires higher epsilons (like ε=4) to maintain signal.
  napkin_math: |
    **Assumptions & Constraints:**
    - Users (N): 100M.
    - Users (N): 100M, so sqrt(N) = 10,000.
    - Candidate LDP epsilon: ε=4 for aggregate keyboard statistics.
    - Compare scaling, not exact product error, because the exact constant depends on the chosen LDP mechanism and domain size.

    **Calculations:**
    - Local DP randomized-response-style error scales roughly with 1 / (ε * sqrt(N)) for a fixed small domain.
    - With ε=4: 1 / (4 * 10,000) = 0.000025 before mechanism-specific constants.
    - Central DP adds noise after aggregation, so for the same epsilon its aggregate error is typically far lower than LDP for high-volume counts.

    **Conclusion & Interpretation:**
    - **Result: ε≈4 is a plausible LDP starting point, but central DP gives better accuracy at the same epsilon.** LDP needs a larger epsilon or much more aggregation volume to recover utility.
