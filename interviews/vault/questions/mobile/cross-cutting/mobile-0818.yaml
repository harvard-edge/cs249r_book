title: Mobile New 0018
scenario: You load a 50MB model on a smartwatch showing 120MB of free RAM. During initialization, the `malloc` call fails, throwing an Out-Of-Memory (OOM) error, crashing the app.
question: Why does loading a 50MB model fail with an OOM error when 120MB of free RAM is available?
details:
  realistic_solution: 'The symptom of an OOM error despite seemingly adequate total free memory is caused by memory fragmentation. The inference engine requires contiguous memory blocks (either physical for NPU DMA, or virtual depending on OS limits) to load large tensors. If the 120MB free RAM is heavily fragmented into tiny chunks by other background processes, the OS cannot allocate a single 50MB contiguous block.'
  common_mistake: |
    **The Pitfall:** Assuming aggregate free memory guarantees allocation success.
    **The Rationale:** Developers often rely on total available memory metrics without considering heap fragmentation or the NPU's need for contiguous DMA buffers.
    **The Consequence:** Intermittent OOM crashes in production that are difficult to reproduce because they depend on the specific memory layout at runtime.
  napkin_math: |
    **Assumptions & Constraints:**
    - Required Block: 50MB of contiguous memory (for NPU DMA/weights).
    - Available RAM: 120MB total free.

    **Calculations:**
    - Fragmentation State: 120 isolated 1MB blocks scattered across the heap.
    - Max contiguous block available: 1MB.
    - Allocation comparison: 1MB (available) < 50MB (requested).

    **Conclusion & Interpretation:**
    - **Result: Allocation Fails (Memory-Bound)**. Memory Fragmentation prevents allocation. `malloc(50MB)` fails despite 120MB total free RAM.
