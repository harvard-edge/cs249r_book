title: Voice Assistant Bursty Queue
scenario: An A17 Pro Neural Engine transcribes voice queries. The arrival pattern occasionally bursts intensely.
question: Why do tail latency spikes occur under bursty arrivals compared to uniform arrivals despite the same average utilization?
visual:
  kind: svg
  path: mobile-1967.svg
  alt: 'Two queueing curves: bursty traffic shows latency spiking at much lower utilization
    than uniform traffic.'
  caption: Impact of arrival burstiness on wait time.
details:
  realistic_solution: Bursty arrivals increase the coefficient of variation of inter-arrival times (c_a > 1). Based on Kingman's formula, expected queueing delay scales linearly with (c_a^2 + c_s^2)/2. Thus, high burstiness geometrically amplifies wait times and tail latency, even if average utilization (rho) remains moderate.
  common_mistake: |
    **The Pitfall:** Relying purely on average utilization to predict latency.
    **The Rationale:** Engineers look at the moderate average utilization over time and assume latency will remain stable, failing to account for the variance in inter-arrival times (burstiness).
    **The Consequence:** Systems are provisioned incorrectly, leading to unexpected and severe tail latency spikes during burst events.
  napkin_math: |
    **Assumptions & Constraints:**
    - Inter-arrival time coefficient of variation ($c_a$) > 1 for bursty traffic.
    - Service time coefficient of variation ($c_s$).
    - Average utilization ($\rho$).

    **Calculations:**
    - Kingman's formula for expected wait time: $E[W] \approx (\frac{\rho}{1-\rho}) * (\frac{c_a^2 + c_s^2}{2}) * E[S]$.
    - If traffic shifts from uniform ($c_a \approx 0$) to bursty ($c_a > 1$), the multiplier $(\frac{c_a^2 + c_s^2}{2})$ grows dramatically.

    **Conclusion & Interpretation:**
    - **Result: Variance-Amplified Delay**. High burstiness geometrically amplifies queueing delay, causing severe tail latency spikes even if utilization remains moderate.
