title: Diagnosing LLM Latency Bias on Tensor G3
scenario: 'You are deploying an on-device text summarization feature using Gemini Nano on the Google Tensor G3. During subgroup evaluation, you notice a severe symptom: the generation latency spikes and battery drains excessively only when summarizing text in certain non-English languages, creating a stark demographic parity issue in user experience.'
question: What is the root cause of this disparity, and how do the hardware specifications explain the symptom?
details:
  realistic_solution: The root cause is a tokenization disparity interacting with the mobile memory hierarchy. Non-English languages often require significantly more subword tokens per word than English, so the same visible prompt can produce a much longer sequence. That expands KV cache and intermediate-state traffic during decoding. The accelerator may have enough peak TOPS for short sequences, but once the working set no longer stays cache-friendly, more data is repeatedly served from shared LPDDR5X. The result is lower effective utilization, higher memory energy, and latency/battery disparities for linguistic subgroups.
  common_mistake: |
    **The Pitfall:** Assuming the model weights themselves possess a latency bias or have simply "learned to be slower" for non-English languages.
    **The Rationale:** Engineers overlook the interaction between subword tokenization density and the physical limits of hardware memory hierarchies.
    **The Consequence:** Teams waste time retraining or fine-tuning the model instead of fixing the system-level memory allocation limit.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - English: ~1.2 tokens/word. Hindi: ~3.5 tokens/word.
       - Same user-visible summary length: 500 words.
       - LPDDR5X Bandwidth: 50 GB/s.
    2. **Calculations:**
       - English Sequence: 500 words * 1.2 tokens/word = ~600 tokens.
       - Hindi Sequence: 500 words * 3.5 tokens/word = ~1,750 tokens.
       - Relative KV/attention-state footprint: 1,750 / 600 = ~2.9x larger.
       - If the longer sequence causes even 100 MB of additional LPDDR5X traffic across a generated chunk, the bandwidth lower bound is 100 MB / 50 GB/s = ~2 ms before accelerator scheduling and cache effects.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Hierarchy Disparity.** Higher token density makes the same user-visible task much larger for the decoder, increasing KV/cache traffic and memory energy. TOPS alone does not predict latency once shared-memory traffic dominates.
