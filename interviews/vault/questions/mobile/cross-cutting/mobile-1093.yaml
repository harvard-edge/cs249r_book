title: Federated Training NPU Underutilization
scenario: "Your team is deploying a cross-device federated learning model on smartphones. During the local on-device training phase of federated averaging, telemetry reveals that the training loop is unexpectedly slow, and the NPU utilization remains stubbornly below 1% of its peak capacity."
question: "Why is this massive NPU compute resource severely underutilized during the local training phase?"
details:
  realistic_solution: "The local training process is completely memory-bound. Backpropagation with batch size 1 (typical for mobile memory limits) has exceptionally low arithmetic intensity. The NPU requires constant reads/writes of weights, activations, and gradients from the shared LPDDR5X RAM. The memory bus cannot feed the high-speed INT8 MAC arrays fast enough, leaving the compute units starved and idling."
  common_mistake: |
    **The Pitfall:** Misidentifying the bottleneck as network communication latency or thermal throttling.
    **The Rationale:** Candidates forget that backpropagation with batch size 1 has extremely low arithmetic intensity and relies heavily on memory speeds.
    **The Consequence:** Engineers waste time optimizing the network stack or NPU kernels when the system is actually starved by physical memory bandwidth limits.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - NPU Peak Compute: 45 TOPS (45,000 GOPs).
       - Shared LPDDR5X Memory Bandwidth: ~80 GB/s.
       - Arithmetic intensity (batch size 1 backprop): ~2 OPs/byte.
    2. **Calculations:**
       - Required bandwidth to saturate NPU = 45,000 GOPs / 2 OPs/byte = 22,500 GB/s.
       - Max sustainable compute given bandwidth = 80 GB/s * 2 OPs/byte = 160 GOPs.
       - Max NPU Utilization = 160 GOPs / 45,000 GOPs ≈ 0.35%.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound.** The training loop is completely starved by physical memory bandwidth, capping NPU utilization at roughly **0.35%** of its theoretical peak compute.
