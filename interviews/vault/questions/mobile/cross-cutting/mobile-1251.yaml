title: On-Device Guardrails for GenAI on Exynos 2400
scenario: You are designing the safety architecture for an on-device text generation feature. The system uses a 4B parameter LLM for content creation and requires strict on-device PII redaction and toxicity filtering guardrails.
question: How would you architect a continuous monitoring system that evaluates the tradeoffs between sequential and concurrent guardrail execution to guarantee safety without degrading the user experience?
details:
  realistic_solution: 'A robust L5 design utilizes the dual-core NPU by scheduling the main LLM on one core and a continuous, chunk-based safety classifier on the second core. Tokens are streamed to the guardrail model in small windows. This parallel execution hides the guardrail latency. The system should dynamically scale down the generation batch size if the shared LPDDR5X memory controller reports high contention from the ISP or GPU.'
  common_mistake: |
    **The Pitfall:** Designing sequential architectures where the entire text is generated before safety evaluation.
    **The Rationale:** Ignoring the shared nature of the 12 GB memory pool and the latency impact of sequential execution.
    **The Consequence:** Unacceptable user-perceived latency and static memory allocations that starve the camera (ISP) or display (GPU) processes.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Generative Model: 4B param LLM at INT4 (2 GB memory).
       - Safety Model: 150M param Classifier at INT8 (150 MB memory).
       - Shared Hardware Pool: 12 GB LPDDR5X, 34.7 TOPS NPU.
    2. **Calculations:**
       - Total Memory Footprint = 2 GB + 0.15 GB = 2.15 GB.
       - Generation Compute = 20 tokens/sec * 8 GOPS = ~0.16 TOPS (memory bound).
       - Classifier Compute = 5-token sliding window = negligible TOPS compared to capacity.
    3. **Conclusion & Interpretation:**
       **Result: Memory-Bandwidth Bound. The total compute operates comfortably within the NPU's 34.7 TOPS limit, but the unified memory controller must be monitored to avoid starving the ISP/GPU during parallel execution.**
