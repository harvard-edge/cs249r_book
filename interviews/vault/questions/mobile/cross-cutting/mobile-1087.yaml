title: Mobile DP-SGD Per-Sample Gradient Memory Wall
scenario: A team is fine-tuning a 10-million parameter personalization model using DP-SGD on a mobile NPU with unified memory. To meet a stricter privacy budget, they increase the batch size from 32 to 256. However, training throughput drops sharply, memory pressure rises, and the device quickly reaches its sustained power and thermal limits.
question: Why does increasing the DP-SGD batch size from 32 to 256 cause memory failure and thermal throttling?
details:
  realistic_solution: DP-SGD is harder on mobile memory because it needs per-sample gradient norms for clipping before averaging and adding noise. A naive implementation that stores every per-sample gradient scales roughly with batch size times model-gradient size, unlike standard SGD, which can accumulate one aggregate gradient buffer. Raising batch size from 32 to 256 therefore increases the temporary gradient footprint by about 8x. On a mobile device, that can force tiling, recomputation, allocator churn, or storage-backed memory pressure, leaving the NPU idle and increasing sustained memory traffic until thermal throttling appears. A production implementation should compute per-sample norms in chunks or use vectorized clipping techniques that avoid retaining the full batch of per-sample gradients at once.
  common_mistake: |
    **The Pitfall:** Attributing DP-SGD throttling to a lack of NPU compute capability.
    **The Rationale:** Candidates fail to understand the fundamental algorithmic difference that prevents DP-SGD from accumulating gradients in-place.
    **The Consequence:** Misdiagnosing memory thrashing as a compute limitation, resulting in futile attempts to optimize hardware execution speeds.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model gradient size: 10 million parameters x 4 bytes = 40 MB for one FP32 gradient tensor.
    - Standard SGD can keep one aggregate gradient buffer, plus model, activations, and optimizer state.
    - Naive DP-SGD materializes per-sample gradients for clipping before reduction.
    - Mobile unified memory must also hold activations, optimizer state, runtime buffers, and the OS.

    **Calculations:**
    - Aggregate SGD gradient buffer: ~40 MB, independent of batch size.
    - Naive DP-SGD temporary gradient storage at batch 32: 32 x 40 MB = 1.28 GB before activations and optimizer state.
    - Naive DP-SGD temporary gradient storage at batch 256: 256 x 40 MB = 10.24 GB before activations and optimizer state.
    - Batch-size increase: 256 / 32 = 8x more per-sample gradient storage.

    **Conclusion & Interpretation:**
    - **Result: Memory-Bound DP-SGD Overhead**. The 10.24 GB figure is the naive materialization worst case; even optimized implementations must chunk or recompute work, which raises memory traffic and can drive sustained-power throttling on mobile hardware.
