title: The Federated Learning Thermal Wall
scenario: Your team wants to A/B test on-device federated training for a driver alertness model on 1 million vehicles. Training requires continuous computation for 10 minutes.
question: Why is sustained on-device federated training blocked by a mobile SoC thermal budget?
details:
  realistic_solution: The correct diagnosis is that the thermal budget is the immediate, hard blocker. Inference workloads are typically 'bursty,' running for a few seconds at most. On-device training, however, requires a sustained, high-power compute load for several minutes. Running the SoC near its 5W limit for 10 minutes straight will overwhelm its (likely passive) cooling solution. This causes the chip's temperature to rise, triggering thermal throttling. Throttling dramatically reduces the clock speed and compute performance (TOPS), making the 10-minute training session balloon to 30+ minutes or fail entirely. This ruins the user experience and makes the entire approach unreliable.
  common_mistake: |
    **The Pitfall:** Focusing on network bandwidth or gradient privacy while ignoring physical hardware limits.
    **The Rationale:** Engineers assume edge training is just "inference run backwards" and fail to calculate the continuous power draw.
    **The Consequence:** The proposed training loops cause massive thermal throttling, effectively melting down the passive cooling of the vehicle's infotainment unit.
  napkin_math: |
    - **Inference Power:** ~2W for bursty, millisecond executions.
    - **Training Power:** Forward + backward passes require ~3x compute and constant DRAM I/O, drawing ~6W continuously.
    - **Thermal Limit:** A standard passively cooled SoC has a hard thermal ceiling of ~5W.
    - **Final Result:** **Running at 6W for 10 minutes guarantees thermal throttling within minutes, halting the system.**
  options:
  - The network cost of uploading model updates daily from 1 million cars would be too expensive.
  - The daily energy consumption from on-device training would unacceptably drain the car's main battery.
  - The SoC will exceed its 5W thermal budget during the 10-minute training session, leading to severe performance throttling.
  - The privacy risk of model gradients leaking sensitive facial data is fundamentally unsolved and a legal blocker.
  correct_index: 2
