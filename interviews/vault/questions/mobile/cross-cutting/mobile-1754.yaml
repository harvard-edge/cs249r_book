title: Fairness Evaluation of On-Device Facial Recognition on Apple A17 Pro
scenario: You are leading the ML engineering team developing an on-device facial recognition system for an iOS application. Your team has developed two candidate architectures. Architecture A is slightly larger and more complex, with higher theoretical accuracy but potentially higher inference latency. Architecture B is a more streamlined, efficient model optimized for low-latency inference, with slightly lower theoretical accuracy. Both models have undergone initial functional testing.
question: How would you design an evaluation plan to compare these two architectures for fairness, explicitly considering the constraints and capabilities of the target device?
details:
  realistic_solution: 'A realistic solution would involve a multi-faceted evaluation plan: 1. **Metric Definition:** Beyond overall accuracy, define specific fairness metrics: Demographic Parity, Equalized Odds, and Intersectional Fairness. 2. **Data Collection:** Ensure a diverse dataset. 3. **On-Device Simulation:** Utilize profiling tools to measure actual inference latency and power consumption. 4. **Subgroup Analysis:** Implement a robust framework for systematic subgroup evaluation, computing fairness metrics across all identified subgroups. 5. **Bias Mitigation:** Propose post-processing calibration or re-weighting. 6. **Reporting:** Present a comprehensive report.'
  common_mistake: |
    **The Pitfall:** Relying solely on overall accuracy metrics or proposing computationally infeasible evaluation methods for mobile chips.
    **The Rationale:** Teams port cloud-centric fairness evaluation suites that do not account for on-device inference constraints or intersectional group impact.
    **The Consequence:** Deploying a model that performs poorly on specific demographics or drains battery excessively during fairness evaluation runs.
  napkin_math: |
    **Assumptions & Constraints:**
    - Batch size of `N` images per inference run.
    - Average inference time `T` ms per image.
    - `M` demographic subgroups.
    - Total dataset of `D` images.
    - Power `P` Watts for NPU.

    **Calculations:**
    - Total evaluation time = `D x T` ms.
    - Total Energy (Joules) = `(D x T / 1000) x P`.

    **Conclusion & Interpretation:**
    - **Result: Total Energy (Energy/Time-Feasibility)**. Comparing the energy cost determines if comprehensive subgroup analysis is feasible on a battery-constrained device.
