title: The Keyboard's Privacy-Cost Dilemma
scenario: 'You are the ML Systems Engineer for a new smart keyboard app with 1 million daily active users. The Product Manager wants to A/B test two approaches for personalizing the next-word prediction model: Option A uses centralized training by uploading keystrokes, and Option B uses Federated Learning on-device.'
question: Which smart keyboard personalization approach should the A/B test use, considering privacy, battery, and data TCO?
details:
  realistic_solution: |
    The correct approach is to recommend Federated Learning (Option B). The primary reason is the preservation of user privacy; uploading raw user keystrokes is a significant security and ethical liability that should be avoided at all costs. Quantitatively, FL is also cheaper under the stated operating-cost assumptions: centralized collection and retraining is about $24,000/year, while federated aggregation is about $3,600/year. While FL externalizes some computation to the user's device, the per-round battery impact is small enough to be acceptable when scheduled carefully. The A/B test should proceed, but only with variants of the Federated Learning approach.
  common_mistake: |
    **The Pitfall:** Focusing on a single metric, like battery drain or cloud cost, in isolation.
    **The Rationale:** Engineers argue that on-device training is unacceptable due to battery impact without calculating its actual (small) magnitude, or miscalculate the data scale.
    **The Consequence:** Choosing the centralized approach and treating the massive privacy risk of uploading raw keystrokes as a minor issue, exposing the company to massive liability.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Users: 1M DAU.
       - Usage: 100 keystrokes/day, 50 bytes/keystroke.
       - Typical phone battery: 15,000 mWh.
       - Centralized compute/storage/networking cost: ~$2,000/month.
       - Federated aggregation compute/bandwidth cost: ~$300/month.
    2. **Calculations:**
       - Option A Centralized TCO:
         - Data volume: 1M * 100 * 50 bytes = 5 GB/day raw text.
         - Training compute: Fine-tuning a small LM on 5 GB/day text -> ~$50/day on A100.
         - Monthly operating cost: ~$1,500 compute + $500 storage/networking = ~$2,000/month = ~$24,000/year.
       - Option B Federated TCO:
         - On-device training energy: 5 min/round * 500 mW average incremental draw = 41.7 mWh per round.
         - Battery impact: 41.7 mWh / 15,000 mWh = 0.28% per round.
         - Server cost: 1M users * 1 KB gradient update = 1 GB/round.
         - Monthly server cost: ~$300 for aggregation compute + bandwidth = ~$3,600/year.
    3. **Conclusion & Interpretation:**
       - **Result: Privacy-Bound. Option B saves ~$20.4K/year with an immediate win on privacy and a manageable per-round battery impact when scheduled opportunistically.**
  options:
    - Choose Centralized (A). The battery drain from on-device training is unacceptable and will cause user churn.
    - Choose Centralized (A). The annual data upload cost of $24,000 is high, but still cheaper than the data costs from federated learning updates.
    - Choose Federated (B). It has a lower annual operating TCO (~$3.6K vs ~$24K) and critically, avoids uploading sensitive user keystrokes, making it the only viable option from a privacy standpoint.
    - Choose Federated (B), because its annual data TCO is only $3,600, which is an order of magnitude cheaper than the Centralized approach's multi-million dollar data bill.
  correct_index: 2
