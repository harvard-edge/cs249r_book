title: FedAvg Memory Bottleneck on Hexagon NPU
scenario: 'A cross-device Federated Averaging (FedAvg) client runs on a Snapdragon 8 Gen 3 device. The local update phase processes a dataset of 1,000 user samples. The model requires 2 GOPS of compute and 160MB of memory operations (weights, activations, gradients) per sample. Engineers expected the local training epoch to finish in under 50ms by utilizing the NPU. Instead, the system logs show the local epoch takes exactly 2.5 seconds. Given the device uses shared LPDDR5X RAM with an effective bandwidth of 64 GB/s.'
question: 'Why does a FedAvg local epoch take 2.5 seconds instead of under 50ms despite high TOPS?'
details:
  realistic_solution: 'The local FL training phase is deeply memory-bound. Because federated learning on mobile devices often processes samples sequentially or with very small batch sizes to preserve memory, the arithmetic intensity (operations per byte transferred) is incredibly low. Even though the NPU can execute 45 trillion operations per second, it spends the vast majority of its time starving for data. The execution time is fundamentally dictated by the time it takes the shared LPDDR5X memory to shuttle the weights and gradients back and forth, completely ignoring the NPU''s peak compute capabilities.'
  common_mistake: |
    **The Pitfall:** Assuming the NPU's peak TOPS is the sole factor determining training latency.
    **The Rationale:** Engineers look at the marketing specs (45 TOPS) and the small dataset size and assume the compute will be trivial.
    **The Consequence:** Failing to calculate the memory bandwidth limit, leading to incorrect performance expectations and misdiagnosing the 2.5s delay as thermal throttling or OS overhead.
  napkin_math: |
    **Assumptions & Constraints:**
    - Compute Requirement: 1,000 samples × 2 GOPS = 2,000 GOPS (2 TOPS).
    - Hardware: NPU at 45 TOPS, Memory Bandwidth at 64 GB/s.
    - Memory Requirement: 1,000 samples × 160 MB/sample = 160 GB total transfer.

    **Calculations:**
    - Compute-Bound Time: 2 TOPS / 45 TOPS = 0.044 seconds (44 ms).
    - Memory-Bound Time: 160 GB / 64 GB/s = 2.5 seconds.
    - Arithmetic Intensity: 2 GOPS / 160 MB = 12.5 OPS/byte.
    - Roofline Ridge: 45,000 GOPS / 64 GB/s ≈ 703 OPS/byte.

    **Conclusion & Interpretation:**
    - **Result: Memory-Bound Execution**. Because the workload's arithmetic intensity (12.5) is vastly lower than the hardware ridge point (703), the NPU idles waiting on DRAM, resulting in exactly **2.5s** of data transfer latency.
