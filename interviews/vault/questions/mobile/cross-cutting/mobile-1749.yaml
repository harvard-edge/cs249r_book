title: Optimizing DP-SGD on Snapdragon 8 Gen 3 Hexagon NPU for Mobile Privacy
scenario: You are tasked with optimizing an on-device federated learning system using DP-SGD. Training occurs on devices equipped with a mobile NPU. The current implementation uses a fixed noise calibration for an epsilon of 8, but training is 2x slower and consumes 3x more power than non-private training. The overhead is due to Gaussian noise and gradient clipping operations, which are not mapped to the NPU's INT8 capabilities.
question: How would you optimize DP-SGD clipping and noise generation on a mobile NPU without weakening privacy guarantees?
details:
  realistic_solution: Optimize the implementation while preserving the exact DP-SGD mechanism. Fuse per-example clipping, norm computation, and aggregation kernels where possible, use vectorized DSP/NPU paths for reductions, and keep the Gaussian noise sampler statistically validated rather than naively quantizing the distribution. Fixed-point arithmetic is acceptable only if the rounding and sampler have a privacy review showing they implement the intended clipped Gaussian mechanism. Tune batch size, micro-batching, and scheduling to reduce overhead, but keep the production accountant, clipping norm, noise multiplier, and randomness source unchanged unless the privacy analysis is rerun.
  common_mistake: |
    **The Pitfall:** Blindly reducing the privacy budget (epsilon) or skipping NPU architectural nuances.
    **The Rationale:** Engineers assume standard PyTorch CPU ops are sufficient, or they attempt to arbitrarily scale the math down without understanding the DP guarantees.
    **The Consequence:** The model utility completely tanks, or the privacy guarantees are broken by imprecise mathematical mapping.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Bottleneck: Noise addition and clipping consume 40% of DP-SGD training time.
       - Hardware: Mobile NPU with INT8 acceleration.
    2. **Calculations:**
       - Kernel Optimization: Custom INT8 kernel accelerates noise/clipping by 75%.
       - Throughput Gain: Overall training time reduced by 0.40 * 0.75 = 30%.
    3. **Conclusion & Interpretation:**
       - **Result: 30% latency/power reduction. The optimization improves runtime and energy, but it does not by itself change epsilon or permit a tighter privacy budget without rerunning the DP accountant.**
