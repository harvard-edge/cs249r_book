title: The Federated vs. Centralized Data Cost
scenario: You're an ML systems engineer at a startup developing a new smart keyboard for mobile devices. To improve your prediction models, you need to analyze typing data from your users. Management is considering two strategies.
question: What daily centralized upload cost results from 1M users sending 10 MB each at $0.09 per GB?
details:
  realistic_solution: The correct approach is to first calculate the total data volume per day and then multiply by the cost per GB.
  common_mistake: |
    **The Pitfall:** Making a unit conversion error.
    **The Rationale:** Candidates often forget to convert from Megabytes (MB) to Gigabytes (GB) or use the wrong conversion factor, or simply ignore data-per-user.
    **The Consequence:** This leads to an answer that is wildly inaccurate, making the cost seem catastrophic ($900,000/day) or plausible but wrong ($90,000/day).
  napkin_math: |
    **Assumptions & Constraints:**
    - 1,000,000 users.
    - 10 MB per user data size.
    - Cloud bandwidth cost is $0.09 per GB.

    **Calculations:**
    - Calculate daily data: 1,000,000 users * 10 MB/user = 10,000,000 MB/day.
    - Convert MB to GB: 10,000,000 MB / 1000 = 10,000 GB/day.
    - Calculate cloud bandwidth cost: 10,000 GB * $0.09/GB = $900 per day.

    **Conclusion & Interpretation:**
    - **Result: $900 per day (Network-Bandwidth Bound)**. Highlights the significant hidden cost of centralized data upload versus federated learning.
  options:
  - '$900,000 per day'
  - '$90,000 per day'
  - '$900 per day'
  - '$9 per day'
