title: Guardrail CPU Fallback on Hexagon NPU
scenario: To comply with our organizational AI accountability framework, we deployed a local 3B-parameter LLM alongside a 100M-parameter FP32 toxicity guardrail on a flagship device. The system exhibits severe UI stuttering and battery drain precisely when the output guardrail is invoked. Profiling shows NPU utilization drops near zero while the CPU maxes out during the safety check.
question: Why does invoking a 100M FP32 toxicity guardrail max the CPU and stall a Snapdragon 8 Gen 3 LLM app?
details:
  realistic_solution: The root cause is an operator precision mismatch causing a CPU fallback. The NPU excels at INT8 operations, but the FP32 guardrail model forces the heterogeneous scheduler to execute it on the CPU. This causes expensive context switching and memory bandwidth thrashing. The fix is to quantize the guardrail model to INT8 and ensure all its operators are supported by the NPU architecture.
  common_mistake: |
    **The Pitfall:** Assuming the shared memory is exhausted or blaming the LLM sequence length.
    **The Rationale:** Candidates overlook hardware-software co-design, specifically that FP32 models cannot be accelerated efficiently by INT8-optimized NPUs.
    **The Consequence:** They fail to quantize the guardrail, leaving it stuck causing a CPU bottleneck.
  napkin_math: |
    **Assumptions & Constraints:**
    - FP32 is unsupported on NPU, forcing CPU fallback.
    - CPU compute (FP32): 50 GFLOPs takes ~200ms.
    - NPU compute (INT8): 45 TOPS available.

    **Calculations:**
    - NPU time (assuming 10% utilization): 50 GOPs / 4.5 TOPS = ~11ms.

    **Conclusion & Interpretation:**
    - **Result: Quantizing to INT8 moves computation to NPU, dropping latency from 200ms to 11ms (Compute-Bound).** Hardware-software co-design is critical.
