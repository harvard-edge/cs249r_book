title: 'The Drowsy Driver Dilemma: Centralized vs. Federated TCO'
scenario: You are the lead ML Systems Engineer for a new 'Driver Drowsiness' feature
  deploying to a fleet of 100,000 vehicles. To continuously improve the model, you
  must choose between Centralized Collection or Federated Learning.
question: 'Which strategy yields a lower Total Cost of Ownership (TCO) for a 100K-vehicle
  driver drowsiness fleet: centralized collection or Federated Learning?'
details:
  realistic_solution: Federated Learning is overwhelmingly the more cost-effective
    solution, coming in at over $75,000 cheaper annually. The key insight is that
    while the per-unit data upload for FL is small, the sheer scale of the fleet and
    the frequency of updates make data transfer a first-class cost. The centralized
    approach, despite fewer updates, involves transferring massive volumes of raw
    data, making its egress costs prohibitively expensive. This analysis doesn't even
    include the significant (but hard to quantify) cost of a potential privacy breach
    from storing user videos, which FL is designed to prevent.
  common_mistake: '**The Pitfall:** Ignoring second-order network egress costs when
    evaluating system architectures.

    **The Rationale:** Engineers focus strictly on cloud GPU training costs and miscalculate
    data volume by mixing up per-user daily figures with fleet-wide annual numbers.

    **The Consequence:** Selecting a centralized architecture that incurs massive,
    continuous data transfer costs, making the project economically unviable.

    '
  napkin_math: '**Assumptions & Constraints:**

    - Fleet Size: 100,000 vehicles.

    - Egress Pricing: $0.09/GB.

    - Centralized Collection: 10 MB/day per vehicle.

    - Federated Learning: 50 KB/week per vehicle.


    **Calculations:**

    - Centralized Egress: 100,000 * 10 MB/day = 1,000 GB/day. Cost = $90/day or ~$32,850/year.

    - Centralized Total Cost: $32,850 + $50,000 (Cloud GPU) = ~$82,850/year.

    - Federated Egress: 100,000 * 50 KB/week = 5 GB/week. Cost = $0.45/week or ~$23.40/year.

    - Federated Total Cost: $23.40 + $5,000 (Aggregation) = ~$5,023.40/year.


    **Conclusion & Interpretation:**

    - **Result: ~$78,000/year savings (Network-Bound)**. Federated Learning provides
    massive cost reductions because mobile networks penalize high continuous data
    egress.

    '
  options:
  - 'Centralized is cheaper: the $5,000 training cost is high but FL''s daily uploads
    add up to more.'
  - 'The costs are roughly equivalent: as FL''s high frequency of uploads cancels
    out its smaller data size.'
  - Federated Learning is cheaper by over $75,000 per year.
  - Centralized is cheaper because the weekly cloud training cost of $5,000 dominates
    all other factors.
  correct_index: 2
