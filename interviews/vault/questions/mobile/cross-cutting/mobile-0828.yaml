title: Mobile New 0029
scenario: An edge server in a closed metal box processes IP cameras. It works well at night (15C ambient) but restarts randomly during the day (35C ambient). Logs show kernel panics with no software errors.
question: Why does an edge server in a closed metal box reboot during the day but work at night?
details:
  realistic_solution: 'The system is encountering a catastrophic thermal trip limit (PROCHOT). In a passively cooled, enclosed metal chassis, the baseline cooling efficiency is entirely dependent on the ambient temperature. When daytime ambient temperatures rise to 35C, the thermal resistance prevents adequate heat dissipation. As the NPU and CPU execute heavy computer vision workloads, the silicon junction temperature (Tj) rapidly escalates past the maximum safe operating threshold (Tjmax). To prevent physical silicon degradation, the motherboard''s hardware supervision circuit triggers an instantaneous electrical power cut, manifesting as a hard kernel panic or reset.'
  common_mistake: |
    **The Pitfall:** Ignoring seasonal ambient temperature fluctuations.
    **The Rationale:** Engineers assume standard climate-controlled data center environments when deploying edge AI.
    **The Consequence:** Unpredictable hardware resets during peak ambient temperatures due to thermal limits.
  napkin_math: |
    **Assumptions & Constraints:**
    - Night ambient (T_ambient): 15C.
    - Day ambient (T_ambient): 35C.
    - Thermal resistance (R_thermal): 3 C/W.
    - System Power: 25W.
    - Max junction temperature (Tjmax): 105C.

    **Calculations:**
    - Night T_die: 15C + (25W * 3 C/W) = 15C + 75C = 90C.
    - Day T_die: 35C + (25W * 3 C/W) = 35C + 75C = 110C.

    **Conclusion & Interpretation:**
    - **Result: 110C (Thermally-Bound)**. Since the daytime T_die (110C) explicitly exceeds Tjmax (105C), the hardware natively triggers an instantaneous, ungraceful shutdown.
