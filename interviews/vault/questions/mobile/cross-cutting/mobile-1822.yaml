title: Differential Privacy Impact on On-Device Model Size
scenario: You're training a private on-device recommendation model on an A17 Pro. The model has 5M parameters. DP-SGD with per-sample gradients requires storing individual gradients for each sample in the batch.
question: With batch size 32, how much memory do per-sample gradients consume, and does this fit alongside the model and activations within the OS app limits?
details:
  realistic_solution: 'Direct answer: storing all per-sample gradients for batch size 32 costs 5M * 4 bytes * 32 = 640 MB. A consistent full-memory estimate is model weights: 20 MB, Adam optimizer state: 40 MB for momentum and variance, per-sample gradients: 640 MB, and activations/workspace: about 100 MB, for roughly 800 MB before framework overhead. That can fit under a 2-4 GB iOS app budget, but it is tight and fragile once the runtime, camera/UI memory, and temporary tensors are included. Practical workaround: compute each per-sample gradient, clip it, add it to an accumulated batch gradient, then discard it. That streaming DP-SGD path stores only a current gradient plus accumulator, about 40 MB for gradients, but it is an implementation strategy rather than the answer to the raw per-sample-gradient storage question.'
  common_mistake: |
    **The Pitfall:** Calculating the raw gradient size and assuming it easily fits within the physical RAM.
    **The Rationale:** Engineers forget to account for activations, optimizer states, and most importantly, the OS's strict per-app memory limits (typically 2-4 GB).
    **The Consequence:** The training process will immediately crash due to an OS-level Out-Of-Memory (OOM) eviction.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: 5M parameters (FP32, 4 bytes/param).
    - Batch Size: 32.
    - Adam optimizer state stores momentum and variance in addition to weights.
    - App Memory Budget: roughly 2-4 GB depending on device state.

    **Calculations:**
    - Per-Sample Gradients: 5M * 4 bytes * 32 samples = 640 MB.
    - Model Weights: 5M * 4 bytes = 20 MB.
    - Adam State: 5M * 4 bytes * 2 = 40 MB.
    - Activations and Workspace: about 100 MB.
    - Total if all per-sample gradients are stored: 640 MB + 20 MB + 40 MB + 100 MB = about 800 MB.
    - Streaming alternative: current gradient + accumulated clipped gradient = 5M * 4 bytes * 2 = 40 MB for gradients.

    **Conclusion & Interpretation:**
    - **Result: 640 MB for the per-sample gradients and about 800 MB total before framework overhead.** It may fit, but streaming clipped gradients is the safer mobile DP-SGD implementation.
