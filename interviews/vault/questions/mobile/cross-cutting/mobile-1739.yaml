title: Federated Predictive Text Learning on Apple A17 Pro
scenario: You are designing a privacy-preserving on-device learning system for a next-generation predictive text keyboard using federated learning on iPhones equipped with the Apple A17 Pro chip.
question: How would your design orchestrate federated averaging for millions of A17 Pro devices handling non-IID data?
details:
  realistic_solution: |
    Run cross-device FedAvg in scheduled rounds with eligibility checks for charging state, Wi-Fi, battery level, and recent keyboard activity. Sample a small, diverse cohort per round, cap per-region and per-language participation to reduce non-IID skew, and use secure aggregation with differential privacy where required. Mitigate communication cost via top-K gradient sparsification, INT8 quantization, and small personalization layers kept local with FedPer-style updates. Handle stragglers by using round deadlines and minimum quorum thresholds, then aggregate only updates that arrive before the cutoff. Exploit the A17 Pro Neural Engine via Core ML for low-energy local forward/backward-compatible adaptation where supported, while keeping raw text on device.
  common_mistake: |
    **The Pitfall:** Ignoring device heterogeneity and network uplink constraints.
    **The Rationale:** Engineers assume simple Federated Averaging will scale without significant modifications tailored to device constraints or non-IID data.
    **The Consequence:** Models that diverge quickly, consuming excessive battery and triggering cellular data overages.
  napkin_math: |
    **Assumptions & Constraints:**
    - Fleet size: 100,000,000 devices.
    - Dense update size: 1 MB per device.
    - Average upload speed: 5 Mbps (0.625 MB/s).

    **Calculations:**
    - Global network traffic: 1 MB * 100,000,000 = 100 TB per round.
    - Device upload time: 1 MB / 0.625 MB/s = 1.6 seconds.

    **Conclusion & Interpretation:**
    - **Result: 100 TB total upload (Network-Bandwidth Bottleneck)**. This creates a severe network-bandwidth bottleneck. Differential compression is mandatory to reduce payload size.
