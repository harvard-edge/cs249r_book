title: The Federated Economics Trade-Off
scenario: A driver fatigue detection feature requires 50 MB of processed sensor data per user per day for training. The pilot program has 100,000 users.
question: What monthly data volume does centralized collection generate for 100,000 users uploading 50 MB per day for 30 days?
details:
  realistic_solution: 'The centralized approach incurs a massive data upload cost, while the federated approach''s primary cost is the energy consumed on the user''s device, impacting their battery life.'
  common_mistake: |
    **The Pitfall:** Stating federated learning is completely "free."
    **The Rationale:** While engineers correctly identify the massive cloud upload costs (150 TB), they ignore the on-device compute and battery costs of federated learning.
    **The Consequence:** Blindsiding mobile users with severe battery drain because the compute cost was never factored into the architectural trade-off.
  napkin_math: |
    **Assumptions & Constraints:**
    - Daily Data per User: 50 MB.
    - Users: 100,000.
    - Duration: 30 days (1 month).

    **Calculations:**
    - Monthly Data per User: 50 MB * 30 days = 1,500 MB (1.5 GB).
    - Total Monthly Data: 1.5 GB * 100,000 users = 150,000 GB.
    - Total Volume: 150,000 GB / 1000 = 150 TB.

    **Conclusion & Interpretation:**
    - **Result: 150 TB per month (Network-Bound)**. Centralized collection generates 150 TB of data per month, drastically increasing cloud ingest costs over federated learning.
  options:
  - '5 TB'
  - '150 GB'
  - '150 TB'
  - '1.5 GB'
