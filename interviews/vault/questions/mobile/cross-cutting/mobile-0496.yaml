title: The Federated Photobomber Fallacy
scenario: You are an ML Systems Engineer on a popular photo-sharing app with 10 million
  active users. Your team wants to A/B test a new feature trained via Federated Learning
  to remove photobombers.
question: What cost makes the proposed Federated Learning training plan impractical
  despite privacy benefits?
details:
  realistic_solution: The primary bottleneck is the unacceptable cumulative battery
    drain on each user's device. While a single 5-second training round is trivial,
    repeating it a thousand times imposes a massive energy cost that users will notice
    and complain about. This death by a thousand cuts makes the proposed FL strategy
    economically and practically infeasible, as it would severely degrade the app
    experience and lead to uninstalls.
  common_mistake: '**The Pitfall:** Focusing exclusively on the network costs of FL.

    **The Rationale:** Engineers correctly identify that uploading gradients is expensive,
    but significantly underestimate the aggregate user-side cost of on-device computation.

    **The Consequence:** Deploying an FL system that causes unacceptable battery drain,
    harming user experience and leading to app uninstalls.

    '
  napkin_math: '**Assumptions & Constraints:**

    - FL Rounds: 100.

    - Model: 50M params (0.1 GB).

    - Compute Energy: ~4W for 30s per 100 batches.

    - Network Energy: 1W over WiFi (100 MB/s).


    **Calculations:**

    - Compute Energy: 4W * 30s = 120 Joules.

    - Network Energy: 0.1 GB / 100 MB/s = 1s -> 1W * 1s = 1 Joule.


    **Conclusion & Interpretation:**

    - **Result: Energy-Bound.** Compute energy (120J) massively dominates network
    energy (1J), rendering repeated FL updates parasitic to battery life.

    '
  options:
  - The network bandwidth required to upload model updates from 10 million clients
    across 1,000 rounds is the primary cost bottleneck.
  - The cumulative on-device energy consumption will lead to unacceptable battery
    drain for users.
  - The cloud compute cost for the central server to aggregate gradients from millions
    of clients will be the most expensive part of the system.
  - The model will likely have poor final accuracy due to non-IID data from users,
    making the effort technically infeasible regardless of cost.
