title: Portable On-Device LLM Inference Across Mobile Platforms
scenario: 'You want to run a 3B parameter LLM on-device for a mobile chat app. Target devices: iPhone 15 Pro and Samsung Galaxy S24. The model must fit in memory and generate >10 tokens/sec on both.'
question: How would you serve a 3B LLM at over 10 tok/s on both A17 Pro and Snapdragon 8 Gen 3 without exceeding mobile memory?
details:
  realistic_solution: |
    Use one portable serving layer and two hardware backends. Package the model as GGUF with Q4_K_M weights, run it through llama.cpp, and keep a common tokenizer, prompt format, scheduler, context cap, and sampling path across platforms. On iOS, use the Metal backend on Apple GPU with a CPU fallback for unsupported kernels; on Android, use the Vulkan backend on Adreno-class GPUs with CPU fallback when a device or driver lacks fast coverage. Cap context at 2048 tokens by default, prefill in bounded chunks, avoid multi-session batching on 8 GB devices, and expose runtime feature flags so the app can lower context, reduce threads, or switch backend when thermals or measured tok/s degrade. The >10 tok/s goal is plausible only after per-device benchmarking under the chosen context cap and thermal state.
  common_mistake: |
    **The Pitfall:** Using the same quantization level on both platforms without checking constraints.
    **The Rationale:** iPhone 15 Pro has only 8GB RAM (shared with OS), while S24 has 12GB.
    **The Consequence:** The model will OOM on the iPhone if not aggressively quantized to W4.
  napkin_math: |
    **Assumptions & Constraints:**
    - Quantization: Q4_K_M (4-bit).
    - Parameters: 3B.
    - Context Length: 2048.

    **Calculations:**
    - Weights Size (Q4_K_M): 3B params * 0.5625 bytes = 1.69 GB.
    - KV Cache Size (typical 3B GQA, 2048 ctx, FP16 K/V): about 0.20 GB.
    - Core runtime footprint: 1.69 GB + 0.20 GB = 1.89 GB before allocator and framework overhead.
    - Add estimated allocator/scratch overhead of 0.3-0.6 GB, giving about 2.2-2.5 GB typical resident pressure.
    - If measured decode falls below 10 tok/s under heat, reduce context, use a smaller quantization variant, or fall back to a lower-capability mode.

    **Conclusion & Interpretation:**
    - **Result: ~2.2-2.5 GB practical footprint with a conditional throughput target.** A Q4 model with a 2048-token context cap can fit on both target phones, but >10 tok/s depends on the Metal/Vulkan backend, context length, thermals, and measured operator coverage.
