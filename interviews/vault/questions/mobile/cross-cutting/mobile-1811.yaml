title: Portable On-Device LLM Inference Across Mobile Platforms
scenario: 'You want to run a 3B parameter LLM on-device for a mobile chat app. Target devices: iPhone 15 Pro and Samsung Galaxy S24. The model must fit in memory and generate >10 tokens/sec on both.'
question: How would you serve a 3B LLM at over 10 tok/s on both A17 Pro and Snapdragon 8 Gen 3 without exceeding mobile memory?
details:
  realistic_solution: 'Architecture: (1) Model format: GGUF via llama.cpp, which runs on both Metal (iOS) and Vulkan/OpenCL (Android). (2) Quantization: W4 group quantization (Q4_K_M in GGUF) so 3B model weights are ~1.7GB. (3) Serving policy: single-user interactive decoding, 2048-token context cap by default, prefill in bounded chunks, and no batching across conversations on 8GB devices. (4) Memory: KV cache for a typical 3B GQA model at 2048 context is roughly 200MB, so weights plus KV cache are ~1.9GB before runtime overhead. (5) iOS: llama.cpp with Metal backend on Apple GPU, not ANE. Android: llama.cpp with Vulkan on Adreno 750. With Q4 weights and the context cap, both devices can stay under mobile memory pressure and sustain >10 tok/s for decode.'
  common_mistake: |
    **The Pitfall:** Using the same quantization level on both platforms without checking constraints.
    **The Rationale:** iPhone 15 Pro has only 8GB RAM (shared with OS), while S24 has 12GB.
    **The Consequence:** The model will OOM on the iPhone if not aggressively quantized to W4.
  napkin_math: |
    **Assumptions & Constraints:**
    - Quantization: Q4_K_M (4-bit).
    - Parameters: 3B.
    - Context Length: 2048.

    **Calculations:**
    - Weights Size (Q4_K_M): 3B params * 0.5625 bytes = 1.69 GB.
    - KV Cache Size (typical 3B GQA, 2048 ctx, FP16 K/V): about 0.20 GB.
    - Core Runtime Footprint: 1.69 GB + 0.20 GB = 1.89 GB before allocator and framework overhead.

    **Conclusion & Interpretation:**
    - **Result: ~1.9 GB core footprint (Memory-Bound)**. A Q4 model with a 2048-token context cap leaves enough headroom on both target phones to use GPU-backed decode and sustain the >10 tok/s target.
