title: 'The Core Premise of Federated Learning'
scenario: 'You''re on a team building a new smart keyboard feature that learns from user typing patterns. A junior engineer suggests just uploading all the raw text to your servers for training. As a senior engineer, you counter that Federated Learning is a better approach.'
question: 'What is the primary reason you''d state for using Federated Learning in this mobile context?'
details:
  realistic_solution: |
    The primary and non-negotiable benefit of Federated Learning is that it preserves user privacy. Raw, sensitive data never leaves the user's device. Instead, the model is trained locally, and only the resulting anonymous model updates are sent to a central server.
  common_mistake: |
    **The Pitfall:** Believing the primary benefit is reducing network bandwidth or improving model accuracy.
    **The Rationale:** Engineers prioritize infrastructure efficiency or metrics over privacy requirements.
    **The Consequence:** Architecting a non-private system that creates a catastrophic data breach risk.
  napkin_math: |
    **Assumptions & Constraints:**
    - Local training power: 4W for 10s.

    **Calculations:**
    - Energy = 4W * 10s = 40 Joules.

    **Conclusion & Interpretation:**
    - **Result: 40 Joules (Privacy-Bound)**. FL trades negligible device energy for massive risk reduction.
  options:
  - 'It produces more accurate models by specializing on each user''s data.'
  - 'It keeps raw user data on the device, enhancing user privacy.'
  - 'It reduces network bandwidth costs by sending small gradient updates instead of large datasets.'
  - 'It allows for faster overall model training compared to centralized methods.'
  correct_index: 1
