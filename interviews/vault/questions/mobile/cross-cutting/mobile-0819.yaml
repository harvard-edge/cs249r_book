title: Flatbuffer Alignment Shifts in OTA Updates
scenario: An app updates a deployed 100MB model over the air (OTA) using binary deltas. You changed just
  one bias value in the model. The resulting OTA delta file is still 98MB, consuming massive user bandwidth.
question: Why can changing one bias value make an OTA delta for a 100MB model nearly as large as the full
  model?
details:
  realistic_solution: The symptom of a massive delta file for a tiny model change is caused by global
    ZIP compression. If the entire model is bundled in a newly compressed ZIP archive, changing even one
    bias value completely alters the deflate compression stream. The binary diff algorithm (like bsdiff)
    sees almost every byte in the file as modified, resulting in a delta nearly the size of the original
    model.
  common_mistake: '**The Pitfall:** Assuming logical model updates map directly to minimal binary diffs.

    **The Rationale:** Developers forget that inserting values or using global ZIP compression completely
    alters the downstream byte stream of the package.

    **The Consequence:** The binary diff algorithm perceives almost every byte in the file as modified,
    resulting in massive OTA update payloads.'
  napkin_math: '**Assumptions & Constraints:**

    - Original Model: 100 MB.

    - Binary Diff algorithm: bsdiff.

    - Packaging: Entire model bundled in a compressed ZIP archive.


    **Calculations:**

    - Change: Weight 0 is changed by a few bytes.

    - Deflate compression cascades the single value change into entirely new compressed byte representations
    for the rest of the archive.

    - Binary Diff compares old ZIP vs new ZIP.

    - Almost every single subsequent compressed byte mismatches.


    **Conclusion & Interpretation:**

    - **Result: ~98MB Delta (Network-Bandwidth-Bound)**. Global ZIP compression alters the entire byte
    stream when a single value changes, defeating standard delta compression algorithms.'
