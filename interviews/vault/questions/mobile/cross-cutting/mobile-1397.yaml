title: On-Device Guardrail Architecture for Exynos
scenario: You are tasked with designing an on-device safety guardrail system that filters toxic inputs and hallucinated outputs for a local LLM assistant on a shared-memory mobile NPU.
question: How would you design a concurrent architecture that ensures strict policy enforcement without degrading the user experience or starving the ISP during multimodal tasks?
details:
  realistic_solution: Design a speculative, asynchronous guardrail architecture. The primary LLM streams tokens to the UI while a smaller, INT8-quantized classifier evaluates input and output chunks in parallel on reserved NPU time slices. If toxicity is detected, the UI blocks or redacts the affected span before committing it as final. Memory is strictly partitioned, reserving at least 5 GB for OS/ISP/GPU and capping the 4-bit LLM, KV cache, guardrail model, and shared buffers at 7 GB. The scheduler should give ISP/camera DMA priority during multimodal use and throttle LLM token generation before starving safety checks or camera work.
  common_mistake: |
    **The Pitfall:** Proposing a sequential guardrail execution or forgetting that mobile memory is unified.
    **The Rationale:** Engineers treat the LLM like a cloud API and assume all 12 GB of RAM is dedicated.
    **The Consequence:** Unacceptable user-perceived latency and frequent OOM crashes when the ISP claims memory.
  napkin_math: |
    **Assumptions & Constraints:**
    - Total RAM: 12 GB, with 5 GB reserved for OS/GPU/ISP.
    - LLM (3B 4-bit) = 1.5 GB. KV cache = 1 GB.
    - Guardrail model (200M 8-bit) = 200 MB.
    - Guardrail checks 50-token chunks with roughly 2 ops/parameter/token.

    **Calculations:**
    - AI RAM required = 1.5 GB + 1 GB + 0.2 GB = 2.7 GB, leaving 4.3 GB under the 7 GB AI limit for activations and shared buffers.
    - Guardrail compute = 2 * 200M * 50 = 20 GOPs = 0.020 TOPs.
    - Ideal compute time = 0.020 TOPs / 34.7 TOPS = 0.000576 s = ~0.58 ms before scheduling and memory overhead.

    **Conclusion & Interpretation:**
    - **Result: ~2.7 GB static AI footprint and ~0.58 ms ideal guardrail compute per chunk.** The core design risk is concurrent scheduling and shared-memory contention, so enforce reservations and QoS rather than assuming peak TOPS is available.
