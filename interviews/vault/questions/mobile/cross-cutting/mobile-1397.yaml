title: On-Device Guardrail Architecture for Exynos
scenario: 'You are tasked with designing an on-device safety guardrail system that filters toxic inputs and hallucinated outputs for a local LLM assistant on a shared-memory mobile NPU.'
question: 'How would you design a concurrent architecture that ensures strict policy enforcement without degrading the user experience or starving the ISP during multimodal tasks?'
details:
  realistic_solution: 'Design a speculative, asynchronous guardrail architecture. The primary LLM streams tokens to the UI while a smaller, INT8-quantized classifier model evaluates chunks of output in parallel on the second NPU core. If toxicity is detected, the UI redacts the output retroactively. Memory is strictly partitioned, reserving at least 5 GB for OS/ISP/GPU, leaving 7 GB for the 4-bit main LLM, KV cache, and the compact guardrail model.'
  common_mistake: |
    **The Pitfall:** Proposing a sequential guardrail execution or forgetting that mobile memory is unified.
    **The Rationale:** Engineers treat the LLM like a cloud API and assume all 12 GB of RAM is dedicated.
    **The Consequence:** Unacceptable user-perceived latency and frequent OOM crashes when the ISP claims memory.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Total RAM: 12 GB (5 GB reserved for OS/GPU/ISP).
       - LLM (3B 4-bit) = 1.5 GB. KV Cache = 1 GB.
       - Guardrail model (200M 8-bit) = 200 MB.
    2. **Calculations:**
       - AI RAM required = 1.5 GB + 1 GB + 0.2 GB = 2.7 GB < 7 GB limit.
       - Guardrail compute: 2 * 200M * 50 tokens = 20 GOPs.
       - Compute time: 20 GOPs / 34.7 TOPS = ~0.57 ms.
    3. **Conclusion & Interpretation:**
       - **Result: 0.57 ms (Compute is sufficient, Memory Bandwidth bounds the system).**
