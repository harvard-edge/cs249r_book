title: Architecting Federated PEFT for LLMs on Tensor G3
scenario: A cross-device federated learning system personalizes an on-device LLM for predictive text formatting on devices powered by the Google Tensor G3 (12 GB LPDDR5X, 7.5 TOPS). The system must handle highly customized user typing patterns over intermittent network connections.
question: How would you design a cross-device federated learning system to personalize an on-device LLM (like Gemini Nano) for predictive text formatting?
details:
  realistic_solution: A robust architecture mandates Parameter-Efficient Fine-Tuning (PEFT) like LoRA or QLoRA, offloading heavy matrix multiplications to the TPU to leverage its 7.5 TOPS throughput. To combat non-IID text data, the system employs FedProx or Scaffold to regularize local drift, and strictly schedules communication rounds using JobScheduler when the device is idle, charging, and connected to unmetered Wi-Fi.
  common_mistake: |
    **The Pitfall:** Proposing standard Federated Averaging with full-model fine-tuning.
    **The Rationale:** Candidates ignore the extreme memory pressure of 16-bit weight updates on mobile RAM and multi-gigabyte communication overheads.
    **The Consequence:** This completely exhausts device memory, incurs massive data plan costs, and guarantees OS-level process termination.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model: 1.8B parameters at 8-bit.
       - Memory: 12 GB RAM, 7.5 TOPS NPU.
       - PEFT: Rank-8 LoRA (~5M trainable parameters).
       - Mini-batch: 4 sequences of 512 tokens (~40 GFLOPs).
    2. **Calculations:**
       - Full Adam State: 1.8B * 8 bytes = 14.4 GB (OOM).
       - LoRA Optimizer State: 5M * 8 bytes = ~40 MB.
       - Compute Time: 40 GFLOPs / 7,500 GFLOPs/s = ~5.33ms compute time.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound.** Full fine-tuning is impossible due to the 14.4GB optimizer state; PEFT reduces it to 40MB, making the 5.33ms compute entirely viable.
