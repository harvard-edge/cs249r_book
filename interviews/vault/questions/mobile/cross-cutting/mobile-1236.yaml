title: Architecting Federated PEFT for LLMs on Tensor G3
scenario: A cross-device federated learning system personalizes an on-device LLM for predictive text formatting on devices powered by the Google Tensor G3 (12 GB LPDDR5X, 7.5 TOPS). The system must handle highly customized user typing patterns over intermittent network connections.
question: How would you design a cross-device federated learning system to personalize an on-device LLM (like Gemini Nano) for predictive text formatting?
details:
  realistic_solution: A robust architecture uses Parameter-Efficient Fine-Tuning (PEFT) such as LoRA or QLoRA rather than full-model updates. Keep the base model frozen and quantized, train only small adapter weights on-device, and use accelerator kernels only where the mobile runtime actually supports training efficiently. To combat non-IID text data, use FedProx or Scaffold to regularize local drift, clip and privatize updates, and schedule rounds only when the device is idle, charging, and on unmetered Wi-Fi.
  common_mistake: |
    **The Pitfall:** Proposing standard Federated Averaging with full-model fine-tuning.
    **The Rationale:** Candidates ignore the extreme memory pressure of 16-bit weight updates on mobile RAM and multi-gigabyte communication overheads.
    **The Consequence:** This completely exhausts device memory, incurs massive data plan costs, and guarantees OS-level process termination.
  napkin_math: |
    **Assumptions & Constraints:**
       - Model: 1.8B parameters at 8-bit.
       - Memory: 12 GB RAM, 7.5 TOPS NPU.
       - PEFT: Rank-8 LoRA (~5M trainable parameters).
       - Mini-batch: 4 sequences of 512 tokens.
    **Calculations:**
       - Full fine-tuning with Adam needs trainable weights, gradients, and two moment buffers; even 16 bytes/parameter is 1.8B * 16 = 28.8 GB before activations, so it is well beyond mobile memory.
       - LoRA trainable state: 5M parameters * about 16 bytes/parameter for weights, gradients, and moments = ~80 MB, plus activation checkpoints and runtime buffers.
       - Communication per round is adapter-only: 5M parameters at 16-bit is about 10 MB before compression, versus multi-GB full-model updates.
       - Training latency must be profiled end-to-end; peak TOPS is not a reliable estimate for mobile backpropagation because kernel coverage, memory bandwidth, and thermal limits dominate.
    **Conclusion & Interpretation:**
       - **Result: Memory-Bound.** Full fine-tuning is infeasible, while PEFT keeps optimizer state and communication small enough for scheduled on-device federated rounds, subject to measured training throughput.
