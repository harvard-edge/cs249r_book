title: Algorithmic Accountability for On-Device Health Decisions
scenario: A mobile health app makes automated medication dosage recommendations based on an on-device 50M-parameter model using sensor data. A patient advocacy group raises concerns about auditability, fairness, and contestability.
question: How would you design a responsible AI governance framework that operates within mobile compute constraints and does not transmit raw health data off-device?
details:
  realistic_solution: |
    Keep the full governance loop on device by separating immediate decision support from deferred audit work. For each dosage recommendation, store an encrypted local audit record containing model version, coarse feature buckets, uncertainty, top bounded attributions, and the user-visible rationale, but not raw sensor streams. Run attribution on a small calibrated feature head or cached activations under a fixed latency budget, and defer heavier explanation refreshes until the phone is idle and charging. Provide one-tap contestation that freezes the relevant local audit bundle for clinician or patient export with explicit consent. Fairness review should use local subgroup metrics, privacy-preserving aggregates, and offline test suites shipped with model updates, so raw health data never leaves the device.
  common_mistake: |
    **The Pitfall:** Proposing cloud-side explainability (e.g. SHAP values computed server-side).
    **The Rationale:** Candidates rely on standard ML explainability tools requiring centralized data.
    **The Consequence:** Violating data minimization principles by leaking sensitive health data off-device.
  napkin_math: |
    **Assumptions & Constraints:**
    - Params: 50M.
    - Attribution budget must fit a mobile UX path and avoid raw-data egress.
    - Full-model Integrated Gradients with many path steps may require repeated forward or gradient-style passes.
    - NPU: 15 TOPS.
    - Effective latency depends on operator support, memory bandwidth, feature preprocessing, and whether attribution runs synchronously with the recommendation.

    **Calculations:**
    - A full 50-step attribution pass can be tens of model evaluations plus extra activation and gradient memory traffic, so peak TOPS alone is not a reliable latency estimate.
    - Bound the synchronous path to top-feature attribution from cached activations or a small explanation head, for example a few milliseconds of extra work and a fixed-size encrypted log record.
    - Schedule any full attribution replay, fairness metric refresh, or audit packaging as background work while idle, charging, and thermally safe.

    **Conclusion & Interpretation:**
    - **Result: Compute- and Memory-Constrained**. On-device explainability is feasible only with bounded attribution scope and nonblocking presentation; the governance design should not rely on an idealized sub-millisecond IG latency.
