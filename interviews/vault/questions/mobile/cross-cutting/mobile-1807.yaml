title: CoreML vs ONNX Runtime on Apple A17 Pro Neural Engine
scenario: You deploy a text classification model (BERT-tiny, 4.4M params) on an iPhone 15 Pro. CoreML with Neural Engine achieves 1.2ms inference. ONNX Runtime with CoreML Execution Provider achieves 1.8ms.
question: How would you explain and reduce the 50% latency overhead of ONNX Runtime versus direct CoreML on an A17 Pro?
details:
  realistic_solution: 'The observed overhead is 0.6 ms, from 1.2 ms to 1.8 ms, and the ORT CoreML EP bridge is only one likely component of it. A plausible breakdown is: (1) about 0.1 ms for tensor wrapping or format conversion between ORT tensors and CoreML MLMultiArray, (2) extra ORT session dispatch and memory planning overhead, and (3) suboptimal graph conversion where ORT''s CoreML EP may not convert all ops to ANE-compatible CoreML ops, causing some work to run on CPU/GPU instead of ANE. Check Instruments and ORT profiling to see which ops land on ANE versus CPU. To reduce it, export directly to CoreML via coremltools for iOS-only deployments, simplify unsupported ops before export, keep static shapes, and use ONNX Runtime only when cross-platform portability justifies the measured latency cost.'
  common_mistake: |
    **The Pitfall:** Attributing the entire 50% latency penalty to ONNX Runtime's software abstraction layer.
    **The Rationale:** Engineers assume the bridge overhead (tensor format conversions) is the only factor, ignoring suboptimal ONNX-to-CoreML graph conversions.
    **The Consequence:** Failing to profile the graph execution, missing that unsupported ops are falling back to the CPU instead of utilizing the Neural Engine.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: BERT-tiny (4.4M params), ~8.8M INT8 OPs.
    - Hardware: Apple A17 Pro ANE (35 TOPS).
    - Actual Latency: 1.2ms.

    **Calculations:**
    - 35 TOPS = 35 * 10^12 OPs/s.
    - Theoretical Latency: (8.8 * 10^6 OPs) / (35 * 10^12 OPs/s) = 2.51 * 10^-7 s = 0.000251 ms.
    - Compute-time share of direct CoreML latency: 0.000251 ms / 1.2 ms = ~0.021%.
    - This ratio shows the model is tiny relative to peak ANE throughput, but it is not a precise hardware utilization measurement.

    **Conclusion & Interpretation:**
    - **Result: tiny model with overhead-sensitive latency**. The theoretical compute time is far below observed latency, so graph conversion, dispatch, data movement, and fallback profiling matter more than peak TOPS.
