title: On-Device Fairness Evaluation for Image Classification on Apple A17 Pro
scenario: You are deploying an on-device content moderation classifier on iPhone 15 Pro. With explicit user consent, the app estimates skin-tone bins locally only for sampled images and keeps fairness counters on device.
question: What TOPS, power, and memory budget support on-device demographic-parity monitoring without hurting user experience?
details:
  realistic_solution: |
    Budget the monitoring path as a low-duty-cycle background workload. Define demographic parity as the maximum gap in positive moderation rates across skin-tone bins, sample about 0.1% of inferences, and store only local counters or compact records needed to update the metric. The protected-attribute proxy, if used, should run only on sampled images with consent and local retention; otherwise record an unknown bin. A reasonable iPhone 15 Pro target is below 0.01 sustained TOPS, under about 100 mW average background power, and under 1 MB/hour of fairness logs, with bursts scheduled when the device is cool, unlocked, or charging.
  common_mistake: |
    **The Pitfall:** Designing evaluation pipelines without considering strict power, memory, and TOPS constraints, or relying on off-device demographic data.
    **The Rationale:** Candidates default to server-side fairness logging concepts, neglecting that proxy models for protected attributes must run within the mobile constraints.
    **The Consequence:** Unacceptable battery drain, UI stutter from memory contention, or blatant privacy violations from uploading protected user attributes.
  napkin_math: |
    **Assumptions & Constraints:**
    - Main Model Rate: 20 images/sec.
    - Sampling Rate: 0.1% (0.02 images/sec for evaluation).
    - Proxy Model Compute: 0.1 TOP per sampled image.
    - Unified Memory: 8 GB. Power Limit: ~5W.

    **Calculations:**
    - Sustained compute overhead: 0.02 samples/sec * 0.1 TOP/sample = 0.002 TOP/sec = 0.002 TOPS.
    - Duty-cycle latency at a measured 1 TOPS effective rate: 0.1 TOP/sample / 1 TOPS = 100 ms per sampled image, but only once every 50 seconds on average.
    - Memory logging: 0.02 samples/sec * 3600 sec/hour * 1 KB/sample = 72 KB/hour.
    - 72 KB/hour is about 0.0009% of an 8 GB memory pool, so storage is not the binding limit.

    **Conclusion & Interpretation:**
    - **Result: 0.002 TOPS and 72 KB/hour**. The monitoring budget is feasible if average power remains tiny; thermal scheduling and consented attribute handling are more important than raw memory capacity.
