title: 'The Economics of On-Device Learning: Federated Learning'
scenario: 'You''re an engineer on a mobile team developing a personalized driver-assistance
  feature for a fleet of 1 million active users. You are comparing two training strategies:
  Centralized logging (50 MB of logs per user daily) vs Federated Learning (a 2 MB
  model update per user daily). Cloud egress/ingress data transfer costs $2 per GB.'
question: What are the daily data transfer costs for centralized versus federated
  training across 1M mobile users?
details:
  realistic_solution: The correct approach is to calculate the total daily data volume
    for each strategy and then multiply by the cost per GB. The key is to correctly
    convert megabytes to gigabytes for the federated strategy and then scale both
    calculations by the one million users in the fleet. This demonstrates that the
    federated approach, while often chosen for privacy, also offers massive data transfer
    cost savings.
  common_mistake: '**The Pitfall:** Calculating cost on a per-user basis instead of
    for the fleet, or mixing up MB and GB.

    **The Rationale:** Engineers often focus on the privacy benefits of FL and ignore
    the massive data transfer cost savings, rushing through the unit conversion.

    **The Consequence:** Underestimating the total cost by orders of magnitude, failing
    to build a strong economic case for Federated Learning.

    '
  napkin_math: '**Assumptions & Constraints:**

    - User count: 1,000,000

    - Centralized payload: 50 MB

    - FL payload: 2 MB

    - Transfer cost: $2/GB


    **Calculations:**

    - Centralized Data = 1,000,000 * 50 MB = 50,000,000 MB = 50,000 GB

    - Centralized Cost = 50,000 GB * $2 = $100,000

    - Federated Data = 1,000,000 * 2 MB = 2,000,000 MB = 2,000 GB

    - Federated Cost = 2,000 GB * $2 = $4,000


    **Conclusion & Interpretation:**

    - **Result: $4,000 vs $100,000 (Economic Dominance)**. The federated learning
    strategy not only preserves privacy but achieves a 25x reduction in daily network
    operational costs.

    '
  options:
  - Centralized costs $100,000/day; Federated costs $400/day.
  - Centralized costs $100/day; Federated costs $4/day.
  - Centralized costs $100,000/day; Federated costs $4,000/day.
  - Centralized costs $102,400/day; Federated costs $4,096/day.
