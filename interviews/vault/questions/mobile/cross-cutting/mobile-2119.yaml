title: PagedAttention Fragmentation on Mobile
scenario: 'An iPhone 15 Pro running a local 3B parameter LLM uses PagedAttention with 128-token pages. User interactions are bursty, averaging only 15 tokens per generation. Model specs: 24 layers, 16 KV heads, 128 head dim, FP16.'
question: What is the FP16 KV cache size per page, and what is the memory fragmentation overhead during a typical 15-token generation?
details:
  realistic_solution: KV cache per token is 2 (K+V) * 24 layers * 16 heads * 128 dim * 2 bytes (FP16) = 196.6 KB. A 128-token page consumes 128 * 196.6 KB = 25.1 MB. Because the user only generates 15 tokens, an entire 25.1 MB page is allocated but leaves 113 tokens empty. This results in 88.2% internal fragmentation, wasting ~22 MB of unified memory per request and causing severe memory pressure under concurrent usage.
  common_mistake: |
    **The Pitfall:** Importing cloud-optimized PagedAttention block sizes directly to mobile endpoints.
    **The Rationale:** Candidates reuse server configurations (like 128 or 256 tokens per page) without adjusting for short, bursty mobile chat sessions.
    **The Consequence:** Massive internal memory fragmentation silently exhausts the device's unified RAM during concurrency.
  napkin_math: |
    - **Token Size:** 2 (K+V) * 24 layers * 16 heads * 128 dim * 2 bytes = 196.6 KB/token.
    - **Page Allocation:** 128 tokens * 196.6 KB = 25.1 MB allocated per page.
    - **Actual Usage:** 15 tokens requires only ~2.9 MB.
    - **Waste Calculation:** (128 - 15) / 128 = 0.882.
    - **Final Result:** **88.2% internal fragmentation, wasting ~22 MB of memory per single request.**
