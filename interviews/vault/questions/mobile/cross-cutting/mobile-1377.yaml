title: On-Device DP-SGD on Hexagon NPU
scenario: You are designing an on-device personalization system using DP-SGD for a language model running on a Qualcomm Hexagon NPU.
question: How would you combine per-example clipping, secure noise, and INT8 quantization on a Hexagon NPU without weakening DP?
details:
  realistic_solution: |
    Use the NPU for quantization-aware forward/backward matmuls, but keep the DP mechanism in a verified higher-precision domain. Run ghost clipping in two passes: first estimate each example's gradient norm without materializing all per-example gradients, then recompute microbatches and accumulate only clipped gradients in FP32. INT8 tensors may be used inside kernels after calibration, but clipping thresholds, dequantized accumulation, discrete Gaussian noise addition, and privacy accounting happen before any requantized update is stored or transmitted. Secure noise comes from an audited CSPRNG/discrete Gaussian sampler in trusted CPU/TEE code, with tests that quantization error is treated as training error rather than privacy noise.
  common_mistake: |
    **The Pitfall:** Proposing standard DP-SGD implementations without considering the hardware reality of the Hexagon NPU.
    **The Rationale:** Candidates incorrectly assume standard FP32 Gaussian noise generation is efficient or secure on the NPU, and fail to address the massive memory bandwidth bottleneck of materializing per-example gradients.
    **The Consequence:** Materializing per-example gradients heavily taxes the shared LPDDR5X memory bus, completely dominating the step time.
  napkin_math: |
    **Assumptions & Constraints:**
    - 10M parameter model, batch size 64.
    - Gradients and DP accumulator are FP32.
    - INT8 NPU kernels are used only for quantization-aware matmul work, not for the final DP noise mechanism.

    **Calculations:**
    - Naive per-example gradients: 64 * 10M * 4 bytes = 2.56 GB.
    - Clipped aggregate gradient buffer: 10M * 4 bytes = 40 MB.
    - Per-example norm vector: 64 * 4 bytes = 256 bytes, plus layer-local scratch reused across microbatches.
    - DP noise vector for one update: 10M * 4 bytes = 40 MB generated and added in the trusted FP32 accumulator.
    - Approximate training compute if backward is about 6 ops/parameter/example: 64 * 10M * 6 = 3.84 GOP.
    - At an effective 10 TOPS for this mixed workload, ideal compute time is 3.84e9 / 10e12 = 0.38 ms, before memory traffic and secure sampling overhead.

    **Conclusion & Interpretation:**
    - **Result: memory and DP-sampling dominated.** Ghost clipping reduces gradient storage from 2.56 GB to one 40 MB accumulator plus reusable scratch, while DP remains valid because clipping, calibrated noise, and accounting occur in the trusted FP32 path before requantization.
