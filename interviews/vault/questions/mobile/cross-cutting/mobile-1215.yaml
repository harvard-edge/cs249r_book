title: Guardrail Latency on Tensor G3
scenario: An application on the Google Tensor G3 uses a 2.5 billion parameter INT8 guardrail model to classify inputs for safety. The guardrail weights are fetched from system memory over the shared memory bus into TPU-accessible buffers for a single inference step. Telemetry reveals an approximate 50 ms latency floor before useful compute begins.
question: Why can a 2.5B INT8 Tensor G3 guardrail model see about 50 ms of latency before compute starts?
details:
  realistic_solution: The approximate 50 ms floor is caused by weight fetch bandwidth, not by TPU arithmetic. A 2.5B INT8 model is about 2.5 GB of parameters, and if the guardrail is not already resident in TPU-accessible buffers, those bytes must be streamed through the shared LPDDR memory hierarchy before the TPU can do useful work. Real systems also add cache, DMA, scheduling, and runtime overhead, so 50 ms should be treated as an order-of-magnitude bandwidth floor rather than an exact constant.
  common_mistake: |
    **The Pitfall:** Assuming the bottleneck is the TPU's compute capability (TOPS) and calculating FLOPs.
    **The Rationale:** Candidates see the model size and instantly jump to compute latency, forgetting that dynamically loading a model completely bounds execution by memory I/O.
    **The Consequence:** Optimization efforts are misdirected toward quantizing or pruning the model for compute rather than keeping the model persistent in memory or leveraging pre-fetching.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model size: 2.5B INT8 parameters = 2.5 GB
    - LPDDR5X Bandwidth: ~50 GB/s
    - The latency in question is the pre-compute transfer when weights are not already resident in TPU-accessible buffers.

    **Calculations:**
    - Best-case weight fetch time = 2.5 GB / 50 GB/s = 0.05 seconds = 50 ms
    - This is a one-time transfer floor before useful arithmetic for the requested inference step; it should not be mixed with a per-token compute formula.
    - Any DMA setup, cache miss, scheduling, or contention overhead adds to the 50 ms floor rather than reducing it.

    **Conclusion & Interpretation:**
    - **Result: ~50 ms bandwidth floor (I/O Bound)**. The dynamic fetch strategy creates an approximate memory-transfer floor before useful compute, so persistence, prefetching, and smaller guardrails matter more than raw TOPS.
