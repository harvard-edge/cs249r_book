title: Definition of Equalized Odds for On-Device Models
scenario: Your team is preparing to deploy an on-device LLM (Gemini Nano) for text summarization on the Google Tensor G3. Before utilizing the device's TPU for production inference, you must evaluate the model's fairness across different dialects.
question: What is the exact definition of equalized odds in the context of fairness evaluation?
details:
  realistic_solution: Equalized odds means that the model's predictions are independent of the sensitive attribute, conditional on the true label. For binary outcomes, this explicitly requires that the model achieves both the same True Positive Rate (TPR) and the same False Positive Rate (FPR) across all evaluated demographic groups.
  common_mistake: |
    **The Pitfall:** Confusing equalized odds with demographic parity.
    **The Rationale:** Candidates incorrectly state that the model must produce the same positive prediction rate across all groups, completely ignoring the ground truth labels.
    **The Consequence:** The fairness evaluation metric is fundamentally flawed, potentially approving a biased model for deployment.
  napkin_math: |
    **Assumptions & Constraints:**
    - Binary classification labels are available for each evaluated dialect group.
    - Equalized odds compares error rates conditional on the true label.

    **Calculations:**
    - For each group, compute TPR = true positives / all actual positives.
    - For each group, compute FPR = false positives / all actual negatives.
    - Equalized odds is satisfied only when both TPR and FPR are approximately equal across groups.

    **Conclusion & Interpretation:**
    - **Result: Conditional Error-Rate Parity.** The relevant check is fairness of TPR and FPR across dialect groups, not Tensor G3 compute capacity.
