title: The Hidden Cost of Privacy
scenario: Your team is designing a new system to improve your mobile app's keyboard suggestions. One option is a classic centralized approach, where user data is uploaded for training. The other is a Federated Learning (FL) approach, where training happens on-device and only model updates are sent to the server.
question: From a Total Cost of Ownership (TCO) perspective, what is the single largest operational cost introduced by choosing the Federated Learning design at scale?
details:
  realistic_solution: The dominant operational cost in a cross-device Federated Learning architecture is network communication bandwidth and the associated cloud ingress/egress. In FL, millions of participating client devices must repeatedly upload high-dimensional model weight updates (or gradients) to the central aggregator. This necessitates a massive, highly available cloud infrastructure dedicated solely to load balancing and ingesting petabytes of continuous data streams, fundamentally shifting the cost center from centralized compute to distributed network I/O.
  common_mistake: |
    **The Pitfall:** Focusing exclusively on on-device compute and battery impact while ignoring cloud operational expenses.
    **The Rationale:** Engineers intuitively view FL as 'free' compute pushed to the edge, underestimating the sheer volume of continuous gradient data flowing back to the server.
    **The Consequence:** Being blindsided by massive cloud egress and load-balancing bills required to ingest and aggregate petabytes of daily model updates.
  napkin_math: |
    **Assumptions & Constraints:**
    - Active users: 10 million.
    - Participating devices per FL round: 1% of active users = 100,000 clients.
    - Compressed upload per client: 0.5 MB.
    - Server response per selected client: 0.5 MB of model/config data.
    - Rounds per day: 20.

    **Calculations:**
    - Per-round ingress: 100,000 clients * 0.5 MB = 50 GB.
    - Per-round egress: 100,000 clients * 0.5 MB = 50 GB.
    - Daily network volume: (50 GB ingress + 50 GB egress) * 20 rounds/day = 2 TB/day.
    - Annual network volume: 2 TB/day * 365 = 730 TB/year before retries, orchestration overhead, retention, and regional replication.

    **Conclusion & Interpretation:**
    - **Result: Network Communication Dominates TCO.** Even with partial participation and compressed updates, repeated rounds create large ingress/egress plus load-balancing and aggregation infrastructure costs.
  options:
    - Increased on-device compute and battery drain.
    - Server compute cost for aggregating model updates.
    - Network communication overhead from gradient uploads.
    - Storage costs for the global model on the server.
