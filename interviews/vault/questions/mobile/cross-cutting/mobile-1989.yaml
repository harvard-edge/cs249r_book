title: Zero-Copy Image Pipeline
scenario: A mobile camera app utilizes ML models via the NPU. The ISP outputs 12MP RAW frames at 60fps, but the model requires scaled RGB tensors.
question: Design an evaluation metric for the memory pipeline between the ISP, GPU, and NPU, and propose a unified zero-copy buffer architecture.
details:
  realistic_solution: |
    The paramount evaluation metric is the 'Memory Bandwidth Overhead Percentage' relative to the 16.6ms real-time frame budget. The architectural solution dictates allocating a unified hardware buffer (e.g., `CVPixelBuffer` mapped to `IOSurface`) within the unified memory space. The ISP writes raw pixels directly to this location, the GPU executes a hardware-accelerated downscaling and format conversion (via Metal Shaders) in-place, and the NPU reads the identically mapped physical address space. This strict zero-copy architecture totally eliminates CPU-bound memory marshaling.
  common_mistake: |
    **The Pitfall:** Extracting the image to a CPU-bound tensor array (like numpy or OpenCV).
    **The Rationale:** Candidates default to standard desktop computer vision workflows.
    **The Consequence:** This causes a costly cross-domain memory copy that completely breaks real-time power and thermal constraints.
  napkin_math: |
    **Assumptions & Constraints:**
    - Frame size: 12 Megapixels.
    - Channels: 3 (RGB), 1 byte per channel = 36 MB per frame.
    - Frame rate: 60 FPS.

    **Calculations:**
    - Bandwidth for 1 naive CPU memory copy = 36 MB (Read) + 36 MB (Write) = 72 MB.
    - Total wasted bandwidth per second = 72 MB * 60 FPS = 4,320 MB/s = ~4.32 GB/s.

    **Conclusion & Interpretation:**
    - **Result: 4.32 GB/s (Memory Bus-Bound)**. Extracting frames into standard CPU arrays (like numpy) triggers a massive 4.32 GB/s data transfer penalty across the unified bus, completely shattering the thermal and power envelopes required for 60fps execution.
