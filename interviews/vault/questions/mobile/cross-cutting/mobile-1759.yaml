title: Responsible AI Governance for On-Device LLM on Samsung Exynos 2400 NPU
scenario: You're leading the Responsible AI initiative for a new on-device LLM feature integrated into a smartphone targeting the Samsung Exynos 2400 NPU. During initial red-teaming exercises, the model exhibited subtle biases in content generation, despite extensive pre-training data filtering.
question: Why might the model still exhibit biases on-device, and how do mobile NPU constraints complicate Responsible AI governance frameworks?
details:
  realistic_solution: |
    Bias can still appear because pre-deployment filtering cannot cover every prompt distribution, locale, personalization context, decoding path, quantization artifact, or real-world feedback loop. Mobile NPU constraints make governance harder because safety classifiers, telemetry, audits, and model updates compete with latency, memory bandwidth, thermal limits, and privacy rules. A practical framework uses privacy-preserving aggregate telemetry, lightweight output-risk classifiers when latency allows, sampled human or backend review for flagged categories, sliced post-deployment dashboards, and model cards that document on-device constraints and observed harms. Federated or on-device feedback can be useful later, but immediate governance should focus on monitoring, evaluation, escalation, and rollback under resource budgets.
  common_mistake: |
    **The Pitfall:** Over-reliance on pre-deployment, offline impact assessments and static model cards.
    **The Rationale:** Teams assume a model passing initial checks will behave consistently, ignoring emergent biases or drift under constrained NPU environments.
    **The Consequence:** Real-world usage patterns expose biases that go undetected due to a lack of continuous on-device monitoring.
  napkin_math: |
    **Assumptions & Constraints:**
    - Governance checks include lightweight safety classification, aggregate telemetry, and periodic sampled review.
    - Keep online guardrails under 5% added latency and store only aggregate counters by risk category, locale, and model version.
    - Example local retention: 20 risk categories x 10 locales x 4 counters x 8 bytes.

    **Calculations:**
    - Aggregate counter memory: 20 x 10 x 4 x 8 bytes = 6,400 bytes, plus small metadata.
    - If baseline generation latency is 200 ms/token-equivalent response step, a 5% online guardrail budget is 10 ms for safety scoring or policy checks.
    - Heavier audits, prompt review, and slice dashboards should run sampled or server-side because they need context and human governance evidence, not just NPU throughput.

    **Conclusion & Interpretation:**
    - **Result: Governance Is Budgeted by Evidence and Latency.** Lightweight counters are cheap, but meaningful bias governance still requires sampled review, update controls, rollback paths, and documented residual risks under mobile latency and privacy limits.
