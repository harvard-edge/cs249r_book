title: 'The Economics of Privacy: Centralized vs. Federated'
scenario: You are a Staff ML Engineer at a photo-sharing app planning an A/B test
  to improve your 'auto-enhance' filter. You are comparing two training strategies
  for a cohort of 1 million users.
question: What monthly cloud ingress cost results from 1M users uploading 5 MB of
  training data per day at $0.01 per GB?
details:
  realistic_solution: Calculate the total data volume for the entire user cohort and
    then apply the provider's unit cost. This analysis reveals the direct financial
    trade-offs between a centralized approach and a privacy-preserving one like federated
    learning.
  common_mistake: '**The Pitfall:** Ignoring the operational costs (TCO) associated
    with data logistics.

    **The Rationale:** Engineers focus solely on model accuracy improvements and frequently
    confuse units (MB vs. GB) when calculating data volume.

    **The Consequence:** Unexpected budget overruns and failing to recognize the financial
    necessity of federated learning.

    '
  napkin_math: '**Assumptions & Constraints:**

    - User Cohort: 1,000,000 users.

    - Daily Upload: 5 MB/user.

    - Cloud Ingress Cost: $0.01 per GB.


    **Calculations:**

    - Daily Volume: 1,000,000 * 5 MB = 5,000,000 MB.

    - Convert to GB: 5,000,000 MB / 1,000 = 5,000 GB (Assuming base-10 network storage
    units).

    - Daily Cost: 5,000 GB * $0.01/GB = $50/day.

    - Monthly Cost: $50 * 30 days = $1,500/month.


    **Conclusion & Interpretation:**

    - **Result: ~$1,500/month ingress cost (Network-Cost Bound)**. Centralized data
    collection incurs massive operational TCO; Federated Learning decentralizes compute
    to avoid this.

    '
  options:
  - $50
  - $500
  - $1,500
  - $15,000
  correct_index: 2
