title: Tiered Sensor Gating
scenario: An always-on face detection model on a tablet drains the battery in 4 hours if the Neural Engine runs continuously at 30 fps.
question: Design a multi-tiered duty-cycling strategy to extend battery life using the ambient light sensor and ISP motion detection?
details:
  realistic_solution: |
    Implement a cascaded wake-up pipeline across always-on, ISP, and Neural Engine domains. The ambient light sensor stays in the always-on island and selects the camera policy: in unusable low light, keep the camera/ISP mostly parked or sample rarely; in usable light, allow a low-rate camera feed. The ISP then runs a low-power motion or face-like-region prefilter at about 5 fps without waking the application CPU. Only validated motion in usable lighting wakes the Neural Engine for a short 30 fps burst, after which it returns to sleep when the scene is stable. This reduces battery use by keeping the expensive Neural Engine active only for candidate intervals.
  common_mistake: |
    **The Pitfall:** Waking up the high-power main application CPU cores to process the light or motion sensor data.
    **The Rationale:** Candidates design software-first pipelines without considering the static power draw of waking the SoC's heavy compute domains.
    **The Consequence:** The system burns more power managing the sensors via the CPU than it saves by gating the NPU, leading to unchanged or worsened battery drain.
  napkin_math: |
    **Assumptions & Constraints:**
    - Continuous 30 fps Neural Engine operation drains the battery in 4 hours, so treat it as 1.0 baseline power unit.
    - Ambient-light always-on sensing costs about 0.5% of the baseline.
    - ISP low-rate prefilter costs about 5% of the baseline while monitoring.
    - Usable-light monitoring is active 50% of wall time.
    - Neural Engine duty cycle after ISP gating is 5% of wall time.

    **Calculations:**
    - Ambient-light power = 0.005 baseline units continuously.
    - ISP average power = 0.05 * 0.50 = 0.025 baseline units.
    - Neural Engine average power = 1.0 * 0.05 = 0.050 baseline units.
    - Tiered average power = 0.005 + 0.025 + 0.050 = 0.080 baseline units.
    - Battery-life multiplier = 1.0 / 0.080 = 12.5x.
    - Estimated life = 4 hours * 12.5 = 50 hours, assuming the duty-cycle statistics hold.

    **Conclusion & Interpretation:**
    - **Result: roughly 50 hours under stated duty assumptions (Energy-Bound)**. The gain comes from multiplying each tier's power by its own duty cycle and keeping the Neural Engine asleep except during validated candidate intervals.
