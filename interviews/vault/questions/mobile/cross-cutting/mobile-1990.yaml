title: Tiered Sensor Gating
scenario: "An always-on face detection model on a tablet drains the battery in 4 hours if the Neural Engine runs continuously at 30 fps."
question: "Design a multi-tiered duty-cycling strategy to extend battery life using the ambient light sensor and ISP motion detection."
details:
  realistic_solution: "Implement a cascaded wake-up pipeline utilizing heterogeneous hardware domains. First, the ultra-low-power ambient light sensor completely disables the system in dark environments. Second, the low-power Image Signal Processor (ISP) runs a lightweight background motion detection pass at a reduced framerate (e.g., 5 fps). Only upon validating motion does the high-power Neural Engine trigger to evaluate the heavy facial detection payload."
  common_mistake: |
    **The Pitfall:** Waking up the high-power main application CPU cores to process the light or motion sensor data.
    **The Rationale:** Candidates design software-first pipelines without considering the static power draw of waking the SoC's heavy compute domains.
    **The Consequence:** The system burns more power managing the sensors via the CPU than it saves by gating the NPU, leading to unchanged or worsened battery drain.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - NPU running continuously consumes ~2.0 W.
       - Active NPU duty-cycle is gated to 5% of total time via tiered wake-ups.
    2. **Calculations:**
       - Average NPU power consumption = 2.0 W * 0.05 = 0.1 W.
    3. **Conclusion & Interpretation:**
       - **Result: Energy-Bound.** By cascading wake-ups and restricting the NPU to a 5% duty cycle, the average active power drops from 2.0W to **0.1 W**, drastically extending multi-day battery life.
