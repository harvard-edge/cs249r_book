title: Optimizing On-Device Toxicity Guardrails for Gemini Nano
scenario: You are deploying an on-device generative AI chat feature. To adhere to Responsible AI policies, all generated text must be evaluated by an on-device toxicity guardrail model before display. The current unoptimized 110M parameter guardrail runs sequentially after every sentence is generated, causing severe stuttering and failing the 200ms time-to-display budget.
question: How do you diagnose the guardrail bottleneck and quantify an optimized execution strategy on a mobile TPU?
details:
  realistic_solution: |
    Distill the guardrail into a sub-10M parameter model, quantize it to INT8, and run it on sentence-sized or sliding-window chunks at the display boundary. Some preparation can overlap with LLM token generation, but the final safety decision must still gate display, so the design should budget a small residual synchronization delay rather than claiming the guardrail is free. Use batching and a supported TPU delegate path to keep this residual below the 200ms time-to-display budget.
  common_mistake: |
    **The Pitfall:** Suggesting offloading the safety check to the cloud or applying extreme quantization without architectural changes.
    **The Rationale:** Candidates often default to cloud offloading to save compute, ignoring strict on-device privacy requirements.
    **The Consequence:** Breaking product requirements or failing to address the fundamental sequential execution bottleneck.
  napkin_math: |
    **Assumptions & Constraints:**
    - Original 110M FP16 model: ~220 MB memory, ~22 GOps.
    - Distilled INT8 5M model: ~5 MB memory, 1 GOp.
    - TPU Compute: 7.5 TOPS.
    - Gemini Nano generation: ~15ms/token.
    - Guardrail runs after each sentence-sized chunk, assume about 20 tokens/chunk.
    - Delegate scheduling and synchronization overhead: about 2-5ms per guardrail call.

    **Calculations:**
    - Original Compute Time: 22 GOPS / 7,500 GOPS/sec = 2.9ms before memory and scheduling overhead.
    - Distilled Compute Time: 1 GOP / 7,500 GOPS/sec = 0.13ms before memory and scheduling overhead.
    - Chunk Generation Time: 20 tokens * 15ms/token = 300ms.
    - Residual Guardrail Delay: compute is sub-ms, but display still waits for about 2-5ms of delegate scheduling, synchronization, and result handling.

    **Conclusion & Interpretation:**
    - **Result: about 2-5ms residual per gated chunk (Synchronization-Bound)**. Distillation removes the guardrail as a major compute bottleneck, but a safety check that gates display cannot be hidden entirely.
