title: Guardrail Latency on Tensor G3 TPU
scenario: You are deploying Gemini Nano on the Google Tensor G3 alongside a toxicity guardrail model to ensure Responsible AI compliance. The observed system behavior is that when the assistant generates a long response (500 tokens), the guardrail model consistently misses its 100ms latency SLA, causing unverified text to briefly render. The Tensor G3 features an on-device TPU providing 7.5 TOPS and shares 12 GB of LPDDR5X memory. Gemini Nano consumes a constant 4.0 TOPS during continuous generation, and the guardrail model requires 0.4 Tera-operations to analyze the full 500-token sequence.
question: Why does a Tensor G3 guardrail miss a 100ms SLA while Gemini Nano generates a 500-token response?
details:
  realistic_solution: 'The failure happens because the TPU''s compute capacity is oversubscribed when running both models concurrently. The guardrail requires a specific compute throughput to meet its 100ms SLA, but Gemini Nano consumes more than half of the total TPU budget during active generation. Because the combined TOPS requirement exceeds the hardware limit, the TPU throttles the guardrail execution, stretching its latency beyond the acceptable window. A real-world mitigation would involve either pausing text generation during the safety check or chunking the guardrail execution to run incrementally.'
  common_mistake: |
    **The Pitfall:** Assuming memory bandwidth is the bottleneck or vaguely blaming 'device overload'.
    **The Rationale:** Candidates fail to calculate the exact compute oversubscription on the TPU based on concurrent required TOPS.
    **The Consequence:** Missing the root cause prevents finding an effective mitigation like pausing text generation.
  napkin_math: |
    **Assumptions & Constraints:**
    - Guardrail requirements: 0.4 Tera-ops, 100ms SLA (4.0 TOPS required).
    - Gemini Nano compute: 4.0 TOPS.
    - TPU capacity: 7.5 TOPS.

    **Calculations:**
    - Total required compute = 4.0 + 4.0 = 8.0 TOPS.
    - Hardware deficit = 8.0 - 7.5 = 0.5 TOPS.
    - Guardrail available compute = 7.5 - 4.0 = 3.5 TOPS.
    - Guardrail actual latency = 0.4 Tera-ops / 3.5 TOPS = 114ms.

    **Conclusion & Interpretation:**
    - **Result: 114ms (Compute-Bound).** Hardware oversubscription causes the guardrail to miss its 100ms SLA.
