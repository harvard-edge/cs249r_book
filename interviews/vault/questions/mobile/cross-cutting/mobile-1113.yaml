title: Guardrail Latency on Tensor G3 TPU
scenario: You are deploying Gemini Nano on the Google Tensor G3 alongside a toxicity guardrail model to ensure Responsible AI compliance. The guardrail is scheduled concurrently while Gemini Nano generates a long 500-token response, and it consistently misses its 100ms latency SLA, causing unverified text to briefly render. The Tensor G3 features an on-device TPU providing 7.5 TOPS and shares 12 GB of LPDDR5X memory. Gemini Nano consumes a constant 4.0 TOPS during continuous generation, and the guardrail model requires 0.4 Tera-operations to analyze the 500-token response chunk.
question: Why does a Tensor G3 guardrail miss a 100ms SLA while Gemini Nano generates a 500-token response?
details:
  realistic_solution: The failure happens because the TPU's compute capacity is oversubscribed when both models run concurrently. The guardrail has 0.4 Tera-operations of work to finish inside 100ms, which requires 4.0 TOPS of average throughput. Gemini Nano is already consuming 4.0 TOPS, so the combined demand is 8.0 TOPS on a 7.5 TOPS TPU. With generation active, only 3.5 TOPS remain for the guardrail, stretching 0.4 Tera-operations to about 114ms and missing the SLA. A real mitigation is to pause or rate-limit generation during the safety pass, run the guardrail incrementally on chunks, or reserve a separate TPU budget for safety checks.
  common_mistake: |
    **The Pitfall:** Assuming memory bandwidth is the bottleneck or vaguely blaming 'device overload'.
    **The Rationale:** Candidates fail to calculate the exact compute oversubscription on the TPU based on concurrent required TOPS.
    **The Consequence:** Missing the root cause prevents finding an effective mitigation like pausing text generation.
  napkin_math: |
    **Assumptions & Constraints:**
    - Guardrail requirements: 0.4 Tera-ops, 100ms SLA (4.0 TOPS required).
    - Gemini Nano compute: 4.0 TOPS.
    - TPU capacity: 7.5 TOPS.

    **Calculations:**
    - Total required compute = 4.0 + 4.0 = 8.0 TOPS.
    - Hardware deficit = 8.0 - 7.5 = 0.5 TOPS.
    - Guardrail available compute = 7.5 - 4.0 = 3.5 TOPS.
    - Guardrail actual latency = 0.4 Tera-ops / 3.5 TOPS = 114ms.

    **Conclusion & Interpretation:**
    - **Result: 114ms (Compute-Bound).** Hardware oversubscription causes the guardrail to miss its 100ms SLA.
