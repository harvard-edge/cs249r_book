title: Android NNAPI Delegation Failures and Fallback Performance
scenario: Your INT8 image classification model runs at 5ms on Snapdragon 8 Gen 3 via NNAPI delegate targeting the Hexagon NPU. On a Samsung Exynos 2400 device (also with NNAPI), the same model runs at 45ms — 9x slower. Both devices claim 'NNAPI delegate active'.
question: Why does the model run 9x slower on the Exynos NNAPI despite the delegate being active?
details:
  realistic_solution: 'Samsung''s Exynos NNAPI driver likely has different NPU op coverage, tensor-layout support, or quantization constraints than the Snapdragon driver. "NNAPI delegate active" only means the delegate was created; it does not prove every op is executing on the NPU. NNAPI and TFLite can partition a graph so supported ops run on an accelerator while unsupported ops stay on CPU, and the partition boundaries can add copies or layout conversions. Diagnose with TFLite benchmark/profiling, NNAPI verbose logs, delegate partition inspection, and model analyzer tools rather than getDevices() alone. Common culprits: custom activations, grouped convolutions, resize/pad ops, per-channel quantization, or tensor types the Exynos driver rejects. Fix by rewriting unsupported ops, using a vendor-supported model variant, or explicitly partitioning so CPU kernels handle only the small unsupported islands.'
  common_mistake: |
    **The Pitfall:** Trusting that 'NNAPI delegate active' means the NPU is actually executing the entire graph.
    **The Rationale:** Developers treat NNAPI as a black box and assume successful initialization guarantees hardware acceleration.
    **The Consequence:** Silent fallbacks to the CPU reference implementation caused by partial operator support.
  napkin_math: |
    **Assumptions & Constraints:**
    - Snapdragon path: 5 ms when most hot operators are delegated efficiently.
    - Exynos path: 45 ms while NNAPI delegate initialization still succeeds.
    - TOPS alone is not enough to infer latency because op coverage, memory movement, and driver partitioning dominate.

    **Calculations:**
    - Slowdown: 45 ms / 5 ms = 9x.
    - A 9x slowdown is consistent with one or more hot operators running on CPU or with costly accelerator/CPU partition boundaries.
    - It does not prove that the whole model fell back, nor does it identify a precise NPU/CPU percentage.

    **Conclusion & Interpretation:**
    - **Result: severe partial-delegation or driver-efficiency penalty**. Profile per-op placement and partition boundaries before changing the model or forcing a device.
