title: Architecting On-Device Guardrails for Generative Text
scenario: You are designing an on-device text generation feature with strict content moderation requirements running on a Samsung Exynos 2400 NPU. The system must run a primary 3B parameter generative model and a secondary safety classifier concurrently to prevent toxic output generation. The dual-core NPU relies on shared 12 GB LPDDR5X memory.
question: How should the system concurrently run a 3B generator and safety classifier without breaking latency or safety?
details:
  realistic_solution: A robust architecture uses bounded streaming, not an unbounded parallel run. The generator emits small token chunks into a fixed-size buffer, and the safety classifier scores each chunk before the text is released to the UI or downstream actions. If the safety path falls behind or memory pressure rises, generation is paused or the output is held in the buffer; the system must not bypass moderation. Resource limits should reserve headroom within the shared 12 GB LPDDR5X pool for OS/GPU/ISP spikes, KV cache, activations, runtime arenas, and token buffers, with a smaller classifier or shorter context selected up front if the combined working set cannot stay inside that reserved ML budget.
  common_mistake: |
    **The Pitfall:** Designing sequential pipelines (generate then classify).
    **The Rationale:** Candidates overlook stream-based moderation and the shared nature of mobile RAM, assuming all memory is available for the NPU.
    **The Consequence:** Unacceptable latency and potential OOM errors when system memory pressure spikes.
  napkin_math: |
    **Assumptions & Constraints:**
    - Primary Model Weights: 3B parameters at INT4 = ~1.5 GB.
    - Safety Model Weights: 100M parameters at INT8 = ~100 MB.
    - Runtime Overhead: KV cache, activations, allocator/framework arenas, and double-buffered token chunks add ~0.8 GB.
    - Shared Memory Policy: reserve 4 GB for OS/apps and 25% of the remaining 8 GB for GPU/ISP/system spikes, leaving a conservative 6 GB ML budget.

    **Calculations:**
    - Shared pool after OS/apps: 12 GB - 4 GB = 8 GB.
    - Spike reserve: 8 GB * 25% = 2 GB, leaving ~6 GB for bounded ML runtime.
    - Estimated Working Set: 1.5 GB + 0.1 GB + 0.8 GB = ~2.4 GB.
    - Headroom inside ML budget: 6 GB - 2.4 GB = ~3.6 GB for longer KV, allocator growth, and burst buffers.
    - The working set fits the conservative shared-memory budget, but the system still needs fixed chunk sizes and backpressure so latency and safety do not degrade under spikes.

    **Conclusion & Interpretation:**
    - **Result: Bounded Concurrent Streaming Required.** The estimated 2.4 GB working set fits within a conservative ~6 GB ML budget carved from the shared 12 GB pool, but release must be gated on safety results and generation must apply backpressure under latency or memory pressure.
