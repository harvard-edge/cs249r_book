title: The Battery Drain A/B Test
scenario: You are preparing to A/B test a new, more powerful on-device ranking model ('Model B') against the current production version ('Model A'). The primary operational concern is the impact on user battery life. The model is active for an average of 10 minutes per user per day.
question: How much extra daily energy does Model B consume if it uses 1W more than Model A for 10 minutes per day?
details:
  realistic_solution: 'The correct approach is to first calculate the power delta between the two models. Then, calculate the total time the model is active per day. Finally, multiply the power delta by the total active time (in hours) to find the total extra energy consumed. This provides a clear, actionable metric for the go/no-go decision on the A/B test.'
  common_mistake: |
    **The Pitfall:** Confusing power (an instantaneous rate, measured in Watts) with energy (power applied over time, measured in Watt-hours).
    **The Rationale:** Engineers will often report the power delta without factoring in the duty cycle (how long and how often it's used).
    **The Consequence:** Failing to quantify the actual impact on the phone's battery reserve, leading to incorrect go/no-go decisions.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Duty Cycle: Active for 10 minutes per day (10 / 60 hours).
       - Power Delta: Model B draws 1W more power than Model A.
    2. **Calculations:**
       - P_delta = P_Model B - P_Model A = 1W.
       - E_delta = P_delta * Active Time = 1W * (10 / 60) hours.
       - E_delta = ~0.167 Wh.
    3. **Conclusion & Interpretation:**
       **Result: Power-Bound Evaluation. The total extra daily energy consumed is ~0.17 Wh.**
  options:
  - 1.0 W
  - 600 Wh
  - ~0.17 Wh
  - ~0.67 Wh
