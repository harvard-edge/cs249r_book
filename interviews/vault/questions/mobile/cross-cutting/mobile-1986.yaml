title: NPU TCM Memory Tiling
scenario: A super-resolution model runs on a mobile NPU. An intermediate layer produces 12MB activation maps, but the NPU's Tightly Coupled Memory (TCM) is only 8MB.
question: Specify a memory tiling and scheduling strategy to process this layer locally without spilling intermediate activations to main mobile DRAM?
details:
  realistic_solution: |
    Split the activation map spatially into at least three overlapping tiles, not two exact halves. Reserve TCM first for weights and scratch, then size each activation tile plus its convolution halo to fit the remaining budget. For example, reserve 1.25 MB for weights and 0.75 MB for scratch, leaving 6 MB for tile input/output activation storage. A 3-tile split gives a 4 MB base tile and up to 2 MB for halo overlap, so the scheduler can stream tile 0, tile 1, and tile 2 through the fused convolution block while keeping intermediate activations in TCM. The halo width must equal the fused block's receptive-field radius, and overlapping border outputs are cropped/merged after each tile completes.
  common_mistake: |
    **The Pitfall:** Failing to account for the halo region required for convolutions at tile boundaries.
    **The Rationale:** Candidates often mathematically divide the tensor perfectly but forget the overlapping data needed for the convolution window.
    **The Consequence:** Leads to incorrect output artifacts or out-of-bounds TCM accesses.
  napkin_math: |
    **Assumptions & Constraints:**
    - TCM capacity: 8 MB.
    - Full activation map: 12 MB.
    - Reserve 1.25 MB for weights and 0.75 MB for scratch/double-buffer metadata.
    - Halo width must cover the fused convolution receptive-field radius.

    **Calculations:**
    - Activation budget in TCM = 8 MB - 1.25 MB - 0.75 MB = 6 MB.
    - Two tiles would have 12 MB / 2 = 6 MB base activations, leaving 0 MB for halo, so two tiles are invalid.
    - Three tiles have 12 MB / 3 = 4 MB base activations.
    - Halo budget per resident tile = 6 MB - 4 MB = 2 MB.
    - Valid schedule condition: base tile + halo <= 6 MB, with halo sized from the kernel/receptive-field radius.

    **Conclusion & Interpretation:**
    - **Result: 3 overlapping spatial tiles (Memory-Capacity Bound Optimization)**. A 3-tile schedule leaves explicit room for weights, scratch, and halo overlap, allowing fused tile processing in TCM without spilling intermediate activations to DRAM.
