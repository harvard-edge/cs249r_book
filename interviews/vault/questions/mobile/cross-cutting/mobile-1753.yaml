title: Designing a Fair and Efficient On-Device ML System for Content Moderation on Google Tensor G3
scenario: You are designing an on-device machine learning system for real-time content moderation. The platform features 7.5 TOPS and 12 GB RAM. The system must achieve demographic parity within a 50ms latency budget and a footprint under 200MB.
question: How would you specify a fair, efficient Tensor G3 content moderation model within 50ms latency and 200MB footprint?
details:
  realistic_solution: Specify a small Tensor G3-friendly moderation model and an explicit release gate. The model should use supported TFLite INT8 ops, static shapes, bounded text length, and a footprint under 200 MB including tokenizer tables and runtime buffers; it must meet p95 latency under 50 ms on representative Tensor G3 devices. Define demographic parity as the maximum allowed difference in positive moderation rates across the evaluation slices used for the product, then validate accuracy, false-positive rates, and parity before and after quantization. Use QAT and slice-aware calibration so INT8 conversion does not widen subgroup gaps. Release only if footprint, p95 latency, task quality, and demographic-parity thresholds all pass on the held-out sliced test set.
  common_mistake: |
    **The Pitfall:** Assuming globally high accuracy equals fairness, or applying heavy post-hoc fairness algorithms on-device.
    **The Rationale:** Candidates often port server-side fairness methods directly, ignoring that these add massive computational overhead.
    **The Consequence:** The model either amplifies existing biases against subgroups, or fails the strict 50ms latency constraint.
  napkin_math: |
    **Assumptions & Constraints:**
    - NPU: 7.5 TOPS peak.
    - Budget: 50 ms end-to-end p95 latency, 200 MB footprint.
    - Candidate model: 80 GOP per inference after quantization.

    **Calculations:**
    - Peak compute available in 50 ms = 7.5e12 ops/sec * 0.05 sec = 3.75e11 ops = 375 GOP.
    - Candidate model uses 80 GOP, or about 21% of the peak 50 ms compute envelope before utilization losses.
    - Local fairness counters add O(number of subgroup bins) integer updates per inference, which is negligible compared with model inference, but validation still must measure real p95 latency and memory traffic.

    **Conclusion & Interpretation:**
    - **Result: Feasible but Measurement-Bound**. The model has compute headroom on paper, but the release decision depends on measured p95 latency, footprint, and sliced demographic-parity results rather than a single peak-bandwidth estimate.
