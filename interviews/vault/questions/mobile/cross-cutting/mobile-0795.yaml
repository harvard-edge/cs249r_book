title: Daily Carbon Footprint of Mobile Federated Learning
scenario: You are evaluating the daily footprint of a mobile Federated Learning (FL) job. 1,000,000 mobile devices perform 1 FL epoch daily. Local compute takes 100 Joules/device. Each device uploads/downloads a 500MB payload over 5G (0.5 Joules/MB). The full cloud aggregation tier for the job uses 50 kWh total. The average device grid carbon intensity is 400 gCO2/kWh, while the cloud datacenter uses renewable energy at 50 gCO2/kWh.
question: What is the daily carbon footprint of the mobile federated learning approach including compute, 5G transfer, and cloud aggregation?
details:
  realistic_solution: In mobile Federated Learning, the energy bottleneck is rarely the local compute; it is usually the radio transmission cost for large model weights. To find the total carbon footprint, quantify the per-device energy for local compute and 5G communication, multiply by the fleet size, then add the cloud aggregation-tier emissions. Each device uses 100J for compute plus 250J for the 500MB transfer, so the 1,000,000-device fleet consumes 97.22 kWh on the device side. At 400 gCO2/kWh, that is 38.89 kg CO2. The full cloud aggregation tier adds 50 kWh at 50 gCO2/kWh, or 2.50 kg CO2. The total daily footprint is 38.89 + 2.50 = 41.39 kg CO2.
  common_mistake: |
    **The Pitfall:** Ignoring the 5G communication energy when calculating device power consumption.
    **The Rationale:** Engineers focus heavily on the FL compute workload (MACs/TOPS) and overlook the massive energy cost of radio transmission for large payloads.
    **The Consequence:** Drastically underestimating the carbon footprint of FL and making incorrect sustainability claims compared to centralized training.
  napkin_math: |
    **Assumptions & Constraints:**
    - Fleet size: 1,000,000
    - Local Compute: 100 J/device
    - 5G Payload: 500 MB at 0.5 J/MB
    - Carbon intensities: Local = 400 gCO2/kWh, Cloud = 50 gCO2/kWh
    - Cloud aggregation-tier energy for the full job: 50 kWh

    **Calculations:**
    - 5G Energy per device = 500 * 0.5 = 250 J
    - Device energy per epoch = 100 J compute + 250 J 5G communication = 350 J/device
    - Fleet device energy = 350 J/device * 1,000,000 devices = 350,000,000 J = 97.22 kWh
    - Device-side carbon = 97.22 kWh * 400 g/kWh = 38,888 g = 38.89 kg CO2
    - Cloud aggregation carbon = 50 kWh * 50 g/kWh = 2,500 g = 2.50 kg CO2
    - Total carbon = 38.89 kg + 2.50 kg = 41.39 kg CO2/day

    **Conclusion & Interpretation:**
    - **Result: 41.39 kg CO2/day.** This total includes local compute, 5G communication, and cloud aggregation; the device-side total is dominated by the 250J per-device 5G transfer.
