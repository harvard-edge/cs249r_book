title: DP-SGD Privacy-Utility Tradeoff Diagnosis for Mobile Recommendations
scenario: You are a lead ML engineer responsible for deploying a personalized on-device recommendation model for a health tracking application. To protect user privacy, you've implemented DP-SGD for federated learning across mobile devices. Your privacy budget (ε) for a year is set to 8. Initial analysis shows that while privacy guarantees are met, the model's utility (recommendation accuracy) is significantly lower than a non-private baseline.
question: How would you diagnose poor DP-SGD recommendation utility while preserving an annual epsilon budget of 8?
details:
  realistic_solution: Diagnose the DP-SGD configuration rather than the mobile accelerator. Sweep the clipping norm, noise multiplier, client participation rate, local steps, and batch size against a fixed annual epsilon=8 and target delta using the same privacy accountant used in production. Check whether the clipping norm is too low by measuring the fraction of clipped examples and gradient signal loss, then tune noise and sampling together because privacy loss depends on the number of sampled updates, not a simple daily budget. If utility is still low, reduce training rounds or local steps, use larger effective batches where feasible, and report the resulting epsilon/utility Pareto curve before changing the privacy target.
  common_mistake: |
    **The Pitfall:** Using an overly conservative noise calibration or an inefficient choice of micro-batch size.
    **The Rationale:** Practitioners often fix the privacy budget and divide it evenly across too many updates without checking the required noise scale per update.
    **The Consequence:** Aggressively degrades the gradient signal, leading to slow convergence and poor model utility.
  napkin_math: |
    **Assumptions & Constraints:**
    - Annual Privacy Budget (ε): 8.
    - δ (delta): 10^-5.
    - Privacy accounting uses sampled Gaussian DP-SGD composition over the actual number of rounds.

    **Calculations:**
    - Do not allocate ε as 8 / 365. Per-round loss composes through an accountant that depends on sampling probability q, number of steps T, noise multiplier σ, clipping norm C, and δ.
    - For each candidate schedule, compute ε_accountant(q, T, σ, δ) and keep only runs where ε_accountant <= 8.
    - Then compare utility at the same privacy budget while varying C, σ, q, and T; high clipping rates or excessive σ identify the likely utility bottleneck.

    **Conclusion & Interpretation:**
    - **Result: Accountant-Bound Diagnosis**. The annual epsilon=8 may or may not be sufficient; the answer depends on q, T, σ, C, and δ. Utility should be diagnosed with accountant-backed sweeps, not by dividing the annual budget evenly across calendar days.
