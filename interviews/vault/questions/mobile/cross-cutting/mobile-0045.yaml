title: The On-Device Differential Privacy Budget
scenario: Your health app uses on-device ML to classify sleep stages from Apple Watch accelerometer data. You want to improve the model using federated learning, and your privacy team sets a formal differential privacy requirement for health-data risk reduction. Your privacy budget is ε = 1 per user per year. The model needs 100 federated rounds to converge.
question: How can federated health training fit 100 rounds under a yearly differential privacy budget of epsilon 1?
details:
  realistic_solution: Use privacy amplification to stretch the budget. Use 1% subsampling, a noise multiplier of sigma=1.0, gradient clipping, and Renyi DP accounting. The result yields an accumulated epsilon under budget, albeit with slower convergence.
  common_mistake: |
    **The Pitfall:** Naively adding epsilon per round without subsampling or advanced accounting.
    **The Rationale:** Engineers assume setting ε = 1 per round is acceptable without realizing privacy leakage composes additively over steps.
    **The Consequence:** 100 rounds results in a total ε = 100, catastrophically violating the HIPAA privacy constraint and exposing the company to legal liability.
  napkin_math: |
    **Assumptions & Constraints:**
    - Constraints: Budget ε = 1/year. Rounds = 100.
    - Amplification: Set Subsampling rate q = 1%, per-round noise multiplier σ = 1.0.

    **Calculations:**
    - Naive composition would fail: if each round spent ε = 1, then 100 rounds would spend ε = 100.
    - With 1% subsampling, clipping, and σ = 1.0, privacy amplification can make each selected round much cheaper than ε = 1, but the final ε must come from an RDP/PLD accountant using the target δ and exact sampling assumptions.
    - If the accountant reports ε > 1 for 100 rounds, reduce the sampling rate, increase noise, reduce the number of rounds, or allocate fewer training participations per user.

    **Conclusion & Interpretation:**
    - **Result: Accountant-Gated Constraint**. The design can fit the ε = 1/year budget only if the formal DP accountant confirms it under the chosen δ, clipping norm, sampling rate, noise multiplier, and participation limits.
