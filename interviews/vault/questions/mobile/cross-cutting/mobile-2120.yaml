title: 'Wireless Pipeline Micro-Batch Scheduling'
scenario: 'Two mobile devices collaborate via a constrained Bluetooth 5.0 link (2 Mbps effective) to run a 3B model (hidden dimension 3072) using pipeline parallelism. Compute time per token per device is 15ms.'
question: 'Create a pipeline schedule for continuous generation, and calculate the exact activation quantization precision required to prevent network synchronization stalls from exceeding the compute time.'
details:
  realistic_solution: 'Pipeline parallelism over BLE is bottlenecked by transfer latency. To hide network I/O, apply 4-bit KV quantization and interleave micro-batches. Transferring INT4 payloads ensures communication-computation overlap.'
  common_mistake: |
    **The Pitfall:** Assuming pipeline parallelism is compute-bound over wireless links.
    **The Rationale:** Candidates focus entirely on weight partitioning and compute time without calculating wireless data transfer latency.
    **The Consequence:** The network I/O creates massive pipeline bubbles, completely stalling autoregressive decoding.
  napkin_math: |
    **Assumptions & Constraints:**
    - Link Bandwidth: 2 Mbps = 250 KB/s.
    - Hidden Dim: 3072.

    **Calculations:**
    - FP16 Payload: 3072 * 2 bytes = 6144 bytes.
    - FP16 Transfer Time: 6144 / 250,000 = 24.5ms (> 15ms).
    - INT4 Payload: 3072 * 0.5 bytes = 1536 bytes.
    - INT4 Transfer Time: 1536 / 250,000 = 6.14ms (< 15ms).

    **Conclusion & Interpretation:**
    - **Result: 6.14ms (I/O-Bound)**. INT4 compression is required to completely hide the 6.14ms transfer latency behind the 15ms compute block.
