title: Mobile FL Battery Churn
scenario: A mobile keyboard FL job trains for 6 minutes every night at 3 W on 2 million selected phones. The team sees opt-out rates increase after rollout.
question: How much battery energy does a 6-minute, 3 W nightly mobile FL job consume, and why might users opt out?
details:
  realistic_solution: 'Each device uses 3 W x 0.1 h = 0.3 Wh per night. On a 15 Wh phone, that is about 2% of battery capacity, which users may notice if it happens while unplugged or when the phone is warm. At 2 million selected phones, even a small per-device annoyance can create support load and opt-outs. The likely issue is battery/thermal user experience, not just model quality.'
  common_mistake: |
    **The Pitfall:** Treating on-device training as free.
    **The Rationale:** Engineers focus purely on saving cloud GPU costs and ignore the physical energy drain on end-user devices.
    **The Consequence:** Significant user annoyance, battery degradation, and increased opt-outs.
  napkin_math: |
    **Assumptions & Constraints:**
    - Power consumption: 3 W.
    - Duration: 6 minutes.
    - Typical phone battery capacity: 15 Wh.

    **Calculations:**
    - Energy = 3 W * (6 / 60 h) = 0.3 Wh.
    - Share of battery = 0.3 Wh / 15 Wh = 2%.

    **Conclusion & Interpretation:**
    - **Result: 2% battery drain (Power-Bound).** Noticeable drain can cause user annoyance and opt-outs.
