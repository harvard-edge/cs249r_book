title: On-Device LoRA Personalization for CLIP Photo Search
scenario: Your photo search app uses LoRA on-device to personalize a 150M parameter CLIP-like vision encoder (FP16, 300 MB). The adapted weights never leave the device.
question: How should you size and manage LoRA personalization for an on-device CLIP-like photo search model regarding memory, time, and migration?
details:
  realistic_solution: LoRA adapters at rank 4 yield ~148K trainable params (296 KB), making them trivial to store and migrate. However, training memory is dominated by the frozen 300 MB model and activations (~43 MB), requiring ~344 MB total. Training time depends on the implementation and should be scheduled opportunistically; the key sizing decision is memory headroom rather than the adapter file size.
  common_mistake: |
    **The Pitfall:** Assuming "LoRA is tiny, so training memory is tiny."
    **The Rationale:** Candidates focus only on the LoRA weights and forget that backpropagation still requires a forward pass through the full frozen model and storing activations for all layers.
    **The Consequence:** The app triggers out-of-memory (OOM) kills during training because the total memory footprint exceeds expectations.
  napkin_math: |
    **Assumptions & Constraints:**
    - Frozen model: 300 MB.
    - LoRA params: Rank 4 on Q/V projections across 12 layers (768 dim) = ~148K params = 296 KB.
    - Images to train: 200.
    - Device compute: 5 TOPS NPU, memory bandwidth 60 GB/s.

    **Calculations:**
    - Training memory: 300 MB (frozen model) + 0.3 MB (LoRA) + 0.6 MB (Adam state) + 43 MB (Activations) = ~344 MB.
    - Adapter storage: 296 KB is less than 0.1% of the 300 MB frozen model, so syncing/migrating the personalization state is cheap.
    - Training work: 200 images require forward/backward passes through the frozen encoder even though only the LoRA weights update, so latency and battery should be measured on target devices and scheduled while charging or idle.

    **Conclusion & Interpretation:**
    - **Result: 344 MB (Memory Capacity)**. The adapter is tiny, but the training job must reserve roughly 344 MB because the full frozen model and activations dominate memory.
