title: The Energy Cost of Privacy
scenario: Your team is building a driver assistance feature for a popular automotive app. The feature requires training on user driving data (GPS traces, accelerometer readings). To protect user privacy and minimize battery drain, you're considering using Federated Learning.
question: What is the fundamental physical reason why sending small, trained model updates from the device is often more energy-efficient than uploading the raw user data to a central server?
details:
  realistic_solution: |
    The foundational constraint is that data transmission over a wireless cellular radio is overwhelmingly more energy-intensive per byte than localized on-chip computation. Powering the radio amplifier to drive a signal to a distant cell tower physically eclipses the microscopic pico-joule energy footprint utilized by a modern Neural Processing Unit (NPU) to execute localized matrix multiplications. It is radically more power-efficient to continuously process local data and occasionally burst-transmit a deeply compressed payload (like gradient updates) rather than chronically beaming gigabytes of raw telemetry.
  common_mistake: |
    **The Pitfall:** Drastically underestimating the raw power draw of cellular basebands compared to NPU compute cores.
    **The Rationale:** Engineers intuit that a "heavy" Neural Network gradient update consumes immense power, assuming a fast 4G HTTP upload represents a lighter power load on the device.
    **The Consequence:** Designing aggressively cloud-tethered architectures that drain user batteries astronomically faster than on-device processing.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Upload Payload: 100 MB of local telemetry data.
       - LTE Upload Cost: ~20 mJ / MB.
       - NPU Compute Cost: ~4 pJ / FLOP on standard mobile SoCs.
       - FL Training Workload: 10 GFLOPs to train a 50M parameter model.
    2. **Calculations:**
       - Centralized Upload Energy: 100 MB * 20 mJ/MB = 2000 mJ = 2.0 Joules.
       - Local Training Energy: 10 GFLOPs (10 * 10^9 FLOPs) * (4 * 10^-12 J/FLOP) = 0.04 Joules.
       - Efficiency Delta: 2.0 Joules / 0.04 Joules = 50x ratio.
    3. **Conclusion & Interpretation:**
       **Result: Local training is 50x more energy efficient (Power-Bound solved).** The physical resistance of transmitting RF signals mandates on-device processing algorithms like Federated Learning.
  options:
  - Cellular data plans are expensive, so it primarily saves the user money.
  - Central servers have more powerful GPUs, leading to faster training overall.
  - Wireless data transmission is significantly more energy-intensive per byte than on-chip computation.
  - On-device computation is too slow, so uploading is the only realistic option for training.
