title: On-Device DP-SGD Runtime for A17 Pro Text Prediction
scenario: You are designing an on-device personalization system for a next-word prediction model on an iPhone 15 Pro. Inference may use the A17 Pro Neural Engine, but the DP-SGD fine-tuning loop must run on supported mobile runtime paths such as CPU and Metal. The system must ensure user privacy with a strict epsilon budget of 2.0 per week while staying within the thermal envelope (~5W) and unified memory constraints (8 GB shared across processors).
question: How would you specify on-device DP-SGD text prediction on A17 Pro with private clipping and noise?
details:
  realistic_solution: Specify DP-SGD as a small on-device fine-tuning loop with per-example clipping, secure seeded noise generation, and fused reduction/add-noise kernels placed on the mobile runtime path that actually supports them, typically CPU plus GPU/Metal rather than assuming arbitrary PRNG execution on the Neural Engine. Keep per-example gradient buffers short-lived, accumulate clipped gradients into one model-sized buffer, and tune micro-batch size by measured memory pressure and thermal behavior. The privacy accountant enforces epsilon 2.0 per week and blocks further personalization when the budget is exhausted.
  common_mistake: |
    **The Pitfall:** Treating DP-SGD as ordinary fine-tuning with a noise call bolted on after the fact.
    **The Rationale:** Candidates ignore per-example clipping, privacy accounting, and the cost of materializing every unclipped gradient in unified memory.
    **The Consequence:** The system either violates the epsilon budget or creates avoidable memory traffic and thermal spikes during personalization.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model Details: 10M params, FP16 gradients (20 MB per vector).
    - Micro-batch size: 32 examples.
    - Naive per-example gradient storage would keep one 20 MB vector per example.
    - Fused clipping accumulates into one clipped-gradient buffer plus one noise buffer.

    **Calculations:**
    - Naive per-example gradient memory = 32 * 20 MB = 640 MB before activations and optimizer state.
    - Fused approach resident gradient memory ≈ 20 MB clipped accumulator + 20 MB noise/output buffer = 40 MB, plus temporary per-layer workspace.
    - Memory saved before activations ≈ 640 MB - 40 MB = 600 MB.
    - At 10 steps/sec, writing one model-sized noise/update buffer is 20 MB * 10 = 200 MB/s; this is manageable, but duplicating full per-example gradients would multiply traffic and heat.

    **Conclusion & Interpretation:**
    - **Result: Memory-aware DP-SGD**. Fused clipping and noise addition are needed to avoid hundreds of MB of extra resident gradients while preserving the epsilon 2.0 weekly privacy budget and thermal headroom.
