title: The Secure Enclave Boundary
scenario: Your banking app uses on-device face verification. The ML model runs on the main NPU and returns a 128-dim embedding. The embedding is compared against the enrolled template stored in the Secure Enclave. A security researcher points out that the embedding travels from the NPU through main memory to the Secure Enclave and can be intercepted.
question: How do you protect the embedding in transit, and why can't you just run the ML model inside the Secure Enclave?
details:
  realistic_solution: The Secure Enclave (Apple) / StrongBox (Android) is a dedicated security coprocessor handling cryptographic ops with ~256 KB of RAM. It physically cannot run a face verification neural network. Security relies on hardware-level isolation of the memory bus or robust software-level encryption before transit.
  common_mistake: |
    **The Pitfall:** Assuming the Secure Enclave can execute arbitrary deep neural networks.
    **The Rationale:** Candidates conflate "end-to-end security" with executing the entire ML workload inside trusted execution environments.
    **The Consequence:** They architect physically impossible data pipelines, ignoring the severe memory constraints of security coprocessors.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Secure Enclave Memory: ~256 KB.
       - Model: MobileFaceNet (~5 MB weights, ~20 MB activations).
       - Transit Payload: 128-dim embedding (512 bytes).
    2. **Calculations:**
       - Required Memory: 25 MB.
       - Capacity Ratio: 25 MB / 0.25 MB = 100x over capacity.
       - Transit Attack Window: 512 bytes through DRAM takes ~0.1µs.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound.** The Enclave is strictly bounded to 256 KB; ML execution must happen on the NPU, with security enforced via hardware memory isolation or encrypted transit.
  options:
  - Edge-side health checks should focus on hardware metrics; model-level metrics are too noisy.
  - The Secure Enclave has ~256 KB of memory. It cannot run a model requiring ~25 MB of working memory.
  - Run the face verification model inside the Secure Enclave for end-to-end security.
  - Model obfuscation through weight scrambling provides equivalent security to hardware-backed encryption.
  correct_index: 1
