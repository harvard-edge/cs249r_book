title: Mobile New 0016
scenario: A mobile app includes a 20MB TFLite model compressed in a standard Android APK. The inference runs in 50ms, but the UI freezes for 4 seconds every time the model is initialized.
question: "Why does a compressed 20MB TFLite model freeze the Android UI for 4 seconds during first initialization?"
details:
  realistic_solution: ZIP-compressing the model file within the APK breaks zero-copy `mmap`. The OS is forced to allocate 20MB of heap RAM and execute a synchronous, single-threaded inflation algorithm on the CPU before the interpreter can map the weights.
  common_mistake: |
    **The Pitfall:** Blindly compressing models in the APK bundle to save download size.
    **The Rationale:** Engineers assume smaller file sizes are always better, forgetting that zipped assets break the zero-copy initialization path.
    **The Consequence:** Saving a minor amount of network bandwidth at the cost of a massive, user-hostile 4-second UI freeze.
  napkin_math: |
    **Assumptions & Constraints:**
    - 20MB model.
    - CPU decompression throughput = 5MB/s.
    - Zero-copy mmap = 2GB/s.
    
    **Calculations:**
    - Inflation Time = 20 MB / 5 MB/s = 4.0 seconds.
    - Mmap Time = 20 MB / 2000 MB/s = 0.01 seconds.
    
    **Conclusion & Interpretation:**
    - **Result: I/O-Bound**. File compression induces a severe 4.0-second initialization penalty, destroying the user experience.
