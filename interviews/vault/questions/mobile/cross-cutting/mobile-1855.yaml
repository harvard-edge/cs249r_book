title: Guardrail Latency Budget on a Mobile LLM
scenario: 'A mobile app runs a 1.3B on-device LLM for chat assistance. The UX spec allows 800ms first-token latency. Prefill takes 600ms. You have 200ms for a guardrail. Options: (A) 125M classifier at 180ms, (B) 7M classifier at 25ms, (C) prefix embedding similarity at 8ms.'
question: Which guardrail mix fits a 200 ms safety budget after a 600 ms prefill on an NPU?
details:
  realistic_solution: Deploy the 8 ms prefix similarity check (Option C) as the safest fit for the 200 ms post-prefill guardrail budget. If the design requires an additional prompt-level classifier before generation, Option B can also fit when run in the same envelope because 8 ms + 25 ms = 33 ms. Option A alone is still within 200 ms at 180 ms, but it leaves only 20 ms of headroom and cannot be combined with B without exceeding the budget.
  common_mistake: |
    **The Pitfall:** Waiting to run the guardrail payload until the entire LLM response has finished generating.
    **The Rationale:** Engineers treat safety validation as a distinct post-processing pipeline stage rather than an interleaved, streaming task.
    **The Consequence:** This completely blocks the UI from displaying any generated text, introducing a catastrophic, user-facing delay proportional to sequence length.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target Safety budget: 800 ms (UX Limit) - 600 ms (Prefill) = 200 ms.
    - Option A (125M): 180 ms latency.
    - Option B (7M): 25 ms latency.
    - Option C (Prefix): 8 ms latency.

    **Calculations:**
    - Option C only: 8 ms < 200 ms, leaving 192 ms headroom.
    - Option C + Option B serially before generation: 8 ms + 25 ms = 33 ms, leaving 167 ms headroom.
    - Option A only: 180 ms < 200 ms, leaving 20 ms headroom.
    - Option A + Option B serially: 180 ms + 25 ms = 205 ms, exceeding the budget by 5 ms.

    **Conclusion & Interpretation:**
    - **Result: Latency-Bound**. Option C is the safest direct answer to the 200 ms post-prefill safety budget. A C+B cascade is also feasible if both checks are prompt-level guards; Option A should be reserved for designs that can tolerate very little latency headroom.
