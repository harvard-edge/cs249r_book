title: NPU Frame Dropping Impact on Equalized Odds
scenario: An on-device facial expression recognition model runs on a dual-core NPU to trigger accessibility actions. During intensive gaming, the shared LPDDR5X memory experiences high bandwidth contention from the GPU, forcing the NPU to reduce the processing rate from 30 FPS to 10 FPS to avoid memory starvation. The system requires at least 2 consecutive frames of an expression to register a detection. Subgroup A typically exhibits micro-expressions lasting 150ms, while Subgroup B exhibits expressions lasting 300ms.
question: Why does this hardware-driven throttling degrade the Equalized Odds fairness metric specifically for Subgroup A, and what is the True Positive Rate calculation?
details:
  realistic_solution: The shared memory bandwidth constraints force the system to 10 FPS, or one sampled frame every 100ms. The detector requires at least 2 consecutive positive frames, so an expression must be visible across at least about 200ms of sampled time to be reliably detected. Subgroup A's 150ms micro-expressions span only about 1.5 frame intervals and may produce only one sampled positive frame, lowering TPR_A. Subgroup B's 300ms expressions span about 3 frame intervals and can satisfy the threshold, so TPR_B remains much higher. Equalized Odds is violated because the true positive rates are no longer equal across groups under the same system load.
  common_mistake: |
    **The Pitfall:** Focusing only on theoretical TOPS and ignoring time-series behavior.
    **The Rationale:** Candidates fail to connect physical hardware throttling directly to the mathematical degradation of demographic True Positive Rates.
    **The Consequence:** Missing the fundamental bias introduced by system load, assuming fairness is only a property of the model weights.
  napkin_math: |
    **Assumptions & Constraints:**
    - System throttled to 10 FPS (100ms per frame) under load.
    - Subgroup A = 150ms, Subgroup B = 300ms.

    **Calculations:**
    - At 10 FPS (100ms/frame), the 2-frame detection threshold requires about 2 * 100ms = 200ms of observable expression.
    - Subgroup A duration: 150ms / 100ms per frame = 1.5 frame intervals, below the 2-frame threshold. Under a deterministic threshold model, TPR_A = detected positives / actual positives = 0 / positives = 0.
    - Subgroup B duration: 300ms / 100ms per frame = 3.0 frame intervals, above the 2-frame threshold. Under the same model, TPR_B = positives / positives = 1.0.
    - TPR gap: TPR_B - TPR_A = 1.0 - 0 = 1.0.

    **Conclusion & Interpretation:**
    - **Result: TPR_A can drop to 0 while TPR_B remains near 1.0 (Memory-Bandwidth-Bound)**. The subgroup-specific TPR gap violates Equalized Odds because hardware throttling changes detection probability differently across groups.
