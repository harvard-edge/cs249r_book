title: NPU Frame Dropping Impact on Equalized Odds
scenario: An on-device facial expression recognition model runs on a dual-core NPU to trigger accessibility actions. During intensive gaming, the shared LPDDR5X memory experiences high bandwidth contention from the GPU, forcing the NPU to reduce the processing rate from 30 FPS to 10 FPS to avoid memory starvation. The system requires at least 2 consecutive frames of an expression to register a detection. Subgroup A typically exhibits micro-expressions lasting 150ms, while Subgroup B exhibits expressions lasting 300ms.
question: Why does this hardware-driven throttling degrade the Equalized Odds fairness metric specifically for Subgroup A, and what is the True Positive Rate calculation?
details:
  realistic_solution: The shared memory bandwidth constraints force the system to 10 FPS, or one sampled frame every 100ms. The detector requires at least 2 consecutive positive sampled frames, so detection depends on how each expression overlaps the sampling grid. A 150ms Subgroup A expression can sometimes cover two samples, but only for favorable phase alignment; with uniformly random start phase, the chance is about 50%. A 300ms Subgroup B expression covers at least two sampled frames for essentially any phase, so its TPR remains near 1.0. Equalized Odds is violated because the true positive rates are no longer equal across groups under the same system load.
  common_mistake: |
    **The Pitfall:** Focusing only on theoretical TOPS and ignoring time-series behavior.
    **The Rationale:** Candidates fail to connect physical hardware throttling directly to the mathematical degradation of demographic True Positive Rates.
    **The Consequence:** Missing the fundamental bias introduced by system load, assuming fairness is only a property of the model weights.
  napkin_math: |
    **Assumptions & Constraints:**
    - System throttled to 10 FPS (100ms per frame) under load.
    - Subgroup A = 150ms, Subgroup B = 300ms.
    - Expression start time is uniformly distributed relative to the sampling grid.

    **Calculations:**
    - At 10 FPS, samples arrive every 100ms and detection requires two sampled positives.
    - For a 150ms expression, two samples are captured only if the next sample arrives within the first 50ms of the expression: TPR_A ≈ 50ms / 100ms = 0.5.
    - For a 300ms expression, at least two 100ms-spaced samples fall inside the expression for any start phase: TPR_B ≈ 1.0.
    - TPR gap: TPR_B - TPR_A ≈ 1.0 - 0.5 = 0.5.

    **Conclusion & Interpretation:**
    - **Result: TPR_A can fall to about 0.5 while TPR_B remains near 1.0.** The subgroup-specific TPR gap violates Equalized Odds because hardware throttling changes detection probability differently across groups.
