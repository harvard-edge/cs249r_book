title: On-Device Guardrail Pipeline for Hexagon NPU
scenario: You are designing an on-device safety guardrail system for a chat application running on an edge device. The application needs to perform real-time toxic content filtering and PII redaction on user inputs before processing. The NPU provides 45 TOPS INT8 capability.
question: How should a mobile chat app perform low-latency on-device PII and toxicity guardrails?
details:
  realistic_solution: |
    The system must utilize a strict cascaded architecture. Start with lightning-fast, deterministic CPU rules (Regex, Bloom filters) to prune obvious PII. For deeper semantic filtering, trigger an immensely quantized, specialized INT8 Small Language Model (e.g., ~1B parameters) compiled strictly for the NPU. This leverages the 45 TOPS burst compute for rigorous safety analysis while efficiently maintaining a minimal memory footprint on the shared LPDDR bus, preserving space for the primary generative model.
  common_mistake: |
    **The Pitfall:** Architecting heavy, unquantized transformer pipelines running synchronously on the general-purpose CPU.
    **The Rationale:** Candidates ignore the strict power efficiency requirements of edge systems and blindly apply server-side safety architectures, subjecting every single interaction to massive compute overhead.
    **The Consequence:** Unacceptable battery drain, catastrophic UI latency spikes, and severe memory bandwidth contention that starves the host application.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Target Model: 1 Billion parameter INT8 SLM (Small Language Model).
       - Input sequence: 128 tokens. Complexity per token: ~256 MACs per parameter.
       - NPU Compute: 45 TOPS peak (assuming a conservative ~20% realistic utilization).
    2. **Calculations:**
       - Effective Compute: 45 TOPS * 0.20 = 9 TOPS (9,000 GOPS).
       - Total MACs for prompt: 1 Billion params * 128 tokens * 256 ops = 32.7 Giga-MACs (~65 GOPS).
       - Execution Latency: 65 GOPS / 9,000 GOPS/sec = 0.0072 seconds (7.2 ms).
    3. **Conclusion & Interpretation:**
       **Result: 7.2 ms inference overhead (Compute-Bound).** A heavily quantized SLM offloaded to the NPU executes flawlessly within standard real-time interaction budgets without bottlenecking the device.
