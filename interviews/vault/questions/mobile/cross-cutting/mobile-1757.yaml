title: 'Bias Mitigation on Edge AI: NPU'
scenario: You are leading the ML engineering team responsible for deploying a critical on-device image classification model for a privacy-sensitive application on mobile devices. Initial internal audits indicate that the model exhibits significant performance disparities across certain demographic subgroups.
question: What metrics would you prioritize, and how would you adapt your evaluation approach to measure intersectional fairness given a 12 GB memory and 34.7 TOPS edge constraint?
details:
  realistic_solution: Develop an efficient sampling strategy for on-device data collection that targets underrepresented subgroups, coupled with a tiered evaluation approach. Prioritize key fairness metrics like False Positive Rate (FPR) and False Negative Rate (FNR) parity for critical subgroups using lightweight, pre-computed summary statistics on the NPU itself.
  common_mistake: |
    **The Pitfall:** Designing comprehensive subgroup evaluation pipelines that ignore device computational overhead.
    **The Rationale:** Candidates propose cloud-like evaluation workflows, forgetting that running hundreds of extra inferences on the edge drains battery and ruins user experience.
    **The Consequence:** The evaluation pipeline is either rejected by the platform team for battery abuse or fails to provide timely insights.
  napkin_math: |
    **Assumptions & Constraints:**
    - Evaluation requirement: 1,000 samples per intersectional slice, 10 slices = 10,000 samples.
    - Candidate inference cost: 20 GOP per sample.
    - Edge budget: 34.7 TOPS peak and 12 GB memory.
    - Store compact summaries of 2 KB per sample, not full tensors or images.

    **Calculations:**
    - Peak throughput estimate = 34.7 TOPS / 20 GOP = 1,735 samples/sec before utilization losses.
    - Full evaluation compute time at peak = 10,000 / 1,735 = 5.8 seconds; if utilization is only 10%, time is about 58 seconds.
    - Summary memory = 10,000 * 2 KB = 20 MB, far below 12 GB.

    **Conclusion & Interpretation:**
    - **Result: Summary-Based Evaluation Fits**. Prioritize FPR/FNR, calibration, and coverage by intersectional slice using compact counters and histograms; raw-data buffering, not the 34.7 TOPS peak, is the avoidable memory risk.
