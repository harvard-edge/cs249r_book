title: The Core Benefit of Federated Learning
scenario: You're working on a new smart keyboard for mobile devices. The team wants to improve the auto-correct model using user-specific typing data. A senior engineer suggests using Federated Learning.
question: What is the primary benefit of using Federated Learning in this mobile context?
details:
  realistic_solution: The primary benefit is that it allows the model to be trained on sensitive user data without that data ever leaving the user's device. Only the model updates are sent to a central server for aggregation. This dramatically improves user privacy and reduces network costs associated with uploading large amounts of raw user data.
  common_mistake: |
    **The Pitfall:** Confusing Federated Learning with traditional distributed training and assuming raw data goes to the server.
    **The Rationale:** Engineers misinterpret the architecture, missing the core privacy value proposition.
    **The Consequence:** Underestimating the massive data privacy and network cost advantages of keeping raw user data strictly on the device.
  napkin_math: |
    **Assumptions & Constraints:**
    - Users: 1 million.
    - Raw Data per User: 1 MB.

    **Calculations:**
    - Centralized Data Cost: 1 million users x 1 MB = 1 TB of raw data uploaded.
    - Federated Learning Data Cost: 0 MB of raw data uploaded.

    **Conclusion & Interpretation:**
    - **Result: 1 TB vs 0 MB Raw Data (Privacy-Bound)**. Federated setups ensure zero transmission of raw telemetry data.
  options:
  - It sends 1 TB of user data to a central server to be trained more efficiently on a large GPU cluster.
  - It allows model training on local user data without the raw data (0 MB) ever leaving the device.
  - It makes model inference faster on the mobile device by compressing the model before deployment.
  - It encrypts 1 TB of user data before sending it to the server, where it is decrypted for training.
