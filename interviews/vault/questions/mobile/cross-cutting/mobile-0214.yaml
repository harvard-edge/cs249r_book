title: 'The Federated Learning Data Tax'
scenario: 'We''re considering a smart reply feature for our mobile messaging app. The two options are centralized training vs. Federated Learning (FL). In the centralized approach, each user uploads 10 KB of raw text data per day. In the FL approach, the model size is 500 KB (compressed), and each participating device completes 4 training rounds per day, uploading its gradients each time.'
question: 'How much more daily bandwidth can Federated Learning use than centralized upload for a smart reply feature?'
details:
  realistic_solution: 'FL uploads more data per user than centralized. Centralized: 10 KB/day of raw data. FL: gradient = model size (e.g., 500 KB compressed per round). With 4 rounds/day = 2000 KB/day — 200x more than centralized. FL trades bandwidth for privacy: more bytes, but noisy gradients, not raw keystrokes. Break-even depends on regulatory cost: GDPR compliance + breach liability for centralized data often exceeds FL''s bandwidth cost.'
  common_mistake: |
    **The Pitfall:** Assuming Federated Learning is always more resource-efficient because it processes data locally.
    **The Rationale:** Engineers equate 'privacy-preserving' with 'lightweight'.
    **The Consequence:** Drastically underestimating the massive bandwidth required to transmit full model gradients multiple times a day.
  napkin_math: |
    **Assumptions & Constraints:**
    - Centralized Data: 10 KB/day.

    **Calculations:**
    - FL Overhead: 500 KB gradients * 4 rounds/day = 2000 KB/day.
    - Comparison: 2000 KB / 10 KB = 200x more data for FL.

    **Conclusion & Interpretation:**
    - **Result: 200x (Network-Bound)**. Federated Learning transfers significantly more data than raw data upload.
  options:
  - 'Federated Learning uploads 100x more data (1 MB vs 10 KB)'
  - 'Centralized training uploads more data because raw text is less efficient than model weights.'
  - 'Federated Learning uploads 200x more data (2 MB vs 10 KB)'
  - 'They are roughly equal; the privacy benefit has no significant data cost.'
