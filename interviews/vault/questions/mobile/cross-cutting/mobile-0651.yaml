title: The Near-Miss Privacy Paradox
scenario: "You are the Principal ML Architect for a luxury automaker. Your goal is to improve the ADAS by learning from 'near-miss' driving events across a fleet of 1 million vehicles."
question: "What hybrid near-miss learning system minimizes cellular transfer cost while preserving privacy and safety validation?"
details:
  realistic_solution: |
    Implement a hybrid federated architecture utilizing lightweight on-device event triggers (e.g., small MobileNet derivatives) to flag near-misses. Only transmit heavily quantized (INT4) event metadata and severely pruned clip data for server-side validation. This dramatically reduces the cellular payload and preserves privacy.
  common_mistake: |
    **The Pitfall:** Focusing purely on the technical merits of centralized training without pricing out network effects.
    **The Rationale:** Engineers ignore the prohibitive cost of cellular data transfer at scale, assuming cloud-like unmetered bandwidth.
    **The Consequence:** Operationally reckless deployments and financially unviable architectures.
  napkin_math: |
    **Assumptions & Constraints:**
    - Fleet size: 1,000,000 vehicles.
    - Event frequency: 1 near-miss per car per week.
    - Cellular data cost: $2/GB.
    - Streams: 1GB/event vs. Metadata: 1MB (0.001GB)/event.

    **Calculations:**
    - Streaming cost: 1,000,000 * 1GB * $2/GB = $2,000,000/week.
    - Hybrid metadata cost: 1,000,000 * 0.001GB * $2/GB = $2,000/week.

    **Conclusion & Interpretation:**
    - **Result: 1000x cost reduction (Network-Bandwidth Bottleneck)**. The hybrid approach slashes transmission costs, mitigating the cellular-bandwidth bottleneck.
  options:
  - 'Stream all sensor data to the cloud via cellular network 24/7 to guarantee the highest fidelity training dataset.'
  - 'Run a hybrid system: local models flag potential near-misses but only transmit anonymized, compressed metadata.'
  - 'Deploy an untested, unvalidated federated learning model directly to the control systems of 1 million cars.'
  - 'Store all near-miss data locally until the user connects their car to an active Wi-Fi connection.'
