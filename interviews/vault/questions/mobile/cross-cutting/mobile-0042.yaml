title: The Federated Keyboard
scenario: You're building a next-word prediction model for a mobile keyboard. The model must improve from user typing patterns, but you cannot collect user keystrokes on your servers.
question: What training approach would you use so the keyboard model learns from user typing while raw keystrokes never leave each device?
details:
  realistic_solution: Use secure-aggregation DP-FedAvg. Each selected phone trains locally on recent keyboard data, clips its update, participates in secure aggregation, and the server adds/calibrates noise to the aggregate before updating the global model. Raw keystrokes and individual updates never leave the device in readable form. Treat epsilon as an accountant-managed budget across rounds, not a simple noise-cancellation claim; tune clipping, sampling rate, rounds, and compression against utility. With 10K devices and ~62 KB compressed updates, server traffic is about 620 MB per round.
  common_mistake: |
    **The Pitfall:** Anonymizing the data before uploading it to central servers.
    **The Rationale:** Engineers believe removing explicit PII is sufficient for data privacy.
    **The Consequence:** Keystroke patterns can still re-identify users, violating regulations like GDPR and CCPA.
  napkin_math: |
    **Assumptions & Constraints:**
    - 10,000 devices per round
    - 5 MB update per device
    - DP Noise parameters: $\sigma$ = 1.0, Sensitivity (C) = 1.0
    - Epsilon per round: $\epsilon$ = 2

    **Calculations:**
    - Raw server bandwidth before compression = 10,000 x 5 MB = 50,000 MB = 50 GB per round.
    - If top-k sparsification/quantization reduces each update to ~62 KB, compressed bandwidth = 10,000 x 62 KB = 620,000 KB = ~620 MB per round.
    - Privacy accounting must compose across rounds using the chosen DP accountant. A simple upper bound would add per-round epsilons, but production systems should use the actual sampling rate, clipping norm, noise multiplier, rounds, and target delta to track the consumed budget.

    **Conclusion & Interpretation:**
    - **Result: DP-FedAvg With Accounted Privacy Budget**. Aggregating many clipped updates improves utility, but it does not make each user's privacy noise disappear. The defensible design is secure aggregation plus a DP accountant and a measured communication budget of ~620 MB per compressed round.
