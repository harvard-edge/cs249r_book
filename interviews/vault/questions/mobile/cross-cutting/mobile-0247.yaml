title: The Privacy vs. Battery-Life Tax
scenario: 'Your team is developing a driver assistance feature for a connected car''s companion mobile app. The privacy team advocates for a Federated Learning (FL) approach, requiring the mobile GPU to run at 3 Watts for 60 seconds. The product team prefers a Cloud approach, uploading 1 MB of sensor data via the cellular modem at 5 Watts for 3 seconds.'
question: 'Which uses less energy for mobile A/B testing: 60s of 3W federated learning or a 3s, 5W cellular upload?'
details:
  realistic_solution: 'The correct approach is to calculate the total energy (Power × Time) for each scenario and compare them. The FL approach, despite avoiding data uploads, consumes significantly more energy because of the prolonged period of intense computation on the mobile SoC. The cloud approach uses a short, efficient burst of the cellular radio. This demonstrates a direct trade-off between user privacy (favored by FL) and user experience via battery life (favored by the cloud approach).'
  common_mistake: |
    **The Pitfall:** Assuming avoiding network transmission is always the most energy-efficient option.
    **The Rationale:** Engineers underestimate the sustained power draw of the mobile SoC during active computation.
    **The Consequence:** Massively draining user batteries in the name of privacy without quantifying the energy tax.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - FL Compute: 3 W for 60 seconds.
       - Cloud Upload: 5 W for 3 seconds.
    2. **Calculations:**
       - FL Energy: 3 W * 60 s = 180 Joules.
       - Cloud Energy: 5 W * 3 s = 15 Joules.
       - Ratio: 180 / 15 = 12x.
    3. **Conclusion & Interpretation:**
       - **Result: 180 Joules vs 15 Joules (FL is 12x more energy-intensive).**
  options:
  - A) Cloud approach is much costlier (~1500 Joules), as uploading data is always expensive.
  - B) Both approaches consume roughly the same amount of energy (~150-180 Joules).
  - C) The FL approach is much costlier (~180 Joules vs ~15 Joules for the cloud).
  - D) The energy cost cannot be compared, as one is compute (Watts) and the other is data (MB).
