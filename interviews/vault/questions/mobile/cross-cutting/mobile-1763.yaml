title: Responsible AI Evaluation on Snapdragon 8 Gen 3 for On-Device Sentiment Analysis
scenario: Your team is tasked with deploying a real-time sentiment analysis model directly on mobile devices. Model A might have a higher inference latency variation across different demographic groups. Model B exhibits more consistent latency and resource usage profiles.
question: How would you choose between two mobile sentiment models when fairness tail latency conflicts with average efficiency?
details:
  realistic_solution: |
    Evaluate both models on accuracy, subgroup error rates, subgroup p50/p95/p99 latency, energy per inference, sustained thermal behavior, and documentation quality. Model A's lower average latency is not enough if a protected or important user group sees a 50 ms p99 tail while Model B stays near 10 ms across groups. Prefer Model B when accuracy and bias metrics are comparable because it has lower tail risk, more predictable power, and easier governance evidence. The release decision should include model cards, known limitations, subgroup coverage, red-team results, and a monitoring plan for drift after deployment.
  common_mistake: |
    **The Pitfall:** Focusing solely on aggregate accuracy and average latency metrics.
    **The Rationale:** Candidates neglect the distributional aspects of performance (e.g., worst-case tail latency for specific subgroups) and long-term energy implications.
    **The Consequence:** Deploying a model that performs poorly for underrepresented demographics or severely drains battery on older devices.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model A: 5 ms average latency, 50 ms p99 latency for a measured subgroup. Active power: 2 W.
    - Model B: 8 ms average latency, 10 ms p99 latency across measured subgroups. Active power: 1.8 W.
    - Real-time latency budget = 100 ms.

    **Calculations:**
    - Model A base energy: 2 W * 0.005 s = 0.010 J = 10 mJ.
    - Model A p99 conditional energy: 2 W * 0.050 s = 0.100 J = 100 mJ for affected tail requests.
    - Model B base energy: 1.8 W * 0.008 s = 0.0144 J = 14.4 mJ.
    - Model B p99 conditional energy: 1.8 W * 0.010 s = 0.018 J = 18 mJ.
    - Model A saves 4.4 mJ on the average request but can spend 82 mJ more than Model B on affected tail requests.

    **Conclusion & Interpretation:**
    - **Result: Lower tail risk with modest average-cost tradeoff.** Model B has slightly higher average latency and average energy, but it greatly reduces subgroup p99 latency and conditional tail energy. Choose Model B if accuracy, calibration, and bias metrics are comparable, and document the tradeoff in the governance review.
