title: Responsible AI Evaluation on Snapdragon 8 Gen 3 for On-Device Sentiment Analysis
scenario: Your team is tasked with deploying a real-time sentiment analysis model directly on mobile devices. Model A might have a higher inference latency variation across different demographic groups. Model B exhibits more consistent latency and resource usage profiles.
question: How would you evaluate two mobile sentiment models for Responsible AI, governance, fairness, and resource impact?
details:
  realistic_solution: 'The candidate should propose a multi-faceted evaluation strategy that expands beyond standard ML metrics. This includes: 1. **Fairness Metrics:** Quantifying inference latency, energy consumption, and prediction bias across various demographic or sensitive subgroups present in the target user base. 2. **Resource Impact Assessment:** Detailed profiling of both models on the NPU for power consumption, memory footprint, and thermal implications. 3. **Model Cards & Documentation:** Evaluating the models based on the completeness and clarity of their associated documentation. 4. **Red-teaming / Adversarial Testing:** Proposing methods to test for robustness against adversarial inputs or edge cases. 5. **Organizational Accountability Frameworks:** Discussing how the chosen model aligns with the  [...truncated]'
  common_mistake: |
    **The Pitfall:** Focusing solely on aggregate accuracy and average latency metrics.
    **The Rationale:** Candidates neglect the distributional aspects of performance (e.g., worst-case tail latency for specific subgroups) and long-term energy implications.
    **The Consequence:** Deploying a model that performs poorly for underrepresented demographics or severely drains battery on older devices.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model A: 5 ms avg latency, 50 ms p99 latency for specific demographics. Power: 2W.
    - Model B: 8 ms avg latency, 10 ms p99 latency across all demographics. Power: 1.8W.
    - Real-time latency budget = 100 ms.
    - Peak INT8 Compute requirement = 20 GOPS.
    - Snapdragon 8 Gen 3 NPU = 45 TOPS.

    **Calculations:**
    - Model A base energy: 2 W * 0.005 s = 0.010 J = 10 mJ.
    - Model A tail energy: 2 W * 0.050 s = 0.100 J = 100 mJ.
    - Model B base energy: 1.8 W * 0.008 s = 0.0144 J = 14.4 mJ.
    - Model B tail energy: 1.8 W * 0.010 s = 0.018 J = 18 mJ.
    - Compute floor if the 20 GOP workload fully maps to the NPU: 20e9 ops / 45e12 ops/s = 0.00044 s = 0.44 ms.

    **Conclusion & Interpretation:**
    - **Result: Lower tail risk with modest average-cost tradeoff.** Model B has slightly higher average latency and energy, but it greatly reduces subgroup p99 latency and tail energy, making it the stronger Responsible AI choice if accuracy and bias metrics are comparable.
