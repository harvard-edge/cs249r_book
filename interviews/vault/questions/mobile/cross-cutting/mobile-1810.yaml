title: Snapdragon QNN SDK vs TFLite for Hexagon NPU Utilization
scenario: On Snapdragon 8 Gen 3 (45 TOPS NPU), you compare TFLite with Hexagon delegate vs Qualcomm's QNN SDK for a MobileNetV3-large INT8 model. TFLite achieves 3.2ms, QNN achieves 1.8ms.
question: Why does QNN run MobileNetV3-large at 1.8ms versus 3.2ms for TFLite Hexagon on Snapdragon 8 Gen 3, and which should you use?
details:
  realistic_solution: 'QNN''s advantage: (1) Direct Hexagon NPU access without the TFLite runtime abstraction layer. (2) QNN''s quantization-aware graph optimizations are co-designed with Hexagon silicon. (3) QNN supports Hexagon-specific features like zero-runtime-overhead per-channel quantization and hardware-accelerated activation functions. TFLite''s Hexagon delegate acts as a translation layer that cannot exploit all NPU features. Decision framework: if Snapdragon is your primary (>70%) target, use QNN for performance-critical models. If you need iOS+Android from one codebase, use TFLite/ONNX RT and accept the overhead. Hybrid: use QNN on Snapdragon, CoreML on Apple, with a shared ONNX model as source.'
  common_mistake: |
    **The Pitfall:** Choosing TFLite solely because it is more portable.
    **The Rationale:** Candidates fail to realize that the translation layer adds a 78% latency overhead.
    **The Consequence:** Fails latency requirements for performance-critical mobile applications (like camera viewfinder or real-time AR).
  napkin_math: |
    **Assumptions & Constraints:**
    - MobileNetV3-large: ~219M MACs (438M INT8 OPs).
    - Snapdragon 8G3 NPU: 45 TOPS.
    - TFLite latency: 3.2ms; QNN latency: 1.8ms.

    **Calculations:**
    - Compute floor = 438M OPs / 45 TOPS = ~0.01ms.
    - TFLite utilization = 0.01ms / 3.2ms = 0.3%.
    - QNN utilization = 0.01ms / 1.8ms = 0.5%.

    **Conclusion & Interpretation:**
    - **Result: 1.8ms latency (Memory Bandwidth-Bound).** QNN avoids abstraction overhead and schedules memory better.
