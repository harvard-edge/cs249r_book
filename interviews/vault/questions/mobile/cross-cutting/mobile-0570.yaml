title: Differentially Private Drowsiness Detection TCO
scenario: |
  You are the ML Systems Engineer for a smart driving assistant with 1 million daily active users. The product team is A/B testing Driver Drowsiness Detection under a privacy requirement: raw face images cannot leave the phone. Option A uploads 60 cropped images per user per day to cloud inference with retention controls. Option B runs inference on device and trains with federated learning plus differential privacy, costing $106K/year in FL infrastructure. Finance estimates each 0.1% battery-driven churn costs $50K/year in lost margin.
question: For 1M driving-app DAU, is cloud inference or DP on-device FL cheaper after infra and battery churn?
details:
  realistic_solution: |
    The correct answer is the third option: DP on-device FL is cheaper under the stated assumptions. Cloud inference costs about $311K/year from image transfer plus GPU inference and also violates the stronger privacy preference by moving face crops off device. The FL path costs $106K/year in infrastructure plus about $50K/year if the added battery drain causes 0.1% churn. The PM should budget for DP/FL operations and monitor churn, but the quantified tradeoff favors on-device FL here.
  common_mistake: |
    **The Pitfall:** Treating privacy-preserving FL as automatically too expensive.
    **The Rationale:** Engineers often price only the FL coordinator and DP accounting work, while ignoring cloud image transfer, GPU inference, and the product risk of sending face crops off device.
    **The Consequence:** The team may reject the cheaper privacy-preserving architecture and keep paying recurring cloud costs that dominate the yearly TCO.
  napkin_math: |
    **Assumptions & Constraints:**
    - 1M users, 60 images/user/day, 50 KB/image.
    - Cloud egress: $0.09/GB; cloud GPU: $3.50/hr; inference: 10ms/image on one GPU stream.
    - GPU-hours/day means aggregate serving work across the fleet, not one GPU running for only part of the day.
    - DP federated learning infrastructure: $106K/year.
    - On-device inference energy: 0.5 J/image; battery capacity: 15,000 mWh.
    - Finance estimate: 0.1% churn from battery complaints costs $50K/year.

    **Calculations:**
    - Cloud transfer: 1M * 60 * 50 KB = 3 TB/day = 3000 GB/day.
    - Cloud egress: 3000 GB/day * $0.09 = $270/day.
    - Cloud compute work: 1M * 60 * 10ms = 600,000 seconds/day = 166.7 aggregate GPU-hours/day.
    - Serving capacity implied: 166.7 / 24 = about 7 continuously busy GPU instances on average.
    - Cloud compute cost: 166.7 GPU-hours/day * $3.50 = $583/day.
    - Annual cloud cost: ($270 + $583) * 365 = about $311K/year.
    - On-device energy: 60 * 0.5 J = 30 J = 8.3 mWh/day, about 0.055% of a 15,000 mWh battery.
    - DP FL cost with churn allowance: $106K + $50K = $156K/year.

    **Conclusion & Interpretation:** **Result: Cost-Bound (DP On-Device FL Cheaper).** Option B remains about $155K/year cheaper than cloud inference under the stated churn allowance, while better matching the privacy requirement.
  options:
    - DP federated learning is too expensive because privacy noise always requires far more training rounds than cloud inference.
    - Cloud inference is cheaper because each face crop is only 50 KB, so upload and GPU costs are negligible.
    - DP on-device FL costs about $156K/year with the stated churn allowance, while cloud inference is about $311K/year.
    - The two options are roughly equivalent because the 0.055% daily battery use necessarily causes at least 0.5% churn.
