title: The Drowsiness Detection TCO Dilemma
scenario: You are the ML Systems Engineer for a popular smart driving assistant app with 1 million daily active users. The product team wants to A/B test a new 'Driver Drowsiness Detection' feature. Option A uses Centralized Cloud Inference (images uploaded continuously). Option B uses On-Device Inference with Federated Learning (runs locally, only updates sent). The PM is concerned about the $100K upfront FL infrastructure cost and potential user churn from battery drain.
question: For 1M smart-driving DAU, is cloud inference or on-device FL cheaper after FL infrastructure and battery churn?
details:
  realistic_solution: The correct method is to calculate and compare the total annual cost of both options. Option A's cost is a direct operational expense (OpEx) driven by data egress and cloud compute. Option B's cost is an indirect business expense, calculated as revenue lost from increased user churn. Comparing the quantified costs reveals the most economically sound strategy.
  common_mistake: |
    **The Pitfall:** Focusing only on cloud compute costs and ignoring data egress or user churn.
    **The Rationale:** Engineers often have a qualitative bias assuming 'federated learning is too complex' or 'cloud is always expensive' without performing a quantitative Total Cost of Ownership (TCO) analysis.
    **The Consequence:** The team makes a financially suboptimal architectural decision that costs hundreds of thousands of dollars in hidden data transfer fees.
  napkin_math: |
    1. **Assumptions & Constraints:** 1M users, 60 images/user/day, 50 KB/image. Cloud egress $0.09/GB, compute $3.50/hr. Battery is 15,000 mWh. FL infrastructure costs $106K/year.
    2. **Calculations:** Cloud Egress: 1M × 60 × 50 KB = 3 TB/day = 3000 GB. 3000 × $0.09 = $270/day. Cloud Compute: 1M × 60 × 10ms = 166.7 GPU-hrs/day. 166.7 × $3.50 = $583/day. Annual Cloud: ($270 + $583) × 365 = ~$311K. On-Device Energy: 60 × 0.5 mJ = 30 mJ = 0.0083 mWh (0.000055% drain).
    3. **Conclusion & Interpretation:** **Result: Cost-Bound (On-Device FL Cheaper).** Option B (FL) costs $106K in Year 1, saving $205K compared to the cloud's $311K/year.
  options:
  - The federated approach is too expensive; the revenue lost from 0.5% churn is over $250,000.
  - The centralized approach is cheaper because the cloud inference cost is minimal, and data transfer costs are negligible for small clips.
  - The centralized approach's annual cost is over $300k, dominated by data egress and inference, making the federated option's ~$106k Year 1 cost (with negligible churn) far cheaper.
  - Both options are roughly equivalent in cost once you factor in the engineering salary required to maintain the Federated Learning infrastructure.
  correct_index: 2
