title: On-Device Equal Opportunity Evaluation Performance
scenario: You are tasked with evaluating the Equal Opportunity fairness metric for a vision model directly on user devices to preserve privacy. The evaluation processes a local benchmark dataset of 14,000 images, which easily fits within the shared 8 GB unified memory. The model requires 100 GOPS per inference and runs on the 16-core Neural Engine, which delivers 35 TOPS and consumes approximately 5W.
question: What is the required compute time and energy to run a 14,000-image Equal Opportunity fairness audit?
details:
  realistic_solution: The audit requires 14,000 inferences. At 35 TOPS, a 100 GOPS inference has a theoretical throughput of 350 inferences/second, so the full run takes 40 seconds. At 5W, the energy cost is 5W * 40s = 200 joules. Equal Opportunity means comparing true positive rates across protected subgroups after those local inferences are complete.
  common_mistake: |
    **The Pitfall:** Confusing Equal Opportunity with Demographic Parity and miscalculating TOPS-to-GOPS conversions.
    **The Rationale:** Candidates often forget that Equal Opportunity specifically targets equal True Positive Rates (TPR), and fumble the zeros when converting Tera-ops to Giga-ops.
    **The Consequence:** Implementing the wrong fairness metric entirely, or drastically over/underestimating the battery impact of the on-device audit.
  napkin_math: |
    **Assumptions & Constraints:**
    - 14,000 images, 100 GOPS/inference, 35 TOPS (35,000 GOPS) total throughput, 5W consumption.

    **Calculations:**
    - 35,000 GOPS / 100 GOPS = 350 inf/sec.
    - Time = 14,000 / 350 = 40 seconds.
    - Energy = 5W * 40s = 200 Joules.

    **Conclusion & Interpretation:**
    - **Result: 200 Joules (Compute-Bound)**. The entire audit completes in 40s.
