title: 'The Battery Drain Anomaly'
scenario: 'You are using federated learning to train a 50M parameter language model on user smartphones. Each device trains for one local epoch and uploads the updated weights. You receive widespread user complaints of excessive data consumption and rapid battery drain during background activity. Your trace shows NPU training is highly efficient.'
question: 'What is the most likely cause of the user complaints regarding data and battery drain?'
details:
  realistic_solution: 'The root cause is the cellular radio active state required for transmission. Implement communication-reduction strategies like sparse gradient updates or LoRA adapters to shrink the payload. Compressing the updates via W4A8 quantization minimizes radio power draw.'
  common_mistake: |
    **The Pitfall:** Focusing only on the compute cost of ML.
    **The Rationale:** Engineers assume the problem lies with the NPU's power draw, completely ignoring the sheer size of the network payload.
    **The Consequence:** The model is blindly optimized for compute speed while ignoring the massive cellular data transfer that is actually draining the battery.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: 50M parameters.
    - FP32 Precision: 4 bytes per parameter.

    **Calculations:**
    - Total Payload: 50,000,000 * 4 bytes = 200 MB.

    **Conclusion & Interpretation:**
    - **Result: 200 MB (I/O-Bound)**. Transmitting a 200 MB payload over a 5G radio generates massive battery and data plan drain.
  options:
  - 'The model''s 2GB memory footprint causes heavy use of slow flash storage and increasing power draw.'
  - 'The 50M parameter model update is approximately 200MB, and transmitting this large payload over a cellular network consumes excessive energy and data.'
  - 'The federated learning server is experiencing high latency, maintaining an open connection.'
  - '50M parameters at FP16 is 50MB, causing minor drain. (Calculated trap for wrong precision).'
  correct_index: 1
