title: 'Cross-Platform Mobile Inference: TFLite GPU Delegate on Android vs CoreML on iOS'
scenario: You build a real-time style transfer app (~6 GFLOPS FP16) targeting both iOS (A17 Pro) and Android (Snapdragon 8 Gen 3). You need a single model codebase that achieves <20ms latency on both platforms.
question: Which iOS and Android runtimes meet <20 ms style transfer on A17 Pro and Snapdragon 8 Gen 3 from one model codebase?
details:
  realistic_solution: |
    Optimal strategy: use a single ONNX model as the source format, then branch at deployment. iOS: convert ONNX to CoreML to access ANE (35 TOPS). Android: use ONNX Runtime with QNN EP or TFLite with Hexagon delegate. Both platforms easily meet 20ms: A17 Pro ANE: ~0.17ms compute, Snapdragon 8G3 NPU: ~0.13ms compute.
  common_mistake: |
    **The Pitfall:** Using TFLite for both platforms because it is cross-platform.
    **The Rationale:** Assuming TFLite's GPU delegate is optimal everywhere.
    **The Consequence:** On iOS, TFLite cannot access the Neural Engine (ANE), leaving 35 TOPS of dedicated AI compute unused and relying on the less efficient GPU.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model compute: ~6 GFLOPS.

    **Calculations:**
    - A17 Pro ANE (~35 TOPS): 6 GFLOPS / 35 TFLOPS ≈ 0.17 ms.
    - Snapdragon 8G3 NPU (~45 TOPS): 6 GFLOPS / 45 TFLOPS ≈ 0.13 ms.

    **Conclusion & Interpretation:**
    - **Result: 0.17 ms / 0.13 ms (Compute-Bound)**. Memory transfer overhead will dominate but easily fits within 20 ms. Using ONNX as source and converting to native CoreML/QNN ensures sub-1ms compute times.
