title: ONNX to CoreML and QNN Runtime Strategy for Mobile Style Transfer
scenario: You build a real-time style transfer app (~6 GFLOPS FP16) targeting both iOS (A17 Pro) and Android (Snapdragon 8 Gen 3). You need a single model codebase that achieves <20ms latency on both platforms.
question: Which iOS and Android runtimes meet <20 ms style transfer on A17 Pro and Snapdragon 8 Gen 3 from one model codebase?
details:
  realistic_solution: |
    Use one ONNX model as the source codebase, then deploy through native accelerator runtimes. On iOS, convert ONNX to Core ML and run with Core ML on the ANE. On Android, use ONNX Runtime with the QNN Execution Provider, or convert the same source model to a QNN/TFLite artifact that uses the Hexagon/NPU delegate. Those runtime pairs are the ones intended to meet the <20 ms target; a single generic TFLite GPU path is not the best answer because it does not use the iOS ANE.
  common_mistake: |
    **The Pitfall:** Using TFLite for both platforms because it is cross-platform.
    **The Rationale:** Assuming TFLite's GPU delegate is optimal everywhere.
    **The Consequence:** On iOS, TFLite cannot access the Neural Engine (ANE), leaving 35 TOPS of dedicated AI compute unused and relying on the less efficient GPU.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model compute: ~6 GFLOP per inference.
    - Peak accelerator throughput is an upper bound; real latency includes memory movement, delegate overhead, and unsupported-op fallback risk.

    **Calculations:**
    - A17 Pro ANE upper-bound compute time: 6e9 ops / 35e12 ops/s = 1.7e-4s = 0.17 ms.
    - Snapdragon 8G3 NPU upper-bound compute time: 6e9 ops / 45e12 ops/s = 1.3e-4s = 0.13 ms.
    - The <20 ms requirement leaves about two orders of magnitude for memory traffic and runtime overhead, but profiling is still required to verify full-graph accelerator placement.

    **Conclusion & Interpretation:**
    - **Result: Core ML on ANE for iOS and QNN/Hexagon-backed runtime for Android**. The peak compute bound is below 1 ms on both devices, so the deployment choice must preserve accelerator coverage and keep overhead below the 20 ms budget.
