title: On-Device Fairness Evaluation Architecture
scenario: You are tasked with designing an on-device fairness evaluation pipeline for a computational photography feature running on the Apple A17 Pro Neural Engine. The system must ensure equalized odds across different skin tones and lighting conditions without uploading raw images, strictly preserving user privacy.
question: How should an A17 Pro photography feature compute local fairness metrics under strict 100MB memory and 10ms latency constraints?
details:
  realistic_solution: The optimal design extracts a shared latent embedding from the main model's early layers to feed a lightweight, quantized (INT8) auxiliary classifier for skin-tone and lighting subgroup identification. For each local photo decision, the device updates per-group TP, FP, TN, and FN counters from the feature's prediction and the available on-device quality or user-feedback label, then derives TPR and FPR gaps for equalized odds locally. Only encrypted or differentially private summary counts leave the device, and the classifier plus counters stay tiny enough to fit the 100MB and 10ms budget.
  common_mistake: |
    **The Pitfall:** Proposing a large, independent fairness classifier alongside the main model.
    **The Rationale:** Candidates treat fairness evaluation as an entirely separate ML task, failing to reuse the feature extraction work already done by the primary model.
    **The Consequence:** The system unnecessarily duplicates work, blowing past the strict memory and latency constraints.
  napkin_math: |
    **Assumptions & Constraints:**
    - Small MLP architecture: 512 -> 256 -> 15.
    - A17 Pro Neural Engine = 35 TOPS = 35,000,000 MOPs/sec.

    **Calculations:**
    - Parameters = (512 * 256) + (256 * 15) = 131,072 + 3,840 = 134,912 weights.
    - Memory in INT8 is about 135 KB plus small bias/scale metadata, easily fitting the 100 MB budget.
    - Computations per example are about 134,912 MACs, or about 270,000 primitive multiply/add operations if counted separately.
    - Even at a conservative 1 TOPS effective throughput, 270,000 ops / 1e12 ops/sec is about 0.27 microseconds before launch and memory overhead.

    **Conclusion & Interpretation:**
    - **Result: Fits the latency budget**. The auxiliary classifier is tiny relative to the 10 ms budget; practical latency will be dominated by scheduling and shared-feature access, not dense math.
