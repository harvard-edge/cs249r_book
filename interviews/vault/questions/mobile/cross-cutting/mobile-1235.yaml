title: On-Device Fairness Evaluation Architecture
scenario: You are tasked with designing an on-device fairness evaluation pipeline for a computational photography feature running on the Apple A17 Pro Neural Engine. The device has local consented quality labels or user feedback for evaluated photos, and the system must estimate equalized odds across different skin tones and lighting conditions without uploading raw images, strictly preserving user privacy.
question: How should an A17 Pro photography feature compute local fairness metrics under strict 100MB memory and 10ms latency constraints?
details:
  realistic_solution: The optimal design extracts a shared latent embedding from the main model's early layers to feed a lightweight, quantized (INT8) auxiliary classifier for skin-tone and lighting subgroup identification. For each local photo decision, the device updates per-group TP, FP, TN, and FN counters from the feature's prediction and the available on-device quality or user-feedback label, then derives TPR and FPR gaps for equalized odds locally. Only encrypted or differentially private summary counts leave the device, and the classifier plus counters stay tiny enough to fit the 100MB and 10ms budget.
  common_mistake: |
    **The Pitfall:** Proposing a large, independent fairness classifier alongside the main model.
    **The Rationale:** Candidates treat fairness evaluation as an entirely separate ML task, failing to reuse the feature extraction work already done by the primary model.
    **The Consequence:** The system unnecessarily duplicates work, blowing past the strict memory and latency constraints.
  napkin_math: |
    **Assumptions & Constraints:**
    - Track 5 skin-tone buckets x 3 lighting buckets = 15 subgroups.
    - For each subgroup, keep TP, FP, TN, and FN as 32-bit counters.
    - Labels come from local consented quality labels or user feedback, so equalized-odds metrics are defined without uploading raw images.

    **Calculations:**
    - Counter memory = 15 subgroups x 4 counters x 4 bytes = 240 bytes, plus small metadata for thresholds and privacy accounting.
    - Per evaluated photo, update exactly one subgroup's four-counter table from the model prediction and local label.
    - TPR per subgroup = TP / (TP + FN); FPR per subgroup = FP / (FP + TN).
    - Equalized-odds gaps are max-min differences across subgroup TPR and FPR values, computed from counters rather than raw images.

    **Conclusion & Interpretation:**
    - **Result: fits the privacy and latency budget**. The metric computation is tiny; the key requirement is having local labels and subgroup assignments so TP/FP/TN/FN counters make equalized-odds evaluation valid.
