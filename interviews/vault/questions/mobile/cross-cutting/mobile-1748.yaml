title: DP-SGD on Google Tensor G3 for On-Device Federated Learning
scenario: You are designing a federated learning system for a next-word prediction model on mobile devices. The model needs to be trained with DP-SGD to protect user privacy.
question: How would you calibrate clipping norms and Gaussian noise for DP-SGD under on-device memory and compute limits?
details:
  realistic_solution: |
    A realistic DP-SGD design first selects a clipping norm from gradient norm statistics, then calibrates the Gaussian noise multiplier with a privacy accountant that includes sampling rate, number of steps, target delta, and the chosen norm. On mobile, the hard parts are per-example gradient memory, battery, and scheduling: use micro-batching, ghost clipping or layerwise clipping where supported, and limit local steps or participation rate if the accountant requires too much noise. Noise generation and addition can be optimized, but the sampled Gaussian distribution and clipping semantics must remain mathematically valid.
  common_mistake: |
    **The Pitfall:** Applying fixed, arbitrary noise scales independently of batch size and clipping norms.
    **The Rationale:** Candidates fail to scale the noise mathematically relative to the clipping threshold and the specific privacy budget.
    **The Consequence:** This leads to either an overly private (useless) or insufficiently private model, or an unacceptably slow training process if gradient clipping is unoptimized.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target epsilon (ε) = 8 at delta = 1e-5.
    - Sampling rate q = 1%.
    - Training steps T = 1,000.
    - Candidate clipping norm C = 1.0.

    **Calculations:**
    - For each candidate noise multiplier σ, evaluate ε_accountant(q=0.01, T=1000, σ, δ=1e-5).
    - The added Gaussian noise standard deviation is σ * C; for σ=1.2 and C=1.0, std dev = 1.2 and variance = 1.44.
    - If the accountant reports ε > 8, increase σ or reduce q/T; if clipping drops too much gradient signal, retune C and repeat.

    **Conclusion & Interpretation:**
    - **Result: Accountant- and Memory-Bound**. Calibration is valid only when q, T, δ, σ, and C are considered together; mobile implementation should optimize per-example gradients without changing the DP mechanism.
