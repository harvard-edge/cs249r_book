title: The Federated Learning Cost Fallacy
scenario: An automotive company is using Federated Learning to improve a driver-assistance feature. The training happens on the driver's smartphone using recent sensor data.
question: For a single training round, which of the following operations is the primary driver of the user's cost in terms of battery consumption and data-plan usage?
details:
  realistic_solution: Transmitting the model update over the network is by far the most significant cost. The energy required to power up the radio and send several megabytes of data is orders of magnitude greater than the energy consumed by the highly-optimized mobile NPU to perform the local training computations. While local training is computationally intensive, modern mobile SoCs are incredibly power-efficient for these tasks, whereas wireless data transmission remains a major source of battery drain.
  common_mistake: |
    **The Pitfall:** Assuming local model training computation (FLOPs) is the primary driver of the user's cost.
    **The Rationale:** Engineers focus heavily on the intensity of backpropagation algorithms.
    **The Consequence:** They dramatically underestimate the energy cost of using the cellular or Wi-Fi radio, optimizing the NPU code instead of compressing the network payload.
  napkin_math: |
    **Assumptions & Constraints:**
    - Compute Cost: Computing a gradient update on an NPU for a 10MB model takes ~1 Joule.
    - Network Cost: Transmitting 10MB over 4G/LTE at 2 Watts for 5 seconds takes ~10 Joules.

    **Calculations:**
    - 10 Joules (Network) vs 1 Joule (Compute).

    **Conclusion & Interpretation:**
    - **Result: Communication dominates by 10x (Network-Energy-Bound)**. Communication costs fundamentally dwarf local computation in mobile federated settings.
  options:
  - Local model training computation on the NPU (~1 Joule).
  - Reading the local training data from UFS flash storage (~0.1 Joule).
  - Transmitting the computed model update over the cellular network (~10 Joules).
  - The overhead from the A/B testing framework that selected the user (~0.01 Joule).
