title: 'The Million-Car Update'
scenario: You are a Staff ML Engineer at a connected car company. Your team wants to A/B test a new, more capable driver-assistance model. The new model is 50MB larger than the current production model. The experiment will roll out to a test fleet of 1 million vehicles over their built-in cellular connections.
question: When evaluating the Total Cost of Ownership (TCO) for this single experiment, which of the following costs should you identify as the most significant and immediate financial factor?
details:
  realistic_solution: 'The cellular data transfer cost for the fleet is the primary driver. A seemingly small 50MB update per vehicle becomes a massive operational egress expense at the scale of one million vehicles. This cost is direct, immediate, and often far exceeds the one-time cost of cloud compute for training the model or the engineering effort to deploy it.'
  common_mistake: |
    **The Pitfall:** Engineers often fixate on their direct costs, like cloud compute for training or their own salaries.
    **The Rationale:** They forget that in edge and mobile deployments, last-mile operational data egress costs scale linearly with the fleet size.
    **The Consequence:** This leads to massive unexpected operational expenses that can derail a project.
  napkin_math: |
    **Assumptions & Constraints:**
    - Data transfer per vehicle: 50 MB.
    - Fleet size: 1,000,000 vehicles.
    - Standard enterprise IoT cellular rate: $0.01 per MB.

    **Calculations:**
    - Total data transfer = 50 MB * 1,000,000 = 50,000,000 MB = 50 TB.
    - Total cost = 50,000,000 MB * $0.01/MB = $500,000.

    **Conclusion & Interpretation:**
    - **Result: $500,000 (I/O-Bound)**. $500,000 in data transfer alone, dwarfing typical compute or engineering costs.
  options:
    - The $5,000 cloud compute cost to retrain the model.
    - The $50,000 cellular data cost to download the 50MB model update.
    - The $500,000 fleet-wide cellular data cost to download the 50MB model update.
    - The $5,000,000 increased battery consumption from running a larger model.
