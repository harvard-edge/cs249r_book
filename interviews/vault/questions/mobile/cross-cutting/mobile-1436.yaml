title: DP-SGD Memory Constraints on Exynos NPU
scenario: You are designing a federated learning client for a language model to run natively on a mobile NPU. To satisfy a strict local privacy budget, you must implement DP-SGD with per-sample gradient clipping within a 2 GB background memory limit.
question: How should DP-SGD micro-batches or ghost clipping be sized for NPU memory constraints?
details:
  realistic_solution: DP-SGD enforces computing gradients individually per sample before clipping, unlike standard SGD which aggregates them. This explodes the memory footprint. The architecture must cap the micro-batch size strictly beneath the 1.5 GB OS limit, or employ "ghost clipping" to calculate gradient norms dynamically without materializing the full activation tensors, preventing the OS from triggering LMKD OOM evictions.
  common_mistake: |
    **The Pitfall:** Overlooking per-sample gradient materialization in DP-SGD.
    **The Rationale:** Candidates assume standard aggregated gradients, where memory size is independent of batch size.
    **The Consequence:** They choose a large micro-batch size that demands gigabytes of RAM to store unaggregated gradients, triggering immediate Out-Of-Memory (OOM) evictions by the OS.
  napkin_math: |
    **Assumptions & Constraints:**
    - Background NPU RAM limit: 2.0 GB.
    - Base footprint (weights + activations): 0.5 GB.
    - Single per-sample gradient size: 100 MB.

    **Calculations:**
    - Available memory for gradients: 2.0 GB - 0.5 GB = 1.5 GB.
    - Max micro-batch size (B): 1.5 GB / 100 MB = 15.

    **Conclusion & Interpretation:**
    - **Result: Max batch size 15 (Memory-Capacity-Bound)**. The training pipeline is strictly memory-capacity-bound due to per-sample gradient materialization.
