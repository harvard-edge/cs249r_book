title: On-Device Fairness Evaluation Architecture for Facial Recognition on Snapdragon Hexagon NPU
scenario: You are tasked with deploying a real-time on-device AI model for facial recognition on a flagship smartphone. This model is critical for unlocking the device and authenticating payments. Given the sensitive nature of facial recognition, ensuring fairness and mitigating bias across diverse demographic groups is paramount.
question: How would you design an architecture and methodology for continuously monitoring and reacting to potential demographic parity violations on-device within memory constraints?
details:
  realistic_solution: Implement a lightweight, asynchronous fairness evaluation module that periodically samples inference results and associated demographic labels. This module runs on the NPU during idle cycles utilizing INT8 precision for minimal overhead. If thresholds are exceeded, the system triggers an alert to a backend service for deeper analysis.
  common_mistake: |
    **The Pitfall:** Over-engineering the fairness evaluation pipeline.
    **The Rationale:** Candidates ignore on-device resource constraints and propose massive data collection or complex on-device training loops.
    **The Consequence:** Exhausting NPU compute or main memory, causing the primary facial recognition task to fail or the device to drain battery rapidly.
  napkin_math: |
    **Assumptions & Constraints:**
    - Data size per inference: 1 KB.
    - Base inference rate: 10 inferences/second.
    - Sample rate: 0.1%.

    **Calculations:**
    - Data collection rate: 0.001 x 10 inf/s x 3600 s/hr = 36 inferences/hr.
    - Storage per hour: 36 x 1 KB = 36 KB/hr.
    - Periodic robust check size: 10,000 samples = 10,000 x 1 KB = 10 MB.

    **Conclusion & Interpretation:**
    - **Result: 10 MB Buffer (Memory-Feasible)**. This easily buffers within the device memory without impacting the main system workload.
