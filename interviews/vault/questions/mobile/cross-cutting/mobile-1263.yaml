title: Diagnosing Latency Bias in On-Device LLMs
scenario: You deployed a quantized Gemini Nano model on a Google Tensor G3 for an accessibility transcription feature. During fairness evaluation, the app exhibits 3x higher latency and severe battery drain when processing transcripts from users speaking African American Vernacular English (AAVE) compared to Standard American English (SAE).
question: Why does Gemini Nano transcription on Tensor G3 show higher latency and battery drain for AAVE than SAE transcripts?
details:
  realistic_solution: The root cause is a tokenizer trained predominantly on SAE corpora, causing it to aggressively over-fragment AAVE vocabulary into significantly more subword tokens. This longer sequence length increases the memory bandwidth required to load the KV cache and quadratically explodes the computational complexity on the TPU's matrix arrays.
  common_mistake: |
    **The Pitfall:** Immediately assuming the network's dense weights are biased and suggesting an expensive, months-long full retrain.
    **The Rationale:** Failing to connect the symptom (algorithmic tail latency) directly to the physical hardware execution profile (tokenizer fragmentation).
    **The Consequence:** Wasting massive organizational resources on data collection when the tokenizer mapping is the primary mechanical bottleneck.
  napkin_math: |
    **Assumptions & Constraints:**
    - SAE input: 20 words map to 25 tokens.
    - AAVE input: 20 words map to 75 tokens (tokenizer fragmentation).
    - Attention compute complexity scales quadratically (O(N^2)).

    **Calculations:**
    - SAE compute complexity base: 25^2 = 625 operations.
    - AAVE compute complexity base: 75^2 = 5625 operations.
    - Compute disparity ratio: 5625 / 625 = 9.0x increase.
    - KV Cache bandwidth increases strictly linearly by 3x (75 vs 25 tokens).

    **Conclusion & Interpretation:**
    - **Result: 9x Complexity (Compute-Bound)**. Tokenizer fragmentation quadratically balloons the attention complexity (9x) and KV cache bandwidth (3x), directly inflicting the observed hardware performance disparities.
