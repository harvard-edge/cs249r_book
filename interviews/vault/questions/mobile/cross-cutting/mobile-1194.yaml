title: Quantization Bias Under Memory Contention
scenario: A facial verification model deployed on an NPU shows a 12% higher False Rejection Rate (FRR) for a minority demographic. To maintain real-time latency under ISP memory contention, the system uses static quantization ranges.
question: Why does falling back to static quantization disproportionately impact equalized odds for the minority demographic?
details:
  realistic_solution: |
    Static quantization uses pre-calibrated ranges based on the majority distribution. Because the minority demographic has underrepresented outlier feature activations, the static range clips these crucial signals.
  common_mistake: |
    **The Pitfall:** Blaming raw INT8 precision loss instead of the calibration method.
    **The Rationale:** Candidates vaguely state that INT8 "loses accuracy" without connecting the hardware bottleneck to the shift from dynamic to static range clipping.
    **The Consequence:** Teams will abandon INT8 entirely, ruining latency, instead of fixing the static calibration dataset to properly represent minority outlier features.
  napkin_math: |
    **Assumptions & Constraints:**
    - NPU Bandwidth: 68 GB/s - 60 GB/s (ISP) = 8 GB/s available.
    - Dynamic quant latency: 2.0 ms (exceeds budget).

    **Calculations:**
    - Static Range: Calibrated to majority (e.g., max activation 8).
    - Minority features: Contain magnitude 12 outlier activations.
    - Clipping Loss: 4 / 12 = 33% signal loss.

    **Conclusion & Interpretation:**
    - **Result: Signal Truncation Bias.** The memory bandwidth limit forces static quantization. Because ranges were calibrated on the majority, minority outlier features are truncated, destroying equalized odds.
