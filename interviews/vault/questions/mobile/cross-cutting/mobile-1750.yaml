title: 'Designing a Fair AI System on Edge with Samsung Exynos 2400 NPU'
scenario: Imagine you are tasked with designing an on-device machine learning system for a mobile application running on a Samsung device equipped with the Exynos 2400 NPU (34.7 TOPS, 12 GB LPDDR5X). This application performs real-time image analysis for content moderation, identifying potentially harmful or inappropriate images uploaded by users. The primary goal is to ensure fairness in its moderation decisions, specifically addressing demographic parity and equalized odds across various user subgroups (e.g., age, gender, ethnicity) without transmitting raw user data off-device.
question: How would you design the architecture and evaluation methodology to achieve this, considering the computational and memory constraints of the NPU?
details:
  realistic_solution: |
    Design an architecture where fairness evaluation metrics are computed on-device using anonymized, aggregated representations of subgroup data. Implement lightweight, privacy-preserving techniques to allow for insights into subgroup performance without compromising individual user data. Utilize the Exynos 2400 NPU's capabilities for efficient, parallel computation of model inferences and local fairness metric calculations.
  common_mistake: |
    **The Pitfall:** Applying generic fairness metrics and trying to evaluate them synchronously.
    **The Rationale:** Treating edge devices like cloud instances with infinite throughput.
    **The Consequence:** Completely freezing the device for 5 minutes during the fairness pass, ruining the user experience.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model Compute: 10 TOP per inference.
    - NPU Capacity: 34.7 TOPS.
    - Fairness Evaluation: 10 subgroups * 100 images = 1000 inferences.

    **Calculations:**
    - Throughput: 34.7 / 10 = ~3.4 inferences/second.
    - Total Time: 1000 inferences / 3.4 inf/sec = ~294 seconds (~4.9 minutes).

    **Conclusion & Interpretation:**
    - **Result: ~4.9 minutes (Compute-Bound Evaluation)**. On-device fairness evaluation is extremely slow for an interactive session and must be run asynchronously.
