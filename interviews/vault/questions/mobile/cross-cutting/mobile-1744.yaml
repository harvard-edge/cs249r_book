title: DP-SGD and Privacy Budgeting on Snapdragon NPU
scenario: You are designing a federated learning system for on-device model personalization. To guarantee user privacy, you've decided to employ Differentially Private Stochastic Gradient Descent (DP-SGD).
question: How do epsilon, delta, noise calibration, and the privacy-utility tradeoff apply to DP-SGD on Snapdragon Hexagon NPU?
details:
  realistic_solution: A robust answer defines epsilon as the privacy-loss budget and delta as the small probability of the guarantee failing, then uses a privacy accountant to compose privacy loss across local steps and federated rounds. DP-SGD clips each per-example or per-client update to an L2 bound C, adds Gaussian noise calibrated to C, the sampling rate, the number of steps, and the target epsilon/delta, and then aggregates the protected updates. Lower epsilon or more rounds require more noise, which usually reduces model utility; larger clipping bounds preserve signal but also require larger noise. On Snapdragon-class mobile hardware, the design concern is the overhead of per-example gradients, clipping, secure randomness, and mixed-precision training support, not assuming the NPU directly performs all DP-SGD bookkeeping.
  common_mistake: |
    **The Pitfall:** Treating epsilon as a tunable accuracy knob and choosing noise without privacy accounting.
    **The Rationale:** Engineers may set a noise multiplier empirically and ignore clipping, sampling rate, and composition over repeated federated rounds.
    **The Consequence:** The deployed system either fails to meet its stated privacy guarantee or adds so much noise that personalization quality collapses.
  napkin_math: |
    **Assumptions & Constraints:**
    - DP-SGD clips each client update to L2 norm C = 1.0.
    - Example noise multiplier: z = 1.2.
    - Gaussian noise standard deviation before aggregation: sigma = z x C.
    - The final epsilon must be computed with a privacy accountant using sampling rate and number of rounds.

    **Calculations:**
    - Noise standard deviation: sigma = 1.2 x 1.0 = 1.2 in clipped-update units.
    - If 1,000 clipped client updates are averaged in a round, independent noise and update averaging reduce per-coordinate random variation by roughly sqrt(1000), but composition across many rounds consumes additional privacy budget.
    - Increasing rounds or participation rate raises privacy loss for the same noise multiplier; lowering epsilon generally requires increasing z or reducing rounds.

    **Conclusion & Interpretation:**
    - **Result: Privacy-accounting-bound.** DP-SGD sizing is driven by clipping, noise multiplier, sampling, and composition, while hardware affects runtime and numeric implementation rather than defining the privacy guarantee.
