title: Designing Federated Learning for a 500M DAU Social Media Feed
scenario: Design a federated learning system for a social media app with 500 million daily active users. The model personalizes the content feed. You must improve the model without collecting user interaction data on your servers.
question: How would you design a federated learning system for a social media app with 500 million daily active users?
details:
  realistic_solution: 'Use a production FL architecture rather than textbook FedAvg at full scale: gate participation to idle, charging, unmetered-network devices; sample cohorts per round; train locally in bounded windows with clipped updates; compress or sparsify uploads; aggregate through secure aggregation; add calibrated DP noise only with an explicit accountant; tolerate dropouts with minimum cohort sizes and retry policy; and use FedProx/SCAFFOLD plus cohort or personalization layers for non-IID feeds. The 10K-device, 2 MB-update example gives 20 GB of aggregate uplink per round and about 80 GB/day at 4 rounds/day before retries, but convergence, privacy epsilon, and battery acceptability must be measured from experiments, device telemetry, and the DP accountant.'
  common_mistake: |
    **The Pitfall:** Running standard FedAvg across all 500M devices simultaneously.
    **The Rationale:** Candidates fail to scale down textbook academic algorithms to handle real-world stragglers, bandwidth costs, and device heterogeneity.
    **The Consequence:** Naive FedAvg at this scale would require petabytes of gradient uploads per round and wouldn't converge due to extreme non-IID user behavior.
  napkin_math: |
    **Assumptions & Constraints:**
    - Daily active users: 500M; eligible idle/charging/unmetered devices are a filtered subset.
    - Sample size per round: 10,000 devices.
    - Compressed upload per selected device: 2 MB.
    - Frequency: 4 rounds/day.

    **Calculations:**
    - Aggregate uplink per round = 10,000 * 2 MB = 20 GB before retries and secure-aggregation overhead.
    - Aggregate uplink per day = 20 GB * 4 = 80 GB/day; monthly aggregate upload = 80 GB/day * 30 = 2.4 TB/month.
    - A 3-minute local job at 2 W uses 2 W * 0.05 h = 0.1 Wh, about 0.8% of a 12.8 Wh phone battery before radio tail energy and retries.
    - These numbers justify eligibility gates and telemetry limits; they do not prove convergence quality or a DP epsilon without experiments and a formal accountant.

    **Conclusion & Interpretation:**
    - **Result: Architecture-Gated Feasibility**. A viable design needs device eligibility, secure aggregation, clipping/noise accounting, compression, cohorting or personalization, and dropout handling; bandwidth and battery estimates are sizing checks, not proof that training will converge or meet privacy goals.
