title: Privacy Budget Allocation for On-Device Fine-Tuning
scenario: A mobile keyboard app wants to fine-tune a next-word prediction model on user typing history using DP-SGD directly on the device. The app has a total privacy budget of ε=3.0 for the model's lifetime. Users type an average of 50 messages/day. The model fine-tunes nightly over 90 days.
question: How would you design a per-epoch budget allocation strategy that maximizes model utility while respecting the lifetime budget?
details:
  realistic_solution: Use a privacy accountant first, then allocate the lifetime epsilon across nightly epochs by expected marginal utility. Spend more budget early when user-specific gradients change the model most, reserve a small tail budget for later drift, and stop training when validation gain per privacy cost falls below a threshold. For example, plan 60% of epsilon for the first 20 nights, 30% for nights 21-60, and 10% for nights 61-90, but convert that schedule into per-step noise multipliers with an RDP or moments accountant using the actual sampling rate, clipping norm, delta, and number of DP-SGD steps. The guarantee comes from composed accountant results, not from simply adding informal phase epsilons.
  common_mistake: |
    **The Pitfall:** Allocating an equal ε per epoch (ε/90 per night).
    **The Rationale:** Candidates ignore training dynamics where early gradient updates have higher magnitude and utility.
    **The Consequence:** Wasting budget on late epochs while injecting too much noise in early epochs, destroying model convergence.
  napkin_math: |
    **Assumptions & Constraints:**
    - Training data: 50 messages/day for 90 days = 4,500 candidate examples.
    - Lifetime target: epsilon_total = 3.0 at a fixed delta.
    - Allocation should follow marginal utility while the accountant tracks composed privacy loss.

    **Calculations:**
    - Example schedule: 60% early = epsilon 1.8 for days 1-20, 30% middle = epsilon 0.9 for days 21-60, 10% tail = epsilon 0.3 for days 61-90.
    - Early phase has 1,000 candidate examples; middle has 2,000; tail has 1,500.
    - For each phase, choose the clipping norm and Gaussian noise multiplier so the RDP/moments accountant reports cumulative epsilon no greater than the phase reserve.
    - Reallocate unused tail budget only if validation improvement per epsilon remains positive.

    **Conclusion & Interpretation:**
    - **Result: Utility-Weighted Accounting.** A good strategy spends more privacy budget where updates have higher marginal utility, but every per-step noise choice must be validated through a formal accountant so total lifetime epsilon stays at or below 3.0.
