title: Local-Local RAG & On-Device Telemetry
scenario: Siri needs to proactively suggest contextual actions based on a user's local message history. We want to update a semantic index dynamically on-device, but we must guarantee strict Local Differential Privacy (LDP). The entire indexing and query pipeline must consume <50MB of RAM and <10ms latency per query.
question: How do you architect the local vector store, the CoreML embedding pipeline, and the LDP mechanism?
details:
  realistic_solution: Implement a direct-to-flash Product Quantization (PQ) index. The embedding model is an ultra-lite dual-encoder (~10M parameters, INT8). The vector index uses memory-mapped (mmap) files backed by NVMe flash storage, completely bypassing the RAM limit for storage. The ANE handles the embedding extraction, while the Apple Matrix AMX coprocessor handles the PQ asymmetric distance calculations. For telemetry, we use DP-FTRL. We never send embeddings or text. We calculate local gradients on-device using a tiny federated learning task, clip the gradients, add Gaussian noise, and only send the noisy gradients to the server.
  common_mistake: |
    **The Pitfall:** Using standard vector databases like FAISS or HNSW locally.
    **The Rationale:** Candidates default to cloud-native vector search tools, ignoring their massive memory overhead and latency spikes.
    **The Consequence:** HNSW triggers watchdog terminations due to memory spikes, and raw text embedding noise destroys local utility.
  napkin_math: |
    **Assumptions & Constraints:**
    - Memory budget: <50 MB RAM. Latency: <10ms.
    - Model: ~10M parameters, INT8.
    - Index: 100,000 items, 64-dim, PQ (1-byte).

    **Calculations:**
    - Model Memory: 10M params @ 1 byte = 10 MB.
    - Index Storage (Disk): 100,000 * 64 * 1 = 6.4 MB (mmap'd, zero RAM).
    - Active RAM: 10 MB (model) + 2 MB (activations) + 1 MB (centroids) = 13 MB.
    - Latency: Embedding (~4ms) + AMX Dot Product (<0.1ms) = ~4.1ms.

    **Conclusion & Interpretation:**
    - **Result: 13 MB RAM and ~4.1ms latency satisfy constraints (Compute-Bound).**
