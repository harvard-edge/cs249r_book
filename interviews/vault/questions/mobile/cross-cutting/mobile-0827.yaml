title: Mobile New 0028
scenario: A passively cooled AR headset runs perfectly at 60 FPS in a 10-minute test. In a 1-hour test, the frame rate steadily drops from 60 FPS to 15 FPS. Profiling shows clock frequency continuously stepping down.
question: Why does a passively cooled AR headset gradually fall from 60 FPS to 15 FPS in a one-hour test?
details:
  realistic_solution: The symptom of gradual, continuous performance degradation is caused by thermal saturation (heat soaking). In passive cooling, there are no fans to expel heat; the device relies entirely on the thermal capacitance of its chassis. Once the chassis absorbs its maximum heat capacity, it can only dissipate heat via convection. The OS continually drops frequency to match the low convection rate.
  common_mistake: |
    **The Pitfall:** Assuming benchmark stability based solely on short burst tests.
    **The Rationale:** Candidates fail to differentiate between burst thermal capacity (chassis absorption) and sustained thermal capacity (convection).
    **The Consequence:** Devices pass QA testing but fail catastrophically during actual sustained user sessions.
  napkin_math: |
    - **Heat Capacity (Q):** m * c * dT = 100g * 0.9 J/gK * 20K = 1800 Joules.
    - **Saturation Time:** 1800J / 3W = 600s = 10 minutes.
    - **Convection Limit:** After 10 minutes, dissipation relies entirely on passive convection (~0.75W).
    - **Final Result:** **The system must downclock by a factor of 4x (3W to 0.75W) to prevent overheating, matching the observed 60 to 15 FPS drop.**
