title: On-Device PII Guardrail Starvation on Hexagon NPU
scenario: 'Your team deploys a local generative AI assistant alongside a lightweight PII-redaction guardrail model on a device powered by the Qualcomm Hexagon NPU (Snapdragon 8 Gen 3). During red-teaming assessments, you observe a critical symptom: when the main 3B parameter model generates text, the guardrail model periodically drops evaluation requests, allowing PII to leak to the UI. Both models are quantized to INT8 and the NPU is reporting only 30% compute utilization out of its 45 TOPS capacity.'
question: Why can a 3B INT8 assistant on Snapdragon 8 Gen 3 starve a lightweight PII guardrail despite 30% NPU utilization?
details:
  realistic_solution: The root cause is memory bandwidth starvation on the shared 12-16 GB LPDDR5X bus. Autoregressive text generation is heavily memory-bound; the main model is saturating the bus reading weights for every token. Despite the Hexagon NPU having ample compute headroom (45 TOPS), the concurrent guardrail model cannot fetch its own weights fast enough from the shared memory pool, causing it to miss its real-time SLA and fail open.
  common_mistake: |
    **The Pitfall:** Assuming the NPU is hitting compute limits (45 TOPS) or thermal throttling.
    **The Rationale:** Because NPU utilization is low (30%), candidates incorrectly suspect software inefficiencies or single-core bottlenecks.
    **The Consequence:** They fail to identify LPDDR5X memory bandwidth saturation as the true hardware bottleneck.
  napkin_math: |
    **Assumptions & Constraints:**
    - The 3B INT8 assistant stores roughly 3 GB of weights.
    - Autoregressive decoding has poor weight reuse at batch size 1, so many weights are streamed repeatedly.
    - The guardrail has a separate real-time SLA and must fetch its own weights/activations while the main model is decoding.

    **Calculations:**
    - A rough upper-bound traffic estimate is model_size * token_rate = 3 GB * 20 tokens/sec = 60 GB/s if most weights are reread each token.
    - Real implementations cache and tile some data, so the exact demand may be lower; the key point is that decoding can still be memory-service-bound even at low compute utilization.
    - The guardrail competes for the same memory subsystem, so its small compute load can miss deadlines when queued behind the main model's memory traffic.

    **Conclusion & Interpretation:**
    - **Result: Bandwidth-Bound Guardrail Starvation.** The observed low NPU utilization is consistent with memory stalls; the fix is scheduling or reserving bandwidth for the guardrail, not adding more TOPS.
