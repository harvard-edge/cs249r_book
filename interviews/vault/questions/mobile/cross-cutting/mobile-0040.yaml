title: The User Consent Minefield
scenario: Your fitness app wants to use on-device federated learning to improve its activity recognition model. The model trains locally on the user's accelerometer data and only sends gradient updates to the server. Your legal team says you still need explicit user consent under GDPR. Your PM argues that because the data never leaves the device, GDPR doesn't apply.
question: Does on-device federated learning require explicit user consent under GDPR even if data never leaves the device?
details:
  realistic_solution: The PM is wrong that GDPR stops applying when raw data stays on device. GDPR covers processing of personal data, and on-device training over accelerometer-derived activity data is still processing; gradient updates may also be personal data if they can reveal information about a user. Explicit consent may be required if the app relies on consent as its lawful basis or processes special-category health data, but it is not the only lawful basis in every GDPR case. With a 35% opt-in assumption, 500K DAU yields 175K eligible devices; at 1% sampling, each round can use about 1,750 devices. The key engineering impact is a consent-gated training pool and slower rollout, not a claim that on-device processing avoids GDPR.
  common_mistake: |
    **The Pitfall:** Assuming "data stays on-device" means GDPR does not apply.

    **The Rationale:** Product managers confuse data transmission with data processing.

    **The Consequence:** Deploying the pipeline without consent exposes the company to massive GDPR fines for unauthorized processing of personal health data.
  napkin_math: |
    **Assumptions & Constraints:**
    - Active Users: 500K DAU.
    - Opt-in rate: ~35%.
    - Sampling rate: 1% per round.

    **Calculations:**
    - Identify Eligible Pool: 500K x 0.35 = 175K devices.
    - Calculate Sample Size: 175K x 0.01 = 1,750 devices per round.

    **Conclusion & Interpretation:**
    - **Result: Consent-Gated Training Pool**. GDPR can still apply because on-device training processes personal data. If explicit consent is the chosen or required lawful basis, the rollout pool is constrained: with a 35% opt-in, the eligible pool is 175K devices and each 1% training round can sample about 1,750 consenting devices. Potential fines are a compliance risk, not something derived from the sampling math.
