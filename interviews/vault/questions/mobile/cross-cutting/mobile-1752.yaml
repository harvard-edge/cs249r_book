title: Diagnosing Bias in NPU-Accelerated Facial Verification for Mobile
scenario: A new facial recognition model, intended for on-device identity verification, has been deployed to a fleet of Android smartphones. The model exhibits a higher false rejection rate (FRR) for certain demographic subgroups, particularly those with darker skin tones, even though overall accuracy metrics appear acceptable.
question: What metrics would you collect, and what steps would you take to systematically pinpoint the root cause of this observed unfairness?
details:
  realistic_solution: Collect FRR, FAR, genuine/impostor score distributions, and threshold pass rates by demographic slice and by confounders such as lighting, pose, camera, device model, enrollment quality, and age of enrollment. Treat this as an equalized-error-rate or equalized-odds-style diagnosis, not demographic parity. Audit train/eval data balance, label quality, capture conditions, and preprocessing failures; then compare embeddings and score distributions across groups to see whether the issue is data coverage, sensor/preprocessing behavior, threshold calibration, or model representation. Only after the root cause is isolated should you test mitigations and revalidate subgroup FRR/FAR on held-out data.
  common_mistake: |
    **The Pitfall:** Over-reliance on aggregate metrics like overall accuracy without segmenting.
    **The Rationale:** Candidates neglect disaggregated analysis across sensitive attributes and assume pre-trained models are inherently fair or that NPU optimization doesn't introduce bias.
    **The Consequence:** Deploying a model that severely underperforms for specific demographic subgroups, leading to discriminatory product experiences despite high "overall" accuracy.
  napkin_math: |
    **Assumptions & Constraints:**
    - Majority FRR: 0.5%.
    - Minority subgroup FRR: 5.0%.
    - FAR must also be checked at the operating threshold.

    **Calculations:**
    - Absolute FRR gap = 5.0% - 0.5% = 4.5 percentage points.
    - Relative FRR ratio = 5.0% / 0.5% = 10x.
    - Compare score histograms and threshold decisions for each subgroup to determine whether the gap comes from capture quality, labels, preprocessing, embeddings, or threshold choice.

    **Conclusion & Interpretation:**
    - **Result: Equalized-Error Diagnosis Needed**. Aggregate accuracy hides a 4.5-point FRR gap; root-cause analysis should focus on sliced FRR/FAR and score distributions rather than latency budget arithmetic.
