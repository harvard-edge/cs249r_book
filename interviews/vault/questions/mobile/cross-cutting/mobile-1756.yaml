title: On-device Fairness Optimization for Google Tensor G3
scenario: You are leading the deployment of an on-device image classification model for content moderation across a fleet of Pixel devices, leveraging the Google Tensor G3's 7.5 TOPS TPU and 12 GB LPDDR5X memory. The model performs fairly across demographics under ideal conditions. However, during real-world stress testing, you observe a significant degradation in fairness metrics (e.g., increased false positive rates for certain subgroups) when the model operates under high inference load. This is accompanied by spikes in TPU utilization or memory access.
question: How would you diagnose and optimize Tensor G3 hardware bottlenecks that worsen subgroup fairness under high load?
details:
  realistic_solution: |
    The solution would involve a multi-pronged approach:
    1.  **Deep Profiling on Tensor G3:** Use Android Perfetto traces, Android Studio profiler, TensorFlow Lite benchmarking, vendor NNAPI/accelerator traces, and power/thermal telemetry to capture TPU utilization, memory bandwidth, latency, and throttling by subgroup under load. Identify layers, preprocessing steps, or memory transfers that correlate with subgroup error spikes.
    2.  **Fairness-Preserving Model Optimization:** Apply global optimizations such as quantization-aware training, pruning, operator fusion, memory-layout fixes, and preprocessing cleanup, then validate every change on subgroup FPR/FNR. Avoid subgroup-specific quantization policies because they can create inconsistent decision rules and worsen fairness.
    3.  **Adaptive Inference & Resource Management:** Develop an on-device mechanism that dynamically adjusts model complexity (e.g., early exit, use of smaller ensemble members) based on real-time device load and input characteristics, ensuring fairness constraints are met even under high stress. Prioritize resources for critical fairness-related computations if bottlenecks occur.
    4.  **Optimized Data Preprocessing Pipeline:** Rearchitect the on-device preprocessing pipeline to be more efficient, especially for complex inputs from underrepresented groups, reducing the burden on the Tensor G3's compute resources before inference.

    **Quantification Example:**
    By applying global 8-bit quantization-aware training to the feature extraction backbone and optimizing memory access patterns, we expect to reduce average latency for the bottlenecked slice from 80 ms to about 68 ms. The release criterion is not the optimization itself; it is that subgroup FPR/FNR gaps shrink or at least do not worsen under high-load validation while power and thermal behavior remain within budget.
  common_mistake: |
    **The Pitfall:** Proposing generic algorithmic fixes without considering on-device profiling.
    **The Rationale:** Candidates fail to connect hardware-specific constraints (TPU throughput, memory bandwidth) directly to fairness degradation under load.
    **The Consequence:** The proposed solution fails to address the root cause, which is performance throttling disproportionately affecting certain complex subgroups.
  napkin_math: |
    **Assumptions & Constraints:**
    - Subgroup A's 100 ms inference exceeds an 80 ms deadline 50% of the time under load.
    - This leads to a 5% absolute increase in False Negative Rate disparity for Subgroup A.

    **Calculations:**
    - Optimizing memory access patterns reduces latency by 30%: 100 ms * (1 - 0.30) = 70 ms.
    - 70 ms is 10 ms under the 80 ms deadline, so the profiled deadline-miss mechanism should be removed for this slice.
    - The FNR disparity must be remeasured; the expected improvement is at most the load-induced 5 percentage points, not a guaranteed full elimination.

    **Conclusion & Interpretation:**
    - **Result: Latency-Bound Fairness Risk**. The optimization can remove the observed deadline misses, but fairness recovery must be validated with subgroup FNR/FPR under load; no RAM savings follow from the stated math.
