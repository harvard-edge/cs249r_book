title: Mobile LoRA Atomic Checkpointing
scenario: A background service on a Snapdragon 8 Gen 3 fine-tunes an on-device model
  using LoRA. The OS aggressively reclaims memory, killing the app with only a 50ms
  warning. Writing to UFS 4.0 storage yields a sequential speed of 1.5 GB/s.
question: Design an atomic checkpointing strategy and determine the maximum size of
  the LoRA adapter that can be safely saved within the 50ms warning window.
visual:
  kind: svg
  path: mobile-1873.svg
  alt: Timeline showing OS kill warning at T=0, 50ms write operation to a temp file,
    followed by an atomic rename.
  caption: Atomic Save within OS Warning Window
details:
  realistic_solution: To ensure atomicity during a SIGKILL warning, the state must
    be written to a temporary file and then renamed (a nearly instantaneous metadata
    operation in ext4/f2fs). The 50ms window allows writing 50ms * 1.5 GB/s = 75 MB
    of data. Therefore, the LoRA adapter cannot exceed 75 MB, and the process must
    be `write(temp) -> fsync(temp) -> rename(temp, target)`.
  common_mistake: Ignoring the requirement for a temporary file and POSIX rename,
    proposing an in-place write that corrupts the previous checkpoint when the app
    is killed mid-write.
  napkin_math: 0.050 s * 1500 MB/s = 75 MB maximum write size.
