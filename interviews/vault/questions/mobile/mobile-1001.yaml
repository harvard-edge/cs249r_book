title: 'Network Bandwidth Bottlenecks: Analyze Thermal Throttling Impact on Mobile Bandwidth'
scenario: An iPhone 16 Pro (A17 Pro, 8GB, 68 GB/s Neural Engine bandwidth) shows TPOT for a 1B INT4 LLM degrading from 7.4ms to 14ms after 5 minutes of sustained inference. The model is 500MB.
question: What does a TPOT jump from 7.4ms to 14ms reveal about A17 Pro bandwidth throttling for a 500 MB LLM?
details:
  realistic_solution: 'Baseline TPOT: 500MB/68GB/s=7.35ms. After 5min: 500MB/effective_BW=14ms -> effective_BW=500/0.014=35.7GB/s. Throttle ratio: 35.7/68=52.5%. A17 Pro under sustained load at 35 TOPS: 3.5 TOPS*0.8W=2.8W dissipated. Sustained: thermal limit triggers around 40°C junction. Apple throttles NE to 50-60% to maintain thermal envelope. Fix: (1) Implement forced cooling (case cooling), (2) introduce inference pauses (100ms every 2s -> average 5% duty, no throttle), (3) reduce NE clock via CoreML configuration (reduces TPOT to 11ms but sustained).'
  common_mistake: |
    **The Pitfall:** Assuming a software or memory leak caused the slowdown.
    **The Rationale:** Candidates ignore the 5-minute time constant, which is a clear physical indicator of thermal saturation.
    **The Consequence:** Wasting time debugging non-existent memory leaks while ignoring the hardware's thermal limits.
  napkin_math: |
    - Unthrottled BW: 68 GB/s.
    - Throttled BW: 500MB / 14ms = 35.7 GB/s.
    - Throttle ratio = 35.7 / 68 = 52.5%.
    - TPOT change: 7.4ms -> 14ms = 1.9x slowdown.
    - Fix with pauses: 100ms pause every 2000ms = 5% pause.
    - **NE duty: 95%, Power: 2.66W (below threshold), Avg TPOT = 7.4 / 0.95 = 7.8ms.**
