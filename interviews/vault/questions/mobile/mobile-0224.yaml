title: The Battery Cost of Federated Personalization
scenario: An automotive company is A/B testing a new driver-assist personalization feature. It uses federated
  learning to fine-tune a model on the user's smartphone for 15 minutes each day. The process runs on
  the phone's NPU, which draws about 3W of power (similar to the 'Total SoC Active' power budget for a
  Snapdragon 8 Gen 3). To evaluate the Total Cost of Ownership (TCO) of this feature, your team needs
  to calculate the energy impact on the user. Explain the total energy consumed by this feature, per user,
  over a 30-day period.
question: "How would you explain the total energy consumed by this feature, per user, over a 30-day period?"
details:
  realistic_solution: The correct approach is to multiply the power consumption by the total duration
    of the operation. The key is to ensure the time units are consistent (converting minutes to hours)
    to arrive at the standard energy unit of Watt-hours (Wh). The daily training time is 15 minutes, which
    is 0.25 hours. Over 30 days, the total time is 7.5 hours.
  common_mistake: The most common mistake is confusing power (a rate of energy transfer, measured in Watts)
    with energy (the total amount of work done, measured in Watt-hours). Engineers often report the instantaneous
    power draw instead of calculating the total energy consumed over the specific time interval.
  napkin_math: '1. Calculate Active Time: 15 minutes = 15 * 60 = 900 seconds. 2. Calculate Total Energy:
    Power (3W) * Time (900s) = 2,700 Joules. 3. Estimate Battery Impact: A standard 4000mAh mobile battery
    holds approximately 15 Watt-hours, or 54,000 Joules. This daily FL task consumes 2,700 / 54,000 =
    exactly 5% of the battery.'
  options:
  - 0.75 Wh
  - 3.0 W
  - 22.5 Wh
  - 2160 Wh
  correct_index: 2
