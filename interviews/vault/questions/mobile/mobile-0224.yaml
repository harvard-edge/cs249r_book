title: The Battery Cost of Federated Personalization
scenario: An automotive company is A/B testing a new driver-assist personalization feature. It uses federated learning to fine-tune a model on the user's smartphone for 15 minutes each day. The process runs on the phone's NPU, which draws about 3W of power.
question: What is the total energy consumed by this 15-minute daily federated learning feature per user over a 30-day period?
details:
  realistic_solution: 'Calculate total energy in Watt-hours (Wh) by multiplying instantaneous power (3W) by duration in hours (0.25h/day) over 30 days.'
  common_mistake: |
    **The Pitfall:** Confusing instantaneous power (Watts) with total energy (Watt-hours or Joules).
    **The Rationale:** Engineers often report the peak power draw (e.g., 3W) without integrating it over the specific time interval of the workload.
    **The Consequence:** Drastically underestimating or misreporting the long-term Total Cost of Ownership (TCO) and battery impact.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Daily active training time: 15 minutes (0.25 hours).
       - NPU power draw: 3 Watts.
       - Duration: 30 days.
    2. **Calculations:**
       - Daily energy: 3 Watts * 0.25 hours = 0.75 Wh/day.
       - Total duration: 30 days.
       - Total energy: 0.75 Wh/day * 30 days = 22.5 Wh.
    3. **Conclusion & Interpretation:**
       - **Result: Power-Bound constraint. 22.5 Wh total energy consumption over the 30-day period.**
  options:
  - 0.75 Wh
  - 3.0 W
  - 22.5 Wh
  - 2160 Wh
  correct_index: 2
