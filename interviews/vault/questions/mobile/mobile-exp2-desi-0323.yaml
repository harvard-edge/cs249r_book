title: Architecting OOM-Resilient On-Device LLM Inference
scenario: You are designing an on-device LLM assistant for a flagship smartphone featuring the Qualcomm
  Hexagon NPU (Snapdragon 8 Gen 3) with a shared 12 GB LPDDR5X memory pool. The OS strictly enforces a
  dynamic 4 GB memory budget for background AI tasks to prevent eviction of user-facing apps. Design a
  memory management system that handles unpredictable context growth and fragmentation during generation,
  ensuring the model never triggers an OS-level OOM kill while maximizing the NPU's 45 TOPS INT8 compute.
question: "How should a Snapdragon 8 Gen 3 LLM assistant manage growing KV cache under a dynamic 4GB AI memory budget?"
details:
  realistic_solution: A robust design uses a paged KV cache system to eliminate memory fragmentation and
    allow dynamic, non-contiguous allocation of context blocks. The architecture should tightly integrate
    with OS memory pressure callbacks (e.g., memory warning signals) to preemptively evict older KV blocks
    or dynamically quantize the KV cache to INT8 on the fly, allowing the Hexagon NPU to continue processing
    without exceeding the fluctuating budget.
  common_mistake: Candidates often propose static KV cache allocation, which either wastes the limited
    4 GB budget or risks OOM during long conversations. They also frequently overlook the shared nature
    of the LPDDR5X memory, failing to design an eviction mechanism for when foreground app memory spikes
    dynamically shrink the available AI budget.
  napkin_math: Assume a 3B parameter model quantized to 4-bit (1.5 GB weights). Out of the 4 GB limit
    from the shared 12 GB LPDDR5X pool, 2.5 GB remains for KV cache and activations. For a hidden size
    of 3072, 32 layers, and FP16 precision, each token's KV cache consumes 3072 * 32 * 2 (K&V) * 2 (bytes)
    = 393 KB. Max theoretical context is 2.5 GB / 393 KB = ~6,360 tokens. Standard contiguous allocation
    typically suffers 20-30% fragmentation loss (wasting up to 750 MB). Using paged memory recovers this
    capacity, ensuring the NPU's 45 TOPS INT8 engine isn't bottlenecked by artificial memory constraints.
