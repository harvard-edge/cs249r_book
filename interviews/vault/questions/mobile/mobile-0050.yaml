title: Designing Cross-Device Federated Personalization
scenario: You're the ML systems architect for a health platform spanning Apple Watch (S9 chip, 1 GB RAM), iPhone (A18 Pro, 8 GB RAM), and iPad (M4, 16 GB RAM). Each device collects different health signals. You want to train a personalized health model that fuses data from all three devices — but Apple's privacy framework prohibits sending raw health data between devices, even within the same user's iCloud account.
question: "How would you design a federated personalization system that trains across a single user's device ecosystem without centralizing raw data?"
details:
  realistic_solution: 'Split federated learning across Apple devices. Each runs a capability-appropriate model. Exchange compressed embeddings via BLE. The iPad acts as the aggregator during charging. This is capability-aware split architecture for one user''s device ecosystem.'
  common_mistake: |
    **The Pitfall:** Proposing standard Federated Learning across the devices.
    **The Rationale:** Candidates see "data shouldn't leave the device" and jump straight to standard FL.
    **The Consequence:** The design fails because standard FL assumes identical models, which is impossible since the Apple Watch has 1/16th the RAM of the iPad.
  napkin_math: |
    - **Raw Data Cost:** Watch heart rate + accelerometer = 51.8 MB + 345 KB ~ 52 MB per day.
    - **Embedding Cost:** Watch to Phone (18 KB) + Phone to iPad (72 KB) = 90 KB/day.
    - **Reduction:** 52 MB / 90 KB = ~575x data reduction.
    - **Final Result:** Transferring **90 KB/day over BLE** easily satisfies privacy and bandwidth constraints.
