title: Designing Cross-Device Federated Personalization
scenario: You're the ML systems architect for a health platform spanning smartwatch, phone, and tablet. You want to train a personalized health model that fuses data from all three devices, but privacy frameworks prohibit sending raw data.
question: "How would you design a federated personalization system that trains across a single user's device ecosystem without centralizing raw data?"
details:
  realistic_solution: Implement a heterogeneous, capability-aware Split Learning architecture. Deploy distinct model partitions tailored to each device's RAM constraint. Transmit heavily compressed, dimension-reduced intermediate feature embeddings over BLE, orchestrating aggregation on the most capable node.
  common_mistake: |
    **The Pitfall:** Proposing standard Federated Learning across the devices.
    **The Rationale:** Candidates see "data shouldn't leave the device" and jump straight to standard FL.
    **The Consequence:** The design fails because standard FL assumes identical models, which is impossible since the smartwatch has a fraction of the tablet's RAM.
  napkin_math: |
    **Assumptions & Constraints:**
    - Watch payload = 52 MB/day.
    - Embedding transfers: Watch->Phone 18 KB, Phone->Tablet 72 KB.
    
    **Calculations:**
    - Total Embeddings = 90 KB/day.
    - Reduction Factor = 52,000 KB / 90 KB = ~577x.
    
    **Conclusion & Interpretation:**
    - **Result: Bandwidth-Bound**. Transferring 90 KB/day over BLE seamlessly satisfies absolute privacy and local bandwidth constraints.
