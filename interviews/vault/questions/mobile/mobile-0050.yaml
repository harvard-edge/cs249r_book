title: Designing Cross-Device Federated Personalization
scenario: 'You''re the ML systems architect for a health platform spanning Apple Watch (S9 chip, 1 GB
  RAM), iPhone (A18 Pro, 8 GB RAM), and iPad (M4, 16 GB RAM). Each device collects different health signals:
  the Watch has heart rate and motion, the iPhone has location and app usage, and the iPad has extended
  workout videos. You want to train a personalized health model that fuses data from all three devices
  — but Apple''s privacy framework prohibits sending raw health data between devices, even within the
  same user''s iCloud account. Design a federated personalization system that trains across a single user''s
  device ecosystem without centralizing raw data.'
question: "How would you design a federated personalization system that trains across a single user's device ecosystem without centralizing raw data?"
details:
  realistic_solution: 'Split federated learning across Apple devices. Each runs a capability-appropriate
    model: Watch (150 KB, HR+motion), iPhone (8 MB, location+usage), iPad (45 MB, video). Exchange compressed
    embeddings via BLE: 90 KB/day (575x reduction vs raw data, 0.72s transfer). iPad aggregates during
    charging (~30s/epoch). Privacy: epsilon=2/embedding, 10% subsampling = 0.2/day (under 100/year budget).
    This is not standard FL — it''s capability-aware split architecture for one user''s device ecosystem.'
  common_mistake: '"Use standard federated learning across the three devices." Standard FL is designed
    for many users with similar devices, not one user with heterogeneous devices. The Watch can''t run
    the same model as the iPad — it has 1/16th the RAM.'
  napkin_math: 'Watch model: 150 KB weights, 0.5 ms inference, 0.1 mW. Phone model: 8 MB, 3 ms inference,
    50 mW. iPad model: 45 MB, 15 ms inference, 200 mW. Daily embedding data: Watch → Phone: 18 KB. Phone
    → iPad: 72 KB. Total cross-device data: 90 KB/day (vs raw data: Watch heart rate at 1 Hz × 86,400
    sec × 4 bytes = 345 KB, accelerometer at 50 Hz × 86,400 × 12 bytes = 51.8 MB). Data reduction: 575×.
    BLE transfer: 90 KB / 125 KB/s = 0.72 seconds. Training: 1 epoch over 1 day''s data on iPad: ~30 seconds
    during charging. Privacy budget: ε = 2 per embedding × 288 embeddings/day. With subsampling (train
    on 10% of embeddings): effective ε = 0.2 per day. Annual budget: 73 — well within typical ε = 100/year
    targets.'
