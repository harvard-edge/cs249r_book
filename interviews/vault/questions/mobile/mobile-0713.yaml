title: The Cross-SoC Quantization Divergence
scenario: You ship a single INT8 TFLite object detection model for an autonomous drone. It must identify landing zones with >95% precision. Testing on Pixel 8 (Tensor G3) yields 97.2%. On Galaxy S23 (Snapdragon 8 Gen 2) it yields 96.8%. On Galaxy S23 FE (Exynos 2200), precision drops to 91.3%, failing the safety threshold. It's the exact same model binary and test images.
question: Why does INT8 precision drop by 6% on the Exynos 2200, and how do you fix it without maintaining three separate models?
details:
  realistic_solution: Three hardware-level INT8 execution differences: (1) Rounding modes — Tensor G3 uses round-half-to-even, Hexagon uses round-half-up, Exynos uses truncation. Affects 0.5% of values per layer. (2) Accumulator width — Exynos 2200 uses INT16 accumulators that overflow on high-activation channels, while others use INT32. (3) Operator fusion boundaries change quantization error propagation paths. Over 50 layers: cumulative drift shifts detection confidence by ±0.05, pushing Exynos below the 0.85 safety threshold. Fix: QAT retraining with simulated hardware noise (4 GPU-hours), or per-SoC calibration tables (500 bytes total).
  common_mistake: |
    **The Pitfall:** Assuming the Exynos chip is simply "less accurate" and defaulting to a heavier FP16 model.
    **The Rationale:** Engineers treat NPUs as black boxes, unaware that integer quantization rounding modes and accumulator widths differ wildly across silicon vendors.
    **The Consequence:** Tripling the model size and power consumption to 'fix' a problem that only requires a tiny calibration table adjustment.
  napkin_math: |
    1. **Error Propagation:** Rounding mode differences affect ~0.5% of values per layer.
    2. **Cumulative Drift:** Over 50 layers, 0.5% * 50 = 25% of activations shift by ±1 LSB.
    3. **Confidence Shift:** This shifts bounding box confidence scores by ~0.05 on the Exynos.
    4. **Calibration Cost:** Providing a small, per-SoC calibration table only requires **~500 bytes** of extra payload, restoring accuracy trivially.
