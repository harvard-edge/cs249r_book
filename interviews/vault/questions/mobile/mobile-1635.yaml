title: Optimizing Knowledge Distillation for Vision Models on Samsung Exynos 2400 NPU
scenario: You are deploying a large vision transformer (teacher) to a mobile device powered by the Samsung Exynos 2400 NPU (34.7 TOPS, 12 GB LPDDR5X). The teacher model achieves 85% accuracy but is too slow. You must create a smaller student model using knowledge distillation while maintaining at least 80% accuracy.
question: How would you explain when distillation would be preferred over pruning for this specific hardware and accuracy target?
details:
  realistic_solution: 'The solution involves profiling the teacher model on the Samsung Exynos 2400 NPU to identify specific bottlenecks (e.g., operator latency, memory access patterns). A smaller student model (e.g., MobileNetV3 or EfficientNet variant) should be chosen. Implement a multi-stage distillation approach: initially, use logit matching for overall knowledge transfer. Subsequently, consider augmenting with feature distillation, aligning intermediate activations from key teacher layers to corresponding student layers, particularly focusing on layers that contribute most to accuracy but are expensive on the NPU. This helps the student learn rich representations. The choice between logit and feature distillation, or a combination, should be guided by NPU performance characteristics and iterative experimentation. Distillation is preferred over pruning here because it transfers ''dark knowledge'' from the teacher, potentially leading to better generalization and accuracy retention for a given model size compared to simply removing parameters from the teacher.'
  common_mistake: |
    **The Pitfall:** Applying basic logit distillation without considering intermediate feature alignment or NPU architecture constraints.
    **The Rationale:** Candidates treat distillation as a generic black box, failing to quantify performance bottlenecks (like memory bandwidth) or leverage the rich representational data inside the teacher's hidden layers.
    **The Consequence:** The student model fails to reach the 80% accuracy target because it doesn't learn the complex internal 'dark knowledge' necessary to compensate for its reduced parameter count.
  napkin_math: |
    1. **Target Latency:** 50ms per inference.
    2. **Compute Throughput:** A student model with 10 GOPs running at 50ms requires 10 GOPs / 0.050s = 200 GOPS throughput.
    3. **Utilization Check:** 200 GOPS (0.2 TOPS) is < 1% of the NPU's 34.7 TOPS peak capacity.
    **Result:** The model is completely **memory-bound**. Distillation is preferred over pruning because compressing the 100 GOPs representations into a dense 10 GOPs footprint ensures the weights fit the **LPDDR5X bandwidth** while retaining accuracy.
