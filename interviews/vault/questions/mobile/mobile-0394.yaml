title: 'The TCO Blindspot: Training vs. Inference'
scenario: You are planning the budget for a new on-device ML feature for an app with 10 million users.
question: Over a year, why can cumulative on-device inference energy dominate one-time cloud training energy?
details:
  realistic_solution: The cumulative inference energy cost on user devices is the primary driver by several orders of magnitude. While training is power-intensive, it's a finite, one-time or infrequent event. Inference is a continuous, low-power event that occurs at massive scale, and its total energy consumption dominates the lifecycle TCO.
  common_mistake: |
    **The Pitfall:** Fixating on the high peak power of training.
    **The Rationale:** Engineers see 700W datacenters and assume training dominates, ignoring the "death by a thousand cuts" from millions of devices running daily inference.
    **The Consequence:** Drastically underestimating the lifecycle TCO and ecological impact of the deployed model.
  napkin_math: |
    - **Active power draw:** 2W
    - **Duty cycle:** 5% for 1 hour/day = 0.05 hours active
    - **Daily energy per user:** 2W * 0.05h = 0.1 Wh
    - **User base:** 10,000,000
    - **Daily fleet energy:** 10,000,000 * 0.1 Wh = 1 MWh
    - **Annual fleet energy:** 1 MWh * 365 = **365 MWh**
  options:
  - The one-time model training cost, as datacenter GPUs have a very high TDP.
  - The cumulative inference cost on user devices, due to the massive scale of the user base.
  - They are roughly equivalent; the high power of training is balanced by the scale of inference.
  - The energy cost of A/B testing different models before deployment.
  correct_index: 1
