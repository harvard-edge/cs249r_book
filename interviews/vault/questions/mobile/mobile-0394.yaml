title: 'The TCO Blindspot: Training vs. Inference'
scenario: 'You''re planning the budget for a new on-device ML feature for an app with 10 million users.
  When considering the total *energy* cost over one year, which component should you identify as the primary
  driver: the one-time cost of training the model in the cloud, or the cumulative energy cost of running
  inference across all user devices?'
question: "Over a year, why can cumulative on-device inference energy dominate one-time cloud training energy?"
details:
  realistic_solution: The cumulative inference energy cost on user devices is the primary driver by several
    orders of magnitude. While training is power-intensive, it's a finite, one-time or infrequent event.
    Inference is a continuous, low-power event that occurs at massive scale, and its total energy consumption
    dominates the lifecycle TCO.
  common_mistake: Engineers often fixate on the high, visible power draw of training clusters (e.g., H100s
    at 700W). They underestimate the 'death by a thousand cuts' effect, where a tiny inference power draw,
    multiplied by millions of devices and daily use, results in a far greater total energy consumption.
  napkin_math: '### Inference Cost (Annual) | **Parameters:** Assume a mobile feature on 10M phones has
    an average power draw of 2W, a 5% duty cycle, and runs for 1 hour/day. | **Calculation (per user):**
    `2W * 0.05 * 1h = 0.1 Wh` per day (from the Mobile ''Battery drain'' rule). | **Calculation (fleet):**
    `10,000,000 users * 0.1 Wh/user/day = 1,000,000 Wh/day = 1 MWh/day`. | **Annual Total:** `1 MWh/day
    * 365 days = 365 MWh`.'
  options:
  - The one-time model training cost, as datacenter GPUs have a very high TDP.
  - The cumulative inference cost on user devices, due to the massive scale of the user base.
  - They are roughly equivalent; the high power of training is balanced by the scale of inference.
  - The energy cost of A/B testing different models before deployment.
  correct_index: 1
