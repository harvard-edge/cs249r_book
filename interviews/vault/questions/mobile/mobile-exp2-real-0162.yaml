title: Estimating Real-Time Video Segmentation Compute on A17 Pro
scenario: Your team is deploying a real-time video portrait segmentation model for a live streaming app
  on the iPhone 15 Pro. The model processes 1080p frames at 30 FPS and requires 40 GOPS per frame. You
  need to evaluate whether the Apple A17 Pro Neural Engine can sustain this workload continuously without
  thermal throttling, and ensure it leaves enough resources in the shared 8 GB unified memory for concurrent
  video encoding.
question: "Can real-time video segmentation fit within the A17 Pro compute and memory bandwidth budget?"
details:
  realistic_solution: A strong candidate calculates both compute utilization and memory bandwidth to assess
    system-level viability. They will demonstrate that the workload requires only a small fraction of
    the NPU's peak capacity, translating to low power consumption that avoids thermal throttling. Furthermore,
    they will verify that the memory bandwidth required for streaming frames and reading weights does
    not bottleneck the shared memory subsystem.
  common_mistake: Candidates often solely compare the required operations against the theoretical peak
    TOPS without considering power draw, thermal limits, or memory bandwidth. They might assume that running
    near 35 TOPS continuously is feasible on a mobile device, or they forget that the 8 GB unified memory
    is heavily shared with the OS and GPU during live streaming.
  napkin_math: 'Compute required: 40 GOPS/frame * 30 FPS = 1.2 TOPS. Compute utilization: 1.2 TOPS / 35
    TOPS (A17 Pro Neural Engine peak) = ~3.4%. Estimated power: (1.2 / 35) * 5W = ~0.17W, well within
    continuous thermal limits. Memory bandwidth: 1080p frame (~6.2 MB) + INT8 weights (e.g., 10 MB) =
    ~16.2 MB/frame. 16.2 MB * 30 FPS = ~486 MB/s, which easily fits within the unified memory bandwidth
    without starving the system.'
