title: 'KV-Cache: Diagnose Attention Head Selection Causing Memory Inefficiency'
scenario: Your 1B LLM on Snapdragon 8 Gen 3 (45 TOPS INT8, 16GB) uses Multi-Head Attention (MHA) with
  16 heads, head_dim=64. A colleague suggests switching to GQA with 4 KV heads. Diagnose the current memory
  inefficiency and quantify the GQA improvement.
details:
  realistic_solution: 'MHA: 16 Q heads and 16 KV heads. GQA-4: 16 Q heads, 4 KV heads. KV cache size proportional
    to num_KV_heads. GQA reduces KV cache 4× with minimal quality loss.'
  common_mistake: Not connecting number of KV heads to KV cache size; thinking GQA affects compute (it
    mainly affects KV cache memory and bandwidth in decode).
  napkin_math: 'MHA KV per token: 24 layers × 2 × 16 heads × 64 dim × 2B = 98.3KB per token. GQA-4 KV
    per token: 24 × 2 × 4 × 64 × 2B = 24.6KB per token. Reduction: 4×. At 2048 context: MHA KV = 2048
    × 98.3KB = 201MB. GQA-4 KV = 2048 × 24.6KB = 50.3MB. Memory saved: 150.7MB per conversation. Decode
    bandwidth per step (2048 attended): MHA = 201MB, GQA = 50.3MB. KV read time: MHA = 201MB / 68 GB/s
    = 2.96ms per step. GQA = 50.3MB / 68 GB/s = 0.74ms. Decode throughput (ignoring weights): MHA limited
    to 1/2.96ms = 338 tok/sec from KV reads. GQA: 1/0.74ms = 1351 tok/sec. Bottleneck shifts to weight
    loading: 500MB model / 68 GB/s = 7.35ms. Weight-bound: 136 tok/sec either way. GQA benefit at 2048
    context: reduces KV from 2.96ms to 0.74ms. Total decode: MHA = 7.35 + 2.96 = 10.31ms → 97 tok/sec.
    GQA = 7.35 + 0.74 = 8.09ms → 124 tok/sec. 27.7% throughput improvement from GQA.'
