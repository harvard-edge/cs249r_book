title: Chiplet Compute-to-Memory Ratio for Mobile SoC Design
scenario: A mobile chip architect is designing a new SoC and asks why Apple uses a fixed ratio of neural engine compute to memory interface width.
question: How would you explain the design rationale for matching compute-to-memory ratio to target workloads?
details:
  realistic_solution: Mobile SoC design matches hardware arithmetic intensity to the target model class. MobileNet-class models operate at ~50-100 FLOPs/byte; A17 Pro ANE targets this range. Adding more memory bandwidth beyond what ANE can consume wastes power. The ratio is set by the dominant workload, not by maximizing specs.
  common_mistake: |
    **The Pitfall:** Assuming more memory bandwidth always helps mobile inference.
    **The Rationale:** Engineers view memory bandwidth as a universal bottleneck based on LLM trends.
    **The Consequence:** Over-provisioning memory bandwidth beyond what the ANE can consume wastes die area and power without improving performance for vision models.
  napkin_math: |
    - **Hardware Arithmetic Intensity:** 35 TOPS (INT8) / 300 GB/s = **117 FLOPs/byte**.
    - **MobileNetV3 AI:** ~80 FLOPs/byte (Memory-bound).
    - **GPT-class AI:** 200+ FLOPs/byte (Compute-bound).
    - **Conclusion:** The ANE is balanced for MobileNet workloads. Adding 2× bandwidth (600 GB/s) would push hardware AI to 58 FLOPs/byte, but wouldn't increase MobileNet throughput because it's already utilizing the necessary bandwidth efficiently.
