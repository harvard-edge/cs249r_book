title: Chiplet Compute-to-Memory Ratio for Mobile SoC Design
scenario: A mobile chip architect is designing a new SoC and asks why Apple uses a fixed ratio of neural engine compute to memory interface width.
question: How would you explain the design rationale for matching compute-to-memory ratio to target workloads?
details:
  realistic_solution: Silicon architecture maps strictly to target algorithmic math. Mobile SoCs deliberately match hardware arithmetic intensity to dominant model classes. MobileNet-style architectures operate efficiently at ~50-100 FLOPs/byte, and the hardware targets exactly this range. Expanding memory bus width indiscriminately wastes precious die area, drains battery, and offers zero performance uplift because the specific NPU ops are already fully saturated.
  common_mistake: |
    **The Pitfall:** Mechanically assuming that dumping more memory bandwidth into the hardware architecture will universally improve edge inference.
    **The Rationale:** Engineers project current LLM memory bottlenecks uniformly onto all mobile operations, completely ignoring the higher arithmetic intensity of standard vision workloads.
    **The Consequence:** Over-provisioning massive, expensive memory controllers that torch power and die area without yielding a single drop of throughput improvement.
  napkin_math: |
    **Assumptions & Constraints:**
    - Compute Capacity: 35 TOPS (INT8).
    - Memory Bandwidth: 300 GB/s.
    - Dominant Workload (Vision): MobileNet-class models (~80 FLOPs/byte).

    **Calculations:**
    - Hardware Arithmetic Intensity: 35 TOPS / 300 GB/s = 117 FLOPs/byte.
    - Bandwidth waste scenario: If bandwidth is doubled to 600 GB/s, hardware AI becomes 58 FLOPs/byte.

    **Conclusion & Interpretation:**
    - **Result: Bandwidth-Bound**. The SoC ratio perfectly matches the arithmetic intensity of core vision models. Over-provisioning bandwidth beyond this ratio merely wastes silicon area and battery life.
