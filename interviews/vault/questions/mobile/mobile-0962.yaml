title: 'KV-Cache: Specification — KV Cache Constraints for Latency SLA on Tensor G3'
scenario: Write the KV cache specification for a 1B LLM chat assistant on Tensor G3
  (7.5 TOPS, 12GB) targeting 30 tokens/sec (33.3ms per token). Given the bandwidth
  constraints, specify the maximum allowed KV cache size, required quantization, and
  maximum supported context length to meet the SLA.
question: What KV cache size, quantization, and context limit are required for a Tensor
  G3 chat assistant to meet 30 tokens per second?
details:
  realistic_solution: 'Work backward from latency SLA. Budget: 33.3ms total per token.
    Allocate: ~20ms for weight loading, ~10ms for KV reading, ~3ms overhead. From
    10ms KV budget, derive max KV size.'
  common_mistake: Not deriving KV constraints from the latency SLA; specifying KV
    cache size without verifying it's achievable given Tensor G3's lower bandwidth.
  napkin_math: 'Budget: 33.3ms per token. Weight load: 1B × INT4 = 500MB. At Tensor
    G3 BW (estimated 51 GB/s): 500MB / 51 GB/s = 9.8ms. Remaining for KV: 33.3 - 9.8
    - 3ms overhead = 20.5ms. KV budget: 20.5ms × 51 GB/s = 1.046GB. KV per token (bf16):
    24 × 2 × 8 × 128 × 2B = 98.3KB. Max context: 1.046GB / 98.3KB = 10,633 tokens.
    Use INT8 KV (49.2KB/token): max context = 1.046GB / 49.2KB = 21,260 tokens. Specification:
    INT8 KV quantization required. Max context: 8192 tokens (with 2.6× headroom).
    At 8192 tokens: KV = 8192 × 49.2KB = 402MB. KV read time: 402MB / 51 GB/s = 7.9ms.
    Total: 9.8 + 7.9 + 3 = 20.7ms → 48.3 tok/sec. Exceeds 30 tok/sec SLA. Context
    length can go to 16K: 16384 × 49.2KB = 805MB. Time: 805MB / 51 GB/s = 15.8ms.
    Total: 9.8 + 15.8 + 3 = 28.6ms → 35 tok/sec. Still meets 30 tok/sec SLA. Maximum
    context for 30 tok/sec: KV budget = 33.3 - 9.8 - 3 = 20.5ms × 51 GB/s = 1.046GB
    / 49.2KB = 21.3K tokens. Specify: max 16K context with INT8 KV for safety margin.'
