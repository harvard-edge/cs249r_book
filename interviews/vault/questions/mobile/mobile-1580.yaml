title: Optimizing LLM Deployment on Snapdragon 8 Gen 3 Hexagon NPU with Mixed Precision
scenario: Your team is tasked with deploying a 7B parameter LLM for on-device inference on a Snapdragon 8 Gen 3 Hexagon NPU (45 TOPS INT8, 12-16 GB LPDDR5X). You are evaluating whether to quantize the FP32 model to FP16 or INT8.
question: Which quantization approach is likely superior for this mobile deployment scenario, and why?
details:
  realistic_solution: |
    A robust solution involves a multi-step approach:
    1. **Profiling FP32 Baseline:** Establish a performance and accuracy baseline for the FP32 model on a proxy mobile CPU/GPU, and estimate its memory footprint.
    2. **FP16 Quantization:** Apply standard FP16 quantization. Evaluate memory savings (halving model size) and potential throughput improvements due to reduced memory bandwidth. Perform a rigorous accuracy evaluation to identify any significant degradation.
    3. **INT8 Quantization for Hexagon NPU:** Implement a post-training quantization (PTQ) or quantization-aware training (QAT) pipeline targeting INT8 for the Hexagon NPU. This would involve using vendor-specific tools (e.g., Qualcomm AI Engine Direct SDK) for calibration and deployment. Critically evaluate memory footprint (quartering model size relative to FP32), throughput leveraging the 45 TOPS INT8, and latency benefits. Assess accuracy with representative datasets to ensure it meets requirements.
    4. **Hardware-Aware Benchmarking:** Benchmark both FP16 and INT8 quantized models directly on the Snapdragon 8 Gen 3 Hexagon NPU to get real-world performance, memory, and power consumption metrics.
    5. **Trade-off Analysis:** Conduct a comprehensive trade-off analysis weighing accuracy, memory usage (12-16 GB LPDDR5X), latency, and power efficiency for both strategies. The INT8 approach, while potentially harder to implement and validate for accuracy, will likely offer significant performance and power benefits due to the NPU's dedicated INT8 hardware acceleration, which is usually more efficient than FP16 operations on general-purpose cores or even specialized FP16 units.
  common_mistake: |
    **The Pitfall:** Assuming performance gains are proportional to bit reduction without accounting for hardware specifics.
    **The Rationale:** Candidates overlook the overheads of quantization and fail to realize that the NPU specifically accelerates INT8 over FP16.
    **The Consequence:** Suboptimal throughput and energy efficiency, or deploying models that exceed the LPDDR5X memory limits.
  napkin_math: |
    - **FP32 Model Size:** 7B params * 4 bytes/param = 28 GB (OOM).
    - **FP16 Model Size:** 7B params * 2 bytes/param = 14 GB (barely fits, high memory bandwidth pressure).
    - **INT8 Model Size:** 7B params * 1 byte/param = 7 GB (fits comfortably).
    - **INT8 Compute Capacity:** 45 TOPS INT8 = 45 * 10^12 operations/second.
    - **Result:** **INT8 quantization is overwhelmingly superior, fitting safely into memory and fully utilizing the NPU's dedicated INT8 hardware.**
