title: Name tightly coupled memory used for local NPU accelerator caching
scenario: You are optimizing an image classifier on a Snapdragon 8 Gen 3 Hexagon NPU
  and need to reduce memory fetch power overhead.
question: Name the ultra-fast memory situated closest to the NPU processing elements
  used to avoid fetching weights repeatedly from main LPDDR memory.
details:
  realistic_solution: The Tightly Coupled Memory (TCM) or local SRAM cache. Keeping
    hot weights and intermediate activations entirely in the NPU's internal SRAM avoids
    the massive latency and energy penalties of accessing external LPDDR RAM.
  common_mistake: Stating L3 cache, which is typically attached to the CPU cluster,
    or SSD storage, which is orders of magnitude too slow.
  napkin_math: SRAM access takes ~1 ns vs LPDDR access ~50 ns
