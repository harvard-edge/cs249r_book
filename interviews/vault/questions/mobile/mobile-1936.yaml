title: Name tightly coupled memory used for local NPU accelerator caching
scenario: You are optimizing an image classifier on a Snapdragon 8 Gen 3 Hexagon NPU and need to reduce memory fetch power overhead.
question: What is the name of the ultra-fast memory situated closest to the NPU processing elements used to avoid fetching weights repeatedly from main LPDDR memory?
details:
  realistic_solution: |
    The Tightly Coupled Memory (TCM) or local SRAM cache. Keeping hot weights and intermediate activations entirely in the NPU's internal SRAM avoids the massive latency and energy penalties of accessing external LPDDR RAM.
  common_mistake: |
    **The Pitfall:** Stating L3 cache or SSD storage.
    **The Rationale:** Confusing CPU-attached cache hierarchy or persistent storage with NPU-specific local memory.
    **The Consequence:** Designing algorithms that cause massive latency and energy penalties by missing the local NPU SRAM.
  napkin_math: |
    **Assumptions & Constraints:**
    - SRAM access latency: ~1 ns.
    - LPDDR access latency: ~50 ns.

    **Calculations:**
    - 50 ns / 1 ns = 50.

    **Conclusion & Interpretation:**
    - **Result: 50x faster (Memory-Latency-Bound)**. SRAM provides roughly 50x faster access than main memory.
