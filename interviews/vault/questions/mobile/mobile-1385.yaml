title: A17 Pro Asymmetric Distillation for ASR
scenario: You are deploying a streaming ASR model to the latest iPhone. Your baseline teacher is a 1.2B parameter Conformer that consumes too much of the 8GB shared unified memory. You must train a 150M parameter student model optimized for the Apple A17 Pro Neural Engine.
question: How would you distill an ASR model asymmetrically for efficient execution on the Apple A17 Pro Neural Engine?
details:
  realistic_solution: The optimal approach is an asymmetric feature distillation strategy using learned projection networks. The student should be designed with NE-friendly operations (e.g., grouped convolutions instead of vanilla self-attention) to maximize the 16-core NE utilization. Distillation should incorporate Quantization-Aware Training (QAT), where the teacher acts as a quantized (INT8) reference, forcing the student to learn the exact decision boundaries it will face at deployment, minimizing memory bandwidth overhead.
  common_mistake: |
    **The Pitfall:** Proposing standard KL-divergence or basic L2 feature matching.
    **The Rationale:** Candidates do not account for the structural differences required for the A17 Pro NE and ignore the unified memory bandwidth bottleneck.
    **The Consequence:** Materializing large intermediate teacher feature maps during distillation training causes memory bottlenecks.
  napkin_math: |
    * The 1.2B teacher in FP16 uses 2.4GB.
    * The 150M INT8 student uses 150MB of the 8GB unified memory.
    * For inference latency: 35 TOPS at 30% utilization yields ~10.5 effective TOPS.
    * A 150M parameter INT8 student takes ~0.3 GOPS per audio frame.
    * For 100 frames/sec (real-time), it requires 30 GOPS (0.03 TOPS).
    * **This is well within the 10.5 effective TOPS of the A17 Pro NE, leaving >99% compute headroom and consuming <<1W of the 5W budget.**
