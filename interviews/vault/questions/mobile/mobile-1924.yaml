title: A17 Pro CPU-NPU Pipelining
scenario: Analyzing a video stylization app where the A17 Pro Neural Engine sits idle
  while the CPU applies pre-processing filters frame-by-frame.
question: Implement a producer-consumer queue that pipelines CPU pre-processing of
  frame N+1 with NPU inference of frame N, then derive the realized throughput from
  the per-stage timing.
details:
  realistic_solution: 'Currently, a frame takes 30ms CPU + 20ms NPU = 50ms total (20
    FPS). By decoupling the stages into a producer-consumer queue, the CPU starts
    preparing Frame 2 immediately after passing Frame 1 to the NPU. The bottleneck
    becomes the slowest stage: max(30ms, 20ms) = 30ms per frame, yielding a solid
    33 FPS.'
  common_mistake: Using a single threaded blocking call `model.predict(preprocess(frame))`,
    fundamentally locking out hardware level concurrency.
  napkin_math: max(30ms, 20ms) = 30ms pipeline throughput
