title: Exynos 2400 NPU Operator Lowering Tradeoffs
scenario: You are compiling an autoregressive vision-language model for the Samsung Exynos 2400 NPU. The
  system has a dual-core NPU capable of 34.7 TOPS, but its 12 GB LPDDR5X memory is shared across the CPU,
  GPU, and ISP. During ahead-of-time compilation, several novel attention operators fail to lower to the
  NPU and trigger CPU fallbacks. You must evaluate how to refactor the computation graph and manage operator
  scheduling to prevent severe memory bandwidth bottlenecks.
question: "How should unsupported attention operators be lowered or refactored for Exynos 2400 NPU delegation?"
details:
  realistic_solution: The ideal approach is to use graph optimization passes, like constant folding and
    operator fusion, to rewrite the unsupported attention mechanisms into standard matrix multiplications
    and supported activations. If a fallback is strictly required, the compiler must cluster CPU-bound
    operations to minimize context switching. The engineer should evaluate the cost of transferring intermediate
    tensors through the shared memory against the compute latency of the 34.7 TOPS NPU.
  common_mistake: Candidates often suggest writing custom NPU kernels without understanding the proprietary
    toolchain constraints, or they accept CPU fallbacks without calculating the synchronization cost.
    They frequently forget that the 12 GB LPDDR5X bandwidth is heavily contested by the ISP and display
    stack in a live camera application.
  napkin_math: Assuming LPDDR5X provides ~68 GB/s peak bandwidth, but only 50% (34 GB/s) is available
    to the NPU due to ISP/GPU contention. A single CPU fallback for a 20 MB activation tensor takes 20
    MB / 34 GB/s = ~0.6 ms for the round trip. For a network with 15 unsupported operators causing 15
    round trips, this adds 9 ms of pure memory overhead per inference. Meanwhile, the NPU at 34.7 TOPS
    could theoretically execute ~312 billion operations in that same 9 ms. Redesigning the graph to stay
    entirely on the NPU is strictly required.
