title: Zero-Copy Video Pipeline Bandwidth Saving
scenario: A Snapdragon 8 Gen 3 processes a 4K camera stream (3840x2160 RGB, 30 FPS).
  The ISP writes to DRAM, and the NPU reads it for semantic segmentation.
question: Design a zero-copy pipeline strategy and calculate the exact memory bandwidth
  saved per second compared to a deep-copy moving frames into an NPU-specific buffer.
details:
  realistic_solution: Zero-copy shares memory pointers between ISP and NPU. A deep
    copy requires one extra DRAM read and one extra DRAM write. One frame is 3840
    x 2160 x 3 = ~24.88 MB. At 30 FPS, the eliminated copy saves 24.88 MB * 30 * 2
    (read+write) ≈ 1.49 GB/s.
  common_mistake: Forgetting that a deep memory copy consumes both read AND write
    bandwidth, missing the 2x multiplier.
  napkin_math: 3840 * 2160 * 3 * 30 * 2 = 1,492,992,000 bytes/sec -> ~1.49 GB/s
