title: 'Model Format Conversion: Optimize INT8 to INT4 Conversion for Android LLM'
scenario: 'A 3B INT8 LLM (3GB) is being converted to INT4 (1.5GB) for Snapdragon 8 Gen 3 (16GB, 77 GB/s)
  deployment. Post-conversion QNN evaluation shows 3.2% MMLU degradation (target: <2%). Diagnose which
  quantization approach to use and quantify the accuracy-size tradeoff.'
question: "How would you diagnose which quantization approach to use and quantify the accuracy-size tradeoff?"
details:
  realistic_solution: 'Uniform INT4: MMLU -3.2%. Fix: mixed precision — keep embedding + LM head in INT8
    (saves little accuracy, adds memory). Embedding: 32K×3072×1B=96MB INT8 vs 48MB INT4. LM head: same
    96MB. Keep both INT8: +96MB. Model: 1.5GB+0.096+0.096=1.692GB. Use GPTQ with block quantization (group
    size=128): typically 0.5-1% better MMLU vs naive INT4. Expected: -1.8% MMLU (under 2% target). Final
    size: 1.7GB (vs 1.5GB naive). TPOT: 1.7/77=22ms vs 19.5ms naive.'
  common_mistake: Applying uniform INT4 quantization (all layers equally) when the most sensitive layers
    (embedding, LM head, first/last transformer layers) need higher precision.
  napkin_math: 'Embedding INT8: 32K×3072×1B=96MB. LM head: 96MB. Mixed model: 1.5GB (INT4 transformer)
    + 0.192GB (INT8 embed+head) = 1.692GB. TPOT: 1.692/77=22ms vs 19.5ms naive. Accuracy: GPTQ group-128
    INT4 typically -0.8% MMLU on 3B models. With INT8 embed: -0.5% (embedding sensitivity). Total: -1.3%
    ≈ within 2% target. Size: 1.692GB vs 3GB INT8 = 43.6% reduction.'
