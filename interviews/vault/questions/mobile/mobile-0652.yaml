title: The Sun-Soaked Sentry Problem
scenario: You are the lead ML Systems Architect for a new flagship EV's 'Cabin Sentry' feature. This safety-critical
  system uses a CNN on the in-cabin camera to detect if a child or pet is left unattended. A key marketing
  requirement is that this feature can run for a full 12 hours while the car is parked and powered off,
  even in extreme heat (e.g., a 45°C day in a parking lot), using no more than 5% of the car's 600 Wh
  auxiliary battery. The system is built on a Snapdragon 8 Gen 3-class automotive SoC. Propose a system
  architecture that meets these conflicting thermal, power, and performance requirements. What are your
  first three architectural decisions, and how do you justify them with napkin math?
details:
  realistic_solution: The only viable solution is a **cascaded, duty-cycled architecture** that keeps
    the main SoC in deep sleep for the vast majority of the time.
  common_mistake: Focusing solely on model optimization. Many engineers will immediately suggest switching
    to a more efficient model architecture (e.g., MobileNetV3). While necessary, this is insufficient.
    The core mistake is failing to realize that even the most efficient model, when run continuously on
    a high-end mobile SoC, cannot possibly meet the stringent long-term power and thermal budget in a
    passively cooled environment. They mistake a better component for a better system design, ignoring
    the physics of average power draw.
  napkin_math: The core task is to stay under the average power budget.
