title: The Sun-Soaked Sentry Problem
scenario: You are the lead ML Systems Architect for a new flagship EV's 'Cabin Sentry' feature. This safety-critical system uses a CNN on the in-cabin camera to detect if a child or pet is left unattended. A key marketing requirement is that this feature can run for a full 12 hours while the car is parked and powered off, even in extreme heat, using no more than 5% of the car's 600 Wh auxiliary battery.
question: What are your first three architectural decisions to meet these conflicting thermal, power, and performance requirements on an automotive SoC?
details:
  realistic_solution: The only viable solution is a **cascaded, duty-cycled architecture** that keeps the main SoC in deep sleep for the vast majority of the time.
  common_mistake: |
    **The Pitfall:** Focusing solely on algorithmic model optimization (e.g., switching to MobileNet).
    **The Rationale:** ML engineers mistake a better component for a better system design, ignoring the physical reality that any model running continuously on a high-end SoC will draw massive static power.
    **The Consequence:** Building an incredibly efficient model that still violently violates the battery and passive cooling budget because the SoC never sleeps.
  napkin_math: |
    - **Energy Budget:** 5% of 600 Wh = 30 Wh over 12 hours.
    - **Max Average Power:** 30 Wh / 12 h = **2.5 W**.
    - **Continuous Baseline:** Flagship SoC draws ~5W active. Continuous operation consumes 60 Wh, violating the budget by 2x.
    - **Duty-Cycling (10%):** Waking up for 100ms every 1 second.
    - **Average Power Draw:** (5W * 0.1 active) + (0.01W * 0.9 sleep) = 0.5W + 0.009W = **0.509 W**.
    - **Conclusion:** Duty-cycling consumes only **~6.1 Wh** over 12 hours (1% battery), easily surviving extreme parking lot heat.
