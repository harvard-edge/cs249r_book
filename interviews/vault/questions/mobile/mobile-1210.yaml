title: Always-On Inference Power Discrepancy
scenario: "You are deploying an always-on background model on a mobile Neural Engine. Your model requires only 0.35 TOPS to run in real-time, but profiling reveals the system power consumption increases by 1.2W during inference."
question: "Why does an always-on model needing only 0.35 TOPS add 1.2W of system power?"
details:
  realistic_solution: "The discrepancy stems from shared memory dynamics and baseline SoC power states. While compute is minimal, fetching weights activates the unified memory controller. Crucially, running the NPU continuously blocks the SoC from entering a low-power sleep state (C-state), incurring a massive static power overhead regardless of actual compute utilization."
  common_mistake: |
    **The Pitfall:** Assuming power scales linearly with active TOPS and blaming NPU architecture inefficiencies.
    **The Rationale:** Candidates fail to account for the static baseline power of waking up the memory controller and preventing the SoC from entering deep sleep.
    **The Consequence:** Engineering teams waste time trying to prune or quantize a model that is already computationally trivial, instead of implementing duty-cycling to let the SoC sleep.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - NPU Efficiency: 35 TOPS at 5W = 7 TOPS/W.
       - Model requirement: 0.35 TOPS.
       - Memory bandwidth: 4 GB/s. Memory access energy: ~200 pJ/byte.
    2. **Calculations:**
       - Theoretical Compute Power = 0.35 TOPS / 7 TOPS/W = 0.05 W (50 mW).
       - Memory Power = 4 GB/s * 200 pJ/byte = 0.8 W.
       - Static Wake Overhead = 1.2 W (Observed) - 0.05 W - 0.8 W = 0.35 W.
    3. **Conclusion & Interpretation:**
       - **Result: Power-Bound.** The 1.2W power drain is overwhelmingly driven by the **0.8W dynamic memory cost** and **0.35W static SoC wake state**, making compute optimizations completely ineffective.
