title: The Battery Drain Dilemma
scenario: Your team is profiling an on-device ML model for a new camera feature. You
  observe that running the model on the CPU uses less peak power than on the GPU,
  but the GPU completes inference significantly faster.
question: Why might a GPU use more peak power but complete inference faster than a
  CPU, and which is better for battery life?
details:
  realistic_solution: 'GPUs, especially on mobile SoCs, are designed for high parallelism
    and throughput. While they can achieve lower *latency* for complex ML tasks by
    processing more data in parallel, they often do so at a higher *peak power draw*
    when active. CPUs, particularly the smaller "little" cores in a big.LITTLE configuration,
    might have lower peak power but take longer to complete the task. The key metric
    for battery life is *energy consumption* (Power × Time). If the GPU completes
    the task significantly faster, its total energy consumption might be lower, even
    with higher peak power, because it spends less time in the high-power state. For
    a battery-sensitive application, you''d prefer the accelerator that minimizes
    total energy (Joules), not just peak power (Watts). This often involves trade-offs:
    a quick burst on the GPU might be better than a longer, lower-power CPU run if
    the GPU''s power-time product is lower.'
  common_mistake: '**The Pitfall:** Assuming that lower peak power immediately equals
    better battery life.

    **The Rationale:** Engineers look purely at instantaneous wattage (Watts) and
    forget that energy is measured over time (Joules).

    **The Consequence:** They mistakenly deploy models on the CPU to "save battery,"
    resulting in prolonged execution times that actually drain more total energy from
    the device.

    '
  napkin_math: '**Assumptions & Constraints:**

    - CPU Profile: 1.5W for 50ms.

    - GPU Profile: 3.0W for 20ms.


    **Calculations:**

    - CPU Energy: 1.5W × 0.05s = 0.075 Joules (75 mJ).

    - GPU Energy: 3.0W × 0.02s = 0.060 Joules (60 mJ).


    **Conclusion & Interpretation:**

    - **Result: -15 mJ (Energy-Bound)**. Despite drawing double the peak power, the
    GPU finishes so fast that it consumes 15 mJ less total energy (60 mJ vs 75 mJ),
    making it better for battery life.

    '
