title: 'Mastery: MobileNetV3 SE block impact on A17 Pro ANE vs Hexagon NPU'
scenario: MobileNetV3 uses SE blocks with reduction ratio r=4. The A17 Pro ANE and Snapdragon 8 Gen 3
  Hexagon NPU have different handling of SE blocks. Demonstrate mastery by analyzing SE block execution
  on each platform, quantifying the latency overhead, and recommending whether to include or remove SE
  for each platform.
question: "How should MobileNetV3 SE blocks be handled on A17 Pro ANE versus Snapdragon Hexagon, and what latency overheads matter?"
details:
  realistic_solution: 'A17 Pro ANE: SE blocks fully supported; GAP + two FC + sigmoid + scale are fused
    into a single ANE operation. Overhead: ~0.2ms for all SE blocks in MV3-Large. Accuracy gain: ~1.5pp.
    Worth keeping. Hexagon HTP v73: SE partially fused. GAP as native op, FC1+FC2+ReLU6+Hardsigmoid as
    fused block, final multiply is separate. If QNN compiler fuses properly: overhead ~0.3ms. If not fused:
    12 separate dispatches × 0.1ms = 1.2ms overhead. Profile with qnn-net-run --profiling. Recommendation:
    keep SE for ANE; profile before deciding for Hexagon; consider SE reduction ratio r=8 to halve SE
    FLOPs.'
  common_mistake: Treating SE removal as always beneficial for mobile without profiling; on A17 Pro ANE,
    SE blocks add ~0.2ms to a 2ms model — a 10% overhead worth 1pp accuracy. On Hexagon, SE may add 1.5ms
    if not properly fused — a 100% overhead clearly not worth it.
  napkin_math: 'MV3-Large SE stats: 15 SE blocks (selected stages). C values: 16, 24, 40, 80, 112, 160
    (varying). Total SE FLOPs: Σ(2×C²/4 × 2) for each stage ≈ 3M FLOPs. % of total 0.22G: 1.4%. A17 Pro
    ANE: 35 TOPS. 3M FLOPs / 35T = 0.086μs compute. Practical ANE overhead (scheduling): ~0.2ms for 15
    separate small FC dispatches. If fused: 15 × 0.013ms = 0.2ms. Total inference 2.1ms → SE adds 10%.
    Hexagon: 45 TOPS. Same 3M FLOPs = 0.067μs compute. If 12 unfused dispatches: 12 × 0.1ms = 1.2ms. SE-free
    model: 1.5ms total. SE cost on Hexagon: 80% latency overhead for 1.4% FLOPs — remove SE for Hexagon
    deployment.'
