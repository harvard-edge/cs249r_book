title: The Thermal Throttling Death Spiral
scenario: Your mobile game uses an AI model to upscale 720p to 1080p at 60 FPS. After 15 minutes of perfect gameplay, the framerate halves to 30 FPS and the phone gets hot. CPU/GPU logs show only 50% utilization.
question: Why does the game halve framerate after 15 minutes even with 50% CPU/GPU utilization?
details:
  realistic_solution: |
    The device has hit its thermal envelope limit, triggering Dynamic Voltage and Frequency Scaling (DVFS). The SoC generates more heat than the passive cooling chassis can dissipate. To prevent thermal runaway, the OS aggressively throttles the NPU/GPU clock speeds. The reported 50% utilization is relative to the throttled clock frequency, not the peak hardware capacity.
  common_mistake: |
    **The Pitfall:** Assuming a memory leak or software bug is causing the slowdown.
    **The Rationale:** Candidates ignore hardware realities like sustained thermal envelopes and DVFS in fanless mobile form factors.
    **The Consequence:** Engineering time is wasted profiling software performance when the issue is fundamentally physical and requires model quantization or duty-cycling.
  napkin_math: |
    **Assumptions & Constraints:**
    - Mobile SoC sustained thermal limit: ~3-4W.
    - Initial NPU state: 1.0 GHz (~5W), achieving 60 FPS.
    - Thermal limit trigger: 45°C skin temperature after 15 mins.

    **Calculations:**
    - The OS throttles the NPU clock speed by 50% to 500 MHz to reduce power to ~2.5W and cool down.
    - Compute throughput (TOPS) scales linearly with clock speed.
    - Throttled framerate: 60 FPS * 50% clock speed = 30 FPS.

    **Conclusion & Interpretation:**
    - **Result: 30 FPS (Thermal/Power-Bound)**. Halved clock speed equals halved TOPS, resulting in 30 FPS.
