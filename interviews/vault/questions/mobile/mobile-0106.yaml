title: The Thermal Throttling Death Spiral
scenario: Your mobile game uses an AI model to upscale 720p to 1080p at 60 FPS. After 15 minutes of perfect gameplay, the framerate halves to 30 FPS and the phone gets hot. CPU/GPU logs show only 50% utilization.
question: Why does the game halve framerate after 15 minutes even with 50% CPU/GPU utilization?
details:
  realistic_solution: |
    The thermal envelope is hit, activating DVFS (Dynamic Voltage and Frequency Scaling). The SoC generates more heat than passive cooling can dissipate. The OS thermally throttles clock speeds. 50% utilization is measured at the throttled clock, not peak capacity.
  common_mistake: |
    **The Pitfall:** Assuming a memory leak or software bug is causing the slowdown.
    **The Rationale:** Candidates ignore hardware realities like thermal envelopes and DVFS in mobile form factors.
    **The Consequence:** Time is wasted profiling code when the issue is fundamentally physical.
  napkin_math: |
    - Mobile SoC sustained thermal limit is ~3-4W.
    - At launch, the NPU runs at 1.0 GHz (~5W), achieving 60 FPS.
    - After 15 minutes, heat accumulates to the 45C skin temp limit.
    - The OS throttles the NPU clock speed by 50% to 500 MHz (~2.5W) to cool down.
    - **Halved clock speed = halved TOPS = 30 FPS.**
