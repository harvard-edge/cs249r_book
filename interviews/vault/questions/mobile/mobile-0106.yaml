title: The Thermal Throttling Death Spiral
scenario: Your mobile game runs a super-resolution AI model to upscale 720p to 1080p at 60 FPS. When the
  user launches the game, it runs perfectly. After 15 minutes of gameplay, the framerate halves to 30
  FPS, and the phone feels hot. Your CPU/GPU utilization logs say they are only at 50% capacity. What
  physical reality is taking down your app?
details:
  realistic_solution: 'Thermal envelope hit; DVFS activated. SoC generates ~8W but passive cooling dissipates
    only ~3-4W. After 15 min, junction temp hits limit and firmware halves clocks. 50% utilization is
    measured at throttled clock, not peak capacity. Fix: (1) reduce resolution (540p -> 1080p via ML upscaling)
    to cut compute 4x. (2) Monitor thermals and disable ML effect before throttling. (3) Target 3W sustained
    budget, not peak throughput.'
  common_mistake: '"There is a memory leak." Memory leaks cause crashes (OOM), not steady performance
    degradation accompanied by heat.'
  napkin_math: Mobile SoC thermal limit for sustained performance is ~3-4W. At launch, NPU runs at 1.0
    GHz (5W) hitting 60 FPS. After 15 minutes, heat accumulation hits 45C skin temp limit. The OS thermally
    throttles the NPU clock speed by 50% to 500 MHz (~2.5W) to cool down. Halved clock speed = halved
    TOPS = 30 FPS.
