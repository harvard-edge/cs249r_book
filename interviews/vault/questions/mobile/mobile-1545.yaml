title: KV-Cache Pressure on Google Tensor G3 for Long Contexts
scenario: You are deploying a 7B parameter LLM for on-device inference. Your LLM uses 32 attention heads, a head dimension of 128, and consists of 30 layers. Initial tests show significant latency spikes and occasional out-of-memory errors with longer prompts.
question: How should a mobile LLM manage KV cache for 2048-token context to avoid latency spikes and OOMs?
details:
  realistic_solution: |
    Implement PagedAttention to manage the KV-cache efficiently, allowing non-contiguous memory allocation and eliminating fragmentation. Apply INT8 quantization to the KV-cache to halve its footprint. Utilize hardware-aware attention mechanisms (like FlashAttention-2 adapted for edge) to tile computation and minimize SRAM-to-DRAM memory movement during the autoregressive phase.
  common_mistake: |
    **The Pitfall:** Underestimating the KV-cache's memory footprint for long contexts.
    **The Rationale:** Developers used to cloud deployments often ignore KV-cache size until it causes an OOM on mobile devices.
    **The Consequence:** Severe latency spikes and application crashes due to excessive page faults or memory exhaustion.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 30 layers, 32 heads, 128 dim
       - Context: 2048 tokens
       - Data type: FP16 (2 bytes)
    2. **Calculations:**
       - KV Cache per token: 30 layers * 32 heads * 128 dim * 2 (K&V) * 2 bytes = 491,520 bytes (~0.47 MB)
       - Total KV Cache: 0.47 MB * 2048 tokens = 962.6 MB
    3. **Conclusion & Interpretation:** **The KV cache consumes nearly 1GB of unified memory, causing pressure. Result: Memory Capacity-Bound.**
