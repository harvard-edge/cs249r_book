title: KV-Cache Pressure on Google Tensor G3 for Long Contexts
scenario: You are deploying a 7B parameter Large Language Model (LLM) for on-device inference on a smartphone powered by the Google Tensor G3 (featuring a 7.5 TOPS on-device TPU and 12 GB LPDDR5X memory). Your LLM uses 32 attention heads, a head dimension of 128, and consists of 30 layers. The goal is to support a context window of 2048 tokens. Initial tests show significant latency spikes and occasional out-of-memory (OOM) errors, especially with longer prompts.
question: How should a Tensor G3 7B LLM manage KV cache for 2048-token context to avoid latency spikes and OOMs?
details:
  realistic_solution: Implement paged attention to manage the KV-cache efficiently, allowing non-contiguous memory allocation and reducing fragmentation. Explore different cache eviction policies (e.g., LRU, LFU, or custom attention-score-aware policies) to optimize memory reuse. Consider KV-cache quantization (e.g., to INT8 or INT4) to significantly reduce memory footprint. Dynamically adjust the maximum context window based on real-time memory availability and user interaction patterns. Utilize the Tensor G3's TPU for accelerated KV-cache operations if possible, ensuring data transfers are optimized.
  common_mistake: |
    **The Pitfall:** Underestimating the KV-cache's memory footprint for long contexts.
    **The Rationale:** Developers used to cloud deployments often ignore KV-cache size until it causes an OOM on mobile.
    **The Consequence:** Severe latency spikes and application crashes due to excessive page faults or memory exhaustion.
  napkin_math: |
    1. KV-cache size per token, per layer: 32 heads * 128 dim * 2 (K/V) * 2 bytes = 16,384 bytes.
    2. KV-cache size per token across all 30 layers: 16,384 * 30 = 491,520 bytes (~0.47 MB).
    3. **Total KV-cache for 2048 tokens: 0.47 MB * 2048 = ~960 MB.**
    4. This large footprint significantly cuts into the available LPDDR5X memory.
