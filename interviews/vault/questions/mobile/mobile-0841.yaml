title: Mobile Telemetry Byte Budget
scenario: A mobile model reports 30 counters once per day. Each counter is 8 bytes, and 5 million devices opt in.
question: "How much daily telemetry is uploaded by 5M devices sending 30 eight-byte counters each before protocol overhead?"
details:
  realistic_solution: Calculate the exact byte volume. Implement local batching and transmit telemetry payloads via compressed differential privacy streams to minimize the aggregate ingress footprint.
  common_mistake: |
    **The Pitfall:** Assuming telemetry is free at fleet scale or attempting to upload raw examples.
    **The Rationale:** Engineers used to cloud systems often log verbose JSON payloads indiscriminately.
    **The Consequence:** Triggering massive cloud ingress bills and destroying user data plan budgets.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 30 counters/device/day.
       - 8 bytes/counter.
       - 5M devices.
    2. **Calculations:**
       - Per Device = 30 * 8 = 240 bytes.
       - Fleet Total = 240 * 5,000,000 = 1,200,000,000 bytes.
    3. **Conclusion & Interpretation:**
       - **Result: Network-Bound**. The fleet-wide telemetry footprint is ~1.2 GB per day, small enough for aggregate monitoring but requiring batching controls.
