title: Mobile Telemetry Byte Budget
scenario: A mobile model reports 30 counters once per day. Each counter is 8 bytes, and 5 million devices opt in.
question: "How much daily telemetry is uploaded by 5M devices sending 30 eight-byte counters each before protocol overhead?"
details:
  realistic_solution: 'Each device sends 240 bytes/day. Across 5 million devices, that is 1.2 GB/day before protocol overhead. This is small enough for aggregate monitoring but still needs privacy and batching controls.'
  common_mistake: |
    **The Pitfall:** Assuming telemetry is free at fleet scale or attempting to upload raw examples.
    **The Rationale:** Engineers used to cloud systems often log verbose JSON payloads indiscriminately.
    **The Consequence:** Triggering massive AWS/GCP ingress bills and destroying user data plan budgets.
  napkin_math: |
    - **Per Device Data:** 30 counters * 8 bytes = 240 bytes/device/day.
    - **Fleet Total:** 240 bytes * 5,000,000 devices = 1,200,000,000 bytes.
    - **Final Result:** **~1.2 GB per day** fleet-wide telemetry footprint.
