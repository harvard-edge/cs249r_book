title: CoreML INT8 Calibration
scenario: Compiling a PyTorch segmentation model to CoreML for the A17 Pro Neural
  Engine.
question: Apply post-training static quantization using a calibration dataset to convert
  FP32 weights and activations to INT8, ensuring compatible operations for the ANE.
details:
  realistic_solution: Use the coremltools python library with a representative subset
    of 100 images. The calibration step runs inference to record the min/max distributions
    of all intermediate activations. It then calculates the scale and zero-point parameters.
    This permanently shrinks the 10MB FP32 model to 2.5MB INT8, perfectly matching
    the ANE's optimal datatype.
  common_mistake: Using dynamic quantization on iOS, which forces the CPU/NPU to calculate
    activation scales on the fly, destroying the latency gains.
  napkin_math: 10MB FP32 / 4 = 2.5MB INT8 footprint
