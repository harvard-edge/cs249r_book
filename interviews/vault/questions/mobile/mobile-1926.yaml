title: CoreML INT8 Calibration
scenario: Compiling a PyTorch segmentation model to CoreML for the A17 Pro Neural Engine.
question: Apply post-training static quantization using a calibration dataset to convert FP32 weights and activations to INT8, ensuring compatible operations for the ANE.
details:
  realistic_solution: Use the coremltools python library with a representative subset of 100 images. The calibration step runs inference to record the min/max distributions of all intermediate activations. It then calculates the scale and zero-point parameters. This permanently shrinks the 10MB FP32 model to 2.5MB INT8, perfectly matching the ANE's optimal datatype.
  common_mistake: |
    **The Pitfall:** Using dynamic quantization on iOS.
    **The Rationale:** It's the simplest default option in PyTorch and avoids the hassle of compiling a calibration dataset.
    **The Consequence:** This forces the CPU or Neural Engine to calculate activation scales on the fly at runtime, destroying any latency gains and draining battery.
  napkin_math: |
    **Assumptions & Constraints:**
    - FP32 Size: 32 bits = 4 bytes per parameter.
    - INT8 Size: 8 bits = 1 byte per parameter.
    - Original Model Size: 10 MB.

    **Calculations:**
    - Footprint Reduction: 10 MB / 4 = 2.5 MB.

    **Conclusion & Interpretation:**
    - **Result: 2.5 MB INT8 Model (Memory-Capacity-Bound)**. ANE hardware explicitly requires statically calibrated INT8 layers to bypass severe cast overhead.
