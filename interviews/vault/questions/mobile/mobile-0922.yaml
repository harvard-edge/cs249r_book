title: 'Fault Tolerance: Realize Mobile Fleet Update Rollout Timeline'
scenario: Realize the model update rollout plan for 50M users. The update is a 500MB quantized model. You have 7 days for full rollout.
question: How would you specify staging percentages, validation gates, CDN requirements, and rollback procedures?
details:
  realistic_solution: |
    Implement a staged rollout with automated validation gates and pre-positioned CDN distribution. Separate rollout mechanics per platform (iOS App Store phased release vs. Google Play staged rollout). Define telemetry thresholds (e.g., p95 latency, OOM crash rates) to trigger automated rollbacks. Utilize background downloading on Wi-Fi to limit user data consumption.
  common_mistake: |
    **The Pitfall:** Failing to account for massive CDN costs and lacking automated rollback triggers.
    **The Rationale:** Candidates often treat mobile ML model updates like simple backend microservice deployments, ignoring the massive bandwidth requirements of shipping 500MB files to 50M edge devices.
    **The Consequence:** Generating huge unexpected cloud bills and prolonged outages if a bad model is deployed without automated circuit breakers.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Users: 50M
       - Model Size: 500 MB (0.5 GB)
       - CDN Cost: $0.008/GB
    2. **Calculations:**
       - Total Data: 50,000,000 * 0.5 GB = 25,000,000 GB (25 PB)
       - CDN Cost: 25,000,000 GB * $0.008/GB = $200,000
       - Peak Bandwidth (24h full rollout window): 25 PB / 86400s = ~289 GB/s
    3. **Conclusion & Interpretation:** **Total CDN cost is $200,000. Result: Network Bandwidth-Bound.**
