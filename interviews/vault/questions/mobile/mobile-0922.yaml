title: 'Fault Tolerance: Realize Mobile Fleet Update Rollout Timeline'
scenario: Realize the model update rollout plan for 50M users across A17 Pro (iOS) and Snapdragon 8 Gen 3 (Android). The update is a 500MB 4-bit quantized 1B model. You have 7 days for full rollout.
question: How would you specify staging percentages, validation gates, CDN requirements, and rollback procedures?
details:
  realistic_solution: Staged rollout with automated gates. CDN pre-positioned. Per-platform staged separately (iOS App Store vs Google Play have different mechanics).
  common_mistake: |
    **The Pitfall:** Failing to account for massive CDN costs and lacking automated rollback triggers.
    **The Rationale:** Candidates often treat mobile ML model updates like simple backend microservice deployments, ignoring the massive bandwidth requirements of shipping 500MB files to 50M devices.
    **The Consequence:** Generating huge unexpected cloud bills and prolonged outages if a bad model is deployed without automated circuit breakers.
  napkin_math: |
    1. **CDN Cost:** 50M users * 500 MB = 25 PB total download. At $0.008/GB, CDN cost is $200K.
    2. **Staging:** Day 1: 0.01% -> Day 3: 0.1% -> Day 4: 1% -> Day 5: 10% -> Day 7: 100%.
    3. **Peak Load:** Full rollout of 25 PB over 24 hours = 289 GB/s (well within major CDN limits).
    4. **Conclusion:** **A staged rollout requires $200K in CDN egress and strict automated rollback triggers (e.g., latency p95 > 2x baseline).**
