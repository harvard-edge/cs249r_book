title: Facial Mesh Target FLOPS Budget
scenario: A Snapdragon 8 Gen 3 processes an AR facial mesh model at 120 FPS, executing
  25 MFLOPs per frame in INT8. The thermal budget for the AR application is 1.5W
  sustained; at full INT8 NPU clock, the model draws 800 mW; if the GPU is concurrently
  running display composition (~600 mW), the chip enters a mixed-precision fallback
  mode where 30% of layers downgrade to FP16, costing 1.4x extra MFLOPs/frame.
question: Evaluate the required compute budget in GFLOPs/s under both nominal INT8
  operation AND the mixed-precision fallback mode. Determine whether the NPU still
  hits 120 FPS in fallback when GPU composition is active.
details:
  realistic_solution: 'The total compute required is the per-frame cost times the
    frame rate: 25 MFLOPs * 120 FPS = 3000 MFLOPs per second. Dividing by 1000 gives
    exactly 3.0 GFLOPs per second.'
  common_mistake: Assuming MFLOPs scale linearly with resolution rather than just
    multiplying operations directly by the frame rate.
  napkin_math: 25 * 120 / 1000 = 3 GFLOPs
