title: Facial Mesh Target FLOPS Budget
scenario: A Snapdragon 8 Gen 3 processes an AR facial mesh model at 120 FPS, executing 25 MFLOPs per frame in INT8. The thermal budget for the AR application is 1.5W sustained. At full INT8 NPU clock, the model draws 800 mW. If the GPU is concurrently running display composition (~600 mW), the chip enters a mixed-precision fallback mode where 30% of layers downgrade to FP16, costing 1.4x extra MFLOPs/frame.
question: Evaluate the required compute budget in GFLOPs/s under both nominal INT8 operation AND the mixed-precision fallback mode. Determine whether the NPU still hits 120 FPS in fallback when GPU composition is active.
details:
  realistic_solution: 'Nominal INT8 mode. Per-second compute = 25 MFLOPs * 120 FPS = 3.0 GFLOPs/s = 3 GOPS. Hexagon NPU peak is 45 TOPS INT8, so utilisation = 3 / 45000 = 0.007% - the workload is laughably easy on raw compute. Power: 800 mW for the NPU + 600 mW for the GPU compositor = 1.4 W < 1.5 W thermal budget; nominal mode passes. Mixed-precision fallback. The 30% layer downgrade to FP16 multiplies per-frame work by 1.4x for the affected portion: effective MFLOPs/frame = 0.7 * 25 + 0.3 * 25 * 1.4 = 17.5 + 10.5 = 28 MFLOPs (a 12% increase over INT8). Per-second work = 28 * 120 = 3.36 GFLOPs/s. FP16 throughput on Hexagon is half of INT8 (~22.5 TFLOPS), so the FP16-portion utilisation = (10.5 * 120) / 22500 = 0.0056% - still trivially under-provisioned. The 120 FPS deadline is met in both nominal and fallback modes by a 4-order-of- magnitude margin; throughput is not the constraint. The thermal envelope is the actual constraint - at 1.4 W during nominal mode the system is 93% of budget, leaving only 100 mW of headroom for any other workload.'
  common_mistake: |
    **The Pitfall:** Reporting only the nominal compute figure and failing to evaluate the thermal envelope.
    **The Rationale:** Candidates focus on raw TOPS and ignore that the true constraint on sustained mobile performance is thermal dissipation.
    **The Consequence:** Incorrectly concluding the system has ample headroom based on compute, missing the fact that the thermal budget is almost saturated.
  napkin_math: |
    * Nominal compute: 25 MFLOPs × 120 FPS = 3.0 GFLOPs/s.
    * Fallback compute: (0.7 × 25) + (0.3 × 25 × 1.4) = 28 MFLOPs/frame.
    * Fallback per-second: 28 × 120 = 3.36 GFLOPs/s (both << 45 TOPS).
    * Power: 800 mW (NPU) + 600 mW (GPU) = 1.4W.
    * **The 1.4W draw consumes 93% of the 1.5W thermal budget, making thermals the binding constraint, not compute.**
