title: Facial Mesh Target FLOPS Budget
scenario: A Snapdragon 8 Gen 3 processes an AR facial mesh model at a developer-targeted
  framerate of 120 FPS. The model executes 25 MFLOPs per frame.
question: Evaluate the required continuous compute budget in GFLOPs per second to
  hit the target framerate.
details:
  realistic_solution: 'The total compute required is the per-frame cost times the
    frame rate: 25 MFLOPs * 120 FPS = 3000 MFLOPs per second. Dividing by 1000 gives
    exactly 3.0 GFLOPs per second.'
  common_mistake: Assuming MFLOPs scale linearly with resolution rather than just
    multiplying operations directly by the frame rate.
  napkin_math: 25 * 120 / 1000 = 3 GFLOPs
