title: Designing Continuous Batching for Shared NPUs
scenario: Multiple apps on an iPhone 15 simultaneously request an LLM API running
  locally on the Apple A17 Pro Neural Engine.
question: Design a serving scheduler that maximizes NPU utilization and minimizes
  context switching overhead for heterogeneous batch sizes.
details:
  realistic_solution: Implement a continuous batching scheduler in the system daemon.
    It dynamically inserts new app requests into the active execution batch at token
    generation boundaries. To avoid thrashing the NPU's limited local SRAM, it multiplexes
    all requests through a single loaded model replica.
  common_mistake: Spawning separate model instances for each app, which would OOM
    the shared memory and thrash the NPU SRAM.
  napkin_math: 1 model replica > N apps
