title: Designing Continuous Batching for Shared NPUs
scenario: Multiple apps on an iPhone 15 simultaneously request an LLM API running locally on the Apple A17 Pro Neural Engine.
question: Design a serving scheduler that maximizes NPU utilization and minimizes context switching overhead for heterogeneous batch sizes.
details:
  realistic_solution: Implement a continuous batching scheduler in the system daemon. It dynamically inserts new app requests into the active execution batch at token generation boundaries. To avoid thrashing the NPU's limited local SRAM, it multiplexes all requests through a single loaded model replica.
  common_mistake: |
    **The Pitfall:** Spawning separate model instances for each app.
    **The Rationale:** Standard process isolation strategies on mobile OSs typically instantiate separate runtimes per app.
    **The Consequence:** The shared memory immediately goes Out-Of-Memory (OOM) and the NPU SRAM severely thrashes.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 1 shared model replica loaded in memory (system daemon).
       - N concurrent apps multiplexing requests.
    2. **Calculations:**
       - Standard isolated memory = N * Model Size
       - Shared daemon memory = 1 * Model Size
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Optimized. By multiplexing requests through a single loaded model replica via continuous batching, memory footprint remains constant at 1x Model Size, preventing OOM and SRAM thrashing.**
