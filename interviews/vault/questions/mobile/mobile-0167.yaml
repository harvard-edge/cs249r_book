title: The Quantization Energy Dividend
scenario: Your team is optimizing a new visual search feature for your mobile app. To improve battery life, you're considering quantizing the model.
question: About how much more energy-efficient is an INT8 MAC than an FP16 MAC for mobile inference?
details:
  realistic_solution: An INT8 MAC operation is approximately 5x more energy-efficient than an FP16 MAC operation. This is a fundamental physical invariant. The savings come from simpler digital logic in the multiplier and reduced energy for data movement, both on-chip and to/from RAM. While FP32 vs INT8 is a massive ~18x saving, the FP16 vs INT8 jump is still a critical optimization for mobile battery life.
  common_mistake: |
    **The Pitfall:** Assuming energy savings scale linearly with bit width (e.g., halving the bits from 16 to 8 should be a 2x saving).
    **The Rationale:** Engineers confuse the FP16->INT8 saving with the much larger FP32->INT8 saving, or underestimate the non-linear hardware-level impact of multiplier circuits.
    **The Consequence:** This leads to inaccurate power budgeting and underestimating the true value of INT8 quantization for battery life.
  napkin_math: |
    - An FP16 MAC operation requires reading 16-bit values and doing float math, consuming roughly 1.5pJ.
    - An INT8 MAC uses 8-bit integers and simpler digital logic, consuming roughly 0.3pJ.
    - **The approximate energy savings per compute operation is 1.5 / 0.3 = 5x.**
  options:
  - About 2x more efficient
  - About 5x more efficient
  - About 18x more efficient
  - The savings are negligible (<10%)
