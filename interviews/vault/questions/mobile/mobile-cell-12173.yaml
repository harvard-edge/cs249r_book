title: 'Network Bandwidth Bottlenecks: Implement Memory-Bandwidth-Bound TPOT Derivation'
scenario: 'Derive the memory-bandwidth-bound TPOT formula for on-device LLM decode and apply it to calculate
  TPOT for: (A) 1B INT8 on A17 Pro (68 GB/s), (B) 3B INT4 on Snapdragon 8 Gen 3 (77 GB/s), (C) 7B INT4
  on Tensor G3 (50 GB/s). Show all intermediate steps.'
details:
  realistic_solution: 'Formula: TPOT_bw = model_size_bytes / memory_bandwidth. Validity: only when arithmetic_intensity
    < ridge_point. (A) 1B INT8: 1GB. Ridge: 35T/68G=514 FLOPs/byte. AI: 2×1B/1GB=2 FLOPs/byte << 514.
    BW-bound. TPOT=1/68=14.7ms. (B) 3B INT4: 1.5GB. Ridge: 90T/77G=1169 FLOPs/byte. AI: 2×3B/(1.5B)=4
    FLOPs/byte << 1169. BW-bound. TPOT=1.5/77=19.5ms. (C) 7B INT4: 3.5GB. Ridge: estimate 45T×2/50G=1800
    FLOPs/byte. AI: 2×7B/(3.5B)=4 FLOPs/byte << 1800. BW-bound. TPOT=3.5/50=70ms.'
  common_mistake: Applying the formula without verifying that the model is memory-bandwidth-bound (not
    compute-bound); if arithmetic intensity > ridge point, the compute-bound formula applies instead.
  napkin_math: '(A): TPOT=1B/68G=14.7ms. (B): 1.5B/77G=19.5ms. (C): 3.5B/50G=70ms. All BW-bound (AI=4
    FLOPs/byte << ridge). Summary: for decode at batch=1, LLMs are always BW-bound on mobile. The only
    way to improve TPOT is to: (1) reduce model size, (2) increase memory bandwidth, (3) increase batch
    size to become compute-bound (impractical on device).'
