title: The Jittery AI Coach
scenario: 'You''re a senior engineer on a mobile team launching a ''Real-time AI Coach'' for a game. The
  app streams gameplay video to a cloud backend for analysis. Your P99 round-trip latency SLO is 250ms.
  In production, however, latency is highly variable: sometimes it''s 140ms, but other times it spikes
  to over 800ms.'
details:
  realistic_solution: 'The latency jitter is caused by the two different server types having fundamentally
    different data paths from the network card to the GPU. The older servers require the CPU to manage
    the data transfer: the data is copied from the NIC to host (CPU) RAM, and then a separate command
    copies it from host RAM to GPU memory. This ''bounce buffer'' path involves the OS kernel. If the
    CPU or OS scheduler is busy with other tasks, the data transfer for your app gets delayed, introducing
    massive, unpredictable jitter.'
  common_mistake: Engineers often focus only on peak bandwidth (e.g., 'InfiniBand is faster than Ethernet')
    and forget that latency and, more importantly, *jitter* are often caused by the data path, not just
    the transport medium. Involving the CPU and OS kernel in a high-performance data path puts the transfer
    at the mercy of the system scheduler, which is the primary source of unpredictable delays.
  napkin_math: '**Slow Path (Kernel-Involved on Older Server):**

    1. NIC → Host RAM (DMA): ~5 μs.

    2. Kernel processing (context switch, copy): 10–50 μs typical, but under load can spike to 1–5 ms
    due to scheduler jitter.

    3. Host RAM → GPU (PCIe DMA): ~10 μs for small payloads.

    4. Total baseline: ~25–65 μs, but P99 with OS jitter: 5–50 ms.


    **Fast Path (RDMA/GPUDirect on Newer Server):**

    1. NIC → GPU RAM (direct, zero-copy): ~2–5 μs.

    2. No kernel involvement, no scheduler jitter.

    3. Total: ~5 μs, P99 ≈ P50 (nearly deterministic).


    **Observed behavior:** When request hits new server → ~140ms total (network RTT + fast path). When
    request hits old server → ~800ms (network RTT + slow path with jitter spike). The bimodal distribution
    directly maps to the two server types.'
  options:
  - The older servers have a slower PCIe generation bus, which is bottlenecking the data transfer from
    the NIC to the GPU.
  - InfiniBand has much higher bandwidth than 100GbE, so the newer servers can simply receive the data
    faster.
  - The older servers lack GPUDirect RDMA (Kernel Bypass), so data copies are subject to CPU/OS scheduling
    jitter, while the new servers write data directly from the NIC to GPU memory.
  - The mobile app is sending data in a bursty pattern, causing TCP congestion and bufferbloat on the
    older servers.
  correct_index: 2
