title: Mobile INT4 Metadata Budget
scenario: A mobile team is evaluating a 6B-parameter INT4 model. Group-wise quantization stores one 2-byte scale per 128 weights.
question: What is the total memory footprint of a 6B-parameter INT4 model including its scale metadata?
details:
  realistic_solution: |
    INT4 weights use 0.5 bytes per parameter. Scale metadata must be added to the base parameter size to get the true deployment footprint.
  common_mistake: |
    **The Pitfall:** Ignoring the memory footprint of quantization metadata.
    **The Rationale:** Candidates focus solely on the 4-bit parameter size, forgetting that group-wise quantization requires storing additional scale and zero-point parameters.
    **The Consequence:** The estimated model size will be too low, potentially leading to unexpected out-of-memory errors on edge devices.
  napkin_math: |
    **Assumptions & Constraints:**
    - Parameters: 6 Billion.
    - Precision: INT4 (0.5 bytes/param).
    - Metadata: 2 bytes per 128 weights.

    **Calculations:**
    - Weight Size: 6B * 0.5 bytes = 3.0 GB.
    - Metadata Groups: 6B / 128 = 46.875 million groups.
    - Metadata Size: 46.875M * 2 bytes = 93.75 MB.
    - Total Size: 3.0 GB + 0.09375 GB = ~3.09 GB.

    **Conclusion & Interpretation:**
    - **Result: Metadata Bloat.** The group-wise scale metadata adds ~94MB to the base 3.0GB footprint, which must be accounted for in tight memory budgets.
