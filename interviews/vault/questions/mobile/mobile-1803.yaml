title: Mobile INT4 Metadata Budget
scenario: A high-end mobile team is evaluating a 6B-parameter INT4 model for devices
  with large unified memory. Group-wise quantization stores one 2-byte scale per 128
  weights. Estimate weight bytes, metadata bytes, and total size before deciding whether
  the model is realistic for target devices.
question: What is the total size of a 6B-parameter INT4 model with one 2-byte scale
  per 128 weights?
details:
  realistic_solution: INT4 weights use 0.5 bytes per parameter, or 3.0 GB. Scale metadata
    uses 6B/128 groups x 2 bytes = 93.75 MB. Total is about 3.09 GB before other metadata.
  common_mistake: Counting only 4-bit weights and ignoring scale metadata.
  napkin_math: Weights = 6B x 0.5 B = 3.0 GB. Scales = 6B/128 x 2 B = 93.75 MB. Total
    ≈ 3.09 GB.
