title: Mobile INT4 Metadata Budget
scenario: A mobile team is evaluating a 6B-parameter INT4 model for devices with large unified memory. Group-wise quantization stores one 2-byte scale per 128 weights.
question: What is the total memory footprint of a 6B-parameter INT4 model including its scale metadata?
details:
  realistic_solution: INT4 weights use 0.5 bytes per parameter, or 3.0 GB. Scale metadata uses 6B/128 groups x 2 bytes = 93.75 MB. Total is about 3.09 GB before other metadata.
  common_mistake: |
    **The Pitfall:** Ignoring the memory footprint of quantization metadata.
    **The Rationale:** Candidates focus solely on the 4-bit parameter size, forgetting that group-wise quantization requires storing additional scale and zero-point parameters.
    **The Consequence:** The estimated model size will be too low, potentially leading to unexpected out-of-memory errors on edge devices.
  napkin_math: |
    1. Calculate weight size: 6B parameters * 0.5 bytes/param = **3.0 GB**.
    2. Calculate number of groups: 6B / 128 = 46.875 million groups.
    3. Calculate metadata size: 46.875M groups * 2 bytes/group = **93.75 MB**.
    4. Calculate total size: 3.0 GB + 93.75 MB = **~3.09 GB**.
