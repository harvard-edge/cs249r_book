title: The On-Device LLM System Design
scenario: Design the complete system architecture for running a 3B parameter LLM on a phone with 8 GB RAM. The model must generate ≥20 tokens/second with 2048 context length.
question: How would you architect memory, inference, and UX to run a 3B parameter LLM at ≥20 tokens/sec on an 8GB phone?
details:
  realistic_solution: 'Four-layer architecture: (1) Storage: INT4 weights on flash (1.5 GB), loaded on
    demand. (2) Memory: weight streaming with 200 MB resident window, KV-cache (INT8 + GQA) at 67 MB,
    100 MB activation buffer. Total: 417 MB resident. (3) Compute: prefill 512 tokens in 44ms on NPU,
    decode at 19.5ms/token (51 tok/s) via memory-bandwidth-bound streaming. (4) UX: speculative decoding
    for perceived speed, background eviction on app switch with KV-cache serialized to flash for instant
    resume. Battery: 6J per 100-token response (0.01% of battery). Ship model as a separate download,
    not in the app bundle.'
  common_mistake: |
    **The Pitfall:** Loading the entire model into RAM and ignoring the KV cache.
    **The Rationale:** Candidates focus solely on INT4 weight quantization but fail to design a streaming architecture or address what happens during app switching.
    **The Consequence:** The app consumes too much resident memory, getting instantly killed by the OS when the user switches to a messaging app.
  napkin_math: |
    - **Model Footprint:** 3B params (INT4) = 1.5 GB on flash, ~200 MB streamed into resident RAM.
    - **KV Cache (INT8 + GQA):** ~67 MB.
    - **Activation/Runtime:** ~150 MB. Total Resident RAM = ~417 MB.
    - **Decode Speed:** 1.5 GB weights / 100 GB/s bandwidth = 15 ms/token → ~66 tok/s (exceeds 20 tok/s target).
    - **Result:** The architecture easily fits within 5GB available RAM and achieves **>50 tok/s**.
