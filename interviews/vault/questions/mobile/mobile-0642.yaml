title: The On-Device LLM System Design
scenario: Design the complete system architecture for running a 3B parameter LLM on a phone with 8 GB
  RAM. Cover memory management, inference pipeline, context handling, and user experience. The model must
  generate tokens at ≥20 tokens/second with 2048 context length.
details:
  realistic_solution: 'Four-layer architecture: (1) Storage: INT4 weights on flash (1.5 GB), loaded on
    demand. (2) Memory: weight streaming with 200 MB resident window, KV-cache (INT8 + GQA) at 67 MB,
    100 MB activation buffer. Total: 417 MB resident. (3) Compute: prefill 512 tokens in 44ms on NPU,
    decode at 19.5ms/token (51 tok/s) via memory-bandwidth-bound streaming. (4) UX: speculative decoding
    for perceived speed, background eviction on app switch with KV-cache serialized to flash for instant
    resume. Battery: 6J per 100-token response (0.01% of battery). Ship model as a separate download,
    not in the app bundle.'
  common_mistake: '"Quantize to INT4 and load the whole model into RAM." INT4 gets the weights to 1.5
    GB, but you haven''t addressed the KV-cache, the inference pipeline, or what happens when the user
    switches to another app.'
  napkin_math: 'Weights (INT4): 1.5 GB on flash, ~200 MB resident. KV-cache (INT8 + GQA): 67 MB. Activations:
    100 MB. Runtime: 50 MB. Total resident: **417 MB** (fits in 5 GB available). Prefill 512 tokens: 44ms.
    Decode: 19.5ms/token → 51 tok/s ✓. Battery per 100-token response: 2s × 3W = 6J = 0.01% of 12.8 Wh
    battery. App size: 1.5 GB model downloaded separately, not in bundle.'
