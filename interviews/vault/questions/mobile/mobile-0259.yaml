title: The 'Instant Reply' Metric
scenario: You're designing a 'smart reply' feature for a mobile chat app. The feature uses an on-device
  model to generate and stream suggestions word-by-word as the user receives a message. For the user to
  perceive the suggestion as 'instantaneous', what key metric must be minimized, and what is its approximate
  target value?
question: "For the user to perceive the suggestion as 'instantaneous', what key metric must be minimized, and what is its approximate target value?"
details:
  realistic_solution: The key metric is Time To First Token (TTFT). This measures the delay from the triggering
    event (e.g., message received) to the appearance of the first generated token. A common industry target
    for 'instantaneous' perception in Human-Computer Interaction (HCI) is around 100ms.
  common_mistake: Confusing initial response latency (TTFT) with rendering deadlines (frame budget) or
    streaming speed (TPOT/throughput). Many engineers focus on overall tokens/second, but for real-time
    interaction, the time until the *first* piece of feedback appears is what makes an app feel responsive
    or laggy.
  napkin_math: This is a question of human perception, not just hardware. A typical human blink takes
    ~300ms. The widely accepted threshold for an action to feel 'instant' is under 100ms. Your entire
    system—from UI event to model inference to rendering the first token—must fit within this budget.
  options:
  - Time Per Output Token (TPOT), targeting ~50ms
  - Frame Rendering Latency, targeting ~16ms
  - Time To First Token (TTFT), targeting ~100ms
  - Throughput, targeting >20 tokens/second
