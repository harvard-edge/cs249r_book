title: The 'Instant Reply' Metric
scenario: You're designing a 'smart reply' feature for a mobile chat app. The feature uses an on-device model to generate and stream suggestions word-by-word as the user receives a message.
question: For the user to perceive the suggestion as 'instantaneous', what key metric must be minimized, and what is its approximate target value?
details:
  realistic_solution: The key metric is Time To First Token (TTFT). This measures the delay from the triggering event (e.g., message received) to the appearance of the first generated token. A common industry target for 'instantaneous' perception in Human-Computer Interaction (HCI) is around 100ms.
  common_mistake: |
    **The Pitfall:** Confusing initial response latency with rendering deadlines or streaming speed.
    **The Rationale:** Engineers often focus on overall throughput (tokens/second) instead of the delay until the first piece of feedback appears.
    **The Consequence:** The app feels sluggish and unresponsive to the user, even if the total generation is fast.
  napkin_math: |
    1. Assumptions & Constraints:
       - Human perception of instantaneous feedback: < 100ms.
       - Human blink duration: ~300ms.
    2. Calculations:
       - Total permissible latency (UI event + inference + render) = 100ms.
    3. Conclusion & Interpretation:
       - **Result: Time To First Token (TTFT) must be < 100ms (Latency-Bound).**
  options:
  - Time Per Output Token (TPOT), targeting ~50ms
  - Frame Rendering Latency, targeting ~16ms
  - Time To First Token (TTFT), targeting ~100ms
  - Throughput, targeting >20 tokens/second
