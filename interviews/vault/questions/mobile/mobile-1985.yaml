title: A17 Pro Unified Memory Limit
scenario: An NPU runs a local 3B LLM in 4-bit quantization. The mobile OS limits the app to 4 GB of Unified RAM. The weights consume 1.5 GB.
question: If each token in the KV cache requires 1 MB of memory, what is the maximum context length supported?
details:
  realistic_solution: Available memory for the app = 4 GB (4000 MB). Weights take 1.5 GB (1500 MB). Remaining memory for KV cache = 4000 - 1500 = 2500 MB. Max context length = 2500 MB / 1 MB/token = 2500 tokens.
  common_mistake: |
    **The Pitfall:** Calculating against total hardware RAM instead of the OS app limit.
    **The Rationale:** Candidates often use the phone's total 8 GB spec sheet number to calculate the cache size.
    **The Consequence:** The application will request a 6500-token context window and be immediately killed by the OS Out-Of-Memory (OOM) manager.
  napkin_math: |
    1. Identify app memory budget: 4 GB = 4000 MB.
    2. Subtract model weights: 4000 MB - 1500 MB = 2500 MB.
    3. Calculate max tokens: 2500 MB / 1 MB/token = **2500 tokens**.
