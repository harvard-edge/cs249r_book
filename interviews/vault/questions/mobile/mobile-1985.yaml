title: A17 Pro Unified Memory Limit
scenario: An Apple A17 Pro runs a local 3B LLM in 4-bit quantization. The phone limits
  the app to 4 GB of Unified RAM. The weights take 1.5 GB.
question: If each token in the KV cache requires 1 MB of memory, what is the maximum
  context length supported?
visual:
  kind: svg
  path: mobile-1985.svg
  alt: Stacked bar showing 1.5GB Weights and 2.5GB KV cache fitting into 4GB.
  caption: Unified memory allocation for Edge LLM.
details:
  realistic_solution: Available memory for the app = 4 GB (4000 MB). Weights take
    1.5 GB (1500 MB). Remaining memory for KV cache = 4000 - 1500 = 2500 MB. Max context
    length = 2500 MB / 1 MB/token = 2500 tokens.
  common_mistake: Using the phone's total hardware RAM (e.g., 8GB) instead of the
    4GB OS-imposed application limit.
  napkin_math: (4000 - 1500) / 1 = 2500 tokens
