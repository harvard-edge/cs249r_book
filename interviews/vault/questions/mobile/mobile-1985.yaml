title: A17 Pro Unified Memory Limit
scenario: An NPU runs a local 3B LLM in 4-bit quantization. The mobile OS limits the app to 4 GB of Unified RAM. The weights consume 1.5 GB.
question: If each token in the KV cache requires 1 MB of memory, what is the maximum context length supported?
details:
  realistic_solution: Available memory for the app is 4 GB (4000 MB). Subtracting the 1.5 GB weight footprint leaves 2.5 GB for the KV cache. Max context length is 2500 tokens.
  common_mistake: |
    **The Pitfall:** Calculating against total hardware RAM instead of the OS app limit.
    **The Rationale:** Candidates often use the phone's total 8 GB spec sheet number to calculate the cache size.
    **The Consequence:** The application requests a 6500-token context window and is immediately killed by the OS Out-Of-Memory (OOM) manager.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - OS app memory budget: 4 GB (4000 MB).
       - Model weights size: 1.5 GB (1500 MB).
       - KV cache size per token: 1 MB.
    2. **Calculations:**
       - Memory available for KV cache: 4000 MB - 1500 MB = 2500 MB.
       - Max tokens: 2500 MB / 1 MB/token = 2500 tokens.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound 2500 Token Context Limit**. Exceeding this limit causes an OS OOM kill.
