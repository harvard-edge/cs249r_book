title: Evaluate depthwise separable vs standard conv for on-device training on Snapdragon 8 Gen 3
scenario: You are designing an on-device personalization system that fine-tunes the last 3 MBConv blocks
  of MobileNetV3 on A17 Pro (35 TOPS, 8GB RAM) using 50 labeled images per class. Evaluate whether depthwise
  separable convolutions or standard convolutions in these final blocks better balance training speed
  and accuracy for on-device learning.
details:
  realistic_solution: 'Attention FLOPs at 96×96 with 14 heads: 2×96²×14² = 3.6M. Expansion conv 960→1280
    at 7×7: 2×960×1280×49 = 120M FLOPs.'
  common_mistake: Assuming on-device training follows the same compute/memory tradeoffs as cloud training;
    ignoring that backpropagation through depthwise layers on ANE is not natively supported and falls
    back to CPU, making depthwise backward passes 10× slower than forward on A17 Pro.
  napkin_math: 'Attention FLOPs: standard 3×3 conv at resolution 96×96×14 heads: 2×96²×14² = 2×9216×196
    = 3,612,672 ≈ 3.6M FLOPs. For expansion at 960 channels: 2×960×1280×7² = 2×960×1280×49 = 120,422,400
    ≈ 120M FLOPs.'
