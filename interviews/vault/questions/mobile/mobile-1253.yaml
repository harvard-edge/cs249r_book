title: Architecting ASIL-B Driver Monitoring on Hexagon NPU
scenario: You are designing an ASIL-B certified driver monitoring system running on a Qualcomm Hexagon NPU (Snapdragon 8 Gen 3). The NPU provides 45 TOPS of INT8 compute and shares a 12 GB LPDDR5X memory pool with the heterogeneous CPU and GPU.
question: How would you architect the system to ensure deterministic execution, detailing memory isolation, watchdogs, and fallback if the NPU hangs?
details:
  realistic_solution: The architecture should utilize the SMMU to carve out a dedicated, isolated memory partition for the Hexagon NPU within the shared LPDDR5X. A hardware watchdog timer running on a secure RTOS island must monitor an NPU heartbeat. If the watchdog trips due to a hang, the system should instantly fail over to a lightweight, pre-loaded fallback model running on the CPU.
  common_mistake: |
    **The Pitfall:** Relying on standard OS-level software watchdogs and ignoring LPDDR5X bus contention.
    **The Rationale:** Engineers accustomed to non-safety-critical mobile apps assume the OS will handle hangs and memory scheduling efficiently.
    **The Consequence:** Unpredictable memory contention from the GPU/CPU can violate deterministic execution deadlines, and OS-level watchdogs are too slow to trigger fallbacks in time for ASIL-B requirements.
  napkin_math: |
    1. **Safety Deadline:** For a 30 FPS system, the deadline is 33.3ms per frame.
    2. **NPU Compute Time:** A 15 GOPS INT8 model on 45 TOPS NPU = 15 / 45000 = 0.33ms.
    3. **Contention Overhead:** Allocating 5ms for worst-case shared LPDDR5X contention yields 5.33ms nominal latency.
    4. **Watchdog Configuration:** Setting the hardware watchdog at 15ms allows for NPU latency variations.
    5. **Fallback Budget:** If the watchdog trips at 15ms, the remaining budget is 33.3ms - 15ms = 18.3ms.
    **The CPU fallback model must execute in under 18.3ms to maintain the ASIL-B deadline.**
