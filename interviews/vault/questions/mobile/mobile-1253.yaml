title: Architecting ASIL-B Driver Monitoring on Hexagon NPU
scenario: 'You are designing an ASIL-B certified driver monitoring system running on a mobile NPU. The NPU shares an LPDDR5X memory pool with the heterogeneous CPU and GPU.'
question: 'How would you architect the system to ensure deterministic execution, detailing memory isolation, watchdogs, and fallback if the NPU hangs?'
details:
  realistic_solution: 'The architecture should utilize the SMMU to carve out a dedicated, isolated memory partition for the NPU within the shared LPDDR5X. A hardware watchdog timer running on a secure RTOS island must monitor an NPU heartbeat. If the watchdog trips due to a hang, the system should instantly fail over to a lightweight, pre-loaded fallback model running on the CPU.'
  common_mistake: |
    **The Pitfall:** Relying on standard OS-level software watchdogs and ignoring LPDDR5X bus contention.
    **The Rationale:** Engineers accustomed to non-safety-critical mobile apps assume the OS will handle hangs and memory scheduling efficiently.
    **The Consequence:** Unpredictable memory contention from the GPU/CPU can violate deterministic execution deadlines, and OS-level watchdogs are too slow to trigger fallbacks in time for ASIL-B requirements.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Safety Deadline: 33.3ms per frame (30 FPS system).
       - NPU Specs: 45 TOPS INT8.
       - Model: 15 GOPS INT8 workload.
       - LPDDR5X Contention: Up to 5ms delay.
       - Watchdog Trigger: 15ms.
    2. **Calculations:**
       - NPU Compute Time: 15 GOPS / 45,000 GOPS = 0.33ms.
       - Nominal Latency (with contention): 0.33ms + 5ms = 5.33ms.
       - Fallback Budget: 33.3ms (Deadline) - 15ms (Watchdog) = 18.3ms.
    3. **Conclusion & Interpretation:**
       **Result: Deterministic Deadline-Bound.** The CPU fallback model must execute in under **18.3ms** to strictly maintain the ASIL-B frame deadline after an NPU hang.
