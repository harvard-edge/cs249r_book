title: 'Network Bandwidth Bottlenecks: Optimize LLM TPOT via Weight Quantization on A17 Pro'
scenario: A 3B FP16 LLM (6GB) shows TPOT=88ms on A17 Pro (68 GB/s Neural Engine). Target is TPOT < 30ms. Evaluate three quantization strategies: (A) INT8 weight-only, (B) INT4 weight-only, (C) INT4 + INT4 KV-cache.
question: Which quantization strategy gets a 3B FP16 LLM on A17 Pro from 88 ms TPOT to under 30 ms?
details:
  realistic_solution: 'FP16 baseline: 6GB / 68GB/s = 88.2ms. (A) INT8: 3GB / 68 = 44.1ms. Still > 30ms. (B) INT4: 1.5GB / 68 = 22.1ms ✓. Accuracy: GPTQ INT4 3B: ~0.5% MMLU drop. (C) INT4 + INT4 KV: KV for 1 token is tiny vs weights. KV (3B, 32 layers, 32 heads, 128 dim, 1 token): 2×32×128×2B×32=524KB FP16. INT4 KV: 262KB. Saved: 262KB per token. Weight BW dominates (1.5GB >> 262KB). Total (C): 1.5GB+0.262MB/68=22.1ms (negligible KV gain). Recommendation: INT4 weight-only (B) sufficient, KV quantization unnecessary.'
  common_mistake: |
    **The Pitfall:** Assuming INT4 KV-cache halves TPOT alongside INT4 weights.
    **The Rationale:** Engineers assume KV-cache size affects decoding speed as heavily as weight size.
    **The Consequence:** They invest heavily in complex KV-cache quantization logic for a mathematically negligible (0.1ms) speedup in single-batch decoding.
  napkin_math: |
    1. **FP16 Baseline:** 6GB / 68 GB/s = 88.2ms.
    2. **(A) INT8 Weights:** 3GB / 68 GB/s = 44.1ms (>30ms target).
    3. **(B) INT4 Weights:** 1.5GB / 68 GB/s = 22.1ms (Meets <30ms target).
    4. **(C) INT4 + INT4 KV-Cache:** KV per token (seq=1) = 32*2*32*128*2B = 524KB. INT4 saves 262KB.
    5. **Total Read Time (C):** (1.5GB + 0.262MB) / 68 GB/s = 22.1ms.
    **INT4 weight-only is sufficient; INT4 KV-cache offers negligible TPOT improvement per token.**
