title: 'Network Bandwidth Bottlenecks: Optimize LLM TPOT via Weight Quantization on A17 Pro'
scenario: 'A 3B FP16 LLM shows TPOT=88ms. Target is TPOT < 30ms. Evaluate three quantization strategies: (A) INT8 weight-only, (B) INT4 weight-only, (C) INT4 + INT4 KV-cache.'
question: Which quantization strategy gets a 3B FP16 LLM on A17 Pro from 88 ms TPOT to under 30 ms?
details:
  realistic_solution: Strategy B (INT4 weight-only) is the optimal path. Generative decoding on mobile is strictly bounded by memory bandwidth. Moving from FP16 to INT4 halves the weight footprint again compared to INT8, cleanly clearing the <30ms target. Furthermore, quantizing the KV cache to INT4 offers a mathematically negligible performance gain for single-batch mobile decoding, making the immense engineering complexity of Strategy C unjustifiable.
  common_mistake: |
    **The Pitfall:** Assuming INT4 KV-cache quantization provides a proportional TPOT speedup alongside INT4 weight quantization.
    **The Rationale:** Engineers assume KV-cache size dictates decoding latency equally heavily as the primary weight matrices.
    **The Consequence:** Teams invest massively in complex KV-cache quantization kernels for a completely negligible (fractions of a millisecond) speedup per token during single-batch mobile generation.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Hardware: 68 GB/s effective memory bandwidth.
       - Model size: 3B parameters (FP16 = 6 GB, INT8 = 3 GB, INT4 = 1.5 GB).
       - Target TPOT: < 30 ms.
    2. **Calculations:**
       - FP16 TPOT: 6 GB / 68 GB/s = 88.2 ms.
       - (A) INT8 Weights: 3 GB / 68 GB/s = 44.1 ms.
       - (B) INT4 Weights: 1.5 GB / 68 GB/s = 22.1 ms.
       - KV Cache Baseline (FP16): 32 layers * 32 heads * 128 dim * 2 bytes * 2 (K/V) = 524 KB.
       - (C) KV Cache savings (INT4): 524 KB - 262 KB = 262 KB.
       - (C) Total TPOT: (1.5 GB + 0.262 MB) / 68 GB/s = 22.1 ms.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound.** INT4 weight-only quantization trivially achieves the < 30ms target. Because the KV payload per token is tiny, KV quantization yields << 0.1ms speedup, making Strategy B sufficient.
