title: 'Realize Mobile LLM Realization: Llama 3.2 1B Deployment on A17 Pro'
scenario: 'You are realizing the deployment of Llama 3.2 1B (INT4, 600MB) on A17 Pro Neural Engine (35 TOPS, 68.25 GB/s LPDDR5). Target: <100ms TTFT for 256-token prompts, <30ms/token decode, <1.5W power. The model has 16 layers, 8 KV heads, 64 head dimension. Use Core ML for NPU mapping. Document the full realization workflow including quantization validation, latency profiling, and power measurement.'
question: What is the correct KV-cache size for the Llama 3.2 1B A17 Pro deployment, and why is the larger estimate wrong?
details:
  realistic_solution: 'KV cache: 16 layers × 2(K+V) × 8 heads × 64 head_dim × 256 context × 2B = 8.4MB (not 67MB which is often mistakenly calculated by assuming 32 layers and 32 KV heads like larger models).'
  common_mistake: Skipping quantization validation before deployment; INT4 quantized models can have significant accuracy degradation on specific task domains that isn't captured by perplexity alone. Another mistake is calculating KV cache using standard Llama-2 7B dimensions instead of the specific 1B mobile dimensions.
  napkin_math: 'KV cache: 16 layers, 8 KV heads (GQA), head_dim=64, context=256, fp16. Calculation: 16 layers × 2 (K+V) × 8 KV heads × 64 dim × 256 context × 2 bytes = 8,388,608 bytes ≈ 8.4 MB (not 67MB). A 7B model would have 32 layers and 32 KV heads, which would yield 32 × 2 × 32 × 128 × 256 × 2 = 134 MB, so adapting from larger models without checking layer counts leads to massive errors.'
