title: 'Realize Mobile LLM Realization: Llama 3.2 1B Deployment on A17 Pro'
scenario: 'You are realizing the deployment of Llama 3.2 1B (INT4) on an NPU. Target: <100ms TTFT for 256-token prompts, <30ms/token decode, <1.5W power. The model has 16 layers, 8 KV heads, 64 head dimension. Use Core ML for NPU mapping.'
question: 'What is the correct KV-cache size for the Llama 3.2 1B deployment, and why is the larger estimate wrong?'
details:
  realistic_solution: 'Calculate strictly from the 1B layer dimensions. 16 layers × 2(K,V) × 8 heads × 64 dim × 256 context × 2B = 8.4MB. Do not inherit dimensions from 7B variants.'
  common_mistake: |
    **The Pitfall:** Reusing dimension assumptions from larger server-class models.
    **The Rationale:** Candidates memorize 7B model dimensions (32 layers, 32 heads) and blindly apply them to mobile parameter configurations.
    **The Consequence:** Overallocating memory by nearly 10x, leading to unnecessary fragmentation and rejected deployments.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Mobile Dimensions: 16 layers, 8 KV heads (GQA), head_dim=64, context=256, FP16 precision.
       - Server Baseline (7B): 32 layers, 32 KV heads, head_dim=128, context=256, FP16 precision.
    2. **Calculations:**
       - Correct KV Calculation: 16 × 2(K+V) × 8 × 64 × 256 × 2 bytes = 8,388,608 bytes = 8.4 MB.
       - Wrong 7B Baseline: 32 × 2(K+V) × 32 × 128 × 256 × 2 bytes = 134,217,728 bytes = 134 MB.
    3. **Conclusion & Interpretation:**
       **Result: Memory Over-allocation.** Reusing 7B parameter dimensions causes nearly a 10x overestimation of the KV cache memory footprint (134 MB vs 8.4 MB).
