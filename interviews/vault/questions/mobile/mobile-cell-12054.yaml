title: 'Model Format Conversion: Compare TFLite vs. CoreML for Cross-Platform Mobile Deployment'
scenario: A team trains a single MobileNetV3-Large (5.4M params, 219M MACs) in TensorFlow and needs to
  deploy on both iOS (A17 Pro, 35 TOPS) and Android (Snapdragon 8 Gen 3, 45 TOPS). Compare the conversion
  path TF → TFLite → CoreML (via converter) vs. TF → ONNX → CoreML for iOS, keeping TFLite for Android.
question: "Should TensorFlow MobileNetV3 deploy to iOS through TFLite-to-CoreML conversion or ONNX-to-CoreML?"
details:
  realistic_solution: 'Path A (TFLite→CoreML): TFLite model converted via coremltools.converters.libsvm
    (deprecated path) or via TFLite→ONNX→CoreML. Multiple conversions introduce op mismatches. iOS performance:
    CoreML delegate in TFLite ≈ 70% of native CoreML speed. Path B (ONNX→CoreML for iOS, TFLite for Android):
    2 models to maintain. iOS performance: native CoreML ~100%. Android TFLite with NNAPI: 80% of native.
    Recommendation: Path B for max performance; Path A if single-codebase is required.'
  common_mistake: Assuming TFLite can run natively on iOS Neural Engine; TFLite uses CoreML delegate on
    iOS which adds conversion overhead and may not support all op fusions available to native CoreML.
  napkin_math: 'MobileNetV3-Large: 219M MACs = 438M FLOPs. Native CoreML on A17 Pro Neural Engine: 438M/35T
    = 12.5μs + 0.5ms overhead = ~0.5ms. TFLite with CoreML delegate: ~0.7ms (30% overhead). TFLite NNAPI
    on Snapdragon: 438M/45T = 9.7μs + 3ms NNAPI overhead = ~3ms. Path B: iOS 0.5ms + Android 3ms. Path
    A: iOS 0.7ms + Android 3ms. Performance difference small; maintenance cost dominates.'
