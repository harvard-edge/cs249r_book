validation_issues:
- The distinction between GFLOPs (floating-point) and TOPS (often integer) could be clearer when calculating
  Arithmetic Intensity and ridge point.
- The phrase 'uses 50% less RAM' is imprecise; 'requires 50% less memory traffic' would be more accurate
  for memory-bound workloads.
