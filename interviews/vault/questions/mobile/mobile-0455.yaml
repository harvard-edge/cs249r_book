title: 'The Live Filter Battery Drain: Roofline Analysis'
scenario: You are an ML engineer at a social media company developing a new real-time video filter for the mobile app.
question: "Which live-filter model is more energy efficient on the NPU, and how does arithmetic intensity justify it?"
details:
  realistic_solution: The Stream-CNN is the more energy-efficient choice. A model's efficiency isn't just about raw operations, but about its Arithmetic Intensity (AI) relative to the hardware's capabilities. The A17 Pro's ANE is a powerful compute engine, but it's only efficient if fed data at a rate that keeps it busy. The UNet-Lite is memory-bound; its low AI means the ANE will constantly stall waiting for data, wasting power. The Stream-CNN is compute-bound; its high AI allows it to saturate the ANE's compute units, achieving higher sustained performance-per-watt (TOPS/W).
  common_mistake: |
    **The Pitfall:** Assuming the model with the highest theoretical G-ops count is always the fastest or least efficient.
    **The Rationale:** Engineers ignore memory bottlenecks and Arithmetic Intensity, failing to realize that idle compute units waiting for RAM consume massive amounts of static power.
    **The Consequence:** Deploying memory-bound models that waste power and drain the battery while failing to utilize the NPU's potential.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Hardware Ridge Point: 35 TOPS / 50 GB/s = 700 Ops/Byte.
       - Model A (Stream-CNN): 200 GFLOPs, 500 MB traffic.
       - Model B (UNet-Lite): 100 GFLOPs, 1 GB traffic.
    2. **Calculations:**
       - Model A Arithmetic Intensity: 200 * 10^9 / (500 * 10^6) = 400 Ops/Byte.
       - Model B Arithmetic Intensity: 100 * 10^9 / 10^9 = 100 Ops/Byte.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound**
       - Both models fall below the 700 Ops/Byte ridge point. Model A is significantly more efficient because it requires 50% less memory traffic, reducing power wasted on LPDDR5 transfers.
  options:
  - The UNet-Lite, because its higher G-ops count means it will finish faster.
  - The UNet-Lite, because it has a lower arithmetic intensity, which is better for mobile GPUs.
  - The Stream-CNN, because its high arithmetic intensity makes it compute-bound, leading to better energy utilization on the ANE.
  - Neither, the bottleneck is the phone's LPDDR5 memory bandwidth, so performance will be identical.
  correct_index: 2
