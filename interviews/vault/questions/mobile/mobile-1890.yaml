title: NPU-to-CPU Fallback Limit
scenario: A mobile SoC routes inference tasks to its NPU. When the NPU system contains 5 or more tasks (one in service, four queued), the next arrival is diverted to the slower CPU. NPU service rate mu = 20 tasks/s, arrival rate lambda = 15 tasks/s, Poisson arrivals and exponential service times.
question: Apply the M/M/1 infinite-queue tail approximation to estimate the fraction of arrivals routed to the CPU, and note where this approximation overestimates versus the exact M/M/1/5 blocking formula.
visual:
  kind: svg
  path: mobile-1890.svg
  alt: Line graph showing the 23.7% tail of the probability distribution above N=5.
  caption: Probability of CPU Fallback.
details:
  realistic_solution: |
    Applying the infinite-queue tail probability P(N >= 5) yields ~23.7% of tasks diverted. However, the exact M/M/1/5 blocking probability is only ~7.2%. The infinite-queue approximation is highly conservative because it fails to account for the truncated system state where blocked arrivals are completely excluded from the long-run distribution.
  common_mistake: |
    **The Pitfall:** Reporting rho^5 as the exact blocking probability.
    **The Rationale:** Candidates blindly apply the unconstrained M/M/1 tail formula without adjusting for the finite queue state space (M/M/1/K).
    **The Consequence:** Over-provisioning CPU resources by 3x because the fallback rate is drastically overestimated.
  napkin_math: |
    **Assumptions & Constraints:**
    - Lambda (arrival): 15 tasks/s.
    - Mu (service): 20 tasks/s.
    - Rho (utilization): 15 / 20 = 0.75.
    - Queue capacity (K): 5.

    **Calculations:**
    - Infinite-queue tail approx: P(N >= 5) = rho^5 = (0.75)^5 = 0.2373 (~23.7%).
    - Exact M/M/1/5 blocking (P_5): ((1 - rho) * rho^5) / (1 - rho^6).
    - P_5 = (0.25 * 0.2373) / (1 - 0.178) = 0.0593 / 0.822 = 0.0721 (~7.2%).

    **Conclusion & Interpretation:**
    - **Result: ~3x Overestimation (Queueing Delay)**. The approximation overestimates the 7.2% actual fallback rate by ~3x.
