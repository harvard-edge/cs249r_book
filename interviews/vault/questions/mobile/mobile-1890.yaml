title: NPU-to-CPU Fallback Limit
scenario: A Snapdragon 8 Gen 3 routes inference tasks to its NPU. When the NPU queue
  exceeds 5 tasks, it falls back to the slower CPU. NPU service rate is 20 tasks/s,
  arrival rate is 15 tasks/s.
question: Apply the M/M/1 queue model to find the fraction of tasks that will be routed
  to the slower CPU.
visual:
  kind: svg
  path: mobile-1890.svg
  alt: Line graph showing the 23.7% tail of the probability distribution above N=5.
  caption: Probability of CPU Fallback.
details:
  realistic_solution: Utilization $\rho = 15 / 20 = 0.75$. The probability of exactly
    $n$ tasks in the system is $P(n) = (1-\rho)\rho^n$. A task falls back to the CPU
    if it arrives when there are 5 or more tasks in the system. The probability of
    $\ge 5$ tasks is $\rho^5 = 0.75^5 \approx 0.237$. Thus, ~23.7% of tasks will run
    on the CPU.
  common_mistake: Assuming no tasks hit the CPU simply because the average arrival
    rate (15) is less than the service rate (20).
  napkin_math: rho = 15/20 = 0.75. CPU fraction = 0.75^5 = 0.237 = 23.7%.
