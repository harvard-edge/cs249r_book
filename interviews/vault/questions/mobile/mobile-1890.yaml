title: NPU-to-CPU Fallback Limit
scenario: A Snapdragon 8 Gen 3 routes inference tasks to its NPU. When the NPU system
  contains 5 or more tasks (one in service, four queued), the next arrival is diverted
  to the slower CPU. NPU service rate mu = 20 tasks/s, arrival rate lambda = 15 tasks/s,
  Poisson arrivals and exponential service times. Approximate by treating the NPU
  as an unconstrained M/M/1 and using the infinite-queue tail probability P(N >= 5).
question: Apply the M/M/1 infinite-queue tail approximation to estimate the fraction
  of arrivals routed to the CPU. Note where this approximation overestimates versus
  the exact M/M/1/5 blocking formula.
visual:
  kind: svg
  path: mobile-1890.svg
  alt: Line graph showing the 23.7% tail of the probability distribution above N=5.
  caption: Probability of CPU Fallback.
details:
  realistic_solution: 'rho = 15/20 = 0.75. Infinite-queue tail: P(N >= 5) = rho^5
    = 0.237, so ~23.7% of tasks would arrive when N >= 5 in an unconstrained M/M/1
    and be diverted. The exact M/M/1/5 blocking probability P_5 = (1-rho)*rho^5/(1-rho^6)
    = 0.25*0.237/0.822 = 0.072 (~7.2%). The infinite-queue approximation is conservative,
    overestimating the actual diversion rate by ~3x because in a truncated system
    blocked arrivals are excluded from the long-run distribution.'
  common_mistake: Reporting rho^5 as the exact blocking probability instead of the
    infinite-queue tail; or assuming no diversion at all because lambda < mu.
  napkin_math: rho = 0.75; tail approx P(N>=5) = 0.75^5 = 0.237; exact M/M/1/5 P_5
    = (1-0.75)*0.75^5/(1-0.75^6) = 0.072.
