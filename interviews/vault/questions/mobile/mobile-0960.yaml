title: 'KV-Cache: Specification — KV Cache Requirements for Production Mobile LLM App'
scenario: Write the KV cache specification for a production mobile LLM chat app on A17 Pro (35 TOPS, 8GB) serving 10M users. The app supports 3B LLM, 4096-token context.
question: What KV cache memory, quantization, eviction, and recovery requirements should a production A17 Pro chat app specify?
details:
  realistic_solution: 'Each conversation has isolated KV storage. Quantization: INT8 for quality, INT4 for long context. Eviction: background conversations'' KV offloaded to flash. Recovery: KV not persisted (recomputed on resume).'
  common_mistake: |
    **The Pitfall:** Not specifying per-conversation KV isolation or quantization formats.
    **The Rationale:** Treating mobile LLM memory like cloud endpoints without strict per-user boundaries.
    **The Consequence:** Context leakage between chats and severe memory ballooning that crashes the app.
  napkin_math: |
    - 3B INT4 model: 1.5 GB. OS: 2 GB. Framework: 0.5 GB. Remaining RAM: 4.0 GB.
    - Per-conversation KV (INT8): 32 layers * 2 (K/V) * 8 heads * 128 dim * 1 byte * 4096 tokens = 268 MB.
    - Eviction threshold: Background KV to flash when RAM < 1 GB.
    - Recompute cost: (4096 tokens * 3B * 2 FLOPs) / 35 TOPS = ~0.7 seconds.
    - **SLA: Max 268 MB KV per active conversation (INT8), offload to flash in background.**
