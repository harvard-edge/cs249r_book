title: Designing a Safety-Critical ML System on Samsung Exynos 2400 NPU
scenario: You are tasked with designing a safety-critical machine learning system for an autonomous driving feature that will run on an NPU. This system must comply with ASIL B requirements under ISO 26262.
question: How would you architect a safety-critical pedestrian detection system on the NPU to satisfy ISO 26262 ASIL B?
details:
  realistic_solution: Architect a dual-core lockstep system with deterministic execution constraints. Implement rigorous software watchdogs to verify inference completion within the ASIL B time budget, and inject hardware fault tests periodically to validate LPDDR5X ECC integrity.
  common_mistake: |
    **The Pitfall:** Focusing solely on model accuracy while ignoring ISO 26262 requirements.
    **The Rationale:** ML practitioners default to standard accuracy metrics rather than the deterministic redundancy required for automotive safety.
    **The Consequence:** Architecting a model that passes offline benchmarks but fundamentally fails safety certification due to a lack of deterministic execution guarantees.
  napkin_math: |
    **Assumptions & Constraints:**
    - Safety Time Budget: 100 ms fault detection window.
    - Self-Test Requirement: 10 ms per window.
    - Memory Safety: ECC on LPDDR5X adds ~8% bandwidth overhead.

    **Calculations:**
    - Compute Overhead: 10 ms / 100 ms = 10% lost to safety overhead.
    - Effective Bandwidth: 100% - 8% ECC = 92% of peak available.
    - NPU Headroom: 100% - 10% (safety) - 80% (primary inference) = 10% margin.

    **Conclusion & Interpretation:**
    - **Result: 10% compute and 8% bandwidth overhead (Safety-Bound)**. Failure to reserve this headroom results in missed deadlines during diagnostic interrupts.
