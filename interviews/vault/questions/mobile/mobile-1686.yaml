title: Designing a Safety-Critical ML System on Samsung Exynos 2400 NPU
scenario: You are tasked with designing a safety-critical machine learning system for an autonomous driving feature that will run on the Samsung Exynos 2400 NPU (34.7 TOPS, 12 GB LPDDR5X). This system must comply with ASIL B requirements under ISO 26262.
question: How would you architect a safety-critical pedestrian detection system on the Exynos 2400 to satisfy ISO 26262 ASIL B?
details:
  realistic_solution: 'The solution would involve a multi-layered approach:


    1.  **Safety Architecture:** Implement a dual-core lockstep or diverse redundancy architecture for critical NPU operations, if supported, or leverage software redundancy. Employ hardware watchdog timers to monitor the NPU''s responsiveness and overall system health. Utilize the Exynos 2400''s NPU capabilities for primary ML inference, but design robust fallback mechanisms.

    2.  **Deterministic Execution:** Ensure the ML inference pipeline on the NPU is designed for deterministic execution. This involves carefully managing memory access (LPDDR5X, 12GB), NPU scheduling, and interrupt handling to guarantee consistent timing behavior and predictable latency. Implement mechanisms to detect and mitigate non-deterministic behavior.

    3.  **Self-Test Routines:** Integrate comprehensive self-test routines (e.g., power-on self-tests, periodic self-tests) for the NPU, memory (LPDDR5X), and other critical components. These routines should verify the integrity and functionality of the hardware and loaded ML models. Implement runtime checks (e.g., sanity checks on NPU output, input range validation, model integrity checks) to detect anomalies.

    4.  **Error Detection & Handling:** Implement robust error detection codes (ECC) for memory. Design error reporting and fault injection testing for the NPU. Define clear failure modes and safe states for the system. Utilize monitoring mechanisms to detect deviations from expected NPU behavior.

    5.  **Software Safety:** Apply rigorous software development processes aligned with ISO 26262. This includes formal verification of safety-critical code, robust exception handling, and memory protection schemes. The software running on the main CPU (which interacts with the NPU) must also adhere to safety standards.

    6.  **Certification & Validation:** Plan for extensive validation and verification, including fault injection campaigns, hardware-in-the-loop (HIL) testing, and comprehensive safety case documentation to demonstrate compliance with ASIL B for the entire system, including the NPU''s role.'
  common_mistake: |
    **The Pitfall:** Focusing solely on model accuracy while ignoring ISO 26262 requirements.
    **The Rationale:** ML practitioners default to standard accuracy metrics rather than the deterministic redundancy required for automotive safety.
    **The Consequence:** Architecting a model that passes offline benchmarks but fundamentally fails safety certification due to a lack of deterministic execution guarantees.
  napkin_math: |
    *   **Safety Time Budget:** If a 100 ms fault detection window requires a 10 ms self-test, **10%** of compute time is lost to safety overhead.
    *   **Memory Overhead:** Applying ECC to LPDDR5X adds ~8% overhead. Effective bandwidth = **~92% of peak**.
    *   **NPU Headroom:** If inference uses 80% (27.7 TOPS), the remaining 20% must cover all redundancy checks and fallback shadows.
