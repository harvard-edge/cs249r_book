title: CoreML Fallback Penalty on Apple A17 Pro
scenario: A 70 GOPS vision model is converted to CoreML for deployment on the Apple A17 Pro. During profiling, you observe that an unsupported dynamic reshape operator forces the final 10% of the model's operations to fall back to the CPU, which processes them at 1 TOPS.
question: How does a 10% CPU fallback disproportionately degrade latency despite unified memory, and what is the new system throughput?
details:
  realistic_solution: While the unified memory prevents costly PCIe data transfers, the CPU's lower throughput creates a severe compute bottleneck. The ANE quickly completes its operations, but the system stalls waiting for the CPU. The solution is to refactor the model during ONNX-to-CoreML conversion to use static shapes, ensuring 100% ANE operator coverage and fully utilizing the 35 TOPS capacity.
  common_mistake: |
    **The Pitfall:** Assuming unified memory eliminates the penalty of CPU fallback.
    **The Rationale:** Candidates know that shared memory avoids PCIe data copy overhead, but they forget the vast disparity in raw computational throughput.
    **The Consequence:** Leaving dynamic reshapes in the model, causing the high-performance NPU to sit idle while the CPU struggles to finish the final 10% of the graph.
  napkin_math: |
    1. **ANE Portion (90%):** 63 GOPS. Execution time at 35 TOPS = 63 / 35,000 = 1.8 ms.
    2. **CPU Portion (10%):** 7 GOPS. Execution time at 1 TOPS = 7 / 1,000 = 7.0 ms.
    3. **Total Inference Time:** 1.8 ms + 7.0 ms = 8.8 ms.
    4. **Effective Throughput:** 70 GOPS / 8.8 ms = 7.95 TOPS.
    5. **Conclusion:** A mere 10% fallback slashes the system's effective throughput from 35 TOPS to **7.95 TOPS** due to Amdahl's Law.
