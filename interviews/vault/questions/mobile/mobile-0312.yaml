title: The Road Trip Battery Drain
scenario: You're on a long road trip using a new flagship smartphone for an AR navigation app. The app is computationally intensive and keeps the System-on-Chip (SoC) in a high-power state, consuming a continuous 4W. The phone's battery has a total capacity of 19 Watt-hours (Wh).
question: How long can a 19Wh phone run a 4W AR navigation app if it is the only significant power draw?
details:
  realistic_solution: The correct approach is to divide the total energy stored in the battery by the rate of energy consumption (power). The battery stores 19 Wh of energy, and the SoC consumes it at a rate of 4 Watts. Dividing the total energy by the rate of consumption gives the total time the device can operate.
  common_mistake: |
    **The Pitfall:** Confusing the units of power (Watts) and energy (Watt-hours).
    **The Rationale:** Engineers often incorrectly multiply instead of divide, or mistakenly use a peak spec sheet value instead of the continuous thermal load.
    **The Consequence:** Radically misestimating battery life, leading to terrible real-world user experiences during prolonged use.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Battery Capacity: 19 Watt-hours (Wh).
       - Sustained Power Draw: 4 Watts (W).
    2. **Calculations:**
       - Runtime: 19 Wh / 4 W = 4.75 hours.
    3. **Conclusion & Interpretation:** The device can run the app for **4.75 hours** before depletion, demonstrating a strict **Energy-Bound** constraint.
  options:
  - 3.8 hours
  - 76 hours
  - 4.75 hours
  - 0.21 hours
  correct_index: 2
