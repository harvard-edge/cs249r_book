title: The Federated Learning Upload Bill
scenario: You are designing a federated learning system for a mobile keyboard app. Each training round involves 1,000 devices uploading a 50 MB model diff. The system runs 10 rounds per day.
question: How would you calculate the total daily upload bandwidth and explain why naive federated learning is infeasible at scale without compression?
details:
  realistic_solution: '50 MB x 1,000 devices x 10 rounds = 500 GB uploaded per day. At median mobile upload speed of 10 Mbps (1.25 MB/s), each device spends 50/1.25 = 40 seconds per upload. With gradient compression (10-100x), this drops to 5-50 GB/day. Techniques: top-k sparsification, quantized gradients, or sending only significant parameter deltas.'
  common_mistake: |
    **The Pitfall:** Only considering a single device's upload cost (~500 MB/day).
    **The Rationale:** Candidates fail to scale the calculation to the entire network of participating devices.
    **The Consequence:** The system collapses under massive unexpected infrastructure costs and network congestion.
  napkin_math: |
    - Daily upload per device = 50 MB * 10 rounds = 500 MB.
    - Total daily upload = 500 MB * 1,000 devices = 500,000 MB = 500 GB.
    - Upload time per device at 10 Mbps (1.25 MB/s) = 50 MB / 1.25 MB/s = 40 seconds.
    - With 10x compression: Upload size drops to 5 MB per round.
    - **Upload time drops to 4s, and total network bandwidth drops to 50 GB/day.**
