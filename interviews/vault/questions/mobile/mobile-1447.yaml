title: mmap-Driven LLM Streaming on A17 Pro Neural Engine
scenario: "You are deploying a 4-bit quantized 8B parameter LLM onto an iPhone 15 Pro featuring the Apple A17 Pro Neural Engine, which has 8 GB of shared unified memory. The iOS jetsam strictly limits your app's peak residential memory (RSS) to 4 GB, and the product requires a time-to-first-token (TTFT) cold start of under 500ms."
question: "How would you evaluate using memory-mapped files (mmap) to execute this model without being terminated by the OS?"
details:
  realistic_solution: The optimal strategy is to use mmap combined with strict POSIX madvise calls (MADV_WILLNEED and MADV_DONTNEED) to create a sliding window of resident memory. Because the A17 Pro uses unified memory, zero-copy pointers can be passed directly to the ANE. To hit the 500ms cold start, we start ANE execution immediately on the first layers while a background thread asynchronously page-faults the upcoming layers into memory, evicting executed layers to leave room for the 500MB+ KV cache.
  common_mistake: |
    **The Pitfall:** Assuming memory-mapped files don't count towards the RAM limit (RSS) or ignoring the I/O stall.
    **The Rationale:** Candidates often miss the I/O bottleneck, assuming mmap makes weights instantly available without realizing page faults stall the 35 TOPS Neural Engine.
    **The Consequence:** App termination by the OS or violently missing the 500ms cold start latency target.
  napkin_math: |
    - 8B parameters at 4-bit quantization = 4 GB of weights.
    - App Memory Limit = 4.0 GB. Assuming KV cache + activations = ~500 MB, max allowable weights in memory is `3.5 GB`.
    - Mobile NVMe read speed is ~2 GB/s. Reading the full 4 GB model takes `2.0 seconds` (violates 500ms budget).
    - If the model has 32 layers, one layer is `125 MB`. Reading 125 MB takes `~62.5ms`.
    - **Conclusion:** Pipelining the **62.5ms I/O per layer** allows us to easily beat the 500ms TTFT requirement.
