title: mmap-Driven LLM Streaming on A17 Pro Neural Engine
scenario: You are deploying a 4-bit quantized 8B parameter LLM onto an iPhone 15 Pro. The iOS jetsam strictly limits your app's peak RSS to 4 GB, and the product requires a time-to-first-token (TTFT) cold start of under 500ms.
question: How would you evaluate using memory-mapped files (mmap) to execute this model without being terminated by the OS?
details:
  realistic_solution: Use mmap combined with strict POSIX madvise calls (MADV_WILLNEED and MADV_DONTNEED) to create a sliding window of resident memory. To hit the 500ms cold start, start ANE execution immediately on the first layers while a background thread asynchronously page-faults the upcoming layers into memory.
  common_mistake: |
    **The Pitfall:** Assuming memory-mapped files instantly skip I/O stalls.
    **The Rationale:** Candidates often assume mmap magically makes weights instantly available without realizing the ensuing page faults severely stall the NPU.
    **The Consequence:** App termination by the OS or violently missing the 500ms cold start latency target.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - App Memory Limit: 4.0 GB RSS.
       - Target TTFT: < 500ms.
       - Model: 8B params at 4-bit = 4.0 GB total.
       - NVMe Read Speed: 2 GB/s.
       - Layers: 32 layers (125 MB/layer).
    2. **Calculations:**
       - Total sequential load time: 4.0 GB / 2 GB/s = 2.0s (violates TTFT).
       - Load time per layer: 125 MB / 2 GB/s = 62.5ms.
    3. **Conclusion & Interpretation:**
       - **Result: I/O-Bound**. By memory-mapping and forcing asynchronous page faults ahead of the ANE execution, the pipeline hides the 2.0s total load time, achieving TTFT in ~62.5ms per layer.
