title: 'INT8 Calibration Dataset Bias'
scenario: 'We are deploying an INT8 object detection model on a mobile NPU. The model processes video at 30 frames per second. To perform post-training quantization, we curated a calibration dataset by taking the first 1,000 sequential frames from a 24-hour continuous video stream. While the FP32 model has high accuracy across all lighting conditions, the INT8 model running on the NPU shows a 40% accuracy drop specifically on nighttime scenes.'
question: 'Why does calibrating INT8 detection on the first 1000 video frames cause a 40% nighttime accuracy drop?'
details:
  realistic_solution: 'The accuracy drop is caused by a highly biased calibration dataset. By selecting the first 1,000 sequential frames, the dataset captures only a single lighting condition (likely daytime), meaning the INT8 activation ranges (scale and zero-point) are optimized exclusively for those conditions. When nighttime images are processed on the NPU, their activations fall outside this calibrated range, causing severe clipping and precision loss. The solution is to curate a calibration dataset by sampling diversely across the entire 24-hour distribution.'
  common_mistake: |
    **The Pitfall:** Blaming the INT8 precision itself or the NPU's hardware architecture for poor low-light performance.
    **The Rationale:** Candidates focus on the hardware capabilities instead of recognizing the fundamental flaw in the calibration dataset's curation strategy.
    **The Consequence:** Wasting time debugging hardware constraints or switching to FP16 instead of fixing the biased data pipeline.
  napkin_math: |
    **Assumptions & Constraints:**
    - Calibration Data: 1,000 sequential frames at 30 FPS.
    - Real-World Distribution: 24-hour continuous video stream (86,400 seconds).

    **Calculations:**
    - Calibration Duration: 1,000 frames / 30 FPS = 33.3 seconds.
    - Representation Ratio: 33.3 seconds / 86,400 seconds = 0.00038 (0.038%).

    **Conclusion & Interpretation:**
    - **Result: 0.038% representation (Data-Distribution-Bound)**. The calibration dataset represents just 0.038% of the temporal distribution, guaranteeing out-of-distribution nighttime clipping.
