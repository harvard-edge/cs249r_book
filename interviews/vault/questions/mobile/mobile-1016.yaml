title: 'Network Bandwidth Bottlenecks: Realize LPDDR5X Bandwidth Budget for Full Mobile AI Stack'
scenario: 'A full mobile AI stack on a Snapdragon 8 Gen 3 (77 GB/s) includes display rendering, camera ISP, always-on speech recognition, and background LLM prefetch.'
question: What is the LPDDR5X bandwidth consumption for a mobile AI stack, and does it fit under the 77GB/s Snapdragon limit?
details:
  realistic_solution: 'Display: 1080p 120Hz framebuffer write: 1920×1080×4B×120=0.996GB/s + GPU compositing (3 layers): 3×0.996=3GB/s total display. Camera ISP (4K 30fps YUV420): 4096×2160×1.5×30=0.4GB/s. Speech (10ms window every 10ms, 1B INT8=1GB model): 1GB×100/s ... no: ASR runs 1 pass per 10ms (100Hz). 1B model: bandwidth per pass = model_weights = 1GB? Too much for 100Hz. ASR at 100Hz: each pass reads entire model: 100×1GB=100GB/s impossible. Reality: ASR does streaming with 10ms frames via RNN/LSTM, only reading ~100KB active weights per frame: 100KB×100Hz=10MB/s. LLM prefill every 30s: prefill 256 tokens, 1.5GB weights: 1.5GB/prefill_time. Prefill ~27ms: 1.5/0.027=55.6GB/s for 27ms every 30s=0.05GB/s average. Total: 3+0.4+0.01+0.05=3.46GB/s ✓.'
  common_mistake: |
    **The Pitfall:** Grossly miscalculating always-on Speech Recognition (ASR) bandwidth.
    **The Rationale:** Engineers assume the entire 1GB model is loaded from RAM on every single 10ms audio frame, failing to understand recurrent/streaming architectures.
    **The Consequence:** Concluding the system needs impossible >100 GB/s bandwidth for basic operations, derailing the entire architectural review.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hardware: Snapdragon 8 Gen 3 (77 GB/s budget).
    - Display: 1080p 120Hz (1920x1080x4B = 0.996GB/s).
    - Camera ISP: 4K 30fps YUV420 (4096x2160x1.5x30 = 0.4GB/s).

    **Calculations:**
    - Display compositing (3 layers): 3 * 0.996 = 3.0 GB/s.
    - ASR Streaming: 100KB active weights * 100Hz = 0.01 GB/s.
    - LLM Prefill: 1.5GB every 30s = 0.05 GB/s average.
    - Total Idle Stack: 3.0 + 0.4 + 0.01 + 0.05 = 3.46 GB/s.

    **Conclusion & Interpretation:**
    - **Result: 3.46 GB/s (Memory-Bandwidth Bound)**. Total idle stack consumes 3.46 GB/s (~4.5% of budget), leaving ample room for foreground bursts.
