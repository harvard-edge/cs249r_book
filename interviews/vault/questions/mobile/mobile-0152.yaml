title: The Operator Fusion Tax
scenario: You're optimizing a CNN on a mobile phone. You notice a sequence of a 2D Convolution followed
  by a ReLU activation. Running them as separate, unfused operators incurs overhead for each dispatch
  and forces the intermediate activation tensor to be written to and read back from main memory (LPDDR5).
  Fusing them into a single `Conv-ReLU` operator avoids this. Assume a kernel dispatch overhead is 1,000
  ns and a main memory round-trip for the intermediate activation tensor takes 5,000 ns.
question: "How much latency does fusing a Conv2D and ReLU save when it removes one dispatch and one memory round-trip?"
details:
  realistic_solution: The primary benefit of operator fusion is the reduction of system overhead, not
    a reduction in FLOPs. By fusing `Conv` and `ReLU`, the framework can execute them in a single kernel
    launch, keeping the intermediate data in fast on-chip registers or SRAM instead of writing it out
    to and reading it back from slower main memory.
  common_mistake: Engineers often mistakenly believe fusion provides compute savings, but the number of
    FLOPs remains the same. The real win is in avoiding overhead. A common calculation error is to only
    count the saved kernel dispatch (1,000 ns) and forget the much larger penalty of the memory round-trip
    (5,000 ns) that occurs when an intermediate tensor is evicted from fast on-chip cache to slower DRAM
    between unfused calls.
  napkin_math: 'Unfused Conv + ReLU: Conv finishes, CPU dispatches ReLU (100us OS overhead). Tensor written
    to DRAM and read back (1MB / 30GB/s = 33us write + 33us read = 66us). Fused: 0us dispatch, 0us DRAM
    (stays in SRAM). Total latency saved per layer = 166us. For a 50-layer CNN, fusion saves 8.3ms per
    inference.'
  options:
  - 1,000 ns (Ignores memory round-trip cost)
  - 5,000 ns (Ignores kernel dispatch overhead)
  - 6,000 ns (Correctly sums dispatch and memory overhead)
  - 0 ns (Assumes no latency benefit since FLOPs are unchanged)
  correct_index: 2
