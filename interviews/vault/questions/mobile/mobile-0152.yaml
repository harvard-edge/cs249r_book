title: The Operator Fusion Tax
scenario: You are optimizing a CNN on a mobile phone. You notice a sequence of a 2D Convolution followed by a ReLU activation. Running them as separate, unfused operators incurs overhead for each dispatch and forces the intermediate activation tensor to be written to and read back from main memory (LPDDR5). Assume kernel dispatch overhead is 1,000 ns and a main memory round-trip for the intermediate tensor takes 5,000 ns.
question: How much latency does fusing a Conv2D and ReLU save when it removes one dispatch and one memory round-trip?
details:
  realistic_solution: The primary benefit of operator fusion is the reduction of system overhead, not a reduction in FLOPs. By fusing `Conv` and `ReLU`, the framework can execute them in a single kernel launch, keeping the intermediate data in fast on-chip registers or SRAM instead of writing it out to and reading it back from slower main memory.
  common_mistake: |
    **The Pitfall:** Believing that operator fusion provides compute (FLOP) savings.
    
    **The Rationale:** Engineers assume fusion fundamentally reduces the math required by the network.
    
    **The Consequence:** They ignore the massive memory round-trip penalty and fail to understand that fusion optimizes memory bandwidth and OS overhead, not FLOPs.
  napkin_math: |
    1. **Calculate Unfused Cost:** Conv finishes -> 1,000 ns OS dispatch for ReLU -> write to DRAM & read back takes 5,000 ns. Total overhead = 6,000 ns.
    2. **Calculate Fused Cost:** 0 ns dispatch, 0 ns DRAM (tensor stays strictly in fast SRAM).
    3. **Result:** Fusion saves **6,000 ns (6 µs) per layer**. For a 50-layer CNN, this removes 300 µs of pure system overhead per inference.
  options:
  - 1,000 ns (Ignores memory round-trip cost)
  - 5,000 ns (Ignores kernel dispatch overhead)
  - 6,000 ns (Correctly sums dispatch and memory overhead)
  - 0 ns (Assumes no latency benefit since FLOPs are unchanged)
  correct_index: 2
