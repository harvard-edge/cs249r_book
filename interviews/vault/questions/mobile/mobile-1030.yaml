title: 'Network Bandwidth Bottlenecks: Implement KV-Cache Bandwidth Impact at Long Contexts'
scenario: You must implement the calculation for how KV-cache bandwidth affects Time Per Output Token (TPOT) as context grows for a 3B INT4 LLM (1.5GB model) on a device with 77 GB/s memory bandwidth. Assume 32 layers, 32 KV heads, 128 head_dim, and FP16 KV.
question: How would you compute TPOT at context lengths of 512, 2048, 4096, and 8192 tokens?
details:
  realistic_solution: 'KV per token: 2×32×128×2B×32 layers = 524,288B = 0.524MB. TPOT at context N: (model_weights + N×KV_per_token) / BW. At 512: (1.5GB+512×0.524MB)/77 = (1.5+0.268)/77=23.0ms. At 2048: (1.5+1.07)/77=33.4ms. At 4096: (1.5+2.15)/77=47.4ms. At 8192: (1.5+4.29)/77=75.2ms. KV-cache increasingly dominates at long contexts — 8192 token context requires 2.86× more memory reads than model weights alone.'
  common_mistake: |
    **The Pitfall:** Forgetting to add KV-cache bandwidth to weight bandwidth.
    **The Rationale:** Candidates often focus only on the static parameter sizes and ignore dynamic state memory traffic.
    **The Consequence:** TPOT estimates severely underestimate the latency at large contexts, leading to unacceptable real-world delays.
  napkin_math: |
    - **KV Per Token:** 2 * 32 layers * 128 dim * 2 bytes * 32 heads = 524,288 bytes (~0.524 MB).
    - **TPOT Formula:** (Model Weight + KV Cache Size) / 77 GB/s bandwidth.
    - **Calculations:**
      - Context 512: (1.5 GB + 0.268 GB) / 77 = 23.0ms
      - Context 8192: (1.5 GB + 4.29 GB) / 77 = 75.2ms
    - **Result:** **At 8192 tokens, the KV cache (4.29 GB) dominates the memory transfer, becoming 2.86x larger than the model weights themselves.**
