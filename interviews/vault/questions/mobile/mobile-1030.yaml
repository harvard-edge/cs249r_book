title: 'Network Bandwidth Bottlenecks: Implement KV-Cache Bandwidth Impact at Long
  Contexts'
scenario: 'Implement the calculation for how KV-cache bandwidth affects TPOT as context
  grows for a 3B INT4 LLM (1.5GB model) on Snapdragon 8 Gen 3 (77 GB/s). Compute TPOT
  at context lengths: 512, 2048, 4096, 8192 tokens. Assume 32 layers, 32 KV heads,
  128 head_dim, FP16 KV.'
question: 'How would you compute TPOT at context lengths: 512, 2048, 4096, 8192 tokens?'
details:
  realistic_solution: 'KV per token: 2×32×128×2B×32 layers = 524,288B = 0.524MB. TPOT
    at context N: (model_weights + N×KV_per_token) / BW. At 512: (1.5GB+512×0.524MB)/77
    = (1.5+0.268)/77=23.0ms. At 2048: (1.5+1.07)/77=33.4ms. At 4096: (1.5+2.15)/77=47.4ms.
    At 8192: (1.5+4.29)/77=75.2ms. KV-cache increasingly dominates at long contexts
    — 8192 token context requires 2.86× more memory reads than model weights alone.'
  common_mistake: Forgetting to add KV-cache bandwidth to weight bandwidth; at long
    contexts, KV-cache reads become a significant fraction of total memory traffic.
  napkin_math: 'KV/token: 2×32×128×2×32 = 524,288B = 0.524MB. Context 512: KV=0.268GB.
    1.5+0.268=1.768GB. TPOT=23.0ms. Context 2048: KV=1.07GB. 1.5+1.07=2.57GB. TPOT=33.4ms.
    Context 4096: KV=2.15GB. 1.5+2.15=3.65GB. TPOT=47.4ms. Context 8192: KV=4.29GB.
    1.5+4.29=5.79GB. TPOT=75.2ms. KV dominates at 8K: 4.29GB KV vs 1.5GB model = 2.86×
    weight bandwidth.'
