title: On-Device Active Learning Data Curation for Gemini Nano
scenario: Your team is building a personalized predictive text system using Gemini Nano running locally on the Google Tensor G3. To continuously improve the model without compromising user privacy, you must design an on-device data curation pipeline that selects the most informative user interactions for nightly local fine-tuning. The system must operate within the constraints of the 12 GB LPDDR5X memory and utilize the on-device TPU efficiently.
question: How would you architect the data selection criteria and annotation workflow to filter high-value samples while minimizing battery impact?
details:
  realistic_solution: A robust design uses a two-stage curation pipeline. First, apply a lightweight, low-power heuristic filter (e.g., regex, word frequency) in real-time to buffer a small pool of candidate sentences. Second, schedule an asynchronous task during device idle/charging times to run Gemini Nano on the TPU, computing prediction entropy for the candidate pool to select the top-K most uncertain samples. This curates a high-quality dataset into a bounded ring buffer for nightly training.
  common_mistake: |
    **The Pitfall:** Running continuous complex uncertainty sampling during active usage.
    **The Rationale:** Candidates propose running the heavy LLM constantly to score every user input in real-time.
    **The Consequence:** This severely drains the battery, interrupts UX, and places unmanageable memory pressure on the 12 GB RAM pool.
  napkin_math: |
    *   **Daily Target:** `500 sequences * 40 tokens = 20,000 tokens`
    *   **TPU Processing Speed:** `~30 tokens/second`
    *   **Total Processing Time:** `20,000 tokens / 30 tokens/sec = 666 seconds (11 minutes)`
    *   **Result:** **By executing this 11-minute workload exclusively during nightly charging, the active battery impact is 0%.**
