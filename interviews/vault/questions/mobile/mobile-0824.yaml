title: Mobile New 0025
scenario: A security camera runs object detection at 30 FPS. The NPU draws a steady 2W. The scene is an empty hallway with no movement 99% of the time, yet the battery drains just as fast as during a busy period.
question: Why does the empty-hallway security camera drain battery as fast as a busy scene?
details:
  realistic_solution: The symptom is constant high power consumption regardless of semantic content. The root cause is redundant inference processing. The system is running the full heavy CNN on every single frame, even if the pixels haven't changed. Implementing a cheap frame-differencing algorithm or a tiny motion-detection cascade could gate the heavy NPU execution, saving massive amounts of power.
  common_mistake: |
    **The Pitfall:** Processing continuous sensor streams at full frame rates regardless of information entropy.
    **The Rationale:** Engineers build a rigid pipeline (Camera -> NPU) and assume the NPU's efficiency makes continuous processing acceptable.
    **The Consequence:** The battery drains constantly because the system fails to use a low-power semantic gate (like an ISP motion check).
  napkin_math: |
    1. Always-on power: 2W * 24hrs = 48 Watt-hours/day.
    2. Motion-gated power: ISP motion check = 50mW (0.05W).
    3. Active NPU time (1% of day): 14.4 minutes (0.24 hours).
    4. Total Energy: (0.05W * 24h) + (2W * 0.24h) = 1.2 + 0.48 = 1.68 Watt-hours/day.
    5. **Conclusion: Battery life extends by ~28x (48 / 1.68).**
