title: Exynos 2400 NPU Distillation Specification
scenario: Your team needs to deploy a real-time natural language query parser locally on an NPU. The device features a shared 12 GB RAM pool.
question: How would you specify distillation for an Exynos 2400 NPU-friendly student model?
details:
  realistic_solution: Specify a student model relying strictly on NPU-accelerated operator blocks. Distillation must utilize intermediate feature mapping and logit matching. Furthermore, incorporate rigorous Quantization-Aware Training (QAT) to target INT8 precision natively. This aligns the execution explicitly with the NPU's tensor accelerators while brutally compressing the memory footprint to safely coexist on the shared 12 GB bus alongside the ISP and GPU.
  common_mistake: |
    **The Pitfall:** Designing a student model optimized entirely for parameter reduction without validating specific NPU operator compatibility.
    **The Rationale:** Engineers prioritize arbitrary model compression techniques, totally ignoring how specific non-linear operations compile to hardware edges.
    **The Consequence:** The model falls back to the CPU, inducing horrific latency, and saturates the shared memory bus, bringing concurrent ISP/GPU tasks to a grinding halt.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target RAM footprint: < 12 GB shared bus (App limit ~2 GB).
    - Teacher Model (7B FP16): 14 GB.
    - Student Model (1.2B INT8): 1.2 GB.
    - NPU Peak: 34.7 TOPS. Memory efficiency penalty: 75% loss due to shared bus contention.

    **Calculations:**
    - Student footprint: 1.2B * 1 byte = 1.2 GB (Fits).
    - Compute requirement: 1.2B params * 2 MACs * 128 tokens = 307.2 GOPS (0.307 TOPS).
    - Ideal latency: 0.307 TOPS / 34.7 TOPS = 8.8 ms.
    - Real-world latency: 8.8 ms / (1 - 0.75 efficiency loss) = 35.2 ms.

    **Conclusion & Interpretation:**
    - **Result: Memory and Compute-Bound**. A 1.2B INT8 student fits perfectly within the budget. Even factoring in extreme memory contention from the ISP, the 35.2 ms latency delivers a robust real-time UX.
