title: Exynos 2400 NPU Distillation Specification
scenario: Your team needs to deploy a real-time natural language query parser locally on the Samsung Exynos 2400 NPU. The device features a dual-core NPU with 34.7 TOPS and a shared 12 GB LPDDR5X memory pool that also serves the CPU, GPU, and ISP.
question: How would you specify distillation for an Exynos 2400 NPU-friendly student model?
details:
  realistic_solution: The specification should define a student model using standard, heavily optimized blocks that compile efficiently to the dual-core NPU. Distillation should use both logit matching and intermediate feature distillation. Crucially, the plan must incorporate Quantization-Aware Training (QAT) to target INT8 precision, aligning the model with the NPU's peak 34.7 TOPS performance and reducing the memory footprint to fit well within the shared 12 GB RAM alongside other system processes.
  common_mistake: |
    **The Pitfall:** Designing a student model focused solely on parameter reduction without considering NPU operator support.
    **The Rationale:** Many engineers ignore the shared memory architecture and how specific operators compile to edge chips.
    **The Consequence:** This results in models that suffer from severe memory bandwidth contention with the ISP or GPU, ruining real-world latency.
  napkin_math: |
    - **7B Teacher Size:** FP16 requires 14 GB of RAM, exceeding the 12 GB shared LPDDR5X capacity.
    - **Student Size:** 1.2B parameters in INT8 requires **1.2 GB**, leaving space for CPU, GPU, and ISP.
    - **Compute Requirement:** Generating 128 tokens needs 2 × 1.2 billion × 128 = 307 billion operations = **0.307 TOPS**.
    - **Theoretical Compute Time:** 0.307 TOPS / 34.7 TOPS (peak) = 0.0088 s = **8.8 ms**.
    - **Actual Latency:** Assuming 25% efficiency due to memory contention on the shared bus, 8.8 ms / 0.25 = **35.2 ms**.
