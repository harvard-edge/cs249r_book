title: The Mobile Thermal Wall
scenario: You're an ML engineer profiling a new on-device generative AI model. You observe that after running continuously for about a minute, the model's performance consistently drops by 40-50%.
question: What is the most likely physical limit the System-on-a-Chip (SoC) is encountering, and what is its approximate power value?
details:
  realistic_solution: |
    The SoC is thermal throttling. It has exceeded its sustainable thermal design power (TDP) and is reducing its clock speeds to prevent overheating. For a modern flagship smartphone, the total sustained power budget for the entire SoC is only about 3 to 5 Watts.
  common_mistake: |
    **The Pitfall:** Blaming software bugs or assuming laptop-class power budgets (10-30W).
    **The Rationale:** ML engineers lack familiarity with mobile passive cooling constraints.
    **The Consequence:** Wasting time profiling memory leaks instead of addressing the 3-5W sustained thermal limit.
  napkin_math: |
    - **Datacenter GPU:** 700W active cooling.
    - **Mobile SoC:** ~3W passive cooling limit (to keep skin temp < 45°C).
    - **Generative AI:** Runs at 8W peak.
    - **Time to Throttle:** 60 seconds of 8W load hits thermal limits.
    - **Result:** OS throttles clock speeds by **50%**.
  options:
  - The SoC is hitting a software power limit of around 30 Watts.
  - The model is likely hitting a memory bandwidth limit of a few hundred milliwatts.
  - The SoC is thermal throttling, hitting its sustainable power budget of 3-5 Watts.
  - The operating system is de-prioritizing the app due to a memory leak.
