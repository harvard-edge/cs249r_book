title: The App Sandbox Memory Trap
scenario: 'Your Android app loads two ML models: a face detection model (15 MB) and a face mesh model (8 MB). On a Samsung Galaxy A14, the app works fine in isolation. But when the user has WhatsApp, Chrome, and Spotify running, your app crashes with an OOM error.'
question: Your models only use 23 MB — how can that cause OOM on a 4 GB device?
details:
  realistic_solution: 'Android enforces per-app heap limits, not total RAM. On a 4 GB Galaxy A14, the per-app heap is ~128 MB. Your 23 MB model files, once loaded into TFLite''s arena with activation buffers, interpreter overhead, and input/output tensors, can consume 80-100 MB of heap. Combined with your app''s baseline memory (UI, image buffers), you exceed the 128 MB limit. Fix: use memory-mapped model loading (mmap) so model weights don''t count against heap. This keeps only the active working set (~3 MB) resident. Also profile on budget devices — 35% of Android users have 4 GB RAM.'
  common_mistake: |
    **The Pitfall:** Believing there must be a memory leak since 23 MB of models "can't possibly" cause OOM on a 4 GB device.
    **The Rationale:** Engineers confuse total physical RAM with the strict per-app heap limits enforced by the Android OS.
    **The Consequence:** They spend hours hunting for non-existent memory leaks instead of switching to memory-mapped loading.
  napkin_math: |
    **Assumptions & Constraints:**
    - Per-app heap limit: ~128 MB.
    - App baseline usage: ~40-60 MB.
    - Model File Size: 23 MB.

    **Calculations:**
    - Standard Model Load: 23 MB of models + TFLite arena/activation buffers expand to 80-100 MB of heap.
    - Total > 128 MB -> OOM.
    - Memory-Mapped Load (mmap): 23 MB model, but only ~3 MB resident at any time.

    **Conclusion & Interpretation:**
    - **Result: Saves ~20 MB of Heap (Memory-Capacity-Bound)**. Memory mapping limits physical memory utilization strictly to the active operator working set.
