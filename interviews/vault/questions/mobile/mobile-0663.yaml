title: The App Sandbox Memory Trap
scenario: 'Your Android app loads two ML models: a face detection model (15 MB) and a face mesh model
  (8 MB). On a Samsung Galaxy A14 (MediaTek Helio G80, 4 GB RAM), the app works fine in isolation. But
  when the user has WhatsApp, Chrome, and Spotify running, your app crashes with an OOM error. Your models
  only use 23 MB — how can that cause OOM on a 4 GB device?'
details:
  realistic_solution: 'Android enforces per-app heap limits, not total RAM. On a 4 GB Galaxy A14, the
    per-app heap is ~128 MB. Your 23 MB model files, once loaded into TFLite''s arena with activation
    buffers, interpreter overhead, and input/output tensors, can consume 80-100 MB of heap. Combined with
    your app''s baseline memory (UI, image buffers), you exceed the 128 MB limit. Fix: use memory-mapped
    model loading (mmap) so model weights don''t count against heap. This keeps only the active working
    set (~3 MB) resident. Also profile on budget devices — 35% of Android users have 4 GB RAM.'
  common_mistake: '"23 MB of models can''t cause OOM on a 4 GB device — there must be a memory leak."
    There''s no leak — the issue is how Android manages memory.'
  napkin_math: 'Galaxy A14 (4 GB): per-app heap = 128 MB. Galaxy S24 (12 GB): per-app heap = 512 MB. The
    same app that OOMs on the A14 runs fine on the S24 — not because of total RAM, but because of the
    per-app limit. Android market share by RAM: 4 GB = 35%, 6 GB = 25%, 8 GB = 20%, 12+ GB = 20%. If you
    only test on flagship devices, you miss 35% of your users. Memory-mapped model loading: 23 MB model,
    but only ~3 MB resident at any time (the working set of active layers). Heap savings: 20 MB.'
