title: The 'Smart Reply' Battery Drain Dilemma
scenario: 'You are an ML Systems Engineer on the ''Auto Assistant'' team for a popular
  in-car infotainment system. Your team is tasked with launching a personalized ''Smart
  Reply'' feature to 1 million active users. After a design sprint, you have two proposals: Centralized Training and Federated Learning.'
question: Which Smart Reply proposal should launch after comparing one-year TCO and
  the federated option's battery drain?
details:
  realistic_solution: The correct approach is to calculate the 1-year TCO for both
    options AND calculate the battery impact of the Federated Learning option to see
    if it violates the user experience constraint.
  common_mistake: Focusing exclusively on server-side TCO and choosing the cheaper
    option, while completely ignoring the critical, user-facing constraint of battery
    drain on the mobile device. Another common mistake is choosing the FL option on
    principle for its privacy benefits without quantifying if the user experience
    cost (battery life) is acceptable.
  napkin_math: "### 1-Year Total Cost of Ownership (TCO)\n**Centralized Model:** Server infrastructure = $500k/year. Total = $500k.\n**Federated Learning:** Server = $90k/year, but requires 1 specialized FL engineer ($200k) + MLOps overhead ($420k). Total = $710k. ($210k more expensive).\n\n### Battery Impact (Federated Learning)\nModel update size: 5MB.\nCompute per round: 20 G-MACs = 40 G-Ops.\nEnergy cost (compute + radio): ~13.3 Joules/round.\n100 rounds/day = 1330 Joules.\nStandard phone battery: 4500 mAh @ 3.7V = 16.65 Wh = ~60,000 Joules.\nDaily Battery Drain = 1330 / 60,000 = ~2.22%.\nThis exceeds the strict 2% budget constraint for background ML features."
  options:
  - Choose Federated Learning. Its 1-year TCO of $630k is higher, but the privacy
    guarantees are worth the user battery drain of ~1.5%.
  - Choose Centralized. Its 1-year TCO is $210k lower, and the Federated Learning
    option's 2.22% daily battery drain exceeds the 2% user-acceptance threshold.
  - Choose Federated Learning. Its server-side operational costs are 6x lower, making
    it cheaper in the long run, and the battery impact is minimal.
  - Choose Centralized. Federated Learning is too complex to A/B test effectively,
    which is a business requirement for any new feature launch.
  correct_index: 1
