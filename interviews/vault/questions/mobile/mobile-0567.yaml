title: The 'Smart Reply' Battery Drain Dilemma
scenario: You are an ML Systems Engineer building a personalized 'Smart Reply' feature for an in-car infotainment app with 1 million users. The app has a strict 2% daily battery drain budget. You have two implementation proposals: Centralized Training (uploading logs) or Federated Learning (on-device training rounds).
question: Which Smart Reply proposal should launch after comparing the one-year Total Cost of Ownership (TCO) and the federated option's battery drain impact?
details:
  realistic_solution: You must calculate the 1-year TCO for both options AND calculate the battery impact of the Federated Learning option to see if it violates the user experience constraint. Centralized training is significantly cheaper and avoids the severe battery drain caused by intense on-device federated training.
  common_mistake: |
    **The Pitfall:** Choosing Federated Learning purely for privacy reasons without calculating its battery impact.
    **The Rationale:** Candidates often treat privacy as an absolute mandate while ignoring physical hardware constraints like the phone's battery capacity.
    **The Consequence:** Launching a feature that severely drains user batteries (>2%), leading to massive uninstalls, while also overspending on MLOps infrastructure.
  napkin_math: |
    - **Centralized TCO:** Server infrastructure = $500k/year. Total = $500k.
    - **Federated TCO:** Server ($90k) + MLOps overhead ($420k) + 1 FL engineer ($200k) = $710k/year.
    - **FL Compute per round:** 20 G-MACs = 40 G-Ops.
    - **FL Energy Cost:** Compute + radio = ~13.3 Joules/round.
    - **FL Daily Usage:** 100 rounds/day = 1330 Joules.
    - **Battery Capacity:** Standard phone 4500 mAh @ 3.7V = 16.65 Wh = ~60,000 Joules.
    - **FL Battery Drain:** 1330 Joules / 60,000 Joules = ~2.22%.
    - **Result:** **Federated Learning is $210k more expensive and its 2.22% drain violates the strict 2% battery budget. Choose Centralized.**
  options:
  - Choose Federated Learning. Its 1-year TCO of $630k is higher, but the privacy guarantees are worth the user battery drain of ~1.5%.
  - Choose Centralized. Its 1-year TCO is $210k lower, and the Federated Learning option's 2.22% daily battery drain exceeds the 2% user-acceptance threshold.
  - Choose Federated Learning. Its server-side operational costs are 6x lower, making it cheaper in the long run, and the battery impact is minimal.
  - Choose Centralized. Federated Learning is too complex to A/B test effectively, which is a business requirement for any new feature launch.
  correct_index: 1
