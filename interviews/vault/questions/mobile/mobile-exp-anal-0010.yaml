title: DP-SGD Memory Wall on A17 Pro
scenario: A team is fine-tuning a 10-million parameter personalization model using DP-SGD on the Apple
  A17 Pro Neural Engine. To meet a stricter privacy budget (lower epsilon), they increase the noise multiplier
  and must increase the batch size from 32 to 256 to maintain the signal-to-noise ratio. However, they
  observe that training throughput drops exponentially, and the device quickly hits its ~5W thermal limit
  causing severe throttling, despite the 16-core Neural Engine having 35 TOPS of available compute. Given
  the A17 Pro's 8 GB shared unified memory architecture, explain why this specific batch size increase
  in DP-SGD causes this catastrophic system failure.
details:
  realistic_solution: In standard SGD, gradients are accumulated in place, meaning memory usage is largely
    independent of batch size. DP-SGD requires materializing and storing individual gradients for each
    sample in the batch simultaneously to compute their L2 norms for per-sample clipping. Increasing the
    batch size to 256 drastically inflates the memory footprint, exceeding the physical memory limits.
    This forces the system to aggressively swap data between the unified memory and NVMe storage, which
    starves the Neural Engine of data and spikes memory I/O power consumption to hit the ~5W limit.
  common_mistake: Candidates often incorrectly attribute the throttling to the 35 TOPS Neural Engine lacking
    compute capacity for the larger batch size, failing to realize the algorithmic difference in how DP-SGD
    handles gradients. They miss that DP-SGD prevents standard gradient accumulation, creating a severe
    memory capacity bottleneck.
  napkin_math: 'Model size: 10 million parameters * 4 bytes (FP32) = 40 MB. Standard SGD memory for gradients:
    1 * 40 MB = 40 MB. DP-SGD gradient memory at batch size 32: 32 * 40 MB = 1.28 GB (comfortably fits
    in 8 GB unified memory). DP-SGD gradient memory at batch size 256: 256 * 40 MB = 10.24 GB. Since 10.24
    GB exceeds the total 8 GB shared unified memory of the Apple A17 Pro, it guarantees Out-Of-Memory
    (OOM) eviction and heavy swap, explaining the massive latency and power spike.'
