title: Core ML Palettization vs GGUF Quantization for LLM on iPhone
scenario: A team compares Apple Core ML palettization (4-bit lookup table per weight block) vs GGUF Q4_K_M (4-bit mixed quantization) for deploying Llama-3-8B on iPhone 15 Pro (A17 Pro, 8GB RAM). Core ML achieves 12 tok/s with a 4.5GB model; GGUF achieves 15 tok/s with a 4.3GB model.
question: Why does GGUF Q4_K_M reach 15 tok/s while Core ML palettization reaches 12 tok/s for Llama-3-8B on iPhone 15 Pro?
details:
  realistic_solution: Core ML palettization stores weights as 4-bit indices into a lookup table executed by the Neural Engine. It suffers from lookup table dereference overhead and graph compilation constraints. GGUF Q4_K_M uses mixed-precision (K-quant) running on the CPU with BLAS and Metal GPU fallback. The CPU+GPU combo effectively utilizes memory bandwidth for token generation. The gap exists because Core ML ANE startup overhead dominates for token-by-token generation, while llama.cpp is optimized for single-token decode. For batch > 1, Core ML would win.
  common_mistake: |
    **The Pitfall:** Assuming fewer bits directly yields faster inference.
    **The Rationale:** Candidates ignore the runtime engine, operator fusion, and hardware unit utilization, assuming quantization format is the sole determinant of speed.
    **The Consequence:** They misattribute the performance gap to the model size rather than execution overhead.
  napkin_math: |
    * Model sizes: Core ML 4.5GB vs GGUF 4.3GB.
    * Memory Bandwidth (BW) limit: 4.3GB / 68 GB/s = ~63 ms/token.
    * Theoretical max tokens/sec: 1000 ms / 63 ms = 15.9 tok/s.
    * GGUF: 15 tok/s = 94% of memory BW ceiling.
    * Core ML: 12 tok/s = 75% of ceiling.
    * **ANE scheduling overhead costs ~20% of maximum theoretical throughput.**
