title: On-device Active Learning for Gesture Recognition Dataset Curation on Apple A17 Pro
scenario: You are leading the ML engineering effort for a next-generation augmented reality (AR) application running on an iPhone powered by the Apple A17 Pro chip. This application uses a deep learning model for real-time gesture recognition. To continuously improve the model's accuracy, you need a robust and privacy-preserving dataset curation pipeline.
question: How would you design a privacy-preserving on-device active learning system for A17 Pro gesture recognition data curation?
details:
  realistic_solution: A strong solution would involve designing a lightweight, efficient uncertainty sampling model (e.g., a small CNN or ensemble of shallow networks) specifically optimized to run on the Apple A17 Pro's Neural Engine. The system would employ strategies like entropy-based or margin-based sampling. Data buffering and model inference would be carefully managed within the 8 GB unified memory. The solution should propose mechanisms for selective, privacy-preserving data aggregation (e.g., federated learning for model updates, or highly anonymized feature vectors for cloud analysis) and a robust on-device user feedback loop for immediate labeling of high-uncertainty samples. The design must explicitly consider power efficiency (aiming for minimal impact on the ~5W budget) and provide a clear mechanism to periodically re-evaluate the active learning model itself to prevent selection bias.
  common_mistake: |
    **The Pitfall:** Proposing an active learning strategy that is too computationally intensive.
    **The Rationale:** Candidates often overlook the overhead of running a second ML model for uncertainty sampling or assume unlimited data offload.
    **The Consequence:** The proposed solution exceeds the 5W power budget, causes excessive battery drain, or degrades main AR performance.
  napkin_math: |
    - **Compute Budget:** A17 Pro NPU has 35 TOPS total. Main model uses 15 TOPS, leaving 20 TOPS.
    - **Active Learning Model:** A lightweight CNN takes ~0.1 TOPS (100 GOPs) per frame.
    - **Performance Requirement:** Running at 30 FPS requires 3 TOPS (well within the 20 TOPS remaining).
    - **Power Impact:** 3 TOPS is ~8.5% of peak NPU load, consuming ~0.4W of the 5W budget.
    - **Data Reduction:** 30 FPS = 108,000 frames/hr. Selecting 0.1% yields 108 frames/hr.
    - **Final Result:** **Bandwidth reduced from ~324 GB/hr to ~324 MB/hr.**
