title: Overlapping Compute and Network on Snapdragon
scenario: A smartphone app runs a split-compute model where early layers execute on
  a Snapdragon 8 Gen 3 NPU, and intermediate activations are sent to the cloud.
question: Describe how the mobile client can overlap the transmission of layer N's
  activations with the computation of layer N+1 or subsequent frames.
details:
  realistic_solution: The client pipelines operations using DMA to stream activations
    over the radio as soon as they reach NPU memory. While frame T's activations are
    transmitting over the network, the NPU simultaneously begins processing frame
    T+1, effectively hiding the network latency behind compute.
  common_mistake: Assuming synchronous execution where the client completely finishes
    inference before initiating the network upload.
  napkin_math: T_total = max(T_compute, T_network)
