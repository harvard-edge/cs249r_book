title: Overlapping Compute and Network on Snapdragon
scenario: A smartphone app runs a split-compute model where early layers execute on a Snapdragon 8 Gen 3 NPU, and intermediate activations are sent to the cloud.
question: How can the mobile client overlap the transmission of layer N's activations with the computation of layer N+1 or subsequent frames?
details:
  realistic_solution: The client pipelines operations using DMA to stream activations over the radio as soon as they reach NPU memory. While frame T's activations are transmitting over the network, the NPU simultaneously begins processing frame T+1, effectively hiding the network latency behind compute.
  common_mistake: |
    **The Pitfall:** Implementing synchronous execution where the NPU blocks until upload completes.
    
    **The Rationale:** Engineers default to sequential programming models and fail to utilize hardware DMA controllers.
    
    **The Consequence:** The total processing latency becomes the sum of compute and network latency, halving potential throughput.
  napkin_math: |
    1. **Define Sequential Latency:** T_total = T_compute + T_network.
    2. **Apply Pipelining via DMA:** Stream activations over the radio while computing the next frame.
    3. **Calculate Overlapped Latency:** T_total = max(T_compute, T_network).
    4. **Result:** **Network latency is fully hidden** behind compute, significantly increasing frame throughput.
