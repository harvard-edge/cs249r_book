title: Adversarial Sparsity Loss on Exynos 2400 NPU
scenario: You are deploying a vision model on a Samsung Exynos 2400 NPU. Security researchers find that feeding specific adversarial noise to the camera causes a sudden drop in concurrent GPU/ISP performance. The Exynos 2400 features a dual-core NPU and shares its 12 GB LPDDR5X memory across the CPU, GPU, and ISP.
question: Why do adversarial camera inputs cause cross-component interference on Exynos 2400 despite fixed model FLOPs?
details:
  realistic_solution: The Exynos NPU relies on zero-skipping (e.g., ignoring zeros after ReLU) to compress intermediate tensors and reduce traffic on the shared LPDDR5X bus. Adversarial perturbations inherently shift the distribution of feature maps, often pushing negative values positive and destroying ReLU sparsity. The NPU must now write dense tensors back to main memory, saturating the shared bus and starving the concurrent GPU/ISP of memory bandwidth.
  common_mistake: |
    **The Pitfall:** Guessing that adversarial images are larger or trigger more FLOPs.
    **The Rationale:** Candidates miss that FLOPs remain constant for a static graph, but memory traffic varies dynamically based on activation sparsity.
    **The Consequence:** Failing to diagnose that adversarial noise destroys zero-skipping, leading to a massive surge in uncompressed memory writes.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Baseline Activation Sparsity: 75%
       - Adversarial Activation Sparsity: 15%
       - Base Activation Tensor Size: 8 MB
       - Frame Rate: 30 FPS
    2. **Calculations:**
       - Baseline memory write = 8 MB * (1 - 0.75) = 2 MB
       - Adversarial memory write = 8 MB * (1 - 0.15) = 6.8 MB
       - Baseline Bandwidth (1 layer) = 2 MB * 30 = 60 MB/s
       - Adversarial Bandwidth (1 layer) = 6.8 MB * 30 = 204 MB/s
    3. **Conclusion & Interpretation:**
       - **Result: Zero-Skip Failure. Adversarial noise destroys ReLU sparsity, disabling hardware zero-skipping compression. This forces massive uncompressed tensor writes to DRAM, saturating the shared bus and starving the GPU/ISP.**
