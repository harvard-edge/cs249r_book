title: Analyzing Quantization Outliers in CNN Accuracy
scenario: A Snapdragon 8 Gen 3 accelerates an INT8 quantized ResNet, but accuracy
  drops significantly compared to the FP32 baseline.
question: Analyze the likely cause of this accuracy degradation and propose a calibration
  technique to fix it.
details:
  realistic_solution: The drop is likely due to extreme outliers in activation distributions
    being clipped by basic min-max quantization. Using KL-divergence (entropy) calibration
    or per-channel quantization for the weights preserves dynamic range without severe
    bin clipping.
  common_mistake: Assuming INT8 inherently lacks precision for CNNs rather than identifying
    flaws in the post-training quantization calibration method.
  napkin_math: 1 outlier ruins 255 bins
