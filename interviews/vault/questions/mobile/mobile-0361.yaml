title: The Dashcam Battery Drain Dilemma (mobile-0361)
scenario: You're developing a dashcam feature for a ridesharing app. When active, the perception model
  consumes 2W of power on the mobile phone's NPU. To avoid overheating, you implement a duty cycle where
  the model runs for only 1 second out of every 5-second period. The phone's battery has a capacity of
  5000 mAh and operates at a nominal voltage of 3.7V. Ignoring all other power consumption on the device,
  calculate how long the dashcam feature can run before it completely drains the battery.
details:
  realistic_solution: The correct approach requires two steps. First, calculate the average power consumption
    by applying the duty cycle. Second, calculate the total energy stored in the battery. Finally, divide
    the total energy by the average power to find the runtime.
  common_mistake: 'Engineers often make two mistakes here: 1) They forget to convert the battery''s capacity
    from milliamp-hours (a unit of charge) to Watt-hours (a unit of energy) by multiplying by the voltage.
    2) They calculate the runtime using the peak power (2W) instead of the average power based on the
    duty cycle, leading to a massive underestimation of the device''s endurance.'
  napkin_math: Duty Cycle = 1s active / 5s period = 0.2
  options:
  - 9.25 hours
  - 12.5 hours
  - 46.25 hours
  - 37.0 hours
  correct_index: 2
