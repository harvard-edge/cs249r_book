title: The Dashcam Battery Drain Dilemma (mobile-0361)
scenario: You are developing a dashcam feature for a ridesharing app. The perception model consumes 2W on the NPU but utilizes a duty cycle, running 1 second out of every 5. The phone battery is 5000 mAh at 3.7V. Ignore all other device power consumption.
question: How long can a 5000 mAh, 3.7V phone run a 2W dashcam model active for one second out of every five?
details:
  realistic_solution: |
    Translate battery capacity metrics into absolute energy (Watt-hours), then evaluate the continuous draw using the temporal duty-cycle. By limiting inference to a 20% active duty cycle, the hardware effectively aggregates long idle periods, massively depressing the average thermal output and drastically extending the operational runtime. This prevents catastrophic thermal throttling and ensures the dashcam feature remains viable over a driver's entire shift.
  common_mistake: |
    **The Pitfall:** Calculating runtime using peak power instead of average power, and failing to convert units properly.
    **The Rationale:** Candidates forget to multiply battery capacity by voltage to get Watt-hours.
    **The Consequence:** They drastically underestimate the device's endurance.
  napkin_math: |
    **Assumptions & Constraints:**
    - Battery capacity: 5000 mAh. Voltage: 3.7V.
    - Active NPU Power: 2.0 W.
    - Duty Cycle: 1 second active per 5 seconds total (20%).

    **Calculations:**
    - Total Energy Storage = 5000 mAh * 3.7V = 18,500 mWh = 18.5 Wh.
    - Average Power Consumption = 2.0 W * (1s / 5s) = 0.4 W (400 mW).
    - Total Runtime = 18.5 Wh / 0.4 W = 46.25 hours.

    **Conclusion & Interpretation:**
    - **Result: 46.25 hours (Energy Capacity-Bound)**. Factoring the duty cycle yields an average drain of only 0.4W. Failing to multiply capacity by voltage to yield Watt-hours, or ignoring the duty cycle, results in a fatal underestimation of hardware endurance.
  options:
  - 9.25 hours
  - 12.5 hours
  - 46.25 hours
  - 37.0 hours
  correct_index: 2
