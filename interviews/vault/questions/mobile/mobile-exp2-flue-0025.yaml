title: A17 Pro Canary Rollout Performance Budget
scenario: Your team is executing a canary rollout of a new real-time object tracking model targeted specifically
  at devices with the Apple A17 Pro Neural Engine. To determine if it is safe to increase the rollout
  traffic to a larger user base, you must verify the model's peak performance constraints against the
  hardware limits. The A17 Pro delivers 35 TOPS at ~5W and features 8 GB of shared unified memory. If
  the new model variant requires 0.5 TOPS to process a single frame and its weights consume 15% of the
  total unified memory, calculate the maximum theoretical frame rate and the exact memory footprint.
details:
  realistic_solution: The correct approach is to calculate the maximum frame rate by dividing the total
    available compute by the compute required per frame, and to calculate the memory footprint by applying
    the percentage to the total shared memory. In a real canary deployment, these theoretical limits are
    compared against device telemetry (like thermal throttling or out-of-memory crashes) before widening
    the rollout to the next stage.
  common_mistake: Candidates often forget that the 8 GB unified memory is shared across the CPU, GPU,
    and Neural Engine, incorrectly assuming all 8 GB or the calculated footprint is isolated and safely
    available. They may also struggle to quickly divide the total TOPS by the per-frame requirement without
    a calculator.
  napkin_math: Maximum Frame Rate = Total Compute / Compute per frame = 35 TOPS / 0.5 TOPS/frame = 70
    FPS. Memory footprint = 15% of Total Memory = 0.15 * 8 GB = 1.2 GB. The model leaves 6.8 GB for the
    OS, foreground app, CPU, and GPU.
