title: LLM TPU Delegation vs CPU Fallback on Tensor G3
scenario: You are deploying a 2B parameter INT8 LLM to the Google Tensor G3 (12 GB LPDDR5X). You must
  choose between two TFLite conversion strategies. Option A maps all operators to standard TFLite ops
  for 100% Edge TPU delegation (7.5 TOPS), but unrolling a custom attention op increases model size to
  2.2B parameters. Option B retains the custom attention op, keeping the model at 2.0B parameters, but
  forces 30% of the model's compute to fall back to the CPU. Which strategy yields better token generation
  latency and why?
details:
  realistic_solution: Option A is the correct choice. The 12 GB LPDDR5X easily accommodates the 200MB
    memory increase (2.2GB total footprint in INT8). Avoiding CPU fallback is critical because alternating
    execution between the CPU and TPU for every token completely bottlenecks generation latency due to
    synchronization limits and the TPU's massive compute advantage (7.5 TOPS).
  common_mistake: Candidates often choose Option B to save memory or assume that 70% TPU delegation is
    'good enough', ignoring the massive latency penalty of CPU fallback and synchronization overhead in
    auto-regressive decoding.
  napkin_math: 'Compute per token is approx 4 GOPS (2B params * 2). Option A (TPU only): compute time
    = 4 GOPS / 7500 GOPS (7.5 TOPS) = 0.53ms per token. Option B (CPU fallback): 30% compute = 1.2 GOPS
    on CPU. Assuming an optimistic CPU throughput of 100 GOPS, CPU time alone is 1.2 / 100 = 12ms per
    token. Option B is at least 20x slower strictly on compute, ignoring severe CPU-TPU memory copy overheads.'
