title: The Dashcam's Duty Cycle
scenario: A dashcam app runs an ML inference pipeline that consumes 5W when active for 1 second every 10 seconds. It sleeps at 100mW for the other 9 seconds.
question: What is the average power consumption of a dashcam pipeline that runs at 5W for 1s and sleeps at 100mW for 9s?
details:
  realistic_solution: 'The correct way to calculate average power is to find the time-weighted average of the active and sleep states. The system is active for 10% of the time and in a low-power state for 90% of the time. The total energy consumed over a 10-second period is the sum of energy in each state, and average power is that total energy divided by the period duration.'
  common_mistake: |
    **The Pitfall:** Averaging the power values directly or ignoring sleep power.
    **The Rationale:** Engineers either calculate `(5 + 0.1) / 2 = 2.55W` or only scale the active power `5 * 0.1 = 0.5W`, missing the baseline draw.
    **The Consequence:** Inaccurate battery life projections that either overestimate drain or ignore idle leakage.
  napkin_math: |
    **Assumptions & Constraints:**
    - Active state: 5 W for 1 second (10% duty cycle).
    - Sleep state: 0.1 W (100 mW) for 9 seconds (90% duty cycle).
    - Total period: 10 seconds.

    **Calculations:**
    - Active Power Contribution: 5 W * 0.10 = 0.5 W.
    - Sleep Power Contribution: 0.1 W * 0.90 = 0.09 W.
    - Average Power: 0.5 W + 0.09 W = 0.59 W.

    **Conclusion & Interpretation:**
    - **Result: 0.59 W (Power-Bound)**. The time-weighted average power consumption is exactly 0.59 W.
  options:
  - '0.50 W'
  - '2.55 W'
  - '0.59 W'
  - '4.51 W'
