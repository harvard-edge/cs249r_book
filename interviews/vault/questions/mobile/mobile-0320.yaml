title: The Dashcam's Duty Cycle
scenario: You're designing a 'background recording' feature for a dashcam app on a smartphone. To conserve
  battery, the ML inference pipeline (which consumes 5W when active) only runs for 1 second every 10 seconds.
  During the other 9 seconds, the app is in a low-power monitoring state, consuming only 100mW. Explain
  the *average* power consumption of this feature.
details:
  realistic_solution: The correct way to calculate average power is to find the time-weighted average
    of the active and sleep power states. The system is active for 10% of the time and in a low-power
    state for 90% of the time. The total energy consumed over a 10-second period is the sum of energy
    in each state, and average power is that total energy divided by the period duration.
  common_mistake: 'Engineers often make one of two mistakes: 1) They only consider the active power and
    scale it by the duty cycle (e.g., 5W * 10% = 0.5W), completely ignoring the power consumed during
    the ''sleep'' state. 2) They average the power values directly ((5W + 0.1W) / 2), which ignores that
    the system spends most of its time in the low-power state.'
  napkin_math: 1. **Define States:** | `P_active` = 5 W | `P_sleep` = 100 mW = 0.1 W
  options:
  - 0.50 W
  - 2.55 W
  - 0.59 W
  - 4.51 W
  correct_index: 2
