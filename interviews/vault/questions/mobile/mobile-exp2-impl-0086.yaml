title: Deterministic Execution Timing for On-Device LLM Watchdog
scenario: You are deploying a safety-critical automotive voice command system using Gemini Nano on the
  Google Tensor G3. The safety certification requires a strict watchdog timer to trigger a fallback system
  if the on-device TPU fails to generate a response in time. Given the TPU's peak compute of 7.5 TOPS,
  if the LLM requires 15 giga-operations (GOPS) per token and the system must guarantee a 20-token emergency
  response, calculate the absolute minimum watchdog timeout value in milliseconds assuming 50% average
  TPU utilization due to memory bandwidth constraints on the 12 GB LPDDR5X.
question: "What watchdog timeout should guarantee a 20-token emergency LLM response on Tensor G3 at 50% TPU utilization?"
details:
  realistic_solution: The correct approach calculates the total operations required for the full emergency
    response sequence and divides it by the effective compute throughput. Since the Google Tensor G3 TPU
    operates at 7.5 TOPS but is memory-bound to 50% utilization for this workload, the effective throughput
    is 3.75 TOPS. The watchdog timer must be set slightly above this worst-case deterministic execution
    time to ensure it only triggers on actual hangs or hardware faults, satisfying safety certification
    requirements.
  common_mistake: Candidates often calculate the theoretical minimum time using the peak 7.5 TOPS without
    accounting for the realistic TPU utilization or memory bandwidth bottlenecks. They may also confuse
    the operations per token with total operations, leading to a watchdog timer that is far too aggressive
    and triggers false positives.
  napkin_math: 1. Total operations per token = 15 GOPS. 2. Total tokens required = 20 tokens. 3. Total
    operations = 15 GOPS/token * 20 tokens = 300 GOPS = 0.3 TOPS. 4. Effective TPU throughput = 7.5 TOPS
    * 0.50 (utilization) = 3.75 TOPS (or 3750 GOPS/sec). 5. Execution time = 300 GOPS / 3750 GOPS/sec
    = 0.08 seconds = 80 milliseconds. The absolute minimum watchdog timeout value must be 80 milliseconds.
