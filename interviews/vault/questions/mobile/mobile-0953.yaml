title: 'KV-Cache: Mastery — KV Cache Co-Design for Mobile LLM Architecture'
scenario: You are designing a new 1B LLM architecture specifically for Snapdragon 8 Gen 3 (45 TOPS INT8, 16GB, 68 GB/s) targeting 30 tok/sec at 4096-token context.
question: "How would you co-design the model architecture and KV cache management policy to meet the target?"
details:
  realistic_solution: 'Target: 30 tok/sec = 33.3ms per token. Bottleneck is weight loading plus KV reading. Given KV at 4096 context, work backward to architecture choices. Using GQA-8 with 32 layers balances the capacity perfectly.'
  common_mistake: |
    **The Pitfall:** Designing model depth/heads without working backward from memory bandwidth limits.
    **The Rationale:** Candidates often use standard desktop LLM dimension ratios, assuming TOPS is the main constraint.
    **The Consequence:** The model achieves high theoretical TOPS but fails real-world tok/sec targets because the KV cache is too large to stream over the memory bus every step.
  napkin_math: |
    - **Target Budget:** 30 tok/sec = 33.3ms per token.
    - **Baseline KV:** MHA at 24 layers, 16 heads = 196.6KB/token. At 4096 context = 786MB KV.
    - **GQA Optimization:** Switch to 32 layers with GQA-8 (8 KV heads, dim 128) = 32 * 2 * 8 * 128 * 2B = 131KB/token. At 4096 context = 537MB KV.
    - **Total Bandwidth Cost:** 500MB (INT4 weights) + 537MB (KV) = 1037MB per step.
    - **Final Result:** 1037MB / 68 GB/s = 15.2ms, safely allowing **~65 tok/sec**, completely crushing the 30 tok/sec requirement.
