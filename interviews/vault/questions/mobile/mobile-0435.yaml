title: 'The Smart Reply Latency Puzzle: NAS vs. MoE'
scenario: You're an ML systems engineer on a mobile AI team building an on-device 'smart reply' feature. The model must have a P99 latency under 20ms. To handle diverse conversation styles, one proposal is a small Mixture-of-Experts (MoE) model with 4 experts, where only the top 1 expert is activated per input. An alternative is a single, dense model discovered via Neural Architecture Search (NAS) for your target mobile SoC. Your profiler shows that while the MoE model has 75% fewer active parameters per inference, its total latency is 25ms, exceeding the budget. The NAS model, despite having more active parameters, meets the 20ms budget.
question: How would you diagnose why the theoretically-efficient MoE model is slower in practice on mobile hardware?
details:
  realistic_solution: The MoE model's latency budget is being spent on systems overhead, not useful computation. The core problem is the dynamic, data-dependent control flow. First, the gating network must run. Second, the CPU must interpret the gate's output. Third, the system must then dynamically load the weights for the chosen expert from main memory (LPDDR5) into the NPU's much faster local SRAM. This break in the execution pipeline, the CPU-NPU synchronization, and the latency of fetching a non-contiguous memory block for the expert weights add significant overhead. A NAS-discovered model is a single, monolithic graph. Its weights and instructions can be loaded once, allowing the NPU to execute it from start to finish without interruption, maximizing hardware utilization and hiding memory latency.
  common_mistake: |
    **The Pitfall:** Attributing the latency overhead to raw FLOPs, app binary size, or a bug where all experts are accidentally running.
    **The Rationale:** Candidates assume that lower active parameter count directly translates to lower latency, forgetting the systems overhead of dynamic control flow on mobile architectures.
    **The Consequence:** They fail to diagnose that dynamic expert routing requires costly CPU-NPU synchronization and non-contiguous memory fetches, breaking the execution pipeline.
  napkin_math: |
    1. **MoE Model Size:** Assume a 50M parameter model in INT8. 75% of parameters are in the experts, so one expert is 12.5M params (12.5 MB).
    2. **Memory Transfer:** Mobile LPDDR5 bandwidth is ~51 GB/s. Loading 12.5 MB takes 12.5 MB / 51,000 MB/s ≈ 0.24ms.
    3. **Systems Overhead:** The dynamic routing requires CPU-NPU synchronization. Gate network (~0.5ms) + CPU dispatch (~0.5ms) + cache-miss/dispatch overhead (~5-10ms).
    4. **Total MoE Latency:** Base compute + 0.24ms memory + ~10ms dispatch overhead ≈ 25ms.
    **Result:** The dense NAS model is a single contiguous graph with zero dispatch overhead, achieving **20ms**, while MoE is bottlenecked by **~10ms of dispatch and synchronization overhead**.
