title: 'The 16ms Jank Budget: Real-Time Deadlines'
scenario: You are designing an on-device generative AI feature for a mobile app. To ensure a smooth, 'jank-free'
  user experience on a standard 60 FPS screen, what is the approximate latency budget for any single frame's
  worth of computation, including model inference, to avoid causing UI stutter?
question: "What latency budget does a 60 FPS mobile UI give each frame to avoid jank?"
details:
  realistic_solution: A 60 FPS display refreshes 60 times per second. This gives a total budget of approximately
    16.67 milliseconds for everything the application needs to do to render a single frame. Any task,
    including model inference, that blocks the main UI thread must complete well within this window to
    prevent dropped frames, which are perceived by the user as 'jank' or stutter.
  common_mistake: Engineers without mobile experience often misjudge the strictness of UI deadlines. They
    might apply cloud-based latency targets (e.g., 100-200ms), which are acceptable for web requests but
    catastrophic for a 60 FPS render loop. Another common error is confusing the UI refresh rate with
    video frame rates (e.g., 30 FPS), leading to a budget that is 2x too slow.
  napkin_math: 'The calculation is a direct conversion from frequency (Hz) to period (time): 1 second /
    60 frames = 0.01667 seconds per frame, which is ~16.67 milliseconds.'
  options:
  - ~100 ms
  - ~33 ms
  - ~16 ms
  - ~1 ms
  correct_index: 2
