title: KV-Cache Sizing for On-Device LLMs
scenario: You are deploying a 1.8B parameter on-device LLM optimized for the Google
  Tensor G3 to support a local document summarization feature. The Tensor G3 features
  an on-device TPU capable of 7.5 TOPS and is equipped with 12 GB of shared LPDDR5X
  memory. However, to preserve user experience for foreground apps, the mobile OS
  enforces a strict 1.5 GB peak memory budget for background ML tasks. Design a KV-cache
  management strategy and calculate the maximum context length you can safely support
  under this memory pressure.
question: How would you design a KV-cache management strategy and calculate the maximum
  context length you can safely support under this memory pressure?
details:
  realistic_solution: The candidate should quantize the model weights to INT4 to fit
    the core model within the budget, reserving the remainder for activations and
    the KV-cache. They should recognize that server-side dynamic PagedAttention adds
    unnecessary overhead for deterministic edge TPUs, instead opting for a statically
    allocated ring buffer. By evaluating the use of GQA to reduce the number of KV
    heads, they can maximize the context window supported by the tight memory budget.
  common_mistake: Candidates often assume the full 12 GB LPDDR5X is available for
    the model, ignoring mobile OS background app limits. They also frequently miscalculate
    the per-token memory footprint by forgetting the factor of 2 for keys and values,
    or they fail to propose Grouped-Query Attention (GQA) to drastically reduce the
    cache size.
  napkin_math: '1. System context: Despite 12 GB LPDDR5X total, we are constrained
    to a 1.5 GB app budget.

    2. Weights (1.8B params @ INT4): 1.8B * 0.5 bytes = 0.9 GB (900 MB).

    3. Remaining Budget: 1.5 GB - 0.9 GB (weights) - 0.1 GB (TPU workspace) = 500
    MB available for KV-cache.

    4. KV-cache per token assuming FP16, 32 layers, 4 KV heads (GQA), 128 head dim:
    2 (K+V) * 32 (layers) * 4 (heads) * 128 (dim) * 2 bytes = 65,536 bytes.

    5. Maximum Context Length: 500,000,000 bytes / 65,536 bytes/token = ~7,629 tokens.'
