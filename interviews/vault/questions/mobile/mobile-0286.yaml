title: The Dashcam Battery Drain
scenario: You're a developer on a connected car platform, and your team owns the 'smart dashcam' feature that runs on the user's phone. Users are complaining that a 30-minute commute drains their battery significantly. Your telemetry shows that when the perception model is active, the phone's SoC draws an average of 4 Watts.
question: "Assuming a typical high-end smartphone has a 20 Watt-hour battery, what percentage of the battery is consumed during this 30-minute drive?"
details:
  realistic_solution: The correct approach is to first calculate the total energy consumed and then compare it to the battery's total capacity. The SoC consumes 4 Watts (which is 4 Joules per second). Over a 30-minute (0.5 hour) period, the total energy consumed is Power × Time. This equals 4 W × 0.5 h = 2 Wh. With a total battery capacity of 20 Wh, the drain is (2 Wh / 20 Wh) = 0.10, or 10%. This is a substantial drain and explains the user complaints, highlighting the need for power optimization, such as duty cycling.
  common_mistake: |
    **The Pitfall:** Confusing power (a rate, in Watts) with energy (an amount, in Watt-hours).
    **The Rationale:** Candidates often incorrectly divide the power draw directly by the battery capacity without accounting for the time duration, or they make a unit conversion error between minutes and hours.
    **The Consequence:** Incorrectly calculating battery drain percentage, leading to severe misdiagnosis of power issues.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Active Power: 4W on the mobile SoC.
       - Commute Time: 30 minutes (0.5 hours).
       - Battery Capacity: 20 Wh.
    2. **Calculations:**
       - Energy Used = 4W * 0.5h = 2 Watt-hours (Wh).
       - Battery Drain = 2 Wh / 20 Wh = 0.10.
    3. **Conclusion & Interpretation:**
       - **Result: Power-Bound (10% Drain)**
  options:
  - 20%
  - 5%
  - 10%
  - 2%
  correct_index: 2
