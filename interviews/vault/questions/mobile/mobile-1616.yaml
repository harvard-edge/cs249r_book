title: Hardware-Aware NAS for Real-time Mobile AR
scenario: You are deploying a real-time semantic segmentation model for an AR application. The application requires the model to run consistently at 30 FPS while minimizing power consumption.
question: "How would you design a hardware-aware NAS search for real-time AR segmentation on the Snapdragon 8 Gen 3 Hexagon NPU?"
details:
  realistic_solution: Design a Hardware-Aware Neural Architecture Search (HW-NAS). Utilize a multi-objective cost function balancing accuracy against parameterized hardware lookup tables for NPU-specific instruction latencies and DRAM access costs. Prioritize depthwise separable convolutions.
  common_mistake: |
    **The Pitfall:** Relying solely on FLOPs as a proxy for latency or energy efficiency.
    **The Rationale:** Candidates often use standard cloud NAS metrics, ignoring memory access patterns, NPU-specific instruction sets, and quantization impacts.
    **The Consequence:** The NAS discovers a model that has low FLOPs but is highly inefficient on actual mobile hardware due to poor memory locality and unsupported operations.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - NPU: 45 TOPS INT8.
       - Target: 30 FPS.
       - Memory bandwidth: 50-70 GB/s.
    2. **Calculations:**
       - Max ops per frame = 45 TOPS / 30 = 1.5 TOPS/frame.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound**. The search space must ruthlessly constrain ops per frame to < 1.5 TOPS and penalize excessive DRAM round-trips.
