title: Hardware-Aware NAS for Real-time Mobile AR
scenario: You are tasked with deploying a real-time semantic segmentation model for an augmented reality (AR) application on a flagship mobile device. The target hardware is equipped with a Snapdragon 8 Gen 3 Hexagon NPU, which boasts 45 TOPS for INT8 operations and is coupled with 12-16 GB of LPDDR5X memory. The application requires the model to run consistently at 30 FPS while minimizing power consumption.
question: "How would you design a hardware-aware NAS search for real-time AR segmentation on the Snapdragon 8 Gen 3 Hexagon NPU?"
details:
  realistic_solution: 'Create a constrained search space focusing on operations efficient on the Hexagon NPU (e.g., depthwise separable convolutions). Develop an accurate, lightweight predictor for latency, memory footprint, and energy consumption. Define a multi-objective function balancing accuracy with predicted latency/energy, and integrate quantization-aware training directly into the NAS loop.'
  common_mistake: |
    **The Pitfall:** Relying solely on FLOPs as a proxy for latency or energy efficiency.
    **The Rationale:** Candidates often use standard cloud NAS metrics, ignoring memory access patterns, NPU-specific instruction sets, and quantization impacts.
    **The Consequence:** The NAS discovers a model that has low FLOPs but is highly inefficient on actual mobile hardware due to poor memory locality and unsupported operations.
  napkin_math: |
    - **Max NPU Ops per Frame:** 45 TOPS (INT8) and 30 FPS means the NPU can theoretically execute 45 * 10^12 / 30 = 1.5 * 10^12 INT8 ops per frame.
    - **Memory Bandwidth:** LPDDR5X offers ~50-70 GB/s. A model with a 10MB activation footprint that is read/written frequently must have its data movement estimated to prevent saturating the memory bus.
    - **Final Result:** The search space must ruthlessly constrain **ops per frame to < 1.5 TOPS** and penalize excessive DRAM round-trips to preserve the 30 FPS budget.
