title: CI/CD Pipeline Design for On-Device LLM on Tensor G3
scenario: Your team needs to design an automated deployment pipeline for regular updates to an on-device LLM. The pipeline must guarantee that the quantized model maintains strict training-serving consistency.
question: What CI/CD checks catch LLM latency, memory, and consistency regressions before OTA release?
details:
  realistic_solution: Mobile MLOps demands physical validation. The CI/CD pipeline absolutely must incorporate a Hardware-In-The-Loop (HITL) stage. Relying on x86 emulators is fatal for edge models. The pipeline must compile the INT4 weights explicitly for the Edge TPU compiler, deploy to physical device farms, and assert physical latency profiles while strictly monitoring peak KV-cache memory inflation to prevent OS OOM kills.
  common_mistake: |
    **The Pitfall:** Designing purely generic software CI/CD pipelines that validate model accuracy solely via cloud-based x86 simulators.
    **The Rationale:** Engineering teams port standard cloud DevOps practices without accounting for the wild variability of edge compiler hardware.
    **The Consequence:** They entirely fail to catch post-training quantization drift on the specific TPU silicon, resulting in catastrophic training-serving skew and massive latency regressions upon OTA deployment.
  napkin_math: |
    **Assumptions & Constraints:**
    - Total RAM: 12 GB.
    - OS Reservation: 6 GB (App ceiling 6 GB).
    - Model size: 3.2B parameters (INT4).
    - Target Generation SLA: 20 tokens/sec.

    **Calculations:**
    - Weight footprint: 3.2B * 0.5 bytes = 1.6 GB.
    - Headroom for KV/App: 6.0 GB - 1.6 GB = 4.4 GB.
    - Compute per token: 3.2B * 2 MACs = 6.4 GOPS.
    - Sustained compute: 6.4 GOPS * 20 tok/sec = 128 GOPS = 0.128 TOPS.

    **Conclusion & Interpretation:**
    - **Result: Compute-Bound Verification**. The 0.128 TOPS demand is trivial for the hardware, but verifying exact operator execution via physical Hardware-in-the-Loop (HITL) CI prevents catastrophic quantization failure in production.
