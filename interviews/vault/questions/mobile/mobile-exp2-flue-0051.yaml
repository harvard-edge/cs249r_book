title: On-Device Guardrail Latency and Memory
scenario: You are deploying an on-device text assistant on a device powered by the Samsung Exynos 2400.
  To satisfy organizational guardrails and safety assessments, a 1-billion parameter toxicity classifier
  (quantized to INT8) must process the 128-token output of the main generative model before displaying
  it to the user. Given the NPU's 34.7 TOPS peak throughput and the shared 12 GB LPDDR5X memory pool,
  calculate both the memory footprint of the safety model and the theoretical minimum compute latency
  for this safety check.
question: "What memory footprint and theoretical compute latency does a 1B INT8 Exynos guardrail classifier require?"
details:
  realistic_solution: Calculate the static memory footprint using 1 byte per parameter for INT8, recognizing
    this 1 GB chunk reduces the memory available for the primary LLM and system tasks. Then, use the standard
    2*N*P formula to find the required operations and divide by the NPU's peak TOPS to find the theoretical
    compute-bound latency, while acknowledging that memory bandwidth will likely be the true bottleneck
    in practice.
  common_mistake: Candidates often forget that the 12 GB LPDDR5X is shared across the CPU, GPU, NPU, and
    ISP, assuming they have the full 12 GB available for ML models. They also frequently miscalculate
    transformer operations or fail to convert 34.7 TOPS into a usable GOPS figure for latency calculation.
  napkin_math: '1. Model Memory Footprint: 1 billion parameters * 1 byte/parameter (INT8) = 1 GB. This
    consumes ~8.3% of the shared 12 GB LPDDR5X pool.

    2. Total Compute Operations: 2 * 128 tokens * 1 billion parameters = 256 Giga-Operations (GOPS).

    3. Peak Compute Latency: 256 GOPS / 34,700 GOPS (34.7 TOPS from the Exynos 2400 NPU) = ~0.00737 seconds,
    or 7.37 milliseconds.'
