title: Optimizing On-Device ML with Coreset Selection on Apple A17 Pro
scenario: Your team is developing a next-generation on-device recommendation system for an application
  running on devices powered by the Apple A17 Pro chip (featuring a 35 TOPS Neural Engine, ~5W power budget,
  and 8 GB unified memory). The initial training dataset is prohibitively large for frequent on-device
  fine-tuning or model personalization, leading to slow update cycles and high energy consumption. You
  need to implement a strategy to significantly reduce the data footprint required for effective model
  updates on the device without compromising performance, specifically focusing on the challenges posed
  by the A17 Pro's mobile constraints.
details:
  realistic_solution: Implement a coreset selection algorithm, such as k-centers clustering or active
    learning-based selection, to identify the most representative and informative subsets of the data
    for on-device personalization. The algorithm should prioritize data points that minimize model uncertainty
    or maximize coverage of the feature space, specifically considering the A17 Pro's 8 GB unified memory
    limit and the need to keep the coreset size manageable for its 35 TOPS Neural Engine for efficient
    processing. Leverage the Neural Engine for accelerated coreset selection computations if feasible,
    or ensure the selection process is lightweight enough for the power budget.
  common_mistake: A common mistake would be to simply downsample the data randomly or to use naive heuristic-based
    pruning without a clear metric for information retention. This often leads to discarding critical
    edge cases or unique data points, resulting in reduced model generalization and increased bias, ultimately
    degrading the user experience on the constrained A17 Pro hardware.
  napkin_math: If the full dataset is 100 GB and we aim for a 1% coreset for on-device updates, this means
    reducing data from 100,000 MB to 1,000 MB (1 GB). With the A17 Pro's 8 GB unified memory, this 1 GB
    coreset is easily manageable for loading. If processing each data point for coreset selection takes
    1ms, and we need to process 100 GB (assuming 1MB/point for simplicity, so 100,000 points), the total
    selection time would be approximately 100,000 * 1ms = 100 seconds (1.6 minutes). This is a feasible
    one-time or infrequent pre-processing step, or if done on-device, needs to be highly optimized or
    batched for the ~5W power budget.
