title: Architecting Memory-Mapped Inference for Gemini Nano on Tensor G3
scenario: You are tasked with deploying Gemini Nano on the Google Tensor G3, which features an on-device
  TPU with 7.5 TOPS and 12 GB of LPDDR5X RAM. The model needs to be available instantly across multiple
  system applications (like Messages and Recorder) without duplicating its memory footprint. Design a
  memory-mapped weight loading strategy that guarantees zero cold-start delay for these apps while respecting
  the tight memory constraints of the shared 12 GB RAM pool.
details:
  realistic_solution: The ideal design leverages `mmap` with `MAP_SHARED` to map the model weights directly
    from storage into virtual memory. The Tensor G3's TPU can then access these shared memory pages directly
    without intermediate copying. A background system service should pin the most critical initial layers
    in memory using `mlock` to ensure instant first-token generation, while the rest of the model is paged
    in on-demand, allowing multiple apps to share the exact same physical memory pages.
  common_mistake: Candidates often suggest loading the entire model into RAM for each application process,
    ignoring the limited 12 GB LPDDR5X memory pool, leading to out-of-memory errors and OS-level app kills.
    They might also propose standard file I/O reads instead of memory mapping, failing to address the
    zero cold-start delay requirement.
  napkin_math: Assuming Gemini Nano is a 3.2B parameter model quantized to 4-bit (int4), the weight size
    is 3.2B * 0.5 bytes = 1.6 GB. If 3 apps (Messages, Recorder, Gboard) load it separately, it consumes
    4.8 GB (40% of the 12 GB LPDDR5X). Using a shared `mmap`, the physical memory footprint remains strictly
    1.6 GB (only 13.3% of the 12 GB RAM), saving 3.2 GB for other OS processes.
