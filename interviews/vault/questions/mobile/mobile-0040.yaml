title: The User Consent Minefield
scenario: Your fitness app wants to use on-device federated learning to improve its activity recognition
  model. The model trains locally on the user's accelerometer data and only sends gradient updates to
  the server. Your legal team says you still need explicit user consent under GDPR. Your PM argues 'the
  data never leaves the device, so GDPR doesn't apply.' Who's right?
question: "' Who's right?"
details:
  realistic_solution: 'The PM is wrong. GDPR applies to processing, not just transmission. On-device training
    is processing under Article 4(1). Gradient updates are derived from personal data and constitute personal
    data. Expect ~35% opt-in for health data = 175K from 500K DAU. At 1% sampling: 1,750 devices per round
    — convergence possible but 5-6x slower. GDPR fine: up to 4% of global revenue or 20M EUR. The 35-minute
    consent implementation is the cheapest insurance you''ll buy.'
  common_mistake: '"Data stays on-device, so no consent needed." GDPR applies to *processing* of personal
    data, not just *transmission*. On-device training is processing. Gradient updates, even noised, are
    derived from personal data and constitute personal data under GDPR Article 4(1).'
  napkin_math: 'User base: 500K DAU. Opt-in rate (health data): 35% = 175K participating devices. Minimum
    for federated learning convergence: 10,000 devices per round at 1% sampling = need 1M eligible. With
    175K eligible: 1% sampling = 1,750 per round. Convergence: possible but 5-6× slower than with full
    participation. Gradient noise at 1,750 devices: σ/√1,750 = 0.024 (acceptable). GDPR fine for non-compliance:
    up to 4% of global revenue or €20M.'
