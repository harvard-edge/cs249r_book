title: The Watchdog's Power Tax
scenario: Your team has built a 'Personal Safety' app that continuously listens for a wake-word. To ensure this critical process doesn't silently crash, you've implemented a watchdog timer. The timer wakes the CPU for a 50-millisecond health check every 5 minutes. During this brief check, the CPU consumes 50 mW, but state transitions add overhead.
question: How much energy does a watchdog timer consume per day when it wakes for 50ms every 5 minutes at 50mW, accounting for wake-up overhead?
details:
  realistic_solution: The correct approach is to first calculate the total number of watchdog checks in a day, then find the total 'active' time, multiply that by the power consumption, and add the C-state transition overhead.
  common_mistake: |
    **The Pitfall:** Underestimating the cumulative energy cost of frequent, short wakeups.
    **The Rationale:** Engineers often calculate only the active power usage, ignoring the C-state transition costs.
    **The Consequence:** This leads to answers off by orders of magnitude and results in "death by a thousand cuts" for device battery life.
  napkin_math: |
    - **Checks per day:** (24h × 60min/h) / 5min = 288 checks
    - **Total active time:** 288 checks × 50ms = 14,400 ms = 14.4 seconds
    - **Active Energy:** 50 mW × 14.4s = 0.72 J
    - **Wake-up Overhead:** Each CPU wake-up costs ~10 mJ in state restoration and cache warming.
    - **Transition Energy:** 288 wakeups × 10 mJ = 2.88 J/day
    - **Total Energy per day:** 0.72 J + 2.88 J = **3.6 J/day**
  options:
  - 720 J
  - 0.03 J
  - 3.6 J
  - 14.4 J
  correct_index: 2
