title: The Watchdog's Power Tax
scenario: Your team has built a 'Personal Safety' app that continuously listens for a wake-word. A watchdog timer wakes the CPU for a 50-millisecond health check every 5 minutes. The CPU consumes 50 mW, but state transitions add overhead.
question: How much energy does a watchdog timer consume per day when it wakes for 50ms every 5 minutes at 50mW, accounting for wake-up overhead?
details:
  realistic_solution: Accurately calculating power draw mandates separating active execution energy from hardware transition energy. The engineer must calculate the total daily checks, determine total active time multiplied by wattage, and critically, add the massive aggregate C-state transition penalty required to drag the SoC out of Deep Sleep for every single ping.
  common_mistake: |
    **The Pitfall:** Underestimating or totally omitting the cumulative energy cost of frequent, short hardware wake-ups.
    **The Rationale:** Engineers focus strictly on active power consumption, mechanically ignoring the costly C-state transition physics of mobile silicon.
    **The Consequence:** Calculations are off by an order of magnitude, resulting in "death by a thousand cuts" and causing the app to silently devour the device's battery in the background.
  napkin_math: |
    **Assumptions & Constraints:**
    - Wake interval: Every 5 minutes.
    - Active duration: 50 ms.
    - Active CPU Power: 50 mW.
    - Wake-up C-state overhead: 10 mJ per transition.

    **Calculations:**
    - Checks per day: (24h * 60m) / 5m = 288 checks.
    - Total active time: 288 * 50 ms = 14,400 ms = 14.4 seconds.
    - Active execution energy: 50 mW * 14.4 s = 0.72 Joules.
    - Transition overhead energy: 288 * 10 mJ = 2.88 Joules.
    - Total Energy: 0.72 J + 2.88 J = 3.60 Joules.

    **Conclusion & Interpretation:**
    - **Result: Power-Bound**. C-state transition overhead completely dominates the energy budget. Frequent, short wake-ups are fundamentally hostile to mobile battery life.
  options:
  - 0.72 J (Ignores C-state wake-up overhead entirely)
  - 2.88 J (Calculates only the wake-up overhead)
  - 3.60 J (Correctly adds active execution and wake-up overhead)
  - 14.40 J (Incorrect unit conversion trap)
  correct_index: 2
