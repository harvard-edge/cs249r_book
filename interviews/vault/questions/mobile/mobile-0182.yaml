title: The Watchdog's Power Tax
scenario: Your team has built a 'Personal Safety' app that continuously listens for a wake-word. To ensure
  this critical process doesn't silently crash, you've implemented a watchdog timer. The timer wakes the
  CPU for a 50-millisecond health check every 5 minutes. During this brief check, the CPU consumes 50
  mW.
details:
  realistic_solution: The correct approach is to first calculate the total number of watchdog checks in
    a day, then find the total 'active' time, and finally multiply that by the power consumption, ensuring
    all units are in base form (Seconds, Watts, Joules).
  common_mistake: Engineers often underestimate the cumulative energy cost of frequent, short wakeups.
    They might miscalculate the total number of checks or make unit conversion errors between milliwatts/watts
    and milliseconds/seconds, leading to an answer that is off by orders of magnitude.
  napkin_math: "Checks per day: (24h × 60min/h) / 5min = 288 checks\n\n1. **Total active time per day:**\n\
    \   288 checks × 50ms/check = 14,400 ms = 14.4 seconds\n\n2. **Energy per day from watchdog:**\n \
    \  50 mW × 14.4s = 0.72 J = 0.0002 Wh\n\n3. **Context — why this still matters:**\n   While 0.72 J/day\
    \ seems negligible, the real cost is the *wake-up overhead*, not the check itself. Each CPU wake-up\
    \ from deep sleep (C-state transition) costs ~5–10 mJ in state restoration and cache warming, adding:\n\
    \   - 288 wakeups × 10 mJ = 2.88 J/day in transition energy\n   - Total: 0.72 + 2.88 = **3.6 J/day**\n\
    \n4. **Battery impact:**\n   A typical phone battery is ~15 Wh = 54,000 J.\n   - Watchdog drain: 3.6\
    \ J/day → negligible (0.007% of battery)\n   - But if 50 background services each do this: 50 × 3.6\
    \ = 180 J/day → 0.33% of battery\n   - Over a week: 2.3% of battery just from watchdog timers\n\n\
    5. **The lesson:** Individual watchdog timers are cheap, but they don't compose linearly. The real\
    \ 'power tax' is the aggregation of dozens of independent wake timers preventing the CPU from staying\
    \ in deep sleep, which is why mobile OSes batch and coalesce timer wakeups."
  options:
  - 720 J
  - 0.03 J
  - 0.72 J
  - 14.4 J
  correct_index: 2
