title: 'Network Bandwidth Bottlenecks: Realize LPDDR5X Bandwidth Budget for Full Mobile AI Stack'
scenario: 'Concretely compute the LPDDR5X bandwidth consumption for each component of a full mobile AI
  stack on Snapdragon 8 Gen 3 (77 GB/s): display rendering (1080p 120Hz), camera ISP (4K 30fps), speech
  recognition (always-on, 10ms windows), and background LLM prefetch (3B INT4, 1 prefill per 30s). Size
  each and verify total < 77 GB/s.'
details:
  realistic_solution: 'Display: 1080p 120Hz framebuffer write: 1920×1080×4B×120=0.996GB/s + GPU compositing
    (3 layers): 3×0.996=3GB/s total display. Camera ISP (4K 30fps YUV420): 4096×2160×1.5×30=0.4GB/s. Speech
    (10ms window every 10ms, 1B INT8=1GB model): 1GB×100/s ... no: ASR runs 1 pass per 10ms (100Hz). 1B
    model: bandwidth per pass = model_weights = 1GB? Too much for 100Hz. ASR at 100Hz: each pass reads
    entire model: 100×1GB=100GB/s impossible. Reality: ASR does streaming with 10ms frames via RNN/LSTM,
    only reading ~100KB active weights per frame: 100KB×100Hz=10MB/s. LLM prefill every 30s: prefill 256
    tokens, 1.5GB weights: 1.5GB/prefill_time. Prefill ~27ms: 1.5/0.027=55.6GB/s for 27ms every 30s=0.05GB/s
    average. Total: 3+0.4+0.01+0.05=3.46GB/s ✓.'
  common_mistake: Not accounting for display bandwidth including GPU compositing passes, which can be
    2-4× the raw framebuffer writes.
  napkin_math: 'Display: 3GB/s. ISP: 0.4GB/s. ASR streaming: 10MB/s=0.01GB/s. LLM prefill avg: 1.5GB/30s=0.05GB/s.
    Background: 0.5GB/s misc. Total: 3.96GB/s of 77GB/s = 5.1%. Mobile AI stack at idle uses <6% of memory
    bandwidth. Leaves 94% for foreground tasks. When LLM decoding (76.9GB/s): total=76.9+0.4+0.01+3=80.3GB/s
    > 77GB/s → reduce display to 60Hz (1.5GB/s): 78.3GB/s. Still over. Pause display refresh? iOS/Android
    always maintain display. Need display at 60Hz: 78.3-0=... at 60Hz compositing: 1.5GB/s. 76.9+1.5+0.4+0.01=78.8GB/s
    > 77GB/s. Close. In practice: 77GB/s sustained with some saturation.'
