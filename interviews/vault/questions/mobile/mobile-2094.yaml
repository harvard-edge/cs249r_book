title: Analyzing Latency of Cold-Swapping NPU SRAM
scenario: An NLP app on a Snapdragon 8 Gen 3 switches between a 1GB translation model and a 1GB summarization model sequentially.
question: Analyze the latency implications of cold-swapping these models into the NPU's SRAM versus co-residing them in main memory.
details:
  realistic_solution: Cold-swapping 1GB into SRAM over an 80GB/s memory bus introduces a strict 12.5ms minimum context switch delay. Co-residing them in main LPDDR5 avoids the cold-boot spike entirely, at the slight expense of per-token memory fetch latency.
  common_mistake: |
    **The Pitfall:** Focusing only on peak TOPS and ignoring the massive macro-latency spike of an SRAM cold-boot over the memory bus.
    **The Rationale:** Candidates often get tunnel vision on compute limits and forget that loading a full model into SRAM block-by-block takes physical time.
    **The Consequence:** Proposing an architecture that hits a strict 12.5ms penalty on every context switch, missing real-time deadlines.
  napkin_math: |
    1. **Identify the transfer size:** 1GB model weight.
    2. **Identify the memory bandwidth:** 80GB/s (Snapdragon memory bus).
    3. **Calculate the swap time:** 1GB / 80GB/s = 0.0125 seconds.
    4. **Convert to milliseconds:** 0.0125s * 1000 = **12.5ms**.
