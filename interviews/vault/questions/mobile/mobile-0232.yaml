title: The Mobile Generative UI Latency Trap
scenario: 'You''re building a ''Magic Eraser'' feature on a new smartphone. The on-device generative model
  takes **150ms** to process a single user selection. To improve overall performance, your teammate proposes
  a batching strategy: processing a batch of up to 4 selections takes a total of **300ms** due to better
  NPU utilization. What is the time-to-last-result for a user queueing 3 edits sequentially vs. batching
  them, and what is the trade-off?'
question: "For Magic Eraser, is three sequential 150ms edits or one 300ms batch better for time-to-last-result and UX?"
details:
  realistic_solution: 'For 3 sequential edits, the time-to-last-result is 3 * 150ms = 450ms. With batching, a batch of up to 4 items takes 300ms, so 3 edits take 300ms. This question tests the fundamental trade-off between latency and throughput. Serial processing gives the fastest time-to-first-result (150 ms), which matters for interactive UX. Batching gives better throughput, which matters for bulk operations. For a ''Magic Eraser'' feature where the user makes one selection at a time, serial is correct — 150 ms is imperceptible. Only switch to batching if the user queues multiple edits (e.g., ''erase all selected objects'').'
  common_mistake: Engineers often focus solely on maximizing throughput (edits per second) and forget
    about the interactive latency perceived by the user. A common error is assuming batch processing time
    scales linearly with the number of items (e.g., if a batch of 4 takes 300ms, a batch of 3 must take
    225ms), ignoring the fixed overhead that batching helps amortize. Another mistake is comparing the
    completion time of the first item in a serial queue to the completion time of the last item in a batch.
  napkin_math: '**Given:** Single inference: 150 ms. Batch of up to 4: 300 ms total. | **No-Batching (Serial, 3 requests):** Each processed sequentially. First result at 150 ms, second at 300 ms, last result at 3 x 150 = **450 ms.** | **Batching (batch of 3):** Processed together in a single batch (takes 300 ms as any batch up to 4 takes 300 ms). First result at **300 ms**. Last result at **300 ms.** | **UX recommendation:** For interactive editing (user waiting for each result), serial is better — 150 ms to first result feels instant. For bulk operations, batching is better — finishes 3 requests in 300ms instead of 450ms.'
  options:
  - 450ms (no-batch) vs. 450ms (batch); batching is always better.
  - 150ms (no-batch) vs. 300ms (batch); no-batching is better for throughput.
  - 450ms (no-batch) vs. 300ms (batch); no-batching provides a faster 150ms time-to-first-result.
  - 450ms (no-batch) vs. 225ms (batch); batching time scales linearly.
  correct_index: 2
