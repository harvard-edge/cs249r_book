title: The Mobile Generative UI Latency Trap
scenario: You're building a 'Magic Eraser' feature. A single user selection takes 150ms. A batch of up to 4 selections takes 300ms. A user queues 3 edits sequentially.
question: For time-to-last-result, is it faster to process 3 sequential 150ms edits or one 300ms batch?
details:
  realistic_solution: 'For 3 sequential edits, the time-to-last-result is 3 * 150ms = 450ms. With batching, a batch of up to 4 items takes 300ms, so 3 edits take 300ms. This question tests the fundamental trade-off between latency and throughput. Serial processing gives the fastest time-to-first-result (150 ms), which matters for interactive UX. Batching gives better throughput, which matters for bulk operations. For a ''Magic Eraser'' feature where the user makes one selection at a time, serial is correct — 150 ms is imperceptible. Only switch to batching if the user queues multiple edits (e.g., ''erase all selected objects'').'
  common_mistake: |
    **The Pitfall:** Assuming batch processing time scales linearly with the number of items.
    **The Rationale:** Engineers mistakenly divide the max batch time by capacity (300ms / 4 = 75ms) and assume a batch of 3 takes 225ms.
    **The Consequence:** Incorrectly analyzing latency trade-offs and potentially choosing suboptimal processing strategies for interactive UI.
  napkin_math: |
    - **Sequential (No Batching):** 3 edits * 150ms = 450ms.
    - **Batching (Batch of 3):** Any batch up to 4 takes 300ms total.
    - **Time Savings:** 450ms - 300ms = 150ms.
    - **Result:** Batching completes all three tasks **150ms faster** (300ms vs 450ms).
  options:
  - 450ms (no-batch) vs. 450ms (batch); batching is always better.
  - 150ms (no-batch) vs. 300ms (batch); no-batching is better for throughput.
  - 450ms (no-batch) vs. 300ms (batch); no-batching provides a faster 150ms time-to-first-result.
  - 450ms (no-batch) vs. 225ms (batch); batching time scales linearly.
  correct_index: 2
