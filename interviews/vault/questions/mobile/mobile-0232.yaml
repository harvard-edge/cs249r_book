title: The Mobile Generative UI Latency Trap
scenario: 'You''re building a ''Magic Eraser'' feature on a new smartphone. The on-device generative model
  takes **150ms** to process a single user selection. To improve overall performance, your teammate proposes
  a batching strategy: processing a batch of up to 4 selections takes a total of **300ms** due to better
  NPU utilization. What is the time-to-last-result for a user queueing 3 edits sequentially vs. batching
  them, and what is the trade-off?'
details:
  realistic_solution: 'This question tests the fundamental trade-off between latency and throughput. Serial
    processing gives the fastest time-to-first-result (150 ms), which matters for interactive UX. Batching
    gives 2x throughput (13.3 vs 6.67 edits/sec), which matters for bulk operations. The key insight:
    batching improves throughput by amortizing fixed NPU dispatch overhead, but it hurts perceived responsiveness
    because the user must wait for the entire batch. For a ''Magic Eraser'' feature where the user makes
    one selection at a time, serial is correct — 150 ms is imperceptible. Only switch to batching if the
    user queues multiple edits (e.g., ''erase all selected objects'').'
  common_mistake: Engineers often focus solely on maximizing throughput (edits per second) and forget
    about the interactive latency perceived by the user. A common error is assuming batch processing time
    scales linearly with the number of items (e.g., if a batch of 4 takes 300ms, a batch of 3 must take
    225ms), ignoring the fixed overhead that batching helps amortize. Another mistake is comparing the
    completion time of the first item in a serial queue to the completion time of the last item in a batch.
  napkin_math: '**Given:** Single inference: 150 ms. Batch of 4: 300 ms total (75 ms/item amortized).
    | **No-Batching (Serial, 4 requests):** Each processed sequentially. First result at: 150 ms. Last
    result at: 4 x 150 = **600 ms.** Throughput: 4 / 600 ms = **6.67 edits/sec.** | **Batching (batch=4):**
    All 4 processed together. First result at: **300 ms** (must wait for entire batch). Last result at:
    **300 ms.** Throughput: 4 / 300 ms = **13.3 edits/sec.** | **The trade-off:** Throughput: Batching
    wins — 2x higher (13.3 vs 6.67 edits/sec). Latency to first result: Serial wins — 150 ms vs 300 ms
    (2x faster first response). | **For 3 requests (interpolating):** Serial: 3 x 150 = 450 ms. Batch-of-3
    (estimated): overhead + compute ≈ 250-275 ms (sublinear scaling between 150 and 300). | **UX recommendation:**
    For interactive editing (user waiting for each result), serial is better — 150 ms feels instant. For
    bulk operations (apply filter to album), batching is better — 2x throughput. Hybrid: process first
    request immediately (150 ms), batch subsequent requests.'
  options:
  - 450ms (no-batch) vs. 450ms (batch)
  - 150ms (no-batch) vs. 300ms (batch)
  - 450ms (no-batch) vs. 300ms (batch)
  - 450ms (no-batch) vs. 225ms (batch)
