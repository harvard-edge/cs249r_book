title: On-Device Translation Architecture on Tensor G3
scenario: You are tasked with designing a real-time, on-device live translation feature for a mobile device
  powered by the Google Tensor G3. The system must process streaming audio, translate it, and output text
  with strict latency constraints. Given the Tensor G3's on-device TPU with 7.5 TOPS and 12 GB of shared
  LPDDR5X memory, evaluate the architectural tradeoffs between deploying a single unified on-device LLM
  (like Gemini Nano) versus a specialized encoder-decoder architecture for this specific task.
details:
  realistic_solution: The optimal design uses a specialized encoder-decoder architecture for translation
    rather than a general-purpose decoder-only LLM. An encoder-decoder model processes the source text
    through the encoder once, and the decoder attends to these dense representations, which is highly
    efficient on the TPU. This minimizes the KV cache memory footprint compared to a decoder-only model,
    ensuring the system stays well within the available LPDDR5X memory limits while maintaining high utilization
    of the 7.5 TOPS compute budget.
  common_mistake: Candidates often immediately choose a unified decoder-only LLM like Gemini Nano for
    its generalized capabilities without analyzing the memory bandwidth bottlenecks or the KV cache overhead
    during autoregressive decoding. They fail to recognize that specialized encoder-decoder models can
    be more efficient for strict seq2seq tasks like translation.
  napkin_math: For a 1.8B parameter Gemini Nano (decoder-only) at 4-bit quantization, the model weights
    consume ~0.9 GB of the 12 GB LPDDR5X. Generating 50 translation tokens requires roughly 2 * 1.8B *
    50 = 180 GOPs. At 7.5 TOPS, compute time is 180 / 7500 = 24ms, but memory bandwidth will bottleneck
    this. Conversely, a 400M parameter encoder-decoder model at 8-bit takes 400 MB. The encoder computes
    in one pass, and the decoder's cross-attention KV cache scales only with the input length, saving
    >50% of the memory footprint and bandwidth compared to the causal self-attention of the decoder-only
    approach.
