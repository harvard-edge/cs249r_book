title: Evaluating Attention Variants for Exynos 2400 NPU
scenario: You are designing an on-device LLM for the Samsung Exynos 2400 NPU (34.7
  TOPS, dual-core NPU, 12 GB shared LPDDR5X memory). The product requires supporting
  a 4K context window for document summarization. You must choose between Multi-Head
  Attention (MHA), Grouped-Query Attention (GQA), and Multi-Query Attention (MQA)
  for the deployment. Evaluate the memory bandwidth and compute tradeoffs for each
  variant during the decoding phase and recommend the best architecture for this specific
  SoC.
question: How would you evaluate the memory bandwidth and compute tradeoffs for each
  variant during the decoding phase and recommend the best architecture for this specific
  SoC?
details:
  realistic_solution: 'The ideal approach is to evaluate the KV cache size and memory
    bandwidth limits during autoregressive decoding. Given the shared 12 GB LPDDR5X
    memory, KV cache footprint is critical. MQA provides the smallest KV cache but
    can degrade performance. GQA (e.g., with 8 KV heads) strikes the optimal balance:
    it drastically reduces the KV cache size compared to MHA, minimizing memory bandwidth
    bottlenecks, while preserving quality closer to MHA. For a 4K context on the Exynos
    2400 NPU, GQA ensures the memory bandwidth remains available for other active
    SoC components.'
  common_mistake: Candidates often choose MQA solely for the lowest memory bandwidth
    without considering its impact on model quality and the fact that the Exynos 2400's
    dual-core NPU might benefit from the slightly higher parallelism of GQA. They
    also frequently forget that the 12 GB LPDDR5X memory is shared across the CPU,
    GPU, and ISP, meaning the LLM cannot monopolize the entire bandwidth or capacity.
  napkin_math: 'Assume a 7B model with hidden size 4096, 32 layers, and FP16 (2 bytes/param)
    for a 4096-token context. MHA KV cache size is: 2 (K, V) * 32 layers * 4096 hidden
    dimension * 2 bytes * 4096 tokens = 2 GB. With MQA (1 KV head), the cache drops
    to 2 GB / 32 = 64 MB. With GQA (8 KV heads), it is 2 GB * (8/32) = 512 MB. Assuming
    the shared LPDDR5X provides ~60 GB/s of bandwidth, reading the MHA cache per generated
    token takes 2 GB / 60 GB/s = 33.3 ms (limiting decoding to <30 tokens/sec and
    starving the ISP/GPU). GQA requires reading only 512 MB (8.5 ms), allowing >100
    tokens/sec memory-bound limit while leaving headroom for the 34.7 TOPS dual-core
    NPU to execute efficiently.'
