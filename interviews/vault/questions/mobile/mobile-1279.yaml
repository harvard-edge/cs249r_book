title: Evaluating Attention Variants for Exynos 2400 NPU
scenario: You are designing an on-device LLM for a mobile NPU. The product requires supporting a 4K context window for document summarization. You must choose between Multi-Head Attention (MHA), Grouped-Query Attention (GQA), and Multi-Query Attention (MQA) for the deployment.
question: How would you evaluate the memory bandwidth and compute tradeoffs for each variant during the decoding phase and recommend the best architecture for this specific SoC?
details:
  realistic_solution: 'Given the shared LPDDR5X memory, KV cache footprint is critical. MQA provides the smallest KV cache but degrades performance. GQA (e.g., with 8 KV heads) strikes the optimal balance: it drastically reduces the KV cache size compared to MHA, minimizing memory bandwidth bottlenecks, while preserving quality.'
  common_mistake: |
    **The Pitfall:** Choosing MQA solely for the lowest memory bandwidth.
    **The Rationale:** Candidates ignore MQA's impact on model quality and the fact that modern NPUs benefit from the slightly higher parallelism of GQA.
    **The Consequence:** Deploying an architecture that sacrifices output quality unnecessarily, when the SoC has enough bandwidth for GQA.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model: 7B params, hidden size 4096, 32 layers, FP16 (2 bytes), 4096 context tokens.
       - Memory Bandwidth: 60 GB/s.
    2. **Calculations:**
       - MHA KV Cache Size: 2 (K, V) * 32 layers * 4096 dim * 2 bytes * 4096 tokens = 2.14 GB.
       - MQA (1 head) KV Cache: 2.14 GB / 32 = 67 MB.
       - GQA (8 heads) KV Cache: 2.14 GB * (8/32) = 536 MB.
       - MHA Bandwidth Cost: 2.14 GB / 60 GB/s = 35.6 ms/token (28 tok/s).
       - GQA Bandwidth Cost: 536 MB / 60 GB/s = 8.9 ms/token (112 tok/s limit).
    3. **Conclusion & Interpretation:**
       - **Result: GQA requires 536 MB KV cache.**
       - **Bottleneck: Memory-Bandwidth Bound** (MHA starves the SoC of bandwidth; GQA alleviates memory pressure while avoiding the extreme quality degradation of MQA).
