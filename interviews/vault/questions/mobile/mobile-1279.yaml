title: Evaluating Attention Variants for Exynos 2400 NPU
scenario: You are designing an on-device LLM for the Samsung Exynos 2400 NPU (34.7 TOPS, dual-core NPU, 12 GB shared LPDDR5X memory). The product requires supporting a 4K context window for document summarization. You must choose between Multi-Head Attention (MHA), Grouped-Query Attention (GQA), and Multi-Query Attention (MQA) for the deployment.
question: How would you evaluate the memory bandwidth and compute tradeoffs for each variant during the decoding phase and recommend the best architecture for this specific SoC?
details:
  realistic_solution: 'The ideal approach is to evaluate the KV cache size and memory bandwidth limits during autoregressive decoding. Given the shared 12 GB LPDDR5X memory, KV cache footprint is critical. MQA provides the smallest KV cache but can degrade performance. GQA (e.g., with 8 KV heads) strikes the optimal balance: it drastically reduces the KV cache size compared to MHA, minimizing memory bandwidth bottlenecks, while preserving quality closer to MHA. For a 4K context on the Exynos 2400 NPU, GQA ensures the memory bandwidth remains available for other active SoC components.'
  common_mistake: |
    **The Pitfall:** Choosing MQA solely for the lowest memory bandwidth.
    **The Rationale:** Candidates ignore MQA's impact on model quality and the fact that the dual-core NPU benefits from the slightly higher parallelism of GQA.
    **The Consequence:** Deploying an architecture that sacrifices output quality unnecessarily, when the SoC has enough bandwidth for GQA.
  napkin_math: |
    - **Model Assumptions:** 7B params, hidden size 4096, 32 layers, FP16 (2 bytes), 4096 tokens.
    - **MHA KV Cache Size:** 2 (K, V) × 32 layers × 4096 dim × 2 bytes × 4096 tokens = **2 GB**.
    - **MQA (1 head) KV Cache:** 2 GB / 32 = **64 MB**.
    - **GQA (8 heads) KV Cache:** 2 GB × (8/32) = **512 MB**.
    - **MHA Bandwidth Cost:** 2 GB / 60 GB/s = 33.3 ms per token (<30 tok/s), starving ISP/GPU.
    - **GQA Bandwidth Cost:** 512 MB / 60 GB/s = 8.5 ms per token (>100 tok/s limit).
    - **Conclusion:** GQA leaves ample headroom for the 34.7 TOPS dual-core NPU while avoiding the quality loss of MQA.
