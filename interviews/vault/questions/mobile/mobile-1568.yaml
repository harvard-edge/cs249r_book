title: Optimizing On-Device Object Detection Latency on Tensor G3
scenario: Your team has deployed a new real-time object detection model on Google Pixel phones powered by the Google Tensor G3 chip. The model is designed for a critical AR application that processes high-resolution video frames (e.g., 4K input). Initial user reports indicate intermittent, but significant, latency spikes during inference, making the AR experience janky. The Tensor G3 features a 7.5 TOPS on-device TPU and 12 GB LPDDR5X RAM.
question: "How would you optimize Tensor G3 on-device object detection latency using profiling and model changes?"
details:
  realistic_solution: 'Utilize on-device profiling tools specific to the Tensor G3 (e.g., Android GPU Inspector, Perfetto). Trace data movement between CPU and TPU. If transfer is bottlenecked, use zero-copy techniques. Monitor thermal throttling via system metrics.'
  common_mistake: |
    **The Pitfall:** Immediately pruning or quantizing the model without profiling.
    **The Rationale:** Candidates instinctively attack the model architecture first, assuming NPU compute is always the bottleneck.
    **The Consequence:** Optimizing the wrong component entirely, as the latency spikes are driven by I/O, CPU pre-processing overhead, or memory contention.
  napkin_math: |
    - **Compute Check:** A 100 GMAC model requires 200 GOPs. At 7.5 TOPS, compute takes 200 / 7500 = ~26.7 ms.
    - **Bandwidth Check:** A 4K frame (3840x2160x3) is ~24.8 MB. Transferring this at a naive 100 MB/s speed takes 248 ms, breaking the budget entirely.
    - **Final Result:** The 100ms+ latency spikes clearly indicate a **data movement or memory contention bottleneck**, not a TPU compute limit.
