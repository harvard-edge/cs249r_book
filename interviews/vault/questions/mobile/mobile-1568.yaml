title: Optimizing On-Device Object Detection Latency on Tensor G3
scenario: Your team has deployed a new real-time object detection model on flagship phones. The model is designed for a critical AR application that processes high-resolution video frames. Initial user reports indicate intermittent, but significant, latency spikes during inference, making the AR experience janky.
question: "How would you optimize on-device object detection latency using profiling and model changes?"
details:
  realistic_solution: 'Utilize on-device profiling tools specific to the mobile SoC (e.g., Android GPU Inspector, Perfetto). Trace data movement between CPU and TPU. If transfer is bottlenecked, use zero-copy techniques. Monitor thermal throttling via system metrics.'
  common_mistake: |
    **The Pitfall:** Immediately pruning or quantizing the model without profiling.
    **The Rationale:** Candidates instinctively attack the model architecture first, assuming NPU compute is always the bottleneck.
    **The Consequence:** Optimizing the wrong component entirely, as the latency spikes are driven by I/O, CPU pre-processing overhead, or memory contention.
  napkin_math: |
    1. **Assumptions & Constraints:** NPU offers 7.5 TOPS. A 4K frame (3840x2160x3) is ~24.8 MB.
    2. **Calculations:** Compute Check: 200 GOPs / 7500 GOPs/s = ~26.7 ms. Bandwidth Check: 24.8 MB / 100 MB/s = 248 ms.
    3. **Conclusion & Interpretation:** The 100ms+ latency spikes indicate a **data movement or memory contention bottleneck**. **Result: I/O-Bound**.
