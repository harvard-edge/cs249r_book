title: The NPU Efficiency Advantage
scenario: Your model runs at 2 TOPS on both the Snapdragon 8 Gen 3's Hexagon NPU and its Adreno GPU. Same
  model, same throughput. But the NPU uses 0.5W while the GPU uses 1.5W. Why does the NPU achieve 3× better
  TOPS/W for the same workload?
question: "Why does the NPU achieve 3× better TOPS/W for the same workload?"
details:
  realistic_solution: 'NPU achieves 3x TOPS/W through architecture, not process (both are 4nm). Three
    advantages: (1) Fixed-function MAC units eliminate instruction fetch/decode (~50% energy savings).
    (2) Large on-chip scratchpad (1-2 MB) keeps activations local, avoiding DRAM. (3) Systolic/spatial
    array passes data between adjacent PEs via local wires, not through shared memory hierarchy. Energy:
    NPU 0.25 pJ/op vs GPU 0.75 pJ/op. 1-hour session: GPU = 11.7% battery, NPU = 3.9%.'
  common_mistake: '"The NPU has a newer manufacturing process." Both are on the same 4nm die — the difference
    is architectural.'
  napkin_math: 'GPU at 2 TOPS, 1.5W: 1.33 TOPS/W. Energy per MAC: 1.5W / (2 × 10¹² ops/s) = 0.75 pJ/op.
    NPU at 2 TOPS, 0.5W: 4.0 TOPS/W. Energy per MAC: 0.5W / (2 × 10¹²) = 0.25 pJ/op. The NPU is 3× more
    efficient per operation. Over a 1-hour session at continuous inference: GPU = 1.5 Wh, NPU = 0.5 Wh.
    On a 12.8 Wh battery: GPU uses 11.7% battery, NPU uses 3.9%.'
