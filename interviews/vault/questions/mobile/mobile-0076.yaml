title: The NPU Efficiency Advantage
scenario: Your model runs at 2 TOPS on both the NPU and the GPU. Same model, same throughput. But the NPU uses 0.5W while the GPU uses 1.5W.
question: Why does the NPU achieve 3x better TOPS/W for the same workload?
details:
  realistic_solution: |
    The NPU achieves 3x better TOPS/W through structural architecture. 1) Fixed-function MAC arrays eliminate instruction fetch/decode overhead (~50% energy). 2) Large on-chip SRAM scratchpads keep activations local, bypassing power-hungry LPDDR access. 3) Systolic arrays pass data directly between Processing Elements (PEs) spatially, minimizing register reads. Energy: NPU 0.25 pJ/op vs GPU 0.75 pJ/op.
  common_mistake: |
    **The Pitfall:** Assuming the NPU is more efficient purely because of a newer manufacturing process.
    **The Rationale:** People often conflate performance gains with node shrinks (e.g., moving to 3nm), ignoring architecture.
    **The Consequence:** Failing to understand when and why to target the NPU, leading to suboptimal hardware utilization.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Workload: 2 TOPS
       - GPU Power: 1.5W
       - NPU Power: 0.5W
       - Battery: 12.8 Wh
    2. **Calculations:**
       - GPU Energy per MAC: 1.5W / 2e12 = 0.75 pJ/op
       - NPU Energy per MAC: 0.5W / 2e12 = 0.25 pJ/op
       - 1-hour session energy: GPU = 1.5 Wh, NPU = 0.5 Wh
       - Battery drain: GPU = 1.5/12.8 = 11.7%, NPU = 0.5/12.8 = 3.9%
    3. **Conclusion & Interpretation:** **NPU uses 3.9% battery vs GPU's 11.7%. Result: Architecture-Bound.**
