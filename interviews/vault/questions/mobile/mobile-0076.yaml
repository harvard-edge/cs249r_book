title: The NPU Efficiency Advantage
scenario: Your model runs at 2 TOPS on both the Snapdragon 8 Gen 3's Hexagon NPU and its Adreno GPU. Same model, same throughput. But the NPU uses 0.5W while the GPU uses 1.5W.
question: Why does the NPU achieve 3× better TOPS/W for the same workload?
details:
  realistic_solution: 'NPU achieves 3x TOPS/W through architecture, not process (both are 4nm). Three advantages: (1) Fixed-function MAC units eliminate instruction fetch/decode (~50% energy savings). (2) Large on-chip scratchpad (1-2 MB) keeps activations local, avoiding DRAM. (3) Systolic/spatial array passes data between adjacent PEs via local wires, not through shared memory hierarchy. Energy: NPU 0.25 pJ/op vs GPU 0.75 pJ/op. 1-hour session: GPU = 11.7% battery, NPU = 3.9%.'
  common_mistake: |
    **The Pitfall:** Assuming the NPU is more efficient purely because of a newer manufacturing process.
    **The Rationale:** People often conflate performance gains with node shrinks (e.g., moving to 3nm), ignoring architecture.
    **The Consequence:** Failing to understand when and why to target the NPU, leading to suboptimal hardware utilization.
  napkin_math: |
    1. GPU at 2 TOPS, 1.5W: Energy per MAC = 1.5W / (2 * 10^12) = 0.75 pJ/op.
    2. NPU at 2 TOPS, 0.5W: Energy per MAC = 0.5W / (2 * 10^12) = 0.25 pJ/op.
    3. Over a 1-hour session: GPU = 1.5 Wh, NPU = 0.5 Wh.
    4. **On a 12.8 Wh battery: GPU uses 11.7%, NPU uses 3.9%.**
