title: 'Model Format Conversion: Implement ONNX→CoreML Conversion with Numerical Validation'
scenario: 'Describe the concrete steps and metrics to convert a MobileNetV3-Small (2.5M params, 57M MACs)
  from ONNX to CoreML for A17 Pro Neural Engine deployment, including: conversion command/API, numerical
  validation, performance benchmarking, and expected model size.'
question: "What steps, validation metrics, expected size, and latency should be used when converting MobileNetV3-Small from ONNX to CoreML?"
details:
  realistic_solution: 'Convert: `coremltools.convert(onnx_model, minimum_deployment_target=ct.target.iOS17,
    compute_precision=ct.precision.FLOAT16)`. Validate: run 1000 test images through both ONNX (onnxruntime)
    and CoreML (coremltools predict), compute top-1 accuracy delta < 0.1%. Check max absolute error per
    output < 0.01 (FP32 reference). Expected FP16 model size: 2.5M × 2B = 5MB. Performance on A17 Pro:
    57M MACs / 35 TOPS = 1.6μs compute, realistic 1.5ms with framework overhead.'
  common_mistake: Skipping numerical validation after conversion and discovering silent accuracy degradation
    only in production; ONNX→CoreML can silently degrade accuracy if BN-folding or activation functions
    are converted incorrectly.
  napkin_math: 'MobileNetV3-Small: 2.5M params × 2B (FP16) = 5MB. ONNX FP32: 10MB. Conversion: ~30 seconds.
    Numerical validation: 1000 inputs × 57M MACs / 10 TFLOPS CPU = 1000 × 5.7ms = 5.7s total. CoreML inference:
    57M/35T = 1.6μs + 1ms overhead = 1ms. Speedup vs. TFLite CPU (FP32): 57M/10T = 5.7μs + 5ms TFLite
    overhead = ~6ms. CoreML 6× faster.'
