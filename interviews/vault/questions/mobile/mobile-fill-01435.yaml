title: Diagnosing Stragglers on Mobile NPU with Telemetry
scenario: You are leading the reliability engineering efforts for an on-device ML application that uses
  a new object detection model deployed on Samsung Exynos 2400 NPU-powered mobile devices (34.7 TOPS,
  12 GB LPDDR5X LPDDR5X). The model processes a continuous stream of camera input. Your monitoring dashboards
  currently show healthy average inference latencies. However, isolated user reports indicate occasional
  UI freezes and missed detections, suggesting 'straggler' devices where the model's performance degrades
  intermittently. How would you enhance your monitoring and observability stack to proactively identify
  and diagnose these stragglers and improve the MTTR for such incidents, specifically leveraging the NPU's
  characteristics?
question: "How would you extend monitoring to find intermittent Exynos 2400 NPU stragglers and reduce MTTR?"
details:
  realistic_solution: Implement a distributed tracing system on the device to capture NPU inference times,
    pre/post-processing latencies, and NPU utilization statistics. Augment this with device-level metrics
    for temperature, battery state, and memory pressure. Use a robust anomaly detection system (e.g.,
    a time-series based algorithm detecting deviations from baseline per-device performance) to flag stragglers.
    Build production health dashboards that allow drilling down from fleet-wide aggregates to individual
    device performance, enabling rapid identification of affected devices and root cause analysis. Define
    clear SLOs for tail latency (e.g., p99 latency) and alert on breaches. Establish automated runbooks
    to collect more verbose logs or NPU performance profiles from identified stragglers.
  common_mistake: Relying solely on aggregate metrics (like fleet-wide average latency) which can mask
    localized performance issues. Not collecting granular per-device telemetry or attributing performance
    degradation solely to network or application-level issues, ignoring NPU-specific bottlenecks like
    thermal throttling or memory pressure on the 12 GB LPDDR5X.
  napkin_math: Consider your on-device ML model running on a Samsung Exynos 2400 NPU (34.7 TOPS). If a
    typical inference operation consumes 200 GOPs, what's the theoretical maximum inferences per second
    you could achieve? If you aim for an MTTR (Mean Time To Recovery) of 5 minutes for a detected straggler
    issue across a fleet of 100 million devices, and 0.05% of devices are observed to be straggling, how
    many devices are experiencing issues, and what would be the total expected downtime (in device-minutes)
    if the MTTR target is met for these devices?
