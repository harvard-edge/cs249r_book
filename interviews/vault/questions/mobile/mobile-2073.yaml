title: Zero-Copy ISP to NPU Buffer
scenario: On a mobile SoC, the Image Signal Processor (ISP) writes a 1080p camera frame to memory. The NPU must immediately ingest this frame for facial recognition.
question: How does the operating system use hardware-level zero-copy buffer sharing to pass this frame without CPU overhead?
details:
  realistic_solution: The OS utilizes a contiguous memory allocator (like dma-buf on Android/Linux) to allocate a single physical memory block. The ISP is instructed via its drivers to dump the processed pixel data directly into this physical address. Instead of the CPU reading and copying this array to an NPU-specific memory region, the OS simply passes the physical pointer to the NPU's MMU. The NPU reads it in place, achieving zero-copy data exchange.
  common_mistake: |
    **The Pitfall:** Describing CPU-level multithreading or assuming a dedicated internal cache wire.
    **The Rationale:** Candidates default to software concurrency concepts or invent non-existent hardware paths instead of understanding unified memory.
    **The Consequence:** The proposed architecture introduces massive CPU overhead and memory bandwidth saturation by manually copying the image buffers.
  napkin_math: |
    1. Assumptions & Constraints:
       - ISP writes a 1080p frame.
       - Hardware-level zero-copy buffer sharing is used.
    2. Calculations:
       - Bytes Copied by CPU: 0 bytes.
    3. Conclusion & Interpretation:
       - **Result: 100% of CPU memory bandwidth overhead is saved (Memory-Bandwidth-Bound).**
