title: Zero-Copy ISP to NPU Buffer
scenario: On the Snapdragon 8 Gen 3, the Image Signal Processor (ISP) writes a 1080p
  camera frame to memory. The Hexagon NPU must immediately ingest this frame for facial
  recognition.
question: Understand and explain how the operating system uses hardware-level zero-copy
  buffer sharing to pass this frame without CPU overhead.
details:
  realistic_solution: The OS utilizes a contiguous memory allocator (like dma-buf
    on Android/Linux) to allocate a single physical memory block. The ISP is instructed
    via its drivers to dump the processed pixel data directly into this physical address.
    Instead of the CPU reading and copying this array to an NPU-specific memory region,
    the OS simply passes the physical pointer to the Hexagon NPU's MMU. The NPU reads
    it in place, achieving zero-copy data exchange.
  common_mistake: Describing CPU-level multithreading or assuming the ISP and NPU
    have a dedicated internal cache wire independent of main LPDDR memory.
  napkin_math: 0 bytes copied by CPU = 100% bandwidth saved.
