title: Designing an On-Device RAG Architecture for A17 Pro with 8GB Memory
scenario: Design an on-device RAG system for an A17 Pro (8GB RAM, 35 TOPS) that enables
  a personal knowledge assistant to search 10,000 personal documents (notes, emails,
  PDFs) and generate responses. Total memory budget is 3.5GB (leaving headroom for
  OS and other apps). The design must support documents up to 5000 tokens, 256-dim
  embeddings, and sub-2-second end-to-end response time.
question: How should an on-device RAG system fit document search and LLM generation
  within A17 Pro memory and response-time constraints?
details:
  realistic_solution: 'Component allocation within 3.5GB: (1) Embedding model: MobileBERT-based
    256-dim encoder, INT8 quantized = 22MB. (2) FAISS HNSW index: 10K docs * 256 *
    4 bytes = 10MB. (3) LLM: 1B parameter model INT4 = 500MB. (4) Document store:
    10K docs * 5000 tokens avg * 3 bytes = 150MB compressed. (5) KV cache: 1024-token
    context * 2*22layers*64dim*2bytes = 5.5MB. Total: 22+10+500+150+5.5 = 687.5MB
    — well within budget. Response pipeline: embed query (15ms) + HNSW search (3ms)
    + LLM at 20 tok/s (A17 Pro ANE): 100 token response = 5s — too slow. Must pre-fill
    context and stream first token in < 500ms.'
  common_mistake: Using cloud-scale embedding models (1536-dim OpenAI embeddings)
    that are designed for quality rather than mobile efficiency, consuming 10x the
    memory of mobile-optimized 256-dim models while offering minimal quality improvement
    for personal document search.
  napkin_math: 'Memory: embedding model(22MB) + FAISS(10MB) + LLM 1B INT4(500MB) +
    doc store(150MB) + KV+buffers(50MB) = 732MB total. 3.5GB - 732MB = 2.77GB headroom.
    A17 Pro ANE: 35 TOPS for INT4 1B model (2B effective ops due to INT4): 35e12/2e9
    = 17,500 tokens/s theoretical, practical ~20 tok/s after overhead. Time-to-first-token:
    prefill 512-token context at 35 TOPS: 512*2*1B/(35e12) = ~29ms. Generation: 100
    tokens / 20 tok/s = 5s total. Reduce to 50 tokens: 2.5s. Optimize: prefill(29ms)
    + generate_50_tokens(2.5s) = 2.53s — slightly over 2s SLA. Reduce to 38 tokens
    for 2s exactly.'
