title: Evaluating Pipeline Sync Barriers on Snapdragons
scenario: A Snapdragon 8 Gen 3 streams video frames. The CPU pre-processes frames
  (5ms) while the Hexagon NPU runs inference (8ms).
question: Evaluate the pipeline's overall throughput and identify the bottleneck if
  a memory synchronization barrier is added between every frame.
details:
  realistic_solution: With perfect pipelining, throughput is NPU-bound (8ms/frame
    or 125 fps). A sync barrier forces sequential execution (CPU then NPU), preventing
    the CPU from starting frame N+1 until NPU finishes frame N. This increases per-frame
    latency to 13ms and bottlenecks throughput to 1/13ms (76 fps).
  common_mistake: Assuming throughput remains bound by the heaviest stage (8ms) even
    when a strict sync barrier enforces complete sequential execution.
  napkin_math: 1 / 0.013s = 76 fps
