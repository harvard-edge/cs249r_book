title: Designing a Safety-Critical Edge ML System for Autonomous Mobile Robotics on Google Tensor G3
scenario: You are tasked with designing the core ML system for an autonomous personal mobility device (e.g., a smart, self-navigating wheelchair or a last-mile delivery robot) where the primary compute unit is a high-end smartphone equipped with a Tensor G3 chip. This device utilizes its integrated 7.5 TOPS on-device TPU and 12 GB LPDDR5X RAM for real-time object detection, classification, and predictive path planning to ensure safe navigation and collision avoidance in dynamic environments.
question: How would you architect the ML pipeline and integrate system-level safety mechanisms to comply with functional safety principles, ensuring deterministic execution and high reliability?
details:
  realistic_solution: "1. **Deterministic ML Execution:** Utilize quantization-aware training to deploy a fixed-point quantized model to the Tensor G3's TPU. Select or develop a specialized ML runtime that guarantees deterministic behavior under all operating conditions (e.g., by disabling dynamic scheduling or ensuring fixed memory allocation for inference). \n2. **Functional Safety Mechanisms:**\n    *   **Redundancy:** Implement diverse software redundancy, such as running two different ML models or different implementations of the same model (e.g., one on TPU, one on CPU as a fallback or cross-check) and employing a voter mechanism. For critical decisions, a simpler, provably correct 'sanity check' algorithm can run in parallel.\n    *   **Watchdog Timers:** Employ a multi-level watchdog architecture, including a hardware watchdog, an operating system-level watchdog, and application-specific watchdogs (e.g., monitoring ML inference completion time, sensor data rates, and actuator command execution). \n    *   **Self-Test Routines:** Integrate periodic or continuous Built-In Self-Test (BIST) routines for the Tensor G3's TPU and memory (LPDDR5X) to detect latent hardware faults. Implement ML model integrity checks, such as running known-good test cases periodically or monitoring feature space distributions and output confidence levels for anomalies.\n    *   **Error Detection & Correction:** Leverage any available ECC capabilities of the 12 GB LPDDR5X RAM. Implement software-level memory integrity checks (e.g., checksums, memory protection units for critical data structures). \n3. **System Architecture:** Employ a robust, layered software architecture with strict resource partitioning (e.g., dedicated memory regions for safety-critical tasks on the 12 GB LPDDR5X), fault containment units, and a clearly defined safe state logic that can be activated upon fault detection."
  common_mistake: |
    **The Pitfall:** Overlooking non-deterministic behaviors of ML inference frameworks or custom operators on edge TPUs.
    **The Rationale:** Candidates often assume that hardware operates flawlessly without accounting for software aging, silent data corruption, or transient hardware faults.
    **The Consequence:** The system fails to meet functional safety standards, leading to potentially dangerous failures in real-world autonomous operation.
  napkin_math: |
    1. **Latency Budget:** A collision avoidance decision every 50 ms (20 Hz) leaves only 20 ms for non-ML tasks if the TPU consumes 30 ms.
    2. **Fault Detection Time (FDT):** Self-test routines and watchdogs must operate at a high frequency (e.g., 10-20 ms) to ensure faults are detected within safety budgets.
    3. **Memory Utilization:** **Careful memory partitioning is critical** to prevent interference and ensure deterministic access for safety-critical components.
