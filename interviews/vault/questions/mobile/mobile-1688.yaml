title: Designing a Safety-Critical Edge ML System for Autonomous Mobile Robotics on
  Google Tensor G3
scenario: You are tasked with designing the core ML system for an autonomous personal
  mobility device (e.g., a smart, self-navigating wheelchair or a last-mile delivery
  robot) where the primary compute unit is a high-end smartphone equipped with a Google
  Tensor G3 chip. This device utilizes its integrated 7.5 TOPS on-device TPU and 12
  GB LPDDR5X RAM for real-time object detection, classification, and predictive path
  planning to ensure safe navigation and collision avoidance in dynamic environments.
  Given the safety-critical nature of the application, how would you architect the
  ML pipeline and integrate system-level safety mechanisms to comply with functional
  safety principles, ensuring deterministic execution and high reliability, akin to
  standards like ISO 26262 (adapted for mobile robotics)?
question: How would you architect a Tensor G3 ML pipeline for safe autonomous mobile
  robotics with deterministic execution and fault mitigation?
details:
  realistic_solution: "1.  **Deterministic ML Execution:** Utilize quantization-aware\
    \ training to deploy a fixed-point quantized model to the Tensor G3's TPU. Select\
    \ or develop a specialized ML runtime that guarantees deterministic behavior under\
    \ all operating conditions (e.g., by disabling dynamic scheduling or ensuring\
    \ fixed memory allocation for inference). \n2.  **Functional Safety Mechanisms:**\n\
    \    *   **Redundancy:** Implement diverse software redundancy, such as running\
    \ two different ML models or different implementations of the same model (e.g.,\
    \ one on TPU, one on CPU as a fallback or cross-check) and employing a voter mechanism.\
    \ For critical decisions, a simpler, provably correct 'sanity check' algorithm\
    \ can run in parallel.\n    *   **Watchdog Timers:** Employ a multi-level watchdog\
    \ architecture, including a hardware watchdog, an operating system-level watchdog,\
    \ and application-specific watchdogs (e.g., monitoring ML inference completion\
    \ time, sensor data rates, and actuator command execution). \n    *   **Self-Test\
    \ Routines:** Integrate periodic or continuous Built-In Self-Test (BIST) routines\
    \ for the Tensor G3's TPU and memory (LPDDR5X) to detect latent hardware faults.\
    \ Implement ML model integrity checks, such as running known-good test cases periodically\
    \ or monitoring feature space distributions and output confidence levels for anomalies.\n\
    \    *   **Error Detection & Correction:** Leverage any available ECC capabilities\
    \ of the 12 GB LPDDR5X RAM. Implement software-level memory integrity checks (e.g.,\
    \ checksums, memory protection units for critical data structures). \n3.  **System\
    \ Architecture:** Employ a robust, layered software architecture with strict resource\
    \ partitioning (e.g., dedicated memory regions for safety-critical tasks on the\
    \ 12 GB LPDDR5X), fault containment units, and a clearly defined safe state logic\
    \ that can be activated upon fault detection."
  common_mistake: Overlooking non-deterministic behaviors of ML inference frameworks
    or custom operators on edge TPUs, neglecting the need for diverse redundancy in
    sensing or decision-making, or failing to account for memory corruption detection
    and error correction in the LPDDR5X. A common mistake is also not considering
    the impact of software aging, silent data corruption, or transient hardware faults,
    assuming the hardware operates flawlessly.
  napkin_math: '1.  **Latency Budget:** If the system requires a collision avoidance
    decision every 50 ms (20 Hz), and the ML inference pipeline on the 7.5 TOPS TPU
    consumes 30 ms, this leaves only 20 ms for sensor data acquisition, pre-processing,
    decision fusion, and actuator command execution. This implies a very tight budget
    requiring highly optimized, deterministic execution and minimal overhead from
    safety mechanisms.

    2.  **Fault Detection Time (FDT):** For an ASIL-B equivalent system, a maximum
    FDT of, say, 100 ms might be required. To achieve this, self-test routines for
    the TPU and memory, as well as watchdog monitoring loops, must operate at a much
    higher frequency (e.g., every 10-20 ms) to ensure faults are detected and mitigated
    within the safety budget.

    3.  **Memory Utilization (12 GB LPDDR5X):** If the primary ML model and its associated
    data structures require 2 GB, and a redundant/diverse model or safety-critical
    data buffer adds another 1 GB, this leaves 9 GB for the OS, other processes, logging,
    and application data. Careful memory management and partitioning are critical
    to prevent interference and ensure deterministic access for safety-critical components.'
