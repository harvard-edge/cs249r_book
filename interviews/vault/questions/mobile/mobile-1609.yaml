title: 'Mobile Model Deployment Feasibility: Samsung Exynos NPU'
scenario: Your team is tasked with deploying 'MobileVisionNet-L' (50M parameters, mixed INT8/FP16) onto an Exynos 2400 NPU (34.7 TOPS, 12 GB LPDDR5X). The target application requires real-time 30 FPS inference for high-resolution images.
question: How would you assess whether MobileVisionNet-L can meet 30 FPS on the Exynos 2400 NPU given memory and throughput limits?
details:
  realistic_solution: 'Calculate parameter memory (75 MB) and critically estimate activation memory based on target input resolution. Calculate the required NPU operations per second for 30 FPS (e.g., 20 GOPs/inference * 30 FPS = 0.6 TOPS). Compare the required throughput against the NPU''s effective TOPS and memory bandwidth limit.'
  common_mistake: |
    **The Pitfall:** Solely focusing on static parameter memory and theoretical TOPS.
    **The Rationale:** Neglecting dynamic activation memory for high-res inputs and actual NPU utilization efficiency.
    **The Consequence:** Deploying a model that runs out of memory on activations or fails to meet the 30 FPS target due to memory bandwidth bottlenecks.
  napkin_math: |
    - Parameter memory: 50M params * 1.5 bytes/param = 75 MB.
    - Compute required: 10 GOPs (20 Billion OPs) per inference.
    - FPS target: 20 BOPs * 30 FPS = 600 BOPs/sec = 0.6 TOPS.
    - Hardware capacity: 34.7 TOPS (theoretical).
    - **Throughput is feasible (0.6 TOPS << 34.7 TOPS), but activation memory bandwidth must be verified.**
