title: Diagnosing Thermal Throttling from Memory Bound NPU Workloads
scenario: You are deploying a custom vision transformer on the Qualcomm Hexagon NPU within a Snapdragon
  8 Gen 3. The model runs within the 45 TOPS INT8 budget and meets the 30 FPS target. However, user reports
  indicate severe battery drain and the device thermally throttles after 10 minutes of use. System tracing
  reveals the shared 16 GB LPDDR5X memory bus is saturated during inference. How do you diagnose the root
  cause of the excessive power consumption?
question: "Why does a Snapdragon 8 Gen 3 ViT drain battery and throttle after 10 minutes despite meeting 30 FPS and 45 TOPS?"
details:
  realistic_solution: The root cause is excessive off-chip memory traffic to the LPDDR5X RAM. According
    to the Horowitz energy principles, accessing DRAM costs orders of magnitude more energy than an INT8
    ALU operation. The model likely has unfused layers or large intermediate activations that exceed the
    NPU's local SRAM, forcing constant reads and writes to main memory. The fix involves aggressive operator
    fusion, reducing activation sizes, or redesigning the network to increase arithmetic intensity.
  common_mistake: Candidates often focus solely on optimizing the compute operations or NPU utilization,
    assuming the NPU itself is drawing too much power. They miss the fundamental principle that off-chip
    memory access is significantly more energy-intensive than on-chip compute, failing to check for operator
    fusion or activation spilling.
  napkin_math: Assume an INT8 MAC operation costs ~0.1 pJ, while an off-chip read/write to LPDDR5X costs
    ~100 pJ per byte. If an unfused layer forces a 10MB activation tensor to be written to and read from
    the shared LPDDR5X memory, that single boundary costs (10 * 10^6 bytes * 2 * 100 pJ) = 2,000,000 pJ
    or 2 mJ. Running at 30 FPS, this single unfused activation costs 60 mW of continuous power just for
    memory movement, quickly dwarfing the power used by the NPU's compute.
