title: Edge Data Quality Gate Design for Exynos NPU
scenario: You are designing a real-time data quality gate for a continuous vision application running
  on a Samsung Exynos 2400. The system needs to validate incoming high-resolution frames from the ISP
  for blur, occlusion, and lighting anomalies before waking up a heavy authentication model. Since the
  Exynos 2400 has a dual-core NPU with 34.7 TOPS and shares 12 GB LPDDR5X memory with the CPU/GPU/ISP,
  you must architect a pipeline that enforces data quality constraints while minimizing memory bandwidth
  contention. How do you design this validation system to ensure the heavy model only runs on valid data
  without bottlenecking the shared memory?
details:
  realistic_solution: A superior design leverages a zero-copy memory architecture where the ISP writes
    directly to a designated region in the shared memory. A lightweight, quantized quality-gate model
    is pinned to one core of the Exynos 2400 NPU to continuously validate frames. Only when a frame meets
    the data contract, the system triggers the heavy model on the second NPU core, ensuring strict data
    validation without CPU intervention or memory thrashing.
  common_mistake: Candidates often design a pipeline that routes all ISP data through the CPU for heuristic-based
    validation before passing it to the NPU. This causes excessive memory copying back and forth in the
    shared 12 GB LPDDR5X RAM, bottlenecking the system and increasing power consumption. They also fail
    to isolate the validation workload from the main inference workload on the dual-core NPU.
  napkin_math: A heavy model requires 0.5 TOPs (trillion operations) per frame, demanding 15 TOPS of compute
    at 30 FPS (out of the 34.7 TOPS available on the Exynos 2400). A lightweight quality-gate model requiring
    0.5 GOPs per frame demands only 0.015 TOPS at 30 FPS. If the gate rejects 90% of incoming frames,
    the heavy model only processes 3 FPS, reducing its compute requirement from 15 TOPS to 1.5 TOPS. This
    design saves 13.5 TOPS of active compute and drastically reduces bandwidth pressure on the shared
    12 GB LPDDR5X memory.
