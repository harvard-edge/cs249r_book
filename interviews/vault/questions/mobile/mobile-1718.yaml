title: 'Quantifying Inter-Annotator Agreement for Mobile NPU Deployment'
scenario: Your team is preparing a dataset for an image classification model to be deployed on the Samsung Exynos 2400 NPU (34.7 TOPS, 12 GB LPDDR5X) for a mobile application. To ensure high-quality labels, you employ multiple annotators.
question: Which inter-annotator agreement metric would you use for mobile dataset labels, and why is it better than simple agreement?
details:
  realistic_solution: 'A realistic solution involves consistently using statistical measures like Cohens Kappa (for two annotators) or Fleiss Kappa (for two or more annotators) to quantify inter-annotator agreement. By regularly calculating and monitoring these metrics, teams can identify ambiguous annotation guidelines or difficult data samples, allowing for targeted guideline improvements, annotator retraining, or data arbitration, thereby ensuring a cleaner, more reliable dataset for model training and robust performance on the Exynos NPU.'
  common_mistake: |
    **The Pitfall:** Relying on subjective consensus or simple percentage agreement.
    **The Rationale:** Simple agreement doesn't account for chance agreement between annotators.
    **The Consequence:** Noisy labels propagate into the training data, ultimately degrading model performance on resource-constrained NPUs.
  napkin_math: |
    **Assumptions & Constraints:**
    - 10,000 images, 5% ambiguously labeled due to poor agreement = 500 images.
    - Manual review cost = 30 seconds/image.

    **Calculations:**
    - Total time = 500 images * 30 seconds/image = 15,000 seconds.

    **Conclusion & Interpretation:**
    - **Result: 4.17 hours (Manual Review Cost)**. 15,000 seconds / 3600 = ~4.17 hours of additional manual review required.
