title: Mixed-Precision LLM Deployment on Samsung Exynos 2400 NPU
scenario: You are tasked with deploying a 7B parameter Large Language Model (LLM) for real-time natural language understanding on a Samsung Exynos 2400 NPU (34.7 TOPS, 12 GB LPDDR5X memory). The objective is to achieve an inference latency of under 50ms per token while strictly adhering to the 12 GB memory budget. The initial LLM is trained in FP32.
question: How would you design a mixed-precision inference and fine-tuning strategy for a 7B LLM on the Exynos 2400 NPU?
details:
  realistic_solution: 'A realistic solution involves a systematic approach: start by profiling the FP32 model on the NPU to identify performance bottlenecks and memory hotspots. Gradually introduce FP16 for weights and activations, layer by layer, starting with less sensitive parts, and continuously monitor accuracy. For layers highly sensitive to precision reduction, consider using BF16 or keeping them in FP32. If FP8 is desired, investigate quantization-aware training (QAT) or advanced post-training quantization (PTQ) techniques specifically optimized for the Exynos 2400''s capabilities, potentially using vendor-specific tools. If fine-tuning is necessary, implement and carefully tune dynamic loss scaling to prevent numerical issues. Furthermore, analyze the NPU''s specific capabilities regarding FP16/BF16/FP8 acceleration for different operator types to make informed decisions about mixed-precision recipes.'
  common_mistake: |
    **The Pitfall:** Uniformly converting the entire FP32 model to a lower precision like FP16 or FP8.
    **The Rationale:** Developers prioritize speed and memory footprint without analyzing individual layer sensitivity to precision loss.
    **The Consequence:** Catastrophic accuracy drops occur, and fine-tuning causes gradient underflow because dynamic loss scaling was not utilized.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model: 7B parameters.
       - Target constraints: <50ms latency per token, <12 GB memory limit.
       - NPU: 34.7 TOPS. Assumed workload ~1000 GFLOPs/token.
    2. **Calculations:**
       - FP32 Memory: 7B × 4 bytes = 28 GB (OOM).
       - FP16 Memory: 7B × 2 bytes = 14 GB (OOM).
       - FP8 Memory: 7B × 1 byte = 7 GB (Fits).
       - Compute Latency: 1000×10^9 Ops / 34.7×10^12 Ops/sec ≈ 28.8 ms.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Capacity-Bound.** FP8 quantization is mandatory as it strictly fits the 12 GB budget (7 GB) while **achieving the <50ms target (28.8ms)**.
