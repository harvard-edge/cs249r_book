title: KV-Cache Memory Sizing for Hexagon NPU
scenario: You are deploying a 3B parameter LLM on a smartphone powered by the Qualcomm Hexagon NPU (Snapdragon
  8 Gen 3). The device features 12 GB of shared LPDDR5X memory, but the OS restricts your app to a strict
  4 GB total memory budget. After loading the 4-bit quantized model weights (1.5 GB) and allocating space
  for intermediate activations (0.5 GB), you have 2.0 GB left. The model uses Multi-Head Attention with
  24 layers, 32 attention heads, and a head dimension of 128. Calculate the exact memory required for
  the KV-cache to support a 4096-token sequence length using FP16 (2 bytes) precision, and state whether
  it fits in the remaining memory.
details:
  realistic_solution: 'The candidate should correctly apply the standard KV-cache memory formula: 2 (K
    & V) * num_layers * num_heads * head_dim * seq_len * bytes_per_element. They must systematically plug
    in the provided architectural parameters to find the total bytes, then evaluate this against the strict
    device limits of the shared memory pool.'
  common_mistake: Candidates often forget to multiply by 2 for both Keys and Values, or they calculate
    the cache size for a single layer instead of all 24 layers. They might also incorrectly calculate
    the total byte size by ignoring the 2 bytes per element requirement for FP16 precision.
  napkin_math: KV-Cache Size = 2 (Keys, Values) * 24 layers * 32 heads * 128 head_dim * 4096 tokens *
    2 bytes/element = 1,610,612,736 bytes = 1.5 GB. Since 1.5 GB < 2.0 GB (remaining budget from the shared
    LPDDR5X memory), the KV-cache successfully fits.
