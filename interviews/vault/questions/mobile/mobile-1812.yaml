title: Android NNAPI Delegation Failures and Fallback Performance
scenario: Your INT8 image classification model runs at 5ms on Snapdragon 8 Gen 3 via NNAPI delegate targeting the Hexagon NPU. On a Samsung Exynos 2400 device (also with NNAPI), the same model runs at 45ms — 9x slower. Both devices claim 'NNAPI delegate active'.
question: Why does the model run 9x slower on the Exynos NNAPI despite the delegate being active?
details:
  realistic_solution: 'Samsung''s Exynos NNAPI driver has incomplete NPU op coverage. When an op is not supported by the NPU, the entire sub-graph falls back to CPU execution via NNAPI''s CPU reference implementation. Check with NNAPI''s getDevices() API to enumerate available accelerators, then use setPreference(PREFER_SUSTAINED_SPEED) and allowDevice() to force NPU execution and identify which ops cause fallback. Common culprits: custom activations, grouped convolutions, or non-standard tensor types. Fix: partition the model so NPU-unsupported ops run via TFLite''s CPU kernel (faster than NNAPI CPU fallback) while NPU-supported ops use NNAPI.'
  common_mistake: |
    **The Pitfall:** Trusting that 'NNAPI delegate active' means the NPU is actually executing the entire graph.
    **The Rationale:** Developers treat NNAPI as a black box and assume successful initialization guarantees hardware acceleration.
    **The Consequence:** Silent fallbacks to the CPU reference implementation caused by partial operator support.
  napkin_math: |
    *   **Snapdragon NPU (45 TOPS):** 5 ms inference.
    *   **CPU Fallback (~4 TOPS):** 5 ms * (45 / 4) = ~56 ms.
    *   **Observed Latency:** 45 ms.
    *   **Conclusion:** 45 ms indicates partial execution (e.g., ~60% on NPU, ~40% on CPU), confirming a severe fallback penalty.
