title: Analyzing 3-bit AWQ Overhead on Tensor G3
scenario: 'You are deploying a 7-billion parameter LLM on a smartphone powered by the Google Tensor G3, which features an on-device TPU capable of 7.5 TOPS and shares 12 GB of LPDDR5X memory. To fit the model within a strict 3 GB memory allocation, you apply 3-bit AWQ. Profiling reveals that while the memory footprint is reduced, auto-regressive generation is severely compute-bound and fails to reach the theoretical 7.5 TOPS.'
question: 'Why does 3-bit AWQ quantization cause a compute bottleneck on the Tensor G3 architecture?'
details:
  realistic_solution: 'The Tensor G3 TPU is optimized for 8-bit or 16-bit operations and lacks native silicon support for 3-bit matrix multiplications. The 3-bit weights must be unpacked and cast to INT8 in the ALU pipelines on-the-fly. This unpack overhead consumes massive compute cycles, shifting the bottleneck from memory to compute.'
  common_mistake: |
    **The Pitfall:** Assuming aggressive sub-4-bit quantization always proportionally lowers inference latency.
    **The Rationale:** Candidates calculate memory bandwidth savings but forget that custom bit-widths require non-native hardware unpacking.
    **The Consequence:** Deployment latency is unexpectedly degraded by 2.5x due to ALU stalls attempting to mask and shift unpacked bits.
  napkin_math: |
    1. **Footprint:** 7B parameters at 3-bit = (7e9 × 3) / 8 = 2.625 GB (fits the 3 GB budget).
    2. **Ideal Compute:** 1 token needs 14 GOPS. At 7.5 TOPS, ideal compute time = 14 / 7500 = **1.86 ms per token**.
    3. **Unpacking Penalty:** If unpacking each 3-bit weight to INT8 requires 3 extra ALU ops (mask, shift, cast), the compute load balloons to (2 + 3) × 7B = 35 GOPS.
    4. **Actual Latency:** 35 GOPS / 7500 TOPS = **4.66 ms per token** (a 2.5x regression vs ideal).
