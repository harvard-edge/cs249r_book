title: Analyzing 3-bit AWQ Overhead on Tensor G3
scenario: You are deploying a 7-billion parameter LLM on a mobile TPU capable of 7.5 TOPS. To fit within a strict 3 GB memory allocation, you apply 3-bit AWQ. Profiling reveals that while memory is reduced, generation is severely compute-bound and misses latency targets.
question: Why does 3-bit AWQ quantization cause a severe compute bottleneck on the mobile TPU architecture?
details:
  realistic_solution: |
    The mobile TPU is heavily optimized for native 8-bit or 16-bit precision and lacks dedicated silicon ALUs for custom 3-bit matrix multiplications. Consequently, the 3-bit weights must be explicitly unpacked, bitmasked, and cast to INT8 in software on-the-fly, consuming massive compute cycles.
  common_mistake: |
    **The Pitfall:** Assuming aggressive sub-4-bit quantization linearly lowers inference latency by scaling down memory bandwidth.
    **The Rationale:** Candidates accurately calculate bandwidth savings but entirely neglect the lack of native hardware support for custom bit-widths.
    **The Consequence:** The model latency is degraded by 2.5x due to the continuous ALU stalling from bit-shifting operations.
  napkin_math: |
    1. **Assumptions & Constraints:** 7B parameters. 3-bit = 2.625 GB. TPU Peak = 7.5 TOPS. Ideal compute = 14 GOPS/token.
    2. **Calculations:** Ideal compute time = 14 / 7500 = 1.86 ms/token. Unpacking penalty = 3 extra ALU ops per weight (mask, shift, cast). Total compute load = 5 * 7B = 35 GOPS. Actual time = 35 / 7500 = 4.66 ms.
    3. **Conclusion & Interpretation:** **Result: Compute-Bound**. The software unpacking overhead multiplies the computational load, causing a 2.5x latency regression.
