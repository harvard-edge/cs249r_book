title: The On-Device RLHF Memory Wall
scenario: You are implementing on-device RLHF for a mobile assistant. The policy model is 3B params (INT4 = 1.5 GB) and you need a 1B parameter reward model (INT8 = 1 GB) to score responses. Both must be in memory simultaneously during training. The device has 8 GB of unified memory.
question: What are the specific memory stacks involved, and is on-device RLHF feasible within 8 GB?
details:
  realistic_solution: Policy weights: 1.5 GB. Reward model: 1.0 GB. Policy optimizer (AdamW states for LoRA, ~50M trainable params): 50M x 8 bytes = 400 MB. Policy activations + gradients: ~300 MB (with checkpointing). Reward inference activations: ~100 MB. OS + framework overhead: ~1.5 GB. Total: ~4.8 GB. Fits in 8 GB, but barely. Must use LoRA (not full fine-tuning) and gradient checkpointing.
  common_mistake: |
    **The Pitfall:** Only counting model weights and forgetting optimizer states, gradients, and activations.
    **The Rationale:** Candidates calculate inference memory footprints and apply them to a training scenario, drastically underestimating the required RAM.
    **The Consequence:** The training pipeline immediately crashes with an Out-Of-Memory (OOM) error upon initialization.
  napkin_math: |
    1. **Policy Weights (INT4):** 1.5 GB.
    2. **Reward Weights (INT8):** 1.0 GB.
    3. **Policy Optimizer (LoRA AdamW):** ~50M params * 8 bytes = 0.4 GB.
    4. **Activations & Gradients:** ~0.4 GB.
    5. **OS & Framework Overhead:** ~1.5 GB.
    6. **Total Footprint:** 1.5 + 1.0 + 0.4 + 0.4 + 1.5 = **4.8 GB**.
    7. **Conclusion:** It fits in 8 GB (60% utilization), but only if LoRA and gradient checkpointing are strictly used.
