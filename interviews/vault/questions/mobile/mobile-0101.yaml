title: The Sustained vs Burst Reality
scenario: You benchmark a new MobileNetV3 variant on an Android phone, and the first 10 inferences take 12ms each. You report to your manager that the model can comfortably run at 60 FPS (16.6ms deadline). However, when the AR filter is used by customers for more than 2 minutes, the UI becomes extremely choppy.
question: Why did ten 12ms benchmark runs miss the two-minute thermal collapse of a 60 FPS AR filter?
details:
  realistic_solution: Mobile SoCs are designed to 'sprint and sleep.' If you run a continuous workload, the SoC quickly saturates its thermal envelope. The OS will aggressively throttle the CPU/GPU/NPU frequencies, drastically increasing inference time.
  common_mistake: |
    **The Pitfall:** Extrapolating sustained performance from short-burst benchmarks.
    **The Rationale:** Candidates test a few inferences and assume the device can maintain that speed indefinitely, forgetting that mobile devices lack active cooling.
    **The Consequence:** The app suffers from severe thermal throttling and UI stutter during extended use.
  napkin_math: |
    **Assumptions & Constraints:**
    - Peak burst power: 5-8 Watts.
    - Sustained passive dissipation: 2-3 Watts.
    - Initial inference latency: 12ms.

    **Calculations:**
    - Throttle requirement to reach 2.5 Watts thermal equilibrium: ~50-60% reduction in clock speed.
    - Throttled inference time: 12ms * 2 = ~24-30ms.

    **Conclusion & Interpretation:**
    - **Result: Thermal Throttling Barrier Exceeded**. Sustained operations force the device to throttle by over 50%, pushing inference times from a stable 12ms to an unstable 24-30ms and blowing past the 16.6ms budget.
