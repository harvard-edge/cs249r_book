title: Hierarchical Wake-ups Using Mobile Coprocessors
scenario: An iOS health app uses the Neural Engine (NE) continuously at 30Hz to classify movement, draining the main battery aggressively. The user is sedentary 85% of the time.
question: Analyze how cascading inference through the low-power motion coprocessor can heavily gate the NE and extend battery life.
details:
  realistic_solution: Utilizing the primary Neural Engine for continuous 30Hz polling generates massive idle power draw (~100mW). The architectural remedy involves migrating a preliminary variance thresholding model to the ultra-low-power motion coprocessor (<1mW). By gating the Neural Engine and asserting wake-up IRQs exclusively during complex motion sequences (15% of the time), the system effectively neutralizes continuous thermal load.
  common_mistake: |
    **The Pitfall:** Optimizing model weights instead of leveraging hardware architecture.
    **The Rationale:** Candidates often focus solely on model compression or quantization, missing the opportunity to turn the NE completely off during idle periods.
    **The Consequence:** The system continues to wake the high-power NE unnecessarily, failing to achieve meaningful battery life extension.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Sedentary time: 85%.
       - Active NE time required: 15%.
    2. **Calculations:**
       - Duty-cycling reduces the continuous NE power draw footprint by 85%.
    3. **Conclusion & Interpretation:**
       - **Result: 85% power reduction.** The system transitions from being heavily **Energy-Bound** to highly efficient via hardware gating.
