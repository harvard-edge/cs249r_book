title: Hierarchical Wake-ups Using Mobile Coprocessors
scenario: An iOS health app uses the Apple A17 Pro Neural Engine (NE) continuously
  at 30Hz to classify movement, draining the main battery aggressively. The user is
  sedentary 85% of the time.
question: Analyze how cascading inference through the low-power motion coprocessor
  can heavily gate the NE and extend battery life.
details:
  realistic_solution: The main Neural Engine draws significant power (~100mW) compared
    to the dedicated always-on motion coprocessor (<1mW). By implementing a lightweight
    thresholding heuristic (e.g., variance of accelerometer data) on the coprocessor,
    the OS can wake the NE exclusively during complex movement. Gating the NE for
    the 85% sedentary time reduces the model's active power footprint radically without
    missing events.
  common_mistake: Attempting to optimize the NE model weights instead of turning the
    NE completely off via architectural gating during idle periods.
  napkin_math: NE active 15% instead of 100% reduces battery drain from component
    by 85%.
