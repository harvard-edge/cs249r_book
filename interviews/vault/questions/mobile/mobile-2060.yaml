title: Hierarchical Wake-ups Using Mobile Coprocessors
scenario: An iOS health app uses the Apple A17 Pro Neural Engine (NE) continuously at 30Hz to classify movement, draining the main battery aggressively. The user is sedentary 85% of the time.
question: Analyze how cascading inference through the low-power motion coprocessor can heavily gate the NE and extend battery life.
details:
  realistic_solution: The main Neural Engine draws significant power (~100mW) compared to the dedicated always-on motion coprocessor (<1mW). By implementing a lightweight thresholding heuristic (e.g., variance of accelerometer data) on the coprocessor, the OS can wake the NE exclusively during complex movement. Gating the NE for the 85% sedentary time reduces the model's active power footprint radically without missing events.
  common_mistake: |
    **The Pitfall:** Optimizing model weights instead of leveraging hardware architecture.
    **The Rationale:** Candidates often focus solely on model compression or quantization, missing the opportunity to turn the NE completely off during idle periods.
    **The Consequence:** The system continues to wake the high-power NE unnecessarily, failing to achieve meaningful battery life extension.
  napkin_math: |
    1. **Sedentary Time:** The user is sedentary 85% of the time.
    2. **Duty Cycling:** By gating the NE, it is only active for 15% of the time.
    3. **Battery Savings:** This reduces the battery drain from the NE component by **85%**.
