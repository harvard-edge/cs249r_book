title: On-Device LoRA with Apple A17 Pro
scenario: You are designing a cross-device federated learning system to personalize a 1.5B parameter language model across millions of user devices. The target device features a Neural Engine with a strict thermal budget and shared unified memory.
question: How would you run federated LoRA updates for a 1.5B model on a mobile device within memory limits without degrading the battery?
details:
  realistic_solution: 'The optimal approach is to freeze the 1.5B base model using 8-bit quantization and apply Low-Rank Adaptation (LoRA) for the federated updates. This drastically reduces the memory footprint for optimizer states and gradients. To manage the ~5W thermal budget, training should be aggressively batched and throttled using a low duty cycle (e.g., running only when plugged in and idle), utilizing the NPU for efficient matrix multiplications while keeping bandwidth saturated but not overloaded.'
  common_mistake: |
    **The Pitfall:** Proposing full-model fine-tuning based solely on compute capability.
    **The Rationale:** Candidates assume compute is the primary bottleneck, ignoring the unified memory limit and the strict thermal budget.
    **The Consequence:** Severe thermal throttling and out-of-memory errors that crash OS background processes.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model: 1.5B params. RAM: 8 GB limit. Thermal Cap: ~5W.
       - NPU Peak: 35 TOPS.
       - Memory Bandwidth: ~50 GB/s.
    2. **Calculations:**
       - LoRA Memory: 1.5 GB INT8 weights + 20 MB Adam state = 1.52 GB (Safely fits).
       - Step Compute: 3 * 1.5B * 512 tokens = 2.3 TeraOps.
       - Compute Latency: 2.3 TeraOps / 35 TOPS = ~65 ms.
       - Memory Latency: 1.5 GB / 50 GB/s = ~30 ms.
       - Total Step Time: ~100 ms.
    3. **Conclusion & Interpretation:**
       - **Result: Thermal-Bound.** Utilizing a 10% duty cycle (1 step/sec) easily controls thermal output while safely circumventing memory bottlenecks via LoRA.
