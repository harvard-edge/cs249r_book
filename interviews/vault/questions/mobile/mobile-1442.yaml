title: On-Device LoRA with Apple A17 Pro
scenario: You are designing a cross-device federated learning system to personalize a 1.5B parameter language model across millions of user devices. The target device is the Apple A17 Pro, featuring a 16-core Neural Engine with 35 TOPS, ~5W thermal budget, and 8 GB of unified memory shared with the CPU/GPU.
question: "How would you run federated LoRA updates for a 1.5B model on Apple A17 Pro within memory limits without degrading the battery?"
details:
  realistic_solution: The optimal approach is to freeze the 1.5B base model using
    8-bit quantization and apply Low-Rank Adaptation (LoRA) for the federated updates.
    This drastically reduces the memory footprint for optimizer states and gradients.
    To manage the ~5W thermal budget, training should be aggressively batched and
    throttled using a low duty cycle (e.g., running only when plugged in and idle),
    utilizing the Neural Engine for efficient matrix multiplications while keeping
    the memory bandwidth saturated but not overloaded.
  common_mistake: |
    **The Pitfall:** Proposing full-model fine-tuning based solely on compute capability.
    **The Rationale:** Candidates assume the 35 TOPS compute is the primary bottleneck, ignoring the unified memory limit and the strict ~5W thermal budget.
    **The Consequence:** Severe thermal throttling and out-of-memory errors that crash iOS background processes.
  napkin_math: |
    - Memory: 1.5B params at INT8 = 1.5 GB. LoRA rank 16 adapters add ~20 MB for Adam states. Total ≈ 1.6 GB (safely fits in 8 GB).
    - Compute: Forward/backward pass for 512 tokens ≈ 3 × 1.5B × 512 = 2.3 TeraOps.
    - Step Time: 2.3 TeraOps / 35 TOPS = ~65 ms.
    - Memory Read Time: 1.5 GB / 50 GB/s = 30 ms. Total time ≈ 100 ms per step.
    - Duty Cycle: Running 1 step per second yields a 10% duty cycle.
    - **Conclusion:** Keeps power well under the ~5W limit while preventing thermal throttling.
