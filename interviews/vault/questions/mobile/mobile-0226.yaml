title: 'The App Store Diet: Quantization Fundamentals'
scenario: You're responsible for a new 4 million parameter computer vision model in a mobile app. It's currently stored in FP16 format, but you need to reduce the app's download size.
question: If you quantize the model's weights to INT8, what is the new size of the model on disk?
details:
  realistic_solution: Quantizing from 16-bit floating point (FP16) to 8-bit integer (INT8) halves the storage required for each parameter. FP16 uses 2 bytes per parameter, while INT8 uses 1 byte. Therefore, the new model size is 4 million parameters multiplied by 1 byte per parameter, which equals 4 megabytes.
  common_mistake: |
    **The Pitfall:** Confusing bits and bytes during calculation.
    **The Rationale:** Engineers might calculate the size in megabits (4M params × 8 bits = 32 Mbits) and incorrectly report it as 32 MB, or report the original FP16 size (8 MB).
    **The Consequence:** Storage estimations are off by a factor of 8x, leading to bloated app bundles.
  napkin_math: |
    - **Original Size (FP16):** 4,000,000 parameters * 2 bytes/param = 8,000,000 bytes = 8 MB.
    - **New Size (INT8):** 4,000,000 parameters * 1 byte/param = 4,000,000 bytes = 4 MB.
    - **Result:** **Quantizing to INT8 halves the footprint, resulting in a 4 MB model size.**
  options:
  - 8 MB
  - 32 MB
  - 4 MB
  - 2 MB
  correct_index: 2
