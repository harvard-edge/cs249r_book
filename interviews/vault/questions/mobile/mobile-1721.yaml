title: On-Device Active Learning for Image Classification on Tensor G3
scenario: Your team is developing a mobile application that performs real-time image classification for rare object detection on the Google Tensor G3, leveraging its 7.5 TOPS on-device TPU and 12 GB LPDDR5X memory. The initial model performs reasonably well, but you frequently encounter new, unrepresented classes in the wild, leading to performance drops. To continuously improve the model without large, expensive re-annotations, you decide to implement an active learning pipeline.
question: How would you design an on-device data selection strategy and annotation workflow to efficiently integrate new labels while respecting Tensor G3 constraints?
details:
  realistic_solution: Implement an uncertainty-based active learning strategy on-device. The model's prediction probabilities (e.g., entropy or margin sampling) are calculated on the Tensor G3's TPU. Samples with high uncertainty or low confidence for the predicted class, or samples close to the decision boundary, are flagged. To manage the 12 GB LPDDR5X memory, store only embeddings or compressed features of these uncertain samples, along with minimal metadata, for a defined period or until a certain batch size is reached. These selected samples are periodically offloaded to the cloud for human annotation. The annotation workflow would involve clear, version-controlled guidelines, a multi-stage review process (e.g., primary annotator, reviewer, arbiter), and automated inter-annotator agreement (IAA) metrics (like Cohen's Kappa) calculated continuously. A feedback loop from IAA analysis to guideline refinement is crucial. For addressing bias, also include a small component of diversity sampling alongside uncertainty sampling to ensure coverage of various data distributions.
  common_mistake: |
    **The Pitfall:** Collecting data passively without intelligent selection.
    **The Rationale:** Candidates fail to utilize on-device compute to filter data, assuming all user interactions are equally valuable.
    **The Consequence:** The dataset becomes biased towards common scenarios, and the annotation team is overwhelmed with redundant samples, wasting resources.
  napkin_math: |
    - Model processes 100 images/second on Tensor G3 and flags 5% as uncertain (5 images/s).
    - In one hour: 5 images/s * 3600 s/hour = 18,000 uncertain images/hour.
    - Each uncertain image's compressed embedding is 128 bytes.
    - Total memory: 18,000 images * 128 bytes/image = 2,304,000 bytes ≈ 2.3 MB.
    - **Storing embeddings for active learning uses only 2.3 MB, well within the 12GB LPDDR5X limit.**
