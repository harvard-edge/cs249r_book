title: On-Device Active Learning for Image Classification on Mobile TPU
scenario: Your team is developing a mobile application that performs real-time image classification for rare object detection on a mobile TPU, leveraging its on-device compute and 12 GB memory. The initial model performs reasonably well, but you frequently encounter new, unrepresented classes in the wild, leading to performance drops. To continuously improve the model without large, expensive re-annotations, you decide to implement an active learning pipeline.
question: How would you design an on-device data selection strategy and annotation workflow to efficiently integrate new labels while respecting memory constraints?
details:
  realistic_solution: Implement an uncertainty-based active learning strategy on-device. The model's prediction probabilities (e.g., entropy or margin sampling) are calculated on the TPU. Samples with high uncertainty or low confidence are flagged. To manage the 12 GB memory, store only embeddings or compressed features of these uncertain samples, along with minimal metadata. These selected samples are periodically offloaded to the cloud for human annotation. The workflow requires clear guidelines, a multi-stage review process, and automated inter-annotator agreement (IAA) metrics.
  common_mistake: |
    **The Pitfall:** Collecting data passively without intelligent selection.
    **The Rationale:** Candidates fail to utilize on-device compute to filter data, assuming all user interactions are equally valuable.
    **The Consequence:** The dataset becomes biased towards common scenarios, and the annotation team is overwhelmed with redundant samples, wasting resources.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model processes 100 images/second.
       - Uncertainty threshold flags 5% of images (5 images/s).
       - Compressed embedding size: 128 bytes.
    2. **Calculations:**
       - In one hour: 5 images/s * 3600 s/hour = 18,000 uncertain images/hour.
       - Total memory: 18,000 images * 128 bytes/image = 2,304,000 bytes ≈ 2.3 MB.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Feasible. Storing embeddings for active learning uses only 2.3 MB, well within the 12GB limit.**
