question: 'Without reference: ''What are the 4 steps to convert a PyTorch MobileNet
  model to CoreML for iPhone deployment, and what is the expected size of a 5M parameter
  model in FP16?'
details:
  realistic_solution: '5.7 GFLOP model at 10 TOPS: 5.7G/10T = 0.57ms = 0.00057s. The
    unit confusion: TOPS = teraops = 10^12, so 5.7G/10T = 0.00057s not 0.57s.'
  common_mistake: Listing conversion tools without noting that PyTorch models need
    an intermediate ONNX export step before coremltools conversion (unless using torch.export
    with coremltools 7+).
  napkin_math: 'Model: 5.7 GFLOPs, hardware: 10 TOPS (not GOPS). 5.7G / 10T = 5.7×10^9
    / 10×10^12 = 0.00057s (not 0.57s — that would imply 10 GOPS not TOPS). Key: TOPS
    = 10^12 ops/s.'
