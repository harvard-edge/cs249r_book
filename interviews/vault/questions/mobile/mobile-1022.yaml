title: 'Model Format Conversion: Mobile Fluency — CoreML Model Conversion Pipeline
  in 60 Seconds'
scenario: 'Without reference: ''What are the 4 steps to convert a PyTorch MobileNet
  model to CoreML for iPhone deployment, and what is the expected size of a 5M parameter
  model in FP16?'''
question: 'Without reference: ''What are the 4 steps to convert a PyTorch MobileNet
  model to CoreML for iPhone deployment, and what is the expected size of a 5M parameter
  model in FP16?'
details:
  realistic_solution: 'The 4 steps are: 1) Export the PyTorch model to ONNX format (or use PyTorch Export for newer versions); 2) Load the exported model using coremltools; 3) Convert the model using coremltools.convert specifying ct.target.iOS and compute_precision=ct.precision.FLOAT16; 4) Save the resulting CoreML model as an .mlpackage. Expected size of a 5M parameter model in FP16 (2 bytes per parameter) is 10 MB.'
  common_mistake: 'Listing conversion tools without noting that PyTorch models traditionally need an intermediate ONNX export step before coremltools conversion. Also, incorrectly calculating FP16 size by multiplying by 4 bytes instead of 2 bytes, yielding 20 MB instead of 10 MB.'
  napkin_math: 'Size: 5,000,000 params * 2 bytes/param (FP16) = 10,000,000 bytes = 10 MB.'
