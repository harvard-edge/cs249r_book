title: On-Device Model Drift Diagnosis on Google Tensor G3
scenario: A new on-device object detection model was deployed to mobile devices powered by the Google Tensor G3. After a few weeks, user reports indicate a noticeable drop in detection accuracy for newly observed object classes. The deployed version matches the validated registry version.
question: How would you outline your investigation steps, focusing on MLOps lifecycle elements?
details:
  realistic_solution: "1. **Data Drift Monitoring:** Implement or review existing input data monitoring for the on-device model. Compare current production data distributions (e.g., feature statistics, image characteristics) with the training dataset used for the deployed model. Look for shifts in object types, lighting conditions, or environmental factors. \n2. **Experiment Tracking Analysis:** Review the experiment tracking system for the deployed model version. Confirm its performance metrics (e.g., mAP, recall, precision) on various data slices during validation. Check if any data slices resembling the current problematic scenarios were underrepresented or performed poorly during initial validation.\n3. **Reproducibility Verification:** Use the model registry to confirm the exact lineage of the deployed model – including training code, dataset versions, hyper-parameters, and environment configurations. Rule out any discrepancies between the validated model and the one deployed. \n4. **Training-Serving Skew Check:** Compare pre-processing and post-processing logic in the training pipeline with the on-device inference pipeline. Even minor differences (e.g., image normalization, resizing, or bounding box format conversions) can lead to significant performance drops. \n5. **On-Device Diagnostics:** If feasible, gather anonymized on-device logs related to inference (e.g., inference latency, TPU utilization, memory usage) to ensure the Google Tensor G3 is operating within expected parameters and resource constraints are not causing unexpected behavior or data corruption."
  common_mistake: |
    **The Pitfall:** Immediately retraining and redeploying the model without a thorough diagnosis.
    **The Rationale:** Candidates jump to code-level fixes rather than systematically analyzing data drift or training-serving skew.
    **The Consequence:** Recurrent performance drops because the fundamental issue (changing environmental factors) remains unaddressed.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Image size: 1080p (~2M pixels)
       - Operations: 5 ops/pixel
       - Tensor G3: 7.5 TOPS (7.5 * 10^12 ops/s)
       - Model RAM: 250MB (on a 12GB device)
    2. **Calculations:**
       - Ops per frame = 5 * 2,000,000 = 10 MFLOPs
       - Theoretical FPS = (7.5 * 10^12) / (10 * 10^6) = 750,000 FPS
       - Memory percentage = 250MB / 12,288MB = ~2%
    3. **Conclusion & Interpretation:**
       - **Result: MLOps/Data Drift Issue. With 750k theoretical FPS and 2% memory utilization, hardware constraints are completely ruled out, confirming the regression is driven by data drift or training-serving skew.**
