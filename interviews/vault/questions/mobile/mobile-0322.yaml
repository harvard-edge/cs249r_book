title: The Mobile Memory Budget
scenario: You're A/B testing a new on-device personalization model. The 'B' variant is showing higher engagement but also a significant increase in memory usage.
question: To avoid having your app terminated by the operating system, what is the generally accepted maximum memory budget for a single application relative to the total device RAM?
details:
  realistic_solution: The standard rule of thumb is that a single application should not exceed **~25%** of the total device RAM. On a typical 8 GB device, this translates to a hard limit of about 2 GB. Exceeding this budget significantly increases the risk of the OS terminating the app to reclaim resources, which is a critical failure for user experience and retention.
  common_mistake: |
    **The Pitfall:** Assuming apps can use the majority of device RAM (50-75%).
    **The Rationale:** Engineers from cloud/desktop backgrounds fail to account for the strict memory requirements of the mobile OS and background services.
    **The Consequence:** The application exceeds its budget, triggering OS Low Memory Killer (LMK) terminations, ruining user experience and A/B test results.
  napkin_math: |
    1. **Rule of Thumb:** App budget ratio is ~25% of total RAM.
    2. **Standard Device:** On an 8 GB phone, this translates to: 8 GB * 0.25 = **2 GB hard limit**.
  options:
  - 75% — The OS allocates most of the memory to the foreground app.
  - 50% — The memory is split evenly between the app and the OS.
  - 25% — A conservative budget to ensure stability alongside the OS and other processes.
  - 5% — The OS is highly restrictive, leaving very little for any single app.
  correct_index: 2
