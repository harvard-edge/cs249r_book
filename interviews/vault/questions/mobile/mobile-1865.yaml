title: 'RLHF-Lite: Implicit Feedback Collection for Mobile Fine-Tuning'
scenario: A mobile keyboard app collects implicit user feedback (accept/reject/edit
  of autocomplete suggestions) to fine-tune a local LoRA adapter. Design a lightweight
  on-device RLHF pipeline that runs without a dedicated reward model.
question: How would you design a lightweight on-device RLHF pipeline that runs without
  a dedicated reward model?
details:
  realistic_solution: 'Lightweight RLHF without dedicated RM: (1) Reward signal design:
    accepted suggestion = +1, edited suggestion = partial reward based on edit distance
    (1 - editdist/len), rejected = -1, ignored after 3s = 0 (neutral). (2) Implicit
    reward calibration: normalize rewards per session to account for user behavior
    variance. Use z-score normalization per user. (3) Algorithm: use DPO-lite. When
    user accepts suggestion A over having previously rejected suggestion B on similar
    prompt, form a preference pair. Train LoRA update with DPO objective every 50
    preference pairs (micro-update). (4) Privacy: all training data and adapter weights
    stay on device. Opt-in federated aggregation for global improvement. (5) Computational
    budget: DPO step on 1B model with 50 pairs, all on NPU at 10 TOPS: 100 forward
    passes * 1B * 6 FLOP * 128 tokens = 76.8T FLOP / 10T = 7.7 seconds. Run during
    background charging.'
  common_mistake: Treating implicit signals as equivalent to explicit preference labels
    without correction for selection bias. Users who accept suggestions may do so
    out of laziness rather than quality preference, and the acceptance signal conflates
    brevity, relevance, and convenience.
  napkin_math: 'Daily feedback volume per user: ~50 autocomplete interactions. Accept
    rate ~60%: 30 accepted, 20 rejected. Preference pairs: ~10 valid pairs/day (filtered
    for same-context). DPO update threshold: 50 pairs = ~5 days to trigger first update.
    Update cost: 7.7 seconds NPU compute during charging. Adapter size after 30 days:
    6 updates * small gradient increments. LoRA r=4 adapter: ~3MB, accumulated delta
    over 30 days: <3MB. Storage cost negligible.'
