title: Attention vs Convolution Roofline for Mobile Vision Transformer
scenario: EfficientViT-B1 runs on Snapdragon 8 Gen 3 (45 TOPS INT8). The model alternates between multi-scale attention (MSA, high compute) and lightweight FFN (memory-bound). Profiling shows MSA at 32 TOPS effective throughput and FFN at 8 TOPS. The device peaks at 45 TOPS.
question: Why do EfficientViT MSA and FFN blocks reach 32 TOPS and 8 TOPS on a 45 TOPS Snapdragon NPU, and what optimizations apply to each?
details:
  realistic_solution: 'MSA at 32 TOPS (71% of 45 TOPS): MSA involves large QK^T matmuls across multiple scales. Q: Why not 45 TOPS? Likely causes: (1) INT8 Tensor Core tile misalignment if attention dimensions aren''t multiples of 8 or 16. (2) Softmax operation falls back to FP32, reducing effective INT8 throughput. (3) Multihead scheduling overhead. Fix: ensure head_dim is multiple of 8, use INT8 softmax approximation. FFN at 8 TOPS (18% of 45 TOPS): FFN is small GEMM [N_tokens × d_model × ffn_dim]. At mobile batch_size=1, GEMMs may be memory-bandwidth-limited. At 50 GB/s bandwidth: 8 TOPS means AI = 8T/50G = 160 Ops/byte. Snapdragon ridge: 45T/50G = 900 Ops/byte. FFN is deeply memory-bound. Fix: operator fusion, reduce FFN layer count, or use grouped convolutions.'
  common_mistake: |
    **The Pitfall:** Trying to optimize MSA and FFN with the same strategy.
    **The Rationale:** Candidates overlook that MSA and FFN have fundamentally different bottlenecks (compute vs. memory bandwidth).
    **The Consequence:** Applying the wrong optimization technique (e.g., pruning FFN for compute) fails to address the actual hardware limitation.
  napkin_math: |
    1. Calculate Snapdragon Ridge Point: 45 TOPS / 50 GB/s = 900 Ops/byte.
    2. Evaluate MSA at 32 TOPS: 71% compute efficiency, indicating it is mildly compute-bound.
    3. Evaluate FFN at 8 TOPS: AI = 8 TOPS / 50 GB/s = 0.16 TOPS/(GB/s) = 160 Ops/byte.
    4. Compare FFN AI to Ridge Point: 160 Ops/byte << 900 Ops/byte, proving it is deeply memory-bound.
    **Conclusion:** FFN needs larger batch or operator fusion to improve AI.
