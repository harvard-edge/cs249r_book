title: Optimizing LLM Deployment on Snapdragon Hexagon NPU via Structured Pruning
scenario: You are tasked with deploying an LLM on a mobile device. The current INT8 LLM consumes 10 GB of memory and has an inference latency of 200 ms, while targets are 8 GB and 100 ms respectively.
question: How would you choose between different sparsity patterns to align with the NPU's capabilities and meet memory/latency targets?
details:
  realistic_solution: |
    Explore structured pruning techniques that produce hardware-aware sparsity patterns (e.g., 2:4 or 4:8 N:M sparsity) efficiently accelerated by the NPU's Tensor Accelerators. The process involves: 1) Benchmarking structured pruning granularities while monitoring memory, latency, and accuracy. 2) Iterative pruning with fine-tuning (e.g., SparseGPT) to recover accuracy. 3) Utilizing an MLIR-based hardware-aware compiler to simulate the pruned model's performance. 4) Ensuring the pruned weights fit within LPDDR5X memory limits.
  common_mistake: |
    **The Pitfall:** Applying unstructured pruning or ignoring the NPU's architectural efficiencies.
    **The Rationale:** Candidates often assume any parameter reduction speeds up inference, forgetting that unstructured sparse matrices perform poorly on NPUs optimized for dense systolic arrays.
    **The Consequence:** Pruning a model that loses accuracy without gaining any real-world speedup or memory efficiency.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target Memory: 8 GB (requires 2 GB reduction)
    - Target Latency: 100 ms (requires 2x speedup)
    - Hardware efficiency of N:M sparsity: ~1.5x on NPU

    **Calculations:**
    - Memory Reduction: 50% sparsity on 4GB of weights reduces footprint by 2 GB, achieving 8 GB target.
    - Speedup Calculation: Compute reduced by 50%, with 1.5x hardware efficiency = 1 / (0.5 * (1/1.5)) = 3x speedup.
    - New Latency: 200 ms / 3 = ~67 ms.

    **Conclusion & Interpretation:**
    - **Result: 8 GB, 67 ms (Compute and Memory Capacity-Bound)**. A 50% structured sparsity pattern meets both the 8GB and 100ms targets.
