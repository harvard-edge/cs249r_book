title: Unified Model Versioning for Multi-Platform Mobile Deployment
scenario: Your mobile ML team maintains 12 models across iOS (CoreML) and Android (TFLite). Each model has 3 variants (quality tiers). Model updates happen monthly. With 12 x 3 x 2 = 72 model files, version drift and compatibility bugs are your top operational issue.
question: How should a mobile team manage 12 models, 3 quality tiers, and monthly CoreML/TFLite updates without version drift?
details:
  realistic_solution: 'Build a model registry with automated conversion pipeline: (1) Source of truth: PyTorch checkpoints in a central model registry (MLflow/W&B) with version tags. (2) Conversion pipeline (CI/CD): each version automatically exports to ONNX, CoreML, and TFLite, with per-tier quantization (high=FP16, medium=INT8, low=INT4). (3) Validation gate: automated golden-input tests compare outputs across all formats, rejecting any conversion with >1% accuracy deviation. (4) Deployment: models are served from a CDN with a manifest file per app version specifying compatible model versions. (5) Monitoring: on-device telemetry reports model version, platform, and inference quality metrics. Total artifacts: still 72, but fully automated and validated.'
  common_mistake: |
    **The Pitfall:** Managing model files manually with naming conventions.
    **The Rationale:** Teams start with manual processes that work for a single model but fail to scale across platforms and tiers.
    **The Consequence:** Severe version drift, silent accuracy regressions, and massive operational overhead during releases.
  napkin_math: |
    1. Manual process: 72 models * 30 min per conversion = 36 hours.
    2. Automated pipeline: 72 models * 5 min CI = 6 compute hours (1 hour wall time).
    3. **Efficiency Gain: 1 hour review vs 36 hours manual effort (36x faster).**
