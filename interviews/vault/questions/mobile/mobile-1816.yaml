title: Unified Model Versioning for Multi-Platform Mobile Deployment
scenario: Your mobile ML team maintains 12 models across iOS and Android. Each model has 3 quality tiers. Model updates happen monthly, resulting in 72 model files, causing version drift and compatibility bugs.
question: How should a mobile team manage 12 models, 3 quality tiers, and monthly updates without version drift?
details:
  realistic_solution: |
    Build a centralized model registry (e.g., MLflow) acting as the single source of truth for PyTorch checkpoints. Implement an automated CI/CD conversion pipeline using ONNX as an intermediate representation. Automate golden-input validation tests to catch precision degradation across TFLite/CoreML conversions. Ship a unified manifest file to the mobile clients to orchestrate multi-variant OTA updates.
  common_mistake: |
    **The Pitfall:** Managing model files manually with naming conventions.
    **The Rationale:** Teams start with manual processes that work for a single model but fail to scale across platforms and tiers.
    **The Consequence:** Severe version drift, silent accuracy regressions, and massive operational overhead during releases.
  napkin_math: |
    **Assumptions & Constraints:**
    - 72 target model artifacts
    - Manual conversion: 30 mins per artifact
    - Automated pipeline: 5 mins CI compute per artifact

    **Calculations:**
    - Manual Effort: 72 * 30 mins = 36 hours of engineer time
    - Automated Effort: 72 * 5 mins = 6 hours compute (run in parallel in <1 hour wall-time)

    **Conclusion & Interpretation:**
    - **Result: 36x reduction (Operational Efficiency-Bound)**. Automation yields a 36x reduction in human operational overhead.
