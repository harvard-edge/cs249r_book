title: 'Mobile TCO Design: A17 Pro vs Snapdragon 8 Gen 3 Inference Economics'
scenario: Design a cost model for choosing between A17 Pro (35 TOPS, 8GB, 3W LLM inference)
  and Snapdragon 8 Gen 3 (45 TOPS, 16GB, 4W LLM inference) for an enterprise mobile
  LLM app deployment of 10,000 devices. Battery cost at $0.10/kWh, 30 queries/day,
  150 tokens/query. Include device purchase, 2-year support, and battery replacement
  costs.
question: Which mobile platform has the better two-year TCO and capability profile
  for a 10,000-device enterprise LLM deployment?
details:
  realistic_solution: 'Energy per query: A17: 3W * (150/15 tok/s) = 30W-s = 0.00833Wh.
    Snap: 4W * (150/20 tok/s) = 30W-s = 0.00833Wh (same energy per query despite different
    power — Snap faster). Annual energy/device: 30 * 365 * 0.00833Wh = 91.3Wh. At
    $0.10: $0.00913/yr/device. Fleet: $91.3/yr (negligible). Key differentiator: 16GB
    Snap runs 7B models at BF16 (14GB). A17 8GB can only run 4B at BF16 or 7B at INT4.
    Model quality difference: use INT4 on A17 → 3-5% accuracy loss. For enterprise:
    accuracy may matter. If cloud fallback for hard queries: Snap eliminates cloud
    cost entirely. iPhone $1199 vs Samsung $1099 = $100K fleet premium for Apple.
    Snap wins on cost+capability.'
  common_mistake: Treating TOPS as the primary selection criterion without considering
    the memory capacity difference (8GB vs 16GB) which determines which models can
    run on-device, and the per-watt efficiency difference.
  napkin_math: 'Energy: A17 and Snap both ~0.00833Wh/query. Annual/device: $0.009.
    Fleet: 10K*$0.009=$90/yr — negligible. Device cost: Apple iPhone 15 Pro Max ($1199)
    vs Samsung S24 Ultra ($1299) actually similar. Memory: 16GB Snap → can run Llama-7B
    at FP16 (14GB). A17 8GB → needs INT4 (3.5GB for 7B). Throughput: Snap 20 tok/s
    vs A17 15 tok/s at 7B INT4. Response time: 150 tokens: Snap=7.5s, A17=10s. User
    experience: 25% faster on Snap. Enterprise choice: 16GB Snap for model flexibility
    + speed. Cost difference negligible. Pick by ecosystem.'
