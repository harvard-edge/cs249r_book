title: Continuous Real-Time Vision Under Thermal Constraints
scenario: You are designing a continuous real-time video understanding pipeline on the Apple A17 Pro.
  The 16-core Neural Engine can achieve 35 TOPS at a peak power of ~5W, sharing 8 GB of unified memory
  with the CPU and GPU. However, for a continuous session lasting over an hour, the device's sustained
  thermal envelope is strictly capped at 2.5W for the entire SoC. Design a thermal-aware execution architecture
  that processes 30 FPS continuously without ever triggering thermal throttling or dropping frames.
question: "How would you design a thermal-aware execution architecture that processes 30 FPS continuously without ever triggering thermal throttling or dropping frames?"
details:
  realistic_solution: Synthesize a duty-cycled, cascaded architecture that leverages the A17 Pro's 'race-to-sleep'
    capabilities. A microscopic motion-tracker runs on CPU efficiency cores to gate frame processing.
    When relevant action occurs, the 16-core Neural Engine wakes up to process batched frames at peak
    35 TOPS, then immediately powers down. By aggressively duty-cycling, the system amortizes memory access
    power and strictly adheres to the sustained thermal budget while hitting latency targets.
  common_mistake: Candidates often design for the peak 35 TOPS capability, ignoring sustained thermal
    limits and the substantial power cost of unified memory access. They typically propose static architectures
    that inevitably induce thermal throttling after a few minutes, or incorrectly assume that OS-level
    thermal management will gracefully handle real-time latency deadlines without dropping frames.
  napkin_math: 'At 30 FPS, the processing window is 33.3ms per frame. Assume the SoC baseline (display,
    memory controller) consumes 1W, leaving 1.5W of the 2.5W sustained budget for the NPU. To average
    1.5W using the 5W peak NPU, the active duty cycle must be 1.5W / 5W = 30%. Max active NPU time per
    frame = 33.3ms * 0.30 = ~10ms. Operations possible per frame in 10ms: 35 TOPS * 0.010s = 0.35 Tera-Operations
    (350 GOPS). Thus, the vision model must be strictly bounded to 350 GOPS per frame on average to guarantee
    sustained execution without thermal degradation.'
