title: Hexagon NPU Compute Utilization
scenario: A real-time video segmentation model requires 15 Giga-Operations (GOPs)
  per frame and runs on the Snapdragon 8 Gen 3 Hexagon NPU (45 TOPS capability).
question: Calculate the NPU compute utilization percentage if the pipeline is locked
  to a fixed camera feed of 60 frames per second.
details:
  realistic_solution: At 60 frames per second, the total operations required per second
    is 15 GOPs * 60 = 900 GOPs, or 0.9 TOPS. The Hexagon NPU has a peak capacity of
    45 TOPS. The compute utilization is exactly 0.9 / 45 = 2.0%.
  common_mistake: Failing to convert GOPs/frame to TOPS properly, resulting in utilization
    off by three orders of magnitude.
  napkin_math: (15 * 60) / 45000 = 0.02 or 2%.
