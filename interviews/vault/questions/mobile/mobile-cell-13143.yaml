title: 'Mobile TCO Mastery: Enterprise Mobile AI Strategy Full Cost Model'
scenario: 'Design a 3-year total cost model for deploying on-device LLM capabilities to 50,000 enterprise
  employees using Samsung Galaxy S24 Ultra (Snapdragon 8 Gen 3, 45 TOPS, 16GB). The enterprise AI assistant
  handles: email drafting (30/day, 200 tokens), meeting summaries (5/day, 500 tokens), document search
  (20/day, 100 tokens). Compare on-device vs cloud API at $0.001/1K tokens.'
details:
  realistic_solution: 'Tokens/user/day: 30*200+5*500+20*100=6000+2500+2000=10,500 tokens/day. Annual:
    10,500*365=3.8325M tokens. Cloud cost: 50K*3.8325M*$0.001/1000=$191,625/yr. 3yr: $574,875. On-device
    cost: energy (negligible $1/user/yr) + MDM/deployment: $50K setup + $5/device/month*50K = $3M/yr.
    3yr: $9M+$150K setup = $9.15M. On-device 3yr: $9.15M vs cloud $574K. Cloud is 16x cheaper! This is
    because enterprise apps don''t need millions of users to amortize MDM costs. On-device only wins for
    consumers with millions of users where cloud API becomes expensive.'
  common_mistake: Not accounting for the MDM (Mobile Device Management) cost to manage on-device models
    at enterprise scale, and the engineering cost to package, sign, and deploy model updates to 50K devices.
  napkin_math: 'Cloud 3yr: 50K users * 10,500 tok/day * 365 * 3 * $0.001/1000 = 50K * 11.5B tok * $0.001/1000
    = 50K * $11,497 / 1000 = $574,875. Wait: 10,500 * 365 * 3 = 11,497,500 tokens/user/3yr. At $0.001/1000:
    $11.50/user/3yr. Total: 50K * $11.50 = $575K. On-device MDM: $5/device/month * 50K * 36mo = $9M. Cloud
    wins massively. MDM kills on-device economics for enterprise. Exception: security-sensitive enterprises
    (government, legal) where data cannot leave device → must use on-device regardless of cost. Extra
    security premium: $9M - $575K = $8.4M over 3yr.'
