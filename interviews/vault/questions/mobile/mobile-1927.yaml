title: NPU INT4 Unpacking Penalty
scenario: An INT4 LLM is running slower than an INT8 LLM on a Hexagon NPU despite having half the memory footprint.
question: Why does an INT4 LLM run slower than an INT8 LLM on an NPU despite requiring half the memory bandwidth?
details:
  realistic_solution: 'While INT4 halves the bandwidth requirement (boosting memory-bound speeds), the Hexagon NPU MAC units only natively support INT8 math. The compiler injects bitwise shift and mask operations to unpack the 4-bit weights into 8-bit registers before multiplication. This software unpacking saturates the ALU pipeline, shifting the bottleneck from memory to compute.'
  common_mistake: |
    **The Pitfall:** Assuming halved memory footprint inherently doubles execution speed.
    **The Rationale:** Forgetting that if the NPU lacks native INT4 datapath support, the hardware must perform expensive bitwise operations to unpack values.
    **The Consequence:** Deploying an INT4 model expecting a 2x speedup, only to encounter severe compute-bound latency regressions.
  napkin_math: |
    **Assumptions & Constraints:**
    - INT8 Execution: Native hardware support (1 cycle for load + MAC).
    - INT4 Execution: Requires software bitwise shift and mask.

    **Calculations:**
    - INT8 Pipeline: 1 memory load + 1 MAC = 1 cycle.
    - INT4 Pipeline: 1 memory load + software unpacking (bitwise operations) + 1 MAC = ~3 cycles per element.

    **Conclusion & Interpretation:**
    - **Result: ~3x more cycles (Compute-Bound)**. The software unpacking overhead requires ~3x more cycles, saturating the ALU and shifting the bottleneck away from memory.
