title: NPU INT4 Unpacking Penalty
scenario: Evaluating why an INT4 LLM is running slower than an INT8 LLM on the Hexagon
  NPU despite having half the memory footprint.
question: Assess the impact of the lack of native INT4 hardware support on the NPU,
  leading to on-the-fly INT4-to-INT8 unpacking overheads in the memory hierarchy.
details:
  realistic_solution: While INT4 halves the bandwidth requirement (boosting memory-bound
    speeds), the Hexagon NPU MAC units only natively support INT8 math. The compiler
    injects bitwise shift and mask operations to unpack the 4-bit weights into 8-bit
    registers before multiplication. This software unpacking saturates the ALU pipeline,
    shifting the bottleneck from memory to compute.
  common_mistake: Assuming that because the weights are smaller, the hardware matrix
    multiply units magically process them twice as fast.
  napkin_math: 1 INT4 load + 2 bitwise ops = 3 cycles > INT8
