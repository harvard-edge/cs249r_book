title: On-Device Coreset Selection and NPU Memory Contention
scenario: You are implementing on-device data pruning for a continuous learning model on a Samsung Exynos
  2400. The device features a dual-core NPU with 34.7 TOPS and shares 12 GB of LPDDR5X memory across the
  CPU, GPU, and ISP. Your pipeline selects a coreset of daily user data for overnight fine-tuning. When
  you increase your coreset size from 500 to 2000 samples to improve model quality, you notice the NPU
  utilization drops from 85% to under 5%, and the overall fine-tuning time increases non-linearly. Explain
  why this performance degradation occurs given the shared memory architecture.
question: "Why does increasing an Exynos 2400 coreset from 500 to 2000 samples drop NPU utilization below 5%?"
details:
  realistic_solution: The degradation happens because the NPU becomes entirely memory-bound. While the
    Exynos 2400 has a powerful 34.7 TOPS NPU, it shares the 12 GB LPDDR5X memory with the CPU, GPU, and
    ISP. Increasing the coreset size increases the memory bandwidth required to fetch samples and write
    activations. Once the bandwidth requirements exceed what is available after background OS/ISP tasks
    take their share, the NPU stalls waiting for data, causing utilization to plummet.
  common_mistake: Candidates often assume that compute (the 34.7 TOPS) is the primary bottleneck and try
    to optimize the model architecture itself. They fail to account for the shared memory architecture
    and the severe bandwidth contention that occurs when the working data set increases.
  napkin_math: Assume one training step per sample requires 100 MOPs of compute and 2 MB of memory I/O.
    For 2000 samples, total compute is 200 GOPs. At 34.7 TOPS, compute time is ~5.7 ms. However, the memory
    I/O required is 4000 MB (4 GB). If shared memory bandwidth available to the NPU is 15 GB/s, the transfer
    takes 4 GB / 15 GB/s = 266 ms. The NPU utilization drops to roughly 5.7 ms / 266 ms = 2.1%, showing
    it is severely starved by the shared LPDDR5X bandwidth.
