title: The 'Live Scribe' Concurrency Crisis
scenario: You are the Lead ML Systems Engineer at a major smartphone OS company. Your team is building
  'Live Scribe', a new OS-level feature that provides system-wide, real-time transcription and generative
  text assistance. It's powered by a 1B parameter Mixture-of-Experts (MoE) model (quantized to INT4) that
  runs entirely on the device's NPU (e.g., an Apple A17-class chip).
question: "What scheduling architecture is needed for Live Scribe to manage NPU contention across streaming and interactive requests?"
details:
  realistic_solution: The core challenge is managing contention for the NPU while respecting latency priorities.
    A robust architecture requires moving beyond simple queues to a real-time scheduling system.
  common_mistake: A common but flawed proposal is to use a simple FIFO (First-In, First-Out) queue with
    static batching. For example, waiting to collect 4 requests before dispatching them to the NPU. This
    design fails because a long-running, low-priority streaming request (e.g., transcribing for 30 seconds)
    will block a high-priority interactive request, causing its TTFT to soar to multiple seconds, completely
    failing the user experience requirement. It treats all requests as equal, which they are not.
  napkin_math: 1B MoE (8 experts, 2 active). Total weights INT4 = 500MB. Active parameters per token =
    2 × (1B/8) = 2 × 125M = 250M params (125MB INT4). To generate 20 tok/sec, A17 Pro (51.2GB/s) reads
    125MB × 20 = 2.5GB/s (easy, uses only 5% of bandwidth). BUT, dynamically loading different 125MB expert
    chunks every token trashes the NPU cache. Unpredictable SRAM misses kill latency.
