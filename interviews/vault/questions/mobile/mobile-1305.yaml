title: Depthwise Separable Speedup on Exynos NPU
scenario: We are porting a legacy vision model to the Samsung Exynos 2400 NPU for a real-time video processing app. The model currently uses a standard 3x3 convolution layer with 100 input channels, 100 output channels, and a 100x100 spatial resolution. The device shares 12 GB LPDDR5X across the CPU/GPU/ISP and the dual-core NPU. To leverage the NPU's 34.7 TOPS effectively and reduce memory bandwidth usage, we propose replacing this layer with a depthwise separable convolution.
question: How many MACs do standard and depthwise separable convolutions require, and what is the estimated latency assuming the NPU runs at 10% utilization?
details:
  realistic_solution: The correct approach is to compute the MACs for the standard convolution first, then calculate the depthwise and pointwise MACs separately. Finally, convert the NPU's 34.7 TOPS to effective MACs per second at the given utilization rate to find the theoretical latency.
  common_mistake: |
    **The Pitfall:** Forgetting to separate the MAC calculation into depthwise and pointwise components, or confusing operations with MACs.
    **The Rationale:** Candidates often incorrectly calculate effective MAC throughput from the stated TOPS by forgetting that 1 MAC = 2 Operations (one multiply, one add).
    **The Consequence:** Overestimating the performance of the NPU by a factor of 2.
  napkin_math: |
    1. Standard Conv MACs: 3x3 * 100 (Cin) * 100 (Cout) * 10,000 (spatial) = 900 MMACs.
    2. Depthwise MACs: 3x3 * 100 (Cin) * 10,000 (spatial) = 9 MMACs.
    3. Pointwise MACs: 1x1 * 100 (Cin) * 100 (Cout) * 10,000 (spatial) = 100 MMACs.
    4. Total Depthwise Separable MACs: 109 MMACs (An 8.25x reduction).
    5. Exynos 2400 Peak MACs: 34.7 TOPS / 2 = 17.35 TMACs/sec.
    6. Effective throughput at 10% utilization: 1.735 TMACs/sec (1,735,000 MMACs/sec).
    7. Standard Conv Latency: 900 MMACs / 1,735,000 MMACs/sec = 0.000518 seconds = **0.52 ms**.
