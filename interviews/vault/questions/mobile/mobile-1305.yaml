title: Depthwise Separable Speedup on Exynos NPU
scenario: We are porting a legacy vision model to an NPU for a real-time video processing app. The model currently uses a standard 3x3 convolution layer with 100 input channels, 100 output channels, and a 100x100 spatial resolution. To leverage the hardware effectively and reduce memory bandwidth usage, we propose replacing this layer with a depthwise separable convolution.
question: How many MACs do standard and depthwise separable convolutions require, and what is the estimated latency assuming the NPU runs at 10% utilization of its 34.7 TOPS peak?
details:
  realistic_solution: The correct approach is to compute the MACs for the standard convolution first, then calculate the depthwise and pointwise MACs separately. Finally, convert the NPU's 34.7 TOPS to effective MACs per second at the given utilization rate to find the theoretical latency.
  common_mistake: |
    **The Pitfall:** Forgetting to separate the MAC calculation into depthwise and pointwise components, or confusing operations with MACs.
    **The Rationale:** Candidates often incorrectly calculate effective MAC throughput from the stated TOPS by forgetting that 1 MAC = 2 Operations (one multiply, one add).
    **The Consequence:** Overestimating the performance of the NPU by a factor of 2.
  napkin_math: |
    **Assumptions & Constraints:**
    - Spatial resolution: 100 x 100 = 10,000.
    - Cin = 100, Cout = 100.
    - NPU Peak: 34.7 TOPS. Utilization: 10%.

    **Calculations:**
    - Standard Conv MACs: 3x3 x 100 x 100 x 10,000 = 900 MMACs.
    - Depthwise MACs: 3x3 x 100 x 10,000 = 9 MMACs.
    - Pointwise MACs: 1x1 x 100 x 100 x 10,000 = 100 MMACs.
    - Total Depthwise Separable MACs: 109 MMACs (8.25x reduction).
    - NPU Peak MACs = 34.7 TOPS / 2 = 17.35 TMACs/sec.
    - Effective throughput = 17.35 x 0.10 = 1.735 TMACs/sec (1,735,000 MMACs/sec).
    - Standard Conv Latency = 900 / 1,735,000 = 0.000518 seconds.

    **Conclusion & Interpretation:**
    - **Result: 0.52 ms (Compute-Bound)**. The standard convolution takes 0.52 ms; depthwise separable reduces compute by over 8x, drastically dropping latency.
