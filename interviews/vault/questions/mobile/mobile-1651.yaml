title: MLOps Artifacts for On-Device AI with Google Tensor G3
scenario: Your team is developing a new on-device AI feature for a mobile app. Your MLOps pipeline needs to manage artifacts to ensure reproducibility and training-serving consistency across development, testing, and production.
question: What non-binary artifacts should a model registry version to keep Tensor G3 on-device AI training and serving consistent?
details:
  realistic_solution: 'To ensure robust reproducibility and training-serving consistency for on-device AI, a comprehensive model registry should version the following artifacts: 1) The optimized model binary for the target hardware. 2) The exact training code (commit hash/tag) and specific version of the machine learning framework used. 3) Configuration files including hyperparameters. 4) A unique identifier or metadata for the specific dataset version. 5) Evaluation metrics and performance benchmarks. 6) Pre- and post-processing code that runs on the device. 7) Environmental dependencies (e.g., libraries, compiler versions) critical for model compilation or inference runtime.'
  common_mistake: |
    **The Pitfall:** Versioning only the final optimized model file (e.g., .tflite).
    **The Rationale:** Teams often treat the compiled binary as the only artifact needed for deployment, treating the pipeline like a traditional software build.
    **The Consequence:** Leads to irreproducible results, broken CI/CD pipelines, and an inability to trace back on-device bugs to specific data or hyperparameter changes.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Target framerate: 60 FPS (16.67ms per frame).
       - Compute budget: Tensor G3 NPU provides 7.5 TOPS (7.5 × 10^12 Ops/sec).
    2. **Calculations:**
       - Compute per frame: (7.5 × 10^12 Ops/sec) / 60 frames/sec = 1.25 × 10^11 Ops/frame.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound.** The model's maximum computational budget is **125 GOPS per frame** to strictly meet the real-time requirement, necessitating versioned, optimized artifacts that hit this target.
