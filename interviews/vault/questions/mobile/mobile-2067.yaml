title: Hexagon Audio Batching Energy
scenario: An always-on NLP model on the Snapdragon 8 Gen 3 Hexagon NPU processes 1-second audio snippets. The NPU costs 10mJ to wake from sleep, 5mJ per inference, and negligible energy in sleep.
question: Evaluate the energy consumed per minute by batching 5 snippets and waking up every 5 seconds, versus waking up instantly for every snippet.
details:
  realistic_solution: Processing instantly requires 60 wake-ups per minute. Energy = 60 * (10mJ wake + 5mJ compute) = 900mJ. Batching every 5 seconds requires 12 wake-ups per minute, processing 5 snippets each time. Energy = 12 * (10mJ wake + (5 * 5mJ compute)) = 12 * 35mJ = 420mJ. Evaluating this shows batching cuts energy consumption by more than half, at the cost of up to 4 seconds of processing delay.
  common_mistake: |
    **The Pitfall:** Multiplying the wake cost by the batch size.
    **The Rationale:** Candidates fail to realize that the wake energy is a fixed cost amortized across all batched inferences in a single wake cycle.
    **The Consequence:** They incorrectly calculate that batching consumes the same or more energy, entirely missing the core benefit of duty cycling.
  napkin_math: |
    - Processing instantly: 60 wake-ups per minute.
    - Energy (instant) = 60 * (10mJ wake + 5mJ compute) = 900mJ.
    - Batching every 5 seconds: 12 wake-ups per minute.
    - Energy (batched) = 12 * (10mJ wake + (5 * 5mJ compute)) = 12 * 35mJ = 420mJ.
    - **Batching cuts energy consumption by more than half (420mJ vs 900mJ), at the cost of processing delay.**
