title: Hexagon Audio Batching Energy
scenario: An always-on NLP model processes 1-second audio snippets. The NPU costs 10mJ to wake from sleep, 5mJ per inference, and consumes negligible energy in sleep.
question: Evaluate the energy consumed per minute by batching 5 snippets and waking up every 5 seconds, versus waking up instantly for every snippet.
details:
  realistic_solution: Processing instantly requires 60 wake-ups per minute. The wake cost is incurred for every single snippet. Batching every 5 seconds requires only 12 wake-ups per minute, processing 5 snippets sequentially during each wake cycle. Evaluating this reveals that batching amortizes the fixed wake-up cost, deeply cutting energy consumption at the expense of a bounded 4-second latency delay.
  common_mistake: |
    **The Pitfall:** Multiplying the fixed wake cost by the batch size.
    **The Rationale:** Candidates fail to realize that the wake energy is a fixed state-transition cost amortized across all batched inferences in a single wake cycle.
    **The Consequence:** They incorrectly calculate that batching consumes identical or greater energy, entirely missing the core benefit of duty cycling.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Wake cost: 10mJ.
       - Inference cost: 5mJ.
       - Snippet interval: 1 second.
    2. **Calculations:**
       - Instant: 60 wake-ups/min. Energy = 60 * (10mJ + 5mJ) = 900mJ.
       - Batched: 12 wake-ups/min. Energy = 12 * (10mJ + (5 * 5mJ)) = 12 * 35mJ = 420mJ.
    3. **Conclusion & Interpretation:**
       - **Result: Power-Bound (Wake Energy).** Batching cuts energy consumption by more than half (420mJ vs 900mJ).
