title: On-Device Federated Learning Round Feasibility on Snapdragon 8 Gen 3
scenario: A federated learning system trains a keyboard prediction model (LSTM, 2M params, FP32) locally on a Snapdragon 8 Gen 3. Each device runs 10 local epochs on 1000 samples (64-dim input, batch=32).
question: "How long, how much memory, and how much battery does a 10-epoch LSTM FL round cost on Snapdragon 8 Gen 3?"
details:
  realistic_solution: 'LSTM training on FP32: Snapdragon 8 Gen 3 CPU FP32 performance
    ~50 GFLOPS (Cortex-X4 with NEON). LSTM 2M params: FWD FLOPs ≈ 2×2M×64×10 (seq_len)
    = 2.56B. BWD ≈ 2×FWD = 5.12B. Total per sample: 7.68B FLOPs. 1000 samples × 10
    epochs = 10,000 iterations. Per batch (32): 32 × 7.68B = 245.8B FLOPs. Steps:
    10,000/32 = 312.5 steps. Total FLOPs: 312.5 × 245.8B = 76.8 TFLOPS. At 50 GFLOPS:
    76.8T/50G = 1536 seconds = 25.6 minutes. Memory: 2M params × 4B × 3 (weights+grad+optimizer)
    = 24MB — trivial. Battery: 25.6 min at 3W CPU = 78mWh = 0.6% of 12,000mAh battery.
    Feasible if scheduled during charging.'
  common_mistake: |
    **The Pitfall:** Using INT8 TOPS for training throughput.
    **The Rationale:** Candidates forget that on-device FL training typically runs in FP32 for gradient accuracy, and NPUs often lack native FP32 backward pass support.
    **The Consequence:** Vastly underestimating training time by assuming the NPU can be fully utilized for backpropagation.
  napkin_math: |
    - FLOPs per sample: 2M params × 64-dim × 10 (seq_len) × 2 (fwd) = 2.56B.
    - Backward FLOPs: 2.56B × 2 = 5.12B.
    - Total per sample: 7.68B.
    - FLOPs per round: 10,000 total samples × 7.68B FLOPs = 76.8 TFLOPS.
    - Compute Speed: CPU FP32 at 50 GFLOPS.
    - Time: 76.8 TFLOPS / 50 GFLOPS = 1536 seconds = **25.6 minutes**.
    - Memory: 2M params × 4 bytes × 3 (weights+grad+opt) = **24 MB**.
    - Battery: 3W × (25.6 / 60) hr = 1.28 Wh (~2.9% of a 44.4 Wh battery).
