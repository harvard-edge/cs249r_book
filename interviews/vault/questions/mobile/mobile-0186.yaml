title: The Economics of On-Device Learning
scenario: You're A/B testing a new personalization model for a mobile app with 1 million users. The new
  model requires collecting 50 MB of new sensor data per user for one week.
details:
  realistic_solution: The correct approach is to calculate the total cost for each strategy across the
    entire user base of 1 million people.
  common_mistake: Engineers often underestimate or ignore the cost of cellular data transfer at scale.
    They may focus only on the compute or energy cost per device, failing to see that transmitting data
    across the network for a large user base is frequently the dominant expense, far outweighing the cost
    of the electricity needed for on-device computation.
  napkin_math: '1. Calculate Total Data: 1,000,000 users * 50 MB/user = 50,000,000 MB. 2. Convert to Gigabytes:
    50,000,000 MB / 1000 = 50,000 GB (or 50 TB). 3. Estimate Centralized Ingest Cost: Assuming typical
    cloud egress/storage costs of $0.02/GB, collecting this 50 TB of A/B test data costs 50,000 GB * $0.02/GB
    = $1,000.'
  options:
  - Centralized cost is ~$50,000; Federated cost is ~$20. (Off-by-10x error in data conversion)
  - Centralized cost is ~$500,000; Federated cost is ~$600. (Confuses power with energy for federated
    cost)
  - Centralized cost is ~$500,000; Federated cost is ~$20.
  - Centralized cost is ~$500; Federated cost is ~$20,000. (Ignores scaling for centralized and miscalculates
    federated)
  correct_index: 2
