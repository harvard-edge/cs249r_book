title: The Economics of On-Device Learning
scenario: You are A/B testing a new personalization model for a mobile app with 1 million users. The new model requires collecting 50 MB of new sensor data per user.
question: What are the fleet-level costs of centralized data collection versus federated learning for 1M mobile users?
details:
  realistic_solution: Calculate the total cost for each strategy across the entire user base of 1 million people. Federated Learning avoids centralized data egress and storage costs by distributing the compute and network load directly to users.
  common_mistake: |
    **The Pitfall:** Underestimating the cost of cellular data transfer at scale.
    **The Rationale:** Engineers focus strictly on the compute or energy cost per device, completely ignoring that transmitting massive data volumes across network pipelines is frequently the dominant expense.
    **The Consequence:** Proposing economically inviable centralized data collection strategies.
  napkin_math: |
    **Assumptions & Constraints:**
    - Users: 1,000,000.
    - Data per user: 50 MB.
    - Transfer Cost: $0.02/GB.

    **Calculations:**
    - Total Data Volume: 1,000,000 users * 50 MB/user = 50,000,000 MB.
    - Convert to GB: 50,000,000 MB / 1,000 = 50,000 GB.
    - Total Cost: 50,000 GB * $0.02/GB = $1,000.

    **Conclusion & Interpretation:**
    - **Result: $1,000 (Network-Cost-Bound)**. Centralized collection incurs a direct network egress/storage cost of ~$1,000, whereas federated learning pushes data costs to the user's Wi-Fi.
  options:
  - 'Centralized cost is ~$50,000; Federated cost is ~$20. (Trap: Treating MB as GB directly)'
  - 'Centralized cost is ~$500,000; Federated cost is ~$600. (Trap: Massive magnitude error)'
  - Centralized cost is ~$1,000; Federated cost is negligible data transfer cost.
  - 'Centralized cost is ~$500; Federated cost is ~$20,000. (Trap: Reversing the cost model)'
  correct_index: 2
