title: The Economics of On-Device Learning
scenario: "You're A/B testing a new personalization model for a mobile app with 1 million users. The new model requires collecting 50 MB of new sensor data per user for one week."
question: "What are the fleet-level costs of centralized data collection versus federated learning for 1M mobile users?"
details:
  realistic_solution: The correct approach is to calculate the total cost for each strategy across the entire user base of 1 million people.
  common_mistake: |
    **The Pitfall:** Underestimating the cost of cellular data transfer at scale.
    **The Rationale:** Engineers often focus only on the compute or energy cost per device, failing to see that transmitting data across the network for a large user base is frequently the dominant expense.
    **The Consequence:** Proposing economically inviable data collection strategies.
  napkin_math: |
    - Calculate Total Data: `1,000,000 users * 50 MB/user = 50,000,000 MB`.
    - Convert to Gigabytes: `50,000,000 MB / 1000 = 50,000 GB`.
    - Calculate Cost: Assuming cloud egress/storage costs of $0.02/GB, the cost is `50,000 GB * $0.02/GB = $1,000`.
    - **Conclusion:** Centralized cost is **~$1,000** for the data transfer alone.
  options:
  - Centralized cost is ~$50,000; Federated cost is ~$20.
  - Centralized cost is ~$500,000; Federated cost is ~$600.
  - Centralized cost is ~$1,000; Federated cost is negligible data transfer cost.
  - Centralized cost is ~$500; Federated cost is ~$20,000.
  correct_index: 2
