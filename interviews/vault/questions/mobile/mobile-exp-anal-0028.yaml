title: Analyzing OOM for 3B FP16 Model on A17 Pro
scenario: A mobile team deploys a 3 billion parameter model using FP16 precision to leverage the Apple
  A17 Pro Neural Engine (capable of 35 TOPS at ~5W with its 16 cores). The device features 8 GB of shared
  unified memory across the CPU, GPU, and ANE. The engineers calculate that the weights require 6 GB,
  which is less than the 8 GB total, but the application consistently crashes with an Out-Of-Memory (OOM)
  error immediately upon launch. Explain why this memory allocation fails given the system architecture.
details:
  realistic_solution: In the Apple A17 Pro architecture, the 8 GB unified memory pool is shared across
    the CPU, GPU, 16-core ANE, and the operating system. To ensure system stability, iOS strictly limits
    the maximum RAM a single app can allocate (typically capping it around 50-60% of total system memory).
    Even though the 6 GB model mathematically fits into the 8 GB total, it far exceeds the OS-imposed
    single-process limit, causing an immediate termination. To utilize the ANE's 35 TOPS within the power
    envelope, the team must quantize the model to fit the strict app memory boundary while leaving room
    for inference overhead.
  common_mistake: Candidates often assume that the full 8 GB of unified memory is exclusively available
    to a single user application. They fail to account for the OS overhead, the strict iOS per-process
    memory limits, and the additional memory required for runtime activations or KV cache.
  napkin_math: 'Weight footprint: 3 billion parameters * 2 bytes/parameter (FP16) = 6.0 GB. Total device
    unified memory = 8.0 GB. Estimated iOS single-app limit = ~55% of 8.0 GB = 4.4 GB. 6.0 GB (weights)
    > 4.4 GB (app limit) = OOM crash. Quantizing to 4-bit (0.5 bytes/param) reduces the weight footprint
    to 1.5 GB, leaving 2.9 GB of the app''s 4.4 GB budget for activations, KV cache, and application UI
    overhead.'
