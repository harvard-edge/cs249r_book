title: 'Network Bandwidth Bottlenecks: Diagnose LLM TPOT Regression After App Update'
scenario: An iOS app update adds a background animation (Metal shader rendering at 60fps) alongside an already-running 1B INT4 LLM (A17 Pro, 8GB, 68 GB/s). TPOT degrades from 7.4ms to 11ms after the update. The model weights (500MB) are unchanged.
question: Can a 60 FPS Metal animation explain a 1B INT4 LLM TPOT jump from 7.4ms to 11ms on A17 Pro?
details:
  realistic_solution: 'LLM: 500MB/68GB/s=7.35ms baseline. Metal shader (60fps animation, 1080×2340×4B×60=608MB/s): additional BW 0.6GB/s. New effective LLM BW: 500MB/(T_step) where T_step = 500MB/(68-0.6)GB/s = 500/67.4GB/s=7.42ms. Barely changed. But actual observation: 11ms. Root cause: Metal shader uses GPU memory explicitly (VRAM shared in Apple unified memory): at 60fps, 1080p RT rendering reads textures and writes framebuffer. Estimated: 1GB/s. Plus display controller: 0.6GB/s. Total contention: ~2GB/s. LLM: 500/(68-2)=500/66=7.58ms. Still not 11ms. Remaining: Apple privacy API for animation adds CoreAnimation serialization: 3-4ms serialization latency spike. Solution: move animation to lower priority Metal queue.'
  common_mistake: |
    **The Pitfall:** Blaming compute contention (Neural Engine vs. GPU) instead of memory bandwidth.
    **The Rationale:** Engineers assume independent cores won't affect each other's execution speed.
    **The Consequence:** Missing the fact that the Metal shader and LLM both compete for the same LPDDR5X memory bandwidth pool.
  napkin_math: |
    - **LLM Baseline TPOT:** 500 MB / 68 GB/s = **7.35 ms**.
    - **Metal Animation Bandwidth:** 1080×2340 × 4 Bytes × 60 FPS = **~608 MB/s**.
    - **Calculated Contention TPOT:** 500 MB / (68 GB/s - 0.6 GB/s) = **7.42 ms** (Barely changed, doesn't explain 11 ms).
    - **Real Root Cause:** GPU rendering reads textures AND writes framebuffers (~1 GB/s) + Display Controller (~0.6 GB/s). Total Contention is ~2 GB/s.
    - **Updated Contention TPOT:** 500 MB / (68 - 2) GB/s = **7.58 ms** (Still not 11 ms).
    - **Missing Link:** Apple privacy API / CoreAnimation serialization adds **3-4 ms** latency spike.
