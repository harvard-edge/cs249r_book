title: 'Network Bandwidth Bottlenecks: Diagnose LLM TPOT Regression After App Update'
scenario: An iOS app update adds a background animation (Metal shader rendering at 60fps) alongside an already-running 1B INT4 LLM. TPOT degrades from 7.4ms to 11ms after the update. The model weights are unchanged.
question: Can a 60 FPS Metal animation explain a 1B INT4 LLM TPOT jump from 7.4ms to 11ms on A17 Pro?
details:
  realistic_solution: While shared unified memory architecture means the GPU animation does compete with the LLM for DRAM bandwidth, the mathematical volume of contention is totally insufficient to cause a 3.5ms regression. The true root cause lies in Apple's OS-level scheduling. Rendering UI via CoreAnimation enforces strict privacy API checks and queue serialization, which forcibly blocks the NPU execution thread, injecting a massive 3-4ms scheduling spike completely unrelated to memory physics.
  common_mistake: |
    **The Pitfall:** Automatically blaming compute starvation or NPU thermal throttling for the latency regression.
    **The Rationale:** Engineers assume distinct execution cores operate independently and fail to recognize OS-level API blocking on shared queues.
    **The Consequence:** Completely ignoring the severe scheduling penalties imposed by the mobile operating system, resulting in fruitless debugging of memory subsystems.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - LLM Model: 1B INT4 (500 MB footprint).
       - Memory Bandwidth: 68 GB/s.
       - Render load: 1080x2340 resolution, 4 Bytes/pixel, 60 FPS.
    2. **Calculations:**
       - Baseline LLM TPOT: 500 MB / 68 GB/s = 7.35 ms.
       - Render texture read bandwidth: 1080*2340*4*60 = ~608 MB/s.
       - Framebuffer + Display controller contention: ~1.4 GB/s.
       - Total Contention: ~2.0 GB/s.
       - Contention TPOT: 500 MB / (68 - 2) GB/s = 7.58 ms (Fails to explain 11ms).
       - Hidden latency: CoreAnimation synchronization adds 3-4 ms.
    3. **Conclusion & Interpretation:**
       - **Result: System Scheduling-Bound.** While shared unified memory contention exists, it is mathematically insufficient to explain the regression. The massive spike is caused by OS-level API serialization blocking the Metal queue.
