title: 'Network Bandwidth Bottlenecks: Diagnose LLM TPOT Regression After App Update'
scenario: An iOS app update adds a background animation (Metal shader rendering at
  60fps) alongside an already-running 1B INT4 LLM (A17 Pro, 8GB, 68 GB/s). TPOT degrades
  from 7.4ms to 11ms after the update. The model weights (500MB) are unchanged. Diagnose
  the root cause using bandwidth math.
question: Can a 60 FPS Metal animation explain a 1B INT4 LLM TPOT jump from 7.4ms
  to 11ms on A17 Pro?
details:
  realistic_solution: 'LLM: 500MB/68GB/s=7.35ms baseline. Metal shader (60fps animation,
    1080×2340×4B×60=608MB/s): additional BW 0.6GB/s. New effective LLM BW: 500MB/(T_step)
    where T_step = 500MB/(68-0.6)GB/s = 500/67.4GB/s=7.42ms. Barely changed. But actual
    observation: 11ms. Root cause: Metal shader uses GPU memory explicitly (VRAM shared
    in Apple unified memory): at 60fps, 1080p RT rendering reads textures and writes
    framebuffer. Estimated: 1GB/s. Plus display controller: 0.6GB/s. Total contention:
    ~2GB/s. LLM: 500/(68-2)=500/66=7.58ms. Still not 11ms. Remaining: Apple privacy
    API for animation adds CoreAnimation serialization: 3-4ms serialization latency
    spike. Solution: move animation to lower priority Metal queue.'
  common_mistake: Blaming compute contention (NE vs. GPU) when the real issue is that
    the Metal shader and LLM both compete for LPDDR5X memory bandwidth.
  napkin_math: 'Metal 60fps 1080p: read textures ~500MB/s + write framebuffer 608MB/s
    = ~1.1GB/s. LLM baseline: 500MB/68GB/s=7.35ms. With contention: 500/(68-1.1)=500/66.9=7.48ms.
    Too small to explain 11ms. Real cause: GPU and NE share memory controller — at
    60fps GPU, memory controller priority may starve NE. Fix: set inferenceOnly on
    CoreML model to reduce GPU/NE arbitration, or drop animation to 30fps.'
