title: Calculate Prefill Latency Bound on Tensor G3
scenario: You are profiling the prefill (prompt processing) latency of the Gemini Nano model running on a Google Tensor G3. The Tensor G3 features an on-device TPU delivering 7.5 TOPS and is equipped with 12 GB LPDDR5X memory. Gemini Nano requires 6 billion operations per token during the prefill phase.
question: What is the theoretical minimum compute latency in milliseconds to process a 100-token prompt?
details:
  realistic_solution: The prefill phase is typically compute-bound because the model weights can be reused across all tokens in the prompt simultaneously. To calculate the bottleneck, compute the total required operations for the prompt and divide by the TPU's compute capacity (7.5 TOPS).
  common_mistake: |
    **The Pitfall:** Applying memory bandwidth bottlenecks to the prefill phase.
    **The Rationale:** Candidates often confuse the compute-bound prefill phase with the memory-bound token generation phase, or fail to convert TeraOps to GigaOps correctly.
    **The Consequence:** The calculated latency is entirely incorrect, reflecting a misunderstanding of LLM inference phases.
  napkin_math: |
    1. **Total Operations:** 100 tokens * 6 billion ops/token = 600 billion ops = 0.6 TeraOps.
    2. **TPU Capacity:** 7.5 TOPS (Tera Operations Per Second).
    3. **Compute Latency:** 0.6 TeraOps / 7.5 TOPS = 0.08 seconds.
    4. **Final Result:** 0.08 seconds = **80 milliseconds**.
