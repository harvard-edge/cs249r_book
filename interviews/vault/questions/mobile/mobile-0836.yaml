title: Mixed-Precision Mobile Super-Resolution
scenario: A super-resolution model ported to the Snapdragon 8 Gen 3 NPU experiences
  severe color-banding artifacts. Profiling shows global INT8 quantization is clipping
  extreme activation outliers in the final reconstruction layers.
question: Diagnose the mechanism of the accuracy drop and design a specification for
  a mixed INT8/FP16 execution graph to resolve it while preserving throughput.
details:
  realistic_solution: Global INT8 static quantization calculates a single scale factor,
    causing massive precision loss when rare outliers force the scale factor to be
    too large, crushing small but important color gradients to zero. The candidate
    should specify running the heavy feature-extraction backbone in INT8 for maximum
    TOPS, while leaving the final 1-2 reconstruction layers (where un-normalized spatial
    activations exhibit outliers) in FP16 to preserve dynamic range without heavily
    impacting overall latency.
  common_mistake: Suggesting Quantization-Aware Training (QAT) without addressing
    the fundamental hardware dynamic range limitation of INT8 for un-normalized output
    layers.
  napkin_math: INT8 dynamic range is 256; if an outlier requires a max range of 1000,
    step size becomes ~3.9, wiping out subtle variations < 3.9.
