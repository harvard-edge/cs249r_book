title: Mixed-Precision Mobile Super-Resolution
scenario: A super-resolution model ported to the Snapdragon 8 Gen 3 NPU experiences severe color-banding artifacts. Profiling shows global INT8 quantization is clipping extreme activation outliers in the final reconstruction layers.
question: "Diagnose the mechanism of the accuracy drop and design a specification for a mixed INT8/FP16 execution graph to resolve it while preserving throughput."
details:
  realistic_solution: Global INT8 static quantization calculates a single scale factor, causing massive precision loss when rare outliers force the scale factor to be too large, crushing small but important color gradients to zero. The candidate should specify running the heavy feature-extraction backbone in INT8 for maximum TOPS, while leaving the final 1-2 reconstruction layers (where un-normalized spatial activations exhibit outliers) in FP16 to preserve dynamic range without heavily impacting overall latency.
  common_mistake: |
    **The Pitfall:** Suggesting Quantization-Aware Training (QAT) to fix the issue.
    **The Rationale:** Engineers view QAT as the ultimate fix for quantization artifacts, ignoring hardware limits.
    **The Consequence:** QAT fails to fix the issue because the final un-normalized layers inherently possess a massive dynamic range that physical INT8 registers simply cannot represent.
  napkin_math: |
    - **INT8 Limit:** Dynamic range is fixed at **256 values** (-128 to +127).
    - **Outlier Impact:** If an outlier forces the max range to 1000, the step size becomes 1000 / 256 = **~3.9**.
    - **Conclusion:** Any subtle color gradient variation smaller than 3.9 is completely wiped to zero, causing severe banding.
