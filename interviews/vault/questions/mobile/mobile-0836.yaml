title: Mixed-Precision Mobile Super-Resolution
scenario: A super-resolution model ported to a mobile NPU experiences severe color-banding artifacts. Profiling shows global INT8 quantization is clipping extreme activation outliers in the final reconstruction layers.
question: "Diagnose the mechanism of the accuracy drop and design a specification for a mixed INT8/FP16 execution graph to resolve it while preserving throughput."
details:
  realistic_solution: Implement a mixed-precision execution graph. Run the high-FLOP feature-extraction backbone in INT8 to maximize TOPS. Retain the final un-normalized reconstruction layers in FP16 to preserve dynamic range, preventing the global static quantization scale factor from crushing small color gradients to zero.
  common_mistake: |
    **The Pitfall:** Suggesting Quantization-Aware Training (QAT) to fix the issue.
    **The Rationale:** Engineers view QAT as the ultimate fix for quantization artifacts, ignoring hardware limits.
    **The Consequence:** QAT fails to fix the issue because the final un-normalized layers inherently possess a massive dynamic range that physical INT8 registers simply cannot represent.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - INT8 dynamic range: 256 values (-128 to +127).
       - Outlier max range: 1000.
    2. **Calculations:**
       - Global Step Size: 1000 / 256 = ~3.9.
    3. **Conclusion & Interpretation:**
       - **Result: Precision-Bound**. Any subtle color gradient variation smaller than 3.9 is completely wiped to zero by quantization, causing severe banding.
