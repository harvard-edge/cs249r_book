title: Zero-Copy Memory Pipelines in Android NPUs
scenario: An Android app on a Snapdragon 8 Gen 3 takes 2 seconds to process a JPEG.
  Profiling shows 1.5 seconds is spent allocating and copying RGB arrays from JVM
  memory to the NPU's native space.
question: Apply zero-copy data strategies utilizing Android HardwareBuffer to calculate
  the theoretical end-to-end processing time improvement.
details:
  realistic_solution: Currently, crossing the JNI boundary requires full allocation
    and data duplication (1.5s cost). By decoding the JPEG natively directly into
    an Android HardwareBuffer mapped to unified memory, the NPU can access the tensor
    without copies. The 1.5s copy penalty is eliminated, leaving only the 0.5s actual
    compute time, reducing total processing to 500ms.
  common_mistake: Focusing on quantization or multithreading to speed up the JVM loop
    rather than eliminating the memory copy completely via shared memory semantics.
  napkin_math: 2.0s total - 1.5s copy overhead = 0.5s end-to-end inference.
