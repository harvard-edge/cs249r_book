title: Zero-Copy Memory Pipelines in Android NPUs
scenario: An Android app on a Snapdragon 8 Gen 3 takes 2 seconds to process a JPEG. Profiling shows 1.5 seconds is spent allocating and copying RGB arrays from JVM memory to the NPU's native space.
question: Apply zero-copy data strategies utilizing Android HardwareBuffer to calculate the theoretical end-to-end processing time improvement.
details:
  realistic_solution: Currently, crossing the JNI boundary requires full allocation and data duplication (1.5s cost). By decoding the JPEG natively directly into an Android HardwareBuffer mapped to unified memory, the NPU can access the tensor without copies. The 1.5s copy penalty is eliminated, leaving only the 0.5s actual compute time, reducing total processing to 500ms.
  common_mistake: |
    **The Pitfall:** Focusing on quantization or multithreading to speed up the JVM loop.
    **The Rationale:** Candidates try to optimize the visible loop rather than eliminating the root cause of the memory copy completely via shared memory semantics.
    **The Consequence:** Minor incremental improvements are achieved, but the massive 1.5s memory copy penalty remains the dominant bottleneck.
  napkin_math: |
    1. **Baseline Latency:** 2.0s total processing time.
    2. **Copy Overhead:** 1.5s spent crossing the JNI boundary and duplicating data.
    3. **Compute Time:** 2.0s - 1.5s = 0.5s actual compute time on the NPU.
    **Result:** By using a zero-copy Android HardwareBuffer, the 1.5s overhead is eliminated, reducing total end-to-end processing to **500ms** (a 4x speedup).
