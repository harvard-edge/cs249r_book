title: Architecting Federated PEFT for LLMs on Tensor G3
scenario: A cross-device federated learning system personalizes an on-device LLM for predictive text formatting on devices powered by the Google Tensor G3 (12 GB LPDDR5X, 7.5 TOPS). The system must handle highly customized user typing patterns over intermittent network connections.
question: How would you design a cross-device federated learning system to personalize an on-device LLM (like Gemini Nano) for predictive text formatting?
details:
  realistic_solution: A robust architecture mandates Parameter-Efficient Fine-Tuning (PEFT) like LoRA or QLoRA, offloading the heavy matrix multiplications to the on-device TPU to maximize the 7.5 TOPS throughput. To combat non-IID text data, the system should employ FedProx or Scaffold to regularize local drift, and only schedule communication rounds when the phone is idle, charging, and connected to unmetered Wi-Fi to preserve user battery and data plans.
  common_mistake: |
    **The Pitfall:** Proposing standard Federated Averaging with full-model fine-tuning.
    **The Rationale:** Candidates ignore the extreme memory pressure of 16-bit weight updates on mobile RAM and multi-gigabyte communication overheads.
    **The Consequence:** This exhausts device memory, incurs massive data plan costs, and neglects specialized TPU hardware in favor of CPU-bound gradient descent.
  napkin_math: |
    - **Memory Constraint:** A 1.8B parameter model at 8-bit consumes ~1.8 GB. Full Adam optimizer state would require 14.4 GB (impossible on 12 GB RAM).
    - **PEFT Solution:** Rank-8 LoRA reduces trainable parameters to ~5 million.
    - **Optimizer State:** Drops to a negligible ~40 MB.
    - **Compute Time:** A mini-batch of 4 sequences of 512 tokens needs ~40 GFLOPs.
    - **Final Result:** **40 GFLOPs / 7,500 GFLOPs/s = ~5.3ms compute time, easily fitting the thermal envelope.**
