title: Architecting ASIL-B Driver Monitoring on Hexagon NPU
scenario: You are designing an ASIL-B certified driver monitoring system running on a Qualcomm Hexagon
  NPU (Snapdragon 8 Gen 3). The NPU provides 45 TOPS of INT8 compute and shares a 12 GB LPDDR5X memory
  pool with the heterogeneous CPU and GPU. Architect the system to ensure deterministic execution, detailing
  your approach to memory isolation, watchdog timers, and the fallback strategy if the NPU hangs.
question: "How would you architect the system to ensure deterministic execution, detailing your approach to memory isolation, watchdog timers, and the fallback strategy if the NPU hangs?"
details:
  realistic_solution: The architecture should utilize the SMMU to carve out a dedicated, isolated memory
    partition for the Hexagon NPU within the shared LPDDR5X. A hardware watchdog timer running on a secure
    RTOS island must monitor an NPU heartbeat. If the watchdog trips due to a hang, the system should
    instantly fail over to a lightweight, pre-loaded fallback model running on the CPU.
  common_mistake: Candidates often rely on standard OS-level software watchdogs and fail to implement
    hardware-level memory isolation. They also frequently ignore the impact of shared LPDDR5X bus contention
    from the CPU and GPU, which can unpredictably violate deterministic execution deadlines.
  napkin_math: For a 30 FPS system, the safety deadline is 33.3ms per frame. A 15 GOPS INT8 model on the
    45 TOPS Hexagon NPU requires theoretically 0.33ms of compute. Allocating 5ms for worst-case shared
    LPDDR5X contention and IPC overhead yields a 5.33ms nominal latency. Setting the hardware watchdog
    at 15ms leaves an 18.3ms budget for the CPU fallback to execute and maintain the strict 33.3ms ASIL-B
    deadline.
