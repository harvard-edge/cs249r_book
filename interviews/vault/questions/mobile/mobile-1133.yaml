title: Designing a Distillation Pipeline for A17 Pro NPU
scenario: Your team needs to deploy a large language model to run locally on the Apple
  A17 Pro Neural Engine, which provides 35 TOPS at roughly 5W and shares 8 GB of unified
  memory with the CPU/GPU. The original teacher model is 14B parameters, which vastly
  exceeds the memory and thermal budgets. Architect a knowledge distillation system
  to train a student model that fits within the memory constraints of the A17 Pro
  while maximizing the utilization of its 16-core NPU. Evaluate the tradeoffs between
  logit matching, intermediate feature distillation, and student architectural choices
  to ensure it meets real-time latency requirements without excessive battery drain.
question: How should a distilled A17 Pro LLM student be trained and sized to fit memory,
  latency, and power constraints?
details:
  realistic_solution: The optimal design pairs sequence-level knowledge distillation
    with selective logit matching to train a heavily optimized student model (e.g.,
    1.5B - 2B parameters) tailored for the NPU. The student should use grouped-query
    attention and be quantized to INT4 post-distillation. This ensures the model weights
    and KV cache fit comfortably within a safe 2-3 GB memory footprint, leaving the
    rest of the 8 GB shared memory for the system, while easily meeting latency goals
    on the 16-core NPU.
  common_mistake: Candidates often propose pure feature distillation without tailoring
    the student architecture to the A17 Pro's 16-core NPU, resulting in inefficient
    memory access patterns. They also frequently size the student model assuming the
    full 8 GB of unified memory is available, forgetting it is shared with the OS,
    GPU, and background apps.
  napkin_math: A 2B parameter student model in 4-bit quantization requires 1 GB for
    weights. The KV cache for a 2048-token context might take ~200 MB. This 1.2 GB
    total fits easily into the 8 GB shared unified memory. Generating one token takes
    ~4 Giga-operations (GOPS). At 25 tokens/sec, this is 100 GOPS (0.1 TOPS). Given
    the A17 Pro NPU provides 35 TOPS, the compute requirement is a tiny fraction of
    peak capacity, ensuring the system draws far less than the ~5W maximum and preserves
    battery life.
