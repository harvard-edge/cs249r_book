title: Designing a Distillation Pipeline for A17 Pro NPU
scenario: Your team needs to deploy a large language model to run locally on the Apple A17 Pro Neural Engine, which provides 35 TOPS at roughly 5W and shares 8 GB of unified memory with the CPU/GPU. The original teacher model is 14B parameters, which vastly exceeds the memory and thermal budgets.
question: How should a distilled A17 Pro LLM student be trained and sized to fit memory, latency, and power constraints?
details:
  realistic_solution: The optimal design pairs sequence-level knowledge distillation with selective logit matching to train a heavily optimized student model (e.g., 1.5B - 2B parameters) tailored for the NPU. The student should use grouped-query attention and be quantized to INT4 post-distillation. This ensures the model weights and KV cache fit comfortably within a safe 2-3 GB memory footprint, leaving the rest of the 8 GB shared memory for the system, while easily meeting latency goals on the 16-core NPU.
  common_mistake: |
    **The Pitfall:** Proposing pure feature distillation without tailoring the student architecture to the 16-core NPU or unified memory limits.
    **The Rationale:** Candidates forget the 8 GB unified memory is shared with the OS, GPU, and background apps, and assume the full memory is available for the model.
    **The Consequence:** The resulting model causes inefficient memory access patterns, aggressive OS eviction, and fails latency targets.
  napkin_math: |
    - A 2B parameter student model in 4-bit quantization requires 1 GB for weights.
    - The KV cache for a 2048-token context takes ~200 MB.
    - The 1.2 GB total fits easily into the 8 GB shared unified memory.
    - Generating one token takes ~4 Giga-operations (GOPS).
    - At 25 tokens/sec, this requires 100 GOPS (0.1 TOPS).
    - **Compute required is 0.1 TOPS**, a tiny fraction of the 35 TOPS peak, ensuring minimal power draw and preserving battery life.
