title: The 60 FPS Camera ML Pipeline
scenario: You must design a camera pipeline that runs portrait segmentation at 60 FPS with ML-powered depth-of-field blur. The segmentation model takes 25ms per frame on the NPU, but the camera outputs at 60 FPS (16.67ms per frame).
question: How do you deliver a smooth 60 FPS experience when the model takes longer than the frame time?
details:
  realistic_solution: 'Design a **decoupled multi-rate pipeline** where the camera, ML, and rendering run at independent rates.'
  common_mistake: |
    **The Pitfall:** Trying to find a faster model that fits entirely within the 16.67ms frame window.
    **The Rationale:** Assuming ML processing must be synchronous with the display render cycle.
    **The Consequence:** Dropping frames entirely whenever the OS pauses, leading to horrible user experience.
  napkin_math: |
    **Assumptions & Constraints:**
    - Camera output = 60 FPS (16.67ms/frame).
    - NPU inference latency = 25ms/frame.

    **Calculations:**
    - ML Frame Drop: Decouple ML to 24 FPS (every 2.5 frames).
    - NPU Power Draw: 24 FPS * 25ms = 60% duty cycle. 0.60 * 2W = 1.2W.
    - GPU Render Power: 60 FPS * 7.5ms = 45% duty cycle. 0.45 * 1.5W = 0.675W.
    - Total Pipeline Power: 1.2W + 0.675W = 1.875W.

    **Conclusion & Interpretation:**
    - **Result: 1.875W load (Latency-Bound)**. Decoupling ML to 24 FPS fits the latency budget and is sustainable.
