title: The 60 FPS Camera ML Pipeline
scenario: Design a camera pipeline that runs portrait segmentation at 60 FPS with ML-powered depth-of-field
  blur. The segmentation model takes 25ms per frame. The camera outputs at 60 FPS (16.67ms per frame).
  The math doesn't work — 25ms > 16.67ms. How do you deliver 60 FPS?
details:
  realistic_solution: 'Design a **decoupled multi-rate pipeline** where the camera, ML, and rendering
    run at independent rates:'
  common_mistake: '"Use a faster model." Even a 15ms model leaves only 1.67ms for everything else (rendering,
    UI, camera capture). One GC pause and you drop frames.'
  napkin_math: 'Camera: 60 FPS (16.67ms period). ML: 25ms inference → 40 FPS max on NPU, but we target
    24 FPS (every 2.5 frames) for thermal headroom. Render: 7.5ms per frame → 133 FPS theoretical, 60
    FPS actual (VSync locked). Mask staleness: worst case 42ms (2.5 frames). At arm''s length, a head
    moves ~3 pixels in 42ms — the gyro warp corrects this to <0.5 pixel error. Imperceptible to the user.
    Power: NPU at 24 FPS × 25ms = 60% duty cycle × 2W = 1.2W. GPU render: 60 FPS × 7.5ms = 45% duty cycle
    × 1.5W = 0.675W. Total ML+render: 1.875W.'
