title: 'Roofline Analysis for MobileNetV3 on Google Tensor G3'
scenario: 'You are optimizing a MobileNetV3-large variant for deployment on a mobile TPU. This model requires approximately 100 Giga Operations (INT8 equivalent) and moves 1 GB of data per inference. The TPU features 7.5 TOPS (INT8 peak) and 12 GB LPDDR5X RAM with an effective bandwidth of 60 GB/s. Initial profiling reveals the model achieves only 30 FPS.'
question: 'Using roofline math, is a 100 GOPS model moving 1GB per inference compute-bound or memory-bound, and how would you optimize it?'
details:
  realistic_solution: '1. **Memory Optimization**: Implement tensor fusion, reduce intermediate tensor sizes, use efficient data layouts (e.g., channel-last), and explore advanced quantization (e.g., sparsity-aware) to minimize data movement. 2. **Data Locality**: Restructure computation to improve cache utilization and reduce off-chip memory accesses. 3. **Hardware-aware Profiling**: Utilize TPU profilers to pinpoint actual memory bottlenecks and TPU idle cycles. 4. **Model Architecture Refinement**: Modify the architecture to increase its arithmetic intensity or reduce data movement for critical layers.'
  common_mistake: |
    **The Pitfall:** Focusing solely on FLOPs optimization without considering memory access patterns.
    **The Rationale:** Engineers default to compute optimization and ignore the fact that mobile device performance is often strictly dictated by memory bandwidth.
    **The Consequence:** Optimization efforts fail to improve FPS because the fundamental memory bandwidth bottleneck remains untouched.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model compute: 100 GOPS. Data movement: 1 GB.
    - TPU Peak Compute: 7.5 TOPS (7500 GOPS/s). Memory Bandwidth: 60 GB/s.

    **Calculations:**
    - Arithmetic Intensity: 100 GOPS / 1 GB = 100 OPS/Byte.
    - Hardware Ridge Point: 7500 GOPS / 60 GB/s = 125 OPS/Byte.
    - Model is memory-bound (100 < 125).
    - Max Performance Limit: 60 GB/s x 100 OPS/Byte = 6000 GOPS/s (6 TOPS).
    - Max FPS = 6000 GOPS/s / 100 GOPS/frame = 60 FPS.

    **Conclusion & Interpretation:**
    - **Result: 60 FPS (Memory-Bound)**. The workload is memory-bound at 6 TOPS. The theoretical maximum is 60 FPS, meaning the observed 30 FPS implementation is heavily unoptimized and can be doubled.
