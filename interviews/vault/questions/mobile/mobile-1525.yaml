title: Roofline Analysis for MobileNetV3 on Google Tensor G3
scenario: You are optimizing a large MobileNetV3-large variant, including complex
  post-processing, for deployment on a mobile device powered by the Google Tensor
  G3. This model requires approximately 100 Giga Operations (INT8 equivalent) and
  moves 1 GB of data per inference. The Google Tensor G3 features a 7.5 TOPS (INT8
  peak) on-device TPU and 12 GB LPDDR5X RAM with an effective bandwidth of 60 GB/s.
  Initial profiling reveals the model achieves only 30 FPS, while theoretical analysis
  suggests it should perform better. Using the Roofline model, diagnose whether the
  workload is compute-bound or memory-bound, and propose concrete optimization strategies
  to maximize TPU utilization and achieve higher inference speeds. How would you quantify
  the potential performance uplift of your proposed changes?
question: Using Tensor G3 roofline math, is a 100 GOPS model moving 1GB per inference
  compute-bound or memory-bound at 30 FPS?
details:
  realistic_solution: '1. **Memory Optimization**: Implement tensor fusion, reduce
    intermediate tensor sizes, use efficient data layouts (e.g., channel-last), and
    explore advanced quantization (e.g., sparsity-aware) to minimize data movement.
    2. **Data Locality**: Restructure computation to improve cache utilization and
    reduce off-chip memory accesses. 3. **Hardware-aware Profiling**: Utilize Tensor
    G3''s specific TPU profilers to pinpoint actual memory bottlenecks and TPU idle
    cycles. 4. **Model Architecture Refinement**: If permissible, modify the model''s
    architecture to increase its arithmetic intensity or reduce data movement for
    critical layers.'
  common_mistake: Focusing solely on FLOPs (or operations) optimization without considering
    memory access patterns, data locality, and effective memory bandwidth. On mobile
    devices, memory constraints and power efficiency often make memory bandwidth the
    dominant bottleneck, yet engineers frequently prioritize compute optimization
    first.
  napkin_math: 'Given: Compute Peak = 7.5 TOPS (7500 GOps/s), Memory Bandwidth Peak
    = 60 GB/s.

    For the model: 100 GOps per inference, 1 GB data movement per inference.

    Arithmetic Intensity (AI) = 100 GOps / 1 GB = 100 Ops/Byte.

    Memory-bound performance = Memory Bandwidth * AI = 60 GB/s * 100 Ops/Byte = 6000
    GOps/s (6 TOPS).

    Compute-bound performance = 7500 GOps/s (7.5 TOPS).

    The workload is **memory-bound**, with a theoretical peak performance of 6000
    GOps/s.

    Theoretical maximum FPS = (6000 GOps/s) / (100 GOps/inference) = 60 FPS.

    Observed 30 FPS indicates the current implementation only achieves 50% of the
    theoretical memory-bound peak performance, leaving significant room for optimization.'
