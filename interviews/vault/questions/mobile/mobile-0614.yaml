title: The CoreML ANE Fallback
scenario: You successfully convert your PyTorch model to CoreML format to run on an iPhone's Apple Neural
  Engine (ANE). The Xcode profiling tool shows that 95% of the model operations are mapped to the ANE.
  However, the inference latency is worse than running it purely on the CPU. How can using the dedicated
  AI accelerator make the model slower?
question: "How can using the dedicated AI accelerator make the model slower?"
details:
  realistic_solution: You are suffering from **Accelerator Context Switching and Memory Copies**. The
    ANE only supports a specific subset of operations (e.g., standard Conv2D, pooling). If your model
    has an unsupported operation (like a custom Swish activation or a dynamic tensor reshape) buried in
    the middle of the network, the CoreML compiler splits the graph.
  common_mistake: '"The ANE is slower than the CPU for certain math." The ANE is vastly faster. The problem
    is the boundaries between the 95% and the 5%.'
  napkin_math: 'CPU-only inference: 40ms. | ANE-only inference (ideal): 5ms. | Splitting the graph: ANE
    does 95% in 4.7ms. CPU does 5% in 2ms. But the two memory copies of a 10MB activation tensor take
    15ms each, plus 5ms of OS scheduling overhead. Total time = 4.7 + 15 + 2 + 15 + 5 = 41.7ms. The memory
    copies made it slower than the CPU alone.'
