title: The CoreML ANE Fallback
scenario: You successfully convert your PyTorch model to CoreML format to run on an iPhone's Apple Neural Engine (ANE). The Xcode profiling tool shows that 95% of the model operations are mapped to the ANE. However, the inference latency is worse than running it purely on the CPU.
question: How can using the dedicated AI accelerator make the model slower?
details:
  realistic_solution: You are suffering from **Accelerator Context Switching and Memory Copies**. The ANE only supports a specific subset of operations (e.g., standard Conv2D, pooling). If your model has an unsupported operation (like a custom Swish activation or a dynamic tensor reshape) buried in the middle of the network, the CoreML compiler splits the graph.
  common_mistake: |
    **The Pitfall:** Assuming the ANE is simply slower than the CPU for certain math.
    **The Rationale:** Engineers see poor end-to-end latency and blame the accelerator's raw compute speed rather than pipeline inefficiencies.
    **The Consequence:** This misdiagnosis leads to avoiding the ANE entirely, rather than fixing the unsupported operations that cause graph splitting.
  napkin_math: |
    - **CPU-only inference:** 40 ms
    - **ANE-only inference (ideal):** 5 ms
    - **Graph Splitting Overhead:**
        - ANE does 95% of work: **4.7 ms**
        - CPU does 5% of work: **2 ms**
        - Memory copies (10MB tensor back and forth): **30 ms**
        - OS scheduling overhead: **5 ms**
    - **Total Split Time:** 4.7 + 2 + 30 + 5 = **41.7 ms** (Slower than CPU alone).
