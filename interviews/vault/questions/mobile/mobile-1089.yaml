title: Analyze Encoder vs Decoder Latency on Snapdragon NPU
scenario: Your team is deploying a real-time translation model to a mobile device featuring a Snapdragon NPU. You are comparing a 1-billion parameter encoder-only model for intent classification versus a 1-billion parameter decoder-only model for generative translation. During profiling, you observe the encoder runs significantly faster per token.
question: Why does a 1B encoder run faster per token than a 1B decoder on a mobile NPU?
details:
  realistic_solution: The performance divergence originates from sequence execution. Encoders leverage parallel matrix multiplications across all tokens simultaneously, heavily saturating the NPU's matrix math engines. Decoders generate autoregressively, forcing a complete 1 GB weight fetch from LPDDR RAM for every single token generated. The decoder abandons its compute capacity and starves while waiting for memory DMA.
  common_mistake: |
    **The Pitfall:** Assuming equal parameter count yields equal latency.
    **The Rationale:** Candidates see two 1B parameter models and assume they will execute with identical performance profiles on the same hardware.
    **The Consequence:** They overlook the fundamental difference between the compute-bound nature of parallel encoding and the memory-bandwidth-bound nature of autoregressive decoding.
  napkin_math: |
    **Assumptions & Constraints:**
    - 1B INT8 model size: 1 GB.
    - Memory Bandwidth: 50 GB/s.
    - NPU Compute: 45 TOPS (45,000 GOPS).

    **Calculations:**
    - Memory loading time per token: 1 GB / 50 GB/s = 20 ms.
    - Compute time per token: 2 GOPS / 45,000 GOPS = 0.044 ms.

    **Conclusion & Interpretation:**
    - **Result: 20 ms memory vs 0.044 ms compute (Memory-Bandwidth-Bound)**. The decoder is entirely memory-bandwidth-bound, while the encoder is parallelized and compute-efficient.
