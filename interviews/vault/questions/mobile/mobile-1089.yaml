title: Analyze Encoder vs Decoder Latency on Snapdragon NPU
scenario: Your team is deploying a real-time translation model to a mobile device
  featuring the Qualcomm Hexagon NPU (Snapdragon 8 Gen 3). You are comparing a 1-billion
  parameter encoder-only model for intent classification versus a 1-billion parameter
  decoder-only model for generative translation. The NPU provides 45 TOPS for INT8
  operations and shares 12 GB of LPDDR5X memory with the CPU and GPU. During profiling,
  you observe that the encoder-only model achieves significantly higher throughput
  per token than the decoder-only model during its generation phase, despite both
  models having the exact same number of parameters. Explain why this performance
  discrepancy occurs given the hardware constraints.
question: Why does a 1B encoder run faster per token than a 1B decoder on Snapdragon
  8 Gen 3 Hexagon NPU?
details:
  realistic_solution: The discrepancy happens because the encoder processes the entire
    input sequence in parallel, making it compute-bound and able to efficiently utilize
    the 45 TOPS of the Hexagon NPU. In contrast, the decoder generates tokens autoregressively.
    For each new token, the entire 1B parameter weight matrix must be fetched from
    the shared 12 GB LPDDR5X memory, making it heavily memory-bandwidth bound. The
    NPU's high compute capacity sits idle while waiting for memory transfers during
    the decoding phase.
  common_mistake: Candidates often assume that models with the same parameter count
    will have identical latency characteristics on edge NPUs. They frequently overlook
    the difference between the compute-bound nature of processing all tokens in parallel
    (encoder) versus the memory-bandwidth-bound nature of autoregressive generation
    (decoder).
  napkin_math: For a 1B parameter model quantized to INT8, weights occupy 1 GB of
    memory. During autoregressive decoding, generating 1 token requires loading the
    full 1 GB of weights. Assuming the LPDDR5X memory provides roughly 50 GB/s of
    effective bandwidth to the NPU, generating one token takes 1 GB / 50 GB/s = 20
    ms (50 tokens/sec). Compute required for 1 token is ~2 Giga-operations. With the
    NPU providing 45 TOPS (45,000 GOPS), compute time is 2 / 45,000 = 0.044 ms. The
    20 ms memory fetch completely bottlenecks the 0.044 ms compute time, explaining
    why the decoder underperforms the compute-bound encoder.
