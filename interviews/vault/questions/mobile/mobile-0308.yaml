title: The Mobile Roofline Dilemma (mobile-0308)
scenario: 'You''re an engineer on a mobile team trying to optimize a new real-time camera filter. You measure the workload: for each video frame, it performs 414 million INT8 operations and moves 8.3 MB of data (reading the input tensor and writing the output). The mobile NPU is rated for 35 TOPS and has a memory bandwidth of 51.2 GB/s.'
question: Is a 414M-op, 8.3 MB/frame NPU camera filter compute-bound or memory-bound?
details:
  realistic_solution: 'The workload is **memory-bound**. To determine this, we must calculate the workload''s Arithmetic Intensity (AI) and compare it to the hardware''s ridge point.'
  common_mistake: |
    **The Pitfall:** Failing to normalize units when calculating arithmetic intensity.
    **The Rationale:** Candidates often divide raw numbers without converting to standard Tera-ops/sec and Giga-bytes/sec, causing 1000x calculation errors.
    **The Consequence:** Incorrectly identifying the bottleneck and applying the wrong optimization strategy.
  napkin_math: |
    **Assumptions & Constraints:**
    - Workload = 414M INT8 Ops, 8.3 MB data moved.
    - Hardware = 35 TOPS (35*10^12 Ops/s), 51.2 GB/s (51.2*10^9 Bytes/s).

    **Calculations:**
    - Arithmetic Intensity (AI) = 414*10^6 Ops / 8.3*10^6 Bytes ≈ 49.9 Ops/Byte.
    - Hardware Ridge Point = 35*10^12 / 51.2*10^9 ≈ 683 Ops/Byte.
    - Memory Time = 8.3 MB / 51.2 GB/s = 0.16 ms.
    - Compute Time = 414 M-Ops / 35 TOPS = 0.012 ms.

    **Conclusion & Interpretation:**
    - **Result: AI is 49.9 Ops/Byte (Memory-bound workload)**. Because AI is far less than the Ridge Point, memory accesses take 13x longer than compute.
  options:
  - Compute-bound, because its arithmetic intensity (50 Ops/Byte) is far greater than the hardware's ridge point of ~0.7 Ops/Byte.
  - Compute-bound, because 35 TOPS is a very high computational load that is difficult to saturate.
  - Memory-bound, because its arithmetic intensity (~50 Ops/Byte) is less than the ridge point (~683 Ops/Byte).
  - It's a balanced workload because the ratio of compute to memory is close to 1:1.
  correct_index: 2
