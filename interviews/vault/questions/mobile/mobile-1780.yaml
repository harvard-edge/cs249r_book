title: 'Roofline Comparison: CPU vs Neural Engine for LLM on A17 Pro'
scenario: You're running a 7B parameter LLM in INT4 (3.5GB model) on iPhone 15 Pro with A17 Pro. The CPU achieves 2 TFLOPS FP16 with AMX extensions, and memory bandwidth is 68 GB/s.
question: How does roofline analysis guide the choice between CPU and Neural Engine for a batch-1 INT4 7B LLM decode?
details:
  realistic_solution: 'At batch=1 decode, each token requires loading 3.5GB weights once. Memory-bound ceiling = 68 GB/s → 3.5GB/68 GB/s ≈ 51ms/token = ~20 tok/s regardless of compute unit. CPU with AMX: 2 TFLOPS / 14 GFLOPs per token = ~143 tokens/s — above the memory bandwidth ceiling of ~20 tok/s, confirming memory-bandwidth is the binding constraint. Neural Engine: even if fast, still memory-bandwidth limited. Winner is whichever unit has better INT4 dequantization pipeline and cache reuse. Apple''s Metal framework routes to ANE+CPU hybrid for best throughput.'
  common_mistake: |
    **The Pitfall:** Defaulting to the Neural Engine simply because it advertises higher peak TOPS.
    **The Rationale:** Engineers assume the NPU is universally superior for ML workloads, failing to verify datatype support (like INT4) and bandwidth limits.
    **The Consequence:** Encountering massive dequantization overhead on the ANE that negates any theoretical throughput advantage.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model: 7B INT4 (3.5 GB).
       - CPU FP16 AMX: 2 TFLOPS. Memory Bandwidth: 68 GB/s.
       - Compute Demand: 14 GFLOPs/token.
    2. **Calculations:**
       - Memory Bound Ceiling: 3.5 GB / 68 GB/s = 51ms/token (19.6 tokens/s).
       - CPU Compute Ceiling: 2000 GFLOPS / 14 GFLOPs = 143 tokens/s.
    3. **Conclusion & Interpretation:** Since 143 tokens/s >> 19.6 tokens/s, both the CPU and NPU are strictly **Memory-Bandwidth Bound** at ~20 tokens/s.
