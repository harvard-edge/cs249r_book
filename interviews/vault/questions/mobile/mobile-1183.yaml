title: A17 Pro Mixed-Precision Bottleneck
scenario: 'You are deploying a 1.5B parameter language model on the Apple A17 Pro Neural Engine for real-time text generation. The device features a 16-core ANE with 35 TOPS of compute, a ~5W power budget, and 8 GB of unified memory shared with the CPU/GPU. Currently, using FP16 weights, the model achieves only 8 tokens per second.'
question: 'How would you analyze the system to identify the core performance bottleneck, and quantify the expected speedup if you transition to an INT8 weight-only mixed-precision format?'
details:
  realistic_solution: 'Identify that generative inference at batch size 1 is entirely memory-bandwidth bound. Since every parameter must be loaded from the shared 8 GB unified memory for each generated token, the massive 35 TOPS compute capacity is mostly idle. Switching to INT8 weight-only quantization halves the memory traffic per token, which directly scales generation speed.'
  common_mistake: |
    **The Pitfall:** Assuming compute is the bottleneck and proposing pruning or architecture changes.
    **The Rationale:** Candidates see 35 TOPS and low latency and instinctually try to optimize FLOPs rather than identifying the memory-bound nature of autoregressive decoding.
    **The Consequence:** Significant engineering effort is wasted on complex architectural search that yields zero speedup because memory bandwidth remains the limiting factor.
  napkin_math: |
    1. **Current Bandwidth:** 1.5B params in FP16 = 3.0 GB. At 8 tokens/sec, utilized bandwidth is 3.0 GB × 8 = 24 GB/s.
    2. **Compute Analysis:** Compute per token ≈ 2 × 1.5B = 3.0 GOPs. Time on 35 TOPS NPU = 3.0 GOPs / 35,000 GOPs/sec = 0.085 ms/token. This proves severe memory-bandwidth constraint.
    3. **INT8 Upgrade:** INT8 weights reduce model size to 1.5 GB.
    4. **Expected Speedup:** Using the same 24 GB/s effective bandwidth, new generation speed = 24 GB/s / 1.5 GB = **16 tokens/sec**.
