title: A17 Pro Mixed-Precision Bottleneck
scenario: You are deploying a 1.5B parameter language model on a mobile Neural Engine for real-time text generation. The NPU boasts 35 TOPS of compute and shares 8 GB of unified memory. Using FP16 weights, the model currently achieves only 8 tokens per second.
question: How do you identify the core bottleneck, and what speedup is expected by transitioning to an INT8 weight-only format?
details:
  realistic_solution: |
    Autoregressive generation at batch size 1 is fundamentally memory-bandwidth bound. Every parameter must be fetched from main memory for each generated token, leaving the NPU compute units starved. Transitioning to an INT8 weight-only quantization format explicitly halves the memory traffic, directly doubling the generation throughput.
  common_mistake: |
    **The Pitfall:** Diagnosing low token throughput as a compute bottleneck and attempting to optimize FLOPs.
    **The Rationale:** Engineers fixate on the 35 TOPS specification and ignore the memory read constraints of batch-1 LLM decoding.
    **The Consequence:** Wasting time on complex structural pruning or architectural search that yields zero practical speedup.
  napkin_math: |
    1. **Assumptions & Constraints:** 1.5B params. FP16 = 3.0 GB. INT8 = 1.5 GB. Current speed = 8 tokens/sec. Compute = 35 TOPS.
    2. **Calculations:** Bandwidth = 3.0 GB * 8 tokens/sec = 24 GB/s. Compute time per token = 3.0 GOPs / 35,000 GOPs/sec = 0.085 ms (compute is trivial). New speed = 24 GB/s / 1.5 GB = 16 tokens/sec.
    3. **Conclusion & Interpretation:** **Result: Memory-Bandwidth-Bound**. Moving to INT8 halves the memory payload, doubling throughput to 16 tokens/sec.
