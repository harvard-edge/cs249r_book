title: Continuous Real-Time Vision Under Thermal Constraints
scenario: You are designing a continuous real-time video understanding pipeline on the Apple A17 Pro. The 16-core Neural Engine can achieve 35 TOPS at a peak power of ~5W, sharing 8 GB of unified memory. However, for a continuous session lasting over an hour, the device's sustained thermal envelope is strictly capped at 2.5W for the entire SoC.
question: How would you design a thermal-aware execution architecture that processes 30 FPS continuously without ever triggering thermal throttling or dropping frames?
details:
  realistic_solution: Synthesize a duty-cycled, cascaded architecture that leverages the A17 Pro's 'race-to-sleep' capabilities. A microscopic motion-tracker runs on CPU efficiency cores to gate frame processing. When relevant action occurs, the 16-core Neural Engine wakes up to process batched frames at peak 35 TOPS, then immediately powers down. By aggressively duty-cycling, the system amortizes memory access power and strictly adheres to the sustained thermal budget while hitting latency targets.
  common_mistake: |
    **The Pitfall:** Designing for the peak 35 TOPS capability while ignoring sustained thermal limits.
    **The Rationale:** Candidates focus on raw speed and assume OS thermal management will gracefully handle continuous load without dropping frames.
    **The Consequence:** The device inevitably thermal throttles after a few minutes, breaking real-time SLAs.
  napkin_math: |
    1. 30 FPS processing window is 33.3ms. Remaining NPU thermal budget is 1.5W.
    2. Active duty cycle to hit 1.5W average (with 5W peak) = 1.5W / 5W = 30%.
    3. Max active NPU time per frame = 33.3ms * 0.30 = 10ms.
    4. **Operations possible per frame: 35 TOPS * 0.010s = 0.35 TOPS = 350 GOPS.**
