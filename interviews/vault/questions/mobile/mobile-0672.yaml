title: 'The Budget Phone Crash: Memory Hierarchy Design'
scenario: Your image editing app with an on-device super-resolution model works on the Samsung Galaxy S24 (Snapdragon 8 Gen 3, 8 GB RAM) and iPhone 15 (A16, 6 GB RAM). A wave of 1-star reviews comes from users on the Samsung Galaxy A15 (Helio G99, 4 GB RAM) and Redmi Note 13 (Snapdragon 685, 4 GB RAM). The app crashes immediately when they tap 'Enhance Photo'. The model is 15 MB.
question: Why does a 15 MB super-resolution model crash on 4 GB budget phones but not flagship phones?
details:
  realistic_solution: 'Budget phones with ''4 GB RAM'' provide only ~850 MB to your app after OS and background services. Super-resolution at 12 MP allocates activation tensors peaking at 2.4 GB \u2014 instant OOM kill with no swap, no warning. Fix: implement a device capability tier system. On budget devices: (1) tile the input into 1 MP patches (200 MB peak), (2) use a lightweight model variant, or (3) cap input resolution at 3 MP. Process tiles sequentially \u2014 12 tiles at 1 MP each = ~1 second total, acceptable for a photo enhancement feature. Test on $150 phones, not just flagships.'
  common_mistake: |
    **The Pitfall:** Confusing model file size with runtime activation memory.
    **The Rationale:** Candidates assume a 15MB model is lightweight, neglecting that high-resolution image processing generates massive intermediate tensors.
    **The Consequence:** The app attempts to allocate gigabytes of activation memory on a budget device, triggering an instant OS kill.
  napkin_math: |
    *   **Full Model Peak RAM (12 MP):** `~2.4 GB`
    *   **Budget Phone Available RAM:** `~850 MB`
    *   **Deficit:** `1.55 GB` (Instant OOM)
    *   **Tiled Execution (1 MP):** `~200 MB peak`
    *   **Result:** **Tiling the input into 1 MP chunks completely avoids the OOM crash while preserving functionality.**
