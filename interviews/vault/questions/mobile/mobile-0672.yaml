title: 'The Budget Phone Crash: Memory Hierarchy Design'
scenario: 'Your image editing app with an on-device super-resolution model works on flagship phones. A wave of 1-star reviews comes from users on budget phones. The app crashes immediately when they tap Enhance Photo. The model is 15 MB.'
question: 'Why does a 15 MB super-resolution model crash on 4 GB budget phones but not flagship phones?'
details:
  realistic_solution: 'Budget phones provide minimal RAM headroom after OS usage. The 15 MB model generates massive intermediate activation tensors exceeding 2 GB. Mitigate this by using a patch-based inference strategy or dynamic tiling to constrain the peak VRAM footprint.'
  common_mistake: |
    **The Pitfall:** Confusing model file size with runtime activation memory.
    **The Rationale:** Candidates assume a 15MB model is lightweight, neglecting that high-resolution image processing generates massive intermediate tensors.
    **The Consequence:** The app attempts to allocate gigabytes of activation memory on a budget device, triggering an instant OS kill.
  napkin_math: |
    1. **Assumptions & Constraints:**
       * Budget Phone Available RAM: ~850 MB.
       * Image Size: 12 MP. Model Size: 15 MB.
    2. **Calculations:**
       * Full Model Peak RAM (12 MP): ~2.4 GB.
       * Deficit: 2.4 GB - 0.85 GB = 1.55 GB.
       * Tiled Execution (1 MP): ~200 MB peak.
    3. **Conclusion & Interpretation:**
       * **Result: Memory-Bound.** Tiling the input into 1 MP chunks completely avoids the OOM crash while preserving functionality.
