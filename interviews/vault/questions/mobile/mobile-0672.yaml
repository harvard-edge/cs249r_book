title: 'The Budget Phone Crash: Memory Hierarchy Design'
scenario: Your image editing app with an on-device super-resolution model works on the Samsung Galaxy
  S24 (Snapdragon 8 Gen 3, 8 GB RAM) and iPhone 15 (A16, 6 GB RAM). A wave of 1-star reviews comes from
  users on the Samsung Galaxy A15 (Helio G99, 4 GB RAM) and Redmi Note 13 (Snapdragon 685, 4 GB RAM).
  The app crashes immediately when they tap 'Enhance Photo.' The model is 15 MB. What's happening?
question: "Why does a 15 MB super-resolution model crash on 4 GB budget phones but not flagship phones?"
details:
  realistic_solution: 'Budget phones with ''4 GB RAM'' provide only ~850 MB to your app after OS and background
    services. Super-resolution at 12 MP allocates activation tensors peaking at 2.4 GB \u2014 instant OOM kill
    with no swap, no warning. Fix: implement a device capability tier system. On budget devices: (1) tile
    the input into 1 MP patches (200 MB peak), (2) use a lightweight model variant, or (3) cap input resolution
    at 3 MP. Process tiles sequentially \u2014 12 tiles at 1 MP each = ~1 second total, acceptable for a photo
    enhancement feature. Test on $150 phones, not just flagships.'
  common_mistake: '"The model is only 15 MB \u2014 it should work on any phone." File size \u2260 runtime memory.
    And on budget phones, "4 GB RAM" doesn''t mean 4 GB is available to your app.'
  napkin_math: 'Full model at 12 MP: 2.4 GB peak. Galaxy A15 available: ~850 MB. Deficit: 1.55 GB \u2192 instant
    OOM crash. At 3 MP input: 600 MB peak \u2192 fits with 250 MB headroom. Tiled at 1 MP: 200 MB peak \u2192 fits
    on 3 GB devices. Lite model at 12 MP (reduced channels, 1/6th activations): 2.4 GB / 6 = 400 MB peak \u2192 fits on 4 GB devices. Processing time: full model at
    12 MP on S24 takes ~180 ms (based on 15ms/MP). Tiled (12x 1MP) on A15 takes 12 \u00d7 80 ms = 960 ms (~1 second), acceptable for a photo enhancement
    feature. User base on budget phones: ~35% of Android users globally.'
