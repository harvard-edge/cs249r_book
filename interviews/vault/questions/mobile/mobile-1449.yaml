title: On-Device LLM Precision Strategy for Tensor G3
scenario: You are deploying a 3.2-billion parameter LLM onto the Google Tensor G3 chip (7.5 TOPS, shared 12 GB LPDDR5X). Your strict memory budget for the model (weights and runtime) is 3.5 GB to avoid OS app killing.
question: How would you evaluate precision formats and decide on a deployment recipe that fits the 3.5 GB limit while maximizing throughput?
details:
  realistic_solution: A mixed-precision approach using 4-bit weight quantization (W4) and 16-bit activations (A16 or BF16) is required. The TPU can perform rapid dequantization of the 4-bit weights into 16-bit registers during inference to maintain precision for the matrix multiplications.
  common_mistake: |
    **The Pitfall:** Proposing standard FP16 deployment or basic INT8 quantization.
    **The Rationale:** Failing to calculate the memory footprint, assuming 3.2B parameters fit easily in 12 GB.
    **The Consequence:** INT8 consumes 3.2 GB for weights alone, leaving only 300 MB for the KV cache and activations, guaranteeing OOM under the 3.5 GB cap.
  napkin_math: |
    - FP16 Weights: 3.2B * 2 bytes = 6.4 GB (OOM).
    - INT8 Weights: 3.2B * 1 byte = 3.2 GB (Leaves 300 MB for KV).
    - W4A16 Weights: 3.2B * 0.5 bytes = 1.6 GB. (Leaves 1.9 GB for KV).
    - KV Cache (2048 tokens): 32 layers * 2048 dim * 2 (K/V) * 2 bytes * 2048 = 512 MB.
    - **W4A16 leaves 1.9 GB margin, comfortably fitting the 512 MB KV cache within the 3.5 GB budget.**
