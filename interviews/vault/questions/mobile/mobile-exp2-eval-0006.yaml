title: Calibration Data Selection for INT8 NPU Execution
scenario: You are preparing a vision model for deployment on the Samsung Exynos 2400 NPU, which offers
  34.7 TOPS but requires INT8 quantization to achieve this peak performance without exhausting the shared
  12 GB LPDDR5X memory. You must decide on a dataset curation strategy for the INT8 calibration phase
  to determine activation ranges. Option A randomly samples 5,000 images from the general training distribution.
  Option B uses an active learning approach to curate 500 images specifically targeting rare long-tail
  classes and extreme lighting conditions. Which calibration dataset strategy is better for maximizing
  overall INT8 accuracy on this dual-core NPU?
details:
  realistic_solution: Option A is superior for INT8 calibration. The goal of calibration is to find scaling
    factors that minimize quantization error across typical workloads. The shared 12 GB LPDDR5X memory
    means memory bandwidth is at a premium, making aggressive INT8 quantization crucial for the dual-core
    NPU to hit its 34.7 TOPS. If the calibration dataset includes extreme outliers (Option B), the min/max
    ranges will expand to cover them, compressing the representational space for normal activations. The
    optimal approach is using a representative distribution (Option A) and applying percentile-based clipping
    (e.g., 99.9th percentile) to discard extreme activation outliers, preserving maximum precision for
    the average case.
  common_mistake: Candidates often assume that curating hard edge cases (Option B) is strictly better
    because it improves robustness on difficult examples. However, for INT8 calibration, using extreme
    outliers can skew the activation range statistics, leading to a wider quantization range that destroys
    numerical precision for the vast majority of typical inputs.
  napkin_math: Assume an activation tensor has a typical range of [-5.0, 5.0] for normal images, but an
    edge case in Option B produces [-20.0, 20.0]. With INT8 (256 discrete values), the step resolution
    for [-5.0, 5.0] is 10.0 / 255 = ~0.039. If calibrated on the [-20.0, 20.0] range, the resolution degrades
    to 40.0 / 255 = ~0.157. This 4x loss in quantization precision will severely degrade the accuracy
    of normal inferences on the 34.7 TOPS NPU. Furthermore, relying on FP16 fallback for these edge cases
    would needlessly consume bandwidth from the shared 12 GB LPDDR5X.
