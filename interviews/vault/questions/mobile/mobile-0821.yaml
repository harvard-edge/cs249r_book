title: Mobile New 0022
scenario: A smart speaker uses a Cortex-M4 for always-on wake-word detection. Instead of lasting 30 days on battery, it dies in 2 days. The CPU runs the detection loop at 168MHz every 10ms, never entering deep sleep.
question: Why does the always-on Cortex-M4 wake-word detector die in days instead of lasting 30 days?
details:
  realistic_solution: The symptom of rapid battery depletion in an always-on device points to a failure to manage processor sleep states. The Cortex-M4 is running continuously at full clock speed to poll the microphone and run the model. Because the active duty cycle is 100%, the dynamic power draw remains at peak. The system should use a lower clock or hardware timer interrupts to sleep between audio chunks.
  common_mistake: |
    **The Pitfall:** Using busy-wait polling instead of event-driven interrupts.
    **The Rationale:** Developers accustomed to continuous processing write polling loops that keep the microcontroller in an active high-power state.
    **The Consequence:** The device drains its battery in less than two days instead of achieving the required 30-day lifespan.
  napkin_math: |
    - Battery capacity: 1000 mAh.
    - Target continuous current for 30 days (720 hrs): 1000 mAh / 720 hrs = 1.38 mA.
    - Active M4 current at 168 MHz: ~25 mA.
    - Daily drain at 100% duty cycle: 25 mA * 24 hrs = 600 mAh/day.
    - Time to drain: 1000 mAh / 600 mAh/day = **1.6 days**.
