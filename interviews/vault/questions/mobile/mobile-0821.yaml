title: Mobile New 0022
scenario: A smart speaker uses a Cortex-M4 for always-on wake-word detection. Instead of lasting 30 days on battery, it dies in 2 days.
question: Why does the always-on Cortex-M4 wake-word detector die in days instead of lasting 30 days?
details:
  realistic_solution: The architecture employs a busy-wait polling loop instead of an event-driven interrupt model (e.g., WFI/WFE). Maintaining a 100% active duty cycle keeps the MCU in a high-power state. The system must transition to hardware timer interrupts and DMA to gate the core into deep sleep between audio inferences.
  common_mistake: |
    **The Pitfall:** Using busy-wait polling instead of event-driven interrupts.
    **The Rationale:** Developers accustomed to continuous processing write polling loops that keep the microcontroller in an active high-power state.
    **The Consequence:** The device drains its battery in less than two days instead of achieving the required 30-day lifespan.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Battery capacity: 1000 mAh.
       - Target continuous current for 30 days (720 hrs): 1000 mAh / 720 hrs = 1.38 mA.
       - Active M4 current at 168 MHz: ~25 mA.
    2. **Calculations:**
       - Daily drain at 100% duty cycle: 25 mA * 24 hrs = 600 mAh/day.
       - Time to drain: 1000 mAh / 600 mAh/day = 1.66 days.
    3. **Conclusion & Interpretation:**
       - **Result: 1.66 Days.** The system is severely **Energy-Bound** due to polling.
