title: Mobile New 0022
scenario: A smart speaker uses a Cortex-M4 for always-on wake-word detection. Instead of lasting 30 days
  on battery, it dies in 2 days. The CPU runs the detection loop at 168MHz every 10ms, never entering
  deep sleep.
question: "Why does the always-on Cortex-M4 wake-word detector die in days instead of lasting 30 days?"
details:
  realistic_solution: The symptom of rapid battery depletion in an always-on device points to a failure
    to manage processor sleep states. The Cortex-M4 is running continuously at full clock speed to poll
    the microphone and run the model. Because the active duty cycle is 100%, the dynamic power draw remains
    at peak. The system should use a lower clock or hardware timer interrupts to sleep between audio chunks.
  common_mistake: Running continuous polling loops on microcontrollers instead of event-driven interrupts.
  napkin_math: Battery = 1000mAh. Required life = 30 days (720 hrs). Target current = 1000/720 = 1.38mA.
    M4 active at 168 MHz = ~25mA. 25mA * 24hrs = 600mAh/day. 1000mAh / 600 = 1.6 days. Sleep state current
    (10uA) is required 95% of the time.
