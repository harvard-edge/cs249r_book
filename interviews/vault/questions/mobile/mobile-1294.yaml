title: On-Device LLM Profiling Alternatives for Tensor G3
scenario: 'You are deploying a distilled version of Gemini Nano on a device powered
  by the Google Tensor G3. Initial profiling during the autoregressive generation
  phase shows an unacceptable latency of 150ms per token. You are presented with two
  alternative hypotheses from your team: Hypothesis A suggests the bottleneck is the
  TPU compute capacity (7.5 TOPS), while Hypothesis B suggests the bottleneck is the
  memory bandwidth of the 12 GB LPDDR5X memory. Evaluate these alternatives and determine
  the most likely bottleneck.'
question: Is Tensor G3 LLM generation at 150 ms/token limited by 7.5 TOPS TPU compute
  or 12 GB LPDDR5X bandwidth?
details:
  realistic_solution: Hypothesis B is correct. During autoregressive decoding at batch
    size 1, the entire model must be loaded from memory into the TPU for every single
    token generated. The TPU's 7.5 TOPS are vastly underutilized because the system
    is starved waiting for weights to be fetched from the LPDDR5X RAM. The solution
    is to profile memory read bandwidth using hardware counters and apply weight-only
    quantization (e.g., 4-bit) to reduce the memory I/O required per token.
  common_mistake: Candidates often assume that LLMs are always compute-bound due to
    the large number of operations, choosing Hypothesis A. They fail to distinguish
    between the compute-heavy prefill phase and the memory-bandwidth-heavy autoregressive
    decoding phase (batch size 1) typical in mobile deployments.
  napkin_math: Assume a 3 billion parameter Gemini Nano model. In 16-bit (FP16), it
    takes 6 GB of memory. To generate 1 token, all 6 GB must be loaded. If the Tensor
    G3's LPDDR5X provides a practical bandwidth of ~50 GB/s, generating 1 token takes
    6 GB / 50 GB/s = 120ms (close to the 150ms observed). The TPU requires ~6 Giga-operations
    per token. At 7.5 TOPS, the compute time is 6G / 7.5T = 0.8ms. Therefore, memory
    I/O (120ms) completely dominates compute (0.8ms).
