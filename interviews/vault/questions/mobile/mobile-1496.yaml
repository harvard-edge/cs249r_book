title: On-Device Coreset Selection for Image Personalization
scenario: 'You are tasked with specifying the data selection requirements for an on-device personalization system that fine-tunes a vision model using daily user photos. The target device is powered by the Samsung Exynos 2400 NPU, which features a dual-core NPU with 34.7 TOPS and shares 12 GB of LPDDR5X memory across the CPU, GPU, ISP, and NPU. Because the OS, background apps, and the base model already reserve 9.5 GB of RAM, you only have 2.5 GB available for both the data selection pipeline and the training buffer.'
question: 'How would you design a data pruning and selection pipeline that maximizes the Information-Compute Ratio (ICR) without causing memory exhaustion or excessive battery drain?'
details:
  realistic_solution: 'Specify a two-stage pipeline: first, a lightweight proxy model (e.g., MobileNetV3) runs on a low-power NPU core to extract embeddings from new user images. Second, a fast diversity-sampling algorithm (like k-Center greedy) runs on the CPU over these embeddings to select a representative coreset. This isolates the heavy compute and memory usage to the actual fine-tuning phase.'
  common_mistake: |
    **The Pitfall:** Proposing full-model forward passes for loss-based pruning or influence functions.
    **The Rationale:** Candidates default to server-side coreset methods without respecting the stringent on-device memory and thermal bounds.
    **The Consequence:** The pipeline immediately triggers an Out-Of-Memory (OOM) exception or severely throttles the device before training even begins.
  napkin_math: |
    1. **Memory Budget:** 12 GB total - 9.5 GB reserved = 2.5 GB available.
    2. **Naive Approach (OOM):** 1B parameter main model at FP16 = 2 GB weights. Activations for 1,000 images would easily exceed the remaining 500 MB.
    3. **Proxy Model Memory:** 5M parameter proxy model at FP16 requires only ~10 MB of memory.
    4. **Proxy Compute:** 1,000 images at 224x224 (approx 150 MFLOPs per image) = 150 GFLOPs.
    5. **Latency/Power:** On the 34.7 TOPS (34,700 GFLOPS) NPU, 150 GFLOPs takes **0.0043 seconds**, keeping thermal and memory impact negligible.
