title: The Silent Accuracy Degradation
scenario: Your on-device image classification model was deployed 6 months ago. Users haven't complained,
  but your A/B test shows the new model version improves engagement by 15%. This suggests the old model
  has silently degraded. You have no server-side ground truth labels for on-device predictions. How do
  you detect model degradation without ground truth?
details:
  realistic_solution: 'Four proxy signals detect degradation without ground truth: (1) Confidence distribution
    shift — track KL divergence of softmax outputs (~1 byte/inference, 30 KB/month). (2) Prediction entropy
    — rising entropy signals increasing uncertainty. (3) Feature drift — monitor input distribution statistics.
    (4) Behavioral proxies — user engagement (clicks, time-on-screen, undo rate) as implicit labels.'
  common_mistake: '"Monitor accuracy using a held-out test set." You don''t have labels for on-device
    predictions — there''s no test set.'
  napkin_math: 'Confidence monitoring: ~1 byte per inference (just the max softmax score). 1000 inferences/day
    × 30 days = 30,000 data points. KL divergence computation: trivial. Storage: ~30 KB/month. Anomaly
    detector: 1 MB model, 0.5ms per inference. Federated evaluation: 100 labeled images × 4 evaluations/year
    = 400 labeled predictions per user per year. With 10,000 users: 4M labeled predictions — statistically
    powerful.'
  options:
  - Monitor accuracy using a held-out test set.. You don't have labels for on-device predictions — there's
    no test set.
  - Network I/O is the dominant bottleneck; optimizing the model or inference pipeline will have minimal
    impact on end-to-end latency.
  - The system should be redesigned to offload inference to the cloud, as edge hardware fundamentally
    cannot meet the latency and accuracy requirements.
  - 'Four proxy signals detect degradation without ground truth: (1) Confidence distribution shift — track
    KL divergence of softmax outputs (~1 byte/inference, 30 KB/month). (2) Prediction entropy — rising
    entropy signals increasing uncertainty. (3) Feature drift — monitor input distribution statistics.'
