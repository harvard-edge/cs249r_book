title: 'Dataset Curation: Specification — Mobile Data Quality SLA for RLHF Personalization'
scenario: You are writing the data quality specification for on-device RLHF personalization on A17 Pro (35 TOPS, 8GB). The system collects implicit feedback (accept/reject suggestions) from user interactions.
question: What data quality SLAs should gate on-device RLHF personalization updates on A17 Pro?
details:
  realistic_solution: 'SLAs: (1) Minimum volume: >= 50 explicit feedback events before any update. (2) Signal quality: accept rate 20-80% (outside range indicates broken UI, not real preference). (3) Temporal distribution: feedback spans >= 3 days (not a single session). (4) Privacy: DP budget ε < 0.5 per update, max 12 updates/year = ε < 6.0/year with composition. (5) Bias: flag if > 80% accepts (sycophancy) or > 80% rejects (model too bad to personalize).'
  common_mistake: |
    **The Pitfall:** Triggering personalization on very few, noisy signals.
    **The Rationale:** Candidates often specify updates based on <10 samples without a minimum observation window, failing to account for sycophancy or UI misclicks.
    **The Consequence:** The model overfitting to noise, causing a degraded and erratic user experience.
  napkin_math: |
    1. **Data Volume:** Require >= 50 feedback events. At 20 suggestions/day, this requires a 2.5-day observation window.
    2. **Storage Cost:** 50 events * (512 prompt + 128 response tokens) * 2 bytes = **64 KB** (trivial).
    3. **Privacy Budget:** Using Differential Privacy (DP), ε=0.5 per update. Monthly updates (12/year).
    4. **Annual DP:** Advanced composition yields ε_total ≈ sqrt(12) * 0.5 = **1.73**.
