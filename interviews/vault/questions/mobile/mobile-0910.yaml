title: 'Fault Tolerance: Analyze Checkpoint Overhead for On-Device Fine-Tuning on A17 Pro'
scenario: An on-device personalization system runs LoRA fine-tuning for 10 minutes nightly. A power failure during training loses all progress. You have a 1000-device fleet with a Mean Time Between Failures (MTBF) of 365 days.
question: What is the expected daily failure rate during a 10-minute training window, and how does it impact checkpoint frequency?
details:
  realistic_solution: Expected failures per day during the training window is negligible, meaning checkpoints are unnecessary overhead.
  common_mistake: |
    **The Pitfall:** Applying server-style MTBF checkpointing to brief mobile workloads.
    **The Rationale:** Candidates calculate the daily failure rate but forget to multiply it by the tiny 10-minute training window fraction.
    **The Consequence:** The application performs unnecessary checkpoints, wasting battery and flash endurance for a failure that happens less than once a month across the entire fleet.
  napkin_math: |
    1. Calculate daily failure probability per device: $\lambda = 1/365 \approx$ **0.0027**.
    2. Calculate expected daily fleet failures: 1000 devices * (1/365) = **~2.74 failures/day**.
    3. Calculate probability of failure during the 10-minute window: The window is 10/1440 of a day.
    4. Calculate expected failures during training: 2.74 * (10/1440) = **0.019 failures/day fleet-wide**.
    5. Conclusion: Checkpointing during a 10-minute window is unnecessary overhead.
