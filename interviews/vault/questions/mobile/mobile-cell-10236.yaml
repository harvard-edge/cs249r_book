title: Mastering Compound AI System Reliability Engineering on A17 Pro
scenario: 'An A17 Pro (8GB, 35 TOPS) compound AI app runs a 5-stage pipeline: intent classifier → retrieval
  → reranker → LLM → output filter. Each stage has an independent failure mode. Field data shows: classifier
  crashes 0.1% of requests, retrieval returns empty 2.3% of the time, reranker times out 0.8% of requests,
  LLM produces policy-violating content 0.4% of the time, output filter false-positives 1.2% of safe responses.
  Design a reliability architecture that achieves 99.5% successful response rate.'
question: "How would you design a reliability architecture that achieves 99.5% successful response rate?"
details:
  realistic_solution: 'Current failure rate: 4.7% (fails target by 4.2%). Per-stage mitigations: (1) Classifier
    crash: wrap in try-catch with default intent fallback (0.1% → 0.01% unhandled). (2) Empty retrieval:
    fallback to BM25 keyword search (2.3% → 0.3% still empty). (3) Reranker timeout: fallback to score-order
    from retrieval (0.8% → 0ms fallback, 0% timeout failure). (4) LLM policy violation: retry with stronger
    safety prompt (0.4% → 0.04% after retry). (5) False-positive filter: add confidence threshold, only
    block if score > 0.95 (1.2% → 0.2%). New compound rate: 1-(0.9999*0.997*1.0*0.9996*0.998) = 1-0.9945
    = 0.55% failure → 99.45% success. Need one more fix to reach 99.5%: add global retry for empty response:
    99.45% → 99.72%.'
  common_mistake: 'Treating each failure mode independently and adding per-stage retry logic without accounting
    for the multiplicative reliability problem: even with low per-stage failure rates, the compound system
    fails at a rate that is the sum of failure modes. Current system: 1 - (0.999 * 0.977 * 0.992 * 0.996
    * 0.988) = 1 - 0.953 = 4.7% failure rate.'
  napkin_math: 'Baseline compound reliability: 0.999 * 0.977 * 0.992 * 0.996 * 0.988 = let''s compute:
    0.999*0.977=0.9760, *0.992=0.9682, *0.996=0.9643, *0.988=0.9527. Failure: 4.73%. After mitigations:
    0.9999*0.997*1.0*0.9996*0.998 = 0.9999*0.997=0.9969, *1.0=0.9969, *0.9996=0.9965, *0.998=0.9945. Failure:
    0.55%. Success: 99.45%. Add global retry on failure (catches ~50% of failures): effective success
    = 1-(0.0055*0.5) = 99.725% → exceeds 99.5% target.'
