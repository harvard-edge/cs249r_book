title: 'Model Size Estimation: Realize Full Memory Layout for 3B LLM on Snapdragon 8 Gen 3'
scenario: 'Concretely size every memory component for deploying a 3B INT4 LLM on Snapdragon 8 Gen 3 (16GB LPDDR5X, 77 GB/s) for single-user on-device assistant. List: Android system, model weights, tokenizer, KV-cache pool (4096 max context), CoreML/QNN framework, app UI heap, and compute scratch buffers.'
question: Does a 3B INT4 LLM plus 4096-token KV cache fit on Snapdragon 8 Gen 3, and what TPOT follows from 77 GB/s?
details:
  realistic_solution: 'Android system: 3GB. QNN SDK runtime: 300MB. 3B INT4 model: 1.5GB. Tokenizer (SentencePiece + vocabulary 32K): 5MB. KV-cache pool (4096 tokens, 32 layers, 32 KV heads, 128 dim): 4096*524KB=2.15GB. App UI + heap: 400MB. Compute scratch (QNN inference buffers, 1 layer at a time): 200MB. Total: 3000+300+1500+5+2150+400+200=7,555MB = 7.4GB of 16GB = 46.2%. Headroom: 8.6GB. TPOT: 1.5GB/77GB/s=19.5ms/token.'
  common_mistake: |
    **The Pitfall:** Not including the QNN/CoreML framework overhead.
    **The Rationale:** Candidates size the model and activations but forget that the runtime SDK consumes 200-400MB for compilation and execution.
    **The Consequence:** Inaccurate memory layout that underestimates total footprint on constrained devices.
  napkin_math: |
    - Layout: Android (3000MB) + QNN (300MB) + Model (1500MB) + Tokenizer (5MB) + KV (2150MB) + UI (400MB) + Scratch (200MB).
    - Total = 7,555MB.
    - 16GB - 7.5GB = 8.5GB free.
    - **TPOT: 1.5GB / 77 GB/s = 19.5ms.**
    - At 100-token response: 1.95s. Headroom allows KV expansion or running 2 concurrent models.
