title: Mobile FL Tree Aggregation
scenario: 16 Snapdragon 8 Gen 3 devices perform Federated Learning. Using a binary
  tree aggregation, devices send 10 MB updates to their parents.
question: Calculate the total data received by the root node in a balanced binary
  tree, compared to a flat star topology.
visual:
  kind: svg
  path: mobile-1983.svg
  alt: Tree structure showing root node with two children, cascading down.
  caption: Binary tree aggregation reducing root bottleneck.
details:
  realistic_solution: In a star topology, the root receives updates from 15 devices
    = 150 MB. In a balanced binary tree, the root has exactly 2 children, so it receives
    updates only from those 2 direct children = 2 * 10 MB = 20 MB.
  common_mistake: Calculating tree height log2(16) = 4, and multiplying 4 * 10 = 40
    MB.
  napkin_math: 'Tree: 2 * 10 = 20MB. Star: 15 * 10 = 150MB.'
