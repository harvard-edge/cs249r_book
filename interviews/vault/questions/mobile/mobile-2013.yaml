title: Mobile I/O Network Throttling
scenario: An iOS app streams video to a cloud API while running an on-device privacy
  filter on the A17 Pro. The developer notices heavy local frame drops only when the
  cellular connection drops to 3G.
question: Evaluate why network degradation causes the local Neural Engine inference
  to stagger and drop frames.
details:
  realistic_solution: The application likely uses synchronous blocking calls where
    the inference loop waits for the network upload acknowledgment. On a slow 3G network,
    this I/O blocks the main thread, stalling the pipeline that feeds the A17 Pro.
    I/O must be decoupled into an asynchronous thread.
  common_mistake: Assuming the A17 Pro Neural Engine itself senses the connection
    speed and throttles its 35 TOPS natively.
  napkin_math: Waiting 500ms for an ACK kills 30 FPS.
