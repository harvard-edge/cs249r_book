title: Model Footprint on Snapdragon Hexagon NPU
scenario: "You are designing a new mobile AI application for a device powered by a Hexagon NPU and 12-16 GB of shared LPDDR5X memory. Your deep learning model has 50 million parameters. Each parameter is stored as an INT8 value."
question: "How would you estimate the minimum memory footprint of this model on the NPU and discuss whether it's feasible given the available memory?"
details:
  realistic_solution: |
    Calculate the base parameter weight footprint in bytes. To estimate the true runtime footprint, incorporate memory allocation for intermediate activation tensors (KV caches, feature maps) and framework overhead, which typically mandate 2x-3x the baseline parameter size. Recognize that LPDDR5X is dynamically shared across the SoC, requiring strict memory budget caps to prevent OS evictions.
  common_mistake: |
    **The Pitfall:** Ignoring activation memory or intermediate tensors.
    **The Rationale:** Candidates focus only on static parameter memory and overlook the shared nature of LPDDR5X memory across the SoC.
    **The Consequence:** Drastically underestimating the total memory footprint, leading to unexpected out-of-memory errors during deployment.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model parameters: 50,000,000.
       - Precision: INT8 (1 byte per parameter).
       - Activation/Buffer overhead: 2x to 3x parameter size.
    2. **Calculations:**
       - Weights: 50,000,000 * 1 byte = 50 MB.
       - Activations: 50 MB * 2 = 100 MB.
       - Total footprint estimate: 50 MB + 100 MB = 150 MB.
    3. **Conclusion & Interpretation:**
       - **Result: ~150-200 MB.** This easily fits within the 12-16 GB shared system RAM limit, avoiding a **memory-capacity bottleneck**.
