title: Model Footprint on Snapdragon Hexagon NPU
scenario: You are designing a new mobile AI application for a device powered by a Hexagon NPU and 12-16 GB of shared LPDDR5X memory. Your deep learning model has 50 million parameters. Each parameter is stored as an INT8 value.
question: How would you estimate the minimum memory footprint of this model on the NPU and discuss whether it's feasible given the available memory?
details:
  realistic_solution: |
    A realistic solution involves calculating the parameter memory footprint (50M * 1 byte/parameter for INT8), then estimating additional memory for activations, intermediate tensors, and potential scratchpad memory specific to the Hexagon NPU. It's crucial to acknowledge that the 12-16GB LPDDR5X is system-wide and shared. Further analysis would involve understanding the NPU's internal memory organization (e.g., dedicated SRAM, DMA access) and the impact of quantization aware training or pruning on the actual deployed model size.
  common_mistake: |
    **The Pitfall:** Ignoring activation memory or intermediate tensors.
    **The Rationale:** Candidates focus only on parameter memory or overlook data types (assuming FP32 instead of INT8), and forget the shared nature of LPDDR5X memory.
    **The Consequence:** Underestimating the total memory footprint, leading to out-of-memory errors during deployment.
  napkin_math: |
    - **Parameter memory:** 50,000,000 parameters * 1 byte/parameter (INT8) = 50 MB.
    - **Activations/Intermediate buffers:** Typically add 2-3x the parameter size.
    - **Total model footprint estimate:** 50 MB + (2 * 50 MB) = 150 MB to 200 MB.
    - **Feasibility:** Well within the 12-16 GB LPDDR5X system memory, but NPU-specific accessible memory must be considered.
    - **Result:** **~150-200 MB**
