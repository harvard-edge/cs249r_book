title: Model Footprint on Snapdragon Hexagon NPU
scenario: You are designing a new mobile AI application for a device powered by the
  Snapdragon 8 Gen 3, which features a Hexagon NPU capable of 45 TOPS INT8 performance
  and access to 12-16 GB of LPDDR5X memory. Your deep learning model has 50 million
  parameters. Each parameter is stored as an INT8 value. Estimate the minimum memory
  footprint of this model on the NPU and discuss whether it's feasible given the available
  memory.
question: How would you estimate the minimum memory footprint of this model on the
  NPU and discuss whether it's feasible given the available memory?
details:
  realistic_solution: A realistic solution involves calculating the parameter memory
    footprint (50M * 1 byte/parameter for INT8), then estimating additional memory
    for activations, intermediate tensors, and potential scratchpad memory specific
    to the Hexagon NPU. It's crucial to acknowledge that the 12-16GB LPDDR5X is system-wide
    and shared. Further analysis would involve understanding the NPU's internal memory
    organization (e.g., dedicated SRAM, DMA access) and the impact of quantization
    aware training or pruning on the actual deployed model size.
  common_mistake: Ignoring activation memory or intermediate tensors, only focusing
    on parameter memory, or overlooking data types (e.g., assuming FP32 when INT8
    is specified). Another common mistake is not considering the shared nature of
    LPDDR5X memory or NPU-specific memory architecture.
  napkin_math: 'Parameter memory: 50,000,000 parameters * 1 byte/parameter (INT8)
    = 50 MB. Assuming activations and intermediate buffers might add 2-3x the parameter
    size, total model footprint could be around 150-200 MB. This is well within the
    12-16 GB LPDDR5X system memory. However, the critical aspect is how much of this
    memory is accessible or optimized for the Hexagon NPU''s direct use, considering
    potential memory bandwidth constraints or dedicated NPU memory segments.'
