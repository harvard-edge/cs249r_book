title: Real-time Physiological Anomaly Detection on Google Tensor G3
scenario: You are designing a real-time health monitoring application for a mobile device. The application continuously analyzes high-frequency sensor data (e.g., accelerometer, gyroscope, PPG for heart rate variability) to detect subtle physiological changes indicative of health risks (e.g., arrhythmias, stress spikes, potential falls).
question: How would you design the stream processing and ML pipeline on the Tensor G3 to balance real-time anomaly detection with power efficiency?
details:
  realistic_solution: 'Employ a multi-stage processing pipeline:

    1.  Sensor Data Ingestion & Buffering: Implement highly efficient, low-power data acquisition directly from sensors. Utilize circular buffers for short-term temporary storage.

    2.  Edge Preprocessing & Feature Extraction: Perform lightweight filtering, normalization, and feature extraction (e.g., windowing, statistical aggregations, frequency domain analysis via FFT) using the main CPU or dedicated DSP, only triggering these operations at optimal intervals or upon specific events to conserve power.

    3.  On-Device ML Inference: Deploy highly quantized (e.g., int8) and pruned ML models specifically optimized for the Tensor G3''s TPU. Implement an intelligent inference scheduler that can batch inferences where appropriate or trigger them only when significant pre-computed features indicate a potential event, balancing latency and energy consumption.

    4.  Memory Management: Carefully manage the 12GB LPDDR5X, allocating memory efficiently for models, intermediate features, and dynamic buffers. Leverage techniques like memory pooling and zero-copy data transfer where possible.

    5.  Power Management: Implement dynamic frequency scaling for the TPU and CPU, employ event-driven processing to keep components in low-power states, and use background processing with system-level scheduling for non-critical tasks.'
  common_mistake: |
    **The Pitfall:** Neglecting the significant power consumption of continuous on-device ML inference.
    **The Rationale:** Engineers often focus solely on model accuracy or peak TOPS, forgetting that constant polling and inference drain a mobile battery in hours.
    **The Consequence:** Rapid battery drain and poor user experience, compounded by failing to optimize the model for the specific TPU architecture.
  napkin_math: |
    1. Total operations required per second: 100 inferences/sec * 500 * 10^6 MAC ops/inference = 50 * 10^9 operations/sec (50 GOPS).
    2. TPU peak capacity: 7.5 TOPS = 7.5 * 10^12 operations/sec.
    3. Percentage of TPU capacity used: (50 * 10^9 ops/sec) / (7.5 * 10^12 ops/sec) * 100% = (50 / 7500) * 100% = 1/150 * 100%.
    4. **Result: ≈ 0.67% of total TPU capacity used.**
