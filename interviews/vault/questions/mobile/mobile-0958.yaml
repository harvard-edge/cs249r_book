title: 'KV-Cache: Realize KV Cache Reuse for System Prompt on Mobile LLM'
scenario: A 1B parameter LLM runs on a Snapdragon 8 Gen 3 (45 TOPS INT8, 16GB) with a static 256-token system prompt across all sessions.
question: How would you cache the system prompt KV, and what is the quantified TTFT improvement for a 512-token user message?
details:
  realistic_solution: 'Pre-compute KV for system prompt at positions 0-255. Cache 256-token KV. For new conversation: load cached KV, prefill only user message starting at position 256. RoPE positions are correct because they match original computation.'
  common_mistake: |
    **The Pitfall:** Overlooking positional encoding (RoPE) constraints during caching.

    **The Rationale:** Assuming the cached KV can be arbitrarily prepended without aligning to the exact token positions (0-255).

    **The Consequence:** Generating garbage outputs because the attention mechanism's positional relationships are broken.
  napkin_math: |
    *   KV size (256 tokens): 24 layers * 2 * 8 heads * 128 dim * 1B (INT8) * 256 = 12.6MB.
    *   Uncached TTFT (768 tokens): 1B * 6 * 768 / (45 TOPS * 0.5 efficiency) = 204ms.
    *   Cached TTFT (512 tokens): 1B * 6 * 512 / 22.5 effective TOPS = 136ms.
    *   Load overhead: 12.6MB / 68 GB/s = 0.185ms (negligible).
    *   **Result:** TTFT drops from 204ms to 136ms, a 68ms (33%) improvement.
