title: 'Model Size Estimation: Analyze Why Mobile LLM Needs INT4 Despite 8GB RAM'
scenario: An engineer asks: "The iPhone 16 Pro has 8GB RAM, so why does a 3B parameter model need INT4 quantization to run? Shouldn't 8GB be enough for a 6GB FP16 model?"
question: Why does a 3B parameter model require INT4 quantization to run on an 8GB iPhone 16 Pro?
details:
  realistic_solution: 8GB total. iOS system reserve: ~2GB (kernel, IOKit, Metal framework, NE firmware). App memory pressure: iOS kills apps > 4-5GB in practice. Available for ML app: ~3-4GB effective. 3B FP16: 6GB — doesn't fit. 3B INT8: 3GB — fits barely (leaves 0-1GB for KV + app). 3B INT4: 1.5GB weights. KV at 2048 ctx (32 layers, 32 heads, 128 dim): 2048×524KB=1.07GB FP16. App + KV + model: 1.5+1.07+1GB app = 3.57GB. Fits in 4GB budget. INT4 is required not because of raw RAM but due to OS overhead and KV-cache needs.
  common_mistake: |
    **The Pitfall:** Assuming all physical RAM is available exclusively for the ML model.
    **The Rationale:** Developers accustomed to cloud environments fail to account for the mobile OS's strict memory reservations and aggressive app-killing policies for memory pressure.
    **The Consequence:** Deploying FP16 or INT8 models that instantly crash in production because they exceed the true effective memory budget.
  napkin_math: |
    1. **Physical RAM:** 8GB.
    2. **iOS Reserves:** 2GB (GPU buffers, kernel, NE firmware).
    3. **Available to App:** 6GB.
    4. **Safe Budget:** iOS kills apps > 4GB. Budget = 4GB.
    5. **FP16 Model:** 6GB > 4GB (Fails).
    6. **INT8 Model:** 3GB (weights) + 1GB (KV cache) + 0.5GB (app overhead) = 4.5GB (Risky/Fails).
    7. **INT4 Model:** 1.5GB (weights) + 1GB (KV cache) + 0.5GB (app overhead) = **3GB (Safe)**.
