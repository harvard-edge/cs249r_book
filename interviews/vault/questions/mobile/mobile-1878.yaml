title: Mobile AR Gossip Propagation
scenario: A local multiplayer AR game running on 4 Apple A17 Pro devices shares 3D
  spatial anchor points over a peer-to-peer Wi-Fi network (effective throughput 20
  Mbps per link). When device A updates an anchor, it gossips the 50 KB update.
question: Apply a naive sequential broadcast strategy and calculate if the anchor
  update reaches all 3 peers within a 100ms multiplayer deadline.
visual:
  kind: svg
  path: mobile-1878.svg
  alt: Node A sequentially sending data to nodes B, C, and D over direct P2P Wi-Fi
    links.
  caption: Sequential P2P Broadcast
details:
  realistic_solution: A 50 KB payload is 400 Kilobits. Transmitting 400 Kb over a
    20 Mbps link takes 400 / 20,000 = 0.02 seconds (20ms). If Device A sends this
    sequentially to Device B, then C, then D, the total time is 3 * 20ms = 60ms. 60ms
    is strictly less than the 100ms deadline, so the sequential broadcast successfully
    meets the requirement.
  common_mistake: Calculating a tree or mesh propagation (where B relays to C) when
    a simple sequential broadcast from A is already mathematically sufficient and
    simpler to implement.
  napkin_math: 50 KB = 400 Kb. 400 / 20,000 = 20ms per link. 3 links * 20ms = 60ms
    < 100ms.
