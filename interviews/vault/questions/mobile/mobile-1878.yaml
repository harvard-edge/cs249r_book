title: Mobile AR Gossip Propagation
scenario: A local multiplayer AR game running on 4 devices shares 3D spatial anchor points over a peer-to-peer Wi-Fi network with an effective throughput of 20 Mbps per link. When device A updates an anchor, it gossips the 50 KB update.
question: Can a naive sequential broadcast strategy reach all 3 peers within a 100ms multiplayer deadline?
details:
  realistic_solution: A sequential broadcast will successfully reach all peers within the deadline.
  common_mistake: |
    **The Pitfall:** Overcomplicating the network topology.
    **The Rationale:** Candidates often default to complex tree or mesh propagation algorithms instead of verifying basic link math.
    **The Consequence:** The team will waste time implementing and debugging complex distributed systems logic when a simple O(N) loop perfectly satisfies the requirements.
  napkin_math: |
    1. Convert payload size: 50 KB = **400 Kilobits**.
    2. Calculate transmission time per link: 400 Kb / 20,000 Kbps = **0.02 seconds (20ms)**.
    3. Calculate sequential broadcast time: 3 links * 20ms = **60ms**.
    4. Evaluate deadline: 60ms < 100ms deadline, so sequential broadcast is sufficient.
