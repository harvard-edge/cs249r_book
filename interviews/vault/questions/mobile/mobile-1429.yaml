title: On-device LLM Guardrail Sizing for Tensor G3
scenario: You are deploying Gemini Nano for a privacy-first smart assistant on the Google Tensor G3. To mitigate prompt injection attacks, you must choose between an input-sanitizing auxiliary classifier or expanding the LLM's system prompt.
question: How would you evaluate the memory and latency tradeoffs of deploying an auxiliary classifier specifically optimized for the G3's on-device TPU and 12 GB LPDDR5X memory footprint?
details:
  realistic_solution: The optimal approach is to deploy a specialized, highly quantized (INT8) auxiliary classifier (e.g., MobileBERT) running entirely on the G3's TPU to pre-screen inputs. Because the G3 has 12 GB of LPDDR5X RAM, allocating memory for a dedicated guardrail model has zero practical impact on system memory pressure. This isolates the security logic from the generative task and prevents the main LLM from wasting compute on malicious prompts.
  common_mistake: |
    **The Pitfall:** Expanding the main LLM's system prompt to handle adversarial inputs.
    **The Rationale:** Candidates ignore the resulting increased time-to-first-token (TTFT) and KV cache memory bloat.
    **The Consequence:** The main LLM wastes massive compute on malicious prompts, degrading UX and battery life.
  napkin_math: |
    * Guardrail model size (25M params, INT8): ~25 MB, just 0.2% of the 12 GB LPDDR5X RAM.
    * Compute required for 512 tokens: 2 × 512 × 25M = 25.6 GOPS.
    * G3 TPU latency (7.5 TOPS at 30% util = 2.25 effective TOPS): 25.6 GOPS / 2.25 TOPS ≈ 11.4 ms.
    * Memory bandwidth: Loading 25 MB at ~60 GB/s takes < 0.5 ms.
    * **The total latency overhead for the dedicated adversarial guardrail is safely under 12 ms.**
