title: On-device LLM Guardrail Sizing for Tensor G3
scenario: You are deploying Gemini Nano for a privacy-first smart assistant on the
  Google Tensor G3. To mitigate prompt injection attacks from untrusted user inputs,
  you must design a defensive architecture. You have a choice between integrating
  an input-sanitizing auxiliary classifier or expanding the LLM's system prompt to
  handle adversarial cases natively. Evaluate the memory and latency tradeoffs of
  deploying an auxiliary classifier specifically optimized for the G3's on-device
  TPU and 12 GB LPDDR5X memory footprint.
question: How would you evaluate the memory and latency tradeoffs of deploying an
  auxiliary classifier specifically optimized for the G3's on-device TPU and 12 GB
  LPDDR5X memory footprint?
details:
  realistic_solution: The optimal approach is to deploy a specialized, highly quantized
    (INT8) auxiliary classifier (e.g., MobileBERT) running entirely on the G3's TPU
    to pre-screen inputs. Because the G3 has 12 GB of LPDDR5X RAM, allocating memory
    for a dedicated guardrail model has zero practical impact on system memory pressure.
    This isolates the security logic from the generative task and prevents the main
    LLM from wasting compute on malicious prompts.
  common_mistake: Candidates often suggest simply expanding the main LLM's system
    prompt to handle adversarial inputs, ignoring the resulting increased time-to-first-token
    (TTFT) and KV cache memory bloat. They also frequently overestimate the cost of
    running a small, dedicated classifier, failing to realize the Tensor G3 TPU can
    execute it with negligible overhead.
  napkin_math: '1. Guardrail model size: 25M parameters. In INT8, this requires ~25
    MB of RAM, taking just 0.2% of the 12 GB LPDDR5X budget.

    2. Compute required: Processing a 512-token input requires approx 2 * 512 * 25M
    = ~25.6 Giga-Operations (GOPS).

    3. G3 TPU Latency: The Tensor G3 TPU provides 7.5 TOPS. Assuming a conservative
    30% utilization rate (2.25 TOPS effective): 25.6 GOPS / 2.25 TOPS = ~11.4 ms.

    4. Memory bandwidth bound: Assuming standard mobile bandwidth of ~60 GB/s, loading
    25 MB takes < 0.5 ms. Therefore, the total latency overhead for the adversarial
    guardrail is under 12 ms.'
