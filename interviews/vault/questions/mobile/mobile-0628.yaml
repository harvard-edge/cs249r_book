title: The Speculative Decoding Memory Trap
scenario: To accelerate a 2B parameter LLM on an iPhone with an A17 Pro chip, your team implements speculative
  decoding. They use a tiny 150M parameter draft model to generate 4 candidate tokens, which the main
  2B model then verifies in a single forward pass. This works on a cloud GPU, but on the iPhone, the app's
  memory usage balloons after a few hundred generated tokens, and the OS terminates it. The team is confused;
  the verification step is a single, parallel operation that should be compute-efficient. Why does this
  time-saving algorithm lead to catastrophic memory failure on a mobile device, and what specific hardware
  constraint is being violated?
question: "Why does this time-saving algorithm lead to catastrophic memory failure on a mobile device, and what specific hardware constraint is being violated?"
details:
  realistic_solution: The failure is caused by the explosive growth of the KV Cache due to rejected speculative
    tokens. On a mobile device, memory is a scarce, shared resource (e.g., 8-12 GB LPDDR5 for the whole
    system), not abundant and dedicated like an 80GB HBM3 module on a cloud GPU. With normal decoding,
    the KV cache grows by one token's worth of data per step. With speculative decoding (k=4), you compute
    and store keys and values for all 4 tokens *before* verification. If the main model only accepts the
    first token (a common scenario), the KV cache data for the other 3 rejected tokens becomes wasted
    space. This data is often in a contiguously allocated buffer and cannot be easily reclaimed. Over
    hundreds of generation steps, this accumulated, unreclaimed memory from rejected speculations consumes
    the entire RAM budget allocated by the OS, leading to termination. The algorithm trades potentially
    wasted memory for a reduction in latency, a trade that is untenable on a memory-constrained mobile
    platform.
  common_mistake: Blaming a memory leak in the application code or the size of the draft model itself.
    These are plausible but miss the core architectural conflict between the algorithm and the hardware.
    The issue isn't a bug; it's a fundamental misunderstanding of the memory cost of speculation.
  napkin_math: 'Consider a 2B model where the KV cache per token is ~4MB. The app''s memory budget on
    an 8GB iPhone is roughly 2GB. Normal decoding for 200 steps: 200 tokens × 4MB/token = 800MB added
    to the KV cache, which is within budget. Speculative decoding with k=4 and a 75% token rejection rate
    (accepting only 1 token per step on average): Each step, you add 4 tokens worth of data to the cache.
    Total data generated over 200 steps = 200 steps × 4 tokens/step × 4MB/token = 3200MB, or 3.2GB. This
    exceeds the 2GB budget and causes the OS to kill the app. The memory pressure is 4x higher than with
    standard decoding.'
