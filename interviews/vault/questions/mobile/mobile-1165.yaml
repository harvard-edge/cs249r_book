title: CI/CD Deployment Fallback Regression
scenario: Your MLOps pipeline promotes a newly trained INT8 vision model to canary deployment on Snapdragon 8 Gen 3 devices (45 TOPS NPU, shared LPDDR5X). On-device telemetry reports a severe latency regression from 5ms to over 80ms, along with elevated power draw, despite identical model architecture size and input resolution.
question: What training-serving gap caused the Hexagon NPU canary latency regression from 5ms to over 80ms?
details:
  realistic_solution: The root cause is a silent subgraph fallback due to an unsupported operator introduced in the new model version (e.g., replacing ReLU with SiLU). Because the MLOps pipeline did not strictly validate Hexagon NPU compatibility during the CI conversion step, the unsupported layer forces the inference engine to partition the graph. Execution falls back to the CPU, bypassing the 45 TOPS INT8 NPU advantage and incurring severe context switching and memory transfer overheads across the heterogeneous architecture.
  common_mistake: |
    **The Pitfall:** Assuming LPDDR5X memory saturation or thermal throttling.
    **The Rationale:** Candidates fail to identify that a silent operator mismatch in the CI/CD compilation pipeline breaks training-serving consistency.
    **The Consequence:** Wasting time debugging system noise instead of fixing the unsupported op causing the hardware fallback.
  napkin_math: |
    1. Theoretical NPU Compute: 2 GOPS / 45,000 GOPS/ms = 0.044 ms.
    2. Memory Copy Overhead: Two 8MB tensors (16MB) / 64 GB/s = 0.25 ms.
    3. CPU Fallback Overhead: OS context-switching and framework partitioning adds 70-80 ms.
    **Conclusion:** The silent fallback causes an 80ms+ regression, bypassing the NPU.
