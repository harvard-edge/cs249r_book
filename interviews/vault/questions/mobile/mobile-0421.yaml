title: The Privacy Paradox TCO
scenario: 'You are a mobile ML engineer at a company building a smart keyboard. To improve suggestions, you''re A/B testing two approaches on a cohort of 10 million users: Approach A uses centralized training by uploading user keystrokes, while Approach B uses Federated Learning to train a model on-device for 5 minutes daily.'
question: What hidden FL TCO driver can dominate when daily on-device keyboard training drains about 2.2% battery?
details:
  realistic_solution: The primary driver of user churn is the non-trivial battery consumption from the daily on-device training sessions. A 5-minute training run on a modern mobile SoC consumes a noticeable percentage of a phone's daily battery budget. While each individual event is small, the cumulative daily impact is perceptible to users, leading them to disable the feature or uninstall the app, thus causing churn. The cost of this churn ($250,000/month) is a direct component of the Federated Learning approach's Total Cost of Ownership (TCO), and in this case, it's the dominant one.
  common_mistake: |
    **The Pitfall:** Focusing only on the most obvious user-facing cost (cellular data usage) or server-side costs.
    **The Rationale:** Engineers underestimate how sensitive users are to even minor, repeated hits to battery life from background processes, ignoring the second-order cost of churn.
    **The Consequence:** Approving a feature that technically works but silently drives user uninstalls, costing the business significantly more in lost LTV than the direct compute or network costs.
  napkin_math: |
    - **Calculate Energy per Training Run:** A mobile SoC under a heavy ML load consumes about 4W.
    - Energy per run = 4W * 300s (5 min) = 1,200 J = 0.333 Wh.
    - **Battery impact:** Typical phone battery is ~15 Wh. 0.333 Wh / 15 Wh = **2.2% per day**.
    - **User churn from battery drain:** Assume 1% of users who notice >2% drain disable/uninstall.
    - Affected users: 10,000,000 * 1% = 100,000 users/month churned.
    - At an average lifetime value (LTV) of $2.50/user: churn cost = 100,000 * $2.50 = **$250,000/month**.
    - **Network cost of FL:** Each user uploads 5 MB daily. 10M * 5 MB = 50 TB/day. At $0.01/GB = **$15,000/month**.
    - **Result: Total FL TCO is $265,000/month. The churn cost from battery drain dominates the FL TCO by ~17x.**
  options:
  - The 1MB daily cellular data upload for the model update is too expensive for users on limited data plans.
  - The daily ~2.2% battery drain from the 5-minute on-device training is perceptible to users, causing them to disable the feature.
  - The FL model updates are introducing inference latency ('jank') into the keyboard UI, leading to a poor user experience.
  - The on-device training process is filling up the phone's storage with temporary files, causing 'storage full' warnings.
  correct_index: 1
