title: 'The NPU Utilization Paradox: Roofline Analysis'
scenario: Your on-device LLM (1.5B parameters, INT4) runs on the Qualcomm Snapdragon
  8 Elite's Hexagon NPU (rated 45 TOPS). Qualcomm's profiler shows 98% NPU utilization
  during token generation. But you're only getting 12 tokens/sec, whereas your back-of-envelope
  calculation says 45 TOPS should deliver 40+ tokens/sec for this model.
question: Why does a 1.5B INT4 LLM get only 12 tok/s on a 98% utilized Snapdragon
  8 Elite Hexagon NPU?
details:
  realistic_solution: 'The NPU is memory-bandwidth-bound, not compute-bound. INT4
    weights for 1.5B params = 750 MB. Each token decode reads all weights once, so
    tokens/sec = effective bandwidth / weight size. The NPU''s share of LPDDR5x bandwidth
    is ~18 GB/s (not the full 77 GB/s, which is shared with CPU, GPU, display, and
    camera). 18,000 MB / 850 MB per token = 21 tok/s theoretical. The 98% utilization
    means the NPU''s compute units are busy waiting for memory fetches, not doing
    useful math. Fix: reduce memory reads via GQA (shrink KV-cache), INT8 KV quantization,
    and weight streaming with double-buffering in NPU SRAM.'
  common_mistake: '**The Pitfall:** Confusing high NPU utilization with compute-bound
    execution.

    **The Rationale:** Engineers assume that a 98% busy NPU means its compute units
    are saturated. High utilization can simply mean the NPU is actively spinning while
    waiting for memory fetches.

    **The Consequence:** Misdiagnosing the bottleneck, leading to ineffective hardware
    upgrade requests instead of implementing memory optimizations.

    '
  napkin_math: '**Assumptions & Constraints:**

    - Model parameters: 1.5B parameters (INT4).

    - KV-cache (MHA): 24 layers * 2048 dim * 512 tokens * 2 bytes (FP16).

    - NPU bandwidth: ~18 GB/s.


    **Calculations:**

    - Model weights (INT4): 1.5B * 0.5 bytes = 750 MB.

    - KV-cache (MHA): 2 (K+V) * 24 * 2048 * 512 * 2 ≈ 100 MB.

    - Memory per token: 750 MB + 100 MB = 850 MB.

    - Theoretical throughput: 18 GB/s / 850 MB = ~21.1 tokens/sec.

    - With GQA (8 KV heads): KV-cache drops to 25 MB (total 775 MB); throughput increases
    to 18,000 / 775 = ~23.2 tokens/sec.

    - With INT8 KV-cache: KV-cache drops to 12.5 MB (total 762.5 MB); throughput increases
    to 18,000 / 762.5 = ~23.6 tokens/sec.

    - With weight streaming: 1.3x bandwidth efficiency yields 23.6 * 1.3 = ~30 tokens/sec.


    **Conclusion & Interpretation:**

    - **Result: ~30 tokens/sec (Memory-Bound)**. NPU utilization is gated by memory
    fetches, not compute.

    '
