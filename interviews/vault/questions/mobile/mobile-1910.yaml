title: Mobile NPU SRAM Spilling Bottleneck
scenario: An Apple A17 Pro Neural Engine processes a super-resolution model. A 16MB
  intermediate feature map exceeds the internal SRAM, forcing a spill to LPDDR5 main
  memory (~50 GB/s bandwidth allocated to NPU).
question: Calculate the added latency bottleneck per layer transition caused by spilling
  and reloading this 16MB tensor.
visual:
  kind: svg
  path: mobile-1910.svg
  alt: Horizontal bar chart showing the massive bandwidth difference between internal
    SRAM and external LPDDR5.
  caption: Memory Tier Bandwidth
details:
  realistic_solution: The tensor must be written out to main memory and then read
    back in for the next layer. Total data moved is 16MB write + 16MB read = 32MB.
    At 50 GB/s (50,000 MB/s), the latency is 32 MB / 50,000 MB/s = 0.00064 seconds,
    or 640 microseconds per layer transition.
  common_mistake: Only accounting for the read time and ignoring the mandatory write
    back to memory, halving the actual latency.
  napkin_math: 32 / 50000 = 0.64 ms
