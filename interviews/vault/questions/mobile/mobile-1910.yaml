title: Mobile NPU SRAM Spilling Bottleneck
scenario: An on-device super-resolution model generates a 16MB intermediate feature map that exceeds the internal SRAM, forcing a spill to LPDDR5 main memory.
question: Calculate the added latency bottleneck per layer transition caused by spilling and reloading this 16MB tensor.
visual:
  kind: svg
  path: mobile-1910.svg
  alt: Horizontal bar chart showing the massive bandwidth difference between internal SRAM and external LPDDR5.
  caption: Memory Tier Bandwidth
details:
  realistic_solution: When a tensor spills to DRAM, it mandates a full write eviction followed by a full read back for the next layer. This completely abandons the ultra-fast internal SRAM, bottlenecking the system on the external memory bus. At 50 GB/s bandwidth, moving this 32MB payload imposes a severe sub-millisecond penalty. Over a deep network, these layer-by-layer catastrophic spills aggregate, completely destroying real-time inference deadlines.
  common_mistake: |
    **The Pitfall:** Only accounting for the read time when calculating the spill bottleneck.
    **The Rationale:** Developers forget that a memory spill inherently requires both a write (eviction) and a subsequent load (read).
    **The Consequence:** They erroneously halve the actual latency impact, severely underestimating the devastating performance penalty of exceeding NPU SRAM limits.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Tensor size: 16 MB.
       - External memory bandwidth: 50 GB/s (50,000 MB/s).
       - Spill mechanism: Tensor must be written to DRAM entirely, then read back entirely.
    2. **Calculations:**
       - Total data movement: 16 MB (write) + 16 MB (read) = 32 MB.
       - Spill latency: 32 MB / 50,000 MB/s = 0.00064 seconds.
       - Conversion to ms: 0.00064 s = 0.64 ms.
    3. **Conclusion & Interpretation:**
       - **Result: Bandwidth-Bound.** Spilling to DRAM incurs a heavy 0.64 ms penalty per layer transition, effectively bottlenecking the NPU solely on memory I/O.
