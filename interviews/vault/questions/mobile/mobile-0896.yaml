title: 'Dataset Curation: Design On-Device Data Collection for Mobile Model Training'
scenario: You are building a personalized keyboard model that trains on-device on A17 Pro (35 TOPS Neural Engine, 8GB RAM). The model learns from user typing patterns. The device has 500MB available for training data.
question: "How would you design the data collection, quality filtering, and privacy-preserving local storage pipeline?"
details:
  realistic_solution: 'Collect: n-gram statistics not raw keystrokes. Filter: exclude
    password fields (type=password), URLs, and short sessions (< 20 keystrokes). Store:
    DP-noised n-gram counts with ε=2.0. Convert to training examples only at training
    time. Delete after training.'
  common_mistake: |
    **The Pitfall:** Storing raw keystrokes and failing to apply privacy measures early.
    **The Rationale:** Candidates focus on standard data collection pipelines and forget that mobile on-device training requires extreme privacy measures (like differential privacy) before storage.
    **The Consequence:** Logging passwords and sensitive user data locally, creating massive security vulnerabilities.
  napkin_math: |
    - Storage Budget: 500 MB.
    - User activity: 200 words/day = 1,200 keystrokes/day.
    - 4-gram memory footprint: 500K frequent 4-grams × 8 bytes/gram = 4 MB.
    - 30-day storage: 30 × 4 MB = 120 MB.
    - Training Conversion: 1M sequence pairs × 16 bytes = 16 MB.
    - Total Memory Used: 136 MB (well under 500 MB budget).
    - Privacy Noise: Add `Laplace(0, 1/ε) = Laplace(0, 0.5)` to each count for **ε=2.0 local differential privacy**.
