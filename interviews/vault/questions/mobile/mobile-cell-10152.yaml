title: 'Realization: build multi-model CNN ensemble on Snapdragon 8 Gen 3 with CPU+NPU split'
scenario: You need to run an ensemble of MobileNetV3-Small (0.056 GFLOPs) + EfficientNet-Lite0 (0.35 GFLOPs)
  simultaneously on a Snapdragon 8 Gen 3 device for a high-accuracy classification feature. Total latency
  must be <8ms with results merged. Realize the heterogeneous compute split between Hexagon NPU (45 TOPS)
  and Kryo CPU (3.3 GHz).
details:
  realistic_solution: 'Heterogeneous split: (1) MobileNetV3-Small → Hexagon HTP (0.056G FLOPs, ~0.5ms);
    (2) EfficientNet-Lite0 → Hexagon HTP sequentially after or (better) run EfficientNet-Lite0 on Hexagon
    and MV3-Small on Kryo DSP or Adreno GPU concurrently. QNN supports multi-core scheduling: set QNN_PROPERTY_GROUP
    to enable concurrent NPU + GPU. Ensemble merge: on CPU (Cortex-A78, fast for 2×1000 softmax addition).
    If HTP queue can accept both simultaneously: total latency = max(0.5ms, 2ms) = 2ms. Sequential: 0.5
    + 2 = 2.5ms. Parallel: 2ms. Well under 8ms SLA.'
  common_mistake: Running both models sequentially on the Hexagon NPU, totaling ~3ms, when the CPU and
    NPU can execute in parallel — reducing wall-clock time from 3ms sequential to 2ms parallel for the
    ensemble.
  napkin_math: 'MV3-Small: 0.056G / 45 TOPS = 1.2μs theoretical → practical ~0.5ms. Lite0: 0.35G / 45
    TOPS = 7.8μs theoretical → practical ~2ms. Sequential: 2.5ms. Parallel: 2ms. Ensemble merge: two 1000-dim
    softmax vectors on Kryo: 2000 FP32 additions = 2000/3.3G ops = 0.6μs (negligible). Total pipeline:
    image → parallel NPU inference (2ms) → CPU merge (0.001ms) → result: 2.001ms. 4× headroom vs 8ms SLA.
    Power: both models at once: Hexagon ~0.8W + scheduling overhead. At 2ms per frame (30 FPS): 2ms ×
    30 / 1000ms = 6% duty cycle → 0.8 × 0.06 = 0.048W NPU.'
