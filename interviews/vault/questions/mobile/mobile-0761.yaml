title: The Cellular Model Delivery Problem
scenario: Your app needs to deliver a 4 GB INT4 language model to users over cellular. The median LTE
  download speed is 50 Mbps. A product review flags that users on metered data plans will be unhappy.
  Calculate the download time and propose a deployment strategy that respects mobile network constraints.
details:
  realistic_solution: '4 GB / 6.25 MB/s = 640 seconds = 10.7 minutes at peak. Real-world with overhead:
    15-20 minutes. Strategy: (1) Ship a base model in the app bundle, (2) download full model over WiFi
    only with user consent, (3) use delta updates for model version upgrades (~5-10% of full size), (4)
    stream initial layers while downloading the rest.'
  common_mistake: Confusing megabits (Mb) with megabytes (MB). 50 Mbps = 6.25 MB/s, not 50 MB/s. Also,
    ignoring that cellular connections are bursty and real throughput is often 30-50% of advertised speeds.
  napkin_math: 'LTE Speed = 50 Mbps / 8 = 6.25 MB/s. Model size = 4 GB = 4096 MB. Download time = 4096
    / 6.25 = 655 seconds (~10.9 mins). Metered cost = 4 GB * $10/GB = $40. Strategy: Require WiFi for
    the 4GB payload. For future updates, ship INT4 LoRA adapters (~50MB), which download in 8 seconds
    and cost only $0.50 on cellular.'
