title: Guardrail Latency Budget on a Mobile LLM
scenario: 'A mobile app runs a 1.3B on-device LLM for chat assistance. The UX spec allows 800ms first-token latency. Prefill takes 600ms. You have 200ms for a guardrail. Options: (A) 125M classifier at 180ms, (B) 7M classifier at 25ms, (C) prefix embedding similarity at 8ms.'
question: Which guardrail mix fits a 200 ms safety budget after a 600 ms prefill on an NPU?
details:
  realistic_solution: Deploy a cascaded streaming guardrail. Execute the 8ms prefix similarity check (Option C) upfront against toxic prompt patterns, allowing an immediate block with zero generation cost. Then, during the autoregressive generation phase, execute Option B (7M classifier, 25ms) asynchronously every chunk of 50 tokens. Option A (180ms) consumes 90% of the remaining latency budget and inherently introduces unacceptable streaming jitter, so it must be discarded.
  common_mistake: |
    **The Pitfall:** Waiting to run the guardrail payload until the entire LLM response has finished generating.
    **The Rationale:** Engineers treat safety validation as a distinct post-processing pipeline stage rather than an interleaved, streaming task.
    **The Consequence:** This completely blocks the UI from displaying any generated text, introducing a catastrophic, user-facing delay proportional to sequence length.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Target Safety budget: 800 ms (UX Limit) - 600 ms (Prefill) = 200 ms.
       - Option A (125M): 180 ms latency.
       - Option B (7M): 25 ms latency.
       - Option C (Prefix): 8 ms latency.
       - Streaming rate: 5 tokens/second.
    2. **Calculations:**
       - Option C upfront: 8 ms < 200 ms (Passes budget easily).
       - Option B streaming: Checks occur every 50 tokens. At 5 tok/s, 50 tokens = 10s intervals. 25 ms execution per 10s adds negligible jitter.
       - Option A: 180 ms execution violates smooth streaming paradigms entirely.
    3. **Conclusion & Interpretation:**
       - **Result: Latency-Bound.** A cascaded architecture running the 8ms prefix check upfront and the 25ms classifier asynchronously during streaming perfectly satisfies the strict 200ms UX deadline without jitter.
