title: Guardrail Latency Budget on a Mobile LLM
scenario: A mobile app runs a 1.3B on-device LLM for chat assistance. The product team requires a content safety guardrail that blocks toxic outputs. The UX spec allows 800ms first-token latency. On a Snapdragon 8 Gen 3, the LLM prefill takes 600ms. You have 200ms for the guardrail. Three options are available: (A) 125M classifier at 180ms, (B) 7M classifier at 25ms with lower recall, (C) prefix embedding similarity at 8ms with limited coverage.
question: Which guardrail mix fits a 200 ms safety budget after a 600 ms 1.3B LLM prefill on Snapdragon 8 Gen 3?
details:
  realistic_solution: 'Use a cascaded streaming guardrail: (1) At prefill: run the 8ms prefix similarity check (Option C) against known toxic prompt patterns. If similarity > 0.9 threshold: block immediately, 0 generation cost. (2) During generation: run Option B (7M classifier, ~25ms including load overhead) every 50 tokens on the accumulated output. At 5 tokens/sec on Snapdragon, 50-token windows = 10 second intervals — well within UX perception. (3) Option A (125M, ~180ms including overhead) is too slow for streaming — reserve for async audit of full completed responses for compliance logging. Cascade recall: prefix check catches ~40% of known attacks, chunk classifier catches 80% of remainder, leaving ~12% miss rate on novel attacks. Hybrid recall ≈ 1 - (0.6 × 0.2) = 88% at 8-25ms latency.'
  common_mistake: |
    **The Pitfall:** Running the guardrail after the full response is generated.
    **The Rationale:** Many engineers treat safety checks as a post-processing step rather than an interleaved streaming task.
    **The Consequence:** This blocks display of any content until the entire response is checked, introducing latency proportional to response length.
  napkin_math: |
    - **Snapdragon 8 Gen 3 Compute:** ~45 TOPS INT8
    - **Option B (7M):** 7M params × 2 MACs/param = 14M MACs = 14 MFLOPs
    - **Option B Compute Time:** 14M / 45T = 0.00031 ms = **0.31 µs** per inference
    - **Option A (125M):** 125M × 2 MACs = 250 MFLOPs
    - **Option A Compute Time:** 250M / 45T = 0.0056 ms = **5.6 µs**
    - **Option A Memory Bound Time:** 125 MB / 51.2 GB/s = **2.4 ms**
