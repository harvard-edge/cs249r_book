title: The DRAM Bandwidth Contention
scenario: Your mobile application performs real-time video analysis using two ML models concurrently.
  One model processes full-resolution camera frames (Model A), while another analyzes metadata from a
  separate sensor stream (Model B). Both models, along with the UI rendering thread, are contending for
  access to the shared DRAM. You observe performance degradation in both ML inference and UI responsiveness.
  How would you diagnose and mitigate this memory bandwidth contention issue?
question: "How would you diagnose and mitigate this memory bandwidth contention issue?"
details:
  realistic_solution: "This is a classic **shared memory bandwidth contention** problem.\n  1.  **Diagnosis:**\n\
    \      *   **Profiling Tools:** Use platform-specific tools like Android Systrace/Perfetto (for memory\
    \ tracing, GPU/CPU/NPU activity), ARM Streamline (for detailed hardware counter analysis, including\
    \ DRAM bandwidth utilization), and vendor-specific tools (e.g., Qualcomm Snapdragon Profiler, Mali\
    \ Graphics Debugger).\n      *   **Hardware Counters:** Look for stalls related to memory access,\
    \ cache misses (L1/L2/L3), and overall DRAM read/write bandwidth saturation. Identify which components\
    \ (CPU, GPU, NPU) are the primary consumers.\n      *   **Memory Access Patterns:** Analyze the memory\
    \ access patterns of Model A, Model B, and the UI. Are they sequential? Random? What's the working\
    \ set size?\n  2.  **Mitigation Strategies:**\n      *   **Data Locality & Caching:**\n          *\
    \   **Reduce Data Movement:** Minimize redundant data copies between different processors. Where possible,\
    \ use zero-copy buffer sharing (e.g., Android's `AHardwareBuffer` or `ION` buffers) instead of `memcpy`.\n\
    \          *   **Cache Optimization:** Ensure frequently accessed data fits into on-chip caches (L1/L2/L3).\
    \ Optimize memory access patterns (e.g., row-major vs. column-major for convolutions) to improve cache\
    \ hit rates.\n          *   **Quantization & Compression:** Reduce the size of intermediate tensors\
    \ (e.g., FP32 to FP16/INT8) to decrease memory footprint and bandwidth requirements.\n      *   **Scheduling\
    \ & Prioritization:**\n          *   **Temporal Decoupling:** Stagger the execution of memory-intensive\
    \ phases of Model A and Model B. For example, if Model A loads weights, Model B waits.\n         \
    \ *   **Resource Management:** If the OS/hardware allows, assign different memory access priorities\
    \ to critical components (e.g., UI rendering should have high priority to maintain responsiveness).\n\
    \          *   **Batching:** If possible, batch inferences for Model B to process more data per memory\
    \ access, amortizing overheads.\n      *   **Model Architecture Optimization:**\n          *   **Memory-Efficient\
    \ Layers:** Prefer layers with lower memory bandwidth requirements (e.g., depthwise separable convolutions\
    \ over standard convolutions).\n          *   **Model Pruning/Sparsity:** Reduce the number of parameters\
    \ and potentially the memory footprint of weights and activations.\n      *   **Prefetching:** If\
    \ memory access patterns are predictable, use hardware or software prefetching to bring data into\
    \ caches before it's needed."
  common_mistake: '"Just optimize the models'' FLOPs." While reducing FLOPs can help, if the bottleneck
    is memory bandwidth, simply making compute faster won''t solve the contention for data access.'
  napkin_math: A typical LPDDR5 mobile DRAM can offer 50-60 GB/s peak bandwidth.
