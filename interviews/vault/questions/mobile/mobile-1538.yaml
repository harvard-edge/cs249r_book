title: VRAM Budgeting for On-Device LLM Inference on Google Tensor G3
scenario: You are tasked with deploying a 7B LLM on an edge device with 12GB LPDDR5X. The LLM uses bfloat16 for weights and activations. The KV-cache will be stored in float16 during inference. You need to ensure the model, its intermediate activations, and the KV-cache can fit within the available memory, considering a maximum sequence length of 512 tokens and a batch size of 1.
question: How would you outline your approach to estimate and manage the VRAM budget effectively?
details:
  realistic_solution: |
    Deploying an unmodified BF16 7B model is physically impossible under the strict 12GB constraint. The architectural priority mandates aggressive Post-Training Quantization (PTQ) to downcast weights to W8A16 or W4A16 schemas. After establishing a highly compressed weight footprint, calculate the precise geometry of the floating-point KV-cache. Even at FP16, a minimal 512 context fits comfortably, but adopting structured methodologies like PagedAttention averts unrecoverable memory fragmentation. Furthermore, optimizing context window topology via MobileLLMs fundamentally aligns mathematical capacity to physical RAM.
  common_mistake: |
    **The Pitfall:** Tunnel vision on the static weight parameters, severely underestimating or entirely omitting KV-cache scaling mechanics.
    **The Rationale:** Candidates fixate exclusively on weight quantization algebra, completely ignoring that runtime memory bounds scale wildly based on context length, layer geometry, and precision matrices.
    **The Consequence:** Unpredictable Out-Of-Memory (OOM) faults during execution, or destroying generation quality via overly aggressive weight compression when optimizing the KV-cache was the actual requirement.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Target Memory Capacity: 12 GB (LPDDR5X).
       - Model Parameters: 7 Billion.
       - KV-Cache Config: Seq len 512, Batch 1, 32 layers, 32 heads, 128 head_dim, FP16 storage.
    2. **Calculations:**
       - Unmodified BF16 Weights: 7B * 2 bytes = 14 GB (Exceeds 12GB absolute budget).
       - W8A16 Quantized Weights: 7B * 1 byte = 7 GB (Leaves a 5GB envelope).
       - KV-Cache Params: 2 (K+V) * 512 (Seq) * 32 (Layers) * 32 (Heads) * 128 (Dim) = 134,217,728 params.
       - KV-Cache Memory: 134,217,728 * 2 bytes (FP16) = ~268 MB.
    3. **Conclusion & Interpretation:**
       **Result: INT8 weights mandatory, saving 7GB (Memory-Capacity-Bound).** Bare metal deployment demands INT8 weight matrices to fit the ~268MB dynamic inference footprint securely within hardware bounds.
