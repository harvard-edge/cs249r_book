title: VRAM Budgeting for On-Device LLM Inference on Google Tensor G3
scenario: You are tasked with deploying a 7-billion parameter Large Language Model
  (LLM) for on-device inference on a Google Pixel device powered by the Google Tensor
  G3. The device features 12 GB of LPDDR5X memory, with a maximum bandwidth of 68.26
  GB/s, and a 7.5 TOPS on-device TPU. The LLM uses bfloat16 for weights and activations.
  The KV-cache will be stored in float16 during inference. You need to ensure the
  model, its intermediate activations, and the KV-cache can fit within the available
  12 GB LPDDR5X memory, considering a maximum sequence length of 512 tokens and a
  batch size of 1. Outline your approach to estimate and manage the VRAM budget effectively.
question: How would you outline your approach to estimate and manage the VRAM budget
  effectively?
details:
  realistic_solution: To realistically deploy such a model, several techniques must
    be combined. Firstly, aggressive quantization of model weights to 8-bit or even
    4-bit integers (e.g., using GPTQ or AWQ) is essential. For the KV-cache, explore
    techniques like Paged Attention, which optimizes memory usage by storing KV entries
    in non-contiguous memory pages, or apply KV-cache quantization (e.g., to 8-bit
    integers). Dynamic batching or reducing the maximum sequence length based on available
    memory can also be crucial. Furthermore, investigate model architectures specifically
    designed for memory efficiency on edge devices (e.g., MobileLLMs) or consider
    techniques like speculative decoding to reduce the computational and memory load
    per token generation.
  common_mistake: A common mistake is underestimating the memory footprint of the
    KV-cache, especially for longer sequence lengths or when trying to optimize for
    higher batch sizes, and neglecting the significant memory required for intermediate
    activations during inference. This often leads to out-of-memory errors or requires
    aggressive quantization that degrades model quality significantly on resource-constrained
    edge devices like smartphones.
  napkin_math: '1. **Model Weights (bfloat16):** 7 billion parameters * 2 bytes/parameter
    = 14 GB. This immediately exceeds the 12 GB LPDDR5X capacity, necessitating quantization.

    2. **Quantized Weights (e.g., 8-bit):** 7 billion parameters * 1 byte/parameter
    = 7 GB. This leaves 12 GB - 7 GB = 5 GB for activations and KV-cache.

    3. **KV-Cache (float16):** For an LLM, assuming approximately 32 attention layers,
    32 heads, and a head dimension of 128. The KV-cache size for sequence length 512
    would be roughly: 2 (K+V) * 512 (seq_len) * 32 (layers) * 32 (heads) * 128 (head_dim)
    * 2 bytes (float16) = 8,388,608 bytes ≈ 8 MB. This calculation demonstrates that
    a modest sequence length fits comfortably within the remaining memory budget,
    but very long sequences or large batches can still exhaust it.

    4. **Activations:** Intermediate activations during inference can consume significant
    memory, often proportional to batch size, sequence length, and hidden dimension,
    requiring careful memory management.'
