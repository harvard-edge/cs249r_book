title: Optimizing Large Generative AI Model Deployment on Samsung Exynos 2400 NPU under Memory Constraints
scenario: You are deploying a generative AI model on the Samsung Exynos 2400 NPU (34.7 TOPS, 12 GB LPDDR5X). Even quantized, the model requires 15 GB of peak memory during full-batch inference. You must choose between (A) Aggressive Model Partitioning with Host Offloading, or (B) Micro-Batching with Activation Recomputation.
question: How would you evaluate host offloading versus activation recomputation to fit a 15GB peak memory LLM into the Exynos 2400's 12GB RAM?
details:
  realistic_solution: A realistic solution would involve a careful hybrid approach. Start by profiling the model's memory footprint to identify exact peak usage points. For Approach B, optimize micro-batching size to balance recomputation overhead with memory savings, potentially using a 'striping' or 'pipelining' technique to hide recomputation latency. For Approach A, optimize data transfer mechanisms (e.g., using zero-copy buffers where possible, asynchronous transfers). Implement custom memory allocators or leverage NPU-specific memory management APIs if available to reduce fragmentation. Proactively monitor memory usage and fragmentation metrics, and dynamically adjust strategies (e.g., switching micro-batch sizes) to maintain QoS. Consider a lightweight, NPU-aware memory defragmentation pass during idle cycles if supported.
  common_mistake: |
    **The Pitfall:** Neglecting the dynamic memory requirements of activations and underestimating NPU-host data transfer penalties.
    **The Rationale:** Engineers look at static model weight sizes and assume they fit, ignoring the massive activation tensors generated during inference and the crippling latency of moving them across the PCIe bus.
    **The Consequence:** The model either crashes with an OOM error or runs so slowly due to host offloading that it is completely unusable.
  napkin_math: |
    1. **Base Memory:** Weights + minimal activations = 8 GB.
    2. **Excess Activations:** 15 GB (peak) - 8 GB = 7 GB of intermediate activations.
    3. **Approach A (Offloading):** Moving 3 GB over a 10 GB/s interconnect takes 300 ms per cycle.
    4. **Approach B (Recomputation):** Reduces 7 GB to 3 GB, keeping peak at 11 GB (fits in 12 GB). Recomputing 4 GB takes ~50 ms.
    5. **Conclusion:** Spending **50 ms** on compute is vastly superior to spending **300 ms** on data transfer.
