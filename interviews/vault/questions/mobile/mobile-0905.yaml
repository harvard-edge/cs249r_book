title: 'Dataset Curation: Optimize Label Quality vs Cost Tradeoff for Mobile App Training'
scenario: 'You are curating training data for a photo classification model deployed on A17 Pro (35 TOPS, 8GB). You have 500K user photos. Expert labeling costs $2/image (95% accuracy), crowdsourced costs $0.10/image (85% accuracy), and automated (CLIP zero-shot) costs $0.001/image (75% overall accuracy, but 90% accurate on high-confidence examples). Your total budget is $10,000 and you need >= 90% label accuracy on final training set.'
question: What tiered labeling strategy can meet a 10000 dollar budget and near-90% label accuracy for 500K mobile photos?
details:
  realistic_solution: 'Tiered labeling: (1) CLIP zero-shot labels all 500K at $500. (2) Crowdsource top-uncertainty 50K at $5,000. (3) Expert review worst 2K at $4,000. Total: $9,500. Expected accuracy: weighted average on final set.'
  common_mistake: Using only one labeling source; not using a hybrid strategy that combines cheap automated labels with targeted expert review.
  napkin_math: 'Budget: $10,000. Option A: 5,000 expert labels ($10K). Option B: 100K crowdsourced ($10K). Option C: Hybrid: 500K CLIP ($500). Uncertainty selection: 50K re-labeled by crowd ($5K). Top-2K re-labeled by expert ($4K). Total $9.5K. Final accuracy: CLIP on easy 448K (assume 90% correct = 403.2K). Crowd on 50K uncertain (85% = 42.5K). Expert on 2K hardest (95% = 1.9K). Total: 447.6K / 500K = 89.52% ≈ 90% target. Achieved.'
