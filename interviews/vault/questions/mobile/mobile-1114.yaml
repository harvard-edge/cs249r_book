title: Diagnosing A17 Pro Neural Engine Utilization
scenario: 'You are profiling an image enhancement model running at batch size 1 on a mobile Neural Engine. The system provides 50 GB/s of memory bandwidth. The model consists of 10 million INT8 parameters and requires 700 million operations per inference. When profiling, you observe the accelerator achieves exactly 10% of its peak TOPS.'
question: 'Why does this image enhancement model reach only 10% of the A17 Pro Neural Engine''s peak utilization at batch size 1?'
details:
  realistic_solution: 'The low utilization occurs because the workload is severely memory-bound, falling on the sloped memory-bandwidth ceiling of the roofline model. At batch size 1, every weight must be loaded from the unified memory for a relatively small number of operations. The model''s arithmetic intensity is far below the machine''s ridge point, meaning the 16-core Neural Engine spends most of its time waiting for memory rather than performing math.'
  common_mistake: |
    **The Pitfall:** Assuming the low utilization is caused by thermal throttling or suboptimal model precision.
    **The Rationale:** Engineers see low TOPS and assume hardware restriction or need for further quantization.
    **The Consequence:** Wasting time requantizing an already INT8 model, missing the fundamental low arithmetic intensity constraint.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Neural Engine peak: 35 TOPS. Bandwidth: 50 GB/s.
       - Model ops: 700M. Model weights: 10 MB (INT8).
    2. **Calculations:**
       - Machine Ridge Point: 35 TOPS / 50 GB/s = 700 OPS/Byte.
       - Arithmetic Intensity: 700M ops / 10M bytes = 70 OPS/Byte.
       - Max Achievable: 70 OPS/Byte * 50 GB/s = 3.5 TOPS.
       - Utilization: 3.5 TOPS / 35 TOPS = 10%.
    3. **Conclusion & Interpretation:**
       - **Result: 10% Utilization (Memory-Bandwidth Bound).**
