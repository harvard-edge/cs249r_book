title: Diagnosing A17 Pro Neural Engine Utilization
scenario: You are profiling an image enhancement model running at batch size 1 on the Apple A17 Pro Neural Engine. The system provides 50 GB/s of memory bandwidth to the Neural Engine for this task. The model consists of 10 million INT8 parameters and requires 700 million operations per inference. When profiling, you observe the accelerator achieves exactly 10% of its peak TOPS.
question: Why does this image enhancement model reach only 10% of the A17 Pro Neural Engine's peak utilization at batch size 1?
details:
  realistic_solution: The low utilization occurs because the workload is severely memory-bound, falling on the sloped memory-bandwidth ceiling of the roofline model. At batch size 1, every weight must be loaded from the unified memory for a relatively small number of operations. The model's arithmetic intensity is far below the machine's ridge point, meaning the 16-core Neural Engine spends most of its time waiting for memory rather than performing math.
  common_mistake: |
    **The Pitfall:** Assuming the low utilization is caused by thermal throttling or suboptimal model precision.
    **The Rationale:** Engineers see low TOPS and assume the chip is artificially restricted or the model needs quantization.
    **The Consequence:** Teams waste time investigating hardware constraints or re-quantizing an already INT8 model, missing the fundamental operations-to-byte ratio bottleneck at batch size 1.
  napkin_math: |
    1. Machine Ridge Point: 35 TOPS / 50 GB/s = 700 OPS/Byte.
    2. Model Arithmetic Intensity (AI): 700 million ops / 10 million bytes (10MB INT8 weights) = 70 OPS/Byte.
    3. Memory Bound Check: Since AI (70) < Ridge Point (700), the workload is heavily memory-bound.
    4. Max Achievable Performance: AI * Bandwidth = 70 OPS/Byte * 50 GB/s = 3.5 TOPS.
    5. **Result: Utilization = 3.5 TOPS / 35 TOPS = 10%.**
