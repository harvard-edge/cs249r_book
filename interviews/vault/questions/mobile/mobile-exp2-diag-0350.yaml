title: Diagnosing Latency Bias in On-Device LLMs
scenario: 'You have deployed a quantized version of Gemini Nano on the Google Tensor G3 for a real-time
  accessibility transcription feature. During fairness evaluation, you observe a critical symptom: the
  application exhibits 3x higher latency and significantly worse battery drain when processing transcripts
  from users speaking African American Vernacular English (AAVE) compared to Standard American English
  (SAE). The model is designed to utilize the device''s TPU, which is capable of 7.5 TOPS. You need to
  diagnose the root cause of this performance disparity.'
question: "Why does Gemini Nano transcription on Tensor G3 show higher latency and battery drain for AAVE than SAE transcripts?"
details:
  realistic_solution: The root cause is a tokenizer trained predominantly on SAE, causing it to over-fragment
    AAVE text into many more subword tokens. This significantly longer sequence length increases the memory
    bandwidth required to load the KV cache from the 12 GB LPDDR5X memory and quadratically increases
    the computational load on the 7.5 TOPS TPU. The diagnosis is confirmed by comparing the token-to-word
    ratio across demographic groups.
  common_mistake: Candidates often immediately assume the model weights are biased or that the training
    data lacked representation, suggesting a full model retrain. They fail to connect the symptom (latency/battery
    drain) to the hardware execution profile on the mobile System-on-Chip (SoC).
  napkin_math: 'Assume an average SAE sentence of 20 words tokenizes to 25 tokens, while an equivalent
    AAVE sentence tokenizes to 75 tokens due to fragmentation. Attention mechanism compute scales at O(N^2).
    SAE compute factor: 25^2 = 625. AAVE compute factor: 75^2 = 5625. This is a 9x increase in attention
    compute. Furthermore, fetching the 3x larger KV cache from the 12 GB LPDDR5X memory bottlenecks the
    7.5 TOPS TPU, directly causing the observed latency and power disparities.'
