title: The Delegate Dilemma
scenario: Your team implemented a custom 'token-shuffling' operator in TensorFlow. When deployed to a Google Pixel via TFLite NPU delegate, it is 5x slower. The graph is partitioned into 20 segments alternating between NPU and CPU.
question: How do 20 NPU-CPU graph partitions cause a 5x slowdown for a single custom token-shuffling operator?
details:
  realistic_solution: 'The TFLite NPU delegate can only accelerate supported operators. When it encounters an unsupported custom op, it partitions the graph. The output tensor is transferred from the NPU to DRAM, the CPU reads it, executes the op, and writes back to DRAM. Then the NPU reads it back. This CPU-NPU round trip overhead dominates execution time.'
  common_mistake: |
    **The Pitfall:** Assuming the slowdown is purely because the custom op runs on the slower CPU.
    **The Rationale:** Ignoring the colossal cost of moving data between memory spaces.
    **The Consequence:** Attempting to optimize the CPU operator's C++ code instead of rewriting the op to be NPU-compatible or keeping the whole graph on one processor.
  napkin_math: |
    - 4MB intermediate tensor. Mobile LPDDR5x bandwidth: 77 GB/s.
    - Transfer time (4MB / 77 GB/s) = ~0.05 ms.
    - 20 partitions = 40 transfers (NPU->CPU, CPU->NPU).
    - Theoretical memory time: 40 * 0.05 ms = 2.0 ms.
    - Actual latency (with driver overhead and sync): 10-20 ms penalty.
    - **Data transfer overhead dominates, not the CPU computation itself.**
