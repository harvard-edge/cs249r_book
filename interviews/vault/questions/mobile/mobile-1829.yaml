title: Mobile Drift Telemetry Spec
scenario: A mobile keyboard model adapts locally. The team wants to detect drift without
  collecting raw typed text. Specify the telemetry needed to detect quality regression
  while preserving privacy.
question: What privacy-preserving telemetry can detect drift in a locally adapted
  mobile keyboard model without uploading raw text?
details:
  realistic_solution: Use aggregate counters such as acceptance rate, correction rate,
    latency, confidence histograms, language/locale bucket, app version, and opt-in
    feedback signals. Add local differential privacy or secure aggregation where appropriate.
    Raw text should not be required for first-line drift monitoring.
  common_mistake: Assuming drift detection requires uploading raw user text, or using
    only aggregate global CTR without device/version segmentation.
  napkin_math: If 1M devices upload 20 aggregate counters/day at 8 bytes each, telemetry
    is only 160 MB/day before protocol overhead.
