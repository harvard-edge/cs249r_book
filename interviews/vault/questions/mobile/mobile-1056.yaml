title: 'Mobile Transformer Cost Mastery: Mobile LLM Scaling Law Analysis'
scenario: 'Analyze the quality-latency-memory tradeoff frontier for mobile LLMs on Snapdragon 8 Gen 3 (16GB, 77GB/s, 45 TOPS). For model sizes 1B, 3B, 7B, 13B at INT4 quantization: calculate decode throughput, 100-token P99 latency, memory footprint, and quality (approximate perplexity scaling).'
question: 'What would you identify as the Pareto-optimal model for a voice assistant (SLO: P99 < 3s, quality: perplexity < 12)?'
details:
  realistic_solution: 'INT4 models: 1B=0.5GB, 3B=1.5GB, 7B=3.5GB, 13B=6.5GB. All fit in 16GB-4GB_OS=12GB. Decode: 1B: 0.5/77=6.5ms/tok, 65ms/100 toks. 3B: 1.5/77=19.5ms, 1.95s. 7B: 3.5/77=45.5ms, 4.55s. 13B: 6.5/77=84.4ms, 8.44s. P99<3s: 1B yes, 3B yes, 7B no, 13B no. Quality (approximate): Scaling laws: perplexity ~ A*N^-a. Empirically: Llama-3-1B: PPL~12.5, 3B~10.5, 7B~9.2, 13B~8.7 on standard benchmarks. Requirement PPL<12: 3B yes (10.5), 1B no (12.5). Pareto-optimal: 3B INT4. Meets both SLOs (P99=1.95s<3s, PPL=10.5<12). 7B would be better quality but violates latency SLO.'
  common_mistake: |
    **The Pitfall:** Treating quality as a binary threshold rather than a continuous metric.
    **The Rationale:** Candidates do not apply empirical scaling laws to estimate perplexity at each model size (scaling with log N).
    **The Consequence:** Failing to accurately identify the tradeoff frontier, leading to an incorrect Pareto-optimal model choice.
  napkin_math: |
    - Decode throughput: 1B: 0.5/77=6.5ms/tok (153 tok/s). 3B: 19.5ms (51.3 tok/s). 7B: 45.5ms (22 tok/s). 13B: 84.4ms (11.9 tok/s).
    - P99 (100 tokens): 1B=0.65s, 3B=1.95s, 7B=4.55s, 13B=8.44s. (P99 < 3s: 1B and 3B only).
    - Quality (PPL WikiText-2): ~1B=12.5, 3B=10.5, 7B=9.2, 13B=8.7. (PPL < 12: 3B passes, 1B fails).
    - Pareto frontier: {3B, 3s, PPL=10.5} dominates {1B, 0.65s, PPL=12.5}.
    - **3B is optimal**. Add KV cache: at 2K context, 3B KV = ~300MB. Total: 1.8GB / 77 = 23.4ms/tok. 100 tok = **2.34s** (Still < 3s).
