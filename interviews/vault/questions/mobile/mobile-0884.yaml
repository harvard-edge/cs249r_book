title: Mastering Compound AI System Reliability Engineering on A17 Pro
scenario: 'An A17 Pro (8GB, 35 TOPS) compound AI app runs a 5-stage pipeline: intent classifier → retrieval → reranker → LLM → output filter. Each stage has an independent failure mode. Field data shows: classifier crashes 0.1% of requests, retrieval returns empty 2.3% of the time, reranker times out 0.8% of requests, LLM produces policy-violating content 0.4% of the time, output filter false-positives 1.2% of safe responses.'
question: How would you design a reliability architecture that achieves a 99.5% successful response rate for this compound pipeline?
details:
  realistic_solution: 'Current failure rate: 4.7% (fails target by 4.2%). Per-stage mitigations: (1) Classifier crash: wrap in try-catch with default intent fallback (0.1% → 0.01% unhandled). (2) Empty retrieval: fallback to BM25 keyword search (2.3% → 0.3% still empty). (3) Reranker timeout: fallback to score-order from retrieval (0.8% → 0ms fallback, 0% timeout failure). (4) LLM policy violation: retry with stronger safety prompt (0.4% → 0.04% after retry). (5) False-positive filter: add confidence threshold, only block if score > 0.95 (1.2% → 0.2%). New compound rate: 1-(0.9999*0.997*1.0*0.9996*0.998) = 1-0.9945 = 0.55% failure → 99.45% success. Need one more fix to reach 99.5%: add global retry for empty response: 99.45% → 99.72%.'
  common_mistake: |
    **The Pitfall:** Treating each failure mode independently and assuming low per-stage failure rates guarantee overall success.
    **The Rationale:** Candidates fail to account for the multiplicative reliability problem where the compound system fails at a rate roughly equal to the sum of all failure modes.
    **The Consequence:** The system drastically misses its reliability SLA because the compounded baseline failure rate is actually 4.7%.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - System Reliability Target: 99.5%.
       - Original Reliabilities: 0.999, 0.977, 0.992, 0.996, 0.988.
       - Mitigated Reliabilities: 0.9999, 0.997, 1.0, 0.9996, 0.998.
    2. **Calculations:**
       - Baseline Reliability: 0.999 * 0.977 * 0.992 * 0.996 * 0.988 = 95.27%.
       - Mitigated Reliability: 0.9999 * 0.997 * 1.0 * 0.9996 * 0.998 = 99.45%.
       - Global Retry (catches ~50% failures): 1 - (0.0055 * 0.5) = 99.725%.
    3. **Conclusion & Interpretation:** **99.725%** exceeds the 99.5% target, solving the multiplicative failure rate of the pipeline.
