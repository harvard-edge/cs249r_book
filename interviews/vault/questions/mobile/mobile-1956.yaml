title: Agentic LLM Prefix Cache
scenario: Snapdragon 8 Gen 3 running an agentic LLM. The agent generates short 10-token
  actions but re-reads a 3000-token system prompt every turn.
question: Optimize the KV-cache memory bandwidth usage across multiple consecutive
  turns.
visual:
  kind: svg
  path: mobile-1956.svg
  alt: Bar chart showing large shared prefix block and small individual generation
    blocks
  caption: Prefix Caching Memory Layout
details:
  realistic_solution: Implement KV prefix caching. The 3000-token system prompt KV
    is computed once and pinned in memory. Bandwidth for subsequent turns only fetches
    the static 3000-token KV and appends 10 tokens.
  common_mistake: Suggesting model quantization instead of attacking the repetitive
    contextual read bandwidth bottleneck.
  napkin_math: Turn 2 cost drops from 3010 to 10 tokens.
