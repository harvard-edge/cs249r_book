title: 'Agentic LLM Prefix Cache'
scenario: 'Snapdragon 8 Gen 3 running an agentic LLM. The agent generates short 10-token actions but re-reads a 3000-token system prompt every turn.'
question: 'How can you optimize the KV-cache memory bandwidth usage across multiple consecutive turns?'
visual:
  kind: svg
  path: mobile-1956.svg
  alt: 'Bar chart showing large shared prefix block and small individual generation blocks'
  caption: 'Prefix Caching Memory Layout'
details:
  realistic_solution: 'Implement KV prefix caching. The 3000-token system prompt KV is computed once and pinned in memory. Bandwidth for subsequent turns only fetches the static 3000-token KV and appends 10 tokens.'
  common_mistake: |
    **The Pitfall:** Suggesting model quantization to reduce memory bandwidth.
    **The Rationale:** Candidates default to making the weights smaller rather than addressing the repetitive, redundant context reads.
    **The Consequence:** Failing to fix the fundamental O(N) scaling bottleneck of the system prompt.
  napkin_math: |
    **Assumptions & Constraints:**
    - Context size: 3000 context tokens.
    - Generation size: 10 generated tokens.

    **Calculations:**
    - Unoptimized Turn 2: Read 3000 context tokens + 10 generated tokens = 3010 tokens.
    - Prefix Cached Turn 2: Pinned 3000 tokens in RAM. Only read the 10 generated tokens.

    **Conclusion & Interpretation:**
    - **Result: 10 tokens (Memory-Bound)**. Read cost drops from 3010 tokens to 10 tokens per subsequent turn.
