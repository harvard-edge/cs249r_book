title: On-Device Drift Detection Alternatives
scenario: 'We are deploying an on-device personalization model on the Apple A17 Pro. To maintain privacy,
  drift detection must happen locally. We have two proposals for detecting data drift: (A) computing continuous
  KL divergence over dense activation embeddings (1024-dim, fp16) using the 16-core Neural Engine against
  a stored reference distribution, or (B) tracking summary statistics (mean, variance) and computing a
  simplified Population Stability Index (PSI) periodically on the CPU. The A17 Pro offers 35 TOPS, operates
  within a ~5W power budget, and has 8 GB of unified memory shared across CPU, GPU, and Neural Engine.
  Which approach is better for evaluating drift in this mobile deployment, and how do you justify your
  choice?'
details:
  realistic_solution: Approach B is far superior. Drift detection is a low-frequency, asynchronous task.
    By tracking running summary statistics, we drastically reduce the memory footprint. The CPU can easily
    handle lightweight PSI calculations periodically using negligible power. This avoids waking up the
    Neural Engine and competing for the shared 8 GB unified memory, preserving the ~5W power budget strictly
    for latency-critical foreground model inference.
  common_mistake: Candidates often choose Approach A, assuming that the 16-core Neural Engine's 35 TOPS
    should be utilized for all ML-related tasks. They fail to evaluate the power and memory bandwidth
    implications of constantly waking up the ANE and buffering high-dimensional embeddings in the shared
    8 GB unified memory for a background monitoring task.
  napkin_math: 'Assuming 10 inferences/sec, Approach A (1024-dim fp16 embeddings) generates 1024 * 2 bytes
    = 2 KB per inference, or ~72 MB per hour of reference data. Constantly buffering and processing this
    in the shared 8 GB memory drains battery. Approach B only maintains running stats (mean/variance)
    per dimension: 1024 * 2 * 4 bytes (fp32) = ~8 KB of total state. The CPU updates this 8 KB state entirely
    in cache, utilizing a tiny fraction of the ~5W budget, while avoiding the latency and power overhead
    of spinning up the 35 TOPS ANE.'
