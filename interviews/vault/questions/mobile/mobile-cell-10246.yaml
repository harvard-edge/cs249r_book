title: Specifying Latency SLO Contracts for Each Stage of a Mobile Compound Pipeline on A17 Pro
scenario: 'You are writing the technical specification for a 5-stage compound AI pipeline on A17 Pro (8GB,
  35 TOPS) targeting a 1.5-second time-to-first-token SLA. Stages are: query embedding, FAISS retrieval,
  reranking, context assembly, and LLM prefill. Write quantitative per-stage SLOs including P50, P95,
  and P99 latency targets, and specify the error budget — the fraction of requests each stage is permitted
  to miss its SLO.'
details:
  realistic_solution: 'Variance-aware budget allocation: stages with deterministic runtime get tight P95/P99
    envelopes; variable stages get wider. Allocation: embedding(P50=15ms, P95=25ms, P99=35ms), FAISS(P50=3ms,
    P95=5ms, P99=8ms), reranker(P50=30ms, P95=50ms, P99=70ms), context_assembly(P50=2ms, P95=5ms, P99=8ms),
    LLM prefill(P50=200ms, P95=400ms, P99=550ms). Sum P95: 25+5+50+5+400=485ms. Total TTFT P95 budget:
    485ms + generation budget (streaming starts after prefill). Error budget per stage: 5% miss rate,
    compounded: stage_SLO_compliance = 95% each → pipeline P95: 0.95^5=77.4% — too low. Must target 99%
    per stage: pipeline P95: 0.99^5=95.1% → meets 95th percentile system SLO.'
  common_mistake: Allocating the 1.5s budget equally across all 5 stages (300ms each) without considering
    that some stages have inherently lower variance (deterministic FAISS search) while others have higher
    variance (LLM prefill depends on actual token count). Equal allocation wastes headroom in deterministic
    stages and under-allocates for variable stages.
  napkin_math: 'TTFT = sum of stage latencies. P95 allocation with 1500ms total (including first token
    generation ~100ms): remaining 1400ms for pre-generation stages. Allocation by stage variance: embedding(25ms)
    + FAISS(5ms) + reranker(50ms) + assembly(5ms) + prefill(400ms) = 485ms P95 pipeline. First token:
    prefill completes at 485ms, first generated token adds ~50ms (1 decode step) = 535ms TTFT P95 — well
    within 1500ms target. Remaining 965ms budget allows 965ms/50ms = 19 additional tokens before 1.5s.
    For streaming UX: user sees first token at 535ms, then 20 tok/s stream.'
