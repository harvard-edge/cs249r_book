title: The A/B Test Without Ground Truth
scenario: You have two versions of your on-device recommendation model. In cloud ML, you'd A/B test by
  comparing click-through rates against a server-side holdout. But your model runs entirely on-device
  — predictions never hit your server. How do you A/B test two on-device models when you can't observe
  the predictions?
question: "How do you A/B test two on-device models when you can't observe the predictions?"
details:
  realistic_solution: 'The key insight is that on mobile, the *hardware itself* generates the telemetry
    you need. Design an **on-device A/B testing framework** that uses hardware-level signals as proxy
    metrics when ground truth is unavailable:'
  common_mistake: '"Send all predictions to the server for analysis." This defeats the purpose of on-device
    inference (privacy, latency) and may violate your privacy policy.'
  napkin_math: 'If model A averages 8ms inference on the Snapdragon Hexagon NPU and model B averages 12ms,
    but model B''s engagement rate is 5% higher, the 4ms difference costs ~0.0006 mAh per inference *
    1000 inferences/day = 0.6 mAh/day extra battery. Is the 5% engagement worth the 0.6 mAh battery life?
    That''s the systems trade-off. Experiment sizing: 100,000 users, 50/50 split. Required sample size for
    2% absolute retention difference (assuming p=0.4): n ≈ (Z_a+Z_b)² * 2 * p(1-p) / δ² ≈ 7.85 * 2 * 0.24 / 0.0004 ≈ 9,420 per cohort.
    With 50,000 per cohort: MDE = sqrt(7.85 * 2 * 0.24 / 50000) ≈ 0.87% absolute difference. Duration: 14 days minimum.'
  options:
  - 'The key insight is that on mobile, the hardware itself generates the telemetry you need. Design an on-device A/B testing framework that uses hardware-level signals as proxy metrics when ground truth is unavailable.'
  - 'Send all predictions to the server for analysis. This defeats the purpose of on-device inference (privacy, latency) and may violate your privacy policy.'
  - 'The primary issue is insufficient hardware capability; upgrading to next-generation hardware will resolve the performance gap without software changes.'
  - 'The solution is to reduce model complexity until it fits within the hardware constraints, accepting the accuracy trade-off as unavoidable.'
