title: Neural Engine OOM During Model Degradation
scenario: Your camera application runs a real-time semantic segmentation model on the Apple A17 Pro Neural Engine. During thermal throttling, the system gracefully degrades by shedding the heavy model and falling back to a lightweight version. However, crash reports show that immediately after triggering this degradation ladder, the application frequently crashes due to an Out of Memory (OOM) error before the lightweight model can fully initialize.
question: Why does graceful degradation from a heavy to lightweight A17 Pro model trigger OOM, and how should it be fixed?
details:
  realistic_solution: The root cause is a race condition in unified memory allocation. Because the A17 Pro uses a shared 8 GB unified memory pool across the CPU, GPU, and Neural Engine, loading the lightweight fallback model before the heavy model is completely flushed causes a temporary usage spike. The fix is to implement a strict state machine that completely unloads the primary model and confirms memory release before initializing the fallback, or to pre-allocate a fixed tensor buffer that both models reuse.
  common_mistake: |
    **The Pitfall:** Assuming the OOM is caused by a standard memory leak or suggesting reducing the fallback model's size further.
    **The Rationale:** Engineers overlook the asynchronous lifecycle of hardware-accelerated model deallocation.
    **The Consequence:** They miss the implications of the shared unified memory pool, resulting in application crashes during the critical moment of graceful degradation.
  napkin_math: |
    **Assumptions & Constraints:**
    - Total Unified Memory: 8.0 GB.
    - System Usage: OS + Camera Pipeline + UI = 5.5 GB.
    - Heavy Model: 1.8 GB.
    - Fallback Model: 0.9 GB.

    **Calculations:**
    - Available RAM: 8.0 GB - 5.5 GB = 2.5 GB.
    - Race Condition Overhead: 1.8 GB + 0.9 GB = 2.7 GB.
    - 2.7 GB > 2.5 GB threshold.

    **Conclusion & Interpretation:**
    - **Result: 0.2 GB Memory Deficit (Memory-Capacity-Bound)**. Peak unified memory constraints block naive hot-swapping maneuvers during degradation.
