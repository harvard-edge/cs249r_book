title: 'The Camera Preview Stutter: Real-Time Deadlines'
scenario: 'Your photo app runs a real-time beauty filter using an on-device segmentation model on the
  MediaTek Dimensity 9300 (all big-core design: 4× Cortex-X4 + 4× Cortex-A720). The model runs in 8 ms
  — well within the 33 ms budget for 30 FPS. But users report the camera preview stutters every 2-3 seconds,
  dropping to ~10 FPS momentarily. Your ML inference time is rock-solid at 8 ms. What''s causing the stutter?'
details:
  realistic_solution: 'GC stutter, not ML. Naive pipeline allocates 13.8 MB/frame (RGBA + RGB). At 30
    FPS: 414 MB/s garbage. GC triggers every 2-3s with 15-30ms pauses, exceeding the 25ms remaining budget.
    Fix: (1) pre-allocate a ring buffer of 3 ByteBuffers (zero-copy). (2) Use Camera2 ImageReader writing
    directly to pre-allocated Surface. (3) Pass hardware buffer handles directly to the ML delegate. Result:
    0 MB/s garbage, no GC pauses, stutter eliminated.'
  common_mistake: '"The model is too slow — optimize it further." The model is 8 ms, well within budget.
    The stutter isn''t from ML inference.'
  napkin_math: 'Per-frame allocation (naive): 1080×1920×4 (RGBA Bitmap) = 7.9 MB + 1080×1920×3 (RGB ByteBuffer)
    = 5.9 MB = 13.8 MB. At 30 FPS: 414 MB/sec garbage. GC pause: 15-30 ms every 2-3 sec. Frame budget:
    33 ms. ML inference: 8 ms. Available for GC: 33 - 8 = 25 ms. GC at 30 ms: exceeds budget → dropped
    frame. With zero-copy: 0 MB/sec garbage. GC pauses: none from camera pipeline. Stutter: eliminated.'
