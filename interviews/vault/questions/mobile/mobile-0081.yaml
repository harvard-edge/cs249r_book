title: 'The Camera Preview Stutter: Real-Time Deadlines'
scenario: Your photo app runs a real-time beauty filter using an on-device segmentation model on the MediaTek Dimensity 9300. The model runs in 8 ms — well within the 33 ms budget for 30 FPS. Users report the camera preview stutters every 2-3 seconds, dropping to ~10 FPS momentarily.
question: Why does a MediaTek Dimensity 9300 beauty filter stutter every 2-3s when inference is a stable 8ms?
details:
  realistic_solution: 'GC stutter, not ML. Naive pipeline allocates 13.8 MB/frame (RGBA + RGB). At 30 FPS: 414 MB/s garbage. GC triggers every 2-3s with 15-30ms pauses, exceeding the 25ms remaining budget. Fix: (1) pre-allocate a ring buffer of 3 ByteBuffers (zero-copy). (2) Use Camera2 ImageReader writing directly to pre-allocated Surface. (3) Pass hardware buffer handles directly to the ML delegate. Result: 0 MB/s garbage, no GC pauses, stutter eliminated.'
  common_mistake: |
    **The Pitfall:** Concluding that the model is too slow and trying to optimize it further.
    **The Rationale:** Engineers default to blaming the ML model for performance drops when the inference time is actually well within the budget.
    **The Consequence:** Effort is wasted on model compression while the actual system bottleneck (garbage collection) remains unfixed.
  napkin_math: |
    * Per-frame allocation (naive): 1080×1920×4 (RGBA) = 7.9 MB + 1080×1920×3 (RGB) = 5.9 MB. Total = 13.8 MB/frame.
    * At 30 FPS: 13.8 MB × 30 = 414 MB/sec of garbage.
    * Frame budget: 33 ms. ML inference: 8 ms. Available for GC: 25 ms.
    * GC pause takes 15-30 ms every 2-3 sec, frequently exceeding the 25 ms budget and dropping frames.
    * **With zero-copy (0 MB/sec garbage), GC pauses are eliminated, and stutter disappears.**
