title: Optimizing High-Frequency Sensor Ingestion on A17 Pro
scenario: You are building a real-time augmented reality sports analytics app that processes 120Hz 4K
  video frames alongside 1000Hz IMU sensor data. The processing pipeline targets the Apple A17 Pro. You
  notice that while the 16-core Neural Engine has plenty of compute headroom (35 TOPS), frame drops are
  occurring because CPU-bound IMU preprocessing is starving the GPU and NPU of unified memory bandwidth.
  You need to analyze the memory access patterns to quantify the bottleneck and propose a fix that keeps
  the app within the ~5W power envelope.
question: "How would you optimize high-frequency IMU ingestion on A17 Pro while video inference is running?"
details:
  realistic_solution: The solution is to decouple the high-frequency IMU ingestion from the heavy video
    processing frame rate. Instead of interrupting the CPU 1000 times a second, batch the IMU data into
    larger chunks (e.g., 100 samples every 100ms) using a low-power coprocessor or DMA, then process these
    batches. This reduces CPU wakeups, minimizes context switching overhead, and significantly reduces
    contention on the shared unified memory, freeing up bandwidth for the Neural Engine and GPU to process
    the 4K video.
  common_mistake: Candidates often suggest moving all processing to the Neural Engine without realizing
    it's an accelerator, not a general-purpose processor, or they fail to account for the shared 8 GB
    unified memory architecture where CPU, GPU, and NPU compete for the same memory bus.
  napkin_math: IMU data at 1000Hz (e.g., 6 DOF * 4 bytes = 24 bytes/sample) generates 24 KB/s. Unbatched,
    this causes 1000 CPU interrupts/sec, thrashing cache and consuming power. Batching every 16.6ms (to
    match 60Hz display) means ~17 samples per batch (408 bytes). This reduces interrupts by ~94% (from
    1000 to 60 per sec), drastically lowering power consumption towards the ~5W budget while keeping the
    shared 8GB unified memory bus free for the 4K frame buffer reads/writes required by the 35 TOPS NPU.
