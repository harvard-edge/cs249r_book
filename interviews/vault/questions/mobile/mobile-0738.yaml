title: The Semantic Router
scenario: "We need an on-device 'Router' model that listens to every user invocation and decides in <10ms whether the query can be handled entirely locally or if it requires handing off to Apple Intelligence in the cloud. The router must maintain semantic context of the last 5 interactions, fit strictly under 50MB RAM, and operate seamlessly with the Neural Engine."
question: "What router architecture meets <10 ms latency, 5-turn context, <50 MB RAM, and Neural Engine execution?"
details:
  realistic_solution: |
    Frame the routing not as generative text, but as an Intent Classification and Entity Extraction (NER) task. Use an extreme-quantized CNN-RNN hybrid or a distilled ALBERT-style architecture (~20M parameters). Context is NOT maintained by a KV cache; instead, we use a fixed-size running state vector (e.g., 512-dim) updated via a lightweight GRU/LSTM cell after each turn. The graph is compiled directly to CoreML, utilizing mixed-precision: INT4 weight-only quantization for the feed-forward layers and INT8 for the recurrent activations, fully hardware-accelerated by the ANE.
  common_mistake: |
    **The Pitfall:** Proposing a "small" LLM with KV caching.
    **The Rationale:** Even a 1-billion parameter model quantized to 2-bit takes ~250MB.
    **The Consequence:** Completely destroying the 50MB budget and forcing background apps to be evicted from memory.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model Size: ~20M parameters. Core weights in INT4 = 10MB.
    - Context State: 5 interactions * 512 float16 values = ~5KB.
    - Activations: 32 tokens * 256 hidden * 2 bytes = ~16KB.

    **Calculations:**
    - Total RAM Footprint: ~10.021MB (Well under 50MB).
    - Latency: 20M params * 32 tokens = ~1.2 GFLOPs. Fetching 10MB weights at ~50GB/s = 0.2ms. Compute overhead = ~0.1ms.

    **Conclusion & Interpretation:**
    - **Result: < 1ms routing latency (Memory-Capacity Bottleneck Avoided)**. End-to-end routing decision takes < 1ms, ensuring zero user-perceptible delay and staying strictly under the 50MB budget.
