title: The Semantic Router
scenario: We need an on-device 'Router' model that listens to every user invocation and decides in <10ms
  whether the query can be handled entirely locally (e.g., toggling a setting) or if it requires handing
  off to Apple Intelligence in the cloud. The router must maintain semantic context of the last 5 interactions,
  fit strictly under 50MB RAM, and operate seamlessly with the Neural Engine. How do you design the model
  architecture, context management, and extreme quantization strategy?
details:
  realistic_solution: 'Frame the routing not as generative text, but as an Intent Classification and Entity
    Extraction (NER) task. Use an extreme-quantized CNN-RNN hybrid or a distilled ALBERT-style architecture
    (~20M parameters). Context is NOT maintained by a KV cache; instead, we use a fixed-size running state
    vector (e.g., 512-dim) updated via a lightweight GRU/LSTM cell after each turn. The graph is compiled
    directly to CoreML, utilizing mixed-precision: INT4 weight-only quantization for the feed-forward
    layers and INT8 for the recurrent activations, fully hardware-accelerated by the ANE.'
  common_mistake: Proposing a "small" LLM (like TinyLlama or MobileLLM) with KV caching. Even a 1-billion
    parameter model quantized to 2-bit takes ~250MB, completely destroying the 50MB budget and forcing
    background apps to be evicted from memory.
  napkin_math: '- Model Size: 20M parameters. Core weights in INT4 = 10MB. | - Context State: 5 interactions
    * 512 float16 values = ~5KB (completely negligible). | - Activations: For a short sequence (seq_len=32):
    32 * 256 (hidden) * 2 bytes = ~16KB. | - Total RAM Footprint: ~10.1MB. | - Latency: 20M params per
    token. For 32 tokens = ~1.2 GFLOPs. With ANE memory bandwidth at ~50GB/s, fetching 10MB of weights
    takes 0.2ms. Compute overhead is ~0.1ms. Total end-to-end routing decision takes < 1ms, ensuring zero
    user-perceptible delay before OS execution or cloud handoff begins.'
