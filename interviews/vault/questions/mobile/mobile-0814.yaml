title: Mobile New 0014
scenario: A mobile network uses mixed-precision (INT8 for Conv, INT16 for complex activations). Performance
  degrades below that of an all-INT16 model. Execution trace shows hundreds of small memory allocation
  events between layers.
question: "Why can a mixed INT8/INT16 mobile network run slower than an all-INT16 model?"
details:
  realistic_solution: The symptom of performance degradation below the baseline is caused by the overhead
    of type casting and memory reallocation between operations. Because the layers alternate between INT8
    and INT16, the runtime inserts 'Cast' nodes. These nodes require reading the INT8 tensor, converting
    it to INT16, and writing it to a newly allocated buffer, saturating memory bandwidth.
  common_mistake: Ignoring the bandwidth and allocation cost of continuous type conversion nodes in mixed-precision
    networks.
  napkin_math: 'All-INT16 latency: 50ms. Mixed: Conv (INT8) takes 2ms instead of 3ms. But Cast (INT8->INT16)
    for 5MB tensor at 5GB/s memory BW takes 1ms. If there are 30 alternating layers, casting overhead
    adds 30ms. Total = 2ms*30 + 30ms = 90ms > 50ms.'
