title: Tensor G3 Memory Constraints for Scheduling
scenario: "You are designing an execution order optimization pass for a vision model deployed on an Android flagship. To effectively perform layer fusion and memory reuse in your operator scheduling, you must know the hardware limits."
question: "What is the total available system RAM on the Google Tensor G3, and what specific on-device LLM is this platform optimized to run concurrently?"
details:
  realistic_solution: |
    The Google Tensor G3 is equipped with 12 GB of shared LPDDR5X RAM and a TPU optimized explicitly to host the Gemini Nano LLM. Operator scheduling and buffer pre-allocation passes must respect this constrained envelope. After factoring in the OS (~4GB) and the resident Gemini Nano model (~2GB), the working memory budget for vision model activations is strictly capped at ~6GB to prevent OOM termination.
  common_mistake: |
    **The Pitfall:** Stating incorrect RAM size or model optimization target.
    **The Rationale:** Candidates often confuse the device with older base models (8 GB RAM), forget it uses shared LPDDR5X, or miss the Gemini Nano memory reservation.
    **The Consequence:** Designing scheduling passes that trigger OOM errors or sub-optimal performance due to incorrect resource assumptions.
  napkin_math: |
    **Assumptions & Constraints:**
    - Total Memory: 12 GB LPDDR5X.
    - OS/System reserve: ~4 GB.
    - Gemini Nano (Resident LLM) allocation: ~2 GB.

    **Calculations:**
    - Available memory: 12 GB - 4 GB (OS) - 2 GB (LLM) = 6 GB.

    **Conclusion & Interpretation:**
    - **Result: 6 GB available envelope (Memory-Capacity Bottleneck)**. Exceeding this limit will trigger Android's Low Memory Killer (LMK), exposing a hard memory-capacity bottleneck.
