title: Tensor G3 Memory Constraints for Scheduling
scenario: You are designing an execution order optimization pass for a vision model deployed on the Google Tensor G3. To effectively perform layer fusion and memory reuse in your operator scheduling, you must know the hardware limits.
question: What is the total available system RAM on the Google Tensor G3, and what specific on-device LLM is this platform optimized to run concurrently?
details:
  realistic_solution: |
    The candidate should recall that the Google Tensor G3 is equipped with 12 GB of LPDDR5X RAM and its TPU (capable of 7.5 TOPS) is explicitly optimized for on-device LLMs like Gemini Nano. Recalling this 12 GB limit is crucial for scheduling operators so peak memory does not trigger OOM errors.
  common_mistake: |
    **The Pitfall:** Stating incorrect RAM size or model optimization target.
    **The Rationale:** Candidates often confuse it with older base models (8 GB RAM), forget it's LPDDR5X, or miss the Gemini Nano optimization.
    **The Consequence:** Designing scheduling passes that trigger OOM errors or sub-optimal performance due to incorrect resource assumptions.
  napkin_math: |
    - **Total Memory:** 12 GB LPDDR5X.
    - **OS requirements:** ~4 GB.
    - **Resident Gemini Nano model:** ~2 GB.
    - **Remaining memory for vision model:** 12 GB - 4 GB - 2 GB.
    - **Result:** **6 GB working envelope for operator scheduling.**
