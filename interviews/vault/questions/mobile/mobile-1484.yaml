title: Tensor G3 Memory Constraints for Scheduling
scenario: You are designing an execution order optimization pass for a vision model
  deployed on the Google Tensor G3. To effectively perform layer fusion and memory
  reuse in your operator scheduling, you must know the hardware limits. What is the
  total available system RAM on the Google Tensor G3, and what specific on-device
  LLM is this platform optimized to run concurrently?
question: What is the total available system RAM on the Google Tensor G3, and what
  specific on-device LLM is this platform optimized to run concurrently?
details:
  realistic_solution: The candidate should recall that the Google Tensor G3 is equipped
    with 12 GB of LPDDR5X RAM and its TPU (capable of 7.5 TOPS) is explicitly optimized
    for on-device LLMs like Gemini Nano. Recalling this 12 GB limit is crucial for
    scheduling operators so peak memory does not trigger OOM errors.
  common_mistake: Candidates often state 8 GB RAM, confusing it with older base models,
    or forget that the memory type is LPDDR5X. They also frequently miss that the
    device's TPU is specifically tuned for Gemini Nano.
  napkin_math: Total Memory = 12 GB LPDDR5X. If the OS requires 4 GB and a resident
    Gemini Nano model reserves 2 GB, the remaining memory for the vision model's operator
    working set = 12 GB - 4 GB - 2 GB = 6 GB. With 7.5 TOPS compute throughput, parallel
    operations must be scheduled to fit strictly within this 6 GB envelope.
