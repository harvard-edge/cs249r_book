title: Quantization Bias Under Memory Contention
scenario: A facial verification model deployed on an NPU shows a 12% higher False Rejection Rate (FRR) for a minority demographic compared to the server FP32 model. The mobile INT8 model shares memory bandwidth with the camera ISP. To maintain real-time latency under this contention, the system falls back to static quantization ranges.
question: Why does falling back to static quantization disproportionately impact equalized odds for the minority demographic?
details:
  realistic_solution: Static quantization uses pre-calibrated ranges based on the majority distribution. Because the minority demographic has underrepresented outlier feature activations, the static range clips these crucial signals.
  common_mistake: |
    **The Pitfall:** Blaming raw INT8 precision loss instead of the calibration method.
    **The Rationale:** Candidates vaguely state that INT8 "loses accuracy" without connecting the hardware bottleneck to the shift from dynamic to static range clipping.
    **The Consequence:** Teams will abandon INT8 entirely—ruining latency—instead of fixing the static calibration dataset to properly represent minority outlier features.
  napkin_math: |
    1. Calculate available NPU bandwidth: 68 GB/s total - 60 GB/s ISP = 8 GB/s.
    2. Calculate dynamic stats latency: Loading 16 MB of weights + stats at 8 GB/s takes 2.0 ms (exceeds 1.5 ms budget).
    3. Analyze static clipping: Static ranges are calibrated on majority data (e.g., max value 8). Minority demographic outlier activations (e.g., magnitude 12) are truncated.
    4. Calculate information loss: 4 units clipped out of 12 = **33% activation signal truncated**.
