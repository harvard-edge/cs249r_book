title: Quantization Bias Under Memory Contention
scenario: A facial verification model deployed on a Samsung Exynos 2400 NPU shows
  a 12% higher False Rejection Rate (FRR) for a minority demographic compared to the
  server FP32 model. The mobile model runs in INT8 to utilize the dual-core NPU's
  34.7 TOPS. During inference, the camera's ISP heavily utilizes the shared 12 GB
  LPDDR5X memory. To maintain real-time latency under this contention, the system
  disables dynamic activation quantization and falls back to static ranges. Explain
  why this specific hardware-driven fallback disproportionately impacts the equalized
  odds for the minority demographic.
question: Why this specific hardware-driven fallback disproportionately impacts the
  equalized odds for the minority demographic?
details:
  realistic_solution: The shared memory architecture causes bandwidth contention during
    camera capture. To meet latency SLAs, the system drops dynamic quantization, which
    requires extra memory passes to calculate activation statistics. Static quantization
    uses pre-calibrated ranges based on the majority distribution. Because the minority
    demographic has underrepresented, out-of-distribution feature activations, the
    static range clips these crucial signals as outliers. This localized information
    loss disproportionately reduces the true positive rate for the minority group,
    worsening equalized odds.
  common_mistake: Candidates often generally state that INT8 loses precision, without
    explaining the mechanism of static vs. dynamic quantization. They fail to connect
    the hardware bottleneck (shared LPDDR5X bandwidth with the ISP) to the algorithmic
    fallback that clips the specific outlier activations needed for minority subgroup
    features.
  napkin_math: LPDDR5X peak bandwidth is ~68 GB/s. During verification, the ISP consumes
    ~60 GB/s for raw frame processing, leaving 8 GB/s for the NPU. The NPU at 34.7
    TOPS easily computes the 2 GOPs required in ~0.06 ms. However, loading 16 MB of
    INT8 weights + dynamic activation stats at 8 GB/s takes 2.0 ms. If the latency
    budget is 1.5 ms, dynamic stats must be skipped. With static ranges calibrated
    on a dataset where the minority is 5%, their distinct feature activations (e.g.,
    magnitude 12) exceed the static clipping threshold (e.g., max 8). This truncates
    33% of their activation signal, directly degrading their subgroup FRR.
