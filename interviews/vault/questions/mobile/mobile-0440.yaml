title: The Live Filter Battery Drain
scenario: You are optimizing a new 'Live Portrait' filter on an A17 Pro (35 TOPS, 51.2 GB/s). A specific 3x3 depthwise separable convolution processes a 256x256x128 feature map at INT8, performing ~151 M Ops and moving ~16.8 MB of data per inference, causing significant battery drain and thermal throttling.
question: Why is an A17 Pro live portrait layer with 151M INT8 ops and 16.8 MB traffic battery-heavy and thermally unstable?
details:
  realistic_solution: The layer is severely **memory-bound**. Its calculated arithmetic intensity is extremely low, meaning the number of computations performed per byte of data moved is tiny. The NPU's powerful compute cores spend most of their time idle, waiting for data to be fetched from the much slower LPDDR5 RAM. The high power consumption is not from doing math, but from the energy cost of constantly accessing main memory. The correct optimization strategy is to improve data locality, for example, by fusing this layer with its preceding or succeeding layer to keep intermediate tensors in the much faster on-chip cache, avoiding the round trip to DRAM.
  common_mistake: |
    **The Pitfall:** Assuming high power draw always indicates a compute bottleneck.
    **The Rationale:** Engineers see thermal throttling and incorrectly assume the NPU is running at 100% capacity computing math.
    **The Consequence:** They pursue model parameter reduction instead of realizing the energy is wasted on constant DRAM accesses while the compute units sit idle.
  napkin_math: |
    1. Arithmetic Intensity (AI): 151,000,000 Ops / 16,800,000 Bytes = ~9 Ops/Byte.
    2. Ridge Point (A17 Pro): 35 TOPS / 51.2 GB/s = ~683 Ops/Byte.
    3. Comparison: 9 Ops/Byte << 683 Ops/Byte (Severely Memory Bound).
    4. Memory Time: 16.8 MB / 51.2 GB/s = 0.33 ms.
    5. Compute Time: 151 MOps / 35 TOPS = 0.0043 ms.
    6. Conclusion: **The NPU compute units spend 98% of their time idle waiting for 0.33 ms DRAM fetches; fusing this layer avoids the round trip.**
  options:
  - The layer is compute-bound; its AI of ~9,000 Ops/Byte exceeds the device's ridge point, meaning the NPU is the bottleneck.
  - The layer is memory-bound; its AI of ~9 Ops/Byte is far below the device's ridge point of ~683 Ops/Byte, meaning the NPU is starving for data.
  - The bottleneck is the INT8 precision; the A17 Pro's NPU is more efficient with FP16, and switching would resolve the thermal issue.
  - The issue is weight-related cache misses; the 128-channel kernel is too large and is thrashing the L1/L2 cache during execution.
  correct_index: 1
