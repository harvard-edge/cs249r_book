title: Guardrail Latency on Tensor G3
scenario: An application on the Google Tensor G3 uses a 2.5 billion parameter INT8 guardrail model to classify inputs for safety. The system dynamically loads the guardrail model weights from RAM into the TPU for a single inference step. Telemetry reveals a strict latency floor of exactly 50ms before compute even begins.
question: "Why does a 2.5B INT8 Tensor G3 guardrail model have a 50 ms latency floor before compute starts?"
details:
  realistic_solution: The 50ms latency floor is caused by the time it takes to transfer the model weights from the LPDDR5X RAM to the TPU. In mobile ML deployment, memory bandwidth is often the primary bottleneck for large models, not the compute TOPS. Guardrails dynamically loaded into memory will incur this massive I/O penalty.
  common_mistake: |
    **The Pitfall:** Assuming the bottleneck is the TPU's compute capability (TOPS) and calculating FLOPs.
    **The Rationale:** Candidates see the model size and instantly jump to compute latency, forgetting that dynamically loading a model completely bounds execution by memory I/O.
    **The Consequence:** Optimization efforts are misdirected toward quantizing or pruning the model for compute rather than keeping the model persistent in memory or leveraging pre-fetching.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model size: 2.5B INT8 parameters = 2.5 GB
       - LPDDR5X Bandwidth: ~50 GB/s
       - Compute: 7.5 TOPS
    2. **Calculations:**
       - Memory load time = 2.5 GB / 50 GB/s = 0.05 seconds = 50 ms
       - Compute time = (2.5B * 2 * tokens) / 7.5 TOPS = negligible (< 5 ms)
    3. **Conclusion & Interpretation:**
       - **Result: I/O Bound. The dynamic loading strategy incurs a rigid 50 ms memory transfer penalty, proving that edge inference for dynamically loaded LLMs is bottlenecked by memory bandwidth, not compute.**
