title: Thermal Throttling in Shared NPU/ISP Pipelines
scenario: You are deploying a continuous camera processing pipeline on the Samsung Exynos 2400 NPU. The system uses the shared 12 GB LPDDR5X memory to pass high-resolution frames between the ISP and the dual-core NPU, which boasts a peak throughput of 34.7 TOPS. The mobile device has a strict continuous thermal dissipation limit of 4.0W for the SoC to prevent chassis overheating. The ISP and shared memory subsystem consume a constant 1.5W during this workload, and the NPU consumes 3.5W when operating at its peak 34.7 TOPS.
question: Why does peak Exynos 2400 NPU use throttle in a camera pipeline, and what sustained TOPS fit the remaining thermal headroom?
details:
  realistic_solution: Because the memory is shared across the CPU, GPU, ISP, and NPU, constant data movement from the camera sensor keeps the memory controller active, consuming 1.5W. This leaves only 2.5W of the 4.0W total thermal budget for the NPU. To avoid thermal throttling, the system governor must cap the NPU utilization to match the remaining thermal headroom, reducing the burst performance of 34.7 TOPS down to a lower sustained throughput.
  common_mistake: |
    **The Pitfall:** Assuming the NPU can utilize the entire SoC thermal budget.
    **The Rationale:** Engineers calculate sustained performance based only on the NPU's peak power.
    **The Consequence:** They fail to subtract the baseline power required for continuous camera data movement, resulting in unachievable TOPS targets and rapid thermal throttling.
  napkin_math: |
    - **Total SoC Thermal Budget:** 4.0W
    - **ISP & Memory Baseline:** 1.5W
    - **Available Power for NPU:** 4.0W - 1.5W = **2.5W**
    - **Max NPU Utilization:** 2.5W / 3.5W (Peak NPU Power) = **71.4%**
    - **Max Sustained NPU Performance:** 34.7 TOPS × 0.714 = **24.77 TOPS**
