title: NPU Translation Throughput
scenario: A real-time translation app on a mobile NPU uses an encoder-decoder model demanding 2.25 Tera-OPs per translated sentence. Sustained NPU utilization in real workloads is empirically 65% (limited by data movement and kernel-launch overhead, not pure compute).
question: Determine the realistic sustained throughput in sentences per second assuming the empirical 65% NPU utilization, and contrast against the 100%-utilization theoretical upper bound.
details:
  realistic_solution: 'Theoretical (100%): 45 TOPS / 2.25 TOPs/sentence = 20 sentences/s. Realistic (65%): 45 * 0.65 / 2.25 = 13 sentences/s. The 35% utilization gap is primarily kernel-launch overhead (~3-5 ms per attention block * dozens of blocks = significant fraction of per-sentence time) and DRAM stalls when activations spill out of NPU SRAM. Sizing the user-facing budget based on theoretical 20 will under-provision; sizing for 13 leaves room for thermal headroom.'
  common_mistake: |
    **The Pitfall:** Reporting only the theoretical 100% utilization number.
    **The Rationale:** Candidates miss that real workloads never hit peak TOPS due to data movement and kernel-launch overheads.
    **The Consequence:** The system is under-provisioned and overheats or lags when deployed to users.
  napkin_math: |
    **Assumptions & Constraints:**
    - Theoretical peak compute = 45 TOPS.
    - Compute required per sentence = 2.25 Tera-OPs.
    - Empirical sustained utilization = 65%.

    **Calculations:**
    - Theoretical upper bound = 45 TOPS / 2.25 TOPs/sentence = 20 sentences/s.
    - Realistic sustained compute = 45 TOPS * 0.65 = 29.25 TOPS.
    - Realistic throughput = 29.25 TOPS / 2.25 TOPs/sentence = 13 sentences/s.

    **Conclusion & Interpretation:**
    - **Result: 13 sentences/s (Utilization-bound scaling)**. Sizing for this throughput instead of 20 ensures real-world viability and thermal headroom.
