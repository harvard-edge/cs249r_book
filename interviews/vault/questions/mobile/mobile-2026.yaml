title: NPU Translation Throughput
scenario: A real-time translation app on a Snapdragon 8 Gen 3 NPU (45 TOPS peak) uses
  an encoder-decoder model demanding 2.25 Tera-OPs per translated sentence. Sustained
  NPU utilization in real workloads is empirically 65% (limited by data movement and
  kernel-launch overhead, not pure compute).
question: Determine the realistic sustained throughput in sentences per second assuming
  the empirical 65% NPU utilization, and contrast against the 100%-utilization theoretical
  upper bound.
details:
  realistic_solution: 'Theoretical (100%): 45 TOPS / 2.25 TOPs/sentence = 20 sentences/s.
    Realistic (65%): 45 * 0.65 / 2.25 = 13 sentences/s. The 35% utilization gap is
    primarily kernel-launch overhead (~3-5 ms per attention block * dozens of blocks
    = significant fraction of per-sentence time) and DRAM stalls when activations
    spill out of NPU SRAM. Sizing the user-facing budget based on theoretical 20 will
    under-provision; sizing for 13 leaves room for thermal headroom.'
  common_mistake: Reporting only the theoretical 100%-util number and missing that
    real workloads run at 60-70% utilization due to data movement and kernel overheads.
  napkin_math: 'Theoretical: 45 / 2.25 = 20 sentences/s. Realistic 65%: 45*0.65/2.25
    = 13 sentences/s.'
