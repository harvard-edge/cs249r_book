title: NPU Translation Throughput
scenario: A real-time translation app on a Snapdragon 8 Gen 3 NPU (45 TOPS) uses an
  encoder-decoder model demanding 2.25 Tera-OPs per translated sentence.
question: Determine the maximum theoretical throughput in sentences per second assuming
  100% NPU utilization.
details:
  realistic_solution: We divide the hardware capability by the cost per operation.
    The NPU provides 45 TOPS. Each sentence costs 2.25 TOPs. Maximum throughput is
    45 / 2.25 = 20 sentences per second.
  common_mistake: Failing to normalize Giga/Tera units before dividing, resulting
    in answers off by factors of 1000.
  napkin_math: 45 / 2.25 = 20 sentences/sec
