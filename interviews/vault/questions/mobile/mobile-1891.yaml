title: A17 OS Termination Grace
scenario: An Apple A17 performs personalized on-device training. If the user minimizes
  the app, the OS grants a 1.5-second termination grace period. The model state is
  300 MB across ~200 tensors (weights + optimizer state). A naive bandwidth-only sizing
  (the reference figure) treats this as 300 MB / 4 GB/s UFS = 75 ms - which is what
  most engineers report on the first pass. The realistic checkpoint path also pays
  per-tensor serialisation (pickling + endian fix-ups + 4 MB chunking) at 8 ms per
  tensor on a single performance core, contends for UFS with a concurrent media-cache
  flush consuming ~1.5 GB/s, and must enqueue the writes through the OS's async I/O
  layer.
question: Starting from the figure's 75 ms naive estimate, design the realistic checkpoint
  budget by adding (a) the CPU serialisation tax across ~200 tensors, (b) UFS contention
  with the concurrent media-cache flush, and (c) the overlap between CPU serialisation
  and storage I/O. Identify the binding stage, propose a parallelisation strategy
  across the A17's performance cores, and confirm whether the 1.5 s grace window holds.
visual:
  kind: svg
  path: mobile-1891.svg
  alt: Gantt showing 75ms save fitting easily within 1500ms grace period.
  caption: State Save vs Grace Period.
details:
  realistic_solution: 'CPU serialization: 200 tensors * 8 ms = 1.6 s on a single perf
    core - already exceeds the 1.5 s budget. UFS contention: 4000 - 1500 = 2500 MB/s
    available, write time = 300/2500 = 120 ms. So the binding stage is CPU serialization,
    NOT storage. The fix is to (a) parallelize serialization across 4 perf cores (1.6
    s / 4 = 400 ms), (b) overlap with writes via async I/O. With both, total time
    ~= max(400 ms, 120 ms) = 400 ms, well inside the 1.5 s grace period.'
  common_mistake: Looking only at raw UFS bandwidth and concluding 75 ms is fine,
    missing the CPU-side serialization tax that scales with tensor count, and missing
    UFS contention from the concurrent media-cache flush.
  napkin_math: 'Serial CPU: 200 * 8 ms = 1600 ms (BLOCKED). Parallel 4-core: 400 ms.
    UFS write under contention: 300 MB / 2500 MB/s = 120 ms. Total (overlapped, parallel):
    400 ms < 1500 ms.'
