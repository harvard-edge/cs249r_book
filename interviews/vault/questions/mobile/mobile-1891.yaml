title: A17 OS Termination Grace
scenario: An Apple A17 performs personalized on-device training. If the user minimizes
  the app, the OS grants a 1.5-second termination grace period. The model state is
  300 MB across ~200 tensors (weights + optimizer state). Tensor serialization (pickling
  + endian fix-ups + chunking into 4 MB blocks) on a single perf core takes 8 ms
  per tensor, and the writes compete with a concurrent media-cache flush also writing
  to UFS 4.0 at 1.5 GB/s.
question: Analyze whether the 300 MB checkpoint can land within the 1.5 s grace
  period given (a) per-tensor serialization cost, (b) UFS contention with the media-cache
  flush, and (c) the overlap (or non-overlap) of CPU serialization and storage I/O.
  Identify the binding stage.
visual:
  kind: svg
  path: mobile-1891.svg
  alt: Gantt showing 75ms save fitting easily within 1500ms grace period.
  caption: State Save vs Grace Period.
details:
  realistic_solution: 'CPU serialization: 200 tensors * 8 ms = 1.6 s on a single perf
    core - already exceeds the 1.5 s budget. UFS contention: 4000 - 1500 = 2500 MB/s
    available, write time = 300/2500 = 120 ms. So the binding stage is CPU serialization,
    NOT storage. The fix is to (a) parallelize serialization across 4 perf cores
    (1.6 s / 4 = 400 ms), (b) overlap with writes via async I/O. With both, total
    time ~= max(400 ms, 120 ms) = 400 ms, well inside the 1.5 s grace period.'
  common_mistake: Looking only at raw UFS bandwidth and concluding 75 ms is fine,
    missing the CPU-side serialization tax that scales with tensor count, and missing
    UFS contention from the concurrent media-cache flush.
  napkin_math: 'Serial CPU: 200 * 8 ms = 1600 ms (BLOCKED). Parallel 4-core: 400
    ms. UFS write under contention: 300 MB / 2500 MB/s = 120 ms. Total (overlapped,
    parallel): 400 ms < 1500 ms.'
