title: A17 OS Termination Grace
scenario: An Apple A17 performs personalized on-device training. If the user minimizes
  the app, the OS grants a 1.5-second termination grace period. The model state is
  300 MB.
question: Analyze the storage bottleneck and determine if the state can be saved before
  termination using a UFS 4.0 storage drive capable of 4 GB/s writes.
visual:
  kind: svg
  path: mobile-1891.svg
  alt: Gantt showing 75ms save fitting easily within 1500ms grace period.
  caption: State Save vs Grace Period.
details:
  realistic_solution: The UFS 4.0 drive writes at 4 GB/s ($4000$ MB/s). Saving 300
    MB takes $300 / 4000 = 0.075$ seconds (75 ms). The 1.5-second grace period is
    overwhelmingly sufficient. However, if the CPU must serialize the tensors before
    writing, the CPU compute speed may become the actual bottleneck.
  common_mistake: Assuming flash storage speeds on mobile are too slow for large checkpointing
    without actually checking the UFS 4.0 specs.
  napkin_math: 300 MB / 4000 MB/s = 0.075s. 0.075s << 1.5s.
