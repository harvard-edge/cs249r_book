title: Mobile Federated Parallelism Spec
scenario: A mobile training service wants to increase clients per round from 20,000 to 100,000. Specify the scaling requirements before increasing parallelism.
question: What must be specified before scaling a mobile FL round from 20,000 to 100,000 selected clients?
details:
  realistic_solution: Specify aggregation bandwidth, secure aggregation fan-in, dropout tolerance, eligibility rules, client update size, privacy accounting, server validation throughput, and straggler deadline. More clients can improve coverage but can overload aggregation and privacy budgets.
  common_mistake: Assuming more parallel clients always improves training without checking aggregation and dropout costs.
  napkin_math: If updates are 1 MB, 100,000 clients produce 100 GB per round before secure-aggregation overhead.
