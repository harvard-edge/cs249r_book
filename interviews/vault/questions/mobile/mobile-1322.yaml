title: FP16 Memory and Compute on A17 Pro
scenario: You are deploying a 1.5 billion parameter generative model for on-device inference using the Apple A17 Pro Neural Engine. With the OS and background processes consuming 4.5 GB of memory, evaluate whether the model weights can fit in memory using FP16 precision. Assume a single inference step requires 140 billion operations (140 GOPs).
question: Do FP16 weights for a 1.5B A17 Pro model fit in memory, and what is the compute-bound step throughput?
details:
  realistic_solution: 'First, determine the remaining available memory from the 8 GB shared pool. Calculate the footprint of the FP16 weights to confirm it fits within the available space. Then, divide the peak compute capacity (35 TOPS) by the operations required per step to find the theoretical compute-bound throughput.'
  common_mistake: |
    **The Pitfall:** Forgetting FP16 bytes sizing or ignoring OS memory overhead.
    **The Rationale:** Candidates miscalculate parameter memory size or treat the 8GB unified memory as exclusively available for the ML model.
    **The Consequence:** Deploying a model that immediately triggers an out-of-memory kill by the OS, or incorrectly calculating hardware throughput due to a TOPS to GOPs conversion error.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Total Memory: 8.0 GiB.
       - OS/System Memory: 4.5 GiB.
       - Model: 1.5B parameters, FP16 (2 bytes/param).
       - Peak Compute: 35 TOPS (35e12 ops/s).
       - Operations per step: 140 GOPs (140e9 ops).
    2. **Calculations:**
       - Available Memory: 8.0 - 4.5 = 3.5 GiB.
       - FP16 Model Footprint: 1.5B parameters * 2 bytes = 3.0 GiB.
       - Memory Check: 3.0 GiB < 3.5 GiB (Fits).
       - Throughput: 35e12 / 140e9 = 250 steps/sec.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound. Theoretical Throughput is 250 steps/sec, and the model fits in memory.**
