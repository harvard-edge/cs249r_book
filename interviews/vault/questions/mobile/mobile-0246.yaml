title: The Battery Cost of Privacy
scenario: You're scoping a new federated learning feature for a voice assistant in a car's companion mobile app. The product manager is concerned that running background training will drain users' batteries and lead to uninstalls.
question: What is the approximate power consumption of a modern smartphone's System-on-a-Chip (SoC) when it's actively running an ML workload?
details:
  realistic_solution: A modern smartphone SoC, like an Apple A17 Pro or Snapdragon 8 Gen 3, consumes approximately 3 to 5 Watts during an active, sustained ML task. This is the fundamental 'power cost' that must be used to calculate the energy drain (in watt-hours) for the feature and weigh it against user experience budgets.
  common_mistake: |
    **The Pitfall:** Misjudging the power scale of mobile SoCs by orders of magnitude.
    **The Rationale:** Conflating smartphone SoCs with either tiny microcontrollers (milliwatts) or desktop GPUs (hundreds of watts).
    **The Consequence:** Completely invalidating any economic or user experience analysis for mobile machine learning workloads.
  napkin_math: |
    1. **Assumptions & Constraints:** Standard modern smartphone SoC (e.g., A17 Pro, Snapdragon 8 Gen 3).
    2. **Calculations:**
       - A modern mobile SoC under active ML load consumes ~3W - 5W continuously.
    3. **Conclusion & Interpretation:** **The foundational budget for sustained background tasks is 3-5 Watts. Result: Power-Bound.**
  options:
  - ~50 milliwatts
  - ~30 Watts
  - ~3–5 Watts
  - ~700 Watts
  correct_index: 2
