title: The Data Starvation NPU
scenario: Your new object detection model is running on a high-end Android phone's NPU. The NPU spec sheet boasts 10 TOPS (INT8), yet your model's actual performance is only 2 TOPS equivalent, with a significant portion of the NPU staying idle.
question: Why does a 10 TOPS Android NPU deliver only 2 TOPS on the detector, and how would you confirm memory bandwidth starvation?
details:
  realistic_solution: The most likely bottleneck is **memory bandwidth**. The NPU can perform calculations very quickly, but it's starved for data because the memory subsystem (DRAM) cannot feed it fast enough. This often happens with models that have a low "compute intensity" (FLOPs per byte of data accessed) or those with large intermediate tensors that frequently need to be moved between memory and the NPU. The NPU spends significant cycles waiting for data to be fetched from DRAM.
  common_mistake: |
    **The Pitfall:** Blaming NPU drivers or thermal throttling for low utilization.
    **The Rationale:** Engineers assume the compute units are fully fed and failing to execute efficiently.
    **The Consequence:** Optimization efforts focus on the wrong part of the stack, missing the fundamental limitation of data movement from DRAM.
  napkin_math: |
    - **Peak NPU Compute:** 10 TOPS (INT8).
    - **Peak Data Demand (Low AI):** If 1 INT8 operation requires 0.5 bytes in and 0.5 bytes out (1 byte total), sustaining peak requires **10 TB/s** of memory bandwidth.
    - **Available Bandwidth:** A typical LPDDR5 mobile memory controller offers **~50 GB/s**.
    - **Actual Performance:** If the model has an arithmetic intensity of 100 Ops/Byte and utilizes 20 GB/s effective bandwidth:
    - 20 GB/s × 100 Ops/Byte = 2,000 GOPS = **2 TOPS**.
