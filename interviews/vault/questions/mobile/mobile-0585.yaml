title: The Data Starvation NPU
scenario: Your new object detection model is running on a high-end Android phone's NPU. The NPU spec sheet boasts 10 TOPS (INT8), yet your model's actual performance is only 2 TOPS equivalent.
question: Why does a 10 TOPS Android NPU deliver only 2 TOPS on the detector, and how would you confirm memory bandwidth starvation?
details:
  realistic_solution: The system is fundamentally crippled by a severe memory bandwidth bottleneck. The NPU tensor cores process math extremely fast but are completely starved for data because the DRAM controller cannot fetch bytes rapidly enough. This plagues models exhibiting low "compute intensity" (FLOPs per byte). The NPU wastes massive cycle counts sitting completely idle waiting on the bus. Optimization must shift away from math compression toward aggressive operator fusion to eliminate DRAM round-trips.
  common_mistake: |
    **The Pitfall:** Automatically blaming bad NPU software drivers or catastrophic thermal throttling for the pathetic utilization metrics.
    **The Rationale:** Engineers assume the compute units are inherently busy but executing inefficiently, totally missing the data-feed dynamics of the SoC.
    **The Consequence:** Wasting cycles attempting to optimize the model's compute kernels, entirely missing the structural DRAM limitation and yielding zero latency improvements.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - NPU Peak Compute: 10 TOPS.
       - Available LPDDR5 Bandwidth: ~50 GB/s (effective ~20 GB/s due to contention).
       - Model Arithmetic Intensity (AI): 100 Ops/Byte.
    2. **Calculations:**
       - Sustaining 10 TOPS at 100 Ops/Byte requires: 10 TOPS / 100 Ops/Byte = 100 GB/s bandwidth.
       - Actual throughput based on true bandwidth: 20 GB/s * 100 Ops/Byte = 2000 GOPS = 2 TOPS.
    3. **Conclusion & Interpretation:**
       - **Result: Memory Bandwidth-Bound.** The model is mathematically data-starved. 80% of the NPU's compute units sit completely idle waiting for DRAM.
