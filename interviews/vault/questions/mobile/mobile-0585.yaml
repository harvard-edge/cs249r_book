title: The Data Starvation NPU
scenario: Your new object detection model is running on a high-end Android phone's NPU. The NPU spec sheet
  boasts 10 TOPS (INT8), yet your model's actual performance is only 2 TOPS equivalent, with a significant
  portion of the NPU staying idle. What's the most likely bottleneck, and how would you diagnose it?
question: "Why does a 10 TOPS Android NPU deliver only 2 TOPS on the detector, and how would you confirm memory bandwidth starvation?"
details:
  realistic_solution: The most likely bottleneck is **memory bandwidth**. The NPU can perform calculations
    very quickly, but it's starved for data because the memory subsystem (DRAM) cannot feed it fast enough.
    This often happens with models that have a low "compute intensity" (FLOPs per byte of data accessed)
    or those with large intermediate tensors that frequently need to be moved between memory and the NPU.
    The NPU spends significant cycles waiting for data to be fetched from DRAM.
  common_mistake: '"The NPU drivers are buggy," or "It''s thermal throttling." While these are possibilities,
    the NPU being largely idle points to a different fundamental limitation.'
  napkin_math: A 10 TOPS (INT8) NPU processes 10 * 10^12 operations/second. If each INT8 operation requires,
    on average, 0.5 bytes of input and 0.5 bytes of output (a simplified model for low compute-bound operations),
    that's roughly 10 TB/s of data movement required to sustain peak. A typical LPDDR5 mobile memory controller
    offers ~50 GB/s peak bandwidth. If the model's actual data movement requirement exceeds this, or if
    the effective bandwidth is lower due to contention or access patterns, the NPU will be starved. For
    example, if a model operates with an arithmetic intensity of 100 Ops/Byte and utilizes 20 GB/s of
    effective memory bandwidth, the performance will be hard-limited to 2 TOPS (20 GB/s * 100 Ops/Byte
    = 2,000 GOPS = 2 TOPS).
