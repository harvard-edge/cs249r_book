title: On-Device Active Learning Compute for Curation
scenario: You are designing an on-device active learning pipeline to curate training data on a smartphone. To preserve privacy, you use the device's TPU to run a 1.5-billion-parameter on-device LLM that calculates uncertainty scores for user messages, selecting the top percentile to upload for server-side human annotation. A user receives 50,000 messages per day, with an average length of 50 tokens each.
question: Calculate the total daily compute time in seconds required on the 7.5 TOPS TPU to score and curate this dataset.
details:
  realistic_solution: |
    The correct approach calculates the total computational operations for the dataset and divides it by the TPU's compute throughput. Given the task runs offline in the background, 1,000 seconds (approx 16.6 minutes) of compute distributed over 24 hours is a highly practical workflow for on-device data selection without degrading user experience.
  common_mistake: |
    **The Pitfall:** Throttling calculations based on memory capacity instead of compute throughput.
    **The Rationale:** Candidates forget the standard transformer forward pass arithmetic (2 * parameters * tokens) or mistakenly assume active learning batch processing is strictly memory-capacity bound.
    **The Consequence:** The system is over-provisioned or the data pipeline is designed with unnecessary cloud fallbacks due to flawed compute estimates.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Messages: 50,000 per day at 50 tokens each.
       - Model: 1.5B parameters.
       - TPU Compute: 7.5 TOPS.
    2. **Calculations:**
       - Total tokens per day = 50,000 messages * 50 tokens/message = 2,500,000 tokens.
       - Compute per token (forward pass) = 2 * 1.5 billion parameters = 3 GigaOPs.
       - Total daily compute = 2,500,000 tokens * 3 GigaOPs = 7,500 TeraOPs.
       - Compute time = 7,500 TeraOPs / 7.5 TOPS = 1,000 seconds.
    3. **Conclusion & Interpretation:**
       - **Total compute time is 1,000 seconds per day. Bottleneck: Compute-Bound.**
