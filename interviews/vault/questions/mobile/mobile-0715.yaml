title: The Granular Precision Architect
scenario: You are deploying a cutting-edge generative AI model on a mobile SoC. Achieving near FP32 accuracy is critical, but the model is too large and slow for FP16 inference, and a naive INT8 quantization causes unacceptable accuracy degradation. Different parts of the SoC support different precisions.
question: How would you design a hardware-aware mixed-precision quantization strategy for a mobile generative model?
details:
  realistic_solution: "This requires a highly systematic and hardware-aware approach to mixed-precision quantization, often involving automated tools and iterative refinement.\n  1.  **Layer-wise Sensitivity Analysis:**\n      *   **Error Metric:** Define a robust accuracy metric relevant to the model's task (e.g., perplexity for LLMs, FID/CLIP score for diffusion).\n      *   **Quantization Simulation:** Systematically quantize individual layers (or groups of layers) to different bit-widths (FP16, INT8, INT4) and measure the accuracy degradation. Identify \"sensitive\" layers that cause significant accuracy drops when quantized aggressively.\n      *   **Hessian-aware/Activation Distribution Analysis:** More advanced techniques analyze the Hessian matrix or activation distributions to identify layers whose outputs are highly sensitive to quantization noise or have outlier distributions, making them candidates for higher precision.\n  2.  **Hardware Capability Mapping:**\n      *   **Op-to-Hardware Mapping:** Understand which operations (e.g., MatMul, Conv, Attention) are accelerated by which precision on specific compute units (e.g., NPU might have fast INT8/INT4 MatMul, GPU might be best for FP16 convolutions, CPU for sparse ops or custom layers).\n      *   **Performance/Power Profiles:** For each layer, profile its latency and power consumption at different precisions on the available hardware (INT4, INT8, FP16, FP32).\n  3.  **Optimization Objective & Search:**\n      *   **Constrained Optimization:** Formulate the problem as an optimization: minimize latency/memory subject to an accuracy constraint (e.g., <1% drop from FP32).\n      *   **Greedy/Evolutionary Search:** Start with an all-INT4/INT8 model and iteratively \"promote\" layers to higher precision (e.g., INT8 -> FP16) based on sensitivity, until the accuracy target is met. Alternatively, use evolutionary algorithms or reinforcement learning to search the vast space of mixed-precision configurations.\n      *   **Pareto Front:** Aim to find configurations on the Pareto front of the accuracy-latency-memory trade-off.\n  4.  **Runtime Support & Compiler Integration:**\n      *   **Mixed-Precision Graph Representation:** The inference runtime (e.g., TFLite, ONNX Runtime) must support a graph where different nodes have different data types.\n      *   **Compiler Optimization:** The ML compiler (e.g., XLA, TVM, vendor-specific NPU compilers) must be able to generate efficient code for heterogeneous execution and precision conversion between layers. This includes inserting `quantize`/`dequantize` operations and ensuring optimal data transfer.\n      *   **Custom Operations:** For highly specialized layers, custom kernels might be needed to leverage INT4 or specific hardware features not covered by standard operators.\n  5.  **Quantization-Aware Training (QAT):** For critical layers or when PTQ is insufficient, use QAT. This involves simulating quantization during training to make the model more robust to precision reduction, potentially allowing more aggressive quantization."
  common_mistake: |
    **The Pitfall:** Blindly applying INT8 everywhere and then reverting to FP16 only when errors occur.
    **The Rationale:** Candidates take a reactive approach rather than using automated layer-wise sensitivity analysis (like Hessian-aware profiles) matched against hardware capabilities.
    **The Consequence:** Suboptimal performance and power consumption, as operations are mapped to the wrong compute units or retain higher precision than mathematically necessary.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model: 7B params (32 layers, hidden size 4096). FP16 precision.
       - KV Cache Memory: 2 bytes per element. Context size affects cache.
       - Speculative decoding draft model: 0.5B (250MB).
    2. **Calculations:**
       - KV per layer: 2 * 2048 (seq_len) * 4096 * 2 bytes = 33.6 MB. Total for 32 layers = 1,075 MB.
       - Memory at 4K context: 2.15 GB KV cache. Total RAM (INT4 weights 3.5GB + 2.15GB KV) = 5.65 GB (triggers OOM jetsam limit on iPhone).
       - Speculative Throughput: 8 tokens in 4ms, verified in 25ms = 29ms total.
    3. **Conclusion & Interpretation:** Effective throughput becomes 5.6 accepted tokens / 29ms = **193 tokens/s**, solving the **Memory-Capacity Bound** limitation via draft models and aggressive profiling.
