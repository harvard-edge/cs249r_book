title: The Granular Precision Architect
scenario: You are tasked with deploying a cutting-edge generative AI model (e.g., a small diffusion model
  or a compact LLM variant) on a mobile SoC. Achieving near FP32 accuracy is critical, but the model is
  too large and slow for FP16 inference, and a naive INT8 quantization causes unacceptable accuracy degradation.
  Some parts of the SoC support INT4, others INT8, and some only FP16/FP32. How would you design a **mixed-precision
  quantization strategy** to optimize for this complex trade-off between accuracy, latency, and memory
  footprint, leveraging the heterogeneous capabilities of the SoC?
question: "How would you design a hardware-aware mixed-precision quantization strategy for a mobile generative model?"
details:
  realistic_solution: "This requires a highly systematic and hardware-aware approach to mixed-precision\
    \ quantization, often involving automated tools and iterative refinement.\n  1.  **Layer-wise Sensitivity\
    \ Analysis:**\n      *   **Error Metric:** Define a robust accuracy metric relevant to the model's\
    \ task (e.g., perplexity for LLMs, FID/CLIP score for diffusion).\n      *   **Quantization Simulation:**\
    \ Systematically quantize individual layers (or groups of layers) to different bit-widths (FP16, INT8,\
    \ INT4) and measure the accuracy degradation. Identify \"sensitive\" layers that cause significant\
    \ accuracy drops when quantized aggressively.\n      *   **Hessian-aware/Activation Distribution Analysis:**\
    \ More advanced techniques analyze the Hessian matrix or activation distributions to identify layers\
    \ whose outputs are highly sensitive to quantization noise or have outlier distributions, making them\
    \ candidates for higher precision.\n  2.  **Hardware Capability Mapping:**\n      *   **Op-to-Hardware\
    \ Mapping:** Understand which operations (e.g., MatMul, Conv, Attention) are accelerated by which\
    \ precision on specific compute units (e.g., NPU might have fast INT8/INT4 MatMul, GPU might be best\
    \ for FP16 convolutions, CPU for sparse ops or custom layers).\n      *   **Performance/Power Profiles:**\
    \ For each layer, profile its latency and power consumption at different precisions on the available\
    \ hardware (INT4, INT8, FP16, FP32).\n  3.  **Optimization Objective & Search:**\n      *   **Constrained\
    \ Optimization:** Formulate the problem as an optimization: minimize latency/memory subject to an\
    \ accuracy constraint (e.g., <1% drop from FP32).\n      *   **Greedy/Evolutionary Search:** Start\
    \ with an all-INT4/INT8 model and iteratively \"promote\" layers to higher precision (e.g., INT8 ->\
    \ FP16) based on sensitivity, until the accuracy target is met. Alternatively, use evolutionary algorithms\
    \ or reinforcement learning to search the vast space of mixed-precision configurations.\n      * \
    \  **Pareto Front:** Aim to find configurations on the Pareto front of the accuracy-latency-memory\
    \ trade-off.\n  4.  **Runtime Support & Compiler Integration:**\n      *   **Mixed-Precision Graph\
    \ Representation:** The inference runtime (e.g., TFLite, ONNX Runtime) must support a graph where\
    \ different nodes have different data types.\n      *   **Compiler Optimization:** The ML compiler\
    \ (e.g., XLA, TVM, vendor-specific NPU compilers) must be able to generate efficient code for heterogeneous\
    \ execution and precision conversion between layers. This includes inserting `quantize`/`dequantize`\
    \ operations and ensuring optimal data transfer.\n      *   **Custom Operations:** For highly specialized\
    \ layers, custom kernels might be needed to leverage INT4 or specific hardware features not covered\
    \ by standard operators.\n  5.  **Quantization-Aware Training (QAT):** For critical layers or when\
    \ PTQ is insufficient, use QAT. This involves simulating quantization during training to make the\
    \ model more robust to precision reduction, potentially allowing more aggressive quantization."
  common_mistake: '"Apply INT8 everywhere, then fallback to FP16 for problematic layers." This is a reactive
    approach. A L6+ candidate should propose a proactive, systematic, and hardware-aware strategy.'
  napkin_math: 'Token generation: 30 tokens/s target = 33 ms/token budget. KV-cache per layer: 2 * seq_len
    * d_model * dtype_bytes. For 7B model (32 layers, d=4096, FP16): KV per layer = 2 * 2048 * 4096 *
    2 = 33.6 MB. Total 32 layers = 1,075 MB. At 4096 context: 2,150 MB KV-cache alone. iPhone 16 Pro available
    RAM: ~5 GB. Weights (INT4) = 3.5 GB. KV at 2K context = 1.1 GB. Total = 4.6 GB (fits). KV at 4K =
    2.15 GB. Total = 5.65 GB (jetsam). Speculative decoding: draft model (0.5B, INT4) = 250 MB. Generates
    8 candidate tokens in 4 ms. Verification of 8 tokens in parallel = 1 batch forward pass = 25 ms. Acceptance
    rate ~70% = 5.6 tokens verified per step. Effective throughput: 5.6 tokens / 29 ms = 193 tokens/s
    (6.4x over 30 tokens/s baseline). Memory overhead: +250 MB draft model + 8-token KV = ~260 MB.'
