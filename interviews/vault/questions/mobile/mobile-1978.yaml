title: Hexagon NPU TCM Spilling Impact
scenario: A convolutional layer on a Snapdragon 8 Gen 3 Hexagon NPU exceeds the capacity
  of the Tightly Coupled Memory (TCM), forcing the runtime to spill activations to
  the LPDDR5x RAM.
question: Evaluate the performance impact of missing the NPU's TCM and spilling memory
  traffic to main memory.
visual:
  kind: svg
  path: mobile-1978.svg
  alt: Bar chart displaying a massive latency spike when missing TCM and hitting LPDDR5x.
  caption: 'Access Latency: TCM vs LPDDR5x Spilling.'
details:
  realistic_solution: TCM provides deterministic, sub-nanosecond access latency with
    immense internal bandwidth necessary to feed the MAC arrays. Spilling to LPDDR5x
    introduces significant latency (50-100ns) and restricts bandwidth to under 100
    GB/s. This drastically lowers the arithmetic intensity, starving the tensor units
    and bottlenecking inference on memory I/O.
  common_mistake: Thinking LPDDR5x is fast enough to seamlessly hide the cache miss,
    neglecting the strict determinism requirements of hardware MAC arrays.
  napkin_math: Latency jumps from ~1ns (TCM) to ~100ns (LPDDR5x), a 100x penalty.
