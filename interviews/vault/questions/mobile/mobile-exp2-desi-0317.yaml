title: Architecting Federated PEFT for LLMs on Tensor G3
scenario: Design a cross-device federated learning system to personalize an on-device LLM (like Gemini
  Nano) for predictive text formatting. Your deployment target is a fleet of devices exclusively powered
  by the Google Tensor G3. The design must accommodate the constraints of the 12 GB LPDDR5X memory, utilize
  the TPU's 7.5 TOPS for on-device compute, and handle the extreme non-IID challenges of highly customized
  user typing patterns over intermittent network connections.
question: "How would you design a cross-device federated learning system to personalize an on-device LLM (like Gemini Nano) for predictive text formatting?"
details:
  realistic_solution: A robust architecture mandates Parameter-Efficient Fine-Tuning (PEFT) like LoRA
    or QLoRA, offloading the heavy matrix multiplications to the on-device TPU to maximize the 7.5 TOPS
    throughput. To combat non-IID text data, the system should employ FedProx or Scaffold to regularize
    local drift, and only schedule communication rounds when the phone is idle, charging, and connected
    to unmetered Wi-Fi to preserve user battery and data plans.
  common_mistake: Candidates often propose standard Federated Averaging with full-model fine-tuning, entirely
    ignoring the extreme memory pressure of 16-bit weight updates on mobile RAM and the resulting multi-gigabyte
    communication overhead. Additionally, they often neglect to utilize the specialized TPU hardware,
    instead defaulting to generic CPU-bound gradient descent.
  napkin_math: A 1.8B parameter Gemini Nano at 8-bit precision consumes ~1.8 GB of the 12 GB LPDDR5X.
    A full-parameter Adam optimizer would require an impossible 14.4 GB (8 bytes per param). By designing
    the system to use rank-8 LoRA, the trainable parameters drop to ~5 million, reducing the optimizer
    state to a negligible ~40 MB. Utilizing the TPU's 7.5 TOPS, processing a mini-batch of 4 sequences
    of 512 tokens requires ~40 Giga-FLOPs, completing a forward and backward pass in under 10 milliseconds,
    comfortably fitting the thermal envelope.
