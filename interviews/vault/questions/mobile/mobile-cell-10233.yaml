title: Explaining Token Budget Constraints for Compound AI on Tensor G3
scenario: 'A junior developer building a Tensor G3 (7.5 TOPS, 12GB) chatbot app is confused: ''The LLM
  API on cloud has 128K context window, but our on-device model only has 2048 tokens. Why is the context
  window so much smaller on mobile, and why does it matter for compound AI?'' Explain the hardware basis
  for context window constraints and their implications for pipeline design.'
details:
  realistic_solution: 'Context window constraint on Tensor G3 has two causes: (1) Memory capacity: KV
    cache for 2048 tokens in a 1B model (22 layers, 64 head_dim, bf16): 2*22*64*2*2048 = 11.5MB. For 128K
    context: 2*22*64*2*128K = 724MB — consuming 6% of 12GB, feasible but expensive. (2) Bandwidth: decoding
    reads full KV cache each token step. At Tensor G3 memory bandwidth ~68GB/s: 724MB / 68GB/s = 10.6ms
    per decode step → 94 tok/s maximum bandwidth-limited throughput. The real constraint: 128K context
    * prefill compute = 128K * 2 * 1B ops / (7.5e12 * 0.3) = 114 seconds for prefill. On-device, 128K
    context = 2 minute wait before first token.'
  common_mistake: Explaining context window limits as a software choice or model architecture limitation,
    when on mobile the fundamental constraint is memory bandwidth for KV cache reads. Each decode step
    reads the entire KV cache — larger context = more data to read per token = slower generation.
  napkin_math: 'Tensor G3: 7.5 TOPS. 1B model KV per token: 2*22*64*2=5,632 bytes = 5.5KB. 2048-token
    KV: 11.3MB. 128K-token KV: 704MB. Prefill at 2048: 2048*2*1B/(7.5e12*0.3)=1.82s. Prefill at 128K:
    128000*2*1B/(7.5e12*0.3) = 113.8 seconds — clearly impractical. Decode step, reading full KV: 128K:
    704MB/68GB/s=10.3ms → 97 tok/s bandwidth limited. At 2048: 11.3MB/68GB/s=0.17ms → nearly zero bandwidth
    overhead. Conclusion: 2048 token limit is a practical engineering constraint driven by prefill time,
    not arbitrary.'
