title: The On-Device Copilot Power Budget
scenario: You are the new Lead ML Systems Engineer for the flagship smartphone division, tasked with creating a revolutionary, always-on, on-device AI assistant. The goal is to rival server-based models in quality, but run entirely on the phone's hardware.
question: What multi-model speculative decoding system can meet the always-on phone assistant's latency and power targets?
details:
  realistic_solution: The correct approach is to design a multi-model system that decouples the latency-critical path from the accuracy-critical path, using **speculative decoding** as the core architectural pattern.
  common_mistake: |
    **The Pitfall:** Relying on INT4 quantization of a single large model as a complete solution.
    **The Rationale:** Candidates fail to recognize that a single model is physically incapable of being both extremely fast/low-power and highly accurate.
    **The Consequence:** The resulting single model either drains the battery entirely or produces low-quality, unusable responses.
  napkin_math: |
    1. **Single Model Failure:** A 1.5B model at INT4 requires ~850ms latency and high power, failing the always-on requirement.
    2. **Draft Model:** A tiny 100M parameter draft model runs at ~50ms and minimal power to generate candidate tokens.
    3. **Target Model:** The 1.5B target model wakes up only to verify multiple candidate tokens in parallel.
    4. **System Success:** Speculative decoding bridges the ~20x average power gap by keeping the large model asleep for the majority of token generation.
