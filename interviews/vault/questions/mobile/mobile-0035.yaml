validation_issues:
- The MDE formula used in the 'Napkin Math' is a simplified version (for proportions, assuming p1=p2=0.5),
  which is fine for an estimate, but it's applied inconsistently without defining the 'p' used in the
  formula. The calculation for the second MDE is also not fully shown.
validation_status_pro: ERROR
validation_issues_pro:
- The Minimum Detectable Effect (MDE) calculation for the independent cohort case is incorrect; using
  the standard formula with n=83k per variant yields an MDE of 0.69%, not 0.55%.
- The MDE calculation for the layered experiment case is also incorrect; with 250k users per variant,
  the MDE should be 0.4%, not 0.2%.
