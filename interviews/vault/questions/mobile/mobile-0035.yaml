title: The Mobile A/B Testing Infrastructure at Scale
scenario: You run 12 concurrent ML model experiments across your app — different architectures, quantization levels, and preprocessing pipelines. Each experiment needs statistically significant results within 2 weeks. You have 2M DAU. But your experiments keep producing contradictory results — model A beats model B in experiment 1, but model B beats A in experiment 3. Your data scientist says the experiments are 'interfering'.
question: Why do 12 concurrent mobile ML experiments interfere across 2M DAU, and how should assignment be isolated?
details:
  realistic_solution: 'The interference comes from overlapping experiments sharing system resources on the same device. For instance, running thermal-heavy model A causes CPU throttling, which inadvertently tanks the latency metrics of model B running in a concurrent experiment. The solution is to use Layered/Orthogonal experimentation frameworks to isolate assignments or to specifically exclude thermally-throttled users to eliminate hardware confounders.'
  common_mistake: |
    **The Pitfall:** Running each experiment on a separate, independent user cohort.
    **The Rationale:** It seems like the simplest way to avoid interference between experiments.
    **The Consequence:** With 12 experiments, cohort sizes become too small (167K users), limiting statistical power and capping experimentation velocity to only large-effect tests.
  napkin_math: |
    1. MDE formula: MDE = 2.8 * sqrt(2 * p * (1-p) / n), with p=0.5.
    2. Naive independent (12 experiments, 2M DAU): n = 83.5K per variant. MDE = 2.8 * sqrt(0.5 / 83,500) = 0.69%.
    3. Layered (3 layers, 4 experiments each): n = 250K per variant. MDE = 2.8 * sqrt(0.5 / 250,000) = 0.40%.
    4. **Improvement: Layered design reduces MDE to 0.40% (1.7x more sensitive).**
  options:
  - The interference comes from overlapping experiments sharing system resources on the same device.
  - Run each experiment on a separate user cohort. With 12 experiments and 2M DAU, each cohort gets ~167K users.
  - The bottleneck is in the software framework, not the hardware; switching to a lower-level API will achieve near-theoretical-peak performance.
  - Parallelizing pipeline stages across CPU and GPU always improves throughput, regardless of the relative speeds of each stage.
