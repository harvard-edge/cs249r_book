title: The OTA Data Budget (mobile-0355)
scenario: Your team is responsible for a popular photo enhancement app. You've trained a new, improved
  generative model that is 45 MB in size. You need to push this to your user base via an Over-the-Air
  (OTA) update. A typical user is on a 5 GB monthly cellular data plan. Calculate and explain what percentage
  of this user's monthly data allowance will be consumed by this single model update.
question: "How would you calculate and explain what percentage of this user's monthly data allowance will be consumed by this single model update?"
details:
  realistic_solution: The correct approach is to standardize the units and then calculate the percentage.
    A 5 GB data plan is equivalent to 5,000 MB. The update consumes 45 MB. Therefore, the update consumes
    0.9% of the user's monthly data. The key tradeoff is between delivering model improvements and respecting
    the user's data plan. Pushing large, frequent updates can be costly for users and may lead them to
    disable background updates or uninstall the app.
  common_mistake: Engineers often miscalculate the percentage due to unit confusion between megabytes
    (MB) and gigabytes (GB), or simple decimal errors. They might also underestimate the user impact,
    stating that '45 MB is small' without contextualizing it against a finite data plan, which can lead
    to user complaints or uninstalls.
  napkin_math: '1. Convert the user''s data plan from GB to MB: 5 GB * 1000 MB/GB = 5,000 MB.'
  options:
  - 9%. (Decimal error, off by 10x)
  - 0.09%. (Decimal error, off by 0.1x)
  - 0.9%.
  - 0.009%. (Unit confusion, forgot to multiply by 100)
  correct_index: 2
