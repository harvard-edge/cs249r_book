title: The OTA Data Budget (mobile-0355)
scenario: Your team is responsible for a popular photo enhancement app. You've trained a new, improved generative model that is 45 MB in size. You need to push this to your user base via an Over-the-Air (OTA) update. A typical user is on a 5 GB monthly cellular data plan.
question: What percentage of this user's monthly data allowance will be consumed by this single model update?
details:
  realistic_solution: The correct approach is to standardize the units and then calculate the percentage. A 5 GB data plan is equivalent to 5,000 MB. The update consumes 45 MB. Therefore, the update consumes 0.9% of the user's monthly data. The key tradeoff is between delivering model improvements and respecting the user's data plan. Pushing large, frequent updates can be costly for users and may lead them to disable background updates or uninstall the app.
  common_mistake: |
    **The Pitfall:** Unit confusion between megabytes (MB) and gigabytes (GB).
    **The Rationale:** Engineers often simply divide 45 by 5, or do decimal shifts incorrectly.
    **The Consequence:** Drastically underestimating or overestimating user impact, potentially launching an update that severely impacts user data limits without PM approval.
  napkin_math: |
    1. Convert data plan to MB: 5 GB * 1000 MB/GB = 5,000 MB.
    2. Calculate percentage: (45 MB / 5,000 MB) * 100%.
    3. Evaluate: 45 / 50 = 0.9.
    4. **Result: 0.9% of the monthly allowance.**
  options:
  - 9%.
  - 0.09%.
  - 0.9%.
  - 0.009%.
  correct_index: 2
