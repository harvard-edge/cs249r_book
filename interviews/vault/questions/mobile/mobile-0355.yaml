title: The OTA Data Budget (mobile-0355)
scenario: 'You''ve trained a new 45 MB generative model for a photo enhancement app. You need to push this to your user base via an Over-the-Air (OTA) update. A typical user is on a 5 GB monthly cellular data plan.'
question: 'What percentage of this user''s monthly data allowance will be consumed by this single model update?'
details:
  realistic_solution: 'The correct approach is to standardize the units and then calculate the percentage. A 5 GB data plan is equivalent to 5,000 MB. The update consumes 45 MB. Therefore, the update consumes 0.9% of the user''s monthly data. The key tradeoff is between delivering model improvements and respecting the user''s data plan. Pushing large, frequent updates can be costly for users and may lead them to disable background updates or uninstall the app.'
  common_mistake: |
    **The Pitfall:** Unit confusion between megabytes (MB) and gigabytes (GB).
    **The Rationale:** Engineers simply divide 45 by 5, missing the decimal shifts entirely.
    **The Consequence:** Drastically misestimating user impact, potentially pushing updates that destroy data plans.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Update size: 45 MB.
       - Data Plan: 5 GB (5,000 MB).
    2. **Calculations:**
       - Percentage = (45 MB / 5,000 MB) * 100%.
       - Percentage = 0.009 * 100% = 0.9%.
    3. **Conclusion & Interpretation:**
       - **Result: 0.9% of Monthly Allowance (Acceptable OTA Budget).**
  options:
  - A) 9%.
  - B) 0.09%.
  - C) 0.9%.
  - D) 0.009%.
