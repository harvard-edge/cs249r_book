title: Understanding why autograd is disabled on Core ML and how to replicate gradient-based
  effects
scenario: A developer exports a PyTorch model to Core ML for deployment on A17 Pro
  (35 TOPS, 8GB). They want to implement a feature where the model can perform a few-shot
  adaptation step on-device using gradient descent. Core ML does not support backward
  passes. The team considers re-implementing autograd from scratch.
question: How can an A17 Pro app support few-shot adaptation when Core ML inference
  does not provide backward passes?
details:
  realistic_solution: 'Use gradient-free adaptation methods: (1) Prompt engineering/in-context
    learning for LLMs — no weights change. (2) Test-time normalization adaptation
    using BatchNorm running statistics update (forward-only, no gradient). (3) Hypernetworks
    that generate task-specific parameters from task context (one inference pass).
    (4) For true gradient-based adaptation, use a tiny PyTorch model subset (e.g.,
    only the classification head: 1000 params) deployed via PyTorch Mobile with autograd
    enabled, while the backbone runs on Core ML.'
  common_mistake: Assuming Core ML or ONNX runtime inference engines support backpropagation.
    These runtimes compile the computational graph for inference-only execution, stripping
    all autograd metadata. On-device gradient descent is fundamentally incompatible
    with these runtimes.
  napkin_math: 'A17 Pro Core ML: full ViT-B inference ≈ 15ms. PyTorch Mobile same
    model: ~80ms (no CoreML hardware acceleration). Hybrid approach: backbone on Core
    ML (15ms) + classification head on PyTorch Mobile (2ms for 1000 params) + 5-shot
    adaptation (5 steps × 2ms = 10ms) = 27ms total. Latency acceptable for on-tap
    adaptation; 10 gradient steps on 1000 params uses ~0.004Wh — negligible for user-initiated
    adaptation.'
