title: The Heterogeneous Pipeline Director
scenario: You are designing an on-device ML pipeline for an augmented reality application. The pipeline involves pre-processing (CPU), a light-weight pose estimation model (NPU-preferred), and a heavy visual effects rendering step (GPU). Your goal is to achieve minimal end-to-end latency while adhering to a strict 2W average power budget for the entire pipeline, considering the mobile SoC's heterogeneous architecture.
question: How would you approach scheduling and resource allocation across these different compute units?
details:
  realistic_solution: This requires a sophisticated **heterogeneous task scheduler** aware of device-specific power profiles, latency characteristics, and inter-processor communication (IPC) costs. Profile each stage on its target hardware for latency, power, and memory bandwidth. Model the pipeline as a DAG where nodes are tasks and edges are data dependencies. Use DVFS to dynamically adjust clock frequencies based on workload. Prioritize latency-critical tasks and exploit parallelism where dependencies permit. For this specific CPU→NPU→GPU chain, the critical path is sequential, but other sub-graphs in a larger model may expose parallelism.
  common_mistake: |
    **The Pitfall:** "Run everything in parallel on its preferred hardware."
    **The Rationale:** Candidates assume maximal parallelism is always best without analyzing power constraints and IPC costs.
    **The Consequence:** Exceeding the 2W average power budget, leading to aggressive thermal throttling that actually drops frame rates below a sequential baseline.
  napkin_math: |
    - **Sequential Baseline Latency:** CPU (5ms) + NPU (10ms) + GPU (15ms) = **30 ms** Total Latency.
    - **Energy per Frame:** (5ms × 500mW) + (10ms × 800mW) + (15ms × 1200mW) = **28,500 µJ**.
    - **Pipelined Execution:** Throughput bottleneck is the 15ms GPU = **66 FPS**.
    - **Concurrent Average Power:**
      - CPU: (5/15) × 500 = 166.7 mW.
      - NPU: (10/15) × 800 = 533.3 mW.
      - GPU: (15/15) × 1200 = 1200 mW.
    - **Total Pipelined Power:** 166.7 + 533.3 + 1200 = **1900 mW**.
    - **Conclusion:** 1900 mW < 2000 mW (2W) budget. We achieve 66 FPS while maintaining thermal limits.
