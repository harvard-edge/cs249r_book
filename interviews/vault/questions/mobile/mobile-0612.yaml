title: The Heterogeneous Pipeline Director
scenario: You are designing an on-device ML pipeline for an augmented reality application. The pipeline
  involves pre-processing (CPU), a light-weight pose estimation model (NPU-preferred), and a heavy visual
  effects rendering step (GPU). Your goal is to achieve minimal end-to-end latency while adhering to a
  strict 2W average power budget for the entire pipeline, considering the mobile SoC's heterogeneous architecture.
  How would you approach scheduling and resource allocation across these different compute units?
details:
  realistic_solution: This requires a sophisticated **heterogeneous task scheduler** aware of device-specific
    power profiles, latency characteristics, and inter-processor communication (IPC) costs. Profile each
    stage on its target hardware for latency, power, and memory bandwidth. Model the pipeline as a DAG
    where nodes are tasks and edges are data dependencies. Use DVFS to dynamically adjust clock frequencies
    based on workload. Prioritize latency-critical tasks and exploit parallelism where dependencies permit.
    For this specific CPU→NPU→GPU chain, the critical path is sequential, but other sub-graphs in a larger
    model may expose parallelism.
  common_mistake: '"Run everything in parallel on its preferred hardware." While parallelism is good,
    blindly doing so ignores power constraints and inter-unit communication overheads, potentially leading
    to thermal throttling or exceeding the power budget.'
  napkin_math: 'CPU stage: 5ms, 500mW. NPU stage: 10ms, 800mW. GPU stage: 15ms, 1200mW. | If run sequentially
    (due to data dependencies: CPU→NPU→GPU): Total Latency = 30ms. Total Power (average over 30ms) = (5*500
    + 10*800 + 15*1200) / 30 = (2500 + 8000 + 18000) / 30 = 950mW (well within 2W). | If NPU and GPU stages
    could be parallelized (hypothetically, if GPU does not require NPU output): Total latency = max(10,
    15) + 5 = 20ms. But since GPU requires NPU output in this pipeline, the sequential 30ms is the correct
    baseline. | The scheduler must find the optimal DVFS operating points for each unit to meet both latency
    and power targets.'
