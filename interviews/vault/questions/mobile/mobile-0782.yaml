title: The NAS Latency Predictor Blind Spot
scenario: You are using hardware-aware NAS to find an optimal architecture for a mobile vision model targeting a mobile NPU. The NAS uses a latency lookup table (LUT) built by profiling individual operators (convolutions, depthwise separable convolutions, attention blocks) in isolation. After 500 GPU-hours of search, the top architecture achieves the predicted 8ms latency on the NPU when run in isolation. When deployed inside the full camera pipeline (which also runs ISP processing, object tracking, and UI rendering on the same SoC), actual latency balloons to 22ms.
question: Why did an NPU latency LUT predict 8ms but produce 22ms inside a full camera pipeline?
details:
  realistic_solution: |
    The NAS latency predictor has a fundamental blind spot: it profiles operators in isolation without system-level memory bandwidth contention. The NAS-selected architecture uses memory-bound operators (like large depthwise convolutions) that saturate isolated bandwidth. When deployed alongside the ISP and GPU, available bandwidth plummets, causing severe memory stalls and cascading DMA delays. Furthermore, models with high operator counts accrue fixed NPU dispatch overheads that multiply under contention.
  common_mistake: |
    **The Pitfall:** Blaming thermal throttling entirely.
    **The Rationale:** Candidates recognize the system is under load but fail to identify the specific architectural flaw (memory-bound operators + high dispatch counts) selected by the flawed NAS LUT.
    **The Consequence:** Attempting to add cooling or reduce framerates instead of penalizing memory-bandwidth-bound operators in the NAS reward function.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Isolated NPU Bandwidth: 50 GB/s. Contended Bandwidth: 15 GB/s.
       - NAS Arch Compute: 4.0ms (memory-bound).
       - Fixed overhead: 80 ops * 0.05ms = 4.0ms.
    2. **Calculations:**
       - Isolated Latency: 4.0ms (compute) + 4.0ms (overhead) = 8.0ms.
       - Contention multiplier for memory-bound ops: 50 / 15 = ~3.3x.
       - Contended Compute: 4.0ms * 3.3 = 13.2ms.
       - Cascading DMA stalls: ~4.8ms.
       - Total Contended Latency: 13.2ms + 4.0ms + 4.8ms = 22.0ms.
    3. **Conclusion & Interpretation:**
       - **Memory contention spikes latency from 8ms to 22ms. Bottleneck: Memory Bandwidth Contention.**
