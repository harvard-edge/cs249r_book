title: Applying Accelerators for Zero-Copy Image Resizing
scenario: A vision app on an Apple A17 Pro needs to resize 4K camera frames to 224x224
  before feeding them to the NPU.
question: Apply a hardware-accelerated strategy using the iOS image signal processor
  to bypass the CPU for this resizing task.
details:
  realistic_solution: Use CoreVideo and Metal frameworks to route the camera buffer
    directly to the ISP for hardware downscaling. The resulting 224x224 tensor is
    then passed to CoreML via a shared CVPixelBuffer, keeping the CPU out of the pixel-copy
    loop.
  common_mistake: Copying the 4K frame to a CPU byte array, resizing via a CPU loop,
    and copying back, which severely drains battery.
  napkin_math: 0 CPU copies = 100% offloaded
