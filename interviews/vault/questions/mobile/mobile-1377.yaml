title: 'On-Device DP-SGD on Hexagon NPU'
scenario: 'You are designing an on-device personalization system using DP-SGD for a language model running on a Qualcomm Hexagon NPU.'
question: 'How would you design a hybrid training architecture that handles per-example gradient clipping, secure noise generation, and INT8 quantization without compromising privacy guarantees on a Hexagon NPU with 16 GB of shared LPDDR5X memory?'
details:
  realistic_solution: 'A novel architecture would utilize ghost clipping to avoid materializing full per-example gradients in the shared LPDDR5X memory. The forward and backward passes operate on the NPU leveraging its 45 TOPS INT8 engines, while the cryptographically secure pseudo-random noise generation (discrete Gaussian mechanism) and sensitivity clipping are orchestrated on the CPU. This heterogeneous approach guarantees privacy integrity while maximizing NPU utilization.'
  common_mistake: |
    **The Pitfall:** Proposing standard DP-SGD implementations without considering the hardware reality of the Hexagon NPU.
    **The Rationale:** Candidates incorrectly assume standard FP32 Gaussian noise generation is efficient or secure on the NPU, and fail to address the massive memory bandwidth bottleneck of materializing per-example gradients.
    **The Consequence:** Materializing per-example gradients heavily taxes the shared LPDDR5X memory bus, completely dominating the step time.
  napkin_math: |
    **Assumptions & Constraints:**
    - 10M parameter model, batch size 64.
    - Hexagon NPU (45 TOPS INT8).

    **Calculations:**
    - Naive per-example gradients: 64 * 10M * 4 bytes = 2.56 GB.
    - Ghost clipping gradient memory footprint: ~40 MB.
    - Backward pass compute: ~2.4 GOPS per example; batch of 64 needs ~153.6 GOPS.
    - Compute time: (153.6e9 / 45e12) = ~3.4 ms.

    **Conclusion & Interpretation:**
    - **Result: 3.4 ms (Memory-Bound).** The CPU-side noise generation of 10M values (~40 MB) and the memory bandwidth for synchronization will completely dominate the step time.
