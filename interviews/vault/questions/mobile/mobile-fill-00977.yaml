title: LLM Operator Scheduling on Hexagon NPU
scenario: You are tasked with optimizing the inference latency and memory footprint of a critical, computationally
  intensive block within a large language model (LLM) for deployment on the Snapdragon 8 Gen 3 Hexagon
  NPU. The NPU provides 45 TOPS (INT8) and has shared access to 12-16 GB LPDDR5X system memory. The LLM
  block consists of a sequence of operators, some of which are memory-bound (e.g., element-wise operations
  with large tensors), while others are compute-bound (e.g., matrix multiplications). Your goal is to
  achieve an inference latency of under 100ms for this block, while minimizing peak memory usage for intermediate
  activations. Describe your approach to intelligently schedule the operators, focusing on techniques
  for execution order optimization to maximize memory reuse, identify and exploit opportunities for parallel
  operator execution, and apply layer fusion where beneficial, considering the NPU's architecture and
  the given specifications.
details:
  realistic_solution: 'A realistic solution involves a multi-pronged approach: 1. **Computational Graph
    Analysis**: Represent the LLM block as a DAG (Directed Acyclic Graph) to identify data dependencies
    and potential parallelism. 2. **Memory-Aware Scheduling**: Employ algorithms (e.g., critical path
    scheduling, register allocation for tensors) to determine an execution order that maximizes in-place
    operations and minimizes peak memory footprint. This might involve techniques like ''lifetime analysis''
    of tensors. 3. **Layer Fusion**: Identify sequences of operations that can be fused into a single
    kernel (e.g., Conv-BN-ReLU, MatMul-Add-Activation) to reduce memory reads/writes and kernel launch
    overheads. This requires understanding the NPU''s supported fusion patterns. 4. **Parallelism Exploitation**:
    Schedule independent subgraphs or operations to run concurrently on different NPU cores/units, ensuring
    proper synchronization and resource allocation. 5. **Profiling and Iteration**: Start with an initial
    schedule, profile its performance on the target NPU, analyze bottlenecks (compute, memory bandwidth,
    or latency), and iteratively refine the scheduling strategy based on real-world measurements.'
  common_mistake: A common mistake is to prioritize compute utilization without adequately considering
    memory access patterns and bandwidth limitations. Naive scheduling might lead to excessive data movement
    between DRAM and NPU caches/scratchpads, or prevent effective memory reuse, significantly bottlenecking
    performance even if the NPU's raw TOPS are underutilized. Another mistake is proposing parallelization
    without a thorough dependency analysis, leading to incorrect results or stalls.
  napkin_math: To meet the 100ms latency target with 45 TOPS (INT8), the LLM block must perform no more
    than 45 * 10^12 ops/sec * 0.1 sec = 4.5 * 10^12 (4.5 Trillion) INT8 operations. If an LLM block has,
    for instance, 100 INT8 Giga-operations (100 * 10^9 ops), its theoretical compute time would be 100
    * 10^9 / (45 * 10^12) = 0.0022 seconds or 2.2ms. This leaves a significant budget for memory access,
    control overhead, and other non-compute operations, highlighting that memory bandwidth or dependencies
    are likely the primary bottleneck rather than raw compute for this example operation count. For LPDDR5X,
    assuming a bandwidth of ~50-60 GB/s, moving 1 GB of data would take roughly 1 GB / 50 GB/s = 20ms,
    illustrating that even small data transfers can consume a significant portion of the latency budget.
