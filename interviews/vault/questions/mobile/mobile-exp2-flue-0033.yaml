title: On-Device KL Divergence Calculation
scenario: You are running a background drift detection task on a Samsung Exynos 2400 NPU. To avoid waking
  up the CPU, the dual-core NPU computes the Kullback-Leibler (KL) divergence of a categorical feature
  using base-2 logarithms. Over a set interval, the actual observed distribution (P) across three categories
  is [0.5, 0.25, 0.25], while the expected baseline distribution (Q) stored in the shared 12 GB LPDDR5X
  memory is [0.25, 0.5, 0.25]. Calculate the KL divergence KL(P||Q) from memory, and determine if the
  34.7 TOPS NPU is bottlenecked by compute or the LPDDR5X memory bandwidth for this operation.
question: "How would you calculate the KL divergence KL(P||Q) from memory, and determine if the 34.7 TOPS NPU is bottlenecked by compute or the LPDDR5X memory bandwidth for this operation?"
details:
  realistic_solution: The candidate should correctly recall and apply the KL divergence formula by multiplying
    each probability in P by the base-2 log of the ratio of P to Q. For the hardware aspect, they should
    recognize that calculating this over small probability arrays requires virtually zero compute, meaning
    the operation is entirely bottlenecked by the latency and bandwidth of pulling the baseline Q distribution
    from the shared LPDDR5X memory.
  common_mistake: Candidates often confuse the direction of KL divergence, calculating KL(Q||P) instead
    of KL(P||Q), or they struggle with the base-2 logarithm mental math. They also frequently fail to
    evaluate the arithmetic intensity, mistakenly assuming a 34.7 TOPS NPU might be compute-bound for
    mathematical operations rather than identifying it as an extreme memory-bound scenario.
  napkin_math: '1) Formula: KL(P||Q) = sum(P(i) * log2(P(i) / Q(i)))

    2) Bin 1: 0.5 * log2(0.5 / 0.25) = 0.5 * log2(2) = 0.5 * 1 = 0.5

    3) Bin 2: 0.25 * log2(0.25 / 0.5) = 0.25 * log2(0.5) = 0.25 * -1 = -0.25

    4) Bin 3: 0.25 * log2(0.25 / 0.25) = 0.25 * log2(1) = 0

    5) Total KL Divergence = 0.5 - 0.25 + 0 = 0.25

    6) Hardware analysis: Fetching 6 floats (P and Q arrays) from the 12 GB LPDDR5X memory takes 24 bytes.
    The compute requires ~15 operations. Arithmetic intensity is ~0.625 Ops/Byte. Given LPDDR5X bandwidth
    (~60 GB/s), the max compute throughput achievable for this task is 60 * 0.625 = 37.5 GOPS. Since 37.5
    GOPS is massively lower than the Exynos 2400''s 34.7 TOPS limit, the operation is fundamentally memory-bound.'
