title: Estimating Maximum Frame Rate on A17 Pro Neural Engine
scenario: A real-time super-resolution model requires 50 Giga-MACs per frame. It runs
  on the Apple A17 Pro Neural Engine, which has a peak theoretical throughput of 35
  TOPS.
question: Assuming 40% utilization of the peak TOPS, calculate the maximum frame rate
  the NPU can sustain.
details:
  realistic_solution: The A17 Pro provides 35 TOPS (Tera Operations Per Second). Since
    1 MAC equals 2 Operations, 50 GMACs is equal to 100 GOPs per frame. At 40% utilization,
    the effective throughput is 14 TOPS. The maximum frame rate is 14,000 GOPs / 100
    GOPs per frame, resulting in 140 frames per second.
  common_mistake: Forgetting that 1 MAC equals 2 operations, overestimating the frame
    rate by 2x.
  napkin_math: (35,000 * 0.4) / (50 * 2) = 140 FPS
