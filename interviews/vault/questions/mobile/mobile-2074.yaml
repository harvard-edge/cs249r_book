title: Estimating Maximum Frame Rate on A17 Pro Neural Engine
scenario: A real-time super-resolution model requires 50 Giga-MACs per frame. It runs on the Apple A17 Pro Neural Engine, which has a peak theoretical throughput of 35 TOPS.
question: Assuming 40% utilization of the peak TOPS, calculate the maximum frame rate the NPU can sustain.
details:
  realistic_solution: The A17 Pro provides 35 TOPS (Tera Operations Per Second). Since 1 MAC equals 2 Operations, 50 GMACs is equal to 100 GOPs per frame. At 40% utilization, the effective throughput is 14 TOPS. The maximum frame rate is 14,000 GOPs / 100 GOPs per frame, resulting in 140 frames per second.
  common_mistake: |
    **The Pitfall:** Forgetting that 1 MAC (Multiply-Accumulate) equals 2 operations.
    **The Rationale:** Engineers directly divide TOPS by MACs without converting units.
    **The Consequence:** This leads to overestimating the frame rate by exactly 2x, causing missed real-time deadlines in production.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Compute required: 50 Giga-MACs per frame.
       - Peak throughput: 35 TOPS.
       - NPU Utilization: 40%.
    2. **Calculations:**
       - Convert MACs to Ops: 50 Giga-MACs * 2 Ops/MAC = 100 GOPs/frame.
       - Effective Throughput: 35 TOPS * 0.40 = 14 TOPS = 14,000 GOPs/s.
       - Max Frame Rate: 14,000 GOPs/s / 100 GOPs/frame = 140 FPS.
    3. **Conclusion & Interpretation:**
       - **Result: 140 FPS**. The maximum sustainable frame rate is 140 FPS, highlighting the necessity of converting MACs to Ops to accurately estimate bounds.
