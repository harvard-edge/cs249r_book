title: 'Fault Tolerance: Evaluate App Crash vs Model Corruption Recovery Paths'
scenario: 'Your on-device ML app on Tensor G3 experiences two failure modes: (A) app crash mid-training (occurs ~1/day), (B) model file corruption (occurs ~1/month).'
question: How would you compare the recovery protocol, recovery time, and user impact for each failure mode?
details:
  realistic_solution: 'App crash recovery: training checkpoint from 5 minutes ago -> resume. Fast path (< 5 seconds). Model corruption: SHA256 verify on startup, restore from backup partition or re-download. Slow path (seconds to minutes).'
  common_mistake: |
    **The Pitfall:** Treating highly frequent and extremely rare failures identically.
    **The Rationale:** Engineers often design one monolithic recovery mechanism (e.g., full re-download) for all failures.
    **The Consequence:** This creates unacceptable downtime for daily app crashes, ruining the UX, rather than providing a fast path for common errors.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Failure A (App Crash): ~1 per day.
       - Failure B (Corruption): ~1 per month.
       - Checkpoint size: 2MB LoRA. Base model: 200MB.
    2. **Calculations:**
       - Recovery A time = Load 2MB (2ms) + App restart (3s) = ~3s.
       - Annual Impact A = 365 crashes * 3s = 18.25 minutes/year.
       - Recovery B time = Verify SHA256 (2ms) + Download 200MB at 12.5 MB/s (16s) = ~16s.
       - Annual Impact B = 12 events * 16s = 3.2 minutes/year.
       - Total Downtime = 18.25m + 3.2m = 21.45 minutes/year.
    3. **Conclusion & Interpretation:**
       **Result: I/O-Bound Reliability. This hierarchical recovery guarantees >99.99% uptime by isolating slow multi-megabyte downloads to rare events.**
