title: 'The Stuttering AI Assistant: Real-Time Deadlines'
scenario: 'You are a Mobile ML engineer tuning a new on-device AI assistant that runs
  on an Apple A17 Pro. The feature is a ''type-ahead'' function that generates the
  next word in real-time as a user types. The UI must render a new token every 16ms
  to avoid visual stutter (''jank''). The team is using a 3B parameter LLM (quantized
  to INT8) and a simple ''static batching'' approach: it waits up to 8ms to collect
  multiple incoming requests into a batch of 4 before processing. You diagnose that
  while the average Time-Per-Output-Token (TPOT) is acceptable, the initial Time-To-First-Token
  (TTFT) frequently exceeds the 16ms budget, causing a poor user experience. What
  is the most likely cause of the missed deadlines?'
question: Why does a 3B INT8 type-ahead LLM on A17 Pro miss a 16 ms TTFT budget under
  static batching?
details:
  realistic_solution: 'The system is fundamentally memory-bandwidth bound, and the
    static batching strategy makes the latency worse. The 16ms ''jank'' budget is
    violated by two factors: first, the 8ms static batching window introduces a queuing
    delay that consumes half the budget before inference even starts. Second, the
    inference itself, dominated by loading the 3GB of model weights from DRAM, takes
    nearly 60ms. The combination of queuing delay and the memory-bound model pass
    makes meeting the real-time deadline impossible. The correct first step is to
    switch to a continuous batching or ''first-come-first-served'' strategy to eliminate
    the artificial queuing delay, though the core memory bottleneck will remain the
    dominant problem.'
  common_mistake: Engineers often misdiagnose the bottleneck by focusing only on compute
    (TOPS) or assuming the batching strategy, which helps throughput, also helps latency.
    They may also blame secondary effects like thermal throttling, which wouldn't
    impact the very first token generated.
  napkin_math: 1. **Calculate Model Memory Load:** A 3B parameter model quantized
    to INT8 requires 3 billion * 1 byte/parameter = 3 GB of memory.
  options:
  - The A17 Pro's 35 TOPS of compute is insufficient for a 3B model, making the operation
    compute-bound.
  - Continuous inference is causing the SoC to overheat, leading to thermal throttling
    and missed deadlines.
  - The static batching queue adds an 8ms delay, and the 58.6ms memory-bound prefill
    step collectively exceed the 16ms budget.
  - The phone's CPU is too slow to schedule requests for the Neural Engine, introducing
    significant dispatch latency.
  correct_index: 2
