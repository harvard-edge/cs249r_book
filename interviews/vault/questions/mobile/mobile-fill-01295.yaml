title: 'Exynos NPU Drift: Optimizing On-Device Reliability'
scenario: You are responsible for a critical real-time object detection model deployed on a mobile device
  powered by the Samsung Exynos 2400 NPU (34.7 TOPS, 12 GB LPDDR5X). Over several weeks, you've noticed
  a statistically significant increase in false negatives, degrading the application's reliability. This
  suggests potential data or concept drift. Your challenge is to design and implement a low-overhead,
  on-device drift detection mechanism that leverages the NPU's capabilities without compromising the primary
  model's inference latency, and to outline an optimization strategy to address the identified drift.
question: "How would you implement and optimize on-device drift detection on Exynos 2400 without hurting primary inference latency?"
details:
  realistic_solution: 'Implement a lightweight, statistical drift detection method such as Population
    Stability Index (PSI) or a simplified Kullback-Leibler (KL) divergence on key model input features
    or intermediate activations, using a sliding window approach. This detection mechanism should run
    periodically (e.g., every 500 inferences) on a separate thread or an under-utilized NPU core/sub-unit
    to minimize impact. The solution involves:

    1.  **Diagnosing Bottleneck**: Profile the existing model inference and identify available NPU cycles
    or memory bandwidth that can be allocated for drift detection. Determine the minimum set of features/activations
    whose distribution change is most indicative of drift.

    2.  **Efficient Implementation**: Quantize the reference distribution and incoming data to reduce
    memory footprint. Implement the statistical divergence calculation in highly optimized NPU-friendly
    kernels.

    3.  **Quantifying the Fix**: Define metrics for overhead (e.g., % increase in inference latency, %
    NPU utilization by detector, memory footprint of detector) and drift detection sensitivity/specificity.
    The goal is to achieve reliable drift detection with <5% increase in primary inference latency and
    <100MB additional memory footprint. If drift is detected, trigger adaptive strategies like model output
    re-calibration, switching to a more robust (but potentially less accurate) fallback model, or flagging
    data for immediate re-training in the cloud.'
  common_mistake: Proposing a computationally expensive drift detection method (e.g., full re-training
    on-device or continuous deployment of heavy statistical checks) without considering the NPU's resource
    constraints (memory, TOPS) or the impact on the primary model's real-time performance. Another common
    mistake is to suggest purely offline drift detection, neglecting the need for immediate, on-device
    feedback for critical reliability issues.
  napkin_math: "A 100-dimensional feature vector is monitored for data drift using PSI. If calculating\
    \ PSI for 100 features involves 5 basic floating-point operations per feature (e.g., binning, cumulative\
    \ sum, comparison) for every 100 inferences, and the primary model runs at 30 FPS, how many total\
    \ operations per second are needed for drift detection? \n*   Ops per 100 inferences = 100 features\
    \ * 5 ops/feature = 500 ops.\n*   Number of drift detection runs per second = 30 FPS / 100 inferences\
    \ per run = 0.3 runs/second.\n*   Total ops per second for drift detection = 500 ops * 0.3 runs/second\
    \ = 150 ops/second. \nThis demonstrates that even sophisticated yet optimized statistical checks are\
    \ well within the Samsung Exynos 2400 NPU's capabilities (34.7 TOPS) with minimal overhead."
