title: 'The Economics of On-Device Learning: Federated Learning'
scenario: You're an engineer on a mobile team developing a personalized driver-assistance feature for a fleet of 1 million active users. You are comparing two training strategies: Centralized logging (50 MB of logs per user daily) vs Federated Learning (a 2 MB model update per user daily). Cloud egress/ingress data transfer costs $2 per GB.
question: "What are the daily data transfer costs for centralized versus federated training across 1M mobile users?"
details:
  realistic_solution: The correct approach is to calculate the total daily data volume for each strategy and then multiply by the cost per GB. The key is to correctly convert megabytes to gigabytes for the federated strategy and then scale both calculations by the one million users in the fleet. This demonstrates that the federated approach, while often chosen for privacy, also offers massive data transfer cost savings.
  common_mistake: |
    **The Pitfall:** Calculating cost on a per-user basis instead of for the fleet, or mixing up MB and GB.
    **The Rationale:** Engineers often focus on the privacy benefits of FL and ignore the massive data transfer cost savings, rushing through the unit conversion.
    **The Consequence:** Underestimating the total cost by orders of magnitude, failing to build a strong economic case for Federated Learning.
  napkin_math: |
    * **Centralized Cost:**
      * Total Data = 1,000,000 users * 50 MB = 50,000,000 MB = 50,000 GB
      * Cost = 50,000 GB * $2/GB = $100,000 / day
    * **Federated Cost:**
      * Total Data = 1,000,000 users * 2 MB = 2,000,000 MB = 2,000 GB
      * Cost = 2,000 GB * $2/GB = $4,000 / day
    * **The federated approach saves $96,000 daily.**
  options:
  - Centralized costs $100,000/day; Federated costs $400/day.
  - Centralized costs $0.10/day; Federated costs $0.004/day.
  - Centralized costs $100,000/day; Federated costs $4,000/day.
  - Centralized costs $10,000/day; Federated costs $4,000/day.
