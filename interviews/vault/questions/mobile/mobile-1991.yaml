title: QAT for Text-to-Speech
scenario: A text-to-speech model sounds highly robotic after applying standard Post-Training
  Quantization (PTQ) to INT8 on a Snapdragon NPU.
question: Design an optimization plan to recover acoustic fidelity without dropping
  back to FP16, addressing the dynamic range issues.
details:
  realistic_solution: The robotic artifacts stem from outliers in the acoustic activation
    layers clipping under standard PTQ. The plan is to implement Quantization-Aware
    Training (QAT) with Learnable Step Sizes (LSQ). By finetuning the model for a
    few epochs while simulating the INT8 bounds, the network learns to adapt its weight
    distributions around the clipping thresholds, preserving audio quality.
  common_mistake: Reverting to FP16 mixed precision, which halves the throughput of
    the NPU and doubles the memory bandwidth pressure.
  napkin_math: INT8 yields a 4x reduction in weight size (e.g., 40MB -> 10MB) vs FP32.
