math_issues:
- Incorrect operation counting. An MLP with 135,000 parameters requires 135,000 MACs (which equals 270,000
  Operations or 0.27 MOPs) for a single inference. The calculation incorrectly states it requires 270,000
  MACs and 0.54 MOPs, erroneously doubling the computational cost.
