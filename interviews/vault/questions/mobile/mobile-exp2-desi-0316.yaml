title: On-Device Fairness Evaluation Architecture
scenario: You are tasked with designing an on-device fairness evaluation pipeline for a computational
  photography feature running on the Apple A17 Pro Neural Engine. The system must ensure equalized odds
  across different skin tones and lighting conditions without uploading raw images, strictly preserving
  user privacy. Design an architecture to compute intersectional fairness metrics locally, leveraging
  the 16-core Neural Engine and shared 8 GB unified memory, while keeping the evaluation overhead under
  a strict 100MB memory and 10ms latency budget.
question: "How should an A17 Pro photography feature compute local fairness metrics under privacy, memory, and latency constraints?"
details:
  realistic_solution: The optimal design extracts a shared latent embedding from the main model's early
    layers to feed a lightweight, quantized (INT8) auxiliary classifier for subgroup identification. The
    device computes true/false positive rates for the enhancement locally and aggregates these into a
    differentially private sketch. Only these aggregated, anonymized metrics are synced to the cloud,
    allowing the engineering team to monitor demographic parity and equalized odds without compromising
    privacy.
  common_mistake: Candidates often propose running a large, independent fairness classifier alongside
    the main model, which unnecessarily duplicates feature extraction and strains the unified memory.
    Alternatively, they suggest logging raw user images to the server for evaluation, which violates strict
    privacy constraints.
  napkin_math: Assume a shared 512-dimensional embedding and a 2-layer MLP (512->256->15) for subgroup
    classification. The MLP requires roughly 135,000 parameters, consuming just 135 KB of the 8 GB unified
    memory in INT8 format. The computation requires about 135,000 MACs (0.27 MOPs). Given the A17 Pro
    Neural Engine's 35 TOPS capability at ~5W, the inference time is roughly 0.27 MOPs / 35,000,000 MOPs/sec
    = 0.0077 microseconds, easily satisfying the 10ms latency budget and leaving ample resources for the
    main workload.
