title: INT8 Quantization Memory Bandwidth Analysis
scenario: We are deploying a 2 billion parameter model to the Samsung Exynos 2400 NPU, which features
  a dual-core NPU with 34.7 TOPS and shares 12 GB of LPDDR5X memory with the CPU and ISP. During profiling,
  we find the NPU compute utilization is only at 25%, yet the FP16 model is capped at 15 FPS. When we
  switch to INT8 Post-Training Quantization, the FPS exactly doubles to 30 FPS, even though the compute
  utilization remains low. Explain why this specific performance scaling occurs and verify it mathematically.
question: "Why does INT8 PTQ double Exynos 2400 NPU throughput from 15 FPS to 30 FPS while compute utilization stays at 25%?"
details:
  realistic_solution: Because the 12 GB LPDDR5X memory is shared across the entire SoC, memory bandwidth
    is highly constrained. Since compute is only at a fraction of its capacity, the system is memory-bound.
    Quantizing from FP16 (2 bytes) to INT8 (1 byte) halves the memory payload transferred from RAM to
    the NPU per inference. In a strictly bandwidth-bound scenario, halving the data transfer requirement
    directly doubles the achievable frame rate.
  common_mistake: Candidates often incorrectly attribute the speedup to the NPU's INT8 compute throughput
    being twice as fast as FP16, failing to recognize that the 34.7 TOPS are severely underutilized and
    the system is memory-bandwidth bound.
  napkin_math: 'For a 2B parameter model: FP16 weights = 2B * 2 bytes = 4 GB. At 15 FPS, required weight
    bandwidth = 4 GB * 15 = 60 GB/s. INT8 weights = 2B * 1 byte = 2 GB. At 30 FPS, required weight bandwidth
    = 2 GB * 30 = 60 GB/s. The shared LPDDR5X bandwidth saturates at ~60 GB/s for the NPU, explaining
    why halving the precision perfectly doubles the throughput while remaining well under the 34.7 TOPS
    compute limit.'
