title: Mobile DP Noise Versus Personalization
scenario: A mobile personalization feature clips user gradients at norm 1.0 and adds DP noise. Strong privacy with noise multiplier 2.0 reduces personalization lift from 5% to 1%, while multiplier 0.8 preserves 4% lift but weakens privacy. Evaluate the deployment decision.
question: How would you evaluate DP noise multiplier 2.0 versus 0.8 when personalization lift falls from 5% to 1%?
details:
  realistic_solution: This is a privacy-utility tradeoff, not a pure accuracy decision. Multiplier 2.0 may be necessary for a strict privacy budget but nearly eliminates product lift. Multiplier 0.8 preserves value but may not meet policy. The decision requires target epsilon, risk tolerance, and user consent model before choosing.
  common_mistake: Choosing the setting with the best product metric without checking whether it satisfies the privacy budget.
  napkin_math: From the stated product metrics, noise multiplier 2.0 retains 1/5 = 20% of the original lift, while 0.8 retains 4/5 = 80%. This is utility retention, not a privacy-epsilon calculation.
