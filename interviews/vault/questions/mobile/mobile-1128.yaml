title: On-Device Translation Architecture on Tensor G3
scenario: You are designing a real-time, on-device live translation feature for a mobile device powered by the Google Tensor G3 (7.5 TOPS TPU, 12 GB LPDDR5X). The system must process streaming audio, translate it, and output text with strict latency constraints.
question: Why is a specialized encoder-decoder architecture preferable to a unified decoder-only LLM for Tensor G3 live translation?
details:
  realistic_solution: The optimal design uses a specialized encoder-decoder architecture for translation rather than a general-purpose decoder-only LLM. An encoder-decoder model processes the source text through the encoder once, and the decoder attends to these dense representations, which is highly efficient on the TPU. This minimizes the KV cache memory footprint compared to a decoder-only model, ensuring the system stays well within the available LPDDR5X memory limits while maintaining high utilization of the 7.5 TOPS compute budget.
  common_mistake: |
    **The Pitfall:** Blindly selecting a unified decoder-only LLM like Gemini Nano for specialized seq2seq tasks.
    
    **The Rationale:** Candidates assume general-purpose models are universally optimal, ignoring the massive KV cache overhead during autoregressive generation.
    
    **The Consequence:** The unified model consumes excessive memory bandwidth, bottlenecking the TPU and failing strict real-time latency targets.
  napkin_math: |
    1. **Analyze Decoder-Only (1.8B INT4):** Requires ~0.9 GB memory. Generating 50 tokens requires ~180 GOPs, taking ~24ms purely in compute, but is heavily bottlenecked by continuous memory bandwidth demands for causal self-attention.
    2. **Analyze Encoder-Decoder (400M INT8):** Takes only ~400 MB. The encoder runs in a single pass.
    3. **Compare Attention Needs:** The decoder's cross-attention KV cache scales only with the input length, saving >50% of the memory footprint.
    4. **Result:** The specialized architecture **drastically reduces memory bandwidth pressure**, allowing the 7.5 TOPS TPU to hit real-time targets efficiently.
