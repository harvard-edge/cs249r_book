title: Watchdog Timer Sizing for Hexagon NPU
scenario: You are deploying a driver monitoring model on the Qualcomm Hexagon NPU. The INT8 model requires 90 Giga-Operations (GOPs) per frame. To comply with functional safety, you must configure a hardware watchdog timer with a 3x safety margin over theoretical peak execution.
question: What watchdog timeout should be set for a 90 GOPS Hexagon NPU frame with a 3x contention safety margin?
details:
  realistic_solution: To calculate the strict hardware threshold, derive the absolute theoretical minimum compute time using the NPU's peak INT8 performance specification. Then, multiply that foundational number by the required safety margin to absorb temporary memory bus stalls without false triggering.
  common_mistake: |
    **The Pitfall:** Setting the hardware watchdog timeout based on empirical average runtime rather than theoretical worst-case execution bounds.
    **The Rationale:** Failing to recognize that standard OS memory contention legitimately slows execution far beyond the clean benchmark averages.
    **The Consequence:** The vehicle control unit executes dangerous false system resets during normal, expected bursts of heavy GPU/ISP memory contention.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Workload requirement: 90 GOPs per frame.
       - Hexagon NPU Peak Compute capacity: 45 TOPS (45,000 GOPs/sec).
       - Strict safety margin multiplier: 3x.
    2. **Calculations:**
       - Minimum theoretical compute time: 90 GOPs / 45,000 GOPs/sec = 0.002 seconds (2 ms).
       - Safety threshold calculation: 2 ms * 3 = 6 ms.
    3. **Conclusion & Interpretation:**
       **Result: Compute-Bound. The watchdog timer must be rigorously locked to exactly 6 ms to accommodate hardware memory contention without risking catastrophic false-positive resets.**
