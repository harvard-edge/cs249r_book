title: Watchdog Timer Sizing for Hexagon NPU
scenario: You are deploying a driver monitoring model on the Qualcomm Hexagon NPU (Snapdragon 8 Gen 3). The INT8 model requires 90 Giga-Operations (GOPs) per frame. To comply with functional safety, you must configure a hardware watchdog timer with a 3x safety margin over theoretical peak execution.
question: What watchdog timeout should be set for a 90 GOPS Hexagon NPU frame with a 3x contention safety margin?
details:
  realistic_solution: The correct approach requires calculating the absolute minimum compute time using the NPU's peak INT8 performance, then multiplying by the safety margin to account for memory stalls.
  common_mistake: |
    **The Pitfall:** Failing to calculate theoretical peak correctly or ignoring memory contention margins.
    **The Rationale:** Setting the watchdog based on average runtime instead of worst-case execution time (WCET).
    **The Consequence:** False system resets during normal heavy GPU/ISP memory contention.
  napkin_math: |
    - NPU Peak: 45 TOPS = 45,000 GOPs/sec.
    - Theoretical compute time: 90 GOPs / 45,000 GOPs/sec = 0.002 seconds (2 ms).
    - Safety margin: 2 ms * 3 = 6 ms.
    - **The watchdog timer must be set to 6 ms.**
