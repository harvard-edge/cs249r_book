title: A17 Pro Mobile Model Memory Footprint
scenario: You are designing an on-device machine learning model for a new feature on an iPhone, targeting
  the Apple A17 Pro chip with its 35 TOPS Neural Engine and 8 GB of unified memory. The model needs to
  perform real-time semantic segmentation on 720p (1280x720) video streams at 30 FPS. The model's active
  parameters and intermediate activations must fit within a dedicated 500 MB memory budget to leave room
  for the OS and other applications. Propose a simplified convolutional neural network architecture (e.g.,
  specify number of layers, filter sizes, and feature map dimensions) and estimate its total trainable
  parameters and peak memory footprint. Based on your estimations, is your proposed architecture feasible
  given the memory constraint?
question: "Based on your estimations, is your proposed architecture feasible given the memory constraint?"
details:
  realistic_solution: A solid solution involves proposing a lightweight architecture common in mobile
    ML (e.g., depthwise separable convolutions). The candidate should systematically calculate parameters
    per layer, sum them for total parameters, and then estimate the peak memory usage by identifying the
    largest activation tensor. They should explicitly state assumptions about data types (e.g., FP16 for
    activations and weights) and include calculations for input/output buffers. A feasibility check against
    the 500 MB budget is essential, along with suggesting optimization strategies like quantization (INT8)
    if needed.
  common_mistake: Candidates might only count trainable parameters, forgetting about the memory footprint
    of intermediate activations and input/output tensors, especially in real-time streaming scenarios.
    They might also neglect data types (e.g., FP32 vs FP16/INT8) and the implications for memory and computational
    efficiency. Overlooking batch size effects on activation memory is also common.
  napkin_math: '**1. Parameter Count (example, 3x3 Conv layer with bias):** `(Kernel_H * Kernel_W * In_Channels
    + 1) * Out_Channels`

    **2. Memory for all Weights (FP16):** `Total_Parameters * 2 bytes/parameter`

    **3. Memory for a single Activation Map (FP16):** `Height * Width * Channels * 2 bytes/activation`

    **4. Peak Memory Footprint:** Sum of (Weights Memory + Largest Activation Memory + Input/Output buffer
    Memory). Ensure all values are in consistent units (e.g., MB).'
