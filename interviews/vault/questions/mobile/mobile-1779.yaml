title: Flash Attention Kernel Portability to Snapdragon Hexagon DSP
scenario: A team wants to run a 3B transformer model with 4096-token context on Snapdragon
  8 Gen 3 (45 TOPS INT8) for real-time translation. They propose porting the Flash
  Attention CUDA kernel to the Hexagon DSP. The Hexagon has 256KB L2 cache and 32KB
  TCM (Tightly Coupled Memory).
question: How would you evaluate porting Flash Attention to Hexagon DSP versus using
  Snapdragon GPU/QNN attention operators?
details:
  realistic_solution: Use Qualcomm's QNN SDK which has a built-in optimized attention
    operator for the Adreno GPU (not Hexagon). The Adreno GPU on Snapdragon 8 Gen
    3 supports custom ops via QNN Graph API. For seq_len=4096, use the Adreno-optimized
    attention with tiling to its 256KB shared memory. Hexagon DSP is better suited
    for post-processing, not attention.
  common_mistake: Directly porting CUDA Flash Attention to Hexagon HVX intrinsics.
    The Hexagon DSP uses vector extension (HVX) with 128-byte vectors, not warp-level
    parallelism. CUDA warp semantics (shuffle, ballot) have no equivalent; the tiling
    strategy must be redesigned for Hexagon's VLIW architecture.
  napkin_math: 'Hexagon DSP TCM: 32KB. Attention tile for d=64: Q tile (32*64*2) +
    K tile (32*64*2) + V tile (32*64*2) = 12KB. Fits in TCM. But HVX throughput: 512
    MACs/cycle at 1GHz = 512 GMAC/s = ~1 TOPS. Full attention at seq=4096, d=64, 1
    head: 2*4096^2*64 = 2.1 GFLOP. At 1 TOPS: 2.1ms/head. With 32 heads: 67ms/layer,
    4 layers = 270ms — too slow for real-time. Adreno GPU at ~10 TOPS: 27ms total
    — feasible.'
