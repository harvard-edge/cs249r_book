title: Describe hardware FIFO usage for smartwatch sensor duty cycling
scenario: A heart-rate monitoring algorithm on a smartwatch wakes up the main CPU every 10 milliseconds to check the sensor data, heavily draining the battery.
question: Describe how modifying the sensor's hardware FIFO buffer configuration can improve the system's duty cycle.
details:
  realistic_solution: |
    Configure the hardware sensor to use a FIFO buffer that holds 100 consecutive readings. This allows the CPU to sleep for 1 full second and process a large batch at once via an interrupt. The CPU stays in a low-power deep sleep state far longer, drastically reducing energy wasted on wake-up and state-transition overhead.
  common_mistake: |
    **The Pitfall:** Thinking that processing 100 items at once takes more energy than processing 1 item 100 times.
    **The Rationale:** Candidates focus only on the active processing time.
    **The Consequence:** They completely ignore the massive power costs of CPU wake/sleep state transitions.
  napkin_math: |
    - Wake interval: 10ms per sample.
    - Batching 100 samples allows: 10ms * 100 = **1000ms uninterrupted sleep**.
    - Duty cycle drastically improves.
