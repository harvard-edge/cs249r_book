title: Describe hardware FIFO usage for smartwatch sensor duty cycling
scenario: A heart-rate monitoring algorithm on a smartwatch wakes up the main CPU
  every 10 milliseconds to check the sensor data, heavily draining the battery.
question: Describe how modifying the sensor's hardware FIFO buffer configuration can
  improve the system's duty cycle.
details:
  realistic_solution: Configure the hardware sensor to use a FIFO buffer that holds
    100 consecutive readings. This allows the CPU to sleep for 1 full second and process
    a large batch at once via an interrupt. The CPU stays in a low-power deep sleep
    state far longer, drastically reducing energy wasted on wake-up and state-transition
    overhead.
  common_mistake: Thinking that processing 100 items at once takes more energy than
    processing 1 item 100 times, ignoring the CPU wake/sleep transition power costs.
  napkin_math: 10ms per sample * 100 samples = 1000ms uninterrupted sleep
