title: The On-Device LLM Feasibility Check
scenario: Your PM saw Apple's on-device LLM demo and wants you to ship a 3B parameter chatbot in your
  app by next quarter. Walk through the feasibility analysis — memory, compute, latency, and battery —
  and tell the PM what's actually possible.
question: "How would you assess whether a 3B on-device chatbot can meet memory, latency, battery, and app-size constraints on a phone?"
details:
  realistic_solution: 'Walk through each constraint: Memory: ~1.5 GB (INT4 weights) + ~0.2 GB quantization
    metadata ≈ 1.7 GB ✓. Decode: 19.5ms/token → 51 tok/s ✓. Prefill: 88ms for 512 tokens ✓. Battery: 1%
    per 100 conversations ✓. App size: 1.5 GB model (download on WiFi, not in app bundle). Feasible'
  common_mistake: '"3B parameters is too big for a phone — it''s impossible." It''s not impossible, but
    the constraints are severe and the PM needs to understand the trade-offs.'
  napkin_math: '3B params at INT4 = 1.5GB weights. On A17 Pro (51.2GB/s): memory-bound token generation
    takes 1.5GB / 51.2GB/s = 29ms/token (34 tok/sec). Prefill 512 tokens: Compute bound at 35 TOPS, ~512*3B*2
    / 35T = 87ms. Battery: 1.5W NPU for 10s = 15J. Total battery capacity is 40,000J, so 1% = 26 chats.'
