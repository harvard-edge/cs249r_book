title: The On-Device LLM Feasibility Check
scenario: Your PM saw Apple's on-device LLM demo and wants you to ship a 3B parameter chatbot in your app by next quarter.
question: "Walk through the feasibility analysis — memory, compute, latency, and battery — to assess whether a 3B on-device chatbot can meet phone constraints."
details:
  realistic_solution: 'Walk through each constraint: Memory: ~1.5 GB (INT4 weights) + ~0.2 GB quantization metadata ≈ 1.7 GB ✓. Decode: ~29ms/token → ~34 tok/s ✓. Prefill: 88ms for 512 tokens ✓. Battery: 1% per ~26 conversations ✓. App size: 1.5 GB model (download on WiFi, not in app bundle). Feasible'
  common_mistake: |
    **The Pitfall:** Dismissing the request entirely by stating "3B parameters is too big for a phone — it's impossible."
    **The Rationale:** Engineers often anchor on FP16 or FP32 sizes, assuming a 3B model requires 6GB+ of RAM, which exceeds mobile app memory limits.
    **The Consequence:** The PM is given an overly pessimistic assessment, missing the opportunity to leverage INT4 quantization and NPU offloading which makes it feasible, albeit constrained.
  napkin_math: |
    - **Weights:** 3B params at INT4 = 1.5GB weights.
    - **Memory Bandwidth:** On A17 Pro (51.2 GB/s), memory-bound token generation takes 1.5 GB / 51.2 GB/s = 29.3ms/token.
    - **Decode Rate:** 1 / 0.0293s = **34.1 tokens/sec**.
    - **Prefill (Compute Bound):** 512 tokens * 3B params * 2 OPS/MAC = 3.07 Tera-Operations. At 35 TOPS, this takes 3.07 / 35 = **88ms**.
    - **Battery:** Assuming the NPU draws 1.5W, 10 seconds of inference consumes 15 Joules. A typical phone battery has ~40,000J capacity. 1% of battery = 400J, which allows for 400J / 15J = **~26 long chats**.
