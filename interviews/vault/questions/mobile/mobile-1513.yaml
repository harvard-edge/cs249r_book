title: Dual-Core NPU Operator Scheduling for Memory Contention
scenario: You are tasked with designing an operator execution schedule for a parallelized
  vision transformer deploying on the Samsung Exynos 2400 NPU. The SOC features a
  dual-core NPU delivering 34.7 TOPS, but it relies on a shared 12 GB LPDDR5X memory
  pool with the CPU, GPU, and ISP. Your goal is to specify a scheduling strategy that
  balances parallel operator execution across the two NPU cores while preventing severe
  memory bandwidth bottlenecks caused by simultaneous large memory accesses.
question: How should dual-core Exynos NPU scheduling interleave compute-bound and
  memory-bound operators?
details:
  realistic_solution: The design should interleave compute-bound operators with memory-bound
    operators across the two cores. Furthermore, aggressive layer fusion (e.g., fusing
    MatMul with LayerNorm and GeLU) must be specified to keep intermediate activations
    within the NPU's local SRAM. The scheduler should sequence independent high-bandwidth
    operators rather than parallelizing them, ensuring the shared memory bus remains
    unsaturated.
  common_mistake: Candidates often assume that fully parallelizing independent network
    branches across the two NPU cores will automatically yield peak performance. They
    fail to analyze the shared memory constraint, where simultaneous large DMA requests
    from both cores (plus ISP/GPU traffic) saturate the LPDDR5X bus, causing the 34.7
    TOPS compute units to stall.
  napkin_math: The Exynos 2400 NPU provides 34.7 TOPS. Assuming INT8, 1 op = 1 byte,
    so moving all data to main memory requires 34.7 TB/s for full utilization. LPDDR5X
    bandwidth is typically around 68.2 GB/s. For a 4 MB intermediate tensor, writing
    and reading it back from shared RAM takes (4MB + 4MB) / 68.2 GB/s ≈ 0.117 ms.
    If two cores parallelize branches creating two such tensors simultaneously, the
    0.117 ms delay is forced to serialize at the bus level. By fusing these operations
    to keep the 4 MB tensors in SRAM, we save 8 MB of main memory traffic per block,
    reclaiming the 0.117 ms latency and preserving shared bandwidth for the ISP.
