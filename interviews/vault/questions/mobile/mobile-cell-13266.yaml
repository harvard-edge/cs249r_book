title: Design On-Device LLM Architecture for Tensor G3 Within Thermal Budget
scenario: 'Google''s Tensor G3 (15 TOPS TPU, 51.2 GB/s LPDDR5, 8-12GB RAM) must run a conversational LLM
  within a 3W continuous power budget (thermal limit to prevent throttling). The TPU draws 2W during inference.
  Design a model architecture (parameters, layers, quantization) that achieves >80% accuracy on MMLU-Mini
  while meeting: <3W power, <500ms TTFT (time to first token) for 512-token prompts, <50ms/token decode
  speed.'
details:
  realistic_solution: 'Power constraint: 2W TPU → 1W remaining for CPU/memory. Memory bandwidth power:
    51.2 GB/s × (1V × 0.8A/efficiency) ≈ LPDDR5 consumes ~0.5W at 50% utilization. Total ≈ 2.5W < 3W.
    TTFT < 500ms for 512 tokens at 15 TOPS: prefill FLOPs budget = 15T × 0.5s = 7.5T. FLOPs for 512 tokens:
    2N × 512 = 7.5T → N_max = 7.5T/1024 = 7.3B parameters. Decode < 50ms/token: BW-limited = model_bytes
    / 51.2 GB/s. At 50ms: model = 51.2 × 0.05 = 2.56GB → max params at INT4: 2.56GB / 0.5B/param = 5.12B
    params. Constrained by decode: N=5B, INT4, 32 layers, 8 GQA heads. MMLU-Mini accuracy: 5B well-tuned
    ≈ 72-78%. May need INT8 KV + speculative decode to hit 80% target.'
  common_mistake: Maximizing model size for accuracy without verifying TTFT and decode speed; at 51.2
    GB/s, large models hit memory-bandwidth limits that violate latency constraints.
  napkin_math: 'TTFT constraint: 15 TOPS × 0.5s = 7.5T FLOPs for 512T → N ≤ 7.3B. Decode constraint: 51.2
    GB/s × 0.05s = 2.56GB model max → N ≤ 5.12B at INT4. Binding: decode constraint → 5B params. Power:
    2W TPU + 0.5W DRAM = 2.5W < 3W ✓. TTFT: 2×5B×512=5.12T FLOPs / 15T=341ms < 500ms ✓.'
