title: Optimizing Inverted Residuals on Google Tensor G3
scenario: You are deploying a custom CNN based on the MobileNetV2 architecture for real-time video segmentation
  on the Google Tensor G3. During profiling, you notice that despite the 7.5 TOPS on-device TPU and ample
  12 GB LPDDR5X RAM, your model is underutilizing the compute units and suffering from high memory bandwidth
  constraints. The bottleneck traces back to the inverted residual blocks with large expansion factors
  paired with depthwise convolutions. Diagnose why this block design is inefficient on the Tensor G3 and
  quantify a structural change to improve utilization.
details:
  realistic_solution: The optimal approach is to replace standard inverted residual blocks with fused
    inverted residual blocks, similar to EfficientNet-EdgeTPU. By fusing the initial 1x1 expansion convolution
    and the 3x3 depthwise convolution into a single regular 3x3 convolution, you significantly increase
    the arithmetic intensity. This perfectly aligns with the Tensor G3 TPU's strengths, trading a theoretical
    increase in total FLOPs for a massive reduction in intermediate memory accesses.
  common_mistake: Candidates often suggest aggressive quantization or pruning without addressing the fundamental
    architectural mismatch. They frequently fail to realize that depthwise convolutions have very low
    arithmetic intensity (FLOPs/byte), making them memory-bandwidth bound on TPU architectures which are
    heavily optimized for dense matrix multiplications.
  napkin_math: 'For input channels C=256, spatial size 56x56, and expansion ratio 6: A standard block
    creates an intermediate tensor of 1536 channels (56*56*1536 ≈ 4.8M elements, ~9.6MB in FP16). Writing
    and reading this intermediate tensor to the 12 GB LPDDR5X (assuming 60 GB/s bandwidth) takes ~0.32ms
    per block. Fusing the 1x1 and 3x3 depthwise into a 3x3 regular conv avoids this 9.6MB memory roundtrip.
    The fused 3x3 conv adds roughly 1.7 GFLOPs. On the 7.5 TOPS Tensor G3 TPU, this extra compute takes
    only ~0.22ms (assuming perfect utilization). The memory time saved (0.32ms) exceeds the compute time
    added (0.22ms), yielding a net latency reduction of 0.1ms per block while drastically improving TPU
    utilization.'
