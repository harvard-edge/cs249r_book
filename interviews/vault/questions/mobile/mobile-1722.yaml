title: Diagnosing Mobile Gesture Model Bias on Exynos NPU
scenario: You are deploying a new on-device object detection model for a novel gesture recognition feature. Initial lab tests show 95% accuracy, but field reports indicate a high false-negative rate for certain gestures. Your team suspects issues with the dataset curation and labeling process.
question: How would you diagnose real-world gesture false negatives as a dataset curation and labeling problem?
details:
  realistic_solution: |
    Implement a data-centric debugging pipeline using programmatic slice evaluation to isolate failure modes (e.g., low-light, occlusion). Buffer false-negative frames locally and upload them to a centralized dashboard (e.g., MLflow/W&B) for visual inspection. Re-evaluate inter-annotator agreement (IAA) metrics for failing classes and deploy Active Learning (e.g., uncertainty sampling) to prioritize labeling informative edge cases from the fleet.
  common_mistake: |
    **The Pitfall:** Prematurely assuming model architecture flaws.
    **The Rationale:** Candidates often jump to complex model modifications or retraining without performing a deep, data-centric root cause analysis of distribution shifts.
    **The Consequence:** Wasting engineering cycles tweaking model parameters when the actual problem is poor labeling or unrepresentative training data.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Mobile Memory: 12 GB LPDDR5X (12,288 MB)
       - Frame Size: Compressed 1080p image = 0.5 MB/frame
    2. **Calculations:**
       - Local Buffer Capacity: 12,288 MB / 0.5 MB/frame = ~24,576 frames
    3. **Conclusion & Interpretation:** **The device can buffer tens of thousands of frames for analysis. Result: Data Quality-Bound.**
