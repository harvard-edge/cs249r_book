title: Diagnosing Mobile Gesture Model Bias on Exynos NPU
scenario: You are deploying a new on-device object detection model for a novel gesture recognition feature on the Samsung Exynos 2400 NPU. Initial lab tests show 95% accuracy, but field reports indicate a high false-negative rate for certain gestures in varied environments. The model's resource utilization on the NPU is well within limits. Your team suspects issues with the dataset curation and labeling process.
question: How would you diagnose real-world gesture false negatives on Exynos 2400 as a dataset curation and labeling problem?
details:
  realistic_solution: Implement a detailed data error analysis pipeline. First, collect and analyze failing samples (false negatives) from the field, categorizing them by environmental factors (e.g., lighting, background clutter) and gesture variations. Visualize these failing samples alongside successfully predicted ones and compare their characteristics with the original training and validation sets to identify distribution shifts. Secondly, conduct an audit of the annotation workflow for the problematic gestures, including a re-evaluation of inter-annotator agreement (IAA) metrics for difficult or ambiguous cases, potentially involving an expert review. Leverage active learning strategies to identify and prioritize the labeling of underrepresented yet informative samples that are causing the field performance degradation. Finally, develop and monitor specific data quality metrics (e.g., 'lighting variance score', 'occlusion density') to proactively detect and prevent similar biases in future dataset iterations.
  common_mistake: |
    **The Pitfall:** Prematurely assuming model architecture flaws.
    **The Rationale:** Candidates often jump to complex model modifications or retraining without performing a deep, data-centric root cause analysis of distribution shifts.
    **The Consequence:** Wasting engineering cycles tweaking model parameters when the actual problem is poor labeling or unrepresentative training data.
  napkin_math: |
    1. **Memory Capacity:** 12 GB LPDDR5X memory = 12,288 MB.
    2. **Frame Size:** Compressed 1080p image = ~0.5 MB/frame.
    3. **Buffer Calculation:** 12,288 MB / 0.5 MB/frame = 24,576 frames.
    4. **Conclusion:** **The Exynos 2400 has ample capacity to locally buffer tens of thousands of frames for real-time analysis of false negatives.**
