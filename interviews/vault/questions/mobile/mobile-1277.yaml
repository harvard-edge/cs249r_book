title: Diagnosing TPU Throttling During Sustained Gemini Nano Generation
scenario: You are deploying a live transcription and summarization feature using Gemini
  Nano on the Google Tensor G3. Users report that the feature is highly responsive
  for the first 30 seconds, utilizing the on-device TPU effectively. However, after
  45 seconds of continuous operation, the token generation speed drops by over 60%
  and the device chassis becomes noticeably warm, despite the 12 GB LPDDR5X memory
  utilization remaining perfectly flat. What is the root cause of this symptom, and
  how do you verify it?
question: Why does Gemini Nano on Tensor G3 slow by over 60% after 45 s while LPDDR5X
  memory use stays flat?
details:
  realistic_solution: The symptom strongly indicates thermal throttling. The Tensor
    G3's TPU is optimized for bursty on-device LLM workloads but cannot sustain continuous
    heavy utilization indefinitely within a passively cooled smartphone chassis. As
    continuous generation heats up the SoC past its safe thermal envelope, the operating
    system aggressively scales down the TPU clock frequency to prevent hardware damage.
    Verification requires tracing the device's thermal zones alongside TPU clock speeds
    to confirm the frequency drop aligns exactly with the temperature trip point.
  common_mistake: Candidates often misdiagnose this as a memory leak, KV cache saturation,
    or an application-layer garbage collection issue, ignoring the physical heat symptom.
    They might suggest optimizing the model architecture or weights rather than addressing
    the hardware's physical operating constraints.
  napkin_math: The Tensor G3 TPU offers a peak of 7.5 TOPS. Assume running Gemini
    Nano requires 2 TOPS to sustain 20 tokens/sec. While 2 TOPS is well under the
    7.5 TOPS peak, the continuous compute and constant fetching from the 12 GB LPDDR5X
    consumes significant power. If the device's sustained passive thermal dissipation
    limit is 2.5W, but the active TPU and memory draw 4.5W, there is a net 2W of heat
    accumulation. If the SoC heats up by 1°C for every 1.5 Joules of excess thermal
    energy, 2W (2 Joules/sec) raises the temperature by ~1.33°C per second. Starting
    at an ambient 25°C, in 30 seconds the SoC hits ~65°C. This triggers the OS thermal
    mitigation, immediately throttling the TPU power draw down to the 2.5W limit,
    which severely cuts the available TOPS and plummets the token generation speed.
