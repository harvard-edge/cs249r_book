title: Optimizing Neural Network Inference on Apple A17 Pro for Energy Efficiency
scenario: You are tasked with designing an energy-efficient on-device neural network inference system for a new augmented reality application running on a mobile SoC. Your goal is to deploy a large language model (LLM) that performs real-time semantic segmentation on video frames. Given the constraints of a mobile device, energy consumption and thermal management are paramount.
question: How would you architect the system to minimize energy per operation, considering the Horowitz energy table, the energy cost of memory access versus compute, and energy-aware operator selection?
details:
  realistic_solution: |
    A robust architecture requires minimizing off-chip DRAM accesses. Utilize aggressive Post-Training Quantization (INT4/INT8) and operator fusion to maximize data reuse in on-chip SRAM caches. Design data layouts that exploit spatial/temporal locality, and dynamically schedule operators using Dynamic Voltage and Frequency Scaling (DVFS) to keep the NPU within its peak energy-efficiency curve rather than running at maximum TOPS.
  common_mistake: |
    **The Pitfall:** Focusing solely on reducing FLOPs without addressing memory access costs.
    **The Rationale:** Candidates assume that lower computational complexity naturally leads to lower power consumption, ignoring that reading from LPDDR DRAM costs orders of magnitude more energy than executing an on-chip MAC operation.
    **The Consequence:** The model achieves its target latency but rapidly drains the device battery and triggers thermal throttling.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - INT8 MAC on-chip: ~0.1 pJ/op.
       - 32-bit DRAM access: ~1000 pJ/access.
       - Compute requirement: 10 TOPS.
       - Access ratio: 1 memory access per 100 MACs.
    2. **Calculations:**
       - Compute energy: 10 * 10^12 ops/s * 0.1 pJ/op = 1 J/s = 1 W.
       - Memory access rate: (10 * 10^12 ops/s) / 100 = 10^11 accesses/s.
       - Memory access energy: 10^11 accesses/s * 1000 pJ/access = 100 J/s = 100 W.
    3. **Conclusion & Interpretation:**
       - **Memory access dominates compute by 100x at this ratio. Bottleneck: Power/Energy (Memory Wall).**
