title: The Route Prediction TCO Dilemma
scenario: You are an ML Systems Engineer on the 'Smart Routes' team for an automotive app with 1 million active users. The team wants to A/B test a new personalized destination prediction model. The current global cloud model has privacy concerns. You must use your systems knowledge to diagnose the economic feasibility of two proposals over a one-year period.
question: Which Smart Routes proposal is more cost-effective over time once cloud costs, FL infrastructure, and battery churn are included?
details:
  realistic_solution: |
    Proposal B (Federated Learning) is the more cost-effective solution, though the margins are close, which makes precise calculation critical. The key is to correctly model the abstract 'churn cost' from battery drain across the entire fleet and add it to the fixed infrastructure cost, then compare that sum to the recurring cloud operational costs.
  common_mistake: |
    **The Pitfall:** Focusing only on the explicit cloud training bill.
    **The Rationale:** Engineers often ignore or miscalculate second-order operational costs like data transfer or battery churn.
    **The Consequence:** They present an incomplete TCO analysis that fails to capture the true cost of operating at scale.
  napkin_math: |
    - **Proposal A (Cloud)**:
    - Data upload: 1M users * 20 location pings/day * 200 bytes = 4 GB/day.
    - Cloud training: Daily retraining on location data. GPU cost: ~$50/day.
    - Cloud inference: 1M * 5 predictions/day * 2ms = 10,000 GPU-sec/day = 2.8 GPU-hr/day * $3.50 = $9.80/day.
    - Data transfer: 4 GB/day * $0.09/GB = $0.36/day.
    - Annual cloud cost: ($50 + $9.80 + $0.36) * 365 = **~$22K/year**.
    - **Proposal B (FL)**:
    - On-device training: 5 min/round, once/week. Power: ~100 mW * 300s = 30,000 mWs = 8.33 mWh per round.
    - Battery impact: 8.33 mWh / 15,000 mWh = 0.056% -> barely perceptible.
    - Churn cost estimate: Assume 0.01% churn from battery impact = 100 users. At $5 LTV/user: 100 * $5 = $500/year.
    - Aggregation server: 1M * 2 KB gradient * 52 rounds = 104 GB/year. Server: ~$200/month = $2,400/year.
    - Engineering: $80K one-time.
    - Year 1 total: $80K + $2,400 + $500 = **~$82,900**.
    - Year 2+ total: **~$2,900/year**.
  options:
  - Proposal A is cheaper. The battery drain cost for Proposal B is over $700k because the energy calculation was not converted from minutes to hours.
  - Proposal B is significantly cheaper (by over $60k), as the only cost is the user battery impact; the server cost is negligible.
  - Proposal B is cheaper in the long run (saving ~$19,100/year in recurring costs), despite higher Year 1 CapEx. The cloud training cost for A is significantly higher than the combined FL server and fleet-wide battery 'churn' cost for B.
  - Proposal A is cheaper by ~$58,000. The Federated Learning 'churn cost' alone is higher than the entire cloud budget.
  correct_index: 2
