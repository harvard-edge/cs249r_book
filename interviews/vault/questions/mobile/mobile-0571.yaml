title: The Route Prediction TCO Dilemma
scenario: You are evaluating the economic feasibility of a personalized destination prediction model for an automotive app with 1 million active users over a one-year period. You must compare a cloud-based architecture versus an on-device Federated Learning approach.
question: Which Smart Routes proposal is more cost-effective over time once cloud costs, FL infrastructure, and battery churn are included?
details:
  realistic_solution: |
    Proposal B (Federated Learning) is fundamentally more cost-effective at scale. The key architectural insight is properly modeling the fleet-wide 'churn cost' driven by battery drain and aggregating it with fixed FL infrastructure costs (parameter servers, SecAgg protocols). By distributing the compute to the edge, FL entirely eliminates the massive variable OpEx of cloud GPU instances and ingress/egress bandwidth, making the long-term TCO overwhelmingly favorable despite higher initial CapEx.
  common_mistake: |
    **The Pitfall:** Focusing only on the explicit cloud training bill.
    **The Rationale:** Engineers often ignore or miscalculate second-order operational costs like data transfer or battery churn.
    **The Consequence:** They present an incomplete TCO analysis that fails to capture the true cost of operating at scale.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - User base: 1M active users.
       - Cloud Proposal: 4 GB/day data transfer, $50/day GPU training, $9.80/day GPU inference.
       - FL Proposal: 5 min/week on-device training, $80K one-time CapEx, $2,400/yr parameter server.
       - Churn cost: 0.01% of users lost due to battery impact at $5 LTV = $500/year.
    2. **Calculations:**
       - Cloud OpEx per day = $50 (train) + $9.80 (infer) + $0.36 (transfer) = $60.16/day.
       - Annual Cloud Cost = $60.16 * 365 = ~$21,958/year.
       - FL Year 1 Cost = $80,000 (CapEx) + $2,400 (Server) + $500 (Churn) = $82,900.
       - FL Year 2+ Cost = $2,400 + $500 = $2,900/year.
    3. **Conclusion & Interpretation:**
       - **Result: OpEx-Bound (Cloud).** While FL has a high Year 1 CapEx, its recurring cost of ~$2,900/year drastically outperforms the Cloud's ~$22K/year. Proposal B is definitively cheaper in the long run.
  options:
  - Proposal A is cheaper. The battery drain cost for Proposal B is over $700k because the energy calculation was not converted from minutes to hours.
  - Proposal B is significantly cheaper (by over $60k), as the only cost is the user battery impact; the server cost is negligible.
  - Proposal B is cheaper in the long run (saving ~$19,100/year in recurring costs), despite higher Year 1 CapEx. The cloud training cost for A is significantly higher than the combined FL server and fleet-wide battery 'churn' cost for B.
  - Proposal A is cheaper by ~$58,000. The Federated Learning 'churn cost' alone is higher than the entire cloud budget.
  correct_index: 2
