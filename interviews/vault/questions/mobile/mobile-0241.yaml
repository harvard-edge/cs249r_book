title: The First-Word Latency Test
scenario: You are optimizing an on-device LLM for a 'live autocomplete' feature. As the user types, the model streams predicted words to complete their sentence. To make the feature feel seamless, the *very first* predicted word must appear almost instantly after the user pauses.
question: Which metric is most critical to minimize for this initial perception of responsiveness?
details:
  realistic_solution: Time To First Token (TTFT) is the most critical metric. For an interactive UI feature, the user needs immediate feedback. A low TTFT (e.g., under 100ms) ensures the first word appears instantly, creating the perception of a real-time system. While a low Time Per Output Token (TPOT) is important for smoothly streaming the rest of the phrase, a high TTFT creates a jarring initial pause that destroys the 'live' feeling.
  common_mistake: |
    **The Pitfall:** Over-indexing on raw throughput (TPOT) and assuming faster overall generation is the top priority.
    **The Rationale:** Engineers ignore that the "time to first response" dominates user perception in interactive applications.
    **The Consequence:** The system feels sluggish due to a jarring initial pause, destroying the "live" feeling.
  napkin_math: |
    1. UI Jank Budget: 16ms.
    2. Human-Perceptible Latency: ~100ms.
    3. Reading Speed Token Rate: ~150ms/token (~7 tokens/sec).
    4. Compare TTFTs: 500ms TTFT feels broken; 50ms TTFT feels instant.
    **Conclusion:** TTFT must be under 100ms for instantaneous perception.
  options:
  - Time Per Output Token (TPOT)
  - Time To First Token (TTFT)
  - Model Loading Time
  - Total Generation Time for the sequence
  correct_index: 1
