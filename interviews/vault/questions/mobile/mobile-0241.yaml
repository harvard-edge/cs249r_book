title: The First-Word Latency Test
scenario: You are optimizing an on-device LLM for a 'live autocomplete' feature. As the user types, the
  model streams predicted words to complete their sentence. To make the feature feel seamless, the *very
  first* predicted word must appear almost instantly after the user pauses. Which metric is most critical
  to minimize for this initial perception of responsiveness?
question: "Which metric is most critical to minimize for this initial perception of responsiveness?"
details:
  realistic_solution: Time To First Token (TTFT) is the most critical metric. For an interactive UI feature,
    the user needs immediate feedback. A low TTFT (e.g., under 100ms) ensures the first word appears instantly,
    creating the perception of a real-time system. While a low Time Per Output Token (TPOT) is important
    for smoothly streaming the rest of the phrase, a high TTFT creates a jarring initial pause that destroys
    the 'live' feeling.
  common_mistake: Engineers often over-index on raw throughput (Time Per Output Token), assuming faster
    generation is always the top priority. This ignores the 'time to first response,' which dominates
    the user's perception of latency in interactive applications. A long initial delay makes the system
    feel sluggish, no matter how fast the subsequent tokens are.
  napkin_math: The mobile UI 'jank' budget is 16ms, and human-perceptible latency starts around 100ms.
    If your TTFT is 500ms, the user waits half a second for the first word, which feels broken. If TTFT
    is 50ms, the word appears before they've even fully processed their own action. This initial feedback
    is far more critical than the speed of subsequent tokens, which only need to keep up with reading
    speed (e.g., ~150ms/token or ~7 tokens/sec).
  options:
  - Time Per Output Token (TPOT)
  - Time To First Token (TTFT)
  - Model Loading Time
  - Total Generation Time for the sequence
