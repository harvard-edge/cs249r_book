title: Evaluate EfficientNet-Lite vs MobileNetV3 for CoreML ANE deployment accuracy-latency
scenario: You must pick a backbone for an iOS app that classifies food items (101 categories) running on iPhone 15 Pro (A17 Pro). Candidates are EfficientNet-Lite4 (0.571 GFLOPs, 80.4% top-1, ReLU6), MobileNetV3-Large 1.0× (0.22 GFLOPs, 75.2% top-1, H-swish), and MobileNetV2-1.4× (0.582 GFLOPs, 74.7% top-1, ReLU6).
question: Which CNN backbone should be selected for an accuracy-critical iOS app running on the A17 Pro ANE, and why?
details:
  realistic_solution: 'ANE mapping quality: EfficientNet-Lite4 and MobileNetV2-1.4× use ReLU6 — native ANE support, full fusion. MobileNetV3 uses H-swish — ANE approximates with hardsigmoid, adds 1 extra op per activation. Estimate: Lite4 ANE latency ~3.5ms (published by Apple ML Research); MV2-1.4× ~2.8ms; MV3-Large ~2.1ms (fewer FLOPs despite activation overhead). Accuracy on food-101 after fine-tuning: Lite4 ~91%, MV3-Large ~87%, MV2 ~85%. Decision: Lite4 for accuracy-critical use, MV3-Large for latency-critical. At 3.5ms, Lite4 easily handles 30 FPS (33ms budget).'
  common_mistake: |
    **The Pitfall:** Choosing MobileNetV3 solely because it has the fewest FLOPs.
    **The Rationale:** Engineers often equate fewer FLOPs directly with faster inference without profiling on the target hardware.
    **The Consequence:** They miss that H-swish requires sigmoid approximation on the ANE, whereas ReLU6 maps directly, sacrificing significant accuracy for an imperceptible latency gain.
  napkin_math: |
    1. **Accuracy Gain:** Food-101 domain-specific fine-tuning adds ~8-12pp. Lite4: 80.4% → ~91%. MV3-Large: 75.2% → ~87%. MV2: 74.7% → ~85%.
    2. **Theoretical Latency:** A17 Pro ANE has 35 TOPS (35,000 GFLOPs). Lite4 theoretical: 0.571 / 35,000 = 16.3 μs. MV3-Large: 0.22 / 35,000 = 6.3 μs. MV2: 0.582 / 35,000 = 16.6 μs.
    3. **Practical Latency (ANE Scheduling Overhead):** Lite4 ≈ 3.5ms, MV2 ≈ 2.8ms, MV3-Large ≈ 2.1ms (H-swish approximation overhead limits its theoretical speedup).
    4. **Decision:** All models run well under the 33ms budget for 30 FPS (or 5ms visual threshold).
    **EfficientNet-Lite4 is the best choice as it maximizes accuracy without violating latency constraints.**
