title: Evaluate EfficientNet-Lite vs MobileNetV3 for CoreML ANE deployment accuracy-latency
scenario: 'You must pick a backbone for an iOS app that classifies food items (101 categories) running on an NPU. Candidates are EfficientNet-Lite4 (0.571 GFLOPs, 80.4% top-1, ReLU6), MobileNetV3-Large 1.0× (0.22 GFLOPs, 75.2% top-1, H-swish), and MobileNetV2-1.4× (0.582 GFLOPs, 74.7% top-1, ReLU6).'
question: 'Which CNN backbone should be selected for an accuracy-critical iOS app running on the ANE, and why?'
details:
  realistic_solution: 'ANE mapping quality: EfficientNet-Lite4 and MobileNetV2-1.4× use ReLU6 — native ANE support, full fusion. MobileNetV3 uses H-swish — ANE approximates with hardsigmoid, adds 1 extra op per activation. Estimate: Lite4 ANE latency ~3.5ms (published by Apple ML Research); MV2-1.4× ~2.8ms; MV3-Large ~2.1ms (fewer FLOPs despite activation overhead). Accuracy on food-101 after fine-tuning: Lite4 ~91%, MV3-Large ~87%, MV2 ~85%. Decision: Lite4 for accuracy-critical use, MV3-Large for latency-critical. At 3.5ms, Lite4 easily handles 30 FPS (33ms budget).'
  common_mistake: |
    **The Pitfall:** Choosing MobileNetV3 solely because it has the fewest FLOPs.
    **The Rationale:** Engineers often equate fewer FLOPs directly with faster inference without profiling on the target hardware.
    **The Consequence:** They miss that H-swish requires sigmoid approximation on the ANE, whereas ReLU6 maps directly, sacrificing significant accuracy for an imperceptible latency gain.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Hardware: A17 Pro ANE (35 TOPS = 35,000 GFLOPs).
       - Target Framerate: 30 FPS (33ms budget).
       - Food-101 Domain Finetuning Gain: ~8-12pp accuracy boost.
    2. **Calculations:**
       - Theoretical Latency: Lite4 (0.571 / 35,000 = 16.3 µs), MV3-Large (0.22 / 35,000 = 6.3 µs), MV2 (0.582 / 35,000 = 16.6 µs).
       - Practical Latency (with scheduling overhead & H-swish approximation): Lite4 ≈ 3.5ms, MV2 ≈ 2.8ms, MV3-Large ≈ 2.1ms.
       - Finetuned Accuracy: Lite4 ≈ 91%, MV3-Large ≈ 87%, MV2 ≈ 85%.
    3. **Conclusion & Interpretation:**
       **Result: Compute-Sufficient for Accuracy.** All models run well under the 33ms budget. **EfficientNet-Lite4** is the optimal choice as it maximizes accuracy natively with ReLU6 without violating latency limits.
