title: The Model Rollback Nightmare
scenario: You pushed a new on-device food recognition model to 100% of users via your dynamic model delivery
  system. Within 2 hours, your telemetry shows a 40% spike in 'no detection' events on Samsung Galaxy
  S21 devices running Android 13. Other devices are fine. You need to rollback — but only for affected
  devices. How?
question: "How do you roll back only Samsung Galaxy S21 Android 13 users after a 40% no-detection spike?"
details:
  realistic_solution: 'Targeted rollback via model manifest with device-segment predicates. Update manifest
    to route Galaxy S21 + Android 13 users to previous model; 97% of users keep the new version. CDN invalidation:
    5 min. 90% of affected devices rolled back within 2 hours (next app launch). Net engagement: 97% x
    8% improvement = 7.76% lift retained vs 0% with global rollback. Root-cause the S21 issue (likely
    Exynos NNAPI delegate bug) and ship a targeted model variant.'
  common_mistake: '"Roll back to the previous model for all users." This punishes 90% of users who are
    working fine. The new model may be significantly better for them — a global rollback costs real engagement.'
  napkin_math: 'Affected population: Galaxy S21 Exynos on Android 13 ≈ 3% of user base. Global rollback
    cost: 97% of users lose new model improvements (estimated 8% engagement lift). Targeted rollback cost:
    3% of users temporarily on old model. Net engagement preserved: 97% × 8% = 7.76% lift retained vs
    0% with global rollback. Rollback speed: manifest update propagates in <1 hour (next app launch checks
    manifest). CDN cache invalidation: 5 minutes. 90% of affected devices rolled back within 2 hours.'
