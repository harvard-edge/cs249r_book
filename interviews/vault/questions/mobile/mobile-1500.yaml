title: On-Device DP-SGD Specification for A17 Pro Text Prediction
scenario: You are designing an on-device personalization system for a next-word prediction
  model running on the Apple A17 Pro Neural Engine. The system must use DP-SGD to
  ensure user privacy with a strict epsilon budget of 2.0 per week. You need to specify
  the batching, noise generation, and clipping strategy, ensuring the training process
  does not exceed the thermal envelope (~5W) or unified memory constraints (8 GB shared
  with CPU/GPU) while maximizing utility.
question: How would you specify on-device DP-SGD text prediction on A17 Pro with private
  clipping and noise?
details:
  realistic_solution: The optimal design leverages the unified 8 GB memory architecture
    by generating noise directly on the A17 Pro's Neural Engine or GPU (if compute-bound
    on ANE) using a vectorized PRNG. Gradient clipping is implemented via a custom
    compute shader or fused kernel to avoid moving unclipped gradients across the
    memory bus. The batch size is tuned to saturate the 16-core ANE (35 TOPS) without
    causing memory pressure that would trigger unified memory swapping.
  common_mistake: Candidates often propose generating cryptographically secure pseudo-random
    noise on the CPU and transferring it to the Neural Engine for every training step.
    This ignores the shared unified memory architecture and incurs massive synchronization
    overhead, killing performance and exceeding the 5W thermal budget.
  napkin_math: Assuming a 10M parameter model, a single FP16 gradient vector is 20MB.
    With a micro-batch size of 32, storing unclipped gradients requires 640MB, well
    within the 8GB unified memory. Noise generation requires drawing 10M samples per
    step. Generating this noise on CPU and moving it takes ~20MB of bandwidth per
    step, but generating it on ANE takes 0 external bandwidth. At 10 steps/sec, CPU
    generation costs ~200MB/s bandwidth, while fused ANE clipping and noise addition
    keeps memory bandwidth low, ensuring the system stays within the ~5W limit.
