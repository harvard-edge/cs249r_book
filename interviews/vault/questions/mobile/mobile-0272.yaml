title: The Mobile Filter Bottleneck
scenario: You're an engineer on the team developing a new real-time video filter for the next iPhone. The core component is a small CNN that performs 400 Giga-OPS (INT8) and reads/writes a total of 800 Megabytes of data per inference.
question: What is the arithmetic intensity of a 400 GOps, 800 MB mobile filter, and is it memory-bound on an A17 Pro (35 TOPS, 51.2 GB/s)?
details:
  realistic_solution: The workload is **memory-bound**. The model's Arithmetic Intensity is lower than the hardware's ridge point, meaning the memory system cannot supply data fast enough to keep the powerful compute units fully utilized. The model's performance is therefore limited by memory bandwidth, not peak compute.
  common_mistake: |
    **The Pitfall:** Concluding that a low Arithmetic Intensity value means the workload is compute-bound.
    **The Rationale:** Engineers correctly calculate the AI but mistakenly think a value lower than the ridge point indicates a compute limitation.
    **The Consequence:** This leads to optimizing arithmetic operations (which are already starving for data) instead of focusing on reducing memory transfers.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Compute Load: 400e9 Ops (400 GOps).
       - Memory Traffic: 800e6 Bytes (800 MB).
       - Hardware Peak Compute: 35 TOPS (35e12 Ops/s).
       - Hardware Memory Bandwidth: 51.2 GB/s (51.2e9 Bytes/s).
    2. **Calculations:**
       - Hardware Ridge Point: 35e12 / 51.2e9 = 683.6 Ops/Byte.
       - Model Arithmetic Intensity (AI): 400e9 Ops / 800e6 Bytes = 500 Ops/Byte.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound**. Because the AI (500 Ops/Byte) is less than the hardware ridge point (683 Ops/Byte), the filter fundamentally starves for memory bandwidth before hitting peak compute.
  options:
  - The workload is memory-bound because its AI of 500 Ops/Byte is less than the hardware's ridge point of 683 Ops/Byte.
  - The workload is compute-bound because its AI of 500 Ops/Byte is less than the hardware's ridge point of 683 Ops/Byte.
  - The workload is compute-bound because the A17's 35 TOPS is far greater than the model's 0.4 TOPS requirement.
  - The workload is memory-bound because its AI is 0.5 Ops/Byte, which is very low.
