title: Mixed-Precision Video Super-Resolution on Exynos 2400
scenario: You are tasked with specifying the precision requirements for a real-time video enhancement
  model running on the Samsung Exynos 2400 NPU. The system must process 30 FPS video while navigating
  the constraints of a shared 12 GB LPDDR5X memory pool utilized heavily by the ISP and GPU. Given the
  dual-core NPU's peak performance of 34.7 TOPS, design a mixed-precision (FP16/INT8) specification that
  maintains visual fidelity in sensitive layers without exceeding the compute budget or starving the shared
  memory bandwidth.
details:
  realistic_solution: The specification should identify sensitive layers (e.g., early feature extraction
    or final reconstruction) to remain in FP16, while transitioning the computationally dense, robust
    inner layers to INT8. The design must explicitly analyze the performance penalty of FP16, balancing
    the precision needs against the NPU compute limits and scheduling memory-intensive FP16 activations
    to avoid peak ISP contention on the shared LPDDR5X bus.
  common_mistake: Candidates often suggest uniformly quantizing the entire model to INT8 to easily fit
    within the 34.7 TOPS budget. They fail to analyze how aggressive quantization degrades sensitive layers,
    or they ignore the memory bandwidth contention on the shared 12 GB LPDDR5X, assuming compute is the
    only bottleneck.
  napkin_math: Assume the model requires 1.1 Tera-Operations per frame. At 30 FPS, 100% INT8 execution
    requires 33 TOPS, fitting the Exynos 2400 NPU's 34.7 TOPS peak. However, visual fidelity requires
    FP16. Assuming FP16 runs at half the throughput of INT8, a 90% INT8 / 10% FP16 split requires 29.7
    TOPS (INT8) + 6.6 TOPS-equivalent (FP16) = 36.3 TOPS, exceeding the limit. A specification of 95%
    INT8 and 5% FP16 requires 31.35 TOPS (INT8) + 3.3 TOPS-equivalent (FP16) = 34.65 TOPS, perfectly maximizing
    the 34.7 TOPS compute budget while managing traffic on the shared 12 GB LPDDR5X.
