title: The Google Tensor G4 TPU Trade-off
scenario: Google claims the Tensor G4 in the Pixel 9 Pro is purpose-built for AI workloads. Your team
  is choosing between the Pixel 9 Pro (Tensor G4) and the Galaxy S24 Ultra (Snapdragon 8 Gen 3) as the
  reference device for your on-device ML product. The Tensor G4 TPU is rated at 27 TOPS; the Hexagon NPU
  at 45 TOPS. Your PM says 'go with Qualcomm, it has more TOPS.' Is that the right call?
question: "Should the team choose Pixel 9 Pro Tensor G4 or Snapdragon 8 Gen 3 based only on 27 versus 45 TOPS?"
details:
  realistic_solution: 'TOPS alone is misleading. For LLM decode (memory-bandwidth-bound), what matters
    is bandwidth: Snapdragon 8 Gen 3 at 77 GB/s beats Tensor G4 at 51.2 GB/s, yielding ~22 vs ~15 tok/s
    for a 3.5GB INT4 model. But for sustained workloads, energy matters: Tensor G4 uses 24.5J per 100
    tokens (7s x 3.5W) vs Snapdragon''s 36J (4.5s x 8W) — 32% less energy. For compute-bound prefill,
    the gap narrows to ~10%. Choose Snapdragon for speed-critical chat UX, Tensor G4 for battery-sensitive
    always-on assistants. Profile your actual workload on both devices before deciding.'
  common_mistake: '"More TOPS = faster inference. Snapdragon wins." TOPS measures peak theoretical throughput
    under ideal conditions — perfectly parallelizable, perfectly memory-resident workloads. Real models
    rarely hit peak TOPS. The metric that matters is TOPS actually achieved on your specific model, and
    TOPS per watt for sustained workloads.'
  napkin_math: 'Workload: 7B-param LLM (Gemini Nano-class), INT4, decode phase. Weights: 3.5 GB. Tokens/sec
    = memory bandwidth / weight size per token. Tensor G4 LPDDR5X: 51.2 GB/s → 51.2 / 3.5 = 14.6 tok/s.
    Snapdragon 8 Gen 3 LPDDR5X: 77 GB/s → 77 / 3.5 = 22 tok/s. Qualcomm wins on bandwidth-bound LLM decode.
    But for compute-bound prefill (512 tokens): 7B params require ~14 GFLOPs/token. 512 × 14 = 7.168 TFLOPs.
    Tensor G4 TPU at 27 TOPS sustained: 7.168 / 27 = 265ms. Hexagon at 30 TOPS sustained: 7.168 / 30 = 239ms. Closer than TOPS suggests.
    Energy per 100-token response: Tensor G4: 7s × 3.5W = 24.5J. Snapdragon: 4.5s × 8W = 36J. Tensor G4
    uses 32% less energy despite being slower.'
