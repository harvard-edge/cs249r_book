title: 'Diagnosing NPU Latency on Samsung Exynos 2400: Operator Scheduling Challenges'
scenario: You are tasked with optimizing the inference latency of an LLM deployed on a Samsung Exynos 2400 NPU (34.7 TOPS, 12 GB LPDDR5X). Profiling reveals sub-optimal resource utilization due to issues with memory reuse, parallel operator execution, and layer fusion.
question: How would you diagnose the specific root causes of this performance bottleneck using NPU profiling tools?
details:
  realistic_solution: |
    The diagnostic process should begin with a detailed analysis of the model's computational graph and data dependencies. Utilize NPU-specific profiling tools (if available from Samsung or a partner SDK) to trace operator execution times, memory access patterns (reads/writes to LPDDR5X vs. on-chip buffers), and NPU core utilization.

    1. **Memory Reuse:** Analyze the operator sequence to identify opportunities for in-place operations or shared memory buffers, minimizing redundant data movement. Look for operators whose outputs are consumed immediately by subsequent operators, making them candidates for memory reuse.

    2. **Parallel Execution:** Identify independent subgraphs or operators that can execute concurrently. Map these to available NPU cores, ensuring that data dependencies are respected and that the overhead of launching parallel tasks doesn't outweigh the benefits. Profile the execution of these parallel sections to verify actual concurrency and identify any synchronization bottlenecks.

    3. **Layer Fusion:** Examine adjacent operators that can be fused into a single, more efficient NPU operation. For example, a convolution followed by a ReLU activation can often be fused. This reduces memory accesses and kernel launch overhead. Investigate the Exynos 2400's specific fusion capabilities.

    The diagnosis should produce a clear map of memory traffic, NPU core idle times, and a detailed breakdown of execution latency per operator, highlighting where the actual bottlenecks (memory, computation, or transfer) lie.
  common_mistake: |
    **The Pitfall:** Applying general GPU/CPU optimization heuristics without NPU context.
    **The Rationale:** Candidates prioritize parallel execution of all operators, causing LPDDR5X memory spills that negate parallelization benefits.
    **The Consequence:** Increased memory transfer overhead and degraded performance instead of latency improvements.
  napkin_math: |
    - **Compute Time Ideal:** M MACs * 2 / 34.7 TOPS.
    - **Memory Transfer Time Minimum:** D bytes / 60 GB/s LPDDR5X bandwidth.
    - **Theoretical Latency:** Compute Time + Transfer Time.
    - **Analysis:** If observed latency T_obs >> Theoretical Latency, the gap quantifies overhead from poor scheduling, cache misses, or kernel launch delays.
    - **Result:** **This gap isolates the exact duration of scheduling inefficiencies that must be eliminated.**
