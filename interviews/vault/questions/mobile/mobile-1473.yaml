title: On-Device Curation Memory Limit
scenario: You are curating a dataset to train an on-device personalization model. The pipeline will filter and label data locally using a mobile 16-core Neural Engine.
question: "What is the total unified memory capacity shared between the CPU, GPU, and Neural Engine on the Apple A17 Pro?"
details:
  realistic_solution: The correct hardware specification is 8 GB of shared unified memory. Remembering this specification is critical because on-device data curation, active learning buffers, and model weights must all share this same 8 GB pool with the OS and other applications.
  common_mistake: |
    **The Pitfall:** Mistaking mobile memory architectures for having dedicated VRAM.
    **The Rationale:** Candidates recall older discrete architectures and fail to realize the OS, apps, and NPU all compete for the same physical RAM.
    **The Consequence:** Incorrectly sizing active learning buffers, leading to background process termination by the OS out-of-memory killer.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Total Unified Memory: 8 GB.
       - OS / Background App Overhead: ~4 GB.
       - Uncompressed Image Size: 3 MB array.
    2. **Calculations:**
       - Available RAM for Curation Pipeline: 8 GB - 4 GB = 4 GB (4096 MB).
       - Max Images in RAM: 4096 MB / 3 MB = ~1365 images.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound (Capacity)**
       - The curation pipeline cannot hold more than ~1365 uncompressed images simultaneously without triggering OS eviction.
