title: On-Device Curation Memory Limit
scenario: You are curating a dataset to train an on-device personalization model for
  the Apple A17 Pro Neural Engine. The pipeline will filter and label data locally
  using the 16-core Neural Engine, which operates at an efficient ~5W and delivers
  35 TOPS. To properly size the maximum batch of high-resolution images you can hold
  in memory during this on-device curation process, you must recall the memory specifications
  of the chip. What is the total unified memory capacity shared between the CPU, GPU,
  and Neural Engine on the Apple A17 Pro?
question: What is the total unified memory capacity shared between the CPU, GPU, and
  Neural Engine on the Apple A17 Pro?
details:
  realistic_solution: The correct hardware specification is 8 GB of shared unified
    memory. Remembering this specification is critical because on-device data curation,
    active learning buffers, and model weights must all share this same 8 GB pool
    with the OS and other applications.
  common_mistake: Candidates often mistake mobile memory architectures for having
    dedicated VRAM, or they might recall older generation mobile specifications like
    4 GB or 6 GB instead of the correct specification for the A17 Pro.
  napkin_math: Total unified memory = 8 GB (8192 MB). Assuming the OS and background
    apps consume 4 GB, this leaves 4 GB for the active learning curation pipeline.
    For 3 MB uncompressed image arrays, max images in RAM = 4096 MB / 3 MB ≈ 1365
    images.
