title: Designing a Resilient Agent Fallback Architecture for Intermittent Connectivity on Snapdragon 8
  Gen 3
scenario: A Snapdragon 8 Gen 3 (45 TOPS, 16GB) mobile app uses a cloud-first compound AI agent (4-model
  pipeline, 200ms cloud latency) with an on-device fallback (1B LLM, 8 tok/s). Network connectivity drops
  for an average of 15% of session time. Design a graceful degradation architecture that switches between
  cloud and on-device modes transparently, with SLA targets of < 500ms cloud response and < 2s on-device
  response for a 50-token answer.
question: "How should a mobile compound AI agent switch gracefully between cloud and on-device modes during intermittent connectivity?"
details:
  realistic_solution: 'Predictive mode switching: (1) Monitor network quality continuously using a 10ms
    ping heartbeat. Pre-warm the on-device LLM (load weights into memory) when ping latency > 100ms —
    before the cloud call fails. (2) Dual-path: launch cloud call AND start on-device embedding simultaneously.
    If cloud responds < 500ms, cancel on-device. If cloud fails, on-device is already 200ms ahead. (3)
    Keep last 5 turns of conversation in a compressed context buffer (device-side) for instant on-device
    context restoration. (4) Gradual degradation: reduce output length from 200 to 50 tokens in offline
    mode.'
  common_mistake: 'Implementing a simple try/catch that switches to on-device on the first timeout. This
    causes 3-5 second delays during the cloud→on-device transition because: (1) the cloud timeout must
    expire first (3s), (2) the on-device model may not be pre-warmed, and (3) the context must be rebuilt.'
  napkin_math: 'Cloud mode: 200ms latency + 100ms generation = 300ms. On-device 1B at Snapdragon 45 TOPS:
    1B INT4 (500MB): decode 50 tokens at ~40 tok/s (45 TOPS / 1B params * efficiency) = 50/40 = 1.25s.
    Prefill 512-token context: 512*2*1B/(45e12*0.4) = 57ms. Total on-device: 57+1250 = 1.31s < 2s SLA.
    Mode switch overhead with dual-path: embedding starts at t=0, if cloud fails at t=300ms, on-device
    is 300ms into its prefill → remaining time: 1310-300=1010ms to completion. Total user-perceived latency:
    300ms (wait for cloud failure) + 1010ms = 1.31s effective.'
