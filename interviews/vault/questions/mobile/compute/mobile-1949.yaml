title: Cortex-X4 vs Hexagon TOPS/W on a 10 GOPS Workload
scenario: A camera-preview filter must sustain 10 GOPS of INT8 MAC throughput. The candidates are a Cortex-X4 prime CPU core at 3.4 GHz running NEON SDOT, or a Hexagon NPU.
question: Compute realized TOPS/W (GOPS/W) for each placement at the 10 GOPS demand point, identify which is more efficient, and explain the architectural source of the gap?
details:
  realistic_solution: |
    Evaluate efficiency at the actual 10 GOPS operating point, not at peak TOPS. Using measured low-load placement power of 1.0 W for the Cortex-X4 path and 0.5 W for the Hexagon NPU path, the CPU realizes 10 GOPS/W while the NPU realizes 20 GOPS/W, so the NPU is 2x more efficient. The gap comes from the CPU front end spending energy on fetch, decode, branch prediction, renaming, and cache traffic for many vector instructions, while the NPU amortizes control over wider tensor/dataflow kernels with local SRAM reuse.
  common_mistake: |
    **The Pitfall:** Using peak spec sheet efficiency for partial loads.
    **The Rationale:** Candidates divide 45 TOPS by 3.5 W to get peak GOPS/W, assuming efficiency is perfectly linear at 22% utilization.
    **The Consequence:** They overestimate the NPU's advantage at low workloads, ignoring that static power (SRAM keep-alive, rail leakage) dominates at low utilization.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target throughput: 10 GOPS.
    - Use placement power measured at the 10 GOPS demand point.
    - Cortex-X4 path at 10 GOPS draws ~1.0 W.
    - Hexagon NPU path at 10 GOPS draws ~0.5 W including low-load overhead.

    **Calculations:**
    - Cortex-X4 GOPS/W: 10 / 1.0 = 10 GOPS/W.
    - Hexagon NPU GOPS/W: 10 / 0.5 = 20 GOPS/W.
    - Advantage: 20 / 10 = 2x.

    **Conclusion & Interpretation:**
    - **Result: 20 GOPS/W on the NPU vs 10 GOPS/W on the CPU (Energy-Bound)**. At the 10 GOPS demand point, the NPU is more efficient because its tensor/dataflow execution amortizes control and memory overhead better than a general-purpose CPU core.
