title: A17 Pro Neural Engine vs GPU for Real-Time Video
scenario: You are designing the inference pipeline for a real-time semantic segmentation model running on a mobile device. The system features an NPU sharing unified memory with the CPU and GPU. The model uses custom operations that are well-supported on the GPU but require CPU fallback if assigned to the NPU.
question: Should a segmentation model with GPU-supported custom ops run on the GPU or the NPU?
details:
  realistic_solution: A strong L5 candidate evaluates the end-to-end pipeline rather than peak TOPS. Because the unified memory is shared, frequent context switching between the NPU and CPU for unsupported ops causes severe memory bandwidth contention and latency spikes. The correct approach is to either modify the model architecture to use NPU-compatible operations entirely, or execute the entire model on the GPU to keep the execution completely on-device without CPU synchronization overhead.
  common_mistake: |
    **The Pitfall:** Defaulting to the NPU purely based on peak theoretical TOPS.
    **The Rationale:** Candidates often ignore the severe latency and memory bandwidth overhead caused by context switching between the NPU and CPU for unsupported operations.
    **The Consequence:** Deploying a pipeline that is slower end-to-end despite running on a 'faster' accelerator.
  napkin_math: |
    **Assumptions & Constraints:**
    - Total Ops = 105 GOPs.
    - NPU peak compute = 35 TOPS. GPU peak compute = 10.5 TOPS (sustained).
    - GPU supports the full graph.
    - NPU supports only 75 GOPs of the graph; custom ops fall back to CPU.
    - Unsupported custom ops take ~15 ms on CPU.
    - CPU fallback context switch penalty = 4 ms per boundary crossing, with two crossings per frame.

    **Calculations:**
    - NPU-supported compute time: 75 GOPs / 35,000 GOPS = 0.0021 s = 2.1 ms.
    - NPU fallback path time: 2.1 ms + 15 ms CPU custom ops + 8 ms synchronization = 25.1 ms.
    - Full GPU path time: 105 GOPs / 10,500 GOPS = 0.010 s = 10.0 ms.

    **Conclusion & Interpretation:**
    - **Result: 10 ms GPU vs ~25 ms NPU fallback.** Despite lower peak TOPS, the GPU is faster end-to-end because it runs the full graph without CPU fallback and synchronization boundaries.
