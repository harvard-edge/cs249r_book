title: The Mobile Ridge Point
scenario: An engineer profiles a new vision model on a Snapdragon 8 Gen 3 SoC, which has 45 TOPS of peak INT8 compute and 77 GB/s of memory bandwidth. They notice performance drops significantly after a few seconds of continuous inference. The model has an arithmetic intensity of 200 Ops/Byte.
question: Is a Snapdragon 8 Gen 3 workload with 200 Ops/Byte compute-bound or memory-bound, and why might it throttle?
details:
  realistic_solution: The key is to compare the model's arithmetic intensity to the SoC's ridge point. The ridge point is the minimum arithmetic intensity required to be compute-bound.
  common_mistake: |
    **The Pitfall:** Assuming that high compute workloads (high TOPS) are always the cause of thermal throttling.
    **The Rationale:** Engineers misidentify a model as 'compute-bound' without calculating the hardware's ridge point, failing to recognize the high energy cost of memory movement.
    **The Consequence:** They attempt to optimize compute operations when the true source of excess heat is massive DRAM traffic.
  napkin_math: |
    1. **Ridge Point Calculation:** 45 TOPS = 45,000 GOPS. Ridge Point = 45,000 GOPS / 77 GB/s ≈ 584 Ops/Byte.
    2. **Comparison:** The model's Arithmetic Intensity is 200 Ops/Byte.
    3. **Conclusion:** Since 200 < 584, the model is deeply memory-bound.
    **Result:** The model generates heat from **high-energy DRAM accesses**, not compute, leading to rapid thermal throttling.
  options:
  - The model is compute-bound; its high arithmetic intensity overwhelms the processor, generating excessive heat.
  - The phone's ridge point is ~0.58 Ops/Byte, so the model is severely compute-bound, causing it to overheat.
  - The model is memory-bound; its arithmetic intensity is below the SoC's ridge point, causing high-energy DRAM access that generates heat.
  - The SoC's 45 TOPS is insufficient for a model with an AI of 200, causing a bottleneck that leads to throttling.
  correct_index: 2
