title: Architecting On-Device LLM Workloads for Tensor G3
scenario: 'A messaging app requires an on-device intelligence pipeline running exclusively on a mobile TPU. The application must provide real-time smart replies (foreground) and categorize thousands of archived messages (background) using an optimized on-device LLM.'
question: How would you architect an on-device intelligence pipeline for a messaging app running exclusively on a mobile TPU?
details:
  realistic_solution: A robust architecture dynamically multiplexes the TPU resources by strictly pinning foreground smart replies while scheduling the background categorization workload using OS constructs (e.g., WorkManager). The categorization logic must be deferred to charging/idle windows because continuous batch TPU execution will inevitably trigger the thermal daemon, resulting in devastating clock-throttling and UI lockups.
  common_mistake: |
    **The Pitfall:** Pinning background models in memory and running them continuously.
    **The Rationale:** Candidates fail to decouple foreground latency requirements from background batch processing workloads.
    **The Consequence:** Pinning 1.4 GB in RAM and running 7 hours of continuous TPU inference causes severe battery drain, thermal throttling, and OS-level memory evictions of other apps.
  napkin_math: |
    **Assumptions & Constraints:**
    - Background workload: 10,000 messages * 50 tokens = 500,000 tokens.
    - TPU Decode Throughput: ~20 tokens/sec.

    **Calculations:**
    - Time required: 500,000 tokens / 20 tokens/sec = 25,000 seconds (~6.9 hours).

    **Conclusion & Interpretation:**
    - **Result: ~7 hours continuous inference (Thermal-Bound)**. The background processing is aggressively thermal-bound and must be deferred.
