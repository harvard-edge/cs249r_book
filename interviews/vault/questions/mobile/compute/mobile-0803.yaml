title: Unaligned Channel Compiler Fallback
scenario: A Cortex-M4 (168MHz) runs a 1D convolution with 13 input channels. The latency is 3x higher than an identically structured layer with 16 channels, despite doing 18.75% fewer theoretical MACs.
question: Why can a 13-channel Cortex-M4 convolution be 3x slower than a 16-channel convolution with more MACs?
details:
  realistic_solution: The symptom of higher latency for fewer channels points to a microkernel and memory-layout fallback, not to the MAC count itself. Cortex-M4 inference kernels are usually hand-tuned around DSP instructions, packed loads, loop unrolling, and channel counts that are multiples of 4. A 16-channel layer can use the optimized inner loop cleanly, while 13 channels force tail handling, less efficient loads, extra loop bookkeeping, and possible repacking or padding overhead. The layer does fewer mathematical MACs, but each useful MAC costs more cycles.
  common_mistake: |
    **The Pitfall:** Assuming latency scales perfectly linearly with FLOP counts.
    **The Rationale:** Candidates memorize FLOPs = latency, completely ignoring low-level compiler memory alignment and vectorization rules.
    **The Consequence:** Designing theoretically optimal models that compile into incredibly slow scalar loops, destroying real-world performance.
  napkin_math: |
    **Assumptions & Constraints:**
    - 16-channel optimized kernel: channels are packed in groups of 4 and processed with a tight DSP/unrolled inner loop.
    - 13-channel fallback: three full groups of 4 plus one tail channel require cleanup code and less efficient memory access.

    **Calculations:**
    - MAC-count ratio: 13 / 16 = 0.8125, so the 13-channel layer has 18.75% fewer theoretical MACs.
    - Example cycle model: 16-channel optimized path = 16 useful MACs at 1 cycle/MAC equivalent = 16 cycles.
    - 13-channel fallback path = 13 useful MACs at about 3.5 cycles/MAC equivalent due to tail handling, loads, and loop overhead = 45.5 cycles.
    - Latency ratio: 45.5 / 16 = 2.84x, consistent with an observed ~3x slowdown.

    **Conclusion & Interpretation:**
    - **Result: Kernel-Efficiency Cliff.** The 13-channel layer is slower because it misses the optimized packed-channel kernel and pays tail/memory overhead, so latency does not scale linearly with MAC count.
