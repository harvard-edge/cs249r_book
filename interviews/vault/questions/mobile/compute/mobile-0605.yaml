title: The Accelerator Selection Conundrum
scenario: 'You are tasked with deploying three distinct ML models on a new mobile
  SoC: a small, sequential RNN for text prediction, a large CNN for object detection,
  and a sparse Transformer model for personalized recommendations.'
question: Given the heterogeneous nature of modern mobile SoCs (CPU, GPU, NPU), which
  accelerator would you primarily target for each model, and why?
details:
  realistic_solution: "1.  **Small, Sequential RNN (Text Prediction):** Target the\
    \ **CPU**, specifically the \"big\" or \"prime\" cores.\n      *   **Reasons:**\
    \ RNNs, especially small ones, often have sequential dependencies (each step depends\
    \ on the previous hidden state), limiting parallelism. CPUs excel at sequential\
    \ processing and have lower overhead for task switching and memory access for\
    \ smaller models. NPUs might struggle with the control flow or specific recurrent\
    \ operations, leading to inefficient delegation or CPU fallback. GPUs, while parallel,\
    \ incur higher dispatch overhead for small, sequential tasks, and their wide SIMD\
    \ units might be underutilized.\n  2.  **Large CNN (Object Detection):** Target\
    \ the **NPU** (Neural Processing Unit).\n      *   **Reasons:** CNNs are the NPU's\
    \ bread and butter. They consist primarily of highly parallelizable operations\
    \ like convolutions, matrix multiplications, and pooling, which NPUs are specifically\
    \ designed to accelerate with dedicated hardware (e.g., systolic arrays, MAC units)\
    \ and often INT8 quantization support. This leads to superior power efficiency\
    \ and throughput compared to GPUs or CPUs for this workload.\n  3.  **Sparse Transformer\
    \ Model (Personalized Recommendations):** Target the **GPU** or a combination\
    \ of **CPU+GPU/NPU** with careful partitioning.\n      *   **Reasons:** Transformers\
    \ involve attention mechanisms and large matrix multiplications. While dense portions\
    \ benefit NPUs, *sparse* operations are tricky.\n          *   **GPU:** GPUs are\
    \ highly parallel and flexible, capable of handling large matrix multiplications.\
    \ More importantly, their programmability (e.g., OpenCL/Vulkan compute shaders)\
    \ makes them better suited for handling sparse data structures and custom kernels\
    \ often found in sparse models, which NPUs might not natively support efficiently.\n\
    \          *   **CPU:** For very sparse operations or complex indexing/gather-scatter\
    \ operations, the CPU might be more efficient due to its general-purpose nature\
    \ and better control flow.\n          *   **Hybrid:** A sophisticated approach\
    \ might run dense attention/feed-forward layers on the NPU/GPU and handle sparse\
    \ data manipulation or embedding lookups on the CPU. The key challenge is minimizing\
    \ data transfers between units."
  common_mistake: '**The Pitfall:** Blindly targeting the NPU for all machine learning
    models.

    **The Rationale:** Engineers assume "NPU equals AI, therefore it''s the fastest,"
    ignoring the architectural strengths and weaknesses of different processors for
    specific computational graphs.

    **The Consequence:** Severe performance degradation due to NPU control-flow bottlenecks
    for sequential models and unsupported sparse operations.

    '
  napkin_math: '**Assumptions & Constraints:**

    - NPU (Large CNN): Offers 10-20 TOPS (INT8).

    - CPU (Small RNN): Offers 100-500 GFLOPS (FP32).

    - GPU (Sparse Transformer): Offers 1-5 TFLOPS (FP16).


    **Calculations:**

    - Large CNN: Highly parallel convolutions map well to NPU spatial architecture.

    - Small RNN: 10-20 MFLOPS runs easily on CPU with zero dispatch overhead.

    - Sparse Transformer: Irregular memory access is efficiently handled by flexible
    GPU compute shaders.


    **Conclusion & Interpretation:**

    - **Result: Processor mapping (Architecture-Bound)**. Hardware mapping must match
    both compute requirements and memory access patterns to maintain high performance.

    '
