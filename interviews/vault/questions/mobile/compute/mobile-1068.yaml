title: Llama 3.2 1B KV-Cache Sizing for A17 Pro NPU Deployment
scenario: 'You are realizing the deployment of Llama 3.2 1B (INT4) on an NPU. Target: <100ms TTFT for 256-token prompts, <30ms/token decode, <1.5W power. The model has 16 layers, 8 KV heads, 64 head dimension. Use Core ML for NPU mapping.'
question: What is the correct KV-cache size for the Llama 3.2 1B deployment, and why is the larger estimate wrong?
details:
  realistic_solution: Calculate strictly from the 1B layer dimensions. 16 layers × 2(K,V) × 8 KV heads × 64 dim × 256 context × 2B = 8,388,608 bytes, or about 8.4 MB decimal. Larger estimates are wrong when they inherit layer, head-count, or head-dimension assumptions from 7B-class models instead of the stated 1B deployment.
  common_mistake: |
    **The Pitfall:** Reusing dimension assumptions from larger server-class models.
    **The Rationale:** Candidates memorize 7B model dimensions (32 layers, 32 heads) and blindly apply them to mobile parameter configurations.
    **The Consequence:** Overallocating memory by many times, leading to unnecessary fragmentation and rejected deployments.
  napkin_math: |
    **Assumptions & Constraints:**
    - Llama 3.2 1B deployment dimensions from the scenario: 16 layers, 8 KV heads, head_dim=64.
    - Prompt context: 256 tokens.
    - KV-cache precision: FP16 = 2 bytes/value.

    **Calculations:**
    - Correct KV calculation: 16 layers × 2(K,V) × 8 KV heads × 64 dim/head × 256 tokens × 2 bytes = 8,388,608 bytes.
    - Decimal size: 8,388,608 bytes / 1,000,000 = 8.39 MB, reported as about 8.4 MB.
    - Binary size: 8,388,608 bytes / 1,048,576 = 8.0 MiB.
    - A larger estimate comes from substituting non-scenario dimensions such as 32 layers or wider/more KV heads; that is a model-configuration error, not a property of this 1B deployment.

    **Conclusion & Interpretation:**
    - **Result: ~8.4 MB decimal, or 8.0 MiB, for the stated 1B KV cache.** Any much larger number is an overestimate caused by importing dimensions from a different model family.
