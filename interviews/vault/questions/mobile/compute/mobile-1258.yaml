title: A17 Pro Neural Engine Latency Spike Diagnosis
scenario: We deployed a real-time semantic segmentation model (INT8, 150 Giga-Operations per inference) to the Neural Engine. We expected around 4.5ms latency per frame. However, telemetry shows intermittent spikes where inference jumps to over 40ms. The model weights are 1.5 GB, and the device has 8 GB of shared unified memory.
question: Why can Neural Engine latency spike above 40ms for a 150 GOPS INT8 segmentation model expected at 4.5ms?
details:
  realistic_solution: The root cause is memory bandwidth contention on the shared unified memory bus. The architecture uses a unified memory where the CPU, GPU, and Neural Engine share the same pool. When the GPU or CPU simultaneously requests large memory transfers, the Neural Engine is starved of bandwidth, causing effective compute utilization to plummet.
  common_mistake: |
    **The Pitfall:** Assuming the Neural Engine is thermally throttling or limited by its own core count.
    **The Rationale:** Candidates look exclusively at NPU specs and ignore the system-on-chip architecture.
    **The Consequence:** They miss that the unified memory bus is fully saturated by background tasks, leading to incorrect NPU-focused optimizations.
  napkin_math: |
    **Assumptions & Constraints:**
    - Peak compute: 35 TOPS. Model: 150 GOPS.
    - Theoretical latency: 4.28 ms.
    - Observed latency spike: 40 ms.

    **Calculations:**
    - Effective throughput: 150 GOPS / 0.040s = 3.75 TOPS.
    - Utilization: 3.75 / 35 = ~10.7%.

    **Conclusion & Interpretation:**
    - **Result: A 90% drop in utilization indicates severe memory starvation on the shared bus (Bandwidth-Bound).** CPU/GPU bandwidth competition severely limits NPU utilization.
