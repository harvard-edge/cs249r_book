title: Mobile New 0004
scenario: A 50KB dense model is deployed on a mobile SoC. When executed on the NPU, it takes 2.5ms per inference. When forced to run on the much weaker Cortex-A CPU, it takes only 0.8ms. The NPU utilization remains under 5%.
question: Why does a 50KB dense model run faster on a Cortex-A CPU than on the mobile NPU?
details:
  realistic_solution: |
    For extremely small models, dispatch and synchronization overheads dominate the latency. The time required for the CPU to construct the command buffer, wake up the NPU, and synchronize memory far exceeds the actual computation time. The CPU can compute the result directly from its L1 cache faster than delegating the task.
  common_mistake: |
    **The Pitfall:** Always offloading ML workloads to the NPU/GPU.
    **The Rationale:** Developers assume the NPU's higher TOPS always results in lower latency, regardless of model size.
    **The Consequence:** Tiny models experience massive latency regressions due to fixed communication overheads.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: 50K MACs.
    - NPU: 100 GFLOPS.
    - CPU: 10 GFLOPS.
    - NPU Wake/Interrupt overhead: ~2000us (2.0ms).

    **Calculations:**
    - NPU compute time: 50K MACs / 100 GFLOPS = 0.5us.
    - Total NPU time = 2000us (overhead) + 0.5us (compute) = 2000.5us (~2.0ms).
    - CPU compute time: 50K MACs / 10 GFLOPS = 5us.
    - CPU overhead = 0us.
    - Total CPU time = 5us.

    **Conclusion & Interpretation:**
    - **Result: 5us (Dispatch Overhead)**. Since 5us << 2000us, the CPU is vastly faster for this workload.
