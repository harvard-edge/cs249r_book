title: Dispatch Overhead in Tiny Models
scenario: A 50KB dense model is deployed on a mobile SoC. When executed on the NPU, it takes 2.5ms per
  inference. When forced to run on the much weaker Cortex-A CPU, it takes only 0.8ms. The NPU utilization
  remains under 5%.
question: Why does a 50KB dense model run faster on a Cortex-A CPU than on the mobile NPU?
details:
  realistic_solution: For extremely small models, dispatch and synchronization overheads dominate the
    latency. The time required for the CPU to construct the command buffer, wake up the NPU, and synchronize
    memory far exceeds the actual computation time. The CPU can compute the result directly from its L1
    cache in 0.8ms, while the NPU incurs significant overhead, totaling 2.5ms.
  common_mistake: '**The Pitfall:** Always offloading ML workloads to the NPU/GPU.

    **The Rationale:** Developers assume the NPU''s higher TOPS always results in lower latency, regardless
    of model size.

    **The Consequence:** Tiny models experience massive latency regressions due to fixed communication
    overheads.

    '
  napkin_math: '**Assumptions & Constraints:**

    - Model: 50K MACs.

    - NPU Wake/Interrupt overhead: ~2.5ms.

    - CPU execution time: 0.8ms.


    **Calculations:**

    - NPU compute time is negligible.

    - Total NPU time = ~2.5ms (dominated by overhead).

    - CPU compute time = 0.8ms (no overhead).


    **Conclusion & Interpretation:**

    - **Result: 0.8ms CPU vs 2.5ms NPU (Dispatch Overhead)**. The CPU is faster because it avoids the
    massive 2.5ms dispatch and synchronization overhead required to offload the tiny model to the NPU.

    '
