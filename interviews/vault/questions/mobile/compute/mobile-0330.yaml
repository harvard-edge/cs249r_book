title: The Mobile TOPS Illusion
scenario: You're optimizing a new AR filter. Your computer vision model requires 10 G-ops (INT8) to process a frame and reads a total of 200 MB of data from memory per inference. The UX team requires the model to run within a 16ms budget to prevent UI 'jank'.
question: Why does a 10 GOps AR filter reading 200 MB fail to achieve the A17 Pro's advertised peak TOPS?
details:
  realistic_solution: The key is to calculate the model's Arithmetic Intensity (AI) and compare it to the hardware's Ridge Point to determine if it's compute-bound or memory-bound. The advertised 35 TOPS is a peak theoretical compute throughput. This model's low AI means it is memory-bound, and its actual performance will be dictated by the memory bandwidth, which is significantly lower than the peak compute.
  common_mistake: |
    **The Pitfall:** Assuming a chip's peak advertised TOPS equals realized performance for all models.
    **The Rationale:** Engineers ignore the Roofline model and fail to calculate the workload's Arithmetic Intensity (Ops/Byte).
    **The Consequence:** They expect peak TOPS performance but hit the memory bandwidth wall immediately.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model compute: 10 G-ops. Model data: 200 MB.
    - NPU Compute: 35 TOPS. Bandwidth: 51.2 GB/s.

    **Calculations:**
    - Arithmetic Intensity (AI): 10 G-ops / 200 MB = 50 Ops/Byte.
    - Ridge Point: 35 TOPS / 51.2 GB/s = ~683 Ops/Byte.
    - Compute Time: 10 G-ops / 35 TOPS = 0.28 ms.
    - Memory Bound Time: 200 MB / 51.2 GB/s = 3.9 ms.

    **Conclusion & Interpretation:**
    - **Result: The operation takes ~3.9 ms, fitting in the 16ms budget (Bandwidth-Bound).** Model speed is dictated by memory bandwidth, not peak TOPS.
  options:
  - 'The model is compute-bound, so its latency is ~0.28 ms.'
  - 'The model is memory-bound because its AI is less than the hardware''s Ridge Point.'
  - 'The model is compute-bound because its AI is high.'
  - 'The model is memory-bound, so its latency is determined by compute.'
  correct_index: 1
