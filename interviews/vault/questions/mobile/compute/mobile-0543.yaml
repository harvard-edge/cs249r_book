title: The Real-Time Filter Jank
scenario: You are diagnosing UI jank in a real-time video filter on an iPhone-class device (A17 Pro). The app must render each frame within 16ms. Profiling the INT8-quantized style transfer CNN shows that processing a single frame requires 70 Giga-Ops and involves moving 1.2 GB of data (weights, activations, framebuffer I/O).
question: Using roofline analysis, what bottleneck explains the real-time video filter's 24ms frame latency on an A17-class device?
details:
  realistic_solution: The primary bottleneck is memory bandwidth. To diagnose this, we calculate the model's Arithmetic Intensity (AI) and compare it to the hardware's 'ridge point'. The ridge point represents the minimum AI a workload must have to be compute-bound. For the A17 Pro, this is ~700 Ops/Byte (35 TOPS / 50 GB/s). This model's AI is only 58.3 Ops/Byte (70 GOps / 1.2 GB). Since the model's AI is far below the ridge point, it is memory-bound. The memory-bound latency is 1.2 GB / 50 GB/s = 24ms, which exceeds the 16ms budget and explains the jank. The compute units are spending most of their time idle, waiting for data to arrive from memory.
  common_mistake: |
    **The Pitfall:** Reflexively blaming compute limitations when a model is slow.
    
    **The Rationale:** Engineers see large Op counts and assume the compute units (TOPS) are the bottleneck, failing to calculate arithmetic intensity.
    
    **The Consequence:** They attempt to reduce compute (e.g., pruning) when the compute units are actually starving for data, wasting time on optimizations that do not improve latency.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target latency: 16ms.
    - Workload compute: 70 GOps.
    - Workload data transfer: 1.2 GB.
    - NPU Peak: 35 TOPS, 50 GB/s bandwidth.

    **Calculations:**
    - Calculate Model AI: 70 GOps / 1.2 GB = 58.3 Ops/Byte.
    - Calculate Hardware Ridge Point: 35e12 / 50e9 = 700 Ops/Byte.
    - Diagnose Bottleneck: Model AI (58.3) << Ridge Point (700).
    - Calculate Latency: Memory-bound latency = 1.2 GB / 50 GB/s = 24 ms.

    **Conclusion & Interpretation:**
    - **Result: 24 ms (Memory-Bound)**. The latency exceeds the 16 ms budget due to low arithmetic intensity, causing UI jank.
  options:
  - The model is compute-bound. An arithmetic intensity of 58.3 Ops/Byte is very high, indicating a workload dominated by calculations.
  - The model is compute-bound. The A17 Pro's 35 TOPS is not sufficient to process 70 G-Ops within the 16ms frame budget.
  - The model is memory-bound. Its arithmetic intensity of 58.3 Ops/Byte is significantly lower than the A17 Pro's ridge point of ~700 Ops/Byte.
  - The bottleneck is thermal throttling. The workload is exceeding the SoC's power budget, forcing it to slow down, regardless of the model's specifics.
  correct_index: 2
