title: The NPU Energy Advantage
scenario: You are profiling a new computer vision model on a smartphone and need to decide where to run
  the core `conv2d` layers to maximize battery life. Which of the following processor types on a standard
  mobile SoC (System on a Chip) is the most **energy-efficient** choice for these operations?
question: Which of the following processor types on a standard mobile SoC (System on a Chip) is the most
  **energy-efficient** choice for these operations?
details:
  realistic_solution: The NPU (Neural Processing Unit) is the correct choice. NPUs contain specialized
    silicon (e.g., systolic arrays or MAC engine farms) optimized for the parallel, low-precision integer
    arithmetic that dominates neural network inference. This hardware specialization allows them to execute
    operations like INT8 convolutions using significantly less power than a general-purpose CPU or a graphics-focused
    GPU. This is the foundation of heterogeneous compute on mobile.
  common_mistake: '**The Pitfall:** Fixating purely on latency and assuming the fastest available processor
    (often the GPU) is always the correct choice for acceleration.

    **The Rationale:** Engineers from non-mobile backgrounds often forget that on mobile devices, battery
    life is paramount, and they underestimate the massive energy cost of sustained ML workloads on general-purpose
    CPUs or GPUs.

    **The Consequence:** The deployed feature may execute quickly but will rapidly drain the user''s battery,
    leading to uninstalls and a poor user experience.

    '
  napkin_math: '**Assumptions & Constraints:**

    - Comparing energy cost per arithmetic operation between a general-purpose CPU and a specialized NPU.

    - Model requires billions of multiply-accumulate (MAC) operations.


    **Calculations:**

    - A 32-bit floating-point (FP32) operation on a CPU core consumes approximately 18 times more energy
    than an 8-bit integer (INT8) operation executed on specialized NPU hardware.


    **Conclusion & Interpretation:**

    - **Result: Energy-Bound.** The 18x efficiency factor of the NPU dictates that sustained inference
    must run on specialized hardware to prevent rapid battery depletion.

    '
  options:
  - The GPU, because it has the highest parallel throughput (TOPS).
  - The CPU, because it avoids the latency overhead of memory transfers to another processing unit.
  - The NPU, because its specialized hardware for low-precision integer math is vastly more energy-efficient.
  - The NPU, but it's only slightly more efficient (e.g., 1.5-2x) than the CPU.
  correct_index: 2
