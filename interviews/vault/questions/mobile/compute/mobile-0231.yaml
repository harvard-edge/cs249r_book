title: NPU vs. Reality
scenario: You're evaluating a new object detection model for an AR feature on a flagship smartphone with an Apple A17 Pro Neural Engine. The model requires 700 Billion INT8 operations per inference.
question: Given the A17 Pro's peak performance of 35 TOPS, what is the theoretical maximum frame rate (FPS) you could achieve, ignoring all memory, OS, and framework overhead?
details:
  realistic_solution: The correct answer is 50 FPS. The Apple A17 Pro Neural Engine provides 35 TOPS (Trillion Operations Per Second). The model requires 700 GOPS (Billion Operations) per frame. Dividing the peak compute capacity by the per-frame workload yields the theoretical maximum throughput.
  common_mistake: |
    **The Pitfall:** Confusing units (TOPS vs. GOPS) or inverting the division.
    **The Rationale:** Candidates often divide the workload by performance (700 / 35 = 20) instead of performance by workload, or miss the 1000x scaling difference between Trillion and Billion.
    **The Consequence:** The calculated FPS is off by an order of magnitude, leading to flawed architectural capacity planning.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Apple A17 Pro Neural Engine = 35 TOPS.
       - Model Workload = 700 GOPS per inference.
       - Ignoring memory bandwidth and OS overhead.
    2. **Calculations:**
       - 35 TOPS = 35,000 GOPS.
       - Max FPS = 35,000 GOPS / 700 GOPS/frame = 50 FPS.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound (50 FPS)**.
  options:
  - 20 FPS
  - 5 FPS
  - 500 FPS
  - 50 FPS
  correct_index: 3
