title: The AR Filter Frame Drop
scenario: You are a mobile ML engineer at a major social media company, tasked with optimizing a new real-time augmented reality filter. The filter's model runs on every frame from the live camera feed. Your performance target is a smooth 30 FPS (a 33ms deadline per frame), but on your test device, an iPhone with an A17 Pro chip, you are only achieving 15 FPS. Profiling data shows your custom CNN model executes 500 Giga-Ops per frame and requires moving 3.4 GB of total data from memory for each inference.
question: What roofline calculation diagnoses the bottleneck for a 500 GOps AR filter moving 3.4 GB per frame on an A17 Pro?
details:
  realistic_solution: The model is memory-bound. The key is to calculate the model's Arithmetic Intensity (AI) and compare it to the hardware's ridge point. The A17 Pro's ridge point is ~683 Ops/Byte, meaning it needs 683 operations for every byte of data it reads from memory to keep its compute units fully saturated. This model's AI is far below that, indicating the memory system cannot supply data fast enough, and the powerful ANE compute units are starving. The heat is a side effect of energy-intensive DRAM access. The correct optimization strategy is to reduce memory traffic via techniques like operator fusion, quantization, or architectural changes like using depthwise separable convolutions.
  common_mistake: |
    **The Pitfall:** Assuming the low frame rate is due to thermal throttling or pure compute limitations (too many G-Ops).
    **The Rationale:** Without doing a roofline analysis, 500 G-Ops sounds "too high", leading engineers to needlessly prune model layers.
    **The Consequence:** Time is wasted on compute optimizations that don't address the massive amount of data movement choking the memory bus.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Hardware: A17 Pro (35 TOPS, 51.2 GB/s bandwidth).
       - Model Workload: 500 GOps, 3.4 GB data moved per frame.
       - Target: 33ms per frame (30 FPS).
    2. **Calculations:**
       - Layer Arithmetic Intensity (AI): 500 GOps / 3.4 GB = 147 Ops/Byte.
       - Ridge Point: 35 TOPS / 51.2 GB/s = ~683.6 Ops/Byte.
       - Memory Read Time: 3.4 GB / 51.2 GB/s = 66.4 ms per frame.
       - Current FPS: 1000 ms / 66.4 ms = 15.06 FPS.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound. The AI is far below the ridge point, dictating a theoretical max of 15 FPS entirely dictated by memory bandwidth, matching observed performance.**
  options:
  - The model is compute-bound. 500 G-Ops at 30 FPS requires 15 TOPS, which exceeds the A17 Pro's 35 TOPS at 50% utilization.
  - The device is thermally throttling. 3.4 GB/s exceeds the 5 Watt SoC thermal limit.
  - The model is memory-bound. Its Arithmetic Intensity of ~147 Ops/Byte is far below the A17 Pro's ridge point (~683 Ops/Byte).
  - The OS scheduler is preempting the inference thread because 500 GOps takes 66ms on 35 TOPS.
  correct_index: 2
