title: Exynos 2400 NPU Roofline Bound for Generative Inference
scenario: You are tasked with optimizing a generative AI model for deployment on the Samsung Exynos 2400 NPU, which offers 34.7 TOPS (INT8) and is paired with 12 GB LPDDR5X memory. The model's current performance bottleneck is unclear.
question: How would roofline analysis classify an Exynos 2400 NPU generative workload as compute-bound or memory-bound?
details:
  realistic_solution: Characterize one inference step by counting INT8 operations and bytes moved for weights, activations, and KV-cache traffic, then compute operational intensity in ops/byte. Use the 34.7 TOPS NPU peak as the compute ceiling and estimate LPDDR5X bandwidth from the memory interface, not from the 12 GB capacity; a reasonable illustrative bandwidth is about 68 GB/s if the bus is 64-bit at roughly 8.5 Gbps per pin. The ridge point is about 510 ops/byte, so workloads below that intensity are memory-bound and workloads above it are compute-bound. A generative decode step that streams large weights and KV-cache slices typically has much lower intensity than 510 ops/byte, so it is likely memory-bound unless profiling shows strong weight reuse, operator fusion, or high sustained NPU utilization.
  common_mistake: |
    **The Pitfall:** Incorrectly assuming a workload is purely compute-bound due to high theoretical TOPS.
    **The Rationale:** Candidates do not adequately consider the practical memory bandwidth limitations of LPDDR5X.
    **The Consequence:** Optimization efforts are wasted entirely on compute efficiency, yielding zero real-world latency gains.
  napkin_math: |
    **Assumptions & Constraints:**
    - Peak Compute = 34.7 TOPS (34.7 * 10^12 ops/s).
    - Estimated Peak Memory Bandwidth = 68 GB/s (68 * 10^9 bytes/s), derived from LPDDR5X interface specs; 12 GB is capacity, not bandwidth.
    - Example decode operational intensity after measuring traffic: 100 GOP over 1 GB moved = 100 ops/byte.

    **Calculations:**
    - Ridge Point (Operational Intensity) = Peak Compute / Peak Memory Bandwidth.
    - Ridge Point = (34.7 * 10^12 ops/s) / (68 * 10^9 bytes/s) = 510 ops/byte.
    - Example workload point = 100 * 10^9 ops / 1 * 10^9 bytes = 100 ops/byte.
    - Since 100 ops/byte < 510 ops/byte, the example decode step would be memory-bound.

    **Conclusion & Interpretation:**
    - **Result: ~510 ops/byte ridge point.** The measured workload is memory-bound if its operational intensity is below this threshold and compute-bound if above it; the illustrative 100 ops/byte decode step is memory-bound.
