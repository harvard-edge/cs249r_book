title: Hexagon NPU Sizing for On-Device LLM
scenario: You are deploying a 1.5B parameter LLM for real-time chat on a mobile NPU. You have a strict latency SLA of 40 tokens per second.
question: How should a mobile NPU be evaluated for batch-1 on-device LLM inference to meet the 40 tokens/sec SLA?
details:
  realistic_solution: |
    Evaluate the NPU with a batch-1 decode trace, not peak TOPS alone. Measure effective DRAM traffic per generated token, including weight streams, dequantization overhead, KV-cache reads and writes, scheduler gaps, and the bandwidth left after display and OS activity. INT8 may meet 40 tokens/sec if the compiler keeps enough weights and activations on-chip and the measured traffic stays within the sustained LPDDR budget. If profiling shows the traffic budget is too high, compare INT4 weight-only quantization such as AWQ or GPTQ, because it reduces weight traffic while preserving the same evaluation criteria.
  common_mistake: |
    **The Pitfall:** Fixating on the peak compute capacity.
    **The Rationale:** Candidates incorrectly assume the workload is compute-bound and ignore the shared memory bandwidth bottleneck during auto-regressive decoding.
    **The Consequence:** They design a system that fails to meet latency SLAs due to memory starvation.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: 1.5B parameters.
    - Target SLA: 40 tokens/sec.
    - INT8 precision: 1 byte per parameter.
    - Sustained bandwidth available to the model after OS/display overhead: 45 GB/s.
    - Measured decode traffic includes weight traffic plus KV-cache and runtime overhead.

    **Calculations:**
    - Model size (INT8): 1.5B params * 1 byte/param = 1.5 GB.
    - Full weight-stream upper bound: 1.5 GB/token * 40 tokens/sec = 60 GB/s, which would exceed the 45 GB/s sustained budget.
    - If profiling shows 0.9 GB/token of effective INT8 DRAM traffic after caching and tiling, bandwidth = 0.9 * 40 = 36 GB/s, which fits.
    - If profiling is closer to 1.3 GB/token, bandwidth = 1.3 * 40 = 52 GB/s, which misses the SLA.
    - INT4 weight-only size: 1.5B * 0.5 bytes = 0.75 GB; if KV and overhead add 0.15 GB/token, traffic is ~0.90 GB/token, or 36 GB/s at 40 tokens/sec.

    **Conclusion & Interpretation:**
    - **Result: profile before prescribing precision**. INT8 is acceptable only if the measured effective traffic is <= 45 GB/s / 40 = 1.125 GB/token. If the trace exceeds that budget, INT4 weight-only quantization is a practical mitigation rather than an automatic requirement.
