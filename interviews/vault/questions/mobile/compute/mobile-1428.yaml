title: Hexagon NPU Sizing for On-Device LLM
scenario: You are deploying a 1.5B parameter LLM for real-time chat on a mobile NPU. You have a strict latency SLA of 40 tokens per second.
question: How should a mobile NPU be evaluated for batch-1 on-device LLM inference to meet the 40 tokens/sec SLA?
details:
  realistic_solution: |
    Auto-regressive decoding at batch size 1 is strictly memory-bandwidth bound. The NPU must be evaluated based on its memory access efficiency rather than peak TOPS. To meet the SLA, INT8 is insufficient due to LPDDR5X bandwidth limits, which must also accommodate OS and display consumption. The model must undergo post-training quantization (PTQ) to INT4 (e.g., using AWQ or GPTQ) to halve the bandwidth requirement and achieve real-time performance.
  common_mistake: |
    **The Pitfall:** Fixating on the peak compute capacity.
    **The Rationale:** Candidates incorrectly assume the workload is compute-bound and ignore the shared memory bandwidth bottleneck during auto-regressive decoding.
    **The Consequence:** They design a system that fails to meet latency SLAs due to memory starvation.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: 1.5B parameters.
    - Target SLA: 40 tokens/sec.
    - INT8 precision: 1 byte per parameter.
    - Mobile memory bandwidth peaks at ~64 GB/s.

    **Calculations:**
    - Model size (INT8): 1.5B params * 1 byte/param = 1.5 GB.
    - Required bandwidth (INT8): 1.5 GB/token * 40 tokens/sec = 60 GB/s.
    - Compute utilized: 3 GOPs/token * 40 tokens/sec = 120 GOPs (0.12 TOPS).
    - Quantizing to INT4 (0.5 bytes/param): 0.75 GB/token * 40 tokens/sec = 30 GB/s.

    **Conclusion & Interpretation:**
    - **Result: 30 GB/s (Memory-Bound)**. Quantizing to INT4 halves the bandwidth requirement safely meeting the SLA.
