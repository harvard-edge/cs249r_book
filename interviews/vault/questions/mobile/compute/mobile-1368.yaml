title: Exynos 2400 NPU Heterogeneous Pipeline Design
scenario: You must design the inference architecture for a novel real-time computational photography pipeline running on the Samsung Exynos 2400. The workload mixes dense convolutions, dynamic control-flow sparse operations, and transformer blocks. You need to distribute these tasks across the NPU, CPU, and GPU while managing contention on the shared memory to guarantee a 33.3ms latency budget.
question: How should an Exynos 2400 heterogeneous pipeline map dense, dynamic, and preprocessing work across its processors?
details:
  realistic_solution: A mastery-level design partitions the workload strictly according to the programmability-efficiency spectrum. Dense, static convolutions and matrix multiplications are pinned to the highly efficient dual-core NPU. Dynamic control flow or sparse operations are explicitly routed to the more programmable CPU or GPU. Crucially, the architect will implement zero-copy buffers via Android HardwareBuffers within the shared 12 GB LPDDR5X memory pool, allowing the ISP, NPU, and CPU to pass large activation tensors without initiating expensive DMA memory copies between processing domains.
  common_mistake: |
    **The Pitfall:** Attempting to compile the entire monolithic model exclusively for the NPU.
    **The Rationale:** Engineers chase the 34.7 TOPS peak performance, ignoring the fact that dynamic control flow and unstructured sparsity will stall the NPU's dense MAC arrays.
    **The Consequence:** Severe bandwidth contention from concurrent CPU/GPU/ISP memory access, leading to pipeline stalls and massive frame drops.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target Latency: 30 FPS (33.3ms per frame budget).
    - NPU Peak: 34.7 TOPS. Dense NPU workload: 200 GOP/frame.
    - Shared-memory zero-copy pipeline; model weights are resident.
    - Per-frame activation metadata/control traffic that cannot be zero-copied: 120 MB.
    - Memory bandwidth available to this pipeline: ~60 GB/s.

    **Calculations:**
    - NPU dense compute time: 200 GOP / 34,700 GOP/s = 5.76 ms.
    - Non-zero-copy traffic time: 0.12 GB / 60 GB/s = 0.002 s = 2.0 ms.
    - Serialized worst-case NPU + traffic time: 5.76 ms + 2.0 ms = 7.76 ms.
    - Frame-budget margin for CPU/GPU dynamic work and preprocessing: 33.3 ms - 7.76 ms = 25.54 ms.

    **Conclusion & Interpretation:**
    - **Result: 7.76 ms serialized NPU-and-traffic budget, leaving 25.54 ms for CPU/GPU work.** Dense static blocks should run on the NPU, dynamic sparse/control-flow work on CPU/GPU, and large image buffers should remain zero-copy in shared memory.
