title: Optimal Heterogeneous Graph Execution
scenario: You have a complex ML model with a mix of convolutional, recurrent, and custom attention layers. Profiling shows that convolutions run best on the NPU, recurrent layers on the DSP, and custom attention layers (due to their sparsity patterns) are most efficient on the CPU.
question: How would you design the execution strategy to minimize overall latency and power consumption on a mobile SoC with these heterogeneous compute units?
details:
  realistic_solution: This requires **fine-grained heterogeneous task graph partitioning and scheduling**, aiming to balance computation across devices, minimize data movement, and exploit parallelism.
  common_mistake: |
    **The Pitfall:** Relying solely on a generic TFLite delegate and "letting it figure it out."
    **The Rationale:** Candidates assume high-level framework delegates automatically solve optimal, fine-grained cross-device data transfers and pipelining.
    **The Consequence:** The graph is suboptimally partitioned, resulting in massive DMA transfer latency overheads that eclipse compute gains.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Heterogeneous units: NPU (CNN), DSP (RNN), CPU (Attention).
       - Bottleneck: Cross-device data transfers (DMA).
    2. **Calculations:**
       - Decision Function: `compute_cost_on_device + transfer_cost_to_device`.
       - Example: NPU-CPU transfer costs 5ms, CPU execution takes 2ms. Total CPU cost = 7ms.
    3. **Conclusion & Interpretation:**
       - **Result: Transfer-Bound. If the NPU executes the operator in <7ms, keeping it on the NPU is optimal despite the CPU's faster execution time.**
