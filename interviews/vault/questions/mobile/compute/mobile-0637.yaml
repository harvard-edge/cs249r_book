title: Snapdragon Heterogeneous Operator Placement
scenario: You're deploying a multi-modal model on a Snapdragon 8 Gen 3 that has a Hexagon NPU (45 TOPS), an Adreno GPU (4.6 TFLOPS FP16), and Kryo CPU cores. The model has Conv2D layers, a custom attention mechanism, GELU activations, and dynamic control flow.
question: How should Conv2D, custom attention, GELU, and dynamic control flow run across Hexagon NPU, Adreno GPU, and Kryo CPU to minimize latency?
details:
  realistic_solution: |
    Partition by supported operator, not by peak TOPS. Keep Conv2D blocks on the Hexagon NPU when they compile cleanly through TFLite/QNN/SNPE because they are regular, high-arithmetic-intensity kernels. Run the custom attention on the Adreno GPU if it can be fused into a small number of shader/compute kernels; otherwise simplify it until the runtime avoids CPU fallback. Run exact GELU on the CPU only if it is rare, or use a validated NPU-supported approximation such as hard-swish/tanh-polynomial GELU when accuracy allows. Leave dynamic control flow on the Kryo CPU, and place CPU decisions at coarse graph boundaries so tensors do not bounce between CPU, GPU, and NPU after every layer. Profile the actual partition with Snapdragon Profiler, Qualcomm AI Engine Direct/QNN tooling, and TFLite delegate traces, then choose the plan with the fewest unsupported-op fallbacks and handoffs.
  common_mistake: |
    **The Pitfall:** Forcing all operations onto the NPU.
    **The Rationale:** Candidates assume the NPU's high TOPS makes it the best choice for everything, ignoring that it lacks native support for complex control flow or custom activations like GELU.
    **The Consequence:** The runtime silently falls back to CPU for unsupported ops, creating excessive cross-chip memory handoffs and ruining latency.
  napkin_math: |
    **Assumptions & Constraints:**
    - Conv2D block runs on Hexagon NPU: 8 ms.
    - Fused custom attention runs on Adreno GPU: 4 ms.
    - CPU dynamic-control segment plus exact GELU fallback: 2 ms.
    - Cross-accelerator handoff cost: 1.5 ms per boundary.

    **Calculations:**
    - Naive all-NPU request with unsupported fallbacks: Conv2D on NPU (8 ms) + attention fallback on CPU (9 ms) + GELU/control on CPU (2 ms) + 3 handoffs (4.5 ms) = 23.5 ms.
    - Explicit partition: Conv2D on NPU (8 ms) + fused attention on GPU (4 ms) + GELU/control on CPU (2 ms) + 2 coarse handoffs (3 ms) = 17 ms.
    - Latency reduction: 23.5 ms - 17 ms = 6.5 ms saved, about 28% improvement.

    **Conclusion & Interpretation:**
    - **Result:** The fastest plan is NPU for supported Conv2D, GPU for fused custom attention, and CPU for dynamic control plus any exact GELU fallback. The win comes from avoiding silent CPU fallbacks and reducing handoff count.
