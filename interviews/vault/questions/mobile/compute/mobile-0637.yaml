title: The Heterogeneous Execution Strategy
scenario: You're deploying a multi-modal model on a Snapdragon 8 Gen 3 that has a Hexagon NPU (45 TOPS), an Adreno GPU (4.6 TFLOPS FP16), and Kryo CPU cores. The model has Conv2D layers, a custom attention mechanism, GELU activations, and dynamic control flow.
question: How should Conv2D, custom attention, GELU, and dynamic control flow run across Hexagon NPU, Adreno GPU, and Kryo CPU to minimize latency?
details:
  realistic_solution: 'Partition the model by operator affinity. Note: even when you specify a single compute unit, runtimes like CoreML and TFLite may silently re-partition — CoreML models often execute with "Mixed (Float16, Float32, Int32)" precision even when FP16 is requested, because the Neural Engine lacks native support for certain ops. Always profile with the vendor''s tools (Xcode GPU Report, Snapdragon Profiler) to see the *actual* execution plan.'
  common_mistake: |
    **The Pitfall:** Forcing all operations onto the NPU.
    **The Rationale:** Candidates assume the NPU's high TOPS makes it the best choice for everything, ignoring that it lacks native support for complex control flow or custom activations like GELU.
    **The Consequence:** The runtime silently falls back to CPU for unsupported ops, creating excessive cross-chip memory handoffs and ruining latency.
  napkin_math: |
    1. **Naive Partitioning:** 40 NPU layers (8ms) + 8 GPU layers (6ms) + 2 CPU layers (1ms) + 3 handoffs (4.5ms) = 19.5ms total.
    2. **Optimization:** Replace GELU with sigmoid (NPU supported), fuse attention on GPU.
    3. **Optimized Partitioning:** 45 NPU layers (9ms) + 5 GPU layers (4ms) + 2 CPU (1ms) + 2 handoffs (3ms) = 17ms total.
    4. **Latency Reduction:** 19.5ms - 17ms = 2.5ms saved (**13% improvement**).
