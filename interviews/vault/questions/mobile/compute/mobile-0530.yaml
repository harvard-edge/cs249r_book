title: 'The Style Transfer Battery Drain: Real-Time Deadlines'
scenario: 'You''re an ML engineer at a startup building a new social media app. Your key feature is a real-time generative style transfer filter. On the new Apple A17 Pro, you find the filter runs, but it''s causing UI jank and the phone gets noticeably hot. You have two candidate model architectures:'
question: 'Which style transfer model should run better on the A17 Pro, and why can higher FLOPs still reduce jank and battery drain?'
details:
  realistic_solution: 'The correct approach is to analyze the Arithmetic Intensity (AI) of each model. Model B, despite having more FLOPs, is vastly more efficient and will perform better. It shifts the bottleneck from slow, power-hungry memory access to the highly optimized on-chip Neural Engine. The phone''s UI will be smoother and the battery will last longer because the GPU spends less time stalled waiting for data, finishing its work and returning to a low-power state more quickly.'
  common_mistake: 'Engineers often assume that fewer floating-point operations (FLOPs) always equates to a faster, more efficient model. This ''compute-centric'' view ignores the immense power and latency cost of moving data from DRAM to the compute units. On mobile, where memory bandwidth is limited and power is paramount, being memory-bound is often a worse performance state than being compute-bound.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Model compute: 100 GFLOPs.
    - Model memory access: 1GB intermediate feature maps from DRAM.
    - A17 Pro memory bandwidth: ~50 GB/s.
    - A17 Pro ridge point: ~700 Ops/Byte.

    **Calculations:**
    - Arithmetic Intensity (AI): 100 GFLOPs / 1GB = 100 Ops/Byte.
    - AI comparison: 100 Ops/Byte << 700 Ops/Byte (ridge point).
    - Energy cost ratio: DRAM access is ~580x more expensive than FP16 compute.

    **Conclusion & Interpretation:**
    - **Result: 100 Ops/Byte (Memory-Bound).** The model's low arithmetic intensity heavily saturates the DRAM bus, creating massive power draw and thermal jank despite low compute utilization.
  options:
  - 'Model A, because its lower G-Ops count (70 vs 100) means it does less work, resulting in lower power consumption.'
  - 'Model A, because its lower arithmetic intensity is a better match for the A17''s limited memory bandwidth, preventing saturation.'
  - 'Model B, because its higher arithmetic intensity makes it more compute-bound, allowing it to better utilize the ANE and spend less time stalled on power-hungry memory access.'
  - 'Model B, because its high G-Ops count (100) will exceed the sustainable TOPS/W budget of the A17 Pro, leading to immediate thermal throttling.'
  correct_index: 2
