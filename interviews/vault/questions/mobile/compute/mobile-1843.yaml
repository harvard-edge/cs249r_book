title: Chiplet Compute-to-Memory Ratio for Mobile SoC Design
scenario: A mobile chip architect is designing a new SoC and asks why Apple uses a fixed ratio of neural engine compute to memory interface width.
question: How would you explain the design rationale for matching compute-to-memory ratio to target workloads?
details:
  realistic_solution: Mobile SoCs choose a compute-to-memory ratio that balances expected workload arithmetic intensity. MobileNet-style vision models often land around 50-100 ops/byte, so an NPU with roughly 117 ops/byte of peak compute per byte/s of bandwidth is in the right range without greatly overbuilding either side. More bandwidth can help workloads below the hardware ratio, but beyond the dominant workload needs it costs die area and power with diminishing returns.
  common_mistake: |
    **The Pitfall:** Mechanically assuming that dumping more memory bandwidth into the hardware architecture will universally improve edge inference.
    **The Rationale:** Engineers project current LLM memory bottlenecks uniformly onto all mobile operations, completely ignoring the higher arithmetic intensity of standard vision workloads.
    **The Consequence:** Over-provisioning massive, expensive memory controllers that torch power and die area without yielding a single drop of throughput improvement.
  napkin_math: |
    **Assumptions & Constraints:**
    - Compute Capacity: 35 TOPS (INT8).
    - Memory Bandwidth: 300 GB/s.
    - Dominant Workload (Vision): MobileNet-class models (~80 ops/byte).

    **Calculations:**
    - Hardware Balance Point: 35e12 ops/s / 300e9 bytes/s = ~117 ops/byte.
    - Workload Intensity: ~80 ops/byte, below the hardware balance point.
    - If bandwidth doubles to 600 GB/s, balance point becomes 35e12 / 600e9 = ~58 ops/byte.

    **Conclusion & Interpretation:**
    - **Result: Balanced Design Target.** At ~80 ops/byte, the workload can become bandwidth-sensitive on a 117 ops/byte design, so the ratio is a workload-driven compromise. Doubling bandwidth may improve some memory-bound cases, but it also shifts the design toward underused bandwidth for higher-intensity vision layers.
