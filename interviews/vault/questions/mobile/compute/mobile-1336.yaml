title: A17 Pro NPU Latency and Energy Calculation
scenario: You are deciding whether to offload a quantized INT8 vision model from the CPU to the Apple A17 Pro Neural Engine. The model requires 70 Giga-Operations (GOPS) per inference. The 16-core Neural Engine features a peak performance of 35 TOPS at ~5W, but only achieves 50% utilization due to memory bandwidth constraints.
question: How would you calculate the expected inference latency in milliseconds and the energy consumed per inference in millijoules to quantify the benefit of NPU offloading?
details:
  realistic_solution: To determine if offloading is worthwhile, we first calculate the effective NPU throughput by applying the 50% utilization factor. We then divide the workload size (70 GOPS) by the effective throughput to find the latency. Finally, multiplying the latency by the NPU's power consumption (5W) gives the energy consumed per inference.
  common_mistake: |
    **The Pitfall:** Calculating latency using the theoretical peak throughput (35 TOPS) without accounting for utilization.
    **The Rationale:** Candidates ignore the reality of memory bandwidth constraints on unified architectures, assuming 100% compute utilization.
    **The Consequence:** They underestimate latency and energy consumption by a factor of 2x, potentially making an incorrect architectural offloading decision.
  napkin_math: |
    1. **Peak Throughput:** 35 TOPS = 35,000 GOPS.
    2. **Effective Throughput:** 35,000 GOPS × 0.50 (utilization) = 17,500 GOPS.
    3. **Latency:** 70 GOPS / 17,500 GOPS/sec = 0.004 seconds = 4.0 ms.
    4. **Energy:** Power (5W) × Latency (0.004s) = 0.02 Joules = 20 mJ.
    **Result:** The expected inference takes **4.0 ms** and consumes **20 mJ** of energy.
