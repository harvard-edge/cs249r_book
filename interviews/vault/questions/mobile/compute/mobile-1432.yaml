title: Estimating Real-Time Video Segmentation Compute on A17 Pro
scenario: Your team is deploying a real-time video portrait segmentation model for a live streaming app on the iPhone 15 Pro. The model processes 1080p frames at 30 FPS and requires 40 GOPS per frame.
question: Can real-time video segmentation fit within the Apple A17 Pro compute and memory bandwidth budget without thermal throttling?
details:
  realistic_solution: |
    A strong candidate calculates both compute utilization and memory bandwidth to assess system-level viability. They will demonstrate that the workload requires only a small fraction of the NPU's peak capacity, translating to low power consumption that avoids thermal throttling. Furthermore, they will verify that the memory bandwidth required for streaming frames and reading weights does not bottleneck the shared memory subsystem.
  common_mistake: |
    **The Pitfall:** Comparing required operations solely against theoretical peak TOPS.
    **The Rationale:** Candidates often look at peak compute numbers without evaluating power draw, thermal limits, or memory bandwidth.
    **The Consequence:** Recommending architectures that might fit theoretically but cause severe thermal throttling or starve the 8 GB unified memory shared with the OS and GPU.
  napkin_math: |
    **Assumptions & Constraints:**
    - Required compute: 40 GOPS/frame * 30 FPS.
    - Capacity: 35 TOPS (A17 Pro).
    - Power: 5W.
    - 1080p frame (~6.2 MB) + INT8 weights (10 MB) = ~16.2 MB/frame.

    **Calculations:**
    - Compute required: 40 GOPS/frame * 30 FPS = 1.2 TOPS.
    - Compute utilization: 1.2 TOPS / 35 TOPS = ~3.4%.
    - Estimated power: (1.2 / 35) * 5W = ~0.17W.
    - Total bandwidth: 16.2 MB * 30 FPS = ~486 MB/s.

    **Conclusion & Interpretation:**
    - **Result: 486 MB/s (Memory-Bandwidth-Bound avoided)**. 486 MB/s easily fits within the unified memory bandwidth without starving the system.
