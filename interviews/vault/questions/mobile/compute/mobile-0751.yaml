title: The ANE Efficiency Advantage
scenario: Your team is evaluating mobile SoCs for an always-on image classification app. The NPU advertises 35 TOPS at a sustained power draw of approximately 5W.
question: What is the compute efficiency in TOPS per watt, and why does this metric matter more than raw TOPS for a mobile device?
details:
  realistic_solution: Compute efficiency (TOPS/W) is the most critical benchmark for edge devices because the binding constraint is thermal dissipation and battery physics, not theoretical compute. Delivering 7 TOPS/W dictates exactly how many INT8 operations the system can push through the pipeline before hitting a thermal limit or draining the device. High raw TOPS with terrible efficiency leads to rapid throttling and unviable performance.
  common_mistake: |
    **The Pitfall:** Tunnel-visioning strictly on peak marketing TOPS without factoring in the power consumption required to achieve it.
    **The Rationale:** Engineers fall victim to marketing materials that treat mobile architectures exactly like limitless server racks.
    **The Consequence:** Selecting silicon with impressive peak TOPS but awful efficiency, guaranteeing that battery-constrained real-world workloads die almost instantly in the field.
  napkin_math: |
    **Assumptions & Constraints:**
    - Advertised NPU Compute: 35 TOPS.
    - Sustained NPU Power: 5W.
    - Standard mobile battery: 18.5 Wh.

    **Calculations:**
    - Compute Efficiency: 35 TOPS / 5W = 7.0 TOPS/Watt.
    - Time to drain full battery: 18.5 Wh / 5W = 3.7 hours.

    **Conclusion & Interpretation:**
    - **Result: Power-Bound**. Raw TOPS is a marketing vanity metric; TOPS/W is the true engineering ceiling. 7.0 TOPS/W strictly dictates the maximum sustained throughput before the device shuts down.
  options:
  - 3.5 TOPS/W. Mobile chips sacrifice efficiency for portability.
  - 7.0 TOPS/W. The battery is the binding constraint, so efficiency determines the thermal limit.
  - 35.0 TOPS/W. The 5W figure represents idle power.
  - 175.0 TOPS/W. NPUs achieve superlinear scaling at INT8.
  correct_index: 1
