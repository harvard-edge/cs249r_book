title: 'Analyze Transformer Token Budget on Snapdragon 8 Gen 3'
scenario: 'A mobile AI assistant uses a 1B parameter transformer on a mobile SoC. The model is INT4 quantized (500MB weights).'
question: 'How would you analyze the memory allocation for supporting a 4K context window with 10 concurrent conversation turns, given 32 layers, 8 KV heads, and a 64 head dimension?'
details:
  realistic_solution: 'Account for OS and background app memory (typically reserving 4GB+). Calculate the KV-cache requirement per token using exact precision, factoring in sequence length and batch size. Given the O(N^2) scaling of attention, employ KV-cache offloading or token eviction policies (e.g., Heavy-Hitter Oracle) to prevent OOM during extended 4K context conversations.'
  common_mistake: |
    **The Pitfall:** Allocating the full 12GB to the ML model.
    **The Rationale:** Candidates forget that phone RAM must simultaneously support the OS, camera, and active apps.
    **The Consequence:** In a real deployment, the OS will instantly kill the ML process for exceeding its restricted memory slice.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hardware: 12GB RAM total, 4GB OS reserve, 1GB App/Weights.
    - KV-Cache params: 32 layers, 8 heads, 64 head dimension, FP16 (2 bytes).

    **Calculations:**
    - Available RAM: 12GB - 4GB (OS) - 1GB (App/Weights) = 7GB.
    - KV/Token (FP16): 2(K,V) * 32L * 8H * 64D * 2 bytes = 65,536 bytes (64 KB).
    - KV per Turn (4K): 4096 * 64 KB = 256 MB.
    - Total KV (10 Turns): 10 * 256 MB = 2.5 GB.

    **Conclusion & Interpretation:**
    - **Result: 2.5 GB (Memory-Bound)**. 2.5 GB easily fits in the 7GB available headroom, but attention computation over 40K total context necessitates context compression.
