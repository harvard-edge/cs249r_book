title: Analyze Transformer Token Budget on Snapdragon 8 Gen 3
scenario: A mobile AI assistant uses a 1B parameter transformer on a mobile SoC. The model is INT4 quantized (500MB weights).
question: How would you analyze the memory allocation for supporting 10 concurrent conversations, each with its own 4K context window, given 32 layers, 8 KV heads, and a 64 head dimension?
details:
  realistic_solution: Account for OS and app memory before allocating KV cache. With 12GB total RAM, reserve 4GB for the OS and about 1GB for the app plus 500MB INT4 weights, leaving roughly 7GB for KV/cache workspace. KV per cached token is 2(K,V) * 32 layers * 8 KV heads * 64 dim * 2 bytes = 65,536 bytes, or 64 KiB. One 4K conversation needs 4096 * 64 KiB = 256 MiB of KV. Ten separate concurrent 4K conversations need about 2.5 GiB, leaving roughly 4.5GB of KV headroom inside the 7GB budget. This fits in memory, but the scheduler should cap active simultaneous decoding and evict/compress inactive sessions because latency scales with the active context being attended, not with unused sessions sitting in RAM.
  common_mistake: |
    **The Pitfall:** Allocating the full 12GB to the ML model.
    **The Rationale:** Candidates forget that phone RAM must simultaneously support the OS, camera, and active apps.
    **The Consequence:** In a real deployment, the OS will instantly kill the ML process for exceeding its restricted memory slice.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hardware: 12GB RAM total, 4GB OS reserve, 1GB App/Weights.
    - Interpretation: 10 separate concurrent conversations, each retaining a 4K KV cache.
    - KV-Cache params: 32 layers, 8 heads, 64 head dimension, FP16 (2 bytes).

    **Calculations:**
    - Available RAM: 12GB - 4GB (OS) - 1GB (App/Weights) = 7GB.
    - KV/Token (FP16): 2(K,V) * 32L * 8H * 64D * 2 bytes = 65,536 bytes (64 KB).
    - KV per Turn (4K): 4096 * 64 KB = 256 MB.
    - Total KV (10 Conversations): 10 * 256 MiB = 2.5 GiB.
    - Remaining headroom: 7 GB - 2.5 GiB ≈ 4.5 GB.

    **Conclusion & Interpretation:**
    - **Result: 2.5 GiB KV cache for 10 independent 4K conversations.** This fits in the 7GB available headroom; do not treat it as one 40K-token attention window unless the product actually concatenates all sessions into a single context.
