title: On-Device Inference Cost on Snapdragon 8 Gen 3
scenario: You are tasked with deploying a 1 billion parameter generative model on a premium smartphone. The NPU is capable of 45 TOPS in INT8, utilizing shared LPDDR5X memory.
question: How would you estimate on-device inference cost on Snapdragon 8 Gen 3 from compute and memory limits to meet a 20 tokens/sec requirement?
details:
  realistic_solution: |
    Estimate the cost as two lower bounds: dense INT8 compute per generated token and sustained memory traffic for the active decoder layers, KV cache, and runtime overhead. A 1B INT8 model has a 1 GB resident weight footprint; a conservative decode model treats roughly one pass over those weights as the dominant per-token DRAM traffic when tiles are not fully reused. At 64 GB/s that lower bound is 15.6 ms/token, but KV reads/writes, sampling, launch overhead, and thermal throttling can easily consume the remaining headroom. The 20 tokens/sec target is plausible only if profiling shows sustained per-token latency below 50 ms under the target context length.
  common_mistake: |
    **The Pitfall:** Calculating latency strictly using NPU TOPS.
    **The Rationale:** Candidates blindly divide operations by 45 TOPS, failing to realize that autoregressive token generation is bottlenecked by the speed at which weights can stream from LPDDR5X.
    **The Consequence:** Promising theoretical frame rates that are physically impossible due to memory bandwidth starvation.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: 1B params (INT8 resident footprint = 1 GB).
    - Target: 20 tok/sec.
    - Bandwidth: ~64 GB/s LPDDR5X.
    - NPU: 45 TOPS INT8 peak.
    - Approximate dense decode work: one multiply-add per parameter per token, counted as ~2 integer operations.

    **Calculations:**
    - Conservative active-layer weight traffic lower bound: about one resident-weight pass per token = ~1 GB/token when tiles are not fully reused.
    - Weight-traffic time = 1 GB / 64 GB/s = 15.6 ms/token.
    - Bandwidth lower-bound rate before KV/runtime overhead = 1 / 0.0156s ≈ 64 tok/sec.
    - Compute work ≈ 1B params * 2 ops = 2 GOP/token.
    - Compute lower bound = 2 GOP / 45,000 GOP/s ≈ 0.044 ms/token.
    - 20 tok/sec requires <= 50 ms/token, leaving about 34 ms/token for KV-cache traffic, sampling, scheduling, and thermal loss after the conservative weight-traffic lower bound.

    **Conclusion & Interpretation:**
    - **Result: likely bandwidth-bound and target-plausible, not guaranteed.** The 1 GB resident model can meet 20 tok/sec only if measured KV-cache and runtime overhead keep sustained decode below 50 ms/token.
