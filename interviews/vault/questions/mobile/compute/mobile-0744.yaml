title: The Burst Benchmarking Illusion
scenario: Your mobile model runs at 30 FPS during internal demos, but users complain that it slows down to 12 FPS after a minute of use.
question: Based on the performance timeline, what physical protection mechanism is engaging inside the smartphone?
details:
  realistic_solution: |
    You are hitting the Sustained Thermal Envelope. Mobile SoCs support high TOPS only for short "bursts." For continuous inference, the device throttles to its sustained thermal design power (sTDP), often 40-60% of peak. The fix is to target sustained performance or implement adaptive frame rates.
  common_mistake: |
    **The Pitfall:** Concluding the phone is defective or needs active cooling.
    **The Rationale:** Engineers apply desktop heuristics where fans mitigate load, ignoring mobile thermal envelopes.
    **The Consequence:** Releasing a model that works for 60 seconds then degrades terribly in production.
  napkin_math: |
    **Assumptions & Constraints:**
    - Burst frame rate during demos: 30 FPS.
    - Observed sustained frame rate after one minute: 12 FPS.

    **Calculations:**
    - Sustained ratio = 12 FPS / 30 FPS = 0.40.
    - The phone is sustaining about 40% of the short-burst performance once heat builds up.

    **Conclusion & Interpretation:**
    - **Result: 12 FPS observed sustained throughput (Thermal-Bound)**. The physical protection mechanism is thermal throttling through DVFS to keep the SoC inside its sustained thermal envelope.
