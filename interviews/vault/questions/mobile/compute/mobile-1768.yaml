title: Tensor G3 TPU Memory Bandwidth Bottleneck
scenario: You are deploying a 3.4 billion parameter INT8 quantized model on a Google Tensor G3 device featuring a 7.5 TOPS TPU and 12 GB of LPDDR5X memory (68 GB/s bandwidth). During autoregressive text generation at a batch size of 1, profiling reveals the TPU is operating at less than 5% compute utilization, achieving only 20 tokens per second.
question: Why is the TPU compute capacity severely underutilized, and what physical characteristic constrains the generation rate?
details:
  realistic_solution: Autoregressive decoding at batch size 1 is fundamentally memory-bound because all model weights must be streamed from the LPDDR5X RAM for every single generated token. The TPU's 7.5 TOPS represent peak arithmetic performance, but the compute units sit idle waiting for the 3.4 GB of weights to be shuttled from memory across the 68 GB/s bus, meaning the accelerator's performance is bottlenecked by memory fetch rather than arithmetic limits.
  common_mistake: |
    **The Pitfall:** Confusing compute-bound operations with memory-bound operations.
    **The Rationale:** Candidates typically divide the 7.5 TOPS by the operations required per token, incorrectly concluding the device should generate over a thousand tokens per second.
    **The Consequence:** They fail to realize that single-batch autoregressive decoding is strictly limited by the memory bandwidth required to stream the weights.
  napkin_math: |
    **Assumptions & Constraints:**
    - 3.4 billion parameter model in INT8 (1 byte).
    - Google Tensor G3: 7.5 TOPS, 68 GB/s bandwidth.

    **Calculations:**
    - Model size: 3.4 billion * 1 byte = 3.4 GB.
    - Memory bandwidth limit: 68 GB/s / 3.4 GB per token = 20 tokens/second.
    - Compute limit: 7.5 TOPS / (3.4e9 weights * 2 ops/weight) = ~1,102 tokens/second.
    - Compute utilization: 20 tokens/s / 1102 tokens/s = ~1.8%.

    **Conclusion & Interpretation:**
    - **Result: 20 tokens/second (Memory-Bandwidth Bound)**. The generation rate is constrained by memory fetch rather than peak TOPS.
