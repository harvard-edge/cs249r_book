title: The Mobile Roofline Dilemma (mobile-0324)
scenario: You're profiling a new object detection model on an Apple A17 Pro. Your profiler shows that a single inference pass executes 70 Giga-operations (GOps) and requires reading a total of 200 MB of data.
question: Based on these numbers, is your model's performance more likely to be limited by the ANE's compute speed or the memory system's bandwidth?
details:
  realistic_solution: 'The model is **memory-bound**. To determine this, we must compare the model''s Arithmetic Intensity (AI) to the hardware''s Ridge Point. The AI must be *greater* than the Ridge Point for a workload to be compute-bound.'
  common_mistake: |
    **The Pitfall:** Assuming a high peak TOPS specification means workloads will automatically be compute-bound.
    **The Rationale:** Engineers misinterpret the headline TOPS number and fail to account for the memory bandwidth required to 'feed' the processor.
    **The Consequence:** Optimizing compute units while the NPU stalls waiting for data, achieving zero speedup.
  napkin_math: |
    **Assumptions & Constraints:**
    - Ops: 70 GOps.
    - Memory read: 200 MB.
    - Peak compute: 35 TOPS.
    - Bandwidth: 51.2 GB/s.

    **Calculations:**
    - Calculate Arithmetic Intensity: 70 GOps / 200 MB = 350 Ops/Byte.
    - Calculate Ridge Point: 35 TOPS / 51.2 GB/s = ~684 Ops/Byte.
    - Compare AI to Ridge Point: 350 Ops/Byte < 684 Ops/Byte.

    **Conclusion & Interpretation:**
    - **Result: 350 Ops/Byte (Memory-Bound)**. The workload is memory-bound.
  options:
  - Compute-bound, because the Arithmetic Intensity (350 Ops/Byte) is less than the hardware's Ridge Point (~684 Ops/Byte).
  - Memory-bound, because the model's Arithmetic Intensity is only 0.35 Ops/Byte.
  - Memory-bound, because the model's Arithmetic Intensity (350 Ops/Byte) is lower than the hardware's Ridge Point (~684 Ops/Byte).
  - Compute-bound, because the model requires 70 Giga-operations, which is a very large compute load for a mobile device.
  correct_index: 2
