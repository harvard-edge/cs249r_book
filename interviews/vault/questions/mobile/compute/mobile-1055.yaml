title: 'Mobile Transformer Cost Mastery: Full On-Device LLM Product Design'
scenario: 'Design a complete on-device LLM product strategy for a messaging app using A17 Pro (8GB, 100GB/s) and Snapdragon 8 Gen 3 (16GB, 77GB/s). Requirements: grammar correction (50 tokens), reply suggestions (100 tokens), email drafting (500 tokens). P99 < 1s (grammar), < 2s (replies), < 5s (email).'
question: How would you choose model size and quantization for each task and calculate memory allocation?
details:
  realistic_solution: |
    Use a tiered on-device plan rather than one model for all tasks. Keep a distilled 1B INT4 edit/reply model resident for grammar correction and reply suggestions on both A17 Pro and Snapdragon 8 Gen 3; reserve a 3B INT4 quality model for email drafting. Base latency on measured decode performance after warm-up, not raw model bytes divided by bandwidth: assume the distilled 1B tier sustains about 60 tok/s on A17 Pro and 55 tok/s on Snapdragon, while the 3B tier sustains about 22 tok/s on A17 Pro and 18 tok/s on Snapdragon at the target context. Grammar maps to the 1B edit model: 50 tokens on the slower Snapdragon path is ~0.91s, meeting the 1s SLO. Replies also use the 1B model: 100 tokens at 55 tok/s is ~1.82s, meeting the 2s SLO with stop-length enforcement. Email uses the 3B model for quality: 500 tokens at 18 tok/s is ~27.8s on Snapdragon, so it cannot promise full completion under 5s on-device. The product should meet the 5s P99 by returning a useful 80-100 token draft/outline locally and streaming the remainder, or route long email completion to cloud when strict completion latency is required. Memory with both tiers resident: 0.5GB (1B) + 1.5GB (3B) + ~0.3GB KV/workspaces/adapters = ~2.3GB, fitting both 8GB A17 Pro and 16GB Snapdragon devices after OS reserve.
  common_mistake: |
    **The Pitfall:** Choosing a single model size for all three tasks.
    **The Rationale:** Candidates prioritize simplicity of deployment, missing the strict latency bounds for small tasks and quality bounds for large tasks.
    **The Consequence:** A single model will either fail the strict <1s P99 latency for grammar or produce unacceptably poor quality for long-form email drafting.
  napkin_math: |
    **Assumptions & Constraints:**
    - Grammar Target: < 1s for 50 tokens = >50 tok/s effective.
    - Reply Target: < 2s for 100 tokens = >50 tok/s effective.
    - Email Target: < 5s for 500 tokens = >100 tok/s effective if full completion must finish in 5s.
    - Use measured decode rates after warm-up, not model size / bandwidth: 1B distilled tier ≈60 tok/s on A17 Pro and ≈55 tok/s on Snapdragon for short edits; 3B quality tier ≈22 tok/s on A17 Pro and ≈18 tok/s on Snapdragon.

    **Calculations:**
    - Grammar on slow path: 50 / 55 ≈ 0.91s, so a distilled 1B edit model meets the 1s SLO.
    - Replies on slow path: 100 / 55 ≈ 1.82s, so the 1B tier meets the 2s SLO with stop-length enforcement.
    - Full email completion on 3B slow path: 500 / 18 ≈ 27.8s, so full 500-token completion cannot meet 5s locally.
    - Email within 5s locally: 18 tok/s * 5s ≈ 90 tokens; return a draft outline/first chunk by 5s and stream the rest, or route strict full-completion requests to cloud.
    - Memory Footprint: 0.5 GB (1B INT4) + 1.5 GB (3B INT4) + ~0.3 GB KV/buffers/adapters = ~2.3 GB total.

    **Conclusion & Interpretation:**
    - **Result: ~2.3 GB resident ML footprint.** Grammar and replies meet SLOs on both device classes with the 1B tier; full 500-token email drafting does not meet a 5s local completion SLO and must be streamed, shortened, or routed to cloud.
