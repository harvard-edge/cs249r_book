title: The Mobile Style Transfer Jank
scenario: You are a mobile ML engineer optimizing a real-time neural style transfer filter for a new social media app. The filter is causing UI jank, taking 25ms to process a single frame instead of the 16ms required for a smooth 60 FPS experience. You profile the core style transfer layer and find it executes 200 Giga-ops (INT8) and moves 500 MB of data from memory for each frame. The hardware's ridge point is 683 Ops/Byte.
question: Is the 200 GOps style transfer layer compute-bound or memory-bound, and what roofline evidence supports that diagnosis?
details:
  realistic_solution: 'The layer is fundamentally memory-bound. The first step is to calculate the Arithmetic Intensity (AI) of the operation. The hardware ridge point, where it transitions from memory-bound to compute-bound, is approximately 683 Ops/Byte. The style transfer layer''s AI is significantly lower, meaning the Neural Engine is starved for data. To fix this, the engineer must reduce the memory traffic relative to the compute, for example by using operator fusion, tiling/blocking strategies for better cache locality, or applying model pruning/quantization to reduce the size of weights that need to be read.'
  common_mistake: |
    **The Pitfall:** Assuming a high GOps count automatically means compute-bound.
    **The Rationale:** Engineers often focus on the raw operations and confuse memory capacity with memory bandwidth.
    **The Consequence:** Applying the wrong optimizations (e.g., pruning parameters) instead of fixing memory traffic (e.g., operator fusion).
  napkin_math: |
    **Assumptions & Constraints:**
    - Target = 16 ms/frame. Current = 25 ms/frame.
    - Compute = 200 GOps. Data Movement = 500 MB.
    - NPU peak = 35 TOPS, Memory Bandwidth = 51.2 GB/s. Hardware Ridge Point = 683 Ops/Byte.

    **Calculations:**
    - Arithmetic Intensity (AI) = 200 GOps / 500 MB = 400 Ops/Byte.
    - 400 Ops/Byte < 683 Ops/Byte hardware limit.
    - Achievable Throughput = AI * Memory Bandwidth = 400 * 51.2 GB/s = 20.48 TOPS (underutilizing the 35 TOPS peak).

    **Conclusion & Interpretation:**
    - **Result: Throughput drops to 20.48 TOPS (Memory-bandwidth-bound limitation)**. The layer is purely starved for data, severely underutilizing the NPU peak.
  options:
  - Compute-bound. The 35 TOPS of the NPU is insufficient to execute 200 Giga-ops within the 16ms time budget.
  - Memory-bound. The layer's Arithmetic Intensity (400 Ops/Byte) is below the hardware ridge point (~683 Ops/Byte).
  - Thermally-bound. The SoC is likely overheating and throttling the NPU clock speed, a common issue in slim devices under sustained load.
  - Memory-bound. The 500 MB of data is too large to fit in the on-chip caches, forcing slow reads from main RAM.
  correct_index: 1
