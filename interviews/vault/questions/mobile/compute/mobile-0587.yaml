title: The 15 FPS Video ML Bottleneck
scenario: Your social media app applies real-time ML effects to video, running three models simultaneously. Each model individually hits 30 FPS, but when all three run together, the frame rate drops to 15 FPS.
question: Why can't three 30 FPS models run at 30 FPS together?
details:
  realistic_solution: |
    Each model hitting 30 FPS alone only proves that it can meet a 33.3ms frame budget when it owns the accelerator, memory bandwidth, and scheduler. Running all three together can serialize NPU work, triple peak memory traffic, and create bus contention with camera/video pipelines. The observed 15 FPS means the combined pipeline is taking about 66.7ms per frame, so the bottleneck is shared system capacity, not any single model's standalone FPS. Heterogeneous placement may help, but the direct explanation is contention and scheduling across shared resources.
  common_mistake: |
    **The Pitfall:** Treating TOPS as a guarantee of throughput, regardless of memory bandwidth and scheduling.
    **The Rationale:** Assuming the NPU can automatically multi-task models seamlessly.
    **The Consequence:** Building a pipeline that stutters heavily because models serialize and block each other on the NPU bus.
  napkin_math: |
    **Assumptions & Constraints:**
    - 30 FPS frame budget: 1000ms / 30 = 33.3ms.
    - Observed combined throughput: 15 FPS.
    - The three-model pipeline shares NPU slots, memory bandwidth, cache, and camera/video buses.

    **Calculations:**
    - Observed combined frame time: 1000ms / 15 = 66.7ms.
    - Required frame time for 30 FPS: 33.3ms.
    - The combined pipeline is about 66.7 / 33.3 = 2x over budget.
    - If each model individually meets 33.3ms, the missing factor is not standalone model latency; it is the added contention, serialization, synchronization, and memory traffic when all three run in the same frame interval.

    **Conclusion & Interpretation:**
    - **Result: Shared-resource bound.** Three individually real-time models can miss the joint 30 FPS target because the aggregate pipeline exceeds the shared accelerator and memory-bandwidth budget, producing the observed 15 FPS.
