title: Calculate Weight-Streaming LLM Inference Bound
scenario: You are deploying a 3.2 billion parameter LLM quantized to 8-bit integers on a hypothetical mobile accelerator with 7.5 TOPS peak compute and 60 GB/s effective memory bandwidth. The batch-1 decoder implementation streams the full INT8 weight set from shared memory once per generated token, with activations and KV-cache traffic ignored for this bound.
question: What operational intensity and token generation rate bound apply to batch-1 weight-streaming LLM inference?
details:
  realistic_solution: Under the prompt's explicit weight-streaming assumption, each generated token reads 3.2 GB of INT8 weights and performs about 6.4 GOP. The operational intensity is therefore 6.4 GOP / 3.2 GB = 2 ops/byte. The hardware ridge point is 7.5 TOPS / 60 GB/s = 125 ops/byte, so the implementation is memory-bound and the bandwidth limit is 60 GB/s / 3.2 GB/token = 18.75 tokens/s.
  common_mistake: |
    **The Pitfall:** Focusing solely on the 7.5 TOPS peak compute limit to calculate latency.
    **The Rationale:** Candidates often default to compute-bound assumptions for neural networks, forgetting the mechanics of autoregressive decoding at batch size 1.
    **The Consequence:** The resulting latency calculation is wildly optimistic, completely missing the memory bandwidth bottleneck.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model: 3.2B parameters, INT8 (1 byte/param).
       - Hardware: 7.5 TOPS peak compute, 60 GB/s effective memory bandwidth.
       - Batch Size: 1.
       - Implementation model: stream all INT8 weights once per generated token.
    2. **Calculations:**
       - Weight traffic per token: 3.2B * 1 byte = 3.2 GB/token.
       - Operations per Token: 3.2B MACs * 2 ops/MAC = 6.4 GOP.
       - Operational Intensity (OI): 6.4 GOPS / 3.2 GB = 2 OPs/byte.
       - Hardware Ridge Point: 7.5 TOPS / 60 GB/s = 125 OPs/byte.
       - Max Token Rate: 60 GB/s / 3.2 GB/token = 18.75 tokens/sec.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound. Since OI (2) < Ridge Point (125), decode is bottlenecked entirely by memory bandwidth at ~18.75 tok/s.**
