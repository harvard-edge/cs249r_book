title: 'Roofline Analysis for Mobile AI: Optimizing Real-time Object Detection on Apple A17 Pro'
scenario: You are optimizing a real-time object detection model for deployment on an NPU. During testing, you observe that the model runs at a smooth 60 FPS when processing 320x320 input images. However, when the input resolution is increased to 1280x1280, the frame rate plummets to 15 FPS. A quick profiling shows that the MAC operations only increased by a factor of ~4-5, but the FPS dropped by a factor of 4.
question: How would you use roofline analysis to diagnose this performance bottleneck and optimize real-time object detection?
details:
  realistic_solution: 'Apply the Roofline Model by: 1. Estimating Peak Performance: Obtain the peak compute performance of the NPU. 2. Estimating Peak Memory Bandwidth: Obtain the effective memory bandwidth. 3. Calculating Operational Intensity: Determine the OI (FLOPs/byte) of the model for both inputs. 4. Plotting on Roofline Chart: Plot the model''s OI against its performance. If the 1280x1280 point falls significantly below the compute ceiling and hits the memory bandwidth ceiling, it indicates a memory-bound workload.'
  common_mistake: |
    **The Pitfall:** Immediately jumping to model compression techniques like pruning or quantization.
    **The Rationale:** Engineers see a performance drop and instinctively try to reduce compute FLOPs.
    **The Consequence:** Time is wasted compressing a model whose bottleneck is actually memory bandwidth, yielding zero performance improvement.
  napkin_math: |
    **Assumptions & Constraints:**
    - Compute limit: 35 TOPS. Bandwidth: 68 GB/s.
    - 1280x1280 footprint: 0.9 GFLOPs compute, ~50 MB transfer.

    **Calculations:**
    - Operational Intensity (OI): 0.9e9 FLOPs / 50e6 Bytes = 18 FLOPs/byte.
    - Memory-bound Limit: 18 FLOPs/byte * 68 GB/s = 1.224 TOPS.

    **Conclusion & Interpretation:**
    - **Result: 1.224 TOPS << 35 TOPS, confirming the high-res model is massively memory-bound (Bandwidth-Bound).**
