title: The Trivial Model Paradox
scenario: "You have a very small, simple ML model – say, a single 100-neuron dense layer. When you deploy it on a modern mobile SoC, you observe that running it on the CPU often yields lower latency than trying to offload it to the dedicated NPU."
question: "Why can a CPU beat the NPU for a single 100-neuron dense layer on a modern mobile SoC?"
details:
  realistic_solution: "Dedicated NPUs incur significant startup and data transfer overheads that overshadow their theoretical throughput for trivial workloads. Dispatching to the NPU requires context switching, driver initialization, and memory marshaling from the CPU cache to shared or dedicated NPU memory. The CPU can execute the layer instantaneously within its existing L1/L2 caches using optimized vector instructions (e.g., ARM NEON)."
  common_mistake: |
    **The Pitfall:** Stating simply that the NPU isn't optimized for small models without identifying the bottleneck.
    **The Rationale:** Candidates recognize the symptom but fail to understand the hardware-level context switching, driver initialization, and memory transfer overheads.
    **The Consequence:** Misattributing the latency to NPU compute speed rather than system-level dispatch overheads, leading to poor heterogeneous compute allocation.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Small dense layer inference.
       - CPU compute time ≈ 50 µs.
       - NPU dispatch: Startup ≈ 100 µs, Transfer ≈ 20 µs, Compute ≈ 10 µs.
    2. **Calculations:**
       - CPU Total Time = 50 µs.
       - NPU Total Time = 100 µs + 20 µs + 10 µs = 130 µs.
    3. **Conclusion & Interpretation:**
       - **Result: Overhead-Bound.** The NPU total latency (130 µs) is massively dominated by dispatch and data transfer overhead, making it over 2.5x slower than the CPU (50 µs) for trivial layers.
