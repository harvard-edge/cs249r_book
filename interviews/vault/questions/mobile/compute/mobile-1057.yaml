title: 'Mobile Transformer Cost Optimization: Quantization + Speculative for Mobile LLM'
scenario: 'A Snapdragon 8 Gen 3 mobile app runs Llama-3-7B INT4 (3.5GB) for chat. P99 = 4.55s for 100 tokens — over 3s SLO. Evaluate two optimizations: (1) switch to INT2 quantization (1.75GB, estimated 2-4% quality loss), (2) apply speculative decoding with a 1B INT4 draft (0.5GB) accepting α=0.75 of 4 draft tokens.'
question: Which optimization achieves P99 < 3s with minimum quality loss?
details:
  realistic_solution: 'Use the measured 7B baseline from the scenario: 4.55s for 100 tokens, or 45.5ms/token. INT2 roughly halves weight traffic if kernels are efficient, so it is estimated at about 22.8ms/token, or 2.28s for 100 tokens, but with the stated 2-4% quality loss and kernel risk. For speculative decoding, the 1B draft is about 0.5/3.5 of the target cost, or ~6.5ms/token, so drafting 4 tokens costs ~26ms. Verifying the 4-token block with the 7B target is not a free single-token decode; budget about 1.2x one target step, or ~55ms, because the target evaluates the proposed block in parallel with extra attention work. With k=4 and independent acceptance α=0.75, expected progress with a bonus target token is approximately 1 + α + α^2 + α^3 + α^4 = 3.05 tokens/round. Effective TPOT is (26+55)/3.05 ≈26.6ms, or 2.66s for 100 tokens. Recommendation: speculative decoding meets the 3s SLO with functionally unchanged target-model output distribution when implemented with exact verification/rejection
    sampling; INT2 also meets the SLO but trades quality for simplicity.'
  common_mistake: |
    **The Pitfall:** Blindly recommending INT2 or speculative decoding without checking constraints.
    **The Rationale:** Candidates ignore that INT2 requires specialized kernels or that speculative decoding may have a low acceptance rate on specific data.
    **The Consequence:** Deploying an optimization that either doesn't run on the hardware or fails to speed up generation.
  napkin_math: |
    **Assumptions & Constraints:**
    - Baseline measured latency for 7B INT4: 4.55s / 100 tokens = 45.5 ms/token.
    - INT2 Model: 1.75 GB, with efficient kernels assumed to roughly halve the baseline TPOT.
    - Speculative Draft: 4 tokens from a 1B INT4 draft model.
    - Speculative Acceptance: α=0.75.

    **Calculations:**
    - INT2 Speed: 45.5 ms/tok * (1.75GB / 3.5GB) ≈ 22.8 ms/tok. 100 tokens ≈ 2.28s.
    - Draft TPOT estimate: 45.5 ms * (0.5GB / 3.5GB) ≈ 6.5 ms/tok.
    - Speculative Draft Cost: 4 * 6.5 ms ≈ 26 ms.
    - Speculative Verify Cost: about 1.2 target-token equivalents ≈ 55 ms for the proposed block.
    - Expected tokens advanced: 1 + 0.75 + 0.75^2 + 0.75^3 + 0.75^4 ≈ 3.05 tokens/round.
    - Effective speculative TPOT: (26 + 55) / 3.05 ≈ 26.6 ms/tok. 100 tokens ≈ 2.66s.

    **Conclusion & Interpretation:**
    - **Result: 2.66s speculative decode.** Both options meet P99 < 3s; speculative decoding has lower quality risk when exact target-model verification is used, while INT2 is simpler but accepts the stated 2-4% quality loss.
