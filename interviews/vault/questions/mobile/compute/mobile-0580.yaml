title: The ANE Delegation Regression
scenario: You ship a CoreML object detection model on iPhone. Xcode benchmarks show 3ms on the A17 Pro Neural Engine. After an iOS update, users report the same model now takes 30ms — a 10x regression. You haven't changed the model or the app. Instruments shows the ANE utilization is 0% and CPU utilization spikes to 100% during inference.
question: Why does a Core ML detector regress from 3 ms on A17 Pro ANE to 30 ms CPU inference after an iOS update?
details:
  realistic_solution: 'CoreML''s delegation to the ANE is not guaranteed — it''s a best-effort optimization that can silently fall back to CPU. Several iOS-update scenarios cause this: one unsupported op in the critical path forces the entire graph to CPU because CoreML''s graph partitioner decides the transfer overhead of partial delegation exceeds the benefit.'
  common_mistake: |
    **The Pitfall:** Assuming Apple broke the Neural Engine driver in the iOS update.
    **The Rationale:** Candidates jump to externalizing blame instead of diagnosing silent delegation failures.
    **The Consequence:** Filing useless bug reports instead of fixing the unsupported op in the CoreML graph.
  napkin_math: |
    **Assumptions & Constraints:**
    - ANE Path: 3ms (100% ANE utilization).
    - CPU Fallback Layers: 80 layers.
    - CPU Execution Time: 0.35ms/layer.
    - CPU Dispatch Overhead: ~2 ms.

    **Calculations:**
    - CPU Fallback Layers Time: 80 layers * 0.35ms/layer = 28 ms.
    - Total CPU Time: 28 ms + 2 ms = 30 ms.

    **Conclusion & Interpretation:**
    - **Result: 30 ms (Compute-Bound)**. The 10x regression perfectly matches the CPU fallback profile.
