title: The UI Contention Crisis
scenario: You are deploying a 7B parameter local LLM on an iPhone 15 Pro (A17 Pro). In your sterile testing environment, it reliably generates text at 25 tokens/second. But in production, users complain that whenever they scroll the app's rich 3D animation interface, the LLM generation speed plummets to 5 tokens/second.
question: Why does an iPhone 15 Pro 7B local LLM drop from 25 to 5 tokens/sec when users scroll a 3D interface?
details:
  realistic_solution: 'Compute is not the bottleneck; memory bandwidth is. Apple Silicon uses Unified Memory Architecture (UMA) where CPU, GPU, and Neural Engine share the same physical memory pool and bandwidth. A 7B model at INT4 = 3.5 GB weights. Autoregressive decode loads every weight once per token: 3.5 GB/token. iPhone 15 Pro memory bandwidth: ~120 GB/s shared across all processors. Theoretical ceiling: 120 GB/s / 3.5 GB = 34.2 tokens/s. In sterile testing (no other apps): ~25 tokens/s. With a heavy 3D UI, the GPU can consume ~100 GB/s of bandwidth, leaving only ~20 GB/s available for the Neural Engine/CPU. Throughput drops to 20 / 3.5 = 5.7 tokens/s. This directly explains the massive real-world degradation to ~5 tokens/second.'
  common_mistake: |
    **The Pitfall:** Assuming the NPU and GPU have separate, isolated memory bandwidth.
    **The Rationale:** Candidates often think that because the LLM runs on the Neural Engine and the UI on the GPU, they won't interfere. They forget Apple Silicon uses Unified Memory Architecture (UMA).
    **The Consequence:** The root cause (memory bandwidth starvation) is missed, leading to futile compute-side optimizations.
  napkin_math: |
    **Assumptions & Constraints:**
    - 7B parameters at INT4 is about 3.5 GB of weight data.
    - During autoregressive decode with batch size 1, weight reads dominate and a useful first-order proxy is "roughly one model-weight pass per generated token."
    - A17 Pro has about 120 GB/s shared memory bandwidth.
    - Sterile measured throughput is 25 tokens/sec, so effective bandwidth demand is 25 * 3.5 GB = 87.5 GB/s after cache/reuse/runtime effects.
    - Heavy 3D scrolling can consume enough shared bandwidth to leave roughly 20 GB/s effective bandwidth for decode.

    **Calculations:**
    - Sterile headroom check: 87.5 GB/s demand is below the 120 GB/s system ceiling.
    - Contended decode estimate: 20 GB/s available / 3.5 GB per token proxy = 5.7 tokens/sec.
    - Observed production speed of about 5 tokens/sec is consistent with shared-memory bandwidth contention.

    **Conclusion & Interpretation:**
    - **Result: about 5.7 tokens/sec under contention.** The 3.5 GB/token term is a decode-bandwidth proxy, not a claim that the model file is literally reloaded from storage for every token.
