title: Mobile AI Inference Cost on Exynos 2400
scenario: You are deploying a quantized MobileNetV3-Small model for real-time image classification on a smartphone featuring the Samsung Exynos 2400. The quantized model requires approximately 0.45 TOPS (INT8 operations) per inference and has a memory footprint of 150 MB. The system needs to achieve a sustained inference rate of 40 frames per second.
question: How do you calculate Exynos 2400 NPU utilization and memory bandwidth for a mobile AI workload?
details:
  realistic_solution: To calculate theoretical NPU utilization, divide the required operations per second by the NPU's peak TOPS after confirming the operation-count convention. For memory, treat the 150 MB model as resident footprint, then estimate per-frame bandwidth from input, output, activations, and any weight or tensor traffic observed in profiling. Compare that measured or estimated traffic against LPDDR5X bandwidth, while noting that compiler mapping, thermal limits, and runtime overhead can dominate.
  common_mistake: |
    **The Pitfall:** Mistaking FLOPs for TOPS and ignoring the overhead of data movement to and from memory.
    **The Rationale:** Engineers assume compute is the only gating factor for mobile AI.
    **The Consequence:** Failing to verify if memory bandwidth is the primary bottleneck, resulting in unexpected stuttering even when NPU utilization is low.
  napkin_math: |
    **Assumptions & Constraints:**
    - Exynos 2400 Peak TOPS: 34.7.
    - Exynos 2400 Bandwidth: ~75 GB/s.
    - Model Requirement: 0.45 TOPS/inference.
    - Frame Rate: 40 FPS.
    - Model resident footprint: 150 MB.
    - Per-frame external I/O example: 1 MB input + 1 MB output = 2 MB, excluding profiled activation traffic.

    **Calculations:**
    - Required NPU Ops/sec: 0.45 TOPS/inference x 40 inferences/sec = 18 TOPS/sec.
    - NPU Utilization: (18 TOPS / 34.7 TOPS) x 100 = 51.9%.
    - Resident model memory: 150 MB capacity footprint, not automatically 150 MB/frame sustained bandwidth.
    - Minimum I/O bandwidth: 2 MB/frame x 40 FPS = 80 MB/s = 0.08 GB/s, plus profiled activation/weight traffic.

    **Conclusion & Interpretation:**
    - **Result: ~51.9% theoretical compute utilization; provided I/O bandwidth is far below 75 GB/s**. The numbers do not prove an end-to-end compute bottleneck; they show the target is plausible if kernels map efficiently and thermal limits hold.
