title: Mobile AI Inference Cost on Exynos 2400
scenario: You are deploying a quantized MobileNetV3-Small model for real-time image classification on a smartphone featuring the Samsung Exynos 2400. The quantized model requires approximately 0.45 TOPS (INT8 operations) per inference and has a memory footprint of 150 MB. The system needs to achieve a sustained inference rate of 40 frames per second.
question: How do you calculate Exynos 2400 NPU utilization and memory bandwidth for a mobile AI workload?
details:
  realistic_solution: To calculate NPU utilization, divide the total required TOPS per second by the NPU's peak TOPS. For memory bandwidth, sum the model's memory footprint, input, and output data sizes, then multiply by the target frame rate. Compare this demand against the LPDDR5X bandwidth to identify potential bottlenecks. Acknowledge that actual performance will also be influenced by software stack, thermal limits, and other system overheads.
  common_mistake: |
    **The Pitfall:** Mistaking FLOPs for TOPS and ignoring the overhead of data movement to and from memory.
    **The Rationale:** Engineers assume compute is the only gating factor for mobile AI.
    **The Consequence:** Failing to verify if memory bandwidth is the primary bottleneck, resulting in unexpected stuttering even when NPU utilization is low.
  napkin_math: |
    **Assumptions & Constraints:**
    - Exynos 2400 Peak TOPS: 34.7.
    - Exynos 2400 Bandwidth: ~75 GB/s.
    - Model Requirement: 0.45 TOPS/inference.
    - Frame Rate: 40 FPS.
    - Per-Frame Memory: 150 MB (weights) + 1 MB (input) + 1 MB (output) = 152 MB.

    **Calculations:**
    - Required NPU Ops/sec: 0.45 TOPS/inference x 40 inferences/sec = 18 TOPS/sec.
    - NPU Utilization: (18 TOPS / 34.7 TOPS) x 100 = 51.9%.
    - Bandwidth Demand: 152 MB/frame x 40 FPS = 6080 MB/s = 6.08 GB/s.

    **Conclusion & Interpretation:**
    - **Result: 51.9% Compute, 6.08 GB/s Bandwidth (Compute-Bound)**. System easily sustains targeted frame rates within physical NPU bounds.
