title: 'Mobile LLM Pareto Frontier on Snapdragon 8 Gen 3: Latency vs Perplexity'
scenario: A team is evaluating the quality-latency-memory tradeoff frontier for mobile LLMs on Snapdragon 8 Gen 3 (16GB, 77GB/s, 45 TOPS) for model sizes 1B, 3B, 7B, and 13B at INT4 quantization.
question: 'What would you identify as the Pareto-optimal model for a voice assistant (SLO: P99 < 3s, quality: perplexity < 12)?'
details:
  realistic_solution: 'INT4 models: 1B=0.5GB, 3B=1.5GB, 7B=3.5GB, 13B=6.5GB. All fit in the 12GB RAM budget after reserving 4GB for the OS, so latency and quality determine the frontier. Use an explicit decode model for the benchmark: at batch=1 and a fixed short voice-assistant context, assume each generated token is dominated by one pass over resident weights plus KV/cache overhead, so TPOT ≈ model_bytes / 77GB/s plus overhead. This gives approximate 100-token latencies of 0.65s for 1B, 1.95s for 3B, 4.55s for 7B, and 8.44s for 13B before extra tail overhead. P99<3s: 1B and 3B pass; 7B and 13B fail. Quality (approximate): scaling-law trend perplexity ~ A*N^-a with empirical anchors: 1B~12.5, 3B~10.5, 7B~9.2, 13B~8.7. Requirement PPL<12: 3B, 7B, and 13B pass. Pareto-optimal under both constraints: 3B INT4. 7B improves quality but violates the latency SLO.'
  common_mistake: |
    **The Pitfall:** Treating quality as a binary threshold rather than a continuous metric.
    **The Rationale:** Candidates do not apply empirical power-law scaling behavior to estimate how perplexity changes with model size.
    **The Consequence:** Failing to accurately identify the tradeoff frontier, leading to an incorrect Pareto-optimal model choice.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target P99 Latency: < 3s for 100 tokens. Target PPL: < 12.
    - Hardware: 77 GB/s memory bandwidth.
    - Model sizes at INT4: 1B (0.5GB), 3B (1.5GB), 7B (3.5GB), 13B (6.5GB).

    **Calculations:**
    - 3B P99 latency: 100 tokens * (1.5 GB / 77 GB/s) = 1.95s (< 3s).
    - 3B PPL: ~10.5 (< 12).
    - 7B P99 latency: 100 tokens * (3.5 GB / 77 GB/s) = 4.55s (> 3s).
    - 1B PPL: ~12.5 (> 12).

    **Conclusion & Interpretation:**
    - **Result: 3B is optimal (Memory Bandwidth-Bound).** It is the only model size meeting both latency and quality SLOs.
