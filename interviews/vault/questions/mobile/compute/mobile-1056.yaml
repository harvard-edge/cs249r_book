title: 'Mobile LLM Pareto Frontier on Snapdragon 8 Gen 3: Latency vs Perplexity'
scenario: A team is evaluating the quality-latency-memory tradeoff frontier for mobile LLMs on Snapdragon 8 Gen 3 (16GB, 77GB/s, 45 TOPS) for model sizes 1B, 3B, 7B, and 13B at INT4 quantization.
question: 'What would you identify as the Pareto-optimal model for a voice assistant (SLO: P99 < 3s, quality: perplexity < 12)?'
details:
  realistic_solution: 'INT4 models: 1B=0.5GB, 3B=1.5GB, 7B=3.5GB, 13B=6.5GB. All fit in the 12GB RAM budget after reserving 4GB for the OS, so latency and quality determine the frontier. Use a decode-aware benchmark estimate for batch=1 at a fixed short voice-assistant context, including KV reads, kernel overhead, and tail latency. Approximate P99 rates are 90 tok/s for 1B, 40 tok/s for 3B, 18 tok/s for 7B, and 10 tok/s for 13B. For 100 tokens this gives about 1.1s, 2.5s, 5.6s, and 10s respectively. P99<3s: 1B and 3B pass; 7B and 13B fail. Quality (approximate): scaling-law trend perplexity ~ A*N^-a with empirical anchors: 1B~12.5, 3B~10.5, 7B~9.2, 13B~8.7. Requirement PPL<12: 3B, 7B, and 13B pass. Pareto-optimal under both constraints: 3B INT4. 7B improves quality but violates the latency SLO.'
  common_mistake: |
    **The Pitfall:** Treating quality as a binary threshold rather than a continuous metric.
    **The Rationale:** Candidates do not apply empirical power-law scaling behavior to estimate how perplexity changes with model size.
    **The Consequence:** Failing to accurately identify the tradeoff frontier, leading to an incorrect Pareto-optimal model choice.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target P99 Latency: < 3s for 100 tokens. Target PPL: < 12.
    - Hardware: Snapdragon 8 Gen 3 with 77 GB/s peak memory bandwidth.
    - Model sizes at INT4: 1B (0.5GB), 3B (1.5GB), 7B (3.5GB), 13B (6.5GB).
    - Decode estimate uses benchmarked P99 token rates for batch=1 at a fixed short context, including KV/cache and kernel overhead.

    **Calculations:**
    - 1B P99 latency: 100 tokens / 90 tok/s = 1.1s, but PPL ~12.5 fails quality.
    - 3B P99 latency: 100 tokens / 40 tok/s = 2.5s (< 3s).
    - 3B PPL: ~10.5 (< 12).
    - 7B P99 latency: 100 tokens / 18 tok/s = 5.6s (> 3s), although PPL ~9.2 passes.
    - 13B P99 latency: 100 tokens / 10 tok/s = 10s (> 3s), although PPL ~8.7 passes.

    **Conclusion & Interpretation:**
    - **Result: 3B is optimal on the measured frontier.** It is the smallest model meeting quality and the largest model that still meets the 3s latency SLO; larger models improve PPL but miss the decode latency target.
