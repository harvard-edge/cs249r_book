title: On-Device Federated Learning Round Feasibility on Snapdragon 8 Gen 3
scenario: A federated learning system trains a keyboard prediction model locally on a mobile device. Each device runs 10 local epochs on 1000 samples.
question: How long, how much memory, and how much battery does a 10-epoch LSTM FL round cost on a modern mobile device?
details:
  realistic_solution: 'LSTM training on FP32: CPU FP32 performance ~50 GFLOPS. LSTM 2M params: FWD FLOPs \u2248 2x2Mx64x10 = 2.56B. BWD \u2248 2xFWD = 5.12B. Total per sample: 7.68B FLOPs. 1000 samples x 10 epochs = 10,000 iterations. Total FLOPs = 76.8 TFLOPS. At 50 GFLOPS: 1536 seconds = 25.6 minutes. Memory: 2M params x 4B x 3 = 24MB. Battery: 25.6 min at 3W CPU = 78mWh. Feasible if scheduled during charging.'
  common_mistake: |
    **The Pitfall:** Using INT8 TOPS for training throughput.
    **The Rationale:** Candidates forget that on-device FL training typically runs in FP32 for gradient accuracy, and NPUs often lack native FP32 backward pass support.
    **The Consequence:** Vastly underestimating training time by assuming the NPU can be fully utilized for backpropagation.
  napkin_math: |
    **Assumptions & Constraints:**
    - CPU Compute: 50 GFLOPS FP32.
    - Workload: 10,000 samples total, 7.68B FLOPs/sample.
    - CPU Power: 3W.

    **Calculations:**
    - Total FLOPs: 10,000 * 7.68B = 76.8 TFLOPS.
    - Time: 76.8 TFLOPS / 50 GFLOPS = 1536 seconds (25.6 minutes).
    - Memory: 2M * 4 bytes * 3 (weights, grads, opt) = 24 MB.
    - Energy: 3W * 1536s = 4608 Joules = 1.28 Wh.

    **Conclusion & Interpretation:**
    - **Result: Compute-Bound.** Training is feasible but takes 25.6 minutes, meaning it strictly requires night-time charging.
