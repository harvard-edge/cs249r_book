title: 'Mobile Transformer Cost Optimization: On-Device vs Streaming Hybrid'
scenario: A mobile LLM app uses Tensor G3 for on-device inference. A Phi-3-Mini INT4 model generates a constant P99 latency of 2.79s for 100 tokens. The strict product SLO is <3s. Alternatively, when network RTT is <100ms, a cloud H100 API ($0.001/1K tokens) generates a P99 latency of 1.5s.
question: How would you design an optimal hybrid policy that minimizes cost while maintaining P99<3s across network conditions, and what is the cost per 1000 daily queries?
details:
  realistic_solution: The cost-minimizing policy under the stated P99<3s SLO is local-only, because the on-device path already has constant P99=2.79s and zero API cost. A hybrid policy is justified only if the product also values lower median/typical latency. In that case, probe network RTT and route to cloud only when the predicted end-to-end P99, including RTT and queueing, remains below 3s; otherwise use local. If that heuristic sends 70% of traffic to cloud, it still satisfies the SLO only because each selected path is individually below 3s under the routing predicate, not because P99 is automatically max(1.5s, 2.79s). The expected cloud cost is 100 output tokens/query * $0.001/1000 tokens = $0.0001 per cloud query; at 70% cloud routing, cost is $0.00007/query or $0.07 per 1000 queries.
  common_mistake: |
    **The Pitfall:** Blindly routing to the cloud 100% of the time purely for its 1.5s latency profile.
    **The Rationale:** Engineering teams rigidly prioritizing speed without computing the accumulating fiscal cost or acknowledging the tail-latency disaster of 30% network failure rates.
    **The Consequence:** The deployment violates P99 SLA guarantees during bad network conditions while simultaneously maximizing cloud API burn rates.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target P99 SLA: < 3.0s. Output payload: 100 tokens per query.
    - Cloud: P99 = 1.5s when the network predicate is satisfied.
    - Cloud price: $0.001 / 1K tokens.
    - Local Model: P99 = 2.79s (Constant), Cost = $0.00 per query.
    - Example network distribution for latency-improving hybrid: 70% good state, 30% poor state.

    **Calculations:**
    - Strict cost optimum: route 0% to cloud because local already meets P99<3s.
    - Strict optimum cost: 0 * $0.0001 + 1 * $0.00 = $0.00/query = $0.00 per 1000 queries.
    - Hybrid cloud cost per routed query: 100 tokens * ($0.001 / 1000 tokens) = $0.0001.
    - Example hybrid expected cost/query: 0.70 * $0.0001 + 0.30 * $0.00 = $0.00007.
    - Example hybrid cost per 1000 queries: $0.00007 * 1000 = $0.07.
    - Hybrid P99 must be measured from the conditional latency distribution after routing; it is valid only if the cloud predicate excludes requests whose end-to-end P99 would exceed 3s and the local fallback remains 2.79s.

    **Conclusion & Interpretation:**
    - **Result: $0.00 per 1000 queries for the strict cost optimum; $0.07 per 1000 queries for the 70% cloud latency-improving hybrid.** The hybrid is a heuristic for better user latency, not the minimum-cost answer to the SLO alone.
