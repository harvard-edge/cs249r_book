title: EfficientViT MSA and FFN Roofline on Snapdragon NPU
scenario: EfficientViT-B1 runs on Snapdragon 8 Gen 3 (45 TOPS INT8). The model alternates between multi-scale attention (MSA, high compute) and lightweight FFN (memory-bound). Profiling shows MSA at 32 TOPS effective throughput and FFN at 8 TOPS. The device peaks at 45 TOPS.
question: Why do EfficientViT MSA and FFN blocks reach 32 TOPS and 8 TOPS on a 45 TOPS Snapdragon NPU, and what optimizations apply to each?
details:
  realistic_solution: MSA reaches 32 TOPS because its large attention matmuls have enough arithmetic intensity to use much of the Snapdragon NPU compute pipeline, though kernel launch overhead, layout conversions, imperfect fusion, and non-matmul attention work keep it below the 45 TOPS peak. Optimize MSA with better tiling, layout planning, quantized/fused attention kernels, and fewer intermediate tensors. FFN reaches only 8 TOPS because small batch-1 mobile GEMMs and activation writes can be limited by memory traffic rather than peak math. Optimize FFN by fusing linear/activation/quantize steps, reducing memory reads and writes, packing weights for the target delegate, and avoiding shape choices that fragment kernels.
  common_mistake: |
    **The Pitfall:** Trying to optimize MSA and FFN with the same strategy.
    **The Rationale:** Candidates overlook that MSA and FFN have fundamentally different bottlenecks (compute vs. memory bandwidth).
    **The Consequence:** Applying the wrong optimization technique (e.g., pruning FFN for compute) fails to address the actual hardware limitation.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hardware: Snapdragon 8 Gen 3 (45 TOPS INT8). Bandwidth: 50 GB/s.
    - MSA blocks perform at 32 TOPS. FFN blocks perform at 8 TOPS.

    **Calculations:**
    - Hardware Ridge Point: 45 TOPS / 50 GB/s = 900 Ops/byte.
    - MSA Efficiency: 32 / 45 = 71% compute efficiency (mildly compute-bound).
    - FFN AI: 8 TOPS / 50 GB/s = 160 Ops/byte.
    - Comparison: 160 Ops/byte << 900 Ops/byte.

    **Conclusion & Interpretation:**
    - **Result: AI=160 Ops/byte (Memory-Bound)**. FFN needs larger batch or operator fusion to improve AI, as it is deeply memory-bound.
