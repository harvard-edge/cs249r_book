title: 'The Heterogeneous Pipeline Director'
scenario: 'You are designing an on-device ML pipeline for an augmented reality application. The pipeline involves pre-processing (CPU), a light-weight pose estimation model (NPU-preferred), and a heavy visual effects rendering step (GPU). Your goal is to achieve minimal end-to-end latency while adhering to a strict 2W average power budget for the entire pipeline.'
question: 'How would you approach scheduling and resource allocation across these different compute units?'
details:
  realistic_solution: 'Implement a heterogeneous task scheduler aware of device-specific power profiles, latency characteristics, and inter-processor communication (IPC) costs. Model the pipeline as a DAG where nodes are tasks and edges are data dependencies. Use DVFS to dynamically adjust clock frequencies based on workload. Prioritize latency-critical tasks and exploit parallelism where dependencies permit. For this sequential CPU->NPU->GPU chain, pipelining frames maximizes throughput while keeping power under budget.'
  common_mistake: |
    **The Pitfall:** Run everything in parallel on its preferred hardware.
    **The Rationale:** Candidates assume maximal parallelism is always best without analyzing power constraints and IPC costs.
    **The Consequence:** Exceeding the 2W average power budget, leading to aggressive thermal throttling that drops frame rates below a sequential baseline.
  napkin_math: |
    **Assumptions & Constraints:**
    - CPU Latency & Power: 5ms, 500mW.
    - NPU Latency & Power: 10ms, 800mW.
    - GPU Latency & Power: 15ms, 1200mW.
    - Power Budget: 2W.

    **Calculations:**
    - Sequential Baseline Latency: 5ms + 10ms + 15ms = 30 ms.
    - Throughput bottleneck (Pipelined): 15ms GPU = 66 FPS.
    - Concurrent Average Power: CPU (166.7 mW) + NPU (533.3 mW) + GPU (1200 mW).
    - Total Pipelined Power: 166.7 + 533.3 + 1200 = 1900 mW.

    **Conclusion & Interpretation:**
    - **Result: 1900 mW (Thermal-Bound)**. 1900 mW < 2000 mW (2W) budget. We achieve 66 FPS while maintaining thermal limits.
