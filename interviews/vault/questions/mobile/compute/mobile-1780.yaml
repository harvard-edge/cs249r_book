title: 'Roofline Comparison: CPU vs Neural Engine for LLM on A17 Pro'
scenario: You're running a 7B parameter LLM in INT4 (3.5GB model) on iPhone 15 Pro with A17 Pro. The CPU achieves 2 TFLOPS FP16 with AMX extensions, and memory bandwidth is 68 GB/s.
question: How does roofline analysis guide the choice between CPU and Neural Engine for a batch-1 INT4 7B LLM decode?
details:
  realistic_solution: 'Under a simple roofline model that assumes the 3.5GB INT4 weights are effectively streamed once per decoded token, memory-bound ceiling = 68 GB/s -> 3.5GB / 68 GB/s ≈ 51ms/token = ~20 tok/s regardless of compute unit. CPU with AMX: 2 TFLOPS / 14 GFLOPs per token = ~143 tokens/s, above the memory ceiling, so peak CPU compute is not binding. The Neural Engine may have higher peak ML throughput, but it is also capped by the same memory traffic unless it provides better INT4 support, dequantization, cache reuse, or operator coverage. The roofline conclusion is therefore not simply "use the Neural Engine"; choose the path with the best measured memory movement and INT4 execution.'
  common_mistake: |
    **The Pitfall:** Defaulting to the Neural Engine simply because it advertises higher peak TOPS.
    **The Rationale:** Engineers assume the NPU is universally superior for ML workloads, failing to verify datatype support (like INT4) and bandwidth limits.
    **The Consequence:** Encountering massive dequantization overhead on the ANE that negates any theoretical throughput advantage.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: 7B INT4 (3.5 GB).
    - Simple roofline assumption: effective decode traffic streams the 3.5 GB weights once per generated token.
    - CPU FP16 AMX: 2 TFLOPS. Memory Bandwidth: 68 GB/s.
    - Compute Demand: 14 GFLOPs/token.

    **Calculations:**
    - Memory Bound Ceiling: 3.5 GB / 68 GB/s = 0.051 s/token = 51 ms/token (19.6 tokens/s).
    - CPU Compute Ceiling: 2000 GFLOPS / 14 GFLOPs = 143 tokens/s.

    **Conclusion & Interpretation:**
    - **Result: ~20 tokens/s simple memory-traffic ceiling.** Since the CPU compute ceiling is above the memory ceiling, CPU peak FLOPS are not the binding limit under the one-weight-stream-per-token assumption. This does not prove CPU and Neural Engine are equivalent; the Neural Engine choice depends on measured INT4 support, dequantization cost, operator coverage, cache reuse, and effective memory traffic.
