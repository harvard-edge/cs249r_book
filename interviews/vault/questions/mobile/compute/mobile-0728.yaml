title: The Asymmetric Multiprocessing (Big.LITTLE) Stutter
scenario: "Your Android app runs an OCR model entirely on the CPU (using XNNPACK). You spawn 4 threads to match the 4 cores of the device. The average latency is 50ms, but the 99th percentile (P99) latency is a massive 150ms, causing noticeable UI stutter. The device is not thermal throttling."
question: "What architectural feature of mobile CPUs causes this massive latency variance, and how can you fix it?"
details:
  realistic_solution: "ARM big.LITTLE architectures utilize asymmetric cores (e.g., fast 'big' cores and slow 'LITTLE' cores). The OS scheduler may place inference threads on any available core. When one or more threads land on the slower LITTLE cores, they stall the entire parallel execution. The solution is to use CPU affinity masks (e.g., `pthread_setaffinity_np`) to pin ML execution threads strictly to the high-performance big cores, eliminating the P99 spike."
  common_mistake: |
    **The Pitfall:** Blaming the Java Garbage Collector for the latency variance.
    **The Rationale:** Candidates default to software-level explanations (GC pauses) and forget the physical heterogeneous core topology of modern mobile processors.
    **The Consequence:** Wasting time tuning software parameters while the physical thread scheduler continues to place critical ML workloads on slow LITTLE cores.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Big Core: 3.0 GHz, 4-wide decode. LITTLE Core: 1.8 GHz, 2-wide decode.
       - Baseline Big Core inference latency = 50 ms.
    2. **Calculations:**
       - Clock speed difference = 3.0 GHz / 1.8 GHz ≈ 1.67x.
       - Architecture (IPC) difference ≈ 1.8x slower decode.
       - Total multiplicative delay = 1.67 * 1.8 ≈ 3x slower.
       - LITTLE Core execution time = 50 ms * 3 = 150 ms.
    3. **Conclusion & Interpretation:**
       - **Result: Scheduler-Bound.** The **150 ms** P99 spike occurs exactly when the OS schedules the parallel workload onto a 3x slower LITTLE core, stalling the synchronization barrier.
