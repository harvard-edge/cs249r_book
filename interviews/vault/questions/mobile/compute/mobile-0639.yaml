title: Federated Learning Stragglers from Device Heterogeneity
scenario: 'You are running federated learning across 10,000 Android devices to train a next-word prediction model. Each round, the server selects 100 devices to train locally for 5 epochs and upload gradients. The round consistently fails — only 30-40 devices complete in the 10-minute window. Your fleet includes: Snapdragon 8 Gen 3 flagships (20%), Snapdragon 7 Gen 1 mid-range (35%), MediaTek Dimensity 700 budget (30%), and Samsung Exynos 1380 budget (15%).'
question: Why does device heterogeneity break federated learning, and how do you fix the round completion rate?
details:
  realistic_solution: 'The round fails because of the **straggler problem**: the selected cohort contains slow devices whose local training plus upload time exceeds the 10-minute deadline. Training time varies 8x across the fleet: flagship 1.7 min, mid-range 6.7 min, budget 13.3 min. Uploading a 200 MB update at 5 Mbps takes about 5.3 min, so budget devices need about 18.6 min and cannot finish. Fix it with capability-aware scheduling: (1) **Tiered cohorts**: group devices by capability. Train flagships with the full 5 epochs, mid-range devices with fewer local epochs, and budget devices with a distilled task or fewer epochs. (2) **Compressed updates**: top-k sparsification or sketching reduces a 200 MB dense update to about 2 MB plus metadata, cutting upload to about 3.2s at 5 Mbps. (3) **Quorum aggregation**: aggregate after a target quorum such as 90 of 100 selected devices, and roll late updates into a later round or discard them. (4) **Overbooking**: invite about 120 devices if 100
    updates are desired, while weighting sampling so low-end users remain represented. These changes turn a 30-40 device completion problem into a high-quorum round without biasing exclusively toward flagship phones.'
  common_mistake: |
    **The Pitfall:** Selecting only flagship devices for training to meet the deadline.
    **The Rationale:** Candidates optimize purely for round latency without considering the statistical distribution of the fleet.
    **The Consequence:** Introducing severe selection bias where the model only learns the typing patterns of affluent flagship users.
  napkin_math: |
    **Assumptions & Constraints:**
    - Round budget: 10 minutes.
    - Selected cohort reflects fleet mix: 20 flagship, 35 mid-range, 30 Dimensity budget, 15 Exynos budget out of 100 devices.
    - Original 5-epoch training time: flagship 1.7 min, mid-range 6.7 min, budget 13.3 min.
    - Dense update upload: 200 MB * 8 / 5 Mbps = 320 s = 5.33 min.
    - Compressed update upload: 2 MB * 8 / 5 Mbps = 3.2 s = 0.053 min.

    **Calculations:**
    - Unoptimized finish times: flagship 1.7 + 5.33 = 7.03 min, mid-range 6.7 + 5.33 = 12.03 min, budget 13.3 + 5.33 = 18.63 min.
    - Devices finishing within 10 minutes before fixes: only the 20 flagship devices, plus any unusually fast mid-range devices, matching the observed 30-40 completions.
    - Tiered compute: keep flagship at 5 epochs (1.7 min), run mid-range at 3 epochs (6.7 * 3/5 = 4.02 min), and run budget devices on a distilled 1-epoch task at roughly 2.7 min.
    - Optimized finish times with compressed upload: flagship 1.7 + 0.053 = 1.75 min; mid-range 4.02 + 0.053 = 4.07 min; budget 2.7 + 0.053 = 2.75 min.
    - Expected in-window completions for the 100-device cohort: 20 + 35 + 30 + 15 = 100 before random disconnects; with a 5-10% mobile dropout allowance, a 90-device quorum is feasible.

    **Conclusion & Interpretation:**
    - **Result:** Heterogeneity breaks the round because slow devices exceed the deadline. Tiered local work plus compressed updates moves the expected 100-device cohort under 10 minutes, so a 90/100 quorum can complete despite normal mobile dropouts.
