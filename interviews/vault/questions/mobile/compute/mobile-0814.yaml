title: Mobile New 0014
scenario: A mobile network uses mixed-precision (INT8 for Conv, INT16 for complex activations). Performance degrades below that of an all-INT16 model. Execution trace shows hundreds of small memory allocation events between layers.
question: Why can a mixed INT8/INT16 mobile network run slower than an all-INT16 model?
details:
  realistic_solution: The performance degradation is caused by the overhead of type casting and memory reallocation between operations. The runtime inserts 'Cast' nodes that saturate memory bandwidth.
  common_mistake: |
    **The Pitfall:** Ignoring the bandwidth cost of implicit type conversion.
    **The Rationale:** Candidates focus only on the theoretical compute speedup of INT8 over INT16, ignoring the massive memory I/O penalty required to explicitly cast tensors between layers.
    **The Consequence:** The 'optimized' mixed-precision model runs strictly slower than the unoptimized version, confusing the deployment team.
  napkin_math: |
    **Assumptions & Constraints:**
    - All-INT16 latency: 50ms.
    - INT8 compute speedup: saves 1ms per layer.
    - Cast node penalty (INT8->INT16): 1ms per cast (due to memory bandwidth limits).
    - Alternating layers: 30 layers.

    **Calculations:**
    - Compute savings: 30 layers * 1ms = 30ms.
    - Casting overhead: 30 alternating Cast nodes * 1ms = 30ms.
    - Total mixed latency: 20ms (base compute) + 30ms (casting) = 50ms.
    - However, cache thrashing can make casting overhead exceed compute savings.

    **Conclusion & Interpretation:**
    - **Result: Memory Bandwidth Bound**. The memory reallocation overhead from continuous casting nodes entirely negates INT8 compute gains, increasing total latency.
