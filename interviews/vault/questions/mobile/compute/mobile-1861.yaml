title: Chiplet Die-Count Impact on Mobile SoC PCB Routing
scenario: A mobile SoC moving from monolithic to chiplet design (3 dies on interposer) requires a 6-layer to 8-layer PCB change, adding $2 per phone BOM. The marketing team pushes back.
question: How would you justify moving a chiplet mobile SoC board from 6 to 8 PCB layers for routing, power, and EMI risk?
details:
  realistic_solution: 'Chiplet SoC PCB requirements: (1) Power delivery: separate die rails and return paths need lower-inductance power/ground planes. (2) Signal routing: the package escape and high-speed memory/peripheral interfaces need more routing channels, cleaner references, and controlled impedance than a dense 6-layer board can reliably provide. (3) EMI and validation risk: extra reference planes reduce loop area and make shielding, return-current control, and certification margin easier to preserve. The business case is not that 8 layers magically guarantees a fixed EMI improvement; it is that $2 per unit buys routing density, power integrity margin, and lower re-spin/certification risk for a package that is no longer well served by the 6-layer stackup.'
  common_mistake: |
    **The Pitfall:** Arguing only for signal integrity without quantifying the financial risk of EMI failure.
    **The Rationale:** Candidates focus on electrical engineering purity but fail to translate it into the language of business risk (certification delays and resubmission costs).
    **The Consequence:** Marketing rejects the BOM increase, leading to production delays and millions in lost revenue when FCC/CE certification fails.
  napkin_math: |
    **Assumptions & Constraints:**
    - Production volume: 1 million units.
    - Added 8-layer BOM cost: $2 per phone.
    - A PCB re-spin plus EMI re-certification delay can cost hundreds of thousands in direct engineering/certification expense and can delay launch revenue.
    - The exact risk probability is program-specific, so this is a tradeoff estimate rather than a deterministic EMI calculation.

    **Calculations:**
    - BOM increase: 1M units * $2 = $2M.
    - Direct re-spin/re-certification cost can be much smaller than $2M, so cost alone may not justify the layer increase.
    - The release risk is the larger driver: if a 6-layer compromise causes SI, PI, or EMI failure late in validation, even a short launch slip can exceed the BOM delta.
    - The 8-layer stackup should therefore be justified by concrete layout evidence: escape-route congestion, required reference planes, power impedance targets, and EMI margin from simulation/pre-scan data.

    **Conclusion & Interpretation:**
    - **Result: Risk-reduction tradeoff.** The 8-layer board is justified when the 6-layer layout cannot meet routing, return-path, power-integrity, and EMI targets with adequate validation margin. Do not present fabricated EMI probabilities; use stackup analysis, pre-scan results, and schedule-risk exposure to make the business case.
