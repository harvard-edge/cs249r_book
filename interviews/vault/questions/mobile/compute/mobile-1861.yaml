title: Chiplet Die-Count Impact on Mobile SoC PCB Routing
scenario: A mobile SoC moving from monolithic to chiplet design (3 dies on interposer) requires a 6-layer to 8-layer PCB change, adding $2 per phone BOM. The marketing team pushes back.
question: How would you justify moving a chiplet mobile SoC board from 6 to 8 PCB layers for routing, power, and EMI risk?
details:
  realistic_solution: 'Chiplet SoC PCB requirements: (1) Power delivery: more power domains (each die has separate VDD) require more dedicated power/ground plane pairs → 2 extra layers. (2) Signal routing: die-to-die link signals exit package on more BGA balls at higher frequencies (LPDDR5 at 8533 MT/s requires controlled impedance at 50 ohm ±10%); more signal layers needed for length matching. (3) EMI: chiplet interposer edge creates new emission sources; additional ground planes provide shielding. 8-layer: signal-ground-power-signal-signal-power-ground-signal stackup provides 3dB better EMI margin. At 100M phones/year, $2 BOM increase = $200M/year. Real argument: 8-layer is required by the SoC vendor reference design; deviation risks production failures and EMI re-certification costs.'
  common_mistake: |
    **The Pitfall:** Arguing only for signal integrity without quantifying the financial risk of EMI failure.
    **The Rationale:** Candidates focus on electrical engineering purity but fail to translate it into the language of business risk (certification delays and resubmission costs).
    **The Consequence:** Marketing rejects the BOM increase, leading to production delays and millions in lost revenue when FCC/CE certification fails.
  napkin_math: |
    1. **Signal Speed:** LPDDR5 at 8533 MT/s (~4.27 GHz). Propagation delay in FR4 is ~7 ps/mm.
    2. **Matching Constraint:** At 4.27 GHz, signals must be matched to ±5ps (±0.7mm).
    3. **Routing Risk:** 6-layer PCB trace density limits matching to ±3mm, leading to a ~20% EMI certification failure risk. 8-layer enables ±0.5mm (<1% risk).
    4. **Cost Analysis:** 20% failure risk * ($150K re-cert + 6 weeks * $2M/week revenue loss) = **$2.4M expected loss**, vastly exceeding the BOM increase.
