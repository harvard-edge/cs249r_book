title: 'Mobile New 0015'
scenario: 'Applying per-channel INT8 quantization to a DSP preserves accuracy but causes vector ALUs to stall frequently. Latency is 30% higher compared to per-tensor quantization, even though the MAC count is identical.'
question: 'Why does per-channel INT8 quantization stall DSP vector ALUs compared to per-tensor quantization?'
details:
  realistic_solution: |
    Per-channel quantization demands fetching a unique scale and zero-point for every output channel from memory. This irregular data access pattern triggers L1 cache misses and pipeline bubbles, starving the tightly coupled SIMD instruction units of the DSP.
  common_mistake: |
    **The Pitfall:** Assuming scalar parameter fetches (scales and zero-points) are mathematically free or perfectly cached.
    **The Rationale:** Evaluating quantization strictly on total FLOPs while ignoring memory access patterns and SIMD pipeline constraints.
    **The Consequence:** Deploying an accuracy-preserving model that drastically degrades real-world latency due to continuous memory stalls.
  napkin_math: |
    **Assumptions & Constraints:**
    - Per-tensor = 1 scale (4 bytes) in register.
    - Per-channel = 4096 channels.
    - Bandwidth = 10 GB/s.

    **Calculations:**
    - Fetch size = 4096 * 4 bytes = 16 KB per layer.
    - Transfer time = 16 KB / 10 GB/s = 1.6 μs.
    - Over 100 layers, cache misses compound.

    **Conclusion & Interpretation:**
    - **Result: Memory-Bound**. The constant fetch of per-channel parameters stalls the ALUs, significantly increasing latency.
