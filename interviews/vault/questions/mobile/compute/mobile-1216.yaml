title: A17 Pro Neural Engine Roofline Bottleneck
scenario: You are profiling a real-time vision transformer on a mobile SoC. The model requires 35 GOPS of compute per inference and transfers 250 MB of data. The NPU provides 35 TOPS of peak compute and 50 GB/s of memory bandwidth.
question: Why does the vision transformer reach only 7 TOPS, or 20% of peak, under roofline analysis?
details:
  realistic_solution: |
    Applying the roofline model isolates the root cause strictly to memory bandwidth starvation. We determine the hardware's ridge point (TOPS / Bandwidth) and compare it against the model's Arithmetic Intensity (GOPS / Bytes). Because the Vision Transformer's arithmetic intensity is dramatically lower than the hardware ridge point, the execution hits the sloping memory bandwidth roof long before it can scale vertically to the NPU's flat compute capacity roof. The unified memory simply cannot feed the massive systolic array fast enough for this specific topology.
  common_mistake: |
    **The Pitfall:** Jumping to conclusions about device thermal throttling or poor parallelization.
    **The Rationale:** Candidates know edge chips operate under strict ~5W envelopes, reflexively blaming heat constraints instead of formally mapping the math to a roofline model.
    **The Consequence:** Wasting time redesigning model operators or tweaking compiler threads when the only solution is reducing the actual byte-transfer via quantization or layer fusion.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Peak Compute: 35 TOPS (35,000 GOPS).
       - Peak Bandwidth: 50 GB/s.
       - Model Compute/Transfer: 35 GOPS compute, 250 MB (0.25 GB) transferred.
    2. **Calculations:**
       - Hardware Ridge Point: 35,000 GOPS / 50 GB/s = 700 OPs/byte.
       - Model Arithmetic Intensity: 35 GOPS / 0.25 GB = 140 OPs/byte.
       - Roofline Check: 140 OPs/byte < 700 OPs/byte.
       - Maximum Achievable Throughput: 50 GB/s * 140 OPs/byte = 7,000 GOPS (7 TOPS).
    3. **Conclusion & Interpretation:**
       **Result: Capped at 7 TOPS (Memory-Bandwidth-Bound).** The model's low arithmetic intensity means NPU compute units spend 80% of their execution time entirely idle, stalled on unified memory fetches.
