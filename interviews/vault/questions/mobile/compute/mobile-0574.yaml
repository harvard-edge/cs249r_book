title: The NPU Delegation Failure Modes
scenario: You convert a PyTorch model to TFLite and enable the Qualcomm Hexagon NPU delegate. The tool reports "87% of ops delegated," leaving 13% to run on the CPU.
question: Why is 87% NPU delegation potentially worse for latency than 0% delegation?
details:
  realistic_solution: 'The 13% undelegated ops are scattered throughout the graph, not clustered at the end. Each undelegated op creates a partition boundary: NPU→CPU→NPU. If there are 8 undelegated ops in the middle of the graph, you get 9 NPU subgraphs with 8 round-trip data transfers. Each transfer costs 1-3ms. Total transfer overhead: 8 × 2ms = 16ms — potentially more than the entire model would take on CPU alone.'
  common_mistake: |
    **The Pitfall:** Equating "percentage of operations delegated" with "percentage of compute accelerated."
    **The Rationale:** Candidates assume partial delegation provides a proportional, linear speedup.
    **The Consequence:** They ignore the disastrous cost of context switching, resulting in hybrid models that run much slower than a pure CPU baseline.
  napkin_math: |
    - **Full NPU Latency:** 4ms.
    - **Full CPU Latency:** 15ms.
    - **Partial Delegation Execution:** 9 NPU segments (3.5ms) + 8 CPU ops (0.8ms).
    - **Transition Overhead:** 8 boundaries * 2ms per transfer = 16ms overhead.
    - **Final Result:** **Total latency is 22.3ms; partial delegation is 1.5x slower than no delegation at all.**
