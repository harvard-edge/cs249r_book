title: Mobile New 0023
scenario: A mobile SoC runs a heavy generation model. In the first minute, the SoC draws 3W. After 10 minutes, despite identical MAC utilization, the power draw creeps up to 4.5W.
question: Why does SoC power rise from 3W to 4.5W over time despite constant MACs per second?
details:
  realistic_solution: |
    The symptom is caused by temperature-induced transistor subthreshold leakage current. As the SoC computes, dynamic power dissipation generates heat. As silicon temperature rises (e.g., from 25\u00b0C to 85\u00b0C), the subthreshold leakage power scales exponentially. This thermal runaway creates a feedback loop: higher temperature -> higher static leakage -> higher total power -> higher temperature, increasing the total wattage significantly without any corresponding increase in computational throughput.
  common_mistake: |
    **The Pitfall:** Assuming total power consumption is strictly a function of clock frequency and utilization.
    **The Rationale:** Candidates focus only on dynamic power metrics.
    **The Consequence:** They completely ignore thermal leakage, failing to explain the time-dependent power increase.
  napkin_math: |
    **Assumptions & Constraints:**
    - Initial total power (t=1m): 3.0 W.
    - Final total power (t=10m): 4.5 W.
    - Workload (MACs/sec) remains strictly constant.
    - Equation: Total Power = Dynamic Power (P_dyn) + Leakage Power (P_leak).

    **Calculations:**
    - At 25\u00b0C: P_dyn = 2.5 W, P_leak = 0.5 W. Total = 3.0 W.
    - At 85\u00b0C: P_dyn remains 2.5 W (constant workload).
    - Leakage current increases exponentially with temperature (~4x).
    - New P_leak = 0.5 W * 4 = 2.0 W.
    - New Total Power = 2.5 W + 2.0 W = 4.5 W.

    **Conclusion & Interpretation:**
    - **Result: 4.5 W (Thermal Leakage-Bound)**. The 50% increase in total power consumption is entirely attributed to temperature-induced static leakage, highlighting the critical importance of active thermal management and duty-cycling in mobile ML deployments.
