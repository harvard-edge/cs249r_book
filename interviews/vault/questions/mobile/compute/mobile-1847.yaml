title: Thermal Throttling Impact on Mobile Chiplet Burst Performance
scenario: A mobile app uses A17 Pro for real-time object detection at 30 FPS. Users report that performance degrades significantly after 2 minutes of continuous use.
question: How large is A17 Pro thermal throttling after two minutes of 30 FPS object detection, and what mitigation fits?
details:
  realistic_solution: Treat the observed two-minute degradation as a sustained-performance drop, not an average TOPS problem. If the GPU falls from about 3.5 TFLOPS burst to about 2.5 TFLOPS sustained, the available compute drops by roughly 29%, so a frame pipeline with little headroom can miss 30 FPS after warm-up. Mitigate by moving inference to the ANE when the model can be compiled there, reducing model cost/resolution, or dynamically lowering frame rate before thermal throttling forces latency spikes.
  common_mistake: |
    **The Pitfall:** Increasing batch size to improve GPU utilization.
    **The Rationale:** Candidates attempt to force higher arithmetic intensity via batching, entirely ignoring the physical reality of heat dissipation on mobile SoCs.
    **The Consequence:** Higher batch size actively increases power draw, accelerating the onset of thermal throttling and worsening the degradation.
  napkin_math: |
    **Assumptions & Constraints:**
    - Burst GPU throughput: ~3.5 TFLOPS.
    - Sustained GPU throughput after warm-up: ~2.5 TFLOPS.
    - Real-time target: 30 FPS, or 33.3ms per frame.

    **Calculations:**
    - Throughput drop: (3.5 - 2.5) / 3.5 = ~28.6%.
    - Equivalent slowdown if work is GPU-bound: 3.5 / 2.5 = 1.4x latency.
    - A 25ms warm-frame GPU stage can become ~35ms after throttling, exceeding a 33.3ms frame budget.

    **Conclusion & Interpretation:**
    - **Result: ~29% Sustained Drop.** The reported degradation is consistent with a burst-to-sustained GPU throttle that can break 30 FPS; mitigation should reduce GPU work or move compatible inference to the ANE for steadier power.
