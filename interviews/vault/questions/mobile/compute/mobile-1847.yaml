title: A17 Pro Object Detection Thermal Throttling
scenario: A mobile app uses A17 Pro for real-time object detection at 30 FPS. The GPU-bound stage is 25ms per frame when cool, then grows to 35ms after 2 minutes of continuous use.
question: What throttling factor explains the 25ms to 35ms slowdown, and what mitigation fits?
details:
  realistic_solution: Treat the observed two-minute degradation as a sustained-performance drop measured from frame latency, not as a device-wide TOPS claim. A GPU-bound stage increasing from 25ms to 35ms is a 1.4x latency slowdown, equivalent to about a 29% drop in effective sustained throughput. That pushes the stage past the 33.3ms frame budget for 30 FPS. Mitigate by moving compatible inference to the ANE, reducing model cost or input resolution, and preemptively lowering frame rate or quality before thermal throttling forces latency spikes.
  common_mistake: |
    **The Pitfall:** Increasing batch size to improve GPU utilization.
    **The Rationale:** Candidates attempt to force higher arithmetic intensity via batching, entirely ignoring the physical reality of heat dissipation on mobile SoCs.
    **The Consequence:** Higher batch size actively increases power draw, accelerating the onset of thermal throttling and worsening the degradation.
  napkin_math: |
    **Assumptions & Constraints:**
    - Cool GPU-bound stage: 25 ms per frame.
    - Warm throttled GPU-bound stage: 35 ms per frame.
    - Real-time target: 30 FPS, or 33.3ms per frame.

    **Calculations:**
    - Latency slowdown: 35 ms / 25 ms = 1.4x.
    - Effective sustained-throughput drop for the same work: 1 - (25 / 35) = 28.6%.
    - The throttled 35 ms stage exceeds the 33.3 ms frame budget before other camera/rendering work is counted.

    **Conclusion & Interpretation:**
    - **Result: 1.4x latency slowdown, or about a 29% effective throughput drop.** The observed degradation is enough to break 30 FPS; mitigation should reduce GPU work or move compatible inference to the ANE for steadier power.
