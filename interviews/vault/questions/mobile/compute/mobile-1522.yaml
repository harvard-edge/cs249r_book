title: 'Roofline Analysis for Mobile AI Accelerator: Optimizing a Vision Model on Snapdragon 8 Gen 3 Hexagon NPU'
scenario: A high-resolution vision model targets 30 FPS on a Snapdragon 8 Gen 3 Hexagon NPU with a 45 TOPS INT8 peak and about 64 GB/s sustained LPDDR5X bandwidth. Initial profiling shows it only achieves 15 FPS, with about 100 GOP of work and 2 GB of modeled memory traffic per frame.
question: How would you use Roofline Analysis to diagnose whether the model is compute- or memory-bound and propose optimizations?
details:
  realistic_solution: Calculate operational intensity (Ops/Byte) and compare it with the NPU roofline ridge point. If OI is below the ridge, the model is memory-bound, so prioritize reducing data movement with tiling, operator fusion, layout changes, cache/scratchpad reuse, and smaller intermediate tensors. If OI is above the ridge, the model is compute-bound, so prioritize pruning, distillation, lower-precision kernels, or architecture changes that reduce operations.
  common_mistake: |
    **The Pitfall:** Immediately applying model compression (pruning, quantization) without checking the bottleneck.
    **The Rationale:** Assuming low FPS is always due to excessive compute requirements (MACs).
    **The Consequence:** Wasting optimization cycles on compute reduction when data movement is the actual limiting factor.
  napkin_math: |
    **Assumptions & Constraints:**
    - NPU Peak: 45 TOPS INT8.
    - LPDDR5X Bandwidth: ~64 GB/s.
    - Profiled model requirements per inference/frame: 100 GOP and 2 GB modeled memory traffic.
    - Unit convention: TOPS and GOP are decimal operation counts; GB is decimal bytes.

    **Calculations:**
    - Operational Intensity (OI): 100e9 ops/frame / 2e9 bytes/frame = 50 ops/byte.
    - Roofline Ridge Point: 45e12 ops/s / 64e9 bytes/s = ~703 ops/byte.
    - Comparison: 50 Ops/Byte << 703 Ops/Byte.
    - Required Bandwidth for 30 FPS: 2 GB/frame * 30 FPS = 60 GB/s.
    - Required Compute for 30 FPS: 100 GOP/frame * 30 FPS = 3 TOPS, below the 45 TOPS peak.
    - At the profiled 15 FPS: modeled bandwidth use is 2 GB/frame * 15 FPS = 30 GB/s, while compute use is only 1.5 TOPS.

    **Conclusion & Interpretation:**
    - **Result: 50 ops/byte (Memory-Bandwidth Bound)**. Under the modeled 2 GB/frame traffic estimate, compute demand is modest, but reaching 30 FPS would nearly saturate the ~64 GB/s bandwidth ceiling, so the first optimizations should reduce bytes moved per frame.
