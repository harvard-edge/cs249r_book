title: 'Roofline Analysis for Mobile AI Accelerator: Optimizing a Vision Model on Snapdragon 8 Gen 3 Hexagon NPU'
scenario: A high-resolution vision model targets 30 FPS on the Snapdragon 8 Gen 3 Hexagon NPU. Initial profiling shows it only achieves 15 FPS.
question: How would you use Roofline Analysis to diagnose whether the model is compute- or memory-bound and propose optimizations?
details:
  realistic_solution: 'Calculate operational intensity (Ops/Byte) and map it against the NPU Roofline ridge point. If AI is lower than the ridge point, aggressively apply data layout optimizations, tiling for scratchpad locality, and INT8/INT4 quantization. If AI is above the ridge point, pursue compute optimization via Knowledge Distillation and architectural pruning.'
  common_mistake: |
    **The Pitfall:** Immediately applying model compression (pruning, quantization) without checking the bottleneck.
    **The Rationale:** Assuming low FPS is always due to excessive compute requirements (MACs).
    **The Consequence:** Wasting optimization cycles on compute reduction when data movement is the actual limiting factor.
  napkin_math: |
    **Assumptions & Constraints:**
    - NPU Peak: 45 TOPS INT8.
    - LPDDR5X Bandwidth: ~64 GB/s.
    - Assumed model requirements: 100 GOPS, 2 GB data per frame.

    **Calculations:**
    - Operational Intensity (OI): 100 GOPS / 2 GB = 50 Ops/Byte.
    - Roofline Ridge Point: 45,000 GOPS / 64 GB/s = ~703 Ops/Byte.
    - Comparison: 50 Ops/Byte << 703 Ops/Byte.
    - Required Bandwidth for 30 FPS: 2 GB/frame * 30 FPS = 60 GB/s.

    **Conclusion & Interpretation:**
    - **Result: 50 Ops/Byte (Memory-Bandwidth Bound)**. Model is strictly limited by the ~64 GB/s system bandwidth ceiling, demanding memory movement reduction.
