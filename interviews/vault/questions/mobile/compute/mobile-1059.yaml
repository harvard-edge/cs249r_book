title: 'Speculative Decoding Memory Fit on Snapdragon 8 Gen 3: 1B Draft and 7B INT4 Target'
scenario: 'Concretely calculate the memory layout for running Llama-3-1B (INT4, 32 layers, 2048 hidden, 32 heads, head_dim=64) as a draft model on Snapdragon 8 Gen 3 (16GB LPDDR5X). Account for: model weights, KV cache at 2048 context, OS overhead (4GB), and inference buffers.'
question: Is there room for a 7B INT4 target model alongside the draft model for speculative decoding?
details:
  realistic_solution: 'Llama-3-1B uses GQA with 8 KV heads (vs 32 Q heads). KV per token per layer: 2*8heads*64head_dim*1byte (INT8 KV)=1024 bytes per layer. Across 32 layers, that is 32KB/token, so a 2048-token draft KV cache is about 65MB. Draft weights are 1B*0.5=500MB, so draft weights plus KV are 565MB. Add 4GB OS overhead and about 200MB inference buffers: the baseline with the draft model resident is 4.765GB, leaving 11.235GB for the target model and remaining runtime headroom. A 7B INT4 target needs 3.5GB of weights; using the same simplified 2048-token KV assumption adds about 65MB, for 3.565GB target allocation. Final resident total is 4.765GB + 3.565GB = 8.33GB, leaving 16GB - 8.33GB = 7.67GB. Yes, the 7B INT4 target fits alongside the 1B draft model under these assumptions.'
  common_mistake: |
    **The Pitfall:** Calculating the KV cache using the hidden dimension instead of explicitly multiplying num_kv_heads by head_dim.
    **The Rationale:** Candidates forget that modern models like Llama-3 use Grouped Query Attention (GQA) which has significantly fewer KV heads than Q heads.
    **The Consequence:** Vastly overestimating the KV cache size and incorrectly concluding that speculative decoding is impossible on the device.
  napkin_math: |
    **Assumptions & Constraints:**
    - 1B Draft Model (INT4): 1B * 0.5 bytes = 500 MB.

    **Calculations:**
    - 1B KV Cache (GQA with 8 KV heads): Per layer/token: 2 (K,V) * 8 heads * 64 dim * 1 byte (INT8) = 1,024 bytes (1 KB). 32 layers = 32 KB / token. 2048 tokens = 65 MB.
    - Total 1B Allocation: 500 MB + 65 MB = 565 MB.
    - System Baseline: 4 GB OS + 200 MB buffers + 565 MB (1B model) = 4.765 GB.
    - Available Memory: 16 GB - 4.765 GB = 11.235 GB.
    - 7B Target Model (INT4): 7B * 0.5 bytes = 3.5 GB.
    - 7B KV Cache: Assume similar 65 MB.
    - Total 7B Allocation: 3.565 GB.
    - Final resident total with both models: 4.765 GB + 3.565 GB = 8.33 GB.
    - Final headroom: 16 GB - 8.33 GB = 7.67 GB.
    - Equivalent fit check: 11.235 GB available after the draft baseline > 3.565 GB target allocation required.

    **Conclusion & Interpretation:**
    - **Result: both models fit with about 7.67 GB remaining.** The 7B INT4 target requires 3.565 GB after the draft baseline, which is well below the 11.235 GB still available.
