title: 'Tensor G3 Gemini Nano Prefill Latency'
scenario: 'You are tasked with deploying a 1.5 billion parameter version of Gemini Nano on a Pixel device powered by the Google Tensor G3. The G3 features an on-device TPU rated at 7.5 TOPS and 12 GB of LPDDR5X memory. To assess the initial user experience, you need to estimate the theoretical minimum compute time required to process a user''s 500-token input prompt (the prefill phase). Assume INT8 operations and temporarily ignore memory bandwidth constraints.'
question: 'What is the pure compute latency for Tensor G3 to prefill a 500-token prompt with a 1.5B INT8 Gemini Nano model?'
details:
  realistic_solution: 'To find the compute-bound latency, calculate the total operations required for the prefill phase using the standard heuristic of 2 operations per parameter per token. Multiply this by the prompt length to get the total operations for the sequence. Finally, divide by the Tensor G3 TPU''s peak compute capacity (7.5 TOPS) to determine the theoretical minimum compute time.'
  common_mistake: |
    **The Pitfall:** Forgetting the factor of 2 in the operations per token formula (1 multiply and 1 accumulate per weight).
    **The Rationale:** Candidates often mix up GigaOPs and TeraOPs or apply memory bandwidth constraints when specifically asked for a compute-bound estimate.
    **The Consequence:** The latency estimate is off by exactly 50%, throwing off downstream performance budgeting.
  napkin_math: |
    **Assumptions & Constraints:**
    - Recall operations formula: Total Ops = 2 * Parameters * Tokens.
    - Tensor G3 TPU Compute Capacity = 7.5 TOPS.

    **Calculations:**
    - Ops for 1 token: 2 * 1.5 billion parameters = 3 GigaOPs.
    - Total Ops for 500 tokens: 3 GigaOPs * 500 = 1,500 GigaOPs = 1.5 TeraOPs (TOPs).

    **Conclusion & Interpretation:**
    - **Result: 200 milliseconds (Compute-Bound)**. Compute latency: 1.5 TOPs / 7.5 TOPS/s = 0.2 seconds = 200 milliseconds.
