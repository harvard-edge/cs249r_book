title: Attention Head Pruning for On-Device Transformer on Snapdragon 8 Gen 3
scenario: A mobile NLP team runs a 6-layer transformer for on-device text classification on Snapdragon 8 Gen 3. Profiling shows attention accounts for 60% of latency at seq_len=512. They propose pruning 50% of heads.
question: What are the latency and accuracy trade-offs of pruning 50% of attention heads in a 6-layer 12-head transformer on Snapdragon 8 Gen 3?
details:
  realistic_solution: Pruning 6 heads without structural QKV pruning saves QK^T, AV, and O-proj FLOPs per layer. Because linear projections still compute unused channels, the savings are only ~22% of attention FLOPs. Total latency reduction is heavily bottlenecked by static operations. Accuracy can degrade if the pruned heads carry task-specific or rare-token signals, so heads should be selected using validation loss, saliency, or distillation rather than removed uniformly; retraining or knowledge distillation is usually needed to recover accuracy.
  common_mistake: |
    **The Pitfall:** Treating head pruning as uniformly removing 50% of total attention FLOPs.
    **The Rationale:** Engineers completely forget that massive linear projections (Q/K/V transforms), positional encodings, and layer norms remain entirely unchanged.
    **The Consequence:** Wildly overestimating the latency reduction and underestimating the accuracy risk from removing important heads, leading to missed latency and quality targets.
  napkin_math: |
    **Assumptions & Constraints:**
    - Network: 6-layer transformer, 12 heads, seq_len=512, d_model=768.
    - Target Hardware: Snapdragon 8 Gen 3 (45 TOPS INT8).
    - Baseline latency: Attention is 60% of total inference time.

    **Calculations:**
    - Total Attention FLOPs (6 layers): ~19.3B.
    - FLOPs saved pruning 6 heads: QK^T (1.2B) + AV (1.2B) + O-proj (1.8B) = 4.2B FLOPs.
    - FLOP Reduction %: 4.2B / 19.3B = 21.8% (~22%).
    - Latency Reduction: 60% (attention time) * 22% (savings) = ~13.2%.
    - Accuracy impact is not determined by head count alone; pruning low-saliency heads may have minimal loss after fine-tuning, while pruning important heads can cause a large validation drop.

    **Conclusion & Interpretation:**
    - **Result: ~13.2% latency reduction with accuracy risk.** Because pruning heads does not eliminate Q/K/V linear projections, removing 50% of heads yields only a modest latency gain unless the model is structurally pruned and fine-tuned; accuracy depends on which heads are removed.
