title: The Mobile Roofline Riddle
scenario: You are optimizing a real-time video style transfer filter on a new smartphone. The Neural Engine is rated for 35 TOPS (INT8) and has access to a unified memory system with 51.2 GB/s of bandwidth.
question: What is the arithmetic intensity of the style transfer model, and is it memory-bound on this NPU?
details:
  realistic_solution: Profiling reveals the Arithmetic Intensity (AI) is 140 Ops/Byte. The device's hardware Ridge Point equates to 684 Ops/Byte. Because 140 is drastically lower than 684, the matrix multiplication engines will sit idle waiting for DMA memory transfers. The workload is strictly memory-bound, achieving only ~20% of peak theoretical TOPS.
  common_mistake: |
    **The Pitfall:** Judging Arithmetic Intensity in a vacuum.
    **The Rationale:** Engineers calculate 140 Ops/Byte and qualitatively assume it is a "high" number, incorrectly concluding the model is compute-bound.
    **The Consequence:** They fail to compare the model's AI to the hardware's specific Ridge Point, completely misunderstanding where the performance bottleneck lies.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model FLOPs: 7e9 Ops.
    - Model Data: 50e6 Bytes.
    - Hardware Compute: 35 TOPS.
    - Hardware Bandwidth: 51.2 GB/s.

    **Calculations:**
    - Model Arithmetic Intensity (AI): 7e9 Ops / 50e6 Bytes = 140 Ops/Byte.
    - Device Ridge Point: 35e12 Ops/s / 51.2e9 Bytes/s ≈ 684 Ops/Byte.

    **Conclusion & Interpretation:**
    - **Result: 140 < 684 (Memory-Bandwidth-Bound)**. The model is heavily memory-bandwidth-bound.
  options:
  - 140 Ops/Byte; Memory-bound, as its AI is far below the device's ridge point.
  - 140 Ops/Byte; Compute-bound, as this is a high operational intensity.
  - 684 Ops/Byte; Compute-bound, as the model's intensity will match the device's.
  - 17.5 Ops/Byte; Memory-bound, from incorrectly converting bytes to bits.
