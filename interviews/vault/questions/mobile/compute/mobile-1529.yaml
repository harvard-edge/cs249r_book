title: Tensor G3 On-Device Inference Costing
scenario: Your team is developing a new on-device AI feature running on a mobile TPU. The feature uses an LLM requiring approximately 500 billion FLOPs per inference.
question: How would you cost on-device inference across profiling, quantization, and memory limits for a 500 GFLOP LLM?
details:
  realistic_solution: |
    Build the cost model from profiling, not peak TOPS alone. First measure per-op latency, memory traffic, peak activation size, model footprint, and power on the target TPU path. Then evaluate quantization: INT8/INT4 may reduce weight bandwidth and memory footprint, but only helps latency if kernels map efficiently and accuracy remains acceptable. Finally compare the compute lower bound, bandwidth lower bound, and available unified-memory headroom before deciding whether to shrink the model, shorten context, or move work off device.
  common_mistake: |
    **The Pitfall:** Only focusing on raw FLOPs and peak theoretical TOPS to estimate feasibility.
    **The Rationale:** Candidates treat mobile processors as theoretical math engines, completely ignoring memory bandwidth ceilings and the massive engineering cost of quantization toolchains.
    **The Consequence:** Promising an impossible latency target and drastically underestimating the engineering timeline required for deployment.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model Compute: 500 billion FLOPs (0.5 TFLOPs).
    - TPU Peak Performance: 7.5 TOPS.
    - Treat 1 FLOP as 1 counted op only for a rough lower bound.
    - Example quantized weight footprint: 7B INT8 = 7 GB, or INT4 = 3.5 GB.
    - Example memory bandwidth: 60 GB/s effective.

    **Calculations:**
    - Compute lower bound: 0.5e12 ops / 7.5e12 ops/s = 0.067 seconds = 67 ms.
    - INT8 weight-stream lower bound: 7 GB / 60 GB/s = 117 ms if weights are streamed once.
    - INT4 weight-stream lower bound: 3.5 GB / 60 GB/s = 58 ms before KV-cache, activations, and runtime overhead.
    - Practical latency lower bound is the max of compute, bandwidth, and measured scheduling/runtime overhead.

    **Conclusion & Interpretation:**
    - **Result: >=67 ms by compute, and often bandwidth/memory limited after profiling**. Quantization is costed by its impact on footprint, bandwidth, supported kernels, accuracy loss, and remaining unified-memory headroom.
