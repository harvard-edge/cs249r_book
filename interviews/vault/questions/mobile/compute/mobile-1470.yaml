title: A17 Pro Neural Engine Specification Recall
scenario: You are interviewing a candidate for an on-device ML deployment role and want to verify their familiarity with current target hardware.
question: What are the key Apple A17 Pro Neural Engine compute and memory specifications for mobile ML sizing?
details:
  realistic_solution: 'The candidate should correctly state that the Apple A17 Pro Neural Engine is a 16-core accelerator capable of 35 TOPS. They should additionally recall that it utilizes a shared 8 GB unified memory architecture with the CPU and GPU.'
  common_mistake: |
    **The Pitfall:** Confusing NPU specs with GPU specs or assuming dedicated memory.
    **The Rationale:** Candidates often recall numbers from previous chip generations or assume the NPU has dedicated memory rather than a shared unified pool.
    **The Consequence:** Incorrect baseline knowledge leads to flawed initial compute cost estimations and OOM errors.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hardware: Apple A17 Pro Neural Engine.
    - Performance Target: 35 TOPS at 5W.
    - Cores: 16.

    **Calculations:**
    - Energy Efficiency: 35 TOPS / 5W = 7 TOPS/Watt.
    - Performance per Core: 35 TOPS / 16 cores = 2.1875 TOPS/core.

    **Conclusion & Interpretation:**
    - **Result: 35 TOPS (Hardware Constraints)**. A17 Pro delivers 35 TOPS over 16 cores with 8 GB shared unified memory.
