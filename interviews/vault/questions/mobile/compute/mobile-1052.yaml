title: 'Mobile Transformer Cost Evaluation: Snapdragon vs A17 Pro LLM Performance'
scenario: Compare Snapdragon 8 Gen 3 vs A17 Pro for running Phi-3-Mini-3.8B INT4 (1.9GB). Model uses 32 layers, 2048 hidden, 32 heads.
question: How would you calculate decode throughput (tokens/second), latency for 200-token response, and which platform better utilizes its memory advantage for LLM decode?
details:
  realistic_solution: 'Phi-3 INT4: 1.9GB. Decode is memory-bandwidth-bound at batch=1 (proven: AI << ridge for both platforms). Snapdragon: 1.9GB/77GB/s=24.7ms/tok=40.5 tok/s. A17 Pro: 1.9GB/100GB/s=19ms/tok=52.6 tok/s. A17 Pro wins despite lower TOPS (52.6 vs 40.5 tok/s = 30% faster). 200 token response: Snap=4.94s, A17=3.8s. Both exceed 3s SLO! For 100 tokens: Snap=2.47s, A17=1.9s. Both meet 3s SLO at 100 tokens. TOPS comparison is irrelevant for LLM decode — bandwidth wins. A17''s 100GB/s vs Snap''s 77GB/s gives 30% advantage despite 22% lower TOPS.'
  common_mistake: |
    **The Pitfall:** Assuming higher TOPS always wins for LLM decode.
    **The Rationale:** Marketers and engineers use TOPS as the primary proxy for AI performance across all workloads.
    **The Consequence:** Selecting a chip based on TOPS rather than memory bandwidth, which is the true bottleneck for batch=1 LLM decode.
  napkin_math: |
    **Assumptions & Constraints:**
    - Phi-3 INT4 Footprint: 1.9 GB.
    - Snapdragon 8 Gen 3: 77 GB/s bandwidth.
    - A17 Pro: 100 GB/s bandwidth.

    **Calculations:**
    - Snapdragon Decode: 1.9 GB / 77 GB/s = 24.7 ms/tok -> 40.5 tok/s.
    - A17 Pro Decode: 1.9 GB / 100 GB/s = 19 ms/tok -> 52.6 tok/s.
    - Latency (200 Tokens): Snapdragon = 4.94s. A17 Pro = 3.8s.

    **Conclusion & Interpretation:**
    - **Result: A17 Pro wins by 1.3x (Memory-Bandwidth-Bound)**. LLM decode throughput is purely dictated by memory bandwidth limits at batch 1.
