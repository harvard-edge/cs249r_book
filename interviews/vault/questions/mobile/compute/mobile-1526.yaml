title: 'Optimizing Mobile LLMs: Snapdragon 8 Gen 3 NPU Capabilities'
scenario: You're tasked with deploying a quantized large language model (LLM) for a real-time conversational AI application on a flagship mobile device. The target hardware is the Snapdragon 8 Gen 3 Mobile Platform, featuring its Hexagon NPU and 12-16 GB LPDDR5X memory.
question: What are the architectural advantages and disadvantages of using the Hexagon NPU (45 TOPS) for a 7B INT4/INT8 LLM compared to the device's GPU or CPU?
details:
  realistic_solution: 'A realistic solution involves a detailed architectural breakdown: the NPU''s custom instruction set for tensor operations and integer arithmetic provides energy efficiency but might lack flexibility for all LLM operations; the GPU offers parallel floating-point performance but higher power draw; and the CPU provides maximum programmability but poor throughput for matrix multiplication. The solution would highlight how the NPU''s memory access patterns, especially for on-chip cache and direct access to LPDDR5X, are critical for LLM performance. It would also explain the necessity of model quantization (INT8/INT4) to fit within the NPU''s capabilities and memory, and the trade-offs between quantization level, accuracy, and performance.'
  common_mistake: |
    **The Pitfall:** Solely focusing on peak TOPS numbers.
    **The Rationale:** Engineers evaluate NPU capabilities purely on marketing numbers without considering memory bandwidth, compiler overhead, or the strict thermal design power (TDP) constraints of a mobile form factor.
    **The Consequence:** They overestimate real-world performance, failing to account for the heavy data movement costs inherent to LLM inference.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: 7B parameters (INT8).
    - Peak Compute: approximate device-class budget of 45 TOPS INT8.
    - Memory Bandwidth: approximate device-class LPDDR5X budget of ~85 GB/s.
    - Decode estimate is a rough upper-bound traffic model; real kernels may reuse cached tiles and also pay KV-cache, activation, and compiler overhead.

    **Calculations:**
    - Conservative INT8 weight-traffic upper bound per generated token: 7B * 1 byte = 7 GB/token.
    - INT8 bandwidth upper bound: 85 GB/s / 7 GB/token = ~12 tokens/sec before KV-cache and activation traffic.
    - INT4 weight traffic: 7B * 0.5 byte = 3.5 GB/token.
    - INT4 bandwidth upper bound: 85 GB/s / 3.5 GB/token = ~24 tokens/sec before overhead.
    - Decode compute is roughly proportional to parameter count per token, but peak 45 TOPS is not the limiter unless kernels achieve high reuse and bandwidth demand is reduced.

    **Conclusion & Interpretation:**
    - **Result: Rough memory-bound decode upper bound (~12 tok/s INT8, ~24 tok/s INT4 before overhead)**. The NPU's peak TOPS helps prefill and matmul kernels, but measured token generation depends on compiler support, reuse, KV-cache traffic, and sustained thermal limits.
