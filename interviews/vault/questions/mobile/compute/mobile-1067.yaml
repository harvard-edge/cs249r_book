title: Implement Mobile LLM Decode Benchmark on Tensor G3
scenario: You must implement a decode speed benchmark for a 2B INT4 transformer on a mobile TPU (15 TOPS, 51.2 GB/s LPDDR5 bandwidth). The test involves timed measurement of 100 decode steps at batch=1, calculation of tokens/s and GB/s memory bandwidth utilized, and comparison to the theoretical bandwidth-limited maximum.
question: How should a decode benchmark isolate inference time and compare measured tokens per second to the bandwidth limit?
details:
  realistic_solution: 'Benchmark design: pre-tokenize inputs, prefill and pin a fixed 256-token KV cache, run several warm-up decode chains, then time only 100 sequential single-token decode calls with synchronization around the accelerator work. Compute tokens_per_second = 100 / decode_time. Define the bandwidth model before computing MBU: a 2B INT4 model has 1.0GB of weights, and if the decode kernel streams all weights plus about 12.6MB of KV/cache traffic per token, bytes_per_token = 1.0126GB. The bandwidth-limited maximum is 51.2GB/s / 1.0126GB = 50.6 tok/s. If the measured rate is 42 tok/s, achieved bandwidth is 42 * 1.0126 = 42.5GB/s and MBU is 42.5 / 51.2 = 83%. Report mean, P50/P95, and std across runs, and exclude tokenization, sampling, logging, UI, and detokenization from the timed region.'
  common_mistake: |
    **The Pitfall:** Measuring wall-clock time including tokenization and de-tokenization.
    **The Rationale:** Developers often benchmark the full end-to-end pipeline rather than isolating the tensor compute and memory bandwidth.
    **The Consequence:** The resulting tokens/sec metric artificially drops, masking the true memory bandwidth utilization (MBU) of the accelerator and causing misguided compiler tuning.
  napkin_math: |
    **Assumptions & Constraints:**
    - 2B parameter model at INT4 (0.5 bytes/param) = 1.0 GB total weight size.
    - Mobile TPU bandwidth limit: 51.2 GB/s. Batch size = 1. Context = 256 tokens.
    - Per-token traffic model: stream weights plus ~12.6 MB KV/cache traffic.

    **Calculations:**
    - Bytes per decode token: 1.0 GB + 0.0126 GB = 1.0126 GB.
    - Theoretical max tokens/s: 51.2 GB/s / 1.0126 GB = 50.6 tokens/second.
    - If measured rate is 42 tokens/sec, achieved bandwidth = 42 * 1.0126 GB/s = 42.5 GB/s.
    - MBU = achieved bandwidth / peak bandwidth = 42.5 / 51.2 = 83.0%.

    **Conclusion & Interpretation:**
    - **Result: 83% MBU (Memory-Bound).** The benchmark isolates decode inference time and compares measured throughput against a single declared bytes-per-token bandwidth model.
