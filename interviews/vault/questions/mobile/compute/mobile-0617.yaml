title: The Depthwise Memory Bound
scenario: 'To optimize a mobile vision model, you replace all standard 3x3 convolutions with Depthwise Separable Convolutions. The total FLOPs decrease by 8x, but the actual latency on the mobile GPU only improves by 1.5x.'
question: 'Why didn''t the 8x reduction in math translate to an 8x reduction in time?'
details:
  realistic_solution: 'You drastically reduced the arithmetic intensity (FLOPs/byte) and made the layer strictly memory-bound. A standard convolution reuses the same input activation patch across many output channels, heavily leveraging the L1 cache. A depthwise convolution applies one spatial filter to one input channel, meaning it reads a patch of memory, does very little math, and immediately discards it. The mobile GPU spends all its time waiting for the memory bus to fetch the next channel, leaving its ALUs largely idle.'
  common_mistake: |
    **The Pitfall:** Assuming latency scales linearly with FLOPs.
    **The Rationale:** Engineers treat FLOP reduction as the ultimate metric for model optimization.
    **The Consequence:** Creating strictly memory-bound layers that leave mobile GPU ALUs largely idle.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Standard 3x3 Math: 36,864 MACs.
       - Depthwise Separable Math: 4,672 MACs (~8x reduction).
       - Mobile GPU Bandwidth: ~51.2 GB/s.
    2. **Calculations:**
       - Depthwise layer reads 1,152 bytes and does 1,152 FLOPs.
       - Arithmetic Intensity: 1,152 FLOPs / 1,152 Bytes = 1 FLOP/Byte.
       - GPUs starve for data when intensity is < 20 FLOPs/Byte.
    3. **Conclusion & Interpretation:**
       - **Result: 1 FLOP/Byte (Memory-Bound Shift).**
