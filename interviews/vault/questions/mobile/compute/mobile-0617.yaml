title: The Depthwise Memory Bound
scenario: To optimize a mobile vision model, you replace all standard 3x3 convolutions with Depthwise Separable Convolutions. The total FLOPs decrease by 8x, but the actual latency on the mobile GPU only improves by 1.5x.
question: Why didn't the 8x reduction in math translate to an 8x reduction in time?
details:
  realistic_solution: You drastically reduced the arithmetic intensity (FLOPs/byte) and made the layer more memory-bound. A standard convolution reuses each input patch across many output channels, while the depthwise part of a separable convolution applies one spatial filter to one channel and performs little work per byte fetched. Even after adding the pointwise 1x1 step, the separable block has far less reuse than the dense 3x3 convolution, so the mobile GPU spends more time waiting on memory and less time keeping ALUs full.
  common_mistake: |
    **The Pitfall:** Assuming latency scales linearly with FLOPs.
    **The Rationale:** Engineers treat FLOP reduction as the ultimate metric for model optimization.
    **The Consequence:** Creating strictly memory-bound layers that leave mobile GPU ALUs largely idle.
  napkin_math: |
    **Assumptions & Constraints:**
    - Use MACs as the compute unit; if reporting FLOPs, count 1 MAC as 2 FLOPs.
    - Standard 3x3 convolution work: 9,216 MACs.
    - Depthwise separable block work: 1,152 MACs total (8x reduction).
    - Of that separable total, the depthwise 3x3 portion is only 288 MACs and the pointwise 1x1 portion is 864 MACs.
    - Mobile GPU Bandwidth: ~51.2 GB/s.

    **Calculations:**
    - Simplified activation/filter traffic for the separable block: ~1,152 bytes accessed.
    - Separable arithmetic intensity: 1,152 MACs / 1,152 bytes = 1 MAC/byte, or 2 FLOPs/byte under the 2-FLOPs-per-MAC convention.
    - Standard convolution has 9,216 MACs over a similar local tile footprint, so its intensity is about 8 MACs/byte, or 16 FLOPs/byte.
    - If the mobile GPU needs roughly 20 FLOPs/byte to stay compute-bound, the separable block falls below that roofline and becomes bandwidth-limited.

    **Conclusion & Interpretation:**
    - **Result: ~2 FLOPs/Byte for the separable block (Memory-Bound Shift).** The 8x MAC reduction also removes reuse, so latency improves much less than compute count.
