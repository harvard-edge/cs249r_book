title: ONNX Runtime CPU Fallback from Missing NPU Execution Provider
scenario: A mobile chiplet combines an ARM Cortex-X4 CPU die, an Imagination IMG DXT GPU die, and a custom NPU die from a third vendor. A developer using ONNX Runtime reports that model operators fall back to CPU instead of NPU.
question: How would you diagnose the ONNX Runtime portability issue for operators falling back to the CPU?
details:
  realistic_solution: The NPU execution provider is missing, misregistered, or incomplete. ONNX Runtime assigns graph partitions only to execution providers that are present and can claim the relevant ONNX operators; unsupported nodes remain on lower-priority providers such as CPU. Diagnose by listing the registered execution providers, enabling ORT partitioning/logging, and comparing the model operators against the vendor NPU SDK support matrix. Fix by installing the correct vendor EP, converting or fusing unsupported operators into supported forms, and validating the final graph partition instead of assuming accelerator dispatch is automatic.
  common_mistake: |
    **The Pitfall:** Assuming ONNX Runtime automatically dispatches to all available accelerators.
    **The Rationale:** Candidates often think execution provider selection is automatic, missing that a custom NPU requires a vendor-supplied execution provider mapping ONNX ops to NPU instructions.
    **The Consequence:** The missing or incomplete execution provider causes unsupported ops to fall back to the CPU, destroying performance.
  napkin_math: |
    **Assumptions & Constraints:**
    - 80 total ops, 15 unsupported on NPU.
    - For this estimate, runtime is proportional to compute divided by effective throughput.
    - CPU effective throughput is 1 unit; NPU effective throughput is 10 units.
    - The 15 unsupported ops account for 40% of total compute.

    **Calculations:**
    - Fallback path time = unsupported compute on CPU + supported compute on NPU.
    - Fallback path time = 0.4 / 1 + 0.6 / 10 = 0.4 + 0.06 = 0.46 normalized time units.
    - All-NPU path time = 1.0 / 10 = 0.10 normalized time units.
    - Slowdown = 0.46 / 0.10 = 4.6x.

    **Conclusion & Interpretation:**
    - **Result: 4.6x slowdown under the stated throughput assumptions**. CPU fallback can dominate latency even when most operators are assigned to the NPU, so the portability diagnosis should focus on EP registration and unsupported operator partitions.
