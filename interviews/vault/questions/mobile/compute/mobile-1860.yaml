title: On-Device LLM Cold-Start and KV Setup Latency
scenario: A mobile on-device LLM (Gemma 2B) runs at 25 tokens/sec on NPU but end-to-end user-perceived latency for a 50-token prompt is 3 seconds instead of the expected 2 seconds. Profiling shows tokenization and KV cache setup take 900ms.
question: How would you diagnose and fix 900 ms of cold tokenization and KV setup for a mobile Gemma 2B prompt, assuming 18 layers, 8 KV heads, and 256-dim FP16 KV?
details:
  realistic_solution: 'Diagnosis: separate CPU tokenization from model prefill and runtime setup. A 32K vocabulary with compact entries is only a few hundred KB, so tokenizer lookup alone should not explain 900 ms. The KV cache footprint for a 50-token Gemma 2B prompt is roughly 50 tokens * 18 layers * 2 K/V tensors * 8 KV heads * 256 head dim * 2 bytes = 7.4 MB, which is not large enough to take 900 ms as a raw LPDDR write. The likely issue is cold allocation, memory mapping, arena growth, or mobile inference runtime/session setup occurring on the first prompt. Fix: pre-create and prewarm the inference session, allocate the maximum KV arena at app start or model load, reuse KV buffers across turns, pin tokenizer work to CPU cores without blocking the NPU queue, and ensure prefill is submitted as a batched prompt path rather than accidentally invoking per-token decode setup.'
  common_mistake: |
    **The Pitfall:** Blaming the entire 900ms overhead on tokenizer string processing.
    **The Rationale:** Candidates see tokenization and KV setup grouped together in a profile and do not separate CPU text work, KV allocation, prefill execution, and runtime cold-start costs.
    **The Consequence:** They optimize vocabulary lookup while leaving the real first-prompt latency source: cold inference session setup, allocator growth, and non-reused KV buffers.
  napkin_math: |
    **Assumptions & Constraints:**
    - 50-token prompt at 25 tok/sec expected 2s compute.
    - Observed is 3s, indicating 1s overhead.
    - Gemma 2B KV shape estimate: 18 layers, 8 KV heads, 256 head dimension, fp16.
    - LPDDR write bandwidth is tens of GB/s, so raw KV writes are not expected to dominate.
    - Tokenization speed: 200µs/token.

    **Calculations:**
    - Expected compute: 50 / 25 = 2s.
    - KV cache bytes: 50 * 18 * 2 * 8 * 256 * 2 = 7,372,800 bytes ≈ 7.4MB.
    - A 7.4MB raw write at 34 GB/s is about 0.22ms; allocation and cache effects may add more, but not hundreds of milliseconds by bandwidth alone.
    - Tokenization time: 50 tokens * 200µs/token = 10ms.
    - Accounted direct work is roughly 10-20ms, leaving about 880-890ms of cold runtime, allocator, memory mapping, or session setup overhead.

    **Conclusion & Interpretation:**
    - **Result: Runtime setup and allocation bottleneck.** The fix is to prewarm the mobile inference session and preallocate/reuse KV cache buffers, while keeping tokenizer and prefill stages separately profiled.
