title: The Qualcomm QNN SDK Delegation
scenario: 'You''re deploying a multi-modal model on a mobile SoC using the QNN SDK. QNN can delegate ops to the NPU, GPU, or CPU. Your model has 60 layers: Conv2D, LayerNorm, GELU, attention, and softmax.'
question: How should QNN delegate each model operation across NPU, GPU, and CPU to minimize latency?
details:
  realistic_solution: Build an explicit op-placement plan and validate it with QNN partition logs. Put Conv2D blocks on the NPU/HTP because they are dense, quantized tensor kernels with good on-chip reuse. Keep attention matmuls and supported approximations of GELU on the NPU when the shapes and quantization are supported; otherwise place the whole attention subgraph on the GPU to avoid bouncing only softmax or normalization across devices. Use the GPU for unsupported FP16 attention/softmax islands that can stay together. Leave CPU only for unavoidable small control or reshape ops, and rewrite or fuse LayerNorm/GELU where possible so they do not create CPU fallbacks between accelerated regions.
  common_mistake: |
    **The Pitfall:** Setting a single backend (e.g., HTP) and letting the runtime figure it out.
    **The Rationale:** Candidates assume the SDK will magically optimize the graph.
    **The Consequence:** The runtime silently falls back unsupported ops to the CPU, creating massive partition boundaries that completely dominate latency.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: 60 layers. Unoptimized: 22ms latency.
    - Boundary costs: NPU<->GPU = 1.5ms per crossing; accelerator<->CPU fallback = 1.0ms per crossing.

    **Calculations:**
    - Naive delegation: NPU Conv blocks (6ms) + GPU attention blocks (8ms) + CPU fallback ops (1ms) + four NPU/GPU crossings (4 * 1.5ms = 6ms) + one CPU fallback crossing (1ms) = 22ms.
    - Optimized delegation: NPU Conv plus supported attention/GELU (8ms) + one contiguous GPU island for unsupported softmax/attention pieces (6ms) + CPU unavoidable ops (1ms) + one NPU->GPU crossing and one GPU->NPU crossing (2 * 1.5ms = 3ms) = 18ms.

    **Conclusion & Interpretation:**
    - **Result: 18ms after reducing partition boundaries.** The policy is to keep supported dense tensor ops on the NPU, group unsupported attention/softmax work into a GPU island, and avoid CPU fallbacks inside hot paths.
