title: On-Device Training with LoRA Adapter on A17 Pro — Feasibility Analysis
scenario: An iOS app personalizes a 3B language model (INT4 inference, 1.5GB) using LoRA fine-tuning on user data. LoRA rank=8, target modules=q_proj+v_proj (32 layers × 2 matrices × 2 LoRA matrices). The user has 100 examples (avg 128 tokens). Training runs on A17 Pro during charging.
question: Is LoRA fine-tuning a 3B INT4 iOS language model with rank 8 adapters and 100 examples feasible on A17 Pro?
details:
  realistic_solution: 'LoRA parameters: 32 layers × 2 modules × 2 LoRA matrices × 4096 × rank 8 = 4.19M trainable parameters. Stored in FP32 with gradients and Adam moments, the adapter state is about 67MB, so memory is roughly 1.5GB + 67MB before activations and runtime buffers and is plausibly feasible during charging. Compute is the larger caveat: the LoRA adapter matmuls alone are about 100 examples × 128 tokens × 2 forward/backward factor × 4.19M ≈ 107B operations per epoch. At an optimistic 100 GFLOP/s sustained FP32 rate this is about 1.1s per epoch for adapters only, but full fine-tuning still needs frozen-base forward passes, activation movement, optimizer overhead, and mobile thermal limits. A realistic 10-epoch personalization job is more likely tens of seconds to a few minutes, not the 10.7s adapter-only lower bound.'
  common_mistake: |
    **The Pitfall:** Running LoRA training entirely in INT4 precision.
    **The Rationale:** Developers incorrectly assume that if the base model is quantized for inference, the training process and adapters can also use the same low precision to save memory.
    **The Consequence:** Severe training instability and lack of convergence, as LoRA adapters and gradients require FP32 or BF16 precision.
  napkin_math: |
    **Assumptions & Constraints:**
    - Base Model: 3B INT4 (1.5 GB).
    - LoRA target: q_proj+v_proj (32 layers * 2 modules).
    - LoRA rank: 8.
    - Compute: A17 P-cores ~100 GFLOPS FP32.
    - Data: 100 examples * 128 tokens.

    **Calculations:**
    - LoRA Parameters: 32 layers * 2 modules * 2 matrices * 4096 (d_model) * 8 (rank) = 4.19M parameters.
    - Training Memory (FP32): 4.19M * 4 bytes * 3 (weights, grad, Adam momentum) + 4.19M * 4 bytes (Adam variance) = ~67 MB.
    - Total Memory: 1.5 GB + 67 MB = 1.57 GB (Fits safely in iOS ~3GB limit).
    - Adapter Compute Load: 100 samples * 128 tokens * 2 * 4.19M = ~107B operations per epoch.
    - Adapter-only lower bound at 100 GFLOP/s sustained FP32: 107B / 100B/s = 1.07 seconds per epoch.
    - Full training includes frozen-base forward passes, optimizer updates, memory movement, and thermal throttling, so practical time is much larger than the adapter-only lower bound.

    **Conclusion & Interpretation:**
    - **Result: memory feasible, runtime likely tens of seconds to minutes**. The adapter memory is small enough for local training, but the 10.7s figure is only an optimistic adapter-compute lower bound.
