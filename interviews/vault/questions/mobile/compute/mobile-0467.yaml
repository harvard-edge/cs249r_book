title: The Mobile Battery Drainer
scenario: You are a mobile ML engineer optimizing a new real-time object detection model for a flagship phone. The model requires 70 GOps per inference and has 350 MB of weights. Users complain about severe battery drain and UI 'jank' when the feature is active.
question: Why does a 70 GOps model with 350 MB of weights drain battery and leave the NPU underutilized?
details:
  realistic_solution: 'The model is **memory-bound**. To determine this, we calculate the model''s Arithmetic Intensity (AI) and compare it to the hardware''s ridge point. AI = 70 GOps / 350 MB = 200 Ops/Byte. The ridge point is typically ~684 Ops/Byte. Since 200 < 684, the NPU spends most of its time waiting for memory, causing constant DRAM traffic that drains the battery.'
  common_mistake: |
    **The Pitfall:** Focusing only on peak TOPS and ignoring memory access patterns.
    **The Rationale:** Engineers assume a high TOPS number solves everything, failing to calculate if the model has enough arithmetic intensity to keep the compute units fed.
    **The Consequence:** Models that constantly thrash main memory, leading to terrible battery drain and slow performance.
  napkin_math: |
    **Assumptions & Constraints:**
    - Compute = 70 GOps. Weights = 350 MB.
    - Hardware Ridge Point = 35 TOPS / 51.2 GB/s ≈ 683 Ops/Byte.

    **Calculations:**
    - Arithmetic Intensity (AI) = 70 GOps / 350 MB = 200 Ops/Byte.
    - 200 Ops/Byte < 683 Ops/Byte (Falls to the left of the roofline ridge).
    - Compute Time = 70 GOps / 35 TOPS = 2.0 ms.
    - Memory Time = 350 MB / 51.2 GB/s = 6.8 ms.
    - NPU Utilization = 2.0 ms / 6.8 ms ≈ 29%.

    **Conclusion & Interpretation:**
    - **Result: NPU sits 71% idle (Memory-bound energy drain)**. The severe battery drain comes from continuous main DRAM accesses.
  options:
  - The model is compute-bound because its 70 G-ops overwhelm the compute capacity.
  - The model is memory-bound. The AI calculation (350MB / 70 G-ops) shows it is limited by data transfer.
  - The model is memory-bound because its Arithmetic Intensity (200 Ops/Byte) is far below the ridge point (~683 Ops/Byte).
  - The model is compute-bound because its Arithmetic Intensity of 200 Ops/Byte is a high number, meaning it is computationally complex.
