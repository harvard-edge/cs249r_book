title: The 85% Delegation Fallacy
scenario: 'You are deploying a new on-device generative model to a smartphone. The model consists of 100 distinct operations. The NPU is roughly 255x faster than its CPU per operation. After running the Core ML profiler, you find that 85 of these operations are supported by the NPU, but the remaining 15 custom operations must fall back to the CPU for execution.'
question: 'Why can 15 CPU fallback operations dominate latency even when 85 of 100 operations run on the NPU?'
details:
  realistic_solution: 'The CPU is the bottleneck. Although it only runs 15% of the operations, its drastically lower performance compared to the NPU means this small portion of work dominates the total inference time. The NPU finishes its 85 operations very quickly and then must wait for the CPU to finish its 15 operations. The total latency is effectively the latency of the CPU-bound portion.'
  common_mistake: |
    **The Pitfall:** Engineers often assume that if 85% of operations are delegated to the fast NPU, the overall performance will be close to the NPU's speed.
    **The Rationale:** They apply a linear mental model (e.g., '85% fast, 15% slow') and fail to appreciate Amdahl's Law.
    **The Consequence:** A small fraction of very slow operations can dominate the total latency, completely ruining expected performance gains.
  napkin_math: |
    **Assumptions & Constraints:**
    - Operations: 85 NPU ops, 15 CPU ops (100 total).
    - Relative Speeds: NPU speed = 1 unit of time per op; CPU speed = 255 units of time per op.

    **Calculations:**
    - NPU Time: 85 ops × 1 = 85 units.
    - CPU Time: 15 ops × 255 = 3,825 units.
    - Ratio: 3,825 / 85 = 45x difference.

    **Conclusion & Interpretation:**
    - **Result: CPU-Bound Amdahl Bottleneck**. The 15 CPU ops take **45x longer** to execute than all 85 NPU ops combined, meaning the CPU fundamentally bottlenecks the inference.
  options:
  - 'The overall performance will be roughly 85% of the NPU''s peak performance.'
  - 'The CPU is the bottleneck; the 15 unsupported ops take 45x longer than the 85 NPU ops.'
  - 'The NPU is the bottleneck because it executes 85% of the total operations.'
  - 'The CPU portion is negligible because the NPU is over 250x faster than the CPU.'
  correct_index: 1
