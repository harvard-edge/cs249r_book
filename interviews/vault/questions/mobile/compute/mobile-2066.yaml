title: 'Hexagon NPU Compute Utilization'
scenario: A real-time video segmentation model requires 15 Giga-Operations (GOPs) per frame and runs on the Snapdragon 8 Gen 3 Hexagon NPU (45 TOPS capability).
question: What is the NPU compute utilization percentage if the pipeline processes a fixed 60 frames per second?
details:
  realistic_solution: 'At 60 frames per second, the total operations required per second is 15 GOPs * 60 = 900 GOPs, or 0.9 TOPS. The Hexagon NPU has a peak capacity of 45 TOPS. The compute utilization is exactly 0.9 / 45 = 2.0%.'
  common_mistake: |
    **The Pitfall:** Miscalculating the conversion from GOPs to TOPS.
    **The Rationale:** Dividing GOPs directly by TOPS without adjusting for the 1000x magnitude difference.
    **The Consequence:** Reporting an impossible utilization rate off by three orders of magnitude.
  napkin_math: |
    **Assumptions & Constraints:**
    - Pipeline processes 60 frames per second.
    - Model requires 15 Giga-Operations (GOPs) per frame.
    - Hexagon NPU peak capacity: 45 TOPS.

    **Calculations:**
    - Compute per second: 15 GOPs/frame * 60 FPS = 900 GOPs/sec.
    - Conversion to TOPS: 900 GOPs = 0.9 TOPS.
    - Utilization: 0.9 TOPS / 45 TOPS = 0.02.

    **Conclusion & Interpretation:**
    - **Result: 2.0% (Compute-Bound)**. 2.0% compute utilization.
