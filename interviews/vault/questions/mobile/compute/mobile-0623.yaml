title: The Metal Shader Threadgroup Limit
scenario: You write a custom Metal Compute Shader configured with a threadgroup size of 1024 to process pixels simultaneously. The code executes perfectly on newer hardware but immediately crashes on older devices with a 'Threadgroup size exceeds limit' error.
question: Why does a Metal shader with 1024-thread groups run on newer hardware but crash on older devices?
details:
  realistic_solution: |
    Metal exposes a per-device maximum threadgroup size, and older GPUs may report a lower `maxThreadsPerThreadgroup` than newer ones. A 1024-thread dispatch is legal only on devices whose reported limit allows it; older devices that cap the limit at 512 reject the dispatch even if the shader compiles. The robust solution is to query `device.maxThreadsPerThreadgroup`, account for the pipeline's `threadExecutionWidth`, and choose a threadgroup size that fits the current device.
  common_mistake: |
    **The Pitfall:** Assuming the older phone is running out of general GPU RAM.
    **The Rationale:** Candidates conflate a per-dispatch threadgroup capability with total memory capacity.
    **The Consequence:** They try to optimize the model's memory footprint instead of querying device limits and sizing the threadgroup accordingly.
  napkin_math: |
    **Assumptions & Constraints:**
    - Shader threadgroup request: 1024 threads.
    - New SoC reported `maxThreadsPerThreadgroup`: at least 1024 threads.
    - Old SoC reported `maxThreadsPerThreadgroup`: 512 threads.

    **Calculations:**
    - New SoC check: 1024 requested <= 1024 allowed, so the dispatch is valid.
    - Old SoC check: 1024 requested > 512 allowed, so Metal rejects the dispatch.
    - Safe runtime choice: clamp the requested size to <= 512 on the older device, preferably as a multiple of `threadExecutionWidth`.

    **Conclusion & Interpretation:**
    - **Result: 1024 > 512 (Device-Limit-Bound)**. The crash is a per-device threadgroup limit violation, not a general memory allocation bug.
