title: 'Mobile Transformer Cost Evaluation: On-Device LLM Viability on A17 Pro'
scenario: Evaluate whether an INT4 Llama-3-8B model can provide a good user experience on a mobile SoC with a P99 < 3s for 100-token responses.
question: Can Llama-3-8B INT4 meet a P99 under 3 seconds for 100-token responses on the A17 Pro, given RAM and bandwidth limits?
details:
  realistic_solution: |
    The model can fit, but fitting is not enough to meet the latency SLO. A17 Pro has 8GB of LPDDR5-class memory; after OS and app overhead, about 5-6GB may be available. An INT4 8B model uses roughly 4GB for weights, leaving about 1-2GB for KV cache and runtime buffers. The KV cache estimate is modest: 32 layers * 2 KV tensors * 32 heads * 128 head_dim * 0.5 bytes = 128KB/token, so a 1000-token context is about 128MB.

    The 3s P99 target for 100 output tokens requires at least 33 tokens/s, or 30ms/token including scheduling, sampling, memory traffic, and thermal effects. You should not model this as loading 4GB from storage every token. The weights are resident in RAM and kernels stream/tile them through caches while doing matmul and attention; per-token latency must be estimated from sustained kernel throughput plus KV/activation traffic or measured on device. A conservative mobile estimate for an 8B INT4 model is well below 33 tokens/s, so Llama-3-8B INT4 should be treated as unlikely to meet the P99 target on A17 Pro. Use a smaller 3-4B INT4 model, shorten the response, stream partial output while relaxing P99, or require an empirical benchmark before claiming success.
  common_mistake: |
    **The Pitfall:** Directly translating Neural Engine TOPS to autoregressive decode throughput.
    **The Rationale:** Engineers assume peak compute represents model execution speed.
    **The Consequence:** Failing to realize LLM generation is overwhelmingly memory-bandwidth bound, ignoring the ~100 GB/s ceiling.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - INT4 8B model size: 4 GB.
       - KV cache: ~128KB/token for this 8B architecture.
       - SLO: 100 tokens under 3 seconds, so required throughput is >=33.3 tokens/s.
    2. **Calculations:**
       - Required token time: 3s / 100 = 30ms/token.
       - KV cache at 1000 context tokens: 128KB * 1000 = 128MB, so memory capacity is not the blocker.
       - The 4GB weight footprint is resident in RAM; dividing 4GB by peak bandwidth gives only a rough lower-bound traffic check, not a full decode latency model.
       - Practical decision rule: if measured sustained decode is below 33 tok/s, the 100-token response exceeds 3s P99. Conservative mobile 8B INT4 throughput estimates fall below that threshold.
    3. **Conclusion & Interpretation:**
       - **Result: capacity fits, latency likely fails.** The correct viability test is measured or realistically estimated tok/s; the target requires >=33 tok/s, which is not a safe assumption for an 8B INT4 model on A17 Pro.
