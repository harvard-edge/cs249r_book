title: 'Mobile Transformer Cost Evaluation: On-Device LLM Viability on A17 Pro'
scenario: 'Evaluate whether an INT4 Llama-3-8B model can provide a good user experience on a mobile SoC with a P99 < 3s for 100-token responses.'
question: 'Can Llama-3-8B INT4 meet a P99 under 3 seconds for 100-token responses on the A17 Pro, given RAM and bandwidth limits?'
details:
  realistic_solution: 'A17 Pro memory: 8GB LPDDR5, ~100GB/s bandwidth. OS+apps: 2-3GB. Available: 5-6GB. INT4 8B model: 4GB. Fits! Available RAM after model: 1-2GB for KV cache. KV per token (8B model, 32 layers, 32 heads, 128 head_dim): 32*2*32*128*0.5=131,072 bytes=128KB per token. At 1000 token context: 128MB KV. Fits. Decode throughput: weight loading = 4GB/100GB/s = 40ms per token. 100 tokens: 4s > 3s SLO. FAILS at 40ms/token. Need: either smaller model or faster memory. INT4 4B (e.g., Phi-3-Mini): 2GB/100GB/s = 20ms/token. 100 tokens: 2s < 3s ✓. Apple''s implementation (llm.c/MLX): typically achieves 15-20 tok/s on Llama-3-8B INT4 on A17 Pro — empirically under 3s for 100 tokens.'
  common_mistake: |
    **The Pitfall:** Directly translating Neural Engine TOPS to autoregressive decode throughput.
    **The Rationale:** Engineers assume peak compute represents model execution speed.
    **The Consequence:** Failing to realize LLM generation is overwhelmingly memory-bandwidth bound, ignoring the ~100 GB/s ceiling.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - INT4 8B model size: 4 GB.
       - Bandwidth constraint: 100 GB/s.
       - SLO: 100 tokens under 3 seconds.
    2. **Calculations:**
       - Latency per token: 4 GB / 100 GB/s = 40 ms/token.
       - Decode 100 tokens: 40 ms/tok * 100 = 4.0 seconds.
    3. **Conclusion & Interpretation:**
       - **Result: 4.0s (Fails 3.0s SLO due to Memory-Bandwidth).**
