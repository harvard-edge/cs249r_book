title: Design On-Device LLM Architecture for Tensor G3 Within Thermal Budget
scenario: Google's Tensor G3 must run a conversational LLM within a 3W continuous power budget (thermal limit to prevent throttling). The TPU draws 2W during inference. The goal is to deploy a model architecture (parameters, layers, quantization) that achieves >80% accuracy on MMLU-Mini.
question: What LLM architecture fits under the 3W power, 500ms TTFT, and 50ms/token decode constraints on the Tensor G3?
details:
  realistic_solution: |
    A release-quality answer should not claim that any arbitrary 5B INT4 model will hit >80% MMLU-Mini. The latency-feasible design is a compact, distilled 4B-class INT4 model, about 28-32 layers with GQA (for example 8 KV heads), FP16/BF16 attention logits, and INT8 or FP16 KV cache depending on quality. TTFT for a 512-token prompt is dominated by prefill matmuls: roughly 2 * params * prompt_tokens plus an attention term. For 4B params, that is about 4.1T matmul FLOPs plus overhead, which fits a 500ms budget only if effective sustained throughput is near 10 TOPS; this must be profiled. Decode is memory-sensitive: 4B INT4 weights are about 2.0GB, and a 512-token GQA KV read is only tens of MB, so the raw 51.2GB/s bandwidth budget gives about 40ms before kernel overhead, leaving some room under 50ms/token. Power is plausible if TPU draw is 2W and LPDDR/CPU stay under the remaining 1W through bandwidth capping. If the >80% MMLU-Mini target cannot be reached by a 4B distilled model, the correct conclusion is that the product needs cloud fallback, a smaller benchmark target, or speculative/RAG assistance; a plain 5B estimate with 72-78% accuracy does not satisfy the question.
  common_mistake: |
    **The Pitfall:** Maximizing model size for accuracy without verifying TTFT and decode speed limits.
    **The Rationale:** Designers optimize for the compute capacity but ignore that at high memory bandwidths, large models hit memory-bandwidth walls.
    **The Consequence:** The resulting model violates strict latency constraints because memory transfers stall the TPU.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hardware: 15 TOPS TPU, 51.2 GB/s LPDDR5.
    - Targets: <500ms TTFT for 512 prompt tokens, <50ms/token decode, <3W power, >80% MMLU-Mini.
    - Candidate: 4B INT4 distilled model, 0.5 bytes/param, GQA KV cache.

    **Calculations:**
    - Prefill matmul estimate: 2 * 4B params * 512 tokens = 4.096T operations, plus attention/kernel overhead.
    - 500ms TTFT requires roughly 4.1T / 0.5s = 8.2 TOPS before overhead; with overhead, require about 9-10 sustained TOPS.
    - Decode weight traffic: 4B * 0.5 bytes = 2.0 GB/token.
    - Decode KV traffic at 512 context with GQA is small relative to weights: about tens of MB/token, so use ~2.05 GB/token as the bandwidth payload.
    - Raw bandwidth time: 2.05 GB / 51.2 GB/s ≈ 40 ms/token, leaving ~10 ms for kernels/scheduling before violating 50 ms.
    - Power check: 2W TPU + <=1W CPU/LPDDR budget requires bandwidth throttling and thermal profiling; do not assume max bandwidth continuously.

    **Conclusion & Interpretation:**
    - **Result: 4B-class distilled INT4 model, not an unconstrained 5B model.** It can fit the latency and power budgets if profiling confirms sustained TOPS/bandwidth, and it must be specifically trained/distilled to clear the >80% MMLU-Mini target.
