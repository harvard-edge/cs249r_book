title: Snapdragon 8 Gen 3 NPU Inference Cost Optimization
scenario: Your team is deploying an INT8 LLM on an NPU with 45 TOPS and 12-16 GB LPDDR5X. You must estimate inference latency and power to meet a 100ms budget.
question: How would you estimate FLOPs, NPU-hours, and subsequent energy costs for an INT8 LLM on the Hexagon NPU?
details:
  realistic_solution: '1. **Model Profiling:** Utilize Qualcomm''s SNPE (Snapdragon Neural Processing Engine) SDK profiling tools on target hardware or an accurate emulator to obtain per-layer FLOPs, NPU cycle counts, and memory access patterns for the INT8 quantized model. 2. **FLOPs Estimation:** Derive total INT8 operations (MACs) using profiled data or model analysis tools (e.g., ONNX Runtime, PyTorch profiler) for the specific quantized model. 3. **NPU Utilization & Hours:** Determine actual NPU clock cycles per inference from profiling. Convert these to NPU-hours, considering the NPU''s peak INT8 TOPS (45 * 10^12 operations/second). Acknowledge that effective utilization will be a fraction of the theoretical peak. 4. **Memory Bandwidth Analysis:** Analyze the model''s memory footprint and access patterns. Calculate data transfer time based on the LPDDR5X bandwidth (e.g., 85.3 GB/s for 6400 MHz). Identify if memory data movement is a potential bottleneck. 5. **Power/Energy Estimation:** Use NPU power consumption benchmarks (from SNPE or device datasheets) and the calculated NPU-hours to estimate energy consumption (Joules) per inference. This directly impacts battery drain. 6. **Iterative Optimization:** If targets are missed, investigate further optimizations such as mixed-precision quantization, model pruning, operator fusion, or architectural changes to reduce FLOPs and optimize memory access patterns.'
  common_mistake: |
    **The Pitfall:** Assuming 100% NPU utilization and ignoring data movement.
    **The Rationale:** Using theoretical peak TOPS from datasheets without accounting for low arithmetic intensity or compiler inefficiencies.
    **The Consequence:** Drastically underestimating latency and failing to identify memory bandwidth as the true bottleneck.
  napkin_math: |
    **Assumptions & Constraints:**
    - NPU Peak Compute: 45 TOPS.
    - Realistic Utilization: 20% (9 TOPS).
    - Memory Bandwidth: 81.92 GB/s.
    - Power Envelope: 5W.
    - Model Workload: 100 GigaOps compute, 1 GB memory transfer.

    **Calculations:**
    - Compute Time (Realistic): 100 GigaOps / 9 TOPS = 11.11 ms.
    - Memory Transfer Time: 1 GB / 81.92 GB/s = 12.2 ms.
    - Energy Cost: 5W * 0.01111s ≈ 0.055 Joules.

    **Conclusion & Interpretation:**
    - **Result: 12.2 ms / ~0.055 Joules (Memory-Bound)**. Latency is capped by 12.2 ms data transfer time, consuming ~0.055 Joules per inference.
