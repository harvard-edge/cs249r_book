title: On-Device LLM Roofline Analysis on Tensor G3
scenario: You are tasked with deploying an on-device LLM (~1.8 billion parameters) on a mobile TPU delivering 7.5 TOPS and sharing 12 GB of LPDDR5X memory (60 GB/s bandwidth).
question: Using the roofline model, evaluate whether autoregressive decoding (batch size 1) is compute-bound or memory-bound, and predict the impact of INT4 weight-only quantization?
details:
  realistic_solution: A strong L5 candidate will recognize that autoregressive generation at batch size 1 has low arithmetic intensity and is usually constrained by LPDDR5X traffic rather than the TPU's peak TOPS. They will calculate the ridge point of the device and compare it to the arithmetic intensity of weight-dominated decode. Moving from INT8 to INT4 roughly halves weight bandwidth demand and can approach a 2x speedup if weight reads dominate, but it does not guarantee doubled TPU utilization because KV-cache traffic, dequantization, kernels, and scheduling overhead still matter.
  common_mistake: |
    **The Pitfall:** Assuming that because the TPU provides 7.5 TOPS, the model will run near that compute limit.
    **The Rationale:** Candidates fail to calculate the arithmetic intensity of batch size 1 decoding, relying solely on advertised hardware capability.
    **The Consequence:** Developers waste time optimizing TPU compute kernels when the true bottleneck is LPDDR5X read bandwidth.
  napkin_math: |
    **Assumptions & Constraints:**
    - ~1.8B parameter LLM. Mobile TPU: 7.5 TOPS. LPDDR5X bandwidth: 60 GB/s.
    - Batch size 1. INT8 weights (1 byte/param).
    - Simplifying model: decode is dominated by streaming weight tensors from shared memory once per generated token; KV-cache traffic, cache reuse, and dequantization are handled as overheads that reduce the ideal speedup.

    **Calculations:**
    - Hardware Ridge Point: 7,500 GOPS / 60 GB/s = 125 OPS/byte.
    - Weight-stream intensity under this simplifying assumption, INT8: ~2 ops per 1 byte = 2 ops/byte, below the 125 ops/byte ridge.
    - Weight-stream intensity under this simplifying assumption, INT4: ~2 ops per 0.5 bytes = 4 ops/byte, still below the ridge.
    - INT8 weight footprint per full weight stream: 1.8B * 1 byte = 1.8 GB.
    - INT4 weight footprint per full weight stream: 1.8B * 0.5 bytes = 0.9 GB.
    - The simple footprint ratio is 1.8 GB / 0.9 GB = 2x lower weight traffic, but absolute tokens/sec needs the full per-token memory-traffic model.

    **Conclusion & Interpretation:**
    - **Result: Memory-Bound Decode under the stated weight-stream model.** INT4 can provide up to about a 2x improvement when weight bandwidth dominates, but cache reuse, KV traffic, dequantization, and scheduling determine the measured speedup.
