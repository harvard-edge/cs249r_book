title: Architecting a 4K Super-Resolution Pipeline on an NPU
scenario: You are designing a real-time on-device 4K super-resolution pipeline targeting an NPU with a shared memory pool.
question: How should a 4K super-resolution pipeline use roofline analysis to guarantee it stays compute-bound?
details:
  realistic_solution: Use roofline analysis to set an explicit operational-intensity gate for every fused tile. With 45 TOPS peak and 15 GB/s available bandwidth, the ridge point is 3000 ops/byte, so the pipeline must reuse each byte enough to exceed that threshold. Fuse adjacent convolution, activation, and upsampling stages, tile 4K frames so intermediate activations stay in SRAM, and reject schedules whose measured DRAM traffic pushes intensity below 3000 ops/byte.
  common_mistake: |
    **The Pitfall:** Assuming peak TOPS are always achievable regardless of memory design.
    **The Rationale:** Candidates design un-fused pipelines with massive intermediate activations, failing to account for the shared nature of the memory bus.
    **The Consequence:** The workload hits the memory wall, evicting activations to DRAM and permanently stalling the pipeline well below its 30 FPS target.
  napkin_math: |
    **Assumptions & Constraints:**
    - NPU peak compute: 45 TOPS.
    - Available bandwidth: ~15 GB/s (accounting for contention).
    - Compute requirement: 1 TOPS/frame at 30 FPS (30 TOPS total).

    **Calculations:**
    - Hardware Ridge Point: 45e12 Ops / 15e9 Bytes = 3000 Ops/Byte.
    - To be compute-bound at the full 45 TOPS peak, operational intensity must be greater than 3000 Ops/Byte.
    - The workload needs 30 TOPS sustained, so its average DRAM traffic must stay below 30e12 Ops/s / 3000 Ops/Byte = 10 GB/s.
    - At 30 FPS, that is at most 10 GB/s / 30 FPS = ~333 MB of DRAM traffic per frame.
    - Any unfused schedule spilling more than ~333 MB/frame falls below the required intensity and becomes bandwidth-bound under the contended 15 GB/s memory budget.

    **Conclusion & Interpretation:**
    - **Result: Compute-Bound Design Rule**. Keep measured DRAM traffic below ~333 MB/frame, or equivalently keep operational intensity above 3000 ops/byte, by using fused SRAM-resident tiles.
