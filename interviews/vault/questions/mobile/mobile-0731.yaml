title: The On-Device Training Storage Explosion
scenario: Your photo app offers personalized style transfer — users can fine-tune the base model on their
  own photos to learn their preferred aesthetic. On-device training runs on the Apple A17 Pro using Core
  ML's MLUpdateTask. After 3 months, users complain their phone storage is full. Your app is using 4.2
  GB. The base model is only 45 MB. Where did 4.2 GB come from?
details:
  realistic_solution: 'On-device training artifacts dwarf the model: (1) Optimizer state (Adam): 2x model
    = 90 MB. (2) 12 checkpoints over 3 months: 12 x 135 MB = 1.62 GB. (3) Training data cache (preprocessed
    images): 1.5 GB. (4) Model version history (old adapters): 675 MB. Total: ~3.9 GB ML storage beyond
    the app binary. Fix: use SGD (no momentum state), keep only 2 rolling checkpoints with delta compression
    (40 MB), cap training cache at 100 MB, and delete old model versions after successful validation.
    Optimized total app size: 455 MB — an 89% reduction from 4.2 GB.'
  common_mistake: '"The training data (user photos) is taking up space." The photos are already in the
    user''s photo library — your app doesn''t duplicate them. The 4.2 GB is from the training *artifacts*,
    not the data.'
  napkin_math: 'Base model: 45 MB. App binary: 270 MB. Optimizer state: 90 MB. 12 checkpoints: 1.62 GB.
    Training cache: 1.5 GB. Model versions: 675 MB. Total: 4.2 GB. After fix: artifacts drop to 140 MB.
    Total new size: 455 MB. Storage savings: ~3.7 GB (89%). iPhone base storage: 128 GB. 4.2 GB = 3.3%
    of total storage — enough to trigger "Storage Almost Full" on a phone with 10 GB free.'
