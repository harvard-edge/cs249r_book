title: The On-Device Training Storage Explosion
scenario: Your photo app offers personalized style transfer via on-device fine-tuning. After several months, users report the app consumes 4.2 GB of storage, despite the base model weighing only 45 MB.
question: Where did 4.2 GB of style-transfer storage come from when the personalized base model is only 45 MB?
details:
  realistic_solution: |
    The explosive storage bloat stems from unmanaged on-device ML training artifacts. A standard backpropagation pipeline utilizing an optimizer like Adam stores momentum and variance state tensors, consuming roughly 2x the model footprint. Compounding this, the OS often caches intermediate checkpoints, uncompressed raw training images, and historical parameter deltas. The architectural fix requires migrating to a lightweight optimizer (e.g., SGD without momentum), capping the caching of pre-processed data, utilizing delta-compression for parameter storage, and enforcing a strict garbage collection policy for stale checkpoints.
  common_mistake: |
    **The Pitfall:** Believing the user's training photos are taking up the space.
    **The Rationale:** Candidates assume the dataset is duplicated inside the app's sandbox.
    **The Consequence:** They miss that the bloated storage comes entirely from unoptimized training artifacts like optimizer states and checkpoints.
  napkin_math: |
    **Assumptions & Constraints:**
    - Base model footprint: 45 MB.
    - Observed storage footprint: 4.2 GB.

    **Calculations:**
    - Optimizer state (Adam) = ~90 MB.
    - 12 stored historical checkpoints = 12 * 135 MB = 1.62 GB.
    - Cached uncompressed training data = 1.5 GB.
    - Historical model adapters = 675 MB.
    - Total artifact bloat = 90 + 1620 + 1500 + 675 = 3885 MB (~3.9 GB).
    - Optimized storage target (SGD + GC) = ~140 MB.

    **Conclusion & Interpretation:**
    - **Result: 3.9 GB bloat (Storage Capacity-Bound)**. The model parameters are inconsequential compared to the massive footprint of optimizer states, checkpointing, and uncompressed data caching, which must be rigidly managed in edge environments.
