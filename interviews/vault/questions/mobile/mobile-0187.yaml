title: The Mobile Bottleneck
scenario: You're optimizing a computer vision model for a new mobile app running on an Apple A17 Pro.
  Profiling shows that one specific convolutional layer is a major bottleneck. This layer performs 50
  Giga-ops (INT8) and requires reading 500 MB of data (weights and activations) from the main LPDDR5 memory
  to the ANE for each inference.
details:
  realistic_solution: The layer is severely memory-bound. To determine this, we need to calculate the
    Arithmetic Intensity (AI) of the layer and compare it to the A17 Pro's hardware ridge point. The ridge
    point is the AI needed to saturate the compute units.
  common_mistake: Engineers often fixate on the advertised peak TOPS of a mobile NPU (Neural Processing
    Unit) and assume that if performance is poor, they must not be utilizing the compute units effectively.
    They forget that data has to physically move from memory to the NPU, and this memory bandwidth is
    often the true bottleneck, especially for 'thin' layers with low operational density.
  napkin_math: "1. **Calculate the layer's Arithmetic Intensity (AI):**\n   - Compute: 50 GOps (INT8)\n\
    \   - Data movement: 500 MB\n   - AI = 50 × 10⁹ Ops / 500 × 10⁶ Bytes = **100 Ops/Byte**\n\n2. **Estimate\
    \ A17 Pro hardware specs:**\n   - Apple ANE peak INT8: ~35 TOPS (estimated)\n   - LPDDR5 memory bandwidth:\
    \ ~51.2 GB/s (typical mobile)\n   - Ridge Point = 35 × 10¹² / 51.2 × 10⁹ ≈ **683 Ops/Byte**\n\n3.\
    \ **Determine the bottleneck:**\n   - Layer AI (100 Ops/Byte) < Ridge Point (683 Ops/Byte)\n   - **The\
    \ layer is memory-bound.** It cannot saturate the ANE's compute units because it spends most time\
    \ waiting for data from LPDDR5.\n\n4. **Achievable throughput:**\n   - Memory-limited: BW × AI = 51.2\
    \ GB/s × 100 Ops/B = 5.12 TOPS\n   - Utilization: 5.12 TOPS / 35 TOPS = **14.6%** of peak compute\n\
    \n5. **Inference time for this layer:**\n   - Memory-bound time: 500 MB / 51.2 GB/s = **9.8ms** (bottleneck)\n\
    \   - Compute-bound time would be: 50 GOps / 35 TOPS = 1.4ms\n   - Actual time ≈ 9.8ms (limited by\
    \ memory)\n\n6. **Optimization direction:** Reduce data movement via operator fusion, tiling to keep\
    \ data in L2 cache, or increase arithmetic intensity by combining adjacent layers."
  options:
  - Compute-bound. The ANE's 35 TOPS is the limiting factor.
  - Memory-bound. The layer's arithmetic intensity is ~100 Ops/Byte, which is significantly lower than
    the A17 Pro's ridge point of ~683 Ops/Byte.
  - Compute-bound. The layer's arithmetic intensity is ~100 Ops/Byte, which is high enough to saturate
    the processor.
  - Neither. The workload is balanced because the amount of data and compute are both large.
  correct_index: 1
