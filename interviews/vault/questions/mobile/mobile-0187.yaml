title: The Mobile Bottleneck
scenario: You're optimizing a computer vision model for a new mobile app running on an Apple A17 Pro (35 TOPS peak INT8, ~51.2 GB/s memory bandwidth). Profiling shows that one specific convolutional layer is a major bottleneck. This layer performs 50 Giga-ops (INT8) and requires reading 500 MB of data (weights and activations) from the main LPDDR5 memory to the ANE for each inference.
question: Is a layer doing 50 GOps while reading 500 MB memory-bound on an A17 Pro, and what roofline math proves it?
details:
  realistic_solution: The layer is severely memory-bound. To determine this, we need to calculate the Arithmetic Intensity (AI) of the layer and compare it to the A17 Pro's hardware ridge point. The ridge point is the AI needed to saturate the compute units.
  common_mistake: |
    **The Pitfall:** Fixating on the advertised peak TOPS of a mobile NPU and assuming poor performance means compute underutilization.
    **The Rationale:** Engineers forget that data must physically move from memory to the NPU, and bandwidth is often the true bottleneck for "thin" layers.
    **The Consequence:** Time is wasted optimizing compute instead of reducing data movement via fusion or quantization.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Compute requirement: 50 GOps (INT8).
       - Data movement: 500 MB.
       - A17 Pro Peak Compute: 35 TOPS. Bandwidth: 51.2 GB/s.
    2. **Calculations:**
       - Arithmetic Intensity (AI): 50e9 Ops / 500e6 Bytes = 100 Ops/Byte.
       - Hardware Ridge Point: 35e12 Ops / 51.2e9 Bytes = ~683 Ops/Byte.
       - Achievable Throughput: 51.2 GB/s * 100 Ops/Byte = 5.12 TOPS (14.6% utilization).
       - Inference Time: 500 MB / 51.2 GB/s = 9.8 ms.
    3. **Conclusion & Interpretation:** AI (100) < Ridge (683), meaning the layer is severely **Memory-Bound** at 9.8 ms.
  options:
  - Compute-bound. The ANE's 35 TOPS is the limiting factor.
  - Memory-bound. The layer's arithmetic intensity is ~100 Ops/Byte, which is significantly lower than the A17 Pro's ridge point of ~683 Ops/Byte.
  - Compute-bound. The layer's arithmetic intensity is ~100 Ops/Byte, which is high enough to saturate the processor.
  - Neither. The workload is balanced because the amount of data and compute are both large.
  correct_index: 1
