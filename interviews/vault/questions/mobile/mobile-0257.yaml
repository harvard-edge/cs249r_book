title: The Mobile NPU Roofline
scenario: You are tasked with optimizing an object detection model for the Apple A17 Pro SoC. Your model requires 2 Billion INT8 operations (2 GOps) to process a single frame. Profiling shows that this inference requires reading and writing a total of 10 MB of data.
question: Is a 2 GOps, 10 MB object detection inference memory-bound on an A17 Pro, and what throughput does that imply?
details:
  realistic_solution: The workload is **memory-bound**. To determine this, we must calculate the model's Arithmetic Intensity (AI) and compare it to the hardware's 'ridge point'—the operational intensity required to achieve peak performance. If the model's AI is lower than the ridge point, it means the memory system cannot supply data fast enough to keep the compute units busy.
  common_mistake: |
    **The Pitfall:** Focusing solely on the processor's peak TOPS to determine latency.
    **The Rationale:** Engineers mistakenly assume that high TOPS guarantees a compute-bound workload, neglecting to calculate operational intensity relative to memory bandwidth.
    **The Consequence:** Misdiagnosing performance bottlenecks and wasting time optimizing ALU instructions instead of compressing data movement.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Compute requirement: 2 GOps.
       - Data movement: 10 MB.
       - A17 Pro Peak Compute: 35 TOPS. Bandwidth: 51.2 GB/s.
    2. **Calculations:**
       - Arithmetic Intensity (AI): 2 GOps / 10 MB = 200 Ops/Byte.
       - Hardware Ridge Point: 35 TOPS / 51.2 GB/s = 683 Ops/Byte.
       - Effective Throughput: 51.2 GB/s * 200 Ops/Byte = 10.24 TOPS.
    3. **Conclusion & Interpretation:** AI (200) < Ridge (683) means the model is **Memory-Bound**, capped at **10.24 TOPS** (29% of peak).
  options:
  - Compute-bound, because its Arithmetic Intensity is over 200,000,000 Ops/Byte, which easily saturates the ANE.
  - Memory-bound, because its Arithmetic Intensity of 200 Ops/Byte is less than the A17's ridge point of ~683 Ops/Byte.
  - Compute-bound, because 35 TOPS is a massive amount of performance, and the model is relatively small.
  - It's impossible to tell without knowing the power efficiency in TOPS/W for this specific model.
  correct_index: 1
