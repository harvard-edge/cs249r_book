title: Profiling Latency in a Mobile NPU Application
scenario: You are tasked with optimizing a real-time object detection model deployed on a mobile application. Users are reporting occasional but significant latency spikes, causing a poor user experience.
question: What specific metrics would you monitor and how would you interpret the data to distinguish between compute, memory, and I/O bound issues on an NPU?
details:
  realistic_solution: Utilize platform-specific tools like `nsys profiling` or Android's Perfetto/systrace. Establish a baseline, then analyze flame graphs for CPU/NPU call stacks and visualize execution timelines. High NPU utilization with low memory access points to a compute bottleneck. Low NPU utilization coupled with high memory bandwidth usage indicates a memory bottleneck. Large idle gaps between NPU kernel executions indicate an I/O or CPU dispatch overhead bottleneck.
  common_mistake: |
    **The Pitfall:** Immediately jumping to optimize model architecture or code without first thoroughly profiling the system.
    **The Rationale:** Engineers rely on high-level metrics without drilling down into granular NPU core utilization, memory transfers, or dispatch overhead.
    **The Consequence:** This leads to optimizing non-bottlenecked sections, wasting time, and introducing new performance regressions.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - NPU compute: 34.7 TOPS.
       - Model compute: 10 GOps.
       - Model size: 100 MB.
       - Memory bandwidth: ~68 GB/s.
    2. **Calculations:**
       - Theoretical minimum compute time = (10 * 10^9) / (34.7 * 10^12) ≈ 0.29 ms.
       - Theoretical minimum memory transfer time = 100 MB / 68 GB/s ≈ 1.47 ms.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound (Bandwidth).** Comparing these theoretical minimums against actual trace timings quickly isolates the true architectural bottleneck.
