title: Profiling Latency in a Mobile NPU Application
scenario: You're tasked with optimizing a real-time object detection model deployed on a Samsung Exynos 2400 NPU (34.7 TOPS, 12 GB LPDDR5X) within a mobile application. Users are reporting occasional but significant latency spikes, causing a poor user experience.
question: What specific metrics would you monitor and how would you interpret the data to distinguish between compute, memory, and I/O bound issues on an Exynos 2400 NPU?
details:
  realistic_solution: 'The candidate should outline a methodical approach: 1. **Tooling Selection:** Mention using platform-specific tools like Samsung''s Trace Analyzer or Android''s Perfetto/systrace, coupled with NPU vendor SDK profiling tools. 2. **Baseline Measurement:** Establish a clear performance baseline under controlled conditions. 3. **High-Level Profiling:** Start with overall system profiling to identify major latency contributors (e.g., model inference, pre-processing, post-processing, I/O). 4. **Deep Dive (Flame Graphs/Trace):** Use flame graphs for CPU/NPU call stacks and trace tools to visualize execution timelines, kernel overlaps, memory transfers, and I/O operations. Look for long-running kernels, excessive memory copies to/from NPU, synchronization waits, or I/O stalls. 5. **Metric Interpretation:** Explain how to analyze NPU utilization, memory bandwidth usage, cache hit/miss rates, and frame completion times. Identify if the NPU is saturated (compute-bound), waiting on data (memory-bound), or blocked by external resources (I/O-bound). For instance, high NPU utilization with low memory access might point to a compute bottleneck, whereas low NPU utilization coupled with high memory bandwidth usage and many memory transfer events could indicate a memory bottleneck.'
  common_mistake: |
    **The Pitfall:** Immediately jumping to optimize model architecture or code without first thoroughly profiling the system.
    **The Rationale:** Engineers rely on high-level metrics without drilling down into granular NPU core utilization or specific kernel execution times.
    **The Consequence:** This leads to optimizing non-bottlenecked sections, wasting time, or even introducing new performance issues.
  napkin_math: |
    - NPU compute: 34.7 TOPS.
    - Theoretical minimum compute time for a 10 GOps model = (10 * 10^9) / (34.7 * 10^12) ≈ 0.29 ms.
    - Model size: 100MB. LPDDR5X peak bandwidth: ~68 GB/s.
    - Theoretical memory transfer time = 100MB / 68GB/s ≈ 1.47ms.
    - **Comparing these theoretical minimums (0.29ms compute vs 1.47ms memory) to actual trace timings identifies the true bottleneck.**
