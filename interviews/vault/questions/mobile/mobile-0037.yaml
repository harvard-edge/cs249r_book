title: The Production Mobile ML Observability Stack
scenario: 'You''re the ML platform lead for a ride-sharing app with 10M DAU. On-device ML powers: ETA
  prediction, route optimization, driver face verification, and fraud detection. Each model runs on wildly
  different hardware — from iPhone 15 Pro (ANE, 8 GB RAM) to Samsung Galaxy A14 (Mali GPU, 4 GB RAM) to
  Xiaomi Redmi Note 12 (Adreno 610, 4 GB RAM). Design the observability system that tells you, within
  5 minutes, if any model is degrading on any device segment.'
details:
  realistic_solution: 'Hierarchical observability with on-device intelligence. Three tiers: (1) All 10M
    devices send daily summary (200 bytes) = 1.9 GB/day. (2) 4% send hourly stats (500 bytes) = 4.8 GB/day.
    (3) 1% send critical details (5 KB) = 500 MB/day. Total: 7.2 GB/day at $22/month vs naive 200 GB/day
    at $600/month. Segment into ~750 device cohorts (~13.3K devices each) for statistical significance
    in minutes. On-device anomaly detection triggers escalation, enabling 5-minute detection SLA.'
  common_mistake: '"Collect latency and accuracy metrics from all devices and build a dashboard." At 10M
    DAU × 4 models × ~50 inferences/day = 2B inference events/day. Even at 100 bytes per event, that''s
    200 GB/day of telemetry. Your data pipeline will collapse and your bill will be astronomical.'
  napkin_math: 'Telemetry volume: 9.5M × 200 bytes/day = 1.9 GB/day (daily summaries). 400K × 500 bytes
    × 24/day = 4.8 GB/day (hourly). 100K × 5 KB = 500 MB/day (critical). Total: ~7.2 GB/day. At $0.10/GB
    ingestion (Datadog): $0.72/day = $22/month. vs naive approach: 200 GB/day = $600/month. Cost reduction:
    28×. Device segments: ~50 SoC families × 3 RAM tiers × 5 OS versions = 750 segments. At 10M DAU: ~13,300
    devices per segment — sufficient for statistical significance within minutes.'
