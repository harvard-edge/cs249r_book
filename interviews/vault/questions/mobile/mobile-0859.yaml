title: 'Mastery: explain compound scaling failure modes for mobile deployment'
scenario: Your team successfully deploys EfficientNet-B0 on Snapdragon 8 Gen 3 (B0: 224×224, 0.39 GFLOPs). A PM requests scaling to B3 (300×300, 1.8 GFLOPs) for better accuracy without changing the SLA of <5ms.
question: Does EfficientNet-B3 fit the unchanged 5ms mobile NPU SLA, and where does compound scaling break down?
details:
  realistic_solution: |
    B3 feature maps: stage 1 at 150×150 (vs B0 112×112), intermediate maps proportionally larger. Hexagon HTP SRAM ~8MB. B3 peak activation: ~96×19×19 (stage 6) = 34.6KB × 1B → still fits. Resolution increase: HTP spatial tiling becomes less efficient at 300×300 vs 224×224 — tile count scales as (300/224)² = 1.79×. Latency scaling: 1.5ms × 4.6× FLOPs × 1.2× (tiling overhead) = 8.3ms → exceeds 5ms SLA. Break point: B2 (260×260, 1.0 GFLOPs). B2: 1.5 × (1.0/0.39) × 1.1 = 4.2ms — just under 5ms. B3 fails the SLA.
  common_mistake: |
    **The Pitfall:** Projecting B3 latency purely by multiplying by the FLOP ratio.
    **The Rationale:** Candidates assume NPU latency scales linearly with theoretical FLOPs.
    **The Consequence:** They ignore that resolution scaling changes the NPU tiling strategy and that larger intermediate feature maps may exceed on-chip SRAM.
  napkin_math: |
    - B0 -> B3 scaling factors: depth 1.73x, width 1.33x, resolution 1.52x.
    - FLOPs: 0.39 * 2^3 = 3.1x -> 1.2 GFLOPs (actual B3: 1.8 GFLOPs).
    - Resolution 300 vs 224: (300/224)^2 = 1.79x spatial overhead.
    - Hexagon at B3: 1.5ms * (1.8G/0.39G) FLOPs ratio * 1.15 tiling factor = **8.8ms** (exceeds 5ms SLA).
    - Memory: B3 max activation 38x38x192 = 277KB (fits HTP SRAM 8MB).
    - Bottleneck is compute + tiling, not memory.
