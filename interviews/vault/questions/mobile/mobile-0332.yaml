title: The UI Jank Budget
scenario: Your team is building a new on-device generative AI feature for a smartphone app.
question: To ensure a smooth, 'jank-free' user experience, what is the maximum latency budget you can typically allow for an inference call that blocks a UI frame from rendering?
details:
  realistic_solution: The maximum latency budget is approximately 16 milliseconds. Most mobile device displays refresh at 60Hz, meaning a new frame must be drawn every 16.7ms (1000ms / 60Hz). To avoid user-perceptible stutter or 'jank', any work that blocks the main UI thread—including model inference—must complete well within this strict window. This is a fundamental constraint in mobile application performance.
  common_mistake: |
    **The Pitfall:** Recalling the 100ms P99 latency for cloud services.
    **The Rationale:** Engineers confuse the strict mobile UI rendering deadline with more relaxed backend latency targets.
    **The Consequence:** The mobile UI suffers from perceptible stutter and freezes.
  napkin_math: |
    - Mobile display refresh rate = 60Hz.
    - Maximum time per frame = 1000ms / 60.
    - **1000ms / 60Hz ≈ 16.67ms latency budget.**
  options:
  - ~100 ms
  - ~33 ms
  - ~16 ms
  - ~1 ms
  correct_index: 2
