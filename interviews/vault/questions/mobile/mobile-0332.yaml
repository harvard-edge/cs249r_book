title: The UI Jank Budget
scenario: Your team is building a new on-device generative AI feature for a smartphone app. To ensure
  a smooth, 'jank-free' user experience, what is the maximum latency budget you can typically allow for
  an inference call that blocks a UI frame from rendering?
details:
  realistic_solution: The maximum latency budget is approximately 16 milliseconds. Most mobile device
    displays refresh at 60Hz, meaning a new frame must be drawn every 16.7ms (1000ms / 60Hz). To avoid
    user-perceptible stutter or 'jank', any work that blocks the main UI thread—including model inference—must
    complete well within this strict window. This is a fundamental constraint in mobile application performance.
  common_mistake: Engineers often misremember the specific deadline for mobile UI, confusing it with other
    system budgets. A common error is to recall the 100ms P99 latency for cloud services, which is far
    too slow for a responsive UI. Another mistake is to use the 33ms budget from 30 FPS video processing,
    which would still feel stuttery compared to a fluid 60 FPS interface.
  napkin_math: 'The calculation is derived directly from the standard screen refresh rate of mobile devices:'
  options:
  - ~100 ms
  - ~33 ms
  - ~16 ms
  - ~1 ms
  correct_index: 2
