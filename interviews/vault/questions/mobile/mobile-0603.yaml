title: The Mobile-to-Cloud Latency Choke
scenario: You are a senior ML engineer on a mobile team launching a new generative AI feature. The feature sends a request to a cloud-hosted model and streams the response back. During testing, you observe that while P50 latency is acceptable, P99 latency is terrible.
question: Why does the scale-up backend architecture create worse P99 latency for independent mobile inference requests?
details:
  realistic_solution: 'The correct analysis is that Architecture A, the scale-up design, is the likely cause of P99 latency spikes and is the wrong choice for this workload.'
  common_mistake: |
    **The Pitfall:** Fixating on raw bandwidth numbers without understanding system topology.
    **The Rationale:** Engineers assume NVLink is always better because it's faster, ignoring that it's designed for intra-node model parallelism, which is irrelevant for independent mobile requests.
    **The Consequence:** Designing a scale-up architecture that suffers from head-of-line blocking and catastrophic P99 tail latency.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Arch A (Scale-Up): 4 nodes, 8 GPUs per node. Effective parallel slots = 4.
       - Arch B (Scale-Out): 32 nodes, 1 GPU each. Effective parallel slots = 32.
    2. **Calculations:**
       - Burst load hits 4 slots: Queuing delay skyrockets (P99 ~ 250ms).
       - Burst load hits 32 slots: Graceful absorption (P99 < 1ms).
    3. **Conclusion & Interpretation:**
       - **Result: Concurrency-Bound.** Scale-out offers 8x more isolated slots, totally mitigating queue-based P99 spikes for disjoint requests.
