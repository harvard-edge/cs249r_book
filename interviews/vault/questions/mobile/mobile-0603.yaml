title: The Mobile-to-Cloud Latency Choke
scenario: You are a senior ML engineer on a mobile team launching a new generative AI feature. The feature sends a request to a cloud-hosted model and streams the response back. During testing, you observe that while P50 latency is acceptable, P99 latency is terrible, leading to a choppy user experience. Your mobile-side profiling with Perfetto is clean; the device is sending requests promptly.
question: "Why does the scale-up backend architecture create worse P99 latency for independent mobile inference requests?"
details:
  realistic_solution: The correct analysis is that Architecture A, the scale-up design, is the likely
    cause of P99 latency spikes and is the wrong choice for this workload.
  common_mistake: |
    **The Pitfall:** Fixating on raw bandwidth numbers without understanding system topology.
    **The Rationale:** Engineers assume NVLink is always better because it's faster, ignoring that it's designed for intra-node model parallelism, which is irrelevant for independent mobile requests.
    **The Consequence:** Designing a scale-up architecture that suffers from head-of-line blocking and catastrophic P99 tail latency.
  napkin_math: |
    - **Architecture A (Scale-Up):** 4 nodes × 8 GPUs. Each request uses 8 GPUs. Effective parallelism = 4 independent slots.
    - **Architecture B (Scale-Out):** 32 single-GPU nodes. Each request uses 1 GPU. Effective parallelism = 32 independent slots.
    - Burst absorption: 4 slots easily saturate, causing queueing delays (e.g., P99 ≈ 250ms). 32 slots absorb bursts gracefully (P99 < 1ms).
    - **Conclusion:** Scale-out provides 8× more independent slots, resolving P99 queueing latency for independent inference requests.
