title: 'The Mobile Roofline Dilemma: Roofline Analysis'
scenario: You're optimizing a new real-time camera filter on an Apple A17 Pro. The core ML model performs
  7 billion INT8 operations (7 GOPS) per frame and requires reading 50 MB of weight and activation data
  from main memory. The A17's ANE has a peak performance of 35 TOPS (INT8) and its LPDDR5 memory system
  provides 51.2 GB/s of bandwidth. Calculate the model's Arithmetic Intensity and determine if the workload
  is compute-bound or memory-bound.
question: "How would you calculate the model's Arithmetic Intensity and determine if the workload is compute-bound or memory-bound?"
details:
  realistic_solution: The workload is **memory-bound**. To determine this, we first calculate the model's
    Arithmetic Intensity (AI), which is the ratio of its compute operations to its memory operations.
    Then, we compare this AI to the hardware's 'ridge point'—the AI value at which the system transitions
    from being memory-bound to compute-bound.
  common_mistake: Engineers often calculate the Arithmetic Intensity correctly but then misinterpret the
    result. They incorrectly assume that a *low* AI means the model is compute-heavy, when it actually
    means the model performs few operations for every byte it fetches, making it 'starved for data' and
    thus memory-bound. Another common mistake is confusing the model's AI with the hardware's ridge point.
  napkin_math: '1. **Calculate Arithmetic Intensity (AI):** AI = Total Ops / Total Bytes = 7 * 10^9 Ops
    / (50 * 10^6 Bytes) = 140 Ops/Byte.

    2. **Calculate Hardware Ridge Point:** Ridge Point = Peak Compute / Memory BW = (35 * 10^12 Ops/s)
    / (51.2 * 10^9 B/s) ≈ 683 Ops/Byte.

    3. **Compare:** AI (140) << Ridge Point (683) -> the workload is **memory-bound**.

    4. **Effective throughput:** Memory-limited time = 50 MB / 51.2 GB/s ≈ 0.98 ms per frame. Compute
    time = 7 GOPS / 35 TOPS ≈ 0.2 ms. Memory is the bottleneck.'
  options:
  - 140 Ops/Byte; Compute-bound
  - 683 Ops/Byte; Compute-bound
  - 140 Ops/Byte; Memory-bound
  - 683 Ops/Byte; Memory-bound
  correct_index: 2
