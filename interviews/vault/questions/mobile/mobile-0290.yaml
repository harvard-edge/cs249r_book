title: 'The Mobile Roofline Dilemma: Roofline Analysis'
scenario: You're optimizing a real-time camera filter. The ML model performs 7 billion INT8 operations per frame and requires reading 50 MB of data. The NPU has a peak performance of 35 TOPS and bandwidth of 51.2 GB/s.
question: How would you calculate the model's Arithmetic Intensity and determine if the workload is compute-bound or memory-bound?
details:
  realistic_solution: |
    Calculate Arithmetic Intensity (AI) and compare it to the hardware ridge point.
  common_mistake: |
    **The Pitfall:** Misinterpreting a low Arithmetic Intensity value.
    **The Rationale:** Engineers often calculate the AI correctly but incorrectly assume a "low" AI means the model is computationally light and therefore compute-bound.
    **The Consequence:** Engineers will attempt to optimize the NPU kernels when the model is actually starved for data, wasting time optimizing the wrong bottleneck.
  napkin_math: |
    **Assumptions & Constraints:**
    - Math: 7 GOPS.
    - Memory: 50 MB.
    - Hardware: 35 TOPS, 51.2 GB/s.

    **Calculations:**
    - Workload AI: 7,000,000,000 Ops / 50,000,000 Bytes = 140 OPS/Byte.
    - Hardware Ridge Point: 35 TOPS / 51.2 GB/s = ~683 OPS/Byte.

    **Conclusion & Interpretation:**
    - **Result: Memory-Bound.** The workload AI (140) is far below the hardware ridge point (683), meaning the NPU will stall waiting for memory.
  options:
    - '140 OPS/Byte; Compute-bound'
    - '683 OPS/Byte; Compute-bound'
    - '140 OPS/Byte; Memory-bound'
    - '683 OPS/Byte; Memory-bound'
  correct_index: 2
