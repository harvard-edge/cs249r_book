title: 'The Mobile Roofline Dilemma: Roofline Analysis'
scenario: You're optimizing a new real-time camera filter. The ML model performs 7 billion INT8 operations (7 GOPS) per frame and requires reading 50 MB of data. The NPU has a peak performance of 35 TOPS and memory bandwidth of 51.2 GB/s.
question: How would you calculate the model's Arithmetic Intensity and determine if the workload is compute-bound or memory-bound?
details:
  realistic_solution: Calculate Arithmetic Intensity (AI) and compare it to the hardware ridge point.
  common_mistake: |
    **The Pitfall:** Misinterpreting a low Arithmetic Intensity value.
    **The Rationale:** Engineers often calculate the AI correctly but incorrectly assume a "low" AI means the model is computationally light and therefore compute-bound.
    **The Consequence:** Engineers will attempt to optimize the NPU kernels when the model is actually starved for data, wasting time optimizing the wrong bottleneck.
  napkin_math: |
    1. Calculate Arithmetic Intensity (AI): 7 * 10^9 Ops / (50 * 10^6 Bytes) = **140 Ops/Byte**.
    2. Calculate Hardware Ridge Point: (35 * 10^12 Ops/s) / (51.2 * 10^9 B/s) = **~683 Ops/Byte**.
    3. Compare AI to Ridge Point: Since AI (140) << Ridge Point (683), the workload is **memory-bound**.
    4. Verify Effective Throughput: Memory time = 50 MB / 51.2 GB/s = **~0.98 ms/frame**. Compute time = 7 GOPS / 35 TOPS = **~0.2 ms/frame**. Memory dominates.
  options:
  - 140 Ops/Byte; Compute-bound
  - 683 Ops/Byte; Compute-bound
  - 140 Ops/Byte; Memory-bound
  - 683 Ops/Byte; Memory-bound
  correct_index: 2
