title: Snapdragon Hexagon NPU Mixed-Precision LLM Deployment
scenario: You are tasked with deploying a large language model on the Snapdragon 8 Gen 3 Hexagon NPU,
  which offers 45 TOPS for INT8 operations and has 12 GB of LPDDR5X memory. The model was initially trained
  in FP16 and has 10 billion parameters. Each parameter requires 2 bytes in FP16. You are considering
  converting the model to FP8 for inference to maximize throughput and minimize memory footprint. Assuming
  a simple conversion where each FP16 parameter becomes an FP8 parameter (1 byte), and ignoring activation
  memory for simplicity, calculate the percentage reduction in model memory footprint and the theoretical
  increase in the number of parameters that could be stored given the 12 GB memory limit, purely based
  on precision change. Discuss the trade-offs regarding inference speed and accuracy for this specific
  NPU.
details:
  realistic_solution: Implement a robust FP8 quantization and calibration pipeline, potentially utilizing
    quantization-aware training (QAT) or post-training quantization (PTQ) with techniques like AWQ or
    GPTQ to mitigate accuracy loss. Profile the model on the Snapdragon NPU for FP16, INT8, and FP8 (if
    supported natively/efficiently) to understand actual performance, power consumption, and latency.
    Prioritize using INT8 if the NPU is primarily optimized for it (45 TOPS INT8) and only opt for FP8
    if the accuracy-performance trade-off is acceptable and the hardware adequately supports the chosen
    FP8 format. Leverage Qualcomm's AI Engine Direct SDK for optimized deployment and NPU-specific optimizations.
  common_mistake: Assuming FP8 conversion is always lossless or neglecting the complexity of proper FP8
    quantization schemes and calibration, leading to significant accuracy degradation. Another common
    mistake is not considering the NPU's actual support for various FP8 formats (e.g., E5M2 vs E4M3) or
    its efficiency for FP8 operations compared to INT8/FP16, which might not yield the expected performance
    benefits.
  napkin_math: '1. **FP16 Model Memory Footprint:** 10 billion parameters * 2 bytes/parameter = 20 GB.

    2. **FP8 Model Memory Footprint:** 10 billion parameters * 1 byte/parameter = 10 GB.

    3. **Percentage Reduction in Memory Footprint:** ((20 GB - 10 GB) / 20 GB) * 100% = 50%.

    4. **Maximum FP8 Parameters in 12 GB Memory:** 12 GB / 1 byte/parameter = 12 billion parameters.

    5. **Theoretical Increase in Storable Parameters (FP8):** The original model in FP16 (20 GB) would
    not fit in the 12 GB LPDDR5X memory. By converting to FP8, the model becomes 10 GB, which fits. Given
    the 12 GB memory limit, up to 12 billion FP8 parameters can be stored. This means that if the LLM
    were larger, up to 12 billion parameters (in FP8) could be accommodated, allowing for an additional
    2 billion parameters beyond the current 10 billion FP8 parameters, if the model size were to increase.'
