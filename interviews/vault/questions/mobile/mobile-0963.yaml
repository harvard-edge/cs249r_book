title: 'Latency Decomposition: Compare On-Device vs. Cloud LLM Latency on A17 Pro'
scenario: An iOS app team debates between on-device inference (A17 Pro, 35 TOPS Neural Engine, 8GB memory) vs. cloud API (H100-backed, 100ms network RTT) for a 1B-parameter language model generating 50 tokens.
question: For a 1B language model, which deployment approach wins TTFT and TPOT for 50 tokens?
details:
  realistic_solution: 'On-device A17 Pro: 1B INT8 model = 1GB, fits in 8GB. Neural Engine bandwidth ~68 GB/s effective. Decode: 1GB/68GB/s \u2248 14.7ms/token * 50 = 735ms. TTFT (64-token prefill): memory-bound at 14.7ms (compute takes only 3.7ms: 2*64*1B/35T). Cloud: TTFT = 100ms RTT + 27ms prefill = 127ms. TPOT = 0.6ms/token (H100). Cloud wins TPOT (0.6 vs 14.7ms) but on-device wins TTFT (14.7ms vs 127ms) and works offline.'
  common_mistake: |
    **The Pitfall:** Assuming cloud always wins on raw compute without accounting for network latency.
    **The Rationale:** Candidates often ignore that network RTT dominates Time-To-First-Token (TTFT), especially on mobile networks.
    **The Consequence:** Deploying cloud solutions that feel sluggish to the user compared to instant on-device responses.
  napkin_math: |
    1. **On-Device Decode (TPOT):** 1B INT8 model = 1 GB. Neural Engine effective bandwidth ~68 GB/s. Decode = 1 GB / 68 GB/s = 14.7 ms/token.
    2. **On-Device Prefill (TTFT):** Compute for 64 tokens = 2 * 64 * 1B / 35 TOPS = 3.7 ms. However, memory load takes 14.7 ms, making TTFT 14.7 ms.
    3. **Cloud Decode (TPOT):** 2 GB / 3.35 TB/s = 0.6 ms/token.
    4. **Cloud Prefill (TTFT):** 100 ms RTT + 27 ms = 127 ms.
    5. **Conclusion:** **Cloud wins TPOT (0.6 ms vs 14.7 ms) but on-device wins TTFT (14.7 ms vs 127 ms).**
