title: 'Latency Decomposition: Compare On-Device vs. Cloud LLM Latency on A17 Pro'
scenario: An iOS app team debates between on-device inference (A17 Pro, 35 TOPS Neural
  Engine, 8GB memory) vs. cloud API (H100-backed, 100ms network RTT) for a 1B-parameter
  language model generating 50 tokens. Evaluate TTFT and TPOT for both approaches.
question: For a 1B language model on A17 Pro vs an H100 cloud API with 100 ms RTT,
  which wins TTFT and TPOT for 50 tokens?
details:
  realistic_solution: 'On-device A17 Pro: 1B INT8 model = 1GB, fits in 8GB. Neural
    Engine bandwidth ~68 GB/s effective. Decode: 1GB/68GB/s \u2248 14.7ms/token * 50 =
    735ms. TTFT (64-token prefill): memory-bound at 14.7ms (compute takes only 3.7ms: 2*64*1B/35T).
    Cloud: TTFT = 100ms RTT + 27ms prefill = 127ms. TPOT = 0.6ms/token (H100). Cloud
    wins TPOT (0.6 vs 14.7ms) but on-device wins TTFT (14.7ms vs 127ms) and works offline.'
  common_mistake: Assuming cloud always wins on raw compute without accounting for
    network latency dominating TTFT, especially on mobile networks (50-200ms RTT).
  napkin_math: 'On-device decode: 1B * 1 byte = 1GB. Neural Engine eff. BW ~68 GB/s:
    1/68 = 14.7ms/token. Cloud decode: 2GB/3.35TB/s = 0.6ms/token. TTFT on-device compute:
    2*64*1B/(35*10^12) = 128G/35T = 3.7ms. However, memory load takes 14.7ms, so TTFT is 14.7ms.
    TTFT cloud: 100ms RTT + 27ms = 127ms. Winner depends on use case: interactive typing -> on-device; long completions ->
    cloud.'
