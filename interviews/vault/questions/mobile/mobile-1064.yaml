title: Design On-Device LLM Architecture for Tensor G3 Within Thermal Budget
scenario: Google's Tensor G3 must run a conversational LLM within a 3W continuous power budget (thermal limit to prevent throttling). The TPU draws 2W during inference. Design a model architecture (parameters, layers, quantization) that achieves >80% accuracy on MMLU-Mini.
question: What LLM architecture fits under the 3W power, 500ms TTFT, and 50ms/token decode constraints on the Tensor G3?
details:
  realistic_solution: 'Power constraint: 2W TPU → 1W remaining for CPU/memory. Memory bandwidth power: 51.2 GB/s × (1V × 0.8A/efficiency) ≈ LPDDR5 consumes ~0.5W at 50% utilization. Total ≈ 2.5W < 3W. TTFT < 500ms for 512 tokens at 15 TOPS: prefill FLOPs budget = 15T × 0.5s = 7.5T. FLOPs for 512 tokens: 2N × 512 = 7.5T → N_max = 7.5T/1024 = 7.3B parameters. Decode < 50ms/token: BW-limited = model_bytes / 51.2 GB/s. At 50ms: model = 51.2 × 0.05 = 2.56GB → max params at INT4: 2.56GB / 0.5B/param = 5.12B params. Constrained by decode: N=5B, INT4, 32 layers, 8 GQA heads. MMLU-Mini accuracy: 5B well-tuned ≈ 72-78%. May need INT8 KV + speculative decode to hit 80% target.'
  common_mistake: |
    **The Pitfall:** Maximizing model size for accuracy without verifying TTFT and decode speed limits.
    **The Rationale:** Designers optimize for the compute capacity but ignore that at high memory bandwidths, large models hit memory-bandwidth walls.
    **The Consequence:** The resulting model violates strict latency constraints because memory transfers stall the TPU.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Hardware: 15 TOPS TPU, 51.2 GB/s LPDDR5.
       - Targets: <500ms TTFT (512 tokens), <50ms/token decode, <3W power.
       - Precision: INT4 (0.5 bytes/param).
    2. **Calculations:**
       - TTFT limit: 15 TOPS * 0.5s = 7.5T FLOPs. For 512 tokens ($2 \times N \times 512 \le 7.5T$), $N \le 7.3B$ params.
       - Decode limit (Memory-bound): 51.2 GB/s * 0.05s = 2.56 GB payload.
       - Model size limit: 2.56 GB / 0.5 bytes/param = 5.12B parameters.
       - Power check: 2W TPU + ~0.5W LPDDR5 = 2.5W (<3W limit).
    3. **Conclusion & Interpretation:**
       - **Result: 5B INT4 Model**. The 50ms decode requirement is the binding constraint, dictating a maximum of 5B parameters to prevent memory-bandwidth starvation.
