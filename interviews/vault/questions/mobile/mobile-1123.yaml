title: Architecting On-Device LLM Workloads for Tensor G3
scenario: Architect an on-device intelligence pipeline for a messaging app running exclusively on the Google Tensor G3. The application must provide real-time smart replies (foreground) and categorize thousands of archived messages (background) using an optimized on-device LLM like Gemini Nano. Given the Tensor G3's on-device TPU capable of 7.5 TOPS and a system-wide 12 GB LPDDR5X shared memory pool.
question: How would you architect an on-device intelligence pipeline for a messaging app running exclusively on the Google Tensor G3?
details:
  realistic_solution: A robust architecture multiplexes the TPU resources by strictly prioritizing foreground smart replies while batching background categorization. The design should utilize OS-level scheduling (like Android's WorkManager) to defer the heavy categorization workload to states when the device is idle, charging, and thermally stable. To manage the 12 GB shared memory, the system should dynamically load the quantized Gemini Nano model into RAM only during active messaging sessions or scheduled background windows, explicitly monitoring the OS memory pressure and thermal APIs to gracefully degrade or pause background processing.
  common_mistake: |
    **The Pitfall:** Pinning background models in memory and running them continuously.
    **The Rationale:** Candidates fail to decouple foreground latency requirements from background batch processing workloads.
    **The Consequence:** Pinning 1.4 GB in RAM and running 7 hours of continuous TPU inference causes severe battery drain, thermal throttling, and OS-level memory evictions of other apps.
  napkin_math: |
    - 4-bit 1.8B Model + KV Cache: ~1.4 GB (12% of system RAM).
    - TPU Decode Throughput: ~20 tokens/sec.
    - Background workload: 10,000 messages * 50 tokens = 500,000 tokens.
    - Time required: 500,000 tokens / 20 tokens/sec = 25,000 seconds (**~7 hours**).
    - **Conclusion:** 7 hours of continuous 7.5 TOPS execution will severely throttle the device and drain the battery; background batching must be deferred to charging/idle windows.
