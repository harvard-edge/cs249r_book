title: Mobile Validation Energy Budget
scenario: A mobile app validates local training examples before upload. Validation takes 0.5 ms CPU per example. A user generates 2,000 candidate examples/day.
question: How much CPU time does mobile validation use for 2,000 examples/day at 0.5 ms each?
details:
  realistic_solution: |
    CPU time is 2,000 x 0.5 ms = 1,000 ms, or 1 second per day. That is unlikely to be user-visible if batched in the background or while charging, but thermal and privacy constraints still matter.
  common_mistake: |
    **The Pitfall:** Rejecting validation as too computationally expensive.
    **The Rationale:** Assuming 2,000 examples is a massive data volume without calculating the actual time.
    **The Consequence:** Discarding a valuable data quality step that costs only 1 second of CPU time per day.
  napkin_math: |
    - **Validation Cost:** 0.5 ms per example.
    - **Volume:** 2,000 candidate examples/day.
    - **Total CPU Time:** 2,000 * 0.5 ms = 1,000 ms = **1 second per day**.
