title: The ML Error That Looks Like a Feature
scenario: Your camera app uses an on-device portrait mode model. After a routine iOS update, users start
  posting on social media that your app's portrait mode 'looks different — more dreamy.' Engagement actually
  increases 5%. Your QA team didn't catch any issue. But your ML engineer says the model is producing
  wrong results. What happened, and do you fix it or ship it?
question: "Why does an iOS update make portrait mode look more dreamy, and should the camera app ship or fix the change?"
details:
  realistic_solution: 'Diagnose first, then decide: Color space difference: sRGB gamut covers 35% of CIE
    1931. Display P3 covers 45%. Pixel values in P3 are ~15% lower for the same perceived color (wider
    range, same 8-bit encoding). Depth estimation er'
  common_mistake: '"If engagement is up, the model is working better — don''t touch it." This is dangerous.
    An uncontrolled change to model behavior means you don''t understand your system.'
  napkin_math: 'Color space difference: sRGB gamut covers 35% of CIE 1931. Display P3 covers 45%. Pixel
    values in P3 are ~15% lower for the same perceived color (wider range, same 8-bit encoding). Depth
    estimation error: ~8% systematic bias toward "farther" (lower values interpreted as less saturated
    = less foreground). Bokeh radius increase: 8% wider blur kernel. Visually: subtle but measurable.
    Edge artifact rate: ~3% of photos have visible subject-background bleed.'
  options:
  - Rollback capability is unnecessary if the model was validated in the cloud, since cloud accuracy guarantees
    transfer to edge devices.
  - If engagement is up, the model is working better — don't touch it.. This is dangerous.
  - The safest strategy is to update firmware and model in a single atomic package to avoid version skew
    between them.
