title: TPU Graph Operator Fusion Performance Anomaly
scenario: You are profiling the ahead-of-time compilation of a custom transformer model for the Google Tensor G3 (7.5 TOPS, 12 GB LPDDR5X). After the compiler applies an aggressive operator fusion pass (combining LayerNorm and MatMul), you observe that the fused subgraph executes significantly slower than the original unfused operations.
question: Why can Tensor G3 LayerNorm+MatMul fusion run slower than unfused ops despite reducing LPDDR5X traffic?
details:
  realistic_solution: |
    The degradation happens because the Tensor G3's TPU compiler lacks a highly optimized, hand-tuned kernel for that specific fused LayerNorm+MatMul combination. While fusion avoids writing intermediate activations to the LPDDR5X memory, the generic fused kernel suffers from low arithmetic intensity and poor utilization of the TPU's matrix multiply units. The compute penalty of a poorly utilized TPU outweighs the memory bandwidth savings of fusion.
  common_mistake: |
    **The Pitfall:** Assuming fusion always improves performance.
    **The Rationale:** Candidates believe reducing memory trips strictly guarantees a speedup, failing to account for poorly optimized generic fused kernels.
    **The Consequence:** Deploying graph optimizations that severely degrade throughput due to low NPU utilization.
  napkin_math: |
    - **Unfused Optimized Kernel:** 6 TOPS utilization. 8.3 MFLOPs / 6 TOPS = 1.38 μs.
    - **Unfused DRAM Access:** 4KB / 50 GB/s = 0.08 μs. Total unfused = 1.46 μs.
    - **Fused Generic Kernel:** 1 TOPS utilization. 8.3 MFLOPs / 1 TOPS = 8.3 μs.
    - **Result:** **The compute penalty of the poorly utilized fused kernel (8.3 μs) far outweighs the memory savings (0.08 μs).**
