title: Adaptive Bitrate Quantization Based on Thermal State on Snapdragon 8 Gen 3
scenario: 'A mobile app dynamically adjusts model quantization based on device thermal
  state on Snapdragon 8 Gen 3. State 0 (cool): run INT8 (91% accuracy, 45 TOPS). State
  1 (warm): run INT4 (88% accuracy, ~40 TOPS reduced clock). State 2 (hot): run INT2
  (82% accuracy, ~30 TOPS throttled). Design the transition logic with hysteresis.'
question: How should Snapdragon 8 Gen 3 switch among INT8, INT4, and INT2 thermal
  states without oscillating?
details:
  realistic_solution: 'Hysteresis design: upgrade threshold (lower precision \u2192 higher)
    must be lower than downgrade threshold (higher \u2192 lower). State 0\u21921 (degrade):
    T_junction > 75\u00b0C. State 1\u21920 (upgrade): T_junction < 65\u00b0C. 10\u00b0C hysteresis prevents
    oscillation. State 1\u21922 (degrade): T_junction > 85\u00b0C. State 2\u21921 (upgrade): T_junction < 75\u00b0C. Model loading: INT4 and
    INT2 models pre-loaded in memory (100MB INT4, 50MB INT2 alongside 200MB INT8 base).
    Transition: on state change, swap model reference (not full reload). Latency:
    model swap ~5ms (pointer change + cache flush). Accuracy announcement: notify
    UI of quality level change (show indicator when running degraded model). Recovery
    after heat dissipates: state 2\u21921\u21920 transition takes ~2 minutes of idle time.'
  common_mistake: Switching quantization precision synchronously when temperature
    crosses a threshold, causing oscillation at the boundary (switching back and forth
    every few inference steps).
  napkin_math: 'INT8 model: 200MB. INT4 model: 100MB. INT2 model: 50MB. Total: 350MB
    in memory. State 0 (cool, target <65\u00b0C): INT8, 91% accuracy, 45 TOPS. State 1 (warm,
    target 65-85\u00b0C): INT4, 88% accuracy. State 2 (hot, target >85\u00b0C): INT2, 82% accuracy. Hysteresis:
    State 0 \u2192 1 at >75\u00b0C; State 1 \u2192 0 at <65\u00b0C. State 1 \u2192 2 at >85\u00b0C; State 2 \u2192 1 at <75\u00b0C. 10\u00b0C prevents thrashing. Model swap: 5ms overhead.'
