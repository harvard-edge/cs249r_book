title: Adaptive Bitrate Quantization Based on Thermal State on Snapdragon 8 Gen 3
scenario: 'A mobile app dynamically adjusts model quantization based on device thermal state on Snapdragon 8 Gen 3. State 0 (cool): run INT8 (91% accuracy, 45 TOPS). State 1 (warm): run INT4 (88% accuracy, ~40 TOPS reduced clock). State 2 (hot): run INT2 (82% accuracy, ~30 TOPS throttled).'
question: "Design the transition logic with hysteresis to allow switching among INT8, INT4, and INT2 thermal states without oscillating."
details:
  realistic_solution: 'Hysteresis design: upgrade threshold (lower precision \u2192 higher) must be lower than downgrade threshold (higher \u2192 lower). State 0\u21921 (degrade): T_junction > 75\u00b0C. State 1\u21920 (upgrade): T_junction < 65\u00b0C. 10\u00b0C hysteresis prevents oscillation. State 1\u21922 (degrade): T_junction > 85\u00b0C. State 2\u21921 (upgrade): T_junction < 75\u00b0C. Model loading: INT4 and INT2 models pre-loaded in memory (100MB INT4, 50MB INT2 alongside 200MB INT8 base). Transition: on state change, swap model reference (not full reload). Latency: model swap ~5ms (pointer change + cache flush). Accuracy announcement: notify UI of quality level change (show indicator when running degraded model). Recovery after heat dissipates: state 2\u21921\u21920 transition takes ~2 minutes of idle time.'
  common_mistake: |
    **The Pitfall:** Switching quantization precision synchronously when temperature crosses a single, exact threshold.
    **The Rationale:** Candidates implement naive `if temp > 75` logic, ignoring that running an intensive workload causes immediate micro-spikes in temperature.
    **The Consequence:** The system oscillates wildly across the threshold, constantly unloading and reloading models, causing massive UI stutter and degraded user experience.
  napkin_math: |
    * **Memory Footprint:** INT8 (200 MB) + INT4 (100 MB) + INT2 (50 MB) = 350 MB total (Pre-loaded in RAM).
    * **Hysteresis Thresholds:**
      * State 0 -> 1 (Degrade): T > 75°C
      * State 1 -> 0 (Upgrade): T < 65°C
      * State 1 -> 2 (Degrade): T > 85°C
      * State 2 -> 1 (Upgrade): T < 75°C
    * **The 10°C delta between upgrade and downgrade events prevents state thrashing. A pointer swap between pre-loaded models takes ~5ms, eliminating loading latency.**
