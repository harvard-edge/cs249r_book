title: Calculate sustained FPS under A17 Pro thermal throttling
scenario: You are deploying a continuous object tracking model on an iPhone 15 Pro using the Apple A17
  Pro Neural Engine. The A17 Pro's 16-core Neural Engine achieves a peak performance of 35 TOPS at approximately
  5W. However, for a prolonged AR session, the device's thermal management system restricts the sustained
  power budget for the ANE to just 1.5W to avoid overheating. If your model requires 0.25 TOPS per inference,
  calculate the maximum sustained FPS you can achieve without thermal throttling, assuming linear power
  scaling.
details:
  realistic_solution: The correct approach is to first determine the compute efficiency of the Apple A17
    Pro Neural Engine in TOPS per Watt using the peak specifications. Then, apply this efficiency metric
    to the sustained thermal power envelope to find the maximum continuous TOPS available. Finally, divide
    the sustained TOPS by the model's compute requirement per frame to find the thermally safe frame rate.
  common_mistake: Candidates often assume burst performance (35 TOPS) is available indefinitely or fail
    to calculate the TOPS/W efficiency metric to scale performance down to the sustained power budget.
    They might incorrectly divide the 35 TOPS directly by 0.25 to get 140 FPS, ignoring the 1.5W thermal
    constraint entirely.
  napkin_math: '1. Compute peak efficiency: 35 TOPS / 5W = 7 TOPS/Watt.

    2. Calculate sustained performance: 7 TOPS/Watt * 1.5W = 10.5 TOPS.

    3. Calculate sustained FPS: 10.5 TOPS / 0.25 TOPS/frame = 42 FPS.'
