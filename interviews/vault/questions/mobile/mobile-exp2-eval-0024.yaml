title: Continuous Vision Thermal Throttling Strategy
scenario: 'You are designing the thermal management strategy for a continuous background video segmentation
  model on a device featuring the Qualcomm Hexagon NPU (Snapdragon 8 Gen 3). The NPU has a peak throughput
  of 45 TOPS INT8, and your model requires 1.5 TOPS to process 30 FPS. However, running it continuously
  frame-by-frame causes the heterogeneous CPU+GPU+NPU complex to overheat and throttle within 10 minutes.
  Evaluate two alternatives to sustain performance: (A) Buffer frames in the shared 12-16 GB LPDDR5X memory
  and execute NPU inferences in high-speed bursts to maximize sleep time, or (B) Lower the NPU clock frequency
  to its minimum state and run the model continuously at 30 FPS without sleep.'
question: "Which Snapdragon thermal strategy better sustains continuous 30 FPS segmentation: burst-and-sleep or minimum-clock continuous?"
details:
  realistic_solution: Strategy A (burst and sleep) is superior for this architecture. By utilizing a race-to-sleep
    approach, the system takes advantage of the massive 45 TOPS peak capability to finish the workload
    rapidly. Buffering frames allows the NPU and memory subsystem to power collapse into deep sleep for
    the vast majority of the duty cycle, drastically reducing average power and preventing thermal throttling.
  common_mistake: Candidates often choose Strategy B, incorrectly assuming that running at the lowest
    possible voltage/frequency is always the best thermal solution. They fail to account for the static
    leakage power of keeping the NPU and the shared LPDDR5X memory controller continuously active, which
    eventually saturates the device's thermal envelope.
  napkin_math: The model requires 1.5 TOPS (3.3% of the 45 TOPS INT8 peak). Continuous execution keeps
    the NPU and 12-16 GB LPDDR5X memory awake, drawing ~1.5W (active + static leakage), which exceeds
    the continuous passive cooling limit over time. By batching 15 frames (500ms duration), the NPU can
    process the batch in just ~16.6ms (using its full 45 TOPS). The system then enters deep sleep for
    the remaining ~483.4ms. Average power = ((1.5W * 16.6ms) + (0.05W sleep * 483.4ms)) / 500ms = ~98mW.
    This massive >10x reduction in average power consumption easily prevents thermal throttling while
    maintaining the required throughput.
