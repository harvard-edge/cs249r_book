title: iOS Memory Pressure Kills
scenario: A federated learning app trains on the Apple A17 Pro Neural Engine but crashes in the background due to memory pressure evictions.
question: "Explain why synchronous checkpointing of the 100MB model state during the system's memory-warning interrupt leads to corrupted or lost progress."
details:
  realistic_solution: The OS memory-warning interrupt gives very little time before
    hard-killing the app. Synchronously writing 100MB to NAND flash is too slow, causing
    the OS to terminate the process mid-write, leading to corrupted checkpoint files.
  common_mistake: |
    **The Pitfall:** Assuming the device will always wait for background tasks to complete.
    **The Rationale:** Candidates believe that background processes are given ample time to write to flash before being killed by the OS under memory pressure.
    **The Consequence:** Designing a synchronous checkpointing mechanism that results in corrupted or lost progress.
  napkin_math: |
    - Write size: 100 MB.
    - Flash write speed: ~500 MB/s.
    - Time required: 100 MB / 500 MB/s = **0.2 seconds**.
    - **Conclusion:** 0.2s is greater than the typical OS interrupt timeout for a memory warning, guaranteeing termination mid-write.
