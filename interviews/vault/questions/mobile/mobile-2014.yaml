title: iOS Memory Pressure Kills
scenario: A federated learning app trains on the Apple A17 Pro Neural Engine but crashes
  in the background due to memory pressure evictions. The system attempts to save
  local checkpoints.
question: Explain why synchronous checkpointing of the 100MB model state during the
  system's memory-warning interrupt leads to corrupted or lost progress.
details:
  realistic_solution: The OS memory-warning interrupt gives very little time before
    hard-killing the app. Synchronously writing 100MB to NAND flash is too slow, causing
    the OS to terminate the process mid-write, leading to corrupted checkpoint files.
  common_mistake: Assuming the device will always wait for background tasks to complete
    before killing a process under memory pressure.
  napkin_math: 100MB / 500MB/s = 0.2s > OS_Timeout
