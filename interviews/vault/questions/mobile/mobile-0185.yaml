title: The Two-Billion Dollar Keystroke
scenario: 'A product manager at a major mobile OS company asks you to evaluate the cost of building a next-generation keyboard prediction model. They project 100 million users. The ML team proposes two paths: Centralized Collection or Federated Learning.'
question: Why can Federated Learning be economically justified for keyboard prediction despite higher direct implementation costs?
details:
  realistic_solution: The single most important factor is the catastrophic financial and legal liability of a data breach. Centralizing keystroke data from 100 million users creates a massive security target. A breach could easily lead to regulatory fines (like GDPR) and class-action lawsuits that dwarf the direct engineering costs, making the higher upfront cost of FL a form of insurance.
  common_mistake: |
    **The Pitfall:** Focusing myopically on direct engineering and cloud infrastructure costs.
    **The Rationale:** Engineers often ignore second-order financial risks like data breaches, regulatory fines, and legal liability when evaluating system architectures.
    **The Consequence:** Selecting a centralized architecture that creates a massive security target and an unacceptable financial risk profile for the company.
  napkin_math: |
    - **Data at risk:** 100M users * ~50 KB/day * 365 days = ~1.8 PB/year of highly sensitive text data.
    - **Breach cost:** Average cost per record is ~$165. If 10% (10M) are affected: 10M * $165 = $1.65 billion.
    - **Federated Learning cost:** ~$7M/year (infrastructure + specialized engineering).
    - **Risk-adjusted comparison:**
      - Centralized: ~$7M ops + (1% annual breach probability * $1.65B) = $7M + $16.5M = $23.5M/year.
      - Federated: ~$7M/year with near-zero breach liability.
    - **Conclusion:** FL saves an expected **~$16.5M/year** in risk-adjusted costs.
  options:
  - The $10M/year cost increase is not justifiable as it triples the project's budget.
  - FL saves significant network costs by not having to upload petabytes of user data.
  - The potential cost of a data breach far exceeds the implementation cost difference.
  - FL provides better model accuracy through on-device personalization.
  correct_index: 2
