title: 'Model Format Conversion: Size ONNX vs. TFLite Model Storage for Mobile App'
scenario: A mobile app includes 3 ML models: (1) face detection (MobileNet-SSD, 6.8M params), (2) emotion recognition (SqueezeNet, 1.2M params), (3) background segmentation (DeepLab-MobileNet, 5.9M params).
question: How large are the bundled ONNX FP32 and TFLite INT8 model variants, and do they fit under the 200MB app limit?
details:
  realistic_solution: 'ONNX FP32: (6.8+1.2+5.9)M × 4B × 1.10 overhead = 13.9M × 4 × 1.10 = 61.2MB. TFLite INT8: 13.9M × 1B × 1.05 overhead = 14.6MB. App binary: iOS Mach-O base ~20MB + TFLite 14.6MB = 34.6MB << 200MB. ONNX 61.2MB also fine under 200MB limit. Recommendation: TFLite INT8 for 4× smaller app size, better CDN costs.'
  common_mistake: |
    **The Pitfall:** Computing model size as params × bytes without accounting for format overhead.
    **The Rationale:** Candidates forget that ONNX includes prototxt and metadata, which adds ~10-15% to raw weight size.
    **The Consequence:** Underestimating final payload sizes and CDN costs.
  napkin_math: |
    - **Total Params:** 6.8M + 1.2M + 5.9M = 13.9M.
    - **ONNX FP32 Size:** 13.9M × 4 bytes = 55.6 MB + 10% overhead = **61.16 MB**.
    - **TFLite INT8 Size:** 13.9M × 1 byte = 13.9 MB + 5% overhead = **14.60 MB**.
    - **App Binary Fit:** Both easily fit the 200 MB App Store limit.
    - **CDN Savings:** 61.16 MB - 14.60 MB = 46.56 MB saved per install.
    - **Total Impact:** At 1M installs, saves 46.56 TB in CDN transfer, totaling **~$4,190** at standard bandwidth rates.
