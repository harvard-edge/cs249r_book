title: Hexagon NPU INT8 Peak Performance Recall
scenario: You are an ML systems engineer optimizing a real-time vision model for flagship Android devices.
  Your target execution hardware is the Qualcomm Hexagon NPU found in the Snapdragon 8 Gen 3 SoC, which
  utilizes a shared 12-16 GB LPDDR5X memory pool with the heterogeneous CPU+GPU+NPU. To verify if your
  quantized model can run within the 33ms frame budget, you need to state the advertised peak theoretical
  INT8 compute capacity of this specific accelerator.
question: "What INT8 peak TOPS should be used for Snapdragon 8 Gen 3 Hexagon NPU roofline modeling?"
details:
  realistic_solution: The correct specification to recall is 45 TOPS (Tera Operations Per Second) for
    INT8 workloads on the Hexagon NPU. Knowing this specific figure is essential for roofline modeling
    on edge devices, as isolating the NPU performance prevents overestimating system capacity when the
    CPU and GPU are occupied with other application tasks.
  common_mistake: Candidates often state the combined AI Engine performance (which includes the CPU and
    GPU) rather than isolating the NPU's capability. They may also incorrectly cite the peak performance
    for FP16 instead of INT8.
  napkin_math: Peak NPU performance = 45 TOPS INT8. For a 30 FPS real-time application, the time budget
    per frame is 1 / 30 = 33.3 milliseconds. Theoretical operations per frame = 45 * 10^12 operations/second
    * 0.0333 seconds = 1.4985 Tera Operations (TOPS). If a quantized vision model requires 1.5 GOPS (Giga
    Operations), the theoretical maximum inferences per frame is 1.4985 * 10^12 / (1.5 * 10^9) = 999 inferences,
    assuming 100% compute utilization and ignoring the shared LPDDR5X memory bandwidth constraints.
