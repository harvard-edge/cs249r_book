title: The Mobile Jank Budget
scenario: You're an engineer on a team building a live AR filter for a flagship smartphone app. The key user experience requirement is to avoid 'jank'—stuttering or freezing in the UI.
question: To maintain a smooth 60 frames per second (FPS), what is the maximum per-frame latency budget your ML inference pipeline can consume?
details:
  realistic_solution: The latency budget is approximately 16ms. This is derived from the refresh rate of a standard 60Hz mobile display. The entire rendering pipeline for a single frame, including OS overhead, UI rendering, and model inference, must complete within this window to avoid dropping a frame and causing perceptible stutter.
  common_mistake: |
    **The Pitfall:** Confusing the UI frame budget with server-side response deadlines.
    **The Rationale:** Engineers used to cloud deployments assume a 100ms P99 latency target is acceptable for a mobile app.
    **The Consequence:** The ML pipeline exceeds the render window, causing dropped frames and a stuttering user experience.
  napkin_math: |
    1. Assumptions & Constraints:
       - Target framerate: 60 Frames Per Second (FPS).
    2. Calculations:
       - Time budget per frame: 1 second / 60 frames.
       - 1000 ms / 60 = 16.67 ms.
    3. Conclusion & Interpretation:
       - **Result: The maximum per-frame latency budget is ~16 ms (Latency-Bound).**
  options:
  - 100 ms
  - 33 ms
  - 16 ms
  - 1 ms
  correct_index: 2
