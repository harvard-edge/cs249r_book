title: The Mobile Jank Budget
scenario: You're an engineer on a team building a live AR filter for a flagship smartphone app. The key
  user experience requirement is to avoid 'jank'—stuttering or freezing in the UI. To maintain a smooth
  60 frames per second (FPS), what is the maximum per-frame latency budget your ML inference pipeline
  can consume?
details:
  realistic_solution: The correct answer is approximately 16ms. A 60 FPS refresh rate means the screen
    updates 60 times every second. Therefore, each frame—including all rendering and ML inference—must
    complete within 1/60th of a second to avoid dropping frames and causing visible stutter.
  common_mistake: Engineers often confuse the strict mobile UI 'jank' budget with other latency targets.
    For example, they might recall the 100ms P99 latency common for cloud services or the 33ms hard real-time
    deadline for industrial edge devices. These are far too slow for a fluid 60 FPS mobile interface.
  napkin_math: 'The calculation is a direct application of the frames-per-second target:'
  options:
  - 100 ms
  - 33 ms
  - 16 ms
  - 1 ms
  correct_index: 2
