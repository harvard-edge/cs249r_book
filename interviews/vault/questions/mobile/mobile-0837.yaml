title: SRAM Tiling for Super-Resolution
scenario: You are designing an on-device super-resolution pipeline for the Apple A17
  Pro Neural Engine using a U-Net model. The model has 8MB of weights, but processing
  a 4K image requires 48MB of activation memory, exceeding the NPU's local SRAM budget
  of 16MB.
question: Formulate a spatial tiling strategy that minimizes main memory trips, specifying
  the maximum tile size and overlap given the remaining SRAM budget.
details:
  realistic_solution: With 8MB consumed by weights, 8MB remains for activations. An
    FP16 model processing an RGB input, producing an RGB output, and holding intermediate
    features takes roughly 6 bytes per pixel across the depth. The tile volume is
    restricted to 8MB / 6 bytes = 1.33 million pixels. This allows for spatial tiles
    of approximately 1152x1152 pixels to fit entirely on-chip.
  common_mistake: Forgetting to subtract the weight memory from the total SRAM budget
    before calculating the maximum activation footprint.
  napkin_math: (16MB - 8MB) / 6B = 1.33M pixels -> ~1152x1152
