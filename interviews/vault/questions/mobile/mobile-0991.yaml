title: 'Model Size Estimation: Fluency — Size Mobile LLM Memory in 60 Seconds'
scenario: A 1B parameter INT4 model needs to run on an Android device with 16GB of total system RAM.
question: How much memory does a 1B INT4 model use on a 16 GB phone, and what remains for KV cache?
details:
  realistic_solution: 'Model: 1B × 4bits/8 = 500MB. Android OS + app: ~4GB. Available: 16-4=12GB. Model: 0.5GB. KV budget: 12-0.5=11.5GB. KV/token (1B, 32 layers, 32 KV heads, 64 dim at 1B scale): 2×32×64×2B×32=262KB. Pool tokens: 11.5GB/262KB=43,892 tokens. At 4096 context: 10 concurrent users! Very comfortable.'
  common_mistake: |
    **The Pitfall:** Giving only the model weight size without subtracting OS overhead or adding KV-cache estimates.
    **The Rationale:** Overlooking the dynamic memory needed during autoregressive generation.
    **The Consequence:** Recommending a model that fits on disk but OOMs immediately upon context growth.
  napkin_math: |
    1. Model Weights: 1B INT4 = 500MB.
    2. System Budget: 16GB total - 4GB OS = 12GB available.
    3. Remaining for KV: 12GB - 0.5GB weights = 11.5GB.
    4. KV per token: 2 * 32 layers * 64 dim * 2 bytes * 32 heads = ~262KB.
    5. **Max Tokens:** 11.5GB / 262KB = 43,893 tokens.
