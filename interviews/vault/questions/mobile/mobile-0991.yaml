title: 'Model Size Estimation: Fluency — Size Mobile LLM Memory in 60 Seconds'
scenario: A 1B parameter INT4 model needs to run on an Android device with 16GB of total system RAM.
question: How much memory does a 1B INT4 model use on a 16 GB phone, and what remains for KV cache?
details:
  realistic_solution: |
    Calculate the footprint dynamically. Model: 1B * 4 bits/8 = 500MB. OS + app overhead: ~4GB. Available: 16GB - 4GB = 12GB. Remaining KV budget: 12GB - 0.5GB = 11.5GB. KV/token (1B, 32 layers, 32 KV heads, 64 dim): 2 * 32 * 64 * 2B * 32 = ~262KB. Pool tokens: 11.5GB / 262KB = 43,892 tokens.
  common_mistake: |
    **The Pitfall:** Giving only the model weight size without subtracting OS overhead or adding KV-cache estimates.
    **The Rationale:** Overlooking the dynamic memory needed during autoregressive generation.
    **The Consequence:** Recommending a model that fits on disk but OOMs immediately upon context growth.
  napkin_math: |
    **Assumptions & Constraints:**
    - System Budget: 16 GB total - 4 GB OS = 12 GB available
    - Model Weights: 1B INT4 = 500 MB (0.5 GB)
    - KV per token: ~262 KB

    **Calculations:**
    - Remaining for KV: 12 GB - 0.5 GB = 11.5 GB
    - Max Tokens: 11.5 GB / 262 KB = ~43,893 tokens

    **Conclusion & Interpretation:**
    - **Result: ~43,893 tokens (Memory Capacity-Bound)**. The device supports over 43K tokens.
