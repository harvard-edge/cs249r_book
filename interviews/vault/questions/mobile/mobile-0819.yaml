title: Mobile New 0019
scenario: An app updates a deployed 100MB model over the air (OTA) using binary deltas. You changed just one bias value in the model. The resulting OTA delta file is still 98MB, consuming massive user bandwidth.
question: Why can changing one bias value make an OTA delta for a 100MB model nearly as large as the full model?
details:
  realistic_solution: The symptom of a massive delta file for a tiny model change is caused by flatbuffer/protobuf memory alignment shifts or global ZIP compression. If you insert or change a value that alters the byte offsets of the subsequent tensors, or if the entire model is bundled in a newly compressed ZIP, the binary diff algorithm (like bsdiff) sees almost every byte in the file as modified.
  common_mistake: |
    **The Pitfall:** Assuming logical model updates map directly to minimal binary diffs.
    **The Rationale:** Developers forget that inserting or changing a value without ensuring fixed memory offsets alters the byte offsets of all subsequent tensors.
    **The Consequence:** The binary diff algorithm perceives almost every byte in the file as modified, resulting in massive OTA update payloads.
  napkin_math: |
    - **Original Model:** 10M parameters (100MB).
    - **Change:** Weight 0 is changed, shifting the offset of Weight 1 by 4 bytes.
    - **Binary Diff (bsdiff):** Compares old File[4:end] vs new File[8:end].
    - **Result:** Every single subsequent byte mismatches.
    - **Conclusion:** The delta size becomes the uncompressed remainder, **~98MB instead of 4 Bytes**.
