title: Designing Graph Delegation for Snapdragon 8 Gen 3
scenario: You are deploying a custom real-time video segmentation pipeline using TFLite
  to an Android flagship device powered by a Qualcomm Hexagon NPU (Snapdragon 8 Gen
  3). The device has a heterogeneous CPU+GPU+NPU architecture and 12 GB of shared
  LPDDR5X memory. The model contains several custom operators that the default Hexagon
  delegate does not natively support. Design a conversion and delegation strategy
  that safely evaluates tradeoffs between INT8 quantization, operator fallback penalties,
  and heterogeneous compute allocation.
question: How would you design a conversion and delegation strategy that safely evaluates
  tradeoffs between INT8 quantization, operator fallback penalties, and heterogeneous
  compute allocation?
details:
  realistic_solution: The optimal approach is to partition the model offline using
    the Qualcomm Neural Processing SDK (QNN) or TFLite Hexagon delegate, pinning compute-heavy
    standard subgraphs to the NPU in INT8. For unsupported operators, the candidate
    should rewrite them to supported mathematically equivalent ops, or explicitly
    delegate the fallback subgraph to the GPU (FP16) instead of the CPU to maintain
    parallelism and avoid thermal throttling.
  common_mistake: Candidates often blindly apply full INT8 quantization and rely on
    automatic CPU fallback for unsupported operators. They fail to evaluate the massive
    latency and power costs of ping-ponging intermediate tensors between the NPU and
    CPU across the shared memory bus.
  napkin_math: The Hexagon NPU provides 45 TOPS INT8 (45,000 GOPs/sec). For a 15 GOPs
    frame inference, ideal compute time is 15 / 45,000 = 0.33 ms. If an unsupported
    op causes a CPU fallback, transferring a 4MB activation tensor over the shared
    LPDDR5X memory (assuming ~60 GB/s bandwidth) takes 4MB / 60GB/s = ~0.066 ms per
    transfer. A single NPU-CPU-NPU roundtrip adds ~0.13 ms of pure data movement overhead
    (a ~40% latency penalty), proving why operator fallback must be strictly minimized.
