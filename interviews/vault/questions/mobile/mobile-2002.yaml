title: Zero-Copy Memory Sharing Between Mobile CPU and NPU
scenario: 'A mobile application runs two models sequentially: an NLP intent classifier on the CPU and an image generator on the Hexagon NPU.'
question: "Evaluate the overhead of context switching and memory movement between the CPU and NPU, and propose a shared-memory strategy using Android NNAPI."
details:
  realistic_solution: |
    Standard data passing involves CPU serialization, a driver copy to NPU memory, and deserialization. By allocating the NLP model's output buffer using AHardwareBuffer, both CPU and NPU map the exact same physical memory addresses, eliminating the deep copy.
  common_mistake: |
    **The Pitfall:** Relying on standard Java byte arrays for tensor passing.
    **The Rationale:** Candidates default to standard Android data structures without realizing they inherently trigger massive memory copies across the Android JVM and Native boundary.
    **The Consequence:** High context-switching overhead that destroys the latency benefits of using the hardware accelerator.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Tensor size: 1 MB.
       - Deep copy latency: 1-2 ms on mobile DRAM.
    2. **Calculations:**
       - Standard deep copy: 1-2 ms per tensor.
       - Shared memory pointer (AHardwareBuffer): 0 ms.
    3. **Conclusion & Interpretation:**
       - **Result: Zero-Copy Latency Elimination.** Using shared hardware buffers reduces cross-boundary memory copying overhead to zero.
