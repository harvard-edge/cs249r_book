title: Zero-Copy Memory Sharing Between Mobile CPU and NPU
scenario: 'A mobile application runs two models sequentially: an NLP intent classifier
  on the CPU and an image generator on the Snapdragon Hexagon NPU.'
question: Evaluate the overhead of context switching and memory movement between the
  CPU and NPU, and propose a shared-memory strategy using Android NNAPI.
details:
  realistic_solution: Standard data passing involves CPU serialization, a driver copy
    to NPU memory, and deserialization. By allocating the NLP model's output buffer
    using AHardwareBuffer, both the CPU and NPU map the exact same physical memory
    addresses, completely eliminating the deep copy.
  common_mistake: Relying on standard Java byte arrays which inherently trigger massive
    memory copies across the Android JVM and Native boundary.
  napkin_math: A 1MB tensor deep copy takes ~1-2ms on mobile DRAM; AHardwareBuffer
    pointer passing takes 0ms.
