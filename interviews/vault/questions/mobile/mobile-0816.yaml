title: Mobile New 0016
scenario: A mobile app includes a 20MB TFLite model compressed in a standard Android APK (ZIP). The inference
  runs in 50ms, but the UI freezes for 4 seconds every time the model is initialized for the first time.
details:
  realistic_solution: The symptom of a massive initialization delay is caused by the OS decompressing
    the model file from the APK into system memory before the TFLite interpreter can map it. Because the
    model is compressed, the system cannot use zero-copy `mmap`. It must allocate 20MB of RAM and run
    a CPU-intensive inflation algorithm, causing a UI thread stall.
  common_mistake: Compressing model weights in deployment bundles to save download size without accounting
    for initialization CPU cost.
  napkin_math: 'Decompression throughput on weak mobile CPU: ~5MB/s. File size: 20MB. Time = 20MB / 5MB/s
    = 4.0 seconds just to inflate. Zero-copy mmap (uncompressed in APK) time = 20MB / 2GB/s (RAM speed)
    = 0.01 seconds.'
