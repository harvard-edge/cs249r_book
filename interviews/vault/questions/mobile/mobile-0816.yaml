title: Mobile New 0016
scenario: A mobile app includes a 20MB TFLite model compressed in a standard Android APK (ZIP). The inference runs in 50ms, but the UI freezes for 4 seconds every time the model is initialized for the first time.
question: "Why does a compressed 20MB TFLite model freeze the Android UI for 4 seconds during first initialization?"
details:
  realistic_solution: 'The symptom of a massive initialization delay is caused by the OS decompressing the model file from the APK into system memory before the TFLite interpreter can map it. Because the model is compressed, the system cannot use zero-copy mmap. It must allocate 20MB of RAM and run a CPU-intensive inflation algorithm.'
  common_mistake: |
    **The Pitfall:** Blindly compressing models in the APK bundle to save download size.
    **The Rationale:** Engineers assume smaller file sizes are always better, forgetting that zipped assets break the zero-copy initialization path.
    **The Consequence:** Saving a minor amount of network bandwidth at the cost of a massive, user-hostile 4-second UI freeze.
  napkin_math: |
    - **Decompression Cost:** Single-core decompression throughput on a weak mobile CPU is ~5MB/s.
    - **Inflation Time:** 20MB / 5MB/s = 4.0 seconds just to inflate.
    - **Alternative (mmap):** Zero-copy mmap (if left uncompressed in APK) takes 20MB / 2GB/s = 0.01 seconds.
    - **Final Result:** File compression induces a **4.0 second initialization penalty**.
