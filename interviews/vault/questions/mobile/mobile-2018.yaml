title: LIFO Voice Assistant Queue
scenario: A voice assistant on the Apple A17 Pro Neural Engine uses a buffer to queue
  user speech segments during temporary processing stalls.
question: Design a queueing discipline that prioritizes perceived latency upon recovery,
  and explain its impact on the user experience.
details:
  realistic_solution: Implement a Last-In-First-Out (LIFO) or priority queue where
    the newest audio chunks are processed first. This ensures that when the system
    recovers, it reacts immediately to what the user just said, discarding stale audio
    that is no longer relevant.
  common_mistake: Applying standard FIFO, which would force the system to grind through
    seconds of outdated audio, making the assistant feel completely unresponsive.
  napkin_math: Wait_new = 0s vs Wait_old = ∞
