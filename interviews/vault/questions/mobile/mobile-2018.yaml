title: 'LIFO Voice Assistant Queue'
scenario: 'A voice assistant on the Apple A17 Pro Neural Engine uses a buffer to queue user speech segments during temporary processing stalls.'
question: 'Design a queueing discipline that prioritizes perceived latency upon recovery, and explain its impact on the user experience.'
details:
  realistic_solution: 'Implement a Last-In-First-Out (LIFO) or priority queue where the newest audio chunks are processed first. This ensures that when the system recovers, it reacts immediately to what the user just said, discarding stale audio that is no longer relevant.'
  common_mistake: 'Applying standard FIFO, which would force the system to grind through seconds of outdated audio, making the assistant feel completely unresponsive.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Buffer queues user speech segments during temporary processing stalls.
    - Oldest segments are no longer relevant to user intent.

    **Calculations:**
    - Wait time for new segments (FIFO): Wait_new = Time to process all previous segments.
    - Wait time for new segments (LIFO): Wait_new = 0s.
    - Wait time for old segments (LIFO): Wait_old = ∞.

    **Conclusion & Interpretation:**
    - **Result: 0s Latency for Newest Data (Latency-Bound).** LIFO prioritizes the newest audio, ensuring immediate reaction upon recovery.
