title: The Keyboard's Privacy-Cost Dilemma
scenario: 'You are the ML Systems Engineer for a new smart keyboard app with 1 million
  daily active users. The Product Manager wants to A/B test two approaches for personalizing
  the next-word prediction model:'
question: Which smart keyboard personalization approach should the A/B test use, considering
  privacy, battery, and data TCO?
details:
  realistic_solution: The correct approach is to recommend Federated Learning (Option
    B). The primary reason is the preservation of user privacy; uploading raw user
    keystrokes is a significant security and ethical liability that should be avoided
    at all costs. Quantitatively, FL also proves to be more economical from a data
    TCO perspective. While it externalizes the computation cost to the user's device,
    the impact on battery life is minimal and a worthwhile trade-off for privacy.
    The A/B test should proceed, but only with variants of the Federated Learning
    approach.
  common_mistake: Engineers often focus on a single metric, like battery drain or
    cloud cost, in isolation. A common mistake is to argue that on-device training
    is unacceptable due to battery impact without calculating its actual (small) magnitude.
    Another is to miscalculate the data scale, leading to an incorrect cost comparison.
    The most critical error is treating the massive privacy risk of uploading raw
    keystrokes as a minor issue instead of a primary blocker.
  napkin_math: '### Option A: Centralized TCO (Data Ingress)

    1. **Data volume**: 1M users × 100 keystrokes/day × 50 bytes/keystroke = 5 GB/day
    raw text.

    2. **Cloud ingress**: Free on most providers, but **egress + compute** matters.

    3. **Training compute**: Fine-tuning a small language model on 5 GB/day of text
    → ~$50/day on a single A100 instance.

    4. **Monthly cloud cost**: ~$1,500 compute + $500 storage/networking = **~$2,000/month**.

    5. **Privacy risk**: Raw keystrokes include passwords, credit cards, private messages
    → massive liability.


    ### Option B: Federated Learning TCO

    1. **On-device training cost**: ~5 min fine-tuning per round × 20 mW incremental
    power = 20 mW × 300s / 3600 = 1.67 mWh per round.

    2. **Battery impact**: 1.67 mWh / 15,000 mWh (typical phone battery) = **0.011%**
    per round → negligible.

    3. **Server cost**: Aggregation server receives model deltas (not raw data). 1M
    users × 1 KB gradient update = 1 GB/round.

    4. **Monthly server cost**: ~$300 for aggregation compute + bandwidth.

    5. **Engineering overhead**: Higher initial build cost (~$50K one-time for FL
    infrastructure).


    ### Comparison

    - Option A: ~$24K/year + enormous privacy liability.

    - Option B: ~$3,600/year + $50K one-time. Break-even in ~2.5 years on cost alone;
    immediate win on privacy.'
  options:
  - Choose Centralized (A). The battery drain from on-device training is unacceptable
    and will cause user churn.
  - Choose Centralized (A). The annual data upload cost of $24,000 is high, but still
    cheaper than the data costs from federated learning updates.
  - Choose Federated (B). It has a lower annual data TCO (~$3.6K vs ~$24K) and critically,
    avoids uploading sensitive user keystrokes, making it the only viable option from
    a privacy standpoint.
  - Choose Federated (B), because its annual data TCO is only $3,600, which is an
    order of magnitude cheaper than the Centralized approach's multi-million dollar
    data bill.
  correct_index: 2
