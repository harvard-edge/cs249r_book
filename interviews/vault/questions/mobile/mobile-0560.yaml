title: The Mobile MoE Trade-off
scenario: "You are a mobile ML engineer for a smart camera app. Your current MobileNetV2\n  model (300 MFLOPS, 15ms latency) is not powerful enough for a new, more complex\n  'scene description' feature. Your strict latency budget is 25ms to avoid UI jank.\n  Your Neural Architecture Search (NAS) tool proposes three candidates to replace\n  the core model: A) Micro-ViT, B) EfficientNet-B0, and C) MoE Hybrid. Which option demonstrates the most sophisticated understanding of\n  on-device constraints and is the most promising to investigate further?"
question: Which option demonstrates the most sophisticated understanding of on-device
  constraints and is the most promising to investigate further?
details:
  realistic_solution: 'The MoE Hybrid is the clear winner. It correctly identifies
    the core trade-off on mobile: you need high model *capacity* (parameters) to learn
    complex tasks, but low active *compute* (FLOPs) to meet latency budgets. The MoE
    architecture is designed for this, storing knowledge in many ''expert'' sub-networks
    but only executing a small subset during any single inference. The EfficientNet,
    while within budget, likely lacks the capacity for the new task. The ViT is far
    too slow due to the computational cost of its self-attention mechanism at this
    scale.'
  common_mistake: Engineers often conflate a model's total parameter count with its
    inference cost (FLOPs). They see a 12M parameter model and incorrectly assume
    it must be slower than a 5M parameter model. This misses the architectural trick
    of Mixture-of-Experts (MoE), which enables high model capacity with low active
    compute. Another common mistake is choosing any model that fits the latency budget
    without considering if it has enough capacity to actually learn the more complex
    task.
  napkin_math: 'The device''s latency is proportional to the model''s FLOPs. The baseline is 15ms for 300 MFLOPS. The hard budget is 25ms. This means the maximum FLOP budget is (25ms / 15ms) * 300 MFLOPS = 500 MFLOPS. The MoE Hybrid keeps active FLOPs under 500 MFLOPS while vastly expanding the parameter count for higher capacity.'
  options:
  - The Micro-ViT, because Transformers are the most powerful modern architecture
    and worth the integration cost.
  - The EfficientNet-B0, because it's a standard architecture that provides a performance
    boost and comfortably fits the latency budget.
  - The MoE Hybrid, because it uniquely decouples model capacity (total parameters)
    from inference cost (active FLOPs), fitting the task and budget.
  - Both the EfficientNet-B0 and the MoE Hybrid are equally valid choices since both
    are well under the 25ms latency budget.
  correct_index: 2
