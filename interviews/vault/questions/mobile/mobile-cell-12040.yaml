title: 'MLOps Lifecycle: Compare App Store vs. Dynamic Model Updates for iOS ML Apps'
scenario: 'An iOS app team uses a 50MB CoreML model (A17 Pro, 35 TOPS). Two strategies: (A) bundle model
  in app (App Store update, 1-2 week review cycle, affects all iOS users) vs. (B) dynamic model download
  post-install (instant update, but requires network, Apple restrictions apply). Evaluate latency-to-deploy,
  compliance risk, user experience, and bandwidth cost at 10M installs.'
question: "How would you evaluate latency-to-deploy, compliance risk, user experience, and bandwidth cost at 10M installs?"
details:
  realistic_solution: 10% validation split of 500TB = 50TB validation, 450TB training. 20% deduplication
    removes 90TB → 360TB final training set.
  common_mistake: Assuming Apple allows arbitrary dynamic code/model downloads without restrictions; Apple
    guidelines prohibit downloading code that changes app behavior, but downloading ML model weights (data
    files) is permitted if done correctly via Core ML model assets.
  napkin_math: 'Dataset compression: 500TB total. 10% validation split = 10% of 500TB = 50TB for validation
    (not 100TB). Training set: 450TB. After deduplication (20% reduction): 360TB training.'
