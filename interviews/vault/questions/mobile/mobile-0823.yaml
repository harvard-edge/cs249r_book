title: Mobile New 0024
scenario: A drone's vision system consumes 1.5W before the NPU even starts inferencing. Profiling shows the image pipeline routing 4K 60FPS camera frames to the main CPU, resizing them, and then copying them to NPU memory.
question: Why does the drone vision pipeline consume high baseline power before NPU inference starts?
details:
  realistic_solution: The symptom of high baseline power draw is caused by inefficient data routing and CPU-based image preprocessing. Routing 4K video through the CPU and main DRAM bus requires immense bandwidth and CPU cycles. The camera's Image Signal Processor (ISP) should be configured to directly write resized, cropped RGB frames into the NPU's SRAM/Memory via hardware DMA, bypassing the CPU entirely.
  common_mistake: |
    **The Pitfall:** Treating ML model execution as the only power consumer.
    **The Rationale:** Engineers often focus entirely on optimizing the neural network (e.g., quantization, pruning) and ignore the data pipeline overhead feeding the model.
    **The Consequence:** The device drains the battery rapidly regardless of how efficient the ML inference is, because routing high-res video through the CPU consumes excessive bandwidth and power.
  napkin_math: |
    1. **Data Rate:** 4K at 60FPS = 3840 × 2160 × 3 bytes × 60 = 1.49 GB/s.
    2. **Bandwidth Multiplier:** CPU read + CPU write + NPU read = 3 memory passes. Total bandwidth = 1.49 GB/s × 3 = ~4.48 GB/s.
    3. **Power Consumption:** LPDDR energy cost is ~800 pJ/byte. 4.48 GB/s × 800 pJ/byte = 3.58W peak theoretical memory power.
    **Result:** The unnecessary CPU memory copies drive up to **~3.6W of memory power**, fully accounting for the observed 1.5W baseline drain. The fix is to use hardware DMA from the ISP directly to the NPU.
