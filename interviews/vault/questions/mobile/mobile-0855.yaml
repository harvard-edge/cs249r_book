title: 'Fluency: explain MobileNet-family tradeoffs to an iOS product manager'
scenario: An iOS product manager asks why the team is using 'MobileNet' instead of
  the more accurate model from the ML paper they just read. Explain why efficient
  CNN architectures exist for mobile, the A17 Pro's role, and how to think about the
  accuracy-speed-battery tradeoff for user-facing features on iPhone 15 Pro.
question: Why efficient CNN architectures exist for mobile, the A17 Pro's role, and
  how to think about the accuracy-speed-battery tradeoff for user-facing features
  on iPhone 15 Pro?
details:
  realistic_solution: 'Frame it as: large cloud models (ResNet-50: 100ms on ANE) feel
    laggy for real-time camera features. MobileNetV3 at 2ms is imperceptible. The
    A17 Pro''s Neural Engine (35 TOPS) is specifically designed to run these efficient
    models; it''s 10× more power-efficient than the GPU for CNN inference. Accuracy:
    MobileNetV3 vs ResNet-50 is 75% vs 76% on ImageNet — 1% gap on academic benchmarks
    often disappears with app-specific fine-tuning. Battery: a 2ms inference at 30
    FPS draws ~0.1% battery per hour vs 200ms inference drawing 10% per hour.'
  common_mistake: Explaining only that mobile models are 'smaller and faster' without
    conveying the actual user experience stakes (3ms vs 200ms is invisible vs perceptible;
    1% battery vs 10% battery matters) or that A17 Pro ANE changes the tradeoff.
  napkin_math: 'A17 Pro ANE power: ~1W at full load. MobileNetV3 at 30 FPS: 30 × 2ms
    = 60ms/sec active = 6% duty cycle → 0.06W inference power. ResNet-50 alternative
    at 100ms/frame: 30 × 100ms = 3,000ms/sec — impossible at 30 FPS (need 10× slower
    FPS or 10× more power). MobileNetV3 enables real-time at 30 FPS; ResNet-50 limited
    to 10 FPS at same power. Battery per hour: 0.06W × 3600 sec = 216 J. iPhone 15
    Pro battery: 13Wh = 46,800J. MobileNet: 0.46% battery/hr for continuous real-time
    inference.'
