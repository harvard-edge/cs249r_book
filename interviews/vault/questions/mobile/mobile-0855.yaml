title: 'Fluency: explain MobileNet-family tradeoffs to an iOS product manager'
scenario: An iOS product manager asks why the team is using MobileNet instead of a more accurate ResNet-50 from a recent paper for a real-time camera feature.
question: "How would you explain the MobileNet vs ResNet-50 accuracy, speed, and battery tradeoffs to a product manager?"
details:
  realistic_solution: |
    Frame it as an experience tradeoff: ResNet-50 feels laggy and drains battery, while MobileNetV3 is imperceptible and efficient.
  common_mistake: |
    **The Pitfall:** Explaining "smaller and faster" without quantifying the user experience.
    **The Rationale:** Engineers default to citing FLOP counts or benchmark percentages instead of translating those metrics into visible latency or battery percentages.
    **The Consequence:** The product manager forces the team to deploy the slower model, resulting in a laggy UI and severe user battery complaints.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Framerate: 30 FPS.
       - MobileNet Latency: 2ms/frame.
       - ResNet-50 Latency: 100ms/frame.
       - NPU Power: 1W.
    2. **Calculations:**
       - MobileNet Compute time: 30 * 2ms = 60ms/sec (6% duty cycle).
       - MobileNet Battery draw: 1W * 0.06 = 0.06W (~0.46% battery/hr).
       - ResNet-50 Compute time: 30 * 100ms = 3000ms/sec.
    3. **Conclusion & Interpretation:**
       - **Result: Impossible Framerate.** ResNet-50 requires 3 seconds of compute for 1 second of video. It physically cannot run at 30 FPS, whereas MobileNet runs effortlessly at a 6% duty cycle.
