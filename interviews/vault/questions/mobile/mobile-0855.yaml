title: 'Fluency: explain MobileNet-family tradeoffs to an iOS product manager'
scenario: An iOS product manager asks why the team is using MobileNet instead of a more accurate ResNet-50 model from a recent paper for a real-time camera feature.
question: How would you explain the MobileNet vs ResNet-50 accuracy, speed, and battery tradeoffs to a product manager?
details:
  realistic_solution: Frame it as an experience tradeoff: ResNet-50 feels laggy and drains battery, while MobileNetV3 is imperceptible and efficient.
  common_mistake: |
    **The Pitfall:** Explaining "smaller and faster" without quantifying the user experience.
    **The Rationale:** Engineers default to citing FLOP counts or benchmark percentages instead of translating those metrics into visible latency or battery percentages.
    **The Consequence:** The product manager forces the team to deploy the slower model, resulting in a laggy UI and severe user battery complaints.
  napkin_math: |
    1. Calculate MobileNet active time: 30 FPS * 2ms = 60ms/sec (6% duty cycle).
    2. Calculate MobileNet power: 1W NPU * 6% = 0.06W. Battery drain = 0.06W * 3600s = 216J/hr (**~0.46% battery/hr**).
    3. Calculate ResNet-50 active time: 30 FPS * 100ms = 3000ms/sec.
    4. Conclusion: ResNet-50 is mathematically impossible at 30 FPS; it requires 3 seconds of compute for every 1 second of video, totally breaking real-time SLAs.
