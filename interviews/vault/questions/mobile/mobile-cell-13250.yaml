title: Diagnose Thermal Throttling Cost Impact on A17 Pro Inference
scenario: An iOS app uses A17 Pro Neural Engine (35 TOPS) for real-time video style transfer at 30 FPS.
  After 90 seconds of continuous inference, FPS drops to 18 FPS due to thermal throttling. The model requires
  180 GOPS per frame. Profiling shows peak power consumption of 4.2W during sustained inference, exceeding
  the 3.5W thermal budget. Diagnose the cost impact of throttling on user experience and propose thermal-aware
  scheduling.
question: "How would you diagnose the cost impact of throttling on user experience and propose thermal-aware scheduling?"
details:
  realistic_solution: 'Throttled throughput: 18/30 = 60% of target. Model utilization at throttle: 35
    TOPS × 0.60 throttle factor = 21 TOPS. Required: 180 GOPS × 30 = 5.4 TOPS — well within even throttled
    capacity. Actual bottleneck: sustained 4.2W → thermal accumulation in chassis. Fix: duty-cycle inference
    at 70% to stay under 3.5W budget: 4.2W × 0.70 = 2.94W < 3.5W. Effective FPS: 30 × 0.70 = 21 FPS (still
    below target but better than 18). Alternative: dynamic resolution scaling — reduce input by 25% (from
    1080p to 810p): FLOPs = 0.5625× → 3.5W budget maintained at 30 FPS. Best: adaptive quality + quality/FPS
    preference UI.'
  common_mistake: Treating thermal throttling as purely a performance issue; for subscription-based apps,
    throttled inference reduces feature utility, increasing churn — a quantifiable revenue cost.
  napkin_math: '4.2W sustained → throttle at 3.5W: ratio = 3.5/4.2 = 83.3%. Effective TOPS: 35×0.833=29.2
    TOPS. Frames/s at 83.3% rate: 30×0.833=25 FPS... but actual 18 FPS means thermal is more aggressive.
    Resolution scaling 0.75×: FLOPs ∝ 0.75²=0.5625. New power: 4.2×0.5625=2.36W < 3.5W ✓ → 30 FPS maintained.'
