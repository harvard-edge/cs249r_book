title: 'Mobile TCO Mastery: Enterprise Mobile AI Strategy Full Cost Model'
scenario: Design a 3-year total cost model for deploying on-device LLM capabilities to 50,000 enterprise employees using Samsung Galaxy S24 Ultra (Snapdragon 8 Gen 3, 45 TOPS, 16GB). The enterprise AI assistant handles email drafting (30/day, 200 tokens), meeting summaries (5/day, 500 tokens), and document search (20/day, 100 tokens).
question: How does the 3-year TCO of an on-device enterprise deployment compare to a cloud API at $0.001/1K tokens?
details:
  realistic_solution: 'Tokens/user/day: 30*200+5*500+20*100=6000+2500+2000=10,500 tokens/day. Annual: 10,500*365=3.8325M tokens. Cloud cost: 50K*3.8325M*$0.001/1000=$191,625/yr. 3yr: $574,875. On-device cost: energy (negligible $1/user/yr) + MDM/deployment: $50K setup + $5/device/month*50K = $3M/yr. 3yr: $9M+$150K setup = $9.15M. On-device 3yr: $9.15M vs cloud $574K. Cloud is 16x cheaper! This is because enterprise apps don''t need millions of users to amortize MDM costs. On-device only wins for consumers with millions of users where cloud API becomes expensive.'
  common_mistake: |
    **The Pitfall:** Failing to account for Mobile Device Management (MDM) costs for on-device deployments.
    **The Rationale:** Engineers assume "on-device means free compute" and ignore the IT overhead of packaging, distributing, and securing model weights on corporate endpoints.
    **The Consequence:** Proposing an architecture that is 15x more expensive than a simple cloud API.
  napkin_math: |
    1. **Daily Token Usage:** (30 * 200) + (5 * 500) + (20 * 100) = 6000 + 2500 + 2000 = 10,500 tokens/user/day.
    2. **Total Tokens (3 Years):** 10,500 * 365 * 3 = 11,497,500 tokens/user.
    3. **Cloud Cost:** 11,497,500 tokens * $0.001 / 1000 = $11.50 per user for 3 years. Total for 50k users = $575,000.
    4. **On-Device MDM Cost:** Mobile Device Management for model updates = $5/device/month * 50,000 * 36 months = $9,000,000.
    **Cloud deployment ($575K) is massively cheaper than on-device ($9M) for enterprises due to the high cost of per-seat MDM at a 50k scale.**
