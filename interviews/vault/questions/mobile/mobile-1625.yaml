title: Optimizing Encoder-Decoder Architectures for Google Tensor G3 On-Device NLU
scenario: Your team is developing an on-device NLU feature targeting Google Tensor G3 (7.5 TOPS, 12 GB LPDDR5X). You must choose between encoder-only, decoder-only, or encoder-decoder architectures to meet a <150ms latency budget.
question: How would you diagnose performance bottlenecks for each architecture on the Tensor G3 and quantify costs to make your recommendation?
details:
  realistic_solution: 'Conduct early benchmarking of representative small models aggressively quantized to INT8. Profile inference latency focusing on token generation rates for decoders (sequential) vs. parallel processing for encoders. Identify the specific bottleneck (compute-bound vs. memory-bound).'
  common_mistake: |
    **The Pitfall:** Focusing purely on theoretical FLOPs or benchmark accuracy.
    **The Rationale:** Ignoring the impact of memory bandwidth (LPDDR5X) on sequential decoding operations.
    **The Consequence:** Choosing a decoder-heavy model that misses the 150ms SLA due to severe memory-bound stalls on the TPU.
  napkin_math: |
    - 150ms compute budget at 7.5 TOPS = 1.125 Tera-Ops.
    - Assuming 50% utilization = 562.5 Giga-Ops effective.
    - A 0.5B param INT8 model processing 500 tokens: 0.5B * 2 OPs * 500 = 500 GOPs.
    - Memory: 1B INT8 params = 1 GB. Loading at 50 GB/s = 20 ms.
    - **A 0.5B parameter INT8 model (encoder-focused) safely fits within the 562.5 GOPs compute and memory bandwidth budgets.**
