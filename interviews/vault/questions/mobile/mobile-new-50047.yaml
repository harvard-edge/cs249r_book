title: Thermal Throttling Impact on Portable Model Benchmarks
scenario: You benchmark your model on an A17 Pro achieving 5ms latency for the first 100 inferences. By
  inference 500, latency has degraded to 12ms. The same model on Snapdragon 8 Gen 3 shows 4ms initial,
  degrading to 8ms. Why do mobile benchmarks deteriorate, and how does this affect portability comparisons?
details:
  realistic_solution: 'Mobile thermal throttling reduces clock speeds by 30-60% under sustained load.
    A17 Pro: peak ANE/GPU clocks drop ~40% after thermal limit. Snapdragon 8G3: ~50% clock reduction.
    For fair portability comparison: (1) Warm up for 60 seconds before measuring. (2) Report sustained
    throughput (p50 latency over 5 minutes), not peak. (3) Include the thermal envelope: iPhone 15 Pro
    dissipates ~6W sustained, S24 ~8W sustained. (4) Test at ambient temperature matching deployment conditions.
    A model that is 20% faster cold-start may be 10% slower after thermal saturation.'
  common_mistake: Reporting the first-inference latency as the sustained performance. Mobile SoCs throttle
    aggressively within 30-60 seconds of sustained load. A cross-platform comparison based on cold-start
    numbers is misleading.
  napkin_math: 'A17 Pro: peak ~35 TOPS (ANE), sustained ~21 TOPS (40% throttle). 5ms x (35/21) = 8.3ms
    sustained (close to observed 12ms with overhead). Snapdragon 8G3: peak 45 TOPS, sustained ~22 TOPS
    (50% throttle). 4ms x (45/22) = 8.2ms sustained (matches observed 8ms).'
