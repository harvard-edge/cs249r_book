title: On-Device Fine-Tuning Memory Orchestration
scenario: You are designing a background on-device fine-tuning pipeline for a 2B parameter text model. The operating system guarantees eviction if your background service exceeds a strict 2.0 GB footprint. The base model is quantized to 4-bit, but memory fragmentation and activation memory during backprop constantly trigger OOMs.
question: How should memory be orchestrated for on-device fine-tuning with a 4-bit base model and LoRA adapters to maintain the footprint under 2.0 GB?
details:
  realistic_solution: Implement a custom memory allocator that pre-allocates a single contiguous 1.9 GB dmabuf buffer shared between the CPU and NPU to eliminate fragmentation. Map the 1 GB 4-bit base weights directly into this buffer. For training, use gradient accumulation with a micro-batch size of 4, storing the 32-bit gradients and optimizer states in a fixed memory arena, while aggressively discarding intermediate activations using gradient checkpointing at the transformer block level.
  common_mistake: |
    **The Pitfall:** Proposing standard mobile training loops without pinned memory (dmabuf/ION).
    **The Rationale:** Candidates fail to account for the unified memory architecture and strict OS eviction rules.
    **The Consequence:** This leads to page faults, severe memory fragmentation, and guaranteed Android LMK eviction before the first forward pass completes.
  napkin_math: |
    1. Assumptions & Constraints:
       - Target memory limit: 1.9 GB (to avoid 2.0 GB LMK eviction).
       - Base weights (2B INT4) = 1.0 GB.
       - LoRA weights & Optimizer states = 50 MB.
       - NPU Workspace = 100 MB.
    2. Calculations:
       - Activations (micro-batch=4, seq=512, gradient checkpointing) = 150 MB.
       - Total Peak Memory: 1.0 GB + 50 MB + 100 MB + 150 MB = 1.30 GB.
    3. Conclusion & Interpretation:
       - **Result: Peak memory is 1.30 GB, safely avoiding eviction (Memory-Capacity-Bound).**
