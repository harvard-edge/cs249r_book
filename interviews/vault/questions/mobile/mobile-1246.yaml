title: Architecting a Vision-Language Model on Snapdragon 8 Gen 3
scenario: Your team wants to deploy a 3B parameter Vision-Language Model for real-time augmented reality translation. The application has a strict 4 GB memory budget.
question: "How should a 3B Snapdragon vision-language model fit a 4GB memory budget and handle bandwidth-bound decoding?"
details:
  realistic_solution: Implement W8A8 static quantization to map seamlessly to INT8 TOPS while fitting the footprint constraint. Reserve exactly 3 GB for weights and 1 GB for dynamic KV cache and activations, enforcing strict maximum sequence lengths to prevent OOM.
  common_mistake: |
    **The Pitfall:** Ignoring the KV cache size and memory bandwidth limits.
    **The Rationale:** Candidates assume that because a 3B model fits in 3GB of RAM, the 4GB budget is sufficient, and they treat the compute capacity as the primary performance indicator.
    **The Consequence:** The model crashes due to OOM when the KV cache fills up, and inference is severely delayed because the system is actually bound by memory bandwidth, not compute.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model: 3B params.
       - Budget: 4 GB.
       - Hardware: 45 TOPS INT8, memory bandwidth ~64 GB/s.
    2. **Calculations:**
       - Weights = 3B * 1 byte = 3.0 GB.
       - Remaining = 4.0 - 3.0 = 1.0 GB for KV cache.
       - Compute limit = 6 GOPs/token -> 7,500 tokens/sec max.
       - Bandwidth limit = 64 GB/s / 3.0 GB = ~21.3 tokens/sec.
    3. **Conclusion & Interpretation:**
       - **Result: Bandwidth-Bound**. The architecture is throttled by LPDDR5X memory bandwidth at ~21 tokens/sec, proving TOPS is not the limiting factor.
