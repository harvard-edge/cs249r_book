title: Architecting a Vision-Language Model on Snapdragon 8 Gen 3
scenario: Your team wants to deploy a 3B parameter Vision-Language Model for real-time augmented reality translation directly on a smartphone powered by the Qualcomm Hexagon NPU (Snapdragon 8 Gen 3). The device has 16 GB of shared LPDDR5X memory, but the OS and background applications reserve 12 GB, leaving a strict 4 GB budget for your application. The NPU provides 45 TOPS for INT8 operations.
question: "How should a 3B Snapdragon vision-language model fit a 4GB memory budget and handle bandwidth-bound decoding?"
details:
  realistic_solution: 'Allocate memory meticulously: choose W8A8 quantization to perfectly map to the NPU''s native INT8 45 TOPS capability, taking 3 GB for weights and reserving the remaining 1 GB strictly for KV cache and activations. Enforce an upper bound on context length to prevent OOM errors, and design a heterogeneous fallback mechanism for unsupported operations.'
  common_mistake: |
    **The Pitfall:** Ignoring the KV cache size and memory bandwidth limits.
    **The Rationale:** Candidates assume that because a 3B model fits in 3GB of RAM, the 4GB budget is sufficient, and they treat the 45 TOPS compute as the primary performance indicator.
    **The Consequence:** The model crashes due to OOM when the KV cache fills up, and inference is severely delayed because the system is actually bound by LPDDR5X memory bandwidth, not compute.
  napkin_math: |
    - **Memory Footprint:** 3 billion parameters * 1 byte/param (INT8) = 3.0 GB.
    - **Memory Budget:** 16 GB (Total) - 12 GB (OS) = 4.0 GB. Remaining for KV Cache/Activations = 4.0 GB - 3.0 GB = 1.0 GB.
    - **Compute Limit:** 45 TOPS (INT8). Compute required per token = 3B params * 2 ops = 6 GOPs. Theoretical NPU compute limit = 45,000 / 6 = 7,500 tokens/sec.
    - **Bandwidth Limit:** LPDDR5X provides ~64 GB/s. Time to read 3.0 GB weights = 64 GB/s / 3.0 GB = ~21.3 tokens/sec.
    - **Final Result:** The architecture is **severely memory-bandwidth bound at ~21 tokens/sec**, proving TOPS is not the limiting factor.
