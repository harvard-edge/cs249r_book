title: Architecting a Vision-Language Model on Snapdragon 8 Gen 3
scenario: Your team wants to deploy a 3B parameter Vision-Language Model for real-time
  augmented reality translation directly on a smartphone powered by the Qualcomm Hexagon
  NPU (Snapdragon 8 Gen 3). The device has 16 GB of shared LPDDR5X memory, but the
  OS and background applications reserve 12 GB, leaving a strict 4 GB budget for your
  application. The NPU provides 45 TOPS for INT8 operations. Design a deployment architecture
  that fits within the memory footprint and evaluates the trade-offs between different
  quantization schemes, memory allocation for KV cache, and heterogeneous execution
  to ensure smooth real-time performance.
question: How should a 3B Snapdragon vision-language model fit a 4GB memory budget
  and handle bandwidth-bound decoding?
details:
  realistic_solution: 'A robust L5 design allocates memory meticulously: choosing
    W8A8 quantization to perfectly map to the NPU''s native INT8 45 TOPS capability,
    taking 3 GB for weights and reserving the remaining 1 GB strictly for KV cache
    and activations. The architecture should enforce an upper bound on context length
    to prevent out-of-memory errors. The candidate should also design a heterogeneous
    fallback mechanism where the NPU handles the dense matrix multiplications, while
    the CPU or GPU handles any unsupported specialized operations or pre-processing,
    minimizing memory transfers between the shared memory subsystems.'
  common_mistake: Candidates often assume that a 3B parameter model quantized to INT8
    (3 GB) will comfortably fit into the 4 GB memory budget without accounting for
    the KV cache size, intermediate activations during inference, or peak memory spikes.
    They might also incorrectly treat the Hexagon NPU's 45 TOPS compute capacity as
    the primary bottleneck, rather than identifying memory bandwidth as the limiting
    factor for autoregressive decoding on shared LPDDR5X memory.
  napkin_math: 'Model Weights (INT8): 3 billion parameters * 1 byte/param = 3.0 GB.
    RAM Budget: 16 GB (Total LPDDR5X) - 12 GB (OS/Apps) = 4.0 GB. Remaining RAM for
    KV Cache/Activations: 4.0 GB - 3.0 GB = 1.0 GB. Compute capacity: 45 TOPS (INT8).
    Compute required per token: 3B params * 2 ops = 6 GOPs. Theoretical NPU compute
    limit: 45,000 / 6 = 7,500 tokens/sec. Memory bandwidth limit (assuming ~64 GB/s
    for LPDDR5X): 64 GB/s / 3.0 GB = ~21 tokens/sec. This proves the architecture
    is severely memory-bandwidth bound, not compute bound.'
