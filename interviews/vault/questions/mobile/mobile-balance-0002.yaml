title: Mobile Validation Energy Budget
scenario: A mobile app validates local training examples before upload. Validation takes 0.5 ms CPU per example. A user generates 2,000 candidate examples/day. Estimate CPU time and whether it is likely to be user-visible.
question: How much CPU time does mobile validation use for 2,000 examples/day at 0.5 ms each?
details:
  realistic_solution: CPU time is 2,000 x 0.5 ms = 1,000 ms, or 1 second per day. That is unlikely to be user-visible if batched in the background or while charging, but thermal and privacy constraints still matter.
  common_mistake: Rejecting validation as too expensive without computing the actual daily CPU time.
  napkin_math: 2,000 x 0.5 ms = 1,000 ms = 1 s/day.
