title: CoreML ViT ANE Fallback Evaluation
scenario: 'You are deploying a 15M parameter Vision Transformer (ViT) for real-time video processing (60
  FPS) on an iPhone 14 Pro (A16 Bionic). Initial CoreML profiling shows the model takes 25ms per frame,
  missing the 16.6ms budget. The trace reveals frequent context switching between the Apple Neural Engine
  (ANE) and the GPU because the ANE does not natively support the specific ''Einsum'' and dynamic reshape
  operations used in your attention blocks. Evaluate the trade-offs of the following optimization paths:
  1) Quantizing the model to INT8 to accelerate GPU execution, 2) Rewriting the attention blocks using
  1x1 convolutions to force full ANE execution, or 3) Manually partitioning the model to run the CNN backbone
  on ANE and attention heads on GPU.'
details:
  realistic_solution: Rewriting the attention blocks to use ANE-friendly operations (e.g., swapping Einsum
    for standard 1x1 convolutions and static shapes) to ensure the entire computation graph executes on
    the ANE. This completely eliminates ANE-GPU context switching overhead, achieving the sub-16.6ms latency
    target.
  common_mistake: Assuming INT8 quantization on GPU is the primary fix, while completely ignoring the
    massive latency penalties associated with intermediate tensor transfers between ANE and GPU.
  napkin_math: ANE<->GPU transfer overhead ≈ 1.5ms per switch. With 4 attention blocks causing fallbacks,
    that's 8 switches per frame = 12ms pure overhead. Frame budget at 60 FPS = 16.6ms. The overhead alone
    consumes 72% of the budget. Eliminating switches drops latency from 25ms to ~13ms.
