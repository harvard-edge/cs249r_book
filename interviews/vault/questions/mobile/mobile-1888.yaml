title: FedAvg Wi-Fi Star vs Ring
scenario: Three Apple A17 devices on the same local Wi-Fi perform Federated Averaging on a 20 MB gradient vector. The local Wi-Fi supports 400 Mbps effective bandwidth.
question: Evaluate the synchronization time using a Star topology (one device acts as the parameter server) versus a Ring topology.
visual:
  kind: svg
  path: mobile-1888.svg
  alt: Star topology vs Ring topology comparison.
  caption: Star topology for Federated Averaging.
details:
  realistic_solution: In a Star topology, the server receives 2 vectors and sends 2 vectors. Data transferred = 4 * 20 MB = 80 MB (640 Mb). At 400 Mbps, this takes 1.6 s. In a Ring, each node sends 2(N-1) = 4 chunks of 20/3 = 6.67 MB, totaling 26.67 MB per node. Bottlenecked by the network, the shared wireless medium means Ring (3 * 26.67 = 80 MB total) offers no throughput advantage over Star on single-channel Wi-Fi.
  common_mistake: |
    **The Pitfall:** Assuming Ring topology is always faster.
    **The Rationale:** Candidates apply data center networking logic, forgetting that wireless is a shared broadcast medium, unlike switched Ethernet.
    **The Consequence:** Incorrectly concluding Ring topology will save time, when the physical layer bottleneck remains identical.
  napkin_math: |
    - Data transferred in Star = 4 * 20 MB = 80 MB.
    - 80 MB * 8 = 640 Mb.
    - Synchronization time = 640 Mb / 400 Mbps = **1.6 seconds**.
