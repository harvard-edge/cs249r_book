title: LLM Memory Allocation on Snapdragon 8 Gen 3
scenario: Architect a memory budgeting strategy for an on-device conversational AI powered by a 7B parameter model running on the Qualcomm Hexagon NPU (Snapdragon 8 Gen 3). The device features a heterogeneous CPU+GPU+NPU architecture with a shared 16 GB LPDDR5X memory pool. Your design must balance the memory requirements for INT8 weights, dynamic KV-cache, and activations while ensuring the OS and background apps have sufficient memory to prevent system instability.
question: How would you architect a memory budgeting strategy for an on-device conversational AI on Snapdragon 8 Gen 3?
details:
  realistic_solution: 'The design should implement a strict memory ceiling for the NPU process, utilizing Android''s ION or DMA-BUF frameworks for contiguous memory allocation. By quantifying the INT8 model footprint and allocating a dynamic ring-buffer for the KV-cache, the system can gracefully degrade context length instead of causing an OS-level OOM event when approaching the shared memory limit.'
  common_mistake: |
    **The Pitfall:** Treating NPU memory as isolated and ignoring the dynamic growth of the KV-cache.
    **The Rationale:** Candidates fail to design for a unified memory architecture where unbounded context length directly steals memory from the OS.
    **The Consequence:** Overallocation that causes the OS to terminate background apps or triggers a hard system crash (OOM event).
  napkin_math: |
    **Assumptions & Constraints:**
    - Total Unified Memory: 16 GB LPDDR5X.
    - Required OS Reserve: 4 GB.
    - Model Weights (INT8): 7B params * 1 byte = 7 GB.
    - Static Activations/Overhead: 1 GB.
    - Token Cost: ~1 MB per token for the KV-cache.

    **Calculations:**
    - Usable Inference Budget: 16 GB - 4 GB = 12 GB.
    - Remaining for KV-cache: 12 GB - 7 GB - 1 GB = 4 GB.
    - Maximum Context: 4 GB / 1 MB/token = ~4,000 tokens.

    **Conclusion & Interpretation:**
    - **Result: ~4,000 tokens maximum context (Memory-Capacity Bound)**. Treating NPU memory as isolated and ignoring the dynamic growth of the KV-cache leads to overallocation and OS-level OOM events.
