title: 'KV-Cache: Specification — KV Cache Budget for Multi-Turn Code Completion'
scenario: Specify the KV cache budget for a code completion assistant using a 3B LLM on Snapdragon 8 Gen 3 (45 TOPS, 16GB). Requirements include a 16K-token codebase context, real-time completion (< 1s to first token), and < 50ms per subsequent token.
question: How would you specify the KV cache budget, quantization, layout, and context management for this code completion assistant?
details:
  realistic_solution: 'To meet the <50ms TPOT SLA at 77 GB/s bandwidth, total memory reads must be <3.85GB. With 1.5GB INT4 weights, the KV cache must be <2.35GB. A standard FP16 MHA KV cache for 16K tokens is 7.5GB, which would cause 116ms TPOT. Specify GQA (e.g., 8 KV heads) and INT8 quantization, reducing KV size to 0.94GB and TPOT to ~32ms. For the <1s TTFT SLA: computing 16K tokens requires ~160 TFLOPs, taking 3.5s on a 45 TOPS NPU. Therefore, specify persistent prompt caching (background prefill) for the codebase so only new user tokens are prefilled.'
  common_mistake: |
    **The Pitfall:** Focusing only on total memory capacity (16GB) and ignoring bandwidth limits.
    **The Rationale:** Engineers assume that if a KV cache fits in RAM, it will perform well.
    **The Consequence:** Reading a massive 7.5GB FP16 KV cache for every generated token severely violates the 50ms decode latency SLA due to memory bandwidth bottlenecks.
  napkin_math: |
    1. Decode SLA limit: 50ms * 77 GB/s (bandwidth) = 3.85 GB read budget per token.
    2. Weights: INT4 3B model = 1.5 GB. Max KV allowed = 2.35 GB.
    3. FP16 MHA KV (16K tokens): 7.5 GB. TPOT = 9.0GB / 77GB/s = 116ms (Fails).
    4. INT8 GQA KV (8 heads, 16K tokens): 0.94 GB. TPOT = 2.44GB / 77GB/s = 31.7ms (Passes).
    5. Prefill FLOPs (16K tokens): ~160 TFLOPs.
    6. **Conclusion: Prefill takes 3.5s on 45 TOPS NPU; persistent prompt caching is mandatory for <1s TTFT.**
