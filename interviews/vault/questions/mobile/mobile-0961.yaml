title: 'KV-Cache: Specification — KV Cache Budget for Multi-Turn Code Completion'
scenario: 'Specify the KV cache budget for a code completion assistant using a 3B
  LLM on Snapdragon 8 Gen 3 (45 TOPS, 16GB). Requirements: 16K-token codebase context,
  real-time completion (< 1s to first token), and < 50ms per subsequent token. Define
  quantization, layout, and context management.'
question: How would you specify the KV cache budget for a code completion assistant
  using a 3B LLM on Snapdragon 8 Gen 3 (45 TOPS, 16GB)?
details:
  realistic_solution: 'To meet the <50ms TPOT SLA at 77 GB/s bandwidth, total memory reads must be <3.85GB. With 1.5GB INT4 weights, the KV cache must be <2.35GB. A standard FP16 MHA KV cache for 16K tokens is 7.5GB, which would cause 116ms TPOT. Specify GQA (e.g., 8 KV heads) and INT8 quantization, reducing KV size to 0.94GB and TPOT to ~32ms. For the <1s TTFT SLA: computing 16K tokens requires ~160 TFLOPs, taking 3.5s on a 45 TOPS NPU. Therefore, specify persistent prompt caching (background prefill) for the codebase so only new user tokens are prefilled.'
  common_mistake: 'Focusing only on memory capacity (16GB) and missing that reading a 7.5GB KV cache violates the decode latency SLA; failing to calculate that a 16K prefill takes >3s, thus requiring prompt caching to meet the 1s TTFT target.'
  napkin_math: 'Decode SLA limit: 50ms × 77 GB/s = 3.85 GB. INT4 3B model: 1.5 GB. Max KV allowed: 2.35 GB. FP16 MHA KV (28 layers, 32 heads, 128 dim): 28 × 2 × 32 × 128 × 2B = 458 KB/token. At 16K: 7.5 GB. (TPOT: 9.0GB/77 = 116ms -> Fails). INT8 GQA KV (8 heads): 28 × 2 × 8 × 128 × 1B = 57 KB/token. At 16K: 0.94 GB. (TPOT: 2.44GB/77 = 31.7ms -> Passes). Prefill FLOPs: Linear (2×3B×16K) = 98 TFLOPs + Attention (2×28×32×16384²×128) = 61.5 TFLOPs. Total ≈ 160 TFLOPs. 160 TFLOPs / 45 TOPS = 3.5s (Fails 1s SLA without caching).'
