title: 'The On-Device Memory Diet: Quantization Fundamentals'
scenario: 'You''re trying to fit a 7 billion parameter language model onto a high-end smartphone for an on-device feature. The model is currently in FP16 precision. To reduce its memory footprint, you plan to quantize it to INT8.'
question: 'How would you compare the memory requirements for both precisions and calculate the total memory savings in gigabytes?'
details:
  realistic_solution: 'FP16 (half-precision float) uses 2 bytes per parameter. INT8 (8-bit integer) uses 1 byte per parameter. For a 7 billion parameter model, the memory calculation is straightforward. The savings come from halving the memory required for the model weights, which is a critical optimization for memory-constrained mobile devices.'
  common_mistake: 'Engineers often confuse the memory requirements for different precisions, typically assuming FP16 is 4 bytes (like FP32) instead of 2. Another common mistake is to state the final size after quantization, or the original size, rather than the amount of memory *saved*.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Model parameters: 7 Billion.
    - FP16 precision: 2 bytes per parameter.
    - INT8 precision: 1 byte per parameter.

    **Calculations:**
    - FP16 Memory: 7B * 2 bytes = 14 GB.
    - INT8 Memory: 7B * 1 byte = 7 GB.
    - Memory Savings: 14 GB - 7 GB = 7 GB.

    **Conclusion & Interpretation:**
    - **Result: 7 GB Saved (Memory-Bound).** Halving the precision cuts the memory requirement exactly in half, delivering significant space savings.
  options:
  - '14 GB'
  - '3.5 GB'
  - '7 GB'
  - '21 GB'
