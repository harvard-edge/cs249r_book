title: CI/CD Pipeline Design for On-Device LLM on Tensor G3
scenario: Your team needs to design an automated deployment pipeline for regular updates to an on-device
  LLM running on Pixel phones equipped with the Google Tensor G3 chip. The pipeline must guarantee that
  the quantized model, optimized for the G3's on-device TPU (7.5 TOPS), maintains strict training-serving
  consistency. Given the device's 12 GB LPDDR5X shared memory limit, specify the CI/CD stages required
  to profile memory footprint and validate TPU execution latency. How do you design this deployment specification
  to catch performance regressions and consistency issues before over-the-air release?
details:
  realistic_solution: The CI/CD pipeline must include a hardware-in-the-loop (HITL) stage targeting the
    Google Tensor G3 architecture. After quantization, the pipeline should compile the model for the Edge
    TPU and run automated regression tests on physical G3 device farms to measure actual inference latency
    and accuracy. Furthermore, rigorous memory profiling must be integrated to ensure peak RAM usage during
    context generation leaves sufficient headroom within the 12 GB LPDDR5X shared memory for the OS.
  common_mistake: Candidates often design generic CI/CD pipelines focused solely on model accuracy, neglecting
    hardware-in-the-loop (HITL) testing. They frequently fail to specify memory profiling against the
    12 GB limit or forget to validate the exact post-training quantization behavior that the Tensor G3
    TPU requires, leading to training-serving skew.
  napkin_math: For a 3.2B parameter LLM (like Gemini Nano) quantized to INT4, the weights consume ~1.6
    GB of the 12 GB LPDDR5X memory. Assuming the OS uses 6 GB, ~4.4 GB remains for KV cache and app overhead.
    To meet a 20 tokens/sec SLA, each token needs to be generated in 50ms. Generating one token requires
    ~6.4 Giga-operations (3.2B params * 2). At 20 tokens/sec, this demands ~128 GOPS (0.128 TOPS) sustained
    throughput, which fits comfortably within the Tensor G3's 7.5 TOPS on-device TPU limit, though the
    CI/CD pipeline must enforce these latency and memory budgets via automated checks.
