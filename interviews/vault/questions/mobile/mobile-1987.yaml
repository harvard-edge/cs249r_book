title: W4A16 LLM Memory Bound
scenario: An NLP team is deploying a 1B parameter auto-regressive LLM on an Apple
  A17 Pro using W4A16 quantization (4-bit weights). The memory bandwidth is roughly
  50 GB/s.
question: Analyze the memory footprint and the theoretical bandwidth limit for generating
  a single token at batch size 1.
details:
  realistic_solution: A 1B parameter model with 4-bit weights requires 0.5 GB of memory
    footprint. In auto-regressive decoding at batch size 1, the entire weight matrix
    must be loaded from LPDDR to the NPU/GPU for every single token. At 50 GB/s bandwidth,
    loading 0.5 GB strictly bounds the generation speed to a maximum of 100 tokens
    per second, ignoring compute.
  common_mistake: Analyzing the peak TOPS of the Neural Engine instead of recognizing
    that auto-regressive generation at batch size 1 is entirely memory-bandwidth bound.
  napkin_math: 1,000,000,000 * 0.5 bytes = 0.5 GB. 50 GB/s / 0.5 GB = 100 tokens/sec.
