title: W4A16 LLM Memory Bound
scenario: An NLP team is deploying a 1B parameter auto-regressive LLM on a mobile SoC using W4A16 quantization (4-bit weights). The memory bandwidth is roughly 50 GB/s.
question: "What is the theoretical maximum token generation speed for this model at batch size 1?"
details:
  realistic_solution: A 1B parameter model with 4-bit weights requires 0.5 GB of memory footprint. In auto-regressive decoding at batch size 1, the entire weight matrix must be loaded from LPDDR to the NPU/GPU for every single token. At 50 GB/s bandwidth, loading 0.5 GB strictly bounds the generation speed to a maximum of 100 tokens per second, ignoring compute.
  common_mistake: |
    **The Pitfall:** Analyzing the peak TOPS of the Neural Engine to determine generation speed.
    **The Rationale:** Candidates often assume LLM inference is compute-bound, forgetting that auto-regressive generation at batch size 1 is strictly memory-bandwidth bound.
    **The Consequence:** Overestimating performance and failing to implement memory-centric optimizations like speculative decoding or further quantization.
  napkin_math: |
    1. **Assumptions & Constraints:** 1B parameters * 0.5 bytes (4-bit) = 0.5 GB. Memory bandwidth 50 GB/s.
    2. **Calculations:** Max Throughput = 50 GB/s / 0.5 GB/token = 100 tokens/sec.
    3. **Conclusion & Interpretation:** Generation speed is strictly limited to **100 tokens/sec**. **Result: Memory-Bandwidth-Bound**.
