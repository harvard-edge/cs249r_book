title: The Billion-Dollar Fleet Update
scenario: You're a mobile ML systems engineer at an automotive company with a fleet of 100,000 vehicles.
  The company wants to improve its driver drowsiness detection model. The proposal is to collect 10 minutes
  of sensor video from each vehicle to retrain the model centrally in the cloud. A typical 10-minute video
  clip is 250 MB. The fleet contract for cellular data is $10 per GB. Explain the primary economic argument
  for using Federated Learning instead, and calculate the cost of just the data transfer for the centralized
  approach.
question: "How would you explain the primary economic argument for using Federated Learning instead, and calculate the cost of just the data transfer for the centralized approach?"
details:
  realistic_solution: The primary economic argument for Federated Learning (FL) is avoiding massive data
    transfer costs. With FL, only small model updates (gradients or weights), not the raw user data, are
    sent to the server. This drastically reduces data transmission volume and, therefore, cost. For the
    centralized approach, the data transfer cost would be a quarter of a million dollars for this single
    data collection run.
  common_mistake: Engineers often focus on the cloud compute cost (CapEx for GPUs) and completely ignore
    the operational expenditure (OpEx) of data transmission. At fleet scale, cellular data costs can easily
    dominate the entire budget, but this is non-obvious if you only think in terms of single-device usage.
  napkin_math: '1. **Calculate total data volume:** 100,000 vehicles * 250 MB = 25,000,000 MB = 25,000 GB. 2. **Calculate cost:** 25,000 GB * $10/GB = $250,000.'
  options:
  - $2,500 - This is a 'per 1,000 vehicles' error, failing to account for the full fleet size.
  - $25,000 - This is an off-by-10x error, likely from confusing 250MB with 25MB.
  - $250,000 - Correct. This calculation properly scales the per-vehicle data size across the entire fleet.
  - $2.50 - This is the 'single-unit' error, calculating the cost for only one vehicle instead of the
    fleet.
  correct_index: 2
