title: The Billion-Dollar Fleet Update
scenario: You are evaluating data collection for an automotive fleet of 100,000 vehicles to improve a driver drowsiness detection model. The proposal collects a 250 MB video clip from each vehicle to retrain centrally. The fleet cellular contract is $10 per GB.
question: What is the primary economic argument for using Federated Learning, and what is the data transfer cost for the centralized approach?
details:
  realistic_solution: |
    The primary economic driver for Federated Learning (FL) at scale is the elimination of massive data transfer Operational Expenditure (OpEx). By executing distributed gradient descent locally on the vehicle's edge hardware, only highly compressed model weight updates (deltas) are transmitted via Secure Aggregation (SecAgg). This slashes cellular telemetry costs by orders of magnitude. In a centralized system, shifting high-dimensional raw video data across a commercial cellular network incurs an unsustainable $250,000 penalty for a single dataset refresh.
  common_mistake: |
    **The Pitfall:** Focusing only on the cloud compute cost (CapEx for GPUs) and ignoring OpEx.
    **The Rationale:** Engineers often think in terms of single-device usage rather than fleet scale.
    **The Consequence:** They miss that data transmission costs can easily dominate the entire budget for central training.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Fleet size: 100,000 vehicles.
       - Payload per vehicle: 250 MB.
       - Cellular data cost: $10 per GB.
    2. **Calculations:**
       - Total data volume = 100,000 vehicles * 250 MB = 25,000,000 MB.
       - Convert to GB = 25,000,000 MB / 1000 = 25,000 GB.
       - Total transfer cost = 25,000 GB * $10/GB = $250,000.
    3. **Conclusion & Interpretation:**
       - **Result: OpEx-Bound.** The centralized approach incurs a devastating $250,000 bandwidth bill for a single data collection run. FL circumvents this entirely, making edge compute an economic necessity, not just a privacy feature.
  options:
  - $2,500 - This is a 'per 1,000 vehicles' error, failing to account for the full fleet size.
  - $25,000 - This is an off-by-10x error, likely from confusing 250MB with 25MB.
  - $250,000 - Correct. This calculation properly scales the per-vehicle data size across the entire fleet.
  - $2.50 - This is the 'single-unit' error, calculating the cost for only one vehicle instead of the fleet.
  correct_index: 2
