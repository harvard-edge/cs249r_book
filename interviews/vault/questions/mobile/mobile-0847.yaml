title: Mobile Round Completion Estimate
scenario: A mobile FL service invites 60,000 clients. 50% start training and 80% of starters upload a completed local update before the deadline.
question: How many completed local updates are uploaded from 60,000 invited mobile clients if 50% start and 80% of starters upload before the deadline?
details:
  realistic_solution: Completed uploaded updates are 60,000 x 0.5 x 0.8 = 24,000. This is the eligible uploaded round size before secure aggregation validation, anomaly filtering, or weighting.
  common_mistake: |
    **The Pitfall:** Counting invited clients as completed training examples.
    **The Rationale:** Candidates confuse the top of the funnel (invitations) with the bottom of the funnel (completed, uploaded updates).
    **The Consequence:** Overestimating the amount of valid data participating in a federated learning round.
  napkin_math: |
    1. Invited clients: 60,000.
    2. Starting clients: 60,000 * 0.50 = 30,000.
    3. Uploaded updates: 30,000 * 0.80 = **24,000 completed updates**.
