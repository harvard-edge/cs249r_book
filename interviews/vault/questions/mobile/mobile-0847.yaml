title: Mobile Round Completion Estimate
scenario: A mobile FL service invites 60,000 clients. 50% start training and 80% of
  starters upload a completed local update before the deadline. Estimate completed
  uploaded updates.
question: How many completed local updates are uploaded from 60,000 invited mobile
  clients if 50% start and 80% of starters upload before the deadline?
details:
  realistic_solution: Completed uploaded updates are 60,000 x 0.5 x 0.8 = 24,000.
    This is the eligible uploaded round size before secure aggregation validation,
    anomaly filtering, or weighting.
  common_mistake: Counting invited clients as completed training examples.
  napkin_math: 60,000 x 0.5 x 0.8 = 24,000.
