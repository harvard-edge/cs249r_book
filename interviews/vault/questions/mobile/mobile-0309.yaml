title: The 25% Rule for Mobile Memory
scenario: You are scoping a new on-device ML feature for a flagship smartphone that has 8 GB of total RAM.
question: What ML feature memory budget follows from the 25% rule on an 8 GB flagship smartphone?
details:
  realistic_solution: The correct rule of thumb is to budget no more than 25% of the total device RAM for your ML feature. On an 8 GB device, this gives you a 2 GB budget. This conservative figure accounts for the significant memory overhead of the OS, other apps, and background processes, ensuring your feature can run reliably without jeopardizing overall system stability.
  common_mistake: |
    **The Pitfall:** Assuming nearly all advertised device RAM is available for the ML model.
    **The Rationale:** Engineers underestimate the memory consumed by the OS, background services, and the app's own UI footprint.
    **The Consequence:** Models are sized too large, causing the OS to frequently kill the application under memory pressure (OOM kills).
  napkin_math: |
    - **Total RAM:** 8 GB
    - **Rule of Thumb Allocation:** 25% for the primary foreground feature
    - **Calculation:** 8 GB * 0.25 = 2 GB
    - **Final Result:** **The absolute maximum safe budget is 2 GB.**
  options:
  - 6 GB — The 'Cloud Native' misconception, assuming nearly all device RAM is available.
  - 4 GB — The 'Optimist' misconception, underestimating OS and background app memory needs.
  - 2 GB
  - 512 MB — The 'TinyML Mindset' misconception, which is too conservative for a modern flagship phone.
  correct_index: 2
