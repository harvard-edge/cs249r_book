title: KV-Cache Sizing for A17 Pro
scenario: You are deploying a 7B parameter LLM quantized to 4-bit on an iPhone 15 Pro utilizing the Apple
  A17 Pro Neural Engine. The A17 Pro shares 8 GB of unified memory across the CPU, GPU, and 16-core NPU.
  Given that the OS reserves 2.5 GB and the model weights consume 3.5 GB, calculate the memory required
  for a 4096-token KV-cache (FP16, 32 layers, 32 heads, 128 head dimension) and determine if it fits in
  the remaining RAM.
question: "How much FP16 KV-cache memory does a 4096-token 7B A17 Pro LLM need, and does it fit?"
details:
  realistic_solution: The KV-cache calculation yields exactly 2 GB, which consumes all remaining unified
    memory and leaves zero room for intermediate activations or peak memory spikes. A realistic solution
    involves reducing the KV-cache footprint by implementing Grouped-Query Attention (GQA), applying 8-bit
    KV-cache quantization, or restricting the maximum context window.
  common_mistake: Candidates frequently forget to multiply by 2 for both Key and Value tensors, or forget
    that FP16 requires 2 bytes per element. They also often fail to subtract the OS and model weight footprints
    from the 8 GB shared unified memory of the A17 Pro.
  napkin_math: Bytes per token per layer = 2 (Key + Value) * 32 (heads) * 128 (dim) * 2 bytes (FP16) =
    16,384 bytes. Total KV memory per token = 16,384 bytes * 32 (layers) = 524,288 bytes (~0.5 MB). Total
    KV-cache for 4096 tokens = 4096 * 0.5 MB = 2048 MB (2 GB). Available memory = 8 GB (Total) - 2.5 GB
    (OS) - 3.5 GB (Weights) = 2.0 GB. The cache will exactly consume the remaining memory.
