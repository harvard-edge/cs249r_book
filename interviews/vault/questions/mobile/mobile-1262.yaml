title: Diagnosing Thermal Throttling from Memory Bound NPU Workloads
scenario: You are deploying a custom vision transformer on the Qualcomm Hexagon NPU within a Snapdragon 8 Gen 3. The model runs within the 45 TOPS INT8 budget and meets the 30 FPS target. However, user reports indicate severe battery drain and the device thermally throttles after 10 minutes of use. System tracing reveals the shared 16 GB LPDDR5X memory bus is saturated during inference.
question: "Why does a Snapdragon 8 Gen 3 ViT drain battery and throttle after 10 minutes despite meeting FPS and TOPS targets?"
details:
  realistic_solution: The root cause is excessive off-chip memory traffic to the LPDDR5X RAM. According to the Horowitz energy principles, accessing DRAM costs orders of magnitude more energy than an INT8 ALU operation. The model likely has unfused layers or large intermediate activations that exceed the NPU's local SRAM, forcing constant reads and writes to main memory. The fix involves aggressive operator fusion, reducing activation sizes, or redesigning the network to increase arithmetic intensity.
  common_mistake: |
    **The Pitfall:** Focusing solely on optimizing the NPU compute operations (TOPS) and assuming the compute unit is drawing too much power.
    **The Rationale:** Engineers look at execution time and ignore data movement, missing the fundamental principle that off-chip memory access is orders of magnitude more energy-intensive than on-chip math.
    **The Consequence:** Compute optimizations yield negligible power savings, and the device continues to overheat due to memory bus saturation.
  napkin_math: |
    * INT8 MAC operation energy = ~0.1 pJ.
    * Off-chip LPDDR5X read/write energy = ~100 pJ per byte (1000x more expensive).
    * Assume an unfused layer spills a 10 MB activation tensor to main memory.
    * Read/Write boundary cost = 10,000,000 bytes * 2 (write then read) * 100 pJ = 2,000,000,000 pJ = 2 mJ per inference.
    * At 30 FPS: 2 mJ * 30 = 60 mW of continuous power drain.
    * **This single memory spill vastly outweighs the power consumed by the actual NPU arithmetic.**
