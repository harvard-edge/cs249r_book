title: Evaluating Embedding Model Quality vs Size Tradeoff on A17 Pro
scenario: 'An A17 Pro (8GB, 35 TOPS) RAG app needs to choose between three embedding models: Model A (22M params, 128-dim, MRR@10=0.61, 25ms), Model B (33M params, 256-dim, MRR@10=0.72, 40ms), Model C (66M params, 384-dim, MRR@10=0.78, 80ms). The app performs 5 retrievals per user session.'
question: How would you evaluate which model maximizes quality within a 200ms retrieval budget per session and a 100MB memory limit for the embedding model?
details:
  realistic_solution: 'Eliminate Model C: 66M INT8 = 66MB (fits memory) but 5*80ms=400ms exceeds 200ms budget. Model A: 5*25ms=125ms (budget OK), 22MB INT8 (fits), MRR=0.61. Model B: 5*40ms=200ms (exactly at budget), 33MB INT8 (fits), MRR=0.72. Model B is optimal: 18% higher MRR than A at the exact budget limit. Validate Model B latency is P95 not mean — if 40ms is mean and P95 is 65ms, then 5*65ms=325ms exceeds budget. Use Model B with a 35ms per-embedding timeout (abort and use approximate result if exceeded) to guarantee budget compliance.'
  common_mistake: |
    **The Pitfall:** Choosing Model C purely for its highest MRR score.
    **The Rationale:** Failing to enforce the strict system constraints (100MB memory limit or 200ms latency budget).
    **The Consequence:** The application exceeds the latency budget, creating an unacceptable user experience, or gets killed for excessive memory use.
  napkin_math: |
    - Budget: 200ms, Memory: 100MB.
    - Model A (22M params * 1 byte = 22MB INT8): 5 * 25ms = 125ms (Passes memory and latency).
    - Model B (33M params * 1 byte = 33MB INT8): 5 * 40ms = 200ms (Passes memory and exactly hits latency).
    - Model C (66M params * 1 byte = 66MB INT8): 5 * 80ms = 400ms (Fails latency).
    - Quality Comparison (Model B vs A): 0.72 / 0.61 = 1.18 (18% improvement).
    - **Result: Model B provides the highest MRR while exactly hitting the 200ms budget limit.**
