title: The Federated Gradient Compression Trade-Off
scenario: In your federated learning system, 100 mobile devices each produce a 50 MB gradient update per round. The team applies 10x gradient compression using Top-K Sparsification and quantization.
question: How would you calculate the per-round upload volume and analyze the convergence trade-off of aggressive compression?
details:
  realistic_solution: 'Uncompressed: 100 x 50 MB = 5 GB per round. With 10x compression: 100 x 5 MB = 500 MB per round. At 10 Mbps upload, each device takes 4 seconds instead of 40 seconds. Trade-off: convergence may require 2-3x more rounds (200-300 vs 100), but total communication drops from 500 GB to 100-150 GB across the full training run. Net win if upload bandwidth is the bottleneck.'
  common_mistake: |
    **The Pitfall:** Assuming aggressive gradient compression is a lossless "free lunch."
    **The Rationale:** Engineers focus purely on the network bandwidth savings.
    **The Consequence:** Top-K Sparsification discards 90% of gradient components, which can slow convergence by 2-5x in rounds needed, partially offsetting the communication savings.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Devices: 100.
       - Uncompressed Gradient: 50 MB.
       - Compression Ratio: 10x.
       - Upload Speed: 10 Mbps (1.25 MB/s).
    2. **Calculations:**
       - Uncompressed Volume: 100 x 50 MB = 5,000 MB (5 GB) per round.
       - Compressed Volume: 100 x 5 MB = 500 MB per round.
       - Upload Time: 50 MB / 1.25 MB/s = 40s (Uncompressed) vs 5 MB / 1.25 MB/s = 4s (Compressed).
       - Total Bandwidth Uncompressed (100 rounds): 5 GB x 100 = 500 GB.
       - Total Bandwidth Compressed (250 rounds due to accuracy hit): 500 MB x 250 = 125 GB.
    3. **Conclusion & Interpretation:**
       - **Result: 125 GB Total Transfer** (Network-Bandwidth-Bound).
