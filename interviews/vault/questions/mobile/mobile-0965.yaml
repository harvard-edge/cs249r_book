title: 'Latency Decomposition: Compute TTFT and TPOT for On-Device LLM on Snapdragon 8 Gen 3'
scenario: A 2B-parameter LLM (INT4 quantized) runs on Snapdragon 8 Gen 3 (45 TOPS INT8, 16GB LPDDR5X at ~77 GB/s effective). Assume 32 layers, hidden dim 2560.
question: "How would you compute TTFT for a 256-token prompt and TPOT for decode?"
details:
  realistic_solution: 'INT4 model size: 2B × 0.5 bytes = 1GB. Decode BW-bound: 1GB / 77GB/s ≈ 13ms/token. TTFT: 2×256×2B FLOPs = 1.024T FLOPs. At 45 TOPS INT8 → INT4 effective ~90 TOPS. 1.024T/90T ≈ 11.4ms. Realistic with memory overhead: ~19ms TTFT, 13ms/token decode.'
  common_mistake: |
    **The Pitfall:** Blindly using the 45 TOPS (INT8) specification for an INT4 quantized model calculation.
    **The Rationale:** Engineers often forget that many modern NPUs (like the Hexagon DSP in Gen 3) support native INT4 acceleration, doubling the effective throughput.
    **The Consequence:** The calculated TTFT (Time To First Token) is twice as slow as reality.
  napkin_math: |
    - **INT4 Weights:** 2B params * 0.5 bytes = **1 GB**.
    - **Decode TPOT (Memory Bound):** 1 GB / 77 GB/s = **13ms/token**.
    - **Prefill FLOPs:** 2 * 256 tokens * 2B params = **1.024T FLOPs**.
    - **Compute Time:** INT4 effective TOPS ~90T (2x INT8). 1.024T / 90T = 11.4ms.
    - **Realistic TTFT:** Assuming 60% utilization, 11.4ms / 0.6 = **~19ms TTFT**.
