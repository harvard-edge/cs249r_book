title: LLM Operator Scheduling on Hexagon NPU
scenario: You are tasked with optimizing the inference latency and memory footprint of a critical, computationally intensive block within a large language model (LLM) for deployment on the Snapdragon 8 Gen 3 Hexagon NPU. The NPU provides 45 TOPS (INT8) and has shared access to 12-16 GB LPDDR5X system memory. The LLM block consists of a sequence of operators, some of which are memory-bound (e.g., element-wise operations with large tensors), while others are compute-bound (e.g., matrix multiplications).
question: How would you schedule an LLM block on the Hexagon NPU to reduce latency, reuse memory, exploit parallelism, and apply layer fusion to meet a 100ms latency target?
details:
  realistic_solution: 'A realistic solution involves a multi-pronged approach: 1. **Computational Graph Analysis**: Represent the LLM block as a DAG (Directed Acyclic Graph) to identify data dependencies and potential parallelism. 2. **Memory-Aware Scheduling**: Employ algorithms (e.g., critical path scheduling, register allocation for tensors) to determine an execution order that maximizes in-place operations and minimizes peak memory footprint. This might involve techniques like ''lifetime analysis'' of tensors. 3. **Layer Fusion**: Identify sequences of operations that can be fused into a single kernel (e.g., Conv-BN-ReLU, MatMul-Add-Activation) to reduce memory reads/writes and kernel launch overheads. This requires understanding the NPU''s supported fusion patterns. 4. **Parallelism Exploitation**: Schedule independent subgraphs or operations to run concurrently on different NPU cores/units, ensuring proper synchronization and resource allocation. 5. **Profiling and Iteration**: Start with an initial schedule, profile its performance on the target NPU, analyze bottlenecks (compute, memory bandwidth, or latency), and iteratively refine the scheduling strategy based on real-world measurements.'
  common_mistake: |
    **The Pitfall:** Prioritizing compute utilization without adequately considering memory access patterns and bandwidth limitations.
    **The Rationale:** Candidates often focus purely on parallelizing matrix multiplications and maximizing TOPS utilization.
    **The Consequence:** Naive scheduling leads to excessive data movement between DRAM and NPU caches, significantly bottlenecking performance even if the NPU's raw compute is underutilized.
  napkin_math: |
    - Budget for 100ms latency: 45 TOPS * 0.1 sec = 4.5 Trillion INT8 operations.
    - For a 100 GOPS block: Theoretical compute time = 100 * 10^9 / (45 * 10^12) = 0.0022 seconds (2.2ms).
    - LPDDR5X bandwidth: ~50 GB/s.
    - Transferring 1 GB of data takes ~20ms.
    - **Even small data transfers consume a massive portion of the latency budget compared to raw compute.**
