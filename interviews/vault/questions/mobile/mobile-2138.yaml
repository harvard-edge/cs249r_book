title: NPU DMA Ring Buffer KV
scenario: A Snapdragon 8 Gen 3 runs a 7B local assistant. The KV cache is managed in an NPU SRAM (4MB) and spills to LPDDR5X via a DMA ring buffer.
question: What memory bandwidth and DMA overhead are consumed by reading a 128MB KV cache for a 1024-token context at 10 tok/s?
details:
  realistic_solution: In autoregressive decoding, the entire 128MB KV cache history must be read per generated token. Generating at 10 tokens per second requires 1.28 GB/s of continuous bandwidth. The 200us DMA barrier per token adds 2ms of cumulative synchronization overhead over the 10 tokens.
  common_mistake: |
    **The Pitfall:** Calculating KV size based only on the model's forward pass activation size.
    
    **The Rationale:** Engineers fail to realize that autoregressive decoding requires re-reading the entire cumulative KV history per generated token.
    
    **The Consequence:** They grossly underestimate the required LPDDR5X memory bandwidth, leading to massive generation slowdowns.
  napkin_math: |
    1. **Calculate Bandwidth:** Reading 128 MB per token at 10 tokens/sec = 128 MB * 10 = 1.28 GB/s.
    2. **Calculate DMA Overhead:** 200us barrier * 10 tokens = 2 ms of synchronization overhead per second.
    3. **Result:** Generating 10 tok/s consumes **1.28 GB/s bandwidth** and **2 ms/s DMA overhead**.
