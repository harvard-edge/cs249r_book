title: NPU DMA Ring Buffer KV
scenario: A Snapdragon 8 Gen 3 runs a 7B local assistant. The KV cache is managed
  in an NPU SRAM (4MB) and spills to LPDDR5X via a DMA ring buffer.
question: Calculate the memory bandwidth consumed by reading a 128MB KV cache for
  a 1024-token context, given a 200us DMA synchronization barrier per token generation.
details:
  realistic_solution: In autoregressive decoding, the entire 128MB KV cache history
    must be read per generated token. Generating at 10 tokens per second requires
    1.28 GB/s of continuous bandwidth. The 200us DMA barrier per token adds 2ms of
    cumulative synchronization overhead over the 10 tokens.
  common_mistake: Calculating KV size based on the model's forward pass activation
    size rather than the cumulative KV history required per-token autoregressive decoding.
  napkin_math: 128MB read * 10 tok/s = 1.28 GB/s. DMA Sync = 10 * 200us = 2ms overhead
    per second.
