title: The Mobile Jank Budget (mobile-0378)
scenario: "You're an ML engineer on a mobile team. Your product manager wants to run a new on-device model on the main UI thread."
question: "To avoid noticeable UI stutter or 'jank' on a standard 60Hz display, what is the generally accepted maximum latency budget for your model's inference?"
details:
  realistic_solution: "The standard latency budget to avoid UI jank on a 60Hz mobile display is strictly 16ms. The mobile OS compositor must render the entire screen every 60th of a second. If the UI thread is blocked by ML inference past this threshold, the OS drops the frame, causing a visibly jarring lag."
  common_mistake: |
    **The Pitfall:** Confusing the UI refresh budget with video processing deadlines (33ms) or backend service latency (100ms).
    **The Rationale:** Candidates fail to differentiate between 30 FPS video pipelines and 60Hz UI rendering loops.
    **The Consequence:** The model exceeds the frame time, dropping frames and causing severe visible stutter during user interaction.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Standard mobile display refresh rate = 60 Hz.
    2. **Calculations:**
       - Time per frame = 1 second / 60 frames = 1000 ms / 60 ≈ 16.67 ms.
    3. **Conclusion & Interpretation:**
       - **Result: Latency-Bound.** The model must complete inference within **16 ms** to allow the OS to render the frame without missing the vertical sync deadline.
  options:
  - 100 ms
  - 33 ms
  - 16 ms
  - 1 ms
  correct_index: 2
