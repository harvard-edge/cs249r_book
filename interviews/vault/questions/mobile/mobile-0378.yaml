title: The Mobile Jank Budget (mobile-0378)
scenario: You're an ML engineer on a mobile team. Your product manager wants to run
  a new on-device model on the main UI thread. To avoid noticeable UI stutter or 'jank'
  on a standard 60Hz display, what is the generally accepted maximum latency budget
  for your model's inference?
question: To avoid noticeable UI stutter or 'jank' on a standard 60Hz display, what
  is the generally accepted maximum latency budget for your model's inference?
details:
  realistic_solution: The standard latency budget to avoid UI jank on a 60Hz mobile
    display is 16ms. Mobile operating systems need to redraw the entire screen every
    60th of a second. If a task on the main thread, like your model's inference, occupies
    the CPU for longer than this period, a frame will be 'dropped', causing a visible
    stutter in the animation or user interaction.
  common_mistake: Engineers often confuse the UI refresh budget with other latency
    targets. They might misremember it as a video processing deadline (33ms for 30
    FPS) or a backend service latency (100ms). They forget that the UI thread must
    yield in time for the OS to render the next frame, which happens every 16ms on
    a 60Hz screen.
  napkin_math: A 60Hz display refreshes 60 times per second.
  options:
  - 100 ms
  - 33 ms
  - 16 ms
  - 1 ms
  correct_index: 2
