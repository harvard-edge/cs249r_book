title: Mobile 7B LLM Memory Tiers
scenario: A smartphone loads a 7B LLM from UFS 4.0 storage to LPDDR5X RAM, executing generation loops on the NPU's internal SRAM.
question: Identify which memory tier acts as the primary bandwidth bottleneck during single-batch token generation.
details:
  realistic_solution: Autoregressive decoding at batch size 1 necessitates streaming the entire 14 GB FP16 model weight payload through the compute units for every single token. Since this footprint vastly exceeds the NPU's ~10 MB SRAM limits, the weights must be fetched sequentially from main memory. Therefore, the LPDDR5X bus acts as the absolute bottleneck dictating token generation latency.
  common_mistake: |
    **The Pitfall:** Confusing model load time with generation latency.
    **The Rationale:** Candidates identify UFS 4.0 storage as the slowest tier and assume it bottlenecks token generation.
    **The Consequence:** They misunderstand that once the model is loaded into RAM, the UFS storage is no longer involved in the token-by-token generation loop.
  napkin_math: |
    **Assumptions & Constraints:**
    - Parameter Footprint (7B FP16): ~14 GB.
    - NPU SRAM limit: ~10 MB.

    **Calculations:**
    - 14 GB >> 10 MB.
    - Weights must stream continuously from LPDDR5X RAM.

    **Conclusion & Interpretation:**
    - **Result: LPDDR5X Bottleneck (Memory-Bandwidth-Bound)**. Token generation is strictly memory-bandwidth-bound by main RAM limits.
