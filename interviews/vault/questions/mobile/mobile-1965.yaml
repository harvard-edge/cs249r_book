title: Mobile 7B LLM Memory Tiers
scenario: A smartphone loads a 7B LLM from UFS 4.0 storage to LPDDR5X RAM, executing
  generation loops on the NPU's internal SRAM.
question: Identify which memory tier acts as the primary bandwidth bottleneck during
  single-batch token generation.
visual:
  kind: svg
  path: mobile-1965.svg
  alt: Bar chart showing UFS 4.0 at ~4 GB/s, LPDDR5X at ~60 GB/s, and SRAM at ~1000
    GB/s.
  caption: Bandwidth discrepancies across memory tiers.
details:
  realistic_solution: During single-batch token generation (decoding phase), the process
    is severely memory-bandwidth bound. Since the 7B parameters (~14GB in FP16) cannot
    fit in the NPU SRAM, they must be streamed continuously from the LPDDR5X RAM.
    Thus, LPDDR5X bandwidth dictates tokens/sec.
  common_mistake: Claiming UFS 4.0 is the bottleneck, confusing model load time with
    generation latency.
  napkin_math: 14GB > 10MB SRAM limit
