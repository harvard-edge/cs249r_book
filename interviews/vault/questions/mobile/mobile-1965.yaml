title: Mobile 7B LLM Memory Tiers
scenario: A smartphone loads a 7B LLM from UFS 4.0 storage to LPDDR5X RAM, executing generation loops on the NPU's internal SRAM.
question: Identify which memory tier acts as the primary bandwidth bottleneck during single-batch token generation.
visual:
  kind: svg
  path: mobile-1965.svg
  alt: Bar chart showing UFS 4.0 at ~4 GB/s, LPDDR5X at ~60 GB/s, and SRAM at ~1000 GB/s.
  caption: Bandwidth discrepancies across memory tiers.
details:
  realistic_solution: During single-batch token generation (decoding phase), the process is severely memory-bandwidth bound. Since the 7B parameters (~14GB in FP16) cannot fit in the NPU SRAM, they must be streamed continuously from the LPDDR5X RAM. Thus, LPDDR5X bandwidth dictates tokens/sec.
  common_mistake: |
    **The Pitfall:** Confusing model load time with generation latency.
    **The Rationale:** Candidates identify UFS 4.0 storage as the slowest tier and assume it bottlenecks token generation.
    **The Consequence:** They misunderstand that once the model is loaded into RAM, the UFS storage is no longer involved in the token-by-token generation loop.
  napkin_math: |
    - Parameter Footprint (7B FP16): ~14 GB.
    - NPU SRAM limit: ~10 MB.
    - **14 GB >> 10 MB**. Weights must stream continuously from LPDDR5X RAM, making it the bottleneck.
