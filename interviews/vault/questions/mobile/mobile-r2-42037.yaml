title: SoC Die-to-Die Interconnect for Heterogeneous Inference
scenario: The Snapdragon 8 Gen 3 splits a 7B model across its Hexagon NPU, Adreno GPU, and Cortex-X4 CPU
  for heterogeneous inference. The NoC provides 60 GB/s NPU-to-memory, 40 GB/s GPU-to-memory, and 30 GB/s
  between NPU and GPU directly. Design the layer-to-accelerator mapping that minimizes cross-accelerator
  data transfer.
question: "How would you design the layer-to-accelerator mapping that minimizes cross-accelerator data transfer?"
details:
  realistic_solution: '7B model: embedding (50M params) → 32 transformer blocks → LM head (50M params).
    Each transformer block: attention (QKV projection + softmax + output, FP16-heavy) + FFN (2 linear
    layers, INT8-quantizable). Mapping: (1) Embedding + LM head → CPU. These are lookup tables (embedding)
    and small matmuls — CPU''s large L2 cache handles them in 1-2ms. Data: 4096 × 4096 × 2 = 32 MB output,
    sent to NPU at 30 GB/s = 1.1ms. (2) FFN layers (all 32) → NPU at INT8. FFN = 2 × 4096 × 11008 × 32
    = 2.9B INT8 ops. NPU at 45 TOPS: 2.9T / 45T = 64ms. (3) Attention layers → GPU at FP16. Attention
    = 4 × 4096² × 32 = 2.1B FP16 ops. GPU at 4.6 TFLOPS: 2.1T / 4.6T = 460ms... too slow. Better: attention
    also on NPU with FP16 fallback. Cross-accelerator transfer: only embedding output (32 MB) and final
    logits — minimal.'
  common_mistake: Splitting the model by layer count (equal layers per accelerator). Layers have vastly
    different compute profiles — attention is parallelizable (GPU), FFN is INT8-efficient (NPU), and embedding
    lookup is cache-friendly (CPU). Split by compute affinity, not layer count.
  napkin_math: 'CPU embedding: 1ms compute + 1.1ms transfer = 2.1ms. NPU FFN (INT8): 2.9 TOPS / 45 TOPS
    = 64ms. NPU attention (FP16): 2.1 TOPS / 22.5 TFLOPS (FP16 mode) = 93ms. Total: 2.1 + 64 + 93 = 159ms
    per token = 6.3 tok/s. Cross-unit transfer: 32 MB × 2 (in/out) / 30 GB/s = 2.1ms. Transfer overhead:
    2.1/159 = 1.3%. Latency dominated by compute, not interconnect.'
