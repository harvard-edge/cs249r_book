title: The Offline-First ML Design
scenario: You're building a plant identification app that must work in remote areas without connectivity. The cloud model (ResNet-152, 230 MB, 96% accuracy) is too large for on-device. The target device is a mid-range phone with 4 GB RAM and 64 GB storage.
question: How do you design an offline-first architecture that bridges the accuracy gap within a strict on-device storage budget?
details:
  realistic_solution: 'Design a tiered offline-first system: ship a domain-tuned 5.3 MB model on-device. Implement confidence thresholding: high-confidence predictions are shown immediately offline, while low-confidence predictions are saved and submitted for deferred verification by the 96% accurate 230 MB cloud model once connectivity is restored.'
  common_mistake: |
    **The Pitfall:** Compressing the ResNet-152 to fit on-device.
    **The Rationale:** Assuming post-training quantization/pruning is always better than a native mobile architecture.
    **The Consequence:** Yielding a severely degraded model that is still too large, instead of using a fast, domain-tuned mobile network.
  napkin_math: |
    - Cloud model: 230 MB (96% acc).
    - On-device model: 5.3 MB (92% acc).
    - Size reduction: 43x. Accuracy gap: 4%.
    - Storage footprint: 5.3 MB / 64 GB = 0.008%.
    - RAM footprint: (5.3 MB + 50 MB runtime) / 4 GB = ~1.4%.
    - **Using a 5.3 MB mobile-native model with deferred cloud verification solves the constraints with <2% resource footprint.**
  options:
  - The memory leak is in the framework's autograd graph; disabling gradient computation with torch.no_grad() will fix it.
  - Just compress the ResNet-152 to fit on-device.
  - Design a tiered offline-first system: ship the domain-tuned 5.3 MB model on-device. This achieves a 43x size reduction and easily fits within the device's RAM and storage budgets.
  - The accuracy degradation is caused by numerical instability in the framework's matrix multiplication kernels, not by the model or data.
  correct_index: 2
