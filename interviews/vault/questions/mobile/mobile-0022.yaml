title: The Offline-First ML Design
scenario: You're building a plant identification app that must work in remote areas without connectivity. The cloud model (ResNet-152, 230 MB, 96% accuracy) is too large to fit the device's 4 GB RAM and 64 GB storage limits gracefully.
question: How do you design an offline-first architecture that bridges the accuracy gap within a strict on-device storage budget?
details:
  realistic_solution: 'Deploy a tiered, offline-first execution architecture: ship a heavily domain-tuned 5.3 MB lightweight model physically on-device. Apply confidence thresholding: high-confidence edge predictions show immediately. Low-confidence images are persisted to a local queue, pending deferred asynchronous verification by the 96% accurate 230 MB cloud cluster once connectivity restores.'
  common_mistake: |
    **The Pitfall:** Insisting on deploying the massive ResNet-152 via brute-force compression.
    **The Rationale:** Dogmatically assuming post-training quantization and unstructured pruning always yield better results than a ground-up mobile-native architecture.
    **The Consequence:** Shipping a severely accuracy-degraded model that still consumes massive amounts of RAM, evicting the OS background state.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target Hardware Limits: 4 GB RAM, 64 GB Storage.
    - Cloud Model: 230 MB (96% accuracy).
    - Mobile Model: 5.3 MB (92% accuracy, domain-tuned).

    **Calculations:**
    - Storage footprint: 5.3 MB / 64,000 MB = ~0.008% of disk.
    - RAM footprint: (5.3 MB weights + 50 MB execution runtime) / 4096 MB = ~1.35% of total RAM.
    - Compression Ratio vs Cloud: 230 MB / 5.3 MB = ~43x space reduction.

    **Conclusion & Interpretation:**
    - **Result: 1.35% RAM (Memory-Bound)**. A highly compressed 5.3 MB mobile network drastically drops the resource overhead to <1.5%, flawlessly solving the hardware constraints while utilizing cloud validation for edge cases.
  options:
  - 'The memory leak is in the framework''s autograd graph; disabling gradient computation with torch.no_grad() will fix it.'
  - 'Apply INT8 post-training quantization directly to ResNet-152 to shrink it from 230 MB to 57 MB to fit on-device.'
  - 'Design a tiered offline-first system: ship the domain-tuned 5.3 MB model on-device. This achieves a 43x size reduction and easily fits within the device''s RAM and storage budgets.'
  - 'Prune the 230 MB model dynamically at runtime based on available device RAM.'
