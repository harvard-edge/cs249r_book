title: Hexagon NPU Thermal Degradation
scenario: An AR application on a device with a Snapdragon 8 Gen 3 normally runs its
  primary vision model on the Qualcomm Hexagon NPU. The primary INT8 model requires
  400 GOPS per frame and runs at 30 FPS. Under severe thermal throttling, the OS shifts
  execution to the heterogeneous CPU cluster using a fallback model requiring 80 GOPS
  per frame at 15 FPS, completely powering off the NPU. The system has 16 GB of shared
  LPDDR5X memory. Explain why the system chooses to switch to a less efficient CPU
  fallback rather than simply running the primary model at a reduced 15 FPS on the
  NPU.
question: Why the system chooses to switch to a less efficient CPU fallback rather
  than simply running the primary model at a reduced 15 FPS on the NPU?
details:
  realistic_solution: In extreme thermal events, the SoC must power-gate entire IP
    blocks to prevent localized thermal runaway. Although the Hexagon NPU has a 45
    TOPS INT8 peak and is highly efficient, running the primary model at 15 FPS still
    generates concentrated heat in the NPU silicon area. Shifting a significantly
    smaller workload to the CPU cluster reduces overall system compute and spreads
    the thermal load to a different physical area of the die, allowing the NPU region
    to cool while maintaining a fail-operational state for the user.
  common_mistake: Candidates often assume that because the NPU is strictly more power-efficient
    per MAC than the CPU, all degraded modes should remain on the NPU at lower clock
    speeds. They fail to account for localized dark silicon effects and thermal pooling,
    where the NPU's physical die area must be completely power-gated to shed heat.
  napkin_math: 'Primary Model Compute: 400 GOPS/frame * 30 FPS = 12 TOPS (26.6% of
    45 TOPS NPU peak). Degraded NPU Compute (if kept on NPU at 15 FPS): 400 GOPS/frame
    * 15 FPS = 6 TOPS. Fallback CPU Compute: 80 GOPS/frame * 15 FPS = 1.2 TOPS. Shifting
    to the CPU fallback reduces the overall compute load by 10x (from 12 TOPS to 1.2
    TOPS) and drops the NPU''s active thermal dissipation strictly to 0 TOPS.'
