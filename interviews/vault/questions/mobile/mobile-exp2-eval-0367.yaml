title: Evaluating Shadow vs. Canary on Snapdragon 8 Gen 3
scenario: Your team is rolling out a new on-device real-time video super-resolution model targeting the
  Qualcomm Hexagon NPU on the Snapdragon 8 Gen 3. You need to choose between a shadow deployment (running
  both old and new models concurrently) and a canary rollout (running the new model for 5% of users).
  The new model requires 15 TOPS INT8 and 2 GB of the shared LPDDR5X memory, while the existing model
  uses 10 TOPS and 1.5 GB. Given the device's 45 TOPS INT8 peak capability and 12-16 GB total shared memory,
  evaluate which strategy is better and present the trade-offs.
question: "Should a Snapdragon 8 Gen 3 video model rollout use shadow deployment or canary, and what are the trade-offs?"
details:
  realistic_solution: A canary rollout is the superior choice for this mobile scenario. While the Hexagon
    NPU theoretically supports 45 TOPS INT8 (enough for 15 + 10 = 25 TOPS), running both models concurrently
    in a shadow deployment consumes 3.5 GB of the shared memory and over 50% of the NPU's sustained thermal
    envelope, leading to aggressive throttling and battery drain that degrades the user experience. A
    canary rollout with robust telemetry avoids these penalties while still gathering real-world performance
    data.
  common_mistake: Candidates often choose shadow deployment for its safety without realizing the thermal
    and battery implications of running two heavy models simultaneously on a mobile device, or they ignore
    the memory bandwidth constraints of the shared LPDDR5X when multiple models are active.
  napkin_math: Concurrent shadow execution requires 15 (new) + 10 (old) = 25 TOPS INT8. While 25 < 45
    TOPS (peak), sustained execution will hit thermal limits quickly. Memory usage is 2 GB + 1.5 GB =
    3.5 GB, which is ~22-29% of the total 12-16 GB shared LPDDR5X memory, likely causing OS-level app
    evictions. In contrast, canary execution uses only 15 TOPS (33% of peak) and 2 GB (12.5-16.6% of memory),
    staying well within safe operational margins.
