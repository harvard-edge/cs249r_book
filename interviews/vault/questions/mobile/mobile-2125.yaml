title: Wearable SPI DMA Pipeline
scenario: A low-power DSP and a Cortex-M4 MCU pipeline a wake-word model over a 2
  Mbps SPI bus. The DSP compute is 4ms/sample and requires sending a 16KB activation.
question: Determine the pipeline efficiency if the SPI DMA setup takes an additional
  1ms synchronization barrier per frame.
details:
  realistic_solution: The 16KB payload equals 128Kb. At 2 Mbps, the transfer takes
    64ms. Adding the 1ms SPI DMA setup yields a 65ms network bottleneck. Since the
    4ms compute is entirely dwarfed by the 65ms transfer phase, the pipeline is severely
    IO-bound and highly inefficient.
  common_mistake: Dividing bytes by bits-per-second directly without converting, leading
    to an artificially fast transfer time and inflated efficiency.
  napkin_math: 16KB = 128Kb. Transfer = 128Kb / 2000Kbps = 64ms. Sync = 1ms. Efficiency
    = 4ms / 65ms = 6.1%.
