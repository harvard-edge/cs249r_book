title: Wearable SPI DMA Pipeline
scenario: A low-power DSP and a Cortex-M4 MCU pipeline a wake-word model over a 2 Mbps SPI bus. The DSP compute is 4ms/sample and requires sending a 16KB activation.
question: Determine the pipeline efficiency if the SPI DMA setup takes an additional 1ms synchronization barrier per frame.
details:
  realistic_solution: Sending a 128Kb (16KB) payload across a 2 Mbps SPI conduit mandates 64ms of rigid transfer time. Combined with the 1ms IRQ setup barrier, the network dominates the total latency at 65ms. Because the 4ms DSP compute finishes instantly compared to the I/O, the hardware pipeline stalls, indicating disastrously poor utilization of the compute nodes.
  common_mistake: |
    **The Pitfall:** Dividing bytes by bits-per-second directly without converting.
    **The Rationale:** Candidates often overlook unit conversions (bytes to bits) when calculating network transfer times.
    **The Consequence:** This leads to an artificially fast transfer time and a massively inflated pipeline efficiency estimate.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Payload: 16 KB.
       - Network Speed: 2 Mbps (2,000 Kbps).
       - Compute time: 4 ms.
       - Sync penalty: 1 ms.
    2. **Calculations:**
       - Payload in bits: 16 KB * 8 = 128 Kb.
       - Transfer Time: 128 Kb / 2,000 Kbps = 0.064 s (64 ms).
       - Total IO Time: 64 ms + 1 ms = 65 ms.
       - Pipeline Efficiency: 4 ms / 65 ms ≈ 6.15%.
    3. **Conclusion & Interpretation:**
       - **Result: 6.15% Efficiency.** The system is drastically **Network-IO-Bound**, leaving the DSP compute starved.
