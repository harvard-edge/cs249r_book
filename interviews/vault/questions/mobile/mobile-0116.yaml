title: The Power Domain Juggling Act
scenario: 'Your always-on keyword detection model runs on a Snapdragon 8 Gen 3''s Sensing Hub (a low-power DSP island). It draws 2 mW and wakes the main NPU only when it hears the keyword. The product team wants to add always-on face detection using the front camera. They say ''just run a tiny model on the Sensing Hub too.'''
question: 'Why does this seemingly small addition of face detection blow up the power budget by 100x?'
details:
  realistic_solution: 'The Sensing Hub''s ultra-low power is possible because audio keyword detection only requires the microphone. The camera hardware pipeline (Sensor, ISP, DRAM, Interconnect) must power up to deliver visual data, consuming massive power regardless of how tiny the actual inference model on the Sensing Hub is.'
  common_mistake: |
    **The Pitfall:** Ignoring the power cost of the sensor data pipeline and focusing only on the ML model's compute.
    **The Rationale:** Engineers analyze the FLOPs of the tiny vision model, assume it's cheap to run, and forget that acquiring the pixels is vastly more expensive than analyzing them.
    **The Consequence:** The device battery drains in hours rather than weeks, making the feature completely undeployable.
  napkin_math: |
    1. **Audio Baseline:** MEMS mic (0.1 mW) + codec (1 mW) + DSP (0.9 mW) = 2 mW. Battery life: 19 Wh / 0.002 W = 9,500 hours.
    2. **Vision Addition Cost:** Camera sensor (50 mW) + ISP (30 mW) + DRAM (20 mW) + NoC (10 mW) + Sensing Hub ML compute (1 mW) = 111 mW.
    3. **Total Power:** 2 mW + 111 mW = 113 mW.
    4. **Impact:** Battery life plummets to 19 Wh / 0.113 W = **168 hours (7 days)**, an approximate 100x increase in power draw driven entirely by the sensor pipeline.
