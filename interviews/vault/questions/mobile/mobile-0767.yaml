title: The Mobile MoE Memory Illusion
scenario: 'A research team proposes deploying a Mixture of Experts model on mobile: 8 experts of 500M
  parameters each (4B total) in INT4, with top-2 routing so only 1B parameters are active per token. They
  claim it fits in 8 GB because only 0.5 GB of active experts need to be in memory. Explain why this reasoning
  is flawed for mobile deployment.'
details:
  realistic_solution: 'Total model memory: 4B x 0.5 bytes (INT4) = 2.0 GB for all experts. Even though
    only 0.5 GB is active per token, the routing decision changes per token, so all experts must be resident
    in DRAM. You cannot page from flash (200-500 MB/s) fast enough; loading a cold expert from NAND would
    add 1-2 seconds of latency per token. The 2 GB footprint fits in 8 GB, but the team''s 0.5 GB claim
    is misleading.'
  common_mistake: Confusing active compute parameters with memory footprint. On a server with fast NVMe,
    you can page experts in and out. On a mobile device, NAND flash is 1000x slower than DRAM, so all
    experts must reside in memory to avoid catastrophic latency spikes.
  napkin_math: 'All experts: 8 x 500M x 0.5B = 2.0 GB (must be in DRAM). Active per token: 2 x 500M x
    0.5B = 0.5 GB. Flash paging penalty: 0.5 GB / 500 MB/s = 1 second per cold expert load. Unacceptable
    for real-time generation.'
