title: The Mobile MoE Memory Illusion
scenario: A research team proposes deploying a Mixture of Experts model on mobile: 8 experts of 500M parameters each (4B total) in INT4, with top-2 routing so only 1B parameters are active per token. They claim it fits in 8 GB because only 0.5 GB of active experts need to be in memory.
question: Why must an 8-expert INT4 MoE keep all 2GB of experts resident on mobile despite top-2 routing?
details:
  realistic_solution: 'Total model memory: 4B x 0.5 bytes (INT4) = 2.0 GB for all experts. Even though only 0.5 GB is active per token, the routing decision changes per token, so all experts must be resident in DRAM. You cannot page from flash (200-500 MB/s) fast enough; loading a cold expert from NAND would add 1-2 seconds of latency per token. The 2 GB footprint fits in 8 GB, but the team''s 0.5 GB claim is misleading.'
  common_mistake: |
    **The Pitfall:** Confusing active compute parameters with memory footprint.
    **The Rationale:** Engineers used to server environments with fast NVMe assume they can page experts in and out dynamically.
    **The Consequence:** On mobile, NAND flash is ~1000x slower than DRAM, meaning dynamic paging would cause catastrophic latency spikes.
  napkin_math: |
    - **Total MoE memory:** 8 experts * 500M params * 0.5 Bytes (INT4) = 2.0 GB.
    - **Active memory per token:** 2 active experts * 500M params * 0.5 Bytes = 0.5 GB.
    - **Flash paging penalty:** Loading a cold 0.5 GB expert from mobile NAND (assuming 500 MB/s) takes 1 second.
    - **Conclusion:** A 1-second delay per token is unacceptable, thus all **2.0 GB must remain resident in DRAM**.
