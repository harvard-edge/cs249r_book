title: KV-Cache Memory Sizing for Hexagon NPU
scenario: You are deploying a 3B parameter LLM on a smartphone powered by the Qualcomm Hexagon NPU. The device features 12 GB of shared LPDDR5X memory, but the OS restricts your app to a strict 4 GB total memory budget. After loading the 4-bit quantized model weights (1.5 GB) and allocating space for intermediate activations (0.5 GB), you have 2.0 GB left. The model uses Multi-Head Attention with 24 layers, 32 attention heads, and a head dimension of 128.
question: What is the exact memory required for the KV-cache of a 3B LLM (4096 tokens, FP16) on an NPU, and does it fit in 2.0 GB?
details:
  realistic_solution: 'The candidate should correctly apply the standard KV-cache memory formula: 2 (K & V) * num_layers * num_heads * head_dim * seq_len * bytes_per_element. They must systematically plug in the provided architectural parameters to find the total bytes, then evaluate this against the strict device limits of the shared memory pool.'
  common_mistake: |
    **The Pitfall:** Forgetting to multiply by 2 for Keys and Values, or calculating for only a single layer.
    
    **The Rationale:** Developers often recall the formula for a single attention mechanism without accounting for the full network depth and both K/V tensors.
    
    **The Consequence:** The cache size is vastly underestimated, leading to unexpected OOM terminations when deployed on device.
  napkin_math: |
    1. **Identify Parameters:** 24 layers, 32 heads, 128 head dimension, 4096 tokens, 2 bytes/element (FP16).
    2. **Calculate Single Token KV Size:** 2 (Keys & Values) * 24 layers * 32 heads * 128 head_dim * 2 bytes = 393,216 bytes.
    3. **Calculate Total Cache:** 393,216 bytes * 4096 tokens = 1,610,612,736 bytes.
    4. **Convert to Gigabytes:** 1,610,612,736 bytes ≈ 1.5 GB.
    5. **Result:** **1.5 GB < 2.0 GB**, so the KV-cache successfully fits in the remaining memory budget.
