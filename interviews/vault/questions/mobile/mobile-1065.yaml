title: Design Prompt Caching Strategy for Mobile LLM on A17 Pro
scenario: An iOS app uses an NPU to run a 1B parameter assistant. 80% of requests share a common 512-token system prompt. Without caching, TTFT is 200ms (prefill 512 tokens) + 150ms (prefill 256 user tokens) = 350ms. Model is 16 layers, 8 KV heads, 64 head dimension, FP16.
question: What memory cost and TTFT savings come from caching a 512-token system-prompt KV cache across requests?
details:
  realistic_solution: 'System prompt KV size: 512 tokens × 2(KV) × 16L × 8H × 64D
    × 2B = 512 × 32,768B = 16.7MB. A17 Pro has 6GB RAM; persistent 16.7MB is negligible
    (0.28%). TTFT with caching: skip system prompt prefill (save 200ms). New TTFT:
    150ms (user tokens only). Improvement: 200ms / 350ms = 57% reduction in TTFT.
    Cache invalidation: only when system prompt changes (rare in production). Multi-user
    scenario (shared device): cache is user-specific, requires per-user isolation.
    Memory: 16.7MB × max_concurrent_users_cached. For 5 users: 83.5MB — acceptable.
    Implementation: store KV in a fixed memory region, address passed as context to
    each inference call.'
  common_mistake: |
    **The Pitfall:** Ignoring the persistent memory footprint.
    **The Rationale:** Candidates suggest caching the full prompt without sizing the KV cache, ignoring that mobile RAM is highly constrained.
    **The Consequence:** Proposing a cache that might be too large for multi-user shared devices or unexpectedly limit user context lengths.
  napkin_math: |
    - **System Prompt Size:** 512 tokens
    - **KV Cache per Token:** 2 (K&V) * 16 layers * 8 heads * 64 dim * 2 bytes (FP16) = 32,768 bytes
    - **Total Memory Overhead:** 512 * 32,768 bytes = 16,777,216 bytes ≈ 16 MB
    - **New TTFT:** 150ms (skipping the 200ms system prefill)
    - **Result:** **16 MB memory cost for a 57% TTFT reduction (200ms saved).**
