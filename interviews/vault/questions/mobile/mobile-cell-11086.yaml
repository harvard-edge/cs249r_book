title: 'Fault Tolerance: Realize Mobile Fleet Update Rollout Timeline'
scenario: Realize the model update rollout plan for 50M users across A17 Pro (iOS) and Snapdragon 8 Gen
  3 (Android). The update is a 500MB 4-bit quantized 1B model. You have 7 days for full rollout. Specify
  staging percentages, validation gates, CDN requirements, and rollback procedures.
details:
  realistic_solution: Staged rollout with automated gates. CDN pre-positioned. Per-platform staged separately
    (iOS App Store vs Google Play have different mechanics).
  common_mistake: Not accounting for CDN costs at 50M downloads × 500MB; not specifying automated rollback
    triggers.
  napkin_math: '50M users × 500MB model = 25 PB total download. CDN cost: $0.008/GB = $200K for full rollout.
    Pre-stage to CDN edge nodes near user population. Staging: Day 1: 0.01% (5K) → 48h monitoring → Day
    3: 0.1% (50K) → 24h → Day 4: 1% (500K) → 24h → Day 5: 10% (5M) → 24h → Day 7: 100% (50M). Rollback
    trigger: crash rate > 0.5% (vs baseline 0.1%) OR inference latency p95 > 2× baseline. Automated: server
    flag → devices roll back to model_prev.bin on next heartbeat. CDN peak load: Day 7 full rollout, 50M
    × 500MB over 24 hours = 25PB / 86400s = 289 GB/s CDN throughput. Major CDNs handle 10+ TB/s — no issue.
    Rollback storage: 2 × 500MB = 1GB per device. 50M × 1GB = 50PB device storage industry-wide — acceptable.'
