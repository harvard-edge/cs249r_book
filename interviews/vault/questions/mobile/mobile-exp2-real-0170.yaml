title: Sizing W4A8 LLM Deployment on Snapdragon 8 Gen 3 Hexagon NPU
scenario: Your team is tasked with deploying a 7B parameter LLM for an on-device assistant on a flagship
  phone equipped with a Qualcomm Hexagon NPU (Snapdragon 8 Gen 3). The system has 12 GB of shared LPDDR5X
  memory, but the OS restricts your app's peak memory to 4 GB for both weights and KV cache. The Hexagon
  NPU provides 45 TOPS for INT8 compute. Evaluate whether a W8A8 or an extreme W4A8 (e.g., AWQ/GPTQ) quantization
  strategy is required, and detail how it impacts the NPU's memory bandwidth and compute utilization during
  auto-regressive decoding.
details:
  realistic_solution: An L5 engineer recognizes that a 7B model at W8A8 requires ~7 GB, immediately violating
    the 4 GB RAM constraint. W4A8 is mandatory purely for memory capacity (reducing weights to ~3.5 GB).
    The correct architecture involves streaming 4-bit weights from the LPDDR5X memory, performing on-the-fly
    decompression to INT8 in the NPU's tightly coupled memory (TCM), and executing the matrix-vector multiplications
    using the 45 TOPS INT8 engines. The candidate should highlight that decoding is memory-bandwidth bound,
    not compute-bound.
  common_mistake: Candidates often mistakenly believe that W4A8 will double the compute throughput to
    90 TOPS on the NPU. They fail to understand that the NPU's MAC units natively operate on INT8 (45
    TOPS), meaning 4-bit weights only save memory capacity and bandwidth, and must be decompressed to
    8-bit in SRAM before computation.
  napkin_math: 'W8A8 Weights: 7 billion params * 1 byte = 7 GB (exceeds 4 GB budget). W4A8 Weights: 7
    billion params * 0.5 bytes = 3.5 GB (fits, leaves 0.5 GB for KV cache). Compute per token during decode:
    7 billion MACs = 14 GOPs. NPU Compute Time: 14 GOPs / 45 TOPS (INT8) = ~0.31 ms. Memory Fetch Time
    (assuming ~64 GB/s for mobile LPDDR5X): 3.5 GB / 64 GB/s = ~54.6 ms. Since 54.6 ms (memory) is significantly
    greater than 0.31 ms (compute), the deployment is bottlenecked by memory bandwidth, proving extreme
    quantization is critical for both capacity and token generation speed.'
