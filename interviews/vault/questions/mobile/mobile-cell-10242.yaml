title: Realizing a Compound AI App with CoreML Multi-Model Orchestration on A17 Pro
scenario: 'An iOS developer needs to deploy a 3-model compound AI pipeline on A17 Pro (8GB, 35 TOPS ANE)
  using CoreML: a vision encoder (ResNet-50, 25MB), a text encoder (MobileBERT, 100MB INT8), and a generative
  model (GPT-2-medium, 300MB INT4). All three must run within a single app process with a total memory
  budget of 600MB. Describe the CoreML-specific implementation approach including model loading strategy
  and ANE scheduling.'
question: "How should CoreML load and schedule a three-model compound AI pipeline within a 600MB A17 Pro process budget?"
details:
  realistic_solution: 'Sequential loading with explicit unload: (1) At app launch, load vision encoder
    only (25MB, fast: ~50ms from flash). Process camera input. (2) Unload vision encoder (MLModel = nil,
    trigger ARC dealloc). (3) Load text encoder (100MB, ~200ms). Process text. (4) Lazy load generative
    model on demand (300MB, ~600ms). Total at-rest: 25MB (if only vision active). Peak: 100+300=400MB
    during NLP+generation. With 100MB overhead: 500MB peak, within 600MB budget. CoreML tip: use MLModelConfiguration
    with computeUnits = .cpuAndNeuralEngine to allow ANE fallback to CPU for memory pressure situations.'
  common_mistake: Loading all three CoreML models simultaneously and keeping them all in ANE memory, then
    being surprised when iOS evicts one model mid-inference due to memory pressure. CoreML models loaded
    with MLModelConfiguration computeUnits=.all compete for ANE SRAM, and the ANE has limited persistent
    model storage compared to the NPU on Android.
  napkin_math: 'Model sizes: vision(25MB) + text(100MB) + generative(300MB) = 425MB models. Add runtime
    buffers: activations ~75MB peak. Total peak: 500MB < 600MB budget. Load times from NVMe: vision: 25MB/3GB/s=8ms,
    text: 100MB/3GB/s=33ms, generative: 300MB/3GB/s=100ms. ANE inference: vision ResNet-50 (4.1B MACs)
    at 35 TOPS: 4.1e9*2/(35e12*0.5)=0.47ms. Text MobileBERT (580M MACs) at 35 TOPS: 0.033ms. GPT-2-medium
    generation: 345M params INT4 (173MB effective): bandwidth-limited at ANE 100GB/s: 173MB/100GB/s=1.7ms/token
    → ~588 tok/s. 100 tokens: 170ms.'
