title: Cross-Core Operator Scheduling for A17 Pro
scenario: 'You are designing an operator scheduling engine for a real-time video segmentation model deployed on an A17 Pro Neural Engine. The model has highly parallelizable self-attention and convolution branches. Your task is to architect an operator execution schedule that maximizes ANE utilization without thrashing unified memory bandwidth, ensuring thermal compliance under continuous video processing.'
question: 'How should an A17 Pro operator scheduler maximize Neural Engine utilization without unified-memory thrashing or throttling?'
details:
  realistic_solution: 'A robust design involves fusing memory-bound operators (like element-wise operations) with compute-bound convolutions to maximize data locality within the ANE''s local SRAM. The scheduling engine should interleave high-compute attention blocks with lower-intensity layers to maintain a steady thermal profile. Furthermore, the schedule must explicitly manage DMA transfers to the 8 GB unified memory, ensuring ANE execution overlaps with background CPU/GPU tasks without causing bus contention.'
  common_mistake: |
    **The Pitfall:** Designing greedy schedules that maximize parallel operator execution without accounting for the shared memory bottleneck.
    **The Rationale:** Candidates assume keeping all 16 ANE cores busy is optimal.
    **The Consequence:** Flooding the unified memory bus, causing contention with the GPU/ISP and inducing thermal throttling.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Required compute: 175 GOPS/frame at 30 FPS = 5.25 TOPS.
       - A17 Pro ANE peak: 35 TOPS.
       - Unfused working set: 50 MB/frame.
    2. **Calculations:**
       - ANE utilization required: 5.25 TOPS / 35 TOPS = 15%.
       - Bandwidth demand (unfused): 50 MB * 30 FPS = 1.5 GB/s.
    3. **Conclusion & Interpretation:**
       - **Result: 15% Utilization at 1.5 GB/s (Requires Operator Fusion).**
