title: Neural Engine Power Efficiency vs CPU for Transformer on A17 Pro
scenario: 'iPhone 15 Pro runs a sentiment analysis model with A17 Pro. Neural Engine: 35 TOPS at ~0.8W
  active. Apple CPU efficiency cores: ~15 GFLOPS at 0.15W each. P-cores: ~100 GFLOPS at 1.5W. The model
  is 50M FLOPs per inference. Compare energy per inference across execution units.'
details:
  realistic_solution: 'Neural Engine: 50M FLOPs / 35 TOPS = 1.43μs. At 0.8W: energy = 0.8W × 1.43μs =
    1.14μJ. Efficiency core: 50M FLOPs / 15 GFLOPS = 3.33ms. At 0.15W: 0.15W × 3.33ms = 0.5μJ. P-core:
    50M FLOPs / 100 GFLOPS = 0.5ms. At 1.5W: 1.5W × 0.5ms = 0.75μJ. NE has ANE framework overhead ~0.1-0.5ms
    minimum latency. Small model (50M FLOPs) may not amortize NE startup. For 50M FLOPs, NE is most energy
    efficient (1.14μJ vs 500μJ for E-core, 750μJ for P-core) and fastest.'
  common_mistake: Comparing only peak TOPS/W without accounting for model-specific utilization; the Neural
    Engine has framework overhead and minimum batch sizes that reduce effective efficiency for small models.
  napkin_math: 'NE: 1.43μs × 0.8W = 1.14μJ. E-core: 3.33ms × 0.15W = 500μJ. P-core: 0.5ms × 1.5W = 750μJ.
    Winner on energy: NE (1.14μJ). Winner on latency: NE (1.43μs). For battery-sensitive tasks, NE wins
    decisively on both latency and energy.'
