title: Diagnosing & Quantifying Performance Bottlenecks in Canary Rollouts on Exynos 2400 NPU
scenario: Your team has developed an updated on-device ML model for a popular mobile application, promising
  significant accuracy improvements. This model is deployed across various Android devices, critically
  impacting those powered by the Samsung Exynos 2400 NPU (34.7 TOPS, 12 GB LPDDR5X). You initiated a canary
  deployment, gradually rolling out the new model to 5% of users. Post-canary launch, aggregated telemetry
  shows a concerning ~15% increase in average inference latency on Exynos 2400 devices, despite rigorous
  offline benchmarks indicating a 10% *decrease* in model execution time. Your task is to diagnose the
  most probable bottleneck(s) causing this latency regression specifically on the Exynos 2400 NPU and
  propose a method to quantify the impact of a potential fix, justifying whether a rollback or further
  iteration is required.
question: "How would you diagnose a 15% Exynos 2400 latency regression in canary and quantify whether to fix or roll back?"
details:
  realistic_solution: 'The first step is to activate advanced, fine-grained profiling on a subset of the
    canary group using Exynos 2400 devices. This involves capturing NPU utilization, memory access patterns
    and bandwidth usage (especially between the 12 GB LPDDR5X and NPU), thermal profiles, and individual
    inference trace logs. Analyze these profiles to pinpoint if the bottleneck is computational (e.g.,
    new ops not optimized for Exynos NPU, leading to CPU fallback), memory-bound (e.g., excessive data
    movement or cache misses), or thermal. Based on the diagnosis, a solution might involve: 1) Re-quantizing
    the model for NPU-specific efficiency, 2) Optimizing data pipelines to minimize memory transfers,
    or 3) Adjusting NPU core allocation/scheduling if multiple ML tasks contend for resources. The proposed
    fix would then be A/B tested on a smaller, controlled segment of the canary population before wider
    deployment or a full rollback to the previous model.'
  common_mistake: A common mistake is solely relying on synthetic benchmarks or aggregate device metrics
    during canary deployments. Without fine-grained, device-specific profiling tools (e.g., Samsung's
    specific NPU profilers, systrace), it's easy to misattribute latency to the model's computational
    complexity rather than system-level issues like memory bandwidth contention (LPDDR5X), NPU thermal
    throttling, OS scheduling interference, or inefficient data transfer between CPU/GPU and the NPU on
    the Exynos architecture. Another mistake is lacking clear rollback triggers and pre-defined metrics
    for success/failure.
  napkin_math: 'To quantify the bottleneck, consider the `Total Latency = NPU Compute Time + Memory I/O
    Time + CPU Overhead + OS/Scheduling Latency`. Offline benchmarks showed a 10% reduction in `NPU Compute
    Time`. If `Old Total Latency` was 100ms, `New Total Latency` is 115ms (15% increase). This implies
    the 10ms gain in NPU compute was offset by a 25ms increase from other factors. The goal is to identify
    which of `Memory I/O Time`, `CPU Overhead`, or `OS/Scheduling Latency` increased by 25ms. For example,
    if profiling reveals `Memory I/O Time` increased from 20ms to 45ms (a 25ms increase), then focusing
    optimization there is key. A potential fix aiming to reduce `Memory I/O Time` by 20ms would theoretically
    bring `New Total Latency` to `115ms - 20ms = 95ms`, surpassing the old model''s performance by 5ms,
    validating the fix''s impact. This quantification aids the decision for rollback vs. iterative improvement:
    if the potential quantified fix is significant enough to meet performance targets, iterate; otherwise,
    rollback.'
