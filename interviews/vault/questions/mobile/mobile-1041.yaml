title: 'Mobile TCO Evaluation: On-Device vs Cloud for Photo Enhancement App'
scenario: A photo enhancement app uses Stable Diffusion v1.5 (4B params, fp16). The user generates 5 images per day. You are comparing on-device generation (Snapdragon 8 Gen 3, 16GB, 8W) against a Cloud H100 API ($0.01/image).
question: 'For SD v1.5 generating 5 images/day, which is cheaper over two years: on-device or a $0.01 cloud API, and where is the break-even point?'
details:
  realistic_solution: 'Snapdragon 16GB: SD v1.5 at FP16 needs ~9.2GB — fits with 6.8GB remaining for OS. On-device inference: 50-step SD at 8W: ~30 seconds per image. Energy: 8W*30s=240J=0.0667Wh per image. Annual: 5*365*0.0667=121.7Wh=$0.01217/yr. Cloud: 5*365*$0.01=$18.25/yr. Cloud is 1500x more expensive per user. Break-even: on-device wins above... the marginal cost of on-device is $0.0000067/image vs $0.01 → cloud is 1493x more expensive at any volume. On-device always wins once device is owned.'
  common_mistake: |
    **The Pitfall:** Failing to verify if the model actually fits in device memory before doing cost analysis.
    **The Rationale:** SD v1.5 in FP16 requires 8GB (UNet) + VAE (0.8GB) + CLIP (0.4GB) = 9.2GB. It barely fits in a 16GB Snapdragon device, and would crash on an 8GB device.
    **The Consequence:** Recommending a cheaper on-device deployment architecture that is technically impossible to run on standard hardware.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - On-device energy: 8W for 30s per image. Volume: 5 images/day.
       - Cloud Cost: $0.01 per image.
       - Battery Wear Cost: $69 replacement / 500 cycles = $0.138/cycle. Battery capacity: 18.5Wh.
    2. **Calculations:**
       - On-device Energy per image: 8W * 30s = 240J = 0.067Wh.
       - Annual Energy Cost: 5 * 365 * 0.067Wh = 122Wh = $0.0122/yr.
       - Cloud Cost: 5 * 365 * $0.01 = $18.25/yr.
       - Battery Wear: 0.067Wh / 18.5Wh = 0.36% drain per image. 5 images = 1.8% drain/day = $0.00248 wear/day = $0.906/yr.
    3. **Conclusion & Interpretation:** Total on-device cost ($0.918/yr) is **19.9x cheaper** than cloud ($18.25/yr). On-device always wins once hardware is owned.
