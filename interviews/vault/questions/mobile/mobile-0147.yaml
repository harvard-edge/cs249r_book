title: The NPU Fallback Power Tax
scenario: You are optimizing a new background service on a flagship smartphone that analyzes user photos. When the model runs entirely on the phone's NPU, it consumes 100mW per inference. However, a recent OS update deprecated a key operation, forcing 20% of the model's compute workload to fall back to the much less efficient CPU. Assume the CPU is 10x less power-efficient for this workload.
question: What is the new per-inference power draw when 20% of an NPU workload falls back to a CPU that is 10x less efficient?
details:
  realistic_solution: The total power is the sum of the power used by the NPU for the supported operations and the power used by the CPU for the fallback operations. The NPU handles 80% of the work, while the CPU handles the remaining 20% at a 10x power cost relative to the NPU.
  common_mistake: |
    **The Pitfall:** Assuming the power increase is linear (e.g., a simple 20% increase) or applying the penalty to the entire workload.
    **The Rationale:** Engineers underestimate the 'power tax' of CPU fallback and forget to calculate delegated and non-delegated portions separately.
    **The Consequence:** Massive underestimation of power consumption, leading to unexpected battery drain and thermal throttling in production.
  napkin_math: |
    - Baseline 100% NPU: 100mW.
    - Update forces 20% of ops to CPU.
    - NPU handles remaining 80% = 80mW.
    - CPU handles 20% but is 10x less efficient: 20% * 100mW * 10 = 200mW.
    - **Total power = 80mW (NPU) + 200mW (CPU) = 280mW (a 2.8x increase).**
  options:
  - '120 mW (Mistake: Assumes a simple linear 20% power increase)'
  - '200 mW (Mistake: Calculates only the power for the CPU portion)'
  - 280 mW
  - '1000 mW (Mistake: Applies the 10x penalty to the entire original power draw)'
  correct_index: 2
