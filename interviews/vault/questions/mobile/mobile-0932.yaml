title: 'Kernel Fusion: Mastery — Optimize 3B LLM Decode Throughput on A17 Pro'
scenario: 'You are optimizing a 3B LLM (INT4 quantized, 1.5GB) decode on A17 Pro (35
  TOPS Neural Engine, 8GB, 68 GB/s). Current: 18 tokens/sec. Target: 30 tokens/sec.
  Design a complete optimization strategy using kernel fusion, memory layout, quantization,
  and caching. Quantify each optimization''s contribution.'
question: Which optimizations move a 3B INT4 LLM decode on A17 Pro from 18 to 30 tokens/sec,
  and by how much?
details:
  realistic_solution: 'Profile: weight loading time = 1.5GB / 68 GB/s = 22ms/token
    → 45 tokens/sec theoretical. At 18 tok/s → 55.6ms/token → only 22ms/55.6ms = 39.6%
    efficiency. Overhead: 33.6ms in overhead. Sources: kernel launch, memory allocation,
    format conversion.'
  common_mistake: Applying all optimizations blindly without measuring current bottleneck;
    the bottleneck at batch=1 decode is almost certainly memory bandwidth, not compute.
  napkin_math: 'Target: 30 tokens/sec → 33.3ms/token. Current: 18 tok/s → 55.6ms/token.
    Memory floor: 1.5GB weight load / 68 GB/s = 22ms. Gap to close: 55.6 - 33.3 =
    22.3ms overhead reduction needed. Optimization 1: Model compilation with ANE
    ahead-of-time (eliminates JIT overhead per token): saves ~15ms. New: 40.6ms.
    Optimization 2: Fuse RMSNorm and GeGLU: eliminates 100 kernel launches per token,
    saving 2ms. New: 38.6ms. Optimization 3: KV cache in INT8 (was FP16): KV cache
    at seq=512 reduces size by half, saving ~1ms bandwidth. New: 37.6ms.
    Optimization 4: INT3 quantization (2.66 bits/weight) reduces weights to 1.0GB →
    14.7ms load. This saves 7.3ms. New: 37.6ms - 7.3ms = 30.3ms → 33 tok/sec!
    Meets the 30 tok/sec target.'
