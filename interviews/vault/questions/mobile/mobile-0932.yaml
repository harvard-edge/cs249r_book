title: 'Kernel Fusion: Mastery — Optimize 3B LLM Decode Throughput on A17 Pro'
scenario: 'You are optimizing a 3B LLM (INT4 quantized, 1.5GB) decode on A17 Pro (35 TOPS Neural Engine, 8GB, 68 GB/s). Current throughput is 18 tokens/sec, and your target is 30 tokens/sec.'
question: "Which optimizations move a 3B INT4 LLM decode on A17 Pro from 18 to 30 tokens/sec, and by how much?"
details:
  realistic_solution: 'Profile: weight loading time = 1.5GB / 68 GB/s = 22ms/token → 45 tokens/sec theoretical. At 18 tok/s → 55.6ms/token → only 22ms/55.6ms = 39.6% efficiency. Overhead: 33.6ms in overhead. Sources: kernel launch, memory allocation, format conversion.'
  common_mistake: |
    **The Pitfall:** Applying all optimizations blindly without measuring the current bottleneck.
    **The Rationale:** Candidates often assume compute is the limit for LLMs, when batch=1 decoding is almost entirely memory bandwidth-bound.
    **The Consequence:** Optimizing compute kernels yields marginal improvements, missing the 30 tok/sec target entirely.
  napkin_math: |
    - **Target:** 30 tok/sec = **33.3ms/token**. Current: 18 tok/sec = **55.6ms/token**.
    - **Memory Floor:** Loading 1.5GB weights at 68 GB/s takes **22ms**.
    - **Overhead:** 55.6ms - 22ms = **33.6ms** (kernel launch, allocation).
    - **Opt 1 (AOT Compilation):** Eliminates JIT, saves 15ms -> **40.6ms**.
    - **Opt 2 (Fusion):** Fuses RMSNorm/GeGLU, saves 2ms -> **38.6ms**.
    - **Opt 3 (INT8 KV Cache):** Reduces bandwidth, saves 1ms -> **37.6ms**.
    - **Opt 4 (INT3 Quantization):** Reduces weights to 1.0GB. Load time drops to 1.0/68 = 14.7ms. Saves 7.3ms.
    - **Final Time:** 37.6ms - 7.3ms = **30.3ms/token** (33 tok/sec, successfully meets target).
