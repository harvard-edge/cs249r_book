title: The CoreML vs TFLite Performance Gap
scenario: You benchmark the same MobileNetV3-Large model on an iPhone 15 Pro using Core ML and on a Pixel
  8 Pro using TFLite. Core ML reports 1.8ms; TFLite reports 5.2ms. Your manager concludes 'Apple hardware
  is 3× faster.' Then you run TFLite on the iPhone and Core ML on the Pixel (hypothetically, via ONNX
  Runtime with each EP). Now TFLite on iPhone gets 4.1ms and the CoreML EP on Pixel gets 6.8ms. What's
  actually happening?
question: "What explains Core ML's 1.8 ms MobileNetV3 latency on iPhone 15 Pro versus TFLite's 5.2 ms on Pixel 8 Pro?"
details:
  realistic_solution: 'The 2.9x latency gap (1.8ms vs 5.2ms) far exceeds the 1.6x hardware gap (A17 Pro
    ANE 35 TOPS vs Tensor G3 22 TOPS). The extra 1.8x comes from compiler optimization: Core ML compiles
    the entire graph as one fused ANE program with zero partition boundaries, while TFLite partitions
    across Hexagon DSP and GPU, incurring ~2.25ms of inter-partition DMA overhead per frame. When TFLite
    runs on iPhone (4.1ms) vs Core ML on Pixel (6.8ms), the software advantage reverses. The fix: benchmark
    the same runtime on both devices to isolate hardware, or force single-delegate execution to measure
    true silicon speed.'
  common_mistake: '"Apple''s Neural Engine is just faster silicon." The A17 Pro ANE is rated at 35 TOPS;
    the Tensor G3 TPU is rated at 22 TOPS. That''s a 1.6× hardware gap, not 3×. The extra performance
    comes from the software stack, not the silicon.'
  napkin_math: 'A17 Pro ANE: 35 TOPS. Tensor G3 TPU: 22 TOPS. Hardware gap: 1.6×. Observed gap (Core ML
    vs TFLite): 1.8ms vs 5.2ms = 2.9×. Software contribution: 2.9 / 1.6 = 1.8× from compiler optimization.
    Breakdown of TFLite''s 5.2ms on Pixel: ~2.1ms compute (hardware) + 2.25ms partition boundary overhead
    + 0.85ms dispatch/scheduling. Breakdown of Core ML''s 1.8ms on iPhone: ~1.3ms compute (hardware) +
    0ms partition overhead (full graph on ANE) + 0.5ms dispatch. If TFLite eliminated partition overhead
    on Pixel: 2.1 + 0.85 = 2.95ms → gap narrows to 1.6× (matching the hardware ratio).'
