title: The CoreML vs TFLite Performance Gap
scenario: You benchmark the same MobileNetV3-Large model on an iPhone 15 Pro using Core ML (1.8ms) and on a Pixel 8 Pro using TFLite (5.2ms). TFLite on iPhone gets 4.1ms and the CoreML EP on Pixel gets 6.8ms.
question: What explains Core ML's 1.8 ms MobileNetV3 latency on iPhone 15 Pro versus TFLite's 5.2 ms on Pixel 8 Pro?
details:
  realistic_solution: 'The 2.9x latency gap (1.8ms vs 5.2ms) far exceeds the 1.6x hardware gap (A17 Pro ANE 35 TOPS vs Tensor G3 22 TOPS). The extra 1.8x comes from compiler optimization: Core ML compiles the entire graph as one fused ANE program with zero partition boundaries, while TFLite partitions across Hexagon DSP and GPU, incurring ~2.25ms of inter-partition DMA overhead per frame. When TFLite runs on iPhone (4.1ms) vs Core ML on Pixel (6.8ms), the software advantage reverses. The fix: benchmark the same runtime on both devices to isolate hardware, or force single-delegate execution to measure true silicon speed.'
  common_mistake: |
    **The Pitfall:** Attributing the entire latency gap to pure silicon performance.
    **The Rationale:** Engineers see the 2.9x gap and assume Apple's Neural Engine is simply 3x faster than the Tensor TPU.
    **The Consequence:** They misdiagnose cross-platform performance, ignoring the massive impact of software-level compiler optimization and partition overheads.
  napkin_math: |
    1. Hardware compute gap: A17 Pro (35 TOPS) / Tensor G3 (22 TOPS) = 1.6x.
    2. Observed latency gap: 5.2ms / 1.8ms = 2.9x.
    3. Software contribution: 2.9x / 1.6x = 1.8x.
    4. TFLite overhead (Pixel): ~2.1ms compute + 2.25ms inter-partition DMA + 0.85ms scheduling = 5.2ms.
    5. Core ML (iPhone): ~1.3ms compute + 0ms partition overhead + 0.5ms dispatch = 1.8ms.
    6. Conclusion: **Core ML compiles the graph as a single fused program (0ms DMA overhead), whereas TFLite partitions it across NPU/GPU, adding 2.25ms of latency.**
