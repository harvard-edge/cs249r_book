title: Evaluating Model Deployment on Samsung Exynos 2400 NPU
scenario: 'You are tasked with deploying a new mobile-first machine learning model
  for real-time image segmentation onto a Samsung Exynos 2400 NPU (34.7 TOPS, 12 GB
  LPDDR5X). The model has two candidate architectures: a highly optimized MobileNetV3
  variant requiring 50 GFLOPs per inference and a slightly more accurate EfficientNet-lite
  variant requiring 80 GFLOPs per inference. Both models have similar memory footprints
  well within the NPU''s 12 GB LPDDR5X. Your application needs to sustain 30 frames
  per second (FPS) for inference. Evaluate which architecture is more suitable, considering
  the NPU''s capabilities and the inference throughput requirement. Quantify the maximum
  sustainable FPS for each model on the given hardware.'
question: How would you quantify the maximum sustainable FPS for each model on the
  given hardware?
details:
  realistic_solution: A strong answer would convert TOPS to an equivalent FLOPs range,
    considering the NPU's stated capabilities and the type of operations (e.g., INT8
    vs. FP16). They would then calculate the achievable FPS for each model variant,
    considering both the total FLOPs per inference and the NPU's effective processing
    power. A good solution also discusses the trade-offs between model complexity
    (FLOPs) and accuracy within the hardware constraints.
  common_mistake: Candidates often confuse TOPS with FLOPs directly or overlook the
    difference between theoretical peak performance and real-world sustained performance,
    especially regarding memory bandwidth limitations or actual NPU utilization efficiency
    for different operations.
  napkin_math: Exynos 2400 NPU is 34.7 TOPS. Assuming 1 TOP is roughly 1 Tera (10^12)
    operations per second. If we consider INT8 operations, this is 34.7 trillion INT8
    ops/sec.  If we assume each FLOP (FP16 or FP32) is roughly equivalent to a few
    INT8 ops (e.g., 2-4 INT8 ops per FLOP for simplification, depending on the specific
    operation), this can give a rough estimate of peak FLOPs. A MobileNetV3 (50 GFLOPs)
    inference at 30 FPS would require 1500 GFLOPs/sec. An EfficientNet-lite (80 GFLOPs)
    at 30 FPS would require 2400 GFLOPs/sec. The candidate needs to bridge this gap
    to the 34.7 TOPS using appropriate conversions and assumptions, then determine
    which model fits within the NPU's sustained capacity.
