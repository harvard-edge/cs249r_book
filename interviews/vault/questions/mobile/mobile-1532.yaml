title: Evaluating Model Deployment on Samsung Exynos 2400 NPU
scenario: You are tasked with deploying a new mobile-first machine learning model for real-time image segmentation onto a Samsung Exynos 2400 NPU (34.7 TOPS, 12 GB LPDDR5X). The model has two candidate architectures: a highly optimized MobileNetV3 variant requiring 50 GFLOPs per inference and a slightly more accurate EfficientNet-lite variant requiring 80 GFLOPs per inference. Your application needs to sustain 30 frames per second (FPS) for inference.
question: Evaluate which architecture is more suitable and quantify the maximum sustainable FPS for each model on the given hardware.
details:
  realistic_solution: A strong answer would convert TOPS to an equivalent FLOPs range, considering the NPU's stated capabilities and the type of operations (e.g., INT8 vs. FP16). They would then calculate the achievable FPS for each model variant, considering both the total FLOPs per inference and the NPU's effective processing power. A good solution also discusses the trade-offs between model complexity (FLOPs) and accuracy within the hardware constraints.
  common_mistake: |
    **The Pitfall:** Confusing TOPS with FLOPs directly or ignoring real-world sustained performance.
    **The Rationale:** Candidates often equate peak theoretical integer performance (TOPS) with floating-point workload requirements (FLOPs), overlooking conversion ratios and memory bandwidth limits.
    **The Consequence:** The evaluation incorrectly approves a model that the hardware cannot actually sustain at the required framerate.
  napkin_math: |
    1. **Hardware Capacity:** Exynos 2400 NPU = 34.7 TOPS (trillion INT8 ops/sec). Assuming roughly 2-4 INT8 ops per FLOP equivalent, estimate ~8-17 TFLOPs sustained.
    2. **MobileNetV3 Requirement:** 50 GFLOPs * 30 FPS = 1,500 GFLOPs/sec (1.5 TFLOPs).
    3. **EfficientNet-lite Requirement:** 80 GFLOPs * 30 FPS = 2,400 GFLOPs/sec (2.4 TFLOPs).
    4. **Conclusion:** Both technically fit the raw compute bound, but MobileNetV3 leaves vastly more headroom for memory bandwidth inefficiencies and thermal throttling. Max theoretical FPS for MobileNetV3 is ~340 FPS (assuming no memory limits), vs ~210 FPS for EfficientNet-lite.
