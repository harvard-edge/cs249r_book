title: The App Budget Constraint
scenario: You're trying to ship a new generative AI feature in your app. The model has 750 million parameters.
question: Using half-precision floating point (FP16), what is the memory footprint of just the model's weights?
details:
  realistic_solution: For inference, each FP16 parameter requires 2 bytes of storage. Therefore, a 750 million parameter model will consume 750M * 2 bytes = 1.5 billion bytes, or 1.5 GB. This is a critical first calculation for mobile deployment, as this footprint must fit within the app's overall memory budget, which is typically only a fraction of the phone's total RAM.
  common_mistake: |
    **The Pitfall:** Using the wrong byte multiplier for precision types.
    **The Rationale:** Candidates often misremember the size of FP16 (2 bytes), confusing it with FP32 (4 bytes), INT8 (1 byte), or Adam optimizer training state (16 bytes).
    **The Consequence:** Drastically miscalculating memory requirements, leading to deployment failures.
  napkin_math: |
    1. **Model Parameters:** 750,000,000.
    2. **Bytes per Parameter:** FP16 uses 2 bytes/param.
    3. **Memory Footprint:** 750,000,000 * 2 = 1,500,000,000 bytes.
    4. **Conclusion:** **The memory footprint is 1.5 GB.**
  options:
  - 750 MB
  - 1.5 GB
  - 3.0 GB
  - 12 GB
  correct_index: 1
