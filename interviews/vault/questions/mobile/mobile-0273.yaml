title: 'The App Store Memory Diet: Quantization Fundamentals'
scenario: Your team has an FP16-precision computer vision model weighing 500 MB. The mobile target device restricts your app to a strict 2GB memory budget.
question: How does quantizing the model to INT8 precision impact its memory footprint, and what is the new size of the model's weights?
details:
  realistic_solution: |
    Applying Post-Training Quantization (PTQ) to map the FP16 (16-bit floating point) parameters down to INT8 (8-bit integer) definitively cuts the storage and resident RAM requirements exactly in half. This fundamental optimization technique exploits lower precision representations to maximize mobile hardware compatibility, vastly improving binary payload size, reducing memory bus saturation, and preserving the strict 2GB allocation budget for dynamic activations and OS operations.
  common_mistake: |
    **The Pitfall:** Miscalculating the memory savings by assuming a 4x reduction.
    **The Rationale:** Candidates conflate FP32-to-INT8 (4x) with FP16-to-INT8 (2x).
    **The Consequence:** They vastly underestimate the final memory footprint, leading to Out-of-Memory (OOM) evictions in production.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Original model precision: FP16 (2 bytes per parameter).
       - Original size: 500 MB.
       - Target precision: INT8 (1 byte per parameter).
    2. **Calculations:**
       - Byte reduction factor = FP16 (2 Bytes) / INT8 (1 Byte) = 2x reduction.
       - New Size = 500 MB / 2 = 250 MB.
    3. **Conclusion & Interpretation:**
       - **Result: Memory Capacity-Bound.** Quantizing from FP16 to INT8 strictly halves the parameter payload, bringing the weight footprint down to 250 MB and securing safety margins against the 2GB OS limit.
  options:
  - Reduces size by 4x, to 125 MB
  - Reduces size by 8x, to 62.5 MB
  - Reduces size by 2x, to 250 MB
  - Size is unchanged; quantization only affects latency.
