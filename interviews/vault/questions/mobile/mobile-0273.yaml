title: 'The App Store Memory Diet: Quantization Fundamentals'
scenario: Your team has a new FP16-precision computer vision model for a mobile app. The model's weights
  file is 500 MB. The target device has 8GB of RAM, and the OS gives your app a strict 2GB memory budget.
  Explain how quantizing the model to INT8 precision would impact its memory footprint, and calculate
  the new size of the model's weights.
question: "How quantizing the model to INT8 precision would impact its memory footprint, and calculate the new size of the model's weights?"
details:
  realistic_solution: Quantizing a model from FP16 (16 bits or 2 bytes per parameter) to INT8 (8 bits
    or 1 byte per parameter) reduces the memory required for the weights by exactly half. Each parameter
    now takes up 1 byte of storage instead of 2. This is a fundamental technique for fitting large models
    onto resource-constrained mobile devices, directly impacting the app's binary size and RAM usage.
  common_mistake: Engineers often miscalculate the memory savings. A common error is assuming a 4x reduction,
    which would be true for FP32-to-INT8, but not for FP16-to-INT8. Another mistake is believing quantization
    only affects speed and not memory size.
  napkin_math: 'Original Precision: FP16 (2 Bytes/parameter). INT8 Precision: 1 Byte/parameter. Reduction = 2 Bytes / 1 Byte = 2x. New Size = 500 MB / 2 = 250 MB.'
  options:
  - Reduces size by 4x, to 125 MB
  - Reduces size by 8x, to 62.5 MB
  - Reduces size by 2x, to 250 MB
  - Size is unchanged; quantization only affects latency.
  correct_index: 2
