title: 'Kernel Fusion: Realize Fusion Plan for Production Mobile LLM Deployment'
scenario: Realize the complete fusion plan for shipping a 1B INT4 LLM (500MB) to 10M
  users on A17 Pro (35 TOPS, 8GB) and Snapdragon 8 Gen 3 (45 TOPS, 16GB). Specify
  all fused op groups, their implementations, testing requirements, and expected latency
  for each platform.
question: How would you specify all fused op groups, their implementations, testing
  requirements, and expected latency for each platform?
details:
  realistic_solution: 'Platform-specific fusion implementations: (1) A17 Pro: Core
    ML .mlpackage with automatic ANE fusion. (2) Snapdragon: Qualcomm AI Engine (QNN
    SDK) with manual fusion specification. Test: compare output against FP32 reference,
    max error < 0.02.'
  common_mistake: Specifying fusion without a testing plan for numerical correctness
    across platforms; not accounting for platform-specific fusion APIs (Core ML vs
    QNN).
  napkin_math: 'Fused op groups: (1) RMSNorm + Linear: saves intermediate activation write.
    For 1 token (hidden_size=2048, FP16), saves 4KB per layer. Over 28 layers, saves
    112KB. (2) Attention (FlashAttention): at 512 ctx, avoids materializing 512x512x32
    (heads) x 2B = 16.7MB attention matrix per layer. Over 28 layers, saves ~467MB total
    activation memory during prefill. A17 Pro latency: weight load 500MB / 51.2GB/s = ~10ms
    + compute (0.17ms) + overhead (2ms) = 12.17ms → 82 tok/sec. Snapdragon: weight load
    500MB / 77GB/s = ~6.5ms + compute (0.13ms) + overhead (1.5ms) = 8.13ms → 123 tok/sec.
    Both exceed 25 tok/sec target. QA: 1K golden prompts × 2 platforms × max output
    error < 0.02. CI: run on device simulator for each platform.'
