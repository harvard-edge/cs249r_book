title: The Pruning Paradox
scenario: You are optimizing a small transformer model for on-device text completion on a Snapdragon 8 Gen 3 phone using the TensorFlow Lite Hexagon delegate. You compare two strategies: (A) 50% unstructured magnitude pruning on the FFN layers, and (B) 25% structured pruning by removing entire attention heads. Strategy A reduces total MACs more than B, but profiling shows B is 1.5x faster.
question: Why can structured attention-head pruning run faster than more aggressive unstructured pruning on a mobile NPU?
details:
  realistic_solution: 'The Hexagon NPU, like most mobile accelerators, is a DSP/VLIW-style architecture optimized for dense, predictable computation. It achieves its high throughput (45 TOPS) by executing large, parallel batches of instructions on dense tensors.

    - **Strategy A (Unstructured):** Creates sparse weight matrices. To compute with these, the NPU either needs native sparse matrix support (which is rare and often limited) or it must use a generic CPU kernel. Even with NPU support, it involves expensive gather operations to fetch weights from scattered memory locations, breaking the efficient pre-fetching and caching mechanisms. The overhead from index calculations and irregular data access negates the FLOPs savings.

    - **Strategy B (Structured):** Removing entire attention heads or FFN columns preserves the dense, rectangular nature of all remaining matrix multiplications. The model is simply smaller, but all its operations remain as dense, regular tensors. This is ideal for the Hexagon delegate, which can fuse operations and use its full vector processing capabilities. The computation remains highly efficient and predictable, leading to a much larger real-world speedup.'
  common_mistake: |
    **The Pitfall:** Assuming fewer parameters automatically equals faster execution.
    **The Rationale:** Engineers focus solely on MAC count reduction, ignoring the regularity of the computation required by DSP/VLIW architectures like the Hexagon NPU.
    **The Consequence:** Unstructured pruning introduces irregular memory access and gather operations, completely negating any theoretical FLOPs savings.
  napkin_math: |
    1. Base Memory: 1M params * 2 bytes (FP16) = 2MB.
    2. Strategy A (50% unstructured): 500k weights (1MB) + 500k 16-bit indices (1MB) = 2MB total traffic, plus gather overhead.
    3. Strategy B (25% structured): Reduces dense weights to 1.5MB with zero index overhead.
    4. **Conclusion: Structured pruning minimizes memory traffic on the 77GB/s bus, achieving lower latency.**
