title: Mobile NPU CPU Overlap
scenario: A mobile pipeline preprocesses on CPU for 12 ms and runs NPU inference for 28 ms per frame. With double buffering, CPU preprocessing for frame N+1 overlaps NPU inference for frame N.
question: 'What steady-state frame time is possible when 12 ms CPU preprocessing overlaps 28 ms NPU inference?'
details:
  realistic_solution: The steady-state throughput interval is the slower stage, 28 ms/frame, once the pipeline is full. The first frame can still pay CPU plus NPU fill latency. Without overlap, steady-state work would be 40 ms/frame. Double buffering can meet a 33 ms sustained frame budget if scheduling jitter is controlled.
  common_mistake: |
    **The Pitfall:** Adding CPU and NPU times together to calculate steady-state latency.
    **The Rationale:** Candidates forget that double-buffered, pipelined systems overlap execution, making the throughput bounded by the slowest individual stage.
    **The Consequence:** Grossly underestimating the maximum possible framerate and over-engineering unnecessary optimizations.
  napkin_math: |
    **Assumptions & Constraints:**
    - CPU Preprocessing: 12 ms.
    - NPU Inference: 28 ms.
    - Concurrency: Double buffering enabled.

    **Calculations:**
    - Sequential Time (no overlap): 12 ms + 28 ms = 40 ms.
    - Overlapped Steady State Interval: max(12 ms, 28 ms) = 28 ms.

    **Conclusion & Interpretation:**
    - **Result: 28 ms (Compute-Bound)**. The steady-state frame time easily meets a 33 ms budget thanks to overlap.
