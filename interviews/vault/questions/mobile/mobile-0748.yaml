title: The Silicon Shared Oven
scenario: Your real-time translation app works perfectly until the user starts a 3D game in picture-in-picture mode. Suddenly, your NPU translation latency triples.
question: Based on the SoC thermal envelope, why is the 3D game affecting the NPU speed?
details:
  realistic_solution: You are hitting **Global Thermal Throttling**. In a mobile SoC, all cores share the same silicon die and thermal envelope. When the GPU generates massive heat from a game, the system's DVFS controller downclocks *the entire SoC*—including the NPU—to stay within safe skin-temperature limits. The fix is to use hyper-optimized, low-power models that can still meet deadlines even when the SoC is forced into its lowest frequency state.
  common_mistake: |
    **The Pitfall:** Assuming the 3D game is stealing NPU cycles or memory bandwidth directly.
    **The Rationale:** Developers often think of resource contention purely in terms of scheduling and compute starvation.
    **The Consequence:** Time is wasted trying to change thread priorities when the actual limit is dictated by physics and heat dissipation.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Mobile SoC Thermal Budget: ~3-5 Watts sustained.
       - 3D Game Power Draw: ~4 Watts.
    2. **Calculations:**
       - Remaining Budget: 5W (total) - 4W (game) = 1 Watt.
       - NPU Normal Power: likely >1 Watt for fast inference.
    3. **Conclusion & Interpretation:**
       - **Result: Thermal Throttling. The 3D game consumes the shared silicon thermal budget, forcing the DVFS controller to downclock the NPU to stay within safe temperatures.**
