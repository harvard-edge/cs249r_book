title: Quantized LoRA Serving on Snapdragon 8 Gen 3
scenario: "You are deploying a QLoRA-quantized 1B model with NF4 base weights and BF16 adapters on Snapdragon 8 Gen 3. The Hexagon NPU only supports INT8/INT4 arithmetic."
question: "How should BF16 LoRA adapters run on Snapdragon 8 Gen 3 when Hexagon supports only INT8/INT4?"
details:
  realistic_solution: 'Quantize adapter weights to INT8 at deployment time (not at training time, to preserve training quality). INT8 LoRA adapters lose <0.5% quality for rank-4 on most tasks. The merged result (W_base + B×A in INT8) can then run entirely on Hexagon NPU. Alternative: if adapters must stay BF16, use QNN SDK''s AIMET to run adapter compute on Adreno GPU (which supports FP16) in pipeline with Hexagon NPU, overlapping the two compute phases.'
  common_mistake: |
    **The Pitfall:** Running LoRA adapter matmuls on the CPU as a fallback.
    **The Rationale:** Since the Hexagon NPU doesn't support BF16, engineers fall back to the CPU without realizing this serializes execution and causes massive pipeline bubbles.
    **The Consequence:** Effective throughput is cut by 40-60%.
  napkin_math: |
    - Rank-4 adapter INT8: `786K * 1B = 0.8 MB` (vs 1.6 MB BF16).
    - Hexagon INT8 throughput: 45 TOPS.
    - Adapter compute per decode step: `786K MACs * 2 = 1.57 MMACs`.
    - At 45 TOPS: `1.57M / 45T = 0.000035ms = 0.035 µs` (negligible).
    - CPU fallback: ~100 GFLOPS -> `0.0157ms`.
    - **Conclusion:** CPU fallback is **440x slower** than Hexagon; adapters must be quantized.
