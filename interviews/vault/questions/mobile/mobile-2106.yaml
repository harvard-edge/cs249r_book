title: Symmetric vs Asymmetric MACs
scenario: A semantic segmentation model originally in FP32 must be deployed on a Snapdragon
  8 Gen 3 Hexagon DSP using INT8.
question: Analyze the impact of asymmetric vs symmetric quantization on the latency
  of the model's depthwise convolutional layers.
details:
  realistic_solution: Asymmetric quantization introduces a non-zero offset that must
    be multiplied out during accumulation, adding extra arithmetic instructions to
    every MAC. Symmetric quantization forces the zero-point to 0, eliminating offset
    terms and allowing the DSP to execute tight MAC loops, reducing latency.
  common_mistake: Believing both quantization schemes map identically to underlying
    hardware instructions with no performance penalty.
  napkin_math: 'Asymmetric MAC: (a - Za) * (b - Zb) requires 3 adds and 1 mult. Symmetric:
    a * b requires just 1 mult.'
