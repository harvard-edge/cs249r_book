title: Symmetric vs Asymmetric MACs
scenario: A semantic segmentation model originally in FP32 must be deployed on a Snapdragon 8 Gen 3 Hexagon DSP using INT8.
question: "Analyze the impact of asymmetric vs symmetric quantization on the latency of the model's depthwise convolutional layers."
details:
  realistic_solution: Asymmetric quantization introduces a non-zero offset that must
    be multiplied out during accumulation, adding extra arithmetic instructions to
    every MAC. Symmetric quantization forces the zero-point to 0, eliminating offset
    terms and allowing the DSP to execute tight MAC loops, reducing latency.
  common_mistake: |
    **The Pitfall:** Believing all INT8 quantization schemes map identically to underlying hardware instructions.
    **The Rationale:** Candidates assume INT8 arithmetic always takes 1 operation, forgetting that asymmetric quantization introduces zero-point offsets that must be multiplied out.
    **The Consequence:** Deploying asymmetric models on DSPs results in unexpected and significant latency regressions.
  napkin_math: |
    - Asymmetric MAC: `(a - Za) * (b - Zb) = a*b - a*Zb - b*Za + Za*Zb`
    - Operations required: 3 additions and 1 multiplication.
    - Symmetric MAC: `a * b` (since Za = 0, Zb = 0).
    - Operations required: 1 multiplication.
    - **Conclusion:** Symmetric quantization eliminates offset terms, vastly reducing latency.
