title: Symmetric vs Asymmetric MACs
scenario: A semantic segmentation model originally in FP32 must be deployed on a mobile DSP using INT8.
question: What is the impact of asymmetric vs symmetric quantization on the latency of the model's depthwise convolutional layers?
details:
  realistic_solution: 'Asymmetric quantization introduces a non-zero offset that must be multiplied out during accumulation, adding extra arithmetic instructions to every MAC. Symmetric quantization forces the zero-point to 0, eliminating offset terms and allowing the DSP to execute tight MAC loops, reducing latency.'
  common_mistake: |
    **The Pitfall:** Believing all INT8 quantization schemes map identically to underlying hardware instructions.
    **The Rationale:** Candidates assume INT8 arithmetic always takes 1 operation, forgetting that asymmetric quantization introduces zero-point offsets that must be multiplied out.
    **The Consequence:** Deploying asymmetric models on DSPs results in unexpected and significant latency regressions.
  napkin_math: |
    **Assumptions & Constraints:**
    - DSP Hardware computes Multiply-Accumulate (MAC) efficiently.
    - Asymmetric quantization maps FP to INT via scales and non-zero zero-points (Z).
    - Symmetric quantization enforces Z = 0.

    **Calculations:**
    - Asymmetric MAC: (a - Za) * (b - Zb) = a*b - a*Zb - b*Za + Za*Zb. Requires 3 additions + 1 multiplication.
    - Symmetric MAC: a * b (since Za = 0, Zb = 0). Requires 1 multiplication.

    **Conclusion & Interpretation:**
    - **Result: Compute-Bound.** Symmetric quantization eliminates 3 extra arithmetic ops per MAC, severely dropping latency.
