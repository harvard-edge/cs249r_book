title: 'Network Bandwidth Bottlenecks: Specify QoS Framework for Multi-Model Mobile Inference'
scenario: Specify a QoS framework for an Android device (Snapdragon 8 Gen 3, 16GB, 77 GB/s) running up to 5 simultaneous ML models with different priorities. Define priority tiers, bandwidth allocation, preemption policy, and degraded-mode fallback.
question: How would you specify a complete QoS framework to manage 77 GB/s bandwidth across 5 simultaneous ML models?
details:
  realistic_solution: 'Priority tiers: P1=Safety (10GB/s reserved). P2=User-interactive LLM (50GB/s, preemptible only by P1). P3=Display compositing (5GB/s). P4=Background tasks (12GB/s max). P5=Idle prefetch. Preemption: P2 preempts P4 when LLM decode active. Degraded mode: drop P4 to 0 if total > 77GB/s.'
  common_mistake: |
    **The Pitfall:** Defining QoS tiers without concrete bandwidth allocation algorithms or handling total sum overflow.
    **The Rationale:** Creating vague "high/medium/low" priorities that fail when concurrent peak demands exceed hardware limits.
    **The Consequence:** Safety-critical models (e.g., collision avoidance) are starved by background tasks, causing system failure.
  napkin_math: |
    - Total Bandwidth: 77 GB/s.
    - P1 (Safety): 10 GB/s. P3 (Display): 5 GB/s.
    - LLM Decode (P2): 50 GB/s -> TPOT = 1.5 GB / 50 = 30 ms. (Target < 25 ms).
    - Preempt P4 (Background): Reallocate 12 GB/s to P2 -> 62 GB/s.
    - New TPOT = 1.5 / 62 = 24.2 ms.
    - **Preempting P4 allows P2 to hit the 25ms SLA while preserving P1 and P3 guarantees (62+10+5 = 77 GB/s).**
