title: 'Network Bandwidth Bottlenecks: Specify QoS Framework for Multi-Model Mobile Inference'
scenario: An Android device runs up to 5 simultaneous ML models with different priorities. A QoS framework is needed with defined priority tiers, bandwidth allocation, preemption policy, and degraded-mode fallback to handle dynamic contention.
question: How would you specify a complete QoS framework to manage 77 GB/s bandwidth across 5 simultaneous ML models?
details:
  realistic_solution: 'Define rigid QoS bands: P1=Safety/Control (10GB/s reserved strictly). P2=User-interactive LLM (Target >60GB/s, preemptible only by P1). P3=Display compositing (5GB/s reserved). P4=Background updates (12GB/s max). Implement a dynamic preemption governor: P2 automatically preempts P4 to 0 GB/s when the LLM decode ring buffer is active, honoring the 77GB/s ceiling.'
  common_mistake: |
    **The Pitfall:** Defining abstract QoS priorities (High/Medium/Low) without hard byte-level bandwidth limits or sum-total overflow handling.
    **The Rationale:** Assuming standard Linux process schedulers effectively govern memory bus access, which they do not.
    **The Consequence:** Safety-critical tasks (P1) are starved by massive background batch processing, leading to catastrophic system failure.
  napkin_math: |
    **Assumptions & Constraints:**
    - System Bandwidth Limit: 77 GB/s.
    - Static Reservations: P1 (Safety): 10 GB/s. P3 (Display): 5 GB/s. P4 (Background): 12 GB/s.
    - Target P2 (LLM Decode): Requires <25 ms Time-Per-Output-Token (TPOT) for a 1.5 GB model.

    **Calculations:**
    - Default P2 allocation: 77 - 10 - 5 - 12 = 50 GB/s.
    - Default P2 TPOT: 1.5 GB / 50 GB/s = 30 ms (Violates SLA).
    - Preempting P4 reallocates 12 GB/s to P2. New P2 = 62 GB/s.
    - New P2 TPOT: 1.5 GB / 62 GB/s = 24.19 ms.
    - Total Verification: 10 (P1) + 62 (P2) + 5 (P3) + 0 (P4) = 77 GB/s.

    **Conclusion & Interpretation:**
    - **Result: 24.19 ms (Bandwidth-Bound)**. Dynamically preempting the P4 background task guarantees the LLM hits its strict 25ms SLA without breaching the system's 77 GB/s hardware ceiling.
