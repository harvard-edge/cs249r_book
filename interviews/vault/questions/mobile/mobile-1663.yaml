title: 'Tensor G3 Model Rollout: Choosing a Strategy'
scenario: Your team is preparing to deploy a significant update to an on-device machine
  learning model within a mobile application. This model performs real-time image
  recognition, leveraging the Google Tensor G3's 7.5 TOPS (tera operations per second)
  on-device TPU and 12 GB of LPDDR5X RAM for efficient inference. You need to choose
  a rollout strategy that minimizes user impact from potential performance regressions
  or increased battery drain, while also quickly gathering metrics on the new model's
  efficacy and stability in a production environment. Given the critical nature of
  the model and the specific hardware constraints of the Tensor G3, describe the most
  appropriate rollout strategies you would consider and justify your choice for initial
  deployment.
question: Which rollout strategy would you use for a Tensor G3 on-device model update
  to minimize user impact and collect safe metrics?
details:
  realistic_solution: For this scenario, a combination of **shadow deployments** followed
    by **canary deployments** would be highly effective. Initially, a **shadow deployment**
    can be implemented where the new model runs in parallel (but not actively used
    for user-facing predictions) on a small percentage of Tensor G3 devices. This
    allows the team to collect vital telemetry on the new model's resource consumption
    (TPU utilization, memory footprint in LPDDR5X, power draw) and compare its output
    against the old model, all without affecting the user experience. Once preliminary
    shadow testing confirms stability and acceptable resource usage, a **canary deployment**
    can be initiated. A very small percentage of active users (e.g., 1-5%) on Tensor
    G3 devices are routed to the new model. Key performance indicators (KPIs) such
    as inference latency, crash rates, battery drain, and business metrics are meticulously
    monitored. If any issues are detected, traffic can be immediately reverted to
    the old model for the canary group. This strategy provides a safe, iterative,
    and data-driven approach to deploying the sensitive ML model update.
  common_mistake: A common mistake would be to perform a simple 100% direct rollout
    without any phased deployment. This approach risks exposing all users to potential
    bugs, performance issues (e.g., higher inference latency, application crashes),
    or excessive battery consumption on their Tensor G3 devices if the new model isn't
    fully optimized or has unforeseen interactions with the device's resources. Without
    a controlled rollout, debugging and effective rollback become much harder, leading
    to significant user dissatisfaction.
  napkin_math: 'If the new model causes a 5% increase in TPU utilization per inference,
    and your monitoring shows an average of 200 inferences per hour per active user
    on a Tensor G3:

    - **Increased TPU cycles per user per hour:** 200 inferences/hour * 0.05 (additional
    utilization) = 10 ''equivalent old model inferences'' worth of extra TPU work.

    - **Impact on a canary group of 10,000 users:** 10,000 users * 10 additional TPU
    cycles/hour = 100,000 additional TPU cycles per hour across the canary group.

    This increase in TPU activity directly correlates to higher power consumption.
    Observing a 100,000 additional TPU cycles/hour for the canary group, compared
    to the baseline, would be a strong indicator of increased battery drain that needs
    further investigation. It''s not just about TOPS, but sustained load on the TPU
    and frequent access to the 12GB LPDDR5X memory, which also consumes power.'
