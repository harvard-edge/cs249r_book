title: The Federated Learning System for a Social Media App
scenario: Design a federated learning system for a social media app with 500 million daily active users. The model personalizes the content feed. You must improve the model without collecting user interaction data on your servers.
question: "How would you design a federated learning system for a social media app with 500 million daily active users?"
details:
  realistic_solution: 'Hierarchical FL for 500M DAU: (1) Device selection — 25M eligible (charging, WiFi,
    idle), sample 10K/round. (2) Communication — 2 MB x 10K = 20 GB/round compressed to ~2 GB. 4 rounds/day
    = $200/month CDN. (3) Convergence — FedProx/SCAFFOLD for non-IID data, ~200 rounds (50 days) to match
    centralized within 1%. (4) Privacy — per-user DP epsilon=8/year. Battery: 0.8%/round. Cluster users
    into behavioral cohorts to address data heterogeneity.'
  common_mistake: |
    **The Pitfall:** Running standard FedAvg across all 500M devices simultaneously.
    **The Rationale:** Candidates fail to scale down textbook academic algorithms to handle real-world stragglers, bandwidth costs, and device heterogeneity.
    **The Consequence:** Naive FedAvg at this scale would require petabytes of gradient uploads per round and wouldn't converge due to extreme non-IID user behavior.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Daily Active Users: 500M. Sample size per round: 10,000 devices.
       - Model Size/Gradient Upload: 2 MB (compressed).
       - Frequency: 4 rounds/day.
    2. **Calculations:**
       - Data Upload per round = 2 MB * 10,000 = 20 GB.
       - Daily Bandwidth = 20 GB * 4 = 80 GB.
       - Monthly Bandwidth = 80 GB * 30 = ~2.4 TB.
       - Battery cost per round = 3 mins * 2W = 0.1 Wh (0.8% of typical 12.8 Wh battery).
    3. **Conclusion & Interpretation:**
       **Result: Network & Battery Bound. By sampling 10K devices per round and compressing updates, the CDN bandwidth stays at a manageable 2.4 TB/month and battery drain remains <1% per participant.**
