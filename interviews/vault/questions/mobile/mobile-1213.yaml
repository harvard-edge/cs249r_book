title: Per-Channel INT8 Latency on Exynos 2400
scenario: You are deploying an INT8 quantized transformer model on an NPU. When switching from per-tensor to per-channel quantization to recover a 3% accuracy drop, you observe a 20% increase in inference latency, despite the dual-core NPU being rated for a massive 34.7 TOPS.
question: Why changing the quantization granularity causes this latency regression on this specific hardware architecture?
details:
  realistic_solution: Per-channel quantization requires loading a unique scale and zero-point for every output channel during the matrix multiplication, which interrupts continuous burst-reads of weights and stalls the NPU.
  common_mistake: |
    **The Pitfall:** Assuming latency changes are strictly compute-driven.
    **The Rationale:** Candidates incorrectly guess that per-channel quantization increases the number of MAC operations required, failing to realize the core matrix multiplication compute remains identical.
    **The Consequence:** They ignore memory bandwidth bottlenecks and pursue futile compute optimizations.
  napkin_math: |
    **Assumptions & Constraints:**
    - NPU Compute: 34.7 TOPS.
    - Memory Bandwidth: ~50-60 GB/s (LPDDR5X shared).
    - Layer dimension: 4096x4096 linear layer.

    **Calculations:**
    - Compute required: 2 * 4096 * 4096 = 33.5 Mega-Operations.
    - Ideal compute time: 33.5M / 34.7 TOPS = ~0.96 $\mu$s.
    - INT8 weights size: 16.7 MB.
    - Required bandwidth for ideal execution: 16.7 MB / 0.96 $\mu$s = ~17.4 TB/s.

    **Conclusion & Interpretation:**
    - **Result: Memory-Bound Burst Interruption**. The system is severely memory-bound. Adding per-channel parameters (4096 unique fetches) breaks the contiguous 16.7 MB burst read, further bottlenecking memory access and increasing latency by 20%.
