title: The Privacy Memory Tax
scenario: Your team is implementing federated learning to train a 20 million parameter keyboard suggestion
  model on mobile devices. To protect user privacy, you're required to add user-level Differential Privacy
  (DP) via DP-SGD. From a hardware resource perspective, what is the most significant *new* constraint
  introduced by adding on-device DP to the training process?
question: "From a hardware resource perspective, what is the most significant *new* constraint introduced by adding on-device DP to the training process?"
details:
  realistic_solution: The primary new constraint is a dramatic increase in peak RAM usage. Standard training
    averages gradients across a batch, requiring memory for only one set of gradients. DP-SGD, however,
    requires computing and storing gradients for *each individual example* in a batch before clipping
    their norms, adding noise, and averaging. This multiplies the memory required for gradients by the
    batch size, which is often infeasible on a memory-constrained mobile device.
  common_mistake: Engineers often focus on the CPU overhead from generating random noise or the increased
    network communication rounds sometimes needed for convergence. While these are factors, the most prohibitive,
    showstopper cost is typically the massive increase in peak memory usage required to instantiate per-example
    gradients, which can easily exceed the strict memory budget for a single app on a mobile device.
  napkin_math: 'Standard SGD: 20M params * 4B (FP32 grads) = 80MB for one gradient set. DP-SGD with batch=32:
    must store per-example gradients before clipping. Memory = 32 * 80MB = 2560MB = 2.5GB just for gradients.
    Typical phone has 4-6GB total RAM. 2.5GB for gradients alone is infeasible. Must reduce batch size
    or use gradient accumulation with clipping.'
  options:
  - Increased CPU usage from the cryptographic noise generation.
  - Increased network bandwidth to send the larger, noisy model updates.
  - A major increase in peak RAM to store per-example gradients.
  - Increased flash storage needed to save the privacy-preserving model.
  correct_index: 2
