title: The Privacy Memory Tax
scenario: Your team is implementing federated learning to train a 20 million parameter keyboard suggestion model on mobile devices. To protect user privacy, you're required to add user-level Differential Privacy (DP) via DP-SGD.
question: From a hardware resource perspective, what is the most significant new constraint introduced by adding on-device DP to the training process?
details:
  realistic_solution: The primary new constraint is a dramatic increase in peak RAM usage. Standard training averages gradients across a batch, requiring memory for only one set of gradients. DP-SGD, however, requires computing and storing gradients for *each individual example* in a batch before clipping their norms, adding noise, and averaging. This multiplies the memory required for gradients by the batch size, which is often infeasible on a memory-constrained mobile device.
  common_mistake: |
    **The Pitfall:** Focusing purely on the CPU overhead of random noise generation.
    **The Rationale:** Engineers understand that cryptography takes compute, but they fail to realize that DP-SGD fundamentally changes memory allocation semantics.
    **The Consequence:** OOM crashes because instantiating per-example gradients massively multiplies peak RAM usage.
  napkin_math: |
    1. Standard SGD Memory: 20M params * 4B (FP32 grads) = 80 MB for one gradient set.
    2. DP-SGD Requirement: Must store per-example gradients before clipping.
    3. DP-SGD Memory (Batch=32): 32 * 80 MB = 2560 MB = **2.5 GB just for gradients**. This frequently exceeds the strict memory budget of mobile apps.
  options:
  - Increased CPU usage from the cryptographic noise generation.
  - Increased network bandwidth to send the larger, noisy model updates.
  - A major increase in peak RAM to store per-example gradients.
  - Increased flash storage needed to save the privacy-preserving model.
  correct_index: 2
