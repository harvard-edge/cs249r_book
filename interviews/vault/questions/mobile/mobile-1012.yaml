title: 'Network Bandwidth Bottlenecks: Master Roofline Analysis for Mobile LLM Scaling'
scenario: Apply roofline model analysis to determine the minimum batch size at which a 3B INT4 LLM transitions from memory-bandwidth-bound to compute-bound on Snapdragon 8 Gen 3 (77 GB/s LPDDR5X, 45 TOPS INT8 DSP effective for INT4: ~90 TOPS).
question: "At what batch size does a 3B INT4 LLM on Snapdragon 8 Gen 3 move from bandwidth-bound to compute-bound decode, and what does this mean for mobile serving?"
details:
  realistic_solution: 'INT4 effective TOPS: 90 TOPS. BW: 77 GB/s. Ridge point: 90T/77G=1169
    FLOPs/byte. Per-token decode FLOPs: 2×3B=6B FLOPs. Bytes: 1.5GB. AI per token:
    6B/1.5GB=4 FLOPs/byte << 1169. Transition batch: B × 6B FLOPs / 1.5GB = 1169 →
    B = 1169 × 1.5GB / 6B = 292 tokens. At batch=292: compute-bound. TPOT at batch=292:
    max(292×6B/90T, 1.5/77) = max(19.5ms, 19.5ms) = 19.5ms (break-even). At batch=1000:
    TPOT = 1000×6B/90T=66ms (compute-bound). Mobile reality: batch=292 means 292 concurrent
    users — impractical on device. Mobile is always memory-bandwidth-bound for LLM
    decode.'
  common_mistake: |
    **The Pitfall:** Using INT8 TOPS for INT4 arithmetic intensity calculations.
    **The Rationale:** Candidates forget that NPUs with native INT4 support (like Hexagon) can achieve 2× the compute throughput of INT8.
    **The Consequence:** Misidentifying the hardware's ridge point and misunderstanding the exact batch size where the workload transitions from memory-bound to compute-bound.
  napkin_math: |
    - Ridge Point: 90 TOPS (effective INT4) / 77 GB/s = 1169 FLOPs/byte.
    - Decode FLOPs per token: 2 × 3B = 6B FLOPs.
    - Bytes read per pass: 1.5 GB.
    - Arithmetic Intensity (Batch B): B × 6B FLOPs / 1.5 GB = B × 4 FLOPs/byte.
    - Transition Batch Size: B × 4 = 1169 → B = 292.
    - Latency at Batch 1: max(6B / 90T, 1.5 GB / 77 GB/s) = max(0.067ms, 19.5ms) = 19.5ms (Memory Bound).
    - Latency at Batch 292: 292 × 6B / 90T = 19.5ms (Compute Bound).
    - **Conclusion:** Mobile generation is strictly memory-bandwidth-bound for all practical user batch sizes (B << 292).
