title: NPU Sparsity Optimization for 4K Video
scenario: You are deploying an advanced computational photography pipeline using a dense INT8 CNN on the Samsung Exynos 2400 NPU to process 4K video at 30 FPS. The dense model requires 1.2 TOPS per frame. The Exynos 2400's dual-core NPU provides 34.7 TOPS and shares memory with the CPU, GPU, and ISP.
question: Evaluate the tradeoffs between applying 50% unstructured pruning versus 2:4 structured sparsity to achieve the 30 FPS target on the mobile NPU.
details:
  realistic_solution: An L5 engineer will evaluate and recommend 2:4 structured sparsity or hardware-aware block pruning. Modern NPUs increasingly support 2:4 structured sparsity at the silicon level, which effectively skips MAC operations for zero-weights and compresses the weight footprint. This reduces both the compute bottleneck and the load on the shared LPDDR5X memory, preventing contention with the concurrent ISP and GPU workloads.
  common_mistake: |
    **The Pitfall:** Suggesting 50% unstructured pruning to halve compute requirements.
    **The Rationale:** Assuming mathematical sparsity directly translates to hardware acceleration on all platforms.
    **The Consequence:** The NPU executes dense multiplications anyway, yielding zero latency improvement and potentially increasing memory overhead.
  napkin_math: |
    1. Dense compute required: 1.2 TOPS/frame * 30 FPS = 36 TOPS (Exceeds 34.7 TOPS peak).
    2. With 2:4 structured sparsity (50% reduction): Compute becomes 0.6 TOPS/frame.
    3. New requirement: 0.6 TOPS * 30 FPS = 18 TOPS.
    4. **Utilization:** 18 / 34.7 = **51.8%, leaving 16.7 TOPS of headroom.**
