title: Sizing Inverted Residuals for Hexagon NPU
scenario: Your team is deploying a real-time vision model based on an inverted residual architecture to a flagship device powered by a Snapdragon 8 Gen 3. The target hardware for inference is the Qualcomm Hexagon NPU, which provides 45 TOPS of INT8 compute and shares 16 GB of LPDDR5X memory with the CPU and GPU.
question: How should inverted residual expansion ratios be chosen for the Hexagon NPU to hit a strict 15ms latency budget?
details:
  realistic_solution: An L5 engineer will evaluate the NPU's compute-to-memory-bandwidth ratio. They will recognize that the Hexagon NPU's 45 TOPS are best utilized by operations with high arithmetic intensity. The candidate will propose trading theoretical FLOPs for better hardware utilization by selectively replacing memory-bound depthwise convolutions with standard or grouped convolutions, particularly in high-resolution early layers, thereby maximizing INT8 throughput while avoiding LPDDR5X bandwidth bottlenecks.
  common_mistake: |
    **The Pitfall:** Strictly minimizing FLOPs by maximizing depthwise separable convolutions.
    **The Rationale:** Candidates fail to account for arithmetic intensity, overlooking that depthwise layers are heavily memory-bandwidth bound.
    **The Consequence:** The NPU's dense matrix math engines are severely underutilized, leading to poor latency despite a low FLOP count.
  napkin_math: |
    - Compute capacity: 45 TOPS INT8 = 45 * 10^12 ops/sec. Memory BW (LPDDR5X): ~64 GB/s.
    - Required arithmetic intensity = 45,000 GOPS / 64 GB/s = ~703 ops/byte.
    - Depthwise conv (3x3, INT8): (3*3*2 ops) / (2 bytes) = 9 ops/byte.
    - 9 << 703, meaning depthwise layers are heavily memory-bound.
    - A 2MB feature map takes 2MB / 64GB/s = 0.031ms to load, while compute takes only ~0.0004ms.
    - **Sizing the model requires increasing channel counts (1x1 convolutions) to push arithmetic intensity closer to 703 ops/byte, leveraging the "free" 45 TOPS.**
