title: The Audio Pipeline Latency Creep
scenario: You build an acoustic anomaly detector for a smartphone. The model requires 1 second of audio and takes 50ms to run. You want to alert the user within 500ms of the event. You use standard Android AudioRecord APIs to grab audio chunks. Users complain the alert happens nearly a full second late.
question: Why does a 50 ms acoustic anomaly model alert nearly a second late when Android AudioRecord captures 1 s chunks?
details:
  realistic_solution: 'You are fighting **OS Audio Buffer Bloat**. Physical Event -> Mic hardware delay (5ms) -> OS DSP Buffer (250ms) -> OS Framework Buffer (100ms) -> App receives 1s chunk -> ML Inference (50ms) -> Alert UI (16ms). Total Latency = 421ms *after* the 1 second event finished.'
  common_mistake: |
    **The Pitfall:** Blaming the model for being slow in production.
    **The Rationale:** Candidates assume inference is the bottleneck and ignore the data delivery pipeline.
    **The Consequence:** Wasting time profiling the model instead of fixing the OS audio buffer bloat.
  napkin_math: |
    - Physical Event -> Mic hardware delay (5ms).
    - -> OS DSP Buffer (250ms).
    - -> OS Framework Buffer (100ms).
    - -> App receives 1s chunk.
    - -> ML Inference (50ms).
    - -> Alert UI (16ms).
    - **Total Latency = 421ms after the 1 second event finished.** The user perceives the alert 1.4 seconds after the noise started.
