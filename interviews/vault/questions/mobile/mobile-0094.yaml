title: The Audio Pipeline Latency Creep
scenario: You build an acoustic anomaly detector for a smartphone. The model requires 1 second of audio
  and takes 50ms to run. You want to alert the user within 500ms of the event. You use standard Android
  AudioRecord APIs to grab audio chunks. Users complain the alert happens nearly a full second late. The
  model is fast. Where is the latency hiding?
details:
  realistic_solution: You are fighting **OS Audio Buffer Bloat**. Physical Event -> Mic hardware delay
    (5ms) -> OS DSP Buffer (250ms) -> OS Framework Buffer (100ms) -> App receives 1s chunk -> ML Inference
    (50ms) -> Alert UI (16ms). Total Latency = 421ms *after* the
  common_mistake: '"The model is taking longer in production than in testing." If you profiled the model
    at 50ms, the math isn''t the problem. The data delivery is.'
  napkin_math: Physical Event -> Mic hardware delay (5ms) -> OS DSP Buffer (250ms) -> OS Framework Buffer
    (100ms) -> App receives 1s chunk -> ML Inference (50ms) -> Alert UI (16ms). Total Latency = 421ms
    *after* the 1 second event finished. The user perceives the alert 1.4 seconds after the noise started.
