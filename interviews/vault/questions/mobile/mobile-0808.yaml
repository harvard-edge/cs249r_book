title: Mobile New 0008
scenario: A 10MB model on a mobile NPU consumes an unexpected 2W of power. Profiling shows compute blocks are efficient, but the DRAM interface is completely saturated.
question: Why does a 10MB mobile NPU model draw unexpected power by repeatedly reading weights from DRAM?
details:
  realistic_solution: The symptom is severe power draw and DRAM saturation on a small model. The root cause is the failure to pin the model weights into the NPU's dedicated SRAM. Because the NPU treats the weights as volatile per inference, it streams the entire 10MB from off-chip LPDDR memory for every frame. LPDDR access consumes massive amounts of dynamic energy compared to on-chip SRAM.
  common_mistake: |
    **The Pitfall:** Ignoring weight-pinning pragmas in compiler deployment.
    **The Rationale:** Engineers assume small models automatically reside in SRAM, failing to explicitly pin them.
    **The Consequence:** The model falls back to fetching weights from volatile DRAM for every frame, resulting in redundant memory traffic and severe battery drain.
  napkin_math: |
    1. Assumptions & Constraints:
       - Model size: 10 MB. Frame rate: 60 FPS.
       - LPDDR Energy Cost: 800 pJ/byte. SRAM Energy Cost: 40 pJ/byte.
    2. Calculations:
       - Bandwidth: 10 MB * 60 FPS = 600 MB/s.
       - Energy Difference: 800 - 40 = 760 pJ/byte.
       - Wasted Power: 760 pJ/byte * 600 MB/s = 0.456 Joules/sec = 0.456W.
    3. Conclusion & Interpretation:
       - **Result: 0.456W wasted purely on redundant memory traffic (Power-Bound).**
