title: On-Device Adversarial Input Detection for Safety-Critical ML on Tensor G3
scenario: You are developing a safety-critical real-time object detection system for autonomous features on a mobile device. A new adversarial attack vector has been discovered where malicious actors can induce misclassifications by subtly modifying camera frames.
question: How would you detect and mitigate input-level adversarial attacks on a real-time object detector without impacting performance?
details:
  realistic_solution: Implement a lightweight, on-device adversarial perturbation detector leveraging the TPU as a parallel pipeline or pre-processing step.
  common_mistake: |
    **The Pitfall:** Over-relying on retraining the model with adversarial examples.
    **The Rationale:** Candidates often suggest reactive retraining or propose computationally expensive defense models that ignore the strict performance and memory constraints of a mobile SoC.
    **The Consequence:** The proposed solution either fails to generalize to novel attacks or destroys the real-time FPS requirement of the autonomous system.
  napkin_math: |
    1. Identify baseline latency: The primary object detection model takes 40 ms per inference.
    2. Calculate dual-path overhead: Running two slightly perturbed versions of the input doubles the processing path.
    3. Calculate new latency: 40 ms * 2 = **80 ms** per frame.
    4. Calculate protected framerate: 1000 ms / 80 ms = **12.5 FPS**.
