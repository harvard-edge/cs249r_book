title: FedAvg Memory Bottleneck on Hexagon NPU
scenario: A cross-device Federated Averaging (FedAvg) client runs on a Snapdragon 8 Gen 3 device. The
  local update phase processes a dataset of 1,000 user samples. The model requires 2 GOPS of compute and
  160MB of memory operations (weights, activations, gradients) per sample. Engineers expected the local
  training epoch to finish in under 50ms by utilizing the Hexagon NPU (rated at 45 TOPS INT8). Instead,
  the system logs show the local epoch takes exactly 2.5 seconds. Given the device uses shared 12GB LPDDR5X
  RAM with an effective bandwidth of 64 GB/s, apply the roofline model to explain why this massive performance
  gap occurs.
question: "Why does a FedAvg local epoch on Hexagon NPU take 2.5 seconds instead of under 50ms despite high TOPS?"
details:
  realistic_solution: The local FL training phase is deeply memory-bound. Because federated learning on
    mobile devices often processes samples sequentially or with very small batch sizes to preserve memory,
    the arithmetic intensity (operations per byte transferred) is incredibly low. Even though the Hexagon
    NPU can execute 45 trillion operations per second, it spends the vast majority of its time starving
    for data. The execution time is fundamentally dictated by the time it takes the shared LPDDR5X memory
    to shuttle the weights and gradients back and forth, completely ignoring the NPU's peak compute capabilities.
  common_mistake: Candidates often assume the NPU's peak TOPS is the sole factor in latency and might
    incorrectly attribute the 2.5s delay to thermal throttling, CPU-NPU communication overhead, or INT8
    quantization-aware training penalties, failing to calculate the memory bandwidth limit.
  napkin_math: '1. Compute-Bound Time: (1,000 samples * 2 GOPS) / 45 TOPS = 2,000 / 45,000 = 0.044 seconds
    (44 ms).

    2. Total Memory Traffic: 1,000 samples * 160 MB/sample = 160,000 MB = 160 GB.

    3. Memory-Bound Time: 160 GB / 64 GB/s (LPDDR5X bandwidth) = 2.5 seconds.

    4. Arithmetic Intensity: 2 GOPS / 160 MB = 12.5 OPS/byte. The NPU''s roofline ridge point is 45 TOPS
    / 64 GB/s = 703 OPS/byte. Since 12.5 << 703, the workload is heavily memory-bound, explaining the
    exact 2.5s latency observed.'
