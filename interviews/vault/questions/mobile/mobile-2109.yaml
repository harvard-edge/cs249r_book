title: Federated Learning OOM Recovery
scenario: A federated learning client on an Apple A17 Pro trains locally. It faces
  sudden iOS out-of-memory (OOM) evictions. A 50MB model state writes to NVMe at 1
  GB/s.
question: Analyze the trade-off between checkpointing frequency and OOM recovery overhead
  to minimize total wasted training time.
details:
  realistic_solution: Writing a 50MB checkpoint takes 50 milliseconds. If the model
    checkpoints frequently (e.g., every 1 second), it loses 5% of its compute time
    to I/O overhead. However, if it checkpoints too infrequently (e.g., every 60 seconds)
    and an OOM occurs, it loses up to 60 seconds of training progress. The optimal
    frequency balances the continuous 50ms I/O penalty against the expected magnitude
    of lost progress based on the OOM probability distribution.
  common_mistake: Considering only the checkpoint write time without balancing it
    against the mean-time-to-failure (MTTF) of the OOM killer.
  napkin_math: Checkpoint write = 50MB / 1000MB/s = 0.05s. If MTTF=30s, optimal interval
    T = sqrt(2 * 0.05 * 30) ≈ 1.73 seconds.
