title: NPU vs. Reality
scenario: You're evaluating a new object detection model for an AR feature on a flagship smartphone with an Apple A17 Pro Neural Engine (35 TOPS). The model requires 700 Billion INT8 operations per inference.
question: Given the A17 Pro's peak performance, what is the theoretical maximum frame rate (FPS) you could achieve, ignoring all memory, OS, and framework overhead?
details:
  realistic_solution: The correct answer is 50 FPS. The Apple A17 Pro is rated at 35 TOPS (Trillion Operations Per Second). The model requires 700 G-ops (Billion Operations). You must align the units and divide the system's capability by the work required per frame.
  common_mistake: |
    **The Pitfall:** Confusing units (TOPS vs. G-ops) or inverting the division.
    **The Rationale:** Candidates often divide the workload by performance (700 / 35 = 20) instead of performance by workload, or miss the 1000x difference between Trillion and Billion.
    **The Consequence:** The calculated FPS is off by an order of magnitude or fundamentally incorrect.
  napkin_math: |
    1. **System Performance:** Apple A17 Pro Neural Engine = 35 TOPS = 35,000 Billion Operations Per Second.
    2. **Workload:** Model requires 700 Billion Operations per inference.
    3. **Max FPS:** 35,000 G-ops/sec / 700 G-ops/frame = **50 FPS**.
  options:
  - 20 FPS
  - 5 FPS
  - 500 FPS
  - 50 FPS
  correct_index: 3
