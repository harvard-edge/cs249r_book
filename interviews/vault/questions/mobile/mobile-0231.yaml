title: NPU vs. Reality
scenario: You're evaluating a new object detection model for an AR feature on a flagship smartphone with
  an Apple A17 Pro Neural Engine. The model's documentation states it requires 700 Billion INT8 operations
  per inference. Given the A17 Pro's peak performance, what is the theoretical maximum frame rate (FPS)
  you could achieve, ignoring all memory, OS, and framework overhead?
question: "Given the A17 Pro's peak performance, what is the theoretical maximum frame rate (FPS) you could achieve, ignoring all memory, OS, and framework overhead?"
details:
  realistic_solution: The correct answer is 50 FPS. The Apple A17 Pro is rated at 35 TOPS (Trillion Operations
    Per Second). The model requires 700 G-ops (Billion Operations). You must align the units and divide
    the system's capability by the work required per frame.
  common_mistake: Getting confused by the units (TOPS vs. G-ops) or dividing the numbers in the wrong
    order. A common mistake is to divide the workload by the performance (700 / 35) instead of the performance
    by the workload, or to miscalculate the 1000x difference between a Trillion and a Billion.
  napkin_math: Max FPS = System Performance / Work per Frame
  options:
  - 20 FPS
  - 5 FPS
  - 500 FPS
  - 50 FPS
  correct_index: 3
