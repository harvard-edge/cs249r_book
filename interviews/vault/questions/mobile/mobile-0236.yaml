title: The Million-Car Update
scenario: You are a Staff ML Engineer at a connected car company. Your team wants to A/B test a new, more capable driver-assistance model. The new model is 50MB larger than the current production model. The experiment will roll out to a test fleet of 1 million vehicles over their built-in cellular connections.
question: When evaluating the Total Cost of Ownership (TCO) for this single experiment, which of the following costs should you identify as the most significant and immediate financial factor?
details:
  realistic_solution: The cellular data transfer cost for the fleet. A seemingly small 50MB update per vehicle becomes a massive operational expense at the scale of one million vehicles. This cost is direct, immediate, and often far exceeds the one-time cost of training the model or the engineering effort to deploy it.
  common_mistake: |
    **The Pitfall:** Engineers often fixate on their direct costs, like cloud compute for training or their own salaries.
    **The Rationale:** They forget that in mobile deployments, 'last-mile' operational costs that are small per-user become astronomically large when multiplied by millions of users.
    **The Consequence:** This leads to massive unexpected operational expenses that can derail a project.
  napkin_math: |
    - Data transfer per vehicle = 50 MB.
    - Total data transfer = 50 MB * 1,000,000 vehicles = 50,000,000 MB = 50 Terabytes.
    - Cost at standard enterprise IoT cellular rates (e.g., $0.01 per MB) = 50,000,000 MB * $0.01/MB.
    - **Total cost = $500,000 in data transfer alone, dwarfing typical compute or engineering costs.**
  options:
  - The one-time cloud compute cost to retrain the model.
  - The engineering cost (salaries) to implement the A/B test.
  - The fleet-wide cellular data cost to download the 50MB model update.
  - The increased battery consumption from running a larger model during the test.
  correct_index: 2
