title: Mobile Secure Aggregation Fan-In
scenario: A mobile FL round collects 80,000 encrypted updates. The secure aggregation service can validate 5,000 updates/s per shard.
question: How many secure-aggregation validation shards are needed to process 80,000 mobile updates within 4 seconds?
details:
  realistic_solution: One shard validates 20,000 updates in 4 seconds. To validate 80,000 updates, the service needs 4 shards, plus headroom for stragglers and retries.
  common_mistake: |
    **The Pitfall:** Sizing aggregation purely from total round counts while ignoring validation throughput and latency deadlines.
    **The Rationale:** Candidates focus on the sheer volume of data, forgetting that temporal deadlines dictate horizontal scaling requirements in real-time systems.
    **The Consequence:** The server fails to aggregate within the timeout window, discarding thousands of successful client updates.
  napkin_math: |
    1. **Shard Capacity:** 5,000 updates/sec * 4 seconds = 20,000 updates per shard.
    2. **Calculate Shards:** 80,000 total updates / 20,000 updates per shard = **4 shards**.
