title: The Battery Blame Game
scenario: Your ML-powered fitness app drains 1% battery per minute during a workout. The PM says 'the model is too expensive — optimize it.' You profile the power breakdown and find the model is not the main culprit.
question: If ML averages only 20 mW, what drains 1% battery per minute in the workout app?
details:
  realistic_solution: |
    Profile the full system power breakdown during a workout session: (1) **Screen:** always on showing the workout dashboard at high brightness (outdoor use) — ~3.5W. (2) **Camera sensor:** active for pose estimation — ~1.5W. (3) **GPS & Radios:** route tracking and telemetry — ~700 mW. (4) **Heart rate sensor:** continuous optical sensing — ~100 mW. (5) **ML inference:** pose estimation model running every 500ms at 5ms per inference — duty cycle of 1%. NPU power during inference: ~2W. Average: 2W × 0.01 = **20 mW**.
  common_mistake: |
    **The Pitfall:** Assuming the ML model is always the primary power hog.
    **The Rationale:** Candidates equate computational intensity directly with total power drain, ignoring the rest of the system.
    **The Consequence:** They waste time optimizing the NPU when the screen and sensors are consuming orders of magnitude more power.
  napkin_math: |
    - iPhone 15 battery: 12.8 Wh. Drain: 1% per min = 60% per hour.
    - Total power draw = 12.8 Wh * 0.60 = 7.68W.
    - NPU inference draws ~2W when active, but at 1% duty cycle, average is 20mW.
    - The camera sensor draws ~1.5W.
    - The screen at max brightness draws ~3-4W.
    - The model's 20mW is only **~0.26%** of the power budget.
    - Dimming the screen saves significantly more power than optimizing the NPU.
