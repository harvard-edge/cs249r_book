title: Mesh AllGather vs Central Server
scenario: A set of highly capable A17 Pro mobile devices are interconnected via an
  ad-hoc Wi-Fi mesh network to distribute inference across model layers.
question: Explain the architectural advantage of an AllGather operation in this mesh
  compared to a central parameter server.
visual:
  kind: svg
  path: mobile-1977.svg
  alt: A fully connected mesh of nodes showing symmetrical links.
  caption: Symmetrical Mesh Topology for Distributed AllGather.
details:
  realistic_solution: A central parameter server forces all nodes to communicate with
    a single bottleneck node, saturating its Wi-Fi bandwidth linearly with N nodes.
    An AllGather operation over a mesh distributes the communication load across multiple
    peer-to-peer links symmetrically, avoiding a single point of failure and drastically
    increasing aggregate network throughput.
  common_mistake: Assuming AllGather reduces the absolute total bytes sent in the
    system, rather than balancing the bandwidth and avoiding single-node bottlenecks.
  napkin_math: Central bottleneck bandwidth = N * data. Mesh max node bandwidth =
    1 * data.
