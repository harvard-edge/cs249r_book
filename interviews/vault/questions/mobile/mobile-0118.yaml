title: The Background Thermal Throttling
scenario: Your photo app runs an on-device facial clustering model in the background while the user's
  phone is charging overnight. The model processes 10,000 photos. When run in the foreground, it takes
  5 minutes. But in the overnight background task, telemetry shows it takes 45 minutes, and sometimes
  gets killed by the OS entirely. Why is the background execution 9x slower?
question: "Why is the background execution 9x slower?"
details:
  realistic_solution: The model is hitting the **Background Thermal Wall**. Mobile operating systems (iOS
    and Android) place extreme restrictions on background tasks to prevent the device from overheating
    while unattended (which is a fire hazard, especially when plugged in and already generating battery-charging
    heat).
  common_mistake: '"The phone is in low-power mode." Low power mode affects this, but phones charging
    overnight are explicitly *not* in low power mode.'
  napkin_math: 'Foreground limit: SoC can draw ~4W until skin temperature hits 42°C. Background limit:
    OS restricts sustained draw to ~1W to keep skin temperature under 35°C (especially since charging
    adds ~2W of ambient heat inside the chassis). Dropping from 4W to 1W forces the NPU to its lowest
    clock tier, increasing inference time from 30ms/photo to ~270ms/photo (9x slower).'
