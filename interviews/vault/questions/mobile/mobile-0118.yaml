title: The Background Thermal Throttling
scenario: Your photo app runs an on-device facial clustering model in the background while the user's phone is charging overnight. The model processes 10,000 photos. When run in the foreground, it takes 5 minutes. But in the overnight background task, telemetry shows it takes 45 minutes, and sometimes gets killed by the OS entirely.
question: Why is the background execution 9x slower?
details:
  realistic_solution: The model is hitting the **Background Thermal Wall**. Mobile operating systems (iOS and Android) place extreme restrictions on background tasks to prevent the device from overheating while unattended (which is a fire hazard, especially when plugged in and already generating battery-charging heat).
  common_mistake: |
    **The Pitfall:** Attributing the slowdown to low-power mode.
    **The Rationale:** Candidates often assume low power mode is active, forgetting that phones charging overnight are explicitly *not* in low power mode.
    **The Consequence:** The candidate misdiagnoses the issue and proposes software-level fixes that do not address the fundamental thermal constraints.
  napkin_math: |
    1. **Foreground Limit:** The SoC can draw ~4W until the skin temperature hits 42°C, taking 5 minutes for 10,000 photos (30ms/photo).
    2. **Background Limit:** The OS restricts sustained power draw to ~1W to keep the skin temperature under 35°C (charging adds ~2W of ambient heat).
    3. **Throttling Impact:** Dropping from 4W to 1W forces the NPU to its lowest clock tier.
    4. **Resulting Latency:** Inference time increases from 30ms/photo to ~270ms/photo, resulting in a **9x slower** execution time (45 minutes).
