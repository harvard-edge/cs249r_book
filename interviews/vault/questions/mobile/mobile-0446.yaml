title: The Night-Vision Accuracy Collapse
scenario: "You are an ML engineer optimizing a driver drowsiness detection model. In FP16, the model achieves 99% accuracy. To meet the 15 FPS target, you quantize it to INT8 using post-training static quantization (PTQ). Daytime accuracy is 98.5%, but it collapses to <50% at night. Profiling reveals activation spikes in key CNN layers when headlights appear."
question: "Why does INT8 PTQ keep 98.5% daytime accuracy but collapse below 50% on night clips with headlight activation spikes?"
details:
  realistic_solution: |
    The accuracy collapse is caused by severe clipping overflow due to an unrepresentative calibration dataset. Post-Training Quantization (PTQ) establishes its affine mapping scale factor using activation distributions from the calibration data. Without high-dynamic-range night clips (headlights), the scale is set too narrowly. When headlight spikes occur, they far exceed the integer range maximum (127), saturating the tensors and destroying spatial feature integrity. Inject diverse, high-magnitude edge cases into the calibration set.
  common_mistake: |
    **The Pitfall:** Blaming the hardware or quantization algorithm immediately.
    **The Rationale:** Engineers assume the NPU's INT8 is buggy or jump to complex solutions like QAT without diagnosing the unrepresentative calibration dataset.
    **The Consequence:** Wasting time on model re-architecture instead of simply fixing the calibration data.
  napkin_math: |
    **Assumptions & Constraints:**
    - Daytime calibration max activation: 6.0.
    - Nighttime headlight activation: 20.0.
    - Target precision: INT8 (max value 127).

    **Calculations:**
    - PTQ Scale Factor (S): 6.0 / 127 = 0.047.
    - Nighttime float quantization: 20.0 / 0.047 = 425.5.
    - Clipped integer: min(425, 127) = 127.

    **Conclusion & Interpretation:**
    - **Result: Massive data loss (Numerical-Overflow Bottleneck)**. The out-of-distribution high values saturate to 127, creating a numerical-overflow bottleneck that ruins inference.
  options:
  - 'The mobile NPU has buggy INT8 support. Keep the problematic layers in FP16 (mixed precision) and quantize the rest.'
  - 'The model architecture is unstable. Add more Batch Normalization layers to better regulate activation distributions before re-quantizing.'
  - 'The calibration dataset is not representative of night-time conditions, causing activation overflow. Re-run quantization with a new calibration set that includes night-driving clips.'
  - 'Per-tensor quantization is too coarse. You must switch to per-channel quantization to provide a more fine-grained scaling factor for each filter.'
