title: The Night-Vision Accuracy Collapse
scenario: You are an ML engineer on the automotive team, optimizing a driver drowsiness detection model
  for a new car. The model runs on a mobile-class SoC with an NPU. In FP16, the model achieves 99% accuracy.
  To meet the 15 FPS target, you must quantize it to INT8. After post-training static quantization, the
  model's accuracy on your daytime validation set is still excellent (98.5%), but it collapses to less
  than 50% on night-time driving clips. You profile the model and find that the activation values in a
  few key CNN layers spike dramatically when headlights from oncoming cars appear in the frame. How do
  you solve this?
question: "Why does INT8 PTQ keep 98.5% daytime accuracy but collapse below 50% on night clips with headlight activation spikes?"
details:
  realistic_solution: The most likely cause is a quantization range mismatch due to an unrepresentative
    calibration dataset. Post-training static quantization determines the scaling factor from a small
    sample of data. Your calibration set was likely dominated by daytime images where activation values
    are low. At night, headlight glare causes activation values to spike far beyond the calibrated maximum,
    leading to clipping (overflow). The INT8 values saturate at 127, erasing critical information. The
    solution is to create a new calibration dataset that includes a representative mix of both daytime
    and night-time clips, especially those with high-dynamic-range scenes like headlight glare. Re-running
    quantization with this new dataset will produce a more robust scaling factor that can handle the full
    range of activation values seen in production.
  common_mistake: Engineers often blame the hardware ('the NPU's INT8 is buggy') or the quantization algorithm
    itself ('per-tensor isn't good enough'). They might immediately try a more complex solution like Quantization-Aware
    Training (QAT) without diagnosing the simpler, more fundamental problem.
  napkin_math: Let's diagnose the overflow. Assume your initial calibration (daytime only) found the max
    activation value to be 6.0. The INT8 quantization will map the real-valued range [-6.0, 6.0] to [-127,
    127]. The scaling factor is `S = 6.0 / 127 ≈ 0.047`.
  options:
  - The mobile NPU has buggy INT8 support. Keep the problematic layers in FP16 (mixed precision) and quantize
    the rest.
  - The model architecture is unstable. Add more Batch Normalization layers to better regulate activation
    distributions before re-quantizing.
  - The calibration dataset is not representative of night-time conditions, causing activation overflow.
    Re-run quantization with a new calibration set that includes night-driving clips.
  - Per-tensor quantization is too coarse. You must switch to per-channel quantization to provide a more
    fine-grained scaling factor for each filter.
  correct_index: 2
