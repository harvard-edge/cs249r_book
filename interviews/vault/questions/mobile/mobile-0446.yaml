title: The Night-Vision Accuracy Collapse
scenario: You are an ML engineer on the automotive team, optimizing a driver drowsiness detection model for a new car. In FP16, the model achieves 99% accuracy. To meet the 15 FPS target, you quantize it to INT8 using post-training static quantization. The model's accuracy on the daytime validation set is 98.5%, but it collapses to less than 50% on night-time driving clips. Profiling reveals activation spikes in key CNN layers when headlights appear.
question: "Why does INT8 PTQ keep 98.5% daytime accuracy but collapse below 50% on night clips with headlight activation spikes?"
details:
  realistic_solution: |
    The most likely cause is a quantization range mismatch due to an unrepresentative calibration dataset. Post-training static quantization determines the scaling factor from a small sample of data. Your calibration set was likely dominated by daytime images where activation values are low. At night, headlight glare causes activation values to spike far beyond the calibrated maximum, leading to clipping (overflow). The INT8 values saturate at 127, erasing critical information. The solution is to create a new calibration dataset that includes a representative mix of both daytime and night-time clips, especially those with high-dynamic-range scenes like headlight glare. Re-running quantization with this new dataset will produce a more robust scaling factor that can handle the full range of activation values seen in production.
  common_mistake: |
    **The Pitfall:** Blaming the hardware or quantization algorithm immediately.
    **The Rationale:** Engineers assume the NPU's INT8 is buggy or jump to complex solutions like QAT without diagnosing the unrepresentative calibration dataset.
    **The Consequence:** Wasting time on model re-architecture instead of simply fixing the calibration data.
  napkin_math: |
    - **Daytime calibration max activation:** 6.0.
    - **INT8 scale factor:** S = 6.0 / 127 ≈ 0.047.
    - **Nighttime headlight activation:** Spikes to e.g., 20.0.
    - **Quantized value:** 20.0 / 0.047 ≈ 425 (overflows INT8 max of 127).
    - **Result:** **Saturated values erase critical information, causing accuracy collapse.**
  options:
  - The mobile NPU has buggy INT8 support. Keep the problematic layers in FP16 (mixed precision) and quantize the rest.
  - The model architecture is unstable. Add more Batch Normalization layers to better regulate activation distributions before re-quantizing.
  - The calibration dataset is not representative of night-time conditions, causing activation overflow. Re-run quantization with a new calibration set that includes night-driving clips.
  - Per-tensor quantization is too coarse. You must switch to per-channel quantization to provide a more fine-grained scaling factor for each filter.
  correct_index: 2
