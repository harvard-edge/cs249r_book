title: Implementing a Streaming Response Pipeline for Compound AI on A17 Pro
scenario: 'A compound AI app runs a 3-stage pipeline: retrieval (80ms) → context preparation (20ms) → LLM generation (1B model, 20 tok/s). Users perceive over 5 seconds of silence before any response appears.'
question: 'How should the compound AI pipeline stream tokens so the first response appears within 200ms?'
details:
  realistic_solution: 'Architecture: (1) Immediate UI feedback: show typing indicator within 16ms of query submission. (2) Retrieval + context prep: 80+20=100ms. (3) LLM prefill: 512-token context at A17 Pro (35 TOPS, 1B model): 73ms. (4) First token generation: starts streaming immediately after prefill. Total TTFT: 100+73=173ms < 200ms target. (5) Implement CoreML streaming with token callback: each generated token triggers a Swift async callback that appends to the UI text view.'
  common_mistake: |
    **The Pitfall:** Attempting to stream before retrieval completes, or blocking UI updates until generation finishes.
    **The Rationale:** Engineers either stream empty hallucinations or wait for the entire compound pipeline to finish.
    **The Consequence:** Abysmal perceived user latency exceeding 5 seconds.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Retrieval + Prep: 100 ms.
       - Target TTFT: < 200 ms.
       - LLM Prefill (512 tokens, 1B model, A17 Pro): ~73 ms.
    2. **Calculations:**
       - TTFT = 100 ms (Retrieval+Prep) + 73 ms (Prefill) = 173 ms.
       - Margin: 200 ms - 173 ms = 27 ms.
       - Token 1 appears at 173 ms; Token 10 at 173 + 500 ms = 673 ms.
    3. **Conclusion & Interpretation:**
       - **Result: 173 ms TTFT (Streaming Architecture Achieved).**
