title: The Depthwise Memory Bound
scenario: To optimize your mobile vision model, you replace all standard 3x3 convolutions with Depthwise
  Separable Convolutions (like in MobileNet). The total FLOPs (compute operations) decrease by 8x. However,
  the actual latency on the mobile GPU only improves by 1.5x. Why didn't the 8x reduction in math translate
  to an 8x reduction in time?
question: "Why didn't the 8x reduction in math translate to an 8x reduction in time?"
details:
  realistic_solution: You drastically reduced the arithmetic intensity (FLOPs/byte) and made the layer
    strictly memory-bound. A standard convolution reuses the same input activation patch across many output
    channels, heavily leveraging the L1 cache. A depthwise convolution applies one spatial filter to one
    input channel, meaning it reads a patch of memory, does very little math, and immediately discards
    it. The mobile GPU spends all its time waiting for the memory bus to fetch the next channel, leaving
    its ALUs largely idle.
  common_mistake: '"Assuming latency scales linearly with FLOPs, and treating FLOP reduction as the ultimate
    metric for model optimization."'
  napkin_math: 'Standard 3x3 (64in, 64out) = 36,864 MACs per output pixel. Depthwise Separable replaces this with Depthwise (576 MACs) + Pointwise 1x1 (4,096 MACs) = 4,672 MACs. Total math reduction: 36,864 / 4,672 ≈ 8x. However, the Depthwise layer reads a 3x3x64 input patch (576 elements = 1,152B in FP16) and performs 576 MACs (1,152 FLOPs). Arithmetic Intensity = 1,152 FLOPs / 1,152 Bytes = 1 FLOP/Byte. Mobile GPUs (e.g., 51.2GB/s) starve for data when intensity is < 20 FLOPs/Byte. The depthwise layer becomes completely memory-bound, offsetting the 8x theoretical math speedup.'
