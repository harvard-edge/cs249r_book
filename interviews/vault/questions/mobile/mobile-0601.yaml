title: The Generative Keyboard's Hidden Tax
scenario: You are optimizing an autoregressive model for a generative keyboard. Profiling on a Snapdragon
  8 Gen 3 reveals that per-token latency is high, but the actual math time within the NPU kernels is low.
  A large portion of the time is spent on overhead. A common pattern in the Transformer is `LayerNorm
  -> GeLU -> Add`, each executed as a separate kernel. Analyze the impact of fusing these three operations
  into a single NPU kernel. Quantify the potential latency savings.
details:
  realistic_solution: Fusing the operations is critical for performance on a mobile device. The primary
    bottleneck isn't the arithmetic itself, but the cost of data movement and control.
  common_mistake: Focusing only on FLOPs, which do not change with fusion, and therefore concluding the
    benefit is minimal. Another common mistake is underestimating the severe penalty of kernel launch
    overhead and DRAM round-trips on mobile SoCs, which are designed for power efficiency and have less
    aggressive schedulers and caches than datacenter GPUs.
  napkin_math: 'Let''s analyze memory/overhead savings for a tensor of size `[1, 128, 768]` in FP16 (196.6
    KB) on a Snapdragon 8 Gen 3 (68 GB/s BW).

    Unfused (3 kernels): Total data moved = 3 reads + 3 writes = 6 * 196.6 KB = 1.18 MB.

    Fused (1 kernel): Total data moved = 1 read + 1 write = 2 * 196.6 KB = 393.2 KB.

    Memory time saved = (1.18 MB - 0.393 MB) / 68 GB/s = 11.5 µs.

    Kernel dispatch overhead saved: 2 fewer launches. At ~20 µs per launch, that''s 40 µs.

    Total savings per block: ~51.5 µs, driven almost entirely by dispatch and data movement rather than
    FLOPs.'
