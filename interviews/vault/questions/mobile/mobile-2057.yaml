title: Memory Bandwidth Bound for Mobile Autoregression
scenario: A 1.5B parameter language model is quantized to 4-bit and deployed on an
  Apple A17 Pro with 50 GB/s unified memory bandwidth. The target generation speed
  is 15 tokens/sec.
question: Apply memory bandwidth calculations to determine the minimum GB/s required
  just to read the weights during generation, verifying if the A17 can support this.
details:
  realistic_solution: A 1.5B parameter model at 4 bits (0.5 bytes) per weight requires
    0.75 GB of memory. For autoregressive generation with batch size 1, the entire
    weight matrix must be loaded from RAM for every single generated token. Therefore,
    15 tokens/s requires 0.75 GB * 15 = 11.25 GB/s. Since 11.25 GB/s is well below
    the A17's 50 GB/s limit, the target is heavily compute-bound, not bandwidth-bound.
  common_mistake: Calculating the bandwidth using FP16 weights (3 GB * 15 = 45 GB/s)
    instead of the specified 4-bit INT4 representation.
  napkin_math: 1.5e9 * 0.5 bytes = 0.75 GB. 0.75 * 15 = 11.25 GB/s < 50 GB/s.
