title: The ANE-GPU Pipeline Split
scenario: 'You are optimizing a vision-language model on an A17 Pro. The vision encoder runs in 5 ms on
  the ANE, and the language decoder runs in 8 ms on the GPU. Currently these run sequentially (13 ms total).
  You propose pipelining: while the GPU decodes frame N, the ANE encodes frame N+1. What is the steady-state
  throughput (frames per second) and single-frame latency, and what is the throughput speedup?'
question: "What is the steady-state throughput (frames per second) and single-frame latency, and what is the throughput speedup?"
details:
  realistic_solution: 'In steady-state pipelining, a new result emerges every max(5, 8) = 8 ms. Throughput:
    1/8ms = 125 fps vs sequential 1/13ms = 77 fps. Speedup: 13/8 = 1.625x throughput improvement. Note:
    first-frame latency is still 13 ms, but sustained throughput improves by 62.5%. The ANE is idle 3
    ms per cycle, which could be used for preprocessing.'
  common_mistake: Claiming the pipelined latency is 5+8=13 ms or even 5 ms. In a pipeline, throughput
    is limited by the slower stage, but per-frame latency is still the sum for a single frame. The improvement
    is in throughput (frames per second), not single-frame latency.
  napkin_math: 'Sequential: 13 ms/frame = 77 fps. Pipelined throughput: 1 frame every 8 ms = 125 fps.
    Speedup: 1.625x. ANE utilization: 5/8 = 0.6%. GPU utilization: 8/8 = 1%.'
