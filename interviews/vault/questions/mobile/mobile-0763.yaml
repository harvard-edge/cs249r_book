title: The ANE-GPU Pipeline Split
scenario: 'You are optimizing a vision-language model on an A17 Pro. The vision encoder runs in 5 ms on the ANE, and the language decoder runs in 8 ms on the GPU. Currently these run sequentially (13 ms total). You propose pipelining: while the GPU decodes frame N, the ANE encodes frame N+1.'
question: What is the steady-state throughput (frames per second) and single-frame latency, and what is the throughput speedup?
details:
  realistic_solution: 'Implement asynchronous pipelining across the heterogeneous accelerators. While single-frame latency remains sequential, steady-state throughput becomes bounded by the bottleneck stage (GPU at 8ms). Calculate frames per second based on this 8ms bound, demonstrating a significant throughput increase over synchronous execution.'
  common_mistake: |
    **The Pitfall:** Claiming the pipelined latency is 5+8=13 ms or even 5 ms.
    **The Rationale:** In a pipeline, throughput is limited by the slower stage, but per-frame latency is still the sum for a single frame. The improvement is in throughput (frames per second), not single-frame latency.
    **The Consequence:** Overpromising latency reductions instead of accurately reporting throughput gains.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - ANE time: 5 ms.
       - GPU time: 8 ms.
       - Sequential total: 13 ms.
    2. **Calculations:**
       - Sequential throughput: 1 / 13ms = 77 fps.
       - Pipelined throughput bound: max(5, 8) = 8 ms.
       - Steady-state throughput: 1 / 8ms = 125 fps.
       - Speedup: 13 / 8 = 1.625x.
       - ANE utilization: 5/8 = 62.5%.
       - GPU utilization: 8/8 = 100%.
    3. **Conclusion & Interpretation:**
       - **Result: Throughput-Bound.** Speedup is 1.625x throughput improvement, limited by the 8ms GPU bottleneck.
