title: BLE Gossip Quantization
scenario: 6 smartphones perform asynchronous federated learning over BLE 5.0 (1.4
  Mbps) utilizing a gossip-based topology to exchange 1MB gradients at 2Hz.
question: Propose an asynchronous quantization scheme that prevents the 30ms BLE connection
  interval from bottlenecking the 2Hz update requirement.
details:
  realistic_solution: A 2Hz frequency requires completing exchanges in under 500ms.
    A 1MB (8Mb) payload over 1.4 Mbps takes 5.7 seconds, fundamentally violating the
    deadline. The gradients must be quantized aggressively by at least 12x (e.g.,
    INT2 or sparse selection) to compress transfer times below 470ms, leaving 30ms
    for BLE synchronization.
  common_mistake: Designing a full-precision protocol when the raw physical channel
    capacity (1.4Mbps) is mathematically incapable of supporting a 1MB payload at
    2Hz.
  napkin_math: Required time < 0.5s. Sync = 0.03s. Max transfer = 0.47s. Current transfer
    = 8Mb / 1.4Mbps = 5.71s. Factor = 5.71/0.47 = 12.1x compression.
