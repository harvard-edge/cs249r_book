title: SRAM Tiling versus DRAM Fetch on Mobile Chips
scenario: 'A real-time video upscaling model on a mobile device uses large intermediate feature maps that exceed the on-chip SRAM of the Neural Engine.'
question: 'Evaluate the energy and latency trade-offs of tiling the feature maps to fit in SRAM versus relying on unified memory DRAM spills for a 1080p frame.'
details:
  realistic_solution: 'Tiling requires recomputing overlapping halo regions but keeps data localized to SRAM. Spilling to unified memory incurs a severe energy penalty per byte accessed. Tiling is strictly preferable if the halo overhead''s extra MACs consume less total energy than the equivalent DRAM roundtrip.'
  common_mistake: |
    **The Pitfall:** Evaluating only throughput latency without considering power.
    **The Rationale:** Candidates fail to recognize that DRAM access is the primary thermal and battery bottleneck in mobile SoCs.
    **The Consequence:** The design achieves high FPS but drains the battery rapidly and causes the device to overheat.
  napkin_math: |
    1. **Assumptions & Constraints:**
       * Feature Map Dimensions: 1920 * 1080 * 16 channels.
       * Data Type: 2 bytes (FP16).
    2. **Calculations:**
       * Data Size: 33,177,600 values * 2 bytes = 66,355,200 bytes.
    3. **Conclusion & Interpretation:**
       * **Result: Memory-Bound.** ~66 MB far exceeds typical mobile SRAM limits of 8-16 MB.
