title: The Sluggish Co-Pilot
scenario: You are optimizing an on-device LLM assistant for a 'hands-free driving' feature. Time-To-First-Token (TTFT) is ~800ms, but the Time-Per-Output-Token (TPOT) is a speedy ~50ms. The model is a 3B parameter transformer quantized to INT4. The hard deadline for the UI to receive the first token is 500ms.
question: What inference phase explains an 800ms TTFT with 50ms TPOT in an on-device 3B LLM assistant?
details:
  realistic_solution: 'The bottleneck for the 800ms TTFT is the prompt processing (pre-fill) phase, which is heavily compute-bound. To generate the first token, the model must perform a massive, parallel matrix-matrix multiplication (GEMM) across the entire input prompt. This operation has high arithmetic intensity, meaning it is limited by the NPU''s peak compute capacity, taking significant time to crunch the math. Conversely, the 50ms TPOT during the decode phase is memory-bandwidth bound. Generating subsequent tokens relies on matrix-vector multiplications (GEMV), which have very low arithmetic intensity. The NPU is starved waiting to load the 1.5 GB model weights from DRAM for every token, constrained by the phone''s ~51.2 GB/s memory bandwidth.'
  common_mistake: |
    **The Pitfall:** Confusing the bottlenecks of the two LLM inference phases.
    **The Rationale:** Engineers often incorrectly assume pre-fill is memory-bound and decode is compute-bound.
    **The Consequence:** Applying the wrong optimization strategies, such as trying to improve memory bandwidth to fix slow pre-fill.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: 3B parameters INT4 (1.5 GB weights).
    - Memory bandwidth = ~50 GB/s. Peak compute = ~35 TOPS.
    - Observed TTFT = 800ms. Observed TPOT = 50ms.

    **Calculations:**
    - Prefill (GEMM) Arithmetic Intensity: High. Time depends on raw TOPS (Compute bound).
    - Decode (GEMV) Arithmetic Intensity: Low. Memory bound by streaming 1.5 GB at 50 GB/s = 30-50ms.

    **Conclusion & Interpretation:**
    - **Result: 800 ms TTFT (Compute-bound TTFT bottleneck)**. The time is heavily consumed by the large GEMM operation required for the pre-fill prompt sequence.
  options:
  - The model is too large, making the NPU completely memory-bound for both phases.
  - The model is being loaded from slow flash storage on every request, causing high cold-start latency.
  - The initial prompt processing (pre-fill) is highly compute-bound due to the large GEMM operation required for the entire prompt sequence.
  - The CPU is taking too long to tokenize the user's text input before sending it to the Neural Engine.
  correct_index: 2
