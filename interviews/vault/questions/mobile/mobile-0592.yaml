title: The ISP Format Conversion Bottleneck
scenario: Your mobile app captures 4K video. Your neural network requires 224x224 RGB input. You write a script to read frames via OpenCV/CPU, resize them, and pass them to the NPU. The NPU processes the frame in 5ms. However, your max framerate caps at 12 FPS.
question: Why does a 5ms NPU model cap at 12 FPS when 4K frames are resized through OpenCV on the CPU?
details:
  realistic_solution: The bottleneck is CPU-based YUV-to-RGB color conversion, not resize. Use the platform's hardware ISP path (AVFoundation/CameraX) to get RGB directly.
  common_mistake: |
    **The Pitfall:** Blaming the resize operation instead of the color conversion.
    **The Rationale:** Candidates know OpenCV cv2.resize can be slow, but they miss that the camera ISP outputs NV12/NV21 (YUV) while OpenCV expects BGR, forcing a massive per-pixel color space conversion.
    **The Consequence:** Engineers will waste time optimizing the resize algorithm while the CPU remains bottlenecked by the fundamental format conversion load.
  napkin_math: |
    1. Identify pixel count: 4K video contains ~8.2 million pixels.
    2. Calculate operations per frame: Converting YUV to RGB requires ~5 math operations per pixel. 8.2M * 5 = 41 million operations.
    3. Calculate sustained compute at 30 FPS: 41 million ops * 30 FPS = **1.23 GFLOPS**.
    4. Identify the bottleneck: 1.2+ GFLOPS for conversion on a mobile CPU limits the framerate to ~12 FPS, masking the 5ms NPU speed.
