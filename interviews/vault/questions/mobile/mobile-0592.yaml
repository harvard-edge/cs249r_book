title: The ISP Format Conversion Bottleneck
scenario: Your mobile app captures 4K video. Your neural network requires 224x224 RGB input. You write
  a script to read frames via OpenCV/CPU, resize them, and pass them to the NPU. The NPU processes the
  frame in 5ms. But your max framerate is 12 FPS. Where is the bottleneck?
question: "Why does a 5ms NPU model cap at 12 FPS when 4K frames are resized through OpenCV on the CPU?"
details:
  realistic_solution: 'The bottleneck is CPU-based YUV-to-RGB color conversion, not resize. The camera
    ISP outputs NV12/NV21 (YUV), but OpenCV reads frames as BGR, forcing a per-pixel color space conversion:
    8.2M pixels x 5 ops = 41M operations on a mobile CPU at 30 FPS demands 1.2+ GFLOPS just for conversion.
    At 12 FPS, each frame takes ~83ms total: ~60ms for YUV-to-RGB + resize on CPU, ~5ms for NPU inference,
    ~18ms for buffer copies. Fix: use the platform''s hardware ISP path (AVFoundation on iOS, CameraX
    on Android) to get RGB directly from the ISP, bypassing CPU conversion entirely and hitting 30+ FPS.'
  common_mistake: '"OpenCV `cv2.resize` is slow." It is, but resizing isn''t the root of the problem.
    The format conversion is.'
  napkin_math: Converting 4K YUV to RGB requires ~5 math operations per pixel. 8.2 million pixels * 5
    = 41 million operations. Doing this on a mobile CPU at 30 FPS requires over 1.2 GFLOPS of sustained
    compute just for color conversion.
