title: The ISP Format Conversion Bottleneck
scenario: Your mobile app captures 4K video. A script reads frames via OpenCV, resizes them, and passes them to a 5ms NPU model. However, the max framerate caps at 12 FPS.
question: "Why does a 5ms NPU model cap at 12 FPS when 4K frames are resized through OpenCV on the CPU?"
details:
  realistic_solution: |
    The bottleneck is CPU-based YUV-to-RGB color conversion, not resize. Use the platform's hardware ISP path (AVFoundation/CameraX) to get RGB directly.
  common_mistake: |
    **The Pitfall:** Blaming the resize operation instead of the color conversion.
    **The Rationale:** Candidates know OpenCV cv2.resize can be slow, but they miss that the camera ISP outputs NV12/NV21 (YUV) while OpenCV expects BGR, forcing a massive per-pixel color space conversion.
    **The Consequence:** Engineers will waste time optimizing the resize algorithm while the CPU remains bottlenecked by the fundamental format conversion load.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Frame: 4K (8.2 million pixels).
       - Format: Camera outputs YUV, OpenCV requires RGB.
    2. **Calculations:**
       - YUV-to-RGB ops: 5 ops/pixel * 8.2M = 41 million ops/frame.
       - 30 FPS CPU load: 41M * 30 = 1.23 GFLOPS.
    3. **Conclusion & Interpretation:**
       - **Result: CPU Format Bottleneck.** The CPU is saturated by the massive YUV-to-RGB pixel math (~1.2 GFLOPS), capping at 12 FPS and starving the 5ms NPU.
