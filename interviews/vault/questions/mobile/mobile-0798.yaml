title: Super-Res NPU vs 5G Streaming Energy
scenario: 'A mobile app plays a 2-hour 4K movie. Option A: Stream native 4K. The 5G radio draws 3.0W for
  4K bandwidth, and the hardware decoder draws 0.9W. Option B: Stream 1080p and use an on-device NPU for
  ML super-resolution to 4K. The 5G radio draws 0.8W for 1080p, the decoder draws 0.5W, and the NPU draws
  1.5W for 60FPS upscaling. Calculate the total energy saved (in Joules) by using the ML super-resolution
  approach over the 2-hour movie.'
details:
  realistic_solution: In mobile systems, radio transmission (especially 5G) is one of the most power-hungry
    components. Offloading bandwidth to local compute (like ML super-resolution) is a classic energy optimization
    technique if the local compute is highly efficient. We evaluate this by comparing the sum of subsystem
    power draws for both options. Option A (Native 4K) relies heavily on the 5G modem, resulting in a
    total system power of 3.9W. Option B utilizes the NPU but drastically reduces the 5G and decoding
    power, resulting in a total system power of 2.8W. By multiplying the power difference by the total
    duration of the movie in seconds, we can quantify the exact energy savings in Joules.
  common_mistake: Focusing only on the high NPU power (1.5W) and assuming on-device ML is worse, failing
    to factor in the massive energy savings from the 5G radio step-down.
  napkin_math: 'Option A Power (Native 4K) = 3.0W (5G) + 0.9W (Decoder) = 3.9W.

    Option B Power (ML Super-Res) = 0.8W (5G) + 0.5W (Decoder) + 1.5W (NPU) = 2.8W.

    Power Savings = 3.9W - 2.8W = 1.1W.

    Movie duration = 2 hours = 7200 seconds.

    Total Energy Saved = 1.1 Watts * 7200 seconds = 7,920 Joules.'
