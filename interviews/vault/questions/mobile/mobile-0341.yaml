title: 'The Dashcam Battery Drain Dilemma: Duty Cycling & Energy Harvesting'
scenario: 'You''re developing a ''smart dashcam'' feature for a mobile app that runs on a modern smartphone.
  The phone''s SoC draws about 4W of power when actively running your computer vision model. To manage
  battery life, you''ve engineered the feature to run on a duty cycle: it''s active for 15 seconds, then
  idle for 45 seconds, repeating this pattern. For a typical 30-minute commute, calculate the total energy
  your feature consumes in Watt-hours (Wh).'
question: "How much energy does a 4W dashcam model consume during a 30-minute commute when active 25% of the time?"
details:
  realistic_solution: The correct approach is to first calculate the average power consumption by applying
    the duty cycle, and then multiply that by the duration of the commute in hours.
  common_mistake: The most common mistake is to ignore the duty cycle and calculate energy consumption
    as if the model runs continuously at full power. Another frequent error is unit confusion, such as
    forgetting to convert the 30-minute commute into hours, leading to a result that is 60x too high.
  napkin_math: '1. **Duty cycle fraction:** Active = 15s / 60s = 0.25. Idle = 45s / 60s = 0.75.

    2. **Average power (assuming ~0W idle):** 4W × 0.25 + 0W × 0.75 = 1.0W.

    3. **Commute duration:** 30 min = 0.5 hours.

    4. **Total energy:** 1.0W × 0.5h = 0.5 Wh.'
  options:
  - 2.0 Wh
  - 30 Wh
  - 0.5 Wh
  - 1.0 Wh
  correct_index: 2
