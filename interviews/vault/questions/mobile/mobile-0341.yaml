title: 'The Dashcam Battery Drain Dilemma: Duty Cycling & Energy Harvesting'
scenario: You're developing a smart dashcam feature for a mobile app. The phone's SoC draws about 4W of power when actively running your computer vision model. The feature runs on a duty cycle: active for 15 seconds, then idle for 45 seconds.
question: How much energy does a 4W dashcam model consume during a 30-minute commute when active 25% of the time?
details:
  realistic_solution: First calculate the average power consumption by applying the duty cycle, and then multiply that by the duration of the commute in hours.
  common_mistake: |
    **The Pitfall:** Ignoring the duty cycle or messing up unit conversions.
    **The Rationale:** Candidates often calculate energy consumption as if the model runs continuously at full power, or they forget to convert the 30-minute commute into hours.
    **The Consequence:** The resulting energy estimation is either 4x too high or wildly inaccurate due to unit confusion, leading to poor battery management decisions.
  napkin_math: |
    1. Calculate duty cycle fraction: Active = 15s / 60s = 0.25. Idle = 45s / 60s = 0.75.
    2. Calculate average power: (4W * 0.25) + (0W * 0.75) = 1.0W.
    3. Convert commute duration to hours: 30 minutes = 0.5 hours.
    4. Calculate total energy: 1.0W * 0.5h = **0.5 Wh**.
  options:
  - 2.0 Wh
  - 30 Wh
  - 0.5 Wh
  - 1.0 Wh
  correct_index: 2
