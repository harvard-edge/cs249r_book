title: Real-time Multimodal Assistant Latency on Hexagon NPU
scenario: "You are architecting an on-device real-time visual assistant running entirely on a smartphone powered by the Qualcomm Hexagon NPU (Snapdragon 8 Gen 3). The application streams 30fps camera frames and user audio, processes them through a local 7B parameter multimodal LLM, and outputs synthesized speech. The system must guarantee a Time-to-First-Token (TTFT) under 600ms and a Time-Per-Output-Token (TPOT) under 80ms."
question: "How would you schedule a real-time multimodal assistant on Hexagon NPU while avoiding shared memory bottlenecks?"
details:
  realistic_solution: A robust architecture strictly isolates concurrent subsystem workloads to manage the shared LPDDR5X bandwidth bottleneck. Audio and video preprocessing are offloaded to the DSP and ISP respectively, keeping the CPU in a low-power state. The 7B model must utilize INT4 weight and INT8 activation quantization for the Hexagon NPU to ensure the auto-regressive decode phase stays within the remaining memory bandwidth budget. Additionally, the prompt prefill phase is chunked to maintain high utilization of the 45 TOPS INT8 compute without starving the continuous camera stream of memory access.
  common_mistake: |
    **The Pitfall:** Treating the NPU as a standalone black box.
    **The Rationale:** Candidates ignore memory bandwidth contention on the shared LPDDR5X bus from the camera ISP and DSP audio processing.
    **The Consequence:** Severe degradation of TPOT in real-world scenarios.
  napkin_math: |
    - 7B model at INT4 requires `~3.5 GB` for weights. Peak bandwidth is `~68 GB/s`.
    - ISP/DSP/OS consume `20 GB/s`, leaving `48 GB/s` for the NPU.
    - TPOT memory time: `3.5 GB / 48 GB/s = 73ms` (under 80ms target).
    - Prefill Compute (500 tokens): `500 * 7B * 2 = 7 Tera-ops`.
    - NPU Effective Compute (40% of 45 TOPS): `18 TOPS`.
    - Prefill time: `7 / 18 = 388ms`.
    - Add `50ms` (DSP audio/video pre) + `50ms` (DSP TTS post).
    - **Conclusion:** Total TTFT is `388 + 50 + 50 =` **488ms**, safely under the 600ms constraint.
