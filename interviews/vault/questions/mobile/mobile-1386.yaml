title: Real-time Multimodal Assistant Latency on Hexagon NPU
scenario: You are architecting an on-device real-time visual assistant running entirely
  on a smartphone powered by the Qualcomm Hexagon NPU (Snapdragon 8 Gen 3). The application
  streams 30fps camera frames and user audio, processes them through a local 7B parameter
  multimodal LLM, and outputs synthesized speech. The system must orchestrate across
  a heterogeneous CPU+GPU+NPU architecture with 16 GB of shared LPDDR5X memory. Design
  a pipelined execution strategy that decomposes the end-to-end latency (preprocessing,
  TTFT, TPOT, postprocessing) to guarantee a Time-to-First-Token (TTFT) under 600ms
  and a Time-Per-Output-Token (TPOT) under 80ms.
question: How would you schedule a real-time multimodal assistant on Hexagon NPU while
  avoiding shared memory bottlenecks?
details:
  realistic_solution: A robust architecture strictly isolates concurrent subsystem
    workloads to manage the shared LPDDR5X bandwidth bottleneck. Audio and video preprocessing
    are offloaded to the DSP and ISP respectively, keeping the CPU in a low-power
    state. The 7B model must utilize INT4 weight and INT8 activation quantization
    for the Hexagon NPU to ensure the auto-regressive decode phase stays within the
    remaining memory bandwidth budget. Additionally, the prompt prefill phase is chunked
    to maintain high utilization of the 45 TOPS INT8 compute without starving the
    continuous camera stream of memory access.
  common_mistake: Candidates typically treat the 45 TOPS NPU as a standalone black
    box, ignoring the memory bandwidth contention on the shared LPDDR5X bus. They
    often fail to model the concurrent bandwidth demands of the camera ISP, DSP audio
    preprocessing, and the NPU's auto-regressive KV cache reads, which severely degrades
    TPOT in real-world scenarios.
  napkin_math: 'A 7B parameter model quantized to INT4 requires approximately 3.5
    GB for weights. The Snapdragon 8 Gen 3''s shared LPDDR5X subsystem provides roughly
    68 GB/s of peak bandwidth. Assuming the camera ISP, DSP, and OS consume 20 GB/s,
    48 GB/s is available for the NPU. During the memory-bound decode phase, reading
    3.5 GB at 48 GB/s yields a TPOT of 73ms (3.5 / 48), meeting the <80ms budget.
    For the compute-bound prefill phase of a 500-token prompt: 500 tokens * 7B params
    * 2 ops = 7 Tera-ops. Operating the 45 TOPS INT8 Hexagon NPU at a realistic 40%
    utilization (18 effective TOPS), the prefill compute takes ~388ms (7 / 18). Adding
    50ms for DSP audio/video preprocessing and 50ms for initial DSP text-to-speech
    postprocessing yields an end-to-end TTFT of ~488ms, safely under the 600ms constraint.'
