title: Exynos 2400 NPU Heterogeneous Pipeline Design
scenario: You must design the inference architecture for a novel real-time computational photography pipeline
  running on the Samsung Exynos 2400. The workload mixes dense convolutions, dynamic control-flow sparse
  operations, and transformer blocks. You need to optimally distribute these tasks across the NPU, CPU,
  and GPU, leveraging the 34.7 TOPS dual-core NPU while strictly managing contention on the shared 12
  GB LPDDR5X memory to guarantee a strict 33.3ms latency budget.
details:
  realistic_solution: A mastery-level design partitions the workload strictly according to the programmability-efficiency
    spectrum. Dense, static convolutions and matrix multiplications are pinned to the highly efficient
    dual-core NPU. Dynamic control flow or sparse operations are explicitly routed to the more programmable
    CPU or GPU. Crucially, the architect will implement zero-copy buffers within the shared 12 GB LPDDR5X
    memory pool, allowing the ISP, NPU, and CPU to pass large activation tensors without initiating expensive
    memory copies between processing domains.
  common_mistake: Candidates frequently attempt to compile the entire monolithic model exclusively for
    the NPU to chase the 34.7 TOPS peak performance. They fail to recognize that dynamic control flow
    and unstructured sparsity will stall the NPU pipeline, and they ignore the severe bandwidth contention
    that occurs when the CPU, GPU, ISP, and NPU simultaneously hit the shared LPDDR5X memory interface.
  napkin_math: Targeting 30 FPS requires exactly 33.3ms latency per frame. The Exynos 2400 NPU provides
    34.7 TOPS. For a 200 GOPS dense NPU workload, optimal theoretical compute time is (200 / 34,700) *
    1000 = 5.76ms. Assuming a typical LPDDR5X bandwidth of ~60 GB/s, reading a 1.5 GB FP16 model and 500MB
    of activations takes (2.0 / 60) * 1000 = 33.3ms, instantly blowing the budget. This mathematical constraint
    dictates immediate INT8 quantization to halve the model to 750MB, reducing NPU memory transfer time
    to 12.5ms. With realistic 40% NPU utilization (14.4ms compute) and 12.5ms memory transfer, the pipeline
    consumes 26.9ms, leaving a safe 6.4ms margin for CPU/GPU fallback tasks orchestrated in the shared
    12 GB pool.
