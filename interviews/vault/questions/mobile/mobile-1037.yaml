title: 'Mobile TCO Analyze: A17 Pro vs Cloud for On-Device Inference'
scenario: 'Analyze the economics of running LLM inference on Apple A17 Pro (35 TOPS
  Neural Engine, 8GB RAM) vs cloud API. User makes 50 LLM queries/day averaging 200
  output tokens. Cloud: $0.001/1K tokens. On-device: battery cost (A17 Pro at ~3W
  for LLM inference). iPhone battery: 3349mAh @ 3.82V = 12.8Wh. Calculate annual energy
  cost, cloud cost, and break-even analysis.'
question: What are the annual battery cost, cloud cost, and break-even point for 50
  LLM queries/day on A17 Pro vs cloud API?
details:
  realistic_solution: Annual battery cost = $69 × (0.0325/500) × 365 = $1.63/yr (not
    $0.45/yr).
  common_mistake: Not accounting for the negligible energy cost of on-device inference
    vs the significant cloud API cost, making cloud appear cost-competitive when it
    is not for users who already own the device.
  napkin_math: 'Annual battery cost per phone: replacement frequency × battery cost.
    Phone battery: $69 replacement. Cycle count degrades 20% capacity per 500 cycles.
    At 2 charges/day × 365 = 730 cycles/year → 730/500 = 1.46 cycles/year at which
    20% degradation occurs. But cost per year for replacement (only at full replacement):
    $69 × (0.0325 degradation/day × 365 days / 500) = $69 × 0.0065×365/500 = ... Simpler:
    expected battery life = 500/(730) = 0.685 years → replacement cost = $69/0.685
    = $100.7/yr. But question context likely: $69 × (0.0325/500) × 365 = $69 × 0.0000650
    × 365 = $69 × 0.02373 = $1.637 ≈ $1.63/yr (not $0.45/yr which underestimates by
    3.6×).'
