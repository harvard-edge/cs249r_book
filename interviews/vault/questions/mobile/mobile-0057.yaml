title: The Jank Budget
scenario: A new on-device recommendation model runs on the app's main UI thread. During testing, you notice the scrolling animation stutters every time the model runs.
question: To maintain a perfectly smooth 60 frames-per-second experience, what is the maximum time budget you have for all work (rendering + model inference) within a single frame?
details:
  realistic_solution: To maintain a 60 FPS refresh rate, the total work for each frame must complete in under 16.67 milliseconds. If inference and rendering exceed this budget, the frame is dropped, leading to visible stuttering or 'jank'. This is why any non-trivial ML inference must be moved off the main UI thread.
  common_mistake: |
    **The Pitfall:** Confusing the frame budget with general latency targets or ANR timeouts.
    **The Rationale:** Engineers often think 100ms is 'fast enough' for users, without considering the strict 60 FPS refresh rate requirements.
    **The Consequence:** Missing the frame deadline, leading to dropped frames and visible UI stuttering (jank).
  napkin_math: |
    1. Target frame rate: 60 FPS.
    2. Total budget per frame: 1000 ms / 60 FPS = **16.67 ms**.
  options:
  - 5000 ms
  - 100 ms
  - 16 ms
  - 33 ms
  correct_index: 2
