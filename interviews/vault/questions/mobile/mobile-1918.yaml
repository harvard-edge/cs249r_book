title: Snapdragon NPU Duty-Cycling
scenario: Analyzing battery drain issues on a social media app running continuous
  facial landmark tracking on a Snapdragon 8 Gen 3.
question: Analyze the integrated power-vs-latency trade-off of running the 45 TOPS
  NPU continuously frame-by-frame versus batching 3 frames and duty-cycling the NPU
  at 30 Hz, including the impact on per-frame end-to-end latency for the user.
details:
  realistic_solution: Continuous processing keeps the NPU power rail active. Buffering
    3 frames over 100ms and running them as a batch lets the NPU finish in ~5ms then
    clock-gate for 95ms. Power savings ~ 95% of the NPU's active envelope. The trade-off
    is added end-to-end latency - the first frame in a batch waits up to 100ms for
    the batch window to fill, pushing user-perceived response latency from 33ms (continuous)
    to ~133ms (batched). For UX-critical tracking this is unacceptable, so the engineering
    decision must integrate energy and latency budgets, not optimize one in isolation.
  common_mistake: Optimizing only for power and shipping a 100ms-latency batched pipeline
    that breaks the touch-to-response loop, or assuming MAC count drops with batching
    when in fact savings come from idle-state entry and latency increases.
  napkin_math: '3 frames / 45 TOPS -> 5ms active + 95ms sleep; per-frame latency:
    continuous 33ms, batched up to 133ms; energy ratio batched/continuous = 5*1W
    + 95*0.01W = 5.95 mWh per window vs continuous 100*1W = 100 mWh -> 17x lower
    energy at 4x worse latency.'
