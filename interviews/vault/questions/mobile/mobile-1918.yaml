title: Snapdragon NPU Duty-Cycling
scenario: Analyzing battery drain issues on a social media app running continuous
  facial landmark tracking on a Snapdragon 8 Gen 3.
question: Break down the power cost of running the 45 TOPS NPU continuously frame-by-frame
  versus batching frames and duty-cycling the NPU at 30 Hz.
details:
  realistic_solution: Continuous processing keeps the NPU power rail constantly active.
    By buffering 3 frames (at 30 FPS, ~100ms) and running them as a batch, the NPU
    blasts through 3 inferences in ~5ms. This allows the NPU hardware to enter a low-power
    clock-gated state for the remaining 95ms of the window, drastically lowering the
    thermal envelope.
  common_mistake: Assuming batched processing on a phone reduces total MACs, rather
    than realizing the savings come entirely from idle state entry.
  napkin_math: 3 frames / 45 TOPS -> 5ms active, 95ms sleep
