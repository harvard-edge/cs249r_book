title: Snapdragon NPU Duty-Cycling
scenario: A social media app on Snapdragon 8 Gen 3 runs continuous facial- landmark
  tracking. The Hexagon NPU draws 1.0 W when active under this workload and 10 mW
  when clock-gated (residual leakage and rail keep-alive). At 30 fps the NPU completes
  one frame in ~5 ms and is otherwise idle. The team is comparing two policies (a)
  continuous - keep the rail hot and process every frame as it arrives, end-to-end
  latency 33 ms; (b) batched duty-cycle - buffer 3 frames over a 100 ms window, run
  the NPU for ~15 ms on the batch, then clock-gate for 85 ms.
question: Analyze the integrated energy-vs-latency trade-off of the two policies.
  Compute energy per 100 ms window in millijoules for each, the steady-state NPU energy
  ratio, and the worst-case user-perceived per-frame latency. Recommend a policy and
  explain when batching's latency penalty outweighs its energy win.
details:
  realistic_solution: 'Continuous policy: NPU active for 100 ms at 1.0 W -> 100 ms
    * 1.0 W = 100 mJ per 100 ms window; per-frame latency = 33 ms (one frame interval).
    Batched policy: NPU active 15 ms at 1.0 W = 15 mJ plus 85 ms gated at 0.01 W =
    0.85 mJ -> total 15.85 mJ per 100 ms window. Energy ratio batched/continuous =
    15.85/100 = 0.16, ~6.3x energy reduction. The first frame in each batch must wait
    for the 100 ms window to fill plus 15 ms compute, so worst-case user-perceived
    latency = 100 + 15 = 115 ms vs 33 ms continuous - roughly 3.5x worse. Recommendation:
    batched mode is correct only when tracking is feeding a non-interactive consumer
    (e.g., post-capture beautify, recorded video pipeline). For live touch-driven
    AR the 115 ms tail break the touch-to- response loop and the energy win is not
    worth the UX cost; ship continuous mode and instead reduce the per-frame compute
    (e.g., lighter model on a slower core).'
  common_mistake: Reporting energy in mWh for sub-second windows (mWh = 3600 mJ -
    off by ~3 orders of magnitude); or optimising only for power and shipping a batched
    pipeline that breaks the interactive feedback loop.
  napkin_math: 'Continuous: 100 ms * 1.0 W = 100 mJ; latency 33 ms. Batched: 15 ms
    * 1.0 W + 85 ms * 0.01 W = 15 + 0.85 = 15.85 mJ; latency up to 100 + 15 = 115
    ms. Ratio = 6.3x energy, 3.5x worse latency.'
