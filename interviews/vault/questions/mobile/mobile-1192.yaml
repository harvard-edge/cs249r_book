title: Energy Cost of Memory vs Compute on Tensor G3
scenario: Your team deployed two versions of an on-device LLM on a Google Tensor G3. Version A has fewer parameters but uses FP16 precision. Version B is an INT8 quantized model with more parameters but fits entirely within the TPU's SRAM. Telemetry shows Version A drains the battery significantly faster per inference.
question: Why can a larger INT8 Tensor G3 model that fits in SRAM use less energy than a smaller FP16 model fetching DRAM?
details:
  realistic_solution: The power draw is dominated by memory movement, not compute. According to Horowitz energy principles, accessing off-chip memory is orders of magnitude more expensive than performing ALU operations. Version B's quantization allows its weights to reside in SRAM, trading cheap compute (more MACs) to avoid expensive DRAM fetches, resulting in vastly lower total energy per inference.
  common_mistake: |
    **The Pitfall:** Assuming fewer operations automatically translate to lower power consumption.
    **The Rationale:** Candidates fail to account for the massive energy discrepancy between data movement and compute.
    **The Consequence:** Optimizing for FLOPs instead of memory access, leading to severe battery drain from off-chip LPDDR5X fetches.
  napkin_math: |
    * Version A (FP16): 1B MACs (0.9pJ) + 100M DRAM reads (100pJ) = 0.9mJ + 10mJ = 10.9mJ.
    * Version B (INT8): 1.5B MACs (0.2pJ) + 10M DRAM reads (100pJ) + 140M SRAM reads (5pJ) = 0.3mJ + 1.0mJ + 0.7mJ = 2.0mJ.
    * **Version B consumes ~5x less energy despite performing 50% more compute, due to avoiding DRAM.**
