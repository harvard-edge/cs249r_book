title: 'The Federated Learning Battery Tax: Federated Learning'
scenario: An automotive company is using Federated Learning (FL) to privately train a predictive maintenance
  model on its customers' mobile phones. During one training round, the model update process keeps the
  phone's main SoC active for 12 seconds. Assuming the SoC consumes 3 Watts while active, calculate the
  total energy consumed from the user's battery for this single training round. Explain what this 'battery
  tax' means for the product.
question: "How much battery energy does a 12s, 3W federated-learning round consume, and what product tax does it create?"
details:
  realistic_solution: The key is to calculate the energy in Watt-seconds and then convert to the standard
    battery unit of Watt-hours (Wh). The 'battery tax' per round is small, but the cumulative cost over
    thousands of users and many rounds per day is a critical product and system design constraint. It
    directly impacts user sentiment and places a ceiling on how frequently the company can afford to train
    without causing noticeable battery drain.
  common_mistake: Engineers often confuse power (a rate, in Watts) with energy (a quantity, in Watt-hours).
    They might calculate the Watt-seconds correctly but then fail to convert it to Watt-hours, leading
    to an answer that is thousands of times too high. This overlooks the fact that while the *power draw*
    is significant, the *duration* is short, making the total energy consumption per round very small.
  napkin_math: '1. Identify Power (P): The mobile SoC active power during model updates is exactly 3 Watts.
    2. Identify Duration (T): The update process lasts exactly 12 seconds. 3. Calculate Energy Consumption:
    Energy = Power * Time = 3W * 12s = 36 Joules. Given a typical 54,000 Joule phone battery, this single
    round drains <0.1%.'
  options:
  - 36 Wh
  - 0.6 Wh
  - 0.01 Wh
  - 3 W
  correct_index: 2
