title: The AR Frame Drop
scenario: You're a mobile ML engineer optimizing an AR application. The app uses the NPU to run object detection on the camera feed and then directs the GPU to render a complex 3D overlay on the detected object. You observe that while NPU inference is fast (~10ms), the app frequently misses its 16ms frame budget specifically when the GPU needs to access the original, high-resolution 4K camera frame to blend the AR overlay correctly. A system profiler shows the GPU is stalled, waiting for data.
question: Why does a 4K camera frame stall the GPU despite 10ms NPU inference in an AR overlay pipeline?
details:
  realistic_solution: |
    The bottleneck is the bandwidth of the MIPI camera bus. The GPU is waiting for the large, high-resolution 4K frame to be transferred from the camera sensor into the shared LPDDR5 memory. While the main memory bus connecting the SoC components is extremely fast, it is fed by a much slower peripheral bus (MIPI CSI-2). The GPU cannot start blending until the frame has fully arrived in DRAM.
  common_mistake: |
    **The Pitfall:** Blaming unified memory contention or cache coherency.
    **The Rationale:** Engineers assume the unified memory itself is saturated, forgetting that data must first traverse slow peripheral buses (producer) before the GPU (consumer) can access it.
    **The Consequence:** Unnecessary optimization of GPU shaders while the true bottleneck remains unaddressed at the hardware I/O level.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 4K frame (3840x2160), YUV420 format (1.5 bytes/pixel).
       - MIPI CSI-2 bus bandwidth: ~2.5 GB/s.
       - LPDDR5X DRAM bandwidth: ~77 GB/s.
    2. **Calculations:**
       - Frame size: 3840 * 2160 * 1.5 = ~12.4 MB.
       - MIPI transfer time: 12.4 MB / 2.5 GB/s = ~5 ms.
       - DRAM read time: 12.4 MB / 77 GB/s = ~0.16 ms.
    3. **Conclusion & Interpretation:**
       - **Transferring the frame to memory takes ~5ms, which is a massive chunk of the 16ms budget. Bottleneck: Peripheral I/O Bandwidth.**
  options:
  - The NPU is taking longer than profiled, and the GPU is waiting for the detection results before it can start rendering.
  - The unified LPDDR5 memory bus is saturated due to contention between the CPU, GPU, and NPU, slowing down the GPU's data fetch.
  - The GPU is stalled waiting for the full 4K camera frame to transfer over the slow MIPI bus into DRAM; the peripheral bus is the bottleneck.
  - A cache coherency delay between the NPU's write to memory and the GPU's read from memory is forcing a slow data synchronization.
  correct_index: 2
