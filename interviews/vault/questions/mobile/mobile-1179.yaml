title: On-Device Vision Pipeline Memory Bandwidth Calculation
scenario: You are deploying a real-time object detection model on a smartphone powered
  by the Qualcomm Hexagon NPU (Snapdragon 8 Gen 3), which features 45 TOPS INT8 compute
  and a heterogeneous architecture sharing 16 GB of LPDDR5X memory across the CPU,
  GPU, and NPU. The camera captures 1080p (1920x1080) RGB 8-bit frames at 30 FPS.
  In a naive data pipeline, the CPU reads the raw camera frame, resizes it to a 640x640
  RGB INT8 tensor, writes it back to main memory, and finally the NPU reads this tensor
  for inference. Calculate the total continuous memory bandwidth (in MB/s) consumed
  by this exact data pipeline sequence to keep the NPU fed.
question: How would you calculate the total continuous memory bandwidth (in MB/s)
  consumed by this exact data pipeline sequence to keep the NPU fed?
details:
  realistic_solution: The correct approach sums the memory traffic for all components
    in the pipeline. To optimize this on the Snapdragon 8 Gen 3, a realistic solution
    would offload resizing to the Image Signal Processor (ISP) or GPU, and utilize
    zero-copy hardware buffers (like Android HardwareBuffers) to avoid redundant CPU
    read/write roundtrips.
  common_mistake: Candidates often forget to account for all read and write operations
    required by intermediate steps in a shared memory system. They might only calculate
    the raw camera output throughput or solely the NPU input, ignoring the CPU's memory
    footprint during preprocessing.
  napkin_math: '1. Raw frame size: 1920 x 1080 pixels * 3 channels * 1 byte = 6,220,800
    bytes (~6.22 MB).

    2. CPU read bandwidth (raw frames at 30 FPS): 6.22 MB * 30 = 186.6 MB/s.

    3. Preprocessed tensor size: 640 x 640 pixels * 3 channels * 1 byte = 1,228,800
    bytes (~1.23 MB).

    4. CPU write bandwidth (preprocessed tensors): 1.23 MB * 30 = 36.9 MB/s.

    5. NPU read bandwidth (inference input): 1.23 MB * 30 = 36.9 MB/s.

    Total bandwidth = 186.6 + 36.9 + 36.9 = 260.4 MB/s.'
