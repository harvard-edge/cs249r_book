title: On-Device Vision Pipeline Memory Bandwidth Calculation
scenario: You are deploying a real-time object detection model on a smartphone sharing LPDDR5X memory across the CPU, GPU, and NPU. The camera captures 1080p (1920x1080) RGB 8-bit frames at 30 FPS. In a naive pipeline, the CPU reads the raw frame, resizes it to a 640x640 RGB INT8 tensor, writes it back to main memory, and finally the NPU reads this tensor for inference.
question: Calculate the total continuous memory bandwidth (in MB/s) consumed by this exact data pipeline sequence to keep the NPU fed.
details:
  realistic_solution: The correct approach sums the memory traffic for all components in the pipeline. To optimize this, a realistic solution would offload resizing to the Image Signal Processor (ISP) or GPU, and utilize zero-copy hardware buffers (like Android HardwareBuffers) to avoid redundant CPU read/write roundtrips.
  common_mistake: |
    **The Pitfall:** Only calculating the raw camera output or NPU input throughput.
    **The Rationale:** Candidates ignore intermediate read/write operations by the CPU during preprocessing, failing to see the compounding cost in a shared memory system.
    **The Consequence:** Drastically underestimating system memory bandwidth utilization, leading to unexpected thermal throttling and dropped frames.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Raw frame: 1920 x 1080 RGB 8-bit (3 bytes).
       - Preprocessed tensor: 640 x 640 RGB INT8 (3 bytes).
       - Frame rate: 30 FPS.
    2. **Calculations:**
       - Raw frame size: 1920 * 1080 * 3 bytes = 6.22 MB
       - CPU read (raw at 30 FPS): 6.22 MB * 30 = 186.6 MB/s
       - Preprocessed tensor size: 640 * 640 * 3 bytes = 1.23 MB
       - CPU write (preprocessed at 30 FPS): 1.23 MB * 30 = 36.9 MB/s
       - NPU read (inference at 30 FPS): 1.23 MB * 30 = 36.9 MB/s
       - Total bandwidth: 186.6 + 36.9 + 36.9 = 260.4 MB/s
    3. **Conclusion & Interpretation:**
       - **Result: 260.4 MB/s. Memory-Bandwidth-Bound.**
