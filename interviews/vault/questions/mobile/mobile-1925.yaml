title: Hardware FIFO Sensor Batching
scenario: Using the Android Sensor Manager to reduce battery drain for a pedometer
  ML model on a Snapdragon 8 Gen 3 phone.
question: Apply a hardware wake-up FIFO strategy to buffer accelerometer data, batching
  inference every 5 seconds instead of waking the CPU/NPU on every step.
details:
  realistic_solution: Configure the accelerometer with `SENSOR_DELAY_GAME` (50Hz)
    and set the `maxReportLatencyUs` parameter to 5,000,000 (5 seconds). The IMU hardware
    will store 250 samples in its local FIFO. The application processor stays asleep
    until the FIFO is full, wakes up once, pulls the block, runs a batched inference,
    and immediately returns to sleep.
  common_mistake: Leaving `maxReportLatencyUs` at 0, causing the main Application
    Processor to wake up 50 times a second and drain the battery in hours.
  napkin_math: 5 sec * 50 Hz = 250 samples buffered
