title: The Federated Economics Trade-Off
scenario: 'You''re an MLE on the autonomous driving team, tasked with developing a driver fatigue detection
  feature for the company''s mobile app. The model requires approximately 50 MB of processed sensor data
  per user, per day for training. For an upcoming pilot program with 100,000 users, your team is debating
  two strategies:'
details:
  realistic_solution: The centralized approach incurs a massive data upload cost, while the federated
    approach's primary cost is the energy consumed on the user's device, impacting their battery life.
  common_mistake: Engineers often correctly calculate the data volume but fail to identify the corresponding
    primary cost on the other side of the trade-off. They might state the federated approach is 'free'
    because it has no data transfer cost, completely ignoring the very real, user-impacting cost of battery
    drain from performing on-device training computations. Forgetting to scale by all variables (users
    *and* days) is also a common arithmetic error.
  napkin_math: '`50 MB/day/user` | `× 30 days` | `= 1,500 MB/month/user (or 1.5 GB)` | `× 100,000 users`
    | `= 150,000 GB/month` | `= 150 TB/month`'
  options:
  - 5 TB
  - 150 GB
  - 150 TB
  - 1.5 GB
  correct_index: 2
