title: Jank Analysis of On-Device LLM on Tensor G3
scenario: Your team is deploying a real-time smart reply feature using Gemini Nano
  on the Google Tensor G3. The UI thread requires a steady 60 FPS (16.6ms per frame)
  to prevent jank during scrolling. However, when the on-device TPU (7.5 TOPS) begins
  processing a prompt, you observe frame drops and ANR (Application Not Responding)
  warnings, despite the TPU being a separate coprocessor and having 12 GB LPDDR5X
  memory available. Analyze why this happens given the system architecture.
question: Why do frame drops and ANR warnings occur when Gemini Nano runs on Tensor
  G3's 7.5 TOPS TPU during 60 FPS scrolling?
details:
  realistic_solution: The frame drops occur due to memory bandwidth saturation and
    synchronous blocking. While the Tensor G3's TPU processes the LLM operations,
    it aggressively consumes the LPDDR5X memory bandwidth. If the UI thread synchronously
    waits for the inference result or competes for the same memory bus to render high-resolution
    textures, it misses the 16.6ms deadline. The system behavior is explained by the
    shared memory controller bottleneck.
  common_mistake: Candidates often assume that because the TPU handles the compute,
    the main CPU thread is entirely free. They miss the impact of memory bandwidth
    contention or the synchronous IPC (Inter-Process Communication) overhead when
    the UI thread waits for the TPU response.
  napkin_math: Target frame time = 1000ms / 60 FPS = 16.6ms. If an LLM inference takes
    50ms on the 7.5 TOPS TPU, and the UI thread blocks waiting for it, we miss 3 frames
    (50ms / 16.6ms = 3.01). Even if asynchronous, if the TPU saturates the memory
    bandwidth of the 12 GB LPDDR5X during generation, UI rendering memory accesses
    are delayed, pushing the frame rendering time from a typical 8ms to >16.6ms, causing
    jank.
