title: Jank Analysis of On-Device LLM on Tensor G3
scenario: Your team is deploying a real-time smart reply feature using Gemini Nano on the Google Tensor G3. The UI thread requires a steady 60 FPS (16.6ms per frame) to prevent jank during scrolling. However, when the on-device TPU (7.5 TOPS) begins processing a prompt, you observe frame drops and ANR (Application Not Responding) warnings, despite the TPU being a separate coprocessor and having 12 GB LPDDR5X memory available.
question: Why do frame drops and ANR warnings occur when Gemini Nano runs on Tensor G3's 7.5 TOPS TPU during 60 FPS scrolling?
details:
  realistic_solution: The frame drops occur due to memory bandwidth saturation and synchronous blocking. While the Tensor G3's TPU processes the LLM operations, it aggressively consumes the LPDDR5X memory bandwidth. If the UI thread synchronously waits for the inference result or competes for the same memory bus to render high-resolution textures, it misses the 16.6ms deadline. The system behavior is explained by the shared memory controller bottleneck.
  common_mistake: |
    **The Pitfall:** Assuming the CPU is free just because the TPU handles the compute.
    **The Rationale:** Candidates miss the impact of memory bandwidth contention or synchronous IPC overhead on the UI thread.
    **The Consequence:** Failing to implement asynchronous pipelines, leading to severe UI jank.
  napkin_math: |
    1. Target Frame Time: 1000 ms / 60 FPS = 16.6 ms.
    2. LLM Inference Block: 50 ms.
    3. Missed Frames Calculation: 50 ms / 16.6 ms = 3 missed frames.
    **Conclusion:** Blocking the UI thread for 50ms guarantees dropped frames and jank.
