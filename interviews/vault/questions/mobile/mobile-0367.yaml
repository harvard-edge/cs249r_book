title: 'The Dashcam Battery Drain: Duty Cycling & Energy Harvesting'
scenario: 'You''re developing a driver alertness monitoring feature for a smartphone app that functions
  as a dashcam. To conserve battery, the ML model runs in a duty cycle: it''s active for 2 seconds, then
  idle for 8 seconds. From the `NUMBERS.md` sheet, we know a mobile SoC under load consumes about 3W.
  Let''s assume when the model is idle, the phone still consumes 0.5W for the screen and OS. If a user
  drives for one hour, how much total energy does your feature consume?'
question: "If a user drives for one hour, how much total energy does your feature consume?"
details:
  realistic_solution: The correct method is to first calculate the average power over one full 10-second
    cycle. Then, multiply that average power by the total duration (1 hour) to find the total energy consumed
    in Watt-hours.
  common_mistake: A common mistake is to ignore the power consumed during the 'idle' part of the duty
    cycle, assuming it's zero. Another frequent error is to calculate the *average power* (in Watts) but
    forget to multiply by the duration to find the total *energy* consumed (in Watt-hours).
  napkin_math: '1. Active Energy: The model runs for 2 seconds at 3W power draw = 2s * 3W = 6 Joules.
    2. Idle Energy: The SoC rests for 8 seconds at 0.5W = 8s * 0.5W = 4 Joules. 3. Total Cycle Energy:
    6J + 4J = 10 Joules per 10-second period. 4. Average Power: 10 Joules / 10s = 1.0W average power consumption.
    This significantly extends the phone''s ~18.5 Wh (66,600 J) battery life during long driving sessions.'
  options:
  - 3.0 Wh
  - 0.6 Wh
  - 1.0 Wh
  - 1.0 W
  correct_index: 2
