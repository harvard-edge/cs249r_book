title: 'The Dashcam Battery Drain: Duty Cycling & Energy Harvesting'
scenario: 'You''re developing a driver alertness monitoring feature for a smartphone dashcam. To conserve battery, the ML model runs in a duty cycle: active for 2 seconds, then idle for 8 seconds. Under load, the SoC consumes 3W. When idle, the phone consumes 0.5W for the screen and OS.'
question: If a user drives for one hour, how much total energy does your feature consume?
details:
  realistic_solution: The correct method is to first calculate the average power over one full 10-second cycle. Then, multiply that average power by the total duration (1 hour) to find the total energy consumed in Watt-hours.
  common_mistake: |
    **The Pitfall:** Ignoring idle power or confusing average power with total energy.
    **The Rationale:** Candidates often assume idle power is zero, or calculate average power and forget to multiply by the duration.
    **The Consequence:** The total battery impact is severely underestimated, leading to poor capacity planning.
  napkin_math: |
    1. Assumptions & Constraints:
       - Active power: 3W for 2s.
       - Idle power: 0.5W for 8s.
       - Duration: 1 hour.
    2. Calculations:
       - Active Energy: 2s * 3W = 6 Joules.
       - Idle Energy: 8s * 0.5W = 4 Joules.
       - Total Cycle Energy: 10 Joules per 10-second period.
       - Average Power: 10 J / 10s = 1.0W.
       - Total Energy: 1.0W * 1 hour = 1.0 Wh.
    3. Conclusion & Interpretation:
       - **Result: 1.0 Wh total energy consumed (Power-Bound).**
  options:
  - 3.0 Wh
  - 0.6 Wh
  - 1.0 Wh
  - 1.0 W
