title: Hardware-Aware NAS for Hexagon NPU Realization
scenario: You are leading the deployment of a real-time video super-resolution model on the Snapdragon 8 Gen 3 platform. You need to use hardware-aware NAS to design an architecture that maximizes quality while strictly meeting a 16ms latency budget on the Qualcomm Hexagon NPU. The device has a shared 16 GB LPDDR5X memory.
question: "How would you design a hardware-aware NAS search space to ensure the resulting architecture stays compute-bound without hitting Hexagon NPU memory bandwidth limits?"
details:
  realistic_solution: A strong L5 candidate will formulate a search space tailored
    to the Hexagon NPU, favoring operators that map well to the hardware's 45 TOPS
    INT8 matrix math units, such as properly quantized convolutions with hardware-friendly
    channel counts. They will incorporate an on-device latency predictor or lookup
    table derived directly from the Snapdragon 8 Gen 3, and ensure the memory bandwidth
    requirements fit within the shared LPDDR5X budget when operating concurrently
    with CPU and GPU workloads.
  common_mistake: |
    **The Pitfall:** Constraining NAS solely on proxy metrics like FLOPs or parameter counts.
    **The Rationale:** Candidates ignore the NPU's specific INT8 arithmetic limits or the shared memory bandwidth wall.
    **The Consequence:** NAS selects operations that are fast on standard CPUs but unsupported or inefficient on Hexagon tensor accelerators, resulting in severe memory bottlenecks.
  napkin_math: |
    - Effective NPU Compute: 50% of 45 TOPS peak = 22.5 TOPS.
    - Frame budget: 16ms (0.016s).
    - Maximum operations per frame: 22.5 TOPS × 0.016s = 360 GOPs.
    - Realistic memory bandwidth: 60 GB/s.
    - Maximum data transfer per frame: 60 GB/s × 0.016s = **960 MB**.
    - **Conclusion:** The NAS must heavily penalize architectures that move more than 960 MB per frame to remain compute-bound.
