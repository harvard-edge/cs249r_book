title: Voice Translation Pipelining
scenario: A voice translation app uses an Apple A17 Pro (35 TOPS). Processing a 40ms
  audio chunk takes 20ms for the encoder and 30ms for the decoder if run sequentially.
question: Implement an execution pipeline to process overlapping 40ms audio chunks
  concurrently, keeping per-chunk latency under 50ms.
details:
  realistic_solution: To handle continuous 40ms chunks without falling behind, the
    system must pipeline the encoder and decoder. While Chunk N is in the decoder
    (taking 30ms), Chunk N+1 enters the encoder (taking 20ms). Since 30ms < 40ms,
    the system easily sustains real-time throughput. Total latency per chunk remains
    50ms (20ms + 30ms), strictly meeting the latency bound.
  common_mistake: Adding the times linearly (50ms) and concluding that it cannot process
    40ms chunks in real-time, forgetting that pipelining overlaps the stages.
  napkin_math: Max pipeline stage = 30ms. 30ms compute < 40ms audio chunk arrival
    time.
