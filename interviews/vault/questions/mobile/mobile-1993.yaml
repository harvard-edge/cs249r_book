title: Voice Translation Pipelining
scenario: A voice translation app uses an Apple A17 Pro (35 TOPS). Processing a 40ms audio chunk takes 20ms for the encoder and 30ms for the decoder if run sequentially.
question: Implement an execution pipeline to process overlapping 40ms audio chunks concurrently, keeping per-chunk latency under 50ms.
details:
  realistic_solution: To handle continuous 40ms chunks without falling behind, the system must pipeline the encoder and decoder. While Chunk N is in the decoder (taking 30ms), Chunk N+1 enters the encoder (taking 20ms). Since 30ms < 40ms, the system easily sustains real-time throughput. Total latency per chunk remains 50ms (20ms + 30ms), strictly meeting the latency bound.
  common_mistake: |
    **The Pitfall:** Adding pipeline stage times linearly.
    **The Rationale:** Candidates sum the encoder (20ms) and decoder (30ms) to get 50ms, and mistakenly conclude that processing a 40ms chunk is impossible in real-time.
    **The Consequence:** They falsely reject a perfectly viable real-time pipelined architecture.
  napkin_math: |
    - **Encoder stage time:** 20ms
    - **Decoder stage time:** 30ms
    - **Audio chunk arrival time:** 40ms
    - **Max pipeline stage:** max(20ms, 30ms) = 30ms
    - **Throughput check:** 30ms compute < 40ms arrival (Real-time sustained)
    - **End-to-end latency:** 20ms + 30ms = **50ms**
