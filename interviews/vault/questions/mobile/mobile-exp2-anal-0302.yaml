title: A17 Pro Unified Memory KV-Cache OOM
scenario: You are deploying a local 4-bit quantized 7B language model on a device using the Apple A17
  Pro, which features a 16-core Neural Engine and a shared 8 GB unified memory pool. The OS and background
  apps are actively using 3.5 GB, leaving 4.5 GB strictly for your application, of which the 4-bit model
  weights take up exactly 3.5 GB. When a user asks a simple short question, the model responds perfectly,
  but when a user pastes a 4096-token prompt, the app crashes due to an Out of Memory (OOM) error. Given
  the model has 32 layers, 32 attention heads, and a head dimension of 128 while storing the KV-cache
  in float16, explain why this crash occurs despite the weights easily fitting in the memory budget.
question: "Why does a 4096-token prompt OOM a 7B INT4 model on A17 Pro even though the weights fit?"
details:
  realistic_solution: The crash occurs because the unified memory architecture of the A17 Pro means the
    Neural Engine must share its 8 GB pool with the rest of the system. After accounting for the OS and
    the 3.5 GB model weights, only 1 GB of memory remains for dynamic allocations. The KV-cache for a
    4096-token sequence requires exactly 2 GB of memory. Since the total required memory (5.5 GB) exceeds
    the 4.5 GB available to the application, the system triggers an immediate OOM error during the prefill
    phase.
  common_mistake: Candidates often focus on the ~5W power limit or the 35 TOPS compute bottleneck of the
    Neural Engine rather than the dynamic memory constraints. They may also miscalculate the KV-cache
    footprint by forgetting to account for both Keys and Values or failing to multiply across all 32 layers,
    incorrectly concluding that the remaining 1 GB of unified memory is sufficient.
  napkin_math: '1. KV-cache per token per layer: 2 (Key + Value) * 32 heads * 128 head dim * 2 bytes (float16)
    = 16,384 bytes (16 KB).

    2. Total KV-cache per token: 16 KB * 32 layers = 512 KB.

    3. Total KV-cache for 4096 tokens: 512 KB * 4096 = 2,097,152 KB = 2 GB.

    4. Total app memory required: 3.5 GB (weights) + 2 GB (KV-cache) = 5.5 GB.

    5. Conclusion: 5.5 GB needed > 4.5 GB available from the A17 Pro''s 8 GB shared unified memory pool,
    resulting in OOM.'
