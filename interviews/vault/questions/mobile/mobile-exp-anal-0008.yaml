title: On-Device Data Quality Bandwidth Contention
scenario: You are deploying a data quality gate on a Google Tensor G3 device to validate incoming streaming
  data before feeding it to Gemini Nano. The quality gate uses a lightweight anomaly detection model running
  on the on-device TPU (7.5 TOPS) to filter out malformed data. The system shares 12 GB of LPDDR5X memory.
  You observe that enabling this data validation pipeline causes Gemini Nano's token generation rate to
  drop by 40%, even though the TPU is only running at 10% of its 7.5 TOPS capacity. Explain why this bottleneck
  occurs.
details:
  realistic_solution: The performance drop is caused by memory bandwidth contention, not compute limits.
    LLM token generation (like Gemini Nano) is heavily memory-bound, requiring continuous loading of weights
    and KV cache from the 12 GB LPDDR5X pool. The continuous schema validation and anomaly detection process
    constantly reads streaming data and writes validation states to memory. This consumes shared memory
    bandwidth, reducing available bandwidth from 30 GB/s to ~20 GB/s for the LLM, causing a token generation
    drop from 15 to ~13.3 tokens/sec (11% reduction) despite ample remaining TPU TOPS.
  common_mistake: Candidates often assume the bottleneck is compute-related, suggesting the TPU is saturated
    or under-clocked. They fail to recognize that mobile SoCs use a unified memory architecture where
    continuous data validation and LLM inference compete for the same shared memory bandwidth.
  napkin_math: LPDDR5X typically provides ~60 GB/s of total bandwidth. A 3B parameter Gemini Nano at 4-bit
    quantization needs ~1.5 GB of memory reads per token. Generating 15 tokens/sec requires 22.5 GB/s.
    If the OS and display consume 30 GB/s and the data validation pipeline consumes 10 GB/s, only 20 GB/s
    remains for the LLM. Token rate drops to 15 × (20/22.5) = 13.3 tokens/sec — an 11% reduction — while
    using only 0.75 TOPS of the 7.5 TOPS available.
