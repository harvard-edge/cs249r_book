title: Energy-Aware LLM Deployment on Samsung Exynos 2400 NPU
scenario: "You are tasked with deploying a novel LLM on a Samsung Galaxy device, powered by the Exynos 2400 NPU (34.7 TOPS peak performance, 12 GB LPDDR5X memory). The primary constraint is minimizing energy consumption for inference to maximize battery life, while maintaining a strict latency budget. The current implementation exceeds the energy budget due to frequent memory accesses and suboptimal operator choices."
question: "How would you optimize the model's energy profile considering the Horowitz energy table principles and the disparity between NPU compute and LPDDR5X memory access?"
details:
  realistic_solution: |
    A realistic solution involves a multi-pronged approach: 1. **Quantization:** Aggressively quantize the LLM (e.g., to INT8 or even INT4 if accuracy permits) to reduce data size, thereby reducing memory bandwidth and energy for data transfers. 2. **Operator Fusion & Tiling:** Identify opportunities to fuse consecutive operations (e.g., Conv+ReLU) to minimize writes/reads to external memory. Apply tiling strategies to keep data within faster, lower-energy on-chip caches as much as possible. 3. **Memory Access Pattern Optimization:** Reorder operations or data layouts to promote spatial and temporal locality, reducing random access patterns to LPDDR5X. Prioritize computations that can leverage the 12GB LPDDR5X memory effectively by minimizing unnecessary data movements. 4. **Energy-Aware Operator Selection:** Profile the energy consumption of different operator implementations on the Exynos 2400 NPU, and select those with better energy-per-operation characteristics. 5. **System-Level Co-optimization:** Work with hardware-aware compilers to ensure that the NPU's specialized units and memory hierarchy are optimally utilized.
  common_mistake: |
    **The Pitfall:** Focusing solely on FLOPs/TOPS optimization.
    **The Rationale:** Candidates ignore the energy cost of data movement between the NPU and main memory (LPDDR5X).
    **The Consequence:** Deploying models that appear computationally fast but drain the battery rapidly due to constant DRAM reads and writes.
  napkin_math: |
    **Assumptions & Constraints:**
    - NPU INT8 MAC energy: ~0.5 pJ.
    - LPDDR5X DRAM access energy: ~200 pJ/byte.

    **Calculations:**
    - Unoptimized MAC cost (fetch from DRAM): 0.5 pJ + 200 pJ = 200.5 pJ.
    - Optimized MAC cost (kept on-chip): 0.5 pJ.
    - Energy savings: Reducing external memory reads by 1 GB saves roughly 1 GB * 200 pJ/byte = 1,000,000,000 bytes * 200 * 10^-12 J/byte = 0.2 Joules.

    **Conclusion & Interpretation:**
    - **Result: 0.2 Joules saved per 1GB reduced (Memory-Energy Bottleneck)**. Minimizing LPDDR5X access is critical; even a 1GB reduction saves 0.2 Joules per generation step.
