title: Encoder vs Decoder Prefill Compute on Tensor G3
scenario: Your team is deploying an on-device translation feature targeting the Google Tensor G3 (7.5 TOPS). You are comparing a 1.5B parameter decoder-only model and a 1.5B encoder-decoder model (750M encoder, 750M decoder), both INT8. The average input sequence is 256 tokens.
question: How do decoder-only and encoder-decoder models compare on prefill compute and theoretical minimum latency on the Tensor G3?
details:
  realistic_solution: |
    Use the standard approximation for transformer compute: Operations = 2 * Active Parameters * Sequence Length. Calculate the operations for both models during prefill, then divide by the Tensor G3's peak throughput (7.5 TOPS) to find the theoretical minimum latency. The encoder-decoder model processes the prompt using only its 750M parameter encoder, resulting in half the prefill compute compared to the 1.5B parameter decoder-only model.
  common_mistake: |
    **The Pitfall:** Assuming the prefill phase uses the entire parameter count for both architectures.
    **The Rationale:** Candidates fail to realize that during the prefill of an encoder-decoder architecture, only the encoder's parameters are active.
    **The Consequence:** Incorrect latency estimations and suboptimal architectural choices for long-prompt tasks.
  napkin_math: |
    - **Decoder-only Prefill Compute:** 2 * 1.5B params * 256 tokens = 768 Giga-Operations (0.768 Tera-Ops).
    - **Decoder-only Latency:** 0.768 TOps / 7.5 TOPS = 0.1024 seconds (~102 ms).
    - **Encoder-Decoder Prefill Compute:** Uses encoder only (750M). 2 * 0.75B params * 256 tokens = 384 Giga-Operations (0.384 Tera-Ops).
    - **Encoder-Decoder Latency:** 0.384 TOps / 7.5 TOPS = 0.0512 seconds (~51 ms).
    - **Result:** **The encoder-decoder model is twice as fast during the prefill phase.**
