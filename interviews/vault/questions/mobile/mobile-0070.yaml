title: The Stuttering AI Assistant
scenario: You are optimizing an on-device generative AI assistant. The assistant's first word appears instantly, but the sentence stutters and app animations become choppy. TTFT is under 200ms, but UI frame rates drop below 15 FPS during token generation.
question: "What is the likely cause of UI jank when TTFT is fast but token generation runs in a synchronous mobile loop?"
details:
  realistic_solution: The root cause is a thread scheduling conflict. A blocking, single-threaded inference task is starving the real-time UI thread. Implement asynchronous inference utilizing a background queue, emitting tokens to the main thread via non-blocking callbacks.
  common_mistake: |
    **The Pitfall:** Blaming the model size or hardware performance instead of the software architecture.
    **The Rationale:** Engineers often assume that slow performance means the model is too big or needs quantization, ignoring how synchronous compute starves the real-time UI thread.
    **The Consequence:** They propose complex optimizations (like pruning) that fail to solve the fundamental scheduling issue.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Target UI framerate: 60 FPS (16.67ms/frame).
       - LLM throughput: 15 tokens/sec.
    2. **Calculations:**
       - Token Generation Time = 1000ms / 15 = 66.6ms.
       - 66.6ms > 16.67ms.
    3. **Conclusion & Interpretation:**
       - **Result: Scheduling-Bound**. Synchronous generation blocks UI updates for 4 consecutive frames per token, dropping framerate to ~15 FPS.
