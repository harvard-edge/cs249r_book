title: The Stuttering AI Assistant
scenario: You are a Mobile ML Engineer optimizing an on-device generative AI assistant. User reports are coming in: the assistant's first word appears almost instantly, but the rest of the sentence stutters out, and the app's animations become choppy. You profile the device and find that TTFT is consistently under 200ms, but UI frame rates drop below 15 FPS during the token generation phase. Your current implementation uses a 3B parameter model running on the NPU in a simple synchronous loop.
question: "What is the likely cause of UI jank when TTFT is fast but token generation runs in a synchronous mobile loop?"
details:
  realistic_solution: 'The root cause is a scheduling conflict between the blocking, single-threaded inference task and the high-priority, real-time UI thread. A single token generation pass is a ''chunky'' operation that takes longer than the 16.7ms budget for a 60 FPS frame, causing jank. The generation loop should run on a background thread or queue, passing tokens back to the main thread as they are generated.'
  common_mistake: |
    **The Pitfall:** Blaming the model size or hardware performance instead of the software architecture.
    **The Rationale:** Engineers often assume that slow performance means the model is too big or needs quantization, ignoring how synchronous compute starves the real-time UI thread.
    **The Consequence:** They propose complex optimizations (like pruning) that fail to solve the fundamental scheduling issue.
  napkin_math: |
    - **Frame Budget:** A 60 FPS UI requires a frame every 1000ms / 60 = 16.67ms.
    - **Token Generation Time:** If the LLM generates 15 tokens per second, the time per token is 1000ms / 15 = 66.6ms.
    - **Impact:** Since 66.6ms > 16.67ms, synchronous generation on the main thread blocks UI updates for 4 consecutive frames per token.
    - **Final Result:** This blocking directly causes **severe stuttering and drops the framerate to ~15 FPS**.
