title: The Watchdog's Battery Bill
scenario: A driver-monitoring model hangs and triggers a 2-second recovery every 15 minutes, during which total SoC power spikes to 5W.
question: What is the total energy cost in Watt-hours (Wh) for watchdog recovery events over an 8-hour drive?
details:
  realistic_solution: The solution requires calculating the total number of recovery events, the total
    time spent in that state, the total energy in Joules (Watt-seconds), and finally converting to Watt-hours.
    An 8-hour drive has 480 minutes. With one recovery every 15 minutes, there will be 32 recoveries total.
    Each recovery takes 2 seconds, so the SoC spends 64 seconds in the high-power recovery state. The
    total energy is the total time multiplied by the power draw, with units converted appropriately.
  common_mistake: |
    **The Pitfall:** Failing to convert Joules to Watt-hours correctly.
    **The Rationale:** Engineers calculate the total time correctly but use the wrong conversion factor (e.g., dividing by 60 instead of 3600) or just report peak power.
    **The Consequence:** Providing entirely incorrect battery impact estimates to product teams evaluating the cost of poor reliability.
  napkin_math: |
    - **Total Drive Time:** 8 hours = 480 minutes.
    - **Total Recoveries:** 480 mins / 15 mins/recovery = 32 recoveries.
    - **Total Recovery Time:** 32 recoveries * 2 seconds = 64 seconds.
    - **Total Energy (Joules):** 64 seconds * 5 W = 320 Joules.
    - **Total Energy (Wh):** 320 Joules / 3600 (Joules/Wh) = 0.0888 Wh.
    - **Result:** The total energy cost is **~0.089 Wh**.
  options:
  - 5.33 Wh
  - 0.0028 Wh
  - 0.089 Wh
  - 5.0 W
  correct_index: 2
