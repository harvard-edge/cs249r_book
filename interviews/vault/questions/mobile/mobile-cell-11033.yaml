title: 'Dataset Curation: Mastery — On-Device Personalization Data Strategy for 1B Mobile Users'
scenario: 'You are the ML lead for a keyboard app with 1B users across iOS (A17 Pro, 35 TOPS) and Android
  (Snapdragon 8 Gen 3, 45 TOPS). Design the complete on-device personalization data strategy: collection,
  privacy, local curation, federated aggregation, and global model updates. The system must maintain ε=1.0
  DP per year with monthly updates.'
question: "How would you design the complete on-device personalization data strategy: collection, privacy, local curation, federated aggregation, and global model updates?"
details:
  realistic_solution: '12 monthly rounds, ε=1.0 total → ε=0.083/round using composition. 1B devices: sample
    0.01% = 100K/round. On-device: DP local training with clipping + noise. Gradient compression 100×.
    Server: secure aggregation. Hardware heterogeneity: unified LoRA interface across NPUs.'
  common_mistake: Not tracking DP budget across rounds; assuming all devices can participate every round;
    not designing for heterogeneous hardware.
  napkin_math: '1B users × 12 rounds. DP budget: ε=1.0/year, 12 rounds → ε≈0.083/round. q=100K/1B=0.0001
    sampling rate → strong amplification allows σ≈0.5 noise multiplier. Gradient upload: 1M LoRA params
    × fp16 = 2MB/device, compressed 10× = 200KB. 100K devices × 200KB = 20GB/round. Monthly bandwidth
    cost: 20GB × $0.01/GB = $0.20/round = $2.40/year. Training time on Snapdragon: LoRA forward+backward
    on 200 local examples, 128 tokens each: 200×128 × 1M params × 6 FLOPs = 153.6B FLOPs. At 45 TOPS:
    3.4 seconds/update. Fits in background window. A17 Pro: 35 TOPS → 4.4 seconds. Both acceptable.'
