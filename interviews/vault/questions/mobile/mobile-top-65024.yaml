title: Chiplet Die-Count Impact on Mobile SoC PCB Routing
scenario: A mobile SoC moving from monolithic to chiplet design (3 dies on interposer) requires a 6-layer
  to 8-layer PCB change, adding $2 per phone BOM. The marketing team pushes back. Justify the PCB change
  from a signal integrity and routing perspective.
details:
  realistic_solution: 'Chiplet SoC PCB requirements: (1) Power delivery: more power domains (each die
    has separate VDD) require more dedicated power/ground plane pairs → 2 extra layers. (2) Signal routing:
    die-to-die link signals exit package on more BGA balls at higher frequencies (LPDDR5 at 8533 MT/s
    requires controlled impedance at 50 ohm ±10%); more signal layers needed for length matching. (3)
    EMI: chiplet interposer edge creates new emission sources; additional ground planes provide shielding.
    8-layer: signal-ground-power-signal-signal-power-ground-signal stackup provides 3dB better EMI margin.
    At 100M phones/year, $2 BOM increase = $200M/year. Real argument: 8-layer is required by the SoC vendor
    reference design; deviation risks production failures and EMI re-certification costs.'
  common_mistake: Arguing only for signal integrity without quantifying the cost of NOT upgrading. The
    real risk of using 6-layer PCB with chiplet SoC is EMI failures in regulatory certification (FCC/CE),
    which cost $50K-200K per resubmission and 4-8 weeks delay — far exceeding the PCB cost increase.
  napkin_math: 'LPDDR5 at 8533 MT/s: signal frequency ~4.27 GHz. In FR4 (Dk≈4.5), propagation delay ≈
    7 ps/mm (c/√Dk ≈ 1.41×10⁸ m/s → ~7.1 ps/mm). At 4.27 GHz, signals must be length-matched to ±5ps (±0.7mm
    at 7 ps/mm in FR4). 6-layer PCB: trace routing density limits length matching to ±3mm → EMI certification
    failure risk ~20%. 8-layer: ±0.5mm achievable → <1% risk. Expected cost of 20% cert failure: 20% ×
    ($150K re-cert + 6 weeks × $2M/week revenue loss) = 20% × $12.15M = $2.4M.'
