title: 5G Hierarchical Tree FL
scenario: 100 mobile clients aggregate a 5MB INT8 model via a hierarchical tree topology
  over 5G (50 Mbps uplink per node).
question: Evaluate the effective bandwidth and total tree-reduce time per round, factoring
  in a 500ms synchronization wait for the 95th percentile straggler.
details:
  realistic_solution: A 5MB payload transfers in 800ms over a 50 Mbps uplink. However,
    the synchronous tree-reduce cannot proceed until the straggler arrives. Adding
    the 500ms barrier extends the round to 1.3 seconds, drastically reducing the effective
    bandwidth.
  common_mistake: Calculating raw link transmission time without adding the heavy
    synchronization tail-latency strictly required by a synchronous tree-reduce.
  napkin_math: Transfer = (5MB * 8) / 50Mbps = 0.8s. Total round = 0.8s + 0.5s = 1.3s.
    Effective BW = 5MB / 1.3s = 3.84 MB/s.
