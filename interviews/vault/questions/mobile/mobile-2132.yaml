title: '5G Hierarchical Tree FL'
scenario: '100 mobile clients aggregate a 5MB INT8 model via a hierarchical tree topology over 5G (50 Mbps uplink per node). A synchronous tree-reduce cannot proceed until all nodes report.'
question: 'Evaluate the effective bandwidth and total tree-reduce time per round, factoring in a 500ms synchronization wait for the 95th percentile straggler.'
details:
  realistic_solution: 'A 5MB payload transfers in 800ms over a 50 Mbps uplink. However, the synchronous tree-reduce cannot proceed until the straggler arrives. Adding the 500ms barrier extends the round to 1.3 seconds, drastically reducing the effective bandwidth.'
  common_mistake: |
    **The Pitfall:** Calculating raw link transmission time without adding the tail-latency.
    **The Rationale:** Candidates treat mobile uplinks as deterministic pipes and ignore the heavy synchronization tail strictly required by synchronous tree-reduce.
    **The Consequence:** Theoretical bandwidth limits are reported instead of realistic effective bandwidth, severely underestimating the federated learning round duration.
  napkin_math: |
    **Assumptions & Constraints:**
    - Payload: 5 MB INT8 model. Mobile uplink: 50 Mbps.
    - Straggler barrier: 500ms synchronization wait time.

    **Calculations:**
    - Raw transmission time: 5 MB x 8 bits/byte / 50 Mbps = 0.8 seconds (800ms).
    - Synchronous round time: 800ms + 500ms barrier = 1.3 seconds.
    - Effective bandwidth: 5 MB / 1.3s = 3.84 MB/s.

    **Conclusion & Interpretation:**
    - **Result: 3.84 MB/s (Network-Bound)**. The effective bandwidth drops from 6.25 MB/s to 3.84 MB/s entirely due to the synchronization tail latency, highlighting the inefficiency of synchronous barriers in FL.
