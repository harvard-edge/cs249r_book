title: Calculate Gemini Nano Inference Bound on Tensor G3
scenario: You are deploying Gemini Nano, a 3.2 billion parameter model quantized to 8-bit integers, on
  the Google Tensor G3. The Tensor G3 features an on-device TPU with 7.5 TOPS of peak compute and 12 GB
  of LPDDR5X memory. Assuming the effective memory bandwidth available to the TPU is 60 GB/s, calculate
  the operational intensity of a single-batch inference step and determine the maximum possible token
  generation rate.
details:
  realistic_solution: The candidate should recognize that autoregressive LLM inference at batch size 1
    is fundamentally memory-bound. They need to calculate the operational intensity by dividing the operations
    per token by the memory loaded per token. Then, they must use the memory bandwidth to calculate the
    maximum tokens per second, showing it falls far below the compute ceiling.
  common_mistake: Candidates often focus solely on the 7.5 TOPS peak compute and attempt to calculate
    latency using compute limits, ignoring the memory bandwidth constraint. They may also incorrectly
    calculate operational intensity by not accounting for the bytes required to load the entire model's
    weights per token during generation.
  napkin_math: '1. Model size: 3.2B params * 1 byte (int8) = 3.2 GB loaded per token. 2. Operations per
    token: ~6.4 Giga-Operations (2 ops per MAC). 3. Operational Intensity (OI): 6.4 GOPS / 3.2 GB = 2
    OPs/byte. 4. Hardware Ridge Point: 7.5 TOPS (7500 GOPS) / 60 GB/s = 125 OPs/byte. 5. Since OI (2)
    < Ridge Point (125), it is memory-bound. 6. Max token rate: 60 GB/s / 3.2 GB/token = 18.75 tokens/second.'
