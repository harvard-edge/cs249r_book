title: The Transformer Tax on Mobile
scenario: Your team is building a 'visual search from camera' feature on a mobile device. The latency budget is 100ms. The V1 model, a MobileNetV3 CNN, runs in 80ms. A new hire proposes switching to a small Vision Transformer (ViT) of similar parameter count, citing its superior accuracy. You benchmark the ViT and find it's 5x slower (~400ms), completely missing the budget.
question: How would you diagnose the architectural reason for the ViT's poor latency on mobile hardware, despite its comparable size?
details:
  realistic_solution: |
    The ViT is dramatically slower due to the memory access patterns of its core self-attention mechanism. Self-attention requires computing scores between every pair of tokens, resulting in non-local, quasi-random memory accesses from DRAM for the Q, K, and V matrices. CNNs, conversely, exhibit strong spatial locality, which mobile memory subsystems heavily optimize for via caches and prefetchers. The ViT's memory access thrashes the cache, starving the NPU and exposing the SoC's DRAM bandwidth bottleneck.
  common_mistake: |
    **The Pitfall:** Assuming equal parameter count equates to equal latency.
    **The Rationale:** Candidates focus solely on FLOPs or parameter count without analyzing the arithmetic intensity and memory access patterns of self-attention on mobile caches.
    **The Consequence:** Deploying architectures fundamentally mismatched with mobile memory subsystems, leading to severe latency regressions and missed SLAs.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - NPU Ridge Point: ~683 Ops/Byte.
       - Tokens: 196 (14x14 patches), Dimension: 768.
       - Precision: FP16.
    2. **Calculations:**
       - FLOPs for Q * K^T: 2 * 196 * 768 * 196 = ~59 MFLOPs.
       - Memory accessed: (2 * 196 * 768) + (196 * 196) = ~340 K-elements = ~680 KB.
       - Arithmetic Intensity (AI) = 59 MFLOPs / 680 KB = ~87 Ops/Byte.
    3. **Conclusion & Interpretation:**
       - **Because 87 Ops/Byte << 683 Ops/Byte ridge point, the self-attention operation is severely memory-bound. Bottleneck: Memory Bandwidth.**
  options:
  - The LayerNorm operations in the ViT are not supported by the ANE, causing slow CPU fallbacks.
  - The ViT has a much larger total activation memory footprint, exceeding the ANE's on-chip SRAM.
  - Self-attention's non-local memory access patterns have low arithmetic intensity, making it bottlenecked by DRAM bandwidth.
  - The patch embedding (stem) layer of the ViT uses a large convolution that is inefficient on mobile GPUs.
  correct_index: 2
