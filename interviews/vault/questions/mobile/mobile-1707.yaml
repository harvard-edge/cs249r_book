title: Optimizing On-Device Data Ingestion for Apple A17 Pro
scenario: You are developing a new on-device ML application that continuously ingests high-resolution 4K video sensor data at 60 FPS. The device has a 35 TOPS NPU and 8 GB of unified memory. The raw 100 MB/s sensor stream causes significant bottlenecks during data loading and pre-processing, dropping frames despite ample NPU capacity.
question: How would you eliminate the data loading and preprocessing bottlenecks for a 100 MB/s raw sensor stream?
details:
  realistic_solution: |
    Implement zero-copy architectures that map raw sensor hardware buffers directly into NPU-accessible memory. Utilize INT8 data formats to completely bypass the severe CPU overhead of FP32 deserialization, and decouple ingestion from compute using asynchronous hardware queues.
  common_mistake: |
    **The Pitfall:** Relying on the massive 35 TOPS NPU to brute-force poorly formatted data after the CPU has cast it.
    **The Rationale:** Developers focus exclusively on NPU TOPS, overlooking the catastrophic CPU and memory bus constraints caused by naive FP32 type-casting.
    **The Consequence:** The CPU blocks on type-casting, swelling memory bandwidth and causing severe thermal throttling while the NPU idles.
  napkin_math: |
    1. **Assumptions & Constraints:** Raw stream = 100 MB/s. Pre-processing = 10 GFLOPS (trivial). Naive CPU cast to FP32 expands data 4x.
    2. **Calculations:** FP32 stream = 100 MB/s * 4 = 400 MB/s continuous LPDDR5X traffic. CPU cores max out handling the 400 MB/s cast.
    3. **Conclusion & Interpretation:** **Result: Memory-Bandwidth-Bound**. The CPU FP32 conversion chokes the memory bus; zero-copy architecture resolves this.
