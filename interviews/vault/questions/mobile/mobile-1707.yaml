title: Optimizing On-Device Data Ingestion for Apple A17 Pro
scenario: 'Imagine you are developing a new on-device ML application for an Apple A17 Pro-powered iPhone. This application continuously ingests high-resolution sensor data (e.g., 4K video frames, LiDAR point clouds) at 60 FPS. The A17 Pro''s Neural Engine boasts 35 TOPS and the device has 8 GB of unified memory, with a ~5W power budget. The raw sensor data stream is approximately 100 MB/s. You''ve identified that the data loading and initial pre-processing stages are causing significant bottlenecks, leading to dropped frames and increased power consumption, despite the Neural Engine having sufficient compute capacity.'
question: 'How would you remove data loading and preprocessing bottlenecks for a 100 MB/s A17 Pro sensor stream?'
details:
  realistic_solution: 'Implement zero-copy architectures mapping raw sensor data directly to memory accessible by the NPU. Use efficient quantized data formats to bypass the CPU overhead of deserialization. Pipeline data loading with model inference and leverage asynchronous queues to decouple ingestion from compute.'
  common_mistake: |
    **The Pitfall:** Relying on the massive 35 TOPS to brute-force data parsing and type-casting.
    **The Rationale:** Developers focus exclusively on NPU compute power and overlook the severe CPU and memory bus constraints caused by naive FP32 data transformations.
    **The Consequence:** The CPU blocks on type-casting, swelling memory bandwidth and causing severe thermal throttling while the NPU sits completely idle.
  napkin_math: |
    1. **Raw Stream:** 100 MB/s at 60 FPS = 1.67 MB per frame.
    2. **Compute Need:** Pre-processing at 100 FLOPS/byte = 10 GFLOPS (trivial for 35 TOPS NPU).
    3. **The Bottleneck:** Naive CPU-based casting from INT8 to FP32 balloons the data stream from 100 MB/s to 400 MB/s, heavily taxing the LPDDR5X bus and CPU cores.
