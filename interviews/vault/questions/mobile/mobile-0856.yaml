title: 'Fluency: describe inverted residual block execution on Qualcomm Hexagon NPU'
scenario: A mobile ML engineer on your team is new to Qualcomm Hexagon NPU. They ask how an inverted residual block from MobileNetV2 maps to Hexagon HTP operations and whether the expansion ratio t=6 is optimal for Hexagon.
question: How should a MobileNetV2 inverted residual block map to Hexagon HTP, and when is expansion ratio 6 too large?
details:
  realistic_solution: 'Hexagon HTP v73 (Snapdragon 8 Gen 3): supports Conv2D, DepthwiseConv2D, BatchNorm, ReLU6 as fused operation. MBConv block: expand (1x1 + BN + ReLU6) + depthwise (3x3 + BN + ReLU6) + project (1x1 + BN) -> fused into 1 HTP dispatch. Expansion ratio t=6 for Hexagon: intermediate channel count should be <=512 for optimal HTP SRAM tiling. For input C=32, t=6 -> 192 channels: fine. For C=160, t=6 -> 960 channels: may exceed HTP tile budget, causing split. Recommend t=4 for high-channel stages (C>128) when targeting Hexagon, reducing FLOPs by 33% with <1pp accuracy loss.'
  common_mistake: |
    **The Pitfall:** Assuming Hexagon HTP maps the expand-depthwise-project sequence as three separate kernel calls.
    **The Rationale:** Lack of awareness of modern hardware capabilities regarding operation fusion.
    **The Consequence:** Designing suboptimal architectures that fail to leverage the NPU's ability to fuse operations into a single accelerated op.
  napkin_math: |
    - Hexagon HTP v73 SRAM has a 4MB scratchpad.
    - MBConv intermediate tensor at C=160, t=6, spatial 7x7: 960 * 7 * 7 * 1B (INT8) = 47KB, which fits in SRAM.
    - At C=320, t=6, spatial 7x7: 1920 * 49 = 94KB, which still fits.
    - HTP processes in chunks of 32 channels * 4x4 spatial tiles.
    - For 960 channels: 960 / 32 = 30 tiles, requiring 30 HTP dispatch cycles.
    - For t=4 (640 channels): 640 / 32 = 20 cycles, resulting in 33% fewer dispatches.
    - At 45 TOPS, each dispatch takes ~1ns.
    - **The absolute difference is negligible per block, but across 17 blocks at 30 FPS, reducing expansion ratio to t=4 yields meaningful performance gains.**
