title: Heterogeneous Operator Scheduling for Neural Engine
scenario: You are deploying a real-time video super-resolution model on a Neural Engine capable of 35 TOPS within a 5W power envelope, sharing 8 GB of unified memory with the CPU and GPU.
question: How should a scheduler partition video operators across compute units without exceeding shared memory bandwidth and thermal limits?
details:
  realistic_solution: A robust design implements a profile-guided, latency-aware scheduler
    that uses dynamic programming to find optimal operator partitioning. By fusing
    adjacent layers and keeping intermediate activations on the ANE SRAM, we minimize
    traffic to the shared unified memory. If the ANE approaches its thermal limit,
    the scheduler should offload lower-intensity operators to the GPU or high-efficiency
    CPU cores to maintain a stable frame rate within the 5W budget.
  common_mistake: |
    **The Pitfall:** Greedy scheduling that pins every compatible operator to the NPU without fusing layers.
    **The Rationale:** Candidates treat compute units as isolated boxes, ignoring the data transfer cost across the shared unified memory bus.
    **The Consequence:** Ping-ponging activations between the GPU and NPU, destroying frame rates and quickly exceeding the 5W thermal budget.
  napkin_math: |
    - **Activation Transfer Size:** 2 MB between operators.
    - **Memory Bandwidth:** 50 GB/s.
    - **Transfer Penalty:** 2 MB / 50 GB/s = 0.04 ms per transfer.
    - **Naive Splitting (20 splits):** 20 * 0.04 ms = 0.8 ms of pure memory movement per frame.
    - **Result:** At 60 FPS (16.6ms budget), losing **0.8 ms to transfer overhead** wastes power and induces thermal throttling.
