title: Heterogeneous Operator Scheduling for Neural Engine
scenario: You are deploying a real-time video super-resolution model on a Neural Engine capable of 35 TOPS within a 5W power envelope, sharing 8 GB of unified memory with the CPU and GPU.
question: How should a scheduler partition video operators across compute units without exceeding shared memory bandwidth and thermal limits?
details:
  realistic_solution: 'A robust design implements a profile-guided, latency-aware scheduler that uses dynamic programming to find optimal operator partitioning. By fusing adjacent layers and keeping intermediate activations on the ANE SRAM, we minimize traffic to the shared unified memory. If the ANE approaches its thermal limit, the scheduler should offload lower-intensity operators to the GPU or high-efficiency CPU cores to maintain a stable frame rate within the 5W budget.'
  common_mistake: |
    **The Pitfall:** Greedy scheduling that pins every compatible operator to the NPU without fusing layers.
    **The Rationale:** Candidates treat compute units as isolated boxes, ignoring the physical data transfer cost across the shared unified memory bus.
    **The Consequence:** Ping-ponging activations between the GPU and NPU, destroying frame rates and quickly exceeding the 5W thermal budget.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Target framerate: 60 FPS (16.6ms budget).
       - Unified Memory Bandwidth: 50 GB/s.
       - Intermediate Activation Size: 2 MB per transfer.
       - Execution strategy: Naive splitting (20 operator splits).
    2. **Calculations:**
       - Transfer penalty per split: 2 MB / 50 GB/s = 0.04 ms.
       - Total memory overhead per frame: 20 splits * 0.04 ms/split = 0.8 ms.
       - Percentage of frame budget: 0.8 ms / 16.6 ms ≈ 4.8% dedicated solely to data movement.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound overhead. Unfused scheduling wastes 0.8ms per frame purely on DRAM traffic, inducing thermal throttling.**
