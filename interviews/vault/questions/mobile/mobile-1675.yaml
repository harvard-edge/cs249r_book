title: 'Exynos NPU Drift: Optimizing On-Device Reliability'
scenario: You are responsible for a critical real-time object detection model deployed on a mobile device. Over several weeks, you've noticed a statistically significant increase in false negatives, degrading the application's reliability, suggesting potential data or concept drift.
question: How would you implement and optimize on-device drift detection without hurting primary inference latency?
details:
  realistic_solution: |
    Implement a lightweight, statistical drift detection method such as Population Stability Index (PSI) or a simplified Kullback-Leibler (KL) divergence on key intermediate activations, utilizing a sliding window. This mechanism should run periodically (e.g., every 500 inferences) asynchronously on an under-utilized NPU sub-unit. 1. **Diagnosing Bottleneck**: Utilize hardware profilers (e.g., simpleperf or nsys) to map NPU/memory availability. 2. **Efficient Implementation**: Quantize the reference distribution to INT8 and execute the divergence calculation using highly optimized vector kernels. 3. **Quantifying the Fix**: Target <5% latency overhead and <100MB RAM footprint. If drift is detected, trigger adaptive re-calibration or fallback strategies.
  common_mistake: |
    **The Pitfall:** Proposing a computationally expensive drift detection method.
    **The Rationale:** Candidates suggest full re-training on-device or continuous heavy statistical checks, ignoring NPU constraints.
    **The Consequence:** This compromises the primary model's real-time performance and drains battery.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Drift check interval: Every 100 inferences.
       - Primary model frame rate: 30 FPS.
       - Feature dimension: 100 features.
       - Operations per feature for KL/PSI: ~5 ops.
    2. **Calculations:**
       - Drift detection frequency = 30 FPS / 100 = 0.3 runs/second.
       - Ops per drift check = 100 features * 5 ops/feature = 500 ops.
       - Total ops per second for drift detection = 500 ops * 0.3 = 150 ops/second.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound (Negligible Overhead).** Executing 150 ops/second is infinitesimally small compared to the NPU's multi-TOPS capability, proving that optimized statistical checks can run concurrently with zero impact on real-time inference latency.
