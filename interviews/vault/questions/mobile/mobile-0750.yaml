title: The UMA Bandwidth Wall
scenario: Your AR app runs a real-time style transfer model. When the user upgrades to a Pro phone with
  a 120Hz 'ProMotion' display, the NPU inference suddenly starts stuttering and missing deadlines. Based
  on the UMA diagram, why is a faster screen slowing down your AI?
details:
  realistic_solution: You are suffering from **Memory Bus Contention**. In a Unified Memory Architecture
    (UMA), the Display Controller, GPU, and NPU all share the same LPDDR5 bus. A 120Hz display must refresh
    the framebuffer twice as often as a 60Hz one, consuming a massive slice of the total bandwidth. The
    memory controller prioritizes the display to prevent tearing, starving the bandwidth-hungry NPU. The
    fix is to drop the refresh rate to 60Hz during heavy AR features or reduce NPU precision to INT8 to
    halve its bandwidth needs.
  common_mistake: '"The phone is thermal throttling." While heat is a factor, the immediate drop is due
    to memory bus physics.'
  napkin_math: 4K display = 3840 * 2160 * 4 bytes (RGBA) = 33MB per frame. At 120Hz, display refresh alone
    consumes 33MB * 120 = 4.0 GB/s bandwidth. The GPU rendering adds another 4-8 GB/s. On a phone with
    50 GB/s total RAM bandwidth, this steals 20% capacity. NPU misses deadlines because memory channels
    are saturated.
