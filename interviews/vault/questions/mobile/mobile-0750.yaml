title: The UMA Bandwidth Wall
scenario: Your AR app runs a real-time style transfer model. When the user upgrades to a Pro phone with a 120Hz 'ProMotion' display, the NPU inference suddenly starts stuttering and missing deadlines.
question: "Based on the Unified Memory Architecture, why does a faster 120Hz screen slow down your AI models?"
details:
  realistic_solution: You are suffering from **Memory Bus Contention**. In a Unified Memory Architecture
    (UMA), the Display Controller, GPU, and NPU all share the same LPDDR5 bus. A 120Hz display must refresh
    the framebuffer twice as often as a 60Hz one, consuming a massive slice of the total bandwidth. The
    memory controller prioritizes the display to prevent tearing, starving the bandwidth-hungry NPU. The
    fix is to drop the refresh rate to 60Hz during heavy AR features or reduce NPU precision to INT8 to
    halve its bandwidth needs.
  common_mistake: |
    **The Pitfall:** Blaming thermal throttling for the immediate performance drop.
    **The Rationale:** Candidates assume high display performance directly causes heat and throttling, missing the immediate physical constraint of the shared memory bus.
    **The Consequence:** Wasting time optimizing model compute instead of addressing the underlying memory bandwidth contention.
  napkin_math: |
    - 4K display frame size: 3840 × 2160 × 4 bytes (RGBA) ≈ 33 MB.
    - 120Hz refresh bandwidth: 33 MB/frame × 120 FPS ≈ 4.0 GB/s.
    - GPU rendering bandwidth: ~4-8 GB/s.
    - Total display/render bandwidth: 8-12 GB/s.
    - **Conclusion:** On a phone with 50 GB/s RAM bandwidth, the display subsystem steals up to **20% of capacity**, starving the NPU and causing missed deadlines.
