title: Real-time Video Quality Gating on Exynos 2400
scenario: You are designing the data ingestion pipeline for a real-time semantic segmentation feature
  running locally on a Samsung Exynos 2400 NPU. The application processes live 1080p camera feeds from
  the ISP to apply complex background replacement. Because mobile power is strictly constrained, you must
  design a data quality gate to detect and reject anomalous frames (e.g., severe motion blur, complete
  occlusion, or sensor noise) before executing the heavy segmentation model. The Exynos 2400 provides
  34.7 TOPS via a dual-core NPU and uses a shared 12 GB LPDDR5X memory pool across the CPU, GPU, and ISP.
  Architect this quality validation system, detailing where the validation should run (CPU, GPU, or NPU)
  and how you would balance power consumption against validation accuracy.
details:
  realistic_solution: The optimal design leverages zero-copy memory from the ISP and uses a lightweight,
    heuristic-based image quality assessment (IQA) algorithm on the CPU, or a highly quantized micro-model
    on the NPU. By evaluating the tradeoffs, the engineer should recognize that spending a fraction of
    compute on early rejection saves massive power downstream. If a frame fails the quality gate, the
    system simply drops it or reuses the previous frame's mask, ensuring the 34.7 TOPS NPU budget is reserved
    strictly for high-confidence data.
  common_mistake: Candidates often suggest running a complex validation model on the NPU alongside the
    main workload, ignoring the power overhead and context-switching costs. Another mistake is overlooking
    the shared 12 GB LPDDR5X memory architecture, unnecessarily copying data buffers between the ISP,
    CPU, and NPU instead of using zero-copy memory access.
  napkin_math: Assuming the main segmentation model requires 0.5 TOPS per frame at 30 FPS, it consumes
    15 TOPS (43% of the 34.7 TOPS budget). A lightweight validation model takes 0.01 TOPS/frame (0.3 TOPS
    total). If 20% of incoming frames are garbage (blur/occlusion), dropping them saves 3 TOPS of heavy
    NPU compute. The net saving is 2.7 TOPS, significantly reducing thermal load and battery drain, while
    operating well within the shared 12 GB LPDDR5X memory bandwidth constraints.
