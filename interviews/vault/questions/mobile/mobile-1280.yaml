title: Evaluate Vision Transformer Deployment Cost on Exynos 2400 NPU
scenario: You are leading the deployment of a real-time semantic segmentation model
  for an AR application targeting the Samsung Exynos 2400. You must choose between
  a Convolutional Neural Network (CNN) requiring 25 GOPS per frame and a Vision Transformer
  (ViT) requiring 18 GOPS per frame. The Exynos 2400 features a dual-core NPU capable
  of 34.7 TOPS, but its 12 GB LPDDR5X memory is shared across the CPU, GPU, and ISP,
  and the ViT has 3x the memory bandwidth requirement of the CNN due to low arithmetic
  intensity in its self-attention layers. Which model do you choose for a target 60
  FPS constraint, and how do you justify the compute cost tradeoffs?
question: Which model do you choose for a target 60 FPS constraint, and how do you
  justify the compute cost tradeoffs?
details:
  realistic_solution: The correct approach is to evaluate the effective compute throughput
    by considering the memory bandwidth wall. Because the 12 GB LPDDR5X is shared
    with the ISP (running the camera pipeline) and GPU (rendering the AR), the ViT's
    high bandwidth requirements will cause NPU starvation. The CNN, despite requiring
    more theoretical compute (25 GOPS), has higher arithmetic intensity and better
    cache utilization, making it much more likely to sustain the required 60 FPS on
    the Exynos 2400 NPU without throttling other system components.
  common_mistake: Candidates often look only at the theoretical TOPS (34.7) and the
    GOPS per frame, mistakenly concluding that the ViT is better simply because 18
    GOPS is less than 25 GOPS. They fail to account for the shared memory architecture
    of the Exynos 2400, where memory bandwidth bottlenecks will severely degrade the
    effective TOPS for models with low arithmetic intensity.
  napkin_math: 'Target FPS: 60. CNN compute required: 60 FPS * 25 GOPS = 1.5 TOPS.
    ViT compute required: 60 FPS * 18 GOPS = 1.08 TOPS. Both are well within the theoretical
    34.7 TOPS of the Exynos 2400 dual-core NPU. However, assuming LPDDR5X provides
    ~60 GB/s total bandwidth, and ISP/GPU consume 40 GB/s for 60fps AR, only 20 GB/s
    remains for the NPU. If the ViT requires reading 500 MB per frame (500 MB * 60
    = 30 GB/s), it exceeds the available 20 GB/s bandwidth, lowering effective NPU
    utilization and dropping frames. The CNN, requiring only 150 MB per frame (150
    MB * 60 = 9 GB/s), fits comfortably within the memory bandwidth budget, making
    it the superior choice.'
