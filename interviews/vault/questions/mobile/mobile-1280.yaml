title: Evaluate Vision Transformer Deployment Cost on Exynos 2400 NPU
scenario: You are leading the deployment of a real-time semantic segmentation model for an AR application targeting the Samsung Exynos 2400. You must choose between a Convolutional Neural Network (CNN) requiring 25 GOPS per frame and a Vision Transformer (ViT) requiring 18 GOPS per frame. The Exynos 2400 features a dual-core NPU capable of 34.7 TOPS, but its 12 GB LPDDR5X memory is shared across the CPU, GPU, and ISP, and the ViT has 3x the memory bandwidth requirement of the CNN due to low arithmetic intensity in its self-attention layers.
question: Which model do you choose for a target 60 FPS constraint, and how do you justify the compute cost tradeoffs?
details:
  realistic_solution: The correct approach is to evaluate the effective compute throughput by considering the memory bandwidth wall. Because the 12 GB LPDDR5X is shared with the ISP (running the camera pipeline) and GPU (rendering the AR), the ViT's high bandwidth requirements will cause NPU starvation. The CNN, despite requiring more theoretical compute (25 GOPS), has higher arithmetic intensity and better cache utilization, making it much more likely to sustain the required 60 FPS on the Exynos 2400 NPU without throttling other system components.
  common_mistake: |
    **The Pitfall:** Choosing the ViT simply because 18 GOPS is less than 25 GOPS.
    **The Rationale:** Candidates rely entirely on theoretical TOPS and ignore the shared LPDDR5X memory architecture.
    **The Consequence:** Deploying a memory-bound model that starves the NPU, drops frames, and fails the 60 FPS target.
  napkin_math: |
    - **CNN Compute:** 60 FPS × 25 GOPS = **1.5 TOPS**.
    - **ViT Compute:** 60 FPS × 18 GOPS = **1.08 TOPS**.
    - **Memory Constraint:** LPDDR5X provides ~60 GB/s. ISP/GPU consume 40 GB/s. **20 GB/s remains**.
    - **ViT Bandwidth:** 500 MB/frame × 60 FPS = **30 GB/s** (Exceeds available).
    - **CNN Bandwidth:** 150 MB/frame × 60 FPS = **9 GB/s** (Fits within available).
    - **Conclusion:** Despite lower compute requirements, the ViT fails due to memory bandwidth starvation.
