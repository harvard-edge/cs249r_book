title: 'Kernel Fusion: Evaluate Quantized Attention Fusion on A17 Pro'
scenario: 'You are evaluating two attention implementations for a 3B LLM on A17 Pro
  (35 TOPS Neural Engine, 8GB): (A) FP16 attention with no fusion, (B) INT8 quantized
  attention with QK^T+softmax+V fusion. Sequence length 512. Compare memory, latency,
  and accuracy.'
question: On A17 Pro, how do FP16 unfused attention and INT8 fused attention compare
  for 512-token memory, latency, and accuracy?
details:
  realistic_solution: 'Attention memory: QK^T matrix = seq² × heads × bytes. For short
    sequences (512), this may fit in L2 cache. Compare bandwidth requirements for
    FP16 vs INT8 attention.'
  common_mistake: Assuming INT8 attention has 2× speedup vs FP16 — Neural Engine is
    rated at 35 TOPS INT8 and ~17 TOPS FP16, so the ratio applies to compute-bound
    ops only. Attention is often memory-bound.
  napkin_math: '3B model, 32 heads, head dim 128, seq=512. QK^T matrix: 512×512×32
    × 2B (FP16) = 16.8MB or × 1B (INT8) = 8.4MB. (A) FP16 unfused: Q=512×128×32×2B=4MB,
    K=4MB, V=4MB. Attention matrix: 16.8MB. Read Q+K+V (12MB) + write attn (16.8MB)
    + read attn (16.8MB) + write V×attn (4MB) = 49.6MB. At 68 GB/s: 0.73ms per layer.
    (B) INT8 fused (FlashAttention-style): reads Q+K+V = 6MB (INT8). Attention stays
    on-chip (8.4MB < estimated 10MB SRAM on NE). Writes output = 4MB. Total: 10MB.
    At 68 GB/s: 0.15ms per layer. Speedup: 0.73/0.15 = 4.9×. 3B model: 28 attention
    layers (assuming). Layer latency total: (A) 28 × 0.73ms = 20.4ms vs (B) 28 × 0.15ms
    = 4.2ms. 4.9× win for fused INT8. Accuracy: INT8 quantization error in attention
    → use per-head quantization with dynamic range. Typical quality drop: < 0.5% on
    MMLU.'
