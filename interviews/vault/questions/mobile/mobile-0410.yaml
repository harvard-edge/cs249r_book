title: The Catastrophic Accuracy Drop
scenario: You've trained a CV model in FP32 to recognize retail products with 95% accuracy. To deploy on an iPhone (A17 Pro), you use post-training static quantization to convert to INT8. The model runs fast on the Neural Engine, but accuracy plummets to 20%. Profiling shows all ops run on the NPU correctly. The calibration dataset was 100 images taken in a well-lit office.
question: Why does INT8 PTQ drop an A17 Pro retail product model from 95% FP32 accuracy to 20% after office-only calibration?
details:
  realistic_solution: The most likely cause is a **calibration data mismatch**. The quantization scale (S) and zero-point (Z) are calculated based on the dynamic range (min/max activation values) observed in the calibration dataset. Your office dataset was not representative of the varied lighting and product arrangements in a real store. When the model encounters real-world images, activations spike beyond the range observed during calibration, leading to massive clipping (overflow). This clipping discards critical information, destroying the model's accuracy.
  common_mistake: |
    **The Pitfall:** Blaming the hardware or the INT8 format itself for precision loss.
    
    **The Rationale:** Engineers assume lower precision inherently breaks complex models without checking the calibration process.
    
    **The Consequence:** They waste time debugging hardware fallbacks or attempting complex QAT instead of simply using a representative calibration dataset.
  napkin_math: |
    1. **Analyze Calibration Range:** A key activation in the office dataset has a max value of 6.0. The quantizer maps `[-6.0, 6.0]` to INT8 `[-128, 127]`.
    2. **Analyze Production Range:** In a real store with bright lighting, the activation spikes to 20.0.
    3. **Calculate Clipping:** The value 20.0 (and anything above 6.0) is forcefully clipped to 127.
    4. **Result:** **Catastrophic loss of dynamic range**. The model cannot distinguish between features, destroying prediction accuracy.
  options:
  - The model is too complex; INT8 format lacks the precision to represent the weights accurately.
  - The Apple Neural Engine does not correctly support a key operator, causing a silent fallback to the CPU with incorrect results.
  - The calibration dataset was not representative of the production data, causing activation values to overflow the INT8 range during inference.
  - The conversion process introduced too much noise, and the model needs to be re-trained with quantization-aware training (QAT).
  correct_index: 2
