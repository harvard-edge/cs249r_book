title: Monitoring On-Device ML Health on Snapdragon 8 Gen 3 NPU
scenario: You are tasked with deploying a critical on-device ML model for real-time inference on a mobile
  device powered by the Snapdragon 8 Gen 3 Hexagon NPU (45 TOPS INT8, 12-16 GB LPDDR5X). The model's reliability
  and performance are paramount. Describe the key telemetry metrics you would collect from the NPU and
  the application to monitor its runtime health, detect performance degradation (e.g., stragglers, increased
  latency), and identify potential issues like thermal throttling or memory pressure, considering the
  specific hardware constraints.
question: "What NPU and application telemetry would you collect to monitor real-time ML health on Snapdragon 8 Gen 3?"
details:
  realistic_solution: A robust solution involves collecting a blend of hardware and software metrics.
    Key NPU telemetry includes NPU utilization percentage, power consumption, temperature (to detect throttling),
    and memory usage on the LPDDR5X (e.g., how much of the 12-16GB is being used). Application-level telemetry
    should track inference latency (P95, P99), throughput (inferences per second), success/error rates,
    and the frequency of straggler inferences. This data can be aggregated locally and periodically pushed
    to a backend monitoring system. Alerting thresholds should be set for critical metrics like latency
    spikes, NPU overload, or thermal warnings. Straggler detection can be implemented by flagging inferences
    exceeding a defined latency threshold.
  common_mistake: Candidates often focus solely on model-level metrics (e.g., accuracy, loss) and neglect
    hardware-specific telemetry (NPU utilization, thermals, memory bandwidth), or fail to differentiate
    between application-level latency and pure NPU inference time. Another common mistake is not establishing
    clear MTBF/MTTR goals or strategies for on-device issues.
  napkin_math: Given the Snapdragon 8 Gen 3 Hexagon NPU's 45 TOPS INT8 capability, if an inference requires
    4.5 TOPS, the NPU can theoretically sustain 10 inferences per second. If the application demands a
    real-time rate of 30 frames per second (e.g., for video processing where each frame requires an inference),
    then each inference must complete within ~33ms. Monitoring P99 latency against this 33ms budget is
    crucial. If the model occupies 2GB of the 12-16GB LPDDR5X, excessive memory usage by other apps could
    lead to performance degradation or swapping, making memory pressure monitoring essential.
