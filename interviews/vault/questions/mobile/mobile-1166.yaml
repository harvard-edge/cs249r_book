title: Diagnosing Delegation Fallback on Exynos 2400
scenario: You converted a custom INT8 vision model to TFLite for deployment on an NPU. The device features a dual-core NPU capable of 34.7 TOPS and a shared 12 GB LPDDR5X memory pool across the CPU, GPU, ISP, and NPU. Despite the high TOPS rating, profiling shows inference latency is 5x slower than expected, the NPU utilization is severely underperforming, and system memory bandwidth is heavily saturated.
question: "Why is an INT8 TFLite vision model 5x slower with low NPU utilization and saturated LPDDR5X?"
details:
  realistic_solution: The root cause is an operator coverage gap in the TFLite NPU delegate, which forces the runtime to fall back to the CPU for unsupported operations. Because the device uses a unified memory architecture, CPU-NPU ping-ponging requires constantly writing intermediate tensors back to main memory and reading them again. You diagnose this by checking TFLite delegate initialization logs for unsupported ops, and fix it by replacing those ops with supported mathematical equivalents before ONNX/TFLite export to ensure a single, continuous NPU subgraph.
  common_mistake: |
    **The Pitfall:** Assuming thermal throttling or low arithmetic intensity is the culprit.
    **The Rationale:** Candidates overlook the TFLite runtime delegation process and the severe penalty of subgraph partitioning.
    **The Consequence:** Failing to identify CPU-NPU ping-ponging, leading to useless optimization attempts while memory bandwidth remains saturated.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Hardware: NPU (34.7 TOPS), 12 GB LPDDR5X.
       - Model Compute: 17.35 GOPS.
       - Activation Tensor Size (1x128x512x512 INT8): ~33.5 MB.
    2. **Calculations:**
       - Theoretical Ideal Latency: 17.35 GOPS / 34.7 TOPS = ~0.5 ms.
       - Transfers per Fallback: 4 (NPU write, CPU read, CPU write, NPU read).
       - Bandwidth Cost per Fallback: 4 * 33.5 MB = 134 MB.
       - Total Bandwidth for 5 Fallbacks: 5 * 134 MB = 670 MB per frame.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound (Bandwidth Saturation)**
       - The massive 670 MB overhead of ping-ponging intermediate tensors completely starves the NPU of data, causing the 5x slowdown.
