title: Diagnosing Delegation Fallback on Exynos 2400
scenario: You converted a custom INT8 vision model to TFLite for deployment on the Samsung Exynos 2400 NPU. The device features a dual-core NPU capable of 34.7 TOPS and a shared 12 GB LPDDR5X memory pool across the CPU, GPU, ISP, and NPU. Despite the high TOPS rating, profiling shows inference latency is 5x slower than expected, the NPU utilization is severely underperforming, and system memory bandwidth is heavily saturated.
question: Why is an Exynos 2400 INT8 TFLite vision model 5x slower with low NPU utilization and saturated LPDDR5X?
details:
  realistic_solution: The root cause is an operator coverage gap in the TFLite NPU delegate, which forces the runtime to fall back to the CPU for unsupported operations. Because the Exynos 2400 uses a unified 12 GB LPDDR5X memory architecture, CPU-NPU ping-ponging requires constantly writing intermediate tensors back to main memory and reading them again. You diagnose this by checking TFLite delegate initialization logs for unsupported ops, and fix it by replacing those ops with supported mathematical equivalents before ONNX/TFLite export to ensure a single, continuous NPU subgraph.
  common_mistake: |
    **The Pitfall:** Assuming the NPU is thermal throttling under load or that the model's arithmetic intensity is just too low.
    **The Rationale:** Candidates frequently overlook the runtime delegation process and the severe penalty of subgraph partitioning.
    **The Consequence:** Failing to identify the memory bandwidth saturation caused by CPU-NPU ping-ponging, leading to incorrect optimization strategies.
  napkin_math: |
    - If a model takes 17.35 GOPS, the 34.7 TOPS Exynos NPU should theoretically execute it in ~0.5 ms.
    - However, if a subgraph split occurs at a 1x128x512x512 INT8 activation, the tensor size is ~33.5 MB.
    - One CPU fallback requires 4 memory transfers (NPU write, CPU read, CPU write, NPU read).
    - 4 * 33.5 MB = 134 MB of bandwidth on the shared LPDDR5X bus per fallback.
    - Just 5 fallbacks generate 670 MB of redundant traffic per frame.
    - **This entirely saturates the memory controller and starves the dual-core NPU of data.**
