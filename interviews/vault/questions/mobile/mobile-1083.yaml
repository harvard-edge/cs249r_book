title: On-Device Coreset Selection and NPU Memory Contention
scenario: "You are implementing on-device data pruning for a continuous learning model on an Exynos 2400, which has a 34.7 TOPS NPU and 12 GB shared LPDDR5X memory. When you increase your coreset size from 500 to 2000 samples for overnight fine-tuning, NPU utilization drops from 85% to under 5%."
question: "Why does increasing an Exynos 2400 coreset from 500 to 2000 samples drop NPU utilization below 5%?"
details:
  realistic_solution: |
    The degradation happens because the NPU becomes entirely memory-bound. While the Exynos 2400 has a powerful 34.7 TOPS NPU, it shares the 12 GB LPDDR5X memory with the CPU, GPU, and ISP. Increasing the coreset size increases the memory bandwidth required to fetch samples and write activations. Once the bandwidth requirements exceed what is available after background OS/ISP tasks take their share, the NPU stalls waiting for data, causing utilization to plummet.
  common_mistake: |
    **The Pitfall:** Assuming compute (TOPS) is the primary bottleneck.
    **The Rationale:** Candidates try to optimize the model architecture without accounting for shared memory bandwidth contention.
    **The Consequence:** Optimizing the wrong bottleneck while the NPU remains starved for data.
  napkin_math: |
    **Assumptions & Constraints:**
    - Compute required: 100 MOPs/sample * 2000 samples = 200 GOPs.
    - Memory I/O required: 2 MB/sample * 2000 samples = 4000 MB (4 GB).
    - NPU compute: 34.7 TOPS. Shared available bandwidth: 15 GB/s.

    **Calculations:**
    - Compute time: 200 GOPs / 34.7 TOPS = ~5.7 ms.
    - Memory transfer time: 4 GB / 15 GB/s = ~266 ms.
    - Utilization: 5.7 ms compute / 266 ms total time = ~2.1%.

    **Conclusion & Interpretation:**
    - **Result: 2.1% Utilization (Memory-Bandwidth Bottleneck)**. NPU is severely starved by shared LPDDR5X bandwidth contention.
