title: Metal Performance Shaders Graph for On-Device Model Compilation on iOS
scenario: Apple's MPSGraph provides a GPU compute graph API that can target both Apple GPU and ANE. You
  consider using MPSGraph directly instead of CoreML for a custom diffusion model on A17 Pro. Compare
  the two approaches for portability and performance.
details:
  realistic_solution: 'MPSGraph vs CoreML tradeoffs: (1) CoreML: automatic ANE/GPU/CPU dispatch, model
    caching, and iOS optimizations (thermal throttling adaptation). Best for standard architectures. But
    ANE has operator restrictions (no dynamic shapes, limited attention support). (2) MPSGraph: full GPU
    control, supports dynamic shapes, custom operator fusion. But no ANE access — GPU-only, which uses
    more power and generates more heat. For a diffusion model (UNet with attention), CoreML''s ANE can
    handle the convolutions but attention runs on GPU anyway. MPSGraph eliminates the ANE<->GPU transition
    overhead. Recommendation: MPSGraph for diffusion models (attention-heavy), CoreML for CNNs (convolution-heavy).'
  common_mistake: Treating MPSGraph as a more portable alternative to CoreML. MPSGraph is Apple-only (iOS/macOS),
    so it provides zero cross-platform portability. Its advantage is lower-level control over GPU execution.
  napkin_math: 'Stable Diffusion UNet on A17 Pro: ~10 GFLOPS per step. CoreML (ANE+GPU): ~45ms per step
    (ANE<->GPU transitions cost ~8ms). MPSGraph (GPU-only): ~38ms per step (no transition overhead). 20
    steps: CoreML 900ms, MPSGraph 760ms. 15% faster with MPSGraph.'
