title: The UI Contention Crisis
scenario: You are deploying a 7B parameter local LLM on an iPhone 15 Pro (A17 Pro). In your sterile testing
  environment, it reliably generates text at 25 tokens/second. But in production, users complain that
  whenever they scroll the app's rich 3D animation interface, the LLM generation speed plummets to 5 tokens/second.
  What is the bottleneck?
question: "Why does an iPhone 15 Pro 7B local LLM drop from 25 to 5 tokens/sec when users scroll a 3D interface?"
details:
  realistic_solution: 'Compute is not the bottleneck; memory bandwidth is. Apple Silicon uses Unified
    Memory Architecture (UMA) where CPU, GPU, and Neural Engine share the same physical memory pool and
    bandwidth. A 7B model at INT4 = 3.5 GB weights. Autoregressive decode loads every weight once per
    token: 3.5 GB/token. iPhone 15 Pro memory bandwidth: ~120 GB/s shared across all processors. Theoretical
    ceiling: 120 GB/s / 3.5 GB = 34.2 tokens/s. In sterile testing (no other apps): ~25 tokens/s.
    With a heavy 3D UI, the GPU can consume ~100 GB/s of bandwidth, leaving only ~20 GB/s available
    for the Neural Engine/CPU. Throughput drops to 20 / 3.5 = 5.7 tokens/s. This directly explains the
    massive real-world degradation to ~5 tokens/second.'
  common_mistake: '"Assuming the LLM is running on the Neural Engine (ANE) and the UI is on the GPU, so
    they shouldn''t interfere with each other''s compute."'
  napkin_math: A 7B parameter model quantized to 4-bit takes `~3.5 GB` of memory. To generate 25 tokens/sec,
    the chip must sweep that entire model through memory 25 times a second, requiring `3.5 GB * 25 = 87.5
    GB/s` of memory bandwidth. The A17 Pro has roughly `~120 GB/s` of total system bandwidth. If the GPU
    suddenly demands `~100 GB/s` for the 3D UI, the system only has `~20 GB/s` left for the Neural Engine/CPU.
    The LLM is instantly starved, causing token generation to crash to `20 / 3.5 \u2248 5.7` tokens/second.
