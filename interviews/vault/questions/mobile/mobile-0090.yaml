title: The Inference Timing Jitter Mystery
scenario: 'Your real-time sign language recognition app runs a pose estimation model on the Qualcomm Snapdragon
  8 Gen 3. You measure inference latency over 1000 consecutive runs: P50 = 11 ms, P95 = 18 ms, P99 = 47
  ms. The 3× variation between P50 and P99 causes visible stutter in the UI — sign language recognition
  requires consistent frame timing. The model, input, and code are identical every run. Why does the same
  computation take 3× longer sometimes?'
details:
  realistic_solution: 'Five jitter sources: (1) DVFS clocking 400-850 MHz (2.1x range). (2) Memory bandwidth
    contention (+0.5-2ms). (3) Cache thrashing on context switch (+1.7ms). (4) Core migration (+0.5ms).
    (5) Java GC pauses (15-30ms, explains P99 outliers). Fix: PerformanceHintManager for sustained 600
    MHz. P50 rises from 11 to 15.6ms, but P99 drops from 47 to 18ms. Jitter ratio: 1.15x — acceptable
    for consistent sign language frame timing.'
  common_mistake: '"There''s a bug in the timing code." The timing is correct. Identical computations
    genuinely take different amounts of time on mobile SoCs.'
  napkin_math: 'NPU at 850 MHz: 11 ms. At 600 MHz: 11 × (850/600) = 15.6 ms. At 400 MHz: 11 × (850/400)
    = 23.4 ms. DVFS jitter: 11-23.4 ms (2.1×). Memory contention: +0.5-2 ms. Cache miss: +1.7 ms. Core
    migration: +0.5 ms. Worst case: 23.4 + 2 + 1.7 + 0.5 = 27.6 ms. Observed P99: 47 ms — the extra 20
    ms is from concurrent GC pauses or thermal throttle to an even lower frequency tier. With sustained
    performance mode at 600 MHz: P50 = 15.6 ms, P99 = 18 ms. Jitter ratio: 1.15× (acceptable for 30 FPS).'
