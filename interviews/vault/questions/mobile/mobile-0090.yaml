title: The Inference Timing Jitter Mystery
scenario: Your real-time sign language recognition app runs a pose estimation model on the Qualcomm Snapdragon 8 Gen 3. You measure inference latency over 1000 consecutive runs. P50 = 11 ms, P95 = 18 ms, P99 = 47 ms. The 3x variation between P50 and P99 causes visible stutter in the UI. The model, input, and code are identical every run.
question: Why does the same computation take 3x longer sometimes?
details:
  realistic_solution: 'Five jitter sources: (1) DVFS clocking 400-850 MHz (2.1x range). (2) Memory bandwidth contention (+0.5-2ms). (3) Cache thrashing on context switch (+1.7ms). (4) Core migration (+0.5ms). (5) Java GC pauses (15-30ms, explains P99 outliers). Fix: PerformanceHintManager for sustained 600 MHz. P50 rises from 11 to 15.6ms, but P99 drops from 47 to 18ms. Jitter ratio: 1.15x — acceptable for consistent sign language frame timing.'
  common_mistake: |
    **The Pitfall:** Believing there's a bug in the timing code when latency spikes.
    **The Rationale:** Engineers expect deterministic execution times from fixed computations.
    **The Consequence:** Time is wasted debugging profiling tools instead of acknowledging that identical computations genuinely take different amounts of time on mobile SoCs due to DVFS and memory contention.
  napkin_math: |
    **Assumptions & Constraints:**
    - DVFS Jitter: At 850 MHz NPU = 11 ms.
    - Hardware Overheads: Memory contention (+2 ms), Cache miss (+1.7 ms), Core migration (+0.5 ms).
    - Software Spikes (P99): Concurrent Java GC pause (~20 ms).

    **Calculations:**
    - At 600 MHz = 11 x (850/600) = 15.6 ms. At 400 MHz = 11 x (850/400) = 23.4 ms.
    - Worst Case Hardware Latency: 23.4 + 2 + 1.7 + 0.5 = 27.6 ms.
    - Fix Impact: Pinning frequency to 600 MHz raises P50 to 15.6 ms but drops P99 to 18 ms. Jitter ratio = 18 / 15.6 = 1.15x.

    **Conclusion & Interpretation:**
    - **Result: 1.15x Jitter Ratio (System-Noise-Bound)**. System-level DVFS and memory contention dominate variance, requiring explicit frequency pinning.
