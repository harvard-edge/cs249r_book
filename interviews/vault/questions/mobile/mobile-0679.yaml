title: 'The On-Device Vector Search Gone Wrong: Memory Hierarchy Design'
scenario: 'Your note-taking app has an on-device semantic search feature. Users index ~10K notes with 384-dim embeddings using an HNSW index. A user reports that searching for ''vacation photos from Italy'' returns their tax documents instead. The embedding model is correct — you verified the embeddings are semantically meaningful.'
question: 'Why does an HNSW search over unnormalized 384-dim note embeddings return tax documents for an Italy vacation query?'
details:
  realistic_solution: 'The HNSW index uses L2 distance on unnormalized embeddings. Because the vectors have radically different magnitudes, a semantically wrong vector with a small magnitude is mathematically "closer" than a correct vector with a massive magnitude. Normalizing the vectors to unit length forces equivalence to cosine similarity.'
  common_mistake: |
    **The Pitfall:** Blaming the embedding model and deciding to fine-tune it.
    **The Rationale:** Candidates don't realize L2 geometry heavily penalizes long semantic vectors if not scaled uniformly.
    **The Consequence:** Wasting weeks trying to improve model weights while the actual index ranking mechanism remains fundamentally broken.
  napkin_math: |
    **Assumptions & Constraints:**
    - Index size: 10K × 384-dim × 4B = 15 MB (Fits easily).
    - Metric: HNSW L2 Distance.
    - Magnitudes: Query mag = 12.5. Vacation mag = 25.0, Cosine = 0.89. Tax mag = 4.0, Cosine = 0.23.

    **Calculations:**
    - Vacation L2: √(12.5² + 25.0² - 2 × 12.5 × 25.0 × 0.89) = 15.0.
    - Tax L2: √(12.5² + 4.0² - 2 × 12.5 × 4.0 × 0.23) = 12.2.

    **Conclusion & Interpretation:**
    - **Result: Algorithmic Error**. Tax document (12.2) beats Vacation (15.0) under L2 distance despite terrible cosine similarity. Normalizing vectors to unit length forces L2 equivalence to cosine similarity.
