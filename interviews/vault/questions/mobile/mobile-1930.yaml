title: Evaluate zero-point arithmetic overhead in asymmetric mobile quantization
scenario: A Snapdragon 8 Gen 3 Hexagon NPU is used to deploy an image super-resolution model. Engineers propose replacing FP16 activations with asymmetric INT8 quantization to double the theoretical hardware throughput.
question: Evaluate the primary performance bottleneck that asymmetric INT8 quantization will introduce in this specific deployment.
details:
  realistic_solution: Asymmetric quantization requires a zero-point offset computation (X - Z). On mobile NPUs, the extra integer arithmetic to handle cross-term multiplications during matrix multiplication adds significant overhead. This offset correction often becomes compute-bound, negating the theoretical 2x memory and compute throughput gains of INT8.
  common_mistake: |
    **The Pitfall:** Believing INT8 always yields a perfect 2x speedup over FP16.
    **The Rationale:** Engineers assume smaller data types linearly scale throughput, failing to account for the zero-point correction overhead required by asymmetric quantization.
    **The Consequence:** The model fails to meet latency targets because the extra integer arithmetic becomes a severe compute bottleneck.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Asymmetric Quantization formula: $X_{q} = (X - Z_x) / S_x$.
       - Matrix Multiplication (MAC) base op: $W \times X$.
    2. **Calculations:**
       - Symmetric execution requires just $(W_{q} \times X_{q})$.
       - Asymmetric offset requires computing: $(W_{q} \times X_{q}) - (W_{q} \times Z_x) - (Z_w \times X_{q}) + (Z_w \times Z_x)$.
       - This generates 3 additional distinct integer cross-terms to sum for every MAC.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound ALUs**. Processing three extra offset terms for every single multiplication rapidly exhausts the integer ALUs, negating the theoretical 2x INT8 speedup.
