title: Evaluate zero-point arithmetic overhead in asymmetric mobile quantization
scenario: A Snapdragon 8 Gen 3 Hexagon NPU is used to deploy an image super-resolution
  model. Engineers propose replacing FP16 activations with asymmetric INT8 quantization
  to double the theoretical hardware throughput.
question: Evaluate the primary performance bottleneck that asymmetric INT8 quantization
  will introduce in this specific deployment.
details:
  realistic_solution: Asymmetric quantization requires a zero-point offset computation
    (X - Z). On mobile NPUs, the extra integer arithmetic to handle cross-term multiplications
    during matrix multiplication adds significant overhead. This offset correction
    often becomes compute-bound, negating the theoretical 2x memory and compute throughput
    gains of INT8.
  common_mistake: Believing INT8 always yields a perfect 2x speedup over FP16 without
    accounting for the zero-point correction overhead.
  napkin_math: (W * X) vs (W * X) - (W * Zx) - (Zw * X) + (Zw * Zx)
