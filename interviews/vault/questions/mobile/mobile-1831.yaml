title: Mobile Thermal Guardrail Spec
scenario: An on-device vision model runs within latency target for two minutes, then
  slows as the phone heats up. Specify the runtime guardrails needed before shipping.
question: What thermal guardrails are required before shipping a mobile vision model
  that slows after two minutes?
details:
  realistic_solution: The spec should include sustained latency targets, temperature
    or thermal-state thresholds, duty-cycle limits, fallback model, frame-skipping
    policy, user-visible degradation behavior, and telemetry for throttling events.
    Passing a cold-start benchmark is not enough.
  common_mistake: Using cold benchmark latency as the shipping number and ignoring
    sustained thermal throttling.
  napkin_math: If latency rises from 25 ms to 45 ms after throttling, a 30 FPS pipeline
    moves from meeting a 33 ms budget to missing every frame.
