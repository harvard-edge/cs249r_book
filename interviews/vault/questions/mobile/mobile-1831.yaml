title: Mobile Thermal Guardrail Spec
scenario: An on-device vision model runs within latency target for two minutes, then slows as the phone heats up.
question: What thermal guardrails are required before shipping a mobile vision model that slows after two minutes?
details:
  realistic_solution: The spec should include sustained latency targets, temperature or thermal-state thresholds, duty-cycle limits, fallback model, frame-skipping policy, user-visible degradation behavior, and telemetry for throttling events. Passing a cold-start benchmark is not enough.
  common_mistake: |
    **The Pitfall:** Using cold benchmark latency as the shipping number.
    **The Rationale:** Candidates ignore sustained thermal throttling that occurs after a few minutes of continuous operation.
    **The Consequence:** The application works fine initially but degrades severely in real-world sustained usage, missing strict latency budgets.
  napkin_math: |
    - Cold latency: 25 ms (meets 33 ms budget for 30 FPS).
    - Throttled latency: 45 ms.
    - **At 45 ms, a 30 FPS pipeline (33 ms budget) will miss every frame.**
