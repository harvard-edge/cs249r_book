title: The App Store Model Size Rejection
scenario: Your image generation app bundles a 350 MB diffusion model. Apple approves the app, but analytics show 60% of users abandon the download when iOS shows 'This app is over 200 MB and requires WiFi.'
question: How should a 350 MB diffusion model be delivered to avoid the iOS 200 MB cellular download limit warning?
details:
  realistic_solution: Separate model from app binary using staged delivery. Ship a 40 MB app, and download the 350 MB model in the background after install.
  common_mistake: |
    **The Pitfall:** Aggressively quantizing the model to bypass the limit.
    **The Rationale:** Candidates assume shrinking the binary is the only path, proposing INT4 or INT2 quantization on a diffusion model.
    **The Consequence:** The extreme quantization destroys the generative output quality, leading users to uninstall the app immediately after seeing the artifacted images.
  napkin_math: |
    1. Identify cellular limit: App Store limit is 200 MB.
    2. Calculate thin app bundle: Ship a 40 MB binary (cellular OK).
    3. Calculate model compression: 350 MB raw -> ~180 MB compressed.
    4. Estimate background download time: On LTE (2.5 MB/s), 180 MB / 2.5 = **72 seconds**.
    5. Estimate impact: Dropping forced-WiFi lowers abandonment from 60% to ~15%.
