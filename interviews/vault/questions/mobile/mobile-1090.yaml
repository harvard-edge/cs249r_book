title: Energy Analysis of Memory Access in LLM Inference
scenario: You are analyzing the power consumption of deploying a quantized Gemini Nano model on a device. During profiling, you notice that overall battery drain is disproportionately caused by reading weights from memory during token generation, despite high TPU compute utilization.
question: Why does battery drain come primarily from memory weight reads during Gemini Nano token generation instead of TPU compute?
details:
  realistic_solution: LLM token generation (autoregressive decoding) is fundamentally memory-bandwidth bound. Every token requires reading the entire model's weights from memory. According to the Horowitz energy table, an external DRAM access costs roughly 100x to 1000x more energy than a simple on-chip MAC operation.
  common_mistake: |
    **The Pitfall:** Focusing solely on FLOPs and compute efficiency.
    **The Rationale:** Candidates see the high TOPS rating and assume the TPU uses little power, ignoring the fact that memory accesses cost orders of magnitude more energy than compute.
    **The Consequence:** Misidentifying the source of battery drain and failing to apply memory-centric optimizations like quantization or KV-cache reduction.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model size: 2 billion parameters (2 GB at 8-bit).
       - Memory access energy: ~15 pJ/byte.
       - Compute energy: ~0.2 pJ/MAC.
    2. **Calculations:**
       - Total memory energy per token: 2e9 bytes * 15 pJ/byte = 30 mJ.
       - Total compute energy per token: 2e9 MACs * 0.2 pJ/MAC = 0.4 mJ.
       - Energy Ratio: 30 mJ / 0.4 mJ = 75x.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound Energy Consumption**. The system spends 75x more energy on memory accesses than on compute per token.
