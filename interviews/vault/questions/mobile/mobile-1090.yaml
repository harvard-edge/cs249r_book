title: Energy Analysis of Memory Access in LLM Inference
scenario: You are analyzing the power consumption of deploying a quantized Gemini
  Nano model on a Google Tensor G3 device. The device features an on-device TPU capable
  of 7.5 TOPS and is paired with 12 GB of LPDDR5X memory. During profiling, you notice
  that while compute utilization on the TPU is high, the overall battery drain is
  disproportionately caused by reading weights from the LPDDR5X memory during token
  generation. Explain why this happens by comparing the energy cost of memory access
  versus compute.
question: Why does Tensor G3 battery drain come from LPDDR5X weight reads during Gemini
  Nano token generation?
details:
  realistic_solution: The correct analysis recognizes that LLM token generation (autoregressive
    decoding) is fundamentally memory-bandwidth bound. Even with a highly efficient
    TPU on the Tensor G3, every token requires reading the entire model's weights
    from the 12 GB LPDDR5X memory. According to the Horowitz energy table, an external
    DRAM access costs roughly 100x to 1000x more energy than a simple on-chip MAC
    operation, making memory access the primary driver of power consumption.
  common_mistake: Candidates often focus solely on the computational cost (FLOPs)
    and assume the TPU's high compute efficiency (7.5 TOPS) guarantees low power consumption.
    They fail to account for the Horowitz energy table principle, which states that
    off-chip memory access is orders of magnitude more energy-intensive than a single
    math operation.
  napkin_math: Assume an 8-bit MAC operation on the Tensor G3 TPU costs ~0.2 pJ. Accessing
    8 bits (1 byte) from off-chip LPDDR5X memory costs roughly 15 pJ. If generating
    one token requires reading a 2 billion parameter model (2 GB at 8-bit quantization),
    the memory access energy is 2 * 10^9 bytes * 15 pJ/byte = 30 mJ per token. In
    contrast, the compute energy for generating that token (assuming 1 MAC per weight)
    is roughly 2 * 10^9 * 0.2 pJ = 0.4 mJ. Therefore, memory access consumes 75x more
    energy per token than the actual computation (30 mJ vs 0.4 mJ).
