title: Energy Analysis of Memory Access in LLM Inference
scenario: You are analyzing the power consumption of deploying a quantized Gemini Nano model on a Google Tensor G3 device (7.5 TOPS, 12 GB LPDDR5X). During profiling, you notice that overall battery drain is disproportionately caused by reading weights from memory during token generation, despite high TPU compute utilization.
question: Why does Tensor G3 battery drain come primarily from LPDDR5X weight reads during Gemini Nano token generation instead of TPU compute?
details:
  realistic_solution: The correct analysis recognizes that LLM token generation (autoregressive decoding) is fundamentally memory-bandwidth bound. Even with a highly efficient TPU, every token requires reading the entire model's weights from the 12 GB LPDDR5X memory. According to the Horowitz energy table, an external DRAM access costs roughly 100x to 1000x more energy than a simple on-chip MAC operation, making memory access the primary driver of power consumption.
  common_mistake: |
    **The Pitfall:** Focusing solely on FLOPs and compute efficiency.
    **The Rationale:** Candidates see the high TOPS rating and assume the TPU uses little power, ignoring the fact that memory accesses cost orders of magnitude more energy than compute.
    **The Consequence:** Misidentifying the source of battery drain and failing to apply memory-centric optimizations like quantization or KV-cache reduction.
  napkin_math: |
    - **Model size:** 2 billion parameters (2 GB at 8-bit)
    - **Memory access energy:** ~15 pJ/byte
    - **Compute energy:** ~0.2 pJ/MAC
    - **Total memory energy per token:** 2 * 10^9 bytes * 15 pJ/byte = 30 mJ
    - **Total compute energy per token:** 2 * 10^9 MACs * 0.2 pJ/MAC = 0.4 mJ
    - **Ratio:** 30 mJ / 0.4 mJ = **75x more energy spent on memory access**
