title: Optimal Checkpointing Frequency for Mobile Federated Learning
scenario: Federated learning on a Snapdragon 8 Gen 3 device updates a 10MB personalized
  model. The device drops WiFi connections randomly due to user mobility.
question: Design a local checkpointing frequency that limits lost training progress
  to at most 20 seconds, given saving the model takes 50ms of flash write time.
details:
  realistic_solution: To ensure no more than 20 seconds of work is lost, a checkpoint
    must be saved at least every 20 seconds. Since the overhead is 50ms per save,
    checkpointing every 20s yields an overhead of 0.25%, which is negligible for compute
    but strictly satisfies the fault-tolerance constraint.
  common_mistake: Setting the checkpoint frequency too high (e.g., every second),
    which degrades flash memory lifespan and causes pipeline stuttering.
  napkin_math: 0.05s / 20s = 0.25% overhead.
