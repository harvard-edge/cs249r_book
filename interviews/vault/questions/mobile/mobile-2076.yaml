title: Optimal Checkpointing Frequency for Mobile Federated Learning
scenario: Federated learning on a mobile device updates a 10MB personalized model. The device drops WiFi connections randomly due to user mobility.
question: Design a local checkpointing frequency that limits lost training progress to at most 20 seconds, given saving the model takes 50ms of flash write time.
details:
  realistic_solution: To constrain lost stochastic gradient updates to 20 seconds, an atomic checkpoint must be committed to UFS storage every 20 seconds. The 50ms flash write overhead amortized over the 20-second window yields a trivial 0.25% compute overhead, perfectly satisfying the fault-tolerance constraint without inducing UI stutter.
  common_mistake: |
    **The Pitfall:** Setting checkpoint frequency too aggressively.
    **The Rationale:** Candidates aim for absolute fault tolerance and suggest saving the model every 1 second.
    **The Consequence:** This causes continuous 50ms interruptions (5% overhead), degrades flash memory lifespan, and causes severe pipeline stuttering.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Max lost progress constraint: 20 seconds.
       - Checkpoint overhead time: 50 ms (0.05 s).
    2. **Calculations:**
       - Checkpoint frequency: At least every 20 seconds.
       - Compute overhead percentage: 0.05 s / 20 s = 0.0025 (0.25%).
    3. **Conclusion & Interpretation:**
       - **Result: 0.25% Overhead at 20s interval.** The system is **Storage-IO-Bound** during the write, but the amortized cost is negligible.
  options:
  - Every 1 second
  - Every 20 seconds
  - Every 200 seconds
  - Only when the user manually saves
  correct_index: 1
