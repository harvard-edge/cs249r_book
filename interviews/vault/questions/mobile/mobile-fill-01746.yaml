title: Tensor G3 TPU Memory Bandwidth Bottleneck
scenario: You are deploying a 3.4 billion parameter INT8 quantized model, similar to the on-device LLM
  Gemini Nano, on a device powered by the Google Tensor G3. The G3 features an on-device TPU providing
  7.5 TOPS of compute and is paired with 12 GB of LPDDR5X memory that provides roughly 68 GB/s of bandwidth.
  During autoregressive text generation at a batch size of 1, profiling reveals the TPU is operating at
  less than 5% compute utilization, achieving only 20 tokens per second. Explain why the compute capacity
  of the TPU is severely underutilized and what physical characteristic is actually constraining the token
  generation rate.
details:
  realistic_solution: Autoregressive decoding at batch size 1 is fundamentally memory-bound because all
    model weights must be streamed from the LPDDR5X RAM for every single generated token. The TPU's 7.5
    TOPS represent peak arithmetic performance, but the compute units sit idle waiting for the 3.4 GB
    of weights to be shuttled from memory across the 68 GB/s bus, meaning the accelerator's performance
    is bottlenecked by memory fetch rather than arithmetic limits.
  common_mistake: Candidates typically divide the 7.5 TOPS compute capability by the operations required
    per token, incorrectly concluding the device should generate over a thousand tokens per second. They
    fail to differentiate between compute-bound operations (like the initial prompt prefill) and memory
    bandwidth-bound operations (like single-batch autoregressive decoding).
  napkin_math: '1. Model size: 3.4 billion parameters * 1 byte (INT8) = 3.4 GB. 2. Memory bandwidth limit:
    68 GB/s / 3.4 GB per token = 20 tokens/second. 3. Compute limit: 7.5 TOPS (7.5e12 ops/s) / (3.4e9
    weights * 2 ops/weight) = ~1,102 tokens/second. 4. Conclusion: Memory limits generation to 20 tokens/s,
    utilizing only (20 / 1102) = ~1.8% of the TPU''s peak 7.5 TOPS compute capacity.'
