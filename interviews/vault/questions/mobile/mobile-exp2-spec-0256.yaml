title: Real-Time Sensor Ingestion for AR Tracking
scenario: You are designing an augmented reality application that relies on real-time streaming data from
  the camera and IMU sensors on an iPhone. The system needs to ingest this high-frequency sensor data,
  compute spatial features, and run a tracking model directly on the Apple A17 Pro Neural Engine. Given
  the shared 8 GB unified memory and a strict thermal budget of ~5W for the entire SoC, design the data
  ingestion and preprocessing pipeline to ensure the 16-core Neural Engine is fed continuously without
  starving, while preventing memory bandwidth bottlenecks.
question: "How would you ingest AR camera and IMU streams in real time using unified-memory ring buffers?"
details:
  realistic_solution: A strong solution utilizes lock-free ring buffers in the unified memory to handle
    the high-frequency IMU and camera streams, achieving zero-copy ingestion. Preprocessing should be
    pipelined using the ISP or GPU before the tensor is handed off to the A17 Pro Neural Engine. The candidate
    must analyze the memory access patterns to ensure the 35 TOPS NPU isn't waiting on CPU-side data serialization.
  common_mistake: Candidates often propose complex, server-like message queues or heavy multi-threading
    that thrashes the unified memory cache. They also tend to ignore the cost of data movement between
    the CPU (which handles sensor interrupts) and the shared memory space accessed by the 16-core Neural
    Engine.
  napkin_math: Camera at 60 FPS (1920x1080 RGB) generates ~373 MB/s; IMU at 1000 Hz is ~32 KB/s. Total
    ingestion throughput is well under 1 GB/s, easily fitting within unified memory limits. To meet 60
    FPS, end-to-end latency must be <16.6ms. A 10 GOPS feature extraction model requires 10 * 10^9 operations
    per frame. At 35 TOPS, the compute takes ~0.28ms theoretically. This proves the NPU compute is trivial,
    making efficient memory management within the 8 GB shared pool and minimizing the ~5W thermal impact
    the primary design constraints.
