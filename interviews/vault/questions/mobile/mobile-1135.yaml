title: Architecting Memory-Mapped Inference for Gemini Nano on Tensor G3
scenario: You are tasked with deploying Gemini Nano on the Google Tensor G3, which features an on-device TPU with 7.5 TOPS and 12 GB of LPDDR5X RAM. The model needs to be available instantly across multiple system applications without duplicating its memory footprint.
question: How would you design a memory-mapped weight loading strategy that guarantees zero cold-start delay for these apps while respecting the 12 GB RAM pool?
details:
  realistic_solution: The ideal design leverages `mmap` with `MAP_SHARED` to map the model weights directly from storage into virtual memory. The Tensor G3's TPU can then access these shared memory pages directly without intermediate copying. A background system service should pin the most critical initial layers in memory using `mlock` to ensure instant first-token generation, while the rest of the model is paged in on-demand, allowing multiple apps to share the exact same physical memory pages.
  common_mistake: |
    **The Pitfall:** Loading the entire model into RAM separately for each application process.
    **The Rationale:** Candidates often default to standard file I/O reads, ignoring the shared 12 GB LPDDR5X limit and the zero cold-start delay requirement.
    **The Consequence:** The system experiences out-of-memory errors, OS-level app kills, and unacceptable cold-start delays.
  napkin_math: |
    1. **Model Size:** Gemini Nano (3.2B parameters, INT4) = 3.2B * 0.5 bytes = 1.6 GB.
    2. **Naive Loading:** 3 apps loading separately consumes 4.8 GB (40% of the 12 GB RAM).
    3. **Shared mmap Strategy:** Using `mmap` with `MAP_SHARED`, the physical memory footprint remains strictly **1.6 GB** (13.3% of RAM).
    4. **Savings:** This saves **3.2 GB** for other OS processes while providing instant access.
