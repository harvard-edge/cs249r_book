title: The CoreML Multi-Array Pre-allocation
scenario: You run a CoreML video processing pipeline at 60 FPS on iOS. The model prediction takes 5ms. However, the Instruments profiler shows your app is constantly triggering the OS memory allocator and occasionally dropping frames due to memory spikes. You are creating a new `MLMultiArray` for the output every frame.
question: How do you eliminate per-frame MLMultiArray allocation spikes in a 60 FPS Core ML video pipeline?
details:
  realistic_solution: 'Creating a new MLMultiArray every frame triggers 600 MB/s of allocation churn (10 MB tensor x 60 FPS). The memory allocator fragments the heap, causing occasional GC spikes that drop frames. Fix: use MLPredictionOptions with pre-allocated output backing buffers. Create the MLMultiArray once at initialization, then pass it via predictionOptions.outputBackings for every prediction call. CoreML writes directly into your pre-allocated buffer, reducing allocation churn to zero. This eliminates frame drops and reduces average frame time by 2-3ms from avoided malloc/free overhead.'
  common_mistake: |
    **The Pitfall:** Concluding that CoreML memory allocations are outside of developer control.
    **The Rationale:** Candidates assume that because the framework returns a new object, memory reuse is impossible at the API level.
    **The Consequence:** The app continues to suffer from GC pauses and dropped frames because 600 MB/s of memory churn is left unoptimized.
  napkin_math: |
    - **Dynamic Allocation Churn:** Allocating and freeing a 10 MB tensor 60 times a second equals 600 MB/s of pure memory allocation churn.
    - **Pre-allocation Impact:** Reusing a pre-allocated backing buffer drops the memory churn to exactly 0 MB/s.
    - **Result:** **Pre-allocation completely eliminates the 600 MB/s memory churn, stopping garbage collection spikes.**
