title: Edge Telemetry Architecture for On-Device LLMs
scenario: You are leading the deployment of Gemini Nano on a fleet of devices powered by the Google Tensor
  G3. In field testing, you observe sporadic tail-latency spikes and silent process crashes during background
  text summarization. Design a comprehensive, privacy-preserving observability architecture to isolate
  whether these stragglers are caused by TPU thermal throttling, memory pressure within the 12 GB LPDDR5X
  envelope, or OS-level scheduler preemption.
details:
  realistic_solution: 'Design a tiered, edge-native telemetry system. Use lightweight counters for TPU
    utilization, thermal states, and memory high-water marks, aggregating them locally into histograms.
    Implement an anomaly-triggered trace mechanism: only when inference latency exceeds the P95 threshold
    or available RAM drops dangerously low, the system takes a lightweight snapshot of system state and
    aggregates the findings using federated analytics to preserve user privacy.'
  common_mistake: Candidates often propose continuously streaming verbose telemetry, full stack traces,
    or high-frequency memory profiling back to the cloud. This approach violates privacy constraints for
    on-device LLMs, drains the battery, and ironically introduces memory pressure or thermal load that
    masks or exacerbates the underlying issues they are trying to debug.
  napkin_math: Assuming Gemini Nano requires ~20 GOPS per token. Generating a 100-token summary requires
    2 TOPS. On the Tensor G3's 7.5 TOPS TPU, ideal inference takes ~266ms (2 TOPS / 7.5 TOPS). If the
    local observability agent samples thermal/memory state every 50ms, it collects ~5 samples per inference.
    At 128 bytes per sample, that's 640 bytes per task. For 1,000 daily background tasks, total daily
    telemetry is ~640 KB. This footprint is virtually invisible within the 12 GB LPDDR5X memory and requires
    minimal energy to transmit during nightly charging.
