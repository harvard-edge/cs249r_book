title: 'Mobile TCO Recall: Mobile ML Hardware Cost Tiers'
scenario: Compare the TOPS ratings and RAM capacities for major mobile ML platforms, their power draw for LLM inference, and the maximum LLM parameter count each can support at INT4 and FP16 quantization.
question: What TOPS, RAM, power, and maximum INT4 and FP16 LLM sizes characterize modern mobile SoC platforms?
details:
  realistic_solution: |
    Memory capacity defines the upper bound. A standard 8GB device leaves ~6GB for the app. At INT4 (0.5 bytes/param), this theoretically fits a 12B model; at FP16 (2 bytes/param), a 3B model. A 16GB device leaves ~14GB, fitting a 28B INT4 or 7B FP16 model. However, theoretical limits ignore the critical KV cache overhead. A 7B model using Grouped Query Attention (GQA) over a 4096-token context consumes ~500MB of KV cache. Consequently, models like Phi-3-Mini (3.8B INT4 = 1.9GB weights) are universally deployable across 8GB+ platforms with stable 3-5W power profiles.
  common_mistake: |
    **The Pitfall:** Assuming all available RAM can be used purely for the model weights.
    **The Rationale:** Candidates forget to subtract OS, app overhead, and the required KV cache for LLMs.
    **The Consequence:** They overestimate the maximum runnable model size by several gigabytes.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Standard INT4 precision: 0.5 bytes/parameter.
       - Standard FP16 precision: 2.0 bytes/parameter.
       - OS Overhead: ~2-3 GB reserved out of total RAM.
    2. **Calculations:**
       - 8GB Device (6GB free): INT4 limit = 6 GB / 0.5 = 12B params. FP16 limit = 6 GB / 2 = 3B params.
       - 16GB Device (14GB free): INT4 limit = 14 GB / 0.5 = 28B params. FP16 limit = 14 GB / 2 = 7B params.
       - Practical INT4 7B footprint: 7B * 0.5 bytes (weights) + ~0.5 GB (KV Cache 4096 ctx) = 4.0 GB total.
    3. **Conclusion & Interpretation:**
       - **Result: Memory Capacity-Bound.** RAM is the definitive constraint, not TOPS. While an 8GB device theoretically fits a 12B INT4 model, the dynamic memory required for KV caching drops the practical limit significantly, making ~4B models the safest universal choice.
