title: Wi-Fi Direct MAC Overhead
scenario: Two Snapdragon 8 Gen 3 phones partition an INT8 translation model over a
  Wi-Fi 6 Direct link (600 Mbps reliable) passing 2MB activation tensors.
question: Evaluate the pipeline latency per token, factoring in Wi-Fi 6 MAC contention
  overheads which add 4ms fixed latency per transmission.
details:
  realistic_solution: The payload is 2MB, which is 16Mb. At 600 Mbps, the raw transfer
    time is 26.6ms. Adding the 4ms fixed MAC overhead yields a total network synchronization
    time of 30.6ms. This sets a hard lower bound on pipeline throughput regardless
    of compute speed.
  common_mistake: Failing to convert MB to Mb, or missing the fixed MAC overhead which
    heavily penalizes small tensor transfers in wireless protocols.
  napkin_math: 16Mb / 600Mbps = 26.6ms. Sync = 4ms. Total latency = 30.6ms.
