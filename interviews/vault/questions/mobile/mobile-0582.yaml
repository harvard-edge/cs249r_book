title: The Noisy Environment Speech Failure
scenario: Your on-device speech recognition model (Conformer-Transducer, 30M params, INT8) on a Google Pixel 8 Pro (Tensor G3) achieves 5% WER in quiet environments. In a noisy coffee shop (~70 dB ambient), WER degrades to 35% — unusable. The cloud version of the same model handles noise fine because it uses a 200M parameter noise-robust encoder. You can't fit 200M params on-device.
question: How do you fix speech recognition noise robustness within a 50 MB mobile model budget?
details:
  realistic_solution: 'A multi-stage approach within the 50 MB budget: Quiet WER: 5%. Noisy WER (baseline): 35%. After noise suppressor: 35% × 0.5 = ~18%. After multi-condition training: 18% × 0.65 = ~12%. After beamforming (+8 dB SNR): 12% × 0.7 = ~8%. Combined: **8% WE'
  common_mistake: |
    **The Pitfall:** Bolting on a generic noise suppression preprocessing step (e.g., RNNoise).
    **The Rationale:** Candidates attempt a modular engineering fix without understanding the acoustic consequences.
    **The Consequence:** The suppressor removes noise but heavily distorts speech harmonics, often worsening WER in dynamic noise environments like coffee shops.
  napkin_math: |
    *   **Baseline Quiet WER:** 5%.
    *   **Baseline Noisy WER:** 35%.
    *   **Noise Suppressor Benefit:** 35% * 0.5 = ~18% WER.
    *   **Multi-Condition Training Benefit:** 18% * 0.65 = ~12% WER.
    *   **Beamforming Benefit:** 12% * 0.7 = **~8% Final WER**.
    *   **Model Size:** 35 MB (< 50 MB budget).
    *   **Power Cost:** ~1.5 W TPU draw * 1 h = 1.5 Wh (8.5% of battery).
