title: LLaMA-3 8B INT8 Quantization Memory Budget on Snapdragon 8 Gen 3
scenario: You are deploying a quantized 8-billion parameter LLM onto a flagship Android device powered
  by a Qualcomm Snapdragon 8 Gen 3 SoC. The device has 16 GB of shared LPDDR5X memory, but the OS and
  background apps reserve a hard baseline of 6 GB. You plan to run the model on the Hexagon NPU using
  INT8 weights and INT8 activations. Calculate the total memory footprint required to load the model weights
  and maintain a KV cache for a batch size of 1 with a context length of 2048 tokens, assuming a hidden
  size of 4096 and 32 layers.
details:
  realistic_solution: 'First, calculate the memory needed for the INT8 weights (1 byte per parameter).
    Then, calculate the KV cache size using the standard formula: 2 * batch_size * context_length * hidden_size
    * num_layers * bytes_per_element. Finally, verify that the sum of the model weights and the KV cache
    fits within the available user-space memory (Total RAM - OS Reserved).'
  common_mistake: Candidates often forget that mobile SoCs use unified memory, meaning the NPU, CPU, and
    GPU share the same physical RAM pool. They might also forget to account for the KV cache entirely,
    or miscalculate the INT8 memory footprint by assuming 1 byte per parameter is exactly 1 byte in practice
    without considering metadata or padding, though for napkin math, 1 byte/param is acceptable.
  napkin_math: '1. Available Memory: 16 GB (Total LPDDR5X) - 6 GB (OS) = 10 GB available for the app.

    2. Model Weights: 8 billion parameters * 1 byte/param (INT8) = 8 GB.

    3. KV Cache size per token (FP16): 2 (K and V) * 32 (layers) * 4096 (hidden size) * 2 bytes (FP16)
    = 524,288 bytes (~0.5 MB/token).

    4. Total KV Cache (2048 tokens): 2048 * 0.5 MB = 1024 MB = 1 GB.

    5. Total Footprint: 8 GB (Weights) + 1 GB (KV Cache) = 9 GB.

    6. Conclusion: The 9 GB footprint fits within the 10 GB available shared memory on the Snapdragon
    8 Gen 3.'
