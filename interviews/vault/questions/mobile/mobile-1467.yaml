title: Hexagon NPU INT8 Peak Performance Recall
scenario: A real-time vision model is being optimized for the Qualcomm Hexagon NPU on the Snapdragon 8 Gen 3 SoC to run within a 33ms frame budget.
question: What is the advertised peak theoretical INT8 compute capacity of the Hexagon NPU for roofline modeling?
details:
  realistic_solution: The correct specification to recall is 45 TOPS (Tera Operations Per Second) for INT8 workloads on the Hexagon NPU. Knowing this specific figure is essential for roofline modeling on edge devices, as isolating the NPU performance prevents overestimating system capacity when the CPU and GPU are occupied with other application tasks.
  common_mistake: |
    **The Pitfall:** Stating the combined AI Engine performance instead of isolating the NPU.

    **The Rationale:** Confusing the total SoC TOPS with the Hexagon NPU's specific INT8 capability.

    **The Consequence:** Overestimating system capacity when the CPU and GPU are occupied with other tasks.
  napkin_math: |
    *   Peak NPU performance: 45 TOPS INT8.
    *   Time budget per frame (30 FPS): 1 / 30 = 33.3 ms.
    *   Theoretical operations per frame: 45 TOPS * 0.0333s = 1.4985 TOPS.
    *   For a 1.5 GOPS model: 1.4985 TOPS / 1.5 GOPS = **~999 inferences per frame** (compute-bound theoretical max).
