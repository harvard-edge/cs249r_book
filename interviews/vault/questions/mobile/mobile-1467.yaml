title: Hexagon NPU INT8 Peak Performance Recall
scenario: A real-time vision model is being optimized for the Qualcomm Hexagon NPU on the Snapdragon 8 Gen 3 SoC to run within a 33ms frame budget.
question: What is the advertised peak theoretical INT8 compute capacity of the Hexagon NPU for roofline modeling?
details:
  realistic_solution: 'The theoretical INT8 peak for the Hexagon NPU on the Snapdragon 8 Gen 3 is 45 TOPS. Recalling the exact accelerator capability is mandatory for constructing an accurate Roofline model, ensuring optimization strategies accurately distinguish between memory-bound and compute-bound regimes.'
  common_mistake: |
    **The Pitfall:** Stating the combined AI Engine performance instead of isolating the NPU.
    **The Rationale:** Confusing the total SoC TOPS with the Hexagon NPU's specific INT8 capability.
    **The Consequence:** Overestimating system capacity when the CPU and GPU are occupied with other tasks.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Frame budget: 33.3 ms (30 FPS).
       - Hexagon NPU peak: 45 TOPS INT8.
    2. **Calculations:**
       - Theoretical operations per frame: 45 TOPS * 0.0333s = 1.4985 TOPS.
       - Capacity for a 1.5 GOPS model: 1.4985 TOPS / 1.5 GOPS = ~999 inferences per frame.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Feasible.** The theoretical maximum is ~999 inferences per frame, assuming 100% utilization and no memory bottlenecks.
