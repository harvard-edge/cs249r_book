title: Architecting a Pruning Strategy for Hexagon NPU
scenario: You are tasked with designing a sparsification and deployment pipeline for a 2 billion parameter language model running locally on a smartphone powered by the Qualcomm Hexagon NPU (Snapdragon 8 Gen 3). The NPU delivers 45 TOPS of INT8 compute and shares a 12-16 GB LPDDR5X memory pool with the CPU and GPU. The product team requires a 2x inference speedup over a dense INT8 baseline without exceeding a 2% drop in accuracy.
question: How would you architect the end-to-end pruning strategy, detailing your choice of sparsity patterns and how you would align them with the Hexagon architecture to guarantee the speedup?
details:
  realistic_solution: 'A strong L5 design mandates hardware-aware structured or N:M semi-structured (e.g., 2:4) pruning that natively aligns with Hexagon''s tensor block architecture. The pipeline should co-optimize sparsity and quantization by first establishing the sparsity mask using magnitude or gradient methods, followed by Sparse-Quantization-Aware Training (QAT) to recover accuracy. The system must compress the sparse weights in the shared LPDDR5X memory to reduce memory bandwidth pressure, as memory fetch time typically dominates over raw compute on modern mobile NPUs.'
  common_mistake: |
    **The Pitfall:** Proposing unstructured pruning and decoupling pruning from quantization.
    **The Rationale:** Candidates assume theoretical FLOP reductions linearly translate to latency gains, missing the need for hardware-aware tensor patterns.
    **The Consequence:** Negligible on-device speedup and catastrophic accuracy degradation when applied independently.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: 2B parameters. INT8.
    - NPU Compute: 45 TOPS. Target speedup: 2x.
    - Target generation: 20 tokens/sec.

    **Calculations:**
    - Dense Bandwidth: 2 GB * 20 = 40 GB/s (taxes LPDDR5X).
    - Compute: ~4 GFLOPs/token * 20 = 0.08 TOPS (well within 45 TOPS).
    - 50% Structured Sparsity: Weights compress to 1 GB.
    - Sparse Bandwidth: 1 GB * 20 = 20 GB/s.

    **Conclusion & Interpretation:**
    - **Result: 20 GB/s (Memory-Bound)**. Bandwidth requirement halves, directly resolving the bottleneck to achieve the 2x speedup.
