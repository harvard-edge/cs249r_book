title: On-Device KV-Cache Budget for Mobile LLM
scenario: You are deploying a 3B-parameter LLM (32 layers, 4 GQA KV heads, head_dim=64)
  on an A17 Pro with 8 GB unified memory. The OS and other apps consume 4 GB, leaving
  4 GB for the model. After loading INT4 weights (1.5 GB) and runtime overhead (0.5
  GB), only 2 GB remains for KV-cache. What is the maximum context length?
question: What KV-cache context length fits a 3B INT4 LLM on A17 Pro when only 2GB
  remains for KV storage?
details:
  realistic_solution: 'KV per token per layer: 2 (K+V) × 4 (KV heads) × 64 (head_dim)
    × 2B (FP16) = 1,024 bytes = 1 KB. Per token across 32 layers: 1 KB × 32 = 32 KB.
    Maximum context: 2 GB / 32 KB = 65,536 tokens. This is generous — the model supports
    ~64K context from a memory perspective. However, practical constraints: (1) Memory
    pressure from iOS/Android can reclaim memory at any time — reserve 25% buffer
    → effective budget 1.5 GB → 48K tokens. (2) Memory bandwidth for attention scales O(n)
    per token. At 64K tokens, reading the 2 GB KV cache plus 1.5 GB of weights takes ~70ms
    per token on a 50 GB/s bus. (3) Practical sweet spot: 4K-8K context (128-256 MB
    KV-cache). This balances memory headroom for OS pressure events with highly responsive
    decode latency. Quantizing KV-cache to INT8 doubles capacity: 64K tokens in 1 GB.'
  common_mistake: Computing KV-cache size with server-scale dimensions. Mobile models
    use smaller head dimensions and fewer KV heads, making the per-token KV cost much
    smaller than cloud models.
  napkin_math: 'KV/token: 32 KB (FP16), 16 KB (INT8). Budget: 2 GB. FP16 max: 64K
    tokens. INT8 max: 128K tokens. Practical limit (latency): 4K-8K tokens. Decode
    latency at 4K: ~33ms/token. At 64K: ~70ms/token.'
