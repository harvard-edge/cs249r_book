title: iOS Preemption Save Bound
scenario: A smartphone background task fine-tunes a model. iOS can preempt background
  tasks with 1 second's notice. The UFS storage writes at 1GB/s.
question: Create a checkpointing policy that guarantees optimizer state preservation
  without exceeding the 1s window for a 150MB model.
visual:
  kind: svg
  path: mobile-1955.svg
  alt: Gantt chart showing preemption signal at t=0, writing phase taking 0.45s, well
    before the 1s limit
  caption: Preemption Window vs Write Time
details:
  realistic_solution: Optimizer state (Adam) is 2x model size = 300MB. Total to save
    = 450MB. At 1GB/s, saving takes 450ms. Since 450ms < 1s, trigger save only on
    the preemption signal to save NAND wear.
  common_mistake: Calculating just the model size (150MB) and forgetting the optimizer
    state takes double the memory.
  napkin_math: 450MB / 1000MB/s = 0.45s < 1s.
