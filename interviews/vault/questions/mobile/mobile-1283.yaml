title: On-Device Drift Detection Alternatives
scenario: We are deploying an on-device personalization model on the Apple A17 Pro. To maintain privacy, data drift detection must happen locally. Option A computes continuous KL divergence over dense activation embeddings (1024-dim, fp16) using the 16-core Neural Engine. Option B tracks summary statistics (mean, variance) and computes a Population Stability Index periodically on the CPU.
question: Which local drift detection approach is optimal for the Apple A17 Pro considering power and memory constraints?
details:
  realistic_solution: Approach B is far superior. Drift detection is a low-frequency, asynchronous task. By tracking running summary statistics, we drastically reduce the memory footprint. The CPU can easily handle lightweight PSI calculations periodically using negligible power. This avoids waking up the Neural Engine and competing for the shared 8 GB unified memory, preserving the ~5W power budget strictly for latency-critical foreground model inference.
  common_mistake: |
    **The Pitfall:** Choosing the Neural Engine approach under the assumption that all ML-related math should run on the accelerator.
    **The Rationale:** Candidates optimize blindly for FLOP throughput, completely ignoring power and memory bandwidth implications.
    **The Consequence:** Destroying battery life by constantly waking up the ANE and saturating the shared 8 GB memory for a background monitoring task.
  napkin_math: |
    1. **Approach A Memory:** 1024-dim fp16 = 2 KB/inference. At 10 inferences/s, buffers $\sim$72 MB/hour of dense state, waking the power-hungry ANE.
    2. **Approach B Memory:** Tracks only mean/variance per dimension. 1024 $\times$ 2 $\times$ 4 bytes (fp32) = 8 KB total state.
    3. **Conclusion:** Approach B completely avoids waking the ANE and requires only **8 KB** of L1 cache, preserving the $\sim$5W budget strictly for primary inference.
