title: Diagnosing Stragglers on Mobile NPU with Telemetry
scenario: You are leading the reliability engineering efforts for an on-device ML application that uses a new object detection model deployed on Samsung Exynos 2400 NPU-powered mobile devices (34.7 TOPS, 12 GB LPDDR5X). The model processes a continuous stream of camera input. Your monitoring dashboards currently show healthy average inference latencies. However, isolated user reports indicate occasional UI freezes and missed detections, suggesting 'straggler' devices where the model's performance degrades intermittently.
question: How would you extend monitoring to find intermittent Exynos 2400 NPU stragglers and reduce MTTR?
details:
  realistic_solution: Implement a distributed tracing system on the device to capture NPU inference times, pre/post-processing latencies, and NPU utilization statistics. Augment this with device-level metrics for temperature, battery state, and memory pressure. Use a robust anomaly detection system (e.g., a time-series based algorithm detecting deviations from baseline per-device performance) to flag stragglers. Build production health dashboards that allow drilling down from fleet-wide aggregates to individual device performance, enabling rapid identification of affected devices and root cause analysis. Define clear SLOs for tail latency (e.g., p99 latency) and alert on breaches. Establish automated runbooks to collect more verbose logs or NPU performance profiles from identified stragglers.
  common_mistake: |
    **The Pitfall:** Relying solely on fleet-wide aggregate metrics like average latency.
    **The Rationale:** Averages can mask localized performance degradation on edge devices, especially those suffering from thermal throttling or memory pressure.
    **The Consequence:** Missing intermittent issues that severely impact the user experience for a subset of devices, leading to longer MTTR.
  napkin_math: |
    1. Max inferences/sec: 34.7 TOPS (34,700 GOPS) / 200 GOPS/inference = 173.5 inferences/second.
    2. Straggling devices: 100,000,000 devices * 0.05% = 50,000 devices.
    3. Total downtime: 50,000 devices * 5 minutes = **250,000 device-minutes**.
