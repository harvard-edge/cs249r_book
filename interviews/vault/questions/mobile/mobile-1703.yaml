title: Diagnosing Stragglers on Mobile NPU with Telemetry
scenario: You are managing telemetry for an on-device ML camera app. Dashboards show healthy average latencies, but user reports indicate intermittent UI freezes and missed detections, suggesting 'straggler' devices where performance severely degrades.
question: How would you extend monitoring to find intermittent NPU stragglers and reduce MTTR?
details:
  realistic_solution: |
    Implement a distributed on-device tracing system that captures exact NPU inference times, OS scheduling delays, and hardware states (temperature, battery voltage, and memory pressure). Average metrics inherently hide tail latency events. Crucially, apply a localized anomaly detection heuristic directly on the device—flagging whenever a single frame's latency deviates dramatically from that specific device's own baseline. Forward only these isolated p99 "straggler" traces to the cloud dashboard. This creates a high-signal observability pipeline that exposes exactly when and why thermal throttling or OS background tasks are starving the NPU.
  common_mistake: |
    **The Pitfall:** Relying solely on fleet-wide aggregate metrics (like average or median latency) for mobile deployments.
    **The Rationale:** Averages violently mask localized performance degradation events on edge devices, especially those suffering from sudden thermal spikes or LPDDR memory contention.
    **The Consequence:** Completely missing intermittent issues that severely brick the app for a huge subset of users, leading to long MTTR and plummeting store ratings.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Fleet Size: 100,000,000 active devices.
       - Straggler Rate: 0.05% of devices entering thermal throttling at any given time.
       - Degradation Duration: 5 minutes of severe jank per event.
    2. **Calculations:**
       - Affected devices: 100,000,000 * 0.0005 = 50,000 devices throttling simultaneously.
       - Cumulative user impact: 50,000 devices * 5 minutes = 250,000 minutes of failure.
    3. **Conclusion & Interpretation:**
       **Result: 250,000 minutes of UI failure hidden by averages (Observability-Bound).** Fleet-wide average metrics systematically obscure catastrophic edge failure events, mandating p99 anomaly tracing.
