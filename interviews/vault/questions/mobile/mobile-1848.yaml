title: 'DPO for Mobile On-Device Alignment: Feasibility Analysis'
scenario: A mobile assistant team wants to run DPO-style alignment fine-tuning on-device
  on Snapdragon 8 Gen 3 (8 GB RAM). Evaluate whether DPO or PPO is feasible and calculate
  the minimum memory requirements.
question: How would you evaluate whether DPO or PPO is feasible and calculate the
  minimum memory requirements?
details:
  realistic_solution: 'DPO requires only 2 models (policy + frozen reference). For
    1B model INT4 (0.5 GB each): 2 × 0.5 GB = 1.0 GB for models + ~0.5 GB activations +
    ~6 MB Adam states for LoRA adapters = ~1.5 GB total. Snapdragon 8 Gen 3 has 8 GB
    LPDDR5X — DPO with LoRA fine-tuning of a 1B model is highly feasible. PPO would require
    4 model instances. Even with INT4 bases, the optimizer states, activations for 4 models,
    and large rollout buffers push memory usage to ~4.5+ GB, which risks OS-level OOM
    kills on an 8 GB device where 3-4 GB are reserved for the system.'
  common_mistake: Assuming PPO is highly feasible on mobile. PPO requires 4 model instances
    plus large rollout buffers, making it extremely difficult to fit within mobile RAM
    constraints without aggressive OOM risks.
  napkin_math: '1B INT4 policy: 0.5 GB. 1B INT4 reference (frozen, no optimizer):
    0.5 GB. Rank-4 LoRA Adam states: 6 MB. Activations (batch=1, seq=512): 500 MB.
    Rollout buffer: 0 (DPO is offline). Total DPO: 1.5 GB — feasible. PPO: 4 × 0.5
    GB models + ~1 GB optimizer/activations + ~1.5 GB rollout = ~4.5 GB — highly risky
    due to Android jetsam/OOM limits on an 8 GB device.'
