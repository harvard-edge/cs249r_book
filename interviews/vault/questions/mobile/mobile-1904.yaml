title: TTS Chunk Queue Wait
scenario: A text-to-speech task queues user input chunks. The Apple A17 processes
  chunks in 20ms, and inputs arrive according to a Poisson process at 40 chunks/second.
question: Calculate the expected wait time in the queue for a new text chunk using
  M/M/1 formulas.
visual:
  kind: svg
  path: mobile-1904.svg
  alt: Plot showing wait time rapidly increasing as arrival rate approaches service
    rate.
  caption: Wait Time vs Arrival Rate
details:
  realistic_solution: Service rate (mu) is 50 chunks/sec. Arrival rate (lambda) is
    40. Utilization (rho) = 40/50 = 0.8. Wait time in queue Wq = rho / (mu - lambda)
    = 0.8 / (50 - 40) = 0.08 seconds or 80ms.
  common_mistake: Calculating total time in system (W = 1/(mu-lambda) = 100ms) instead
    of just the wait time in the queue.
  napkin_math: 0.8 / (50 - 40) = 0.08 s
