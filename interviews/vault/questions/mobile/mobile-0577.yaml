title: The On-Device Speech Recognition
scenario: You're adding on-device speech recognition to a messaging app on an iPhone 16 Pro. You benchmark Whisper-tiny (39M params, FP16) and find it takes 180ms to transcribe 1 second of audio on the ANE, but 950ms on the CPU. The real-time factor (RTF) must be below 1.0 for streaming.
question: How would you calculate the RTF for each, and explain why Whisper's architecture fundamentally conflicts with streaming ASR even when the RTF is acceptable?
details:
  realistic_solution: 'RTF = processing time / audio duration. ANE: 180ms / 1000ms = **0.18 RTF** (5.6× real-time). CPU: 950ms / 1000ms = **0.95 RTF** (barely real-time). The ANE path seems great, but Whisper has a fundamental architectural problem for streaming: it requires processing audio in fixed 30-second chunks.'
  common_mistake: |
    **The Pitfall:** Concluding that an RTF < 1.0 means the model is suitable for live streaming.
    **The Rationale:** Candidates calculate that Whisper processes audio faster than real-time but ignore the model's required input chunk size (30s).
    **The Consequence:** A model with an acceptable RTF still exhibits a massive 30-second latency, ruining the user experience.
  napkin_math: |
    1. ANE Whisper RTF: 180ms compute / 1000ms audio = 0.18 RTF.
    2. Whisper constraint: Requires 30s minimum audio input.
    3. Whisper Latency: 30s * 0.18 = 5.4s compute. User waits 30 seconds to get the first result.
    4. Conformer-Transducer: 4ms compute / 80ms audio frame = 0.05 RTF.
    5. **Conclusion: Conformer provides a 200ms user-perceived latency, while Whisper forces a 30s delay.**
