title: Designing Structured Sparsity for NPU Deployment
scenario: You are tasked with deploying a 3 billion parameter transformer on a mobile
  device powered by the Qualcomm Hexagon NPU (Snapdragon 8 Gen 3). The device features
  12 GB of shared LPDDR5X RAM, but system constraints leave only 4 GB available for
  your model's weights and activations. The NPU provides 45 TOPS of INT8 compute.
  Design a pruning and sparsity architecture to fit this model within memory limits
  while maximizing NPU throughput and maintaining task accuracy.
question: How would you design a pruning and sparsity architecture to fit this model
  within memory limits while maximizing NPU throughput and maintaining task accuracy?
details:
  realistic_solution: The optimal design pairs hardware-aligned structured pruning
    (such as block sparsity or 2:4 sparsity) with INT8 quantization-aware training
    (QAT). Quantization immediately reduces the parameter footprint to fit the budget.
    Applying 50% structured sparsity allows the NPU's tensor cores to skip zero-blocks
    at the hardware level, significantly reducing compute cycles and maximizing the
    shared LPDDR5X memory bandwidth utilization during inference.
  common_mistake: Candidates often propose unstructured pruning to reach the memory
    target, incorrectly assuming it yields linear latency improvements. They fail
    to recognize that the Hexagon NPU tensor accelerators rely on dense matrix operations
    or specific hardware-aligned structured sparsity to achieve actual acceleration
    and avoid sparse-matrix memory lookup overhead.
  napkin_math: '3B parameters at FP16 = 6 GB. INT8 quantization reduces weights to
    3 GB (fitting the 4 GB RAM budget). A standard forward pass requires ~60 GOPS/token.
    With 50% structured sparsity, compute drops to 30 GOPS/token. Given the Hexagon
    NPU''s 45 TOPS INT8 capacity, theoretical compute-bound throughput is (45 * 10^12)
    / (30 * 10^9) = 1500 tokens/sec. However, LPDDR5X bandwidth (typically ~68 GB/s)
    bottlenecks this: streaming 1.5 GB of compressed sparse weights takes 1.5 / 68
    = 0.022s per token, capping realistic throughput at ~45 tokens/sec.'
