title: The Native Bridge Array Copy
scenario: You build a React Native app that runs an image classification model. The ML model takes 10ms.
  You pass the base64 encoded image string from JavaScript to the native iOS/Android module over the React
  Native bridge. The total frame processing time spikes to 60ms. Why is the bridge so slow, and how do
  you bypass it for high-frequency video?
details:
  realistic_solution: 'The React Native bridge serializes data as JSON strings. A 1080p image (6 MB raw)
    becomes ~8 MB base64-encoded, and this string must be serialized in JavaScript, copied across the
    bridge via IPC, then deserialized in native code. This serialization + copy takes 40-50ms, dwarfing
    the 10ms model inference. Fix: bypass the bridge entirely using JSI (JavaScript Interface) with shared
    memory, or use react-native-vision-camera which keeps pixel buffers in native memory and runs ML frame
    processors without crossing the bridge. This drops overhead from 50ms to <1ms.'
  common_mistake: '"Base64 encoding is slow." Encoding is slow, but the primary bottleneck is the cross-context
    memory copying and serialization.'
  napkin_math: 1080p image = 6 MB raw. Base64 encoded = 8 MB string. Serializing and copying an 8 MB string
    across a bridge takes ~40-50ms on a mobile CPU. The IPC overhead is 5x more expensive than the neural
    network.
