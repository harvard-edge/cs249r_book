title: The Native Bridge Array Copy
scenario: You build a React Native app that runs an image classification model. The ML model takes 10ms. You pass the base64 encoded image string from JavaScript to the native iOS/Android module over the React Native bridge. The total frame processing time spikes to 60ms.
question: Why does passing an image over the React Native bridge add 50ms, and how can it be bypassed for video?
details:
  realistic_solution: 'The React Native bridge serializes data as JSON strings. A 1080p image (6 MB raw) becomes ~8 MB base64-encoded, and this string must be serialized in JavaScript, copied across the bridge via IPC, then deserialized in native code. This serialization + copy takes 40-50ms, dwarfing the 10ms model inference. Fix: bypass the bridge entirely using JSI (JavaScript Interface) with shared memory, or use react-native-vision-camera which keeps pixel buffers in native memory and runs ML frame processors without crossing the bridge. This drops overhead from 50ms to <1ms.'
  common_mistake: |
    **The Pitfall:** Assuming base64 encoding itself is the primary bottleneck.
    **The Rationale:** While encoding takes time, developers miss that the actual cross-context memory copying and JSON string serialization across the bridge dominates the delay.
    **The Consequence:** Trying to optimize encoding logic instead of bypassing the bridge entirely using JSI (JavaScript Interface) or native frame processors.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Raw Image Size: A 1080p image is ~6 MB raw.
       - Base64 encoding inflates size by ~33%.
       - Mobile CPU IPC copy/serialization speed ~160-200 MB/s.
    2. **Calculations:**
       - Base64 Encoded Size: 6 MB * 1.33 ≈ 8 MB.
       - Serialization/IPC Cost: 8 MB string transfer takes ~40-50ms.
    3. **Conclusion & Interpretation:** The cross-context IPC overhead is **5x more expensive** than the 10ms neural network inference. The pipeline is strictly **I/O-Bound**.
