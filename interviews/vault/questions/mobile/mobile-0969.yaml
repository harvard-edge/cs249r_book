title: 'MLOps Lifecycle: Compare App Store vs. Dynamic Model Updates for iOS ML Apps'
scenario: 'An iOS app team uses a 50MB CoreML model (A17 Pro, 35 TOPS). Two strategies:
  (A) bundle model in app (App Store update, 1-2 week review cycle, affects all iOS
  users) vs. (B) dynamic model download post-install (instant update, but requires
  network, Apple restrictions apply). Evaluate latency-to-deploy, compliance risk,
  user experience, and bandwidth cost at 10M installs.'
question: How would you evaluate latency-to-deploy, compliance risk, user experience,
  and bandwidth cost at 10M installs?
details:
  realistic_solution: '(A) App Store: 1-2 weeks latency to deploy, zero compliance risk (Apple reviews it), 50MB downloaded by 10M users = 500TB bandwidth paid by Apple. (B) Dynamic: instant deployment, high compliance risk (must strictly only download weights, not executable code), 500TB bandwidth paid by your own infrastructure. User experience: dynamic allows A/B testing and fast rollbacks without user action.'
  common_mistake: 'Assuming Apple allows arbitrary dynamic code/model downloads without restrictions; Apple guidelines prohibit downloading code that changes app behavior, but downloading ML model weights (data files) is permitted if done correctly via Core ML model assets.'
  napkin_math: 'Bandwidth cost at 10M installs: 10,000,000 * 50MB = 500,000,000 MB = 500 TB. App Store update: Apple bears the CDN cost. Dynamic update: You pay AWS/CloudFront ~$0.08/GB. 500 TB * 1000 GB/TB * $0.08 = $40,000 per model update.'
