title: 'Model Size Estimation: Master Full On-Device LLM Memory Audit for Production iOS App'
scenario: Perform a complete on-device memory audit for a production iOS app running a 1B-parameter INT4 LLM for real-time conversation. Account for a multi-turn context (10 turns x 512 tokens each).
question: How would you verify the system stays under the 5GB practical ceiling?
details:
  realistic_solution: Execute a meticulous byte-level audit mapped against the strict 5GB iOS Jetsam ceiling. Standard overhead (CoreML, Swift heap, metadata) creates an unavoidable ~600MB floor. While the 1B INT4 base model occupies a static 500MB, the mathematically critical variable is the dynamically inflating FP16 KV-cache. The architect must verify that at the extreme long-tail of a conversational session, the cumulative token buildup strictly aborts or truncates before crossing the 5GB high-water mark.
  common_mistake: |
    **The Pitfall:** Statistically analyzing a long multi-turn conversation as independent chunks of identical memory cost.
    **The Rationale:** Engineers completely fail to model the mathematically cumulative, ever-expanding nature of the autoregressive KV-cache.
    **The Consequence:** The system validates correctly under short tests but consistently crashes via fatal OS Out-Of-Memory (OOM) triggers deep into real-world conversational user flows.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Strict App Memory Ceiling: 5.0 GB.
       - Model Footprint (1B INT4): 500 MB.
       - Fixed Overhead: 600 MB (Metal + Metadata + Heap + Activations).
       - KV Cache (FP16): 32 layers, 32 heads, 64 dim (262 KB/token).
    2. **Calculations:**
       - Target tokens (10 turns * 512 tokens): 5,120 tokens.
       - KV Cache memory: 5,120 * 262 KB = 1.34 GB.
       - Total Audit Footprint: 500 MB + 600 MB + 1.34 GB = 2.44 GB.
       - 20 Turns (10,240 tokens): Total RAM = 3.78 GB.
       - 30 Turns (15,360 tokens): Total RAM = 5.12 GB.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound.** The 10-turn target (2.44 GB) sits safely below the 5.0 GB limit. However, the dynamically expanding KV cache mathematically guarantees a fatal OS OOM kill around the 30th conversational turn.
