title: 'Model Size Estimation: Master Full On-Device LLM Memory Audit for Production
  iOS App'
scenario: 'Perform a complete on-device memory audit for a production iOS app (A17
  Pro, 8GB) running a 1B-parameter INT4 LLM for real-time conversation. Account for:
  iOS memory ceiling for apps (~5GB practical), model weights, KV-cache with multi-turn
  context (10 turns × 512 tokens each = 5120 tokens), tokenizer and model metadata,
  CoreML framework overhead, and application heap. Verify the system stays under the
  5GB practical ceiling.'
question: How would you verify the system stays under the 5GB practical ceiling?
details:
  realistic_solution: 'iOS practical ceiling: 5GB (above this, OS sends memory warnings
    and may kill app). iOS Metal/NE framework: 200MB. CoreML model: 500MB (INT4 1B).
    Model metadata (tokenizer, vocab, config): 50MB. App heap (SwiftUI, networking,
    audio): 300MB. KV-cache (5120 tokens, 32 layers, 32 heads, 64 dim): 5120×262KB=1.34GB
    (FP16). Current turn activation buffer: ~50MB. Total: 200+500+50+300+1340+50=2,440MB
    = 2.38GB. Under 5GB ceiling ✓ with 2.6GB headroom.'
  common_mistake: Assuming a 10-turn conversation uses 10×512=5120 tokens uniformly;
    in practice, the KV-cache grows cumulatively as context accumulates, requiring
    the full 5120 tokens at turn 10.
  napkin_math: 'INT4 1B: 500MB. KV (5120 tokens): 5120×262KB=1,341MB=1.34GB. iOS Metal:
    200MB. App: 300MB. Metadata: 50MB. Activations: 50MB. Total: 2,440MB of 5,000MB
    practical ceiling = 48.8%. Safe. At 20 turns (10K tokens): KV = 10240×262KB=2.68GB.
    Total: 3.78GB = 75.5%. Still safe but approaching limit. At 30 turns (15K tokens):
    KV=3.93GB. Total=5.03GB — would exceed ceiling.'
