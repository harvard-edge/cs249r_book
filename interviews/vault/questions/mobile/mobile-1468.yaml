title: Hardware-Based Model Extraction via TPU
scenario: You are deploying an optimized Gemini Nano model on the Google Tensor G3,
  utilizing its 12 GB LPDDR5X memory and on-device TPU. A security researcher warns
  that an attacker with physical access could monitor the power consumption and electromagnetic
  emissions of the TPU while it performs its 7.5 TOPS of compute to infer the proprietary
  model's weights. What is the specific term for this class of hardware-based security
  attack?
question: What is the specific term for this class of hardware-based security attack?
details:
  realistic_solution: The correct answer is a Side-Channel Attack (specifically, a
    power analysis or electromagnetic analysis side-channel attack). This attack relies
    on the physical implementation and hardware characteristics of the Google Tensor
    G3 rather than vulnerabilities in the model's software logic.
  common_mistake: Candidates frequently confuse this with software-level model extraction
    attacks, where the model is simply queried via an API to steal its behavior. They
    might also mistakenly refer to it as prompt injection or adversarial evasion.
  napkin_math: The Google Tensor G3's TPU provides 7.5 TOPS. If a side-channel attack
    requires analyzing power traces for 100 million operations to extract a partial
    weight vector, the attacker must capture high-resolution oscilloscope data for
    (100 * 10^6 operations) / (7.5 * 10^12 operations/second) = 0.0133 milliseconds
    of continuous TPU execution.
