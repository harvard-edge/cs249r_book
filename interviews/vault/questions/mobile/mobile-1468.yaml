title: Hardware-Based Model Extraction via TPU
scenario: You are deploying an optimized Gemini Nano model on the Google Tensor G3. A security researcher warns that an attacker with physical access could monitor the power consumption and electromagnetic emissions of the TPU while it performs inference to infer the proprietary model's weights.
question: What is the specific term for this class of hardware-based security attack?
details:
  realistic_solution: 'The correct answer is a Side-Channel Attack (specifically, a power analysis or electromagnetic analysis side-channel attack). This attack relies on the physical implementation and hardware characteristics of the Google Tensor G3 rather than vulnerabilities in the model''s software logic.'
  common_mistake: |
    **The Pitfall:** Confusing physical side-channel attacks with software-level model extraction.
    **The Rationale:** Candidates are more familiar with API-based extraction, prompt injection, or adversarial evasion.
    **The Consequence:** Recommending software defenses (like rate limiting) against an attack that targets physical hardware emissions.
  napkin_math: |
    **Assumptions & Constraints:**
    - The TPU performs 7.5 TOPS (7.5 x 10^12 ops/sec).
    - An attack requires analyzing power traces for 100 million operations (10^8 ops) to extract a partial weight vector.

    **Calculations:**
    - Time required = (10^8 ops) / (7.5 x 10^12 ops/sec) = 0.0000133 seconds.

    **Conclusion & Interpretation:**
    - **Result: 0.0133 milliseconds (Physical Exposure-Bound)**. The attacker only needs to capture 0.0133 milliseconds of continuous high-resolution oscilloscope data.
