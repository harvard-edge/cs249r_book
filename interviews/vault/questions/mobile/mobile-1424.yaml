title: Optimizing On-Device Toxicity Guardrails for Gemini Nano
scenario: You are deploying an on-device generative AI chat feature powered by Gemini Nano on the Google Tensor G3. To adhere to Responsible AI policies, all generated text must be evaluated by an on-device toxicity guardrail model before display. The current unoptimized 110M parameter guardrail runs sequentially after every sentence is generated, causing severe stuttering and failing the 200ms time-to-display budget.
question: How do you diagnose the guardrail bottleneck and quantify an optimized execution strategy on the Tensor G3's 7.5 TOPS TPU and 12 GB LPDDR5X memory?
details:
  realistic_solution: The optimal approach is to distill the guardrail into a sub-10M parameter model, quantize it to INT8, and pipeline its execution on the TPU concurrently with the LLM's token generation. Since the Tensor G3 has ample memory bandwidth (LPDDR5X) and 7.5 TOPS, the smaller guardrail can evaluate chunks of tokens asynchronously, hiding its latency entirely behind the generative process.
  common_mistake: |
    **The Pitfall:** Suggesting offloading the safety check to the cloud or applying extreme quantization without architectural changes.
    **The Rationale:** Candidates often default to cloud offloading to save compute, ignoring strict on-device privacy requirements.
    **The Consequence:** Breaking product requirements or failing to address the fundamental sequential execution bottleneck.
  napkin_math: |
    - Original 110M FP16 model: ~220 MB memory, ~22 GOps per inference.
    - Compute time on 7.5 TOPS TPU: ~3ms (22 / 7500), but dominates memory bandwidth while sequential.
    - Distilled INT8 5M model: ~5 MB memory, 1 GOp.
    - Compute time for 5M INT8 on 7.5 TOPS TPU: ~0.13ms (1 / 7500).
    - Gemini Nano generation time: ~15ms/token.
    - **The 0.13ms guardrail can be pipelined concurrently, effectively zeroing out the latency overhead.**
