title: Optimizing On-Device Toxicity Guardrails for Gemini Nano
scenario: You are deploying an on-device generative AI chat feature. To adhere to Responsible AI policies, all generated text must be evaluated by an on-device toxicity guardrail model before display. The current unoptimized 110M parameter guardrail runs sequentially after every sentence is generated, causing severe stuttering and failing the 200ms time-to-display budget.
question: How do you diagnose the guardrail bottleneck and quantify an optimized execution strategy on a mobile TPU?
details:
  realistic_solution: The optimal approach is to distill the guardrail into a sub-10M parameter model, quantize it to INT8, and pipeline its execution on the TPU concurrently with the LLM's token generation. Since the mobile TPU has ample memory bandwidth and high TOPS, the smaller guardrail can evaluate chunks of tokens asynchronously, hiding its latency entirely behind the generative process.
  common_mistake: |
    **The Pitfall:** Suggesting offloading the safety check to the cloud or applying extreme quantization without architectural changes.
    **The Rationale:** Candidates often default to cloud offloading to save compute, ignoring strict on-device privacy requirements.
    **The Consequence:** Breaking product requirements or failing to address the fundamental sequential execution bottleneck.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Original 110M FP16 model: ~220 MB memory, ~22 GOps.
       - Distilled INT8 5M model: ~5 MB memory, 1 GOp.
       - TPU Compute: 7.5 TOPS.
       - Gemini Nano generation: ~15ms/token.
    2. **Calculations:**
       - Compute time (110M): 22 / 7500 = ~3ms (dominates memory bandwidth sequentially).
       - Compute time (5M): 1 / 7500 = ~0.13ms.
    3. **Conclusion & Interpretation:**
       - **The 0.13ms guardrail can be pipelined concurrently, effectively zeroing out the latency overhead. (Result: Compute-Bound avoided via Pipelining)**
