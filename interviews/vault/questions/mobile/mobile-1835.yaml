title: Implementing memory-efficient backprop for on-device RL on A17 Pro
scenario: You are implementing a mobile game AI that uses PPO (Proximal Policy Optimization)
  on an A17 Pro (35 TOPS, 8GB). The policy network (500K params) updates after every
  64 environment steps. PPO requires computing the ratio of new to old policy probabilities,
  which involves running the forward pass twice with different weights. This OOMs
  on A17 Pro.
question: How would you compute PPO old-policy ratios on A17 Pro without keeping two
  full autograd graphs in memory?
details:
  realistic_solution: 'For PPO ratio computation, the old policy probabilities are
    constants (no gradient needed): compute old_log_probs with torch.no_grad() before
    the update, store the scalar log probabilities (64 floats = 256 bytes), then discard
    the old policy graph. Only the new policy forward pass needs the computational
    graph. For 500K params at batch=64: new policy activations ≈ 50MB — fits easily
    in 8GB.'
  common_mistake: 'Storing the full policy network weights twice (current and old)
    and running both forward passes with autograd enabled. With 500K params: 2 × 500K
    × 4 bytes = 4MB for weights, but the computational graph for 64 steps × 2 policies
    with observation size 64×84×84 overflows 8GB.'
  napkin_math: 'Policy network (500K params, CNN for Atari): input 64×84×84×4 = 1.8MB
    per batch. Activations for forward pass: ~10MB. With autograd: ~10MB stored for
    backward. Old policy (no_grad): 0MB graph, just store 64 log_prob scalars = 256
    bytes. Total PPO memory: 10MB (current graph) + 2MB (params×2) + 256 bytes (old
    log probs) = ~12MB. A17 Pro has 8GB — 12MB is trivial.'
