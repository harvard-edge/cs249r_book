title: 'Dataset Curation: Evaluate On-Device vs Cloud Data Curation for Mobile ML'
scenario: 'You are deciding between two approaches for curating training data for a photo enhancement model on an iPhone 15 Pro: (A) on-device: user selects ''good'' photos, model trains locally; (B) cloud: upload 1,000 photos, human curators label quality, download curated dataset.'
question: Should photo-enhancement data curation run on-device or in the cloud for privacy, latency, label quality, and cost?
details:
  realistic_solution: On-device implicit curation is mandatory for high-res personal imaging. It provides complete privacy, zero upload latency, and zero marginal cost per user. The labels are implicit (user kept/deleted) and inherently biased toward user preference, which perfectly aligns with personal photo enhancement. Cloud-based expert labeling incurs massive bandwidth, storage, and annotation costs, scaling linearly with the user base while presenting an unacceptably severe privacy risk.
  common_mistake: |
    **The Pitfall:** Assuming cloud curation is strictly superior because it produces clean, explicit "expert" human annotations.
    **The Rationale:** Data scientists default to traditional centralized data collection pipelines.
    **The Consequence:** A massively expensive ($50M+), privacy-invasive architecture that destroys the user experience via multi-gigabyte uploads over cellular/WiFi.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Target images per user: 1,000.
       - Image size: 5 MB each.
       - Cloud labeling cost: $0.05 per image.
       - Cloud storage cost: $0.45 per user.
    2. **Calculations:**
       - Cloud upload bandwidth: 1,000 * 5 MB = 5 GB per user.
       - Cloud cost: (1,000 * $0.05) + $0.45 = $50.45 per user.
       - Total cloud cost for 1M users: $50.45M.
       - On-device cost and bandwidth: $0, 0 GB.
    3. **Conclusion & Interpretation:**
       - **Result: Bandwidth and Cost-Bound.** The sheer volume of raw high-res image data makes centralized cloud curation financially ruinous and privacy-invasive. On-device implicit curation scales infinitely at zero marginal cost.
