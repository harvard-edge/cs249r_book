title: 'Dataset Curation: Evaluate On-Device vs Cloud Data Curation for Mobile ML'
scenario: 'You are deciding between two approaches for curating training data for
  a photo enhancement model on A17 Pro (35 TOPS Neural Engine, 8GB RAM): (A) on-device:
  user selects ''good'' photos, model trains locally; (B) cloud: upload 1,000 photos,
  human curators label quality, download curated dataset. Evaluate on privacy, latency,
  label quality, and cost.'
question: Should A17 Pro photo-enhancement data curation run on-device or in the cloud
  for privacy, latency, label quality, and cost?
details:
  realistic_solution: 'On-device: privacy-preserving, zero upload cost, but labels
    are implicit (user kept/deleted), biased toward user preference not aesthetic
    quality. Cloud: expert labels, better quality, but $0.05/label × 1000 = $50/user,
    privacy risk, 24h latency. Hybrid: on-device pre-filter + upload only edge cases.'
  common_mistake: Assuming cloud curation always produces higher quality labels; not
    accounting for privacy implications of photo upload.
  napkin_math: 'Cloud approach: 1,000 photos × 5MB avg = 5GB upload per user. At home
    WiFi 100Mbps: 400 seconds = 6.7 minutes. Cost: $50 labeling + $0.45 storage/year
    per user. At 1M users: $50M labeling cost — infeasible. On-device: zero marginal
    cost per user. Label quality comparison: user selection precision ~70% (subjective),
    expert labels ~95% agreement. Hybrid: on-device filter to 200 images, upload 200
    × 5MB = 1GB, cost $10/user. At 1M users = $10M — still large. Best: on-device
    implicit feedback (swipe left/right) as labels, zero cost.'
