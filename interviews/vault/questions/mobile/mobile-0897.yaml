title: 'Dataset Curation: Evaluate On-Device vs Cloud Data Curation for Mobile ML'
scenario: You are deciding between two approaches for curating training data for a photo enhancement model on A17 Pro (35 TOPS Neural Engine, 8GB RAM): (A) on-device: user selects 'good' photos, model trains locally; (B) cloud: upload 1,000 photos, human curators label quality, download curated dataset.
question: Should A17 Pro photo-enhancement data curation run on-device or in the cloud for privacy, latency, label quality, and cost?
details:
  realistic_solution: 'On-device: privacy-preserving, zero upload cost, but labels are implicit (user kept/deleted), biased toward user preference not aesthetic quality. Cloud: expert labels, better quality, but $0.05/label × 1000 = $50/user, privacy risk, 24h latency. Hybrid: on-device pre-filter + upload only edge cases.'
  common_mistake: |
    **The Pitfall:** Assuming cloud curation is strictly superior because it produces "higher quality" expert labels.
    **The Rationale:** Data scientists prefer clean, explicit human-annotated datasets.
    **The Consequence:** A massively expensive ($50M+), privacy-invasive architecture that ruins the user experience via huge 5GB uploads over cellular/WiFi.
  napkin_math: |
    1. **Cloud Cost & Latency:** 1,000 photos * 5MB = 5GB upload per user. Cost is $50 labeling + $0.45 storage per user. For 1M users, this is >$50M and highly invasive.
    2. **On-Device Cost:** Zero marginal cost, complete privacy. Labels are implicit (user swipes/keeps).
    3. **Hybrid Approach:** Run on-device filtering to reduce 1,000 to 50 edge cases, uploading only 250MB.
    **On-device implicit feedback ensures complete privacy, zero upload latency, and scales infinitely at zero cost, sacrificing only explicit expert labeling.**
