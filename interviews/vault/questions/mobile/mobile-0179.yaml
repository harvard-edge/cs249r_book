title: The 7B Parameter Illusion
scenario: The research team is excited about a new 7B parameter language model for on-device search. They
  claim its quality is state-of-the-art. As the mobile ML systems engineer, what is the first number you
  should state to ground the conversation in reality? Specifically, identify the minimum memory footprint
  required just to load this model's weights in FP16.
question: "As the mobile ML systems engineer, what is the first number you should state to ground the conversation in reality?"
details:
  realistic_solution: The minimum memory footprint is ~14 GB. This is calculated by taking the number
    of parameters and multiplying by the size of each parameter in memory. For FP16, each parameter requires
    2 bytes. This size alone makes the model infeasible for any current mobile device, which typically
    has a total RAM of 8-16 GB and a strict per-app memory budget of only 2-4 GB.
  common_mistake: Engineers accustomed to cloud resources often underestimate the strictness of mobile
    memory budgets. They may believe a large model can be made to fit through clever swapping or quantization,
    without first realizing that the raw weight size alone makes it a non-starter, exceeding not just
    the typical app budget but often the total RAM of the entire device.
  napkin_math: 7 Billion Parameters × 2 Bytes/Parameter (FP16) = 14 Billion Bytes = 14 GB. This is far
    greater than a typical 2-4 GB mobile app memory budget, making it an instant non-starter.
  options:
  - ~7 GB
  - ~28 GB
  - ~14 GB
  - ~2 GB
  correct_index: 2
