title: The 7B Parameter Illusion
scenario: The research team is excited about a new 7B parameter language model for on-device search. They claim its quality is state-of-the-art.
question: As the mobile ML systems engineer, what minimum FP16 memory footprint should you cite to ground the conversation?
details:
  realistic_solution: The minimum memory footprint is ~14 GB. This is calculated by taking the number of parameters and multiplying by the size of each parameter in memory. For FP16, each parameter requires 2 bytes. This size alone makes the model infeasible for any current mobile device, which typically has a total RAM of 8-16 GB and a strict per-app memory budget of only 2-4 GB.
  common_mistake: |
    **The Pitfall:** Underestimating the strictness of mobile memory budgets.
    **The Rationale:** Engineers accustomed to cloud resources often focus on raw parameter counts and assume large models can be squeezed in through swapping or quantization, forgetting the base precision footprint.
    **The Consequence:** Proposing models that immediately exceed the entire device's physical RAM, leading to instant out-of-memory failures.
  napkin_math: |
    1. Parameters: 7,000,000,000.
    2. FP16 precision: 2 bytes per parameter.
    3. Total Memory: 7,000,000,000 * 2 bytes = 14,000,000,000 bytes.
    4. Conclusion: **14 GB of RAM is required just for weights, far exceeding a typical 2-4 GB mobile app memory budget.**
  options:
  - ~7 GB
  - ~28 GB
  - ~14 GB
  - ~2 GB
  correct_index: 2
