title: Recall Knowledge Distillation Basics for Tensor G3
scenario: You are presenting an optimization strategy for deploying a lightweight
  version of Gemini Nano on the Google Tensor G3. The Google Tensor G3 features an
  on-device TPU capable of 7.5 TOPS and is equipped with 12 GB of LPDDR5X memory.
  As part of the technical overview, you must define the core mechanism of knowledge
  distillation used to compress the model for this hardware.
question: What is knowledge distillation and how does it train a smaller Tensor G3
  student model?
details:
  realistic_solution: Knowledge distillation is an optimization process where a smaller
    'student' model is trained to mimic a larger 'teacher' model. The core mechanism
    involves training the student to match the soft targets (the raw logit outputs
    or probability distribution) of the teacher model, rather than just the hard ground-truth
    labels.
  common_mistake: Candidates frequently confuse knowledge distillation with standard
    transfer learning or pruning. They often state the student model is just trained
    on the same data as the teacher, forgetting the crucial aspect of logit matching.
  napkin_math: 'While primarily a recall question, understanding the hardware capacity
    is key. If the Google Tensor G3 TPU provides 7.5 TOPS (7.5 * 10^12 operations
    per second), a distilled model with a strict 33ms (0.033s) real-time inference
    latency budget can utilize up to: 7.5 * 10^12 ops/s * 0.033 s = 2.475 * 10^11
    operations (247.5 GOPS) per forward pass.'
