title: Snapdragon Segmentation Video Uplink
scenario: A Snapdragon 8 Gen 3 performs live background segmentation on a 1080p camera
  stream at 30 FPS. The device must push the binary segmentation masks to a cloud
  server over a constrained 5 Mbps cellular uplink.
question: Propose an optimization to the binary mask transmission architecture to
  ensure the frame push stays within the 5 Mbps bandwidth limit.
visual:
  kind: svg
  path: mobile-1875.svg
  alt: Graph showing raw segmentation masks passed through an RLE encoder before hitting
    the cellular uplink bottleneck.
  caption: Segmentation Mask Uplink Optimization
details:
  realistic_solution: A raw 1080p binary mask is 1920x1080 bits ≈ 259 KB per frame.
    At 30 FPS, raw transmission requires 7.7 MB/s (62 Mbps), severely exceeding the
    5 Mbps (625 KB/s) uplink. The optimization is to convert the binary masks into
    sparse bounding polygons or use Run-Length Encoding (RLE), capping the per-frame
    payload to 5 Mbps / 30 FPS = 166 Kb (approx 20.8 KB) per frame.
  common_mistake: Relying on standard PNG compression, which is too computationally
    slow for a 30 FPS real-time pipeline compared to spatial RLE or vector contours.
  napkin_math: 5 Mbps = 5000 Kbps; 5000 / 30 = 166.6 Kb per frame = 20.8 KB per frame
    limit.
