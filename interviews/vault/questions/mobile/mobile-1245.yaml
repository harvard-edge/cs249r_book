title: On-Device Multimodal Model Conversion for Hexagon NPU
scenario: You are tasked with deploying a new 2-billion parameter vision-language
  model to flagship Android devices powered by the Qualcomm Hexagon NPU (Snapdragon
  8 Gen 3). The model uses complex custom attention operators that are currently unsupported
  by the standard QNN (Qualcomm Neural Network) delegates. You need to design a model
  conversion and runtime execution strategy that maximizes the 45 TOPS INT8 throughput
  of the NPU while efficiently handling fallback execution for unsupported operators
  without creating bottlenecks across the shared 12-16 GB LPDDR5X memory.
question: How should a Hexagon NPU deployment handle unsupported custom attention
  operators without CPU fallback bottlenecks?
details:
  realistic_solution: The optimal design involves a hybrid execution graph where supported
    subgraphs (like standard MLPs and projections) are converted to INT8 and pinned
    to the Hexagon NPU via the QNN delegate. For the unsupported custom attention
    operators, the candidate should propose either fusing them into supported operations
    during the ONNX/TFLite export phase using custom graph rewrite rules, or delegating
    those specific subgraphs to the GPU (which efficiently shares the LPDDR5X memory
    pool) to minimize serialization overhead and avoid the CPU.
  common_mistake: Candidates often suggest simply falling back to the CPU for unsupported
    operators without considering the severe latency penalty of context switching
    and memory synchronization between the NPU and CPU. They might also propose rewriting
    the entire model architecture, which is usually infeasible, or relying purely
    on the GPU, ignoring the power-efficient 45 TOPS INT8 capacity of the Hexagon
    NPU.
  napkin_math: A 2B parameter model quantized to INT8 requires ~2 GB of memory, fitting
    comfortably in the 12-16 GB LPDDR5X RAM. If an unsupported attention block processes
    a 1024-token sequence (hidden size 2048, FP16 activations) at 30 FPS, bouncing
    execution back to the CPU requires transferring (1024 * 2048 * 2 bytes = ~4.2
    MB) per layer boundary. With 10 unsupported layers, this creates (4.2 MB * 10
    * 30 FPS) = 1.26 GB/s of continuous NPU-CPU transfer overhead. Designing a custom
    NPU operator or keeping the fallback on the GPU eliminates this sync penalty,
    leaving the NPU free to process the bulk of the MACs at its peak 45 TOPS rate.
