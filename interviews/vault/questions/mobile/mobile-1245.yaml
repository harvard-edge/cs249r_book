title: On-Device Multimodal Model Conversion for Hexagon NPU
scenario: You are tasked with deploying a new 2-billion parameter vision-language model to flagship Android devices powered by the Qualcomm Hexagon NPU (Snapdragon 8 Gen 3). The model uses complex custom attention operators that are currently unsupported by the standard QNN (Qualcomm Neural Network) delegates. You need to design a model conversion and runtime execution strategy that maximizes the 45 TOPS INT8 throughput of the NPU while efficiently handling fallback execution for unsupported operators without creating bottlenecks across the shared 12-16 GB LPDDR5X memory.
question: How should a Hexagon NPU deployment handle unsupported custom attention operators without CPU fallback bottlenecks?
details:
  realistic_solution: |
    The optimal design involves a hybrid execution graph where supported subgraphs (like standard MLPs and projections) are converted to INT8 and pinned to the Hexagon NPU via the QNN delegate. For the unsupported custom attention operators, the candidate should propose either fusing them into supported operations during the ONNX/TFLite export phase using custom graph rewrite rules, or delegating those specific subgraphs to the GPU (which efficiently shares the LPDDR5X memory pool) to minimize serialization overhead and avoid the CPU.
  common_mistake: |
    **The Pitfall:** Falling back to the CPU for unsupported custom attention operators.
    **The Rationale:** Defaulting to standard TFLite/ONNX CPU fallback behavior.
    **The Consequence:** A massive 1.26 GB/s memory synchronization penalty that destroys the power-efficient 45 TOPS INT8 capacity of the Hexagon NPU.
  napkin_math: |
    - **Unsupported Transfer:** 1024 tokens * 2048 hidden * 2 bytes = ~4.2 MB per layer boundary.
    - **Transfer Overhead:** 4.2 MB * 10 layers * 30 FPS = **1.26 GB/s** of continuous NPU-CPU sync traffic.
    - **Optimization:** Pinning the fallback to the GPU eliminates this sync penalty across the shared LPDDR5X RAM.
