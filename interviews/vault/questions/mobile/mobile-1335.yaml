title: Shadow Deployment Compute Utilization on Hexagon NPU
scenario: You are preparing a shadow deployment for a new INT8 object detection model (Model B) alongside the current production model (Model A) on a flagship device featuring a Qualcomm Hexagon NPU (Snapdragon 8 Gen 3) with a shared 16 GB LPDDR5X memory pool. Both models must process the same 30 FPS live camera feed simultaneously to compare bounding box outputs without impacting the user experience. Model A requires 0.6 Tera-Operations (TOPs) per frame, while the heavier Model B requires 0.7 TOPs per frame. The NPU has a peak capability of 45 TOPS INT8.
question: "What Hexagon NPU compute utilization results from running Models A and B together at 30 FPS in shadow mode?"
details:
  realistic_solution: In a shadow deployment, both the control (Model A) and variant (Model B) models process the same input stream concurrently. The total compute requirement per frame is the sum of both models' operations. You must multiply this combined per-frame cost by the target frame rate to determine the total required TOPS, and then divide by the total available NPU TOPS to find the expected hardware utilization.
  common_mistake: |
    **The Pitfall:** Calculating utilization based on only one model, or forgetting to multiply by the target frame rate.
    **The Rationale:** Candidates often perform static single-inference profiling and fail to account for the continuous, concurrent nature of a real-time shadow deployment.
    **The Consequence:** Deployment proceeds under the false assumption that the NPU has plenty of headroom, leading to catastrophic frame drops in production.
  napkin_math: |
    - **Compute per Frame:** Model A (0.6 TOPS) + Model B (0.7 TOPS) = **1.3 TOPS per frame**.
    - **Required Throughput:** 1.3 TOPS/frame * 30 FPS = **39 TOPS**.
    - **NPU Capacity:** Hexagon NPU = **45 TOPS**.
    - **Utilization:** (39 TOPS / 45 TOPS) * 100 = **86.67%**.
