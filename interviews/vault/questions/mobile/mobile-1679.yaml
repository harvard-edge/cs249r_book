title: 'Adaptive NLU on Tensor G3: Resource-Aware Graceful Degradation'
scenario: An on-device AI assistant uses an NLU model requiring 5 TOPS and 8 GB of RAM to deliver a 100ms latency. During extended use, thermal throttling drops NPU performance to 3 TOPS and caps memory at 6 GB.
question: How would you design a graceful degradation strategy for the NLU system to maintain critical functionality under dynamic resource constraints?
details:
  realistic_solution: |
    Implement a multi-stage degradation ladder switching to a pre-quantized (INT8) or distilled NLU model that offers slightly reduced accuracy but maintains latency and core functionality.
  common_mistake: |
    **The Pitfall:** Deploying a single, high-fidelity NLU model without fallbacks.
    **The Rationale:** Candidates often focus purely on peak accuracy and ignore the reality of mobile thermal throttling and dynamic OS memory management.
    **The Consequence:** When resources become constrained, the system crashes, freezes, or experiences unacceptable latency, leading to a frustrating user experience.
  napkin_math: |
    **Assumptions & Constraints:**
    - Peak constraints: 5 TOPS, 8 GB RAM, 100ms latency.
    - Throttled constraints: 3 TOPS, 6 GB RAM.

    **Calculations:**
    - Throttled latency (primary model): 5 / 3 = 1.67x multiplier. 100ms * 1.67 = 167ms.
    - Memory violation: 8 GB > 6 GB cap (causes OOM or swap thrashing).

    **Conclusion & Interpretation:**
    - **Result: OOM Hazard.** The primary model exceeds the 6 GB RAM limit under thermal pressure. A pre-quantized 4 GB fallback model is required to prevent system failure.
