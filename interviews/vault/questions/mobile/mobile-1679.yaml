title: 'Adaptive NLU on Tensor G3: Resource-Aware Graceful Degradation'
scenario: An on-device AI assistant utilizes a complex NLU model requiring 5 TOPS and 8 GB of RAM to deliver a 100ms inference latency. During extended use, the system detects a persistent drop in available TPU performance to 3 TOPS and a memory ceiling of 6 GB due to thermal throttling.
question: How would you design a graceful degradation strategy for the NLU system to maintain critical functionality under dynamic resource constraints?
details:
  realistic_solution: Implement a multi-stage degradation ladder switching to a pre-quantized (e.g., INT8) or distilled NLU model that offers slightly reduced accuracy but maintains acceptable latency and core functionality.
  common_mistake: |
    **The Pitfall:** Deploying a single, high-fidelity NLU model without fallbacks.
    **The Rationale:** Candidates often focus purely on peak accuracy and ignore the reality of mobile thermal throttling and dynamic OS memory management.
    **The Consequence:** When resources become constrained, the system crashes, freezes, or experiences unacceptable latency, leading to a frustrating user experience.
  napkin_math: |
    1. Calculate degraded primary latency: At 3 TOPS, the 5 TOPS model slows down by 1.67x (5/3), increasing latency from 100ms to **~167ms**.
    2. Evaluate primary memory fit: The 8 GB model exceeds the 6 GB ceiling, causing thrashing or OOM.
    3. Evaluate fallback memory fit: Switching to a 4 GB quantized fallback model saves 4 GB of RAM, fitting comfortably within the 6 GB limit.
