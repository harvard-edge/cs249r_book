title: The Jank Budget (mobile-0293)
scenario: You're building an AI-powered real-time video filter for a mobile app.
question: "To ensure a smooth, 'jank-free' 60 FPS user experience, what is the maximum per-frame latency budget you must hit for your entire processing pipeline?"
details:
  realistic_solution: The maximum latency budget is 16ms. This is derived directly from the physics of
    display refresh rates. A 60 FPS (Frames Per Second) display refreshes its screen 60 times every second.
    To avoid stutter or 'jank', your application must deliver a new frame before the next refresh cycle
    begins, giving you a strict budget of approximately 16.7 milliseconds.
  common_mistake: |
    **The Pitfall:** Confusing hard real-time and cloud web deadlines with mobile UI refresh rates.
    **The Rationale:** Engineers often assume a 100ms budget is acceptable (standard for web services), or confuse it with the 33ms budget for robotics.
    **The Consequence:** Anything significantly over the frame rendering interval will cause noticeable stuttering and dropped frames.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Target Frame Rate: 60 FPS.
    2. **Calculations:**
       - Frame Budget = 1000 ms / 60 FPS = ~16.67 ms.
    3. **Conclusion & Interpretation:**
       **Result: Latency-Bound. The maximum latency budget per frame is ~16.7 ms to avoid dropped frames and UI jank.**
  options:
  - 100 ms
  - 33 ms
  - 16 ms
  - 1 ms
  correct_index: 2
