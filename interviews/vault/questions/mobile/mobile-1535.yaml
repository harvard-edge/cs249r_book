title: 'Diagnosing OOM on Tensor G3: VRAM Budgeting for Large Models'
scenario: Your team is deploying a new large language model (LLM) to a mobile device
  powered by the Google Tensor G3, which features a 7.5 TOPS on-device TPU and 12
  GB LPDDR5X memory. During inference, you encounter out-of-memory (OOM) errors, preventing
  the model from running successfully. The model has 7 billion parameters, is fine-tuned,
  and uses a standard AdamW optimizer during training (though inference is failing).
  The OOM occurs specifically when processing sequences of length 4096 tokens. Your
  initial profiling shows that the weights themselves fit within 12GB when quantized
  to INT8, but the OOM still persists. Diagnose the most likely culprits for the OOM
  error, considering all major memory components.
question: How would you diagnose the most likely culprits for the OOM error, considering
  all major memory components?
details:
  realistic_solution: "Systematically analyze memory consumption components: \n1.\
    \  **Weights**: Further quantization (e.g., INT4), pruning, knowledge distillation.\
    \ \n2.  **Activations**: Techniques like gradient checkpointing (if training),\
    \ recomputation, or reducing intermediate tensor sizes. For inference, optimizing\
    \ layer-wise computations to minimize peak activation memory. \n3.  **KV-Cache**:\
    \ Quantization of KV-cache (e.g., INT8 KV-cache), KV-cache eviction policies,\
    \ attention mechanisms like multi-query attention (MQA) or grouped-query attention\
    \ (GQA) that significantly reduce KV-cache size, or windowed attention. \n4. \
    \ **Optimizer State**: If on-device fine-tuning is required, use 8-bit optimizers\
    \ or techniques like ZeRO. \nFor inference on Tensor G3 with 12GB LPDDR5X, the\
    \ primary focus for a 7B model should be on optimizing KV-cache and activations.\
    \ Proposing specific quantization for KV-cache (e.g., INT8) and utilizing GQA/MQA\
    \ will be crucial to fit the model."
  common_mistake: Focusing solely on model weights size (even after quantization)
    and neglecting the significant memory consumption of activations, especially for
    long sequence lengths, and the KV-cache in transformer models. Overlooking the
    need for optimizer state if the OOM is during fine-tuning on-device, or confusing
    training memory requirements with inference.
  napkin_math: 'Consider a 7B parameter LLM (e.g., Llama-2-7B-like) and inference
    with sequence length 4096 on the 12GB LPDDR5X of Tensor G3:

    1.  **Model Weights (INT8)**: 7 billion parameters * 1 byte/param = 7 GB.

    2.  **KV-Cache (FP16)**: For a transformer with 32 layers, 32 attention heads,
    128 head dimension, and 4096 sequence length, the KV-cache is approximately `2
    (K+V) * 32 (layers) * 4096 (sequence length) * 32 (heads) * 128 (head_dim) * 2
    (bytes/FP16) = ~2.1 GB`.

    3.  **Activations & Intermediate Tensors (FP16)**: For a complex 7B model processing
    a 4096 sequence, intermediate activations and other temporary buffers can consume
    a significant amount of memory, typically estimated between 2-4 GB. Let''s use
    `3.5 GB` as a reasonable estimate.

    **Total Estimated Memory**: `7 GB (weights) + 2.1 GB (KV-Cache) + 3.5 GB (Activations)
    = 12.6 GB`.

    This total exceeds the 12 GB LPDDR5X available on the Google Tensor G3, explaining
    the observed OOM error.'
