title: 'Diagnosing OOM on Tensor G3: VRAM Budgeting for Large Models'
scenario: Your team is deploying a 7B parameter LLM to a Google Tensor G3 (7.5 TOPS TPU, 12 GB LPDDR5X). You encounter out-of-memory (OOM) errors during inference specifically when processing sequences of length 4096 tokens. Profiling shows the weights fit within 12GB when quantized to INT8, but OOM persists.
question: How would you diagnose the most likely culprits for the OOM error, considering all major memory components?
details:
  realistic_solution: "Systematically analyze memory consumption components: \n1.  **Weights**: Further quantization (e.g., INT4), pruning, knowledge distillation. \n2.  **Activations**: Techniques like gradient checkpointing (if training), recomputation, or reducing intermediate tensor sizes. For inference, optimizing layer-wise computations to minimize peak activation memory. \n3.  **KV-Cache**: Quantization of KV-cache (e.g., INT8 KV-cache), KV-cache eviction policies, attention mechanisms like multi-query attention (MQA) or grouped-query attention (GQA) that significantly reduce KV-cache size, or windowed attention. \n4.  **Optimizer State**: If on-device fine-tuning is required, use 8-bit optimizers or techniques like ZeRO. \nFor inference on Tensor G3 with 12GB LPDDR5X, the primary focus for a 7B model should be on optimizing KV-cache and activations. Proposing specific quantization for KV-cache (e.g., INT8) and utilizing GQA/MQA will be crucial to fit the model."
  common_mistake: |
    **The Pitfall:** Focusing solely on model weights size (even after quantization).
    **The Rationale:** Candidates neglect the massive memory consumption of the KV-cache in transformer models for long sequence lengths.
    **The Consequence:** Failing to diagnose why the model OOMs despite quantized weights fitting the limit.
  napkin_math: |
    1. Model Weights (INT8): 7 billion * 1 byte/param = 7.0 GB.
    2. KV-Cache (FP16): 4096 (tokens) * 32 (layers) * 32 (heads) * 128 (head_dim) * 2 (K,V) * 2 (bytes) = ~2.1 GB.
    3. Activations (FP16): Estimated 3.5 GB for 4096 sequence.
    4. Total Memory: 7.0 GB + 2.1 GB + 3.5 GB = 12.6 GB.
    **Conclusion:** 12.6 GB exceeds the 12 GB LPDDR5X limit, causing OOM.
