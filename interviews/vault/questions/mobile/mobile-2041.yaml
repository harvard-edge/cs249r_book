title: Audio Pipelining to Reduce First-Word Latency
scenario: 'A mobile processor buffers incoming audio into 1-second chunks, applying a heavy noise-reduction model followed by a translation model.'
question: 'How can you apply a temporal pipelining technique to significantly reduce the user-perceived latency of the first translated word?'
details:
  realistic_solution: 'Reduce the chunk size to much smaller segments (e.g., 100ms). Stream these smaller chunks through the noise-reduction model and incrementally feed them into a streaming-capable translation model (like an RNN or KV-cached Transformer). This hides the processing time behind the user''s ongoing speech, yielding output almost immediately after the word is spoken.'
  common_mistake: |
    **The Pitfall:** Decreasing chunk size without adopting a stateful translation architecture.
    **The Rationale:** Engineers assume smaller chunks automatically yield faster end-to-end execution without side effects.
    **The Consequence:** The translation model loses contextual information across boundaries, breaking translation quality.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Original chunk latency: 1.0 second.
       - Reduced chunk segments: 100 ms (10 chunks/sec).
    2. **Calculations:**
       - New chunk latency = 1.0 s / 10 = 0.1 s.
    3. **Conclusion & Interpretation:**
       - **Result: 100 ms Per-Block Latency (Temporal Pipelining).**
