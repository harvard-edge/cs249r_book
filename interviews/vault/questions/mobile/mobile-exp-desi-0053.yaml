title: Always-On Vision Architecture for Exynos 2400
scenario: Design an always-on continuous object tracking architecture for the Samsung Exynos 2400 NPU.
  The system must process 30 FPS video indefinitely without thermal throttling. The Exynos 2400 features
  a dual-core NPU delivering 34.7 TOPS, but relies on a 12 GB LPDDR5X memory pool shared with the CPU,
  GPU, and ISP. Your design must minimize total energy consumption by explicitly trading off compute operations
  against memory hierarchy access costs.
question: "How would you design an always-on continuous object tracking architecture for the Samsung Exynos 2400 NPU?"
details:
  realistic_solution: A robust design heavily prioritizes operator fusion and spatial tiling to keep intermediate
    feature maps entirely within the NPU's internal SRAM. The candidate should architect a network using
    memory-efficient blocks (like depthwise separable convolutions) to minimize footprint, deliberately
    accepting more compute operations (which are cheap) to avoid writing intermediate states to the shared
    LPDDR5X (which is highly expensive).
  common_mistake: Candidates typically design solely to maximize the 34.7 TOPS compute utilization without
    considering the shared memory bottleneck. They often propose architectures that spill large intermediate
    activations to the 12 GB LPDDR5X, failing to realize that off-chip memory access dominates the energy
    budget compared to NPU compute.
  napkin_math: An 8-bit MAC operation on the NPU costs ~0.1 pJ, while accessing the shared LPDDR5X costs
    ~100 pJ/byte and SRAM access is ~1 pJ/byte. If an unfused layer pair spills a 10 MB activation map
    to DRAM at 30 FPS, the memory energy cost is 10 MB * 2 (read+write) * 30 FPS * 100 pJ/byte = 60 mW.
    Fusing the layers to keep that data in SRAM reduces this to 10 MB * 2 * 30 * 1 pJ/byte = 0.6 mW, saving
    99% of the data movement energy for that operation.
