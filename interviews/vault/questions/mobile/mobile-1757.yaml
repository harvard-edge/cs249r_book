title: 'Bias Mitigation on Edge AI: Samsung Exynos 2400 NPU'
scenario: You are leading the ML engineering team responsible for deploying a critical on-device image classification model for a privacy-sensitive application on Samsung Exynos 2400 NPU-powered mobile devices. This NPU offers 34.7 TOPS and has 12 GB of LPDDR5X memory. Initial internal audits indicate that the model exhibits significant performance disparities across certain demographic subgroups.
question: "What metrics would you prioritize, and how would you adapt your evaluation approach to measure intersectional fairness given the edge environment constraints?"
details:
  realistic_solution: Develop an efficient sampling strategy for on-device data collection that targets underrepresented subgroups, coupled with a tiered evaluation approach. Prioritize key fairness metrics like False Positive Rate (FPR) and False Negative Rate (FNR) parity for critical subgroups using lightweight, pre-computed summary statistics on the NPU itself. Offload more complex intersectional analysis and model retraining to cloud infrastructure, while designing lightweight on-device anomaly detection for fairness degradation. Leverage the 12 GB LPDDR5X memory for buffering and processing small batches of fairness-specific data without excessive NPU re-initialization or external memory access, and utilize the 34.7 TOPS for efficient inference on these targeted data subsets.
  common_mistake: |
    **The Pitfall:** Designing comprehensive subgroup evaluation pipelines that ignore device computational overhead.
    **The Rationale:** Candidates propose cloud-like evaluation workflows, forgetting that running hundreds of extra inferences on the edge drains battery and ruins user experience.
    **The Consequence:** The evaluation pipeline is either rejected by the platform team for battery abuse or fails to provide timely insights.
  napkin_math: |
    * Evaluation requirement: 1,000 inferences per subgroup, 10 subgroups = 10,000 inferences.
    * Inference time = 50 ms.
    * Total NPU time = 10,000 * 50 ms = 500 seconds (~8.3 minutes).
    * Data footprint: 10,000 inferences * 10 MB = 100 GB (too large).
    * **The 12 GB LPDDR5X memory can buffer ~1,200 data points (12 GB).**
    * **A lightweight, pre-computed summary statistics approach (e.g., extracting embeddings and using a small INT8 classifier) is necessary to reduce the 8.3-minute compute overhead.**
