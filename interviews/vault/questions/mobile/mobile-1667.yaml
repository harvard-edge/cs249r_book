title: Evaluating Rollout Strategies for On-Device ML Model Architectures on Snapdragon Hexagon NPU
scenario: Your team is developing a new on-device machine learning feature for a popular mobile application relying on the Snapdragon 8 Gen 3 Hexagon NPU. You have two candidate ML model architectures for a critical real-time perception task. Model A is highly optimized for INT8 quantization achieving ~10ms inference latency but requires complex, non-standard update cycles. Model B is slightly less performant (~15ms inference latency) but built with a standard MLIR-based intermediate representation, offering simpler model updates and improved debuggability.
question: How would you A/B test and progressively roll out two model architectures with different latency and operability to decide the final production model?
details:
  realistic_solution: 'Implement a multi-stage rollout:

    1.  **Shadow Deployment (1% of users):** Deploy both Model A and Model B concurrently to a small segment of production traffic (e.g., 1%) without affecting user experience. Collect ''dark'' metrics on NPU utilization, inference latency, memory footprint, and estimated power consumption for both models on a diverse range of Snapdragon 8 Gen 3 devices. This helps identify early performance divergences and potential device-specific issues.

    2.  **Canary Rollout (5% of users with A/B testing):** For a distinct 5% user cohort, randomly assign half to Model A and half to Model B (client-side A/B test). Monitor real-time user engagement with the feature, perceived latency, app crash rates, and battery drain. Establish automated alerts and rollback mechanisms for any significant degradation in these critical metrics.

    3.  **Progressive Rollout (Phased expansion):** If initial canary tests are positive, gradually increase the traffic to the chosen superior model (e.g., 25%, then 50%, then 100%) while continuously monitoring all defined metrics. Model B might be preferred even with slightly higher latency if its ease of updates and debugging significantly reduces operational costs and time-to-market for future iterations, especially if Model A''s complexity introduces unacceptable risks or delays.

    4.  **Rollback Plan:** Crucially, a well-defined rollback strategy must be in place at each stage, allowing for immediate reversion to the previous stable model version if any issues are detected.'
  common_mistake: |
    **The Pitfall:** Focusing only on isolated peak performance metrics (e.g., pure NPU TOPS or latency) without considering the holistic impact.
    **The Rationale:** Engineers prioritize raw speed while neglecting power consumption, app stability, and operational overhead.
    **The Consequence:** Deploying a model that drains the battery or introduces unacceptable operational costs, negatively impacting user experience.
  napkin_math: |
    1. **Latency Impact:** Difference per user per day = (15ms - 10ms) * 50 inferences = 250ms.
    2. For 10 million users, this is 2.5 * 10^6 seconds = ~29 days of 'lost' user time daily.
    3. **Power Consumption:** Model A consumes 4mJ per inference (200mJ/day). Model B consumes 6.75mJ (337.5mJ/day).
    4. **Conclusion:** **Model B consumes ~68% more energy, potentially leading to noticeable battery drain.**
