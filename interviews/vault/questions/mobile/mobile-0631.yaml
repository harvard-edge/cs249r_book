title: The Night-Blind Driver Monitor
scenario: Your team develops a state-of-the-art driver drowsiness detection model trained on 1080p test fleet footage. You ship the model to a budget vehicle using a cheaper 720p camera. The drowsiness alarm fails to trigger on drivers falling asleep, but only at night. A junior engineer suggests downsampling the training data to 720p and retraining.
question: How would you evaluate this suggestion and predict the true, underlying reason for this catastrophic, light-dependent failure?
details:
  realistic_solution: 'This is a classic case of **Hardware-Specific Preprocessing Skew**, a severe form of training-serving skew. The root cause is not the resolution itself, but the budget 720p camera''s on-chip Image Signal Processor (ISP). To compensate for its physically smaller, less sensitive sensor, the ISP applies aggressive, non-linear temporal and spatial noise reduction, especially in low-light (night) conditions.'
  common_mistake: |
    **The Pitfall:** Assuming this is a simple resolution mismatch.
    **The Rationale:** Engineers suggest retraining on downsampled 720p images, failing to explain why the model works during the day but fails catastrophically at night.
    **The Consequence:** Retraining wastes time and fails to fix the issue because the input is fundamentally lying to the model via ISP artifacts.
  napkin_math: |
    **Assumptions & Constraints:**
    - 1080p Camera: 2M pixels, low noise.
    - 720p Budget Camera: 0.9M pixels, 4x less light/pixel at night.
    - ISP Temporal Noise Reduction: Averages 3-5 frames.
    - Input Feature: 50ms blink signal.

    **Calculations:**
    - Signal Smearing: 50ms blink signal is smeared across a 150ms window.

    **Conclusion & Interpretation:**
    - **Result: 60-70% Reduction (Data-Bound)**. Peak closure amplitude is cut by 60-70%, destroying the signal the model expects.
