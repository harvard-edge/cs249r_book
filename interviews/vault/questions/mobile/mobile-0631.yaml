title: The Night-Blind Driver Monitor
scenario: 'Your team develops a state-of-the-art driver drowsiness detection model. It''s a CNN that monitors
  eye-blink frequency and duration. Training is performed on a massive dataset collected from your test
  fleet, which uses high-quality, 1080p automotive-grade cameras. The model performs flawlessly. You ship
  the model in an OTA update to a new, high-volume budget vehicle. Soon after, you receive alarming reports:
  the drowsiness alarm fails to trigger on drivers who are clearly falling asleep at the wheel, but *only*
  at night. Daytime performance on the budget car seems fine. You verify the model is running correctly.
  Initial analysis shows the budget vehicle uses a cheaper 720p camera. A junior engineer suggests simply
  downsampling the training data to 720p and retraining. Evaluate this suggestion and predict the true,
  underlying reason for this catastrophic, light-dependent failure.'
details:
  realistic_solution: This is a classic case of **Hardware-Specific Preprocessing Skew**, a severe form
    of training-serving skew. The root cause is not the resolution itself, but the budget 720p camera's
    on-chip Image Signal Processor (ISP). To compensate for its physically smaller, less sensitive sensor,
    the ISP applies aggressive, non-linear temporal and spatial noise reduction, especially in low-light
    (night) conditions.
  common_mistake: The most common (but incorrect) answer is that this is a simple resolution mismatch.
    Engineers will suggest retraining on downsampled 720p images. While not wrong, this is an L3-level
    answer that misses the non-linear failure mode. It fails to explain why the model works during the
    day but fails catastrophically at night. The problem isn't just that the input is blurrier; the input
    is fundamentally lying to the model.
  napkin_math: '1080p camera: 2M pixels, low noise. 720p budget: 0.9M pixels, 4× less light/pixel at night.
    ISP temporal NR averages 3-5 frames→eye blink(150-400ms) smeared across 150ms window. Blink signal
    ~50ms gets smoothed→peak closure amplitude cut 60-70%. Model trained on clean 1080p never saw this
    ISP artifact. Resolution isn''t the issue; ISP processing is.'
