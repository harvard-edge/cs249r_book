title: The Throttling Treadmill
scenario: You've deployed a new on-device object detection model. Initial tests show excellent latency (20ms per frame). However, after 30 seconds of continuous use, the latency consistently rises to 60ms.
question: Why does object detection latency rise from 20 ms to 60 ms after 30 seconds of continuous on-device use?
details:
  realistic_solution: The device's SoC (System on Chip) is experiencing thermal throttling. Continuous high utilization of the NPU/GPU/CPU generates heat. To prevent damage and maintain device stability, the operating system and hardware governors reduce the clock frequency and/or voltage of the processing units. This directly impacts performance, leading to increased inference latency. Diagnosis involves monitoring CPU/GPU/NPU temperatures and clock frequencies using on-device profiling tools (e.g., Android Systrace, Perfetto, Xcode Instruments, or vendor-specific tools like Snapdragon Profiler, Mali Graphics Debugger). Correlating temperature spikes with frequency drops and latency increases confirms thermal throttling.
  common_mistake: |
    **The Pitfall:** Diagnosing a memory leak instead of thermal throttling.
    **The Rationale:** Candidates often default to software bugs (like memory leaks) for sustained degradation, ignoring physical hardware constraints.
    **The Consequence:** Time is wasted on memory profiling while the device fundamentally lacks the thermal headroom to sustain peak performance.
  napkin_math: |
    1. **Peak Power:** A modern mobile NPU might consume 3-5W at peak.
    2. **Thermal limits:** Sustained operation of a 5W component in a passively cooled smartphone enclosure raises internal temperatures quickly.
    3. **Throttling trigger:** If junction limit is 95°C and ambient internal temperature rises from 40°C to 70°C, thermal headroom shrinks.
    4. **Result:** Hardware governors reduce clock frequency, **increasing latency 3x (20ms to 60ms)**.
