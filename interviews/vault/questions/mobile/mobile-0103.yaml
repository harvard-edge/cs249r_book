title: The Throttling Treadmill
scenario: You've deployed a new on-device object detection model. Initial tests show excellent latency
  (20ms per frame). However, after 30 seconds of continuous use, the latency consistently rises to 60ms.
  What is the most likely root cause, and how would you diagnose it?
details:
  realistic_solution: The device's SoC (System on Chip) is experiencing thermal throttling. Continuous
    high utilization of the NPU/GPU/CPU generates heat. To prevent damage and maintain device stability,
    the operating system and hardware governors reduce the clock frequency and/or voltage of the processing
    units. This directly impacts performance, leading to increased inference latency. Diagnosis involves
    monitoring CPU/GPU/NPU temperatures and clock frequencies using on-device profiling tools (e.g., Android
    Systrace, Perfetto, Xcode Instruments, or vendor-specific tools like Snapdragon Profiler, Mali Graphics
    Debugger). Correlating temperature spikes with frequency drops and latency increases confirms thermal
    throttling.
  common_mistake: '"The model has a memory leak." While possible, thermal throttling is a much more common
    and immediate cause for sustained performance degradation on mobile devices.'
  napkin_math: A modern mobile NPU might consume 3-5W at peak. Sustained operation of a 5W component in
    a small, passively cooled enclosure like a smartphone will quickly raise internal temperatures. If
    the SoC junction temperature limit is 95°C, and the ambient internal temperature rises from 40°C to
    70°C, the thermal headroom drastically shrinks, forcing frequency reductions.
