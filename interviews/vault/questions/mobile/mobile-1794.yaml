title: On-Device Training with LoRA Adapter on A17 Pro — Feasibility Analysis
scenario: An iOS app personalizes a 3B language model (INT4 inference, 1.5GB) using LoRA fine-tuning on user data. LoRA rank=8, target modules=q_proj+v_proj (32 layers × 2 matrices × 2 LoRA matrices). The user has 100 examples (avg 128 tokens). Training runs on A17 Pro during charging.
question: Is LoRA fine-tuning a 3B INT4 iOS language model with rank 8 adapters and 100 examples feasible on A17 Pro?
details:
  realistic_solution: 'LoRA parameters: 32 layers × 2 modules × 2 matrices (A and B) × (d_model × rank) = 32x2x2x(4096x8) = 32x2x2x32768 = 4.19M params (each LoRA module has A and B, each d_modelxrank). LoRA FP32: 16.8MB. Gradients: 16.8MB. Optimizer (Adam): 33.6MB. Total LoRA overhead: 67.2MB. Base model frozen at INT4: 1.5GB (no gradient needed). Total memory: 1.5GB + 67.2MB = 1.57GB. iOS limit ~3GB — fits. FLOPs per sample: 100 samples × 128 tokens × 2 × 4.19M LoRA FLOPs = 100×128×2×4.19M = 107B FLOPs for LoRA layers. A17 P-cores: ~100 GFLOPS FP32. Time: 107G/100G = 1.07s for 1 epoch. 10 epochs: 10.7s. Feasible — runs in ~30 seconds during charging.'
  common_mistake: |
    **The Pitfall:** Running LoRA training entirely in INT4 precision.
    **The Rationale:** Developers incorrectly assume that if the base model is quantized for inference, the training process and adapters can also use the same low precision to save memory.
    **The Consequence:** Severe training instability and lack of convergence, as LoRA adapters and gradients require FP32 or BF16 precision.
  napkin_math: |
    - **LoRA Parameters:** 32 layers * 2 modules * 2 matrices (A and B) * 4096 (d_model) * 8 (rank) = 4.19M parameters.
    - **Training Memory (FP32):** 4.19M * 4 bytes * 3 (weights, grad, Adam momentum) + 4.19M * 4 bytes (Adam variance) = ~67 MB.
    - **Total Memory Footprint:** 1.5 GB (Base INT4) + 67 MB (LoRA) = 1.57 GB (Fits safely within iOS ~3GB limit).
    - **Compute Load (FLOPs):** 100 samples * 128 tokens * 2 * 4.19M = ~107 GFLOPs.
    - **Training Time:** At ~100 GFLOPS (A17 P-cores), 107 GFLOPs / 100 GFLOPS = 1.07 seconds per epoch.
    - **Conclusion:** 10 epochs take **~10.7 seconds**, which is highly feasible during background charging.
