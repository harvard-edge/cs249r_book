title: 5G Uplink Conversion
scenario: A mobile device offloads heavy inference to a cloud server via a 5G connection
  with a 100 Mbps uplink.
question: State the bandwidth limit of the 5G connection in megabytes per second to
  determine if a 15 MB image can be offloaded in under 1 second.
visual:
  kind: svg
  path: mobile-1905.svg
  alt: Node diagram showing mobile device connected to cloud via a 100 Mbps link.
  caption: Mobile Offload Link
details:
  realistic_solution: The candidate converts Megabits per second (Mbps) to Megabytes
    per second (MB/s) by dividing by 8. 100 Mbps = 12.5 MB/s. Thus, a 15 MB image
    will take longer than 1 second.
  common_mistake: Confusing bits and bytes and assuming 100 Mbps means 100 MB/s.
  napkin_math: 100 / 8 = 12.5 MB/s < 15 MB/s
