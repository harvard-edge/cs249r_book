title: 'Kernel Fusion: Specification — Define Fusion Requirements for Cross-Platform Mobile LLM SDK'
scenario: You are writing the kernel fusion specification for a cross-platform mobile LLM SDK that targets
  A17 Pro (35 TOPS, 8GB), Snapdragon 8 Gen 3 (45 TOPS, 16GB), and Tensor G3 (7.5 TOPS, 12GB). The SDK
  must achieve >= 20 tokens/sec for a 1B INT4 model on all platforms. Define fusion requirements, numerical
  tolerances, and platform adaptation rules.
details:
  realistic_solution: 'Platform-specific fusion requirements with a minimum baseline. Required fusion
    groups: (1) Flash Attention (all platforms, tile size adaptive to SRAM). (2) BN fold (inference only).
    (3) Elementwise chain fusion (RMSNorm + bias). Platform-specific: Core ML for ANE, QNN for Hexagon,
    XNNPack for Tensor G3.'
  common_mistake: Writing platform-agnostic fusion requirements that are impossible to implement on some
    hardware (e.g., requiring Flash Attention fusion on Tensor G3 which has limited SRAM).
  napkin_math: 'Throughput requirement: 20 tok/sec → 50ms/token max. Memory floor: model 500MB / 68 GB/s
    = 7.35ms. Remaining budget: 50 - 7.35 = 42.65ms for overhead. Overhead sources: kernel launches, format
    conversions, CPU-GPU sync. Required fusion to meet budget: without fusion, overhead estimated 60ms
    (above budget on Tensor G3). Fusion target: reduce overhead by >= 20ms to meet 50ms total on Tensor
    G3. Flash attention: eliminates 268MB per layer intermediate (at 512 ctx): 268MB / 51 GB/s = 5.3ms
    → 0.5ms = saves 4.8ms per layer... but there are 28 attention layers... saves too much per layer (not
    right calculation). For 1-token decode: KV cache access per layer 512 × 128 × 2 heads × 2B = 262KB/layer
    × 28 = 7.3MB KV read total. Standard vs flash: same for decode (flash helps prefill, not decode).
    Flash decode: saves attention matrix temp storage but not critical for decode latency. Numerical tolerance:
    max per-token output divergence from FP16 reference < 2% on perplexity metric. Platform adaptation:
    SRAM_tile = min(SRAM/4, 64KB).'
