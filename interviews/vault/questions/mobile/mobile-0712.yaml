title: The Quantization Divergence Across SoCs
scenario: 'You deploy an INT4 quantized LLM (Gemma-2B) across three flagship phones: iPhone 16 Pro (A18
  Pro), Galaxy S24 Ultra (Snapdragon 8 Gen 3), and Pixel 9 Pro (Tensor G4). The same prompt produces noticeably
  different outputs on each device — not just minor token differences, but semantically different responses.
  All three use the same INT4 weight file. How can identical weights produce different text on different
  SoCs?'
details:
  realistic_solution: 'Four levels of divergence compound: (1) Dequantization format — A18 Pro uses FP16
    (10-bit mantissa, ±0.004 error), Tensor G4 uses BF16 (7-bit mantissa, ±0.03 error). (2) Group size
    differences in INT4 packing (32 vs 64 vs 128 weights per scale factor). (3) Accumulation precision
    varies (FP16 vs FP32 intermediate sums). (4) Softmax implementation differences. Over 2048-dim dot
    products, BF16 accumulates 1.36 logit error vs FP16''s 0.18 — a 7.5x gap amplified by temperature
    sampling. Fix: standardize on a single runtime (e.g., llama.cpp) across all platforms with explicit
    FP32 accumulation in attention layers.'
  common_mistake: '"INT4 is INT4 — the math is the same everywhere." INT4 quantization is not a single
    standard. The dequantization formula, grouping strategy, and accumulation precision vary between runtimes
    and hardware.'
  napkin_math: 'FP16 vs BF16 mantissa: FP16 has 10 bits (precision ~0.001), BF16 has 7 bits (precision
    ~0.008). Per-weight dequantization error: +/-0.004 (FP16) vs +/-0.03 (BF16). Over a 2048-dim dot product:
    accumulated error = sqrt(2048) * per-element-error. FP16: sqrt(2048) * 0.004 = 0.18. BF16: sqrt(2048)
    * 0.03 = 1.36. For attention scores (softmax input): 1.36 error on logits shifts probabilities by
    ~15%. On A17 Pro: ANE supports FP16 natively at 35 TOPS. BF16 not supported, converted to FP16, adding
    0.2 ms per layer. On Snapdragon 8 Gen 3 Hexagon: BF16 supported at 24 TOPS. Latency: FP16 model at
    18 ms vs BF16 at 22 ms on ANE. Accuracy: BF16 perplexity +0.8 vs FP16 +0.1 on language tasks.'
