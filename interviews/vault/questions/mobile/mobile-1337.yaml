title: KV Cache Capacity on Exynos 2400
scenario: You are optimizing a 32-layer generative LLM for the Samsung Exynos 2400
  NPU. While the NPU provides 34.7 TOPS of compute across its dual cores, token generation
  is memory-bound by the shared 12 GB LPDDR5X memory pool. After allocating memory
  for the model weights, OS, CPU, GPU, and ISP, you have exactly 1.5 GB of RAM remaining
  strictly for the KV cache. The model has a hidden dimension of 4096, 32 query heads,
  and uses FP16 (2 bytes/parameter). Calculate the maximum sequence length you can
  support if you implement standard Multi-Head Attention (MHA) versus Multi-Query
  Attention (MQA) with 1 KV head.
question: How would you calculate the maximum sequence length you can support if you
  implement standard Multi-Head Attention (MHA) versus Multi-Query Attention (MQA)
  with 1 KV head?
details:
  realistic_solution: To find the maximum context length, calculate the memory footprint
    of a single token's KV cache across all layers, then divide the available memory
    by this per-token footprint. For MHA, the KV dimension matches the query dimension.
    For MQA, the KV dimension is reduced to a single head's dimension. This quantitative
    analysis demonstrates why MQA is critical for fitting large contexts into constrained
    mobile SOCs where memory is shared across subsystems.
  common_mistake: Candidates often forget to multiply by the number of layers (32)
    or forget that the KV cache stores both Keys and Values (x2). Some also fail to
    correctly calculate the head dimension (4096 / 32 = 128) when reducing the KV
    heads for MQA.
  napkin_math: '1. MHA memory per token: 32 layers * 2 (K & V) * 4096 dim * 2 bytes
    = 524,288 bytes (512 KB).

    2. Max MHA context: 1.5 GB (1536 MB) / 0.5 MB per token = 3,072 tokens.

    3. MQA memory per token: Head dim is 4096 / 32 = 128. MQA uses 1 KV head. Memory
    = 32 layers * 2 (K & V) * 128 dim * 2 bytes = 16,384 bytes (16 KB).

    4. Max MQA context: 1536 MB * 1024 KB/MB / 16 KB per token = 98,304 tokens.

    Conclusion: MQA increases context capacity from ~3K to ~98K tokens without exceeding
    the Exynos 2400''s shared 12 GB LPDDR5X limit.'
