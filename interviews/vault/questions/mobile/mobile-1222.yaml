title: Progressive Rollout Design for A17 Pro Neural Engine
scenario: You are designing the rollout strategy for a new real-time video enhancement
  model specifically targeting the Apple A17 Pro Neural Engine. The new model relies
  heavily on the 16-core Neural Engine and aims to utilize up to 30 TOPS of the available
  35 TOPS, but its behavior under prolonged thermal stress in the ~5W envelope is
  unknown. Architect a progressive A/B rollout and fallback system that safely evaluates
  this model in production while ensuring the shared 8 GB unified memory is not exhausted
  by concurrent operations.
question: How should an A17 Pro progressive rollout test a thermal-heavy video model
  without exhausting unified memory?
details:
  realistic_solution: Design a client-driven progressive rollout where the device
    is assigned exclusively to the new model (Variant B). The client application must
    include a local orchestrator that continuously monitors unified memory pressure,
    Neural Engine utilization, and thermal states. If the 5W thermal budget is exceeded
    causing OS-level throttling, or if memory allocation nears the 8 GB shared limit,
    the orchestrator must instantly trigger a local fallback to the lighter baseline
    model to maintain user experience, while asynchronously logging the telemetry.
  common_mistake: Candidates often propose running both the old and new models simultaneously
    in 'shadow mode' to compare outputs, ignoring the strict resource limits of mobile
    hardware. They also frequently rely on server-side decision making for fallbacks,
    which is too slow to prevent app crashes when thermal throttling or memory pressure
    spikes.
  napkin_math: Assuming the OS and app consume 4.5 GB of the 8 GB shared unified memory,
    3.5 GB remains. The new model requires 1.2 GB for weights/activations, and 4K
    video buffers take 1.5 GB, totaling 2.7 GB. Running a shadow deployment (old model
    0.8 GB + new model 1.2 GB + buffers 1.5 GB = 3.5 GB) leaves 0 GB margin, guaranteeing
    an OOM crash. Power-wise, driving the 16-core NE to 30 TOPS out of the 35 TOPS
    maximum will consume roughly 4W of the ~5W SoC budget, leaving only 1W for the
    CPU and GPU to decode and render the video, making thermal throttling highly likely
    and necessitating the local fallback mechanism.
