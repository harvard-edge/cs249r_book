title: 'Network Bandwidth Bottlenecks: Specification — Design Bandwidth QoS for 5G Hybrid Mobile Inference'
scenario: Specify a bandwidth QoS policy for a 5G mobile device that intelligently routes LLM inference between on-device (3B INT4, TPOT=19.5ms) and cloud (H100, TPOT=7.8ms). The policy must minimize user-perceived latency across network conditions while respecting a $0.01 per 1000 tokens cloud budget.
question: What routing rules should choose between cloud and on-device LLM inference under 5G latency, privacy, and budget constraints?
details:
  realistic_solution: 'Policy: route to cloud if: (1) 5G available (RTT < 200ms), (2) budget not exceeded, (3) privacy-non-sensitive query. On-device: when offline, budget exceeded, or sensitive.'
  common_mistake: |
    **The Pitfall:** Defining routing purely on RTT without considering that the on-device model is slower per token.
    **The Rationale:** Assuming cloud is slower if ping is high, but forgetting that cloud generates tokens 2.5x faster.
    **The Consequence:** Unnecessarily falling back to slower on-device inference when the cloud would still complete the full generation faster.
  napkin_math: |
    - Cloud E2E for 100 tokens: (100 * 7.8 ms) + RTT = 780 ms + RTT.
    - On-device E2E for 100 tokens: 100 * 19.5 ms = 1950 ms.
    - Cloud wins when: 780 + RTT < 1950 -> RTT < 1170 ms.
    - Budget: 100 tokens = $0.001. At 10 queries/hr = 1000 tokens/hr = $0.01/hr.
    - **Cloud is always faster on latency for typical 5G RTT (<200ms) and fits within budget for typical daily use.**
