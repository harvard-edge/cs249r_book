title: 'KV-Cache: Mastery — Long-Context KV Cache Strategy for Mobile Code Assistant'
scenario: Design the complete KV cache strategy for a 3B LLM code assistant on A17 Pro (35 TOPS, 8GB) that must handle 32K-token codebases. The current 4096-token limit is insufficient.
question: How would you design a memory-efficient KV cache, eviction policy, and quality preservation strategy for a 32K context?
details:
  realistic_solution: |
    32K full KV at bf16: 3B model (32 layers, GQA-8, head_dim=128): 32K × 32 × 2 × 8 × 128 × 2B = 32K × 131KB = 4.19GB. Plus 750MB model + 2GB OS = 6.94GB > 8GB. Doesn't fit. Solutions: INT4 KV + sliding window + sparse attention.
  common_mistake: |
    **The Pitfall:** Proposing solutions without verifying memory constraints.
    **The Rationale:** Candidates assume standard architectures scale linearly without quantifying the infeasibility of a 32K full KV cache in 8GB RAM.
    **The Consequence:** Designing a system that immediately OOMs the mobile device.
  napkin_math: |
    - **Full 32K KV Cache (bf16):** 3B model (32 layers, GQA-8, 128 head_dim). 32K * 32 * 2 * 8 * 128 * 2 bytes = 4.19 GB.
    - **Available Memory:** 8GB - 2GB OS - 0.75GB model = 4.75GB. 4.19GB leaves no headroom and risks eviction.
    - **INT4 Quantized KV:** 4.19 GB / 4 = 1.05 GB.
    - **Sliding Window + Landmarks:** 4096 recent + 1024 landmark = 5120 tokens. 5120 * 131 KB = 671 MB.
    - **Result:** **Combining INT4 KV and landmark tokens reduces the cache to ~1 GB, safely fitting within the 8GB limit.**
