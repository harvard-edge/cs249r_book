title: The Guardian Copilot's Dilemma
scenario: You are the Lead ML Systems Architect for a new flagship EV's 'Guardian' copilot. The system uses a 4B-parameter multi-modal model running on the central Snapdragon 8 Gen 3-class SoC (45 TOPS). It monitors driver state (video) and road context (navigation) to provide proactive assistance.
question: What preemptible scheduling architecture prevents low-priority Guardian copilot work from blocking safety-critical tasks?
details:
  realistic_solution: The problem is not one of raw performance, but of scheduling. A long-running, low-priority task is occupying the GPU, causing any subsequent high-priority task to miss its deadline. The architecture must be able to interrupt the low-priority work.
  common_mistake: |
    **The Pitfall:** Proposing a smaller model or dedicated safety MCU instead of addressing the scheduling architecture.
    **The Rationale:** Engineers sidestep the core challenge of safely multiplexing tasks on a powerful SoC by throwing more hardware at the problem or sacrificing model quality.
    **The Consequence:** The system remains vulnerable to blocking tasks; a slow task still blocks, it's just slightly less slow.
  napkin_math: |
    1. **Background Task Latency:** A low-priority navigation analysis task takes 100ms on the NPU.
    2. **Safety Task Deadline:** A critical collision-avoidance frame arrives at ms 1, with a strict 33ms safety deadline.
    3. **Non-preemptible Queue:** The safety task waits 99ms for the background task to finish. 99ms > 33ms (Deadline missed, collision possible).
    4. **Preemptible Architecture:** The OS signals a context switch. NPU saves state (~2ms overhead), runs the safety task (e.g., 20ms), and meets the 33ms deadline.
    **Hardware-level preemption ensures safety tasks always meet deadlines despite long-running background workloads.**
