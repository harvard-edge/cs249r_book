title: 'The Depthwise Separable Advantage: Transformer Systems Cost'
scenario: You're optimizing a vision model for an SoC with a power-constrained NPU. For a standard 3x3
  convolutional layer with 128 input channels and 256 output channels, you replace it with a 3x3 depthwise
  separable convolution. Approximately how many fewer MAC (Multiply-Accumulate) operations are required?
details:
  realistic_solution: A depthwise separable convolution reduces the computational cost by roughly a factor
    of the square of the kernel size. For a 3x3 kernel, the reduction is nearly 9x. The operation is split
    into a 3x3 depthwise convolution (filtering spatially) and a 1x1 pointwise convolution (mixing channels),
    which is far cheaper than a single, dense 3x3 standard convolution.
  common_mistake: Engineers often underestimate the savings, thinking it's a minor optimization like 2x.
    Others forget that a depthwise separable convolution is a two-step process (depthwise + pointwise)
    and either miscalculate the total or only account for one part, leading to an incorrect ratio.
  napkin_math: '1. Standard Conv MACs per pixel: 3 * 3 * 128 (in) * 256 (out) = 294,912 MACs. 2. Depthwise
    Separable Conv MACs per pixel: Depthwise step takes 3 * 3 * 128 = 1,152 MACs. Pointwise step takes
    1 * 1 * 128 * 256 = 32,768 MACs. Total = 33,920 MACs. 3. Reduction: 294,912 / 33,920 ≈ 8.7x reduction.
    This saves significant compute cycles and lowers power draw on the power-constrained mobile NPU.'
  options:
  - ~2x fewer
  - ~256x fewer
  - ~9x fewer
  - No computational difference
  correct_index: 2
