title: 'The Depthwise Separable Advantage: Transformer Systems Cost'
scenario: You're optimizing a vision model for an SoC with a power-constrained NPU. For a standard 3x3 convolutional layer with 128 input channels and 256 output channels, you replace it with a 3x3 depthwise separable convolution.
question: How many fewer MACs does a 3x3 depthwise separable convolution need than a 128-to-256-channel standard convolution?
details:
  realistic_solution: A depthwise separable convolution reduces the computational cost by roughly a factor of the square of the kernel size. For a 3x3 kernel, the reduction is nearly 9x. The operation is split into a 3x3 depthwise convolution (filtering spatially) and a 1x1 pointwise convolution (mixing channels), which is far cheaper than a single, dense 3x3 standard convolution.
  common_mistake: |
    **The Pitfall:** Forgetting the pointwise step of a depthwise separable convolution.
    **The Rationale:** Candidates often only calculate the depthwise component or underestimate the savings as a minor 2x optimization.
    **The Consequence:** Incorrectly estimating the computational cost and power draw of mobile vision models.
  napkin_math: |
    1. Standard Conv MACs per pixel: 3 * 3 * 128 (in) * 256 (out) = 294,912 MACs.
    2. Depthwise step MACs per pixel: 3 * 3 * 128 = 1,152 MACs.
    3. Pointwise step MACs per pixel: 1 * 1 * 128 * 256 = 32,768 MACs.
    4. Total Depthwise Separable MACs: 1,152 + 32,768 = 33,920 MACs.
    5. Reduction Ratio: 294,912 / 33,920 = **~8.7x fewer MACs**.
  options:
  - ~2x fewer
  - ~256x fewer
  - ~9x fewer
  - No computational difference
  correct_index: 2
