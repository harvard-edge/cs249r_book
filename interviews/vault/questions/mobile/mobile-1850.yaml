title: On-Device Personalization with Differential Privacy on Mobile
scenario: Apple's on-device personalization for a keyboard model uses LoRA fine-tuning
  on user text. Design the differential privacy mechanism for rank-4 on-device training
  on A17 Pro.
question: How would you design the differential privacy mechanism for rank-4 on-device
  training on A17 Pro?
details:
  realistic_solution: 'DP-LoRA on device: (1) clip per-sample gradients of adapter
    weights at C=0.1 (empirically determined from adapter gradient percentile distribution
    on representative user data); (2) add Gaussian noise σ=C×√(2ln(1.25/δ))/ε to clipped
    gradients; (3) accumulate local updates before sending to the server for federated aggregation;
    (4) ε=8 per day budget (Apple''s reported standard for on-device learning). Key:
    adapter''s small parameter count (rank-4: 786K) means the noise added is dimensionally
    smaller than full model training, preserving utility.'
  common_mistake: Applying standard DP-SGD clip norms designed for server-side training.
    Mobile training has different gradient distributions and the same clip norm can
    over-clip (adding too much noise) or under-clip (insufficient privacy) compared
    to server profiles.
  napkin_math: 'Rank-4 adapter for 1B model: 786K params. Full model: 1B params. DP
    noise is proportional to dimension, so LoRA gives a √(1B/786K) ≈ 35.6× noise reduction
    advantage. For C=0.1, ε=8, δ=10⁻⁶: noise std dev per parameter σ = 0.1 × √(2ln(1.25×10⁶))/8
    ≈ 0.066. Average gradient per parameter for C=0.1 is 0.1 / √786K ≈ 0.00011. Per-device
    SNR is 0.00011 / 0.066 ≈ 0.0017. With Federated Learning over N=10,000 devices,
    SNR improves by √N (100×), making the aggregated update highly usable.'
