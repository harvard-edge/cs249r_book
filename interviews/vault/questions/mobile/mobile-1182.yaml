title: Optimizing Intersectional Fairness Evaluation on Tensor G3
scenario: We are deploying an on-device text classification model (similar to Gemini Nano) on the Google Tensor G3. To monitor intersectional fairness without sending user data to the cloud, we must periodically run an evaluation across 40 demographic subgroups using a local 1,000-sample dataset. Currently, the evaluation pipeline computes equalized odds by running inferences sequentially on the CPU, which takes over 5 minutes and triggers thermal throttling.
question: "How would you analyze the bottleneck and optimize this pipeline using the G3's hardware to quantify demographic parity and equalized odds efficiently?"
details:
  realistic_solution: The optimal approach separates inference from metric calculation. First, we run batched inference for all 1,000 samples on the G3's TPU, storing the output logits in the 12 GB LPDDR5X memory. Then, we use a vectorized approach on the CPU to cross-reference these predictions with the 40 subgroup labels simultaneously to compute false positive and false negative rates, resolving the thermal bottleneck and drastically reducing execution time.
  common_mistake: |
    **The Pitfall:** Suggesting off-device cloud evaluation or iterative inference on the CPU.
    **The Rationale:** Candidates frequently fail to utilize the Edge TPU for batched inference or ignore the memory bandwidth capabilities of the LPDDR5X.
    **The Consequence:** High CPU-TPU transfer overhead, causing severe thermal throttling and violating strict privacy constraints.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Hardware: Google Tensor G3 TPU (7.5 TOPS), 12 GB LPDDR5X.
       - Model Compute: 3 GOPs per inference.
       - Workload: 1,000 samples, 40 subgroup labels.
    2. **Calculations:**
       - TPU Inference Time (per pass): 3 GOPs / 7500 TOPS = 0.4 ms.
       - Total TPU Time: 1,000 * 0.4 ms = 400 ms.
       - Logits Storage: < 1MB (fits easily in RAM).
       - CPU Vectorized Metric Computation: ~50 ms.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound (Optimized)**
       - Total evaluation time drops from >300,000 ms (5 minutes) to under 500 ms by leveraging TPU batching and vectorized CPU metrics.
