title: Hexagon NPU Delegation Fallback Latency
scenario: You are deploying a TFLite vision model requiring 4.6 GOPS on a Snapdragon 8 Gen 3 (45 TOPS NPU). Due to incomplete operator coverage, 4.5 GOPS run on the NPU (at 10% utilization) and 0.1 GOPS fall back to the CPU (at 50 GOPS). The graph transitions between NPU and CPU twice, with each transition incurring a 1.0 ms memory sync overhead.
question: What is the total inference latency given the CPU fallback and transition overheads?
details:
  realistic_solution: To accurately estimate latency, you must calculate the execution time for both the delegated NPU partition and the CPU fallback partition independently. Since the Snapdragon 8 Gen 3 utilizes a heterogeneous architecture, moving tensors between the NPU and CPU incurs non-trivial context switching and synchronization overheads, even with shared memory. Summing the compute times and transition penalties reveals the true bottleneck caused by incomplete operator coverage.
  common_mistake: |
    **The Pitfall:** Focusing only on the NPU's massive peak TOPS and ignoring fallback costs.
    **The Rationale:** Candidates calculate a sub-millisecond latency based purely on total GOPS divided by NPU TOPS.
    **The Consequence:** They dramatically underestimate real-world latency by omitting CPU execution time and context switching penalties.
  napkin_math: |
    - **NPU Effective Compute:** 45,000 GOPS * 10% utilization = 4,500 GOPS.
    - **NPU Execution Time:** 4.5 GOPS / 4,500 GOPS = 1.0 ms.
    - **CPU Execution Time:** 0.1 GOPS / 50 GOPS = 2.0 ms.
    - **Synchronization Overhead:** 2 transitions * 1.0 ms/transition = 2.0 ms.
    - **Final Result:** **1.0 ms + 2.0 ms + 2.0 ms = 5.0 ms total latency.**
