title: Hexagon NPU Delegation Fallback Latency
scenario: You are deploying a TFLite vision model requiring 4.6 GOPS on a Snapdragon 8 Gen 3 (45 TOPS NPU). Due to incomplete operator coverage, 4.5 GOPS run on the NPU (at 10% utilization) and 0.1 GOPS fall back to the CPU (at 50 GOPS). The graph transitions between NPU and CPU twice, with each transition incurring a 1.0 ms memory sync overhead.
question: What is the total inference latency given the CPU fallback and transition overheads?
details:
  realistic_solution: Utilizing TFLite's Hexagon delegate, you must calculate execution time for both the delegated NPU partition and the CPU fallback partition independently. Moving tensors across heterogeneous domains incurs major context switching and shared memory synchronization overheads. Summing the compute times (NPU + CPU) and transition penalties reveals the true bottleneck caused by incomplete operator coverage.
  common_mistake: |
    **The Pitfall:** Focusing exclusively on the NPU's massive peak TOPS while ignoring CPU fallback costs.
    **The Rationale:** Candidates calculate a sub-millisecond latency based purely on dividing total GOPS by peak NPU TOPS.
    **The Consequence:** They dramatically underestimate real-world latency by omitting CPU execution time and context switching penalties.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model Workload: 4.6 GOPS total.
       - NPU Partition: 4.5 GOPS (running at 4,500 GOPS/s effective).
       - CPU Partition: 0.1 GOPS (running at 50 GOPS/s effective).
       - Synchronization: 2 transitions, 1.0 ms each.
    2. **Calculations:**
       - NPU Execution: 4.5 GOPS / 4,500 GOPS/s = 1.0 ms.
       - CPU Execution: 0.1 GOPS / 50 GOPS/s = 2.0 ms.
       - Transition Overhead: 2 * 1.0 ms = 2.0 ms.
       - Total Latency: 1.0ms + 2.0ms + 2.0ms = 5.0 ms.
    3. **Conclusion & Interpretation:**
       - **Result: Transition-Bound.** The actual NPU compute takes only 1.0ms, but transition overheads and slow CPU fallback dictate 80% of the total 5.0ms latency.
