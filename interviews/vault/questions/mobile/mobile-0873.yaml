title: Diagnosing Slow First-Token Latency in On-Device RAG on Tensor G3
scenario: A Tensor G3 (7.5 TOPS, 12GB) on-device RAG app shows time-to-first-token
  (TTFT) of 4.2 seconds despite the LLM being loaded into memory. Users experience
  a 4-second freeze before any text appears. The LLM is a 1B INT8 model with a 2048-token
  context. Retrieval returns 3 documents averaging 400 tokens each. Diagnose the root
  cause and propose a fix.
question: Why does Tensor G3 on-device RAG have 4.2 s TTFT with a loaded 1B INT8 LLM
  and three 400-token documents?
details:
  realistic_solution: 'Diagnose by timing: prefill of 2048 tokens at Tensor G3 7.5
    TOPS. For 1B INT8 model (2B ops per forward token): 2048 tokens * 2B ops / 7.5e12
    TOPS * efficiency_factor(0.3) = 2048 * 2e9 / (7.5e12 * 0.3) = 1.82s. Plus overhead:
    tokenization (50ms), document loading from SQLite (200ms), embedding for retrieval
    (300ms), FAISS search (50ms). Total: 50+200+300+50+1820=2420ms ≈ 2.4s for pipeline.
    If measured 4.2s: gap of 1.8s suggests cold model load from flash despite being
    ''in memory'' — iOS/Android may have evicted model from GPU memory to CPU RAM.
    Fix: verify model is in GPU/NPU memory with a warm-up ping every 30s.'
  common_mistake: 'Assuming TTFT is dominated by model weight loading (already in
    memory) or generation (which hasn''t started yet). The real culprit is prefill:
    processing the 2048-token prompt (system prompt + 3 retrieved docs + query) to
    build the KV cache before the first token can be generated.'
  napkin_math: 'Tensor G3: 7.5 TOPS. 1B INT8 prefill: each token requires 2 * num_params
    ops = 2B ops. 2048 tokens: 2048 * 2e9 = 4.096e12 ops. At 7.5e12 TOPS * 0.3 utilization
    = 2.25e12 effective TOPS: 4.096/2.25 = 1.82s prefill. Add retrieval pipeline:
    300ms embed + 50ms search = 350ms. Total minimum: 2.17s. If 4.2s observed: 2.03s
    extra. Likely cause: model evicted from NPU cache (Tensor G3 NPU has limited persistent
    memory). Fix: keep-alive inference every 25s adds ~50ms overhead but prevents
    2s cold-NPU penalty.'
