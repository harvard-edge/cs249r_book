title: The App Store Memory Diet
scenario: You're a mobile ML engineer shipping a new on-device feature. Your model, a 150 million parameter language model, is currently in FP16 format, occupying 300 MB of storage.
question: What is the primary precision trade-off and new memory footprint when quantizing a 150M parameter model from FP16 to INT8?
details:
  realistic_solution: The primary trade-off is precision for efficiency. By reducing the number of bits per weight, the model becomes smaller and faster (especially on hardware with dedicated INT8 units like the Apple Neural Engine or Snapdragon Hexagon DSP), but there is a risk of accuracy degradation due to the loss of numerical precision. The new memory requirement is 150 MB, a 2x reduction.
  common_mistake: |
    **The Pitfall:** Confusing precision conversion scales, such as applying a 4x reduction from FP16.
    **The Rationale:** Engineers memorize that INT8 provides a "4x reduction" based on FP32 training pipelines, failing to verify their actual starting format.
    **The Consequence:** Drastically underestimating app binary size and memory footprint, leading to broken OTA updates and OOM crashes.
  napkin_math: |
    1. **Original FP16 Memory:** 150M params $\times$ 2 bytes/param = 300 MB.
    2. **INT8 Memory:** 150M params $\times$ 1 byte/param = 150 MB.
    3. **Conclusion:** Halving the bit depth results in an exact 2x reduction, making the new size **150 MB**.
  options:
  - 75 MB. Quantization from 32-bit floats provides a 4x reduction, so the 300 MB model becomes 75 MB.
  - 300 MB. Quantization to INT8 doesn't affect the stored weight size, only the precision of calculations during inference.
  - 150 MB. Each 2-byte FP16 parameter is reduced to a 1-byte INT8 parameter, halving the memory.
  - 1.2 GB. The model has 1.2 billion bits for its weights (150M x 8), which is roughly 1.2 GB.
  correct_index: 2
