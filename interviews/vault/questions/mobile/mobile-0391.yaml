title: The Cellular Energy Tax
scenario: 'Your team is building a companion app for a new electric vehicle. You want to A/B test a new
  predictive charging model that helps users find the best time to charge. The model requires 1MB of the
  user''s recent driving patterns as input. From the perspective of the user''s phone battery, which action
  is fundamentally more energy-expensive: sending that 1MB of data to the cloud for inference over 4G,
  or running the inference on the phone''s NPU, which requires ~100 MFLOPS?'
question: "Which uses more phone battery: uploading 1 MB over 4G for cloud inference or running a 100 MFLOP NPU inference?"
details:
  realistic_solution: Sending the 1MB of data is vastly more expensive. The cellular radio can consume
    1-2 Watts for the duration of the transfer, which can take a noticeable fraction of a second. In contrast,
    a modern mobile NPU (like Apple's ANE or Qualcomm's Hexagon) can perform a 100 MFLOP inference in
    microseconds, consuming a tiny fraction of that energy. The core principle is that moving data, especially
    wirelessly over kilometers, costs orders of magnitude more energy than computing on it locally. This
    is a key economic driver for on-device ML and federated learning.
  common_mistake: Engineers often underestimate the energy cost of using the cellular radio. They may
    intuitively think that a 'heavy' computation like a neural network inference must consume more power
    than 'just sending data', but the physics of wireless transmission over long distances makes it incredibly
    energy-intensive compared to on-chip computation.
  napkin_math: '### Network Energy | **Assumptions**: Average 4G data rate of 20 Mbps (2.5 MB/s); active
    radio power of 1.5W. | **Time to send 1MB**: `1 MB / 2.5 MB/s = 0.4 seconds` | **Energy**: `Power
    × Time = 1.5W × 0.4s = 0.6 Joules`'
  options:
  - The on-device inference, by about 100x
  - They are roughly equal in energy cost
  - Sending the data, by over 10,000x
  - Sending the data, but only by about 10x
  correct_index: 2
