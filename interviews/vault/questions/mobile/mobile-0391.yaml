title: The Cellular Energy Tax
scenario: Your team is building a companion app for a new electric vehicle. You want to A/B test a predictive charging model that requires 1MB of the user's recent driving patterns as input.
question: "Which uses more phone battery: uploading 1 MB over 4G for cloud inference or running a 100 MFLOP NPU inference?"
details:
  realistic_solution: |
    Sending the 1MB of data is vastly more expensive. The cellular radio can consume 1-2 Watts for the duration of the transfer, which can take a noticeable fraction of a second. In contrast, a modern mobile NPU (like Apple's ANE or Qualcomm's Hexagon) can perform a 100 MFLOP inference in microseconds, consuming a tiny fraction of that energy. The core principle is that moving data, especially wirelessly over kilometers, costs orders of magnitude more energy than computing on it locally. This is a key economic driver for on-device ML and federated learning.
  common_mistake: |
    **The Pitfall:** Underestimating the energy cost of the cellular radio.
    **The Rationale:** Engineers intuitively think a 'heavy' NN computation consumes more power than 'just sending data'.
    **The Consequence:** Unnecessary cloud offloading that drains user batteries far faster than local execution.
  napkin_math: |
    - **Network Rate:** Average 4G data rate of 20 Mbps (2.5 MB/s).
    - **Radio Power:** Active radio draws ~1.5W.
    - **Upload Time:** 1 MB / 2.5 MB/s = 0.4 seconds.
    - **Network Energy:** 1.5W * 0.4s = 0.6 Joules.
    - **NPU Energy:** 100 MFLOP inference takes microseconds and costs ~0.0001 Joules.
    - **Result:** **Sending data over 4G is thousands of times more energy-expensive than local NPU computation.**
  options:
  - The on-device inference, by about 100x
  - They are roughly equal in energy cost
  - Sending the data, by over 10,000x
  - Sending the data, but only by about 10x
  correct_index: 2
