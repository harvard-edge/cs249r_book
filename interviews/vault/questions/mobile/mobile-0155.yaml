title: The Battery Drain A/B Test
scenario: You are preparing to A/B test a new, more powerful on-device ranking model ('Model B') against
  the current production version ('Model A'). The primary operational concern is the impact on user battery
  life. The model is active for an average of 10 minutes per user per day.
details:
  realistic_solution: The correct approach is to first calculate the power *delta* between the two models.
    Then, calculate the total time the model is active per day. Finally, multiply the power delta by the
    total active time (in hours) to find the total extra energy consumed. This provides a clear, actionable
    metric for the 'go/no-go' decision on the A/B test.
  common_mistake: The most common mistake is confusing power (an instantaneous rate, measured in Watts)
    with energy (power applied over time, measured in Watt-hours). Engineers will often report the power
    delta (e.g., 'Model B uses 1W more') without factoring in the duty cycle (how long and how often it's
    used). This fails to quantify the actual impact on the phone's battery reserve.
  napkin_math: 1. **Calculate Power Delta:** The additional power consumed by Model B is `P_delta = P_model_B
    - P_model_A = 4W - 3W = 1W`. 2. **Calculate Energy Delta:** `E_delta = P_delta * time = 1W * (10 /
    60) hours = ~0.167 Wh`.
  options:
  - 1.0 W
  - 600 Wh
  - ~0.17 Wh
  - ~0.67 Wh
  correct_index: 2
