title: Cortex-X4 vs Hexagon TOPS/W on a 10 GOPS Workload
scenario: A camera-preview filter on Snapdragon 8 Gen 3 must sustain 10 GOPS of INT8
  MAC throughput. The two candidate placements are (a) the Cortex-X4 prime CPU core
  at 3.4 GHz running NEON SDOT (4 INT8 MACs per cycle per lane, two 128-bit NEON pipes,
  ~2.0 W when fully utilised), and (b) the Hexagon NPU (45 TOPS peak INT8, ~3.5 W
  when fully utilised). The team has hard numbers - Cortex-X4 SDOT throughput at full
  utilisation is ~27 GOPS at 2.0 W; Hexagon at 10 GOPS demand draws ~0.78 W (linear
  DVFS scaling in the unsaturated regime) and runs the workload at ~22% utilisation.
question: Compute realised TOPS/W (operations per joule, in GOPS/W) for each placement
  at the 10 GOPS demand point, identify which is more efficient and by what factor,
  and explain in two sentences why the architectural source of the gap is dominated
  by per-operation control overhead rather than peak compute density.
details:
  realistic_solution: 'Cortex-X4 placement: 10 GOPS / 27 GOPS peak = 37% utilisation;
    the core is not perfectly DVFS-scalable at this rate (ALU leakage and L1 maintenance
    dominate), so realistic power draw is ~1.0 W when delivering 10 GOPS. TOPS/W (more
    precisely GOPS/W) = 10 / 1.0 = 10 GOPS/W. Hexagon NPU placement: 10 GOPS at 0.78
    W -> 12.8 GOPS/W. Naively the NPU wins by only 1.3x at this demand point, but
    at peak (45 GOPS at 3.5 W = 12.86 GOPS/W on the NPU, vs 27 GOPS at 2.0 W = 13.5
    GOPS/W on Cortex-X4) the two are comparable. The architectural gap is driven by
    per-operation control overhead - the Cortex-X4 spends ~70% of its energy on instruction
    fetch/decode, register-rename, branch prediction, and coherent L1 traffic, leaving
    only ~30% for the actual MAC; the Hexagon issues a single VTCM-resident tensor
    instruction that drives a 1024-wide MAC array for hundreds of cycles, so the per-MAC
    control tax is amortised across the array. The energy gap widens dramatically
    as the workload scales: at 30 GOPS, NPU stays at 12.8 GOPS/W while the X4 hits
    a thermal wall.'
  common_mistake: Citing peak TOPS/W from a datasheet (e.g., 45 TOPS / 3.5 W = 12.9
    GOPS/W) instead of computing the realised efficiency at the actual demand point
    - at 10 GOPS the NPU is only 22% utilised, and static rail and SRAM keep-alive
    power dominate dynamic compute energy.
  napkin_math: 'Cortex-X4 at 10 GOPS: ~1.0 W -> 10 GOPS/W. Hexagon at 10 GOPS: 0.78
    W -> 12.8 GOPS/W. NPU advantage at this demand ~1.3x. NPU wins decisively only
    as workload scales toward its peak.'
