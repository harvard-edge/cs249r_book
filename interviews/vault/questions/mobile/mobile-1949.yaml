title: CPU vs NPU Power Efficiency
scenario: A mobile app needs to execute 10 billion MACs per second. The workload can
  run on the CPU or the Snapdragon 8 Gen 3 NPU.
question: Explain why the NPU yields better TOPS/W than the CPU for this dense MAC
  workload.
details:
  realistic_solution: The NPU possesses localized SRAM and arrays of dedicated Multiply-Accumulate
    units built strictly for tensor math, avoiding the CPU's instruction fetch, decode,
    and cache-miss overhead. This yields a drastically higher Performance-per-Watt
    (TOPS/W).
  common_mistake: Answering that the NPU is just 'faster' rather than specifically
    explaining the architectural energy efficiency (TOPS/W).
  napkin_math: 10 GOPS << 45 TOPS limit
