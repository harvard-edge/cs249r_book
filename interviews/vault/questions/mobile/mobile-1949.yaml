title: Cortex-X4 vs Hexagon TOPS/W on a 10 GOPS Workload
scenario: A camera-preview filter must sustain 10 GOPS of INT8 MAC throughput. The candidates are a Cortex-X4 prime CPU core at 3.4 GHz running NEON SDOT, or a Hexagon NPU.
question: Compute realized TOPS/W (GOPS/W) for each placement at the 10 GOPS demand point, identify which is more efficient, and explain the architectural source of the gap.
details:
  realistic_solution: The NPU achieves higher efficiency due to the amortization of control overhead. The Cortex-X4 expends massive dynamic power on instruction fetch, decode, register renaming, and branch prediction per NEON instruction. Conversely, the Hexagon NPU issues singular tensor instructions that drive wide VLIW/systolic arrays for hundreds of cycles, minimizing the Von Neumann tax per MAC operation.
  common_mistake: |
    **The Pitfall:** Using peak spec sheet efficiency for partial loads.
    **The Rationale:** Candidates divide 45 TOPS by 3.5 W to get peak GOPS/W, assuming efficiency is perfectly linear at 22% utilization.
    **The Consequence:** They overestimate the NPU's advantage at low workloads, ignoring that static power (SRAM keep-alive, rail leakage) dominates at low utilization.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target throughput: 10 GOPS.
    - Cortex-X4 at 10 GOPS draws ~1.0 W.
    - Hexagon NPU at 10 GOPS draws ~0.78 W.

    **Calculations:**
    - Cortex-X4 GOPS/W: 10 / 1.0 = 10 GOPS/W.
    - Hexagon NPU GOPS/W: 10 / 0.78 = 12.8 GOPS/W.
    - Advantage: 12.8 / 10 = 1.28x.

    **Conclusion & Interpretation:**
    - **Result: 12.8 GOPS/W (NPU) (Energy-Bound)**. The workload is energy-bound at partial utilization, favoring the NPU's lower control overhead.
