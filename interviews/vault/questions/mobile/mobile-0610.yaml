title: The NPU Utilization Paradox
scenario: You're profiling an on-device LLM (3B params, INT4) on an Apple A18 Pro. Xcode Instruments shows the Neural Engine at 100% utilization during autoregressive decoding, yet you're only getting 15 tokens/second — far below the theoretical maximum. The ANE is rated at 38 TOPS (INT8). At INT4, effective throughput should be even higher.
question: Why does a 3B INT4 LLM on A18 Pro reach 100% Neural Engine utilization but only 15 tokens/sec?
details:
  realistic_solution: 'The ANE utilization metric counts cycles where the ANE is powered on and dispatched — not cycles where the MAC units are doing useful work. During LLM decoding, the ANE is **memory-bandwidth bound**, not compute-bound.'
  common_mistake: |
    **The Pitfall:** Thinking 100% utilization means the compute units are saturated.
    **The Rationale:** Candidates assume "100% busy" implies maximum efficiency and ignore that the ANE spends most of its time waiting for data.
    **The Consequence:** Recommending a "faster chip" instead of addressing the memory bottleneck.
  napkin_math: |
    - ANE: 38 TOPS (INT8) = 76 TOPS (INT4 equivalent).
    - Compute per token: 2 * 3B = 6 GFLOP.
    - Compute time: 6G / 76T = **0.08ms** (negligible).
    - Memory load: 1.5 GB weights + 130 MB KV = 1.63 GB.
    - At 35 GB/s bandwidth: **46.6ms**.
    - Compute-to-memory ratio = 0.08 / 46.6 = **0.17%**.
    - **The ANE is dispatched for 46.6ms but active for 0.08ms. Effective compute efficiency is 0.17%.**
