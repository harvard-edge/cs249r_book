title: The NPU Utilization Paradox
scenario: You are profiling an on-device LLM (3B params, INT4) on an Apple A18 Pro. Xcode Instruments shows the Neural Engine at 100% utilization during autoregressive decoding, yet you are only achieving 15 tokens/second.
question: Why does a 3B INT4 LLM on A18 Pro reach 100% Neural Engine utilization but only 15 tokens/sec?
details:
  realistic_solution: 'The ANE utilization metric counts cycles where the ANE is powered on and dispatched — not cycles where the MAC units are doing useful work. During auto-regressive LLM decoding (batch size 1), the ANE is severely memory-bandwidth bound. It spends nearly all its "100% utilized" time waiting for weights and the KV cache to stream from LPDDR5 RAM.'
  common_mistake: |
    **The Pitfall:** Assuming 100% utilization means the compute units are saturated.
    **The Rationale:** Candidates assume "100% busy" implies maximum efficiency and ignore that the ANE spends most of its time blocked waiting for data.
    **The Consequence:** Recommending an architectural redesign for "faster compute" instead of addressing the memory bottleneck via techniques like speculative decoding or further quantization.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model: 3B parameters, INT4 (1.5 GB weights).
       - ANE Compute: 38 TOPS (INT8), ~76 TOPS (INT4 equivalent).
       - Bandwidth: ~35 GB/s effective.
       - KV Cache: ~130 MB.
    2. **Calculations:**
       - Compute per token: 2 * 3B = 6 GFLOP.
       - Compute time: 6 GFLOP / 76 TOPS = 0.08ms.
       - Memory load per token: 1.5 GB (weights) + 0.13 GB (KV) = 1.63 GB.
       - Memory IO time: 1.63 GB / 35 GB/s = 46.6ms.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bandwidth-Bound**. The compute-to-memory ratio is 0.08ms / 46.6ms = 0.17%. The ANE is active for 46.6ms but only does useful compute for 0.08ms.
