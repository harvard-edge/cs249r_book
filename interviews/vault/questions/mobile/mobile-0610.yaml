title: The NPU Utilization Paradox
scenario: You're profiling an on-device LLM (3B params, INT4) on an Apple A18 Pro. Xcode Instruments shows
  the Neural Engine at 100% utilization during autoregressive decoding, yet you're only getting 15 tokens/second
  — far below the theoretical maximum. The ANE is rated at 38 TOPS (INT8). At INT4, effective throughput
  should be even higher. Where are the tokens going?
details:
  realistic_solution: 'The ANE utilization metric counts cycles where the ANE is powered on and dispatched
    — not cycles where the MAC units are doing useful work. During LLM decoding, the ANE is **memory-bandwidth
    bound**, not compute-bound:'
  common_mistake: '"The ANE is compute-saturated — you need a faster chip." 100% utilization does not
    mean 100% efficiency. The ANE can be 100% "busy" while spending most of its time waiting for data.'
  napkin_math: 'ANE: 38 TOPS (INT8) = 76 TOPS (INT4 equivalent). Compute per token: 2 × 3B = 6 GFLOP.
    Compute time: 6G / 76T = **0.08ms** (negligible). Memory load: 1.5 GB weights + 130 MB KV = 1.63 GB.
    At 35 GB/s: **46.6ms**. Compute-to-memory ratio: 0.08 / 46.6 = **0.17%** — the ANE spends 99.83% of
    its time waiting for data. "100% utilization" means the ANE is dispatched for 46.6ms per token, but
    the MAC arrays are active for only 0.08ms. The utilization metric is misleading — **effective compute
    efficiency is 0.17%**.'
