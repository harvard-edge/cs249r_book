title: 'Kernel Fusion: Evaluate Core ML vs ONNX Runtime Fusion for iPhone LLM'
scenario: Compare Core ML (A17 Pro Neural Engine, 35 TOPS) vs ONNX Runtime (iOS, CPU/GPU) for running
  a 1B INT4 quantized LLM. Evaluate kernel fusion depth, tokenization throughput, first-token latency,
  and subsequent-token latency.
question: "How would you evaluate kernel fusion depth, tokenization throughput, first-token latency, and subsequent-token latency?"
details:
  realistic_solution: 'Core ML: deep hardware integration, Neural Engine optimized, automatic fusion,
    but limited operator support for cutting-edge quantization schemes. ONNX Runtime: more flexible operator
    support, good for INT4 via specific EPs, may run on CPU or GPU. For latest quantization, may need
    custom Metal shaders.'
  common_mistake: Assuming Core ML always wins on Apple hardware; not knowing that ONNX Runtime with CoreML
    EP may offer different tradeoffs, and that 4-bit quantization support differs.
  napkin_math: '1B INT4 model: 0.5GB storage. Prefill (batch=1, 512 token prompt): 512 × 1B × 6 FLOPs
    = 3.072T FLOPs. Neural Engine 35 TOPS: 3.072T / 35T = 87.8ms prefill. Core ML overhead (model load
    + first pass): ~100ms. Total TTFT: ~200ms. Decode: 1 token. Weight reads: 500MB / 68 GB/s = 7.35ms/token.
    Neural Engine at 35 TOPS: 1B × 6 FLOPs / 35T = 0.17ms compute. Bottleneck: memory bandwidth 7.35ms
    → ~136 tokens/sec = 7.35ms/token → 136 tokens/sec. ONNX Runtime on CPU (6-core A17 Pro, 6 × 2GFLOPS
    = 12 GFLOPS INT8): 3.072T / 12G = 256 seconds for prefill — far too slow. Metal GPU: 16 TFLOPS FP16
    → 3.072T / 16T = 192ms prefill. Decode via GPU: 500MB at GPU bandwidth 68 GB/s = 7.35ms/token. Similar.
    Core ML with NE: fastest for operations the NE supports.'
