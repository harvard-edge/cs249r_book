title: Hexagon NPU Telemetry Bottleneck
scenario: You are monitoring a real-time computer vision model deployed on a mobile
  device powered by the Qualcomm Hexagon NPU (Snapdragon 8 Gen 3). Despite the NPU
  being capable of 45 TOPS INT8, your production health dashboards show frequent stragglers
  and high tail latency. You discover that the telemetry agent is polling NPU performance
  counters per-frame and writing raw logs directly to the shared 16 GB LPDDR5X memory,
  causing memory contention with the heterogeneous CPU+GPU+NPU pipeline. You need
  to diagnose this bottleneck and quantify the performance reclaimed by optimizing
  the observability pipeline.
question: How would you redesign Hexagon NPU telemetry to avoid per-frame memory and
  CPU overhead?
details:
  realistic_solution: The correct approach is to implement on-chip aggregation using
    the Hexagon NPU's tightly coupled memory (SRAM) to accumulate telemetry metrics
    (like execution time and hardware faults) over multiple frames. By batching these
    metrics and performing a single DMA transfer to the shared LPDDR5X memory once
    every second, you drastically reduce memory bus transactions and eliminate the
    contention, restoring the NPU's full compute utilization.
  common_mistake: Candidates often suggest simply disabling telemetry or moving the
    logging to an asynchronous CPU thread, failing to realize that the bottleneck
    is the frequent NPU-to-memory writes and bus contention on the shared LPDDR5X
    memory. They miss the architectural interaction between the NPU and the shared
    memory controller.
  napkin_math: At 60 FPS, per-frame logging generates 60 memory write syncs per second.
    If each unoptimized write and NPU-CPU sync stalls the NPU pipeline for 5ms, the
    total stall time is 300ms per second (30% overhead). The NPU's theoretical 45
    TOPS INT8 is effectively reduced to 31.5 TOPS (70% utilization). By batching telemetry
    to 1 write per second, the stall time drops to 5ms per second (0.5% overhead),
    reclaiming 29.5% of compute capacity and restoring the effective throughput to
    44.7 TOPS INT8.
