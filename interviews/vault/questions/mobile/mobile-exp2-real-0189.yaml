title: NPU Memory Contention in Shared LPDDR5X Systems
scenario: You are deploying a real-time semantic segmentation model on the Samsung Exynos 2400 NPU for
  an augmented reality application. The model is currently running at 15 FPS, well below the 30 FPS target.
  Profiling traces indicate that the dual-core NPU is only operating at a fraction of its 34.7 TOPS capacity.
  Given that the Exynos 2400 relies on a shared 12 GB LPDDR5X memory pool across the CPU, GPU, ISP, and
  NPU, how do you evaluate the memory trace to identify the bottleneck, and what architectural adjustments
  do you make to the model's execution graph to hit your latency target?
question: "How should Exynos 2400 traces reveal LPDDR5X contention that keeps semantic segmentation at 15 FPS?"
details:
  realistic_solution: A strong candidate will diagnose that the low NPU utilization is an I/O bottleneck
    caused by the shared LPDDR5X memory subsystem. They will propose analyzing the flame graphs to identify
    which layers trigger off-chip memory access for intermediate activations. The architectural fix involves
    applying layer fusion (e.g., fusing Conv-BN-Relu or consecutive convolutions) to ensure intermediate
    feature maps fit entirely within the dual-core NPU's local SRAM, drastically reducing trips to main
    memory and allowing the compute units to run without stalling.
  common_mistake: Candidates often assume the issue is either a pure compute bottleneck or that the NPU
    is simply unsupported, completely ignoring system-level resource contention. They frequently propose
    generic model compression techniques (like aggressively pruning filters) without analyzing the trace
    to discover that the NPU is actually stalling on memory fetches due to bandwidth contention with the
    ISP and GPU.
  napkin_math: 'Compute needed: 200 GOPS/frame. At 30 FPS, required compute = 200 * 30 = 6 TOPS. The Exynos
    2400 NPU has 34.7 TOPS, so compute is abundant (6 / 34.7 = ~17% utilization needed). Memory footprint:
    without fusion, the model spills 40 MB of activations to RAM per frame. Required bandwidth = 40 MB
    * 30 FPS = 1.2 GB/s. However, the ISP (camera) and GPU (AR rendering) might be consuming 80-90% of
    the LPDDR5X bandwidth, increasing memory latency and stalling the NPU to 66.6ms per frame (15 FPS).
    By fusing layers, intermediate activations are kept in SRAM, reducing off-chip traffic to 5 MB/frame
    (150 MB/s). This eliminates the wait time for memory fetches, bringing the execution time down to
    <33.3ms and hitting 30 FPS.'
