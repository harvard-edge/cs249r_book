title: Architecting Thermal-Aware Sustained Video Processing on A17 Pro
scenario: You are architecting a real-time video super-resolution pipeline for a flagship
  mobile application targeting the Apple A17 Pro. The workload is scheduled on the
  16-core Neural Engine, which shares 8 GB of unified memory with the CPU and GPU.
  While the Neural Engine can achieve a peak of 35 TOPS at roughly 5W, continuous
  video processing quickly hits thermal limits, leading to aggressive throttling and
  dropped frames. Architect a system-level execution strategy that sustains 30 FPS
  processing under a strict 2W continuous thermal envelope, detailing how you manage
  model selection, memory bandwidth, and thermal feedback loops.
question: How should an A17 Pro video super-resolution pipeline sustain 30 FPS under
  a 2W thermal envelope?
details:
  realistic_solution: An L5 architect would design a dynamic, multi-tier pipeline
    with thermal-aware scheduling. The primary model must be quantized and sized to
    fit within the sustained power budget, prioritizing on-chip SRAM to minimize expensive
    unified memory accesses. Furthermore, the architecture should include a control
    loop that monitors SoC temperature and seamlessly degrades to a lighter model
    variant before hardware thermal throttling kicks in, ensuring consistent framerates.
  common_mistake: Candidates often design pipelines assuming the peak 35 TOPS at 5W
    capability is continuously available, leading to inevitable thermal throttling.
    They also frequently overlook the high power cost of constant read/writes to the
    shared 8 GB unified memory, missing the need for aggressive on-chip caching and
    temporal tiling.
  napkin_math: Peak A17 Pro NE efficiency = 35 TOPS / 5W = 7 TOPS/W. Sustained thermal
    budget = 2W. Available sustained compute = 2W * 7 TOPS/W = 14 TOPS. Target frame
    rate = 30 FPS. Maximum compute budget per frame = 14 TOPS / 30 FPS = 0.46 Tera-Operations
    per frame. To guarantee sustained performance without thermal throttling, the
    chosen model architecture must require less than 0.46 T-Ops per forward pass.
