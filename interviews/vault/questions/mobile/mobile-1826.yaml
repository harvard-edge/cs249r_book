title: 'Mobile Offline Serving Spec'
scenario: A mobile chat feature must work offline for 10 turns, synchronize when online, and never upload raw prompts. Specify the serving architecture requirements for local inference plus cloud sync.
question: What serving requirements ensure a mobile chat feature works offline for 10 turns without uploading raw prompts?
details:
  realistic_solution: 'The spec should include local model versioning, encrypted local context storage, KV/context budget for 10 turns, sync of derived telemetry only, cloud fallback policy, battery and thermal limits, and deletion controls. Offline serving is a privacy and resource-management problem, not just a local model call.'
  common_mistake: |
    **The Pitfall:** Designing the mobile serving system like a stateless cloud endpoint.
    **The Rationale:** Forgetting that local devices have strict memory limits for context storage and stringent privacy constraints.
    **The Consequence:** Exhausting local memory on turn 3 and accidentally syncing raw PII prompts to the cloud.
  napkin_math: |
    **Assumptions & Constraints:**
    - Average retained context: 1,000 tokens per turn.
    - Total turns: 10 turns.

    **Calculations:**
    - Context capacity: 1,000 tokens * 10 = 10,000 tokens.

    **Conclusion & Interpretation:**
    - **Result: 10,000 tokens (Memory-Capacity Bound)**. Must implement eviction or summarization if the NPU context limit is < 10K tokens.
