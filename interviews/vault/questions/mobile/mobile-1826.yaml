title: Mobile Offline Serving Spec
scenario: A mobile chat feature must work offline for 10 turns, synchronize when online,
  and never upload raw prompts. Specify the serving architecture requirements for
  local inference plus cloud sync.
question: What serving requirements make an offline mobile chat feature usable for
  10 turns without uploading raw prompts?
details:
  realistic_solution: The spec should include local model versioning, encrypted local
    context storage, KV/context budget for 10 turns, sync of derived telemetry only,
    cloud fallback policy, battery and thermal limits, and deletion controls. Offline
    serving is a privacy and resource-management problem, not just a local model call.
  common_mistake: Designing the system like a cloud chat endpoint and forgetting local
    storage, privacy, and device limits.
  napkin_math: If a rough planning assumption is 1,000 tokens of retained context
    per turn, 10 turns require about 10,000 tokens unless the app summarizes or evicts
    older context. The exact budget needs measured prompt and response lengths.
