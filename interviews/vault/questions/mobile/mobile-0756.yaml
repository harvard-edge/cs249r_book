title: The Depthwise Separable Convolution Dividend
scenario: You are porting a server-side image classifier to mobile. The heaviest layer is a standard 3x3 convolution with 256 input and 256 output channels. A colleague suggests replacing it with a depthwise separable convolution.
question: By what factor does this reduce the multiply-accumulate operations per spatial position?
details:
  realistic_solution: Refactoring into a depthwise separable convolution splits the operation into a 3x3 spatial filter and a 1x1 pointwise projection. This drastically cuts MACs by taking advantage of channel independence before mixing, enabling real-time edge execution.
  common_mistake: |
    **The Pitfall:** Guessing a small, linear factor like a 2-3x reduction.
    **The Rationale:** Candidates underestimate the quadratic savings that scale with the number of output channels, missing the core motivation behind MobileNet architectures.
    **The Consequence:** Failing to realize the massive computational savings (8-9x) that make deep CNNs viable on mobile edge devices.
  napkin_math: |
    **Assumptions & Constraints:**
    - Standard Conv: C_in=256, C_out=256, K=3.
    - Depthwise Separable: C_in=256, C_out=256, K=3.

    **Calculations:**
    - Standard MACs per position: C_in * C_out * K^2 = 256 * 256 * 9 = 589,824 MACs.
    - Depthwise Separable MACs: (C_in * K^2) + (C_in * C_out) = (256 * 9) + (256 * 256) = 2,304 + 65,536 = 67,840 MACs.
    - Reduction Factor: 589,824 / 67,840 = 8.69x.

    **Conclusion & Interpretation:**
    - **Result: ~8.7x reduction (Compute-Bound)**. This architectural shift is mandatory to fit deep CNNs within NPU compute ceilings.
  options:
  - 'A) ~2.0x (Trap: assuming it just splits one convolution into two equal halves).'
  - 'B) ~4.5x (Trap: omitting the pointwise projection cost).'
  - 'C) ~8.7x (Correct).'
  - 'D) ~256x (Trap: assuming it scales perfectly with channel depth alone).'
  correct_index: 2
