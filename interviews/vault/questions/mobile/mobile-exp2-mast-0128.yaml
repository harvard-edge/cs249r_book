title: On-Device LLM Budgeting for Snapdragon 8 Gen 3
scenario: You are designing an on-device conversational agent using a 7B parameter LLM deployed on a smartphone
  with a Snapdragon 8 Gen 3 SoC. The device has 12 GB of shared LPDDR5X memory, but the OS and background
  apps permanently reserve 6 GB. You must design an inference architecture that maximizes the 45 TOPS
  INT8 throughput of the Qualcomm Hexagon NPU while strictly adhering to the remaining 6 GB unified memory
  budget for weights, activations, and KV-cache, ensuring support for a 4096-token context window.
question: "How should a 7B on-device LLM be budgeted for Snapdragon 8 Gen 3 under a 6 GB memory cap?"
details:
  realistic_solution: A robust L6+ solution involves aggressively quantizing the 7B model weights to 4-bit
    (e.g., AWQ or GPTQ) to reduce the parameter footprint to ~3.5 GB, as INT8 weights alone would exceed
    the 6 GB budget. The remaining 2.5 GB must accommodate the KV-cache and activations. The candidate
    should propose INT8 quantization for the KV-cache to halve its size and design a heterogeneous pipeline
    where the NPU handles the compute-heavy self-attention in INT8, leveraging the unified LPDDR5X architecture
    to avoid expensive memory copies between the CPU and NPU.
  common_mistake: Candidates often forget that mobile memory is unified and assume dedicated VRAM, leading
    to OOM kills when the OS reclaims RAM. They also frequently focus solely on weight quantization (e.g.,
    INT8 weights taking 7GB, which exceeds the budget) and overlook the massive memory footprint of the
    unquantized KV-cache at full context length.
  napkin_math: 'Total Memory Budget: 12 GB - 6 GB (OS) = 6 GB. 7B Model Weights at 4-bit: 7 billion *
    0.5 bytes = 3.5 GB. Standard FP16 KV-cache per token: 2 (K,V) * 32 layers * 32 heads * 128 (head dim)
    * 2 bytes = 512 KB. For 4096 tokens in FP16, this is 4096 * 512 KB = 2.0 GB. Total required so far:
    3.5 GB (weights) + 2.0 GB (KV-cache) = 5.5 GB. This fits within the 6 GB budget, leaving 500 MB for
    activations and I/O buffers to keep the Hexagon NPU''s 45 TOPS fed. Quantizing the KV-cache to INT8
    would further reduce it to 1.0 GB, increasing the safety margin.'
