title: Mixed-Precision Footprint on Hexagon NPU
scenario: 'You are deploying a 1.5 billion parameter transformer model on the Qualcomm Hexagon NPU (Snapdragon
  8 Gen 3). The device utilizes a shared 12-16 GB LPDDR5X memory pool across its heterogeneous compute
  units. To balance generation accuracy and latency, you employ a mixed-precision inference strategy:
  300 million parameters in the attention mechanisms are kept in FP16, while the remaining 1.2 billion
  parameters in the feed-forward networks are quantized to INT8. Calculate the exact memory footprint
  for the model weights in gigabytes, and determine the theoretical minimum compute time in microseconds
  to process the INT8 layers for a single token generation.'
details:
  realistic_solution: The correct approach calculates the memory for the FP16 and INT8 partitions separately,
    verifying the 1.8 GB total easily fits within the shared 12-16 GB LPDDR5X allocation. For compute
    latency, the INT8 parameter count is translated into total operations (1 weight = 1 MAC = 2 OPs for
    dense matrix-vector multiplication) and divided by the NPU's peak 45 TOPS throughput.
  common_mistake: Candidates often forget that FP16 requires 2 bytes per parameter while INT8 requires
    1 byte, leading to incorrect memory footprint calculations. Additionally, they frequently confuse
    MACs (Multiply-Accumulate operations) with operations (OPs), failing to multiply the parameter count
    by 2 when evaluating against the 45 TOPS spec.
  napkin_math: '1. Memory Footprint: (300M params * 2 bytes/param for FP16) + (1.2B params * 1 byte/param
    for INT8) = 600 MB + 1200 MB = 1800 MB = 1.8 GB. 2. INT8 Compute: 1.2B parameters = 1.2B MACs per
    token. 3. Total INT8 OPs = 1.2B MACs * 2 OPs/MAC = 2.4 Billion OPs = 0.0024 TOPS. 4. Minimum Compute
    Time = 0.0024 TOPS / 45 TOPS (Hexagon NPU spec) = 0.00005333 seconds = 53.33 microseconds.'
