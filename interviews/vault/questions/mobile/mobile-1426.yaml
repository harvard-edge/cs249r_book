title: Optimizing High-Frequency Sensor Ingestion on A17 Pro
scenario: An AR sports app processes 120Hz 4K video and 1000Hz IMU data on an Apple A17 Pro. CPU-bound IMU preprocessing starves the NPU and GPU of unified memory bandwidth, causing dropped frames.
question: How should the high-frequency IMU ingestion be optimized to unblock video processing and stay within a 5W envelope?
details:
  realistic_solution: The solution is to decouple the high-frequency IMU ingestion from the heavy video processing frame rate. Instead of interrupting the CPU 1000 times a second, batch the IMU data into larger chunks (e.g., 100 samples every 100ms) using a low-power coprocessor or DMA, then process these batches. This reduces CPU wakeups, minimizes context switching overhead, and significantly reduces contention on the shared unified memory, freeing up bandwidth for the Neural Engine and GPU to process the 4K video.
  common_mistake: |
    **The Pitfall:** Moving all high-frequency preprocessing to the NPU.

    **The Rationale:** Assuming the accelerator can efficiently handle thousands of tiny, sporadic scalar operations.

    **The Consequence:** Increasing context switching overhead and failing to resolve the fundamental unified memory bus contention.
  napkin_math: |
    *   Unbatched IMU (1000Hz): 1000 CPU interrupts/sec, thrashing memory bus.
    *   Data rate: 6 DOF * 4 bytes = 24 bytes/sample.
    *   Batching approach: Process every 16.6ms (60Hz match) -> ~17 samples/batch (408 bytes).
    *   **Result:** Reduces CPU interrupts from 1000 to 60 per sec (94% reduction), freeing memory bandwidth for the NPU.
