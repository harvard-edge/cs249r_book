title: On-Device ML Data Quality for Samsung Exynos 2400 NPU
scenario: "You are tasked with building a robust on-device machine learning pipeline for a new mobile application that processes real-time sensor data (e.g., accelerometer, gyroscope, camera data) for a critical feature."
question: "Design a comprehensive data quality and validation system for this pipeline. How would you identify and handle unexpected patterns or outliers in the sensor data stream or model inferences?"
details:
  realistic_solution: "A realistic solution would involve:\n1. **Schema Validation:** Lightweight, compile-time schema definitions (e.g., Protobuf, FlatBuffers) with minimal runtime validation overhead.\n2. **Data Contracts:** Clearly defined API contracts between modules.\n3. **Quality Gates:** Simple statistical checks implemented as custom NPU operations or tightly integrated pre-processing steps.\n4. **Lineage Tracking:** Minimal metadata propagation embedded within data samples.\n5. **Anomaly Detection:** On-device, NPU-accelerated anomaly detection using highly optimized, quantized neural networks (e.g., shallow LSTMs, small autoencoders) deployed to leverage the hardware for real-time inference without significant power draw."
  common_mistake: |
    **The Pitfall:** Proposing server-side validation or heavy-weight data pipeline solutions.
    **The Rationale:** Candidates fail to adapt their cloud-centric data engineering intuition to the edge, ignoring extreme constraints on TOPS, memory, and power.
    **The Consequence:** The proposed validation steps exceed the latency budget and drain the battery, leading to unviable on-device execution.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - NPU budget: 34.7 TOPS. Memory: 12 GB.
       - Target FPS: 30 FPS. Total inference loop budget: 100 ms.
       - Primary model takes 80 ms and ~100 GOPs per inference.
    2. **Calculations:**
       - Primary inference compute = 100 GOPs * 30 FPS = 3,000 GOPS (3 TOPS).
       - Remaining compute budget = 34.7 TOPS - 3 TOPS = 31.7 TOPS.
       - Remaining latency budget = 100 ms - 80 ms = 20 ms.
    3. **Conclusion & Interpretation:**
       - **Result: Latency-Bound.** While compute headroom is massive (31.7 TOPS), the strict 20 ms remaining latency demands ultra-lightweight, quantized anomaly detection models to avoid missing real-time deadlines.
