title: 'MLOps Lifecycle: Optimize Mobile App CI/CD Pipeline for ML Model Updates'
scenario: A mobile ML team's current CI/CD pipeline for CoreML model updates takes 4.3 hours: model training (2hr), ONNX export (5min), CoreML conversion (15min), automated testing on device farm (1.5hr), and App Store submission (30min). The target is < 2.5 hours total.
question: "What is the most effective way to optimize the non-training stages of the CI/CD pipeline to drastically reduce the total time?"
details:
  realistic_solution: 'Parallelize the 1.5-hour device farm testing stage by sharding tests concurrently, and decouple model updates from App Store submission by using Over-The-Air (OTA) deployments.'
  common_mistake: |
    **The Pitfall:** Focusing optimization efforts on the compute-bound model training phase.
    **The Rationale:** Engineers instinctively try to speed up the longest single step (training), ignoring that training has hard compute constraints and is less malleable than pipeline logistics.
    **The Consequence:** Marginal gains are achieved at high engineering cost, while massive, easy time-savings in testing and deployment are ignored.
  napkin_math: |
    - **Current Non-Training Time:** 5m (ONNX) + 15m (CoreML) + 90m (Testing) + 30m (App Store) = 140 minutes.
    - **Optimized Testing:** Sharding tests drops device farm time from 90m to 15m.
    - **Optimized Deployment:** OTA updates drop App Store submission time from 30m to 0m.
    - **New Non-Training Time:** 5m + 15m + 15m + 0m = 35 minutes.
    - **Final Result:** Total pipeline time is now 120m (Training) + 35m = **155 minutes (~2.5 hours)**, successfully meeting the target.
