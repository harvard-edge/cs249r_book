title: 'MLOps Lifecycle: Optimize Mobile App CI/CD Pipeline for ML Model Updates'
scenario: 'A mobile ML team''s current CI/CD pipeline for CoreML model updates takes
  4.5 hours: model training (2hr), ONNX export (5min), CoreML conversion (15min),
  automated testing on device farm (1.5hr), App Store submission (30min). The target
  is < 2.5 hours total. Profile and optimize each stage.'
question: What is the most effective way to optimize the non-training stages of the CI/CD pipeline to drastically reduce the total time?
details:
  realistic_solution: 'Parallelize the 1.5-hour device farm testing stage. By sharding tests across multiple devices concurrently, testing time can be reduced from 90 minutes to ~15 minutes. Additionally, decoupling model updates from App Store submission by using Over-The-Air (OTA) deployments saves another 30 minutes, cutting total pipeline time significantly without altering the compute-bound training phase.'
  common_mistake: Trying to speed up model training (which requires GPUs and has hard
    compute constraints) when the device farm testing stage (1.5hr) is more easily
    optimized with parallelization.
  napkin_math: 'Current non-training time: 5m (ONNX) + 15m (CoreML) + 90m (Testing) + 30m (App Store) = 140 minutes. With parallelization in device testing: 90m -> 15m. With OTA updates: 30m -> 0m. New non-training time: 5 + 15 + 15 + 0 = 35 minutes. Total pipeline time: 120m (Training) + 35m = 155 minutes (~2.5 hours), down from 260 minutes (4.3 hours).'
