title: Thermal Management and Sustained Performance of Samsung Exynos 2400 NPU
scenario: A new mobile device, leveraging the Samsung Exynos 2400 NPU (34.7 TOPS, 12 GB LPDDR5X memory),
  is being designed for a continuous augmented reality application that requires consistent, high-intensity
  ML inference for extended periods. Explain the concept of thermal throttling in the context of this
  specific NPU and describe two common cooling strategies implemented in mobile devices to manage the
  NPU's temperature and their potential impact on the 'sustained vs burst performance' profile.
question: "How would you manage Exynos 2400 NPU thermals to sustain ML inference performance?"
details:
  realistic_solution: To ensure sustained performance, engineers must implement a robust thermal management
    unit (TMU) that dynamically adjusts the NPU's clock frequency and voltage based on temperature readings.
    Cooling strategies often include advanced passive solutions like large graphite sheets or vapor chambers
    to dissipate heat from the Exynos 2400 NPU. The system should also employ intelligent workload scheduling
    that can adapt inference batch sizes or model complexity to prevent thermal runaway, ensuring the
    NPU operates within its thermal design power (TDP) limits for the desired duration.
  common_mistake: Overlooking the significant difference between theoretical peak (burst) TOPS and real-world
    sustained TOPS in mobile NPUs due to thermal constraints, or failing to account for ambient temperature
    variations.
  napkin_math: If the Samsung Exynos 2400 NPU's peak power consumption is 12W for burst operations but
    its thermal design allows only 5W for sustained workloads, calculate the theoretical percentage drop
    in continuous processing capability assuming a linear relationship between power and performance.
    (5W / 12W) * 100% = ~41.7% of burst performance for sustained tasks.
