title: On-Device Drift Detection for Exynos 2400
scenario: You are tasked with designing an on-device data drift detection system for a real-time camera enhancement pipeline running on the Samsung Exynos 2400 NPU. The primary model processes video frames using the dual-core NPU, which provides 34.7 TOPS and shares 12 GB of LPDDR5X memory with the CPU, GPU, and ISP. Due to strict privacy requirements, raw frames cannot leave the device, but you must architect a system to detect environmental drift without starving the ISP or primary model of memory bandwidth.
question: How should an Exynos 2400 camera pipeline detect drift on device without exporting raw frames or starving ISP/NPU bandwidth?
details:
  realistic_solution: Design a lightweight architecture that extracts low-dimensional summary statistics (e.g., final pooling layer embeddings) using reservoir sampling at a low rate (e.g., 1 frame per second). The CPU can asynchronously compute approximate drift metrics like Population Stability Index (PSI) on these quantized embeddings using the shared 12 GB memory pool, allowing the NPU to dedicate its 34.7 TOPS strictly to the latency-critical camera enhancement.
  common_mistake: |
    **The Pitfall:** Proposing complex statistical metrics (like exact KL divergence) on high-dimensional raw feature maps for every frame.
    **The Rationale:** Candidates often design theoretically perfect drift detection systems without considering hardware realities.
    **The Consequence:** Continuous high-bandwidth memory access for background drift calculations degrades the real-time ISP and NPU performance.
  napkin_math: |
    - Embedding size: 256 FP16 values (512 bytes).
    - Continuous extraction (60 FPS): Writes 30 KB/s.
    - PSI rolling window (10,000 frames) storage: ~5 MB in the 12 GB LPDDR5X pool.
    - Using reservoir sampling at 1 FPS: Storage drops to 85 KB.
    - Compute required falls to <0.001 TOPS.
    - **This approach ensures the 34.7 TOPS NPU and ISP experience zero bandwidth contention.**
