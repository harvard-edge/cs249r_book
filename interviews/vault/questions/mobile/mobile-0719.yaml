title: The Mobile GPU Misconception
scenario: Your team decides to run ML inference on the mobile GPU instead of the NPU, reasoning that 'GPUs
  are great for ML.' On a Samsung Galaxy S24 (Snapdragon 8 Gen 3, Adreno 750 GPU), your model runs at
  18ms on the GPU via TFLite's GPU delegate. The same model runs at 6ms on the Hexagon NPU. The GPU has
  1.5 TFLOPS FP16 — more than enough compute. Why is the GPU 3× slower than the NPU for this workload?
details:
  realistic_solution: 'Mobile GPUs are designed for **graphics rendering**, not ML inference, and three
    architectural mismatches cause the 3× gap:'
  common_mistake: '"The GPU delegate isn''t optimized." TFLite''s GPU delegate is well-optimized — the
    issue is architectural.'
  napkin_math: 'NPU (Hexagon): 45 TOPS INT8 at 3W = 15 TOPS/W. GPU (Adreno 750): 1.5 TFLOPS FP16 at 3W
    = 0.5 TFLOPS/W. For an INT8 model (0.6 GOPS): NPU time = 0.6 / 45,000 = 0.013ms compute + 5.9ms overhead
    = 6ms. GPU time (must use FP16): 1.2 GFLOPS equivalent / 1,500 = 0.8ms compute + 17.2ms overhead (tiling,
    scheduling, dequant) = 18ms. Energy per inference: NPU = 3W × 6ms = 18 mJ. GPU = 3W × 18ms = 54 mJ.
    **3× more battery drain on GPU.**'
