title: The Mobile GPU Misconception
scenario: Your team decides to run ML inference on the mobile GPU instead of the NPU, reasoning that 'GPUs are great for ML.' On a Samsung Galaxy S24 (Snapdragon 8 Gen 3, Adreno 750 GPU), your model runs at 18ms on the GPU via TFLite's GPU delegate. The same model runs at 6ms on the Hexagon NPU. The GPU has 1.5 TFLOPS FP16 — more than enough compute.
question: Why is the GPU 3× slower than the NPU for this workload?
details:
  realistic_solution: 'Mobile GPUs are designed for **graphics rendering**, not ML inference, and three architectural mismatches cause the 3× gap.'
  common_mistake: |
    **The Pitfall:** Blaming the TFLite GPU delegate optimization.
    **The Rationale:** Candidates often assume that if a GPU is slow, it's because the software stack isn't optimized, ignoring fundamental architectural differences between mobile GPUs (graphics) and NPUs (tensor ops).
    **The Consequence:** Focusing optimization efforts on software layers when the underlying hardware is poorly suited for the task.
  napkin_math: |
    1. **NPU Compute Time:** NPU (Hexagon) has 45 TOPS INT8 at 3W = 15 TOPS/W. For an INT8 model requiring 0.6 GOPS: Compute = 0.6 GOPS / 45,000 GOPS = 0.013 ms. Total time = 0.013 ms + 5.9 ms overhead = 6 ms.
    2. **GPU Compute Time:** GPU (Adreno 750) has 1.5 TFLOPS FP16 at 3W = 0.5 TFLOPS/W. Assuming equivalent 1.2 GFLOPS work (due to FP16): Compute = 1.2 GFLOPS / 1,500 GFLOPS = 0.8 ms. Total time = 0.8 ms + 17.2 ms overhead = 18 ms.
    3. **Energy per Inference:** NPU = 3W * 6 ms = 18 mJ. GPU = 3W * 18 ms = 54 mJ.
    4. **Conclusion:** **The GPU uses 3x more battery drain and is 3x slower due to architectural overhead.**
