title: The Night Vision Quantization Failure
scenario: You are optimizing a sign detection model for a Snapdragon 8 Gen 3 phone. To meet power budgets, you quantized the FP32 model to INT8 using post-training static quantization with 10,000 daytime images. The model now fails to detect stop signs at night.
question: Why does daytime-only INT8 calibration make a sign detector miss red stop signs at night?
details:
  realistic_solution: The root cause is a calibration-inference data mismatch. The dynamic range of activations from nighttime images is much smaller than for daytime images. The INT8 scale factor, calculated from the wide-range daytime data, is too coarse to represent the fine-grained details in the low-light activations.
  common_mistake: |
    **The Pitfall:** Blaming NPU hardware bugs or model architecture.
    **The Rationale:** Failing to understand how activation dynamic range differs across lighting conditions.
    **The Consequence:** Wasting time debugging hardware when the quantization scaling factor is simply crushing low-light signals.
  napkin_math: |
    - Daytime layer activations: -8.0 to +8.0.
    - INT8 scale: 16.0 / 255 = ~0.0627.
    - Nighttime layer activations: -0.5 to +0.5.
    - Mapped levels: 1.0 / 0.0627 = ~16 levels.
    - **The nighttime signal uses only 16 out of 256 INT8 values, destroying feature information via quantization noise.**
  options:
  - The model's activations are experiencing integer overflow because nighttime images have higher-intensity pixels from headlights.
  - The Snapdragon 8 Gen 3 Hexagon DSP has a documented bug with INT8 matrix multiplications, requiring a switch to FP16.
  - The INT8 scale factor, calculated from the daytime calibration set, is too coarse for the narrow dynamic range of activations from nighttime images, causing excessive quantization noise.
  - The training dataset needs to be augmented with more varied lighting conditions and the entire FP32 model must be retrained from scratch.
  correct_index: 2
