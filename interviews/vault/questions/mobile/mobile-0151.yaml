title: The Mobile Thermal Budget
scenario: An object detection model pushes total SoC power consumption to 7W when active. Idle SoC power is 3W. The phone's sustainable thermal budget is 5W. Running continuously will cause thermal throttling.
question: What is the maximum duty cycle percentage the model can be active to stay within the 5W thermal budget?
details:
  realistic_solution: |
    The average power consumption must not exceed the 5W limit. The average power is a weighted sum of the active power (7W) and idle power (3W). Solving the linear equation for the duty cycle ensures the SoC stays within its passive cooling limits.
  common_mistake: |
    **The Pitfall:** Comparing only the model's delta power draw against the total thermal budget.
    **The Rationale:** Candidates calculate 7W - 3W = 4W, and mistakenly assume that since 4W < 5W, the model can run continuously.
    **The Consequence:** The system overhead is ignored, and the device overheats and throttles in production.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Active Power (P_active): 7W.
       - Idle Power (P_idle): 3W.
       - Thermal Budget (P_avg): 5W.
    2. **Calculations:**
       - Average power equation: P_avg = (P_active * d) + (P_idle * (1 - d))
       - 5W = (7W * d) + (3W * (1 - d))
       - 5 = 7d + 3 - 3d
       - 2 = 4d
       - d = 0.5 (50%)
    3. **Conclusion & Interpretation:**
       - **Maximum duty cycle is 50%. Bottleneck: Thermal/Power-Bound.**
  options:
  - 71%
  - 100%
  - 50%
  - 29%
