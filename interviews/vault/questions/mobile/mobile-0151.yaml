title: The Mobile Thermal Budget
scenario: You are profiling a new real-time object detection feature on a modern smartphone. You find
  that when the model is actively running, the total System-on-Chip (SoC) power consumption is 7W. When
  the model is idle, the baseline SoC power is 3W. The phone's sustainable thermal budget for the SoC
  is 5W. If you run the model continuously, the phone will quickly overheat and the OS will thermal throttle
  the chip, drastically reducing performance. To avoid this, you must run the inference intermittently.
  Explain the maximum percentage of time (duty cycle) the object detection model can be active to stay
  within the phone's sustainable thermal budget.
question: "How would you explain the maximum percentage of time (duty cycle) the object detection model can be active to stay within the phone's sustainable thermal budget?"
details:
  realistic_solution: The average power consumption over time must not exceed the sustainable thermal
    budget. We can calculate the maximum duty cycle (`d`) by setting the average power equal to the 5W
    sustainable limit. The average power is the weighted average of the active power (7W) and idle power
    (3W). This calculation determines the maximum proportion of time the power-intensive task can run
    without causing the system to overheat.
  common_mistake: A common mistake is to only compare the model's power draw (4W = 7W - 3W) against the
    thermal budget, ignoring the total system power consumption. This leads to the incorrect conclusion
    that the model can run continuously because its individual power draw is less than the 5W budget.
    The thermal budget applies to the *entire* SoC, not just the neural engine.
  napkin_math: '1. Define the average power equation: `P_avg = (P_active * d) + (P_idle * (1 - d))`'
  options:
  - 71%, calculated by the simple ratio of sustainable to active power (5W / 7W).
  - 100%, because the model's individual 4W power draw is less than the 5W budget.
  - 50%
  - 29%, based on the ratio of the power surplus to the active power ((7W-5W)/7W).
  correct_index: 2
