title: The On-Device RAG Budget
scenario: Your team wants to add an on-device Retrieval-Augmented Generation (RAG) feature to your mobile
  app, powered by a 1 Billion parameter language model. Your target high-end device has 8 GB of total
  RAM. Explain if the model's weight memory will fit within a standard application memory budget, and
  calculate the required space for FP16 inference.
details:
  realistic_solution: The model requires 2 GB of memory for its weights. While this technically fits within
    the typical 2 GB application budget (25% of 8 GB RAM), it is extremely risky. This leaves zero headroom
    for the model's activations (the KV cache), the application's UI, or any other feature, making it
    highly likely to be terminated by the OS under memory pressure.
  common_mistake: Engineers often calculate the model size correctly but then compare it against the total
    device RAM (8 GB). They forget that the operating system, background services, and the application's
    own UI and logic consume a significant portion of that memory, typically leaving only about 25% for
    the app's foreground processes.
  napkin_math: '1. **Parameters**: 1,000,000,000'
  options:
  - It needs 1 GB, so it fits easily. (Assumes INT8 precision)
  - It needs 2 GB, which is much less than the 8 GB device RAM, so it fits easily. (Ignores app budget
    constraint)
  - It needs 2 GB, which consumes the entire 25% app budget, making it too risky. (Correct)
  - It needs 4 GB, so it won't fit. (Assumes FP32 precision)
  correct_index: 2
