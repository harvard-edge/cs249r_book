title: The On-Device RAG Budget
scenario: Your team wants to add an on-device Retrieval-Augmented Generation (RAG) feature to your mobile app, powered by a 1 Billion parameter language model. Your target high-end device has 8 GB of total RAM.
question: How much memory do the FP16 weights of a 1B parameter model require, and does it fit within a standard mobile app budget?
details:
  realistic_solution: The model requires 2 GB of memory for its weights. While this technically fits within the typical 2 GB application budget (25% of 8 GB RAM), it is extremely risky. This leaves zero headroom for the model's activations (the KV cache), the application's UI, or any other feature, making it highly likely to be terminated by the OS under memory pressure.
  common_mistake: |
    **The Pitfall:** Comparing the model size against the total device RAM instead of the OS-allocated app budget.
    **The Rationale:** Engineers correctly calculate the weight size but forget that the OS, background services, and other apps consume ~75% of the device's memory.
    **The Consequence:** The application gets aggressively terminated by the OS Out-Of-Memory (OOM) killer the moment inference starts.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model size: 1,000,000,000 parameters.
       - Precision: FP16 (2 bytes per parameter).
       - Device memory budget: ~25% of 8 GB RAM = 2 GB.
    2. **Calculations:**
       - Weight Size: 1,000,000,000 * 2 bytes = 2 GB.
       - Remaining Budget: 2 GB (budget) - 2 GB (weights) = 0 GB.
    3. **Conclusion & Interpretation:** Fitting the weights consumes the entire budget, leaving **0 GB** for the KV cache or UI, meaning it is strictly **Memory-Capacity Bound**.
  options:
  - It needs 1 GB, so it fits easily.
  - It needs 2 GB, which is much less than the 8 GB device RAM, so it fits easily.
  - It needs 2 GB, which consumes the entire 25% app budget, making it too risky.
  - It needs 4 GB, so it won't fit.
  correct_index: 2
