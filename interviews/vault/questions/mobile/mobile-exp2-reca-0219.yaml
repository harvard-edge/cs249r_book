title: Unstructured vs Structured Pruning on Exynos 2400 NPU
scenario: You are optimizing an image segmentation model to run on the Samsung Exynos 2400 NPU. The NPU
  provides up to 34.7 TOPS and shares 12 GB of LPDDR5X memory with the rest of the system. You need to
  reduce the model size, and a colleague suggests applying unstructured pruning to achieve 50% sparsity.
  You must evaluate if this will actually improve inference speed on this specific hardware.
question: "Why does unstructured pruning usually fail on Exynos 2400 NPU and when does structured pruning help?"
details:
  realistic_solution: On most mobile NPUs, including the Samsung Exynos 2400 NPU, unstructured pruning
    does not result in speedups because the hardware relies on dense matrix multiplications and lacks
    the specialized sparse compute units needed to skip arbitrary zero weights. To achieve actual speedups,
    one must use structured pruning (e.g., pruning entire channels or filters) or specific hardware-supported
    sparsity patterns (like 2:4 sparsity, if supported) which actually reduce the dimensions of the matrix
    operations.
  common_mistake: Candidates often assume that any reduction in the number of non-zero weights (unstructured
    pruning) will automatically translate to proportional speedups in inference time across all hardware
    platforms.
  napkin_math: If an unpruned layer takes 10ms on the Exynos 2400 (which has 34.7 TOPS), unstructured
    pruning at 50% sparsity will still take ~10ms because the NPU will still load and multiply zeros (dense
    execution). Structured pruning that halves the number of input channels would reduce the MAC operations
    by 50%, roughly halving the time to ~5ms, leveraging the NPU's dense compute units efficiently.
