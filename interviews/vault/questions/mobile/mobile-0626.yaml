title: The Thermal Throttling Paradox
scenario: An always-on 'smart reply' feature runs continuous inference on a smartphone. Forcing the NPU to its maximum clock frequency yields 50ms latency in a 10-second test, but degrades to 90ms over 5 minutes. Letting the OS manage clocks via DVFS yields a stable 75ms latency.
question: Why does forcing maximum NPU performance result in worse sustained average latency than OS-managed clocks?
details:
  realistic_solution: 'This is a direct result of ''Thermal Throttling.'' Mobile SoCs have a strict thermal design power (TDP) budget, typically around 5W for the entire chip. Running the NPU at its absolute maximum frequency consumes a disproportionate amount of power, pushing the total SoC power consumption well over the TDP limit. The chip''s temperature rises rapidly. To prevent physical damage, the Power Management IC (PMIC) intervenes and aggressively down-clocks the NPU to a very low-power state to allow the chip to cool down. The system then enters a ''sawtooth'' pattern: a short burst of peak performance followed by a longer period of throttled, slow performance. The *average* performance over this cycle is often lower than what could have been achieved by running at a slightly lower, but thermally sustainable, clock frequency from the start.'
  common_mistake: |
    **The Pitfall:** Assuming maximum clock frequency guarantees maximum sustained performance.

    **The Rationale:** Treating mobile devices like thermally unconstrained servers rather than strictly TDP-limited systems.

    **The Consequence:** Triggering aggressive PMIC thermal throttling, leading to severely degraded average throughput.
  napkin_math: |
    *   High-perf mode: 2.5W draw, hits 45°C thermal limit in ~30s.
    *   Throttled state: Drops to 0.5W, latency spikes to 200ms.
    *   Sawtooth average: (20s @ 50ms + 40s @ 200ms) / 60s = ~150ms worst-case (or ~90ms with gradual throttling).
    *   OS-managed mode: Runs at ~60% clock, 1.2W draw.
    *   Thermal headroom: Leaves 1.8W margin, never throttles.
    *   **Result:** Sustained 75ms average comfortably outperforms the thermal sawtooth pattern.
