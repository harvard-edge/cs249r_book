title: The Thermal Throttling Paradox
scenario: An always-on 'smart reply' feature runs continuous inference on a smartphone. Forcing the NPU to its maximum clock frequency yields 50ms latency in a 10-second test, but degrades to 90ms over 5 minutes. Letting the OS manage clocks via DVFS yields a stable 75ms latency.
question: Why does forcing maximum NPU performance result in worse sustained average latency than OS-managed clocks?
details:
  realistic_solution: 'This is a direct consequence of Thermal Throttling. Mobile SoCs operate under strict Thermal Design Power (TDP) constraints (e.g., ~5W). Overriding DVFS to lock maximum clock frequencies rapidly dissipates the thermal budget, triggering the PMIC to enforce aggressive, low-power thermal mitigation states. This initiates a "sawtooth" performance profile where extended throttled recovery periods drastically degrade the sustained throughput compared to a lower, thermally stable continuous clock.'
  common_mistake: |
    **The Pitfall:** Assuming maximum clock frequency guarantees maximum sustained performance.
    **The Rationale:** Treating mobile devices like thermally unconstrained servers rather than strictly TDP-limited systems.
    **The Consequence:** Triggering aggressive PMIC thermal throttling, leading to severely degraded average throughput.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - High-perf mode: 2.5W draw, hits 45°C limit in ~30s.
       - Throttled state: Drops to 0.5W, latency 200ms.
       - OS-managed mode: Runs at ~60% clock, 1.2W draw.
    2. **Calculations:**
       - Sawtooth average: (20s @ 50ms + 40s @ 200ms) / 60s = ~150ms worst-case.
       - Thermal headroom (OS-managed): Leaves 1.8W margin, never throttles.
    3. **Conclusion & Interpretation:**
       - **Result: Thermal-Bound.** Sustained 75ms average comfortably outperforms the thermal sawtooth pattern triggered by locking maximum clocks.
