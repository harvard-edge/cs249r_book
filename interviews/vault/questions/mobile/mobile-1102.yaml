title: Mixed-Precision Bandwidth Contention on Exynos 2400
scenario: An image processing model is deployed on the Samsung Exynos 2400 NPU using a mixed-precision recipe (50% FP16, 50% FP32). When the camera is active, the ISP consumes significant memory bandwidth, and the mixed-precision model experiences a severe latency spike.
question: Why does a 50/50 FP16-FP32 model suffer extra latency under Exynos ISP load, and how much extra bandwidth does a 10M parameter layer add?
details:
  realistic_solution: The latency spike is driven by memory bandwidth contention, not compute limitations. Since the Exynos 2400 shares LPDDR5X memory among the NPU and ISP, the ISP's heavy bandwidth usage during camera operation starves the NPU. The mixed-precision model increases parameter memory traffic significantly compared to pure FP16, hitting the bandwidth ceiling. The correct approach is to keep memory-bound layers in lower precision (FP16/INT8) and only use FP32 for compute-bound layers with small footprints.
  common_mistake: |
    **The Pitfall:** Focusing on NPU compute capability (FP32 inefficiency) rather than shared memory bandwidth contention.
    **The Rationale:** Candidates assume the latency is caused by the NPU struggling with 32-bit math, forgetting that mobile SoCs route all subsystems through the same RAM bottleneck.
    **The Consequence:** Attempting to rewrite the model's math operations while the ISP continues to starve the NPU of data.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Layer parameters: 10,000,000.
       - Frame rate: 30 FPS.
    2. **Calculations:**
       - Pure FP16 Footprint: 10,000,000 * 2 bytes = 20 MB.
       - Mixed-Precision Footprint: (5,000,000 * 2) + (5,000,000 * 4) = 30 MB.
       - Difference per inference: 30 MB - 20 MB = 10 MB.
       - Bandwidth Impact: 10 MB * 30 FPS = 300 MB/s.
    3. **Conclusion & Interpretation:**
       - **Result: 300 MB/s extra bandwidth. Memory-Bandwidth-Bound.** Directly competes with the camera ISP causing the spike.
