title: The Case of the Disappearing Pixels
scenario: You are debugging a real-time object detection model. It runs at 30 FPS, but you observe a 50% accuracy drop for small objects. The training pipeline used bicubic resizing to downscale images to 640x480. On-device, the 12MP sensor uses the hardware ISP for a 'zero-cost' resize before the NPU.
question: "Why can ISP resizing from 12MP to 640x480 cause a major small-object accuracy drop despite fast NPU inference?"
details:
  realistic_solution: Hardware resizers on mobile ISPs utilize power-efficient algorithms like nearest-neighbor, creating severe training-serving skew by destroying high-frequency spatial details. Shift the training pipeline to match the ISP's specific downsampling algorithm.
  common_mistake: |
    **The Pitfall:** Assuming that if inference is fast, the hardware pipeline is working correctly.
    **The Rationale:** Engineers often focus solely on compute latency (FPS) and memory, forgetting that on mobile, the data pipeline from the sensor through the ISP can introduce subtle, lossy transformations.
    **The Consequence:** Wasting time debugging the model architecture when the issue lies entirely in the data pre-processing skew.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - ISP downscales 12MP (4000x3000) to 0.3MP (640x480).
       - Small object size: 30x30 pixels.
    2. **Calculations:**
       - Scaled Object = (30 * 640/4000) x (30 * 480/3000) = 4.8 x 4.8 pixels.
    3. **Conclusion & Interpretation:**
       - **Result: Resolution-Bound**. 4.8x4.8 is below the minimum receptive field (typically 8x8) for anchors, destroying spatial information.
