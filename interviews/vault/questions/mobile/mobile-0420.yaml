title: The Case of the Disappearing Pixels
scenario: You are a mobile ML engineer debugging a real-time object detection model on a new smartphone. The model runs at the target 30 FPS on the NPU, but you observe a 50% accuracy drop for small objects compared to your validation results. The training pipeline used high-quality bicubic resizing to downscale images to the model's 640x480 input. On the device, the camera sensor captures at 12MP (4000x3000) and uses the hardware Image Signal Processor (ISP) for a 'zero-cost' resize before sending the frame to the NPU.
question: "Why can ISP resizing from 12MP to 640x480 cause a major small-object accuracy drop despite fast NPU inference?"
details:
  realistic_solution: 'The root cause is training-serving skew introduced by the ISP''s low-quality resizing algorithm. Hardware resizers on mobile ISPs often use simple, power-efficient algorithms like nearest-neighbor or bilinear filtering, which destroy high-frequency details needed to detect small objects.'
  common_mistake: |
    **The Pitfall:** Assuming that if inference is fast, the hardware pipeline is working correctly.
    **The Rationale:** Engineers often focus solely on compute latency (FPS) and memory, forgetting that on mobile, the data pipeline from the sensor through the ISP can introduce subtle, lossy transformations.
    **The Consequence:** Wasting time debugging the model architecture when the issue lies entirely in the data pre-processing skew.
  napkin_math: |
    - **Resolution Change:** ISP downscales 12MP (4000x3000) to 0.3MP (640x480).
    - **Object Scaling:** A small object occupying 30x30 pixels in the 12MP image becomes (30 * 640/4000) x (30 * 480/3000) = 4.8 x 4.8 pixels in the 0.3MP frame.
    - **Final Result:** This size is **below the minimum receptive field** (typically 8x8 or 16x16 pixels) for standard anchors, destroying spatial information before the NPU even sees it.
