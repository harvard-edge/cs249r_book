title: The Topologically Flawed Upgrade
scenario: 'You''re a senior mobile ML engineer being considered for a transfer to the cloud team that
  supports your company''s model training. To gauge your systems thinking, the hiring manager asks a question
  about the training cluster: ''A distributed training job for a large model across multiple H100 nodes
  is showing poor scaling efficiency. Profiling shows the `AllReduce` communication step is the bottleneck.
  The nodes are connected via InfiniBand NDR. A junior engineer suggests we could fix this by replacing
  the InfiniBand network with more NVLink connections. Use the provided hardware constants to diagnose
  why this suggestion is fundamentally flawed.'''
details:
  realistic_solution: The suggestion is flawed because NVLink and InfiniBand solve different problems.
    NVLink is a high-bandwidth, GPU-to-GPU interconnect for communication *within* a single server (intra-node).
    InfiniBand is a high-speed network designed for communication *between* servers (inter-node). An `AllReduce`
    operation in a multi-node training job requires communication across the server network. Therefore,
    the bottleneck is in the inter-node path, which is exactly what InfiniBand is for. You cannot physically
    replace a cross-server network with an on-board GPU bus.
  common_mistake: Engineers often know that 'NVLink is faster than InfiniBand' without understanding their
    different roles in the system topology. They mistakenly believe all interconnects are interchangeable
    and that the fastest one is always the right choice, failing to distinguish between intra-node (within
    a server) and inter-node (between servers) communication.
  napkin_math: 1. **Identify Interconnect Roles:** The problem describes a multi-node setup. NVLink is
    an intra-node (within a server) bus, while InfiniBand is an inter-node (between servers) network.
  options:
  - The suggestion is wrong because InfiniBand NDR (400 Gbps) is significantly faster than NVLink 4.0
    (900 GB/s).
  - It's a better idea to connect the nodes directly using PCIe Gen5, as it has lower latency than InfiniBand.
  - NVLink is an intra-node interconnect for GPU-to-GPU communication within a server, while InfiniBand
    is for inter-node communication. You cannot replace a server network with an internal bus.
  - The bottleneck is a software issue in the `AllReduce` algorithm's implementation, not a hardware limitation,
    so changing interconnects won't help.
  correct_index: 2
