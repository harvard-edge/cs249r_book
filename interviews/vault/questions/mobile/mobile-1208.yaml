title: NAS Preference for Compute-Bound Layers on Exynos
scenario: You are deploying a hardware-aware NAS to optimize a vision model for the Samsung Exynos 2400 NPU, which features 34.7 TOPS and shares 12 GB of LPDDR5X memory. During the search process, you observe that the NAS consistently rejects architectures composed of many lightweight depthwise-separable convolutions in favor of standard dense convolutions, even though the dense architectures have 3x higher theoretical FLOPs.
question: Why does the NAS optimizer heavily penalize lower-FLOP depthwise architectures on this specific SoC?
details:
  realistic_solution: Because the 12 GB LPDDR5X memory is shared across the CPU, GPU, ISP, and dual-core NPU, the effective memory bandwidth available to the NPU is heavily constrained. Depthwise convolutions have a very low arithmetic intensity (OPS/byte) and are fundamentally memory-bound, leaving the massive compute capacity of the NPU idle while waiting for data. Standard dense convolutions possess a much higher arithmetic intensity, allowing them to remain compute-bound and efficiently utilize the NPU's resources, thus finishing faster despite the larger amount of total work.
  common_mistake: |
    **The Pitfall:** Assuming lower theoretical FLOPs automatically equate to lower latency.
    **The Rationale:** Engineers rely on parameter count and FLOPs as proxies for speed, failing to analyze the system-level memory contention caused by the shared LPDDR5X architecture.
    **The Consequence:** They manually override the NAS or choose models that severely underutilize the NPU because they are fundamentally memory-bound.
  napkin_math: |
    - **Effective Bandwidth:** Assume the NPU gets ~25% of the 68 GB/s peak = 17 GB/s.
    - **Depthwise Conv Throughput:** Arithmetic intensity of ~20 OPS/byte -> 17 GB/s * 20 = 340 GOPS (0.34 TOPS).
    - **Dense Conv Throughput:** Arithmetic intensity of ~400 OPS/byte -> 17 GB/s * 400 = 6.8 TOPS.
    - **Conclusion:** Even with 3x the FLOPs, the dense layer's 20x higher throughput allows it to execute **~6.6x faster** on the hardware.
