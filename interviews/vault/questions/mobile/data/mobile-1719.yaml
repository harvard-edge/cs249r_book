title: 'Optimizing On-Device Image Classification Dataset with Active Learning on Apple A17 Pro'
scenario: An on-device image classification model on the Apple A17 Pro struggles with low-light photos. An active learning pipeline will be implemented to identify uncertain predictions on-device and send them for human annotation.
question: How would you design an active learning pipeline that minimizes on-device cost while ensuring high-quality data selection?
details:
  realistic_solution: 'A realistic solution involves a multi-stage active learning strategy. On-device, a lightweight uncertainty sampling method (e.g., confidence-based thresholding or margin sampling using the A17 Pro''s Neural Engine) identifies potentially valuable samples. These undergo server-side filtering for duplicates and OOD samples. Prioritization uses uncertainty and diversity metrics (e.g., KMeans clustering). The power budget of 5W on the A17 Pro demands highly optimized on-device inference, possibly leveraging quantized models.'
  common_mistake: |
    **The Pitfall:** Using a computationally heavy uncertainty sampling method on-device.
    **The Rationale:** Overlooking the power constraints of the mobile environment in favor of maximum sampling accuracy.
    **The Consequence:** Draining the user's battery excessively and slowing down the app experience.
  napkin_math: |
    **Assumptions & Constraints:**
    - Daily active inference: 10,000 images.
    - Inference latency: 100ms/image.
    - Power consumption: 3W.
    - Battery capacity: 12.8 Wh.
    - Annotation speed: 100 images/hr.

    **Calculations:**
    - Active time: 10,000 images * 100ms = 1000 seconds.
    - Energy used: 3W * (1000s / 3600s) = 0.83 Wh.
    - Battery impact: 0.83 Wh / 12.8 Wh = ~6.5%.
    - Annotation cost: 10,000 images / 100 images/hr = 100 hours.

    **Conclusion & Interpretation:**
    - **Result: 100 hours (Cost/Power-Bound)**. On-device inference consumes a reasonable ~6.5% daily budget, while generating 100 hours of human labeling effort.
