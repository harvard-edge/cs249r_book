title: Real-Time Sensor Fusion Ingestion Sizing
scenario: You are designing a real-time sensor fusion and gesture recognition pipeline for an AR application. The system ingests streaming data from dual cameras (60fps) and IMU sensors before passing spatial features to a dual-core NPU for classification.
question: How would you size real-time sensor fusion ingestion using shared memory ring buffers?
details:
  realistic_solution: |
    Architect an early-fusion, event-driven ingestion pipeline leveraging asynchronous DMA ring buffers. Crucially, the ISP must physically downsample and crop Regions of Interest (ROIs) *before* writing to the unified memory pool to prevent LPDDR5X bus saturation. Pin the ingestion interrupts to dedicated CPU efficiency cores to ensure stable scheduling, and lock the dual-core NPU to specific threads to prevent thrashing. By enforcing a zero-copy data path and compressing data at the sensor level, the architecture mitigates thermal throttling and memory contention.
  common_mistake: |
    **The Pitfall:** Designing ingestion pipelines that queue uncompressed video frames in main memory.
    **The Rationale:** Candidates treat the NPU's peak TOPS as entirely available without considering memory bus saturation.
    **The Consequence:** Bandwidth saturates when the CPU, GPU, and ISP concurrently access the shared memory pool, dropping frames.
  napkin_math: |
    **Assumptions & Constraints:**
    - Dual 1080p cameras (1920x1080 RGB) at 60 FPS.
    - Unified memory architecture.

    **Calculations:**
    - Raw bandwidth: 1920 * 1080 * 3 bytes * 60 FPS * 2 cameras = 746,496,000 bytes/sec (~746 MB/s).
    - Double-buffering overhead: ~1.5 GB/s of continuous bandwidth just for ingestion.
    - Assume NPU compute is 50 GOPS at 60 FPS = 3 TOPS (trivial utilization).

    **Conclusion & Interpretation:**
    - **Result: 1.5 GB/s (Memory Bus Contention)**. Passing uncompressed 1080p video directly to main memory consumes 1.5 GB/s continuously. The pipeline must aggressively downsample or extract ROIs at the ISP level before hitting the unified memory bus.
