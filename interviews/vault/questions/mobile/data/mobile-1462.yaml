title: Real-Time Sensor Fusion Ingestion Sizing
scenario: You are designing a real-time sensor fusion and gesture recognition pipeline for an AR application. The system ingests streaming data from dual cameras (60fps) and IMU sensors before passing spatial features to a dual-core NPU for classification.
question: How would you size real-time sensor fusion ingestion using shared memory ring buffers?
details:
  realistic_solution: |
    Architect an early-fusion, event-driven ingestion pipeline using asynchronous DMA into bounded shared-memory ring buffers. Size separate camera and IMU rings for the worst-case producer rate, timestamp all samples, and apply backpressure or frame dropping when consumers fall behind. Use zero-copy handoff to the ISP/NPU path where possible, keep only the last few frames needed for fusion, and prefer ISP-format conversion, cropping, or feature extraction before large tensors are copied through the unified memory pool.
  common_mistake: |
    **The Pitfall:** Designing ingestion pipelines that queue uncompressed video frames in main memory.
    **The Rationale:** Candidates treat the NPU's peak TOPS as entirely available without considering memory bus saturation.
    **The Consequence:** Bandwidth saturates when the CPU, GPU, and ISP concurrently access the shared memory pool, dropping frames.
  napkin_math: |
    **Assumptions & Constraints:**
    - Dual 1080p cameras (1920x1080 RGB) at 60 FPS.
    - IMU stream is small relative to video, e.g., <1 MB/s for timestamped accelerometer/gyro samples.
    - Unified memory architecture.

    **Calculations:**
    - Raw bandwidth: 1920 * 1080 * 3 bytes * 60 FPS * 2 cameras = 746,496,000 bytes/sec (~746 MB/s).
    - Ring-buffer capacity for three frames per camera: 1920 * 1080 * 3 bytes * 3 frames * 2 cameras = 37,324,800 bytes (~37 MB), plus a small IMU ring.
    - Double buffering increases reserved capacity, not steady-state producer bandwidth; extra copies would add bandwidth only if the pipeline copies frames instead of passing references.

    **Conclusion & Interpretation:**
    - **Result: ~0.75 GB/s raw camera ingress and ~37 MB for a three-frame dual-camera ring.** IMU bandwidth is negligible, but zero-copy handoff, bounded rings, and backpressure are required so fusion does not create extra memory copies or unbounded queues.
