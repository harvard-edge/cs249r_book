title: 'Dataset Curation: Mastery — Sensor Fusion Dataset Design for On-Device Health Model'
scenario: You are designing training data for an on-device health monitoring model. The model fuses accelerometer,
  heart rate, and microphone data to detect health events.
question: How would you design the multi-modal data curation pipeline, synchronization strategy, and privacy-preserving
  collection protocol to fit the storage, sync, compute, and privacy plan for the target device?
details:
  realistic_solution: 'Sensor sync: timestamp alignment within 10ms. Data: accelerometer 100Hz × 3-axis,
    HR 1Hz, mic 16kHz → downsample for event detection. Privacy: process on-device, store only aggregated
    features (not raw audio). Labels: user-confirmed events only.'
  common_mistake: '**The Pitfall:** Not accounting for sensor synchronization jitter and treating health
    data as non-sensitive.

    **The Rationale:** Candidates often apply standard cloud-based data collection without purpose limitation
    or consideration of clock drift across independent sensor DSPs.

    **The Consequence:** Produces misaligned, low-signal inputs that degrade fusion accuracy and risks
    severe privacy violations.

    '
  napkin_math: '**Assumptions & Constraints:**

    - Accelerometer: 100Hz x 3-axis x 4B = 1.2KB/sec.

    - HR: 1Hz x 4B = 4B/sec.

    - Mic (raw): 16kHz x 2B = 32KB/sec.

    - Processing event windows only (10-sec windows around anomalies). Assume 10 events/day x 10sec =
    100sec/day.


    **Calculations:**

    - 24h raw: acc=103MB, HR=345KB, mic=2.76GB. Total raw/day=2.86GB.

    - Acc window (daily): 100sec x 1.2KB/s = 120KB.

    - Mic MFCC features (daily): 100sec x 40 features x 10Hz = 40,000 features. At 4 bytes/feature = 160KB.

    - HR (daily): 100sec x 4B/sec = 400B (0.4KB).

    - Total stored data: 280.4KB/day.

    - 30-day buffer: ~8.4MB.


    **Conclusion & Interpretation:**

    - **Result: 8.4MB (Storage-Feasible)**. An 8.4MB buffer easily fits in device memory for local training,
    bypassing the 2.86GB raw daily cost.

    '
