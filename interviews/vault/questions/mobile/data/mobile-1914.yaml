title: Zero-Copy Video Pipeline on Apple Silicon
scenario: A real-time segmentation app runs on the A17 Pro. The camera ISP outputs NV12 frames which must be color-converted and passed to the Neural Engine at a strict 60fps.
question: Propose an asynchronous iOS camera-to-Metal-to-Core ML pipeline that prevents CPU copy bottlenecks?
visual:
  kind: svg
  path: mobile-1914.svg
  alt: Block diagram showing sequential pointer handoffs instead of data copies between ISP, GPU, and NPU.
  caption: Zero-Copy IOSurface Pipeline
details:
  realistic_solution: Use AVFoundation to receive CVPixelBuffer frames backed by IOSurface, then wrap the planes with CVMetalTextureCache so Metal can read NV12 without a CPU memcpy. Run a Metal shader or Core Image pass that writes into a separate Core ML-compatible texture or pixel buffer, synchronize with command-buffer completion or shared events, and pass that CVPixelBuffer/MLFeatureValue to Core ML. This is a practical zero-CPU-copy handoff, not raw pointer sharing with the Neural Engine; Core ML may still schedule format conversion or copies when the model input layout is unsupported.
  common_mistake: |
    **The Pitfall:** Treating IOSurface as a raw pointer that every accelerator can read directly.
    **The Rationale:** iOS camera, Metal, and Core ML interoperate through CVPixelBuffer, IOSurface, textures, and explicit synchronization, with only supported pixel formats and model input layouts avoiding extra conversion.
    **The Consequence:** Hidden format conversions, synchronization stalls, or CPU copies can consume the 16.67ms frame budget even when the source frame is IOSurface-backed.
  napkin_math: |
    **Assumptions & Constraints:**
    - Frame Rate Target: 60 FPS.
    - Latency Budget: 1000 / 60 = 16.67ms per frame.
    - Transfers required: ISP -> GPU -> NPU.

    **Calculations:**
    - Required Latency: 1000ms / 60 = 16.67ms.
    - CPU memcpy overhead target: 0ms by using CVPixelBuffer/IOSurface-backed Metal and Core ML handoff.
    - Pipeline overhead still includes GPU conversion, command scheduling, synchronization, and any Core ML-supported layout conversion.
    - Sustainable frame rate requires GPU conversion + synchronization + Core ML inference <= 16.67ms in steady state.

    **Conclusion & Interpretation:**
    - **Result: zero CPU-copy design, not zero latency overhead (Pipeline-Bound).** The design can meet 60 FPS only if supported buffer formats and explicit synchronization keep total GPU/Core ML pipeline time within 16.67ms.
