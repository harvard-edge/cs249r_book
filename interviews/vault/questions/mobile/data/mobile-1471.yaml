title: Define Coresets for On-Device Fine-Tuning
scenario: You are deploying an on-device personalization pipeline for Gemini Nano on the Google Tensor G3. While the device features 12 GB of LPDDR5X RAM, strict system constraints limit the memory footprint available for background continuous learning. To minimize the data processed by the on-device TPU, you must use a data selection technique that extracts a small, mathematically rigorous subset of the data which approximates the full dataset's training dynamics.
question: What ML term describes a small representative subset for Tensor G3 on-device personalization under tight memory limits?
details:
  realistic_solution: 'The correct term is a ''coreset'' (or coreset selection). A coreset is a minimal, weighted subset of data that rigorously approximates the geometry or loss landscape of the entire dataset. In mobile deployments like the Tensor G3, using coresets is crucial for data efficiency, allowing the on-device TPU to quickly fine-tune models without exhausting the shared 12 GB LPDDR5X memory or draining the battery.'
  common_mistake: |
    **The Pitfall:** Confusing the concept with random or stratified sampling.
    **The Rationale:** Candidates fail to recall the specific mathematical definition of a subset that theoretically bounds the loss relative to the full dataset.
    **The Consequence:** Using generic data pruning that degrades model quality or requires more samples than the memory budget allows.
  napkin_math: |
    **Assumptions & Constraints:**
    - Full dataset: 50,000 samples, 2 KB/sample.
    - Memory cap: 20 MB.
    - Coreset selection ratio: 10%.

    **Calculations:**
    - Full size: 50,000 * 2 KB = 100 MB.
    - Coreset samples: 5,000.
    - Coreset size: 5,000 * 2 KB = 10 MB.

    **Conclusion & Interpretation:**
    - **Result: 10 MB (Memory Capacity-Bound).** Fits comfortably within the 20 MB allocation.
