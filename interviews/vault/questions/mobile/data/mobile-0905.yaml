title: 'Dataset Curation: Optimize Label Quality vs Cost Tradeoff for Mobile App Training'
scenario: You are curating training data for a photo classification model. You have 500K user photos. Expert labeling costs $2/image (95% accuracy), crowdsourced costs $0.10/image (85% accuracy), and automated (CLIP zero-shot) costs $0.001/image. Your total budget is $10,000.
question: What tiered labeling strategy can meet a $10,000 budget and near-90% label accuracy for 500K mobile photos?
details:
  realistic_solution: |
    Use a concrete active-learning allocation. Label all 500K photos with CLIP zero-shot for broad coverage, send the 50K lowest-confidence or highest-disagreement photos to crowd review, and send the hardest 2K from that uncertain set to expert review. This costs about $9,500, leaves $500 for calibration audits or relabeling mistakes, and produces final label sources of 450K CLIP-only, 48K crowd-reviewed, and 2K expert-reviewed photos. Treat the near-90% accuracy estimate as conditional on validation calibration: tune the 50K and 2K cutoffs from a held-out audit set before locking the production labeling plan.
  common_mistake: |
    **The Pitfall:** Using only one labeling source instead of a tiered approach.
    **The Rationale:** Candidates fail to realize that combining cheap automated labels with targeted expert review can optimize the cost-accuracy tradeoff.
    **The Consequence:** Exhausting the budget on too few high-quality labels or obtaining a large dataset with insufficient overall accuracy, derailing model performance.
  napkin_math: |
    **Assumptions & Constraints:**
    - Total Budget: $10,000. Images: 500K.
    - CLIP costs $0.001/image and is expected to be about 90% accurate on the easy, high-confidence partition.
    - Crowd labels cost $0.10/image and replace automated labels on uncertain examples; expert labels cost $2.00/image and replace crowd labels on the hardest examples.
    - The 50K/2K split is an active-learning feasibility target chosen from uncertainty ranking, not a proof of global optimality.

    **Calculations:**
    - Step 1: label all 500K photos with CLIP = 500K * $0.001 = $500.
    - Step 2: send the top 50K uncertain photos to crowd review = 50K * $0.10 = $5,000.
    - Step 3: send the top 2K hardest photos within that reviewed set to experts = 2K * $2.00 = $4,000.
    - Total cost = $500 + $5,000 + $4,000 = $9,500.
    - Final label source partition: 450K CLIP-only, 48K crowd-reviewed, 2K expert-reviewed.
    - Illustrative expected correct labels = (450K * 0.90) + (48K * 0.85) + (2K * 0.95) = 405K + 40.8K + 1.9K = 447.7K.
    - Expected aggregate accuracy = 447.7K / 500K = 89.54%.

    **Conclusion & Interpretation:**
    - **Result: Feasible Tiered Labeling Plan.** The partition stays under budget at $9,500 and estimates about 89.5% aggregate accuracy; in production the 50K and 2K cutoffs should be tuned from calibration curves and validation audits rather than treated as a guaranteed optimum.
