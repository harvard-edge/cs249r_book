title: 'Dataset Curation: Optimize Label Quality vs Cost Tradeoff for Mobile App Training'
scenario: "You are curating training data for a photo classification model. You have 500K user photos. Expert labeling costs $2/image (95% accuracy), crowdsourced costs $0.10/image (85% accuracy), and automated (CLIP zero-shot) costs $0.001/image. Your total budget is $10,000."
question: "What tiered labeling strategy can meet a $10,000 budget and near-90% label accuracy for 500K mobile photos?"
details:
  realistic_solution: "Employ an active learning tiered approach. First, run zero-shot automated labeling across the entire dataset. Second, isolate the low-confidence examples via entropy or margin sampling and escalate them to crowdsourcing. Finally, run the highest-uncertainty fraction past expensive domain experts. This maximizes coverage while satisfying budget limits."
  common_mistake: |
    **The Pitfall:** Using only one labeling source instead of a tiered approach.
    **The Rationale:** Candidates fail to realize that combining cheap automated labels with targeted expert review can optimize the cost-accuracy tradeoff.
    **The Consequence:** Exhausting the budget on too few high-quality labels or obtaining a large dataset with insufficient overall accuracy, derailing model performance.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Total Budget: $10,000. Images: 500K.
       - CLIP: $0.001 (90% acc on easy). Crowd: $0.10 (85% acc). Expert: $2.00 (95% acc).
    2. **Calculations:**
       - Step 1: 500K CLIP labels = $500.
       - Step 2: 50K uncertain crowd labels = $5,000.
       - Step 3: 2K hardest expert labels = $4,000.
       - Total Cost = $9,500.
       - Acc = (448K * 0.90) + (50K * 0.85) + (2K * 0.95) = 403.2K + 42.5K + 1.9K = 447.6K correct.
    3. **Conclusion & Interpretation:**
       - **Result: Budget-Bound.** The hybrid tiered strategy yields 447.6K correct labels out of 500K, hitting exactly **89.5% accuracy** while remaining strictly under the $10,000 constraint.
