title: Real-Time Sensor Fusion Architecture on Snapdragon 8 Gen 3
scenario: An always-on context awareness pipeline ingests continuous audio (16kHz) and IMU data (500Hz) on a Snapdragon 8 Gen 3 device. The system must extract features and run a lightweight streaming inference model without waking the main CPU.
question: How should an always-on Snapdragon 8 Gen 3 sensor-fusion pipeline ingest data and run inference without waking the CPU?
details:
  realistic_solution: A robust design leverages the always-on Sensor Hub (or lower-power DSP islands) for initial buffering and basic DSP operations (like FFT for audio). The pre-processed features are written directly to a ring buffer in the shared LPDDR5X memory. The Hexagon NPU is then triggered via hardware interrupts to run the INT8 quantized model (easily fitting within its 45 TOPS budget), completely bypassing the main CPU and GPU for continuous operation.
  common_mistake: |
    **The Pitfall:** Routing raw sensor data through standard Android OS application frameworks.
    **The Rationale:** Candidates fall back to standard high-level app development patterns, ignoring the massive idle-power cost of the main application processor.
    **The Consequence:** The device's battery drains in hours because the high-power main CPU is constantly waking up to process trivial sensor interrupts.
  napkin_math: |
    - **Audio Rate:** 16,000 samples/sec * 16 bits = 32 KB/s.
    - **IMU Rate:** 500 samples/sec * 6 axes * 16 bits = 6 KB/s.
    - **Total Bandwidth:** ~38 KB/s (uses <0.0001% of the 60 GB/s LPDDR5X bandwidth).
    - **Compute Cost:** A 5M parameter INT8 model at 10 Hz requires ~0.1 TOPS.
    - **Final Result:** **The entire pipeline fits comfortably inside the low-power Sensor Hub and Hexagon NPU (45 TOPS), allowing the main CPU to remain deeply asleep.**
