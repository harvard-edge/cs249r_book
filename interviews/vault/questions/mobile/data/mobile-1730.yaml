title: Diagnosing High Latency in On-Device Streaming Feature Computation on Apple A17 Pro
scenario: You are developing a real-time anomaly detection system for a mobile device. The system continuously ingests sensor data and computes features on-device with a 50ms end-to-end latency budget. Recently, users report intermittent latency spikes exceeding 500ms. Monitoring shows sensor ingestion is stable, but the computation stage stalls.
question: Why do sensor feature computations exceed 500 ms when raw ingestion is stable and the target is 50 ms?
details:
  realistic_solution: |
    Deploy `nsys` or Apple's Instruments (System Trace, Memory Debugger) to isolate the latency spikes. Since raw compute bounds are not violated, the 500ms stall indicates a severe OS-level contention issue. 1. **Resource Contention**: The Neural Engine and CPU share a unified memory pool; background app refreshes or thermal throttling events trigger massive L3 cache evictions and memory compression. 2. **Data Path Analysis**: Sensor interrupts are likely triggering synchronous, unbatched memory copies. 3. **Mitigation**: Switch to asynchronous DMA ring buffers for sensor ingestion, pin critical computation threads to high-performance cores, and utilize explicit memory barriers to prevent cache thrashing.
  common_mistake: |
    **The Pitfall:** Immediately jumping to code optimization or model quantization.
    **The Rationale:** Candidates assume the model itself is too heavy for the hardware without checking the data.
    **The Consequence:** They fail to characterize the problem through profiling, missing underlying I/O stalls or memory pressure issues.
  napkin_math: |
    **Assumptions & Constraints:**
    - Latency budget: 50 ms. Observed latency: >500 ms.
    - Computation requirement: 1 Giga-operation (GOp) per inference.
    - NPU capability: 35 TOPS (35,000 GOPs/sec).

    **Calculations:**
    - Theoretical compute time: 1 GOp / 35,000 GOPs/sec = 0.028 ms.
    - Excess latency factor: 500 ms / 0.028 ms = ~17,800x slower than ideal compute.

    **Conclusion & Interpretation:**
    - **Result: 500 ms (OS/Memory Contention-Bound)**. A 500ms delay is four orders of magnitude larger than the 0.03ms compute requirement. The bottleneck is strictly related to I/O stalls, synchronous data marshaling, or unified memory pressure from background processes, not NPU capacity.
