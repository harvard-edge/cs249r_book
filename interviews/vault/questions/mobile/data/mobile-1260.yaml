title: On-Device Active Learning OOM Crashes
scenario: You deployed an on-device active learning system to curate challenging edge-case images for a vision task. A 50MB CoreML data selection model runs to score incoming camera frames. Despite the model being small, users report severe app crashes due to Out-Of-Memory (OOM) errors during data selection.
question: Why can a 50MB CoreML selection model still trigger OOM crashes during camera-frame curation?
details:
  realistic_solution: |
    The root cause is uncompressed high-resolution camera frames buffering in unified memory before ISP processing or NPU ingestion. Maintaining a rolling history of raw 4K video frames exhausts system RAM rapidly. Fix by implementing immediate ISP downsampling, zero-copy memory buffers (e.g., CVPixelBuffer), or strictly sequential processing without historical frame retention.
  common_mistake: |
    **The Pitfall:** Blaming the ML model size while ignoring the data ingestion pipeline.
    **The Rationale:** Candidates often assume that if a model is small, it won't cause OOM errors, forgetting the immense memory footprint of uncompressed high-res video frames.
    **The Consequence:** Failing to diagnose the root cause and wasting time compressing the model instead of fixing the data buffer.
  napkin_math: |
    **Assumptions & Constraints:**
    - Frame: 4K RGB (3840 x 2160 x 3 bytes)
    - Buffer: 3 seconds at 60 FPS = 180 frames
    - System Memory Limit: 8GB total, ~4GB used by OS

    **Calculations:**
    - Uncompressed Frame Size: 3840 * 2160 * 3 = ~24.8 MB (round to 25 MB)
    - Buffer Capacity: 180 frames * 25 MB = 4500 MB (4.5 GB)
    - Total Memory Required: 4.5 GB + 4 GB = 8.5 GB

    **Conclusion & Interpretation:**
    - **Result: 8.5 GB (Memory Capacity-Bound)**. Total memory required exceeds the typical 8GB unified memory limit, causing OOM.
