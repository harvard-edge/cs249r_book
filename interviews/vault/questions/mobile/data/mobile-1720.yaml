title: On-Device Object Detection Dataset Curation for Snapdragon 8 Gen 3 NPU
scenario: You are leading the ML engineering effort for a new mobile application that performs real-time object detection on user-generated video streams. The target device is a smartphone equipped with the Snapdragon 8 Gen 3 Hexagon NPU. Initial deployment of a model trained on publicly available datasets has revealed significant performance degradation due to domain shift and inherent biases.
question: "How would you design a continuous active learning strategy to identify and mitigate biases on-device using the Snapdragon 8 Gen 3 NPU?"
details:
  realistic_solution: Implement a continuous active learning pipeline where the on-device model, running efficiently on the Hexagon NPU (leveraging its 45 TOPS INT8 for inference), identifies samples with high uncertainty or high error rates in real-world scenarios. These samples are then prioritized for human annotation. Establish clear, evolving annotation guidelines, conduct regular inter-annotator agreement checks (e.g., using Fleiss' Kappa or similar metrics) with feedback loops for annotator training. Proactively monitor dataset distributions for demographic or scenario-based biases by analyzing metadata and model performance across different segments, augmenting data collection from underrepresented groups, and employing techniques like re-sampling or re-weighting during training. Consider federated learning approaches for privacy-preserving data collection from a diverse user base.
  common_mistake: |
    **The Pitfall:** Over-relying on generic public datasets and ignoring device-specific data characteristics.
    **The Rationale:** Candidates treat mobile ML strictly as inference, forgetting that the edge is the best place to source domain-specific active learning data.
    **The Consequence:** The model continuously fails in real-world scenarios because the training distribution never adapts to actual user environments.
  napkin_math: |
    **Assumptions & Constraints:**
    - NPU Capacity: 45 TOPS (INT8).
    - Model (MobileNetV3-SSD): 15 ms/frame → 66 FPS throughput.

    **Calculations:**
    - Continuous operation for 1 hour: 3600s * 66 FPS = 237,600 frames evaluated.
    - If 5% of frames trigger an uncertainty threshold: 11,880 frames flagged/hour.
    - Storage: 50,000 flagged frames/month * 200 KB = 10 GB/month.

    **Conclusion & Interpretation:**
    - **Result: 11,880 frames/hour (Compute-Bound)**. The NPU has more than enough throughput to run active learning uncertainty checks in the background.
