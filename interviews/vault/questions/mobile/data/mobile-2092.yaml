title: iOS Camera Pipeline Resizing for Core ML
scenario: A vision app on an Apple A17 Pro needs to resize 4K camera frames to 224x224 before feeding them to the Neural Engine.
question: How should the iOS camera pipeline resize 4K frames to 224x224 while minimizing CPU copies?
details:
  realistic_solution: Configure AVFoundation to request the smallest camera capture format that satisfies model quality, then keep frames in CVPixelBuffer-backed surfaces and resize with a system-accelerated path such as Core Image, Accelerate, VideoToolbox, or Metal if the capture format still needs scaling. Pass the resulting CVPixelBuffer to Core ML to minimize full-frame CPU copies, while still allowing CPU-side scheduling and format-conversion orchestration where the framework requires it.
  common_mistake: |
    **The Pitfall:** Copying the 4K frame to a CPU byte array and manually resizing via a loop.
    **The Rationale:** Developers rely on basic image processing libraries that default to standard CPU execution.
    **The Consequence:** Moving large 4K buffers back and forth to the CPU massively wastes memory bandwidth and rapidly drains the battery.
  napkin_math: |
    **Assumptions & Constraints:**
    - Workload: 4K frame resizing to 224x224.
    - Bottleneck: CPU-to-memory round-trips.

    **Calculations:**
    - 4K RGB frame size: 3840 * 2160 * 3 bytes = 24,883,200 bytes = 23.7 MiB.
    - CPU resize with separate read and write of the 4K source costs at least about 47 MiB of memory traffic per frame, before intermediate buffers.
    - A CVPixelBuffer-backed accelerated path can avoid copying the full 4K frame through a CPU byte array, though small metadata, scheduling, and conversion work may still run on the CPU.

    **Conclusion & Interpretation:**
    - **Result: Minimize full-frame CPU copies (Memory-Bandwidth-Bound)**. The goal is not direct developer control of the ISP; it is choosing capture formats and accelerated resize APIs that keep large pixel buffers in framework-managed surfaces before Core ML ingestion.
