title: On-Device Real-Time Sensor Ingestion Throughput for G3 TPU
scenario: You are implementing a real-time health monitoring feature that ingests high-frequency sensor data (accelerometer, gyroscope, PPG) to detect anomalies. The feature computation involves a sliding window over the last 10 seconds of data, sampled at 100Hz per sensor. Each sample is a 32-bit float.
question: How should the sensor ingestion buffer and throughput be sized for real-time health monitoring on a mobile TPU?
details:
  realistic_solution: 'The correct approach involves calculating the raw data rate, sizing the circular buffer to hold the 10-second window, and ensuring the memory bandwidth is sufficient for continuous ingestion while the TPU processes batches. Given modern LPDDR5X RAM, the memory capacity is ample, but the focus must be on the ingestion rate and batch preparation latency.'
  common_mistake: |
    **The Pitfall:** Miscalculating memory bandwidth requirements and ignoring buffering overhead.
    **The Rationale:** Candidates incorrectly assume the CPU or memory bandwidth will be the bottleneck for transferring low-rate sensor data to the TPU.
    **The Consequence:** Over-engineering the ingestion pipeline or unnecessarily compromising data fidelity.
  napkin_math: |
    **Assumptions & Constraints:**
    - 3 sensors (accelerometer, gyroscope, PPG) sampled at 100Hz.
    - 32-bit float = 4 bytes per sample.
    - Sliding window = 10 seconds.

    **Calculations:**
    - Raw Data Rate = 3 sensors * 100 samples/sec * 4 bytes/sample = 1,200 bytes/sec.
    - Window Size = 1,200 bytes/sec * 10 seconds = 12,000 bytes (~11.7 KB).

    **Conclusion & Interpretation:**
    - **Result: <1 ms transfer time (Compute-bound, not memory-bound)**. Transferring an 11.7 KB batch on LPDDR5X leaves the TPU fully available for inference.
