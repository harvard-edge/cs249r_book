title: The ISP/NPU Hardware Synchronization
scenario: Your AR headset uses a dedicated Image Signal Processor (ISP) and an NPU. You allocate a hardware buffer for zero-copy memory between them. The ISP writes a frame to it, then the NPU reads it. It works, but occasionally the ML model outputs complete garbage. The image visually looks fine if you save it to disk right after the ISP finishes.
question: What hardware synchronization mechanism prevents an NPU from reading an ISP hardware buffer before DMA writes are visible?
details:
  realistic_solution: 'You forgot a hardware sync fence between the ISP''s DMA write and the NPU''s DMA read. The ISP signals ''frame complete'' to the CPU before its final DMA flush finishes (0.5ms remaining). The CPU immediately signals the NPU, which reads partially-written memory — the bottom portion of the image contains stale data from the previous frame, corrupting the ML input tensor. Fix: insert an Android SyncFence or iOS Metal Event between ISP output and NPU input. The fence guarantees all DMA writes are visible in DRAM before the NPU begins reading. Cost: <10us latency, zero CPU involvement.'
  common_mistake: |
    **The Pitfall:** Assuming this is a CPU cache coherency issue (e.g., forgetting to flush the cache).
    **The Rationale:** Developers incorrectly involve the CPU, but this is a direct hardware-to-hardware DMA transfer where the CPU never touches the memory.
    **The Consequence:** Attempting to flush the CPU cache won't fix the issue and adds unnecessary overhead, leaving the race condition unresolved.
  napkin_math: |
    **Assumptions & Constraints:**
    - ISP processing time: ~10ms per frame.
    - DMA flush duration: ~0.5ms.
    - CPU signaling overhead: ~0.1ms.

    **Calculations:**
    - The CPU is signaled 0.5ms before the DMA flush completes.
    - The CPU notifies the NPU in 0.1ms.
    - NPU read start time = T_signal + 0.1ms.
    - DMA flush end time = T_signal + 0.5ms.
    - Overlap (Race Condition) = 0.5ms - 0.1ms = 0.4ms.

    **Conclusion & Interpretation:**
    - **Result: 400us Race Condition**. The NPU begins reading 400 microseconds before the final DMA flush completes, destroying spatial tensor integrity.
