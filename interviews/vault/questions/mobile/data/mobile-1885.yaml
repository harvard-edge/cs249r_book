title: Snapdragon Camera Pipelining
scenario: A camera pipeline feeds the ISP (2 ms), memory copy to NPU (3 ms), NPU inference (10 ms), and display render (5 ms) sequentially.
question: What is the maximum throughput (fps) and end-to-end latency if only the ISP and NPU can run concurrently in the pipeline architecture layout?
visual:
  kind: svg
  path: mobile-1885.svg
  alt: Gantt chart showing parallel pipeline stages bottlenecked by 10ms NPU.
  caption: Concurrent pipeline stages.
details:
  realistic_solution: Without pipelining, latency is 2+3+10+5 = 20 ms (50 fps). With ISP and NPU overlapping across frames, the bottleneck stage determines throughput. The bottleneck is NPU inference at 10 ms. Thus, max throughput is 1/0.010 = 100 fps. End-to-end latency for a single frame remains 20 ms.
  common_mistake: |
    **The Pitfall:** Assuming pipelining reduces the end-to-end latency of a single frame.
    **The Rationale:** Candidates confuse throughput (frames per second) with latency (time from capture to display for one specific frame).
    **The Consequence:** Overpromising on real-time responsiveness when only overall system throughput is actually improved.
  napkin_math: |
    **Assumptions & Constraints:**
    - Sequential timings: ISP (2 ms), MemCopy (3 ms), NPU (10 ms), Render (5 ms).

    **Calculations:**
    - Unpipelined latency: 2 + 3 + 10 + 5 = 20 ms.
    - Pipelined bottleneck stage: max(2, 3, 10, 5) = 10 ms (NPU Inference).
    - Max throughput: 1000 ms / 10 ms = 100 FPS.

    **Conclusion & Interpretation:**
    - **Result: 100 FPS (Throughput-Bound)**. Maximum throughput reaches 100 FPS, but end-to-end latency rigidly remains 20 ms per frame.
