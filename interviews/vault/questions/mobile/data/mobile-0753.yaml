title: The On-Device Fine-Tuning Data Budget
scenario: You want to fine-tune a mobile vision model on-device using 1,000 user photos preprocessed to 224x224 RGB tensors in FP32.
question: How much memory does this training dataset occupy, and does it fit comfortably in the unified memory of a mobile device alongside the model?
details:
  realistic_solution: |
    1,000 images x 224 x 224 x 3 channels x 4 bytes (FP32) = 602 MB for the dataset tensors alone. This is significant but can fit in modern unified memory alongside a small quantized model. Full on-device fine-tuning still needs separate working memory for model weights, gradients, optimizer state, activations, and batching, so the dataset may fit while the complete training working set remains tight.
  common_mistake: |
    **The Pitfall:** Estimating RAM based on compressed JPEG file sizes.
    **The Rationale:** Forgetting that the training loop requires uncompressed, full-precision tensor representations in memory.
    **The Consequence:** The training pipeline immediately OOMs and crashes the background process.
  napkin_math: |
    **Assumptions & Constraints:**
    - Images: 1000
    - Size: 224 x 224 x 3 channels
    - Precision: FP32 (4 bytes)
    - The answer options ask for the dataset tensor storage, not the full training working set.

    **Calculations:**
    - One image tensor: 224 * 224 * 3 * 4 bytes = 602,112 bytes (~602 KB).
    - Dataset tensors: 1,000 * 602,112 bytes = 602,112,000 bytes (~602 MB).
    - Additional training memory is separate and includes weights, gradients, optimizer state, activations, and batch buffers.

    **Conclusion & Interpretation:**
    - **Result: ~602 MB dataset storage (Memory Capacity-Bound)**. The dataset estimate matches option C; total training memory will be higher once model and optimizer working state are included.
  options:
    - A) ~6 MB. JPEG images are small and efficient.
    - B) ~60 MB. Each tensor is about 60 KB.
    - C) ~600 MB. Each 224x224x3 FP32 tensor is ~600 KB, times 1,000 images.
    - D) ~6 GB. Deep learning datasets always require gigabytes.
  correct_index: 2
