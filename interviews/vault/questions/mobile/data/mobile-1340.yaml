title: Calculate Data Pruning Ratio for On-Device Fine-Tuning
scenario: You are designing an on-device daily fine-tuning system for a 1B parameter model on an NPU. You have a 10-minute background processing window. The user generates 5M tokens/day. Memory bottlenecks limit NPU utilization to 20% of its peak 45 TOPS.
question: What exact data pruning ratio (coreset percentage) is required to complete the fine-tuning job within the 10-minute budget?
details:
  realistic_solution: Calculate total usable operations, operations required to process a single token, and divide maximum processable tokens by the daily token count.
  common_mistake: |
    **The Pitfall:** Ignoring the 6x backprop multiplier or the 20% utilization factor.
    **The Rationale:** Candidates assume peak TOPS equals actual throughput, or forget that training requires roughly 3x the compute of inference (1 fwd + 2 bwd = 6 ops/parameter/token).
    **The Consequence:** The system attempts to process way too much data, missing the 10-minute OS deadline and getting forcefully killed before saving progress.
  napkin_math: |
    **Assumptions & Constraints:**
    - Compute window: 10 minutes.
    - NPU peak compute: 45 TOPS.
    - Effective utilization: 20%.
    - Model size: 1B parameters.
    - Daily tokens generated: 5,000,000.

    **Calculations:**
    - Compute window in seconds: 10 mins * 60 = 600s.
    - Theoretical ops: 45e12 OPS * 600s = 2.7e16 ops.
    - Usable ops (20% util): 2.7e16 * 0.20 = 5.4e15 ops.
    - Ops per token: 6 ops (fwd/bwd pass) * 1e9 params = 6e9 ops/token.
    - Max tokens processable: 5.4e15 ops / 6e9 ops/token = 900,000 tokens.
    - Pruning ratio: 900,000 / 5,000,000 = 18%.

    **Conclusion & Interpretation:**
    - **Result: 18% Data Pruning Ratio Required**. The system can only process 18% of daily tokens within the 10-minute compute budget due to utilization bottlenecks.
