title: Calculate Data Pruning Ratio for On-Device Fine-Tuning
scenario: You are designing an on-device daily fine-tuning system for a 1B parameter model on an NPU. You have a 10-minute background processing window. The user generates 5M tokens/day. Memory bottlenecks limit NPU utilization to 20% of its peak 45 TOPS. For this sizing estimate, assume dense fine-tuning costs about 6 FLOPs per parameter per token, covering forward and backward passes.
question: What pruning ratio is needed if only the retained coreset is processed in the 10-minute budget?
details:
  realistic_solution: Calculate total usable operations, then divide by the stated dense fine-tuning estimate of 6 approximate operations per parameter per token. The 10-minute window provides 5.4e15 usable operations, enough for 900,000 tokens of a 1B parameter model. That means the retained coreset is 900,000 / 5,000,000 = 18% of the daily data, so the pruning ratio is 82%.
  common_mistake: |
    **The Pitfall:** Ignoring the stated dense fine-tuning cost estimate or the 20% utilization factor.
    **The Rationale:** Candidates assume peak TOPS equals actual throughput, or they use an inference-only cost instead of the forward-plus-backward training estimate.
    **The Consequence:** The system attempts to process way too much data, missing the 10-minute OS deadline and getting forcefully killed before saving progress.
  napkin_math: |
    **Assumptions & Constraints:**
    - Compute window: 10 minutes.
    - NPU peak compute: 45 TOPS.
    - Effective utilization: 20%.
    - Model size: 1B parameters.
    - Daily tokens generated: 5,000,000.
    - Dense fine-tuning estimate: 6 approximate operations per parameter per token.

    **Calculations:**
    - Compute window in seconds: 10 mins * 60 = 600s.
    - Theoretical ops: 45e12 OPS * 600s = 2.7e16 ops.
    - Usable ops (20% util): 2.7e16 * 0.20 = 5.4e15 ops.
    - Ops per token: 6 ops/param/token * 1e9 params = 6e9 ops/token.
    - Max tokens processable: 5.4e15 ops / 6e9 ops/token = 900,000 tokens.
    - Retained coreset fraction: 900,000 / 5,000,000 = 18%.
    - Pruning ratio: 100% - 18% = 82%.

    **Conclusion & Interpretation:**
    - **Result: 82% Data Pruning Ratio Required**. The system can retain and process only 18% of daily tokens within the 10-minute compute budget, so it must prune the remaining 82%.
