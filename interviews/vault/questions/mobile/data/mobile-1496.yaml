title: On-Device Coreset Selection for Image Personalization
scenario: You are specifying data selection requirements for an on-device personalization system fine-tuning a vision model. The device shares 12 GB of LPDDR5X memory, but 9.5 GB is reserved by the OS and base model, leaving only 2.5 GB for data selection and the training buffer.
question: Design a data pruning and selection pipeline that maximizes the Information-Compute Ratio (ICR) without causing memory exhaustion?
details:
  realistic_solution: |
    Implement an asymmetric proxy pipeline: execute a heavily quantized proxy model (e.g., MobileNetV3) to rapidly extract image embeddings, followed by a lightweight CPU-bound diversity sampling algorithm (like k-Center greedy). This completely shields the training buffer from full-model activation bloat.
  common_mistake: |
    **The Pitfall:** Running full-model forward passes to compute loss-based pruning or influence functions.
    **The Rationale:** Blindly applying server-grade coreset selection algorithms that demand massive activation memory.
    **The Consequence:** Immediate Out-Of-Memory (OOM) exceptions and catastrophic background task terminations.
  napkin_math: |
    **Assumptions & Constraints:**
    - Available RAM = 2.5 GB.
    - Training buffer must leave at least 1.5 GB for optimizer state, runtime workspace, and selected samples.
    - Full-model selection pass keeps about 4 MB of intermediate activations per image until scores are computed.
    - Proxy embedding pass keeps a 512-dimensional FP16 embedding per image plus a compact metadata record.
    - Unit convention: use MiB for byte-derived storage estimates.
    - Candidate pool = 1,000 images.

    **Calculations:**
    - Activation memory for full-model scoring = 1,000 * 4 MB = 4 GB, which exceeds the 2.5 GB selection budget before training buffers.
    - Proxy embedding memory = 1,000 * 512 * 2 bytes = 1,024,000 bytes ≈ 0.98 MiB.
    - Add 64 bytes/image metadata: 1,000 * 64 bytes = 64,000 bytes ≈ 0.06 MiB.
    - Keeping embeddings and metadata resident uses about 1.04 MiB, leaving almost all of the 2.5 GB budget for batch loading and training.

    **Conclusion & Interpretation:**
    - **Result: Proxy-embedding selection is memory-safe**. The math supports using compact embeddings for diversity-aware pruning without exhausting RAM; ICR still needs to be evaluated from validation gain per selected image.
