title: On-Device Coreset Sizing for A17 Pro
scenario: You are designing an on-device personalization pipeline that fine-tunes a model daily using the Neural Engine. You start with a raw daily log of 500,000 user interaction samples, but you must use data pruning to select a coreset because the fine-tuning job is strictly budgeted to exactly 2 seconds of active compute time to preserve battery life. Each sample requires 200 Mega-Operations for a full forward-backward training pass, you run 10 epochs over the coreset, and your implementation achieves 50% utilization of theoretical TOPS.
question: "What maximum coreset size fits a 2-second fine-tuning budget over 10 epochs on a 35 TOPS NPU?"
details:
  realistic_solution: The correct approach involves calculating the actual operations budget based on the NPU's specs and the time limit, then dividing it by the total compute cost per sample across all epochs. To hit this target in practice, the system would run a lightweight coreset selection or data pruning algorithm (like entropy-based filtering) to filter the 500,000 samples down to the calculated limit before the fine-tuning begins.
  common_mistake: |
    **The Pitfall:** Forgetting the hardware utilization factor or the epoch multiplier.
    **The Rationale:** Candidates assume 100% of theoretical TOPS is achievable in reality or calculate compute for only a single pass over the data.
    **The Consequence:** Selecting a coreset that is far too large, resulting in the fine-tuning job blowing past its 2-second budget and draining the user's battery.
  napkin_math: |
    **Assumptions & Constraints:**
    - Compute limit: 35 TOPS.
    - Target budget: 2 seconds.
    - Compute per sample: 200e6 OPS.
    - Epochs: 10.
    - Hardware utilization: 50%.

    **Calculations:**
    - Effective Compute = 35 TOPS * 50% utilization = 17.5 TOPS (17.5e12 OPS).
    - Total Operations Budget = 17.5e12 OPS * 2 seconds = 35e12 Operations.
    - Total compute per sample (10 epochs) = 200e6 * 10 = 2e9 Operations.
    - Max Coreset Size = 35e12 Operations / 2e9 Operations/sample = 17,500 samples.

    **Conclusion & Interpretation:**
    - **Result: 17,500 samples (Compute-Bound)**. The data pruning algorithm must filter the 500,000 logs down to 17,500 samples.
