title: On-Device LLM Coreset Sizing for Tensor G3
scenario: You are designing the on-device personalization pipeline for a 2B INT8 LLM running LoRA fine-tuning on a 7.5 TOPS mobile TPU. Sustained training utilization is 25% after thermal limits, sequences are 512 tokens, and the job must finish locally within a 1-hour overnight charging window.
question: How do you size the coreset and select examples so LoRA fine-tuning finishes within a 1-hour charging window?
details:
  realistic_solution: |
    Size the coreset from measured on-device training throughput, then choose examples by information gain per training second. For the stated 2B INT8 LoRA job, use about 700 high-value 512-token sequences for 2 epochs, leaving reserve inside the 1-hour window. Score recent private interactions with uncertainty, loss, and embedding diversity, select a balanced coreset that avoids near-duplicates, and stop adding examples when a held-out local validation slice gains less than a small threshold, such as 0.2 percentage points, per added batch.
  common_mistake: |
    **The Pitfall:** Training on all daily user interactions.
    **The Rationale:** Candidates propose naive bulk fine-tuning, overestimating what a mobile TPU can process without thermal throttling.
    **The Consequence:** The fine-tuning takes hours, overheating the device and violating the 1-hour overnight charging window.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hardware: 7.5 TOPS TPU; sustained training utilization after thermal limits: 25% = 1.875 TOPS.
    - Target window: 1 hour (3600s), reserve 20% for checkpointing, input pipeline stalls, and thermal variation.
    - Model: 2B INT8 base with LoRA adapters; 512-token sequences.
    - Cost model: base forward/backward through the frozen 2B backbone is approximated as 2 * parameters * tokens per sequence; LoRA adapter update adds about 0.03 TOPs/sequence.
    - Candidate coreset plan: 700 sequences for 2 epochs.

    **Calculations:**
    - Backbone ops/sequence/epoch = 2 * 2B * 512 = 2.05e12 ops = 2.05 TOPs.
    - Add LoRA update overhead: 2.05 + 0.03 = 2.08 TOPs per sequence per epoch.
    - Total training ops = 700 sequences * 2 epochs * 2.08 TOPs = 2912 TOPs.
    - Compute time = 2912 TOPs / 1.875 TOPS/s = 1553 seconds = 25.9 minutes.
    - Add 80% overhead for IO, optimizer bookkeeping, and throttling: 25.9 * 1.8 = 46.6 minutes.
    - Usable budget with reserve = 60 * 0.8 = 48 minutes.

    **Conclusion & Interpretation:**
    - **Result: about 700 sequences for 2 epochs fits**. The planned coreset takes about 46.6 minutes against a 48-minute usable budget. Increase the coreset only while validation gain per added batch justifies the extra training time; otherwise stop and preserve the thermal reserve.
