title: Real-time Edge ML System Design for Mobile Sensor Data
scenario: An edge ML system must be designed for real-time processing of high-frequency sensor data (e.g., IMU, audio, camera metadata) on a mobile device equipped with a Snapdragon 8 Gen 3 Hexagon NPU. The system needs to ingest data from multiple sensors, perform lightweight ML inference for anomaly detection or feature extraction with sub-10ms latency, and push aggregated insights to a cloud backend while minimizing power consumption and maintaining privacy.
question: How would you design a sub-10 ms Snapdragon 8 Gen 3 sensor-ingestion pipeline for IMU, audio, and camera metadata?
details:
  realistic_solution: Use interrupt-driven sensor capture into fixed-size ring buffers backed by shared memory, with monotonic timestamps and a small fusion scheduler that emits aligned 5-10 ms feature windows. Keep IMU and audio feature extraction on DSP/low-power cores where possible, send only compact feature tensors or camera metadata to the Hexagon NPU for INT8 inference, and avoid waking the big CPU on every sample. The critical path should be capture, timestamp alignment, feature extraction, NPU inference, and local decisioning within the sub-10 ms budget; cloud uploads should use coarser aggregated summaries on a separate background path. Add backpressure policies, stale-sample dropping, and dynamic duty cycling so latency and power stay bounded under bursty sensor load.
  common_mistake: |
    **The Pitfall:** Overlooking the strict memory bandwidth and power constraints of continuous high-frequency data ingestion.
    **The Rationale:** Candidates propose large models or continuous cloud uploads, forgetting that constant polling and memory bus saturation drain the battery and miss latency targets.
    **The Consequence:** The system is too power-hungry for continuous operation and fails to synchronize multiple high-frequency sensors accurately.
  napkin_math: |
    **Assumptions & Constraints:**
    - Latency budget: 10 ms per real-time decision.
    - NPU peak: 45 TOPS = 45,000 GOPS.
    - Effective usable budget after scheduling/thermal overhead: assume 10% of peak for this pipeline.
    - Feature model cost: 12 GOPS per 10 ms window.
    - Sensor input load: IMU 0.1 MB/s, audio features 1 MB/s, camera metadata 5 MB/s after ISP reduction.

    **Calculations:**
    - Peak operations per 10 ms: 45,000 GOPS x 0.010 sec = 450 GOP.
    - Conservative usable operations per 10 ms: 450 GOP x 0.10 = 45 GOP.
    - Required compute: 12 GOP per window, leaving about 33 GOP of headroom.
    - Reduced sensor bandwidth: 0.1 + 1 + 5 = 6.1 MB/s, which is far easier to sustain than moving raw camera/audio streams through the CPU.

    **Conclusion & Interpretation:**
    - **Result: Feasible only with hardware-reduced streams.** The model fits a conservative 45 GOP per-window budget, but the architecture must keep raw streams off the CPU and schedule DSP/NPU work tightly to meet sub-10 ms latency.
