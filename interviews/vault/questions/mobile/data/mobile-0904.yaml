title: 'Dataset Curation: Optimize Data Pipeline for Federated Learning on Mobile'
scenario: 'Your federated learning system is running slowly: devices spend 45 seconds on local training but only 2 seconds on gradient computation. Profiling shows 43 seconds is data preprocessing.'
question: How can the Tensor G3 federated learning preprocessing pipeline be optimized when preprocessing dominates local training time?
details:
  realistic_solution: Optimize the preprocessing pipeline by eliminating redundant per-round work. Cache pre-tokenized or pre-decoded features locally with a versioned preprocessing hash, reuse deterministic transforms across federated rounds, move cheap filtering/batching into a streaming pipeline, and reserve stochastic augmentation for lightweight CPU-safe transforms that are actually needed for model quality. Measure cache hit rate, preprocessing P95, battery impact, and model-quality deltas before expanding the optimization fleet-wide.
  common_mistake: |
    **The Pitfall:** Repeating deterministic preprocessing from scratch in every federated round.
    **The Rationale:** Engineers focus on gradient computation and overlook that tokenization, decoding, and feature extraction can be cached safely when the raw data and preprocessing version have not changed.
    **The Consequence:** The mobile device burns CPU and battery on identical work, so local training appears slow even though the actual gradient step is only a small fraction of runtime.
  napkin_math: |
    **Assumptions & Constraints:**
    - Measured local training time: 45s total.
    - Measured preprocessing time: 43s.
    - Measured gradient computation time: 2s.
    - No transform-level timing breakdown is provided, so any post-optimization runtime must be validated by profiling.

    **Calculations:**
    - Preprocessing share = 43s / 45s = 95.6% of local training time.
    - Gradient share = 2s / 45s = 4.4%.
    - If caching and streaming remove S seconds of repeated preprocessing, new total time = (43s - S) + 2s.
    - To reduce total time below 15s, the pipeline must remove at least 30s of preprocessing: 45s - 15s = 30s, which is about 70% of the preprocessing path.
    - The concrete optimization target is therefore a measured reduction in repeated deterministic preprocessing, not an assumed fixed 5s replacement.

    **Conclusion & Interpretation:**
    - **Result: CPU/preprocessing-bound.** The given profile shows preprocessing dominates at 43s of 45s. Cache deterministic transforms, stream batching, and then re-profile; do not claim a specific speedup until transform-level timings confirm the saved seconds.
