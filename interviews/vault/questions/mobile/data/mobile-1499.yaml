title: Data Curation for INT8 Hexagon NPU Calibration
scenario: Your team is deploying a real-time object detection model to the Qualcomm Hexagon NPU (Snapdragon 8 Gen 3) on a new flagship phone. The NPU requires INT8 quantization to achieve its 45 TOPS peak performance, but post-training quantization is causing a significant drop in mean Average Precision (mAP) due to outlier activations.
question: How would you curate an INT8 calibration dataset that captures long-tail edge cases considering the shared 12-16 GB LPDDR5X memory?
details:
  realistic_solution: Curate a small calibration set from real deployment data that preserves the natural distribution while deliberately covering long-tail cases such as low light, glare, motion blur, occlusion, small objects, and unusual poses. Use clustering or stratified sampling over image metadata, embeddings, and model confidence/error signals rather than sampling only maximum activation outliers. Stream the selected images through calibration in small batches so the FP32 reference path, quantizer statistics, and INT8 candidate model stay within shared LPDDR5X memory.
  common_mistake: |
    **The Pitfall:** Proposing uniform random sampling from the training set.
    **The Rationale:** Candidates fail to realize that random sampling under-represents rare lighting and poses that cause the activation spikes necessary for accurate scale/zero-point calibration.
    **The Consequence:** The quantized model clips outlier activations incorrectly, leading to a massive drop in mAP.
  napkin_math: |
    **Assumptions & Constraints:**
    - Calibration target: 500 representative images selected from deployment logs.
    - Input tensor: 640 x 640 x 3 FP32 during calibration.
    - Batch size: 16 images.
    - Available app memory during calibration: a few GB after OS, camera, and runtime overhead.

    **Calculations:**
    - Single calibration tensor = 640 * 640 * 3 * 4 bytes ≈ 4.9 MB.
    - Batch tensor memory = 16 * 4.9 MB ≈ 78 MB.
    - Streaming all 500 images in 16-image batches requires 32 passes through the loader, but only one batch plus calibration statistics is resident at a time.
    - A 500-image FP32 tensor cache would be 500 * 4.9 MB ≈ 2.45 GB, so loading everything at once is avoidable memory pressure.

    **Conclusion & Interpretation:**
    - **Result: Streamed representative calibration**. The curation decision is about distribution coverage, while memory safety comes from processing compact selected batches rather than holding the whole calibration set in RAM.
