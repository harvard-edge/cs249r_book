title: The Hardware Decoder Synchronization
scenario: Your app runs an action recognition model on a live video stream. You use the Android MediaCodec API to decode the H.264 video using hardware. You then convert the frame to a tensor and run inference. The model takes 15ms and the hardware decode takes 10ms, which should comfortably hit 30 FPS, yet the app drops frames.
question: What is fundamentally wrong with putting hardware decoding in the critical path of a synchronous loop?
details:
  realistic_solution: |
    Hardware video decoders exhibit highly variable, asynchronous latency due to frame dependencies (e.g., I/P/B frames). Blocking the ML inference thread synchronously on decoder output guarantees missed real-time deadlines during keyframe stalls. Implement a decoupled producer-consumer architecture utilizing a ring buffer. The decoder writes asynchronously, while the ML thread reads the most recent available frame, absorbing the jitter.
  common_mistake: |
    **The Pitfall:** Assuming hardware decoding is slow or constant-time.
    **The Rationale:** Engineers assume a synchronous wait is fine, without realizing that hardware decoders have highly variable, asynchronous latency due to keyframes.
    **The Consequence:** Severe frame drops, unhandled jitter, and UI stutter.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target framing: 30 FPS (33.3ms deadline).
    - Inference time: 15ms constant.
    - Typical hardware decode time from the scenario: 10ms.
    - Keyframe or decoder-queue stalls can add another 10-15ms of wait time in a synchronous loop.

    **Calculations:**
    - Typical critical path: 10ms + 15ms = 25ms (under 33.3ms deadline).
    - Stalled critical path: (10ms + 15ms stall) + 15ms inference = 40ms (misses 33.3ms deadline).

    **Conclusion & Interpretation:**
    - **Result: 40ms stalled-path latency (Jitter Bottleneck)**. Synchronous design creates a jitter bottleneck during decoder stalls. A decoupled ring buffer mitigates this jitter by letting inference consume the freshest available decoded frame, but it cannot absorb stalls that exceed the buffer depth or freshness requirements.
