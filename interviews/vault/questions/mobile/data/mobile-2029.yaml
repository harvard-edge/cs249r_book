title: Identifying Bandwidth Bottlenecks in Mobile Video Processing
scenario: A real-time video processing app buffers 4K frames in LPDDR5X memory before feeding them to the NPU. The pipeline currently experiences frame drops despite the NPU reporting only 60% utilization.
question: Identify the likely bottleneck in the data pipeline and calculate the required memory bandwidth to sustain 60 FPS for uncompressed 4K (3840x2160, 3 channels, 8-bit) input.
details:
  realistic_solution: |
    The bottleneck is likely memory bandwidth exhaustion or copy overhead rather than compute. To sustain 60 FPS for 4K video, the pipeline requires massive continuous bandwidth just for a single read pass, not accounting for intermediate buffer copies, format conversions (e.g., YUV to RGB), or OS overhead.
  common_mistake: |
    **The Pitfall:** Assuming NPU utilization directly maps to pipeline health.
    **The Rationale:** Candidates assume the compute capacity limits performance without calculating the baseline data transfer requirements, often forgetting to multiply by the 3 color channels.
    **The Consequence:** Wasting time profiling NPU kernels when the frames are being dropped in the DMA transfer layer.
  napkin_math: |
    **Assumptions & Constraints:**
    - Resolution: 3840 x 2160.
    - Channels: 3 (8-bit, 1 byte/channel).
    - Framerate: 60 FPS.

    **Calculations:**
    - Bytes per frame: 3840 * 2160 * 3 bytes = 24,883,200 bytes = ~24.88 MB.
    - Required bandwidth: 24.88 MB/frame * 60 FPS = 1492.99 MB/s = ~1.49 GB/s.

    **Conclusion & Interpretation:**
    - **Result: ~1.49 GB/s (Memory Bandwidth / DMA)**. The pipeline requires massive continuous bandwidth just for single-pass reading.
