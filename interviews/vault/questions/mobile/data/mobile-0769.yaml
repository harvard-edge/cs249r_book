title: The Replay Buffer Memory Budget
scenario: You are designing a continuous learning system for a mobile recommendation
  model. The system maintains a replay buffer of 10,000 past interactions stored as
  768-dimensional FP16 embeddings plus 64 bytes of metadata per sample.
question: How would you calculate the buffer size and design a memory-aware eviction
  policy that prevents unbounded growth on a memory-constrained device?
details:
  realistic_solution: 'Buffer size: 10,000 x (768 x 2 + 64) = 10,000 x 1,600 bytes
    = 16 MB. Eviction policy: (1) Hard cap at 16 MB / 10K samples, (2) reservoir sampling
    to maintain distribution representativeness, (3) priority eviction based on prediction
    confidence (remove easy examples first), (4) class-balanced eviction to prevent
    catastrophic forgetting of rare categories.'
  common_mistake: '**The Pitfall:** Storing raw input data instead of compact embeddings.

    **The Rationale:** Candidates often design replay buffers holding massive uncompressed
    inputs (e.g., full images), which quickly exceed memory limits.

    **The Consequence:** The system rapidly causes Out-Of-Memory crashes, forcing
    the OS to terminate the background training process.

    '
  napkin_math: "1. **Assumptions & Constraints:**\n   - Buffer capacity: 10,000 samples.\n\
    \   - Embeddings: 768-dimensional FP16 (2 bytes per float).\n   - Metadata: 64\
    \ bytes per sample.\n2. **Calculations:**\n   - Embedding size per sample = 768\
    \ * 2 bytes = 1,536 bytes.\n   - Total size per sample = 1,536 bytes + 64 bytes\
    \ = 1,600 bytes.\n   - Total Buffer Size = 10,000 samples * 1,600 bytes = 16,000,000\
    \ bytes = 16 MB.\n3. **Conclusion & Interpretation:**\n   **Result: Memory-Capacity\
    \ Bound. The buffer consumes exactly 16 MB, making it highly feasible for edge\
    \ deployment compared to storing raw image data.**\n"
