title: The Photo Segmentation Pipeline
scenario: A Portrait Mode photo pipeline on a Pixel 8 Pro (Tensor G3) consists of capture, depth estimation, person segmentation, and bokeh rendering. The user expects the result within 500ms. The Tensor G3 has a dual-core TPU at 10 TOPS and an Adreno-class GPU.
question: What is the latency breakdown for Pixel Portrait Mode, and which stage is the bottleneck?
details:
  realistic_solution: 'Break down each stage with nsys profiling or standard trace tools: ISP: 100ms (fixed). Depth: 45ms (TPU). Segmentation: 25ms (TPU). Bokeh rendering heavily impacts the GPU. At 3 MP, Bokeh takes 30ms. Total latency is 200ms, easily clearing the 500ms budget. The ML models constitute only 70ms (35% of total time), meaning rendering and ISP dominate the critical path.'
  common_mistake: |
    **The Pitfall:** Assuming the deep learning inference step is always the primary system bottleneck.
    **The Rationale:** Candidates focus exclusively on ML ops, ignoring the end-to-end system context including hardware ISPs and GPU fragment shaders.
    **The Consequence:** Optimization efforts are wasted on model quantization when the ISP and GPU rendering are the actual critical path blockers.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Total Budget: 500ms.
       - ISP Time: 100ms.
       - Depth (TPU): 45ms.
       - Segmentation (TPU): 25ms.
       - Bokeh (GPU @ 3MP): 30ms.
    2. **Calculations:**
       - ML Latency: 45ms + 25ms = 70ms.
       - Total Latency: 100ms + 70ms + 30ms = 200ms.
       - ML Fraction: 70ms / 200ms = 35%.
    3. **Conclusion & Interpretation:**
       - **Result: ISP/GPU-Bound.** ML stages consume only 35% of the timeline. The fixed hardware ISP and GPU rendering are the true bottlenecks.
