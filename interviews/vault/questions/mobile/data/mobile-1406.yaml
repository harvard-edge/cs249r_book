title: On-Device Coreset Selection for Nightly Fine-Tuning
scenario: You are building an on-device personalization system for a predictive model running on a Samsung Exynos 2400. To preserve battery and avoid starving the shared 12 GB LPDDR5X memory used by the CPU/GPU/ISP, overnight background training is capped at a strict compute budget of 100 TERA-operations (TOPs). The user's daily log generates 20,000 interaction samples, and a full forward-backward training step requires 10 Giga-operations (GOPs) per sample.
question: How should nightly fine-tuning data be scored and selected on-device using the Exynos 2400 dual-core NPU within a 100 TOPs budget?
details:
  realistic_solution: The optimal approach uses the dual-core NPU to run a lightweight, quantized proxy model over all 20,000 daily samples and rank them by proxy loss or uncertainty. If proxy scoring costs 1 GOP per sample and selection overhead is treated as negligible, scoring consumes 20 TOPs. The remaining 80 TOPs allows full training on the top-scoring 8,000 samples at 10 GOPs each. This high-loss coreset maximizes the Information-Compute Ratio (ICR) while staying within the 100 TOPs nightly budget and avoiding thermal or shared-memory pressure.
  common_mistake: |
    **The Pitfall:** Training on random or most recent samples, or caching activations from a forward-only pass.
    **The Rationale:** Candidates ignore data quality and fail to realize that caching activations would easily saturate the shared 12 GB LPDDR5X memory during background OS tasks.
    **The Consequence:** Slow convergence, budget overruns, and severe system-wide memory contention.
  napkin_math: |
    **Assumptions & Constraints:**
    - Compute budget: 100 TOPs.
    - Total samples: 20,000.
    - Training cost: 10 GOPs/sample.
    - Proxy scoring cost: 1 GOP/sample.
    - Ranking/selection overhead is streamed and ignored in the compute budget.
    - Unit conversion: 1 TOP = 1,000 GOP.

    **Calculations:**
    - Naive training compute: 20,000 * 10 GOPs = 200,000 GOPs = 200 TOPs (over budget).
    - Proxy scoring compute: 20,000 * 1 GOP = 20,000 GOPs = 20 TOPs.
    - Remaining training budget: 100 TOPs - 20 TOPs = 80 TOPs = 80,000 GOPs.
    - Select the highest-loss/uncertain samples that fit the remaining budget.
    - Coreset size: 80,000 GOP / 10 GOP per sample = 8,000 samples.
    - Total planned compute: 20 TOP scoring + 80 TOP training = 100 TOP.

    **Conclusion & Interpretation:**
    - **Result: score all 20,000 samples, train on the top 8,000 (Compute-Bound).** The quota follows directly from reserving 20 TOP for proxy scoring and 80 TOP for full training.
