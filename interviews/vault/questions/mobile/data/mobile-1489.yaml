title: Exynos 2400 Shared Memory Architecture
scenario: You are building a real-time sensor data ingestion pipeline for an augmented reality application running on a device powered by a modern unified mobile NPU. The pipeline streams high-frequency camera and IMU data directly to the NPU for immediate processing.
question: Based on the hardware specifications of modern mobile SoCs, what type of memory architecture does the NPU use to access streaming data alongside the CPU and GPU?
details:
  realistic_solution: 'The correct hardware specification to recall is that modern mobile SoCs use a unified, shared memory architecture, sharing a single LPDDR5X memory pool with the CPU, GPU, and ISP. This allows for zero-copy data ingestion pipelines where the CPU writes the streaming sensor data to memory, and the NPU reads it directly from the same physical address space without costly memory transfer overhead.'
  common_mistake: |
    **The Pitfall:** Assuming mobile NPUs have physically isolated VRAM.
    **The Rationale:** Candidates think mobile SOCs operate like discrete desktop GPUs and suggest manual data transfers over a PCIe-like bus.
    **The Consequence:** They write terribly inefficient code that copies data back and forth, starving the NPU and draining the battery.
  napkin_math: |
    **Assumptions & Constraints:**
    - Real-time stream at 60 FPS, 6 MB per frame.
    - Isolated VRAM requires CPU->RAM and RAM->VRAM explicit copies.

    **Calculations:**
    - Ingestion bandwidth = 60 FPS * 6 MB/frame = 360 MB/s.
    - Redundant copy overhead = 360 MB/s wasted PCIe traffic.

    **Conclusion & Interpretation:**
    - **Result: 360 MB/s overhead eliminated (Memory-bound bottleneck avoided)**. Because the LPDDR5X is unified, the NPU reads directly from RAM.
