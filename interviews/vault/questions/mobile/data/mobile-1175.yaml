title: Evaluating On-Device Data Quality Gates
scenario: You are designing a real-time data quality validation system for a 4K 60FPS live video processing pipeline on a mobile SoC. The pipeline must validate the input frame quality (detecting corruption or extreme noise) before inference. Option A uses a lightweight CNN on the NPU to filter bad frames. Option B uses traditional ISP statistics evaluated on the CPU. The device shares a 12 GB LPDDR5X memory architecture.
question: How would you evaluate these alternatives, considering the shared memory architecture, and recommend the better design?
details:
  realistic_solution: Option B is the better system-level design. The SoC shares its LPDDR5X memory across the CPU, GPU, ISP, and NPU. By leveraging ISP statistics that are already computed during frame capture, you avoid the redundant full-frame validation read that Option A would add. The main inference path still reads the frame, but Option B saves about 1.5 GB/s of incremental shared-memory traffic and keeps the NPU reserved for the main task.
  common_mistake: |
    **The Pitfall:** Defaulting to Option A because the NPU has plenty of raw TOPS for a lightweight model.
    **The Rationale:** Candidates focus on compute availability and completely ignore the memory bandwidth cost of reading high-resolution frames multiple times.
    **The Consequence:** Reading the 4K 60FPS frame twice starves the CPU and ISP of shared memory bandwidth, causing dropped frames across the entire OS.
  napkin_math: |
    **Assumptions & Constraints:**
    - Frame size: 4K 60FPS (3840x2160x3 bytes x 60 FPS).
    - SoC shares LPDDR5X memory across all hardware blocks.

    **Calculations:**
    - Single Read Bandwidth (inference): 3840 x 2160 x 3 bytes x 60 = 1.49 GB/s (~1.5 GB/s).
    - Option A total frame-read bandwidth: main inference read (~1.5 GB/s) + NPU validation read (~1.5 GB/s) = ~3.0 GB/s total, or ~1.5 GB/s extra.
    - Option B total frame-read bandwidth: main inference read (~1.5 GB/s) + existing ISP metadata access (~0 GB/s extra full-frame reads) = ~1.5 GB/s total.

    **Conclusion & Interpretation:**
    - **Result: Option B saves about 1.5 GB/s of incremental validation bandwidth.** The main inference read remains, but ISP-derived validation avoids the redundant full-frame read that Option A would add, saving power and reducing shared memory controller contention.
