title: 'Image Resizing Memory Pipeline'
scenario: 'Before an Apple A17 Pro Neural Engine processes a camera frame, the CPU resizes a raw uncompressed 4K (3840x2160) RGB 8-bit image to a 224x224 RGB 8-bit input tensor.'
question: 'Calculate the absolute minimum system memory read and write bandwidth consumed purely by this resizing step for a single frame.'
details:
  realistic_solution: 'The input 4K image is 3840 * 2160 * 3 bytes = 24,883,200 bytes (roughly 24.9 MB). The CPU must read this entirely. The resized output image is 224 * 224 * 3 bytes = 150,528 bytes (roughly 150 KB). The CPU writes this output. The absolute minimum memory footprint is the sum of these operations: ~25.03 MB per frame. At 30 FPS, this trivially consumes ~750 MB/s of LPDDR5 bandwidth.'
  common_mistake: |
    **The Pitfall:** Only calculating the size of the output tensor.
    **The Rationale:** Candidates forget that the full high-resolution camera buffer must be read into memory first.
    **The Consequence:** Memory bandwidth constraints are severely underestimated, leading to pipeline bottlenecks.
  napkin_math: |
    **Assumptions & Constraints:**
    - Input 4K read: 3840 * 2160 * 3 bytes = 24,883,200 bytes.
    - Output tensor write: 224 * 224 * 3 bytes = 150,528 bytes.

    **Calculations:**
    - Minimum footprint per frame: 24,883,200 + 150,528 = 25,033,728 bytes (~25.03 MB).

    **Conclusion & Interpretation:**
    - **Result: ~750 MB/s (Memory-Bound)**. At 30 FPS, this consumes ~750 MB/s of LPDDR5 bandwidth.
