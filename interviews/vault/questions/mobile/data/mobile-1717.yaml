title: Exynos NPU Data Contract Violations
scenario: A real-time AR semantic segmentation model on an NPU experiences severe lag and complete app freezes. Telemetry shows NPU utilization drops significantly during these spikes. The CPU struggles with preprocessing malformed sensor data (camera frames, IMU) that intermittently deviates from the expected schema. These violations bypass coarse CPU validation, reach the quantized NPU model, and cause NPU stalls.
question: How would you diagnose and redesign validation, fallback, and telemetry for NPU stalls from sensor contract violations?
details:
  realistic_solution: |
    Correlate stall traces with raw sensor metadata, model input tensors, and validation outcomes to isolate which contract violations bypass the coarse checks. Then implement fine-grained, low-latency data quality gates immediately preceding the NPU inference call. Use an optimized micro-validation layer on the CPU (e.g., leveraging SIMD instructions like NEON) to perform rapid checks on distributions, timestamp alignment, shapes, and quantization ranges. Add explicit policies for bad frames: drop, reuse the last good frame, or route to a degraded CPU/GPU path depending on scene state. Finally, emit compact telemetry on violation type and recovery action so the pipeline can be tuned without logging sensitive raw sensor data.
  common_mistake: |
    **The Pitfall:** Relying solely on coarse schema validation.
    **The Rationale:** Candidates assume the NPU gracefully handles minor data deviations and ignore the high latency cost of dynamic re-validation or context switching when stalls occur.
    **The Consequence:** 'Garbage in, garbage out' scenarios manifest as massive NPU stalls, dropped frames, and degraded user experience.
  napkin_math: |
    **Assumptions & Constraints:**
    - 30 FPS target (33.3ms budget per frame).
    - Problematic frame rate: 5%.
    - Stall penalty: 10ms NPU stall + 50ms CPU recovery.
    - Micro-validation CPU cost: 1ms per bad frame.

    **Calculations:**
    - Problematic frames at 30 FPS: 0.05 * 30 = 1.5 frames/sec.
    - Total delay per second without fix: 1.5 * (10ms + 50ms) = 90ms/sec.
    - Micro-validation layer cost for bad frames: 1.5 * 1ms = 1.5ms/sec.
    - Net time saved: 90ms - 1.5ms = 88.5ms/sec.

    **Conclusion & Interpretation:**
    - **Result: 88.5ms/sec saved (Compute-Bound)**. The micro-validation layer saves 88.5ms/sec and restores real-time performance.
