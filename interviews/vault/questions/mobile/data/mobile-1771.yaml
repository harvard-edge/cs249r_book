title: 'Data Validation Gate Memory Bottleneck'
scenario: 'A mobile pipeline implements a strict data quality gate using an INT8 autoencoder to detect sensor anomalies before passing data to the main perception model. Both models run sequentially on the Qualcomm Hexagon NPU (Snapdragon 8 Gen 3) using its 45 TOPS INT8 compute. The autoencoder has 200MB of weights, and the main model has 1GB. They share the 16 GB LPDDR5X memory (64 GB/s max bandwidth) with the CPU and GPU. During concurrent GPU UI rendering, the system misses the 33.3ms deadline for 30fps video, even though NPU compute utilization is under 10%.'
question: 'Why does an INT8 autoencoder gate plus 1 GB main model miss a 33.3 ms video deadline on Snapdragon 8 Gen 3?'
details:
  realistic_solution: 'The bottleneck is strictly memory-bound, caused by sequentially swapping the validation and main models in and out of the NPU''s local SRAM. Because it is a heterogeneous SoC, the GPU''s UI rendering consumes a significant portion of the shared memory bandwidth. The solution is to either fuse the data quality gate into the main model''s early layers or keep both models persistently resident in RAM to avoid per-frame swapping penalties.'
  common_mistake: 'Candidates often focus purely on the NPU''s 45 TOPS INT8 compute capacity and assume the bottleneck is computational, or they assume the NPU has exclusive access to the 64 GB/s memory bandwidth without accounting for the heterogeneous SoC architecture where the GPU and CPU compete for the shared LPDDR5X pool.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Weights swapped per frame: 200MB (validator) + 1000MB (main) = 1.2GB.
    - LPDDR5X maximum bandwidth: 64 GB/s.
    - CPU/GPU consume ~50% bandwidth for UI rendering.
    - Target frame budget (30fps): 33.3ms.

    **Calculations:**
    - Available NPU bandwidth: 64 GB/s * 0.5 = 32 GB/s.
    - Weight loading time per frame: 1.2 GB / 32 GB/s = 0.0375 seconds (37.5ms).

    **Conclusion & Interpretation:**
    - **Result: 37.5ms (Memory-Bound).** The system misses the 33.3ms deadline strictly due to memory I/O before the 45 TOPS compute even begins.
