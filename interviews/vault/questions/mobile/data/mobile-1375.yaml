title: On-Device Data Validation for Continuous Learning
scenario: "You are designing an on-device data quality validation system for a continuous learning vision model running on the Samsung Exynos 2400 NPU. The system must filter incoming 1080p stream frames for training data collection without interrupting the primary real-time inference task."
question: "How would you design a multi-stage data validation pipeline for continuous learning that strictly bounds memory bandwidth and NPU utilization?"
details:
  realistic_solution: "Architect a multi-tier gating system. Fast-fail unviable frames instantly via hardware-level ISP heuristics (exposure/blur indices). The survivors are heavily downsampled and passed to an aggressively quantized, lightweight feature extractor running at low frequency on the NPU's spare cycles. This avoids bandwidth starvation while securely buffering high-entropy candidates asynchronously to persistent storage."
  common_mistake: |
    **The Pitfall:** Proposing heavy anomaly detection models running directly on uncompressed, full-resolution frames.
    **The Rationale:** Candidates ignore the severe physical memory bandwidth limits of a shared LPDDR5X architecture.
    **The Consequence:** Constantly shuffling massive uncompressed frames between the ISP, NPU, and CPU starves the main application of bandwidth and introduces system-wide UI jank.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 1080p frame = ~6.2 MB. 30 FPS raw throughput = 186 MB/s.
       - NPU Compute available: 14.7 TOPS (after primary inference).
       - Lightweight anomaly model: ~0.1 GOPS per 224x224 frame.
    2. **Calculations:**
       - Sampling compute (5 FPS) = 0.5 GOPS = 0.0005 TOPS (easily fits 14.7 TOPS).
       - Downsampled frame size (224x224) = ~150 KB.
       - Validation memory bandwidth = 150 KB * 5 FPS = 0.75 MB/s.
    3. **Conclusion & Interpretation:**
       - **Result: Bandwidth-Bound.** By downsampling in the ISP and dropping the validation rate to 5 FPS, the required memory bandwidth collapses from 186 MB/s to a mere **0.75 MB/s**, safely preserving system responsiveness.
