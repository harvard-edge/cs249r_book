title: Thermally Constrained Background Data Pipelines on Mobile Cores
scenario: An on-device personalization pipeline fine-tunes an LLM using local text messages over night while the mobile phone is charging.
question: How would you formulate a data pipeline that tokenizes SQLite text messages incrementally without causing thermal throttling or waking up the high-performance CPU cores?
details:
  realistic_solution: Create a low-priority background task constrained to charging and idle windows. Read SQLite rows incrementally with a bounded cursor, tokenize messages in small batches, and use a queue with backpressure so token buffers cannot grow without limit. Persist progress after each batch so the job can pause and resume without waking high-performance cores unnecessarily.
  common_mistake: |
    **The Pitfall:** Loading the entire message database into RAM at once.
    **The Rationale:** Candidates use standard data loading techniques suited for cloud environments where RAM and thermal limits are vast.
    **The Consequence:** Causing memory spikes, repeated CPU wakeups, and sustained work that can lead to throttling or background-task termination.
  napkin_math: |
    **Assumptions & Constraints:**
    - Chunk Size: 50 messages.
    - Token Density: 50 tokens/message.
    - Data Type: INT16 tokens (2 bytes).

    **Calculations:**
    - Chunk Token Count: 50 * 50 = 2,500 tokens.
    - Token buffer: 2,500 * 2 bytes = 5,000 bytes (~5 KB).
    - Even with 10x temporary tokenizer overhead, batch state is ~50 KB, far below a whole-database load.

    **Conclusion & Interpretation:**
    - **Result: bounded per-batch memory.** Small batches do not guarantee cache residency or eliminate DRAM traffic, but they cap memory growth and reduce long CPU bursts that would otherwise wake high-performance cores.
