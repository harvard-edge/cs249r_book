title: Thermally Constrained Background Data Pipelines on Mobile Cores
scenario: An on-device personalization pipeline fine-tunes an LLM using local text messages over night while the mobile phone is charging.
question: How would you formulate a data pipeline that tokenizes SQLite text messages incrementally without causing thermal throttling or waking up the high-performance CPU cores?
details:
  realistic_solution: 'Create a background task constrained to the charging state. Use the SoC''s low-power efficiency cores to query the database in small chunks. Tokenize using a C++ JNI bridge to avoid Java garbage collection spikes, then write the tokenized binary buffers to storage before signaling the NPU.'
  common_mistake: |
    **The Pitfall:** Loading the entire message database into RAM at once.
    **The Rationale:** Candidates use standard data loading techniques suited for cloud environments where RAM and thermal limits are vast.
    **The Consequence:** Triggering aggressive thermal mitigation from the mobile OS scheduler and causing memory spikes.
  napkin_math: |
    **Assumptions & Constraints:**
    - Chunk Size: 50 messages.
    - Token Density: 50 tokens/message.
    - Data Type: INT16 tokens (2 bytes).

    **Calculations:**
    - Chunk Token Count: 50 * 50 = 2,500 tokens.
    - Memory Footprint: 2,500 * 2 bytes = 5,000 bytes (5 KB).

    **Conclusion & Interpretation:**
    - **Result: 5 KB memory footprint (Thermal-Bound)**. Processing in small 5 KB chunks easily fits within efficiency core L1 caches, preventing DRAM access and high-power core activation.
