title: On-Device Coreset Selection Architecture for Apple A17 Pro
scenario: You are designing an on-device data pruning and coreset selection pipeline for personalized language model fine-tuning on the Apple A17 Pro Neural Engine. The system continuously collects user text data, but due to the shared 8 GB unified memory and the need to keep power consumption under a ~5W thermal envelope during overnight charging, you cannot store or train on all collected data.
question: How would you architect a system that evaluates the Information-Compute Ratio (ICR) of incoming data and selects a high-value coreset for on-device training without starving OS resources?
details:
  realistic_solution: The system should score each incoming sample with a bounded on-device pipeline rather than storing everything. A lightweight proxy model estimates information value from novelty, loss reduction, rarity, and user-relevance signals, then divides that score by measured cost such as tokens, estimated ops, memory footprint, and energy to produce an Information-Compute Ratio. Only samples above a threshold enter a fixed-size coreset buffer with diversity constraints so one intent cannot dominate. Scheduling should run in short background slices while charging or idle, cap memory explicitly below the 2 GB headroom, pause on thermal or battery pressure, and persist only token IDs plus compact metadata needed for replay.
  common_mistake: |
    **The Pitfall:** Proposing complex neural-based data valuation methods, like using the full LLM to compute gradients for every sample.
    **The Rationale:** Candidates rely on standard server-side active learning literature without translating the constraints to an edge device.
    **The Consequence:** The continuous background grading exceeds both the 8GB shared memory limit and the ~5W thermal budget, starving the OS and crashing the device.
  napkin_math: |
    **Assumptions & Constraints:**
    - Shared memory: 8 GB total; OS/background reserve 3 GB; model/runtime reserve 3 GB; target working headroom <= 2 GB.
    - Coreset: 10,000 samples, 128 tokens/sample, 2 bytes/token ID, plus 64 bytes/sample metadata.
    - ICR scoring workload: 100,000 interactions at 10 M-OPS/sequence.
    - A17 Pro Neural Engine class throughput: up to ~35 TOPS peak, but background effective throughput is throttled well below peak.

    **Calculations:**
    - Token storage: 10,000 x 128 x 2 bytes = 2.56 MB.
    - Metadata: 10,000 x 64 bytes = 0.64 MB, so the compact coreset record is ~3.2 MB before database/index overhead.
    - Total scoring work: 100,000 x 10 M-OPS = 1e12 ops.
    - Peak lower-bound time: 1e12 / 35e12 ops/s = 0.0286 s. At a conservative 5% effective background utilization, time is ~0.57 s spread across short slices.
    - Even with 10x storage overhead for indexes and queues, the coreset stays around 32 MB, far below the 2 GB headroom.

    **Conclusion & Interpretation:**
    - **Result: bounded coreset and throttled scoring**. The architecture avoids OS starvation by keeping the replay buffer small, measuring ICR as value per compute cost, and scheduling scoring/training only within explicit memory, power, and thermal budgets.
