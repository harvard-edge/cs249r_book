title: On-Device Data Quality for A17 Pro Mobile ML
scenario: You are leading the ML engineering effort for a new mobile application targeting the Apple A17 Pro chip. This app continuously captures and processes high-frequency sensor data on-device to power a real-time behavioral prediction model. Intermittent performance degradation is suspected to be due to subtle upstream data quality issues.
question: How would you design a robust on-device data quality pipeline for high-frequency sensor data on the Apple A17 Pro?
details:
  realistic_solution: Implement lightweight, compile-time schema validation for sensor data structures, potentially using Protocol Buffers or FlatBuffers for efficient serialization/deserialization. Introduce on-device, configurable quality gates that perform essential checks (e.g., range checks, completeness, frequency anomalies) immediately after sensor capture, before data feeds into the model. Utilize a simplified anomaly detection mechanism (e.g., statistical thresholds, moving averages) that runs efficiently on the A17 Pro's Neural Engine or low-power CPU cores. Implement local lineage tracking for critical data points to aid debugging, storing metadata like sensor origin, timestamp, and validation status, but aggressively prune this for memory efficiency. Employ a canary deployment strategy for model updates and data pipeline changes, carefully monitoring on-device metrics for data quality deviations before full rollout.
  common_mistake: |
    **The Pitfall:** Running expensive per-sample validation synchronously on the sensor capture path.
    **The Rationale:** Engineers treat high-frequency mobile sensor streams like server-side batch data and validate every raw sample with heavy rules before buffering.
    **The Consequence:** Capture threads miss deadlines, timestamps drift, and the model sees gaps or stale windows even though the validation logic is technically correct.
  napkin_math: |
    **Assumptions & Constraints:**
    - Sensor stream rate: 200 Hz across fused IMU channels.
    - Real-time window: 100 ms, so each window contains 20 samples.
    - Lightweight checks: timestamp monotonicity, range bounds, missing values, and window-level variance.
    - Target validation overhead: under 1 ms per 100 ms window.

    **Calculations:**
    - Per-sample cheap checks: 20 samples x ~4 simple checks = ~80 primitive checks/window.
    - At 10 windows/sec, this is ~800 primitive checks/sec, which is small enough for low-power CPU execution.
    - More expensive anomaly scoring should run once per window, not once per sample, to keep validation off the critical capture path.

    **Conclusion & Interpretation:**
    - **Result: Latency-bound validation.** The robust design uses cheap capture-path guards plus window-level quality scores, preserving sensor timing while still detecting drift, gaps, and out-of-range values.
