title: Real-time Gesture Recognition on Google Tensor G3
scenario: You are architecting a real-time gesture recognition system for a mobile device. The system ingests sensor data (accelerometer, gyroscope, magnetometer) at 1 kHz each. This raw data passes through an event-driven pipeline for feature computation before feeding a pre-trained TFLite model. The entire pipeline must achieve under 50ms end-to-end latency. The ML model inference itself takes 10ms on the TPU.
question: How would you design the data ingestion and feature computation pipeline to meet the strict sub-50ms end-to-end latency constraint?
details:
  realistic_solution: 'Implement a multi-threaded, event-driven architecture utilizing highly optimized, lock-free ring buffers or message queues for inter-stage communication (sensor acquisition -> feature extraction -> inference). Dedicate high-priority threads for sensor data acquisition and a separate thread pool for feature computation. Leverage the TPU specifically for model inference and, if computationally intensive and suitable for acceleration, certain feature extraction steps. Employ techniques like zero-copy data transfer between pipeline stages where possible. Implement a robust backpressure mechanism (e.g., explicit flow control, adaptive sampling, or dynamic buffer sizing) to prevent data loss.'
  common_mistake: |
    **The Pitfall:** Failing to account for backpressure and inter-process communication overhead.
    **The Rationale:** Candidates design naive pipelines that drop data during burst events or underutilize the TPU by offloading too much work to the CPU.
    **The Consequence:** System crashes due to inefficient memory management and failure to meet the real-time latency deadline.
  napkin_math: |
    **Assumptions & Constraints:**
    - 3 sensors at 1 kHz, 3 axes each (9 floats/sample).
    - Total latency budget = 50ms. TPU inference = 10ms.
    - Look-back window = 100ms.

    **Calculations:**
    - Raw Data Rate = 1000 samples/s * 9 floats * 4 bytes = 36 KB/s.
    - Window Size = 0.1s * 36 KB/s = 3.6 KB.
    - Remaining CPU budget = 50ms - 10ms = 40ms.

    **Conclusion & Interpretation:**
    - **Result: 40ms CPU budget (Latency-bound by CPU IPC overhead)**. The challenge is maintaining highly optimized, lock-free data flow as memory capacity is negligible.
