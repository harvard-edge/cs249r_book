title: On-Device Active Learning Throughput
scenario: You are designing an on-device active learning pipeline to curate difficult edge-case images for server-side labeling. You must limit your background data selection task to just 2% of peak NPU compute to avoid thermal throttling and memory bandwidth contention.
question: If your uncertainty-scoring model requires 12.5 GOPS per inference, how many frames per minute can you evaluate to curate your dataset?
details:
  realistic_solution: The solution requires converting the total NPU capacity to the
    correct scale, applying the background utilization constraint, and then dividing
    by the model's computational cost. We convert TOPS to GOPS, apply the 2% constraint
    to find allowable compute per second, divide by the model's cost to get frames
    per second, and multiply by 60 to determine the curation throughput per minute.
  common_mistake: |
    **The Pitfall:** Ignoring the scale conversion or the utilization constraint.
    **The Rationale:** Candidates often fail to correctly convert TOPS (Tera Operations Per Second) to GOPS (Giga Operations Per Second), or forget the 2% thermal limit.
    **The Consequence:** Overestimating the background pipeline throughput by orders of magnitude, resulting in architectural decisions that will melt the phone.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Total NPU capacity: 34.7 TOPS (34,700 GOPS).
       - Utilization limit: 2% maximum.
       - Model compute cost: 12.5 GOPS per inference.
    2. **Calculations:**
       - Allowable background compute = 34,700 GOPS * 0.02 = 694 GOPS.
       - Frames per second = 694 GOPS / 12.5 GOPS/frame = 55.52 FPS.
       - Frames per minute = 55.52 * 60 = 3,331.2 frames/minute.
    3. **Conclusion & Interpretation:**
       **Result: Compute-Bound Background Task. The 2% utilization constraint restricts the throughput to ~3,331 frames evaluated per minute.**
