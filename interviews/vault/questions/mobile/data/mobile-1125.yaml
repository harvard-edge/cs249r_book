title: Real-time Video Quality Gating on Exynos 2400
scenario: A real-time segmentation pipeline processes 1080p camera feeds on a Samsung Exynos 2400 NPU (34.7 TOPS, 12 GB shared LPDDR5X). A data quality gate is needed to reject blurred or anomalous frames before executing the heavy segmentation model.
question: Where should the quality validation run, and how does early frame rejection balance power against accuracy?
details:
  realistic_solution: |
    The quality validation should run before the NPU segmentation dispatch, preferably as a lightweight CPU/ISP-side gate over zero-copy camera buffers. Simple blur, exposure, and anomaly checks avoid NPU context switching and prevent low-quality frames from entering the expensive segmentation graph. The trade-off is that the gate must be conservative: rejecting obvious bad frames saves power, but borderline frames should pass through to protect segmentation accuracy. If a frame fails the gate, the system drops or skips segmentation for that frame rather than spending the main NPU budget on low-confidence input.
  common_mistake: |
    **The Pitfall:** Running a complex validation model on the NPU alongside the main workload.
    **The Rationale:** Overlooking the power overhead of heavy NPU context switching and ignoring zero-copy memory access from the ISP.
    **The Consequence:** Burning more power evaluating frame quality than is saved by rejecting bad frames.
  napkin_math: |
    **Assumptions & Constraints:**
    - Main segmentation model: 500 GOPS/frame.
    - Lightweight CPU/ISP validation: 10 GOPS-equivalent/frame.
    - Target: 30 FPS.
    - Rejection rate: 20% of frames.

    **Calculations:**
    - Main model throughput if every frame runs: 500 GOPS/frame x 30 FPS = 15 TOPS.
    - Validation throughput: 10 GOPS/frame x 30 FPS = 300 GOPS/s = 0.3 TOPS-equivalent.
    - Computation saved (20% rejected): 500 GOPS/frame x 6 frames/s = 3.0 TOPS.
    - Net saving: 3.0 TOPS saved - 0.3 TOPS cost = 2.7 TOPS.

    **Conclusion & Interpretation:**
    - **Result: 2.7 TOPS (Compute-Bound)**. Significant thermal and battery savings by skipping heavy inference on garbage data.
