title: 'The On-Device RLHF Memory Wall'
scenario: 'You are implementing on-device RLHF for a mobile assistant. The policy model is 3B params and you need a 1B parameter reward model to score responses. Both must be in memory simultaneously during training.'
question: 'What are the specific memory stacks involved, and is on-device RLHF feasible within 8 GB?'
details:
  realistic_solution: |
    Policy weights 1.5 GB. Reward model 1.0 GB. Policy optimizer (AdamW states for LoRA, ~50M trainable params) requires 400 MB. Policy activations + gradients require ~300 MB using gradient checkpointing. Reward inference activations ~100 MB. OS + framework overhead ~1.5 GB. Total ~4.8 GB. Fits in 8 GB, but must use LoRA and gradient checkpointing.
  common_mistake: |
    **The Pitfall:** Only counting model weights and forgetting optimizer states, gradients, and activations.
    **The Rationale:** Candidates calculate inference memory footprints and apply them to a training scenario, drastically underestimating the required RAM.
    **The Consequence:** The training pipeline immediately crashes with an Out-Of-Memory (OOM) error upon initialization.
  napkin_math: |
    **Assumptions & Constraints:**
    - Policy Weights: 3B params, INT4.
    - Reward Weights: 1B params, INT8.
    - Optimizer: LoRA AdamW (~50M trainable params).
    - Unified memory limit: 8 GB.

    **Calculations:**
    - Policy Weights (INT4): 1.5 GB
    - Reward Weights (INT8): 1.0 GB
    - Policy Optimizer: 50M params * 8 bytes = 0.4 GB
    - Activations & Gradients: ~0.4 GB
    - OS & Framework Overhead: ~1.5 GB
    - Total Footprint: 1.5 + 1.0 + 0.4 + 0.4 + 1.5 = 4.8 GB

    **Conclusion & Interpretation:**
    - **Result: 4.8 GB (Memory-Capacity-Bound)**. Fits in 8 GB (60% utilization) only with LoRA and gradient checkpointing.
