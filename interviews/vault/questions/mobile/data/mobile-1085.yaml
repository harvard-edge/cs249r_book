title: On-Device Data Quality Bandwidth Contention
scenario: You are deploying a data quality gate to validate incoming streaming data before feeding it to an on-device LLM. You observe that enabling this data validation pipeline causes the LLM's token generation rate to drop by 11%, even though the TPU is only running at 10% of its capacity.
question: Why does enabling a Tensor G3 anomaly-detection gate cut Gemini Nano token generation despite only 10% TPU use?
details:
  realistic_solution: The performance drop is caused by memory bandwidth contention, not compute limits. LLM token generation for Gemini Nano is heavily memory-bound, requiring continuous loading of weights and KV cache from the shared LPDDR5X bus. The schema validation and anomaly-detection pipeline constantly reads streaming data and writes validation state, consuming bandwidth that the decoder otherwise needs. If the LLM needs about 1.5 GB of memory traffic per generated token, then reducing its available bandwidth from 22.5 GB/s to about 20 GB/s cuts throughput from 15 tok/s to about 13.3 tok/s, an 11% drop, even while TPU compute remains mostly idle.
  common_mistake: |
    **The Pitfall:** Assuming the bottleneck is compute-related and that the TPU is saturated or under-clocked.
    **The Rationale:** Failing to recognize that mobile SoCs use a unified memory architecture.
    **The Consequence:** Attempting to optimize the model's compute graph when the actual solution requires reducing the memory bandwidth footprint of the data pipeline.
  napkin_math: |
    **Assumptions & Constraints:**
       - Total LPDDR5X Memory Bandwidth: ~60 GB/s.
       - LLM Model: 3B parameters (4-bit), needs ~1.5 GB of memory traffic per generated token.
       - Baseline LLM Throughput: 15 tokens/sec, requiring 15 x 1.5 GB/token = 22.5 GB/s.
    **Calculations:**
       - Assume OS/Display consumes 30 GB/s.
       - Assume Data Validation Pipeline consumes 10 GB/s.
       - Remaining Bandwidth for LLM = 60 GB/s - 30 GB/s - 10 GB/s = 20 GB/s.
       - Constrained Token Rate = 20 GB/s / 1.5 GB/token = 13.3 tokens/sec.
       - Throughput Drop versus baseline = (15 - 13.3) / 15 = ~11% reduction.
    **Conclusion & Interpretation:**
       **Result: Memory-Bandwidth Contention. The LLM generation rate falls from 15 tok/s to about 13.3 tok/s because validation I/O reduces available memory bandwidth, despite ample remaining TPU TOPS.**
