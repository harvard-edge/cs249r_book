title: On-Device Data Quality Bandwidth Contention
scenario: You are deploying a data quality gate to validate incoming streaming data before feeding it to an on-device LLM. You observe that enabling this data validation pipeline causes the LLM's token generation rate to drop by 11%, even though the TPU is only running at 10% of its capacity.
question: Why does enabling a Tensor G3 anomaly-detection gate cut Gemini Nano token generation despite only 10% TPU use?
details:
  realistic_solution: |
    The performance drop is caused by memory bandwidth contention, not compute saturation. LLM token generation for Gemini Nano is heavily memory-bound because each decode step repeatedly reads weights and KV-cache state from the shared LPDDR5X bus. The schema validation and anomaly-detection pipeline also reads streaming data and writes validation state, consuming bandwidth and memory-controller time that the decoder otherwise needs. Low TPU utilization is therefore compatible with lower token generation: the accelerator can be mostly idle while waiting for memory.
  common_mistake: |
    **The Pitfall:** Assuming the bottleneck is compute-related and that the TPU is saturated or under-clocked.
    **The Rationale:** Failing to recognize that mobile SoCs use a unified memory architecture.
    **The Consequence:** Attempting to optimize the model's compute graph when the actual solution requires reducing the memory bandwidth footprint of the data pipeline.
  napkin_math: |
    **Assumptions & Constraints:**
       - LLM decode is memory-bound on shared LPDDR5X.
       - Approximate LLM weight traffic: 3B parameters at 4-bit = ~1.5 GB per generated token, plus KV reads.
       - The observed throughput drop is 11% when the validation gate is enabled.
    **Calculations:**
       - In a memory-bound decoder, token rate scales roughly with effective memory bandwidth.
       - An observed 11% throughput drop means the decoder's effective bandwidth fell to about 89% of its baseline.
       - The validation path can cause that drop even at low TPU utilization because it competes for memory reads, writes, cache capacity, and memory-controller scheduling.
       - The exact GB/s consumed by validation cannot be derived from the prompt without direct bandwidth counters.
    **Conclusion & Interpretation:**
       **Result: Memory-Bandwidth Contention. The 11% generation drop is consistent with shared-memory contention from validation I/O, despite ample remaining TPU TOPS.**
