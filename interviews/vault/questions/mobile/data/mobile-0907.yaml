title: Federated Learning Tokenizer and Schema Consistency Across Mobile Clients
scenario: You are rolling out a federated learning update to 50M mobile devices split between iOS and Android architectures.
question: How should cross-device federated learning enforce consistent tokenizers, data formats, and label schemas?
details:
  realistic_solution: |
    Package the tokenizer and model as a single immutable artifact. Enforce strict schema versioning via Protobuf for all labels and utilize SHA256 content-addressed storage to guarantee data artifact consistency before clients participate in training rounds.
  common_mistake: |
    **The Pitfall:** Decoupling tokenizer deployments from model weight updates.
    **The Rationale:** Treating tokenizers as static preprocessing utilities rather than tightly coupled model parameters.
    **The Consequence:** Version skew across the fleet causes devices to submit garbage gradients, silently poisoning the global federated model.
  napkin_math: |
    **Assumptions & Constraints:**
    - 50M devices.
    - SentencePiece tokenizer = 2MB.
    - Participating devices per round: 1% of fleet = 500K devices.
    - Gradient upload = 200KB per round.

    **Calculations:**
    - If 2% of the fleet has the wrong tokenizer/schema, then 50M * 0.02 = 1M devices must be excluded or updated before training.
    - Expected skewed clients in a 500K-client round without gating = 500K * 0.02 = 10K corrupted updates.
    - Gradient upload bandwidth for the gated round = 500K * 200KB = 100GB.
    - Bundling a 2MB tokenizer with model updates is a deployment cost, not a per-round gradient-upload cost; clients whose tokenizer hash does not match are blocked from upload.

    **Conclusion & Interpretation:**
    - **Result: Consistency-Bound**. Hash-gating the tokenizer and Protobuf schema prevents about 10K bad updates in a 500K-client round; the 100GB gradient upload is only accepted from clients with the matching artifact versions.
