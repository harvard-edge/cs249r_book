title: Optimizing On-Device Sensor Data Ingestion for Mobile ML
scenario: You are developing a new on-device ML application that continuously ingests a high-resolution camera stream at 100 MB/s. The device has a modern mobile NPU and 8 GB of unified memory. The raw sensor stream causes bottlenecks during data loading and pre-processing, dropping frames despite ample NPU capacity.
question: How would you reduce data loading and preprocessing bottlenecks for a 100 MB/s raw sensor stream?
details:
  realistic_solution: |
    Build the ingestion path around zero-copy and asynchronous staging. Map camera or sensor hardware buffers into NPU-accessible memory where the platform allows it, keep data in the native sensor format until a required color conversion, resize, normalization, or layout transform is performed, and fuse those transforms into a hardware ISP, GPU/DSP, or NPU pre-processing kernel. Use ring buffers, backpressure, double buffering, and pinned/shared buffers so capture, preprocessing, and inference overlap without extra copies. Avoid unnecessary FP32 expansion, but choose the model input format based on calibration and accuracy needs rather than assuming raw sensor data is always INT8.
  common_mistake: |
    **The Pitfall:** Relying on the massive 35 TOPS NPU to brute-force poorly formatted data after the CPU has cast it.
    **The Rationale:** Developers focus exclusively on NPU TOPS, overlooking the catastrophic CPU and memory bus constraints caused by naive FP32 type-casting.
    **The Consequence:** The CPU blocks on type-casting, swelling memory bandwidth and causing severe thermal throttling while the NPU idles.
  napkin_math: |
    **Assumptions & Constraints:**
    - Raw stream = 100 MB/s.
    - Naive path performs three full-buffer copies before inference.
    - Optimized path performs one required transform into the model input buffer.
    - NPU has ample compute; the observed bottleneck is ingestion and memory movement.

    **Calculations:**
    - Naive memory traffic: 100 MB/s * 3 copies = 300 MB/s before any required transform work.
    - Zero-copy staging removes two avoidable copies, reducing avoidable traffic by about 200 MB/s.
    - Remaining traffic should be the capture buffer plus the one calibrated transform needed by the model.

    **Conclusion & Interpretation:**
    - **Result: Data-Movement-Bound.** The fix is to remove avoidable copies, overlap capture/preprocess/inference, and fuse required transforms. INT8 may help the model input, but the general bottleneck is pipeline movement and synchronization rather than NPU TOPS.
