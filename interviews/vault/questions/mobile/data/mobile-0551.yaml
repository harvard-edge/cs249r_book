title: The Mobile App's Server-Side Stall
scenario: You are a mobile ML engineer optimizing a new AI Photo Editor feature. The feature sends a user's photo to a cloud-hosted H100 GPU for processing and streams the result back.
question: What server-side data ingress bottleneck explains the AI Photo Editor's missing 105ms of latency?
details:
  realistic_solution: The primary bottleneck is the inefficient data ingress path from the server's network card to the GPU's memory. Bypassing the CPU entirely using a technology like GPUDirect RDMA allows the network card to write data directly into the GPU's memory.
  common_mistake: |
    **The Pitfall:** Fixating on domain-specific bottlenecks.
    **The Rationale:** A mobile engineer might instinctively blame the mobile network, while an ML engineer might blame the model architecture, missing the server-side CPU-mediated copy bottleneck.
    **The Consequence:** Wasted time optimizing the wrong part of the stack while the actual latency remains.
  napkin_math: |
    **Assumptions & Constraints:**
    - Network RTT (Mobile to edge): ~40ms.
    - GPU Inference time (H100): ~15ms.
    - Observed Latency: 160ms.

    **Calculations:**
    - Total expected theoretical latency: 40ms + 15ms = 55ms.
    - Missing overhead: 160ms - 55ms = 105ms.

    **Conclusion & Interpretation:**
    - **Result: PCIe Transfer Bottleneck**. The >100ms overhead corresponds directly to the software-mediated PCIe explicit memory write transferring data between CPU RAM and GPU HBM.
  options:
  - The mobile device's 5G uplink has 105ms of high packet loss, forcing numerous retries.
  - Data transfer over the server's PCIe bus from CPU RAM to GPU HBM adds ~105ms due to software-mediated copies.
  - The H100 server uses InfiniBand to connect to storage, adding 105ms of latency.
  - The server's NVLink interconnects are saturated, adding 105ms to the data copy.
  correct_index: 1
