title: The Vocabulary Embedding Tax
scenario: A mobile LLM uses a 32K token vocabulary with a 4096-dimensional embedding layer stored in FP16. The embeddings cannot be quantized below FP16 without severe quality loss.
question: What fraction of a 3.5 GB INT4 model does the embedding table represent?
details:
  realistic_solution: Because the large embedding dimension cannot be safely quantized down to INT4, the FP16 table remains a massive, fixed memory tax. 32K tokens at 4096 dimensions yields ~262 MB. This means the unquantized embedding table natively consumes roughly 7.5% of the total 3.5 GB compressed footprint.
  common_mistake: |
    **The Pitfall:** Treating the vocabulary embedding layer as a trivially small lookup table.
    **The Rationale:** Candidates incorrectly assume compute-heavy attention matrices uniformly dominate the memory layout.
    **The Consequence:** They grossly over-promise INT4 compression ratios by ignoring the unquantizable embedding constraints.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Vocabulary: 32,000 tokens.
       - Dimension: 4,096 elements.
       - Precision: FP16 (2 bytes).
       - Total Model Target: 3.5 GB.
    2. **Calculations:**
       - Embedding Size: 32,000 * 4,096 * 2 bytes = 262,144,000 bytes (~262 MB).
       - Fraction of Total: 262 MB / 3,500 MB = 0.0748 (7.48%).
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound.** The unquantizable FP16 embedding table enforces a hard 262 MB floor, inherently limiting further compression of the 3.5 GB deployment.
  options:
  - ~26 MB
  - ~262 MB
  - ~1 GB
  - ~2.6 MB
  correct_index: 1
