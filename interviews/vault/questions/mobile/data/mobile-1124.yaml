title: 'On-Device Coreset Selection Architecture'
scenario: You are architecting an on-device continuous learning system. The system must curate a coreset of daily user interactions to fine-tune a local model overnight within a strict ~5W power envelope. The device has a shared 8 GB unified memory.
question: How would you evaluate the tradeoffs between heuristic filtering and model-based data selection to maximize the Information-Compute Ratio (ICR) without causing memory thrashing?
details:
  realistic_solution: 'The optimal architecture uses a two-stage pipeline. A computationally free heuristic filter is applied continuously during the day, followed by a lightweight embedding-based deduplication running on the NPU overnight. By pruning redundant samples early, the system maximizes ICR, avoids model collapse, and ensures the fine-tuning completes strictly within thermal and battery constraints without triggering OOM.'
  common_mistake: |
    **The Pitfall:** Proposing complex, compute-heavy active learning pipelines.
    **The Rationale:** Candidates fail to prioritize the Information-Compute Ratio (ICR) and propose selection methods that cost more power than the actual fine-tuning process.
    **The Consequence:** The data selection process exceeds the ~5W power budget and causes severe memory thrashing in the 8 GB unified pool.
  napkin_math: |
    **Assumptions & Constraints:**
    - Power limit: 5W (≈ 17.5 TOPS budget).
    - Time budget: 2 hours (7200s).
    - Fine-tuning cost: ~6e9 ops/token.

    **Calculations:**
    - Total compute budget = 17.5 TOPS * 7200s = 1.26e17 ops.
    - Max tokens processed = 1.26e17 / 6e9 = 21 million tokens.
    - Memory allocation: 8 GB total - 2 GB OS - 4 GB model = 2 GB data buffer.

    **Conclusion & Interpretation:**
    - **Result: 21M tokens max (Compute-Bound)**. Pruning a raw log of 10M tokens down to a 1M token coreset allows 21 high-quality epochs entirely within constraints.
