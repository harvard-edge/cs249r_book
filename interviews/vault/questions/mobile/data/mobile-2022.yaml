title: Zero-Copy Video Pipeline Bandwidth Saving
scenario: A mobile SoC processes a 4K camera stream (3840x2160 RGB, 30 FPS). The ISP writes to DRAM, and the NPU reads it for semantic segmentation.
question: Design a zero-copy pipeline strategy and calculate the exact memory bandwidth saved per second compared to a deep-copy moving frames into an NPU-specific buffer.
details:
  realistic_solution: |
    Utilize a zero-copy architecture by mapping a unified hardware buffer (e.g., Android HardwareBuffer or AHardwareBuffer) directly into the virtual address spaces of both the ISP and the NPU. This allows the NPU to execute direct DMA reads from the exact physical memory location the ISP wrote to. A deep copy anti-pattern allocates a separate NPU buffer, forcing the CPU to issue a read from the ISP buffer and a write to the NPU buffer, doubling the memory bus traffic and increasing power draw.
  common_mistake: |
    **The Pitfall:** Forgetting that a deep memory copy consumes both read AND write bandwidth.
    **The Rationale:** Candidates often only count the size of the data once.
    **The Consequence:** They miss the 2x multiplier, severely underestimating the bandwidth penalty.
  napkin_math: |
    **Assumptions & Constraints:**
    - Resolution: 4K (3840 x 2160), RGB (3 bytes/pixel).
    - Frame rate: 30 FPS.
    - Deep copy incurs both a read from source and a write to destination.

    **Calculations:**
    - Frame size = 3840 * 2160 * 3 bytes = 24,883,200 bytes (~24.88 MB).
    - Deep copy penalty per frame = 24.88 MB (Read) + 24.88 MB (Write) = 49.76 MB/frame.
    - Total bandwidth saved per second = 49.76 MB/frame * 30 FPS = 1,492.8 MB/s.

    **Conclusion & Interpretation:**
    - **Result: 1,492.8 MB/s (Memory Bus-Bound)**. Eliminating the deep copy reclaims ~1.49 GB/s of critical unified memory bandwidth. Forgetting that a copy requires *both* a read and a write drastically underestimates the architectural penalty.
