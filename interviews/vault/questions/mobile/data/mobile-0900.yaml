title: Federated DP-SGD Parameters for Device-Level Mobile Privacy
scenario: You are implementing device-level differential privacy for federated data collection on 10M mobile devices. Each selected device clips its locally trained model update before secure aggregation. You need the training job to target ε=1.0 at δ=1e-7 over 100 rounds.
question: How should DP-SGD be implemented for federated gradients on mobile devices to achieve epsilon 1.0, and what are the required parameters?
details:
  realistic_solution: 'Implement device-level DP for federated averaging: sample 10,000 of 10M eligible devices per round (q=0.001), clip each device update to L2 norm C=1.0 before secure aggregation, and add Gaussian noise to the summed or averaged clipped update using a chosen noise multiplier σ. Track privacy with an RDP or moments accountant using Poisson-style device sampling, T=100 rounds, δ=1e-7, and the selected σ. The exact ε must come from the accountant implementation, not from a single-round heuristic; the required parameters are the privacy unit (device), clipping norm C, sampling rate q, number of rounds T, noise multiplier σ, aggregation convention, and accounting method.'
  common_mistake: |
    **The Pitfall:** Using a static noise multiplier without accounting for subsampling amplification.
    **The Rationale:** Engineers apply standard DP-SGD formulas directly, ignoring that sampling a small fraction of a large device pool drastically strengthens the privacy guarantee.
    **The Consequence:** Adding excessive, unnecessary noise to the gradients, severely degrading model utility and convergence.
  napkin_math: |
    **Assumptions & Constraints:**
    - Privacy unit: device-level contribution to a federated round.
    - Target ε <= 1.0, δ = 1/10M = 1e-7, Rounds T = 100.
    - Devices per round = 10,000 out of 10,000,000.
    - L2 clipping norm C = 1.0 for each device update.

    **Calculations:**
    - Subsampling rate q = 10,000 / 10,000,000 = 0.001.
    - Choose an initial Gaussian noise multiplier σ, then configure the accountant with q=0.001, T=100, δ=1e-7, and the same sampling/aggregation convention used by training.
    - Add Gaussian noise calibrated to the clipped summed update before or inside secure aggregation; if the server averages N selected updates, the noisy sum is divided by N after aggregation.
    - Compute ε with the selected RDP or moments accountant. A single expression such as σ*C is only the noise calibration input, not the privacy guarantee.
    - Accept the run only if the accountant reports ε <= 1.0; otherwise increase σ, reduce T, or lower q and recompute.

    **Conclusion & Interpretation:**
    - **Result: Device-level DP with q=0.001, T=100, C=1.0, δ=1e-7, and an accountant-verified noise multiplier (Privacy-Bound)**. The accountant result determines whether ε<=1.0 is achieved; σ is tuned until that report passes.
