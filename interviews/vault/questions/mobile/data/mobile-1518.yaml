title: Real-Time Sensor Ingestion for AR Tracking
scenario: An AR application needs to ingest real-time camera (60 FPS, 1080p) and IMU (1000 Hz) streams into shared 8 GB unified memory for downstream tracking on Apple A17 Pro. The entire SoC has a strict thermal budget of ~5W.
question: How would you ingest AR camera and IMU streams in real time using unified-memory ring buffers?
details:
  realistic_solution: |
    Use pre-allocated lock-free rings in unified memory: one camera ring filled by the capture/DMA path with frame descriptors and timestamps, and one IMU ring filled by the sensor callback with compact samples. A tracking consumer reads by timestamp, aligns each frame to the nearest IMU window, and advances read cursors without copying payloads. Backpressure should drop the oldest camera frame or coalesce IMU samples rather than blocking producers.
  common_mistake: |
    **The Pitfall:** Processing high-frequency sensor streams through standard CPU-bound message queues.
    **The Rationale:** Candidates incorrectly default to cloud-native messaging patterns (e.g., heavily threaded publish-subscribe loops).
    **The Consequence:** Constant thread context switching and data serialization thrash the cache, violently breaking the 5W thermal budget.
  napkin_math: |
    **Assumptions & Constraints:**
    - Camera: 1920x1080 at 60 FPS, 3 bytes/pixel if stored as RGB.
    - IMU: 1000 Hz at 32 bytes/sample.
    - Rings store payloads plus small descriptors in unified memory.

    **Calculations:**
    - Camera ingestion: 1920 * 1080 * 3 * 60 = 373,248,000 bytes/s = ~373 MB/s decimal (~356 MiB/s).
    - IMU ingestion: 1000 * 32 = 32,000 bytes/s = 32 KB/s.
    - Descriptor overhead is small: even 256 bytes/frame * 60 = 15 KB/s.
    - A 3-frame camera ring needs ~18.7 MB for RGB payloads; IMU buffering is under 1 MB for many seconds.

    **Conclusion & Interpretation:**
    - **Result: ~373 MB/s ingestion plus small metadata overhead (Bandwidth/Latency-Bound)**. Zero-copy rings, timestamp alignment, and explicit drop policy keep ingestion predictable without making the NPU the first-stage buffer owner.
