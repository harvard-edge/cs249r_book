title: Real-Time Sensor Ingestion for AR Tracking
scenario: An AR application needs to ingest real-time camera (60 FPS, 1080p) and IMU (1000 Hz) streams directly into the Apple A17 Pro Neural Engine using the shared 8 GB unified memory. The entire SoC has a strict thermal budget of ~5W.
question: How would you ingest AR camera and IMU streams in real time using unified-memory ring buffers?
details:
  realistic_solution: Utilize lock-free ring buffers within the unified memory subsystem to orchestrate zero-copy data ingestion. Pipelined pre-processing offloads pixel adjustments to the ISP/GPU before handing tensor ownership to the A17 Pro NPU, entirely bypassing CPU interrupts to keep total power well under the 5W thermal ceiling.
  common_mistake: |
    **The Pitfall:** Processing high-frequency sensor streams through standard CPU-bound message queues.
    **The Rationale:** Candidates incorrectly default to cloud-native messaging patterns (e.g., heavily threaded publish-subscribe loops).
    **The Consequence:** Constant thread context switching and data serialization thrash the cache, violently breaking the 5W thermal budget.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Camera: 1920x1080 @ 60 FPS (RGB = 3 bytes/pixel).
       - IMU: 1000 Hz @ 32 bytes/sample.
       - Memory: Unified LPDDR5 architecture.
       - Budget: ~5W Thermal.
    2. **Calculations:**
       - Camera Bandwidth: 1920 * 1080 * 3 * 60 = ~373 MB/s.
       - IMU Bandwidth: 1000 * 32 = 32 KB/s.
       - Total Ingestion Rate: ~373.03 MB/s.
       - NPU Load: 10 GOPS @ 35 TOPS = ~0.28ms per frame.
    3. **Conclusion & Interpretation:**
       - **Result: Thermal-Bound.** While compute and bandwidth are trivial, preventing CPU spin via zero-copy DMA is strictly required to survive the 5W envelope.
