title: On-Device Dataset Curation for Bias Mitigation on Snapdragon 8 Gen 3
scenario: "Your team is developing a real-time, on-device object detection model for a new mobile application. The model's initial performance is excellent in well-lit, urban environments but shows significant degradation in low-light conditions and rural settings, indicating a severe dataset bias."
question: "How would you leverage the NPU's capabilities for data selection, active learning, and annotation workflows to mitigate low-light and rural detection bias?"
details:
  realistic_solution: "Deploy a highly-quantized 'teacher' or uncertainty heuristic model directly to edge clients. The NPU analyzes the feed locally to isolate high-entropy, low-confidence frames (e.g., rural/nighttime sets). Validated segments are buffered to an off-peak pipeline utilizing federated extraction. This restricts transmission and annotation pipeline costs exclusively to the most informative long-tail elements rather than spamming backend annotation infrastructure with standard behavior."
  common_mistake: |
    **The Pitfall:** Ignoring the on-device inference characteristics and simply mass-collecting "diverse" data without targeted selection.
    **The Rationale:** Candidates assume that blind random sampling will eventually cover the edge cases, underestimating the sheer volume required.
    **The Consequence:** Burning through massive annotation budgets on redundant, high-confidence samples while failing to close performance gaps on critical edge cases.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Active devices: 1,000,000. Data collection: 100 frames/day/device = 100 million frames.
       - NPU Peak: 45 TOPS. Inference: 200 GOPS. Max IPS = 225.
       - Annotation cost: $0.50 per frame.
    2. **Calculations:**
       - Without active selection (0.1% random sampling) = 100,000 frames annotated daily.
       - Daily annotation budget = 100,000 * $0.50 = $50,000/day.
    3. **Conclusion & Interpretation:**
       - **Result: Budget-Bound.** The massive **$50,000/day** cost proves that random sampling is unsustainable; executing lightweight active learning models directly on the NPU is mandatory to filter only high-value uncertain frames.
