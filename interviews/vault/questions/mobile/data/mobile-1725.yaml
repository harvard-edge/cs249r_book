title: On-Device Dataset Curation for Bias Mitigation on Snapdragon 8 Gen 3
scenario: Your team is developing a real-time, on-device object detection model for a new mobile application. The model's initial performance is excellent in well-lit, urban environments but shows significant degradation in low-light conditions and rural settings, indicating a severe dataset bias.
question: How would you leverage the NPU's capabilities for data selection, active learning, and annotation workflows to mitigate low-light and rural detection bias?
details:
  realistic_solution: Deploy a highly-quantized teacher or uncertainty heuristic model directly to edge clients. The NPU analyzes candidate frames locally to identify high-entropy, low-confidence examples from low-light and rural settings. The app buffers only those selected clips or feature summaries for off-peak, consented upload to an annotation queue. This on-device uncertainty filtering and selective upload limits transmission and labeling cost to the most informative long-tail cases rather than sending routine examples to the backend.
  common_mistake: |
    **The Pitfall:** Ignoring the on-device inference characteristics and simply mass-collecting "diverse" data without targeted selection.
    **The Rationale:** Candidates assume that blind random sampling will eventually cover the edge cases, underestimating the sheer volume required.
    **The Consequence:** Burning through massive annotation budgets on redundant, high-confidence samples while failing to close performance gaps on critical edge cases.
  napkin_math: |
    **Assumptions & Constraints:**
    - Active devices: 1,000,000.
    - Candidate frames: 100 frames/day/device = 100,000,000 frames/day.
    - Random review baseline: sample 0.1% of candidate frames.
    - On-device active selection target: upload 0.01% of candidate frames after low-light/rural and uncertainty filtering.
    - Annotation cost: $0.50 per frame.

    **Calculations:**
    - Random baseline labels: 100,000,000 x 0.001 = 100,000 frames/day.
    - Random baseline cost: 100,000 x $0.50 = $50,000/day.
    - Active-selection labels: 100,000,000 x 0.0001 = 10,000 frames/day.
    - Active-selection cost: 10,000 x $0.50 = $5,000/day.
    - The NPU throughput question is whether the lightweight selector can run opportunistically on sampled frames without affecting the foreground model, not whether peak TOPS alone determines annotation cost.

    **Conclusion & Interpretation:**
    - **Result: Annotation-budget-bound.** On-device selection reduces the review set by 90% in this model, from $50,000/day to $5,000/day, while focusing labels on the low-light and rural cases that address the bias.
