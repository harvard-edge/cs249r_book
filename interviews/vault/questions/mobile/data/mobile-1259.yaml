title: Diagnosing Model Collapse on Tensor G3
scenario: You are maintaining an on-device LLM for a personalized writing assistant on the Google Tensor G3. The model relies on continuous federated learning, where rare user-generated text is mixed with synthetic data for data pruning. After several weeks, users report that the model's vocabulary is becoming highly repetitive.
question: Why does a personalized writing assistant become repetitive after federated updates with synthetic data?
details:
  realistic_solution: |
    The root cause is model collapse driven by recursive training on synthetic data. Because the Tensor G3's TPU allows for efficient local generation, the data pruning algorithm prioritizes this synthetic data over diverse but sparse user inputs to fit within the limited memory buffer. The model overfits to its own generated distribution.
  common_mistake: |
    **The Pitfall:** Misdiagnosing the issue as catastrophic forgetting or hardware constraints.
    **The Rationale:** Blaming the limited 12 GB LPDDR5X memory or the 7.5 TOPS TPU constraint.
    **The Consequence:** Attempting to optimize memory or compute instead of fixing the recursive training loop causing model collapse.
  napkin_math: |
    **Assumptions & Constraints:**
    - Buffer size: 1 GB.
    - Sample size: ~2 KB, so the buffer holds ~500,000 samples.
    - Synthetic generation: 500 tokens/sec * 10 hours = 18,000,000 tokens/day.
    - Average synthetic sample length: ~1,000 tokens, so generation produces ~18,000 synthetic samples/day.
    - Retention model: the pruning buffer keeps replacing rare user text with high-scoring synthetic samples instead of expiring them uniformly.

    **Calculations:**
    - Daily synthetic inflow relative to buffer: 18,000 / 500,000 = 3.6% of capacity per day.
    - Without retention bias, this is a small daily fraction.
    - With biased pruning, synthetic examples can accumulate over repeated federated rounds while rare real examples are displaced.

    **Conclusion & Interpretation:**
    - **Result: Recursive Synthetic-Data Bias.** The arithmetic supports a steady synthetic inflow; the collapse diagnosis depends on the stated pruning bias, not on a defensible 14-day 50% threshold.
