title: 'On-Device ML Data Quality: Centralized vs. Edge Validation on Snapdragon NPU'
scenario: You are designing the data quality architecture for an app relying on real-time sensor data. The app proposes running validation either in the cloud or optimized for the on-device NPU.
question: How would you discuss the trade-offs and recommend which validation approach is most suitable for a mission-critical mobile application?
details:
  realistic_solution: |
    A hybrid architecture leverages the strengths of both. Critical, low-latency schema validation and fast anomaly detection (e.g., range checks, isolated statistical outliers) should be performed on the edge NPU. This ensures immediate feedback and severs reliance on flaky network connectivity. More resource-intensive tasks, like complex multi-variate anomaly detection and long-term trend analysis, are offloaded to the cloud via batched asynchronous uploads. On-device quality gates act as a firewall, ensuring that only structurally sound data enters the local inference pipeline, drastically minimizing the power draw of the cellular radio.
  common_mistake: |
    **The Pitfall:** Overlooking the power implications of constant cloud transfer while underestimating NPU capabilities.
    **The Rationale:** Candidates default to cloud-first paradigms for data engineering, failing to model the continuous cellular radio power draw or handle disconnected edge states.
    **The Consequence:** A brittle architecture that violently drains the battery and suffers from data staleness and inference stalls whenever network conditions degrade.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Cloud Upload Bandwidth: 100 KB/s.
       - Radio Power Draw: ~300 mW (continuous active state).
       - NPU Compute: 45 TOPS, power during burst ~150 mW.
       - Cloud Latency: ~200 ms vs NPU Latency: < 1 ms.
    2. **Calculations:**
       - Cloud validation power (1 hr continuous streaming): 300 mW * 3600s = 1080 Joules.
       - Edge validation power (1 hr, ~1% burst duty cycle on NPU): 150 mW * 36s = 5.4 Joules.
       - Energy ratio: 1080 J / 5.4 J = 200x more efficient.
    3. **Conclusion & Interpretation:**
       **Result: 200x energy savings and <1ms latency (Energy/Network-Bound).** Edge validation fundamentally mitigates the cellular radio power cliff.
