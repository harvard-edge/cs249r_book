title: The ISP Format Conversion Bottleneck
scenario: Your mobile app captures 4K video. A script reads frames via OpenCV, resizes them, and passes
  them to a 5ms NPU model. However, the max framerate caps at 12 FPS.
question: Why does a 5ms NPU model cap at 12 FPS when 4K frames are resized through OpenCV on the CPU?
details:
  realistic_solution: 'The bottleneck is the memory-bound CPU YUV-to-RGB color conversion, not the resize
    operation. OpenCV''s conversion is unoptimized for mobile and saturates single-thread memory bandwidth.
    Use the platform''s hardware ISP path (AVFoundation/CameraX) to get RGB directly into a GPU/NPU accessible
    texture.

    '
  common_mistake: '**The Pitfall:** Blaming the resize operation instead of the color conversion.

    **The Rationale:** Candidates know OpenCV cv2.resize can be slow, but they miss that the camera ISP
    outputs NV12/NV21 (YUV) while OpenCV expects BGR, forcing a massive memory-bound per-pixel color space
    conversion on the CPU.

    **The Consequence:** Engineers will waste time optimizing the resize algorithm while the CPU remains
    memory-bottlenecked by the fundamental format conversion load.

    '
  napkin_math: '**Assumptions & Constraints:**

    - Frame: 4K (8.2 million pixels, ~12MB NV12, ~24MB BGR).

    - Format: Camera outputs YUV, OpenCV requires BGR.


    **Calculations:**

    - Memory traffic per frame: Read 12MB + Write 24MB = 36MB.

    - 30 FPS memory traffic: 36MB * 30 = 1.08 GB/s.

    - OpenCV cv2.cvtColor is single-threaded; a mobile core maxes out around 400-500 MB/s for this unoptimized
    loop.

    - Max frame rate: 450 MB/s / 36 MB = ~12 FPS.


    **Conclusion & Interpretation:**

    - **Result: Memory Bandwidth Bottleneck.** The CPU is saturated by the massive memory traffic of YUV-to-BGR
    conversion (~1.1 GB/s required vs ~450 MB/s actual), capping at ~12 FPS and starving the 5ms NPU.

    '
