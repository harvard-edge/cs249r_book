title: 'Dataset Curation: Design On-Device Data Collection for Mobile Model Training'
scenario: You are building a personalized keyboard model that trains on-device. The model learns from user typing patterns. The device has 500MB available for training data.
question: How would you design the data collection, quality filtering, and privacy-preserving local storage pipeline?
details:
  realistic_solution: |
    Collect n-gram statistics instead of raw keystrokes. Store DP-noised n-gram counts. Convert to training examples only at training time and delete them immediately afterward to satisfy privacy and memory constraints.
  common_mistake: |
    **The Pitfall:** Storing raw keystrokes and failing to apply privacy measures early.
    **The Rationale:** Candidates focus on standard data collection pipelines and forget that mobile on-device training requires extreme privacy measures before storage.
    **The Consequence:** Logging sensitive user data locally creates massive security vulnerabilities and violates compliance.
  napkin_math: |
    **Assumptions & Constraints:**
    - Storage Budget: 500 MB.
    - User activity: 1,200 keystrokes/day.

    **Calculations:**
    - 4-gram memory footprint: 500K frequent 4-grams * 8 bytes = 4 MB.
    - 30-day storage: 30 * 4 MB = 120 MB.
    - Privacy Noise: Add Laplace(0, 0.5) for ε=2.0 local DP.

    **Conclusion & Interpretation:**
    - **Result: Memory-Safe Privacy.** Total memory used (136 MB) safely respects the 500 MB budget while preserving mathematically guaranteed differential privacy.
