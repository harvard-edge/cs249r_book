title: Continuous Video Feature Ingestion Power Analysis
scenario: A streaming pipeline extracts features from a 60 FPS camera. Each frame requires 200 GOPS of NPU work and 50 MB of memory traffic. The NPU consumes 1W/10 TOPS; memory consumes 1W/10 GB/s. The thermal budget is 5W. A concurrent game adds 3.8W of GPU and display power while also competing for shared memory bandwidth.
question: How much power does continuous 60 FPS feature ingestion consume, and why does a concurrent game exceed the thermal budget?
details:
  realistic_solution: The candidate must calculate both compute and memory power to find the pipeline's baseline of 1.5W. For the system behavior analysis, they should explain that unified memory is shared between the CPU, GPU, and NPU. The continuous 60 FPS ingestion creates persistent 3 GB/s memory traffic that prevents the memory controllers from entering low-power sleep states. When the game adds 3.8W of GPU/display load, the combined demand is about 5.3W before contention overhead, exceeding the 5W thermal envelope and causing throttling.
  common_mistake: |
    **The Pitfall:** Ignoring the power cost of memory bandwidth.
    **The Rationale:** Candidates only calculate the compute power (1.2W) and wrongly assume the pipeline is lightweight enough.
    **The Consequence:** Failing to realize that continuous memory traffic prevents sleep states, causing the shared physical bus to quickly exceed thermal limits during concurrent tasks.
  napkin_math: |
    **Assumptions & Constraints:**
    - Compute Requirement: 200 GOPS/frame at 60 FPS.
    - Memory Bandwidth: 50 MB/frame at 60 FPS.
    - Treat 50 MB/frame as the total memory traffic attributed to the feature pipeline; game/display contention can add more traffic.
    - Compute Power Cost: 1W per 10 TOPS.
    - Memory Power Cost: 1W per 10 GB/s.
    - Thermal Budget: 5W.

    **Calculations:**
    - Compute Throughput: 200 GOPS/frame x 60 frames/s = 12,000 GOPS/s = 12 TOPS.
    - Compute Power: 12 TOPS x (1W / 10 TOPS) = 1.2 W.
    - Memory Power: (50 MB * 60 FPS) = 3 GB/s. 3 GB/s * (1W / 10 GB/s) = 0.3 W.
    - Baseline Pipeline Power: 1.2 W + 0.3 W = 1.5 W.
    - With Game Lower Bound: 1.5 W + 3.8 W = 5.3 W before extra contention overhead.

    **Conclusion & Interpretation:**
    - **Result: 1.5 W baseline, at least 5.3 W with the game (Thermal-Bound).** The pipeline alone fits under the 5W budget, but the concurrent game pushes the shared SoC over budget before additional memory-contention overhead.
