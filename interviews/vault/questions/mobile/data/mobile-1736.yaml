title: Optimizing On-Device ML with Coreset Selection on Snapdragon 8 Gen 3
scenario: Your team is deploying a real-time object detection model on a device powered by an NPU. You need to retrain the model periodically on device using new user-generated data. You've identified coreset selection as a potential technique to manage this.
question: How would you determine the maximum feasible coreset size for on-device retraining given a 1 hour target time?
details:
  realistic_solution: Implement a lightweight, NPU-optimized coreset selection algorithm that can efficiently run on the NPU. The solution should consider the available LPDDR5X bandwidth and the INT8 processing capabilities. The coreset size would be determined by balancing the retraining time budget, memory capacity, and the NPU's processing throughput for the selection algorithm and subsequent fine-tuning steps.
  common_mistake: |
    **The Pitfall:** Ignoring memory bandwidth limitations and assuming raw TOPS dictates training speed.
    **The Rationale:** Engineers focus purely on the compute rating without factoring in data movement costs.
    **The Consequence:** The proposed training plan stalls on I/O, drastically missing the 1-hour retraining deadline.
  napkin_math: |
    **Assumptions & Constraints:**
    - NPU Compute: 45 TOPS. Target time: 3600 seconds (1 hour).
    - Memory limit: 12 GB.
    - Sample size: 1 KB. 5 epochs, 400M ops per epoch.

    **Calculations:**
    - Available Ops: 45e12 * 3600 = 1.62e17 ops.
    - Ops per sample (5 epochs): 400M * 5 = 2e9 ops.
    - Max samples (compute): 1.62e17 / 2e9 = 81 million.
    - Max samples (memory): 12 GB / 1 KB = 12 million.

    **Conclusion & Interpretation:**
    - **Result: Memory limits the maximum coreset size to 12 million samples (Memory-Capacity-Bound).** Compute capacity is vastly greater than memory limits.
