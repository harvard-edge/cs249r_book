title: On-Device Fine-Tuning Battery Drain and Model Collapse
scenario: You are debugging a nightly on-device fine-tuning pipeline for the Gemini Nano LLM (2B parameters) on the Google Tensor G3. The pipeline collects 10,000 daily user interactions and attempts to fine-tune the model overnight using the on-device TPU. However, telemetry shows users are waking up to drained batteries, the fine-tuning process runs for over 4 hours, and the resulting model exhibits severe performance degradation on general tasks.
question: How would you diagnose the root cause of this system failure and propose a data-centric solution?
details:
  realistic_solution: The root cause is trying to perform full-model fine-tuning of a 2B-parameter LLM on-device from all collected daily data. Even before data quality is considered, the compute, runtime, thermals, and battery cost exceed a mobile overnight budget. Use data pruning or coreset selection to keep only the most informative interactions, but pair it with a mobile-feasible update method such as small adapters, LoRA-style deltas, or server-side training rather than naive full-model updates.
  common_mistake: |
    **The Pitfall:** Naively training on all collected daily user data without filtering.
    **The Rationale:** Assuming more data always yields a better model, ignoring the terrible Information-Compute Ratio (ICR).
    **The Consequence:** Hardware exhaustion (battery drain) and severe model collapse due to redundant noise.
  napkin_math: |
    **Assumptions & Constraints:**
    - Gemini Nano LLM (2B parameters) on Google Tensor G3 (3.75 TOPS).
    - 10k samples, 500 tokens each.

    **Calculations:**
    - Total Tokens: 10,000 samples * 500 tokens = 5,000,000 tokens.
    - Training Compute Assumption: ~6 ops per parameter per token for forward + backward.
    - Naive compute = 5,000,000 tokens * 2B params * 6 ops = 6.0e16 ops = 60,000 TFLOPs.
    - Time at 3.75 TOPS peak = 6.0e16 ops / 3.75e12 ops/s = 16,000 seconds, or about 4.4 hours before throttling, optimizer overhead, memory traffic, and battery limits.
    - Pruning to 5% gives 250,000 tokens.
    - Pruned full-model compute = 250,000 * 2B * 6 = 3.0e15 ops = 3,000 TFLOPs.
    - Time at peak = 3.0e15 / 3.75e12 = 800 seconds, or about 13 minutes before overhead; feasible only if the update is also thermally efficient and much smaller than full fine-tuning.

    **Conclusion & Interpretation:**
    - **Result: Full Fine-Tuning Exceeds the Mobile Budget.** The arithmetic supports compute and thermal overload as the primary failure; coreset pruning helps, but the update should be adapter-sized or moved off-device.
