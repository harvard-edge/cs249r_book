title: CPU-GPU Pipeline Serialization with glFinish
scenario: Your mobile app applies an ML filter to a live video feed. The camera produces frames at 30 FPS. The GPU runs the ML filter in 20ms. The CPU submits the job to the GPU, waits for it to finish using `glFinish()`, and then renders it to the screen. You notice the framerate is only 22 FPS, even though 20ms is well under the 33ms deadline.
question: What pipeline rule did you break?
details:
  realistic_solution: |
    You broke the producer-consumer overlap between the CPU, GPU, camera, and display. `glFinish()` is the concrete bug: it blocks the CPU until the GPU has drained its work, so the app serializes CPU prep, GPU inference, and CPU render instead of keeping frames in flight with fences or double buffering. Once the serialized path has almost no slack against the 33ms camera deadline, ordinary display or camera scheduling waits can push presented frames to about 22 FPS. The fix is asynchronous submission with bounded buffers and explicit fences only where data is actually consumed.
  common_mistake: |
    **The Pitfall:** Assuming `glFinish()` is required for correctness.
    **The Rationale:** Candidates incorrectly believe they must explicitly stall the CPU to prevent tearing, failing to understand that graphics APIs manage asynchronous fences inherently.
    **The Consequence:** The entire pipeline becomes serialized, drastically reducing throughput and turning a 50 FPS theoretical pipeline into 22 FPS.
  napkin_math: |
    **Assumptions & Constraints:**
    - CPU submit/postprocess: 5ms + 5ms = 10ms.
    - GPU ML filter: 20ms.
    - Display refresh: 60 Hz, so missing a presentation slot costs up to 16.7ms.

    **Calculations:**
    - Serialized critical path with glFinish: 5ms (CPU prep) + 20ms (GPU) + 5ms (CPU render) = 30ms per frame before display scheduling.
    - Slack against a 30 FPS camera frame: 33.3ms - 30ms = 3.3ms, so one missed 60 Hz presentation slot can add about 16.7ms.
    - Observed presented frame interval: about 30ms + 15-16.7ms = 45-46.7ms, or roughly 21-22 FPS.
    - Asynchronous (Double-buffered): Effective processing time is max(CPU, GPU) = max(10ms, 20ms) = 20ms per frame.
    - Pipeline capacity: 1000ms / 20ms = 50 FPS, but the camera source produces only 30 FPS, so delivered throughput is capped at 30 FPS.

    **Conclusion & Interpretation:**
    - **Result: CPU-GPU serialization with display-sync coupling.** The broken rule is eliminating overlap by synchronizing the CPU on the GPU. The 20ms GPU kernel is fast enough, but the serialized 30ms path has so little slack that presentation waits explain the observed ~22 FPS. Double-buffering restores enough pipeline capacity to keep up with the 30 FPS camera input.
