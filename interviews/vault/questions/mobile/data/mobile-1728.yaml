title: Real-time Physiological Anomaly Detection on Google Tensor G3
scenario: 'You are designing a real-time health monitoring application for a mobile device. The application continuously analyzes high-frequency sensor data to detect subtle physiological changes indicative of health risks.'
question: 'How would you design the stream processing and ML pipeline on the Tensor G3 to balance real-time anomaly detection with power efficiency?'
details:
  realistic_solution: 'Employ a multi-stage processing pipeline:\n\n1.  Sensor Data Ingestion & Buffering: Implement highly efficient, low-power data acquisition directly from sensors. Utilize circular buffers for short-term temporary storage.\n\n2.  Edge Preprocessing & Feature Extraction: Perform lightweight filtering, normalization, and feature extraction (e.g., windowing, statistical aggregations, frequency domain analysis via FFT) using the main CPU or dedicated DSP, only triggering these operations at optimal intervals or upon specific events to conserve power.\n\n3.  On-Device ML Inference: Deploy highly quantized (e.g., int8) and pruned ML models specifically optimized for the Tensor G3''s TPU. Implement an intelligent inference scheduler that can batch inferences where appropriate or trigger them only when significant pre-computed features indicate a potential event, balancing latency and energy consumption.\n\n4.  Memory Management: Carefully manage the 12GB LPDDR5X, allocating memory efficiently for models, intermediate features, and dynamic buffers. Leverage techniques like memory pooling and zero-copy data transfer where possible.\n\n5.  Power Management: Implement dynamic frequency scaling for the TPU and CPU, employ event-driven processing to keep components in low-power states, and use background processing with system-level scheduling for non-critical tasks.'
  common_mistake: |
    **The Pitfall:** Neglecting the massive power consumption of continuous on-device ML inference polling.
    **The Rationale:** Engineers focus solely on model accuracy or peak TOPS, forgetting mobile battery realities.
    **The Consequence:** Rapid battery drain and poor user experience, rendering the health monitor uninstallable.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Operations required: 100 inferences/sec * 500e6 MACs = 50 GOPS.
       - TPU peak capacity: 7.5 TOPS.
    2. **Calculations:**
       - TPU Utilization = 50 GOPS / 7500 GOPS = 0.0066...
    3. **Conclusion & Interpretation:**
       - **Result: ~0.67% Utilization (Power-Constrained, Not Compute-Constrained).**
