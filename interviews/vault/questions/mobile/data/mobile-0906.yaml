title: 'Dataset Curation: Realize Training Data Requirements for On-Device LLM Fine-Tuning'
scenario: Realize the complete data requirements for fine-tuning a 1B LLM for email composition assistance.
  The model must fit in memory during inference (4-bit quantized) and fine-tuning must complete in < 5
  minutes in the background.
question: What data and LoRA fine-tuning plan lets a 1B email assistant fit and train on mobile constraints
  within five minutes?
details:
  realistic_solution: '4-bit quantized 1B model = 500MB inference. Fine-tuning: LoRA rank-16 adds 2M trainable
    params. Training data must be aggressively subsampled to fit the 5-minute background window on mobile
    GPUs: limit to 50 recent user email examples × 512 tokens avg. Fine-tuning uses float16 LoRA weights
    while keeping the quantized base frozen.'
  common_mistake: '**The Pitfall:** Trying to fine-tune the full model on-device instead of using parameter-efficient
    adapters like LoRA.

    **The Rationale:** Candidates fail to account for the massive memory requirements of optimizer states
    and activations for full-parameter updates.

    **The Consequence:** Immediate Out-Of-Memory (OOM) errors and failure to meet the 5-minute background
    training deadline.

    '
  napkin_math: '**Assumptions & Constraints:**

    - Model: 1B parameters (4-bit quantized = 500MB).

    - LoRA: Rank-16, 2M parameters (FP16).

    - Data: 50 examples, 512 tokens each.

    - Compute: 2 TFLOPS (Mobile GPU).


    **Calculations:**

    - Memory: 500MB base + 4MB LoRA + 16MB Optimizer (AdamW) + 64MB Activations = 584MB.

    - Tokens: 50 * 512 * 3 epochs = 76,800 tokens.

    - Compute (requires full model pass): 6 FLOPs/param * 1B params * 76.8K tokens = 460.8 TFLOPs.

    - Time: 460.8e12 FLOPs / 2e12 FLOPS = 230 seconds (~3.8 minutes).


    **Conclusion & Interpretation:**

    - **Result: 3.8 minutes (Compute-Bound)**. By aggressively subsampling the dataset to 50 examples,
    the process safely fits within the 5-minute background SLA while consuming only 584MB of memory.

    '
