title: 'Dataset Curation: Realize Training Data Requirements for On-Device LLM Fine-Tuning'
scenario: Realize the complete data requirements for fine-tuning a 1B LLM for email composition assistance. The model must fit in memory during inference (4-bit quantized) and fine-tuning must complete in < 5 minutes in the background.
question: What data and LoRA fine-tuning plan lets a 1B email assistant fit and train on mobile constraints within five minutes?
details:
  realistic_solution: '4-bit quantized 1B model is about 500MB for inference weights, but training still needs adapter weights, gradients, optimizer state, activations, framework buffers, and repeated full-model forward/backward passes. Use LoRA rather than full fine-tuning, keep the quantized base frozen, and make the five-minute target conditional: use a very small adapter, short sequences, one epoch, small microbatches, checkpointing, and early cancellation if the device is hot or on battery. With 50 examples at 512 tokens for 3 epochs, a 1B model is more plausibly a 10-30 minute background job on sustained mobile hardware, so a five-minute product SLA would need fewer tokens/epochs or server-assisted training.'
  common_mistake: |
    **The Pitfall:** Trying to fine-tune the full model on-device instead of using parameter-efficient adapters like LoRA.
    **The Rationale:** Candidates fail to account for the massive memory requirements of optimizer states and activations for full-parameter updates.
    **The Consequence:** Immediate Out-Of-Memory (OOM) errors and failure to meet the 5-minute background training deadline.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: 1B parameters (4-bit quantized = 500MB).
    - LoRA: Rank-16, 2M parameters (FP16).
    - Data: 50 examples, 512 tokens each.
    - Training pass: 3 epochs.
    - Sustained training throughput after memory, kernel, and thermal overhead: 0.25-1.0 TFLOPS effective.

    **Calculations:**
    - Memory floor: 500MB base weights + 4MB LoRA weights + 4MB LoRA gradients.
    - AdamW state for 2M LoRA params in FP32 moments: 2M * 2 moments * 4 bytes = 16MB; master weights add another ~8MB if used.
    - Activations, dequant buffers, framework workspace, and batches can add hundreds of MB, so plan for roughly 1-2GB during training rather than 584MB.
    - Tokens: 50 * 512 * 3 epochs = 76,800 tokens.
    - Compute (requires full model pass): 6 FLOPs/param/token * 1B params * 76,800 tokens = 460.8 TFLOPs.
    - Time at 1.0 effective TFLOPS: 460.8 seconds = 7.7 minutes.
    - Time at 0.25 effective TFLOPS: 1843 seconds = 30.7 minutes.
    - To meet 5 minutes at 1.0 effective TFLOPS, token budget must be <= 300s * 1e12 / (6e9) = 50,000 token-updates.

    **Conclusion & Interpretation:**
    - **Result: Compute-Bound and not guaranteed within 5 minutes**. The 50-example, 3-epoch plan is more plausibly 8-31 minutes depending on sustained throughput; fitting a five-minute SLA requires fewer token-updates, fewer epochs, a smaller adapter/model, or off-device training.
