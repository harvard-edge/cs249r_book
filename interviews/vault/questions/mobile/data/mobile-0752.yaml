title: The 48MP Camera Firehose
scenario: 'A modern flagship phone has a 48MP camera sensor shooting 10-bit RAW at 30 fps burst mode.'
question: 'Before any ISP processing or compression, what is the raw data bandwidth flowing from the sensor to the SoC?'
details:
  realistic_solution: '48 million pixels x 2 bytes (10-bit packed into 16-bit) x 30 fps = 2.88 GB/s. This is why mobile SoCs need dedicated high-bandwidth MIPI CSI interfaces and why the ISP is a critical bottleneck, not the CPU or GPU.'
  common_mistake: |
    **The Pitfall:** Confusing the compressed HEIF/JPEG output size with the raw sensor bandwidth.
    **The Rationale:** Engineers look at the final file size (~few MBs) and forget the ISP must process uncompressed data.
    **The Consequence:** Grossly underestimating the MIPI CSI bandwidth requirements for high-res burst photography.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 48 million pixels per frame.
       - 10-bit color depth (packed into 2 bytes/pixel).
       - 30 frames per second.
    2. **Calculations:**
       - Bytes per frame: 48,000,000 * 2 bytes = 96 MB.
       - Bandwidth: 96 MB/frame * 30 fps = 2,880 MB/s (2.88 GB/s).
    3. **Conclusion & Interpretation:**
       - **Result: ~2.9 GB/s (ISP I/O Bottleneck).**
  options:
  - A) ~30 MB/s. Each 48MP frame is about 1MB compressed.
  - B) ~288 MB/s. 48MP at 1 byte per pixel at 6 fps.
  - C) ~2.9 GB/s. 48MP at 2 bytes per pixel at 30 fps, uncompressed.
  - D) ~29 GB/s. 48MP at 20 bytes per pixel with full color depth.
  correct_index: 2
