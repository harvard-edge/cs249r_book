title: The On-Device Training Memory Crisis
scenario: You are implementing on-device fine-tuning of a 32-layer transformer on a phone with 8 GB memory. The activation memory for backpropagation across all layers is ~537 MB. Together with KV cache and OS, memory is critically tight.
question: How much memory does gradient checkpointing save for 32-layer FP16 activations, and what compute cost does it add?
details:
  realistic_solution: |
    Gradient checkpointing trades compute for memory by saving only selected activation checkpoints and recomputing the missing activations during the backward pass. Under a schedule that stores 5 checkpoint tensors for this 32-layer stack, the activation footprint drops from ~537 MB to ~84 MB, saving ~453 MB of RAM. The compute cost is not a universal constant: in this schedule, recomputing most forward activations once during backward adds roughly 25-30% to a training step, depending on the backward/forward FLOP ratio and implementation.
  common_mistake: |
    **The Pitfall:** Assuming gradient checkpointing is a "free" memory optimization.
    **The Rationale:** Candidates focus solely on the memory reduction (from 537 MB to 85 MB) to fit within RAM.
    **The Consequence:** They ignore that this trades memory for recomputation, increasing wall-clock time and energy per step on a battery-powered device.
  napkin_math: |
    **Assumptions & Constraints:**
    - Full activations: 32 layers * 4 batch * 512 seq * 4096 dim * 2 bytes = 536,870,912 bytes (~537 MB).
    - Per-layer activation: 4 * 512 * 4096 * 2 bytes = 16,777,216 bytes (~16.8 MB).
    - Checkpointing schedule: store 5 selected checkpoint tensors and recompute intermediate layer activations during backward.

    **Calculations:**
    - Checkpointed size: 5 * 16.8 MB = ~84 MB.
    - Memory savings: 537 MB - 84 MB = ~453 MB.
    - Recomputed forward work: about 27 of 32 layer activations are recomputed once.
    - If one training step is roughly one forward pass plus a backward pass worth about two forward passes, overhead ≈ 27 / (32 * 3) = 28%.

    **Conclusion & Interpretation:**
    - **Result: ~453 MB saved / ~25-30% step-time penalty (Energy-Bound)**. The system trades activation memory pressure for recomputation energy and latency.
