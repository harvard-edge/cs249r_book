title: Analyzing KV-Cache Constraints on A17 Pro
scenario: You are deploying a 1.5B parameter transformer on the Apple A17 Pro (8GB unified memory, 35 TOPS, ~5W). As conversation history grows past 2000 tokens, token generation slows down and the device heats up.
question: Why does the shared 8GB unified memory architecture become the primary bottleneck as sequence length increases?
details:
  realistic_solution: The degradation happens because generation is memory-bound, not compute-bound. In the A17 Pro's unified architecture, the Neural Engine, CPU, and GPU all share the 8GB of memory and its bandwidth. As the KV-cache grows linearly with sequence length, reading the entire cache for each new token saturates the memory bandwidth, causing stalls and increased power consumption that hits the ~5W thermal limit, leading to throttling.
  common_mistake: |
    **The Pitfall:** Blaming the O(N²) compute complexity of the attention mechanism.
    **The Rationale:** Candidates assume the performance drop is due to exceeding the 35 TOPS NPU limit.
    **The Consequence:** They optimize mathematical operations instead of addressing the core memory bandwidth constraint of autoregressive generation.
  napkin_math: |
    - **KV Cache per Token:** 2 (K,V) * 2 bytes * 24 layers * 2048 dim = ~196 KB.
    - **Cache at 2000 Tokens:** 2000 * 196 KB = 393 MB.
    - **Bandwidth per Token:** Must read full 1.5B model (3GB) + full KV cache (393 MB) = ~3.4 GB.
    - **Bandwidth at 20 tok/sec:** 20 * 3.4 GB = 68 GB/s.
    - **Final Result:** **Sustaining 68 GB/s constantly saturates the memory bus, spiking power draw beyond the 5W thermal limit and triggering throttling.**
