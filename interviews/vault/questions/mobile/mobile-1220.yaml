title: Analyzing KV-Cache Constraints on A17 Pro
scenario: You are deploying a 1.5B parameter transformer model for on-device chat
  on the Apple A17 Pro. The model runs efficiently for short inputs, but as the conversation
  history grows past 2000 tokens, system performance degrades heavily and the device
  heats up, despite the 16-core Neural Engine theoretically supporting 35 TOPS within
  a ~5W budget. Analyze why the shared 8GB unified memory architecture becomes the
  primary bottleneck as sequence length increases.
question: How would you analyze why the shared 8GB unified memory architecture becomes
  the primary bottleneck as sequence length increases?
details:
  realistic_solution: The degradation happens because generation is memory-bound,
    not compute-bound. In the A17 Pro's unified architecture, the Neural Engine, CPU,
    and GPU all share the 8GB of memory and its bandwidth. As the KV-cache grows linearly
    with sequence length, reading the entire cache for each new token saturates the
    memory bandwidth, causing stalls and increased power consumption that hits the
    ~5W thermal limit, leading to throttling.
  common_mistake: Candidates often blame the O(N^2) compute complexity of the attention
    mechanism, assuming the 35 TOPS limit is being exceeded. They miss that autoregressive
    generation is entirely memory-bandwidth bound, and the growing KV-cache must be
    loaded from the shared 8GB memory for every single generated token.
  napkin_math: Let's assume the 1.5B model has 24 layers and a hidden dimension of
    2048. The KV-cache size per token is 2 (K,V) * 2 bytes (FP16) * 24 layers * 2048
    dim = 196,608 bytes (~196 KB). At a sequence length of 2000 tokens, the KV-cache
    is 2000 * 196 KB = 393 MB. To generate 20 tokens per second, the Neural Engine
    must read the model weights (1.5B * 2B = 3GB) and the KV-cache (393 MB) for every
    token. Memory bandwidth required = 20 * (3 GB + 393 MB) = ~68 GB/s. This massive
    continuous bandwidth draw competes with the CPU/GPU for the shared memory, blowing
    past the efficiency of the ~5W budget and causing thermal throttling.
