title: Quantization and Operator Lowering for ViT on Exynos 2400 NPU
scenario: A Vision Transformer (ViT) model, post-training, needs to be deployed on the Samsung Exynos 2400 NPU. The original model uses standard floating-point (FP32) operations and has 50 billion operations (50 GOPS) for a single inference. During ahead-of-time (AOT) compilation for the NPU (34.7 TOPS), your team is considering two strategies. Strategy 1 is Full Quantization: Convert all FP32 operations to INT8, where INT8 operations are 4x more efficient. Strategy 2 is Mixed Optimization: Identify 5 key FP32 operations (representing 20% of total GOPS) that can be lowered into highly optimized INT8 kernels, halving their latency compared to generic INT8 execution, while the remaining 80% is quantized as in Strategy 1.
question: "What is the theoretical inference latency (in milliseconds) for a single image under each optimization strategy, assuming full NPU utilization?"
details:
  realistic_solution: "1. For full INT8 quantization, the effective INT8 operations\
    \ would be 50 GOPS / 4 = 12.5 GOPS. Given the Exynos 2400 NPU's 34.7 TOPS, the\
    \ latency is (12.5 * 10^9) / (34.7 * 10^12) seconds = 0.360 ms.\n2. For mixed\
    \ optimization:\n   - The 20% of operations (10 GOPS FP32 equivalent) become 10\
    \ GOPS / 4 = 2.5 GOPS effective INT8 operations. Their base latency without lowering\
    \ benefit would be (2.5 * 10^9) / (34.7 * 10^12) = 0.072 ms. With halved latency,\
    \ this becomes 0.036 ms.\n   - The remaining 80% of operations (40 GOPS FP32 equivalent)\
    \ become 40 GOPS / 4 = 10 GOPS effective INT8 operations. Their latency is (10\
    \ * 10^9) / (34.7 * 10^12) = 0.288 ms.\n   - Total latency for Strategy 2: 0.036\
    \ ms + 0.288 ms = 0.324 ms.\nThus, Strategy 2 offers slightly better latency."
  common_mistake: |
    **The Pitfall:** Assuming linear speedups from quantization without considering effective operations.
    **The Rationale:** Candidates forget unit conversions (GOPS to TOPS, seconds to milliseconds) or oversimplify how "halving latency" translates when combined with specific hardware quantization factors.
    **The Consequence:** Incorrect theoretical latency estimates that fail to distinguish the concrete benefits of operator lowering versus generic quantization.
  napkin_math: |
    - Total FP32 Operations: 50 GOPS.
    - Hardware: Exynos 2400 NPU at 34.7 TOPS.
    - Quantization Factor: 4 (1 FP32 equiv = 1/4 INT8 ops).
    - **Strategy 1 (Full Quantization):**
      - Effective INT8 Ops: 50 GOPS / 4 = 12.5 GOPS.
      - Latency 1: (12.5 × 10⁹) / (34.7 × 10¹²) × 1000 = **0.360 ms**.
    - **Strategy 2 (Mixed Optimization):**
      - Lowered Ops (20%): 10 GOPS FP32 equiv → 2.5 GOPS INT8.
      - Base latency of lowered ops: (2.5 × 10⁹) / (34.7 × 10¹²) × 1000 = 0.072 ms.
      - Optimized latency (halved): 0.072 ms / 2 = 0.036 ms.
      - Generic Ops (80%): 40 GOPS FP32 equiv → 10 GOPS INT8.
      - Latency of generic ops: (10 × 10⁹) / (34.7 × 10¹²) × 1000 = 0.288 ms.
      - Total Latency 2: 0.036 ms + 0.288 ms = **0.324 ms**.
