title: Quantization and Operator Lowering for ViT on Exynos 2400 NPU
scenario: A Vision Transformer model needs to be deployed on an NPU. The original model uses FP32 operations and has 50 GOPS for a single inference. During compilation, your team is considering Full Quantization to INT8 or Mixed Optimization where 20% of operations are lowered into highly optimized INT8 kernels halving their latency, and 80% are quantized normally.
question: What is the theoretical inference latency for a single image under each optimization strategy, assuming full NPU utilization?
details:
  realistic_solution: "1. Full INT8 quantization: Effective INT8 ops = 50 GOPS / 4 = 12.5 GOPS. Latency = (12.5e9) / (34.7e12) = 0.360 ms. 2. Mixed Optimization: 20% lowered ops (10 GOPS FP32 -> 2.5 GOPS INT8). Base latency = 0.072 ms. Halved = 0.036 ms. Remaining 80% (40 GOPS FP32 -> 10 GOPS INT8). Latency = 0.288 ms. Total = 0.036 ms + 0.288 ms = 0.324 ms."
  common_mistake: |
    **The Pitfall:** Assuming linear speedups from quantization without considering effective operations.
    **The Rationale:** Candidates forget unit conversions (GOPS to TOPS, seconds to milliseconds) or oversimplify how "halving latency" translates when combined with specific hardware quantization factors.
    **The Consequence:** Incorrect theoretical latency estimates that fail to distinguish the concrete benefits of operator lowering versus generic quantization.
  napkin_math: |
    **Assumptions & Constraints:**
    - Total FP32 Ops: 50 GOPS.
    - NPU Compute: 34.7 TOPS.
    - INT8 Factor: 1 FP32 op = 0.25 INT8 ops.

    **Calculations:**
    - Strategy 1 (Full INT8): 50/4 = 12.5 GOPS. Latency: 12.5e9 / 34.7e12 = 0.360 ms.
    - Strategy 2 (Mixed): 20% optimized = 10 GOPS / 4 = 2.5 GOPS. Base latency = 0.072 ms, halved = 0.036 ms. 80% standard = 40 GOPS / 4 = 10 GOPS. Latency = 0.288 ms. Total = 0.324 ms.

    **Conclusion & Interpretation:**
    - **Result: Compute-Bound.** Strategy 2 is strictly faster at 0.324 ms vs 0.360 ms.
