title: Analyze WakeLock Interaction with Mobile OS Sleep
scenario: An Android ML location-tracking model uses an exact timer alarm to wake the CPU for 2 seconds every 15 minutes. This strict polling drains the battery heavily.
question: Analyze how Android's Doze mode reacts to exact repeating WakeLocks, and how aligning inferences to OS maintenance windows prevents this drain.
details:
  realistic_solution: Android's Doze mode shuts down radios, syncs, and CPU cores to preserve deep sleep. Waking the device with an exact alarm forces a full hardware spin-up just for a 2-second inference, incurring huge fixed energy costs. By deferring inferences to OS-orchestrated maintenance windows (via WorkManager), the ML job piggybacks on periods where the device is already awake for network syncs, amortizing the wake cost.
  common_mistake: |
    **The Pitfall:** Optimizing the 2-second inference compute time.
    **The Rationale:** Developers focus on reducing ML latency to save power, missing the true systemic cost.
    **The Consequence:** Battery drain remains massive because 95% of the power waste comes from waking the SoC repeatedly out of Doze mode, not the computation itself.
  napkin_math: |
    - **Fixed Wake Cost:** Waking the SoC from Doze mode incurs a massive baseline energy cost that dwarfs short compute spikes.
    - **Compute Cost:** The 2-second inference consumes relatively little energy compared to spinning up the radios and CPU.
    - **Result:** **Aligning inferences to existing maintenance windows amortizes the massive wake cost, saving up to 95% of the wasted power.**
