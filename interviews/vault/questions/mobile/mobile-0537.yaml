title: The Mobile Video Battery Drain
scenario: You are a mobile ML engineer diagnosing severe battery drain in a real-time video filter app on an Apple A17 Pro (35 TOPS, 51.2 GB/s memory bandwidth). The profiler points to a single 3x3 depthwise convolution layer on a 112x112x256 INT8 feature map.
question: Why does a 3x3 depthwise convolution on a 112x112x256 INT8 tensor drain battery on A17 Pro?
details:
  realistic_solution: The workload is severely memory-bound. By calculating the arithmetic intensity (Ops/Byte), we can see it falls far below the hardware's ridge point. This means the Apple Neural Engine (ANE) is constantly waiting for data to arrive from the much slower memory, wasting energy and time.
  common_mistake: |
    **The Pitfall:** Assuming high peak TOPS means slowdowns must be compute-bound.
    **The Rationale:** Failing to calculate the arithmetic intensity of specific layers like depthwise convolutions.
    **The Consequence:** Blaming the hardware instead of optimizing data movement, leaving the compute units starved.
  napkin_math: |
    - Compute: 2 * 112 * 112 * 256 * 3 * 3 = 57,802,752 Ops (~57.8 M-Ops).
    - Memory Read: Input (112 * 112 * 256 * 1 byte = 3.21 MB) + Weights (3 * 3 * 256 = ~2.3 KB).
    - Memory Write: Output (112 * 112 * 256 * 1 byte = 3.21 MB).
    - Total Memory: 3.21 + 3.21 = 6.42 MB.
    - Arithmetic Intensity: 57.8 M-Ops / 6.42 MB = 9 Ops/Byte.
    - Ridge Point: 35 TOPS / 51.2 GB/s = ~683 Ops/Byte.
    - **9 Ops/Byte is vastly lower than the 683 Ops/Byte ridge point, meaning the layer is severely memory-bound.**
  options:
  - The layer is compute-bound; the `3x3` kernel requires too many calculations for the ANE to handle in real-time.
  - The layer is memory-bound; its arithmetic intensity is far below the A17's ridge point, so the ANE is stalled waiting for data from DRAM.
  - The OS is throttling the ANE due to thermal pressure, which is an unavoidable cost of mobile processing.
  - The model needs to be quantized from INT8 to FP16 to unlock more of the ANE's floating-point performance.
  correct_index: 1
