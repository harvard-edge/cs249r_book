title: The Depthwise Separable Dividend
scenario: You're optimizing a real-time object detection model for a new smartphone. A performance profile
  shows that a standard 3x3 convolutional layer is a major bottleneck, consuming significant compute on
  the mobile NPU. To improve frame rate, a colleague suggests replacing it with a 3x3 depthwise separable
  convolution. What is the approximate reduction in computational cost (in Multiply-Accumulate operations,
  or MACs) you should recall for this specific change?
question: "What is the approximate reduction in computational cost (in Multiply-Accumulate operations, or MACs) you should recall for this specific change?"
details:
  realistic_solution: 'The computational cost reduction is approximately the square of the kernel dimension.
    For a 3x3 kernel, this results in approximately a 9x reduction in MACs compared to a standard convolution.
    This is because the operation is split into two stages: a ''depthwise'' stage that filters each input
    channel independently, and a ''pointwise'' stage (a 1x1 convolution) that combines the outputs. This
    factorization dramatically reduces the total number of multiplications needed, especially when the
    number of output channels is large.'
  common_mistake: Engineers often know that depthwise separable convolutions are 'more efficient' but
    can't recall the order of magnitude of the savings. A common error is to guess a small, linear factor
    like 2-3x, underestimating the quadratic benefit. Another mistake is to confuse compute reduction
    with memory (activation size) reduction, which is a different effect.
  napkin_math: Let K be the kernel size (3), C_in be input channels, and C_out be output channels.
  options:
  - ~2x
  - ~9x
  - ~32x
  - It provides no compute reduction, only memory savings.
  correct_index: 1
