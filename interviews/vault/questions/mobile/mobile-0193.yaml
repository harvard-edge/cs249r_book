title: The Depthwise Separable Dividend
scenario: You're optimizing a real-time object detection model for a new smartphone. A performance profile shows that a standard 3x3 convolutional layer is a major bottleneck.
question: What is the approximate reduction in computational cost (in MACs) when replacing a standard 3x3 convolution with a depthwise separable convolution?
details:
  realistic_solution: 'The computational cost reduction is approximately the square of the kernel dimension. For a 3x3 kernel, this results in approximately a 9x reduction in MACs compared to a standard convolution. This is because the operation is split into two stages: a ''depthwise'' stage that filters each input channel independently, and a ''pointwise'' stage (a 1x1 convolution) that combines the outputs. This factorization dramatically reduces the total number of multiplications needed, especially when the number of output channels is large.'
  common_mistake: |
    **The Pitfall:** Underestimating the reduction as a small, linear factor (e.g., 2-3x) and confusing compute reduction with memory savings.
    **The Rationale:** Engineers know it's "more efficient" but cannot mathematically derive the factorization of the independent spatial and cross-channel stages.
    **The Consequence:** Failing to prioritize this crucial architectural swap when optimizing vision models for mobile NPUs.
  napkin_math: |
    - **Standard Conv MACs:** C_in * C_out * K^2.
    - **Depthwise Separable MACs:** C_in * K^2 + C_in * C_out.
    - **Ratio:** (C_in * C_out * K^2) / (C_in * K^2 + C_in * C_out).
    - **Simplification:** Dividing by (C_in * C_out), the ratio approaches K^2 for large C_out.
    - **Conclusion:** For K=3, the reduction is **~9x**.
  options:
  - ~2x
  - ~9x
  - ~32x
  - It provides no compute reduction, only memory savings.
  correct_index: 1
