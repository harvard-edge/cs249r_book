title: 'Mobile Transformer Cost Realization: Concrete Memory Layout for Mobile LLM'
scenario: 'Concretely calculate the memory layout for running Llama-3-1B (INT4, 32 layers, 2048 hidden,
  32 heads, head_dim=64) on Snapdragon 8 Gen 3 (16GB LPDDR5X). Account for: model weights, KV cache at
  2048 context, OS overhead (4GB), and inference buffers. Is there room for a 7B INT4 draft model for
  speculative decoding?'
details:
  realistic_solution: 'Llama-3-1B uses GQA with 8 KV heads (vs 32 Q heads). KV per token per layer: 2*8heads*64head_dim*1byte
    (INT8 KV)=1024 bytes per layer. 32 layers: 32KB per token. 2048 context: 32KB*2048=65MB KV. Model
    INT4: 1B*0.5=500MB. Total model+KV: 565MB. OS: 4GB. Activations/buffers: ~200MB. Total: 4.765GB. Available:
    16-4.765=11.235GB. 7B INT4 draft model: 7B*0.5=3.5GB. Add 7B KV (8 KV heads): 32KB*2048=65MB. 7B total:
    3.565GB. Grand total: 4.765+3.565=8.33GB < 16GB. Fits! Speculative decoding with 1B+7B both resident:
    8.33GB + buffers = ~9GB. 7GB headroom remaining. Confirmed feasible.'
  common_mistake: Calculating KV cache by multiplying hidden_dim instead of num_kv_heads*head_dim, and
    forgetting that Llama-3 uses GQA (Grouped Query Attention) with fewer KV heads than Q heads.
  napkin_math: 'Llama-3-1B: weights=500MB INT4. GQA KV: 8 KV heads. KV/tok/layer: 2*8*64*1=1024B. 32 layers:
    32KB/tok. 2048 ctx: 65MB. Total 1B: 565MB. OS: 4GB. Buffers: 200MB. Total: 4.765GB. 16GB - 4.765 =
    11.235GB available. Add 7B INT4: 3.5GB + 65MB KV = 3.565GB. Combined: 4.765+3.565=8.33GB. Remaining:
    7.67GB. Room for larger context: 7.67GB / 32KB per token = 239,687 more tokens of KV. Vast headroom.
    Practically: Snap 8G3 can run 1B+7B speculative decoding simultaneously with multi-KB context windows
    easily within 16GB.'
