title: Sizing W4A8 LLM Deployment on Snapdragon 8 Gen 3 Hexagon NPU
scenario: Your team is tasked with deploying a 7B parameter LLM for an on-device assistant on a flagship phone. The OS restricts your app's peak memory to 4 GB for both weights and KV cache.
question: How would you deploy a 7B LLM with W4A8 quantization under a 4 GB RAM limit, and what is its impact?
details:
  realistic_solution: W8A8 requires ~7 GB, violating the 4 GB constraint. W4A8 is mandatory purely for memory capacity. The correct architecture involves streaming 4-bit weights from memory, performing on-the-fly decompression to INT8 in the NPU's SRAM, and executing using 45 TOPS INT8 engines.
  common_mistake: |
    **The Pitfall:** Believing W4A8 doubles compute throughput.
    **The Rationale:** Candidates assume NPU MAC units operate natively on 4-bit, ignoring decompression requirements.
    **The Consequence:** Incorrectly forecasting compute speeds and missing that decoding remains fundamentally memory-bound.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Budget: 4 GB.
       - Model: 7B params.
       - Bandwidth: ~64 GB/s.
       - Compute: 45 TOPS INT8.
    2. **Calculations:**
       - W8A8 Size = 7B * 1 byte = 7 GB (Fails).
       - W4A8 Size = 7B * 0.5 byte = 3.5 GB (Fits).
       - Compute Time = 14 GOPs / 45 TOPS = ~0.31 ms.
       - Memory Fetch = 3.5 GB / 64 GB/s = ~54.6 ms.
    3. **Conclusion & Interpretation:**
       - **Result: 54.6 ms. Memory-Bandwidth-Bound.** Memory fetch time vastly dominates compute time.
