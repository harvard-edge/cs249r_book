title: The Smart Keyboard TCO Dilemma
scenario: You are the ML Systems Engineer for a new smart keyboard app with 10 million daily active users. To improve next-word prediction, you must diagnose the most cost-effective training strategy between Federated Learning and Centralized Training.
question: "Which smart keyboard training strategy has the lower full TCO after accounting for network and user battery costs?"
details:
  realistic_solution: Calculate the Total Cost of Ownership (TCO) for each strategy. Centralized incurs fixed cloud compute. Federated incurs massive distributed egress costs and induces churn via battery drain. Implement targeted active learning instead of naive fleet-wide FL.
  common_mistake: |
    **The Pitfall:** Assuming Federated Learning is inherently cheaper because compute is offloaded.
    **The Rationale:** Engineers often focus only on cloud compute costs and ignore the network cost of aggregating millions of model updates, as well as the cost of draining users' batteries.
    **The Consequence:** Recommending a strategy that is actually vastly more expensive and causes significant user churn.
  napkin_math: |
    **Assumptions & Constraints:**
    - Centralized daily cost: $300.
    - FL network cost: $0.01/GB ingress.
    - Battery drain: 0.9%/day.
    - Churn rate: 0.5%/month, LTV $3.
    
    **Calculations:**
    - FL Network = 10M * 5MB = 50TB = 50,000 GB = $500/day.
    - Churn Cost = 50,000 users/month * $3 = $150,000/month = $5,000/day.
    - Total FL Cost = $500 + $5,000 = $5,500/day.
    
    **Conclusion & Interpretation:**
    - **Result: TCO-Bound**. FL is ~18x more expensive than centralized training when accounting for true system costs.
