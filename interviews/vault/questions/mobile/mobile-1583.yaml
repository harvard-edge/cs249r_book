title: Extreme Sub-4-bit Quantization on Samsung Exynos 2400 NPU
scenario: You are tasked with deploying a 7-billion parameter language model (LLM) on the Samsung Exynos 2400 NPU (34.7 TOPS, 12 GB LPDDR5X). To meet aggressive latency and memory footprint targets, you decide to explore extreme sub-4-bit quantization (e.g., INT2, INT3) using techniques like AWQ or GPTQ.
question: How would you evaluate extreme sub-4-bit quantization for an LLM on Exynos 2400 NPU?
details:
  realistic_solution: '1. **NPU Feature Analysis**: Thoroughly investigate the Samsung Exynos 2400 NPU documentation for explicit support of sub-4-bit integer data types and operations. Understand its memory hierarchy and cache behavior. 2. **Algorithm Selection & Adaptation**: Select a suitable extreme quantization algorithm (e.g., AWQ, GPTQ) and potentially adapt it for the specific NPU architecture, focusing on weight-only quantization to maximize memory footprint reduction. 3. **Accuracy Recovery & Calibration**: Employ robust accuracy recovery techniques such as enhanced calibration strategies, mixed-precision configurations for critical layers, or custom de-quantization schemes. 4. **Micro-benchmarking**: Develop targeted micro-benchmarks to measure the actual throughput (TOPS utilization) and memory bandwidth for quantized operations (INT2/INT3) on the Exynos 2400, comparing against theoretical peaks (34.7 TOPS) and INT8 performance. 5. **End-to-End Evaluation**: Integrate the quantized LLM and perform end-to-end inference benchmarking, monitoring latency, power consumption, and memory usage on the target device.'
  common_mistake: |
    **The Pitfall:** Overlooking hardware limitations for non-standard integer arithmetic.
    **The Rationale:** Candidates assume generic quantization benefits apply everywhere without checking explicit hardware support for INT2/INT3.
    **The Consequence:** The model fails to execute efficiently because the NPU falls back to slower execution modes for unsupported data types.
  napkin_math: |
    * Original FP16 (7B params): 7B × 2 bytes = 14 GB.
    * Quantized INT2: 7B × 0.25 bytes = 1.75 GB. Total memory saved = 12.25 GB.
    * Exynos INT8 TOPS = 34.7 TOPS. Assuming 4x speedup for INT2, Peak INT2 throughput = 138.8 TOPS.
    * Required compute: 80 GOPS/token × 15 tokens/sec = 1.2 TOPS.
    * **1.2 TOPS is vastly below the 138.8 TOPS theoretical limit, proving inference will be entirely memory-bandwidth bound.**
