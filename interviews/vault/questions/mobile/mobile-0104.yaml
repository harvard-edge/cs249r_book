title: The Silent Battery Drain
scenario: Your social media app includes an AI feature that continuously analyzes user content in the
  background for personalization. Users are reporting significant battery drain, even when they're not
  actively using the app. What are the common pitfalls in mobile ML background processing that lead to
  excessive battery consumption, and how can you mitigate them?
question: "What are the common pitfalls in mobile ML background processing that lead to excessive battery consumption, and how can you mitigate them?"
details:
  realistic_solution: "Excessive battery drain from background ML is typically caused by:\n  1.  **Continuous\
    \ Polling/Inference:** Running the ML model too frequently, even when there's no new relevant data\
    \ or user interaction.\n  2.  **Lack of Opportunistic Scheduling:** Not leveraging the OS's background\
    \ task scheduling APIs (e.g., Android's WorkManager, iOS's BackgroundTasks framework) to run tasks\
    \ when the device is charging, on Wi-Fi, or in low-power states.\n  3.  **Wake Locks:** Holding CPU/NPU\
    \ wake locks unnecessarily, preventing the device from entering deep sleep states.\n  4.  **Inefficient\
    \ Hardware Usage:** Not delegating to the NPU/DSP when available, forcing computationally expensive\
    \ tasks onto the CPU, which is less power-efficient for ML.\n  5.  **Data Transfers:** Frequent data\
    \ transfers (e.g., uploading processed results, downloading model updates) over cellular networks\
    \ can be very power-hungry.\n  6.  **Sensor Activation:** Keeping power-hungry sensors (e.g., GPS,\
    \ camera) active for background ML when not strictly necessary."
  common_mistake: '"The model is too big." While model size affects *per-inference* energy, continuous
    background activity is the primary culprit for *total* battery drain.'
  napkin_math: A mobile NPU consuming 300mW (0.3W) for 100ms per inference, run every 5 seconds, consumes
    $0.3W \times 0.1s \times (24 \text{ hours} \times 3600 \text{ s/hour} / 5 \text{ s}) \approx 518 \text{
    Joules}$ per day. This doesn't seem like much, but if it keeps the CPU awake at 1W for 10% of the
    time, that's $1W \times (0.1 \times 24 \times 3600) \approx 8640 \text{ Joules}$ per day. An average
    phone battery is 15-20 Wh (54000-72000 Joules). Even small background activities can significantly
    impact battery life over 24 hours.
