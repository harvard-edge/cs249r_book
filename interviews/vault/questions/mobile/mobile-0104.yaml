title: The Silent Battery Drain
scenario: Your social media app includes an AI feature that continuously analyzes user content in the background for personalization. Users are reporting significant battery drain, even when they're not actively using the app.
question: "What common pitfalls in mobile ML background processing lead to excessive battery drain, and how can you mitigate them?"
details:
  realistic_solution: |
    Excessive battery drain from background ML is typically caused by:
    1.  **Continuous Polling/Inference:** Running the ML model too frequently, even when there's no new relevant data or user interaction.
    2.  **Lack of Opportunistic Scheduling:** Not leveraging the OS's background task scheduling APIs (e.g., Android's WorkManager, iOS's BackgroundTasks framework) to run tasks when the device is charging, on Wi-Fi, or in low-power states.
    3.  **Wake Locks:** Holding CPU/NPU wake locks unnecessarily, preventing the device from entering deep sleep states.
    4.  **Inefficient Hardware Usage:** Not delegating to the NPU/DSP when available, forcing computationally expensive tasks onto the CPU, which is less power-efficient for ML.
    5.  **Data Transfers:** Frequent data transfers (e.g., uploading processed results, downloading model updates) over cellular networks can be very power-hungry.
    6.  **Sensor Activation:** Keeping power-hungry sensors (e.g., GPS, camera) active for background ML when not strictly necessary.
  common_mistake: |
    **The Pitfall:** Blaming the model size alone for battery drain.
    **The Rationale:** While model size affects per-inference energy, continuous background activity and wakelocks are the primary culprits for total battery drain.
    **The Consequence:** Optimizing the model architecture while failing to address the high-frequency polling that actually drains the battery.
  napkin_math: |
    - **NPU Baseline:** 0.3W for 100ms per inference, every 5s = 0.3W * 0.1s * (86400s / 5s) ≈ 518 Joules/day.
    - **CPU Wake Overhead:** Keeping the CPU awake at 1W for 10% of the day = 1W * 8640s = 8640 Joules/day.
    - **Battery Capacity:** ~15-20 Wh = 54,000-72,000 Joules.
    - **Result:** **CPU wakelocks consume over 15x more energy than the NPU inference itself, creating massive battery drain.**
