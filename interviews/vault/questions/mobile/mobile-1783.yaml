title: Unified Memory Architecture Impact on LLM Decode on A17 Pro
scenario: Apple A17 Pro uses unified memory architecture (UMA) where CPU, GPU, and Neural Engine share 8GB LPDDR5 at 68 GB/s. A 7B INT4 model (3.5GB) is deployed for on-device inference.
question: How much does A17 Pro UMA contention slow 7B INT4 LLM decode under display, camera, and background bandwidth load?
details:
  realistic_solution: 'Available bandwidth: 68 GB/s total. Display + OS background: ~5-8 GB/s baseline. Camera/ISP if active: 8-15 GB/s. Available for inference: ~45-55 GB/s. 7B INT4 decode bandwidth: 3.5GB model / bandwidth = latency per token. At 50 GB/s effective: 3.5GB/50GB/s = 70ms/token = 14 tok/s. With display active and background apps: effective bandwidth may drop to 35 GB/s → 100ms/token = 10 tok/s. Strategy: Use priority QoS for inference thread, schedule inference during display blanking intervals, use model quantization to minimize weight footprint.'
  common_mistake: |
    **The Pitfall:** Assuming the Neural Engine gets dedicated memory bandwidth.
    **The Rationale:** Candidates ignore UMA, where all processors (OS, background, display) compete for the same 68 GB/s pool.
    **The Consequence:** Drastically overestimating real-world token generation speed.
  napkin_math: |
    - **Total UMA Bandwidth:** 68 GB/s.
    - **Background / Display Load:** ~8-15 GB/s.
    - **Effective Inference Bandwidth:** ~50 GB/s.
    - **Model Weights:** 3.5 GB per token (INT4).
    - **Base Latency:** 3.5 GB / 50 GB/s = 70 ms/token (**14 tok/s**).
    - **Contention Scenario:** Heavy load drops effective bandwidth to 35 GB/s.
    - **Contended Latency:** 3.5 GB / 35 GB/s = 100 ms/token (**10 tok/s**).
