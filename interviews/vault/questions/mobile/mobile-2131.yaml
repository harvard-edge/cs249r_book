title: Automotive Ethernet AllGather
scenario: A vehicle cluster with 3 Snapdragon 8 Gen 3 modules shares 8MB bounding
  box tensors via an automotive Gigabit Ethernet switch (1000 Mbps).
question: Analyze the ring AllGather latency for an 8MB tensor per node, accounting
  for a 50us switch processing delay per hop and a 1ms synchronization barrier.
details:
  realistic_solution: In AllGather, each node receives (N-1) chunks. Each node must
    transmit its 8MB to the others, meaning 2 chunks of 8MB (16MB) are received per
    node. At 1000 Mbps, 128Mb takes 128ms. The switch delays and 1ms barrier add negligible
    overhead compared to the payload.
  common_mistake: Confusing the AllGather payload scaling factor of (N-1)*M with the
    AllReduce factor of 2*(N-1)/N, leading to incorrect bandwidth bounds.
  napkin_math: Receive = (3-1) * 8MB = 16MB = 128Mb. 128Mb / 1000Mbps = 128ms. Sync
    = 1ms + 100us = 129.1ms.
