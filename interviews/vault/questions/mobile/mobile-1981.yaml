title: 'Snapdragon Zero-Copy Pipeline'
scenario: 'A Snapdragon 8 Gen 3 pipeline copies a 16 MB 4K image from the ISP buffer to NPU memory via LPDDR5 (80 GB/s) before inference. Inference takes 2 ms.'
question: 'What is the copy latency and overall execution time without zero-copy optimization for a 16 MB image?'
visual:
  kind: svg
  path: mobile-1981.svg
  alt: 'Bar chart showing a small 0.2ms copy overhead before a 2ms inference.'
  caption: 'Memory copy overhead in the data pipeline.'
details:
  realistic_solution: 'Memory bandwidth is 80 GB/s (80,000 MB/s). Time to copy 16 MB = 16 / 80,000 = 0.0002 seconds = 0.2 ms. Total execution time = 0.2 ms copy + 2.0 ms inference = 2.2 ms.'
  common_mistake: |
    **The Pitfall:** Failing to convert unit magnitudes correctly when calculating transfer latency.
    **The Rationale:** Candidates mix up Megabytes and Gigabytes, dividing 16 by 80 directly.
    **The Consequence:** They calculate 0.2 seconds (200 ms) instead of 0.2 ms, leading to completely incorrect architectural decisions regarding memory bottlenecks.
  napkin_math: |
    **Assumptions & Constraints:**
    - Memory Bandwidth: LPDDR5 at 80 GB/s.
    - Payload: 16 MB 4K image copy.
    - Inference time: 2.0 ms.

    **Calculations:**
    - Bandwidth Conversion: 80 GB/s = 80,000 MB/s.
    - Transfer Latency: 16 MB / 80,000 MB/s = 0.0002 seconds = 0.2 ms.
    - Total Time: 0.2 ms + 2.0 ms = 2.2 ms.

    **Conclusion & Interpretation:**
    - **Result: 2.2 ms (Compute-Bound)**. The memory copy is incredibly fast (0.2 ms), so the overall execution time is 2.2 ms. Zero-copy optimizations would only shave off a minor fraction of latency.
