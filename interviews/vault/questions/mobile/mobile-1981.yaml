title: Snapdragon Zero-Copy Pipeline
scenario: A Snapdragon 8 Gen 3 pipeline copies a 16 MB 4K image from the ISP buffer
  to NPU memory via LPDDR5 (80 GB/s) before inference. Inference takes 2 ms.
question: Calculate the copy latency and the overall execution time without zero-copy
  optimization.
visual:
  kind: svg
  path: mobile-1981.svg
  alt: Bar chart showing a small 0.2ms copy overhead before a 2ms inference.
  caption: Memory copy overhead in the data pipeline.
details:
  realistic_solution: Memory bandwidth is 80 GB/s (80,000 MB/s). Time to copy 16 MB
    = 16 / 80,000 = 0.0002 seconds = 0.2 ms. Total execution time = 0.2 ms copy +
    2.0 ms inference = 2.2 ms.
  common_mistake: Failing to convert units properly, resulting in 16 / 80 = 0.2 seconds
    (200 ms) instead of 0.2 ms.
  napkin_math: 16 / 80000 = 0.2 ms; 0.2 + 2 = 2.2 ms
