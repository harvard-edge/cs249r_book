title: 'Fault Tolerance: Fluency — Mobile Checkpoint Write Speed and Overhead'
scenario: 'Your on-device training runs LoRA fine-tuning on A17 Pro (35 TOPS Neural Engine, 8GB RAM).
  LoRA weights: 1M parameters, AdamW optimizer state. Estimate checkpoint write time and energy overhead
  if you checkpoint every 60 seconds during a 10-minute background training session.'
question: "How would you estimate checkpoint write time and energy overhead if you checkpoint every 60 seconds during a 10-minute background training session?"
details:
  realistic_solution: 'Checkpoint: LoRA weights (fp32) + optimizer (2× fp32 for momentum and variance)
    = 3 × 1M × 4B = 12MB. Flash write at A17 Pro NVMe: ~3 GB/s. Write time: 12MB / 3 GB/s = 4ms per checkpoint.'
  common_mistake: Forgetting that optimizer state doubles the checkpoint size; overestimating flash write
    power drain on mobile.
  napkin_math: 'Checkpoint size: 1M params × fp32 = 4MB weights. AdamW: 2 × 4MB = 8MB optimizer state.
    Total: 12MB. Write time: 12MB / 3 GB/s = 4ms. Checkpoints in 10 minutes: 10 × 60/60 = 10 checkpoints.
    Total write time: 10 × 4ms = 40ms out of 600 seconds = 0.0067% overhead — negligible. Energy: flash
    write power ~0.5W × 4ms = 2mJ per checkpoint. 10 × 2mJ = 20mJ. Training energy: 10 min × 2W CPU ≈
    1,200 J. Checkpoint overhead: 20mJ / 1200 J = 0.0017% energy overhead. Completely negligible. Storage:
    10 checkpoints × 12MB = 120MB for rolling 10-minute window. Keep only last 3: 36MB. Trivial on modern
    iPhone.'
