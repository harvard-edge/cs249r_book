title: Evaluate Preprocessing Offload for Thermal Headroom
scenario: An AR app running on the Apple A17 Pro processes 60 FPS 4K video. Preprocessing
  via the GPU consumes heavy power, causing thermal throttling that degrades Neural
  Engine inference.
question: Evaluate the trade-offs of migrating preprocessing to the ISP's scaling
  blocks versus reducing the initial camera sensor resolution.
details:
  realistic_solution: Migrating preprocessing to the ISP saves GPU cycles but still
    pushes memory bandwidth copying 4K frames (60 FPS * 8MB = 480 MB/s). Reducing
    the sensor stream directly to 1080p cuts the initial data volume by 4x. Lowering
    sensor resolution targets the root cause of thermal throttling (ISP power and
    DRAM bandwidth) rather than just shifting the compute bottleneck.
  common_mistake: Overestimating the benefit of moving tasks to different hardware
    blocks without addressing the underlying memory bandwidth power cost.
  napkin_math: 4K (8MB) to 1080p (2MB) cuts bandwidth from 480MB/s to 120MB/s.
