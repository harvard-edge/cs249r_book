title: Evaluate Preprocessing Offload for Thermal Headroom
scenario: 'An AR app running on the Apple A17 Pro processes 60 FPS 4K video. Preprocessing via the GPU consumes heavy power, causing thermal throttling that degrades Neural Engine inference.'
question: 'How do the trade-offs of migrating preprocessing to the ISP''s scaling blocks compare to reducing the initial camera sensor resolution?'
details:
  realistic_solution: 'Migrating preprocessing to the ISP saves GPU cycles but still pushes memory bandwidth copying 4K frames (60 FPS * 8MB = 480 MB/s). Reducing the sensor stream directly to 1080p cuts the initial data volume by 4x. Lowering sensor resolution targets the root cause of thermal throttling (ISP power and DRAM bandwidth) rather than just shifting the compute bottleneck.'
  common_mistake: |
    **The Pitfall:** Overestimating the benefit of moving tasks to different hardware blocks (like the ISP).
    **The Rationale:** Engineers assume thermal throttling is purely a compute issue.
    **The Consequence:** They shift the compute bottleneck without addressing the underlying memory bandwidth power cost, and the device continues to throttle.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 4K Frame Size: 8 MB.
       - 1080p Frame Size: 2 MB.
       - Framerate: 60 FPS.
    2. **Calculations:**
       - 4K Memory Bandwidth: 8 MB × 60 FPS = 480 MB/s.
       - 1080p Memory Bandwidth: 2 MB × 60 FPS = 120 MB/s.
       - Bandwidth Reduction: 480 MB/s / 120 MB/s = 4x reduction.
    3. **Conclusion & Interpretation:**
       **Result: Thermal-Bound Memory I/O.** Migrating preprocessing to the ISP shifts compute but still pushes 480 MB/s. Dropping sensor resolution to 1080p yields a **4x bandwidth reduction**, directly solving the root cause of thermal throttling.
