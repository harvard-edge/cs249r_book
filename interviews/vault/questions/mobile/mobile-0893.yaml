title: Recalling Compound AI Pipeline Components and Their Roles on Mobile
scenario: A junior mobile ML engineer at a company deploying an AI assistant on A17 Pro asks about the standard components in an on-device RAG pipeline.
question: What are the standard components in an on-device RAG pipeline, and what does each one do?
details:
  realistic_solution: 'Standard on-device RAG pipeline: (1) Query Encoder: bi-encoder transformer converts query to dense vector. (2) Vector Index (FAISS): approximate nearest-neighbor search. (3) Document Store: SQLite storing actual text. (4) Reranker: cross-encoder scores chunks. (5) Context Assembly: concatenates prompt. (6) Generative LLM: autoregressive decoder.'
  common_mistake: |
    **The Pitfall:** Conflating the embedding model and the generative LLM.
    **The Rationale:** Engineers assume both are strictly "the same kind of model" simply because both are transformer-based.
    **The Consequence:** Architectural confusion between dense vector similarity search flows and auto-regressive token generation.
  napkin_math: |
    **Assumptions & Constraints:**
    - A17 Pro Constraints: 8GB RAM, 35 TOPS.
    - Component Sizes: Encoder (22MB), FAISS (10MB), DB (20MB), Buffer (8MB), LLM 1B INT4 (500MB).

    **Calculations:**
    - Total RAM Footprint: 22 + 10 + 20 + 8 + 500 = 560MB.
    - Estimated Latency: 15ms (encode) + 3ms (FAISS) + 2ms (fetch) + 1ms (assemble) + 73ms (prefill) + 2.5s (decode 50 tokens) = 2.594s.

    **Conclusion & Interpretation:**
    - **Result: 560MB (Memory-Capacity-Bound)**. The entire compound pipeline requires only 560MB, fitting extremely well within the 8GB mobile constraint while leaving headroom.
