title: Recalling Compound AI Pipeline Components and Their Roles on Mobile
scenario: "A junior mobile ML engineer at a company deploying an AI assistant on A17 Pro (8GB, 35 TOPS) asks about the standard components in an on-device RAG pipeline."
question: "What are the standard components in an on-device RAG pipeline, and what does each one do?"
details:
  realistic_solution: 'Standard on-device RAG pipeline: (1) Query Encoder: bi-encoder transformer (e.g., MobileBERT) converts user query to a dense vector (e.g., 256-dim float32). Output: query embedding. (2) Vector Index (FAISS): approximate nearest-neighbor search over document embeddings. Output: top-K document IDs + similarity scores. (3) Document Store: SQLite or flat files storing the actual document text indexed by ID. Output: top-K document text chunks. (4) Reranker (optional): cross-encoder scores query against each retrieved chunk. Output: reranked, filtered chunks. (5) Context Assembly: concatenates system prompt + retrieved chunks + query into LLM input. Output: formatted prompt string. (6) Generative LLM: autoregressive decoder generates response token by token. Output: response text.'
  common_mistake: |
    **The Pitfall:** Conflating the embedding model and the generative LLM.
    **The Rationale:** Engineers assume both are "the same kind of model" because both are transformer-based.
    **The Consequence:** Architectural confusion between dense vector similarity search and auto-regressive token generation.
  napkin_math: |
    - Memory footprint on A17 Pro: Query encoder (22MB INT8) + FAISS index (10MB) + Document store (20MB) + Context buffer (8MB) + LLM 1B INT4 (500MB) = `560MB`.
    - Latency budget: query_encode(15ms) + FAISS(3ms) + doc_fetch(2ms) + context_assemble(1ms) + LLM_prefill(73ms) + LLM_decode_50tok(2.5s) = `~2.6s`.
    - **Conclusion:** The pipeline fits well within the **8GB** memory constraint.
