title: The OTA Cellular Limit
scenario: You are an engineer on an automotive team, and you need to push a critical update to a driver-assistance
  model. To avoid waiting for a full app store review, you plan to use an Over-the-Air (OTA) update. To
  ensure the update reaches the maximum number of vehicles, including those not on Wi-Fi, you must stay
  within the cellular download limit imposed by the mobile OS. What is the typical size limit you must
  stay under for a cellular download that doesn't require explicit user opt-in?
details:
  realistic_solution: Most mobile operating systems, like iOS and Android, impose a limit of around 200-250
    MB for automatic downloads over a cellular network. To be safe, an engineering team should target
    a budget of ~200 MB for any OTA update that needs to be deployed urgently and widely.
  common_mistake: Engineers often confuse the large multi-gigabyte *initial install* size with the much
    stricter *cellular update* size. They might assume that since the app is 2 GB, a 500 MB update is
    fine, failing to realize OSes strictly cap non-Wi-Fi downloads to protect users' data plans. This
    leads to failed rollouts for users who aren't on Wi-Fi.
  napkin_math: If your new uncompressed driver-assistance model is 900 MB, you need to achieve a significant
    compression ratio to meet the OTA limit.
  options:
  - 20 MB
  - 2 GB
  - ~200 MB
  - Unlimited, as long as the user has a data plan.
  correct_index: 2
