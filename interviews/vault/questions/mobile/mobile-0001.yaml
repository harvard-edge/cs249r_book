title: The OTA Cellular Limit
scenario: You are an engineer on an automotive team, and you need to push a critical update to a driver-assistance model. To avoid waiting for a full app store review, you plan to use an Over-the-Air (OTA) update. To ensure the update reaches the maximum number of vehicles, including those not on Wi-Fi, you must stay within the cellular download limit imposed by the mobile OS.
question: What is the typical size limit you must stay under for a cellular download that doesn't require explicit user opt-in?
details:
  realistic_solution: Most mobile operating systems, like iOS and Android, impose a limit of around 200-250 MB for automatic downloads over a cellular network.
  common_mistake: |
    **The Pitfall:** Confusing the large multi-gigabyte initial install size with the stricter cellular update size.
    **The Rationale:** Engineers assume that since the app payload is large, a 500 MB update is permissible over cellular.
    **The Consequence:** Failed rollouts for users who aren't on Wi-Fi, preventing critical driver-assistance updates from reaching the fleet.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Uncompressed model size: 900 MB.
       - Target OTA limit: ~200 MB.
    2. **Calculations:**
       - Required compression ratio: 900 MB / 200 MB = 4.5x.
    3. **Conclusion & Interpretation:**
       - **Result: Bandwidth-Bound.** You must utilize quantization and compression to fit the 900 MB model into the strict 200 MB cellular envelope.
  options:
  - 20 MB
  - 2 GB
  - ~200 MB
  - Unlimited, as long as the user has a data plan.
  correct_index: 2
