title: The 7 Billion Parameter Car Crash
scenario: Your team is responsible for the voice assistant in a new line of electric vehicles. A product manager proposes replacing the current small speech model with a 7 billion parameter LLM to provide a 'next-gen' experience. They want to push it to the entire fleet via an over-the-air (OTA) update.
question: Based on the typical hardware specs for mobile-class systems, what is the most immediate, fundamental blocker for this plan?
details:
  realistic_solution: The primary blocker is the model's memory footprint. A 7B parameter model, even when quantized to 8-bit integers (INT8), requires approximately 7 GB of memory just to load the weights. This exceeds the total available RAM (typically 6-12 GB, with only a fraction available to a single app) on a mobile or automotive-grade system, making the proposal a non-starter.
  common_mistake: |
    **The Pitfall:** Underestimating the raw size of LLM weights and focusing on secondary issues like compute (TOPS) or network speed.
    **The Rationale:** Engineers accustomed to cloud deployments forget the hard physical memory limits of edge devices.
    **The Consequence:** Proposing architectures that physically cannot fit into the vehicle's available RAM, making the plan a complete non-starter.
  napkin_math: |
    - **Model Parameter Count:** 7 Billion
    - **INT8 Quantization Size:** 1 byte per parameter
    - **Model Footprint:** 7B × 1 byte = **7 GB**
    - **Conclusion:** This immediately exceeds the available RAM on most mobile/automotive devices even before accounting for OS overhead or KV cache.
  options:
  - The vehicle's NPU doesn't have enough TOPS to run the model.
  - The OTA download over a cellular network would be too slow and costly.
  - The model's 7 GB memory footprint exceeds the available RAM on the device.
  - The power draw from the model would significantly reduce the vehicle's driving range.
  correct_index: 2
