title: The 7 Billion Parameter Car Crash
scenario: Your team is responsible for the voice assistant in a new line of electric vehicles. A product
  manager proposes replacing the current small speech model with a 7 billion parameter LLM to provide
  a 'next-gen' experience. They want to push it to the entire fleet via an over-the-air (OTA) update.
  Based on the typical hardware specs for mobile-class systems, what is the most immediate, fundamental
  blocker for this plan?
question: "Based on the typical hardware specs for mobile-class systems, what is the most immediate, fundamental blocker for this plan?"
details:
  realistic_solution: The primary blocker is the model's memory footprint. A 7B parameter model, even
    when quantized to 8-bit integers (INT8), requires approximately 7 GB of memory just to load the weights.
    This exceeds the total available RAM (typically 6-12 GB, with only a fraction available to a single
    app) on a mobile or automotive-grade system, making the proposal a non-starter.
  common_mistake: Engineers often underestimate the raw size of LLM weights. They might focus on secondary
    issues like compute (TOPS) or network speed, but the most fundamental problem is that a model of this
    scale simply won't fit into the memory of a mobile-class device, even before considering the OTA download.
  napkin_math: 'Using the standard rule of thumb for inference memory: 7B parameters * 1 byte/parameter (INT8) = 7 GB. This immediately exceeds the available memory on most mobile devices before even considering OS overhead or the KV cache.'
  options:
  - The vehicle's NPU doesn't have enough TOPS to run the model.
  - The OTA download over a cellular network would be too slow and costly.
  - The model's 7 GB memory footprint exceeds the available RAM on the device.
  - The power draw from the model would significantly reduce the vehicle's driving range.
  correct_index: 2
