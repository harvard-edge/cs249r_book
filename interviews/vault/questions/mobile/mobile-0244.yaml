title: The 7 Billion Parameter Car Crash
scenario: Your team is responsible for the voice assistant in a new line of electric vehicles. A product manager proposes replacing the current small speech model with a 7 billion parameter LLM via an over-the-air (OTA) update.
question: Based on the typical hardware specs for mobile-class systems, what is the most immediate, fundamental blocker for this plan?
details:
  realistic_solution: The ultimate physical blocker is raw memory capacity. Even aggressively compressing a 7B parameter model down to 8-bit integer weights (INT8) creates a static 7 GB payload. Edge and automotive SOCs possess severely constrained total DRAM pools, with an even smaller fraction allocated for user-space tasks. This memory demand physically cannot fit, rendering compute and network arguments completely moot.
  common_mistake: |
    **The Pitfall:** Fixating on secondary constraints like inference TOPS, thermal ceilings, or OTA cellular network bandwidth.
    **The Rationale:** Engineers accustomed to cloud deployments assume memory is infinite and incorrectly tunnel-vision on compute bottlenecks.
    **The Consequence:** Wasting cycles proposing elaborate quantization strategies or streaming architectures for hardware that physically lacks the RAM chips to boot the model.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model size: 7 Billion parameters.
    - Optimal quantization: INT8 (1 byte per parameter).
    - Target hardware: Automotive/Mobile Edge system.

    **Calculations:**
    - Static weight footprint: 7B * 1 byte = 7.0 GB.
    - Required RAM (Weights + OS + App + KV): 7.0 GB + ~3.0 GB = ~10.0 GB minimum RAM requirement.

    **Conclusion & Interpretation:**
    - **Result: Memory-Bound**. The hard physical limit of DRAM capacity makes the deployment impossible, rendering compute constraints (TOPS) completely irrelevant.
  options:
  - The NPU's TOPS limit will cap inference at 1 token/sec.
  - The OTA download exceeds cellular bandwidth SLAs.
  - The 7 GB INT8 footprint physically exceeds the system's available RAM.
  - The context window will max out the KV cache in 2 turns.
  correct_index: 2
