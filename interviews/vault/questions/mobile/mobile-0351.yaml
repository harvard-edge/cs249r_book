title: 'The Style Transfer Bottleneck: Roofline Analysis'
scenario: You're optimizing a real-time neural style transfer filter for a new camera app running on an Apple A17 Pro. The INT8 model performs 70 Giga-OPS for every 1080p frame it processes. To process this single frame, the model's layers require reading and writing a total of 250 MB of data.
question: Based on the hardware specifications, is this workload compute-bound or memory-bound?
details:
  realistic_solution: The workload is **memory-bound**. To determine this, we must calculate the workload's Arithmetic Intensity (AI) and compare it to the hardware's ridge point.
  common_mistake: |
    **The Pitfall:** Guessing the bottleneck without calculating the arithmetic intensity and comparing it to the ridge point.
    **The Rationale:** Engineers often assume that 70 Giga-OPS is computationally massive and must therefore be compute-bound.
    **The Consequence:** Misdiagnosing the bottleneck and applying the wrong set of optimization techniques.
  napkin_math: |
    *   **Arithmetic Intensity:** 70 GOps / 250 MB = **280 Ops/Byte**.
    *   **Hardware Ridge Point:** 35,000 GOps/s / 51.2 GB/s = **683 Ops/Byte**.
    *   **Conclusion:** Since AI (280) < Ridge (683), the workload is **Memory-Bound**.
    *   **Bandwidth-Limited Latency:** 250 MB / 51.2 GB/s = **4.9 ms** (Compute latency would be 2 ms).
  options:
  - Memory-bound, because the workload's arithmetic intensity (280 Ops/Byte) is lower than the hardware's ridge point (~683 Ops/Byte).
  - Compute-bound, because the workload's arithmetic intensity (280 Ops/Byte) is lower than the hardware's ridge point.
  - Compute-bound, because performing 70 G-OPS per frame is an intensive task that will saturate the 35 TOPS Neural Engine.
  - Memory-bound, because the model needs to access over 200MB of data, which always exceeds mobile memory bandwidth.
