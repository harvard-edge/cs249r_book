title: Diagnosing Data Drift on Google Tensor G3 for On-Device ML
scenario: An image classification model on Tensor G3 devices shows a drop in accuracy. Recent telemetry indicates a shift towards low-light, high-noise images.
question: How would you distinguish data drift, concept drift, and training-serving skew for a Tensor G3 image classifier under low-light inputs?
details:
  realistic_solution: To diagnose, establish baseline feature distributions using a representative sample. Leverage the on-device TPU to periodically compute feature distributions from a small subset of live inference data. Compare these using statistical methods like Population Stability Index (PSI) or Wasserstein distance. Significant divergence isolated to the input features confirms data drift.
  common_mistake: |
    **The Pitfall:** Immediately assuming concept drift and triggering full model retraining.
    **The Rationale:** Neglecting to verify feature distribution changes and ignoring the exorbitant cost of on-device retraining.
    **The Consequence:** Wasting massive compute and battery life on unnecessary retraining when preprocessing adjustments or basic ISP tuning might suffice.
  napkin_math: |
    **Assumptions & Constraints:**
    - Feature dimensions: 1024 float16 (2 bytes) = 2 KB per image.
    - Inference rate: 100 img/s * 3600 s/hr * 8 hr/day = 2,880,000 images/day.
    - Sampling rate: 0.5%.

    **Calculations:**
    - Sampled images: 2,880,000 * 0.005 = 14,400 images/day.
    - Storage required: 14,400 * 2 KB = 28,800 KB = 28.125 MB.

    **Conclusion & Interpretation:**
    - **Result: 28.125 MB (Storage-Bound)**. Daily sampling requires only ~28.1 MB of on-device memory, safely fitting within standard local storage limits.
