title: Diagnosing Data Drift on Google Tensor G3 for On-Device ML
scenario: An image classification model on Tensor G3 devices shows a drop in accuracy. Recent telemetry indicates a shift towards low-light, high-noise images.
question: How would you distinguish data drift, concept drift, and training-serving skew for a Tensor G3 image classifier under low-light inputs?
details:
  realistic_solution: To diagnose, first establish baseline feature distributions using a representative sample. Leverage the on-device TPU to periodically compute feature distributions from a small, sampled subset of live inference data. Compare these using statistical methods like PSI. Significant divergence suggests data drift.
  common_mistake: |
    **The Pitfall:** Immediately assuming concept drift and triggering full model retraining.
    **The Rationale:** Neglecting to verify feature distribution changes or on-device resource limits.
    **The Consequence:** Wasting massive compute and battery life on unnecessary retraining when preprocessing adjustments might suffice.
  napkin_math: |
    - Feature dimensions: 1024 float16 (2 bytes) = 2 KB per image.
    - Inference rate: 100 img/s * 3600 s/hr * 8 hr/day = 2,880,000 images/day.
    - 0.5% sample rate: 14,400 images/day.
    - Storage: 14,400 * 2 KB = 28,800 KB = ~28.1 MB.
    - **Daily sampling requires only ~28 MB of on-device memory.**
