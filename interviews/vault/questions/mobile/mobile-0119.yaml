title: 'The Background Inference Power Budget'
scenario: 'Your health app runs a heart rhythm classification model on smartwatch sensor data forwarded to the paired smartphone. The OS gives background apps approximately 30 seconds of CPU time per background fetch cycle, and the system schedules these opportunistically. The model takes 12ms per inference on the NPU.'
question: 'How many inferences can you run per background cycle, and what is the energy cost of running on NPU vs CPU?'
details:
  realistic_solution: 'The OS grants ~30s wall-clock; effective compute: ~23.84s. 60 data windows x 12ms NPU = 720ms (3% of budget). Energy: NPU 0.72J/cycle vs CPU 17.85J (24.8x). Daily battery: NPU 0.075% vs CPU 1.86%. Build defensively: timer at 25s to stop early. Prioritize recent data. Pre-load model at app launch to avoid compilation tax. At 10M users, NPU vs CPU saves 3,000,000 MJ/year collectively.'
  common_mistake: |
    **The Pitfall:** Assuming 30 seconds / 12ms = 2,500 inferences on the NPU.
    **The Rationale:** Candidates mistake wall-clock budget for pure compute time, failing to account for process overhead, wake locks, and system throttling.
    **The Consequence:** Background tasks are forcefully terminated by the OS because they hit the limit while loading the model, doing data preprocessing, or dealing with NPU warm-up.
  napkin_math: |
    **Assumptions & Constraints:**
    - OS wall-clock background limit: 30 seconds (~23.8s effective compute).
    - NPU latency: 12ms/inference. NPU energy: 12mJ/inference. CPU energy: 297mJ/inference.
    - 60 inferences required per cycle.

    **Calculations:**
    - Required execution time: 60 x 12ms = 720ms.
    - Utilization of budget: 720ms / 23800ms = 3%.
    - Energy per cycle (NPU): 60 x 12mJ = 0.72 Joules.
    - Energy per cycle (CPU): 60 x 297mJ = 17.82 Joules (~24.8x higher).

    **Conclusion & Interpretation:**
    - **Result: 0.72J vs 17.82J (Compute-Bound)**. Using the NPU instead of the CPU saves a massive amount of energy (17J per cycle), preventing the background task from draining the daily battery.
