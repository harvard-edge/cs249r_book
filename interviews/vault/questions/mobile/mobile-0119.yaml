title: The Background Inference Power Budget
scenario: Your health app runs a heart rhythm classification model on Apple Watch sensor data forwarded
  to the paired iPhone. iOS gives background apps approximately 30 seconds of CPU time per background
  fetch cycle, and the system schedules these opportunistically (roughly every 15-30 minutes). The model
  takes 12ms per inference on the ANE. How many inferences can you run per background cycle, and what's
  the energy cost of running on ANE vs CPU?
question: "How many inferences can you run per background cycle, and what's the energy cost of running on ANE vs CPU?"
details:
  realistic_solution: 'iOS grants ~30s wall-clock; effective compute: ~23.84s. 60 data windows x 12ms
    ANE = 720ms (3% of budget). Energy: ANE 0.72J/cycle vs CPU 17.85J (24.8x). Daily battery: ANE 0.075%
    vs CPU 1.86%. Build defensively: timer at 25s to stop early. Prioritize recent data. Pre-load model
    at app launch to avoid compilation tax. At 10M users, ANE vs CPU saves 3,000,000 MJ/year collectively.'
  common_mistake: '"30 seconds / 12ms = 2,500 inferences on ANE. Easy." The 30-second budget is wall-clock
    time, not compute time. You must account for: model loading, ANE warm-up, data preprocessing, and
    the fact that iOS may terminate your background task early if the system is under resource pressure.'
  napkin_math: 'Background budget: 30s wall-clock → 23.84s effective. Data: 60 windows × 12ms = 720ms
    on ANE. Utilization: 720ms / 23,840ms = 3% of budget. Energy: ANE = 0.72J vs CPU = 17.85J (24.8× difference).
    Daily battery: ANE = 0.075% vs CPU = 1.86%. Annual energy: ANE = 12.6 kJ vs CPU = 312.7 kJ. If 10M
    users run this app: ANE saves 3,000,000 MJ/year (3,000 GJ) of collective battery energy.'
