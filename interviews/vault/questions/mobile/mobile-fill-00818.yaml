title: Optimizing Encoder-Decoder for On-Device Mobile Deployment on Google Tensor G3
scenario: 'Your team is developing a new on-device AI feature for a flagship mobile phone powered by the
  Google Tensor G3 SoC. This feature requires a sequence-to-sequence model to perform complex natural
  language understanding (NLU). You have initial prototypes built using both a large encoder-decoder transformer
  (e.g., T5-small) and an encoder-only transformer (e.g., BERT-small fine-tuned for classification, followed
  by a smaller, simpler decoder component for sequence generation). The key deployment constraints are:

  1.  **Inference Latency:** Target < 100ms end-to-end latency for critical user interactions.

  2.  **Power Consumption:** Minimize battery drain, as the feature will be frequently used.

  3.  **Memory Footprint:** The model and its activations must fit within an aggressively constrained
  memory budget, considering the Google Tensor G3 has 12 GB LPDDR5X shared with the OS and other apps.

  4.  **TPU Utilization:** Maximize the utilization of the Google Tensor G3''s 7.5 TOPS on-device TPU.


  Design a system architecture, considering the tradeoffs between encoder-only, decoder-only, and full
  encoder-decoder approaches, specifically for the Google Tensor G3. Justify your choice based on the
  given constraints and the Tensor G3''s capabilities.'
details:
  realistic_solution: '1.  **Task Analysis:** Determine if the NLU task strictly requires full generative
    capabilities (encoder-decoder) or if a more constrained approach like classification/extraction (encoder-only)
    paired with a lightweight, potentially rule-based or small generative component, is sufficient.

    2.  **Model Selection & Optimization:** Prioritize smaller, pre-trained models. Explore aggressive
    quantization (e.g., TF Lite INT8 for Tensor G3 TPU) and knowledge distillation from larger teacher
    models to smaller student models. For encoder-decoder, investigate techniques like sparse attention
    or Mixture-of-Experts if the computational budget allows for specific architectural choices.

    3.  **Hardware Mapping:** Leverage the 7.5 TOPS TPU for the most computationally intensive transformer
    blocks. Identify and offload less critical or less parallelizable components (e.g., pre/post-processing,
    simpler decoder elements) to the CPU if TPU is saturated or not optimally utilized.

    4.  **Latency & Power Profiling:** Propose a rigorous methodology to benchmark end-to-end latency
    and power consumption for candidate architectures directly on the Tensor G3, focusing on realistic
    batch size 1 inference scenarios.

    5.  **Memory Management:** Accurately estimate model weights, activations, and intermediate tensor
    sizes for each candidate architecture to ensure they fit within the 12 GB LPDDR5X budget (considering
    OS and other applications). Techniques like dynamic quantization and model pruning are crucial.

    6.  **Justification:** Present a data-driven justification for the chosen architecture, providing
    a holistic evaluation of latency, power, memory footprint, and TPU utilization, demonstrating a deep
    understanding of system costs on the target mobile hardware.'
  common_mistake: Overlooking the significant difference in memory and computational requirements between
    encoder-only and decoder-only or full encoder-decoder architectures, especially the quadratic attention
    complexity in long sequences for decoder-only models. Another common mistake is not accounting for
    the real-world latency impact of data transfer to/from the TPU or the quantization effects on performance,
    assuming ideal throughput.
  napkin_math: '1.  **TPU Operations:** Google Tensor G3 offers 7.5 TOPS (trillion operations per second).
    If a model requires 500 GOPS (giga operations per second) for inference, the *ideal* processing time
    on the TPU is 500 / 7500 = ~67ms (excluding data transfer overhead and CPU components).

    2.  **Memory Footprint:** A model with 300 million parameters stored in FP16 (2 bytes/param) requires
    300M * 2 bytes = 600 MB. Quantizing to INT8 (1 byte/param) reduces this to 300 MB. Activations and
    I/O buffers can add significant overhead, potentially doubling the memory needed. This must fit within
    the 12 GB LPDDR5X budget.

    3.  **Latency Breakdown:** Total Latency ≈ (Input Pre-processing on CPU) + (Data Transfer to TPU)
    + (Model Inference on TPU) + (Data Transfer from TPU) + (Output Post-processing on CPU). A ''fast''
    20ms TPU inference might still result in >100ms end-to-end latency if data transfers and CPU operations
    are inefficient.

    4.  **Power Impact:** Lower FLOPS count, reduced memory bandwidth, and optimized hardware utilization
    (keeping the TPU busy with efficient operations rather than idle) directly translate to lower power
    consumption. INT8 quantization significantly reduces both FLOPS and memory traffic, providing substantial
    power savings.'
