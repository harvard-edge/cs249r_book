title: Tensor G3 CPU vs TPU Decoding Bottlenecks
scenario: You are migrating the Gemini Nano model (3 billion parameters, 8-bit quantization)
  from the CPU to the dedicated on-device TPU on a Google Tensor G3. The Tensor G3
  features a TPU rated at 7.5 TOPS and has 12 GB of LPDDR5X shared memory. While moving
  to the TPU drastically reduced power consumption and accelerated the prompt prefill
  phase, the autoregressive token generation speed only improved marginally over the
  CPU baseline. Explain why the highly efficient TPU does not provide a proportional
  speedup for decoding, and calculate the TPU's theoretical compute limit to demonstrate
  its underutilization.
question: Why the highly efficient TPU does not provide a proportional speedup for
  decoding, and calculate the TPU's theoretical compute limit to demonstrate its underutilization?
details:
  realistic_solution: The lack of proportional speedup occurs because autoregressive
    decoding is inherently memory-bandwidth bound (a matrix-vector operation). Both
    the CPU and the TPU share the same 12 GB LPDDR5X memory system. While the TPU's
    custom architecture and 7.5 TOPS excel at the compute-heavy prefill phase (matrix-matrix
    multiplication), generating a single token requires loading the entire 3GB model
    weights from memory. The TPU's compute units remain mostly idle waiting for data,
    meaning its massive computational advantage over the CPU provides minimal benefit
    for token generation.
  common_mistake: Candidates often assume that because a custom ASIC like a TPU has
    massively higher TOPS than a mobile CPU, it will uniformly accelerate all phases
    of workload execution. They may incorrectly attribute the lack of decoding speedup
    to TPU driver overhead or thermal throttling instead of identifying the fundamental
    memory bandwidth bottleneck.
  napkin_math: '1. Model memory footprint: 3 billion parameters * 1 byte (8-bit) =
    3 GB stored in the 12 GB LPDDR5X memory. 2. Compute required per generated token:
    3 billion parameters * 2 operations (multiply-accumulate) = 6 Giga-operations
    (GOPs). 3. TPU theoretical compute limit: 7.5 TOPS (7500 GOPs) / 6 GOPs per token
    = 1250 theoretical tokens per second. 4. Actual token generation on mobile is
    typically 10-20 tokens/sec. The massive gap between the theoretical 1250 tokens/sec
    and reality proves the system is bottlenecked by the shared LPDDR5X memory bandwidth,
    not the TPU''s 7.5 TOPS capacity.'
