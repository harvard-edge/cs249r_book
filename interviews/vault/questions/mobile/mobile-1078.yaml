title: Tensor G3 CPU vs TPU Decoding Bottlenecks
scenario: You are migrating the Gemini Nano model (3 billion parameters, 8-bit quantization) from the CPU to the on-device TPU (7.5 TOPS, 12 GB LPDDR5X) on a Google Tensor G3. Moving to the TPU accelerated the prompt prefill phase, but autoregressive token generation speed only improved marginally.
question: Why does the highly efficient TPU not provide a proportional speedup for decoding, and what is its theoretical compute limit?
details:
  realistic_solution: |
    Autoregressive decoding is a memory-bandwidth bound matrix-vector operation. Generating a single token requires loading the entire 3GB model weights from shared memory. The TPU's compute units remain mostly idle waiting for data, providing minimal benefit over the CPU for token generation.
  common_mistake: |
    **The Pitfall:** Assuming a custom ASIC with higher TOPS will uniformly accelerate all phases of execution.
    **The Rationale:** Candidates fail to distinguish between the compute-bound prefill phase and the memory-bandwidth bound decoding phase.
    **The Consequence:** They mistakenly attribute the lack of speedup to driver overhead or thermal throttling.
  napkin_math: |
    - Model memory footprint: 3B parameters * 1 byte (8-bit) = 3 GB.
    - Compute required per token: 3B params * 2 ops (MAC) = 6 Giga-operations (GOPs).
    - TPU theoretical compute limit: 7.5 TOPS (7500 GOPs) / 6 GOPs per token = 1250 tokens/sec.
    - **Actual generation is ~10-20 tokens/sec, proving the system is bottlenecked by memory bandwidth, not compute.**
