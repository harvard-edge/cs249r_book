title: Mobile Secure Aggregation Fan-In
scenario: A mobile FL round collects 80,000 encrypted updates. The secure aggregation service can validate 5,000 updates/s per shard. Estimate how many shards are needed to finish validation within 4 seconds.
question: How many secure-aggregation validation shards are needed for 80,000 mobile updates in 4 seconds at 5,000 updates/s per shard?
details:
  realistic_solution: One shard validates 20,000 updates in 4 seconds. To validate 80,000 updates, the service needs 4 shards, plus headroom for stragglers and retries.
  common_mistake: Sizing aggregation from average round count but ignoring validation throughput and deadline.
  napkin_math: Per shard capacity = 5,000 x 4 = 20,000 updates. Shards = 80,000 / 20,000 = 4.
