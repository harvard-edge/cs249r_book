title: Samsung Exynos 2400 NPU Thermal Constraints for Sustained ML Inference
scenario: 'You are designing an ML system for a next-generation mobile device, leveraging a modern NPU. The device needs to run a high-demand, real-time computer vision model that processes a continuous stream of video data. Initial benchmarks show that the model can utilize the NPU at close to its peak TOPS for short bursts. However, after about 60 seconds of sustained operation, the NPU''s performance throttles significantly due to thermal limitations, impacting the model''s inference latency by 30-40%. The target ambient temperature for the device is up to 35°C.'
question: 'How would you handle NPU thermal constraints for sustained ML inference?'
details:
  realistic_solution: 'Implement DVFS policies tuned for the workload and utilize passive cooling hardware improvements. Opt for quantization/pruning to reduce power density. Implement dynamic model switching (dropping to a smaller model when hot) or frame skipping to respect the sustained thermal envelope.'
  common_mistake: |
    **The Pitfall:** Overestimating sustained TOPS and purely focusing on software optimizations without tracking hardware heat limits.
    **The Rationale:** Candidates rely on peak hardware specs for design margins, failing to realize mobile chips throttle aggressively after 30-60 seconds.
    **The Consequence:** Building computer vision applications that crash or grind to a halt in direct sunlight or during prolonged use.
  napkin_math: |
    **Assumptions & Constraints:**
    - Power Consumption: Exynos NPU consumes ~12W at full 34.7 TOPS.
    - Thermal Limit: Passive cooling limits sustained Thermal Design Power (TDP) to ~6W.

    **Calculations:**
    - Sustained performance ratio = 6W / 12W = 50% of peak.

    **Conclusion & Interpretation:**
    - **Result: Thermal-Bound**. Inference must be dynamically scaled or drastically optimized (quantization/pruning) to stay within the 50% sustained thermal budget envelope over prolonged periods.
