title: 'Network Bandwidth Bottlenecks: Recall LPDDR5X Bandwidth and Mobile Memory Hierarchy'
scenario: 'A mobile ML engineer asks: ''What is the memory bandwidth of LPDDR5X on Snapdragon 8 Gen 3,
  how does it compare to LPDDR5 on Tensor G3, and why does this matter for LLM inference?'' Provide the
  exact numbers and the key implication.'
question: "A mobile ML engineer asks: 'What is the memory bandwidth of LPDDR5X on Snapdragon 8 Gen 3, how does it compare to LPDDR5 on Tensor G3, and why does this matter for LLM inference?"
details:
  realistic_solution: 'Snapdragon 8 Gen 3: LPDDR5X-4200, 4×16-bit channels. BW: 4×(4200MT/s × 16bits/8)
    = 4×8.4GB/s = 33.6GB/s? No: LPDDR5X-4200 at 4 channels × 64-bit each (but mobile: typically 2×64-bit):
    2×4200MT/s×8B=67.2GB/s. Official: ~77GB/s. Tensor G3: LPDDR5 at 51.2GB/s. Difference: 77-51.2=25.8GB/s
    (50% more on SD8G3). Implication: 1B INT4 TPOT on SD8G3: 0.5GB/77=6.5ms. On Tensor G3: 0.5GB/51.2=9.8ms.
    1.5× faster decode on Snapdragon.'
  common_mistake: Confusing LPDDR5X bandwidth (77 GB/s on Snapdragon 8 Gen 3) with total memory bandwidth;
    also forgetting that the bandwidth is shared between CPU, GPU, DSP, and all other SoC components.
  napkin_math: 'SD8G3 LPDDR5X: 77GB/s. Tensor G3 LPDDR5: ~51.2GB/s. A17 Pro: ~68GB/s. Ranking: SD8G3 (77)
    > A17 Pro (68) > Tensor G3 (51). 1B INT4 TPOT: SD8G3: 0.5/77=6.5ms. A17 Pro: 0.5/68=7.4ms. Tensor
    G3: 0.5/51.2=9.8ms. For LLM decode, bandwidth IS performance. SD8G3 wins by 1.5× over Tensor G3.'
