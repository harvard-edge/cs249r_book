title: Memory Optimization for 7B LLM Inference on Samsung Exynos 2400 NPU
scenario: "You are deploying a 7 billion parameter (FP16) Large Language Model (LLM) for real-time inference on a Samsung Exynos 2400 NPU, which features 12 GB of LPDDR5X memory and 34.7 TOPS. Initial deployment attempts encounter Out-Of-Memory (OOM) errors, as the model's FP16 weights alone consume 14 GB. You must implement memory-saving strategies to allow the model to fit and run efficiently. The inference pipeline involves tokenizing input sequences of up to 512 tokens and generating output sequences of up to 128 tokens.\n\n1. Given the 12 GB LPDDR5X memory and the 7 billion FP16 parameters (2 bytes/parameter) LLM, what is the minimum *integer* quantization bit-width (e.g., INT8, INT4) required for the model weights to reduce their footprint sufficiently to allow at least 2 GB for activations, KV cache, and other runtime buffers?\n2. Calculate the total memory consumed by the KV cache for a single inference request with a total sequence length of 128. Assume the model has 32 layers, a hidden_size of 4096, and uses FP16. Provide the resulting value in MB."
question: "What is the minimum integer quantization bit-width required for the weights to fit, and what is the KV cache memory for a sequence of 128 tokens?"
details:
  realistic_solution: "Employ a multi-pronged approach:\n\n1. **Weight Quantization**: Quantize model weights to INT8 or INT4 using techniques like Grouped Quantization or AWQ (Activation-aware Weight Quantization) to reduce the model size, while carefully evaluating accuracy degradation.\n\n2. **KV Cache Optimization**: Implement PagedAttention or FlashAttention to efficiently manage KV cache memory, potentially offloading older cache entries to system RAM if latency permits, or employing techniques like token pruning.\n\n3. **Dynamic Tensor Management**: Utilize custom memory allocators or frameworks that minimize memory fragmentation and optimize tensor lifecycle.\n\n4. **Operator Fusion/Kernel Optimization**: Reduce intermediate tensor creation through operator fusion and custom NPU kernels, and ensure efficient data movement between memory tiers."
  common_mistake: "Overlooking the cumulative memory footprint of activations, KV cache, and intermediate tensors, not just model weights. Another common mistake is applying aggressive quantization without evaluating its impact on model accuracy and NPU performance characteristics for different quantization schemes."
  napkin_math: "1. **Weight Quantization Bit-Width Calculation:**\n   - Model size (FP16): 7 * 10^9 parameters * 2 bytes/parameter = 14 GB\n   - Target memory for weights: 12 GB - 2 GB = 10 GB\n   - Maximum bytes per parameter: 10 GB / (7 * 10^9 parameters) ≈ 1.42 bytes/param\n   - INT8 (1 byte/parameter) is the minimum integer bit-width to fit (7GB < 10GB).\n\n2. **KV Cache Memory Calculation:**\n   - Formula: `2 * num_layers * hidden_size * sequence_length * bytes_per_element`\n   - Values: `num_layers = 32`, `hidden_size = 4096`, `sequence_length = 128`, `bytes_per_element = 2` (FP16)\n   - Calculation: `2 * 32 * 4096 * 128 * 2 = 67,108,864 bytes`\n   - Conversion to MB: `67,108,864 / (1024 * 1024) = 64 MB`"
