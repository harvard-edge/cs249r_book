title: Memory Optimization for 7B LLM Inference on Samsung Exynos 2400 NPU
scenario: You are deploying a 7 billion parameter (FP16) Large Language Model (LLM) for real-time inference on a Samsung Exynos 2400 NPU, which features 12 GB of LPDDR5X memory and 34.7 TOPS. Initial deployment attempts encounter Out-Of-Memory (OOM) errors, as the model's FP16 weights alone consume 14 GB. You must implement memory-saving strategies to allow the model to fit and run efficiently. The inference pipeline involves tokenizing input sequences of up to 512 tokens and generating output sequences of up to 128 tokens.
question: What minimum integer quantization bit-width is required to fit the weights, and what is the KV cache size for 128 tokens?
details:
  realistic_solution: "Employ a multi-pronged approach:\n\n1. **Weight Quantization**: Quantize model weights to INT8 or INT4 using techniques like Grouped Quantization or AWQ (Activation-aware Weight Quantization) to reduce the model size, while carefully evaluating accuracy degradation.\n\n2. **KV Cache Optimization**: Implement PagedAttention or FlashAttention to efficiently manage KV cache memory, potentially offloading older cache entries to system RAM if latency permits, or employing techniques like token pruning.\n\n3. **Dynamic Tensor Management**: Utilize custom memory allocators or frameworks that minimize memory fragmentation and optimize tensor lifecycle.\n\n4. **Operator Fusion/Kernel Optimization**: Reduce intermediate tensor creation through operator fusion and custom NPU kernels, and ensure efficient data movement between memory tiers."
  common_mistake: |
    **The Pitfall:** Overlooking the cumulative memory footprint of activations and the KV cache.
    **The Rationale:** Engineers often focus solely on fitting the static model weights into memory.
    **The Consequence:** The model loads but crashes via OOM as soon as generation starts and the KV cache expands.
  napkin_math: |
    1. **Weight Quantization Requirement:** Target memory for weights = 12 GB - 2 GB (for activations/buffers) = 10 GB.
    2. **Max Bytes per Parameter:** 10 GB / 7 billion parameters ≈ 1.42 bytes/parameter.
    3. **Quantization Selection:** INT8 uses 1 byte/parameter (7GB). FP16 uses 2 bytes/parameter (14GB).
    **INT8 is the minimum required bit-width (7GB < 10GB).**
    4. **KV Cache Calculation (Formula):** 2 (K and V) * 32 layers * 4096 hidden size * 128 tokens * 2 bytes/element (FP16).
    5. **KV Cache Size:** 2 * 32 * 4096 * 128 * 2 = 67,108,864 bytes.
    **67,108,864 / (1024 * 1024) = 64 MB.**
