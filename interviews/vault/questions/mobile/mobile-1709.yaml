title: Real-time Mobile ML Data Pipeline Optimization on Exynos 2400 NPU
scenario: You are tasked with deploying a novel real-time computer vision model on a mobile device powered by the Samsung Exynos 2400 NPU (34.7 TOPS, 12 GB LPDDR5X). This model requires processing a continuous 4K (3840x2160) video stream at 60 FPS, where each frame is 3 bytes/pixel (RGB). The preprocessing involves basic image normalization and resizing to 1080p, followed by converting the data to FP16.
question: How would you design a 4K60 Exynos 2400 data pipeline that keeps the NPU fed without dropping frames?
details:
  realistic_solution: A robust solution would involve a multi-stage, asynchronous data pipeline. Initially, optimize sensor data capture by using direct memory access (DMA) where possible to reduce CPU load. For preprocessing, leverage specialized hardware accelerators (e.g., ISP for scaling, dedicated DMA engines for format conversion) or highly optimized NEON/SIMD instructions on the CPU, using a thread pool to parallelize frame processing. Data should be batched and pre-allocated in memory buffers (e.g., using AHardwareBuffer on Android for zero-copy sharing) that are directly accessible by the NPU, minimizing copies. Utilize double or triple buffering to decouple the preprocessing stage from NPU inference. The data pipeline equation (Latency = Processing Time + Transfer Time + Queue Time) must be balanced, ensuring that `Transfer Time + Preprocessing Time <= NPU Inference Time` to avoid NPU starvation. Efficient memory management with minimal dynamic allocations and strategic use of NPU-local memory (if available) would further optimize throughput.
  common_mistake: |
    **The Pitfall:** Focusing solely on the NPU's raw compute (TOPS) while ignoring data movement.
    **The Rationale:** Candidates often underestimate the impact of data transfer rates, memory bandwidth, and CPU overhead for preprocessing on high-resolution video streams.
    **The Consequence:** The resulting design leads to a pipeline where the NPU is frequently stalled awaiting data, causing frame drops despite ample compute capacity.
  napkin_math: |
    1. **Raw Input Bandwidth:** 4K @ 60 FPS (RGB, 3 bytes/pixel) = 3840 * 2160 * 3 * 60 = ~1.49 GB/s.
    2. **Processed Bandwidth:** Resized 1080p (FP16, 2 bytes/pixel) = 1920 * 1080 * 2 * 60 = ~248 MB/s.
    3. **Memory Limits:** LPDDR5X peak bandwidth is ~85 GB/s, easily accommodating the raw rates, but practical limits involve cache and contention.
    4. **Compute Feasibility:** 34.7 TOPS provides ample compute; the bottleneck is strictly the ~248 MB/s data movement.
    5. **Design Goal:** Ensure `Transfer Time + Preprocessing Time <= NPU Inference Time` per frame (**< 16.67 ms**).
