title: Real-time Mobile ML Data Pipeline Optimization on Exynos 2400 NPU
scenario: You are tasked with deploying a novel real-time computer vision model on a mobile device powered by the Samsung Exynos 2400 NPU. This model requires processing a continuous 4K (3840x2160) video stream at 60 FPS, where each frame is 3 bytes/pixel (RGB). The preprocessing involves basic image normalization and resizing to 1080p, followed by converting the data to FP16.
question: How would you design a 4K60 Exynos 2400 data pipeline that keeps the NPU fed without dropping frames?
details:
  realistic_solution: A robust solution involves an asynchronous, zero-copy data pipeline. Initially, optimize sensor data capture by using direct memory access (DMA) to reduce CPU load. For preprocessing, leverage specialized hardware accelerators (e.g., ISP for scaling, dedicated DMA engines for format conversion) or highly optimized NEON/SIMD instructions, using a thread pool. Data should be batched and pre-allocated in memory buffers (e.g., AHardwareBuffer) directly accessible by the NPU, minimizing copies. Utilize double or triple buffering to decouple preprocessing from inference. The critical path equation dictates `Transfer Time + Preprocessing Time <= NPU Inference Time`.
  common_mistake: |
    **The Pitfall:** Focusing solely on the NPU's raw compute (TOPS) while ignoring data movement overhead.
    **The Rationale:** Candidates underestimate the impact of data transfer rates, LPDDR5X memory bandwidth limits, and CPU overhead for preprocessing high-resolution video streams.
    **The Consequence:** The resulting design leads to a pipeline where the NPU is frequently stalled awaiting data, causing frame drops despite ample compute capacity.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 4K @ 60 FPS (RGB, 3 bytes/pixel).
       - Resized 1080p (FP16, 2 bytes/pixel).
       - NPU compute is ample; data movement is the constraint.
    2. **Calculations:**
       - Raw Input Bandwidth: 3840 * 2160 * 3 * 60 = ~1.49 GB/s.
       - Processed Bandwidth: 1920 * 1080 * 2 * 60 = ~248 MB/s.
       - Frame Budget: 1000 ms / 60 FPS = 16.67 ms/frame.
    3. **Conclusion & Interpretation:**
       - Ensure Transfer + Preprocessing <= Inference Time.
       - **Result: Memory-Bandwidth Bound (< 16.67 ms)**.
