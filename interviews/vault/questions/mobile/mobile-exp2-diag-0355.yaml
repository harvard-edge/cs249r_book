title: Diagnosing OOM Evictions on Shared Memory Exynos 2400
scenario: Your team is deploying a real-time video enhancement model on a device powered by the Samsung
  Exynos 2400. The device features a dual-core NPU capable of 34.7 TOPS and uses a shared 12 GB LPDDR5X
  memory pool accessed by the CPU, GPU, ISP, and NPU. While your model weights only consume 2.5 GB, the
  application frequently crashes due to OS-level OOM evictions during continuous camera use. Identify
  the root cause of these sudden evictions considering the system's hardware architecture.
question: "What would you identify as the root cause of these sudden evictions considering the system's hardware architecture?"
details:
  realistic_solution: The root cause is severe memory fragmentation within the shared 12 GB LPDDR5X pool
    caused by contention with the ISP and GPU. Because the ISP and GPU rapidly allocate and deallocate
    large buffers for high-resolution camera frames, the physical memory becomes heavily fragmented over
    a few minutes of use. When the NPU attempts to allocate a large, contiguous block of memory for an
    activation tensor to maintain its high throughput, the allocation fails despite sufficient total free
    memory, triggering the OS to evict the application.
  common_mistake: Candidates often incorrectly assume the OOM is caused by a standard memory leak in the
    ML application or an unexpected spike in NPU activation memory. They typically suggest reducing the
    batch size or applying heavier quantization without recognizing the system-level resource contention
    at play.
  napkin_math: 'Total shared memory: 12.0 GB. Base OS footprint + Background Apps: ~4.5 GB. Model Weights:
    2.5 GB. Subtotal usage: 7.0 GB, leaving 5.0 GB free. A single uncompressed 4K video frame (3840x2160x4
    bytes) is ~33.2 MB. The ISP utilizes a 15-frame ring buffer (~498 MB) and the GPU uses a triple buffer
    (~100 MB). Total usage is ~7.6 GB, leaving ~4.4 GB technically free. However, the continuous cycling
    of these 33.2 MB blocks fragments the heap. If the NPU needs a contiguous 128 MB buffer for a specific
    layer''s activation tensor to utilize its 34.7 TOPS capacity, the fragmented 4.4 GB space cannot accommodate
    the contiguous request, leading to an OOM.'
