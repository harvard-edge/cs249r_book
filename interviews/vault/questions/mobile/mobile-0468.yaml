title: The Disappearing Cyclist
scenario: You are a Mobile ML Engineer optimizing a pedestrian detection model for a smart dashcam app. To reduce latency and power-drain on an Apple A17 Pro SoC, you convert the model from FP16 to INT8 using post-training quantization (PTQ). After deployment, you receive critical bug reports that the app fails to detect cyclists, but only at night. Your offline tests confirm a >50% drop in recall for the `cyclist` class, specifically when headlights are present. Other classes are unaffected. You analyze the activation values of a key convolutional layer and find that for these problematic night-time images, a small number of activation values are dramatically higher than the typical range observed in your daytime-heavy calibration set.
question: Why does INT8 PTQ make an A17 Pro dashcam miss cyclists at night when headlights create activation outliers?
details:
  realistic_solution: The root cause is a quantization-calibration mismatch leading to activation clipping (overflow). The post-training quantization process determines the scaling factor from FP16 to INT8 based on the dynamic range of activations seen in the calibration dataset. Because your calibration set was missing high-contrast night images, the bright headlights of oncoming cars create activation values far outside this calibrated range. These outliers are 'clipped' or 'clamped' to the maximum INT8 value (127). This massive loss of information completely destroys the features the model needs to identify the cyclist. The correct fix is not to abandon INT8, but to create a more representative calibration dataset that includes these high-dynamic-range night-time scenes and then re-quantize the model.
  common_mistake: |
    **The Pitfall:** Blaming the hardware or the precision format itself, or assuming a full model retrain is necessary.
    **The Rationale:** Engineers fail to realize that the calibration dataset is the most frequent point of failure in real-world PTQ.
    **The Consequence:** Wasting resources on expensive retraining or abandoning INT8 entirely when a simple recalibration would suffice.
  napkin_math: |
    - **Calibration Range:** Observed activations in `[-20.0, 20.0]`.
    - **INT8 Scale:** `20.0 / 127 ≈ 0.157`.
    - **Normal Activation:** A value of `15.0` quantizes to `round(15.0 / 0.157) = 96`.
    - **Outlier Activation:** A headlight causes a value of `50.0`.
    - **Quantized Outlier:** `round(50.0 / 0.157) = 318`, which hard-clips to the INT8 max of `127`.
    - **De-quantized Error:** Back in FP16, `127 × 0.157 ≈ 20.0` (not the original 50.0).
    - **Conclusion:** This massive >60% error entirely destroys the feature signal needed to detect the cyclist.
  options:
  - The original FP16 model was overfit and must be retrained with more night-time data before quantization can be attempted.
  - The Apple A17 NPU has a hardware bug in its INT8 convolution kernels that is triggered by high-frequency image features.
  - The calibration dataset was not representative, causing activation clipping (overflow) for the night-time cyclist images.
  - The model's architecture is inherently unstable for quantization, and INT8 precision is insufficient for this computer vision task.
  correct_index: 2
