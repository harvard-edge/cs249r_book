title: On-Device KV Cache Memory Budget for LLM on Tensor G3
scenario: 'Google Pixel 8 (Tensor G3, 7.5 TOPS NPU, 12GB LPDDR5) runs an on-device LLM assistant (2B parameters,
  INT4) with 4096 context. KV cache: 28 layers, 16 KV heads, head_dim=256, FP16. A user conversation reaches
  3000 tokens. Calculate KV cache size and assess memory pressure.'
question: "What KV-cache memory does a Tensor G3 2B INT4 LLM use at 3000 tokens with 28 layers, 16 KV heads, and FP16 cache?"
details:
  realistic_solution: 'KV cache at 3000 tokens: 2 (K+V) × 28 layers × 16 heads × 256 head_dim × 3000 tokens
    × 2B (FP16) = 2×28×16×256×3000×2 = 2×28×16×256×6000B = 2×28×24.6MB = 2×690MB = 1.38GB. Model weights:
    2B INT4 = 1GB. Total: 2.38GB. System reserve: ~3GB (Android OS, camera, apps). Available for ML: 12-3
    = 9GB. Current usage: 2.38GB — comfortable. At 4096 context (max): KV = 1.88GB. Total: 2.88GB — still
    fine. Risk: if running multiple on-device models simultaneously or with large batch.'
  common_mistake: Using INT4 quantization for the KV cache when most on-device runtimes store KV in FP16
    or INT8; KV cache quantization is a separate decision from weight quantization.
  napkin_math: 'KV per token: 2×28×16×256×2B = 458,752B ≈ 448KB/token. At 3000 tokens: 458,752 × 3000
    / 1e9 ≈ 1.376GB. Weights: 1GB. Total: 2.35GB / 9GB available = 26% memory utilization. Comfortable.
    At max 4096 tokens: 2.85GB = 32% — still fine.'
