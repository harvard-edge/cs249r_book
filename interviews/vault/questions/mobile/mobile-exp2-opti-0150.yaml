title: Dual-Core NPU Operator Scheduling for Memory Contention Mitigation
scenario: A real-time vision model is deployed on a Samsung Exynos 2400 NPU, which features 34.7 TOPS
  across a dual-core architecture and shares 12 GB of LPDDR5X memory with the CPU, GPU, and ISP. During
  concurrent execution with a heavy ISP workload, the vision model experiences severe memory thrashing,
  dropping NPU compute utilization to just 30%. You need to analyze the execution graph to determine which
  operators should be scheduled sequentially versus parallelized to minimize peak memory footprint while
  recovering NPU throughput.
details:
  realistic_solution: Analyze the execution graph to classify operators by their arithmetic intensity.
    Schedule compute-bound operators in parallel across the dual cores to leverage the 34.7 TOPS capacity.
    Conversely, serialize the execution of memory-bound operators to constrain the peak bandwidth requirement
    and working set size, ensuring the ISP retains sufficient bandwidth. Apply layer fusion to intermediate
    operators to avoid materializing tensors to the shared memory.
  common_mistake: Candidates often suggest aggressively parallelizing all independent network branches
    across the dual-core NPU to maximize TOPS. They fail to account for the shared memory contention with
    the ISP, where parallel execution of memory-bound operators creates bandwidth bottlenecks in the LPDDR5X
    subsystem.
  napkin_math: If two parallel memory-bound branches each require 4 GB/s of bandwidth, executing them
    concurrently demands 8 GB/s from the LPDDR5X, heavily contending with an ISP needing 6 GB/s. By scheduling
    them sequentially, the NPU bandwidth requirement drops to 4 GB/s, easily coexisting with the ISP.
    Achieving 20 TOPS requires ~58% of the available 34.7 TOPS, which is sustainable when memory bottlenecks
    are removed.
