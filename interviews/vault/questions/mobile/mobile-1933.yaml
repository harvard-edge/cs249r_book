title: Evaluate shared memory bandwidth contention during mobile task overlap
scenario: On an Apple A17 Pro, an AR app renders graphics while the NPU runs pose
  estimation. They share system memory. The NPU requires 50 GB/s bandwidth, the GPU
  requires 30 GB/s, and max SoC bandwidth is 60 GB/s.
question: Evaluate how perfectly overlapping the NPU and GPU workloads will affect
  the AR frame latency.
details:
  realistic_solution: Perfect overlap means the NPU and GPU execute concurrently,
    demanding 80 GB/s total memory bandwidth. Since the SoC is limited to 60 GB/s,
    severe memory contention will stall both processors. Instead of hiding latency,
    the overlap makes the pipeline heavily memory-bound, degrading latency for both
    the rendering and AI tasks.
  common_mistake: Assuming that overlapping compute on independent cores always yields
    linear speedups without verifying the shared memory bandwidth constraint.
  napkin_math: 50 GB/s + 30 GB/s = 80 GB/s > 60 GB/s shared limit
