title: Hardware Safety Mechanism Recall
scenario: You are deploying an on-device driver monitoring model on a smartphone equipped
  with a Samsung Exynos 2400 NPU. The system leverages the dual-core NPU capable of
  34.7 TOPS and shares 12 GB LPDDR5X memory with the CPU, GPU, and ISP. Because the
  application is safety-critical, the system architecture includes a specific hardware
  timer that must be periodically reset by the software; if the software hangs and
  fails to reset it, the timer triggers a system reset. What is the standard industry
  term for this hardware safety mechanism?
question: What is the standard industry term for this hardware safety mechanism?
details:
  realistic_solution: The correct term is a 'watchdog timer' (WDT). In safety-critical
    mobile deployments on platforms like the Exynos 2400, a hardware watchdog timer
    ensures that if the dual-core NPU experiences a hard fault or infinite loop during
    inference, the system can autonomously recover by resetting the stalled component.
  common_mistake: Candidates often confuse hardware safety mechanisms with software-level
    exception handling or error-correcting code (ECC) memory. They might suggest using
    a software heartbeat monitor or a try-catch block, which are insufficient if the
    entire NPU or OS hangs.
  napkin_math: If the watchdog timer is configured to require a reset every 50 milliseconds
    (0.05 seconds), and the NPU runs at its peak 34.7 TOPS, the NPU performs 34.7
    * 10^12 * 0.05 = 1.735 * 10^12 operations (1.735 tera-operations) between watchdog
    resets. This calculation gives an upper bound on the maximum inference workload
    that can be processed before the software must verify its state and kick the watchdog.
