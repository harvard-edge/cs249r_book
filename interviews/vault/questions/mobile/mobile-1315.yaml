title: On-Device Equal Opportunity Evaluation Performance
scenario: You are tasked with evaluating the Equal Opportunity fairness metric for
  a vision model directly on user devices to preserve privacy. The evaluation processes
  a local benchmark dataset of 14,000 images, which easily fits within the Apple A17
  Pro's shared 8 GB unified memory. The model requires 100 GOPS per inference and
  runs on the 16-core Neural Engine, which delivers 35 TOPS and consumes approximately
  5W. Recall the formula for Equal Opportunity and calculate the theoretical time
  and energy required to complete this local fairness audit.
question: What Equal Opportunity metric, compute time, and energy are required for
  an A17 Pro local fairness audit?
details:
  realistic_solution: Equal Opportunity requires that the True Positive Rate (TPR)
    is identical across different protected subgroups. To measure this on-device without
    offloading sensitive demographic or biometric data, we must run the model across
    the local benchmark dataset. Given the A17 Pro Neural Engine's high throughput,
    the evaluation is extremely fast and consumes minimal energy, making local fairness
    auditing highly feasible before trusting a newly downloaded model update.
  common_mistake: Candidates often forget the exact definition of Equal Opportunity,
    confusing it with Demographic Parity, and fail to recall that it specifically
    requires equal True Positive Rates (TPR). Additionally, they may miscalculate
    the TOPS to GOPS conversion or forget how to combine time and power to calculate
    total energy in Joules.
  napkin_math: '1. Equal Opportunity Formula: TPR_groupA = TPR_groupB, where TPR =
    True Positives / (True Positives + False Negatives).

    2. Compute throughput: The A17 Pro Neural Engine provides 35 TOPS, which equals
    35,000 GOPS. At 100 GOPS per inference, throughput is 35,000 / 100 = 350 inferences
    per second.

    3. Compute time: Processing the 14,000-image fairness dataset takes 14,000 / 350
    = 40 seconds.

    4. Compute energy: Running the Neural Engine at ~5W for 40 seconds consumes 5
    Watts * 40 seconds = 200 Joules of energy.'
