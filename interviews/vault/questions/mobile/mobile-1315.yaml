title: On-Device Equal Opportunity Evaluation Performance
scenario: You are tasked with evaluating the Equal Opportunity fairness metric for a vision model directly on user devices to preserve privacy. The evaluation processes a local benchmark dataset of 14,000 images, which easily fits within the Apple A17 Pro's shared 8 GB unified memory. The model requires 100 GOPS per inference and runs on the 16-core Neural Engine, which delivers 35 TOPS and consumes approximately 5W.
question: What is the required compute time and energy to run a 14,000-image Equal Opportunity fairness audit on the A17 Pro?
details:
  realistic_solution: Equal Opportunity requires that the True Positive Rate (TPR) is identical across different protected subgroups. To measure this on-device without offloading sensitive demographic or biometric data, we must run the model across the local benchmark dataset. Given the A17 Pro Neural Engine's high throughput, the evaluation is extremely fast and consumes minimal energy, making local fairness auditing highly feasible before trusting a newly downloaded model update.
  common_mistake: |
    **The Pitfall:** Confusing Equal Opportunity with Demographic Parity and miscalculating TOPS-to-GOPS conversions.
    **The Rationale:** Candidates often forget that Equal Opportunity specifically targets equal True Positive Rates (TPR), and fumble the zeros when converting Tera-ops to Giga-ops.
    **The Consequence:** Implementing the wrong fairness metric entirely, or drastically over/underestimating the battery impact of the on-device audit.
  napkin_math: |
    1. **Throughput:** 35 TOPS = 35,000 GOPS. 35,000 GOPS / 100 GOPS per inference = 350 inferences per second.
    2. **Compute Time:** 14,000 images / 350 inf/sec = 40 seconds.
    3. **Compute Energy:** 5 Watts * 40 seconds = **200 Joules**.
