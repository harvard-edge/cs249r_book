title: Hardware-Aware NAS Design for A17 Pro Neural Engine
scenario: You are tasked with designing a hardware-aware Neural Architecture Search (NAS) pipeline for a real-time video super-resolution model targeting the Apple A17 Pro. The platform features a 16-core Neural Engine capable of 35 TOPS within a ~5W power envelope, sharing 8 GB of unified memory.
question: How should hardware-aware NAS target A17 Pro video super-resolution while respecting 60 FPS and memory-bandwidth limits?
details:
  realistic_solution: A strong design involves defining an ANE-optimized supernet restricted to operations natively accelerated by Core ML. The architecture must incorporate a hardware-in-the-loop (HWIL) latency measurement or an on-device empirical lookup table to guide the search. The reward function should evaluate the Pareto frontier of model accuracy against the ~5W thermal constraints and the strict 16ms inference budget.
  common_mistake: |
    **The Pitfall:** Designing a search space focusing solely on FLOPs or parameter counts.
    **The Rationale:** Relying on proxy latency predictors that fail to capture the high cost of memory stalls.
    **The Consequence:** NAS discovers models that theoretically perform well but fail to hit real-time targets on actual hardware.
  napkin_math: |
    1. 60fps latency budget: 1000ms / 60 = 16.6ms.
    2. A17 Pro ANE peak capacity: 35 TOPS * 0.0166s = 581 GOPS per frame.
    3. **Realistic Utilization:** Assuming 30% utilization due to memory limits, the search space must strictly constrain models to **< 174 GOPS per frame**.
