title: Snapdragon 8 Gen 3 Hexagon NPU Memory Architecture
scenario: A generative AI app on Snapdragon 8 Gen 3 shows 40ms latency for a 1B parameter model decode step.
question: How would you profile the memory hierarchy to explain the 40ms decode latency for a 1B model?
details:
  realistic_solution: '1B model FP16 = 2 GB. Each decode step reads all weights once: 2 GB / (LPDDR5X BW available to Hexagon). Snapdragon 8 Gen 3 LPDDR5X: ~77 GB/s total, Hexagon allocation ~20-30 GB/s in mixed-use scenario. 2 GB / 25 GB/s = 80ms just for weight loading — exceeding observed 40ms, suggesting INT4 quantization is being used (0.5 GB / 25 GB/s = 20ms weight load + ~20ms compute = ~40ms).'
  common_mistake: |
    **The Pitfall:** Blaming the NPU compute throughput.
    **The Rationale:** Candidates assume computation limits speed rather than the shared LPDDR5X bandwidth on the SoC.
    **The Consequence:** Proposing compute optimizations that fail to address the actual memory bottleneck.
  napkin_math: |
    *   **Model Size:** 1B INT4 = 0.5 GB.
    *   **Memory Bandwidth (NPU allocation):** ~25 GB/s.
    *   **Weight Read Time:** 0.5 GB / 25 GB/s = **20 ms**.
    *   **Compute Time:** 1B params * 2 MACs/param / 45 TOPS = ~0.04 ms (negligible).
    *   **Total Latency:** 20 ms memory + ~20 ms overhead = **~40 ms**.
