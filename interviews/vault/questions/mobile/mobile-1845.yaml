title: 'Snapdragon 8 Gen 3 Hexagon NPU Memory Architecture'
scenario: 'A generative AI app on Snapdragon 8 Gen 3 shows 40ms latency for a 1B parameter model decode step.'
question: 'How would you profile the memory hierarchy to explain the 40ms decode latency for a 1B model?'
details:
  realistic_solution: 'Utilize nsys profiling to trace memory bandwidth allocation. A 1B model in FP16 is 2 GB. Each decode step reads all weights once. Snapdragon 8 Gen 3 LPDDR5X provides ~77 GB/s total, with Hexagon allocation at ~25 GB/s in mixed-use scenarios. 2 GB / 25 GB/s = 80ms just for weight loading, which exceeds the observed 40ms. This suggests INT4 Post-Training Quantization (PTQ) is actively being used (0.5 GB / 25 GB/s = 20ms weight load + ~20ms compute overhead = ~40ms).'
  common_mistake: |
    **The Pitfall:** Blaming the NPU compute throughput.
    **The Rationale:** Candidates assume computation limits speed rather than the shared LPDDR5X bandwidth on the SoC.
    **The Consequence:** Proposing compute optimizations that fail to address the actual memory bottleneck.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model Size: 1B INT4 = 0.5 GB.
    - Memory Bandwidth (NPU allocation): ~25 GB/s.
    - Peak NPU Compute: 45 TOPS.

    **Calculations:**
    - Weight Read Time: 0.5 GB / 25 GB/s = 20 ms.
    - Compute Time: 1B params * 2 MACs/param / 45 TOPS = ~0.04 ms.
    - Total Latency: 20 ms memory + ~20 ms overhead = ~40 ms.

    **Conclusion & Interpretation:**
    - **Result: 40 ms (Memory-Bound)**. The latency is dominated by INT4 weight loading and system overhead, not compute throughput.
