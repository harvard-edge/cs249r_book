title: The Federated Learning Cost Baseline
scenario: You are a Staff ML Engineer evaluating a switch from centralized training
  to Federated Learning (FL) for a mobile keyboard's next-word prediction model. The
  primary motivation for FL is user privacy, but a total cost of ownership (TCO) analysis
  is required before committing to an A/B test.
question: What daily centralized data ingress cost comes from 10M keyboard users uploading
  50 KB each at $0.05 per GB?
details:
  realistic_solution: The correct approach is to first calculate the total data volume
    generated by the entire user fleet per day, then convert that total volume into
    the correct billing unit (Gigabytes), and finally multiply by the cost per unit.
    This establishes the daily financial baseline that a new FL system must be compared
    against.
  common_mistake: The most common mistake is a unit conversion error. Engineers under
    pressure often confuse the billing unit (Gigabytes) with the data unit provided
    (Kilobytes), leading to a cost estimate that is off by a factor of 1,000 or 1,000,000.
    For example, they might calculate the cost as if it were per Megabyte or even
    per Kilobyte, dramatically overstating the expense.
  napkin_math: "1. **Calculate Total Daily Data Volume:**\n   - Each user generates\
    \ ~50 KB of typing data per day.\n   - Total = 10,000,000 users × 50 KB = 500,000,000\
    \ KB\n2. **Convert to Gigabytes:**\n   - 500,000,000 KB ÷ 1,000,000 = 500 GB/day\n\
    3. **Calculate Daily Ingress Cost:**\n   - Cost = 500 GB × $0.05/GB = **$25.00/day**\n\
    4. **Monthly baseline cost:**\n   - $25.00/day × 30 days = **$750/month**\n\n\
    This establishes the centralized data ingress baseline. Any federated learning\
    \ alternative must be compared against this $750/month figure when evaluating\
    \ total cost of ownership."
  options:
  - $25,000.00 per day
  - $2,500.00 per day
  - $25.00 per day
  - $50,000.00 per day
  correct_index: 2
