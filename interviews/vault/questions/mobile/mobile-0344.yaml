title: The Federated Learning Cost Baseline
scenario: You are evaluating a switch from centralized training to Federated Learning (FL) for a mobile keyboard's next-word prediction model. A total cost of ownership (TCO) analysis is required before committing to an A/B test.
question: What daily centralized data ingress cost comes from 10M keyboard users uploading 50 KB each at $0.05 per GB?
details:
  realistic_solution: Calculate the total data volume generated by the entire user fleet per day, then convert that total volume into Gigabytes, and multiply by the cost per unit to establish the financial baseline.
  common_mistake: |
    **The Pitfall:** Massive unit conversion errors.
    **The Rationale:** Engineers under pressure frequently confuse the billing unit (Gigabytes) with the payload data unit provided (Kilobytes).
    **The Consequence:** Cost estimates that are off by a factor of 1,000 or 1,000,000, dramatically misstating the expense and invalidating the TCO.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Total Users: 10,000,000.
       - Upload per user: 50 KB.
       - Cost per GB: $0.05.
    2. **Calculations:**
       - Total Daily Volume: 10,000,000 * 50 KB = 500,000,000 KB.
       - Convert to GB: 500,000,000 KB / 1,000,000 = 500 GB/day.
       - Total Daily Cost: 500 GB * $0.05/GB = $25.00/day.
    3. **Conclusion & Interpretation:**
       - **Result: Network-Cost-Bound**. The baseline network ingress cost is a mere $25.00/day, forcing Federated Learning to heavily justify its massive complexity overhead against a trivial centralized cost.
  options:
  - '$25,000.00 per day (Trap: Multiplied KB directly instead of GB)'
  - '$2,500.00 per day (Trap: Math error in zero padding)'
  - $25.00 per day
  - '$50,000.00 per day (Trap: Arbitrary magnitude error)'
