title: Analyzing Thermal and Power Impacts of Mobile Batching
scenario: An iOS photo app batches 100 images, powers up the Neural Engine at 35 TOPS for 2 seconds, then sleeps for 58 seconds.
question: How does duty-cycling 100 images over 2 seconds impact the thermal envelope compared to continuously processing 1.6 images per second?
details:
  realistic_solution: The batched approach heavily loads the NPU for 2 seconds, which
    might spike local die temperatures but allows the SoC to enter a deep sleep state
    for 58 seconds, saving total battery. Continuous processing prevents the SoC from
    sleeping, resulting in higher average power draw despite lower peak temperatures.
  common_mistake: |
    **The Pitfall:** Assuming constant low-fps inference is more power-efficient.
    **The Rationale:** Failing to account for the high static power draw of keeping the SoC awake for continuous processing.
    **The Consequence:** Draining the device battery significantly faster because the processor is never allowed to enter deep sleep states.
  napkin_math: |
    - **Batched Active Time:** 2 seconds per minute.
    - **Sleep Time:** 58 seconds per minute.
    - **Idle Percentage:** 58 / 60 = 96.6%.
    - **Result:** The SoC achieves **96.6% idle time**, dropping average power significantly despite a 2-second thermal spike.
