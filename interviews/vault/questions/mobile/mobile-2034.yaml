title: Analyzing Thermal and Power Impacts of Mobile Batching
scenario: An iOS photo app clusters faces. It batches 100 images, powers up the A17
  Pro Neural Engine to process them at 35 TOPS for 2 seconds, then sleeps for 58 seconds.
question: Analyze the impact of this duty-cycling strategy on the device's thermal
  envelope compared to continuously processing 1.6 images per second.
details:
  realistic_solution: The batched approach heavily loads the NPU for 2 seconds, which
    might spike local die temperatures but allows the SoC to enter a deep sleep state
    for 58 seconds, saving total battery. Continuous processing prevents the SoC from
    sleeping, resulting in higher average power draw despite lower peak temperatures.
  common_mistake: Assuming constant low-fps inference is more power-efficient than
    'race-to-sleep'.
  napkin_math: Sleep 58/60s = 96.6% idle time vs 0% idle time
