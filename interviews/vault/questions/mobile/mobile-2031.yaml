title: Evaluating Memory Bandwidth in Mobile INT8 Quantization
scenario: A team wants to deploy a 2B parameter language model on a Snapdragon SoC. They are choosing between FP16 and INT8 weights. The GPU concurrently runs display composition that consumes ~6 GB/s of LPDDR5 bandwidth, contending with the LLM's weight-streaming reads.
question: Evaluate the per-token decode latency under FP16 vs INT8 weights, accounting for a 50 GB/s shared LPDDR5 bus. Identify whether INT8 fully recovers the 2x throughput it provides on a contention-free bus.
details:
  realistic_solution: 'Footprints: FP16 = 4 GB, INT8 = 2 GB. Effective LPDDR5 BW after 6 GB/s GPU contention = 44 GB/s. FP16 per-token: 4 GB / 44 GB/s = 91 ms/token -> 11 tok/s. INT8 per-token: 2 / 44 = 45 ms/token -> 22 tok/s. INT8 still doubles throughput because the bandwidth bound is linear in bytes-per-token. However, if GPU contention rises to 25 GB/s (heavy gaming), effective LLM BW drops to 25 GB/s; FP16 = 6.25 tok/s, INT8 = 12.5 tok/s - both halved, INT8 still 2x but now both barely usable.'
  common_mistake: |
    **The Pitfall:** Reporting only the contention-free 2x speedup.
    **The Rationale:** Candidates miss that the absolute throughput depends on the available bandwidth after contention with the display path.
    **The Consequence:** Inaccurate latency estimates that fail to reflect real-world performance under heavy contention.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Total Bandwidth: 50 GB/s.
       - GPU Contention: 6 GB/s.
       - 2B Parameter Model (FP16 vs INT8).
    2. **Calculations:**
       - Effective Bandwidth = 50 GB/s - 6 GB/s = 44 GB/s.
       - FP16 size = 4 GB. Throughput = 44 GB/s / 4 GB/token = 11 tok/s.
       - INT8 size = 2 GB. Throughput = 44 GB/s / 2 GB/token = 22 tok/s.
       - High contention scenario (25 GB/s available): FP16 = 6.25 tok/s, INT8 = 12.5 tok/s.
    3. **Conclusion & Interpretation:**
       **Result: INT8 maintains exact 2x throughput to 22 tok/s (Memory Bandwidth-Bound).**
