title: Evaluating Memory Bandwidth in Mobile INT8 Quantization
scenario: A team wants to deploy a 2B parameter language model on a Snapdragon 8 Gen
  3. They are choosing between FP16 and INT8 quantization for the weights.
question: Evaluate the memory footprint and peak bandwidth utilization differences
  between FP16 and INT8 weight-only quantization for this model.
details:
  realistic_solution: In FP16, 2B parameters require 4 GB of memory; in INT8, they
    require 2 GB. Given the memory bandwidth constraints of mobile devices during
    auto-regressive generation (batch size 1), halving the weights transferred per
    token doubles the maximum theoretical token generation rate.
  common_mistake: Assuming the NPU TOPS limit the generation speed rather than the
    memory bandwidth constraint of the SoC.
  napkin_math: 2B * 2 bytes = 4 GB vs 2B * 1 byte = 2 GB
