title: Evaluating Memory Bandwidth in Mobile INT8 Quantization
scenario: A team wants to deploy a 2B parameter language model on a Snapdragon 8 Gen
  3. They are choosing between FP16 and INT8 weights. The GPU concurrently runs display
  composition that consumes ~6 GB/s of LPDDR5 bandwidth, contending with the LLM's
  weight-streaming reads. Total LPDDR5 bandwidth on this SoC is ~50 GB/s.
question: Evaluate the per-token decode latency under FP16 vs INT8 weights, accounting
  for the 6 GB/s GPU contention on the shared LPDDR5 bus. Identify whether INT8 fully
  recovers the 2x throughput it provides on a contention-free bus.
details:
  realistic_solution: 'Footprints: FP16 = 4 GB, INT8 = 2 GB. Effective LPDDR5 BW after
    6 GB/s GPU contention = 44 GB/s. FP16 per-token: 4 GB / 44 GB/s = 91 ms/token
    -> 11 tok/s. INT8 per-token: 2 / 44 = 45 ms/token -> 22 tok/s. INT8 still doubles
    throughput because the bandwidth bound is linear in bytes-per-token. However,
    if GPU contention rises to 25 GB/s (heavy gaming), effective LLM BW drops to 25
    GB/s; FP16 = 6.25 tok/s, INT8 = 12.5 tok/s - both halved, INT8 still 2x but now
    both barely usable.'
  common_mistake: Reporting only the contention-free 2x speedup and missing that the
    absolute throughput depends on the available BW after contention with the display
    path.
  napkin_math: 'Effective BW = 50 - 6 = 44 GB/s; FP16 = 11 tok/s; INT8 = 22 tok/s.
    Heavy contention (25 GB/s LLM): FP16 = 6.25, INT8 = 12.5 tok/s.'
