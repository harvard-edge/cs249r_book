title: 'The On-Device Fine-Tuning Corruption: 3D Parallelism'
scenario: Your language learning app fine-tunes an on-device pronunciation model to each user's accent. The base model scores 88% accuracy. After 2 weeks of personalization on a Pixel 8 Pro (Tensor G3, 12 GB RAM), most users improve to 93%. But 5% of users report the model 'gets worse over time' — accuracy drops to 60% and the app starts accepting clearly wrong pronunciations. Resetting to the base model fixes it.
question: Why does Pixel 8 Pro on-device pronunciation personalization corrupt 5% of models after two weeks?
details:
  realistic_solution: 'The corruption is caused by catastrophic forgetting amplified by non-IID training data and interrupted training. The 5% of affected users share a pattern: they provide highly repetitive training examples (e.g., only correct pronunciations of 3-4 words), creating an extremely non-IID local distribution. After 50+ fine-tuning steps on this narrow data, the model weights drift to overfit the repeated patterns, destroying features for dissimilar phonemes. Compounding this, mobile training is frequently interrupted (app backgrounded, phone call), leaving optimizer state corrupted. Fix with Elastic Weight Consolidation (EWC): compute Fisher information matrix on base model (20 MB storage, 0.1 ms overhead per batch on Tensor G3). EWC penalizes changes to important weights, reducing corruption rate from 5% to <0.5%. Add atomic checkpointing: write 40 MB checkpoint only after full step completes (40 MB / 1.5 GB/s UFS 3.1 = 27 ms). Keep current + previous checkpoint (80 MB total). On corruption detection (accuracy drops >10% on validation), roll back automatically.'
  common_mistake: |
    **The Pitfall:** Blaming user data for systemic forgetting.
    **The Rationale:** Candidates assume the 5% of users are providing bad training data, given 95% of users improve.
    **The Consequence:** They ignore the catastrophic forgetting caused by highly non-IID local data and interrupted on-device optimizer states, leaving the systemic bug unfixed.
  napkin_math: |
    - EWC Fisher matrix storage overhead: 20 MB (matches the base model size).
    - EWC Compute overhead per batch: ~0.1 ms on Tensor G3 (<1% training time increase).
    - Checkpoint writes: 40 MB at 1.5 GB/s UFS 3.1 = 27 ms.
    - **Total overhead is negligible** but completely prevents the 28% accuracy drop.
