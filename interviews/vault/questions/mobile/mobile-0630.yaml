title: The Speculative Pruning Paradox
scenario: Your team is tasked with deploying a 3-billion parameter generative language model on a flagship mobile phone (like one with a Snapdragon 8 Gen 3 SoC). The goal is interactive, real-time generation. The initial FP16 model is too slow, taking over 50ms per token.
question: Why does combining unstructured pruning with speculative decoding make the mobile LLM worse than speculative decoding alone?
details:
  realistic_solution: 'The core failure is a negative feedback loop between the two optimizations. Speculative decoding''s speedup is entirely dependent on the *acceptance rate* of the draft model''s tokens. By applying 50% unstructured pruning to the main ''verifier'' model, the team severely damaged its accuracy and changed its internal representations.'
  common_mistake: |
    **The Pitfall:** Focusing only on the theoretical benefit of each optimization in isolation.
    **The Rationale:** Candidates blame the draft model for being 'too dumb' or state pruning doesn't speed up mobile NPUs, ignoring the interaction between the two.
    **The Consequence:** Missing the systemic failure where the pruned model's degraded accuracy destroys the acceptance rate required by speculative decoding.
  napkin_math: |
    **Assumptions & Constraints:**
    - Baseline: 3B model at FP16, latency 50 ms/token.
    - Speculative decoding draft model latency: 5 ms/token, K=5.
    - Speculative decoding verification: 55 ms, acceptance ~80%.
    - Pruning effect: 0 speedup, but degrades draft acceptance rate to ~30%.

    **Calculations:**
    - Speculative latency: 80 ms / 5 tokens = 16 ms/token.
    - Combined latency: 80 ms / 2.5 tokens = 32 ms/token.

    **Conclusion & Interpretation:**
    - **Result: 32 ms/token (Accuracy-Bound).** Combining unstructured pruning ruins speculative decoding acceptance rates.
