title: The Jank Budget (mobile-0230)
scenario: To maintain a 'buttery smooth' 60 FPS user experience for a live camera filter on a mobile app,
  you need to process each frame before the next one is ready. What is the total time budget, also known
  as the frame deadline, for all processing on a single frame?
details:
  realistic_solution: The correct answer is ~16.67ms. A 60 FPS target means 60 frames must be processed
    within one second (1000 milliseconds). Therefore, each frame has a budget of 1000ms divided by 60
    frames.
  common_mistake: Confusing frames-per-second directly with a time unit (e.g., thinking 60 FPS means a
    60ms budget) or simply not knowing the basic conversion. This reveals a lack of familiarity with real-time
    graphics or UI programming constraints, which are critical on mobile.
  napkin_math: '1000 ms / 60 FPS = 16.67 ms/frame. This is the total budget for everything: OS overhead,
    rendering, and your model''s inference. If your model takes 10ms to run, you only have ~6ms left for
    everything else before the user sees ''jank''.'
  options:
  - 60 ms
  - 33 ms
  - ~16 ms
  - 100 ms
  correct_index: 2
