title: Functional Safety Design for ADAS on Snapdragon 8 Gen 3 Hexagon NPU
scenario: Your team is developing an ADAS feature, specifically an intelligent emergency braking system, that runs a critical deep learning model on the Snapdragon 8 Gen 3 Hexagon NPU. This system must comply with ISO 26262 ASIL-B requirements.
question: How would you design Hexagon NPU software architecture for ASIL-B emergency braking with deterministic execution and fault mitigation?
details:
  realistic_solution: 'A robust solution would involve: 1. **Safety Concept & Partitioning:** Define a clear safety concept compliant with ISO 26262, explicitly partitioning safety-critical (ASIL-B) and non-safety-critical software components. 2. **Deterministic Execution:** Employ fixed-point arithmetic, pre-allocated memory buffers, and avoid dynamic memory allocation during runtime on the NPU. Implement rigorous NPU task scheduling and prioritization mechanisms to minimize inference time jitter and ensure predictable execution cycles. 3. **Error Detection & Diagnostics:** Integrate NPU-specific watchdog timers (both internal and external), memory ECC (if supported by LPDDR5X controllers), and runtime plausibility checks on NPU outputs. Leverage the Hexagon NPU''s diagnostic capabilities, including built-in self-tests (BIST) for memory and arithmetic units, performed at startup and periodically. 4. **Fault Mitigation:** Design for redundancy (e.g., diverse redundant NPU inference paths, software redundancy for critical computations) and voting mechanisms. Implement fail-operational or fail-safe states to transition the system to a safe condition upon error detection. 5. **Traceability & Verification:** Maintain full traceability from safety requirements to implementation and verification activities, including extensive testing (e.g., fault injection testing) to validate safety mechanisms and achieve ISO 26262 Part 6 compliance.'
  common_mistake: |
    **The Pitfall:** Suggesting generic software safety practices without addressing hardware-specific mechanisms.
    **The Rationale:** Candidates overlook the specifics of embedded/NPU environments and the challenges of deterministic execution with neural network inference.
    **The Consequence:** The design fails to address NPU resource management on safety, neglecting explicit ISO 26262 phases or documentation.
  napkin_math: |
    * The total safety-critical response budget is 50ms.
    * Sensor input to actuator command, excluding NPU, consumes 40ms (50ms - 10ms inference).
    * The NPU inference and data transfer take 10ms.
    * Maximum allowable latency variance (jitter) must strictly bounded such that NPU execution never exceeds 10ms.
    * **Jitter > 0ms over the 10ms budget will violate the 50ms ASIL-B deadline.**
