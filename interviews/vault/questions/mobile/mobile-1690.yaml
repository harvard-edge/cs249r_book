title: Functional Safety Design for ADAS on Snapdragon 8 Gen 3 Hexagon NPU
scenario: Your team is developing an ADAS feature, specifically an intelligent emergency braking system, that runs a critical deep learning model on an automotive NPU. This system must comply with ISO 26262 ASIL-B requirements.
question: How would you design the NPU software architecture for ASIL-B emergency braking with deterministic execution and fault mitigation?
details:
  realistic_solution: 'An ASIL-B compliant architecture mandates strict spatial and temporal isolation. 1. **Safety Partitioning**: Enforce rigid separation between the safety-critical perception stack and standard infotainment features via hypervisor or OS-level sandboxing. 2. **Deterministic Execution**: Eliminate dynamic memory allocation (`malloc`); rely exclusively on pre-allocated static memory pools. Force fixed-point arithmetic (INT8) and enforce deterministic RTOS task scheduling to guarantee bounded worst-case execution time (WCET). 3. **Diagnostics & ECC**: Enable LPDDR5X ECC and NPU-specific built-in self-tests (BIST) for arithmetic units. 4. **Redundancy & Plausibility**: Implement dual-core lockstep execution or run a lightweight, secondary deterministic heuristic alongside the deep neural network. Use a safety MCU to continuously poll external watchdog timers, validating the NPU''s heartbeat.'
  common_mistake: |
    **The Pitfall:** Suggesting generic software safety practices without addressing hardware-specific mechanisms.
    **The Rationale:** Candidates overlook the specifics of embedded/NPU environments and the challenges of deterministic execution with neural network inference.
    **The Consequence:** The design fails to address NPU resource management on safety, neglecting explicit ISO 26262 phases or documentation.
  napkin_math: |
    **Assumptions & Constraints:**
    - Total ASIL-B response budget: 50ms.
    - Sensor-to-actuator overhead (excluding NPU): 40ms.
    - NPU allocated budget: 10ms.

    **Calculations:**
    - Jitter constraint: The absolute WCET of the NPU execution plus NoC data transfer must be strictly <= 10ms.

    **Conclusion & Interpretation:**
    - **Result: 10ms (WCET-Bound)**. Any jitter causing the NPU to exceed 10ms directly violates the 50ms ASIL-B safety deadline, potentially causing a catastrophic functional failure.
