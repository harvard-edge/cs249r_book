title: Designing a Fair and Efficient On-Device ML System for Content Moderation on
  Google Tensor G3
scenario: You are tasked with designing an on-device machine learning system for real-time
  content moderation (e.g., identifying hate speech or inappropriate imagery) on a
  new generation of smartphones powered by the Google Tensor G3. This platform features
  an on-device TPU capable of 7.5 TOPS and 12 GB LPDDR5X RAM. The moderation system
  must achieve high accuracy while rigorously addressing fairness and bias across
  various demographic subgroups globally. Specifically, the system needs to prevent
  disproportionate false positive or false negative rates for specific age groups,
  genders, or cultural backgrounds, ensuring demographic parity and equalized odds
  within a strict latency budget of 50ms per inference and a model footprint of under
  200MB. How would you specify the design of this system, including data collection,
  model architecture, and evaluation methodologies, to ensure robust fairness and
  bias mitigation given the hardware constraints?
question: How would you specify a fair, efficient Tensor G3 content moderation model
  within 50ms latency and 200MB footprint?
details:
  realistic_solution: 'The solution involves a multi-pronged approach: 1) **Data Collection
    & Augmentation:** Prioritize diverse and representative data collection, explicitly
    oversampling underrepresented groups or using synthetic data generation to balance
    sensitive attributes. Implement fairness-aware data augmentation techniques to
    create variations across demographics. 2) **Model Architecture & Training:** Select
    efficient model architectures (e.g., MobileNetV3, Quantized Transformers) that
    fit within the memory budget and can leverage the 7.5 TOPS TPU for fast inference.
    Incorporate fairness regularization techniques during training (e.g., adversarial
    debiasing, reweighing samples based on demographic groups) which can be baked
    into the on-device model. 3) **On-Device Fairness Evaluation:** Develop a robust,
    lightweight on-device or federated evaluation framework to continuously monitor
    key fairness metrics (demographic parity, equalized odds, intersectional fairness)
    for different subgroups using anonymized usage data. This requires defining a
    minimal set of sensitive attributes (e.g., inferred locale, rough age group) and
    tracking metrics like true positive/negative rates per subgroup. Trigger retraining
    or model updates if fairness thresholds are violated. Leverage the LPDDR5X for
    efficient access to input data and model weights during inference.'
  common_mistake: A common mistake is assuming that a globally high-accuracy model
    automatically translates to fair performance across all subgroups. Without explicit,
    fine-grained subgroup evaluation metrics (e.g., separate F1 scores, false positive
    rates) and a dedicated fairness-aware data collection strategy, biases inherent
    in the training data can be amplified, leading to unfair outcomes for underrepresented
    or specific demographic groups. Additionally, simply applying post-hoc fairness
    algorithms without considering their computational overhead on resource-constrained
    devices like the Tensor G3 can lead to unmet latency or memory budgets.
  napkin_math: Given a 7.5 TOPS (Tera Operations Per Second) TPU, this means 7.5 *
    10^12 operations per second. If we have a latency budget of 50ms (0.05 seconds)
    per inference, the maximum operations per inference is 7.5 * 10^12 * 0.05 = 3.75
    * 10^11 operations. If the model requires 200MB of weights and activations, and
    the LPDDR5X RAM has a bandwidth of 68.26 GB/s, loading the entire model (ignoring
    caching) would take approximately 200 MB / 68.26 GB/s = 0.2 GB / 68.26 GB/s ≈
    0.0029 seconds or 2.9 ms. This leaves ample time within the 50ms budget for actual
    computation, but highlights that the computational complexity (ops per inference)
    is the primary constraint for the model on the TPU, while memory bandwidth is
    critical for quick loading and access to large model components or intermediate
    activations, especially in multi-modal scenarios. For fairness evaluation, if
    we monitor 10 subgroups with 3 fairness metrics each, requiring 100 aggregated
    events per metric to be statistically significant, this means processing 10 *
    3 * 100 = 3000 data points locally for continuous monitoring. This volume is easily
    manageable on-device.
