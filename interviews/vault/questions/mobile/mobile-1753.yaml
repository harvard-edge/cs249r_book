title: Designing a Fair and Efficient On-Device ML System for Content Moderation on Google Tensor G3
scenario: You are tasked with designing an on-device machine learning system for real-time content moderation on smartphones powered by the Google Tensor G3. This platform features an on-device TPU capable of 7.5 TOPS and 12 GB LPDDR5X RAM. The system must achieve high accuracy while rigorously addressing fairness across demographic subgroups globally, ensuring demographic parity within a strict latency budget of 50ms per inference and a footprint of under 200MB.
question: "How would you specify a fair, efficient Tensor G3 content moderation model within 50ms latency and 200MB footprint?"
details:
  realistic_solution: 'Implement fairness-aware data augmentation and oversampling for underrepresented groups. Select an efficient architecture (e.g., Quantized MobileNetV3) that fits the memory and TOPS budget. Incorporate fairness regularization during training. Develop a lightweight on-device evaluation framework to monitor subgroup metrics continuously without breaking latency constraints.'
  common_mistake: |
    **The Pitfall:** Assuming globally high accuracy equals fairness, or applying heavy post-hoc fairness algorithms on-device.
    **The Rationale:** Candidates often port server-side fairness methods directly, ignoring that these add massive computational overhead.
    **The Consequence:** The model either amplifies existing biases against subgroups, or fails the strict 50ms latency constraint.
  napkin_math: |
    - **Compute Budget:** 7.5 TOPS = 7.5 * 10^12 ops/sec. For 50ms (0.05s) latency, max operations = 7.5 * 10^12 * 0.05 = 3.75 * 10^11 ops.
    - **Memory Bandwidth:** 200MB model loaded from LPDDR5X (68.26 GB/s) takes roughly 200 MB / 68.26 GB/s = ~2.9 ms.
    - **Evaluation Overhead:** Tracking 3 metrics across 10 subgroups requiring 100 events each requires processing 3000 data points locally, which easily fits the budget.
    - **Final Result:** The 50ms budget is easily met (**2.9ms memory transfer**, ample headroom for compute) provided the evaluation logic is lightweight.
