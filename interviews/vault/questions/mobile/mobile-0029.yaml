title: The ML Crash Report Black Hole
scenario: Your on-device speech recognition model causes the app to crash on 0.3% of sessions. Crashlytics shows the crash stack trace ends deep inside a private framework. You cannot read the source code, and you cannot reproduce it locally.
question: How do you diagnose and fix a rare kernel crash without source access or local reproduction?
details:
  realistic_solution: 'Diagnose by correlating crash metadata: input shapes, batch sizes, OS version, device model, memory state. Pattern: crashes cluster on non-standard tensor dimensions. The reshape kernel fails on shapes the NPU can''t handle. Fix: (1) pad inputs to multiples of 32, reducing crashes from 0.3% to 0.01%. (2) Wrap inference in try-catch with delegate fallback (NPU -> GPU -> CPU). GPU at 25ms vs NPU at 8ms is imperceptible for speech. Don''t wait months for an OS fix.'
  common_mistake: |
    **The Pitfall:** Filing a bug with Apple and waiting for a fix.
    **The Rationale:** Candidates assume that because a proprietary framework crashed, they have no control or ability to mitigate the issue.
    **The Consequence:** Users continue to experience crashes for 3-6 months while waiting for an OS-level update.
  napkin_math: |
    **Assumptions & Constraints:**
    - Crash rate: 0.3% of sessions.
    - Usage: 1M DAU * 3 sessions = 3M sessions/day.
    - Hardware Fallbacks: NPU (8ms), GPU (25ms), CPU (120ms).

    **Calculations:**
    - Daily crashes (unmitigated): 3,000,000 * 0.003 = 9,000 crashes/day.
    - Daily crashes (padded inputs): 3,000,000 * 0.0001 = 300 crashes/day.

    **Conclusion & Interpretation:**
    - **Result: Compute-Bound Mitigation.** Padding and falling back to a 25ms GPU completely eliminates the residual 300 crashes imperceptibly.
