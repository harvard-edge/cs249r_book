title: The ML Crash Report Black Hole
scenario: Your on-device speech recognition model causes the app to crash on 0.3% of sessions. Crashlytics shows the crash stack trace ends in `CoreML::Espresso::generic_reshape_kernel` — deep inside Apple's private framework. You can't read Apple's source code, and you can't reproduce it locally.
question: "How do you diagnose and fix a rare CoreML generic_reshape_kernel crash without Apple source or local reproduction?"
details:
  realistic_solution: 'Diagnose by correlating crash metadata: input shapes, batch sizes, iOS version,
    device model, memory state. Pattern: crashes cluster on non-standard tensor dimensions. CoreML''s
    reshape kernel fails on shapes the ANE can''t handle. Fix: (1) pad inputs to multiples of 32, reducing
    crashes from 0.3% to 0.01%. (2) Wrap inference in try-catch with delegate fallback (ANE -> GPU ->
    CPU). GPU at 25ms vs ANE at 8ms is imperceptible for speech (~200ms tolerance). Don''t wait 3-6 months
    for Apple''s fix.'
  common_mistake: |
    **The Pitfall:** Filing a bug with Apple and waiting for a fix.
    **The Rationale:** Candidates assume that because a proprietary framework crashed, they have no control or ability to mitigate the issue.
    **The Consequence:** Users continue to experience crashes for 3-6 months while waiting for an OS-level update.
  napkin_math: |
    - Crash rate: 0.3% of sessions.
    - Daily crashes: 1M DAU × 3 sessions/day × 0.003 = 9,000 crashes/day.
    - Impact of padding fix: Crash rate drops to 0.01% (300 crashes/day).
    - Fallback Latency: ANE = 8ms, GPU = 25ms, CPU = 120ms.
    - **Conclusion:** Handling the remaining edge cases with a 25ms GPU fallback is imperceptible to users and fully mitigates the crash.
