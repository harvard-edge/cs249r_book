title: The ML Crash Report Black Hole
scenario: Your on-device speech recognition model causes the app to crash on 0.3% of sessions. Crashlytics
  shows the crash stack trace ends in `CoreML::Espresso::generic_reshape_kernel` — deep inside Apple's
  private framework. You can't read Apple's source code. You can't reproduce it locally. How do you diagnose
  and fix this?
details:
  realistic_solution: 'Diagnose by correlating crash metadata: input shapes, batch sizes, iOS version,
    device model, memory state. Pattern: crashes cluster on non-standard tensor dimensions. CoreML''s
    reshape kernel fails on shapes the ANE can''t handle. Fix: (1) pad inputs to multiples of 32, reducing
    crashes from 0.3% to 0.01%. (2) Wrap inference in try-catch with delegate fallback (ANE -> GPU ->
    CPU). GPU at 25ms vs ANE at 8ms is imperceptible for speech (~200ms tolerance). Don''t wait 3-6 months
    for Apple''s fix.'
  common_mistake: '"File a bug with Apple and wait." Apple''s Core ML bug turnaround is 3-6 months. Your
    users are crashing now.'
  napkin_math: 'Crash rate: 0.3% of sessions. At 1M DAU with 3 sessions/day: 9,000 crashes/day. After
    input padding fix: crash rate drops to 0.01% (residual edge cases). Remaining 300 crashes/day handled
    by delegate fallback. ANE latency: 8 ms. GPU fallback: 25 ms. CPU fallback: 120 ms. User-perceptible
    impact of GPU fallback: none (speech recognition tolerance is ~200 ms).'
