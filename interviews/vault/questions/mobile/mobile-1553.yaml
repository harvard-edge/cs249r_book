title: Optimizing Large Language Models on Google Tensor G3 for Mobile
scenario: You are deploying an LLM on a smartphone powered by the Google Tensor G3 (7.5 TOPS, 12 GB LPDDR5X). The LLM requires 10 GB of memory for its weights and activations, occasionally exceeding the available 12 GB during variable memory usage, leading to Out-Of-Memory (OOM) errors.
question: How would you optimize large language model deployment on Tensor G3 for mobile memory and latency?
details:
  realistic_solution: 'A realistic solution would involve a multi-pronged approach: 1) Quantization (e.g., 8-bit or 4-bit) of model weights to reduce the baseline memory footprint. 2) Implementing a custom memory allocator or strategy to minimize fragmentation, especially for dynamic tensors. 3) Exploring dynamic batching or micro-batching with gradient accumulation-like patterns if certain inference tasks can be batched efficiently to manage activation memory. 4) Proactively monitoring memory usage to identify high-pressure points and potentially employing an intelligent eviction policy for less critical data (if any) or working with the OS to optimize memory pages, while being mindful of the LPDDR5X characteristics. 5) Utilizing the on-device TPU efficiently by offloading computations, which can indirectly help manage main memory by reducing intermediate data storage needs on the CPU.'
  common_mistake: |
    **The Pitfall:** Focusing only on peak memory usage without accounting for dynamic activations.
    **The Rationale:** Candidates often forget OS overhead, memory fragmentation, or the massive dynamic activation footprint of long-context generation.
    **The Consequence:** Naive attempts to squeeze large models onto mobile devices fail unpredictably under load, causing sudden app crashes.
  napkin_math: |
    1. Total RAM = 12 GB. Model weights = 10 GB. Remaining = 2 GB (insufficient for OS + activations).
    2. A 100-layer transformer with 100 MB activations per layer = 10 GB activations. Total needed = 20 GB.
    3. Quantizing weights from FP16 to INT8 reduces weights to 5 GB.
    4. Total needed = 5 GB (weights) + 10 GB (activations) = 15 GB (still > 12 GB).
    5. Conclusion: **Quantization alone is insufficient; memory management techniques like KV cache offloading or smaller chunk processing are required to fit within 12 GB.**
