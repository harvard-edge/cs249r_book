title: The On-Device Memory Budget
scenario: Your team is building a new generative AI feature for your mobile app. You want to run a 1.5 billion parameter language model on-device. The target user device has 8 GB of RAM, and per your app's performance guidelines, your feature's peak memory usage cannot exceed 25% of the device's total RAM.
question: Explain whether the model's weights will fit into this budget using FP16 precision, and contrast this with using INT8 precision.
details:
  realistic_solution: The model's weights will not fit in memory using FP16 precision but will fit comfortably using INT8. The app's memory budget is 25% of 8 GB, which is 2 GB. The FP16 model requires 1.5 billion parameters × 2 bytes/parameter = 3 GB, which exceeds the 2 GB budget. The INT8 model, however, requires 1.5 billion parameters × 1 byte/parameter = 1.5 GB, which is within the budget. Therefore, quantization to INT8 is necessary to meet the memory constraints.
  common_mistake: |
    **The Pitfall:** Forgetting the byte cost per parameter for different precisions.
    **The Rationale:** Candidates fail to remember that FP16 is 2 bytes and INT8 is 1 byte, or they mistakenly consider the total device RAM (8 GB) as the budget.
    **The Consequence:** They erroneously conclude that large models can be deployed without quantization.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - App Budget: 25% of 8 GB RAM.
       - Model size: 1.5 billion parameters.
    2. **Calculations:**
       - Budget = 0.25 * 8 GB = 2 GB.
       - FP16 Memory = 1.5B * 2 bytes = 3 GB.
       - INT8 Memory = 1.5B * 1 byte = 1.5 GB.
    3. **Conclusion & Interpretation:**
       - **Result: 1.5 GB. Memory-Capacity-Bound.** Quantization to INT8 is mandatory to fit in the 2 GB budget.
  options:
  - Both will fit easily within the 8 GB of device RAM.
  - Neither will fit; the model is too large for on-device deployment.
  - It will exceed the budget in FP16, but fit using INT8.
  - Both require the same 1.5 GB of memory, so both will fit.
