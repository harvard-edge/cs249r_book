title: The Mobile ML Telemetry Budget
scenario: Your photo app runs a style transfer model on-device. You want to collect telemetry — inference
  latency, confidence scores, model version, device thermal state — to monitor model health across 5 million
  DAU. Your analytics pipeline charges $4 per million events. The CFO says your ML telemetry budget is
  $500/month. Design the telemetry system.
question: "How do you keep ML telemetry for 5M DAU under a $500/month budget at $4 per million events?"
details:
  realistic_solution: 'Design on-device aggregation to stay under $500/month at $4/M events. Naive: 3B
    events = $12K. Fix: aggregate on-device into daily summaries (mean latency, P95, confidence histogram,
    thermal state, model version). 5M x 4 events/day x 30 = 600M = $2,400 — still over. Apply 2% sampling:
    12M events = $48/month. Add anomaly escalation (0.5% rate): ~12.75M = $51/month. Remaining $449 for
    storage and dashboards. Intelligence lives on-device; cloud sees only summaries.'
  common_mistake: '"Log every inference and sample server-side." At 5M DAU × 20 inferences/day = 100M
    events/day × 30 days = 3B events/month × $4/M = $12,000/month. That''s 24× over budget.'
  napkin_math: 'Naive: 3B events/month = $12,000. Aggregated: 5M × 4 events/day × 30 = 600M events = $2,400.
    Sampled 2%: 12M events = $48. With anomaly escalation (assume 0.5% anomaly rate): 12M + 0.5% × 5M
    × 30 × 1 = 12.75M events = $51/month. Budget: $500. Remaining $449 for storage, dashboards, and alerting.'
