title: The Mobile ML Telemetry Budget
scenario: Your photo app runs a style transfer model on-device. You want to collect telemetry — inference latency, confidence scores, model version, device thermal state — to monitor model health across 5 million DAU. Your analytics pipeline charges $4 per million events. The CFO says your ML telemetry budget is $500/month.
question: "How do you design the telemetry system to keep ML telemetry for 5M DAU under a $500/month budget?"
details:
  realistic_solution: Design on-device aggregation using standard differential privacy techniques to stay under budget. Aggregate on-device into daily summaries (mean latency, P95, confidence histogram, thermal state, model version). Apply 2% stratified sampling and anomaly escalation.
  common_mistake: |
    **The Pitfall:** Logging every inference and sampling server-side.
    **The Rationale:** Engineers lean on cloud-native logging habits without running the cost analysis at mobile scale.
    **The Consequence:** The resulting telemetry bill exceeds the budget by 24x, resulting in immediate shut down of the analytics pipeline.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 5M DAU, 4 events/day, 30 days/month.
       - Analytics cost: $4 per 1M events.
       - Budget: $500/month.
    2. **Calculations:**
       - Naive Logging: 5M * 4 * 30 = 600M events = $2,400/month.
       - 2% Sampling: 12M events = $48/month.
       - Anomaly Escalation (0.5% rate): 5M * 0.005 * 30 = 0.75M events.
       - Total Events: 12M + 0.75M = 12.75M. Total Cost = $51/month.
    3. **Conclusion & Interpretation:**
       - **Result: Cost-Bound**. The budget is preserved ($500 - $51 = $449 left for storage/dashboards). Intelligence lives on-device; cloud sees only summaries.
