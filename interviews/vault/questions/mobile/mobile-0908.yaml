title: 'Dataset Curation: Recall — What is Federated Learning Data Privacy?'
scenario: In the context of mobile on-device training on Snapdragon 8 Gen 3 (45 TOPS INT8).
question: What does federated learning mean for mobile data privacy, and how does it differ from centralized data collection?
details:
  realistic_solution: 'Federated learning: model trains locally on device, only model updates (gradients or weights) are uploaded — raw data never leaves device. Key difference from centralized: no raw data collection, privacy-by-design. Limitation: gradient inversion attacks can partially recover data without DP.'
  common_mistake: |
    **The Pitfall:** Assuming federated learning provides perfect privacy.
    **The Rationale:** Candidates confuse federated learning with Secure Multi-Party Computation or Differential Privacy (DP), forgetting that raw gradients can be inverted.
    **The Consequence:** Deploying federated learning without DP leaves the system vulnerable to gradient inversion attacks that reconstruct user data.
  napkin_math: |
    1. **Centralized Data:** 100M users * 1K examples * 512 tokens * 2 bytes = 102.4 TB uploaded. Cost at $0.09/GB = **$9,216**.
    2. **Federated Data:** 100M params in FP16 = 200MB/device. With 10x compression = 20MB. 
    3. **Naive FL Scale:** 100M users * 20MB = 2 PB uploaded (worse than centralized!).
    4. **Sampled FL Scale:** 100K users/round * 20MB = 2 TB. Cost = **$180/round** (much cheaper).
