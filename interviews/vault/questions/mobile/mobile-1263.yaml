title: Diagnosing Latency Bias in On-Device LLMs
scenario: You have deployed a quantized version of Gemini Nano on the Google Tensor G3 for a real-time accessibility transcription feature. During fairness evaluation, the application exhibits 3x higher latency and significantly worse battery drain when processing transcripts from users speaking African American Vernacular English (AAVE) compared to Standard American English (SAE).
question: Why does Gemini Nano transcription on Tensor G3 show higher latency and battery drain for AAVE than SAE transcripts?
details:
  realistic_solution: The root cause is a tokenizer trained predominantly on SAE, causing it to over-fragment AAVE text into many more subword tokens. This significantly longer sequence length increases the memory bandwidth required to load the KV cache and quadratically increases the computational load on the TPU.
  common_mistake: |
    **The Pitfall:** Immediately assuming the model weights are biased and suggesting a full retrain.
    **The Rationale:** Failing to connect the symptom (latency/battery drain) to the hardware execution profile (tokenizer fragmentation).
    **The Consequence:** Wasting months on data collection and retraining when the tokenizer is the primary mechanical bottleneck.
  napkin_math: |
    - SAE: 20 words -> 25 tokens. Compute ~ 25^2 = 625.
    - AAVE: 20 words -> 75 tokens. Compute ~ 75^2 = 5625.
    - Compute Ratio: 5625 / 625 = 9x increase in attention compute.
    - Memory Bandwidth: Fetching a 3x larger KV cache bottlenecks the 7.5 TOPS TPU.
    - **Tokenizer fragmentation quadratically increases compute and memory bandwidth, causing severe latency and battery disparities.**
