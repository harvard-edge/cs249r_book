title: Implement EfficientNet-B0 for Snapdragon 8 Gen 3 Hexagon NPU via QNN SDK
scenario: You are deploying EfficientNet-B0 to a Samsung Galaxy S24 using the QNN SDK for offline deployment. The model has Swish (SiLU) activations and SE blocks.
question: How should EfficientNet-B0 be converted and optimized for Snapdragon 8 Gen 3 Hexagon deployment with the QNN SDK?
details:
  realistic_solution: 'QNN conversion: (1) Export PyTorch → ONNX with static shapes (batch=1, input=1×3×224×224, opset=13); (2) Replace SiLU with approximation: hardswish or x × hardtanh(x+3,0,6)/6 (QNN-supported); (3) qnn-onnx-converter --input_network model.onnx --output_path model.cpp; (4) qnn-net-run with --backend libQnnHtp.so; (5) SE blocks: Hexagon HTP supports GlobalAveragePool as a native op. Verify latency < 3ms with qnn-net-run --duration 1000. If SE blocks cause issues, use qnn-model-lib-generator to inspect per-layer dispatch.'
  common_mistake: |
    **The Pitfall:** Using the generic ONNX -> QNN conversion without disabling dynamic shapes.
    **The Rationale:** Candidates overlook that Hexagon HTP graph compilation requires static shapes for SE blocks with dynamic Global Average Pooling (GAP).
    **The Consequence:** This prevents native execution on the NPU, forcing a costly fallback to the CPU.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model: EfficientNet-B0 (5.3M params, INT8).
       - Theoretical NPU capability: 45 TOPS.
       - SE Block operations: 16 blocks, totaling ~5M FLOPs.
    2. **Calculations:**
       - Theoretical Latency: 0.39 GOPs / 45,000 GOPs/sec = 8.7\u03bcs.
       - Dispatch Penalty: Hexagon HTP CPU-to-DSP dispatch is ~0.1ms per non-fused op.
       - Overhead calculation: 16 SE blocks * 2 non-fused FC layers * 0.1ms = 3.2ms.
    3. **Conclusion & Interpretation:**
       - **Result: CPU-Dispatch Bottleneck**. If the SE blocks (GlobalAveragePool + FC) are not statically shaped and fused, the 3.2ms dispatch overhead completely dominates the 8.7\u03bcs theoretical compute time.
