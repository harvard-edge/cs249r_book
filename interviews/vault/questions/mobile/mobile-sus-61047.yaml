title: On-Device Personalization with Differential Privacy on Mobile
scenario: Apple's on-device personalization for a keyboard model uses LoRA fine-tuning on user text. Design
  the differential privacy mechanism for rank-4 on-device training on A17 Pro.
question: "How would you design the differential privacy mechanism for rank-4 on-device training on A17 Pro?"
details:
  realistic_solution: 'DP-LoRA on device: (1) clip per-sample gradients of adapter weights at C=0.1 (empirically
    determined from adapter gradient percentile distribution on representative user data); (2) add Gaussian
    noise σ=C×√(2ln(1.25/δ))/ε to clipped gradients; (3) accumulate 100 local updates before applying;
    (4) ε=8 per day budget (Apple''s reported standard for on-device learning). Key: adapter''s small
    parameter count (rank-4: 786K) means gradient clipping operates in a low-dimensional space, making
    the DP mechanism more efficient than full model training.'
  common_mistake: Applying standard DP-SGD clip norms designed for server-side training. Mobile training
    has different gradient distributions and the same clip norm can over-clip (adding too much noise)
    or under-clip (insufficient privacy) compared to server profiles.
  napkin_math: 'Rank-4 adapter for 1B model: 786K params. Full model: 1B params. DP noise ratio advantage:
    √(1B/786K) ≈ 35.6×. For ε=8, δ=10⁻⁶, T=100 steps: σ ≈ 0.5. Signal-to-noise ratio for rank-4 updates:
    typical gradient norm ~0.1; noise norm = σ × √(number of params) = 0.5 × √786K = 0.5 × 887 ≈ 443.
    Per-param SNR: 0.1 / (443 / 786K) ≈ 0.1 / 0.00056 ≈ 178 — usable. After T=100 accumulations: SNR improves
    by √100 = 10×.'
