title: DP Noise Calibration on Mobile NPU
scenario: Your on-device learning system on Snapdragon 8 Gen 3 (45 TOPS, 8 GB) trains
  a personalization model locally and sends DP-protected gradient updates to the server.
  The local model has 2M parameters. To achieve per-update epsilon = 2.0 with delta
  = 1e-6, what is the standard deviation of Gaussian noise you must add to the clipped
  gradient, and how much memory does the noise generation require?
question: 0 with delta = 1e-6, what is the standard deviation of Gaussian noise you
  must add to the clipped gradient, and how much memory does the noise generation
  require?
details:
  realistic_solution: 'Gaussian mechanism calibration: σ = C × √(2 ln(1.25/δ)) / ε.
    With C = 1.0 (gradient clipped to unit norm), δ = 1e-6, ε = 2.0: σ = 1.0 × √(2
    × ln(1.25 × 10⁶)) / 2.0 = √(2 × 14.04) / 2.0 = √28.08 / 2.0 = 5.30 / 2.0 = 2.65.
    Each gradient coordinate gets noise N(0, 2.65²) = N(0, 7.02). For 2M parameters:
    generate 2M Gaussian random numbers. Memory: 2M × 4 bytes (FP32) = 8 MB for the
    noise tensor. On Snapdragon 8 Gen 3 with 8 GB RAM: trivial. Generation time: 2M
    Gaussian samples using Box-Muller transform = ~1M pairs × ~10 clock cycles = ~10M
    cycles / 3.3 GHz = ~3ms. The noise magnitude (σ=2.65) relative to a typical gradient
    coordinate (~0.01) is 265× — this means individual updates are completely hidden,
    but averaging over 10,000 users recovers the signal (noise reduces by √10,000
    = 100×).'
  common_mistake: 'Using the Laplace mechanism formula for Gaussian noise. The Gaussian
    mechanism uses a different calibration: σ = C × √(2 ln(1.25/δ)) / ε, where C is
    the clipping norm. Mixing up Laplace and Gaussian sensitivity formulas gives wrong
    noise levels.'
  napkin_math: 'σ = √(2 × ln(1.25/1e-6)) / 2.0 = √(2 × 14.04) / 2 = 2.65. Noise memory:
    2M × 4 bytes = 8 MB. Generation: 3ms on CPU. SNR per user: 0.01 / 2.65 = 0.004
    (useless individually). After 10K user aggregation: SNR = 0.004 × √10,000 = 0.38
    (weak but usable). After 100K users: SNR = 1.26 (solid). Need ~50K+ users per
    round for meaningful learning.'
