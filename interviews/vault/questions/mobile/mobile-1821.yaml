title: 'DP Noise Calibration on Mobile NPU'
scenario: 'Your on-device learning system trains a personalization model locally and sends DP-protected gradient updates to the server. The local model has 2M parameters. You need to achieve per-update epsilon = 2.0 with delta = 1e-6.'
question: 'What is the standard deviation of Gaussian noise you must add to the clipped gradient (norm=1.0), and how much memory does the noise generation require?'
details:
  realistic_solution: 'Gaussian mechanism calibration: σ = C × √(2 ln(1.25/δ)) / ε. With C = 1.0 (gradient clipped to unit norm), δ = 1e-6, ε = 2.0: σ = 1.0 × √(2 × ln(1.25 × 10⁻⁶)) / 2.0 = √(2 × 14.04) / 2.0 = √28.08 / 2.0 = 5.30 / 2.0 = 2.65. Each gradient coordinate gets noise N(0, 2.65²) = N(0, 7.02). For 2M parameters: generate 2M Gaussian random numbers. Memory: 2M × 4 bytes (FP32) = 8 MB for the noise tensor.'
  common_mistake: |
    **The Pitfall:** Using the Laplace mechanism formula for Gaussian noise.
    **The Rationale:** Candidates mix up Laplace and Gaussian sensitivity formulas, applying the wrong constant factor.
    **The Consequence:** The noise magnitude is calibrated incorrectly, breaking the strict mathematical guarantee of the privacy budget.
  napkin_math: |
    **Assumptions & Constraints:**
    - Local model: 2M parameters.
    - DP limits: epsilon (ε) = 2.0, delta (δ) = 1e-6, gradient norm clip (C) = 1.0.
    - Precision: FP32 noise tensors (4 bytes/param).

    **Calculations:**
    - Noise Calibration (σ) = C x √(2 x ln(1.25/δ)) / ε.
    - σ = 1.0 x √(2 x ln(1.25/1e-6)) / 2.0 = √(2 x 14.04) / 2.0 = 5.30 / 2.0 = 2.65.
    - Memory Overhead: 2,000,000 params x 4 bytes/param = 8,000,000 bytes (8 MB).

    **Conclusion & Interpretation:**
    - **Result: 8 MB, σ=2.65 (Memory-Bound)**. The DP noise tensor requires 8 MB of RAM and a standard deviation of 2.65, protecting privacy while remaining well within edge memory limits.
