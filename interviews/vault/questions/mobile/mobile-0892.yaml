title: Realizing a Hybrid On-Device and Cloud Compound AI Pipeline on Tensor G3
scenario: 'A Tensor G3 app implements a hybrid compound AI pipeline: on-device embedding and retrieval with LLM generation handled either on-device or via a cloud API. The switching decision happens per-query.'
question: How should a hybrid compound AI pipeline decide between cloud and on-device generation while preserving context privacy?
details:
  realistic_solution: 'Context sanitization before cloud offload: (1) PII scrubbing: run a fast regex + small classifier (5M model, 2ms) to detect and redact PII from retrieved chunks before cloud transmission. (2) Truncation to API budget: max 2000 tokens to keep API cost low. (3) Decision logic: route to cloud if: battery > 30% AND network_rtt < 200ms AND query_sensitivity_score < 0.5 (non-sensitive per classifier). On-device otherwise. State handoff: for cloud path, send sanitized_context + query + system_prompt (total < 2000 tokens). For on-device, send full retrieved context (no sanitization needed). Results are identical format — UI renders same way.'
  common_mistake: |
    **The Pitfall:** Sending raw retrieved document chunks to the cloud API without sanitization or truncation.
    **The Rationale:** Engineers optimize for latency and model output quality but ignore the architectural constraints of hybrid data privacy.
    **The Consequence:** Violating the system's core privacy guarantees by leaking locally stored PII to a remote server.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - On-Device Generation: 6.25s at 5W.
       - Cloud Network RTT: 80ms. Cloud Gen: 200ms.
       - PII scrub: 2ms.
    2. **Calculations:**
       - On-Device Power: 5W * 6.25s = 31.25J.
       - Cloud Latency: Embed(133ms) + PII scrub(2ms) + Net(80ms) + Gen(200ms) = 415ms.
       - Cloud Power: (5W * 0.138s for embed) + (0.1W * 0.282s idle) = 0.718J.
    3. **Conclusion & Interpretation:** The cloud path is **15x faster** and saves **97.7% energy**, optimizing the **Power-Bound** constraint while preserving privacy.
