title: The Sensor Bandwidth Skew
scenario: A mobile vision model, trained on pristine 4K images, is underperforming on-device. A likely source of training-serving skew is the physical data link between the camera sensor and the SoC, which can force on-the-fly compression or resolution scaling not present in the training data.
question: What is the name of this common camera interface, and what is its typical maximum bandwidth in a modern smartphone?
details:
  realistic_solution: 'The interface is the MIPI CSI-2. In a typical high-end smartphone using a 4-lane configuration, its bandwidth is approximately 2.5 GB/s. If a model''s desired input resolution and frame rate exceed this physical limit, the camera system is forced to drop frames, reduce resolution, or apply heavy compression, introducing artifacts that cause skew from the clean training data.'
  common_mistake: |
    **The Pitfall:** Focusing exclusively on system memory bandwidth (LPDDR5).
    **The Rationale:** Engineers forget the physical data link from the sensor itself (MIPI CSI-2) and assume bandwidth into the SoC is effectively infinite or mistake it for PCIe.
    **The Consequence:** Designing models with input resolution requirements that physically cannot be sustained by the camera interface, leading to frame drops or compression skew.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target: 4K (3840x2160) RGB at 120 FPS.
    - MIPI CSI-2 max bandwidth: ~2.5 GB/s.

    **Calculations:**
    - Frame size: 3840 * 2160 * 3 bytes = 24.88 MB.
    - Required Data Rate: 24.88 MB * 120 FPS = 2985 MB/s (~3.0 GB/s).

    **Conclusion & Interpretation:**
    - **Result: I/O-Bound.** 3.0 GB/s exceeds the physical MIPI CSI-2 link (2.5 GB/s), forcing aggressive ISP compression and training-serving skew.
  options:
  - LPDDR5, ~51.2 GB/s
  - MIPI CSI-2, ~2.5 GB/s
  - UFS 4.0, ~4.2 GB/s
  - SPI, ~10 Mbps
