title: 'Mobile Transformer Cost Fluency: Quick LLM Sizing for Mobile'
scenario: Estimate max INT4 LLM size on an 8GB device, the decode speed for a 3B INT4 model at 100GB/s bandwidth, and the prefill FLOPs for 1024 tokens.
question: What are the quick estimates for maximum INT4 LLM size, 3B decode speed, and 1024-token prefill cost on an 8GB device with 100GB/s bandwidth?
details:
  realistic_solution: '(1) Max INT4 model: (8GB-2GB)/0.5bytes/param = 6GB/0.5=12B
    params. Safely run 12B INT4 model (with minimal KV cache). (2) 3B INT4: 1.5GB.
    Decode: 1.5GB/100GB/s=15ms/token=67 tok/s. Latency: 15ms/tok. (3) Prefill 1024
    tokens, 3B model: FLOPs = 2*3B*1024=6.14T FLOPs (2N*seq approximation). Time (compute):
    6.14T/35T=0.175s=175ms. Check bandwidth: weights=1.5GB, activations~1GB=2.5GB.
    Time (BW): 2.5GB/100GB/s=25ms. Compute-bound for prefill (175ms > 25ms). Actual
    prefill time ≈ 175ms. Compute utilization is high during prefill, unlike decode.'
  common_mistake: |
    **The Pitfall:** Forgetting INT4 means 0.5 bytes per parameter.
    **The Rationale:** Candidates default to 1 byte per param (INT8) or incorrectly calculate the available RAM left after OS overhead.
    **The Consequence:** Massively under-sizing the maximum deployable model, leaving potential on-device capability on the table.
  napkin_math: |
    - **Max Model Size:** (8 GB - 2 GB OS overhead) / 0.5 bytes/param = 12B parameters (INT4).
    - **3B Decode Speed:** 1.5 GB weights / 100 GB/s = 15 ms/token (66.7 tok/s, memory bound).
    - **Prefill FLOPs:** 2 * 3B params * 1024 tokens = 6.14 TeraFLOPs.
    - **Prefill Time:** 6.14 TFLOPs / 35 TOPS = 175 ms (compute bound vs 25ms memory bound).
    - **Result:** **12B max size**, **~67 tok/s decode**, and **175ms prefill**.
