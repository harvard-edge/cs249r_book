title: On-Device Guardrail Latency and Memory
scenario: You are deploying an on-device text assistant on an Exynos 2400. To satisfy organizational guardrails, a 1-billion parameter toxicity classifier (quantized to INT8) must process the 128-token output of the main generative model before displaying it. The NPU provides 34.7 TOPS.
question: What is the memory footprint and theoretical compute latency for a 1B INT8 guardrail classifier on the Exynos 2400?
details:
  realistic_solution: Calculate the static memory footprint using 1 byte per parameter for INT8, recognizing this 1 GB chunk reduces the memory available for the primary LLM and system tasks. Then, use the standard 2*N*P formula to find the required operations and divide by the NPU's peak TOPS to find the theoretical compute-bound latency, while acknowledging that memory bandwidth will likely be the true bottleneck in practice.
  common_mistake: |
    **The Pitfall:** Forgetting that the 12 GB LPDDR5X is highly contended shared memory.
    **The Rationale:** Engineers calculate basic metrics correctly but map them to a desktop-style architecture, ignoring the SoC's holistic constraints.
    **The Consequence:** Deploying a multi-model pipeline that unexpectedly crashes the camera ISP or UI compositor due to OOM conditions.
  napkin_math: |
    1. **Memory Footprint:** 1B params $\times$ 1 byte/param (INT8) = 1 GB (consumes $\sim$8.3% of the 12 GB LPDDR5X).
    2. **Compute Operations:** $2 \times 128 \text{ tokens} \times 1\text{B params}$ = 256 Giga-Operations (GOPS).
    3. **Peak Latency:** 256 GOPS / 34,700 GOPS (34.7 TOPS) = 0.00737 seconds.
    4. **Conclusion:** Theoretical compute latency is **7.37 ms**, though memory bandwidth limits will dominate actual execution.
