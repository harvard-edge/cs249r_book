title: A17 Pro LPDDR Bandwidth for Inference
scenario: The Apple A17 Pro Neural Engine evaluates a 50MB INT8 vision transformer at 30 FPS. The SoC has 16MB of persistently available SRAM to pin the most heavily used weights.
question: Calculate the minimum LPDDR memory bandwidth required to run this model if the remaining weights must be streamed from main memory each frame.
details:
  realistic_solution: 'By pinning 16MB of the most frequently accessed weights in SRAM, the remaining 34MB must be streamed per frame from main memory. At 30 FPS, the LPDDR memory bandwidth required is 1020 MB/s (1.02 GB/s).'
  common_mistake: |
    **The Pitfall:** Calculating bandwidth using the full 50MB model size.
    **The Rationale:** Candidates fail to subtract the SRAM cache footprint from the total model size.
    **The Consequence:** Overestimating memory bandwidth requirements by roughly 47%.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model Size: 50 MB (INT8).
       - Pinned SRAM Capacity: 16 MB.
       - Target Framerate: 30 FPS.
    2. **Calculations:**
       - Streaming Weights Required: 50 MB - 16 MB = 34 MB.
       - Required Memory Bandwidth: 34 MB/frame * 30 FPS = 1020 MB/s (1.02 GB/s).
    3. **Conclusion & Interpretation:**
       - **Result: 1.02 GB/s.**
       - **Bottleneck: Memory-Bandwidth Bound** (Pinning layers in SRAM prevents full-model streaming, reducing the required LPDDR bandwidth from 1.5 GB/s to 1.02 GB/s).
