title: 'Tensor G3 TPU Pipeline Throughput Calculation'
scenario: 'You are building an on-device data ingestion pipeline for real-time sensor processing on a Google Tensor G3. The pipeline streams raw sensor data directly to the on-device TPU, which boasts a peak compute of 7.5 TOPS. The TPU inference requires exactly 50,000 operations per byte of input data.'
question: 'What maximum sensor data throughput can Tensor G3 sustain at 80% TPU utilization and 50,000 ops per byte?'
details:
  realistic_solution: 'Calculate the effective operations per second by applying the 80% utilization factor to the 7.5 TOPS peak. Divide this effective compute capacity by the required operations per byte to determine the maximum byte throughput, then convert to MB/s.'
  common_mistake: |
    **The Pitfall:** Utilizing the theoretical 100% peak compute capability for sustained pipeline design.
    **The Rationale:** Engineers forget that sustained data pipelines must account for framework overhead, thermal limits, and OS scheduling via an effective utilization factor.
    **The Consequence:** Designing an ingestion pipeline that inherently drops frames and stutters because the hardware cannot sustain theoretical peak throughput indefinitely.
  napkin_math: |
    **Assumptions & Constraints:**
    - Peak TPU Compute: 7.5 TOPS = 7.5 x 10^12 operations/sec.

    **Calculations:**
    - Effective Compute: 7.5 x 10^12 x 0.80 = 6.0 x 10^12 operations/sec.
    - Byte Throughput: (6.0 x 10^12 OPS) / (50,000 OPS/byte) = 120,000,000 bytes/sec.
    - Final Conversion: 120,000,000 / 1,000,000 = 120 MB/s.

    **Conclusion & Interpretation:**
    - **Result: 120 MB/s (Compute-Bound)**. The final byte throughput conversion.
