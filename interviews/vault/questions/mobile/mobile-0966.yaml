title: 'Latency Decomposition: Full Mobile ML App Latency Audit with User-Perceived
  Delay'
scenario: 'A mobile photo editing app uses on-device style transfer (15M param CNN,
  INT8) on A17 Pro (35 TOPS, 8GB). The user-perceived latency from tap to preview
  includes: touch event latency (16ms at 60Hz), image decode from disk (HEIC 12MP),
  pre-processing, inference, post-processing, and display render. Audit all components
  and identify where to invest optimization effort.'
question: What is the tap-to-preview latency breakdown for the style transfer app,
  and which component should be optimized first?
details:
  realistic_solution: 'Touch event: 16ms. HEIC decode (12MP): CPU ~60ms. Resize to
    512×512: 2ms. CNN inference (15M params at INT8, ~3 GOPs): 3G/35T ≈ 0.086ms, realistic
    5ms. Post-process: 2ms. Texture upload to GPU: 512×512×4=1MB, ~1ms. Display pipeline:
    16ms (next vsync). Total: 16+60+2+5+2+1+16 = 102ms. Optimize HEIC decode with
    VideoToolbox HW decoder → 8ms. New total: 50ms. Remaining: optimize resize with
    Metal → 0.5ms.'
  common_mistake: Focusing optimization on the CNN inference (fastest component) while
    ignoring HEIC decode (CPU-bound, 40-80ms) and display pipeline (two-frame delay
    = 33ms at 60Hz).
  napkin_math: 'HEIC 12MP decode: ~60ms CPU. HW decode: ~8ms (7.5× speedup). CNN:
    3 GOPs / 35 TOPS = 0.086ms theoretical; 5ms measured (memory bandwidth limited:
    15M×1byte=15MB weights, 15MB/68GB/s=0.22ms + activation memory). Display: 16ms
    vsync. Optimized total: 16+8+2+5+2+1+16 = 50ms. Under 100ms perceptual threshold.'
