title: The Federated Learning Battery Tax
scenario: You are building Federated Learning (FL) for a mobile keyboard app. Each user's device performs one local 5-minute training round per day, drawing 3W.
question: How much annual energy does one 5-minute, 3W federated learning round per day consume on a user's phone?
details:
  realistic_solution: Calculate the energy consumed per day, then scale it to a full year. The key is ensuring time units are consistent (hours) to calculate Watt-hours.
  common_mistake: |
    **The Pitfall:** Confusing power (Watts) with energy (Watt-hours) or failing to convert time units.
    **The Rationale:** Engineers often ignore the 'hidden' physical cost transferred to the user's battery or fail to correctly convert minutes to hours.
    **The Consequence:** Incorrect estimation of battery impact across the fleet.
  napkin_math: |
    **Assumptions & Constraints:**
    - Power: 3 Watts.
    - Daily Active Time: 5 minutes.
    - Days: 365.

    **Calculations:**
    - Active Time in Hours: 5 / 60 = 1/12 hours.
    - Daily Energy: 3 W * (1/12) h = 0.25 Wh.
    - Annual Energy: 0.25 Wh * 365 = 91.25 Wh.

    **Conclusion & Interpretation:**
    - **Result: 91.25 Wh (Energy-Capacity-Bound)**. The annual energy consumed is exactly 91.25 Wh per device, imposing a highly measurable battery tax on the entire user fleet.
  options:
  - '15 Wh. (Trap: 3W * 5 min)'
  - '1,095 Wh. (Trap: 3W * 365 without hour conversion)'
  - 91.25 Wh.
  - '2190 Wh. (Trap: Wrong unit base entirely)'
  correct_index: 2
