title: The Federated Learning Battery Tax
scenario: You are an engineer for a popular mobile keyboard app. To improve personalization without violating
  user privacy, your team decides to use Federated Learning (FL). The plan is for each user's device to
  perform one local training round per day. This training round runs for 5 minutes while the device is
  idle, charging, and on Wi-Fi.
details:
  realistic_solution: The correct approach is to first calculate the energy consumed per day, and then
    scale it up to a full year. The key is to ensure the time units are consistent (hours) to correctly
    calculate Watt-hours.
  common_mistake: Engineers often focus only on the server-side benefits of FL, like reduced data storage
    and centralized compute costs. A common mistake is to ignore or miscalculate the 'hidden' cost transferred
    to the user's device, primarily battery drain. Calculation errors typically involve confusing power
    (a rate, in Watts) with energy (a quantity, in Watt-hours) or failing to correctly convert time units
    (minutes to hours).
  napkin_math: 1. **Power:** P = 3 W | 2. **Daily Active Time:** t_daily = 5 minutes = 5/60 hours = 1/12
    hours | 3. **Daily Energy:** E_daily = P × t_daily = 3 W × (1/12) h = 0.25 Wh | 4. **Annual Energy:**
    E_annual = E_daily × 365 = 0.25 Wh × 365 = 91.25 Wh
  options:
  - '15 Wh. (Mistake: Ignores time unit conversion, calculating 3W × 5 minutes)'
  - '1,095 Wh. (Mistake: Ignores the 5-minute duty cycle, calculating 3W × 365 days)'
  - 91.25 Wh. (Correct)
  - '2190 Wh. (Mistake: Assumes 24/7 operation, calculating 3W * 24h * 365d, but only for training)'
  correct_index: 2
