title: The Federated Learning Battery Tax
scenario: "You are an engineer for a popular mobile keyboard app. To improve personalization without violating user privacy, your team decides to use Federated Learning (FL). The plan is for each user's device to perform one local training round per day. This training round runs for 5 minutes while the device is idle, charging, and on Wi-Fi."
question: "How much annual energy does one 5-minute, 3W federated learning round per day consume on a user's phone?"
details:
  realistic_solution: The correct approach is to first calculate the energy consumed per day, and then scale it up to a full year. The key is to ensure the time units are consistent (hours) to correctly calculate Watt-hours.
  common_mistake: |
    **The Pitfall:** Confusing power with energy or failing to convert time units.
    **The Rationale:** Engineers often ignore the 'hidden' cost transferred to the user's device (battery drain) or fail to convert minutes to hours when calculating Watt-hours.
    **The Consequence:** Incorrect estimation of battery impact.
  napkin_math: |
    - Power: `P = 3 W`
    - Daily Active Time: `t_daily = 5 minutes = 5/60 hours = 1/12 hours`
    - Daily Energy: `E_daily = P * t_daily = 3 W * (1/12) h = 0.25 Wh`
    - Annual Energy: `E_annual = E_daily * 365 = 0.25 Wh * 365 = 91.25 Wh`
    - **Conclusion:** The annual energy consumed is **91.25 Wh**.
  options:
  - 15 Wh.
  - 1,095 Wh.
  - 91.25 Wh.
  - 2190 Wh.
  correct_index: 2
