title: The AutoScribe Jank Crisis
scenario: You are the lead ML Systems Engineer designing the 'AutoScribe' feature for a new flagship electric
  vehicle. This feature continuously transcribes a driver's spoken notes in real-time onto the dashboard
  UI, while a powerful, on-device generative LLM concurrently summarizes and structures the notes in the
  background.
details:
  realistic_solution: The correct architecture is a preemptive, real-time scheduling system that treats
    the LLM not as a single task, but as a low-priority, interruptible stream of micro-tasks.
  common_mistake: 'A common but flawed approach is to simply assign the LLM to the NPU and the transcription
    model to the CPU. This completely ignores the scheduling and resource contention problem. A large
    LLM prefill, even on the NPU, will monopolize the shared memory bus for hundreds of milliseconds,
    starving the GPU of the data it needs to render the UI and causing a catastrophic system freeze. It
    fails to address the core issue: the duration of the monolithic task, not just its location.'
  napkin_math: Let's quantify why a monolithic LLM call is impossible. Assume the driver has spoken for
    a minute, generating 2048 tokens for the 1.5B parameter LLM to summarize.
