title: The AutoScribe Jank Crisis
scenario: You are the lead ML Systems Engineer designing the 'AutoScribe' feature for a new flagship electric vehicle. This feature continuously transcribes a driver's spoken notes in real-time onto the dashboard UI, while a powerful, on-device generative LLM concurrently summarizes and structures the notes in the background.
question: How should AutoScribe schedule transcription and LLM summarization to avoid UI freezes and meet real-time deadlines?
details:
  realistic_solution: |
    The correct architecture is a preemptive, real-time scheduling system that treats the LLM not as a single task, but as a low-priority, interruptible stream of micro-tasks.
  common_mistake: |
    **The Pitfall:** Simply assigning the LLM to the NPU and transcription to the CPU.
    **The Rationale:** Candidates ignore the scheduling and resource contention problem on unified memory.
    **The Consequence:** A large LLM prefill monopolizes the memory bus, starving the GPU and causing a catastrophic UI freeze.
  napkin_math: |
    - Assume the driver speaks for a minute, generating 2048 tokens.
    - A 1.5B parameter LLM prefill on 2048 tokens might take **>500ms** of continuous memory bus saturation.
    - This entirely blocks the GPU from rendering the UI at 60 FPS (16.6ms budget).
