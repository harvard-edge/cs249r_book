title: Specify hardware interrupts to maximize mobile accelerometer duty cycling
scenario: A mobile phone uses its Snapdragon 8 Gen 3 to track user steps. Polling the accelerometer continuously prevents the CPU from entering low-power states.
question: How should the application use hardware interrupts to improve accelerometer duty cycling?
details:
  realistic_solution: The application should configure the accelerometer chip's internal threshold to trigger a hardware interrupt only when a step motion is detected. The CPU remains entirely in a deep sleep state and wakes up only upon receiving this physical interrupt to increment the step counter, maximizing the low-power sleep cycle.
  common_mistake: |
    **The Pitfall:** Increasing the software polling sleep interval instead of using interrupts.

    **The Rationale:** Assuming fewer polls solves the power drain, without realizing any poll still wakes the CPU unnecessarily.

    **The Consequence:** The CPU continues to wake up periodically even when the device is stationary, draining the battery.
  napkin_math: |
    *   Continuous polling: Wakes CPU constantly, even when stationary.
    *   Interrupt-driven: CPU stays in deep sleep.
    *   **Result:** 0 CPU wakeups per minute if the phone is perfectly stationary.
