title: Tensor G3 On-Device Inference Costing
scenario: Your team is developing a new on-device AI feature running on the Google Pixel 8's Tensor G3. The feature uses an LLM requiring approximately 500 billion FLOPs per inference. The Tensor G3 features a 7.5 TOPS TPU and 12 GB LPDDR5X memory.
question: How would you cost Tensor G3 on-device inference across profiling, quantization, and memory limits for a 500 GFLOP LLM?
details:
  realistic_solution: A realistic solution would involve benchmarking the unoptimized model to get baseline FLOPs, memory footprint, and latency. Decide on an appropriate quantization scheme (e.g., INT8) and estimate its impact on model size, accuracy, and FLOPs reduction. Research and apply specific optimization techniques for the Tensor G3's TPU. Run the optimized model on actual Tensor G3 hardware to measure real-world latency, throughput, and power consumption per inference. Calculate actual operations per inference on the device and compare against TPU capacity. Estimate the person-hours for research, implementation, and testing of quantization and optimization strategies. Consider the impact on battery life and the potential need for hardware upgrades.
  common_mistake: |
    **The Pitfall:** Only focusing on raw FLOPs and peak theoretical TOPS to estimate feasibility.
    **The Rationale:** Candidates treat mobile processors as theoretical math engines, completely ignoring memory bandwidth ceilings and the massive engineering cost of quantization toolchains.
    **The Consequence:** Promising an impossible latency target and drastically underestimating the engineering timeline required for deployment.
  napkin_math: |
    1. **Model Compute:** 500 billion FLOPs = 0.5 TeraFLOPs (TFLOPs).
    2. **TPU Peak Performance:** 7.5 TOPS.
    3. **Minimum Inference Time:** 0.5 TFLOPs / 7.5 TOPS = **0.067 seconds (67 ms)**.
