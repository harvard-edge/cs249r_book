title: Exynos 2400 Shared Memory Exhaustion
scenario: You are deploying a 4-bit quantized 7B LLM on an Exynos 2400 NPU with a shared 12 GB LPDDR5X memory pool. The Android OS consumes 5.5 GB, and the 4-bit weights consume 3.5 GB. The model uses FP16 for the KV cache, with 32 layers and a 4096 hidden dimension. During a long chat session, when the context length reaches exactly 6,000 tokens, the generation speed suddenly drops from 15 tokens/sec to 1 token/sec, and a background app is killed.
question: Why does this specific performance cliff happen at this exact context length based on the hardware specs?
details:
  realistic_solution: |
    At 6,000 tokens, the KV cache grows to exactly exhaust the remaining 3.0 GB of the shared 12 GB memory pool. This forces the OS to kill background apps and thrash memory pages, severely bottlenecking memory bandwidth and destroying generation speed.
  common_mistake: |
    **The Pitfall:** Assuming the NPU's compute limit is the bottleneck for long sequences.
    **The Rationale:** Candidates often ignore the shared memory architecture and fail to calculate the KV cache size.
    **The Consequence:** They recommend compute optimizations instead of memory management or context window limits.
  napkin_math: |
    - KV cache per token = 2 (Key & Value) * 32 (layers) * 4096 (hidden dim) * 2 bytes (FP16) = 524,288 bytes (0.5 MB).
    - KV cache for 6,000 tokens = 6,000 * 0.5 MB = 3,000 MB (3.0 GB).
    - Total memory consumed = 5.5 GB (OS) + 3.5 GB (Weights) + 3.0 GB (KV cache) = 12.0 GB.
    - **Free memory = 12.0 GB - 12.0 GB = 0 GB, triggering OOM and severe thrashing.**
