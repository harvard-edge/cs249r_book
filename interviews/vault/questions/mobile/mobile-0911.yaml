title: 'Fault Tolerance: Design Model Update Safety Protocol for Mobile LLM'
scenario: You are designing a safe model update protocol for a 1B LLM deployed on A17 Pro (35 TOPS Neural Engine, 8GB RAM) as part of a keyboard app with 50M users. An update last month caused crashes on 0.5% of devices (250K users affected).
question: How would you design a fault-tolerant update protocol that limits the blast radius of a bad update to < 0.01% of total users?
details:
  realistic_solution: 'A/B model partitions. Staged rollout: 0.01% (5K) → validation 48h → 0.1% → 1% → 10% → 100%. Device-side: download to B partition, validate 100 inference calls, commit. Kill switch: server-side flag to rollback all devices in < 1 hour.'
  common_mistake: |
    **The Pitfall:** Not implementing a device-side validation step before committing an update.
    **The Rationale:** Engineers assume that if a model passes cloud CI/CD, it will run correctly on all heterogenous client devices.
    **The Consequence:** Unforeseen device-specific hardware or OS issues cause crashes in production, leading to a massive blast radius.
  napkin_math: |
    1. **Stage 1 Rollout:** 0.01% of 50M users = 5,000 devices.
    2. **Crash Rate Monitoring:** Bad update crash rate is 0.5%. On 5,000 devices, this causes 25 crashes.
    3. **Threshold Check:** 25 crashes / 5,000 devices = 0.5%, which exceeds a 0.1% safety threshold. The stage is halted automatically.
    4. **Blast Radius:** 25 users affected = 0.00005% of 50M users.
    5. **Kill Switch Latency:** 5 minutes (polling) + switch to A partition (50ms).
    6. **Validation Overhead:** 100 inference calls on test prompts = 100 × 50ms = 5 seconds per device.
    **The rollout strategy successfully limits the blast radius to well below 0.01%.**
