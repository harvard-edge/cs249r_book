title: Wi-Fi AP Ring Degradation
scenario: 4 smartphones perform AllReduce for 20MB federated learning gradients over
  a shared Wi-Fi 5 access point (300 Mbps aggregate throughput).
question: Analyze the AllReduce completion time for a ring topology over this shared
  wireless medium, assuming a 10ms MAC collision penalty per hop.
details:
  realistic_solution: A ring topology on a shared wireless access point is highly
    suboptimal. Since the medium is shared, the parallel transfers serialize. The
    4 nodes sending 20MB each results in 80MB of total airtime. The synchronization
    cost adds 3 ring hops of MAC collision delay.
  common_mistake: Applying the Ring AllReduce formula without realizing a shared wireless
    medium serializes the transmissions, voiding the parallel bandwidth assumption.
  napkin_math: 80MB = 640Mb. Airtime = 640Mb / 300Mbps = 2.13s. Sync = 3 * 10ms =
    30ms. Total = 2.16s.
