title: Wi-Fi AP Ring Degradation
scenario: "4 smartphones perform AllReduce for 20MB federated learning gradients over a shared Wi-Fi 5 access point (300 Mbps aggregate throughput)."
question: "Analyze the AllReduce completion time for a ring topology over this shared wireless medium, assuming a 10ms MAC collision penalty per hop."
details:
  realistic_solution: "Identify that a wireless Access Point is a shared broadcast medium, meaning transmissions are fundamentally serialized rather than parallel. Calculate the total data block generated across all nodes and divide it by the maximum aggregate throughput. Then append the cumulative collision penalty accrued through forced sequential handshakes."
  common_mistake: |
    **The Pitfall:** Applying standard datacenter Ring AllReduce formulas that assume dedicated, full-duplex links.
    **The Rationale:** Candidates fail to recognize that a Wi-Fi Access Point is a shared, half-duplex broadcast medium where parallel transfers serialize.
    **The Consequence:** The mathematical estimate is fundamentally flawed, wildly underestimating synchronization latency and causing severe federated training stalls.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 4 nodes, 20 MB payload each.
       - Wi-Fi 5 throughput: 300 Mbps.
       - Ring hops: 3 syncs at 10ms MAC penalty each.
    2. **Calculations:**
       - Total Data = 4 * 20 MB = 80 MB = 640 Megabits.
       - Airtime (serialized transfer) = 640 Mb / 300 Mbps = 2.13 seconds.
       - Sync Penalty = 3 hops * 10 ms = 30 ms (0.03 s).
       - Total Latency = 2.13 s + 0.03 s = 2.16 seconds.
    3. **Conclusion & Interpretation:**
       - **Result: Bandwidth-Bound.** Because the medium is shared, the transfers serialize, resulting in a minimum completion time of **2.16 seconds** per synchronization round.
