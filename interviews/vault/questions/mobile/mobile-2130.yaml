title: AirDrop Half-Duplex Sync
scenario: Two Apple A17 Pro devices use AirDrop (Wi-Fi Direct, 400 Mbps) to synchronize
  local 15MB fine-tuning gradients via an AllGather operation.
question: Calculate the total time required for the AllGather, incorporating a 20ms
  session negotiation latency and Wi-Fi Direct's half-duplex constraint.
details:
  realistic_solution: In AllGather, both devices must exchange their 15MB chunks.
    Because Wi-Fi Direct is half-duplex, these transfers cannot occur simultaneously.
    The total payload on the air is 30MB (240Mb). Adding the 20ms negotiation latency
    yields a heavily sequential transfer timeline.
  common_mistake: Applying full-duplex networking formulas to a half-duplex Wi-Fi
    Direct link, falsely halving the required airtime.
  napkin_math: Total air payload = 30MB = 240Mb. 240Mb / 400Mbps = 600ms. Plus 20ms
    sync = 620ms.
