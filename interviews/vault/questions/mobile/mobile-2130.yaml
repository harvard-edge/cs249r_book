title: AirDrop Half-Duplex Sync
scenario: Two mobile devices use Wi-Fi Direct to synchronize local 15MB fine-tuning gradients via an AllGather operation.
question: Calculate the total time required for the AllGather, incorporating a 20ms session negotiation latency and Wi-Fi Direct's half-duplex constraint.
details:
  realistic_solution: |
    To perform an AllGather, both devices must explicitly exchange their local gradients. Wi-Fi Direct operates on a strict half-duplex radio frequency, meaning simultaneous bidirectional transmission is physically impossible. Device A must completely finish its 15MB transmission before Device B can utilize the channel for its 15MB payload. The serial transmission pipeline requires converting payload bytes to bits, dividing by the link bandwidth, and adding the protocol negotiation handshake latency.
  common_mistake: |
    **The Pitfall:** Applying full-duplex networking formulas to a half-duplex Wi-Fi Direct link.
    **The Rationale:** Candidates treat Wi-Fi Direct like a standard Ethernet connection.
    **The Consequence:** They falsely halve the required airtime, drastically underestimating the sync latency.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Payload per device: 15 MB.
       - Network protocol: Wi-Fi Direct (400 Mbps bandwidth, half-duplex).
       - Negotiation latency: 20 ms.
    2. **Calculations:**
       - Total sequential payload = 15 MB + 15 MB = 30 MB.
       - Convert bytes to bits = 30 MB * 8 = 240 Megabits (Mb).
       - Transmission time = 240 Mb / 400 Mbps = 0.6 seconds = 600 ms.
       - Total Time = 600 ms (transfer) + 20 ms (negotiation) = 620 ms.
    3. **Conclusion & Interpretation:**
       - **Result: Network Bandwidth-Bound.** Because the link is half-duplex, the transfers serialize. Treating wireless links as full-duplex Ethernet creates catastrophic latency underestimations.
