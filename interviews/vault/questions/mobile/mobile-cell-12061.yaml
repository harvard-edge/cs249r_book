title: 'Model Format Conversion: Recall ONNX Opset Compatibility for Mobile Deployment'
scenario: 'A junior engineer asks: ''What is the recommended ONNX opset version for converting PyTorch
  models to CoreML for iOS deployment, and why does opset version matter for mobile targets?'' Provide
  the answer with concrete compatibility numbers.'
details:
  realistic_solution: 'Recommended: ONNX opset 17 for CoreML via coremltools 7.x. Opset 18 adds attention
    ops (SDPA) not yet fully parsed. For TFLite via ONNX-TFLite converter: opset 13-14 for best compatibility.
    Opset version matters because each new opset introduces new op definitions; mobile runtimes lag 6-12
    months behind PyTorch''s latest opset. Always specify explicitly: torch.onnx.export(model, ..., opset_version=17).'
  common_mistake: Using the latest ONNX opset (opset 19+) which may not yet be supported by coremltools
    or mobile ONNX runtimes, causing conversion failures.
  napkin_math: 'ONNX opset timeline: opset 13 (PyTorch 1.9, 2021), opset 17 (PyTorch 2.0, 2023), opset
    19 (2023). CoreML support: opset 15 as of coremltools 7.0 (2023). TFLite converter: opset 14 stable.
    Using opset 19 with coremltools 7: ~40% of new ops unsupported → conversion failure rate ~30% for
    modern models. Use opset 17 → <5% failure rate.'
