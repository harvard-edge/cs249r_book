title: The Speculative Speedup
scenario: You're deploying an INT4-quantized 7B LLM on a high-end mobile device (e.g., Snapdragon 8 Gen
  3). The goal is real-time code generation, but the token rate is only ~10 tokens/sec, which feels sluggish.
  Your colleague proposes implementing speculative decoding, using a small, 200M parameter model as a
  'draft' generator. Analyze the feasibility of this approach. Specifically, examine why this might provide
  a speedup despite adding a second model. Calculate the expected token throughput, assuming the draft
  model can generate 4 tokens that are accepted by the main model 75% of the time (i.e., an average of
  3 tokens are accepted per verification step).
question: "Why can speculative decoding speed up a mobile 7B LLM despite adding a second draft model?"
details:
  realistic_solution: This approach is not only feasible but is one of the most effective strategies for
    accelerating LLMs on memory-bandwidth-constrained devices like phones. The core insight is that token
    generation is bound by the 'Memory Wall'. Each new token requires a full pass over the large 7B model's
    weights, which must be streamed from the slow LPDDR5 DRAM. This takes far longer than the actual math.
  common_mistake: Assuming the primary bottleneck for LLM inference is arithmetic computation (TOPS).
    While compute is a factor, for single-token generation (low batch size), the process is almost always
    entirely limited by memory bandwidth—the time it takes to read the model's weights from DRAM. An analysis
    that only compares FLOPs will incorrectly conclude that speculative decoding adds overhead and slows
    things down.
  napkin_math: Snapdragon 8 Gen 3 bandwidth is 77 GB/s. 7B INT4 = 3.5GB weights. Max generation rate =
    77 / 3.5 = 22 tok/sec (ideal). You see 10 tok/sec due to overhead. Speculative decoding uses a 200M
    draft model (100MB INT4). Fetching draft + batch verifying 4 tokens simultaneously pushes throughput
    closer to 20 tok/sec.
