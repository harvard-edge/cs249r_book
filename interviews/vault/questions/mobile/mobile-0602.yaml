title: The Speculative Speedup
scenario: You're deploying an INT4-quantized 7B LLM on a high-end mobile device (e.g., Snapdragon 8 Gen 3). The goal is real-time code generation, but the token rate is only ~10 tokens/sec, which feels sluggish. Your colleague proposes implementing speculative decoding, using a small, 200M parameter model as a 'draft' generator. The draft model can generate 4 tokens that are accepted by the main model 75% of the time.
question: Why can speculative decoding speed up a mobile 7B LLM despite adding a second draft model?
details:
  realistic_solution: This approach is not only feasible but is one of the most effective strategies for accelerating LLMs on memory-bandwidth-constrained devices like phones. The core insight is that token generation is bound by the 'Memory Wall'. Each new token requires a full pass over the large 7B model's weights, which must be streamed from the slow LPDDR5 DRAM. This takes far longer than the actual math.
  common_mistake: |
    **The Pitfall:** Assuming adding a second model will strictly slow down inference due to increased FLOPs.
    **The Rationale:** Engineers view LLMs as compute-bound and assume more FLOPs = more latency.
    **The Consequence:** They discard speculative decoding, not realizing that single-batch token generation is fundamentally memory-bandwidth bound, and speculative decoding turns memory-bound single tokens into highly efficient batched verifications.
  napkin_math: |
    1. **Main Model Memory Bound:** Snapdragon 8 Gen 3 bandwidth is ~77 GB/s. 7B INT4 = 3.5GB weights. Max theoretical generation rate = 77 / 3.5 = 22 tok/sec. (Observed is 10 tok/sec).
    2. **Draft Model Size:** A 200M draft model at INT4 is 100MB.
    3. **Speculative Decoding Mechanics:** The draft model generates 4 tokens cheaply. The 7B model verifies all 4 tokens in a *single* forward pass (which takes the same memory bandwidth time as 1 token).
    4. **Acceptance Yield:** 4 tokens * 75% acceptance = 3 accepted tokens per 7B forward pass.
    **By batching verification, throughput effectively triples, pushing generation closer to 20-30 tok/sec.**
