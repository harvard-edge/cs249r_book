title: Mobile NPU Phase Optimization
scenario: A Snapdragon 8 Gen 3 serves an LLM. The context prefill uses large dense
  GEMM operations, while token decoding uses vector-matrix multiplications.
question: Explain why dynamically switching from a compute-optimized kernel for prefill
  to a bandwidth-optimized kernel for decoding improves overall token throughput.
details:
  realistic_solution: The prefill phase processes many tokens simultaneously (matrix-matrix
    multiplication), heavily utilizing the NPU's MAC arrays and making the operation
    strictly compute-bound. Token generation, however, is auto-regressive (matrix-vector
    multiplication); it requires loading the entire model's weights from memory for
    every single generated token, making it intensely memory-bandwidth bound. A compute-optimized
    kernel maximizes arithmetic intensity, whereas a bandwidth-optimized kernel prioritizes
    cache locality, memory coalescing, and prefetching to hide LPDDR5 latencies.
  common_mistake: Confusing the arithmetic intensity of prefill and decoding, leading
    to the assumption that decoding is limited by NPU clock speed.
  napkin_math: Prefill arithmetic intensity = O(Batch * SeqLen). Decode intensity
    = O(1). Switching kernels isolates the two limiters.
