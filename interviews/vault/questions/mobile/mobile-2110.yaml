title: Mobile NPU Phase Optimization
scenario: A mobile SoC serves an LLM. The context prefill uses large dense GEMM operations, while token decoding uses vector-matrix multiplications.
question: "Why does dynamically switching from a compute-optimized kernel for prefill to a bandwidth-optimized kernel for decoding improve token throughput?"
details:
  realistic_solution: |
    Prefill is compute-bound, maximizing arithmetic intensity. Decoding is memory-bandwidth bound, requiring entire model weight loading per token. Switching kernels isolates these two distinct limits.
  common_mistake: |
    **The Pitfall:** Confusing the arithmetic intensity of prefill and decoding.
    **The Rationale:** Candidates often assume all LLM phases are bound by the same hardware constraint.
    **The Consequence:** This leads to the assumption that decoding throughput is limited by NPU clock speed rather than memory bandwidth, resulting in flawed optimization efforts.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Prefill: Matrix-Matrix multiplication.
       - Decode: Matrix-Vector multiplication.
    2. **Calculations:**
       - Prefill AI: O(Batch * SeqLen) -> High ratio of math to memory.
       - Decode AI: O(1) -> Loads all weights for a single token.
    3. **Conclusion & Interpretation:**
       - **Result: Dual Bottlenecks.** Prefill is bound by ALU compute; decoding is bound by memory bandwidth. Switching kernels isolates these limits.
