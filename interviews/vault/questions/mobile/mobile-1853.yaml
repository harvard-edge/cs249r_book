title: Privacy Budget Allocation for On-Device Fine-Tuning
scenario: A mobile keyboard app wants to fine-tune a next-word prediction model on user typing history using DP-SGD directly on the device. The app has a total privacy budget of ε=3.0 for the model's lifetime. Users type an average of 50 messages/day. The model fine-tunes nightly over 90 days.
question: How would you design a per-epoch budget allocation strategy that maximizes model utility while respecting the lifetime budget?
details:
  realistic_solution: 'Use a decaying privacy budget schedule mirroring learning rate schedules: allocate higher per-epoch ε early in training when gradients are large and informative, then tighten noise in later epochs. Two-phase: Phase 1 (days 1–20): ε_phase1 = 1.8 (60% of budget), larger noise scale for early feature learning. Phase 2 (days 21–90): ε_phase2 = 1.2 (40% budget) over 70 days, tight noise for fine-grained personalization. Under advanced composition, total ε ≤ ε_phase1 + ε_phase2 = 3.0. On-device constraint: 10MB model, Snapdragon 8cx memory, per-example gradients require micro-batching with batch size 1 at each step — compute DP-LoRA on embedding layers only to reduce gradient tensor size.'
  common_mistake: |
    **The Pitfall:** Allocating an equal ε per epoch (ε/90 per night).
    **The Rationale:** Candidates ignore training dynamics where early gradient updates have higher magnitude and utility.
    **The Consequence:** Wasting budget on late epochs while injecting too much noise in early epochs, destroying model convergence.
  napkin_math: |
    - **Total Steps:** 50 messages/day × 90 days = 4,500 training examples. With batch size 1, T = 4,500 steps.
    - **Target Budget:** ε_total = 3.0 over 4,500 steps.
    - **Per-step Epsilon:** ε_step ≈ 3.0 / √(4500) ≈ **0.045 per step**.
    - **Required Noise Multiplier:** σ ≈ Δf · √(2·ln(1.25/δ)) / ε_step ≈ 1.0 · 3.3 / 0.045 ≈ **73**.
    - **Optimization:** DP-LoRA reduces gradient dimension (Δf), allowing σ≈5 at the same privacy level.
