title: Privacy Budget Allocation for On-Device Fine-Tuning
scenario: A mobile keyboard app wants to fine-tune a next-word prediction model on
  user typing history using DP-SGD directly on the device. The app has a total privacy
  budget of ε=3 for the model's lifetime. Users type an average of 50 messages/day.
  The model fine-tunes nightly over 90 days. Design a per-epoch budget allocation
  strategy that maximizes model utility while respecting the lifetime budget.
question: How would you design a per-epoch budget allocation strategy that maximizes
  model utility while respecting the lifetime budget?
details:
  realistic_solution: 'Use a decaying privacy budget schedule mirroring learning rate
    schedules: allocate higher per-epoch ε early in training when gradients are large
    and informative, then tighten noise in later epochs. Two-phase: Phase 1 (days
    1–20): ε_phase1 = 1.8 (60% of budget), larger noise scale for early feature learning.
    Phase 2 (days 21–90): ε_phase2 = 1.2 (40% budget) over 70 days, tight noise for
    fine-grained personalization. Under advanced composition, total ε ≤ ε_phase1 +
    ε_phase2 = 3.0. On-device constraint: 10MB model, Snapdragon 8cx memory, per-example
    gradients require micro-batching with batch size 1 at each step — compute DP-LoRA
    on embedding layers only to reduce gradient tensor size.'
  common_mistake: Allocating equal ε per epoch (ε/90 per night) ignores early-training
    dynamics where larger gradient updates have higher utility. A flat budget is utility-inefficient.
  napkin_math: '50 messages/day × 90 days = 4,500 training examples over lifetime.
    Batch size 1 (required for per-example grads on mobile), T = 4,500 steps. Per-step
    ε under Gaussian: ε_step = √(2·ln(1.25/δ))·(Δf/σ). Target ε_total = 3.0 over 4,500
    steps → ε_step ≈ 3.0/√(4500) ≈ 0.045 per step. Required σ ≈ Δf·√(2·ln(1.25/δ))/ε_step
    ≈ 1.0·3.3/0.045 ≈ 73. DP-LoRA (rank=8, 500K params) reduces Δf effectively, allowing
    σ≈5 at same privacy level.'
