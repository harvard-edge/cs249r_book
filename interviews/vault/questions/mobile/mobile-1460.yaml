title: On-Device LLM Roofline Analysis on Tensor G3
scenario: You are tasked with deploying an on-device LLM (Gemini Nano, ~1.8 billion
  parameters) on the Google Tensor G3. The G3 features an on-device TPU delivering
  7.5 TOPS and shares 12 GB of LPDDR5X memory (providing roughly 60 GB/s memory bandwidth)
  with the rest of the SoC. Using the roofline model, evaluate whether the autoregressive
  decoding phase (batch size 1) is compute-bound or memory-bound, and predict the
  impact on accelerator utilization and generation throughput if we apply INT4 weight-only
  quantization instead of INT8.
question: How would you perform a roofline analysis for Tensor G3 on-device LLM generation?
details:
  realistic_solution: A strong L5 candidate will immediately recognize that autoregressive
    generation at batch size 1 loads the entire model weight matrix from the 12 GB
    LPDDR5X memory for every single token generated, resulting in extremely low arithmetic
    intensity. They will calculate the ridge point of the Tensor G3 and compare it
    to the arithmetic intensity of the workload. By recognizing the memory-bound nature
    of the problem, they will correctly evaluate that moving from INT8 to INT4 reduces
    memory traffic by half, thereby doubling the generation speed and doubling the
    TPU utilization, even though the TPU is still massively underutilized in terms
    of peak compute.
  common_mistake: Candidates often assume that because the TPU provides 7.5 TOPS,
    the model will run near that peak compute limit. They fail to calculate the arithmetic
    intensity of autoregressive decoding at batch size 1, ignoring the fact that generation
    is heavily memory-bandwidth bound rather than compute-bound.
  napkin_math: '1. Tensor G3 Ridge Point = Peak Compute / Peak Memory Bandwidth =
    7.5 TOPS / 60 GB/s = 125 OPS/byte. 2. Arithmetic Intensity (AI) of decoding at
    Batch 1: Each weight is loaded once for 1 MAC (2 OPS). For INT8 (1 byte/weight),
    AI = 2 OPS / 1 byte = 2 OPS/byte. 3. Roofline diagnosis: 2 OPS/byte << 125 OPS/byte.
    The workload is strictly memory-bound. TPU utilization is roughly 2 / 125 = 1.6%.
    4. Throughput (INT8): 60 GB/s / 1.8 GB model = ~33 tokens/sec. 5. With INT4 (0.5
    bytes/weight), AI = 2 OPS / 0.5 bytes = 4 OPS/byte. 6. Throughput (INT4): 60 GB/s
    / 0.9 GB model = ~66 tokens/sec.'
