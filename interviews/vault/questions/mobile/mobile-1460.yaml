title: On-Device LLM Roofline Analysis on Tensor G3
scenario: You are tasked with deploying an on-device LLM (~1.8 billion parameters) on a mobile TPU delivering 7.5 TOPS and sharing 12 GB of LPDDR5X memory (60 GB/s bandwidth).
question: Using the roofline model, evaluate whether autoregressive decoding (batch size 1) is compute-bound or memory-bound, and predict the impact of INT4 weight-only quantization.
details:
  realistic_solution: A strong L5 candidate will immediately recognize that autoregressive generation at batch size 1 loads the entire model weight matrix from the 12 GB LPDDR5X memory for every single token generated, resulting in extremely low arithmetic intensity. They will calculate the ridge point of the device and compare it to the arithmetic intensity of the workload. By recognizing the memory-bound nature of the problem, they will correctly evaluate that moving from INT8 to INT4 reduces memory traffic by half, thereby doubling the generation speed and doubling the TPU utilization, even though the TPU is still massively underutilized in terms of peak compute.
  common_mistake: |
    **The Pitfall:** Assuming that because the TPU provides 7.5 TOPS, the model will run near that compute limit.
    **The Rationale:** Candidates fail to calculate the arithmetic intensity of batch size 1 decoding, relying solely on advertised hardware capability.
    **The Consequence:** Developers waste time optimizing TPU compute kernels when the true bottleneck is LPDDR5X read bandwidth.
  napkin_math: |
    - **Hardware Ridge Point:** 7.5 TOPS / 60 GB/s = 125 OPS/byte.
    - **Arithmetic Intensity (INT8):** At batch size 1, 1 byte/weight yields 2 OPS/byte. 2 << 125, so it is deeply memory-bound (1.6% TPU util).
    - **Arithmetic Intensity (INT4):** 0.5 bytes/weight yields 4 OPS/byte.
    - **Result:** **Moving to INT4 doubles throughput from ~33 tokens/sec to ~66 tokens/sec by halving memory traffic.**
