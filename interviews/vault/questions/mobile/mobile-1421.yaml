title: Dual-Core NPU Operator Scheduling for Memory Contention Mitigation
scenario: A real-time vision model is deployed on a Samsung Exynos NPU, which features a dual-core architecture and shares 12 GB of LPDDR5X memory with the CPU, GPU, and ISP. During concurrent execution with a heavy ISP workload, the vision model experiences severe memory thrashing, dropping NPU compute utilization to just 30%. You must analyze the execution graph to determine which operators should be scheduled sequentially versus parallelized.
question: How should dual-core Exynos NPU operators be scheduled to reduce shared memory contention?
details:
  realistic_solution: Analyze the execution graph to classify operators by their arithmetic intensity. Schedule compute-bound operators in parallel across the dual cores to leverage the 34.7 TOPS capacity. Conversely, serialize the execution of memory-bound operators to constrain the peak bandwidth requirement and working set size, ensuring the ISP retains sufficient bandwidth. Apply layer fusion to intermediate operators to avoid materializing tensors to the shared memory.
  common_mistake: |
    **The Pitfall:** Aggressively parallelizing all independent network branches across the dual-core NPU.
    **The Rationale:** Candidates assume that maximizing TOPS utilization is always the optimal strategy for performance.
    **The Consequence:** Parallel execution of memory-bound operators creates bandwidth bottlenecks in the shared LPDDR5X subsystem, exacerbating contention with the ISP and causing thrashing.
  napkin_math: |
    - **Bandwidth Contention:** Two parallel memory-bound branches demanding 4 GB/s each equals 8 GB/s total.
    - **Sequential Reduction:** Scheduling them sequentially drops the NPU bandwidth requirement to 4 GB/s, allowing coexistence with the ISP.
    - **Compute Impact:** Achieving 20 TOPS requires ~58% of the available 34.7 TOPS, which is sustainable when memory bottlenecks are removed.
    - **Result:** **Sequential scheduling of memory-bound ops eliminates the memory bottleneck while maintaining compute targets.**
