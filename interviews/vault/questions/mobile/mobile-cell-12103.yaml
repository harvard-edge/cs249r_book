title: 'Model Size Estimation: Design On-Device ML Memory Architecture for Dual-Model iPhone App'
scenario: Design the on-device memory architecture for an iPhone app (A17 Pro, 8GB) that simultaneously
  runs (1) a real-time portrait mode segmentation model (fast, low quality, 10M params INT8) for viewfinder
  preview at 60fps and (2) a high-quality portrait model (50M params FP16) triggered on photo capture.
  Minimize memory use while meeting 60fps preview requirement.
question: "How should the iPhone app keep preview and high-quality portrait models in memory while meeting 60 FPS?"
details:
  realistic_solution: 'Resident: preview model only (10MB INT8, ~50MB activations for 60fps). On capture
    trigger: load HQ model (100MB FP16). Memory: iOS + app: 2GB. Preview model: 60MB. Camera buffers:
    3×4032×3024×3B (HEIF=~36MB per frame compressed; raw = 36MB × 3 buffers) → use YUV420: 4032×3024×1.5=18.3MB
    × 3 buffers = 54.9MB. HQ model (on-demand): 100MB. KV-cache: N/A (CNN). Total: 2000+60+55+100=2215MB
    of 8192MB = 27%. Headroom for other app memory.'
  common_mistake: Keeping both models resident simultaneously when the high-quality model can be loaded
    on-demand (capture is a one-shot operation, not real-time) — saving 100MB by evicting between captures.
  napkin_math: 'Preview CNN: 10MB INT8 + 50MB activations = 60MB. Camera (4K YUV420 triple-buffer): 3×4096×2160×1.5=39.8MB.
    HQ model (50M FP16): 100MB + 200MB activations = 300MB. iOS: 2GB. Total (HQ active): 2000+60+40+300=2400MB
    of 8192MB = 29.3%. Preview only: 2000+60+40=2100MB = 25.6%. Load time for HQ: 100MB from NVMe-speed
    NAND at 3GB/s = 33ms (acceptable for capture flow).'
