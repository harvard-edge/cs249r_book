title: AR Host-Client Wi-Fi Bottleneck
scenario: A multiplayer AR game utilizes 4 Apple A17 Pro devices. Three client devices
  synchronize their 1 MB local pose-graphs to the single host device over a local
  20 MB/s Wi-Fi link.
question: Evaluate whether a 30 Hz sync rate is physically sustainable for the host
  receiving data concurrently from the 3 clients.
visual:
  kind: svg
  path: mobile-1897.svg
  alt: A star network topology with three client nodes pointing incoming edges toward
    one central host node.
  caption: Client to Host Sync Topology
details:
  realistic_solution: At 30 Hz, each of the 3 clients attempts to send 1 MB * 30 =
    30 MB/s to the host. The total inbound data rate at the host would be 3 * 30 MB/s
    = 90 MB/s. Because the Wi-Fi link is capped at 20 MB/s, this architecture falls
    short by a massive 70 MB/s and is completely unsustainable.
  common_mistake: Calculating bandwidth for just a single client (30 MB/s) and assuming
    it fits, or comparing the per-frame payload directly to the per-second bandwidth
    limit.
  napkin_math: 3 clients * 1 MB * 30 Hz = 90 MB/s > 20 MB/s
