title: AR Host-Client Wi-Fi Bottleneck
scenario: A multiplayer AR session aggregates pose data from 3 client devices into a single host. Each client uploads a 1 MB local pose-graph at 30 Hz over Wi-Fi using TCP (~6% framing overhead). The AP provisions a per-client uplink budget of 12 MB/s.
question: Does the client uplink sustain 30 Hz synchronization, and what mitigations resolve the bottleneck?
details:
  realistic_solution: The uplink demand exceeds the budget. Mitigations involve rate reduction or delta encoding.
  common_mistake: |
    **The Pitfall:** Ignoring AP-enforced client budgets or TCP overhead.
    **The Rationale:** Candidates often treat the total Wi-Fi channel capacity as a single bucket, missing that Access Points enforce per-client fairness caps.
    **The Consequence:** The AR experience will suffer from massive latency spikes and dropped frames as the AP forcefully throttles the client's saturated uplink.
  napkin_math: |
    1. Calculate per-client uplink demand: 1 MB * 30 Hz * 1.06 (TCP overhead) = **31.8 MB/s**.
    2. Compare to budget: 31.8 MB/s exceeds the 12 MB/s per-client budget by 2.65x.
    3. Calculate Mitigation A (Rate Cut): 12 MB/s / (1 MB * 1.06) = **11.3 Hz** (unusable for AR).
    4. Calculate Mitigation B (Delta Encoding): 50 KB deltas -> 0.05 MB * 30 Hz * 1.06 = **1.59 MB/s** (fits comfortably).
