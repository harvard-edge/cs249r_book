title: AR Host-Client Wi-Fi Bottleneck
scenario: A multiplayer AR session aggregates pose data from 3 Apple A17 Pro client
  devices into a single A17 Pro host (the topology shown in the reference figure -
  three clients pushing uplink traffic into one central host). Each client uploads
  a 1 MB local pose-graph at 30 Hz over Wi-Fi 6 using TCP, with ~6% framing/ACK overhead
  on the wire. The shared 5 GHz channel is congested and the AP has provisioned a
  per-client client->host uplink budget of 12 MB/s. Downlink (host->clients) is ample
  at 30 MB/s and is not the focus.
visual:
  kind: svg
  path: mobile-1897.svg
  alt: A star network topology with three client nodes pointing incoming edges toward
    one central host node.
  caption: Client to Host Sync Topology
question: Evaluate whether the client->host uplink direction can sustain 3-client,
  30 Hz pose-graph synchronisation. Quantify the aggregate uplink demand (with TCP
  framing), compare against the 12 MB/s per-client budget and the aggregate ceiling,
  and propose two distinct mitigations (rate reduction vs delta encoding) that bring
  the uplink under budget.
details:
  realistic_solution: 'Per-client uplink demand = 1 MB * 30 Hz * 1.06 = 31.8 MB/s,
    which already exceeds the 12 MB/s per-client budget by 2.65x and saturates a single
    client''s uplink. Aggregate demand from 3 clients = 95.4 MB/s. Even if the AP
    could pool client uplink budgets, the contended half-duplex channel cannot absorb
    that volume. Mitigation A (rate cut): drop sync rate to 12/(1*1.06) = 11.3 Hz,
    but AR pose stability degrades visibly below 20 Hz. Mitigation B (delta encoding):
    typical pose-graph deltas compress to ~50 KB per update; 0.05 * 30 * 1.06 = 1.59
    MB/s per client, fits in 12 MB/s with 7.5x headroom and is the right answer for
    a real shipping AR title. Mitigation C (less common): switch to UDP with application-level
    dedup and forward-error correction to cut the 6% TCP overhead and shave retransmits,
    but this only buys ~10% margin.'
  common_mistake: Treating the per-client uplink demand as if it could consume the
    full Wi-Fi channel rather than the AP-enforced 12 MB/s per-client cap; or computing
    the aggregate need without TCP framing overhead.
  napkin_math: 'Per-client uplink = 1 MB * 30 Hz * 1.06 = 31.8 MB/s; budget 12 MB/s
    -> 2.65x over. Delta encoding: 0.05 MB * 30 Hz * 1.06 = 1.59 MB/s, fits comfortably.'
