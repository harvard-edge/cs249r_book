title: The INT8 Memory Halving
scenario: You're optimizing a new visual search feature for a mobile app. Your 50 million parameter model
  currently uses 100 MB of memory for its weights when loaded in FP16 precision. To reduce the app's overall
  memory footprint, you decide to quantize the model weights to INT8. Explain the new memory requirement
  for the weights and calculate the final size.
question: "How would you explain the new memory requirement for the weights and calculate the final size?"
details:
  realistic_solution: The change from FP16 (Floating Point 16-bit) to INT8 (Integer 8-bit) means each
    parameter now requires half the storage. FP16 uses 2 bytes per parameter, while INT8 uses only 1 byte.
    Therefore, the memory footprint of the model weights is halved.
  common_mistake: The most common mistake is to confuse the reduction factor. Engineers might incorrectly
    assume a 4x reduction (confusing the baseline with FP32) or an 8x reduction (by incorrectly dividing
    by the bit number, 8, instead of the byte ratio). Another error is thinking quantization only improves
    speed and has no effect on memory size.
  napkin_math: '1. Current Memory (FP16): 50,000,000 parameters * 2 bytes/parameter = 100,000,000 bytes
    (100 MB). 2. Quantized Memory (INT8): INT8 representation uses just 1 byte per parameter. 50,000,000
    parameters * 1 byte/parameter = 50,000,000 bytes (50 MB). Quantizing to INT8 successfully cuts the
    model''s footprint in half.'
  options:
  - 25 MB, a 4x reduction.
  - 12.5 MB, an 8x reduction.
  - 50 MB, a 2x reduction.
  - 100 MB, no change.
  correct_index: 2
