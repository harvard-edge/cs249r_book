title: 'Fault Tolerance: Evaluate App Crash vs Model Corruption Recovery Paths'
scenario: 'Your on-device ML app on Tensor G3 (7.5 TOPS, 12GB) experiences two failure modes: (A) app
  crash mid-training (occurs ~1/day), (B) model file corruption (occurs ~1/month). Compare the recovery
  protocol, recovery time, and user impact for each failure mode.'
question: "How would you compare the recovery protocol, recovery time, and user impact for each failure mode?"
details:
  realistic_solution: 'App crash recovery: training checkpoint from 5 minutes ago → resume. Fast path
    (< 5 seconds). Model corruption: SHA256 verify on startup, restore from backup partition or re-download.
    Slow path (seconds to minutes).'
  common_mistake: Treating both failures identically; not having a fast path for the common case (app
    crash) vs the rare case (corruption).
  napkin_math: 'Failure A (crash, 1/day): LoRA checkpoint every 5 minutes. Expected lost work: 2.5 minutes
    average. Recovery: reload 2MB checkpoint from flash = 2MB / 1 GB/s = 2ms + app restart 3 seconds =
    3.002 seconds total. Annualized: 365 crashes × 3s recovery = 1,095 seconds = 18.25 minutes/year in
    recovery. Failure B (corruption, 1/month): probability per startup = 1/(30 × 24 × app_starts_per_hour).
    SHA256 check: 2MB model at SHA256 throughput 1 GB/s = 2ms per startup. If corrupt: restore from backup
    (B partition): 200MB model / 1 GB/s = 0.2 seconds. Or re-download: 200MB at LTE 12.5 MB/s = 16 seconds.
    Annual corruption: 12 events × 16 seconds recovery = 192 seconds = 3.2 minutes/year. Total annual
    downtime: 18.25 + 3.2 = 21.45 minutes → 99.996% uptime.'
