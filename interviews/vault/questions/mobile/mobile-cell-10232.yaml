title: Explaining Model Routing Tradeoffs in Compound AI to a Product Manager
scenario: 'A product manager on a Snapdragon 8 Gen 3 (45 TOPS, 16GB) app asks: ''Why can''t we just always
  use the best, most powerful model for every request? Using different models for different query types
  sounds unnecessarily complex.'' Explain the concrete tradeoffs that motivate model routing in on-device
  compound AI systems, using numbers from the hardware.'
question: "A product manager on a Snapdragon 8 Gen 3 (45 TOPS, 16GB) app asks: 'Why can't we just always use the best, most powerful model for every request?"
details:
  realistic_solution: 'Concrete tradeoffs: (1) Battery: 3B LLM at 12W for 200ms/query = 2.4J. At 100 queries/day:
    240J = 0.067Wh = 0.34% battery. Sounds small, but heavy users do 500 queries/day: 1200J = 1.7% battery.
    Simple queries (spell check, autocomplete) via 125M model at 2W * 20ms = 0.04J — 60x cheaper. (2)
    Latency: 3B model: 200ms. 125M model: 15ms. Users perceive < 100ms as instant. Routing 60% of queries
    to fast model: average latency = 0.6*15 + 0.4*200 = 89ms — under instant threshold. Always 3B: 200ms.
    (3) Thermal: sustained 3B usage triggers throttle in 90s. Routing buys 2.25x more sustained throughput.'
  common_mistake: Explaining routing purely in abstract quality terms ('bigger models are slower') without
    giving the PM concrete numbers that make the tradeoff tangible. PMs need to understand the actual
    latency and battery impact to make product decisions.
  napkin_math: '3B INT4 model: 200ms/query, 12W active. 125M INT8 model: 15ms/query, 3W active. Routing
    60% to fast model: avg latency = 0.6*15+0.4*200=9+80=89ms vs 200ms (55% faster). Energy per query:
    routed = 0.6*(3W*0.015s)+0.4*(12W*0.2s)=0.027+0.96=0.987J vs always-3B: 2.4J (59% energy savings).
    Daily battery at 100 queries: routed=0.0274Wh, always-3B=0.0667Wh. At 500 queries: 0.137Wh vs 0.333Wh
    difference = 0.196Wh = ~1.3% battery on 14.8Wh battery.'
