title: 'Network Bandwidth Bottlenecks: Diagnose Mobile LLM Latency Spike from Background
  App'
scenario: A Snapdragon 8 Gen 3 device (16GB, 77 GB/s) shows TPOT spikes from 19.5ms
  to 65ms for 500ms every 30 seconds during 3B INT4 LLM inference. Memory utilization
  stays constant at 60%. Identify the root cause using bandwidth analysis and quantify
  the fix.
question: What would you identify as the root cause using bandwidth analysis and quantify
  the fix?
details:
  realistic_solution: '65ms TPOT: 3B INT4 = 1.5GB. Effective BW: 1.5/0.065=23.1GB/s.
    Normally: 76.9GB/s. Throttle ratio: 23.1/76.9=30% of normal BW. Root cause: scheduled
    background sync (30s period). Android WorkManager or JobScheduler fires every
    30s — likely cloud sync writing 500MB to LPDDR5X (storage DMA): 500MB/77GB/s=6.5ms
    DMA burst? More likely: background ML model inference (spell check, app indexing)
    consuming 50GB/s for 500ms. Fix: use Android''s JobScheduler with setRequiresDeviceIdle(true)
    or move background tasks to be LLM-inference-aware. Or implement BW monitoring
    → pause background during LLM decode.'
  common_mistake: Blaming memory pressure (constant at 60%) or thermal throttling
    (periodic but would affect all tokens not just 500ms bursts) when the 30-second
    periodicity points to a scheduled background task.
  napkin_math: 'Normal BW: 76.9GB/s. Spike BW for LLM: 23.1GB/s → other processes
    consuming 76.9-23.1=53.8GB/s during spikes. 53.8GB/s sustained for 500ms: 26.9GB
    of data moved. What moves 27GB every 30s? Google Play update (app download): 2GB
    update × 30s? Or Photos sync: 100 photos × 5MB each = 500MB → 500MB/77GB/s=6.5ms
    burst (too short). More likely: a background ML model scan (100 emails × 5M param
    classifier): 100×10MB weight reads=1GB in 500ms=2GB/s (not enough). Likely: video
    transcoding or app indexing. Fix: setNetworkType(UNMETERED) + setRequiresCharging(true)
    for heavy background tasks.'
