title: The Frozen UI Watchdog
scenario: 'An on-device visual search model sometimes gets stuck in a hard loop during inference, freezing the application''s UI. The operating system eventually terminates the app with an ''Application Not Responding'' (ANR) error, but the user experience is terrible.'
question: 'What is a standard, low-level timer mechanism used to proactively detect this frozen state and trigger a faster, more graceful recovery?'
details:
  realistic_solution: 'The correct mechanism is a **watchdog timer**. The main UI thread periodically ''pets'' the watchdog. If the inference call blocks the thread and prevents this ''petting'' for a configured timeout, the watchdog triggers a pre-defined recovery action. This allows logging the error, killing the inference task, and restoring the UI before the much slower OS-level ANR is ever triggered.'
  common_mistake: |
    **The Pitfall:** Relying on the default OS ANR timeout (~5s) or complex async cancellation logic.
    **The Rationale:** Engineers assume standard exception handling or async tasks can interrupt hard CPU-bound loops on the main thread.
    **The Consequence:** The UI freezes entirely for 5 seconds before abruptly crashing.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - UI jank budget: 16 ms (60 FPS).
       - OS ANR timeout: ~5,000 ms.
    2. **Calculations:**
       - Watchdog timeout: 100 ms.
       - Speedup vs OS ANR: 5000 ms / 100 ms = 50x.
    3. **Conclusion & Interpretation:**
       - **Result: 50x faster recovery (System-Level Fallback).**
  options:
  - A software watchdog timer
  - Relying on the OS 'Application Not Responding' (ANR) timeout
  - A network-based health check to a remote server
  - Wrapping the inference call in a try/except block
