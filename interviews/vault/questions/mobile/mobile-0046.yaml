title: 'The Keyboard Prediction Privacy Leak: Differential Privacy'
scenario: Your mobile keyboard app uses an on-device next-word prediction model that personalizes to each
  user's typing patterns. A security researcher publishes a paper showing they can extract a user's private
  information (email addresses, passwords typed into non-password fields, medical terms) by querying your
  model's prediction API 10,000 times with crafted prefixes. The model runs entirely on-device — no data
  leaves the phone. How is this possible, and how do you fix it without destroying prediction quality?
details:
  realistic_solution: 'Memorization attack: the model''s predictions encode training data. Any app using
    the keyboard API can observe outputs. Layer defenses: (1) Train with DP (epsilon=4): extractable sequences
    drop from ~200 to ~3. (2) Output filtering: suppress email/SSN/password patterns (0.5% keystroke savings
    cost). (3) LoRA adapter for personalization (limited capacity = less memorization). (4) Per-app prediction
    budget: rate-limit non-keyboard queries. Combined: 41.'
  common_mistake: '"The model is on-device, so there''s no privacy risk." On-device doesn''t mean private.
    If the model *memorizes* training data, anyone with access to the model (or its API) can extract that
    data — including malicious apps using accessibility services or a stolen/seized device.'
  napkin_math: 'Personalized model vocabulary: 30,000 tokens. Attacker queries: 10,000 prefixes × 10 predictions
    each = 100,000 queries. Without DP: ~200 unique private sequences extractable (email, addresses, names).
    With DP (ε = 4): extractable sequences drop to ~3 (and with low confidence). Prediction quality: baseline
    keystroke savings rate 45%. With DP: 42% (-3%). With output filtering: 44.5% (-0.5%, only suppresses
    sensitive completions). Combined: 41.5%. User-perceptible difference: minimal — users don''t notice
    3% fewer correct predictions.'
