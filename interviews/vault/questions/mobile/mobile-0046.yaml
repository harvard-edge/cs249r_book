title: 'The Keyboard Prediction Privacy Leak: Differential Privacy'
scenario: Your mobile keyboard app uses an on-device next-word prediction model that personalizes to each user's typing patterns. A security researcher publishes a paper showing they can extract a user's private information (email addresses, passwords typed into non-password fields, medical terms) by querying your model's prediction API 10,000 times with crafted prefixes. The model runs entirely on-device — no data leaves the phone.
question: "How is this possible, and how do you fix it without destroying prediction quality?"
details:
  realistic_solution: 'This is a memorization attack: the model encodes training data directly. Fixes include training with Differential Privacy (epsilon=4), output filtering for PII patterns, using a low-capacity LoRA adapter for personalization, and rate-limiting API queries.'
  common_mistake: |
    **The Pitfall:** Assuming "on-device" automatically means "private."
    **The Rationale:** Engineers equate privacy strictly with data transmission, failing to realize models act as highly compressed databases of their training set.
    **The Consequence:** Malicious local apps or anyone with physical access can easily extract memorized PII.
  napkin_math: |
    - **Attack Scale:** 10,000 prefixes * 10 predictions each = 100,000 queries.
    - **Memorization Risk:** Without DP, ~200 unique private sequences are extractable.
    - **DP Impact:** With DP (epsilon = 4), extractable sequences drop to ~3, with negligible impact on keystroke savings (-3%).
    - **Final Result:** Layering DP with output filtering **secures the model with <3.5% quality loss**.
