title: A17 Pro LLM Concurrent Queue Limit
scenario: An Apple A17 Pro processes background text generation requests using a 2B parameter INT4 model. Generating a standard 20-token response takes exactly 400ms. Background requests arrive randomly following a Poisson process.
question: Evaluate the maximum average request arrival rate (requests per second) the NPU can handle while ensuring the average queue wait time does not exceed 1.6 seconds.
visual:
  kind: svg
  path: mobile-1872.svg
  alt: Curve showing queue wait time increasing as the arrival rate approaches the NPU capacity of 2.5 requests per second.
  caption: M/D/1 Wait Time Analysis
details:
  realistic_solution: 'Using M/D/1 queueing theory (since service time is a constant 0.4s), the average wait time in the queue is W_q = (λ * 0.4^2) / (2 * (1 - λ * 0.4)). Setting W_q = 1.6s gives 1.6 = 0.16λ / (2 - 0.8λ). Solving for λ: 3.2 - 1.28λ = 0.16λ -> 1.44λ = 3.2 -> λ = 2.22 requests per second. The maximum arrival rate is 2.22 req/s.'
  common_mistake: |
    **The Pitfall:** Using the M/M/1 formula instead of M/D/1 for queueing delays.
    **The Rationale:** Candidates reflexively apply M/M/1, forgetting that LLM inference times on NPUs with fixed input sizes are constant (deterministic service time), not exponentially distributed.
    **The Consequence:** They overestimate the queue wait time and unnecessarily under-utilize the NPU's concurrent capacity.
  napkin_math: |
    1. Constant service time (D): 0.4 seconds. Wait limit (W_q): 1.6 seconds.
    2. M/D/1 Formula: W_q = (λ * D²) / (2 * (1 - λ * D)).
    3. Substitute: 1.6 = (λ * 0.16) / (2 - 0.8λ).
    4. Solve: 3.2 - 1.28λ = 0.16λ.
    5. Combine: 1.44λ = 3.2.
    6. **Result: λ = 2.22 requests per second.**
