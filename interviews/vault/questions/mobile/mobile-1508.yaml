title: A17 Pro Memory Specification for On-Device LLM
scenario: You are tasked with designing the memory management strategy for a local
  3B parameter language model running on the Apple A17 Pro Neural Engine. The chip
  features 35 TOPS at ~5W across its 16-core Neural Engine, but must share 8 GB of
  unified memory with the CPU and GPU. Given that the OS and background apps consume
  a baseline of 3.5 GB, outline a specification for model quantization, context window
  management, and KV cache allocation to prevent iOS Jetsam OOM crashes.
question: How should an A17 Pro on-device LLM memory plan handle weights, KV cache,
  and activations?
details:
  realistic_solution: A robust specification requires aggressively quantizing the
    3B model to 4-bit (e.g., INT4 or W4A16) to fit the weights into ~1.5 GB. The KV
    cache should be pre-allocated statically using a paged attention mechanism to
    prevent fragmentation, capping the context window to ensure the total app footprint
    remains under the ~3 GB active limit enforced by the OS. Unloading non-essential
    UI assets during inference further reduces memory pressure.
  common_mistake: Candidates often assume the full 8 GB of unified memory is available
    for the model, ignoring OS overhead and strict iOS Jetsam memory limits. They
    also frequently overlook the memory fragmentation caused by dynamic KV cache growth
    during long conversational turns.
  napkin_math: 'Total Unified Memory: 8.0 GB. OS and Background Overhead: 3.5 GB.
    Safe Application Budget: ~3.0 GB (leaving a 1.5 GB safety buffer). Model size:
    3B parameters at 4-bit quantization = 1.5 GB. Remaining budget for KV cache and
    UI: 1.5 GB. Assuming UI and workspace take 0.5 GB, we have 1.0 GB for KV cache.
    For a model with 32 layers, 32 heads, and 128 head dimension at FP16, each token
    takes 2 (K,V) * 32 * 32 * 128 * 2 bytes = 524,288 bytes (~0.5 MB). 1.0 GB / 0.5
    MB per token = 2,000 maximum context length. The specification must hard-cap context
    at 2,000 tokens to avoid Apple Jetsam eviction.'
