title: A17 Pro 3B Model Sequence Limit
scenario: A local text generation app utilizing a 3B parameter INT4 model runs on a flagship mobile chip. The app is strictly capped at a 2.0 GB memory footprint by the OS. The model weights consume exactly 1.5 GB. The KV cache uses FP16 precision, requiring 0.5 MB per generated token.
question: What is the maximum sequence length achievable before the KV cache exceeds the strict 2.0 GB OS memory budget?
visual:
  kind: svg
  path: mobile-1880.svg
  alt: 'A bar chart breaking down the 2.0GB memory limit into 1.5GB of INT4 weights and 0.5GB of remaining KV cache space.'
  caption: iOS 2.0GB App Memory Budget
details:
  realistic_solution: |
    The total memory budget is partitioned between static model weights and dynamic KV cache. With 1.5 GB consumed by weights, only 512 MB remains for the KV cache. Dividing this remainder by the per-token cost yields the strict upper bound on context length.
  common_mistake: |
    **The Pitfall:** Dividing the entire 2.0 GB memory budget by the 0.5 MB token cost.
    **The Rationale:** Candidates tunnel-vision on the context math and forget the statically loaded weights occupy the same restricted memory space.
    **The Consequence:** Hardcoding a context limit of 4000 tokens, guaranteeing an immediate OS-level OOM crash in production.
  napkin_math: |
    1. **Assumptions & Constraints:** Total budget = 2.0 GB (2048 MB). Model weights = 1.5 GB (1536 MB). Token cost = 0.5 MB/token.
    2. **Calculations:** Available RAM = 2048 MB - 1536 MB = 512 MB. Max tokens = 512 MB / 0.5 MB/token = 1024 tokens.
    3. **Conclusion & Interpretation:** **Result: Memory-Bound**. The sequence limit is strictly 1024 tokens before OS termination.
