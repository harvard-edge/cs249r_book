title: A17 Pro 3B Model Sequence Limit
scenario: A local text generation app utilizing a 3B parameter INT4 model runs on
  the Apple A17 Pro. The app is strictly capped at a 2.0 GB memory footprint by iOS.
  The model weights consume exactly 1.5 GB. The KV cache uses FP16 precision, and
  mathematical modeling dictates it requires 0.5 MB per generated token.
question: Analyze the maximum sequence length (context + generated) achievable before
  the KV cache exceeds the iOS memory budget.
visual:
  kind: svg
  path: mobile-1880.svg
  alt: A bar chart breaking down the 2.0GB memory limit into 1.5GB of INT4 weights
    and 0.5GB of remaining KV cache space.
  caption: iOS 2.0GB App Memory Budget
details:
  realistic_solution: The total memory budget is 2.0 GB (2048 MB). The model weights
    take 1.5 GB (1536 MB), leaving exactly 512 MB available for the KV cache and activations.
    Assuming activations are negligible compared to the KV cache, the cache can grow
    to 512 MB. At 0.5 MB per token, the maximum sequence length is 512 MB / 0.5 MB/token
    = 1024 tokens.
  common_mistake: Forgetting to subtract the 1.5 GB model weight footprint from the
    2.0 GB app limit, leading to an impossible sequence length of 4000 tokens.
  napkin_math: 2048 MB limit - 1536 MB weights = 512 MB available. 512 MB / 0.5 MB/token
    = 1024 tokens.
