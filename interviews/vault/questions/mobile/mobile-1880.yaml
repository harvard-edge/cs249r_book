title: A17 Pro 3B Model Sequence Limit
scenario: 'A local text generation app utilizing a 3B parameter INT4 model runs on the Apple A17 Pro. The app is strictly capped at a 2.0 GB memory footprint by iOS. The model weights consume exactly 1.5 GB. The KV cache uses FP16 precision, and mathematical modeling dictates it requires 0.5 MB per generated token.'
question: 'Analyze the maximum sequence length (context + generated) achievable before the KV cache exceeds the iOS memory budget.'
visual:
  kind: svg
  path: mobile-1880.svg
  alt: 'A bar chart breaking down the 2.0GB memory limit into 1.5GB of INT4 weights and 0.5GB of remaining KV cache space.'
  caption: iOS 2.0GB App Memory Budget
details:
  realistic_solution: 'The total memory budget is 2.0 GB. The model weights take 1.5 GB, leaving exactly 512 MB available for the KV cache and activations. At 0.5 MB per token, the maximum sequence length is bounded by this remainder.'
  common_mistake: |
    **The Pitfall:** Forgetting to subtract the fixed model weight footprint from the total memory budget.
    **The Rationale:** Candidates see 2.0 GB and 0.5 MB/token and immediately divide the two without accounting for the statically loaded weights.
    **The Consequence:** Overestimating the context window at 4000 tokens, which guarantees the app will crash from an iOS out-of-memory termination in production.
  napkin_math: |
    1. **Available Memory:** 2048 MB total limit - 1536 MB (1.5 GB) weights = 512 MB available.
    2. **Token Calculation:** 512 MB / 0.5 MB per token = **1024 maximum tokens**.
