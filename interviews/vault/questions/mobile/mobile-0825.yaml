title: Mobile New 0026
scenario: An Orin system continuously runs a tracking pipeline. After exactly 4 minutes, the end-to-end latency abruptly jumps from 15ms to 30ms. The ambient temperature is 25C, but the device enclosure is warm.
question: Why does Orin tracking latency abruptly double after four minutes despite normal ambient temperature?
details:
  realistic_solution: The symptom of a sudden, discrete doubling of latency indicates thermal throttling via Dynamic Voltage and Frequency Scaling (DVFS). Continuous full-utilization generates significant heat. Once the silicon die hits its maximum junction temperature, the hardware halves the clock frequency to prevent damage.
  common_mistake: |
    **The Pitfall:** Assuming low ambient room temperature guarantees peak sustained performance.
    **The Rationale:** Forgetting that continuous full-utilization generates heat that cannot dissipate passively fast enough.
    **The Consequence:** Designing systems that fail in production because they rely on peak burst performance rather than sustained thermal limits.
  napkin_math: |
    - Power = C * V^2 * f.
    - Thermal limit hit -> frequency (f) halved (e.g., 1 GHz to 500 MHz).
    - Latency = compute_cycles / f.
    - **Halving the clock frequency perfectly explains the discrete jump from 15ms to 30ms latency.**
