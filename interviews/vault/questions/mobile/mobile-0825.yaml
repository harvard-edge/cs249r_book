title: Mobile New 0026
scenario: An Orin system continuously runs a heavy tracking pipeline. After exactly 4 minutes of execution, the end-to-end latency abruptly jumps from 15ms to 30ms. The ambient temperature is 25C, but the device enclosure is warm.
question: Why does Orin tracking latency abruptly double after four minutes despite normal ambient temperature?
details:
  realistic_solution: The symptom of a sudden, discrete doubling of latency indicates severe thermal throttling via Dynamic Voltage and Frequency Scaling (DVFS). Continuous full-utilization generates heat that passive dissipation cannot resolve. Once the silicon die hits its maximum junction threshold (Tj-max), the governor systematically halves the clock frequency to prevent hardware damage.
  common_mistake: |
    **The Pitfall:** Assuming low ambient room temperature guarantees peak sustained performance indefinitely.
    **The Rationale:** Forgetting that continuous 100% SoC utilization generates a thermal load that vastly outpaces passive enclosure dissipation rates.
    **The Consequence:** Releasing system designs that catastrophically fail SLAs in production because they rely on benchmark burst performance rather than sustainable thermal limits.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Initial Latency: 15ms. Post-event Latency: 30ms.
       - Power dissipation: Power = C * V^2 * f.
       - Thermal step-down halves the clock frequency (f).
    2. **Calculations:**
       - Latency = Compute_Cycles / Frequency.
       - Frequency_new = Frequency_old / 2.
       - Latency_new = Compute_Cycles / (Frequency_old / 2) = 2 * (Compute_Cycles / Frequency_old).
       - Latency_new = 2 * 15ms = 30ms.
    3. **Conclusion & Interpretation:**
       **Result: Thermal-Bound. The abrupt 2x latency jump maps perfectly to a discrete 50% DVFS clock speed reduction triggered by the SoC breaching its thermal threshold.**
