title: Evaluating Speculative Decoding Viability for On-Device LLM on Snapdragon 8 Gen 3
scenario: A Snapdragon 8 Gen 3 (45 TOPS, 16GB) app runs a 3B LLM at 8 tok/s for compound AI generation.
  A team proposes speculative decoding using a 68M draft model (120 tok/s) with a target acceptance rate
  of 0.8 per draft token and 4 draft tokens per verification step. Evaluate whether speculative decoding
  provides a net speedup given the verification overhead on mobile hardware.
question: "How would you evaluate whether speculative decoding provides a net speedup given the verification overhead on mobile hardware?"
details:
  realistic_solution: 'Speculative decoding speedup formula: expected speedup = (1 - α^(k+1)) / ((1-α)
    * (1 + k * cost_ratio)) where α=0.8 acceptance rate, k=4 draft tokens, cost_ratio = draft_model_time
    / target_model_time. Draft: 68M at 120 tok/s → 8.3ms per token. Target: 3B at 8 tok/s → 125ms per
    token. Cost ratio: 8.3/125 = 0.066. Expected accepted per step: (1-0.8^5)/(1-0.8) = (1-0.328)/0.2
    = 3.36 tokens per verification. Time per step: 4*8.3ms + 125ms = 33.2+125 = 158.2ms for 3.36 tokens.
    Effective rate: 3.36/158.2ms = 21.2 tok/s — 2.65x speedup. Significant!'
  common_mistake: Calculating speculative decoding speedup using cloud-hardware formulas and assuming
    linear speedup. On mobile, the 3B model runs in memory-bandwidth-bound regime — a single forward pass
    (1 token or 5 tokens verified) reads all 3B weights once. The speedup from speculative decoding comes
    only if multiple draft tokens are accepted without triggering additional full model passes.
  napkin_math: 'Baseline: 8 tok/s = 125ms/token. Draft model (68M): 125ms * (68M/3000M) = 2.83ms/token
    theoretical, actual 120 tok/s → 8.3ms. Per speculative step: generate 4 drafts in 4*8.3=33.2ms, verify
    with 3B in 125ms. Expected accepted tokens: sum_{i=0}^{4} alpha^i = (1-0.8^5)/(1-0.8) = 3.36. Effective
    throughput: 3.36 tokens / (33.2+125)ms = 3.36/158.2ms = 21.2 tok/s. Speedup: 21.2/8 = 2.65x. Memory
    overhead: 68M INT8 = 68MB additional — acceptable on 16GB.'
