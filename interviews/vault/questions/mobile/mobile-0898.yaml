title: 'Dataset Curation: Evaluate Federated Data Heterogeneity Impact on Mobile Model Quality'
scenario: 'You run federated learning for a language model across 1M Snapdragon 8 Gen 3 devices. Device data is highly non-IID: users in different countries have different language distributions.'
question: How would you evaluate the impact of data heterogeneity on global model quality and propose a mitigation strategy?
details:
  realistic_solution: 'Measure heterogeneity: compute KL divergence between per-device token distributions and global. High KL (>1.0) indicates severe non-IID. FedAvg degrades significantly: 5-15% accuracy drop vs IID. Mitigation: SCAFFOLD, FedProx, or cluster-and-federate by language group.'
  common_mistake: |
    **The Pitfall:** Using vanilla FedAvg without measuring data heterogeneity.
    **The Rationale:** Engineers assume standard gradient aggregation naturally handles non-IID mobile data distributions.
    **The Consequence:** The global model suffers a significant 5-15% accuracy drop due to conflicting gradient updates from vastly different language distributions.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Client Data: Highly non-IID across 1M devices.
       - Global metric: KL divergence (D) between local and global token distributions.
    2. **Calculations:**
       - Accuracy Drop (FedAvg): For D=3.0, expected drop is ~2% * 3.0 = 6% degradation.
       - Mitigation Storage (Clustered FL): 50 language clusters.
       - Model Size: 100M params at BFloat16 = 200 MB/cluster.
       - Server Capacity: 50 * 200 MB = 10 GB.
    3. **Conclusion & Interpretation:**
       - **Result: Accuracy/Storage Trade-off. Vanilla FedAvg degrades by 6%; clustered federated learning completely mitigates the heterogeneity penalty for only 10 GB server storage.**
