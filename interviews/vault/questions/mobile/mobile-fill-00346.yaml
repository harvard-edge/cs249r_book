title: Analyzing On-Device LLM Latency on Google Tensor G3
scenario: You are tasked with optimizing the performance of an on-device generative AI feature for message
  summarization on a Pixel device, powered by the Google Tensor G3. The model, a quantized LLM of 7B parameters,
  resides entirely in the device's 12 GB LPDDR5X memory and leverages the 7.5 TOPS on-device TPU for inference.
  Users report an end-to-end latency of 2.5 seconds for a 50-word summary from a 500-word input, with
  a noticeable 'pause' before the first word appears (Time To First Token - TTFT) and then a slower streaming
  output (Time Per Output Token - TPOT). Preliminary measurements show network latency is negligible (local
  inference). Your team suspects issues in preprocessing, initial token generation, or subsequent token
  generation. Decompose the end-to-end latency and propose an investigation plan to pinpoint the bottlenecks.
details:
  realistic_solution: 'Implement granular latency profiling tools to measure each stage: input preprocessing
    (tokenization, batching), TTFT (initial forward pass, KV cache initialization), TPOT (subsequent forward
    passes, output token processing), and postprocessing (detokenization, formatting). Analyze the impact
    of model architecture, quantization scheme, and input/output sizes on each component. Optimize by:

    1.  **Preprocessing:** Using optimized tokenizers, parallelizing where possible.

    2.  **TTFT:** Optimizing initial prompt processing, e.g., by pre-filling KV cache for common prefixes
    or using smaller, faster models for initial responses.

    3.  **TPOT:** Employing speculative decoding, improving KV cache memory access patterns, or further
    quantizing less critical parts of the model if precision loss is acceptable.

    4.  **Hardware Utilization:** Ensure the 7.5 TOPS TPU is saturated during inference; if not, investigate
    data transfer bottlenecks with LPDDR5X memory or inefficient operator mappings.'
  common_mistake: Failing to differentiate between TTFT and TPOT, often assuming a single inference bottleneck.
    Overlooking memory bandwidth limitations for model weights or I/O for preprocessing/postprocessing,
    or not considering the impact of quantization details on TPU efficiency.
  napkin_math: 'Given 7.5 TOPS (Tera Operations Per Second), this is 7.5 x 10^12 operations/second. A
    7B parameter model (int8 quantized) might be ~7GB. LPDDR5X memory bandwidth can be up to ~50 GB/s.
    If the model requires, for example, 100 GMACs (Giga Multiply-Accumulate Operations) per token:

    Inference speed (tokens/sec) = (7.5 x 10^12 ops/s) / (2 x 100 x 10^9 ops/token) = 37.5 tokens/sec
    (theoretical max, assuming 2 ops per MAC).

    For a 50-word summary (approx. 75 tokens), ideal generation time = 75 tokens / 37.5 tokens/s = 2 seconds.

    The observed 2.5 seconds end-to-end suggests ~0.5 seconds for preprocessing + TTFT.

    If TTFT is 0.5s and 75 tokens take 2s to generate (TPOT = 2s / 75 tokens = ~26.7 ms/token), then the
    total is 0.5s + 2s = 2.5s. The goal is to reduce the 0.5s TTFT and/or improve the 26.7 ms/token TPOT.
    A key consideration is whether the 7.5 TOPS are fully utilized, or if memory bandwidth (12 GB LPDDR5X)
    is the bottleneck for loading weights or KV cache access, especially for large context windows.'
