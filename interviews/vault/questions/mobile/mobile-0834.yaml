title: Federated Learning Gradient Pipelining
scenario: An Apple A17 Pro (35 TOPS NPU) participates in a federated learning loop.
  It computes gradients for a 50MB model and sends them over a 1 Gbps 5G uplink.
question: Analyze the execution timeline of layer-wise backpropagation and transmission
  to identify the theoretical minimum time to complete one synchronization step.
details:
  realistic_solution: Transmission of 50MB takes 400ms. Since backpropagation starts
    at the output layer and moves backwards, the gradients of the later layers become
    available first. The system can begin transmitting the first available gradients
    while earlier layers are still computing. The total time is theoretically bounded
    by max(total compute time, total transmission time) + the non-overlapping tail
    end.
  common_mistake: Calculating transmission and computation times purely sequentially
    (Total Time = Compute + 400ms), missing the core mechanism of pipelined backpropagation
    updates.
  napkin_math: 50 MB * 8 bits/byte = 400 Mb / 1000 Mbps = 0.4 seconds transmission.
