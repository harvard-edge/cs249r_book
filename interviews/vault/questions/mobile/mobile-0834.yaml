title: Federated Learning Gradient Pipelining
scenario: An Apple A17 Pro participates in a federated learning loop. It computes gradients for a 50MB model and sends them over a 1 Gbps 5G uplink.
question: Analyze the execution timeline of layer-wise backpropagation and transmission to identify the theoretical minimum time to complete one synchronization step.
details:
  realistic_solution: Transmission of 50MB takes 400ms. Since backpropagation starts at the output layer and moves backwards, the gradients of the later layers become available first. The system can begin transmitting the first available gradients while earlier layers are still computing. The total time is theoretically bounded by max(total compute time, total transmission time) + the non-overlapping tail end.
  common_mistake: |
    **The Pitfall:** Calculating transmission and computation times purely sequentially (Total Time = Compute + 400ms).
    **The Rationale:** Candidates overlook that gradients become available sequentially starting from the output layer.
    **The Consequence:** Failure to implement pipelined backpropagation updates, resulting in highly suboptimal total step latency.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model size: 50MB.
       - Uplink: 1 Gbps 5G.
    2. **Calculations:**
       - Size in bits: 50 MB * 8 bits/byte = 400 Mb.
       - Transmission time: 400 Mb / 1000 Mbps = 0.4 seconds.
    3. **Conclusion & Interpretation:**
       - **Result: Pipeline-Bound.** The transmission (400ms) overlaps directly with the backward pass compute, setting the minimum lower bound near max(compute, 400ms).
