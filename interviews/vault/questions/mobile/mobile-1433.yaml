title: On-Device LLM Coreset Sizing for Tensor G3
scenario: You are designing the on-device personalization pipeline for an LLM running
  on the Google Tensor G3. To improve prediction accuracy while preserving privacy,
  the model must fine-tune locally overnight. Given the Tensor G3's 12 GB LPDDR5X
  memory and 7.5 TOPS TPU optimized for Gemini Nano, evaluate data pruning and coreset
  selection strategies to curate the day's user data into an optimal training curriculum.
  How do you size this minimal dataset to ensure the fine-tuning process completes
  within a 1-hour overnight charging window while maximizing the Information-Compute
  Ratio?
question: How do you size this minimal dataset to ensure the fine-tuning process completes
  within a 1-hour overnight charging window while maximizing the Information-Compute
  Ratio?
details:
  realistic_solution: The optimal approach implements a lightweight on-device data
    pruning mechanism, such as keeping only examples with high perplexity (active
    learning) or using coreset selection to eliminate redundant queries. Given the
    compute limits, we target a highly compressed curriculum of high-value examples.
    We reserve ~2 GB of the 12 GB RAM for training state and use a mix of 90% curated
    recent data and 10% synthetic anchor data to prevent model collapse.
  common_mistake: Candidates often suggest training on all daily user interactions
    or using simple random sampling, ignoring the strict thermal and compute constraints
    of a mobile SoC. They fail to account for the memory overhead of optimizer states
    in the 12 GB shared RAM and overestimate how much data a 7.5 TOPS TPU can process
    in an hour without severe thermal throttling.
  napkin_math: Tensor G3 TPU provides 7.5 TOPS (7.5e12 ops/sec). Let's assume a 2B
    parameter Gemini Nano model using INT8 weights (~2 GB RAM, easily fitting in the
    12 GB LPDDR5X alongside the OS) and LoRA. Forward + backward pass compute is roughly
    6 * 2e9 = 12e9 ops per token. For a 512-token sequence, this is ~6.1e12 ops (6.1
    TeraOps). Fine-tuning on a curated coreset of 400 sequences for 5 epochs requires
    400 * 5 * 6.1e12 = 1.22e16 ops. At 7.5 TOPS, pure compute time is 1.22e16 / 7.5e12
    ≈ 1626 seconds (~27 minutes). This fits safely within a 3600-second (1-hour) window,
    allowing 33 minutes for memory I/O overhead and thermal management.
