title: On-Device LLM Coreset Sizing for Tensor G3
scenario: You are designing the on-device personalization pipeline for an LLM running on the Google Tensor G3. To improve prediction accuracy while preserving privacy, the model must fine-tune locally overnight. Given the Tensor G3's 12 GB LPDDR5X memory and 7.5 TOPS TPU, evaluate data pruning and coreset selection strategies to curate the day's user data.
question: How do you size this minimal dataset to ensure the fine-tuning process completes within a 1-hour overnight charging window while maximizing the Information-Compute Ratio?
details:
  realistic_solution: The optimal approach implements a lightweight on-device data pruning mechanism, such as keeping only examples with high perplexity (active learning) or using coreset selection to eliminate redundant queries. Given the compute limits, we target a highly compressed curriculum of high-value examples. We reserve ~2 GB of the 12 GB RAM for training state and use a mix of 90% curated recent data and 10% synthetic anchor data to prevent model collapse.
  common_mistake: |
    **The Pitfall:** Training on all daily user interactions.
    **The Rationale:** Candidates propose naive bulk fine-tuning, overestimating what a mobile TPU can process without thermal throttling.
    **The Consequence:** The fine-tuning takes hours, overheating the device and violating the 1-hour overnight charging window.
  napkin_math: |
    *   **Ops per Token (2B INT8 LoRA):** `6 * 2e9 = 12e9 ops`
    *   **Ops per Sequence (512 tokens):** `12e9 * 512 = 6.1e12 ops (6.1 TeraOps)`
    *   **Total Compute (400 seqs, 5 epochs):** `400 * 5 * 6.1e12 = 1.22e16 ops`
    *   **Pure Compute Time:** `1.22e16 ops / 7.5e12 ops/s = 1626 seconds (~27 minutes)`
    *   **Result:** **A coreset of 400 sequences takes 27 minutes, safely fitting the 60-minute window with thermal buffer room.**
