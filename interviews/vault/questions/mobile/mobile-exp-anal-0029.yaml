title: Investigating Tail Latency Spikes Under Memory Pressure
scenario: 'An on-device LLM (Gemini Nano) is deployed on the Google Tensor G3 featuring a 7.5 TOPS TPU
  and 12 GB LPDDR5X memory. Production telemetry shows a recurring anomaly: when the OS broadcasts memory
  pressure warnings, the p99 token generation latency spikes from 40ms to over 800ms, while TPU utilization
  drops to near zero. The 1.8GB model weights are loaded via memory mapping (mmap). Explain why the TPU
  utilization drops during these events and calculate the expected tail latency floor assuming the device''s
  flash storage read speed is 2.5 GB/s.'
details:
  realistic_solution: Because the model weights are memory-mapped, the OS treats them as file-backed,
    clean pages. Under memory pressure, the OS evicts these pages from the 12 GB LPDDR5X RAM to free up
    space for other apps. When the model tries to access the weights for the next token, it triggers massive
    major page faults, forcing the system to block on I/O while fetching from flash storage and leaving
    the TPU starved for data.
  common_mistake: Candidates often blame thermal throttling of the TPU (which would lower clock speeds
    but not drop utilization to zero) or assume the OS is aggressively pausing the thread, missing the
    underlying OS-level interaction between mmap, memory eviction, and major page faults.
  napkin_math: 'Model size: 1.8 GB. Flash storage read bandwidth: 2.5 GB/s. Time to page in evicted weights
    = 1.8 GB / 2.5 GB/s = 0.72 seconds (720 ms). Base generation latency: 40 ms. Total expected tail latency
    = 720 ms + 40 ms = 760 ms, which aligns perfectly with the >800ms p99 telemetry spikes observed.'
