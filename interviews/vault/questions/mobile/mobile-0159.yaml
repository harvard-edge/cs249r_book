title: The Unified Memory Trap
scenario: A 7B parameter LLM requiring 14 GB of memory in FP16 runs on a cloud GPU. A product manager asks why you can't run the same model on a flagship smartphone that has 12 GB of RAM.
question: What is the fundamental hardware difference that makes deploying a 14 GB model on a 12 GB smartphone infeasible?
details:
  realistic_solution: Mobile SoCs leverage a Unified Memory Architecture (UMA). The 12 GB of LPDDR RAM is dynamically shared across the CPU, GPU, NPU, OS kernel, and background services. The OS Low Memory Killer Daemon (LMKD) strictly enforces per-app memory caps (typically 3-4 GB on a 12 GB device) to prevent system starvation. A 14 GB continuous allocation is fundamentally impossible.
  common_mistake: |
    **The Pitfall:** Confusing total unified RAM with dedicated VRAM.
    **The Rationale:** Candidates accustomed to cloud GPUs assume the entire 12 GB of RAM is available as dedicated accelerator memory.
    **The Consequence:** They fail to realize that the OS, UI, and background apps share this unified memory, severely restricting the memory available for large ML models.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Total System RAM: 12 GB.
       - OS/Background Overhead: ~8-9 GB.
       - Max App Budget (e.g., 25% of system RAM): ~3 GB.
       - Model Size (7B FP16): 14 GB.
    2. **Calculations:**
       - Deficit: 14 GB - 3 GB = 11 GB out of memory (OOM).
    3. **Conclusion & Interpretation:**
       - **Result: OOM Failure.** The deployment is strictly **Memory-Capacity-Bound** due to UMA restrictions.
  options:
  - The phone's NPU is not powerful enough to run a 7B model.
  - The 12 GB of RAM is unified and shared with the OS, leaving a much smaller budget for the app.
  - The phone's memory bandwidth is too low to handle the model's weights.
  - The 14 GB model fits perfectly in the 12 GB RAM using virtual memory swapping without penalty.
  correct_index: 1
