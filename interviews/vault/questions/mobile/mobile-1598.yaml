title: 'Optimizing Transformer Inference on Samsung Exynos 2400 NPU: Attention Complexity and KV-Cache Management'
scenario: Your team is tasked with deploying a state-of-the-art Transformer-based Large Language Model (LLM) for on-device inference on the Samsung Exynos 2400 NPU (34.7 TOPS, 12 GB LPDDR5X). During initial testing, you observe that the model frequently hits memory limits or experiences unacceptably high latency for longer input sequences.
question: How would you analyze the fundamental architectural and scaling challenges of standard Transformer models that contribute to these issues on this specific mobile platform?
details:
  realistic_solution: A realistic solution involves exploring architectural modifications and optimization techniques. For attention complexity, consider deploying models utilizing linear attention mechanisms (e.g., Performer, Linformer) or implementing optimized attention kernels like FlashAttention, if the NPU's capabilities allow for efficient block-wise operations. For KV-cache, strategies such as KV-cache quantization (e.g., to INT8), dynamic KV-cache eviction policies, or implementing a sliding window attention mechanism (e.g., Longformer, BigBird) that inherently limits the KV-cache size can significantly mitigate memory pressure on the 12 GB LPDDR5X. These solutions aim to reduce the effective N or the constant factor for computation/memory, better aligning with the mobile NPU's constraints.
  common_mistake: |
    **The Pitfall:** Underestimating the quadratic complexity of standard self-attention and the linear growth of KV-cache memory.
    **The Rationale:** Engineers often focus on optimizing general matrix multiplications without addressing the core scaling issues of the sequence length.
    **The Consequence:** Optimizations fail once the sequence length grows, quickly exhausting the 34.7 TOPS NPU compute budget or exceeding the 12 GB LPDDR5X memory.
  napkin_math: |
    - Self-Attention FLOPs (O(N^2)): QKV projection and attention computation scales as O(N^2 * D_model).
    - For N=2048, D_model=1024: ~4.3 * 10^9 FLOPs per layer.
    - Across 24 layers, this quickly exceeds the 34.7 TOPS budget for real-time inference.
    - KV-Cache Memory: Stores 2 * L * N * H * D_k values.
    - For float16 (2 bytes), L=24, H=16, D_k=64, N=2048:
    - KV-cache = 2 * 24 * 2048 * 16 * 64 * 2 bytes = 201,326,592 bytes ≈ 192 MiB.
    - **Doubling N to 4096 consumes ~384 MiB, which alongside weights can rapidly exceed the 12 GB limit in larger models.**
