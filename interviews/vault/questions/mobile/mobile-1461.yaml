title: Deterministic Driver Monitoring on Exynos 2400
scenario: You are deploying a vision-based Driver Monitoring System (DMS) running
  continuously on a smartphone powered by the Samsung Exynos 2400. The DMS must process
  30 FPS video to detect driver fatigue and issue real-time alerts. Because this is
  a safety-critical application acting as an aftermarket ADAS, it requires deterministic
  execution. You need to design the memory allocation, compute partitioning, and safety
  mechanisms on the 34.7 TOPS dual-core NPU. This NPU shares 12 GB of LPDDR5X RAM
  with the CPU, GPU, and ISP, meaning your DMS must never miss a deadline or fail
  silently even when the user runs heavy foreground applications.
question: How would you make Exynos 2400 driver monitoring deterministic with watchdogs
  and pinned NPU resources?
details:
  realistic_solution: The architecture must pin the model to one specific NPU core
    and pre-allocate its memory footprint within the shared 12 GB LPDDR5X to prevent
    runtime page faults. To ensure high reliability, a watchdog timer must monitor
    the strict 33.3ms per-frame deadline. Additionally, a lightweight self-test routine
    (passing a known-good dummy frame) must execute periodically on the NPU to verify
    hardware integrity and ensure the NPU hasn't silently degraded due to thermal
    throttling from the adjacent GPU.
  common_mistake: Candidates often assume the 34.7 TOPS NPU guarantees real-time performance
    simply because the model is small. They fail to account for the shared 12 GB LPDDR5X
    memory architecture, ignoring the non-deterministic latency introduced when the
    ISP or GPU saturates memory bandwidth, and they omit critical self-test routines
    required for functional safety.
  napkin_math: 'Compute: The DMS model requires 2.5 GOPS per frame. At 30 FPS, this
    is 75 GOPS (0.075 TOPS), which utilizes only 0.2% of the Exynos 2400''s 34.7 TOPS
    NPU. Memory: Model weights (8 MB INT8) + input frame (1080p, 6.2 MB) + activations
    (4 MB) = 18.2 MB working set. At 30 FPS, this requires a guaranteed 546 MB/s of
    bandwidth. To ensure determinism against CPU/GPU/ISP contention, the app must
    pin the 18.2 MB in the 12 GB LPDDR5X pool and rely on OS-level QoS to protect
    that 546 MB/s stream.'
