title: A17 Pro Memory Bounds for Adversarial Defense
scenario: You are deploying an on-device text classification model to the Apple A17 Pro Neural Engine
  to filter malicious prompt injections. To defend against gradient-based adversarial attacks during local
  fine-tuning, you implement adversarial training. Given the A17 Pro's 8 GB shared unified memory, calculate
  the maximum feasible batch size if the base model requires 2 GB, the adversarial example generation
  adds 1.5x memory overhead per sample, and the OS reserves 3 GB of memory.
question: "What maximum adversarial-training batch size fits on A17 Pro after OS, model, and per-sample overheads?"
details:
  realistic_solution: First, subtract the OS reserved memory and base model size from the total unified
    memory to find the available memory for activations and adversarial overhead. Then, determine the
    per-sample memory footprint including the adversarial generation overhead to calculate the maximum
    batch size.
  common_mistake: Candidates often forget to account for the OS memory reservation or underestimate the
    memory overhead of generating adversarial examples (which requires storing gradients and intermediate
    activations) when calculating the available memory for batching.
  napkin_math: Total Memory = 8 GB. Available Memory = 8 GB (Total) - 3 GB (OS) - 2 GB (Base Model) =
    3 GB. If a standard forward/backward pass per sample takes 50 MB, adversarial training overhead =
    50 MB * 1.5 = 75 MB. Total per sample = 50 MB + 75 MB = 125 MB. Max Batch Size = 3 GB (3000 MB) /
    125 MB per sample = 24 samples.
