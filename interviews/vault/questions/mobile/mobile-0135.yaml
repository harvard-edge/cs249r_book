title: The Federated Learning Radio Drain
scenario: You implement Federated Learning to update a next-word prediction model directly on users' phones.
  The on-device training takes 5 minutes and consumes 1% of the battery. However, users complain that
  the app is destroying their battery life overnight. If the math only takes 1%, where is the massive
  energy drain coming from?
question: "If the math only takes 1%, where is the massive energy drain coming from?"
details:
  realistic_solution: 'The radio, not compute, drains the battery. Training: 1W x 300s = 300J (1% battery).
    But uploading gradients keeps the radio active (800 mW) with tail timers. Multiple FL sessions/night:
    800 mW x 20 min x 4 = 3,840J ≈ 8.3% battery. Fix: (1) compress gradients to <100 KB (seconds of TX,
    not minutes). (2) Align FL with existing sync windows to share radio wake cost. (3) Only participate
    on WiFi + charging. The model used ~1%; the radio protocol used ~8.3%.'
  common_mistake: '"The backpropagation algorithm is using too much memory and causing swapping to flash."
    While backprop is intensive, the primary energy vampire in Federated Learning isn''t the compute—it''s
    the telemetry.'
  napkin_math: 'Compute: 1W * 300s = 300 Joules (~0.65% of a 46,080 Joule / 12.8 Wh battery, matching the stated 1%). Radio: uploading uncompressed gradients keeps the radio active for 20 minutes at 800 mW. 0.8W * 1200s = 960 Joules per session. For 4 sessions a night: 960J * 4 = 3840 Joules. 3840 / 46,080 = 8.33% battery drained by the radio alone.'
