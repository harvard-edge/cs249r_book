title: Optimizing KV-Cache Eviction for On-Device LLMs
scenario: You are deploying an 8B parameter LLM optimized for on-device chat on a smartphone powered by the Samsung Exynos 2400 NPU. During long multi-turn conversations, the application frequently crashes due to Out-Of-Memory (OOM) errors. The device features 12 GB of LPDDR5X memory, but it is shared across the CPU, GPU, ISP, and the dual-core NPU. You need to analyze the memory profile of the KV-cache as the context grows and quantify the impact of implementing a token eviction policy to cap memory usage.
question: How would you cap and evict KV-cache entries for an on-device LLM while preserving useful context?
details:
  realistic_solution: A realistic approach involves capping the maximum KV-cache size and implementing an eviction policy (like H2O or StreamingLLM) that retains 'heavy-hitter' tokens and recent context while discarding less important tokens. Given the shared memory, we must budget a strict upper bound for the KV-cache. By calculating the exact memory footprint per token, we can determine the maximum context window supported under this budget.
  common_mistake: |
    **The Pitfall:** Assuming the entire 12 GB is available and suggesting naive truncation without math.
    **The Rationale:** Developers ignore the shared nature of UMA architectures.
    **The Consequence:** The model frequently hits Jetsam OOM events because the KV cache pushes the total system memory over its hard limit.
  napkin_math: |
    1. **Memory per Token:** 8B model with 32 layers, 32 heads, 128 head dim, FP16. Memory = 2 (K and V) * 32 (layers) * 32 (heads) * 128 (head dim) * 2 bytes = 524,288 bytes = exactly 0.5 MB/token.
    2. **Available Memory Budget:** System reserves 10.5 GB (OS, UI, ISP, 4-bit model weights). 12 GB - 10.5 GB = 1.5 GB. Allocating 1.0 GB for KV-cache.
    3. **Max Context Window:** 1.0 GB (1024 MB) / 0.5 MB/token = 2048 tokens.
    4. **Eviction Policy Impact:** Capping the cache at 1024 tokens reduces KV memory to 512 MB.
    **This saves 512 MB of shared LPDDR5X RAM, preventing OOM crashes.**
