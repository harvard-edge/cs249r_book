validation_issues:
- The Napkin Math's formula for KV-cache memory per token is correct, but the calculation '524,288 bytes (~0.5 MB/token)' is rounded to 0.5 MB, which is less precise than 0.512 MB.
- The calculation '1,024 MB / 0.5 MB/token = 2,048 tokens' is imprecise due to the rounding of MB/token; using 0.512 MB/token would yield 2000 tokens.
