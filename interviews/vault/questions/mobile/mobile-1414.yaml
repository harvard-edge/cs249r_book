title: Optimizing KV-Cache Eviction for On-Device LLMs
scenario: 'You are deploying an 8B parameter LLM optimized for on-device chat. During long multi-turn conversations, the application frequently crashes due to Out-Of-Memory (OOM) errors. The device features 12 GB of shared LPDDR5X memory. You need to analyze the memory profile of the KV-cache as the context grows and quantify the impact of implementing a token eviction policy to cap memory usage.'
question: 'How would you cap and evict KV-cache entries for an on-device LLM while preserving useful context?'
details:
  realistic_solution: 'A realistic approach involves capping the maximum KV-cache size and implementing an eviction policy (like H2O or StreamingLLM) that retains ''heavy-hitter'' tokens and recent context while discarding less important tokens. Given the shared memory, we must budget a strict upper bound for the KV-cache. By calculating the exact memory footprint per token, we can determine the maximum context window supported under this budget.'
  common_mistake: |
    **The Pitfall:** Assuming the entire 12 GB is available and suggesting naive truncation without math.
    **The Rationale:** Developers ignore the shared nature of UMA architectures.
    **The Consequence:** The model frequently hits Jetsam OOM events because the KV cache pushes the total system memory over its hard limit.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Memory Budget: 12 GB total limit. System uses 10.5 GB (OS + UI + INT4 weights).
       - Available VRAM for KV: 1.5 GB total (Allocate 1.0 GB for safety).
       - Model Dimensions: 32 layers, 32 heads, 128 head dim, FP16 precision.
    2. **Calculations:**
       - Memory per Token: 2 (K+V) × 32 × 32 × 128 × 2 bytes = 524,288 bytes = 0.5 MB/token.
       - Max Context Window: 1.0 GB (1024 MB) / 0.5 MB/token = 2048 tokens.
       - Eviction Impact: Capping cache at 1024 tokens = 512 MB usage.
    3. **Conclusion & Interpretation:**
       **Result: Memory-Bound OOM.** By proactively capping and evicting to maintain a 1024-token cache, the system definitively bounds KV overhead to **512 MB**, effectively preventing arbitrary OS-level memory kills.
