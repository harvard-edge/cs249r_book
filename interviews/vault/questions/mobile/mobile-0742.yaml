title: The Operator Gap
scenario: You are deploying a model to a mobile NPU. The math should only take 10ms, but the actual inference latency is 15ms. You find two unsupported operators in your graph.
question: Based on the DMA flow, why do two unsupported ops cause a 50% latency penalty in a mobile NPU deployment?
details:
  realistic_solution: You are hitting **Graph Partitioning Overhead**. Each unsupported operator forces the graph to 'ping-pong' data from the NPU to the CPU and back via DMA. This incurs a latency tax for the transfer and leaves the NPU idle while the CPU processes the single op. The fix is to eliminate partition boundaries by replacing unsupported ops with approximations (e.g., Sigmoid approximation for GELU) or static-shape equivalents.
  common_mistake: |
    **The Pitfall:** Blaming the hardware and assuming the NPU is simply too slow for the model.
    **The Rationale:** Candidates see the high latency and assume compute limitation, rather than analyzing the graph execution trace.
    **The Consequence:** Attempting to use a drastically smaller model instead of fixing the graph partitioning overhead by substituting unsupported ops.
  napkin_math: |
    1. **Overhead Cost:** Each NPU-CPU-NPU round-trip costs $\sim$2.4ms in DMA overhead.
    2. **Total Penalty:** 2 fallback operators $\times$ 2.4ms = 4.8ms.
    3. **Conclusion:** You spend **4.8ms** just moving data via DMA, which accounts for roughly 32% of the 15ms total budget without doing any significant math.
