title: The Operator Gap
scenario: You are deploying a model to a mobile NPU. The math should only take 10ms, but the actual inference
  latency is 15ms. You find two unsupported operators in your graph. Based on the DMA flow, why are these
  two ops causing a 50% latency penalty?
details:
  realistic_solution: You are hitting **Graph Partitioning Overhead**. Each unsupported operator forces
    the graph to 'ping-pong' data from the NPU to the CPU and back via DMA. This incurs a latency tax
    for the transfer and leaves the NPU idle while the CPU processes the single op. The fix is to eliminate
    partition boundaries by replacing unsupported ops with approximations (e.g., Sigmoid approximation
    for GELU) or static-shape equivalents.
  common_mistake: '"The NPU is slow — use a bigger model." The NPU compute is fine. The overhead is in
    the data movement.'
  napkin_math: Each NPU-CPU-NPU round-trip costs ~2.4ms in DMA overhead. With 2 such bounces, you spend
    4.8ms just moving data—roughly 32% of your 15ms total budget—without doing any significant math.
