title: Exynos 2400 NPU vs CPU Audio Offloading
scenario: You are evaluating whether to run a continuous audio processing model on the CPU or the Samsung Exynos 2400 NPU. The dual-core NPU provides a theoretical 34.7 TOPS, but shares its 12 GB LPDDR5X memory with the CPU, GPU, and ISP, typically limiting sustained ML throughput to 20% of peak due to bandwidth contention.
question: Can the Exynos 2400 NPU handle a 4 TOPS audio workload after sustained bandwidth limits, and what utilization is needed?
details:
  realistic_solution: The candidate should identify that the shared 12 GB LPDDR5X memory architecture significantly reduces sustained NPU performance. They must calculate the effective TOPS, verify it exceeds the 4 TOPS requirement, and contrast this with the CPU's 1 TOPS limit to justify offloading to the NPU.
  common_mistake: |
    **The Pitfall:** Directly comparing the 4 TOPS workload to the theoretical 34.7 TOPS peak.
    **The Rationale:** Ignoring the reality of the shared memory bottleneck that caps sustained throughput.
    **The Consequence:** Drastically overestimating NPU headroom and incorrectly assuming the NPU can handle multiple such workloads concurrently.
  napkin_math: |
    - Peak NPU TOPS: 34.7 TOPS
    - Sustained Memory Contention Limit: 20%
    - Effective NPU TOPS: 34.7 * 0.20 = 6.94 TOPS
    - Required Load: 4.0 TOPS
    - CPU limit: 1.0 TOPS
    - NPU Utilization = (4.0 / 6.94) * 100 = 57.6%
    - **Result: 4.0 TOPS < 6.94 TOPS. The NPU can handle the load, whereas the CPU (max 1 TOPS) would drop frames.**
