title: 'KV-Cache: Analyze KV Cache Memory Pressure on A17 Pro'
scenario: 'A 1B LLM on A17 Pro (35 TOPS Neural Engine, 8GB unified memory) shows increasing latency as
  conversation grows longer. At 512 tokens context: 30 tok/sec. At 2048 tokens: 18 tok/sec. At 4096 tokens:
  11 tok/sec. Analyze why KV cache growth causes this degradation and compute the expected latency scaling.'
details:
  realistic_solution: Each decode step reads the full KV cache for all previously generated tokens. As
    context grows, KV read time grows linearly. Compute (single-token forward pass) stays constant. The
    KV read dominates at long contexts.
  common_mistake: 'Blaming compute for the slowdown when it''s clearly memory bandwidth: the model FLOPs
    don''t change per token, but KV cache reads grow linearly with context length.'
  napkin_math: '1B model: 24 layers, 8 KV heads, head_dim 64 (common 1B config). KV per token: 24 × 2
    × 8 × 64 × 2B = 49.2KB. Wait, let me use head_dim=128 for consistency. 24 × 2 × 8 × 128 × 2B = 98.3KB
    per token. At seq=512: KV read = 512 × 98.3KB = 50.3MB. A17 Pro unified memory BW: ~68 GB/s. KV read
    time: 50.3MB / 68 GB/s = 0.74ms. Model weight load: 1B × 2B = 2GB... at 4-bit = 500MB. 500MB / 68
    GB/s = 7.35ms. At seq=512: total ≈ 7.35 + 0.74 = 8.09ms → 123 tok/sec theoretical. Observed 30 tok/sec
    → 27% efficiency (framework overhead). At seq=2048: KV = 4× = 201MB, KV time = 2.96ms. Weight unchanged.
    Total ≈ 7.35 + 2.96 = 10.31ms + overhead. Efficiency same (27%) → 1/10.31ms × 0.27 = 26.2 tok/sec.
    Close to observed 18 tok/sec. KV scaling: linear with context length, as expected. At seq=4096: KV
    = 402MB, 5.91ms + 7.35 = 13.26ms, × 27% efficiency → 20.4 tok/sec. Observed 11 — overhead growing
    too (memory allocation, attention compute O(n²) even though it''s small).'
