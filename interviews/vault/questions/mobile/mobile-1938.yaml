title: Symmetric INT8 Quantization on Apple A17 Pro
scenario: You are deploying a 4-layer fully connected network for gesture recognition on an Apple A17 Pro Neural Engine. A weight tensor has a float range of [-2.5, 2.5].
question: Apply symmetric INT8 quantization to this weight tensor, calculating the scale factor and the quantized integer value for a weight of 1.25.
details:
  realistic_solution: |
    For symmetric INT8, the integer range is [-127, 127]. The scale factor S is calculated as max_abs(W) / 127 = 2.5 / 127 = 0.01968. The quantized integer for W = 1.25 is calculated as round(W / S) = round(1.25 / 0.01968) = 64.
  common_mistake: |
    **The Pitfall:** Using the full 256 range [-128, 127] without perfectly centering zero.
    **The Rationale:** Candidates might unnecessarily apply a zero-point for symmetric data.
    **The Consequence:** Increased computational overhead and potential accuracy degradation.
  napkin_math: |
    - **Scale factor S:** max_abs(W) / 127 = 2.5 / 127 = 0.01968
    - **Quantized integer for W = 1.25:** round(W / S) = round(1.25 / 0.01968) = 63.5 -> 64
    - **Result:** **64**
