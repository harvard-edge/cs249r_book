title: The Lane Centering TCO Dilemma
scenario: You are the ML Systems Engineer for an electric vehicle fleet. The lane centering model needs retraining using data from 100,000 vehicles. You must choose between Centralized Training and Federated Learning.
question: Which retraining strategy is economically viable for the fleet, and what data-transfer cost drives the decision?
details:
  realistic_solution: |
    Federated Learning is vastly more economical because it avoids massive cellular data egress costs. Transferring small, aggregated model weight updates or gradients via Secure Aggregation is much cheaper than transmitting high-resolution raw image sequences over metered 4G/5G networks.
  common_mistake: |
    **The Pitfall:** Focusing only on cloud GPU compute costs while ignoring data transmission expenses.
    **The Rationale:** Engineers underestimate the hidden operational expenditure (OpEx) of device egress over expensive cellular networks.
    **The Consequence:** Selecting a centralized strategy that severely impacts project TCO due to exorbitant data fees.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Fleet size: 100,000 vehicles.
       - Data transfer (Centralized): 1 GB/month per vehicle.
       - Cellular data cost: $1/GB.
    2. **Calculations:**
       - Data Transfer Cost (Centralized): 100,000 vehicles * 1 GB/month * 12 months = 1,200,000 GB/year.
       - Annual cost at $1/GB: 1,200,000 GB * $1/GB = $1,200,000.
    3. **Conclusion & Interpretation:**
       - **Federated Learning is required to avoid >$1.2M in annual data fees. Bottleneck: Network Bandwidth Cost.**
  options:
  - Centralized Training, because the annual cost is around $66,000, which is a reasonable R&D expense.
  - Federated Learning, because the Centralized approach would cost over $1.2 million annually in data fees.
  - Centralized Training, as the powerful cloud GPUs result in a better model, and data costs are negligible.
  - Federated Learning, to avoid user complaints about battery drain.
  correct_index: 1
