title: The Lane Centering TCO Dilemma
scenario: 'You are the ML Systems Engineer for a new electric vehicle''s ''lane centering'' feature. The
  model is performing poorly on newly painted yellow lane markings in California. Your fleet of 100,000
  vehicles in that region can provide the necessary training data, but you must choose a retraining strategy.
  You have two options:'
question: "Which retraining strategy is economically viable for the lane-centering fleet, and what data-transfer cost drives the decision?"
details:
  realistic_solution: The correct approach is to calculate the total data transfer cost for both strategies,
    as this is the dominant factor in the TCO calculation. The Federated Learning approach is vastly more
    economical.
  common_mistake: Engineers often focus on the visible cost of cloud GPU compute and underestimate the
    'hidden' cost of data transmission, especially for a large fleet over expensive cellular networks.
    They might also incorrectly apply cheap cloud ingress pricing to what is actually expensive device
    egress.
  napkin_math: The core of the problem is a TCO calculation dominated by data transfer costs.
  options:
  - Centralized Training, because the annual cost is around $66,000, which is a reasonable R&D expense
    for a superior model.
  - Federated Learning, because the Centralized approach would cost over $1.2 million annually in data
    fees, making it economically non-viable.
  - Centralized Training, as the powerful cloud GPUs will result in a much better model, and the data
    costs are negligible.
  - Federated Learning, but only because the on-device power drain is insignificant. The cost savings
    are secondary to avoiding user complaints.
  correct_index: 1
