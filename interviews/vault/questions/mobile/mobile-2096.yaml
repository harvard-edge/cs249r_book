title: Applying iOS Jetsam Footprint Limits to LLMs
scenario: An iOS app allocates a contiguous 4GB array for an unoptimized transformer model on an 8GB RAM device.
question: Apply memory management principles to explain what happens when the app footprint approaches system limits.
details:
  realistic_solution: iOS lacks disk swap space. When an app allocates memory beyond its jetsam limit (roughly 50-60% of total RAM), the kernel forcefully OOM-kills background apps. If the allocation persists, the OS kills the foreground app to protect system stability.
  common_mistake: |
    **The Pitfall:** Assuming standard desktop OS behavior.
    **The Rationale:** Many engineers expect iOS to transparently page the excess multi-gigabyte memory to NVMe storage.
    **The Consequence:** The app gets OOM-killed by Jetsam, leading to a poor user experience.
  napkin_math: |
    - **Allocation:** 4GB
    - **Total RAM:** 8GB
    - **Footprint:** 4GB / 8GB = **50% limit**
