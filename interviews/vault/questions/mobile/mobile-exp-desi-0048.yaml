title: On-Device Coreset Selection Architecture
scenario: You are architecting an on-device continuous learning system for a personalized mobile application
  running on the Apple A17 Pro Neural Engine. The system must curate a coreset of daily user interactions
  to fine-tune a local model overnight within a strict ~5W power envelope. Given the shared 8 GB unified
  memory across the CPU, GPU, and 16-core Neural Engine, design the data selection and pruning pipeline.
  Evaluate the tradeoffs between heuristic filtering and model-based data selection to maximize the Information-Compute
  Ratio (ICR) without causing memory thrashing.
details:
  realistic_solution: 'The optimal architecture uses a two-stage pipeline: a computationally free heuristic
    filter (e.g., user correction rate) applied continuously during the day, followed by a lightweight
    embedding-based deduplication running on the 16-core Neural Engine overnight. This approach selects
    a high-signal coreset that easily fits within the available RAM after OS overhead. By pruning redundant
    samples, the system avoids model collapse and ensures the fine-tuning process completes well within
    thermal and time constraints.'
  common_mistake: Candidates often propose complex, compute-heavy active learning pipelines that exceed
    the ~5W power budget or cause severe memory thrashing in the 8 GB unified memory. They frequently
    fail to prioritize the Information-Compute Ratio (ICR), choosing data selection methods that cost
    more compute than the actual fine-tuning process.
  napkin_math: 'Assume a budget of 2 hours for overnight training at 50% utilization of the 35 TOPS capacity
    (17.5 TOPS) to maintain the ~5W limit: Total compute = 17.5 TOPS * 7200s = 1.26e17 operations. Fine-tuning
    a 1B parameter model takes ~6e9 ops/token. Max tokens processed = 1.26e17 / 6e9 = 21 million tokens.
    With the 8 GB shared unified memory, the model and optimizer states consume ~4 GB, leaving 2 GB for
    OS and 2 GB for data buffering. By pruning a raw daily log of 10 million tokens down to a 1 million
    token coreset, the system can perform 21 high-quality epochs entirely within memory constraints.'
