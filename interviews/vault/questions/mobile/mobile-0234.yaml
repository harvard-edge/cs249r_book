title: The 25% Mobile Memory Rule
scenario: You are planning an Over-the-Air (OTA) update to deploy a new on-device model. Before checking
  the model's specific memory footprint, what is the first-order, rule-of-thumb application memory budget
  you should recall for a typical high-end smartphone with 8GB of RAM?
details:
  realistic_solution: The standard rule of thumb is that an application should not exceed about 25% of
    the total device RAM. For a device with 8 GB of RAM, this gives the application a working memory budget
    of approximately 2 GB. This budget must be shared between the app's UI, state, and any ML models loaded
    into memory. Deploying a model that, when loaded, causes the app to exceed this budget is a primary
    cause of poor performance and crashes (via OS termination).
  common_mistake: Engineers often confuse the total device RAM with the memory actually available to their
    application. The operating system (iOS/Android) reserves a large portion of RAM for itself and other
    background processes, and will aggressively terminate any single app that exceeds its allocated slice.
    Another common mistake is to misremember the rule-of-thumb, often being too optimistic (e.g., 50%)
    or too conservative (e.g., 10%).
  napkin_math: App Memory Budget = Total Device RAM × 0.25
  options:
  - 8 GB
  - 4 GB
  - 2 GB
  - 256 MB
  correct_index: 2
