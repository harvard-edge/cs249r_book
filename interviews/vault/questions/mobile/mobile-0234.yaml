title: The 25% Mobile Memory Rule
scenario: 'You are planning an Over-the-Air (OTA) update to deploy a new on-device model.'
question: 'Before checking the model''s specific memory footprint, what is the first-order, rule-of-thumb application memory budget you should recall for a typical high-end smartphone with 8GB of RAM?'
details:
  realistic_solution: 'The standard rule of thumb is that an application should not exceed about 25% of the total device RAM. This budget must be shared between the app''s UI, state, and any ML models loaded into memory.'
  common_mistake: |
    **The Pitfall:** Confusing total device RAM with application available RAM.
    **The Rationale:** Engineers assume the app has free reign over the entire 8GB, ignoring OS reserves.
    **The Consequence:** Deploying a model that exceeds the app's isolated memory slice causes immediate OS termination (Jetsam).
  napkin_math: |
    1. **Assumptions & Constraints:**
       * Total Device RAM: 8 GB.
       * Rule-of-Thumb Allowance: 25%.
    2. **Calculations:**
       * App Allocation: 8 GB * 0.25 = 2 GB.
    3. **Conclusion & Interpretation:**
       * **Result: Memory-Bound.** 2 GB is safely allocated to the application.
  options:
  - '8 GB'
  - '4 GB'
  - '2 GB'
  - '256 MB'
  correct_index: 2
