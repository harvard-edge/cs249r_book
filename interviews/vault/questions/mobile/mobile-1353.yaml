title: Calculate Maximum Context Length for Gemini Nano
scenario: You are deploying a 1.8 billion parameter int4-quantized LLM (Gemini Nano) on a Google Tensor G3 device. While the device features 12 GB LPDDR5X RAM and 7.5 TOPS, the OS imposes a strict 2.0 GB memory limit on your background AI service to prevent OS-level eviction of other apps. The runtime and activation buffers consume a fixed 400 MB overhead. Assume the KV cache consumes 0.4 MB per token.
question: What maximum context window can a 1.8B INT4 Gemini Nano service support under a 2.0 GB memory limit?
details:
  realistic_solution: To find the maximum context length, you must first calculate the memory required to hold the int4 model weights. Next, subtract both the model weight memory and the fixed runtime overhead from the total OS-imposed memory budget to find the memory available strictly for the KV cache. Finally, divide this available memory by the per-token KV cache consumption to determine the token limit.
  common_mistake: |
    **The Pitfall:** Miscalculating the memory footprint of INT4 weights or forgetting the runtime overhead.
    **The Rationale:** Candidates often assume 1 byte per parameter instead of 0.5 bytes for INT4, or they forget to subtract fixed buffer overheads from the total budget.
    **The Consequence:** Grossly overestimating or underestimating the permissible context window, leading to runtime OOM crashes or underutilized memory.
  napkin_math: |
    1. Weight memory: 1.8 billion parameters * (4 bits / 8 bits/byte) = 900 MB.
    2. Total fixed memory: 900 MB (weights) + 400 MB (overhead) = 1300 MB.
    3. Available memory for KV cache: 2000 MB (total budget) - 1300 MB = 700 MB.
    4. Maximum context window: 700 MB / 0.4 MB/token = **1750 tokens**.
