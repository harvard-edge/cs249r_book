title: The Cost of Depthwise Separable Convolutions
scenario: You're profiling a CNN on a mobile device and notice a bottleneck.
question: "For a typical layer using a 3x3 kernel, approximately how much computationally cheaper is it to replace a standard convolution with a 3x3 depthwise separable convolution?"
details:
  realistic_solution: A 3x3 depthwise separable convolution is roughly 8-9x cheaper than a standard 3x3 convolution. This massive saving comes from decoupling the spatial filtering (depthwise step) from the channel combination (pointwise step). A standard convolution does both at once, resulting in a much higher computational cost proportional to `K*K*C_in*C_out`.
  common_mistake: |
    **The Pitfall:** Vastly underestimating the computational savings of depthwise separable convolutions.
    **The Rationale:** Engineers recall that they are "more efficient" but guess a minor 2x improvement, failing to realize the reduction factor scales with the kernel size squared.
    **The Consequence:** Underutilizing depthwise separable convolutions in mobile architectures, leaving massive performance gains on the table.
  napkin_math: |
    1. **Assumptions & Constraints:** 3x3 convolution layer vs 3x3 depthwise separable convolution layer.
    2. **Calculations:** Standard Cost = K*K*Cin*Cout. Depthwise Cost = K*K*Cin + Cin*Cout. Reduction Factor ~ 1 / K^2.
    3. **Conclusion & Interpretation:** A 3x3 depthwise separable layer is roughly **8-9x cheaper**. **Result: Compute-Bound**.
  options:
  - About 2x cheaper
  - Roughly the same cost, it just saves memory
  - About 9x cheaper
  - About 128x cheaper (scales with channels)
  correct_index: 2
