title: The Big.LITTLE Synchronization Trap
scenario: 'You are running inference for an NLP model entirely on the CPU of a mobile Snapdragon SoC, which features an octa-core big.LITTLE architecture (1 Prime core, 3 Performance cores, 4 Efficiency cores). You spawn 8 threads to maximize throughput using OpenMP. Strangely, using exactly 4 threads is significantly faster than using all 8 threads.'
question: 'Why can 4 CPU threads beat 8 threads for Snapdragon big.LITTLE NLP inference?'
details:
  realistic_solution: 'You fell into the heterogeneous synchronization trap. Big.LITTLE mixes massive, fast cores with tiny, slow cores. Splitting a matrix multiplication across 8 threads divides the work evenly. The fast cores finish their chunks instantly but must wait at a synchronization barrier for the 4 Efficiency cores, which are 3x to 4x slower. The fast cores sit completely idle.'
  common_mistake: |
    **The Pitfall:** Assuming all CPU cores are identical and that adding threads always increases throughput linearly.
    **The Rationale:** Engineers bring intuition from symmetric desktop x86 architectures to asymmetric mobile SoC topologies.
    **The Consequence:** Utilizing all threads severely degrades performance and wastes energy as fast cores idle on barriers waiting for slow cores.
  napkin_math: |
    1. **Task Setup:** Assume a layer requires 8,000 operations.
    2. **4-Thread (Fast Only):** Each gets 2,000 ops. At 1,000 ops/ms, they finish in **2 ms**.
    3. **8-Thread (Heterogeneous):** Each gets 1,000 ops. Fast cores finish in 1 ms. Slow cores (running at 200 ops/ms) take 5 ms.
    4. **Result:** Due to the sync barrier, the entire layer waits 5 ms. Adding the 4 slow cores made the execution **2.5x slower (5ms vs 2ms).**
