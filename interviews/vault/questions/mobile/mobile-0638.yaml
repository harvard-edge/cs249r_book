title: The Big.LITTLE Synchronization Trap
scenario: You are running inference for an NLP model entirely on the CPU of a mobile Snapdragon SoC, which
  features an octa-core big.LITTLE architecture (1 Prime core, 3 Performance cores, 4 Efficiency cores).
  You spawn 8 threads to maximize throughput using OpenMP. Strangely, using exactly 4 threads is significantly
  faster than using all 8 threads. Why?
details:
  realistic_solution: You fell into the heterogeneous synchronization trap. Big.LITTLE architectures mix
    massive, power-hungry cores (Prime/Performance) with tiny, slow cores (Efficiency). When you split
    a matrix multiplication across 8 threads, the framework divides the work into 8 equal chunks. The
    Prime and Performance cores finish their chunks in a few milliseconds. However, they must then wait
    at a synchronization barrier for the 4 Efficiency cores, which are physically 3x to 4x slower, to
    finish their chunks. The fast cores sit completely idle, blocked by the slowest cores on the chip.
  common_mistake: '"Assuming all CPU cores are identical and that more threads always equal more performance,
    like on a standard desktop x86 chip."'
  napkin_math: Let's say a layer takes 8000 operations. With 4 fast cores, each does 2000 ops at 1000
    ops/ms -> `Latency = 2ms`. If you use 8 cores (4 fast, 4 slow), they each get 1000 ops. The fast cores
    finish in `1ms`. The slow cores (running at 200 ops/ms) take `5ms`. Because of the sync barrier, the
    layer takes `5ms`. By adding more cores, you made the system 2.5x slower.
