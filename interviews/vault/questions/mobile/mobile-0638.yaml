title: The Big.LITTLE Synchronization Trap
scenario: You run NLP inference on the CPU of a mobile SoC featuring a big.LITTLE architecture (1 Prime, 3 Performance, 4 Efficiency cores). You spawn 8 OpenMP threads to maximize throughput. Surprisingly, using exactly 4 threads is significantly faster than using all 8.
question: Why does limiting execution to 4 threads outperform 8 threads for inference on a big.LITTLE CPU architecture?
details:
  realistic_solution: |
    This is a classic heterogeneous synchronization trap. Parallelizing a matrix operation across 8 threads evenly divides the workload. The massive 'big' cores finish their chunks instantly and then idle at a synchronization barrier, waiting for the heavily underpowered 'LITTLE' cores to finish, severely bottlenecking total throughput.
  common_mistake: |
    **The Pitfall:** Assuming all CPU cores possess identical compute capacity and that adding threads strictly increases throughput.
    **The Rationale:** Projecting symmetrical desktop x86 parallelization heuristics onto asymmetric edge SoC topologies.
    **The Consequence:** Causing massive performance regressions and energy waste as high-power cores stall on barriers waiting for efficiency cores.
  napkin_math: |
    1. **Assumptions & Constraints:** 8,000 operations per layer. Fast cores process 1,000 ops/ms. Slow cores process 200 ops/ms.
    2. **Calculations:** 4-Thread (Fast): 2,000 ops/thread -> finishes in 2 ms. 8-Thread (Heterogeneous): 1,000 ops/thread -> Fast finishes in 1 ms, Slow finishes in 5 ms. Barrier wait = 5 ms total.
    3. **Conclusion & Interpretation:** **Result: Compute-Bound (Synchronization)**. Adding slow cores drastically increases overall latency by a factor of 2.5x.
