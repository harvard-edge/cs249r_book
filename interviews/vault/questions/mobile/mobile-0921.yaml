title: 'Fault Tolerance: Realize Checkpoint Architecture for Continuous Mobile Personalization'
scenario: Realize the complete checkpoint architecture for an on-device personalization system on A17 Pro (35 TOPS, 8GB RAM) that trains nightly for 10 minutes and serves inference 24/7.
question: How would you specify storage layout, checkpoint schedule, retention policy, and recovery paths for an on-device training system?
details:
  realistic_solution: 'Two separate state objects: (1) Inference state: LoRA weights (fp32, 4MB). (2) Training state: full checkpoint (weights + optimizer, 24MB). Different retention policies and update frequency.'
  common_mistake: |
    **The Pitfall:** Not separating inference model state from training state.
    **The Rationale:** Using standard PyTorch checkpointing paradigms on a constrained mobile storage system.
    **The Consequence:** App restarts during the day load massive 24MB optimizer states into RAM unnecessarily, wasting I/O and memory.
  napkin_math: |
    - Storage: Base model (500 MB) + Inference LoRA (4 MB) + Training Ckpt (24 MB * 3 = 72 MB). Total = 576 MB.
    - Write speed: 24 MB at 3 GB/s flash = ~8 ms.
    - Checkpoints: Every 3 mins (3 total per 10-min window).
    - Recovery (Inference): Load 4 MB (4 ms).
    - Recovery (Training): Load 24 MB (8 ms).
    - **Separating the 4 MB inference state from the 24 MB training state prevents massive I/O overheads on app launch.**
