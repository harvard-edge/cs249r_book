title: 'Fault Tolerance: Realize Checkpoint Architecture for Continuous Mobile Personalization'
scenario: An on-device personalization system trains nightly for 10 minutes and serves inferences asynchronously 24/7.
question: How would you specify storage layout, checkpoint schedule, retention policy, and recovery paths for an on-device training system?
details:
  realistic_solution: 'Decouple the architecture into two explicitly separate state objects: (1) Inference State: Lightweight LoRA weights (fp32, 4MB) loaded instantly for serving. (2) Training State: The full heavy checkpoint (weights + Adam optimizer moments, 24MB). Apply distinct retention policies: keep only the latest serving weights, but hold a rolling window of 3 training checkpoints to prevent catastrophic corruption.'
  common_mistake: |
    **The Pitfall:** Refusing to structurally separate the inference model state from the heavy training optimizer state.
    **The Rationale:** Using standard server-side PyTorch checkpointing paradigms on a constrained mobile NAND flash system.
    **The Consequence:** App restarts load massive 24MB optimizer states into RAM completely unnecessarily, wasting IO operations and risking background app eviction.
  napkin_math: |
    **Assumptions & Constraints:**
    - Base Model: 500 MB. Inference LoRA: 4 MB (FP32).
    - Optimizer State (Adam): 24 MB.
    - Checkpoint Frequency: Every 3 minutes (3 checkpoints per 10-min window).
    - Device Flash Write Speed: ~3 GB/s.

    **Calculations:**
    - Single Training Checkpoint Size: 4 MB (LoRA) + 24 MB (Optimizer) = 28 MB.
    - Write latency to Flash: 28 MB / 3000 MB/s = ~9.3 ms.
    - Storage footprint for rolling recovery (3 ckpts): 28 MB * 3 = 84 MB.

    **Conclusion & Interpretation:**
    - **Result: 84 MB (I/O-Bound)**. Decoupling the 4 MB serving weights from the 24 MB training state prevents severe I/O read penalties during 24/7 app launches.
