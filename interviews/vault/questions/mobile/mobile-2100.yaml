title: 4K Image Memory Tiling
scenario: A computer vision model on an Apple A17 Pro needs to process a 4K image (8.3MP, 3 channels). The neural engine shares system RAM but has a limited ultra-fast L2 cache.
question: Specify the memory allocation sequence and tile sizes to process the 4K image without thrashing main memory.
details:
  realistic_solution: Divide the 4K image into overlapping spatial tiles. Load each tile into the L2/SRAM cache, compute the convolutions, and write back the output to main memory to keep the active working set strictly under the cache limit.
  common_mistake: |
    **The Pitfall:** Allocating the entire 4K tensor continuously.
    **The Rationale:** Developers assume the OS and hardware will perfectly page and manage large allocations automatically.
    **The Consequence:** Triggering massive L2 cache evictions, causing severe memory thrashing and bandwidth saturation on the shared bus.
  napkin_math: |
    *   **Image Specs:** 4K (8.3 MP), 3 channels.
    *   **Tile Dimensions:** 256 x 256 pixels.
    *   **Tile Size:** 256 * 256 * 3 channels * 1 byte (INT8) = 196,608 bytes = **~196 KB**.
    *   **Conclusion:** A 196 KB tile perfectly fits inside typical multi-MB L2 caches, entirely preventing main memory thrashing.
