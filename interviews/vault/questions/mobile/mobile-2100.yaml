title: 4K Image Memory Tiling
scenario: A computer vision model on an Apple A17 Pro needs to process a 4K image
  (8.3MP, 3 channels). The neural engine shares system RAM but has a limited ultra-fast
  L2 cache.
question: Specify the memory allocation sequence and tile sizes to process the image
  without thrashing main memory.
details:
  realistic_solution: Divide the 4K image into overlapping spatial tiles. Load each
    tile into the L2/SRAM cache, compute the convolutions, and write back the output
    to main memory to keep the active working set strictly under the cache limit.
  common_mistake: Allocating the entire 4K tensor continuously and letting the OS
    handle page faults, causing massive bandwidth saturation and cache evictions.
  napkin_math: 256 * 256 pixels * 3 channels = 196 KB per tile, safely fitting in
    a typical multi-MB L2 cache.
