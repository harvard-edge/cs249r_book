title: Diagnosing ML Model Latency on Google Tensor G3
scenario: A real-time image recognition model deployed on a mobile device powered by an NPU and LPDDR5X RAM is exhibiting inconsistent and higher-than-acceptable inference latency in production.
question: "How would you systematically diagnose whether the primary bottleneck is compute, memory, or I/O bound on this specific hardware platform?"
details:
  realistic_solution: 'The most realistic solution involves leveraging on-device profiling tools specific to the Android ecosystem. Steps would include:\n\n1. **Utilize Android Studio Profiler/Perfetto:** Begin by using high-level tools like Android Studio Profiler or Perfetto to get an overview of CPU, memory, and I/O usage during model inference. Look for spikes in CPU/TPU activity, unusual memory allocations/deallocations, or significant I/O waits.\n\n2. **Deep Dive into Compute:** If CPU/TPU appears to be the bottleneck, use more granular profiling (e.g., custom `perf` traces if kernel access is available, or specific vendor tools for the TPU if exposed) to generate flame graphs. These can pinpoint specific operations or kernel functions consuming the most cycles within the model execution graph.\n\n3. **Analyze Memory Usage:** For memory bottlenecks, monitor memory bandwidth, cache hit/miss rates, and page faults. Tools might include `dumpsys meminfo` or more advanced memory tracing utilities. Examine if the RAM is being efficiently utilized, or if there''s excessive data copying between CPU and TPU memory, or frequent thrashing due to poor data locality.\n\n4. **Investigate I/O:** If I/O is suspected, trace file system operations and network requests. For image recognition, this could involve slow loading of input images from storage or waiting for model weights to be paged into memory. Identify if data is being read from slow storage, or if there are bottlenecks in the data pipeline feeding the model.'
  common_mistake: |
    **The Pitfall:** Immediately assuming a compute bottleneck and heavily quantizing the model without profiling the full pipeline.
    **The Rationale:** Engineers default to optimizing the ML model graph rather than analyzing the end-to-end system, memory contention, and I/O wait states.
    **The Consequence:** Wasting development cycles on the wrong component, potentially degrading accuracy while failing to resolve data transfer overheads.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Hardware: 7.5 TOPS NPU, 12 GB LPDDR5X (~51.2 GB/s).
       - Model Requirements: 30 GOPS compute, 200 MB transfer.
       - Observed Total Latency: 50 ms.
    2. **Calculations:**
       - Ideal Compute Time: (30 * 10^9) / (7.5 * 10^12) = 4.0 ms.
       - Minimum Memory Time: (200 * 10^6) / (51.2 * 10^9) = ~3.9 ms.
       - Total Core Time: ~8 ms.
       - Missing Time: 50 ms - 8 ms = 42 ms.
    3. **Conclusion & Interpretation:**
       - **Result: I/O-Bound**
       - The massive 42ms gap confirms the bottleneck is outside the NPU/RAM core execution, pointing directly to slow image decoding, CPU scheduling, or storage I/O.
