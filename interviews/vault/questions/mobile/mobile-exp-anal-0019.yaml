title: Distilled vs Pruned Memory Bandwidth
scenario: To deploy a real-time video segmentation model on the Samsung Exynos 2400 NPU (34.7 TOPS), the
  team considers two 50M parameter (50 MB INT8) models requiring 10 GOPS. Model A was structurally pruned
  from a larger network (25 layers, 2 MB activation map per layer). Model B was trained via knowledge
  distillation using intermediate feature matching, requiring a deep, thin architecture to match the teacher's
  depth (100 layers, 2 MB activation map per layer). Both models run well within the 34.7 TOPS limit at
  30 FPS. However, when Model B runs, the camera viewfinder stutters, whereas Model A runs smoothly. Both
  models share the 12 GB LPDDR5X memory with the CPU, GPU, and ISP. Explain why Model B causes stuttering
  and calculate the difference in memory bandwidth consumption.
details:
  realistic_solution: The stuttering happens because Model B's deep architecture, necessitated by layer-to-layer
    feature distillation, generates significantly higher activation memory traffic that saturates the
    shared LPDDR5X bandwidth. Since the Exynos 2400 NPU shares memory with the ISP, saturating the memory
    bus starves the ISP of the bandwidth needed to render camera frames. While both models have identical
    parameter counts and FLOPs, Model B reads and writes intermediate activations 4x as many times, pushing
    the total system bandwidth beyond its limits.
  common_mistake: Candidates often focus purely on the compute limits (TOPS) or total parameter count,
    concluding both models should perform identically since both have 50M parameters and 10 GOPS. They
    fail to apply memory bandwidth formulas to the activation map traffic and ignore the shared nature
    of the LPDDR5X RAM with the ISP.
  napkin_math: '1. Parameter memory per inference (both models): 50 MB INT8 weights.

    2. Model A (Pruned) activation memory per inference: 25 layers * (2 MB read + 2 MB write) = 100 MB.

    3. Model B (Distilled) activation memory per inference: 100 layers * (2 MB read + 2 MB write) = 400
    MB.

    4. Model A Bandwidth at 30 FPS: 30 * (50 MB + 100 MB) = 4.5 GB/s.

    5. Model B Bandwidth at 30 FPS: 30 * (50 MB + 400 MB) = 13.5 GB/s.

    Conclusion: Model B consumes 9.0 GB/s more bandwidth. Although compute is minimal (10 GOPS * 30 FPS
    = 300 GOPS or 0.3 TOPS, well under the 34.7 TOPS limit), the extra 9 GB/s starves the ISP on the shared
    12 GB LPDDR5X memory bus, causing frame drops.'
