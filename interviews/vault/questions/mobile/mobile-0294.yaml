title: The Real-Time Batching Trap
scenario: Your team is building a 'smart dashcam' feature for a mobile app that performs real-time object detection. The camera sensor provides frames at a steady 30 FPS. The ML model takes exactly 25ms to process a single frame on the phone's NPU. A colleague proposes batching 2 frames together, which improves throughput and takes 40ms total for the batch.
question: Why is batching real-time dashcam frames counter-productive when camera frames arrive every 33.3ms?
details:
  realistic_solution: This batching strategy will fail catastrophically and drop frames. While the average throughput is higher, the latency for the first frame in the batch now includes the time waiting for the second frame to arrive.
  common_mistake: |
    **The Pitfall:** Confusing throughput (Time-per-output-token) with latency (Time-to-first-token) in real-time systems.
    **The Rationale:** Engineers see the improved average processing time per frame (20ms) and assume it's a win, forgetting the queuing delay of waiting for the second frame.
    **The Consequence:** Designing a system that drops frames and fails catastrophically for tight, per-frame deadlines.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Camera Input: 30 FPS (new frame every 33.3ms).
       - Single Frame Latency: 25ms.
       - Batched (2 frames) Latency: 40ms.
    2. **Calculations:**
       - Frame 1 Arrival: 0ms.
       - Frame 2 Arrival: 33.3ms.
       - Batch Completion Time: 33.3ms (start) + 40ms (process) = 73.3ms.
       - First Frame Latency: 73.3ms - 0ms = 73.3ms.
    3. **Conclusion & Interpretation:**
       - **Result: Queuing-Bound.** The latency for the first frame is **73.3ms**, severely missing the strict 33.3ms deadline.
  options:
  - It fails. The latency for the first frame is 73.3ms because it waits for the second frame.
  - It works. The average latency is 20ms (40ms/2), well under the 33.3ms deadline.
  - It fails. The 40ms batch processing time exceeds the 33.3ms deadline.
  - It works. Two frames give 66.6ms budget, and 40ms processing fits.
