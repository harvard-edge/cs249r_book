title: MHA vs GQA Decoding Bottlenecks
scenario: You are deploying a 7B parameter LLM on the Qualcomm Hexagon NPU (Snapdragon 8 Gen 3) targeting an interactive chat application. The system has 45 TOPS INT8 compute and a shared 12-16 GB LPDDR5X memory pool between the CPU, GPU, and NPU. During auto-regressive decoding with a 2048-token context, you observe that the NPU compute utilization drops to under 5% when using standard Multi-Head Attention (MHA), resulting in slow token generation.
question: Why does the NPU sit idle despite having 45 TOPS available, and why does Grouped-Query Attention (GQA) significantly increase the token generation rate?
details:
  realistic_solution: During decoding, every single generated token requires loading the entire KV cache and model weights from the shared LPDDR5X memory into the NPU's SRAM. Standard MHA stores separate Key and Value vectors for every single query head, creating a massive memory footprint per token that saturates the memory bus before the NPU can perform any meaningful work. GQA solves this by sharing a single KV head across multiple query heads (e.g., 4 queries per KV head), slashing the total KV cache size by 75% and directly alleviating the LPDDR5X memory bandwidth bottleneck, allowing the NPU to process generation steps much faster.
  common_mistake: |
    **The Pitfall:** Assuming the NPU's 45 TOPS INT8 compute capacity is insufficient to calculate attention scores in real-time.
    **The Rationale:** Candidates often fail to identify that auto-regressive decoding is strictly memory-bandwidth bound, not compute-bound.
    **The Consequence:** Overlooking the sheer size of the MHA KV cache being loaded from shared memory, which is the actual cause of the NPU starvation.
  napkin_math: |
    - MHA KV cache at 2048 context (FP16): 2 (K+V) * 128 (head dim) * 32 (heads) * 32 (layers) * 2048 (tokens) * 2 bytes = ~1 GB.
    - INT8 weights are ~7 GB. Total memory read per token = 8 GB.
    - Attention compute per token: 2 * 2048 (tokens) * 4096 (hidden) * 2 = ~33.5 MegaOps.
    - Compute time at 45 TOPS INT8: ~0.0007 ms.
    - System is memory bandwidth starved.
    - GQA with 8 groups reduces 32 KV heads to 8 (4x reduction). New KV cache size = 256 MB.
    - **Total memory read drops to 7.25 GB per token, significantly improving generation speed within the memory bandwidth limit.**
