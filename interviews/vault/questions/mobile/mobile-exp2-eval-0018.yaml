title: On-Device LLM Evaluation for Tensor G3
scenario: 'Your team is tasked with deploying an on-device LLM to summarize incoming messages on a device
  powered by the Google Tensor G3. The device has 12 GB LPDDR5X RAM, but the OS and system apps require
  a strict 6 GB reservation at all times. The Tensor G3 features an on-device TPU capable of 7.5 TOPS.
  You must evaluate two options: Model A is a 3.2B parameter model quantized to INT4 (weights only), and
  Model B is a 1.8B parameter model quantized to INT8 (weights and activations). You need to recommend
  the better architecture for this device considering memory constraints, KV cache overhead, and the TPU''s
  capabilities.'
details:
  realistic_solution: Model A (3.2B INT4) is the optimal choice. Despite having more parameters, its INT4
    quantization results in a smaller weight footprint than the 1.8B INT8 model. Because LLM generation
    is heavily memory-bandwidth bound, the smaller weight size of Model A reduces data transfer overhead.
    Furthermore, the 3.2B model fits comfortably within the 6 GB available RAM even after accounting for
    a reasonably sized KV cache, while offering superior reasoning capabilities for summarization tasks.
  common_mistake: Candidates frequently calculate only the memory required for the model weights and forget
    to account for the KV cache size, which grows linearly with context length. They may also falsely
    assume that lower parameter count always translates to lower memory footprint without factoring in
    the quantization bit-width.
  napkin_math: 'Available RAM: 12 GB (Total) - 6 GB (OS) = 6 GB budget. Model A (3.2B INT4) Weight Size:
    3.2 * 10^9 * 0.5 bytes = 1.6 GB. Model B (1.8B INT8) Weight Size: 1.8 * 10^9 * 1 byte = 1.8 GB. Assuming
    Model A has 32 layers and a hidden dimension of 4096, the KV cache size for a 1024-token context in
    FP16 (2 bytes) is: 2 (K&V) * 32 (layers) * 4096 (dim) * 1024 (seq) * 2 bytes = ~536 MB. Total footprint
    for Model A: 1.6 GB + 0.536 GB = ~2.14 GB. This easily fits into the 6 GB budget, leaving plenty of
    headroom, and utilizes the Tensor G3''s 7.5 TOPS efficiently.'
