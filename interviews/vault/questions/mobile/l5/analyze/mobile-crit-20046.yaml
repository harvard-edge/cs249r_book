schema_version: 1
id: mobile-crit-20046
title: Speculative Decoding Feasibility on Mobile NPU
topic: speculative-decoding
status: published
provenance: imported
scenario: On a Snapdragon 8 Gen 3 (16GB LPDDR5x, 51.2 GB/s, 45 TOPS INT8), you run a 3B INT4 target model
  at 8 tok/s. A 150M INT4 draft model achieves alpha=0.60. Analyze whether speculative decoding improves
  or worsens on-device latency, accounting for the NPU's inability to run two models concurrently.
details:
  realistic_solution: 'Target decode: 3B x 0.5B (INT4) = 1.5GB weight read at 51.2 GB/s = 29ms/token +
    compute: 3B x 2 = 6 GFLOP / 45 TOPS = 0.13ms. Memory-bound at 29ms. Draft: 150M x 0.5B = 75MB read
    at 51.2 = 1.5ms/token. K=5: 7.5ms. Model switching overhead: NPU needs to reload weight buffers, clear
    activations: ~5ms per switch. Sequence: load draft (5ms) + 5 draft tokens (7.5ms) + load target (5ms)
    + verify (29ms for 6 tokens, memory-bound). Total: 47ms for E[tokens] at alpha=0.6: (1-0.6^6)/0.4
    = 2.27 tokens. Effective: 47/2.27 = 20.7ms/token. Without speculation: 29ms/token (125ms = 8 tok/s).
    With: 20.7ms = 48 tok/s. Wait — that''s wrong. Verification of 6 tokens reads weights once but processes
    6 tokens: still 1.5GB read = 29ms (the KV is negligible). So 47ms for 2.27 tokens = 20.7ms. Speedup:
    1.4x. Marginal. The 10ms model-switching overhead is 21% of the round.'
  common_mistake: Ignoring that mobile NPUs are not GPUs — they cannot context-switch between models quickly.
    Loading the draft model weights from DRAM, generating K tokens, then loading the target model weights
    creates memory bandwidth contention.
  napkin_math: 'Target: 29ms. Draft 5 tokens: 7.5ms. Switch overhead: 2x5ms = 10ms. Total round: 47ms.
    E[tokens]: 2.27. Effective: 20.7ms/tok = 1.4x speedup. Model switch kills 21% of the benefit.'
