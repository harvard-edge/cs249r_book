schema_version: 1
id: mobile-0622
title: The Battery Impedance Collapse
topic: power-budgeting
status: published
provenance: imported
scenario: Your mobile app runs a massive diffusion model on the NPU to generate an image. When the phone
  is at 100% battery, it takes 3 seconds. When the phone is at 15% battery, the exact same operation takes
  8 seconds. The OS is not officially in 'Low Power Mode'. What analog electrical property of the battery
  forced the hardware to slow down?
details:
  realistic_solution: 'Battery internal resistance (IR) increases as state-of-charge drops. At 100% SoC,
    IR ≈ 0.05 ohms; at 15%, IR ≈ 0.2 ohms. When the NPU draws a 5A burst, voltage droop = I × R: 0.25V
    at 100% (safe) vs 1.0V at 15% (would crash the SoC). The Power Management IC (PMIC) preemptively limits
    current to ~2A to keep droop at 0.4V, cutting NPU throughput by 60%. This happens below ~20% SoC regardless
    of Low Power Mode settings. For ML apps: detect battery level via API, switch to a lighter model or
    reduce resolution below 20% to maintain UX quality.'
  common_mistake: '"The battery has less voltage, so the CPU runs slower." Voltage alone doesn''t directly
    dictate CPU speed; the power management IC regulates it.'
  napkin_math: At 100%, battery internal resistance (IR) = 0.05 Ohms. A 5A spike (NPU max) drops voltage
    by V=IR = 5*0.05 = 0.25V. At 15%, IR rises to 0.2 Ohms. 5A spike = 1.0V droop, triggering under-voltage
    shutdown. PMIC throttles NPU to 2A max to keep droop at 0.4V (2A * 0.2), cutting NPU clock and taking
    8s.
