schema_version: 1
id: mobile-0621
title: The CoreML Neural Engine Fallback
topic: transformer-systems-cost
status: published
provenance: imported
scenario: You compile a custom Transformer model for iOS using CoreML. You explicitly set `MLComputeUnits.all`
  to allow the OS to run it on the Apple Neural Engine (ANE). The model runs, but it consumes massive
  battery and the phone gets hot. You check the profiler and discover it is running entirely on the GPU.
  Why did CoreML silently reject the Neural Engine?
details:
  realistic_solution: 'CoreML silently falls back from ANE to GPU when any operator in the graph is unsupported
    by the ANE compiler. Common culprits: custom activations (GELU approximations), dynamic shapes, certain
    attention patterns, or gather/scatter ops. The ANE consumes ~0.5W while the GPU draws 3-5W — a 10x
    thermal increase with no error or warning. Debug: use Xcode Instruments'' CoreML trace to see per-layer
    device assignment. Fix: replace unsupported ops with ANE-compatible equivalents (e.g., use coremltools''
    ct.convert with compute_precision=ct.precision.FLOAT16 and check the Neural Network spec for op support).'
  common_mistake: '"The ANE doesn''t support Transformers." The ANE does support Transformers; it''s an
    operator support issue.'
  napkin_math: ANE peak power is ~1W for 35 TOPS (35 TOPS/W). Mobile GPU might hit 2 TOPS/W, consuming
    5W for 10 TOPS. If CoreML silently falls back to the GPU for an unsupported op, executing a 10 GFLOP
    layer takes 1ms on GPU burning 5W, draining the battery 5x faster than ANE and quickly hitting thermal
    limits.
