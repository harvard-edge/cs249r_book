schema_version: 1
id: mobile-0623
title: The Metal Shader Threadgroup Limit
topic: roofline-analysis
status: published
provenance: imported
scenario: You write a custom Metal Compute Shader for iOS to perform a specialized activation function.
  You configure the threadgroup size to `MTLSizeMake(1024, 1, 1)` because you are processing 1024 pixels
  at a time. The code works perfectly on your iPhone 15 Pro. You release the app, and it immediately crashes
  on iPhone 11s with a 'Threadgroup size exceeds limit' error. Why does it crash on older hardware?
details:
  realistic_solution: 'Apple GPU compute units have a maximum threadgroup size that varies by generation.
    The A17 Pro supports 1024 threads per threadgroup, but the A13 in iPhone 11 supports only 512. Metal
    doesn''t validate this at compile time — it crashes at dispatch. Fix: query device.maxThreadsPerThreadgroup
    at runtime and clamp your threadgroup size accordingly. Best practice: use device.maxThreadsPerThreadgroup.width
    to set the threadgroup dynamically, or use the MTLComputePipelineState''s threadExecutionWidth and
    maxTotalThreadsPerThreadgroup properties for optimal sizing per device.'
  common_mistake: '"The older phone doesn''t have enough GPU RAM." Threadgroups don''t dictate total VRAM;
    they dictate physical silicon execution limits.'
  napkin_math: A compute unit might only have 16 KB of threadgroup memory and 512 register slots. Demanding
    1024 threads means the hardware physically cannot hold the execution state for all threads simultaneously.
