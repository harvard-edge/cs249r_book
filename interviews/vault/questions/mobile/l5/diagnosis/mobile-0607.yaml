id: mobile-0607
title: The Budget Phone Mystery
topic: roofline-analysis
status: published
provenance: imported
scenario: Your image classification model runs in 4ms on a Pixel 8 Pro (Tensor G3). On a budget phone
  with a MediaTek Dimensity 700 — which claims 'AI accelerator support' on the spec sheet — the same model
  takes 40ms. Both phones advertise NPU capability. Why is there a 10× performance gap?
details:
  realistic_solution: 'Five factors create the gap: Pixel 8 Pro: 95% NPU delegation, 51.2 GB/s bandwidth,
    no throttling → 4ms. Budget phone: 60% NPU delegation (40% CPU fallback adds ~15ms), 17 GB/s bandwidth
    (3× slower memory access adds ~8ms), bus contention adds latency, and thermal throttling further degrades
    sustained performance.'
  common_mistake: '"The budget phone''s NPU has fewer TOPS." The spec sheets may show similar peak numbers
    — the issue is deeper than headline TOPS.'
  napkin_math: 'Pixel 8 Pro: 95% NPU delegation, 51.2 GB/s bandwidth, no throttling → 4ms. Budget phone:
    60% NPU delegation (40% CPU fallback adds ~15ms), 17 GB/s bandwidth (3× slower memory access adds
    ~8ms), bus contention adds ~5ms, thermal throttle after 10s adds ~12ms. Total: ~40ms. The "NPU" badge
    on the spec sheet is marketing, not a performance guarantee.'
