id: mobile-0613
title: 'The NPU Utilization Paradox: Roofline Analysis'
topic: roofline-analysis
status: draft
provenance: imported
scenario: Your on-device LLM (1.5B parameters, INT4) runs on the Qualcomm Snapdragon 8 Elite's Hexagon
  NPU (rated 45 TOPS). Qualcomm's profiler shows 98% NPU utilization during token generation. But you're
  only getting 12 tokens/sec — your back-of-envelope calculation says 45 TOPS should deliver 40+ tokens/sec
  for this model. The NPU is 'busy' but underperforming by 3×. What's happening?
details:
  realistic_solution: 'The NPU is memory-bandwidth-bound, not compute-bound. INT4 weights for 1.5B params
    = 750 MB. Each token decode reads all weights once, so tokens/sec = effective bandwidth / weight size.
    The NPU''s share of LPDDR5x bandwidth is ~18 GB/s (not the full 77 GB/s, which is shared with CPU,
    GPU, display, and camera). 18,000 MB / 850 MB per token = 21 tok/s theoretical. The 98% utilization
    means the NPU''s compute units are busy waiting for memory fetches, not doing useful math. Fix: reduce
    memory reads via GQA (shrink KV-cache), INT8 KV quantization, and weight streaming with double-buffering
    in NPU SRAM.'
  common_mistake: '"The NPU is at 98% utilization, so it''s compute-bound — we need a faster NPU." High
    utilization does NOT mean high throughput. The NPU can be 98% busy *waiting for memory*.'
  napkin_math: 'Model weights: 750 MB (INT4). KV-cache at 512 token context (assuming ~24 layers, 2048
    dim): 2 (K+V) × 24 × 2048 × 512 × 2 bytes (FP16) ≈ 100 MB. Total memory per token: 750 + 100 = 850
    MB. Peak LPDDR5x: 77 GB/s. NPU effective share: ~18 GB/s. Tokens/sec = 18,000 / 850 = 21.1. With GQA
    (8 KV heads instead of 32): KV-cache = 25 MB. Total = 775 MB. Tokens/sec = 18,000 / 775 = 23.2. With
    INT8 KV-cache: 12.5 MB. Total = 762.5 MB. Tokens/sec = 23.6. Combined with weight streaming (1.3×
    bandwidth efficiency): ~30 tokens/sec. Still below 40 TOPS theoretical — the gap is fundamental to
    memory-bound workloads.'
