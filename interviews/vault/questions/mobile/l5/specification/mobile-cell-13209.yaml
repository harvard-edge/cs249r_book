schema_version: 1
id: mobile-cell-13209
title: 'Mobile Transformer Cost Specification: Design Multi-Task Mobile LLM System'
topic: transformer-systems-cost
status: published
provenance: imported
scenario: 'Specify the model architecture and memory allocation for a multi-task on-device AI system on
  Snapdragon 8 Gen 3 (16GB, 77GB/s). Tasks: (1) always-on keyword spotting (P99 < 10ms), (2) on-demand
  chat assistant (P99 < 3s for 100 tokens), (3) document summarization (P99 < 10s for 500 tokens). Design
  models that coexist in memory and meet all SLOs simultaneously.'
details:
  realistic_solution: 'Memory: 16GB - 4GB OS = 12GB available. Task 1 (keyword spotting): tiny model,
    10ms P99. Need <10ms total. Streaming audio: CNN 1M params INT8 = 1MB. Inference: 1MB/68GB/s=0.015ms.
    Fits in always-on DSP (not LPDDR5 bandwidth). Dedicated to audio DSP. Task 2 (chat): 3B INT4 = 1.5GB.
    100 toks: 1.5/77*100=1.948s < 3s ✓. Task 3 (summarization): 500 tokens: 1.5/77*500=9.74s < 10s ✓.
    Same 3B model serves tasks 2+3! Memory: 1MB (keyword) + 1.5GB (3B) + KV cache (2K context, ~65MB)
    = 1.565GB. 12-1.565=10.4GB free. Total: 1.565GB for all three tasks. Specification: single 3B INT4
    model, keyword DSP model, KV cache management.'
  common_mistake: Loading separate models for each task without considering a shared backbone architecture
    (like a multi-task model or adapter-based approach) that fits in memory once while serving all tasks.
  napkin_math: 'Task 1: 1MB INT8 on DSP. 0.015ms. ✓. Task 2: 3B INT4=1.5GB. 1.948s/100 toks. ✓. Task 3:
    same 3B: 500 toks * 1.5/77=500*19.5ms=9.74s. ✓. Memory: 1MB+1.5GB+65MB KV=1.565GB. 12-1.565=10.4GB
    free. Can extend to: add 7B INT4 (3.5GB) for premium summarization: 1.565+3.5=5.065GB. Still fits.
    7B summarization: 500*3.5/77*1000=500*45.5ms=22.75s → exceeds 10s. Can''t use 7B for 500 token SLO.
    Stick with 3B. Optimization: for summarization, generate in streaming mode — show first 100 tokens
    in 1.95s (good UX) while generating rest. Perceived latency <2s even at 9.74s completion.'
