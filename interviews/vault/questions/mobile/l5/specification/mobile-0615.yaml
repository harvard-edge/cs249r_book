id: mobile-0615
title: The Hardware-Aware NAS for Mobile
topic: transformer-systems-cost
status: published
provenance: imported
scenario: You need a model that runs in <5ms on the Apple Neural Engine AND <8ms on the Qualcomm Hexagon
  NPU. Standard NAS finds architectures that minimize FLOPs, but a low-FLOP model isn't necessarily fast
  on either accelerator. How do you run NAS that optimizes for actual on-device latency?
details:
  realistic_solution: 'FLOPs-optimized NAS fails because FLOPs do not equal latency on NPUs. A depthwise
    conv has fewer FLOPs but can be slower than a dense conv on NPUs optimized for matrix multiplication.
    Build latency lookup tables (LUTs) by profiling each candidate op on each target device: 480 entries
    per hardware, ~8 min to profile. During NAS search, predict latency by summing per-layer LUT entries.
    Use multi-objective optimization with latency constraints per platform. Result: architectures that
    meet both <5ms ANE and <8ms Hexagon targets, whereas FLOPs-only NAS missed the Hexagon target by 41%.'
  common_mistake: '"Minimize FLOPs — lower FLOPs always means lower latency." A depthwise separable convolution
    has fewer FLOPs than a standard convolution but can be *slower* on NPUs that are optimized for dense
    matrix operations. FLOPs ≠ latency.'
  napkin_math: 'Search space: 10²⁰ possible architectures (20 layers × 6 op choices × 5 channel widths).
    LUT size: 6 ops × 10 channel configs × 8 resolutions = 480 entries per hardware. Profiling: 480 ×
    100 runs × 10ms = 8 minutes per hardware. NAS search: 500 GPU-hours on a cloud cluster (ProxylessNAS).
    Found architecture: 3.8ms on ANE (under 5ms ✓), 7.2ms on Hexagon (under 8ms ✓), 76.3% ImageNet top-1.
    Comparable FLOPs-optimized NAS result: 4.1ms ANE, 11.3ms Hexagon (fails Hexagon target). The hardware-aware
    search found a 37% faster Hexagon architecture at equal accuracy.'
