schema_version: 1
id: mobile-0784
title: Thermal-Aware On-Device Pipelining
topic: real-time-deadlines
status: published
provenance: imported
scenario: 'A mobile AR application processes video at 30 FPS (33.3ms per frame SLA). The synchronous vision
  pipeline is: ISP extraction (5ms) -> NPU Object Detection (10ms) -> GPU Style Transfer (15ms). Total
  latency = 30ms. After 5 minutes, thermal throttling drops GPU clock speed by 40%, increasing Style Transfer
  to 25ms. Total synchronous latency becomes 40ms, causing massive frame drops.'
details:
  realistic_solution: 'Decompose latency into synchronous end-to-end time vs. pipeline throughput. In
    a synchronous architecture, $T_{frame} = T_{ISP} + T_{NPU} + T_{GPU}$. When throttled, $T_{frame}
    = 5 + 10 + 25 = 40ms$, yielding $1000/40 = 25$ FPS. To fix this without dropping model quality, decouple
    the stages into an asynchronous pipeline using bounded queues (ring buffers) between the ISP, NPU,
    and GPU. In a pipelined architecture, throughput is determined by the bottleneck stage: $T_{bottleneck}
    = \max(T_{ISP}, T_{NPU}, T_{GPU})$. Even under thermal throttling, the slowest stage (GPU) takes 25ms.
    Since $25ms < 33.3ms$, the system can process a new frame every 25ms (40 FPS capacity), easily meeting
    the 30 FPS SLA. The tradeoff is that end-to-end latency increases to ~75ms (frames are delayed by
    2-3 frames), but rendering frame rate remains perfectly smooth.'
  common_mistake: Switching to a lower-precision or smaller GPU model upon throttling, which permanently
    degrades visual quality.
  napkin_math: 'Synchronous throttled: $1000 / (5 + 10 + 25) = 25$ FPS (violates 30 FPS SLA). Pipelined
    throttled throughput: $1000 / \max(5, 10, 25) = 1000 / 25 = 40$ FPS capacity. Since $40 > 30$, the
    30 FPS SLA is maintained.'
