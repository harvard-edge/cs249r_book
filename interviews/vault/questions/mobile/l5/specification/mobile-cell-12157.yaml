id: mobile-cell-12157
title: 'Network Bandwidth Bottlenecks: Specify QoS Framework for Multi-Model Mobile Inference'
topic: network-bandwidth-bottlenecks
status: published
provenance: imported
scenario: 'Specify a complete QoS framework for a flagship Android device (Snapdragon 8 Gen 3, 16GB, 77
  GB/s) that runs up to 5 simultaneous ML models with different priorities. Framework must: define priority
  tiers, bandwidth allocation algorithm, preemption policy, degraded-mode fallback, and monitoring SLAs.
  All specs must be concrete numbers.'
details:
  realistic_solution: 'Priority tiers: P1=Safety (collision avoidance if applicable, 10GB/s reserved).
    P2=User-interactive LLM (50GB/s, preemptible only by P1). P3=Display compositing (5GB/s, non-preemptible).
    P4=Background tasks (12GB/s max). P5=Idle prefetch (remaining). WFQ weights: P1=50, P2=40, P3=10.
    Total guaranteed: 10+50+5=65GB/s + 12GB/s background = 77GB/s. Preemption: P2 preempts P4 when LLM
    decode active. P4 BW drops to 0. Degraded mode: if total > 77GB/s for >5ms → drop P4 to 0 + notify
    app. P2 SLA: TPOT < 25ms P95. P3 SLA: 60fps maintained. Monitoring: log BW per priority every 100ms.'
  common_mistake: Defining QoS tiers without a concrete bandwidth allocation algorithm (e.g., weighted
    fair queuing with specific weights) and without handling the case where sum > 77 GB/s.
  napkin_math: 'WFQ: P1=10GB/s guaranteed. P2=50GB/s. P3=5GB/s. Sum=65GB/s < 77GB/s. Slack: 12GB/s for
    P4. When P2 active (LLM): 50GB/s → TPOT: 1.5GB/50=30ms. Over target! Increase P2 to 65GB/s (sacrifice
    P4 entirely): TPOT: 1.5/65=23ms < 25ms ✓. P3: 5GB/s → 60fps ✓ (needs 1.5GB/s). P1 idle: 10GB/s guaranteed
    (bumps P2 to 65+10=75GB/s). Total: 75+5=80GB/s? Allow P2+P1 to share when P1 not active: P2 gets 72GB/s.
    TPOT: 1.5/72=20.8ms ✓.'
