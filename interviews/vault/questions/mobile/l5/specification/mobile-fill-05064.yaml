schema_version: 1
id: mobile-fill-05064
title: Multi-Task Model Specification for On-Device AI Assistant on A17 Pro
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: 'Specify the architecture of an on-device AI assistant for iPhone 15 Pro that must handle: speech
  recognition (streaming, <200ms latency), intent classification (50ms), and response generation (LLM,
  10-15 tok/s). Total memory budget: 1.5GB. Specify model sizes, quantization, and execution units.'
details:
  realistic_solution: 'Speech recognition: Whisper-small (244M params) → INT4 = 122MB, runs on ANE. Streaming:
    chunk-based (1s windows), ANE throughput = 35 TOPS, Whisper-small 2.3 GFLOP/s = 0.066ms chunk → well
    within 200ms real-time. Intent classification: lightweight BERT-mini (11M params) INT8 = 11MB, runs
    on ANE concurrently. Response LLM: Phi-2 2.7B INT4 = 1.35GB — large but fits budget. Total: 122+11+1350
    = 1483MB ≈ 1.45GB < 1.5GB. Execution: Whisper on ANE (streaming background), intent on ANE (post-ASR,
    50ms), LLM on CPU/ANE hybrid (decode). Pipeline: ASR feeds intent feeds LLM. No model is running simultaneously
    at full capacity.'
  common_mistake: Designing three separate full-size models that each compete for memory; a shared encoder
    with task-specific heads dramatically reduces memory footprint.
  napkin_math: 'Whisper-small INT4: 122MB. BERT-mini INT8: 11MB. Phi-2 INT4: 1350MB. Total: 1483MB < 1500MB
    budget. Execution: ANE handles ASR+intent (sequential, <250ms). LLM: CPU+Metal at 10-15 tok/s. Memory
    budget met. Latency: ASR 200ms + intent 50ms + first token 300ms = 550ms response start.'
