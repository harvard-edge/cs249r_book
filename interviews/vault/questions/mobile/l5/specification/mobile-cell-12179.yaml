schema_version: 1
id: mobile-cell-12179
title: 'Network Bandwidth Bottlenecks: Specification — Design Bandwidth QoS for 5G Hybrid Mobile Inference'
topic: network-bandwidth-bottlenecks
status: published
provenance: imported
scenario: Specify a bandwidth QoS policy for a 5G mobile device (Snapdragon 8 Gen 3, 16GB, 77 GB/s LPDDR5X)
  that intelligently routes LLM inference between on-device (3B INT4, TPOT=19.5ms) and cloud (H100, TPOT=7.8ms+RTT).
  The policy must minimize user-perceived latency across network conditions while respecting a $0.01 per
  1000 tokens cloud budget. Define routing rules with concrete thresholds.
details:
  realistic_solution: 'Cloud TPOT E2E: 7.8ms + RTT/token? No: RTT is one-time per request, not per token.
    Cloud E2E for 100 tokens: 100×7.8ms + RTT = 780ms + RTT. On-device: 100×19.5=1950ms. Cloud wins when
    780+RTT < 1950 → RTT < 1170ms. Always true (max 5G RTT ~200ms). Cloud always faster on latency! Budget:
    at $0.01/1000 tokens = $0.000010/token. 100 tokens = $0.001. At 10 queries/hr = 1000 tokens/hr = $0.01/hr.
    Affordable. Policy: route to cloud if: (1) 5G available (RTT < 200ms), (2) budget not exceeded, (3)
    privacy-non-sensitive query. On-device: when offline, budget exceeded, or sensitive. LPDDR5X allocation:
    on-device: 77GB/s for LLM. Cloud: radio uses ~500MB/s for upload (text only).'
  common_mistake: Defining routing purely on RTT without considering that the on-device model is 2.5×
    slower than cloud — at any RTT < (19.5-7.8)ms=11.7ms, cloud wins on latency even without counting
    prefill.
  napkin_math: 'Cloud: 780ms+RTT for 100 tokens. On-device: 1950ms. Cloud always faster. Budget: $0.01/1000
    tokens. Typical use: 5000 tokens/day = $0.05/day = $1.50/month. Affordable. 5G upload (100 token prompt):
    100×4B=400B / 100Mbps=32μs (negligible). Download (100 token response): 400B / 100Mbps=32μs. Network
    I/O trivial vs inference time. Route to cloud by default, on-device as fallback.'
