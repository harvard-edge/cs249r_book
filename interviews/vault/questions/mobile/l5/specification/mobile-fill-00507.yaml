id: mobile-fill-00507
title: Mixed-Precision LLM Deployment on Samsung Exynos 2400 NPU
topic: mixed-precision-training
status: published
provenance: imported
scenario: You are tasked with deploying a 7B parameter Large Language Model (LLM) for real-time natural
  language understanding on a mobile device powered by the Samsung Exynos 2400 NPU. This NPU offers 34.7
  TOPS (typically for INT8 or FP16 operations) and 12 GB of LPDDR5X memory. Your objective is to achieve
  an inference latency of under 50ms per token and maintain model accuracy within 1% of the FP32 baseline,
  all while strictly adhering to the 12 GB memory budget. The initial LLM is trained in FP32. Design a
  comprehensive mixed-precision strategy, considering FP16, BF16, and FP8 formats, specific mixed-precision
  recipes (e.g., for different layers), and potential implications of loss scaling if fine-tuning is required
  on the device.
details:
  realistic_solution: 'A realistic solution involves a systematic approach: start by profiling the FP32
    model on the NPU to identify performance bottlenecks and memory hotspots. Gradually introduce FP16
    for weights and activations, layer by layer, starting with less sensitive parts, and continuously
    monitor accuracy. For layers highly sensitive to precision reduction, consider using BF16 or keeping
    them in FP32. If FP8 is desired, investigate quantization-aware training (QAT) or advanced post-training
    quantization (PTQ) techniques specifically optimized for the Exynos 2400''s capabilities, potentially
    using vendor-specific tools. If fine-tuning is necessary, implement and carefully tune dynamic loss
    scaling to prevent numerical issues. Furthermore, analyze the NPU''s specific capabilities regarding
    FP16/BF16/FP8 acceleration for different operator types to make informed decisions about mixed-precision
    recipes.'
  common_mistake: A common mistake is directly converting an entire FP32 model to a lower precision like
    FP16 or FP8 without analyzing the sensitivity of individual layers, which can lead to catastrophic
    accuracy drops. Another pitfall is neglecting dynamic loss scaling during fine-tuning or training
    with mixed precision, resulting in underflow of gradients and training instability. Developers often
    assume uniform hardware support for all low-precision formats across all operations, which can lead
    to suboptimal performance or accuracy if certain operations are slower or less precise in specific
    formats on the Exynos 2400 NPU.
  napkin_math: "1. **Memory Budget Check**: A 7B parameter FP32 model requires 7B * 4 bytes/param = 28\
    \ GB, significantly exceeding the 12 GB NPU memory. In FP16, it requires 7B * 2 bytes/param = 14 GB,\
    \ still exceeding the budget. This immediately indicates a need for aggressive quantization, likely\
    \ to INT8 or FP8 for most parameters, or model pruning. If using FP8 for weights (1 byte/param), it\
    \ would be 7B * 1 byte = 7 GB, which fits the 12 GB budget. \n2. **TOPS to FLOPs for Inference**:\
    \ If the NPU performs 34.7 TOPS (FP16), and assuming the LLM requires, for example, 1000 GFLOPs for\
    \ a single token inference (a rough estimate depending on model architecture and sequence length),\
    \ then the theoretical minimum inference time would be 1000 * 10^9 FLOPs / (34.7 * 10^12 FLOPs/s)\
    \ ≈ 28.8 ms. This provides a baseline to assess if the 50ms per token target is achievable. \n3. **Bandwidth\
    \ Considerations**: Calculate the memory bandwidth required to load model weights and intermediate\
    \ activations for each inference step (e.g., total weight size / target latency) and compare against\
    \ the LPDDR5X bandwidth (typically 68 GB/s or higher for LPDDR5X) to identify potential data transfer\
    \ bottlenecks."
