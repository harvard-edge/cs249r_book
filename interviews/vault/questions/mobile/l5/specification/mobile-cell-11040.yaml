id: mobile-cell-11040
title: 'Dataset Curation: Specification — Mobile Data Quality SLA for RLHF Personalization'
topic: dataset-curation
status: published
provenance: imported
scenario: You are writing the data quality specification for on-device RLHF personalization on A17 Pro
  (35 TOPS, 8GB). The system collects implicit feedback (accept/reject suggestions) from user interactions.
  Define quantitative SLAs for minimum feedback volume, feedback quality, bias correction, and privacy
  budget before a personalization update fires.
details:
  realistic_solution: 'SLAs: (1) Minimum volume: >= 50 explicit feedback events before any update. (2)
    Signal quality: accept rate 20-80% (outside range indicates broken UI, not real preference). (3) Temporal
    distribution: feedback spans >= 3 days (not a single session). (4) Privacy: DP budget ε < 0.5 per
    update, max 12 updates/year = ε < 6.0/year with composition. (5) Bias: flag if > 80% accepts (sycophancy)
    or > 80% rejects (model too bad to personalize).'
  common_mistake: Triggering personalization on very few signals (< 10 samples), leading to noise-driven
    updates; not specifying a minimum observation window.
  napkin_math: 'Minimum 50 feedback events. Average user: 20 suggestions/day accepted or rejected. Collection
    window: 50 events / 20/day = 2.5 days. DP per update: ε=0.5, δ=1e-7. Using Gaussian mechanism on LoRA
    gradients: noise multiplier σ=0.3 for ε=0.5 at batch=50 samples. Update frequency: 12/year = monthly.
    Annual DP budget: advanced composition over 12 rounds: ε_total ≈ sqrt(12) × 0.5 = 1.73 (basic), or
    ≈ 1.2 with RDP. Fine-grained DP accounting with Opacus. Storage for 50 feedback events: 50 × (prompt
    512 tokens + response 128 tokens) × 2B = 64KB — trivial.'
