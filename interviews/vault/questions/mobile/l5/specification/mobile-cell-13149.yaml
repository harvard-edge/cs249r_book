id: mobile-cell-13149
title: 'Mobile TCO Specification: Design Mobile-First AI Product Cost Model'
topic: tco-cost-modeling
status: published
provenance: imported
scenario: 'Specify a complete cost model for a mobile-first AI coding assistant targeting 200K paid users
  at $15/month. Users: 100 code completions/day (10 tokens each, on-device A17 Pro), 5 complex refactors/day
  (500 tokens, cloud H100), 2 test generations/day (200 tokens, cloud). Specify on-device vs cloud split,
  annual revenue, cost breakdown, and gross margin. Cloud: $0.001/1K tokens.'
details:
  realistic_solution: 'Annual revenue (before Apple cut): 200K * $15 * 12 = $36M. Apple IAP 30% cut (first
    yr) / 15% (after 1yr): assume avg 22.5%. Net revenue: $36M * 0.775 = $27.9M. Cloud costs: 200K * 5
    * 500 * 365 * $0.001/1000 = 200K * 912.5 = $182.5M/1000 = $182,500/yr for refactors. Test gen: 200K*2*200*365*$0.001/1000=$29,200/yr.
    Total cloud: $211,700/yr. On-device: negligible energy cost. Gross margin: ($27.9M - $211.7K) / $27.9M
    = 99.2% — extremely high before engineering and infra. Net margin after $5M engineering + $1M infrastructure
    = ($27.9M-$211.7K-$5M-$1M)/$27.9M=77.2%.'
  common_mistake: Not factoring in payment processing fees (2.9%+$0.30 per transaction through Apple IAP
    at 30% cut for subscriptions), which dramatically affects mobile app gross margins.
  napkin_math: 'Revenue: 200K*$15*12=$36M. After Apple 15%: $36M*0.85=$30.6M (after first year at 30%).
    Cloud: complex=200K*5refactors*500tok*365*$0.001/1000=$182,500. Test=200K*2*200*365*$0.001/1000=$29,200.
    Total cloud=$211,700/yr. On-device: 200K*100comp*10tok*365*$0.001/1000=negligible($73K/yr). Total
    infra: $284,700. Gross margin: ($30.6M-$284.7K)/$30.6M=99.1%. After $5M engineering + $1M ops: operating
    margin=($30.6M-$284.7K-$6M)/$30.6M=79.5%. Exceptional unit economics for a mobile AI app — most cost
    is Apple''s cut.'
