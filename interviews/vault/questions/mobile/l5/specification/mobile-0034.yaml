id: mobile-0034
title: The Cross-Version Compatibility Maze
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: 'Your app supports iOS 16-18 and Android 10-15. You ship a Core ML 7 model (iOS 18 feature:
  stateful KV-cache for your on-device LLM). Users on iOS 16 crash on launch. Your Android TFLite model
  uses INT4 quantization, but devices running Android 10 with TFLite 2.11 don''t support INT4. How do
  you ship one app that works across all these OS versions?'
details:
  realistic_solution: 'Model tiering keyed to runtime capabilities, not OS version. Probe available APIs
    at launch: CoreML version, TFLite delegate support, quantization compatibility. Tier 1 (universal
    INT8, 25 MB): iOS 16+ / Android 10+ — ships in bundle. Tier 2 (palettized, 15 MB): iOS 17+ / Android
    12+ — downloaded post-install. Tier 3 (INT4 + stateful KV-cache, 8 MB): iOS 18 / Android 14+ with
    confirmed support. 52% Tier 3, 30% Tier 2, 18% Tier 1. Guard all paths with runtime capability checks.'
  common_mistake: '"Target the lowest common denominator — use only features available on iOS 16 and Android
    10." This means no stateful models, no INT4, no recent optimizations — your app is 3× slower than
    competitors who target newer OS versions.'
  napkin_math: 'Tier 1 model: 25 MB (INT8, universal). Tier 2: 15 MB (palettized, 30% smaller). Tier 3:
    8 MB (INT4, 70% smaller). App bundle with Tier 1: 25 MB. Post-install download for Tier 2/3: 8-15
    MB. User base split (typical 2026): iOS 18 (60%), iOS 17 (25%), iOS 16 (15%). Android 14-15 (45%),
    Android 12-13 (35%), Android 10-11 (20%). Tier 3 eligible: ~52% of users. Tier 2: ~30%. Tier 1: ~18%.'
