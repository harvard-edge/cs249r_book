id: mobile-fill-00526
title: Sub-4-bit LLM Deployment on Google Tensor G3
topic: extreme-quantization
status: published
provenance: imported
scenario: Your team is tasked with deploying a novel generative AI model, a 7B parameter Large Language
  Model (LLM), onto a smartphone powered by the Google Tensor G3. The model is currently trained in FP16,
  resulting in a 14 GB memory footprint and requiring approximately 15 TFLOPS for inference, making it
  impractical for on-device deployment. The Google Tensor G3 features a 7.5 TOPS (INT8) on-device TPU
  and 12 GB LPDDR5X memory. To meet the strict latency and memory constraints, you must achieve sub-4-bit
  quantization (e.g., 2-bit or 3-bit) while minimizing accuracy degradation for critical downstream tasks.
  Design a system and a strategy to achieve this.
details:
  realistic_solution: Implement a hybrid quantization strategy, potentially starting with a post-training
    quantization (PTQ) method like GPTQ or AWQ tailored for LLMs to get initial sub-4-bit weights (e.g.,
    2-bit or 3-bit). Pair this with 8-bit activations where necessary. Employ quantization-aware fine-tuning
    (QAT) on a small, representative dataset to recover lost accuracy, potentially using techniques like
    knowledge distillation or parameter-efficient fine-tuning (PEFT). Ensure efficient mapping of the
    quantized operations to the Google Tensor G3's on-device TPU, which excels at INT8. This may involve
    custom kernel development or leveraging specific framework optimizations (e.g., TFLite custom ops)
    to pack and process sub-4-bit weights within INT8 operations. Continuously validate against device-specific
    performance metrics (latency, memory usage) and crucial downstream task accuracy, defining rigorous
    validation protocols beyond standard perplexity.
  common_mistake: Applying naive quantization without considering the specific model architecture or the
    unique characteristics of sub-4-bit schemes. Ignoring the trade-offs between different quantization
    methods (e.g., GPTQ, AWQ, HQQ) or failing to implement proper calibration/finetuning for accuracy
    recovery. Not leveraging the hardware capabilities (e.g., the Tensor G3's INT8 TPU) effectively for
    sub-4-bit operations, leading to suboptimal performance or requiring custom kernels. Overlooking the
    importance of data distribution for quantization, especially for activations and weights, and not
    employing methods like outlier detection or adaptive quantization ranges.
  napkin_math: 'Original FP16 7B LLM memory footprint: 7B params * 2 bytes/param = 14 GB. With 2-bit quantization,
    this reduces to 7B params * (2/8) bytes/param = 1.75 GB, which fits within the 12 GB LPDDR5X memory.
    The Google Tensor G3 TPU offers 7.5 TOPS (INT8). If a 7B LLM inference requires approximately 14 *
    10^9 MAC operations per token and we target 10 tokens/second, this is 140 Giga-operations per second
    (GOPS). The TPU''s capacity (7500 GOPS) theoretically offers a substantial margin if sub-4-bit operations
    can be efficiently batched and executed as INT8 operations, shifting the primary challenge from raw
    compute to effective hardware utilization and accuracy preservation.'
