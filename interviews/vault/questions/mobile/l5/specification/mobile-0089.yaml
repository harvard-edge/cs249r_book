schema_version: 1
id: mobile-0089
title: Optimal Heterogeneous Graph Execution
topic: accelerator-comparison
status: published
provenance: imported
scenario: You have a complex ML model with a mix of convolutional, recurrent, and custom attention layers.
  Profiling shows that convolutions run best on the NPU, recurrent layers on the DSP, and custom attention
  layers (due to their sparsity patterns) are most efficient on the CPU. How would you design the execution
  strategy to minimize overall latency and power consumption on a mobile SoC with these heterogeneous
  compute units?
details:
  realistic_solution: This requires **fine-grained heterogeneous task graph partitioning and scheduling**,
    aiming to balance computation across devices, minimize data movement, and exploit parallelism.
  common_mistake: '"Just use a TFLite delegate and let it figure it out." While delegates provide a basic
    abstraction, they might not make optimal, fine-grained decisions for complex heterogeneous graphs,
    especially regarding cross-device data transfers and pipelining.'
  napkin_math: If an NPU-CPU data transfer costs 5ms for a specific tensor, and the CPU operation itself
    takes 2ms, it's better to keep that operation on the NPU if it takes <7ms there, even if the CPU is
    slightly faster *for the op itself*. The cost function for partitioning needs to consider `(compute_cost_on_device
    + transfer_cost_to_device)`.
