id: mobile-0605
title: The Accelerator Selection Conundrum
topic: accelerator-comparison
status: published
provenance: imported
scenario: 'You are tasked with deploying three distinct ML models on a new mobile SoC: a small, sequential
  RNN for text prediction, a large CNN for object detection, and a sparse Transformer model for personalized
  recommendations. Given the heterogeneous nature of modern mobile SoCs (CPU, GPU, NPU), which accelerator
  would you primarily target for each model, and what are the key architectural reasons for your choices?'
details:
  realistic_solution: "1.  **Small, Sequential RNN (Text Prediction):** Target the **CPU**, specifically\
    \ the \"big\" or \"prime\" cores.\n      *   **Reasons:** RNNs, especially small ones, often have\
    \ sequential dependencies (each step depends on the previous hidden state), limiting parallelism.\
    \ CPUs excel at sequential processing and have lower overhead for task switching and memory access\
    \ for smaller models. NPUs might struggle with the control flow or specific recurrent operations,\
    \ leading to inefficient delegation or CPU fallback. GPUs, while parallel, incur higher dispatch overhead\
    \ for small, sequential tasks, and their wide SIMD units might be underutilized.\n  2.  **Large CNN\
    \ (Object Detection):** Target the **NPU** (Neural Processing Unit).\n      *   **Reasons:** CNNs\
    \ are the NPU's bread and butter. They consist primarily of highly parallelizable operations like\
    \ convolutions, matrix multiplications, and pooling, which NPUs are specifically designed to accelerate\
    \ with dedicated hardware (e.g., systolic arrays, MAC units) and often INT8 quantization support.\
    \ This leads to superior power efficiency and throughput compared to GPUs or CPUs for this workload.\n\
    \  3.  **Sparse Transformer Model (Personalized Recommendations):** Target the **GPU** or a combination\
    \ of **CPU+GPU/NPU** with careful partitioning.\n      *   **Reasons:** Transformers involve attention\
    \ mechanisms and large matrix multiplications. While dense portions benefit NPUs, *sparse* operations\
    \ are tricky.\n          *   **GPU:** GPUs are highly parallel and flexible, capable of handling large\
    \ matrix multiplications. More importantly, their programmability (e.g., OpenCL/Vulkan compute shaders)\
    \ makes them better suited for handling sparse data structures and custom kernels often found in sparse\
    \ models, which NPUs might not natively support efficiently.\n          *   **CPU:** For very sparse\
    \ operations or complex indexing/gather-scatter operations, the CPU might be more efficient due to\
    \ its general-purpose nature and better control flow.\n          *   **Hybrid:** A sophisticated approach\
    \ might run dense attention/feed-forward layers on the NPU/GPU and handle sparse data manipulation\
    \ or embedding lookups on the CPU. The key challenge is minimizing data transfers between units."
  common_mistake: '"Always use the NPU, it''s fastest." This ignores the architectural strengths and weaknesses
    of different accelerators for different workloads.'
  napkin_math: A modern mobile NPU can achieve 10-20 TOPS (INT8), a mobile GPU 1-5 TFLOPS (FP16), and
    a CPU 100-500 GFLOPS (FP32). For a 100-layer CNN, the NPU's specialized architecture and INT8 support
    will generally outperform others by orders of magnitude in energy efficiency. A small RNN might only
    have 10-20 MFLOPS, which is easily handled by a CPU core with minimal overhead. A sparse Transformer
    might have bursts of 100 GFLOPS but with irregular memory access, making GPU's flexible compute better
    than NPU's fixed-functionality.
