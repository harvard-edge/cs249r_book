schema_version: 1
id: mobile-cell-11167
title: 'KV-Cache: Specification — KV Cache Requirements for Production Mobile LLM App'
topic: kv-cache-management
status: published
provenance: imported
scenario: 'Write the KV cache specification for a production mobile LLM chat app on A17 Pro (35 TOPS,
  8GB) serving 10M users. The app supports 3B LLM, 4096-token context. Define: max KV memory allocation,
  quantization requirements, eviction triggers, multi-conversation caching, and crash recovery requirements.'
details:
  realistic_solution: 'Each conversation has isolated KV storage. Quantization: INT8 for quality, INT4
    for long context. Eviction: background conversations'' KV offloaded to flash. Recovery: KV not persisted
    (recomputed on resume).'
  common_mistake: Not specifying per-conversation KV isolation (conversations must not share KV pages);
    not defining quantization format that meets both memory and quality requirements.
  napkin_math: '3B model INT4: 750MB. Per-conversation KV (INT8): 32 × 2 × 8 × 128 × 1B × 4096 = 268MB
    per active conversation. Memory budget: 8GB - 2GB OS - 750MB model - 500MB framework = 4.75GB. Single
    active conversation: 268MB KV → 4.48GB remaining. Multi-conversation: can hold 4.48/0.268 = 16.7 →
    16 background conversations in RAM. In practice: iOS suspends background apps. Only 1-2 conversations
    in RAM simultaneously. Specification: max KV per conversation: 268MB (INT8) or 134MB (INT4). Quantization:
    INT8 for active (quality), INT4 for background (memory). Eviction trigger: available memory < 1GB
    → offload oldest background conversation KV to flash. Flash KV: 268MB at 3 GB/s = 89ms write. Recovery:
    if KV evicted → recompute from conversation tokens (prefill). 4096 tokens × 3B model = 4096 × 3B ×
    6 FLOPs / 35 TOPS = 2.1 seconds recompute. Acceptable for background resume. SLA: active conversation
    KV always in RAM, < 100ms for KV restore.'
