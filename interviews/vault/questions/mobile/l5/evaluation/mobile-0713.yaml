id: mobile-0713
title: The Cross-SoC Quantization Divergence
topic: quantization-fundamentals
status: published
provenance: imported
scenario: 'You ship a single INT8 TFLite object detection model for your autonomous drone control app.
  The model must identify landing zones with >95% precision — a false positive means the drone lands on
  an unsafe surface. Testing on Pixel 8 (Tensor G3): 97.2% precision. On Samsung Galaxy S23 (Snapdragon
  8 Gen 2): 96.8%. On Samsung Galaxy S23 FE (Exynos 2200): 91.3%. The Exynos result is below your safety
  threshold. Same model binary, same test images. Why does precision drop 6% on Exynos, and how do you
  fix it without maintaining three separate models?'
details:
  realistic_solution: 'Three hardware-level INT8 execution differences: (1) Rounding modes — Tensor G3
    uses round-half-to-even, Hexagon uses round-half-up, Exynos uses truncation. Affects 0.5% of values
    per layer. (2) Accumulator width — Exynos 2200 uses INT16 accumulators that overflow on high-activation
    channels, while others use INT32. (3) Operator fusion boundaries change quantization error propagation
    paths. Over 50 layers: cumulative drift shifts detection confidence by ±0.05, pushing Exynos below
    the 0.85 safety threshold. Fix: QAT retraining with simulated hardware noise (4 GPU-hours), or per-SoC
    calibration tables (500 bytes total).'
  common_mistake: '"The Exynos is just less accurate — use a higher-precision model." FP16 would fix the
    accuracy but doubles the model size and inference time. The real question is *why* INT8 behaves differently
    on Exynos.'
  napkin_math: 'Rounding mode difference: affects 0.5% of values per layer. 50 layers: cumulative drift
    = 0.5% × 50 = 25% of activations shifted by ±1 LSB. Detection confidence range for "landing zone":
    0.85-0.95 on Tensor G3. After Exynos drift: 0.80-0.92. At threshold 0.85: Tensor G3 passes 97.2%,
    Exynos passes 91.3%. At adjusted threshold 0.82 for Exynos: passes 95.8% (above safety limit). QAT
    retraining cost: 4 GPU-hours. Calibration table size: 50 bytes per SoC family × 10 families = 500
    bytes. Negligible.'
