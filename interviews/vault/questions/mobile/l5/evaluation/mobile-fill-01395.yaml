id: mobile-fill-01395
title: Mobile NPU Adversarial Robustness Evaluation
topic: adversarial-robustness
status: published
provenance: imported
scenario: 'You are tasked with evaluating the reliability of a critical image classification model deployed
  on a Samsung Exynos 2400 NPU (34.7 TOPS, 12 GB LPDDR5X) in a mobile device. The model is susceptible
  to adversarial attacks, specifically evasion attacks. Your team has developed two defense strategies:
  Adversarial Training (AT) and certified robustness using randomized smoothing (RS). Design an evaluation
  methodology to compare these two defense strategies on the Samsung Exynos 2400 NPU, focusing on their
  impact on model reliability, inference latency, and memory footprint. The device''s limited power budget
  and thermal constraints are critical considerations.'
details:
  realistic_solution: 'Implement both AT and RS on a representative dataset. Benchmark each defense strategy''s
    performance on the Samsung Exynos 2400 NPU using metrics such as: 1. Robust Accuracy: Under various
    attack strengths (e.g., different epsilon values for PGD/FGSM attacks). 2. Inference Latency: Average
    inference time per image on the NPU. 3. Memory Footprint: Peak memory usage during inference. 4. Energy
    Consumption: (if measurable) during inference. 5. Model Size: The final deployed model size. The evaluation
    should involve a series of adversarial attacks (e.g., PGD, FGSM) against both defenses. The chosen
    metric should be a weighted combination of robust accuracy, latency, and memory, tailored to the specific
    application''s requirements for the Samsung Exynos 2400 NPU.'
  common_mistake: Overlooking the practical constraints of a mobile NPU. A common mistake would be to
    evaluate only the adversarial robustness metrics (e.g., accuracy under attack) without considering
    the impact of the defense mechanism on inference speed and memory usage on the Samsung Exynos 2400
    NPU. Forgetting that a highly robust but slow or memory-intensive model might be unusable in a real-world
    mobile application, especially when comparing two architectures/approaches.
  napkin_math: Consider a model with 100M parameters, where each parameter is 4 bytes (FP32). This is
    400MB. If the Samsung Exynos 2400 NPU has 12 GB LPDDR5X, this model fits. However, if adversarial
    training inflates the model size by 20% or requires larger intermediate activations, the memory budget
    might be tighter. For inference latency, if the NPU has 34.7 TOPS, and each inference requires, say,
    10 GFLOPS, then theoretical peak inferences per second is 34.7 * 10^12 / (10 * 10^9) = 3470 inferences/sec.
    Real-world latency will be much higher due to overhead, data transfer, and NPU utilization. If the
    target application requires 30 FPS, each inference must complete within ~33ms. A defense mechanism
    that adds 10ms to inference time might be acceptable, but 100ms would likely not be.
