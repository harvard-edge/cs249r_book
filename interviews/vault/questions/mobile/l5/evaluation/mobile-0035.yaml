schema_version: 1
id: mobile-0035
title: The Mobile A/B Testing Infrastructure at Scale
topic: monitoring-observability
status: published
provenance: imported
scenario: You run 12 concurrent ML model experiments across your app — different architectures, quantization
  levels, and preprocessing pipelines. Each experiment needs statistically significant results within
  2 weeks. You have 2M DAU. But your experiments keep producing contradictory results — model A beats
  model B in experiment 1, but model B beats A in experiment 3. Your data scientist says the experiments
  are 'interfering.' What's happening and how do you fix it?
details:
  realistic_solution: 'The interference comes from **overlapping experiments sharing system resources**
    on the same device:'
  common_mistake: '"Run each experiment on a separate user cohort." With 12 experiments and 2M DAU, each
    cohort gets ~167K users. For experiments measuring small effects (1-2% improvement), you need 50K+
    per variant — so each experiment can only have 3 variants. This severely limits your experimentation
    velocity.'
  napkin_math: '**Standard MDE formula (two-sample proportion test):** MDE = Z x √(2p(1-p)/n), where Z
    = Z_{α/2} + Z_β ≈ 2.8 (for α=0.05, power=80%). With p=0.5 (maximum variance): | **Naive independent
    (12 experiments, 2M DAU):** n per experiment = 2M / 12 = 167K. n per variant (A/B) = 83.5K. MDE =
    2.8 x √(2 x 0.25 / 83,500) = 2.8 x √(0.00000599) = 2.8 x 0.00245 = **0.69%.** | **Layered (3 layers,
    4 experiments each):** Each layer uses full 2M DAU. n per experiment = 2M / 4 = 500K. n per variant
    = 250K. MDE = 2.8 x √(2 x 0.25 / 250,000) = 2.8 x √(0.000002) = 2.8 x 0.00141 = **0.40%.** | **Improvement:**
    Layered design reduces MDE from 0.69% to 0.40% (1.7x more sensitive) while running the same number
    of experiments. | **Thermal throttling:** ~15% of budget Android devices throttle during daytime.
    Excluding them loses 15% sample (MDE increases ~8%) but eliminates the hardware confound causing contradictory
    results.'
