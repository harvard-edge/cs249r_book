schema_version: 1
id: mobile-exp2-eval-0008
title: On-Device Summarization Architecture Selection
topic: encoder-decoder-tradeoffs
status: published
provenance: imported
scenario: 'Your team is building a real-time meeting summarization feature for a mobile device powered
  by the Samsung Exynos 2400. The SoC features a dual-core NPU capable of 34.7 TOPS, but its 12 GB of
  LPDDR5X memory is heavily shared with the CPU, GPU, and ISP during live video calls. You must choose
  between two INT8-quantized 2-billion parameter architectures with identical task accuracy: a decoder-only
  model and an encoder-decoder model. Which architecture do you choose for this deployment and why?'
details:
  realistic_solution: The encoder-decoder architecture is superior for this memory-constrained, multitasking
    environment. While the dual-core NPU provides ample compute, the 12 GB LPDDR5X memory is actively
    shared with the ISP and GPU processing the video call, making memory bandwidth the primary bottleneck.
    An encoder-decoder model maintains a static cross-attention cache for the input sequence and a much
    smaller self-attention KV cache for the generated tokens, significantly reducing memory footprint
    and bandwidth contention during the autoregressive phase compared to a decoder-only model.
  common_mistake: Candidates often reflexively choose the decoder-only architecture because it represents
    the modern LLM standard, without considering the memory bandwidth bottleneck during autoregressive
    generation. They fail to account for how the KV cache scales differently between the two architectures
    and how that impacts a heavily shared memory bus.
  napkin_math: 'Assume an input of 2000 tokens and an output of 200 tokens, with d_model=2048. A 24-layer
    decoder-only model requires a KV cache for all 2200 tokens: 2 bytes(FP16) * 2(K,V) * 24(layers) *
    2048(d) * 2200 = ~432 MB. A comparable encoder-decoder (12 encoder / 12 decoder layers) requires a
    cross-attention cache for the input: 2 * 2 * 12 * 2048 * 2000 = ~196 MB, plus a self-attention cache
    for the output: 2 * 2 * 12 * 2048 * 200 = ~20 MB (Total: ~216 MB). The encoder-decoder halves the
    KV cache footprint, drastically reducing the memory bandwidth required per generated token, which
    is critical to prevent frame drops when the 12 GB RAM is shared with the ISP and GPU.'
