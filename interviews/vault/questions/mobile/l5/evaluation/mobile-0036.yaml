id: mobile-0036
title: The Performance Regression Detective
topic: monitoring-observability
status: published
provenance: imported
scenario: Your latest app update didn't change the ML model, but inference latency on iPhone 14 Pro increased
  from 12 ms to 28 ms — a 2.3× regression. The model binary is identical (same SHA-256). No code changes
  touched the inference path. Your team is baffled. Find the regression.
details:
  realistic_solution: 'The regression is in the **build configuration or framework version**, not the
    model or inference code:'
  common_mistake: '"If the model didn''t change and the inference code didn''t change, the latency can''t
    have changed." This assumes the model and code are the only variables. On mobile, the *runtime environment*
    is a massive variable.'
  napkin_math: 'ANE inference: 12 ms (all layers on ANE). After delegate rerouting: 3 layers moved to
    GPU. ANE layers: 8 ms. GPU layers: 20 ms (but GPU and ANE can partially overlap). Total: 28 ms. The
    16 ms regression is entirely from 3 layers moving off the ANE. Fix: force ANE execution via `MLModelConfiguration.computeUnits
    = .cpuAndNeuralEngine` (exclude GPU). Or: file a radar with Apple and pin to the previous iOS version''s
    routing behavior.'
