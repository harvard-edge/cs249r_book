schema_version: 1
id: mobile-exp2-eval-0009
title: Evaluating DRAM vs Compute Energy for A17 Pro
topic: energy-per-operation
status: published
provenance: imported
scenario: 'You are deploying a high-resolution video segmentation model on the Apple A17 Pro Neural Engine,
  which delivers 35 TOPS at roughly a 5W power budget and shares 8 GB of unified memory with the CPU/GPU.
  You are evaluating two architecture variants: Model A minimizes total compute operations but produces
  large intermediate activation tensors that frequently spill to the unified memory. Model B uses aggressively
  fused layers and recomputation, which requires 25% more MAC operations but ensures all intermediate
  activations remain strictly within the 16-core Neural Engine''s local SRAM. Which model do you choose
  to maximize battery life, and why?'
details:
  realistic_solution: Model B is the correct choice because energy consumption on modern mobile platforms
    is overwhelmingly dominated by data movement, not compute. By keeping activations localized within
    the Neural Engine's SRAM through layer fusion and recomputation, Model B drastically reduces unified
    memory bandwidth. The energy saved from avoiding off-chip DRAM reads and writes far exceeds the marginal
    cost of performing 25% more arithmetic operations on the highly efficient A17 Pro.
  common_mistake: Candidates often choose Model A by solely looking at the theoretical compute cost (MACs
    or TOPS) and assuming that fewer operations strictly equate to lower power consumption. They fail
    to apply the principles of the Horowitz energy table, ignoring the fact that off-chip memory access
    is orders of magnitude more expensive than arithmetic operations on a mobile SoC.
  napkin_math: 'Assuming standard Horowitz energy estimates: an INT8 MAC costs ~0.2 pJ, and LPDDR5 unified
    memory access costs ~10 pJ/bit (or ~80 pJ/byte). Model A utilizes 15 TOPS of the A17 Pro''s 35 TOPS
    capacity, consuming 15e12 * 0.2e-12 = 3.0W in compute. It generates 20 GB/s of DRAM traffic, adding
    20e9 * 80e-12 = 1.6W for memory (Total: 4.6W, dangerously close to the 5W budget). Model B increases
    compute by 25% to 18.75 TOPS, consuming 18.75e12 * 0.2e-12 = 3.75W. However, localizing activations
    reduces DRAM traffic to just 2 GB/s, consuming only 2e9 * 80e-12 = 0.16W for memory. Total power drops
    from 4.6W to 3.91W, proving Model B is more energy-efficient.'
