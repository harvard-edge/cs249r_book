schema_version: 1
id: mobile-0732
title: 'The On-Device Fine-Tuning Corruption: 3D Parallelism'
topic: 3d-parallelism
status: draft
provenance: imported
scenario: Your language learning app fine-tunes an on-device pronunciation model to each user's accent.
  The base model scores 88% accuracy. After 2 weeks of personalization on a Pixel 8 Pro (Tensor G3, 12
  GB RAM), most users improve to 93%. But 5% of users report the model 'gets worse over time' — accuracy
  drops to 60% and the app starts accepting clearly wrong pronunciations. Resetting to the base model
  fixes it. What's corrupting the fine-tuned model?
details:
  realistic_solution: 'The corruption is caused by catastrophic forgetting amplified by non-IID training
    data and interrupted training. The 5% of affected users share a pattern: they provide highly repetitive
    training examples (e.g., only correct pronunciations of 3-4 words), creating an extremely non-IID
    local distribution. After 50+ fine-tuning steps on this narrow data, the model weights drift to overfit
    the repeated patterns, destroying features for dissimilar phonemes. Compounding this, mobile training
    is frequently interrupted (app backgrounded, phone call), leaving optimizer state corrupted. Fix with
    Elastic Weight Consolidation (EWC): compute Fisher information matrix on base model (2 MB storage,
    0.1 ms overhead per batch on Tensor G3). EWC penalizes changes to important weights, reducing corruption
    rate from 5% to <0.5%. Add atomic checkpointing: write 40 MB checkpoint only after full step completes
    (40 MB / 1.5 GB/s UFS 3.1 = 27 ms). Keep current + previous checkpoint (80 MB total). On corruption
    detection (accuracy drops >10% on validation), roll back automatically.'
  common_mistake: '"The users are providing bad training data." If 95% of users improve, the training
    pipeline works. The 5% failure rate points to a *systematic* issue affecting a specific subset of
    devices or usage patterns.'
  napkin_math: 'Base model accuracy: 88%. Healthy personalization: 93% (+5%). Corrupted model: 60% (-28%).
    Corruption rate: 5% of users. With EWC: corruption rate drops to <0.5%. EWC overhead: Fisher matrix
    storage = 2 MB. Per-batch compute overhead: one element-wise multiply + add = ~0.1 ms on Tensor G3.
    Training time increase: <1%. Atomic checkpointing: 40 MB writes per session. UFS 3.1 write speed:
    1.5 GB/s. Overhead: 27 ms. Storage: only 2 checkpoints kept (current + previous) = 80 MB.'
