schema_version: 1
id: mobile-exp2-eval-0370
title: Mmap Strategies for Exynos 2400 Shared Memory
topic: memory-mapped-inference
status: published
provenance: imported
scenario: 'You are leading the deployment of a 4-billion parameter language model (FP16 weights) on the
  Samsung Exynos 2400 NPU. The device features 34.7 TOPS, a dual-core NPU, and 12 GB LPDDR5X RAM shared
  with the CPU, GPU, and ISP. To mitigate cold start latency, you must evaluate two memory management
  alternatives: Alternative A uses `mmap` with `mlock` to pin the entire 8 GB model into RAM on app launch,
  while Alternative B uses pure `mmap` to load pages on demand during inference. Which strategy is better
  suited for this architecture, and why?'
details:
  realistic_solution: Alternative A (using `mmap` with `mlock`) is the superior choice for predictable
    latency, despite the initial loading cost. While pure `mmap` solves the cold start problem, the Exynos
    2400's shared memory architecture means background processes can easily cause page evictions. The
    dual-core NPU can easily bottleneck on memory bandwidth if constantly waiting for page faults from
    storage, squandering its compute potential. Pinning critical layers ensures consistent token generation
    times.
  common_mistake: Candidates often choose pure mmap (Alternative B) to minimize startup time without considering
    the severe latency spikes caused by page faults during inference. They fail to account for the fact
    that a shared 12 GB RAM pool means the OS will aggressively evict pages if the camera (ISP) or UI
    (GPU) suddenly requires memory, leading to continuous thrashing.
  napkin_math: A 4B parameter model in FP16 requires 8 GB of memory. The Exynos 2400 has 12 GB of shared
    LPDDR5X. If the Android system and GPU consume 3 GB, only 9 GB remains. With pure mmap (Alternative
    B), a page fault fetching a 2 MB chunk from UFS 4.0 storage (at ~4 GB/s) takes 0.5 ms. The NPU's 34.7
    TOPS can process this 2 MB chunk in less than 0.1 ms, meaning the NPU will spend 80%+ of its time
    stalled on storage I/O.
