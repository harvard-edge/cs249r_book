schema_version: 1
id: mobile-0630
title: The Speculative Pruning Paradox
topic: roofline-analysis
status: published
provenance: imported
scenario: Your team is tasked with deploying a 3-billion parameter generative language model on a flagship
  mobile phone (like one with a Snapdragon 8 Gen 3 SoC). The goal is interactive, real-time generation.
  The initial FP16 model is too slow, taking over 50ms per token.
details:
  realistic_solution: The core failure is a negative feedback loop between the two optimizations. Speculative
    decoding's speedup is entirely dependent on the *acceptance rate* of the draft model's tokens. By
    applying 50% unstructured pruning to the main 'verifier' model, the team severely damaged its accuracy
    and changed its internal representations.
  common_mistake: Focusing only on the theoretical benefit of each optimization in isolation. A common
    answer is, 'Unstructured pruning doesn't provide speedup on mobile NPUs, that's the only problem.'
    While true, this misses the more critical, systemic failure. Another mistake is to blame the draft
    model for being 'too dumb,' without explaining *why* that interacts poorly with the pruned main model.
  napkin_math: '**Baseline**: 3B model at FP16, Snapdragon 8 Gen 3. Latency: 50 ms/token.


    **Optimization 1 — Speculative Decoding (alone):**

    - Draft model: 300M params, 5 ms/token. Generates K=5 candidate tokens.

    - Verification: main model checks 5 tokens in one forward pass ≈ 55 ms (slightly more than single
    token due to longer sequence).

    - Acceptance rate with accurate main model: ~80% (4 of 5 tokens accepted).

    - Effective tokens per cycle: 4 accepted + 1 corrected = 5 tokens in 5×5 + 55 = 80 ms.

    - Effective latency: 80 / 5 = **16 ms/token** → 3.1× speedup.


    **Optimization 2 — 50% Unstructured Pruning (alone):**

    - Theoretical: same FLOPs (sparse ops on mobile NPU don''t skip zeros).

    - Actual speedup: **~1.0×** (no real latency gain on mobile hardware). Latency: still ~50 ms/token.

    - But accuracy degrades: perplexity increases ~15%.


    **Combined — Pruned model + Speculative Decoding:**

    - Pruned main model has degraded accuracy → its probability distribution diverges from the draft model''s.

    - Acceptance rate drops from 80% to ~30% (only 1-2 of 5 tokens accepted).

    - Effective tokens per cycle: 1.5 accepted + 1 corrected = 2.5 tokens in 80 ms.

    - Effective latency: 80 / 2.5 = **32 ms/token** → only 1.6× speedup.

    - Worse: the pruned model''s own outputs are lower quality, so end-to-end generation quality degrades.


    **The paradox**: Pruning gave 0× compute speedup but destroyed speculative decoding''s 3.1× gain,
    netting a result worse than speculative decoding alone.'
