id: mobile-fill-00191
title: KV-Cache Optimization for Large Language Models on Edge NPUs
topic: kv-cache-management
status: published
provenance: imported
scenario: 'Imagine you are deploying a large language model (LLM) with a context window of 8192 tokens
  onto a mobile device powered by the Samsung Exynos 2400 NPU, which features 34.7 TOPS and 12 GB of LPDDR5X
  memory. Your team is evaluating two approaches for KV-cache management to minimize memory pressure and
  maximize inference throughput:

  1. **Paging-based KV-Cache:** A system employing paged attention with a fixed page size, similar to
  vLLM''s approach, dynamically allocating KV-cache pages as needed.

  2. **Fixed-Size Contiguous KV-Cache:** A simpler system that pre-allocates a contiguous block of memory
  for the KV-cache for the maximum context length, common in many initial deployments.


  Compare these two KV-cache management strategies in terms of memory efficiency, potential for fragmentation,
  and their impact on the effective batch size and overall inference latency under varying user loads
  (e.g., single long conversation vs. multiple concurrent short conversations). Discuss how the specific
  memory constraints of the 12 GB LPDDR5X on the Exynos 2400 NPU would influence your choice and what
  cache eviction policies you might consider for the paging-based approach to handle memory pressure from
  long contexts.'
details:
  realistic_solution: A hybrid approach, possibly starting with a paged KV-cache to leverage memory efficiency,
    but incorporating a predictive pre-allocation strategy for short, bursty requests, or an adaptive
    page size. Implementing a robust cache eviction policy (e.g., Least Recently Used (LRU) or Largest
    Removable Page First for Paged Attention) that considers both memory pressure and potential for future
    reuse, specifically tuned for the LPDDR5X characteristics.
  common_mistake: Overlooking the implications of memory fragmentation and its impact on usable memory
    for other components, or underestimating the overhead of page table management in paged attention
    for extremely small batch sizes on an edge device.
  napkin_math: 'For a model with 32 layers, 32 attention heads, and a head dimension of 128 (using float16),
    estimate the KV-cache size per token: `32 layers * 2 (K,V) * 32 heads * 128 dim * 2 bytes/float16
    ≈ 0.5 MB/token`. For an 8192 token context window, this implies `8192 tokens * 0.5 MB/token ≈ 4 GB`
    per single sequence. Given the 12 GB LPDDR5X memory, analyze how many concurrent sequences can be
    handled by a fixed-size approach versus a paged approach, considering that other model weights and
    system OS also consume memory.'
