id: mobile-0765
title: The On-Device Training Memory Crisis
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: You are implementing on-device fine-tuning of a 32-layer transformer on a phone with 8 GB memory.
  With batch size 4, sequence length 512, and hidden dimension 4096 in FP16, the activation memory for
  backpropagation across all layers is ~537 MB. The model weights (INT4) are 3.5 GB. Together with KV
  cache and OS, memory is critically tight. How does gradient checkpointing help, and what does it cost?
details:
  realistic_solution: 'Without checkpointing: 537 MB activations across 32 layers. With gradient checkpointing
    (store every sqrt(32)=5-6 layers): ~84 MB activations, saving ~450 MB. The cost: ~33% more compute
    (recomputing activations for non-checkpointed layers during backward). On a 5W device, this means
    ~1.65W extra per training step, but the 450 MB savings is critical to fitting in memory.'
  common_mistake: Assuming gradient checkpointing is free. It trades memory for compute by recomputing
    activations during the backward pass, typically adding 30-40% wall-clock time. On a battery-powered
    device, this also means 30-40% more energy per training step.
  napkin_math: 'Full activations: 32 layers x 4 x 512 x 4096 x 2B = 537 MB. Checkpointed (5 layers): 5
    x 17 MB = 84 MB. Savings: 453 MB. Compute cost: ~33% more FLOPs for backward pass.'
