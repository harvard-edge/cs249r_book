title: 'Optimizing Object Detection on Google Tensor G3: Operator Scheduling for MobileNetV3-SSD vs. EfficientDet-Lite'
topic: operator-scheduling
status: published
provenance: imported
scenario: 'An ML engineering team is tasked with deploying a real-time object detection model on a mobile
  device powered by the Google Tensor G3, which features a 7.5 TOPS on-device TPU and 12 GB LPDDR5X RAM.
  They have two candidate models:


  1.  **Model A (MobileNetV3-SSD variant):** This model leverages depthwise separable convolutions, with
  an estimated peak intermediate memory usage of 500 MB and an operational requirement of approximately
  5 GFLOPS.

  2.  **Model B (EfficientDet-Lite variant):** This model utilizes compound scaling and a BiFPN architecture,
  with an estimated peak intermediate memory usage of 350 MB and an operational requirement of approximately
  3 GFLOPS.


  The primary objective is to achieve the highest possible frames per second (FPS) while maintaining acceptable
  accuracy. Given the specific hardware characteristics of the Google Tensor G3, describe how you would
  analyze and optimize the execution of these models through operator scheduling. Compare and contrast
  how memory reuse, parallel operator execution, and layer fusion strategies would impact the performance
  of each model on the Tensor G3. Ultimately, recommend which model is likely to achieve better throughput
  after optimization, justifying your choice with quantitative reasoning where possible.'
details:
  realistic_solution: 'A realistic solution involves a multi-pronged approach starting with detailed on-device
    profiling to identify actual bottlenecks. For operator scheduling:


    1.  **Memory Reuse:** Analyze the computational graph of each model to identify opportunities for
    aggressive memory aliasing and reuse of intermediate tensor buffers. Tools like TensorFlow Lite''s
    memory planner can determine optimal buffer allocations to minimize peak memory usage, which is critical
    for the 12 GB LPDDR5X RAM, preventing out-of-memory errors or excessive paging, even though 12GB is
    quite generous.

    2.  **Parallel Operator Execution:** Decompose the computational graph into independent subgraphs
    or operations. The Tensor G3''s TPU likely supports parallel execution units. Identify operations
    that can run concurrently without data dependencies. For example, in multi-head architectures or BiFPN,
    parallel branches could be scheduled simultaneously. Overlapping computation with data transfers between
    host CPU and TPU can also boost parallelism.

    3.  **Layer Fusion:** Identify sequences of operations that can be fused into a single, optimized
    custom kernel (e.g., Conv-BN-ReLU, or groups of element-wise operations). This reduces kernel launch
    overhead and improves data locality by keeping intermediate results on-chip, minimizing costly accesses
    to LPDDR5X. For MobileNetV3''s depthwise-separable convolutions, further fusion of pointwise convolutions
    might be possible. EfficientDet''s BiFPN layers offer strong fusion opportunities due to repeated
    patterns of upsampling, concatenation, and convolutions.


    Considering the Tensor G3''s 7.5 TOPS TPU, Model B (EfficientDet-Lite with 3 GFLOPS) appears more
    promising. Its lower GFLOPS and smaller peak memory footprint (350 MB) suggest it has more headroom
    on the TPU and might be less memory-bound. The architecture''s compound scaling and BiFPN could also
    benefit significantly from layer fusion, as many repeated small operations are ideal candidates for
    custom fused kernels, reducing overall execution time and increasing throughput.'
  common_mistake: A common mistake is to solely focus on theoretical FLOPS or parameter count as the primary
    metric for mobile inference performance without adequately considering memory access patterns, the
    actual intermediate memory footprint, and how effectively the model's operations can be mapped to
    the hardware's specific capabilities (e.g., TPU's parallelism, fusion support). Overlooking the overhead
    of frequent memory transfers between different memory hierarchies (e.g., LPDDR5X system RAM and on-device
    TPU memory) or excessive kernel launch overhead for un-fused operations can lead to suboptimal performance,
    even with a seemingly smaller model.
  napkin_math: "Let's perform some back-of-the-envelope calculations:\n\n*   **TPU Throughput (Theoretical\
    \ Max):** Google Tensor G3 has 7.5 TOPS (Tera Operations Per Second) = 7500 Giga Operations Per Second\
    \ (GOPS).\n*   **Theoretical Operations per Frame:**\n    *   Model A: 5 GFLOPS (approx. operations\
    \ per inference)\n    *   Model B: 3 GFLOPS (approx. operations per inference)\n*   **Theoretical\
    \ Max FPS (Ignoring overheads, memory, and practical inefficiencies):**\n    *   Model A: 7500 GOPS\
    \ / 5 GFLOPS/inference = 1500 FPS\n    *   Model B: 7500 GOPS / 3 GFLOPS/inference = 2500 FPS\n\n\
    These theoretical numbers indicate that the TPU has ample computational power for both models. However,\
    \ actual performance is heavily influenced by memory bandwidth and kernel launch overhead. The 12\
    \ GB LPDDR5X RAM has a high bandwidth (e.g., ~60 GB/s for LPDDR5X). If Model A requires moving 500MB\
    \ of intermediate data multiple times within an inference, it can quickly become memory bandwidth\
    \ bound. For instance, if data is moved 10 times for various stages, that's 5GB of data. At 60 GB/s,\
    \ this alone takes ~83ms (1000ms / 60,000 MB/s * 5000 MB), capping FPS at ~12. This simple calculation\
    \ highlights that the smaller memory footprint of Model B (350 MB) could lead to significantly less\
    \ memory transfer overhead, allowing it to better utilize the TPU's computational power. Layer fusion\
    \ directly reduces both kernel launch overhead and memory traffic, further favoring the model that\
    \ allows for more aggressive fusion, which could be Model B with its potentially denser, repeated\
    \ computational patterns in BiFPN."
