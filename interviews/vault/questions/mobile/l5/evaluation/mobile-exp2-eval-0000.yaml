schema_version: 1
id: mobile-exp2-eval-0000
title: Evaluating Adversarial Defenses on Snapdragon NPU
topic: adversarial-robustness
status: published
provenance: imported
scenario: 'You are designing the defense mechanism for a real-time biometric authentication model running
  on a smartphone powered by a Qualcomm Hexagon NPU (Snapdragon 8 Gen 3). The system must be robust against
  physical adversarial presentation attacks (e.g., adversarial eyeglasses). You are evaluating two strategies:
  Option A is an ensemble of three smaller, diversely-trained INT8 models running entirely on the NPU
  using majority voting. Option B uses a single larger model on the NPU but relies on randomized smoothing,
  requiring the CPU/GPU to generate 10 noisy variants of each input frame and passing them sequentially
  to the NPU. Which approach provides better reliability and system efficiency?'
details:
  realistic_solution: Option A is the superior system-level choice. The Hexagon NPU's 45 TOPS INT8 capacity
    can easily handle an ensemble of smaller models concurrently, keeping the entire pipeline within the
    NPU. This avoids cross-processor synchronization and prevents thrashing the shared 12-16 GB LPDDR5X
    memory, maintaining strict latency budgets for authentication while providing strong empirical robustness.
  common_mistake: Candidates often choose Option B due to the strong theoretical robustness guarantees
    of randomized smoothing, failing to account for the heterogeneous system overhead. They ignore the
    synchronization costs, latency spikes, and power drain caused by bouncing data between the CPU/GPU
    and NPU over the shared memory bus.
  napkin_math: 'Assume an input frame is 224x224x3 (~150KB). Option A: 3 models x 1 GOPS = 3 GOPS per
    authentication. NPU reads 150KB once. Option B: 1 model x 2 GOPS x 10 variants = 20 GOPS. The CPU/GPU
    must write 10 noisy variants (10 x 150KB = 1.5MB) to shared LPDDR5X, then wake the NPU to read them.
    At 30 FPS, Option B demands 45MB/s of continuous cross-component memory traffic and forces CPU/GPU
    active states, draining battery, whereas Option A runs entirely in the low-power NPU domain well within
    its 45 TOPS limit.'
