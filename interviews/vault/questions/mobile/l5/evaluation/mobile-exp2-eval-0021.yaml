schema_version: 1
id: mobile-exp2-eval-0021
title: Evaluating On-Device Toxicity Guardrails for A17 Pro
topic: responsible-ai
status: published
provenance: imported
scenario: You are deploying a generative AI text feature on iOS devices powered by the Apple A17 Pro.
  You must implement a toxicity and PII filtering guardrail. Option A is a lightweight 100M parameter
  BERT-based classifier running locally on the 16-core Neural Engine. Option B is a cloud-based LLM evaluator
  that guarantees 99.9% accuracy but requires network calls. The application is highly sensitive to both
  user perceived latency and strict privacy requirements. Evaluate these alternatives and choose the better
  design, considering the specific constraints of the target platform.
details:
  realistic_solution: Option A is the superior choice. Running the guardrail locally on the A17 Pro ensures
    PII never leaves the device, directly addressing the privacy constraint. The A17 Pro Neural Engine
    is highly optimized for this workload. While a 100M parameter model may have slightly lower accuracy
    than a massive cloud LLM, it can be quantized and domain-adapted to serve as a fast, highly conservative
    gate. The deterministic low latency is critical for the user experience, whereas cloud network jitter
    would degrade the product.
  common_mistake: Candidates often default to the cloud solution (Option B) to maximize safety accuracy,
    ignoring the strict privacy requirements of PII and the latency impact on a real-time UI. Alternatively,
    they might choose the on-device model without calculating if it fits within the A17 Pro's compute
    and memory budget alongside the primary generative model.
  napkin_math: A 100M parameter model quantized to INT8 requires ~100 MB of memory, a fraction of the
    A17 Pro's shared 8 GB unified memory. A forward pass for 128 tokens requires roughly 2 * 100M * 128
    ≈ 25.6 Giga-operations (GOPS). Given the A17 Pro Neural Engine's peak performance of 35 TOPS (35,000
    GOPS), the theoretical compute time is 25.6 / 35,000 ≈ 0.73 milliseconds. Assuming a conservative
    20% hardware utilization, inference takes < 4ms, consuming an insignificant portion of the ~5W power
    budget while adding imperceptible latency.
