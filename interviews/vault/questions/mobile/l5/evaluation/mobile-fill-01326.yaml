id: mobile-fill-01326
title: Graceful Degradation for On-Device AR on Google Tensor G3
topic: graceful-degradation
status: published
provenance: imported
scenario: 'Your team is deploying a real-time object detection model, crucial for an on-device augmented
  reality feature, to smartphones equipped with the Google Tensor G3 (7.5 TOPS on-device TPU, 12 GB LPDDR5X).
  The model must maintain high reliability and responsiveness. You are considering two architectural approaches
  for implementing graceful degradation:


  **Architecture A (Hierarchical Fallback):**

  Uses a primary, high-accuracy FP16 model (requiring ~5 TOPS) on the Tensor G3''s TPU. If the frame rate
  drops below 30 FPS or device temperature exceeds a threshold, it falls back to a quantized INT8 version
  of the same model (requiring ~2 TOPS). If conditions worsen further, it falls back to a much lighter,
  less accurate INT8 model (requiring ~0.5 TOPS) that runs on the CPU. The system prioritizes critical
  object detection for core AR functionality over ancillary detections (e.g., background elements) during
  degradation.


  **Architecture B (Adaptive QoS Shedding with Parallel Models):**

  Deploys two models in parallel: a high-accuracy, medium-latency model (requires ~4 TOPS) for primary
  detections, and a low-accuracy, very low-latency model (requires ~1 TOPS) for secondary, non-critical
  detections. Both run on the Tensor G3''s TPU. When system resources (e.g., CPU load, memory pressure)
  are constrained, the system dynamically reduces the inference frequency or resolution of the secondary
  model, and if necessary, increases the acceptable latency for the primary model, eventually allowing
  it to run on the CPU with reduced frame rates if the TPU becomes unavailable.


  Evaluate these two architectures based on their effectiveness in handling graceful degradation, considering
  aspects like fail-safe vs. fail-operational behavior, latency guarantees, resource utilization under
  various load conditions, and development complexity on the Google Tensor G3 platform. Which architecture
  would you recommend and why, specifically referencing the Tensor G3''s capabilities (7.5 TOPS on-device
  TPU, 12 GB LPDDR5X)? Provide specific metrics you would monitor to trigger degradation or recovery for
  each architecture.'
details:
  realistic_solution: Implement a robust 'degradation manager' service that continuously monitors multiple
    device metrics (CPU load, GPU/TPU utilization, memory pressure, battery level, device temperature,
    frame rate). Define clear thresholds for each metric and prioritize them. Use a state machine for
    degradation levels, allowing for smooth transitions up and down the degradation ladder. Pre-load smaller
    fallback models into memory where possible to minimize latency during switching. Utilize the Tensor
    G3's dedicated TPU for the primary and first-level fallback models to maximize efficiency, only offloading
    to CPU as a last resort.
  common_mistake: Over-reliance on a single degradation trigger, failing to consider multi-modal triggers
    (e.g., combining thermal, battery, and compute load). Not having clear recovery strategies, leading
    to persistent degraded states. Overlooking the cost of model switching or loading in a real-time system.
  napkin_math: If the high-accuracy model requires 5 TOPS and the Google Tensor G3's TPU provides 7.5
    TOPS, there's a theoretical 2.5 TOPS buffer for other on-device ML tasks or OS overhead. However,
    achieving a sustained 30 FPS for a model requiring 5 TOPS means each inference must complete within
    ~33ms. If a model takes 100ms (10 FPS), it uses 5 TOPS over 100ms. To reach 30 FPS, it needs to process
    3x faster, potentially requiring more than the theoretical 5 TOPS average if not efficiently scheduled.
    The 12GB LPDDR5X RAM is ample for holding multiple model versions simultaneously, minimizing load
    times during fallbacks.
