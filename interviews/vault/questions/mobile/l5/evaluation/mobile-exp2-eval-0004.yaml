schema_version: 1
id: mobile-exp2-eval-0004
title: Evaluating Data Pruning for On-Device NPU Tuning
topic: data-efficiency-selection
status: published
provenance: imported
scenario: 'Your team needs to personalize a 1.5B parameter vision-language model via on-device fine-tuning
  on a Snapdragon 8 Gen 3 device. The user generates thousands of local images, but due to thermal and
  battery constraints, we must aggressively prune the training data. You are evaluating two alternatives
  for data selection: (A) CPU-based coreset selection using lightweight CLIP embeddings to find diverse
  clusters, or (B) using the Qualcomm Hexagon NPU to run a forward-backward pass on all images and selecting
  the top 10% with the highest loss gradients. Which approach is better suited for this heterogeneous
  environment, considering the shared 16 GB LPDDR5X memory?'
details:
  realistic_solution: Option A is the correct architectural choice. By using a lightweight embedding model
    (which runs efficiently on the Hexagon NPU using INT8) and performing simple k-means clustering on
    the CPU, you leverage the heterogeneous CPU+NPU design. This isolates the expensive backward passes
    to only the selected coreset, keeping peak memory usage well below the 16 GB limit and preventing
    thermal throttling.
  common_mistake: Candidates often choose option B (gradient-based selection) because it mathematically
    guarantees selecting the highest-signal training examples. They fail to evaluate the systemic cost
    of running backward passes over the entire dataset on a mobile SoC, which will thrash the shared memory
    bandwidth and exhaust the thermal budget before training even begins.
  napkin_math: 'For Option B: A backward pass on a 1.5B model requires roughly 6-8 GB of memory for activations
    and optimizer states. Passing 10,000 images would require heavy swapping in the shared 16 GB LPDDR5X
    RAM (bandwidth ~68 GB/s), taking hours. For Option A: Extracting embeddings (e.g., 512 dimensions,
    INT8) takes less than 1 ms per image on the 45 TOPS Hexagon NPU. 10,000 embeddings require only ~5
    MB of memory. Clustering 5 MB on the CPU takes milliseconds, saving massive amounts of compute and
    memory bandwidth.'
