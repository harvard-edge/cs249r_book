id: mobile-fill-00331
title: Optimizing Large Generative AI Model Deployment on Samsung Exynos 2400 NPU under Memory Constraints
topic: memory-pressure-management
status: published
provenance: imported
scenario: 'You are tasked with deploying a new, computationally intensive generative AI model on the Samsung
  Exynos 2400 NPU (34.7 TOPS, 12 GB LPDDR5X). This model, even after quantization, requires approximately
  15 GB of peak memory during full-batch inference, exceeding the NPU''s available 12 GB LPDDR5X. Your
  team proposes two architectural approaches to manage this memory constraint:


  1.  **Approach A: Aggressive Model Partitioning with Host Offloading.** The model is partitioned, and
  layers exceeding the NPU''s available memory are offloaded to the host CPU''s system memory, with data
  transferred back and forth over the NPU-host interconnect.

  2.  **Approach B: Micro-Batching with Activation Recomputation.** An inference strategy similar to gradient
  checkpointing is employed, where the model processes data in micro-batches, and intermediate activations
  are recomputed as needed to reduce peak memory usage.


  Evaluate these two approaches. Consider their implications on OOM handling, memory fragmentation within
  the NPU, achievable inference latency, and overall NPU utilization. Discuss specific techniques you
  would use to monitor and mitigate memory fragmentation on a mobile platform, and how potential OS-level
  memory eviction strategies might interact with each approach.'
details:
  realistic_solution: A realistic solution would involve a careful hybrid approach. Start by profiling
    the model's memory footprint to identify exact peak usage points. For Approach B, optimize micro-batching
    size to balance recomputation overhead with memory savings, potentially using a 'striping' or 'pipelining'
    technique to hide recomputation latency. For Approach A, optimize data transfer mechanisms (e.g.,
    using zero-copy buffers where possible, asynchronous transfers). Implement custom memory allocators
    or leverage NPU-specific memory management APIs if available to reduce fragmentation. Proactively
    monitor memory usage and fragmentation metrics, and dynamically adjust strategies (e.g., switching
    micro-batch sizes) to maintain QoS. Consider a lightweight, NPU-aware memory defragmentation pass
    during idle cycles if supported.
  common_mistake: A common mistake is to only focus on static memory usage (model weights) and neglect
    the dynamic memory requirements of activations, particularly in large models. Another pitfall is to
    underestimate the performance penalty of NPU-host data transfers or the overheads associated with
    activation recomputation, leading to suboptimal throughput and increased latency. Ignoring memory
    fragmentation over time, assuming the OS/driver will handle it efficiently, can also lead to unexpected
    OOMs or performance degradation.
  napkin_math: "Let's assume the base model (weights + minimal activations) occupies 8 GB. The remaining\
    \ 7 GB (out of 15 GB total peak) are due to intermediate activations. \n\n*   **Approach A:** Requires\
    \ offloading 3 GB (15 GB - 12 GB available NPU memory) of data to host memory and fetching it back.\
    \ If the NPU-host interconnect provides 10 GB/s bandwidth, transferring 3 GB takes 300 ms per inference\
    \ cycle, significantly adding to latency and reducing throughput.\n*   **Approach B:** If activation\
    \ recomputation can reduce the activation footprint from 7 GB to, say, 3 GB at any given time, then\
    \ the total peak memory would be 8 GB (base) + 3 GB (reduced activations) = 11 GB. This fits within\
    \ the 12 GB LPDDR5X, avoiding costly host transfers. The trade-off is the added computation time for\
    \ recomputing activations. If recomputing 4 GB of activations (7GB - 3GB) takes, for instance, 50\
    \ ms on the NPU, this is often preferable to 300 ms of data transfer."
