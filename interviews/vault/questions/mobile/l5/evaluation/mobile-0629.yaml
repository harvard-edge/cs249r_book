schema_version: 1
id: mobile-0629
title: The Pruning vs. Distillation Dilemma
topic: real-time-deadlines
status: published
provenance: imported
scenario: Your team needs to run a large transformer model for a real-time video AR effect on a new mobile
  SoC. The model currently takes 80ms per frame, but the budget for 'no jank' is 16ms. An engineer from
  a cloud background proposes using 50% unstructured weight pruning, stating, 'halving the FLOPs should
  give us a 2x speedup and get us to 40ms, which is a good start.' Evaluate this proposal. Why is this
  reasoning flawed for a mobile NPU (like Apple's ANE or Qualcomm's Hexagon), and what alternative compression
  technique would you champion as a more effective path to meeting the strict 16ms deadline on this hardware?
details:
  realistic_solution: The proposal is critically flawed because mobile NPUs are designed as dense math
    engines. They use hardware like systolic arrays that are physically optimized for dense matrix multiplications.
    Unstructured pruning creates sparse weight matrices. These NPUs lack the complex indexing logic to
    dynamically skip zero-value weights. To execute a sparse layer, the NPU must either run the computation
    on a slower, general-purpose core or, more commonly, treat the sparse matrix as dense, executing a
    vast number of useless multiply-accumulate operations on zero-valued weights. The memory access patterns
    also become irregular and scattered, destroying cache locality. Consequently, 50% unstructured pruning
    yields almost zero speedup. The correct approach is Knowledge Distillation. By distilling the large
    model's knowledge into a smaller, architecturally-distinct, and *dense* student model (e.g., one based
    on MobileNet-like principles), you create a model whose computations are dense matrix multiplications.
    These map perfectly to the NPU's hardware, allowing it to run near its peak theoretical throughput.
    Distillation changes the problem to one the hardware is actually good at solving.
  common_mistake: Assuming that a reduction in theoretical FLOPs translates linearly to a reduction in
    wall-clock latency. This is true for general-purpose CPUs but completely false for specialized accelerators
    like mobile NPUs which are optimized for specific compute patterns.
  napkin_math: 'Original model latency: 80ms. The mobile SoC has an NPU with a theoretical peak of, say,
    35 TOPS (Apple A17 Pro). The original model requires 80ms * 35 TOPS (assuming it''s compute bound,
    simplified) = 2.8 Tera-ops. With 50% pruning, the required ops are 1.4 Tera-ops. The flawed logic:
    1.4 Tera-ops / 35 TOPS = 40ms. The reality: The NPU cannot exploit the sparsity, so it still effectively
    performs 2.8 Tera-ops, running at ~80ms. Now consider distillation to a new dense model that requires
    0.7 Tera-ops (a 4x reduction). Since this model is dense, the NPU can execute it efficiently. Latency_distilled
    ≈ 0.7 Tera-ops / 35 TOPS = 20ms. This is a real 4x speedup, bringing the model much closer to the
    16ms target, whereas pruning yielded no improvement.'
