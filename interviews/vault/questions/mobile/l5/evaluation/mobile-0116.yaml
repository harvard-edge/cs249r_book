schema_version: 1
id: mobile-0116
title: The Power Domain Juggling Act
topic: power-budgeting
status: published
provenance: imported
scenario: Your always-on keyword detection model runs on a Snapdragon 8 Gen 3's Sensing Hub (a low-power
  DSP island). It draws 2 mW and wakes the main NPU only when it hears the keyword. The product team wants
  to add always-on face detection using the front camera. They say 'just run a tiny model on the Sensing
  Hub too.' Why does this seemingly small addition blow up the power budget by 100×?
details:
  realistic_solution: The Sensing Hub's ultra-low power (2 mW) is possible because audio keyword detection
    only requires the **microphone** — a MEMS mic draws ~100 µW, and the audio codec draws ~1 mW. The
    Sensing Hub's DSP processes the audio stream at 16 KHz × 16-bit = 32 KB/s — trivial bandwidth.
  common_mistake: '"A tiny face detection model should only add a few milliwatts." The model compute is
    tiny — the sensor power is not.'
  napkin_math: 'Keyword detection: mic (0.1 mW) + codec (1 mW) + Sensing Hub DSP (0.9 mW) = 2 mW. Battery
    life impact: 19 Wh / 0.002 W = 9,500 hours. Face detection addition: camera (50 mW) + ISP (30 mW)
    + DRAM (20 mW) + NoC (10 mW) + Sensing Hub (1 mW) = 111 mW. Total: 113 mW. Battery life: 19 Wh / 0.113
    W = 168 hours = **7 days**. The ML model itself (running on the Sensing Hub) adds only 1 mW — the
    other 110 mW is the sensor and data pipeline. This is why Apple''s always-on display works (OLED at
    1 Hz = 5 mW) but always-on camera doesn''t.'
