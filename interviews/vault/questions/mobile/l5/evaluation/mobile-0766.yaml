id: mobile-0766
title: The Split Inference Latency Trap
topic: 3d-parallelism
status: draft
provenance: imported
scenario: 'A team proposes split inference: run the first 20 layers of a 32-layer model on-device (5 ms
  per layer) and the remaining 12 layers on a cloud server (0.5 ms per layer). The network round-trip
  is 50 ms. Compare total latency for split inference versus running all 32 layers on-device. When does
  split inference actually help?'
details:
  realistic_solution: 'Split: 20 x 5 ms + 50 ms RTT + 12 x 0.5 ms = 100 + 50 + 6 = 156 ms. All on-device:
    32 x 5 ms = 160 ms. Split is only 4 ms faster, and any network jitter erases the gain. Split inference
    helps when: (1) the model is too large to fit in device memory, or (2) the cloud portion is very large
    relative to RTT, or (3) you need cloud-only capabilities (e.g., retrieval augmentation).'
  common_mistake: Assuming split inference is always faster because the cloud is fast. The 50 ms network
    RTT often dominates, making split inference slower than running everything locally despite the cloud's
    raw speed advantage.
  napkin_math: 'Split: 100ms (device) + 50ms (RTT) + 6ms (cloud) = 156ms. Local: 160ms. Breakeven RTT:
    160 - 100 - 6 = 54ms. Any RTT > 54ms makes split slower.'
