id: mobile-0691
title: Quantization Strategy for On-Device Updates
topic: quantization-fundamentals
status: published
provenance: imported
scenario: Your team is deploying a new semantic segmentation model to millions of mobile devices. You
  need to achieve sub-50ms latency and a model size under 20MB. You're considering dynamic range quantization
  (DRQ) vs. quantization-aware training (QAT). Describe the trade-offs in terms of model development,
  deployment, performance, and memory footprint on device, especially considering future over-the-air
  (OTA) model updates.
details:
  realistic_solution: 'DRQ (post-training quantization) takes minutes, converts weights to INT8 but computes
    activations in dynamically quantized to INT8 at runtime, with FP32 only where needed for stability,
    adding 10-15% latency overhead. Accuracy drops 1-3%. QAT requires full retraining (hours-days on GPU
    cluster) but quantizes both weights and activations to INT8, achieving <0.5% accuracy loss and meeting
    the sub-50ms target. For OTA updates: DRQ wins — any retrained FP32 model is instantly quantizable.
    QAT requires retraining before every deployment. Recommendation: QAT for initial launch (best accuracy
    and latency), DRQ for rapid A/B test iterations where speed-to-deploy matters more than the last 1%
    accuracy.'
  common_mistake: '"QAT is always superior for accuracy and performance, so we should always use it."
    This overlooks practical deployment and development costs, especially for continuous updates.'
  napkin_math: 'Model Size:

    - FP32 baseline: 25M parameters × 4 bytes = 100 MB.

    - INT8 (DRQ or QAT): 25M × 1 byte = 25 MB (weights). Fits 20 MB target only if model has ≤20M params.

    - For 20 MB target: need ≤20M parameters at INT8, or ≤5M at FP32.

    - Realistic: 18M param model → 18 MB INT8 (fits), 72 MB FP32 (does not fit). Quantization is required.


    DRQ (Post-Training, Dynamic Range):

    - Dev cost: minutes. No retraining needed.

    - Weights: INT8 (18 MB). Activations: computed in FP32 at runtime, dynamically quantized.

    - Runtime overhead: ~10-15% latency penalty for dynamic scale computation per layer.

    - Accuracy: typically 1-3% drop vs FP32. Risk of outlier layers with high quantization error.

    - OTA update: just ship new weights. Any retrained FP32 model can be instantly quantized.


    QAT (Quantization-Aware Training):

    - Dev cost: full retraining cycle (hours-days on GPU cluster). Must maintain quantized training pipeline.

    - Weights + activations: both INT8 (18 MB). No runtime conversion overhead.

    - Latency: ~40 ms (meets sub-50ms target with margin).

    - Accuracy: typically <0.5% drop vs FP32. Learns to compensate for quantization.

    - OTA update: every model update requires QAT retraining before deployment.


    For continuous OTA updates: DRQ wins on iteration speed. For maximum accuracy and latency: QAT wins.
    Recommended: QAT for initial launch, DRQ for rapid A/B test iterations.'
