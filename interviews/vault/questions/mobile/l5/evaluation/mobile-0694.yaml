schema_version: 1
id: mobile-0694
title: The JNI Object Pinning Death
topic: real-time-deadlines
status: published
provenance: imported
scenario: You are passing camera frames (byte arrays) from Android Java to a C++ inference engine via
  JNI using `GetByteArrayElements`. The ML model takes 15ms. The system runs perfectly at 30 FPS for a
  minute. Suddenly, the entire Android UI stutters massively, dropping to 2 FPS for several seconds, before
  recovering. What is JNI doing to the Android Garbage Collector?
details:
  realistic_solution: 'GetByteArrayElements pins the Java array in memory, preventing the GC from moving
    it during compaction. Pinning 3 MB frames 30 times/sec creates massive heap fragmentation. After ~60
    seconds, the heap is so fragmented that the GC triggers a Stop-The-World compaction, pausing all threads
    for 200-500ms — destroying the 33ms frame deadline. Fix: use GetDirectBufferAddress with a pre-allocated
    DirectByteBuffer that lives outside the Java heap entirely. The GC never sees it, eliminating both
    copying and pinning. Alternatively, use Android''s HardwareBuffer for zero-copy camera-to-native pipelines.'
  common_mistake: '"The C++ code has a memory leak." C++ memory leaks crash the app eventually; they don''t
    cause periodic, recovering stutters.'
  napkin_math: A 1080p NV21 frame is ~3 MB. Pinning 3 MB of memory 30 times a second creates massive roadblocks
    for the concurrent GC. A Stop-The-World compaction on a fragmented 512 MB heap can easily take 200-500ms,
    entirely destroying the 33ms frame deadline.
