schema_version: 1
id: mobile-exp2-eval-0015
title: LLM KV Cache Allocation Strategy on Tensor G3
topic: memory-pressure-management
status: published
provenance: imported
scenario: 'You are deploying a 1.8B parameter on-device LLM (similar to Gemini Nano) on the Google Tensor
  G3, which features an on-device TPU and 12 GB of LPDDR5X shared memory. The system restricts the LLM
  process to a strict 2.5 GB memory budget to prevent OS-level eviction of essential background apps.
  You must choose between two KV cache management strategies for a multi-turn chat feature: Alternative
  A uses static pre-allocation of a maximum-length KV buffer at initialization, while Alternative B uses
  dynamic block-based allocation (like PagedAttention) to minimize memory usage for short prompts. Which
  design is better for managing memory pressure on this device?'
details:
  realistic_solution: Alternative A (Static pre-allocation) is the superior choice for mobile deployment.
    Because mobile inference typically operates at a batch size of 1, the theoretical memory savings from
    dynamic allocation do not outweigh the risks of memory fragmentation. Pre-allocating the maximum required
    KV cache ensures a fixed, predictable memory footprint, completely avoiding runtime fragmentation
    and guaranteeing that the app will not suddenly trigger the Android low-memory killer (LMK) during
    prolonged usage.
  common_mistake: Candidates often blindly recommend dynamic block allocation (Alternative B) because
    it is the state-of-the-art for server-side LLM serving with high concurrency. They fail to realize
    that on a mobile SoC with a shared memory space, dynamic allocation introduces severe memory fragmentation
    over time, which can trigger unpredictable OS-level OOM kills even if total used memory is under the
    limit.
  napkin_math: 'Tensor G3 Total Memory: 12 GB LPDDR5X. App Budget: 2.5 GB. Model Weights: 1.8B params
    @ INT8 = 1.8 GB. Remaining memory for KV cache/activations: 2.5 GB - 1.8 GB = 700 MB. KV cache size
    per token (assuming 16 layers, 2048 hidden dim, FP16): 2 (K&V) * 2 bytes * 16 * 2048 = 131 KB/token.
    Max static KV cache for a 2048-token context window: 131 KB * 2048 = 268.2 MB. Since 268.2 MB comfortably
    fits within the 700 MB remaining budget, static pre-allocation is safe and leaves ~430 MB for intermediate
    activations without risking fragmentation.'
