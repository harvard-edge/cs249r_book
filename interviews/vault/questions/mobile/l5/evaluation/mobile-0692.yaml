id: mobile-0692
title: Unpredictable Latency Spikes
topic: memory-hierarchy-design
status: published
provenance: imported
scenario: Your real-time ML model on Android generally achieves a 30ms latency, but occasionally you observe
  unpredictable spikes up to 100-200ms. These spikes don't correlate with thermal throttling, NPU utilization
  drops, or obvious background app activity. How would you diagnose and mitigate these latency spikes,
  focusing on memory management within the ML inference pipeline?
details:
  realistic_solution: The unpredictable latency spikes, when other common causes are ruled out, often
    point to **dynamic memory allocation overhead and heap fragmentation** within the inference process.
  common_mistake: '"It''s OS scheduler contention or garbage collection." While these are general causes
    for latency spikes, the problem statement rules out obvious background activity and stable NPU utilization,
    suggesting a more specific memory management issue within the ML pipeline itself.'
  napkin_math: A single `malloc` call can take anywhere from tens of nanoseconds to several microseconds
    depending on the allocator, heap state, and contention. If an inference involves hundreds or thousands
    of such calls, this overhead accumulates. 1000 `malloc` calls at an average of 50µs each (due to fragmentation/contention)
    would add 50ms of overhead, easily explaining a jump from 30ms to 80ms+.
