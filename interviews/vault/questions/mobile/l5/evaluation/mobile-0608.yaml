id: mobile-0608
title: The Streaming ASR Trade-off
topic: transformer-systems-cost
status: published
provenance: imported
scenario: You're building live captions for a video calling app. Your team is debating between Whisper-small
  (244M params, non-streaming) and a custom RNN-T model (30M params, streaming). The PM wants 'the best
  accuracy.' Why might the smaller model be the right choice?
details:
  realistic_solution: 'Whisper is a sequence-to-sequence model that processes audio in 30-second chunks.
    For live captions, this means: (1) **30-second latency** — the user speaks, and captions appear 30
    seconds later. Unusable for live conversation. (2) **Memory:** 244M params × 2 bytes (FP16) = 488
    MB always resident, plus attention KV-cache for 30 seconds of audio. (3) **Compute burst:** processing
    30 seconds of audio at once requires a large compute burst, causing thermal spikes.'
  common_mistake: '"Whisper is more accurate on benchmarks, so use Whisper." Benchmark accuracy doesn''t
    account for the system-level constraints of real-time captioning.'
  napkin_math: 'Whisper: 488 MB memory, 30s latency, 8% WER. Burst power: ~5W for 3 seconds every 30 seconds.
    RNN-T: 60 MB memory (8× less), 200ms latency (150× less), 12% WER. Steady power: ~0.5W continuous.
    Battery for 1-hour call: Whisper ~5W × 0.1 duty = 0.5W avg → 0.5 Wh. RNN-T: 0.5W × 1.0 duty = 0.5W
    avg → 0.5 Wh. Similar battery, but RNN-T frees 428 MB of RAM for other apps.'
