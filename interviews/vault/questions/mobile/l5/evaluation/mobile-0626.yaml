schema_version: 1
id: mobile-0626
title: The Thermal Throttling Paradox
topic: graph-compilation
status: published
provenance: imported
scenario: Your team is building an always-on 'smart reply' feature that runs continuous inference on a
  Snapdragon-powered phone. To minimize latency, a junior engineer enables a high-performance mode that
  fixes the NPU clock frequency to its maximum setting. During a 10-second test, the average prediction
  latency is an excellent 50ms. However, when deployed in a 5-minute user trial, the average latency degrades
  to 90ms. Counter-intuitively, disabling the high-performance mode and letting the OS manage clocks results
  in a stable, better average latency of 75ms. Assess this paradoxical outcome where asking for maximum
  performance results in worse sustained performance.
details:
  realistic_solution: 'This is a direct result of ''Thermal Throttling.'' Mobile SoCs have a strict thermal
    design power (TDP) budget, typically around 5W for the entire chip. Running the NPU at its absolute
    maximum frequency consumes a disproportionate amount of power, pushing the total SoC power consumption
    well over the TDP limit. The chip''s temperature rises rapidly. To prevent physical damage, the Power
    Management IC (PMIC) intervenes and aggressively down-clocks the NPU to a very low-power state to
    allow the chip to cool down. The system then enters a ''sawtooth'' pattern: a short burst of peak
    performance followed by a longer period of throttled, slow performance. The *average* performance
    over this cycle is often lower than what could have been achieved by running at a slightly lower,
    but thermally sustainable, clock frequency from the start.'
  common_mistake: Engineers often assume that 'maximum frequency' equals 'maximum performance' indefinitely.
    They neglect that mobile devices are not servers; they are thermally-constrained systems where power
    consumption and heat dissipation are the primary limiting factors, not peak clock speed.
  napkin_math: 'Let''s model the power and performance.


    **High-perf mode (fixed max clock):**

    - NPU at max frequency: 2.5W power draw.

    - SoC TDP budget: ~5W. Other components (CPU, display, radios): ~2W. Remaining for NPU: 3W.

    - At 2.5W, junction temperature rises at ~1.5°C/sec above ambient (in a sealed phone).

    - Thermal limit: 45°C junction above ambient. Time to throttle: 45 / 1.5 = **30 seconds**.

    - After throttle: NPU drops to 0.5W (survival mode). Latency jumps to ~200ms.

    - Sawtooth pattern: 30s at 50ms + 30s at 200ms → average = **(30×50 + 30×200) / 60 = 125ms**.

    - But PMIC hysteresis means throttle lasts longer than boost. Realistic: 20s at 50ms + 40s at 200ms.

    - Weighted average: (20×50 + 40×200) / 60 = **~150ms** → worse than observed 90ms due to partial throttle
    states.

    - Real-world average with gradual throttle curve: **~90ms** (matches scenario).


    **OS-managed DVFS mode:**

    - NPU runs at ~60% max clock: 1.2W. Latency: ~75ms.

    - Thermal headroom: (5W - 2W - 1.2W) = 1.8W margin → sustainable indefinitely.

    - Stable **75ms** forever. No sawtooth.


    **Key insight**: Sustained throughput = min(peak throughput, thermally-sustainable throughput). On
    mobile, thermally-sustainable is always lower than peak.'
