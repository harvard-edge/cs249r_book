id: mobile-cell-12150
title: 'Network Bandwidth Bottlenecks: Master Roofline Analysis for Mobile LLM Scaling'
topic: network-bandwidth-bottlenecks
status: published
provenance: imported
scenario: 'Apply roofline model analysis to determine the minimum batch size at which a 3B INT4 LLM transitions
  from memory-bandwidth-bound to compute-bound on Snapdragon 8 Gen 3 (77 GB/s LPDDR5X, 45 TOPS INT8 DSP
  effective for INT4: ~90 TOPS). Derive implications for mobile multi-user serving.'
details:
  realistic_solution: 'INT4 effective TOPS: 90 TOPS. BW: 77 GB/s. Ridge point: 90T/77G=1169 FLOPs/byte.
    Per-token decode FLOPs: 2×3B=6B FLOPs. Bytes: 1.5GB. AI per token: 6B/1.5GB=4 FLOPs/byte << 1169.
    Transition batch: B × 6B FLOPs / 1.5GB = 1169 → B = 1169 × 1.5GB / 6B = 292 tokens. At batch=292:
    compute-bound. TPOT at batch=292: max(292×6B/90T, 1.5/77) = max(19.5ms, 19.5ms) = 19.5ms (break-even).
    At batch=1000: TPOT = 1000×6B/90T=66ms (compute-bound). Mobile reality: batch=292 means 292 concurrent
    users — impractical on device. Mobile is always memory-bandwidth-bound for LLM decode.'
  common_mistake: Using INT8 TOPS for INT4 arithmetic intensity calculation; INT4 can use 2× compute throughput
    on Snapdragon DSP (native INT4 support in Hexagon).
  napkin_math: 'Ridge: 90T/77G=1169 FLOPs/byte. Per token (batch=B): B×6G FLOPs, 1.5GB always read. AI=B×6G/1.5G=4B
    FLOPs/byte. Transition: 4B=1169 → B=292. At B=1: TPOT=max(6G/90T, 1.5G/77G)=max(0.067ms, 19.5ms)=19.5ms.
    BW-bound by 291×. At B=292: TPOT=292×6G/90T=19.5ms (compute limited), 1.5G/77G=19.5ms (same). Break-even
    exactly at B=292. Mobile: 1 user → always BW-bound. 19.5ms TPOT at batch=1.'
