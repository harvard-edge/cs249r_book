id: mobile-cell-11035
title: 'Dataset Curation: Optimize Data Pipeline for Federated Learning on Mobile'
topic: dataset-curation
status: published
provenance: imported
scenario: 'Your federated learning system for Tensor G3 (7.5 TOPS, 12GB) devices is running slowly: devices
  spend 45 seconds on local training but only 2 seconds on actual gradient computation. Profiling shows
  43 seconds is data preprocessing. Optimize the preprocessing pipeline to reduce device-side compute
  by 10×.'
details:
  realistic_solution: Cache preprocessed batches after first round. Use memory-mapped files for fast random
    access. Pre-compute tokenization offline. Use INT8 data types for intermediate representations.
  common_mistake: Not caching preprocessed data between rounds; recomputing tokenization and augmentation
    from scratch each round.
  napkin_math: 'Current: 43s preprocessing for 200 examples × 128 tokens. Per-example preprocessing: 43s/200
    = 215ms. Bottleneck analysis: tokenization (BPE) = 150ms/example on Tensor G3 CPU. Augmentation =
    50ms. Other = 15ms. Fix 1: pre-tokenize once, cache as int16 tokens. Token cache: 200 × 128 × 2B =
    51.2KB — trivial. Eliminates 150ms/example = 30 seconds. Fix 2: GPU augmentation (Tensor G3 GPU =
    10 TOPS): 50ms → 5ms. New total: 200 × (5ms aug + 15ms other) = 4 seconds preprocessing + 2 seconds
    compute = 6 seconds total. Speedup: 45s → 6s = 7.5× improvement. Battery: 45s → 6s training window
    reduces energy 7.5× → fits in background without thermal throttling.'
