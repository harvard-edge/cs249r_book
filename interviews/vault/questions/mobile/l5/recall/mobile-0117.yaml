schema_version: 1
id: mobile-0117
title: The Sustained Performance Cliff
topic: power-budgeting
status: published
provenance: imported
scenario: You've deployed a high-performance computer vision model on a flagship Android device. Initial
  tests show excellent latency (e.g., 20ms/frame). However, after about 30-60 seconds of continuous operation,
  the inference latency consistently jumps to 60-80ms/frame. This happens even with the device plugged
  into power. What is the most likely cause, and how would you design your ML system to provide more *sustained*
  performance?
details:
  realistic_solution: This is a classic symptom of **thermal throttling**. Modern mobile SoCs are designed
    to operate within strict thermal envelopes to prevent overheating and component damage. When a component
    (CPU, GPU, NPU) generates too much heat over a sustained period, the system's thermal management unit
    (TMU) reduces its clock frequency and/or voltage (DVFS) to lower power consumption and cool down the
    chip. This directly impacts performance. Even when plugged in, the device's cooling capacity is limited.
  common_mistake: '"The device is running out of memory." While memory leaks can degrade performance,
    a sudden, consistent drop in *compute* performance after a fixed duration, even on power, strongly
    points to thermal issues, not memory exhaustion.'
  napkin_math: '- Snapdragon 8 Gen 3: peak ~10 W burst (73 TOPS), sustained TDP ~3–4 W | - Phone thermal
    resistance (no fan): ~18 °C/W. Sustainable power = (95 − 25) / 18 = 3.9 W | - At 10 W burst: 20 ms/frame.
    At 3.9 W sustained: TOPS drops to ~29 → latency rises to 50–60 ms/frame | - INT8 quantization: 4×
    fewer ops/byte → same model at ~2.5 W sustained → runs within thermal envelope | - => Sustained TDP
    is 3–4× below peak; design for the thermal wall, not the spec sheet'
