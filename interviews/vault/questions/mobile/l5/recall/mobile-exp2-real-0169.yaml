schema_version: 1
id: mobile-exp2-real-0169
title: Energy Profiling for NPU Operator Selection
topic: energy-per-operation
status: published
provenance: imported
scenario: You are deploying a real-time speech enhancement model on the Qualcomm Hexagon NPU (Snapdragon
  8 Gen 3). The team is debating between a memory-heavy lookup table (LUT) approach streaming from the
  shared 16 GB LPDDR5X and a compute-heavy polynomial approximation running directly on the INT8 tensor
  cores. You need to evaluate the energy consumption per inference of each approach to maximize battery
  life, knowing the NPU delivers up to 45 TOPS INT8.
details:
  realistic_solution: The candidate should quantify the energy of both approaches, recognizing that trading
    compute for memory access is highly beneficial on modern mobile NPUs. They will conclude that the
    compute-heavy polynomial approximation is significantly more energy-efficient. They should recommend
    keeping the operation bound to the Hexagon's ALUs and local SRAM, actively trading 'wasted' compute
    for eliminated DRAM reads.
  common_mistake: Candidates often only look at latency or TOPS utilization and assume that minimizing
    MAC operations automatically minimizes power. They fail to apply the Horowitz energy table principles,
    ignoring that LPDDR5X memory access costs orders of magnitude more energy than INT8 arithmetic on
    the NPU.
  napkin_math: 'LUT approach: Streams 2MB from LPDDR5X. Energy = 2MB * 8 bits/byte * 15 pJ/bit = 2.4e8
    pJ = 240 microjoules (uJ) per inference. Compute approach: Requires 50 million INT8 MACs on the Hexagon
    NPU. Assuming ~0.2 pJ per INT8 MAC, Energy = 5e7 MACs * 0.2 pJ/MAC = 1e7 pJ = 10 microjoules (uJ)
    per inference. The compute-heavy approach uses 24x less energy (10 uJ vs 240 uJ), proving that memory
    access dominates the power budget on the Snapdragon 8 Gen 3.'
