schema_version: 1
id: mobile-exp2-real-0158
title: Hexagon NPU Sizing for On-Device LLM
topic: accelerator-comparison
status: published
provenance: imported
scenario: You are tasked with deploying a 1.5 billion parameter language model for real-time on-device
  chat on a smartphone powered by the Qualcomm Hexagon NPU (Snapdragon 8 Gen 3). The SoC features a heterogeneous
  CPU+GPU+NPU architecture, provides 45 TOPS of INT8 compute on the NPU, and utilizes 12 GB of shared
  LPDDR5X memory. To meet a strict latency SLA of 40 tokens per second, you must evaluate the hardware
  constraints, decide whether the NPU is the correct target accelerator compared to the CPU or GPU, and
  size the deployment concretely.
details:
  realistic_solution: An L5 candidate will identify that auto-regressive decoding for LLMs at batch size
    1 is strictly memory-bandwidth bound, not compute-bound. They will evaluate the NPU based on its ability
    to handle quantized memory accesses efficiently rather than its peak TOPS. The candidate will conclude
    that keeping the entire generation loop on the NPU is necessary to avoid CPU-NPU synchronization overhead,
    but will identify that INT8 is insufficient to meet the SLA due to memory constraints, necessitating
    INT4 quantization.
  common_mistake: Candidates often fixate on the 45 TOPS INT8 peak compute capacity of the NPU, assuming
    it guarantees high performance for any workload. They frequently neglect the shared LPDDR5X memory
    bandwidth bottleneck in auto-regressive generation and mistakenly assume the workload is compute-bound.
  napkin_math: 'Model size: 1.5B parameters. Using INT8 quantization, weights require 1.5 GB of memory.
    For auto-regressive decoding (batch size 1), all 1.5 GB must be loaded from the shared LPDDR5X memory
    for every generated token. To achieve 40 tokens/second, the required memory bandwidth is 1.5 GB/token
    * 40 tokens/sec = 60 GB/s. Since shared LPDDR5X on mobile typically peaks around 64 GB/s, this nearly
    saturates the theoretical maximum bandwidth and will likely fail in practice due to OS and display
    memory overhead. Meanwhile, compute required is ~3 GOPs per token * 40 = 120 GOPs (0.12 TOPS), which
    utilizes less than 0.3% of the NPU''s 45 TOPS INT8 capacity. To safely meet the SLA, the model must
    be quantized to INT4 to halve the bandwidth requirement to 30 GB/s.'
