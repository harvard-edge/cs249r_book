schema_version: 1
id: mobile-exp2-real-0165
title: On-Device Active Learning Data Selection
topic: dataset-curation
status: published
provenance: imported
scenario: You are building an on-device data curation pipeline for a smart camera app to identify and
  upload hard edge-cases for human annotation. The app processes a continuous 30 FPS 1080p video stream
  and uses an uncertainty-sampling model to score frames. The target device is the Apple A17 Pro Neural
  Engine (35 TOPS, ~5W, 16-core NE, shared 8 GB unified memory). Evaluate the system architecture for
  continuous background active learning data selection, sizing the memory and compute overhead to ensure
  it does not disrupt foreground applications.
details:
  realistic_solution: The solution should use a lightweight, single-pass proxy model on the 16-core Neural
    Engine for scoring, keeping compute utilization minimal. Crucially, frames must be downsampled before
    buffering. A hierarchical cascade should be used to evaluate uncertainty and select data, ensuring
    the background memory footprint remains small enough not to trigger OS memory pressure warnings.
  common_mistake: Candidates often propose running standard ensemble-based uncertainty methods which exceed
    compute budgets, or they plan to buffer uncompressed high-resolution frames in memory while waiting
    for the uncertainty model to score them, completely ignoring that the 8 GB unified memory is shared
    with the OS and foreground apps.
  napkin_math: 'Compute: A 2 GOPS proxy model at 30 FPS requires 60 GOPS. On the 35 TOPS (35,000 GOPS)
    A17 Pro NE, this uses 60 / 35,000 = ~0.17% of total compute and roughly ~8.5 mW of the ~5W budget.
    Memory: Buffering 3 seconds of uncompressed 1080p (1920x1080x3 bytes = ~6.2MB/frame) at 30 FPS requires
    90 frames * 6.2MB = 558MB. This is prohibitive for a background task on an 8 GB shared system. Downsampling
    to 224x224x3 (150KB/frame) reduces the 90-frame buffer to 13.5MB, safely fitting within background
    limits.'
