id: mobile-exp2-real-0171
title: On-Device LLM Intersectional Fairness Sizing
topic: fairness-evaluation
status: published
provenance: imported
scenario: You are deploying an on-device LLM (similar to Gemini Nano) on the Google Tensor G3 for real-time
  text summarization. To preserve privacy, intersectional fairness evaluation (across dialects, genders,
  and topics) must run entirely on-device overnight while the phone is charging. Given the Tensor G3's
  7.5 TOPS TPU and 12 GB LPDDR5X memory, you must design and size the evaluation pipeline to ensure it
  completes within an 8-hour window without causing OOM crashes or thermal throttling.
details:
  realistic_solution: The candidate should identify that LLM inference is memory-bandwidth bound, not
    compute bound, and calculate throughput based on the LPDDR5X specifications. They must propose quantizing
    the model to 4-bit (INT4) to ensure the model and context easily fit within a strict 1.5-2 GB budget
    allocated from the 12 GB RAM. The evaluation dataset must be sized so that the total generation time,
    including thermal throttling overhead, fits within the 8-hour overnight charging window.
  common_mistake: Candidates often propose running exhaustive fairness benchmarks without calculating
    the memory bandwidth bottleneck of autoregressive generation, assuming the 7.5 TOPS TPU can instantly
    process the dataset. They also frequently forget to account for the memory footprint of the OS and
    background apps, risking OOM kills during the evaluation.
  napkin_math: 'Model sizing: A 2B parameter model quantized to 4-bit (INT4) occupies ~1 GB, safely fitting
    the 12 GB LPDDR5X alongside the OS. Throughput: While the TPU provides 7.5 TOPS, generation is memory
    bound. Assuming ~50 GB/s memory bandwidth, reading the 1 GB model takes 0.02s per token, yielding
    a theoretical max of 50 tokens/sec. Dataset sizing: An intersectional evaluation matrix of 5 dialects
    x 3 genders x 10 topics x 100 prompts = 15,000 prompts. At 100 output tokens each, that is 1.5 million
    tokens. Time constraint: 1.5M tokens / 50 tokens/sec = 30,000 seconds = 8.3 hours. Since this exceeds
    a safe 6-hour thermal/charging window, the candidate must evaluate reducing the prompt count per demographic
    intersection or shrinking the output token length.'
