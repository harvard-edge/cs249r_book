id: mobile-0633
title: The Voice Assistant That Froze The Speedometer
topic: real-time-deadlines
status: published
provenance: imported
scenario: 'Your team deploys a new voice assistant with an on-device LLM to your company''s flagship electric
  vehicle. To maximize hardware utilization, you implement a continuous batching scheduler for the NPU.
  In single-query tests, the assistant is snappy. However, when QA tests it under heavier, more realistic
  conditions (e.g., user asks a question while navigation is active and a passenger speaks), they report
  a critical bug: the digital speedometer and instrument cluster intermittently freeze. The P99 frame
  delivery jumps from a required 16ms to over 250ms. The voice assistant''s own TTFT also degrades non-linearly.
  Assess the situation: Why would an LLM scheduling optimization, designed to *improve* throughput, cause
  a catastrophic failure in the hard-real-time instrument cluster?'
details:
  realistic_solution: This is a classic resource contention problem on a mobile System-on-Chip (SoC),
    specifically memory bandwidth starvation, directly caused by the continuous batching strategy. Continuous
    batching's goal is to keep the NPU 100% utilized by creating a persistent queue of work. This turns
    the NPU into a relentless, greedy consumer of the shared memory bus, constantly loading model weights
    and KV caches for its concurrent requests. On an SoC, the NPU, GPU (for the instrument cluster), and
    CPUs all share the same DRAM controller and bandwidth. The instrument cluster's small, periodic, but
    hard-real-time request to read its framebuffer from DRAM to the display controller gets stuck in the
    memory queue behind the NPU's massive, multi-gigabyte transfers. Queueing theory shows that as resource
    utilization approaches 100%, wait times explode non-linearly. The continuous batcher saturated the
    memory bus, causing the GPU's wait time to exceed its 16ms deadline, resulting in dropped frames and
    a system freeze. The optimization for LLM throughput directly starved the critical real-time rendering
    pipeline.
  common_mistake: This is a priority inversion bug in the OS scheduler. The instrument cluster's rendering
    thread should have the highest real-time priority. This is a platform team or OS vendor issue, not
    an ML systems issue.
  napkin_math: Snapdragon 8 Gen 3 has 77GB/s bandwidth. 7B INT4 model = 3.5GB weights. Single query max
    is 77/3.5 = 22 tok/s. With continuous batching (batch size 4), you read 3.5GB to generate 4 tokens
    simultaneously. Throughput is now 4 * (77/3.5) = 88 tok/s! But memory contention forces each user
    to see 22 tok/s.
