schema_version: 1
id: mobile-cell-10240
title: Optimizing Prefill Latency via Prompt Compression on Snapdragon 8 Gen 3
topic: compound-ai-systems
status: published
provenance: imported
scenario: A Snapdragon 8 Gen 3 (45 TOPS, 16GB) RAG app uses 800-token retrieved context (4 chunks of 200
  tokens each) + 300-token system prompt + 100-token query = 1200-token prefill. Prefill of 1200 tokens
  with a 1B INT8 model takes 890ms. A prompt compression model (LLMLingua-style, 50M params) can compress
  the retrieved context to 40% of original size in 120ms. Calculate the net latency improvement and decide
  whether compression is worthwhile.
details:
  realistic_solution: 'After compression: retrieved context = 800*0.4=320 tokens. New prefill: 320+300+100=720
    tokens. Prefill scales approximately linearly with tokens (for transformer attention: O(n^2) but for
    inference with KV cache build: O(n) per layer). 720/1200 * 890ms = 534ms prefill. Add compression
    model: 50M INT8 = 50MB, runs on NPU at ~500ms for processing 800 tokens (50M * 800 * 2 ops / (45e12
    * 0.3) = 2.37ms... that''s too fast — LLMLingua processes tokens with attention, closer to 120ms as
    stated). Net: compression(120ms) + prefill(534ms) = 654ms vs baseline 890ms. Savings: 236ms (26.5%).
    Worthwhile if accuracy loss < 3%.'
  common_mistake: Calculating only the prefill savings without accounting for the compression model's
    own latency. If compression takes 120ms and saves 534ms of prefill, the net gain is 414ms — but teams
    often forget that the compression model also requires its own prefill and compute on the mobile NPU,
    and that compression quality may reduce answer accuracy.
  napkin_math: 'Baseline prefill: 1200 tokens * (1B * 2 ops/token) / (45e12 * 0.3) = 1200 * 2e9 / 1.35e13
    = 178ms... discrepancy with 890ms stated. The 890ms likely includes attention O(n^2) cost: attention
    per layer = n^2 * d per layer. For 1B model, 22 layers, d=64: 22 * 1200^2 * 64 = 2.03e9 ops. Total
    ops: 1200 * 2e9 + 2.03e9 = 2.403e12. At 1.35e13: 178ms — still doesn''t match 890ms. Accept stated
    890ms as empirical (includes memory bandwidth bottleneck at LPDDR5). Compression: 800→320 tokens context.
    New prefill estimate: 890 * (720/1200) = 534ms. With 120ms compression overhead: 654ms. Net savings:
    890-654=236ms (26.5%).'
