schema_version: 1
id: mobile-exp-real-0011
title: A17 Pro Neural Engine Latency Breakdown
topic: latency-decomposition
status: published
provenance: imported
scenario: Your team is deploying a local voice-based smart assistant using a 1.5B parameter LLM (quantized
  to INT4) on an iPhone 15 Pro. The target platform is the Apple A17 Pro Neural Engine, which features
  a 16-core NPU delivering 35 TOPS within a ~5W power envelope, sharing 8 GB of unified memory with the
  CPU and GPU. You need to decompose the end-to-end latency for a user query consisting of a 50-token
  prompt (derived from an audio input) and a 100-token generated response, accounting for compute-bound
  and memory-bound phases.
details:
  realistic_solution: 'A strong L5 candidate will break the latency into distinct phases: Audio Preprocessing
    (CPU), Time-to-First-Token (TTFT, which is compute-bound on the NPU), and Time-Per-Output-Token (TPOT,
    which is memory-bound). They will evaluate the tradeoff between NPU utilization for the prompt processing
    phase versus the memory bandwidth limits of the shared unified memory during the token generation
    phase.'
  common_mistake: Candidates often look only at the 35 TOPS figure and assume generation will be incredibly
    fast, failing to realize that autoregressive generation (TPOT) is memory-bandwidth bound, not compute
    bound. They also frequently forget to factor in the audio preprocessing (speech-to-text) latency and
    the overhead of accessing the shared 8 GB unified memory when the GPU/CPU are also active.
  napkin_math: 'Model size: 1.5B params @ INT4 = 0.75 GB. TTFT (Compute bound): 50 prompt tokens * 1.5B
    params * 2 MACs = 150 Giga-operations. A17 Pro NPU has 35 TOPS. Assuming 30% effective utilization:
    150 GOPs / 10.5 TOPS = ~14 ms TTFT. TPOT (Memory bound): Assuming ~50 GB/s available memory bandwidth
    from the shared 8 GB pool. Loading 0.75 GB per token = 0.75 / 50 = 15 ms/token. Total generation for
    100 tokens = 100 * 15 ms = 1500 ms. Adding ~200 ms for audio preprocessing, total end-to-end latency
    is 200 ms (Prep) + 14 ms (TTFT) + 1500 ms (Generation) = ~1.71 seconds.'
