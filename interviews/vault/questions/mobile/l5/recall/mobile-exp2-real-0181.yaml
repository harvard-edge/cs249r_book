schema_version: 1
id: mobile-exp2-real-0181
title: On-Device LLM Precision Strategy for Tensor G3
topic: mixed-precision-training
status: published
provenance: imported
scenario: You are tasked with deploying a 3.2-billion parameter LLM, similar to Gemini Nano, onto the
  Google Tensor G3 chip. The SoC features an on-device TPU capable of 7.5 TOPS and utilizes a shared 12
  GB LPDDR5X memory pool. To avoid aggressive background app killing by the Android OS, your strict memory
  budget for the model, including weights and runtime memory, is 3.5 GB. Evaluate precision formats and
  decide on a deployment recipe that satisfies this constraint while maximizing generation throughput.
details:
  realistic_solution: A mixed-precision approach using 4-bit weight quantization (W4) and 16-bit activations
    (A16 or BF16) is required. The TPU can perform rapid dequantization of the 4-bit weights into 16-bit
    registers during inference to maintain precision for the matrix multiplications. This drastically
    reduces the static memory footprint, allowing the KV cache to remain in 16-bit precision to preserve
    generation quality over longer context windows.
  common_mistake: Candidates often propose standard FP16 deployment or basic INT8 quantization without
    calculating the memory footprint, failing to realize that a 3.2B model in INT8 still consumes 3.2
    GB just for weights, leaving insufficient room for the KV cache and activations under the 3.5 GB budget.
  napkin_math: In FP16, a 3.2B model requires 6.4 GB (3.2B * 2 bytes), which instantly blows the 3.5 GB
    budget on the 12 GB LPDDR5X system. With W4A16, the weights consume 1.6 GB (3.2B * 0.5 bytes). This
    leaves 1.9 GB of the 3.5 GB budget for the KV cache. Assuming 32 layers, 2048 hidden dimension, and
    FP16 (2 bytes) for K and V vectors, one token's KV cache is 32 * 2048 * 2 * 2 = 256 KB. A 2048-token
    context window requires 512 MB, safely fitting into the remaining 1.9 GB budget while leveraging the
    TPU's 7.5 TOPS.
