schema_version: 1
id: mobile-exp2-real-0198
title: Exynos 2400 Shared Memory Budgeting
topic: vram-budgeting
status: published
provenance: imported
scenario: We are deploying a 3B parameter conversational AI assistant locally on a smartphone powered
  by the Samsung Exynos 2400 NPU. The system features 12 GB of shared LPDDR5X memory, but because this
  pool is unified across the CPU, GPU, ISP, and the Android OS, system engineers have hard-capped the
  NPU allocation at 3.5 GB to prevent OS instability and background app eviction. Evaluate the memory
  allocation strategy required to support a 2048-token context window, and determine the optimal quantization
  and caching architecture to fit within this strict boundary.
details:
  realistic_solution: A strong candidate will immediately rule out FP16 weights (which would take 6GB)
    and propose 4-bit weight quantization (e.g., AWQ/GPTQ) to compress the 3B model. They will explicitly
    calculate the KV-cache footprint at maximum context and size the activation buffers. Finally, they
    will evaluate the remaining headroom and suggest strategies like KV-cache quantization (e.g., 8-bit)
    or sliding window attention if the prefill memory spikes threaten the 3.5 GB Exynos NPU cap.
  common_mistake: Candidates often assume the entire 12 GB LPDDR5X pool is available for the model, failing
    to account for the shared memory architecture of mobile SoCs. They also frequently forget to budget
    for the KV-cache growth over a full 2048-token context or the transient activation memory required
    during the prefill phase.
  napkin_math: 'Total NPU Budget: 3.5 GB (out of 12 GB shared LPDDR5X). Weights: 3B params in INT4 (0.5
    bytes/param) = 1.5 GB + ~10% overhead for group scales = ~1.65 GB. KV-Cache: Assume hidden size 3072,
    32 layers, FP16 (2 bytes). Size per token = 2 (K&V) * 32 * 3072 * 2 bytes = 393.2 KB. For 2048 tokens
    = 393.2 KB * 2048 = ~805 MB. Activations: ~400 MB for a standard prefill operation. Total peak memory
    = 1.65 GB (weights) + 0.8 GB (KV-cache) + 0.4 GB (activations) = 2.85 GB. This leaves ~650 MB of safety
    margin for the Exynos 2400 dual-core NPU workspace and system fluctuations.'
