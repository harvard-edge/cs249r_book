schema_version: 1
id: mobile-exp2-real-0191
title: Quantization Sizing for Exynos 2400 Shared Memory Budget
topic: quantization-fundamentals
status: published
provenance: imported
scenario: Your team is porting a 4-billion parameter language model to the Samsung Exynos 2400 NPU for
  an on-device translation feature. The device features 34.7 TOPS from a dual-core NPU, but relies on
  a unified 12 GB LPDDR5X memory pool shared heavily with the CPU, GPU, and the camera ISP. Given the
  shared memory contention, you must evaluate whether standard PTQ INT8 or an aggressive mixed-precision
  INT4/INT8 strategy is required. Size the model concretely to justify your quantization strategy, taking
  both peak TOPS and memory footprint into account.
details:
  realistic_solution: At L5, the candidate should immediately identify that generative tasks are memory-bandwidth
    bound rather than compute-bound. They should recommend INT4 weight-only quantization with INT8 or
    FP16 activations to minimize memory footprint and bandwidth usage, ensuring the 12 GB shared pool
    has enough headroom for the camera ISP and OS while maintaining acceptable token generation speeds.
  common_mistake: Candidates often solely focus on the NPU's 34.7 TOPS compute capacity and conclude that
    INT8 is sufficient since the NPU has plenty of compute. They fail to account for the shared nature
    of the 12 GB memory pool, ignoring that a naive INT8 model will severely bottleneck the ISP and GPU
    during concurrent workloads.
  napkin_math: A 4B parameter model in FP16 takes 8 GB of memory, leaving only 4 GB of the 12 GB LPDDR5X
    pool for the OS, GPU, and ISP, which will cause aggressive OOM kills. With INT8 quantization (1 byte/param),
    the footprint drops to 4 GB. For auto-regressive decoding, reading 4 GB per token at a typical mobile
    bandwidth of 50-60 GB/s yields ~12-15 tokens/sec. Compressing weights to INT4 (0.5 bytes/param) reduces
    the model size to 2 GB. This not only safely fits within the shared 12 GB budget alongside the ISP,
    but halves the memory bandwidth requirement per token, effectively doubling the theoretical memory-bound
    generation speed to ~24-30 tokens/sec, well within the 34.7 TOPS compute ceiling.
