schema_version: 1
id: mobile-exp2-real-0160
title: A17 Pro GQA Sizing for On-Device LLMs
topic: attention-scaling
status: published
provenance: imported
scenario: We are deploying a 3B parameter conversational agent locally on the Apple A17 Pro Neural Engine.
  The model needs to handle up to 4K context windows. The system allocates a strict 4 GB out of the 8
  GB shared unified memory for our process, and we must operate within a ~5W power envelope. Evaluate
  the architectural choice between Multi-Head Attention (MHA) and Grouped-Query Attention (GQA) to ensure
  the 16-core Neural Engine can sustain interactive reading speeds without exceeding memory limits.
details:
  realistic_solution: The candidate should calculate the KV cache memory footprint and realize MHA will
    consume too much of the available memory budget. They should propose GQA (e.g., an 8:1 query-to-KV
    head ratio) to compress the KV cache. This prevents out-of-memory errors, allows the model weights
    (quantized to 4-bit) and KV cache to fit comfortably within the 8 GB unified memory constraints, and
    reduces memory access power consumption to stay under the ~5W limit.
  common_mistake: Candidates often assume the 35 TOPS NPU is the bottleneck for text generation, missing
    that autoregressive decoding is memory-bandwidth bound. They may also size the model weights but forget
    to account for the dynamic memory growth of the KV cache at a 4K context length.
  napkin_math: 'Assume 3B model, hidden size 3072, 32 layers. 4-bit weights = ~1.5 GB. For MHA at 4K context:
    KV cache (FP16) = 2 (K,V) * 2 bytes * 32 layers * 4096 tokens * 3072 dim = 1.61 GB. Total memory =
    1.5 GB + 1.61 GB = 3.11 GB (dangerously close to 4GB system limit with activations). Using GQA with
    1/8th KV heads reduces the KV cache to 1.61 GB / 8 = ~201 MB. Total memory drops to 1.7 GB, safely
    fitting within the 8 GB unified memory budget and freeing bandwidth to feed the 35 TOPS NPU.'
