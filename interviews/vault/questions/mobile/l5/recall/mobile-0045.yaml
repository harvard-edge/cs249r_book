id: mobile-0045
title: The On-Device Differential Privacy Budget
topic: differential-privacy
status: published
provenance: imported
scenario: Your health app uses on-device ML to classify sleep stages from Apple Watch accelerometer data.
  You want to improve the model using federated learning, but your privacy team says you need formal differential
  privacy guarantees — HIPAA requires it for health data. Your privacy budget is ε = 1 per user per year.
  The model needs 100 federated rounds to converge. How do you make the math work?
details:
  realistic_solution: 'Privacy amplification stretches the epsilon=1/year budget across 100 rounds. (1)
    Subsampling: sample 1% of devices per round, reducing per-round cost ~100x. (2) Noise: sigma=1.0,
    gradient clipping C=1.0. (3) Renyi DP accounting for tighter composition than naive epsilon-addition.
    Result: 100 rounds x 1% subsampling x sigma=1.0 = total epsilon 0.85 (under budget). Convergence ~2.5x
    slower, accuracy ~2% below baseline. Upload: 10K x 500 KB x 100 rounds = 500 GB total.'
  common_mistake: '"Set ε = 1 per round. After 100 rounds, total ε = 100." This violates the privacy budget
    by 100×. Differential privacy composes — each round consumes part of the budget, and the total must
    stay under ε = 1.'
  napkin_math: 'Privacy budget: ε = 1/year. Rounds: 100. Subsampling rate: q = 1%. Per-round noise multiplier:
    σ = 1.0. Devices per round: 10,000. Gradient size: 500 KB (sleep stage classifier). Upload per round:
    10,000 × 500 KB = 5 GB. Total training bandwidth: 100 × 5 GB = 500 GB. Convergence: ~100 rounds ×
    2.5× slowdown = equivalent to 250 non-private rounds. Final accuracy: ~2% below non-private baseline.
    Privacy guarantee: ε = 0.85 (under budget).'
