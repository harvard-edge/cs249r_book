title: The Adaptive Bitrate Inference
topic: real-time-deadlines
status: published
provenance: imported
scenario: Your camera app runs continuous object detection on a Snapdragon 8 Gen 3 phone. After 3 minutes
  of sustained inference, the SoC junction temperature hits 95°C and the NPU throttles from 45 TOPS to
  18 TOPS. Your INT8 model now misses the 33ms frame deadline. Design an adaptive system that switches
  between INT8 and INT4 precision based on thermal state, and calculate the latency and accuracy at each
  operating point.
details:
  realistic_solution: 'Thermal-aware two-tier inference. Monitor junction temperature via Android thermal
    API. Above 85C (NPU throttles 45 -> 18 TOPS): switch INT8 (20ms throttled) to INT4 (12ms). INT4 halves
    bandwidth demand, reducing power 3W -> 1.5W. SoC equilibrium: ~80C. Accuracy: INT8 = 44.9 mAP, INT4
    = 42.1. Session average (60/40 split): 43.8 mAP — 2.4% below peak with zero dropped frames. Maintain
    frame rate (visible) while trading accuracy (often imperceptible).'
  common_mistake: '"Just throttle the frame rate — run at 15 FPS when hot." This degrades the user experience
    uniformly. Adaptive precision maintains frame rate while gracefully trading accuracy.'
  napkin_math: 'INT8 at 45 TOPS: 11.2M × 1 byte / (45 × 10⁹ ops/s × efficiency) ≈ 8ms. Fits in 33ms ✓.
    INT8 at 18 TOPS (throttled): 8ms × (45/18) = 20ms. Still fits 33ms ✓ but leaves only 13ms margin.
    INT4 at 18 TOPS: weight load halved → ~12ms. Margin: 21ms. Power reduction: 3W → 1.5W. Cooling rate:
    ~2°C/minute at 1.5W vs heating rate of ~5°C/minute at 3W. Equilibrium: ~80°C with duty cycling. Accuracy:
    60% × 44.9 + 40% × 42.1 = **43.8 mAP** average (2.4% below peak, but zero dropped frames).'
