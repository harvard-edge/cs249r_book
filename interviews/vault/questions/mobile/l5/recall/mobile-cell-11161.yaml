id: mobile-cell-11161
title: 'KV-Cache: Mastery — Long-Context KV Cache Strategy for Mobile Code Assistant'
topic: kv-cache-management
status: published
provenance: imported
scenario: Design the complete KV cache strategy for a 3B LLM code assistant on A17 Pro (35 TOPS, 8GB)
  that must handle 32K-token codebases. Current 4096-token limit is insufficient. Design memory-efficient
  KV cache, eviction policy, and quality preservation strategy for 32K context.
details:
  realistic_solution: '32K full KV at bf16: 3B model (32 layers, GQA-8, head_dim=128): 32K × 32 × 2 ×
    8 × 128 × 2B = 32K × 131KB = 4.19GB. Plus 750MB model + 2GB OS = 6.94GB > 8GB. Doesn''t fit. Solutions:
    INT4 KV + sliding window + sparse attention.'
  common_mistake: Not quantifying the memory infeasibility of 32K full KV cache; proposing solutions without
    verifying they fit in available memory.
  napkin_math: '32K full KV (bf16): 4.19GB > 8GB available (8 - 2 OS - 0.75 model - 0.5 misc = 4.75GB).
    Barely fails. Solution 1: INT4 KV: 4.19GB / 4 = 1.05GB → total 4.3GB < 4.75GB. Fits! INT4 quality:
    suitable for code (tokens are precise, but individual attention weights less sensitive than logits).
    Solution 2: Sliding window 4096 + landmark tokens. Keep: (a) first 1024 tokens (imports, class headers),
    (b) last 3072 tokens (current edit context), (c) 1024 landmark tokens (function definitions, selected
    by attention magnitude). Total effective: 5,120 key tokens, full KV = 5120 × 131KB = 671MB. Total:
    3.42GB. Fits in 4.75GB with 1.33GB headroom. Quality: landmark selection preserves structural understanding
    of full codebase. Latency at 5120 effective tokens: 671MB / 68 GB/s + 750MB / 68 GB/s = 9.87ms + 11ms
    = 20.87ms → 47.9 tok/sec. Acceptable for code completion. Recommended: INT4 KV (simple) + landmark
    tokens (quality). Total: 1.05GB KV at 32K + 750MB model + 2.5GB overhead = 4.3GB. Fits in 8GB with
    3.7GB headroom for future features.'
