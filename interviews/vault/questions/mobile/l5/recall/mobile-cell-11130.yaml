id: mobile-cell-11130
title: 'Kernel Fusion: Realize Fusion Plan for Production Mobile LLM Deployment'
topic: kernel-fusion
status: published
provenance: imported
scenario: Realize the complete fusion plan for shipping a 1B INT4 LLM (500MB) to 10M users on A17 Pro
  (35 TOPS, 8GB) and Snapdragon 8 Gen 3 (45 TOPS, 16GB). Specify all fused op groups, their implementations,
  testing requirements, and expected latency for each platform.
details:
  realistic_solution: 'Platform-specific fusion implementations: (1) A17 Pro: Core ML .mlpackage with
    automatic ANE fusion. (2) Snapdragon: Qualcomm AI Engine (QNN SDK) with manual fusion specification.
    Test: compare output against FP32 reference, max error < 0.02.'
  common_mistake: Specifying fusion without a testing plan for numerical correctness across platforms;
    not accounting for platform-specific fusion APIs (Core ML vs QNN).
  napkin_math: 'Fused op groups (both platforms): (1) RMSNorm + Linear (QKV projection): saves 28 layers
    × 4096 × 2B × 2 = 459KB. (2) Attention (FlashAttention): saves 268MB → 25MB per layer (at 512 ctx).
    (3) Linear + SiLU + Gate (SwiGLU): saves 28 × 4096 × 2B × 2 = 459KB. (4) Residual + LayerNorm: saves
    28 × 4096 × 2B = 230KB. Total savings: 268MB/layer × 28 = 7.5GB → flash reduces to 706MB. Other savings:
    1.15MB per layer × 28 = 32MB. Combined: 7.5GB → 738MB memory footprint reduction for attention. A17
    Pro latency: weight load 22ms + KV read at 512 ctx (706MB/68GB/s=10.4ms) + compute (0.17ms) + overhead
    (2ms) = 34.6ms → 28.9 tok/sec. Snapdragon: weight load 22ms + KV 10.4ms + compute (0.13ms) + overhead
    (1.5ms) = 34ms → 29.4 tok/sec. Both exceed 25 tok/sec target. QA: 1K golden prompts × 2 platforms
    × max output error < 0.02. CI: run on device simulator for each platform.'
