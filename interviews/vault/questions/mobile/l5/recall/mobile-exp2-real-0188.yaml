id: mobile-exp2-real-0188
title: Evaluate A17 Pro Power Budgeting for Real-Time Video AI
topic: power-budgeting
status: published
provenance: imported
scenario: Your team is deploying a real-time video super-resolution model running at 60 FPS on the Apple
  A17 Pro Neural Engine. The A17 Pro features a 16-core Neural Engine capable of 35 TOPS and operates
  within a ~5W overall power envelope, sharing 8 GB of unified memory with the CPU and GPU. You need to
  evaluate whether the application can sustain its performance under typical thermal constraints without
  aggressive DVFS throttling, given that the camera ISP and display are already consuming a significant
  portion of the SoC's power budget.
details:
  realistic_solution: A realistic evaluation must allocate a strict sub-budget for the Neural Engine,
    typically around 1.5W to 2W, to avoid thermal throttling when other IP blocks are active. The candidate
    should design the model's compute density to fit within this constrained power envelope by minimizing
    DRAM accesses, maximizing NPU SRAM usage, and leveraging lower precision to increase energy efficiency
    (TOPS/W).
  common_mistake: Candidates often assume the full 35 TOPS and 5W budget are exclusively available to
    the NPU. They fail to account for the shared unified memory bandwidth and the concurrent power draw
    of the CPU, GPU, and camera ISP, which severely restricts the actual power headroom.
  napkin_math: Total SoC budget is ~5W. Assume GPU/CPU/ISP consume 3W, leaving 2W for the NPU. NPU peak
    efficiency is 35 TOPS / 5W = 7 TOPS/W. At a 2W sustained budget, usable performance is roughly 2W
    * 7 TOPS/W = 14 TOPS. For real-time 60 FPS processing, max operations per frame = 14 TOPS / 60 = ~233
    GOPS per frame.
