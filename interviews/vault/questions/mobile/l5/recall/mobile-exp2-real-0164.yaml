schema_version: 1
id: mobile-exp2-real-0164
title: On-Device Data Validation Pipeline on Snapdragon 8 Gen 3
topic: data-quality-validation
status: published
provenance: imported
scenario: You are designing an on-device data collection and validation pipeline for a continuous learning
  system running on a Qualcomm Hexagon NPU (Snapdragon 8 Gen 3). The system captures user interaction
  data to fine-tune a personalized model locally. Before storing the data in the local training buffer,
  you must run quality gates to detect anomalies and ensure the data contract is met. Evaluate the architectural
  tradeoffs of performing this validation, considering the heterogeneous compute environment and quantifying
  the resource constraints given the shared 12-16 GB LPDDR5X memory and 45 TOPS INT8 NPU compute.
details:
  realistic_solution: 'The optimal design uses a heterogeneous approach: lightweight, branching schema
    validation and data contract enforcement run on the CPU, while heavier anomaly detection (e.g., running
    a small embedding model to check for out-of-distribution image or text inputs) is offloaded to the
    Hexagon NPU. By quantizing the anomaly detection model to INT8, we leverage the NPU''s efficiency.
    This minimizes power consumption while respecting the shared LPDDR5X memory bandwidth constraints.'
  common_mistake: Candidates often default to running all data validation logic on the CPU, ignoring the
    power efficiency of the NPU for vector-heavy tasks like embedding generation for anomaly detection.
    Alternatively, they might try to push complex, branching schema validation logic to the NPU, which
    is highly inefficient for the Hexagon architecture.
  napkin_math: Assume anomaly detection requires running a 5M parameter INT8 embedding model. At 1 byte
    per parameter, the model footprint is 5MB, easily fitting within the 12-16 GB shared LPDDR5X memory
    pool. A single validation inference requires roughly 10 mega-operations. Validating a continuous stream
    of data at 30 frames/items per second requires 30 * 10 = 300 mega-operations per second (0.0003 TOPS).
    Given the Hexagon NPU provides 45 TOPS INT8, the anomaly detection overhead consumes less than 0.001%
    of the available NPU compute, leaving ample headroom for the primary ML workload.
