id: mobile-exp2-real-0186
title: Hardware-Aware NAS for Hexagon NPU Realization
topic: neural-architecture-search
status: published
provenance: imported
scenario: You are leading the deployment of a real-time video super-resolution model on the Snapdragon
  8 Gen 3 platform. You need to use hardware-aware NAS to design an architecture that maximizes quality
  while strictly meeting a 16ms latency budget on the Qualcomm Hexagon NPU. Given the NPU's 45 TOPS INT8
  peak performance and the device's shared 16 GB LPDDR5X memory, evaluate how you would constrain the
  search space to ensure the resulting architecture does not hit memory bandwidth bottlenecks before compute
  bounds.
details:
  realistic_solution: A strong L5 candidate will formulate a search space tailored to the Hexagon NPU,
    favoring operators that map well to the hardware's 45 TOPS INT8 matrix math units, such as properly
    quantized convolutions with hardware-friendly channel counts. They will incorporate an on-device latency
    predictor or lookup table derived directly from the Snapdragon 8 Gen 3, and ensure the memory bandwidth
    requirements fit within the shared LPDDR5X budget when operating concurrently with CPU and GPU workloads.
  common_mistake: Candidates often constrain the NAS solely on proxy metrics like FLOPs or parameter count
    without considering the Hexagon NPU's specific INT8 arithmetic limits or the memory bandwidth wall.
    They might select operations that are fast on standard CPUs but unsupported or inefficient on Hexagon
    tensor accelerators.
  napkin_math: Assuming the NPU achieves 50% utilization of its 45 TOPS INT8 peak, giving ~22.5 effective
    TOPS. For a 16ms budget per frame, the maximum operations = 22.5 TOPS * 0.016s = 360 GOPs. If the
    LPDDR5X provides ~60 GB/s realistic bandwidth, in 16ms we can transfer at most 60 GB/s * 0.016s =
    960 MB. To stay compute-bound, the NAS must prioritize architectures with high arithmetic intensity,
    ensuring total weight and activation transfers per inference remain well below this 960 MB ceiling.
