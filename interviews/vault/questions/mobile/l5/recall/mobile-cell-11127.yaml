id: mobile-cell-11127
title: 'Kernel Fusion: Mastery — Fusion Strategy Across Heterogeneous Mobile Hardware'
topic: kernel-fusion
status: published
provenance: imported
scenario: 'You are deploying a 1B LLM across a heterogeneous fleet: 30% A17 Pro (35 TOPS NE, 8GB), 45%
  Snapdragon 8 Gen 3 (45 TOPS, 16GB), 25% Tensor G3 (7.5 TOPS, 12GB). Design a single unified model with
  hardware-adaptive fusion strategy that achieves 20 tokens/sec on all three platforms.'
details:
  realistic_solution: 'Single INT4 quantized model. Hardware-detected fusion: at runtime, detect hardware
    → load platform-specific CoreML model (A17), QNN model (Snapdragon), XNNPack model (Tensor G3). Same
    quantized weights, different execution graphs.'
  common_mistake: Designing a single static fusion graph that works best on one platform but poorly on
    others; not using runtime hardware detection for adaptive fusion.
  napkin_math: '1B INT4 model = 500MB weights. A17 Pro NE: 500MB / 68 GB/s = 7.35ms weight load. Compute:
    0.17ms. With launch overhead: ~25ms → ~40 tok/sec. Easily meets 20 tok/s. Snapdragon Hexagon: 500MB
    / 68 GB/s = 7.35ms. Compute at 45 TOPS: 0.13ms. Launch overhead: ~20ms (less overhead on Hexagon vs
    ANE). Total: ~27ms → 37 tok/sec. Meets target. Tensor G3: 500MB / 51 GB/s estimated = 9.8ms. Compute
    at 7.5 TOPS: 0.8ms. Launch overhead: ~25ms (Tensor G3 is oldest, more overhead). Total: ~35ms → 28.6
    tok/sec. Meets 20 tok/sec target. Fusion optimization needed most on Tensor G3: fusing 32 RMSNorm
    kernels into GEMMs saves 32 × 10µs = 0.32ms. Not the bottleneck. Key: on Tensor G3, split model across
    GPU+CPU if needed. INT4 → INT8 decode on CPU as fallback: CPU (8-core Cortex-A55): 500MB weight load
    from cache... model doesn''t fit in cache. LPDDR5: 9.8ms + 50ms CPU compute = 59ms → 17 tok/sec. Miss
    target. Fix: use INT8 quantized model on Tensor G3 (sacrifice model quality slightly): 1GB weights,
    1000MB/51GB/s = 19.6ms load + 2ms compute + 10ms launch = 31.6ms → 31.6 tok/sec. But INT8 needs 1GB
    which is fine on 12GB device.'
