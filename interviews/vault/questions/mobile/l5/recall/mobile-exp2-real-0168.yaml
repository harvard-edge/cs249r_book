id: mobile-exp2-real-0168
title: Sizing On-Device Translation Architectures for A17 Pro
topic: encoder-decoder-tradeoffs
status: published
provenance: imported
scenario: You are designing an on-device real-time translation system targeting the Apple A17 Pro Neural
  Engine. You need to evaluate the deployment tradeoffs between a 1B parameter encoder-decoder model and
  a 1.5B parameter decoder-only model. Given the A17 Pro's 16-core Neural Engine with 35 TOPS and shared
  8 GB unified memory, you must determine which architecture will achieve lower autoregressive generation
  latency while remaining within the ~5W thermal budget.
details:
  realistic_solution: The correct approach involves analyzing the memory bandwidth bottleneck during the
    autoregressive generation phase, as the A17 Pro's shared unified memory is the limiting factor, not
    the 35 TOPS of compute. For the 1.5B decoder-only model, generation requires loading 1.5B weights
    plus the KV cache per token. For the 1B encoder-decoder (assuming a 500M/500M split), generation requires
    loading 500M decoder weights, the decoder KV cache, and executing cross-attention against the encoder's
    hidden states. While the decoder-only model has larger weight-loading overhead per token, the encoder-decoder
    model often suffers from complex memory access patterns and larger context state fragmentation, making
    the decoder-only approach more predictable and often more efficient to optimize on unified memory
    architectures.
  common_mistake: Candidates often assume the 1B parameter encoder-decoder model will inherently be faster
    and use less memory because it has fewer total parameters. They fail to distinguish between the compute-bound
    prefill phase and the memory-bound generation phase, overlooking how cross-attention in the encoder-decoder
    architecture repeatedly strains memory bandwidth by loading the encoder's output states for every
    generated token.
  napkin_math: 'Assume INT8 quantization (1 byte/parameter) and an effective unified memory bandwidth
    of 50 GB/s on the A17 Pro. For the 1.5B decoder-only model, loading weights takes 1.5 GB / 50 GB/s
    = 30 ms per token, capping throughput at ~33 tokens/s (ignoring KV cache). For the 1B encoder-decoder
    (500M decoder), weight loading takes 0.5 GB / 50 GB/s = 10 ms per token. However, compute time is
    entirely negligible: 1.5B MACs (3 GOPs) / 35 TOPS = ~0.08 ms. Since the system is overwhelmingly memory-bound
    (30 ms memory vs 0.08 ms compute), the ~5W power budget is largely consumed by memory transactions,
    dictating that the architecture choice must minimize memory traffic and optimize cache hits rather
    than minimizing FLOPs.'
