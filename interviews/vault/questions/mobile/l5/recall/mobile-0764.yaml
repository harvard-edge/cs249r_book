id: mobile-0764
title: The Privacy Budget Drain
topic: data-pipeline-engineering
status: published
provenance: imported
scenario: A mobile health app uses differential privacy with epsilon=1 per query. The analytics team wants
  to run 100 on-device queries per day against a user's data. Using basic composition, the daily privacy
  budget would be epsilon=100, which provides almost no privacy. How does advanced composition improve
  this, and what is the practical implication for query budgeting?
details:
  realistic_solution: 'Naive composition: total epsilon = 100 x 1 = 100 (no meaningful privacy). Advanced
    composition (square-root law): total epsilon scales as roughly sqrt(100) x 1 = 10. With Renyi DP accounting,
    even tighter bounds are achievable. Practical implication: use the moments accountant, batch correlated
    queries, and set a daily privacy budget (e.g., epsilon=5) that limits total queries.'
  common_mistake: Using naive (linear) composition and concluding that differential privacy is useless
    for frequent queries. Advanced composition via the moments accountant or Renyi DP gives a much tighter
    bound, making practical deployments feasible.
  napkin_math: 'Naive: 100 queries x eps=1 = eps_total=100. Advanced (sqrt): sqrt(100) x 1 = eps_total~10.
    With Renyi DP: potentially eps_total~7-8. To stay under eps_total=5, limit to ~25 queries/day.'
