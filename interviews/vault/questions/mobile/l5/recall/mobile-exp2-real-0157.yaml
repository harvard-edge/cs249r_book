schema_version: 1
id: mobile-exp2-real-0157
title: Progressive Rollout of Gemini Nano A/B Experiment
topic: ab-rollout-strategies
status: published
provenance: imported
scenario: You are leading the progressive rollout of a new on-device summarization feature powered by
  Gemini Nano on the Google Tensor G3. The feature is being A/B tested against a legacy cloud-based baseline.
  Given the Tensor G3's 12 GB LPDDR5X memory and 7.5 TOPS TPU, you must design a canary deployment strategy
  that monitors device health metrics while handling traffic splitting. Evaluate the trade-offs between
  a strict 1% shadow deployment versus a phased geographic rollout, and quantify the resource thresholds
  that would trigger an automatic rollback.
details:
  realistic_solution: 'Design an intelligent, client-driven rollout system where the Tensor G3 device
    queries a feature flag endpoint to determine its experiment arm. Implement a strict circuit breaker
    on the client: if the memory pressure causes OS background app evictions to spike, or if TPU usage
    causes sustained thermal throttling, the client gracefully degrades to the cloud baseline. Rollout
    should start at 0.1% of eligible Tensor G3 devices, monitoring p99 latency and battery drain regressions,
    before scaling to 1%, 10%, and 100%.'
  common_mistake: Candidates often focus solely on cloud-side traffic splitting and fail to account for
    device-level constraints like memory eviction, battery drain, and thermal throttling. They may propose
    A/B testing frameworks that drain battery by running redundant shadow inferences on the mobile device.
  napkin_math: Gemini Nano footprint is ~1.8 GB (4-bit quantized ~3.2B params), taking up 15% of the 12
    GB LPDDR5X RAM. During the canary rollout, we must ensure the remaining 10.2 GB prevents critical
    background app evictions. For compute, generating a 50-token summary requires ~320 Giga-Operations
    (2 * 3.2B * 50). The Tensor G3 TPU provides 7.5 TOPS (7500 GOPs), so raw compute time is 320 / 7500
    = ~43ms. However, memory bandwidth bottleneck (~64 GB/s) means reading the 1.8 GB weights 50 times
    takes 50 * (1.8 / 64) = ~1.4 seconds. The rollback threshold should be triggered if the 1.4s generation
    time causes >2% frame drops in foreground UI or if OS memory evictions increase by >5%.
