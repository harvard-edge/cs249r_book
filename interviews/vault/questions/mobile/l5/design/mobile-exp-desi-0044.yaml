schema_version: 1
id: mobile-exp-desi-0044
title: On-Device LLM Guardrails against Prompt Injection
topic: adversarial-robustness
status: published
provenance: imported
scenario: You are designing an on-device LLM-based personal assistant running entirely on the Apple A17
  Pro. The system reads incoming text messages to schedule events but must defend against prompt injection
  and data exfiltration attacks hidden in malicious texts. The hardware features a 16-core Neural Engine
  delivering 35 TOPS at ~5W, and 8 GB of unified memory shared across CPU, GPU, and NPU. Architect a defense-in-depth
  strategy that robustly filters adversarial inputs and sanitizes outputs without violating memory constraints
  or draining the battery.
details:
  realistic_solution: The optimal design uses a cascading defense mechanism. First, employ a lightweight,
    quantized (INT8) encoder-only model (e.g., MobileBERT) running efficiently on the Neural Engine to
    classify inputs for prompt injection before they reach the main LLM. The primary LLM should be a 3B-4B
    parameter model quantized to 4-bit to fit comfortably in memory. Finally, use strict output parsing
    and regex-based sanitization running on the CPU to prevent sensitive data exfiltration.
  common_mistake: Candidates often propose running a secondary, large LLM as a dedicated guardrail, failing
    to realize this will exceed the 8 GB unified memory constraint when running alongside the primary
    model and the OS. They also frequently suggest cloud-based adversarial filtering, which violates the
    privacy-first, on-device requirement of the assistant.
  napkin_math: 'Primary LLM: 4 billion parameters at 4-bit quantization requires ~2 GB of memory. Guardrail
    model: 25 million parameters at INT8 requires ~25 MB. Combined model footprint is ~2.025 GB, leaving
    nearly 6 GB of the 8 GB unified memory for the OS and foreground apps. The guardrail requires ~0.1
    GOPS per token; running on the 35 TOPS Neural Engine, the security check adds roughly 0.003 ms of
    latency per token, drawing negligible power within the ~5W budget.'
