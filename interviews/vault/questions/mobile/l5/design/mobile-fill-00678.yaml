id: mobile-fill-00678
title: Optimizing On-Device Object Detection for Google Tensor G3
topic: cnn-efficient-design
status: published
provenance: imported
scenario: Your team is developing a new real-time augmented reality application for mobile devices, which
  relies heavily on on-device object detection. The target hardware is a smartphone powered by the Google
  Tensor G3, featuring a dedicated on-device TPU capable of 7.5 TOPS (Tera Operations Per Second) and
  12 GB of LPDDR5X RAM. The current baseline object detection model (e.g., a standard ResNet-50 based
  Faster R-CNN) achieves the required accuracy but is too slow and consumes too much power for real-time
  operation (targeting <50ms inference latency) and memory footprint on the Tensor G3. You need to propose
  an architecture for the object detection model, explicitly considering the Tensor G3's capabilities
  and constraints, to meet the real-time, accuracy, and efficiency requirements.
details:
  realistic_solution: A realistic solution would involve leveraging a mobile-optimized CNN architecture
    like MobileNetV3 or EfficientNet (specifically designed for edge devices), incorporating depthwise
    separable convolutions and inverted residuals to drastically reduce FLOPs and parameter count while
    maintaining accuracy. The candidate should discuss fine-tuning a pre-trained model for the specific
    task, utilizing post-training or quantization-aware training to INT8 for efficient execution on the
    Tensor G3's TPU. Furthermore, they should articulate how to map the model operations effectively to
    the 7.5 TOPS TPU for minimal latency, potentially considering techniques like operator fusion or optimizing
    input/output pipelines.
  common_mistake: Candidates might propose directly quantizing the existing large model without architectural
    redesign, or suggest cloud-based inference, overlooking the explicit 'on-device' requirement and the
    Tensor G3's specialized TPU. Another common mistake is not considering the memory bandwidth or caching
    implications of LPDDR5X, or failing to acknowledge the benefits of inverted residuals and depthwise
    separable convolutions for mobile-first architectures.
  napkin_math: 'The candidate should be able to perform ''napkin math'' estimations. For example:

    1.  **Target FLOPs:** Given a target latency (e.g., 50ms) and TPU TOPS (7.5e12 ops/s), estimate the
    maximum permissible FLOPs for the model (7.5e12 ops/s * 0.05s = 3.75e11 FLOPs or 375 GFLOPs, assuming
    100% utilization which is optimistic).

    2.  **Model Size:** Estimate the memory footprint of the chosen model architecture (e.g., MobileNetV3
    small ~2.5M parameters, at INT8 this is ~2.5MB), comparing it against the 12GB LPDDR5X RAM and noting
    the benefits for cache efficiency.

    3.  **Efficiency Gains:** Roughly quantify the reduction in FLOPs/parameters from standard convolutions
    to depthwise separable convolutions.

    4.  **Batch Size vs. Latency:** Discuss how batch size affects latency and throughput on the TPU.'
