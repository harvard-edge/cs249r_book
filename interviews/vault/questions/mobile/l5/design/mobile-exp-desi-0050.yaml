id: mobile-exp-desi-0050
title: On-Device Active Learning Data Curation for Gemini Nano
topic: dataset-curation
status: published
provenance: imported
scenario: Your team is building a personalized predictive text system using Gemini Nano running locally
  on the Google Tensor G3. To continuously improve the model without compromising user privacy, you must
  design an on-device data curation pipeline that selects the most informative user interactions for nightly
  local fine-tuning. The system must operate within the constraints of the 12 GB LPDDR5X memory and utilize
  the on-device TPU efficiently. How would you architect the data selection criteria and annotation workflow
  to filter high-value samples while minimizing battery impact?
details:
  realistic_solution: A robust design uses a two-stage curation pipeline. First, apply a lightweight,
    low-power heuristic filter (e.g., regex, word frequency) in real-time to buffer a small pool of candidate
    sentences. Second, schedule an asynchronous task during device idle/charging times to run Gemini Nano
    on the TPU, computing prediction entropy for the candidate pool to select the top-K most uncertain
    samples. This curates a high-quality dataset into a bounded ring buffer for nightly training.
  common_mistake: Candidates often propose running continuous complex uncertainty sampling during active
    user typing, which drains the battery and interrupts the UX. Another mistake is ignoring the memory
    constraints and buffering too much raw data before filtering, leading to memory pressure on the 12
    GB RAM.
  napkin_math: If we target a daily curation budget of 500 sequences (avg 40 tokens) for local training,
    evaluating entropy requires a forward pass for 20,000 tokens. Assuming the Tensor G3 TPU (7.5 TOPS)
    processes Gemini Nano at roughly 30 tokens/second, evaluating the candidate pool takes ~666 seconds
    (11 minutes). Running this exclusively during the nightly charging cycle ensures 0% impact on active
    battery life, and buffering 500 text sequences requires less than 1 MB, comfortably fitting within
    the 12 GB LPDDR5X system budget.
