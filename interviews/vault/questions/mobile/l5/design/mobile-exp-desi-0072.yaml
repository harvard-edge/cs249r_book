schema_version: 1
id: mobile-exp-desi-0072
title: Real-Time Sensor Fusion Architecture on Snapdragon 8 Gen 3
topic: streaming-ingestion
status: published
provenance: imported
scenario: You are designing an always-on, real-time context awareness pipeline that ingests continuous
  audio (16kHz) and high-frequency IMU data (500Hz) on a mobile device powered by the Qualcomm Hexagon
  NPU (Snapdragon 8 Gen 3). The system must extract features and run a lightweight streaming inference
  model without waking the main CPU core to preserve battery. Architect the data ingestion pipeline, feature
  computation, and model placement across the heterogeneous CPU+GPU+NPU compute blocks, utilizing the
  shared 12-16 GB LPDDR5X memory architecture efficiently.
details:
  realistic_solution: A robust design leverages the always-on Sensor Hub (or lower-power DSP islands)
    for initial buffering and basic DSP operations (like FFT for audio). The pre-processed features are
    written directly to a ring buffer in the shared LPDDR5X memory. The Hexagon NPU is then triggered
    via hardware interrupts to run the INT8 quantized model (easily fitting within its 45 TOPS budget),
    completely bypassing the main CPU and GPU for continuous operation.
  common_mistake: Candidates often propose waking the main application CPU for feature extraction or routing
    raw sensor data through standard Android frameworks, which destroys power efficiency. Another mistake
    is failing to utilize the shared LPDDR5X memory efficiently, causing unnecessary data copies between
    the Sensor Hub and the Hexagon NPU.
  napkin_math: 'Audio data rate: 16,000 samples/sec * 16 bits = 32 KB/s. IMU data rate: 500 samples/sec
    * 6 axes * 16 bits = 6 KB/s. Total continuous ingestion bandwidth is ~38 KB/s. The shared LPDDR5X
    memory provides >60 GB/s bandwidth, meaning sensor ingestion uses <0.0001% of available bandwidth.
    For a 5M parameter INT8 model running at 10 inferences/sec, compute requirement is ~0.1 TOPS, well
    within the Hexagon NPU''s 45 TOPS capability, allowing it to remain in a deeply power-gated state
    most of the time.'
