schema_version: 1
id: mobile-exp-desi-0060
title: Architecting Memory Management for On-Device LLMs
topic: memory-pressure-management
status: published
provenance: imported
scenario: You are designing an on-device GenAI feature targeting the Qualcomm Hexagon NPU on the Snapdragon
  8 Gen 3. The platform features 45 TOPS INT8 performance and a heterogeneous CPU+GPU+NPU architecture
  with a shared 12-16 GB LPDDR5X memory pool. However, the OS actively manages memory pressure, and your
  application will be evicted if it consumes too much of the shared RAM or causes system-wide memory fragmentation
  during generation. Architect a memory management strategy to handle the KV cache, model weights, and
  intermediate activations without triggering OS-level OOM eviction.
details:
  realistic_solution: A robust design involves implementing a paged KV cache system to eliminate memory
    fragmentation and allow dynamic allocation. Model weights should be quantized and memory-mapped (mmap)
    to allow the OS to page them out under extreme pressure, while memory pressure listeners dynamically
    shrink the context window or halt generation before eviction occurs.
  common_mistake: Candidates often assume exclusive access to the full 12-16 GB of RAM and design static
    allocations that ignore OS-level memory pressure. They might propose keeping the entire KV cache in
    contiguous memory, failing to account for memory fragmentation which leads to sudden OOM kills.
  napkin_math: On a Snapdragon 8 Gen 3 with 12 GB shared LPDDR5X, the OS reserves ~6 GB, leaving a 6 GB
    budget. Assume a 7B parameter model quantized to INT4 takes 3.5 GB for weights. Total Budget (6 GB)
    - Weights (3.5 GB) - NPU INT8 Activations (0.5 GB) = 2.0 GB remaining for the KV cache. At 128 KB
    per token, the maximum context size is 2.0 GB / 128 KB = 16,384 tokens. Paging this cache into 2,048
    pages of 1 MB each prevents fragmentation OOMs.
