schema_version: 1
id: mobile-exp2-desi-0304
title: Architecting On-Device LLM Defenses on Apple A17 Pro
topic: adversarial-robustness
status: published
provenance: imported
scenario: You are designing an on-device email summarization system using a local 3B parameter LLM on
  the Apple A17 Pro. Attackers are embedding adversarial prompt injections into emails to exfiltrate user
  data or manipulate summaries. Given the A17 Pro's 16-core Neural Engine (35 TOPS), ~5W power envelope,
  and shared 8 GB unified memory (where the OS and background apps consume 2.5 GB), architect an on-device
  defense pipeline. Evaluate the architectural tradeoffs between routing inputs through a dedicated 100M-parameter
  standalone guardrail model versus modifying the main 3B LLM's architecture to include a specialized
  classification head.
details:
  realistic_solution: 'A robust architecture uses a cascaded approach: a lightweight, deterministic heuristic
    filter on the CPU, followed by a small 100M-parameter quantized guardrail model on the Neural Engine.
    This preserves the 8 GB unified memory (leaving room for the 3B summarization model) and avoids waking
    up the main LLM for blatantly malicious inputs. The 16-core Neural Engine easily absorbs the guardrail''s
    compute with minimal impact on the 5W power budget, cleanly isolating the security boundary from the
    complex generative task.'
  common_mistake: Candidates often propose cloud-based verification or large ensemble defenses without
    considering the A17 Pro's shared unified memory constraints. They frequently overlook how running
    two models concurrently impacts the ~5W power budget, memory bandwidth limits, and thermal throttling
    on a mobile device.
  napkin_math: 'Available Memory = 8 GB (Total) - 2.5 GB (OS) = 5.5 GB. Main 3B LLM (4-bit) = 1.5 GB.
    Guardrail 100M (8-bit) = 100 MB. Both easily fit in the 5.5 GB budget. Guardrail Compute: 100M params
    * 2 ops/param * 512 tokens = ~100 GigaOps. Given the 16-core Neural Engine''s 35 TOPS (35,000 GigaOps/sec),
    the ideal compute time is 100 / 35,000 = ~2.8 ms, consuming a negligible fraction of the ~5W thermal
    budget while saving massive compute by preventing the 3B model from evaluating malicious prompts.'
