schema_version: 1
id: mobile-exp-desi-0069
title: Architecting a Pruning Strategy for Hexagon NPU
topic: pruning-sparsity
status: published
provenance: imported
scenario: You are tasked with designing a sparsification and deployment pipeline for a 2 billion parameter
  language model running locally on a smartphone powered by the Qualcomm Hexagon NPU (Snapdragon 8 Gen
  3). The NPU delivers 45 TOPS of INT8 compute and shares a 12-16 GB LPDDR5X memory pool with the CPU
  and GPU. The product team requires a 2x inference speedup over a dense INT8 baseline without exceeding
  a 2% drop in accuracy. Architect the end-to-end pruning strategy, detailing your choice of sparsity
  patterns and how you would align them with the Hexagon architecture to guarantee the speedup.
details:
  realistic_solution: A strong L5 design mandates hardware-aware structured or N:M semi-structured (e.g.,
    2:4) pruning that natively aligns with Hexagon's tensor block architecture. The pipeline should co-optimize
    sparsity and quantization by first establishing the sparsity mask using magnitude or gradient methods,
    followed by Sparse-Quantization-Aware Training (QAT) to recover accuracy. The system must compress
    the sparse weights in the shared LPDDR5X memory to reduce memory bandwidth pressure, as memory fetch
    time typically dominates over raw compute on modern mobile NPUs.
  common_mistake: Candidates often propose unstructured pruning, incorrectly assuming theoretical FLOP
    reductions will translate to latency gains on the NPU's tensor accelerators. They also frequently
    decouple pruning from quantization, leading to catastrophic accuracy degradation when both are applied
    naively.
  napkin_math: A 2B parameter model stored in dense INT8 requires 2 GB of memory. To achieve a target
    generation rate of 20 tokens/sec, the system must stream weights at 40 GB/sec (2 GB * 20), which heavily
    taxes the shared LPDDR5X bandwidth. Compute-wise, 2B parameters require ~4 GFLOPs (or GOPs) per token,
    meaning 20 tokens/sec needs only 0.08 TOPS—well within the NPU's 45 TOPS INT8 limit. The bottleneck
    is strictly memory bandwidth. By applying 50% structured or 2:4 sparsity and physically compressing
    the weights to 1 GB, the memory bandwidth requirement halves to 20 GB/sec, resolving the bottleneck
    and achieving the required 2x speedup.
