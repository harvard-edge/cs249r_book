schema_version: 1
id: mobile-exp2-desi-0334
title: Architecting an AR Segmentation Pipeline on Snapdragon 8 Gen 3
topic: roofline-analysis
status: published
provenance: imported
scenario: You are designing a real-time on-device 4K super-resolution pipeline targeting the Qualcomm
  Hexagon NPU (Snapdragon 8 Gen 3). The NPU delivers 45 TOPS of INT8 compute, and the SoC features a heterogeneous
  CPU+GPU+NPU architecture with a shared 16 GB LPDDR5X memory pool. Using roofline analysis principles,
  how would you architect the model's dataflow and operator fusion strategy to ensure the workload remains
  compute-bound rather than bottlenecking on the shared memory subsystem?
details:
  realistic_solution: A successful L5 candidate will architect a tiled dataflow that strictly confines
    intermediate activations to the NPU's tightly coupled memory (SRAM), fusing layers to maximize operational
    intensity. They will evaluate the tradeoff between compute-heavy operations and memory traffic, designing
    the pipeline to achieve an arithmetic intensity higher than the system's ridge point, thereby fully
    saturating the 45 TOPS compute capacity without starving the concurrent GPU workloads.
  common_mistake: Candidates often assume the NPU can achieve its peak 45 TOPS continuously without considering
    the required arithmetic intensity. They typically fail to account for the shared nature of the 16
    GB LPDDR5X memory, designing architectures with large intermediate activation footprints that get
    evicted to DRAM, pushing the workload into the memory-bound region of the roofline.
  napkin_math: For a Snapdragon 8 Gen 3 NPU peaking at 45 TOPS (INT8) with an assumed 68.2 GB/s total
    LPDDR5X bandwidth (where only ~15 GB/s is practically available to the NPU due to GPU/ISP contention),
    the ridge point arithmetic intensity is 45e12 / 15e9 = 3000 Operations/Byte. To process frames at
    30 FPS requiring 1 TOPS per frame (30 TOPS total), the model's memory traffic must be strictly kept
    under 30e12 / 3000 = 10 GB/s (or ~333 MB per frame). Any architectural design requiring more memory
    movement will hit the memory wall and fail to achieve target latency.
