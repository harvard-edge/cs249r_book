id: mobile-exp-desi-0062
title: Architecting On-Device CI/CD for Exynos 2400 NPU
topic: mlops-lifecycle
status: published
provenance: imported
scenario: Your team is building a real-time computational photography pipeline that runs continuously
  on the Samsung Exynos 2400 NPU. Researchers are rapidly producing new model iterations, but frequent
  deployment regressions occur because offline validation in PyTorch does not match the quantized INT8
  on-device performance. Architect an MLOps CI/CD pipeline that bridges this training-serving gap, evaluates
  model latency and accuracy on real hardware leveraging the 34.7 TOPS dual-core NPU, and ensures models
  respect the shared 12 GB LPDDR5X memory budget alongside the ISP and CPU.
details:
  realistic_solution: The optimal architecture introduces a Hardware-in-the-Loop (HITL) CI runner pool
    consisting of physical Exynos 2400 devices. The MLOps pipeline automatically compiles the model using
    the vendor SDK, quantizes it, and deploys it to the device farm. Automated tests validate latency,
    throughput, and accuracy metrics to ensure training-serving consistency. The system also runs memory
    profiling to guarantee the model's footprint and I/O buffers do not exceed the NPU's available slice
    of the shared 12 GB LPDDR5X RAM when the ISP is streaming.
  common_mistake: Candidates often design cloud-native CI/CD pipelines relying solely on software emulators
    or standard ONNX runtime approximations in x86 runners. They fail to account for the need for Hardware-in-the-Loop
    (HITL) device farms to capture exact NPU compiler behavior, quantization drops, and system-wide memory
    contention inherent in a shared memory architecture.
  napkin_math: 'The Exynos 2400 NPU provides 34.7 TOPS. Targeting a 30 FPS real-time pipeline, the theoretical
    compute limit is 34.7 TOPS / 30 = 1.15 Tera-Operations per frame. Assuming a realistic NPU utilization
    of 30%, the CI pipeline must reject models exceeding ~345 GOPS/frame. For the shared 12 GB LPDDR5X
    memory: if the OS, GPU, and ISP reserve 9 GB during peak camera usage, the CI must enforce a hard
    <3 GB limit for the ML application. A 1080p frame (1920x1080x3 bytes = 6.2MB) with double buffering
    consumes ~12.4MB, leaving ample capacity for INT8 weights and activations within the 3 GB constraint,
    meaning the CI should prioritize gating on compute (GOPS) and memory bandwidth rather than static
    memory capacity.'
