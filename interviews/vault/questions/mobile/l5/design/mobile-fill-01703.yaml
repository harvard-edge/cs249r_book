id: mobile-fill-01703
title: Designing a Fair AI System on Edge with Samsung Exynos 2400 NPU
topic: fairness-evaluation
status: published
provenance: imported
scenario: Imagine you are tasked with designing an on-device machine learning system for a mobile application
  running on a Samsung device equipped with the Exynos 2400 NPU (34.7 TOPS, 12 GB LPDDR5X). This application
  performs real-time image analysis for content moderation, identifying potentially harmful or inappropriate
  images uploaded by users. The primary goal is to ensure fairness in its moderation decisions, specifically
  addressing demographic parity and equalized odds across various user subgroups (e.g., age, gender, ethnicity)
  without transmitting raw user data off-device. How would you design the architecture and evaluation
  methodology to achieve this, considering the computational and memory constraints of the NPU?
details:
  realistic_solution: Design an architecture where fairness evaluation metrics are computed on-device
    using anonymized, aggregated representations of subgroup data. Implement lightweight, privacy-preserving
    techniques (e.g., federated analytics for statistics, differential privacy on local aggregated metrics)
    to allow for insights into subgroup performance without compromising individual user data. Utilize
    the Exynos 2400 NPU's capabilities for efficient, parallel computation of model inferences and local
    fairness metric calculations. The system would periodically report aggregated fairness statistics,
    not raw data, to a central dashboard for monitoring. Develop a strategy to dynamically adjust model
    thresholds or apply post-processing techniques on the NPU to mitigate identified biases, prioritizing
    those that satisfy equalized odds for critical outcomes while maintaining overall performance.
  common_mistake: Overlooking the practical challenges of on-device fairness evaluation due to data privacy
    constraints (inability to send raw data to cloud for evaluation) and limited computational resources.
    Another common mistake is applying generic fairness metrics without considering the specific impact
    on different subgroups or the trade-offs between various fairness definitions (e.g., demographic parity
    vs. equalized odds).
  napkin_math: 'Consider the throughput for real-time image analysis: if a model requires, say, 10 TOPS
    per inference, the Exynos 2400 NPU (34.7 TOPS) can theoretically handle approximately 3-4 inferences
    per second concurrently. If fairness evaluation involves running the model on multiple perturbed inputs
    per image or on specific subgroup-representative data, this throughput needs to be factored in. For
    example, evaluating equalized odds might require computing true positive rates (TPR) and false positive
    rates (FPR) for multiple subgroups. If each subgroup requires processing 100 images for evaluation,
    and there are 10 subgroups, that''s 1000 inferences. At 3 inferences/sec, it would take ~333 seconds
    (5.5 minutes) just for the evaluation pass, indicating that on-device evaluation needs to be highly
    optimized and potentially run asynchronously or less frequently.'
