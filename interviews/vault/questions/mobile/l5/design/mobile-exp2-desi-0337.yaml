schema_version: 1
id: mobile-exp2-desi-0337
title: Architecting a Thermal-Aware Real-Time Video Processing Pipeline
topic: thermal-management
status: published
provenance: imported
scenario: You are designing a continuous 4K video background blur feature for a video conferencing app
  running on the Apple A17 Pro. The 16-core Neural Engine provides 35 TOPS at ~5W peak, sharing 8 GB of
  unified memory with the CPU and GPU. After 5 minutes of continuous execution, the SoC begins to thermally
  throttle, dropping the NPU clock speed and causing frames to drop below the required 30 FPS target.
  Propose a system-level design to maintain acceptable real-time performance indefinitely under sustained
  thermal constraints without severely degrading the user experience.
details:
  realistic_solution: 'A robust L5 design involves a multi-tier approach: initially running a high-fidelity
    model on the 16-core Neural Engine, while monitoring SoC thermal states via iOS thermal state APIs.
    When a ''Serious'' or ''Critical'' thermal state is approached, the system should dynamically hot-swap
    to a lighter, heavily quantized model, or reduce the inference frequency (e.g., inferring every other
    frame and using lightweight optical flow or temporal tracking for intermediate frames) to reduce the
    NPU active duty cycle, keeping average power below the sustained thermal envelope.'
  common_mistake: Candidates often propose simplistic solutions like moving the workload entirely to the
    CPU or GPU, ignoring that those processors share the same thermal envelope and 8 GB unified memory.
    They also frequently miss the opportunity to duty-cycle the NPU or implement dynamic model switching
    based on OS-level thermal state notifications.
  napkin_math: Assuming the A17 Pro Neural Engine uses ~5W for its peak 35 TOPS. If the device's sustained
    thermal dissipation limits the NPU budget to 2W, the maximum duty cycle must be reduced to 40% (2W
    / 5W). At 30 FPS, each frame window is 33.3ms. The NPU can only be active for ~13.3ms per frame (33.3ms
    * 0.40). If the original high-fidelity model takes 20ms/frame to execute, it will inevitably cause
    thermal throttling. The architected solution must ensure the active inference time per frame falls
    under the 13.3ms threshold.
