id: mobile-exp-desi-0067
title: Cross-Core Operator Scheduling for A17 Pro
topic: operator-scheduling
status: published
provenance: imported
scenario: You are designing an operator scheduling engine for a real-time video segmentation model deployed
  on the Apple A17 Pro Neural Engine. The A17 Pro features a 16-core Neural Engine delivering 35 TOPS
  at ~5W, sharing 8 GB of unified memory with the CPU and GPU. The model has highly parallelizable self-attention
  and convolution branches. Your task is to architect an operator execution schedule that maximizes ANE
  utilization without thrashing the unified memory bandwidth, while ensuring strict thermal compliance
  under continuous video processing.
details:
  realistic_solution: A robust design involves fusing memory-bound operators (like element-wise operations)
    with compute-bound convolutions to maximize data locality within the ANE's local SRAM. The scheduling
    engine should interleave high-compute attention blocks with lower-intensity layers to maintain a steady
    thermal profile. Furthermore, the schedule must explicitly manage DMA transfers to the 8 GB unified
    memory, ensuring ANE execution overlaps with background CPU/GPU tasks without causing bus contention.
  common_mistake: Candidates often design greedy schedules that maximize parallel operator execution across
    all 16 ANE cores without accounting for the shared unified memory bottleneck. They may also ignore
    thermal throttling, assuming the chip can sustain 35 TOPS continuously at 5W without dynamic frequency
    scaling or heat buildup over time.
  napkin_math: Assume the model requires 175 GOPS per frame at 30 FPS, totaling 5.25 TOPS. The A17 Pro
    ANE provides 35 TOPS peak, meaning the model requires at least 15% continuous ANE utilization (5.25
    / 35). At ~5W TDP for the SoC, sustained 15% ANE utilization might consume ~0.75W. If the model's
    working set per frame is 50 MB, running at 30 FPS demands 1.5 GB/s of bandwidth from the 8 GB shared
    unified memory. The schedule must fuse operators to reduce this 1.5 GB/s footprint, preventing contention
    with the GPU's rendering pipeline.
