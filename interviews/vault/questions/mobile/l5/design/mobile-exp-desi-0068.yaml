id: mobile-exp-desi-0068
title: Architecting Heterogeneous Profiling for NPU Latency
topic: profiling-bottleneck-analysis
status: published
provenance: imported
scenario: You are designing the execution and profiling architecture for a real-time AR pipeline running
  on the Snapdragon 8 Gen 3. The ML workload targets the Qualcomm Hexagon NPU (45 TOPS INT8), while graphics
  render on the GPU, with both sharing the 12-16 GB LPDDR5X memory pool. You must design a system to trace
  and isolate the root cause of intermittent latency spikes, determining whether they stem from NPU compute
  limits, CPU-NPU synchronization overhead, or memory bandwidth contention.
details:
  realistic_solution: Design a telemetry system that uses hardware-specific tracing tools (like Snapdragon
    Profiler) to capture NPU hardware performance counters alongside GPU and CPU traces. The architecture
    should correlate asynchronous NPU queue execution times with memory bus utilization metrics to differentiate
    compute-bound operations from bandwidth-starved NPU stalls.
  common_mistake: Candidates often propose running standard CPU/GPU profilers or inserting simple CPU
    timestamps, failing to account for the asynchronous nature of the Hexagon NPU DSP queues and the hidden
    latency of memory contention across the heterogeneous system.
  napkin_math: For a 30 FPS pipeline, the latency budget is 33.3ms per frame. A 1.5 Tera-operation model
    requires exactly 33.3ms of theoretical compute on the 45 TOPS INT8 NPU (1.5 / 45 = 0.0333s). If the
    model processes 250MB of activations and weights per frame, it demands 7.5 GB/s of memory bandwidth
    (250MB * 30 FPS). If the GPU saturates the shared 12-16 GB LPDDR5X bus, the NPU will stall, and actual
    latency will significantly exceed the 33.3ms compute bound.
