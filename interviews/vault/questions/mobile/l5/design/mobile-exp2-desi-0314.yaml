schema_version: 1
id: mobile-exp2-desi-0314
title: Architecting an Energy-Efficient Real-time Translation Pipeline
topic: energy-per-operation
status: published
provenance: imported
scenario: You are designing the architecture for an on-device, real-time audio translation application
  targeting devices equipped with the Samsung Exynos 2400 NPU. The pipeline requires continuous audio
  transcription (ASR) followed by machine translation (MT). The system has access to a shared 12 GB LPDDR5X
  memory pool and the dual-core NPU capable of 34.7 TOPS. You need to architect the model execution strategy
  and memory management approach to minimize the overall energy consumption per translation operation,
  balancing compute energy against the high cost of off-chip memory access.
details:
  realistic_solution: A robust design minimizes memory movement by aggressively fusing operations and
    keeping intermediate states within the NPU's SRAM. The architecture should process the audio in continuous
    chunks, pipelining the ASR and MT models to stream activations directly between them without writing
    back to the shared 12 GB LPDDR5X. Furthermore, selecting operators that map efficiently to the dual-core
    NPU architecture, potentially assigning ASR to one core and MT to the other with dedicated SRAM partitioning,
    will optimize both latency and energy.
  common_mistake: Candidates often focus solely on reducing the number of MAC operations (compute) by
    heavily quantizing or pruning the models, ignoring the fact that off-chip memory access (LPDDR5X)
    consumes orders of magnitude more energy than ALU operations. They might design a pipeline that constantly
    swaps intermediate representations between the NPU and main memory.
  napkin_math: Assuming an INT8 MAC operation costs ~0.2 pJ, while a 32-bit DRAM read from the shared
    LPDDR5X costs ~100 pJ (500x more). For a 10M parameter layer, computing the MACs costs (10M * 0.2
    pJ) = 2 uJ. Reading the weights from DRAM costs (10M * 100 pJ / 4 bytes per access for 8-bit) = ~250
    uJ. Therefore, caching weights in SRAM or fusing layers to avoid intermediate activation DRAM roundtrips
    dominates the energy savings profile on the 34.7 TOPS NPU.
