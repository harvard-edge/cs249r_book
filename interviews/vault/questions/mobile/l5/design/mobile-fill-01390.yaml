id: mobile-fill-01390
title: Mitigating Adversarial Attacks on On-Device ML for Google Tensor G3
topic: adversarial-robustness
status: published
provenance: imported
scenario: A new privacy-preserving on-device ML application is being developed for the Google Pixel ecosystem,
  leveraging the Google Tensor G3 chip's capabilities, specifically its 7.5 TOPS (Tera Operations Per
  Second) on-device TPU and 12 GB LPDDR5X RAM. This application performs real-time classification of sensitive
  user data (e.g., health metrics, facial expressions for accessibility features). Given the sensitive
  nature of the data and the on-device execution, the system is highly susceptible to adversarial attacks,
  including data poisoning, model inversion, and side-channel attacks through power consumption analysis.
  Design a robust system architecture that can detect and mitigate these threats, ensuring the reliability
  and integrity of the ML model and user data on the Tensor G3 platform.
details:
  realistic_solution: A realistic solution involves a multi-layered defense strategy. Firstly, implement
    robust data sanitization and integrity checks at the input pipeline, potentially leveraging federated
    learning for model updates to minimize data poisoning risks. Secondly, employ a combination of adversarial
    training (with specialized on-device friendly techniques like PGD or FGSM for a subset of critical
    features) and defensive distillation during model deployment. Crucially, integrate the Tensor G3's
    dedicated security core (Titan M2) for secure execution environments (TEE) for sensitive model parts
    and cryptographic attestation of model integrity. For runtime protection, design a lightweight anomaly
    detection module running on the general-purpose CPU cores to monitor TPU inference patterns, power
    consumption, and memory access against baseline profiles to detect potential side-channel attacks
    or active model manipulation. This module could trigger alerts or model rollback if anomalies exceed
    predefined thresholds. Furthermore, implement obfuscation techniques and secure model serialization
    formats to prevent model extraction.
  common_mistake: A common mistake is solely relying on standard adversarial training techniques without
    considering the unique constraints and attack surface of an on-device, resource-limited platform like
    the Tensor G3. Developers might overlook hardware-specific defenses (e.g., the Titan M2 security co-processor)
    or neglect continuous runtime monitoring for anomalous ML inference patterns or power signatures,
    assuming that once a model is deployed, it's inherently secure from further manipulation.
  napkin_math: If the on-device TPU processes data at 7.5 TOPS and a single adversarial attack detection
    inference requires 1 GFLOP, what percentage of the TPU's capacity is consumed if detection runs continuously
    at 100 Hz? If the data stream for sensitive features is 10 MB/s, and a cryptographic hash function
    (e.g., SHA-256) takes 500 CPU cycles per block (64 bytes), estimate the CPU overhead for real-time
    input integrity checks on the main application processor. Consider the latency impact on a 10ms real-time
    processing budget if these checks add 2ms.
