id: mobile-fill-00773
title: Hardware-Aware NAS for Real-time Mobile AR
topic: neural-architecture-search
status: published
provenance: imported
scenario: You are tasked with deploying a real-time semantic segmentation model for an augmented reality
  (AR) application on a flagship mobile device. The target hardware is equipped with a Snapdragon 8 Gen
  3 Hexagon NPU, which boasts 45 TOPS (Tera-Operations Per Second) for INT8 operations and is coupled
  with 12-16 GB of LPDDR5X memory. The application requires the segmentation model to run consistently
  at 30 frames per second (FPS) while minimizing power consumption to extend battery life. Given these
  stringent hardware and performance constraints, you've decided that traditional model optimization isn't
  sufficient and propose using hardware-aware Neural Architecture Search (NAS). Outline your comprehensive
  approach to designing the search space, defining the hardware-aware objective function, and the overall
  search strategy to discover an optimal model architecture that specifically leverages the capabilities
  and mitigates the limitations of the Snapdragon 8 Gen 3 Hexagon NPU.
details:
  realistic_solution: 'The solution involves a multi-pronged approach: 1. **Search Space Design:** Create
    a constrained search space focusing on operations efficient on the Hexagon NPU (e.g., depthwise separable
    convolutions, various quantization schemes like INT8, optimized pooling layers). Include specialized
    NPU primitives if available. 2. **Hardware Cost Model:** Develop an accurate, lightweight predictor
    for latency, memory footprint, and energy consumption based on micro-benchmarking key operations on
    the Snapdragon NPU, or using a cycle-accurate simulator. This model should account for data movement
    between LPDDR5X and NPU registers/cache. 3. **Objective Function:** Define a multi-objective function
    that balances model accuracy with the predicted latency, memory usage, and energy consumption on the
    NPU. This could involve weighted sums or Pareto front optimization. 4. **Search Strategy:** Employ
    an efficient search algorithm, such as differentiable NAS (DARTS, ProxylessNAS) or evolutionary algorithms,
    guided by the hardware cost model. Integrate quantization-aware training directly into the NAS loop
    to ensure discovered models are robust to INT8 quantization. Leverage techniques like MCUNet''s tiny-scale
    NAS principles to efficiently explore the search space and produce highly optimized small models.'
  common_mistake: A common mistake is to rely solely on FLOPs as a proxy for latency or energy efficiency,
    without accounting for memory access patterns, NPU-specific instruction sets, or quantization impact.
    Candidates might also propose a search space too broad or too narrow, failing to explore NPU-friendly
    operations or becoming computationally infeasible. Another pitfall is neglecting the LPDDR5X memory
    bandwidth and latency characteristics, assuming all memory operations are equally cheap.
  napkin_math: 1. **Max NPU Ops per Frame:** Given 45 TOPS (INT8) and 30 FPS, the NPU can theoretically
    execute 45 * 10^12 INT8 ops / 30 frames = 1.5 * 10^12 INT8 ops per frame. Any chosen model architecture's
    total operations per inference must stay well below this, factoring in real-world efficiency losses
    and non-NPU computations. 2. **Memory Bandwidth Consideration:** LPDDR5X typically offers high bandwidth
    (e.g., 50-70 GB/s). For a model with a 10MB activation footprint, if it needs to be read and written
    multiple times per inference, consider the total data movement (e.g., 10MB read + 10MB write * N layers)
    to ensure it doesn't saturate the memory bus, which would lead to significant latency penalties. 3.
    **Model Size vs. LPDDR5X:** A 16 GB LPDDR5X provides ample space for most mobile models. However,
    the model's intermediate activations must fit within the NPU's on-chip memory or be efficiently streamed
    from LPDDR5X. Estimate peak memory usage for activations to avoid excessive off-chip memory access.
