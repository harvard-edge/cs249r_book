schema_version: 1
id: mobile-exp2-desi-0328
title: On-Device Telemetry Design for Exynos 2400 Shared Memory
topic: monitoring-observability
status: published
provenance: imported
scenario: You are deploying a real-time video super-resolution model on the Samsung Exynos 2400 NPU. The
  device features a dual-core NPU delivering 34.7 TOPS, but crucially shares its 12 GB LPDDR5X memory
  with the CPU, GPU, and ISP. Design an on-device monitoring system to detect 'straggler' inferences caused
  by memory bandwidth contention when the ISP is under heavy load, ensuring the telemetry system itself
  does not exacerbate the bottleneck.
details:
  realistic_solution: Design an event-driven telemetry architecture that uses lightweight, on-device aggregations,
    such as bucketing latencies into localized histograms or calculating exponential moving averages.
    The system should only flush metrics to persistent storage or the backend when significant deviations
    are detected (e.g., consecutive frame drops), minimizing interference with the NPU's 34.7 TOPS compute
    pipeline and preserving shared memory bandwidth.
  common_mistake: Candidates often propose high-frequency polling from the CPU or logging full execution
    traces per frame. This approach generates excessive memory traffic, directly competing with the NPU
    and ISP for the shared LPDDR5X bus, and drains the battery through constant CPU wake-locks.
  napkin_math: If raw telemetry logs 5 layer-level timestamps (4 bytes each) per frame at 60 FPS, the
    data rate is 20 bytes * 60 = 1.2 KB/s, or ~4.3 MB/hour. While negligible against the 12 GB LPDDR5X
    capacity, constantly writing this to shared memory pollutes the CPU cache. By bucketing into 10 latency
    percentiles (40 bytes total) and emitting once per minute, the write bandwidth drops to 40 bytes /
    60s = 0.66 bytes/s, eliminating contention.
