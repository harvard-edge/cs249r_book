id: mobile-exp2-desi-0306
title: Architecting an Efficient CNN for Exynos 2400 NPU
topic: cnn-efficient-design
status: published
provenance: imported
scenario: You are tasked with designing a real-time object detection CNN for a flagship smartphone powered
  by the Samsung Exynos 2400 NPU. The system needs to process live 1080p video streams concurrently with
  heavy ISP tasks, relying on the dual-core NPU capable of 34.7 TOPS and sharing 12 GB of LPDDR5X memory
  with the CPU, GPU, and ISP. You must architect a backbone and detection head that maximizes utilization
  of the NPU's dual cores while minimizing memory bandwidth contention with the shared system memory.
details:
  realistic_solution: A strong L5 design evaluates the tradeoff between FLOPs and memory access costs
    (MAC), favoring architectures with higher arithmetic intensity that keep intermediate activations
    within the NPU's local SRAM. To mitigate the shared LPDDR5X memory bottleneck, the architecture should
    incorporate aggressive feature map resolution reduction early in the network (e.g., using a stem layer
    with a large stride) and utilize INT8 quantization to halve the activation memory footprint compared
    to FP16.
  common_mistake: Candidates often default to standard depthwise separable convolutions (like MobileNetV2)
    without considering that modern NPUs are frequently bottlenecked by memory bound operations rather
    than compute. They also frequently ignore the shared 12 GB LPDDR5X memory pool, failing to account
    for severe bandwidth contention when the ISP is simultaneously processing 1080p frames.
  napkin_math: For real-time 30 FPS processing, the NPU has a theoretical compute budget of 34.7 TOPS
    / 30 FPS = 1.15 Tera-Operations per frame. A typical efficient CNN using 5 GOPS per frame leaves massive
    compute headroom, meaning memory bandwidth is the true constraint. A 1080p RGB input requires 1920
    * 1080 * 3 = 6.22 MB. At 30 FPS, the input alone consumes 186.6 MB/s. If the network's intermediate
    activations require an additional 100 MB of reads/writes per frame to the shared memory, it demands
    3 GB/s of LPDDR5X bandwidth just for inference, significantly impacting the ISP's concurrent operations.
