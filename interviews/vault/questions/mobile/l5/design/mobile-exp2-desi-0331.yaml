id: mobile-exp2-desi-0331
title: Architecting Latency Profiling on Snapdragon 8 Gen 3 NPU
topic: profiling-bottleneck-analysis
status: published
provenance: imported
scenario: You are designing an on-device inference profiling architecture for a real-time video processing
  model running on the Qualcomm Hexagon NPU (Snapdragon 8 Gen 3). The pipeline must continuously monitor
  latency across the heterogeneous CPU+GPU+NPU subsystems without introducing more than 2% overhead on
  the shared 16 GB LPDDR5X memory bandwidth. Architect a telemetry and profiling system that can reliably
  identify whether the bottleneck is compute-bound on the 45 TOPS NPU or memory-bound due to contention
  with the camera hardware.
details:
  realistic_solution: A robust design leverages Qualcomm Hexagon SDK trace tools and hardware performance
    counters to capture cycle counts with minimal overhead. The architecture buffers telemetry in a pre-allocated
    lightweight ring buffer and asynchronously flushes it to disk during idle frames, ensuring profiling
    doesn't steal critical bandwidth from the NPU during active inference.
  common_mistake: Candidates often propose standard OS-level profilers that fail to capture NPU-specific
    Hexagon queues, or they suggest high-frequency polling that thrashes the shared LPDDR5X memory. This
    exacerbates the very memory bottlenecks they are attempting to measure.
  napkin_math: Assuming the shared LPDDR5X memory provides roughly 64 GB/s of peak bandwidth, our 2% overhead
    budget allows 1.28 GB/s for profiling data. Capturing 64 bytes of telemetry per layer for a 100-layer
    model running at 60 FPS generates only 384 KB/s (64 bytes * 100 layers * 60 frames) of trace data.
    This demonstrates that an event-based architectural design safely operates well within the memory
    bandwidth constraints of the Snapdragon 8 Gen 3.
