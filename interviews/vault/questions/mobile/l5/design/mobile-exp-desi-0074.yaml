schema_version: 1
id: mobile-exp-desi-0074
title: LLM Memory Allocation on Snapdragon 8 Gen 3
topic: vram-budgeting
status: published
provenance: imported
scenario: Architect a memory budgeting strategy for an on-device conversational AI powered by a 7B parameter
  model running on the Qualcomm Hexagon NPU (Snapdragon 8 Gen 3). The device features a heterogeneous
  CPU+GPU+NPU architecture with a shared 16 GB LPDDR5X memory pool. Your design must balance the memory
  requirements for INT8 weights, dynamic KV-cache, and activations while ensuring the OS and background
  apps have sufficient memory to prevent system instability.
details:
  realistic_solution: The design should implement a strict memory ceiling for the NPU process, utilizing
    Android's ION or DMA-BUF frameworks for contiguous memory allocation. By quantifying the INT8 model
    footprint and allocating a dynamic ring-buffer for the KV-cache, the system can gracefully degrade
    context length instead of causing an OS-level OOM event when approaching the shared memory limit.
  common_mistake: Candidates frequently treat the NPU memory as isolated and fail to design for a unified
    memory architecture, leading to overallocation that crashes background apps. They also often overlook
    the dynamic growth of the KV-cache during extended multi-turn conversations.
  napkin_math: 'Total Unified Memory: 16 GB LPDDR5X. Required OS Reserve: 4 GB. Usable Memory Limit: 12
    GB. Model Weights: 7B params * 1 byte/param (INT8) = 7 GB. Static Activations/Overhead: 1 GB. Memory
    remaining for KV-cache: 12 GB - 7 GB - 1 GB = 4 GB. Assuming 1 MB per token for the KV-cache, the
    maximum context window supported is ~4,000 tokens.'
