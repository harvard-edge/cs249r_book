schema_version: 1
id: mobile-exp2-desi-0312
title: On-Device Drift Detection Architecture for Shared Memory Systems
topic: distribution-drift-detection
status: published
provenance: imported
scenario: You are designing an on-device data drift detection pipeline for a real-time vision model deployed
  on a Samsung Exynos 2400 NPU. The device features a dual-core NPU capable of 34.7 TOPS, but it shares
  12 GB of LPDDR5X memory with the CPU, GPU, and ISP. Architect a system that continuously monitors for
  training-serving skew and calculates statistical divergence (like PSI or KL divergence) without bottlenecking
  the shared memory bandwidth required by the active camera stream.
details:
  realistic_solution: A strong L5 design computes lightweight statistical summaries (e.g., 1D histograms
    or low-dimensional embeddings) from the primary model's intermediate layers during the standard forward
    pass. These compact statistics are stored in a small circular buffer in RAM. Periodically, during
    system idle times, one of the NPU cores aggregates these statistics to compute PSI or KL divergence
    against a shipped reference distribution, utilizing minimal compute and almost zero additional memory
    bandwidth.
  common_mistake: Candidates often propose caching raw input images over a rolling window to compute exact
    divergence metrics later, or they suggest running a secondary drift-detection model concurrently on
    the NPU. This ignores the shared memory architecture, leading to massive memory bandwidth starvation
    for the ISP and GPU, causing dropped frames and system lag.
  napkin_math: Storing 1 minute of raw 1080p 30FPS camera frames (1920 * 1080 * 3 bytes * 30 * 60) requires
    11.2 GB, which would instantly consume almost all of the 12 GB shared LPDDR5X memory. In contrast,
    extracting a 256-byte activation vector per frame requires only (256 bytes * 30 * 60) = ~460 KB per
    minute. Computing PSI on a 100-bin histogram of these embeddings takes less than 1 million operations,
    which consumes an insignificant fraction of the dual-core NPU's 34.7 TOPS and trivially fits within
    the shared memory constraints.
