schema_version: 1
id: mobile-exp-desi-0047
title: Architecting On-Device LLM Workloads for Tensor G3
topic: compute-cost-estimation
status: published
provenance: imported
scenario: Architect an on-device intelligence pipeline for a messaging app running exclusively on the
  Google Tensor G3. The application must provide real-time smart replies (foreground) and categorize thousands
  of archived messages (background) using an optimized on-device LLM like Gemini Nano. Given the Tensor
  G3's on-device TPU capable of 7.5 TOPS and a system-wide 12 GB LPDDR5X shared memory pool, evaluate
  the architectural tradeoffs and design a compute and memory management strategy that satisfies real-time
  SLAs while processing background queues without causing thermal throttling or OS-level app evictions.
details:
  realistic_solution: A robust architecture multiplexes the TPU resources by strictly prioritizing foreground
    smart replies while batching background categorization. The design should utilize OS-level scheduling
    (like Android's WorkManager) to defer the heavy categorization workload to states when the device
    is idle, charging, and thermally stable. To manage the 12 GB shared memory, the system should dynamically
    load the quantized Gemini Nano model into RAM only during active messaging sessions or scheduled background
    windows, explicitly monitoring the OS memory pressure and thermal APIs to gracefully degrade or pause
    background processing.
  common_mistake: Candidates often fail to decouple the execution strategies for foreground versus background
    tasks. They frequently propose keeping the model permanently pinned in the 12 GB LPDDR5X, which starves
    other OS processes, or they ignore the thermal and battery implications of running the 7.5 TOPS TPU
    continuously for the background categorization queue.
  napkin_math: 'Memory footprint: A 1.8B parameter Gemini Nano model quantized to 4-bit occupies ~0.9
    GB. With a ~0.5 GB KV cache, total memory is ~1.4 GB, which consumes nearly 12% of the 12 GB LPDDR5X
    pool. Compute estimation: The TPU provides 7.5 TOPS. Assuming a memory-bandwidth-bound effective utilization
    of ~1.5 TOPS for auto-regressive decoding, we estimate ~20 tokens/sec. Processing a background backlog
    of 10,000 messages (averaging 50 tokens each = 500,000 tokens) at 20 tokens/sec would require 25,000
    seconds (~7 hours) of continuous TPU execution. This definitively proves the architectural necessity
    of batching background tasks exclusively during charging/idle windows to preserve battery.'
