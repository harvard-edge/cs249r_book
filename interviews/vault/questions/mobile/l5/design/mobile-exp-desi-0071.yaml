schema_version: 1
id: mobile-exp-desi-0071
title: Architecting a Fail-Safe ADAS Monitor on Hexagon NPU
topic: safety-certification
status: published
provenance: imported
scenario: You are designing the pedestrian detection subsystem for an ASIL-B rated dashcam application
  running on the Qualcomm Hexagon NPU (Snapdragon 8 Gen 3). The application requires 5 TOPS of INT8 compute
  for the primary vision model. Architect a system-level safety mechanism utilizing watchdog timers and
  the heterogeneous CPU+GPU+NPU architecture to detect NPU hangs and memory corruption in the shared 12-16
  GB LPDDR5X pool, ensuring the system enters a safe state within a 100ms fault-tolerant time interval.
details:
  realistic_solution: The optimal design leverages the heterogeneous architecture by running the INT8
    model on the Hexagon NPU while an independent, high-priority watchdog process runs on the CPU. The
    CPU process orchestrates memory isolation in the LPDDR5X, dispatches the NPU task, and sets a strict
    hardware timer; if the NPU fails to return an inference result or a known-answer self-test fails,
    the CPU preempts the pipeline and triggers a deterministic safe-state fallback.
  common_mistake: Candidates often propose running full redundant inference on the CPU or GPU, which causes
    severe thermal throttling on a mobile SOC. They also frequently assume the NPU can monitor its own
    health, failing to utilize the heterogeneous architecture to provide an independent observer.
  napkin_math: The primary model uses 5 TOPS, which is 11.1% of the Hexagon NPU's 45 TOPS INT8 capacity.
    At 30 FPS, frame time is 33.3ms. We allocate 15ms for NPU inference, 1ms for CPU watchdog setup, and
    2ms for context switching. If the NPU hangs, the watchdog times out at 20ms. The CPU then takes 5ms
    to execute the fallback policy, totaling 25ms. This leaves a 75ms safety margin before violating the
    strict 100ms ISO 26262 fault-tolerant time interval.
