id: mobile-exp-desi-0043
title: Shadow Deployment Architecture for On-Device LLM
topic: ab-rollout-strategies
status: published
provenance: imported
scenario: You are designing a shadow deployment rollout for a next-generation on-device translation model
  on the Apple A17 Pro Neural Engine. The goal is to run the new model in the background alongside the
  active legacy model on live user traffic to validate accuracy and performance. Design the system architecture
  to handle this dual execution safely, factoring in the A17 Pro's 35 TOPS, ~5W thermal constraints, 16-core
  Neural Engine, and the shared 8 GB unified memory.
details:
  realistic_solution: The optimal design decouples the shadow execution from the critical path. The system
    should log live inputs to local storage and run the shadow model asynchronously using a lower Quality
    of Service (QoS) class only when the device is idle or charging. Given the 16-core Neural Engine,
    the OS can schedule the background task without interrupting the foreground active model. Telemetry
    and predictions from the shadow model should be batched and uploaded only during opportunistic network
    windows (e.g., connected to Wi-Fi and charging).
  common_mistake: Candidates often propose running both models concurrently for every user request without
    considering the shared memory architecture, which causes severe memory bandwidth contention and page
    faults. They also frequently fail to account for the battery drain of synchronous telemetry uploads,
    violating the ~5W power envelope of the device.
  napkin_math: 'Memory budget check: Active model (1.2 GB) + Shadow model (1.8 GB) + OS/Apps (4.0 GB)
    = 7.0 GB out of 8 GB unified memory, leaving a tight 1.0 GB buffer. Compute budget: The A17 Pro delivers
    35 TOPS at ~5W. If a translation takes 50 Giga-Operations (GOPS), the NPU theoretically handles 700
    translations/sec. Running the shadow model for 100 offline queries at 50% NPU utilization (17.5 TOPS)
    takes ~0.28 seconds of compute. At ~5W peak power, this consumes only 1.4 Joules, ensuring the shadow
    rollout has a negligible impact on battery life while gathering statistically significant validation
    data.'
