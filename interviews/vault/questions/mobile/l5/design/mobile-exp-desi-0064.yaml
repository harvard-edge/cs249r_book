id: mobile-exp-desi-0064
title: On-Device LLM Memory Architecture for Snapdragon 8 Gen 3
topic: model-size-estimation
status: published
provenance: imported
scenario: You need to architect an on-device text generation system using a 7-billion parameter language
  model for a flagship smartphone featuring the Qualcomm Hexagon NPU (Snapdragon 8 Gen 3). The device
  has 16 GB of shared LPDDR5X memory, but the OS and background apps strictly reserve 8 GB. Design the
  memory allocation, quantization strategy, and execution pipeline to safely deploy this model while maximizing
  the 45 TOPS INT8 compute available on the NPU.
details:
  realistic_solution: The optimal architecture mandates quantizing the 7B model to 4-bit weights to fit
    within the strict 8 GB available RAM budget, including the KV cache. The design must offload the heavy
    matrix multiplication workloads to the Hexagon NPU to utilize its 45 TOPS INT8 engine using dynamic
    quantization or W4A8 execution, while orchestrating the CPU to handle non-quantizable operations.
  common_mistake: Candidates frequently overlook the shared nature of the 16 GB LPDDR5X memory, assuming
    it is dedicated VRAM, leading to designs that will cause OS out-of-memory application kills. They
    also often fail to align the quantization strategy with the Hexagon NPU's specific INT8 acceleration
    capabilities.
  napkin_math: 'A standard 7B model at FP16 requires 14 GB of memory (7B * 2 bytes), which exceeds the
    8 GB available budget on the 16 GB LPDDR5X system. Quantizing weights to INT4 reduces the model size
    to ~3.5 GB (7B * 0.5 bytes). To utilize the NPU''s 45 TOPS INT8 compute, operations are mapped to
    INT8. Assuming a 1024 context length, the KV cache at FP16 adds roughly 1 GB. Total memory footprint:
    3.5 GB (weights) + 1 GB (KV cache) = 4.5 GB, safely fitting within the 8 GB available budget.'
