id: mobile-fill-01321
title: Graceful Degradation for On-Device ML with Snapdragon NPU
topic: graceful-degradation
status: published
provenance: imported
scenario: You are designing an on-device AI assistant for a flagship smartphone, leveraging the Snapdragon
  8 Gen 3 Hexagon NPU (45 TOPS INT8, 12-16 GB LPDDR5X). This assistant performs real-time, personalized
  speech recognition and natural language understanding (NLU) using a large transformer model. The primary
  goal is responsiveness and accuracy, but the system must maintain functionality under varying device
  conditions (e.g., high thermal load, low battery, concurrent demanding applications). Propose a comprehensive
  graceful degradation strategy that incorporates degradation ladders, model fallbacks, fail-safe vs fail-operational
  modes, and quality-of-service shedding to ensure a robust user experience even when the NPU cannot sustain
  peak performance.
details:
  realistic_solution: 'A robust solution involves multiple degradation stages (a ''degradation ladder'').
    This could include: 1. **QoS Shedding**: Dynamically reducing model complexity (e.g., using smaller
    quantization, fewer layers, or simpler activation functions if supported by the NPU) or input data
    rate. 2. **Model Fallbacks**: Switching to a smaller, less accurate, but faster model (e.g., a MobileNet-style
    architecture for speech intent classification) that runs with lower NPU utilization or even on a less
    powerful core (CPU/GPU) if NPU is unavailable. 3. **Fail-Operational**: In critical scenarios (e.g.,
    emergency commands), a highly optimized, bare-bones model runs in a fail-operational mode, ensuring
    minimal core functionality. 4. **Fail-Safe**: If all on-device options are exhausted, and core functionality
    cannot be guaranteed, the system enters a fail-safe state (e.g., prompting the user to free up resources,
    temporarily disabling the feature, or silently offloading to cloud with latency warnings). The system
    should monitor NPU temperature, load, and battery level to intelligently transition between these
    states.'
  common_mistake: A common mistake is to implement only a single fallback (e.g., offloading to cloud)
    or to stop ML processing entirely on resource contention, leading to a sudden and jarring loss of
    functionality. Another mistake is to not consider the varying performance profiles of different degradation
    stages and their impact on user perception and battery life.
  napkin_math: 'If the primary model requires 30 TOPS and 10 GB LPDDR5X bandwidth for a 20ms inference
    latency, and the NPU is thermal-throttled to 20 TOPS, the system would need to: 1. Reduce model complexity
    to require <= 20 TOPS. This might mean switching to a model that is 30/20 = 1.5x less compute intensive.
    2. Account for potential latency increase: If a less optimized model is used on CPU, a 20ms NPU inference
    could become 100ms on CPU, requiring asynchronous handling or visual feedback. 3. Consider memory
    pressure: If memory usage exceeds available LPDDR5X (e.g., 12GB max available for ML workloads), fallbacks
    to smaller models (e.g., 2 GB) are critical to avoid system instability.'
