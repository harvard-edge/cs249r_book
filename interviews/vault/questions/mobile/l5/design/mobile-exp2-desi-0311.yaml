id: mobile-exp2-desi-0311
title: On-device Data Curation for Active Learning
topic: dataset-curation
status: published
provenance: imported
scenario: You are designing a privacy-preserving on-device active learning pipeline for a smart reply
  feature powered by Gemini Nano. The system targets the Google Tensor G3, which features an on-device
  TPU delivering 7.5 TOPS and 12 GB of LPDDR5X RAM. You need to architect a data curation workflow that
  selects edge-case conversations, stores them locally, and uses implicit user feedback (e.g., editing
  a suggested reply) as annotations without sending raw personal data to the cloud. How do you design
  the local data selection strategy, manage dataset bias, and orchestrate the pipeline within the hardware
  constraints?
details:
  realistic_solution: A strong L5 design uses the on-device Gemini Nano model to score suggestion confidence,
    filtering low-confidence predictions into a local storage buffer. It leverages implicit user corrections
    as ground-truth labels. To manage bias, the architecture should include lightweight heuristic filters
    (e.g., regex, length checks) and stratified sampling based on metadata before storing. The system
    schedules curation and fine-tuning only when the device is idle and plugged in, ensuring the 12 GB
    memory is primarily available for user-facing applications.
  common_mistake: Candidates often propose cloud-based active learning loops that violate user privacy,
    or they design complex on-device clustering algorithms for data selection that exceed the 7.5 TOPS
    TPU budget or disrupt foreground tasks. They also frequently fail to account for the memory footprint
    of the LLM and OS when allocating space for the curation buffer.
  napkin_math: Total Memory = 12 GB. OS footprint = 4 GB. 3B parameter Gemini Nano (4-bit) + KV Cache
    = ~2.5 GB. Remaining = 5.5 GB. If we allocate 500 MB for the local dataset curation buffer, and each
    sample (text + metadata + label) is 2 KB, we can store 250,000 curated samples. At 7.5 TOPS, the TPU
    can compute confidence scores for a batch of 100 recent messages during an idle window in a fraction
    of a second without impacting UI responsiveness.
