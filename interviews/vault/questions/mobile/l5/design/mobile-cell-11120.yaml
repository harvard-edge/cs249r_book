id: mobile-cell-11120
title: 'Kernel Fusion: Design Fusion Strategy for On-Device LLM on Snapdragon 8 Gen 3'
topic: kernel-fusion
status: published
provenance: imported
scenario: 'You are designing the kernel fusion strategy for a 1B parameter LLM (4-bit quantized) inference
  on Snapdragon 8 Gen 3 (45 TOPS INT8, 16GB). The model uses GQA attention (8 KV heads, 32 Q heads), RMSNorm,
  and SwiGLU activation. Target: 20 tokens/second (50ms/token). Design the fusion graph and quantify expected
  gains.'
details:
  realistic_solution: 'Snapdragon 8 Gen 3: Hexagon DSP (45 TOPS INT8, best for quantized matmuls) + Adreno
    GPU (10 TOPS FP16, best for attention/softmax). Design fusion graph aware of this split.'
  common_mistake: Not accounting for the Hexagon DSP vs Adreno GPU split on Snapdragon — different op
    types run on different hardware units. Not all ops can be fused across the DSP/GPU boundary.
  napkin_math: '1B model at 4-bit: 500MB model. Decode batch=1, 1 token. Weight loading: 500MB per forward
    pass (load all weights once). At Hexagon bandwidth to model: shared with LPDDR5 16GB at ~68 GB/s.
    Weight read time: 500MB / 68 GB/s = 7.35ms. Per-layer: 1B / 32 layers = 31.25M params per layer. Weight
    per layer: 62.5MB. Read per layer: 62.5MB / 68 GB/s = 0.92ms. Forward pass: 32 layers × 0.92ms = 29.4ms
    weight loading + compute. Compute: 1B × 6 FLOPs × 1 token / 45 TOPS = 0.133ms — dominated by weight
    loading. Fusion: fuse RMSNorm into GEMM kernel (don''t write normalized output to LPDDR5). Saves:
    32 × (1 × 2048 × 2B) × 2 = 262KB. At 68 GB/s: 0.004ms — negligible. Key optimization: not fusion,
    but KV cache compression or reduced precision for KV. Target 20 tokens/sec = 50ms/token. Current:
    ~30ms weight loading + 5ms overhead = 35ms → 28.6 tokens/sec. May already meet target.'
