id: mobile-exp2-desi-0330
title: Heterogeneous Operator Scheduling for Neural Engine
topic: operator-scheduling
status: published
provenance: imported
scenario: You are deploying an advanced real-time video super-resolution model on the Apple A17 Pro. The
  device features a 16-core Neural Engine capable of 35 TOPS within a ~5W power envelope, sharing 8 GB
  of unified memory with the CPU and GPU. You need to design a scheduling system that dynamically partitions
  the model operators between the Neural Engine, GPU, and CPU, taking into account the shared memory constraints
  and differing compute characteristics to maximize FPS while preventing thermal throttling.
details:
  realistic_solution: A robust design implements a profile-guided, latency-aware scheduler that uses dynamic
    programming to find optimal operator partitioning. By fusing adjacent layers and keeping intermediate
    activations on the ANE SRAM, we minimize traffic to the shared unified memory. If the ANE approaches
    its thermal limit, the scheduler should offload lower-intensity operators to the GPU or high-efficiency
    CPU cores to maintain a stable frame rate within the 5W budget.
  common_mistake: Candidates often default to greedy scheduling, aggressively pinning all compatible operators
    to the Neural Engine without accounting for data transfer overhead between compute units or the shared
    8 GB unified memory bandwidth limits. They also frequently ignore thermal constraints, resulting in
    a design that peaks early and then severely throttles.
  napkin_math: Assuming a 2MB intermediate activation between two operators. ANE processing takes 1.5ms
    at 35 TOPS. If split between ANE and GPU due to naïve scheduling, moving 2MB across the shared 8 GB
    unified memory interface (assuming ~50 GB/s bandwidth) adds 2MB / 50GB/s = 0.04ms transfer latency
    per hop. At 60 FPS (16.6ms per frame budget), adding 0.04ms for 20 split layers consumes 0.8ms purely
    in memory movement, proving layer fusion and localized scheduling on the 16-core ANE are critical
    to stay within the ~5W envelope.
