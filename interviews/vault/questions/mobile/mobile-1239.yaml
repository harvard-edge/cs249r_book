title: A17 Pro NPU Distillation Pipeline Design
scenario: You are designing an off-device knowledge distillation pipeline to compress a 7B parameter teacher model into a sub-1B parameter student for real-time inference on the Apple A17 Pro Neural Engine. The target device features a 16-core NPU delivering 35 TOPS, operates under a strict ~5W power budget, and relies on an 8 GB unified memory architecture shared across the CPU, GPU, and NPU.
question: How should a 7B teacher be distilled into an A17 Pro student optimized for INT8 real-time inference?
details:
  realistic_solution: The optimal design runs entirely off-device on a GPU cluster, employing a hybrid approach that uses logit matching for global behavior alignment and targeted feature distillation only at the final bottleneck layers to transfer high-level semantic representations. Crucially, the distillation pipeline must incorporate Quantization-Aware Training (QAT) to target INT8 precision, ensuring the student model's operations map efficiently to the A17 Pro's 16-core Neural Engine and remain well within the ~5W thermal envelope.
  common_mistake: |
    **The Pitfall:** Proposing on-device distillation or continuous fine-tuning.
    **The Rationale:** Candidates try to apply general "on-device learning" paradigms without calculating memory footprints.
    **The Consequence:** A mathematically impossible design, as a 7B teacher cannot fit within the 8 GB unified memory alongside the OS.
  napkin_math: |
    *   **Available Unified Memory:** 8 GB Total - 3.5 GB (OS/Apps) = ~4.5 GB.
    *   **Teacher Memory (7B FP16):** 14 GB (Exceeds available RAM by 3x).
    *   **Student Memory (1B INT8):** 1 GB (Fits comfortably).
    *   **NPU Compute Budget:** 35 TOPS * 20% effective utilization (thermal limits) = 7,000 GOPS.
    *   **Student Throughput:** 7,000 GOPS / 2 GOPS per token = **3,500 tokens/second**, enabling true real-time execution.
