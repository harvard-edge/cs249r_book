title: 'Kernel Fusion: Implement Fused Attention for On-Device LLM on Tensor G3'
scenario: Implement Flash Attention for a 1B LLM on Tensor G3 (7.5 TOPS, 12GB). The model has 16 heads, head dim 64, and must handle sequences up to 2048 tokens.
question: How would you specify tile sizes for flash attention given available SRAM, and compute memory savings vs standard attention?
details:
  realistic_solution: 'Q,K,V activation size = seq × hidden × dtype_bytes. For seq=2048, hidden=1024, fp16: 2048 × 1024 × 2B = 4.19MB each.'
  common_mistake: |
    **The Pitfall:** Using generic tile sizes that spill to LPDDR5 or fail to maximize arithmetic intensity.
    **The Rationale:** Candidates do not verify the specific SRAM capacity of the Tensor G3, or they fail to account for the unique tiling strategy required by Grouped-Query Attention (GQA).
    **The Consequence:** The model defaults to costly off-chip DRAM accesses, destroying the performance benefits of Flash Attention.
  napkin_math: |
    1. **Attention Tensors:** Multi-head attention Q, K, V size = seq × heads × head_dim × dtype_bytes.
    2. **Calculation:** For seq=2048, heads=16, head_dim=64, FP16 (2 bytes): 2048 × 16 × 64 × 2 bytes.
    3. **Total Bytes:** 2048 × 1024 × 2 = 4,194,304 bytes.
    **Result:** Each Q, K, V tensor is exactly **~4.19 MB**, requiring tile sizes carefully tuned to fit within the Tensor G3's local SRAM block.
