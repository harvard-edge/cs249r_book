title: Architecting an Energy-Efficient Real-time Translation Pipeline
scenario: You are designing the architecture for an on-device, real-time audio translation application. You need to architect the model execution strategy and memory management approach to minimize the overall energy consumption per translation operation, balancing compute energy against the high cost of off-chip memory access.
question: How should an Exynos 2400 translation pipeline (34.7 TOPS NPU, 12 GB shared RAM) minimize energy by balancing NPU compute and LPDDR5X access?
details:
  realistic_solution: A robust design minimizes memory movement by aggressively fusing operations and keeping intermediate states within the NPU's SRAM. The architecture should process the audio in continuous chunks, pipelining the ASR and MT models to stream activations directly between them without writing back to the shared 12 GB LPDDR5X. Furthermore, selecting operators that map efficiently to the dual-core NPU architecture, potentially assigning ASR to one core and MT to the other with dedicated SRAM partitioning, will optimize both latency and energy.
  common_mistake: |
    **The Pitfall:** Focusing solely on reducing the number of MAC operations (compute) by heavily quantizing or pruning the models.
    **The Rationale:** Candidates ignore the fact that off-chip memory access (LPDDR5X) consumes orders of magnitude more energy than ALU operations.
    **The Consequence:** Designing a pipeline that constantly swaps intermediate representations between the NPU and main memory, drastically increasing energy consumption.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - INT8 MAC operation cost: ~0.2 pJ.
       - 32-bit DRAM read (LPDDR5X) cost: ~100 pJ (500x more).
       - 10M parameter layer.
    2. **Calculations:**
       - Computing MACs cost: 10M * 0.2 pJ = 2 uJ.
       - Reading weights from DRAM cost: (10M * 100 pJ / 4 bytes per access for 8-bit) = ~250 uJ.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound Energy.** Caching weights in SRAM or fusing layers to avoid intermediate activation DRAM roundtrips dominates the energy savings profile on the 34.7 TOPS NPU.
