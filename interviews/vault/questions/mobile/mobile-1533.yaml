title: Google Tensor G3 VRAM Budget Components
scenario: On the Google Tensor G3, which features 12 GB of LPDDR5X unified memory,
  you are tasked with deploying a machine learning model. Describe the primary components
  that contribute to the model's memory footprint, specifically focusing on model
  weights, optimizer states, intermediate activations, and the KV-cache. Explain how
  each of these components consumes and impacts the overall 12 GB LPDDR5X memory budget
  on this mobile platform.
question: How each of these components consumes and impacts the overall 12 GB LPDDR5X
  memory budget on this mobile platform?
details:
  realistic_solution: To manage the VRAM budget, techniques like quantization (e.g.,
    down to INT8 or INT4 for weights), activation checkpointing/recomputation, judicious
    selection of batch size, and KV-cache optimization strategies (such as attention
    sink or windowed attention) are crucial. For very large models, exploring model
    parallelism or offloading less critical components to CPU memory might be necessary,
    though less ideal for performance on device.
  common_mistake: Candidates often underestimate the memory consumption of dynamic
    components like activations (which scale with batch size and model depth) and
    KV-cache (which scales with sequence length and number of attention heads), especially
    in a unified memory architecture where the ML model competes with the operating
    system and other applications for the 12 GB LPDDR5X.
  napkin_math: 'For a model with 7 billion parameters, stored in FP16 precision (2
    bytes per parameter):

    - Weights: 7,000,000,000 parameters * 2 bytes/parameter = 14 GB.

    This immediately shows a 7B FP16 model will not fit into 12 GB without significant
    compression/quantization. Even with INT8 (1 byte/parameter), weights alone would
    be 7 GB, leaving only 5 GB for activations, KV-cache, and other overheads.'
