title: Paged KV-Cache Architecture on A17 Pro
scenario: You are designing the KV-cache memory manager for a continuous on-device 7B parameter LLM assistant running on a mobile Neural Engine. The application must support multi-turn conversations scaling up to an 8K context window. Given a strict 5W power envelope and a shared 8 GB unified memory pool alongside the OS, GPU, and CPU, you must design a memory allocation and eviction architecture.
question: How should a mobile KV-cache manager support 8K contexts without triggering OOM or latency spikes?
details:
  realistic_solution: A robust L5 design utilizes a paged KV-cache strategy that requests memory in small, non-contiguous blocks on-demand natively within the shared memory space. This avoids fragmentation and massive upfront allocation. To prevent OOM crashes, the architecture must include a semantic eviction policy (like StreamingLLM or H2O) that discards low-attention tokens, hard-capping the maximum cache size and guaranteeing enough memory is preserved for concurrent OS operations.
  common_mistake: |
    **The Pitfall:** Proposing to pre-allocate a contiguous memory block for the maximum context length.
    **The Rationale:** Engineers assume standard server-side KV-cache strategies apply directly to mobile without realizing the strict limitations of a unified memory system.
    **The Consequence:** The aggressive upfront allocation triggers immediate OS memory warnings or OOM crashes, and forces massive power spikes during memory defragmentation.
  napkin_math: |
    - **Model Footprint:** Model weights at 4-bit quantization consume ~3.5 GB.
    - **KV-Cache Size:** For a 7B parameter model (32 layers, 4096 hidden size), FP16 KV-cache size per token is 2 * 32 * 4096 * 2 bytes = 512 KB.
    - **Full Context Memory:** An 8K context requires 8192 * 512 KB = 4 GB of memory.
    - **Total Memory Constraint:** Model (3.5 GB) + Cache (4 GB) = 7.5 GB, leaving only 0.5 GB for the OS (guaranteeing an OOM crash).
    - **Result:** **The cache must be mathematically capped at ~1.5 GB (~3K active tokens) to maintain a safe 3 GB margin for OS operations.**
