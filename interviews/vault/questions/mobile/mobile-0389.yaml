title: The Federated Learning Energy Tax
scenario: Your team is building a new keyboard prediction model for your mobile app. One option is to use Federated Learning (FL) to train on user devices to improve privacy.
question: From a device energy consumption perspective, which single operation do you expect to be more expensive for the end-user's battery life?
details:
  realistic_solution: Performing one local training round is vastly more expensive in terms of energy. This cost is dominated by repeatedly reading and writing the model's weights, activations, and gradients to and from the device's main DRAM. Accessing off-chip DRAM is hundreds of times more energy-intensive per byte than on-chip computation or L1 cache access. Sending a small text sample is a brief, comparatively low-energy network event.
  common_mistake: |
    **The Pitfall:** Assuming that sending data over a cellular radio is the most power-intensive part of the equation.
    **The Rationale:** Engineers often underestimate the massive energy cost of physical data movement (memory access) compared to network transmission or pure computation.
    **The Consequence:** Incorrectly designing systems that optimize for network bandwidth at the severe expense of the user's local battery life.
  napkin_math: |
    - Network transmission: Sending a 1KB text sample is a single, low-energy event.
    - Memory access: A single local training step on a small 2MB model requires moving many megabytes of data (weights, gradients, optimizer state) to and from DRAM.
    - Energy Invariant: DRAM access is ~580x more energy-intensive than on-chip computation.
    - **The massive data movement of training drastically outweighs the energy cost of sending the raw data over the network.**
  options:
  - Sending the 1KB sample, because cellular data transmission is very power-hungry.
  - The local training round, because of the high number of floating-point operations (FLOPs).
  - The local training round, due to the high energy cost of repeated DRAM access for model parameters.
  - They consume roughly the same amount of energy.
