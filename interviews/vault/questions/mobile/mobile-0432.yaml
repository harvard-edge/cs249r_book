title: The Mobile Video Filter Jank
scenario: You are a mobile ML engineer optimizing a new real-time video filter. The filter runs a novel segmentation model on the phone's camera stream. It is only achieving 20 FPS, causing noticeable 'jank', well below the 60 FPS target. Profiling shows the model performs 800 Giga-Ops per frame and moves 80 MB of data per frame.
question: Is an 800 GOps, 80 MB video filter compute-bound or memory-bound, and what optimization follows?
details:
  realistic_solution: The model is fundamentally compute-bound. The correct way to diagnose this is by calculating the Arithmetic Intensity (AI) and comparing it to the hardware's ridge point.
  common_mistake: |
    **The Pitfall:** Reflexively blaming memory bandwidth on mobile devices.
    **The Rationale:** Engineers assume mobile performance is always limited by the "memory wall" compared to datacenter hardware, without calculating AI.
    **The Consequence:** Time is wasted optimizing data layouts instead of reducing raw MAC operations.
  napkin_math: |
    1. Assumptions & Constraints:
       - Model compute: 800 G-ops. Model data: 80 MB.
       - Hardware: 35 TOPS peak, 51.2 GB/s memory bandwidth.
    2. Calculations:
       - Arithmetic Intensity (AI): 800 G-ops / 80 MB = 10,000 Ops/Byte.
       - Hardware Ridge Point: 35 TOPS / 51.2 GB/s = ~683 Ops/Byte.
       - Compute time: 800 G-ops / 35 TOPS = ~22.9 ms (~44 FPS).
       - Memory time: 80 MB / 51.2 GB/s = ~1.56 ms.
    3. Conclusion & Interpretation:
       - **Result: The model is bounded by compute (~22.9 ms) (Compute-Bound).**
  options:
  - It's memory-bound. The 51.2 GB/s LPDDR5 bandwidth is insufficient.
  - It's power-bound. The model's TOPS/W efficiency is too low.
  - It's compute-bound. Its arithmetic intensity of 10,000 Ops/Byte is significantly higher than the Ridge Point.
  - It's latency-bound. The time to read from UFS 4.0 flash storage is the primary bottleneck.
  correct_index: 2
