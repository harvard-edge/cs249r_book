title: The Mobile Video Filter Jank
scenario: You are a mobile ML engineer trying to optimize a new real-time video filter. The filter runs a novel segmentation model on the phone's camera stream. On an Apple A17 Pro, it's only achieving 20 FPS, causing noticeable 'jank', well below the 60 FPS target. Profiling shows the model performs 800 Giga-Ops (INT8) per frame and moves 80 MB of data per frame. The A17 Pro's ANE has 35 TOPS peak and 51.2 GB/s memory bandwidth.
question: Is an 800 GOps, 80 MB video filter compute-bound or memory-bound on an A17 Pro, and what optimization follows?
details:
  realistic_solution: The model is fundamentally **compute-bound**. The correct way to diagnose this is by calculating the Arithmetic Intensity (AI) and comparing it to the A17 Pro's hardware ridge point.
  common_mistake: |
    **The Pitfall:** Reflexively blaming memory bandwidth on mobile devices.
    **The Rationale:** Engineers assume mobile performance is always limited by the "memory wall" compared to datacenter hardware, without calculating the workload's Arithmetic Intensity.
    **The Consequence:** Time is wasted optimizing data layouts instead of reducing raw MAC operations (e.g., pruning channels).
  napkin_math: |
    1. Arithmetic Intensity (AI): 800 G-ops / 80 MB = 10,000 Ops/Byte.
    2. Hardware Ridge Point (A17 Pro): 35 TOPS / 51.2 GB/s = ~683 Ops/Byte.
    3. Comparison: AI (10,000) >> Ridge Point (683), so the model is compute-bound.
    4. Compute time: 800 G-ops / 35 TOPS = ~22.9 ms (~44 FPS).
    5. Memory time: 80 MB / 51.2 GB/s = ~1.56 ms.
    6. **Conclusion: To reach 60 FPS (<16.6ms), operations must be reduced to <583 G-ops.**
  options:
  - It's memory-bound. The 51.2 GB/s LPDDR5 bandwidth is insufficient to load 30MB of data per frame at the required rate.
  - It's power-bound. The model's TOPS/W efficiency is too low, causing the chip to thermal throttle before reaching its peak compute performance.
  - It's compute-bound. Its arithmetic intensity of 10,000 Ops/Byte is significantly higher than the A17 Pro's ridge point (~683 Ops/Byte).
  - It's latency-bound. The time to read from UFS 4.0 flash storage for the model weights is the primary bottleneck.
  correct_index: 2
