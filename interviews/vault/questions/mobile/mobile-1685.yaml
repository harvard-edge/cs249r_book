title: Tensor G3 ADAS Functional Safety Analysis (ASIL-B)
scenario: A tier-1 automotive supplier is developing a novel mobile ADAS (Advanced Driver-Assistance Systems) warning feature designed to run on a standard smartphone powered by the Google Tensor G3 SoC. This feature utilizes a deep learning model for real-time pedestrian detection, processing sensor data (e.g., camera feed) on the Tensor G3's on-device TPU (7.5 TOPS peak performance, accessing 12 GB LPDDR5X RAM). The software stack is being designed to achieve Automotive Safety Integrity Level B (ASIL-B) according to ISO 26262 for critical warning functions. You are tasked with analyzing the potential failure modes of the ML model execution on the Tensor G3's TPU and designing mitigation strategies to meet ASIL-B requirements, specifically considering watchdog timers, self-test routines, and ensuring deterministic execution.
question: How should watchdogs, self-tests, and deterministic TPU execution make a Tensor G3 ADAS warning feature ASIL-B ready?
details:
  realistic_solution: A realistic solution involves a multi-layered approach. For deterministic execution, techniques such as fixed-point arithmetic for the ML model, explicit memory allocation/management on the LPDDR5X, and careful scheduling of TPU operations would be crucial, minimizing reliance on non-deterministic OS features. Redundancy in computation or data paths, and cross-checking results from different execution units (if feasible) could enhance reliability. Watchdog timers (both hardware and software) must be implemented to monitor the health and responsiveness of the ML inference pipeline on the TPU, with clear fault reaction strategies (e.g., safe state transition, degraded mode operation). Comprehensive self-test routines for the TPU and memory (e.g., BIST for TPU, memory integrity checks) should run during boot-up and periodically during runtime, perhaps in idle cycles or interleaved with inference, to detect latent faults. The system should incorporate error detection and correction codes (ECC) where available on the LPDDR5X, and implement range checks, plausibility checks, and input validation on the ML model's inputs and outputs. All these elements need to be rigorously documented and validated against ISO 26262 part 6 (Software) and part 5 (Hardware) standards.
  common_mistake: |
    **The Pitfall:** Focusing solely on software-level error detection without hardware mechanisms.
    **The Rationale:** Candidates overlook the challenges of achieving deterministic execution on a heterogeneous SoC, ignoring memory access patterns, cache coherence, or shared resource contention.
    **The Consequence:** Non-deterministic behavior and missed fault detections that prevent achieving ASIL-B certification.
  napkin_math: |
    - Pedestrian detection model inference: 500ms.
    - ASIL-B fault detection time interval requirement: 100ms.
    - Watchdog timer must trigger within 100ms if unresponsive.
    - TPU compute at 7.5 TOPS -> 7.5e12 ops/s * 0.1s = 0.75 trillion ops in 100ms.
    - **The system must detect and react to failures before ~0.75 trillion operations go wrong, requiring localized fault detection rather than full system reboots.**
