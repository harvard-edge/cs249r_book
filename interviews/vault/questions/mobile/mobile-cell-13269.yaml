title: Implement Mobile LLM Decode Benchmark on Tensor G3
scenario: 'You must implement a decode speed benchmark for a 2B INT4 transformer on Tensor G3 (15 TOPS
  TPU, 51.2 GB/s LPDDR5). The model weights: 2B × 0.5B/param = 1GB. Implement: (1) warm-up procedure (3
  runs), (2) timed measurement of 100 decode steps at batch=1, (3) calculation of tokens/s and GB/s memory
  bandwidth utilized, (4) comparison to theoretical BW-limited maximum.'
details:
  realistic_solution: 'Benchmark design: (1) Pre-tokenize 100 different 1-token inputs. Pre-compute KV
    cache with 256-token system prompt (warmed). (2) Warm-up: 3 full decode chains of 10 tokens each (discarded).
    (3) Measurement: time.perf_counter() before and after 100 sequential single-token decode calls. Record
    total_time. (4) tokens_per_second = 100 / total_time. GB_per_second = 1GB_weights / (total_time /
    100). Comparison: theoretical BW max = 51.2 GB/s / 1GB = 51.2 tokens/s. If measured = 42 tokens/s
    → MBU = 42/51.2 = 82% memory bandwidth utilization — excellent. (5) Report: mean ± std over 5 benchmark
    runs.'
  common_mistake: Measuring wall-clock time including tokenization and de-tokenization; benchmark must
    isolate pure inference time by pre-tokenizing inputs and measuring only the tensor computation.
  napkin_math: 'Model: 2B params × 4b/8 = 1GB. BW-limited max: 51.2 GB/s / 1GB = 51.2 tok/s. With KV cache
    at context=256: additional 2×24L×8H×64D×256×2B = 12.6MB per step. Total bytes/step: 1000MB + 12.6MB
    = 1012.6MB. Adjusted max: 51.2/1.0126 = 50.5 tok/s. Expected measurement: ~42-48 tok/s (82-95% MBU).'
