title: Structured Pruning for Apple A17 Pro Neural Engine
scenario: You are deploying a 1B parameter transformer model on a Neural Engine that shares memory. Unstructured magnitude pruning achieved 70% sparsity, but on-device latency did not improve.
question: Why does unstructured pruning fail to speed up inference, and what structured approach should replace it?
details:
  realistic_solution: The correct approach is to diagnose the lack of speedup as a
    hardware alignment issue and switch to structured pruning, such as channel or
    block pruning. By physically reducing the dimensions of the weight tensors, structured
    pruning directly reduces the memory footprint and bandwidth requirements, allowing
    the 16-core Neural Engine to operate on smaller dense matrices and effectively
    alleviating the memory bottleneck.
  common_mistake: |
    **The Pitfall:** Assuming unstructured sparsity natively translates to latency improvements on dense hardware.
    **The Rationale:** Candidates confuse theoretical FLOP reductions with actual hardware execution paths, which cannot efficiently skip random zeros.
    **The Consequence:** Deploying a model with degraded accuracy (from 70% pruning) but zero actual performance or memory bandwidth gains.
  napkin_math: |
    - **Unpruned Read Time:** 1 GB (INT8 weights) / 50 GB/s bandwidth = 20ms per token (memory bound, 50 tok/s).
    - **Unstructured Pruning:** Dense memory reads remain; still 20ms read time.
    - **Structured Pruning (50%):** Model size drops to 0.5 GB.
    - **New Read Time:** 0.5 GB / 50 GB/s = 10ms per token.
    - **Result:** Structured pruning **doubles throughput to 100 tok/s** by reducing memory traffic.
