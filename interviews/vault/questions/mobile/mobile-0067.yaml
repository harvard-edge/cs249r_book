title: The Accessibility Breakage
scenario: Your messaging app uses an on-device ML model to generate smart reply suggestions. After your latest update, blind users using VoiceOver (iOS) and TalkBack (Android) report that the app is 'unusable' — the smart reply buttons appear but VoiceOver reads them as 'button, button, button' instead of reading the suggested text. Sighted users see the suggestions fine.
question: What went wrong?
details:
  realistic_solution: 'Race condition between ML inference and accessibility tree. UI creates empty buttons, triggers async inference (50ms), updates labels on completion. VoiceOver builds its tree within 5ms — before labels arrive. Fix: don''t show buttons until inference completes (50ms < 100ms perceptual threshold). Post UIAccessibility.post(.layoutChanged) after setting labels. Add CI tests with 0ms inference mock to verify labels exist before visibility. ~5% of iOS users use accessibility — this affects millions.'
  common_mistake: |
    **The Pitfall:** Treating ML generation and accessibility as separate, disconnected systems.
    **The Rationale:** Engineers assume this is purely a UI bug and that the ML pipeline's output latency has no structural effect on accessibility screen readers.
    **The Consequence:** VoiceOver parses the UI before the asynchronous ML inference returns text, rendering the feature unusable for ~5% of users.
  napkin_math: |
    - Inference time: 50 ms.
    - VoiceOver tree build time: <5 ms after UI creation.
    - Race window: 50 ms - 5 ms = 45 ms where the accessibility tree has stale/empty labels.
    - Fix: Delay button appearance by 50 ms (well below the **100 ms perceptual threshold**).
