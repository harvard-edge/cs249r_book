title: Calculate model memory reduction accounting for static KV cache
scenario: Deploying an LLM on a Snapdragon 8 Gen 3, a team compares FP16 and INT4
  weights. In FP16, the model parameters take 4GB and the KV cache strictly takes
  1GB for the target context window.
question: Calculate the total memory savings factor when switching the weights from
  FP16 to INT4, accounting for the static KV cache footprint.
details:
  realistic_solution: In FP16, total memory is 4GB (weights) + 1GB (KV cache) = 5GB.
    In INT4 (0.5 bytes/param), the weights shrink by 4x to 1GB. The new total is 1GB
    (weights) + 1GB (KV cache) = 2GB. The overall memory footprint shrinks from 5GB
    to 2GB, which is a 2.5x reduction.
  common_mistake: Ignoring the static memory footprint of the KV cache and erroneously
    claiming the entire application uses 4x less memory.
  napkin_math: 5GB total FP16 / 2GB total INT4 = 2.5x reduction
