title: 'Dataset Curation: Recall — What is Federated Learning Data Privacy?'
scenario: In the context of mobile on-device training on Snapdragon 8 Gen 3 (45 TOPS INT8), what does
  federated learning mean in terms of data privacy, and what is the key difference from centralized training
  data collection?
details:
  realistic_solution: 'Federated learning: model trains locally on device, only model updates (gradients
    or weights) are uploaded — raw data never leaves device. Key difference from centralized: no raw data
    collection, privacy-by-design. Limitation: gradient inversion attacks can partially recover data without
    DP.'
  common_mistake: Confusing federated learning with secure multi-party computation; claiming federated
    learning provides perfect privacy (it does not without additional DP).
  napkin_math: 'Centralized: 100M users × 1K training examples × 512 tokens × 2B = 102.4TB data uploaded.
    At $0.09/GB = $9,216 transfer cost. Federated: only gradients uploaded. 100M params × fp16 = 200MB/device.
    With 10× compression = 20MB. 100M users × 20MB = 2PB gradient uploads — more data than centralized!
    Use sampling: 100K users/round × 20MB = 2TB. $18/round vs $9,216 — much cheaper. Trade: gradient inversion
    risk, need DP.'
