title: The Model Distillation Sync Budget
scenario: You run on-device knowledge distillation where a 500 MB teacher model in
  the cloud periodically pushes updates to guide a 50 MB on-device student. The user
  has a 100 MB daily cellular data budget.
question: How would you design a sync protocol that keeps the student model fresh
  without exceeding the 100 MB daily cellular data budget?
details:
  realistic_solution: 'Strategy: (1) Delta compression of teacher weights: ~5% of
    full model = 25 MB, fits in 100 MB budget. (2) Alternatively, send soft-label
    distillation targets: for 10K local samples x 32K vocab x FP16, this is too large.
    Better: send only top-32 logits per sample = 10K x 32 x 4 bytes = 1.3 MB. (3)
    Hybrid: monthly full sync over WiFi (500 MB), daily delta sync over cellular (25
    MB). Budget: 25 MB/day << 100 MB limit.'
  common_mistake: '**The Pitfall:** Sending the full teacher model to the device.

    **The Rationale:** Candidates default to updating model weights directly, forgetting
    that the student only needs the teacher''s soft labels or a compressed delta on
    the local data distribution.

    **The Consequence:** The protocol consumes 500 MB per sync, immediately blowing
    past the user''s 100 MB cellular budget.

    '
  napkin_math: '1. **Full Teacher:** 500 MB (exceeds 100 MB budget).

    2. **Delta Compression:** 500 MB * 5% = 25 MB/day (fits budget).

    3. **Soft Labels:** Sending top-32 logits for 10K local samples = 10K * 32 * 4
    bytes = 1.3 MB/day (fits easily).

    4. **Hybrid Protocol:** Monthly WiFi full sync + daily soft labels uses only **~39
    MB/month** of cellular data.

    '
