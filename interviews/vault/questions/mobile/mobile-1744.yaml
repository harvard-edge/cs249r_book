title: DP-SGD and Privacy Budgeting on Snapdragon NPU
scenario: You are designing a federated learning system for on-device model personalization, targeting mobile devices equipped with the Snapdragon 8 Gen 3 Hexagon NPU. To guarantee user privacy, you've decided to employ Differentially Private Stochastic Gradient Descent (DP-SGD).
question: How do epsilon, delta, noise calibration, and the privacy-utility tradeoff apply to DP-SGD on Snapdragon Hexagon NPU?
details:
  realistic_solution: 'A robust solution involves clearly defining epsilon as the primary measure of privacy loss, often paired with a small delta. Noise calibration involves determining the standard deviation of the Gaussian noise added to gradients, which depends on the desired epsilon, the L2-norm clipping threshold, and the number of training steps. This process requires careful tuning to balance privacy against model utility, which can be computationally intensive. The Snapdragon NPU''s 45 TOPS INT8 performance is crucial for efficiently handling the added noise computations and gradient clipping required by DP-SGD, ensuring that the privacy mechanisms don''t excessively slow down on-device training. The 12-16 GB LPDDR5X memory helps accommodate larger models or batches during DP-SGD, reducing the impact on privacy-utility tradeoff by allowing more stable gradient estimations.'
  common_mistake: |
    **The Pitfall:** Misunderstanding the direct interpretation of epsilon and miscalibrating the noise.
    **The Rationale:** Overlooking the computational overhead of noise addition and the effect of low-precision NPU arithmetic on gradient clipping.
    **The Consequence:** Deploying a model with either insufficient privacy guarantees or severely degraded model performance due to quantization destroying the calibrated noise.
  napkin_math: |
    - If an L2-norm clipping threshold C=1.0 is used for gradients, and Gaussian noise is added to achieve a desired epsilon (e.g. 1.0) with a specific delta.
    - The standard deviation of the noise typically scales proportionally with C and inversely with the square root of the number of training steps T and the batch size B.
    - For a fixed C and T, doubling B would roughly reduce the necessary noise variance by a factor of 2 to maintain the same privacy bound.
    - The NPU's INT8 precision (where 1 bit represents roughly 0.0039 for a range of [-0.5, 0.5]) introduces significant quantization noise.
    - **If the required DP noise standard deviation is smaller than the INT8 resolution (0.0039), NPU quantization will destroy the precisely calibrated DP guarantees, forcing the use of FP16.**
