title: The AR Filter Frame Drop
scenario: You are a mobile ML engineer at a major social media company, tasked with optimizing a new real-time
  augmented reality filter. The filter's model runs on every frame from the live camera feed. Your performance
  target is a smooth 30 FPS (a 33ms deadline per frame), but on your test device, an iPhone with an A17
  Pro chip (35 TOPS INT8, 51.2 GB/s memory BW), you are only achieving 15 FPS. Profiling data shows your
  custom CNN model executes 10 Giga-Ops per frame and requires reading 50 MB of data (parameters + activations)
  from memory for each inference. Using these numbers, diagnose the primary performance bottleneck.
question: "What roofline calculation diagnoses the bottleneck for a 10 GOps AR filter reading 50 MB per frame on an A17 Pro?"
details:
  realistic_solution: The model is memory-bound. The key is to calculate the model's Arithmetic Intensity
    (AI) and compare it to the hardware's ridge point. The A17 Pro's ridge point is ~683 Ops/Byte, meaning
    it needs 683 operations for every byte of data it reads from memory to keep its compute units fully
    saturated. This model's AI is far below that, indicating the memory system cannot supply data fast
    enough, and the powerful ANE compute units are starving. The heat is a side effect of energy-intensive
    DRAM access. The correct optimization strategy is to reduce memory traffic via techniques like operator
    fusion, quantization, or architectural changes like using depthwise separable convolutions.
  common_mistake: Engineers often incorrectly assume that low frame rates are always a compute problem,
    leading them to aggressively prune model layers or channels. They see '10 G-Ops' and think it's too
    high, without calculating the chip's actual throughput ceiling. Another common mistake is to blame
    thermal throttling as the root cause, when it's often just a symptom of an inefficient, energy-intensive
    memory access pattern.
  napkin_math: '1. **Arithmetic Intensity:** AI = 10 × 10^9 / (50 × 10^6) = 200 Ops/Byte.

    2. **Ridge Point:** 35 × 10^12 / (51.2 × 10^9) ≈ 683 Ops/Byte.

    3. **Compare:** AI (200) < Ridge Point (683) → model is **memory-bound**.

    4. **Memory-limited time:** 50 MB / 51.2 GB/s ≈ 0.98 ms per frame.

    5. **Compute time:** 10 GOps / 35 TOPS ≈ 0.29 ms per frame.

    6. **Note:** Both times are well under 33ms. The observed 66.7ms/frame (15 FPS) suggests additional
    overhead: cache misses, memory controller contention, OS scheduling, or non-fused operator dispatch
    are amplifying the memory bottleneck far beyond the theoretical minimum.'
  options:
  - The model is compute-bound. The ANE's 35 TOPS is insufficient for the 10 G-Ops workload at a 30 FPS
    target.
  - The device is thermally throttling. The workload's power draw exceeds the SoC's sustainable limit,
    forcing a reduction in clock speed.
  - The model is memory-bound. Its Arithmetic Intensity of 200 Ops/Byte is far below the A17 Pro's ridge
    point, so the memory system can't feed the ANE fast enough.
  - The OS scheduler is preempting the inference thread. The poor performance is due to software-level
    contention, not a hardware bottleneck.
  correct_index: 2
