title: The Battery Inference Budget
scenario: A mobile health app runs continuous pose estimation at 30 fps, consuming 5W sustained on the ANE. The phone has an 18.5 Wh battery. The product manager wants the app to run for 8 hours.
question: Is this feasible with inference alone, ignoring all other phone functions?
details:
  realistic_solution: 18.5 Wh / 5W = 3.7 hours from inference alone. Adding display and OS overhead (~3W), total draw is ~8W, giving only ~2.3 hours. The 8-hour target is physically impossible without reducing inference frequency (e.g., 5 fps instead of 30 fps, cutting power to ~1W).
  common_mistake: |
    **The Pitfall:** Ignoring that 5W is only the ANE power draw.
    **The Rationale:** Candidates forget the display, radios, and OS consume another 2-3W minimum.
    **The Consequence:** Grossly overestimating battery life and failing to meet the product requirement.
  napkin_math: |
    - Inference only: 18.5 Wh / 5W = 3.7h.
    - With system overhead: 18.5 Wh / 8W = **2.3h**.
    - At 5 fps (1/6 duty cycle): ~1W inference + 3W system = 4W.
    - 18.5 Wh / 4W = 4.6h. Still short of 8h.
  options:
  - A) Yes. 18.5 Wh / 5W = 3.7h of inference, plus the OS is free.
  - B) No. Inference alone drains the battery in 3.7h; with system overhead it is ~2.3h. Must reduce frame rate.
  - C) Yes. The ANE uses only milliwatts for neural inference.
  - D) No, but only because the phone will thermal-throttle first.
  correct_index: 1
