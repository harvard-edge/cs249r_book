title: Tensor G3 LLM Degradation Ladder
scenario: You are designing the smart reply system for a messaging app running on the Google Tensor G3. The system defaults to using the on-device Gemini Nano model, leveraging the TPU's 7.5 TOPS and 12 GB LPDDR5X memory. However, during scenarios like 4K video recording or heavy thermal throttling, TPU availability drops and memory bandwidth becomes constrained.
question: How would you design a graceful degradation architecture that ensures users always receive smart reply suggestions within a strict 300ms latency budget, regardless of system stress?
details:
  realistic_solution: Design a three-tier fail-operational degradation ladder. Tier 1 uses Gemini Nano on the TPU for high-quality responses. Tier 2 uses a tiny, continuously resident CPU-bound model (e.g., heavily quantized MobileBERT) that activates if TPU latency predictions exceed 250ms due to thermal throttling or concurrent workloads. Tier 3 is a zero-compute static ruleset (canned responses like 'Yes', 'No', 'On my way') that triggers if the CPU model also misses the SLA or if system memory pressure forces the eviction of all ML models.
  common_mistake: |
    **The Pitfall:** Suggesting a cloud API fallback when the device is stressed.
    **The Rationale:** Engineers default to cloud scaling without considering network latency or offline availability.
    **The Consequence:** The fallback solution violates the strict 300ms SLA due to network round-trips.
  napkin_math: |
    1. Gemini Nano needs ~30 GOPS/token. Peak generation is 250 tokens/sec.
    2. A 15-token smart reply takes ~60ms under ideal conditions.
    3. Concurrent task (4K video) consumes 6.0 TOPS, leaving 1.5 TOPS.
    4. At 1.5 TOPS, generation drops to 50 tokens/sec.
    5. **A 15-token reply now takes 300ms, breaching the SLA and triggering degradation.**
