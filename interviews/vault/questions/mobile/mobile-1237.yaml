title: Tensor G3 LLM Degradation Ladder
scenario: You are designing the smart reply system for a messaging app. The system defaults to using the on-device LLM. However, during scenarios like 4K video recording, NPU availability drops and memory bandwidth becomes constrained.
question: How would you design a graceful degradation architecture that ensures users always receive smart reply suggestions within a strict 300ms latency budget, regardless of system stress?
details:
  realistic_solution: |
    Design a fail-operational QoS degradation ladder. Tier 1: Primary LLM on NPU for full capability. Tier 2: A tiny, continuously resident CPU-bound model (e.g., heavily quantized MobileBERT) activates if NPU latency predictions exceed the SLA due to contention. Tier 3: Zero-compute static rulesets (canned responses) trigger if memory pressure forces eviction of all ML models.
  common_mistake: |
    **The Pitfall:** Suggesting a cloud API fallback when the device is stressed.
    **The Rationale:** Engineers default to cloud scaling without considering network latency or offline availability.
    **The Consequence:** The fallback solution violates the strict 300ms SLA due to network round-trips.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Base LLM needs ~30 GOPS/token
       - SLA: 300ms for a 15-token reply
       - Available NPU under contention: 1.5 TOPS
    2. **Calculations:**
       - Token Generation Rate at 1.5 TOPS: 1500 GOPS / 30 GOPS/token = 50 tokens/sec
       - Time for 15 tokens: 15 / 50 = 300 ms
    3. **Conclusion & Interpretation:** **Generating 15 tokens takes exactly 300ms, breaching the SLA margin and triggering Tier 2 degradation. Result: Compute-Bound.**
