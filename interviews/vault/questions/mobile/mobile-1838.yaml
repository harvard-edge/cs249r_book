title: Efficient gradient-based hyperparameter search within 8GB on Snapdragon
scenario: You are implementing DARTS (Differentiable Architecture Search) on Snapdragon
  8 Gen 3 (45 TOPS, 8GB) to find the optimal neural architecture for a task-specific
  model. DARTS requires maintaining architecture parameters α alongside model weights
  and differentiating through the architecture sampling. Standard DARTS implementation
  on this hardware OOMs at every configuration.
question: How would you make DARTS architecture search fit in 8GB on Snapdragon without
  running the full supernet?
details:
  realistic_solution: 'Use PC-DARTS (Partial Channel DARTS) which samples a fraction
    (1/K) of channels per operation, reducing memory by K×. With K=4: 4× memory reduction.
    Alternatively, use single-path one-shot NAS (SPOS) which samples one operation
    per edge per step, requiring only 1/8 the memory of full DARTS. For Snapdragon:
    use a tiny supernet (4 nodes, 4 operations per edge) and perform search for 50
    epochs, then retrain from scratch.'
  common_mistake: Running full DARTS with a supernet containing all candidate operations
    simultaneously. The supernet for a 8-node DARTS cell with 8 operations per edge
    has 8×7/2×8 = 224 candidate operations running simultaneously. Memory scales linearly
    with number of candidates.
  napkin_math: 'Full DARTS supernet (8 nodes, 8 ops per edge, d=128): memory ≈ 28
    edges × 8 ops × feature_map(128, 32, 32) = 28 × 8 × 0.5MB = 112MB activations.
    Plus weights: 224 operations × avg 100K params × 4 bytes = 86MB. Total: ~200MB.
    PC-DARTS K=4: 200MB/4 = 50MB. With Adam optimizer: 50MB × 3 = 150MB. Well within
    8GB for mobile DARTS.'
