title: A17 Sliding Window Sync
scenario: "You are deploying on-device summarization using an A17 Pro Neural Engine. The KV cache uses a sliding window of 1024 tokens. Unified memory bandwidth is 50 GB/s."
question: "Evaluate the effective memory bandwidth utilization if rolling the 128MB KV cache requires a 500us synchronization barrier between the CPU and NPU."
details:
  realistic_solution: Reading and writing the 128MB sliding window at 50 GB/s takes 2.56ms. The 500us CPU/NPU synchronization barrier for page table updates extends the total step to 3.06ms. The effective utilization drops to 83.6%.
  common_mistake: |
    **The Pitfall:** Ignoring CPU/NPU sync barriers.
    **The Rationale:** Engineers assume hardware maximums are achievable during heterogeneous handoffs.
    **The Consequence:** Overestimated bandwidth utilization and missed latency targets.
  napkin_math: |
    - Transfer Time: `128MB / 50GB/s = 2.56ms`.
    - Sync Time: `0.5ms`.
    - Total Time: `2.56ms + 0.5ms = 3.06ms`.
    - Utilization: `2.56ms / 3.06ms = 0.836`.
    - **Conclusion:** The effective bandwidth utilization drops to **83.6%**.
