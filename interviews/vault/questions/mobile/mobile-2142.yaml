title: A17 Sliding Window Sync
scenario: On-device summarization using an A17 Pro Neural Engine. The KV cache uses
  a sliding window of 1024 tokens. Unified memory bandwidth is 50 GB/s.
question: Evaluate the effective memory bandwidth utilization if rolling the 128MB
  KV cache requires a 500us synchronization barrier between the CPU and NPU.
details:
  realistic_solution: Reading and writing the 128MB sliding window at 50 GB/s takes
    2.56ms. The 500us CPU/NPU synchronization barrier for page table updates extends
    the total step to 3.06ms. The effective utilization drops to 83.6%.
  common_mistake: Ignoring the CPU/NPU sync barrier when calculating effective bandwidth,
    assuming hardware maximums are achievable during heterogeneous handoffs.
  napkin_math: 128MB / 50GB/s = 2.56ms. Sync = 0.5ms. Total = 3.06ms. Util = 2.56
    / 3.06 = 83.6%.
