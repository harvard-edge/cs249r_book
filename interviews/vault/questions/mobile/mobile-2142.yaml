title: A17 Sliding Window Sync
scenario: You are deploying on-device summarization using an A17 Pro Neural Engine. The KV cache uses a sliding window of 1024 tokens. Unified memory bandwidth is 50 GB/s.
question: Evaluate the effective memory bandwidth utilization if rolling the 128MB KV cache requires a 500us synchronization barrier between the CPU and NPU.
details:
  realistic_solution: Reading and writing the 128MB sliding window at 50 GB/s takes 2.56ms. The 500us CPU/NPU synchronization barrier for page table updates extends the total step to 3.06ms.
  common_mistake: |
    **The Pitfall:** Ignoring CPU/NPU sync barriers completely.
    **The Rationale:** Engineers assume hardware maximums are achievable continuously during heterogeneous handoffs.
    **The Consequence:** Consistently overestimated bandwidth utilization and missed real-time latency targets.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - KV Cache Size: 128 MB.
       - Memory Bandwidth: 50 GB/s.
       - CPU/NPU Synchronization Barrier: 500µs (0.5ms).
    2. **Calculations:**
       - Memory Transfer Time: 128 MB / 50 GB/s = 2.56ms.
       - Total Execution Step: 2.56ms (transfer) + 0.5ms (sync) = 3.06ms.
       - Effective Utilization: 2.56ms / 3.06ms = 0.836.
    3. **Conclusion & Interpretation:**
       - **Result: Synchronization-Bound**. The fixed 500µs CPU/NPU sync barrier drops effective memory bandwidth utilization to 83.6%, demonstrating the hidden penalty of heterogeneous handoffs.
