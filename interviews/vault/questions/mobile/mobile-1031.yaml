title: 'Network Bandwidth Bottlenecks: Implement Flash-Attention BW Reduction for
  Mobile Inference'
scenario: 'Calculate the memory bandwidth savings from using Flash-Attention vs. standard
  attention for a 3B LLM prefill on Snapdragon 8 Gen 3 (77 GB/s). Prefill: 1024 tokens,
  32 heads, 128 head_dim, 32 layers. Standard attention: write full Q×K^T matrix to
  LPDDR5X; Flash-Attention: never materializes full matrix.'
question: How would you calculate the memory bandwidth savings from using Flash-Attention
  vs. standard attention for a 3B LLM prefill on Snapdragon 8 Gen 3 (77 GB/s)?
details:
  realistic_solution: 'Standard attention materializes the Q×K^T matrix. For sequence length 1024, this is 1024×1024 elements per head. With 32 heads and 2 bytes per element (FP16), this is 32 × 1024 × 1024 × 2B = 64MB per layer. Reading and writing this matrix, plus the softmax outputs, adds significant memory bandwidth overhead (~2GB total across 32 layers). Flash-Attention tiles the computation and never materializes the full attention matrix to LPDDR5X. BW reduction: ~64MB/layer × 32 = 2GB saved. At 77GB/s, time saved = 2GB / 77GB/s ≈ 26ms. For a prefill that normally takes ~27ms compute-bound, saving 26ms of memory overhead is a massive reduction.'
  common_mistake: Applying Flash-Attention savings to decode (where it doesn't apply
    the same way) instead of prefill; during decode, only 1 new token attends to KV
    cache, so the QK^T matrix is trivially small.
  napkin_math: 'Standard attention Q×K^T matrix: 1024×1024×2B=2MB per head? No: per
    layer (all heads combined): [batch=1, heads=32, seq=1024, seq=1024]×2B=32×1024²×2B=64MB
    per layer × 32=2048MB = 2GB total. Flash-Attention: never writes this. BW savings: 2GB
    / 77GB/s=26ms saved per prefill! 27ms prefill baseline → Flash reduces to 1ms
    prefill overhead. Major impact for long-context prefill. (Standard: 64MB per layer
    × 32=2048MB = 2GB).'
