title: 'Network Bandwidth Bottlenecks: Implement Flash-Attention BW Reduction for Mobile Inference'
scenario: 'Calculate the memory bandwidth savings from using Flash-Attention vs. standard attention for a 3B LLM prefill on Snapdragon 8 Gen 3 (77 GB/s). Prefill: 1024 tokens, 32 heads, 128 head_dim, 32 layers.'
question: How would you calculate the memory bandwidth savings from using Flash-Attention vs. standard attention for a 3B LLM prefill on Snapdragon 8 Gen 3 (77 GB/s)?
details:
  realistic_solution: 'Standard attention materializes the Q×K^T matrix. For sequence length 1024, this is 1024×1024 elements per head. With 32 heads and 2 bytes per element (FP16), this is 32 × 1024 × 1024 × 2B = 64MB per layer. Reading and writing this matrix, plus the softmax outputs, adds significant memory bandwidth overhead (~2GB total across 32 layers). Flash-Attention tiles the computation and never materializes the full attention matrix to LPDDR5X. BW reduction: ~64MB/layer × 32 = 2GB saved. At 77GB/s, time saved = 2GB / 77GB/s ≈ 26ms. For a prefill that normally takes ~27ms compute-bound, saving 26ms of memory overhead is a massive reduction.'
  common_mistake: |
    **The Pitfall:** Applying Flash-Attention bandwidth savings to the decode phase.
    **The Rationale:** Candidates recognize Flash-Attention reduces memory I/O but misapply it to autoregressive decoding.
    **The Consequence:** They overestimate decode speedups, failing to realize that during decode, only one new token attends to the KV cache, making the materialized QK^T matrix trivially small.
  napkin_math: |
    - Matrix size per layer: [batch=1, heads=32, seq=1024, seq=1024] × 2 bytes = 32 × 1048576 × 2B = 67.1 MB/layer.
    - Total across 32 layers: 67.1 MB * 32 = 2.14 GB (≈ 2 GB).
    - Bandwidth time saved: 2.14 GB / 77 GB/s ≈ 0.027 seconds (**27 ms**).
