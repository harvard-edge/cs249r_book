title: 'Network Bandwidth Bottlenecks: Implement Flash-Attention BW Reduction'
scenario: 'A 3B LLM prefill runs on a mobile SoC (77 GB/s) using 1024 tokens, 32 heads, 128 head_dim, and 32 layers.'
question: How would you calculate the memory bandwidth savings from using Flash-Attention vs. standard attention for this 3B LLM prefill?
details:
  realistic_solution: Standard attention materializes the massive QxK^T matrix to LPDDR RAM. Flash-Attention-2 mitigates this via loop tiling and kernel fusion, maintaining the intermediate Softmax denominators entirely in NPU SRAM. This avoids reading and writing the 67MB matrix per layer back to main memory. Across 32 layers, this rescues 2.14GB of redundant memory IO, saving roughly 27ms of latency on a 77GB/s bus.
  common_mistake: |
    **The Pitfall:** Applying Flash-Attention bandwidth savings to the decode phase.
    **The Rationale:** Candidates recognize Flash-Attention reduces memory I/O but misapply it to autoregressive decoding.
    **The Consequence:** They overestimate decode speedups, failing to realize that during decode, only one new token attends to the KV cache, making the materialized QK^T matrix trivially small and strictly memory-bandwidth bound anyway.
  napkin_math: |
    **Assumptions & Constraints:**
    - Batch: 1. Heads: 32. Seq Length: 1024.
    - Precision: FP16 (2 bytes).
    - Layers: 32.
    - Memory Bandwidth: 77 GB/s.

    **Calculations:**
    - Matrix size per layer: [1, 32, 1024, 1024] * 2 bytes = 32 * 1,048,576 * 2B = 67.1 MB/layer.
    - Total across 32 layers: 67.1 MB * 32 = 2,147 MB ≈ 2.14 GB.
    - Bandwidth time saved: 2.14 GB / 77 GB/s ≈ 0.027 seconds (27 ms).

    **Conclusion & Interpretation:**
    - **Result: 2.14 GB / 27 ms saved (Memory-Bandwidth-Bound)**. The standard attention prefill is unnecessarily memory-bandwidth-bound; Flash-Attention shifts it back to compute-bound.
