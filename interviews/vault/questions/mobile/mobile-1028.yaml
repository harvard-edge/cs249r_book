title: 'Network Bandwidth Bottlenecks: Fluency — Speculative Decode BW Arithmetic'
scenario: 'Without reference, in 60 seconds: ''With speculative decoding (100M draft
  + 3B INT4 target) on Snapdragon 8 Gen 3 (77 GB/s), the draft generates K=3 tokens.
  What is the effective TPOT assuming 80% acceptance rate?'''
question: What is the effective TPOT assuming 80% acceptance rate?
details:
  realistic_solution: 'Draft (100M INT8): K=3 tokens. BW: 3×100MB/77GB/s=3.9ms. Target
    (3B INT4=1.5GB): 1 verify pass. BW: 1.5GB/77GB/s=19.5ms. Step time: 3.9+19.5=23.4ms.
    Avg accepted (α=0.8, K=3): (1-0.8^3)/(1-0.8)=2.488 tokens. Effective TPOT: 23.4/2.488=9.4ms
    vs 19.5ms baseline = 2.07× speedup.'
  common_mistake: Using acceptance_rate × TPOT_per_token without computing the actual
    step time (draft time + verify time) and average tokens per step.
  napkin_math: 'Draft: 3×100MB/77=3.9ms. Verify: 1.5/77=19.5ms. Step: 23.4ms. Avg
    tokens: (1-0.512)/0.2=2.44 (formula: (1-α^K)/(1-α) for K=3, α=0.8 = (1-0.512)/0.2=2.44).
    TPOT: 23.4/2.44=9.59ms. Speedup: 19.5/9.59=2.03×.'
