title: The "Warm-Up" Performance Drop
scenario: Your mobile ML model performs exceptionally well for the first 10-15 seconds after launch, achieving
  30 FPS. However, after this initial period, the frame rate consistently drops to 15-20 FPS and stays
  there. The phone isn't running any other heavy applications. What's the primary cause for this behavior,
  and how would you confirm it?
details:
  realistic_solution: This is a classic symptom of **thermal throttling**. Modern mobile SoCs (System-on-Chips)
    are designed to burst to peak performance for short durations, but sustained high compute loads generate
    significant heat. Once the internal temperature sensors detect a pre-defined threshold has been breached,
    the SoC's firmware will automatically reduce clock frequencies (CPU, GPU, NPU) and/or voltage to prevent
    overheating, ensuring device longevity and user comfort. This reduction in clock speed directly leads
    to a sustained drop in performance.
  common_mistake: '"There''s a memory leak causing garbage collection pauses," or "The NPU is being deallocated
    after a grace period."'
  napkin_math: A typical mobile SoC might have a peak power consumption of 8-10W for a few seconds, but
    a sustained thermal design power (TDP) of only 3-5W for ML inference. If your model initially draws
    8W, it can only sustain that for a short period before hitting thermal limits. Dropping from 30 FPS
    to 15-20 FPS implies a 33-50% reduction in effective compute, which corresponds to the SoC reducing
    clock speeds to stay within the sustainable 3-5W range.
