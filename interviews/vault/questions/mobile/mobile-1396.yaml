title: Heterogeneous Pipeline Profiling on Snapdragon 8 Gen 3
scenario: You are deploying a real-time AR video pipeline on a Qualcomm Hexagon NPU. The system captures frames, runs an INT8 vision model on the NPU, and processes embeddings on the CPU. Despite the NPU's 45 TOPS capacity, the pipeline's end-to-end latency is 48ms per frame, missing the 33ms (30 FPS) target by exactly 15ms.
question: How would you profile this heterogeneous pipeline to find NPU stalls and memory bottlenecks, and what architectural changes eliminate the 15ms overhead?
details:
  realistic_solution: A mastery-level engineer would employ Snapdragon Profiler and Hexagon DSP hardware counters to generate trace timelines correlating CPU context switches with NPU execution stalls. They would discover that the model graph is heavily partitioned, causing frequent CPU fallbacks. The solution requires designing a novel architecture that fuses operations into a single NPU graph, utilizing AHardwareBuffer (ION/dmabuf) for zero-copy input/output sharing to keep activations purely within the NPU's tightly coupled memory (TCM) and avoid the shared memory bus.
  common_mistake: |
    **The Pitfall:** Focusing strictly on optimizing matrix multiplications or reducing parameter counts.
    **The Rationale:** Engineers assume the model architecture is the slow part, ignoring synchronization and kernel dispatch overheads.
    **The Consequence:** Endless model pruning that yields zero latency improvements.
  napkin_math: |
    1. Compute Time: 20 GOPS / 45 TOPS = ~0.44ms.
    2. Data Transfer: 5 subgraphs * 6.2MB = 31MB. At 40 GB/s, transfer takes ~0.8ms.
    3. OS/RPC Overhead: Context switching takes ~3ms per invocation.
    4. **Total Bottleneck: 5 invocations * 3ms = 15ms overhead, proving the need for a fused execution graph.**
