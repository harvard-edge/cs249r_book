title: Evaluating Rollout Strategies for On-Device ML Model Architectures on Snapdragon Hexagon NPU
scenario: "Your team is developing a new on-device machine learning feature for a popular mobile application.\
  \ This feature heavily relies on the Snapdragon 8 Gen 3 Hexagon NPU, leveraging its 45 TOPS INT8 performance\
  \ and 12-16 GB LPDDR5X memory. You have two candidate ML model architectures for a critical real-time\
  \ perception task: \n\n**Model A:** Highly optimized for INT8 quantization and maximum throughput on\
  \ the Hexagon NPU. It achieves ~10ms inference latency but requires complex, non-standard update cycles\
  \ due to its highly specialized graph compilation.\n\n**Model B:** Slightly less performant (~15ms inference\
  \ latency) but built with a more standard MLIR-based intermediate representation, offering simpler model\
  \ updates and improved debuggability across different NPU versions.\n\nDesign a comprehensive A/B testing\
  \ and progressive rollout strategy (e.g., combining canary, blue-green, or shadow deployments) to evaluate\
  \ these two architectures in a production environment. Explain how you would define and compare their\
  \ performance metrics (e.g., latency, power consumption, memory footprint, user engagement with the\
  \ feature, crash rates) and ultimately decide which architecture to fully roll out, considering both\
  \ technical trade-offs and business impact."
details:
  realistic_solution: 'Implement a multi-stage rollout:


    1.  **Shadow Deployment (1% of users):** Deploy both Model A and Model B concurrently to a small segment
    of production traffic (e.g., 1%) without affecting user experience. Collect ''dark'' metrics on NPU
    utilization, inference latency, memory footprint, and estimated power consumption for both models
    on a diverse range of Snapdragon 8 Gen 3 devices. This helps identify early performance divergences
    and potential device-specific issues.


    2.  **Canary Rollout (5% of users with A/B testing):** For a distinct 5% user cohort, randomly assign
    half to Model A and half to Model B (client-side A/B test). Monitor real-time user engagement with
    the feature, perceived latency, app crash rates, and battery drain. Establish automated alerts and
    rollback mechanisms for any significant degradation in these critical metrics.


    3.  **Progressive Rollout (Phased expansion):** If initial canary tests are positive, gradually increase
    the traffic to the chosen superior model (e.g., 25%, then 50%, then 100%) while continuously monitoring
    all defined metrics. Model B might be preferred even with slightly higher latency if its ease of updates
    and debugging significantly reduces operational costs and time-to-market for future iterations, especially
    if Model A''s complexity introduces unacceptable risks or delays.


    4.  **Rollback Plan:** Crucially, a well-defined rollback strategy must be in place at each stage,
    allowing for immediate reversion to the previous stable model version if any issues are detected.'
  common_mistake: A common mistake is to only focus on isolated peak performance metrics (e.g., pure NPU
    TOPS or latency) without considering the holistic impact on the mobile device and user experience.
    This includes neglecting power consumption, memory usage spikes, app stability, and the operational
    overhead of model updates and debugging in a real-world, production environment. Another pitfall is
    not defining clear, measurable success and failure metrics (both technical and business-oriented)
    before initiating the rollout, leading to ambiguous decision-making.
  napkin_math: "Let's consider the impact of latency and power:\n\n**Latency Impact:** If Model A has\
    \ 10ms latency and Model B has 15ms latency. If the feature is used 50 times per day per user: \n\
    Difference per user per day = (15ms - 10ms) * 50 = 250ms. \nFor 10 million active users, cumulative\
    \ daily latency difference = 250ms * 10^7 = 2.5 * 10^6 seconds = ~29 days of 'lost' user time per\
    \ day across the user base. This highlights the importance of latency for perceived responsiveness.\n\
    \n**Power Consumption:** Assume Model A consumes 400mW for 10ms (4mJ per inference) and Model B consumes\
    \ 450mW for 15ms (6.75mJ per inference) on the Hexagon NPU. \nDaily energy consumption for the feature\
    \ per user:\nModel A: 4mJ/inference * 50 inferences = 200mJ/day/user.\nModel B: 6.75mJ/inference *\
    \ 50 inferences = 337.5mJ/day/user.\n\nThis means Model B consumes ~68% more energy for the same feature\
    \ usage, potentially leading to noticeable battery drain for heavy users. This significant difference\
    \ can influence the decision, even if Model B is easier to deploy."
