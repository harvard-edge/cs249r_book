title: 'Hexagon NPU Graph Compilation Analysis: Latency & Memory for Large Models'
scenario: You are tasked with deploying a large, transformer-based neural network model onto a mobile device powered by the Snapdragon 8 Gen 3 Hexagon NPU (45 TOPS INT8 performance, 12-16 GB LPDDR5X memory). The model graph, initially defined in PyTorch, undergoes ahead-of-time (AOT) compilation and quantization for INT8 execution.
question: "Which Hexagon NPU behaviors reveal poor operator lowering or constant folding in an INT8 AOT-compiled transformer?"
details:
  realistic_solution: A robust AOT compilation pipeline for the Hexagon NPU would aggressively perform operator lowering to map high-level operations to highly optimized, NPU-specific intrinsics and custom operations (e.g., specialized vector instructions for INT8 dot products). Constant folding should be applied wherever possible to reduce the graph size, eliminate redundant computations (especially for static shape parameters or fixed biases), and decrease the memory footprint of the graph itself and intermediate activations. Monitoring NPU utilization, memory bandwidth, and on-device profilers for stalls or excessive host-device transfers would reveal sub-optimal compilation. Specifically, high latency could point to poor operator lowering (falling back to less efficient CPU operations or generic NPU kernels), while unexpectedly high memory usage (especially for static parts of the graph) could indicate insufficient constant folding.
  common_mistake: |
    **The Pitfall:** Assuming quantization inherently solves all performance bottlenecks.
    **The Rationale:** Engineers treat AOT compilation as a "black box" that magically optimizes INT8 models.
    **The Consequence:** They fail to profile operator lowering, leaving generic CPU fallbacks in the graph that completely negate the NPU's speed.
  napkin_math: |
    - **Compute Penalty:** If an NPU intrinsic processes N operations in T cycles, a generic CPU fallback might take **10T cycles** (10x slower).
    - **Constant Folding Impact:** If a model has 10^12 operations, and constant folding eliminates 10%, it saves **10^11 operations** per inference.
    - **Memory Savings:** Eliminating a 10MB static tensor via constant folding permanently saves **10MB** of LPDDR5X RAM.
