title: Mobile Model Conversion Size Budget
scenario: A PyTorch model is 280 MB, and the team uses a planning rule that INT8 conversion reduces the weight payload by about 4x. The mobile runtime also adds 18 MB of operator metadata and lookup tables.
question: Does the 280 MB PyTorch model fit within a 90 MB OTA asset budget after INT8 conversion and runtime overhead?
details:
  realistic_solution: 'The quantized weights are 280 / 4 = 70 MB. Adding 18 MB metadata gives 88 MB, which fits within 90 MB with only 2 MB headroom. The release should still account for compression variance and signatures.'
  common_mistake: |
    **The Pitfall:** Evaluating OTA budgets based strictly on theoretical weight compression.
    **The Rationale:** Forgetting to account for the mobile runtime metadata, lookup tables, and packaging overhead.
    **The Consequence:** Generating OTA payloads that consistently exceed network transmission or local storage constraints.
  napkin_math: |
    **Assumptions & Constraints:**
    - Original model: 280 MB.
    - INT8 compression: 4x reduction.
    - Runtime metadata: 18 MB.
    - OTA budget: 90 MB.

    **Calculations:**
    - Quantized weights = 280 MB / 4 = 70 MB.
    - Total package size = 70 MB + 18 MB = 88 MB.
    - Headroom = 90 MB - 88 MB = 2 MB.

    **Conclusion & Interpretation:**
    - **Result: Fits within 90 MB budget with 2 MB headroom (Storage-Bound).**
