title: Mobile Model Conversion Size Budget
scenario: A PyTorch model is 280 MB, and the team uses a planning rule that INT8 conversion
  reduces the weight payload by about 4x. The mobile runtime also adds 18 MB of operator
  metadata and lookup tables. Determine whether it fits a 90 MB OTA asset budget.
question: Does a 280 MB PyTorch model fit a 90 MB OTA budget after 4x INT8 reduction
  plus 18 MB metadata?
details:
  realistic_solution: The quantized weights are 280 / 4 = 70 MB. Adding 18 MB metadata
    gives 88 MB, which fits within 90 MB with only 2 MB headroom. The release should
    still account for compression variance and signatures.
  common_mistake: Applying the 4x reduction and forgetting metadata, packaging, or
    code-signing overhead.
  napkin_math: 280/4 = 70 MB. Total = 70 + 18 = 88 MB. Headroom = 2 MB.
