title: Fairness Evaluation Under Sample Size Constraints on Mobile
scenario: A mobile health app's on-device sleep quality classifier achieves 88% accuracy overall. You want to evaluate demographic parity across 8 age groups × 2 sex categories = 16 intersectional cells. The evaluation dataset has 3,200 labeled samples.
question: "How would you calculate the statistical power for detecting a 5pp accuracy gap between cells, and determine the minimum dataset size needed for a valid fairness audit?"
details:
  realistic_solution: 'Per-cell sample size for two-proportion z-test: n = (z_α/2
    + z_β)² × (p1(1-p1) + p2(1-p2)) / (p1-p2)². With p1=0.88, p2=0.83, α=0.05, β=0.2:
    n ≈ (1.96+0.84)² × (0.106+0.141) / 0.0025 = 7.84 × 0.247 / 0.0025 ≈ 775 per cell.
    For 16 cells: 775 × 16 = 12,400 minimum samples assuming balanced cells. Real
    demographic distributions are imbalanced — rare intersections (e.g., elderly non-binary)
    may be <1% of users. Stratified oversampling or synthetic augmentation required.
    For mobile deployment: if in-app collection, design evaluation data collection
    with stratified sampling targeting 800 samples per cell.'
  common_mistake: |
    **The Pitfall:** Using the overall dataset size for power calculations instead of the per-cell sample size.
    **The Rationale:** Candidates forget that intersectional fairness requires statistical power within the smallest specific demographic segment.
    **The Consequence:** The audit lacks the statistical power to actually detect real disparities, providing a false sense of fairness.
  napkin_math: |
    - Current per-cell size: 3,200 samples / 16 cells = 200.
    - Required size per cell: `n ≈ (1.96 + 0.84)² × (0.106 + 0.141) / 0.0025 ≈ 775`.
    - Current Power: At n=200, P(detect) ≈ 33.7% (will miss 66% of real 5pp disparities).
    - Required Dataset Size: 775 × 16 = **12,400 samples minimum** (assuming perfectly balanced cells, realistically much larger).
