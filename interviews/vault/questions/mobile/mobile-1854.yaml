title: Fairness Evaluation Under Sample Size Constraints on Mobile
scenario: A mobile health app's on-device sleep quality classifier achieves 88% accuracy overall. You want to evaluate demographic parity across 16 intersectional cells. The evaluation dataset has 3,200 labeled samples.
question: How would you calculate the statistical power for detecting a 5pp accuracy gap between cells, and determine the minimum dataset size needed for a valid fairness audit?
details:
  realistic_solution: 'Per-cell sample size for two-proportion z-test: n = (z_α/2 + z_β)² * (p1(1-p1) + p2(1-p2)) / (p1-p2)². With p1=0.88, p2=0.83, α=0.05, β=0.2: n ≈ (1.96+0.84)² * (0.106+0.141) / 0.0025 ≈ 775 per cell. For 16 cells: 775 * 16 = 12,400 minimum samples assuming balanced cells. Real demographic distributions are imbalanced — rare intersections may be <1% of users. Stratified oversampling or synthetic augmentation required. For mobile deployment: design evaluation data collection with stratified sampling targeting 800 samples per cell.'
  common_mistake: |
    **The Pitfall:** Using the overall dataset size for power calculations instead of the per-cell sample size.
    **The Rationale:** Candidates forget that intersectional fairness requires statistical power within the smallest specific demographic segment.
    **The Consequence:** The audit lacks the statistical power to actually detect real disparities, providing a false sense of fairness.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Cells: 16.
       - Current Total Samples: 3,200 (200/cell).
       - Target Effect Size: 5pp gap (p1=0.88, p2=0.83).
       - Power params: α=0.05, β=0.2.
    2. **Calculations:**
       - Required n/cell: ~ (1.96 + 0.84)² * (0.106 + 0.141) / 0.0025 ≈ 775.
       - Total required: 775 * 16 = 12,400 samples.
       - Statistical power at n=200 is only ~33.7%.
    3. **Conclusion & Interpretation:**
       - **Result: Data-Bound.** The audit requires at least 12,400 balanced samples to reliably detect 5pp disparities.
