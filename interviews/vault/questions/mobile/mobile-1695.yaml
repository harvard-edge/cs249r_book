title: Designing an Adversarially Robust Mobile ML System on Snapdragon 8 Gen 3 Hexagon NPU
scenario: You are tasked with designing a real-time image classification system for a critical safety application on a mobile device. The system must maintain high reliability and availability even under sophisticated adversarial attacks.
question: How would you design the system's architecture and defense strategies to guarantee a robust and secure operation within NPU constraints?
details:
  realistic_solution: 'A realistic solution involves a multi-pronged approach: 1. On-device adversarial training with quantization-aware models to embed robustness directly into the NPU-optimized model, potentially using techniques like Projected Gradient Descent (PGD) with efficiency optimizations. 2. Employing input sanitization modules (e.g., denoising autoencoders) specifically tailored to run efficiently on the Hexagon NPU, acting as a first line of defense. 3. Integrating runtime monitoring of NPU performance metrics and model confidence scores to detect suspicious activity, possibly triggering a fallback mechanism or alerting the user. 4. Exploring hardware-level security features of the platform to protect model weights and intermediate activations from extraction or tampering. All these components must be designed to fit within the 45 TOPS INT8 and 12-16 GB LPDDR5X memory budget, prioritizing low-latency inference.'
  common_mistake: |
    **The Pitfall:** Relying on post-hoc defenses without hardware optimization.
    **The Rationale:** Candidates often propose standard adversarial training or complex denoising layers without accounting for the NPU's specific architecture or TOPS limits.
    **The Consequence:** These unoptimized defenses consume excessive memory or compute, destroying real-time latency and making the system unusable.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Hardware: Edge NPU (45 TOPS max, 16GB RAM max).
       - Primary model inference compute: 20 TOPS, 8GB memory footprint.
       - Denoising autoencoder defense compute: 10 TOPS, 1GB memory footprint.
    2. **Calculations:**
       - Total concurrent compute required = 20 TOPS + 10 TOPS = 30 TOPS.
       - Total memory required = 8GB + 1GB = 9GB.
    3. **Conclusion & Interpretation:**
       **Result: Compute-Bound Viability. 30 TOPS and 9GB fit well within the 45 TOPS and 16GB budget, allowing concurrent robust execution without severe latency degradation.**
