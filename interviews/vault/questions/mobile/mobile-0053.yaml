title: The Model Loading I/O Cliff
scenario: 'Your Android app loads a 200 MB on-device LLM from internal storage. On a Pixel 8 Pro (UFS 4.0), the model loads in 180ms. On a Samsung Galaxy A15 (eMMC 5.1), the same model takes 4.2 seconds. The user sees a blank screen for 4 seconds on the budget phone. Both devices have enough RAM.'
question: 'Why is there a 23x difference in load time, and how do you fix the user experience on budget phones?'
details:
  realistic_solution: 'The 23x gap occurs because UFS 4.0 reads at 4,200 MB/s, while eMMC 5.1 degrades heavily with fragmentation. The fix is to mmap() the model into memory instead of doing a full blocking load. The UI renders instantly, and the first inference incurs a minor page fault penalty instead of waiting for the full 200 MB to be parsed.'
  common_mistake: |
    **The Pitfall:** Using a loading spinner and forcing a full RAM load.
    **The Rationale:** Developers test only on flagship hardware and assume blocking I/O is fast enough, disregarding budget phone storage speeds.
    **The Consequence:** 30% of Android users (eMMC devices) experience a 4-second block, leading to massive feature abandonment.
  napkin_math: |
    1. **Storage Speeds:** UFS 4.0 sequential = 4,200 MB/s. eMMC 5.1 sequential = 250 MB/s, degrading to ~50 MB/s when fragmented.
    2. **Load Time:** 200MB / 50 MB/s = **4.0 seconds** on eMMC vs 200MB / 4200 MB/s = **~47ms** on UFS (plus framework overhead).
    3. **mmap() Fix:** mmap avoids loading everything. First inference touches ~20MB of weights. 20MB / 50 MB/s = **400ms** perceived latency for the user instead of 4 seconds.
