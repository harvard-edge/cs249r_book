title: The Model Loading I/O Cliff
scenario: Your Android app loads a 200 MB on-device LLM from storage. On a flagship phone with UFS 4.0 storage, it loads in 180ms. On a budget phone with eMMC 5.1 storage, the exact same model takes 4.2 seconds, resulting in a blank user screen.
question: Why is there a 23x difference in load time, and how do you fix the user experience on budget Android phones?
details:
  realistic_solution: |
    The massive load disparity occurs because UFS 4.0 reads at 4,200 MB/s, while fragmented eMMC 5.1 collapses to ~50 MB/s. To fix this, utilize memory-mapping (mmap()) instead of a full blocking read. The OS lazily pages in only the required weights via page faults, delivering instant UI rendering.
  common_mistake: |
    **The Pitfall:** Executing a blocking full-file load into RAM and covering the latency with a UI spinner.
    **The Rationale:** Developers test exclusively on flagship devices, blindly assuming disk I/O is fast enough globally.
    **The Consequence:** 30% of Android users on budget devices experience a 4-second application freeze, triggering immediate feature abandonment.
  napkin_math: |
    1. **Assumptions & Constraints:** 200 MB Model. UFS 4.0 = 4,200 MB/s. eMMC 5.1 = 50 MB/s (fragmented). First inference touches ~20 MB of weights.
    2. **Calculations:** eMMC full load = 200 MB / 50 MB/s = 4.0 seconds. UFS full load = 200 MB / 4200 MB/s = ~47ms. mmap() lazy load = 20 MB / 50 MB/s = 400ms.
    3. **Conclusion & Interpretation:** **Result: I/O-Bound**. mmap() avoids the 4-second disk read, dropping perceived latency to 400ms.
