title: The Model Loading I/O Cliff
scenario: Your Android app loads a 200 MB on-device LLM from internal storage. On a Pixel 8 Pro (UFS 4.0),
  the model loads in 180ms. On a Samsung Galaxy A15 (eMMC 5.1), the same model takes 4.2 seconds. The
  user sees a blank screen for 4 seconds on the budget phone. Both devices have enough RAM. Why is there
  a 23× difference, and how do you fix the user experience?
details:
  realistic_solution: 'The 23x gap: UFS 4.0 reads at 4,200 MB/s; eMMC 5.1 at 250 MB/s, degrading to ~50
    MB/s with fragmentation. Fix: mmap the model instead of full load. First page fault: 0.1ms. First
    inference touches ~20 MB = 400ms on eMMC (vs 4.2s full load). Subsequent inferences hit cached pages
    at near-zero I/O. Show functional UI immediately while model warms in background. 30% of Android users
    are on eMMC — this is not an edge case.'
  common_mistake: '"Use a loading spinner — the user will wait." A 4-second blank screen causes 25% of
    users to abandon the feature (Google''s research on mobile latency).'
  napkin_math: 'UFS 4.0 sequential: 4,200 MB/s. eMMC 5.1 sequential: 250 MB/s. Ratio: 16.8×. With fragmentation
    on eMMC: 50 MB/s. Ratio: 84×. mmap approach on eMMC: first page fault = 0.1ms. First inference (touches
    ~20 MB of weights): 20 MB / 50 MB/s = 400ms. Subsequent inferences: pages cached in RAM, ~0ms I/O.
    User-perceived latency: 400ms (first inference) vs 4,200ms (full load). Android device market share
    by storage type: UFS 3.0+ = 45%, UFS 2.1 = 25%, eMMC = 30%. **30% of your users hit the slow path.**'
