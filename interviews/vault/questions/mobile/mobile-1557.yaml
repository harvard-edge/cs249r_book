title: Optimizing On-Device ML Inference Latency on Samsung Exynos 2400 NPU for Mobile
  Applications
scenario: Your team is deploying a real-time object detection model on a mobile device
  powered by the Samsung Exynos 2400 NPU (34.7 TOPS, 12 GB LPDDR5X). The current end-to-end
  latency for processing a single camera frame is 150ms, which is significantly above
  the target of 50ms for a smooth user experience. Your task is to analyze the latency
  profile, identify bottlenecks, and propose optimization strategies.
question: How would you decompose and optimize end-to-end Exynos 2400 NPU inference
  latency for a mobile app?
details:
  realistic_solution: 'A robust solution involves breaking down the end-to-end latency
    into its core components: Camera Frame Acquisition (TTFT), Preprocessing (CPU/GPU),
    Model Inference (NPU), Postprocessing (CPU/GPU), and Rendering/Display. Utilize
    profiling tools (e.g., Android Systrace, NPU SDK profilers) to accurately measure
    each component. Based on the measurements, prioritize optimization efforts. For
    example, if preprocessing takes 40ms, focus on optimizing image resizing, normalization,
    or format conversion using NPU-accelerated operations or more efficient CPU/GPU
    kernels. If NPU inference is 80ms, explore model quantization (e.g., INT8), pruning,
    or architecture search tailored for the Exynos 2400. Optimize data transfer between
    RAM and NPU/CPU. For postprocessing, leverage vectorization or NPU/GPU acceleration
    for NMS or result parsing. Consider using dedicated low-latency pipelines for
    critical components.'
  common_mistake: Candidates often jump directly to model optimization (e.g., quantization,
    pruning) without first thoroughly decomposing the latency and understanding where
    the majority of the time is spent. They might overlook significant overheads in
    data transfer, preprocessing, or postprocessing on the CPU, assuming the NPU is
    the sole bottleneck.
  napkin_math: 'Given the target latency of 50ms and the current 150ms, a 3x reduction
    is needed. The current breakdown is roughly: Camera (10ms), Preprocessing (40ms),
    Inference (80ms), Postprocessing (15ms), Rendering (5ms) = 150ms total. The non-inference
    components alone sum to 70ms, so simply reducing inference time cannot reach a
    50ms target. To reach 50ms, all components must be optimized simultaneously: Preprocessing
    must drop from 40ms to ~10ms (4x speedup via NPU-accelerated preprocessing), Inference
    from 80ms to ~20ms (4x speedup via quantization/pruning), Postprocessing from 15ms
    to ~5ms (3x via optimized routines), yielding 10 (Camera) + 10 (Preprocessing)
    + 20 (Inference) + 5 (Postprocessing) + 5 (Rendering) = 50ms. This multi-component
    optimization approach is required.'
