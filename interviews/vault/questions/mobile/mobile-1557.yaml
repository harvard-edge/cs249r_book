title: Optimizing On-Device ML Inference Latency on Samsung Exynos 2400 NPU for Mobile Applications
scenario: Your team is deploying a real-time object detection model on a mobile device powered by the Samsung Exynos 2400 NPU (34.7 TOPS, 12 GB LPDDR5X). The current end-to-end latency for processing a single camera frame is 150ms, which is significantly above the target of 50ms for a smooth user experience.
question: How would you decompose and optimize end-to-end Exynos 2400 NPU inference latency for a mobile app?
details:
  realistic_solution: 'A robust solution involves breaking down the end-to-end latency into its core components: Camera Frame Acquisition (TTFT), Preprocessing (CPU/GPU), Model Inference (NPU), Postprocessing (CPU/GPU), and Rendering/Display. Utilize profiling tools (e.g., Android Systrace, NPU SDK profilers) to accurately measure each component. Based on the measurements, prioritize optimization efforts. For example, if preprocessing takes 40ms, focus on optimizing image resizing, normalization, or format conversion using NPU-accelerated operations or more efficient CPU/GPU kernels. If NPU inference is 80ms, explore model quantization (e.g., INT8), pruning, or architecture search tailored for the Exynos 2400. Optimize data transfer between RAM and NPU/CPU. For postprocessing, leverage vectorization or NPU/GPU acceleration for NMS or result parsing. Consider using dedicated low-latency pipelines for critical components.'
  common_mistake: |
    **The Pitfall:** Jumping directly to model optimization without decomposing latency.
    **The Rationale:** Candidates assume the NPU inference time is the sole bottleneck.
    **The Consequence:** Significant overheads in CPU preprocessing and data transfers are ignored, meaning the 50ms target is never reached even with a perfectly optimized model.
  napkin_math: |
    - **Current Breakdown:** Camera (10ms) + Pre (40ms) + Inference (80ms) + Post (15ms) + Render (5ms) = **150ms**.
    - **Non-Inference Baseline:** 10 + 40 + 15 + 5 = **70ms** (Already > 50ms target).
    - **Optimization Plan:**
      - **Preprocessing:** 4x speedup via NPU = 10ms.
      - **Inference:** 4x speedup via INT8 = 20ms.
      - **Postprocessing:** 3x speedup via vectorization = 5ms.
    - **Target Breakdown:** 10 (Camera) + 10 (Pre) + 20 (Inf) + 5 (Post) + 5 (Render) = **50ms**.
