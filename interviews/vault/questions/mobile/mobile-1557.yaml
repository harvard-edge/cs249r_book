title: Optimizing On-Device ML Inference Latency on Samsung Exynos 2400 NPU for Mobile Applications
scenario: Your team is deploying a real-time object detection model on a mobile device powered by the Samsung Exynos 2400 NPU. The current end-to-end latency for processing a single camera frame is 150ms, which is significantly above the target of 50ms for a smooth user experience.
question: How would you decompose and optimize end-to-end Exynos 2400 NPU inference latency for a mobile app?
details:
  realistic_solution: 'Decompose the end-to-end latency into core components: Camera TTFT, Preprocessing, Model Inference, Postprocessing, and Rendering. Use Android Systrace for profiling. Accelerate preprocessing using NPU operations, apply INT8 quantization, and vectorize postprocessing to eliminate heterogeneous pipeline stalls.'
  common_mistake: |
    **The Pitfall:** Jumping directly to model optimization without decomposing latency.
    **The Rationale:** Candidates assume the NPU inference time is the sole bottleneck.
    **The Consequence:** Significant overheads in CPU preprocessing and data transfers are ignored, meaning the 50ms target is never reached even with a perfectly optimized model.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Current Latency: 150 ms (10ms Camera + 40ms Pre + 80ms Inference + 15ms Post + 5ms Render).
       - Target Latency: 50 ms.
    2. **Calculations:**
       - Non-Inference Baseline: 10 + 40 + 15 + 5 = 70 ms (Already > 50ms).
       - NPU Preprocessing Acceleration: 40 ms -> 10 ms (4x speedup).
       - INT8 Quantization: 80 ms -> 20 ms (4x speedup).
       - Vectorized Postprocessing: 15 ms -> 5 ms (3x speedup).
       - Optimized Total: 10 + 10 + 20 + 5 + 5 = 50 ms.
    3. **Conclusion & Interpretation:**
       - **Result: 50 ms end-to-end latency.**
       - **Bottleneck: Pipeline-Bound** (Focusing solely on the NPU inference ignores the 70ms pipeline overhead, requiring holistic heterogeneous optimization).
