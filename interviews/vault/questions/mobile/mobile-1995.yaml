title: ARKit Priority Queuing Tail Latency
scenario: 'An Apple A17 Pro runs ARKit tasks: Hand Tracking (needs 60fps) and Plane
  Detection (runs at 10fps, takes 50 ms per frame) on a shared queue. The OS preemption
  cost is 800 us (cache flush + context switch), and the SoC enters thermal throttling
  after 12 minutes of sustained ANE use, dropping effective per-frame compute by
  18%. Both the Hand Tracking and Plane Detection threads share thermal budget.'
question: Analyze the tail latency for Hand Tracking under (a) FIFO vs (b) priority-with-preemption
  queueing, including the OS preemption cost and the post-12-minute thermal throttling.
  Identify under which conditions priority-with-preemption still meets the 16.6
  ms 60 FPS deadline.
details:
  realistic_solution: In a FIFO queue, if a Hand Tracking request arrives just after
    a Plane Detection request, it is blocked for 50ms. Hand Tracking requires <16ms
    latency for 60fps, meaning it drops 3 consecutive frames, ruining the UI experience.
    A priority queue pre-empts or places the Hand Tracking request ahead of Plane
    Detection, ensuring it processes immediately and meets the 16ms deadline.
  common_mistake: Treating all ML models as having equal importance, leading to visually
    critical UI updates stalling behind heavy, slow background tasks.
  napkin_math: 50ms block / 16.6ms per frame = 3 frames dropped.
