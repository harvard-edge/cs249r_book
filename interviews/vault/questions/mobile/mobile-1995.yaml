title: ARKit Priority Queuing Tail Latency
scenario: 'An Apple A17 Pro runs ARKit tasks: Hand Tracking (needs 60fps) and Plane Detection (runs at 10fps, takes 50 ms per frame) on a shared queue. The OS preemption cost is 800 us, and thermal throttling drops effective compute by 18%.'
question: Analyze the tail latency for Hand Tracking under (a) FIFO vs (b) priority-with-preemption queueing, including the OS preemption cost and the post-12-minute thermal throttling.
details:
  realistic_solution: 'FIFO scheduling. When a Hand Tracking frame arrives just after a Plane Detection frame begins, it blocks for the remainder of the 50 ms Plane Detection service. Worst-case Hand Tracking tail = ~50 ms (vs the 16.6 ms 60 FPS deadline) - 3 consecutive frames dropped. Cold (pre-12-min) regime: the FIFO tail is 50 ms regardless of preemption cost (FIFO does not preempt). Throttled regime: 18% effective compute drop pushes Plane Detection to 50 / 0.82 = 61 ms, worsening the tail to ~61 ms. Priority-with-preemption. When a Hand Tracking arrival finds Plane Detection mid-flight, the OS preempts it at the next preemption point, paying the 800 us context-switch tax to switch in Hand Tracking. Cold-regime tail = Hand Tracking service (assume ~5 ms) + 0.8 ms preempt = 5.8 ms - meets 16.6 ms with margin. Throttled regime: Hand Tracking now takes 5/0.82 = 6.1 ms, plus 0.8 ms preempt = 6.9 ms - still inside the 16.6 ms deadline. Priority preemption holds the deadline both before and after thermal throttle, while FIFO fails in both regimes. The 800 us tax is small relative to the 16.6 ms budget (~5%) so preemption is the unambiguous win.'
  common_mistake: |
    **The Pitfall:** Computing only the FIFO blocking case and missing the scaling effect of thermal throttling.
    **The Rationale:** Candidates forget that priority queues with preemption incur a context-switch tax, and that throttling scales all service times.
    **The Consequence:** An inaccurate tail latency calculation that misrepresents whether the system meets the 16.6 ms deadline.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Hand Tracking deadline = 16.6 ms (60 fps)
       - Hand Tracking compute = 5 ms
       - Plane Detection compute = 50 ms
       - Throttling factor = 0.82 (18% drop)
       - Preemption cost = 0.8 ms
    2. **Calculations:**
       - FIFO Tail (Throttled) = 50 ms / 0.82 = ~61.0 ms
       - Priority + Preempt (Throttled) = (5 ms / 0.82) + 0.8 ms = 6.1 ms + 0.8 ms = 6.9 ms
    3. **Conclusion & Interpretation:**
       - **Result: Priority Preemption Required. Priority queueing with preemption restricts tail latency to 6.9 ms under thermal throttling, safely beating the 16.6 ms deadline, whereas FIFO severely fails.**
