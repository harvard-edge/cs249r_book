title: Always-On Video NPU Power Optimization
scenario: You are designing an always-on ambient computing system that processes continuous video streams on a mobile device. The workload requires 15 TOPS of continuous INT8 compute on the NPU. The entire SoC operates under a strict continuous thermal and power cap to avoid throttling and preserve battery life.
question: How would you optimize power for always-on video analytics by pacing NPU work instead of racing to idle?
details:
  realistic_solution: 'For continuous workloads, a ''pace-to-target'' approach is superior due to the non-linear relationship in the CMOS power equation (P ∝ V²f). The architecture should dynamically lock the NPU to the lowest DVFS P-state that meets the 15 TOPS requirement, allowing for a voltage drop that provides a quadratic reduction in power. Additionally, the design must utilize the NPU''s tightly coupled memory (TCM) and a zero-copy pipeline from the ISP to minimize power-hungry external memory transactions.'
  common_mistake: |
    **The Pitfall:** Assuming "race-to-sleep" is the most power-efficient strategy.
    **The Rationale:** Candidates often believe running at max frequency to finish early saves power, treating NPU power in isolation.
    **The Consequence:** They ignore the CMOS power equation (P ∝ V²f) and the substantial power tax of memory accesses, resulting in architectures that breach continuous power caps.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Peak Performance: 45 TOPS INT8 at ~3.0W (max P-state, 1.0V).
       - Target Throughput: 15 TOPS (1/3 of peak frequency).
       - Memory Bandwidth Required: 1.5 GB/s.
       - Memory Power Efficiency: ~100 mW per GB/s.
       - Target Total Cap: 1.5W.
    2. **Calculations:**
       - Power with voltage scaling: 3.0W * (1/3) * (0.8/1.0)² ≈ 640 mW.
       - Memory power: 1.5 GB/s * 100 mW/(GB/s) = 150 mW.
       - Total power: 640 mW (NPU) + 150 mW (Mem) + 200 mW (overhead) = 990 mW.
    3. **Conclusion & Interpretation:**
       - **Result: Power-Bound.** Scaling frequency/voltage dynamically keeps power safely at 990 mW, well under the 1.5W cap.
