title: 'Network Bandwidth Bottlenecks: Evaluate On-Device vs. Cloud for Bandwidth-Constrained Mobile Users'
scenario: A mobile app team evaluates on-device inference (Snapdragon 8 Gen 3, 3B INT4 LLM, 19.5ms TPOT)
  vs. cloud inference (H100 API, 7.8ms TPOT) for users on a 5G network. The cloud inference requires uploading
  the prompt (~512 tokens × 4B = 2KB) and downloading the response (~128 tokens × 4B = 512B). At various
  network conditions (5G mmWave 4Gbps, 5G sub-6 200Mbps, 4G LTE 50Mbps), compare E2E latency.
question: "How do end-to-end latencies for on-device and cloud LLM inference compare across 5G and LTE network conditions?"
details:
  realistic_solution: 'Prompt upload: 2KB + response download: 512B = 2.5KB total transfer. Transfer time
    even at LTE: 2.5KB/50Mbps=0.4ms (negligible). Network latency dominates: mmWave RTT=10ms, sub-6=30ms,
    LTE=50ms. Cloud: E2E = RTT + prefill(27ms at H100) + decode(128×7.8ms=998ms) = RTT+1025ms. On-device:
    128×19.5ms=2496ms. Cloud at mmWave: 10+1025=1035ms. Cloud at LTE: 50+1025=1075ms. On-device: 2496ms.
    Cloud wins by 2.4×! Even at LTE. But on-device works offline and has no API cost.'
  common_mistake: Computing network time as data_size / bandwidth and adding to TPOT; missing that 5G
    latency includes RTT (10ms mmWave, 30ms sub-6, 50ms LTE) independent of throughput.
  napkin_math: 'Cloud: 128 tokens × 7.8ms + RTT + 27ms prefill = 998+RTT+27 = 1025+RTT. On-device: 128×19.5=2496ms.
    Cloud at 5G sub-6 (30ms RTT): 1055ms. On-device: 2496ms. Cloud 2.36× faster. At 4G LTE (50ms): 1075ms
    vs 2496ms. Cloud still 2.3× faster. On-device advantage: privacy, offline, no API cost. Bandwidth
    for transfer: 2.5KB even at 1Mbps = 20ms. Negligible vs RTT.'
