title: NPU Sparsity Optimization for 4K Video
scenario: You are deploying an advanced computational photography pipeline using a dense INT8 CNN on the
  Samsung Exynos 2400 NPU to process 4K video at 30 FPS. The model requires 1.2 TOPS per frame. The Exynos
  2400's dual-core NPU provides 34.7 TOPS and shares 12 GB of LPDDR5X memory with the CPU, GPU, and ISP.
  Evaluate the tradeoffs between applying 50% unstructured pruning versus 2:4 structured sparsity to achieve
  the 30 FPS target, considering the NPU's architecture and the shared memory system.
question: "How should sparsity be applied for 4K video inference so the mobile NPU actually speeds up?"
details:
  realistic_solution: An L5 engineer will evaluate and recommend 2:4 structured sparsity or hardware-aware
    block pruning. Modern NPUs increasingly support 2:4 structured sparsity at the silicon level, which
    effectively skips MAC operations for zero-weights and compresses the weight footprint. This reduces
    both the compute bottleneck and the load on the shared LPDDR5X memory, preventing contention with
    the concurrent ISP and GPU workloads.
  common_mistake: Candidates often suggest 50% unstructured pruning, assuming it halves the compute requirements.
    However, mobile NPUs like the Exynos 2400 typically lack hardware support for unstructured sparsity,
    meaning the NPU will still execute dense matrix multiplications, yielding zero latency improvement
    and potentially increasing memory access overhead.
  napkin_math: 'Dense compute required: 1.2 TOPS/frame * 30 FPS = 36 TOPS. Exynos 2400 NPU peak capacity:
    34.7 TOPS (Dense model exceeds 100% utilization, causing frame drops). With 2:4 structured sparsity
    (50% reduction): Effective compute becomes 0.6 TOPS/frame. New throughput requirement: 0.6 TOPS/frame
    * 30 FPS = 18 TOPS. NPU Utilization: 18 / 34.7 = 51.8%, leaving roughly 16.7 TOPS of headroom for
    other tasks.'
