title: 'Mobile Transformer Cost Specification: Design Multi-Task Mobile LLM System'
scenario: Specify the model architecture and memory allocation for a multi-task on-device AI system on Snapdragon 8 Gen 3 (16GB, 77GB/s). Tasks: (1) always-on keyword spotting (P99 < 10ms), (2) on-demand chat assistant (P99 < 3s for 100 tokens), (3) document summarization (P99 < 10s for 500 tokens).
question: Which model and memory allocation let keyword spotting, chat, and summarization meet SLOs simultaneously on Snapdragon 8 Gen 3?
details:
  realistic_solution: 'Memory: 16GB - 4GB OS = 12GB available. Task 1 (keyword spotting): tiny model, 10ms P99. Need <10ms total. Streaming audio: CNN 1M params INT8 = 1MB. Inference: 1MB/77GB/s=0.013ms. Fits in always-on DSP (not LPDDR5 bandwidth). Dedicated to audio DSP. Task 2 (chat): 3B INT4 = 1.5GB. 100 toks: 1.5/77*100=1.948s < 3s ✓. Task 3 (summarization): 500 tokens: 1.5/77*500=9.74s < 10s ✓. Same 3B model serves tasks 2+3! Memory: 1MB (keyword) + 1.5GB (3B) + KV cache (2K context, ~65MB) = 1.565GB. 12-1.565=10.4GB free. Total: 1.565GB for all three tasks. Specification: single 3B INT4 model, keyword DSP model, KV cache management.'
  common_mistake: |
    **The Pitfall:** Loading separate models for each task.
    **The Rationale:** Candidates don't consider sharing a single backbone architecture (multi-task model or adapter-based) to save memory.
    **The Consequence:** The system runs out of memory or thrashes when trying to keep all models resident.
  napkin_math: |
    - Memory available: 16GB - 4GB OS = 12GB.
    - Task 1 (KWS): 1MB INT8 on DSP. Inference: 0.013ms (<10ms). ✓
    - Task 2 (Chat): 3B INT4 = 1.5GB. 100 toks: 1.5/77*100 = 1.95s (<3s). ✓
    - Task 3 (Summary): Same 3B model. 500 toks: 1.5/77*500 = 9.74s (<10s). ✓
    - Total Memory: 1MB (KWS) + 1.5GB (3B LLM) + 65MB (KV cache) = 1.566GB.
    - **12GB - 1.566GB = 10.4GB free. Single 3B model serves both text tasks perfectly.**
