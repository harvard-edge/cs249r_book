title: 'Mobile Transformer Cost Specification: Design Multi-Task Mobile LLM System'
scenario: 'Specify the model architecture and memory allocation for a multi-task on-device AI system on a device with 16GB RAM and 77GB/s bandwidth. Tasks: (1) always-on keyword spotting (P99 < 10ms), (2) on-demand chat assistant (P99 < 3s for 100 tokens), (3) document summarization (P99 < 10s for 500 tokens).'
question: Which model architecture and memory allocation allows keyword spotting, chat, and summarization to meet their SLOs simultaneously?
details:
  realistic_solution: Utilize a 1MB INT8 CNN dedicated to the audio DSP for keyword spotting, completely bypassing main memory. For the heavy NLP tasks, share a single 3B parameter INT4 backbone model (1.5GB) to serve both chat and summarization sequentially. This shared architecture prevents memory thrashing and easily satisfies the 10s SLO.
  common_mistake: |
    **The Pitfall:** Loading entirely separate LLMs into memory for chat and summarization.
    **The Rationale:** Candidates do not consider sharing a single backbone architecture (multi-task model or adapter-based LoRA) to economize unified memory.
    **The Consequence:** The system runs out of memory (OOM) or thrashes constantly when trying to keep multiple redundant models resident.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Total RAM: 16 GB (OS takes 4 GB; 12 GB available).
       - 3B INT4 Model: 1.5 GB.
       - KV Cache: ~65 MB.
       - Bandwidth: 77 GB/s.
    2. **Calculations:**
       - KWS 1MB Model Inference ≈ 0.013ms (< 10ms SLO).
       - 100 Chat tokens = (1.5 GB / 77 GB/s) * 100 = 1.95s (< 3s SLO).
       - 500 Summary tokens = (1.5 GB / 77 GB/s) * 500 = 9.74s (< 10s SLO).
       - Total Memory = 1 MB + 1.5 GB + 65 MB = 1.566 GB.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound (Capacity).** 12 GB - 1.566 GB = 10.4 GB free. A single shared 3B model serves both text tasks perfectly within constraints.
