title: 'Fault Tolerance: Specification — Reliability SLA for Mobile Payment ML Model'
scenario: Write the reliability specification for an on-device fraud detection ML model on A17 Pro (35 TOPS Neural Engine, 8GB RAM) used in a mobile payment app serving 5M transactions/day.
question: "What reliability SLA should govern an on-device payment fraud model, including RTO, RPO, fail-safe behavior, and checkpoints?"
details:
  realistic_solution: 'Payment context: fail-safe = allow transaction (not block). Model failure should never block payment. SLAs: RTO < 500ms (transaction timeout), RPO = 0 (base model always available, LoRA is enhancement only), accuracy SLA = > 95% precision on fraud class.'
  common_mistake: |
    **The Pitfall:** Failing to specify fail-safe behavior or distinguishing between model failure and system crashes.
    **The Rationale:** Candidates focus entirely on ML metrics and forget that a broken model in a payment app cannot block the transaction flow.
    **The Consequence:** A model crash or OOM error prevents millions of users from paying, destroying business revenue.
  napkin_math: |
    - **Transaction Rate:** 5M/day = **~58 transactions/sec**.
    - **RTO / Timeout:** 500ms max payment timeout. Fallback to rule-based system takes < 1ms.
    - **RPO:** 0. The base 500MB model is immutable and always available. LoRA checkpoint (4MB) loss is non-critical.
    - **SLA Violation Rate:** < 0.1% false positive rate = **< 5,000 blocked good transactions/day**.
