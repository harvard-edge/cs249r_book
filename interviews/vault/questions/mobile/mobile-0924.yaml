title: 'Fault Tolerance: Specification — Reliability SLA for Mobile Payment ML Model'
scenario: Write the reliability specification for an on-device fraud detection ML model used in a mobile payment app serving 5M transactions/day.
question: "What reliability SLA should govern an on-device payment fraud model, including RTO, RPO, fail-safe behavior, and checkpoints?"
details:
  realistic_solution: 'Implement a fail-open transaction architecture. Model inference failure must degrade gracefully to rule-based heuristics without blocking the payment gateway. Establish SLAs: RTO < 500ms (strict payment timeout boundary), RPO = 0 (immutable base model via local storage, ephemeral LoRA adapters), and maintain > 95% precision on the fraud class to minimize false positives.'
  common_mistake: |
    **The Pitfall:** Failing to specify fail-safe behavior or distinguishing between model failure and system crashes.
    **The Rationale:** Candidates focus entirely on ML metrics and forget that a broken model in a payment app cannot block the transaction flow.
    **The Consequence:** A model crash or OOM error prevents millions of users from paying, destroying business revenue.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Transaction Rate: 5M/day.
       - Maximum payment timeout (RTO): 500ms.
       - Fallback latency: < 1ms for rule-based heuristics.
       - False positive constraint: < 0.1%.
    2. **Calculations:**
       - 5,000,000 transactions / 86,400 seconds = ~58 transactions/sec.
       - 5,000,000 * 0.001 = 5,000 maximally allowed blocked valid transactions per day.
    3. **Conclusion & Interpretation:**
       - **Result: SLA-Bound**. The system must strictly enforce the 500ms RTO and fail-open policy; an ML crash blocking 5M transactions destroys business revenue.
