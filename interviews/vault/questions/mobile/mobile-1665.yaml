title: Canary Rollout Strategy for ML Model on Snapdragon 8 Gen 3 Hexagon NPU
scenario: You are leading the deployment of a new version of a critical on-device
  ML model for a popular mobile application. This model runs on phones equipped with
  the Snapdragon 8 Gen 3 Hexagon NPU (45 TOPS INT8, 12-16 GB LPDDR5X). The new model
  offers improved accuracy but has a 15% larger footprint and requires 20% more INT8
  operations per inference compared to the current production model. Design a phased
  canary rollout strategy to thoroughly evaluate the new model's performance and stability.
  Specifically, how would you determine the initial canary traffic percentage, and
  what NPU-centric metrics would you monitor? Provide a formula or calculation to
  justify your initial canary traffic percentage, assuming a need to detect a 5% increase
  in inference latency and a 10% increase in NPU utilization in the canary group with
  statistical significance (e.g., 95% confidence, 80% power), given typical operational
  variability.
question: Specifically, how would you determine the initial canary traffic percentage,
  and what NPU-centric metrics would you monitor?
details:
  realistic_solution: Implement a multi-stage canary release, starting with a small
    internal dogfooding group (e.g., 0.1% of employees), then progressing to a statistically
    significant external user group (e.g., 1-5% of total users). Utilize an on-device
    telemetry agent to capture detailed metrics such as inference latency (p50, p90,
    p99), NPU core utilization, memory footprint (LPDDR5X usage), device temperature,
    and battery consumption rates for both control and canary groups. Establish A/B
    testing infrastructure to ensure proper randomization and metric collection. Define
    clear, pre-set guardrails for these metrics (e.g., less than 5% increase in p90
    latency, less than 10% increase in average NPU utilization above baseline). Automate
    a rollback to the previous model version if any critical metric breaches these
    thresholds within a defined observation period. The initial canary size should
    be calculated to provide sufficient statistical power to detect meaningful regressions
    for key metrics.
  common_mistake: Failing to establish quantifiable, device-specific performance thresholds
    (e.g., NPU temperature, clock throttling, battery impact) for rollback, or relying
    solely on cloud-side metrics (e.g., API error rates) which do not fully capture
    on-device user experience degradation. Another common mistake is insufficient
    sample size in the canary group, leading to undetected issues or false positives
    due to high variance or low statistical power.
  napkin_math: 'To determine the minimum sample size (`n`) required per group (control
    and canary) to detect a statistically significant increase in a metric like inference
    latency, a common statistical power formula for comparing two means (one-sided
    test) can be used:


    `n = ( (Z_α + Z_β)^2 * (σ1² + σ2²) ) / δ²`


    Where:

    - `Z_α`: Z-score for the desired confidence level (e.g., 1.645 for 95% confidence
    in a one-sided test for an increase).

    - `Z_β`: Z-score for the desired statistical power (e.g., 0.84 for 80% power).

    - `σ1`, `σ2`: Standard deviations of the latency in the control and canary groups,
    respectively. (Assuming `σ1 = σ2 = σ` for simplicity).

    - `δ`: The minimum detectable effect size (e.g., 5% of baseline latency).


    Let''s assume the following hypothetical values for inference latency on the Snapdragon
    8 Gen 3 Hexagon NPU:

    - Baseline average inference latency (`μ_baseline`) = `80 ms`.

    - Standard deviation of latency (`σ`) = `15 ms`.


    To detect a 5% increase in latency, the minimum detectable effect size `δ` would
    be: `0.05 * 80 ms = 4 ms`.


    Now, plug these values into the formula:

    `n = ( (1.645 + 0.84)^2 * (15² + 15²) ) / 4²`

    `n = ( 2.485^2 * (225 + 225) ) / 16`

    `n = ( 6.175225 * 450 ) / 16`

    `n = 2778.85125 / 16`

    `n ≈ 173.68`


    Thus, you would need approximately `174 devices` in each of the control and canary
    groups. If your total active user base is, for example, `100,000 devices`, your
    initial canary traffic percentage would be `(174 / 100,000) * 100% ≈ 0.174%`.
    This calculation should be performed for all critical metrics (e.g., NPU utilization),
    and the largest resulting `n` should be chosen to ensure sufficient statistical
    power across the board.'
