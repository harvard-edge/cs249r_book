title: Canary Rollout Strategy for ML Model on Snapdragon 8 Gen 3 Hexagon NPU
scenario: You are leading the deployment of a new version of a critical on-device ML model for a popular mobile application. This model runs on phones equipped with the Snapdragon 8 Gen 3 Hexagon NPU (45 TOPS INT8, 12-16 GB LPDDR5X). The new model offers improved accuracy but has a 15% larger footprint and requires 20% more INT8 operations per inference.
question: "How would you determine the initial canary traffic percentage, and what NPU-centric metrics would you monitor?"
details:
  realistic_solution: Implement a multi-stage canary release, starting with a small internal dogfooding group (e.g., 0.1% of employees), then progressing to a statistically significant external user group (e.g., 1-5% of total users). Utilize an on-device telemetry agent to capture detailed metrics such as inference latency (p50, p90, p99), NPU core utilization, memory footprint (LPDDR5X usage), device temperature, and battery consumption rates for both control and canary groups. Establish A/B testing infrastructure to ensure proper randomization and metric collection. Define clear, pre-set guardrails for these metrics (e.g., less than 5% increase in p90 latency, less than 10% increase in average NPU utilization above baseline). Automate a rollback to the previous model version if any critical metric breaches these thresholds within a defined observation period. The initial canary size should be calculated to provide sufficient statistical power to detect meaningful regressions for key metrics.
  common_mistake: |
    **The Pitfall:** Failing to establish quantifiable, device-specific performance thresholds or relying solely on cloud-side metrics.
    **The Rationale:** Deployment engineers often default to API error rates, ignoring on-device degradation like thermal throttling or battery drain.
    **The Consequence:** The canary rollout succeeds from the server's perspective, but silent battery drain issues are deployed to millions of users.
  napkin_math: |
    **Assumptions & Constraints:**
    - Power Formula: n = ( (Z_α + Z_β)^2 * (σ1² + σ2²) ) / δ²
    - Baseline latency (μ) = 80 ms. Std Dev (σ) = 15 ms.
    - Detectable effect size (δ) for 5% increase = 0.05 * 80 = 4 ms.
    - Z-scores: Z_α (95% conf) = 1.645. Z_β (80% power) = 0.84.

    **Calculations:**
    - n = ( (1.645 + 0.84)^2 * (15² + 15²) ) / 4²
    - n = ( 2.485^2 * 450 ) / 16 = ( 6.175 * 450 ) / 16 = 2778.8 / 16 = 173.68

    **Conclusion & Interpretation:**
    - **Result: ~174 devices (Sample-Bound)**. Require ~174 devices per group. For a 100,000 active user base, canary traffic percentage = (174 / 100,000) * 100 = 0.174%.
