title: The Battery Drain Anomaly
scenario: You are on a team using federated learning to train a 50M parameter language model on user smartphones.
  The training plan is for each device to train for one local epoch and then upload the updated model
  weights to the server. Soon after launch, you receive widespread user complaints of excessive data consumption
  and rapid battery drain during the app's background activity. Your `perfetto` traces show that on-device
  training on the NPU is fast and efficient. What is the most likely cause of the user complaints?
details:
  realistic_solution: The root cause is the communication cost of the model update. Sending the entire
    50M parameter model over the network is prohibitively expensive for a mobile device. Each parameter
    is typically 4 bytes (FP32), resulting in a 200MB upload. Transmitting this much data requires keeping
    the phone's power-hungry 5G/LTE radio active for a prolonged period, which is a major source of battery
    drain. It also consumes a significant chunk of a user's monthly data plan. The solution is to apply
    communication-reduction strategies, such as sending only the gradient diff, using quantization (e.g.,
    FP16 or INT8 for the updates), or employing more advanced techniques like structured or sparse updates
    to drastically reduce the payload size.
  common_mistake: A common mistake is to focus only on the compute aspect of ML. Engineers might assume
    the problem lies with the NPU's power draw during training or that the model is too large for the
    device's RAM. While these can be issues, they often pale in comparison to the cost of communication,
    especially on mobile networks.
  napkin_math: Let's calculate the size of a single update payload.
  options:
  - The model's 2GB memory footprint during training exceeds the app memory budget on most phones, causing
    heavy use of slow flash storage and increasing power draw.
  - The 50M parameter model update is approximately 200MB, and transmitting this large payload over a
    cellular network consumes excessive energy and data.
  - The Apple A17 Pro's NPU is inefficient at training, and the power consumed during the single local
    epoch is draining the battery.
  - The federated learning server is experiencing high latency, forcing the mobile device to maintain
    an open, power-draining network connection while waiting for acknowledgment.
  correct_index: 1
