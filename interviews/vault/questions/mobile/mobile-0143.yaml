title: The Privacy Wall
scenario: Your team has shipped a new on-device camera feature to 10 million users. You suspect a silent
  accuracy degradation is occurring on a specific new phone model, but you cannot get ground truth labels
  from users. You decide to use federated analytics to monitor the distribution of the model's output
  logits across the fleet. What is the primary reason you must use a privacy-preserving technique like
  federated analytics instead of simply logging raw camera images and sending them to your servers for
  analysis?
details:
  realistic_solution: The primary reason is user privacy. Logging and uploading raw, potentially sensitive
    user data (like photos) without explicit, specific, and ongoing consent is a major privacy violation
    and can break data protection laws (e.g., GDPR, CCPA) and erode user trust. Federated analytics is
    a technique specifically designed to gather aggregate insights from a device fleet *without* exposing
    or centralizing raw user data, thus respecting privacy by design.
  common_mistake: Engineers often focus on the technical constraints, such as network bandwidth or battery
    life. While these are valid concerns, they are secondary to the absolute product and legal requirement
    to protect user privacy. It's not just technically hard; it's fundamentally disallowed.
  napkin_math: 10M users * 5 inferences/day = 50M images/day. Image size = 250KB. Total daily data = 50M
    * 250KB = 12.5 TB/day. Over a year, that's 4.5 PB of user photos. Transmitting 12.5 TB/day from phones
    costs cellular bandwidth and massive AWS S3 costs (~$8,000/month just for storage), making federated
    analytics a necessity.
  options:
  - The daily cellular data usage would be too expensive for users.
  - The constant network requests would drain the device's battery too quickly.
  - Uploading raw user data is a major privacy violation and breaks user trust.
  - The on-device storage is insufficient to buffer the image logs before uploading.
  correct_index: 2
