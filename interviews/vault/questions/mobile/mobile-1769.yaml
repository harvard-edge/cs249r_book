title: 'On-Device Coreset Selection for Gemini Nano'
scenario: 'A mobile team personalizes a 1.8B parameter model directly on the Google Tensor G3. The background process is strictly limited to a 50 MB replay buffer out of the 12 GB LPDDR5X memory pool, and 1 hour of TPU time at 7.5 TOPS for weekly fine-tuning. The system collects 1,000,000 user interaction logs (500 bytes each) per week, but using uniform random sampling to fit the 50 MB buffer causes the model to suffer catastrophic forgetting on rare user commands.'
question: 'Why does random pruning cause model collapse under these hardware constraints, and what is the tradeoff of switching to gradient-based coreset selection?'
details:
  realistic_solution: |
    Uniform random sampling preserves the original long-tailed data distribution. In a highly compute-constrained environment, this wastes the TPU's budget on redundant common logs and leaves too few examples of rare commands to provide a meaningful gradient signal. By using coreset selection, the system prioritizes high-information (high-loss) samples, maximizing the Information-Compute Ratio (ICR).
  common_mistake: |
    **The Pitfall:** Suggesting increased buffer size or more training epochs.
    **The Rationale:** Candidates ignore the strict 50 MB memory limit and thermal constraints of the Tensor G3, failing to recognize that random sampling wastes compute on redundant data.
    **The Consequence:** The proposed solution violates device constraints and fails to solve the catastrophic forgetting problem.
  napkin_math: |
    **Assumptions & Constraints:**
    - Buffer Capacity: 50 MB.
    - Log size: 500 bytes.
    - TPU Budget: 7.5 TOPS for 1 hour.
    - Params: 1.8B.

    **Calculations:**
    - Buffer capacity = 50 MB / 500 bytes = 100,000 logs (10% sample rate).
    - TPU Compute Budget = 7.5 TOPS * 3600s = 27 PetaOps.
    - Compute per log (128 tokens) = 128 * (3 * 1.8B) = 0.69 TeraOps.
    - Compute for 100 rare logs = 100 * 0.69 TeraOps = 69 TeraOps (~0.25% budget).

    **Conclusion & Interpretation:**
    - **Result: >99% compute wasted (Compute-Bound)**. The TPU wastes its budget on redundant common tasks.
