title: Mobile Parallel Client Selection
scenario: A mobile FL round needs 20,000 successful client updates. Historical telemetry shows 40% of selected clients start training, and 75% of starters finish before the deadline. Size how many clients to invite.
question: How many mobile clients must be invited to obtain 20,000 completed FL updates if 40% start and 75% of starters finish?
details:
  realistic_solution: The completion probability is 0.40 x 0.75 = 0.30. To get 20,000 completed updates, invite about 20,000 / 0.30 = 66,667 clients. Add extra margin for correlated failures or time-zone effects.
  common_mistake: Inviting 20,000 clients and forgetting start and completion dropout.
  napkin_math: Completion probability = 30%. Invites = 20,000 / 0.30 = 66,667.
