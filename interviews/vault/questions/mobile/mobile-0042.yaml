title: The Federated Keyboard
scenario: You're building a next-word prediction model for a mobile keyboard. The model must improve from
  user typing patterns, but you cannot collect user keystrokes on your servers — that's a privacy violation
  and a regulatory risk. How do you train the model?
question: "How do you train the model?"
details:
  realistic_solution: 'DP-FedAvg: 10K phones train locally, send clipped/noised gradients (5 MB raw, ~62
    KB compressed with top-k sparsification). Server averages 10K updates: noise cancels (effective sigma
    = 0.01). Privacy: epsilon = 2/round, 50 rounds/year = cumulative epsilon 100. Accuracy: ~2% below
    centralized but zero raw keystrokes leave any device. Server bandwidth: 620 MB/round compressed. Key:
    aggregation of many noisy updates recovers signal while individual contributions remain private.'
  common_mistake: '"Anonymize the data before uploading." Anonymization is insufficient — keystroke patterns
    can re-identify users, and regulators (GDPR, CCPA) consider this personal data regardless of anonymization.'
  napkin_math: '10,000 phones per round. Each sends a 5 MB gradient update (clipped + noised). Server
    bandwidth: 50 GB per round. Noise per phone: σ = 1.0, C = 1.0. After averaging 10,000 updates: effective
    noise = σ/√10,000 = 0.01 — negligible. Privacy: ε = 2 per round (strong). 50 rounds/year: total ε
    = 100 (within budget). Accuracy: ~2% worse than centralized training, but zero user data leaves the
    device.'
  options:
  - Deploy the update to all devices simultaneously to minimize the total rollout duration and reduce
    the window of version inconsistency.
  - 'DP-FedAvg: 10K phones train locally, send clipped/noised gradients (5 MB raw, ~62 KB compressed with
    top-k sparsification). Server averages 10K updates: noise cancels (effective sigma = 0.01). Privacy:
    epsilon = 2/round, 50 rounds/year = cumulative epsilon 100.'
  - Anonymize the data before uploading.. Anonymization is insufficient — keystroke patterns can re-identify
    users, and regulators (GDPR, CCPA) consider this personal data regardless of anonymization.
  - The solution is to reduce model complexity until it fits within the hardware constraints, accepting
    the accuracy trade-off as unavoidable.
