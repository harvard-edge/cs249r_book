title: The Federated Keyboard
scenario: You're building a next-word prediction model for a mobile keyboard. The model must improve from user typing patterns, but you cannot collect user keystrokes on your servers.
question: How do you train the model?
details:
  realistic_solution: 'DP-FedAvg: 10K phones train locally, send clipped/noised gradients (5 MB raw, ~62 KB compressed with top-k sparsification). Server averages 10K updates: noise cancels (effective sigma = 0.01). Privacy: epsilon = 2/round, 50 rounds/year = cumulative epsilon 100. Accuracy: ~2% below centralized but zero raw keystrokes leave any device. Server bandwidth: 620 MB/round compressed. Key: aggregation of many noisy updates recovers signal while individual contributions remain private.'
  common_mistake: |
    **The Pitfall:** Anonymizing the data before uploading it to central servers.
    **The Rationale:** Engineers believe removing explicit PII is sufficient for data privacy.
    **The Consequence:** Keystroke patterns can still re-identify users, violating regulations like GDPR and CCPA.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 10,000 devices per round
       - 5 MB update per device
       - DP Noise parameters: $\sigma$ = 1.0, Sensitivity (C) = 1.0
       - Epsilon per round: $\epsilon$ = 2
    2. **Calculations:**
       - Server Bandwidth = 10,000 * 5 MB = 50 GB per round
       - Effective Noise = $\sigma$ / $\sqrt{10,000}$ = 1.0 / 100 = 0.01
       - Annual Privacy Cost (50 rounds) = 50 * 2 = 100 cumulative $\epsilon$
    3. **Conclusion & Interpretation:**
       - **Result: High Utility, Strict Privacy. The aggregation of 10,000 noisy updates drives the effective noise down to 0.01 (recovering the signal) while mathematically bounding privacy leakage.**
