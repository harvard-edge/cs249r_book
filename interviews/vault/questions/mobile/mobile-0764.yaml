title: The Privacy Budget Drain
scenario: A mobile health app uses differential privacy with epsilon=1 per query. The analytics team wants to run 100 on-device queries per day against a user's data. Using basic composition, the daily privacy budget would be epsilon=100, which provides almost no privacy.
question: How does advanced composition improve this, and what is the practical implication for query budgeting?
details:
  realistic_solution: 'Naive composition: total epsilon = 100 x 1 = 100 (no meaningful privacy). Advanced composition (square-root law): total epsilon scales as roughly sqrt(100) x 1 = 10. With Renyi DP accounting, even tighter bounds are achievable. Practical implication: use the moments accountant, batch correlated queries, and set a daily privacy budget (e.g., epsilon=5) that limits total queries.'
  common_mistake: |
    **The Pitfall:** Using naive linear composition to conclude that differential privacy is useless for frequent queries.
    **The Rationale:** Engineers default to simple addition, unaware of advanced bounding theorems like the moments accountant or Renyi DP.
    **The Consequence:** The system is restricted to an artificially low number of queries, destroying feature utility when it could safely support much more.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Base query cost: epsilon = 1.
       - Requirement: 100 queries/day.
    2. **Calculations:**
       - Naive Composition: 100 queries * 1 epsilon = 100 total epsilon.
       - Advanced Composition: sqrt(100 queries) * 1 epsilon = ~10 total epsilon.
    3. **Conclusion & Interpretation:**
       - **Result: Math-Bound.** Advanced composition scales with the square root, tightly bounding privacy loss and safely expanding the daily query budget by an order of magnitude.
