title: Mobile LLM Architecture Tradeoffs on Exynos 2400
scenario: Your team is developing a new AI assistant feature for a high-end smartphone, targeting the Samsung Exynos 2400 NPU (34.7 TOPS, 12 GB LPDDR5X). The feature requires understanding complex user queries and generating concise responses within strict mobile constraints like low latency and minimal power consumption.
question: How would you justify your architectural choice, and what back-of-the-envelope calculations would you perform to validate its feasibility on the Exynos 2400?
details:
  realistic_solution: "A realistic solution involves a staged evaluation: \n1.  **Define Hard Constraints:** Establish strict latency (e.g., <100ms for query understanding, <500ms for response generation) and memory budgets (e.g., model weights + activations < 8-10 GB, leaving room for OS and other apps).\n2.  **Task Decomposition:** For query understanding and concise generation, consider if an encoder-only model can handle the 'understanding' part efficiently, and if generation can be handled by a much smaller, specialized decoder or even a rule-based system for very short responses. \n3.  **Architectural Candidates:**\n    *   **Encoder-Only (e.g., MobileBERT, distilled BERT variant):** Excellent for understanding, classification, and feature extraction. Small footprint, fast inference. \n    *   **Decoder-Only (e.g., tiny Llama/Gemma variant):** Good for generation, but generation is sequential, making latency sensitive to output length. Can be memory-intensive due to KV cache.\n    *   **Encoder-Decoder (e.g., distilled T5, Pegasus):** More flexible for sequence-to-sequence tasks, but typically larger and more complex than encoder-only. \n4.  **Optimization:** Aggressively apply quantization (INT8, INT4 if possible), pruning, and distillation to reduce model size and computational demands. Target models with parameter counts in the range of hundreds of millions to a few billion at most. \n5.  **Benchmarking & Simulation:** Prioritize models that demonstrate good performance-to-parameter ratios. Use profiling tools and NPU-specific SDKs to estimate actual latency and power."
  common_mistake: |
    **The Pitfall:** Deploying a large, general-purpose decoder-only model without considering sequential generation costs.
    **The Rationale:** Developers overlook the fundamental differences in resource utilization between encoder-only, decoder-only, and full encoder-decoder architectures, particularly regarding KV cache memory.
    **The Consequence:** This leads to unacceptable latency, out-of-memory errors, or excessive battery drain due to memory bandwidth bottlenecks.
  napkin_math: |
    1. **Memory Capacity:** A 7B model in FP16 is 14 GB (Exceeds 12 GB RAM). In INT8, it is 7 GB (Feasible, leaves 5 GB for OS/Activations).
    2. **Compute Time (Theoretical):** 0.5 TFLOPS per step / 34.7 TOPS = 14.4 ms per token. 50 tokens = 720 ms generation time.
    3. **Memory Bandwidth:** LPDDR5X is ~70 GB/s. Reading 7 GB weights takes 7 GB / 70 GB/s = 100 ms per step if not cached efficiently.
    4. **KV Cache:** Decoder-only models build a KV cache that scales with sequence length, consuming several GBs and directly competing with weights for bandwidth.
    **Result:** A **small encoder-only or heavily distilled encoder-decoder** model is necessary to avoid the severe **100 ms/token** memory bandwidth bottleneck of large decoder architectures.
