title: Mixed-Precision Footprint on Hexagon NPU
scenario: You are deploying a 1.5 billion parameter transformer model on the Qualcomm Hexagon NPU (Snapdragon 8 Gen 3). The device utilizes a shared 12-16 GB LPDDR5X memory pool across its heterogeneous compute units. To balance generation accuracy and latency, you employ a mixed-precision inference strategy: 300 million parameters in the attention mechanisms are kept in FP16, while the remaining 1.2 billion parameters in the feed-forward networks are quantized to INT8.
question: "What is the exact mixed-precision model weight footprint and the theoretical minimum INT8 compute time per token?"
details:
  realistic_solution: 'Calculate the memory for the FP16 and INT8 partitions separately. Translate the INT8 parameter count into total operations (1 MAC = 2 OPs) and divide by the NPU''s peak 45 TOPS throughput.'
  common_mistake: |
    **The Pitfall:** Forgetting byte conversions and conflating MACs with OPs.
    **The Rationale:** Candidates overlook that FP16 requires 2 bytes per parameter, and frequently fail to multiply MACs by 2 to align with TOPS specifications.
    **The Consequence:** Calculating a severely undersized memory footprint and incorrectly estimating the compute bottleneck.
  napkin_math: |
    - **Memory Footprint:** (300M params * 2 bytes/param for FP16) + (1.2B params * 1 byte/param for INT8) = 600 MB + 1200 MB = 1.8 GB.
    - **Compute Operations:** 1.2B parameters = 1.2B MACs per token. 1.2B MACs * 2 = 2.4 Billion OPs (0.0024 TOPS).
    - **Final Result:** The footprint is **1.8 GB**, and minimum compute time is 0.0024 TOPS / 45 TOPS = **53.33 microseconds**.
