title: 'Dataset Curation: Mastery — Sensor Fusion Dataset Design for On-Device Health Model'
scenario: You are designing training data for an on-device health monitoring model. The model fuses accelerometer, heart rate, and microphone data to detect health events. Design the multi-modal data curation pipeline, synchronization strategy, and privacy-preserving collection protocol.
question: What storage, sync, compute, and privacy plan fits accelerometer, heart-rate, and microphone health data on the target device?
details:
  realistic_solution: 'Sensor sync: timestamp alignment within 10ms. Data: accelerometer 100Hz × 3-axis, HR 1Hz, mic 16kHz → downsample for event detection. Privacy: process on-device, store only aggregated features (not raw audio). Labels: user-confirmed events only.'
  common_mistake: |
    **The Pitfall:** Not accounting for sensor synchronization jitter and treating health data as non-sensitive.
    **The Rationale:** Candidates often apply standard cloud-based data collection without purpose limitation or consideration of clock drift across independent sensor DSPs.
    **The Consequence:** Produces misaligned, low-signal inputs that degrade fusion accuracy and risks severe privacy violations.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Accelerometer: 100Hz × 3-axis × 4B = 1.2KB/sec.
       - HR: 1Hz × 4B = 4B/sec.
       - Mic (raw): 16kHz × 2B = 32KB/sec.
       - Processing event windows only (10-sec windows around anomalies). Assume 10 events/day × 10sec = 100sec.
    2. **Calculations:**
       - 24h raw: acc=103MB, HR=345KB, mic=2.76GB. Total raw/day=2.86GB.
       - Acc window: 100sec × 1.2KB/s = 120KB.
       - Mic MFCC features: 100sec × 40 features × 10Hz = 400KB.
       - HR: 100B.
       - Total per event: 520KB × 10 = 5.2MB/day.
       - 30-day buffer: 156MB.
    3. **Conclusion & Interpretation:**
       - **Result: Storage-Feasible.** 156MB easily fits in device memory for local training.
