title: The Dynamic Shape Recompilation
scenario: You are running a text-to-image diffusion model on iOS using CoreML. The user can select any
  output resolution between 256x256 and 512x512. The NPU is capable of generating an image in 2 seconds.
  However, every time the user changes the resolution slider, the very first generation takes 15 seconds,
  making the app feel incredibly unresponsive. What is CoreML doing during those extra 13 seconds?
details:
  realistic_solution: You are experiencing **JIT (Just-In-Time) Recompilation**. Apple's Neural Engine
    (ANE) and the CoreML framework aggressively optimize model execution graphs for specific, static tensor
    shapes.
  common_mistake: '"It''s allocating more memory for the larger image." Memory allocation takes milliseconds,
    not 13 seconds.'
  napkin_math: 'Diffusion model: 1 billion parameters. Compilation time for a new shape graph: ~12-15
    seconds. Number of possible slider values from 256 to 512: 256 values. If you allowed arbitrary shapes,
    the user would hit a 15-second stall almost every time. By restricting to 3 fixed shapes and pre-warming
    them, the wait time drops to 0 seconds (plus the 2s inference time).'
