title: The Dynamic Shape Recompilation
scenario: You run a text-to-image diffusion model on iOS via CoreML. Users can select any resolution between 256x256 and 512x512. The NPU generates an image in 2 seconds. However, changing the resolution slider causes the next generation to take 15 seconds.
question: What is CoreML doing during those extra 13 seconds?
details:
  realistic_solution: You are experiencing JIT (Just-In-Time) Recompilation. Apple's Neural Engine (ANE) and the CoreML framework aggressively optimize model execution graphs for specific, static tensor shapes.
  common_mistake: |
    **The Pitfall:** Believing the 13 seconds is spent allocating memory for the larger image.
    **The Rationale:** Confusing millisecond-level memory allocation with massive JIT compiler stalls.
    **The Consequence:** Wasting time optimizing memory buffers instead of restricting input tensor shapes to prevent recompilation.
  napkin_math: |
    - JIT compilation for a new shape: ~12-15 seconds.
    - Inference time: 2 seconds.
    - Restricting to 3 fixed pre-warmed shapes drops wait time to 0 seconds.
    - **JIT recompilation causes the 13-second stall; dynamic shapes must be bucketed and pre-warmed.**
