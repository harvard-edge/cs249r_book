title: 'Optimizing Object Detection on Google Tensor G3: Operator Scheduling for MobileNetV3-SSD vs. EfficientDet-Lite'
scenario: 'An ML engineering team is deploying a real-time object detection model on a mobile device. Model A (MobileNetV3-SSD) requires 5 GOPs and 500MB peak intermediate memory. Model B (EfficientDet-Lite) requires 3 GOPs and 350MB peak intermediate memory.'
question: 'How would you optimize execution via operator scheduling, and which model achieves better throughput?'
details:
  realistic_solution: 'While GOPs differ, memory bandwidth dictates mobile FPS. Use TensorFlow Lite memory planner to analyze the computational graph for operator fusion (e.g., Conv-BN-ReLU). Model B''s smaller activation footprint drastically reduces DRAM spilling, making it superior for memory-bound NPUs.'
  common_mistake: |
    **The Pitfall:** Focusing solely on theoretical FLOPS and ignoring intermediate memory traffic.
    **The Rationale:** Candidates assume compute is the only bottleneck without considering the memory bandwidth required to repeatedly move intermediate activation tensors.
    **The Consequence:** The deployed model becomes heavily memory-bound, performing far below its theoretical FPS limit.
  napkin_math: |
    1. **Assumptions & Constraints:**
       * Hardware: 7.5 TOPS, 60 GB/s bandwidth.
       * Model A: 5 GOPs, 500MB intermediate memory. Model B: 3 GOPs, 350MB intermediate memory.
    2. **Calculations:**
       * Model A Max Compute FPS: 7500 GOPS / 5 GOPs = 1500 FPS.
       * Model B Max Compute FPS: 7500 GOPS / 3 GOPs = 2500 FPS.
       * Memory Transfer Delay (Model A, 10 layers): 5000 MB / 60,000 MB/s = 83ms (~12 FPS).
    3. **Conclusion & Interpretation:**
       * **Result: Memory-Bound.** The memory bandwidth bottleneck caps actual performance at ~12 FPS, proving the smaller footprint of Model B is vastly superior.
