title: Evaluating Mixed-Precision ViT on Snapdragon 8 Gen 3
scenario: Your team is deploying a 1B parameter Vision Transformer for real-time video processing on the
  Qualcomm Hexagon NPU (Snapdragon 8 Gen 3). You must choose between pure FP16, pure INT8, and a mixed-precision
  approach (INT8 for linear layers, FP16 for softmax and layer normalization) to achieve 30 FPS. Evaluate
  these alternatives and determine the best deployment strategy, accounting for the NPU's 45 TOPS INT8
  capacity and the shared 12-16 GB LPDDR5X memory system.
question: "How would you evaluate these alternatives and determine the best deployment strategy, accounting for the NPU's 45 TOPS INT8 capacity and the shared 12-16 GB LPDDR5X memory system?"
details:
  realistic_solution: The mixed-precision approach is optimal. Heavy matrix multiplications (QKV projections,
    FFNs) should be quantized to INT8 to leverage the 45 TOPS NPU capacity and halve memory bandwidth
    pressure. Precision-sensitive operations like Softmax, LayerNorm, and attention scores must remain
    in FP16 to preserve model accuracy. This leverages the heterogeneous architecture by mapping INT8
    dense compute to the NPU's tensor accelerators while safely processing FP16 non-linearities without
    bottlenecking the system.
  common_mistake: Candidates often choose pure INT8 solely to maximize the 45 TOPS compute, ignoring that
    operations like Softmax and LayerNorm suffer catastrophic accuracy degradation when quantized to 8-bit
    integers. Alternatively, they may propose pure FP16 without realizing it will severely bottleneck
    the shared memory bandwidth and fall short of the required frame rate.
  napkin_math: 'Compute: A 1B parameter model with 256 tokens per frame requires ~500 GMACs (1 TOPS) per
    frame. At 30 FPS, this is 30 TOPS. The Hexagon NPU provides 45 TOPS in INT8, leaving comfortable headroom.
    In FP16, compute throughput typically halves to ~22.5 TFLOPS, failing the 30 TOPS requirement. Bandwidth:
    1B parameters in FP16 consume 2GB. Streaming these at 30 FPS requires 60 GB/s, fully saturating the
    LPDDR5X bandwidth (~64 GB/s peak) and starving the CPU/GPU. INT8 reduces weights to 1GB, requiring
    only 30 GB/s and making real-time execution feasible.'
