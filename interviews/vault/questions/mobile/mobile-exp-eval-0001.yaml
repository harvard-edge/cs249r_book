title: Evaluating On-Device Data Quality Gates
scenario: You are designing a real-time data quality validation system for a live video processing pipeline
  on the Samsung Exynos 2400 NPU. The pipeline must validate the input frame quality (detecting corruption
  or extreme noise) before inference. Option A uses a lightweight CNN on the 34.7 TOPS dual-core NPU to
  filter bad frames. Option B uses traditional ISP statistics evaluated on the CPU. Evaluate these alternatives,
  considering the shared 12 GB LPDDR5X memory architecture, and recommend the better design.
details:
  realistic_solution: Option B is the better system-level design. The Exynos 2400 shares its LPDDR5X memory
    across the CPU, GPU, ISP, and NPU. By leveraging ISP statistics that are already computed during frame
    capture, you avoid an extra memory read pass. The NPU's compute should be reserved for the main task,
    minimizing redundant data movement.
  common_mistake: Candidates often default to Option A, assuming the 34.7 TOPS NPU has plenty of compute
    for a lightweight model. They ignore the memory bandwidth contention on the shared 12 GB LPDDR5X and
    fail to realize that reading the frame twice (once for validation, once for inference) can starve
    the CPU and ISP.
  napkin_math: An uncompressed 4K 60FPS video stream (3840x2160x3 bytes * 60) requires ~1.5 GB/s of read
    bandwidth. Reading it twice (NPU validation + NPU inference) consumes ~3.0 GB/s. While LPDDR5X has
    high peak bandwidth, sustained 3.0 GB/s read traffic purely for one pipeline, competing with OS, GPU,
    and ISP operations, significantly increases power draw and memory controller contention. Option B
    keeps the validation read bandwidth at 0 GB/s by reusing existing ISP metadata.
