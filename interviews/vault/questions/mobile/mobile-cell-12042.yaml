title: 'MLOps Lifecycle: End-to-End Mobile ML Platform Design for Consumer App'
scenario: 'Design the complete MLOps lifecycle for a consumer photo app with 50M users (70% iOS A-series,
  30% Android Snapdragon). The app uses a 30MB portrait enhancement model. Requirements: A/B test new
  models on 1% of users, personalized models per user segment (5 segments), and < 1-week deployment cycle.
  Quantify storage, bandwidth, and engineering overhead.'
question: "What storage, bandwidth, and engineering overhead come from 10 variants of a 30 MB photo model for 50M users?"
details:
  realistic_solution: '10 variants (5 segments × 2 platforms) × 30MB = 300MB total model storage. A/B
    test: 1% × 50M = 500K users. With 5 quality metrics and 5% effect size: need N=6400 per variant —
    achieved in hours. Bandwidth: full rollout 50M × 30MB = 1.5PB. At $0.045/GB (S3 transfer, negotiated):
    $67,500 per full rollout. Staged: week 1 (5%=2.5M users): 2.5M×30MB=75TB=$3,375. Engineering: ML platform
    team (5 engineers), 0.5 FTE × 5 = 2.5 FTE maintaining 10 pipelines.'
  common_mistake: Designing a single model deployment pipeline without accounting for 5 user segments
    × 2 platform variants = 10 model variants, each needing separate tracking, eval, and deploy.
  napkin_math: 'Storage: 10 variants × 30MB × 5 versions retained = 1.5GB on cloud. Cost: $0.035/month.
    CDN: 50M × 30MB = 1.5PB one-time rollout. At $0.045: $67.5K. Monthly updates: assume 20% users update
    apps each month: 10M × 30MB = 300TB = $13,500/month CDN. Annual: $162K CDN + 2.5 FTE × $200K = $500K
    + $162K = $662K/year total platform cost.'
