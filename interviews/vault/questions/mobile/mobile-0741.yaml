title: The Launch Blocker
scenario: A user downloads your new LLM-powered translation app. Upon first launch, the app shows a spinner for 70 seconds while it prepares the model.
question: Based on the launch timeline, why are you seeing a 95% abandonment rate?
details:
  realistic_solution: 'The architecture has a **Synchronous Dependency on the Critical Path**. The app forces users to wait for sequential download, validation, and compilation before any functionality is available. The fix is a **Progressive Launch Architecture**: ship a tiny fallback model (~3 MB) in the app bundle for instant value, while downloading and compiling the high-quality model in the background.'
  common_mistake: |
    **The Pitfall:** Showing a progress bar instead of a spinner.
    **The Rationale:** Candidates think visual feedback will keep users engaged.
    **The Consequence:** Users still abandon the app because 70 seconds is fundamentally too long, regardless of UI.
  napkin_math: |
    **Assumptions & Constraints:**
    - User Tolerance: Attention span for a new app launch is ~2-5 seconds.
    - Actual Latency: 70 seconds.

    **Calculations:**
    - Abandonment Factor: 70s / 5s = 14x longer than maximum tolerance.

    **Conclusion & Interpretation:**
    - **Result: 14x over tolerance (Latency-Bound)**. A synchronous 70-second launch is effectively a broken app to users.
