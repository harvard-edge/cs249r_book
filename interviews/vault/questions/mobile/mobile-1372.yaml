title: On-Device LLM Sizing for Google Tensor G3
scenario: You are architecting an on-device text summarization feature using a 1.8B
  parameter model (like Gemini Nano) running locally on a Google Tensor G3 device.
  The product requirement dictates processing an 800-token article and generating
  a 200-token summary in under 2 seconds to ensure a seamless user experience. Given
  the Tensor G3's 12 GB of LPDDR5X memory and its on-device TPU rated at 7.5 TOPS,
  design a deployment strategy and estimate the compute and memory bandwidth requirements
  to validate if this architecture can successfully meet the strict latency target.
question: How should Gemini Nano be sized and optimized for Tensor G3 across prefill,
  decode, and memory limits?
details:
  realistic_solution: A senior engineer will recognize that LLM inference is split
    into a compute-bound prefill phase and a memory-bandwidth-bound decode phase.
    They will architect a solution that aggressively quantizes the model weights to
    4-bit (INT4) to minimize both the memory footprint and the sheer volume of data
    transferred from LPDDR5X. They will calculate the required memory bandwidth to
    meet the latency target and realize that standard autoregressive decoding will
    likely exceed the physical capabilities of mobile LPDDR5X, prompting them to propose
    architectural mitigations like speculative decoding or cascading to a cloud endpoint
    for larger generation tasks.
  common_mistake: Candidates often assume the theoretical peak 7.5 TOPS can be fully
    utilized and mistakenly treat token generation (decode) as a compute-bound problem
    rather than a memory-bandwidth-bound problem. They also frequently assume the
    entire 12 GB of RAM is available to the model, ignoring OS overhead, and fail
    to calculate the actual memory bandwidth required to stream weights during autoregressive
    generation.
  napkin_math: '1. Model Footprint: A 1.8B parameter model at 4-bit quantization requires
    ~0.9 GB for weights. The KV cache for 1000 tokens is negligible (~50 MB). This
    safely fits within the 12 GB LPDDR5X alongside the OS.

    2. Prefill Phase (Compute-Bound): Processing the 800-token prompt requires ~2.88
    Tera-operations (800 tokens * 1.8B params * 2 ops/param). The TPU has 7.5 TOPS.
    Assuming 40% practical utilization (3 TOPS), prefill takes 2.88 / 3.0 = ~0.96
    seconds.

    3. Decode Phase (Memory-Bound): Generating 200 tokens sequentially requires reading
    the 0.9 GB weights 200 times. Total data movement = 200 * 0.9 GB = 180 GB.

    4. Latency Target Check: With 2.0s total budget and 0.96s used for prefill, 1.04s
    remains for decode.

    5. Bandwidth Requirement: To move 180 GB in 1.04s, the system needs 180 / 1.04
    = ~173 GB/s memory bandwidth.

    6. Reality Check: Mobile LPDDR5X typically provides ~50-60 GB/s peak bandwidth.
    Thus, decode will actually take 180 GB / 50 GB/s = ~3.6 seconds, bringing total
    latency to ~4.5 seconds. The 2-second target fails, proving advanced techniques
    like speculative decoding are mandatory.'
