id: mobile-0307
title: The On-Device Battery Tax
topic: federated-learning
status: published
provenance: imported
scenario: Your team is considering Federated Learning (FL) to train a new 'smart compose' feature on user
  devices. The process would run once per day while the phone is charging. You measure the training process
  and find it consumes an average of 2 Watts of power and runs for 30 minutes. A typical user's phone
  has a 20 Watt-hour (Wh) battery. Explain the battery cost of this feature and calculate what percentage
  of a full battery charge is consumed by a single FL training round.
details:
  realistic_solution: The on-device training imposes a direct energy cost on the user. We can quantify
    this cost by first calculating the energy consumed and then comparing it to the battery's total capacity.
  common_mistake: Confusing power (Watts, a rate) with energy (Watt-hours, a quantity). Engineers often
    forget to multiply the power draw by the duration of the activity to calculate the total energy consumed.
    They might also miscalculate the time unit conversion (minutes to hours) or dismiss a 'small' percentage
    like 5% as negligible, which is a significant daily cost for a single mobile feature that can impact
    charging speed and device temperature.
  napkin_math: 'Power Draw: 2 W | Training Time: 30 minutes = 0.5 hours | Battery Capacity: 20 Wh'
