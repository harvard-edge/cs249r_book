title: 'The On-Device Memory Diet: Quantization Fundamentals'
topic: quantization-fundamentals
status: published
provenance: imported
scenario: You're trying to fit a 7 billion parameter language model onto a high-end smartphone for an
  on-device feature. The model is currently in FP16 precision. To reduce its memory footprint, you plan
  to quantize it to INT8. Compare the memory requirements for both precisions and calculate the total
  memory savings in gigabytes.
details:
  realistic_solution: FP16 (half-precision float) uses 2 bytes per parameter. INT8 (8-bit integer) uses
    1 byte per parameter. For a 7 billion parameter model, the memory calculation is straightforward.
    The savings come from halving the memory required for the model weights, which is a critical optimization
    for memory-constrained mobile devices.
  common_mistake: Engineers often confuse the memory requirements for different precisions, typically
    assuming FP16 is 4 bytes (like FP32) instead of 2. Another common mistake is to state the final size
    after quantization, or the original size, rather than the amount of memory *saved*.
  napkin_math: 1. **FP16 Memory:** 7B parameters × 2 bytes/parameter = 14 GB
