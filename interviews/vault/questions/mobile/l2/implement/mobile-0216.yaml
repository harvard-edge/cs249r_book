schema_version: 1
id: mobile-0216
title: The Mobile Memory Diet
topic: quantization-fundamentals
status: published
provenance: imported
scenario: You're optimizing a new computer vision model for a mobile app. The model has 15 million parameters
  and is currently stored in FP16 format, occupying 30 MB of storage. To reduce the app's download size,
  your team decides to convert the entire model to INT8. Compare the memory requirements and calculate
  the model's final storage size in megabytes after full INT8 quantization.
details:
  realistic_solution: The calculation is a direct comparison of data type sizes. FP16 (half-precision
    floating-point) uses 16 bits, or 2 bytes, per parameter. INT8 (8-bit integer) uses 8 bits, or 1 byte,
    per parameter. By converting from FP16 to INT8, you are halving the storage requirement for the model
    weights.
  common_mistake: A common mistake is to confuse the savings from FP32-to-INT8 (a 4x reduction) with FP16-to-INT8.
    Engineers sometimes apply a 4x reduction factor out of habit, forgetting that the starting point (FP16)
    is already half the size of FP32. Another error is simply stating the initial size, not the final
    one.
  napkin_math: '1. **Parameters**: 15,000,000 | 2. **FP16 Bytes/Param**: 2 | 3. **INT8 Bytes/Param**:
    1 | 4. **Original FP16 Size**: 15,000,000 params × 2 bytes/param = 30,000,000 bytes = **30 MB** |
    5. **New INT8 Size**: 15,000,000 params × 1 byte/param = 15,000,000 bytes = **15 MB** | 6. **Savings**:
    30 MB - 15 MB = 15 MB (50% reduction)'
