title: The App Size Budget
topic: quantization-fundamentals
status: published
provenance: imported
scenario: You're an engineer on the mobile AI team. Your team has developed a new 150 million parameter
  visual search model, currently in FP16 format. Before shipping it in your app, you need to report the
  memory impact of the model's weights. Calculate the model's memory footprint in its original FP16 format,
  and then compare it to the footprint after full INT8 quantization.
details:
  realistic_solution: The calculation is a straightforward application of the memory footprint formula.
    FP16 (half-precision float) uses 2 bytes per parameter, while INT8 (8-bit integer) uses 1 byte per
    parameter.
  common_mistake: The most common mistake is confusing bits with bytes, or using the wrong number of bytes
    for a given precision. Engineers sometimes incorrectly assume FP16 uses 4 bytes (like FP32) or calculate
    using bits (e.g., multiplying by 16 instead of 2 for FP16), leading to an 8x error.
  napkin_math: 'FP16 Footprint: 150M params × 2 bytes/param = 300 MB'
