id: mobile-0168
title: The App Store Memory Diet
topic: quantization-fundamentals
status: published
provenance: imported
scenario: You're a mobile ML engineer shipping a new on-device feature. Your model, a 150 million parameter
  language model, is currently in FP16 format, occupying 300 MB of storage. To reduce the app's download
  size and memory footprint, you plan to quantize the model's weights to INT8. Explain the primary trade-off
  of this process and calculate the new memory requirement for just the model weights after quantization.
details:
  realistic_solution: The primary trade-off is precision for efficiency. By reducing the number of bits
    per weight, the model becomes smaller and faster (especially on hardware with dedicated INT8 units
    like the Apple Neural Engine or Snapdragon Hexagon DSP), but there is a risk of accuracy degradation
    due to the loss of numerical precision. The new memory requirement is 150 MB, a 2x reduction.
  common_mistake: Engineers often miscalculate the memory savings by either using the wrong baseline (assuming
    FP32's 4 bytes) or applying the wrong reduction factor (e.g., applying a 4x reduction to an FP16 model).
    They may also confuse bits with bytes or incorrectly believe quantization doesn't affect storage size.
  napkin_math: Original FP16 Memory = 150M params × 2 bytes/param = 300 MB
