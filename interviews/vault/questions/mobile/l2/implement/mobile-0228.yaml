id: mobile-0228
title: The Mobile Memory Squeeze
topic: quantization-fundamentals
status: published
provenance: imported
scenario: You're deploying a 750 million parameter vision model to a new smartphone. The model weights
  are currently in FP16 format. To ensure a smooth user experience, your team has a strict 1 GB memory
  budget for this model. Explain the memory footprint of the model in FP16, compare it to a fully-quantized
  INT8 version, and determine if the quantized model meets the budget.
details:
  realistic_solution: The original FP16 model requires 1.5 GB of memory (750M params × 2 bytes/param).
    This exceeds the 1 GB budget. By quantizing the model to INT8, each parameter now only requires 1
    byte. The new memory footprint is 750 MB (750M params × 1 byte/param). This represents a 50% reduction
    in memory size and comfortably fits within the mobile app's budget. This is a fundamental optimization
    for on-device ML.
  common_mistake: A common mistake is to misremember the byte size for different floating point formats.
    Forgetting that FP16 requires 2 bytes per parameter (not 1 or 4) leads to an incorrect baseline. This
    error invalidates any subsequent calculation about quantization savings, leading to a wrong decision
    about model deployment.
  napkin_math: '1. Calculate FP16 Memory Footprint: Using the baseline where 1 Billion parameters = 2
    GB in FP16 (2 bytes per parameter). For a 750 million parameter model: 750,000,000 * 2 bytes = 1.5
    GB. 2. Assess Budget: The model needs 1.5 GB just to load weights. This exceeds the 1 GB budget, so
    INT8 quantization is needed.'
