title: 'The Economics of On-Device Learning: Federated Learning'
topic: federated-learning
status: published
provenance: imported
scenario: 'You''re an engineer on a mobile team developing a personalized driver-assistance feature for
  a fleet of 1 million active users. You are comparing two training strategies:'
details:
  realistic_solution: The correct approach is to calculate the total daily data volume for each strategy
    and then multiply by the cost per GB. The key is to correctly convert megabytes to gigabytes for the
    federated strategy and then scale both calculations by the one million users in the fleet. This demonstrates
    that the federated approach, while often chosen for privacy, also offers massive data transfer cost
    savings.
  common_mistake: Engineers often focus only on the privacy benefits of Federated Learning and ignore
    the concrete economic benefits from reduced data transfer. A common calculation error is mixing up
    units (MB vs. GB) or calculating the cost on a per-user basis instead of for the entire fleet, underestimating
    the total cost by orders of magnitude.
  napkin_math: 1. **Centralized Cost:** | Total Data = 1M users * 50 MB = 50,000 GB | Cost = 50,000 GB
    * $2/GB = $100,000
