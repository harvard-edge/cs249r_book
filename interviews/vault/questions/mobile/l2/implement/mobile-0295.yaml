id: mobile-0295
title: The Smart Reply Battery Drain (mobile-0295)
topic: duty-cycling
status: draft
provenance: imported
scenario: Your team is shipping a new 'smart reply' feature on a smartphone. When a notification arrives,
  an on-device model runs for 2 seconds to generate suggestions. During this time, the model's inference
  task adds exactly 2 Watts to the phone's total power draw. Assume the user receives 180 notifications
  evenly throughout a day. Explain how you would calculate the total energy the 'smart reply' feature
  consumes from the battery in one day, and provide the total in Watt-hours (Wh).
details:
  realistic_solution: The correct way to solve this is to first calculate the total time the feature is
    active per day, and then multiply that by the power draw, ensuring all units are consistent.
  common_mistake: The most common mistake is confusing power (Watts), which is a rate of energy transfer,
    with energy (Watt-hours), which is a total quantity. This often manifests as failing to convert the
    total active time from seconds to hours before multiplying by power, leading to an answer that is
    off by a factor of 3600.
  napkin_math: '1. Total daily run time (seconds): 180 notifications * 2 sec/notification = 360 seconds'
