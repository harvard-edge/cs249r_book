id: mobile-0354
title: The Airport Parking Battery Drain
topic: duty-cycling
status: published
provenance: imported
scenario: You're designing a 'Sentry Mode Lite' for a new electric vehicle. The feature uses the car's
  mobile-grade infotainment SoC to wake up every 10 minutes, run an object detection model for 2 seconds,
  and then go back to a deep sleep state. The SoC consumes 4W while active and negligible power during
  sleep. How much total energy, in Watt-hours, will this feature consume from the car's battery over a
  continuous 24-hour period?
details:
  realistic_solution: The correct approach is to calculate the total active time over 24 hours and multiply
    it by the active power consumption. First, find the number of cycles in a day, then find the total
    energy consumed.
  common_mistake: Engineers often confuse power (an instantaneous rate, in Watts) with energy (power applied
    over time, in Watt-hours). Another common mistake is failing to properly calculate the duty cycle
    or making a unit conversion error when moving from seconds to hours.
  napkin_math: Cycles per Day = (24 hours * 60 min/hr) / 10 min/cycle = 144 cycles
