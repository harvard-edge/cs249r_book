schema_version: 1
id: mobile-0222
title: The Runaway Inference Battery Drain
topic: fault-tolerance-checkpointing
status: published
provenance: imported
scenario: You're an engineer on a mobile app team shipping a new on-device visual search feature. During
  QA, you find that rare, high-resolution user images can cause inference to 'run away,' consuming maximum
  SoC resources for a full minute before the OS terminates the process. The lead engineer asks you to
  quantify the impact of this event to justify adding a watchdog timer. Calculate the approximate battery
  energy consumed by a single runaway inference that lasts for 60 seconds.
details:
  realistic_solution: A runaway inference will push the mobile SoC to its maximum active power consumption.
    Based on the hardware constants, this is around 5W for a heavy ML task. To find the total energy consumed,
    we must multiply this power rate by the duration of the event in hours.
  common_mistake: Engineers often focus solely on the latency aspect ('the app froze') and fail to connect
    it to the physical consequence of battery drain. A common mistake is to confuse power (Watts, a rate
    of energy transfer) with energy (Watt-hours, the total amount consumed), or to use incorrect time
    units (e.g., seconds instead of hours) in the calculation, which can underestimate the impact by a
    factor of 60 or more.
  napkin_math: '1. Identify Max Power: A runaway OS process consumes peak SoC power, given as 5W. 2. Calculate
    Energy: E = Power * Time = 5W * 60 seconds = 300 Joules. 3. Battery Impact: A standard smartphone
    battery is around 15 Watt-hours (54,000 Joules). This 1-minute runaway glitch burns 300 / 54,000 =
    ~0.55% of the battery.'
