id: mobile-0323
title: The Federated Learning Subsidy
topic: federated-learning
status: published
provenance: imported
scenario: You are an ML engineer on a mobile keyboard team with 1 million daily active users. You propose
  personalizing the prediction model. To incentivize users to share data, the company agrees to subsidize
  their mobile data costs at a rate of $10.00 per GB transferred.
details:
  realistic_solution: The correct approach is to calculate the total data volume for each strategy across
    the entire user base and then apply the cost per GB.
  common_mistake: Engineers often underestimate how small per-user costs explode at scale. A tiny 10 MB
    upload seems trivial, but for a million users, it becomes multiple terabytes daily. Another common
    mistake is misinterpreting units (KB vs. MB vs. GB), which can lead to calculation errors of 100-1000x.
  napkin_math: 'Centralized: 1M users * 10 MB/user = 10,000,000 MB = 10,000 GB. Cost = 10,000 GB * $10/GB
    = $100,000/day.'
