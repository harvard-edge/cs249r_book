schema_version: 1
id: mobile-0350
title: The A/B Test Data Bill
topic: differential-privacy
status: published
provenance: imported
scenario: You're an engineer at a mobile app company planning a 30-day A/B test for a new on-device recommendation
  model. The experiment will involve 1,000,000 users. To measure the results, you plan to upload detailed
  interaction logs, estimating that each user will generate about 2 MB of log data per day. Your cloud
  provider charges $0.02 per GB for data ingress. Explain how you would estimate the total data ingress
  cost for this experiment and calculate the final number.
details:
  realistic_solution: The correct approach is to first calculate the total amount of data generated over
    the entire experiment, then convert that to GB, and finally multiply by the cost per GB. This demonstrates
    a basic understanding of scale and cost estimation for a common mobile engineering task.
  common_mistake: 'The most common mistakes are unit conversion errors: confusing Megabytes (MB) and Megabits
    (Mb), which results in an 8x error, or forgetting to convert from MB to GB entirely, leading to a
    1000x error. Another frequent mistake is calculating the cost for only a single day instead of the
    full 30-day experiment duration.'
  napkin_math: '1. **Data per user:** 2 MB/day × 30 days = 60 MB

    2. **Total data for all users:** 60 MB × 1,000,000 users = 60,000,000 MB

    3. **Convert to GB:** 60,000,000 MB ÷ 1,000 = 60,000 GB

    4. **Calculate ingress cost:** 60,000 GB × $0.02/GB = **$1,200**


    The total data ingress cost for the 30-day A/B test is **$1,200**. This is a relatively modest cost
    for a million-user experiment, but it scales linearly — doubling users or duration doubles the bill.
    The key takeaway is that unit conversion discipline (MB → GB) and accounting for the full experiment
    duration are essential to avoid order-of-magnitude estimation errors.'
