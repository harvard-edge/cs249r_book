title: The Federated Learning Battery Tax (mobile-0298)
topic: federated-learning
status: draft
provenance: imported
scenario: A luxury car brand wants to improve its driver-assist AI model by training it on real-world
  data from its customers' phones. To protect user privacy, they decide to use Federated Learning. One
  training round on a user's smartphone requires 15 minutes of active computation. Assuming the phone's
  SoC (System on Chip) consumes 4W on average during this active training, can you calculate the total
  energy consumed from the phone's battery for a single training round?
details:
  realistic_solution: The correct way to solve this is to multiply the power consumption by the duration
    of the task. The key is to ensure the time units are consistent, typically converting minutes to hours.
  common_mistake: The most common mistake is to confuse power (in Watts) with energy (in Watt-hours).
    Engineers will often state the power consumption (4W) as the answer, forgetting that energy is power
    integrated over time. Another frequent error is incorrect time unit conversion, such as multiplying
    watts by minutes directly.
  napkin_math: Power = 4 W (from Mobile SoC Active power spec)
