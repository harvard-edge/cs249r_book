id: mobile-0226
title: 'The App Store Diet: Quantization Fundamentals'
topic: quantization-fundamentals
status: published
provenance: imported
scenario: You're responsible for a new 4 million parameter computer vision model in a mobile app. It's
  currently stored in FP16 format, but you need to reduce the app's download size. If you quantize the
  model's weights to INT8, what is the new size of the model on disk?
details:
  realistic_solution: Quantizing from 16-bit floating point (FP16) to 8-bit integer (INT8) halves the
    storage required for each parameter. FP16 uses 2 bytes per parameter, while INT8 uses 1 byte. Therefore,
    the new model size is 4 million parameters multiplied by 1 byte per parameter, which equals 4 megabytes.
  common_mistake: The most common mistake is to confuse bits and bytes. An engineer might calculate the
    size in megabits (4M params × 8 bits = 32 Mbits) and incorrectly report it as 32 MB. Another frequent
    error is to calculate the original FP16 size (8 MB) and present that instead of the final, smaller
    INT8 size.
  napkin_math: '1. Calculate Original Size (FP16): The model has 4,000,000 parameters. In FP16 format,
    each parameter takes 2 bytes. 4,000,000 * 2 = 8,000,000 bytes = 8 MB. 2. Calculate New Size (INT8):
    Quantizing to INT8 uses 1 byte per parameter. 4,000,000 * 1 = 4,000,000 bytes = 4 MB. The download
    size drops by 4 MB.'
