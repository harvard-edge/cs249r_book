id: mobile-0319
title: The On-Device Reader's Bottleneck
topic: memory-hierarchy-design
status: published
provenance: imported
scenario: You're optimizing an on-device 'read it for me' feature on a new flagship smartphone. The phone's
  SoC has an LPDDR5x memory system with a specified bandwidth of 77 GB/s. The feature uses a 1 billion
  parameter INT8 language model to generate speech from on-screen text. For this analysis, assume a simplified
  model where for each token generated, the entire 1 GB of model weights must be read from main DRAM.
  Given these constraints, calculate the theoretical minimum Time Per Output Token (TPOT) as dictated
  purely by the memory bandwidth.
details:
  realistic_solution: The core relationship is `Time = Data / Bandwidth`. The model's weights are 1 billion
    INT8 parameters, which is 1 GB of data. The memory bandwidth is 77 GB/s. Therefore, the time to read
    the weights is `1 GB / 77 GB/s ≈ 0.01298` seconds. Converting to milliseconds, this is approximately
    13 ms. This means the memory system can, at best, supply the NPU with the model weights once every
    13 ms, setting a hard physical limit on the token generation rate, regardless of how fast the NPU
    is.
  common_mistake: Engineers often focus solely on the processor's peak TOPS (compute performance) and
    ignore the 'memory wall' bottleneck. They might calculate a sub-millisecond TPOT based on compute,
    not realizing that the system is bound by the time it takes to feed the processor with data from DRAM.
    Another common error is incorrect unit conversion, such as confusing GB (gigabytes) with Gb (gigabits),
    leading to an 8x error.
  napkin_math: '`Data_to_transfer = 1e9 params * 1 byte/param = 1 GB`'
