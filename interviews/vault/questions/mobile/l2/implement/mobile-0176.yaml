id: mobile-0176
title: The Smart Reply Battery Drain
topic: power-budgeting
status: draft
provenance: imported
scenario: You're building a 'smart reply' feature. The inference runs on the mobile SoC, drawing 4W of
  power for the 200ms it takes to generate a reply. If a typical user receives 10 messages per hour, calculate
  the total energy this feature will consume in a full 24-hour day.
details:
  realistic_solution: The correct approach is to calculate the total active time of the feature over the
    24-hour period and multiply that by the power draw. First, find the total number of inferences, then
    the total time the SoC is active, and finally convert that to energy in Watt-hours.
  common_mistake: Engineers often confuse power (Watts) and energy (Watt-hours) or make unit conversion
    errors, especially between milliseconds, seconds, and hours. A common mistake is to calculate the
    power for a continuous operation rather than a duty-cycled one, leading to a massive overestimation
    of battery impact.
  napkin_math: '1. Calculate inferences per day: 10 messages/hour * 24 hours = 240 inferences/day. 2.
    Calculate active time per day: 240 inferences * 0.2 seconds = 48 seconds. 3. Calculate total energy
    consumption: Energy = Power * Time = 4W * 48 seconds = 192 Joules. This uses a tiny fraction of a
    typical 15Wh phone battery.'
