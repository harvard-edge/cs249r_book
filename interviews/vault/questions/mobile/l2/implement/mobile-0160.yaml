id: mobile-0160
title: The Battery Killer Feature
topic: power-budgeting
status: published
provenance: imported
scenario: Your team has developed a new real-time camera filter that causes the mobile SoC to draw a constant
  4W of power. The phone has a standard 4,500 mAh battery, which operates at a nominal 3.7V. If a user
  starts with a full battery and uses *only* this feature, how long can the phone run before the battery
  is completely depleted?
details:
  realistic_solution: The correct approach is to first calculate the total energy stored in the battery
    in Watt-hours (Wh), and then divide that by the power consumption in Watts (W) to find the total time
    in hours.
  common_mistake: The most common mistake is to confuse units, typically by dividing the battery's milliamp-hour
    (mAh) rating directly by the power draw in watts (W). This is dimensionally incorrect, as it ignores
    the battery's voltage. Power (W) is a product of current (A) and voltage (V), while energy (Wh) is
    power over time.
  napkin_math: 1. **Energy:** 4,500 mAh is 4.5 Ah. At 3.7V, that's `4.5 Ah * 3.7V = 16.65 Wh`.
