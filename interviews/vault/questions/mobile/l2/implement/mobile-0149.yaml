schema_version: 1
id: mobile-0149
title: The NPU Fallback Memory Cost
topic: quantization-fundamentals
status: published
provenance: imported
scenario: You are deploying a 5 million parameter image segmentation model on a modern smartphone. The
  phone's NPU natively supports FP16 precision. However, 10% of the model's parameters belong to custom
  layers that the NPU does not support, forcing them to fall back to the CPU for execution using INT8
  quantization. Calculate the total memory in megabytes (MB) required to store the model's weights.
details:
  realistic_solution: The solution requires calculating the memory for the two parts of the model separately
    and then summing them. 90% of the model's parameters (4.5 million) are stored in FP16 (2 bytes/param),
    while the remaining 10% (0.5 million) are stored in INT8 (1 byte/param) for the CPU fallback.
  common_mistake: Engineers often calculate the memory for the entire model using only the primary precision
    (FP16), forgetting that the fallback portion has a different, smaller memory footprint. Another common
    error is assuming all parameters are quantized, ignoring that the majority run in higher precision
    on the NPU.
  napkin_math: '1. **NPU Part (FP16):** | Parameters: 5,000,000 * 0.90 = 4,500,000 params | Memory: 4,500,000
    params * 2 bytes/param = 9,000,000 bytes = 9.0 MB

    2. **CPU Part (INT8):** | Parameters: 5,000,000 * 0.10 = 500,000 params | Memory: 500,000 params *
    1 byte/param = 500,000 bytes = 0.5 MB

    3. **Total Memory:** 9.0 MB + 0.5 MB = 9.5 MB'
