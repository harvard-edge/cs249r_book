id: mobile-0383
title: The Federated Learning Energy Bill
topic: federated-learning
status: published
provenance: imported
scenario: Your company wants to use Federated Learning to train a personalized keyboard model on 1 million
  mobile devices to protect user privacy. The on-device training task runs once per day, taking 20 seconds
  of active compute on the phone's SoC. Using the typical power consumption for a mobile SoC, calculate
  the *total daily energy consumption* for your entire user base, in kilowatt-hours (kWh).
details:
  realistic_solution: The correct approach is to calculate the energy for a single device and then scale
    it to the entire user base, ensuring correct unit conversions. A typical mobile SoC consumes 3-5W
    under load; we'll use a median value of 4W. The total daily energy consumption is approximately 22.2
    kWh, which is a surprisingly modest number and shows the viability of on-device FL at scale from an
    energy cost perspective.
  common_mistake: Engineers often confuse power (Watts) and energy (Watt-hours or Joules). Another common
    mistake is failing to correctly convert units, especially from Joules (Watt-seconds) to kilowatt-hours,
    leading to errors of several orders of magnitude. Finally, some might grab the power consumption number
    for the wrong device class (like TinyML or Edge) from the spec sheet.
  napkin_math: '1. Energy per Device: The mobile SoC draws 4W for 20 seconds. Energy = 4W * 20s = 80 Joules
    per day. 2. Total Fleet Energy: 80 J * 1,000,000 devices = 80,000,000 Joules (80 Megajoules) per day.
    3. kWh Conversion: 80,000,000 J / 3.6x10^6 J/kWh ≈ 22.2 kWh. 4. Efficiency: 22.2 kWh/day across 1M
    devices is trivial distributed energy cost compared to running a centralized multi-GPU training cluster.'
