id: mobile-0210
title: The Dashcam Battery Drain Dilemma
topic: power-budgeting
status: draft
provenance: imported
scenario: You're designing a dashcam feature for a ride-sharing app that runs on a standard smartphone.
  When active, the ML model performing object detection causes the phone's System-on-a-Chip (SoC) to consume
  a total of 4 Watts. For a continuous 30-minute trip, how much energy, in Watt-hours, does this feature
  consume from the phone's battery?
details:
  realistic_solution: The calculation is a direct application of the formula `Energy = Power × Time`.
    The key is to ensure the time is in hours to get the standard Watt-hour (Wh) unit for energy. A 30-minute
    trip is equivalent to 0.5 hours. Therefore, the total energy consumed is 4 Watts multiplied by 0.5
    hours, resulting in 2 Watt-hours.
  common_mistake: Confusing power (a rate, in Watts) with energy (a quantity, in Watt-hours). A common
    slip is to incorrectly handle the time unit conversion, for example by multiplying the power by the
    number of minutes directly, or by forgetting to convert the time duration to hours at all.
  napkin_math: Power = 4 W | Time = 30 minutes = 0.5 hours | Energy Consumed = 4 W × 0.5 h = 2 Wh
