id: mobile-0189
title: The Mobile KV-Cache Budget
topic: vram-budgeting
status: published
provenance: imported
scenario: You're deploying a small 2-billion-parameter LLM on a flagship mobile phone for an on-device
  assistant feature. The model has 24 layers, 16 attention heads, and a head dimension of 64. To maintain
  a responsive user experience, you need to support a context window of 4096 tokens. Your team lead is
  concerned about memory usage. Using FP16 precision, calculate the memory required *just for the KV-cache*.
details:
  realistic_solution: The correct way to calculate the KV-cache size is to account for the Key and Value
    tensors for every token in the sequence, across all layers and heads. The memory footprint is determined
    by the sequence length, not the total number of model parameters.
  common_mistake: The most common mistake is forgetting that the KV-cache stores both a Key and a Value
    tensor for each token, leading to an answer that is exactly half the correct size. Another frequent
    error is using the wrong precision (e.g., FP32/4 bytes) or confusing the number of model parameters
    with the dimensions of the cache.
  napkin_math: '1. **Identify Dimensions**: We need storage for the Key (K) and Value (V) tensors.'
