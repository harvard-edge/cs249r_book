id: mobile-0197
title: The Background Battery Drainer
topic: power-budgeting
status: published
provenance: imported
scenario: A new 'ambient intelligence' feature on a smartphone runs a small keyword-spotting model. It
  wakes the SoC, runs inference for 0.5 seconds, and then goes back to sleep. This cycle repeats every
  10 seconds. When active, the SoC consumes 3 Watts. The phone has a 19 Watt-hour battery. Assuming negligible
  power consumption during sleep, explain how you would estimate the total percentage of battery this
  feature will consume over a 24-hour period and calculate the value.
details:
  realistic_solution: The correct approach is to first calculate the feature's duty cycle (the fraction
    of time it is active). Use this to find the total active hours over a 24-hour period. Then, multiply
    the active hours by the active power consumption (in Watts) to get the total energy consumed (in Watt-hours).
    Finally, express this energy as a percentage of the phone's total battery capacity.
  common_mistake: Confusing power (Watts) with energy (Watt-hours). An engineer might calculate the drain
    assuming the 3W is drawn continuously, leading to a wildly incorrect and physically impossible result
    (72Wh consumed from a 19Wh battery). Another common mistake is incorrectly calculating the duty cycle
    or total active time.
  napkin_math: 1. **Calculate Duty Cycle:** The feature is active for 0.5 seconds out of every 10 seconds.
    Duty Cycle = 0.5s / 10s = 0.05 or 5%.
