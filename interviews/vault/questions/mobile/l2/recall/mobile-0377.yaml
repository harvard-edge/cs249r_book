schema_version: 1
id: mobile-0377
title: The Mobile Roofline Test
topic: roofline-analysis
status: published
provenance: imported
scenario: You are optimizing a new on-device vision model for an Apple A17 Pro. A critical convolutional
  layer in your model performs 50 billion INT8 operations (50 G-Ops) and requires reading and writing
  100 megabytes (100 MB) of tensor data from main memory. The A17 Pro's ANE has 35 TOPS (INT8) peak compute
  and 51.2 GB/s memory bandwidth. Determine whether this layer is compute-bound or memory-bound.
details:
  realistic_solution: The goal is to compare the workload's Arithmetic Intensity (AI) to the device's
    Ridge Point. A workload is memory-bound if its AI is less than the Ridge Point, and compute-bound
    if its AI is greater.
  common_mistake: Engineers often correctly calculate the arithmetic intensity but then invert the roofline
    logic, incorrectly concluding that a value *below* the ridge point is compute-bound. Another common
    error is a simple unit mistake in the calculation, such as mixing up Giga-ops and Mega-bytes, leading
    to a 10x or 1000x error in the final intensity value.
  napkin_math: '1. **Arithmetic Intensity:** AI = 50 × 10^9 Ops / (100 × 10^6 Bytes) = 500 Ops/Byte.

    2. **Ridge Point:** 35 × 10^12 / (51.2 × 10^9) ≈ 683 Ops/Byte.

    3. **Compare:** AI (500) < Ridge Point (683) → layer is **memory-bound** (but close to the ridge).

    4. **Memory time:** 100 MB / 51.2 GB/s ≈ 1.95 ms. Compute time: 50 GOps / 35 TOPS ≈ 1.43 ms.'
