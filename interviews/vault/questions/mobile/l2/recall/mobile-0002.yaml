id: mobile-0002
title: The OTA Update Budget
topic: model-serving-infrastructure
status: draft
provenance: imported
scenario: You are an ML systems engineer for an automotive company deploying a new driver-assistance feature.
  The model has 250 million parameters and is stored in FP16 precision. To update the fleet, the model
  must be sent over-the-air (OTA) via cellular networks. Calculate the size of the model update package
  that needs to be transmitted.
details:
  realistic_solution: Each parameter in an FP16 (half-precision float) model requires 2 bytes of storage.
    To calculate the total size, you multiply the number of parameters by the size of each parameter.
  common_mistake: The most common mistake is to confuse the storage requirements for different numerical
    precisions. Engineers often default to thinking in terms of INT8 (1 byte/param) or FP32 (4 bytes/param),
    leading to a 2x error in either direction. Another mistake is to confuse bits and bytes, accidentally
    multiplying by 16 (for FP16) instead of 2, resulting in an 8x overestimation.
  napkin_math: $\text{Model Size} = \text{Number of Parameters} \times \text{Bytes per Parameter}$
