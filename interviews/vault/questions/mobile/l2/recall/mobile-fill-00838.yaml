id: mobile-fill-00838
title: Differentiating Pruning Techniques for Mobile ML Acceleration on Tensor G3
topic: pruning-sparsity
status: published
provenance: imported
scenario: You are optimizing a large language model (LLM) for on-device inference on the Google Tensor
  G3, which features a 7.5 TOPS on-device TPU and 12 GB LPDDR5X. To reduce model size and latency, you're
  considering applying pruning techniques. How does *unstructured pruning* fundamentally differ from *structured
  pruning* in terms of implementation complexity, hardware friendliness on the Tensor G3's TPU, and the
  typical accuracy-speedup tradeoffs?
details:
  realistic_solution: Unstructured pruning removes individual weights, leading to highly irregular sparsity
    patterns. While it can achieve high model compression, it often requires specialized sparse matrix
    multiplication kernels or hardware support that might not be fully optimized on the Tensor G3's TPU,
    potentially leading to limited real-world speedups. Structured pruning, conversely, removes entire
    channels, filters, or layers, resulting in smaller, dense models. These dense structures are typically
    much more hardware-friendly for accelerators designed for dense matrix operations, such as the Tensor
    G3's TPU, yielding more predictable and often greater actual speedups, even if the absolute sparsity
    percentage is lower than unstructured pruning for a comparable accuracy.
  common_mistake: A common mistake is to assume that unstructured pruning, which often achieves higher
    sparsity for a given accuracy, will automatically translate to better speedups on specialized mobile
    accelerators like the Tensor G3's TPU, without considering the irregular memory access patterns it
    creates and the overheads of sparse tensor operations.
  napkin_math: If a convolutional layer requires 100 GFLOPS and structured pruning reduces its output
    channels by 50%, the new requirement is approximately 50 GFLOPS. If the Tensor G3's TPU can achieve
    near 7.5 TOPS (INT8) = 7,500 GFLOPS, a dense 50 GFLOPS operation would consume ~50 / 7500 = 0.67%
    of its theoretical peak. Unstructured pruning might also halve the FLOPs, but if the sparse operations
    run at only 10% of the peak dense performance due to memory access overheads, the effective throughput
    might be significantly lower, negating the theoretical FLOPs reduction. The critical factor is how
    well the sparsity pattern aligns with the hardware's memory access and computational units.
