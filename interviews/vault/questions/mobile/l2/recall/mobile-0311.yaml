schema_version: 1
id: mobile-0311
title: The On-Device Jank Budget
topic: real-time-deadlines
status: published
provenance: imported
scenario: 'You''re designing a real-time AI assistant for a new smartphone. The UI team has a strict ''jank
  budget'': any frame taking longer than 16ms to render causes perceptible stutter (i.e., the screen refreshes
  at 60 FPS). Your on-device generative model, running on the NPU, has a measured Time Per Output Token
  (TPOT) of 25ms.'
details:
  realistic_solution: The system's throughput is constrained by its slowest component, which is the model's
    25ms token generation time (TPOT). Even though the UI can refresh every 16ms, a new token is only
    produced by the NPU every 25ms. The user will see tokens appear at a rate determined by this bottleneck.
  common_mistake: 'Engineers often mistakenly assume the system''s throughput is dictated by the fastest
    component (the 16ms UI). They incorrectly calculate `1000ms / 16ms ≈ 63 tokens/sec`. This ignores
    the fundamental principle of bottlenecks: a pipeline''s speed is determined by its slowest stage.
    The UI can be ready to draw, but it has to wait for the NPU to produce a token.'
  napkin_math: Throughput is the inverse of the latency of the bottleneck stage.
