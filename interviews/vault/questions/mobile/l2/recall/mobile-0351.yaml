id: mobile-0351
title: 'The Style Transfer Bottleneck: Roofline Analysis'
topic: roofline-analysis
status: draft
provenance: imported
scenario: You're optimizing a real-time neural style transfer filter for a new camera app running on an
  Apple A17 Pro. The INT8 model performs **70 Giga-OPS** for every 1080p frame it processes. To process
  this single frame, the model's layers require reading and writing a total of **250 MB** of data (parameters,
  activations, and framebuffer). Based on the hardware specifications provided in the playbook, is this
  workload compute-bound or memory-bound? Explain your calculation.
details:
  realistic_solution: The workload is **memory-bound**. To determine this, we must calculate the workload's
    Arithmetic Intensity (AI) and compare it to the hardware's ridge point.
  common_mistake: Engineers often misinterpret the roofline model. A common mistake is to believe that
    a low arithmetic intensity means a workload is 'not computationally demanding' and therefore must
    be memory-bound, but then they incorrectly choose 'Compute-Bound' by reversing the logic. Another
    mistake is to guess based on the large number of OPS without performing the arithmetic intensity calculation.
  napkin_math: 'AI = 70 GOps / 250MB = 280 Ops/Byte. A17 Pro ANE: 35 TOPS INT8, LPDDR5 BW: 51.2 GB/s.
    Ridge point = 35,000 GOps/s / 51.2 GB/s = 683 Ops/Byte. Model AI (280) < ridge (683) → memory-bound.
    BW-limited throughput: 51.2 GB/s × 280 = 14.3 TOPS, only 41% of ANE peak. Latency per frame: 250MB
    / 51.2 GB/s = 4.9ms (BW-limited), not 70G/35T = 2ms (compute).'
