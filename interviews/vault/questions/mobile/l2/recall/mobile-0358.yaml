id: mobile-0358
title: The Mobile Ridge Point (mobile-0358)
topic: roofline-analysis
status: published
provenance: imported
scenario: You're an ML systems engineer at a social media company, tasked with evaluating the new Apple
  A17 Pro SoC for a real-time, on-device video filter. Before you even profile the model, you want to
  understand the fundamental performance characteristics of the hardware itself.
details:
  realistic_solution: The Ridge Point represents the hardware's balance between compute and memory bandwidth.
    It's the minimum Arithmetic Intensity (AI) a workload must have to be compute-bound rather than memory-bound.
    To calculate it, you divide the peak compute rate by the peak memory bandwidth.
  common_mistake: The most common mistake is to focus solely on the peak TOPS number (35 TOPS) and assume
    any model will get that performance. This ignores the 'memory wall' — the bottleneck created by memory
    bandwidth. Another mistake is confusing the Ridge Point (a measure of hardware balance) with TOPS/W
    (a measure of power efficiency).
  napkin_math: 'Ridge Point = Peak Compute / Memory Bandwidth.


    The A17 Pro ANE is rated at 35 TOPS and the LPDDR5 memory bandwidth is 51.2 GB/s.


    Ridge Point = (35 × 10^12 Ops/s) / (51.2 × 10^9 Bytes/s) ≈ 683 Ops/Byte.


    Any workload with AI > 683 Ops/Byte is compute-bound; any workload with AI < 683 Ops/Byte is memory-bound.'
