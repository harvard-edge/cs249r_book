schema_version: 1
id: mobile-0157
title: The 85% Delegation Fallacy
topic: roofline-analysis
status: published
provenance: imported
scenario: You are deploying a new on-device generative model to a smartphone with an Apple A17 Pro SoC.
  The model consists of 100 distinct operations. The A17 Pro's NPU is roughly 255x faster than its CPU
  per operation. After running the Core ML profiler, you find that 85 of these operations are supported
  by the NPU, but the remaining 15 custom operations must fall back to the CPU for execution.
details:
  realistic_solution: The CPU is the bottleneck. Although it only runs 15% of the operations, its drastically
    lower performance compared to the NPU means this small portion of work dominates the total inference
    time. The NPU finishes its 85 operations very quickly and then must wait for the CPU to finish its
    15 operations. The total latency is effectively the latency of the CPU-bound portion.
  common_mistake: Engineers often assume that if 85% of operations are delegated to the fast NPU, the
    overall performance will be close to the NPU's speed. They apply a linear mental model (e.g., '85%
    fast, 15% slow') and fail to appreciate how a small fraction of very slow operations can dominate
    the total latency, a classic application of Amdahl's Law.
  napkin_math: 1. **Establish Processor Speeds:** Let NPU speed = 1 unit of time per op. CPU speed = 255
    units of time per op. 2. **Calculate NPU Time:** 85 ops × 1 = 85 units. 3. **Calculate CPU Time:**
    15 ops × 255 = 3,825 units. 4. **Comparison:** 3,825 / 85 = 45. The 15 CPU ops take 45x longer to
    execute than the 85 NPU ops combined. The CPU is completely bottlenecking the inference.
