schema_version: 1
id: mobile-0004
title: The OTA Data Budget
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: You're a Staff ML Engineer on the mobile team for a popular social media app. Your team is launching
  a new generative AI feature for creating image filters. The v1 model is 80 MB. After a month of user
  feedback and fine-tuning, the data science team has produced a v2 model that is 10% more accurate but
  now weighs 120 MB. Your product manager is concerned about the data cost for users when rolling out
  this over-the-air (OTA) update. Explain the data consumption for a single user if you ship the full
  update.
details:
  realistic_solution: The update will download the entire 120 MB model file to the user's device, consuming
    120 MB of their cellular or Wi-Fi data plan. This is a significant data cost, especially for users
    on limited or prepaid mobile plans in emerging markets. It could lead to unexpected data charges or
    cause users to disable background updates, harming future feature adoption. A Staff engineer must
    flag this cost and propose mitigations.
  common_mistake: A common mistake is to only consider the difference in size (120 MB - 80 MB = 40 MB),
    assuming a differential 'diff' update mechanism is in place. While possible, diffing is complex to
    engineer. The default, and most common, OTA update strategy for mobile ML models is to replace the
    entire file. Another mistake is to ignore the user cost entirely in favor of the accuracy gain, which
    is not a user-centric or systems-aware tradeoff.
  napkin_math: The calculation is a direct interpretation of the model's storage size as network transfer
    size.
