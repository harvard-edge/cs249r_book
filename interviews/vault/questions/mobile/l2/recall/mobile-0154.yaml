id: mobile-0154
title: The Federated Learning Upload Tax
topic: federated-learning
status: published
provenance: imported
scenario: Your team is building a federated learning system to train a personalization model on mobile
  devices. The model has 5 million parameters. For privacy, you'll be using Federated Averaging, where
  each device sends its computed gradients (represented in FP16 precision) to the server. Explain the
  primary communication bottleneck for the user in this scenario and calculate the size of the data payload
  that needs to be uploaded per training round.
details:
  realistic_solution: The primary bottleneck for the user is the **upload bandwidth**. Sending a large
    data payload from a mobile device can be slow, consume a significant portion of a user's monthly data
    allowance, and drain the battery. The server sees the aggregate, but each individual user pays the
    upload cost.
  common_mistake: Engineers often focus on server-side training costs and neglect the user-facing costs.
    The primary mistake is underestimating the impact of upload payload size on the user's data plan and
    battery life, which is a critical constraint in mobile environments. Calculation mistakes typically
    involve using the wrong precision (e.g., 4 bytes for FP32 instead of 2 bytes for FP16).
  napkin_math: 1. **Identify Parameters:** The model has 5,000,000 parameters.
