id: mobile-0299
title: The A17 Pro's Arithmetic Intensity
topic: roofline-analysis
status: published
provenance: imported
scenario: You're optimizing a real-time video filter on an iPhone with an Apple A17 Pro. A profiler shows
  one convolution layer performs 700 Giga-operations (GOPs) while reading 2 GB of data (weights & activations)
  from system RAM every second. Given the A17 Pro's Neural Engine (ANE) has a peak performance of 35 TOPS
  (INT8) and the LPDDR5 memory system provides 51.2 GB/s of bandwidth, can you explain if this specific
  layer is compute-bound or memory-bound?
details:
  realistic_solution: To determine the bottleneck, we must compare the workload's Arithmetic Intensity
    (AI) to the hardware's ridge point. The ridge point is where the performance ceiling transitions from
    being memory-bound to compute-bound.
  common_mistake: Engineers often forget to calculate the hardware's ridge point (the ratio of peak compute
    to memory bandwidth). They either guess based on the raw TOPS number, assuming high TOPS means everything
    is compute-bound, or misinterpret what arithmetic intensity signifies. A workload's AI must be compared
    to the hardware's capability to determine the bottleneck.
  napkin_math: 'AI = 700 GOps/s / 2 GB/s = 350 Ops/Byte. A17 Pro ANE: 35 TOPS, LPDDR5 BW: 51.2 GB/s. Ridge
    point = 35,000G / 51.2G = 683 Ops/Byte. Model AI (350) < ridge (683) → memory-bound. Effective throughput
    = 51.2 GB/s × 350 = 17.9 TOPS = 51% of ANE peak. The layer is starved for data; compute units idle
    ~49% of the time.'
