id: mobile-0212
title: The Watchdog's Battery Bill
topic: fault-tolerance-checkpointing
status: published
provenance: imported
scenario: 'Your team is deploying a continuous driver-monitoring model on a mobile device, using the Apple
  A17 Pro''s NPU. To prevent the app from freezing, you''ve implemented a watchdog timer. If the model
  inference loop hangs, the watchdog forces a recovery process: it reloads the model from flash and re-initializes
  the NPU. This recovery takes 2 seconds, during which the total SoC power spikes to 5W. The system logs
  show that due to rare, corrupted camera frames, the model hangs and triggers one recovery every 15 minutes.
  Explain the total *energy cost* in Watt-hours (Wh) for these recovery events over an 8-hour drive.'
details:
  realistic_solution: The solution requires calculating the total number of recovery events, the total
    time spent in that state, the total energy in Joules (Watt-seconds), and finally converting to Watt-hours.
    An 8-hour drive has 480 minutes. With one recovery every 15 minutes, there will be 32 recoveries total.
    Each recovery takes 2 seconds, so the SoC spends 64 seconds in the high-power recovery state. The
    total energy is the total time multiplied by the power draw, with units converted appropriately.
  common_mistake: The most common mistake is confusing power (a rate, in Watts) with energy (a quantity,
    in Watt-hours or Joules). Engineers may correctly calculate the total time the system spends in recovery
    but then either report the peak power (5W) or use the wrong conversion factor (e.g., dividing Joules
    by 60 instead of 3600) when converting to Watt-hours.
  napkin_math: '1. Calculate total minutes: 8 hours × 60 min/hour = 480 minutes'
