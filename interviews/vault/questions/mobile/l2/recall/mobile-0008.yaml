id: mobile-0008
title: The OTA Budget Constraint
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: You're a mobile ML engineer. The product manager has mandated that any over-the-air (OTA) model
  update must be under 150 MB to avoid angering users on cellular data plans. Your team wants to ship
  a new 70 million parameter model. To preserve quality, you plan to deploy it using FP16 precision. Can
  you explain whether the model update will fit within the OTA budget?
details:
  realistic_solution: Yes, the model will fit. A model using FP16 precision requires 2 bytes of storage
    for every parameter. With 70 million parameters, the total size is 140 million bytes. In the context
    of file sizes, one megabyte is commonly treated as one million bytes. Therefore, the model's size
    is 140 MB, which is just under the 150 MB limit set by the product manager.
  common_mistake: The most common mistakes are confusing the data types and their sizes, or errors in
    unit conversion. For instance, using the size of FP32 (4 bytes) or INT8 (1 byte) instead of FP16 (2
    bytes), or incorrectly converting from parameters to megabytes.
  napkin_math: 70,000,000 parameters × 2 bytes/parameter = 140,000,000 bytes
