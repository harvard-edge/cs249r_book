schema_version: 1
id: mobile-0245
title: The OTA Storage Budget
topic: model-format-conversion
status: published
provenance: imported
scenario: You're an engineer on a team building an AI 'Co-Pilot' for an automotive companion app. The
  app is getting bloated, so the product team has mandated a hard limit of 2 GB for the total installed
  size. The current app consists of a 1000 MB Base App and a 500 MB v1 Model. Your team needs to ship
  an improved driver-drowsiness model via an Over-the-Air (OTA) update. The new v2 Model is 1.8x larger
  than the v1 model. For safety, the app must support instant rollbacks, which requires keeping both the
  old (v1) and new (v2) models on disk temporarily during the update. After the v2 model is downloaded
  and verified, the v1 model is deleted.
details:
  realistic_solution: 'The update will violate the 2 GB limit. The peak storage occurs during the OTA
    window when both models coexist: Base App (1000 MB) + v1 Model (500 MB) + v2 Model (900 MB) = 2400
    MB. This exceeds the 2 GB (2048 MB) cap by 352 MB. After the rollback window closes and v1 is deleted,
    storage drops to 1900 MB, which fits — but the transient spike blocks the update from completing.'
  common_mistake: The most common mistake is to calculate only the *final* storage footprint after the
    old model is deleted (`Base App + v2 Model`). This ignores the temporary storage spike during the
    update when both models must coexist on disk to allow for a safe, atomic switch and potential rollback,
    leading to a critical underestimation of the required storage.
  napkin_math: '1. **Find v2 Model Size:** v1 size * 1.8 = 500 MB * 1.8 = 900 MB.

    2. **Peak storage (both models on disk):** 1000 MB (base) + 500 MB (v1) + 900 MB (v2) = 2400 MB.

    3. **Compare to budget:** 2400 MB > 2048 MB (2 GB) — exceeds limit by 352 MB.

    4. **Final storage after v1 deleted:** 1000 MB + 900 MB = 1900 MB < 2048 MB — fits after cleanup.'
