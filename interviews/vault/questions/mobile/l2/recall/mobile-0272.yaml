schema_version: 1
id: mobile-0272
title: The Mobile Filter Bottleneck
topic: roofline-analysis
status: published
provenance: imported
scenario: You're an engineer on the team developing a new real-time video filter for the next iPhone,
  which uses a chip with specs similar to the Apple A17 Pro. The core component is a small CNN that performs
  **400 Giga-OPS (INT8)** and reads/writes a total of **800 Megabytes** of data per inference. The A17
  Pro's Neural Engine provides 35 TOPS (INT8) and has a memory bandwidth of 51.2 GB/s, giving it a roofline
  'ridge point' of approximately **683 Ops/Byte**. Based on this, calculate the model's Arithmetic Intensity
  and explain if the workload is compute-bound or memory-bound.
details:
  realistic_solution: The workload is **memory-bound**. The model's Arithmetic Intensity is lower than
    the hardware's ridge point, meaning the memory system cannot supply data fast enough to keep the powerful
    compute units fully utilized. The model's performance is therefore limited by memory bandwidth, not
    peak compute.
  common_mistake: Engineers often confuse the relationship between Arithmetic Intensity (AI) and the ridge
    point. They might correctly calculate the AI but then incorrectly conclude that a value *lower* than
    the ridge point means the workload is compute-bound. Another common error is to simply look at the
    absolute peak TOPS of the hardware and assume any small model won't be compute-bound, ignoring the
    critical ratio of compute to memory access.
  napkin_math: AI = 400e9 Ops / 800e6 Bytes = 500 Ops/Byte. Ridge point = 35e12/51.2e9 = 683 Ops/Byte.
    Since 500 < 683, memory-bound. Attainable perf = 500 * 51.2e9 = 25.6 TOPS (73% of peak 35 TOPS). Inference
    time = 400e9/25.6e12 = 15.6ms. Limited by memory BW, not compute.
