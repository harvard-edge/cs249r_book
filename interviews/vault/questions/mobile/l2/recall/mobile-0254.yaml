id: mobile-0254
title: The OTA Update Space Crunch
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: 'You''re an ML Systems engineer responsible for the OTA (Over-the-Air) updates for a fleet of
  autonomous vehicles. The vehicle''s compute module has a 2 GB (2048 MB) flash storage partition dedicated
  to the ML stack. The current storage layout is:

  - Base ML Framework: 800 MB

  - Current V1 Model: 400 MB

  - Downloaded V2 Model (Compressed): 150 MB

  - Uncompressed V2 Model (to be installed): 500 MB


  What will be the minimum free space remaining on the partition during the critical phase of the atomic
  OTA update before the old model is deleted?'
details:
  realistic_solution: The correct way to calculate the required space is to sum all components that must
    reside on the partition during the update's critical phase.
  common_mistake: Engineers often forget that a safe, atomic OTA update requires enough space to hold
    both the old and new assets concurrently. They mistakenly calculate the storage based on the final
    state after the old model is deleted, not the peak state during the update transaction. This can lead
    to failed updates in the field on devices that have low free space.
  napkin_math: '1. Define Total Storage: The dedicated ML partition is 2 GB = 2048 MB. 2. Concurrent Storage
    during Extraction: Framework (800 MB) + active V1 Model (400 MB) + downloaded Compressed V2 (150 MB)
    + extracting Uncompressed V2 (500 MB) = 1850 MB total used. 3. Free Space: 2048 MB - 1850 MB = 198
    MB of safety buffer.'
