schema_version: 1
id: mobile-0289
title: The Battery Drain Tax
topic: tco-cost-modeling
status: published
provenance: imported
scenario: Your team is developing an automatic smart reply feature for a mobile messaging app. You are
  A/B testing two models. Model A is simpler, runs on the CPU, and consumes 0.5W during its 100ms inference
  time. Model B is more accurate, runs on the dedicated NPU, and consumes 1.5W during its 50ms inference
  time. An average user triggers this feature 200 times per day. Compare the daily battery energy cost
  of Model A to Model B.
details:
  realistic_solution: 'Calculate total energy per day for each model. Model A: Energy per inference =
    0.5W × 0.1s = 0.05 J. Daily = 0.05 J × 200 = 10 J = 2.78 mWh. Model B: Energy per inference = 1.5W
    × 0.05s = 0.075 J. Daily = 0.075 J × 200 = 15 J = 4.17 mWh. Model B costs ~1.5× more energy per day
    than Model A, but the absolute cost is tiny (< 5 mWh) relative to a ~15 Wh phone battery.'
  common_mistake: The most common mistake is to compare only the power draw (Watts) without accounting
    for inference duration. Model B draws more power but runs for less time per inference. Energy = Power
    × Time, so shorter inference can offset higher power draw. Engineers must compute total daily energy
    (Wh), not just instantaneous power.
  napkin_math: '1. **Model A daily energy:** 0.5W × 0.1s × 200 = 10 J = 2.78 mWh.

    2. **Model B daily energy:** 1.5W × 0.05s × 200 = 15 J = 4.17 mWh.

    3. **Ratio:** Model B / Model A = 15 J / 10 J = 1.5×.

    4. **Battery impact:** 4.17 mWh / 15,000 mWh ≈ 0.028% of battery — negligible for both.'
