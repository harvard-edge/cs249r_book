id: mobile-0009
title: 'The OTA Update Budget: Model Serving Infrastructure'
topic: model-serving-infrastructure
status: draft
provenance: imported
scenario: You're a mobile ML engineer for an automotive app that includes a 'Driver Focus' feature running
  on-device. The current v1 model has 5 million parameters and is quantized to FP16. The research team
  has delivered a v2 model that is 7 million parameters, also in FP16, with significantly better performance.
details:
  realistic_solution: The correct approach is to calculate the size of the *difference* in parameters
    between the two models, and then multiply that by the number of bytes required for FP16 precision.
  common_mistake: Engineers often calculate the total size of the new model, forgetting that efficient
    OTA updates only ship the delta. Another common error is using the wrong number of bytes for the given
    precision (e.g., using 4 for FP32 or 1 for INT8, instead of 2 for FP16).
  napkin_math: 'v1 model: 5M params. v2 model: 7M params. Delta = 2M params. In FP16 (2 bytes per param),
    size increase = 2M * 2 = 4MB. Total RAM footprint goes from 10MB to 14MB. If the mobile app''s strict
    memory budget is 50MB, adding 4MB is a safe 8% increase, but compute increases by ~40%, which might
    drain battery faster.'
