id: mobile-0235
title: The Watchdog Timer Deadline
topic: fault-tolerance-checkpointing
status: published
provenance: imported
scenario: 'You are building a driver drowsiness detection feature for a mobile app. It uses the front
  camera and a CNN, running continuously. For safety reasons, the system must fully recover from a fatal
  inference hang (e.g., a driver bug or corrupted model) within a hard deadline of 500ms. Your mobile
  OS provides a ''watchdog'' service: if your process doesn''t ''ping'' the service at a regular interval,
  the OS will kill and restart it. The OS restart process itself takes a fixed 100ms. Explain how you
  would configure the watchdog. What is the maximum value you can set for the timer''s timeout period
  to guarantee the 500ms recovery deadline?'
details:
  realistic_solution: The total time budget for recovery is 500ms. The OS's restart action consumes 100ms
    of that budget, which occurs *after* the watchdog times out. This means the timeout must be detected
    no later than 400ms after the initial hang to meet the deadline. Therefore, the watchdog timer's maximum
    timeout period must be set to 400ms. The application's 'ping' or 'check-in' logic should then be configured
    to run at a significantly faster rate (e.g., every 100-200ms) to provide a safety margin against normal
    system jitter and prevent false-positive reboots.
  common_mistake: A common mistake is to set the application's 'ping' interval equal to the calculated
    timeout (e.g., pinging every 400ms for a 400ms timeout). This leaves no safety margin. Any minor system
    lag, scheduler preemption, or garbage collection pause could cause the ping to arrive late, leading
    to a false-positive reboot even when the app is healthy. A production-ready solution sets the ping
    interval to a fraction (e.g., 1/2) of the timeout for robustness.
  napkin_math: 'Total Recovery Deadline: 500ms'
