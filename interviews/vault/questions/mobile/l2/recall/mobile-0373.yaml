id: mobile-0373
title: 'The Unstable Queue: Mobile Latency Collapse'
topic: latency-decomposition
status: published
provenance: imported
scenario: You are designing a live translation feature on a smartphone. The audio system provides a new
  chunk of audio every 100ms. Your model, running on the mobile NPU, takes 120ms to process a single chunk.
  Assuming the first chunk arrives at T=0, calculate the end-to-end latency for the 5th audio chunk.
details:
  realistic_solution: 'The system is unstable because service time (120ms) > arrival interval (100ms).
    A queue grows by 1 job every 5 cycles (on average). For the 5th chunk: Chunk 1 arrives T=0, done T=120.
    Chunk 2 arrives T=100, waits until T=120, done T=240. Chunk 3 arrives T=200, waits until T=240, done
    T=360. Chunk 4 arrives T=300, waits until T=360, done T=480. Chunk 5 arrives T=400, waits until T=480,
    done T=600. End-to-end latency for chunk 5 = 600 − 400 = 200ms (vs. 120ms for chunk 1).'
  common_mistake: Engineers often focus only on the single-request latency (120ms) and forget that in
    a streaming system, if the processing time is greater than the arrival interval, the queue will grow
    indefinitely. They assume latency is constant, when in fact it degrades linearly with every new request,
    leading to system collapse.
  napkin_math: "1. **Rates:** Arrival every 100ms, processing takes 120ms. Utilization ρ = 120/100 = 1.2\
    \ > 1 → unstable.\n2. **Chunk timeline:**\n   - Chunk 1: arrive T=0, start T=0, finish T=120. Latency\
    \ = 120ms.\n   - Chunk 2: arrive T=100, start T=120, finish T=240. Latency = 140ms.\n   - Chunk 3:\
    \ arrive T=200, start T=240, finish T=360. Latency = 160ms.\n   - Chunk 4: arrive T=300, start T=360,\
    \ finish T=480. Latency = 180ms.\n   - Chunk 5: arrive T=400, start T=480, finish T=600. Latency =\
    \ **200ms**.\n3. **Pattern:** Latency grows by 20ms per chunk — unbounded queue growth."
