id: mobile-0242
title: 'The Mobile Memory Wall: Latency Decomposition'
topic: latency-decomposition
status: draft
provenance: imported
scenario: You're trying to ship a real-time translation feature on a flagship smartphone (like one with
  a Snapdragon 8 Gen 3). The core is a 1 Billion parameter LLM, quantized to INT8. The phone's LPDDR5x
  memory system provides 77 GB/s of bandwidth. Assuming the model's performance is completely limited
  by memory bandwidth (a common case for LLMs), calculate the best-case Time Per Output Token (TPOT).
  Can this design support a 'conversational' user experience, which we've defined as generating at least
  15 tokens per second?
details:
  realistic_solution: The solution is to calculate how long it takes to stream the model's weights through
    the memory system, as this is the limiting factor for generating each token. With 1 Billion parameters
    quantized to INT8, the model size is 1 GB. Given the memory bandwidth, we can calculate the time it
    takes to read this data, which gives us our best-case TPOT. A system generating tokens faster than
    the required 15 tokens/sec (which corresponds to a TPOT of 1000ms / 15 = ~67ms) is feasible.
  common_mistake: The most common mistake is to focus only on the NPU's peak TOPS (Tensor Operations Per
    Second). While impressive, LLM inference is often a memory-bound problem, not a compute-bound one.
    The processor spends most of its time stalled, waiting for weights to be loaded from DRAM. Calculating
    based on TOPS would give a wildly optimistic (and incorrect) answer in the sub-millisecond range.
  napkin_math: '1. Model Size: 1 Billion parameters quantized to INT8 (1 byte/param) equals 1 GB of weight
    data. 2. Generative Bottleneck: In autoregressive generation (batch size 1), the system must load
    the entire model for every token. 3. Max Speed: 77 GB/s bandwidth / 1 GB per token = a theoretical
    peak of 77 tokens/sec.'
