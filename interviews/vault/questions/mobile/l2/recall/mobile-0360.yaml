id: mobile-0360
title: 'The Jank Budget: Batching vs. Latency'
topic: real-time-deadlines
status: published
provenance: imported
scenario: 'You''re developing an on-device AI code completion feature for a mobile app. The UI must remain
  responsive, targeting a 16ms latency budget to avoid ''jank''. The code generation model has a prompt
  processing (Time to First Token) latency of 10ms when run individually. An engineer suggests implementing
  static batching: the system will wait up to 15ms to collect a batch of 4 requests. Due to better hardware
  utilization, the batched prompt processing step takes only 20% longer than a single request. If a user''s
  request is the first to enter an empty batch, what is their effective Time to First Token? Explain the
  trade-off.'
details:
  realistic_solution: The batched approach sacrifices first-token latency for higher overall throughput.
    For a user whose request arrives first, their experienced latency is the sum of the batching window
    and the batched processing time. This is 15ms + (10ms * 1.2) = 27ms. This exceeds the 16ms 'jank'
    budget, making the UI feel unresponsive. While static batching might be good for offline processing,
    it's a poor choice for this real-time, interactive feature.
  common_mistake: Engineers often focus on average throughput gains and forget the latency cost for the
    individual user. They might calculate the improved efficiency of the batched run but ignore the initial
    'wait' cost (the batching window), which is what the user actually experiences. For interactive tasks
    like autocomplete, first-token latency is usually more critical than overall throughput.
  napkin_math: 1. **Identify latency components:** The user's total wait is the sum of the batching window
    delay plus the time to process the batch.
