schema_version: 1
id: mobile-0337
title: The Style Transfer Bottleneck
topic: roofline-analysis
status: published
provenance: imported
scenario: You are optimizing a real-time video style transfer filter on an iPhone with an Apple A17 Pro
  chip. You profile a key convolutional layer using on-device performance counters and find it performs
  50 Giga-operations (GOps) while reading and writing a total of 200 MB of data (weights, activations,
  and output) from memory for a single inference pass. Based on this data, explain whether this specific
  layer is compute-bound or memory-bound.
details:
  realistic_solution: The layer is **memory-bound**. The key is to calculate the layer's Arithmetic Intensity
    (AI) and compare it to the hardware's ridge point. A workload is memory-bound if its AI is *less than*
    the hardware's ridge point, meaning the memory system cannot supply data fast enough to keep the compute
    units saturated. In this case, the layer's AI of 250 Ops/Byte is significantly lower than the A17
    Pro's ridge point of ~683 Ops/Byte, indicating that performance is limited by memory bandwidth, not
    raw compute power.
  common_mistake: The most common mistake is confusing the two regimes of the roofline model. An engineer
    might correctly calculate the low Arithmetic Intensity but incorrectly conclude this means the workload
    is 'compute-bound' because the number is far from the chip's peak compute capability. Another error
    is to ignore the memory traffic entirely and just focus on the raw number of operations, assuming
    that 50 G-Ops automatically means the workload must be compute-bound.
  napkin_math: '1. Hardware Specs: Apple A17 Pro has 35 TOPS (35,000 GOps/s) peak compute and 51.2 GB/s
    memory bandwidth. 2. Hardware Ridge Point: 35,000 GOps/s / 51.2 GB/s = 683 Ops/Byte. 3. Model Arithmetic
    Intensity: The layer performs 50 GOps and moves 100 MB of data. Intensity = 50 * 10^9 Ops / 100 *
    10^6 Bytes = 500 Ops/Byte. 4. Bottleneck: Since 500 < 683, the style transfer layer is memory-bound.'
