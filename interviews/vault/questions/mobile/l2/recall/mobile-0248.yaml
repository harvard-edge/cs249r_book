id: mobile-0248
title: The A17 NPU Bottleneck
topic: roofline-analysis
status: published
provenance: imported
scenario: You're an iOS developer optimizing a new generative AI feature that runs on the Apple A17 Pro's
  Neural Engine. Your profiler shows that a critical layer performs 50 Giga-ops (INT8) and reads 200MB
  of data from memory (weights and activations) for each inference.
details:
  realistic_solution: The layer is memory-bound. To determine this, we first calculate the A17 Pro's 'ridge
    point,' which is its ratio of peak compute to peak memory bandwidth. Then we calculate the workload's
    'arithmetic intensity,' which is its ratio of operations to data moved. Since the workload's intensity
    is below the hardware's ridge point, performance is limited by memory bandwidth, not compute.
  common_mistake: Engineers often focus solely on the headline TOPS number (35 TOPS) and assume if performance
    is poor, they must need more compute. They fail to consider that the model might be starving the compute
    units because it can't feed them data fast enough from memory. A roofline analysis is required to
    determine the true bottleneck.
  napkin_math: '1. Calculate Arithmetic Intensity (AI): 50 Giga-ops / 200 MB = 50,000,000,000 / 200,000,000
    = 250 Ops/Byte. 2. Hardware Ridge Point: If a flagship mobile SoC has 35 TOPS of compute and 50 GB/s
    of bandwidth, its ridge point is 35,000 / 50 = 700 Ops/Byte. Since 250 < 700, this layer is heavily
    memory bandwidth bound.'
