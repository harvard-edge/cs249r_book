id: mobile-fill-01349
title: NPU Functional Safety for ISO 26262 ASIL B
topic: safety-certification
status: published
provenance: imported
scenario: A safety-critical automotive ML application performing real-time object detection needs to run
  on a Snapdragon 8 Gen 3 Hexagon NPU, leveraging its 45 TOPS INT8 performance and 12-16 GB LPDDR5X memory.
  To comply with ISO 26262 ASIL B requirements, describe the specific hardware-software co-design elements
  typically implemented within the NPU's functional safety architecture to detect and mitigate random
  hardware faults, focusing on self-test routines and error detection mechanisms.
details:
  realistic_solution: 'For ISO 26262 ASIL B compliance on an NPU like the Snapdragon 8 Gen 3 Hexagon,
    key hardware-software co-design elements typically include:

    1.  **Self-Test Routines**: Implementation of Power-On Self-Test (POST) and Built-In Self-Test (BIST)
    for NPU cores, memory (e.g., LPDDR5X integrity checks), and interfaces. These are complemented by
    periodic online self-tests run during normal operation.

    2.  **Watchdog Timers**: Independent hardware watchdog timers (e.g., windowed watchdog) to monitor
    the NPU''s program execution flow, detecting software hangs or unexpected behavior.

    3.  **Error Detection and Correction**: Extensive use of Error-Correcting Codes (ECC) for the LPDDR5X
    memory and critical internal NPU registers, along with parity checks for data paths and state machines.

    4.  **Diagnostic Coverage**: Mechanisms are designed to achieve a specified diagnostic coverage rate,
    meaning a certain percentage of potential hardware faults are detectable and mitigated by these safety
    measures.'
  common_mistake: A common mistake is to assume that basic error checking (like CRC on communication)
    is sufficient, or to only focus on software-level fault tolerance, neglecting the need for hardware-specific
    diagnostic features and robust self-test routines within the NPU itself for ASIL B compliance.
  napkin_math: If a critical NPU self-test routine consumes 50 milliseconds and must run every 500 milliseconds
    to meet diagnostic coverage requirements for ASIL B, this implies a 10% overhead on the NPU's processing
    capacity. This directly reduces the effective 45 TOPS INT8 available for the primary ML workload,
    impacting application throughput or latency.
