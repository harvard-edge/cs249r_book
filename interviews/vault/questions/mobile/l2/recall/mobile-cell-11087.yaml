id: mobile-cell-11087
title: 'Fault Tolerance: Recall — What is an A/B Model Partition?'
topic: fault-tolerance-checkpointing
status: published
provenance: imported
scenario: In the context of on-device model deployment on Snapdragon 8 Gen 3 (45 TOPS INT8, 16GB), what
  is an A/B model partition strategy, why is it used for fault tolerance, and what is the key constraint
  on device storage?
details:
  realistic_solution: 'A/B model partition: store two versions of the model on device (A = current, B
    = new update). New model downloaded to B, validated, then A/B switch is atomic. If B fails: revert
    to A instantly. Only one model is active at a time.'
  common_mistake: Confusing A/B model partitions with A/B testing (different concepts); thinking A/B requires
    running both models simultaneously.
  napkin_math: 'Storage: 2 × model_size. For 500MB 4-bit 1B model: 1GB needed. Snapdragon 8 Gen 3 devices
    typically have 128-256GB storage → 1GB = 0.4-0.8% of storage. Acceptable. Atomic switch: rename()
    syscall on /data/models/active symlink. Takes 1 microsecond. Validation before commit: run 100 test
    inferences on B → if all pass (< 50ms each) → commit. If any fail → keep A active, delete B, report
    error. Recovery time: 100ms (validation failure detected) + 1 microsecond (revert symlink) = 100ms
    total. No user-visible downtime.'
