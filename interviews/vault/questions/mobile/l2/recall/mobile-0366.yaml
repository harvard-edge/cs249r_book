schema_version: 1
id: mobile-0366
title: The Real-Time Code Completion Budget
topic: latency-decomposition
status: published
provenance: imported
scenario: 'You''re engineering an on-device code completion feature for a new smartphone. The phone''s
  NPU can generate tokens for a small LLM with a time-per-output-token (TPOT) of 50 milliseconds for a
  batch size of one. The UX team has a strict requirement: to feel ''real-time'', the model must generate
  at least 15 tokens per second for each active user. Explain if a single active user''s experience meets
  this requirement. Then, calculate the maximum number of parallel code-completion sessions the device
  can support before the experience for *all* users degrades below the UX threshold, assuming the NPU
  time-slices token generation sequentially across active sessions.'
details:
  realistic_solution: 'First, check the single-user case. The NPU generates 1000ms / 50ms = 20 tokens/sec,
    which exceeds the 15 tokens/sec requirement. For multiple sessions with sequential time-slicing: each
    session''s effective token rate = 20 / N tokens/sec. We need 20 / N ≥ 15, so N ≤ 20 / 15 = 1.33. Since
    N must be an integer, the device can only support 1 session at the required quality level. With 2
    sessions, each gets 10 tokens/sec, which is below the 15 token/sec threshold.'
  common_mistake: The most common mistake is to confuse aggregate throughput with per-stream latency.
    Engineers might see that the NPU can produce 20 tokens/second in total (1000ms / 50ms) and incorrectly
    assume it can serve any number of users as long as their combined demand is below 20 tokens/sec. This
    ignores the fact that time-slicing execution across multiple requests increases the latency for each
    individual request to receive its *next* token.
  napkin_math: '1. **Single-stream throughput:** 1000ms / 50ms = 20 tokens/sec > 15 tokens/sec ✓.

    2. **Per-stream rate with N sessions:** 20 / N tokens/sec.

    3. **Solve for max N:** 20 / N ≥ 15 → N ≤ 1.33 → N_max = 1.

    4. **Verify N=2:** 20 / 2 = 10 tokens/sec < 15 tokens/sec ✗.'
