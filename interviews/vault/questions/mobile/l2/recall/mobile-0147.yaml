id: mobile-0147
title: The NPU Fallback Power Tax
topic: roofline-analysis
status: published
provenance: imported
scenario: You are optimizing a new background service on a flagship smartphone that analyzes user photos.
  When the model runs entirely on the phone's NPU, it consumes 100mW per inference. However, a recent
  OS update deprecated a key operation, forcing 20% of the model's compute workload to fall back to the
  much less efficient CPU. Assuming the CPU is 10x less power-efficient for this kind of workload than
  the NPU, calculate the new total power consumption per inference.
details:
  realistic_solution: The total power is the sum of the power used by the NPU for the supported operations
    and the power used by the CPU for the fallback operations. The NPU handles 80% of the work, while
    the CPU handles the remaining 20% at a 10x power cost relative to the NPU.
  common_mistake: Engineers often underestimate the 'power tax' of CPU fallback. A common mistake is to
    assume the power increase is linear (e.g., a simple 20% increase) or to forget that only the *unsupported
    portion* of the workload runs on the inefficient CPU. The correct approach requires calculating the
    power for the delegated (NPU) and non-delegated (CPU) portions separately before summing them.
  napkin_math: 'Baseline 100% NPU: 100mW. Update forces 20% of ops to CPU. NPU handles 80% = 80mW. CPU
    is ~10x less power-efficient for math. CPU power = 20% * 100mW * 10 = 200mW. Total power = 80mW (NPU)
    + 200mW (CPU) = 280mW. A 20% fallback causes a 2.8x increase in total power consumption, rapidly draining
    the user''s battery.'
