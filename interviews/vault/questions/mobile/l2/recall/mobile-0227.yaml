schema_version: 1
id: mobile-0227
title: The Mobile Roofline Riddle
topic: roofline-analysis
status: published
provenance: imported
scenario: You're optimizing a real-time video style transfer filter on a new smartphone equipped with
  an Apple A17 Pro chip. The A17's Neural Engine (ANE) is rated for 35 TOPS (INT8) and has access to a
  unified memory system with 51.2 GB/s of bandwidth.
details:
  realistic_solution: 'The model is **memory-bound**. The model''s Arithmetic Intensity (AI) is the ratio
    of its operations to its data movement: `7e9 Ops / 50e6 Bytes = 140 Ops/Byte`. The device''s ridge
    point (the AI required to become compute-bound) is `35e12 Ops/s / 51.2e9 Bytes/s ≈ 684 Ops/Byte`.
    Since the model''s AI (140) is significantly less than the device''s ridge point (684), the NPU will
    spend most of its time waiting for data. The memory subsystem is the bottleneck.'
  common_mistake: Engineers often calculate the Arithmetic Intensity correctly but then fail to compare
    it to the hardware's ridge point. They might qualitatively assume '140 Ops/Byte' is a high number
    and incorrectly conclude the model is compute-bound, without realizing it's the ratio between the
    model's AI and the device's AI that matters. Another common error is calculating the device's ridge
    point instead of the model's AI.
  napkin_math: 'Model AI = 7e9 Ops / 50e6 Bytes = 140 Ops/Byte. Device ridge point = 35e12 / 51.2e9 =
    684 Ops/Byte. 140 < 684 => memory-bound. Attainable throughput = AI * BW = 140 * 51.2e9 = 7.17 TOPS
    (only 20% of 35 TOPS peak). Latency = 7e9/7.17e12 = 0.98ms per frame. To fix: increase AI via operator
    fusion or reduce data movement.'
