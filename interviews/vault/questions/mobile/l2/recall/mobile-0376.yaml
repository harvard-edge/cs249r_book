id: mobile-0376
title: The Federated Learning Bandwidth Fallacy
topic: federated-learning
status: published
provenance: imported
scenario: 'Your team is developing a personalized keyboard suggestion feature for an app with 10 million
  daily active users. You''re comparing two training strategies:'
details:
  realistic_solution: 'To properly evaluate the bandwidth trade-off, we must calculate the total data
    volume for each approach separately.


    **Centralized approach:** Each of 10M users uploads a small snippet of raw typing data (~50 KB/day).
    Total = 10M × 50 KB = 500 GB/day.


    **Federated Learning approach:** Each of 10M users uploads a model gradient update (~5 MB/day for
    a typical keyboard model). Total = 10M × 5 MB = 50,000 GB/day (50 TB/day).


    The FL approach moves **100× more data** across the network than centralized training. While it provides
    significant privacy benefits by never transmitting raw user data, the aggregate bandwidth cost is
    two orders of magnitude larger. This is a critical TCO factor: on mobile, bandwidth costs are often
    borne by the user (cellular data), which can impact user satisfaction, app churn, and even regulatory
    compliance in regions with expensive data plans.'
  common_mistake: 'Engineers often assume Federated Learning always reduces network bandwidth. They pattern-match
    ''privacy-preserving'' to ''more efficient'' in all dimensions. They forget to calculate the actual
    data volume trade-off: a small amount of raw user data uploaded centrally vs. a potentially much larger
    model update aggregated from every user.'
  napkin_math: 'First, calculate the total daily data and cost for the Centralized approach:

    1. **Centralized daily data:** 10,000,000 users × 50 KB = 500,000,000 KB = 500 GB

    2. **Centralized daily cost (at $0.01/GB):** 500 GB × $0.01 = **$5/day**


    Next, calculate for the Federated Learning approach:

    3. **FL daily data:** 10,000,000 users × 5 MB = 50,000,000 MB = 50,000 GB (50 TB)

    4. **FL daily cost (at $0.01/GB):** 50,000 GB × $0.01 = **$500/day**


    **Ratio:** $500 / $5 = **100×** more expensive in bandwidth for the FL approach.


    This ignores the user-side cellular data cost. If users pay ~$10/GB for cellular data, FL costs each
    user ~$0.05/day in data charges — small individually, but a real concern at scale and a driver of
    user churn.'
