id: mobile-cell-12060
title: 'Model Format Conversion: Size ONNX vs. TFLite Model Storage for Mobile App'
topic: model-format-conversion
status: published
provenance: imported
scenario: 'A mobile app includes 3 ML models: (1) face detection (MobileNet-SSD, 6.8M params), (2) emotion
  recognition (SqueezeNet, 1.2M params), (3) background segmentation (DeepLab-MobileNet, 5.9M params).
  Size ONNX (FP32) vs. TFLite (INT8 quantized) variants for both iOS and Android, and determine if they
  meet App Store''s 200MB binary limit when bundled.'
details:
  realistic_solution: 'ONNX FP32: (6.8+1.2+5.9)M × 4B × 1.12 overhead = 13.9M × 4 × 1.12 = 62.3MB. TFLite
    INT8: 13.9M × 1B × 1.05 overhead = 14.6MB. App binary: iOS Mach-O base ~20MB + TFLite 14.6MB = 34.6MB
    << 200MB ✓. ONNX too large for bundling on Android? 62.3MB fine under 200MB limit. Recommendation:
    TFLite INT8 for 4× smaller app size, better CDN costs.'
  common_mistake: Computing model size as params × 4 bytes without accounting for ONNX format overhead
    (prototxt, metadata) which adds ~10-15% to raw weight size.
  napkin_math: 'Total params: 6.8+1.2+5.9=13.9M. ONNX FP32: 13.9M×4B=55.6MB + 10% overhead=61.2MB. TFLite
    INT8: 13.9M×1B=13.9MB + 5% overhead=14.6MB. App Store limit 200MB: both fit. But user download size
    matters: 61MB ONNX vs 15MB TFLite. At 1M installs × (61-15)MB = 46TB extra CDN = $4,140 saved by using
    TFLite.'
