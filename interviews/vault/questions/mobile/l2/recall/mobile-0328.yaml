id: mobile-0328
title: The Driver Drowsiness Drain
topic: duty-cycling
status: published
provenance: imported
scenario: Your team is building a 'Driver Focus' feature for a ridesharing app. It uses a CNN on the phone's
  SoC to check for driver drowsiness. The inference takes 1 second to run, during which the SoC consumes
  5W. To save battery, you decide to run this check only once every 10 seconds. In the idle time between
  checks, the SoC consumes a constant 50mW. Explain how you would calculate the total energy (in Watt-hours)
  this feature consumes over an 8-hour driving shift.
details:
  realistic_solution: The correct method is to calculate the average power over one full period (10 seconds),
    which includes both the active and idle states. This average power is then multiplied by the total
    duration of the shift (8 hours) to find the total energy consumed.
  common_mistake: Engineers often calculate the energy consumption for the 'active' state but completely
    ignore the 'idle' state's power consumption. While the idle power is much smaller, over a long period
    like 8 hours, it adds up to a non-trivial amount of energy. Another frequent error is to calculate
    the average power correctly but then forget to multiply by the total time, confusing power (Watts)
    with energy (Watt-hours).
  napkin_math: 1.  **Define States & Power:**
