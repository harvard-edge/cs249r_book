schema_version: 1
id: mobile-0060
title: The Synchronous Inference ANR
topic: real-time-deadlines
status: published
provenance: imported
scenario: A junior engineer on your team implements a new 'Magic Retouch' feature. When the user clicks
  a button, a large, synchronous ML model runs on the main UI thread to apply a filter to a high-resolution
  photo. The model takes 6 seconds to complete. Explain the exact user experience on an Android device
  when that button is tapped.
details:
  realistic_solution: When the user taps the button, the main UI thread will be blocked by the 6-second
    model inference. Since this duration exceeds the standard 5-second input dispatch timeout on Android,
    the operating system will intervene. After 5 seconds of unresponsiveness, the OS will display the
    'Application Not Responding' (ANR) dialog. This system dialog gives the user the option to either
    'Wait' or 'Close' the app. This is a critical failure state, much worse than simple jank, and frequently
    leads users to kill the app and leave negative reviews. The correct implementation is to run the inference
    on a background thread and display a loading indicator.
  common_mistake: 'Describing the problem simply as the UI ''freezing'' or becoming ''unresponsive'' for
    6 seconds. While true, this answer misses the most critical OS-level event: the ANR (Application Not
    Responding) dialog, which is a much more severe failure mode than simple UI lag.'
  napkin_math: Model Inference Time = 6 seconds.
