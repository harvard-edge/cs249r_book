id: mobile-fill-00132
title: A17 Pro Neural Engine Inference Throughput
topic: compute-cost-estimation
status: published
provenance: imported
scenario: An ML engineer is optimizing an on-device computer vision model for the Apple A17 Pro chip.
  The A17 Pro features a 35 TOPS Neural Engine, approximately 5W power consumption under heavy ML load,
  and 8 GB of unified memory. The model requires 100 GOPS (Giga Operations Per Second) for a single inference.
details:
  realistic_solution: To determine the theoretical maximum inferences per second, convert the Neural Engine's
    TOPS rating to GOPS and divide by the model's GOPS requirement per inference. This assumes peak theoretical
    performance without considering overheads or real-world bottlenecks.
  common_mistake: Incorrectly converting between TOPS and GOPS, or failing to identify the relevant chip
    specification for inference speed.
  napkin_math: 'Neural Engine Capacity: 35 TOPS = 35,000 GOPS.

    Model Requirement: 100 GOPS/inference.

    Theoretical Inferences/second = 35,000 GOPS / 100 GOPS/inference = 350 inferences/second.'
