id: mobile-0269
title: The Dashcam Drain Dilemma
topic: duty-cycling
status: published
provenance: imported
scenario: 'You are designing a ''sentry mode'' dashcam feature for a mobile app. To conserve energy, the
  feature operates on a duty cycle: it activates for 2 seconds to run inference at 4W, then enters a low-power
  sleep state at 0.02W for 8 seconds before repeating the cycle. The phone has a 15 Wh battery. Calculate
  the average power consumption and estimate how long the battery will last running this feature.'
details:
  realistic_solution: The average power is calculated as a weighted average over the duty cycle. Active
    fraction = 2s / 10s = 0.2. Sleep fraction = 8s / 10s = 0.8. Average power = (0.2 * 4W) + (0.8 * 0.02W)
    = 0.8W + 0.016W = 0.816W. Battery life = 15 Wh / 0.816W ≈ 18.4 hours.
  common_mistake: A common mistake is to incorrectly calculate the average power. Some engineers simply
    average the active and sleep power values (e.g., (4W + 0.02W) / 2), which ignores that the phone spends
    much more time sleeping than active. Another error is to completely neglect the sleep power, assuming
    it's zero, which leads to an overestimation of battery life.
  napkin_math: '1. **Define the cycle period:** 2s active + 8s sleep = 10s total.

    2. **Duty cycle fractions:** Active = 2/10 = 0.2, Sleep = 8/10 = 0.8.

    3. **Weighted average power:** (0.2 × 4W) + (0.8 × 0.02W) = 0.8W + 0.016W = 0.816W.

    4. **Battery life:** 15 Wh / 0.816W ≈ 18.4 hours.'
