id: mobile-cell-13208
title: 'Mobile Transformer Cost Recall: Mobile LLM Memory Bandwidth Facts'
topic: transformer-systems-cost
status: published
provenance: imported
scenario: State the memory bandwidth for A17 Pro, Snapdragon 8 Gen 3, and Tensor G3 mobile SoCs, and explain
  why memory bandwidth (not TOPS) determines LLM decode throughput at batch=1. Give the decode tokens/second
  formula and calculate it for a 3B INT4 model on each platform.
details:
  realistic_solution: 'A17 Pro: ~100GB/s. Snap 8G3: ~77GB/s. Tensor G3: ~68GB/s. LLM decode at batch=1
    is memory-bandwidth-bound: each decode step loads all model weights (INT4: 0.5 bytes/param) from DRAM.
    Formula: tok/s = bandwidth_GB/s / model_size_GB = bandwidth / (params * 0.5 / 1e9). 3B INT4 = 1.5GB.
    A17: 100/1.5=66.7 tok/s. Snap: 77/1.5=51.3 tok/s. Tensor G3: 68/1.5=45.3 tok/s. Ranking: A17 Pro (66.7)
    > Snap 8G3 (51.3) > Tensor G3 (45.3). Despite A17''s lower TOPS (35 vs 45 vs 7.5), A17 wins on LLM
    decode due to highest bandwidth. TOPS only matters for compute-bound operations (prefill at large
    batch).'
  common_mistake: Memorizing only TOPS values for mobile chips (35, 45, 7.5 TOPS) while forgetting memory
    bandwidth values (100, 77, 68 GB/s), which are the relevant metric for LLM decode performance.
  napkin_math: 'Formula: decode_tok/s = BW_GB/s / model_GB. 3B INT4: 1.5GB. A17: 100/1.5=66.7 tok/s. Snap:
    77/1.5=51.3 tok/s. Tensor: 68/1.5=45.3 tok/s. 100-tok response: A17=1.5s, Snap=1.95s, Tensor=2.21s.
    All under 3s SLO for 3B model. 7B INT4: 3.5GB. A17: 100/3.5=28.6 tok/s. Snap: 77/3.5=22 tok/s. Tensor:
    68/3.5=19.4 tok/s. 100-tok: A17=3.5s>3s FAILS, Snap=4.55s FAILS, Tensor=5.15s FAILS. 7B is too slow
    on all mobile for 3s SLO. Max model for <3s/100toks: params < BW*3s/0.5=BW*6. A17: 600B params INT4
    → 6GB model. Tensor: 68*6=408 → 4B params INT4. All mobiles: 3B INT4 is the practical mobile LLM size
    for <3s P99.'
