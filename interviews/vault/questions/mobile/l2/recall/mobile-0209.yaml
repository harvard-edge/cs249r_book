schema_version: 1
id: mobile-0209
title: The Real-Time Translation Deadline
topic: batching-strategies
status: draft
provenance: imported
scenario: You're designing a real-time translation feature for a new flagship smartphone. The app needs
  to feel instantaneous, so the UI team has given you a strict 16ms render deadline for each new translated
  word to avoid 'jank'. Your on-device model has a 'Time to First Token' (TTFT) of 100ms for a new sentence,
  and a 'Time Per Output Token' (TPOT) of 12ms for each subsequent word. In a continuous batching loop,
  processing N concurrent streams means the model generates one token for each stream sequentially before
  cycling back, so the effective per-stream token interval is N * TPOT. How many concurrent translation
  streams can you serve within the 16ms render deadline?
details:
  realistic_solution: 'You can only handle 1 concurrent stream within the 16ms render deadline. In a continuous
    batching loop, the effective time between consecutive tokens for any single stream is N * TPOT, where
    N is the number of concurrent streams. For 1 stream: interval = 1 * 12ms = 12ms < 16ms (passes). For
    2 streams: interval = 2 * 12ms = 24ms > 16ms (fails). The key insight is that ''real-time'' constraints
    impose hard per-frame deadlines, not just throughput targets. Even though batching 2 streams would
    increase total throughput (2 tokens per 24ms = 83 tokens/s vs 1 token per 12ms = 83 tokens/s), the
    latency per stream doubles and violates the UI deadline. Solutions include: (1) speculative decoding
    to reduce per-token latency, (2) a smaller model with lower TPOT, or (3) relaxing the UI constraint
    to 33ms (30 FPS).'
  common_mistake: The most common mistake is to assume that you can process multiple streams just because
    the TPOT is less than the deadline (e.g., since 12ms < 16ms). This ignores that in a simple continuous
    batching loop, token generation for the batch is sequential. The token for the second stream is only
    ready after the model has processed the tokens for all preceding streams in that batch, causing its
    delivery time to be a multiple of the TPOT.
  napkin_math: 'Let N be the number of concurrent streams. In continuous batching, the model processes
    one token per stream in round-robin fashion. Effective per-stream interval = N * TPOT. Constraint:
    N * TPOT <= 16ms. N <= 16ms / 12ms = 1.33. Therefore N = 1 stream maximum. With 1 stream: 12ms per
    token, leaving 4ms slack before the 16ms deadline. With 2 streams: 24ms per token per stream, exceeding
    the 16ms budget by 8ms.'
