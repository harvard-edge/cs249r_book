schema_version: 1
id: mobile-0760
title: The Speculative Decoding Gambit
topic: graph-compilation
status: published
provenance: imported
scenario: On a mobile device, your main 7B LLM generates at 5 tokens/second (memory-bandwidth-bound).
  You add a 150M draft model that runs at 20 tokens/second. The draft model proposes 4 tokens at a time,
  and on average 3 are accepted by the verifier. What is the effective token throughput with speculative
  decoding?
details:
  realistic_solution: 'Draft time: 4 tokens / 20 tok/s = 0.2s. Verification: 1 forward pass of large model
    = 0.2s. Total: 0.4s for 4 accepted tokens (3 accepted + 1 from verification). Effective: 4/0.4 = 10
    tok/s, a 2x speedup over the baseline 5 tok/s.'
  common_mistake: Assuming speculative decoding simply adds the two models' speeds. The key insight is
    that the large model verifies all 4 draft tokens in a single forward pass (same cost as generating
    1 token), so you get multiple tokens for the price of one verification.
  napkin_math: 'Main 7B speed: 5 tok/s = 200ms/tok. Draft 150M speed: 20 tok/s = 50ms/tok. Generating
    4 draft tokens takes 4 * 50ms = 200ms. Target model verifies these 4 tokens in a single batch pass
    (memory bandwidth bound) taking ~200ms. Total time = 400ms. 3 draft accepted + 1 verified = 4 tokens
    per 400ms. Effective speed = 10 tok/s (2x speedup).'
