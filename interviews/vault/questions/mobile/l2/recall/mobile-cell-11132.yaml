schema_version: 1
id: mobile-cell-11132
title: 'Kernel Fusion: Recall — Arithmetic Intensity and Mobile Fusion Impact'
topic: kernel-fusion
status: published
provenance: imported
scenario: For an elementwise ReLU operation on a 4096-element FP16 tensor on Snapdragon 8 Gen 3 (45 TOPS
  INT8, 16GB), compute the arithmetic intensity and determine whether fusing it with the preceding operation
  would reduce latency.
details:
  realistic_solution: 'ReLU on 4096-element FP16: 1 FLOPs, 2 bytes read + 2 bytes write = 4 bytes per
    element. AI = 1/4 = 0.25 FLOPs/byte. Ridge point Snapdragon: 45,000 / 68 = 662 FLOPs/byte. Far below
    ridge → extremely memory-bound. But the tensor is only 4096 × 4B = 16KB. Time = 16KB / 68 GB/s = 0.235µs.
    Fusion saves 1 kernel launch (10µs) and 8KB intermediate write/read = 8KB / 68 GB/s = 0.118µs. Total
    save: 10.12µs.'
  common_mistake: Claiming large latency savings for fusing tiny elementwise ops on a mobile decode workload
    — the activation tensors are tiny (8KB), so bandwidth savings are negligible vs weight loading.
  napkin_math: 'ReLU FLOPs: 4096 × 1 = 4096 FLOPs. Bytes: 4096 × 4B = 16KB read + write. AI = 4096/16384
    = 0.25 FLOPs/byte << 662. Memory-bound, but tensor tiny. Time: 16KB / 68 GB/s = 0.235µs. Kernel launch:
    10µs. Total unfused: 10.235µs. Fused: 0µs (free, happens in preceding kernel''s registers). Saving:
    10.235µs. At 30 tokens/sec decode: 1000ms/30 = 33.3ms/token. Saving 10µs = 0.03% improvement — completely
    negligible for decode mode. Key insight: kernel launch overhead (10µs) >> memory time (0.235µs) for
    small tensors. Fusing small elementwise ops reduces launch count but barely affects decode latency.'
