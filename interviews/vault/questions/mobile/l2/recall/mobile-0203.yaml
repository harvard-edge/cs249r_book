title: 'The Economics of Privacy: Centralized vs. Federated'
topic: federated-learning
status: published
provenance: imported
scenario: 'You are a Staff ML Engineer at a photo-sharing app planning an A/B test to improve your ''auto-enhance''
  filter. You are comparing two training strategies for a cohort of 1 million users:'
details:
  realistic_solution: The correct way to solve this is to first calculate the total data volume for the
    entire user cohort and then apply the provider's unit cost. This analysis reveals the direct financial
    trade-offs between a centralized approach and a privacy-preserving one like federated learning.
  common_mistake: Engineers often focus solely on model accuracy improvements and neglect the significant
    operational costs (TCO) associated with data logistics. A common calculation error is confusing units
    (MB vs. GB) or miscalculating the total data volume by an order of magnitude, leading to unexpected
    budget overruns. Another pitfall is ignoring the implicit cost of user privacy and trust erosion inherent
    in uploading personal data.
  napkin_math: "1. **Calculate total data volume in MB:**\n   - Each user generates ~5 MB of training\
    \ data per day.\n   - Total data = 1,000,000 users × 5 MB/user = 5,000,000 MB\n2. **Convert to GB:**\n\
    \   - 5,000,000 MB ÷ 1,000 = 5,000 GB\n3. **Calculate cloud ingress cost:**\n   - Cost = 5,000 GB\
    \ × $0.01/GB = **$50/day**\n4. **Monthly cost:**\n   - $50/day × 30 days = **$1,500/month**\n\nThis\
    \ is the baseline cost of the centralized approach. The federated approach eliminates this data transfer\
    \ cost entirely but introduces compute and coordination overhead on-device."
