title: The On-Device Memory Diet
topic: quantization-fundamentals
status: draft
provenance: imported
scenario: A mobile machine learning engineer is tasked with optimizing a 150 million parameter image segmentation
  model for an iPhone. The model's weights are currently stored in FP16 precision. To reduce the application's
  memory footprint, they plan to quantize the weights to INT8. Compare the memory required for the weights
  before and after quantization, and calculate the total memory savings.
details:
  realistic_solution: The calculation is a straightforward comparison of memory based on the number of
    parameters and the size of each parameter's data type.
  common_mistake: Engineers often confuse the memory footprint of FP32 (4 bytes) with FP16 (2 bytes),
    leading to an overestimation of the initial memory size and the potential savings. Another common
    error is to report the final INT8 size instead of the memory *reduction*.
  napkin_math: 1. **Calculate initial memory (FP16):**
