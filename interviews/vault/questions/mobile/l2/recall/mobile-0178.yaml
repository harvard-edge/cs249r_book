schema_version: 1
id: mobile-0178
title: The Fusion Overhead Tax
topic: kernel-fusion
status: published
provenance: imported
scenario: You're optimizing a vision model on a smartphone. A profiler shows two sequential operators,
  a 2D convolution and a ReLU, are taking up a significant portion of your latency budget. The intermediate
  activation tensor between them is 1 MB. The Conv compute takes 1.0 ms and the ReLU compute takes 0.1
  ms. The phone's SoC has LPDDR5 memory with a bandwidth of 51.2 GB/s.
details:
  realistic_solution: In the unfused case, the 1 MB intermediate tensor must be written to LPDDR5 DRAM
    and then read back by the next operator. In the fused case, the intermediate result stays in the NPU's
    much faster local SRAM, making the memory transfer time negligible.
  common_mistake: Engineers often focus only on the raw compute time of operators and assume memory access
    is free, especially for small-looking tensors. They forget that even 1 MB must be written to and then
    read back from main memory between unfused operators, constituting a 'tax' on latency. Another common
    error is only accounting for the write or the read, not the full roundtrip.
  napkin_math: "1. **Calculate Memory Transfer Time:** Reading 1 MB and writing 1 MB = 2 MB total memory\
    \ traffic. At 51.2 GB/s, transfer time = 2 MB / 51.2 GB/s = ~0.039 ms. \n2. **Calculate Overhead:**\
    \ Total compute time = 1.0 ms (Conv) + 0.1 ms (ReLU) = 1.1 ms. Fusion saves the 0.039 ms memory transfer.\
    \ 0.039 ms / 1.1 ms = ~3.5% overhead."
