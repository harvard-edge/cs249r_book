schema_version: 1
id: mobile-0312
title: The Road Trip Battery Drain
topic: duty-cycling
status: published
provenance: imported
scenario: You're on a long road trip using a new flagship smartphone for an AR navigation app. The app
  is computationally intensive and keeps the System-on-Chip (SoC) in a high-power state, consuming a continuous
  4W. If the phone's battery has a total capacity of 19 Watt-hours (Wh), calculate how long the phone
  can run the app before the battery is fully depleted, assuming this app is the only significant power
  draw.
details:
  realistic_solution: The correct approach is to divide the total energy stored in the battery by the
    rate of energy consumption (power). The battery stores 19 Wh of energy, and the SoC consumes it at
    a rate of 4 Watts. Dividing the total energy by the rate of consumption gives the total time the device
    can operate.
  common_mistake: A common mistake is to confuse the units of power (Watts, a rate) and energy (Watt-hours,
    a quantity). Engineers might incorrectly multiply instead of divide, or use an incorrect power value
    from a spec sheet without reading the scenario. For instance, using the peak 5W SoC power from the
    reference table instead of the 4W specified in the problem would result in an underestimation of battery
    life.
  napkin_math: 'Given: | Battery Capacity: 19 Wh | SoC Power Draw: 4 W'
