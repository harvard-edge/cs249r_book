id: mobile-0308
title: The Mobile Roofline Dilemma (mobile-0308)
topic: roofline-analysis
status: draft
provenance: imported
scenario: 'You''re an engineer on a mobile team trying to optimize a new real-time camera filter. The
  core of your filter runs on the Apple A17 Pro''s Neural Engine. You measure the workload: for each video
  frame, it performs 414 million INT8 operations and moves 8.3 MB of data (reading the input tensor and
  writing the output). The A17 Pro Neural Engine is rated for 35 TOPS and has a memory bandwidth of 51.2
  GB/s. Explain whether this workload is compute-bound or memory-bound.'
details:
  realistic_solution: The workload is **memory-bound**. To determine this, we must calculate the workload's
    Arithmetic Intensity (AI) and compare it to the hardware's ridge point.
  common_mistake: The most common mistake is failing to normalize the units for compute (Tera-ops/sec)
    and bandwidth (Giga-bytes/sec) when calculating the hardware's ridge point. This leads to an error
    of 1000x and an incorrect conclusion. Another mistake is simply guessing based on the large '35 TOPS'
    number without calculating the arithmetic intensity of the actual workload.
  napkin_math: '1. **Calculate Arithmetic Intensity (AI):** AI = 414 × 10^6 Ops / (8.3 × 10^6 Bytes) ≈
    49.9 Ops/Byte.

    2. **Calculate Hardware Ridge Point:** Ridge Point = 35 × 10^12 / (51.2 × 10^9) ≈ 683 Ops/Byte.

    3. **Compare:** AI (49.9) << Ridge Point (683) → workload is **memory-bound**.

    4. **Memory-limited time:** 8.3 MB / 51.2 GB/s ≈ 0.16 ms. Compute time: 414 MOps / 35 TOPS ≈ 0.012
    ms. Memory is ~13× slower than compute for this workload.'
