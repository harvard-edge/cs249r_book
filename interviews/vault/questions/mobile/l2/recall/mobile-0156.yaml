schema_version: 1
id: mobile-0156
title: The Delta Update Dilemma
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: Your team has trained a new `220 MB` Computer Vision model for your mobile app. This is too
  large for the App Store's `200 MB` over-the-air (OTA) download limit, hurting adoption for users on
  cellular data. The new model is an evolution of a `50 MB` v1 model already included in your app binary.
  A detailed analysis shows that `45 MB` of the v1 model's data is byte-for-byte identical to a corresponding
  part of the new `220 MB` model. You propose shipping a 'delta patch' to update from v1 to v2 on the
  user's device. Calculate the approximate size of this delta patch and determine if this strategy will
  solve the OTA download problem.
details:
  realistic_solution: A delta patch works by only shipping the data that has changed between two versions.
    The user's device uses the v1 model (the source) and the downloaded patch to reconstruct the full
    v2 model (the target). The patch must contain all the data present in v2 but *not* in v1. Since 45
    MB of data is shared, the new data required is the total size of the new model minus that shared portion.
    This makes the patch size approximately `220 MB - 45 MB = 175 MB`. This is below the `200 MB` OTA
    limit, so the strategy is successful. A real-world patch would have a small overhead (a few KB or
    MB) for metadata and instructions, but it would still be well within the budget.
  common_mistake: The most common mistake is to confuse the delta with the simple difference in total
    file sizes (`220 MB - 50 MB = 170 MB`). This is incorrect because it doesn't account for the actual
    shared bytes which don't need to be downloaded. A delta patch needs to contain all the *new* data
    in the target file that wasn't in the source file. Another mistake is calculating the delta on the
    wrong base (`50 MB - 45 MB = 5 MB`), which only represents the discarded data from the original model.
  napkin_math: '1. Identify Target Model Size: 220 MB'
