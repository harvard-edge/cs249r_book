id: mobile-0260
title: The On-Device Assistant's First Word
topic: latency-decomposition
status: published
provenance: imported
scenario: You're scoping the user experience for a new on-device AI assistant on a flagship smartphone.
  The core of the assistant is a 7 billion parameter Large Language Model, which has been quantized to
  INT8. The phone's specification sheet lists a peak memory bandwidth of 77 GB/s from its LPDDR5x DRAM.
  For the assistant to feel 'instant,' the product team has set a strict Time-To-First-Token (TTFT) budget
  of 200ms. Assuming the primary bottleneck for this initial response is loading the model weights from
  DRAM into the Neural Processing Unit's (NPU) local memory, calculate the theoretical minimum latency
  for this data transfer. Based on your calculation, is this approach feasible?
details:
  realistic_solution: Yes, the approach is feasible. A 7B parameter model at INT8 precision requires 7
    GB of storage. Transferring 7 GB over a 77 GB/s memory bus takes approximately 91 milliseconds, which
    is well within the 200ms perceptual budget for a fast response. This leaves over 100ms of slack for
    software overhead, prompt processing, and the initial forward pass.
  common_mistake: The most common mistake is using the wrong precision for the calculation. Engineers
    often default to thinking in FP16 (2 bytes per parameter) for LLMs, but on-device quantization to
    INT8 (1 byte per parameter) is critical. This error doubles the calculated memory footprint and latency,
    potentially leading to incorrect conclusions about feasibility.
  napkin_math: 1. Model Size in Bytes = 7,000,000,000 params × 1 byte/param (INT8) = 7 GB
