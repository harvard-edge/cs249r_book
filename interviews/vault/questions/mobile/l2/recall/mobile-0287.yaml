title: The Autopilot OTA Budget
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: You are an engineer on an automotive team deploying a new driver-assist model. The new model
  has 60 million parameters and is stored in FP16 format. Company policy dictates that any over-the-air
  (OTA) update delivered via cellular must be under 150 MB to avoid high data costs for customers. Can
  you ship this new model within the budget? Explain the calculation.
details:
  realistic_solution: Yes, the model fits within the OTA budget. The size is calculated by multiplying
    the number of parameters by the size of the data type. For FP16, each parameter requires 2 bytes.
  common_mistake: The most common mistake is to confuse precision formats. Engineers often calculate using
    FP32 (4 bytes/param) by default, or mistakenly use INT8 (1 byte/param), leading to a 2x error in either
    direction. This completely changes the decision on whether to ship.
  napkin_math: '1. Model Weights: The model has 60,000,000 parameters. 2. FP16 Format: FP16 uses 2 bytes
    per parameter. 3. Base Size: 60M params * 2 bytes = 120,000,000 bytes = 120 MB. 4. Overhead: Assuming
    10 MB for metadata and binary execution code, the total payload is ~130 MB. 5. Conclusion: 130 MB
    is strictly under the 150 MB cellular OTA limit, so the update can be safely pushed without Wi-Fi.'
