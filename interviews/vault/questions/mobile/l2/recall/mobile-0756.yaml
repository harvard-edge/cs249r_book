schema_version: 1
id: mobile-0756
title: The Depthwise Separable Convolution Dividend
topic: neural-architecture-search
status: published
provenance: imported
scenario: You are porting a server-side image classifier to mobile. The heaviest layer is a standard 3x3
  convolution with 256 input and 256 output channels. A colleague suggests replacing it with a depthwise
  separable convolution. By what factor does this reduce the multiply-accumulate operations per spatial
  position?
details:
  realistic_solution: 'Standard 3x3 conv: 256 x 256 x 9 = 589,824 MACs per position. Depthwise separable:
    (256 x 9) + (256 x 256) = 2,304 + 65,536 = 67,840 MACs. Ratio: 589,824 / 67,840 = 8.7x reduction.'
  common_mistake: Guessing a 2-3x reduction. The actual savings scale with the number of output channels
    and are much larger, which is why MobileNet achieved near-ResNet accuracy with 8-9x fewer FLOPs.
  napkin_math: 'Standard: C_in x C_out x K^2 = 256 x 256 x 9 = 590K MACs. DW-sep: C_in x K^2 + C_in x
    C_out = 2.3K + 65.5K = 67.8K MACs. Savings: ~8.7x.'
