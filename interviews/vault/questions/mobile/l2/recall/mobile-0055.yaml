schema_version: 1
id: mobile-0055
title: The App Memory Budget
topic: activation-memory
status: draft
provenance: imported
scenario: You're building a new 'AI stylist' feature for a fashion app. It uses a generative model to
  let users 'try on' clothes. Your target device is a high-end smartphone with 8 GB of RAM. As a systems
  engineer, you need to give the team a safe memory budget for the entire application to avoid being terminated
  by the operating system. What is a realistic upper limit for your app's memory consumption?
details:
  realistic_solution: A standard rule of thumb for mobile development is that a single application should
    not exceed about 25% of the total device RAM. This provides a safe margin, accounting for the OS's
    own needs and ensuring a stable user experience. For a device with 8 GB of RAM, the safe memory budget
    for your entire application is approximately 2 GB.
  common_mistake: Engineers often assume their application can use the majority of the advertised device
    RAM (e.g., 6 GB out of 8 GB). They forget that the OS, critical background services (like networking
    and location), and other apps in memory all consume a significant and protected share. Exceeding the
    implicit budget assigned by the OS leads to 'Jetsam' events on iOS or 'LMK' (Low Memory Killer) events
    on Android, where the OS forcefully terminates the app to reclaim memory.
  napkin_math: Device RAM = 8 GB | Rule of Thumb for App Budget = 25%
