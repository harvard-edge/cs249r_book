id: mobile-0313
title: The Canary Rollout Data Bill
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: You're an engineer on a popular mobile photo app with 10 million active users. Your team has
  developed a new, improved version of the on-device "magic touch-up" model. The new quantized model file
  is 20 MB. To validate its real-world performance before a full release, you plan to perform a 1% canary
  rollout. Assuming a conservative mobile data cost of $5.00 per GB for your users, calculate the total
  data cost for this initial canary rollout.
details:
  realistic_solution: The correct approach is to first calculate the number of users in the canary group,
    then determine the total data volume downloaded in MB, convert that volume to GB, and finally calculate
    the total cost based on the price per GB. At scale, these costs are non-trivial and must be factored
    into any rollout plan.
  common_mistake: The most common mistake is a unit conversion error—specifically, forgetting to convert
    the total download size from Megabytes (MB) to Gigabytes (GB) before multiplying by the cost per GB.
    This leads to an answer that is 1000× too high and would cause significant alarm in a real-world budget
    planning meeting.
  napkin_math: 1. **Calculate users in canary:** 10,000,000 users * 1% = 100,000 users
