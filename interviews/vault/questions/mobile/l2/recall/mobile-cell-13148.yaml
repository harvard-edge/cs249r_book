schema_version: 1
id: mobile-cell-13148
title: 'Mobile TCO Recall: Mobile ML Hardware Cost Tiers'
topic: tco-cost-modeling
status: published
provenance: imported
scenario: State the TOPS ratings and RAM capacities for the three major mobile ML platforms (A17 Pro,
  Snapdragon 8 Gen 3, Tensor G3), their power draw for LLM inference, and the maximum LLM parameter count
  each can run at INT4 and FP16 quantization given their RAM. Show the calculation for maximum model size.
details:
  realistic_solution: 'A17 Pro: 35 TOPS, 8GB RAM. Available: ~6GB. Max model INT4: 6GB/0.5B/param = 12B
    params. Max FP16: 6GB/2B = 3B params. Power: ~3W for 7B INT4. Snapdragon 8 Gen 3: 45 TOPS, 16GB. Available:
    ~14GB. Max INT4: 14/0.5=28B. Max FP16: 14/2=7B. Power: ~4W. Tensor G3: 7.5 TOPS, 12GB. Available:
    ~10GB. Max INT4: 20B. Max FP16: 5B. Power: ~5W. Note: INT4 runs 7B models on A17, but requires additional
    KV cache (2 bytes/token/layer): 7B model, 80 layers, 4096 ctx: 80*2048*2*80*2=40MB KV cache. Negligible.
    Main constraint: model weights.'
  common_mistake: Assuming all available RAM can be used for the model without subtracting OS and app
    overhead (typically 2-3GB on modern phones), and not distinguishing between INT4 (4 bits = 0.5 bytes/param)
    and FP16 (16 bits = 2 bytes/param).
  napkin_math: 'Model size formula: params * bytes/param. A17 (6GB free): INT4=6GB/0.5B=12B params max.
    FP16=6/2=3B. Snap 8G3 (14GB free): INT4=28B. FP16=7B. Tensor G3 (10GB free): INT4=20B. FP16=5B. Practical
    limits: A17 runs Llama-3-8B INT4 (4GB) ✓ but NOT Llama-3-8B FP16 (16GB) ✗. Snap runs Llama-3-8B FP16
    (16GB = all RAM, too tight; use INT8 at 8GB ✓). Best mobile model: Phi-3-Mini (3.8B INT4 = 1.9GB)
    runs on all three. TOPS comparison: A17 35 TOPS vs Snap 45 TOPS vs Tensor 7.5 TOPS. Snap 6x faster
    than Tensor for TOPS-bound workloads.'
