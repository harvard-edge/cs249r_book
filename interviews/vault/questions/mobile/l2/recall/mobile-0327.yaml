schema_version: 1
id: mobile-0327
title: The On-Device Autocomplete Queue
topic: latency-decomposition
status: published
provenance: imported
scenario: You're designing an AI autocomplete feature for a new smartphone's messaging app. The on-device
  LLM runs on the phone's NPU. From your benchmarking, you know it has a prefill latency (Time To First
  Token) of 200ms and a decoding latency (Time Per Output Token) of 50ms. Each autocomplete trigger generates
  a 5-token suggestion. A fast typist triggers autocomplete every 400ms. Can the system keep up?
details:
  realistic_solution: No, the system cannot keep up. Total service time per request = TTFT + (tokens ×
    TPOT) = 200ms + (5 × 50ms) = 200ms + 250ms = 450ms. Arrival interval = 400ms. Because the 450ms processing
    time is greater than the 400ms arrival interval, the system utilization is >100%. Requests will pile
    up in the queue, and latency will grow unboundedly.
  common_mistake: 'The most common mistake is to ignore one of the two key latency components: either
    the Time To First Token (TTFT/prefill) or the cumulative Time Per Output Token (TPOT/decoding). Engineers
    often focus only on the decoding throughput (tokens/sec) and forget that the initial prefill is a
    significant, often dominant, part of the total service time for short-output tasks.'
  napkin_math: '1. Service Time per Request: TTFT (200ms) + (5 tokens * 50ms/token) = 200ms + 250ms =
    450ms total generation time. 2. Arrival Rate: New requests arrive every 400ms. 3. System Utilization
    (rho): Service Time / Arrival Interval = 450ms / 400ms = 1.125 (112.5%). 4. Conclusion: Because rho
    > 1, the NPU cannot keep up. Latency will grow unboundedly, leading to severe lag in the messaging
    app.'
