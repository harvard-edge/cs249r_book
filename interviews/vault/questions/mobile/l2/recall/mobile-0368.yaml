id: mobile-0368
title: The OTA Battery Tax
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: You're an engineer on a popular messaging app planning to roll out a new on-device generative
  AI model for smart replies. The new model is 200 MB, a significant increase from the previous 10 MB
  classifier. The update will be delivered via an Over-the-Air (OTA) background download. Assume for a
  typical user on a cellular connection, the radio consumes a continuous 3 Watts during the download,
  the network speed is a steady 10 MB/s, and the phone has a standard 5000 mAh (18.5 Wh) battery.
details:
  realistic_solution: The correct way to solve this is to first calculate the total time of the download,
    then use the device's power consumption during that time to find the total energy used, and finally
    compare that energy to the phone's total battery capacity.
  common_mistake: Engineers often focus only on the storage size of the model (CapEx), forgetting the
    energy cost of downloading it over a cellular network (OpEx). They might underestimate the impact
    on user experience, especially if updates are frequent or large. At the scale of millions of users,
    even small, individual battery hits accumulate into significant user base dissatisfaction and potential
    app uninstalls.
  napkin_math: '1. Download Time: A 200 MB model at 10 MB/s takes 200 / 10 = 20 seconds. 2. Energy Consumed:
    The cellular modem draws ~3W active power. 20s * 3W = 60 Joules. 3. Battery Capacity: The phone''s
    18.5 Wh battery holds 18.5 * 3600 = 66,600 Joules. 4. Impact: 60 J / 66,600 J = 0.09% battery drain.
    While seemingly small, pushing this to millions of users scales costs, making delta updates preferable.'
