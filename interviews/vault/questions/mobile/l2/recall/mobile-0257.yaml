schema_version: 1
id: mobile-0257
title: The Mobile NPU Roofline
topic: roofline-analysis
status: published
provenance: imported
scenario: You are tasked with optimizing an object detection model for the Apple A17 Pro SoC. Your model
  requires 2 Billion INT8 operations (2 GOps) to process a single frame. Profiling shows that this inference
  requires reading and writing a total of 10 MB of data (weights, activations, etc.) from main memory.
details:
  realistic_solution: The workload is **memory-bound**. To determine this, we must calculate the model's
    Arithmetic Intensity (AI) and compare it to the hardware's 'ridge point'—the operational intensity
    required to achieve peak performance. If the model's AI is lower than the ridge point, it means the
    memory system cannot supply data fast enough to keep the compute units busy.
  common_mistake: A common mistake is to focus solely on the processor's peak TOPS, assuming that high
    TOPS automatically means the workload will be compute-bound. Engineers often neglect to calculate
    the model's operational intensity relative to the hardware's memory bandwidth. They fail to understand
    that a processor can only compute as fast as it can be fed data, leading to misdiagnosed performance
    bottlenecks.
  napkin_math: 'AI = 2 GOps / 10 MB = 200 Ops/Byte. A17 Pro ANE: 35 TOPS INT8, LPDDR5: 51.2 GB/s. Ridge
    point = 35,000 / 51.2 = 683 Ops/Byte. Model AI (200) << ridge (683) → memory-bound. BW-limited perf:
    51.2 GB/s × 200 = 10.24 TOPS, only 29% of peak. Inference time: 10MB/51.2GB/s = 0.2ms (BW-bound),
    not 2G/35T = 0.06ms. Memory is the bottleneck by 3.4×.'
