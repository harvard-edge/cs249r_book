id: mobile-0305
title: The OTA Budget Bust
topic: model-serving-infrastructure
status: published
provenance: imported
scenario: Your team is responsible for the driver assistance features in a new car, which runs its infotainment
  and assistance system on mobile-grade hardware. The product team wants to push an Over-the-Air (OTA)
  update to replace the existing small model with a new 7-billion parameter language model to provide
  more natural conversational alerts. Before even considering latency, you need to do a first-pass sanity
  check on memory. Explain how much memory the model parameters alone will require for inference, assuming
  it's stored in FP16 precision.
details:
  realistic_solution: The model has 7 billion parameters. For FP16 (16-bit floating point) inference,
    each parameter requires 2 bytes of storage. Therefore, the total memory required for the model weights
    is 7 billion parameters multiplied by 2 bytes per parameter, which equals 14 GB. This exceeds the
    typical 8-12 GB of shared RAM available on mobile systems, making the proposal infeasible without
    aggressive model compression.
  common_mistake: Engineers often confuse the memory requirements for INT8, FP16, and full training states.
    A common error is to calculate the size for INT8 (1 byte/param) instead of FP16 (2 bytes/param), underestimating
    the size by 2x. Another mistake is to use the formula for training memory (which includes gradients
    and optimizer states, ~16 bytes/param), which overestimates the requirement by 8x.
  napkin_math: 1. **Identify Parameter Count:** 7 Billion parameters (7e9)
