id: mobile-fill-01519
title: Quantifying Inter-Annotator Agreement for Mobile NPU Deployment
topic: dataset-curation
status: published
provenance: imported
scenario: Your team is preparing a dataset for an image classification model to be deployed on the Samsung
  Exynos 2400 NPU (34.7 TOPS, 12 GB LPDDR5X) for a mobile application. To ensure high-quality labels,
  you employ multiple annotators. Recall a specific metric commonly used to quantify inter-annotator agreement
  and briefly describe its significance in the context of improving dataset quality for on-device deployment.
details:
  realistic_solution: A realistic solution involves consistently using statistical measures like Cohen's
    Kappa (for two annotators) or Fleiss' Kappa (for two or more annotators) to quantify inter-annotator
    agreement. By regularly calculating and monitoring these metrics, teams can identify ambiguous annotation
    guidelines or difficult data samples, allowing for targeted guideline improvements, annotator retraining,
    or data arbitration, thereby ensuring a cleaner, more reliable dataset for model training and robust
    performance on the Exynos NPU.
  common_mistake: A common mistake is to overlook the quantitative measurement of inter-annotator agreement,
    relying instead on subjective consensus or simple percentage agreement, which doesn't account for
    chance agreement. This can lead to propagating noisy labels into the training data, ultimately degrading
    model performance on resource-constrained mobile NPUs where every bit of accuracy and efficiency counts.
  napkin_math: "If a dataset of 10,000 images has a crucial class where initial inter-annotator agreement\
    \ is poor, resulting in 5% of these images being ambiguously labeled, and each ambiguous label necessitates\
    \ manual review and correction costing an average of 30 seconds, what is the total additional time\
    \ (in hours) required for this review process? \n\n(10,000 images * 0.05 = 500 ambiguous images)\n\
    (500 images * 30 seconds/image = 15,000 seconds)\n(15,000 seconds / 3600 seconds/hour ≈ 4.17 hours)"
