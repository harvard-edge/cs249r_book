id: mobile-0276
title: The Jank Budget Fallacy
topic: real-time-deadlines
status: published
provenance: imported
scenario: 'You''re optimizing a real-time translation app on a smartphone. To maintain a smooth 60 FPS
  user experience, the UI team has a strict 16ms per-frame deadline for new content. Your on-device generative
  model takes 30ms to produce a single translated token. A teammate suggests batching: instead of generating
  one token every 30ms, the model could generate a batch of 2 tokens every 60ms. Compare the latency of
  the single-token approach versus the batched approach. Can either method stream tokens to the UI without
  causing ''jank'' (stutter)?'
details:
  realistic_solution: 'Neither approach meets the 16ms deadline. Single-token (30ms/token): content arrives
    every other frame = stutter. Batched 2 (60ms): even worse at every 3.6 frames. Fix: decouple generation
    from rendering. Model runs on background thread streaming tokens into a buffer. UI reads every 16ms,
    rendering available characters. Animate character appearance over the 30ms generation window. User
    sees smooth text at ~33 chars/sec. For real-time UI, P99 latency, not throughput, is the critical
    metric.'
  common_mistake: Engineers often confuse throughput with latency. They might calculate the average time
    per token in a batch and believe it meets the deadline, ignoring the fact that the user perceives
    the entire batch latency as a single, long stutter. For real-time UI, P99 latency, not average throughput,
    is the critical metric.
  napkin_math: '1. Calculate UI Target: 60 FPS equates to a frame deadline of 1000ms / 60 = 16.67ms. 2.
    Evaluate Generator Latency: Generating one token takes 30ms. 3. Conclusion: The model''s 30ms latency
    strictly violates the 16.67ms budget. The app cannot block the main thread waiting for tokens without
    dropping the frame rate to ~33 FPS.'
