schema_version: 1
id: mobile-0347
title: The Predictive Text Deadline
topic: latency-decomposition
status: published
provenance: imported
scenario: Your team is optimizing a predictive text feature powered by an on-device LLM for a new smartphone.
  The feature must suggest the next 5 tokens of a sentence within 500ms to feel responsive. Based on performance
  profiling, you've measured that the Time To First Token (TTFT) is 150ms, which includes processing the
  user's prompt. Each subsequent token is generated in 50ms (Time Per Output Token, or TPOT). Does the
  model meet the 500ms deadline for generating 5 tokens?
details:
  realistic_solution: Yes, the model meets the deadline. The total time is the sum of the first token's
    latency (TTFT) and the time for the remaining four tokens (each at TPOT). Total = 150ms + (4 * 50ms)
    = 150ms + 200ms = 350ms. This is 150ms under the 500ms budget, leaving comfortable headroom. The key
    insight is that only 4 tokens use the TPOT rate because the first token is already accounted for by
    the TTFT.
  common_mistake: The most common mistake is an off-by-one error, multiplying the TPOT by the total number
    of tokens (5) instead of the number of *subsequent* tokens (4). Another error is forgetting that the
    first token has a special, higher latency (TTFT) and incorrectly applying the TPOT to all tokens.
  napkin_math: Total Time = TTFT + (Total Tokens - 1) * TPOT = 150ms + (5 - 1) * 50ms = 150ms + 200ms
    = 350ms. 350ms < 500ms deadline. The model passes with 150ms of headroom.
