id: mobile-cell-10245
title: Recalling Compound AI Pipeline Components and Their Roles on Mobile
topic: compound-ai-systems
status: published
provenance: imported
scenario: 'A junior mobile ML engineer at a company deploying an AI assistant on A17 Pro (8GB, 35 TOPS)
  asks: ''What are the standard components in an on-device RAG pipeline, and what does each one do?''
  List and define the standard pipeline components, their sequence, and the output of each stage.'
details:
  realistic_solution: 'Standard on-device RAG pipeline: (1) Query Encoder: bi-encoder transformer (e.g.,
    MobileBERT) converts user query to a dense vector (e.g., 256-dim float32). Output: query embedding.
    (2) Vector Index (FAISS): approximate nearest-neighbor search over document embeddings. Output: top-K
    document IDs + similarity scores. (3) Document Store: SQLite or flat files storing the actual document
    text indexed by ID. Output: top-K document text chunks. (4) Reranker (optional): cross-encoder scores
    query against each retrieved chunk. Output: reranked, filtered chunks. (5) Context Assembly: concatenates
    system prompt + retrieved chunks + query into LLM input. Output: formatted prompt string. (6) Generative
    LLM: autoregressive decoder generates response token by token. Output: response text.'
  common_mistake: 'Conflating the embedding model and the generative LLM as ''the same kind of model''
    because both are transformer-based. They have fundamentally different architectures (encoder-only
    vs decoder-only) and different roles: the embedding model produces fixed-size dense vectors for similarity
    search; the LLM produces variable-length text tokens.'
  napkin_math: 'Memory footprint on A17 Pro: Query encoder (22MB INT8) + FAISS index (10K docs, 256-dim:
    10MB) + Document store (10K * 2KB avg = 20MB) + Reranker (22MB INT8, optional) + Context buffer (2048
    tokens * 4 bytes = 8MB) + LLM 1B INT4 (500MB) = 582MB total. Well within 8GB. Latency budget: query_encode(15ms)
    + FAISS(3ms) + doc_fetch(2ms) + rerank(30ms) + context_assemble(1ms) + LLM_prefill(73ms) + LLM_decode_50tok(2.5s)
    = 2.624s total.'
