id: mobile-fill-01146
title: MLOps Artifacts for On-Device AI with Google Tensor G3
topic: mlops-lifecycle
status: published
provenance: imported
scenario: Your team is developing a new on-device AI feature for a mobile application, targeting devices
  powered by the Google Tensor G3. This chip boasts 7.5 TOPS of AI performance and 12 GB LPDDR5X RAM.
  To maintain strict version control and reproducibility across development, testing, and production,
  your MLOps pipeline needs to manage various artifacts related to the trained models. What specific types
  of artifacts, beyond just the model binary itself, must be registered and versioned in a model registry
  to ensure training-serving consistency and facilitate efficient CI/CD for this on-device deployment?
details:
  realistic_solution: 'To ensure robust reproducibility and training-serving consistency for on-device
    AI, a comprehensive model registry should version the following artifacts: 1) The optimized model
    binary for the target hardware (e.g., quantized TensorFlow Lite model for Google Tensor G3). 2) The
    exact training code (commit hash/tag) and specific version of the machine learning framework used.
    3) Configuration files including hyperparameters, data preprocessing steps, and feature engineering
    definitions. 4) A unique identifier or metadata for the specific dataset version used for training
    and validation. 5) Evaluation metrics and performance benchmarks from various stages (e.g., offline,
    simulated on-device, actual on-device benchmarks). 6) Pre- and post-processing code that runs on the
    device. 7) Environmental dependencies (e.g., libraries, compiler versions) critical for model compilation
    or inference runtime.'
  common_mistake: A common mistake is to only version the final optimized model file (e.g., .tflite or
    .onnx), neglecting other crucial metadata, code, and configurations. This oversight can lead to irreproducible
    results, difficulty debugging deployed models, and broken CI/CD pipelines when attempting to roll
    back or reproduce specific model behaviors on-device.
  napkin_math: "If an on-device AI model deployed on the Google Tensor G3 needs to process sensor data\
    \ at 60 FPS, what is the maximum computational budget (in Giga-Operations, GOPS) available per frame\
    \ for inference, assuming the model perfectly utilizes the chip's 7.5 TOPS? \n\n7.5 TOPS = 7.5 × 10^12\
    \ Operations/second.\nFor 60 FPS, each frame has 1/60th of a second.\nComputational budget per frame\
    \ = (7.5 × 10^12 Operations/second) / 60 frames/second \n= 1.25 × 10^11 Operations/frame \n= 125 GOPS\
    \ per frame. \nThus, the model's inference must not exceed 125 GOPS to meet the real-time requirement."
