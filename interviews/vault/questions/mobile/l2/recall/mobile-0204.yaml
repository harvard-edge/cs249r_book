id: mobile-0204
title: The Mobile Roofline Limit
topic: roofline-analysis
status: published
provenance: imported
scenario: An engineer on your team is profiling a new neural network layer on an Apple A17 Pro chip. They
  tell you the layer performs exactly 10,000 INT8 operations for every 100 bytes of data it reads from
  memory. Given the A17 Pro's peak 35 TOPS (INT8) compute and 51.2 GB/s memory bandwidth, explain whether
  this layer's performance is limited by compute or memory.
details:
  realistic_solution: The layer is **memory-bound**. To determine this, we calculate the layer's Arithmetic
    Intensity (AI) and compare it to the chip's ridge point. The ridge point is the AI needed to saturate
    the chip's compute.
  common_mistake: Engineers often confuse the two sides of the roofline model. They might see a large
    number of operations (10,000) and assume the workload must be compute-intensive, without comparing
    it to the amount of data moved. The key is the *ratio* of operations to data (Arithmetic Intensity),
    not the absolute number of operations.
  napkin_math: '1. Calculate Arithmetic Intensity (AI): 10,000 ops / 100 bytes = 100 OPS/byte. 2. Calculate
    Required Bandwidth for Peak Compute: 35 TOPS (35,000 GOPS) / 100 OPS/byte = 350 GB/s. Since typical
    flagship mobile memory bandwidth peaks around 50-70 GB/s, it cannot sustain 350 GB/s. This layer is
    heavily memory-bound.'
