schema_version: 1
id: mobile-0371
title: The Mobile Roofline Ridge Point
topic: roofline-analysis
status: published
provenance: imported
scenario: You're profiling a new vision model on an Apple A17 Pro chip. Its Neural Engine (ANE) is rated
  at 35 TOPS (INT8) and the SoC has a unified memory bandwidth of 51.2 GB/s. To understand the hardware's
  limits, you need to calculate the 'ridge point' of its roofline model. Explain what this value represents
  and calculate it in Operations per Byte.
details:
  realistic_solution: The ridge point is the minimum Arithmetic Intensity (AI) a workload must have to
    be compute-bound rather than memory-bound. It's the 'corner' or 'inflection point' of the roofline
    graph, defining where the performance ceiling transitions from being limited by memory bandwidth to
    being limited by peak compute throughput. For the A17 Pro, this value is approximately 684 Ops/Byte.
    Any model or layer with an AI lower than this will be bottlenecked by memory; any with a higher AI
    will be bottlenecked by compute.
  common_mistake: Engineers often confuse the units, dividing Tera-Ops by Giga-Bytes but forgetting the
    1,000x factor between them (10^12 vs 10^9). Another common mistake is confusing the ridge point (an
    intrinsic hardware property) with power efficiency (TOPS/W) or the arithmetic intensity of a *specific
    model*.
  napkin_math: Peak Compute = 35 TOPS = 35 * 10^12 Ops/sec
