id: mobile-0294
title: The Real-Time Batching Trap
topic: real-time-deadlines
status: published
provenance: imported
scenario: Your team is building a 'smart dashcam' feature for a mobile app that performs real-time object
  detection. The camera sensor provides frames at a steady 30 FPS. The ML model takes exactly 25ms to
  process a single frame on the phone's NPU.
details:
  realistic_solution: This batching strategy will fail catastrophically and drop frames. While the average
    throughput is higher, the latency for the first frame in the batch now includes the time waiting for
    the second frame to arrive.
  common_mistake: Engineers often confuse throughput (Time-per-output-token, or TPOT) with latency (Time-to-first-token,
    or TTFT). They see the improved *average* latency from batching and assume it's a win, forgetting
    that in a real-time stream, you must wait for the entire batch to be collected before you can even
    start processing. This added queuing delay is fatal for applications with tight, per-frame deadlines.
  napkin_math: '1. Frame Arrival Rate: At 30 FPS, a new frame arrives from the camera sensor every 1000ms
    / 30 = 33.3ms. 2. Processing Latency: The NPU processes each frame in exactly 25ms. 3. Utilization:
    System utilization is 25ms / 33.3ms = 75%. 4. Conclusion: Since latency (25ms) is less than the inter-arrival
    time (33.3ms), the system processes frames in real-time without buffering or dropping frames.'
