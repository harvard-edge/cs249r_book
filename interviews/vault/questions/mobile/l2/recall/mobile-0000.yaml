schema_version: 1
id: mobile-0000
title: The App Store Diet
topic: model-serving-infrastructure
status: draft
provenance: imported
scenario: You are a Mobile ML Engineer building a new "Magic Stylus" feature that uses an on-device model
  with 70 million parameters. Your base app is already 150 MB. To avoid exceeding the app store's ~200
  MB cellular download limit and forcing users onto Wi-Fi, you plan to use on-demand resource APIs to
  download the model after the initial install.
details:
  realistic_solution: The correct answer is 140 MB. A 70 million parameter model requires 140 MB of storage
    in FP16 precision. This is because each FP16 parameter requires 2 bytes of storage. Adding this to
    the 150 MB base app size would create a 290 MB binary, which is significantly over the cellular download
    limit, confirming that an on-demand download strategy is necessary.
  common_mistake: The most common mistake is confusing the byte requirements for different precisions.
    Engineers often default to thinking '1 parameter = 1 byte', which is only true for INT8 quantization.
    This leads to an answer that is half the correct size. A less common error is using 4 bytes per parameter,
    the standard for FP32, which would be correct for training weights but is overkill for most mobile
    inference scenarios and results in a 2x overestimate.
  napkin_math: 'Model size FP16 = 70M * 2B = 140MB. Base app = 150MB. Combined = 150+140 = 290MB > 200MB
    cellular limit. Excess = 90MB. On-demand download: base app 150MB ships via App Store (under limit).
    Model 140MB downloads over WiFi post-install. Alternative: INT8 = 70MB, total 220MB -- still over.
    On-demand is necessary regardless of precision.'
