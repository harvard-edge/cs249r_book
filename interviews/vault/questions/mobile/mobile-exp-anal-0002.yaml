title: Adversarial Sparsity Loss on Exynos 2400 NPU
scenario: You are deploying a vision model on a Samsung Exynos 2400 NPU. Security researchers find that
  feeding specific adversarial noise to the camera causes a sudden drop in concurrent GPU/ISP performance.
  Given that the Exynos 2400 features a dual-core NPU (34.7 TOPS) and shares its 12 GB LPDDR5X memory
  across the CPU, GPU, and ISP, analyze why these carefully crafted adversarial inputs cause such severe
  cross-component interference compared to normal inputs.
details:
  realistic_solution: The Exynos NPU relies on zero-skipping (e.g., ignoring zeros after ReLU) to compress
    intermediate tensors and reduce traffic on the shared LPDDR5X bus. Adversarial perturbations inherently
    shift the distribution of feature maps, often pushing negative values positive and destroying ReLU
    sparsity. The NPU must now write dense tensors back to main memory, saturating the shared bus and
    starving the concurrent GPU/ISP of memory bandwidth.
  common_mistake: Candidates often guess that adversarial images are larger or somehow trigger more FLOPs.
    They miss that FLOPs remain constant for a static graph, but memory traffic varies dynamically based
    on activation sparsity, which adversarial noise frequently destroys.
  napkin_math: Consider an 8MB intermediate activation tensor. Normal inputs yield 75% sparsity, so the
    NPU only writes 2MB to the shared 12 GB LPDDR5X memory. Adversarial noise reduces sparsity to 15%,
    forcing 6.8MB writes. At 30 FPS, bandwidth jumps from 60 MB/s to 204 MB/s for just one layer. Scaled
    across a deep network running at the NPU's peak 34.7 TOPS, this sudden multi-gigabyte surge in uncompressed
    memory traffic congests the shared LPDDR5X bus, causing the observed system-wide latency.
