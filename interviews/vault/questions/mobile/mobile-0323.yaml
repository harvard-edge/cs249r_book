title: The Federated Learning Subsidy
scenario: You are an ML engineer on a mobile keyboard team with 1 million daily active users. You propose personalizing the prediction model. To incentivize users to share data, the company agrees to subsidize their mobile data costs at a rate of $10.00 per GB transferred. Assume the centralized approach requires uploading 10 MB of typing logs per user daily, while Federated Learning requires a 100 KB model update per user.
question: How do centralized and federated personalization data subsidies compare for 1M keyboard users at $10 per GB?
details:
  realistic_solution: The correct approach is to calculate the total data volume for each strategy across the entire user base and then apply the cost per GB.
  common_mistake: |
    **The Pitfall:** Underestimating the impact of scale on per-user costs and unit conversions.
    **The Rationale:** Engineers often view a 10 MB upload as trivial, forgetting that multiplying by 1 million users creates terabytes of data, or they mix up KB/MB/GB.
    **The Consequence:** The company is hit with a $100,000 daily bill instead of the expected $1,000, destroying the project's budget.
  napkin_math: |
    1. **Centralized Approach:** 1M users * 10 MB = 10,000,000 MB = 10,000 GB. Cost = 10,000 GB * $10/GB = **$100,000/day**.
    2. **Federated Approach:** 1M users * 100 KB = 100,000,000 KB ≈ 100,000 MB = 100 GB. Cost = 100 GB * $10/GB = **$1,000/day**.
  options:
  - The costs are identical ($100,000/day), so the choice depends on privacy, not economics.
  - Centralized costs $10,000/day and Federated costs $1,000/day; Centralized is only 10x more expensive.
  - Centralized costs $100,000/day and Federated costs $1,000/day; Federated is 100x cheaper.
  - The costs are negligible for both, totaling less than $100 per day.
  correct_index: 2
