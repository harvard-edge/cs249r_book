title: 'KV-Cache: Specification — KV Cache Budget for Multi-Turn Code Completion'
scenario: 'Specify the KV cache budget for a code completion assistant using a 3B LLM on Snapdragon 8
  Gen 3 (45 TOPS, 16GB). Requirements: 16K-token codebase context, real-time completion (< 1s to first
  token), and < 50ms per subsequent token. Define quantization, layout, and context management.'
question: "How would you specify the KV cache budget for a code completion assistant using a 3B LLM on Snapdragon 8 Gen 3 (45 TOPS, 16GB)?"
details:
  realistic_solution: At seq=16384, a 3B model requires ~295 TFLOPs (linear ops) plus significant quadratic
    attention FLOPs. 1.48 TFLOPs is too low by ~200×.
  common_mistake: Not verifying that 16K-token KV cache + model weights + OS fit in 16GB; not checking
    decode latency SLA at 16K context.
  napkin_math: '3B param model, 6 FLOPs/param per forward, seq=16384 tokens: Total FLOPs = 2 × 3B × 16384
    = 98.3 TFLOPs. Attention FLOPs ∝ seq²: 2 × heads × seq² × head_dim per layer. For 28 layers, 32 heads,
    head_dim=128: 2 × 28 × 32 × 16384² × 128 = 6.3 PFLOPs — dominated by attention. Simplified estimate:
    3B × 6 × 16384 = 295 TFLOPs (linear term only). Attention quadratic adds ~197 TFLOPs more at this
    sequence length. Total ≈ 295 TFLOPs (linear) + attention overhead (not 1.48 TFLOPs which is 200× too
    low).'
