title: Quantization Strategy for On-Device Updates
scenario: Your team is deploying a new semantic segmentation model to millions of mobile devices. You need to achieve sub-50ms latency and a model size under 20MB. You're considering dynamic range quantization (DRQ) vs. quantization-aware training (QAT).
question: When should a mobile segmentation team choose QAT over DRQ, and when is DRQ better for OTA model iteration?
details:
  realistic_solution: 'DRQ (post-training quantization) takes minutes, converts weights to INT8 but computes activations dynamically (often converting to INT8 at runtime or executing in FP16/FP32), adding 10-15% latency overhead. Accuracy drops 1-3%. QAT requires full retraining (hours-days on GPU cluster) but quantizes both weights and activations to INT8 statically, achieving <0.5% accuracy loss and meeting the sub-50ms target. For OTA updates: DRQ wins — any retrained FP32 model is instantly quantizable. QAT requires retraining before every deployment. Recommendation: QAT for initial launch (best accuracy and latency), DRQ for rapid A/B test iterations where speed-to-deploy matters more than the last 1% accuracy.'
  common_mistake: |
    **The Pitfall:** Insisting that QAT is always superior and should be used exclusively.
    **The Rationale:** Candidates focus only on runtime performance and accuracy, overlooking the high development and retraining costs of QAT for continuous OTA updates.
    **The Consequence:** Extremely slow iteration cycles during A/B testing where speed-to-deploy is critical.
  napkin_math: |
    * FP32 baseline (18M parameters): 18M × 4 bytes = 72 MB (fails 20 MB target).
    * INT8 (DRQ/QAT): 18M × 1 byte = 18 MB (meets 20 MB target).
    * DRQ Cost: Minutes to run, 1-3% accuracy drop, ~10-15% latency penalty (dynamic scale computation).
    * QAT Cost: Hours/Days to retrain, <0.5% accuracy drop, strictly meets latency.
    * **QAT is best for the initial launch, while DRQ is necessary for rapid A/B testing and OTA updates.**
