title: Quantization Strategy for On-Device Updates
scenario: Your team is deploying a new semantic segmentation model to millions of mobile devices. You
  need to achieve sub-50ms latency and a model size under 20MB. You're considering dynamic range quantization
  (DRQ) vs. quantization-aware training (QAT). Describe the trade-offs in terms of model development,
  deployment, performance, and memory footprint on device, especially considering future over-the-air
  (OTA) model updates.
question: "When should a mobile segmentation team choose QAT over DRQ, and when is DRQ better for OTA model iteration?"
details:
  realistic_solution: 'DRQ (post-training quantization) takes minutes, converts weights to INT8 but computes activations dynamically (often converting to INT8 at runtime or executing in FP16/FP32), adding 10-15% latency overhead. Accuracy drops 1-3%. QAT requires full retraining (hours-days on GPU cluster) but quantizes both weights and activations to INT8 statically, achieving <0.5% accuracy loss and meeting the sub-50ms target. For OTA updates: DRQ wins — any retrained FP32 model is instantly quantizable. QAT requires retraining before every deployment. Recommendation: QAT for initial launch (best accuracy and latency), DRQ for rapid A/B test iterations where speed-to-deploy matters more than the last 1% accuracy.'
  common_mistake: '"QAT is always superior for accuracy and performance, so we should always use it."
    This overlooks practical deployment and development costs, especially for continuous updates.'
  napkin_math: |-
    Model Size:
    - FP32 baseline (e.g., 18M parameters): 18M × 4 bytes = 72 MB (fails 20 MB target).
    - INT8 (DRQ or QAT): 18M × 1 byte = 18 MB (meets 20 MB target).
    
    DRQ (Post-Training, Dynamic Range):
    - Dev cost: minutes. No retraining needed.
    - Weights: INT8 (18 MB). Activations: dynamically quantized at runtime.
    - Runtime overhead: ~10-15% latency penalty for dynamic scale computation per layer.
    - Accuracy: typically 1-3% drop vs FP32.
    - OTA update: just ship new weights.
    
    QAT (Quantization-Aware Training):
    - Dev cost: full retraining cycle (hours-days).
    - Weights + activations: both INT8 (18 MB). No runtime conversion overhead.
    - Latency: strictly meets target with no conversion overhead.
    - Accuracy: typically <0.5% drop vs FP32.
    - OTA update: every model update requires QAT retraining before deployment.
    
    Recommended: QAT for initial launch, DRQ for rapid A/B test iterations.
