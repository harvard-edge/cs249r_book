title: 'The OTA Data Budget: Model Serving Infrastructure'
scenario: You are an ML engineer for a popular AI Keyboard app. Your team has developed a new transformer-based
  suggestion model that improves accuracy significantly. The current production model has 10 million parameters
  and uses FP16 precision. The new model has 15 million parameters and also uses FP16. Your product manager
  is concerned about the data cost for users on cellular plans when you ship this as an Over-the-Air (OTA)
  update. Calculate the *additional* download size for a user receiving this update.
question: "How would you calculate the *additional* download size for a user receiving this update?"
details:
  realistic_solution: The correct approach is to calculate the storage size for both the old and new models
    and then find the difference. Since both models use FP16 precision, each parameter requires 16 bits,
    or 2 bytes, of storage. The additional download size is the difference in the total storage required
    for the parameters of the two models.
  common_mistake: Engineers often report the total size of the new model instead of the incremental increase.
    Another common error is using the wrong number of bytes for a given precision, such as assuming 4
    bytes for FP16 (confusing it with FP32) or 1 byte (confusing it with INT8 quantization).
  napkin_math: |-
    1. **Old Model Size:** 10,000,000 parameters × 2 bytes/parameter = 20,000,000 bytes (20 MB)
    2. **New Model Size:** 15,000,000 parameters × 2 bytes/parameter = 30,000,000 bytes (30 MB)
    3. **Additional Size:** 30 MB - 20 MB = 10 MB.
  options:
  - 5 MB
  - 10 MB
  - 20 MB
  - 30 MB
  correct_index: 1
