title: 'The OTA Data Budget: Model Serving Infrastructure'
scenario: You are an ML engineer for a popular AI Keyboard app. Your team has developed a new transformer-based suggestion model that improves accuracy significantly. The current production model has 10 million parameters and uses FP16 precision. The new model has 15 million parameters and also uses FP16. Your product manager is concerned about the data cost for users on cellular plans when you ship this as an Over-the-Air (OTA) update.
question: "How would you calculate the additional download size for a user receiving this update?"
details:
  realistic_solution: 'Calculate the storage size for both the old and new models and then find the difference. Since both models use FP16 precision, each parameter requires 16 bits, or 2 bytes, of storage.'
  common_mistake: |
    **The Pitfall:** Reporting the total new model size or using the wrong byte multiplier.
    **The Rationale:** Engineers either misread the prompt (providing total size instead of incremental size) or confuse FP16 with FP32 (4 bytes).
    **The Consequence:** Wildly inaccurate bandwidth estimates that can panic stakeholders or blow past cellular data budgets.
  napkin_math: |
    - **Old Model Size:** 10,000,000 parameters * 2 bytes/parameter = 20,000,000 bytes (20 MB).
    - **New Model Size:** 15,000,000 parameters * 2 bytes/parameter = 30,000,000 bytes (30 MB).
    - **Final Result:** 30 MB - 20 MB = **10 MB additional size**.
  options:
  - 5 MB
  - 10 MB
  - 20 MB
  - 30 MB
  correct_index: 1
