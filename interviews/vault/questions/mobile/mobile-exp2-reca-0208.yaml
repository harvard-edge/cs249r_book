title: Encoder vs Decoder Bottlenecks on A17 Pro
scenario: Your team is evaluating model architectures for an on-device translation feature running on
  the Apple A17 Pro Neural Engine. The chip delivers 35 TOPS at around 5W and relies on a shared 8 GB
  unified memory pool. To make the right architectural choice between an encoder-heavy or decoder-heavy
  design, you must recall the fundamental hardware utilization difference between these two components.
  By definition, which phase (encoder prefill or decoder generation) is typically compute-bound, and which
  is memory-bandwidth-bound?
details:
  realistic_solution: The candidate should recall that the encoder (prefill) phase processes multiple
    tokens in parallel and is typically compute-bound, easily saturating the Neural Engine's ALUs. In
    contrast, the decoder's autoregressive generation phase processes one token at a time and is strictly
    memory-bandwidth-bound, as it must repeatedly fetch weights from the unified memory.
  common_mistake: Candidates often incorrectly state that both phases are compute-bound because they only
    focus on the 35 TOPS specification of the 16-core Neural Engine, ignoring the sequential memory access
    penalty of autoregressive generation.
  napkin_math: 'Consider a 1 Billion parameter model in INT8 (1 GB size). The A17 Pro provides 35 TOPS
    compute. Decoder phase compute required per token: ~2 GOPs. Compute time at 35 TOPS: 2 / 35000 = ~0.057
    ms. Decoder memory read per token: 1 GB. Assuming a generous 50 GB/s bandwidth to the 8 GB unified
    memory, memory time per token: 1 GB / 50 GB/s = 20 ms. Since 20 ms memory time >> 0.057 ms compute
    time, the decoder is entirely memory-bound.'
