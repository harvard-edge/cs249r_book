title: On-Device Interconnect Bottleneck for NPU Inference
scenario: The Snapdragon 8 Gen 3 has a Hexagon NPU (45 TOPS INT8), Adreno GPU (4.6 TFLOPS FP16), and Cortex-X4
  CPU, all connected via a NoC (Network-on-Chip). The NoC provides 60 GB/s between NPU and shared LPDDR5X
  memory. Why does the NoC bandwidth, not the NPU's TOPS rating, determine achievable throughput for LLM
  inference?
question: "Why does the NoC bandwidth, not the NPU's TOPS rating, determine achievable throughput for LLM inference?"
details:
  realistic_solution: 'LLM decode: each token requires loading the entire model''s weights once. A 3B
    model in INT8 = 3 GB. With 60 GB/s NoC bandwidth: 3 GB / 60 GB/s = 50ms per token = 20 tokens/second.
    The NPU''s 45 TOPS would complete the compute in 3B × 2 ops / 45 TOPS = 0.13ms — 380× faster than
    the memory transfer. The workload is 99.7% memory-bound. Even if the NPU had 100 TOPS, throughput
    would remain at 20 tok/s. Improvements must target memory: (1) INT4 quantization halves model size
    → 1.5 GB / 60 GB/s = 25ms = 40 tok/s. (2) KV cache in on-chip SRAM (2 MB) saves re-reading cached
    attention. (3) Speculative decoding with a tiny draft model that fits in SRAM. The NoC is the true
    bottleneck, not compute.'
  common_mistake: Quoting the 45 TOPS spec as if the NPU can sustain it for any workload. TOPS is peak
    compute, but LLM decode is memory-bandwidth-bound — the NoC bandwidth to LPDDR5X is the true bottleneck.
  napkin_math: '3B model INT8 = 3 GB. NoC: 60 GB/s. Decode latency: 3/60 = 50ms = 20 tok/s. NPU compute:
    3B × 2 / 45T = 0.13ms. Arithmetic intensity: 2 ops / 1 byte = 2 ops/byte. Ridge point: 45 TOPS / 60
    GB/s = 750 ops/byte. LLM decode AI = 2 << 750 → deeply memory-bound. INT4: 1.5 GB / 60 GB/s = 25ms
    = 40 tok/s. 2× speedup from quantization, 0× from more TOPS.'
