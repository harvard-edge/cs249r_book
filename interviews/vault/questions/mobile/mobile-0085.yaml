title: The Android NNAPI Driver Fallback
scenario: You deploy a TFLite model on Android and enable the NNAPI (Neural Networks API) delegate to run it on the hardware NPU. On Samsung phones, it takes 5ms. On a specific Xiaomi model, it takes 80ms. You verify that the Xiaomi phone physically has a powerful NPU.
question: Why is NNAPI making the model 16x slower than it should be on a specific device, and how do you fix it?
details:
  realistic_solution: 'NNAPI''s vendor driver claims to support the ops but silently falls back to reference CPU (80ms) instead of the NPU (5ms). NNAPI doesn''t report fallback at compilation time. Fix: (1) micro-benchmark at first launch comparing NNAPI vs XNNPACK. If NNAPI is slower, blocklist that device. (2) Maintain a device blocklist from production telemetry. (3) Use GPU delegate as middle tier (10-15ms).'
  common_mistake: |
    **The Pitfall:** Blindly trusting NNAPI and assuming a slow result means the hardware NPU is simply bad.
    **The Rationale:** Developers expect the abstraction layer (NNAPI) to always route to the optimal hardware, unaware that vendor drivers frequently fail silently.
    **The Consequence:** Users experience abysmal performance because the model is silently falling back to a slow reference CPU implementation.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Hardware NPU Time: 5ms.
       - Optimized CPU Time (XNNPACK): 20ms.
       - NNAPI Fallback CPU Time: 80ms.
    2. **Calculations:**
       - Fallback vs NPU = 80ms / 5ms = 16x slower.
       - Fallback vs Optimized CPU = 80ms / 20ms = 4x slower.
    3. **Conclusion & Interpretation:**
       - **Result: 16x slower. Compute-Bound.** The NNAPI reference fallback is 4x slower than an optimized CPU path and 16x slower than the NPU. It must be manually blocklisted.
