title: The Mobile Jank Detective
scenario: 'Your team has integrated a new Vision Transformer (ViT) model for real-time object detection into the main camera app. You observe significant UI ''jank''—the frame rate drops, and your model''s latency is 25ms, missing the 16ms target. A Neural Architecture Search (NAS) has proposed two alternative architectures with similar accuracy: Model A (CNN) and Model B (MoE ViT).'
question: Which NAS architecture should replace a janky mobile ViT, and why does arithmetic intensity matter?
details:
  realistic_solution: Model A (CNN) is the correct choice. The core problem is that the ViT is severely memory-bandwidth-bound. The ViT's self-attention mechanism requires massive data movement relative to computation, resulting in low Arithmetic Intensity (AI). Even with 35 TOPS of NPU capacity, the hardware spends most of its cycles waiting for DRAM. CNNs possess high spatial data reuse (higher AI), effectively utilizing NPU TOPS and transforming a memory-bound workload into a compute-bound one to hit the 16ms deadline.
  common_mistake: |
    **The Pitfall:** Choosing Model B (MoE ViT) based purely on parameter count or raw FLOPs.
    **The Rationale:** Engineers assume lower FLOPs directly translates to proportionally lower latency.
    **The Consequence:** They select another architecture with exceptionally low Arithmetic Intensity, failing to solve the memory bandwidth bottleneck and leaving the UI jank unresolved.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Target latency deadline: 16 ms.
       - Hardware: 35 TOPS NPU, 51.2 GB/s memory bandwidth.
       - ViT Arithmetic Intensity (AI): < 50 Ops/Byte.
    2. **Calculations:**
       - Hardware ridge point: 35 TOPS / 51.2 GB/s = ~683 Ops/Byte.
       - ViT utilization: At 50 Ops/Byte, maximum achievable throughput is 51.2 GB/s * 50 Ops/Byte = 2.56 TOPS.
       - NPU waste: 35 TOPS - 2.56 TOPS = 32.44 TOPS sitting completely idle.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound.** The ViT is starved for memory bandwidth. A CNN with higher data reuse shifts the workload over the hardware ridge point, fully utilizing the NPU to meet the 16ms deadline.
  options:
  - 'Model B (MoE ViT): It has lower total FLOPs, guaranteeing a direct reduction in latency.'
  - 'Model A (CNN): Its high arithmetic intensity overcomes the memory bandwidth bottleneck, maximizing NPU utilization.'
  - 'Model B (MoE ViT): Dynamic routing avoids the 51.2 GB/s memory bandwidth limit entirely.'
  - 'Model A (CNN): It requires less than 1 TOPS, avoiding the NPU''s 35 TOPS thermal throttle.'
  correct_index: 1
