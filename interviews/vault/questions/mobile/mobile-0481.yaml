title: The Mobile Jank Detective
scenario: Your team has integrated a new Vision Transformer (ViT) model for real-time object detection into the main camera app. During testing on a new flagship phone (similar to an Apple A17 Pro with a 35 TOPS NPU and 51.2 GB/s memory bandwidth), you observe significant UI 'jank'—the frame rate drops, and your model's latency is 25ms, missing the 16ms target. A Neural Architecture Search (NAS) has proposed two alternative architectures with similar accuracy: Model A (CNN) and Model B (MoE ViT).
question: Which NAS architecture should replace a janky mobile ViT, and why does arithmetic intensity matter?
details:
  realistic_solution: The problem is that the ViT is memory-bandwidth-bound, not compute-bound. The ViT's self-attention mechanism requires significant data movement relative to its computation, resulting in low arithmetic intensity. Even though the NPU has 35 TOPS of power, it's spending most of its time waiting for data from memory. Model A, the CNN, is the correct choice. These architectures are explicitly designed for high data reuse and higher arithmetic intensity; they perform more computations for each byte of data they load compared to self-attention. This allows the model to become compute-bound, fully leveraging the NPU's high TOPS and overcoming the memory bottleneck to meet the latency target.
  common_mistake: |
    **The Pitfall:** Choosing Model B (MoE ViT) simply because it has fewer FLOPs.
    **The Rationale:** Engineers assume lower FLOPs directly translates to lower latency.
    **The Consequence:** They select another architecture with low Arithmetic Intensity, which remains memory-bandwidth bound and fails to fix the UI jank.
  napkin_math: |
    1. **Hardware Ridge Point:** 35 TOPS / 51.2 GB/s = ~683 Ops/Byte.
    2. **ViT Arithmetic Intensity:** Self-attention requires massive memory reads but low compute per read. AI is typically < 50 Ops/Byte.
    3. **Bandwidth Bound:** Since 50 << 683, the ViT is severely memory-bandwidth bound. Most of the 35 TOPS sits idle.
    4. **CNN Advantage:** CNNs have high data reuse (high AI), bringing the workload closer to being compute-bound.
    **A CNN fully leverages the NPU's TOPS and overcomes the memory bottleneck to meet the 16ms target.**
  options:
  - Choose Model B (MoE ViT); it has the fewest FLOPs, which directly translates to lower latency on any hardware.
  - The NPU's 35 TOPS is insufficient. The ViT is too complex and we need to wait for next-generation hardware.
  - Choose Model A (CNN); its high arithmetic intensity will make it compute-bound, allowing it to better utilize the NPU's TOPS despite having more FLOPs.
  - Keep the current ViT but apply more aggressive INT8 quantization. This will reduce the memory footprint and solve the latency issue.
  correct_index: 2
