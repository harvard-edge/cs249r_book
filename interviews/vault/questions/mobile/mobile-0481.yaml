title: The Mobile Jank Detective
scenario: 'You are an ML engineer on a mobile perception team. Your team has integrated a new Vision Transformer
  (ViT) model for real-time object detection into the main camera app. During testing on a new flagship
  phone (similar to an Apple A17 Pro with a 35 TOPS NPU and 51.2 GB/s memory bandwidth), you observe significant
  UI ''jank''—the frame rate drops, and your model''s latency is 25ms, missing the 16ms target. A Neural
  Architecture Search (NAS) has proposed two alternative architectures with similar accuracy: Model A (CNN) and Model B (MoE ViT).'
question: "Which NAS architecture should replace a janky mobile ViT, and why does arithmetic intensity matter?"
details:
  realistic_solution: The problem is that the ViT is memory-bandwidth-bound, not compute-bound. The ViT's
    self-attention mechanism requires significant data movement relative to its computation, resulting
    in low arithmetic intensity. Even though the NPU has 35 TOPS of power, it's spending most of its time
    waiting for data from memory. Model A, the CNN, is the correct choice. These architectures
    are explicitly designed for high data reuse and higher arithmetic intensity; they perform more computations for each byte
    of data they load compared to self-attention. This allows the model to become compute-bound, fully leveraging the NPU's high
    TOPS and overcoming the memory bottleneck to meet the latency target.
  common_mistake: Engineers often focus solely on FLOPs or parameter count, assuming 'smaller' or 'fewer
    FLOPs' is always faster. On mobile, where memory bandwidth is a huge constraint, the model's Arithmetic
    Intensity (Ops/Byte) is often the true predictor of performance. A model with low AI will be memory-bandwidth-bound,
    even if it has fewer FLOPs, and will fail to utilize the NPU's full compute power.
  napkin_math: "Hardware Ridge Point = 35 TOPS / 51.2 GB/s = 683 Ops/Byte. The ViT model self-attention mechanism requires materializing an N x N attention matrix. For 16x16 patches on a 224x224 image, N=196. The ops scale with 196x196, but memory reads are constant per token. The AI is typically < 50 Ops/Byte. Since 50 << 683, the ViT is severely memory-bandwidth bound. Most of the 35 TOPS compute capability sits idle."
  options:
  - Choose Model B (MoE ViT); it has the fewest FLOPs, which directly translates to lower latency on any
    hardware.
  - The NPU's 35 TOPS is insufficient. The ViT is too complex and we need to wait for next-generation
    hardware.
  - Choose Model A (CNN); its high arithmetic intensity will make it compute-bound, allowing it to better
    utilize the NPU's TOPS despite having more FLOPs.
  - Keep the current ViT but apply more aggressive INT8 quantization. This will reduce the memory footprint
    and solve the latency issue.
  correct_index: 2
