title: NPU Data Starvation and Pipelined Throughput
scenario: You are deploying a real-time computer vision pipeline on a Qualcomm Hexagon NPU. Your quantized INT8 model requires 90 GOPS per frame. The CPU data pipeline (decoding, resizing, and quantizing) takes 8ms per frame to write the processed input tensor into the shared memory.
question: What FPS results from sequential versus double-buffered CPU/NPU processing on a 45 TOPS NPU?
details:
  realistic_solution: 'The correct approach evaluates both the sequential and pipelined scenarios by comparing the data loading time against the compute time. By calculating the NPU compute time per frame and applying the pipeline throughput equation, engineers can identify that the CPU data preprocessing is starving the NPU. Implementing a double-buffered pipeline in the shared LPDDR5X memory hides the NPU execution latency behind the longer CPU data preparation time, maximizing the bottlenecked throughput.'
  common_mistake: |
    **The Pitfall:** Calculating throughput purely based on theoretical NPU TOPS.
    **The Rationale:** Candidates ignore the CPU data preprocessing bottleneck or incorrectly sum latencies in the pipelined approach.
    **The Consequence:** Grossly overestimating the achievable FPS and failing to utilize double buffering effectively.
  napkin_math: |
    **Assumptions & Constraints:**
    - NPU Compute: 45 TOPS (45,000 GOPS).
    - Model requirement: 90 GOPS/frame.
    - CPU prep time: 8ms/frame.

    **Calculations:**
    - NPU execution time = 90 GOPS / 45,000 GOPS/s = 0.002 seconds = 2ms per frame.
    - Sequential Pipeline Total Time = 8ms (CPU) + 2ms (NPU) = 10ms.
    - Sequential Throughput = 1000ms / 10ms = 100 FPS.
    - Pipelined (Double-buffered) Time = max(8ms, 2ms) = 8ms.
    - Pipelined Throughput = 1000ms / 8ms = 125 FPS.

    **Conclusion & Interpretation:**
    - **Result: 125 FPS achieved using double-buffering (CPU Preprocessing-Bound).**
