title: 'Fault Tolerance: Implement Differential Checkpoint for Mobile LoRA Training'
scenario: You are implementing checkpointing for continuous LoRA fine-tuning on Tensor G3 (7.5 TOPS, 12GB). The LoRA model has 2M trainable parameters (8MB fp32). Between checkpoints, only 5% of weights change significantly (> 1e-4 delta).
question: How should differential checkpointing reduce mobile LoRA checkpoint size while preserving recovery correctness?
details:
  realistic_solution: 'Full checkpoint at training start. Differential: store only weights where |delta| > threshold. Each diff: (index, value) pairs. At 5% change rate: 100K params change out of 2M. Store as sparse: 100K × (4B index + 4B value) = 800KB vs 8MB full.'
  common_mistake: |
    **The Pitfall:** Writing all weights every checkpoint even when few change.
    **The Rationale:** Candidates default to standard deep learning training behaviors without considering edge device storage limitations.
    **The Consequence:** Continuous writes exhaust storage bandwidth, shorten flash memory lifespan, and slow down training.
  napkin_math: |
    * Full checkpoint: 2M params × 4B (fp32) = 8MB.
    * Diff checkpoint: 5% change = 100K params.
    * Sparse format: 100K × (4B index + 4B value) = 800KB.
    * Compression ratio: 8MB / 800KB = 10x reduction.
    * **Writing 800KB takes 0.8ms vs 8ms, significantly reducing storage wear and I/O overhead.**
