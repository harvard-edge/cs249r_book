title: 'Fault Tolerance: Implement Differential Checkpoint for Mobile LoRA Training'
scenario: You are implementing checkpointing for continuous LoRA fine-tuning on Tensor
  G3 (7.5 TOPS, 12GB). The LoRA model has 2M trainable parameters (8MB fp32). Between
  checkpoints, only 5% of weights change significantly (> 1e-4 delta). Implement differential
  checkpointing to reduce checkpoint size and verify correctness.
question: How should differential checkpointing reduce mobile LoRA checkpoint size
  while preserving recovery correctness?
details:
  realistic_solution: 'Full checkpoint at training start. Differential: store only
    weights where |delta| > threshold. Each diff: (index, value) pairs. At 5% change
    rate: 100K params change out of 2M. Store as sparse: 100K × (4B index + 4B value)
    = 800KB vs 8MB full.'
  common_mistake: Writing all weights every checkpoint even when few change; not verifying
    that differential checkpoint + base = correct recovered state.
  napkin_math: '2M LoRA params × fp32 = 8MB. Full checkpoint: 8MB. Diff checkpoint:
    5% change = 100K params. Sparse format: 100K × 8B = 800KB. Compression: 8MB →
    800KB = 10× reduction. Write time: 800KB / 1 GB/s = 0.8ms vs 8ms full. Recovery:
    load base (8MB) → apply N diffs in sequence. For 10 diffs: 8MB + 10 × 800KB =
    16MB total storage vs 10 × 8MB = 80MB. 5× storage reduction for 10 checkpoints.
    Correctness verification: after applying diff, compute checksum of recovered weights,
    compare to saved checksum. SHA256 of 2M × 4B = 8MB at 1 GB/s = 8ms verification.
    Add this after every restore. Risk: if base checkpoint is corrupt, all diffs are
    unusable. Mitigation: full checkpoint every 20 diffs (every hour if diffing every
    3 minutes).'
