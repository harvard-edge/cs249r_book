title: 'Network Bandwidth Bottlenecks: Realize Peak Bandwidth Utilization During On-Device LLM Response'
scenario: 'Concretely compute peak and average LPDDR5X bandwidth utilization during a 50-token on-device
  response from a 3B INT4 LLM on Snapdragon 8 Gen 3 (16GB, 77 GB/s). The response takes 50 × 19.5ms =
  975ms. Include: model weight reads, KV-cache reads/writes, activation memory, and background system
  processes (3GB/s constant).'
question: "What peak and average LPDDR5X bandwidth does a 50-token 3B INT4 LLM response require on Snapdragon 8 Gen 3?"
details:
  realistic_solution: 'Per token: weight read: 1.5GB. KV cache at token N: read (N-1)×524KB KV entries
    (attention) + write 524KB new entry. At token 25 (mid-response): read 24×524KB=12.6MB, write 524KB
    ≈ 13.1MB KV BW. Total per step 25: 1.5GB+13MB=1.513GB. KV is tiny vs weights at this context length.
    Peak BW: 1.5GB/19.5ms=76.9GB/s. System: 3GB/s. Total peak: 79.9GB/s > 77GB/s. Effective: KV forces
    3ms of wait → TPOT=22ms at mid-response. Average BW: (50×1.5GB)/0.975s=76.9GB/s (near saturation throughout
    entire response).'
  common_mistake: Computing only weight bandwidth without including KV-cache reads (which grow with context
    length) and writes (new KV entries added each token).
  napkin_math: 'Weight BW: 1.5GB/19.5ms=76.9GB/s. KV at token 25: 25×524KB=13.1MB/19.5ms=671MB/s=0.67GB/s.
    System: 3GB/s. Peak: 76.9+0.67+3=80.6GB/s > 77GB/s → limited. Effective TPOT: 1.5GB+0.013GB)/77GB/s+3GB/s
    needed? Weighted: (1.513+3×0.0195)/0.0195... effective BW (77 total): model gets 77-3=74GB/s. TPOT:
    1.513GB/74GB/s=20.4ms. KV cost grows to 50×524KB=26.2MB at final token: 0.67→1.34GB/s. TPOT: (1.5+0.026)/74=20.6ms.
    Slight increase.'
