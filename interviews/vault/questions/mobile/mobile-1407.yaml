title: Optimizing On-Device Data Quality Gates for LLMs
scenario: You are deploying an on-device data pipeline to validate 50MB of daily user interaction logs before locally fine-tuning a Gemini Nano model on a Google Tensor G3 device. The current data quality gate runs a heavy anomaly detection model on every log line to filter out garbage inputs, taking 45 minutes and exhausting the device's memory bandwidth.
question: How would you analyze the bottleneck in this data validation pipeline and quantify a solution to optimize it while keeping the 7.5 TOPS TPU available?
details:
  realistic_solution: 'Implement a multi-tier data quality gate. First, use lightweight, CPU-bound heuristics and Bloom filters to perform fast schema validation and basic filtering (e.g., removing regex-matched gibberish or known bad patterns) on the 50MB dataset. Only pass the filtered, ambiguous subset (typically less than 10% of logs) to an optimized, INT8 anomaly detection model running on the Tensor G3''s TPU, drastically reducing memory bandwidth pressure.'
  common_mistake: |
    **The Pitfall:** Optimizing the heavy model via extreme quantization instead of analyzing the overall data flow.
    **The Rationale:** Candidates fail to separate simple schema validation from complex anomaly detection.
    **The Consequence:** Wastefully running every log line through a TPU-bound model, exhausting memory bandwidth and battery.
  napkin_math: |
    **Assumptions & Constraints:**
    - Dataset: 10M tokens (50MB).
    - Optimized Pre-filter passes 10% of logs.
    - TPU Compute Time per batch (512): 2ms.

    **Calculations:**
    - Current Pipeline: 10M tokens fed to TPU causes 45-minute I/O bottleneck.
    - Optimized Pre-filter: CPU regex/Bloom filters process 90% (9M tokens) in <2 seconds.
    - TPU Workload: Remaining 10% (1M tokens) sent to INT8 TPU model.
    - TPU Compute Time: (1,000,000 / 512 batch) * 2ms = ~4 seconds.

    **Conclusion & Interpretation:**
    - **Result: <10 seconds (Compute-Bound)**. Total validation time drops from 45 minutes to under 10 seconds.
