title: The Privacy vs. Price Dilemma
scenario: 'You''re an ML Systems Engineer on a mobile keyboard team. To improve auto-correct for new slang,
  you must decide between two strategies:'
details:
  realistic_solution: The correct approach is to calculate the Total Cost of Ownership (TCO) for the first
    year for both options. TCO includes both one-time development costs (CapEx) and recurring operational
    costs (OpEx).
  common_mistake: Engineers often focus only on recurring operational costs (cloud compute, servers) and
    ignore the massive, one-time capital expenditure of developing a new platform like Federated Learning.
    They might incorrectly compare the FL server's recurring cost directly to the centralized training's
    recurring cost, leading to the wrong conclusion about which is cheaper in the first year.
  napkin_math: '# Centralized TCO (Year 1) | Centralized_TCO = Compute_Cost + Data_Cost + Dev_Cost | Centralized_TCO
    = $50,000 + $5,000 + $20,000 = $75,000'
  options:
  - FL is cheaper because its annual server cost ($36.5k) is less than the centralized compute cost ($50k).
  - Centralized is better because FL's on-device training drains user battery, a greater business risk
    than privacy liability.
  - Centralized is more economical (~$75k vs ~$237k), trading off lower initial cost for weaker privacy
    guarantees.
  - The costs are roughly equal, so the decision should be based purely on which model performs better
    in A/B tests.
  correct_index: 2
