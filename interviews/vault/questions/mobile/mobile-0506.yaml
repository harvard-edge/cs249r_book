title: The Privacy vs. Price Dilemma
scenario: You're an ML Systems Engineer on a mobile keyboard team deciding between Centralized Training and Federated Learning for a new auto-correct feature.
question: "Which first-year Total Cost of Ownership (TCO) is lower for mobile keyboard autocorrect: centralized training or Federated Learning?"
details:
  realistic_solution: |
    Calculate the TCO for the first year for both options, including both one-time development costs (CapEx) and recurring operational costs (OpEx).
  common_mistake: |
    **The Pitfall:** Comparing only recurring server costs and ignoring CapEx.
    **The Rationale:** Engineers often hyper-focus on the cloud compute bills and ignore the massive, one-time engineering cost of building a new FL platform.
    **The Consequence:** The team commits to an architectural path that completely blows out their first-year operational budget.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Centralized Server: $50k Compute + $5k Data + $20k Dev.
       - Federated Server: $36.5k Compute + $200k Dev (CapEx).
    2. **Calculations:**
       - Centralized TCO: $50k + $5k + $20k = $75,000.
       - Federated TCO: $36.5k + $200k = $236,500.
    3. **Conclusion & Interpretation:**
       - **Result: FL CapEx Dominance.** While FL lowers recurring compute costs, the massive $200k initial engineering cost makes it 3x more expensive in Year 1.
  options:
    - "Centralized is cheaper ($75k vs $236.5k) due to high FL CapEx."
    - "FL is cheaper ($36.5k vs $50k) due to lower cloud compute."
    - "FL is cheaper ($36.5k vs $75k) due to no data storage costs."
    - "Centralized is cheaper ($50k vs $200k) due to server costs."
