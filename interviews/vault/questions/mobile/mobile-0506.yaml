title: The Privacy vs. Price Dilemma
scenario: You're an ML Systems Engineer on a mobile keyboard team deciding between Centralized Training and Federated Learning for a new auto-correct feature.
question: Which first-year Total Cost of Ownership (TCO) is lower for mobile keyboard autocorrect: centralized training or Federated Learning?
details:
  realistic_solution: Calculate the TCO for the first year for both options, including both one-time development costs (CapEx) and recurring operational costs (OpEx).
  common_mistake: |
    **The Pitfall:** Comparing only recurring server costs and ignoring CapEx.
    **The Rationale:** Engineers often hyper-focus on the cloud compute bills ($50k vs $36.5k) and ignore the massive, one-time engineering cost ($200k) of building a new FL platform.
    **The Consequence:** The team commits to an architectural path that completely blows out their first-year operational budget.
  napkin_math: |
    1. Calculate Centralized TCO: Compute ($50k) + Data ($5k) + Dev ($20k) = **$75,000**.
    2. Calculate Federated Learning TCO: Server ($36.5k) + Dev ($200k) = **$236,500**.
    3. Compare: Centralized ($75k) is significantly cheaper than FL ($236.5k) in Year 1.
  options:
  - FL is cheaper because its annual server cost ($36.5k) is less than the centralized compute cost ($50k).
  - Centralized is better because FL's on-device training drains user battery, a greater business risk than privacy liability.
  - Centralized is more economical (~$75k vs ~$237k), trading off lower initial cost for weaker privacy guarantees.
  - The costs are roughly equal, so the decision should be based purely on which model performs better in A/B tests.
  correct_index: 2
