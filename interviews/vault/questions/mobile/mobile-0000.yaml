title: The App Store Diet
scenario: You are a Mobile ML Engineer building a new "Magic Stylus" feature that uses an on-device model with 70 million parameters. Your base app is already 150 MB. To avoid exceeding the app store's ~200 MB cellular download limit and forcing users onto Wi-Fi, you plan to use on-demand resource APIs to download the model after the initial install.
question: What FP16 model size does a 70M-parameter on-device feature add, and why does that require on-demand download?
details:
  realistic_solution: The correct answer is 140 MB. A 70 million parameter model requires 140 MB of storage in FP16 precision. This is because each FP16 parameter requires 2 bytes of storage. Adding this to the 150 MB base app size would create a 290 MB binary, which is significantly over the cellular download limit, confirming that an on-demand download strategy is necessary.
  common_mistake: |
    **The Pitfall:** Confusing the byte requirements for different numerical precisions.
    **The Rationale:** Engineers often default to thinking "1 parameter = 1 byte" (which is INT8) or "1 parameter = 4 bytes" (FP32), missing the FP16 size.
    **The Consequence:** Drastically underestimating or overestimating the app binary size, leading to failed rollouts or unnecessary compression efforts.
  napkin_math: |
    1. FP16 Model size: 70M parameters * 2 bytes/param = 140 MB.
    2. Total App size: 150 MB (base) + 140 MB (model) = 290 MB.
    3. OTA limitation: 290 MB > 200 MB cellular limit.
    4. Excess payload: 290 MB - 200 MB = **90 MB over the limit**, requiring an on-demand Wi-Fi download.
  options:
  - 70 MB
  - 280 MB
  - 140 MB
  - 17.5 MB
  correct_index: 2
