title: The Notification Model Backlash
scenario: Your news app uses an on-device ML model to predict which articles a user will click, and sends push notifications for high-confidence predictions. The model has 78% precision. After launch, the app's rating drops from 4.5 to 2.1 stars, with reviews citing irrelevant notifications. The model is working as designed.
question: Why does a 78% precision news-notification model hurt ratings even when it works as designed?
details:
  realistic_solution: 'Base rate neglect: 500 articles/day, 2% click rate = 10 relevant. At 78% precision/80% recall: ~10.3 notifications, ~2.3 irrelevant. Asymmetric cost: each bad notification = 100 annoyance, each good = 5 utility. Net: -186/day. Fix: (1) rate-limit to 3/day. (2) Raise threshold to >95% precision (break-even point). (3) Add user feedback to personalize thresholds. The model needs >95% precision for notifications — standard 78% works for feeds, not push alerts.'
  common_mistake: |
    **The Pitfall:** Ignoring the base rate and asymmetric cost of false positives.
    **The Rationale:** Candidates often assume that 78% precision means 78% of notifications are relevant, which sounds "good enough."
    **The Consequence:** This ignores the base rate problem, leading to a net negative user experience due to the high annoyance cost of irrelevant notifications.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Articles/day: 500.
       - Base Click Rate: 2% (10 relevant articles).
       - Model Performance: 78% precision, 80% recall.
       - Costs: Annoyance (False Positive) = 100, Utility (True Positive) = 5.
    2. **Calculations:**
       - True Positives: 10 * 0.80 = 8.
       - False Positives: (8 / 0.78) - 8 ≈ 2.26.
       - Total Notifications: ~10.3.
       - Utility value: 8 * 5 = 40.
       - Annoyance cost: 2.26 * 100 = 226.
       - Net value: 40 - 226 = -186.
    3. **Conclusion & Interpretation:**
       - **Result: Quality-Bound.** The net value is heavily negative (-186) due to the outsized cost of false positives in push systems.
