title: The OTA Update Budget (mobile-0270)
scenario: You're an engineer on a mobile platform team, responsible for shipping updates to an on-device
  translation model. The current in-app model is a 50 million parameter FP16 model. A new, more accurate
  70 million parameter FP16 model is ready. However, the over-the-air (OTA) update system has a strict
  payload limit of 100 MB to avoid excessive cellular data costs for users. Explain whether you can ship
  the new FP16 model as-is. If not, calculate the size of the proposed alternative and justify your choice.
details:
  realistic_solution: The new 70M parameter FP16 model cannot be shipped as-is because its size exceeds
    the 100 MB limit. The correct proposal is to quantize the new model to INT8.
  common_mistake: The most common mistake is confusing the byte representation for different precisions.
    Candidates often forget that FP16 requires 2 bytes per parameter, incorrectly assuming 1 byte (like
    INT8) or 4 bytes (like FP32). This leads to a miscalculation of the model's storage footprint and
    a wrong conclusion about whether it fits within the OTA budget.
  napkin_math: 'New model FP16: 70M * 2B = 140MB > 100MB OTA limit. Cannot ship as-is. INT8 alternative:
    70M * 1B = 70MB < 100MB. Fits with 30MB headroom. Delta update: if models share architecture, diff
    might be ~30-50MB. But INT8 quantization is the straightforward fix: 50% size reduction with minimal
    accuracy loss for most tasks.'
  options:
  - The new FP16 model is 70 MB, so it fits within the 100 MB budget.
  - The new FP16 model is 280 MB, so it is far too large to ship.
  - The new FP16 model is 140 MB and won't fit, but an INT8 version would be 70 MB and does fit.
  - The new model adds 20M parameters, which is only 20 MB, so it fits easily.
  correct_index: 2
