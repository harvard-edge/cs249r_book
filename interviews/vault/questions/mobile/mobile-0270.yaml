title: The OTA Update Budget (mobile-0270)
scenario: You're an engineer on a mobile platform team, responsible for shipping updates to an on-device translation model. The current in-app model is a 50 million parameter FP16 model. A new, more accurate 70 million parameter FP16 model is ready. However, the over-the-air (OTA) update system has a strict payload limit of 100 MB to avoid excessive cellular data costs for users.
question: Can a 70M-parameter FP16 translation model fit a 100 MB OTA limit, and what quantized alternative should ship?
details:
  realistic_solution: The new 70M parameter FP16 model cannot be shipped as-is because its size exceeds the 100 MB limit. The correct proposal is to quantize the new model to INT8.
  common_mistake: |
    **The Pitfall:** Confusing byte representations for different precisions.
    **The Rationale:** Candidates often forget that FP16 requires 2 bytes per parameter, incorrectly assuming 1 byte (like INT8).
    **The Consequence:** They miscalculate the model's storage footprint and wrongly conclude that the 140 MB FP16 model will fit within the 100 MB OTA budget.
  napkin_math: |
    - Original FP16 Model Size: 70M * 2 bytes = 140 MB.
    - 140 MB > 100 MB OTA limit (Cannot ship as-is).
    - INT8 Quantized Model Size: 70M * 1 byte = 70 MB.
    - **70 MB < 100 MB** (Fits with 30 MB of headroom).
  options:
  - The new FP16 model is 70 MB, so it fits within the 100 MB budget.
  - The new FP16 model is 280 MB, so it is far too large to ship.
  - The new FP16 model is 140 MB and won't fit, but an INT8 version would be 70 MB and does fit.
  - The new model adds 20M parameters, which is only 20 MB, so it fits easily.
  correct_index: 2
