title: Calculate KV Cache Memory Footprint on Google Tensor G3
scenario: You are deploying a 3B parameter on-device LLM on a mobile device. Assume the model has 32 layers, a hidden dimension of 2560, and uses FP16 precision.
question: How much FP16 KV-cache memory is required for a single generation request reaching a sequence length of 2048 tokens?
details:
  realistic_solution: 'The candidate should apply the formula for KV cache memory: 2 (for K and V) * layers * hidden_dimension * sequence_length * bytes_per_parameter. This provides the exact byte count, which is crucial for determining if the model can safely run alongside the OS without triggering out-of-memory errors on the shared memory.'
  common_mistake: |
    **The Pitfall:** Forgetting the "Value" tensor or using the wrong byte size for FP16.
    **The Rationale:** Candidates often calculate layers * hidden_dim * seq_len but forget K/V multiplication and byte sizes.
    **The Consequence:** The calculated KV cache size is underestimated, leading to out-of-memory errors in production.
  napkin_math: |
    1. Assumptions & Constraints:
       - KV Cache: 2 (K & V) per token per layer.
       - Model spec: 32 layers, 2560 hidden dim, FP16 (2 bytes).
       - Sequence length: 2048 tokens.
    2. Calculations:
       - Bytes per token: 2 * 32 * 2560 * 2 = 327,680 bytes.
       - Total for 2048 tokens: 327,680 * 2048 = 671,088,640 bytes.
    3. Conclusion & Interpretation:
       - **Result: The total FP16 KV cache requires 640 MiB (Memory-Capacity-Bound).**
