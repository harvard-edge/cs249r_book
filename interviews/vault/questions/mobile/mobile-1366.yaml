title: Calculate KV Cache Memory Footprint on Google Tensor G3
scenario: You are deploying a 3B parameter on-device LLM (similar to Gemini Nano) on a mobile device powered by the Google Tensor G3 processor. The device has 12 GB of LPDDR5X RAM, which is shared between the system, apps, and the TPU. Assume the model has 32 layers, a hidden dimension of 2560, and uses FP16 precision.
question: How much FP16 KV-cache memory is required for a single generation request reaching a sequence length of 2048 tokens?
details:
  realistic_solution: 'The candidate should apply the formula for KV cache memory: 2 (for K and V) × layers × hidden_dimension × sequence_length × bytes_per_parameter. This provides the exact byte count, which is crucial for determining if the model can safely run alongside the OS without triggering out-of-memory errors on the shared 12 GB LPDDR5X RAM.'
  common_mistake: |
    **The Pitfall:** Forgetting the "Value" tensor or using the wrong byte size for FP16.
    **The Rationale:** Candidates often calculate `layers * hidden_dim * seq_len` but forget to multiply by 2 (for Keys and Values) and 2 (for FP16 bytes).
    **The Consequence:** The calculated KV cache size is underestimated by 2x to 4x, leading to out-of-memory errors in production.
  napkin_math: |
    1. KV Cache per token: 2 (K & V) * 32 (layers) * 2560 (hidden dim) * 2 bytes (FP16 precision).
    2. Bytes per token: 327,680 bytes.
    3. Total for 2048 tokens: 327,680 * 2048 = 671,088,640 bytes.
    4. **Conclusion: The total FP16 KV cache requires exactly 640 MiB (~671 MB).**
