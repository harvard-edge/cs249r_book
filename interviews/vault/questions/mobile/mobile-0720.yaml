title: The SoC Interconnect Bottleneck
scenario: 'On a Google Tensor G3 (Pixel 8 Pro), you pipeline your ML workload: the CPU preprocesses a
  frame, the GPU runs a segmentation model, and the TPU runs a classification model on the segmented output.
  Each stage takes ~5ms individually. You expect 5ms total with perfect pipelining, but measure 14ms.
  The compute units aren''t overloaded. What''s eating the other 9ms?'
question: "What's eating the other 9ms?"
details:
  realistic_solution: 'The bottleneck is the **SoC interconnect (NoC — Network on Chip)** and the cache
    coherency protocol. When the CPU finishes preprocessing and the GPU needs the result, the data must
    traverse the NoC from the CPU''s L2 cache to the GPU''s texture memory. On the Tensor G3, this involves:'
  common_mistake: '"The pipeline stages aren''t overlapping properly — it''s running sequentially." Even
    sequential execution would be 15ms (3 × 5ms). 14ms suggests partial overlap but with a hidden cost.'
  napkin_math: 'Per-handoff cost: cache flush (0.5ms) + NoC transfer (1ms) + fence (0.5ms) = 2ms minimum.
    Two handoffs: 4ms. With contention and fragmentation: ~4.5ms per handoff = 9ms total. Pipeline speedup:
    theoretical 3× (15ms → 5ms). Actual: 15ms → 14ms = **1.07×** — the interconnect overhead destroyed
    the pipelining benefit. Single-unit execution (all on TPU): 5ms + 5ms + 5ms = 15ms but with zero handoff
    overhead. With TPU fusion: 12ms. **Simpler and nearly as fast.**'
