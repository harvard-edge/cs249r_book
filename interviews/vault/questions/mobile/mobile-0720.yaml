title: The SoC Interconnect Bottleneck
scenario: 'On a mobile SoC, you pipeline your ML workload: the CPU preprocesses a frame, the GPU runs a segmentation model, and the TPU runs a classification model on the segmented output. Each stage takes ~5ms individually. You expect 5ms total with perfect pipelining, but measure 14ms. The compute units are not overloaded.'
question: 'What is eating the other 9ms in the pipelined execution?'
details:
  realistic_solution: 'The bottleneck is the **SoC interconnect (NoC — Network on Chip)** and the cache coherency protocol. When the CPU finishes preprocessing and the GPU needs the result, the data must traverse the NoC from the CPU''s L2 cache to the GPU''s texture memory. On the SoC, this involves:'
  common_mistake: |
    **The Pitfall:** Assuming the pipeline is simply executing sequentially instead of overlapping properly.
    **The Rationale:** Developers completely ignore the physical hardware reality of cache coherency protocols and NoC transfers between heterogeneous compute cores.
    **The Consequence:** Failing to recognize that massive interconnect overhead has destroyed the theoretical pipeline speedup.
  napkin_math: |
    **Assumptions & Constraints:**
    - Compute Time: 5ms per stage (CPU, GPU, TPU).
    - Pipeline Structure: 3 sequential handoffs (CPU -> GPU -> TPU).
    - Measured Latency: 14ms (vs 5ms expected).

    **Calculations:**
    - Theoretical Cost per Handoff: Flush (0.5ms) + NoC Transfer (1ms) + Fence (0.5ms) = ~2ms ideal.
    - Real-World Handoff with Contention: ~4.5ms per boundary.
    - Total Interconnect Overhead: 4.5ms * 2 boundaries = 9ms.
    - Total Latency = 5ms compute + 9ms overhead = 14ms.

    **Conclusion & Interpretation:**
    - **Result: 9ms (I/O-Bound)**. The Network-on-Chip (NoC) latency completely negates pipelining benefits.
