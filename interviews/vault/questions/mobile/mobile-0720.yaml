title: The SoC Interconnect Bottleneck
scenario: On a Google Tensor G3 (Pixel 8 Pro), you pipeline your ML workload: the CPU preprocesses a frame, the GPU runs a segmentation model, and the TPU runs a classification model on the segmented output. Each stage takes ~5ms individually. You expect 5ms total with perfect pipelining, but measure 14ms. The compute units aren't overloaded.
question: What is eating the other 9ms in the pipelined execution?
details:
  realistic_solution: 'The bottleneck is the **SoC interconnect (NoC — Network on Chip)** and the cache coherency protocol. When the CPU finishes preprocessing and the GPU needs the result, the data must traverse the NoC from the CPU''s L2 cache to the GPU''s texture memory. On the Tensor G3, this involves:'
  common_mistake: |
    **The Pitfall:** Assuming the pipeline stages aren't overlapping properly and it's running sequentially.
    **The Rationale:** Developers often ignore hardware-level communication costs between heterogeneous compute units.
    **The Consequence:** Missing the fact that even sequential execution would be 15ms. 14ms suggests partial overlap but with a hidden, massive SoC interconnect (NoC) overhead.
  napkin_math: |
    - Per-handoff cost: cache flush (0.5ms) + NoC transfer (1ms) + fence (0.5ms) = 2ms minimum.
    - With contention and fragmentation: ~4.5ms per handoff.
    - Two handoffs: 4.5ms * 2 = 9ms total overhead.
    - Pipeline speedup: theoretical 3× (15ms → 5ms).
    - Actual latency: 5ms compute + 9ms overhead = 14ms.
    - Single-unit execution (all on TPU) with fusion: 12ms.
    - **Interconnect overhead destroyed the pipelining benefit, making single-unit execution faster.**
