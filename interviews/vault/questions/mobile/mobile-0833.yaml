title: NPU Memory Tiering Specification
scenario: An LLM inference engine runs on a Snapdragon 8 Gen 3 Hexagon NPU. The 7B
  parameter INT4 model exceeds the fast NPU SRAM but fits entirely in the device's
  LPDDR5 main memory.
question: Create a layer execution and weight-tiering specification to maximize the
  auto-regressive token generation rate, detailing how to utilize the fast SRAM.
details:
  realistic_solution: Since token generation (batch size 1) is entirely memory-bandwidth
    bound, reading the full 3.5GB model from LPDDR5 (approx 77 GB/s) takes about 45ms
    per token. The candidate should specify pinning the most frequently accessed data
    (the KV cache, to prevent repetitive R/W operations) and the most critical embedding/LM-head
    weights into the high-bandwidth NPU SRAM. The remaining layers must be streamed
    sequentially from LPDDR5.
  common_mistake: Trying to partition layers such that compute and memory overlap
    perfectly, ignoring that auto-regressive decoding is overwhelmingly memory-bound
    rather than compute-bound.
  napkin_math: 3.5 GB / 77 GB/s = ~45ms per token -> max 22 tokens/s baseline.
