title: Mobile AR Frame Queuing
scenario: An Apple A17 Pro Neural Engine processes incoming AR frame requests at an
  arrival rate of 30 FPS. Processing time per frame is exponentially distributed with
  a mean of 25ms.
question: Evaluate the average queuing delay using an M/M/1 model and decide if this
  meets a strict 100ms queuing delay SLA.
visual:
  kind: svg
  path: mobile-1893.svg
  alt: A hockey-stick curve plotting average delay against arrival rate, showing exponential
    growth as utilization nears 100%.
  caption: M/M/1 Queuing Delay
details:
  realistic_solution: The arrival rate (lambda) is 30 frames/s. The service rate (mu)
    is 1 / 0.025s = 40 frames/s. The utilization (rho) is 30/40 = 0.75. The average
    queuing delay (Wq) is rho / (mu - lambda) = 0.75 / (40 - 30) = 0.075 seconds,
    or 75ms. This satisfies the 100ms SLA constraint.
  common_mistake: Calculating total system time (W = 1 / (mu - lambda) = 100ms) instead
    of the queuing delay alone, mistakenly failing the SLA.
  napkin_math: Wq = 0.75 / (40 - 30) = 0.075s
