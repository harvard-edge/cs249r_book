title: Mobile AR Frame Queuing
scenario: An Apple A17 Pro Neural Engine processes incoming AR frame requests at an arrival rate of 30 FPS. Processing time per frame is exponentially distributed with a mean of 25ms.
question: Does the average queuing delay of an M/M/1 model meet a strict 100ms SLA for AR frames?
visual:
  kind: svg
  path: mobile-1893.svg
  alt: A hockey-stick curve plotting average delay against arrival rate, showing exponential growth as utilization nears 100%.
  caption: M/M/1 Queuing Delay
details:
  realistic_solution: The arrival rate (lambda) is 30 frames/s. The service rate (mu) is 1 / 0.025s = 40 frames/s. The utilization (rho) is 30/40 = 0.75. The average queuing delay (Wq) is rho / (mu - lambda) = 0.75 / (40 - 30) = 0.075 seconds, or 75ms. This satisfies the 100ms SLA constraint.
  common_mistake: |
    **The Pitfall:** Calculating total system time instead of queuing delay.
    **The Rationale:** Candidates often use the formula W = 1 / (mu - lambda) = 100ms and mistakenly compare the total time in the system to the queuing delay SLA.
    **The Consequence:** Incorrectly failing the SLA by conflating processing time with wait time.
  napkin_math: |
    1. **Arrival rate ($\\lambda$):** 30 frames/s.
    2. **Service rate ($\\mu$):** 1 / 0.025s = 40 frames/s.
    3. **Utilization ($\\rho$):** 30 / 40 = 0.75.
    4. **Average queuing delay ($W_q$):** $\\rho / (\\mu - \\lambda) = 0.75 / (40 - 30) = 0.075$ seconds.
    5. **Conclusion:** **75ms**, which successfully meets the 100ms SLA.
