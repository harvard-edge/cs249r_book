title: On-Device Fairness Evaluation for Image Classification on Apple A17 Pro
scenario: You are tasked with deploying an on-device image classification model for content moderation on an iPhone 15 Pro. This model processes user-generated images locally before upload. A critical requirement is to ensure demographic parity with respect to a protected attribute like 'skin tone' for the model's classification outcome.
question: "What are the key resource considerations (TOPS, power, memory) for designing a practical, on-device evaluation strategy to continuously monitor demographic parity without negatively impacting user experience?"
details:
  realistic_solution: '1. **Metric Formulation**: Define demographic parity as the absolute difference in positive classification rates across the protected groups: `|P(Y=1 | A=group1) - P(Y=1 | A=group2)|`. The goal is to minimize this difference to approach zero. 2. **Evaluation Strategy**: Implement a privacy-preserving, selective sampling mechanism for a small fraction of inferences (e.g., 0.1%). Use an auxiliary, highly optimized on-device model (or a lightweight rule-based system) to infer the protected attribute (skin tone) on the sampled images locally, ensuring user privacy. This proxy model must be thoroughly validated offline for its own fairness. Aggregate sampled data points over a defined period (e.g., hourly or daily) and compute demographic parity metrics in batches during periods of low device activity or when charging. Securely transmit anonymized, aggregated fairness metrics (not raw data) to a backend for centralized monitoring. 3. **Resource Management**: Leverage the A17 Pro''s Neural Engine for both the main model and the proxy attribute inference to maximize efficiency. Carefully manage memory allocations for buffers and logging to stay within the 8 GB unified memory. Implement power-aware computation, potentially pausing evaluation during high-intensity user tasks or when battery is low, judiciously utilizing the ~5W power envelope.'
  common_mistake: |
    **The Pitfall:** Designing evaluation pipelines without considering strict power, memory, and TOPS constraints, or relying on off-device demographic data.
    **The Rationale:** Candidates default to server-side fairness logging concepts, neglecting that proxy models for protected attributes must run within the mobile constraints.
    **The Consequence:** Unacceptable battery drain, UI stutter from memory contention, or blatant privacy violations from uploading protected user attributes.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Main Model Rate: 20 images/sec.
       - Sampling Rate: 0.1% (0.02 images/sec for evaluation).
       - Proxy Model Compute: 0.1 TOPS-second (100 ms).
       - Unified Memory: 8 GB. Power Limit: ~5W.
    2. **Calculations:**
       - Average Compute Overhead: 0.02 samples/sec * 0.1 TOPS = 0.002 TOPS.
       - Memory Logging: 72 samples/hour * 1KB/sample = 72 KB/hour.
    3. **Conclusion & Interpretation:**
       - **Result: Power-Bound**
       - Compute and memory overheads are negligible compared to limits. The primary constraint is ensuring the proxy inference stays within the 5W thermal envelope, requiring batching during idle charging.
