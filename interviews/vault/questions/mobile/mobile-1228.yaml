title: Zero-Copy Data Pipeline for Snapdragon NPU
scenario: You are designing a real-time computer vision data pipeline for a flagship smartphone utilizing the Qualcomm Hexagon NPU (Snapdragon 8 Gen 3). The system must ingest 4K video at 60 FPS, preprocess it, and feed INT8 tensors to the NPU to utilize its 45 TOPS capacity. Since the CPU, GPU, and NPU all share 16 GB of LPDDR5X memory, you must architect an asynchronous pipeline that maximizes NPU utilization without exhausting thermal limits or shared memory bandwidth.
question: How should a Snapdragon 8 Gen 3 4K60 vision pipeline use zero-copy buffers to feed the Hexagon NPU efficiently?
details:
  realistic_solution: The best approach leverages Android HardwareBuffers to allocate memory in the shared 16 GB LPDDR5X pool, enabling zero-copy access across heterogeneous compute units. The image signal processor (ISP) or GPU handles resizing and quantization to INT8, writing directly to the shared buffer. The CPU merely orchestrates the pipeline, allowing the Hexagon NPU to read directly from memory and maintain maximum throughput for its 45 TOPS engine without bandwidth contention.
  common_mistake: |
    **The Pitfall:** Designing synchronous pipelines where the CPU performs preprocessing and explicitly copies memory to the NPU.
    **The Rationale:** Developers are used to discrete GPU architectures where explicit host-to-device memory copies are required.
    **The Consequence:** Fails to account for the shared LPDDR5X memory architecture, leading to redundant memory copies, CPU thermal throttling, and NPU starvation.
  napkin_math: |
    1. **Raw Video Bandwidth:** 4K at 60 FPS = 3840x2160x3 bytes * 60 = ~1.5 GB/s.
    2. **NPU Input Bandwidth:** Downsampling to 640x640 INT8 requires 1.2 MB per frame = 72 MB/s at 60 FPS.
    3. **Synchronous (CPU Copy) Cost:** Writing 72 MB/s and reading it back consumes 144 MB/s of bandwidth and active CPU cycles.
    4. **Zero-Copy Savings:** Using Android HardwareBuffers enables zero-copy.
    **This reduces inference payload memory operations by 50%, saving battery and bandwidth for the NPU.**
