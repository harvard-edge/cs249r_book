title: Zero-Copy Data Pipeline for Snapdragon NPU
scenario: 'You are designing a real-time computer vision data pipeline for a flagship smartphone utilizing a mobile NPU. The system must ingest 4K video at 60 FPS, preprocess it, and feed INT8 tensors to the NPU. Since the CPU, GPU, and NPU all share LPDDR5X memory, you must architect an asynchronous pipeline that maximizes NPU utilization without exhausting thermal limits or shared memory bandwidth.'
question: 'How should a 4K60 vision pipeline use zero-copy buffers to feed the NPU efficiently?'
details:
  realistic_solution: 'The best approach leverages Android HardwareBuffers to allocate memory in the shared LPDDR5X pool, enabling zero-copy access across heterogeneous compute units. The image signal processor (ISP) or GPU handles resizing and quantization to INT8, writing directly to the shared buffer. The CPU merely orchestrates the pipeline, allowing the NPU to read directly from memory and maintain maximum throughput without bandwidth contention.'
  common_mistake: |
    **The Pitfall:** Designing synchronous pipelines where the CPU performs preprocessing and explicitly copies memory to the NPU.
    **The Rationale:** Developers are used to discrete GPU architectures where explicit host-to-device memory copies are required.
    **The Consequence:** Fails to account for the shared LPDDR5X memory architecture, leading to redundant memory copies, CPU thermal throttling, and NPU starvation.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Resolution & Framerate: 4K at 60 FPS.
       - NPU Input: Downsampled to 640x640 INT8.
    2. **Calculations:**
       - Raw Video Bandwidth: 3840×2160×3 bytes × 60 = ~1.5 GB/s.
       - NPU Input Bandwidth: 640×640×3 bytes = 1.2 MB per frame; 1.2 MB × 60 = 72 MB/s.
       - Synchronous Copy Cost: Write 72 MB/s + Read 72 MB/s = 144 MB/s.
       - Zero-Copy Savings: Uses single unified Android HardwareBuffer.
    3. **Conclusion & Interpretation:**
       **Result: Memory-Bound Pipelining.** Zero-copy architecture reduces the inference payload memory bus overhead by 50% (saving 72 MB/s), eliminating CPU thermal throttling and preventing NPU starvation.
