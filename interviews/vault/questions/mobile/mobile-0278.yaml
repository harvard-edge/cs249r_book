title: The OTA Data Budget (mobile-0278)
scenario: 'You are an ML Systems Engineer for an automotive company managing a fleet of one million vehicles.
  You need to decide on an Over-the-Air (OTA) update strategy for the in-car voice assistant for the next
  year. The cellular data plan for the fleet is a major operational cost. Strategy A (Monolithic): A 40
  MB model updated monthly to include new entities. Strategy B (RAG): A 40 MB base model deployed once,
  plus a 5 MB knowledge base updated monthly. What is the total annual OTA data budget required per vehicle
  for each strategy?'
question: "How much annual OTA data does a 40 MB monthly monolith use versus a 40 MB base plus 5 MB monthly RAG updates?"
details:
  realistic_solution: The RAG-based strategy is significantly more data-efficient over the course of a
    year, though it introduces architectural complexity.
  common_mistake: Engineers often miscalculate the total annual cost by either forgetting the different
    update frequencies (quarterly vs. monthly) or by omitting the one-time deployment cost for the base
    model in the RAG strategy. This leads to an inaccurate comparison of the long-term data costs.
  napkin_math: '1. Monolithic Strategy: Updating the full 40MB model monthly requires 40MB * 12 = 480MB
    per vehicle/year. For 1M fleet: 480MB * 1M = 480TB/year. 2. RAG Strategy: Ship 40MB base model once
    + 5MB embeddings monthly. 40MB + (5MB * 12) = 100MB per vehicle/year. For 1M fleet: 100MB * 1M = 100TB/year.
    3. Savings: RAG saves 380TB of cellular data annually, massively reducing fleet LTE costs.'
  options:
  - 'Monolithic: 480 MB, RAG: 60 MB'
  - 'Monolithic: 120 MB, RAG: 100 MB'
  - 'Monolithic: 120 MB, RAG: 45 MB'
  - 'Monolithic: 480 MB, RAG: 100 MB'
  correct_index: 3
