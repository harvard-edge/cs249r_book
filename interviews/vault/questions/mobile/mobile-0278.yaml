title: The OTA Data Budget (mobile-0278)
scenario: 'You are an ML Systems Engineer for an automotive company managing a fleet of one million vehicles. You need to decide on an Over-the-Air (OTA) update strategy for the in-car voice assistant for the next year. Strategy A (Monolithic): A 40 MB model updated monthly. Strategy B (RAG): A 40 MB base model deployed once, plus a 5 MB knowledge base updated monthly.'
question: What is the total annual OTA data budget required per vehicle for each strategy?
details:
  realistic_solution: |
    The Retrieval-Augmented Generation (RAG) strategy is significantly more data-efficient over the course of a year. Shipping a monolithic model monthly accumulates massive cellular data egress, whereas the RAG approach only requires shipping the small delta updates to the vector database.
  common_mistake: |
    **The Pitfall:** Forgetting to amortize the one-time deployment cost.
    **The Rationale:** Engineers either miscalculate the update frequency or omit the one-time 40MB base model cost for the RAG strategy.
    **The Consequence:** An inaccurate comparison leads to flawed budget planning for cellular fleet connections.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Monolithic: 40 MB per month.
       - RAG: 40 MB once + 5 MB per month.
       - Timeframe: 12 months.
    2. **Calculations:**
       - Monolithic Strategy: 40 MB * 12 months = 480 MB per vehicle/year.
       - RAG Strategy: 40 MB (base) + (5 MB * 12 months) = 40 + 60 = 100 MB per vehicle/year.
       - Fleet scale (1M vehicles): 480 TB vs 100 TB.
    3. **Conclusion & Interpretation:**
       - **Monolithic uses 480 MB; RAG uses 100 MB. Bottleneck: Network Bandwidth.**
  options:
  - 'Monolithic: 480 MB, RAG: 60 MB'
  - 'Monolithic: 120 MB, RAG: 100 MB'
  - 'Monolithic: 120 MB, RAG: 45 MB'
  - 'Monolithic: 480 MB, RAG: 100 MB'
