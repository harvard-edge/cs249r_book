title: Mitigating Adversarial Attacks on On-Device ML for Google Tensor G3
scenario: A privacy-preserving on-device ML application runs real-time classification of sensitive user data on a Google Tensor G3. The system is susceptible to adversarial attacks, including data poisoning, model inversion, and side-channel power analysis.
question: How would you design a robust system architecture to detect and mitigate adversarial threats on the Tensor G3 platform?
details:
  realistic_solution: A realistic solution involves a multi-layered defense strategy. Firstly, implement robust data sanitization and integrity checks at the input pipeline, potentially leveraging federated learning for model updates to minimize data poisoning risks. Secondly, employ a combination of adversarial training (with specialized on-device friendly techniques like PGD or FGSM for a subset of critical features) and defensive distillation during model deployment. Crucially, integrate the Tensor G3's dedicated security core (Titan M2) for secure execution environments (TEE) for sensitive model parts and cryptographic attestation of model integrity. For runtime protection, design a lightweight anomaly detection module running on the general-purpose CPU cores to monitor TPU inference patterns, power consumption, and memory access against baseline profiles to detect potential side-channel attacks or active model manipulation. This module could trigger alerts or model rollback if anomalies exceed predefined thresholds. Furthermore, implement obfuscation techniques and secure model serialization formats to prevent model extraction.
  common_mistake: |
    **The Pitfall:** Relying solely on standard adversarial training without hardware-specific defenses.
    **The Rationale:** Candidates often apply cloud-centric defense strategies to edge devices, neglecting the unique constraints and attack vectors of physical hardware.
    **The Consequence:** Leaving the model vulnerable to side-channel attacks and failing to utilize the device's built-in secure enclave (Titan M2) for cryptographic attestation.
  napkin_math: |
    1. **TPU Capacity:** Continuous adversarial detection at 100 Hz using 1 GFLOP per inference = 100 GFLOPS.
    2. **TPU Utilization:** 100 GFLOPS / 7.5 TOPS = 1.33% of TPU capacity consumed.
    3. **CPU Overhead:** 10 MB/s data stream / 64 bytes per block = 156,250 blocks/sec.
    4. **Hashing Cost:** 156,250 blocks $\times$ 500 cycles = 78.1 MHz.
    5. **Conclusion:** Both detection (1.33% TPU) and integrity checks (78.1 MHz CPU) are lightweight and fit comfortably within the **real-time budget**.
