title: Mitigating Adversarial Attacks on On-Device ML for Google Tensor G3
scenario: A privacy-preserving on-device ML application runs real-time classification of sensitive user data on a Google Tensor G3. The system is susceptible to adversarial attacks, including data poisoning, model inversion, and side-channel power analysis.
question: How would you design a robust system architecture to detect and mitigate adversarial threats on the Tensor G3 platform?
details:
  realistic_solution: 'A robust defense requires a multi-layered hardware-aware strategy. First, implement rigorous input sanitization and integrity checks, utilizing federated learning with secure aggregation to mitigate data poisoning. Second, deploy adversarial training (e.g., PGD) and Top-K Sparsification to harden critical features. Crucially, leverage the Tensor G3''s dedicated Titan M2 security core to establish a Trusted Execution Environment (TEE) for sensitive weights and cryptographic attestation. For runtime defense, implement a lightweight anomaly detection module via nsys profiling on the CPU to monitor TPU memory access patterns and power profiles, detecting side-channel attacks or execution deviations in real-time. Finally, apply model obfuscation and secure serialization to thwart model inversion.'
  common_mistake: |
    **The Pitfall:** Relying solely on standard adversarial training without hardware-specific defenses.
    **The Rationale:** Candidates often apply cloud-centric defense strategies to edge devices, neglecting the unique constraints and attack vectors of physical hardware.
    **The Consequence:** Leaving the model vulnerable to side-channel attacks and failing to utilize the device's built-in secure enclave (Titan M2) for cryptographic attestation.
  napkin_math: |
    **Assumptions & Constraints:**
    - TPU capacity: 7.5 TOPS.
    - Adversarial detection rate: 100 Hz.
    - Inference compute: 1 GFLOP.
    - CPU data stream: 10 MB/s.
    - CPU block size: 64 bytes.
    - Hashing cost: 500 cycles/block.

    **Calculations:**
    - TPU compute: 100 Hz * 1 GFLOP = 100 GFLOPS.
    - TPU utilization: 100 GFLOPS / 7.5 TOPS = 1.33%.
    - CPU blocks/sec: 10 MB/s / 64 bytes = 156,250 blocks/sec.
    - CPU hashing cost: 156,250 blocks * 500 cycles = 78.1 MHz.

    **Conclusion & Interpretation:**
    - **Result: 1.33% TPU, 78.1 MHz CPU (Compute-Bound)**. Both detection and integrity checks fit comfortably within the real-time budget.
