title: Diagnosing Thermal Throttling from Adversarial Inputs on Tensor G3
scenario: "Your team deployed the Gemini Nano LLM on an Android device. Under normal conditions, the on-device TPU efficiently processes queries at 15 tokens/second. However, telemetry shows that for a specific subset of user inputs, the device experiences severe thermal throttling within seconds, dropping inference speed to 2 tokens/second and rapidly draining the battery."
question: "Why do certain Gemini Nano inputs trigger rapid thermal throttling and throughput collapse?"
details:
  realistic_solution: |
    The system is falling victim to an adversarial 'sponge' attack. Maliciously crafted prompts deliberately maximize sequence length and attention complexity, forcing continuous, dense O(N^2) computations across the maximum context window. This artificially sustains peak 7.5 TOPS utilization, saturating the SoC's thermal envelope (typically ~2.5W sustained) and triggering aggressive OS-level downclocking to prevent hardware damage. Mitigate via strict compute-bound limits and heuristic input sanitization.
  common_mistake: |
    **The Pitfall:** Blaming generic memory leaks, background processes, or hardware degradation.
    **The Rationale:** Candidates fail to consider that the input itself is adversarial, missing the connection to computationally expensive 'sponge' examples.
    **The Consequence:** Implementing ineffective fixes while the system remains completely vulnerable to adversarial resource exhaustion.
  napkin_math: |
    **Assumptions & Constraints:**
    - Sustained thermal limit: ~2.5W.
    - Peak TPU power draw: ~4W-5W (at 7.5 TOPS).
    - Normal throughput: 15 tokens/sec.

    **Calculations:**
    - Sponge prompt forces continuous peak compute -> sustained 4W-5W power draw.
    - Power delta: 4.5W (actual) > 2.5W (limit) -> triggers thermal throttling in ~15 seconds.
    - Throttled throughput: drops by ~80% to 2-3 tokens/second.

    **Conclusion & Interpretation:**
    - **Result: 80% throughput collapse (Power-Thermal Bottleneck)**. Adversarial prompts break the thermal budget, creating a power-thermal bottleneck.
