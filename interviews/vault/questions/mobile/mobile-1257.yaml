title: Diagnosing Thermal Throttling from Adversarial Inputs on Tensor G3
scenario: Your team deployed the Gemini Nano LLM on the Google Tensor G3. Under normal conditions, the on-device TPU efficiently processes queries at 15 tokens/second. However, telemetry shows that for a specific subset of user inputs, the device experiences severe thermal throttling within seconds, dropping inference speed to 2 tokens/second and rapidly draining the battery.
question: Why do certain Gemini Nano inputs on Tensor G3 trigger rapid thermal throttling and throughput collapse?
details:
  realistic_solution: |
    The symptom points to an adversarial 'sponge' attack or a maliciously crafted prompt designed to maximize computation. These inputs force the model to evaluate dense attention matrices over long contexts without triggering any early exit heuristics. On the Tensor G3, while the TPU is optimized for 7.5 TOPS, processing these adversarial sequences continuously saturates the compute units and memory bandwidth of the 12 GB LPDDR5X, causing rapid heat buildup. The solution involves implementing input sanitization, monitoring per-token generation times for anomalies, and adding strict compute/time bounds per request.
  common_mistake: |
    **The Pitfall:** Blaming generic memory leaks, background processes, or hardware degradation.
    **The Rationale:** Candidates fail to consider that the input itself is adversarial, missing the connection to computationally expensive 'sponge' examples.
    **The Consequence:** Implementing ineffective fixes while the system remains vulnerable to adversarial resource exhaustion.
  napkin_math: |
    - **Memory bandwidth:** 3.2 GB (INT8 weights) * 15 tok/s = 48 GB/s.
    - **Adversarial sponge prompt:** Maximizes context (e.g., 2048 tokens), forcing O(N^2) attention calculations.
    - **Power draw:** TPU hits its 7.5 TOPS peak continuously, drawing ~4W-5W.
    - **Thermal limit:** Mobile form factors have a sustained thermal envelope of ~2.5W.
    - **Throttling time:** The device hits its thermal threshold within 15-20 seconds.
    - **Result:** **OS throttles TPU frequency by 80% to cool down, dropping throughput to 2-3 tokens/second.**
