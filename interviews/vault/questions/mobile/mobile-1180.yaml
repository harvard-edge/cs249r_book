title: Calculate Energy Cost of Memory vs Compute on Hexagon NPU
scenario: You are deploying a quantized INT8 computer vision model to an NPU. The layer performs 10 million INT8 MAC operations and requires transferring 2 MB of weight and activation data. INT8 MAC = 0.1 pJ. 32-bit DRAM read = 100 pJ.
question: "How much energy does the Hexagon NPU layer spend on INT8 compute versus LPDDR5X memory access?"
details:
  realistic_solution: Calculate the energy utilization utilizing Horowitz energy heuristics. Isolate the compute expenditure versus the heavily penalized off-chip LPDDR5X DRAM memory access to mathematically prove that data movement dictates the thermal and battery envelope.
  common_mistake: |
    **The Pitfall:** Focusing solely on NPU compute capability while ignoring data movement.
    **The Rationale:** Candidates are conditioned to look at TOPS as the primary metric, completely missing the physics of memory energy costs.
    **The Consequence:** Developing models that hit frame-rate targets but aggressively overheat the phone and drain the battery through excessive DRAM access.
  napkin_math: |
    **Assumptions & Constraints:**
    - 10M MACs, 2 MB transfer.
    - MAC = 0.1 pJ.
    - 32-bit DRAM read (4 bytes) = 100 pJ.
    
    **Calculations:**
    - Compute = 10,000,000 * 0.1 pJ = 1 µJ.
    - Memory = 2,000,000 bytes / 4 bytes/word = 500,000 accesses.
    - Memory Energy = 500,000 * 100 pJ = 50 µJ.
    
    **Conclusion & Interpretation:**
    - **Result: Energy-Bound**. Memory access consumes 50 µJ versus 1 µJ for compute, dominating the power envelope by 50x.
