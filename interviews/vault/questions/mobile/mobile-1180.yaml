title: Calculate Energy Cost of Memory vs Compute on Hexagon NPU
scenario: You are deploying a quantized INT8 computer vision model to the Qualcomm Hexagon NPU on a Snapdragon 8 Gen 3 SoC. The model has a specific layer that performs 10 million INT8 MAC operations and requires transferring 2 MB of weight and activation data from the shared 16 GB LPDDR5X memory. Given that an INT8 MAC operation on the NPU consumes roughly 0.1 pJ, while a 32-bit DRAM read from LPDDR5X costs approximately 100 pJ.
question: "How much energy does the Hexagon NPU layer spend on INT8 compute versus LPDDR5X memory access?"
details:
  realistic_solution: 'Apply the Horowitz energy table principles, recognizing that off-chip memory access is orders of magnitude more expensive than arithmetic operations. Calculate both independently to show memory domination.'
  common_mistake: |
    **The Pitfall:** Focusing solely on NPU compute capability while ignoring data movement.
    **The Rationale:** Candidates are conditioned to look at "45 TOPS" as the primary metric, completely missing the physics of memory energy costs.
    **The Consequence:** Developing models that hit frame-rate targets but aggressively overheat the phone and drain the battery through excessive DRAM access.
  napkin_math: |
    - **Compute Energy:** 10,000,000 MACs * 0.1 pJ/MAC = 1,000,000 pJ = 1 microjoule (uJ).
    - **Memory Conversion:** 2 MB = 2,000,000 bytes = 500,000 32-bit words.
    - **Memory Energy:** 500,000 accesses * 100 pJ/access = 50,000,000 pJ = 50 microjoules (uJ).
    - **Final Result:** The memory access consumes **50 uJ vs 1 uJ for compute**, meaning memory uses 50x more energy.
