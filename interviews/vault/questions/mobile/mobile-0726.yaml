title: The Mobile AI Chip Roadmap Bet
scenario: You're the ML platform lead at a major app company. You need to decide your on-device ML strategy
  for the next 3 years. Apple is pushing the ANE (fixed-function, proprietary), Qualcomm is pushing Hexagon
  (programmable DSP + NPU), Google is building custom TPU cores in Tensor chips, Samsung is licensing
  ARM Ethos NPUs, and MediaTek is integrating custom APUs. How do you build a model deployment pipeline
  that survives this hardware fragmentation without maintaining 5 separate codepaths?
details:
  realistic_solution: 'Build a three-layer architecture: (1) Model layer — design models using only universally-supported
    ops (a ''portable op set'' that works on ANE, Hexagon, Ethos, APU, and TPU). (2) Compilation layer
    — automated pipeline that compiles from ONNX to each platform''s native format, runs validation tests
    on a device farm, and flags regressions. (3) Deployment layer — A/B testing and rollback per device
    family. Cost: 200 compilation cycles/year automated at 15 min each vs 2 hours manual. Year 1 investment:
    -$13.5K. Year 2+ savings: $46.5K/year as model count grows. The key: test on real hardware, not just
    simulators.'
  common_mistake: '"Use ONNX Runtime — it abstracts all hardware." ONNX Runtime provides a common API,
    but each backend (CoreML EP, QNN EP, NNAPI EP) still has different operator coverage, quantization
    requirements, and performance characteristics. Abstraction hides the differences but doesn''t eliminate
    them.'
  napkin_math: 'Without abstraction: 5 platforms × 10 models × 4 updates/year = 200 compilation+testing
    cycles/year. At 2 hours each: 400 engineer-hours/year. With automated pipeline: 200 cycles × 15 min
    (automated) = 50 hours of compute + 40 hours of manual intervention for failures (20% failure rate).
    Savings: 310 engineer-hours/year × $150/hr = **$46.5K/year**. Device farm cost: $5K/month (BrowserStack/Firebase
    Test Lab). Net savings: $46.5K - $60K = -$13.5K in Year 1 (investment), +$46.5K/year from Year 2 onward
    as the model count grows.'
