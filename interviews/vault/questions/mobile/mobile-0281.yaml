title: 'The Mobile Ridge Point: Roofline Analysis'
scenario: You're optimizing a neural network for the Apple A17 Pro chip, which features a 35 TOPS Neural
  Engine and has access to 51.2 GB/s of system memory bandwidth. To determine if your model will be limited
  by computation or memory access, you need to calculate the chip's 'ridge point' from its roofline model.
  What is the approximate ridge point for the A17 Pro's Neural Engine, and what does this number represent?
details:
  realistic_solution: 'The ridge point is the minimum arithmetic intensity (AI) a model must have to be
    compute-bound on this hardware. It is the intersection of the compute roof and the memory bandwidth
    roof in the roofline model. For the A17 Pro: Ridge Point = 35 TOPS / 51.2 GB/s = 35 × 10^12 / (51.2
    × 10^9) ≈ 683 Ops/Byte. Any model with AI > 683 Ops/Byte will be compute-bound (limited by the ANE''s
    35 TOPS). Any model with AI < 683 Ops/Byte will be memory-bound (limited by the 51.2 GB/s bandwidth).'
  common_mistake: A common mistake is to focus only on the peak TOPS of a mobile accelerator, assuming
    that a higher number is always better. This ignores the reality that most on-device models are bottlenecked
    by memory bandwidth, not raw compute. An engineer might fail to calculate the ridge point correctly
    due to unit confusion (TOPS vs OPS, GB/s vs B/s), or misinterpret its meaning, leading them to optimize
    the wrong part of their model (e.g., trying to reduce FLOPs when they should be reducing memory access).
  napkin_math: Ridge Point = Peak Compute / Memory Bandwidth = (35 × 10^12 Ops/s) / (51.2 × 10^9 Bytes/s)
    ≈ 683 Ops/Byte.
  options:
  - ~0.68 Ops/Byte. This is the ratio of TOPS to GB/s.
  - ~1.46 Bytes/Op. This is the memory required for each operation.
  - ~684 Ops/Byte. This is the minimum arithmetic intensity required to be compute-bound.
  - 7 TOPS/W. This is the power efficiency of the accelerator, assuming a 5W draw.
  correct_index: 2
