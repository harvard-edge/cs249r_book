title: 'Network Bandwidth Bottlenecks: Realization — Size Peak Bandwidth for Mobile LLM App'
scenario: 'Concretely size the peak and sustained LPDDR5X bandwidth consumption for a Snapdragon 8 Gen
  3 (77 GB/s) running a 3B INT4 LLM assistant during a 60-second conversation. The conversation has: 10
  turns, each with 200-token prompt prefill and 100-token response decode. Compute per-turn bandwidth
  and total data moved.'
details:
  realistic_solution: 'Per turn: Prefill (200 tokens, 32 layers, 32 KV heads, 128 dim): FLOPs-bound at
    200T × 6B FLOPs / 90 TOPS = 13.3ms. Weight BW during prefill: 1.5GB / 13.3ms = 112.8GB/s? Exceeds
    77GB/s — means prefill is actually memory + compute co-limited. Assume BW-limited: 200 tokens × (1.5GB
    weight read + 200×KV_per_token writes). Write new KV: 200×524KB = 104.9MB. Total prefill BW: 1.5GB+0.105GB=1.605GB.
    Decode (100 tokens): per-token BW = (1.5GB + running_context × 524KB). At mid-response (turn 5, 50
    tokens in): context = 5×300=1500 tokens. KV: 1500×524KB=786MB. Decode BW/token: 1.5+0.786=2.286GB.
    Total decode: 100×2.286GB=228.6GB. Total 10 turns: ~(10×1.605GB prefill) + (sum of decode BW) ≈ 16.05
    + ~200GB = 216GB moved in 60s = 3.6GB/s average. Peak: during decode at turn 10 (3000 ctx tokens):
    1.5+1.57=3.07GB/19.5ms=157.4GB/s? Exceeds 77GB/s — means TPOT degrades to 3.07/77=39.8ms at turn 10.'
  common_mistake: Computing only weight bandwidth without including KV-cache growth across turns (the
    cache accumulates from turn 1 through turn 10).
  napkin_math: 'KV/token: 524KB. Turn 10, 100-token decode, context=3000 tokens. Weight: 1.5GB. KV read:
    3000×524KB=1.57GB. Total per token: 3.07GB. TPOT: 3.07/77=39.8ms (vs 19.5ms at start). Over 100 decode
    tokens: avg context=3050. Total data: 100×3.07=307GB in 100×0.04s=4s. Plus 10 prefills: 10×1.6=16GB.
    Grand total: 323GB moved in ~60s = 5.4GB/s average. Peak: 77GB/s (saturated during decode at long
    context).'
