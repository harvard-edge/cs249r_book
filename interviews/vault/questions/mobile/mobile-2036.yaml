title: Evaluating JIT Compilation Latency Spikes on Mobile NPU
scenario: A translation app loads a 1GB INT8 model. On the Snapdragon 8 Gen 3, the
  first inference takes 800ms, while subsequent inferences take 30ms.
question: Evaluate the primary cause of this first-run latency spike and propose an
  architectural solution.
details:
  realistic_solution: The 800ms delay is the 'warm-up' time, dominated by JIT compilation
    of the model graph to Hexagon-specific microcode and paging 1GB of weights into
    RAM. The solution is to serialize the compiled NPU binary during installation
    and asynchronously pre-warm the model upon app launch.
  common_mistake: Blaming the cold start purely on CPU overhead rather than device-specific
    compilation and weight paging.
  napkin_math: 1000 MB / 2000 MB/s flash speed = 500 ms just to read weights
