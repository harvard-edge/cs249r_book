title: Real-Time Sensor Ingestion for AR Tracking
scenario: An AR application needs to ingest real-time camera (60 FPS, 1080p) and IMU (1000 Hz) streams directly into the Apple A17 Pro Neural Engine using the shared 8 GB unified memory. The entire SoC has a strict thermal budget of ~5W.
question: How would you ingest AR camera and IMU streams in real time using unified-memory ring buffers?
details:
  realistic_solution: A strong solution utilizes lock-free ring buffers in the unified memory to handle the high-frequency IMU and camera streams, achieving zero-copy ingestion. Preprocessing should be pipelined using the ISP or GPU before the tensor is handed off to the A17 Pro Neural Engine. The candidate must analyze the memory access patterns to ensure the 35 TOPS NPU isn't waiting on CPU-side data serialization.
  common_mistake: |
    **The Pitfall:** Treating mobile sensors like distributed cloud data streams.
    **The Rationale:** Candidates propose heavy, server-like message queues (e.g., Kafka) or excessive multi-threading.
    **The Consequence:** Constant data serialization and CPU interrupts thrash the unified memory cache and exceed the 5W thermal budget.
  napkin_math: |
    - **Camera Data Rate:** 1920x1080 * 3 bytes (RGB) * 60 FPS = ~373 MB/s.
    - **IMU Data Rate:** 1000 Hz * 32 bytes = 32 KB/s.
    - **Total Bandwidth:** <400 MB/s, well within unified memory limits.
    - **Compute Required:** 10 GOPS feature extraction takes ~0.28ms on the 35 TOPS NPU.
    - **Final Result:** **NPU compute is trivial; thermal viability relies entirely on zero-copy lock-free ring buffers to eliminate CPU data movement.**
