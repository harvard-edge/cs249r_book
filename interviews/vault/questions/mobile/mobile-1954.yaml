title: Voice Translation Queue Spike
scenario: On-device translation app on Snapdragon 8 Gen 3 queues 200 ms audio chunks. Service is deterministic at 100 ms per chunk (10 chunks/sec capacity). Users speak in bursty patterns - long monologues at ~12 chunks/sec interspersed with silence - that average 9.5 chunks/sec but exhibit Poisson-like burst arrivals (M/D/1 rather than M/M/1 since service is deterministic).
question: Diagnose the root cause of massive latency lag using queueing theory, computing expected queue length in steady state.
visual:
  kind: svg
  path: mobile-1954.svg
  alt: Line graph showing queue length shooting up at 0.95 utilization
  caption: Queue Length vs Utilization
details:
  realistic_solution: rho = 9.5/10 = 0.95. M/D/1 expected queue length L_q = rho^2 / (2*(1-rho)) = 0.9025 / 0.10 = 9.0 chunks. M/M/1 (incorrect for deterministic service) would predict 18 chunks. Even with deterministic service, near-saturation produces catastrophic backlog because Poisson burstiness in arrivals - bursts at 12 chunks/sec for several seconds - drives momentary utilization > 1, accumulating a queue that cannot drain at the average rate. The fix is admission control or expanding the service rate during bursts.
  common_mistake: |
    **The Pitfall:** Applying M/M/1 to a deterministic-service workload.
    **The Rationale:** Candidates overestimate the queue by 2x, or believe low average utilization (95%) means no queueing.
    **The Consequence:** Failing to anticipate the catastrophic backlog from Poisson burstiness.
  napkin_math: |
    1. Calculate Utilization (rho): 9.5 / 10 = 0.95.
    2. Apply M/D/1 Queue formula: L_q = rho^2 / (2 * (1 - rho)).
    3. Compute Length: 0.9025 / (2 * 0.05) = 0.9025 / 0.10 = 9.0 chunks.
    4. Compare M/M/1: L_q = 18 chunks.
    **Conclusion:** Expected queue is 9.0 chunks, but bursts will temporarily drive utilization > 1.
