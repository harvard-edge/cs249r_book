title: Voice Translation Queue Spike
scenario: On-device translation app on Snapdragon 8 Gen 3 queues audio chunks. Service
  rate is 10 chunks/sec. Users speak at an average of 9.5 chunks/sec.
question: Diagnose the root cause of massive latency lag using queueing theory, computing
  expected queue length in steady state.
visual:
  kind: svg
  path: mobile-1954.svg
  alt: Line graph showing queue length shooting up at 0.95 utilization
  caption: Queue Length vs Utilization
details:
  realistic_solution: Utilization rho = 9.5/10 = 0.95. Expected queue length L_q =
    rho^2 / (1-rho) = 0.9025 / 0.05 = 18.05 chunks. Near 100% utilization, slight
    variance causes catastrophic queue buildup.
  common_mistake: Assuming that because arrival rate (9.5) < service rate (10), there
    should be zero queueing delay.
  napkin_math: L_q = 0.9025 / 0.05 = 18 chunks wait.
