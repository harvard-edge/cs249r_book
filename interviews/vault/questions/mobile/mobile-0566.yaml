title: The Mobile 'Pro' Upgrade Dilemma
scenario: You are the tech lead for a 'Visual Search' feature on a flagship Android phone. Your team used
  Neural Architecture Search (NAS) to create `MobileFinderNet-M`, a CNN using depthwise separable convolutions.
  It achieves 85% top-1 accuracy at 3 G-MACs and runs in 18ms on the phone's NPU, meeting your 20ms latency
  budget.
question: "How should effective throughput be used to decide whether scaling or MoE can upgrade MobileFinderNet within the 20ms budget?"
details:
  realistic_solution: The correct approach is to first calculate the *effective throughput* of the mobile
    NPU based on the baseline model's real-world performance, and then use that throughput to estimate
    the latency of the two proposed models.
  common_mistake: The most common mistake is to assume latency scales linearly with parameters, not activated
    compute (MACs). With an MoE model, most parameters are inactive during any single forward pass. Another
    mistake is to use the device's peak theoretical TOPS for estimation, which is never achieved in practice.
    Realistic latency estimation requires calculating the *effective* or *sustained* throughput on the
    specific workload.
  napkin_math: "### 1. Infer Effective Throughput\nBaseline MACs: 3 G-MACs (6 G-Ops). Latency: 18ms.\nEffective Throughput = 6 G-Ops / 18ms = 333 G-Ops/s (0.33 TOPS).\n\n### 2. Scaled Model\nScaled MACs: 6 G-MACs (12 G-Ops).\nEstimated Latency = 12 G-Ops / 333 G-Ops/s = 36ms. (Fails budget)\n\n### 3. MoE Model\nMoE adds parameters but typically only increases active MACs by a small fraction (e.g., 10%).\nEstimated Active MACs = 3.3 G-MACs (6.6 G-Ops).\nEstimated Latency = 6.6 G-Ops / 333 G-Ops/s = 19.8ms. (Passes budget)"
  options:
  - The MoE model adds 50% more parameters, so its latency will increase by 50% to 27ms, making it unviable.
  - Scaling the model to 6 G-MACs will double the latency to 36ms, but the MoE model will have a latency
    of ~19.8ms, making it the only viable option.
  - Since the Snapdragon 8 Gen 3 has 45 TOPS, both models are easily within budget. We should choose the
    simple scaled model.
  - Both approaches increase MACs, so both will fail the latency budget. It's impossible to improve accuracy
    without increasing latency.
  correct_index: 1
