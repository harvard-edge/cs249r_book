title: The Mobile 'Pro' Upgrade Dilemma
scenario: You are the tech lead for a 'Visual Search' feature on a flagship Android phone. Your team's baseline model, `MobileFinderNet-M`, achieves 85% top-1 accuracy at 3 G-MACs and runs in 18ms on the NPU, meeting the 20ms latency budget. You need to improve accuracy and are evaluating two proposed upgrades: scaling the dense model to 6 G-MACs, or swapping to an MoE model with 50% more parameters but fewer active pathways.
question: How should effective throughput be calculated to determine which upgrade option satisfies the 20ms latency budget?
details:
  realistic_solution: Calculate the *effective throughput* of the mobile NPU based on the baseline model's real-world performance, and use that to estimate the latency of the two proposed models. The dense scaled model will fail the budget, while the MoE model will pass because it limits active MACs.
  common_mistake: |
    **The Pitfall:** Assuming latency scales linearly with parameter count instead of activated compute (MACs).
    **The Rationale:** Candidates overlook that Mixture of Experts (MoE) keeps most parameters inactive during any single forward pass, decoupling model size from inference latency.
    **The Consequence:** Incorrectly rejecting the highly accurate MoE model and failing to deliver the required accuracy bump.
  napkin_math: |
    - **Baseline Throughput:** 3 G-MACs = 6 G-Ops. 6 G-Ops / 18ms = 333 G-Ops/s (0.33 TOPS effective).
    - **Dense Scaled Model:** 6 G-MACs = 12 G-Ops.
    - **Dense Latency:** 12 G-Ops / 333 G-Ops/s = 36ms. (Fails 20ms budget).
    - **MoE Model:** Adds 50% more parameters, but active MACs only increase by ~10% (3.3 G-MACs = 6.6 G-Ops).
    - **MoE Latency:** 6.6 G-Ops / 333 G-Ops/s = 19.8ms.
    - **Result:** **Only the MoE model meets the strict 20ms latency budget.**
  options:
  - The MoE model adds 50% more parameters, so its latency will increase by 50% to 27ms, making it unviable.
  - Scaling the dense model to 6 G-MACs will double the latency to 36ms, but the MoE model will have a latency of ~19.8ms, making it the only viable option.
  - Since the Snapdragon NPU has 45 TOPS, both models are easily within budget. We should choose the simple scaled model.
  - Both approaches increase MACs, so both will fail the latency budget. It's impossible to improve accuracy without increasing latency.
  correct_index: 1
