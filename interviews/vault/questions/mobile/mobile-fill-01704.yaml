title: On-Device Fairness Evaluation for Image Classification on Apple A17 Pro
scenario: You are tasked with deploying an on-device image classification model for content moderation
  on an iPhone 15 Pro, powered by the Apple A17 Pro chip (35 TOPS Neural Engine, ~5W power envelope, 8
  GB unified memory). This model processes user-generated images locally before upload. A critical requirement
  is to ensure *demographic parity* with respect to a protected attribute like 'skin tone' (e.g., Fitzpatrick
  Scale types I-III vs. IV-VI) for the model's classification outcome (e.g., 'flagged' vs. 'not flagged').
  Describe how you would formulate the metric for demographic parity in this context. Given the A17 Pro's
  computational constraints and a target inference rate of 20 images/second, outline a practical, on-device
  evaluation strategy to continuously monitor and report demographic parity without negatively impacting
  user experience or battery life. What are the key resource considerations (TOPS, power, memory) for
  this evaluation pipeline?
question: "What are the key resource considerations (TOPS, power, memory) for this evaluation pipeline?"
details:
  realistic_solution: '1. **Metric Formulation**: Define demographic parity as the absolute difference
    in positive classification rates across the protected groups: `|P(Y=1 | A=group1) - P(Y=1 | A=group2)|`.
    The goal is to minimize this difference to approach zero. 2. **Evaluation Strategy**: Implement a
    privacy-preserving, selective sampling mechanism for a small fraction of inferences (e.g., 0.1%).
    Use an auxiliary, highly optimized on-device model (or a lightweight rule-based system) to infer the
    protected attribute (skin tone) on the sampled images locally, ensuring user privacy. This proxy model
    must be thoroughly validated offline for its own fairness. Aggregate sampled data points over a defined
    period (e.g., hourly or daily) and compute demographic parity metrics in batches during periods of
    low device activity or when charging. Securely transmit anonymized, aggregated fairness metrics (not
    raw data) to a backend for centralized monitoring. 3. **Resource Management**: Leverage the A17 Pro''s
    Neural Engine for both the main model and the proxy attribute inference to maximize efficiency. Carefully
    manage memory allocations for buffers and logging to stay within the 8 GB unified memory. Implement
    power-aware computation, potentially pausing evaluation during high-intensity user tasks or when battery
    is low, judiciously utilizing the ~5W power envelope.'
  common_mistake: Ignoring the on-device constraints (power, memory, Neural Engine TOPS) when designing
    the evaluation. Assuming a simple global accuracy metric is sufficient for fairness. Not considering
    how to collect or label demographic data on-device without privacy violations. Using off-device metrics
    that don't reflect real-world on-device performance. Neglecting the statistical significance of subgroup
    evaluation with potentially limited on-device data.
  napkin_math: If the main model processes 20 images/second and we sample 0.1%, then 0.02 images/second
    are selected for evaluation. If an on-device proxy model for skin tone inference takes 100 ms (0.1
    TOPS-second) on the Neural Engine, the average TOPS consumption for the proxy model would be 0.02
    * 0.1 = 0.002 TOPS, which is negligible compared to the A17 Pro's 35 TOPS capacity. Each sampled inference
    might generate ~1KB of metadata. Aggregated hourly (3600 seconds * 0.02 samples/sec = 72 samples/hour),
    this is 72 KB/hour, a tiny memory footprint compared to 8 GB unified memory. The primary power constraint
    (~5W) means the evaluation overhead (sampling, proxy inference, aggregation) must be extremely efficient
    to avoid impacting the main model's performance and battery life, ideally consuming only a few milliwatts
    on average.
