title: Architecting On-Device Guardrails for Generative Text
scenario: You are designing an on-device text generation feature with strict content moderation requirements
  running on a Samsung Exynos 2400 NPU. The system must run a primary 3B parameter generative model and
  a secondary safety classifier concurrently to prevent toxic output generation. Given the platform's
  34.7 TOPS dual-core NPU and shared 12 GB LPDDR5X memory (shared with CPU/GPU/ISP), architect a system
  that guarantees safety without degrading the user experience. How do you design the execution pipeline,
  memory allocation, and fallback mechanisms for the guardrail model?
details:
  realistic_solution: A robust architecture pipelines the generation and safety classification. The primary
    model streams tokens, and the safety model (e.g., a lightweight 100M parameter classifier) evaluates
    chunks of text asynchronously on the second NPU core. If the shared memory pressure from the ISP/GPU
    spikes (leaving limited RAM), the system dynamically quantizes the safety model or falls back to rule-based
    heuristics to maintain the safety SLA.
  common_mistake: Candidates often design sequential pipelines (generate then classify), leading to unacceptable
    latency. They also frequently ignore the shared nature of the 12 GB RAM, assuming all memory is available
    for the NPU, and fail to implement stream-based moderation.
  napkin_math: The 3B primary model at INT4 requires ~1.5 GB memory, while the 100M safety classifier
    at INT8 requires ~100 MB, totaling 1.6 GB. The Exynos 2400 provides 34.7 TOPS; the 3B model needs
    ~6 TOPS for 10 tokens/sec, and the safety model needs ~0.01 TOPS per 50-token chunk. Even if the OS/ISP/GPU
    consume 9 GB of the 12 GB shared LPDDR5X memory during background tasks, the 1.6 GB ML footprint comfortably
    fits the remaining 3 GB budget, proving the concurrent dual-model architecture is viable.
