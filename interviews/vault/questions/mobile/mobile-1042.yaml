title: 'Mobile TCO Fluency: Quick Battery Cost Estimation for Mobile ML'
scenario: A Snapdragon 8 Gen 3 (45 TOPS, 16GB, 4W for LLM inference) executes these mobile ML workloads daily: (1) 50 queries/day at 100 tokens/query, 20 tok/s, (2) 100 real-time speech recognition at 1W for 30sec each, (3) 10 SD image generations at 8W for 30sec each.
question: What annual energy cost and battery-cycle impact do the Snapdragon 8 Gen 3 mobile ML workloads create?
details:
  realistic_solution: '(1) LLM: 100 tokens at 20 tok/s = 5s/query. Energy: 4W*5s=20J=0.00556Wh/query. Annual: 50*365*0.00556=101.4Wh. (2) ASR: 1W*30s=30J=0.00833Wh/session. Annual: 100*365*0.00833=304Wh. (3) SD: 8W*30s=240J=0.0667Wh/image. Annual: 10*365*0.0667=243.4Wh. Total energy cost: $0.065/yr — negligible. Battery: phone has 5000mAh*3.7V=18.5Wh. Annual total: 648.8Wh. Battery cycles: 648.8/18.5=35 extra full cycles. Battery life drops 20% after 500 cycles → 35/500=7% of battery life used by ML.'
  common_mistake: |
    **The Pitfall:** Forgetting to convert from Wh to kWh before applying electricity rates.
    **The Rationale:** Candidates perform calculations in Wh and directly apply $/kWh rates, inflating costs astronomically.
    **The Consequence:** Overestimating electricity costs by a factor of 1000 and missing the true bottleneck (battery degradation cycles).
  napkin_math: |
    - **LLM Energy:** 100 tok @ 20 tok/s = 5s/query. 4W × 5s = 20 J = 0.00556 Wh/query.
    - **LLM Annual:** 50/day × 365 × 0.00556 Wh = 101.4 Wh.
    - **ASR Energy:** 1W × 30s = 30 J = 0.00833 Wh/session.
    - **ASR Annual:** 100/day × 365 × 0.00833 Wh = 304.0 Wh.
    - **SD Energy:** 8W × 30s = 240 J = 0.0667 Wh/image.
    - **SD Annual:** 10/day × 365 × 0.0667 Wh = 243.4 Wh.
    - **Total Annual Energy:** 101.4 + 304.0 + 243.4 = **648.8 Wh/yr**.
    - **Annual Cost:** 0.6488 kWh × $0.10/kWh = **~$0.065/yr** (Negligible).
    - **Battery Impact:** 5000 mAh @ 3.7V = 18.5 Wh.
    - **Extra Cycles/Yr:** 648.8 Wh / 18.5 Wh = **35 extra cycles/yr** (Minimal impact).
