title: The Double JPEG Decode Tax
scenario: Your mobile app allows users to select a photo from their gallery to run through an image classifier.
  The ML model takes 10ms. However, from the moment the user taps the image to the moment the result appears,
  it takes over 150ms. You are using standard Android/iOS image picker APIs. Where did the other 140ms
  go, and how do you bypass it?
question: "Where did the other 140ms go, and how do you bypass it?"
details:
  realistic_solution: 'Redundant decompression: the image picker loads the full 12MP JPEG to a 36 MB bitmap
    (~100ms CPU), then you resize to 224x224. Fix: decode directly to target resolution via BitmapFactory.Options.inSampleSize
    (Android) or CGImageSourceCreateThumbnailAtIndex (iOS). Cost: ~5ms and 150 KB vs 100ms and 36 MB.
    Total tap-to-result: ~15ms (10x improvement from 150ms). Disk I/O is only ~5ms on modern NVMe storage
    — the decode, not the read, dominates.'
  common_mistake: '"The disk I/O is slow." Reading a few megabytes from modern NVMe mobile storage takes
    ~5ms, not 140ms.'
  napkin_math: Decompressing 12MP JPEG to RGB = 36 MB memory allocation + ~100ms CPU time. Decompressing
    straight to a 224x224 thumbnail = 150 KB memory allocation + ~5ms CPU time. You save 95ms and 35 MB
    of RAM per image.
