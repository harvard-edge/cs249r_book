title: The Double JPEG Decode Tax
scenario: Your mobile app allows users to select a photo from their gallery to run through an image classifier. The ML model takes 10ms. However, from the moment the user taps the image to the moment the result appears, it takes over 150ms. You are using standard Android/iOS image picker APIs.
question: Where does the 140ms overhead in image picking come from, and how can it be bypassed?
details:
  realistic_solution: 'Redundant decompression: the image picker loads the full 12MP JPEG to a 36 MB bitmap (~100ms CPU), then you resize to 224x224. Fix: decode directly to target resolution via BitmapFactory.Options.inSampleSize (Android) or CGImageSourceCreateThumbnailAtIndex (iOS). Cost: ~5ms and 150 KB vs 100ms and 36 MB. Total tap-to-result: ~15ms (10x improvement from 150ms). Disk I/O is only ~5ms on modern NVMe storage — the decode, not the read, dominates.'
  common_mistake: |
    **The Pitfall:** Assuming that reading the image from disk (I/O) is the bottleneck.
    **The Rationale:** Developers often equate slow file operations with slow storage speeds, ignoring the massive compute cost of decoding high-resolution JPEGs.
    **The Consequence:** Attempting to optimize storage access patterns instead of using thumbnail-specific APIs.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Source Image: 12MP JPEG.
       - Target Image: 224x224 thumbnail.
       - Decode Rates: Full CPU decode = 100ms. Disk I/O = 5ms.
    2. **Calculations:**
       - Full Decode Memory: 12,000,000 pixels × 3 bytes = 36 MB. Total time = 100ms + 5ms = 105ms.
       - Target Decode Memory: 224 × 224 × 3 bytes = 150 KB. Total time = 5ms.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound.** Decompressing straight to a 224x224 thumbnail bypasses the massive CPU decode, saving **95ms** and **35.85 MB** of RAM per image.
