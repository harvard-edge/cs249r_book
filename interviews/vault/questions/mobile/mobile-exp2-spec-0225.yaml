title: Designing On-Device Defenses for Exynos 2400 NPU
scenario: You are tasked with designing an on-device defense mechanism against adversarial perturbation
  attacks for a facial authentication model deployed on the Samsung Exynos 2400 NPU. The system must process
  camera frames in real-time while a secondary model detects adversarial noise before the main authentication
  model runs. Given the 34.7 TOPS dual-core NPU and the shared 12 GB LPDDR5X memory architecture between
  the NPU, CPU, GPU, and ISP, specify how you would design the pipeline to meet a 30 FPS requirement without
  starving the ISP of memory bandwidth.
details:
  realistic_solution: A realistic approach specifies a cascading pipeline where a lightweight preprocessing
    step disrupts high-frequency adversarial noise. A small, optimized detector model runs on one NPU
    core to flag suspicious frames, while the main authentication model runs concurrently on the second
    NPU core. This design minimizes main memory access by keeping intermediate tensors in NPU SRAM, preventing
    bandwidth starvation for the shared LPDDR5X.
  common_mistake: Candidates often propose large adversarial purification models that exceed the compute
    budget or cause severe memory bandwidth contention. They frequently treat the NPU in isolation, forgetting
    that the 12 GB LPDDR5X memory is shared with the ISP streaming the camera frames, leading to pipeline
    stalls.
  napkin_math: At 30 FPS, the system has 33.3 ms per frame. The Exynos 2400 NPU provides 34.7 TOPS, giving
    ~1.15 Tera-Operations per frame (34.7 TOPS / 30 FPS). If the auth model takes 500 GOPS and the detector
    takes 150 GOPS, the 650 GOPS total is well within the 1.15 TOPS limit. For memory, if the ISP writes
    a 6 MB frame and models need 50 MB/frame bandwidth, the NPU requires 1.5 GB/s (50 MB * 30 FPS). This
    leaves ample headroom on the shared 12 GB LPDDR5X.
