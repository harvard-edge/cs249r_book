title: Mixed-Precision Bandwidth Contention on Exynos 2400
scenario: An image processing model is deployed on the Samsung Exynos 2400 NPU (34.7 TOPS) using a mixed-precision
  recipe (50% FP16, 50% FP32) to preserve color accuracy. The NPU shares its 12 GB LPDDR5X memory with
  the CPU, GPU, and ISP. When the camera is active, the ISP consumes significant memory bandwidth, and
  the mixed-precision model experiences a severe latency increase compared to running in isolation. Analyze
  why this specific mixed-precision strategy exacerbates the latency under concurrent ISP load compared
  to a pure FP16 model, and calculate the extra memory bandwidth required for reading a 10 million parameter
  layer.
details:
  realistic_solution: The latency spike is driven by memory bandwidth contention, not compute limitations.
    Since the Exynos 2400 shares LPDDR5X memory among the NPU and ISP, the ISP's heavy bandwidth usage
    during camera operation starves the NPU. The mixed-precision model increases parameter memory traffic
    significantly compared to pure FP16, hitting the bandwidth ceiling. The correct approach is to keep
    memory-bound layers in lower precision (FP16/INT8) and only use FP32 for compute-bound layers with
    small footprints.
  common_mistake: Candidates often assume the 34.7 TOPS NPU lacks the compute power to handle FP32 instructions
    efficiently. They focus on the compute bottleneck instead of recognizing the shared memory architecture
    and identifying memory bandwidth contention with the ISP.
  napkin_math: '1. Pure FP16 memory footprint for 10M parameters: 10,000,000 * 2 bytes = 20 MB. 2. Mixed-precision
    (50% FP16, 50% FP32) footprint: (5,000,000 * 2 bytes) + (5,000,000 * 4 bytes) = 10 MB + 20 MB = 30
    MB. 3. Difference per inference: 30 MB - 20 MB = 10 MB. 4. At 30 FPS, the mixed-precision model demands
    an extra 300 MB/s of memory bandwidth. 5. This extra 300 MB/s directly competes with the ISP over
    the shared 12 GB LPDDR5X memory pool, leading to memory starvation and latency spikes.'
