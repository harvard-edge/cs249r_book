title: Tensor G3 LLM Straggler Latency Analysis
scenario: Your production health dashboard for an on-device LLM feature shows intermittent latency stragglers. The system normally processes tokens at ~35ms, leveraging the on-device TPU. However, telemetry alerts indicate that during certain user flows, token generation latency spikes to over 120ms per token, despite the memory not being fully utilized by capacity.
question: 'How would you analyze why this performance degradation occurs and explain the system behavior using the provided hardware specifications?'
details:
  realistic_solution: 'The root cause of the stragglers is memory bandwidth contention, not capacity exhaustion. Autoregressive generation requires streaming the entire model''s weights from LPDDR5X for every token. When concurrent hardware blocks (like ISP or GPU) access the memory controller, available bandwidth plummets, stalling the TPU.'
  common_mistake: |
    **The Pitfall:** Assuming latency spikes are due to OOM (Out Of Memory) or thermal throttling.
    **The Rationale:** Candidates conflate memory *capacity* with memory *bandwidth*, or assume that if RAM is available, speed should remain constant.
    **The Consequence:** Filing bugs against the model size when the actual issue is concurrent system scheduling starving the memory bus.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model is 1.8 GB. Normal bandwidth is 51.2 GB/s.
    - Under contention, only 15 GB/s remains for the TPU.

    **Calculations:**
    - Baseline: 1.8 GB / 51.2 GB/s = ~35 ms/token.
    - Contention: 1.8 GB / 15 GB/s = 120 ms/token.

    **Conclusion & Interpretation:**
    - **Result: 120 ms per token (Memory-Bandwidth-Bound)**. Latency under contention confirms memory bandwidth starvation.
