title: A17 Pro Unified Memory Contention Analysis
scenario: You are analyzing a watchdog timer reset in a mobile health monitoring app deployed on the Apple A17 Pro. The system features a 16-core Neural Engine capable of 35 TOPS at ~5W, sharing 8 GB of unified memory with the CPU and GPU. Under normal conditions, the vital-sign analysis model executes in 15ms. However, when the device simultaneously renders complex AR graphics, the model execution time spikes to 30ms, causing the 25ms safety watchdog timer to trigger a system reset.
question: Why does this non-deterministic execution occur and what is the constrained memory bandwidth under contention?
details:
  realistic_solution: The root cause is memory bandwidth contention inherent to the shared unified memory architecture. Even with 35 TOPS of compute, the Neural Engine cannot process data it hasn't received. When the GPU demands massive bandwidth for AR rendering, the memory controller arbitrates the shared bus, severely reducing the bandwidth available to the Neural Engine. Under severe contention (e.g., 49.4 GB/s to GPU), transfer time rises to 25ms, yielding total latency of 25ms + 5ms = 30ms — triggering the 25ms watchdog.
  common_mistake: |
    **The Pitfall:** Assuming the Neural Engine lacks sufficient compute or is thermally throttling.
    **The Rationale:** Candidates focus on the NPU's TOPS rating and ignore the shared memory architecture.
    **The Consequence:** Misdiagnosing non-deterministic execution and failing to resolve the memory bandwidth contention.
  napkin_math: |
    1. Peak unified memory bandwidth is ~50 GB/s. Model requires 15 MB per pass.
    2. Normal conditions: 15 MB / 0.010 s = 1.5 GB/s required.
    3. Contention: GPU consumes 49.4 GB/s, leaving 0.6 GB/s for the NPU.
    4. New transfer time: 15 MB / 0.6 GB/s = 25ms.
    5. **Total latency = 25ms transfer + 5ms compute = 30ms (Watchdog triggers at 25ms).**
