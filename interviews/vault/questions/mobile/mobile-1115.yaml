title: A17 Pro Unified Memory Contention Analysis
scenario: You are analyzing a watchdog timer reset in a mobile health monitoring app. Under normal conditions, the vital-sign analysis model executes in 15ms. When the device simultaneously renders complex AR graphics, execution time spikes to 30ms, causing the 25ms safety watchdog timer to trigger.
question: Why does this non-deterministic execution occur and what is the constrained memory bandwidth under contention?
details:
  realistic_solution: |
    The root cause is shared unified memory bandwidth contention. While the NPU has ample TOPS, it cannot compute data it cannot load. When AR graphics demand high GPU bandwidth, the memory controller arbitrates the bus, starving the NPU. Fix by utilizing explicit memory tiering, caching activations in local SRAM, or synchronizing NPU dispatch with GPU v-sync gaps.
  common_mistake: |
    **The Pitfall:** Assuming the Neural Engine lacks sufficient compute or is thermally throttling.
    **The Rationale:** Candidates focus on the NPU's TOPS rating and ignore the shared memory architecture limits.
    **The Consequence:** Misdiagnosing non-deterministic execution and failing to resolve the memory bandwidth contention.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Peak Unified Bandwidth: 50 GB/s
       - Model Load: 15 MB
       - Normal Transfer: 10 ms (1.5 GB/s required)
       - Watchdog limit: 25 ms
    2. **Calculations:**
       - Under AR Contention: GPU uses 49.4 GB/s, leaving 0.6 GB/s for NPU.
       - New Transfer Time: 15 MB / 0.6 GB/s = 25 ms.
       - Total Latency = 25 ms (Transfer) + 5 ms (Compute) = 30 ms.
    3. **Conclusion & Interpretation:** **Total latency reaches 30ms, breaching the 25ms watchdog. Result: Memory Bandwidth-Bound.**
