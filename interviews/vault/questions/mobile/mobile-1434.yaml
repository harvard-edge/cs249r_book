title: On-Device Data Validation Pipeline on Snapdragon 8 Gen 3
scenario: You are designing an on-device data collection and validation pipeline for a continuous learning system running on a Qualcomm Hexagon NPU. The system captures user interaction data to fine-tune a personalized model locally. Before storing the data in the local training buffer, you must run quality gates to detect anomalies and ensure the data contract is met.
question: How would you split on-device data validation between CPU and Snapdragon 8 Gen 3 NPU considering memory and compute constraints?
details:
  realistic_solution: 'The optimal design uses a heterogeneous approach: lightweight, branching schema validation and data contract enforcement run on the CPU, while heavier anomaly detection (e.g., running a small embedding model to check for out-of-distribution image or text inputs) is offloaded to the Hexagon NPU. By quantizing the anomaly detection model to INT8, we leverage the NPU''s efficiency. This minimizes power consumption while respecting the shared LPDDR5X memory bandwidth constraints.'
  common_mistake: |
    **The Pitfall:** Running all validation logic on the CPU or pushing complex branching logic to the NPU.
    **The Rationale:** Candidates either ignore the power efficiency of the NPU for vector-heavy tasks (like embeddings) or fail to realize the NPU is terrible at branching schema validation.
    **The Consequence:** This leads to high CPU power consumption or extremely inefficient NPU utilization.
  napkin_math: |
    - **Model Footprint:** A 5M parameter INT8 embedding model uses 5MB, easily fitting in the shared memory pool.
    - **Compute Requirement:** Validating a stream at 30 items/sec * 10 mega-ops/item = 300 mega-ops/sec (0.0003 TOPS).
    - **NPU Capacity:** The Hexagon NPU provides 45 TOPS INT8.
    - **Conclusion:** Anomaly detection consumes **less than 0.001% of NPU compute**, leaving ample headroom for primary workloads while preserving battery.
