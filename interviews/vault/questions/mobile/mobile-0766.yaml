title: The Split Inference Latency Trap
scenario: 'A team proposes split inference: run the first 20 layers of a 32-layer model on-device (5 ms per layer) and the remaining 12 layers on a cloud server (0.5 ms per layer). The network round-trip is 50 ms.'
question: With 20 on-device layers, 12 cloud layers, and 50ms RTT, does split inference beat running all 32 layers locally?
details:
  realistic_solution: |
    Split inference is an anti-pattern here. The total end-to-end latency of the split system (156 ms) is barely faster than the fully local system (160 ms). More importantly, the split architecture introduces critical failure points: cellular network jitter, dropped connections, and cloud ingress/egress costs. Split inference is only architecturally sound when: (1) the model's memory footprint grossly exceeds device RAM (OOM mitigation), (2) the cloud compute phase is massive relative to network RTT, or (3) the cloud securely accesses proprietary non-distributable data (e.g., RAG vector databases).
  common_mistake: |
    **The Pitfall:** Assuming split inference is always faster because the cloud is fast.
    **The Rationale:** Candidates look at the raw compute speed of the cloud (0.5ms/layer) and assume it wins.
    **The Consequence:** They forget the 50 ms network RTT often dominates, making split inference slower than running everything locally.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Device compute: 5 ms/layer. Cloud compute: 0.5 ms/layer.
       - Layers: 32 total (20 local, 12 cloud).
       - Network Round-Trip Time (RTT): 50 ms.
    2. **Calculations:**
       - Split Compute Path = (20 layers * 5 ms) + 50 ms RTT + (12 layers * 0.5 ms) = 100 + 50 + 6 = 156 ms.
       - Fully Local Path = 32 layers * 5 ms = 160 ms.
       - Latency Delta = 160 ms - 156 ms = 4 ms advantage for Split.
       - Breakeven RTT = 160 ms - (100 ms + 6 ms) = 54 ms.
    3. **Conclusion & Interpretation:**
       - **Result: Network Latency-Bound.** With a trivial 4ms advantage, split inference is practically slower than local execution the moment network jitter occurs. Any RTT exceeding 54ms makes the cloud offload mathematically inferior.
