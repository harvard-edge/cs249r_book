title: NPU Cold Start Latency with Memory-Mapped Weights
scenario: You deploy a 2GB INT8 model using mmap to map weights into memory, which returns instantly. However, during the first inference, you observe a latency spike of 500 milliseconds, whereas subsequent inferences run in 20 milliseconds.
question: "Assuming a 4KB page size and 4GB/s storage read speed, why does the NPU experience this first-run latency spike and what is the overhead?"
details:
  realistic_solution: |
    The mmap system call creates virtual memory mappings but does not physically load data immediately. The first read triggers major page faults, causing synchronous demand paging that blocks the NPU.
  common_mistake: |
    **The Pitfall:** Assuming mmap physically loads weights into RAM immediately.
    **The Rationale:** Candidates misunderstand virtual memory, incorrectly attributing the latency spike to NPU hardware warmup or cache initialization.
    **The Consequence:** This leads to incorrect profiling and optimization strategies that fail to address the actual I/O bottleneck.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model Size: 2GB (2,048MB).
       - Storage Read Speed: 4GB/s.
       - Page Size: 4KB.
    2. **Calculations:**
       - Read Time: 2GB / 4GB/s = 0.5 seconds (500ms).
       - Page Faults: (2048 MB * 1024 KB/MB) / 4 KB = 524,288 faults.
    3. **Conclusion & Interpretation:**
       - **Result: Demand Paging Stall.** mmap defers physical loading; the first read triggers 524k synchronous major page faults, stalling the NPU for 500ms.
