title: NPU Cold Start Latency with Memory-Mapped Weights
scenario: You deploy a 2GB INT8 model to a mobile device powered by a Qualcomm Hexagon
  NPU (Snapdragon 8 Gen 3) using a shared 16GB LPDDR5X memory pool. To avoid a long
  initialization delay, you use mmap to map the weights into memory, which returns
  in under 1 millisecond. However, during the very first inference execution on the
  45 TOPS INT8 NPU, you observe a massive latency spike of approximately 500 milliseconds,
  whereas subsequent inferences run in just 20 milliseconds. Assuming the OS uses
  a standard 4KB page size and the underlying storage reads at 4GB/s, explain why
  the NPU experiences this first-run latency spike and calculate the overhead.
question: Why does mmaping a 2GB INT8 model avoid init delay but cause a 500ms first-inference
  spike on Hexagon NPU?
details:
  realistic_solution: The mmap system call only creates virtual memory mappings and
    does not copy data into physical RAM immediately. When the Hexagon NPU attempts
    to read the INT8 weights for the first time, it triggers major page faults. The
    OS must pause execution, fetch the missing 4KB pages from the device's storage
    (UFS), and load them into the shared LPDDR5X memory. The latency spike is the
    unavoidable cost of synchronous demand paging blocking the NPU's execution pipeline.
  common_mistake: Candidates often assume that calling mmap physically loads the weights
    into the shared LPDDR5X memory immediately. They might incorrectly attribute the
    latency spike to NPU hardware warmup, cache initialization, or shader compilation,
    rather than OS-level demand paging.
  napkin_math: Model size = 2GB = 2,048MB. Storage read speed = 4GB/s. Time to read
    2GB from storage = 2GB / 4GB/s = 0.5 seconds (500ms). Page size = 4KB. Number
    of page faults = (2 * 1024 * 1024 KB) / 4 KB = 524,288 sequential page faults.
    The 500ms latency spike is dominated by the physical I/O time required to page
    the 2GB model into the shared LPDDR5X RAM during the first forward pass.
