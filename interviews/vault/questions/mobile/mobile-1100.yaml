title: NPU Cold Start Latency with Memory-Mapped Weights
scenario: You deploy a 2GB INT8 model to a mobile device using a shared 16GB memory pool. To avoid a long initialization delay, you use mmap to map the weights into memory, which returns in under 1 millisecond. However, during the very first inference execution, you observe a massive latency spike of approximately 500 milliseconds, whereas subsequent inferences run in just 20 milliseconds.
question: Assuming a standard 4KB page size and 4GB/s storage read speed, why does the NPU experience this first-run latency spike and what is the overhead?
details:
  realistic_solution: The mmap system call creates virtual memory mappings but does not copy data physically immediately. The first read triggers major page faults, causing synchronous demand paging that blocks the NPU.
  common_mistake: |
    **The Pitfall:** Assuming mmap physically loads weights into RAM immediately.
    **The Rationale:** Candidates misunderstand virtual memory, incorrectly attributing the latency spike to NPU hardware warmup or cache initialization.
    **The Consequence:** This leads to incorrect profiling and optimization strategies that fail to address the actual I/O bottleneck.
  napkin_math: |
    1. Identify model size and storage speed: 2GB = 2,048MB, 4GB/s read speed.
    2. Calculate time to read from storage: 2GB / 4GB/s = **0.5 seconds (500ms)**.
    3. Identify page size: 4KB.
    4. Calculate number of page faults: (2 * 1024 * 1024 KB) / 4 KB = **524,288 sequential page faults**.
