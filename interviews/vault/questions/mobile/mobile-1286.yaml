title: Thermal Degradation on Shared Memory NPU
scenario: You are deploying a real-time object tracking model for a camera application on the Samsung Exynos 2400 NPU. The NPU provides 34.7 TOPS across its dual-core architecture and shares 12 GB of LPDDR5X memory with the CPU, GPU, and ISP. During continuous 4K video recording, thermal management triggers a 50% frequency reduction on the NPU. You must evaluate two graceful degradation strategies: Option A dynamically loads a lightweight INT8 fallback model to maintain 60fps, while Option B keeps the resident model but sheds quality-of-service by dropping the tracking framerate to 30fps.
question: Under a 50% Exynos 2400 NPU throttle, should tracking load an INT8 fallback model or drop from 60 FPS to 30 FPS?
details:
  realistic_solution: Option B is the superior fail-operational strategy. By shedding the framerate, the system instantly reduces compute requirements without incurring any memory I/O penalty. This avoids competing with the ISP and GPU for the shared LPDDR5X bandwidth during a thermally constrained state, providing a seamless degradation in user experience without risking dropped camera frames.
  common_mistake: |
    **The Pitfall:** Choosing Option A (fallback model) to maintain the high framerate based purely on the compute reduction.
    **The Rationale:** Candidates fail to account for the memory subsystem and the shared nature of LPDDR5X.
    **The Consequence:** Loading new model weights during heavy ISP/GPU usage causes severe memory contention and latency spikes, dropping camera frames.
  napkin_math: |
    - **Throttled Capacity:** 50% of 34.7 TOPS = **17.35 TOPS**.
    - **Primary Model Baseline:** 0.5 TOPS/frame × 60 FPS = **30 TOPS** (Fails under throttling).
    - **Option A (Fallback):** 0.2 TOPS/frame × 60 FPS = 12 TOPS. However, swapping a 50MB model into RAM while ISP is recording 4K causes pipeline stalls.
    - **Option B (Halve Framerate):** 0.5 TOPS/frame × 30 FPS = **15 TOPS**.
    - **Conclusion:** 15 TOPS < 17.35 TOPS. Zero memory swap cost, instantly resolving the constraint.
