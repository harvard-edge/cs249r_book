title: Thermal Degradation on Shared Memory NPU
scenario: You are deploying a real-time object tracking model. During continuous 4K video recording, thermal management triggers a 50% frequency reduction on the NPU. Option A dynamically loads a lightweight INT8 fallback model. Option B drops the tracking framerate to 30fps.
question: Under a 50% NPU throttle, should tracking load an INT8 fallback model or drop from 60 FPS to 30 FPS?
details:
  realistic_solution: Option B is the mathematically superior fail-operational strategy. By shedding the framerate via Quality-of-Service dropping, the system instantaneously slashes compute requirements exactly in half without incurring zero memory I/O penalty. This prevents competing with the camera ISP for shared LPDDR5X bandwidth during a thermally catastrophic state, preserving a continuous user experience.
  common_mistake: |
    **The Pitfall:** Defaulting to Option A (the fallback model) purely to maintain the high target framerate, assuming a smaller model strictly solves the problem.
    **The Rationale:** Candidates fail to account for the physical memory subsystem and the deeply shared nature of SoC DRAM.
    **The Consequence:** Dynamically loading new weights into RAM while the ISP is violently hammering the bus to encode 4K video forces massive contention, pipeline stalls, and severely dropped camera frames.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - NPU Baseline Capacity: 34.7 TOPS. Throttled (50%): 17.35 TOPS.
       - Primary Model: 0.5 TOPS/frame.
       - Tracking Framerates: 60 FPS (Baseline) vs 30 FPS (Degraded).
    2. **Calculations:**
       - Primary @ 60 FPS: 0.5 TOPS * 60 = 30 TOPS (Exceeds throttled 17.35 TOPS).
       - Primary @ 30 FPS: 0.5 TOPS * 30 = 15 TOPS (Fits throttled capacity).
       - Option A (Fallback Load): Reading 50MB from flash while ISP streams 4K video stalls the LPDDR5X bus.
    3. **Conclusion & Interpretation:**
       - **Result: Memory Bandwidth and Thermal-Bound.** Shedding the framerate instantly resolves the compute constraint without incurring the catastrophic shared-memory I/O penalty of loading a new model under extreme thermal pressure.
