title: Distillation vs Pruning for Snapdragon Hexagon NPU
scenario: Your team is deploying a large vision transformer for real-time video segmentation on the Qualcomm Hexagon NPU (Snapdragon 8 Gen 3). The baseline model requires 150 Giga-Operations (GOPS) per frame and takes up 4 GB of the shared 12-16 GB LPDDR5X memory. You need to fit this into a strict 10 ms latency budget per frame. You are presented with two optimization alternatives. Proposal A suggests aggressive unstructured pruning to reach 70% sparsity. Proposal B advocates for Knowledge Distillation to train a dense student model with 3x fewer parameters and operations.
question: "Should Snapdragon 8 Gen 3 use 70% unstructured pruning or a 3x smaller dense student for 10ms video segmentation?"
details:
  realistic_solution: Proposal B (Knowledge Distillation) is the correct choice. The
    Snapdragon 8 Gen 3 NPU, capable of 45 TOPS INT8, achieves peak performance on
    dense tensor workloads. A smaller, dense student model trained via distillation
    will map perfectly to the hardware's systolic arrays and efficiently utilize the
    shared LPDDR5X memory bandwidth. Unstructured pruning (Proposal A) will cause
    memory stalls and fail to leverage the NPU's massive parallel compute capabilities.
  common_mistake: |
    **The Pitfall:** Advocating for unstructured pruning to reduce FLOPs.
    **The Rationale:** Candidates assume that mathematically reducing the theoretical FLOP count will automatically speed up inference.
    **The Consequence:** Irregular memory access patterns cripple hardware utilization on the NPU's dense matrix multiplication units, failing to meet latency targets.
  napkin_math: |
    - Baseline Requirement: 150 GOPS per frame.
    - Latency Target: 10 ms (0.01 s).
    - Required Throughput: 150 GOPS / 0.01 s = 15 TOPS.
    - Proposal A (70% Sparsity): Effective NPU utilization drops <10% (from 45 TOPS peak), yielding < 4.5 TOPS effective throughput. Fails requirement.
    - Proposal B (Distillation): Reduces operations by 3x to 50 GOPS.
    - Dense INT8 Utilization: >40% (18 TOPS effective).
    - Distillation Latency: 50 GOPS / 18,000 GOPS = **~2.7 ms**.
    - **Conclusion:** Distillation comfortably beats the 10 ms deadline while reducing memory footprint.
