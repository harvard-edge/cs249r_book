title: Distillation vs Pruning for Snapdragon Hexagon NPU
scenario: Your team is deploying a large vision transformer for real-time video segmentation on an NPU. The baseline model requires 150 GOPS per frame. You need to fit this into a strict 10 ms latency budget. You are presented with Proposal A (unstructured pruning to 70% sparsity) and Proposal B (Knowledge Distillation to train a dense student model with 3x fewer parameters).
question: Should you use 70% unstructured pruning or a 3x smaller dense student for 10ms video segmentation?
details:
  realistic_solution: 'Proposal B (Knowledge Distillation) is the correct choice. The NPU achieves peak performance on dense tensor workloads. A smaller, dense student model trained via distillation will map perfectly to the hardware''s systolic arrays and efficiently utilize memory bandwidth. Unstructured pruning (Proposal A) will cause memory stalls and fail to leverage the NPU''s massive parallel compute capabilities.'
  common_mistake: |
    **The Pitfall:** Advocating for unstructured pruning to reduce FLOPs.
    **The Rationale:** Candidates assume that mathematically reducing the theoretical FLOP count will automatically speed up inference.
    **The Consequence:** Irregular memory access patterns cripple hardware utilization on the NPU's dense matrix multiplication units, failing to meet latency targets.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Baseline Compute: 150 GOPS per frame.
       - Latency Budget: 10 ms (0.01 s).
       - NPU Peak INT8: 45 TOPS.
    2. **Calculations:**
       - Required Throughput: 150 GOPS / 0.01 s = 15 TOPS.
       - Proposal A (70% Sparsity): Hardware utilization drops <10%, yielding < 4.5 TOPS effective (Fails 15 TOPS requirement).
       - Proposal B (Distillation): Operations reduced 3x to 50 GOPS. Dense utilization >40% (18 TOPS effective).
       - Latency B: 50 GOPS / 18,000 GOPS = ~2.7 ms.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound.** Dense distillation effectively uses systolic arrays to hit ~2.7 ms, while unstructured pruning stalls memory pipelines.
