title: 'The NPU Architecture Dilemma: CNN vs. ViT'
scenario: 'You''re designing a new camera feature for a flagship smartphone (e.g., using an Apple A17
  Pro or Snapdragon 8 Gen 3 SoC). You must choose an architecture for real-time scene understanding. You
  have two prototypes with similar accuracy: a MobileNetV3-based CNN and a small Vision Transformer (ViT).
  The ViT has 20% fewer parameters but requires 50% more total FLOPs. Both models are fully delegated
  to the phone''s NPU. Which model is likely to be faster and why?'
question: "Why might MobileNetV3 beat a smaller-parameter ViT on a mobile NPU despite the ViT having fewer weights?"
details:
  realistic_solution: The MobileNetV3-based CNN is likely to be faster. Modern mobile NPUs (like the Apple
    A17 Pro with 35 TOPS and ~51.2 GB/s BW) have a very high ridge point (~683 Ops/Byte), meaning they
    need high arithmetic intensity to be fully utilized. The Vision Transformer's core self-attention
    mechanism requires materializing large attention matrices (Q @ K.T), which moves a massive amount
    of activation data. This makes the ViT severely memory-bandwidth bound on an NPU. While depthwise
    convolutions in CNNs also have low arithmetic intensity, mobile architectures and compilers have spent
    years optimizing and fusing CNN layers to minimize DRAM access. The ViT's reliance on large intermediate
    memory movement chokes the NPU's limited bandwidth, making the CNN faster despite the ViT having fewer
    parameters.
  common_mistake: Assuming that fewer parameters or 'newer' architectures always equate to faster inference.
    Engineers often fail to profile the arithmetic intensity and memory bandwidth constraints of self-attention
    on edge NPUs, where massive compute capabilities (TOPS) cannot be utilized because the system is starved
    waiting for data from DRAM.
  napkin_math: Compare AI to the A17 Pro Ridge Point (~683 Ops/Byte). ViT self-attention (especially for
    typical mobile image patch sequences) requires massive memory movement (Q, K, V activations and attention
    maps) with relatively low arithmetic intensity compared to the NPU's ridge. Despite having 20% fewer
    parameters, the ViT is heavily memory-bandwidth bound and underutilizes the 35 TOPS NPU. Conversely,
    optimized CNNs like MobileNetV3 utilize operations like depthwise convolutions that, while also having
    low AI, have been heavily optimized with fusion on modern NPUs. More critically, the CNN avoids the
    large NxN activation memory bottleneck of attention. Thus, the CNN achieves lower latency.
  options:
  - The MobileNetV3, because the ViT's self-attention operations are severely memory-bandwidth bound on
    mobile NPUs.
  - The ViT, because its self-attention mechanism consists of large matrix multiplies that can saturate
    the NPU's compute units.
  - The ViT, because it has fewer parameters, which means a smaller memory footprint and faster memory
    access.
  - They will have identical performance, as the NPU is designed to abstract away architectural differences.
