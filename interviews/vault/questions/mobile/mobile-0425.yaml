title: 'The NPU Architecture Dilemma: CNN vs. ViT'
scenario: You're designing a new camera feature for a flagship smartphone (e.g., using an Apple A17 Pro or Snapdragon 8 Gen 3 SoC). You must choose an architecture for real-time scene understanding. You have two prototypes with similar accuracy: a MobileNetV3-based CNN and a small Vision Transformer (ViT). The ViT has 20% fewer parameters but requires 50% more total FLOPs. Both models are fully delegated to the phone's NPU.
question: Why might MobileNetV3 beat a smaller-parameter ViT on a mobile NPU despite the ViT having fewer weights?
details:
  realistic_solution: The MobileNetV3-based CNN is likely to be faster. Modern mobile NPUs (like the Apple A17 Pro with 35 TOPS and ~51.2 GB/s BW) have a very high ridge point (~683 Ops/Byte), meaning they need high arithmetic intensity to be fully utilized. The Vision Transformer's core self-attention mechanism requires materializing large attention matrices (Q @ K.T), which moves a massive amount of activation data. This makes the ViT severely memory-bandwidth bound on an NPU. While depthwise convolutions in CNNs also have low arithmetic intensity, mobile architectures and compilers have spent years optimizing and fusing CNN layers to minimize DRAM access. The ViT's reliance on large intermediate memory movement chokes the NPU's limited bandwidth, making the CNN faster despite the ViT having fewer parameters.
  common_mistake: |
    **The Pitfall:** Assuming that fewer parameters or 'newer' architectures always equate to faster inference.
    **The Rationale:** Engineers fail to profile the arithmetic intensity and memory bandwidth constraints of self-attention on edge NPUs.
    **The Consequence:** Selecting a model that is severely memory-bandwidth bound, resulting in high latency and underutilization of the NPU's compute capabilities.
  napkin_math: |
    - A17 Pro Ridge Point = 35 TOPS / 51.2 GB/s ≈ 683 Ops/Byte.
    - ViT self-attention (Q @ K.T) requires loading NxD matrices to compute NxN attention maps. For small N, arithmetic intensity is low (e.g., < 100 Ops/Byte).
    - MobileNetV3 depthwise convolutions also have low AI, but have been heavily optimized with layer fusion on NPUs, minimizing DRAM trips.
    - **Because the ViT's AI is well below the 683 Ops/Byte ridge point, it is heavily memory-bound, making the fused CNN faster in practice.**
  options:
  - The MobileNetV3, because the ViT's self-attention operations are severely memory-bandwidth bound on mobile NPUs.
  - The ViT, because its self-attention mechanism consists of large matrix multiplies that can saturate the NPU's compute units.
  - The ViT, because it has fewer parameters, which means a smaller memory footprint and faster memory access.
  - They will have identical performance, as the NPU is designed to abstract away architectural differences.
