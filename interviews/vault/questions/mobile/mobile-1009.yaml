title: 'Network Bandwidth Bottlenecks: Fluency — Mobile Bandwidth Math in 60 Seconds'
scenario: A 3B INT4 LLM (1.5GB) runs on Snapdragon 8 Gen 3 (77 GB/s LPDDR5X).
question: What is the decode-bound TPOT and what's the memory bandwidth utilization during a single-user chat session?
details:
  realistic_solution: 'TPOT: read all 1.5GB weights once per decode step. Time: 1.5GB / 77GB/s = 19.5ms/token. Memory BW utilization during decode: 1.5GB/0.0195s = 76.9GB/s out of 77GB/s = 99.9% utilization during active decode. Between tokens: 0% utilization. Average utilization: depends on query rate. At 1 query per minute with 50 tokens: 50×19.5ms/60s = 1.6% average BW utilization.'
  common_mistake: |
    **The Pitfall:** Stating memory bandwidth utilization is 100% without considering the duty cycle.
    **The Rationale:** Candidates correctly identify that token decoding is bottlenecked by peak bandwidth, but fail to average this over the idle periods between user queries.
    **The Consequence:** They incorrectly assert that the LLM monopolizes the system memory bus, claiming other concurrent apps will be starved of memory bandwidth.
  napkin_math: |
    1. **TPOT:** 1.5GB / 77 GB/s = 19.5ms per token.
    2. **Peak Utilization:** During the 19.5ms decode step, memory bandwidth utilization is 77 GB/s (effectively 100%).
    3. **Duty Cycle:** A 50-token response takes 50 × 19.5ms = 975ms. If the user makes 1 query per minute, the active time is ~1 second out of 60 seconds.
    4. **Average Utilization:** 1 sec / 60 sec = 1.6% average duty cycle.
    **Result:** TPOT is **19.5ms**, and while peak utilization is ~100% during decode, the average bandwidth utilization is only **~1.6%**, leaving ample bandwidth for the rest of the system.
