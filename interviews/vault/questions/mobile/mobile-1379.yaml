title: On-Device Real-Time Translation Architecture for Tensor G3
scenario: You are designing a low-latency, on-device real-time translation system powered by the Google Tensor G3. The product requirements demand a translation latency of under 100ms per utterance while running continuously. The Tensor G3 provides a 7.5 TOPS TPU and 12 GB LPDDR5X memory shared with the OS.
question: How would you architect a model and execution strategy to guarantee continuous translation under 100ms per utterance?
details:
  realistic_solution: The optimal architecture is a highly asymmetric encoder-decoder system or a tailored decoder-only model like Gemini Nano with speculative decoding. For translation, a deep encoder processes the full context in parallel, maximizing the 7.5 TOPS TPU utilization. The decoder must be extremely shallow (e.g., 1 or 2 layers) and heavily quantized (e.g., INT4) to minimize memory bandwidth during the autoregressive generation phase, ensuring the 100ms SLA is met.
  common_mistake: |
    **The Pitfall:** Defaulting to a standard symmetric encoder-decoder Transformer without considering autoregressive memory bandwidth.
    **The Rationale:** Candidates focus on compute (TOPS) and ignore the shared LPDDR5X bandwidth constraints during token generation.
    **The Consequence:** The model processes prompts quickly but generates text far too slowly to meet real-time SLAs.
  napkin_math: |
    1. Symmetric 1B (INT4) = 0.5 GB. Generating 10 tokens requires moving 5 GB (10 * 0.5GB).
    2. At 50 GB/s bandwidth, 5 GB takes 100ms (entire budget used on weights).
    3. Asymmetric Design: 100M decoder (50 MB). 10 tokens = 0.5 GB movement = 10ms.
    4. **Conclusion:** Asymmetric design leaves 90ms for the encoder and easily meets the 100ms SLA.
