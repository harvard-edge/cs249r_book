title: On-Device Real-Time Translation Architecture for Tensor G3
scenario: You are designing a low-latency, on-device real-time translation system. The product requirements demand a translation latency of under 100ms per utterance while running continuously.
question: How would you architect a model and execution strategy to guarantee continuous translation under 100ms per utterance?
details:
  realistic_solution: |
    The optimal architecture is a highly asymmetric encoder-decoder system or a tailored decoder-only model with speculative decoding. For translation, a deep encoder processes the full context in parallel, maximizing NPU utilization. The decoder must be extremely shallow (e.g., 1 or 2 layers) and heavily quantized (e.g., INT4) to minimize memory bandwidth bottlenecks during the autoregressive generation phase, ensuring the 100ms SLA is met.
  common_mistake: |
    **The Pitfall:** Defaulting to a standard symmetric encoder-decoder Transformer without considering autoregressive memory bandwidth.
    **The Rationale:** Candidates focus on compute (TOPS) and ignore the shared memory bandwidth constraints during token generation.
    **The Consequence:** The model processes prompts quickly but generates text far too slowly to meet real-time SLAs.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Symmetric 1B INT4: 0.5 GB weights
       - Target: 100 ms SLA for 10 tokens
       - Bandwidth: 50 GB/s
    2. **Calculations:**
       - Symmetric Decode (10 tokens): 10 * 0.5 GB = 5 GB transferred. Time: 5 GB / 50 GB/s = 100 ms.
       - Asymmetric Design (100M decoder = 50 MB weights): 10 * 0.05 GB = 0.5 GB transferred. Time: 0.5 GB / 50 GB/s = 10 ms.
    3. **Conclusion & Interpretation:** **Asymmetric design uses 10ms for decoding, leaving 90ms for encoding to meet the SLA. Result: Memory Bandwidth-Bound.**
