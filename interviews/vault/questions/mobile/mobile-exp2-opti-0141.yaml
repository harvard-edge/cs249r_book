title: Distillation Projection Layer Bottlenecks
scenario: We deployed a student vision model, distilled from a heavy teacher using feature-level distillation,
  onto the Samsung Exynos 2400 NPU. To align the student's intermediate representations with the teacher's,
  the student architecture includes 10 additional 1x1 projection convolutions. While this improved accuracy,
  profiling shows the dual-core NPU (capable of 34.7 TOPS) is severely stalling, yielding only 20 FPS
  instead of the target 60 FPS. The NPU shares 12 GB LPDDR5X memory with the CPU, GPU, and ISP, resulting
  in a severe memory bandwidth bottleneck. Diagnose the root cause of this NPU underutilization and quantify
  the latency improvement if we replace feature distillation with pure logit matching, allowing us to
  remove these projection layers.
question: "Why are distillation projection layers a bottleneck on Exynos 2400 and what student design avoids them?"
details:
  realistic_solution: The optimal solution is to redesign the student model without the 1x1 projection
    layers and train it using only soft-target logit matching at the output layer. Since the Samsung Exynos
    2400 shares LPDDR5X memory across the system, memory bandwidth is heavily contested by the ISP and
    GPU. The 1x1 projection layers are completely memory-bound; removing them drastically reduces memory
    traffic and allows the NPU to leverage its 34.7 TOPS on the core model operations without stalling
    on data fetches.
  common_mistake: Candidates often suggest pruning the 1x1 convolutions, quantizing the weights to INT8,
    or increasing batch size. They miss that 1x1 convolutions on high-resolution feature maps have extremely
    low arithmetic intensity and that structural changes (moving to logit matching) eliminate the bottleneck
    entirely.
  napkin_math: 'Assume each 1x1 projection layer processes a 128x128x256 feature map in FP16. Memory traffic
    per layer: Input (128*128*256*2 = 8.38 MB) + Output (8.38 MB) + Weights (~0.13 MB) ≈ 16.9 MB. For
    10 layers, that''s 169 MB per frame. At 60 FPS, these layers demand 10.14 GB/s of bandwidth from the
    shared LPDDR5X memory, causing severe contention. Compute per layer: 128*128*256*256*2 ≈ 2.14 MACs
    (GOPs). For 10 layers at 60 FPS, this requires only ~1.28 TOPS. The NPU has 34.7 TOPS, meaning compute
    utilization for these layers is a mere 3.7%. By switching to logit matching and dropping these layers,
    we save 10.14 GB/s of memory bandwidth, eliminating the stall and recovering the target 60 FPS.'
