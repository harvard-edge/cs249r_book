title: Continuous On-Device Sensor Fusion and Inference Pipeline
scenario: Design a real-time, always-on sensor fusion pipeline (IMU, audio, and low-res video) for contextual awareness on a flagship smartphone powered by a Qualcomm Hexagon NPU.
question: How would you build a continuous sensor fusion pipeline using low-power hubs, zero-copy buffers, and NPU bursts on a 45 TOPS INT8 NPU with 12-16 GB LPDDR5X memory?
details:
  realistic_solution: A robust architecture leverages the low-power Sensor Hub/DSP for continuous data ingestion and lightweight feature extraction (e.g., audio MFCCs, IMU downsampling) before writing aggressively quantized features to a zero-copy ring buffer in the shared LPDDR5X memory. The Hexagon NPU is then scheduled via Qualcomm's QNN SDK to execute the INT8 quantized model in controlled bursts, maximizing the 45 TOPS capability without waking the main CPU cores unnecessarily.
  common_mistake: |
    **The Pitfall:** Routing all raw sensor data directly to the NPU or relying heavily on the CPU for all continuous feature extraction.
    **The Rationale:** Candidates fail to account for the memory bandwidth bottleneck and power draw of continuous streaming to the shared LPDDR5X memory.
    **The Consequence:** Leads to thermal throttling and system-wide UI jank due to cache thrashing.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Transformer model requires 0.8 GOPS per inference at 30 fps.
       - Raw 1080p video: 1920x1080x3 bytes @ 30fps.
       - Downsampled video: 224x224x3 @ 10fps.
    2. **Calculations:**
       - Compute load: 0.8 GOPS * 30 = 24 GOPS (utilizing ~0.05% of the NPU's 45,000 GOPS INT8 capacity).
       - Streaming raw 1080p video bandwidth: ~186 MB/s.
       - Downsampled video bandwidth: ~1.5 MB/s.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound.** Drastically cutting bandwidth to ~1.5 MB/s significantly reduces active power consumption and cache thrashing across heterogeneous compute blocks.
