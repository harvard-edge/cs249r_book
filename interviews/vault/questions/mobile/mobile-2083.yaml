title: Wake-up Energy Penalty in NPU Micro-power Duty Cycling
scenario: A step-counter model on the Hexagon NPU idles at 1 mW but requires a 10
  mW wake-up burst for 5 ms every time it transitions to the active 20 mW state to
  process a batch of IMU data.
question: Calculate the energy consumed to process a 10 ms batch of data from sleep,
  through wake-up, to completion.
details:
  realistic_solution: The wake-up phase takes 5 ms at 10 mW. The active processing
    phase takes 10 ms at 20 mW. Since energy is power multiplied by time, the wake-up
    energy is 5 ms * 10 mW = 50 uJ. Processing energy is 10 ms * 20 mW = 200 uJ. The
    total energy consumed per batch is 250 uJ.
  common_mistake: Ignoring the wake-up transition energy entirely and calculating
    only the 200 uJ for active compute.
  napkin_math: 5ms * 10mW + 10ms * 20mW = 250 microJoules.
