title: Wake-up Energy Penalty in NPU Micro-power Duty Cycling
scenario: "A step-counter model on the Hexagon NPU idles at 1 mW but requires a 10 mW wake-up burst for 5 ms every time it transitions to the active 20 mW state to process a batch of IMU data."
question: "Calculate the energy consumed to process a 10 ms batch of data from sleep, through wake-up, to completion."
details:
  realistic_solution: "Calculate both the transient activation energy overhead and the steady-state active processing energy. Time multiplied by power directly yields energy per phase. The combined sum represents the true thermal cost per batch execution."
  common_mistake: |
    **The Pitfall:** Ignoring the transition energy required to wake the NPU from a sleep state.
    **The Rationale:** Candidates focus solely on active compute power and overlook the transient electrical costs of powering up hardware domains.
    **The Consequence:** The calculated energy budget is overly optimistic, resulting in significantly faster battery drain than modeled during micro-power duty cycling.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Wake-up state: 10 mW for 5 ms.
       - Active state: 20 mW for 10 ms.
    2. **Calculations:**
       - Wake-up energy = 10 mW * 5 ms = 50 µJ.
       - Active energy = 20 mW * 10 ms = 200 µJ.
       - Total Energy = 50 µJ + 200 µJ = 250 µJ.
    3. **Conclusion & Interpretation:**
       - **Result: Energy-Bound.** The transition state adds significant overhead, making the total energy consumed per batch **250 µJ**.
