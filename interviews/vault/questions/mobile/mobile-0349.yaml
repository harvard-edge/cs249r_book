title: The Battery Price of Privacy
scenario: Your automotive team is designing a driver-assistance feature that learns a driver's habits (e.g., preferred following distance) using federated learning on their smartphone, which connects to the car. The lead engineer is concerned about phone battery drain during a long drive and asks for the fundamental number to start their analysis.
question: What is the typical total power draw of a modern smartphone SoC when it's actively running an ML workload?
details:
  realistic_solution: A modern smartphone SoC, like an Apple A17 Pro or Snapdragon 8 Gen 3, will consume around 3 to 5 Watts when under an active ML load. This is the total power for the System-on-Chip, which is the key number for estimating battery drain for features like on-device training or continuous inference.
  common_mistake: |
    **The Pitfall:** Confusing the power draw of the entire SoC with just the NPU, or using edge/TinyML numbers.
    **The Rationale:** Candidates don't understand that a mobile SoC is a complex, integrated system with high baseline power costs.
    **The Consequence:** They incorrectly estimate battery life, resulting in calculations that are off by orders of magnitude.
  napkin_math: |
    - Total active SoC power for mobile = 3W to 5W.
    - Typical smartphone battery capacity = ~15 Watt-hours.
    - Time to drain = 15 Wh / 4W = 3.75 hours.
    - **A continuous 4W ML workload would completely drain the battery in under 4 hours.**
  options:
  - 10 - 50 milliwatts
  - 30 - 60 Watts
  - 3 - 5 Watts
  - 700 Watts
  correct_index: 2
