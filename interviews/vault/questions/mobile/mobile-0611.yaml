title: The Inference Timing Jitter
scenario: 'You''re building a real-time AR app on an iPhone 15 Pro (A17 Pro) that overlays virtual objects
  on camera frames. Your CoreML pose estimation model benchmarks at 6ms ± 0.2ms in isolation. In production,
  the same model shows 6ms median but with a long tail: P95 = 12ms, P99 = 22ms — a 3.7× spread. The P99
  spikes cause visible AR object jitter. Identify the sources of timing variance and design a system that
  guarantees sub-10ms P99.'
details:
  realistic_solution: 'Five jitter sources compound: DVFS frequency scaling (±2ms as the SoC adjusts clocks),
    LPDDR5 bandwidth contention from display/ISP (±5ms at P99), OS thread scheduling delays (±3ms), thermal
    stepping (±3ms), and CoreML graph repartitioning across ANE/GPU (±3ms). Worst case: 6+2+5+3+3+3 =
    22ms, matching observed P99. Mitigations: pin inference to a QoS .userInteractive thread (eliminates
    scheduling jitter), use .cpuAndNeuralEngine compute units to prevent GPU repartition, and implement
    a frame-skip policy at 8ms threshold with IMU-predicted poses for skipped frames. Target P99: 8ms
    effective.'
  common_mistake: '"The model is non-deterministic — run it multiple times and average." The model computation
    is deterministic. The variance comes from system-level interference that''s invisible in isolated
    benchmarks.'
  napkin_math: 'Jitter sources: DVFS (±2ms), bandwidth contention (±5ms at P99), OS scheduling (±3ms at
    P99), thermal steps (±3ms), graph repartition (±3ms). Worst-case stack: 6 + 2 + 5 + 3 + 3 + 3 = **22ms**
    (matches observed P99). With mitigations: QoS thread eliminates OS scheduling (±0ms). ANE pinning
    eliminates repartition (±0ms). Thermal switching caps DVFS impact (±1ms). Bandwidth contention remains
    (±5ms at P99). New P99: 6 + 1 + 5 = **12ms**. With frame skip at 8ms threshold: effective P99 = **8ms**
    (skip rate ~5%, imperceptible with IMU prediction).'
