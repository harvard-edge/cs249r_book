title: A17 Pro NPU Dataset Bias in Low-Light Portrait Segmentation
scenario: Your team deployed a real-time portrait video segmentation model. The model runs efficiently. However, user telemetry indicates a severe regression in edge accuracy specifically in low-light environments, despite the validation dataset showing 98% mIoU.
question: How would you diagnose the root cause of this discrepancy between validation metrics and real-world performance?
details:
  realistic_solution: The fundamental failure is dataset bias. The low-light validation split systematically fails to capture the unique, real-world sensor noise distribution produced by the mobile device's camera ISP. The fix dictates initiating hard-mining loops to capture uncompressed RAW sensor data strictly under low-light conditions from the target hardware, re-annotating, and rebuilding the noise augmentation pipeline to match the device's exact profile.
  common_mistake: |
    **The Pitfall:** Immediately blaming hardware-level quantization (INT8) artifacts or thermal throttling for the failure.
    **The Rationale:** Engineers trust high validation scores absolutely and assume any production delta must stem from compiler deployment or NPU hardware limitations.
    **The Consequence:** The team burns sprints re-architecting the model architecture, completely ignoring the fact that the underlying data pipeline is structurally flawed.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Video processing: 4K (3840x2160) at 30 FPS = ~250M pixels/sec.
       - Model compute: 50 MACs per pixel.
       - Hardware limit: 35 TOPS (35,000 GOPS).
    2. **Calculations:**
       - Compute required: 250M pixels * 50 MACs * 2 (OPS/MAC) = 25,000 MOPS = 25 GOPS.
       - Hardware utilization: 25 GOPS / 35,000 GOPS = 0.07% of available NPU capacity.
    3. **Conclusion & Interpretation:**
       - **Result: Data-Bound.** Since the model requires less than 0.1% of the NPU's maximum capacity, frames are absolutely not being dropped due to hardware constraints. The accuracy regression is entirely data-driven.
