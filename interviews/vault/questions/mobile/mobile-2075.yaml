title: CPU versus NPU Image Format Conversion Performance
scenario: A mobile app uses the Snapdragon 8 Gen 3 Hexagon NPU to process camera streams. The image sensor outputs YUV NV12 format, but the model expects RGB planar inputs.
question: Explain the performance impact of performing the YUV-to-RGB conversion and planar transposition on the CPU versus an image signal processor (ISP) or NPU.
details:
  realistic_solution: |
    Doing the conversion on the CPU incurs high latency and power drain due to non-vectorized per-pixel operations and poor memory access patterns during transposition. Offloading to the ISP or using hardware-accelerated NPU kernels ensures vectorized execution and keeps the data pipeline localized, preventing main memory bus saturation.
  common_mistake: |
    **The Pitfall:** Believing CPU processing is adequate for simple data formatting.
    **The Rationale:** Candidates assume format conversions are computationally trivial.
    **The Consequence:** They miss the severe thermal and memory bottleneck impacts caused by non-vectorized execution on mobile CPUs.
  napkin_math: |
    - Frame size: 12MB.
    - CPU conversion at 30fps: 12MB * 30 = **360MB/s** of redundant memory traffic across the main bus.
