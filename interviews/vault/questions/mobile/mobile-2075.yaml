title: CPU versus NPU Image Format Conversion Performance
scenario: A mobile app uses the NPU to process continuous camera streams. The image sensor outputs YUV NV12 format, but the model expects RGB planar inputs.
question: Explain the performance impact of performing the YUV-to-RGB conversion and planar transposition on the CPU versus an image signal processor (ISP) or NPU.
details:
  realistic_solution: |
    Executing format conversions on the general-purpose CPU is an architectural anti-pattern. The CPU fundamentally relies on non-vectorized, per-pixel scalar logic and suffers from severe cache misses during planar array transposition. This spikes thermal output and drastically drains the battery. By offloading to dedicated ISP hardware blocks or utilizing hardware-accelerated, vectorized NPU kernels (e.g., using `vDSP` or NEON instructions), the pipeline stays physically localized, preserving crucial memory bandwidth and guaranteeing real-time execution SLAs.
  common_mistake: |
    **The Pitfall:** Believing CPU processing is adequate for simple data formatting.
    **The Rationale:** Candidates assume format conversions are computationally trivial.
    **The Consequence:** They miss the severe thermal and memory bottleneck impacts caused by non-vectorized execution on mobile CPUs.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Input format: YUV NV12. Target: RGB Planar.
       - Frame size: 12 MB. Frame rate: 30 FPS.
    2. **Calculations:**
       - CPU read/write penalty: Must read 12 MB of YUV, write 12 MB of RGB.
       - Total bus traffic per frame = 24 MB.
       - Bandwidth wasted at 30 FPS = 24 MB * 30 FPS = 720 MB/s.
    3. **Conclusion & Interpretation:**
       - **Result: Memory Bus/Thermal-Bound.** Routing high-frequency pixel manipulation through the CPU wastes nearly a Gigabyte of bandwidth per second and spikes the thermal envelope, severely compromising overall SoC performance.
