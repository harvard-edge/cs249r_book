title: The Headlight False Positive
scenario: You are deploying an INT8 driver drowsiness detection model on a new automotive SoC. It performs perfectly in daylight. However, in night-driving simulations, the model generates a storm of false positives when bright headlights appear. Activation tensors from an early convolutional layer show typical values in `[-3.0, 4.5]`, but headlight flashes spike above `+100.0`.
question: What is the root cause of the catastrophic INT8 accuracy drop during night driving with bright headlights?
details:
  realistic_solution: The root cause is activation overflow (or saturation) due to an inadequate calibration dataset. The initial post-training quantization was calibrated using a dataset (likely daytime images) that did not capture the high dynamic range of night driving. The scaling factors for INT8 are therefore too narrow. When a bright headlight causes activation values to spike to +100.0, they far exceed the calibrated range. These values are then 'clipped' or 'saturated' to the maximum representable INT8 value (+127). The network sees the same value for a slightly bright pixel as it does for a blinding headlight, completely losing all feature information and leading to nonsensical outputs. The solution is to re-calibrate using a more representative dataset that includes these high-contrast night scenes, or to apply mixed-precision, keeping the early, more sensitive layers in FP16 to preserve their dynamic range while quantizing deeper layers to INT8.
  common_mistake: |
    **The Pitfall:** Blaming the model architecture for "domain shift" or suspecting an NPU hardware bug.
    **The Rationale:** Engineers see the sudden failure mode and assume the network hasn't generalized, missing the underlying numerical breakdown.
    **The Consequence:** Wasting months collecting more data to retrain the architecture instead of simply fixing the calibration dataset's dynamic range.
  napkin_math: |
    1. **Calibration Range:** Initial dataset yields a narrow INT8 dynamic range of `[-3.0, 4.5]`.
    2. **Outlier Spike:** A headlight causes activations $> +100.0$.
    3. **Clipping:** INT8 maximum representable bin maps to $+4.5$. The $>+100.0$ value is severely saturated.
    4. **Conclusion:** Massive information loss occurs because completely different visual features map to the exact same saturated **+127** INT8 token.
  options:
  - The SoC's NPU has a hardware bug when processing high-frequency image data at night.
  - The CNN architecture has overfit to daytime images and is not robust to the domain shift of night driving.
  - The INT8 calibration range is too narrow, causing activation value saturation when encountering high-contrast night scenes.
  - The camera's auto-exposure control is failing at night, delivering incorrectly normalized input frames to the model.
  correct_index: 2
