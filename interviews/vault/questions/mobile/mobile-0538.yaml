title: The Headlight False Positive
scenario: You are an ML systems engineer deploying a driver drowsiness detection model on a new automotive
  SoC. The model is fully quantized to INT8 using post-training static quantization to run on the NPU.
  During testing, it performs perfectly in daylight conditions. However, in night-driving simulations,
  the model generates a storm of false positives, flagging the driver as drowsy whenever bright headlights
  from oncoming traffic appear in the frame. You capture the activation tensors from a critical early-stage
  convolutional layer and find that while typical activation values are in the [-3.0, 4.5] range, the
  headlight flashes cause transient spikes that frequently exceed +100.0. Diagnose the most likely root
  cause of this catastrophic accuracy drop.
question: "How would you diagnose the most likely root cause of this catastrophic accuracy drop?"
details:
  realistic_solution: The root cause is activation overflow (or saturation) due to an inadequate calibration
    dataset. The initial post-training quantization was calibrated using a dataset (likely daytime images)
    that did not capture the high dynamic range of night driving. The scaling factors for INT8 are therefore
    too narrow. When a bright headlight causes activation values to spike to +100.0, they far exceed the
    calibrated range. These values are then 'clipped' or 'saturated' to the maximum representable INT8
    value (+127). The network sees the same value for a slightly bright pixel as it does for a blinding
    headlight, completely losing all feature information and leading to nonsensical outputs. The solution
    is to re-calibrate using a more representative dataset that includes these high-contrast night scenes,
    or to apply mixed-precision, keeping the early, more sensitive layers in FP16 to preserve their dynamic
    range while quantizing deeper layers to INT8.
  common_mistake: Engineers often blame the model architecture ('domain shift') or the hardware ('NPU
    bug'). While the problem *is* triggered by a domain shift (day vs. night), the *mechanism* of failure
    is not simply poor generalization—it's a catastrophic numerical breakdown. The sudden, extreme failure
    mode points to a data representation issue, not a gradual model drift. Blaming the hardware is a common
    last resort when the data pipeline is the more probable culprit.
  napkin_math: The initial calibration dataset suggested a dynamic range of `[-3.0, 4.5]`.
  options:
  - The SoC's NPU has a hardware bug when processing high-frequency image data at night.
  - The CNN architecture has overfit to daytime images and is not robust to the domain shift of night
    driving.
  - The INT8 calibration range is too narrow, causing activation value saturation when encountering high-contrast
    night scenes.
  - The camera's auto-exposure control is failing at night, delivering incorrectly normalized input frames
    to the model.
  correct_index: 2
