title: Implementing a Streaming Response Pipeline for Compound AI on A17 Pro
scenario: 'An A17 Pro (8GB, 35 TOPS) compound AI app runs a 3-stage pipeline: retrieval (80ms) → context
  preparation (20ms) → LLM generation (1B model, 20 tok/s, 100 tokens output = 5 seconds). Users perceive
  5.1 seconds of silence before any response appears. Implement a streaming output architecture so that
  users see the first token within 200ms of submitting a query.'
question: "How should the A17 Pro compound AI pipeline stream tokens so the first response appears within 200ms?"
details:
  realistic_solution: 'Architecture: (1) Immediate UI feedback: show typing indicator within 16ms of query
    submission (single UI frame). (2) Retrieval + context prep: 80+20=100ms. (3) LLM prefill: 512-token
    context at A17 Pro (35 TOPS, 1B model): 512*2*1B/(35e12*0.4)=73ms. (4) First token generation: starts
    streaming immediately after prefill. Total TTFT: 100+73=173ms < 200ms target. (5) Implement CoreML
    streaming with token callback: each generated token triggers a Swift async callback that appends to
    the UI text view. Streaming ensures users see progress at 20 tok/s = 50ms per token, making the 5-second
    total feel interactive.'
  common_mistake: Attempting to stream before the retrieval and context preparation stages complete, resulting
    in the LLM generating without proper context (hallucinating) for the first few tokens. The streaming
    must start only after retrieval completes, but the 100ms retrieval+prep can be hidden with a UI skeleton
    state.
  napkin_math: 'TTFT breakdown: retrieval(80ms) + context_prep(20ms) + prefill(73ms) = 173ms. Target:
    200ms. Margin: 27ms. Generation: 100 tokens / 20 tok/s = 5.0s total. With streaming: user sees token
    1 at 173ms, token 10 at 173+500ms=673ms, token 50 at 173+2500ms=2673ms. Perceived latency drops from
    5.1s blank wait to 173ms TTFT — 29x perceived improvement. CoreML streaming API: token generation
    runs in background thread, dispatch_async to main queue for UI update, each update < 1ms UI overhead
    at 20 tok/s.'
