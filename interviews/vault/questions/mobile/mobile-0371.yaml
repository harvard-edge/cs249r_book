title: 'The Mobile Roofline Ridge Point'
scenario: 'You''re profiling a new vision model on a mobile chip. Its Neural Engine is rated at 35 TOPS (INT8) and the SoC has a unified memory bandwidth of 51.2 GB/s. To understand the hardware''s limits, you need to calculate the ridge point of its roofline model.'
question: 'What does the roofline ridge point represent, and what is it in operations per byte?'
details:
  realistic_solution: 'The ridge point is the minimum Arithmetic Intensity (AI) a workload must have to be compute-bound rather than memory-bound. Any model or layer with an AI lower than this will be bottlenecked by memory; any with a higher AI will be bottlenecked by compute.'
  common_mistake: |
    **The Pitfall:** Confusing the ridge point units or the prefixes.
    **The Rationale:** Engineers often divide Tera-Ops by Giga-Bytes but forget the 1000x magnitude difference between them.
    **The Consequence:** The arithmetic intensity threshold is miscalculated by three orders of magnitude.
  napkin_math: |
    **Assumptions & Constraints:**
    - Peak Compute: 35 TOPS = 35,000 GOPS.
    - Peak Memory Bandwidth: 51.2 GB/s.

    **Calculations:**
    - Ridge Point Calculation: 35,000 / 51.2 = 683.59 Ops/Byte.

    **Conclusion & Interpretation:**
    - **Result: 684 Ops/Byte (Compute-Bound)**. ~684 Ops/Byte is the threshold for workloads to hit compute limits.
  options:
  - '~0.68 Ops/Byte. (Forgot 1000x difference)'
  - '7 TOPS/W. (Power efficiency, not ridge point)'
  - '~684 Ops/Byte. Workloads must exceed this Arithmetic Intensity to be compute-bound.'
  - '~68 Ops/Byte. (Misplaced decimal)'
  correct_index: 2
