title: The Sentry Mode Thermal Budget
scenario: You are designing a 'Sentry Mode' for an automotive dashcam using a mobile SoC. It must detect security events within 2 seconds for up to 72 hours while parked. The 12V battery budget is 20 Wh max, with a 0.2W solar cell. The dashboard can reach 80°C, and passive cooling dissipates 1W.
question: What hierarchical sensing and duty-cycling architecture meets the 72-hour Sentry Mode power, thermal, and responsiveness constraints?
details:
  realistic_solution: The correct architecture is a Hierarchical Sensing and Aggressive Duty Cycling system. You cannot afford to keep the main SoC powered on.
  common_mistake: |
    **The Pitfall:** Running an optimized model continuously on the main SoC at a low frame rate.
    **The Rationale:** Engineers assume a highly quantized "efficient" model uses little power, forgetting the massive baseline power draw required to keep a mobile SoC awake at all.
    **The Consequence:** The device drains the 20 Wh battery in hours and immediately hits thermal throttling in a hot car.
  napkin_math: |
    1. **Energy Budget:** 20 Wh (battery) + (0.2W * 8h * 3 days) = 24.8 Wh total.
    2. **Power Limit:** 24.8 Wh / 72 hours = 0.344 W average.
    3. **SoC Active Power:** Standard SoC uses 2-5W. It must sleep >90% of the time.
    4. **Hierarchical Approach:** A 1mW PIR sensor wakes a 50mW MCU. The MCU only wakes the 5W SoC if a threat is detected.
    5. **Conclusion:** This duty-cycling keeps the average power well under **0.344 W**, meeting the constraints.
