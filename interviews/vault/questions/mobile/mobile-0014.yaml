title: The ML Crash vs Silent Failure
scenario: Your app uses an on-device model for real-time object detection in AR. Users report 'the app
  doesn't detect anything sometimes.' Your crash reporting dashboard (Crashlytics) shows zero crashes.
  How do you detect and diagnose ML failures that don't crash the app?
details:
  realistic_solution: 'ML failures are invisible to standard crash reporting because the model always
    returns *something* — a valid tensor of zeros, random confidences, or stale results. You need **ML-specific
    health monitoring**:'
  common_mistake: '"If there are no crashes, the model is working fine." ML models fail silently — they
    return valid tensors filled with garbage instead of throwing exceptions.'
  napkin_math: 'Silent failure rate (typical): 0.1-1% of inferences. At 30 FPS for 10 minutes: 18,000
    inferences. Silent failures: 18-180 per session. None appear in crash logs. Health heartbeat: 10 events
    per 10-minute session × 200 bytes = 2 KB. Analytics cost: negligible. Detection latency: 60 seconds
    (heartbeat interval). With output validation: detected within 1 frame (33ms).'
  options:
  - The accuracy degradation is caused by numerical instability in the framework's matrix multiplication
    kernels, not by the model or data.
  - If there are no crashes, the model is working fine.. ML models fail silently — they return valid tensors
    filled with garbage instead of throwing exceptions.
  - 'ML failures are invisible to standard crash reporting because the model always returns *something*
    — a valid tensor of zeros, random confidences, or stale results. You need ML-specific health monitoring:'
  - The system should be redesigned to offload inference to the cloud, as edge hardware fundamentally
    cannot meet the latency and accuracy requirements.
  correct_index: 2
