title: The ML Crash vs Silent Failure
scenario: 'Your app uses an on-device model for real-time object detection in AR. Users report "the app doesn''t detect anything sometimes". Your crash reporting dashboard shows zero crashes.'
question: How do you detect and diagnose ML failures that don't crash the app?
details:
  realistic_solution: |
    ML failures are invisible to standard crash reporting because the model always returns a mathematically valid tensor, even if it's filled with garbage outputs (e.g., NaNs, zeros, random confidences). Implement ML-specific health monitoring telemetry: sample the distribution of outputs and periodically send lightweight health heartbeats to a logging service.
  common_mistake: |
    **The Pitfall:** Assuming no crashes means no failures.
    **The Rationale:** Traditional software engineers rely entirely on fatal exceptions for observability, forgetting that ML models fail silently.
    **The Consequence:** Severe model regressions manifest as terrible user experiences rather than triggerable alerts.
  napkin_math: |
    **Assumptions & Constraints:**
    - Inference rate: 30 FPS.
    - Session length: 10 minutes.
    - Silent failure rate: 0.1-1% of inferences.

    **Calculations:**
    - Total inferences per session: 30 * 60 * 10 = 18,000.
    - Expected silent failures: 18,000 * 0.001 = 18 to 180 per session.
    - Heartbeat telemetry cost: 10 events/session * 200 bytes = 2 KB.

    **Conclusion & Interpretation:**
    - **Result: 2 KB (Observability)**. Up to 180 failures occur silently per session; a 2 KB telemetry overhead efficiently captures them.
  options:
  - The accuracy degradation is caused by numerical instability in the framework's matrix multiplication kernels, not by the model or data.
  - If there are no crashes, the model is working fine.. ML models fail silently — they return valid tensors filled with garbage instead of throwing exceptions.
  - ML failures are invisible to standard crash reporting because the model always returns *something* — a valid tensor of zeros, random confidences, or stale results. You need ML-specific health monitoring.
  - The system should be redesigned to offload inference to the cloud, as edge hardware fundamentally cannot meet the latency and accuracy requirements.
  correct_index: 2
