title: 'Operator Scheduling: Layer Fusion on Samsung Exynos 2400 NPU'
scenario: You are tasked with deploying a convolutional neural network (CNN) model on a mobile device
  powered by the Samsung Exynos 2400 NPU, which features 34.7 TOPS of AI performance and 12 GB of LPDDR5X
  memory. To achieve optimal performance and minimize latency, describe the concept of 'layer fusion'
  in operator scheduling and explain its primary benefits within the context of this specific hardware.
  Provide an example of where layer fusion would be most impactful.
details:
  realistic_solution: A realistic solution involves intelligently identifying fusion opportunities based
    on the Exynos 2400 NPU's architecture. This typically means fusing element-wise operations (e.g.,
    ReLU, additions, multiplications) with compute-intensive layers like convolutions or fully connected
    layers. The goal is to eliminate intermediate tensor writes to the slower LPDDR5X memory by keeping
    data in faster on-chip scratchpad memory or registers within the NPU. For example, fusing a convolution
    with its subsequent activation function (e.g., Conv2D -> ReLU) allows the activation to operate directly
    on the convolution output before it's written back to DRAM, leveraging the NPU's internal data paths
    efficiently.
  common_mistake: A common mistake is to perform layer fusion generically without considering the specific
    architectural characteristics of the target NPU. For the Exynos 2400, simply fusing any two consecutive
    layers might not yield benefits if the NPU's execution units or internal memory hierarchy are not
    designed to efficiently handle the combined operation, or if it increases register pressure beyond
    optimal limits. This can inadvertently introduce stalls or increase memory accesses, leading to performance
    degradation instead of improvement.
  napkin_math: Consider a scenario where a Conv2D layer outputs a 100MB tensor, which is then fed into
    a ReLU layer. Without fusion, the Conv2D writes 100MB to LPDDR5X, and the ReLU reads 100MB from LPDDR5X.
    Assuming the LPDDR5X memory bandwidth is 50 GB/s, this results in approximately (100MB + 100MB) /
    50 GB/s = 200MB / (50 * 1024 MB/s) ≈ 0.0039 seconds or 3.9 milliseconds of memory access latency for
    just these two operations. With successful layer fusion, if the intermediate 100MB tensor never leaves
    the NPU's fast on-chip memory/registers, these 200MB of LPDDR5X accesses can be eliminated, directly
    reducing inference time by 3.9ms for each pass through these layers, significantly improving overall
    throughput on a mobile NPU like the Exynos 2400.
