title: The App Store Budget
scenario: Your product manager wants to A/B test a new, larger generative model (1.5 GB in memory) against
  the current, smaller model (500 MB in memory) in your photo editing app. Your app's core functionality,
  excluding any ML model, already consumes about 400 MB of RAM. The target device for the A/B test is
  a typical modern smartphone with 8 GB of RAM. Explain the primary memory constraint you face. Can you
  safely load the large model for the A/B test?
question: "Can an 8 GB phone safely A/B test a 1.5 GB generative model when the app already uses 400 MB?"
details:
  realistic_solution: No, you cannot safely load the 1.5 GB model. The primary constraint is the OS-enforced
    per-app memory budget. On a typical 8 GB device, an app is generally budgeted around 25% of the total
    RAM, which is 2 GB. After accounting for the app's 400 MB base memory usage, you only have about 1.6
    GB remaining for the model. While the 1.5 GB model *might* just fit, it leaves almost no headroom,
    making the app highly susceptible to being terminated by the OS (OOM kill) during memory pressure
    spikes. The A/B test would be unreliable.
  common_mistake: Engineers often assume their app can use a large fraction of the device's total RAM.
    They forget that the OS imposes a much stricter per-app memory budget to maintain system stability
    and a good user experience for multitasking. They also often neglect the app's own non-model memory
    footprint.
  napkin_math: 1.  **Calculate Per-App Budget:**
  options:
  - Yes, it's fine. The 1.5 GB model is much smaller than the device's 8 GB of RAM.
  - Yes, it should be okay. The app's total memory budget is 2 GB, and the 1.5 GB model fits within that.
  - No, it's too risky. The total required memory of 1.9 GB (1.5 GB model + 0.4 GB app) leaves almost
    no headroom within the ~2 GB per-app budget.
  - No, it's impossible. The 1.5 GB model alone is larger than the app's base memory of 400 MB.
  correct_index: 2
