title: Calibration Data Selection for INT8 NPU Execution
scenario: You must decide on a dataset curation strategy for the INT8 calibration phase for an Exynos 2400 NPU vision model. Option A randomly samples 5,000 images from the general distribution. Option B uses active learning to curate 500 hard edge cases (rare classes, extreme lighting).
question: Which calibration dataset strategy is better for maximizing overall INT8 accuracy on this dual-core NPU?
details:
  realistic_solution: Option A is superior for INT8 calibration. If the calibration dataset includes extreme outliers (Option B), the min/max ranges will expand drastically, compressing the representational space for normal activations. The optimal approach is using a representative distribution (Option A) and applying percentile-based clipping (e.g., 99.9th percentile) to discard extreme activation outliers, preserving precision for the average case.
  common_mistake: |
    **The Pitfall:** Curating hard edge cases for INT8 calibration.
    **The Rationale:** Candidates assume that curating hard edge cases is strictly better because it improves robustness, ignoring the statistical skew this creates for the quantization ranges.
    **The Consequence:** Severe degradation of accuracy for the vast majority of normal inferences.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Normal activation range: [-5.0, 5.0].
       - Edge case activation range: [-20.0, 20.0].
       - INT8 Quantization: 256 discrete bins.
    2. **Calculations:**
       - Normal step resolution: 10.0 / 255 = ~0.039.
       - Edge case step resolution: 40.0 / 255 = ~0.157.
       - Precision loss ratio: 0.157 / 0.039 = 4x.
    3. **Conclusion & Interpretation:**
       - **Result: Quantization-Noise-Bound**. Calibrating on edge cases (Option B) forces the quantizer to represent a 4x larger dynamic range, resulting in a 4x loss in precision for typical inputs.
