title: Differential Privacy Impact on On-Device Model Size
scenario: You're training a private on-device recommendation model on A17 Pro (35 TOPS, 8 GB). The model has 5M parameters. DP-SGD with per-sample gradients requires storing individual gradients for each sample in the batch.
question: With batch size 32, how much memory do per-sample gradients consume, and does this fit alongside the model and activations on the device?
details:
  realistic_solution: 'Memory breakdown: model weights (FP32): 5M × 4 = 20 MB. Per-sample gradients: 5M × 4 bytes × 32 samples = 640 MB. Optimizer state (Adam, FP32): 5M × 4 × 3 = 60 MB (weights, momentum, variance). Activations: ~100 MB (depends on architecture). Total: 20 + 640 + 60 + 100 = 820 MB. iOS app memory limit: ~2-4 GB depending on device state. 820 MB is feasible but tight — leaves minimal room for other app functions. Optimization: (1) Reduce batch size to 8: 5M × 4 × 8 = 160 MB. Total: 340 MB — comfortable. Privacy cost: smaller batch means more noise per step (noise scales as σ/batch_size), requiring more steps. (2) Use gradient accumulation with virtual batching: compute per-sample gradient, clip, accumulate into a running sum, discard. Never store all 32 gradients simultaneously. Memory: 5M × 4 × 2 (current gradient + accumulator) = 40 MB. Total: 220 MB. This is the standard approach for DP-SGD on memory-constrained devices.'
  common_mistake: |
    **The Pitfall:** Calculating the raw gradient size and assuming it easily fits within the 8 GB total physical RAM.
    **The Rationale:** Engineers forget to account for activations, optimizer states, and most importantly, the OS's strict per-app memory limits (typically 2-4 GB).
    **The Consequence:** The training process will immediately crash due to an OS-level Out-Of-Memory (OOM) eviction.
  napkin_math: |
    - **Naive Gradients:** 5M params * 4 bytes * 32 samples = 640 MB.
    - **Virtual Batching Gradients:** 5M params * 4 bytes * 2 (current + accumulator) = 40 MB.
    - **Other Memory:** Model (20 MB) + Optimizer (60 MB) + Activations (100 MB) = 180 MB.
    - **Total with Virtual Batching:** 180 MB + 40 MB = 220 MB.
    - **Conclusion:** Virtual batching provides a **16x memory savings** on gradients, easily fitting the 220 MB footprint into the ~2 GB app limit.
