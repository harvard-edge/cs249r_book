title: Differential Privacy Impact on On-Device Model Size
scenario: You're training a private on-device recommendation model on A17 Pro (35
  TOPS, 8 GB). The model has 5M parameters. DP-SGD with per-sample gradients requires
  storing individual gradients for each sample in the batch. With batch size 32, how
  much memory do per-sample gradients consume, and does this fit alongside the model
  and activations on the device?
question: With batch size 32, how much memory do per-sample gradients consume, and
  does this fit alongside the model and activations on the device?
details:
  realistic_solution: 'Memory breakdown: model weights (FP32): 5M × 4 = 20 MB. Per-sample
    gradients: 5M × 4 bytes × 32 samples = 640 MB. Optimizer state (Adam, FP32): 5M
    × 4 × 3 = 60 MB (weights, momentum, variance). Activations: ~100 MB (depends on
    architecture). Total: 20 + 640 + 60 + 100 = 820 MB. iOS app memory limit: ~2-4
    GB depending on device state. 820 MB is feasible but tight — leaves minimal room
    for other app functions. Optimization: (1) Reduce batch size to 8: 5M × 4 × 8
    = 160 MB. Total: 340 MB — comfortable. Privacy cost: smaller batch means more
    noise per step (noise scales as σ/batch_size), requiring more steps. (2) Use gradient
    accumulation with virtual batching: compute per-sample gradient, clip, accumulate
    into a running sum, discard. Never store all 32 gradients simultaneously. Memory:
    5M × 4 × 2 (current gradient + accumulator) = 40 MB. Total: 220 MB. This is the
    standard approach for DP-SGD on memory-constrained devices.'
  common_mistake: Calculating 5M × 4 bytes × 32 = 640 MB and concluding it fits easily
    in 8 GB. This ignores activations, optimizer states, and the operating system's
    memory reservation. On mobile, apps typically get 2-4 GB before being killed.
  napkin_math: 'Naive: 5M × 4B × 32 = 640 MB gradients. Virtual batching: 5M × 4B
    × 2 = 40 MB gradients. Savings: 16×. Total with virtual batching: 20 + 40 + 60
    + 100 = 220 MB. Fits in 2 GB app limit with 1.78 GB headroom. Training throughput:
    virtual batching processes samples sequentially (32 forward+backward passes vs
    1 batched). On A17 Pro Neural Engine: 32 × 5ms = 160ms per virtual batch vs 20ms
    for true batching. 8× slower but memory-feasible.'
