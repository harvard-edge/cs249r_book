title: On-Device Inference Cost on Snapdragon 8 Gen 3
scenario: You are tasked with deploying a 1 billion parameter generative model on a premium smartphone powered by a Qualcomm Snapdragon 8 Gen 3. The device features a heterogeneous CPU+GPU+NPU architecture, with the Hexagon NPU capable of 45 TOPS in INT8, and utilizes a shared 16 GB LPDDR5X memory pool.
question: "How would you estimate on-device inference cost on Snapdragon 8 Gen 3 from compute and memory limits to meet a 20 tokens/sec requirement?"
details:
  realistic_solution: 'Analyze the problem by distinguishing between compute limits and memory bandwidth limits. For a 1B parameter model quantized to INT8, loading the weights for each token generation step over the shared LPDDR5X bus is the true bottleneck, far exceeding the compute time.'
  common_mistake: |
    **The Pitfall:** Calculating latency strictly using NPU TOPS.
    **The Rationale:** Candidates blindly divide operations by 45 TOPS, failing to realize that autoregressive token generation is bottlenecked by the speed at which weights can stream from LPDDR5X.
    **The Consequence:** Promising theoretical frame rates that are physically impossible due to memory bandwidth starvation.
  napkin_math: |
    - **Memory Transfer Time:** 1B params in INT8 = 1 GB. Given ~64 GB/s LPDDR5X bandwidth, reading weights per token takes 1 GB / 64 GB/s = 15.6 ms.
    - **Compute Time:** 1B params = 2 GOPs. On a 45 TOPS NPU, compute takes 2 GOPs / 45,000 GOPs = 0.044 ms.
    - **Bottleneck Analysis:** 15.6 ms (memory) >> 0.044 ms (compute).
    - **Final Result:** Total time per token is ~15.6 ms, yielding **~64 tokens/sec**, easily meeting the 20 tokens/sec requirement.
