title: On-Device Responsible AI Guardrail Overhead on Snapdragon NPU
scenario: 'You are deploying a sensitive computer vision model (e.g., for emotion
  detection or demographic classification) on a mobile device powered by a Snapdragon
  8 Gen 3 Hexagon NPU. The NPU boasts 45 TOPS (Tera Operations Per Second) INT8 performance
  and access to 12-16 GB LPDDR5X memory. To ensure Responsible AI compliance, you
  must implement an on-device guardrail that continuously monitors for potential model
  bias. This guardrail operates by randomly sampling 0.5% of all inferences. For each
  sampled inference, a lightweight explainability module runs on the same NPU. This
  module requires approximately 50 Giga-INT8 operations and accesses/generates 500
  MB of intermediate data. The main model processes data at 60 frames per second (FPS).
  Calculate:

  1. The additional average INT8 TOPS required by this guardrail.

  2. The average additional memory bandwidth (in GB/s) specifically consumed by this
  guardrail''s data access/generation, assuming the 500 MB is read/written within
  100 ms for each sampled inference.'
question: 'How would you calculate : 1?'
details:
  realistic_solution: 'A robust solution involves: 1) Optimizing the guardrail (e.g.,
    lightweight explainability methods, quantization) for embedded deployment. 2)
    Implementing adaptive sampling rates based on device load or observed bias. 3)
    Potentially offloading more complex analysis to the cloud when network conditions
    and privacy allow. 4) Thoroughly profiling the overhead to ensure it doesn''t
    degrade primary model performance or user experience.'
  common_mistake: Neglecting the significant resource overhead (compute, memory, power)
    that responsible AI guardrails can introduce, especially on constrained edge devices.
    Candidates might also miscalculate averages versus peaks, or fail to account for
    the sampling rate.
  napkin_math: "1. **Additional average INT8 TOPS:**\n   - Main model inference rate:\
    \ 60 FPS\n   - Guardrail sampling rate: 0.5% = 0.005\n   - Sampled inferences\
    \ per second: 60 FPS * 0.005 = 0.3 samples/s\n   - INT8 operations per sampled\
    \ inference: 50 Giga-INT8 ops = 50 * 10^9 ops\n   - Average INT8 TOPS required:\
    \ (0.3 samples/s) * (50 * 10^9 ops/sample) = 15 * 10^9 ops/s = 15 TOPS (INT8)\n\
    \n2. **Average additional memory bandwidth:**\n   - Intermediate data per sampled\
    \ inference: 500 MB\n   - Processing time for data per sample: 100 ms = 0.1 s\n\
    \   - Peak bandwidth during a single sample (rate if executed instantly): 500\
    \ MB / 0.1 s = 5000 MB/s = 5 GB/s\n   - Average additional memory bandwidth over\
    \ time: (0.3 samples/s) * (500 MB/sample) = 150 MB/s = 0.15 GB/s"
