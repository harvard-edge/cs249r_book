title: On-Device Responsible AI Guardrail Overhead on Snapdragon NPU
scenario: You are deploying a computer vision model on a Snapdragon 8 Gen 3 Hexagon NPU. A Responsible AI guardrail randomly samples 0.5% of inferences (60 FPS base rate) to run an explainability module requiring 50 Giga-INT8 ops and 500 MB of intermediate data.
question: How would you calculate the additional INT8 TOPS and average memory bandwidth required by this guardrail?
details:
  realistic_solution: 'Calculate the expected value overhead based on the stochastic sampling rate to determine whether the guardrail fundamentally degrades the primary model''s SLA or battery life.'
  common_mistake: |
    **The Pitfall:** Over-allocating hardware by treating the burst requirement as a continuous load, or conversely, rounding the impact to zero.
    **The Rationale:** Failing to properly amortize stochastic operations across the temporal domain.
    **The Consequence:** Rejecting a safe guardrail due to presumed hardware starvation, or deploying one that secretly spikes battery drain because the average load wasn't analyzed.
  napkin_math: |
    **Assumptions & Constraints:**
    - Base inference rate: 60 FPS.
    - Explainability Sampling rate: 0.5%.
    - Module burst cost: 50 GOPs, 500 MB I/O.

    **Calculations:**
    - Sampled executions per second: 60 FPS * 0.005 = 0.3 executions/sec.
    - Average compute overhead: 0.3 * 50 GOPs = 15 GOPs/sec = 0.015 TOPS.
    - Average bandwidth overhead: 0.3 * 500 MB = 150 MB/sec = 0.15 GB/s.

    **Conclusion & Interpretation:**
    - **Result: 0.015 TOPS (Compute-Bound)**. The aggressive 0.5% sampling effectively amortizes the heavy module, adding merely 0.015 TOPS and 0.15 GB/s to the average steady-state system load.
