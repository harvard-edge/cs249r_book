title: On-Device Responsible AI Guardrail Overhead on Snapdragon NPU
scenario: You are deploying a computer vision model on a Snapdragon 8 Gen 3 Hexagon NPU (45 TOPS, 12 GB LPDDR5X). A Responsible AI guardrail randomly samples 0.5% of inferences (60 FPS base rate) to run an explainability module requiring 50 Giga-INT8 ops and 500 MB of intermediate data.
question: How would you calculate the additional INT8 TOPS and average memory bandwidth required by this guardrail?
details:
  realistic_solution: 'A robust solution involves calculating the exact average overhead based on the sampling rate to ensure it doesn''t degrade primary model performance.'
  common_mistake: |
    **The Pitfall:** Neglecting resource overhead or miscalculating averages vs. peaks.
    **The Rationale:** Assuming 0.5% sampling means the impact is mathematically zero without actually running the numbers.
    **The Consequence:** Deploying a guardrail that unexpectedly throttles the primary model or drains the battery due to bandwidth spikes.
  napkin_math: |
    - Sampled rate: 60 FPS * 0.005 = 0.3 samples/sec.
    - Compute overhead: 0.3 samples/sec * 50 GOPs = 15 GOPs/sec = 0.015 TOPS.
    - Bandwidth overhead: 0.3 samples/sec * 500 MB = 150 MB/sec = 0.15 GB/s.
    - **The guardrail adds a negligible 0.015 TOPS and 0.15 GB/s average overhead.**
