title: 'The Mobile NAS Showdown: CNN vs. Sparse Transformer'
scenario: You are optimizing a real-time video filter on a mobile SoC with a peak compute of 35 TOPS. The current 100 GOps ViT misses the 16ms frame budget. Your NAS system proposes Candidate A (dense CNN, 30 GOps) and Candidate B (MoE ViT, 47.5 GOps).
question: Which NAS candidate should be chosen for the NPU video filter, and why does hardware efficiency outweigh raw operation count?
details:
  realistic_solution: |
    Candidate A is the superior choice. Mobile NPUs are highly specialized hardware accelerators designed as rigid systolic arrays. They achieve peak performance and power efficiency strictly on dense, regular tensor operations found in CNNs (especially block-tiled depthwise convolutions). Candidate B's MoE architecture, while promising sparsity, introduces data-dependent control flow (the router) and fragmented memory access. This violently breaks the deep dataflow parallelism the NPU relies on, leading to pipeline stalls, cache misses, and dramatically lower sustained TOPS. The hardware-friendly structure of the dense CNN yields much better latency and power-per-watt.
  common_mistake: |
    **The Pitfall:** Assuming theoretical FLOP/MAC count strictly dictates hardware latency.
    **The Rationale:** Engineers trust the mathematical operation count without evaluating how the compute graph maps to the physical constraints of the NPU's systolic array.
    **The Consequence:** Deploying highly sparse models that induce severe routing overhead, stalling the NPU and resulting in significantly worse real-world latency despite having "fewer ops."
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Hardware Peak Compute: 35 TOPS (35,000 GOPS).
       - Candidate A (Dense CNN): 30 GOPS, highly parallelizable, ~78% hardware utilization.
       - Candidate B (MoE ViT): 47.5 GOPS, sparse routing/poor locality, ~30% hardware utilization.
    2. **Calculations:**
       - Effective TOPS (Candidate A): 35,000 GOPS * 0.78 = 27,300 GOPS.
       - Latency A: 30 GOPS / 27,300 GOPS/sec = 1.09 ms.
       - Effective TOPS (Candidate B): 35,000 GOPS * 0.30 = 10,500 GOPS.
       - Latency B: 47.5 GOPS / 10,500 GOPS/sec = 4.52 ms.
    3. **Conclusion & Interpretation:**
       **Result: 1.1ms vs 4.5ms (Utilization-Bound).** The dense CNN runs over 4x faster because architectural efficiency ($\eta_{arch}$) completely dominates operation count on edge NPUs.
  options:
  - Candidate B, because its total active operations (47.5 GOps) are significantly lower than the original 100 GOps ViT.
  - Candidate B, because Transformers are architecturally superior to CNNs and MoE makes them efficient enough for mobile deployment.
  - Candidate A, because its regular, dense structure achieves much higher architectural efficiency (eta_arch) on the mobile NPU, resulting in a latency of ~1.1ms vs ~4.5ms for the MoE model.
  - Candidate A, because its total GOps (30) are lower than the MoE ViT's (47.5), and lower GOps always means lower latency.
