title: 'The Mobile NAS Showdown: CNN vs. Sparse Transformer'
scenario: You are tasked with optimizing a real-time video filter on flagship phones using the Apple A17 Pro (35 TOPS). The current model, a 100 GOps ViT, misses the 16ms budget. Your NAS system proposed Candidate A (dense CNN, 30 GOps) and Candidate B (MoE ViT, 47.5 GOps).
question: "Which NAS candidate should be chosen for the A17 Pro video filter, and why does hardware efficiency outweigh raw operation count?"
details:
  realistic_solution: |
    Candidate A is the superior choice. Mobile NPUs like the Apple A17's Neural Engine are highly specialized hardware accelerators. They achieve their peak performance and power efficiency on dense, regular tensor operations found in CNNs, especially hardware-aware patterns like depthwise separable convolutions. Candidate B's MoE architecture, while reducing theoretical operations, introduces data-dependent control flow (the router) and sparse memory access. This breaks the deep dataflow parallelism the NPU is designed for, leading to pipeline stalls, cache misses, and dramatically lower sustained TOPS. The predictable, hardware-friendly structure of the CNN will yield much better latency and power-per-watt.
  common_mistake: |
    **The Pitfall:** Assuming theoretical FLOPs alone dictate latency.
    **The Rationale:** Engineers forget that on-device performance is dominated by architectural efficiency—how well the compute graph maps to fixed hardware paths.
    **The Consequence:** Choosing sparse models that introduce routing overhead and stall the NPU, resulting in worse real-world performance.
  napkin_math: |
    - **Candidate A (Dense CNN):** 30 GOps / (35 TOPS * ~0.78 efficiency) ≈ 1.1ms latency.
    - **Candidate B (MoE ViT):** 47.5 GOps / (35 TOPS * ~0.30 efficiency) ≈ 4.5ms latency.
    - **Result:** **The dense CNN maintains high utilization, making it over 4x faster despite sparse operation counts on paper.**
  options:
  - Candidate B, because its total active operations (47.5 GOps) are significantly lower than the original 100 GOps ViT.
  - Candidate B, because Transformers are architecturally superior to CNNs and MoE makes them efficient enough for mobile deployment.
  - Candidate A, because its regular, dense structure achieves much higher architectural efficiency (\eta_arch) on the mobile NPU, resulting in a latency of ~1.1ms vs ~4.5ms for the MoE model.
  - Candidate A, because its total GOps (30) are lower than the MoE ViT's (47.5), and lower GOps always means lower latency.
