title: On-Device Data Integrity and Schema Evolution for ML on Google Tensor G3
scenario: A new generation of a mobile health application leverages on-device machine
  learning for real-time physiological anomaly detection. The core ML model runs on
  a Google Tensor G3, utilizing its 7.5 TOPS on-device TPU and 12 GB LPDDR5X for low-latency
  inference on continuous sensor data streams (e.g., heart rate, accelerometer, gyroscope).
  As the lead ML systems engineer, you are tasked with designing and implementing
  a robust data quality and validation pipeline that operates primarily on the device.
  How would you ensure the integrity and reliability of the sensor data feeding into
  the ML model, addressing challenges like schema evolution of raw sensor outputs,
  enforcing data contracts between sensor capture and model input layers, establishing
  quality gates, and performing on-device anomaly detection on the *input* data itself
  before it impacts model performance?
question: How would you enforce evolving data contracts and on-device anomaly checks
  for Tensor G3 physiological sensor streams?
details:
  realistic_solution: Implement a lightweight, configurable schema validation engine
    directly on the Google Tensor G3, using a highly efficient binary serialization
    format like FlatBuffers or Protobufs to define and validate data contracts between
    the sensor abstraction layer and the ML inference module. This schema should be
    versioned to gracefully handle evolution. Integrate on-device quality gates, potentially
    using simple statistical checks or a lightweight anomaly detection model (e.g.,
    an autoencoder) that runs on the Tensor G3's TPU, to flag and filter out egregious
    data outliers or corrupt samples before they reach the primary ML model. Data
    lineage can be tracked by embedding minimal metadata (e.g., sensor ID, timestamp,
    schema version) within the data packets.
  common_mistake: A common mistake is to assume sensor data is inherently clean or
    to rely solely on server-side validation, leading to delayed error detection,
    wasted on-device computation on bad data, and potential silent degradation of
    the ML model's accuracy due to corrupted or malformed inputs. Neglecting a versioned
    schema and data contracts on-device often results in brittle pipelines that break
    with sensor firmware updates or new data types.
  napkin_math: 'Assume 5 critical sensors, each generating 200 samples/second, with
    each sample being 32 bytes (including metadata). Total data rate: 5 * 200 * 32
    Bytes/sec = 32 KB/sec. If schema validation and input anomaly detection add a
    5% computational overhead, and the main ML model consumes 100 GOPs, this translates
    to an additional 5 GOPs dedicated to input data quality. Given the Tensor G3''s
    7.5 TOPS, this overhead is utterly negligible. Memory for a 1-minute data buffer
    for validation would be ~1.9 MB (32 KB/sec * 60s). Conclusion: Both compute
    (5 GOPs vs 7.5 TOPS) and memory (~1.9 MB vs 12 GB) overheads are well within
    the device capabilities, making on-device validation highly manageable and recommended.'
