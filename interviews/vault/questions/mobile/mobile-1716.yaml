title: On-Device Data Integrity and Schema Evolution for ML on Google Tensor G3
scenario: A mobile health application leverages on-device ML for real-time physiological anomaly detection. The model runs on a Google Tensor G3.
question: How would you enforce evolving data contracts and on-device anomaly checks for Tensor G3 physiological sensor streams?
details:
  realistic_solution: Implement a lightweight, configurable schema validation engine directly on the Google Tensor G3, using a highly efficient binary serialization format like FlatBuffers or Protobufs to define and validate data contracts between the sensor abstraction layer and the ML inference module. This schema should be versioned to gracefully handle evolution. Integrate on-device quality gates, potentially using simple statistical checks or a lightweight anomaly detection model (e.g., an autoencoder) that runs on the Tensor G3's TPU, to flag and filter out egregious data outliers or corrupt samples before they reach the primary ML model. Data lineage can be tracked by embedding minimal metadata (e.g., sensor ID, timestamp, schema version) within the data packets.
  common_mistake: |
    **The Pitfall:** Assuming sensor data is inherently clean or relying solely on server-side validation.
    **The Rationale:** Candidates neglect on-device data contracts and fail to handle schema evolution.
    **The Consequence:** Delayed error detection, wasted on-device compute, and silent degradation of model accuracy due to malformed inputs.
  napkin_math: |
    **Assumptions & Constraints:**
    - Data rate: 5 sensors * 200 samples/sec * 32 bytes = 32 KB/sec
    - Main model compute: 100 GOPS
    - Validation overhead: 5% of main model compute
    - Tensor G3 TPU: 7.5 TOPS

    **Calculations:**
    - Validation compute = 0.05 * 100 GOPS = 5 GOPS
    - Memory buffer (1 min) = 32 KB/sec * 60s = 1,920 KB (~1.9 MB)

    **Conclusion & Interpretation:**
    - **Result: 5 GOPS (Negligible Overhead)**. Validation requires only 5 GOPS (0.06% of 7.5 TOPS) and 1.9 MB of RAM, making on-device anomaly detection highly efficient and strictly necessary.
