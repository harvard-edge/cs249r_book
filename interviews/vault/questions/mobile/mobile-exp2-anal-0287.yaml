title: A17 Pro OOM Analysis with KV Cache Scaling
scenario: You are deploying a 2B parameter transformer model for text summarization on the Apple A17 Pro
  Neural Engine (16-core, 35 TOPS, ~5W, shared 8 GB unified memory with CPU/GPU). The model weights are
  quantized to INT8, requiring exactly 2 GB of memory. iOS limits your application's total memory usage
  to a maximum of 3.5 GB out of the 8 GB shared pool. When attempting to process a sequence of 4096 tokens,
  the OS consistently terminates the app for exceeding memory limits, even though the static weights fit
  comfortably within the 3.5 GB budget. Analyze why the dynamic inference memory footprint exceeds the
  limit during this specific generation task.
question: "How would you analyze why the dynamic inference memory footprint exceeds the limit during this specific generation task?"
details:
  realistic_solution: The candidate must calculate the size of the KV cache for the 4096-token sequence
    and add it to the static weight memory. While weights are INT8, the A17 Pro Neural Engine typically
    operates on FP16 activations to preserve generation quality. The combined size of the 2 GB weights,
    the growing FP16 KV cache, and basic app overhead exceeds the strict 3.5 GB iOS per-app limit, causing
    the termination.
  common_mistake: Candidates often assume that memory footprint is dictated entirely by model weights
    and ignore dynamic memory overhead. They frequently fail to calculate the KV cache size, or mistakenly
    assume that intermediate activations are also stored in INT8 rather than FP16.
  napkin_math: 'Weights: 2B parameters * 1 byte (INT8) = 2.0 GB. Assuming a typical 2B model architecture
    (e.g., 32 layers, 2560 hidden dimension). KV cache size per token = 2 (Key & Value) * 32 layers *
    2560 dim * 2 bytes (FP16) = 327,680 bytes. For a 4096 token sequence: 327,680 bytes * 4096 = 1,342,177,280
    bytes (approx 1.34 GB). Total required memory = 2.0 GB (weights) + 1.34 GB (KV cache) = 3.34 GB. The
    remaining 160 MB is insufficient for intermediate activation buffers, the OS overhead, and the app
    UI, pushing the total footprint past the 3.5 GB limit and triggering an OOM crash.'
