title: Diagnosing LLM Latency Bias on Tensor G3
scenario: 'You are deploying an on-device text summarization feature using Gemini Nano on the Google Tensor
  G3. During subgroup evaluation, you notice a severe symptom: the generation latency spikes and battery
  drains excessively only when summarizing text in certain non-English languages, creating a stark demographic
  parity issue in user experience. The device features an on-device TPU delivering 7.5 TOPS and has 12
  GB LPDDR5X memory. What is the root cause of this disparity, and how do the hardware specifications
  explain the symptom?'
details:
  realistic_solution: The root cause is a tokenization disparity interacting with hardware memory limits.
    Non-English languages often require significantly more tokens per word than English. This expanded
    sequence length causes the Key-Value (KV) cache to grow rapidly. While the Tensor G3 TPU handles the
    7.5 TOPS compute easily for short sequences, the enlarged KV cache for these languages exceeds the
    TPU's fast memory allocation and spills over to the 12 GB LPDDR5X memory. The bandwidth bottleneck
    of fetching from LPDDR5X for every generation step destroys the effective TOPS, causing the latency
    spike and battery drain for specific linguistic subgroups.
  common_mistake: Candidates often assume the model has simply learned to be slower for certain languages,
    or they blame the model weights directly without considering the interaction between tokenization
    density and the device's hardware memory hierarchy.
  napkin_math: Assume a 500-word input. English averages 1.2 tokens/word (600 tokens). A language like
    Hindi might average 3.5 tokens/word (1750 tokens). If Gemini Nano's KV cache is 1.5 MB per token,
    English requires 600 * 1.5 MB = 900 MB, fitting well within a hypothetical 1.5 GB fast memory allocation
    for the TPU. Hindi requires 1750 * 1.5 MB = 2625 MB (2.625 GB). This forces 1.125 GB of KV cache to
    spill to the 12 GB LPDDR5X. With LPDDR5X bandwidth at ~50 GB/s, reading that 1.125 GB adds at least
    22.5ms of memory-bound latency per generated token, dropping utilization far below the 7.5 TOPS peak
    and structurally causing the observed demographic disparity.
