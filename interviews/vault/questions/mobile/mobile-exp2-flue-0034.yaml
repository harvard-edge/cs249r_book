title: Encoder vs Decoder Prefill Compute on Tensor G3
scenario: 'Your team is deploying an on-device translation feature targeting the Google Tensor G3. You
  have two candidate 1.5B parameter INT8 models: a decoder-only model and an encoder-decoder model (750M
  params each for encoder and decoder). The average input sequence is 256 tokens, and the expected output
  is 64 tokens. You need to evaluate the architectural tradeoffs by estimating the prefill (prompt processing)
  compute requirements and theoretical minimum latency for both models on the G3''s NPU, which provides
  7.5 TOPS.'
details:
  realistic_solution: 'Use the standard approximation for transformer compute: Operations = 2 * Active
    Parameters * Sequence Length. Calculate the operations for both models during prefill, then divide
    by the Tensor G3''s peak throughput (7.5 TOPS) to find the theoretical minimum latency. The encoder-decoder
    model processes the prompt using only its 750M parameter encoder, resulting in half the prefill compute
    compared to the 1.5B parameter decoder-only model.'
  common_mistake: Candidates often assume the prefill phase uses the entire parameter count for both architectures.
    They fail to realize that during the prefill of an encoder-decoder architecture, only the encoder's
    parameters are active, whereas a decoder-only model must run the input through the full parameter
    count.
  napkin_math: 'Decoder-only Prefill Compute: 2 * 1.5B params * 256 tokens = 768 Giga-Operations (0.768
    Tera-Ops). Decoder-only Prefill Latency: 0.768 Tera-Ops / 7.5 TOPS = 0.1024 seconds (~102 ms). Encoder-Decoder
    Prefill Compute (Encoder only): 2 * 0.75B params * 256 tokens = 384 Giga-Operations (0.384 Tera-Ops).
    Encoder-Decoder Prefill Latency: 0.384 Tera-Ops / 7.5 TOPS = 0.0512 seconds (~51 ms).'
