title: Pedometer Duty Cycling
scenario: A smartphone pedometer relies on the low-power sensor hub rather than the main Application Processor (AP) for step counting.
question: Why does aggressively duty-cycling the AP and offloading to the sensor hub extend continuous sensing battery life?
visual:
  kind: svg
  path: mobile-1970.svg
  alt: Timeline displaying the sensor hub consistently on at 5mW, while the AP spikes
    rarely to 2000mW.
  caption: Power profile of sensor hub offloading.
details:
  realistic_solution: 'The AP consumes Watts of power when active, whereas the sensor hub consumes milliwatts. By offloading continuous step counting to the hub, the AP can remain in a deep sleep state nearly 100% of the time, only waking briefly to sync batched data, drastically lowering the time-averaged power.'
  common_mistake: |
    **The Pitfall:** Assuming "race-to-sleep" on a fast AP saves more power than continuous slow processing.
    **The Rationale:** Candidates apply CPU task-completion logic to continuous sensor streams, failing to realize the AP's base active power is astronomically high.
    **The Consequence:** Designing an architecture that constantly wakes the AP, completely draining the phone's battery in hours.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Application Processor (AP) active power: ~2000 mW.
       - Sensor Hub active power: ~5 mW.
       - Workload: Continuous step counting (always-on).
    2. **Calculations:**
       - Power Ratio: 2000 mW / 5 mW = 400x difference.
       - Power Savings: 2000 mW - 5 mW = 1995 mW saved per second.
    3. **Conclusion & Interpretation:**
       - **Result: Power-Bound optimization. Aggressively duty-cycling the AP and relying on the 5mW Sensor Hub prevents ~2W of continuous drain.**
