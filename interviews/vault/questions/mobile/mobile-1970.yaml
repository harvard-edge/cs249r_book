title: Pedometer Duty Cycling
scenario: A smartphone pedometer relies on the low-power sensor hub rather than the
  main Application Processor (AP) for step counting.
question: Identify why aggressively duty-cycling the AP extends continuous sensing
  battery life.
visual:
  kind: svg
  path: mobile-1970.svg
  alt: Timeline displaying the sensor hub consistently on at 5mW, while the AP spikes
    rarely to 2000mW.
  caption: Power profile of sensor hub offloading.
details:
  realistic_solution: The AP consumes Watts of power when active, whereas the sensor
    hub consumes milliwatts. By offloading continuous step counting to the hub, the
    AP can remain in a deep sleep state nearly 100% of the time, only waking briefly
    to sync batched data, drastically lowering the time-averaged power.
  common_mistake: Thinking the AP computes steps faster and saves power by finishing
    quickly (race-to-sleep doesn't work for continuous signals).
  napkin_math: AP (2000mW) vs Sensor Hub (5mW)
