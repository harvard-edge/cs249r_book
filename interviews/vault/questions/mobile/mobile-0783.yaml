title: Hedged Edge-Cloud Model Routing
scenario: A mobile voice translation app requires a strict <400ms end-to-end latency SLA. The cloud-based 10B parameter model has 80ms compute latency, but mobile network RTT is highly variable (P50 100ms, P99 800ms). The local 1B parameter on-device model takes 250ms on the NPU but yields lower translation quality.
question: When should the voice translation app launch a local hedged fallback to guarantee a 400ms P99 latency bound?
details:
  realistic_solution: 'Decompose the end-to-end latency: $T_{e2e} = T_{network} + T_{cloud\_compute}$ for the cloud path, and $T_{e2e} = T_{local\_load} + T_{local\_compute}$ for the edge path. To bound the P99 latency strictly at 400ms, the local fallback must finish by 400ms. Since the local model takes 250ms to execute, we must trigger it no later than $400ms - 250ms = 150ms$ into the request. Architecture: Dispatch the request to the cloud at $T=0$. Set an asynchronous timer for 150ms. If the cloud hasn''t returned a full response by $T=150ms$, launch the local NPU inference in parallel (hedged request). Whichever finishes first is returned to the user, and the other is canceled. This maximizes cloud usage (high quality) for the majority of requests where network RTT is fast, while strictly capping tail latency via the local NPU.'
  common_mistake: |
    **The Pitfall:** Routing completely to the local model when the network is detected as poor.
    **The Rationale:** Candidates use static network checks instead of dynamic hedging, failing to realize network latency is transient.
    **The Consequence:** Sacrificing translation quality for all requests during that period instead of capturing fast cloud responses when available.
  napkin_math: |
    * Cloud path P50 latency = 100ms (RTT) + 80ms (compute) = 180ms.
    * Local fallback compute = 250ms.
    * Max allowed wait time before triggering fallback = 400ms SLA - 250ms compute = 150ms.
    * Hedged request strategy: Wait 150ms for cloud; if no response, start local NPU.
    * **The P99 is hard-bounded at 400ms (150ms wait + 250ms local compute) regardless of network spikes.**
