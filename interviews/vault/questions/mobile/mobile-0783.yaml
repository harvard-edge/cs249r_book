title: Hedged Edge-Cloud Model Routing
scenario: A mobile voice translation app requires a strict <400ms end-to-end latency SLA. The cloud-based
  10B parameter model has 80ms compute latency, but mobile network RTT is highly variable (P50 100ms,
  P99 800ms). The local 1B parameter on-device model takes 250ms on the NPU but yields lower translation
  quality (BLEU score drops by 4 points).
details:
  realistic_solution: 'Decompose the end-to-end latency: $T_{e2e} = T_{network} + T_{cloud\_compute}$
    for the cloud path, and $T_{e2e} = T_{local\_load} + T_{local\_compute}$ for the edge path. To bound
    the P99 latency strictly at 400ms, the local fallback must finish by 400ms. Since the local model
    takes 250ms to execute, we must trigger it no later than $400ms - 250ms = 150ms$ into the request.
    Architecture: Dispatch the request to the cloud at $T=0$. Set an asynchronous timer for 150ms. If
    the cloud hasn''t returned a full response by $T=150ms$, launch the local NPU inference in parallel
    (hedged request). Whichever finishes first is returned to the user, and the other is canceled. This
    maximizes cloud usage (high quality) for the majority of requests where network RTT is fast, while
    strictly capping tail latency via the local NPU.'
  common_mistake: Routing completely to the local model when the network is detected as poor, sacrificing
    quality for all requests during that period.
  napkin_math: Cloud path P50 latency = 100ms (RTT) + 80ms (compute) = 180ms (Cloud wins). Local fallback
    path max latency = 150ms (wait threshold) + 250ms (NPU compute) = 400ms. The P99 is hard-bounded at
    400ms regardless of network spikes.
