title: On-Device Guardrail Architecture for Exynos
scenario: You are tasked with designing an on-device safety guardrail system that filters toxic inputs and hallucinated outputs for a local LLM assistant on a Samsung Exynos 2400 NPU. The system must operate within the shared 12 GB LPDDR5X memory pool alongside the CPU, GPU, and ISP, while utilizing the 34.7 TOPS dual-core NPU.
question: How would you design a concurrent architecture that ensures strict policy enforcement without degrading the user experience or starving the ISP during multimodal tasks?
details:
  realistic_solution: Design a speculative, asynchronous guardrail architecture. The primary LLM streams tokens to the UI while a smaller, INT8-quantized classifier model evaluates chunks of output in parallel on the second NPU core. If toxicity is detected, the UI redacts the output retroactively. Memory is strictly partitioned, reserving at least 5 GB for OS/ISP/GPU, leaving 7 GB for the 4-bit main LLM, KV cache, and the compact guardrail model.
  common_mistake: |
    **The Pitfall:** Proposing a sequential guardrail execution or forgetting that memory is unified.
    **The Rationale:** Engineers treat the LLM as a cloud API where sequential filtering is normal, and assume the listed 12 GB of RAM is fully dedicated to AI models.
    **The Consequence:** Unacceptable user-perceived latency and frequent Out-Of-Memory (OOM) crashes when the ISP/OS claims its required memory.
  napkin_math: |
    1. Available RAM: 12 GB. OS/GPU/ISP reserve = 5 GB. Remaining AI RAM = 7 GB.
    2. Main LLM (3B params, 4-bit) = 1.5 GB. KV Cache = 1 GB. Guardrail model (200M params, 8-bit) = 200 MB. Total AI RAM = 2.7 GB (safely within the 7 GB limit).
    3. Evaluating 50 generated tokens through the 200M parameter guardrail requires roughly 2 * 200M * 50 = 20 GOPs.
    4. Compute time: 20 GOPs / 34.7 TOPS = ~0.57 ms.
    5. **Result: The NPU compute is vastly sufficient (0.57 ms), making memory bandwidth the actual bottleneck.**
