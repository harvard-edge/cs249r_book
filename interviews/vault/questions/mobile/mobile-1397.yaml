title: On-Device Guardrail Architecture for Exynos
scenario: You are tasked with designing an on-device safety guardrail system that
  filters toxic inputs and hallucinated outputs for a local LLM assistant on a Samsung
  Exynos 2400 NPU. The system must operate within the shared 12 GB LPDDR5X memory
  pool alongside the CPU, GPU, and ISP, while utilizing the 34.7 TOPS dual-core NPU.
  Design a concurrent architecture that ensures strict policy enforcement without
  degrading the user experience or starving the ISP during multimodal tasks.
question: How would you design a concurrent architecture that ensures strict policy
  enforcement without degrading the user experience or starving the ISP during multimodal
  tasks?
details:
  realistic_solution: Design a speculative, asynchronous guardrail architecture. The
    primary LLM streams tokens to the UI while a smaller, INT8-quantized classifier
    model evaluates chunks of output in parallel on the second NPU core. If toxicity
    is detected, the UI redacts the output retroactively. Memory is strictly partitioned,
    reserving at least 5 GB for OS/ISP/GPU, leaving 7 GB for the 4-bit main LLM, KV
    cache, and the compact guardrail model.
  common_mistake: Candidates often propose running the guardrail sequentially after
    generation, causing unacceptable user-perceived latency. They also frequently
    forget that the 12 GB LPDDR5X memory is shared across the entire SoC (OS, ISP,
    UI) and assume all 12 GB are available strictly for the AI models.
  napkin_math: 'Available RAM: 12 GB. OS/GPU/ISP reserve = 5 GB. Remaining AI RAM
    = 7 GB. Main LLM (3B params, 4-bit) = 1.5 GB. KV Cache = 1 GB. Guardrail model
    (200M params, 8-bit) = 200 MB. Total AI RAM = 2.7 GB, safely within the 7 GB limit.
    Compute: Evaluating 50 generated tokens through the 200M parameter guardrail requires
    roughly 2 * 200M * 50 = 20 GOPs. Given the Exynos 2400''s 34.7 TOPS NPU, compute
    time is 20 / 34700 = ~0.57 ms, proving that the NPU compute is vastly sufficient
    and memory bandwidth will be the actual bottleneck.'
