title: The Duty Cycle Power Trap
scenario: Your team is optimizing a real-time voice assistant on a smartphone. Model A runs at 5W peak power with a 5% duty cycle. Model B runs at 3W peak power with a 10% duty cycle.
question: For a 1-hour period, which model drains more battery?
details:
  realistic_solution: Model B drains more battery. Although its peak power is lower, its higher duty cycle results in greater total energy consumption over the hour.
  common_mistake: |
    **The Pitfall:** Focusing only on peak power and ignoring the duty cycle.
    **The Rationale:** Candidates often assume that a lower peak wattage always means better battery life, forgetting that energy is the integral of power over time.
    **The Consequence:** Selecting a 'low-power' model that actually drains the battery faster because it remains active for longer periods.
  napkin_math: |
    1. **Model A Energy:** 5W * 0.05 (duty cycle) * 1 hour = 0.25 Wh.
    2. **Model B Energy:** 3W * 0.10 (duty cycle) * 1 hour = 0.30 Wh.
    3. **Conclusion:** **Model B drains more battery (0.30 Wh vs 0.25 Wh).**
  options:
  - Model A (the 5W model)
  - Model B (the 3W model)
  - They drain the same amount
  - It's impossible to tell without knowing the device's battery capacity
  correct_index: 1
