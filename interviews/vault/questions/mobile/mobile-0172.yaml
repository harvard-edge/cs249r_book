title: The Duty Cycle Power Trap
scenario: Your team is optimizing a real-time voice assistant on a smartphone. You have two model options.
  Model A is larger, running at 5W peak power, but its 'voice activity detection' is excellent, so it
  only has a 5% duty cycle. Model B is smaller, running at 3W peak, but its VAD is less precise, resulting
  in a 10% duty cycle. For a 1-hour period, which model drains more battery?
details:
  realistic_solution: Model B drains more battery. Although its peak power is lower, its higher duty cycle
    results in greater total energy consumption over the hour.
  common_mistake: Focusing only on the peak power draw (3W vs 5W) and ignoring the time dimension. Total
    energy consumption, which is what drains the battery, is the integral of power over time. A lower-power
    model that is active for longer can easily use more energy.
  napkin_math: Energy = Power × Duty Cycle × Time.
  options:
  - Model A (the 5W model)
  - Model B (the 3W model)
  - They drain the same amount
  - It's impossible to tell without knowing the device's battery capacity
  correct_index: 1
