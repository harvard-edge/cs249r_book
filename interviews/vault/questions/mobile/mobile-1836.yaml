title: Debugging gradient vanishing in a mobile RNN model on Snapdragon 8 Gen 3
scenario: A team trains a 3M parameter GRU-based model for time-series anomaly detection on Snapdragon 8 Gen 3. The model processes 500-step sequences. After training for 200 epochs, the GRU's recurrent weights show near-zero gradient norms while output layer gradients are normal. Loss is decreasing but recurrent weights never update meaningfully.
question: How would you diagnose and fix vanishing recurrent gradients in a 500-step GRU trained on Snapdragon 8 Gen 3?
details:
  realistic_solution: 'Apply gradient clipping: torch.nn.utils.clip_grad_norm_(model.parameters(), max_norm=1.0). Use truncated BPTT: process 500 steps as 10 chunks of 50 steps, detaching the hidden state between chunks (h.detach()). This keeps gradient backpropagation to 50 steps, preventing exponential vanishing. Verify with gradient norm logging per layer. Consider replacing GRU with a Transformer encoder (self-attention has constant gradient path length).'
  common_mistake: |
    **The Pitfall:** Training a GRU with Backpropagation Through Time (BPTT) over 500 steps without gradient clipping or truncation.
    **The Rationale:** Candidates forget that even with GRU gating, gradients vanish exponentially over 500 steps, causing floating-point underflow in FP32.
    **The Consequence:** Early-step gradients become effectively zero, preventing the recurrent weights from learning long-term dependencies.
  napkin_math: |
    1. **Gradient Decay:** GRU recurrent gradient at step t (of 500) is proportional to the product of (500-t) Jacobian terms.
    2. **Exponential Vanishing:** If each Jacobian eigenvalue is 0.95, the decay is 0.95^500 = 7.4 × 10^-12. For 0.98, it's 4.1 × 10^-5.
    3. **Underflow Limit:** In FP32, values below 1.4 × 10^-45 underflow to 0, wiping out early-step gradients.
    4. **Truncated BPTT (TBPTT):** With T=50 max decay, 0.95^50 = **0.077** (finite and usable).
