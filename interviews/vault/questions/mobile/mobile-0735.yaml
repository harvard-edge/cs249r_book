title: The Federated Learning Device Heterogeneity Crisis
scenario: 'You''re running federated learning across 2 million Android devices to improve your keyboard''s
  next-word prediction. Each round selects 10,000 devices. After 6 months, you discover a systematic bias:
  the global model performs 8% better for users with flagship phones (Snapdragon 8 Gen 3, Tensor G3) than
  for users with budget phones (Helio G99, Snapdragon 685). Budget phone users are 60% of your user base.
  What''s causing the bias and how do you fix it at the system level?'
question: "Why does keyboard FL favor Snapdragon 8 Gen 3 and Tensor G3 users over Helio G99 and Snapdragon 685 users, and how do you fix it?"
details:
  realistic_solution: 'Three infrastructure biases compound: (1) Selection bias — flagships meet eligibility
    criteria (charging, WiFi, idle) 5x more often than budget phones, contributing 3.3:1 gradient ratio
    despite being 40% of users. (2) Compute bias — budget phones train fewer local epochs (slower CPU),
    producing lower-quality gradients. (3) Data bias — budget phone users have different typing patterns
    (smaller screens, different keyboards) that are underrepresented. Fix: stratified device selection
    with inverse propensity weighting to equalize contributions, relaxed eligibility for budget devices,
    and gradient compression (5 MB to 50 KB) to enable participation over cellular. Reduces accuracy gap
    from 8% to <2%.'
  common_mistake: '"Budget phone users type differently — the model just reflects usage patterns." While
    typing patterns differ, the 8% gap is too large to be explained by user behavior alone. The bias is
    *systemic* in the federated learning infrastructure.'
  napkin_math: 'Total contributions/month: 10,000 * 100 = 1,000,000. Flagships (40% of users) meet criteria
    5x more often than Budget (60%). Expected contribution ratio = (0.4 * 5) : (0.6 * 1) = 2.0 : 0.6 =
    3.33 : 1. So out of 1M contributions, ~769K are from flagships, ~231K from budget. After stratified
    selection + relaxed constraints: budget participation is forced to match user base (60%). Contributions
    become 600K budget, 400K flagship. With inverse propensity weighting: effective impact is 1:1 relative
    to true population. Expected accuracy gap reduction: from 8% to <2%. Gradient compression: 5 MB ->
    50 KB (100x compression via top-k sparsification + quantization)0 KB. At 3G speeds (1 Mbps): 50 KB
    / 125 KB/s = 0.4 seconds upload. Feasible on cellular.'
