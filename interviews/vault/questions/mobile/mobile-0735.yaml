title: The Federated Learning Device Heterogeneity Crisis
scenario: You're running federated learning across 2 million Android devices to improve your keyboard's next-word prediction. Each round selects 10,000 devices. After 6 months, you discover a systematic bias: the global model performs 8% better for users with flagship phones (Snapdragon 8 Gen 3, Tensor G3) than for users with budget phones (Helio G99, Snapdragon 685). Budget phone users are 60% of your user base.
question: Why does keyboard FL favor Snapdragon 8 Gen 3 and Tensor G3 users over Helio G99 and Snapdragon 685 users, and how do you fix it?
details:
  realistic_solution: 'Three infrastructure biases compound: (1) Selection bias — flagships meet eligibility criteria (charging, WiFi, idle) 5x more often than budget phones, contributing 3.3:1 gradient ratio despite being 40% of users. (2) Compute bias — budget phones train fewer local epochs (slower CPU), producing lower-quality gradients. (3) Data bias — budget phone users have different typing patterns (smaller screens, different keyboards) that are underrepresented. Fix: stratified device selection with inverse propensity weighting to equalize contributions, relaxed eligibility for budget devices, and gradient compression (5 MB to 50 KB) to enable participation over cellular. Reduces accuracy gap from 8% to <2%.'
  common_mistake: |
    **The Pitfall:** Concluding that "Budget phone users type differently — the model just reflects usage patterns."
    **The Rationale:** While usage patterns differ, an 8% gap is too large to be behavioral; candidates fail to identify the systemic infrastructure bias.
    **The Consequence:** The bias persists and worsens over time, alienating the majority (60%) of the user base.
  napkin_math: |
    - Flagships (40% of users) meet eligibility criteria 5x more often than Budget (60%).
    - Contribution ratio = (0.4 * 5) : (0.6 * 1) = 2.0 : 0.6 = 3.33 : 1.
    - Out of 1M contributions, ~769K are flagships, ~231K are budget.
    - Stratified selection forces budget participation to match the 60% user base (600K budget, 400K flagship).
    - Gradient compression (5 MB -> 50 KB): 50 KB / 125 KB/s (3G speed) = 0.4 seconds upload.
    - **Applying inverse propensity weighting and gradient compression reduces the accuracy gap from 8% to <2%.**
