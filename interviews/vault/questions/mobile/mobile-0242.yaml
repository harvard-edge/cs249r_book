title: 'The Mobile Memory Wall: Latency Decomposition'
scenario: You're trying to ship a real-time translation feature on a flagship smartphone. The core is a 1 Billion parameter LLM, quantized to INT8. The phone's LPDDR5x memory system provides 77 GB/s of bandwidth.
question: Assuming the model is strictly memory-bandwidth bound, can this design generate at least 15 tokens per second for a conversational experience?
details:
  realistic_solution: Calculate how long it takes to stream the model's weights through the memory system, as this is the limiting factor for generating each token. With 1 Billion parameters quantized to INT8, the model size is 1 GB. Given the memory bandwidth, calculate the time to read this data to get the best-case TPOT. A system generating tokens faster than the required 15 tokens/sec (which corresponds to a TPOT of 1000ms / 15 = ~67ms) is feasible.
  common_mistake: |
    **The Pitfall:** Focusing on NPU TOPS instead of memory bandwidth.
    **The Rationale:** Engineers often equate inference speed purely with compute capability, missing that autoregressive generation is heavily memory-bound.
    **The Consequence:** The candidate will calculate an unrealistically fast, sub-millisecond TPOT.
  napkin_math: |
    1. **Assumptions & Constraints:**
      - Model Size: 1 Billion parameters * 1 byte (INT8) = 1 GB.
      - Memory Bandwidth: 77 GB/s.
      - Target: >= 15 tokens/sec.
    2. **Calculations:**
      - Time Per Output Token (TPOT): 1 GB / 77 GB/s = 0.01298 seconds = ~13 ms.
      - Tokens per second: 1000 ms / 13 ms = ~77 tokens/sec.
    3. **Conclusion & Interpretation:**
      - **Result: Memory-Bound Feasibility.** ~77 tokens/sec > 15 tokens/sec. It is feasible.
  options:
  - ~0.04 ms per token. Yes, it's feasible.
  - ~104 ms per token. No, it's not feasible.
  - ~13 ms per token. Yes, it's feasible.
  - ~77 ms per token. No, it's not feasible.
  correct_index: 2
