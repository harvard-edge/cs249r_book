title: 'The Mobile Style Transfer Stall: Real-Time Deadlines'
scenario: You are an ML engineer at a social media company trying to optimize a real-time style transfer
  filter on a new flagship phone using an Apple A17 Pro chip. The user experience is janky because the
  model runs at 40ms per frame, missing the 16ms (60 FPS) target. A profiler identifies a single large
  `Conv2D` layer as the primary bottleneck. This layer executes 50 G-Ops (INT8) and requires moving 100
  MB of data (activations and weights) from LPDDR5 RAM. Using the A17 Pro's hardware specifications, solve
  for the layer's primary bottleneck.
details:
  realistic_solution: The correct way to diagnose the bottleneck is to use the Roofline model by calculating
    the layer's Arithmetic Intensity (AI) and comparing it to the hardware's ridge point. If the AI is
    lower than the ridge point, the layer is memory-bound; if higher, it's compute-bound. The memory system
    simply cannot supply data fast enough to keep the powerful compute units fed, causing them to stall.
  common_mistake: Engineers often focus exclusively on peak TOPS, assuming that a model running slowly
    must be 'too big' for the NPU. They might try to prune the model (reduce Ops) without realizing that
    the true bottleneck is the memory system's inability to feed the processor, making the pruning efforts
    ineffective. They fail to calculate the Ops-to-Byte ratio (Arithmetic Intensity).
  napkin_math: 1. **Calculate the layer's Arithmetic Intensity (AI):**
  options:
  - The layer is compute-bound because the A17's 35 TOPS is insufficient for the 50 G-Ops workload.
  - The layer is memory-bound. Moving 100MB is simply too much data for a mobile device's RAM.
  - The layer is memory-bound because its arithmetic intensity (500 Ops/Byte) is below the A17 Pro's ridge
    point (~683 Ops/Byte).
  - The layer is compute-bound because its arithmetic intensity of 500 Ops/Byte is a high ratio, indicating
    a heavy computational load.
  correct_index: 2
