title: The Jank Instigator
scenario: 'An AR game running on a Snapdragon 8 Gen 3 requires 45 TOPS to maintain a smooth 60 FPS. Under
  peak load, the SoC needs to draw 6W of power. However, the phone''s thermal design can only sustain
  a 5W power draw before thermal throttling is engaged. Interpret this situation: what happens to the
  frame rate, and what is the approximate new FPS?'
question: "Interpret this situation: what happens to the frame rate, and what is the approximate new FPS?"
details:
  realistic_solution: The system will not crash or overheat. Instead, the PMIC will force the SoC to operate
    within its 5W thermal budget. Since the chip requires 6W to deliver the full 45 TOPS, its performance
    will be scaled down proportionally.
  common_mistake: Engineers often think of throttling as a catastrophic failure (an app crash) or an arbitrary,
    fixed reduction (e.g., 'performance is cut in half'). In reality, modern SoCs have sophisticated Power
    Management ICs (PMICs) that gracefully degrade performance by reducing clock speeds to stay within
    a specific power (and thus thermal) envelope. The performance reduction is proportional to the power
    reduction.
  napkin_math: 'To avoid thermal throttling, the phone must run at 5W / 6W = 83.3% of its peak capacity.
    Consequently, the 45 TOPS requirement must drop by this ratio: 45 TOPS * (5 / 6) = 37.5 TOPS. To maintain
    the smooth 60 FPS target at this power limit, the per-frame compute budget is 37.5 TOPS / 60 FPS =
    625 GOPs per frame.'
  options:
  - The game will crash because the SoC is drawing too much power.
  - The frame rate will drop to 30 FPS as the system cuts performance by half.
  - The frame rate will remain at 60 FPS, but the phone will get dangerously hot.
  - The frame rate will drop to approximately 50 FPS as the SoC scales down performance.
  correct_index: 3
