title: 'Latency Decomposition: Size Inference Latency Budget for AR App on A17 Pro'
scenario: 'An augmented reality iOS app must overlay semantic segmentation on the camera feed in real
  time. The A17 Pro (35 TOPS Neural Engine, 8GB) runs a segmentation model (MobileNetV3 backbone, 5M params
  INT8, 2.8 GOPs) at 60fps. Size each latency component: camera capture, pre-process, inference, post-process,
  Metal render, display.'
question: "What latency budget does each AR segmentation pipeline stage consume on A17 Pro, and how much 60 FPS slack remains?"
details:
  realistic_solution: 'Camera capture: 0ms (streaming, always available). Pre-process (GPU): 1ms. Inference:
    2.8G/35T ≈ 0.08ms + 2ms overhead = 2ms. Post-process (argmax over 1280×720×21 classes): CPU naive
    8ms, Metal compute 1ms. Metal render: 2ms. Display commit: must finish by 15ms before vsync. Total:
    1+2+1+2 = 6ms. Budget: 10ms slack. Can add second model or increase resolution.'
  common_mistake: Assuming 60fps means a 16.7ms budget per frame; missing that the pipeline must complete
    in <16ms to allow display commit before vsync.
  napkin_math: 'Segmentation model: 2.8 GOPs INT8. Neural Engine: 35 TOPS. Compute: 2.8/35 = 0.08ms. With
    framework overhead: 2ms. Argmax on Metal: 1280×720×21 = 19.4M ops. At 1 TFLOPS Metal GPU: 0.019ms.
    Total pipeline: 0+1+2+1+2 = 6ms. 60fps budget: 16.7ms. Slack: 10.7ms. ✓'
