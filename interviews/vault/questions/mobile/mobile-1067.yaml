title: Implement Mobile LLM Decode Benchmark on Tensor G3
scenario: You must implement a decode speed benchmark for a 2B INT4 transformer on a mobile TPU (15 TOPS, 51.2 GB/s LPDDR5 bandwidth). The test involves timed measurement of 100 decode steps at batch=1, calculation of tokens/s and GB/s memory bandwidth utilized, and comparison to the theoretical bandwidth-limited maximum.
question: How should a decode benchmark isolate inference time and compare measured tokens per second to the bandwidth limit?
details:
  realistic_solution: 'Benchmark design: (1) Pre-tokenize 100 different 1-token inputs. Pre-compute KV cache with 256-token system prompt (warmed). (2) Warm-up: 3 full decode chains of 10 tokens each (discarded). (3) Measurement: time.perf_counter() before and after 100 sequential single-token decode calls. Record total_time. (4) tokens_per_second = 100 / total_time. GB_per_second = 1GB_weights / (total_time / 100). Comparison: theoretical BW max = 51.2 GB/s / 1GB = 51.2 tokens/s. If measured = 42 tokens/s → MBU = 42/51.2 = 82% memory bandwidth utilization — excellent. (5) Report: mean ± std over 5 benchmark runs.'
  common_mistake: |
    **The Pitfall:** Measuring wall-clock time including tokenization and de-tokenization.
    **The Rationale:** Developers often benchmark the full end-to-end pipeline rather than isolating the tensor compute and memory bandwidth.
    **The Consequence:** The resulting tokens/sec metric artificially drops, masking the true memory bandwidth utilization (MBU) of the accelerator.
  napkin_math: |
    - **Model Size:** 2B parameters * 0.5 bytes/param (INT4) = 1 GB.
    - **Theoretical Bandwidth Limit:** 51.2 GB/s / 1 GB = 51.2 tokens/second.
    - **KV Cache Overhead:** With context=256, KV cache per step adds ~12.6 MB of traffic (1012.6 MB total read per step).
    - **Adjusted Limit:** 51.2 GB/s / 1.0126 GB = 50.5 tokens/second.
    - **Result:** **Measuring ~42-48 tok/s indicates an excellent 82-95% memory bandwidth utilization (MBU).**
