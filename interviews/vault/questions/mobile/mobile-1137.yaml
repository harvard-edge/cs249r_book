title: Mixed-Precision Inference Architecture on A17 Pro
scenario: You are designing the deployment architecture for a real-time video segmentation model on the Apple A17 Pro Neural Engine. The application demands 60 FPS processing while staying within the ~5W power envelope to prevent thermal throttling.
question: How should a 60 FPS A17 Pro segmentation model partition INT8 and FP16 work to balance speed, bandwidth, and accuracy?
details:
  realistic_solution: The optimal design runs the dense feature extraction backbone in INT8 on the 16-core Neural Engine to maximize the 35 TOPS compute capability within the 5W budget. The sensitive final upsampling layers and segmentation heads are kept in FP16. To minimize bandwidth on the 8 GB unified memory, precision casting is fused with the final backbone layers, ensuring data remains in place and avoiding costly round-trips to the CPU.
  common_mistake: |
    **The Pitfall:** Suggesting naive post-training quantization to INT8 for the entire model.
    **The Rationale:** Candidates fail to recognize that segmentation output heads lose critical spatial resolution at lower precisions, and overlook the unified memory bottleneck.
    **The Consequence:** This results in degraded segmentation accuracy and proposes architectures that require expensive memory copies between the ANE and GPU.
  napkin_math: |
    - **Total compute required:** 60 FPS * 50 GOps/frame = 3 TOPS.
    - **Compute split:** 80% INT8 on ANE (2.4 TOPS, well under 35 TOPS peak) and 20% FP16 (600 GFLOPs/s).
    - **Weights footprint (30M parameters):** Pure FP16 = 60MB. Mixed 80/20 split = (24M * 1B) + (6M * 2B) = 36MB.
    - **Memory bandwidth:** Loading 36MB at 60 FPS requires 2.16 GB/s.
    - **Conclusion:** Requires **2.16 GB/s**, leaving ample headroom in the shared 8 GB pool.
