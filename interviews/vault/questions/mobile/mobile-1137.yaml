title: Mixed-Precision Inference Architecture on A17 Pro
scenario: You are designing the deployment architecture for a real-time video segmentation
  model on the Apple A17 Pro Neural Engine. The application demands 60 FPS processing
  while staying within the ~5W power envelope to prevent thermal throttling. Given
  the 16-core Neural Engine and 8 GB of shared unified memory, evaluate how you would
  partition the model using mixed precision (FP16 and INT8) to balance raw throughput,
  memory bandwidth, and segmentation boundary accuracy.
question: How should a 60 FPS A17 Pro segmentation model partition INT8 and FP16 work
  to balance speed, bandwidth, and accuracy?
details:
  realistic_solution: The optimal design runs the dense feature extraction backbone
    in INT8 on the 16-core Neural Engine to maximize the 35 TOPS compute capability
    within the 5W budget. The sensitive final upsampling layers and segmentation heads
    are kept in FP16. To minimize bandwidth on the 8 GB unified memory, precision
    casting is fused with the final backbone layers, ensuring data remains in place
    and avoiding costly round-trips to the CPU.
  common_mistake: Candidates often suggest a naive post-training quantization to INT8
    for the entire model, failing to recognize that segmentation output heads lose
    critical spatial resolution at lower precisions. They also frequently overlook
    the unified memory bottleneck, proposing architectures that require expensive
    memory copies or precision casts between the ANE and GPU.
  napkin_math: 'For a model requiring 50 GOps per frame: 60 FPS * 50 GOps = 3 TOPS
    total compute. If 80% is INT8 on the ANE, that uses 2.4 TOPS, easily fitting the
    35 TOPS peak. The 20% in FP16 uses 600 GFLOPs/sec. If weights are 30M parameters,
    purely FP16 requires 60MB. A mixed 80/20 split reduces footprint to (24M * 1B)
    + (6M * 2B) = 36MB. Loading this at 60 FPS requires 2.16 GB/s memory bandwidth
    out of the shared 8 GB pool, leaving ample headroom.'
