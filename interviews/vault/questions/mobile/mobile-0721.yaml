title: The Qualcomm QNN SDK Delegation
scenario: 'You''re deploying a multi-modal model on a Snapdragon 8 Elite using the Qualcomm AI Engine
  (QNN SDK). QNN can delegate ops to the Hexagon NPU (50 TOPS INT8), Adreno GPU (4.6 TFLOPS FP16), or
  Kryo CPU. Your model has: Conv2D layers, LayerNorm, GELU, multi-head attention with dynamic sequence
  lengths, and a final softmax. Build the delegation decision tree and estimate total latency.'
question: "How should QNN delegate each model operation across Hexagon NPU, Adreno GPU, and Kryo CPU to minimize latency?"
details:
  realistic_solution: 'Build an explicit delegation plan by op type: Model: 60 layers. 46 Conv/MatMul
    → HTP (6ms). 12 attention + LayerNorm + GELU → GPU (8ms). 2 pre/post-processing → CPU (1ms). Partition
    boundaries: HTP→GPU (×2): 2 × 1.5ms = 3ms. GPU→HTP (×2): 2 × 1.5ms = 3ms. GPU→CPU (×1): 1ms. Total:
    22ms. Then optimize by keeping more layers on HTP to eliminate boundary crossings.'
  common_mistake: '"Set the QNN backend to ''HTP'' (Hexagon Tensor Processor) and let the runtime figure
    it out." The runtime will silently fall back unsupported ops to CPU, creating partition boundaries
    that dominate latency.'
  napkin_math: 'Model: 60 layers. 46 Conv/MatMul → HTP (6ms). 12 attention + LayerNorm + GELU → GPU (8ms).
    2 pre/post-processing → CPU (1ms). Partition boundaries: HTP→GPU (×2): 2 × 1.5ms = 3ms. GPU→HTP (×2):
    2 × 1.5ms = 3ms. GPU→CPU (×1): 1ms. Total: 6 + 8 + 1 + 7 = **22ms**. Optimized (approximate GELU on
    HTP, fuse LayerNorm into GPU attention block): 48 layers HTP (7ms) + 10 layers GPU (6ms) + 2 CPU (1ms)
    + 2 boundaries (3ms) = **17ms**. Saving 3 partition crossings = 5ms = 23% improvement.'
