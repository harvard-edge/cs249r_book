title: 'The Qualcomm QNN SDK Delegation'
scenario: 'You''re deploying a multi-modal model on a mobile SoC using the QNN SDK. QNN can delegate ops to the NPU, GPU, or CPU. Your model has 60 layers: Conv2D, LayerNorm, GELU, attention, and softmax.'
question: 'How should QNN delegate each model operation across NPU, GPU, and CPU to minimize latency?'
details:
  realistic_solution: 'Build an explicit delegation plan by op type via graph partitioning. Force approximate GELU on the NPU and fuse LayerNorm to eliminate boundary crossings. By minimizing CPU fallbacks and data transfers between NPU and GPU, overall latency is drastically reduced.'
  common_mistake: |
    **The Pitfall:** Setting a single backend (e.g., HTP) and letting the runtime figure it out.
    **The Rationale:** Candidates assume the SDK will magically optimize the graph.
    **The Consequence:** The runtime silently falls back unsupported ops to the CPU, creating massive partition boundaries that completely dominate latency.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: 60 layers. Unoptimized: 22ms latency.
    - Partitions: NPU->GPU (1.5ms), GPU->NPU (1.5ms), GPU->CPU (1ms).

    **Calculations:**
    - Naive Delegation: 46 Conv (6ms) + 12 Attn (8ms) + 2 CPU (1ms) + Boundaries (7ms) = 22ms.
    - Optimized Delegation: 48 NPU (7ms) + 10 GPU (6ms) + 2 CPU (1ms) + Boundaries (3ms) = 17ms.

    **Conclusion & Interpretation:**
    - **Result: 17ms (I/O-Bound)**. Latency drops from 22ms to 17ms, saving 5ms purely by eliminating partition boundaries.
