title: The Federated Learning Cost Fallacy
scenario: An automotive company is using Federated Learning to improve a driver-assistance feature. The
  training happens on the driver's smartphone using recent sensor data. For a single training round, which
  of the following operations is the primary driver of the user's 'cost' in terms of battery consumption
  and data-plan usage?
question: "For a single training round, which of the following operations is the primary driver of the user's 'cost' in terms of battery consumption and data-plan usage?"
details:
  realistic_solution: Transmitting the model update over the network is by far the most significant cost.
    The energy required to power up the radio and send several megabytes of data is orders of magnitude
    greater than the energy consumed by the highly-optimized mobile NPU to perform the local training
    computations. While local training is computationally intensive, modern mobile SoCs are incredibly
    power-efficient for these tasks, whereas wireless data transmission remains a major source of battery
    drain.
  common_mistake: Engineers often focus on the computational load (FLOPs) of training and incorrectly
    assume it's the most expensive operation. They tend to dramatically underestimate the energy cost
    of using the cellular or Wi-Fi radio, which is one of the most power-hungry components in a mobile
    device.
  napkin_math: Let's compare the energy to compute vs. transmit.
  options:
  - Local model training computation on the NPU.
  - Reading the local training data from UFS flash storage.
  - Transmitting the computed model update over the cellular network.
  - The overhead from the A/B testing framework that selected the user.
  correct_index: 2
