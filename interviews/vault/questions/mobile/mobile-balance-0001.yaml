title: Mobile Telemetry Byte Budget
scenario: A mobile model reports 30 counters once per day. Each counter is 8 bytes, and 5 million devices opt in. Estimate the daily telemetry payload before protocol overhead.
question: How much daily telemetry is uploaded by 5M devices sending 30 eight-byte counters each?
details:
  realistic_solution: Each device sends 240 bytes/day. Across 5 million devices, that is 1.2 GB/day before protocol overhead. This is small enough for aggregate monitoring but still needs privacy and batching controls.
  common_mistake: Assuming telemetry is free at fleet scale, or uploading raw examples when counters would suffice.
  napkin_math: 30 x 8 = 240 bytes/device/day. 240 x 5,000,000 = 1.2 billion bytes ≈ 1.2 GB.
