title: Sizing On-Device Translation Architectures for A17 Pro
scenario: 'You are designing an on-device real-time translation system targeting the Apple A17 Pro Neural Engine. You need to evaluate the deployment tradeoffs between a 1B parameter encoder-decoder model and a 1.5B parameter decoder-only model. The A17 Pro has a 16-core Neural Engine with 35 TOPS and shared 8 GB unified memory.'
question: 'How should an on-device translation architecture be sized for A17 Pro memory-bandwidth limits?'
details:
  realistic_solution: 'Analyze the memory bandwidth bottleneck during generation. Decoder-only loads 1.5B weights plus KV cache per token. Encoder-decoder (500M/500M) loads 500M decoder weights plus KV cache, but cross-attention repeatedly strains memory by accessing encoder states. The architecture choice must optimize memory access patterns, often favoring uniform decoder structures.'
  common_mistake: |
    **The Pitfall:** Assuming fewer total parameters guarantees lower latency.
    **The Rationale:** Candidates falsely equate total parameter count directly to inference speed, missing the distinction between compute-bound prefill and bandwidth-bound generation.
    **The Consequence:** Deploying an encoder-decoder architecture that stalls the memory bus during cross-attention generation phases.
  napkin_math: |
    1. **Compute insignificance:** 1.5B MACs (3 GOPs) / 35 TOPS = ~0.08 ms compute time.
    2. **Decoder-Only BW:** 1.5 GB / 50 GB/s = **30 ms** per token memory load.
    3. **Encoder-Decoder BW:** 0.5 GB / 50 GB/s = **10 ms** per token (ignoring severe cross-attention memory overheads).
    4. **Conclusion:** Power is utterly dominated by memory traffic (30ms vs 0.08ms compute), making cache hits the primary optimization target.
