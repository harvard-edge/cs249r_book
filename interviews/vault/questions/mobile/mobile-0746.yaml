title: The Frankenstein Model
scenario: During a background model update on a user's phone, the device suddenly reboots. Upon next launch, the app does not crash, but the ML model produces nonsensical outputs.
question: After a reboot interrupts a background model update, why can the app launch but produce garbage outputs?
details:
  realistic_solution: 'You have a **Frankenstein Model** caused by non-atomic updates. The pipeline wrote the updated model directly to the active file. If interrupted, the file contains a mix of new and old layers, which is numerically invalid. The fix is **Atomic Promotion**: download the model in a temporary directory, and only after validation is complete, use an atomic `rename()` call to replace the active model file.'
  common_mistake: |
    **The Pitfall:** Relying on battery checks or superficial guards before training.
    **The Rationale:** Candidates fail to understand that OS-level process kills, reboots, or hardware interrupts cannot be prevented by application-level state checks.
    **The Consequence:** Non-atomic file writes corrupt the model binary, permanently bricking the application's AI features until reinstalled.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model pipeline writes directly to the active model file.
       - OS termination interrupts write process midway.
    2. **Calculations:**
       - Example mixture: 60% v2.0 weights written, 40% remain v1.0.
       - Inter-layer numeric mismatch: Layer 2 outputs v2.0 features, Layer 3 expects v1.0 features.
    3. **Conclusion & Interpretation:**
       - **Result: Consistency-Bound.** Non-atomic writes create catastrophic numerical error propagation due to mismatched weights.
