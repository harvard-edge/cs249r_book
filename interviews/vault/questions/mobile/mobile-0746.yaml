title: The Frankenstein Model
scenario: During a background model update on a user's phone, the device suddenly reboots. Upon next launch, the app doesn't crash, but the ML model produces nonsensical 'garbage' outputs.
question: "After a reboot interrupts a background model update, why can the app launch but produce garbage outputs?"
details:
  realistic_solution: 'You have a **Frankenstein Model** caused by non-atomic updates. The pipeline wrote
    the updated model directly to the active file. If interrupted, the file contains a mix of new and
    old layers, which is numerically invalid. The fix is **Atomic Promotion (Shadow Copy)**: download/train
    the model in a temporary directory, and only after validation is complete, use an atomic `rename()`
    call to replace the active model file.'
  common_mistake: |
    **The Pitfall:** Relying on battery checks or superficial guards before training.
    **The Rationale:** Candidates fail to understand that OS-level process kills, reboots, or hardware interrupts cannot be prevented by application-level state checks.
    **The Consequence:** Non-atomic file writes corrupt the model binary, permanently bricking the application's AI features until reinstalled.
  napkin_math: |
    - State Mixture: If 60% of layers are overwritten with v2.0 weights and 40% remain v1.0.
    - **Conclusion:** The feature map distribution from Layer 2 (v2.0) will not match the weights expected by Layer 3 (v1.0), leading to catastrophic numerical error propagation.
