title: Diagnosing On-Device Drift Detection OOM on Hexagon NPU
scenario: Your team deployed an on-device personalization model running on the Qualcomm Hexagon NPU (Snapdragon
  8 Gen 3). To monitor for training-serving skew, a background process periodically calculates the Population
  Stability Index (PSI) between the local inference input distribution and the global baseline. Users
  are reporting sudden app crashes with OOM errors specifically during this background drift detection
  phase, despite the device having 16 GB of shared LPDDR5X memory. The model inference itself runs smoothly
  using INT8 quantization, but the drift detection module is causing memory spikes.
details:
  realistic_solution: The root cause is that while the NPU efficiently handles the 45 TOPS INT8 inference,
    the drift detection module (calculating PSI) likely pulls the high-dimensional feature vectors back
    to the CPU in FP32 format for statistical binning. The Hexagon NPU is highly optimized for quantized
    execution, but aggregating thousands of unquantized vectors on the CPU causes a massive memory spike
    in the shared LPDDR5X pool. The solution is to push the binning logic or a simplified drift proxy
    metric into the INT8 NPU execution graph, or sub-sample the distributions heavily before transferring
    them to the CPU.
  common_mistake: Candidates often blame the 16 GB shared memory limit or general memory leaks without
    analyzing the hardware execution context. They might suggest reducing the batch size for inference,
    missing that the NPU inference is stable and the issue lies in how the CPU handles the unquantized
    drift calculations.
  napkin_math: Assume the model processes 1,000 requests per hour, with an input embedding size of 4,096.
    On the NPU (INT8), storing 1,000 embeddings takes 1,000 * 4,096 * 1 byte = 4.096 MB. If these are
    accumulated and pulled to the CPU in FP32 for PSI calculation over a 24-hour window, that is 24,000
    requests * 4,096 * 4 bytes = 393.2 MB per user just for the raw data buffer. If the application allocates
    multiple such buffers during the sorting and binning phase of PSI calculation across concurrent features,
    it can quickly exhaust the OS background process memory limit (often around 500 MB on Android), triggering
    an OOM despite the 16 GB total device RAM.
