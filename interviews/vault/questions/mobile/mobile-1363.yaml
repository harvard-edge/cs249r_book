title: Deterministic Execution Timing for On-Device LLM Watchdog
scenario: You are deploying a safety-critical automotive voice command system using Gemini Nano on the Google Tensor G3. The safety certification requires a strict watchdog timer to trigger a fallback system if the on-device TPU fails to generate a response in time.
question: What watchdog timeout should guarantee a 20-token emergency LLM response on Tensor G3 assuming 50% TPU utilization due to 12 GB LPDDR5X bandwidth constraints?
details:
  realistic_solution: 'The correct approach calculates the total operations required for the full emergency response sequence and divides it by the effective compute throughput. Since the Google Tensor G3 TPU operates at 7.5 TOPS but is memory-bound to 50% utilization for this workload, the effective throughput is 3.75 TOPS. The watchdog timer must be set slightly above this worst-case deterministic execution time to ensure it only triggers on actual hangs or hardware faults, satisfying safety certification requirements.'
  common_mistake: |
    **The Pitfall:** Using theoretical peak TOPS instead of effective memory-bound TOPS.
    **The Rationale:** Candidates often calculate the minimum time using the peak 7.5 TOPS without accounting for realistic TPU utilization or memory bandwidth bottlenecks.
    **The Consequence:** This leads to a watchdog timer that is far too aggressive and triggers false positive fallbacks, disabling the primary system unnecessarily.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Operations per token: 15 GOPS.
       - Token target: 20 tokens.
       - Effective TPU throughput: 7.5 TOPS * 0.50 (utilization) = 3.75 TOPS (3750 GOPS/sec).
    2. **Calculations:**
       - Total operations for 20 tokens: 15 GOPS/token * 20 tokens = 300 GOPS (0.3 TOPS).
       - Execution time: 300 GOPS / 3750 GOPS/sec = 0.08 seconds.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound Utilization. Minimum watchdog timeout = 80 milliseconds.**
