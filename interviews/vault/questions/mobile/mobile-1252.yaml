title: Architecting an AR Segmentation Pipeline on Snapdragon 8 Gen 3
scenario: You are designing a real-time on-device 4K super-resolution pipeline targeting an NPU that delivers 45 TOPS of compute with a shared 16 GB memory pool.
question: How should a 4K super-resolution pipeline use roofline analysis to guarantee it stays compute-bound?
details:
  realistic_solution: Architect a tiled dataflow that strictly confines intermediate activations to the NPU's SRAM, fusing layers to maximize operational intensity above the ridge point.
  common_mistake: |
    **The Pitfall:** Assuming peak TOPS are always achievable regardless of memory design.
    **The Rationale:** Candidates design un-fused pipelines with massive intermediate activations, failing to account for the shared nature of the memory bus.
    **The Consequence:** The workload hits the memory wall, evicting activations to DRAM and permanently stalling the pipeline well below its 30 FPS target.
  napkin_math: |
    1. Identify NPU peak compute: 45 TOPS.
    2. Estimate available bandwidth: Of the 68.2 GB/s total, assume ~15 GB/s is available to the NPU due to contention.
    3. Calculate Hardware Ridge Point: 45e12 Ops / 15e9 Bytes = **3000 Ops/Byte**.
    4. Calculate max memory traffic: For a 1 TOPS/frame model running at 30 FPS (30 TOPS total), memory must stay under 30e12 / 3000 = **10 GB/s** (~333 MB/frame).
