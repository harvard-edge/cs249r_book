title: The Context Length Latency Spike
scenario: A local mobile chat app runs a 2B parameter model using a mobile GPU. Decode latency is perfectly stable at 35ms/token. However, exactly when the conversation history reaches 1024 tokens, decode latency instantly jumps to 110ms/token and remains there. Device thermals are normal and there is no OS memory paging.
question: Why does mobile chat decode latency jump exactly at a 1024-token context length?
details:
  realistic_solution: The step-function increase in latency is caused by a hardware-specific FlashAttention tile size limit. Mobile GPUs have strictly limited threadgroup shared memory (e.g., 32KB per workgroup). The FlashAttention kernel is heavily optimized to keep the K and V blocks in this fast SRAM. At exactly 1024 tokens, the required tile size for the sequence length exceeds the maximum shared memory allocation for the shader. The inference engine's fallback mechanism silently switches to a standard, unoptimized attention kernel, which requires O(N) reads and writes to the slower LPDDR5 DRAM for every single token generated.
  common_mistake: |
    **The Pitfall:** Assuming the device ran out of RAM and started swapping to flash storage.
    **The Rationale:** Engineers equate sudden latency spikes to traditional OOM paging behavior.
    **The Consequence:** They attempt to reduce overall memory footprint rather than addressing the specific threadgroup shared memory limitations of the GPU shader.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Architecture: 32 layers, 8 heads, 64 dim (FP16).
       - Mobile GPU limitation: 32 KB max shared memory per workgroup.
       - Context length: 1024 tokens.
    2. **Calculations:**
       - FlashAttention Tile Size Requirement: 1024 tokens * 64 dim * 2 bytes = 131 KB.
       - Hardware Mismatch: 131 KB > 32 KB GPU shared memory limit.
       - Fallback Penalty: Standard attention requires K (131 KB) + V (131 KB) reads per head per layer.
       - Total Extra DRAM Traffic: 262 KB * 8 heads * 32 layers = 67 MB per token.
    3. **Conclusion & Interpretation:**
       - **Result: Standard Attention Fallback**. Exceeding the 32 KB SRAM limit forces fallback to unoptimized O(N) DRAM reads, generating **67 MB of extra traffic per token** and bottlenecking the GPU.
