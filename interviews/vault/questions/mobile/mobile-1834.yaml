title: Minimizing computational graph size for on-device fine-tuning on Snapdragon
  8 Gen 3
scenario: You are implementing LoRA (Low-Rank Adaptation) fine-tuning on Snapdragon
  8 Gen 3 (45 TOPS, 8GB) for a 1B parameter LLM. Standard LoRA with rank=4 adds 2×rank
  trainable matrices per attention layer. The backward pass for 32 transformer layers
  with LoRA adapters takes 800ms, far too slow for interactive use.
question: How would you shrink the autograd graph for LoRA fine-tuning a 1B LLM on
  Snapdragon 8 Gen 3?
details:
  realistic_solution: 'Wrap the frozen base model forward pass with torch.no_grad().
    Compute frozen layer activations as detached tensors. Only the LoRA adapter computation
    (very small) needs the computational graph. This reduces backward graph size from
    32 full attention layers to 32 LoRA adapters (each rank=4 matrix multiplication).
    Memory and time reduction: ~95%.'
  common_mistake: Fine-tuning with LoRA but keeping requires_grad=True on frozen base
    model parameters. Although gradients won't flow through frozen params (correctly
    set), the computational graph is still built for the base model forward pass because
    PyTorch builds the graph for any operation where ANY tensor in the computation
    has requires_grad=True.
  napkin_math: '1B LLM, 32 layers, d_model=2048. Full attention backward: 32 × (Q,K,V,O
    projections: 4 × 2048² × 2 bytes) = 32 × 32MB = 1GB activation storage. LoRA adapters
    (rank=4): 32 × 4 adapters × (2048×4 + 4×2048) × 2 bytes = 32 × 4 × 32KB = 4MB.
    Backward time: 800ms → 800ms × (4MB/1GB) ≈ 3ms. 267× speedup from eliminating
    unnecessary graph construction.'
