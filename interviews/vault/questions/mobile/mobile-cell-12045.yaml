title: 'MLOps Lifecycle: Size OTA Update Bandwidth for 100M Mobile App Users'
scenario: 'Size the monthly CDN bandwidth cost for OTA model updates in a mobile app with 100M users (60M
  iOS A-series, 40M Android Snapdragon 8 Gen 3). Models: iOS CoreML 45MB, Android TFLite 38MB. Monthly
  update cadence. Assume 60% of users update within 1 week of release.'
details:
  realistic_solution: 'iOS: 60M × 60% × 45MB = 1,620TB. Android: 40M × 60% × 38MB = 912TB. Total week
    1: 2,532TB. Remaining 40% over next 3 weeks: 60M×40%×45MB + 40M×40%×38MB = 1,080+608 = 1,688TB. Monthly
    total: 4,220TB = 4.22PB. At $0.045/GB (negotiated CDN): $190,000/month. Delta compression (30MB →
    5MB diff): 4.22PB × (5/38 avg) = 555TB → $25,000/month. Delta updates save $165K/month.'
  common_mistake: Calculating 100M × model_size without applying the 60% adoption rate and without separating
    iOS/Android model sizes.
  napkin_math: 'Full update: (60M×0.6×45 + 40M×0.6×38)×(1+0.4/0.6) MB total = (1620+912)+(1080+608)=4220TB.
    $0.045/GB × 4220TB = $4220×1000×0.045=$189,900. Delta (avg 5MB diff): 4220TB×5/41.5avg=508TB. $0.045×508×1000=$22,860.
    Monthly saving: $167K.'
