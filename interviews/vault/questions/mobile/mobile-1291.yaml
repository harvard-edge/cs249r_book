title: LLM TPU Delegation vs CPU Fallback on Tensor G3
scenario: You are deploying a 2B parameter INT8 LLM. You must choose between Option A mapping all operators to standard ops for 100% TPU delegation (2.2B parameters) and Option B retaining a custom op (2.0B parameters) forcing 30% of compute to CPU.
question: "Which TFLite strategy is faster: 100% TPU delegation with 2.2B params or 30% CPU fallback at 2.0B?"
details:
  realistic_solution: |
    Option A is the correct choice. Avoiding CPU fallback is critical because alternating execution between the CPU and TPU for every token completely bottlenecks generation latency due to synchronization limits and the TPU's massive compute advantage.
  common_mistake: |
    **The Pitfall:** Choosing partial CPU fallback to save memory.
    **The Rationale:** Candidates assume that 70% TPU delegation is "good enough" or that memory savings justify the fallback, ignoring the massive latency penalty of alternating execution.
    **The Consequence:** Auto-regressive decoding speed is completely bottlenecked by synchronization overhead and CPU slowness.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - TPU Compute: 7.5 TOPS (7500 GOPS).
       - CPU Compute: ~100 GOPS.
    2. **Calculations:**
       - Option A (TPU Only): 2.2B params * 2 = 4.4 GOPS / 7500 GOPS = 0.58 ms/token.
       - Option B (CPU Fallback): 30% compute = 1.2 GOPS. CPU Time = 1.2 GOPS / 100 GOPS = 12 ms/token.
    3. **Conclusion & Interpretation:**
       - **Result: Compute Bottleneck on CPU.** Option B is heavily bottlenecked by CPU fallback, making 100% TPU delegation significantly faster despite the size increase.
