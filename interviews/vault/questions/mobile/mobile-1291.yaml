title: LLM TPU Delegation vs CPU Fallback on Tensor G3
scenario: You are deploying a 2B parameter INT8 LLM to the Google Tensor G3 (12 GB LPDDR5X). You must choose between two TFLite conversion strategies. Option A maps all operators to standard TFLite ops for 100% Edge TPU delegation (7.5 TOPS), but unrolling a custom attention op increases model size to 2.2B parameters. Option B retains the custom attention op, keeping the model at 2.0B parameters, but forces 30% of the model's compute to fall back to the CPU.
question: "Which TFLite strategy is faster on Tensor G3: 100% TPU delegation with 2.2B params or 30% CPU fallback at 2.0B?"
details:
  realistic_solution: Option A is the correct choice. The 12 GB LPDDR5X easily accommodates
    the 200MB memory increase (2.2GB total footprint in INT8). Avoiding CPU fallback
    is critical because alternating execution between the CPU and TPU for every token
    completely bottlenecks generation latency due to synchronization limits and the
    TPU's massive compute advantage (7.5 TOPS).
  common_mistake: |
    **The Pitfall:** Choosing partial CPU fallback to save memory.
    **The Rationale:** Candidates assume that 70% TPU delegation is "good enough" or that 200MB memory savings justify the fallback, ignoring the massive latency penalty of alternating execution between CPU and TPU.
    **The Consequence:** Auto-regressive decoding speed is completely bottlenecked by synchronization overhead and CPU slowness.
  napkin_math: |
    - Compute per token: 2B params × 2 = 4 GOPS.
    - Option A (TPU Only): 4 GOPS / 7500 GOPS (7.5 TOPS) = 0.53 ms/token.
    - Option B (CPU Fallback): 30% compute = 1.2 GOPS on CPU.
    - CPU Time: 1.2 GOPS / 100 GOPS = 12 ms/token.
    - **Conclusion:** Option B is at least 20× slower strictly on compute, even before factoring in the severe memory copy overhead between CPU and TPU.
