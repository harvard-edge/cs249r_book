title: 'MLOps Lifecycle: Specify A/B Test Framework for On-Device Model Comparison'
scenario: Specify an A/B testing framework for comparing two on-device speech recognition models in a voice assistant app with 10M DAU. The new model is 5MB larger but claims 8% WER improvement.
question: How would you specify an A/B testing framework for comparing these models, defining sample size, assignment, metrics, and decision criteria?
details:
  realistic_solution: 'Define a controlled A/B rollout framework: 1. Assignment: Hash the device ID to assign users to control (old model) or treatment (new model) groups persistently. 2. Metrics: Primary is Word Error Rate (WER); secondary is user engagement. 3. Guardrails: Monitor NPU utilization, memory OOMs, and battery drain. 4. Decision: Roll out if treatment achieves the 8% relative WER improvement with < 2% battery regression.'
  common_mistake: |
    **The Pitfall:** Failing to track on-device resource constraints like battery drain or memory usage.
    **The Rationale:** Candidates focus solely on model accuracy metrics (WER) and ignore the physical impact of a larger model on the device.
    **The Consequence:** The new model might improve accuracy but cause aggressive battery drain, leading to increased app uninstalls.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Detect 8% relative improvement on a baseline 10% WER (9.2% absolute).
       - 80% power and 95% confidence.
       - 10M DAU averaging 2 queries/day = 20M queries/day.
    2. **Calculations:**
       - Approx 20,000 utterances per arm are needed.
       - A 1% canary deployment exposes 100K users (200K queries/day).
    3. **Conclusion & Interpretation:**
       - **Result: Fast Convergence. A 1% canary deployment achieves statistical significance in just a few hours.**
