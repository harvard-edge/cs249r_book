title: 'MLOps Lifecycle: Specify A/B Test Framework for On-Device Model Comparison'
scenario: 'Specify an A/B testing framework for comparing two on-device speech recognition
  models on Snapdragon 8 Gen 3 (45 TOPS) in a voice assistant app with 10M DAU. The
  new model is 5MB larger but claims 8% WER improvement. Define: sample size calculation,
  assignment strategy, metric collection, guardrail metrics, and decision criteria.'
question: How would you specify an A/B testing framework for comparing two on-device
  speech recognition models on Snapdragon 8 Gen 3 (45 TOPS) in a voice assistant app
  with 10M DAU?
details:
  realistic_solution: 'Define a controlled A/B rollout framework: 1. Assignment: Hash
    the device ID to assign users to control (old model) or treatment (new model)
    groups persistently. 2. Metrics: Primary is Word Error Rate (WER); secondary is
    user engagement. 3. Guardrails: Monitor NPU utilization, memory OOMs, and battery
    drain. 4. Decision: Roll out if treatment achieves the 8% relative WER improvement
    with < 2% battery regression.'
  common_mistake: 'Failing to track on-device resource constraints like battery drain
    or memory usage. The new model might be more accurate but could aggressively drain
    the battery, leading to uninstalls.'
  napkin_math: 'To detect an 8% relative improvement on a baseline 10% WER (meaning
    9.2% absolute) with 80% power and 95% confidence, we need approx 20,000 utterances
    per arm. With 10M DAU averaging 2 queries/day, a 1% canary deployment exposes
    100K users (200K queries/day), allowing statistical significance to be reached
    in just a few hours.'
