title: 'KV-Cache: Design Multi-Turn KV Cache Persistence for Mobile App Switching'
scenario: Your LLM chat app runs on a flagship edge device with limited unified memory. It must survive OS app switching, where backgrounding the app forces eviction of the KV cache from RAM.
question: How would you design a KV cache persistence strategy that allows resuming conversation within 3 seconds of app foreground?
details:
  realistic_solution: |
    A highly optimized solution avoids serializing the massive KV cache tensors to flash storage altogether. Instead, persist only the token IDs and conversation history in a lightweight SQLite or JSON format. Upon app foreground, trigger a highly optimized, compute-bound prefill phase to regenerate the KV cache from scratch using the NPU. Because NPU matrix multiplication throughput is extremely high, re-processing thousands of tokens takes a fraction of a second, which is vastly faster than reading hundreds of megabytes from slow mobile flash storage (NVMe/UFS).
  common_mistake: |
    **The Pitfall:** Storing the full KV cache to flash memory upon app backgrounding.
    **The Rationale:** Candidates mistakenly treat the KV cache as application state that must be strictly saved to disk, without calculating I/O transfer latencies.
    **The Consequence:** Unacceptable resume times exceeding 3 seconds, coupled with severe flash memory degradation (wear leveling issues) due to constantly writing gigabytes of tensors.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Target Resume Latency: < 3 seconds.
       - Model: 1B parameters. Context length: 2048 tokens.
       - Flash Read Speed: ~1.5 GB/s. NPU Compute: ~35 TOPS.
    2. **Calculations:**
       - Recompute Prefill Compute: 2 * 1B params * 2048 tokens = 4.096 TFLOPs.
       - Recompute Time (Compute-Bound): 4.096 TFLOPs / 35 TOPS = ~117 ms.
       - KV Cache Memory Size (1B model, 2048 tokens): ~200-300 MB.
       - Flash Read Time (I/O-Bound): 300 MB / 1.5 GB/s = ~200 ms.
    3. **Conclusion & Interpretation:**
       **Result: 117ms compute vs 200ms flash read (Compute vs I/O tradeoff).** Re-running the prefill from saved tokens is empirically faster and prevents catastrophic write-wear on the device's flash memory.
