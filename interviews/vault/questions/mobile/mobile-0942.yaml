title: 'KV-Cache: Design Multi-Turn KV Cache Persistence for Mobile App Switching'
scenario: Your LLM chat app on A17 Pro (35 TOPS, 8GB) needs to survive iOS app switching (app may be backgrounded and KV cache evicted by OS).
question: How would you design a KV cache persistence strategy that allows resuming conversation within 3 seconds of app foreground?
details:
  realistic_solution: |
    1B model decode on 35 TOPS device: 2 GFLOPs / 35 TOPS = ~0.06ms at peak, ~0.7ms with realistic utilization. Units are GFLOPs (not TFLOPs) and time is milliseconds (not seconds).
  common_mistake: |
    **The Pitfall:** Storing the full KV cache to flash memory.
    **The Rationale:** Candidates do not calculate the IO latency and don't consider that recomputing KV from saved tokens is often faster than reloading gigabytes from flash.
    **The Consequence:** Unacceptable resume times exceeding the 3-second target.
  napkin_math: |
    - **Prefill Compute:** 2 * 1B params * 2048 tokens = 4.096 TFLOPs.
    - **Theoretical Prefill Time:** 4.096 TFLOPs / 35 TOPS = 117 ms.
    - **Decode Step:** 2 GFLOPs / 35 TOPS = ~0.057 ms/token (theoretical). With overhead, ~0.70 ms per token.
    - **Result:** **Re-running a 2048-token prefill from scratch takes ~117ms, which is vastly faster than reading hundreds of megabytes of KV tensors from mobile flash.**
