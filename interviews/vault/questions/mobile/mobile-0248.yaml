title: The A17 NPU Bottleneck
scenario: You're an iOS developer optimizing a new generative AI feature that runs on the Apple A17 Pro's Neural Engine (35 TOPS, 51.2 GB/s memory bandwidth). Your profiler shows that a critical layer performs 50 Giga-ops (INT8) and reads 200MB of data from memory (weights and activations) for each inference.
question: Is an A17 Pro layer with 50 GOps and 200 MB of memory traffic memory-bound or compute-bound?
details:
  realistic_solution: The layer is memory-bound. To determine this, we first calculate the A17 Pro's 'ridge point,' which is its ratio of peak compute to peak memory bandwidth. Then we calculate the workload's 'arithmetic intensity,' which is its ratio of operations to data moved. Since the workload's intensity is below the hardware's ridge point, performance is limited by memory bandwidth, not compute.
  common_mistake: |
    **The Pitfall:** Focusing solely on the headline TOPS number and assuming performance is compute-bound.
    **The Rationale:** Engineers assume that if latency is high, they need more compute power, failing to realize the compute units might be starved for data from memory.
    **The Consequence:** Optimization efforts are misdirected toward reducing FLOPs (which won't help) instead of reducing memory traffic or increasing arithmetic intensity.
  napkin_math: |
    1. **Arithmetic Intensity (AI):** 50 Giga-ops / 200 MB = 50,000,000,000 / 200,000,000 = 250 Ops/Byte.
    2. **Hardware Ridge Point:** 35 TOPS / 51.2 GB/s = 35,000 GOPS / 51.2 GB/s = 683.6 Ops/Byte.
    3. **Comparison:** 250 Ops/Byte < 683.6 Ops/Byte.
    **Result:** Because the layer's arithmetic intensity (250) is well below the hardware's ridge point (683.6), it is heavily **memory-bound**.
  options:
  - Compute-bound, because the required 50 Giga-ops exceeds the capacity of the NPU.
  - Memory-bound, because the memory bandwidth number (51.2) is much smaller than the compute number (35,000).
  - Memory-bound, because its arithmetic intensity (250 Ops/Byte) is below the A17's ridge point (~683 Ops/Byte).
  - Compute-bound, because its arithmetic intensity (250 Ops/Byte) is high, indicating a heavy compute load.
  correct_index: 2
