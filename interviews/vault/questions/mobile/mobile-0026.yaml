title: The On-Device Model Encryption Dilemma
scenario: Your company spent $2M training a proprietary image segmentation model. You ship it as a Core ML `.mlmodelc` bundle on iOS and a TFLite `.tflite` flatbuffer on Android. A competitor extracts your model from the IPA/APK in 10 minutes using standard tools.
question: How can Core ML and TFLite on-device model bundles be protected after a competitor extracts them in 10 minutes?
details:
  realistic_solution: 'Defense-in-depth with hardware-backed protection: Extraction time without protection: ~10 minutes (unzip IPA, find `.mlmodelc`). With Core ML encryption: requires Secure Enclave exploit (estimated cost: $500K+ for a zero-day). With Android split architecture: attacker gets the embedding model but not the classifier.'
  common_mistake: |
    **The Pitfall:** Encrypting the model file with AES-256 and decrypting it at runtime in memory.
    **The Rationale:** Assuming file-at-rest encryption protects against reverse engineering.
    **The Consequence:** The model lives in memory in plaintext during inference; an attacker simply dumps the process memory on a jailbroken device to extract the IP.
  napkin_math: |
    - Extraction time without protection: ~10 minutes (unzip IPA, find `.mlmodelc`).
    - Core ML Encryption: Requires Secure Enclave zero-day exploit.
    - Estimated cost of exploit: ~$500K+.
    - **Result: Relying on hardware-backed OS encryption drastically raises the cost of attack compared to software-only obfuscation.**
  options:
  - 'Defense-in-depth with hardware-backed protection: Core ML encryption (requires Secure Enclave exploit) and Android split architecture.'
  - 'Encrypt the model file with AES-256 and decrypt it at runtime. This protects the file at rest, but the decrypted model must live in memory during inference.'
  - 'Use ProGuard or DexGuard to obfuscate the app''s Java/Swift code, which automatically encrypts the bundled assets like ML models.'
  - 'Deploy the models as dynamic libraries (.so or .dylib) instead of flatbuffers, which prevents them from being reverse-engineered.'
