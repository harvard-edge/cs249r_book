title: The On-Device Model Encryption Dilemma
scenario: Your company spent $2M training a proprietary image segmentation model. You ship it as a Core
  ML `.mlmodelc` bundle on iOS and a TFLite `.tflite` flatbuffer on Android. A competitor extracts your
  model from the IPA/APK in 10 minutes using standard tools. How do you protect your model IP on-device?
details:
  realistic_solution: 'Defense-in-depth with hardware-backed protection: Extraction time without protection:
    ~10 minutes (unzip IPA, find `.mlmodelc`). With Core ML encryption: requires Secure Enclave exploit
    (estimated cost: $500K+ for a zero-day). With Android split arch'
  common_mistake: '"Encrypt the model file with AES-256 and decrypt it at runtime." This protects the
    file at rest, but the decrypted model must live in memory during inference. On a jailbroken iPhone
    or rooted Android, an attacker can dump the process memory and recover the full model in plaintext.
    You''ve added complexity without real protection.'
  napkin_math: 'Extraction time without protection: ~10 minutes (unzip IPA, find `.mlmodelc`). With Core
    ML encryption: requires Secure Enclave exploit (estimated cost: $500K+ for a zero-day). With Android
    split architecture: attacker gets embedding model but not classifier. Server round-trip: 512 floats
    × 4 bytes = 2 KB upload, ~50 ms on LTE. At 100 inferences/day: 200 KB bandwidth/day — negligible.
    Watermark detection: 95% confidence with 50 output samples from the suspect model.'
  options:
  - 'Defense-in-depth with hardware-backed protection: Extraction time without protection: ~10 minutes
    (unzip IPA, find `.mlmodelc`). With Core ML encryption: requires Secure Enclave exploit (estimated
    cost: $500K+ for a zero-day). With Android split arch'
  - Encrypt the model file with AES-256 and decrypt it at runtime.. This protects the file at rest, but
    the decrypted model must live in memory during inference.
  - Network I/O is the dominant bottleneck; optimizing the model or inference pipeline will have minimal
    impact on end-to-end latency.
  - The accuracy degradation is caused by numerical instability in the framework's matrix multiplication
    kernels, not by the model or data.
