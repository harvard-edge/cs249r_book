title: Mitigating Mobile DRAM Thermal Throttling
scenario: A real-time video segmentation app running on a Snapdragon 8 Gen 3 Hexagon
  NPU exhibits severe frame drops after 2 minutes. Profiling reveals the LPDDR5 memory
  controller is thermally throttling due to continuous off-chip activation writes.
question: Formulate an architectural change to the model's execution strategy to eliminate
  off-chip intermediate activation memory traffic.
details:
  realistic_solution: The thermal throttling is caused by heavy DRAM bandwidth utilization
    from writing and reading intermediate feature maps between layers. By aggressively
    applying operator fusion (e.g., fusing Conv2D + BatchNorm + ReLU) or utilizing
    tiling strategies, the intermediate activations can be held entirely within the
    NPU's local SRAM cache. This completely drops off-chip intermediate write traffic
    to 0.
  common_mistake: Proposing to increase the NPU clock speed or reduce precision, neither
    of which solves the architectural issue of writing intermediate states to main
    memory.
  napkin_math: 100% off-chip -> 0% DRAM writes if fused
