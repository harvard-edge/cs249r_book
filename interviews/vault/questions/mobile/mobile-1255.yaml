title: Architecting a Thermal-Aware Real-Time Video Processing Pipeline
scenario: You are designing a continuous 4K video background blur feature for a video conferencing app running on a mobile SoC. After 5 minutes of continuous execution, the SoC begins to thermally throttle, dropping the NPU clock speed and causing frames to drop below the required 30 FPS target.
question: Propose a system-level design to maintain acceptable real-time performance indefinitely under sustained thermal constraints without severely degrading the user experience.
details:
  realistic_solution: |
    Implement a multi-tier, thermal-aware cascade. Initially, run a high-fidelity model on the NPU. Monitor OS-level thermal state APIs. When a 'Serious' or 'Critical' thermal state is approached, dynamically hot-swap to a heavily quantized, lower-resolution model, or reduce the inference frequency (e.g., infer every third frame and use lightweight optical flow/temporal tracking for intermediate frames). This reduces the NPU active duty cycle and drops average power below the sustained thermal envelope.
  common_mistake: |
    **The Pitfall:** Shifting the exact same workload to the CPU or GPU.
    **The Rationale:** Candidates incorrectly assume the CPU/GPU are unaffected by the thermal envelope, forgetting they share the same physical silicon die and cooling limits.
    **The Consequence:** The entire SoC overheats faster, leading to aggressive OS-level throttling or device shutdown, ruining the video call.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - NPU Peak Power: 5W.
       - Sustained Thermal Budget: 2W.
       - Target Framerate: 30 FPS (33.3 ms/frame).
    2. **Calculations:**
       - Max allowable duty cycle: 2W / 5W = 0.40 (40%).
       - Max active inference time per frame: 33.3 ms * 0.40 = 13.3 ms.
       - If the high-fidelity model takes 20 ms/frame, it exceeds the 13.3 ms budget, inevitably causing thermal throttling.
    3. **Conclusion & Interpretation:**
       - **Active inference time per frame must fall under 13.3 ms to sustain 30 FPS at 2W. Bottleneck: Thermal/Power-Bound.**
