title: 'Roofline Analysis on Apple A17 Pro: Identifying Bottlenecks for Mobile ML Workloads'
scenario: You are tasked with optimizing a new on-device ML model for deployment on the Apple A17 Pro, which features a 35 TOPS Neural Engine and 8 GB of unified memory, operating within a ~5W power budget. Your initial profiling shows that the model achieves only 10% of the A17 Pro Neural Engine's theoretical peak performance.
question: Using the Roofline Model, how would you approach diagnosing whether this poor utilization is due to compute-bound or memory-bound limitations for a typical mobile inference workload?
details:
  realistic_solution: 'The realistic solution involves collecting key operational intensity (OI) and peak performance metrics. First, determine the peak compute (35 TOPS for FP16/INT8) and peak memory bandwidth (e.g., LPDDR5X for A17 Pro, typically 50-70 GB/s for unified memory) for the A17 Pro. Then, for the specific ML model, calculate its operational intensity (FLOPs/Byte or OPs/Byte) by dividing the total operations by the total memory access. Plot the model''s OI on the Roofline chart. If the model''s OI falls below the intersection point of the compute ceiling and memory bandwidth ceiling, it is memory-bound; if it falls above, it''s compute-bound. This immediately directs optimization efforts: for memory-bound workloads, focus on reducing memory transfers (e.g., quantization, sparse models, data reuse, fusion); for compute-bound, focus on parallelism, efficiency, and core utilization.'
  common_mistake: |
    **The Pitfall:** Optimizing compute when the bottleneck is memory.
    **The Rationale:** Candidates focus solely on theoretical peak TOPS and optimize arithmetic operations without calculating operational intensity.
    **The Consequence:** They waste effort on loop unrolling or core utilization (compute optimizations) when the NPU is actually starved for data, yielding zero real-world speedup.
  napkin_math: |
    - Peak Compute (P_compute): 35 TOPS (35,000 GOPS).
    - Peak Bandwidth (B_mem): ~60 GB/s.
    - Ridge Point: 35,000 GOPS / 60 GB/s ≈ **583 OPs/Byte**.
    - If a model's Operational Intensity (OI) < 583 OPs/Byte, it is memory-bound.
    - Example: If OI = 100 OPs/Byte, theoretical peak is 100 * 60 GB/s = 6 TOPS (far below 35 TOPS).
