title: 'Roofline Analysis on Apple A17 Pro: Identifying Bottlenecks'
scenario: You are optimizing an on-device ML model for an NPU with 35 TOPS and 60 GB/s bandwidth. Profiling shows the model achieves only 10% of theoretical peak performance.
question: Using the Roofline Model, how would you diagnose whether this poor utilization is due to compute-bound or memory-bound limitations?
details:
  realistic_solution: Utilize nsys profiling to determine the model's Operational Intensity (FLOPs/Byte). Plot this against the hardware's Ridge Point (35 TOPS / 60 GB/s = 583 OPs/Byte). If the model's OI is below 583, it is strictly memory-bandwidth bound. Optimization must pivot from loop unrolling to structural memory reductions like Top-K Sparsification, KV-Cache quantization, or aggressive operator fusion to boost Arithmetic Intensity.
  common_mistake: |
    **The Pitfall:** Optimizing compute when the bottleneck is memory.
    **The Rationale:** Candidates focus solely on theoretical peak TOPS and optimize arithmetic operations without calculating operational intensity.
    **The Consequence:** They waste effort on loop unrolling or core utilization (compute optimizations) when the NPU is actually starved for data, yielding zero real-world speedup.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Peak Compute (P_compute): 35 TOPS (35,000 GOPS).
       - Peak Bandwidth (B_mem): 60 GB/s.
    2. **Calculations:**
       - Ridge Point: 35,000 GOPS / 60 GB/s = 583.3 OPs/Byte.
    3. **Conclusion & Interpretation:**
       - **Result: Ridge Point 583 OPs/Byte.** Any layer with an OI < 583 is strictly **Memory-Bandwidth-Bound**.
