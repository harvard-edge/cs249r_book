title: 'Specification: model format and versioning requirements for cross-platform mobile CNN deployment'
scenario: Your team needs to deploy a MobileNetV3-Large variant on both iOS (Core ML) and Android (QNN). The models share the same PyTorch weights but must be optimized for each platform.
question: What packaging, versioning, and validation spec should govern cross-platform MobileNetV3 deployment to Core ML and QNN?
details:
  realistic_solution: 'Spec: (1) Single source of truth: PyTorch FP32 checkpoint with architecture flag (ACTIVATION: hardswish for cross-platform compatibility, no SE blocks); (2) Export artifacts: .mlpackage for iOS, .serialized_bin for QNN; (3) Versioning: semantic versioning model_v{major}.{minor}.{patch} — major=architecture change, minor=fine-tune data update, patch=quantization calibration update; (4) Validation gate: both exports must pass accuracy within 1% of PyTorch baseline on 500-image canonical test set before release; (5) Artifacts stored in S3 with SHA256 checksums; (6) A/B test framework: device-side version selection via remote config with automatic rollback if error rate increases >5%.'
  common_mistake: |
    **The Pitfall:** Maintaining separate training checkpoints for iOS and Android.
    **The Rationale:** Teams often fork checkpoints instead of maintaining a single source of truth with platform-specific export pipelines.
    **The Consequence:** Divergent model versions, reproducibility nightmares, and duplicated training costs.
  napkin_math: |
    **Assumptions & Constraints:**
    - PyTorch FP32 = 21.6 MB. Core ML INT8 = 6 MB. QNN INT8 = 7 MB.
    - 1M users, 1 update/month.
    - Canonical test set = 500 images.

    **Calculations:**
    - Total CDN Payload per user = 6 MB (iOS) or 7 MB (Android).
    - Total CDN Bandwidth = 1M * 6 MB = 6 TB/month (≈$138/month).
    - Validation Time = 500 images * 2 platforms = 1000 inferences. At 2 ms each = 2.0 seconds.

    **Conclusion & Interpretation:**
    - **Result: 2-second CI validation (Operational-efficiency-bound architecture)**. A single-source-of-truth export pipeline is both extremely fast and cheap to maintain at scale.
