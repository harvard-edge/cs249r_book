title: 'Specification: model format and versioning requirements for cross-platform
  mobile CNN deployment'
scenario: Your team needs to deploy a MobileNetV3-Large variant on both iPhone 15
  Pro (A17 Pro, Core ML) and Samsung Galaxy S24 (Snapdragon 8 Gen 3, QNN). The models
  share the same PyTorch weights but must be optimized for each platform. Write the
  specification for the model packaging, versioning, and validation pipeline.
question: What packaging, versioning, and validation spec should govern cross-platform
  MobileNetV3 deployment to Core ML and QNN?
details:
  realistic_solution: 'Spec: (1) Single source of truth: PyTorch FP32 checkpoint with
    architecture flag (ACTIVATION: hardswish for cross-platform compatibility, no
    SE blocks); (2) Export artifacts: .mlpackage for iOS, .serialized_bin for QNN;
    (3) Versioning: semantic versioning model_v{major}.{minor}.{patch} — major=architecture
    change, minor=fine-tune data update, patch=quantization calibration update; (4)
    Validation gate: both exports must pass accuracy within 1% of PyTorch baseline
    on 500-image canonical test set before release; (5) Artifacts stored in S3 with
    SHA256 checksums; (6) A/B test framework: device-side version selection via remote
    config with automatic rollback if error rate increases >5%.'
  common_mistake: Maintaining two separate training checkpoints for iOS and Android
    rather than a single canonical PyTorch checkpoint with platform-specific export
    pipelines; this leads to divergent model versions and reproducibility issues.
  napkin_math: 'Model artifacts per version: PyTorch checkpoint: 21.6MB (FP32, 5.4M
    params × 4B). Core ML INT8 .mlpackage: ~6MB. QNN serialized INT8: ~7MB. CDN storage
    per version: 35MB. At 10 versions/year: 350MB CDN storage = $0.007/month (S3 standard).
    Download bandwidth: 1M active users × 1 update/month × 6MB (mobile downloads compressed
    model) = 6TB/month = $138/month CDN egress. Validation pipeline: 500 images ×
    2 platforms × 10 versions = 10,000 model inferences. At 2ms each: 20 seconds total
    CI validation time.'
