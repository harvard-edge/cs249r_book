title: 'Network Bandwidth Bottlenecks: Evaluate WiFi vs. Cellular Bandwidth for Mobile Cloud ML'
scenario: A mobile app offers hybrid inference. It defaults to a cloud API (H100) when WiFi is available, and falls back to an on-device 1B INT4 LLM (Time Per Output Token: 7.4ms on A17 Pro). The cloud API achieves 7.8ms TPOT but adds network RTT. You are evaluating end-to-end latency for a 128-token response across three networks: WiFi 802.11ax (2.4Gbps, 5ms RTT), 5G mmWave (4Gbps, 10ms RTT), and 4G LTE (100Mbps, 50ms RTT).
question: At what network RTT condition does the on-device model outperform the cloud model for a 128-token generation?
details:
  realistic_solution: 'Because the on-device model''s generation speed (7.4ms/token) is actually faster than the cloud''s generation speed (7.8ms/token), the cloud approach will never be faster. The network RTT simply adds fixed latency overhead. Even if the cloud upgraded to a massive 70B model, the generation time would be slower, further cementing the on-device latency advantage. The cloud should only be used if the 1B on-device model lacks the quality required for the specific task.'
  common_mistake: |
    **The Pitfall:** Over-focusing on network bandwidth (Gbps) while ignoring Round Trip Time (RTT).
    **The Rationale:** Candidates calculate the time to transmit 128 tokens over 5G and realize it takes microseconds, incorrectly assuming the cloud will be instantly faster.
    **The Consequence:** Architecting a complex network-switching heuristic that always routes to the cloud on WiFi/5G, resulting in a slower user experience due to fixed RTT and prefill delays.
  napkin_math: |
    - **On-Device 1B:** 128 tokens × 7.4 ms = 947 ms total.
    - **Cloud 13B H100:** Prefill (assume 27ms) + Decode (128 × 7.8 ms) = 1025 ms + RTT.
    - **Comparison 1:** 1025 ms + RTT is strictly greater than 947 ms. On-device is always faster.
    - **Cloud 70B INT4 (Hypothetical upgrade):** Decode = 35 GB weights / 3.35 TB/s memory bandwidth = 10.4 ms/token.
    - **Comparison 2:** 128 × 10.4 ms = 1331 ms + RTT. 
    - **Result:** **On-device E2E latency (947 ms) fundamentally wins against the cloud approach across all realistic network conditions due to its faster TPOT and zero RTT overhead.**
