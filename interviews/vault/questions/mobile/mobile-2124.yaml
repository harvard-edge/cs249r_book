title: 5G FL Pipeline Bubble
scenario: A federated edge pipeline uses 4 mobile devices over 5G NR (100 Mbps uplink)
  to partition a 50MB model update via micro-batches.
question: Evaluate the pipeline bubble fraction if using 8 micro-batches per device,
  where each pass takes 50ms and 5G scheduling adds a 10ms barrier per micro-batch.
details:
  realistic_solution: The pipeline bubble fraction follows the (p-1)/m scaling law,
    where p is the number of stages (devices) and m is the number of micro-batches.
    The 5G scheduling barrier extends the step time but doesn't change the geometric
    bubble ratio of the pipeline fill/drain phases.
  common_mistake: Using infinite bandwidth assumptions for mobile uplink or calculating
    raw step times without recognizing the geometric (p-1)/m bubble fraction.
  napkin_math: p=4 stages, m=8 microbatches. Bubble fraction = (4-1) / 8 = 3/8 = 37.5%.
