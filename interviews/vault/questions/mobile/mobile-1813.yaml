title: 'WebAssembly SIMD as a Universal Mobile Inference Backend'
scenario: 'Your team proposes using ONNX Runtime Web with WebAssembly SIMD as a truly portable inference backend that works on any mobile browser (Safari, Chrome) without platform-specific code.'
question: 'How would you evaluate whether WASM SIMD can replace native mobile inference for a MobileNetV2 model?'
details:
  realistic_solution: 'WASM SIMD comparison for MobileNetV2: (1) Native TFLite with XNNPACK on ARM CPU: ~8ms on Snapdragon 8 Gen 3. (2) WASM SIMD in Chrome on same device: ~35-50ms (4-6x slower due to sandbox overhead, lack of cache control, and JavaScript interop costs). (3) Native with NPU delegate: ~2ms. WASM SIMD is 17-25x slower than NPU. Verdict: WASM SIMD is viable only for non-latency-critical workloads (batch processing, background analysis) or as a development/prototyping tool. For real-time inference (camera, AR), native runtimes with hardware acceleration are required.'
  common_mistake: |
    **The Pitfall:** Overestimating WASM SIMD's performance relative to native hardware.
    **The Rationale:** Developers hear '128-bit SIMD' and assume it guarantees near-native, real-time performance.
    **The Consequence:** Deploying WASM SIMD for real-time tasks (AR, camera processing) and encountering severe UI lag and latency.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model Compute: MobileNetV2 requires ~300M MACs.
    - Native NPU (45 TOPS): 0.007 ms compute + 1.5 ms overhead = ~2 ms.

    **Calculations:**
    - Native ARM NEON CPU: ~8 ms.
    - WASM SIMD (Browser Sandbox): 4-6x overhead vs NEON = 32-48 ms.

    **Conclusion & Interpretation:**
    - **Result: 32-48 ms (Compute-Bound)**. WASM SIMD is 17-25x slower than an NPU, completely unsuitable for latency-critical tasks.
