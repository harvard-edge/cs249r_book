title: On-Device LLM Sizing for Apple A17 Pro
scenario: You are tasked with deploying a 7-billion parameter language model for real-time translation on a device utilizing the Apple A17 Pro Neural Engine. The system must leave enough memory for the OS and foreground apps.
question: How should a 7B LLM be sized and partitioned to fit within the 8 GB unified memory while efficiently leveraging the Neural Engine?
details:
  realistic_solution: A realistic approach quantizes the 7B model to 4-bit (INT4) to reduce the weight footprint to about 3.5 GB. The design must reserve roughly 1.5 GB for the KV cache and inference activations, leaving 3 GB for the OS out of the 8 GB shared pool. The strategy maps compute-heavy matrix multiplications to the 16-core Neural Engine to leverage its 35 TOPS within the tight ~5W power budget.
  common_mistake: |
    **The Pitfall:** Assuming the entire 8 GB of unified memory is available for the model.
    **The Rationale:** Forgetting to account for the OS footprint and the dynamic KV cache required during text generation.
    **The Consequence:** The OS forcefully evicts the application or crashes due to memory exhaustion.
  napkin_math: |
    1. 7B parameters at FP16 = 14 GB (fails).
    2. Quantizing to INT4 = 3.5 GB for weights.
    3. Total memory: 8 GB - 3.5 GB weights - 1.5 GB KV cache = **3.0 GB remaining for iOS.**
    4. Compute: 20 tokens/s requires ~280 GOPS, easily utilizing the 35 TOPS NPU.
