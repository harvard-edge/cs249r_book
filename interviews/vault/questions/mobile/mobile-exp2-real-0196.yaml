title: Sustained Thermal Budgeting for Continuous LLMs
scenario: You are deploying a continuous live-translation feature using Gemini Nano on the Google Tensor
  G3. The product team expects the model to process audio streams continuously, pushing the on-device
  TPU towards its 7.5 TOPS peak. However, continuous execution rapidly hits the device's thermal limits,
  causing severe throttling that degrades the entire OS experience. You must design a deployment strategy
  and quantify the sustained throughput limit to maintain thermal equilibrium while leveraging the 12
  GB LPDDR5X memory.
details:
  realistic_solution: The optimal approach is to operate the TPU at a lower, more efficient frequency
    curve and heavily batch the incoming audio streams. Instead of continuous processing, the system should
    process chunks of audio in bursts and then force the TPU and memory into a low-power state. If ambient
    temperatures rise, the system must dynamically scale down the processing rate or offload to the cloud
    before OS-level thermal mitigation forcibly degrades performance.
  common_mistake: Candidates often size the system based on the 7.5 TOPS peak compute, ignoring the reality
    that mobile chips cannot sustain peak power without thermal throttling. They also frequently overlook
    the thermal contribution of keeping the 12 GB LPDDR5X memory continuously active, failing to implement
    memory-aware duty cycling.
  napkin_math: 'Tensor G3 TPU Peak: 7.5 TOPS at an estimated 3.0W. Sustained thermal budget for background
    ML: ~1.5W. Assuming roughly linear power scaling, maximum sustained compute = (1.5W / 3.0W) * 7.5
    TOPS = 3.75 TOPS. Gemini Nano (3B params, INT4) requires a 1.5GB memory footprint. Compute per token
    is ~6 GOPS. Compute-bound sustained throughput = 3.75 TOPS / 6 GOPS = 625 tokens/s. However, memory
    bandwidth (assume 50 GB/s for LPDDR5X) limits generation to 50 GB/s / 1.5 GB = 33 tokens/s. To avoid
    exceeding the 1.5W total budget with continuous memory access, we batch audio into 1-second chunks,
    process at peak memory bandwidth for 300ms, and sleep for 700ms (30% duty cycle), safely managing
    the thermal envelope.'
