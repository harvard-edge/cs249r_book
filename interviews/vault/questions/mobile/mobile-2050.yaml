title: On-Device Personalization Constraints
scenario: "You are designing an on-device training system on an Apple A17 Pro to fine-tune a model's final classification layer."
question: "Create an execution architecture that performs this update without violating iOS battery and thermal background constraints."
details:
  realistic_solution: To avoid thermal throttling, freeze the base model and use the highly-efficient Neural Engine strictly for forward-pass feature extraction. The lightweight final layer is then trained on the CPU/GPU using background execution tasks (BGProcessingTaskRequest). Scheduling this task exclusively when the device is idle and plugged into power bypasses strict battery drain limitations.
  common_mistake: |
    **The Pitfall:** Attempting to train the entire model synchronously in the foreground.
    **The Rationale:** Candidates fail to understand iOS thermal throttling and battery drain limits.
    **The Consequence:** The OS immediately kills the application process.
  napkin_math: |
    - Neural Engine forward-pass feature extraction: `~100x` more energy efficient than CPU.
    - Train only the final layer on CPU/GPU via `BGProcessingTaskRequest`.
    - **Conclusion:** Scheduling the task exclusively when the device is **idle and plugged in** bypasses battery constraints entirely.
