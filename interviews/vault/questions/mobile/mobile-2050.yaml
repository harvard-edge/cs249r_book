title: On-Device Personalization Constraints
scenario: "You are designing an on-device training system on an Apple A17 Pro to fine-tune a model's final classification layer."
question: "Create an execution architecture that performs this update without violating iOS battery and thermal background constraints."
details:
  realistic_solution: |
    Freeze the base network weights and strictly use the A17 Neural Engine (ANE) for highly efficient, read-only feature extraction. Route the lightweight backpropagation and weight updates for the final dense layer to the CPU or GPU. Schedule the entire workflow using BGProcessingTaskRequest, triggering execution exclusively when the device is connected to unmetered power and idle, perfectly bypassing iOS thermal and battery constraints.
  common_mistake: |
    **The Pitfall:** Attempting to train the entire model synchronously in the foreground.
    **The Rationale:** Candidates fail to understand iOS thermal throttling and battery drain limits for compute-intensive tasks.
    **The Consequence:** The OS immediately kills the application process for resource abuse.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - ANE Forward Pass Efficiency: ~100x greater than CPU.
       - iOS constraint: Background tasks kill apps exceeding thermal/battery thresholds.
    2. **Calculations:**
       - Feature extraction (ANE): Ultra-low power, zero thermal throttling.
       - Final layer backprop (CPU/GPU): Marginal compute delta.
    3. **Conclusion & Interpretation:**
       - **Result: Zero battery drain impact.** Offloading to idle/plugged-in states via BGProcessingTaskRequest eliminates the **power and thermal bottleneck**.
