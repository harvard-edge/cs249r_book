title: On-Device LLM Battery Degradation Strategy
scenario: You are deploying a live transcription and summarization feature on the Google Tensor G3, optimized
  for an on-device LLM (Gemini Nano). The device features an on-device TPU capable of 7.5 TOPS and 12
  GB LPDDR5X RAM. Your primary pipeline requires 2.5 GB of memory and 6.0 TOPS of compute. When the device
  drops below 15% battery, the OS triggers a fail-safe mode that restricts the background ML memory budget
  to 1.5 GB and caps the TPU performance at 50% of its maximum to prevent shut-down. You must implement
  a quality-of-service shedding strategy using a fallback model that requires 1.2 GB of RAM and 2.5 TOPS.
  Calculate the deficits and prove if this degradation ladder keeps the system fail-operational.
details:
  realistic_solution: The correct approach is to simultaneously evaluate both the compute and memory constraints
    during the degraded state. By explicitly calculating the throttled TPU capacity and the restricted
    memory budget, you can verify that shifting to the smaller fallback model effectively sheds load and
    maintains a fail-operational state without triggering OOM kills.
  common_mistake: Candidates often focus only on the compute deficit (TOPS) and forget to calculate the
    hard memory constraints imposed by the OS, or they fail to calculate the absolute throttled limits
    correctly based on the hardware maximums.
  napkin_math: '1. Hardware Maximums: 7.5 TOPS (TPU), 12.0 GB (LPDDR5X).

    2. Degraded System Limits: Compute = 7.5 TOPS * 0.50 = 3.75 TOPS. Memory Budget = 1.5 GB.

    3. Primary Pipeline Demands: 6.0 TOPS, 2.5 GB RAM.

    4. Primary Deficit: Compute = 6.0 - 3.75 = 2.25 TOPS over budget. Memory = 2.5 - 1.5 = 1.0 GB over
    budget (System fails).

    5. Fallback Model Demands: 2.5 TOPS, 1.2 GB RAM.

    6. Fallback Evaluation: Compute (2.5 TOPS < 3.75 TOPS limit) fits. Memory (1.2 GB < 1.5 GB limit)
    fits. The system successfully degrades.'
