title: The On-Device Model Hot-Swap
scenario: Your app's ML model needs to be updated without an App Store update. The current model has a critical misclassification bug — it labels some food items as non-food, breaking your calorie tracking feature. An App Store update takes 24-48 hours for review.
question: "How do you push a model fix in under 1 hour?"
details:
  realistic_solution: Build dynamic model delivery within platform guidelines. Model weights are data, not executable code. CDN hosts versioned models with integrity hashes. App checks manifest on launch, downloads 25 MB over LTE in ~10 sec, validates with test inference (50ms), then performs atomic pointer swap (<1ms). Staged rollout ensures safety.
  common_mistake: |
    **The Pitfall:** Suggesting to ship the model as a server-side config to swap remotely.
    **The Rationale:** Engineers used to backend deployments assume models can be downloaded as executable code, unaware of mobile platform restrictions.
    **The Consequence:** This violates Apple's App Store Review Guidelines, leading to app rejection.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - CDN download speed: 2.5 MB/s (20 Mbps LTE).
       - Model size: 25 MB.
       - Validation inference: 50ms.
    2. **Calculations:**
       - CDN download time = 25 MB / 2.5 MB/s = 10 seconds.
       - Total update time per device = 10s + 50ms + 1ms = ~11 seconds.
       - Staged rollout: 1% (1hr) -> 10% (1hr) -> 50% (1hr) -> 100% (1hr) = 4 hours.
    3. **Conclusion & Interpretation:**
       - **Result: Delivery-Bound**. Total time to full fleet is 4 hours, vastly outperforming the 24-48h App Store review.
  options:
  - Ship the model as a server-side config and swap it remotely.
  - Model weights are executable code, taking 4 hours to recompile on device.
  - The solution is to reduce model complexity until it fits within the hardware constraints.
  - Build dynamic model delivery within platform guidelines using a CDN and atomic pointer swap.
