title: The On-Device Model Hot-Swap
scenario: Your app's ML model needs to be updated without an App Store update. The current model has a
  critical misclassification bug — it labels some food items as non-food, breaking your calorie tracking
  feature. An App Store update takes 24-48 hours for review. How do you push a model fix in under 1 hour?
details:
  realistic_solution: 'Build dynamic model delivery within platform guidelines. Model weights are data,
    not executable code (Apple compliant). CDN hosts versioned models with integrity hashes. App checks
    manifest on launch, downloads 25 MB over LTE in ~10 sec, validates with test inference (50ms), then
    performs atomic pointer swap (<1ms). Staged rollout: 1% -> 10% -> 50% -> 100% over 4 hours. Total:
    ~11 sec per device vs 24-48h App Store review. Always keep the previous model as fallback.'
  common_mistake: '"Ship the model as a server-side config and swap it remotely." This violates Apple''s
    App Store Review Guidelines §2.5.2 — apps may not download executable code. Model weights are not
    executable code, but the approach needs careful implementation.'
  napkin_math: 'Model size: 25 MB (INT8 classification model). CDN download at 20 Mbps LTE: 25 MB / 2.5
    MB/s = 10 seconds. Validation inference: 50ms. Swap: <1ms (pointer swap). Total update time per device:
    ~11 seconds. Staged rollout: 1% (1 hour) → 10% (1 hour) → 50% (1 hour) → 100% (1 hour) = 4 hours to
    full fleet. vs App Store: 24-48 hours review + user must manually update.'
  options:
  - Ship the model as a server-side config and swap it remotely.. This violates Apple's App Store Review
    Guidelines §2.5.2 — apps may not download executable code.
  - Using a larger model with more parameters will improve both accuracy and latency, because larger models
    have better computational efficiency.
  - The solution is to reduce model complexity until it fits within the hardware constraints, accepting
    the accuracy trade-off as unavoidable.
  - Build dynamic model delivery within platform guidelines. Model weights are data, not executable code
    (Apple compliant). CDN hosts versioned models with integrity hashes.
  correct_index: 3
