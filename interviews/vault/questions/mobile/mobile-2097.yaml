title: Multimodal Pipeline Interleaving
scenario: A multimodal on-device assistant running on a Snapdragon 8 Gen 3 (Hexagon
  NPU, 45 TOPS) is dropping frames when simultaneously processing a 1080p camera feed
  (30 FPS) and continuous audio transcription. The CPU, ISP, and NPU share the same
  LPDDR5X system bandwidth.
question: Design an optimized zero-copy data pipeline architecture that interleaves
  the visual and audio ML workloads without hitting memory bandwidth bottlenecks.
details:
  realistic_solution: Use hardware-bound memory buffers (e.g., Android HardwareBuffer)
    shared directly between the ISP, DSP, and NPU to avoid CPU round-trips. Interleave
    audio transcription bursts during the NPU idle cycles while the ISP handles the
    next visual frame, batching audio chunks to reduce context-switching latency.
  common_mistake: Assuming the NPU can infinitely multitask without context-switching
    penalties or needlessly copying data from ISP to CPU RAM before reaching the NPU.
  napkin_math: 30 FPS = 33.3ms/frame window. An audio chunk takes 5ms, leaving 28.3ms
    for visual processing without overlap contention.
