title: 'Multimodal Pipeline Interleaving'
scenario: 'A multimodal on-device assistant running on a Snapdragon 8 Gen 3 (Hexagon NPU, 45 TOPS) is dropping frames when simultaneously processing a 1080p camera feed (30 FPS) and continuous audio transcription.'
question: 'Design an optimized zero-copy data pipeline architecture that interleaves visual and audio ML workloads without hitting memory bandwidth bottlenecks.'
details:
  realistic_solution: 'Use hardware-bound memory buffers (e.g., Android HardwareBuffer) shared directly between the ISP, DSP, and NPU to avoid CPU round-trips. Interleave audio transcription bursts during the NPU idle cycles while the ISP handles the next visual frame, batching audio chunks to reduce context-switching latency.'
  common_mistake: |
    **The Pitfall:** Relying on CPU RAM copies between the ISP and NPU, and blindly running both threads concurrently.
    **The Rationale:** Developers apply standard asynchronous threading patterns without considering that all processors share a single LPDDR5X bus bottleneck.
    **The Consequence:** The shared memory bus thrashes, causing systemic frame drops and extreme power draw as components stall waiting for data.
  napkin_math: |
    **Assumptions & Constraints:**
    - Frame Window: 30 FPS allows a strict 33.3ms processing budget per frame.
    - Audio Cost: Processing a batched audio chunk takes 5ms on the DSP.

    **Calculations:**
    - Remaining Visual Budget: 33.3ms - 5ms = 28.3ms left for NPU vision processing.

    **Conclusion & Interpretation:**
    - **Result: Memory-Bandwidth-Bound**. Requiring strict sequential interleaving to prevent bus contention.
