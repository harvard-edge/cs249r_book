title: 'Network Bandwidth Bottlenecks: Optimize LLM TPOT via Weight Quantization on A17 Pro'
scenario: 'A 3B FP16 LLM (6GB) shows TPOT=88ms on A17 Pro (68 GB/s Neural Engine). Target is TPOT < 30ms.
  Evaluate three quantization strategies: (A) INT8 weight-only, (B) INT4 weight-only, (C) INT4 + INT4
  KV-cache. Quantify TPOT improvement and accuracy cost for each.'
question: "Which quantization strategy gets a 3B FP16 LLM on A17 Pro from 88 ms TPOT to under 30 ms?"
details:
  realistic_solution: 'FP16 baseline: 6GB / 68GB/s = 88.2ms. (A) INT8: 3GB / 68 = 44.1ms. Still > 30ms.
    (B) INT4: 1.5GB / 68 = 22.1ms ✓. Accuracy: GPTQ INT4 3B: ~0.5% MMLU drop. (C) INT4 + INT4 KV: KV for
    1 token is tiny vs weights. KV (3B, 32 layers, 32 heads, 128 dim, 1 token): 2×32×128×2B×32=524KB FP16.
    INT4 KV: 262KB. Saved: 262KB per token. Weight BW dominates (1.5GB >> 262KB). Total (C): 1.5GB+0.262MB/68=22.1ms
    (negligible KV gain). Recommendation: INT4 weight-only (B) sufficient, KV quantization unnecessary.'
  common_mistake: Assuming INT4 KV-cache halves KV read time proportionally; KV reads are typically much
    smaller than weight reads during decode, so INT4 KV has minimal impact on TPOT.
  napkin_math: 'FP16: 88ms. INT8: 44ms. INT4: 22ms ✓. KV per token (seq=1): 32×2×32×128×2B=524KB. INT4
    KV saves: 262KB per step. Total: 1.5GB+0.000262GB=1.500262GB. TPOT: 22.08ms. Effectively 0 improvement
    from INT4 KV. KV only matters at long contexts (1000+ tokens): 1000×262KB=262MB. INT4 saves 131MB
    of 1.5GB=8.7%. TPOT improvement: 22.1×0.913=20.2ms. Negligible for most use cases.'
