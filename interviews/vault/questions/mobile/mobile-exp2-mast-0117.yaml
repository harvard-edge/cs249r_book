validation_issues:
- The Napkin Math for KV Cache size at 4K context and FP16 calculation of '2.1 GB' is correct, but '4000
  * 32 * 4096 * 2 (K,V) * 2 bytes' as written computes 2 * 32 * 4096 * 2 bytes per *token* and then multiplies
  by 4000, which leads to an overestimation. The formula should use the head dimension, not hidden dimension
  for the KV cache per token.
- The memory bandwidth constraint calculation '15 tok/s * 3.5 GB weights = 52.5 GB/s memory bandwidth'
  is inaccurate as it implies loading 3.5GB of weights *per token*, which is incorrect for generative
  inference after initial prefill. It refers to the effective bandwidth for fetching parts of the weights
  as needed, but the phrasing is misleading.
