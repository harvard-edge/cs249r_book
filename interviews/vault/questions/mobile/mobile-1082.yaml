title: Mobile NPU Inference Cost Analysis on Snapdragon 8 Gen 3
scenario: Your team is deploying an INT8 quantized object detection model on a mobile
  device powered by a Qualcomm Hexagon NPU (Snapdragon 8 Gen 3). The NPU provides
  up to 45 TOPS INT8 performance, and the device has 12 GB of shared LPDDR5X memory
  between the CPU, GPU, and NPU. During benchmarking, you observe that despite the
  model requiring only 9 GOPS per inference, the maximum achievable frame rate on
  the NPU is bottlenecked significantly below the theoretical maximum compute throughput.
  Explain why the theoretical TOPS metric does not perfectly translate to the observed
  frame rate in this shared-memory mobile architecture.
question: Why the theoretical TOPS metric does not perfectly translate to the observed
  frame rate in this shared-memory mobile architecture?
details:
  realistic_solution: The discrepancy occurs because mobile NPU performance is often
    memory-bound rather than compute-bound. Even if the Hexagon NPU has a theoretical
    peak of 45 TOPS INT8, data must be fetched from the shared LPDDR5X memory to keep
    the compute units fed. The model requires 9 GOPS, but if the memory bandwidth
    cannot sustain the rate of fetching weights and activations (especially with other
    SOC components competing for bandwidth), the NPU will stall waiting for data,
    lowering the effective frame rate below the theoretical 5,000 FPS (45 TOPS / 9
    GOPS).
  common_mistake: Candidates often assume that compute throughput (TOPS) is the only
    limiting factor and directly divide TOPS by the model's operations to find the
    frame rate. They frequently overlook the memory bandwidth bottleneck, especially
    since the 12-16 GB LPDDR5X is shared across the CPU, GPU, and NPU, leading to
    memory contention during concurrent operations (like camera processing or display
    updates).
  napkin_math: Theoretical max compute frame rate = 45 TOPS (INT8) / 9 GOPS/frame
    = 45,000 GOPS / 9 GOPS = 5,000 FPS. If the model has 10 MB of weights/activations
    fetched per frame, and the shared LPDDR5X bandwidth available to the NPU is restricted
    to 20 GB/s due to CPU/GPU contention, the memory-bound frame rate = 20 GB/s /
    10 MB/frame = 2,000 FPS. Thus, the actual performance is bounded by memory bandwidth
    (2,000 FPS) rather than compute throughput (5,000 FPS).
