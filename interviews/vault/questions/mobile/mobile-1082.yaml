title: Mobile NPU Inference Cost Analysis on Snapdragon 8 Gen 3
scenario: You are deploying an INT8 quantized object detection model on a Snapdragon 8 Gen 3 NPU (45 TOPS, 12 GB shared LPDDR5X memory). During benchmarking, despite the model requiring only 9 GOPS per inference, the maximum achievable frame rate on the NPU is bottlenecked significantly below the theoretical maximum compute throughput.
question: Why does the Snapdragon 8 Gen 3 theoretical 45 TOPS metric not perfectly translate to the observed frame rate?
details:
  realistic_solution: The discrepancy occurs because mobile NPU performance is often memory-bound rather than compute-bound. Even if the Hexagon NPU has a theoretical peak of 45 TOPS INT8, data must be fetched from the shared LPDDR5X memory to keep the compute units fed. The model requires 9 GOPS, but if the memory bandwidth cannot sustain the rate of fetching weights and activations (especially with other SOC components competing for bandwidth), the NPU will stall waiting for data, lowering the effective frame rate below the theoretical 5,000 FPS (45 TOPS / 9 GOPS).
  common_mistake: |
    **The Pitfall:** Assuming compute throughput (TOPS) is the only limiting factor.
    
    **The Rationale:** Developers directly divide TOPS by model operations, overlooking the fact that memory bandwidth dictates how fast data feeds the compute units.
    
    **The Consequence:** They overestimate deployment performance and miss critical optimization steps like operator fusion or heavier quantization.
  napkin_math: |
    1. **Calculate Theoretical Max Rate:** 45 TOPS (INT8) / 9 GOPS/frame = 45,000 GOPS / 9 GOPS = 5,000 FPS.
    2. **Calculate Memory Bottleneck:** Assume 10 MB fetched per frame. Shared memory bandwidth to NPU is ~20 GB/s under contention.
    3. **Calculate Memory-Bound Rate:** 20 GB/s / 10 MB/frame = 2,000 FPS.
    4. **Result:** The system is **memory-bound at 2,000 FPS**, unable to reach the theoretical 5,000 FPS compute limit.
