title: Optimizing Retrieval Chunk Size for On-Device RAG on A17 Pro
scenario: An A17 Pro (8GB, 35 TOPS) RAG app chunks documents into 256-token chunks for retrieval. The LLM context window is 2048 tokens. Retrieval returns top-5 chunks. Currently: retrieval precision @5=0.74 and generation quality score=0.71. A team proposes increasing chunk size to 512 tokens to improve context coherence.
question: How would you calculate the memory and latency impact and determine whether the quality improvement justifies the cost?
details:
  realistic_solution: 'Impact analysis: FAISS index with 512-token chunks (vs 256): same document count = same index size (embeddings don''t change with chunk content size, only with model output dim). Context consumption: 5 chunks * 512 tokens = 2560 tokens — exceeds 2048 context window! Must reduce to top-3 chunks: 3*512=1536 tokens, leaving 512 tokens for query+response. With 256 tokens: 5*256=1280 tokens, leaving 768 tokens. Precision: larger chunks typically reduce precision as relevant content is buried. Quality model: 256-token chunks with 5 retrieved is often better than 512 with 3. Consider hybrid: 256-token retrieval + re-expand to neighboring chunks for top-2 results only.'
  common_mistake: |
    **The Pitfall:** Assuming larger chunks are always better for quality.
    **The Rationale:** Candidates focus on context coherence but ignore precision drop and context window consumption.
    **The Consequence:** Reduced retrieval precision and an LLM that runs out of space to generate complete answers.
  napkin_math: |
    - **Baseline (256 tokens):** 5 chunks × 256 = 1280 tokens.
    - **Baseline Response Budget:** 2048 (window) - 1280 (context) - 100 (query) = **668 tokens**.
    - **Proposed (512 tokens):** 5 chunks × 512 = 2560 tokens (> 2048 limit).
    - **Fallback (Top-3):** 3 chunks × 512 = 1536 tokens.
    - **Fallback Response Budget:** 2048 - 1536 - 100 = **412 tokens**.
    - **Conclusion:** Using 512-token chunks reduces the response space by 38% and forces retrieving fewer documents, harming breadth.
