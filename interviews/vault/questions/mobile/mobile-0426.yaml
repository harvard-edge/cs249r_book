title: The Jank Frame Catastrophe
scenario: You are the ML systems engineer for a live video filter app on a new Snapdragon 8 Gen 3 phone. The app must render at a smooth 30 FPS (33ms per frame). Your core ML model takes 20ms for inference. During testing, you notice that whenever a system notification appears, the app stutters and drops frames. A profiler trace shows that during the notification animation, your model's inference latency spikes to 55ms.
question: Why does a Snapdragon 8 Gen 3 video filter spike from 20 ms to 55 ms when a system notification animates?
details:
  realistic_solution: The root cause is resource contention on the System-on-a-Chip (SoC). The mobile OS is scheduling another task—rendering the notification animation—which competes for the same GPU execution units and memory bandwidth that your inference task requires. This contention forces your model to wait, causing its latency to spike from 20ms to 55ms, thus missing the 33ms real-time deadline and causing a visible stutter ('jank'). The correct solution involves using OS-level Quality of Service (QoS) APIs to request a higher, real-time priority for your inference thread, signaling to the scheduler that it should preempt other, less critical work.
  common_mistake: |
    **The Pitfall:** Blaming the model or hardware in isolation for performance drops.
    **The Rationale:** Engineers forget that a mobile SoC is a shared resource ecosystem, not a dedicated server.
    **The Consequence:** Wasting time over-optimizing the model when the actual issue is OS-level resource contention.
  napkin_math: |
    1. Target budget for 30 FPS = 33.3ms.
    2. ML model uses 20ms; Camera + Display takes 10ms. Remaining budget = 3.3ms.
    3. System notification UI render consumes 5-10ms.
    4. **Total frame time = 35-40ms, exceeding the 33.3ms deadline and causing jank.**
  options:
  - The model is too complex and must be pruned or quantized further to reduce its baseline latency.
  - The Snapdragon 8 Gen 3's Hexagon DSP is not powerful enough to guarantee real-time performance.
  - The OS scheduler is contending for shared GPU resources between your app's inference and the system's UI rendering.
  - The app is suffering from thermal throttling, and the heat from inference is forcing the SoC to slow down.
  correct_index: 2
