title: 'Fault Tolerance: Specification — Reliability SLA for Mobile Payment ML Model'
scenario: Write the reliability specification for an on-device fraud detection ML model on A17 Pro (35
  TOPS Neural Engine, 8GB RAM) used in a mobile payment app serving 5M transactions/day. Define RTO, RPO,
  accuracy degradation SLA, checkpoint requirements, and fail-safe behavior for all failure modes.
question: "What reliability SLA should govern an on-device payment fraud model, including RTO, RPO, fail-safe behavior, and checkpoints?"
details:
  realistic_solution: 'Payment context: fail-safe = allow transaction (not block). Model failure should
    never block payment. SLAs: RTO < 500ms (transaction timeout), RPO = 0 (base model always available,
    LoRA is enhancement only), accuracy SLA = > 95% precision on fraud class.'
  common_mistake: Not specifying fail-safe behavior (what happens during model failure); not distinguishing
    between model failure (accuracy degraded) and system failure (crash).
  napkin_math: '5M transactions/day = 57.9 transactions/second. Inference budget: < 50ms per transaction.
    System failure: model crashes → fall back to rule-based system (< 1ms). RTO: 500ms is max payment
    timeout. Model failure → rule-based fallback in < 1ms. Always meets SLA. RPO = 0: base model (500MB,
    immutable) is always the fallback. LoRA adaptation (4MB) improves accuracy by 2-3% — valuable but
    not critical. Checkpoint: LoRA saved after each training session (nightly). Loss of LoRA = minor accuracy
    degradation (not safety-critical). Accuracy SLA: precision > 95% on fraud class. Monitor: compute
    rolling 100-transaction precision proxy (anomaly score distribution). Alert if distribution shifts
    > 2σ from baseline. False negative (missed fraud): financial risk. False positive (blocked good transaction):
    user experience risk. SLA: < 0.1% false positive rate (< 5,000 blocked good transactions/day). Checkpoint
    size: 4MB LoRA × 3 retained = 12MB storage.'
