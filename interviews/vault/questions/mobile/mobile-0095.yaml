title: The Battery Accounting Inversion
scenario: Your team optimized an on-device model from FP16 to INT8, cutting MACs by 2x and NPU inference time from 10ms to 5ms. The PM is thrilled — until field data shows battery drain increased by 15% in the feature that uses this model.
question: Why does cutting NPU inference from 10 ms to 5 ms with INT8 increase feature battery drain by 15%?
details:
  realistic_solution: 'Jevons Paradox applied to mobile inference. The product team, seeing the 2x latency improvement, changed the feature''s behavior: they doubled the inference frequency (from 15 FPS to 30 FPS for the camera pipeline), added a second model pass for refinement, and enabled always-on background inference that was previously gated behind a "too slow" flag. The model is 2x more efficient per inference, but the system is now running 3x more inferences.'
  common_mistake: |
    **The Pitfall:** Believing INT8 is inherently less energy-efficient on hardware.
    **The Rationale:** Candidates ignore Jevons Paradox—increased efficiency led to increased utilization (higher FPS, more passes).
    **The Consequence:** Failing to diagnose the system-level changes that caused the 15% battery drain increase.
  napkin_math: |
    **Assumptions & Constraints:**
    - Before: 10ms * 15 FPS, NPU @ 2W.
    - After: 5ms * 30 FPS * 2 passes, NPU @ 1.5W.
    - Background Add-on: Always-on task adds ~200 mW.

    **Calculations:**
    - Before Active Time: 10ms * 15 FPS = 150ms active/sec.
    - Before Power: 0.15 * 2W = 300 mW average.
    - After Active Time: 5ms * 30 FPS * 2 passes = 300ms active/sec.
    - After Power: 0.30 * 1.5W = 450 mW average.
    - Total After Power: 450 mW + 200 mW = 650 mW.

    **Conclusion & Interpretation:**
    - **Result: 650 mW (Power-Bound)**. 2x per-inference efficiency was dwarfed by 3x total inferences and background tasks.
