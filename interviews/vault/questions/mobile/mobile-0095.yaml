title: The Battery Accounting Inversion
scenario: Your team optimized an on-device model from FP16 to INT8, cutting MACs by 2× and NPU inference
  time from 10ms to 5ms. The PM is thrilled — until field data shows battery drain *increased* by 15%
  in the feature that uses this model. How is a faster model draining more battery?
details:
  realistic_solution: 'Jevons Paradox applied to mobile inference. The product team, seeing the 2× latency
    improvement, changed the feature''s behavior: they doubled the inference frequency (from 15 FPS to
    30 FPS for the camera pipeline), added a second model pass for refinement, and enabled always-on background
    inference that was previously gated behind a "too slow" flag. The model is 2× more efficient per inference,
    but the system is now running 3× more inferences.'
  common_mistake: '"INT8 must be less energy-efficient on this hardware." INT8 is more energy-efficient
    per operation on virtually all mobile NPUs.'
  napkin_math: 'Before: 10ms inference × 15 FPS = 150ms NPU-active/sec. NPU at ~2W active = 300 mW average.
    After: 5ms inference × 30 FPS × 2 passes = 300ms NPU-active/sec. NPU at ~1.5W (INT8 is more efficient)
    = 450 mW average. Net: 50% more power despite 2× per-inference efficiency. Add the always-on background
    task at ~200 mW and total drain increases ~115%.'
