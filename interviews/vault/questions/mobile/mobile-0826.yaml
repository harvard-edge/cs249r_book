title: Mobile New 0027
scenario: A flagship smartphone runs a 3D generative model. Internal die temperature is completely safe at 50C, but the OS suddenly throttles the NPU clock by 70%, degrading performance to a crawl.
question: Why does the smartphone OS throttle the NPU even though die temperature is only 50C?
details:
  realistic_solution: 'The symptom of severe throttling while the internal die is safe is caused by the skin temperature limit constraint. Mobile devices must remain comfortable and safe to touch (typically capped at ~42-45C surface temp). Even if the silicon can safely operate at 85C, the thermal management system detects the chassis heating up and artificially limits power to maintain ergonomic safety.'
  common_mistake: |
    **The Pitfall:** Ignoring user-ergonomic skin temperature limits.
    **The Rationale:** Candidates focus solely on silicon thermal limits (e.g., 85C) and forget that mobile devices must remain comfortable to hold.
    **The Consequence:** Designing models that cause the device to throttle aggressively to maintain ergonomic safety.
  napkin_math: |
    **Assumptions & Constraints:**
    - Die Tjmax = 85°C, Skin limit = 42°C, Room temp = 25°C.
    - Thermal Resistance R_th (die-to-skin) = 10 °C/W.
    - NPU draws 4W continuously.

    **Calculations:**
    - Max Allowable Power = (42°C - 25°C) / 10 °C/W = 1.7W.
    - Throttling required = (4W - 1.7W) / 4W = 57.5% (approx 60-70% clock reduction).

    **Conclusion & Interpretation:**
    - **Result: ~60-70% clock reduction (Ergonomics-bound Skin Temperature limit)**. If the NPU draws 4W, the OS must throttle it to hit the 1.7W ergonomic safety budget.
