title: Mobile New 0027
scenario: A flagship smartphone runs a 3D generative model. Internal die temperature is completely safe
  at 50C, but the OS suddenly throttles the NPU clock by 70%, degrading performance to a crawl.
question: "Why does the smartphone OS throttle the NPU even though die temperature is only 50C?"
details:
  realistic_solution: The symptom of severe throttling while the internal die is safe is caused by the
    skin temperature limit constraint. Mobile devices must remain comfortable and safe to touch (typically
    capped at ~42-45C surface temp). Even if the silicon can safely operate at 85C, the thermal management
    system detects the chassis heating up and artificially limits power to maintain ergonomic safety.
  common_mistake: Designing mobile ML models strictly against silicon thermal limits while ignoring user-ergonomic
    skin limits.
  napkin_math: Die Tjmax = 85C. Skin limit = 42C. Thermal resistance die-to-skin (R_th) = 10 C/W. Room
    temp = 25C. Max allowable power = (42C - 25C) / 10 C/W = 1.7W limit. If NPU draws 4W, OS must throttle
    it by ~60-70% to hit the 1.7W budget.
