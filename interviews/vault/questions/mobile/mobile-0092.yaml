title: The 1000-Device Android Fragmentation Problem
scenario: Your app runs on 1000+ Android device models. The top 10 devices account for 30% of users; the
  remaining 970 devices account for 70%. You have NPU support on Qualcomm (Hexagon), Samsung (Exynos NPU),
  MediaTek (APU), and Google (Tensor TPU) — each with different operator support, quantization formats,
  and performance characteristics. How do you ship one model that works well across all of them?
details:
  realistic_solution: 'Tiered execution with runtime detection. At first launch: fingerprint device (SoC,
    RAM, OS, delegates) in ~200 bytes, run 2s micro-benchmark. Tiers: S (NPU INT4, 4ms), A (NPU INT8,
    12ms), B (GPU FP16, 22ms), C (CPU INT8, 50ms). Weighted average: 24.7ms. Ship one universal INT8 model
    with optional INT4 for Tier S. Attempt NPU first, GPU fallback, then CPU. Test 50 devices on Firebase
    ($250/month). The long tail of 970 models (70% of users) is where regressions hide.'
  common_mistake: '"Test on the top 10 devices and hope the rest work." The long tail of 970 devices will
    produce crashes, silent failures, and performance regressions that you''ll never catch in testing.'
  napkin_math: 'User distribution: Tier S (15%), Tier A (30%), Tier B (25%), Tier C (30%). Weighted average
    latency: 0.15×4 + 0.30×12 + 0.25×22 + 0.30×50 = 0.6 + 3.6 + 5.5 + 15.0 = **24.7ms average**. If you
    only optimized for Tier S: 4ms for 15% of users, crashes for 30% (Tier C devices can''t run INT4).
    Capability fingerprint size: ~200 bytes. Benchmark time: 2 seconds (first launch only). Firebase Test
    Lab: 50 devices × $5/device/month = $250/month.'
