title: The 1000-Device Android Fragmentation Problem
scenario: Your app runs on 1000+ Android device models. The top 10 devices account for 30% of users; the remaining 970 devices account for 70%. You have NPU support on Qualcomm, Samsung, MediaTek, and Google chips — each with different operator support, quantization formats, and performance characteristics.
question: How do you ship one model across 1000+ Android devices that works reliably and efficiently?
details:
  realistic_solution: 'Tiered execution with runtime detection. At first launch: fingerprint device (SoC, RAM, OS, delegates) in ~200 bytes, run 2s micro-benchmark. Tiers: S (NPU INT4, 4ms), A (NPU INT8, 12ms), B (GPU FP16, 22ms), C (CPU INT8, 50ms). Weighted average: 24.7ms. Ship one universal INT8 model with optional INT4 for Tier S. Attempt NPU first, GPU fallback, then CPU. Test 50 devices on Firebase ($250/month). The long tail of 970 models (70% of users) is where regressions hide.'
  common_mistake: |
    **The Pitfall:** Testing on the top 10 devices and assuming the rest will perform similarly.
    **The Rationale:** Teams optimize for the easiest development path, ignoring the massive hardware diversity in the Android ecosystem.
    **The Consequence:** The long tail of 970 models experiences crashes, silent failures, and performance regressions.
  napkin_math: |
    1. User distribution: Tier S (15%), Tier A (30%), Tier B (25%), Tier C (30%).
    2. Latencies: S=4ms, A=12ms, B=22ms, C=50ms.
    3. Weighted average latency: (0.15*4) + (0.30*12) + (0.25*22) + (0.30*50) = 0.6 + 3.6 + 5.5 + 15.0 = 24.7ms.
    4. **Conclusion:** Testing 50 devices on Firebase Test Lab costs $250/mo, easily preventing massive regressions for 70% of users.
