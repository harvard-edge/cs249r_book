title: The 1000-Device Android Fragmentation Problem
scenario: Your app runs on 1000+ Android device models. The top 10 devices account for 30% of users; the remaining 970 devices account for 70%. You have NPU support across different chips with varying operator support.
question: How do you ship one model across 1000+ Android devices that works reliably and efficiently?
details:
  realistic_solution: |
    Implement Tiered Execution with runtime hardware detection. At first launch: fingerprint device (SoC, RAM, OS, delegates) and run a micro-benchmark. Define Tiers: S (NPU INT4), A (NPU INT8), B (GPU FP16), C (CPU INT8). Ship one universal INT8 model with optional INT4 for Tier S. Attempt NPU first, fallback to GPU, then CPU. Utilize Firebase Test Lab to validate the long tail of 970 models where regressions hide.
  common_mistake: |
    **The Pitfall:** Testing on the top 10 devices and assuming the rest will perform similarly.
    **The Rationale:** Teams optimize for the easiest development path, ignoring the massive hardware diversity in the Android ecosystem.
    **The Consequence:** The long tail of 970 models experiences crashes, silent failures, and performance regressions.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - User distribution: Tier S (15%), Tier A (30%), Tier B (25%), Tier C (30%)
       - Latencies: S=4ms, A=12ms, B=22ms, C=50ms
    2. **Calculations:**
       - Weighted average latency: (0.15*4) + (0.30*12) + (0.25*22) + (0.30*50) = 0.6 + 3.6 + 5.5 + 15.0 = 24.7ms
    3. **Conclusion & Interpretation:** **Average latency is 24.7ms. Result: Device Fragmentation-Bound.**
