title: The Mobile LLM KV-Cache Squeeze
scenario: 'You''re running a 3B parameter LLM (INT4) on a mobile device with 8 GB RAM. The model weights take 1.5 GB. Short conversations work fine, but after 10+ back-and-forth turns, the app gets killed by the OS. The model weights haven''t changed.'
question: 'What grows until the OS jetsams a 3B INT4 chat app after 10 or more turns?'
details:
  realistic_solution: 'The KV-cache. During autoregressive generation, the model stores key and value tensors for every token. Use FlashAttention-2 and W4A16 quantization to mitigate KV-cache size, alongside strict token eviction bounds.'
  common_mistake: |
    **The Pitfall:** Blaming the crash on a memory leak in the inference engine.
    **The Rationale:** Candidates fail to understand how autoregressive attention mechanisms function.
    **The Consequence:** Engineers waste time hunting for C++ memory leaks instead of optimizing the model's sequence length limits.
  napkin_math: |
    1. **Assumptions & Constraints:**
       * KV cache/token: 2(K,V) * 32L * 32H * 96D * 2B = 384 KB.
       * Turn count: 3000 tokens total.
    2. **Calculations:**
       * KV at 3000 tokens: 3000 * 384 KB ≈ 1.15 GB.
       * System Total: 3 GB (OS) + 1.5 GB (weights) + 0.32 GB (app) + 1.15 GB (KV) = 5.97 GB.
    3. **Conclusion & Interpretation:**
       * **Result: Memory-Bound.** The app hits the strict ~6GB OS Jetsam limit strictly from KV-cache growth.
