title: The Mobile LLM KV-Cache Squeeze
scenario: You're running a 3B parameter LLM (Phi-3-mini, INT4) on an iPhone 15 Pro with 8 GB RAM. The model weights take 1.5 GB. Short conversations work fine, but after 10+ back-and-forth turns, the app gets killed by iOS. The model weights haven't changed.
question: What grows until iOS jetsams a 3B INT4 Phi-3-mini chat app after 10 or more turns?
details:
  realistic_solution: 'The KV-cache. During autoregressive generation, the model stores key and value tensors for every token in the conversation history. For Phi-3-mini (32 layers, 32 heads, head_dim=96, FP16 KV): KV-cache per token = 2 \u00d7 32 \u00d7 32 \u00d7 96 \u00d7 2 bytes = 393,216 bytes (384 KB). After 10 turns (~2000 tokens): 2000 \u00d7 384 KB = **768 MB**. Add model weights (1.5 GB), iOS overhead (~3 GB), and app runtime (~320 MB): total = 5.58 GB. iOS jetsam threshold is ~6 GB for foreground apps. By turn 15 (~3000 tokens): KV-cache = 1.15 GB, total = 5.97 GB \u2014 jetsam kills the app.'
  common_mistake: |
    **The Pitfall:** Blaming the crash on a memory leak in the inference engine.
    **The Rationale:** Candidates fail to understand how autoregressive attention mechanisms function.
    **The Consequence:** Engineers waste time hunting for C++ memory leaks instead of optimizing the model's sequence length limits.
  napkin_math: |
    *   **Phi-3-mini KV cache/token:** `2(K,V) * 32L * 32H * 96D * 2B = 393,216 bytes (384 KB)`
    *   **KV at 3000 tokens:** `3000 * 384 KB ≈ 1.15 GB`
    *   **System Total:** `3 GB (iOS) + 1.5 GB (weights) + 0.32 GB (app) + 1.15 GB (KV) = 5.97 GB`
    *   **Result:** **The app hits the strict ~6GB iOS Jetsam limit strictly from KV-cache growth.**
