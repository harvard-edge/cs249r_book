title: The Mobile LLM KV-Cache Squeeze
scenario: You're running a 3B parameter LLM (Phi-3-mini, INT4) on an iPhone 15 Pro
  with 8 GB RAM. The model weights take 1.5 GB. Short conversations work fine, but
  after 10+ back-and-forth turns, the app gets killed by iOS. The model weights haven't
  changed. What's growing?
question: What grows until iOS jetsams a 3B INT4 Phi-3-mini chat app after 10 or more
  turns?
details:
  realistic_solution: 'The KV-cache. During autoregressive generation, the model stores
    key and value tensors for every token in the conversation history. For Phi-3-mini
    (32 layers, 32 heads, head_dim=96, FP16 KV): KV-cache per token = 2 \u00d7 32 \u00d7 32
    \u00d7 96 \u00d7 2 bytes = 393,216 bytes (384 KB). After 10 turns (~2000 tokens): 2000 \u00d7 384 KB = **768
    MB**. Add model weights (1.5 GB), iOS overhead (~3 GB), and app runtime (~320
    MB): total = 5.58 GB. iOS jetsam threshold is ~6 GB for foreground apps. By turn
    15 (~3000 tokens): KV-cache = 1.15 GB, total = 5.97 GB \u2014 jetsam kills the app.'
  common_mistake: '"There''s a memory leak in the inference engine." The memory growth
    is by design, not a bug.'
  napkin_math: 'Phi-3-mini KV cache: 32 layers, 32 heads, dim 96. Each token = 2 *
    32 * 32 * 96 * 2B = 393,216 bytes (384 KB). At 3000 tokens, KV cache = 1.15 GB! iPhone 15 Pro (8GB
    RAM): iOS takes 3GB, model weights 1.5GB, app 0.32GB. With 1.15GB KV cache, total
    is 5.97GB, crossing the ~6GB iOS Jetsam limit. It OOMs strictly from KV growth.'
