title: 'Network Bandwidth Bottlenecks: Fluency — LPDDR5X BW and TPOT Math in 30 Seconds'
scenario: 'Without reference, in 30 seconds: ''A 1B INT8 model (1GB) runs on A17 Pro (68 GB/s Neural Engine).
  What is TPOT and what fraction of the memory bus does it saturate during decode?'''
details:
  realistic_solution: 'TPOT: 1GB / 68 GB/s = 14.7ms/token. BW saturation: during decode, reads 1GB per
    14.7ms = 68 GB/s = 100% of NE bandwidth. NE saturated during active decode. Between tokens: 0% saturation.'
  common_mistake: Dividing model size by total device RAM instead of memory bandwidth; confusing GB of
    storage with GB/s of bandwidth.
  napkin_math: '1GB / 68 GB/s = 0.01471s = 14.7ms/token. BW utilization during decode: 1GB/0.01471s =
    68 GB/s = 100%. Memory-bound: arithmetic intensity = 2×1B FLOPs/1GB = 2 FLOPs/byte << ridge point
    (35T/68G=514 FLOPs/byte). Strongly memory-bound.'
