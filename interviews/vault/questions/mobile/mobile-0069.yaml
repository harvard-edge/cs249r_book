title: The App Store Binary Size Limit
scenario: Apple's App Store enforces a 200 MB limit for downloads over cellular. Your iOS app is 60 MB
  without the ML model. Your product requires an on-device image generation model (Stable Diffusion-like)
  with INT8 weights totaling 800 MB. How do you ship this to users without exceeding the cellular download
  limit?
details:
  realistic_solution: 'Use Apple''s On-Demand Resources for staged delivery. Ship 60 MB binary (under
    200 MB cellular). Download 800 MB model via ODR over WiFi (~2 min at 50 Mbps). Show onboarding tutorial
    during download. Compressing 800 MB to 140 MB isn''t viable: INT4 yields 400 MB with degraded quality
    for image generation. Alternative: split into 200 MB base (bundled) + 600 MB enhancement (ODR) for
    immediate low-quality generation while full model downloads.'
  common_mistake: '"Compress the model to fit in 140 MB (200 - 60)." You cannot compress an 800 MB model
    to 140 MB without catastrophic quality loss. INT8 is already quantized — further compression (INT4)
    would halve it to 400 MB, still 3× over budget. And you''d lose significant image quality.'
  napkin_math: 'App binary: 60 MB (under 200 MB cellular limit ✓). Model: 800 MB via ODR (WiFi only).
    Total on-device footprint: 860 MB. Download time on 50 Mbps WiFi: 800 MB / 6.25 MB/s = 128 seconds
    ≈ 2 minutes. If you tried to fit everything in 200 MB: 200 - 60 = 140 MB for model. 800 MB → 140 MB
    requires 5.7× compression. INT8 → INT2 would give 4× (200 MB) — still over, and INT2 quality is unusable
    for image generation. Alternative: INT4 (400 MB) + pruning 50% (200 MB) + gzip (140 MB). Quality loss:
    ~40% FID degradation. Not viable.'
