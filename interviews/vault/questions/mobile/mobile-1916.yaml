title: Heterogeneous Data Exchange on Apple Silicon
scenario: Distributing a highly parallel tensor operation. The A17 Pro Neural Engine
  handles convolutions while the GPU handles custom non-max suppression.
question: Identify the primary memory architecture used to exchange multi-megabyte
  tensors between the NPU and GPU without copying.
visual:
  kind: svg
  path: mobile-1916.svg
  alt: Architecture diagram showing CPU, GPU, and NPU all pointing directly to a shared
    unified memory block.
  caption: Apple Unified Memory Architecture
details:
  realistic_solution: The A17 Pro utilizes a Unified Memory Architecture (UMA). The
    CPU, GPU, and Neural Engine all share the exact same physical LPDDR5 RAM pool.
    Data is exchanged by passing pointers to shared buffers rather than copying bytes
    over an internal bus. Cache coherency protocols ensure the NPU sees the GPU's
    outputs immediately.
  common_mistake: Assuming the NPU and GPU have discrete memory pools connected by
    an internal PCIe-like bus that requires DMA copies.
  napkin_math: 0 bytes copied = Unified Memory
