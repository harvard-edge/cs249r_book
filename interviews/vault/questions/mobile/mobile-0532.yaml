title: The Mobile-ViT Latency Trap
scenario: You are a Staff ML Engineer on a mobile performance team tasked with optimizing a new on-device
  visual assistant. The team is stuck. Their current model, based on MobileNetV3-Small, is fast (10ms)
  but not accurate enough for the feature. A new prototype using a small Vision Transformer (Micro-ViT)
  is highly accurate but slow (30ms), blowing the 16ms UI-jank budget on an Apple A17 Pro. The ViT has
  only ~3x the FLOPs of the CNN (1.5 GFLOPs vs 0.5 GFLOPs) but is 3x slower. Using napkin math, diagnose
  the primary reason for the ViT's disproportionate latency and propose the most promising architectural
  solution.
details:
  realistic_solution: The correct diagnosis is that the Vision Transformer is memory-bandwidth bound,
    while the CNN is largely compute-bound. The ViT's self-attention mechanism has low Arithmetic Intensity
    (AI) — it performs a massive number of memory accesses to construct the attention maps relative to
    its compute, causing it to constantly wait for data from the A17 Pro's 51.2 GB/s LPDDR5 memory. The
    CNN's convolutional structure has high data locality and high AI, keeping the compute units fed. The
    best solution is a hybrid architecture, found via Neural Architecture Search (NAS), that uses efficient
    depthwise separable convolutions for early-stage local feature extraction and introduces expensive
    self-attention blocks only at later, lower-resolution stages to capture global context. This balances
    accuracy and latency.
  common_mistake: Engineers often focus purely on FLOPs or parameter count as a proxy for latency. They
    might incorrectly assume the new ViT operations are just 'less efficient' on the mobile NPU, or that
    standard compression techniques (pruning/quantization) will solve what is actually a fundamental architectural
    bottleneck.
  napkin_math: 1. **Diagnose the Bottleneck Type:** The core issue is the ratio of compute to memory access
    (Arithmetic Intensity). An Apple A17 Pro has a theoretical peak of 35 TOPS (INT8) and 51.2 GB/s of
    memory bandwidth. Its 'Roofline' ridge point is roughly `35e12 Ops/s / 51.2e9 Bytes/s ≈ 683 Ops/Byte`.
  options:
  - The ViT's FLOPs are less efficient on the Apple Neural Engine. We should rewrite the attention kernels
    in custom Metal shaders to optimize for the hardware.
  - The ViT model is too large for the cache. We must apply more aggressive INT4 quantization and 50%
    unstructured pruning to reduce the memory footprint.
  - The ViT is memory-bandwidth bound due to the low arithmetic intensity of self-attention. Propose a
    hybrid CNN-Transformer architecture, potentially found via NAS, that uses efficient depthwise separable
    convolutions for early stages and attention for later stages.
  - Increase model capacity by using a Mixture of Experts (MoE) layer, which keeps inference FLOPs constant
    by only activating one expert. This will improve accuracy without increasing latency.
  correct_index: 2
