title: Diagnosing TFLite Performance Regressions on Google Tensor G3
scenario: A critical feature in your mobile application, running on a Google Pixel 8 (Google Tensor G3 SoC, 7.5 TOPS TPU, 12 GB LPDDR5X RAM), relies on an on-device machine learning model for real-time object detection. You've converted a large PyTorch model to TFLite for deployment. Post-deployment, users are reporting intermittent but significant latency spikes and incorrect detections. Initial profiling indicates that the model inference step frequently falls back to CPU execution for certain operations.
question: How would you diagnose Tensor G3 TFLite latency spikes and accuracy shifts caused by conversion, op coverage, or delegation gaps?
details:
  realistic_solution: 1. Thoroughly inspect TFLite converter logs for warnings or errors related to unsupported operators, quantization issues, or subgraph partitioning. 2. Utilize TFLite benchmarking tools (e.g., `benchmark_model`) with `--enable_op_profiling` on the target device to identify which specific operators are falling back to CPU. 3. For unsupported or poorly performing operators, investigate TFLite's select ops mechanism, consider custom operator implementation, or reformulate the model architecture to use TFLite-friendly operators. 4. Experiment with different delegate options (e.g., NNAPI for general acceleration, or specific XNNPACK configurations) to ensure optimal dispatch to the Tensor G3's TPU. 5. Analyze memory usage, ensuring the 12 GB LPDDR5X RAM isn't being inefficiently utilized or causing data transfers between different memory regions (host vs. device).
  common_mistake: |
    **The Pitfall:** Assuming all operations map efficiently to the on-device accelerator during conversion.
    **The Rationale:** Engineers trust the TFLite converter blindly, overlooking warnings about unsupported operations or neglecting to profile the actual execution path.
    **The Consequence:** Silent fallbacks to the CPU cause severe latency spikes and potential accuracy regressions due to differing numeric implementations.
  napkin_math: |
    - **Theoretical TPU capability:** 100 GFLOPS for a specific op (20% of total FLOPs).
    - **CPU Fallback capability:** 5 GFLOPS.
    - **Speed difference:** The operation runs 100 / 5 = 20x slower on the CPU.
    - **Conclusion:** If the operation originally took 5ms on TPU, it now takes 100ms on CPU, adding a **massive 95ms delay** to every inference frame.
