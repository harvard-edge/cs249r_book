title: The 'Magic Compose' Battery Budget
scenario: Your product manager wants to add a new 'Magic Compose' feature that analyzes incoming chat
  messages on the device. The model takes exactly 1 second to run and consumes 3W on the NPU when active.
  To save battery, you propose running it only when a new message arrives, which you estimate happens
  once every 10 seconds on average during a user's active day. Calculate the total energy consumed over
  a 16-hour active day.
details:
  realistic_solution: The correct way to solve this is to first calculate the duty cycle, which is the
    fraction of time the feature is active. Then, calculate the average power consumption by multiplying
    the active power by the duty cycle. Finally, multiply the average power by the total time to get the
    total energy consumed.
  common_mistake: The most common mistake is to forget the duty cycle and calculate the power drain as
    if the NPU is always active (3W * 16 hours). This gives an alarming, and incorrect, result that would
    make the feature seem completely non-viable. Another common error is confusing power (Watts) with
    energy (Watt-hours) and providing the average power consumption instead of the total energy consumed
    over the period.
  napkin_math: P_active = 3W | Duty Cycle = t_active / t_period = 1s / 10s = 0.1 | P_avg = P_active *
    Duty Cycle = 3W * 0.1 = 0.3W | E_total = P_avg * Time = 0.3W * 16 hours = 4.8 Wh
  options:
  - 48 Wh
  - 0.3 Wh
  - 4.8 Wh
  - 3.0 Wh
  correct_index: 2
