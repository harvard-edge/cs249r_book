title: The 'Magic Compose' Battery Budget
scenario: A new 'Magic Compose' feature analyzes incoming chat messages on-device. The model takes exactly 1 second to run, consumes 3W on the NPU, and runs once every 10 seconds on average during a user's active day.
question: How much total energy does the feature consume over a 16-hour active day?
details:
  realistic_solution: The correct way to solve this is to first calculate the duty cycle, which is the fraction of time the feature is active. Then, calculate the average power consumption by multiplying the active power by the duty cycle. Finally, multiply the average power by the total time to get the total energy consumed.
  common_mistake: |
    **The Pitfall:** Calculating power drain as if the NPU is always active.

    **The Rationale:** Forgetting to account for the duty cycle or confusing power (Watts) with energy (Watt-hours).

    **The Consequence:** Providing an alarming and incorrect energy estimate (48 Wh) that makes the feature seem completely non-viable.
  napkin_math: |
    *   Active power: P_active = 3W
    *   Duty cycle: t_active / t_period = 1s / 10s = 0.1
    *   Average power: P_avg = P_active * Duty Cycle = 3W * 0.1 = 0.3W
    *   Total energy: E_total = P_avg * Time = 0.3W * 16 hours = **4.8 Wh**
  options:
  - 48 Wh
  - 0.3 Wh
  - 4.8 Wh
  - 3.0 Wh
  correct_index: 2
