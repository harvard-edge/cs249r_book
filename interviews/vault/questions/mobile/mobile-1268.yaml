title: Diagnosing FP8 Activation Overflow on Tensor G3 TPU
scenario: You are deploying a 1.8B parameter Gemini Nano model to a device powered by the Google Tensor G3. To maximize the 7.5 TOPS throughput of the on-device TPU, the team aggressively quantized both weights and activations to FP8. During testing, the model fits easily within the 12 GB LPDDR5X RAM, but outputs become completely nonsensical when processing long documents with rare tokens.
question: "What is causing this catastrophic degradation, and how would you resolve it while maintaining target latency?"
details:
  realistic_solution: The root cause is numeric overflow caused by the limited dynamic
    range of the FP8 format (e.g., E4M3 caps at 448), which cannot represent the massive
    outlier activations typical in LLMs. The optimal solution is to implement an outlier-aware
    mixed-precision strategy, isolating the specific channel dimensions containing
    outliers. By computing only these few channels in BF16 while keeping the rest
    in FP8, the system avoids overflow while still leveraging the high throughput
    of the Tensor G3 TPU.
  common_mistake: |
    **The Pitfall:** Blaming TPU hardware constraints or rolling back the entire model to FP16.
    **The Rationale:** Candidates fail to identify the specific numeric limitations of the FP8 format (e.g., E4M3 capping at 448) when handling outlier activations in LLMs.
    **The Consequence:** Throwing away the performance benefits of FP8 quantization unnecessarily.
  napkin_math: |
    - Required memory bandwidth: 1.8 GB × 15 tokens/s = 27 GB/s.
    - Outlier isolation: 1% of 2048-dimensional hidden state in BF16 instead of FP8.
    - Overhead per token: ~20 bytes per layer.
    - Total overhead across 24 layers at 15 tok/s: 20 bytes × 24 × 15 = 7200 bytes/s (< 10 KB/s).
    - **Conclusion:** Negligible bandwidth overhead while entirely eliminating catastrophic overflow.
