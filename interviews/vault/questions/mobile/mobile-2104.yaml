title: Federated Checkpointing Overhead
scenario: Federated learning on smartphones trains a local model for 5 minutes. The
  mobile OS frequently interrupts background tasks to save battery, causing training
  to restart from scratch.
question: Analyze the impact of these interruptions on federated training convergence
  and specify a lightweight checkpointing frequency.
details:
  realistic_solution: Frequent restarts cause the client to submit stale gradients,
    slowing global convergence. Checkpointing weights and optimizer state every 30
    seconds to local NVRAM prevents complete loss of progress. The IO cost is minimal
    compared to the compute lost.
  common_mistake: Assuming the phone must restart the entire epoch upon interruption,
    ignoring the possibility of saving mini-batch state locally.
  napkin_math: 5 mins = 300 seconds. A 30s checkpoint interval ensures max loss of
    10% of a training session.
