title: Federated Checkpointing Overhead
scenario: 'Federated learning on smartphones trains a local model for 5 minutes. The mobile OS frequently interrupts background tasks to save battery, causing training to restart from scratch.'
question: 'Analyze the impact of these interruptions on federated training convergence and specify a lightweight checkpointing frequency.'
details:
  realistic_solution: 'Frequent restarts cause the client to submit stale gradients, slowing global convergence. Checkpointing weights and optimizer state every 30 seconds to local NVRAM prevents complete loss of progress. The IO cost is minimal compared to the compute lost.'
  common_mistake: |
    **The Pitfall:** Assuming the phone must restart the entire epoch upon interruption.
    **The Rationale:** Engineers ignore the possibility of saving mini-batch state locally via NVRAM.
    **The Consequence:** Continuous loss of compute cycles, draining battery without ever committing gradient updates.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Local training duration: 5 minutes (300 seconds).
       - Checkpoint interval: 30 seconds.
    2. **Calculations:**
       - Max progress lost per interruption: 30 seconds / 300 seconds = 10%.
    3. **Conclusion & Interpretation:**
       - **Result: 10% Max Loss (High Resiliency to OS Suspensions).**
