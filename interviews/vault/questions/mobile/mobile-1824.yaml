title: Mobile Memory Pressure Spec
scenario: A 4B INT4 model uses about 2 GB of weights on a phone with 8 GB unified memory. The OS and foreground app use 3.5 GB, camera mode can reserve another 2 GB, and the assistant needs KV cache for long conversations.
question: What memory guardrails are required before enabling a 2 GB on-device model on an 8 GB unified-memory phone?
details:
  realistic_solution: The guardrails should include max context length, KV-cache cap, camera/background app exclusion rules, low-memory callbacks, mmap/page-cache behavior, and a fallback when free memory drops below a threshold. Static weights fit, but concurrent camera use leaves only about 2.5 GB before KV and runtime overhead.
  common_mistake: |
    **The Pitfall:** Approving the feature simply because the static model weights (2 GB) fit within the total 8 GB memory.
    **The Rationale:** Engineers often treat RAM as a single bucket and ignore dynamic runtime overheads and concurrent system operations.
    **The Consequence:** Ignoring unified-memory contention and dynamic KV-cache growth, leading to system out-of-memory crashes when the camera is activated.
  napkin_math: |
    - Total unified memory: 8 GB.
    - OS and foreground app: - 3.5 GB.
    - Camera mode reserve: - 2 GB.
    - Free memory during camera use = 8 - 3.5 - 2 = 2.5 GB.
    - Model weights: - 2 GB.
    - **This leaves only 0.5 GB for KV cache, runtime buffers, and memory fragmentation.**
