title: 'MLOps Lifecycle: Size Model Registry Storage for Mobile Segment Variants'
scenario: A mobile ML team maintains separate model variants for 4 device tiers (flagship A17 Pro, mid-range
  Snapdragon 765, budget Tensor G3, legacy iOS A12). Each tier has 3 active model versions retained. Models
  range from 10MB (budget) to 50MB (flagship). Size total registry storage and monthly S3 cost.
question: "How much registry storage and monthly S3 cost are needed for the four mobile model tiers and retained versions?"
details:
  realistic_solution: 'Flagship (A17 Pro): 3 × 50MB = 150MB. Mid-range: 3 × 30MB = 90MB. Budget: 3 × 10MB
    = 30MB. Legacy: 3 × 8MB = 24MB. Total: 294MB. S3 cost: $0.023 × 0.294GB = $0.007/month. Evaluation
    artifacts (benchmark results, 1MB each): 4 × 3 × 1MB = 12MB. Metadata: negligible. Total registry:
    ~310MB. S3 monthly: < $0.01. CDN transfer at deploy (100M users): see bandwidth calculation.'
  common_mistake: Computing 4 tiers × 3 versions × max_size without using actual per-tier sizes; also
    forgetting to include evaluation artifacts and metadata.
  napkin_math: 'Registry: 4 tiers × 3 versions = 12 artifacts. Sizes: 50+50+50+30+30+30+10+10+10+8+8+8
    = 294MB. S3: 0.294GB × $0.023 = $0.007/month. Trivially cheap. The cost driver is CDN transfer at
    deployment, not storage.'
