title: The Federated Learning TCO Trap
scenario: You are an MLE on the mobile keyboard team, analyzing the results of an A/B test for a new personalization feature. The CFO's office has flagged the network egress costs for the Federated Learning (FL) variant (Group B) as being astronomically higher than the centralized data-collection prototype (Group A).
question: What drives the much higher network TCO of the federated keyboard personalization variant, and how should the trade-off be framed?
details:
  realistic_solution: The core of the issue is the massive difference in data payload size between the two approaches, even with a low FL participation rate. The FL approach is orders of magnitude more expensive in terms of network TCO, and this cost must be explicitly framed as the 'price of privacy'.
  common_mistake: |
    **The Pitfall:** Focusing only on the privacy benefits of FL while ignoring the concrete economic costs.
    **The Rationale:** Engineers often assume that because raw data isn't sent, FL is inherently more efficient, misattributing high costs to user counts rather than the massive payload size of model updates.
    **The Consequence:** An inability to adequately defend the FL architecture to business stakeholders or optimize the communication payload.
  napkin_math: |
    * Assume 100,000 FL users.
    * FL model update size: 50 MB daily.
    * FL Data Egress = 100,000 * 50 MB = 5 TB/day.
    * FL Cost at $0.09/GB = 5,000 GB * $0.09 = $450/day (or $164,250/yr).
    * Centralized log size: 1 KB/user daily.
    * Centralized Data Egress = 100,000 * 1 KB = 100 MB/day.
    * Centralized Cost at $0.09/GB = 0.1 GB * $0.09 = $0.009/day (or ~$3/yr).
    * **The FL variant introduces a 50,000x network cost multiplier ($164k vs $3).**
  options:
  - The cost is high because 5% of 5 million users is too large; the participation rate should be lowered to 0.1% to make it cost-effective.
  - The FL approach transfers 50,000x more data per day (5 TB vs. 100 MB). This higher TCO is a direct trade-off for enhanced user privacy and reduced data breach liability, as no raw text ever leaves the device.
  - The real cost isn't the network, but the on-device compute draining user batteries. The network cost is a secondary concern that can be ignored.
  - The centralized approach is cheaper and therefore better. Properly anonymized text is 'good enough' for privacy, and the massive cost savings are the most important business factor.
  correct_index: 1
