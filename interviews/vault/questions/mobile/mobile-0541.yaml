title: The Federated Learning TCO Trap
scenario: You are an MLE on the mobile keyboard team, analyzing the results of an A/B test for a new personalization
  feature. The CFO's office has flagged the network egress costs for the Federated Learning (FL) variant
  (Group B) as being astronomically higher than the centralized data-collection prototype (Group A). You
  are asked to diagnose the cost driver and justify the trade-off.
details:
  realistic_solution: The core of the issue is the massive difference in data payload size between the
    two approaches, even with a low FL participation rate. The FL approach is orders of magnitude more
    expensive in terms of network TCO, and this cost must be explicitly framed as the 'price of privacy'.
  common_mistake: Engineers often focus only on the privacy benefits of Federated Learning without quantifying
    the significant operational costs. They might misattribute the high cost to the number of users rather
    than the payload size per participating user, or they might underestimate the reputational cost of
    a data leak in the centralized model, arguing purely from a network cost perspective.
  napkin_math: Assume 100k FL users, 50MB model updates daily. Egress = 100k * 50MB = 5TB/day. At standard
    cloud egress of $0.09/GB, that's 5000 * 0.09 = $450/day or $164k/yr. Compare to logging 1KB/user =
    100MB/day = $3/yr. The FL variant introduces a 50,000x network cost multiplier for the CFO.
  options:
  - The cost is high because 5% of 5 million users is too large; the participation rate should be lowered
    to 0.1% to make it cost-effective.
  - The FL approach transfers 50x more data per day (500 GB vs. 10 GB). This higher TCO is a direct trade-off
    for enhanced user privacy and reduced data breach liability, as no raw text ever leaves the device.
  - The real cost isn't the network, but the on-device compute draining user batteries. The network cost
    is a secondary concern that can be ignored.
  - The centralized approach is cheaper and therefore better. Properly anonymized text is 'good enough'
    for privacy, and the massive cost savings are the most important business factor.
