title: Hardware-Aware NAS for Video Segmentation on Exynos 2400
scenario: You are designing a real-time video segmentation model (60 FPS at 1080p) that will run exclusively on the Samsung Exynos 2400 NPU. The NPU provides 34.7 TOPS across its dual cores, but it shares the 12 GB LPDDR5X memory bandwidth with the CPU, GPU, and ISP, meaning your memory bandwidth is highly constrained during active camera use.
question: How would you design a hardware-aware NAS strategy that optimizes for both latency and shared memory access?
details:
  realistic_solution: A strong candidate will propose a latency-and-bandwidth-aware NAS search space that explicitly penalizes memory-bound operations like depthwise convolutions in early high-resolution stages. They will suggest a roofline-model-guided search that incorporates the shared memory bandwidth constraint, prioritizing operations with high arithmetic intensity. Furthermore, they will utilize supernet training with a latency predictor that factors in the dynamic bandwidth availability of the shared LPDDR5X memory system.
  common_mistake: |
    **The Pitfall:** Focusing solely on minimizing FLOPs or parameter count in the NAS search space.
    **The Rationale:** Candidates assume lower FLOPs always equals faster execution, ignoring the shared memory bus.
    **The Consequence:** Selecting models heavily reliant on depthwise convolutions, causing severe memory stalls and missed 60 FPS deadlines.
  napkin_math: |
    *   **Latency Budget:** 60 FPS = **16.6 ms/frame**.
    *   **Compute per Frame:** 16.6 ms * 34.7 TOPS = **576 GOPS**.
    *   **Available Bandwidth:** ~60 GB/s (Total) - 40 GB/s (ISP/GPU) = 20 GB/s.
    *   **Memory Allowance per Frame:** 16.6 ms * 20 GB/s = **332 MB**.
    *   **Required Arithmetic Intensity:** 576 GOPS / 332 MB = **~1.73 Ops/Byte**.
    *   **Conclusion:** The NAS must heavily constrain the search space to blocks exceeding 1.73 Ops/Byte.
