title: Hardware-Aware NAS for Video Segmentation on Exynos 2400
scenario: You are designing a real-time video segmentation model (60 FPS at 1080p) that will run exclusively on an NPU. Memory bandwidth is highly constrained during active camera use.
question: How would you design a hardware-aware NAS strategy that optimizes for both latency and shared memory access?
details:
  realistic_solution: A strong candidate will propose a latency-and-bandwidth-aware NAS search space using FlashAttention-2 and top-K sparsification to explicitly penalize memory-bound operations like depthwise convolutions in early high-resolution stages. They will suggest a roofline-model-guided search that incorporates the shared memory bandwidth constraint, prioritizing operations with high arithmetic intensity. Furthermore, they will utilize supernet training with a latency predictor that factors in the dynamic bandwidth availability of the shared memory system.
  common_mistake: |
    **The Pitfall:** Focusing solely on minimizing FLOPs or parameter count in the NAS search space.
    **The Rationale:** Candidates assume lower FLOPs always equals faster execution, applying cloud intuition to edge environments and ignoring the shared memory bus.
    **The Consequence:** Selecting models heavily reliant on depthwise convolutions, causing severe memory stalls and missed 60 FPS deadlines.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Target: 60 FPS (16.6 ms/frame latency budget).
       - NPU Compute: 34.7 TOPS.
       - Available Bandwidth: ~20 GB/s (after ISP/GPU contention).
    2. **Calculations:**
       - Compute per Frame: 16.6 ms * 34.7 TOPS = 576 GOPS.
       - Memory Allowance per Frame: 16.6 ms * 20 GB/s = 332 MB.
       - Required Arithmetic Intensity: 576 GOPS / 332 MB = 1.73 Ops/Byte.
    3. **Conclusion & Interpretation:**
       - **Result:** The NAS search space must heavily constrain blocks to exceed **1.73 Ops/Byte**.
       - **Memory-Bound Bottleneck:** Falling below this intensity will cause the NPU to stall on memory fetches.
