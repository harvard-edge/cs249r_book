title: The SolarSentry Dashcam Meltdown
scenario: You are the Principal Engineer at a startup building the 'SolarSentry', a smart dashcam for cars. The key feature is a 'Sentry Mode' that uses ML to detect threats while the car is parked and turned off.
question: What dynamic architecture lets SolarSentry detect parked-car threats within thermal and battery constraints?
details:
  realistic_solution: The architecture must be a dynamic, multi-stage system that treats compute as a budget constrained by thermals, not just performance.
  common_mistake: |
    **The Pitfall:** Proposing a static duty cycle or purely model-centric optimizations like quantization.
    **The Rationale:** Engineers treat the problem as a standard ML efficiency task, underestimating the strict thermal physics of a closed, hot car.
    **The Consequence:** The device either misses critical events while sleeping or rapidly overheats and shuts down, rendering the security feature useless.
  napkin_math: |
    **Assumptions & Constraints:**
    - Car battery capacity: 60Ah * 12V = 720Wh (670Wh usable).
    - Power states: PIR sensor always on (0.01W), low-res motion stage (0.5W), full model stage (2W).
    - PIR candidates occur 1% of the time, so the low-res stage runs for 1% duty cycle.
    - Of PIR candidates, 10% are high-confidence enough to run the full model, so the full model duty cycle is 0.1% of total parked time.
    - The stages are conditional: PIR is always on; low-res runs after PIR; full model runs only after a low-res candidate.

    **Calculations:**
    - Always-on ML lifespan: 670Wh / 2W = 335 hours (14 days).
    - Low-res average power: 0.01 * 0.5W = 0.005W.
    - Full-model average power: 0.01 * 0.10 * 2W = 0.002W.
    - Tiered duty-cycle average power: 0.01W + 0.005W + 0.002W = 0.017W.
    - Tiered lifespan: 670Wh / 0.017W = 39,412 hours.

    **Conclusion & Interpretation:**
    - **Result: 39,412 hours (Power-Bound)** under the stated trigger rates. The exact lifetime depends on event frequency, but the math shows why the high-power model must be conditional rather than always on.
