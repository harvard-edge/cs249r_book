title: The Dashcam Drain Dilemma
scenario: 'You are designing a sentry mode dashcam feature for a mobile app. To conserve energy, the feature operates on a duty cycle: it activates for 2 seconds to run inference at 4W, then enters a low-power sleep state at 0.02W for 8 seconds before repeating the cycle. The phone has a 15 Wh battery.'
question: 'How would you calculate the average power consumption and estimate how long the battery will last running this feature?'
details:
  realistic_solution: The average power is calculated as a weighted average over the duty cycle. Active fraction = 2s / 10s = 0.2. Sleep fraction = 8s / 10s = 0.8. Average power = (0.2 * 4W) + (0.8 * 0.02W) = 0.8W + 0.016W = 0.816W. Battery life = 15 Wh / 0.816W ≈ 18.4 hours.
  common_mistake: |
    **The Pitfall:** Averaging the active and sleep power values directly (e.g., (4W + 0.02W) / 2) without temporal weighting, or neglecting sleep power entirely.
    **The Rationale:** Candidates fail to apply duty-cycle fractions to the power states, misrepresenting the time spent in sleep mode.
    **The Consequence:** Drastically overestimating or underestimating battery life, leading to incorrect product specifications.
  napkin_math: |
    **Assumptions & Constraints:**
    - Active State: 2s at 4W.
    - Sleep State: 8s at 0.02W.
    - Total Cycle: 10s.
    - Battery Capacity: 15 Wh.

    **Calculations:**
    - Active Fraction: 2s / 10s = 0.2.
    - Sleep Fraction: 8s / 10s = 0.8.
    - Average Power: (0.2 * 4W) + (0.8 * 0.02W) = 0.8W + 0.016W = 0.816W.
    - Battery Life: 15 Wh / 0.816W = 18.38 hours.

    **Conclusion & Interpretation:**
    - **Result: 18.4 hours (Power-Bound)**. The feature will run for approximately 18.4 hours on a full charge.
  options:
  - '~4.6 hours'
  - '~9.2 hours'
  - '~18.4 hours'
  - '~23.1 hours'
