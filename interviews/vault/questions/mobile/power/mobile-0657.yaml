title: The Autonomous Dashcam's Thermal Budget
scenario: You are the Principal Engineer at a startup building a smart dashcam for ride-sharing fleets. The device is a self-contained unit powered by a small internal battery and a solar panel. It must operate reliably through a 10-hour shift in a hot vehicle.
question: Why is continuous powerful vision inference infeasible for the autonomous dashcam, and what duty-cycled architecture is required?
details:
  realistic_solution: |
    Continuous high-power vision inference is infeasible because a 5-7 W model would exceed both the 10-hour energy budget and the thermal envelope of a parked or slow-moving hot vehicle. The required design is hierarchical duty cycling: keep an ultra-low-power MCU, IMU, microphone, PIR, or low-resolution motion sensor always on; wake a small detector for candidate events; run the expensive vision model only in short bursts around those events; then persist the clip, upload summaries if needed, and return the SoC/NPU to sleep. The feasibility target is average power over the full shift, not peak TOPS during a burst.
  common_mistake: |
    **The Pitfall:** Assuming peak NPU TOPS can be sustained continuously.
    **The Rationale:** Engineers often focus on the theoretical peak performance (e.g., 45 TOPS) and ignore severe thermal and energy constraints.
    **The Consequence:** Sustained heavy workloads rapidly drain the small battery and induce catastrophic thermal throttling, rendering the device useless in a hot environment.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - SoC: Heavy vision models draw ~5-7 W while active.
       - Shift duration: 10 hours.
       - Typical dashcam battery capacity: ~10-15 Wh.
       - Solar contribution in a hot vehicle is intermittent, so the battery must cover the shift budget.
    2. **Calculations:**
       - Continuous heavy inference energy = 5 W * 10 h = 50 Wh.
       - Maximum sustainable average power from a 15 Wh battery over 10 h = 15 Wh / 10 h = 1.5 W.
       - Continuous heavy inference exceeds the average budget by 5 W / 1.5 W = 3.3x before display, storage, radio, and thermal losses.
       - Example duty cycle: 0.2 W always-on sensing + 5 W vision bursts for 10% of the shift = 0.2 W + 0.5 W = 0.7 W average, leaving margin for recording and connectivity.
    3. **Conclusion & Interpretation:**
       **Result: Power-Bound. The architecture must keep the always-on path well below 1 W and run the powerful vision model only in short triggered bursts so total average power stays under the roughly 1.5 W shift budget.**
