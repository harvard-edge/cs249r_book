title: The CPU Wake-Lock Tax
scenario: You deploy a simple wake-word detection model. Even though the model uses very little CPU, users report that the app is the top battery consumer on their device.
question: Based on the power domain diagram, where is the energy going?
details:
  realistic_solution: The system is suffering from an Application Processor (AP) Wake-Lock Tax. Running any continuous polling task on the main CPU forces the OS to hold a wake-lock, keeping high-power SoC voltage rails and external DRAM fully powered up. This strictly prevents the device from entering Deep Sleep. The solution mandates delegating the model to the Always-On Domain (AOD) or DSP, which manages local mic buffers directly in low-power SRAM.
  common_mistake: |
    **The Pitfall:** Believing the model's energy footprint is exclusively driven by its mathematical FLOP count.
    **The Rationale:** Engineers assume battery drain scales linearly with computational complexity, ignoring hardware state management.
    **The Consequence:** Optimization efforts focus entirely on quantizing a model whose compute cost is already mathematically trivial, completely missing the catastrophic baseline power draw of the AP rails.
  napkin_math: |
    **Assumptions & Constraints:**
    - Application Processor (AP) basal idle power: ~80 mW.
    - Always-On Domain (AOD) / DSP power: ~1 mW.
    - Continuous listening duty cycle: 100%.

    **Calculations:**
    - AP execution energy cost: 80 mW * 3600 seconds = 288 Joules/hour.
    - DSP execution energy cost: 1 mW * 3600 seconds = 3.6 Joules/hour.
    - Energy waste ratio: 288 J / 3.6 J = 80x power penalty.

    **Conclusion & Interpretation:**
    - **Result: Power-Bound**. Failing to delegate to the AOD wastes 80x more energy simply keeping the SoC awake, vastly dwarfing the actual mathematical cost of the model itself.
