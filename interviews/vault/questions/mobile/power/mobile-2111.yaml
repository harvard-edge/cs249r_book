title: Always-On Gaze Detection
scenario: 'An always-on gaze detector on a Snapdragon 8 Gen 3 uses an INT8 micro-model. The NPU consumes 50mW active, 2mW idle, and processes a frame in 5ms.'
question: 'Calculate the maximum supported frame rate to keep average NPU power strictly under 5mW.'
details:
  realistic_solution: 'First, establish the required duty cycle (D) using the power budget: 50mW * D + 2mW * (1 - D) = 5mW. Solving this yields a 6.25% duty cycle. Because one frame takes exactly 5ms of active time, we can determine the total cycle period by dividing 5ms by the duty cycle. The inverse of this period gives the maximum frames per second.'
  common_mistake: |
    **The Pitfall:** Ignoring the 2mW idle power in the calculation.
    **The Rationale:** Engineers assume idle power is negligible compared to the 50mW active power.
    **The Consequence:** They calculate D = 5/50 = 10%, leading to an estimated 20 FPS, which would actually consume (50*0.1) + (2*0.9) = 6.8mW, breaking the 5mW strict budget.
  napkin_math: |
    **Assumptions & Constraints:**
    - Power Budget: 5mW strict average limit.
    - Active Power: 50mW (5ms per frame).
    - Idle Power: 2mW.

    **Calculations:**
    - Let D = Duty Cycle.
    - Power Equation: 50D + 2(1 - D) = 5.
    - 50D + 2 - 2D = 5 -> 48D = 3 -> D = 3 / 48 = 0.0625 (6.25%).
    - Total Period: 5ms active / 0.0625 = 80ms.
    - Max Framerate: 1000ms / 80ms = 12.5 FPS.

    **Conclusion & Interpretation:**
    - **Result: Power-Bound Duty Cycling**. Factoring in the 2mW idle baseline, the system mathematically cannot exceed a 6.25% active duty cycle, capping the detector at exactly **12.5 FPS**.
