title: Continuous Real-Time Vision Under Thermal Constraints
scenario: You are designing a continuous real-time video understanding pipeline. For a continuous session lasting over an hour, the device's sustained thermal envelope is strictly capped at 2.5W for the entire SoC.
question: How would you design a thermal-aware execution architecture that processes 30 FPS continuously without ever triggering thermal throttling or dropping frames?
details:
  realistic_solution: |
    Synthesize a duty-cycled, cascaded architecture leveraging 'race-to-sleep'. Run a microscopic motion-tracker (e.g., frame differencing) on CPU efficiency cores to gate downstream processing. When triggered, the NPU wakes to process batched frames at peak TOPS, then immediately powers down. By aggressively duty-cycling, the system amortizes memory access power and adheres to the 2.5W thermal budget.
  common_mistake: |
    **The Pitfall:** Designing for the peak capability while ignoring sustained thermal limits.
    **The Rationale:** Candidates focus on raw speed and assume OS thermal management will gracefully handle continuous load without dropping frames.
    **The Consequence:** The device inevitably thermal throttles after a few minutes, breaking real-time SLAs.
  napkin_math: |
    **Assumptions & Constraints:**
    - Frame window: 33.3 ms (30 FPS)
    - Peak NPU Power: 5W
    - Target Sustained Average NPU Power: 1.5W (leaving 1W for system)

    **Calculations:**
    - Max Duty Cycle: 1.5W / 5W = 30%
    - Active NPU Time per Frame: 33.3 ms * 0.30 = 10 ms
    - Max GOPS per frame (at 35 TOPS): 35 TOPS * 0.010 s = 350 GOPS

    **Conclusion & Interpretation:**
    - **Result: 10 ms (Thermal/Power-Bound)**. Duty cycling limits NPU execution to 10ms (350 GOPS) per frame to sustain thermals.
