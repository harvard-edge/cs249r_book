title: Continuous Real-Time Vision Under Thermal Constraints
scenario: You are designing a continuous real-time video understanding pipeline. For a continuous session lasting over an hour, the device's sustained thermal envelope is strictly capped at 2.5W for the entire SoC.
question: How would you design a thermal-aware execution architecture that sustains 30 FPS while avoiding thermal throttling and frame drops?
details:
  realistic_solution: |
    Use an admission-controlled per-frame pipeline rather than unbounded batching. Reserve a sustained SoC power budget, then cap the NPU to a bounded slice of each 33.3 ms frame, leaving fixed time and power for camera, ISP, memory, display, and CPU work. Run a tiny always-on motion or scene-change stage first, but every frame must still meet a deterministic deadline: if the heavy model cannot fit the current thermal headroom, switch to a smaller input resolution, cheaper model head, lower temporal frequency with interpolation, or a pre-approved fallback. A thermal controller should monitor skin/SoC temperature, predicted power, and frame backlog, applying model scaling or admission control before the OS thermal governor is forced to throttle.
  common_mistake: |
    **The Pitfall:** Designing for the peak capability while ignoring sustained thermal limits.
    **The Rationale:** Candidates focus on raw speed and assume OS thermal management will gracefully handle continuous load without dropping frames.
    **The Consequence:** The device inevitably thermal throttles after a few minutes, breaking real-time SLAs.
  napkin_math: |
    **Assumptions & Constraints:**
    - Frame window: 33.3 ms (30 FPS)
    - Sustained SoC cap: 2.5W.
    - Non-NPU system budget: 1.0W for camera/ISP/display/CPU/memory.
    - Sustained NPU budget: 1.5W.
    - Peak NPU mode: 5W at 35 TOPS.

    **Calculations:**
    - Max Duty Cycle: 1.5W / 5W = 30%
    - Active NPU Time per Frame: 33.3 ms * 0.30 = 10 ms.
    - Max peak-mode compute per frame: 35 TOPS * 0.010 s = 350 GOPs.
    - With a 20% scheduling/thermal guard band, admission limit = 350 GOPs * 0.8 = 280 GOPs/frame.

    **Conclusion & Interpretation:**
    - **Result: <=10 ms NPU time and <=280 GOPs admitted per frame (Thermal/Power-Bound).** Sustained 30 FPS requires bounded per-frame work plus model scaling or fallback when the estimate exceeds the 2.5W SoC envelope.
