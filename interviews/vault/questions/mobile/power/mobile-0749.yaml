title: The Radio Energy Wall
scenario: You optimize your activity-tracking model down to 3 mW. However, the app still drains the battery by 10% per hour because it uploads labels to your server every 5 minutes.
question: Based on the power breakdown, where is your optimization effort being wasted?
details:
  realistic_solution: 'You are hitting the **Radio Wake Overhead**. The cellular radio consumes ~800 mW every time it wakes from idle. Waking it every 5 minutes for a tiny payload prevents the radio from staying in its low-power state. The fix is **Batching and Delegation**: buffer results locally and upload once per hour, and use the OS''s low-power activity co-processor (like Apple''s M-series) instead of a custom always-on CPU loop.'
  common_mistake: |
    **The Pitfall:** Over-optimizing model compute while ignoring network overhead.
    **The Rationale:** Candidates suggest retraining the model to be even smaller.
    **The Consequence:** The model's 3 mW is already negligible compared to the system overhead, so further model optimization yields no perceptible battery life improvement.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Cellular Radio active power: ~800 mW.
       - Wake + tail state duration: ~10 seconds.
       - Upload frequency: Every 5 mins (12 times/hr).
       - Model power: 3 mW continuous.
    2. **Calculations:**
       - Radio: 800 mW * 10s * 12 times/hr = 96,000 mWs = 26.7 mWh.
       - Model: 3 mW * 1 hr = 3 mWh.
       - Radio/Model overhead ratio: 26.7 mWh / 3 mWh = 8.9x.
    3. **Conclusion & Interpretation:**
       - **Result: Energy-Bound. The radio wake is ~9x more expensive than the actual ML work.**
