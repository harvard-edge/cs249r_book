title: 'The On-Device LLM Keyboard Power Drain'
scenario: 'You are the architect for a new AI keyboard on Android, targeting devices like the Snapdragon 8 Gen 3. The key feature is sentence completion using an on-device 2B parameter LLM. The Product Manager has two non-negotiable requirements: 1) Time-to-generate a 10-token completion must be under 500ms. 2) The feature cannot consume more than 1W of average power. Your initial prototype is too slow and hot: latency is ~150ms per token, and power spikes to 4W.'
question: 'How should speculative decoding be used to meet the AI keyboard''s latency and sub-1W power requirements?'
details:
  realistic_solution: 'The architecture will use speculative decoding to get the speed of a tiny drafter model with the accuracy of the large verifier model.'
  common_mistake: |
    **The Pitfall:** Suggesting the use of a much smaller model (e.g., 500M parameters).
    **The Rationale:** Candidates default to size reduction to improve speed and power, ignoring the quality requirements.
    **The Consequence:** Sacrificing significant model quality and failing the implicit requirement of a capable 2B parameter LLM.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model Footprint: 2B params INT4 = 1 GB weights.
    - Target Latency: 10 tokens in 500 ms = 20 tokens/sec.
    - Power Consumption: Mobile RAM burns ~1W per 10 GB/s.

    **Calculations:**
    - Required Memory Bandwidth: 1 GB * 20 reads/sec = 20 GB/s.
    - Average Power: 20 GB/s = 2W (just for memory, exceeding the 1W budget).

    **Conclusion & Interpretation:**
    - **Result: 2W (Power-Bound)**. Speculative decoding is required to read the 1 GB weights less frequently, slashing memory bandwidth and power below 1W.
