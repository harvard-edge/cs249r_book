title: The Jank Instigator
scenario: An AR game running on a Snapdragon 8 Gen 3 requires 45 TOPS to maintain a smooth 60 FPS. Under peak load, the SoC needs to draw 6W of power. However, the phone's thermal design can only sustain a 5W power draw before thermal throttling is engaged.
question: 'Interpret this situation: what happens to the frame rate, and what is the approximate new FPS?'
details:
  realistic_solution: The system will not crash or overheat. Instead, the PMIC will force the SoC to operate within its 5W thermal budget. Since the chip requires 6W to deliver the full 45 TOPS, its performance will be scaled down proportionally.
  common_mistake: |
    **The Pitfall:** Treating thermal throttling as a catastrophic failure or an arbitrary, fixed performance reduction.
    **The Rationale:** Engineers mistakenly assume throttling acts like a switch that crashes the app or cuts performance blindly in half.
    **The Consequence:** They fundamentally misunderstand how modern Power Management ICs (PMICs) gracefully degrade performance to fit thermal envelopes.
  napkin_math: |
    1. **Power Ratio:** The phone must run at 5W / 6W = 83.3% of its peak power capacity to remain stable.
    2. **Compute Scaling:** 45 TOPS × (5 / 6) = 37.5 TOPS sustained capacity.
    3. **FPS Scaling:** 60 FPS × (5 / 6) = 50 FPS.
    4. **Frame Budget Conversion:** To maintain 60 FPS at 37.5 TOPS, budget = 37.5 TOPS / 60 FPS = 0.625 TOPS per frame = 625 GOPs per frame.
    **Result:** The system proportionally scales down performance, causing the frame rate to drop to exactly **50 FPS** (or requires reducing the model to **625 GOPs** to maintain 60 FPS).
  options:
  - The game will crash because the SoC is drawing too much power.
  - The frame rate will drop to 30 FPS as the system cuts performance by half.
  - The frame rate will remain at 60 FPS, but the phone will get dangerously hot.
  - The frame rate will drop to approximately 50 FPS as the SoC scales down performance.
  correct_index: 3
