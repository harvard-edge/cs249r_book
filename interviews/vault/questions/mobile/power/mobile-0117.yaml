title: The Sustained Performance Cliff
scenario: You've deployed a high-performance computer vision model on a flagship Android device. Initial tests show excellent latency (e.g., 20ms/frame). However, after about 30-60 seconds of continuous operation, the inference latency consistently jumps to 60-80ms/frame. This happens even with the device plugged into power.
question: What is the most likely cause, and how would you design your ML system to provide more sustained performance?
details:
  realistic_solution: |
    This is a classic symptom of thermal throttling. Modern mobile SoCs can deliver short bursts, but continuous inference pushes the package above its passive cooling envelope and the thermal management unit reduces clocks. Design for the sustained power point instead of the benchmark burst: quantize or compress the model, reduce input resolution, skip or subsample frames, duty-cycle inference when scene state is stable, offload supported kernels to the ANE/NPU, and add adaptive quality scaling based on thermal headroom. The goal is to keep average power under the sustained envelope so latency stays predictable over minutes, not just for the first few frames.
  common_mistake: |
    **The Pitfall:** Misdiagnosing thermal throttling as a memory leak.
    **The Rationale:** Candidates see a performance drop over time and instinctively blame software memory management instead of hardware thermal physics.
    **The Consequence:** Time is wasted profiling memory allocators while the actual thermal bottleneck persists, causing continued UI stuttering.
  napkin_math: |
    **Assumptions & Constraints:**
    - Peak burst TDP: ~10 W.
    - Sustained passive TDP limit: 3-4 W.
    - Initial burst latency: 20 ms/frame.
    - Continuous camera inference has near-100% duty cycle unless work is intentionally skipped or downscaled.

    **Calculations:**
    - Sustained power target: <=4 W, not the short burst limit.
    - Headroom gap: 10 W - 4 W = ~6 W above the passive cooling envelope.
    - Required reduction from burst behavior: (10 W - 4 W) / 10 W = 60% less average power.
    - Design options include a lower-power model, reduced input resolution, frame skipping, accelerator selection, or dynamic quality scaling to keep average device power inside the sustained envelope.

    **Conclusion & Interpretation:**
    - **Result: Thermal Wall Hit**. The exact throttled latency is device-policy dependent, but designing for the 10 W burst point guarantees throttling; the model must be optimized to run within the ~4 W sustained envelope.
