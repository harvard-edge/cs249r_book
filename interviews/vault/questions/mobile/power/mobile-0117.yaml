title: The Sustained Performance Cliff
scenario: You've deployed a high-performance computer vision model on a flagship Android device. Initial tests show excellent latency (e.g., 20ms/frame). However, after about 30-60 seconds of continuous operation, the inference latency consistently jumps to 60-80ms/frame. This happens even with the device plugged into power.
question: What is the most likely cause, and how would you design your ML system to provide more sustained performance?
details:
  realistic_solution: This is a classic symptom of thermal throttling. Modern mobile SoCs operate within strict thermal envelopes; sustained peak bursts trigger the thermal management unit (TMU) to reduce clock frequencies.
  common_mistake: |
    **The Pitfall:** Misdiagnosing thermal throttling as a memory leak.
    **The Rationale:** Candidates see a performance drop over time and instinctively blame software memory management instead of hardware thermal physics.
    **The Consequence:** Time is wasted profiling memory allocators while the actual thermal bottleneck persists, causing continued UI stuttering.
  napkin_math: |
    **Assumptions & Constraints:**
    - Peak burst TDP: ~10 W.
    - Sustained passive TDP limit: 3-4 W.
    - Initial burst latency: 20 ms/frame.

    **Calculations:**
    - Power ratio (burst vs sustained): 10 W / 3.9 W = ~2.5x reduction required.
    - Throttled latency estimation: 20 ms * 2.5x = ~50-60 ms/frame.

    **Conclusion & Interpretation:**
    - **Result: Thermal Wall Hit**. Designing for the 10W spec sheet burst guarantees throttling; the model must be optimized to run within the 3.9W sustained envelope.
