title: NPU Audio Duty Cycle
scenario: An always-on audio listener draws 5W when the NPU is active and 0.1W when sleeping.
question: If the NPU wakes up for 200ms every 1 second, calculate the average power consumption.
details:
  realistic_solution: |
    The duty cycle is 20%. Multiply the active power by 0.2 and the sleep power by 0.8, then sum them to find the true average power consumption. This determines thermal boundaries and battery impact for always-on edge models.
  common_mistake: |
    **The Pitfall:** Using a simple arithmetic mean of active and idle power states.
    **The Rationale:** Failing to weight the power consumption by the actual time spent in each state (the duty cycle).
    **The Consequence:** Highly inaccurate power estimations that invalidate thermal and battery life models.
  napkin_math: |
    **Assumptions & Constraints:**
    - Wake duration: 200 ms
    - Total period: 1000 ms
    - Active Power: 5W
    - Sleep Power: 0.1W

    **Calculations:**
    - Duty cycle = 200 ms / 1000 ms = 20% active
    - Active power contribution = 5W * 0.20 = 1.0W
    - Sleep power contribution = 0.1W * 0.80 = 0.08W
    - Average Power = 1.0W + 0.08W = 1.08W

    **Conclusion & Interpretation:**
    - **Result: 1.08W (Duty-Cycle-Bound)**. Average Power is 1.08W.
