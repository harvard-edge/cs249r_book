title: Energy-Aware Memory Access Design on Tensor G3
scenario: You are deploying an optimized LLM (like Gemini Nano) onto the Google Tensor G3 for continuous background inference. You have a strict power budget to avoid draining the battery.
question: How would you design an inference specification that minimizes energy per operation, specifically focusing on memory access versus compute?
details:
  realistic_solution: 'The correct approach involves analyzing the Horowitz energy table to justify that memory access is the primary energy bottleneck. The design should prioritize operator selection that maximizes data reuse on the TPU''s SRAM and aggressive quantization (e.g., INT4 or INT8) to reduce the model''s memory footprint. Fusing operations to keep intermediate activations on-chip rather than spilling to LPDDR5X is critical for meeting the power budget on the Tensor G3.'
  common_mistake: |
    **The Pitfall:** Focusing solely on reducing the number of computational FLOPs to save energy.
    **The Rationale:** Candidates incorrectly assume that math operations are the primary power draw, ignoring the Horowitz energy tables.
    **The Consequence:** Designing a computationally simple model that still relies heavily on massive off-chip LPDDR5X memory bandwidth, instantly draining the battery.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model parameters: 1 Billion.
    - LPDDR5X Energy Cost: 10 pJ/bit. ALU op cost: ~1 pJ.

    **Calculations:**
    - FP32 Memory Energy: 1B * 32 bits * 10 pJ/bit = 320 mJ per token.
    - INT4 Memory Energy: 1B * 4 bits * 10 pJ/bit = 40 mJ per token.
    - Compute Energy: ALU ops (~1 pJ) are dwarfed by memory fetches.

    **Conclusion & Interpretation:**
    - **Result: 40 mJ per token (Power-Bound)**. Quantizing to INT4 provides an 8x reduction in memory energy, which dictates the power constraints of the TPU.
