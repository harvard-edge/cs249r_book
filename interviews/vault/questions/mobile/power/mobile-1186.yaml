title: Exynos 2400 NPU Real-Time Power Budgeting
scenario: You are designing a real-time video segmentation pipeline for a smartphone. The system requires processing 4K video at 30 FPS using the dual-core NPU. To prevent thermal throttling during prolonged recording, the AI workload is strictly capped at a 2.5W power budget.
question: How would you specify a power management strategy and deployment architecture that ensures sustained 30 FPS performance without exceeding the 2.5W cap?
details:
  realistic_solution: Specify aggressive quantization (INT8) and operator fusion to maximize operational intensity and keep activations in the NPU's local SRAM. Propose using DVFS to drop the dual-core NPU to its lowest viable P-state that still meets the 33.3ms frame deadline, exploiting the P ∝ fV^2 relationship to reduce dynamic power while leaving memory bandwidth for the ISP.
  common_mistake: |
    **The Pitfall:** Focusing solely on the massive NPU compute capacity.
    **The Rationale:** Candidates fail to account for the energy cost of shared memory bandwidth, proposing models that require continuous, power-hungry DRAM fetches.
    **The Consequence:** Quickly blowing past the 2.5W thermal budget due to high power consumption of LPDDR5X accesses compared to local NPU SRAM.
  napkin_math: |
    **Assumptions & Constraints:**
    - Latency budget: 30 FPS -> 33.3 ms/frame.
    - Memory energy cost: 10 pJ/bit.
    - Compute requirement: INT8 model uses 100 GOPS/frame.
    - Low-P-state NPU efficiency for this fused INT8 workload: 3.75 TOPS/W.

    **Calculations:**
    - Sustained compute rate required: 100 GOPS/frame * 30 FPS = 3000 GOPS/s = 3 TOPS.
    - Compute power at low P-state: 3 TOPS / 3.75 TOPS/W = 0.8W.
    - Bad optimization fetch: 50MB/frame = 400 Mbits.
    - Fetch energy: 400 Mbits x 10 pJ = 4 mJ/frame.
    - Memory power at 30 FPS: 4 mJ x 30 = 120 mW.
    - Total modeled AI power: 800 mW (compute) + 120 mW (memory) = 920 mW (0.92W).
    - Headroom under cap: 2.5W - 0.92W = 1.58W for control overhead, scheduling variance, and thermal guard band.

    **Conclusion & Interpretation:**
    - **Result: 0.92W Modeled AI Power (Power-Feasible)**. With INT8 fusion, SRAM locality, and DVFS set to the minimum P-state that sustains 3 TOPS, the deployment remains under the 2.5W cap with meaningful headroom.
