title: Apple A17 Pro ML Inference Power Optimization
scenario: You are tasked with deploying a real-time image recognition model on a mobile device. The application requires sustained inference at 60 FPS within a strict system-wide power cap of 2.5W dedicated to ML acceleration.
question: How would you choose the most energy-efficient Core ML settings for 60 FPS inference within a 2.5W ML power budget?
details:
  realistic_solution: |
    On iOS, the engineer normally cannot set Neural Engine or unified-memory voltage and frequency directly. Treat DVFS as platform-managed and search over controllable runtime choices instead. Build candidate Core ML configurations that vary precision, input resolution, model size, compute units, batching or frame skipping, and operator-friendly graph rewrites. Use Xcode Instruments, Core ML metrics, and device power/thermal measurements to record FPS, energy per inference, memory traffic symptoms, and sustained behavior after warm-up. Select the configuration that stays under about 41.7 mJ per inference at 60 FPS with acceptable accuracy, and add guardrails to lower resolution or frame rate if thermal state rises.
  common_mistake: |
    **The Pitfall:** Trying to tune private hardware P-states instead of optimizing the model and runtime settings that the platform exposes.
    **The Rationale:** Candidates assume mobile app engineers can directly set Neural Engine voltage, frequency, and memory clocks, while iOS manages those controls internally.
    **The Consequence:** The team misses practical levers such as precision, resolution, operator placement, and thermal-aware frame scheduling, so sustained FPS or power targets fail.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Target: 60 FPS (60 inferences/sec).
       - Power budget for ML acceleration: 2.5W (2.5 Joules/sec).
    2. **Calculations:**
       - Energy per inference budget = 2.5 J / 60 inferences = 41.7 mJ/inference.
    3. **Conclusion & Interpretation:**
       - **Result: Power-Bound.** The model's combined compute and memory access energy must strictly remain under **41.7 mJ/inference** to avoid exceeding the 2.5W sustained thermal envelope.
