title: The Power Hungry Framework
scenario: You've benchmarked a computer vision model using TensorFlow Lite (TFLite) on Android and Core
  ML on iOS with a strict power consumption budget for inference (e.g., <100mW average over 30 seconds).
  You observe that while TFLite on Android achieves the latency target, its power draw is consistently
  20-30% higher than Core ML on iOS for a similar model and device class.
question: What factors explain the 20-30% higher power draw of TFLite on Android vs Core ML on iOS, and
  how can it be optimized?
details:
  realistic_solution: The power discrepancy often stems from differences in how the ML frameworks interact
    with the underlying hardware, operating system, and their respective drivers/delegates. If a framework
    falls back to the CPU for even a small portion of the model, the dramatically lower efficiency of
    the CPU causes a disproportionate spike in overall energy consumption.
  common_mistake: '**The Pitfall:** Blaming generic hardware efficiency differences between Android and
    iOS.


    **The Rationale:** It is common to assume that Apple silicon is simply more power-efficient across
    the board without looking into framework-specific execution paths.


    **The Consequence:** The engineer misses actionable software-level optimizations, such as ensuring
    correct delegate usage to prevent costly CPU fallbacks.

    '
  napkin_math: '**Assumptions & Constraints:**

    - Inference duration: 50ms.

    - Pure NPU inference power: 200mW.

    - CPU execution power: 800mW.

    - CPU Fallback rate: 10% (5ms of CPU time per inference).


    **Calculations:**

    - Pure NPU Energy: 50ms x 200mW = 10 mJ.

    - Fallback Energy: (45ms x 200mW) + (5ms x 800mW) = 9 mJ + 4 mJ = 13 mJ.

    - Increase: 13 mJ / 10 mJ = 1.3x (a 30% increase).


    **Conclusion & Interpretation:**

    - **Result: 30% higher power draw (Power-Bound)**. Partial CPU execution massively scales energy usage,
    directly causing the 30% higher total power draw compared to purely NPU execution.'
