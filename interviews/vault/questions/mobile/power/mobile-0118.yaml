title: The Background Thermal Throttling
scenario: Your photo app runs an on-device facial clustering model in the background while the user's phone is charging overnight. When run in the foreground, it takes 5 minutes. But in the background task, telemetry shows it takes 45 minutes, and sometimes gets killed by the OS.
question: Why is the background execution 9x slower than the foreground execution?
details:
  realistic_solution: The SoC is violently hitting the OS Background Thermal Wall. While plugged in, the battery charging circuit generates ambient heat. To prevent catastrophic thermal runaway while unattended, the OS actively drops the SoC power envelope (e.g., capping at ~1W instead of 4W), forcing extreme frequency clock scaling that manifests as a 9x latency degradation.
  common_mistake: |
    **The Pitfall:** Attributing the slowdown to low-power mode.
    **The Rationale:** Candidates often assume low power mode is active, forgetting that phones charging overnight are explicitly not in low power mode.
    **The Consequence:** The candidate misdiagnoses the issue and proposes software-level fixes that do not address the fundamental thermal constraints.
  napkin_math: |
    **Assumptions & Constraints:**
    - Foreground Limit: ~4W (takes 5 mins).
    - Background Limit (Charging): ~1W sustained.
    - Dataset: 10,000 photos.

    **Calculations:**
    - Foreground speed: 300,000 ms / 10,000 photos = 30 ms/photo.
    - Throttled latency: 30 ms * 9 = 270 ms/photo.
    - Total background time: 270 ms * 10,000 = 2,700,000 ms (45 minutes).

    **Conclusion & Interpretation:**
    - **Result: 45 minutes / 9x slower (Thermal-Bound)**. The execution is severely thermal-bound due to restricted background power envelopes.
