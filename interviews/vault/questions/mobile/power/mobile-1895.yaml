title: A17 Pro NPU Keyword Spotting
scenario: A mobile neural engine wakes up for exactly 5ms every 50ms interval to run inference on accumulated audio chunks for a continuous keyword spotting application.
question: 'Describe the duty cycle percentage and compute the total active execution time the NPU spends over a full 1-minute period.'
visual:
  kind: svg
  path: mobile-1895.svg
  alt: A timeline depicting brief 5ms high states followed by 45ms low states repeating regularly.
  caption: NPU Duty Cycle (10%)
details:
  realistic_solution: 'The duty cycle is the active time divided by the total period: 5ms / 50ms = 0.10, or 10%. Over a 1-minute (60-second) period, the NPU will be actively executing for 10% of the time, which is 60 seconds * 0.10 = 6 seconds total.'
  common_mistake: |
    **The Pitfall:** Calculating the total number of cycles but failing to translate that back into total active seconds.
    **The Rationale:** Candidates often get stuck on cycle counts and forget the simple ratio approach for duty cycling.
    **The Consequence:** Providing an answer in "number of wake-ups" rather than the requested "total active execution time," or making simple arithmetic errors scaling up to one minute.
  napkin_math: |
    **Assumptions & Constraints:**
    - 5ms active per 50ms interval.
    - 1-minute total period.

    **Calculations:**
    - Duty Cycle = 5ms / 50ms = 0.10 (10%).
    - Total Active Time = 60 seconds * 0.10 = 6 seconds.

    **Conclusion & Interpretation:**
    - **Result: 6 seconds (Wake-Bound)**. Total active execution time over 1 minute.
