title: Tiered Sensor Hub Data Batching
scenario: A continuous health monitor on a Snapdragon 8 Gen 3 logs accelerometer data. Waking the primary application CPU frequently kills the battery.
question: Design a tiered duty-cycling system utilizing the always-on sensor hub to minimize main CPU wakeups.
visual:
  kind: svg
  path: mobile-1915.svg
  alt: Graph showing the sensor hub buffer filling slowly and dropping sharply when the main CPU wakes to drain it.
  caption: Sensor Hub Buffer Fill and Drain
details:
  realistic_solution: 'The ultra-low-power sensor hub samples the accelerometer at 100Hz and stores the data in a small local SRAM ring buffer. The main CPU is completely powered down. Once the sensor hub''s buffer reaches a high-water mark (e.g., every 5 seconds), it triggers an interrupt, waking the main CPU. The CPU rapidly drains the buffer in a few milliseconds, runs inference, and returns to sleep.'
  common_mistake: |
    **The Pitfall:** Polling the sensor directly from the main CPU.
    **The Rationale:** Developers rely on standard OS-level polling APIs without routing through the hardware-specific ultra-low-power DSP.
    **The Consequence:** Defeating the purpose of the dedicated sensor processor, keeping the high-power main CPU awake and rapidly draining the battery.
  napkin_math: |
    **Assumptions & Constraints:**
    - Sensor Rate: Accelerometer samples at 100Hz.
    - Buffer Period: Sensor hub buffers data for 5 seconds.

    **Calculations:**
    - Batch Size: 100Hz * 5s = 500 samples.

    **Conclusion & Interpretation:**
    - **Result: 500 samples/wakeup (Power-Bound)**. Waking the main CPU every 500 samples instead of every sample drastically reduces baseline power consumption.
