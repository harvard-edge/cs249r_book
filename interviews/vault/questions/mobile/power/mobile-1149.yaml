title: Architecting Thermal-Aware Sustained Video Processing on A17 Pro
scenario: You are architecting a real-time video super-resolution pipeline for a flagship mobile application. The workload is scheduled on the NPU, which shares unified memory with the CPU and GPU. While the NPU can achieve high peak TOPS, continuous video processing quickly hits thermal limits, leading to aggressive throttling and dropped frames.
question: How should a mobile video super-resolution pipeline sustain 30 FPS under a strict continuous thermal envelope?
details:
  realistic_solution: 'An L5 architect would design a dynamic, multi-tier pipeline with thermal-aware scheduling. The primary model must be quantized and sized to fit within the sustained power budget, prioritizing on-chip SRAM to minimize expensive unified memory accesses. Furthermore, the architecture should include a control loop that monitors SoC temperature and seamlessly degrades to a lighter model variant before hardware thermal throttling kicks in, ensuring consistent framerates.'
  common_mistake: |
    **The Pitfall:** Designing for peak performance instead of continuous thermal limits.
    **The Rationale:** Candidates assume peak TOPS at full wattage is always available and ignore the high power cost of constant read/writes to unified memory.
    **The Consequence:** Inevitable thermal throttling and dropped frames during continuous operation.
  napkin_math: |
    **Assumptions & Constraints:**
    - Peak NPU = 35 TOPS at 5W.
    - Thermal Envelope = 2W sustained for continuous 30 FPS video.

    **Calculations:**
    - Peak Efficiency = 35 TOPS / 5W = 7 TOPS/W.
    - Sustained Compute Capacity = 2W * 7 TOPS/W = 14 TOPS.
    - Per-Frame Budget = 14 TOPS / 30 FPS = 0.46 Tera-Ops/frame.

    **Conclusion & Interpretation:**
    - **Result: <0.46 T-Ops per forward pass (Thermally-bound architectural constraint)**. The model architecture must be heavily pruned to guarantee zero dropped frames.
