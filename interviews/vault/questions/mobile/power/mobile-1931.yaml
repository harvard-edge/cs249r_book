title: Describe hardware FIFO usage for smartwatch sensor duty cycling
scenario: A heart-rate monitoring algorithm on a smartwatch wakes up the main CPU every 10 milliseconds to check sensor data, heavily draining the battery.
question: Describe how modifying the sensor's hardware FIFO buffer configuration can improve the system's duty cycle.
details:
  realistic_solution: |
    Leverage the sensor's dedicated hardware FIFO buffer to aggregate telemetry data locally at the sensor level. By configuring the FIFO watermark interrupt to trigger only after collecting, for example, 100 consecutive readings, the main SoC can remain fully powered down in a deep sleep state for a full 1000 milliseconds. When the interrupt fires, the CPU wakes up, drains the buffer via rapid DMA batch processing, and immediately re-enters sleep. This slashes the power-intensive CPU state transition overheads.
  common_mistake: |
    **The Pitfall:** Thinking that processing 100 items at once takes more energy than processing 1 item 100 times.
    **The Rationale:** Candidates focus only on the active processing time.
    **The Consequence:** They completely ignore the massive power costs of CPU wake/sleep state transitions.
  napkin_math: |
    **Assumptions & Constraints:**
    - Initial wake interval: 10 ms per sample.
    - Target batch size: 100 samples.

    **Calculations:**
    - Current sleep duration between interrupts: < 10 ms.
    - New sleep duration = 10 ms/sample * 100 samples = 1000 ms (1 second).
    - CPU wake/sleep transition frequency drops by 99%.

    **Conclusion & Interpretation:**
    - **Result: 1000 ms (I/O Wakeup-Bound)**. The active processing power is trivial compared to the massive energy penalty of waking the CPU every 10ms. Utilizing hardware batching extends the sleep cycle by 100x, drastically reducing the thermal envelope.
