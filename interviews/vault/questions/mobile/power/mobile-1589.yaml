title: Thermal Management and Sustained Performance of Samsung Exynos 2400 NPU
scenario: A new mobile device is running a continuous augmented reality application requiring consistent ML inference for extended periods. The NPU is rated for a peak 34.7 TOPS.
question: How do mobile thermal management strategies impact the sustained versus burst performance profile of an NPU during continuous inference?
details:
  realistic_solution: 'To ensure sustained performance, engineers must implement a robust thermal management unit (TMU) that dynamically adjusts the NPU''s clock frequency and voltage based on temperature readings. Cooling strategies often include advanced passive solutions like large graphite sheets or vapor chambers to dissipate heat from the Exynos 2400 NPU. The system should also employ intelligent workload scheduling that can adapt inference batch sizes or model complexity to prevent thermal runaway, ensuring the NPU operates within its thermal design power (TDP) limits for the desired duration.'
  common_mistake: |
    **The Pitfall:** Designing system requirements around peak "burst" TOPS numbers.
    **The Rationale:** Engineers often use marketing specifications (e.g., 34.7 TOPS) to calculate continuous framerates without factoring in heat dissipation limits.
    **The Consequence:** The device rapidly overheats, aggressively downclocks the NPU, and causes massive frame drops in the AR application.
  napkin_math: |
    **Assumptions & Constraints:**
    - NPU Peak Power: 12W (burst operations).
    - Thermal Design Power (TDP): 5W (sustained workloads).
    - Peak Performance: 34.7 TOPS.

    **Calculations:**
    - Power constraint factor: 5W / 12W = 41.6%.
    - Sustained Performance: 34.7 TOPS * 41.6% ≈ 14.4 TOPS.

    **Conclusion & Interpretation:**
    - **Result: ~14.4 TOPS (Thermal-Bound)**. Sustained processing capability drops to ~14.4 TOPS (41.6% of burst) due to thermal throttling.
