title: Thermal Management and Sustained Performance of Samsung Exynos 2400 NPU
scenario: A new mobile device is running a continuous augmented reality application requiring consistent ML inference for extended periods. The NPU is rated for a peak 34.7 TOPS.
question: How do mobile thermal management strategies impact the sustained versus burst performance profile of an NPU during continuous inference?
details:
  realistic_solution: Burst performance reflects the short interval where the NPU can run near peak clocks before the phone's skin-temperature, battery, and SoC thermal limits dominate. During continuous AR inference, thermal management lowers sustained throughput by reducing clocks, migrating work, or forcing the application to use a lighter model, lower resolution, lower frame rate, or duty-cycled inference. Better cooling and workload scheduling can extend the burst window and make the eventual sustained level higher and smoother, but they do not turn the advertised peak TOPS into a continuous guarantee. The correct evaluation is an on-device soak test that records FPS, latency, power, temperature, and throttling over the full session length.
  common_mistake: |
    **The Pitfall:** Designing system requirements around peak "burst" TOPS numbers.
    **The Rationale:** Engineers often use marketing specifications (e.g., 34.7 TOPS) to calculate continuous framerates without factoring in heat dissipation limits.
    **The Consequence:** The device rapidly overheats, aggressively downclocks the NPU, and causes massive frame drops in the AR application.
  napkin_math: |
    **Assumptions & Constraints:**
    - NPU peak TOPS is a short-duration marketing or best-case number.
    - Sustained performance depends on workload utilization, memory bandwidth, cooling, ambient temperature, and DVFS policy.
    - Peak Performance: 34.7 TOPS.

    **Calculations:**
    - A valid sustained estimate requires measurement: run the AR workload for the target duration and record the steady-state FPS or tokens/sec after thermal equilibrium.
    - Example qualitative model: performance starts near burst, then drops in steps when thermal limits trigger lower clocks or lighter scheduling.
    - Do not compute sustained TOPS as peak TOPS multiplied by a power ratio; voltage/frequency curves and memory stalls are nonlinear.

    **Conclusion & Interpretation:**
    - **Result: Thermal-bound sustained throughput must be measured for the workload.** Thermal management trades a higher short burst for a lower but stable long-run rate, and app-level adaptation keeps latency predictable when throttling begins.
