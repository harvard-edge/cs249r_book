title: The Dashcam Battery Drain Dilemma
scenario: You're designing a dashcam feature that runs on a standard smartphone. When active, the ML model
  causes the SoC to consume 4 Watts.
question: For a continuous 30-minute trip, how much energy, in Watt-hours, does this feature consume from
  the phone's battery?
details:
  realistic_solution: The calculation is a direct application of the formula `Energy = Power × Time`.
    The key is to ensure the time is in hours to get the standard Watt-hour (Wh) unit for energy. A 30-minute
    trip is equivalent to 0.5 hours. Therefore, the total energy consumed is 4 Watts multiplied by 0.5
    hours, resulting in 2 Watt-hours.
  common_mistake: '**The Pitfall:** Confusing power (a rate in Watts) with energy (a quantity in Watt-hours).

    **The Rationale:** Engineers multiply power directly by minutes without converting to standard hourly
    units.

    **The Consequence:** Deducing impossibly large energy figures (like 120 Wh) and missing the actual
    battery capacity impact.

    '
  napkin_math: "1. **Assumptions & Constraints:**\n   - Constant power draw: 4 W.\n   - Continuous runtime:\
    \ 30 minutes.\n2. **Calculations:**\n   - Time in hours: 30 minutes = 0.5 hours.\n   - Energy Consumed:\
    \ Power * Time = 4 W * 0.5 h = 2 Wh.\n3. **Conclusion & Interpretation:**\n   - **Result: 2 Wh (Total\
    \ Battery Drain).**\n"
  options:
  - A) 120 Wh
  - B) 4 Wh
  - C) 2 Wh
  - D) 8 Wh
  correct_index: 2
