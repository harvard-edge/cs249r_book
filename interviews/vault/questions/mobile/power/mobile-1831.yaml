title: 'Mobile Thermal Guardrail Spec'
scenario: An on-device vision model runs within its latency target for two minutes, then critically slows as the phone heats up.
question: What thermal guardrails are required before shipping a mobile vision model that slows after two minutes?
details:
  realistic_solution: 'The specification must include sustained latency targets, thermal-state thresholds (e.g., Androids Thermal API), duty-cycle limits, a fallback model, a frame-skipping policy, and telemetry for throttling events. Passing a cold-start benchmark is insufficient for production deployment due to inevitable SoC thermal throttling.'
  common_mistake: |
    **The Pitfall:** Using cold-start benchmark latency as the shipping metric.
    **The Rationale:** Candidates ignore sustained thermal throttling that occurs after a few minutes of continuous dense matrix multiplication.
    **The Consequence:** The application works fine initially but degrades severely in real-world sustained usage, entirely missing strict latency budgets.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target framerate: 30 FPS (33 ms budget).
    - Cold latency: 25 ms.
    - Throttled latency: 45 ms.

    **Calculations:**
    - Cold headroom = 33 ms - 25 ms = 8 ms.
    - Throttled deficit = 45 ms - 33 ms = 12 ms.

    **Conclusion & Interpretation:**
    - **Result: 45 ms (Compute-Bound)**. At 45 ms, a 30 FPS pipeline will critically miss every single 33 ms frame deadline.
