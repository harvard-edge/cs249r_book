title: The Drowsy Driver's Battery Drain (mobile-0387)
scenario: "You're building a 'drowsiness detection' feature that runs on a smartphone's SoC. The SoC consumes 3W of power while the ML model is actively running. You implement a duty cycle where the feature is active for 50% of the time during a drive."
question: "How much energy does a 3W drowsiness detector use during a 1-hour drive when active 50% of the time?"
details:
  realistic_solution: |
    The correct answer is 1.5 Wh. The solution requires applying the formula for energy consumption that incorporates the duty cycle. You multiply the active power consumption by the duty cycle ratio and the total time period.
  common_mistake: |
    **The Pitfall:** Ignoring the duty cycle.
    **The Rationale:** Candidates calculate energy consumption as if the feature were active 100% of the time, or confuse power with energy.
    **The Consequence:** Overestimating battery drain by a factor of 2, leading to unnecessary optimization efforts.
  napkin_math: |
    **Assumptions & Constraints:**
    - Active Power: 3W.
    - Duty Cycle: 50% (0.5).
    - Time: 1 hour.

    **Calculations:**
    - Equation: Energy = Power * Duty Cycle * Time.
    - Calculation: 3 Watts * 0.5 * 1 hour = 1.5 Wh.

    **Conclusion & Interpretation:**
    - **Result: 1.5 Wh (Energy-Efficiency Bottleneck)**. Accurately modeling duty cycle prevents overestimating power consumption by 2x.
  options:
  - '3.0 Wh'
  - '6.0 Wh'
  - '1.5 Wh'
  - '0.05 Wh'
  correct_index: 2
