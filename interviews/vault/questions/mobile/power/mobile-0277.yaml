title: 'The Drowsy Drivers Battery Drain: Duty Cycling & Energy Harvesting'
scenario: Your automotive team is developing a Driver Drowsiness Detection feature for its companion mobile app. The feature uses the phone's front camera and an ML model. When active, the model consumes 4W of power from the mobile SoC. To save energy, it operates on a duty cycle running inference for 2 seconds, then sleeping for 8 seconds, repeating this pattern. A typical user drives for 2 hours per day.
question: How you would estimate the total daily energy consumption of this feature and calculate the final value in Watt-hours?
details:
  realistic_solution: 'The correct approach is to first calculate the average power consumption by factoring in the duty cycle, and then multiply by the total time. The feature is active for 2 seconds out of every 10-second period. This gives a duty cycle of 20%. The average power is the peak power multiplied by this duty cycle, which is then used to find the total energy.'
  common_mistake: |
    **The Pitfall:** Neglecting the duty cycle and calculating energy using peak power (4W) for the entire duration.
    **The Rationale:** Engineers ignore the critical role of duty cycling in managing power on mobile devices.
    **The Consequence:** This leads to a massive 5x overestimation, causing engineers to incorrectly reject a viable feature.
  napkin_math: |
    **Assumptions & Constraints:**
    - Duty Cycle: Active 2s, Idle 8s. Active time = 20%.
    - Peak Power: 4W.
    - Daily Usage = 2 hours.

    **Calculations:**
    - Average power = 4W * 0.20 = 0.8W.
    - Total energy = 0.8W * 2 hours = 1.6 Wh.

    **Conclusion & Interpretation:**
    - **Result: 1.6 Wh (Power-Bound)**. Total energy consumed is 1.6 Wh.
  options:
    - 8.0 Wh
    - 6.4 Wh
    - 1.6 Wh
    - 0.8 W
