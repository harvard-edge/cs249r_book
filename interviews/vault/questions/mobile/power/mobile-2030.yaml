title: Designing Hierarchical Wake-Up Pipelines for Mobile NPU
scenario: An always-on health app on an iPhone 15 uses the A17 Pro Neural Engine to classify anomalies in accelerometer data. Continuous inference drains the battery rapidly.
question: Design a duty-cycled pipeline using a low-power CPU threshold to trigger the Neural Engine, quantifying the expected power savings.
details:
  realistic_solution: 'Use the CPU efficiency cores to run a lightweight heuristic (e.g., variance thresholding) at 100 Hz, consuming microwatts. Only wake the A17 NPU when the threshold is crossed. If anomalies occur 5% of the time, the NPU active duty cycle drops from 100% to 5%, saving roughly 95% of the ML power draw.'
  common_mistake: |
    **The Pitfall:** Failing to account for wake-up overhead or designing a heavy first-stage heuristic.
    **The Rationale:** Candidates design a "lite" trigger model that is too complex, negating the power benefits of duty-cycling.
    **The Consequence:** The hierarchical pipeline consumes just as much power as continuous NPU execution.
  napkin_math: |
    **Assumptions & Constraints:**
    - Baseline active power: 1.0 W (100% duty cycle).
    - Anomaly rate: 5%.
    - Low-power CPU heuristic consumption: 0.01 W.

    **Calculations:**
    - Continuous Power: 100% active = 1.0 W.
    - Duty Cycled NPU Power: 5% anomaly rate * 1.0 W = 0.05 W.
    - Low-Power CPU Power: 95% idle time * 0.01 W = 0.0095 W.
    - Total Duty Cycled Power: 0.05 W + 0.0095 W = ~0.06 W.

    **Conclusion & Interpretation:**
    - **Result: ~0.06 W (Power-Bound)**. The duty-cycled pipeline consumes ~0.06 W vs 1.0 W continuous.
