title: 'The Mobile Thermal Wall'
scenario: 'You''re an ML engineer profiling a new on-device generative AI model. You observe that after running continuously for about a minute, the model''s performance consistently drops by 40-50%.'
question: 'What is the most likely physical limit the System-on-a-Chip (SoC) is encountering, and what is its approximate power value?'
details:
  realistic_solution: |
    The SoC is experiencing severe thermal throttling. It has exceeded its Thermal Design Power (TDP) for sustained passive cooling and is dynamically downclocking to prevent thermal runaway. A modern mobile SoC typically enforces a sustained thermal budget of only 3 to 5 Watts.
  common_mistake: |
    **The Pitfall:** Blaming software bugs or assuming laptop-class active cooling budgets (10-30W).
    **The Rationale:** ML engineers accustomed to data centers lack familiarity with mobile passive cooling constraints.
    **The Consequence:** Wasting time profiling memory leaks instead of addressing the fundamental 3-5W sustained thermal limit.
  napkin_math: |
    **Assumptions & Constraints:**
    - Passive cooling limits sustained dissipation to ~3W.
    - Generative AI load peaks at 8W.

    **Calculations:**
    - 60 seconds of 8W load saturates thermal mass.
    - The OS throttles clock speeds by 50% to return to the 3W envelope.

    **Conclusion & Interpretation:**
    - **Result: Thermal-Bound**. The system strictly enforces a ~3W sustainable limit via dynamic voltage and frequency scaling (DVFS).
  options:
  - 'The SoC is hitting a software power limit of around 30 Watts.'
  - 'The model is likely hitting a memory bandwidth limit of a few hundred milliwatts.'
  - 'The SoC is thermal throttling, hitting its sustainable power budget of 3-5 Watts.'
  - 'The operating system is de-prioritizing the app due to a 3W memory leak over 60 seconds.'
