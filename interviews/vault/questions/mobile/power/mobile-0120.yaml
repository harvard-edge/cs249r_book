title: The Thermal Throttling Prediction
scenario: Your video editing app runs a style transfer model at 30 FPS. For the first 45 seconds, inference takes a steady 12ms per frame. Then latency gradually climbs to 24ms over the next 30 seconds and stabilizes there. The user complains about stuttering after a minute. You cannot make the model faster.
question: How should a style-transfer app stay smooth when thermal throttling doubles latency after 45s?
details:
  realistic_solution: 'Build a **thermal-aware inference scheduler** that predicts throttling and adapts before the user notices. The thermal time constant is ~45s. At full 4W power, the SoC throttles at 45s, halving NPU frequency and doubling latency from 12ms to 24ms (below 30 FPS). Strategy: (1) Monitor SoC temperature via thermal sensors and predict throttle onset 10s in advance using the thermal curve. (2) At T-10s, proactively switch from the high-quality model (12ms at 4W) to a pre-compiled lighter variant at 720p (7ms at 2W). At 2W, thermal equilibrium stays below the throttle threshold indefinitely. (3) The user sees 30s of full-quality output, then a graceful resolution reduction — never stuttering. Compare: without thermal management, users get 45s of quality then permanent stutter at 15 FPS. With thermal management, they get 30s of premium quality then unlimited smooth 30 FPS at slightly reduced resolution.'
  common_mistake: |
    **The Pitfall:** Treating thermal throttling strictly as a hardware or user environment problem.
    **The Rationale:** Developers often assume that if a model is fully optimized and still throttles, the only solutions are adding a bigger heat sink or telling users to take breaks.
    **The Consequence:** The application provides a poor, stuttering user experience because the software fails to adapt to inevitable hardware thermal limits.
  napkin_math: |
    1. **Assumptions & Constraints:** Thermal time constant ~45s. Full 4W power triggers throttling at 45s, doubling latency from 12ms to 24ms. 2W maintains equilibrium.
    2. **Calculations:** Option A (unmanaged): 12ms for 45s, then 24ms (drops to 15 FPS, visible stutter). Option B (proactive): Burst at 4W for 30s (12ms), switch to 720p at 2W (7ms) indefinitely.
    3. **Conclusion & Interpretation:** **Result: Thermal-Bound.** A thermal-aware scheduler avoids the 24ms latency cliff, trading a slight resolution drop for unlimited 30 FPS smoothness.
