title: The Pocket Oven LLM
scenario: Your team ships an on-device LLM chatbot (3B params, INT4, 1.5 GB weights) on a Samsung Galaxy S24 Ultra (Snapdragon 8 Gen 3). Users love it — but after 5 minutes of continuous conversation, the phone hits 45°C skin temperature and Android triggers thermal throttling. The SoC junction temperature is 105°C. The user's phone is in their pocket (no convective cooling).
question: How would you calculate the thermal budget and design a system that prevents overheating?
details:
  realistic_solution: |
    Calculate the thermal budget as power in minus heat the phone can dissipate in the current environment. In a pocket, convective cooling is poor, so the sustained safe power is lower than the peak SoC power. Use measured thermal resistance/capacitance or device telemetry to estimate temperature rise over time, then set a proactive control loop: cap average NPU/GPU power below the pocket sustained limit, shorten generation bursts, pause or degrade quality before skin temperature approaches 45°C, and reserve headroom below the 105°C junction throttle point. The design should prevent the thermal wall rather than react after Android throttles.
  common_mistake: |
    **The Pitfall:** Throttling the NPU clock reactively when it gets hot.
    **The Rationale:** Candidates treat this as a software metrics problem rather than a physical limitation.
    **The Consequence:** By the time the SoC hits 105°C, the phone skin is already uncomfortably hot and the user has a degraded experience.
  napkin_math: |
    **Assumptions & Constraints:**
    - Full LLM inference power: 4.5W.
    - Estimated pocket sustained dissipation limit: 3W.
    - Initial junction temperature: 70°C. Throttle point: 105°C.
    - Measured heating rate at 1.5W overshoot: ~0.5°C/s for this device posture.

    **Calculations:**
    - Power overshoot = 4.5W - 3W = 1.5W.
    - Time to throttle = (105°C - 70°C) / 0.5°C/s = 70 seconds.
    - A 5-minute continuous conversation at 4.5W remains above the pocket limit long enough to accumulate heat, so throttling is expected.
    - Control target: keep rolling average inference power at or below about 3W, with additional margin as skin temperature approaches 45°C.
    - Example policy: run short bursts at 4.5W only while thermal headroom remains, then reduce decode rate, context length, or model tier so the average power returns to <=3W.

    **Conclusion & Interpretation:**
    - **Result: Power-bound thermal control problem.** The publishable budget is a sustained-power cap and feedback policy, not a token/s number derived from memory bandwidth. Prevent overheating by managing average watts and thermal headroom before the junction reaches 105°C.
