title: 'The Power Domain Juggling Act'
scenario: 'Your always-on keyword detection model runs on an ultra-low-power DSP island, drawing 2 mW. The product team wants to add an always-on face detection feature using the front camera, arguing a tiny vision model can also run on the DSP.'
question: 'Why does adding a tiny vision model to the low-power DSP inflate the system''s power budget by over 100x?'
details:
  realistic_solution: |
    Always-on vision requires the entire camera hardware pipeline (Sensor, ISP, DRAM, and SoC interconnects) to remain continuously powered. The energy cost of acquiring and moving pixel data vastly eclipses the negligible compute cost of the tiny ML model on the DSP.
  common_mistake: |
    **The Pitfall:** Analyzing only the ML model's FLOPs and ignoring the energy footprint of the underlying hardware data pipeline.
    **The Rationale:** Engineers hyper-focus on inference compute efficiency, forgetting that sensor activation and memory buses are massive power drains.
    **The Consequence:** The device battery drains in hours rather than weeks, making the always-on feature physically undeployable.
  napkin_math: |
    **Assumptions & Constraints:**
    - Audio pipeline = 2 mW.
    - Vision pipeline: Sensor (50 mW) + ISP (30 mW) + DRAM (20 mW) + NoC (10 mW) + DSP ML (1 mW).
    - Battery = 19 Wh.

    **Calculations:**
    - Vision addition = 111 mW.
    - Total power = 113 mW.
    - Battery life (Audio) = 19 Wh / 0.002 W = 9,500 hrs.
    - Battery life (Vision) = 19 Wh / 0.113 W = 168 hrs.

    **Conclusion & Interpretation:**
    - **Result: Power-Bound**. The camera sensor and ISP pipeline dictate a 100x increase in power draw, regardless of ML model size.
