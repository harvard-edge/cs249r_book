title: The Pocket Furnace
scenario: "Your company ships an on-device LLM assistant (3B parameters, INT4, 1.7 GB) on a flagship device. Users report their phone shut down with a thermal warning during a 10-minute conversation."
question: "Why does a 3B INT4 assistant overheat a mobile device during a 10-minute chat, and how can it stay responsive while remaining within the thermal budget?"
details:
  realistic_solution: "The active power draw (8W) exceeds the sustained physical thermal dissipation envelope (~5W). Deploy Speculative Decoding using a tiny draft model (e.g., 100M params) to drastically slash autoregressive generation power. The draft model cheaply predicts tokens, allowing the power-hungry 3B target model to run a single batched verification pass. This drops active system power back under the safety budget while keeping generation above human reading speeds."
  common_mistake: |
    **The Pitfall:** Proposing naive frequency throttling or adding sleep commands between token generations.
    **The Rationale:** Candidates aim for immediate power reduction without considering the UX impact of a brutally slow generation rate.
    **The Consequence:** The assistant becomes so slow that it falls below human reading speed, causing users to abandon the feature entirely.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Device sustained thermal budget: ~5W.
       - 3B INT4 active draw: ~8W. Overshoot: 3W.
       - Speculative Decoding: Draft model (100M, 0.5W), target verifies batches.
    2. **Calculations:**
       - Thermal overload (10 min) = 3W * 600s = 1800 Joules of excess heat.
       - Battery drain (10 min at 8W) = 1.33 Wh = 6.9% capacity.
       - Speculative decoding power = drops to ~4.5W (under budget).
    3. **Conclusion & Interpretation:**
       - **Result: Thermal-Bound.** Speculative decoding drops the average power to **4.5W**, allowing indefinite conversation length while maintaining a seamless 12 tok/s UX without triggering thermal shutdowns.
