title: Energy-Delay Product Optimization for Inference on A17 Pro
scenario: An iPhone app runs face detection in two modes. Mode A (ANE) has 0.8W active power and 1.5ms inference. Mode B (E-core CPU) has 0.15W active power and 500ms inference.
question: How would you calculate energy-delay product (EDP) for each mode and determine when each is optimal?
details:
  realistic_solution: 'EDP = energy × delay = (power × time) × time = power × time². ANE is 20,833× better in EDP. Energy: ANE 1.2mJ vs CPU 75mJ — ANE is 62.5× more energy efficient too. When to use E-core: only when ANE is occupied with a higher-priority blocking task.'
  common_mistake: |
    **The Pitfall:** Optimizing for power (Wattage) alone or latency alone.
    **The Rationale:** Candidates assume that lower wattage (0.15W CPU) means better battery life, completely ignoring the duration the processor remains active to finish the task.
    **The Consequence:** Selecting a mode that appears to save power but actually drains the battery faster while simultaneously destroying the user experience.
  napkin_math: |
    **Assumptions & Constraints:**
    - Mode A (ANE): 0.8W active power, 1.5ms latency.
    - Mode B (E-core): 0.15W active power, 500ms latency.

    **Calculations:**
    - Mode A Energy = 0.8W * 0.0015s = 1.2 mJ.
    - Mode A EDP = 1.2 mJ * 1.5ms = 1.8 µJ·s.
    - Mode B Energy = 0.15W * 0.5s = 75 mJ.
    - Mode B EDP = 75 mJ * 500ms = 37,500 µJ·s.
    - Ratio = 37,500 / 1.8 = 20,833x.

    **Conclusion & Interpretation:**
    - **Result: 20,833x Better EDP (Energy-Efficiency-Bound)**. The ANE provides a 20,833x better EDP and uses 62.5x less absolute energy. Always use ANE for real-time tasks.
