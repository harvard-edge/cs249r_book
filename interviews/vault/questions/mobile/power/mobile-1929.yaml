title: A17 NPU Wake Break-Even for Activity Recognition
scenario: A fitness app runs a 50 MFLOP activity model on an NPU. The NPU draws 1.0 W active, 10 mW gated. Wake takes 2 ms at 1.0 W, sleep takes 0.5 ms at 1.0 W. Compute takes 0.8 ms. User perception requires 10 Hz updates.
question: What is the per-second energy accounting to compute the break-even rate for always-on vs rate-gating, and what is the best rate?
details:
  realistic_solution: |
    Always-on keeps the NPU active for the full second, so it costs 1.0 W * 1 s = 1000 mJ/s. Rate-gating at f Hz costs 3.3 ms of active time per update (2 ms wake + 0.8 ms compute + 0.5 ms sleep) plus gated idle for the rest of the second: E(f) = 3.3f + 0.01(1000 - 3.3f) = 10 + 3.267f mJ/s while f <= 303 Hz. At the required 10 Hz, energy is 42.7 mJ/s, far below always-on, so run at the minimum acceptable 10 Hz. The break-even is about 303 Hz; above that the NPU is effectively always active.
  common_mistake: |
    **The Pitfall:** Ignoring the wake/sleep transition energy tax entirely.
    **The Rationale:** Candidates treat hardware sleep states as instantaneously free, focusing only on the 0.8ms compute time.
    **The Consequence:** They wrongly conclude that rapidly waking and sleeping the NPU at very high rates is cheap, draining the battery through hidden transition overhead.
  napkin_math: |
    **Assumptions & Constraints:**
    - Active: 1.0 W. Gated: 10 mW.
    - Wake: 2 ms. Sleep: 0.5 ms. Compute: 0.8 ms.
    - Target rate: 10 Hz.

    **Calculations:**
    - Per update active time = 2 ms wake + 0.8 ms compute + 0.5 ms sleep = 3.3 ms.
    - Per update active energy = 1.0 W * 3.3 ms = 3.3 mJ.
    - Gated idle energy per second = 10 mW * (1000 - 3.3f) ms = 0.01 * (1000 - 3.3f) mJ.
    - Rate-gated energy: E(f) = 3.3f + 0.01(1000 - 3.3f) = 10 + 3.267f mJ/s.
    - At 10 Hz: E(10) = 10 + 32.67 = 42.67 mJ/s.
    - Always-on energy: 1.0 W * 1 s = 1000 mJ/s.
    - Break-even: 1000 = 10 + 3.267f -> f = 990 / 3.267 ≈ 303 Hz.

    **Conclusion & Interpretation:**
    - **Result: 10 Hz rate-gated operation (Energy-Bound)**. The required 10 Hz update rate costs about 42.7 mJ/s versus 1000 mJ/s always-on, and the break-even is roughly 303 Hz, so the best rate is the minimum rate that satisfies UX.
