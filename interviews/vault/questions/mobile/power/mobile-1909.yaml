title: Mobile NPU Wake-Word Duty-Cycling Overhead
scenario: A Snapdragon 8 Gen 3 NPU runs wake-word detection. It wakes every 20ms to process a 5ms audio buffer, drawing 450mW active power and 5mW in deep sleep.
question: Calculate the average power consumption including a 2ms wake-up transient overhead that draws 200mW.
visual:
  kind: svg
  path: mobile-1909.svg
  alt: Timeline showing active, sleep, and transient power spikes across multiple 20ms periods.
  caption: Duty-Cycling Power Profile
details:
  realistic_solution: The period is 20ms. Active time is 5ms at 450mW. Wake transient is 2ms at 200mW. Sleep time is 13ms at 5mW. Energy per period is (5*450) + (2*200) + (13*5) = 2250 + 400 + 65 = 2715 uJ. Average power is 2715 uJ / 20ms = 135.75 mW.
  common_mistake: |
    **The Pitfall:** Ignoring the transition latency and power overhead entirely.
    **The Rationale:** Candidates assume perfect, instant shifts between active and sleep states.
    **The Consequence:** The calculated average power is drastically lower than reality, leading to battery budgets that fail in production.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Duty Cycle Period: 20ms.
       - Active State: 5ms at 450mW.
       - Wake Transient: 2ms at 200mW.
       - Sleep State: 13ms at 5mW.
    2. **Calculations:**
       - Active Energy: 5ms * 450mW = 2250 µJ.
       - Transient Energy: 2ms * 200mW = 400 µJ.
       - Sleep Energy: 13ms * 5mW = 65 µJ.
       - Total Energy/Period: 2250 + 400 + 65 = 2715 µJ.
       - Average Power: 2715 µJ / 20ms = 135.75 mW.
    3. **Conclusion & Interpretation:**
       - **Result: 135.75 mW Average Power. Ignoring the 2ms wake-up transient underestimates overall battery impact by nearly 15%.**
