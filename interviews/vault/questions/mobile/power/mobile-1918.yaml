title: Snapdragon NPU Duty-Cycling
scenario: A social media app on Snapdragon 8 Gen 3 runs continuous facial-landmark tracking at 30 FPS.
  The NPU draws 1.0 W when active and 10 mW when clock-gated. A frame takes ~5 ms. The team compares continuous
  execution (processing as it arrives) vs a batched duty-cycle (buffer 3 frames over 100 ms, process in
  15 ms, sleep for 85 ms).
question: What is the integrated energy-vs-latency trade-off of continuous vs batched duty-cycling policies?
details:
  realistic_solution: 'In continuous execution, the NPU processes a 5 ms frame every 33 ms. The 28 ms
    idle gaps are too short to enter the 10 mW deep sleep state, forcing the NPU to remain at the 1.0
    W active power level. Energy per 100 ms is 100 ms * 1.0 W = 100 mJ, with a per-frame latency of 33
    ms. Batched policy: the NPU processes 3 frames in 15 ms at 1.0 W = 15 mJ, plus 85 ms in deep sleep
    at 0.01 W = 0.85 mJ, totaling 15.85 mJ per 100 ms window. Energy ratio batched/continuous = 15.85/100
    = 0.16, roughly a 6.3x energy reduction. However, the first frame in each batch must wait for the
    100 ms window to fill plus 15 ms compute, making the worst-case user-perceived latency 115 ms vs 33
    ms. Recommendation: batched mode saves power but the 115 ms latency spike breaks the touch-to-response
    loop, making it unsuitable for live AR.'
  common_mistake: '**The Pitfall:** Optimizing strictly for maximum hardware sleep states without regard
    to UX feedback loops.

    **The Rationale:** Engineers blindly apply batching concepts from cloud or background tasks to real-time
    interactive pipelines.

    **The Consequence:** The resulting extreme latency spikes destroy the perception of real-time tracking,
    rendering the feature unusable for AR.

    '
  napkin_math: '**Assumptions & Constraints:**

    - Continuous mode prevents deep sleep due to short idle gaps, constantly drawing 1.0W.

    - Batched mode allows 85ms of 10mW deep sleep per 100ms window.


    **Calculations:**

    - Continuous Energy (per 100ms): 100ms * 1.0W = 100mJ.

    - Batched Energy (per 100ms): (15ms * 1.0W) + (85ms * 0.01W) = 15.85mJ.

    - Batched Latency: Wait 100ms for buffer + 15ms compute = 115ms worst-case.


    **Conclusion & Interpretation:**

    - **Result:** Batching saves ~6.3x energy but causes a severe 3.5x worst-case latency degradation,
    breaking AR UX.'
