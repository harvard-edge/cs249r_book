title: Snapdragon NPU Duty-Cycling
scenario: A social media app on Snapdragon 8 Gen 3 runs continuous facial-landmark tracking at 30 FPS. The NPU draws 1.0 W when active and 10 mW when clock-gated. A frame takes ~5 ms. The team compares continuous execution (processing as it arrives) vs a batched duty-cycle (buffer 3 frames over 100 ms, process in 15 ms, sleep for 85 ms).
question: What is the integrated energy-vs-latency trade-off of continuous vs batched duty-cycling policies?
details:
  realistic_solution: 'Continuous policy: NPU active for 100 ms at 1.0 W -> 100 ms * 1.0 W = 100 mJ per 100 ms window; per-frame latency = 33 ms (one frame interval). Batched policy: NPU active 15 ms at 1.0 W = 15 mJ plus 85 ms gated at 0.01 W = 0.85 mJ -> total 15.85 mJ per 100 ms window. Energy ratio batched/continuous = 15.85/100 = 0.16, ~6.3x energy reduction. The first frame in each batch must wait for the 100 ms window to fill plus 15 ms compute, so worst-case user-perceived latency = 100 + 15 = 115 ms vs 33 ms continuous - roughly 3.5x worse. Recommendation: batched mode is correct only when tracking is feeding a non-interactive consumer (e.g., post-capture beautify, recorded video pipeline). For live touch-driven AR the 115 ms tail break the touch-to- response loop and the energy win is not worth the UX cost; ship continuous mode and instead reduce the per-frame compute (e.g., lighter model on a slower core).'
  common_mistake: |
    **The Pitfall:** Optimizing strictly for maximum hardware sleep states without regard to UX feedback loops.
    **The Rationale:** Engineers blindly apply batching concepts from cloud or background tasks to real-time interactive pipelines.
    **The Consequence:** The resulting extreme latency spikes destroy the perception of real-time tracking, rendering the feature unusable for AR.
  napkin_math: |
    - **Continuous Energy (per 100ms):** 100ms active * 1.0W = 100mJ. Latency = 33ms.
    - **Batched Energy (per 100ms):** (15ms * 1.0W) + (85ms * 0.01W) = 15mJ + 0.85mJ = 15.85mJ.
    - **Batched Latency:** Wait 100ms for buffer + 15ms compute = 115ms worst-case.
    - **Final Result:** **Batching saves ~6.3x energy but causes a severe 3.5x worst-case latency degradation.**
