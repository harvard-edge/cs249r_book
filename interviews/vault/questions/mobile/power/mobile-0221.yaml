title: The 'Ambient Assistant' Battery Drain
scenario: 'An ''Ambient Assistant'' continuously listens for a wake word using a duty cycle: 1 second active at 2W, followed by 9 seconds asleep at 0.05W. The phone has a 15 Wh battery.'
question: What percentage of the total battery capacity will this feature consume over a 24-hour period?
details:
  realistic_solution: |
    The cycle is 10 seconds long: 1s active at 2W plus 9s asleep at 0.05W. Each cycle uses 2.45 J, so the average power is 2.45 J / 10s = 0.245 W. Over 24 hours that is 0.245 W * 24 h = 5.88 Wh. Relative to a 15 Wh battery, 5.88 / 15 = 39.2%, so the correct answer is ~39% (option B).
  common_mistake: |
    **The Pitfall:** Ignoring the sleep-state power draw when calculating daily energy consumption.
    **The Rationale:** Assuming 0.05W is negligible over short periods, forgetting it accumulates over 24 hours.
    **The Consequence:** Underestimating the battery impact by about 7 percentage points of battery capacity, leading to unexpected battery drain complaints.
  napkin_math: |
    **Assumptions & Constraints:**
    - Active power: 2W for 1s.
    - Sleep power: 0.05W for 9s.
    - Battery capacity: 15 Wh.

    **Calculations:**
    - Energy per 10s cycle: (2W * 1s) + (0.05W * 9s) = 2.45 Joules.
    - Average power: 2.45 J / 10s = 0.245 W.
    - Cycles per day: 86,400s / 10s = 8,640 cycles.
    - Total daily energy: 8,640 * 2.45 J = 21,168 Joules.
    - Equivalent daily Wh: 0.245 W * 24 h = 5.88 Wh, same as 21,168 J / 3600.
    - Percentage of battery: 5.88 Wh / 15 Wh = 0.392 = 39.2%.

    **Conclusion & Interpretation:**
    - **Result: ~39% Battery Use.** The feature consumes about 39.2% of the battery capacity over 24 hours.
  options:
    - ~32%
    - ~39%
    - ~164%
    - ~320%
