title: 'The ''Ambient Assistant'' Battery Drain'
scenario: 'An ''Ambient Assistant'' continuously listens for a wake word using a duty cycle: 1 second active at 2W, followed by 9 seconds asleep at 0.05W. The phone has a 15 Wh battery.'
question: What percentage of the total battery capacity will this feature consume over a 24-hour period?
details:
  realistic_solution: 'The correct approach is to calculate the time-weighted average power consumption and then multiply by the total time. The feature''s cycle is 10 seconds long (1s active + 9s sleep). The average power is the total energy per cycle (in Joules) divided by the cycle duration (in seconds). This average power (in Watts) can then be multiplied by 24 hours to find the total energy consumption in Watt-hours.'
  common_mistake: |
    **The Pitfall:** Ignoring the sleep-state power draw when calculating daily energy consumption.
    **The Rationale:** Assuming 0.05W is negligible over short periods, forgetting it accumulates over 24 hours.
    **The Consequence:** Underestimating the battery impact by ~18%, leading to unexpected battery drain complaints.
  napkin_math: |
    **Assumptions & Constraints:**
    - Active power: 2W for 1s.
    - Sleep power: 0.05W for 9s.
    - Battery capacity: 15 Wh.

    **Calculations:**
    - Energy per 10s cycle: (2W * 1s) + (0.05W * 9s) = 2.45 Joules.
    - Cycles per day: 86,400s / 10s = 8,640 cycles.
    - Total daily energy: 8,640 * 2.45 J = 21,168 Joules.
    - Conversion to Wh: 21,168 J / 3600 = 5.88 Wh.
    - Percentage of battery: 5.88 Wh / 15 Wh = 0.392.

    **Conclusion & Interpretation:**
    - **Result: 39.2% (Power-Bound)**. Feature consumes 39.2% of the battery capacity over 24 hours.
  options:
  - ~32%
  - ~39%
  - ~164%
  - ~320%
  correct_index: 1
