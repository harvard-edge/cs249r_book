title: Sustained Thermal Budgeting for Continuous LLMs
scenario: You are deploying a continuous live-translation feature using Gemini Nano on the Google Tensor G3. The product team expects the model to process audio streams continuously. However, continuous execution rapidly hits the device's thermal limits, causing severe throttling that degrades the entire OS experience.
question: How would you sustain continuous LLM audio processing within Tensor G3 thermal limits?
details:
  realistic_solution: The optimal approach is to operate the TPU at a lower, more efficient frequency curve and heavily batch the incoming audio streams. Instead of continuous processing, the system should process chunks of audio in bursts and then force the TPU and memory into a low-power state. If ambient temperatures rise, the system must dynamically scale down the processing rate or offload to the cloud before OS-level thermal mitigation forcibly degrades performance.
  common_mistake: |
    **The Pitfall:** Sizing the system based on peak TOPS compute without considering thermal throttling.
    **The Rationale:** Engineers ignore that mobile chips cannot sustain peak power and overlook the thermal contribution of keeping LPDDR5X memory continuously active.
    **The Consequence:** The model works flawlessly for 30 seconds before thermal mitigation forcibly degrades OS performance and drops frames.
  napkin_math: |
    **Assumptions & Constraints:**
    - Peak NPU Compute: 7.5 TOPS at ~3.0W.
    - Sustained Thermal Budget: ~1.5W.
    - Bandwidth Limit: 50 GB/s (yielding max 33 tokens/s for a 1.5 GB model).

    **Calculations:**
    - Max Sustained Compute: (1.5W budget / 3.0W peak) * 7.5 TOPS = 3.75 TOPS.
    - Duty Cycle Strategy: Compute at full 3.0W for 300ms, sleep for 700ms.
    - Average Power: (3.0W * 0.3) + (0.1W sleep * 0.7) = 0.9W + 0.07W = 0.97W.

    **Conclusion & Interpretation:**
    - **Result: 30% Duty Cycle Batching**. Heavily batching the audio to process in bursts and sleeping the NPU/RAM keeps the average power **< 1.5W**, completely avoiding thermal mitigation.
