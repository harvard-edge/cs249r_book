title: The 'Always-On' Battery Drain Dilemma
scenario: You are designing a 'Driver Safety Watch' feature for a smartphone app. It uses the microphone to continuously listen for distress keywords. The ML inference task runs for 100ms every second. During this active inference, the SoC consumes 3 Watts. For the other 900ms, the device is in a low-power listening state, consuming 50 milliwatts.
question: How much energy does an always-on keyword feature consume over 24 hours with 100ms active at 3W each second?
details:
  realistic_solution: 'The correct approach is to calculate the average power consumption by weighting the active and idle power states by their respective duty cycles, and then multiply by the total time.'
  common_mistake: |
    **The Pitfall:** Confusing peak power with average power or ignoring idle consumption.
    **The Rationale:** Engineers calculate energy drain as if the device consumes the peak 3W continuously, or they completely forget to add the 900ms low-power idle accumulation.
    **The Consequence:** Vastly overestimating or underestimating the true 24-hour battery drain.
  napkin_math: |
    **Assumptions & Constraints:**
    - Active Inference: 100ms/sec at 3W.
    - Idle state: 900ms/sec at 50mW (0.05W).
    - Duration: 24 hours.

    **Calculations:**
    - Active Energy per Second: 100ms * 3W = 0.3 Joules.
    - Idle Energy per Second: 900ms * 0.05W = 0.045 Joules.
    - Average Power: 0.3 + 0.045 = 0.345 Watts (Joules/sec).
    - Daily Energy Consumption: 0.345 W * 24 hours = 8.28 Wh.

    **Conclusion & Interpretation:**
    - **Result: ~8.3 Wh (Power-Bound)**. Total energy consumed is ~8.3 Wh.
  options:
  - 72 Wh (Confuses peak power with average power)
  - 7.2 Wh (Ignores the idle power consumption)
  - ~8.3 Wh
  - ~29.8 Wh (Incorrectly converts Joules to Watt-hours)
  correct_index: 2
