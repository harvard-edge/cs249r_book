title: 'The TDP Wall'
scenario: Apple claims the A17 Pro's Neural Engine delivers 35 TOPS. Qualcomm claims the Snapdragon 8 Gen 3's Hexagon NPU delivers 45 TOPS. Your ML team benchmarks the same INT8 MobileNetV2 on both and gets nearly identical inference times (~3.8ms).
question: How can a 45 TOPS chip tie with a 35 TOPS chip, and what does this tell you about evaluating mobile SoCs for ML?
details:
  realistic_solution: 'TOPS is a peak theoretical throughput measured under ideal conditions — all MAC units active, 100% utilization, no memory stalls. Real inference performance is governed by Thermal Design Power (TDP) and memory bandwidth, not peak TOPS.'
  common_mistake: |
    **The Pitfall:** Concluding that Qualcomms TOPS number must be inflated.
    **The Rationale:** Both numbers are technically accurate peak theoretical limits, but candidates fail to realize what TOPS actually measures.
    **The Consequence:** Engineers optimize models for peak TOPS instead of the actual bottlenecks (memory bandwidth and TDP).
  napkin_math: |
    **Assumptions & Constraints:**
    - MobileNetV2 INT8: ~0.6 GOPS. Weight size: ~3.4 MB.
    - Overhead (kernel launch, tensor copy, activations): ~3.7ms.

    **Calculations:**
    - Weight load at LPDDR5X 68 GB/s = 3.4 MB / 68 GB/s = 0.05ms.
    - Compute at 30 TOPS = 0.6 / 30,000 = 0.02ms.
    - Total: ~3.8ms on both chips.

    **Conclusion & Interpretation:**
    - **Result: 3.8ms (Overhead-Bound)**. The 3.7ms overhead dominates — neither chip's TOPS advantage matters for small models.
