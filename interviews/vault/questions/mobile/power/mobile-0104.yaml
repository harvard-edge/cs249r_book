title: The Silent Battery Drain
scenario: Your social media app includes an AI feature that continuously analyzes
  user content in the background for personalization. Users are reporting significant
  battery drain, even when they're not actively using the app.
question: What common pitfalls in mobile ML background processing lead to excessive
  battery drain, and how can you mitigate them?
details:
  realistic_solution: 'Excessive battery drain from background ML is overwhelmingly
    caused by system wake locks and continuous polling, not the pure computational
    cost of the model itself. Mitigations include:

    1. **Opportunistic Batching:** Leverage OS scheduling APIs (e.g., WorkManager,
    BackgroundTasks) to execute inferences only when the device is charging or in
    unmetered states.

    2. **Eliminate Polling Wakelocks:** Stop polling every few seconds. Wake locks
    prevent the CPU from entering deep sleep, burning immense power.

    3. **NPU/DSP Delegation:** Delegate all continuous execution to low-power DSP
    islands, ensuring the high-power main CPU stays asleep during inference.

    '
  common_mistake: '**The Pitfall:** Blaming the ML model size alone for battery drain
    and attempting model compression to fix it.

    **The Rationale:** Engineers assume that if a model is "heavy," making it smaller
    uses less battery, entirely missing the OS-level scheduling overhead required
    to execute the job.

    **The Consequence:** Months wasted pruning and quantizing a model, only to realize
    the background polling interval still drains the battery via system wakelocks.

    '
  napkin_math: "1. **Assumptions & Constraints:**\n   - NPU background inference:\
    \ 100ms duration, 0.3W power, running every 5 seconds.\n   - CPU Wake overhead:\
    \ Waking the CPU to schedule the NPU takes 1W for 10% of the entire day.\n   -\
    \ Target Battery Capacity: ~20 Wh = 72,000 Joules.\n2. **Calculations:**\n   -\
    \ NPU Energy/Day: 0.3W * 0.1s * (86,400s / 5s) = 518 Joules.\n   - CPU Wake Energy/Day:\
    \ 1W * (86,400s * 0.10) = 8,640 Joules.\n   - Total background drain: 9,158 Joules\
    \ (12.7% of total battery).\n3. **Conclusion & Interpretation:**\n   **Result:\
    \ CPU wakelocks use ~16x more energy than NPU inference (Power-Bound).** The architectural\
    \ anti-pattern of continuous CPU wakes structurally dominates the battery budget.\n"
