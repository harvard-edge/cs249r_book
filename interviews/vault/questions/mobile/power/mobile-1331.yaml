title: Calculate sustained FPS under A17 Pro thermal throttling
scenario: You are deploying a continuous object tracking model on an iPhone 15 Pro. For a prolonged AR session, the device's thermal management system restricts the sustained power budget for the ANE to just 1.5W. Your model requires 0.25 TOPS per inference.
question: What sustained FPS can an A17 Pro object tracker reach under a 1.5W ANE thermal power limit, assuming linear power scaling?
details:
  realistic_solution: The correct approach is to first determine the compute efficiency of the Apple A17 Pro Neural Engine in TOPS per Watt using the peak specifications. Then, apply this efficiency metric to the sustained thermal power envelope to find the maximum continuous TOPS available. Finally, divide the sustained TOPS by the model's compute requirement per frame to find the thermally safe frame rate.
  common_mistake: |
    **The Pitfall:** Assuming peak burst performance is available indefinitely.
    **The Rationale:** Candidates fail to calculate the TOPS/W efficiency metric to scale performance down to the sustained power budget.
    **The Consequence:** The calculated FPS is unrealistically high, causing severe thermal throttling in production.
  napkin_math: |
    **Assumptions & Constraints:**
    - Peak ANE performance: 35 TOPS at 5W.
    - Sustained thermal limit: 1.5W.
    - Model compute cost: 0.25 TOPS/frame.

    **Calculations:**
    - Peak efficiency: 35 TOPS / 5W = 7 TOPS/W.
    - Sustained TOPS: 7 TOPS/W * 1.5W = 10.5 TOPS.
    - Sustained FPS: 10.5 TOPS / 0.25 TOPS/frame = 42 FPS.

    **Conclusion & Interpretation:**
    - **Result: Maximum sustained frame rate is 42 FPS (Thermally-Bound).** Thermal throttling severely limits sustained FPS.
