title: Snapdragon Always-On Energy
scenario: A Snapdragon 8 Gen 3 NPU runs a continuous listening model. Profiling shows it is actively processing 10% of the time, drawing 50mW, and spends the remaining 90% in idle mode, drawing 2mW.
question: Apply the duty cycle to calculate the total energy consumed strictly in Joules over exactly 1 hour of operation.
visual:
  kind: svg
  path: mobile-1901.svg
  alt: 'A duty cycle timeline showing power hovering at 2mW and spiking to 50mW for 10% of every period.'
  caption: Listening Model Energy Profile
details:
  realistic_solution: 'First, calculate the time-averaged power consumption: (0.10 * 50mW) + (0.90 * 2mW) = 5mW + 1.8mW = 6.8mW, which is 0.0068 Watts. Total energy over 1 hour (3600 seconds) is Energy = Power * Time = 0.0068 W * 3600 s = 24.48 Joules.'
  common_mistake: |
    **The Pitfall:** Calculating energy in milliWatt-hours (mWh) without converting to Joules.
    **The Rationale:** Engineers often default to mWh for battery capacity but fail to use the standard SI unit (Joules) required for physics-based power calculations.
    **The Consequence:** Providing an answer in the wrong unit, causing misinterpretation in subsequent energy budget analyses.
  napkin_math: |
    **Assumptions & Constraints:**
    - Active processing: 10% duty cycle, 50mW power.
    - Idle mode: 90% duty cycle, 2mW power.
    - Time interval: 1 hour (3600 seconds).

    **Calculations:**
    - Time-averaged power: (0.10 * 50mW) + (0.90 * 2mW) = 5mW + 1.8mW = 6.8mW (0.0068 W).
    - Total Energy = Power * Time = 0.0068 W * 3600 s = 24.48 J.

    **Conclusion & Interpretation:**
    - **Result: 24.48 J (Power-Bound)**. Using standard SI units allows accurate integration into system thermal and battery budgets.
