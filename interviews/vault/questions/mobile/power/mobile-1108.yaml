title: Thermal Throttling on A17 Pro Neural Engine
scenario: You are profiling a real-time video segmentation model running on a mobile Neural Engine. Your model requires 175 GOPs per frame and processes video at 60 FPS. You observe that while the device handles short bursts fine, sustained execution causes the OS to lower the DVFS P-states, reducing inference speed, despite the compute operations taking only a fraction of the theoretical peak capacity.
question: Why does this sustained workload exceed the power budget and trigger thermal throttling on the shared unified memory architecture?
details:
  realistic_solution: 'The mobile Neural Engine shares a unified memory pool and package thermal budget with the CPU and GPU. While the pure compute requires only ~1.5W, continuous 60 FPS inference generates heavy memory traffic for weights and high-resolution activations. The combined power of NPU compute, DRAM data movement, and any concurrent CPU/GPU tasks pushes the total SoC package beyond its sustained thermal envelope (TDP), forcing the system to step down DVFS P-states to prevent overheating.'
  common_mistake: |
    **The Pitfall:** Calculating only theoretical compute power and ignoring memory data movement energy.
    **The Rationale:** Candidates often conclude the model only draws 1.5W based on TOPS/W specs, forgetting that the SoC shares a unified memory system where memory bandwidth consumes significant power.
    **The Consequence:** Failure to predict and mitigate thermal throttling caused by sustained memory traffic.
  napkin_math: |
    **Assumptions & Constraints:**
    - Compute requirement = 175 GOPs/frame at 60 FPS.
    - NPU efficiency = ~7 TOPS/W.
    - Memory traffic = 50 MB/frame at 60 FPS.
    - DRAM access energy = ~100 pJ/byte.

    **Calculations:**
    - Compute Power = (175 GOPs * 60) = 10.5 TOPS. 10.5 TOPS / 7 TOPS/W = 1.5W.
    - Memory Bandwidth = 50 MB * 60 FPS = 3.0 GB/s.
    - Memory Power = 3.0 GB/s * 100 pJ/byte = 0.3W (plus massive SoC interconnect overhead).

    **Conclusion & Interpretation:**
    - **Result: Chassis passive cooling limit exceeded (Thermally-bound due to memory movement)**. The sustained combined thermal load of compute and heavy memory traffic causes this over time.
