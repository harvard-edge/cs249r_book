title: Thermal Throttling in Shared NPU/ISP Pipelines
scenario: You are deploying a continuous camera processing pipeline on the Samsung Exynos 2400. The system uses shared memory to pass high-resolution frames between the ISP and the dual-core NPU. The mobile device has a strict continuous thermal dissipation limit of 4.0W for the SoC. In high-resolution camera mode, the ISP and shared memory subsystem consume 1.5W for 70% of the session; in preview mode, they consume 0.8W for the remaining 30%. The NPU consumes 3.5W when operating at its peak 34.7 TOPS, and the governor must avoid both instantaneous thermal excursions and long-window overheating.
question: Why does peak Exynos 2400 NPU use throttle in this camera pipeline, and what NPU TOPS caps should the governor use across high-resolution and preview modes?
details:
  realistic_solution: Because the memory is shared across the CPU, GPU, ISP, and NPU, camera data movement keeps the ISP and memory controller active before the NPU does any inference work. In high-resolution mode that baseline is 1.5W, leaving only 2.5W of the 4.0W total thermal budget for the NPU; in preview mode the 0.8W baseline leaves 3.2W. To avoid both instantaneous throttling and long-window overheating, the governor should cap NPU utilization by mode instead of assuming the NPU can always run at its 34.7 TOPS peak.
  common_mistake: |
    **The Pitfall:** Assuming the NPU can utilize the entire SoC thermal budget.
    **The Rationale:** Engineers calculate sustained performance based only on the NPU's peak power.
    **The Consequence:** They fail to subtract the baseline power required for continuous camera data movement, resulting in unachievable TOPS targets and rapid thermal throttling.
  napkin_math: |
    **Assumptions & Constraints:**
    - Total SoC Thermal Budget: 4.0W.
    - ISP & Memory Baseline: 1.5W in high-resolution mode, 0.8W in preview mode.
    - Mode Duty Cycle: 70% high-resolution, 30% preview.
    - Peak NPU Power: 3.5W.
    - Peak NPU Performance: 34.7 TOPS.

    **Calculations:**
    - High-Resolution NPU Power Cap: 4.0W - 1.5W = 2.5W.
    - High-Resolution Utilization Cap: 2.5W / 3.5W = 71.4%.
    - High-Resolution NPU Cap: 34.7 TOPS x 0.714 = 24.77 TOPS.
    - Preview NPU Power Cap: 4.0W - 0.8W = 3.2W.
    - Preview Utilization Cap: 3.2W / 3.5W = 91.4%.
    - Preview NPU Cap: 34.7 TOPS x 0.914 = 31.72 TOPS.
    - Duty-Cycle Average Cap: (0.7 x 24.77) + (0.3 x 31.72) = 26.86 TOPS.

    **Conclusion & Interpretation:**
    - **Result: 24.77 TOPS in high-resolution mode, 31.72 TOPS in preview mode, about 26.86 TOPS averaged over the session (Thermal-Bound)**. System-on-Chip shared architectures heavily limit isolated NPU power allowances.
