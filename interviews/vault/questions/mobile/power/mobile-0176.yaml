title: 'The Smart Reply Battery Drain'
scenario: 'You''re building a ''smart reply'' feature. The inference runs on the mobile SoC, drawing 4W of power for the 200ms it takes to generate a reply.'
question: 'How much energy does a smart reply feature consume in 24 hours if each 4W inference takes 200ms and runs 240 times?'
details:
  realistic_solution: 'The correct approach is to calculate the total active time of the feature over the 24-hour period and multiply that by the power draw. First, find the total number of inferences, then the total time the SoC is active, and finally convert that to energy in Watt-hours.'
  common_mistake: 'Engineers often confuse power (Watts) and energy (Watt-hours) or make unit conversion errors, especially between milliseconds, seconds, and hours. A common mistake is to calculate the power for a continuous operation rather than a duty-cycled one, leading to a massive overestimation of battery impact.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Inference power draw: 4W.
    - Inference duration: 200ms (0.2 seconds).
    - Frequency: 10 messages/hour for 24 hours.

    **Calculations:**
    - Inferences per day: 10 * 24 = 240 inferences.
    - Active time per day: 240 * 0.2 seconds = 48 seconds.
    - Total energy consumption: 4W * 48 seconds = 192 Joules.

    **Conclusion & Interpretation:**
    - **Result: 192 Joules (Power-Bound).** 192 Joules equates to ~0.053 Wh, representing a tiny fraction of a typical 15Wh phone battery over a full day.
  options:
  - '96 Wh'
  - '53.3 Wh'
  - '0.053 Wh'
  - '192 Wh'
