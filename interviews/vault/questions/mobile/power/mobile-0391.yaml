title: The Cellular Energy Tax
scenario: Your team is building a companion app for a new electric vehicle. You want to A/B test a predictive charging model that requires 1MB of the user's recent driving patterns as input.
question: 'Which uses more phone battery: uploading 1 MB over 4G for cloud inference or running a 100 MFLOP NPU inference?'
details:
  realistic_solution: |
    Sending the 1MB of data is vastly more expensive. The cellular radio amplifier can consume 1.5 - 2 Watts for the duration of the transfer, taking a noticeable fraction of a second. In contrast, a modern mobile NPU (like Apple's ANE or Qualcomm's Hexagon) can perform a 100 MFLOP inference in microseconds, consuming a microscopic fraction of that energy. The core physical principle is that moving data wirelessly over kilometers costs orders of magnitude more energy than executing dense matrix multiplications locally. This serves as the primary economic driver for on-device Federated Learning.
  common_mistake: |
    **The Pitfall:** Underestimating the physical energy cost of the cellular radio amplifier.
    **The Rationale:** Engineers intuitively perceive a "heavy" Neural Network as power-hungry, while assuming uploading a "small" 1MB payload is cheap.
    **The Consequence:** Designing cloud-dependent ML architectures that rapidly drain the user's battery compared to local execution.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Network: 4G LTE upload at ~2.5 MB/s. Radio power draw: ~1.5W.
       - Payload: 1 MB.
       - NPU Compute: 100 MFLOPs (~0.0001 Joules total energy cost).
    2. **Calculations:**
       - Network Upload Time: 1 MB / 2.5 MB/s = 0.4 seconds.
       - Network Energy: 1.5W * 0.4s = 0.6 Joules.
       - Energy Ratio: 0.6 Joules (Upload) / 0.0001 Joules (NPU Compute) = 6,000x difference.
    3. **Conclusion & Interpretation:**
       **Result: Uploading over 4G costs ~6,000x more energy (Energy-Bound).**
  options:
  - The on-device inference, by about 100x
  - They are roughly equal in energy cost
  - Sending the data, by over 10,000x
  - Sending the data, but only by about 10x
  correct_index: 2
