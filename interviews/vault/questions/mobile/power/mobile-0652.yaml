title: The Sun-Soaked Sentry Problem
scenario: You are the lead ML Systems Architect for a new flagship EV's 'Cabin Sentry' feature. This safety-critical system uses a CNN on the in-cabin camera to detect if a child or pet is left unattended. A key marketing requirement is that this feature can run for a full 12 hours while the car is parked and powered off, even in extreme heat, using no more than 5% of the car's 600 Wh auxiliary battery.
question: What are your first three architectural decisions to meet these conflicting thermal, power, and performance requirements on an automotive SoC?
details:
  realistic_solution: 'The absolute requirement is a cascaded, duty-cycled hardware architecture. Continuously running an ML model on a high-end automotive SoC guarantees thermal saturation and battery depletion due to massive static leakage power. First, implement an ultra-low-power, always-on sensor hub or low-resolution PIR sensor to trigger the main system only upon detecting motion. Second, aggressively duty-cycle the main SoC, batching frame inference into a fraction of a second and immediately power-collapsing the SoC into deep sleep for the remainder of the duty cycle. Third, leverage static quantization (INT8) and NPU acceleration during the active wake window to ensure the inference burst completes as rapidly as possible.'
  common_mistake: |
    **The Pitfall:** Focusing solely on algorithmic model optimization (e.g., switching to MobileNet).
    **The Rationale:** ML engineers mistake a better component for a better system design, ignoring the physical reality that any model running continuously on a high-end SoC will draw massive static power.
    **The Consequence:** Building an incredibly efficient model that still violently violates the battery and passive cooling budget because the SoC never sleeps.
  napkin_math: |
    **Assumptions & Constraints:**
    - Energy budget: 5% of 600 Wh = 30 Wh over 12 hours.
    - Max average power: 30 Wh / 12 h = 2.5 W.
    - Continuous active SoC power: ~5 W.
    - Deep sleep power: ~0.01 W.
    - Duty cycle: 10% active (100ms wake, 900ms sleep).

    **Calculations:**
    - Continuous baseline consumption: 5 W * 12 h = 60 Wh (violates 30 Wh budget by 2x).
    - Duty-cycled average power: (5 W * 0.1) + (0.01 W * 0.9) = 0.5 W + 0.009 W = 0.509 W.
    - Duty-cycled total energy: 0.509 W * 12 h = ~6.1 Wh.

    **Conclusion & Interpretation:**
    - **Result: 6.1 Wh (Static Power-Bound)**. Duty-cycling restricts consumption to ~6.1 Wh (1% battery), easily surviving extreme parking lot heat and adhering to the stringent 2.5W thermal dissipation limit.
