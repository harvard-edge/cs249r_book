title: The Battery Impedance Collapse
scenario: Your mobile app runs a massive diffusion model on the NPU to generate an image. When the phone is at 100% battery, it takes 3 seconds. When the phone is at 15% battery, the exact same operation takes 8 seconds. The OS is not officially in 'Low Power Mode'.
question: What analog electrical property of the battery forced the hardware to slow down?
details:
  realistic_solution: 'Battery internal resistance (IR) increases as state-of-charge drops. At 100% SoC, IR ≈ 0.05 ohms; at 15%, IR ≈ 0.2 ohms. When the NPU draws a 5A burst, voltage droop = I × R: 0.25V at 100% (safe) vs 1.0V at 15% (would crash the SoC). The Power Management IC (PMIC) preemptively limits current to ~2A to keep droop at 0.4V, cutting NPU throughput by 60%. This happens below ~20% SoC regardless of Low Power Mode settings. For ML apps: detect battery level via API, switch to a lighter model or reduce resolution below 20% to maintain UX quality.'
  common_mistake: |
    **The Pitfall:** Assuming the processor runs slower simply because the battery has lower voltage.
    **The Rationale:** Engineers think voltage linearly dictates clock speed, ignoring the Power Management IC (PMIC) and internal resistance.
    **The Consequence:** They fail to implement dynamic model scaling based on battery state-of-charge, leading to terrible UX for users on low battery.
  napkin_math: |
    **Assumptions & Constraints:**
    - Battery at 100%: Internal Resistance (IR) $\approx 0.05 \Omega$.
    - Battery at 15%: Internal Resistance (IR) $\approx 0.2 \Omega$.
    - NPU peak current draw: 5A.

    **Calculations:**
    - Voltage droop ($V=IR$) at 100%: 5A * $0.05 \Omega$ = 0.25V (Safe).
    - Voltage droop ($V=IR$) at 15%: 5A * $0.2 \Omega$ = 1.0V (Triggers SoC brownout).
    - PMIC Intervention: To maintain a safe 0.4V droop at 15% battery, PMIC limits current to $I = V/R = 0.4V / 0.2 \Omega = 2A$.

    **Conclusion & Interpretation:**
    - **Result: 60% Power Throttle**. The PMIC cuts the NPU current limit from 5A to 2A, reducing clock speed and increasing inference time from 3s to 8s to prevent a system crash.
