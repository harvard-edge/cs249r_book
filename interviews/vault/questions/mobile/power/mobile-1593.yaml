title: 'Energy Optimization on Samsung Exynos 2400 NPU: Memory vs. Compute Costs'
scenario: You are optimizing a neural network for a mobile NPU. Despite high theoretical TOPS, certain operations lead to disproportionately high energy consumption and reduced inference speeds when data movement to memory is frequent.
question: How would you optimize NPU energy by balancing memory access versus compute cost using Horowitz energy principles?
details:
  realistic_solution: Analyze the model's memory access patterns and employ operator fusion to combine small operations into a single kernel, reducing redundant memory I/O.
  common_mistake: |
    **The Pitfall:** Focusing entirely on minimizing FLOPs/TOPS.
    **The Rationale:** Candidates rely on traditional theoretical compute limits and ignore the massive power penalty of off-chip memory access.
    **The Consequence:** The optimized model remains highly memory-bound, draining the battery rapidly despite executing fewer mathematical operations.
  napkin_math: |
    **Assumptions & Constraints:**
    - Compute operation: 32-bit addition.
    - Memory operation: 32-bit DRAM access.
    - Assumed Bandwidth Volume: 50 GB/s.

    **Calculations:**
    - Compute energy cost (Horowitz): $\approx$ 0.1 pJ.
    - DRAM access energy cost (Horowitz): $\approx$ 100 pJ.
    - Energy disparity: Memory access is 1000x more expensive than compute.
    - Ops equivalent to bandwidth volume: 50 GB/s equals 12.5 billion 32-bit values/sec.

    **Conclusion & Interpretation:**
    - **Result: Memory Dominates Energy Budget**. High-volume memory transfers bottleneck throughput and completely dominate the energy budget, starving the NPU's compute units.
