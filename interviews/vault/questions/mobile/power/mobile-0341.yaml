title: 'The Dashcam Battery Drain Dilemma: Duty Cycling & Energy Harvesting'
scenario: You're developing a smart dashcam feature. The SoC draws 4W when actively running the CV model. The feature is active for 15 seconds, then idle for 45 seconds.
question: How much energy does the model consume during a 30-minute commute?
details:
  realistic_solution: |
    Calculate the average power consumption by applying the duty cycle, and then multiply that by the duration of the commute in hours to yield Watt-hours.
  common_mistake: |
    **The Pitfall:** Ignoring the duty cycle or messing up unit conversions.
    **The Rationale:** Candidates often calculate energy consumption as if the model runs continuously at full power, or they forget to convert the 30-minute commute into hours.
    **The Consequence:** The resulting energy estimation is either 4x too high or wildly inaccurate due to unit confusion, leading to poor battery management decisions.
  napkin_math: |
    **Assumptions & Constraints:**
    - Active power: 4W.
    - Duty cycle: 15s active / 60s total = 25%.
    - Duration: 30 minutes (0.5 hours).

    **Calculations:**
    - Average power: 4W * 0.25 = 1.0W.
    - Total energy: 1.0W * 0.5 hours = 0.5 Wh.

    **Conclusion & Interpretation:**
    - **Result: Sustainable Energy Draw.** The 25% duty cycle drops total consumption to 0.5 Wh, well within a typical mobile battery budget.
  options:
    - '2.0 Wh'
    - '30 Wh'
    - '0.5 Wh'
    - '120 Wh'
  correct_index: 2
