title: 'Specify hardware interrupts to maximize mobile accelerometer duty cycling'
scenario: A mobile phone uses its Snapdragon 8 Gen 3 to track user steps. Polling the accelerometer continuously prevents the CPU from entering low-power states.
question: How should the application use hardware interrupts to improve accelerometer duty cycling?
details:
  realistic_solution: 'Configure the accelerometer sensor internal registers to establish a motion threshold. Program the hardware to emit a physical interrupt (IRQ) over the I2C/SPI bus only upon threshold breach. This allows the primary Application Processor (CPU) to persist in a deep sleep C-state, dramatically reducing quiescent power draw until a step motion physically wakes the system.'
  common_mistake: |
    **The Pitfall:** Increasing the software polling sleep interval instead of using interrupts.
    **The Rationale:** Assuming fewer polls solves the power drain, without realizing any poll still wakes the CPU unnecessarily.
    **The Consequence:** The CPU continues to wake up periodically even when the device is stationary, draining the battery.
  napkin_math: |
    **Assumptions & Constraints:**
    - Software Polling: Wakes CPU constantly.
    - Hardware Interrupts: CPU stays in deep sleep.

    **Calculations:**
    - Poll wakeups: >0 even when stationary.
    - Interrupt wakeups: 0 when stationary.

    **Conclusion & Interpretation:**
    - **Result: 0 wakeups (Power-Bound)**. 0 CPU wakeups per minute if the phone is perfectly stationary, maximizing duty cycling efficiency.
