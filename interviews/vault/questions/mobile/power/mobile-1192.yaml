title: Energy Cost of Memory vs Compute on Tensor G3
scenario: Your team deployed two versions of an on-device LLM. Version A has fewer parameters but uses FP16 precision. Version B is an INT8 quantized model with more parameters but fits entirely within the TPU's SRAM. Telemetry shows Version A drains the battery significantly faster per inference.
question: Why can a larger INT8 model that fits in SRAM use less energy than a smaller FP16 model fetching DRAM?
details:
  realistic_solution: 'The total power draw of edge ML workloads is decisively dominated by data movement, not ALU compute. According to Mark Horowitz''s energy principles, accessing off-chip LPDDR DRAM consumes orders of magnitude more energy (~100pJ per read) than performing an on-chip MAC operation or fetching from localized SRAM (~5pJ). By aggressively quantizing Version B to INT8, the engineering team compressed the weight footprint enough to reside entirely within the TPU''s localized SRAM. Consequently, Version B trades extremely cheap silicon compute operations (increased MACs) to completely avoid the catastrophic energy tax of traversing the system bus to DRAM.'
  common_mistake: |
    **The Pitfall:** Assuming fewer operations automatically translate to lower power consumption.
    **The Rationale:** Candidates fail to account for the massive energy discrepancy between data movement and compute.
    **The Consequence:** Optimizing for FLOPs instead of memory access, leading to severe battery drain from off-chip LPDDR5X fetches.
  napkin_math: |
    **Assumptions & Constraints:**
    - Version A (FP16): 1B MACs, 100M DRAM reads.
    - Version B (INT8): 1.5B MACs, 10M DRAM reads, 140M SRAM reads.
    - FP16 MAC: 0.9 pJ. INT8 MAC: 0.2 pJ.
    - DRAM read: 100 pJ. SRAM read: 5 pJ.

    **Calculations:**
    - Version A Energy: (1B * 0.9pJ) + (100M * 100pJ) = 0.9mJ + 10mJ = 10.9mJ.
    - Version B Energy: (1.5B * 0.2pJ) + (10M * 100pJ) + (140M * 5pJ) = 0.3mJ + 1.0mJ + 0.7mJ = 2.0mJ.

    **Conclusion & Interpretation:**
    - **Result: 2.0 mJ (Memory Bus Energy-Bound)**. Version B consumes ~5x less energy despite performing 50% more compute because it sidesteps the massive 100pJ tax of fetching off-chip DRAM.
