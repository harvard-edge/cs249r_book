title: The Drowsy Driver's Battery Drain
scenario: 'You''re building a driver safety feature for a mobile app that detects signs of drowsiness. The ML inference process consumes 2W of power from the SoC''s NPU when active. To conserve battery, you decide to implement a duty cycle: the model runs for 1 second and then the system sleeps for 9 seconds.'
question: How would you calculate the total energy in Watt-hours (Wh) this feature will consume from the phone's battery over the course of an 8-hour road trip?
details:
  realistic_solution: The correct approach is to first calculate the average power consumption by factoring in the duty cycle, and then multiply by the total time to find the energy consumed.
  common_mistake: |
    **The Pitfall:** Calculating energy consumption without applying the duty cycle.
    **The Rationale:** Candidates often assume the feature runs continuously or confuse power (a rate in Watts) with energy (a quantity in Watt-hours).
    **The Consequence:** This leads to a 10x overestimation of battery drain, causing engineers to falsely abandon feasible features.
  napkin_math: |
    **Assumptions & Constraints:**
    - Active Power: 2W.
    - Duty Cycle: 1s active / 10s total.
    - Duration: 8 hours.

    **Calculations:**
    - Duty Cycle: 1s / 10s = 0.1.
    - Average Power: 2W x 0.1 = 0.2W.
    - Total Energy: 0.2W x 8 hours = 1.6 Wh.

    **Conclusion & Interpretation:**
    - **Result: 1.6 Wh Total Energy (Power-Bound)**. Aggressive sleep states maintain total battery cost at effectively negligible long-term thresholds.
  options:
  - 16 Wh
  - 0.2 Wh
  - 1.6 Wh
  - 1.8 Wh
  correct_index: 2
