title: The Thermal Cliff
scenario: Your on-device LLM generates tokens at 12 tokens/sec for the first 30 seconds,
  then drops to 4 tokens/sec and stays there. The user hasn't changed anything. CPU/GPU/NPU
  utilization all drop simultaneously.
question: What is happening, and why can't you just 'push through it'?
details:
  realistic_solution: Thermal throttling. Mobile SoCs have a tiny thermal mass — the
    chip sits behind a glass screen with no fan and minimal heat sink. Sustained high-power
    workloads (like autoregressive LLM generation) raise the junction temperature
    past the thermal governor's threshold. The governor *forcibly* reduces clock frequencies
    across all compute blocks — CPU, GPU, and NPU simultaneously — to keep the SoC
    below its thermal design limit (~95°C junction). You can't "push through" because
    the throttling is enforced in hardware/firmware, below the OS.
  common_mistake: '**The Pitfall:** Assuming the model is running out of KV-cache
    memory and swapping.

    **The Rationale:** Developers attribute performance drops to memory limits because
    that is common on desktops.

    **The Consequence:** They waste time optimizing memory instead of addressing the
    core issue: sustained high-power workloads exceed the phone''s thermal dissipation
    capability.

    '
  napkin_math: '**Assumptions & Constraints:**

    - Active Power Draw: NPU (~3W) + CPU (~1W) = 4W total.

    - SoC Sustained Thermal Budget: ~3.5W (to stay below ~95°C junction temp).


    **Calculations:**

    - Throttling Trigger: 4W > 3.5W. Excess heat accumulates over 30 seconds.

    - Throttling Effect: Hardware thermal governor cuts clock frequency by ~60%.

    - Throughput Drop: 12 tokens/sec × (1 - 0.60) = ~4.8 tokens/sec.


    **Conclusion & Interpretation:**

    - **Result: Thermal-Bound**. The persistent 4 tok/sec speed is enforced entirely
    in hardware via the SoC''s thermal governor to respect the **3.5W continuous dissipation
    limit**.

    '
