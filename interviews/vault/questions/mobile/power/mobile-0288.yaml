title: The Drowsy Driver's Dilemma
scenario: Your team is developing a 'Drowsiness Detection' feature for a ride-sharing driver app. It runs a small audio model on-device to listen for yawns. The feature must run continuously in the background during a driver's 8-hour shift without causing unacceptable battery drain.
question: Which of the following factors is the MOST critical lever for managing the total battery energy consumed by this feature over the entire shift?
details:
  realistic_solution: The `duty_cycle` is the most critical lever. This is the fraction of time the inference is active. Reducing the duty cycle (e.g., by running a 1-second inference every 10 seconds instead of continuously) directly and linearly reduces total energy consumption. For a long-running background task, managing this is paramount to delivering a feature that users don't disable due to battery drain.
  common_mistake: |
    **The Pitfall:** Focusing exclusively on the model's peak inference power (Watts).
    **The Rationale:** Engineers believe making the model faster or smaller is the only solution, forgetting that for continuous tasks, *how often* it runs dictates the total energy drain.
    **The Consequence:** The feature consumes excessive power over the 8-hour shift, leading users to disable it to save battery.
  napkin_math: |
    1. **Active Power:** The ML inference draws 2W continuously.
    2. **Duration:** 8 hours = 28,800 seconds.
    3. **Continuous Energy:** 2W * 8h = 16 Watt-hours (Wh).
    4. **Drain Impact:** 16 Wh / 18.5 Wh standard battery = **86.5% battery drain**. This is unacceptable, proving that aggressive duty cycling is strictly required.
  options:
  - The peak power draw of the inference (Pinference)
  - The amount of RAM the model's activations consume
  - The duty cycle of the inference process
  - The speed of the phone's flash storage (UFS 4.0)
  correct_index: 2
