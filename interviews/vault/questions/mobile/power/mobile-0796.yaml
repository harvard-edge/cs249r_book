title: Always-On Wake Word Battery Drain
scenario: A smartphone has a 3000mAh battery operating at 3.8V. We are deploying an always-on wake-word model. Running it on the main CPU consumes a continuous 40mW. Offloading to a dedicated DSP consumes only 4mW continuously, but requires waking up the main LPDDR memory for 10ms every 1 second to flush audio buffers, consuming 200mW during that 10ms spike.
question: How would you calculate the percentage of battery drained over 24 hours for the DSP approach?
details:
  realistic_solution: |
    To calculate battery drain percentage, first convert the battery capacity to energy: 3000mAh = 3Ah, and 3Ah * 3.8V = 11.4Wh = 11,400mWh. The DSP uses 4mW continuously. The LPDDR wake-up costs 200mW for 10ms every second, which is a 1% duty cycle, so its average contribution is 2mW. The DSP approach therefore averages 6mW. Over 24 hours it consumes 6mW * 24h = 144mWh, which drains 144 / 11,400 * 100 = 1.26% of the battery.
  common_mistake: |
    **The Pitfall:** Treating battery capacity merely as mAh without a voltage scalar, or ignoring the specific fractional duty cycle of the memory wake-up.
    **The Rationale:** Candidates habitually use mAh directly without standardizing to physical Watt-hours, and often simply sum peak power measurements instead of integrating the energy under the time curve.
    **The Consequence:** Wildly inaccurate structural power estimates that falsely classify efficient hardware offloading schemes as power failures.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Battery specs: 3000 mAh at 3.8V.
       - DSP continuous baseline power: 4 mW.
       - LPDDR wake power spike: 200 mW for 10 ms every 1000 ms (1% duty cycle).
    2. **Calculations:**
       - Total Battery Energy Capacity: 3000 mAh = 3 Ah; 3 Ah * 3.8 V = 11.4 Wh = 11,400 mWh.
       - Average Memory Flush Power: 200 mW * 0.01 = 2 mW.
       - Total Average System Power (DSP + Memory): 4 mW + 2 mW = 6 mW.
       - Energy Consumed in 24 Hours: 6 mW * 24 hours = 144 mWh.
       - Drained Percentage: (144 mWh / 11,400 mWh) * 100 = 1.26%.
    3. **Conclusion & Interpretation:**
       **Result: 1.26% daily drain (Energy-Bound solved).** Aggressively duty-cycling the memory bus ensures the DSP pipeline comfortably supports transparent always-on ML processing.
