title: 'The Adaptive Power Maestro'
scenario: 'For a critical real-time ML feature on a mobile device, you need to guarantee a minimum inference rate (e.g., 30 FPS) while simultaneously minimizing average power consumption. The computational load can vary significantly depending on scene complexity.'
question: 'How would you design a system to dynamically adapt the SoC''s operating parameters to meet both the performance and power constraints?'
details:
  realistic_solution: "This requires a sophisticated **Dynamic Voltage and Frequency Scaling (DVFS)** strategy, potentially combined with adaptive workload management:\n  1.  **Performance Monitoring Loop:** Continuously monitor the actual inference latency (and thus FPS) of the ML model.\n  2.  **Predictive Workload Estimation:** Estimate the complexity of the current frame/scene. For optical flow, this might involve analyzing motion vectors, texture richness, or simply using the previous frame's inference time as a predictor for the next.\n  3.  **DVFS Governor Interaction:**\n      *   **Target-based Control:** Instead of fixed frequencies, aim for a target latency. If current latency is too high, request a higher frequency/voltage for the NPU/GPU. If latency is well below the target, request a lower frequency/voltage.\n      *   **OS Scheduler Hints:** Utilize platform-specific APIs (e.g., Android `PerformanceHintManager`, `cpu_boost` sysfs interface) to communicate the performance requirements to the OS's CPU/NPU governors. The OS can then adjust DVFS and scheduling priorities.\n      *   **Custom Governor (if available/necessary):** For highly specialized scenarios, a custom user-space governor could be implemented (often requires root/privileged access or kernel modifications, less common for app developers).\n  4.  **Thermal Feedback:** Integrate thermal sensor readings. If the device is approaching thermal limits, prioritize frequency reduction over performance to prevent throttling, possibly degrading gracefully (e.g., dropping to 25 FPS instead of 30 FPS).\n  5.  **Power-Performance Curves:** Characterize the NPU/GPU's power consumption at different frequency/voltage points for your specific workload. This allows for intelligent decisions: for example, if 80% of max frequency gives 95% of max performance but only 60% of max power, it's a sweet spot.\n  6.  **Adaptive Batching/Model Switching:** If the NPU can handle it, dynamically adjust batch size. For very low scene complexity, switch to a lighter model variant; for high complexity, consider temporarily increasing frequency or even offloading a portion to the CPU/GPU if latency is critical and power budget allows.\n  7.  **Idle State Management:** Ensure the NPU/GPU quickly returns to low-power idle states when no ML computation is active."
  common_mistake: |
    **The Pitfall:** Simply setting the NPU to its maximum frequency to guarantee performance.
    **The Rationale:** Candidates prioritize latency requirements over power budgets, treating mobile like a server environment.
    **The Consequence:** Rapid battery drain, severe thermal throttling, and ultimately degraded performance over time.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target Latency: 30 FPS = ~33 ms/frame.
    - Simple Scene: 10 ms at 800 MHz. Can scale down to 400 MHz (reducing power) while keeping latency < 33 ms.

    **Calculations:**
    - Complex Scene: 25 ms at 800 MHz. Can boost to 1.2 GHz to keep latency < 33 ms.

    **Conclusion & Interpretation:**
    - **Result: < 33 ms (Power-Bound)**. Dynamically scaling frequency based on frame complexity allows hitting the target while minimizing area under the power curve.
