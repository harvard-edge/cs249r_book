title: On-Device vs Cloud Inference Energy Budget on Tensor G3
scenario: A Pixel phone with Tensor G3 can run a voice assistant model locally in 80ms at 400mW, or offload to cloud in 200ms round-trip consuming 150mW for WiFi radio transmission. The user makes 200 voice queries/day.
question: How would you compare energy consumption to analyze under what conditions cloud offload is more efficient?
details:
  realistic_solution: 'On-device per query: 400mW × 80ms = 32mJ. Cloud per query over WiFi: TX+RX = 150mW × 200ms = 30mJ, plus 50mW idle = 40mJ total. For 200 queries/day, local execution uses 6.4J vs 8.0J for cloud. On-device is thus 20% more efficient. Cloud wins only if: (1) the model footprint exceeds Tensor G3 RAM limits, (2) the radio cost is amortized over heavy streaming payloads. Over an LTE radio (1-2W draw), cloud offload becomes massively inefficient.'
  common_mistake: |
    **The Pitfall:** Comparing only inference latency and ignoring the network radio's energy tax.
    **The Rationale:** Candidates focus solely on the fact that datacenter GPUs draw more raw power, forgetting that mobile battery life is dictated by local radio transmission.
    **The Consequence:** They falsely conclude cloud offload is universally more energy-efficient, draining the user's battery over expensive LTE transfers.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Queries: 200/day.
       - On-Device: 80ms @ 400mW.
       - WiFi Cloud: 200ms @ 150mW (active) + 50mW (idle).
       - LTE Cloud: 200ms @ 1.5W.
    2. **Calculations:**
       - On-Device Energy: 400mW * 0.08s = 32mJ per query (6.4J/day).
       - WiFi Energy: (150mW * 0.2s) + (50mW * 0.2s) = 40mJ per query (8.0J/day).
       - LTE Energy: 1.5W * 0.2s = 300mJ per query (60J/day).
    3. **Conclusion & Interpretation:**
       - **Result: Energy-Bound.** On-device inference saves 20% power over WiFi and is 9.4x more efficient than LTE, proving local processing extends battery life.
