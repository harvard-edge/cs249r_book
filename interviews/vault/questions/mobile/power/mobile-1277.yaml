title: Diagnosing TPU Throttling During Sustained Gemini Nano Generation
scenario: A live transcription feature using Gemini Nano on the Google Tensor G3 runs fast for 30 seconds, then drops token generation speed by 60% and the device chassis becomes warm. Memory utilization remains perfectly flat.
question: Why does Gemini Nano on Tensor G3 slow by over 60% after 45s while LPDDR5X memory use stays flat?
details:
  realistic_solution: The symptom strongly indicates thermal throttling. The Tensor G3's TPU is optimized for bursty on-device LLM workloads but cannot sustain continuous heavy utilization indefinitely within a passively cooled smartphone chassis. As continuous generation heats up the SoC past its safe thermal envelope, the operating system aggressively scales down the TPU clock frequency to prevent hardware damage. Verification requires tracing the device's thermal zones alongside TPU clock speeds to confirm the frequency drop aligns exactly with the temperature trip point.
  common_mistake: |
    **The Pitfall:** Misdiagnosing thermal throttling as a memory leak or KV cache saturation.
    **The Rationale:** Candidates are accustomed to cloud environments with unlimited cooling, so they instinctively blame software architecture when inference slows down.
    **The Consequence:** They waste engineering cycles refactoring memory allocators instead of addressing the physical heat constraint of a mobile chassis.
  napkin_math: |
    - **Heat Accumulation:** Active TPU + Memory draws 4.5W. Passive cooling dissipates 2.5W. Net accumulation = 2W.
    - **Temperature Rise:** If 1.5 Joules raises temp by 1°C, 2W (2 J/s) = 1.33°C rise per second.
    - **Threshold Hit:** Starting at 25°C, in 30 seconds the SoC hits ~65°C.
    - **Final Result:** **The OS aggressively throttles clock frequency down to the 2.5W limit, cutting available TOPS and crashing token throughput.**
