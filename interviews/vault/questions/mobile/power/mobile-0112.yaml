title: The Background ML Battery Drain
scenario: Your photo app has a background ML feature that auto-tags photos using an on-device classification model (MobileNetV3, 5 MB, INT8). Users report 15% battery drain overnight. The model inference takes 3ms per photo. With 200 photos, that's 600ms of total inference compute.
question: Why does a tiny MobileNetV3 photo tagger with only 600 ms of total inference compute drain 15% of the battery overnight?
details:
  realistic_solution: |
    The massive battery drain has little to do with the ML inference and much more to do with OS-level wake patterns. By processing the photos incrementally, the app can wake the device from deep sleep repeatedly throughout the night, pull in storage and image decode work, and keep background services active around a tiny amount of model compute. The correct architectural fix is to use platform batch APIs that coalesce the work into a single constrained background job, such as BGProcessingTask on iOS or WorkManager/JobScheduler on Android, and require charging or idle conditions for non-urgent tagging.
  common_mistake: |
    **The Pitfall:** Assuming the neural network compute is intrinsically the primary cause of the battery drain.
    **The Rationale:** ML engineers tunnel-vision on the network topology, assuming that optimizing the model size or parameter count will structurally lower battery use.
    **The Consequence:** Spending weeks pruning and quantizing a model that represents less than 0.02% of the actual energy consumed, entirely ignoring the catastrophic system wake patterns.
  napkin_math: |
    **Assumptions & Constraints:**
       - Workload: 200 photos, 3 ms inference/photo.
       - Component Power: NPU (~2W), CPU Wake Overhead (~2W), ISP/Storage Decode (~3W).
       - Background Pattern: Device un-batches the work, waking 10 separate times overnight.
       - Each wake keeps the application and OS out of deep sleep for about 60s around scan, decode, bookkeeping, and sync work.
    **Calculations:**
       - ML Inference Energy: 200 photos * 0.003s * 2W = 1.2 Joules.
       - Image Decode Energy: 200 photos * 0.050s * 3W = 30 Joules.
       - Wake/active overhead: 10 wakes * 60s * 2W = 1200 Joules.
       - Model attribution in this estimate: 1.2 Joules / (1.2 + 30 + 1200 Joules) = ~0.1%.
    **Conclusion & Interpretation:**
       **Result: System-Overhead-Bound.** Uncoalesced background wakes dominate this estimate by roughly three orders of magnitude over inference energy. Model optimization may still help at the margin, but batching and charging/idle constraints are the primary battery fix.
