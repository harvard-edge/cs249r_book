title: NPU Thermal Energy Bounds
scenario: An AR app runs 60fps object detection. Inference is 5ms at 2W active, and idle NPU power is 100mW.
question: Evaluate the thermal impact over a 1-hour session by computing total NPU energy consumed.
visual:
  kind: svg
  path: mobile-1953.svg
  alt: Square wave showing 5ms active peaks and 11.6ms idle valleys
  caption: NPU Power Duty Cycle over 1 Frame
details:
  realistic_solution: |
    Calculate the duty cycle to determine average thermal load. A 60fps target provides a 16.6ms frame window. Using the NPU for 5ms yields a 30% duty cycle. Weighting the 2W active and 100mW idle power yields a continuous equivalent of 0.67W. This proves the system operates well within the continuous thermal envelope without throttling.
  common_mistake: |
    **The Pitfall:** Using the peak active power as continuous without factoring in the duty cycle.
    **The Rationale:** Engineers often look at the 2W spec sheet number and assume it applies constantly during execution.
    **The Consequence:** Vastly overestimating thermal generation and rejecting perfectly viable real-time architectures.
  napkin_math: |
    **Assumptions & Constraints:**
    - Frame Budget: 16.6 ms (60fps)
    - Active NPU time: 5 ms
    - Active Power: 2W
    - Idle Power: 0.1W

    **Calculations:**
    - Duty Cycle: 5 ms / 16.6 ms = ~30%
    - Average Power: (2W * 0.3) + (0.1W * 0.7) = 0.6W + 0.07W = 0.67W
    - 1-Hour Energy: 0.67W * 1h = 0.67 Wh

    **Conclusion & Interpretation:**
    - **Result: 0.67 Wh (Duty-Cycle/Power-Bound)**. Total NPU energy is 0.67 Wh.
