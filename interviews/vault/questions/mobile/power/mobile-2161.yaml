title: Race-to-Sleep vs. Paced Execution for Mobile LLMs
scenario: To prevent the 3B-parameter LLM from triggering the 45°C thermal throttle during continuous
  chat, your team proposes two power management policies. Strategy A (Race-to-Sleep) runs the NPU at maximum
  frequency to generate tokens at 60 tok/s, then aggressively power-gates the SoC while the user reads.
  Strategy B (Paced Execution) pins the NPU to a lower voltage/frequency tier, generating tokens at a
  steady 15 tok/s to match the user's reading speed.
question: Which power management strategy yields a lower overall thermal load for this continuous generative
  workload, and how do Dynamic Voltage and Frequency Scaling (DVFS) principles justify your choice?
details:
  realistic_solution: Strategy B (Paced Execution) yields a significantly lower thermal load. Because
    dynamic power consumption scales quadratically with voltage (P ∝ V²f), operating at a lower voltage/frequency
    tier drastically reduces the total energy (Joules) consumed per token. The disproportionate power
    cost at peak voltage in Strategy A overwhelms any energy savings gained from power-gating during short
    conversational pauses.
  common_mistake: '**The Pitfall:** Selecting Race-to-Sleep because it minimizes the total active computation
    time.

    **The Rationale:** Engineers often default to ''Race-to-Sleep'' as it is a proven mobile heuristic
    for bursty background tasks, where returning to a deep sleep state quickly saves battery.

    **The Consequence:** The device suffers severe thermal spikes from running the NPU and memory bus
    at peak voltage, hitting the thermal throttle threshold much faster and degrading the sustained generative
    experience.'
  napkin_math: '**Assumptions & Constraints:**

    - NPU Max State (Strategy A): V=1.0V, f=1.0GHz, Power=4.0W. Latency=16ms/token.

    - NPU Low State (Strategy B): V=0.6V, f=0.33GHz. Latency=48ms/token.

    - Target generation: 100 tokens.


    **Calculations:**

    - Power at Low State (B): P is proportional to V² * f -> (0.6²) * (0.33/1.0) * 4.0W = 0.47W.

    - Energy per token (A): 4.0W * 0.016s = 0.064 Joules.

    - Energy per token (B): 0.47W * 0.048s = 0.022 Joules.

    - Total Energy for 100 tokens: Strategy A = 6.4J, Strategy B = 2.2J.


    **Conclusion:**

    Paced Execution (Strategy B) consumes nearly 3x less energy per sequence. Since dissipated heat is
    directly proportional to total energy consumed, Strategy B significantly delays or prevents thermal
    throttling.'
