title: The Battery Blame Game
scenario: Your ML-powered fitness app drains 1% battery per minute during a workout. The PM says 'the model is too expensive \u2014 optimize it.' You profile the power breakdown and find the model is not the main culprit.
question: If ML averages only 20 mW, what drains 1% battery per minute in the workout app?
details:
  realistic_solution: |
    Utilize hardware-level energy profiling (e.g., Monsoon power monitor or Batterystats) to capture the full system power breakdown during a workout session: (1) **Screen:** always on showing the workout dashboard at high brightness (outdoor use) \u2014 ~3.5W. (2) **Camera sensor:** active for pose estimation \u2014 ~1.5W. (3) **GPS & Radios:** route tracking and telemetry \u2014 ~700 mW. (4) **Heart rate sensor:** continuous optical sensing \u2014 ~100 mW. (5) **ML inference:** pose estimation model running every 500ms at 5ms per inference \u2014 duty cycle of 1%. NPU power during inference: ~2W. Average: 2W \u00d7 0.01 = **20 mW**.
  common_mistake: |
    **The Pitfall:** Assuming the ML model is always the primary power hog.
    **The Rationale:** Candidates equate computational intensity directly with total power drain, ignoring the rest of the system.
    **The Consequence:** They waste time optimizing the NPU when the screen and sensors are consuming orders of magnitude more power.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target drain: 1% per min = 60% per hour.
    - iPhone 15 battery capacity: ~12.8 Wh.
    - ML inference duty cycle: 1% (5ms active every 500ms).
    - NPU active power: ~2W.

    **Calculations:**
    - Total power draw = 12.8 Wh * 0.60 = 7.68 W.
    - Average ML power = 2 W * 0.01 = 0.02 W = 20 mW.
    - ML power fraction = 20 mW / 7.68 W = ~0.26%.

    **Conclusion & Interpretation:**
    - **Result: 20 mW (I/O-Bound Power Drain)**. The model's 20mW is only ~0.26% of the power budget. Dimming the screen (~3-4W) or reducing sensor polling saves significantly more power than optimizing the NPU.
