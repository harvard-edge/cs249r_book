title: Neural Engine Power Efficiency on Snapdragon 8 Gen 3
scenario: A mobile app benchmarks inference on Snapdragon 8 Gen 3. The neural engine runs a 50M-op model in 2ms using 500mW. The same model on the Cortex-X4 CPU takes 20ms using 3000mW.
question: How would you calculate TOPS/W for each and explain why neural engines dominate mobile AI?
details:
  realistic_solution: 'Neural Engine: 45 TOPS total, during inference draws 500mW. Effective TOPS/W = 45/0.5 = 90 TOPS/W. CPU: 50M ops in 20ms → effective throughput = 50M/0.02 = 2.5 GOPS = 0.0025 TOPS. At 3W: efficiency = 0.0025/3 = 0.00083 TOPS/W. Neural engine is 90/0.00083 = 108,000× more efficient for this workload. Energy per inference: NE=0.5W×0.002s=1mJ; CPU=3W×0.02s=60mJ. NE saves 59mJ per inference.'
  common_mistake: |
    **The Pitfall:** Comparing only throughput (TOPS) without normalizing by power.
    **The Rationale:** Candidates focus entirely on speed improvements rather than energy efficiency.
    **The Consequence:** They miss the fundamental reason NPUs exist: battery preservation on edge devices via drastically superior TOPS/W metrics.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model: 50 M-ops (0.05 G-ops = 0.00005 T-ops).
       - NPU: 2ms at 500mW (0.5W).
       - CPU: 20ms at 3000mW (3.0W).
    2. **Calculations:**
       - NPU Throughput: 50 M-ops in 2ms = 25 GOPS = 0.025 TOPS.
       - NPU TOPS/W: 0.025 TOPS / 0.5W = 0.05 TOPS/W.
       - CPU Throughput: 50 M-ops in 20ms = 2.5 GOPS = 0.0025 TOPS.
       - CPU TOPS/W: 0.0025 TOPS / 3.0W = 0.00083 TOPS/W.
       - NPU Energy: 0.5W * 0.002s = 1 mJ.
       - CPU Energy: 3.0W * 0.020s = 60 mJ.
    3. **Conclusion & Interpretation:**
       - **Result: Power-Bound. NPU delivers 60x energy savings per inference (1mJ vs 60mJ) despite the low effective TOPS utilization.**
