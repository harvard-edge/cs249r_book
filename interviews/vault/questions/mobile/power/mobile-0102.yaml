title: The Cellular Modem Power Surprise
scenario: Your mobile health app runs an ECG classification model on-device. The model itself draws negligible power — 0.5 mW for a 2ms inference every second. But when you enable 'cloud sync' to upload classification results (50 bytes per result, once per second), the Watch's battery life drops from 36 hours to 18 hours.
question: You're uploading 50 bytes per second — how can that halve battery life?
details:
  realistic_solution: 'Cellular radios have discrete power states: Idle (0 mW), DRX
    (100 mW), Active TX (800 mW). Sending 50 bytes/sec keeps the radio in Active mode
    continuously (tail timer never expires between 1s transmissions). Radio draws
    1,600x more power than inference. Fix: batch and transmit every 5-15 min. At 5-min
    batching: 0.67% radio duty cycle = 7.4 mW avg. Battery impact: 50% -> 8%. Data
    volume is irrelevant — radio power state transitions are the problem.'
  common_mistake: |
    **The Pitfall:** Assuming low data volume equals low power draw.
    **The Rationale:** Candidates say "50 bytes/second is negligible bandwidth — the cellular modem should barely notice."
    **The Consequence:** The data volume is irrelevant. They fail to understand the modem's discrete power state transitions, draining the smartwatch battery entirely in hours.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Smartwatch Battery Capacity: ~2.17 Wh.
       - Model Inference Power: 0.5 mW.
       - Cellular Radio Active Power: 800 mW.
    2. **Calculations:**
       - Continuous Sync (1/sec): Radio never sleeps. Power = 800 mW * 24h = 19.2 Wh/day (drains battery in <3 hours).
       - Batched Sync (15-min intervals): Radio active for brief burst. Average Power = ~2.8 mW.
       - Batched Energy/Day = 2.8 mW * 24h = 0.067 Wh/day (3% of battery capacity).
    3. **Conclusion & Interpretation:**
       **Result: Power-State Bound. The ML model uses 0.5 mW, but continuous 1/sec syncing keeps the 800 mW cellular radio perpetually awake; batching updates drops the battery impact from catastrophic to 3%.**
