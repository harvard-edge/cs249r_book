title: Super-Res NPU vs 5G Streaming Energy
scenario: 'A mobile app plays a 2-hour 4K movie. Option A: Stream native 4K. Option B: Stream 1080p and use an on-device NPU for ML super-resolution to 4K.'
question: 'How would you calculate the total energy saved (in Joules) by using the ML super-resolution approach over the 2-hour movie?'
details:
  realistic_solution: In mobile systems, radio transmission (especially 5G) is one of the most power-hungry components. Offloading bandwidth to local compute (like ML super-resolution) is a classic energy optimization technique if the local compute is highly efficient. We evaluate this by comparing the sum of subsystem power draws for both options. Option A (Native 4K) relies heavily on the 5G modem, resulting in a total system power of 3.9W. Option B utilizes the NPU but drastically reduces the 5G and decoding power, resulting in a total system power of 2.8W. By multiplying the power difference by the total duration of the movie in seconds, we can quantify the exact energy savings in Joules.
  common_mistake: |
    **The Pitfall:** Focusing exclusively on the high NPU power draw (1.5W) and concluding that on-device ML is inefficient.
    **The Rationale:** Engineers fail to account for the massive systemic energy savings achieved by stepping down the 5G radio transmission bandwidth.
    **The Consequence:** Incorrectly concluding that streaming native 4K is more energy-efficient, missing out on significant battery life extensions.
  napkin_math: |
    **Assumptions & Constraints:**
    - Duration: 2 hours (7200 seconds).
    - Option A (Native 4K): 5G (3.0W) + Decoder (0.9W).
    - Option B (Super-Res): 5G (0.8W) + Decoder (0.5W) + NPU (1.5W).

    **Calculations:**
    - Option A Total Power: 3.0W + 0.9W = 3.9W.
    - Option B Total Power: 0.8W + 0.5W + 1.5W = 2.8W.
    - System Power Savings: 3.9W - 2.8W = 1.1W.
    - Total Energy Saved: 1.1W * 7200s = 7920 Joules.

    **Conclusion & Interpretation:**
    - **Result: 7920 Joules (Power-Bound)**. Super-resolution saves massive energy by offloading bandwidth to local compute.
