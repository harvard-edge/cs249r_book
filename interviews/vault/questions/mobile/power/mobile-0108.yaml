title: 'The "Warm-Up" Performance Drop'
scenario: A mobile ML model achieves 30 FPS for the first 10-15 seconds after launch, but then consistently drops to 15-20 FPS. The phone is not running other heavy applications.
question: What is the primary cause for this sustained performance drop, and how is it confirmed?
details:
  realistic_solution: 'This is a classic symptom of thermal throttling. Modern mobile SoCs are designed to burst to peak performance for short durations, but sustained high compute loads generate significant heat. Once internal temperature sensors detect a threshold breach, the SoC firmware automatically reduces clock frequencies via DVFS to prevent overheating, directly causing the sustained performance drop.'
  common_mistake: |
    **The Pitfall:** Diagnosing the drop as a memory leak or OS resource deallocation.
    **The Rationale:** Misunderstanding how mobile SoCs aggressively manage heat through dynamic voltage and frequency scaling (DVFS).
    **The Consequence:** Wasting time debugging software memory states instead of addressing the model's excessive thermal footprint.
  napkin_math: |
    **Assumptions & Constraints:**
    - Initial peak power: 8-10W (sustains 30 FPS).
    - Thermal Design Power (TDP) limit: 3-5W.

    **Calculations:**
    - Performance reduction: Dropping from 30 FPS to 15-20 FPS is a 33-50% throughput reduction.

    **Conclusion & Interpretation:**
    - **Result: 15-20 FPS (Thermal-Bound)**. The SoC scales down clock speeds to align with the 3-5W sustainable TDP budget.
