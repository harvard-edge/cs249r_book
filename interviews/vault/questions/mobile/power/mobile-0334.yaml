title: 'The Background Battery Killer'
scenario: 'Your team is developing a ''Smart Albums'' feature for a new photo gallery app. The feature runs in the background, waking up every 5 minutes to scan for new faces using an on-device model. Each scan takes 5 seconds, during which the phone''s SoC draws about 4 Watts. When idle between scans, the background service draws a non-zero 20 milliwatts.'
question: 'Assuming a standard 4000 mAh (3.8V) battery, what percentage of the battery will this feature consume in 24 hours?'
details:
  realistic_solution: 'The correct way to solve this is to first calculate the total energy capacity of the battery in Watt-hours, then determine the average power consumption of the feature by considering both its active and idle states (the duty cycle), and finally calculate the total energy consumed over 24 hours.'
  common_mistake: |
    **The Pitfall:** Focusing only on the high-power active state and ignoring the cumulative effect of the low-power idle state.
    **The Rationale:** Engineers intuitively filter out small numbers (milliwatts) while forgetting that 24 hours of continuous idle drain accumulates massively.
    **The Consequence:** The battery impact estimate is vastly under-reported, resulting in poor user experience and potential OS uninstalls.
  napkin_math: |
    **Assumptions & Constraints:**
    - Battery: 4000 mAh at 3.8V. Cycle: Wake up every 5 minutes (288 times/day).
    - Active state: 5 seconds at 4 Watts. Idle state: 20 mW (0.02W).

    **Calculations:**
    - Total Battery Capacity = 4 Ah x 3.8V = 15.2 Wh = 54,720 Joules.
    - Active Energy (24h) = 288 scans x 5s x 4W = 5,760 Joules.
    - Idle Energy (24h) = (86,400s total - 1,440s active) x 0.02W = 84,960s x 0.02W = 1,699.2 Joules.
    - Total Energy = 5,760 J + 1,699.2 J = 7,459.2 Joules.
    - Battery % = 7,459.2 / 54,720 = 0.1363 (13.63%).

    **Conclusion & Interpretation:**
    - **Result: 13.63% (Energy-Bound)**. The feature will consume roughly 14% of the total battery daily. Ignoring the 20mW idle drain would wrongly estimate ~10.5%.
  options:
  - '~3%'
  - '~11% (Ignores 24-hour accumulated idle drain)'
  - '~14%'
  - '~40%'
  correct_index: 2
