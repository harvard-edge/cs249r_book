title: 'Mobile Transformer Cost Recall: Mobile LLM Memory Bandwidth Facts'
scenario: Mobile LLM decode throughput at batch=1 is heavily memory-bandwidth bound. A 3B parameter model quantized to INT4 needs to be evaluated across A17 Pro, Snapdragon 8 Gen 3, and Tensor G3 SoCs.
question: What is the memory bandwidth for these SoCs, and what is the decode tokens/second for a 3B INT4 model on each?
details:
  realistic_solution: 'A17 Pro: ~100GB/s. Snap 8G3: ~77GB/s. Tensor G3: ~68GB/s. LLM decode at batch=1 is memory-bandwidth-bound: each decode step loads all model weights (INT4: 0.5 bytes/param) from DRAM. Formula: tok/s = bandwidth_GB/s / model_size_GB = bandwidth / (params * 0.5 / 1e9). 3B INT4 = 1.5GB. A17: 100/1.5=66.7 tok/s. Snap: 77/1.5=51.3 tok/s. Tensor G3: 68/1.5=45.3 tok/s. Ranking: A17 Pro (66.7) > Snap 8G3 (51.3) > Tensor G3 (45.3). Despite A17''s lower TOPS (35 vs 45 vs 7.5), A17 wins on LLM decode due to highest bandwidth. TOPS only matters for compute-bound operations (prefill at large batch).'
  common_mistake: |
    **The Pitfall:** Using TOPS to estimate LLM decode latency.

    **The Rationale:** Memorizing peak compute specs instead of recognizing that autoregressive decode at batch=1 is purely memory-bandwidth bound.

    **The Consequence:** Incorrectly ranking chips for LLM performance and vastly overestimating token generation speed.
  napkin_math: |
    *   Bandwidth: A17 Pro (~100 GB/s), Snap 8G3 (~77 GB/s), Tensor G3 (~68 GB/s).
    *   Model size (3B INT4): 1.5 GB.
    *   Formula: Decode tok/s = Bandwidth / Model_size.
    *   A17 Pro: 100 / 1.5 = **66.7 tok/s**.
    *   Snap 8G3: 77 / 1.5 = **51.3 tok/s**.
    *   Tensor G3: 68 / 1.5 = **45.3 tok/s**.
