title: 'Hexagon NPU Peak Throughput Data Type'
scenario: 'Your team is establishing a strict data contract for edge ML features running on the Qualcomm Hexagon NPU (Snapdragon 8 Gen 3). To ensure the model meets its latency targets using the NPU''s 45 TOPS hardware accelerator, the data validation pipeline must enforce a specific schema on the input tensors.'
question: 'What specific numerical data type must the input schema validate against to natively utilize the peak 45 TOPS capability of this NPU?'
details:
  realistic_solution: 'The correct answer is INT8. To hit the advertised 45 TOPS on the Snapdragon 8 Gen 3 Hexagon NPU, the data contract and quality gates must validate that input features are properly scaled and cast to 8-bit integers (INT8) before inference.'
  common_mistake: |
    **The Pitfall:** Validating against FP16 or FP32 data types.
    **The Rationale:** Candidates assume standard cloud data types transfer gracefully to mobile NPUs.
    **The Consequence:** The NPU is forced to emulate floating-point math, destroying inference latency and missing real-time deadlines.
  napkin_math: |
    **Assumptions & Constraints:**
    - NPU Peak Throughput: 45 TOPS.
    - Requirement: 15 GOPS/inference.
    - INT8 Input Schema (224x224x3): 150,528 bytes (~150 KB) per frame.

    **Calculations:**
    - Theoretical Max Throughput: (45 TOPS) / 15 GOPS/inference = 3,000 fps.
    - Bandwidth Requirement: 150 KB * 3,000 fps = 450 MB/s.

    **Conclusion & Interpretation:**
    - **Result: 450 MB/s (Compute-Bound)**. 450 MB/s easily fits within LPDDR5X bounds, proving INT8 scales perfectly to 45 TOPS.
