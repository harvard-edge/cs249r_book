title: Hardware-Aware NAS Latency on Hexagon NPU
scenario: We are designing a hardware-aware Neural Architecture Search (NAS) to find an optimal INT8 vision
  model for the Qualcomm Hexagon NPU (Snapdragon 8 Gen 3). The NPU provides a peak throughput of 45 TOPS
  for INT8 operations and relies on a shared 16 GB LPDDR5X memory pool. During the search phase, our fast
  latency predictor needs to estimate the compute-bound inference latency for a candidate convolution
  block. If a candidate block requires 90 million INT8 MAC operations, calculate the theoretical minimum
  compute latency for this block in microseconds.
question: "What theoretical compute latency does a 90M-MAC INT8 block have on the Hexagon NPU?"
details:
  realistic_solution: To calculate the theoretical compute-bound latency, first convert the MAC operations
    to standard operations (OPs), noting that 1 MAC = 2 OPs. Then, divide the total OPs by the peak INT8
    throughput of the Qualcomm Hexagon NPU (Snapdragon 8 Gen 3), which is 45 TOPS. This gives the absolute
    theoretical minimum time, assuming perfect utilization and zero memory overhead.
  common_mistake: Candidates often forget that 1 MAC (Multiply-Accumulate) equals 2 operations (one multiply,
    one add). They frequently divide 90 million directly by the TOPS rating, underestimating the theoretical
    compute latency by a factor of 2.
  napkin_math: 1 MAC = 2 Operations. Total OPs = 90,000,000 MACs * 2 = 180,000,000 OPs. Peak Throughput
    = 45 TOPS = 45,000,000,000,000 OPs/sec. Latency = (180 * 10^6 OPs) / (45 * 10^12 OPs/sec) = 4 * 10^-6
    seconds = 4 microseconds.
