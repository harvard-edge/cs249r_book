title: NPU Memory Tiling for Attention
scenario: The Snapdragon 8 Gen 3 Hexagon NPU must compute exact dot-product attention
  for a sequence length of 4096. System LPDDR5 bandwidth is bottlenecking the generation
  phase.
question: Design a memory tiling architecture that partitions the query, key, and
  value matrices into the NPU's localized SRAM to minimize LPDDR5 fetch requests.
details:
  realistic_solution: To avoid spilling, one should implement a blocked algorithm
    like FlashAttention. The design must load a tile of Keys and Values into NPU SRAM
    (e.g., block size 128x128). Then, sequentially load tiles of Queries, compute
    the dot product block, update the running max/sum for the softmax denominator,
    and accumulate the output. This reduces LPDDR5 memory complexity from O(N^2) to
    O(N * d^2 / M) where M is SRAM size.
  common_mistake: Proposing standard matrix multiplication tiling without handling
    the nonlinear softmax denominator, which normally forces a full write-back of
    the N^2 attention matrix.
  napkin_math: 4096 / 128 = 32 tiles per dimension.
