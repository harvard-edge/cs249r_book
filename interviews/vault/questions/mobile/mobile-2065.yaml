title: NPU Memory Tiling for Attention
scenario: The Snapdragon 8 Gen 3 Hexagon NPU must compute exact dot-product attention for a sequence length of 4096. System LPDDR5 bandwidth is bottlenecking the generation phase.
question: Design a memory tiling architecture that partitions the query, key, and value matrices into the NPU's localized SRAM to minimize LPDDR5 fetch requests.
details:
  realistic_solution: To avoid spilling, one should implement a blocked algorithm like FlashAttention. The design must load a tile of Keys and Values into NPU SRAM (e.g., block size 128x128). Then, sequentially load tiles of Queries, compute the dot product block, update the running max/sum for the softmax denominator, and accumulate the output. This reduces LPDDR5 memory complexity from O(N^2) to O(N * d^2 / M) where M is SRAM size.
  common_mistake: |
    **The Pitfall:** Proposing standard matrix multiplication tiling without handling the Softmax denominator.
    **The Rationale:** Candidates forget that Softmax is a nonlinear operation requiring global information across the row.
    **The Consequence:** The design forces a full write-back of the massive N^2 attention matrix to DRAM, completely neutralizing the benefits of SRAM tiling.
  napkin_math: |
    *   **Sequence Length:** `4096`
    *   **Tile Block Size:** `128x128`
    *   **Tiles per Dimension:** `4096 / 128 = 32 tiles`
    *   **Result:** **Memory complexity is reduced from O(N^2) to O(N * d^2 / M).**
