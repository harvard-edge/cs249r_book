title: Mobile New 0035
scenario: A PyTorch model is converted to TFLite for a mobile DSP. Profiling shows that 40% of the total
  execution time is spent executing `Transpose` or `Permute` operations that do not exist in the original
  PyTorch code.
question: "Why does TFLite insert expensive Transpose operations after converting a PyTorch model for a mobile DSP?"
details:
  realistic_solution: The symptom of massive time spent in non-compute operations is a layout mismatch
    issue (NCHW vs. NHWC). PyTorch defaults to NCHW (channels first), while TFLite and many mobile DSPs
    natively optimize for NHWC (channels last) to exploit SIMD vector lanes. The compiler automatically
    injects a layout transpose before and after every hardware-accelerated op, thrashing memory.
  common_mistake: Converting models between frameworks without explicitly aligning and optimizing the
    tensor memory format for the target backend.
  napkin_math: 'Layer payload: 10MB. Transpose requires moving 10MB out of cache in non-contiguous strides.
    Transpose BW efficiency is often ~10%. At 1GB/s effective BW, transpose takes 10ms. Across 20 layers,
    injected transposes add 200ms of pure overhead.'
