title: The Laggy AI Assistant
scenario: You are a Mobile ML Systems Engineer debugging a new "AI Suggestion" feature on a flagship smartphone. The feature uses a 1B parameter on-device LLM. Users report that suggestions feel "laggy" and are often skipped during fast typing (around 100 WPM).
question: "Why does a 100ms static batching timeout make a mobile AI suggestion queue unstable for fast typing?"
details:
  realistic_solution: The primary bottleneck is the static batching strategy, which is ill-suited for this real-time, high-arrival-rate workload. With requests arriving every 100ms, the 100ms batching timeout triggers a new batch for each keystroke. This means every request incurs a 100ms waiting penalty *before* inference even starts. The total latency for the user becomes `Batch_Wait_Time + TTFT = 100ms + 150ms = 250ms`. Since the arrival interval (100ms) is less than the service time (250ms), the request queue will grow indefinitely under load, leading to high latency and dropped requests. The correct solution is to switch to a continuous batching or a dynamic batching strategy that can immediately begin processing a new request without a fixed waiting timeout, dramatically reducing the queueing delay.
  common_mistake: |
    **The Pitfall:** Focusing purely on optimizing the model's Time-to-First-Token (TTFT).
    **The Rationale:** Engineers assume the model execution is the bottleneck and propose aggressive pruning/quantization, ignoring the queue dynamics of the serving system.
    **The Consequence:** Optimization efforts yield marginal improvements because the true latency source (rigid timeout rules causing queue blow-up) is left unaddressed.
  napkin_math: |
    * **Request Arrival Rate (λ):** 100 WPM is ~500 chars/min, or ~8.3 chars/sec. Round to 10 req/sec (1 request every 100 ms).
    * **Service Time per Request:** Batch timeout (100 ms) + TTFT (e.g., 150 ms) = 250 ms.
    * **Queue Instability:** Since the service time (250 ms) is strictly greater than the arrival interval (100 ms), the queue grows indefinitely.
    * **Switching to continuous batching allows immediate processing, bypassing the fixed 100 ms wait and reducing service time below the arrival interval.**
  options:
  - The model's 150ms TTFT is too slow for a real-time mobile application and must be optimized to be less than the 100ms request arrival interval.
  - The max batch size of 4 is too large, causing high latency. Reducing it to 1 would solve the problem.
  - The 100ms static batching timeout means the system's service time (250ms) exceeds the request arrival interval (100ms), causing the request queue to become unstable.
  - The bottleneck is the time it takes to transfer input tensors from CPU memory to the NPU, which becomes significant under rapid, repeated requests.
  correct_index: 2
