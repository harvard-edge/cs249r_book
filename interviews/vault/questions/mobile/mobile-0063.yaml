title: The Cold Start Problem
scenario: Your mobile ML app has a noticeable 500ms delay the first time a user triggers the model. Subsequent inferences take only 50ms.
question: What creates a 500ms first-inference delay when later mobile ML inferences take only 50ms?
details:
  realistic_solution: "The primary contributors to cold start latency are: 1. Model Loading from Storage (UFS). 2. Runtime Initialization (graph parsing, memory allocation). 3. Accelerator Warm-up (driver setup, shader compilation)."
  common_mistake: |
    **The Pitfall:** Assuming the model is downloading from the cloud.
    **The Rationale:** Confusing network latency with local cold-start initialization.
    **The Consequence:** Pointless network debugging when the issue lies in disk I/O and accelerator driver warm-up.
  napkin_math: |
    - Model load from UFS: ~50-100 ms.
    - Runtime init & memory alloc: ~100-300 ms.
    - Accelerator (NPU/GPU) warm-up: ~50-100 ms.
    - Total cold start: 200 - 500 ms.
    - **Cold start is dominated by storage I/O, graph parsing, and driver initialization.**
