title: The Cold Start Problem
scenario: Your mobile ML app has a noticeable 500ms delay the first time a user triggers the model. Subsequent inferences drop dramatically to a stable 50ms.
question: What creates a 500ms first-inference delay when later mobile ML inferences take only 50ms?
details:
  realistic_solution: "The latency gap is dictated by three cold-start penalties: 1. Fetching weights from slow UFS storage to LPDDR5 DRAM. 2. Runtime graph initialization (allocating tensor arenas). 3. Hardware accelerator warm-up (driver setup, shader JIT compilation)."
  common_mistake: |
    **The Pitfall:** Assuming the model is downloading from the cloud or running a huge batch on initialization.
    **The Rationale:** Confusing cloud network latency models with physical on-device cold-start initialization constraints.
    **The Consequence:** Pointless network debugging when the true issue lies in disk I/O bottlenecks and accelerator driver state initialization.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model size: ~100MB.
       - UFS read speed: ~500 MB/s.
       - NPU driver warm-up and JIT penalties apply.
    2. **Calculations:**
       - Storage I/O (Model load): 100 MB / 500 MB/s = ~200 ms.
       - Graph parsing & memory arena allocation: ~150 ms.
       - Accelerator/Driver warm-up (shader setup): ~100 ms.
       - Total cold start: 200 + 150 + 100 = 450 ms.
    3. **Conclusion & Interpretation:**
       **Result: I/O and Initialization-Bound. The initial ~500ms delay is dominated by UFS storage reads and driver JIT compilation, entirely separate from the 50ms steady-state compute latency.**
