title: The Cold Start Problem
scenario: Your mobile ML app works great after the first inference, but the *very first* time a user opens
  the app and triggers the model, there's a noticeable 500ms delay. Subsequent inferences are much faster
  (e.g., 50ms). What are the primary contributors to this 'cold start' latency on a mobile device?
question: "What creates a 500ms first-inference delay when later mobile ML inferences take only 50ms?"
details:
  realistic_solution: "The primary contributors to \"cold start\" latency for on-device ML are:\n  1.\
    \  **Model Loading from Storage:** The model weights (e.g., a `.tflite` file) must be loaded from\
    \ the device's slower persistent storage (flash memory, UFS) into faster RAM. For larger models, this\
    \ can be significant.\n  2.  **Runtime Initialization:** The ML inference runtime (e.g., TFLite interpreter,\
    \ Core ML, NNAPI) needs to be initialized. This involves parsing the model graph, allocating memory\
    \ for tensors and intermediate activations, and setting up the execution context for the selected\
    \ accelerator (CPU, GPU, NPU). This can involve JIT compilation or loading accelerator-specific drivers/libraries.\n\
    \  3.  **Accelerator Warm-up:** GPUs and NPUs often have a \"warm-up\" period. The first few kernels\
    \ might take longer as the driver initializes hardware contexts, allocates device memory, and potentially\
    \ compiles shaders or NPU programs. Subsequent calls benefit from these resources being pre-allocated\
    \ and cached.\n  4.  **OS Overhead:** Initial process startup, library loading, and other OS-level\
    \ setup can add to the delay."
  common_mistake: '"The model is downloading from the cloud." The question implies the model is already
    on-device.'
  napkin_math: Loading a 50MB model from UFS 3.1 (peak 1GB/s) might take 50ms in ideal conditions, but
    real-world latency can be 2-5x higher due to OS overhead and random access patterns. Runtime initialization
    (parsing graph, allocating 200MB of tensors) could take 100-300ms. Accelerator warm-up can add another
    50-100ms. These easily sum up to 500ms.
