title: The Overexposed Image Crash
scenario: You are a mobile ML engineer optimizing a new 'smart exposure' feature for a camera app. The
  feature uses a small CNN to predict scene brightness. To meet the 16ms per-frame budget on an Apple
  A17 Pro, you've quantized the model from FP32 to full INT8. In lab tests using a standard image dataset,
  the model is fast and 99% accurate. However, when the QA team tests it outdoors on a bright, sunny day,
  the model's predictions become nonsensical, causing the camera exposure to flicker wildly. You suspect
  an issue with quantization. What is the most likely cause of this failure?
question: "Why does INT8 calibration on lab images make an A17 Pro smart-exposure model fail outdoors in bright sun?"
details:
  realistic_solution: The most likely cause is activation overflow due to a mismatched calibration dataset.
    The initial calibration was likely performed on a standard dataset (e.g., ImageNet) which may not
    contain the same distribution of high-intensity pixel values as a bright, sunny outdoor scene. During
    inference, the activations in the early layers of the CNN, driven by the overexposed pixels, exceed
    the narrow dynamic range captured during calibration. These values are then 'clipped' to the max value
    of INT8 (e.g., +127). This clipping is a massive, non-linear loss of information, causing the network's
    subsequent layers to produce garbage outputs. The solution is to re-calibrate the model using a dataset
    that includes these bright, outdoor images to learn a more representative and robust scaling factor.
  common_mistake: Engineers often blame the quantization tool itself or assume the model architecture
    is unsuitable for INT8. Another common mistake is to focus only on weight precision, forgetting that
    input data activations are also quantized and are a frequent source of error, especially when the
    calibration data doesn't match real-world data distribution.
  napkin_math: Let's say your calibration dataset had a maximum activation value of 5.0 in a specific
    layer. The INT8 quantization scheme would map the FP32 range [ -5.0, 5.0 ] to the INT8 range [ -128,
    127 ]. The scale factor `S` would be `5.0 / 127 ≈ 0.039`. Now, an outdoor image comes in and produces
    an activation of 8.0. The quantization process calculates `round(8.0 / 0.039) = round(205)`. Since
    this exceeds the INT8 max of 127, the value is clamped to 127. The de-quantized value becomes `127
    * 0.039 = 4.95`. The model sees 4.95 when the reality was 8.0 — a 38% error for that single activation.
    This error cascades and corrupts the final prediction.
  options:
  - The model's weights have a dynamic range too large for INT8, causing weight overflow during conversion.
  - The Apple A17 NPU has a known hardware bug when handling certain INT8 convolution operations.
  - The calibration dataset was not representative of outdoor scenes, leading to activation values overflowing
    the INT8 range.
  - The increased temperature of the phone from being in the sun caused thermal throttling and random
    bit-flips in the NPU's memory.
  correct_index: 2
