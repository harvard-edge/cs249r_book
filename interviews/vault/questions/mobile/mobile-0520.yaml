title: The Overexposed Image Crash
scenario: You are a mobile ML engineer optimizing a new 'smart exposure' feature for a camera app. The feature uses a small CNN to predict scene brightness. To meet the 16ms per-frame budget, you've quantized the model from FP32 to full INT8. In lab tests using a standard image dataset, the model is fast and 99% accurate. However, when tested outdoors on a bright, sunny day, the model's predictions become nonsensical, causing the camera exposure to flicker wildly.
question: Why does INT8 calibration on lab images make a smart-exposure model fail outdoors in bright sun?
details:
  realistic_solution: The most likely cause is activation overflow due to a mismatched calibration dataset. The initial calibration was performed on a standard dataset which lacks the high-intensity pixel values of a bright outdoor scene. During inference, early layer activations exceed the narrow dynamic range captured during calibration and are clipped to the max value of INT8. This clipping causes massive, non-linear information loss, leading to garbage outputs. The solution is to re-calibrate using a dataset that includes bright, outdoor images to learn a robust scaling factor.
  common_mistake: |
    **The Pitfall:** Blaming the quantization tool or weight precision.
    **The Rationale:** Engineers forget that input data activations are also quantized and are highly sensitive to the calibration dataset's distribution.
    **The Consequence:** They avoid INT8 entirely or waste time tuning weight quantization instead of providing a representative calibration dataset.
  napkin_math: |
    1. Assumptions & Constraints:
       - Lab calibration max activation: 5.0.
       - INT8 max value: 127.
       - Outdoor real activation: 8.0.
    2. Calculations:
       - INT8 scale: 5.0 / 127 = 0.039.
       - Quantized value: round(8.0 / 0.039) = 205.
       - Clamping: 205 is clamped to INT8 max of 127.
       - De-quantized value: 127 * 0.039 = 4.95.
       - Error: |8.0 - 4.95| / 8.0 = 38%.
    3. Conclusion & Interpretation:
       - **Result: The model sees 4.95 instead of 8.0, causing a 38% error (Precision-Bound).**
  options:
  - The model's weights have a dynamic range too large for INT8, causing weight overflow during conversion.
  - The NPU has a known hardware bug when handling certain INT8 convolution operations.
  - The calibration dataset was not representative of outdoor scenes, leading to activation values overflowing the INT8 range.
  - The increased temperature of the phone from being in the sun caused thermal throttling.
  correct_index: 2
