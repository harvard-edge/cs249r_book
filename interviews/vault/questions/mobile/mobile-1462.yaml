title: Real-Time Sensor Fusion Ingestion Sizing
scenario: You are designing a continuous real-time sensor fusion and gesture recognition pipeline for an AR application running on a device powered by the Samsung Exynos 2400 NPU. The system ingests streaming data from dual cameras (60fps) and IMU sensors, computing spatial features in real-time before passing them to the dual-core NPU for gesture classification.
question: How would you size real-time sensor fusion ingestion using shared memory ring buffers?
details:
  realistic_solution: |
    An L5 candidate will evaluate the shared memory architecture and propose an early-fusion, event-driven pipeline where the ISP writes downsampled regions of interest (ROIs) directly to a fixed-size ring buffer. By keeping the ingestion buffer extremely lean, they avoid cache thrashing and memory bus contention. Furthermore, they will partition the dual-core NPU workloads, dedicating one core to the continuous, low-latency stream processing to ensure predictable scheduling, while minimizing main memory round-trips.
  common_mistake: |
    **The Pitfall:** Designing ingestion pipelines that queue uncompressed video frames in main memory.
    **The Rationale:** Candidates treat the NPU's 34.7 TOPS as entirely available without considering memory bus saturation.
    **The Consequence:** Bandwidth saturates when the CPU, GPU, and ISP concurrently access the shared memory pool, dropping frames.
  napkin_math: |
    - Dual 1080p cameras at 60fps (RGB): 1920x1080 * 3 bytes * 60fps * 2 cameras = 746 MB/s.
    - Double-buffering consumes ~1.5 GB/s of bandwidth just for ingestion.
    - Compute: 50 GOPS * 60 = 3 TOPS (utilization is low at ~8.6%).
    - If the 50MB INT8 weights reload every frame, it adds 3 GB/s (50MB * 60) of bandwidth overhead.
    - Total overhead severely impacts the shared bus, proving ingestion must **aggressively downsample** before hitting main memory.
