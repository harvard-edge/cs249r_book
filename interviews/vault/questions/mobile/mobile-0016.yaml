title: The Feature Flag Footgun
scenario: "Your app has 6 ML features — face detection, background blur, scene recognition, smart HDR, night mode, and document scanning. Each can be independently toggled via feature flags from your server. A junior engineer enables all 6 simultaneously on a phone with 6 GB RAM. Users report the phone becomes unusable — launcher crashes, apps get killed."
question: "Why does enabling six ML features at once make a 6 GB RAM device kill apps and the launcher?"
details:
  realistic_solution: |
    The failure stems from ignoring the cumulative runtime memory inflation (activations + framework delegates + graph state), which easily reaches 3-5x the static model file size. Spawning 6 isolated instances blows past Android's Low Memory Killer (LMK) threshold. Implement a global memory budget manager and architectural backbone-sharing (e.g., shared ResNet trunk) to mutually exclude or strictly limit concurrent executions.
  common_mistake: |
    **The Pitfall:** Counting only weight storage and ignoring runtime memory overhead.
    **The Rationale:** Candidates assume 6 models at 25 MB each is only 150 MB, missing activation buffers, delegate memory, and framework bloat.
    **The Consequence:** Unintentionally exceeding the device RAM limit, causing the OS to aggressively kill background and foreground processes.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Device RAM: 6 GB (only ~2.5 GB free for apps).
       - Android LMK Threshold: ~200 MB free.
       - 6 models, ~25 MB static size each. Runtime footprint multiplier: 4x (~100 MB each).
    2. **Calculations:**
       - Static total: 6 * 25 MB = 150 MB (deceptively safe).
       - True runtime total: 6 * 100 MB = 600 MB.
       - Free RAM remaining: 2.5 GB (base free) - 500 MB (app overhead) - 600 MB (ML models) = 1.4 GB (Below safe thresholds when system spikes).
    3. **Conclusion & Interpretation:**
       - **Result: LMK Evictions.** The cumulative runtime bloat destroys the free memory buffer, triggering the OS to aggressively terminate processes due to a **memory-capacity bottleneck**.
  options:
  - Each model is only 20-30 MB, so 6 models = 180 MB. That should easily fit in 6 GB RAM.
  - The problem is cumulative ML runtime memory, not model file size. Each model's runtime footprint is 3-5x file size. Six models at ~100 MB runtime each = 600 MB, creating severe memory pressure.
  - OTA updates should always include the full model file to ensure atomicity; delta updates risk corrupting the model.
  - Moving to a memory-mapped file loading strategy will reduce peak memory to near-zero since only accessed weights are loaded.
  correct_index: 1
