title: The Feature Flag Footgun
scenario: Your app has 6 ML features — face detection, background blur, scene recognition, smart HDR,
  night mode, and document scanning. Each can be independently toggled via feature flags from your server.
  A junior engineer enables all 6 simultaneously on a Pixel 6a (6 GB RAM, Tensor G1). Users report the
  phone becomes unusable — launcher crashes, apps get killed. What happened?
details:
  realistic_solution: 'The problem is cumulative ML runtime memory, not model file size. Each model''s
    runtime footprint (weights + activations + delegate + framework) is 3-5x file size. Six models at
    ~100 MB runtime each = 600 MB, leaving only 1.2 GB on 6 GB RAM. Android''s LMK triggers at ~200 MB
    free, killing the launcher. Fix: (1) cap total ML memory at 1.8 GB via a budget manager, (2) share
    a common backbone (160 MB vs 600 MB), (3) enforce mutual exclusion — max 3 concurrent models on <8
    GB devices.'
  common_mistake: '"Each model is only 20-30 MB, so 6 models = 180 MB. That should fit in 6 GB RAM." This
    counts only weight storage and ignores runtime memory — activation buffers, delegate memory, and framework
    overhead.'
  napkin_math: 'Pixel 6a: 6 GB total, ~2.5 GB available. Android LMK threshold: ~200 MB free. Safe ML
    budget: 2.5 GB - 200 MB buffer - 500 MB app = 1.8 GB. Six independent models: 600 MB (fits, but leaves
    only 1.2 GB for everything else). With shared backbone: 160 MB (leaves 2.14 GB). Maximum concurrent
    models at 100 MB each: floor(1.8 GB / 100 MB) = 18 models. But with delegates: floor(1.8 GB / 100
    MB) = only 3-4 models safely.'
  options:
  - Each model is only 20-30 MB, so 6 models = 180 MB. That should fit in 6 GB RAM..
  - The problem is cumulative ML runtime memory, not model file size. Each model's runtime footprint (weights
    + activations + delegate + framework) is 3-5x file size. Six models at ~100 MB runtime each = 600
    MB, leaving only 1.2 GB on 6 GB RAM.
  - OTA updates should always include the full model file to ensure atomicity; delta updates risk corrupting
    the model.
  - Moving to a memory-mapped file loading strategy will reduce peak memory to near-zero since only accessed
    weights are loaded.
  correct_index: 1
