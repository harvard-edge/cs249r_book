title: The Feature Flag Footgun
scenario: Your app has 6 ML features — face detection, background blur, scene recognition, smart HDR, night mode, and document scanning. Each can be independently toggled via feature flags from your server. A junior engineer enables all 6 simultaneously on a Pixel 6a (6 GB RAM, Tensor G1). Users report the phone becomes unusable — launcher crashes, apps get killed.
question: "Why does enabling six ML features at once make a Pixel 6a with 6 GB RAM kill apps and the launcher?"
details:
  realistic_solution: |
    The problem is cumulative ML runtime memory, not model file size. Each model's runtime footprint (weights + activations + delegate + framework) is 3-5x file size. Six models at ~100 MB runtime each = 600 MB, leaving only 1.2 GB on 6 GB RAM. Android's LMK triggers at ~200 MB free, killing the launcher. Fix: (1) cap total ML memory at 1.8 GB via a budget manager, (2) share a common backbone (160 MB vs 600 MB), (3) enforce mutual exclusion — max 3 concurrent models on <8 GB devices.
  common_mistake: |
    **The Pitfall:** Counting only weight storage and ignoring runtime memory.
    **The Rationale:** Candidates assume 6 models at 20-30 MB each is only 180 MB, missing activation buffers, delegate memory, and framework overhead.
    **The Consequence:** Unintentionally exceeding the device RAM limit, causing the OS to aggressively kill background and foreground processes.
  napkin_math: |
    - **Available RAM:** Pixel 6a has 6 GB total, ~2.5 GB typically available.
    - **OS limits:** Android LMK threshold is ~200 MB free.
    - **Safe ML budget:** 2.5 GB - 200 MB buffer - 500 MB app = 1.8 GB.
    - **Model runtime footprint:** Each 20-30MB model takes ~100MB runtime (weights + activations + delegates).
    - **Six independent models:** 6 * 100 MB = 600 MB.
    - **Result:** **Fits in theory, but leaves only 1.2 GB for the rest of the system, creating severe memory pressure and triggering the LMK.**
  options:
  - Each model is only 20-30 MB, so 6 models = 180 MB. That should fit in 6 GB RAM..
  - The problem is cumulative ML runtime memory, not model file size. Each model's runtime footprint (weights + activations + delegate + framework) is 3-5x file size. Six models at ~100 MB runtime each = 600 MB, leaving only 1.2 GB on 6 GB RAM.
  - OTA updates should always include the full model file to ensure atomicity; delta updates risk corrupting the model.
  - Moving to a memory-mapped file loading strategy will reduce peak memory to near-zero since only accessed weights are loaded.
  correct_index: 1
