title: The Cross-Platform ML Runtime Decision
scenario: Your team needs to deploy the same image classification model on iOS (Apple Neural Engine),
  Android flagships (Qualcomm Hexagon NPU), and Android budget phones (MediaTek APU). You're debating
  between Core ML + TFLite (native per-platform), ONNX Runtime (single runtime, multiple backends), and
  a custom solution. Walk through the trade-offs.
question: "How should you choose between native runtimes, ONNX Runtime, and a hybrid stack for cross-platform mobile inference?"
details:
  realistic_solution: 'Three options with different cost-performance frontiers. Native (CoreML + TFLite):
    best latency (1.8ms iOS, 2.1ms Android), 3 engineer-months, two codebases. ONNX Runtime: single codebase
    (1 month), 60% slower (2.9ms, 3.4ms). Hybrid (native on iOS + QNN on Qualcomm, ONNX fallback): 2 months,
    near-native for 80%. Decision: if latency-critical (real-time camera) and high DAU, go native. If
    infrequent inference, the 1-3ms gap is imperceptible — use ONNX.'
  common_mistake: '"Use ONNX Runtime everywhere — write once, run anywhere." Cross-platform runtimes sacrifice
    per-platform optimization for portability. The performance gap can be 2-5×.'
  napkin_math: 'MobileNetV3-Large inference: Core ML on A17 Pro: 1.8ms. TFLite on Snapdragon 8 Gen 3:
    2.1ms. ONNX Runtime (CoreML EP) on A17 Pro: 2.9ms (61% slower). ONNX Runtime (QNN EP) on Snapdragon
    8 Gen 3: 3.4ms (62% slower). ONNX Runtime (NNAPI) on MediaTek Dimensity 9300: 5.2ms. Engineering cost:
    Native dual-platform: ~3 engineer-months. ONNX single-platform: ~1 engineer-month. Hybrid: ~2 engineer-months.'
