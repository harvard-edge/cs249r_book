title: The Cross-Platform ML Runtime Decision
scenario: Your team needs to deploy the same image classification model on iOS (Apple Neural Engine), Android flagships (Qualcomm Hexagon NPU), and Android budget phones (MediaTek APU). You're debating between Core ML + TFLite (native per-platform), ONNX Runtime (single runtime, multiple backends), and a custom solution.
question: "How should you choose between native runtimes, ONNX Runtime, and a hybrid stack for cross-platform mobile inference?"
details:
  realistic_solution: 'Three options with different cost-performance frontiers. Native (CoreML + TFLite):
    best latency (1.8ms iOS, 2.1ms Android), 3 engineer-months, two codebases. ONNX Runtime: single codebase
    (1 month), 60% slower (2.9ms, 3.4ms). Hybrid (native on iOS + QNN on Qualcomm, ONNX fallback): 2 months,
    near-native for 80%. Decision: if latency-critical (real-time camera) and high DAU, go native. If
    infrequent inference, the 1-3ms gap is imperceptible — use ONNX.'
  common_mistake: |
    **The Pitfall:** Assuming "write once, run anywhere" frameworks always apply to mobile ML.
    **The Rationale:** Candidates suggest ONNX Runtime everywhere to simplify engineering, ignoring that cross-platform runtimes sacrifice heavy per-platform hardware optimization.
    **The Consequence:** The performance gap can be 2-5× slower, ruining user experience for latency-critical tasks like real-time camera inference.
  napkin_math: |
    - Native Core ML (A17 Pro): 1.8ms.
    - Native TFLite (Snapdragon): 2.1ms.
    - ONNX Runtime (A17 Pro): 2.9ms (61% slower).
    - ONNX Runtime (Snapdragon): 3.4ms (62% slower).
    - ONNX Runtime (MediaTek): 5.2ms.
    - Engineering cost Native: ~3 engineer-months.
    - Engineering cost ONNX: ~1 engineer-month.
    - **Conclusion:** For real-time high-DAU, the latency gap requires native; for infrequent inference, ONNX is acceptable.
