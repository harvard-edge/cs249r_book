title: 'Network Bandwidth Bottlenecks: Analyze PCIe vs. NVLink for Mobile SoC Memory
  Bottleneck'
scenario: A mobile SoC (Snapdragon 8 Gen 3) uses a unified LPDDR5X memory bus (77
  GB/s) shared between CPU, GPU, and DSP. Analyze how memory bandwidth contention
  between a 3B INT4 LLM (running on DSP/GPU) and a concurrent video encode task (H.265
  encoder reading/writing 4K frames) creates a bottleneck. Quantify the contention.
question: How much of a 77 GB/s Snapdragon memory bus does a 3B INT4 LLM consume alongside
  4K H.265 encoding?
details:
  realistic_solution: 'LLM decode BW: 3B INT4 = 1.5GB weight reads per token. At 19.5ms/token:
    1.5GB/0.0195s = 76.9GB/s — nearly saturates the entire bus! Video encoder: 4K
    @ 30fps YUV420: 4096×2160×1.5×30=0.4GB/s (negligible). But LLM alone saturates
    77GB/s. In practice, INT4 dequantization creates additional writes to scratchpad:
    add 20% overhead → LLM needs 92GB/s > 77GB/s. Result: TPOT degrades from 19.5ms
    to ~25ms due to BW contention and saturation. Fix: reduce LLM to batch=1 without
    concurrent tasks, or use INT8 model (3GB, same BW but different contention pattern).'
  common_mistake: Analyzing the LLM and video encoder in isolation and assuming they
    each get full 77 GB/s; the shared LPDDR5X bus means their bandwidths add up and
    the total must stay under 77 GB/s.
  napkin_math: 'LLM BW: 1.5GB / 0.0195s = 76.9GB/s. Video: 4K YUV420 30fps = 4096×2160×1.5×30
    = 397MB/s ≈ 0.4GB/s. Total: 77.3GB/s > 77GB/s LPDDR5X limit. LLM BW saturates
    the bus — video encode adds to contention. Actual TPOT: 1.5GB/(77-0.4)GB/s = 19.6ms
    (marginal). But ISP/display also consume bandwidth: ISP 4K = 397MB/s, display:
    1080×2340×4×60=607MB/s. Total other: ~1.0GB/s. LLM: 77-1.0=76.0GB/s available.
    TPOT: 1.5/76.0=19.7ms. Near-saturation.'
