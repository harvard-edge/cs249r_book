details:
  realistic_solution: 'Sequential baseline (the figure): 15 + 1 + 10 + 8 = 34 ms per
    frame -> 1000/34 = 29.4 FPS. Double-buffered overlap: throughput is gated by the
    slowest stage; effective stage-1 time absorbs the non-overlappable DMA at 15 +
    1 = 16 ms. Stage durations are now 16 / 10 / 8 ms, so the bottleneck is stage
    1 at 16 ms per frame, giving steady- state 1000/16 = 62.5 FPS. End-to-end latency
    for any one frame remains 16 + 10 + 8 = 34 ms (latency does not improve), but
    throughput more than doubles. If the DMA could be moved off the LPDDR5 path (e.g.,
    via a dedicated SLC channel), stage 1 would drop to 15 ms and lift the system
    to 66.7 FPS - the 1 ms shared-bus tax costs ~4 FPS.'
  common_mistake: Reading the figure's sequential 34 ms total as the steady-state
    pipeline rate (29 FPS) and missing that double-buffering decouples stages so steady-state
    throughput is gated by max(stage_i), not the sum.
  napkin_math: 'Sequential = 1000/34 = 29.4 FPS. Overlapped: stage 1 = 15 + 1 = 16
    ms (DMA non-overlap); max(16, 10, 8) = 16 ms -> 62.5 FPS. Uplift = 2.13x.'
