title: Mobile AR Pipelining
scenario: An AR application runs a 3-stage pipeline on Snapdragon 8 Gen 3. The reference figure shows the v1 implementation - a strictly sequential Gantt where stage 1 (CPU preprocessing, 15 ms/frame), stage 2 (NPU inference on Hexagon, 10 ms/frame), and stage 3 (GPU render composite, 8 ms/frame) execute back-to-back with no overlap. The team is debating whether to invest in double-buffering. A relevant constraint is that the CPU-to-NPU DMA setup adds 1 ms per frame and is NOT overlappable with NPU compute on this SoC because it shares the LPDDR5 bus with stage 1's image-fetch reads.
question: Starting from the figure's sequential 30.3 FPS baseline, evaluate what steady-state FPS double-buffering would unlock given the non-overlappable 1 ms DMA penalty, identify the binding stage, and quantify the FPS uplift.
visual:
  kind: svg
  path: mobile-1903.svg
  alt: Gantt chart showing sequential CPU then NPU execution per frame.
  caption: Sequential Processing Pipeline
details:
  realistic_solution: 'Sequential baseline (the figure): 15 + 1 + 10 + 8 = 34 ms per frame -> 1000/34 = 29.4 FPS. Double-buffered overlap: throughput is gated by the slowest stage; effective stage-1 time absorbs the non-overlappable DMA at 15 + 1 = 16 ms. Stage durations are now 16 / 10 / 8 ms, so the bottleneck is stage 1 at 16 ms per frame, giving steady- state 1000/16 = 62.5 FPS. End-to-end latency for any one frame remains 16 + 10 + 8 = 34 ms (latency does not improve), but throughput more than doubles. If the DMA could be moved off the LPDDR5 path (e.g., via a dedicated SLC channel), stage 1 would drop to 15 ms and lift the system to 66.7 FPS - the 1 ms shared-bus tax costs ~4 FPS.'
  common_mistake: |
    **The Pitfall:** Reading the sequential 34 ms total as the steady-state pipeline rate.
    **The Rationale:** Candidates miss that double-buffering decouples stages, so steady-state throughput is gated by max(stage_i), not the sum.
    **The Consequence:** Grossly underestimating the potential FPS uplift from pipelining.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Stage 1 (CPU): 15 ms.
       - CPU-to-NPU DMA setup (non-overlappable): 1 ms.
       - Stage 2 (NPU): 10 ms.
       - Stage 3 (GPU): 8 ms.
    2. **Calculations:**
       - Sequential Baseline: 1000 / (15 + 1 + 10 + 8) ms = 29.4 FPS.
       - Overlapped Stage 1 Effective Time: 15 + 1 = 16 ms.
       - Bottleneck Stage: max(16, 10, 8) = 16 ms.
       - Overlapped FPS: 1000 / 16 ms = 62.5 FPS.
       - Uplift: 62.5 / 29.4 = 2.13x.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound (CPU).** Steady-state FPS is 62.5, yielding a 2.13x uplift.
