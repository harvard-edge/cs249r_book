title: Mobile AR Pipelining
scenario: An AR application runs a 3-stage pipeline on Snapdragon 8 Gen 3. The reference
  figure shows the v1 implementation - a strictly sequential Gantt where stage 1 (CPU
  preprocessing, 15 ms/frame), stage 2 (NPU inference on Hexagon at 45 TOPS, 10 ms/frame),
  and stage 3 (GPU render composite, 8 ms/frame) execute back-to-back with no overlap,
  yielding the trivial 1000/(15+10+8) = 30.3 FPS. The team is debating whether to
  invest in double-buffering. A relevant constraint - the CPU-to-NPU DMA setup adds
  1 ms per frame and is NOT overlappable with NPU compute on this SoC because it shares
  the LPDDR5 bus with stage 1's image-fetch reads.
question: Starting from the figure's sequential 30.3 FPS baseline, evaluate what steady-state
  FPS double-buffering would unlock given the per-stage service times and the non-overlappable
  1 ms DMA penalty that must attach to stage 1. Identify the binding stage in the
  overlapped regime and quantify the FPS uplift over the sequential baseline.
visual:
