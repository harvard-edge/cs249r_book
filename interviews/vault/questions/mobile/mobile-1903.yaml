title: Mobile AR Pipelining
scenario: An AR application processes camera frames on the CPU before passing them
  to the Snapdragon 8 Gen 3 Hexagon NPU (45 TOPS) for object tracking.
question: Evaluate the system throughput in FPS if CPU preprocessing takes 15ms per
  frame and NPU inference takes 10ms, assuming a single buffered sequential pipeline.
visual:
  kind: svg
  path: mobile-1903.svg
  alt: Gantt chart showing sequential CPU then NPU execution per frame.
  caption: Sequential Processing Pipeline
details:
  realistic_solution: Since it is a sequential pipeline without overlap, total time
    per frame is 15ms + 10ms = 25ms. FPS is 1000 / 25 = 40 FPS. (If double buffered,
    it would be max(15, 10) = 66.6 FPS, so the candidate must clarify the sequential
    nature).
  common_mistake: Assuming pipelined execution (max) when the prompt specifies a single
    buffered sequential pipeline (sum).
  napkin_math: 1000 / (15 + 10) = 40 FPS
