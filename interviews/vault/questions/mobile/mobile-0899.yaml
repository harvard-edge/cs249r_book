title: 'Dataset Curation: Fluency — Token Budget for On-Device Fine-Tuning on A17 Pro'
scenario: On an A17 Pro, you want to fine-tune a 1B parameter language model for personalization using 500 user-generated examples of average 128 tokens each.
question: How would you estimate the total fine-tuning compute, memory required, and time to complete?
details:
  realistic_solution: 'A17 Pro Neural Engine is inference-only. Fine-tuning must use CPU or GPU cores. Use LoRA to reduce trainable parameters. 1B model in FP16 = 2GB weights. LoRA rank-8 adds ~0.1% params = 1M trainable params. Time to complete will be on the order of an hour or two since each token requires ~4 GFLOPs for the forward and backward pass through the 1B model.'
  common_mistake: |
    **The Pitfall:** Assuming the Neural Engine supports training, or underestimating FLOPs.
    **The Rationale:** Mistakenly believing only the 1M trainable LoRA parameters determine the required FLOPs, ignoring the full forward/backward pass through the 1B frozen model.
    **The Consequence:** Massively underestimating the fine-tuning time or attempting to execute backward passes on the inference-only ANE, leading to runtime failures.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Tokens: 500 examples * 128 tokens = 64K tokens.
       - Model: 1B frozen params. Forward+backward = ~4 GFLOPs/token.
       - A17 CPU peak capacity: ~150 GFLOPS.
    2. **Calculations:**
       - Total Compute: 4 GFLOPs * 64K * 3 epochs = 768 TFLOPs.
       - Time: 768,000 GFLOPs / 150 GFLOPS = 5120 seconds (~1.4 hours).
       - Memory: 2 GiB (base FP16) + 2 MB (LoRA) + 8 MB (AdamW) + 50 MB (Activations) = ~2.1 GiB.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound. Safely fits inside 8 GiB RAM and completes fine-tuning reasonably quickly on the CPU.**
