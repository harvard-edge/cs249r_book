title: 'Dataset Curation: Fluency \u2014 Token Budget for On-Device Fine-Tuning on A17
  Pro'
scenario: On an A17 Pro (35 TOPS Neural Engine, 8GB RAM), you want to fine-tune a
  1B parameter language model for personalization using 500 user-generated examples
  of average 128 tokens each. Estimate the total fine-tuning compute, memory required,
  and time to complete.
question: How would you estimate the total fine-tuning compute, memory required, and
  time to complete?
details:
  realistic_solution: 'A17 Pro Neural Engine is inference-only. Fine-tuning must use CPU or GPU cores. Use LoRA to reduce trainable parameters. 1B model in fp16 = 2GB weights. LoRA rank-8 adds ~0.1% params = 1M trainable params. Time to complete will be on the order of an hour or two since each token requires ~4 GFLOPs for the forward and backward pass through the 1B model.'
  common_mistake: 'Not accounting for the full forward and backward pass FLOPs through the frozen base model (mistakenly thinking only the 1M LoRA parameters determine the FLOPs), or assuming Neural Engine supports training.'
  napkin_math: '500 examples \u00d7 128 tokens = 64K tokens total. LoRA fine-tuning: 1B frozen params, 1M trainable params. Forward+backward pass requires ~4 GFLOPs per token. 4 GFLOPs/token \u00d7 64K tokens \u00d7 3 epochs = 768 TFLOPs. A17 Pro CPU (Performance cores): ~150 GFLOPS. Time: 768,000 GFLOPs / 150 GFLOPS = 5120 seconds (~1.4 hours). Memory: 1B \u00d7 2B (fp16) = 2GB base + 2MB LoRA + optimizer (AdamW): 2 \u00d7 1M \u00d7 4B = 8MB + activations: ~50MB. Total: ~2.1GB, fits in 8GB.'
