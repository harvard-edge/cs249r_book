title: Diagnosing OOM during long-context Gemini Nano inference
scenario: You are deploying a summarization feature using Gemini Nano on the Google Tensor G3. The model runs flawlessly for short paragraphs, but when users attempt to summarize a long 4000-token document, the application frequently crashes with an Out-Of-Memory (OOM) error despite the device having 12 GB of LPDDR5X RAM.
question: What is the most likely cause of this crash, and how would you diagnose the memory pressure during this long-context generation?
details:
  realistic_solution: The root cause is the dynamic memory allocation for the KV-cache, which grows linearly with the context length. To diagnose, I would profile the native memory allocations during the forward pass, specifically monitoring the tensor allocations for the key and value states. Given the Tensor G3's unified 12 GB LPDDR5X memory is shared with the Android OS and other apps, the actual available memory for the ML payload is strictly capped. The solution involves implementing a fixed-size KV-cache pre-allocation strategy or employing techniques like a sliding window attention to cap memory usage and prevent unbounded growth.
  common_mistake: |
    **The Pitfall:** Assuming the OOM is caused by the model weights or aggressive OS background killing.
    **The Rationale:** Candidates focus on static memory, forgetting the dynamic memory growth of the KV-cache, which scales linearly with context length.
    **The Consequence:** Proposed solutions (like quantizing weights further) fail to address the crash during long-context generation.
  napkin_math: |
    1. **KV-Cache Size per Token:** For hidden dim d=2048, 32 layers, FP16: 2 (K,V) * 2048 * 32 * 2 bytes = 262,144 bytes (~256 KB) per token.
    2. **Total KV-Cache:** For a 4000-token sequence, the KV-cache requires 4000 * 256 KB = ~1.02 GB.
    3. **Available Headroom:** 12GB total RAM - 8GB (OS/apps) - 3.6GB (model weights) = < 1GB remaining.
    4. **Crash Cause:** Dynamically allocating an additional **1.02 GB** for the KV-cache exceeds the remaining limit, triggering the OOM.
