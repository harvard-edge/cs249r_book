title: Mobile Active Learning Upload Budget
scenario: A mobile app selects hard examples for annotation after local training.
  A cohort of 100,000 users produces 50,000 candidate events/day in aggregate, keeps
  0.2%, and each uploaded example is 180 KB after redaction. Estimate daily upload
  volume for the cohort.
question: How much data is uploaded if a 100,000-user cohort keeps 0.2% of 50,000
  daily events at 180 KB per example?
details:
  realistic_solution: The cohort keeps 100 examples/day. At 180 KB each, that is 18
    MB/day for the cohort, which is manageable. If 50,000 events were per user instead
    of per cohort, the volume would explode, so the event-count unit must be explicit
    in the policy.
  common_mistake: Seeing 0.2% and assuming upload volume is small without multiplying
    by users.
  napkin_math: Selected examples = 50,000 x 0.002 = 100. Upload = 100 x 180 KB = 18
    MB/day for the cohort.
