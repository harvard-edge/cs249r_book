title: Orin Cache Line Fetch
scenario: A Jetson Orin Nano manages a KV cache expanding by 64KB per token. PagedAttention transfers blocks from LPDDR5 to GPU cores via 32-byte cache lines.
question: Design a block sizing strategy to minimize the 5us synchronization overhead per block fetch while keeping memory fragmentation under 10% for a 500-token chat.
details:
  realistic_solution: |
    A 500-token chat requires 32MB total. A 10% fragmentation limit allows 3.2MB of waste. Choosing a block size of 16 tokens (1MB) keeps fragmentation well within bounds while dramatically reducing the total number of 5us block fetch barriers compared to single-token granularity.
  common_mistake: |
    **The Pitfall:** Using massive block sizes (e.g., 1000 tokens) to minimize synchronization.
    **The Rationale:** Candidates prioritize lowering sync overhead without validating the fragmentation constraint.
    **The Consequence:** Memory fragmentation radically exceeds the 10% limit, causing early out-of-memory errors.
  napkin_math: |
    - **Total Memory:** 500 tokens * 64KB = 32MB.
    - **Max Fragmentation Limit:** 10% of 32MB = 3.2MB.
    - **Block Size (1MB):** 1MB / 64KB = 16 tokens per block.
    - **Worst-case Waste:** 15 unused tokens * 64KB = 0.96MB.
    - **Result:** **0.96MB is well under the 3.2MB limit, while significantly reducing 5us fetch operations.**
