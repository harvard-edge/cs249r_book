title: Orin Cache Line Fetch
scenario: A Jetson Orin Nano manages a KV cache expanding by 64KB per token. PagedAttention
  transfers blocks from LPDDR5 to GPU cores via 32-byte cache lines.
question: Design a block sizing strategy to minimize the 5us synchronization overhead
  per block fetch while keeping memory fragmentation under 10% for a 500-token chat.
details:
  realistic_solution: A 500-token chat requires 32MB total. A 10% fragmentation limit
    allows 3.2MB of waste. Choosing a block size of 16 tokens (1MB) keeps fragmentation
    well within bounds while dramatically reducing the total number of 5us block fetch
    barriers compared to single-token granularity.
  common_mistake: Using massive block sizes (e.g., 1000 tokens) to minimize sync overhead,
    thereby causing fragmentation to radically exceed the 10% memory constraint.
  napkin_math: 500 tokens * 64KB = 32MB. 10% limit = 3.2MB. 1MB block = 16 tokens.
    Max waste = 15/16 * 1MB = ~0.93MB < 3.2MB.
