title: The Performance Regression Detective
scenario: After an app update with zero changes to the ML model or inference code, inference latency on an iPhone 14 Pro increased from 12 ms to 28 ms (a 2.3x regression).
question: What non-model regression could explain identical model binaries becoming slower after a mobile app update?
details:
  realistic_solution: 'The regression is in the **build configuration or framework version**, not the model or inference code:'
  common_mistake: |
    **The Pitfall:** Assuming model latency is strictly a function of the model weights and architecture.
    **The Rationale:** Candidates think that if the input binary is identical, the execution time must remain constant.
    **The Consequence:** They fail to investigate the OS-level runtime, framework versions, or CoreML compilation delegates that dynamically map operations to hardware.
  napkin_math: |
    - **Original Profile:** 100% of layers run on the Apple Neural Engine (ANE) = 12ms.
    - **Regressed Profile:** OS update reroutes 3 ops to the GPU.
    - **New Latency:** ANE layers (8ms) + GPU layers (20ms) = 28ms.
    - **Final Result:** **The 16ms penalty is entirely due to context switching and unoptimized GPU fallback.**
