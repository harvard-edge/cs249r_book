title: Optimizing Quantized LLM Inference on Snapdragon 8 Gen 3 Hexagon NPU for Power Efficiency
scenario: You are tasked with deploying a quantized Large Language Model (LLM) for an on-device assistant on a smartphone powered by the Snapdragon 8 Gen 3 SoC, specifically targeting its Hexagon NPU. This NPU offers 45 TOPS (INT8) and is backed by 12-16 GB of LPDDR5X memory. The critical requirements are to achieve an average inference latency of no more than 20 ms per token while the entire SoC, during periods of continuous NPU activity, must not exceed a 3W power cap.
question: "How would you optimize quantized LLM inference on Snapdragon 8 Gen 3 for power efficiency to meet a 20 ms latency and 3W power cap?"
details:
  realistic_solution: 'Baseline profile the LLM across NPU P-states. Aggressively optimize dataflow to minimize LPDDR5X accesses. Implement a dynamic DVFS governor to lower voltage via the CMOS power equation. Focus strictly on Joules/token metrics.'
  common_mistake: |
    **The Pitfall:** Chasing maximum NPU utilization without managing memory power and voltage scaling.
    **The Rationale:** Candidates assume that finishing the inference as fast as possible (race-to-sleep at peak frequency) is always best, ignoring the quadratic power cost of high voltage states.
    **The Consequence:** The SoC easily blows past the 3W limit, causing thermal throttling and eventually killing sustained frame rates entirely.
  napkin_math: |
    - **Peak Power Cost:** 45 TOPS at ~1 pJ/INT8 op means full NPU compute draws 45W, drastically exceeding the 3W limit.
    - **Target Energy:** If inference requires 100 GOPS, energy per token is 100 GOPS * 1 pJ = 0.1 Joules.
    - **Power Delivery:** Achieving a 20ms (0.02s) latency requires 0.1 J / 0.02 s = 5W average power.
    - **Final Result:** Since 5W > 3W, the system MUST **lower the P-state (voltage) or further reduce GOPS** to fit within the thermal envelope.
