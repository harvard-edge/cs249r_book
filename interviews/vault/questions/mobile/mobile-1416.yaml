title: Mitigating Jetsam Evictions on A17 Pro NE
scenario: You are deploying a high-resolution vision model (50M parameters, FP16) on the Apple A17 Pro Neural Engine with 8 GB of unified memory. The OS and camera daemon consume 6.5 GB of memory. Your application experiences frequent OS-level Jetsam evictions due to peak memory spikes during inference.
question: How would you analyze the memory bottleneck and quantify an optimization strategy to prevent OOM evictions?
details:
  realistic_solution: The optimal approach reduces both static weight footprint and peak dynamic activation memory to survive strict iOS Jetsam limits. First, quantize the model weights from FP16 to INT8. Second, implement spatial tiling for the input resolution, processing smaller patches sequentially, which drastically reduces the peak intermediate feature map size allocated in the shared memory.
  common_mistake: |
    **The Pitfall:** Ignoring the massive memory footprint of intermediate feature map activations.
    **The Rationale:** Candidates often focus solely on quantizing weights, assuming unified memory means the NPU can swap to disk effortlessly.
    **The Consequence:** They miss the massive dynamic spikes caused by high-resolution tensors, leading to inevitable OS-level evictions.
  napkin_math: |
    **Assumptions & Constraints:**
    - Apple A17 Pro (8 GB Total - 6.5 GB System = 1.5 GB Available).
    - 50M parameter model (FP16).
    - Input resolution: 512x512x256.

    **Calculations:**
    - Original FP16 weights: 50M * 2 bytes = 100 MB.
    - Peak activation (512x512): 512 * 512 * 256 * 2 = ~134 MB (allocation ~400 MB).
    - Quantizing weights to INT8 saves 50 MB.
    - Tiling input to 256x256: 256 * 256 * 256 * 2 = 33.5 MB (allocation ~100 MB).

    **Conclusion & Interpretation:**
    - **Result: ~100 MB peak allocation (Memory-Capacity Bound)**. Tiling drops dynamic memory safely under the limit, preventing Jetsam evictions.
