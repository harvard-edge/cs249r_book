title: 'Kernel Fusion: Fluency — Estimate Neural Engine Throughput for Fused MLP'
scenario: 'Estimate the Neural Engine throughput on A17 Pro (35 TOPS INT8, 8GB) for
  a fused MLP block: Linear(2048→8192) + SiLU + Linear(8192→2048), processing batch=1
  single-token decode. Include weight loading time and compute time, and determine
  which is the bottleneck.'
question: 'How would you estimate the Neural Engine throughput on A17 Pro (35 TOPS
  INT8, 8GB) for a fused MLP block: Linear(2048→8192) + SiLU + Linear(8192→2048),
  processing batch=1 single-token decode?'
details:
  realistic_solution: At batch=1 decode, MLP is dominated by weight loading, not compute.
    This is the memory-bandwidth-bound regime where arithmetic intensity is very low.
  common_mistake: Ignoring weight loading time for decode mode; assuming TOPS rating
    equals actual throughput for small batch operations.
  napkin_math: 'Linear 1 weights (INT8): 2048×8192 × 1B = 16.8MB. Linear 2 weights (INT8): 8192×2048
    × 1B = 16.8MB. Total weight: 33.6MB. Weight load time: 33.6MB / 68 GB/s = 0.49ms.
    Compute: batch=1. Linear 1: 2 × 2048 × 8192 = 33.6M ops. Linear 2: same.
    Total: 67.2M ops. NE at 35 TOPS: 67.2M / 35T = 0.0019ms. Compute time:
    0.002ms. Memory-bound: 0.49ms / 0.002ms = 245× memory-bound. Fusion benefit for SiLU:
    SiLU acts on 8192-element vector. If activations are FP16 (2B): 8192 × 2B = 16KB.
    Unfused: write 16KB + read 16KB = 32KB. Fused: stays in NE registers.
    Savings: 32KB / 68 GB/s = 0.47µs. Negligible vs 490µs weight load. Conclusion:
    at batch=1, fusion saves ~0.1% — weight loading dominates completely. To improve:
    INT4 quantization (reduces weights to 16.8MB → 0.25ms load).'
