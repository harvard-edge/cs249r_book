title: 'Kernel Fusion: Fluency — Estimate Neural Engine Throughput for Fused MLP'
scenario: Estimate the Neural Engine throughput on A17 Pro (35 TOPS INT8, 8GB) for a fused MLP block: Linear(2048→8192) + SiLU + Linear(8192→2048), processing batch=1 single-token decode.
question: What is the estimated Neural Engine throughput for the fused MLP block, and which phase is the bottleneck?
details:
  realistic_solution: At batch=1 decode, MLP is dominated by weight loading, not compute. This is the memory-bandwidth-bound regime where arithmetic intensity is very low.
  common_mistake: |
    **The Pitfall:** Ignoring weight loading time and assuming the TOPS rating equals actual throughput for small batches.
    **The Rationale:** Engineers apply compute-bound formulas to memory-bound generative workloads.
    **The Consequence:** Grossly overestimating inference speed and missing critical bottlenecks in the architecture.
  napkin_math: |
    1. Weights: (2048*8192) + (8192*2048) = 33.6MB.
    2. Load Time: 33.6MB / 68 GB/s = 0.49ms.
    3. Compute: 67.2M ops / 35 TOPS = 0.0019ms.
    4. **Conclusion:** Workload is **245x memory-bound** (0.49ms load vs 0.0019ms compute). Fusion saves negligible time at batch=1.
