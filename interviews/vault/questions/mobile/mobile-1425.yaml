title: Deterministic Execution on A17 Pro
scenario: You are optimizing an ISO 26262 ASIL-B certified driver monitoring system deployed on an edge module utilizing the Apple A17 Pro Neural Engine. The safety watchdog timer trips intermittently because inference latency spikes from 20ms to 45ms during periodic CPU functional safety self-test routines.
question: How would you make A17 Pro inference deterministic despite unified-memory contention from other subsystems?
details:
  realistic_solution: The correct approach is to decouple the shared memory dependency by aggressively quantizing the model to INT8, fusing layers, and caching intermediate activations strictly within the 16-core Neural Engine's local SRAM. By drastically reducing the reliance on the shared 8 GB unified memory during the CPU's self-test memory bursts, the system achieves predictable workload isolation and deterministic execution times.
  common_mistake: |
    **The Pitfall:** Increasing the watchdog timer limit or relying on compute headroom.
    **The Rationale:** Candidates assume compute power alone can solve the latency problem without understanding deterministic memory access constraints.
    **The Consequence:** The safety certification fails because shared resource contention guarantees unpredictable worst-case execution times.
  napkin_math: |
    *   **Compute Time:** `0.7 TOP / 35 TOPS = 20ms`
    *   **Original Memory Delay:** `25ms` (Total 45ms)
    *   **Memory I/O Reduction (INT8 + Fusion):** `75% reduction`
    *   **New Memory Delay:** `25ms * 0.25 = 6.25ms`
    *   **Result:** **`20ms + 6.25ms = 26.25ms`, ensuring deterministic execution safely within the 30ms limit.**
