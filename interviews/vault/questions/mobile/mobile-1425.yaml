title: 'Deterministic Execution on A17 Pro'
scenario: 'You are optimizing an ISO 26262 ASIL-B certified driver monitoring system deployed on an edge module utilizing a Neural Engine. The safety watchdog timer trips intermittently because inference latency spikes from 20ms to 45ms during periodic CPU functional safety self-test routines.'
question: 'How would you make inference deterministic despite unified-memory contention from other subsystems?'
details:
  realistic_solution: 'Decouple the shared memory dependency by aggressively quantizing the model to INT8, fusing operators via graph compilation, and caching intermediate activations strictly within the local SRAM. This reduces LPDDR5X bus saturation during CPU self-test memory bursts.'
  common_mistake: |
    **The Pitfall:** Increasing the watchdog timer limit or relying on compute headroom.
    **The Rationale:** Candidates assume compute power alone can solve the latency problem without understanding deterministic memory access constraints.
    **The Consequence:** The safety certification fails because shared resource contention guarantees unpredictable worst-case execution times.
  napkin_math: |
    **Assumptions & Constraints:**
    - Compute Time: 20ms. Max Latency: 30ms limit.
    - Original Memory Delay: 25ms (Total 45ms).

    **Calculations:**
    - Memory I/O Reduction (INT8 + Fusion): 75% reduction.
    - New Memory Delay: 25ms * 0.25 = 6.25ms.
    - Total Time: 20ms + 6.25ms = 26.25ms.

    **Conclusion & Interpretation:**
    - **Result: 26.25ms (Memory-Bound)**. 26.25ms execution is deterministic and safely within the 30ms limit.
