title: 'The Depthwise Dividend: Neural Architecture Search'
scenario: You're optimizing a computer vision model for a mobile application that
  needs to run in real-time. To reduce the computational load, you are considering
  replacing a standard 3x3 convolutional layer with a 3x3 depthwise separable convolution.
  Recall the approximate computational savings (in terms of Multiply-Accumulate operations)
  from making this change.
question: What MAC reduction should a 3x3 depthwise separable convolution provide
  versus a standard 3x3 convolution?
details:
  realistic_solution: 'A 3x3 depthwise separable convolution reduces computation by
    approximately 9 times compared to a standard 3x3 convolution. A standard convolution''s
    cost is proportional to `Input_Channels * Output_Channels * Kernel_Width * Kernel_Height`.
    A depthwise separable convolution splits this into two steps: a depthwise step
    (cost proportional to `Input_Channels * Kernel_Width * Kernel_Height`) and a pointwise
    step (cost proportional to `Input_Channels * Output_Channels`). The ratio of these
    costs approaches `Kernel_Width * Kernel_Height` as the number of channels increases.'
  common_mistake: Engineers often underestimate the massive computational savings
    of depthwise separable convolutions, guessing a small constant factor like 2x.
    Others mistakenly believe the savings are linear with kernel size (e.g., 3x for
    a 3x3 kernel) rather than quadratic. This fundamental misunderstanding leads to
    poor architectural choices on resource-constrained devices.
  napkin_math: Let's compare the Multiply-Accumulate operations (MACs) for a single
    output pixel position.
  options:
  - Approximately 2x reduction
  - Approximately 3x reduction
  - Approximately 9x reduction
  - The reduction is equal to the number of input channels
  correct_index: 2
