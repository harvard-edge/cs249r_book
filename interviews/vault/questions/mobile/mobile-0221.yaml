title: The 'Ambient Assistant' Battery Drain
scenario: 'You''re an engineer on a new ''Ambient Assistant'' feature for a smartphone. The feature continuously
  listens for a wake word. To save power, it uses a duty cycle: it runs a small ML model for 1 second,
  drawing 2W of power, and then sleeps for 9 seconds, drawing 0.05W. The phone has a 15 Wh (Watt-hour)
  battery. Assuming this is the only non-standard background task, approximately what percentage of the
  phone''s total battery capacity will this feature consume in a 24-hour period?'
question: "Assuming this is the only non-standard background task, approximately what percentage of the phone's total battery capacity will this feature consume in a 24-hour period?"
details:
  realistic_solution: The correct approach is to calculate the time-weighted average power consumption
    and then multiply by the total time. The feature's cycle is 10 seconds long (1s active + 9s sleep).
    The average power is the total energy per cycle (in Joules) divided by the cycle duration (in seconds).
    This average power (in Watts) can then be multiplied by 24 hours to find the total energy consumption
    in Watt-hours.
  common_mistake: Engineers often calculate the active power consumption but either forget the duty cycle
    entirely, or they ignore the small but continuous power draw during the 'sleep' phase of the cycle.
    Over a 24-hour period, this sleep power accumulates and is a non-trivial part of the total energy
    budget, accounting for over 18% of the feature's total consumption in this case.
  napkin_math: '1. Calculate energy per 10-second cycle: E_cycle = (P_active * t_active) + (P_sleep *
    t_sleep) = (2W * 1s) + (0.05W * 9s) = 2 J + 0.45 J = 2.45 Joules. 2. Calculate cycles per day: 86,400
    seconds / 10s = 8,640 cycles. 3. Total daily energy: 8,640 * 2.45 J = 21,168 Joules (roughly 5.8 Wh
    of battery capacity).'
  options:
  - ~32%
  - ~39%
  - ~164%
  - ~320%
  correct_index: 1
