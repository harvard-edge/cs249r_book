title: Architecting On-Device LLM Cost Strategy for Tensor G3
scenario: You are designing the deployment strategy for an on-device summarization feature using a 1.8B
  parameter LLM (Gemini Nano equivalent) targeted for devices equipped with the Google Tensor G3. The
  product requirements mandate keeping latency under 1 second per request without exceeding thermal thresholds
  or battery budget during sustained use. Given the Tensor G3's on-device TPU capabilities of 7.5 TOPS
  and a shared 12 GB LPDDR5X memory pool, evaluate the architectural tradeoffs between quantizing the
  model to INT4 versus INT8, and design a system that dynamically manages compute execution and memory
  offloading to estimate and control power costs.
details:
  realistic_solution: The correct design evaluates the system holistically, recognizing that memory bandwidth,
    not just the 7.5 TOPS compute, is the bottleneck for on-device LLMs. A robust architecture would dynamically
    profile the device state, utilizing INT4 quantization to halve the memory bandwidth requirements and
    footprint (from ~1.8GB to ~0.9GB for weights), while implementing a fallback mechanism to cloud inference
    if the device temperature exceeds safe limits, thus predictably managing power and compute costs.
  common_mistake: Candidates often design purely for peak performance without evaluating the thermal and
    memory bandwidth constraints of the Tensor G3's 12 GB LPDDR5X shared memory. They might default to
    INT8 quantization without calculating if the memory bandwidth can sustain the required token generation
    rate under the 7.5 TOPS compute limit.
  napkin_math: A 1.8B parameter model in INT8 requires 1.8 GB memory. At 10 tokens/sec, reading the weights
    requires 1.8 GB * 10 = 18 GB/s bandwidth. With INT4, the footprint drops to 0.9 GB, requiring 9 GB/s
    bandwidth. Given the Tensor G3's 7.5 TOPS, generating a token takes roughly 2 * 1.8B operations =
    3.6 Giga-operations per token. At 10 tokens/sec, this requires 36 GOPS, which easily fits within the
    7.5 TOPS (7500 GOPS) compute budget, proving memory bandwidth and power (not raw compute) dictate
    the system design.
