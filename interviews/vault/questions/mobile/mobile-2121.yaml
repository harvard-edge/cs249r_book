title: Hexagon-Adreno Pipeline
scenario: A Snapdragon 8 Gen 3 runs a 2-stage vision pipeline across its Hexagon NPU
  (45 TOPS) and Adreno GPU, communicating via shared LPDDR5X (60 GB/s).
question: Analyze the pipeline bubble and end-to-end latency if the NPU stage takes
  12ms, the GPU takes 8ms, and the synchronization barrier over shared memory takes
  2ms.
details:
  realistic_solution: The pipeline step time is bounded by the slowest stage plus
    the synchronization barrier. The bottleneck is the 12ms NPU compute. Adding the
    2ms memory barrier yields a 14ms step time. The GPU sits idle for a 4ms bubble
    each cycle.
  common_mistake: Missing the synchronization barrier cost when summing stage times,
    falsely calculating a 12ms throughput bottleneck.
  napkin_math: Step = max(12, 8) + 2 = 14ms. GPU bubble = 14 - 8 - 2 = 4ms.
