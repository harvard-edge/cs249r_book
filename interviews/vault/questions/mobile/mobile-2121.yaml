title: Hexagon-Adreno Pipeline
scenario: A Snapdragon 8 Gen 3 runs a 2-stage vision pipeline across its Hexagon NPU (45 TOPS) and Adreno GPU, communicating via shared LPDDR5X (60 GB/s).
question: Analyze the pipeline bubble and end-to-end latency if the NPU stage takes 12ms, the GPU takes 8ms, and the synchronization barrier over shared memory takes 2ms.
details:
  realistic_solution: The pipeline step time is bounded by the slowest stage plus the synchronization barrier. The bottleneck is the 12ms NPU compute. Adding the 2ms memory barrier yields a 14ms step time. The GPU sits idle for a 4ms bubble each cycle.
  common_mistake: |
    **The Pitfall:** Missing the synchronization barrier cost when summing stage times.
    **The Rationale:** Candidates often assume that shared memory allows instant, zero-cost data availability between heterogeneous processors.
    **The Consequence:** Falsely calculating a 12ms throughput bottleneck and underestimating the true 14ms step time and GPU idle time.
  napkin_math: |
    - Slowest stage (NPU): 12ms.
    - Synchronization barrier: 2ms.
    - Pipeline step time: max(12, 8) + 2 = 14ms.
    - GPU Bubble: 14ms (total step) - 8ms (GPU compute) - 2ms (sync) = 4ms.
    - **The GPU sits idle for a 4ms bubble each cycle.**
