title: On-Device Telemetry Budgeting for A17 Pro Neural Engine
scenario: You are deploying a continuous on-device face analysis pipeline for a photography app running
  on the Apple A17 Pro. The pipeline runs at 30 FPS, utilizing the 16-core Neural Engine (35 TOPS) to
  keep power draw under the ~5W budget while sharing the 8 GB unified memory with the ISP and GPU. To
  ensure reliability across the fleet, you need to implement observability to detect model drift, performance
  stragglers, and out-of-memory errors without impacting the user experience or draining the battery.
details:
  realistic_solution: The correct approach is to implement local aggregation and thresholding. Instead
    of sending raw data, the device should compute rolling statistics (e.g., P99 latency, average memory
    usage, drift scores via lightweight local clustering) over a session and only upload anomalies or
    compact summaries when the device is plugged in and on Wi-Fi. Critical errors (like OOMs) can trigger
    immediate, small payload alerts.
  common_mistake: Candidates often propose sending raw inference latencies or activation samples back
    to the server per frame, treating the mobile device like a cloud server. They fail to account for
    the energy cost of the cellular radio, the limited unified memory bandwidth, and the strict thermal
    constraints of the A17 Pro.
  napkin_math: 'If raw telemetry is 1KB per frame at 30 FPS: 1KB * 30 = 30KB/sec, or ~1.8MB/min. Sending
    this continuously over 5G could consume ~1-2W of power, eating heavily into the 5W total system budget
    and causing thermal throttling. By aggregating locally: store 5 metrics (e.g., latency, memory, confidence
    score) as 32-bit floats (20 bytes) per frame. Over a 5-minute session: 20 bytes * 30 FPS * 300s =
    180KB total local storage footprint. Compressing this and sending it once at the end of the session
    reduces the radio wake time to milliseconds, preserving battery while still providing adequate observability.'
