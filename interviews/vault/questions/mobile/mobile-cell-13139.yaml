title: 'Mobile TCO Evaluation: A17 Pro vs Tensor G3 for On-Device ML App'
scenario: Evaluate A17 Pro (35 TOPS, 8GB, 3W for LLM) vs Tensor G3 (7.5 TOPS, 12GB, 5W for LLM) for a
  medical transcription app using Whisper-large (1.5B params, requires >8GB for inference). Calculate
  per-transcription energy cost, throughput, and the model compatibility difference. 30-minute audio,
  real-time transcription.
question: "How would you calculate per-transcription energy cost, throughput, and the model compatibility difference?"
details:
  realistic_solution: 15 minutes = 900 seconds. Energy = 5W × 900s/3600s/hr = 1.25 Wh (not 0.417 Wh from
    300 seconds).
  common_mistake: Not checking that A17 Pro with 8GB cannot run Whisper-large (1.5B FP16 = 3GB weights
    + 5GB working memory = 8GB total — borderline), and Tensor G3 with 12GB easily fits but has 4.7x lower
    TOPS.
  napkin_math: 'Fine-tuning time: 15 minutes = 900 seconds (not 300 seconds = 5 minutes). Energy = average_power
    × time = 5W × (900/3600)hr = 5W × 0.25hr = 1.25 Wh.'
