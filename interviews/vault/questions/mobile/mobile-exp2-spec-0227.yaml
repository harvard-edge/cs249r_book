title: Real-Time Object Detection on Tensor G3
scenario: Your team needs to specify a continuous real-time object detection architecture running on the
  Google Tensor G3. The system must process 30 frames per second at high resolution while concurrently
  running an on-device LLM (Gemini Nano). Given the Tensor G3 features an on-device TPU with 7.5 TOPS
  and shares 12 GB of LPDDR5X memory, analyze the architectural tradeoffs for the CNN backbone to meet
  these requirements.
question: "How would you design a real-time object detector for Tensor G3 that balances compute and memory access?"
details:
  realistic_solution: A strong solution analyzes the hardware profile and proposes an architecture that
    balances compute and memory access. The candidate should specify using standard dense convolutions
    in early layers or adopting an EfficientNet/ConvNeXt-inspired design with higher arithmetic intensity
    to better utilize the TPU's matrix math capabilities without starving the memory bus shared with the
    LLM.
  common_mistake: Candidates frequently default to standard MobileNet-style depthwise separable convolutions
    to minimize FLOPs. They fail to analyze that depthwise layers are highly memory-bandwidth bound and
    have low arithmetic intensity, which causes contention with the concurrently running Gemini Nano model
    on the shared LPDDR5X bus.
  napkin_math: 'Compute budget: Tensor G3 provides 7.5 TOPS. If Gemini Nano consumes 80% of the TPU, 1.5
    TOPS remains for vision. At 30 FPS, the per-frame compute budget is (1.5 * 10^12) / 30 = 50 GOPs (25
    GMACs). An EfficientNet-Lite0 takes ~400 MMACs, well under the 25 GMACs limit. Memory budget: The
    12 GB LPDDR5X must fit the Gemini Nano weights (e.g., 2-4 GB) and activation buffers. A depthwise-heavy
    CNN might only achieve 10-20% TPU utilization due to memory stalls, proving that bandwidth, not the
    1.5 TOPS compute, dictates the design specification.'
