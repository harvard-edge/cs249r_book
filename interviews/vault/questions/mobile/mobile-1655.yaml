title: Optimizing Edge ML Deployment on Samsung Exynos NPU
scenario: Your team is deploying a real-time object detection model onto a mobile device. During testing, the model consistently achieves only 15 FPS, falling short of the 30 FPS target. NPU utilization appears surprisingly low.
question: How would you systematically diagnose this 15 FPS bottleneck and quantify a specific optimization toward the 30 FPS target?
details:
  realistic_solution: '1. **Systematic On-Device Profiling:** Focus on identifying time spent in data loading, CPU pre-processing, data transfer, NPU inference, and CPU post-processing. 2. **Hypothesis Generation:** If pre-processing consumes ~40ms per frame, offload it using NEON intrinsics or GPU. 3. **Quantification of Fix:** If the optimization reduces pre-processing to 10ms, the new total frame time becomes ~37ms/frame, resulting in ~27 FPS.'
  common_mistake: |
    **The Pitfall:** Immediately jumping to model compression.
    **The Rationale:** Engineers assume the NPU is the bottleneck because it's an ML task, without profiling the entire pipeline (CPU preprocessing, memory transfers).
    **The Consequence:** Time is wasted quantizing or pruning a model that is already fast enough, while the actual CPU or memory bottleneck remains unfixed.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target Frame Time (30 FPS): 33.3 ms.
    - Current Frame Time (15 FPS): 66.7 ms.
    - Current Breakdown: 40 ms (Pre-processing) + 20 ms (NPU) + 7 ms (Post-processing) = 67 ms.

    **Calculations:**
    - Optimized Pre-processing: Reduced from 40 ms to 10 ms.
    - New Frame Time: 10 ms + 20 ms + 7 ms = 37 ms.
    - New FPS: 1000 ms / 37 ms = ~27 FPS.

    **Conclusion & Interpretation:**
    - **Result: CPU Pre-Processing Bound**. The bottleneck is in CPU preprocessing, not the NPU, and offloading it significantly improves FPS.
