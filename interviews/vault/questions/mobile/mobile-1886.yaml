title: A17 Background Queue Deep State
scenario: 'An Apple A17 device runs concurrent background ML tasks: face recognition
  and photo indexing. Tasks arrive at 5 tasks/sec. The NPU processes them exponentially
  at 8 tasks/sec.'
question: Create an optimized scheduling limit to ensure the probability of having
  more than 3 tasks in the queue remains under 15%.
visual:
  kind: svg
  path: mobile-1886.svg
  alt: Line chart showing queue probabilities decaying exponentially.
  caption: Probability of N tasks in the system.
details:
  realistic_solution: Utilization $\rho = 5 / 8 = 0.625$. The probability of exactly
    $n$ items in an M/M/1 queue is $P(n) = (1-\rho)\rho^n$. The probability of $>k$
    items in the system is $\rho^{k+1}$. Here, $>3$ tasks in queue means $>4$ tasks
    in the system. $\rho^5 = (0.625)^5 \approx 0.095$ (9.5%). This is already under
    15%, so no throttling is necessary.
  common_mistake: Confusing 'items in queue' with 'items in the system' (which includes
    the one being actively processed).
  napkin_math: rho = 5/8 = 0.625. P(N > 4) = rho^5 = 0.625^5 = 0.095 < 0.15 limit.
