title: Hexagon NPU Sizing for On-Device LLM
scenario: You are deploying a 1.5B parameter LLM for real-time chat on a Qualcomm Hexagon NPU (45 TOPS INT8, 12 GB LPDDR5X). You have a strict latency SLA of 40 tokens per second.
question: How should a Hexagon NPU be evaluated for batch-1 on-device LLM inference to meet the 40 tokens/sec SLA?
details:
  realistic_solution: |
    Auto-regressive decoding at batch size 1 is memory-bandwidth bound. The NPU must be evaluated based on its memory access efficiency. To meet the SLA, INT8 is insufficient due to LPDDR5X bandwidth limits (including OS/display consumption). The model must be quantized to INT4 to halve the bandwidth requirement.
  common_mistake: |
    **The Pitfall:** Fixating on the 45 TOPS INT8 peak compute capacity.
    **The Rationale:** Candidates incorrectly assume the workload is compute-bound and ignore the shared LPDDR5X memory bandwidth bottleneck.
    **The Consequence:** They design a system that fails to meet latency SLAs due to memory starvation.
  napkin_math: |
    - Model size (INT8): 1.5B params * 1 byte = 1.5 GB.
    - Required memory bandwidth for 40 tokens/sec: 1.5 GB/token * 40 tokens/sec = 60 GB/s.
    - Mobile LPDDR5X peaks at ~64 GB/s, but OS and display memory overhead will cause this 60 GB/s requirement to fail in practice.
    - Compute utilized: 3 GOPs/token * 40 = 120 GOPs (0.12 TOPS), which is <0.3% of the NPU's 45 TOPS.
    - **Quantizing to INT4 halves the bandwidth requirement to 30 GB/s, safely meeting the SLA.**
