title: The 'Instant' Assistant's Waiting Game
scenario: Your team is building an on-device LLM chat assistant with a 2B parameter INT8 model. The phone's
  memory bandwidth is 51.2 GB/s, making token generation memory-bound. The current user request has 50
  tokens left to generate when a new request arrives. If you are using a simple 'First-In, First-Out'
  queue that processes one request at a time, interpret the potential Time-to-First-Token (TTFT) for the
  *new* request. Why is this a problem for user experience?
details:
  realistic_solution: The new request must wait for the current request to finish. The per-token generation
    time is dictated by the memory bandwidth, not the compute. With a 2GB model (2B params * 1 byte/param)
    and 51.2 GB/s of bandwidth, each token takes about 39ms to produce. Since 50 tokens remain on the
    current job, the new request will be stuck in the queue for `50 tokens * 39ms/token = 1950ms`. A nearly
    2-second wait for the first token feels very sluggish and breaks the illusion of an 'instant' assistant.
    The correct approach is to implement continuous batching, which can dynamically add the new request
    to the generation process, reducing its wait time to roughly one generation cycle.
  common_mistake: Engineers often calculate latency for a single request in isolation, forgetting that
    in a real system, requests can arrive back-to-back. This leads them to underestimate the *worst-case*
    latency, which is what the user actually experiences when the system is under load. They ignore the
    queueing delay from the currently running job.
  napkin_math: '1. Model Size: A 2B parameter model in INT8 requires 2 GB of memory. 2. Token Generation
    Latency: In a memory-bound decode phase, generating one token requires loading the full 2 GB model.
    2 GB / 51.2 GB/s = 39 ms/token. 3. Time Remaining: Generating the remaining 50 tokens takes 50 * 39
    ms = 1,950 ms. 4. Impact: The new incoming request must wait nearly 2 seconds before prefill can begin.'
  options:
  - About 40ms, the time it takes to generate a single token for the new request.
  - Less than 1ms, because the phone's 35 TOPS NPU makes generation near-instantaneous.
  - About 40ms, because the new request can be immediately batched with the current one.
  - Nearly 2 seconds, because the new request must wait for the 50 remaining tokens of the current job
    to finish.
  correct_index: 3
