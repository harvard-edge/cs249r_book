title: The 'Instant' Assistant's Waiting Game
scenario: Your team is building an on-device LLM chat assistant with a 2B parameter INT8 model. The phone's memory bandwidth is 51.2 GB/s, making token generation memory-bound. The current user request has 50 tokens left to generate when a new request arrives.
question: What TTFT does a FIFO queue impose when a 2B INT8 assistant has 50 memory-bound tokens left at 51.2 GB/s?
details:
  realistic_solution: The new request must wait for the current request to finish. The per-token generation time is dictated by the memory bandwidth, not the compute. With a 2GB model (2B params * 1 byte/param) and 51.2 GB/s of bandwidth, each token takes about 39ms to produce. Since 50 tokens remain on the current job, the new request will be stuck in the queue for `50 tokens * 39ms/token = 1950ms`. A nearly 2-second wait for the first token feels very sluggish and breaks the illusion of an 'instant' assistant. The correct approach is to implement continuous batching, which can dynamically add the new request to the generation process, reducing its wait time to roughly one generation cycle.
  common_mistake: |
    **The Pitfall:** Calculating latency for a single request in isolation.
    **The Rationale:** Engineers assume requests are handled instantly and forget to factor in queueing delay caused by ongoing autoregressive generation.
    **The Consequence:** They massively underestimate worst-case latency under load, resulting in unresponsive UX when concurrent requests hit the FIFO queue.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model: 2B parameters, INT8 (2 GB).
       - Memory Bandwidth: 51.2 GB/s.
       - Pending Queue: 50 tokens remaining on the current request.
    2. **Calculations:**
       - Token Latency: 2 GB / 51.2 GB/s = 39.06 ms/token.
       - Queue Delay: 50 tokens × 39.06 ms = 1,953 ms.
    3. **Conclusion & Interpretation:**
       - **Result: Queuing-Bound.** The new request is blocked for **nearly 2 seconds** (1,953 ms) before prefill can begin, breaking the illusion of an instant assistant.
  options:
  - About 39ms, because 2 GB / 51.2 GB/s = 39ms, assuming no queuing delay.
  - About 19ms, because the 35 TOPS NPU processes the 50 tokens instantly, leaving only memory overhead.
  - About 39ms, assuming the new request can be immediately batched via static batching.
  - Nearly 2 seconds, because the new request must wait for 50 tokens at 39ms/token (1,953 ms) to finish.
  correct_index: 3
