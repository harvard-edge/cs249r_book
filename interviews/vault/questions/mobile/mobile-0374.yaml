title: The Background Service Battery Killer
scenario: You're developing a 'Smart Reply' feature. The on-device model runs in the background when a
  new message is received. You measure that a single inference consumes 2 Watts and takes 0.5 seconds.
  The phone is in a low-power idle state the rest of the time, consuming 20 milliwatts. If a user receives
  one message every 50 seconds on average, what is the *average* power consumption of your feature over
  time?
question: "If a user receives one message every 50 seconds on average, what is the *average* power consumption of your feature over time?"
details:
  realistic_solution: The correct approach is to calculate the total energy consumed during one full cycle
    (active + sleep) and then divide by the cycle's period to find the average power.
  common_mistake: Engineers often calculate the power cost of the active period and average it over the
    entire cycle, completely forgetting to include the baseline power consumption during the idle/sleep
    state. While the sleep power is small, it's active 99% of the time and is a significant part of the
    total energy budget.
  napkin_math: "P_avg = (P_active × t_active + P_sleep × t_sleep) / t_period\n\n1. **Define the duty cycle:**\n\
    \   - t_period = 50 seconds\n   - t_active = 0.5 seconds (inference)\n   - t_sleep = 49.5 seconds\
    \ (idle)\n2. **Calculate energy per cycle:**\n   - E_active = 2 W × 0.5 s = 1.0 J\n   - E_sleep =\
    \ 0.020 W × 49.5 s = 0.99 J\n   - E_total = 1.0 + 0.99 = 1.99 J\n3. **Calculate average power:**\n\
    \   - P_avg = 1.99 J / 50 s = **39.8 mW**\n\nThe average power consumption is approximately **40 mW**.\
    \ Note that the idle power (20 mW) contributes almost half the total energy budget because the device\
    \ is idle 99% of the time. Ignoring the sleep state would give P_avg = 1.0 J / 50 s = 20 mW, which\
    \ underestimates the true consumption by nearly 2×."
  options:
  - 20.0 mW
  - 40.0 mW
  - 39.8 mW
  - 1010.0 mW
  correct_index: 2
