title: The Background Service Battery Killer
scenario: You're developing a 'Smart Reply' feature. The on-device model runs in the background when a new message is received. You measure that a single inference consumes 2 Watts and takes 0.5 seconds. The phone is in a low-power idle state the rest of the time, consuming 20 milliwatts.
question: If a user receives one message every 50 seconds on average, what is the *average* power consumption of your feature over time?
details:
  realistic_solution: The correct approach is to calculate the total energy consumed during one full cycle (active + sleep) and then divide by the cycle's period to find the average power.
  common_mistake: |
    **The Pitfall:** Calculating active power but ignoring idle power consumption.
    **The Rationale:** Engineers often average the active period over the cycle but forget the baseline sleep state, which accounts for 99% of the time.
    **The Consequence:** The total energy budget is underestimated by nearly 2x, leading to unexpected battery drain.
  napkin_math: |
    1. **Cycle Definition:** Period = 50 seconds. Active = 0.5s, Sleep = 49.5s.
    2. **Energy per Cycle:** 
       - Active energy = 2W * 0.5s = 1.0 J.
       - Sleep energy = 0.020W * 49.5s = 0.99 J.
       - Total energy = 1.0 J + 0.99 J = 1.99 J.
    3. **Average Power:** P_avg = 1.99 J / 50 s = **39.8 mW**.
  options:
  - 20.0 mW
  - 40.0 mW
  - 39.8 mW
  - 1010.0 mW
  correct_index: 2
