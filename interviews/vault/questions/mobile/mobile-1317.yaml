title: Tensor G3 Constant Folding Latency
scenario: You are compiling an on-device LLM for a mobile TPU. Processing certain static projection layers originally required 0.3 Tera-Operations (TOPs). A constant folding pass eliminates 20% of these operations. The TPU has a peak of 7.5 TOPS.
question: "How many milliseconds of compute latency does a 20% constant folding reduction save?"
details:
  realistic_solution: |
    Calculate the total number of operations eliminated by the constant folding optimization and divide by the processor's peak throughput.
  common_mistake: |
    **The Pitfall:** Misaligning units or factoring in memory bandwidth unnecessarily.
    **The Rationale:** Candidates often struggle to convert between Tera-Operations (volume) and Tera-Operations per Second (rate), or they overcomplicate by introducing memory limits.
    **The Consequence:** The candidate derives an incorrect latency savings estimate, completely throwing off the total latency budget calculation.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Original Workload: 0.3 TOPs.
       - Folding Reduction: 20%.
       - TPU Peak: 7.5 TOPS (Tera-Operations Per Second).
    2. **Calculations:**
       - Ops Eliminated: 0.3 * 0.20 = 0.06 TOPs.
       - Time Saved: 0.06 TOPs / 7.5 TOPS = 0.008 seconds.
       - Milliseconds: 0.008 * 1000 = 8 ms.
    3. **Conclusion & Interpretation:**
       - **Result: Compute Reduction.** Constant folding directly removes 8ms of strict compute time from the critical path.
