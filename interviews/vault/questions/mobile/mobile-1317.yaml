title: Tensor G3 Constant Folding Latency
scenario: You are compiling an on-device LLM for a mobile TPU. Processing certain static projection layers originally required 0.3 Tera-Operations (TOPs) per pass. A constant folding pass eliminates 20% of these operations. The TPU operates at a peak of 7.5 TOPS.
question: How many milliseconds of compute latency does a 20% constant folding reduction save on 0.3 TOPs of layers?
details:
  realistic_solution: Calculate the total number of operations eliminated by the constant folding optimization and divide by the processor's peak throughput.
  common_mistake: |
    **The Pitfall:** Misaligning units or factoring in memory bandwidth unnecessarily.
    **The Rationale:** Candidates often struggle to convert between Tera-Operations (volume) and Tera-Operations per Second (rate), or they overcomplicate by introducing memory limits.
    **The Consequence:** The candidate derives an incorrect latency savings estimate, completely throwing off the total latency budget calculation.
  napkin_math: |
    1. Calculate original ops: 0.3 TOPs.
    2. Calculate eliminated ops: 20% * 0.3 = **0.06 TOPs**.
    3. Calculate time saved in seconds: 0.06 TOPs / 7.5 TOPS = **0.008 seconds**.
    4. Convert to milliseconds: 0.008 seconds * 1000 = **8 milliseconds**.
