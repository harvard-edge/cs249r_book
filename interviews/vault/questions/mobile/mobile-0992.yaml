title: 'Model Size Estimation: Implement Parameter Count for Custom Transformer on
  Mobile'
scenario: 'Calculate the total parameter count and INT8 memory footprint for a custom
  small transformer: 6 layers, hidden_dim=512, FFN_dim=2048, 8 attention heads (head_dim=64),
  vocabulary=32000 tokens. Deployment target: Snapdragon 8 Gen 3 (16GB). Calculate
  embedding table, attention weights, FFN weights, and total.'
question: How many parameters and INT8 bytes does a 6-layer 512-hidden transformer
  with a 32K vocab require?
details:
  realistic_solution: 'Embedding: 32000×512=16,384K=16.4M params. Per layer: Q+K+V+O:
    4×(512×512)=1,048,576=1.05M. FFN (fc1+fc2): 2×(512×2048)=2,097,152=2.1M. LayerNorm:
    2×512×2=2048≈0. Per layer: 3.15M. 6 layers: 18.9M. LM head (tied with embedding):
    0 (shared). Total: 16.4+18.9=35.3M params. INT8: 35.3MB. Fits trivially in 16GB.'
  common_mistake: Forgetting the embedding table (vocab × hidden_dim) which for large
    vocabularies can exceed all transformer layer weights; at 32K × 512 = 16.4M params,
    it's 40% of the model.
  napkin_math: 'Embeddings: 32K×512=16.4M. Attention per layer: 4×512²=1.05M. FFN
    per layer: 512×2048+2048×512=2.1M. Total per layer: 3.15M. 6 layers: 18.9M. Total:
    35.3M. INT8: 35.3MB. FP16: 70.6MB. TPOT: 35.3MB/77GB/s=0.46ms (extremely fast).
    Inference-overhead-dominated. This model is tiny for mobile.'
