title: 'Model Size Estimation: Implement Parameter Count for Custom Transformer on Mobile'
scenario: You are deploying a custom small transformer on a 16GB mobile device. The model architecture consists of 6 layers, hidden_dim=512, FFN_dim=2048, 8 attention heads (head_dim=64), and a vocabulary of 32000 tokens.
question: "How many parameters and INT8 bytes does a 6-layer 512-hidden transformer with a 32K vocab require, including embeddings, attention, and FFN?"
details:
  realistic_solution: 'Embedding: 32000×512=16,384K=16.4M params. Per layer: Q+K+V+O:
    4×(512×512)=1,048,576=1.05M. FFN (fc1+fc2): 2×(512×2048)=2,097,152=2.1M. LayerNorm:
    2×512×2=2048≈0. Per layer: 3.15M. 6 layers: 18.9M. LM head (tied with embedding):
    0 (shared). Total: 16.4+18.9=35.3M params. INT8: 35.3MB. Fits trivially in 16GB.'
  common_mistake: |
    **The Pitfall:** Forgetting the embedding table (vocab × hidden_dim).
    **The Rationale:** Candidates focus entirely on the transformer layers and forget that for large vocabularies, the embedding table can exceed all transformer layer weights combined.
    **The Consequence:** Underestimating the model size by ~40%, leading to incorrect memory budgeting.
  napkin_math: |
    - Embeddings: 32,000 × 512 = 16.4M params.
    - Attention per layer: 4 × 512² = 1.05M params.
    - FFN per layer: (512 × 2048) + (2048 × 512) = 2.1M params.
    - Total per layer: 1.05M + 2.1M = 3.15M params.
    - Total for 6 layers: 6 × 3.15M = 18.9M params.
    - Total parameters: 16.4M + 18.9M = 35.3M params.
    - INT8 memory footprint: **35.3 MB**.
