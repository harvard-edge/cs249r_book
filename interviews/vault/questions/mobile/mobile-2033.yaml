title: Understanding Android NNAPI Initialization Overheads
scenario: An Android app switches from running a CNN on the CPU to the Hexagon NPU
  using the Android NNAPI.
question: Describe the initialization steps NNAPI takes when the app requests inference
  on the Hexagon NPU.
details:
  realistic_solution: The NNAPI first queries available accelerators and checks if
    the Hexagon NPU supports the model's specific operations. It then executes a device-specific
    compilation step to convert the model to Hexagon microcode and allocates shared
    memory buffers before performing inference.
  common_mistake: Believing the NPU executes the generic TensorFlow Lite flatbuffer
    directly without a device-specific compilation step.
  napkin_math: Compilation time > 500ms vs inference time ~5ms
