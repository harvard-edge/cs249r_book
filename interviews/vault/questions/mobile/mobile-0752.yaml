title: The 48MP Camera Firehose
scenario: A modern flagship phone has a 48MP camera sensor shooting 10-bit RAW at 30 fps burst mode. Before
  any ISP processing or compression, what is the raw data bandwidth flowing from the sensor to the SoC?
question: "Before any ISP processing or compression, what is the raw data bandwidth flowing from the sensor to the SoC?"
details:
  realistic_solution: 48 million pixels x 2 bytes (10-bit packed into 16-bit) x 30 fps = 2.88 GB/s. This
    is why mobile SoCs need dedicated high-bandwidth MIPI CSI interfaces and why the ISP is a critical
    bottleneck, not the CPU or GPU.
  common_mistake: Confusing the compressed HEIF/JPEG output size (a few MB per photo) with the raw sensor
    bandwidth. The ISP must handle the full uncompressed firehose before any compression occurs.
  napkin_math: 48MP x 2 bytes x 30 fps = 2.88 GB/s raw sensor bandwidth. This rivals the LPDDR5X memory
    bandwidth of the entire SoC.
  options:
  - A) ~30 MB/s. Each 48MP frame is about 1MB compressed.
  - B) ~288 MB/s. 48MP at 1 byte per pixel at 6 fps.
  - C) ~2.9 GB/s. 48MP at 2 bytes per pixel at 30 fps, uncompressed.
  - D) ~29 GB/s. 48MP at 20 bytes per pixel with full color depth.
  correct_index: 2
