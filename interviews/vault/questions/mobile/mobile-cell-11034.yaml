title: 'Dataset Curation: Mastery — Sensor Fusion Dataset Design for On-Device Health Model'
scenario: You are designing training data for an on-device health monitoring model on Snapdragon 8 Gen
  3 (45 TOPS INT8, 16GB). The model fuses accelerometer, heart rate, and microphone data to detect health
  events. Design the multi-modal data curation pipeline, synchronization strategy, and privacy-preserving
  collection protocol. Quantify storage and compute requirements.
question: "What storage, sync, compute, and privacy plan fits accelerometer, heart-rate, and microphone health data on Snapdragon 8 Gen 3?"
details:
  realistic_solution: 'Sensor sync: timestamp alignment within 10ms. Data: accelerometer 100Hz × 3-axis,
    HR 1Hz, mic 16kHz → downsample for event detection. Privacy: process on-device, store only aggregated
    features (not raw audio). Labels: user-confirmed events only.'
  common_mistake: Not accounting for sensor synchronization jitter; treating health data as non-sensitive;
    not applying purpose limitation.
  napkin_math: 'Accelerometer: 100Hz × 3 × 4B = 1.2KB/sec. HR: 1Hz × 4B = 4B/sec. Mic (raw): 16K Hz ×
    2B = 32KB/sec. 24h raw: acc=103MB, HR=345KB, mic=2.76GB. Total raw/day=2.86GB — too large. Processed:
    event windows only (10-sec windows around anomalies). Assume 10 events/day × 10sec = 100sec. Acc window:
    100sec × 1.2KB/s = 120KB. Mic MFCC features: 100sec × 40 features × 10Hz = 400KB. HR: 100B. Total
    per event: 520KB × 10 = 5.2MB/day. 30-day buffer: 156MB. Model training: 30 days × 10 events = 300
    examples × 3 modalities × 10sec. Fits in 16GB RAM for on-device training.'
