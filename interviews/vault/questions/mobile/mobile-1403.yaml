title: Optimizing Adversarial Defense on Exynos NPU
scenario: You are securing a real-time face authentication model running on an NPU. Running 5 unbatched Monte Carlo dropout passes saturates the memory bus and misses the 30ms latency target.
question: How do you diagnose the 5-pass Monte Carlo bottleneck on a shared-memory NPU, and how can it be optimized below 30ms?
details:
  realistic_solution: 'The optimal strategy is to analyze the memory traffic and fuse the Monte Carlo passes into a single batched NPU execution to maximize data reuse of the model weights in the NPU''s SRAM. By batching the inputs, the weights are loaded from the shared LPDDR5X only once instead of five times. This shifts the workload from being memory-bandwidth bound to utilizing the massive 34.7 TOPS compute capacity of the dual-core NPU.'
  common_mistake: |
    **The Pitfall:** Misdiagnosing the bottleneck as purely NPU compute limitation.
    **The Rationale:** Candidates ignore the shared 12 GB LPDDR5X contention and suggest aggressive model pruning instead of analyzing memory traffic.
    **The Consequence:** Wasting time compressing a model when the actual fix is simple batching to maximize SRAM weight reuse.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model Weights (INT8): 5M params = 5 MB.
       - Compute per pass: 1 GOP.
       - Bandwidth: 10 GB/s. NPU Peak: 34.7 TOPS.
    2. **Calculations:**
       - Unbatched (5 passes): Transfer 25 MB. Transfer time = 25 MB / 10 GB/s = 2.5 ms. Total latency > 10 ms (due to driver overheads).
       - Batched (1 pass with batch=5): Transfer 5 MB. Transfer time = 5 MB / 10 GB/s = 0.5 ms. Compute = 5 GOPs / 34.7 TOPS = 0.14 ms.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound optimization. Batching eliminates redundant weight loads, maximizing SRAM reuse and dropping latency to <1 ms.**
