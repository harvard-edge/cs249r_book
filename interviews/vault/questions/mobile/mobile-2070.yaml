title: Neural Engine and GPU Overlap
scenario: An iOS application processes 60 FPS video. The Apple A17 Pro Neural Engine
  takes 10ms for style transfer. The GPU takes 12ms to render the stylized UI overlays.
question: Analyze the total end-to-end latency for one frame versus the steady-state
  pipeline throughput if the ANE and GPU execute completely asynchronously.
details:
  realistic_solution: 'For a single frame, the data flows sequentially: 10ms (ANE)
    + 12ms (GPU) = 22ms end-to-end latency. In a steady-state pipelined architecture,
    while the GPU is rendering Frame N, the ANE is processing Frame N+1. The steady-state
    throughput is governed by the longest stage (the bottleneck), which is the GPU
    at 12ms. Therefore, the throughput is 1000 / 12 = 83.3 FPS, easily meeting the
    60 FPS target despite the 22ms latency.'
  common_mistake: Assuming pipeline throughput is 1000 / 22ms = 45 FPS, failing to
    understand pipelined concurrency.
  napkin_math: 1000 / max(10, 12) = 83.3 FPS.
