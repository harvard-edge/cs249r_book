title: 'The Jank-Inducing Transformer'
scenario: 'You are a mobile ML engineer at a company building a new flagship smartphone. Your team is tasked with implementing real-time (30 FPS) background segmentation for video calls. The previous-generation phone used a highly optimized, NAS-discovered MobileNetV3-style CNN and met its 16ms per-frame latency budget. For the new phone, which features a powerful Apple A17 Pro-class SoC, your team swaps in a more accurate Vision Transformer (ViT) model.'
question: 'Why does replacing a MobileNetV3 segmentation backbone with a ViT cause mobile video-call jank?'
details:
  realistic_solution: 'The correct diagnosis is that the Vision Transformer''s self-attention mechanism has a computational and memory access complexity of O(N^2), where N is the number of image patches. For video frames, N can be large, leading to a massive intermediate attention matrix (N x N) for each head in each layer. Creating and accessing these matrices destroys cache locality and saturates the SoC''s memory bandwidth. The MobileNetV3 architecture, built on depthwise separable convolutions, scales linearly (O(N)) and has a much higher degree of memory locality. Even though the A17 Pro''s NPU has high peak TOPS, it''s being starved waiting for data from the memory subsystem, which is overwhelmed by the ViT''s quadratic access pattern. The high memory traffic is also a primary cause of the increased power draw and battery drain.'
  common_mistake: 'Engineers often fixate on raw FLOPs or parameter count. They might incorrectly assume that if the NPU has enough TOPS, the model should be fast. This ignores the quadratic scaling of self-attention and, critically, how its memory access patterns can saturate the memory bus, which is often the real bottleneck on mobile SoCs. Another common mistake is to suggest simple quantization without addressing the fundamental architectural inefficiency.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Target Resolution: 1080p (1920x1080).
    - ViT Configuration: 16x16 patches, yielding 8,160 tokens.
    - Attention matrix memory: 133MB per head per layer.
    - ViT Size: 12 heads, 12 layers.
    - LPDDR5 bandwidth: 51.2 GB/s.

    **Calculations:**
    - ViT memory traffic per frame: 133MB * 12 heads * 12 layers = ~19 GB.
    - ViT memory-limited time: 19 GB / 51.2 GB/s = ~371ms per frame (~2.7 FPS).
    - MobileNetV3 memory traffic per frame: ~100MB.
    - MobileNetV3 memory-limited time: 100MB / 51.2 GB/s = ~2ms per frame.

    **Conclusion & Interpretation:**
    - **Result: 19 GB Traffic (Memory-Bound).** The ViT's quadratic attention mechanism generates 185x more memory traffic than MobileNetV3, completely stalling the NPU and causing severe jank.
  options:
  - 'The NPU lacks hardware support for GELU and LayerNorm operations, forcing them onto the much slower CPU and creating a pipeline stall.'
  - 'The ViT model needs to be more aggressively quantized from FP16 to INT8, as the NPU''s integer units are currently underutilized.'
  - 'The ViT''s O(N^2) self-attention mechanism creates large, non-local attention matrices that saturate the SoC''s memory bandwidth, stalling the NPU.'
  - 'The model''s parameter count is too large, exceeding the L2 cache capacity and causing constant, slow main memory access for weights.'
