title: The Stuttering Voice Assistant
scenario: You're an engineer optimizing an on-device LLM voice assistant for a car's infotainment system. The UI feels laggy. You measure the Time-To-First-Token (TTFT) and Time-Per-Output-Token (TPOT). Users report the assistant takes a noticeable moment to start speaking and then the words come out in 'bursts,' not a smooth stream.
question: "Why does static batching make the on-device voice assistant emit words in bursts instead of a smooth stream?"
details:
  realistic_solution: The root cause is the static batching strategy's negative effect on TPOT. When a batch of 4 is processed, each user must wait for the other 3 users' tokens to be generated before they receive their *next* token. This creates a delay equal to the time to process the entire batch for each word, causing the 'bursty' output that users perceive as stutter.
  common_mistake: |
    **The Pitfall:** Focusing only on raw NPU throughput or TTFT while ignoring TPOT.
    **The Rationale:** Engineers assume that high aggregate tokens/sec equals a good user experience, missing how static batching serializes response delivery.
    **The Consequence:** The assistant technically generates words quickly, but the user experiences severe audio stutter because the tokens are held hostage by the batch.
  napkin_math: |
    **Assumptions & Constraints:**
    - Batch Size 1 generation: NPU takes 10 ms/token (smooth stream).
    - Batch Size 4 generation: NPU takes 25 ms/token.

    **Calculations:**
    - Static Batching Delay: Under static batching, all 4 users wait 25 ms for the entire batch to complete before anyone gets their next token.
    - Their effective TPOT is 25 ms, causing noticeable audio stutter compared to a 10 ms stream.

    **Conclusion & Interpretation:**
    - **Result: 25 ms effective TPOT (Latency-Bound)**. Continuous batching immediately returns tokens as they are ready, decoupling the generation streams.
  options:
  - The NPU's 10ms-per-token performance is too slow; the model must be quantized from FP16 to INT8 to increase raw token throughput.
  - The LPDDR5 memory bandwidth is saturated by loading activations for the whole batch. The model's hidden dimension size must be reduced.
  - The static batching forces each user to wait for the entire batch's tokens to be generated for every word, causing high TPOT. Switch to continuous batching to decouple requests and stream tokens back smoothly.
  - The 50ms batching timeout is too high, causing unacceptable TTFT. The timeout should be reduced to 10ms to make the system more responsive.
  correct_index: 2
