title: The Stuttering Voice Assistant
scenario: You're an engineer optimizing an on-device LLM voice assistant for a car's infotainment system.
  The UI feels laggy. You measure the Time-To-First-Token (TTFT) and Time-Per-Output-Token (TPOT). Users
  report the assistant takes a noticeable moment to start speaking and then the words come out in 'bursts,'
  not a smooth stream.
question: "Why does static batching make the on-device voice assistant emit words in bursts instead of a smooth stream?"
details:
  realistic_solution: The root cause is the static batching strategy's negative effect on TPOT. When a
    batch of 4 is processed, each user must wait for the other 3 users' tokens to be generated before
    they receive their *next* token. This creates a delay equal to the time to process the entire batch
    for each word, causing the 'bursty' output that users perceive as stutter.
  common_mistake: Engineers often focus only on TTFT or raw NPU throughput (tokens/sec), ignoring the
    user-perceived smoothness which is dictated by TPOT. They might blame the NPU's raw speed or the memory
    system, when the actual bottleneck is the rigid, high-latency scheduling of the static batching system
    that serializes users.
  napkin_math: "Let's analyze the Time-Per-Output-Token (TPOT). If the NPU takes 10ms per token for batch size 1, but 25ms per token for batch size 4 (due to parallel efficiency), under static batching, 4 users must wait 25ms for the batch to complete before anyone gets their next token. Their effective TPOT is 25ms, causing noticeable audio stutter compared to a smooth 10ms stream. Continuous batching would return tokens to each user as soon as their respective sequence is ready."
  options:
  - The NPU's 10ms-per-token performance is too slow; the model must be quantized from FP16 to INT8 to
    increase raw token throughput.
  - The LPDDR5 memory bandwidth is saturated by loading activations for the whole batch. The model's hidden
    dimension size must be reduced.
  - The static batching forces each user to wait for the entire batch's tokens to be generated for every
    word, causing high TPOT. Switch to continuous batching to decouple requests and stream tokens back
    smoothly.
  - The 50ms batching timeout is too high, causing unacceptable TTFT. The timeout should be reduced to
    10ms to make the system more responsive.
  correct_index: 2
