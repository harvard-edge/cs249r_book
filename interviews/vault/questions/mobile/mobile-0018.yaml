title: The ML Notification Backlash
scenario: Your news app uses an on-device ML model to predict which articles a user will click, and sends push notifications for high-confidence predictions. The model has 78% precision on your test set. After launch, the app's rating drops from 4.5 to 3.2 stars due to 'too many irrelevant notifications'.
question: Why does 78% precision make news notifications feel wrong at launch scale?
details:
  realistic_solution: '78% precision at high volume is a UX disaster: 22% irrelevant x 40 notifications/day = 8.8 bad notifications, far exceeding user tolerance of 3-5 total. Fix: cap at 3 notifications/day, selecting highest-confidence predictions. Top-3 from 40 candidates achieves ~95% precision. Bad notifications drop from 8.8 to 0.15/day.'
  common_mistake: |
    **The Pitfall:** Believing 78% precision is "pretty good" for a notification system.
    **The Rationale:** Optimizing for ML precision without accounting for the asymmetric false-positive cost and notification volume.
    **The Consequence:** Causing severe notification fatigue and user churn by sending 8+ irrelevant notifications daily.
  napkin_math: |
    - 40 notifications/day at 78% precision = 22% irrelevant.
    - 40 * 0.22 = 8.8 bad notifications/day.
    - User tolerance: ~3-5 total notifications/day.
    - Cap at top 3: Top-3 candidates hit ~95% precision.
    - 3 * 0.05 = 0.15 bad notifications/day.
    - **Capping notifications drastically reduces false positives from 8.8 to 0.15 per day.**
  options:
  - '78% precision at high volume is a UX disaster: 22% irrelevant x 40 notifications/day = 8.8 bad notifications, far exceeding user tolerance of 3-5 total. Fix: cap at 3 notifications/day, selecting highest-confidence predictions. Top-3 from 40 candidates achieves ~95% precision.'
  - The issue stems from OS-level scheduling interference; pinning the inference thread to a dedicated core will eliminate the performance variance.
  - 78% precision means 78% of notifications are relevant — that's pretty good.
  - OTA updates should always include the full model file to ensure atomicity; delta updates risk corrupting the model.
