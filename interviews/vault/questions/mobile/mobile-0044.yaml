title: The Keyboard Prediction Privacy Leak
scenario: Your on-device keyboard prediction model (LSTM, 20M params) on a Snapdragon 8 Gen 3 learns from
  user typing to improve suggestions. A security researcher demonstrates that by observing the model's
  top-5 prediction probabilities over 1000 queries, they can reconstruct fragments of the user's private
  text — including passwords typed into non-password fields and private messages. The model never leaves
  the device. How is private data leaking through predictions?
question: "How can top-5 keyboard predictions over 1000 queries leak private text even when the model stays on-device?"
details:
  realistic_solution: 'This is a memorization attack. The LSTM''s 20M params can store ~160K-800K tokens
    verbatim. An attacker querying top-5 predictions over 1K queries extracts ~250-375 words (emails,
    passwords, medical terms). Fix with DP during on-device training (epsilon=8): per-query leakage drops
    from ~2-3 bits to <0.3 bits, reducing extractable content 30x to ~7-8 words. Perplexity cost: 32 ->
    35 (3-point tradeoff for 30x privacy gain). Also filter outputs to suppress email/phone/password-like
    completions.'
  common_mistake: '"The model is on-device, so data can''t leak." On-device doesn''t mean private. The
    model''s *outputs* (predictions) are observable by any app using the keyboard, and those outputs encode
    information about the training data.'
  napkin_math: '**Memorization capacity analysis:** LSTM with 20M params at FP32 = 80 MB of learned weights.
    Information-theoretic capacity: ~20M x 32 bits = 640M bits. Average English word ≈ 5 chars x 8 bits
    = 40 bits. Theoretical max memorization: 640M / 40 = **16M tokens** (upper bound, assumes perfect
    encoding). | **Practical memorization:** Models don''t memorize at theoretical capacity. With generalization
    overhead, empirically ~1-5% of capacity stores verbatim sequences. Practical verbatim memorization:
    ~160K-800K tokens. | **User data exposure:** User types ~10K words/day x 90 days = 900K tokens. If
    model memorizes ~500K tokens verbatim (mid estimate), that''s **~56% of recent typing history potentially
    recoverable.** | **Attack surface:** Top-5 predictions x 1,000 queries = 5,000 probability observations.
    Each observation leaks ~2-3 bits about training data. Total leakage: ~10,000-15,000 bits ≈ 250-375
    words reconstructable from the query budget. | **With DP (ε=8):** Noise injection limits per-query
    leakage to <0.3 bits. 1,000 queries x 0.3 = 300 bits ≈ 7-8 words. **~30x reduction in leakage.** Perplexity
    cost: base model 45, personalized 32, personalized+DP 35 (3-point cost for 30x privacy gain).'
