validation_issues_pro:
- 'The core napkin math equation for model memorization capacity is arithmetically false: `200K * 100`
  (20M) does not equal `20M * 10` (200M).'
- The subsequent conclusion that the model can memorize 22% of user history is based on the flawed '200K
  tokens' figure derived from the incorrect equation.
