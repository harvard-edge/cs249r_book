title: The Keyboard Prediction Privacy Leak
scenario: Your on-device keyboard prediction model (LSTM, 20M params) on a Snapdragon 8 Gen 3 learns from user typing to improve suggestions. A security researcher demonstrates that by observing the model's top-5 prediction probabilities over 1000 queries, they can reconstruct fragments of the user's private text, including passwords. The model never leaves the device.
question: How can top-5 keyboard predictions over 1000 queries leak private text even when the model stays on-device?
details:
  realistic_solution: 'This is a memorization attack. The LSTM''s 20M params can store ~160K-800K words verbatim. An attacker querying top-5 predictions over 1K queries extracts ~250-375 words. Fix with DP during on-device training (epsilon=8): per-query leakage drops from ~2-3 bits to <0.3 bits, reducing extractable content 30x to ~7-8 words. Perplexity cost: 32 -> 35 (3-point tradeoff for 30x privacy gain). Also filter outputs to suppress email/phone/password-like completions.'
  common_mistake: |
    **The Pitfall:** Believing on-device processing guarantees data privacy.
    **The Rationale:** Engineers assume that since the model never leaves the device, user data cannot leak, forgetting that the model's outputs (predictions) encode training data.
    **The Consequence:** The model memorizes and subsequently leaks sensitive user data like passwords and emails to other apps.
  napkin_math: |
    - **Model capacity:** 20M params * 32 bits (FP32) = 640M bits
    - **Word size:** ~5 chars * 8 bits = 40 bits/word
    - **Max theoretical memorization:** 640M / 40 = 16M words
    - **Practical memorization (1-5%):** 16M * 0.03 = ~500K words
    - **User typing history (90 days):** 10K words/day * 90 days = 900K words
    - **Exposure:** 500K / 900K = **~55% of history memorized**
    - **Attack leakage:** 1,000 queries * 5 predictions * 2-3 bits = ~10,000-15,000 bits (~250-375 words)
    - **With DP (ε=8):** Leakage drops to <0.3 bits/query, resulting in only **~7-8 words** leaked.
