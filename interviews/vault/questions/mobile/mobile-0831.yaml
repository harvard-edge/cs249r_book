title: 'Mobile New 0033'
scenario: 'A mobile GPU compiles a Conv-BatchNorm-ReLU block. The profiler shows three distinct kernels executing, and total latency is 1.8ms instead of an expected 0.5ms.'
question: 'Why does an unfused Conv-BatchNorm-ReLU block take 1.8ms instead of one 0.5ms GPU kernel?'
details:
  realistic_solution: 'The symptom is multiple kernel dispatches and heavily inflated latency, caused by operator fusion failure in the compiler. Because BN and ReLU weren''t fused into the Convolution kernel, the GPU must write the intermediate Conv output to VRAM, read it back for BN, write it out, and read it for ReLU. This causes massive memory roundtrips and triple the kernel launch overhead.'
  common_mistake: |
    **The Pitfall:** Believing that total theoretical FLOPs alone determine latency.
    **The Rationale:** Candidates ignore memory roundtrips and missed compiler fusions when estimating latency.
    **The Consequence:** They fail to identify I/O bottlenecks and wrongly blame hardware throughput constraints.
  napkin_math: |
    **Assumptions & Constraints:**
    - Fused Kernel: 1 Read, 1 Write (20MB total).
    - Unfused Kernels: Conv (1R, 1W), BN (1R, 1W), ReLU (1R, 1W) = 60MB total.
    - Bandwidth: 50GB/s.
    - Kernel Launch Overhead: 0.2ms per kernel.

    **Calculations:**
    - Bandwidth Time: 60MB / 50GB/s = 1.2ms.
    - Launch Overhead: 3 kernels * 0.2ms = 0.6ms.

    **Conclusion & Interpretation:**
    - **Result: 1.8ms (Memory-Bound)**. 1.2ms + 0.6ms = 1.8ms total latency due to multiple memory roundtrips.
