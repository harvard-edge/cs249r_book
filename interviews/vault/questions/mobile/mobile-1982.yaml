title: A17 Pro AR Burst Processing
scenario: An Apple A17 Pro NPU processes AR frames. Mean service time is 20 ms (range
  18-28 ms, CV ~0.15). A naive analysis (the figure - linear queue drain from 15 to
  0 in ~300 ms) computes burst drain as 15 frames * 20 ms = 300 ms, treating the NPU
  as drain-only. The realistic system has three complications - (a) the L1 caches
  are evicted by the pan, costing an extra +5 ms on the first 3 frames after the burst
  (cold-cache penalty); (b) service-time variance pushes worst-case per-frame to 28
  ms; (c) the camera continues to deliver new frames at 30 fps during drainage, refilling
  the queue.
question: Starting from the figure's 300 ms naive estimate, specify the realistic
  worst-case time for the queue to return to its pre-burst depth. Include the cold-cache
  tax, worst-case variance, and the open-loop arrival stream during drainage. Identify
  whether the system is stable during drainage (utilisation < 1) and quantify the
  gap between the figure's estimate and the true tail.
