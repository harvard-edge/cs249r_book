title: A17 Pro AR Burst Processing
scenario: An Apple A17 Pro (35 TOPS) NPU processes AR frames. Service time has mean
  20 ms but ranges 18-28 ms depending on scene complexity (CV~0.15). The user pans
  the camera, generating a burst of 15 frames simultaneously in the buffer; meanwhile,
  the camera continues to deliver new frames at a steady 30 fps that compete for
  NPU time. The L1 cache for the NPU is 16 MB and gets evicted under heavy panning
  (cold-cache penalty +5 ms on the first 3 frames after a burst).
question: Specify the worst-case time to clear the burst queue accounting for (a)
  cold-cache penalty on the first 3 frames, (b) variable service time, and (c)
  the steady 30 fps stream that continues to feed the queue during burst drainage.
visual:
  kind: svg
  path: mobile-1982.svg
  alt: Queue length graph starting at 15 and linearly draining to 0 over 300ms.
  caption: AR Burst queue drain over time.
details:
  realistic_solution: 'Worst-case service times: 3 cold-cache frames at 28+5=33
    ms = 99 ms, then 12 warm frames at 28 ms (worst case) = 336 ms. Burst drain
    in isolation = 99 + 336 = 435 ms. But during drainage, 30 fps arrivals (1 frame
    every 33 ms) add 13 frames * 28 ms (continuing to arrive) = ~ 1.13 frames added
    per drained frame. With rho_during_drain = 30 fps * 28 ms = 0.84, queue continues
    to grow until average service drops below arrival. Effective drain time = 435
    / (1 - 0.84) ~ 2.7 s before steady-state catches up. The system temporarily
    exceeds its SLA window.'
  common_mistake: Multiplying 15 * 20 = 300 ms and ignoring (a) cold-cache penalty
    after burst trigger, (b) worst-case service variance, and (c) continued arrival
    flow that prevents the queue from draining freely.
  napkin_math: 'Cold drain: 3*33 + 12*28 = 435 ms in isolation. With 30 fps continued
    arrivals: 435/(1-0.84) = 2720 ms before steady-state.'
