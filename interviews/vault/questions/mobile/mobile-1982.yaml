details:
  realistic_solution: 'Worst-case service times: 3 cold-cache frames at 28+5=33
    ms = 99 ms, then 12 warm frames at 28 ms (worst case) = 336 ms. Burst drain
    in isolation = 99 + 336 = 435 ms. But during drainage, 30 fps arrivals (1 frame
    every 33 ms) add 13 frames * 28 ms (continuing to arrive) = ~ 1.13 frames added
    per drained frame. With rho_during_drain = 30 fps * 28 ms = 0.84, queue continues
    to grow until average service drops below arrival. Effective drain time = 435
    / (1 - 0.84) ~ 2.7 s before steady-state catches up. The system temporarily
    exceeds its SLA window.'
  common_mistake: Multiplying 15 * 20 = 300 ms and ignoring (a) cold-cache penalty
    after burst trigger, (b) worst-case service variance, and (c) continued arrival
    flow that prevents the queue from draining freely.
  napkin_math: 'Cold drain: 3*33 + 12*28 = 435 ms in isolation. With 30 fps continued
    arrivals: 435/(1-0.84) = 2720 ms before steady-state.'
