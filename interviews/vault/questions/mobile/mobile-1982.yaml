title: A17 Pro AR Burst Processing
scenario: An Apple A17 Pro (35 TOPS) NPU processes AR frames at 20 ms per frame. The
  user pans the camera, generating a burst of 15 frames simultaneously in the buffer.
question: Calculate the time required to clear the burst queue assuming no further
  frames arrive.
visual:
  kind: svg
  path: mobile-1982.svg
  alt: Queue length graph starting at 15 and linearly draining to 0 over 300ms.
  caption: AR Burst queue drain over time.
details:
  realistic_solution: With deterministic service time of 20 ms per frame and a starting
    queue of 15 frames, the drain time is simply 15 * 20 ms = 300 ms.
  common_mistake: Applying steady-state M/M/1 formulas to a transient burst scenario.
  napkin_math: 15 * 20 = 300 ms
