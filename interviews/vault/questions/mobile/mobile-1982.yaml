details:
  realistic_solution: 'Worst-case service times: 3 cold-cache frames at 28+5=33 ms
    each = 99 ms, then 12 warm frames at 28 ms (worst-case) = 336 ms. Burst drain
    in isolation = 99 + 336 = 435 ms. During drainage, the camera keeps delivering
    at 30 fps (1 frame every 33.3 ms) while service per frame is 28 ms worst-case,
    giving rho = 28/33.3 = 0.84 - so 0.84 new frames arrive for every 1 frame drained.
    The queue still drains because rho < 1 (the system is stable), but only at a net
    rate of (1 - 0.84) = 0.16 frames cleared per service slot. Effective drain time
    = 435 / (1 - 0.84) ~= 2.72 s before the queue returns to its pre-burst depth.
    The naive 300 ms estimate underestimates by ~9x, and the system blows through
    any per-frame SLA tighter than ~2.7 s during the recovery window.'
  common_mistake: 'Multiplying 15 * 20 = 300 ms and ignoring (a) cold-cache penalty
    after burst trigger, (b) worst-case service variance, and (c) the continued 30
    fps arrival stream during drainage. A second slip: claiming rho = 0.84 means the
    queue is growing - rho < 1 means the queue still drains (the system is stable),
    just at the slower (1 - rho) net rate.'
  napkin_math: 'Cold drain: 3*33 + 12*28 = 435 ms in isolation. rho during drainage
    = 28 ms / 33.3 ms = 0.84 (stable, draining). Effective drain time = 435 / (1 -
    0.84) = 435 / 0.16 ~= 2720 ms ~= 9x the naive 300 ms.'
