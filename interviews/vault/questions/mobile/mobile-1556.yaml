title: Latency Decomposition for Mobile ML on Snapdragon NPU
scenario: You are evaluating two ML architectures for real-time 30 FPS semantic segmentation on a Snapdragon 8 Gen 3 Hexagon NPU (45 TOPS INT8, 12-16 GB LPDDR5X). Architecture A runs the main segmentation model on the NPU with CPU pre/post-processing. Architecture B runs a lightweight feature extraction backbone on the NPU, passing heavy intermediate feature maps to the CPU/GPU for the segmentation head.
question: How would you profile and decompose latency components to determine which architecture offers better real-time performance?
details:
  realistic_solution: A robust latency decomposition requires detailed, device-specific profiling using tools like Snapdragon Profiler to precisely measure each component's duration. This involves analyzing memory access patterns, NPU utilization rates, and concurrent CPU/GPU loads. Optimizations should prioritize reducing data movement (e.g., keeping data on-chip), fusing operations to minimize context switching, and intelligently distributing workloads across the NPU, CPU, and GPU based on their unique computational strengths and the model's characteristics. Iterative profiling and refinement are crucial.
  common_mistake: |
    **The Pitfall:** Focusing solely on the NPU's inference speed without accounting for data transfer overhead between host memory and accelerator memory.
    **The Rationale:** Engineers assume memory buses are infinitely fast and underestimate the latency penalty of passing high-resolution feature maps across the SoC.
    **The Consequence:** Choosing Architecture B, which theoretically optimizes compute but practically destroys latency and battery life through constant memory thrashing.
  napkin_math: |
    - **Theoretical NPU Inference (Arch A):** 30 GOPS / 45 TOPS = **0.66 ms**.
    - **Memory Transfer (Arch A):** 1080p image (6 MB) / 50 GB/s = **0.12 ms**.
    - **Memory Transfer (Arch B):** Massive intermediate feature map (e.g., 120 MB) / 50 GB/s = **2.4 ms** per transfer.
    - **Conclusion:** Arch B fundamentally inflates latency due to massive data movement bottlenecks, making Arch A vastly superior.
