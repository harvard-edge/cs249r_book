title: Latency Decomposition for Mobile ML on Snapdragon NPU
scenario: 'You are evaluating two distinct ML inference architectures for a real-time
  semantic segmentation application on a mobile device powered by the Snapdragon 8
  Gen 3 Hexagon NPU (45 TOPS INT8, 12-16 GB LPDDR5X). Both architectures process a
  1080p video stream (30 FPS).


  Architecture A: The main segmentation model is extensively optimized for and executed
  on the Hexagon NPU. Preprocessing (e.g., resizing, normalization) and postprocessing
  (e.g., mask decoding, overlay) are performed on the CPU.


  Architecture B: Uses the NPU for a lightweight feature extraction backbone. The
  more complex segmentation head is executed on the CPU/GPU, along with preprocessing
  and postprocessing.


  Decompose the end-to-end latency for each architecture into key components: data
  input/output transfer between host and accelerator, preprocessing time, inference
  execution time (on NPU/CPU/GPU), and postprocessing time. Analyze and compare their
  latency profiles, considering the NPU''s capabilities and memory bandwidth, to identify
  bottlenecks and determine which architecture offers better real-time performance.'
question: How would you profile latency components for mobile ML inference on Snapdragon
  NPU?
details:
  realistic_solution: A robust latency decomposition requires detailed, device-specific
    profiling using tools like Snapdragon Profiler to precisely measure each component's
    duration. This involves analyzing memory access patterns, NPU utilization rates,
    and concurrent CPU/GPU loads. Optimizations should prioritize reducing data movement
    (e.g., keeping data on-chip), fusing operations to minimize context switching,
    and intelligently distributing workloads across the NPU, CPU, and GPU based on
    their unique computational strengths and the model's characteristics. Iterative
    profiling and refinement are crucial.
  common_mistake: Focusing solely on NPU inference speed without accurately accounting
    for critical overheads such as data transfer between host memory and NPU memory,
    or underestimating the computational cost and latency contribution of CPU/GPU-bound
    preprocessing and postprocessing stages, especially for high-resolution, real-time
    video streams. Another common mistake is misestimating the actual effective TOPS
    utilized by a given model on the NPU versus its theoretical peak.
  napkin_math: 'Estimate theoretical NPU inference time: If a typical semantic segmentation model requires 30 GOPS, and the Hexagon NPU offers 45 TOPS (INT8), the theoretical minimum execution time is 30 GOPS / (45 TOPS * 1000) = 0.66 ms. Memory transfer overhead for Arch A: A 1080p image (1920x1080x3 bytes = ~6 MB). Transferring at 50 GB/s takes 6 MB / 50 GB/s = 0.12 ms. However, Arch B runs the heavy segmentation head on CPU/GPU, forcing high-volume intermediate feature maps (e.g., 120 MB) back and forth. 120 MB / 50 GB/s = 2.4 ms per transfer, heavily bloating latency and power compared to Arch A.'
