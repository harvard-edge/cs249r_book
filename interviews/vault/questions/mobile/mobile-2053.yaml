title: Mobile LLM Bandwidth Bound
scenario: You are designing an INT4 local language model for an NPU with approximately 35 GB/s of memory bandwidth allocated to it.
question: What is the maximum model size (in billions of parameters) to ensure a guaranteed generation speed of 15 tokens per second?
details:
  realistic_solution: "Autoregressive LLM decode generation is strictly memory bandwidth-bound on edge devices. Generating a single token requires streaming the entire model weight matrix from DRAM to the NPU's SRAM. To sustain 15 tokens/sec, the system must fetch the full weights 15 times per second. By dividing the 35 GB/s physical memory bandwidth by the required 15 Hz refresh rate, the maximum allowable model size is 2.33 GB. In an INT4 (W4A16) quantization scheme, each parameter occupies 0.5 bytes, allowing for an optimal maximum model size of 4.66 billion parameters."
  common_mistake: |
    **The Pitfall:** Calculating the model size directly from the byte quotient without accounting for the INT4 precision multiplier.
    **The Rationale:** Engineers calculate the raw file size capability (2.33 GB) but forget that at 4-bit precision, each parameter occupies exactly half a byte.
    **The Consequence:** Recommending a model size exactly half of what the hardware can actually support, sacrificing significant reasoning capability.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Allocated Memory Bandwidth: 35 GB/s.
       - Required generation speed: 15 tokens/sec.
       - Quantization: INT4 (0.5 bytes per parameter).
    2. **Calculations:**
       - Max memory payload per token: 35 GB/s / 15 tokens/sec = 2.33 GB.
       - Max parameter count: 2.33 GB / 0.5 bytes/param = 4.66 Billion parameters.
    3. **Conclusion & Interpretation:**
       - **Result: Memory Bandwidth-Bound.** The optimal maximum model size is ~4.6B parameters.
