title: Mobile LLM Bandwidth Bound
scenario: You are designing an INT4 local language model for an Apple A17 Pro, which
  has approximately 35 GB/s of memory bandwidth allocated to the NPU.
question: Design the maximum model size (in billions of parameters) to ensure a guaranteed
  generation speed of 15 tokens per second.
details:
  realistic_solution: Autoregressive LLM generation is bound by memory bandwidth;
    calculating 1 token requires reading the entire model once. To achieve 15 tokens/sec,
    the device must load the weights 15 times a second. Dividing the 35 GB/s bandwidth
    by 15 gives a maximum footprint of 2.33 GB. At INT4 precision (0.5 bytes/parameter),
    the optimal model size is roughly 4.6 billion parameters.
  common_mistake: Ignoring the precision (0.5 bytes for INT4) and claiming the model
    can only be 2.3 billion parameters.
  napkin_math: (35 GB/s / 15) / 0.5 bytes = 4.6B params
