title: Mobile LLM Bandwidth Bound
scenario: You are designing an INT4 local language model for an Apple A17 Pro, which has approximately 35 GB/s of memory bandwidth allocated to the NPU.
question: What is the maximum model size (in billions of parameters) to ensure a guaranteed generation speed of 15 tokens per second?
details:
  realistic_solution: Autoregressive LLM generation is bound by memory bandwidth; calculating 1 token requires reading the entire model once. To achieve 15 tokens/sec, the device must load the weights 15 times a second. Dividing the 35 GB/s bandwidth by 15 gives a maximum footprint of 2.33 GB. At INT4 precision (0.5 bytes/parameter), the optimal model size is roughly 4.6 billion parameters.
  common_mistake: |
    **The Pitfall:** Calculating the model size directly from the byte quotient without accounting for the INT4 precision multiplier.
    **The Rationale:** Engineers calculate the raw file size capability (2.33 GB) but forget that at 4-bit precision, each parameter occupies exactly half a byte.
    **The Consequence:** Recommending a model size exactly half of what the hardware can actually support, sacrificing significant reasoning capability.
  napkin_math: |
    - **Required Memory Loading:** 15 tokens/sec means loading the full model 15 times per second.
    - **Max Footprint:** 35 GB/s / 15 = **2.33 GB**.
    - **Parameter Conversion (INT4):** 2.33 GB / 0.5 bytes per parameter = **4.66 Billion parameters**.
    - **Conclusion:** The optimal maximum model size is ~4.6B parameters.
