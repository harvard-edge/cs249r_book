title: 'Fault Tolerance: Realize Checkpoint Architecture for Continuous Mobile Personalization'
scenario: Realize the complete checkpoint architecture for an on-device personalization system on A17
  Pro (35 TOPS Neural Engine, 8GB RAM) that trains nightly for 10 minutes and serves inference 24/7. Specify
  storage layout, checkpoint schedule, retention policy, and recovery paths for all failure modes.
details:
  realistic_solution: 'Two separate state objects: (1) Inference state: LoRA weights (fp32, 4MB) + merged
    into base (optional). (2) Training state: full checkpoint (weights + optimizer, 24MB). Different retention
    policies and update frequency.'
  common_mistake: Not separating inference model state from training state; not specifying which files
    are updated atomically.
  napkin_math: 'Storage layout: /models/base_model_int4.bin (500MB, immutable), /models/lora_inference.bin
    (4MB, updated after each training session), /models/training_ckpt/ (24MB, 3 rolling checkpoints =
    72MB). Total: 500MB + 4MB + 72MB = 576MB. Training checkpoint schedule: every 3 minutes during 10-min
    window = 3 checkpoints. Each 24MB at 3 GB/s flash = 8ms write. Atomic update: write lora_inference_new.bin
    → verify → rename() → old file deleted. Retention: keep 3 training checkpoints (9 minutes history).
    Inference checkpoint retained until next session completes. Recovery: crash during inference → load
    lora_inference.bin (4MB, 4ms), resume. Crash during training at minute 7 → load training_ckpt/ckpt_6min.bin
    (24MB, 8ms + 3s app restart). Device wipe → reload base_model from App Store (background download).'
