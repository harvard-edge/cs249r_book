title: The 'Always-On' Battery Drain Dilemma
scenario: You are designing a 'Driver Safety Watch' feature for a smartphone app. It uses the microphone
  to continuously listen for distress keywords. The ML inference task runs for 100ms every second. During
  this active inference, the SoC consumes 3 Watts. For the other 900ms, the device is in a low-power listening
  state, consuming 50 milliwatts.
details:
  realistic_solution: The correct approach is to calculate the average power consumption by weighting
    the active and idle power states by their respective duty cycles, and then multiply by the total time.
  common_mistake: Engineers often confuse peak power with average power. They might calculate the energy
    drain as if the device consumes the peak 3W continuously, forgetting to factor in the duty cycle.
    Another common error is to ignore the low-power 'idle' consumption, which accumulates to a significant
    amount over 24 hours.
  napkin_math: Average Power = (P_active × Duty_active) + (P_idle × Duty_idle)
  options:
  - 72 Wh (Confuses peak power with average power)
  - 7.2 Wh (Ignores the idle power consumption)
  - ~8.3 Wh
  - ~29.8 Wh (Incorrectly converts Joules to Watt-hours)
  correct_index: 2
