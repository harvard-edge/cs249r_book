title: On-Device Adversarial Input Detection for Safety-Critical ML on Tensor G3
scenario: You are developing a safety-critical real-time object detection system for autonomous features
  on a mobile device powered by the Google Tensor G3 (7.5 TOPS on-device TPU, 12 GB LPDDR5X). A new adversarial
  attack vector has been discovered where malicious actors can induce misclassifications in the object
  detector by subtly modifying image frames captured by the device's camera before they reach the model.
  This could lead to a 'model extraction' style attack where attackers learn about the model's vulnerabilities
  by observing its behavior to crafted inputs, or even directly trigger safety failures. As a senior ML
  engineer, how would you design a robust, reliable system to detect and mitigate such input-level adversarial
  attacks without significantly impacting the real-time performance expected from the Tensor G3?
question: "How would you detect and mitigate input-level adversarial attacks on a real-time Tensor G3 object detector?"
details:
  realistic_solution: Implement a lightweight, on-device adversarial perturbation detector leveraging
    the Tensor G3's TPU. This could involve a small, specialized neural network or statistical anomaly
    detection on the input feature space or early model activations, trained to identify subtle, non-natural
    image manipulations. Integrate this detector as a pre-processing step or parallel pipeline. If an
    attack is detected, the system could switch to a more robust, albeit potentially slower, fallback
    model, trigger a warning, or request user intervention, ensuring reliability. Techniques like feature
    squeezing or simple input transformations (e.g., random resizing/padding) combined with output comparison
    can also be effective, balancing robustness with the 7.5 TOPS compute budget.
  common_mistake: Over-relying on retraining the model with adversarial examples as the sole defense,
    which is often reactive and may not generalize to novel attacks. Overlooking the performance and memory
    constraints of the Tensor G3, proposing computationally expensive solutions that are impractical for
    a real-time mobile system.
  napkin_math: Your primary object detection model on the Tensor G3 takes 40 ms per inference. If your
    adversarial detection strategy involves running two slightly perturbed versions of the input through
    a lightweight pre-analysis module (negligible compute) and then comparing outputs, effectively doubling
    the processing path for each frame, what is the theoretical maximum frame rate (FPS) you can achieve
    for protected inferences, assuming the goal is reliability and this doubling is the main overhead?
