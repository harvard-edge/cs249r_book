title: Hardware-Aware NAS for A17 Pro Neural Engine
scenario: 'You are deploying a real-time semantic segmentation model for AR on the Apple A17 Pro Neural
  Engine. You are evaluating two NAS search space proposals: Proposal A optimizes for minimal FLOPs using
  standard MBConv blocks, while Proposal B constrains the search using an on-device latency lookup table,
  favoring dense operations over depthwise convolutions to maximize utilization of the 16-core Neural
  Engine. Given the A17''s 35 TOPS peak performance and shared 8 GB unified memory, evaluate these alternatives
  and determine which will yield a lower-latency model within a ~5W power budget.'
details:
  realistic_solution: Proposal B is superior because it optimizes for actual hardware latency rather than
    proxy metrics like FLOPs. The A17 Pro Neural Engine achieves its 35 TOPS by heavily parallelizing
    dense matrix multiplications across its 16 cores. Because it shares 8 GB of unified memory with the
    CPU/GPU, memory-bound operations bottleneck performance. A hardware-aware NAS must use a latency predictor
    or lookup table profiled directly on the A17 to find architectures with high arithmetic intensity.
  common_mistake: Candidates often assume that minimizing FLOPs (Proposal A) directly translates to lower
    latency on specialized accelerators. They fail to recognize that operations like depthwise convolutions
    have low arithmetic intensity and become memory-bound on unified memory architectures, severely underutilizing
    the Neural Engine's compute capability.
  napkin_math: The A17 Pro Neural Engine peak compute is 35 TOPS. For a 60fps target, the per-frame time
    budget is ~16.6ms, allowing a theoretical maximum of 35e12 * 0.0166 = 581 GOPS per frame. If a depthwise
    convolution layer requires 5 MB of memory traffic and the available unified memory bandwidth is 50
    GB/s, the memory transfer takes 5MB / 50GB/s = 0.1ms. If this layer only performs 10 Mega-FLOPs, compute
    time is 10e6 / 35e12 = 0.00000028ms. The layer is entirely memory-bound, proving why a FLOP-minimizing
    NAS fails to optimize real latency on this hardware.
