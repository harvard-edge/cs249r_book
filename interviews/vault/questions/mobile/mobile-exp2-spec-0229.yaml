title: On-Device Coreset Selection for Image Personalization
scenario: You are tasked with specifying the data selection requirements for an on-device personalization
  system that fine-tunes a vision model using daily user photos. The target device is powered by the Samsung
  Exynos 2400 NPU, which features a dual-core NPU with 34.7 TOPS and shares 12 GB of LPDDR5X memory across
  the CPU, GPU, ISP, and NPU. Because the OS, background apps, and the base model already reserve 9.5
  GB of RAM, you only have 2.5 GB available for both the data selection pipeline and the training buffer.
  Design a data pruning and selection pipeline that maximizes the Information-Compute Ratio (ICR) without
  causing memory exhaustion or excessive battery drain.
details:
  realistic_solution: 'The correct approach specifies a two-stage pipeline: first, a lightweight proxy
    model (e.g., MobileNetV3) runs on a low-power NPU core to extract embeddings from new user images
    as they are captured. Second, a fast diversity-sampling algorithm (like k-Center greedy) runs on the
    CPU over these embeddings to select a representative coreset. This isolates the heavy compute and
    memory usage to the actual fine-tuning phase, keeping the selection overhead negligible.'
  common_mistake: Candidates often propose computationally heavy data selection methods, such as loss-based
    pruning or influence functions, which require full forward passes of the main model. They fail to
    analyze the system constraints, missing that these methods will exceed the 2.5 GB memory budget and
    consume too much of the NPU's thermal envelope before actual training begins.
  napkin_math: With 12 GB total shared memory and 9.5 GB reserved, we have 2.5 GB available. Scoring 1,000
    daily images via a full forward pass of a 1B parameter main model at FP16 requires ~2 GB just for
    model weights, leaving 500 MB for activations and OS spikes, which risks OOM. Instead, using a 5M
    parameter proxy model (FP16) requires only ~10 MB of memory. To process 1,000 images at 224x224 (approx
    150 MFLOPs per image), the total compute is 150 GFLOPs. On the 34.7 TOPS Exynos 2400 NPU, this proxy
    embedding step takes less than 0.01 seconds of compute time, easily fitting the thermal and memory
    constraints.
