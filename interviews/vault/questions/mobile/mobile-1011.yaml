title: 'Network Bandwidth Bottlenecks: Master Full Bandwidth Analysis for Mobile AI System'
scenario: A flagship mobile AI system features a Snapdragon 8 Gen 3 with 16GB LPDDR5X providing 77 GB/s bandwidth. It runs 4 simultaneous AI workloads: a 3B INT4 LLM assistant (on-demand), real-time speech recognition (continuous, 1B INT8, 100 tokens/s), camera scene understanding (YOLOv8-s, 11M INT8, 30fps), and AR depth estimation (MobileNetV3, 5M FP16, 60fps).
question: What bandwidth conflicts arise when these workloads run together, and what scheduler changes are needed?
details:
  realistic_solution: 'BW requirements: LLM (3B INT4=1.5GB): 76.9GB/s during decode (1 token per 19.5ms). Speech (1B INT8=1GB, 100 tokens/s): 100 tokens/s × 1GB / tokens_per_pass. Speech processes 100ms windows → 10 passes/s: 10×1GB=10GB/s. YOLO-s (11M INT8, 30fps): 11MB×30=330MB/s = 0.33GB/s. Depth (5M FP16=10MB, 60fps): 10MB×60=600MB/s = 0.6GB/s. System: 3GB/s. Non-LLM total: 10+0.33+0.6+3=13.93GB/s. LLM during decode: 76.9GB/s. Conflict: 13.93+76.9=90.83GB/s > 77GB/s. Fix: during LLM decode (19.5ms), suspend depth estimation (saves 0.6GB/s) and reduce speech to 5GB/s. Total: 5+0.33+0+3+76.9=85.2GB/s. Still over! Reduce speech to 0: 80.2GB/s. Still over. LLM must run alone: 76.9+3+0.33=80.2GB/s > 77. At ρ=0.94: accept 5% latency inflation. Practical: LPDDR5X at 77GB/s peak, typical ~65GB/s sustainable. LLM: 76.9×efficiency factor 0.84=64.6GB/s effective needed. TPOT: 1.5/65=23ms.'
  common_mistake: |
    **The Pitfall:** Failing to calculate aggregate bandwidth requirements.
    **The Rationale:** Candidates often list bandwidth requirements without checking if their sum exceeds the 77 GB/s system limit, or without designing a concrete scheduling policy.
    **The Consequence:** The system becomes oversubscribed, leading to severe latency spikes and failed TPOT requirements for the LLM.
  napkin_math: |
    1. LLM peak (3B INT4, 1.5GB): 1.5GB / 0.0195s (TPOT) = 76.9 GB/s.
    2. Speech (1B INT8, 1GB): 10 passes/s * 1GB = 10 GB/s.
    3. YOLO (11M INT8, 11MB): 11MB * 30fps = 0.33 GB/s.
    4. Depth (5M FP16, 10MB): 10MB * 60fps = 0.6 GB/s.
    5. System baseline: 3 GB/s.
    6. Total bandwidth: 76.9 + 10 + 0.33 + 0.6 + 3 = 90.8 GB/s.
    7. Conflict: 90.8 GB/s > 77 GB/s. **The scheduler must suspend background tasks during LLM decode and the LLM TPOT must be relaxed (e.g., to 39ms, yielding 38.4 GB/s) to fit within the 77 GB/s limit.**
