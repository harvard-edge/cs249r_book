title: 'KV-Cache: Optimize KV Cache for Aggressive Memory Compression on A17 Pro'
scenario: 'Your 3B LLM (INT8) on A17 Pro (35 TOPS, 8GB) needs to support 8192-token context. KV cache
  at 8192 tokens = 8192 × 32 × 2 × 8 × 128 × 1B = 537MB. Model INT8: 3GB. OS: 2GB. Total: 5.54GB — fits
  in 8GB but leaves only 2.46GB. Optimize to free 1.5GB more for longer contexts or caching multiple conversations.'
details:
  realistic_solution: 'Three-tier KV compression: (1) Active KV (recent 2048 tokens): INT8 in RAM. (2)
    Warm KV (2048-6144 tokens): INT4 in RAM. (3) Cold KV (6144+ tokens): compressed to NAND.'
  common_mistake: Not considering that KV cache pages for inactive conversations can be compressed and
    offloaded to NAND flash rather than held in RAM; not using INT4 KV to halve memory.
  napkin_math: '8192 token KV. Strategy: split 8192 tokens. Active (2048): 2048 × 32 × 2 × 8 × 128 × 1B
    = 134MB INT8. Warm (2048): 2048 × 32 × 2 × 8 × 128 × 0.5B = 67MB INT4. Cold (4096): 4096 × 32 × 2
    × 8 × 128 × 0.5B = 134MB INT4 (in RAM) or compressed to flash. All in RAM: 134 + 67 + 134 = 335MB.
    Savings vs full INT8: 537 - 335 = 202MB. Or: cold to flash: 134MB off-device. RAM: 134 + 67 = 201MB.
    Total: 3B INT8 model (3GB) + 201MB KV + 2GB OS = 5.2GB. Freed: 5.54 - 5.2 = 0.34GB + can now handle
    2 conversations in RAM: 5.2 + 0.335 = 5.54GB for second conversation''s KV. Or: extend to 16384-token
    context: 4×8192 KV = 4 × 201MB = 804MB total in RAM. Total: 3 + 0.804 + 2 = 5.8GB. Still fits. Flash
    access for cold KV: when attending to >6144 tokens, dequant from flash (latency: 134MB at A17 Pro
    flash 3 GB/s = 44.7ms per load). Amortize over multiple decode steps.'
