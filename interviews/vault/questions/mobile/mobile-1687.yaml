title: Real-time Neural Engine Safety Self-Test on Apple A17 Pro for ADAS (ASIL B)
scenario: You are designing a safety-critical ADAS perception module for a mobile platform, utilizing the Apple A17 Pro's 35 TOPS Neural Engine. The system needs to perform real-time object detection with an end-to-end latency not exceeding 50ms. To comply with ISO 26262 ASIL B, the Neural Engine requires periodic self-testing to ensure its functional integrity. These self-tests consume valuable processing cycles and must operate within the A17 Pro's typical ~5W power envelope and 8 GB unified memory constraints. Given an assumed primary object detection inference time of 35ms on the Neural Engine within the 50ms cycle, and a requirement to dedicate no more than 10% of the remaining available time in each cycle to safety self-test routines.
question: What is the maximum allowable duration for the critical self-test per 50ms cycle?
details:
  realistic_solution: A realistic solution involves implementing a lightweight, deterministic self-test routine (e.g., a golden-sample inference check, a memory integrity check on Neural Engine weights/activations, or a 'canary' workload that stresses specific NE units) that is integrated into the real-time scheduling. The maximum duration for this self-test per cycle would be calculated based on the available time budget, ASIL B FTTI (e.g., 100ms), and the specified overhead percentage. For instance, a small, deterministic test running every 50ms frame that completes within the calculated budget would contribute to ASIL B compliance for a 100ms FTTI.
  common_mistake: |
    **The Pitfall:** Designing overly comprehensive self-tests that violate real-time latency budgets.
    **The Rationale:** Candidates prioritize deep functional verification over strict real-time deadlines and power constraints.
    **The Consequence:** Missing the 50ms ADAS perception deadline, leading to a system failure that is worse than the fault the test was trying to detect.
  napkin_math: |
    *   **Total Latency Budget:** 50 ms
    *   **Inference Time:** 35 ms
    *   **Available Time Remaining:** 50 ms - 35 ms = 15 ms
    *   **Max Self-Test Duration:** 15 ms * 10% = **1.5 ms**
