title: Real-time Neural Engine Safety Self-Test on Apple A17 Pro for ADAS (ASIL B)
scenario: You are designing a safety-critical ADAS perception module for a mobile
  platform, utilizing the Apple A17 Pro's 35 TOPS Neural Engine. The system needs
  to perform real-time object detection with an end-to-end latency not exceeding 50ms.
  To comply with ISO 26262 ASIL B, the Neural Engine requires periodic self-testing
  to ensure its functional integrity. These self-tests consume valuable processing
  cycles and must operate within the A17 Pro's typical ~5W power envelope and 8 GB
  unified memory constraints. Given an assumed primary object detection inference
  time of 35ms on the Neural Engine within the 50ms cycle, and a requirement to dedicate
  no more than 10% of the remaining available time in each cycle to safety self-test
  routines, calculate the maximum allowable duration for such a critical self-test.
question: What is the maximum A17 Pro Neural Engine self-test duration when a 35ms
  inference must fit in a 50ms ASIL B cycle?
details:
  realistic_solution: A realistic solution involves implementing a lightweight, deterministic
    self-test routine (e.g., a golden-sample inference check, a memory integrity check
    on Neural Engine weights/activations, or a 'canary' workload that stresses specific
    NE units) that is integrated into the real-time scheduling. The maximum duration
    for this self-test per cycle would be calculated based on the available time budget,
    ASIL B FTTI (e.g., 100ms), and the specified overhead percentage. For instance,
    a small, deterministic test running every 50ms frame that completes within the
    calculated budget would contribute to ASIL B compliance for a 100ms FTTI.
  common_mistake: A common mistake is to either perform overly comprehensive (and
    thus slow) self-tests that violate real-time latency budgets, or to neglect the
    deterministic execution requirements for safety-critical components. Overlooking
    the power budget and memory footprint impact of self-tests on a mobile platform
    like the Apple A17 Pro can also lead to system instability or thermal issues.
    Another mistake is to not properly derive the self-test frequency from ASIL requirements
    like the Fault Tolerant Time Interval (FTTI), leading to insufficient diagnostic
    coverage.
  napkin_math: "Given:\n- Total ADAS module latency budget (L_total) = 50ms\n- Primary\
    \ object detection inference time (L_inference) = 35ms\n- Dedicated overhead for\
    \ self-tests (P_overhead) = 10% of remaining time\n\n1.  Calculate remaining available\
    \ time per cycle:\n    L_available = L_total - L_inference = 50ms - 35ms = 15ms\n\
    \n2.  Calculate maximum allowable self-test duration per cycle:\n    T_ST_max\
    \ = L_available * P_overhead = 15ms * 0.10 = 1.5ms\n\nTherefore, the critical\
    \ self-test routine must complete within 1.5ms in each 50ms cycle to meet the\
    \ specified constraints and contribute to ASIL B diagnostic coverage, assuming\
    \ the ASIL B FTTI is 100ms (covered by two 50ms cycles)."
