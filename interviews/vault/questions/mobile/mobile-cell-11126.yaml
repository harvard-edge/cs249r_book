title: 'Kernel Fusion: Mastery — Optimize 3B LLM Decode Throughput on A17 Pro'
scenario: 'You are optimizing a 3B LLM (INT4 quantized, 1.5GB) decode on A17 Pro (35 TOPS Neural Engine,
  8GB, 68 GB/s). Current: 18 tokens/sec. Target: 30 tokens/sec. Design a complete optimization strategy
  using kernel fusion, memory layout, quantization, and caching. Quantify each optimization''s contribution.'
details:
  realistic_solution: 'Profile: weight loading time = 1.5GB / 68 GB/s = 22ms/token → 45 tokens/sec theoretical.
    At 18 tok/s → 55.6ms/token → only 22ms/55.6ms = 39.6% efficiency. Overhead: 33.6ms in overhead. Sources:
    kernel launch, memory allocation, format conversion.'
  common_mistake: Applying all optimizations blindly without measuring current bottleneck; the bottleneck
    at batch=1 decode is almost certainly memory bandwidth, not compute.
  napkin_math: 'Target: 30 tokens/sec → 33.3ms/token. Current: 18 tok/s → 55.6ms/token. Memory floor:
    1.5GB weight load / 68 GB/s = 22ms. So 33.3ms target is achievable (33.3ms > 22ms floor). Gap to close:
    55.6 - 33.3 = 22.3ms overhead reduction needed. Optimization 1: Model compilation with ANE ahead-of-time
    (eliminates JIT overhead per token): saves ~8ms (Metal compile overhead). New: 47.6ms → 21 tok/s.
    Optimization 2: Fuse RMSNorm into attention/MLP GEMMs: RMSNorm tensors = 32 layers × 3072 × 1B = 98KB.
    Fusing eliminates 32 × 196KB read+write = 6.3MB. At 68 GB/s: 0.09ms — small. But eliminates 32 kernel
    launches: 32 × 10µs = 0.32ms. New: 47.3ms → 21.1 tok/s. Optimization 3: KV cache in INT8 (was FP16):
    KV cache at seq=512, 32 layers, 16 heads, 128 dim: FP16 = 32×16×512×128×2×2B = 134MB. INT8 = 67MB.
    Per-token KV append: 32×16×128×2 bytes: FP16 4KB → INT8 2KB. KV read per token (attending to 512):
    134MB → 67MB. At 68 GB/s: 1.97ms → 0.99ms. Saves 0.98ms. New: 46.32ms. Optimization 4: Batch 2 requests
    (speculative users): 2× throughput for 2× memory bandwidth → 2/46.32ms × 1000 = 43.2 tok/sec per user...
    wait batch=2: weight loading stays 22ms (shared), activations 2× = +0.3ms. New: 22.3ms for batch=2
    → 43.2 tokens/sec × 2 / 2 = 43.2 tok/sec total = 21.6 each. With all optimizations: ~25 tok/sec. Still
    shy of 30. Add INT4→INT3 (ternary quantization): reduces weights to 1.125GB → 16.5ms load. New: 16.5ms
    load + 10ms overhead = 26.5ms → 37.7 tok/sec. Meets 30 tok/sec target.'
