title: NPU Thermal Energy Bounds
scenario: An AR app on the Apple A17 Pro (35 TOPS NPU) runs 60fps object detection. Inference is 5ms at 2W active, and idle NPU power is 100mW.
question: Evaluate the thermal impact over a 1-hour session by computing total NPU energy consumed.
visual:
  kind: svg
  path: mobile-1953.svg
  alt: Square wave showing 5ms active peaks and 11.6ms idle valleys
  caption: NPU Power Duty Cycle over 1 Frame
details:
  realistic_solution: 'Frame time = 16.6ms. Duty cycle = 5 / 16.6 = 30%. Average power = 2W * 0.3 + 0.1W * 0.7 = 0.6W + 0.07W = 0.67W. Over 1 hour: 0.67 Wh.'
  common_mistake: |
    **The Pitfall:** Using the peak active power as continuous without factoring in the duty cycle.
    **The Rationale:** Engineers often look at the 2W spec sheet number and assume it applies constantly during execution.
    **The Consequence:** Vastly overestimating thermal generation and rejecting perfectly viable real-time architectures.
  napkin_math: |
    1. Frame time at 60fps = 16.6ms.
    2. Duty cycle = 5ms active / 16.6ms = 30%.
    3. Average power = (2W * 0.30) + (0.1W * 0.70) = 0.6W + 0.07W = 0.67W.
    4. **Total Energy Over 1 Hour: 0.67W * 1h = 0.67 Wh.**
