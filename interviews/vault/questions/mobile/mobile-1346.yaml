title: Calculate NPU Compute and Memory Energy Per Inference
scenario: You are optimizing a computer vision model for real-time processing on the
  Apple A17 Pro Neural Engine. The 16-core NPU delivers 35 TOPS at a peak power of
  ~5W, sharing 8 GB of unified memory with the CPU/GPU. Your model requires 35 GOPS
  (Giga-Operations) per frame and contains 20 million INT8 weights. Assuming the NPU
  operates at its theoretical peak efficiency and reading from unified memory costs
  100 pJ per byte, calculate the total energy consumed per inference for both compute
  and weight fetching.
question: How much per-inference energy does the A17 Pro model spend on NPU compute
  and unified-memory weight fetches?
details:
  realistic_solution: The candidate should derive the compute energy per operation
    from the given power and performance specs, then multiply it by the model's operations.
    Next, they must calculate the memory access energy for the INT8 weights. A strong
    answer will sum these two values and explicitly note how memory access costs constitute
    a significant fraction of total energy, applying Horowitz's principles.
  common_mistake: Candidates often only calculate the compute energy and completely
    ignore the energy cost of fetching weights from the unified memory. Another frequent
    error is fumbling the unit conversions between Watts, Joules, picojoules, and
    Tera-Operations.
  napkin_math: '1. Compute energy per operation: 5W / 35 TOPS = 5 J/s / 35e12 ops/s = 0.143 pJ / op.

    2. Total compute energy: 35 GOPS * 0.143 pJ/op = 35e9 * 1.43e-13 J ≈ 5 mJ.

    3. Memory read energy: 20 million INT8 weights = 20 MB. 20e6 bytes * 100 pJ/byte = 2,000e6 pJ = 2 mJ.

    4. Total energy per inference: 5 mJ (compute) + 2 mJ (memory) = 7 mJ.'
