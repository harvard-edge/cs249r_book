title: Calculate NPU Compute and Memory Energy Per Inference
scenario: You are optimizing a computer vision model for real-time processing on the Apple A17 Pro Neural Engine (16-core NPU, 35 TOPS at ~5W). Your model requires 35 GOPS per frame and contains 20 million INT8 weights. Assume reading from unified memory costs 100 pJ per byte.
question: How much per-inference energy does the A17 Pro model spend on NPU compute and unified-memory weight fetches?
details:
  realistic_solution: The candidate should derive the compute energy per operation from the given power and performance specs, then multiply it by the model's operations. Next, they must calculate the memory access energy for the INT8 weights. A strong answer will sum these two values and explicitly note how memory access costs constitute a significant fraction of total energy, applying Horowitz's principles.
  common_mistake: |
    **The Pitfall:** Calculating compute energy while entirely ignoring memory access costs.
    **The Rationale:** Candidates fixate on the TOPS and GOPS metrics and forget that feeding the weights to the NPU is an expensive physical process.
    **The Consequence:** The energy model is drastically wrong, underestimating the total power required per inference.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - A17 Pro: 35 TOPS at ~5W
       - Compute requirement: 35 GOPS
       - Weights: 20M INT8 (20 MB)
       - Memory read energy: 100 pJ/byte
    2. **Calculations:**
       - Compute energy per op = 5W / 35 TOPS = 5 J/s / 35e12 ops/s = ~0.143 pJ/op
       - Compute energy per inference = 35 GOPS * 0.143 pJ/op = 35e9 * 0.143e-12 = 5 mJ
       - Memory energy = 20 MB * 100 pJ/byte = 20e6 * 100e-12 = 2 mJ
       - Total energy = 5 mJ + 2 mJ = 7 mJ
    3. **Conclusion & Interpretation:**
       - **Result: Compute/Memory Split. Total energy is 7 mJ per inference, showing memory fetches constitute ~28% of the total energy budget even for a relatively compute-heavy vision model.**
