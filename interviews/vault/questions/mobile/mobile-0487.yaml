title: The Mobile UI Jank Diagnosis
scenario: You are the lead ML engineer for a new flagship smartphone's driver safety feature. A neural
  architecture search (NAS) has produced a 20M parameter Vision Transformer (ViT) model for driver drowsiness
  detection that meets the required accuracy. However, during integration, the QA team reports significant
  UI 'jank' (stuttering) whenever the model runs. The phone uses an Apple A17 Pro SoC, and the UI requires
  a strict 16ms frame budget to feel smooth. Profiling shows your model's inference is taking 25ms. Your
  team is debating the cause. Given the data, diagnose the most likely performance bottleneck.
details:
  realistic_solution: The root cause is the immense memory traffic generated by the Vision Transformer
    architecture, making it ill-suited for a tight, real-time latency budget on mobile. The self-attention
    mechanism requires moving quadratically large activation tensors between SRAM and DRAM. Despite the
    A17's powerful NPU (35 TOPS), the compute units are starved for data. The model is memory-bound. The
    correct solution is to perform another NAS run, constraining the search space to mobile-first architectures
    like depthwise separable CNNs (e.g., MobileNet, EfficientNet-Lite), which have much higher arithmetic
    intensity and drastically lower memory footprint for activations.
  common_mistake: 'Engineers often fixate on parameter count as the sole proxy for model cost. They might
    see ''20M parameters'' and assume the model is small, leading them to misdiagnose the issue as a memory
    bandwidth problem (due to parameter loading) or an operator compatibility issue (NPU fallback), rather
    than the true cause: computational density.'
  napkin_math: 1. **Calculate Model Footprint:** A 20M parameter ViT requires ~4.6 GFLOPs. On a 35 TOPS
    NPU, compute time = 4.6 GFLOPs / 35 TOPS = 0.13ms. 2. **Analyze Latency Gap:** The observed 25ms latency
    implies the NPU is idle >99% of the time, waiting for data. ViTs have large intermediate activation
    tensors for self-attention, resulting in massive memory traffic (quadratic with sequence length/patches).
    This saturates the 51.2 GB/s memory bandwidth. The model is deeply memory-bound.
  options:
  - The model's 20M parameters (40MB in FP16) are saturating the A17's 51.2 GB/s memory bandwidth. Quantizing
    weights to INT8 would halve the memory pressure and fix the jank.
  - The A17's Neural Engine likely has poor support for the specific self-attention operations, causing
    the model to fall back to the much slower CPU.
  - The Vision Transformer's self-attention produces large activation tensors that saturate memory bandwidth.
    The model is memory-bound (~4.6 GFLOPs but 25ms latency), and should be replaced with a CNN architecture
    that has better data locality.
  - The model is too dense. Applying Mixture-of-Experts (MoE) routing would reduce the active parameter
    count per frame and thus the latency.
  correct_index: 2
