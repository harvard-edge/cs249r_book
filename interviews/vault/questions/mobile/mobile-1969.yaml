title: PagedAttention Eliminating Waste
scenario: An iOS app allocates a fixed 1GB Unified Memory buffer for the KV cache
  of a local LLM.
question: Explain how PagedAttention prevents this 1GB buffer from suffering severe
  internal memory fragmentation.
visual:
  kind: svg
  path: mobile-1969.svg
  alt: Comparison showing contiguous allocation with empty wasted space vs dense packed
    PagedAttention blocks.
  caption: 'Memory layout: Contiguous vs Paged allocation.'
details:
  realistic_solution: Standard implementations pre-allocate contiguous memory blocks
    sized for the maximum possible sequence length, wasting huge amounts of memory
    if prompts are short. PagedAttention splits the 1GB buffer into small, fixed-size
    pages and maps them non-contiguously on demand, minimizing wasted allocation to
    just a fraction of the final page.
  common_mistake: Stating PagedAttention compresses the tokens rather than changing
    the memory mapping architecture.
  napkin_math: Waste goes from (MaxSeqLen - ActualSeqLen) to at most (PageSize - 1)
