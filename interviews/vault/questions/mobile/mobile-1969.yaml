title: PagedAttention Eliminating Waste
scenario: An iOS app allocates a fixed 1GB Unified Memory buffer for the KV cache of a local LLM.
question: Explain how PagedAttention prevents this 1GB buffer from suffering severe internal memory fragmentation.
visual:
  kind: svg
  path: mobile-1969.svg
  alt: Comparison showing contiguous allocation with empty wasted space vs dense packed PagedAttention blocks.
  caption: 'Memory layout: Contiguous vs Paged allocation.'
details:
  realistic_solution: 'Standard implementations pre-allocate contiguous memory blocks sized for the maximum possible sequence length, wasting huge amounts of memory if prompts are short. PagedAttention splits the 1GB buffer into small, fixed-size pages and maps them non-contiguously on demand, minimizing wasted allocation to just a fraction of the final page.'
  common_mistake: |
    **The Pitfall:** Stating PagedAttention compresses the tokens mathematically.
    **The Rationale:** Misunderstanding the difference between logical memory mapping and data compression techniques.
    **The Consequence:** Designing systems that still suffer from memory fragmentation because they rely on fixed buffer allocations rather than dynamic page mappings.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Max Sequence Length: 4096 tokens.
       - KV-Cache Size: 98 KB per token.
       - PagedAttention Page Size: 16 tokens (1.5 MB/page).
    2. **Calculations:**
       - Standard contiguous allocation = 4096 * 98 KB = ~400 MB per sequence.
       - Actual usage for short 128-token prompt = 128 * 98 KB = ~12.5 MB.
       - Memory waste (Contiguous) = 400 MB - 12.5 MB = 387.5 MB.
       - Memory waste (PagedAttention) = Maximum 1 partially unfilled 1.5 MB page.
    3. **Conclusion & Interpretation:**
       **Result: Memory-Fragmentation Bound. Waste drops from ~388MB per sequence to nearly zero, virtually eliminating internal memory fragmentation by dynamically allocating blocks.**
