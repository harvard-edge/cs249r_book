title: Video Segmentation Memory Sizing on Exynos 2400
scenario: We are deploying a real-time video segmentation model on the Samsung Exynos 2400 NPU to support a background blur feature during high-resolution video calls. While the NPU delivers a capable 34.7 TOPS, it shares 12 GB of LPDDR5X memory with the CPU, GPU, and ISP, resulting in severe memory pressure and bandwidth contention. During peak camera and modem usage, the OS aggressively evicts processes, so our inference footprint must strictly stay within a 500 MB budget to avoid Out-Of-Memory (OOM) crashes.
question: How would you design the memory management strategy, address fragmentation, and size the buffers to ensure stable execution within a 500 MB budget?
details:
  realistic_solution: A robust solution involves pre-allocating a static memory arena for all intermediate tensors offline, completely eliminating fragmentation and dynamic allocation overhead at runtime. To safely operate within the shared memory environment, we must use int8 quantization to reduce the footprint and implement in-place operations wherever possible. Furthermore, to leverage the dual-core NPU without exceeding the 500 MB budget, we should carefully size a ping-pong buffer system that bounds the maximum memory watermark during pipeline parallelism.
  common_mistake: |
    **The Pitfall:** Relying on dynamic allocation for intermediate tensors.
    **The Rationale:** Developers assume the full 12 GB unified memory is available and treat mobile memory management like cloud server management.
    **The Consequence:** Dynamic allocation leads to memory fragmentation and unpredictable peak watermarks, triggering OS-level OOM eviction during background tasks.
  napkin_math: |
    1. Inputs/Weights: 1080p INT8 input = 6.2 MB; 40M param weights = 40 MB.
    2. Largest intermediate tensor (960x540x128): 960 * 540 * 128 bytes = 66.3 MB.
    3. Pipeline parallelism (ping-pong buffering): 66.3 MB * 2 = 132.6 MB.
    4. Total static arena: 132.6 MB (activations) + 40 MB (weights) + ~10 MB (I/O) = 182.6 MB.
    5. **Conclusion: 183 MB peak footprint easily fits the strict 500 MB budget.**
