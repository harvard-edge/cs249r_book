title: Unstructured vs Structured Pruning on Exynos 2400 NPU
scenario: You are optimizing an image segmentation model to run on a mobile NPU. A colleague suggests unstructured pruning to achieve 50% sparsity to speed up inference.
question: Why does unstructured pruning usually fail to speed up inference on mobile NPUs, and when does structured pruning help?
details:
  realistic_solution: |
    Mobile NPUs rely on highly optimized, dense matrix multiplication engines (systolic arrays) and lack the specialized sparse compute units needed to skip arbitrary zero weights. The NPU inevitably computes the zeros. Real speedups require structured pruning (e.g., removing entire channels or blocks) which physically reduces the dense matrix dimensions.
  common_mistake: |
    **The Pitfall:** Assuming unstructured sparsity directly translates to latency reduction.
    **The Rationale:** Candidates incorrectly assume that zero-valued weights are automatically skipped by all hardware architectures, applying CPU-centric logic to NPU arrays.
    **The Consequence:** Engineering time is wasted on complex unstructured pruning techniques that yield 0% speedup on edge devices.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Unpruned layer time: 10ms on mobile NPU.
       - Unstructured pruning target: 50% sparsity.
    2. **Calculations:**
       - Unstructured pruning: NPU executes dense operations. Time remains ~10ms.
       - Structured pruning (halving input channels): MAC operations physically drop by 50%.
       - New structured latency: 10ms * 50% = 5ms.
    3. **Conclusion & Interpretation:**
       - **Only structured pruning physically reduces compute dimensions to 5ms. Bottleneck: Hardware Utilization.**
