title: Unstructured vs Structured Pruning on Exynos 2400 NPU
scenario: You are optimizing an image segmentation model to run on the Samsung Exynos 2400 NPU (34.7 TOPS). A colleague suggests unstructured pruning to achieve 50% sparsity to speed up inference.
question: Why does unstructured pruning usually fail to speed up inference on mobile NPUs like the Exynos 2400, and when does structured pruning help?
details:
  realistic_solution: |
    Mobile NPUs rely on dense matrix multiplications and lack the specialized sparse compute units needed to skip arbitrary zero weights. The NPU still computes the zeros. Real speedups require structured pruning (e.g., removing entire channels) which physically reduces the matrix dimensions.
  common_mistake: |
    **The Pitfall:** Assuming unstructured sparsity directly translates to latency reduction.
    **The Rationale:** Candidates incorrectly assume that zero-valued weights are automatically skipped by all hardware architectures.
    **The Consequence:** Engineering time is wasted on pruning techniques that yield no measurable speedup on edge devices.
  napkin_math: |
    - Unpruned layer time: 10ms on Exynos 2400 NPU.
    - Unstructured pruning (50%): The NPU executes dense operations, so time remains ~10ms.
    - Structured pruning (halving input channels): MAC operations drop by 50%.
    - **New latency with structured pruning: ~5ms.**
