title: On-Device ML Model Canary Rollout on Google Tensor G3
scenario: Your team has developed a new on-device ML model for real-time image segmentation in a popular
  mobile application. This model is intended to run on Google Pixel devices equipped with the Google Tensor
  G3 chip, which offers 7.5 TOPS (Tera Operations Per Second) on its integrated TPU and 12 GB of LPDDR5X
  RAM. You need to perform a canary deployment to 5% of your L6+ mobile user base before a full rollout.
  Design a detailed plan that addresses how you would implement this canary rollout, specifically considering
  the Tensor G3's capabilities and limitations. How would you monitor its performance, ensure stability,
  and what metrics would you use to decide on a full rollout or rollback?
question: "How would you monitor its performance, ensure stability, and what metrics would you use to decide on a full rollout or rollback?"
details:
  realistic_solution: Implement a phased rollout using server-side flags controlled by a feature management
    system. For the canary group, actively collect device-specific telemetry, including model inference
    latency on the Tensor G3's TPU, actual power draw during model execution, memory consumption (ensuring
    it stays within reasonable bounds of the 12 GB LPDDR5X RAM), and app crash rates. Establish clear
    success criteria and rollback triggers based on these metrics. For example, if the average latency
    increases by >10% or battery drain from the app increases by >5% for canary users, trigger an automatic
    rollback. Utilize A/B testing frameworks to compare the canary group against a control group to isolate
    the new model's impact. Prioritize backward compatibility and a fast, reliable rollback mechanism.
  common_mistake: A common mistake is failing to account for the unique constraints of on-device ML, such
    as battery consumption, thermal throttling, and memory footprint on specific hardware like the Tensor
    G3. Without dedicated monitoring for these device-level metrics, a canary release might appear successful
    from a server-side perspective but could degrade user experience significantly, leading to app uninstalls
    or negative reviews, and missing crucial signals for rollback.
  napkin_math: Given the Tensor G3's 7.5 TOPS TPU, an inference operation requiring 7.5 Billion operations
    would ideally complete in 1 second. For a real-time image segmentation model processing 30 FPS, each
    frame has ~33ms. If the model requires 1 TOP of computation per inference, it could theoretically
    perform 7.5 inferences per ~1ms, or 7500 inferences per second. However, this doesn't account for
    data transfer, CPU overhead, or memory access latencies. The 12 GB LPDDR5X RAM needs to comfortably
    hold the model weights (e.g., a 100MB model takes ~0.8% of available RAM) and intermediate activations.
    Consider a typical inference might consume ~500MB transient memory for activations. The total memory
    footprint must remain well within the 12 GB, leaving ample room for the OS and other applications.
    Power consumption for sustained TPU usage is also critical; a model running at peak TPU utilization
    for 10 minutes could consume 'X' mAh (e.g., 500-1000 mAh depending on efficiency), significantly impacting
    battery life. This needs to be measured and validated against a power budget for the feature.
