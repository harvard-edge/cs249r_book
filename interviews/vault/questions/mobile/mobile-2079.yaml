title: LLM KV Cache Impact on Unified Memory System Cache
scenario: A generative AI model on the Apple A17 Pro keeps its 1 GB KV cache in unified
  LPDDR5 memory, requiring frequent reads by the NPU during token generation.
question: Analyze how the unified memory architecture impacts the system level cache
  (SLC) hit rate and overall memory power during a long sequence generation.
details:
  realistic_solution: During autoregressive token generation, the entire 1 GB KV cache
    is swept per token, which vastly exceeds the system level cache size (typically
    16-32 MB). This sweeping access pattern causes 100% cache misses for KV reads,
    forcing constant LPDDR5 accesses, driving up memory power and displacing other
    processes' data from the SLC.
  common_mistake: Assuming the unified memory implies the KV cache can be maintained
    efficiently in fast on-chip SRAM.
  napkin_math: 1 GB KV cache >> 32 MB System Level Cache.
