title: LLM KV Cache Impact on Unified Memory System Cache
scenario: A generative AI model keeps its 1 GB KV cache in unified LPDDR5 memory, requiring frequent reads by the NPU during token generation.
question: Analyze how the unified memory architecture impacts the system level cache (SLC) hit rate and overall memory power during a long sequence generation.
details:
  realistic_solution: During autoregressive token generation, the entire 1 GB KV cache is swept per token. This sweeping access pattern causes 100% cache misses for KV reads, forcing constant LPDDR5 accesses.
  common_mistake: |
    **The Pitfall:** Assuming unified memory guarantees fast on-chip SRAM access for all data.
    **The Rationale:** Candidates think "unified" means the entire KV cache fits in or is managed efficiently by the fast system level cache.
    **The Consequence:** They underestimate memory power consumption and system-wide cache eviction effects during long sequence generation.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - KV Cache size: 1 GB.
       - System Level Cache (SLC) size: ~16-32 MB.
    2. **Calculations:**
       - Size Ratio: 1 GB / 32 MB = ~31x larger than SLC.
    3. **Conclusion & Interpretation:**
       - **Result: 100% Cache Miss Rate**. The KV cache dwarfs the SLC, resulting in continuous LPDDR5 fetches and immense memory power drain.
