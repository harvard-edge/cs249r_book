title: CI/CD to On-Device Performance Gap
scenario: Your MLOps pipeline runs automated benchmarks before deploying an on-device LLM (Gemini Nano
  variant) to the Google Tensor G3. The Tensor G3 features an on-device TPU delivering 7.5 TOPS and 12
  GB LPDDR5X memory with a bandwidth of 60 GB/s. The pipeline benchmarks a 3 Billion parameter model (INT8
  quantized, 3 GB footprint). In the CI/CD cloud environment using batched requests, the model is compute-bound
  and highly utilized. However, on the Tensor G3 serving a single mobile user (batch size 1), production
  monitoring shows TPU compute utilization is only 1.6%, generating exactly 20 tokens per second. Explain
  why the production behavior differs so drastically from the CI/CD benchmark.
question: "Why is a 3B INT8 model compute-bound in batched CI but only 1.6% utilized at batch size 1 on Tensor G3?"
details:
  realistic_solution: The discrepancy occurs because on-device LLM generation at batch size 1 is strictly
    memory-bandwidth bound. In the CI/CD pipeline, large batch sizes amortize the cost of loading the
    weights across multiple requests. On the Tensor G3, for every single token generated, the entire 3
    GB model must be shuttled from the 12 GB LPDDR5X memory to the TPU, making the 7.5 TOPS compute capacity
    sit idle while waiting for memory transfers.
  common_mistake: Candidates often assume the device is thermal throttling, the TPU lacks operator support,
    or that the OS is killing the background process, missing the fundamental shift from compute-bound
    batched processing in CI to memory-bound autoregressive decoding on-device.
  napkin_math: 'Model size: 3 Billion params * 1 byte (INT8) = 3 GB. Max throughput bound by memory: 60
    GB/s / 3 GB per token = 20 tokens/sec. Compute required per token: 3B params * 2 ops = 6 Giga-Ops.
    Compute time per token: 6 GOps / 7500 GOps/s (7.5 TOPS) = 0.8 ms. Memory time per token: 1 sec / 20
    tokens = 50 ms. Compute utilization: 0.8 ms / 50 ms = 1.6%.'
