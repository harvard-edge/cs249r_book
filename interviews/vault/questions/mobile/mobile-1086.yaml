title: Dataset Padding Impact on NPU Utilization
scenario: You are deploying a vision model on an NPU. Your dataset curation strategy relies on annotating high-resolution 4K (3840x2160) images padded to square dimensions (3840x3840) to preserve aspect ratio. During inference, NPU utilization drops massively, and the system becomes severely memory-bound.
question: Why does feeding a 3840x3840 padded image degrade the NPU's effective TOPS and shift it to a memory-bound state?
details:
  realistic_solution: The NPU is underutilized because the shared memory bandwidth is consumed by loading useless padding pixels.
  common_mistake: |
    **The Pitfall:** Blaming NPU compute limits or quantization logic.
    **The Rationale:** Candidates focus on model architecture, ignoring how physical data formatting dictates memory access patterns.
    **The Consequence:** Teams waste time re-quantizing models while the hardware remains starved by blindly fetching gigabytes of empty padding.
  napkin_math: |
    **Assumptions & Constraints:**
    - Native image resolution: 3840x2160 (RGB, 3 bytes/pixel).
    - Padded image resolution: 3840x3840 (RGB, 3 bytes/pixel).
    - Framerate: 30 FPS.

    **Calculations:**
    - Native image size: 3840 * 2160 * 3 bytes = 24.88 MB.
    - Padded image size: 3840 * 3840 * 3 bytes = 44.23 MB.
    - Padding overhead: 44.23 MB - 24.88 MB = 19.35 MB per frame.
    - Bandwidth waste: 19.35 MB * 30 FPS = 580.5 MB/s.

    **Conclusion & Interpretation:**
    - **Result: Memory-Bound Starvation**. The NPU starves its compute units fetching 580 MB/s of useless zero-padding across the shared memory bus.
