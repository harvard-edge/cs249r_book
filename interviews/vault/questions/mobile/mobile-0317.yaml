title: 'The App Memory Budget: Memory Hierarchy Design'
scenario: You're an ML engineer scoping a new feature for a standard smartphone app. The target user device has 8 GB of RAM.
question: What maximum ML feature memory budget is reasonable on a smartphone with 8 GB of RAM?
details:
  realistic_solution: To prevent deterministic OS-level memory eviction (Jetsam or Out-of-Memory killer), industry standard heuristics mandate aggressively capping an app's total footprint at 25% of total device RAM. This provides a safe execution margin, accounting for unevictable OS kernels, background daemons, and UI memory overhead. On an 8 GB device, this strictly limits the safe budget to ~2 GB.
  common_mistake: |
    **The Pitfall:** Assuming the vast majority of physical RAM is actually allocatable to a single user-space application.
    **The Rationale:** Engineers operating with workstation or cloud VM mental models assume the OS overhead is negligible relative to the total pool.
    **The Consequence:** Pushing massive models that immediately trigger severe memory warnings and subsequent process termination by the mobile operating system.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Total Device RAM: 8 GB.
       - OS/System reserve: ~50% of RAM.
       - Background app reserve: ~25% of RAM.
       - Safe app allocation heuristic: ~25% of total RAM.
    2. **Calculations:**
       - App Memory Budget: 8 GB * 0.25 = 2.0 GB.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound.** Exceeding the 2.0 GB budget immediately risks the OS terminating the app to preserve overall system stability.
  options:
  - 8.0 GB (100% Allocation)
  - 4.0 GB (50% Allocation)
  - 2.0 GB (25% Allocation)
  - 0.5 GB (6% Allocation)
