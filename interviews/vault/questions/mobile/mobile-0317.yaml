title: 'The App Memory Budget: Memory Hierarchy Design'
scenario: You're an ML engineer scoping a new feature for a standard smartphone app. The target user device
  has 8 GB of RAM. To ensure your feature doesn't cause the app to be terminated by the operating system
  for using too much memory, what is a reasonable *maximum* memory budget to allocate for your ML model,
  its runtime, and all associated data structures?
question: "What maximum ML feature memory budget is reasonable on a smartphone with 8 GB of RAM?"
details:
  realistic_solution: The standard industry rule of thumb is to budget no more than 25% of the total device
    RAM for your ML feature. This provides a safe margin, accounting for the needs of the OS and other
    processes. For a device with 8 GB of RAM, this translates to a 2 GB maximum budget.
  common_mistake: A common mistake is to assume a large fraction of the phone's RAM is available. Engineers
    forget that the Operating System (Android or iOS), background services, and the main application's
    UI all consume significant memory. Being too greedy with memory is the primary reason the OS will
    terminate your app process, leading to a poor user experience.
  napkin_math: $\text{App Memory Budget} = \text{Total Device RAM} \times 0.25$
  options:
  - 8 GB
  - 500 MB
  - 2 GB
  - 4 GB
  correct_index: 2
