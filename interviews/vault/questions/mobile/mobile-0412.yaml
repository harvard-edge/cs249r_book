title: The Deceiving FLOPs Reduction
scenario: You are optimizing a real-time object detection model for an Android phone with a Snapdragon
  8 Gen 3 SoC. The current standard CNN model is missing the 16ms per-frame deadline, running at 40ms.
  A teammate suggests replacing all standard convolutions with depthwise separable convolutions. After
  the change, the model's theoretical FLOPs count drops by nearly 9x. However, a benchmark on the device
  shows the latency only improved from 40ms to 35ms, still badly missing the 16ms budget. Demonstrate
  why the massive FLOPs reduction did not translate to a proportional latency improvement.
details:
  realistic_solution: The massive FLOPs reduction did not translate to a latency improvement because the
    operation became severely memory-bandwidth bound. Depthwise separable convolutions have a much lower
    Arithmetic Intensity (AI) than standard convolutions. While they require fewer calculations, they
    require more memory access events per calculation. Mobile NPUs, like the Hexagon on the Snapdragon,
    have powerful compute units that end up sitting idle, waiting for data to be shuffled from the slow
    LPDDR5X DRAM. The two separate steps (depthwise and pointwise) break data locality and can't be perfectly
    fused, further increasing memory traffic compared to a single, dense convolution that reads its inputs
    once.
  common_mistake: Engineers often assume FLOPs are a direct proxy for latency. They see a big reduction
    in FLOPs and expect a similar speedup, ignoring that on-device performance is a complex interplay
    between compute, memory bandwidth, and cache performance. They blame software (e.g., framework overhead)
    instead of the hardware physics.
  napkin_math: 'Let''s use the Roofline Model. The key is Arithmetic Intensity (AI) = Compute / Memory.
    On a Snapdragon 8 Gen 3, Memory BW is ~77 GB/s. A standard 3x3 convolution might have an AI of ~700
    Ops/Byte, which is compute-bound. In contrast, a depthwise separable convolution has an AI of ~70
    Ops/Byte. This massive drop in AI shifts the operation from being compute-bound to being heavily memory-bound.
    Even though the FLOPs are 9x lower, the NPU spends most of its time stalled, waiting for the 77 GB/s
    DRAM to feed it. The theoretical 45 TOPS of the Snapdragon 8 Gen 3 Hexagon NPU is irrelevant if you
    can''t feed the beast. The latency becomes a function of memory bandwidth, not compute power: `Latency
    ≈ Total_Bytes_Moved / BW_DRAM`.'
  options:
  - The FLOPs calculation for depthwise separable convolutions is misleading; they actually require more
    total operations.
  - The Snapdragon's Hexagon NPU lacks specialized hardware for depthwise convolutions, forcing it to
    fall back to the CPU.
  - The operation's Arithmetic Intensity dropped significantly, making it memory-bandwidth bound instead
    of compute-bound.
  - The TensorFlow Lite framework has high dispatch overhead for the two separate depthwise and pointwise
    operations.
  correct_index: 2
