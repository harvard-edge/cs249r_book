title: On-Device Defensive Architecture for Biometric Spoofing
scenario: "You are designing an on-device liveness detection system for a banking app that runs entirely on the Apple A17 Pro Neural Engine (35 TOPS, 8 GB unified memory, 5W envelope). The model must defend against highly optimized adversarial patches to bypass facial recognition, with a strict 15ms latency budget."
question: "How would you design an on-device defense against biometric spoofing for the A17 Pro Neural Engine?"
details:
  realistic_solution: The optimal approach is to design a lightweight teacher-student defensive distillation pipeline where the heavily robust teacher is trained offline, and a compact student model is quantized to INT8 for the A17 Pro's 16-core Neural Engine. By leveraging the A17 Pro's shared 8 GB unified memory, the student model can process intermediate feature maps efficiently with zero-copy CPU/NPU memory sharing. Finally, we must apply cheap, runtime input transformations (like randomized smoothing or resizing) on the CPU to disrupt adversarial perturbations before passing the tensor to the NPU.
  common_mistake: |
    **The Pitfall:** Proposing massive ensembles or cloud-based verification.
    **The Rationale:** Candidates ignore the 5W thermal envelope, unified memory bandwidth bottlenecks, and strict on-device requirements.
    **The Consequence:** Unusable systems that drain battery or violate privacy constraints.
  napkin_math: |
    - A17 Pro 16-core NPU capacity: `35 TOPS * 0.015s = 525 GOPs` per frame.
    - Typical INT8 robust MobileNet-class model: `~2 GOPs` per inference.
    - Memory: `25 MB` INT8 model + `1 MB` input + `10 MB` activations = `36 MB` (easily fits in 8 GB).
    - CPU input randomizations: `~3ms`. NPU inference: `~5ms`.
    - **Conclusion:** The total pipeline latency is `~8ms`, well within the **15ms** window.
