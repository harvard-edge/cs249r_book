title: Diagnosing Latency Spikes on Exynos 2400
scenario: You are deploying a quantized object detection model on a smartphone powered by the Samsung Exynos 2400 NPU. During profiling, you notice that while the dual-core NPU is rated for 34.7 TOPS, your model is only achieving a small fraction of this compute throughput, and inference latency spikes randomly when the camera application is actively streaming frames. The Exynos 2400 shares its 12 GB of LPDDR5X memory across the CPU, GPU, ISP, and NPU.
question: What is the likely bottleneck causing these intermittent latency spikes, and how would you verify it using profiling tools?
details:
  realistic_solution: The root cause is memory bandwidth contention on the shared 12 GB LPDDR5X bus. When the camera streams frames, the ISP (Image Signal Processor) and GPU consume massive amounts of memory bandwidth, heavily starving the NPU. To diagnose this, you should use system-level tracing tools like Perfetto or Android Systrace to correlate NPU execution stall times with high memory bus utilization by the ISP or GPU.
  common_mistake: |
    **The Pitfall:** Assuming the issue is poor operator mapping causing CPU fallback, or focusing solely on NPU compute utilization.
    **The Rationale:** Developers often focus on the model graph itself and fail to look at system-level resource contention in unified memory architectures.
    **The Consequence:** Suggesting a complete rewrite of the model architecture without ever addressing the actual root cause of shared memory bandwidth starvation.
  napkin_math: |
    - Total System Bandwidth: ~68.2 GB/s.
    - High Contention: ISP and GPU consume 60 GB/s for a 4K 60fps stream, leaving 8.2 GB/s for the NPU.
    - Ideal Read Time (20 MB weights): 20 MB / 68.2 GB/s = 0.29 ms.
    - Contended Read Time: 20 MB / 8.2 GB/s = 2.43 ms.
    - **This ~8.3x increase in memory read latency causes severe latency spikes regardless of NPU compute capacity.**
