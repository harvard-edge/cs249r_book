title: Diagnosing Latency Spikes on Exynos 2400
scenario: You are deploying a quantized object detection model on a smartphone powered
  by the Samsung Exynos 2400 NPU. During profiling, you notice that while the dual-core
  NPU is rated for 34.7 TOPS, your model is only achieving a small fraction of this
  compute throughput, and inference latency spikes randomly when the camera application
  is actively streaming frames. The Exynos 2400 shares its 12 GB of LPDDR5X memory
  across the CPU, GPU, ISP, and NPU. What is the likely bottleneck causing these intermittent
  latency spikes, and how would you verify it using profiling tools?
question: What is the likely bottleneck causing these intermittent latency spikes,
  and how would you verify it using profiling tools?
details:
  realistic_solution: The root cause is memory bandwidth contention on the shared
    12 GB LPDDR5X bus. When the camera streams frames, the ISP (Image Signal Processor)
    and GPU consume massive amounts of memory bandwidth, heavily starving the NPU.
    To diagnose this, you should use system-level tracing tools like Perfetto or Android
    Systrace to correlate NPU execution stall times with high memory bus utilization
    by the ISP or GPU.
  common_mistake: Candidates often assume the issue is poor operator mapping causing
    unsupported ops to fallback to the CPU, or they focus solely on NPU compute utilization.
    They might suggest rewriting the model architecture without investigating system-level
    resource contention.
  napkin_math: LPDDR5X typically provides around 68.2 GB/s of total system bandwidth.
    If the ISP and GPU consume 60 GB/s processing a 4K 60fps camera stream, only 8.2
    GB/s is left for the NPU. If your INT8 model requires loading 20 MB of weights
    per inference, the ideal read time (at full bandwidth) is 20 MB / 68.2 GB/s =
    0.29 ms. Under contention, the read time jumps to 20 MB / 8.2 GB/s = 2.43 ms.
    This ~8.3x increase in memory read latency, combined with activation reads/writes,
    causes severe latency spikes regardless of the NPU's 34.7 TOPS compute capacity.
