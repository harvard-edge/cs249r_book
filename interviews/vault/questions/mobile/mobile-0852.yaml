title: Diagnose accuracy regression after Core ML conversion of EfficientNet-B0 for A17 Pro
scenario: After converting EfficientNet-B0 from PyTorch FP32 to Core ML FP16 for a mobile NPU, top-1 accuracy drops from 77.1% to 74.8% on a 500-image test set. The model uses Swish (SiLU) activations and SE blocks.
question: How would you diagnose the sources of the 2.3pp accuracy regression?
details:
  realistic_solution: |
    Run the model in FP32 mode (`computeUnits=.cpuOnly`); if accuracy recovers, the issue is precision mapping, not conversion graph topology. Inspect the converted graph: Core ML's NPU mapper approximates the sigmoid component of Swish as a 4th-degree polynomial (`hardsigmoid`), and FP16 Global Average Pooling (GAP) in SE blocks on small spatial dimensions loses precision. Fix: upgrade the deployment target to support native SiLU or fine-tune with ReLU6.
  common_mistake: |
    **The Pitfall:** Assuming the entire accuracy drop stems strictly from FP16 weight truncation.
    **The Rationale:** Candidates fail to realize that compiler toolchains introduce operator approximations (like polynomial replacements for transcendentals) to fit NPU kernels.
    **The Consequence:** Endless attempts to re-train or QAT the weights without addressing the fundamental compiler-level operator mismatch.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - EfficientNet-B0: 16 MBConv blocks with Squeeze-and-Excitation (SE).
       - Swish sigmoid approximation error: max error ~0.002.
       - SE block involves sigmoid(FC(GAP(x))).
    2. **Calculations:**
       - Error per SE block accumulates through 2 FC layers and sigmoid.
       - 16 blocks * 2 SE FC operations * 0.002 error ≈ 0.064 total propagated error.
       - A 0.064 logit shift typically causes a ~1-2pp accuracy drop on ImageNet top-1.
    3. **Conclusion & Interpretation:**
       - **Operator approximation (0.064 accumulated error) accounts for the majority of the 2.3pp drop. Bottleneck: Compiler Approximation Error.**
