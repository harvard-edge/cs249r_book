title: Mobile Background Training Scheduler
scenario: A phone can train a personalization adapter only while charging, on Wi-Fi,
  below 38°C skin temperature, and with battery above 60%. Design the scheduling policy.
question: How would you schedule mobile personalization training under charging, Wi-Fi,
  temperature, and battery constraints?
details:
  realistic_solution: Use an eligibility gate that starts training only when all constraints
    are satisfied, checkpoints progress, and aborts when temperature or battery crosses
    thresholds. Schedule in short chunks so foreground use can preempt training without
    losing much work.
  common_mistake: Starting a long training job as soon as Wi-Fi is available and causing
    heat or battery complaints.
  napkin_math: If training is split into 2-minute chunks, aborting loses at most 2
    minutes of progress instead of a full 20-minute job.
