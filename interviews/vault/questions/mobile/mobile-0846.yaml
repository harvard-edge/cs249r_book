title: Mobile Background Training Scheduler
scenario: A phone can train a personalization adapter only while charging, on Wi-Fi, below 38°C skin temperature, and with battery above 60%.
question: How would you design the scheduling policy for mobile personalization training under charging, Wi-Fi, temperature, and battery constraints?
details:
  realistic_solution: Use an eligibility gate that starts training only when all constraints are satisfied, checkpoints progress, and aborts when temperature or battery crosses thresholds. Schedule in short chunks so foreground use can preempt training without losing much work.
  common_mistake: |
    **The Pitfall:** Starting a long monolithic training job as soon as Wi-Fi is available.
    **The Rationale:** Assuming cloud-like batch processing without respecting intermittent mobile availability and strict thermal constraints.
    **The Consequence:** Thermal throttling, significant battery drain, and user complaints, leading to OS-level background termination.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Full training job takes 20 minutes.
       - Preemption can happen at any time due to thermal or foreground usage constraints.
    2. **Calculations:**
       - If split into 2-minute chunks: max lost progress on preemption = 2 minutes.
       - If unsplit: max lost progress on preemption = up to 20 minutes.
    3. **Conclusion & Interpretation:**
       - **Result: Checkpoint-Bound.** Checkpointing every 2 minutes minimizes wasted compute and energy under frequent preemptions.
