title: KV-Cache Persistence Across App Sessions on Mobile
scenario: Your on-device LLM assistant on iPhone must maintain conversation context across app backgrounding
  events. iOS kills backgrounded apps within 30 seconds. The KV-cache for a 2K-token conversation is 64
  MB. Design a persistence strategy that avoids re-prefilling on app relaunch.
question: "How would you design a persistence strategy that avoids re-prefilling on app relaunch?"
details:
  realistic_solution: 'Strategy: serialize KV-cache to flash storage on app backgrounding. (1) On UIApplicationDidEnterBackground:
    serialize the KV-cache tensor (64 MB) to the app''s sandbox directory. iPhone 15 Pro NVMe: ~2 GB/s
    write → 64 MB in 32ms — well within the ~5s background execution window. (2) On app relaunch: load
    serialized KV-cache from flash: 64 MB at ~3 GB/s read = 21ms. Skip prefill entirely. (3) Compression:
    LZ4-compress the KV-cache before writing. FP16 KV data compresses ~1.5× → 43 MB, write time 21ms.
    (4) Validation: include a hash of the model version + conversation token IDs. If the model was updated
    or conversation is stale (>1 hour), invalidate and re-prefill. (5) Memory pressure handling: register
    for UIKit memory warnings. On low-memory warning, proactively serialize and free KV-cache, allowing
    the model to continue running with a smaller footprint. (6) Alternative: quantize KV to INT4 for persistence
    (16 MB, 8ms write/5ms read), dequantize to FP16 on reload. Quality impact minimal for 2K context.'
  common_mistake: Trying to keep the app alive in the background with background tasks. iOS strictly limits
    background execution. The KV-cache must be serialized to storage before the app is suspended.
  napkin_math: 'KV-cache: 64 MB FP16. Flash write: 64 MB / 2 GB/s = 32ms. Flash read: 64 MB / 3 GB/s =
    21ms. With LZ4: 43 MB, write 21ms, read 14ms. Prefill 2K tokens on A17: ~500ms. Savings: 500ms - 21ms
    = 479ms faster resume.'
