title: A/B Rollout Memory Bottleneck on Exynos 2400
scenario: You are managing a canary rollout of a new on-device transcription model for users with the
  Samsung Exynos 2400 NPU. The control group uses a cloud API, while the treatment group runs locally
  utilizing the dual-core NPU's 34.7 TOPS. During the 5% canary phase, analytics show a spike in background
  app terminations and UI stuttering, despite the NPU executing the model well within latency budgets.
  You must diagnose the bottleneck affecting the shared 12 GB LPDDR5X RAM and quantify the necessary optimization
  before expanding the rollout.
question: "What causes the A/B rollout memory bottleneck on Exynos 2400 and how should it be fixed?"
details:
  realistic_solution: The bottleneck is memory starvation. The local model is consuming too much of the
    shared RAM, causing the OS to kill background apps (OOM kills) and starving the CPU/GPU of memory
    bandwidth, leading to UI stutter. The solution is to pause the rollout, profile the model's peak memory
    footprint, apply quantization to reduce weight size, and verify the memory reduction before resuming
    the A/B test.
  common_mistake: Candidates often blame the NPU compute capacity or suggest a simple rollback without
    diagnosing the system-wide impact. They fail to recognize that the NPU, CPU, GPU, and ISP share the
    same 12 GB LPDDR5X pool, and isolating NPU metrics from system memory pressure leads to incomplete
    conclusions.
  napkin_math: The Exynos 2400 device has 12 GB of shared LPDDR5X. Assume the OS uses 4 GB, UI/GPU uses
    3 GB, and background apps use 2 GB, leaving 3 GB of free RAM. The unoptimized FP16 transcription model
    requires 3.8 GB for weights and 0.5 GB for context, totaling 4.3 GB. This results a 1.3 GB deficit,
    triggering OOM kills. By optimizing the model to INT8, weight memory is halved to 1.9 GB. Total memory
    becomes 1.9 GB + 0.5 GB = 2.4 GB, which comfortably fits within the 3 GB available RAM, leaving a
    0.6 GB safety buffer and allowing the rollout to safely scale.
