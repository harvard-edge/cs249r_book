title: 'Fault Tolerance: Fluency — Mobile Checkpoint Write Speed and Overhead'
scenario: Your on-device training runs LoRA fine-tuning on an A17 Pro (35 TOPS Neural Engine, 8GB RAM). The LoRA weights consist of 1M parameters optimized via AdamW.
question: What is the checkpoint write time and energy overhead if saving every 60 seconds during a 10-minute background training session?
details:
  realistic_solution: 'Checkpoint: LoRA weights (fp32) + optimizer (2× fp32 for momentum and variance) = 3 × 1M × 4B = 12MB. Flash write at A17 Pro NVMe: ~3 GB/s. Write time: 12MB / 3 GB/s = 4ms per checkpoint.'
  common_mistake: |
    **The Pitfall:** Forgetting that optimizer state significantly increases the checkpoint size.
    **The Rationale:** Candidates focus only on the 1M parameters and forget AdamW requires two extra momentum/variance tensors.
    **The Consequence:** They dramatically underestimate the storage overhead and flash write time required for on-device fault tolerance.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Parameters: 1M LoRA weights (FP32).
       - Optimizer: AdamW (Momentum + Variance in FP32).
       - Storage: NVMe Flash write speed ~3 GB/s.
       - Flash Power: ~0.5W.
    2. **Calculations:**
       - Checkpoint Size: 1M (weights) + 1M (momentum) + 1M (variance) = 3M × 4 bytes = 12 MB.
       - Write Latency: 12 MB / 3,000 MB/s = 4 ms/checkpoint.
       - Time Overhead (10 checkpoints): 10 × 4 ms = 40 ms.
       - Energy Overhead: 0.5W × 0.004s = 2 mJ/checkpoint = 20 mJ total.
    3. **Conclusion & Interpretation:**
       - **Result: I/O-Bound.** Writing a 12 MB checkpoint takes 4 ms. The 20 mJ total energy overhead is **negligible (0.0017%)** compared to a 10-minute CPU training session (~1200 J).
