title: On-Device Coreset Selection for Gemini Nano
scenario: A mobile team personalizes a 1.8B parameter Gemini Nano model directly on the Google Tensor
  G3. The background process is strictly limited to a 50 MB replay buffer out of the 12 GB LPDDR5X memory
  pool, and 1 hour of TPU time at 7.5 TOPS for weekly fine-tuning. The system collects 1,000,000 user
  interaction logs (500 bytes each) per week, but using uniform random sampling to fit the 50 MB buffer
  causes the model to suffer catastrophic forgetting on rare user commands. Explain why random pruning
  causes this collapse under these hardware constraints, and analyze the tradeoff of switching to a gradient-based
  coreset selection strategy.
details:
  realistic_solution: Uniform random sampling preserves the original long-tailed data distribution. In
    a highly compute-constrained environment, this wastes the TPU's budget on redundant common logs and
    leaves too few examples of rare commands to provide a meaningful gradient signal. By using coreset
    selection, the system prioritizes high-information (high-loss) samples, maximizing the Information-Compute
    Ratio (ICR). This ensures the 50 MB buffer contains a diverse set of behaviors, preventing model collapse
    on rare commands without exceeding the memory or compute limits.
  common_mistake: Candidates often suggest simply increasing the buffer size or training for more epochs,
    ignoring the strict 50 MB memory limit and the background thermal constraints of the Tensor G3. They
    fail to recognize that random sampling preserves extreme class imbalance, wasting the limited TPU
    compute budget on redundant data.
  napkin_math: Buffer Capacity = 50 MB / 500 bytes per log = 100,000 logs (10% sample rate from 1,000,000
    weekly logs). For a rare command occurring 0.1% of the time, random sampling yields only 100 examples
    in the buffer. TPU Compute Budget = 7.5 TOPS * 3600 seconds = 27 PetaOps. Compute per token (forward+backward)
    = 3 * 1.8B params = 5.4 GigaOps. For 128-token sequences, 1 log requires ~0.69 TeraOps. Processing
    100 rare logs uses just 69 TeraOps (0.00025% of the total budget). The TPU wastes >99% of its 27 PetaOps
    budget on redundant common tasks, resulting in an abysmal Information-Compute Ratio.
