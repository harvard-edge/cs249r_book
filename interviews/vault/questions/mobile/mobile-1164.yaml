title: Diagnosing NaN Outputs in On-Device LLM
scenario: You are deploying a 1.8B parameter LLM (like Gemini Nano) to a Google Tensor
  G3 device. To fit the model within the constraints of the 12 GB LPDDR5X RAM (shared
  with the OS) and leverage the 7.5 TOPS on-device TPU, you use INT8 for weights and
  FP16 for activations. However, during beta testing, the model occasionally outputs
  NaN or completely garbled text when processing prompts that generate large attention
  scores. Why is this happening, and how do you resolve it?
question: Why does a 1.8B INT8-FP16 LLM on Tensor G3 produce NaNs on prompts with
  large attention scores?
details:
  realistic_solution: The root cause is FP16 overflow during the attention mechanism's
    dot product or softmax calculations, as FP16 has a maximum representable value
    of only 65,504. The ideal solution is to switch the activation precision to BF16,
    which shares the same 8-bit exponent as FP32 (preventing overflow) while maintaining
    the 16-bit memory footprint. If BF16 is not fully supported for all ops, the fallback
    is to selectively upcast only the attention logit accumulation to FP32 before
    applying softmax.
  common_mistake: Candidates often misdiagnose this as a weight quantization error
    or suggest reverting the entire model to FP32. Reverting to FP32 would violate
    the strict memory and bandwidth constraints of the mobile device and fail to utilize
    the TPU's optimized low-precision matrix multiplication units.
  napkin_math: A 1.8B parameter model in FP32 requires 7.2 GB of RAM, which exceeds
    typical background app memory limits on a 12 GB LPDDR5X device (OS + apps use
    ~8GB). Using INT8 weights reduces this to 1.8 GB. For activations, FP16 halves
    the memory footprint compared to FP32 but introduces an upper bound of ~65.5k.
    In deep LLMs, attention scores before softmax can easily exceed 65.5k, causing
    an overflow to infinity/NaN. Switching to BF16 preserves the 16-bit activation
    size while expanding the dynamic range to ~3.4e38, safely preventing overflow
    without exceeding the Tensor G3's memory or 7.5 TOPS compute limits.
