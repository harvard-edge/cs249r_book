title: Diagnosing NaN Outputs in On-Device LLM
scenario: You are deploying a 1.8B parameter LLM (like Gemini Nano) to a Google Tensor G3 device. To fit the model within the constraints of the 12 GB LPDDR5X RAM (shared with the OS) and leverage the 7.5 TOPS on-device TPU, you use INT8 for weights and FP16 for activations. However, during beta testing, the model occasionally outputs NaN or completely garbled text when processing prompts that generate large attention scores.
question: Why does a 1.8B INT8-FP16 LLM on Tensor G3 produce NaNs on prompts with large attention scores?
details:
  realistic_solution: The root cause is FP16 overflow during the attention mechanism's dot product or softmax calculations, as FP16 has a maximum representable value of only 65,504. The ideal solution is to switch the activation precision to BF16, which shares the same 8-bit exponent as FP32 (preventing overflow) while maintaining the 16-bit memory footprint. If BF16 is not fully supported for all ops, the fallback is to selectively upcast only the attention logit accumulation to FP32 before applying softmax.
  common_mistake: |
    **The Pitfall:** Misdiagnosing as a weight quantization error or reverting to FP32.
    **The Rationale:** Candidates fail to realize FP16's low maximum value (~65k) easily overflows in deep LLMs' attention scores.
    **The Consequence:** Reverting to FP32 violates strict mobile memory constraints and destroys performance on the NPU.
  napkin_math: |
    - 1.8B parameter model in FP32 requires 7.2 GB of RAM (exceeds background limit).
    - INT8 weights reduce this to 1.8 GB.
    - FP16 activations bound values to ~65,504.
    - Deep LLM attention scores frequently exceed 65.5k, resulting in Infinity/NaN.
    - **Switching to BF16 maintains the 16-bit memory size while expanding dynamic range to ~3.4e38**, solving the overflow safely.
