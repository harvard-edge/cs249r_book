title: Chiplet Compute-to-Memory Ratio for Mobile SoC Design
scenario: A mobile chip architect is designing a new SoC and asks why Apple uses a fixed ratio of neural
  engine compute to memory interface width. Explain the design rationale for matching compute-to-memory
  ratio to target workloads.
details:
  realistic_solution: Mobile SoC design matches hardware arithmetic intensity to the target model class.
    MobileNet-class models operate at ~50-100 FLOPs/byte; A17 Pro ANE targets this range. Adding more
    memory bandwidth beyond what ANE can consume wastes power. The ratio is set by the dominant workload,
    not by maximizing specs.
  common_mistake: Assuming more memory bandwidth always helps mobile inference. The ANE has a fixed arithmetic
    intensity target; over-provisioning memory bandwidth wastes die area and power.
  napkin_math: 'A17 Pro ANE: 35 TOPS INT8. On-chip memory BW (estimated): ~300 GB/s. Hardware AI: 35T
    / 300G = 117 FLOPs/byte. MobileNetV3 arithmetic intensity: ~80 FLOPs/byte (memory-bound). GPT-class
    model: 200+ FLOPs/byte (compute-bound). ANE is balanced for MobileNet workloads — adding 2x BW (600
    GB/s) would not improve MobileNet throughput at all.'
