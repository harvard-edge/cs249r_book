title: A17 LLM Context Cap
scenario: A mobile SoC runs an LLM with 32 layers, 16 KV heads, and 128 head dimension at FP16 precision. It is processing a 4096-token document summarization.
question: Diagnose the memory pressure by computing the peak KV cache size and determine if it exceeds a strict 1 GB application limit.
visual:
  kind: svg
  path: mobile-1884.svg
  alt: Bar chart comparing 1 GB cache size against the 1 GB limit.
  caption: KV Cache capacity limit.
details:
  realistic_solution: |
    KV cache sizing for transformers strictly scales with sequence length and network geometry. The memory formula is $2 \times \text{layers} \times \text{KV heads} \times \text{head dimension} \times \text{sequence length} \times \text{bytes per parameter}$. Expanding these variables mathematically isolates the precise byte capacity demanded by the attention mechanism, allowing engineers to verify if the workload forces immediate OS out-of-memory states.
  common_mistake: |
    **The Pitfall:** Forgetting to explicitly account for both Key and Value tensors, or the precise byte scalar dictated by the precision format (FP16).
    **The Rationale:** Candidates often memorize the raw parameter count geometry for self-attention but forget the critical $2\times$ multipliers required to translate mathematical parameter matrices into absolute physical byte capacity.
    **The Consequence:** Underestimating the KV cache byte footprint by an entire factor of 2 or 4, directly initiating catastrophic out-of-memory panics in production deployment.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Sequence Length: 4096 tokens.
       - Model Geometry: 32 layers, 16 KV heads, 128 head dimension.
       - Precision: FP16 (2 bytes per parameter).
       - Application RAM limit: 1 GiB.
    2. **Calculations:**
       - Formula: 2 (Key + Value) * Layers * KV_Heads * Head_Dim * Seq_Len * Bytes/Param.
       - Parameter count per token: 2 * 32 * 16 * 128 = 131,072 parameters.
       - Total parameters for sequence: 131,072 * 4096 = 536,870,912 parameters.
       - Total Memory Capacity: 536,870,912 * 2 bytes = 1,073,741,824 bytes.
    3. **Conclusion & Interpretation:**
       **Result: 1,073,741,824 bytes = exactly 1 GiB (Memory-Capacity-Bound).** The KV cache strictly exhausts a 1 GiB limit instantaneously, leaving exactly zero bytes for model weights, guarantees a crash.
