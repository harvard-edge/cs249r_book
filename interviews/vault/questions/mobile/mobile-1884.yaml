title: A17 LLM Context Cap
scenario: An Apple A17 Pro runs an LLM with 32 layers, 16 KV heads, and 128 head dimension at 16-bit precision. It is processing a 4096-token document summarization.
question: Diagnose the memory pressure by computing the peak KV cache size and determine if it exceeds a strict 1 GB application limit.
visual:
  kind: svg
  path: mobile-1884.svg
  alt: Bar chart comparing 1 GB cache size against the 1 GB limit.
  caption: KV Cache capacity limit.
details:
  realistic_solution: KV cache size is $2 \times \text{layers} \times \text{KV heads} \times \text{head dim} \times \text{sequence length} \times \text{bytes per parameter}$. $2 \times 32 \times 16 \times 128 \times 4096 \times 2 = 1,073,741,824$ bytes. This is exactly 1 GiB (or 1.07 GB), hitting the absolute limit without any margin for model weights or activations.
  common_mistake: |
    **The Pitfall:** Forgetting to account for both Key and Value tensors, or the byte size of FP16 precision.
    **The Rationale:** Candidates often calculate the raw parameter count for the cache but forget the multipliers required to translate that into actual byte capacity.
    **The Consequence:** Underestimating the KV cache size by a factor of 2 or 4, leading to catastrophic out-of-memory errors in production.
  napkin_math: |
    1. KV cache formula: 2 (Key & Value) * layers * KV heads * head dim * sequence length * bytes per param.
    2. Parameter count per token: 2 * 32 * 16 * 128 = 131,072 parameters.
    3. Total parameters for sequence: 131,072 * 4096 = 536,870,912 parameters.
    4. Memory in bytes (16-bit = 2 bytes/param): 536,870,912 * 2 = 1,073,741,824 bytes.
    5. Final size: 1,073,741,824 bytes = **1 GiB** (exactly hits the 1 GB limit).
