title: A17 LLM Context Cap
scenario: An Apple A17 Pro runs an LLM with 32 layers, 16 KV heads, and 128 head dimension
  at 16-bit precision. It is processing a 4096-token document summarization.
question: Diagnose the memory pressure by computing the peak KV cache size and determine
  if it exceeds a strict 1 GB application limit.
visual:
  kind: svg
  path: mobile-1884.svg
  alt: Bar chart comparing 1 GB cache size against the 1 GB limit.
  caption: KV Cache capacity limit.
details:
  realistic_solution: KV cache size is $2 \times \text{layers} \times \text{KV heads}
    \times \text{head dim} \times \text{sequence length} \times \text{bytes per parameter}$.
    $2 \times 32 \times 16 \times 128 \times 4096 \times 2 = 1,073,741,824$ bytes.
    This is exactly 1 GiB (or 1.07 GB), hitting the absolute limit without any margin
    for model weights or activations.
  common_mistake: Forgetting to multiply by 2 (for both Key and Value tensors) or
    by 2 again for 16-bit float byte sizes.
  napkin_math: 2 * 32 * 16 * 128 * 4096 * 2 = 1,073,741,824 bytes = 1 GiB.
