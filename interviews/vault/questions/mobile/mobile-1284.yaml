title: On-Device Summarization Architecture Selection
scenario: Your team is building a real-time meeting summarization feature for a mobile device powered by the Samsung Exynos 2400.
question: For Exynos 2400 meeting summarization, should a 2B INT8 model be decoder-only or encoder-decoder to minimize memory bandwidth contention?
details:
  realistic_solution: The encoder-decoder architecture is superior for this memory-constrained, multitasking environment. While the dual-core NPU provides ample compute, the 12 GB LPDDR5X memory is actively shared with the ISP and GPU processing the video call, making memory bandwidth the primary bottleneck. An encoder-decoder model maintains a static cross-attention cache for the input sequence and a much smaller self-attention KV cache for the generated tokens, significantly reducing memory footprint and bandwidth contention during the autoregressive phase compared to a decoder-only model.
  common_mistake: |
    **The Pitfall:** Reflexively choosing a decoder-only architecture because it is the modern LLM standard.
    **The Rationale:** Failing to account for how KV cache scales differently and impacts a heavily shared memory bus on mobile.
    **The Consequence:** Severe memory bandwidth contention causing UI stutter and video call frame drops.
  napkin_math: |
    1. **Assumptions & Constraints:** Exynos 2400 (LPDDR5X shared RAM). Comparing 2B INT8 Decoder-only vs Encoder-Decoder KV cache overheads.
    2. **Calculations:**
       - Decoder-only KV cache (24 layers, 2200 tokens): 2 bytes * 2 * 24 * 2048 * 2200 = ~432 MB.
       - Encoder-decoder input cache (12 layers, 2000 tokens): 2 * 2 * 12 * 2048 * 2000 = ~196 MB.
       - Encoder-decoder output cache (12 layers, 200 tokens): 2 * 2 * 12 * 2048 * 200 = ~20 MB.
       - Encoder-decoder Total: 196 MB + 20 MB = 216 MB.
    3. **Conclusion & Interpretation:** **Encoder-decoder strictly halves the KV cache footprint to ~216 MB, freeing LPDDR5X bandwidth. Result: Memory-Bandwidth Bound.**
