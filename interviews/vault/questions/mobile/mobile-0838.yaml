title: LLM Bandwidth Limits on Mobile NPU
scenario: An on-device assistant runs a 7B parameter LLM quantized to INT4 on the
  Snapdragon 8 Gen 3 Hexagon NPU. The system needs to generate text auto-regressively
  at a minimum of 10 tokens per second.
question: Analyze the memory bandwidth required to achieve this generation speed,
  and determine the minimum GB/s needed from the LPDDR memory.
details:
  realistic_solution: A 7B parameter model in INT4 format requires roughly 3.5 GB
    of memory to store the weights. For batch-size 1 auto-regressive generation, the
    entire 3.5 GB weight tensor must be loaded from memory to the NPU for every single
    generated token. Therefore, generating 10 tokens per second strictly requires
    35 GB/s of memory bandwidth.
  common_mistake: Calculating throughput based on the NPU's TOPS rating instead of
    recognizing that batch-1 auto-regressive decoding is strictly bounded by memory
    bandwidth.
  napkin_math: 7e9 * 0.5B * 10 = 35 GB/s
