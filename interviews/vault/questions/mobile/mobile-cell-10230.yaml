title: Evaluating End-to-End Compound Pipeline Quality on Tensor G3 with a RAG Evals Suite
scenario: 'A Tensor G3 (7.5 TOPS, 12GB) on-device RAG system achieves individual stage metrics: retrieval
  recall@5=0.83, reranker NDCG@3=0.79, LLM groundedness=0.88 (fraction of claims traceable to retrieved
  docs). End-to-end user satisfaction (human eval on 100 queries) is only 0.61. Evaluate the gap between
  stage metrics and end-to-end quality and identify the most likely source of the 0.22 satisfaction deficit.'
question: "How would you evaluate the gap between stage metrics and end-to-end quality and identify the most likely source of the 0.22 satisfaction deficit?"
details:
  realistic_solution: 'Analyze error modes: (1) Retrieval miss (17% of queries): LLM receives irrelevant
    context, generates hallucinated answer — users rate these 0.1 satisfaction. Contribution: 0.17 * (1-0.1)
    = 0.153 satisfaction drag. (2) Reranker error (21% of remaining): correct doc retrieved but ranked
    below cutoff — LLM misses it. Contribution: 0.83 * 0.21 * 0.5 satisfaction drag = 0.087. (3) Grounding
    failure (12% remaining): LLM generates plausible but unsupported claims. 0.83*0.79*0.12 = 0.079 drag.
    Total drag: 0.153+0.087+0.079=0.319 from perfect 1.0 → theoretical max: 1-0.319=0.681. Observed 0.61
    — additional 0.07 drag from response style issues (too verbose, wrong format). Primary fix target:
    retrieval recall (highest impact at 0.153).'
  common_mistake: Assuming the satisfaction deficit is fully explained by multiplying stage metrics (0.83*0.79*0.88=0.578)
    and calling the 0.61 satisfaction 'consistent with expectations.' This ignores that the multiplication
    assumes independent error modes, when in practice errors compound in correlated ways — a bad retrieve
    leads to a confidently wrong LLM answer, which is worse than a random wrong answer.
  napkin_math: 'Stage metrics: recall@5=0.83, NDCG@3=0.79, groundedness=0.88. Naive product: 0.83*0.79*0.88=0.578.
    Observed: 0.61. The product underestimates because satisfied queries can have imperfect individual
    stages (partial recall still useful). Error analysis: retrieval miss (17%) → ~0 satisfaction contribution:
    0.17*0.1=0.017 satisfied from this bucket vs 0.17*1.0=0.17 possible → loss=0.153. This single stage
    accounts for 0.153/0.22=70% of the satisfaction gap. Improving recall@5 from 0.83 to 0.93 would recover
    0.10 satisfaction units → estimated end-to-end: 0.71.'
