title: Diagnosing OOM on Exynos 2400 Shared Memory
scenario: Your team is deploying a 3B parameter conversational model with INT8 quantization onto a device
  featuring the Samsung Exynos 2400 NPU. The system has a shared 12 GB LPDDR5X memory pool across the
  CPU, GPU, ISP, and NPU. During a camera viewfinder session running simultaneously with the text inference,
  the NPU runtime suddenly throws an Out-Of-Memory (OOM) exception, even though the model weights theoretically
  fit well within 12 GB. How do you diagnose the root cause of this failure?
details:
  realistic_solution: The root cause is memory contention on the unified LPDDR5X bus. The OS, camera ISP,
    and background services reserve significant portions of the 12 GB pool. I would diagnose this by analyzing
    the system-wide memory map during the crash, calculating the actual free memory available to the NPU,
    and accounting for the model's runtime memory including weights, activations, and the KV cache.
  common_mistake: Candidates often assume the entire 12 GB of memory is available exclusively for NPU
    inference. They typically calculate only the static footprint of the model weights and ignore the
    dynamic memory usage from concurrent hardware blocks (like the ISP for the camera) and the LLM's KV
    cache.
  napkin_math: 'Model weights: 3B params * 1 byte (INT8) = 3 GB. Android OS baseline = ~4 GB. Camera ISP/GPU
    framebuffers = ~2.5 GB. KV cache and activations for 1024 tokens = ~0.5 GB. Total system memory committed
    = 3 + 4 + 2.5 + 0.5 = 10.0 GB. This leaves only 2 GB of buffer in the 12 GB shared pool, which can
    easily be exhausted by memory fragmentation or OS background tasks.'
