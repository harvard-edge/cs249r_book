title: Zero-Copy Image Pipeline
scenario: An iOS camera app applies ML models using an Apple A17 Pro. The ISP outputs
  12MP RAW frames at 60fps, but the NPU needs scaled RGB tensors.
question: Design an evaluation metric for the memory pipeline between the ISP, GPU,
  and NPU, and propose a unified zero-copy buffer architecture.
details:
  realistic_solution: The critical evaluation metric is memory bandwidth overhead
    percentage per 16.6ms frame budget. A unified architecture uses `CVPixelBuffer`
    mapped into the unified memory space. The ISP writes directly to this buffer,
    the GPU scales it in-place using Metal, and the NPU reads the exact same physical
    addresses, achieving zero memory copies across the SoC.
  common_mistake: Extracting the image to a CPU-bound tensor array (like a standard
    numpy/OpenCV array), causing a costly cross-domain memory copy that breaks real-time
    constraints.
  napkin_math: 12MP * 3 channels = 36MB. 1 CPU copy at 60fps = 2.16 GB/s wasted bandwidth.
