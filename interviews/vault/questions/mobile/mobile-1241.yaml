title: Zero-Copy Memory Mapping for Gemini Nano on Tensor G3
scenario: You are tasked with deploying a quantized Gemini Nano model on a flagship device powered by the Google Tensor G3. The model needs to be instantly accessible by multiple independent system services (e.g., smart reply, live translation, and keyboard prediction) simultaneously.
question: How should Tensor G3 share Gemini Nano weights across services with mmap while avoiding cold-start TPU stalls and exceeding the 12 GB LPDDR5X limit?
details:
  realistic_solution: The system should use `mmap` with the `MAP_SHARED` flag to map the model weights directly into virtual memory, ensuring only one physical copy exists in the 12 GB LPDDR5X RAM, regardless of the number of consuming processes. To prevent TPU starvation during cold starts, the architecture must include a predictive prefetching mechanism using `madvise(MADV_WILLNEED)` to page in the first few layers of the model asynchronously before the first inference request is executed.
  common_mistake: |
    **The Pitfall:** Relying on standard file I/O or naive mmap without a prefetching strategy.
    **The Rationale:** Candidates assume the OS will instantly manage memory paging, ignoring the cold-start latency when the TPU stalls waiting for weights from storage.
    **The Consequence:** Wasting RAM by duplicating the model for each process, or causing severe latency spikes during the first inference.
  napkin_math: |
    1. Naive loading memory: 4 processes * 1.8 GB/process = 7.2 GB of RAM (60% of capacity).
    2. Shared mmap memory: 1 physical copy = 1.8 GB flat.
    3. Memory saved: 7.2 GB - 1.8 GB = **5.4 GB**.
    4. Bandwidth impact: Avoiding 5.4 GB of redundant copies prevents cache thrashing and allows the TPU to sustain its 7.5 TOPS throughput.
