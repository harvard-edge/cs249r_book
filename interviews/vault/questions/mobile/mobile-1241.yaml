title: Zero-Copy Memory Mapping for Gemini Nano on Tensor G3
scenario: You are tasked with deploying a quantized Gemini Nano model on a flagship
  device powered by the Google Tensor G3. The model needs to be instantly accessible
  by multiple independent system services (e.g., smart reply, live translation, and
  keyboard prediction) simultaneously. Design a memory-mapped weight loading architecture
  that achieves near-zero cold start latency and allows all processes to share the
  model weights in RAM without exceeding the device's 12 GB LPDDR5X limit or starving
  the on-device TPU.
question: How should Tensor G3 share Gemini Nano weights across services with mmap
  while avoiding cold-start TPU stalls?
details:
  realistic_solution: The system should use `mmap` with the `MAP_SHARED` flag to map
    the model weights directly into virtual memory, ensuring only one physical copy
    exists in the 12 GB LPDDR5X RAM, regardless of the number of consuming processes.
    To prevent TPU starvation during cold starts, the architecture must include a
    predictive prefetching mechanism using `madvise(MADV_WILLNEED)` to page in the
    first few layers of the model asynchronously before the first inference request
    is executed.
  common_mistake: Candidates often propose standard file I/O loading, which duplicates
    the model in memory for each process, rapidly exhausting the available RAM. Another
    mistake is relying on naive mmap without a strategy to mask page fault latencies,
    causing the TPU to stall while waiting for weights to load from storage.
  napkin_math: Assuming Gemini Nano requires 1.8 GB of storage at 4-bit quantization.
    If 4 system processes load the model naively, it consumes 4 * 1.8 GB = 7.2 GB
    of RAM (60% of the 12 GB LPDDR5X capacity). Using shared mmap reduces this to
    a flat 1.8 GB, saving 5.4 GB of memory. To maintain the TPU's 7.5 TOPS throughput,
    the memory subsystem must sustain high bandwidth; avoiding 5.4 GB of redundant
    memory copies prevents severe bandwidth bottlenecking and cache thrashing.
