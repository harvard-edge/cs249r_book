title: Tensor G3 Constant Folding Latency
scenario: You are compiling an on-device LLM (similar to Gemini Nano) for the Google Tensor G3. The model
  utilizes the device's 12 GB LPDDR5X memory. During ahead-of-time (AOT) compilation, your framework applies
  constant folding to precompute a set of static projection layers. Originally, processing these specific
  layers required 0.3 Tera-Operations (TOPs) per inference pass. The constant folding pass successfully
  eliminates 20% of these operations. Assuming the Tensor G3's on-device TPU operates at its theoretical
  peak of 7.5 TOPS, calculate the exact compute latency saved per inference pass in milliseconds.
details:
  realistic_solution: To find the latency saved, you must first calculate the total number of operations
    eliminated by the constant folding optimization. Then, divide the eliminated operations by the processor's
    peak throughput to determine the time saved, ensuring you convert the final result from seconds to
    milliseconds.
  common_mistake: Candidates often misalign units between Tera-Operations (TOPs) and milliseconds, or
    they attempt to factor in memory bandwidth when the question strictly asks for the compute latency
    reduction based on peak TOPS.
  napkin_math: 'Original ops = 0.3 TOPs. Ops eliminated by constant folding = 20% * 0.3 = 0.06 TOPs. TPU
    throughput = 7.5 TOPS (Tera-Operations per second). Compute time saved = 0.06 TOPs / 7.5 TOPS = 0.008
    seconds. Convert to milliseconds: 0.008 seconds * 1000 = 8 milliseconds saved per inference.'
