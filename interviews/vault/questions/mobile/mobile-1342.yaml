title: Compute Budget for On-Device Frame Quality Gate
scenario: You are deploying a real-time computer vision feature on a mobile Neural Engine, processing a 60 FPS video stream. Before feeding frames into the main model, you must run a lightweight data quality gate to filter out corrupted frames. The Neural Engine provides 35 TOPS, but your main model already consumes 30 TOPS. You are restricted to using only 80% of the remaining compute for the quality gate to leave system headroom.
question: 'What per-frame compute budget remains for a data quality gate after the main 60 FPS model uses 30 TOPS?'
details:
  realistic_solution: 'The candidate should calculate the remaining available compute capacity and then determine the per-frame budget based on the target framerate. By identifying the leftover TOPS, applying the safety margin, and dividing by the FPS, they arrive at a strict operations budget that the data validation model must adhere to.'
  common_mistake: |
    **The Pitfall:** Forgetting to convert TOPS to operations per frame or ignoring the 80% utilization constraint.
    **The Rationale:** Candidates rush the math and assume the entire remaining 5 TOPS can be fully utilized, or forget that TOPS is a per-second metric, not per-frame.
    **The Consequence:** The proposed data quality model exceeds the compute budget, causing dropped frames and system instability.
  napkin_math: |
    **Assumptions & Constraints:**
    - 35 TOPS total, main model 30 TOPS.
    - 80% usage limit on remaining compute.
    - 60 FPS target.

    **Calculations:**
    - Remaining = 5 TOPS.
    - Usable = 5 * 0.8 = 4 TOPS.
    - OPS/frame = 4 TOPS / 60 FPS = 66.67 GOPS per frame.

    **Conclusion & Interpretation:**
    - **Result: 66.67 GOPS per frame (Compute-Bound)**. Budget is strictly limited.
