title: Diagnosing OOM Evictions on Shared Memory Exynos 2400
scenario: Your team is deploying a real-time video enhancement model on a device powered by the Samsung Exynos 2400. While your model weights only consume 2.5 GB, the application frequently crashes due to OS-level OOM evictions during continuous camera use.
question: What is the root cause of these sudden evictions considering the system's shared memory architecture?
details:
  realistic_solution: 'The root cause is severe memory fragmentation within the shared 12 GB LPDDR5X pool caused by contention with the ISP and GPU. Because the ISP and GPU rapidly allocate and deallocate large buffers for high-resolution camera frames, the physical memory becomes heavily fragmented over a few minutes of use. When the NPU attempts to allocate a large, contiguous block of memory for an activation tensor to maintain its high throughput, the allocation fails despite sufficient total free memory, triggering the Android Low Memory Killer Daemon (LMKD) to evict the application.'
  common_mistake: |
    **The Pitfall:** Assuming the OOM is caused by a standard memory leak or excessive ML activation footprint.
    **The Rationale:** Looking only at the ML application's absolute memory usage without considering memory fragmentation in a shared pool.
    **The Consequence:** Wasting time reducing batch sizes or applying heavy quantization without solving the system-level memory fragmentation caused by the ISP.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Total shared memory: 12.0 GiB.
       - Base OS footprint + Background Apps: ~4.5 GiB.
       - Model Weights: 2.5 GiB.
    2. **Calculations:**
       - Remaining available: 12.0 - 4.5 - 2.5 = 5.0 GiB.
       - Uncompressed 4K video frame (3840x2160x4 bytes): ~33.2 MB.
       - ISP ring buffer (15 frames): ~498 MB.
       - GPU triple buffer: ~100 MB.
       - Technically free: 5.0 GiB - ~0.6 GiB = 4.4 GiB.
    3. **Conclusion & Interpretation:**
       - **Result: Fragmentation-Bound. While 4.4 GiB is theoretically free, the constant 33.2 MB allocations severely fragment memory. The NPU cannot find a single contiguous 128 MB block for activations, triggering an OOM.**
