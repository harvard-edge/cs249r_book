title: A17 Pro NPU Activation Tiling
scenario: Designing an on-device diffusion model architecture constrained by the Apple
  A17 Pro Neural Engine's unified memory.
question: Create a memory allocation specification to pipeline UNet layer activations,
  avoiding spilling to slower system RAM when the model peak intermediate tensor size
  is 120MB and the NPU SRAM is roughly 32MB.
details:
  realistic_solution: The candidate should specify spatial tiling of the UNet feature
    maps into 4 distinct chunks. By processing a 30MB tile through fused convolution
    and activation layers before moving to the next, the entire intermediate state
    remains within the 32MB NPU SRAM. This minimizes unified memory bus traffic and
    prevents DRAM spilling.
  common_mistake: Attempting to fit the entire 120MB tensor into SRAM or failing to
    account for the memory needed for the weights alongside the activations.
  napkin_math: 120MB / 4 tiles = 30MB < 32MB SRAM
