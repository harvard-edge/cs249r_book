title: The OTA Update Budget Shock
scenario: You're an ML Systems Engineer on the mobile team for 'AutoDash,' a popular dashcam application. The app uses a 350 MB computer vision model on-device. Your team has trained an improved model and needs to roll it out via an Over-the-Air (OTA) update to 5 million active users.
question: "What total carrier data cost results from rolling out a 350 MB model update to 5 million users at $2 per GB?"
details:
  realistic_solution: The correct approach is to first calculate the total data volume required for the entire fleet, and then multiply that by the cost per unit of data. Careful unit conversion from Megabytes (MB) to Gigabytes (GB) is critical.
  common_mistake: |
    **The Pitfall:** Incorrect unit conversions between Megabytes (MB) and Gigabytes (GB) at scale.
    **The Rationale:** Engineers treat the model size in MB as an insignificant fraction or misplace a decimal point when multiplying by millions of users.
    **The Consequence:** Catastrophically underestimating the financial cost of the OTA update, blowing through the engineering budget.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Fleet Size: 5,000,000 users.
       - Update Size: 350 MB per user.
       - Carrier Cost: $2.00 per GB.
    2. **Calculations:**
       - Total Data (MB) = 5,000,000 * 350 MB = 1,750,000,000 MB.
       - Total Data (GB) = 1,750,000,000 MB / 1,000 MB/GB = 1,750,000 GB.
       - Total Cost = 1,750,000 GB * $2/GB = $3,500,000.
    3. **Conclusion & Interpretation:**
       - **Result: Cost-Bound**
       - The update will cost $3,500,000, proving that even small model sizes incur massive costs at fleet scale.
  options:
  - $35,000
  - $350,000
  - $3,500,000
  - $1,750,000
  correct_index: 2
