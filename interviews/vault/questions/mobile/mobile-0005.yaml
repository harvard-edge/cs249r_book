title: The OTA Update Budget Shock
scenario: You're an ML Systems Engineer on the mobile team for 'AutoDash,' a popular dashcam application.
  The app uses a 350 MB computer vision model on-device. Your team has trained an improved model and needs
  to roll it out via an Over-the-Air (OTA) update to 5 million active users. The product manager wants
  to know the potential network data bill for this rollout. Assuming an average carrier data cost of $2.00
  per GB, calculate the estimated total cost to update the entire user base.
question: "What total carrier data cost results from rolling out a 350 MB model update to 5 million users at $2 per GB?"
details:
  realistic_solution: The correct approach is to first calculate the total data volume required for the
    entire fleet, and then multiply that by the cost per unit of data. Careful unit conversion from Megabytes
    (MB) to Gigabytes (GB) is critical.
  common_mistake: Engineers often underestimate the aggregate cost of 'small' updates at scale. A common
    mistake is a simple unit conversion error, for example, treating the model size in MB as if it were
    an insignificant fraction of a GB, or miscalculating the total data volume by a factor of 100 or 1000
    when converting from Megabytes to Gigabytes for millions of users.
  napkin_math: 5M users * 350 MB/user = 1,750,000,000 MB
  options:
  - $35,000
  - $350,000
  - $3,500,000
  - $1,750,000
  correct_index: 2
