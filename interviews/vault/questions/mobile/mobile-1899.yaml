title: Mobile NLP Pipeline Bottleneck
scenario: A mobile NLP streaming pipeline processes batch size 1 text via four sequential stages: Tokenization (1ms), Embedding lookup (2ms), NPU Transformer layers (10ms), and CPU Decoding (3ms).
question: Identify the critical path bottleneck and calculate the absolute maximum throughput in tokens per second for this pipeline.
visual:
  kind: svg
  path: mobile-1899.svg
  alt: A bar chart of stage durations highlighting the 10ms NPU Transformer block as significantly taller than the rest.
  caption: Pipeline Stage Durations
details:
  realistic_solution: The critical path bottleneck in a synchronous pipeline is the single slowest stage. Here, the NPU Transformer layer stage takes 10ms per token, which bounds the entire system's speed. The maximum theoretical throughput is 1000ms / 10ms = 100 tokens per second.
  common_mistake: |
    **The Pitfall:** Summing all the latencies (1+2+10+3 = 16ms) to calculate throughput.
    **The Rationale:** Candidates forget that continuous streaming pipelines execute stages in parallel (overlapped execution).
    **The Consequence:** The system throughput is incorrectly calculated as 62.5 tokens per second instead of the true 100 tokens per second.
  napkin_math: |
    - **Pipeline Bottleneck:** The single slowest stage in the pipeline determines the overall throughput (NPU Transformer at 10ms).
    - **Throughput Calculation:** 1000ms / 10ms = 100 tokens per second.
    - **Result:** **Because pipeline stages overlap, the theoretical maximum throughput is 100 tokens/s, ignoring the sums of other stages.**
