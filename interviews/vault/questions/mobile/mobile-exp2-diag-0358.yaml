title: NPU Memory Bandwidth Contention
scenario: A vision model converted to TFLite is deployed on the Samsung Exynos 2400 NPU. The device features
  a dual-core NPU with 34.7 TOPS and shares 12 GB of LPDDR5X memory across the CPU, GPU, and ISP. During
  field testing, engineers observe that while median inference latency is excellent, 99th percentile latency
  spikes by 5x specifically when the camera ISP is simultaneously processing high-resolution video frames.
  What is the root cause of these latency spikes?
details:
  realistic_solution: The root cause is memory bandwidth contention. Because the 12 GB LPDDR5X memory
    is shared, the ISP consuming massive bandwidth for high-resolution video starves the NPU of data.
    To resolve this, the deployment engineer must optimize the model's memory footprint (e.g., ensuring
    fully quantized INT8 operators to minimize weight fetching) or implement a scheduler that throttles
    NPU inferences during peak ISP buffer flushes.
  common_mistake: Candidates often misdiagnose this as NPU thermal throttling or assume the TFLite runtime
    has operator coverage gaps that trigger slow CPU fallbacks. They fail to identify the architectural
    bottleneck of shared memory subsystems in mobile SoCs.
  napkin_math: LPDDR5X typically provides a peak memory bandwidth of ~68 GB/s. A heavy 4K 60FPS ISP workload
    can consume up to 40 GB/s, while the OS and CPU require ~15 GB/s, leaving only ~13 GB/s for the NPU.
    If an unoptimized model generates 300 MB of total memory traffic (weights + activations) per inference
    and runs at 30 FPS, it requires 300 MB * 30 = 9 GB/s. During ISP burst activity, available bandwidth
    can temporarily drop below this 9 GB/s threshold. Consequently, despite having a massive 34.7 TOPS
    compute capacity, the dual-core NPU is forced to stall while waiting for data, resulting in extreme
    latency spikes.
