title: Architecting Real-Time Audio Ingestion for Hexagon NPU
scenario: You are designing an always-on, real-time audio transcription pipeline for a flagship smartphone. The system must continuously ingest a 16kHz audio stream, extract features, and run a transcription model without draining the battery. The target platform is the Qualcomm Hexagon NPU (45 TOPS INT8) sharing 12-16 GB LPDDR5X memory.
question: How would you architect the data ingestion, buffering, and processing pipeline, justifying your decisions on where each stage of the pipeline should execute to balance latency and power?
details:
  realistic_solution: The optimal design uses a low-power always-on sensor hub or dedicated DSP to buffer incoming audio and compute basic features (like log-mel spectrograms) in small SRAM. Once a sufficient chunk (e.g., 1 second) is gathered, it is transferred via DMA to the shared 12-16 GB LPDDR5X memory. The CPU then wakes the Hexagon NPU to process the batched chunk in a single high-speed burst, leveraging its massive 45 TOPS INT8 capacity, and then returns to a low-power state.
  common_mistake: |
    **The Pitfall:** Designing a system that streams tiny audio frames directly to the NPU or wakes the CPU for every frame.
    **The Rationale:** Candidates prioritize pure latency over power efficiency, failing to recognize the high energy cost of frequent NPU wake-ups.
    **The Consequence:** The constant memory access to LPDDR5X and CPU/NPU wake-ups completely drain the device battery.
  napkin_math: |
    * Ingestion: 16kHz 16-bit audio generates 32 KB/sec.
    * Buffering 1 second of audio requires 32 KB of SRAM on a low-power sensor hub.
    * NPU Burst: Processing 1 second of audio with a 2 GOPS INT8 model takes (2 × 10^9) / (45 × 10^12) = 44 microseconds.
    * **Burst processing allows the NPU to remain completely idle for 99.99% of the time, maximizing power savings.**
