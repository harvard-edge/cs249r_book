title: Architecting Real-Time Audio Ingestion for Hexagon NPU
scenario: You are designing an always-on, real-time audio transcription pipeline for
  a flagship smartphone. The system must continuously ingest a 16kHz audio stream,
  extract features, and run a transcription model without draining the battery. The
  target platform is the Qualcomm Hexagon NPU (Snapdragon 8 Gen 3) which offers 45
  TOPS INT8 compute and shares 12-16 GB of LPDDR5X memory with the CPU/GPU. Architect
  the data ingestion, buffering, and processing pipeline, justifying your decisions
  on where each stage of the pipeline should execute to balance latency and power.
question: How would you architect the data ingestion, buffering, and processing pipeline,
  justifying your decisions on where each stage of the pipeline should execute to
  balance latency and power?
details:
  realistic_solution: The optimal design uses a low-power always-on sensor hub or
    dedicated DSP to buffer incoming audio and compute basic features (like log-mel
    spectrograms) in small SRAM. Once a sufficient chunk (e.g., 1 second) is gathered,
    it is transferred via DMA to the shared 12-16 GB LPDDR5X memory. The CPU then
    wakes the Hexagon NPU to process the batched chunk in a single high-speed burst,
    leveraging its massive 45 TOPS INT8 capacity, and then returns to a low-power
    state.
  common_mistake: Candidates frequently design a system that streams tiny audio frames
    directly to the NPU or wakes up the CPU for feature extraction on every frame.
    They fail to recognize the high energy cost of frequent memory access to the shared
    LPDDR5X RAM and the overhead of constantly waking the NPU.
  napkin_math: Ingesting 16kHz 16-bit audio generates 32 KB/sec of data. If the sensor
    hub buffers 1 second, it requires 32 KB of SRAM. When transferred to the LPDDR5X
    RAM, processing this 1-second audio chunk with a 2 GOPS INT8 model on the Qualcomm
    Hexagon NPU (Snapdragon 8 Gen 3) operating at 45 TOPS takes only (2 / 45,000)
    seconds, or roughly 44 microseconds. This burst-processing strategy keeps the
    NPU idle for 99.99% of the time, drastically saving power compared to frame-by-frame
    continuous streaming.
