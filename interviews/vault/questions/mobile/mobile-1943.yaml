title: Federated Learning Flash Memory Wear
scenario: "You are deploying federated learning on Android devices to train a keyboard prediction model overnight."
question: "Explain why saving model updates to flash memory during federated training must be carefully balanced against storage wear out."
details:
  realistic_solution: |
    Mobile flash memory (UFS/eMMC) has strictly limited Program/Erase (P/E) cycles. Naively checkpointing a model state after every mini-batch over thousands of steps would incur gigabytes of write amplification daily, rapidly exhausting the NAND flash endurance. Adopt an in-memory aggregation strategy, retaining checkpoint deltas in LPDDR RAM and flushing to non-volatile storage only upon training completion or critical battery events.
  common_mistake: |
    **The Pitfall:** Treating mobile non-volatile storage like infinite-endurance DRAM.
    **The Rationale:** Engineers ignore the limited Program/Erase (P/E) cycles of UFS/eMMC flash storage.
    **The Consequence:** Permanent physical degradation of the user's mobile device.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Checkpoint size: 50MB.
       - Flush Frequency: Every 1000 steps.
       - Training volume: 1000 flushes per day.
    2. **Calculations:**
       - Total writes: 50MB/flush * 1000 flushes/day = 50,000MB/day = 50GB/day.
    3. **Conclusion & Interpretation:**
       - **Result: 50GB/day write volume.** This will rapidly exhaust the device's storage lifespan, causing a **hardware degradation bottleneck**.
