title: Federated Learning Flash Memory Wear
scenario: You are deploying federated learning on Android devices to train a keyboard
  prediction model overnight.
question: Explain why saving model updates to flash memory during federated training
  must be carefully balanced against storage wear out.
details:
  realistic_solution: Mobile flash memory (UFS/eMMC) has limited Program/Erase (P/E)
    cycles. Naively checkpointing a model after every mini-batch over thousands of
    steps would write gigabytes daily, quickly degrading the storage hardware. Checkpoints
    must be kept in RAM and flushed minimally.
  common_mistake: Believing that mobile non-volatile storage has infinite write endurance
    similar to DRAM.
  napkin_math: 50MB * 1000 steps = 50GB/day written.
