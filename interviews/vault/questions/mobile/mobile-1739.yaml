title: Federated Learning for On-Device LLM on Apple A17 Pro
scenario: "You are designing a privacy-preserving on-device learning system for a next-generation predictive text keyboard using federated learning on iPhones equipped with the Apple A17 Pro chip."
question: "How would your design orchestrate federated averaging for millions of A17 Pro devices handling non-IID data?"
details:
  realistic_solution: |
    Deploy Federated Dropout and network-aware client sampling. Mitigate the massive communication bottleneck via top-K gradient sparsification and INT8 weight quantization. Address non-IID data distributions using personalized layers (FedPer) kept entirely local. Exploit the A17 Pro's Neural Engine via CoreML for high-throughput, low-energy forward passes, minimizing battery impact during background execution.
  common_mistake: |
    **The Pitfall:** Ignoring device heterogeneity and network uplink constraints.
    **The Rationale:** Engineers assume simple Federated Averaging will scale without significant modifications tailored to device constraints or non-IID data.
    **The Consequence:** Models that diverge quickly, consuming excessive battery and triggering cellular data overages.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Fleet size: 100,000,000 devices.
       - Dense update size: 1 MB per device.
       - Average upload speed: 5 Mbps (0.625 MB/s).
    2. **Calculations:**
       - Global network traffic: 1 MB * 100,000,000 = 100 TB per round.
       - Device upload time: 1 MB / 0.625 MB/s = 1.6 seconds.
    3. **Conclusion & Interpretation:**
       - **Result: 100 TB total upload.** This creates a severe **network-bandwidth bottleneck**. Differential compression is mandatory to reduce payload size.
