title: PhotoKit in On-Device ML Pipelines
scenario: You are developing an on-device photo clustering app for iOS using local CoreML models.
question: What is the primary function of the iOS PhotoKit framework when used as the data ingestion layer for an on-device ML pipeline?
details:
  realistic_solution: PhotoKit provides an optimized API to query, retrieve, and cache image assets directly from the local library. It handles permissions and abstracts efficient thumbnail generation and decoding, cleanly feeding raw pixel buffers into the CoreML pipeline.
  common_mistake: |
    **The Pitfall:** Assuming PhotoKit performs the actual ML inference or clustering itself.
    **The Rationale:** Developers conflate the data pipeline framework with the execution engine (CoreML or Vision).
    **The Consequence:** Misarchitecting the app by searching for ML classification APIs within PhotoKit instead of using it strictly for efficient asset retrieval.
  napkin_math: |
    1. **Operation:** 1 API call $\rightarrow$ properly scaled and cropped `UIImage`.
    2. **Conclusion:** Saves memory and CPU cycles compared to manually loading full-resolution JPEGs.
