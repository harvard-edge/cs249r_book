title: The Samsung Exynos NPU Fragmentation
scenario: Your app ships a face mesh model to Samsung Galaxy phones. You test on the Galaxy S24 (Exynos 2400) and it works great at 8ms. Then bug reports flood in: Galaxy S22 (Exynos 2200) users get garbled outputs, and Galaxy S21 (Exynos 2100) users see 45ms latency. All use the same model binary and TFLite version.
question: How do you ship one model that works across three Exynos generations with vastly different NPU architectures?
details:
  realistic_solution: Three Exynos generations have different NPU architectures. 2400 (S24): full support = 8ms. 2200 (S22): grouped conv bug = garbled output. 2100 (S21): insufficient op support = CPU fallback at 45ms. Fix: three model variants via Play Store device targeting. A (original) for 2400. B (grouped->standard conv, +14% weights) for 2200. C (GPU-optimized TFLite) for 2100 at 12ms. Per-user download: 4-5 MB. 50ms startup benchmark verifies correctness.
  common_mistake: |
    **The Pitfall:** Blaming the TFLite runtime and waiting for a software patch.
    **The Rationale:** Engineers fail to realize that SoC manufacturers change NPU architectures aggressively between generations, leading to shifting operator support and compilation bugs.
    **The Consequence:** Leaving broken experiences in production for months while waiting for an upstream fix that may never arrive.
  napkin_math: |
    1. **Model A (Exynos 2400):** 4.2 MB, 8ms on NPU.
    2. **Model B (Exynos 2200):** 4.8 MB, 9ms on NPU (fixes grouped conv bug).
    3. **Model C (Exynos 2100):** 4.0 MB, 12ms on GPU (Mali).
    4. **Market Share:** S24 (35%), S23/S22 (50%), S21 (15%).
    5. **Weighted Average Latency:** (0.35 * 8ms) + (0.50 * 9ms) + (0.15 * 12ms) = **9.1ms**.
