title: Distilling LLMs for Tensor G3 TPU Deployment
scenario: You are tasked with deploying a large language model to mobile devices powered by the Google
  Tensor G3 chip, which is optimized for on-device LLMs like Gemini Nano. To fit within the 12 GB LPDDR5X
  system memory while leaving ample room for the OS, you must design a distillation pipeline to transfer
  knowledge from a 7B parameter teacher to a 1.5B parameter student model. You need to evaluate the tradeoffs
  between feature-based and logit-matching distillation to ensure the student model maximally utilizes
  the G3's 7.5 TOPS TPU.
question: "How would you distill an LLM for Tensor G3 TPU deployment using hardware-friendly student architecture choices?"
details:
  realistic_solution: A strong L5 candidate will advocate for hardware-aware distillation, selecting a
    student architecture with TPU-friendly operators (e.g., grouped-query attention). They will evaluate
    layer-wise feature distillation combined with logit matching, while simultaneously applying quantization-aware
    training (QAT) to INT8. This ensures the 1.5B student not only matches the teacher's quality but executes
    seamlessly on the G3 TPU without memory bandwidth bottlenecks.
  common_mistake: Candidates often propose standard KL-divergence logit matching without considering the
    specific hardware constraints. They frequently fail to realize that to leverage the G3 TPU efficiently,
    the student architecture must be strictly co-designed for INT8 matrix multiplication, and distillation
    should incorporate quantization-aware training.
  napkin_math: A 1.5B parameter student model in FP16 requires ~3GB of memory. By applying INT8 QAT during
    distillation, the footprint drops to ~1.5GB, easily coexisting with the OS in the 12 GB LPDDR5X RAM.
    Generating 1 token requires roughly 1.5B * 2 = 3 GOPs. To achieve a target of 15 tokens/sec, the model
    requires 45 GOPs/sec (0.045 TOPS). Given the G3 TPU provides 7.5 TOPS, compute is fully sufficient,
    meaning the primary bottleneck to manage via distillation and architectural choice is DRAM bandwidth
    (roughly 50-60 GB/s on LPDDR5X).
