title: Optimizing On-Device Image Classification Dataset with Active Learning on Apple A17 Pro
scenario: An on-device image classification model on the Apple A17 Pro struggles with low-light photos. An active learning pipeline will be implemented to identify uncertain predictions on-device and send them for human annotation.
question: How would you design an active learning pipeline that minimizes on-device cost while ensuring high-quality data selection?
details:
  realistic_solution: A realistic solution involves a multi-stage active learning strategy. On-device, a lightweight uncertainty sampling method (e.g., confidence-based thresholding or a simple margin sampling using the A17 Pro's Neural Engine for inference) would identify a preliminary set of potentially valuable samples. These samples would then undergo a server-side filtering process to remove duplicates, near-duplicates, and out-of-distribution samples using more powerful models. Prioritization for human annotation would be based on both uncertainty and diversity metrics (e.g., KMeans clustering in feature space). Additionally, strict annotation guidelines, regular inter-annotator agreement (IAA) calculations (e.g., Kappa score), and a feedback loop with annotators are crucial to maintain label quality. The annotation workflow itself should support quick and accurate labeling, potentially with pre-annotation suggestions from the current model. The power budget of 5W on the A17 Pro means on-device inference for uncertainty sampling must be highly optimized, possibly leveraging quantized models or sparse activations.
  common_mistake: |
    **The Pitfall:** Using a computationally heavy uncertainty sampling method on-device.

    **The Rationale:** Overlooking the power constraints of the mobile environment in favor of maximum sampling accuracy.

    **The Consequence:** Draining the user's battery excessively and slowing down the app experience.
  napkin_math: |
    *   Daily active inference: 10,000 images * 100ms/image = 1000 seconds.
    *   Power consumption: 3W * (1000s / 3600s) = 0.83 Wh.
    *   Battery impact: 0.83 Wh / 12.8 Wh battery = ~6.5% daily budget.
    *   Annotation cost: 10,000 images / 100 images/hr = **100 hours of human labeling**.
