title: The NPU Fallback Memory Cost
scenario: You are deploying a 5 million parameter image segmentation model on a modern smartphone. The phone's NPU natively supports FP16 precision. However, 10% of the model's parameters belong to custom layers that the NPU does not support, forcing them to fall back to the CPU for execution using INT8 quantization.
question: How would you calculate the total memory in megabytes (MB) required to store the model's weights?
details:
  realistic_solution: 'The solution requires calculating the memory for the two parts of the model separately and then summing them. 90% of the model''s parameters (4.5 million) are stored in FP16 (2 bytes/param), while the remaining 10% (0.5 million) are stored in INT8 (1 byte/param) for the CPU fallback.'
  common_mistake: |
    **The Pitfall:** Calculating the memory for the entire model using only the primary precision (FP16).
    **The Rationale:** Candidates forget that the fallback portion has a different, smaller memory footprint or assume all parameters are quantized identically.
    **The Consequence:** Incorrect memory sizing that overestimates the required footprint.
  napkin_math: |
    **Assumptions & Constraints:**
    - Total parameters: 5,000,000.
    - NPU Precision (FP16): 90% of parameters (2 bytes/param).
    - CPU Precision (INT8): 10% of parameters (1 byte/param).

    **Calculations:**
    - NPU Parameters = 5,000,000 * 0.90 = 4,500,000 params.
    - NPU Memory = 4,500,000 * 2 bytes = 9,000,000 bytes = 9.0 MB.
    - CPU Parameters = 5,000,000 * 0.10 = 500,000 params.
    - CPU Memory = 500,000 * 1 byte = 500,000 bytes = 0.5 MB.
    - Total Memory = 9.0 MB + 0.5 MB = 9.5 MB.

    **Conclusion & Interpretation:**
    - **Result: 9.5 MB total weight footprint (Memory Capacity-Bound).**
  options:
  - '10.0 MB'
  - '5.0 MB'
  - '9.5 MB'
  - '5.5 MB'
