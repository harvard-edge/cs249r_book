title: DP-SGD Memory Constraints on Exynos NPU
scenario: You are designing a federated learning client for a language model to run
  natively on the Samsung Exynos 2400 NPU. To satisfy a strict local privacy budget
  (epsilon = 2.0), you must implement DP-SGD with per-sample gradient clipping. Given
  the NPU's 34.7 TOPS compute capacity and the shared 12 GB LPDDR5X memory architecture,
  evaluate the memory and compute tradeoffs and size the maximum allowable micro-batch
  size to prevent OS eviction.
question: How should DP-SGD micro-batches or ghost clipping be sized for Exynos NPU
  memory constraints?
details:
  realistic_solution: The optimal approach is to calculate a strict upper bound on
    the micro-batch size based on available background memory (typically constrained
    to 1-2 GB), or to use memory-efficient 'ghost clipping' techniques that avoid
    materializing the full per-sample gradient tensor. By keeping the memory footprint
    under the OS threshold, the dual-core NPU can safely process smaller batches sequentially
    without triggering system instability.
  common_mistake: Candidates often assume the 34.7 TOPS NPU will be the bottleneck
    for training and overlook that DP-SGD requires instantiating per-sample gradients
    before aggregation. They fail to realize that in a shared 12 GB LPDDR5X architecture,
    contending with the OS, GPU, and ISP, background NPU tasks will be aggressively
    OOM-killed if they demand gigabytes for gradient materialization.
  napkin_math: Assume a 50M parameter model in FP16 (100 MB for weights). Standard
    aggregated gradients take 100 MB. DP-SGD requires per-sample gradients, consuming
    B * 100 MB for micro-batch size B. If the OS restricts background NPU tasks to
    2 GB of the shared 12 GB LPDDR5X memory, and model + activations consume ~500
    MB, we have 1.5 GB remaining. Max micro-batch size B = 1.5 GB / 100 MB = 15. At
    34.7 TOPS, processing B=15 takes << 100 milliseconds, proving memory limits batch
    size, not compute.
