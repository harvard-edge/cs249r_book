title: DP-SGD Memory Constraints on Exynos NPU
scenario: You are designing a federated learning client for a language model to run natively on the Samsung Exynos 2400 NPU. To satisfy a strict local privacy budget (epsilon = 2.0), you must implement DP-SGD with per-sample gradient clipping. Given the NPU's 34.7 TOPS compute capacity and the shared 12 GB LPDDR5X memory architecture.
question: How should DP-SGD micro-batches or ghost clipping be sized for Exynos NPU memory constraints?
details:
  realistic_solution: The optimal approach is to calculate a strict upper bound on the micro-batch size based on available background memory (typically constrained to 1-2 GB), or to use memory-efficient 'ghost clipping' techniques that avoid materializing the full per-sample gradient tensor. By keeping the memory footprint under the OS threshold, the dual-core NPU can safely process smaller batches sequentially without triggering system instability.
  common_mistake: |
    **The Pitfall:** Overlooking per-sample gradient materialization in DP-SGD.
    **The Rationale:** Candidates assume standard aggregated gradients, where memory size is independent of batch size.
    **The Consequence:** They choose a large micro-batch size that demands gigabytes of RAM to store unaggregated gradients, triggering immediate Out-Of-Memory (OOM) evictions by the OS.
  napkin_math: |
    - Allowed background NPU RAM limit: 2 GB.
    - Base footprint (weights + activations): 500 MB.
    - Available memory for gradients: 2.0 GB - 0.5 GB = 1.5 GB.
    - Single per-sample gradient size: 100 MB.
    - **Max micro-batch size (B):** 1.5 GB / 100 MB = **15**.
