title: The Mobile NPU Ridge Point
scenario: You're evaluating the new Apple A17 Pro NPU for your team's next-gen feature. Its datasheet lists a peak performance of 35 TOPS (INT8) and a memory bandwidth of 51.2 GB/s.
question: What is the A17 Pro roofline ridge point for 35 TOPS compute and 51.2 GB/s memory bandwidth?
details:
  realistic_solution: The ridge point is the minimum Arithmetic Intensity (Ops/Byte) a workload needs to become compute-bound. It's the 'corner' of the roofline model where performance transitions from being limited by memory bandwidth to being limited by peak compute.
  common_mistake: |
    **The Pitfall:** Calculating the ridge point correctly but failing to explain its practical meaning.
    **The Rationale:** Candidates memorize the formula without connecting it to the boundary between memory-bound and compute-bound execution.
    **The Consequence:** The metric is calculated but cannot be used to guide actual model optimization decisions.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Peak Compute = 35 TOPS = 35 * 10^12 Operations/second
       - Memory Bandwidth = 51.2 GB/s = 51.2 * 10^9 Bytes/second
    2. **Calculations:**
       - Ridge Point = Compute / Bandwidth
       - Ridge Point = (35 * 10^12) / (51.2 * 10^9) = 35000 / 51.2 = 683.59 Ops/Byte
    3. **Conclusion & Interpretation:**
       - **Result: ~684 Ops/Byte. The workload must have an Arithmetic Intensity greater than 684 Ops/Byte to be compute-bound.**
  options:
  - ~0.68 Ops/Byte. This is the arithmetic intensity.
  - ~0.0014 Bytes/Op. This is the memory required per operation.
  - ~684 Ops/Byte. This is the minimum arithmetic intensity required to be compute-bound.
  - ~5468 Ops/Byte. This is the ridge point, calculated by converting bytes to bits.
  correct_index: 2
