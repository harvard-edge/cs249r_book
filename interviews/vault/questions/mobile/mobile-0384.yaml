title: The Mobile NPU Ridge Point
scenario: You're evaluating the new Apple A17 Pro NPU for your team's next-gen feature. Its datasheet
  lists a peak performance of 35 TOPS (INT8) and a memory bandwidth of 51.2 GB/s. A junior engineer asks
  you what the 'ridge point' is and why it matters. How would you explain and calculate it?
details:
  realistic_solution: The ridge point is the minimum Arithmetic Intensity (Ops/Byte) a workload needs
    to become compute-bound. It's the 'corner' of the roofline model where performance transitions from
    being limited by memory bandwidth to being limited by peak compute.
  common_mistake: Engineers often calculate the ridge point correctly but cannot explain what it *means*.
    They fail to connect it to the practical boundary between being memory-bound (performance limited
    by memory speed) and compute-bound (performance limited by ALU throughput). Another common error is
    inverting the ratio (calculating Bytes/Op) or making a 1000x error by mishandling the 'Tera' and 'Giga'
    prefixes.
  napkin_math: '1.  **Identify Parameters:** | Peak Compute ($R_{\text{peak}}$): 35 TOPS = 35 × 10¹² Operations/second
    | Memory Bandwidth (BW): 51.2 GB/s = 51.2 × 10⁹ Bytes/second'
  options:
  - ~0.68 Ops/Byte. This is the arithmetic intensity.
  - ~0.0014 Bytes/Op. This is the memory required per operation.
  - ~684 Ops/Byte. This is the minimum arithmetic intensity required to be compute-bound.
  - ~584 Ops/Byte. This is the ridge point for a competing chip.
  correct_index: 2
