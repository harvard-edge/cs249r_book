title: Designing for Memory Pressure on Google Tensor G3
scenario: You are deploying an LLM onto a device with 12 GB of LPDDR5X memory. The LLM requires 10 GB of memory for its weights and activations, and an additional 4 GB during inference for intermediate tensors.
question: How would you optimize the LLM for real-time, low-latency inference while avoiding out-of-memory (OOM) errors and minimizing memory fragmentation?
details:
  realistic_solution: A multi-pronged approach involving INT4 quantization, dynamic tensor management (arena allocators), and activation compression to fit within the constraints.
  common_mistake: |
    **The Pitfall:** Ignoring dynamic memory allocations and OS overhead.
    **The Rationale:** Candidates often only consider the static memory footprint of the model weights and apply desktop-centric memory management strategies.
    **The Consequence:** The system will experience excessive fragmentation or unexpected OOMs during peak load due to unmanaged intermediate tensors.
  napkin_math: |
    1. Calculate usable memory: 12 GB total - 2 GB OS = 10 GB usable. Peak LLM requirement is 14 GB (10 GB + 4 GB), resulting in OOM.
    2. Apply Quantization: Reducing FP16 (2 bytes/param) to INT4 (0.5 bytes/param) yields a 4x reduction. 10 GB FP16 weights -> **2.5 GB INT4 weights**.
    3. Apply Activation Compression: 4 GB FP16 activations = 2 billion parameters. Compressing 2x reduces this to **2 GB**.
    4. Calculate optimized total: 2.5 GB + 2 GB = **4.5 GB**, fitting safely within the 10 GB limit.
