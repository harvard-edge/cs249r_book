title: Designing for Memory Pressure on Google Tensor G3
scenario: You are deploying an LLM onto a device with 12 GB of LPDDR5X memory. The LLM requires 10 GB for weights and 4 GB for intermediate tensors.
question: How would you optimize the LLM for real-time inference while avoiding OOM errors and minimizing fragmentation?
details:
  realistic_solution: |
    A multi-pronged approach involving INT4 W4A16 quantization, dynamic tensor management (arena allocators), and activation compression to fit within the constraints.
  common_mistake: |
    **The Pitfall:** Ignoring dynamic memory allocations and OS overhead.
    **The Rationale:** Candidates often only consider the static memory footprint of the model weights and apply desktop-centric memory management strategies.
    **The Consequence:** The system will experience excessive fragmentation or unexpected OOMs during peak load due to unmanaged intermediate tensors.
  napkin_math: |
    **Assumptions & Constraints:**
    - Usable RAM: 12 GB - 2 GB OS = 10 GB usable.
    - Baseline peak footprint: 14 GB.

    **Calculations:**
    - W4A16 Quantization: 10 GB FP16 weights -> 2.5 GB INT4 weights.
    - Activation Compression: 4 GB FP16 activations -> 2 GB.
    - Optimized Total: 2.5 GB + 2 GB = 4.5 GB.

    **Conclusion & Interpretation:**
    - **Result: Memory Footprint Reduction.** Combining INT4 weights with compressed activations reduces the peak footprint from an OOM-inducing 14GB to a safe 4.5GB.
