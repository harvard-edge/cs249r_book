title: Mobile LoRA Checkpointing
scenario: A background training task on a Snapdragon 8 Gen 3 fails randomly due to
  thermal OS evictions. Saving a full 4GB model checkpoint takes 4 seconds, causing
  severe UI stutter.
question: Evaluate the effectiveness of using differential checkpointing (saving only
  updated LoRA adapters) to eliminate the I/O stutter while retaining fault tolerance.
details:
  realistic_solution: Differential checkpointing via Low-Rank Adaptation (LoRA) isolates
    the trainable weights into tiny matrices, usually totaling under 20MB. Instead
    of halting the UI thread to flush 4GB of dense parameters to storage, the app
    only serializes the 20MB delta. At typical mobile NVMe write speeds, this takes
    a fraction of a second. This virtually eliminates UI blocking while guaranteeing
    perfect fault tolerance, as the frozen 4GB base model is already cached safely
    on disk.
  common_mistake: Assuming LoRA alters the forward pass latency, rather than identifying
    its massive impact on reducing backprop and checkpointing I/O volume.
  napkin_math: 'Full model: 4GB / 1GB/s = 4.0s stutter. LoRA delta: 20MB / 1GB/s =
    0.02s stutter. 99.5% reduction.'
