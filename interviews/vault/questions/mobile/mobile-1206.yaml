title: A17 Pro OOM Analysis with KV Cache Scaling
scenario: You are deploying a 2B parameter transformer model for text summarization on an edge device. The model weights are quantized to INT8, requiring exactly 2 GB of memory. The OS limits your application's total memory usage to a maximum of 3.5 GB. When attempting to process a sequence of 4096 tokens, the OS consistently terminates the app for exceeding memory limits, even though the static weights fit comfortably within the 3.5 GB budget.
question: Analyze why the dynamic inference memory footprint exceeds the limit during this specific generation task.
details:
  realistic_solution: The candidate must calculate the size of the KV cache for the
    4096-token sequence and add it to the static weight memory. While weights are
    INT8, the A17 Pro Neural Engine typically operates on FP16 activations to preserve
    generation quality. The combined size of the 2 GB weights, the growing FP16 KV
    cache, and basic app overhead exceeds the strict 3.5 GB iOS per-app limit, causing
    the termination.
  common_mistake: |
    **The Pitfall:** Assuming memory footprint is dictated entirely by model weights.
    **The Rationale:** Candidates ignore dynamic memory overhead and frequently fail to calculate the KV cache size, or mistakenly assume activations are INT8 rather than FP16.
    **The Consequence:** The deployed application crashes with OOM exceptions during long-context generation tasks.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model Weights (INT8): 2.0 GB.
       - Sequence Length: 4096 tokens.
       - Architecture: 32 layers, 2560 hidden dim.
       - Activations/KV-Cache Precision: FP16 (2 bytes).
       - OS Memory Ceiling: 3.5 GB.
    2. **Calculations:**
       - KV-Cache per token = 2 (Key & Value) * 32 layers * 2560 dim * 2 bytes = 327,680 bytes.
       - Total KV-Cache (4096 tokens) = 327,680 * 4096 = ~1.34 GB.
       - Total Required Memory = 2.0 GB (weights) + 1.34 GB (KV Cache) = 3.34 GB.
    3. **Conclusion & Interpretation:**
       **Result: Memory-Capacity Bound. The remaining 160 MB is insufficient for intermediate activation buffers, OS overhead, and the app UI, pushing the footprint past the 3.5 GB Jetsam limit and triggering an OOM crash.**
