title: Speculative Decoding Performance Regression
scenario: You implement speculative decoding on a flagship phone to accelerate a 4B target model. You use a 100M draft model running on the CPU. Despite achieving a strong draft acceptance rate of 65% (gamma=4), the overall effective throughput drops from 15 tok/s to 10 tok/s.
question: "Why does speculative decoding reduce mobile throughput despite a 65% draft acceptance rate?"
details:
  realistic_solution: The performance regression is caused by the heterogeneous compute synchronization overhead between the CPU and the NPU. Speculative decoding requires the draft model (CPU) to send its generated token IDs and KV data to the target model (NPU) for validation. Mobile SoCs do not have cache-coherent unified memory between the CPU and the NPU in the same way server GPUs do. The OS must perform expensive cross-device buffer synchronizations, cache flushes, and driver API calls for every single speculative step. This latency completely negates the compute savings of skipping target model decode steps.
  common_mistake: |
    **The Pitfall:** Assuming the CPU draft model is too slow.
    **The Rationale:** Candidates treat mobile heterogeneous compute like a server GPU setup, ignoring the massive OS-level synchronization overhead between CPU and NPU memory domains.
    **The Consequence:** Wasting time optimizing the 100M draft model when the bottleneck is actually the cross-device data transfers and driver API latency.
  napkin_math: |
    1. **Assumptions & Constraints:** CPU draft model generates 4 tokens (40ms). NPU validation (70ms). Hardware cross-device memory sync takes 250ms per step.
    2. **Calculations:** Total Time per Step: 40 + 70 + 250 = 360ms. Accepted Tokens: 1 + (4 * 0.65) = 3.6 tokens. Speed = 3.6 tokens / 0.36s = 10 tok/s.
    3. **Conclusion & Interpretation:** Cross-device hardware synchronization drops speed to **10 tok/s**. **Result: Sync-Bound**.
