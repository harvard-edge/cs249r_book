title: The Privacy-Utility Squeeze
scenario: You're implementing federated learning for a next-word prediction model across 100 million Android devices. Each device fine-tunes locally and uploads gradient updates. The privacy team mandates differential privacy with ε = 2. After deployment, the model's perplexity is 40% worse than centralized training. The PM asks you to 'just increase epsilon.'
question: What should you tell the PM when epsilon 2 differential privacy makes federated next-word prediction 40% worse?
details:
  realistic_solution: 'The problem isn''t just ε — it''s the interaction between DP noise, client heterogeneity, and the communication budget. With ε = 2, the per-update Gaussian noise scale is large relative to the gradient signal from a single device''s small local dataset (maybe a few hundred sentences). But simply increasing ε is a one-way door: once you ship a weaker privacy guarantee, you can''t retroactively strengthen it for data already collected.'
  common_mistake: |
    **The Pitfall:** Treating ε as a simple tuning knob to fix accuracy drops.
    **The Rationale:** Engineers and PMs believe that relaxing privacy to ε=8 or 10 is an easy fix without understanding the interaction between DP noise, client heterogeneity, and communication budgets.
    **The Consequence:** Increasing ε is a one-way door; once a weaker privacy guarantee is shipped, you cannot retroactively strengthen it for data already collected.
  napkin_math: |
    - **Client Scaling:** Noise on the average gradient = $\sigma_{sum} / n$. Increasing clients from 1k to 10k reduces noise by 10x (10x better SNR).
    - **Parameter Reduction:** DP noise is added to every parameter. The L2 norm of the noise vector scales with $\sqrt{d}$.
    - **LoRA Application:** 85M params vs 600K LoRA params = 142x fewer parameters.
    - **Noise Reduction:** $\sqrt{142} \approx 11.9x$ noise reduction.
    - **Conclusion:** Combining 10x more clients with LoRA yields **119x better effective SNR** while maintaining the exact same ε=2 guarantee.
