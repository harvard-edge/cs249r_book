title: The Privacy-Utility Squeeze
scenario: You're implementing federated learning for a next-word prediction model across 100 million Android
  devices. Each device fine-tunes locally and uploads gradient updates. The privacy team mandates differential
  privacy with ε = 2. After deployment, the model's perplexity is 40% worse than centralized training.
  The PM asks you to 'just increase epsilon.' What do you tell them?
details:
  realistic_solution: 'The problem isn''t just ε — it''s the interaction between DP noise, client heterogeneity,
    and the communication budget. With ε = 2, the per-update Gaussian noise scale is large relative to
    the gradient signal from a single device''s small local dataset (maybe a few hundred sentences). But
    simply increasing ε is a one-way door: once you ship a weaker privacy guarantee, you can''t retroactively
    strengthen it for data already collected.'
  common_mistake: '"ε = 2 is too strict, we should relax to ε = 8 or 10." This treats ε as a tuning knob
    without understanding the system-level trade-offs.'
  napkin_math: '**Standard DP-SGD noise scale:** σ = (C × √(2 ln(1.25/δ))) / ε, where C = clipping norm,
    applied per-sample. At ε=2, δ=10⁻⁸, C=1.0: √(2 ln(1.25/10⁻⁸)) = √(2 x 18.95) = √37.9 = 6.16. σ_per_sample
    = 1.0 x 6.16 / 2 = **3.08.** | **With aggregation over n clients per round:** Noise per aggregate
    = σ_per_sample / √n. At n=1,000: σ_agg = 3.08 / √1000 = 3.08 / 31.6 = **0.097.** At n=10,000: σ_agg
    = 3.08 / √10000 = 3.08 / 100 = **0.031.** | **Signal-to-noise improvement:** 10x more clients => √10
    ≈ 3.16x less noise — same privacy guarantee. | **LoRA dimension reduction:** Full model: 85M params.
    LoRA rank-8 on 768-dim model: ~600K trainable params. Ratio: 85M / 600K ≈ **142x fewer params.** Gradient
    signal concentrates into 142x fewer dimensions, dramatically improving SNR without touching ε. | **Combined
    fix:** 10x clients + LoRA = √10 x 142 ≈ **450x better effective SNR** at the same ε=2. This recovers
    most of the 40% perplexity gap without relaxing privacy.'
