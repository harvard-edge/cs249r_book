title: Voice Assistant Bursty Queue
scenario: An A17 Pro Neural Engine transcribes voice queries. The arrival pattern
  occasionally bursts intensely.
question: Evaluate why tail latency spikes under bursty arrivals compared to uniform
  arrivals despite the same average utilization.
visual:
  kind: svg
  path: mobile-1967.svg
  alt: 'Two queueing curves: bursty traffic shows latency spiking at much lower utilization
    than uniform traffic.'
  caption: Impact of arrival burstiness on wait time.
details:
  realistic_solution: Bursty arrivals increase the coefficient of variation of inter-arrival
    times (c_a > 1). Based on Kingman's formula, expected queueing delay scales linearly
    with (c_a^2 + c_s^2)/2. Thus, high burstiness geometrically amplifies wait times
    and tail latency, even if average utilization (rho) remains moderate.
  common_mistake: Relying purely on average utilization to predict latency, failing
    to account for variance (c_a).
  napkin_math: Wait ~ (c_a^2 + c_s^2)/2
