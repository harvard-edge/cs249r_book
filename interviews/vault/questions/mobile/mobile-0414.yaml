title: The Stuttering Generative Keyboard
scenario: You are the lead ML systems engineer for a new generative AI keyboard feature on a flagship smartphone. The feature suggests follow-up text as the user types. Telemetry shows that the Time-To-First-Token (TTFT) is ~80ms, and subsequent Time-Per-Output-Token (TPOT) is ~39ms against a 60Hz UI.
question: What most likely causes keyboard stutter when TTFT is 80ms and TPOT is 39ms against a 16.67ms UI deadline?
details:
  realistic_solution: The most likely cause is a blocking inference pipeline that violates the real-time UI deadline. The correct approach is to re-architect the inference pipeline to be non-blocking, likely using continuous batching or a similar iterative prefill system.
  common_mistake: |
    **The Pitfall:** Misdiagnosing architectural blocking as a pure model speed problem.
    **The Rationale:** Engineers often suggest aggressive quantization or pruning to speed up generation, not realizing that a long TTFT blocks the UI thread.
    **The Consequence:** The core queuing issue remains, and the UI continues to stutter because concurrent user input cannot be processed during generation.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - UI Render Deadline (60Hz): 1000ms / 60 = 16.67ms.
       - TTFT (Time-To-First-Token): 80ms.
       - TPOT (Time-Per-Output-Token): 39ms.
    2. **Calculations:**
       - Frames missed during TTFT: 80ms / 16.67ms = ~4.8 frames.
       - Frames missed per token: 39ms / 16.67ms = ~2.3 frames.
    3. **Conclusion & Interpretation:**
       - **Result: Blocking Execution**. The architecture sequentially blocks the UI thread, causing it to skip multiple frames during both the prefill and decoding phases.
  options:
  - The model is too large; it should be quantized from FP16 to INT8 to reduce TPOT.
  - The inference workload is not being fully delegated to the Apple A17's Neural Engine, falling back to the CPU.
  - The inference pipeline is blocking the UI thread; a non-blocking, continuous batching architecture is needed.
  - The NPU is overheating and thermally throttling, causing intermittent slowdowns.
  correct_index: 2
