title: Calculate Data Pruning Ratio for On-Device Fine-Tuning
scenario: You are designing an on-device daily fine-tuning system using coreset selection for a 1-billion
  parameter INT8 model on the Qualcomm Hexagon NPU (Snapdragon 8 Gen 3). The NPU provides 45 TOPS of INT8
  compute, and you have a strict 10-minute daily background processing window. The user generates 5 million
  tokens of raw text data per day, but due to the shared 12-16 GB LPDDR5X memory bandwidth constraints,
  the NPU only achieves 20% compute utilization for the forward and backward passes (which require 6 operations
  per parameter per token). Calculate the exact data pruning ratio (coreset size as a percentage) required
  to filter the daily data stream so the fine-tuning job completes exactly within the time budget.
question: "How would you calculate the exact data pruning ratio (coreset size as a percentage) required to filter the daily data stream so the fine-tuning job completes exactly within the time budget?"
details:
  realistic_solution: The correct approach involves calculating the total usable operations during the
    10-minute window, determining the operations required to process a single token, and finding the maximum
    processable tokens. Finally, dividing the maximum processable tokens by the raw daily token count
    yields the required pruning ratio, allowing the engineering team to apply a coreset selection algorithm
    to extract the most informative 18% of the data.
  common_mistake: Candidates often forget to account for the 6x multiplier for forward and backward passes
    (2x for forward, 4x for backward) per parameter per token. Another common error is failing to apply
    the 20% utilization factor, assuming theoretical peak TOPS can be fully achieved despite memory bandwidth
    bottlenecks.
  napkin_math: 1. Total compute window = 10 mins * 60 = 600 seconds. 2. Peak NPU compute = 45 TOPS = 45e12
    ops/sec. 3. Total theoretical ops = 45e12 * 600 = 2.7e16 ops. 4. Usable ops at 20% utilization = 2.7e16
    * 0.20 = 5.4e15 ops. 5. Ops per token for 1B model = 6 * 1e9 = 6e9 ops/token. 6. Max processable tokens
    = 5.4e15 / 6e9 = 900,000 tokens. 7. Required data pruning ratio = 900,000 / 5,000,000 = 0.18 or 18%.
