title: Mobile Battery Budget For On-Device AI
scenario: A phone feature runs a 4 W NPU workload for 2 seconds every minute. The
  phone battery stores 15 Wh. Estimate the daily energy consumed by this feature and
  its share of battery capacity.
question: How much battery energy does a 4 W workload running 2 seconds per minute
  consume per day on a 15 Wh phone?
details:
  realistic_solution: The duty cycle is 2/60 = 3.33%. Average power is 4 W x 0.0333
    = 0.133 W. Over 24 hours, energy is 3.2 Wh, about 21% of a 15 Wh battery. That
    is too high for a background feature unless usage is much less than all day.
  common_mistake: Looking at 2-second bursts and assuming they are negligible without
    converting to daily energy.
  napkin_math: Duty = 2/60 = 0.0333. Average power = 0.133 W. Daily energy = 0.133
    x 24 = 3.2 Wh. Share = 3.2/15 = 21%.
