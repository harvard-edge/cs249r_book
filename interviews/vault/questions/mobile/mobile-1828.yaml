title: Mobile Battery Budget For On-Device AI
scenario: A phone feature runs a 4 W NPU workload for 2 seconds every minute. The phone battery stores 15 Wh.
question: How much battery energy does the workload consume per day, and what is its share of the battery capacity?
details:
  realistic_solution: |
    The duty cycle dictates the average power draw. Over 24 hours, the accumulated energy consumed by the feature represents a significant percentage of the entire battery capacity. This is an untenably high power cost for a background mobile feature unless user engagement is tightly constrained.
  common_mistake: |
    **The Pitfall:** Treating burst power consumption as negligible.
    **The Rationale:** Candidates look at short 2-second bursts and fail to integrate the power cost over a full 24-hour cycle.
    **The Consequence:** The feature is deployed and causes severe battery drain complaints, ruining the application's reputation.
  napkin_math: |
    **Assumptions & Constraints:**
    - Workload: 4 W NPU for 2 seconds per minute.
    - Battery capacity: 15 Wh.

    **Calculations:**
    - Duty cycle: 2 seconds / 60 seconds = 3.33%.
    - Average power: 4 W * 0.0333 = 0.133 W.
    - Daily energy consumed: 0.133 W * 24 hours = 3.2 Wh.
    - Share of battery capacity: 3.2 Wh / 15 Wh = 21.3%.

    **Conclusion & Interpretation:**
    - **Result: 3.2 Wh (Power Budget)**. The workload consumes 3.2 Wh per day, draining 21% of the battery.
