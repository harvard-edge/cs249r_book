title: Always-On Wake Word Battery Drain
scenario: A smartphone has a 3000mAh battery operating at 3.8V. We are deploying an always-on wake-word model. Running it on the main CPU consumes a continuous 40mW. Offloading to a dedicated DSP consumes only 4mW continuously, but requires waking up the main LPDDR memory for 10ms every 1 second to flush audio buffers, consuming 200mW during that 10ms spike.
question: How would you calculate the percentage of battery drained over 24 hours for the DSP approach?
details:
  realistic_solution: To calculate battery drain percentage, we first need the total energy capacity of the battery in Watt-hours (Wh). A battery's capacity in mAh must be multiplied by its nominal voltage to get mWh. Next, we determine the average power consumption of the DSP approach. While the DSP uses 4mW continuously, the periodic 10ms memory wake-ups at 200mW add a time-averaged power overhead. We sum the continuous DSP power and the duty-cycled memory power to find the true average power. Finally, we multiply this average power by 24 hours to get the total energy consumed in mWh, and divide by the battery capacity to find the percentage. The DSP approach drains about 1.26% of the battery, making it highly efficient for an always-on task.
  common_mistake: |
    **The Pitfall:** Calculating battery capacity incorrectly or ignoring the duty cycle of memory wake-ups.
    **The Rationale:** Candidates often use mAh directly without converting to Watt-hours, or they forget to average the brief memory power spikes over the entire 1-second window.
    **The Consequence:** Drastically misestimating the battery life impact of always-on features.
  napkin_math: |
    1. Total Battery Capacity: 3000 mAh * 3.8V = 11,400 mWh.
    2. DSP continuous power: 4 mW.
    3. Memory flush duty cycle: 10ms / 1000ms = 0.01 (1%).
    4. Average memory power: 200 mW * 0.01 = 2 mW.
    5. Total average system power: 4 mW + 2 mW = 6 mW.
    6. Energy consumed in 24 hours: 6 mW * 24 h = 144 mWh.
    7. Percentage drained: (144 mWh / 11,400 mWh) * 100 = **1.26%**.
