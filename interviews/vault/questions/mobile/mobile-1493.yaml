title: Designing Mobile Attention for Hexagon NPU
scenario: We are deploying a 7B parameter LLM on a flagship mobile device featuring the Qualcomm Hexagon NPU (Snapdragon 8 Gen 3) with a shared 12 GB LPDDR5X memory pool. The product requirements demand a context window of 8K tokens for a chat application, but standard multi-head attention (MHA) exceeds our memory bandwidth and capacity constraints during the decode phase.
question: How would you design an attention architecture specification that fits within the NPU's capabilities and memory limits while maintaining acceptable generation quality?
details:
  realistic_solution: The optimal design replaces MHA with Grouped-Query Attention (GQA) combined with an INT8 KV cache quantization. GQA strikes a balance between the memory bandwidth savings of MQA and the quality of MHA, reducing the KV cache size by a factor of 8 (assuming 32 heads grouped to 4). Quantizing the KV cache to INT8 aligns perfectly with the Hexagon NPU's 45 TOPS INT8 peak performance, significantly reducing memory traffic on the shared LPDDR5X bus during the memory-bound decode phase.
  common_mistake: |
    **The Pitfall:** Suggesting standard Multi-Query Attention (MQA) or complex sparse attention patterns.
    **The Rationale:** Candidates propose MQA without considering accuracy degradation for a 7B model, or suggest sparse patterns that map poorly to static tensor operations on an NPU.
    **The Consequence:** Poor generation quality or incredibly low NPU utilization due to unsupported dynamic memory access patterns.
  napkin_math: |
    1. Standard MHA KV Cache (8K tokens, FP16): 2 (K,V) * 32 heads * 128 dim * 2 bytes * 32 layers * 8192 tokens = 4 GB (consumes 33% of RAM).
    2. GQA KV Cache (4 heads instead of 32): Reduces footprint by 8x.
    3. INT8 Quantization: Reduces footprint by 2x (from FP16).
    4. Total reduction: 16x.
    5. Final GQA INT8 KV Cache: 4 GB / 16 = **256 MB**. This perfectly maps to the NPU's INT8 peak performance while saving massive memory bandwidth.
