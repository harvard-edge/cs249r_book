title: Architecting a Real-Time Video Segmentation Model for Exynos NPU
scenario: You are tasked with designing a real-time background blur feature for 1080p video calls running
  at 30 FPS on the Samsung Exynos 2400 NPU. The device shares its 12 GB LPDDR5X memory across the CPU,
  GPU, ISP, and the dual-core NPU (34.7 TOPS). Design the CNN architecture, specifically choosing between
  standard convolutions, depthwise separable convolutions, and inverted residuals, to maximize accuracy
  while strictly adhering to a 15ms per-frame latency budget. Evaluate the trade-offs of using larger
  feature maps early in the network versus aggressive downsampling given the shared memory bandwidth constraints.
question: "How would you evaluate the trade-offs of using larger feature maps early in the network versus aggressive downsampling given the shared memory bandwidth constraints?"
details:
  realistic_solution: 'A strong L5 design uses a hybrid approach: standard convolutions or grouped convolutions
    for early layers where channel counts are low and feature maps are large to maximize NPU compute utilization,
    switching to inverted bottleneck blocks (like MobileNetV2/V3) deeper in the network. The architecture
    should aggressively downsample the spatial resolution early using stride-2 convolutions to reduce
    memory footprint and bandwidth pressure on the shared LPDDR5X bus, and rely on an efficient decoder
    to recover resolution. The candidate should prioritize operations native to the NPU to prevent costly
    data transfers back to the CPU.'
  common_mistake: Candidates often optimize solely for FLOPs by aggressively using depthwise separable
    convolutions everywhere, ignoring that depthwise layers can become memory bandwidth bound on NPUs.
    They may also fail to account for the memory contention from the ISP and GPU sharing the same LPDDR5X
    pool during a live video call.
  napkin_math: 'Target throughput: 30 FPS = 33.3ms per frame. Budget: 15ms. Exynos 2400 NPU peak compute:
    34.7 TOPS. Max theoretical operations per 15ms frame = 34.7 TOPS * 0.015s = 520.5 GOPS (260.25 GMACs).
    Assuming LPDDR5X provides ~60 GB/s total bandwidth, a 15ms window allows max 900 MB transferred. During
    a video call, ISP/GPU/CPU contention might restrict the NPU to 30% bandwidth (~270 MB per frame).
    A purely depthwise design might underutilize the 34.7 TOPS compute due to low arithmetic intensity,
    hitting the 270 MB bandwidth wall first. Therefore, the architectural design must aggressively reduce
    activation sizes (e.g., from 1920x1080 down to 240x135 in the first few layers) to keep intermediate
    tensors resident in the NPU''s internal SRAM and avoid spilling to the shared 12 GB LPDDR5X pool.'
