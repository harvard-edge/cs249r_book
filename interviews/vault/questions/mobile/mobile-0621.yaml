title: The CoreML Neural Engine Fallback
scenario: You compile a custom Transformer model for iOS using CoreML. You explicitly set `MLComputeUnits.all` to allow the OS to run it on the Neural Engine (ANE). The model runs, but it consumes massive battery and the phone gets hot. You check the profiler and discover it is running entirely on the GPU.
question: Why did CoreML silently reject the Neural Engine?
details:
  realistic_solution: 'CoreML silently falls back from ANE to GPU when any operator in the graph is unsupported by the ANE compiler. Common culprits: custom activations (GELU approximations), dynamic shapes, certain attention patterns, or gather/scatter ops. The ANE consumes ~0.5W while the GPU draws 3-5W — a 10x thermal increase with no error or warning. Debug: use Xcode Instruments'' CoreML trace to see per-layer device assignment. Fix: replace unsupported ops with ANE-compatible equivalents.'
  common_mistake: |
    **The Pitfall:** Assuming that the ANE just doesn't support Transformers natively.
    **The Rationale:** Engineers equate missing high-level models with lack of hardware capability rather than graph-level operator incompatibilities.
    **The Consequence:** The model is left running on the GPU, destroying device battery life and thermal budgets.
  napkin_math: |
    - **Power Efficiency:** ANE peak power is ~1W for 35 TOPS, whereas a mobile GPU might draw 5W for just 10 TOPS.
    - **Fallback Cost:** Executing a 10 GFLOP unsupported layer on the GPU takes ~1ms but burns 5W.
    - **Result:** **Silently falling back to the GPU drains the battery 5x faster than the ANE, quickly hitting device thermal limits.**
