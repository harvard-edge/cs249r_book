title: Apple A17 Pro Unified Memory Recall
scenario: 'You are deploying a quantized on-device LLM on an iPhone 15 Pro, targeting the Apple A17 Pro Neural Engine. To minimize cold start time and avoid OOM crashes, the team wants to use memory-mapped (mmap) weight loading.'
question: 'What specific memory architecture does the A17 Pro use to share its 8 GB pool between the CPU, GPU, and Neural Engine?'
details:
  realistic_solution: 'The candidate must recall that the Apple A17 Pro uses a ''Unified Memory Architecture'' (UMA). Because the 8 GB unified memory is physically shared across the CPU, GPU, and the 16-core Neural Engine, using mmap allows all compute units to read the exact same physical memory pages directly. This enables true zero-copy memory-mapped inference.'
  common_mistake: |
    **The Pitfall:** Assuming the NPU has isolated, dedicated VRAM like a discrete desktop GPU.
    **The Rationale:** Developers familiar with cloud or desktop environments apply the PCIe bus / discrete memory model to mobile SoCs.
    **The Consequence:** They unnecessarily implement manual memory copying to the NPU, wasting time, power, and triggering OOMs, completely defeating the purpose of mmap.
  napkin_math: |
    **Assumptions & Constraints:**
    - System Memory: 8 GB Unified Memory total.
    - OS/App Overhead: ~3.5 GB (Leaving 4.5 GB free).
    - Model Size: 4 GB.

    **Calculations:**
    - Without UMA (Discrete GPU model): 4 GB (Host RAM) + 4 GB (VRAM copy) = 8 GB total -> 8 GB > 4.5 GB (OOM Crash).
    - With UMA (mmap zero-copy): 4 GB shared footprint -> 4.5 GB - 4 GB = 0.5 GB free.

    **Conclusion & Interpretation:**
    - **Result: Unified Memory Efficiency**. The unified memory architecture utilizing mmap prevents OOM by ensuring strict **zero-copy memory mapping** across CPU and NPU.
