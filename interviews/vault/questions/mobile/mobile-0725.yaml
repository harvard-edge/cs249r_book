title: The NPU Compiler Black Box
scenario: 'You export the same ONNX model to three mobile NPU compilers: Apple''s CoreML compiler (for
  ANE), Qualcomm''s QNN compiler (for Hexagon), and MediaTek''s NeuroPilot compiler (for APU). The model
  has 45 layers. CoreML maps 44 layers to the ANE, QNN maps 38 layers, and NeuroPilot maps 41 layers.
  The unmapped layers fall back to CPU. Why do three compilers targeting three NPUs produce different
  partitioning decisions from the same ONNX graph, and how do you debug this?'
details:
  realistic_solution: 'NPU compilers differ in three ways: (1) Operator support — each NPU has a different
    op compatibility list (e.g., ANE supports grouped conv natively, Hexagon requires decomposition).
    (2) Fusion strategy — CoreML aggressively fuses Conv+BN+ReLU into single ops, QNN is more conservative.
    (3) Cost modeling — compilers decide whether running an op on NPU vs CPU is worth the DMA transfer
    cost differently. QNN''s 7 CPU fallback layers add only 1.5ms of compute but 2.1ms of DMA transfers
    (3 boundaries). Debug: export per-layer delegation logs from each compiler, identify the specific
    unsupported ops, and replace them with universally-supported alternatives.'
  common_mistake: '"The NPUs have different operator support — just check the compatibility list." Operator
    support is part of it, but the compiler''s *optimization strategy* matters more than the raw op list.'
  napkin_math: '45-layer model. CoreML: 44 on ANE + 1 on CPU. Data transfers: 1 (ANE→CPU at layer 44).
    Transfer cost: ~0.3ms. Total: 4.2ms. QNN: 38 on Hexagon + 7 on CPU. Data transfers: 3 (Hexagon→CPU→Hexagon
    boundaries). Transfer cost: ~2.1ms. Total: 7.8ms. NeuroPilot: 41 on APU + 4 on CPU. Data transfers:
    2. Transfer cost: ~1.2ms. Total: 5.9ms. The 7 extra CPU layers in QNN add only ~1.5ms of compute,
    but the 3 data transfers add 2.1ms — **transfers cost more than the computation**.'
