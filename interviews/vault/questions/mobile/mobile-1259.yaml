title: Diagnosing Model Collapse on Tensor G3
scenario: You are maintaining an on-device LLM (Gemini Nano) for a personalized writing
  assistant on the Google Tensor G3. The model runs locally on the on-device TPU and
  relies on continuous federated learning, where rare user-generated text is mixed
  with synthetic data for data pruning. After several weeks of deployment, users report
  that the model's vocabulary is becoming highly repetitive and it struggles with
  edge-case requests. Based on this data pipeline and the hardware constraints of
  the Tensor G3, diagnose the root cause of this degradation.
question: Why does a Tensor G3 personalized writing assistant become repetitive after
  federated updates with synthetic data?
details:
  realistic_solution: The root cause is model collapse driven by recursive training
    on synthetic data. Because the Tensor G3's TPU allows for efficient local execution
    of the LLM, the system easily generates a high volume of synthetic text for data
    augmentation. When the data pruning algorithm prioritizes this synthetic data
    over diverse but sparse user inputs to fit within the limited local memory buffer,
    the model overfits to its own generated distribution and systematically loses
    the tails of the original data distribution.
  common_mistake: Candidates often misdiagnose this as catastrophic forgetting due
    to the limited 12 GB LPDDR5X memory or mistakenly blame the 7.5 TOPS TPU constraint
    for not completing on-device training epochs.
  napkin_math: Assume the model uses 4 GB of the 12 GB LPDDR5X, leaving a 1 GB continuous
    learning buffer. If a text sample is ~2 KB (roughly 1000 tokens), the buffer holds ~500,000
    samples. If the on-device TPU generates 500 tokens/sec in the background for 10 hours
    daily, it produces 18,000,000 synthetic tokens (18,000 new samples daily). If the
    pruning algorithm prioritizes retaining this data, 3.6% of the buffer becomes synthetic
    each day. Over 14 days of cumulative updates, the synthetic data concentration reaches
    ~50%, easily exceeding the 20-30% threshold known to trigger model collapse.
