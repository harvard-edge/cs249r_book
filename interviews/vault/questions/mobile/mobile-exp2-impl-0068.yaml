title: Compute Latency on Exynos 2400 NPU
scenario: You are optimizing an on-device text summarization model for a smartphone equipped with a Samsung
  Exynos 2400 NPU. The NPU provides 34.7 TOPS of compute, but must share its 12 GB of LPDDR5X memory with
  the CPU, GPU, and ISP. You are comparing an encoder-decoder architecture versus a decoder-only architecture.
  For a given input sequence, the encoder-decoder requires 50 billion MACs (Multiply-Accumulate operations),
  while the decoder-only requires 80 billion MACs. Calculate the theoretical compute-bound inference latency
  for both architectures on this NPU, and find the absolute difference in milliseconds.
details:
  realistic_solution: To find the theoretical compute-bound latency, convert the MACs to Operations by
    multiplying by 2. Then, convert the total Operations to Tera-Operations (TOps) by dividing by 1,000
    (since 1000 Giga-ops = 1 Tera-op). Finally, divide the model's TOps by the NPU's total TOPS capability
    (34.7) to get the time in seconds, and multiply by 1000 to get milliseconds.
  common_mistake: Candidates often confuse TOPS (Tera Operations Per Second) with MACs and forget that
    1 MAC equals 2 operations (one multiply, one add). They also frequently fail to convert billions (Giga)
    to Trillions (Tera) correctly, resulting in latency calculations that are off by a factor of 2 or
    1000.
  napkin_math: '1 MAC = 2 Operations. Encoder-Decoder: 50B MACs = 100B Ops = 0.1 Tera-Ops. Time = 0.1
    TOps / 34.7 TOPS = 0.00288 seconds (2.88 ms). Decoder-Only: 80B MACs = 160B Ops = 0.16 Tera-Ops. Time
    = 0.16 TOps / 34.7 TOPS = 0.00461 seconds (4.61 ms). Difference = 4.61 ms - 2.88 ms = 1.73 ms.'
