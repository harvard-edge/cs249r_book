title: 'A17 Pro NPU Video Frame Drops'
scenario: Real-time video frame styling on an Apple A17 Pro Neural Engine (35 TOPS). Frame arrivals are Poisson-distributed at 60 FPS, and the NPU processes a frame exponentially with a 12ms average service time.
question: Specify the required frame buffer size K such that the M/M/1/K finite-queue blocking probability P_K is strictly less than 1%.
details:
  realistic_solution: 'lambda = 60/s, mu = 1/0.012 = 83.3/s, rho = lambda/mu = 0.72. For M/M/1/K the exact blocking probability is P_K = (1-rho) * rho^K / (1 - rho^(K+1)). Sweeping K: P_9 = 0.28*0.72^9 / (1-0.72^10) = 0.01456/0.9626 = 0.01513 (FAIL); P_10 = 0.28*0.72^10 / (1-0.72^11) = 0.01048/0.9731 = 0.01077 (just over); P_11 = 0.28*0.72^11 / (1-0.72^12) = 0.00755/0.9806 = 0.00770 (PASS); P_12 = 0.00551 (PASS). The minimum K satisfying P_K < 0.01 is K = 11. The simple rho^K infinite-queue tail crosses below 0.01 only at K=14, which is the conservative answer that reflects the long-run probability of seeing >= K in the unbounded system, not the M/M/1/K blocking probability.'
  common_mistake: |
    **The Pitfall:** Using the unbounded-queue tail probability ρ^K instead of the finite M/M/1/K blocking formula.
    **The Rationale:** Candidates forget the (1-ρ)/(1-ρ^(K+1)) renormalization required for a finite queue.
    **The Consequence:** They over-provision the buffer (K=14 instead of K=11), unnecessarily tying up precious mobile RAM.
  napkin_math: |
    **Assumptions & Constraints:**
    - Arrival rate λ = 60/s.
    - Service rate µ = 1/0.012 = 83.33/s.
    - Utilization ρ = λ/µ = 60 / 83.33 = 0.72.

    **Calculations:**
    - M/M/1/K formula: P_K = (1-ρ)*ρ^K / (1-ρ^(K+1)).
    - Test K=10: P_10 = (0.28*0.72^10) / (1-0.72^11) ≈ 0.0108 (FAIL, > 0.01).
    - Test K=11: P_11 = (0.28*0.72^11) / (1-0.72^12) ≈ 0.0077 (PASS, < 0.01).

    **Conclusion & Interpretation:**
    - **Result: K=11 (Queue-Bound)**. The minimum required buffer size K is 11.
