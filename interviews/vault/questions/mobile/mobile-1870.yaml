title: A17 Pro NPU Video Frame Drops
scenario: Real-time video frame styling on an Apple A17 Pro Neural Engine (35 TOPS).
  Frame arrivals are Poisson-distributed at 60 FPS, and the NPU processes a frame
  exponentially with a 12ms average service time.
question: Specify the required frame buffer size K such that the M/M/1/K finite-queue
  blocking probability P_K is strictly less than 1%.
visual:
  kind: svg
  path: mobile-1870.svg
  alt: Hockey-stick curve illustrating the relationship between utilization and queue
    depth.
  caption: M/M/1 Queue Explosion
details:
  realistic_solution: 'lambda = 60/s, mu = 83.3/s, rho = 0.72. For M/M/1/K the exact
    blocking probability is P_K = (1-rho)*rho^K / (1-rho^(K+1)). Setting P_K < 0.01
    and solving numerically: at K=14, P_K = 0.28*0.72^14 / (1 - 0.72^15) = 0.28*0.0099/0.9929
    = 0.00279 < 0.01 (well below). At K=12, P_K ~= 0.0054. The minimum K satisfying
    the bound is K=12. Note: the simple ρ^K tail (used as the infinite-queue tail
    probability that the system level >= K) gives K=14, which is conservative.'
  common_mistake: Using rho^K (the infinite-queue tail) as the M/M/1/K blocking probability.
    These are different quantities; the finite-queue formula renormalizes by 1/(1-rho^(K+1)),
    making the true blocking probability slightly smaller than rho^K.
  napkin_math: 'rho = 60*0.012 = 0.72; M/M/1/K blocking P_K = (1-0.72)*0.72^K / (1-0.72^(K+1));
    K=12 gives P_K = 0.0054 < 0.01.'
