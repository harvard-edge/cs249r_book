title: A17 Pro NPU Video Frame Drops
scenario: Real-time video frame styling on an Apple A17 Pro Neural Engine (35 TOPS).
  Frame arrivals are Poisson-distributed at 60 FPS, and the NPU processes a frame
  exponentially with a 12ms average service time.
question: Specify the required frame buffer size K such that the M/M/1/K finite-queue
  blocking probability P_K is strictly less than 1%.
visual:
  kind: svg
  path: mobile-1870.svg
  alt: Hockey-stick curve illustrating the relationship between utilization and queue
    depth.
  caption: M/M/1 Queue Explosion
details:
  realistic_solution: 'lambda = 60/s, mu = 1/0.012 = 83.3/s, rho = lambda/mu = 0.72.
    For M/M/1/K the exact blocking probability is P_K = (1-rho) * rho^K / (1 - rho^(K+1)).
    Sweeping K: P_9 = 0.28*0.72^9 / (1-0.72^10) = 0.01456/0.9626 = 0.01513 (FAIL);
    P_10 = 0.28*0.72^10 / (1-0.72^11) = 0.01048/0.9731 = 0.01077 (just over); P_11
    = 0.28*0.72^11 / (1-0.72^12) = 0.00755/0.9806 = 0.00770 (PASS); P_12 = 0.00551
    (PASS). The minimum K satisfying P_K < 0.01 is K = 11. The simple rho^K infinite-queue
    tail crosses below 0.01 only at K=14, which is the conservative answer that reflects
    the long-run probability of seeing >= K in the unbounded system, not the M/M/1/K
    blocking probability.'
  common_mistake: Using the unbounded-queue tail rho^K as the M/M/1/K blocking probability
    (gives K=14 instead of K=11), or solving for P_K < 0.01 by inequality on rho^K
    alone without the (1-rho)/(1-rho^(K+1)) renormalisation.
  napkin_math: rho = 60*0.012 = 0.72. P_K = (1-rho)*rho^K / (1-rho^(K+1)). P_10 =
    0.0108 (FAIL), P_11 = 0.0077 (PASS). Minimum K = 11.
