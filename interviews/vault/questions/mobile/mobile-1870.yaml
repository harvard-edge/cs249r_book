title: A17 Pro NPU Video Frame Drops
scenario: Real-time video frame styling on an Apple A17 Pro Neural Engine (35 TOPS).
  Frame arrivals are Poisson-distributed at 60 FPS, and the NPU processes a frame
  exponentially with a 12ms average service time.
question: Specify the required frame buffer size to ensure the probability of dropping
  a frame due to a full queue is strictly less than 1%.
visual:
  kind: svg
  path: mobile-1870.svg
  alt: Hockey-stick curve illustrating the relationship between utilization and queue
    depth.
  caption: M/M/1 Queue Explosion
details:
  realistic_solution: The arrival rate is 60 frames/sec (λ = 60), and service rate
    is 1/0.012 = 83.3 frames/sec (μ = 83.3). The utilization ρ = λ/μ = 0.72. For an
    M/M/1/K queue, the probability of rejection is approximately ρ^K (for ρ not close
    to 1). Setting 0.72^K < 0.01 gives K ≈ 14. Therefore, a buffer of at least 14
    frames is required.
  common_mistake: Applying deterministic queueing formulas instead of stochastic M/M/1
    limits, missing the tail effects of arrival bursts.
  napkin_math: ρ = 60 * 0.012 = 0.72; 0.72^14 ≈ 0.0099 < 0.01.
