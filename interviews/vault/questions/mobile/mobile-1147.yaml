title: Architecting a Fail-Safe ADAS Monitor on Hexagon NPU
scenario: You are designing the pedestrian detection subsystem for an ASIL-B rated dashcam application running on the Qualcomm Hexagon NPU (Snapdragon 8 Gen 3). The application requires 5 TOPS of INT8 compute for the primary vision model.
question: How should a Hexagon NPU dashcam pipeline detect NPU hangs or memory faults and enter a safe state within a 100ms fault-tolerant time interval?
details:
  realistic_solution: The optimal design leverages the heterogeneous architecture by running the INT8 model on the Hexagon NPU while an independent, high-priority watchdog process runs on the CPU. The CPU process orchestrates memory isolation in the LPDDR5X, dispatches the NPU task, and sets a strict hardware timer; if the NPU fails to return an inference result or a known-answer self-test fails, the CPU preempts the pipeline and triggers a deterministic safe-state fallback.
  common_mistake: |
    **The Pitfall:** Relying purely on the NPU to monitor its own health or proposing full redundant inference on the CPU/GPU.
    **The Rationale:** Candidates fail to utilize the heterogeneous architecture to provide an independent observer, or they ignore severe thermal throttling constraints of mobile SoCs.
    **The Consequence:** Designing a system that either fails silently during a hard NPU hang or overheats the device, missing the ASIL-B safety requirements.
  napkin_math: |
    - **NPU Capacity:** 45 TOPS INT8.
    - **Primary model requirement:** 5 TOPS (11.1% utilization).
    - **Frame time (at 30 FPS):** 33.3ms.
    - **Expected execution:** 15ms for NPU inference + 1ms CPU setup + 2ms context switch.
    - **Watchdog timeout:** Set at 20ms.
    - **CPU fallback policy execution:** 5ms.
    - **Total time to safe state on fault:** 20ms timeout + 5ms fallback = 25ms.
    - **Safety margin:** 100ms interval - 25ms = **75ms margin**.
