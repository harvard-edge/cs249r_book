title: 'KV-Cache: Evaluate GQA vs MHA for Memory-Constrained Mobile LLM'
scenario: You are selecting between MHA (16 KV heads) and GQA (4 KV heads) for a new 1B LLM design targeting
  Snapdragon 8 Gen 3 (45 TOPS INT8, 16GB) with 4096-token context windows. Evaluate the memory, bandwidth,
  quality, and architecture impact of each choice.
details:
  realistic_solution: 'MHA KV cache at INT8 = 2 × num_layers × num_heads × head_dim × context × 1 byte.
    For 32 layers, 16 heads, head_dim=128, context=4096: 512MB (not 803MB which incorrectly uses 2 bytes
    for INT8).'
  common_mistake: Thinking GQA reduces model quality significantly — modern LLMs (Llama 3, Gemma, etc.)
    use GQA with minimal quality loss. The quality-efficiency tradeoff is favorable.
  napkin_math: 'MHA-16 KV cache, INT8: 32 layers × 2 × 16 KV heads × 128 head_dim × 4096 context × 1B
    = 32 × 2 × 16 × 128 × 4096 × 1B = 536,870,912 bytes ≈ 512MB. Wait: 32×2×16×128×4096 = 536.87M bytes
    = 512 MiB. At INT8 (1B): 512MB. With INT8 vs BF16 the KV cache is half: BF16 would be 1024MB, INT8
    is 512MB ≈ 512MB not 402MB or 803MB. Corrected: 32×2×16×128×4096×1B = 536,870,912B ≈ 512MB (not 803MB
    which used 2B instead of 1B).'
