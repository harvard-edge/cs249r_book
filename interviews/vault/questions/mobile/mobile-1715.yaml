title: 'On-Device ML Data Quality: Centralized vs. Edge Validation on Snapdragon NPU'
scenario: You are designing the data quality and validation architecture for an application relying on real-time sensor data processed by an on-device ML model on a Snapdragon 8 Gen 3 Hexagon NPU. Your team proposed Cloud-Centric Validation and Edge-Optimized Validation.
question: How would you discuss the trade-offs and recommend which validation approach is most suitable for a mission-critical mobile application?
details:
  realistic_solution: |
    A hybrid architecture that leverages the strengths of both approaches. Critical, low-latency schema validation and basic anomaly detection (e.g., range checks, simple statistical outliers) should be performed on the Snapdragon NPU, ensuring immediate feedback and reducing reliance on network connectivity. More resource-intensive tasks like complex multi-variate anomaly detection, long-term trend analysis, and comprehensive lineage tracking (including immutable data contracts and auditing) are offloaded to the cloud. This requires a robust data contract definition at the edge-cloud interface, allowing for efficient data transfer of only necessary metadata or aggregated validation results. On-device quality gates would ensure that only pre-vetted data enters the inference pipeline, with detailed logs batched and uploaded for post-hoc analysis and auditing.
  common_mistake: |
    **The Pitfall:** Overlooking power implications of constant cloud transfer and underestimating NPU capabilities.
    **The Rationale:** Candidates fail to consider the continuous radio power draw or network connectivity issues.
    **The Consequence:** A design that drains the battery and suffers from data staleness or inference stalls in poor network conditions.
  napkin_math: |
    - **Cloud Data Transfer:** Uploading 100KB/s for 1 hour = 360MB. Radio power draw is ~200-500mW continuous.
    - **Edge Validation Compute:** Simple schema check = ~few thousand INT8 ops.
    - **Edge Power Draw:** NPU (45 TOPS) executes this in microseconds, drawing ~50-200mW only during burst.
    - **Latency:** Cloud round-trip = 100-1000ms. On-device = <1ms.
    - **Result:** **Edge validation is orders of magnitude more power-efficient and vastly lower latency.**
