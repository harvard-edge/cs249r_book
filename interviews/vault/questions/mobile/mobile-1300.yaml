title: Mmap Strategies for Exynos 2400 Shared Memory
scenario: You are leading the deployment of a 4-billion parameter language model (FP16 weights) on the Samsung Exynos 2400 NPU. The device features 34.7 TOPS, a dual-core NPU, and 12 GB LPDDR5X RAM shared with the CPU, GPU, and ISP. To mitigate cold start latency, you must evaluate two memory management alternatives: Alternative A uses `mmap` with `mlock` to pin the entire 8 GB model into RAM on app launch, while Alternative B uses pure `mmap` to load pages on demand during inference.
question: Should an 8GB FP16 model on Exynos 2400 use mmap plus mlock or demand-paged mmap for predictable cold starts?
details:
  realistic_solution: |
    Alternative A (using `mmap` with `mlock`) is the superior choice for predictable latency, despite the initial loading cost. While pure `mmap` solves the cold start problem, the Exynos 2400's shared memory architecture means background processes can easily cause page evictions. The dual-core NPU can easily bottleneck on memory bandwidth if constantly waiting for page faults from storage.
  common_mistake: |
    **The Pitfall:** Choosing pure mmap to minimize startup time.
    **The Rationale:** Blindly applying desktop lazy-loading techniques.
    **The Consequence:** Severe latency spikes caused by continuous page faults and thrashing as the OS evicts pages for the camera or UI.
  napkin_math: |
    - **Model Size:** 4B params FP16 = 8 GB.
    - **Available Shared RAM:** 12 GB Total - 3 GB (OS/GPU) = 9 GB remaining.
    - **Page Fault Time:** Fetching 2 MB chunk from UFS 4.0 (4 GB/s) takes 0.5 ms.
    - **Compute Time:** 34.7 TOPS NPU processes 2 MB in < 0.1 ms.
    - **Impact:** Pure mmap forces the NPU to spend **>80% of its time stalled** on storage I/O, ruining predictability.
