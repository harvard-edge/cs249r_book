title: LLM Memory Budget Specification for A17 Pro
scenario: Your team is building an on-device local summarization feature using a 7 billion parameter LLM
  targeting the Apple A17 Pro. The device has 8 GB of shared unified memory across the CPU, GPU, and 16-core
  Neural Engine, but you must reserve 3 GB for the OS and foreground apps to avoid jetsam terminations.
  Specify the exact memory budget breakdown required to support a 2048-token context window, detailing
  how you will allocate the remaining 5 GB for weights, KV-cache, and activations.
details:
  realistic_solution: To meet the 5 GB budget on the A17 Pro, the model weights must be quantized to 4-bit,
    reducing their footprint to 3.5 GB. The KV-cache must be calculated for the 2048-token context length
    and ideally kept in FP16 for accuracy, consuming roughly 1 GB for a standard 7B architecture. The
    remaining 0.5 GB is allocated for peak activations during the forward pass on the 16-core Neural Engine.
  common_mistake: Candidates often treat the 8 GB as dedicated VRAM, forgetting it is shared unified memory
    and failing to account for OS overhead. They also frequently calculate weight footprint at FP16 (14
    GB), which immediately OOMs the device, instead of specifying aggressive quantization requirements.
  napkin_math: Available Memory Budget = 8 GB (A17 Pro Total) - 3 GB (OS/Apps) = 5 GB. 7B Model Weights
    at 4-bit quantization = 7e9 params * 0.5 bytes = 3.5 GB. FP16 KV-cache for 2048 tokens (assuming 32
    layers, 4096 hidden dim) = 2 (K & V) * 2048 tokens * 32 layers * 4096 dim * 2 bytes = 1,073,741,824
    bytes = 1.0 GB. Remaining for Activations = 5.0 GB - 3.5 GB - 1.0 GB = 0.5 GB.
