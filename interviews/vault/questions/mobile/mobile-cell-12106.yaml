title: 'Model Size Estimation: Compare INT4 vs. INT8 Memory for Mobile LLM on Snapdragon'
scenario: A team is choosing between INT4 and INT8 quantization for a 7B LLM on Snapdragon 8 Gen 3 (16GB
  LPDDR5X, 77 GB/s, 45 TOPS). Compare memory footprint, TPOT, maximum batch size, and accuracy implications.
  The use case is single-user on-device assistant (batch=1).
question: "How would you compare memory footprint, TPOT, maximum batch size, and accuracy implications?"
details:
  realistic_solution: 'INT8: 7B × 1B = 7GB. Fits (16-3-1=12GB budget). TPOT: 7GB/77GB/s=90.9ms/token —
    borderline slow (> 50ms target). INT4: 3.5GB. TPOT: 3.5GB/77GB/s=45.5ms/token ✓. KV budget INT8: 12-7=5GB.
    KV/token (7B): 524KB (32 layers, 32 KV heads, 128 dim). Tokens: 5GB/524KB=9,542. INT4 KV budget: 12-3.5=8.5GB
    → 16,221 tokens. INT4 wins on TPOT (45ms vs 91ms), KV capacity (1.7× more), same compute (BW-bound).
    Accuracy: GPTQ INT4 on 7B: ~0.3 perplexity increase.'
  common_mistake: Assuming INT4 has exactly 2× the throughput of INT8 on Snapdragon 8 Gen 3; Hexagon DSP
    supports native INT4, so compute throughput can be up to 2× INT8, but memory bandwidth (not compute)
    limits decode performance.
  napkin_math: 'INT8: 7GB. Budget 12GB. KV: 5GB/524KB=9,542 tokens. TPOT: 7/77=90.9ms. INT4: 3.5GB. KV:
    8.5GB/524KB=16,221 tokens. TPOT: 3.5/77=45.5ms. INT4: 2× faster TPOT (BW halved), 1.7× more context,
    <1% accuracy loss. Clear winner for mobile single-user use case.'
