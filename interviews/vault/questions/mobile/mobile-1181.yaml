title: Dynamic KV-Cache Paging for A17 Pro Unified Memory
scenario: You are designing the LLM inference engine for iOS running on the Apple A17 Pro. The system requires continuous background summarization using a 7B parameter model. The A17 Pro features a 16-core Neural Engine delivering 35 TOPS at ~5W, but critically, it shares its 8 GB of unified memory with the CPU and GPU.
question: How should an iOS LLM engine manage KV-cache pages on A17 Pro to avoid OOM while preserving Neural Engine utilization?
details:
  realistic_solution: A robust L6+ design would introduce an OS-aware, multi-tiered KV-cache system. It should use an aggressive semantic eviction policy to drop non-essential tokens, keeping the active cache footprint minimal. Additionally, it must interface with iOS memory warnings to dynamically quantize the KV cache to Int4 or swap older KV pages to NVMe storage during high GPU/CPU memory pressure events, ensuring critical context remains resident for the Neural Engine.
  common_mistake: |
    **The Pitfall:** Proposing server-side solutions like standard PagedAttention.
    **The Rationale:** Candidates do not account for the A17 Pro's unified memory architecture where the OS can forcefully reclaim memory, incorrectly assuming the entire 8 GB is available for the LLM.
    **The Consequence:** The system crashes due to out-of-memory errors because it ignores the memory footprint of the OS, display buffers, and background apps.
  napkin_math: |
    - A 7B model quantized to 4-bit consumes ~3.5 GB of the 8 GB unified memory.
    - Assuming iOS and background apps reserve ~3 GB, only ~1.5 GB is available for the KV cache.
    - Assuming 32 layers and a hidden dimension of 4096, each token's KV cache in FP16 requires 2 (K&V) * 2 bytes * 32 * 4096 = 512 KB.
    - The maximum context length in 1.5 GB is 1.5 * 1024 / 0.5 = 3072 tokens.
    - **Result: To support an 8K context, the design must quantize the KV cache to 4-bit (reducing token footprint to 128 KB, expanding capacity to 12,288 tokens) or implement strict semantic eviction.**
