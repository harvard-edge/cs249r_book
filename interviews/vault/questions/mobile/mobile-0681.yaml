title: The Phantom OOM Crash
scenario: Your mobile application intermittently crashes with an Out-Of-Memory (OOM) error specifically
  when trying to load a 500MB ML model, even though the device reports several gigabytes of free RAM.
  The crash is not consistent; it happens more frequently on older devices or after the app has been running
  for a while. What's the most likely root cause, and how would you debug and mitigate it?
details:
  realistic_solution: "The most likely root cause is **memory fragmentation**, specifically **virtual\
    \ memory fragmentation** or heap fragmentation within the app's process. Even if there's enough *total*\
    \ free RAM, the operating system or the application's memory allocator might not be able to find a\
    \ contiguous block of virtual memory large enough to satisfy the 500MB allocation request.\n  1. \
    \ **Heap Fragmentation:** The app's heap becomes fragmented over time as objects are allocated and\
    \ deallocated, leaving small, non-contiguous free blocks. A large allocation request cannot be satisfied.\n\
    \  2.  **Virtual Memory Fragmentation:** Even beyond the app's heap, the operating system's virtual\
    \ memory map can become fragmented. If the model is loaded as a single large contiguous block (e.g.,\
    \ `mmap` a model file, or a single large `malloc`), the OS might struggle to find a virtual address\
    \ range large enough to back it, even if physical pages are available.\n  3.  **Address Space Limits:**\
    \ On older 32-bit Android devices, a process might only have a 2GB or 3GB virtual address space, which\
    \ can become exhausted even if physical RAM is abundant. Modern 64-bit devices have a much larger\
    \ virtual address space, but fragmentation can still occur."
  common_mistake: '"The device doesn''t have enough RAM." If the device reports GBs of free RAM, total
    RAM isn''t the issue. It''s about *how* that RAM is available.'
  napkin_math: 'Total RAM: 4GB. OS + App use 2GB. Free: 2GB. But memory is severely fragmented. If the
    heap consists of 2,000 separate 1MB free blocks, finding a contiguous 500MB allocation is impossible.
    The model load triggers an OOM despite 2GB ''free''. Solution: Memory map (mmap) the 500MB model directly
    from storage.'
