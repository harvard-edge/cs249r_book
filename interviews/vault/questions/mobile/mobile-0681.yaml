title: The Phantom OOM Crash
scenario: Your mobile application intermittently crashes with an Out-Of-Memory (OOM) error specifically when trying to load a 500MB ML model, even though the device reports several gigabytes of free RAM. The crash is more frequent on older devices or after the app has been running for a while.
question: Why can loading a 500 MB model OOM intermittently even when the phone reports gigabytes of free RAM?
details:
  realistic_solution: "The most likely root cause is **memory fragmentation**. Even if there's enough *total* free RAM, the operating system or the application's memory allocator might not be able to find a contiguous block of virtual memory large enough to satisfy the 500MB allocation request."
  common_mistake: |
    **The Pitfall:** Confusing total free RAM with contiguous address space.
    **The Rationale:** Engineers look at the "GBs of free RAM" OS metric and conclude memory size isn't the issue, ignoring memory fragmentation.
    **The Consequence:** They fail to use memory mapping (mmap) and continue to experience intermittent OOM crashes.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Total RAM: 4 GB.
       - OS + App usage: 2 GB.
       - Free RAM: 2 GB.
       - Model size: 500 MB contiguous allocation required.
    2. **Calculations:**
       - Fragmentation: The 2 GB free is split into thousands of non-contiguous <1 MB blocks.
    3. **Conclusion & Interpretation:**
       - **Result: Fragmentation-Bound OOM**. Allocation fails because a 500 MB contiguous block cannot be found, despite 2 GB total free memory.
