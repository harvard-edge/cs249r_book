title: The In-Car LLM Mandate
scenario: 'You are the Lead ML Systems Engineer for a new line of luxury electric vehicles. The flagship
  feature is an ''AI Co-Pilot,'' a voice assistant powered by a 7-billion parameter LLM. The prototype
  streams the model from the cloud, but this approach is being scrapped due to two deal-breakers: high
  latency in good network conditions, and total failure in tunnels or rural areas. The VP of Engineering
  has mandated that the entire experience must run locally on the car''s infotainment SoC.'
question: "What portfolio of model and systems optimizations makes the 7B in-car AI Co-Pilot feasible without cloud connectivity?"
details:
  realistic_solution: A Staff-level engineer must propose a portfolio of solutions that attacks the weight,
    latency, and system integration problems in parallel.
  common_mistake: A purely model-centric view, such as, 'We just need to distill the 7B model down to
    1B and quantize it to INT8.' While necessary, this is insufficient. This answer ignores the colossal
    memory bandwidth bottleneck of LLM inference, fails to address the Time-To-First-Token problem directly,
    and overlooks critical systems-level optimizations like kernel fusion and intelligent KV cache management,
    which are non-negotiable for hitting performance targets on-device.
  napkin_math: '**1. Baseline Check (7B INT8 Model):** Even quantized, it''s infeasible.'
