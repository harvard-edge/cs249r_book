title: The In-Car LLM Mandate
scenario: You are the Lead ML Systems Engineer for a new line of luxury electric vehicles. The flagship feature is an 'AI Co-Pilot,' a voice assistant powered by a 7-billion parameter LLM. The prototype streams the model from the cloud, but this approach is being scrapped due to high latency in good network conditions and total failure in tunnels or rural areas. The VP of Engineering has mandated that the entire experience must run locally on the car's infotainment SoC.
question: What portfolio of model and systems optimizations makes the 7B in-car AI Co-Pilot feasible without cloud connectivity?
details:
  realistic_solution: A Staff-level engineer must propose a portfolio of solutions that attacks the weight, latency, and system integration problems in parallel.
  common_mistake: |
    **The Pitfall:** Adopting a purely model-centric view (e.g., just distilling to 1B and quantizing to INT8).
    **The Rationale:** Candidates focus solely on model compression, ignoring the colossal memory bandwidth bottleneck of LLM inference and the Time-To-First-Token problem.
    **The Consequence:** The proposed solution fails to hit on-device performance targets because it overlooks critical systems-level optimizations like kernel fusion and intelligent KV cache management.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model: 7B parameters (INT8, 1 byte/param).
       - Target Hardware: Automotive SoC.
       - LPDDR5 Bandwidth: ~50 GB/s.
    2. **Calculations:**
       - Memory footprint: 7B * 1 byte = 7 GB.
       - Theoretical max tokens/sec: 50 GB/s / 7 GB = 7.14 tokens/sec.
       - Latency per token (TPOT): 1 / 7.14 tokens/sec = 140ms.
    3. **Conclusion & Interpretation:**
       - **Result: 140ms TPOT**. This latency is far too slow for real-time voice, proving that aggressive system-level optimizations (INT4, speculative decoding) are mathematically mandatory.
