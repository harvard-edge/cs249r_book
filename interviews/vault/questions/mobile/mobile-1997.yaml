title: Mobile NPU versus GPU Memory Bandwidth Tradeoffs
scenario: An on-device LLM on an iPhone 15 Pro uses the A17 Pro SoC to serve autocomplete
  requests, dynamically switching hardware blocks.
question: Evaluate whether the A17 Pro Neural Engine (35 TOPS) or the GPU should handle
  KV cache updates for a 1B parameter INT8 model to maximize token-generation throughput.
details:
  realistic_solution: While the Neural Engine excels at dense INT8 matrix multiplications,
    KV cache operations are heavily memory-bandwidth bound. The GPU's architecture
    and wider shared memory bus make it better suited for the high memory bandwidth
    demands of token generation and shifting cache data.
  common_mistake: Blindly assigning all LLM tasks to the Neural Engine simply because
    it is the AI accelerator, ignoring that token generation is memory-bandwidth bound.
  napkin_math: 1B INT8 params = 1GB; 35 TOPS / 1GB = 35 tok/s compute limit, but actual
    speed is <15 tok/s due to memory constraints.
