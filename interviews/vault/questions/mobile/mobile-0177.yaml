title: The Mobile Ridge Point
scenario: An engineer profiles a new vision model on a Snapdragon 8 Gen 3 SoC, which has 45 TOPS of peak
  INT8 compute and 77 GB/s of memory bandwidth. They notice performance drops significantly after a few
  seconds of continuous inference. The model has an arithmetic intensity of 200 Ops/Byte. Interpret these
  numbers to explain why the device is likely thermal throttling.
details:
  realistic_solution: The key is to compare the model's arithmetic intensity to the SoC's ridge point.
    The ridge point is the minimum arithmetic intensity required to be compute-bound.
  common_mistake: A common mistake is to assume that high compute workloads (high TOPS) are always the
    cause of heat. Engineers often misidentify a model as 'compute-bound' without calculating the hardware's
    ridge point. They fail to recognize that being 'memory-bound' is often far more energy-intensive (and
    thus generates more heat) due to the high cost of data movement from DRAM compared to on-chip computation.
  napkin_math: \text{Ridge Point} = \frac{\text{Peak Compute}}{\text{Memory Bandwidth}}
  options:
  - The model is compute-bound; its high arithmetic intensity overwhelms the processor, generating excessive
    heat.
  - The phone's ridge point is ~0.58 Ops/Byte, so the model is severely compute-bound, causing it to overheat.
  - The model is memory-bound; its arithmetic intensity is below the SoC's ridge point, causing high-energy
    DRAM access that generates heat.
  - The SoC's 45 TOPS is insufficient for a model with an AI of 200, causing a bottleneck that leads to
    throttling.
  correct_index: 2
