title: Optimizing KV-Cache on Snapdragon 8 Gen 3 for LLMs with Long Contexts
scenario: You are deploying a 7-billion parameter LLM on a mobile device powered by the Snapdragon 8 Gen 3 Hexagon NPU. The application requires supporting user queries with dynamic context lengths up to 4096 tokens, while adhering to strict latency targets and minimizing memory footprint.
question: How would you design a comprehensive KV-cache management strategy for a 7B LLM on a mobile NPU to efficiently support 4096-token contexts?
details:
  realistic_solution: Implement a paged attention mechanism with adaptive page size to optimize for NPU memory access patterns. Use dynamic memory allocation that provisions memory based on current demand. Implement an eviction policy (modified LRU/LFU) that prioritizes retention of 'hot' tokens and evicts completed sequences. Explore mixed-precision quantization (e.g., INT4/INT8) for the KV-cache values to further compress memory.
  common_mistake: |
    **The Pitfall:** Statically allocating the KV-cache for the maximum 4096 context length for all active sequences.
    **The Rationale:** Engineers default to pre-allocation to avoid dynamic runtime overhead.
    **The Consequence:** Massive, unnecessary memory bloat that rapidly exhausts the device's shared LPDDR5X memory, triggering OS-level app eviction.
  napkin_math: |
    1. Architecture properties: 32 attention heads, 32 layers, hidden dimension of 4096.
    2. Storage size (INT8): 1 byte per element.
    3. KV-cache per token per head: 128 bytes (Key) + 128 bytes (Value) = 256 bytes.
    4. Total per token (all heads & layers): 256 bytes * 32 heads * 32 layers = 262,144 bytes (256 KB).
    5. Total for max context: 256 KB * 4096 tokens = 1,048,576 KB.
    6. **Result: 1.0 GB of dedicated KV-cache memory required for a full context window.**
