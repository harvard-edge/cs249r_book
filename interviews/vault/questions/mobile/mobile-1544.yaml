title: Optimizing KV-Cache on Snapdragon 8 Gen 3 for LLMs with Long Contexts
scenario: 'You are deploying a 7-billion parameter LLM on a mobile NPU. The application requires supporting user queries with dynamic context lengths up to 4096 tokens.'
question: 'How would you design a comprehensive KV-cache management strategy for a 7B LLM on a mobile NPU to efficiently support 4096-token contexts?'
details:
  realistic_solution: 'Implement a paged attention mechanism with adaptive page size to optimize for NPU memory access patterns. Use dynamic memory allocation that provisions memory based on current demand. Implement an eviction policy (modified LRU/LFU) that prioritizes retention of ''hot'' tokens and evicts completed sequences. Explore mixed-precision quantization (e.g., INT4/INT8) for the KV-cache values to further compress memory.'
  common_mistake: |
    **The Pitfall:** Statically allocating the full 4096-token KV-cache for all active sequences upfront.
    **The Rationale:** Engineers default to pre-allocation to avoid dynamic runtime memory overhead.
    **The Consequence:** Massive unnecessary memory bloat that exhausts shared LPDDR5X, triggering app eviction.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 7B Model Architecture: 32 heads, 32 layers, hidden dim 4096.
       - Precision: INT8 (1 byte per element).
    2. **Calculations:**
       - KV-cache per token per head: 128 bytes (K) + 128 bytes (V) = 256 bytes.
       - Total per token: 256 bytes * 32 heads * 32 layers = 262,144 bytes (256 KB).
       - Max context: 256 KB * 4096 tokens = ~1.04 GB.
    3. **Conclusion & Interpretation:**
       - **Result: 1.0 GB dedicated KV-cache memory required (Memory Bottleneck).**
