title: Optimizing KV-Cache on Snapdragon 8 Gen 3 for LLMs with Long Contexts
scenario: You are tasked with deploying a 7-billion parameter Large Language Model
  (LLM) on a mobile device powered by the Snapdragon 8 Gen 3 Hexagon NPU (rated at
  45 TOPS INT8 with 16GB LPDDR5X). The application requires supporting user queries
  with dynamic context lengths, up to a maximum of 4096 tokens, while adhering to
  strict latency targets (e.g., 20 tokens/sec generation) and minimizing the memory
  footprint. Design a comprehensive KV-cache management strategy that addresses KV-cache
  sizing, paged attention implementation, cache eviction policies, and mitigation
  of memory pressure arising from long contexts within the constraints of the mobile
  NPU's resources.
question: How would you optimize KV-cache allocation on Snapdragon 8 Gen 3 for long-context
  LLMs?
details:
  realistic_solution: A realistic solution would involve implementing a paged attention
    mechanism with an adaptive page size, optimizing for the NPU's memory access patterns.
    For KV-cache sizing, employ a dynamic allocation scheme that provisions memory
    based on current demand, potentially using a global pool managed by the NPU runtime.
    Implement a sophisticated cache eviction policy, such as a modified Least Recently
    Used (LRU) or Least Frequently Used (LFU) that prioritizes the retention of 'hot'
    tokens or pages critical for active inference, while aggressively evicting less
    relevant or completed sequence pages. Explore further memory reduction techniques
    like INT4 or mixed-precision quantization for the KV-cache values, and investigate
    methods for compressing or offloading cold KV-cache pages to system RAM or a compressed
    format if the NPU supports such tiered memory access efficiently.
  common_mistake: A common mistake is to statically allocate KV-cache for the maximum
    possible context length for all active sequences without considering actual usage
    patterns, leading to excessive memory consumption and underutilization of the
    limited 16GB LPDDR5X. Another pitfall is neglecting the overhead of paged attention's
    page tables and metadata, which can consume a non-trivial amount of memory, especially
    with many small pages or a large number of concurrent requests.
  napkin_math: For a Llama 2 7B model with a hidden dimension of 4096, 32 attention
    heads, and 32 layers, if KV-cache entries are stored in INT8 (1 byte per element),
    each token requires approximately 256 bytes for its Key and Value vectors per
    attention head (128 bytes K + 128 bytes V). Across 32 heads, this is 8192 bytes
    per layer. For 32 layers, a single token's KV-cache consumes roughly 262,144 bytes
    (0.26 MB). Therefore, a full 4096-token context window would require approximately
    1064.96 MB (~1 GB) of dedicated KV-cache memory, which is a significant portion
    of the 16GB LPDDR5X.
