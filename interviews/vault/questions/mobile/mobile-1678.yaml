title: Graceful Degradation for On-Device ML with Snapdragon NPU
scenario: You are designing an on-device AI assistant for a flagship smartphone, leveraging the Snapdragon 8 Gen 3 Hexagon NPU (45 TOPS INT8, 12-16 GB LPDDR5X). This assistant performs real-time, personalized speech recognition and natural language understanding (NLU) using a large transformer model. The primary goal is responsiveness and accuracy, but the system must maintain functionality under varying device conditions (e.g., high thermal load, low battery, concurrent demanding applications).
question: How would you build a graceful degradation strategy for a Snapdragon NPU AI assistant under thermal, battery, and load constraints?
details:
  realistic_solution: 'A robust solution involves multiple degradation stages (a ''degradation ladder''). This could include: 1. **QoS Shedding**: Dynamically reducing model complexity (e.g., using smaller quantization, fewer layers, or simpler activation functions if supported by the NPU) or input data rate. 2. **Model Fallbacks**: Switching to a smaller, less accurate, but faster model (e.g., a MobileNet-style architecture for speech intent classification) that runs with lower NPU utilization or even on a less powerful core (CPU/GPU) if NPU is unavailable. 3. **Fail-Operational**: In critical scenarios (e.g., emergency commands), a highly optimized, bare-bones model runs in a fail-operational mode, ensuring minimal core functionality. 4. **Fail-Safe**: If all on-device options are exhausted, and core functionality cannot be guaranteed, the system enters a fail-safe state (e.g., prompting the user to free up resources, temporarily disabling the feature, or silently offloading to cloud with latency warnings). The system should monitor NPU temperature, load, and battery level to intelligently transition between these states.'
  common_mistake: |
    **The Pitfall:** Implementing only a single fallback (e.g., offloading to the cloud) or crashing entirely.
    **The Rationale:** It's easier to build a binary "working/not working" system than a multi-stage degradation ladder.
    **The Consequence:** A sudden and jarring loss of functionality for the user whenever temporary resource contention occurs.
  napkin_math: |
    1. **Baseline Requirement:** Primary model requires 30 TOPS and 10 GB/s LPDDR5X bandwidth for 20ms inference latency.
    2. **Throttled State:** NPU is thermal-throttled to 20 TOPS.
    3. **Degradation Stage 1:** Reduce model complexity to <= 20 TOPS (e.g., 1.5x less compute intensive).
    4. **Degradation Stage 2 (CPU Fallback):** A 20ms NPU inference becomes ~100ms on CPU, requiring asynchronous handling.
    5. **Memory Pressure:** If available LPDDR5X drops below the primary model's footprint, falling back to a smaller model (e.g., 2 GB) avoids system instability.
    **A multi-stage fallback ensures continuity under diverse constraints.**
