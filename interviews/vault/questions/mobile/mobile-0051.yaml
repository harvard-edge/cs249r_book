title: Designing an On-Device Continual Learning System
scenario: You're designing a continual learning system for a mobile keyboard that
  adapts to each user's evolving vocabulary — new slang, work jargon, names of new
  contacts, trending topics. The model must learn new patterns without forgetting
  old ones, train entirely on-device for privacy, resist adversarial manipulation
  (a malicious app trying to poison the model via accessibility services), and work
  across the Snapdragon 8 Gen 3 (12 GB RAM) down to the Helio G99 (4 GB RAM). Design
  the system.
question: How should a private mobile keyboard learn slang on Snapdragon 8 Gen 3 and
  Helio G99 without forgetting or poisoning?
details:
  realistic_solution: 'Modular continual learning with security. Freeze 100 MB base
    (mmap''d); train LoRA adapters (2.7 MB flagship, 700 KB budget). Training memory:
    8.6 MB / 2.6 MB. Time: 17.5s (Snapdragon 8 Gen 3) / 87.5s (Helio G99). Poisoning
    defense: perplexity check (2.5s to 12.5s) rejects inputs >3x running average (catches
    adversarial injection via accessibility services). Elastic weight consolidation
    prevents catastrophic forgetting. New words available after 3 uses + next nightly
    training.'
  common_mistake: '"Fine-tune the full model on recent data with a replay buffer."
    Full model fine-tuning on a 4 GB RAM phone is infeasible (the optimizer state
    alone would exceed available memory), and a naive replay buffer doesn''t protect
    against adversarial poisoning.'
  napkin_math: 'Base model: 100 MB (frozen, memory-mapped). Adapters: 2.7 MB (resident).
    Optimizer state (Adam): 2 × 2.7 MB = 5.4 MB. Training buffer: 500 KB. Total training
    memory: 2.7 + 5.4 + 0.5 = 8.6 MB. On 4 GB device (700 KB adapters only): 0.7 +
    1.4 + 0.5 = 2.6 MB. Fits anywhere. Training time: Snapdragon 8 Gen 3: 500 samples
    × 5 ms/sample = 2.5 sec forward + 2.5 sec backward = 5 sec. Poisoning defense
    (perplexity check): 500 × 5 ms = 2.5 sec. Overhead: 10 sec. Total flagship: 5
    + 2.5 + 10 = 17.5 sec. Helio G99: roughly 5× slower. Compute: 25 sec. Perplexity:
    12.5 sec. Overhead: 50 sec. Total budget device: 87.5 sec. New word learning latency:
    typed 3× → next training session (within 24 hours) → available for prediction.'
