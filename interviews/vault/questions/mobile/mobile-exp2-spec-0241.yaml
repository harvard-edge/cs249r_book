title: Exynos 2400 NPU Distillation Specification
scenario: Your team needs to deploy a real-time natural language query parser locally on the Samsung Exynos
  2400 NPU. The device features a dual-core NPU with 34.7 TOPS and a shared 12 GB LPDDR5X memory pool
  that also serves the CPU, GPU, and ISP. Design a knowledge distillation specification to train a mobile-friendly
  student model from a 7B parameter teacher, ensuring the student architecture maximizes NPU utilization
  without bottlenecking the shared memory bus.
question: "How would you specify distillation for an Exynos 2400 NPU-friendly student model?"
details:
  realistic_solution: The specification should define a student model using standard, heavily optimized
    blocks that compile efficiently to the dual-core NPU. Distillation should use both logit matching
    and intermediate feature distillation. Crucially, the plan must incorporate Quantization-Aware Training
    (QAT) to target INT8 precision, aligning the model with the NPU's peak 34.7 TOPS performance and reducing
    the memory footprint to fit well within the shared 12 GB RAM alongside other system processes.
  common_mistake: Candidates frequently design a student model focused solely on parameter reduction without
    considering NPU operator support. They often overlook the shared memory architecture, proposing models
    that suffer from severe memory bandwidth contention with the ISP or GPU.
  napkin_math: A 7B teacher in FP16 requires 14 GB of RAM, immediately exceeding the 12 GB shared LPDDR5X
    capacity. We specify a 1.2B parameter student model. Quantized to INT8, it requires 1.2 GB of memory,
    safely leaving space for the CPU, GPU, and ISP. Generating a 128-token response requires roughly 2
    * 1.2 billion * 128 = 307 billion operations (0.307 TOPs). Given the Exynos 2400 NPU's 34.7 TOPS peak
    throughput, theoretical compute time is 0.307 / 34.7 = 8.8 ms. Assuming only 25% efficiency due to
    memory bandwidth contention on the shared bus, the actual latency is roughly 35.2 ms, easily achieving
    real-time interaction constraints.
