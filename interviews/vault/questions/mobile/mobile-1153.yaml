title: Diagnosing Low NPU Utilization in MobileNet
scenario: You are profiling a MobileNetV2-based vision pipeline deployed on the Qualcomm Hexagon NPU. While the theoretical FLOP count is extremely low due to depthwise separable convolutions, the profiler shows the NPU is achieving a tiny fraction of its peak performance.
question: What is the root cause of the severe NPU underutilization and high latency in MobileNetV2 depthwise convolutions?
details:
  realistic_solution: The root cause is the extremely low arithmetic intensity (operations per byte of memory accessed) of depthwise convolutions. The Hexagon NPU achieves its 45 TOPS peak by relying on massive data reuse within its dense MAC arrays. Depthwise convolutions lack this spatial reuse, turning a compute-bound task into a memory-bandwidth bound one. Consequently, the NPU compute units stall while waiting for weights and activations to be fetched from the shared 12-16 GB LPDDR5X memory.
  common_mistake: |
    **The Pitfall:** Assuming fewer FLOPs automatically translates to lower latency on specialized accelerators.
    **The Rationale:** Engineers rely on theoretical operation counts, failing to map the specific operation type against the NPU's hardware architecture.
    **The Consequence:** Blaming INT8 quantization overhead or driver inefficiencies, missing the fundamental mismatch between depthwise operations and dense MAC arrays.
  napkin_math: |
    1. **Arithmetic Intensity (AI):** A standard 3x3 INT8 depthwise convolution has an AI of $\sim$2 OPs/byte.
    2. **Bandwidth Demand:** To sustain 45 TOPS (45,000 GOPS), it needs 45,000 / 2 = 22,500 GB/s bandwidth.
    3. **Hardware Limit:** Shared LPDDR5X maxes out at $\sim$80 GB/s.
    4. **Achievable Peak:** 80 GB/s $\times$ 2 OPs/byte = 160 GOPS.
    5. **Conclusion:** Maximum performance is capped at **160 GOPS** (<0.4% of the NPU's 45 TOPS capacity), completely starving the dense MAC arrays.
