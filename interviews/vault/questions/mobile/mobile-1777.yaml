title: Reducing P99 Inference Latency via Input Bucketing on Snapdragon 8 Gen 3
scenario: 'A Snapdragon 8 Gen 3 (45 TOPS INT8) mobile device runs a language model for keyboard suggestions. Variable-length inputs cause P99 latency of 180ms (SLA: 100ms). The QNN SDK is used for inference. P50 is 35ms. Profiling shows 60% of time is in dynamic shape reshaping.'
question: How would you reduce Snapdragon keyboard LLM P99 latency from 180ms by using static-shape input buckets?
details:
  realistic_solution: Compile 4 static-shape model variants for buckets [8, 16, 32, 64 tokens]. Route each input to the smallest bucket that fits. Pad to bucket size within the model. Bucket compilation is one-time cost; runtime overhead is a single bucket-selection comparison. QNN SDK supports multiple compiled delegates.
  common_mistake: |
    **The Pitfall:** Padding all inputs to the maximum sequence length (e.g., 128 tokens).
    **The Rationale:** This seems like a simple way to eliminate dynamic reshaping overhead.
    **The Consequence:** It wastes compute proportionally to O(n^2) and increases P50 latency significantly, failing to solve the overall tail-latency issue optimally.
  napkin_math: |
    1. Transformer attention scales quadratically: O(n^2).
    2. Average input length is ~20 tokens, routing to bucket-32.
    3. Compute used compared to single 128-token model: (32/128)^2 = 6.25%.
    4. Reshaping overhead eliminated: 60% of 180ms = 108ms.
    5. **Result: 108ms saved from P99, plus massive attention compute savings.**
