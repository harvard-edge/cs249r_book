title: 'Model Size Estimation: Master Tradeoffs for Multi-Modal LLM on Mobile'
scenario: 'Design and evaluate the memory tradeoffs for a multi-modal LLM (language + vision) on Snapdragon
  8 Gen 3 (16GB). Components: CLIP-ViT-B/32 vision encoder (87M params), projection MLP (10M params),
  1B language model. Use INT4 for LM, INT8 for vision encoder. Compute full memory layout and TPOT for
  text generation after image encoding.'
details:
  realistic_solution: 'CLIP ViT-B/32 INT8: 87MB. Projection MLP INT8: 10MB. LM INT4: 500MB. Image features
    (197 tokens × 512 dim × 2B FP16): 202KB. KV-cache prefix (image tokens as KV): 197 tokens × 262KB/token
    = 51.5MB. KV pool for text gen (4096 text tokens): 4096×262KB=1.07GB. System: 4GB. Total: 4000+87+10+500+0.2+51.5+1070=5,718MB
    = 5.7GB of 16GB. TPOT: 500MB/77GB/s=6.5ms. Image encode (87M MACs at ViT-B scale: 17.5 GFLOPs / 45
    TOPS = 0.39ms + overhead: ~10ms).'
  common_mistake: 'Not accounting for the image feature tensor that must be kept in memory during generation:
    ViT-B/32 at 224×224 produces 197 visual tokens × 512 dim = 202KB per image.'
  napkin_math: 'Vision: 87MB INT8. MLP: 10MB. LM: 500MB INT4. Image prefix KV: 197×262KB=51.5MB. Text
    KV: 4096×262KB=1,072MB. System: 4GB. Total: 5,720MB of 16GB = 35.8%. TPOT: 500MB/77GB/s=6.5ms/token.
    Image encode: 17.5G/45T=0.39ms + 10ms overhead = ~10ms per image. First text token: 10ms image + 6.5ms
    = 16.5ms. Subsequent: 6.5ms.'
