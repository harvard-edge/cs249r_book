title: The Background ML Battery Drain
scenario: Your photo app has a background ML feature that auto-tags photos using an on-device classification
  model (MobileNetV3, 5 MB, INT8) on an iPhone 16 (A18 chip). Users report 15% battery drain overnight
  even when they haven't opened the app. The model inference itself takes only 3ms per photo. With 200
  photos to process, that's 600ms of compute — negligible. Where is the battery going?
question: "Why does a 5 MB MobileNetV3 photo tagger with only 600 ms of inference drain 15% battery overnight on iPhone 16?"
details:
  realistic_solution: 'ML inference = 1.2J (0.002% battery). Photo decode = 30J. System wakes = 10J. ANE
    init = 5J. Attributed overhead (radio sync, Spotlight, iCloud): ~9,950J. The model is 0.012% of drain.
    Fix: (1) coalesce into single BGProcessingTask to minimize wakes. (2) Use BackgroundAssets to avoid
    network triggers. (3) Process only while charging (requiresExternalPower = true). Optimizing the model
    saves nothing — optimizing the wake pattern saves everything.'
  common_mistake: '"The model is running too many inferences — optimize the model to be faster." 600ms
    of total compute at ~2W (ANE) = 1.2 joules. iPhone 16 battery is ~67,000 joules. That''s 0.002% of
    battery — the model is not the problem.'
  napkin_math: 'ML inference: 200 × 3ms × 2W = **1.2 J** (0.002% battery). Photo decode: 200 × 50ms ×
    3W = **30 J** (0.045%). System wake: 10 × 500ms × 2W = **10 J**. ANE init: **5 J**. Attributed overhead
    (radio, sync, indexing): **~9,950 J**. The ML model is 0.012% of the attributed drain. The photo decode
    is 0.3%. The system overhead is **99.7%**. Optimizing the model saves nothing — optimizing the wake
    pattern saves everything.'
