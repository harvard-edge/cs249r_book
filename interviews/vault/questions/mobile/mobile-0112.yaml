title: The Background ML Battery Drain
scenario: Your photo app has a background ML feature that auto-tags photos using an on-device classification model (MobileNetV3, 5 MB, INT8) on an iPhone 16 (A18 chip). Users report 15% battery drain overnight even when they haven't opened the app. The model inference itself takes only 3ms per photo. With 200 photos to process, that's 600ms of total inference compute.
question: Why does a 5 MB MobileNetV3 photo tagger with only 600 ms of inference drain 15% battery overnight on an iPhone 16?
details:
  realistic_solution: 'Fix: (1) coalesce into a single BGProcessingTask to minimize wakes. (2) Use BackgroundAssets to avoid network triggers. (3) Process only while charging (requiresExternalPower = true). Optimizing the model saves nothing — optimizing the wake pattern saves everything.'
  common_mistake: |
    **The Pitfall:** Assuming the ML model itself is the primary cause of battery drain.
    **The Rationale:** Candidates focus on optimizing the model's compute because 600ms seems like a lot, without calculating the actual joules consumed compared to system overhead.
    **The Consequence:** Wasting time optimizing a model that represents less than 0.02% of the total battery drain, ignoring the real issue of inefficient wake patterns.
  napkin_math: |
    1. ML inference energy: 200 images * 3ms * 2W = 1.2 J.
    2. Photo decode energy: 200 images * 50ms * 3W = 30 J.
    3. System wake energy: 10 wakes * 500ms * 2W = 10 J.
    4. Attributed overhead (radio, sync, indexing): ~9,950 J.
    5. Total energy consumed: ~10,000 J.
    6. Model's contribution: 1.2 J / 10,000 J = **0.012%**.
