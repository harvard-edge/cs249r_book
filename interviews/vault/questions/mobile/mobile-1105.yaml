title: Analyzing OOM for 3B FP16 Model on A17 Pro
scenario: A mobile team deploys a 3 billion parameter model using FP16 precision. The engineers calculate that the weights require 6 GB of the available 8 GB shared unified memory, but the application consistently crashes with an Out-Of-Memory error upon launch.
question: Why does a 6 GB FP16 3B model OOM on A17 Pro even though the phone has 8 GB unified memory?
details:
  realistic_solution: In the Apple A17 Pro architecture, iOS strictly limits the maximum RAM a single app can allocate via Jetsam policies (typically capping it around ~50% of total memory). Even though the 6 GB model mathematically fits into the 8 GB total physical RAM, it vastly exceeds the OS-imposed single-process limit.
  common_mistake: |
    **The Pitfall:** Assuming the full 8 GB of physical memory is exclusively available to a single user space app.
    **The Rationale:** Candidates fail to account for OS overhead and strict iOS per-process Jetsam memory caps.
    **The Consequence:** Consistent OOM crashes completely preventing application launch.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target Device: A17 Pro with 8 GB unified memory.
    - Model: 3B parameters in FP16 (6 GB footprint).
    - iOS Process Limit: Typically capped at ~55% of total RAM.

    **Calculations:**
    - iOS Single-App Limit: 8.0 GB * 0.55 = 4.4 GB.
    - Overdraft: 6.0 GB (model) > 4.4 GB (OS limit).

    **Conclusion & Interpretation:**
    - **Result: 4.4 GB OS Limit (Memory-Capacity-Bound)**. Despite the physical 8GB pool, the hard OS Jetsam limit at ~4.4 GB triggers an immediate Out-Of-Memory termination. INT4/INT8 quantization is absolutely mandatory.
