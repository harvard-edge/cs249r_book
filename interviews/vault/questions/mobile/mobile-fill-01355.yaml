title: Functional Safety for Autonomous Driving on Exynos 2400
scenario: Imagine you are designing an AI-powered autonomous driving system for a next-generation vehicle,
  where the core perception and decision-making ML models are deployed on the Samsung Exynos 2400 NPU
  (34.7 TOPS, 12 GB LPDDR5X). This system must meet ISO 26262 ASIL D requirements. Describe how you would
  implement robust self-test routines and watchdog timers to ensure functional safety, especially considering
  the NPU's real-time processing capabilities and memory constraints for critical safety functions.
question: "How would you implement self-tests and watchdog timers for ASIL D autonomous driving workloads on the Exynos 2400 NPU?"
details:
  realistic_solution: 'Implement a multi-layered approach: (1) Periodic in-situ self-tests (e.g., checksums,
    pattern inference checks) for NPU memory and processing units, triggered by a safety supervisor. (2)
    A hardware watchdog timer with a refresh mechanism from a separate, highly deterministic safety micro-controller,
    monitoring the NPU''s critical task execution. (3) Employ deterministic execution patterns for safety-critical
    ML sub-graphs, potentially leveraging fixed-point quantization and pre-allocated memory regions on
    the 12 GB LPDDR5X to minimize non-determinism and optimize latency, with specific memory partitions
    dedicated to safety integrity level (SIL) tasks.'
  common_mistake: Overlooking the non-deterministic nature of some ML operations or relying solely on
    software-based error detection without hardware-level safety mechanisms, leading to unpredictable
    latency spikes or undetected silent data corruption which violates ASIL D's stringent fault tolerance
    requirements.
  napkin_math: If a critical perception model processes 30 frames per second (FPS) and each frame inference
    takes, on average, 20ms on the 34.7 TOPS NPU, with a maximum allowable safety-critical latency of
    30ms. Calculate the worst-case time budget remaining for self-test routines or watchdog refresh cycles
    within each frame's processing window, assuming a 5ms overhead for data transfer. 30ms (max latency)
    - 20ms (inference) - 5ms (transfer) = 5ms budget per frame for safety checks.
