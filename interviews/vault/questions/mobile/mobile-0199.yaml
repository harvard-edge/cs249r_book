title: 'The OS Kill Switch: Mobile Memory'
scenario: Your team is planning to deploy a new generative model to your mobile app. The target device
  is a high-end smartphone with 8 GB of RAM. To ensure your app isn't aggressively terminated by the operating
  system for using too many resources, what is the maximum memory budget you should generally target for
  your *entire* application process?
question: "What maximum total app memory budget should you target on an 8 GB smartphone to avoid OS termination?"
details:
  realistic_solution: The correct rule of thumb is to target approximately 25% of the total device RAM
    for your entire application process. On a device with 8 GB of RAM, this translates to a 2 GB budget.
    This budget must accommodate not just the ML model's weights, but also runtime activations, the application's
    UI, and all other process heap. Exceeding this is risky and can lead to the OS terminating your app.
  common_mistake: Engineers accustomed to cloud or desktop environments often assume they can use a large
    fraction (50-75%) of the device's RAM. They forget that mobile operating systems like iOS and Android
    reserve significant memory for themselves and other background processes, and will aggressively terminate
    any single app that exceeds its 'fair share' to preserve system stability and user experience.
  napkin_math: Device RAM × App Budget Ratio = Total App Budget
  options:
  - 6 GB
  - 8 GB
  - 2 GB
  - 500 MB
  correct_index: 2
