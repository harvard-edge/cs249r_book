title: A17 Pro Memory Bounds for Adversarial Defense
scenario: You are deploying an on-device text classification model to filter malicious prompt injections. To defend against gradient-based adversarial attacks during local fine-tuning, you implement adversarial training.
question: What maximum adversarial-training batch size fits on the target device after OS, model, and per-sample overheads?
details:
  realistic_solution: First, subtract the OS reserved memory and base model size from the total unified memory to find the available memory for activations and adversarial overhead. Then, determine the per-sample memory footprint including the adversarial generation overhead to calculate the maximum batch size.
  common_mistake: |
    **The Pitfall:** Forgetting to account for OS memory reservation or underestimating the memory overhead of generating adversarial examples.
    **The Rationale:** Candidates default to standard inference memory budgeting, neglecting the need to store gradients and intermediate activations during adversarial generation.
    **The Consequence:** The model exceeds available memory and causes an Out-Of-Memory (OOM) crash during on-device fine-tuning.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Total Unified Memory = 8 GB.
       - OS Reserved Memory = 3 GB.
       - Base Model Size = 2 GB.
       - Standard forward/backward pass per sample = 50 MB.
       - Adversarial overhead = 1.5x memory overhead per sample.
    2. **Calculations:**
       - Available Memory = 8 GB - 3 GB - 2 GB = 3 GB (3000 MB).
       - Adversarial overhead per sample = 50 MB * 1.5 = 75 MB.
       - Total per sample = 50 MB + 75 MB = 125 MB.
       - Max Batch Size = 3000 MB / 125 MB = 24 samples.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound.** The max batch size is exactly 24 samples before risking OS eviction.
