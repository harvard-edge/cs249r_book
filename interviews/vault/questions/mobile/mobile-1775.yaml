title: On-Device Federated Gradient Accumulation on A17 Pro
scenario: A mobile federated learning framework accumulates gradients on A17 Pro (35 TOPS, 8GB) for a personalization model (10M parameters). The training batch runs in 50 mini-batches before uploading.
question: How would you calculate gradient accumulation memory overhead and whether it fits in 8GB alongside inference workload?
details:
  realistic_solution: 'Model parameters: 10M × 4B = 40MB. Gradients (FP32): 40MB. Optimizer states (Adam: m, v): 2×40MB=80MB. Activations per mini-batch (assume batch=1, 1MB): 1MB. Total training memory: 40+40+80+1=161MB. Inference workload: assume 200MB for other apps + 100MB OS = 300MB. Total: 461MB out of 8GB. Fits easily. A17 Pro has DRAM bandwidth ~100GB/s for LPDDR5 — gradient accumulation at 50 mini-batches adds 50×40MB=2GB writes but in background, acceptable.'
  common_mistake: |
    **The Pitfall:** Calculating only parameter memory.
    **The Rationale:** Candidates often forget to account for gradient and optimizer state memory during federated training.
    **The Consequence:** Significantly underestimating the true memory footprint of on-device training.
  napkin_math: |
    1. **Parameters:** 10M params * 4 bytes = 40 MB.
    2. **Gradients:** +40 MB.
    3. **Adam Optimizer States:** +80 MB. Total FL memory = 160 MB.
    4. **Memory Usage:** 160 MB / 8192 MB = ~2% of total RAM.
    5. **Bandwidth:** 50 batches * 40 MB = 2 GB gradient traffic. At 100 GB/s LPDDR5, this takes 20 ms.
    6. **Conclusion:** **Gradient accumulation fits easily and background FL training is negligible on the A17 Pro.**
