title: The Laggy Mobile Video Filter
scenario: 'You are a Mobile ML Engineer for an app that applies a real-time generative AI filter to a
  user''s video stream. The app requires a cloud backend for the heavy computation. You are debugging
  a critical latency issue: the P99 round-trip time is 150ms, far exceeding your 50ms budget for a smooth
  ''real-time'' feel.'
question: "What backend topology problem most likely explains the 150ms P99 latency for the cloud-based mobile video filter?"
details:
  realistic_solution: The most likely cause is a lack of topology awareness in the Kubernetes scheduler.
    The two GPUs in the model's pipeline are being scheduled on different physical servers. This forces
    the ~2GB of intermediate activations to be transferred over the relatively slow inter-server InfiniBand
    network, rather than the ultra-fast intra-server NVLink bridge.
  common_mistake: Engineers often focus only on their part of the stack. A mobile engineer might instinctively
    blame the wireless network, or assume the backend GPU is just 'slow'. They fail to consider that in
    a distributed system, the time spent *communicating* data between fast components can easily dominate
    the total latency. They see 'GPU' and think 'compute', but forget the data has to get there first.
  napkin_math: The unaccounted latency is 150ms (total) - 10ms (device) - 40ms (network RTT) - 20ms (compute)
    = 80ms.
  options:
  - The mobile client's 5G connection has high jitter, causing unpredictable packet delays.
  - The data transfer from the server's network card to the GPU over the PCIe bus is the primary bottleneck.
  - The backend orchestrator is placing the two model GPUs on different servers, forcing traffic over
    the slower InfiniBand network instead of NVLink.
  - The H100 GPU is running too hot under load and is being thermally throttled, increasing inference
    time.
  correct_index: 2
