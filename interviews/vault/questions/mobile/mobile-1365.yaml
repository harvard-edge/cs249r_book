title: Hexagon NPU Burst Thermal Limit Calculation
scenario: Your team is deploying an INT8 video enhancement model on the Qualcomm Hexagon
  NPU (Snapdragon 8 Gen 3). At peak performance, the NPU delivers 45 TOPS but causes
  the SoC temperature to increase by 1.5°C per second due to heavy compute and shared
  LPDDR5X memory access. The device operates at an ambient temperature of 30°C and
  has a strict thermal throttling threshold of 48°C. Calculate the maximum number
  of tera-operations the NPU can execute in this peak burst state before thermal throttling
  is engaged.
question: How would you calculate the maximum number of tera-operations the NPU can
  execute in this peak burst state before thermal throttling is engaged?
details:
  realistic_solution: To find the maximum operations during the burst window, first
    calculate the available thermal headroom by subtracting the starting (ambient)
    temperature from the throttling threshold. Divide this headroom by the temperature
    increase rate to find the burst duration in seconds. Finally, multiply the burst
    duration by the peak performance (45 TOPS) to find the total tera-operations.
  common_mistake: Candidates often forget to subtract the ambient temperature from
    the thermal limit, or they calculate the time to throttle but fail to multiply
    it by the NPU's peak TOPS to get the total operations.
  napkin_math: "1. Thermal Headroom = 48°C (limit) - 30°C (ambient) = 18°C. \n2. Burst\
    \ Duration = 18°C / 1.5°C per sec = 12 seconds. \n3. Total Burst Operations =\
    \ 12 seconds * 45 TOPS (Qualcomm Hexagon NPU peak) = 540 Tera-operations."
