title: Hexagon NPU Burst Thermal Limit Calculation
scenario: An INT8 video enhancement model on a Snapdragon 8 Gen 3 NPU (45 TOPS peak) increases the SoC temperature by 1.5°C per second. Ambient is 30°C and the throttling threshold is 48°C.
question: How would you calculate the maximum number of tera-operations the NPU can execute in peak burst state before thermal throttling engages?
details:
  realistic_solution: To find the maximum operations during the burst window, first calculate the available thermal headroom by subtracting the starting (ambient) temperature from the throttling threshold. Divide this headroom by the temperature increase rate to find the burst duration in seconds. Finally, multiply the burst duration by the peak performance (45 TOPS) to find the total tera-operations.
  common_mistake: |
    **The Pitfall:** Forgetting to subtract ambient baseline temperature when calculating thermal capacity.
    **The Rationale:** Candidates divide the absolute threshold limit directly by the heat rate.
    **The Consequence:** They overestimate the safe execution window, causing models to slam into thermal throttling limits much earlier than anticipated.
  napkin_math: |
    - **Thermal Headroom:** 48°C (limit) - 30°C (ambient) = 18°C.
    - **Burst Duration:** 18°C / 1.5°C per sec = 12 seconds.
    - **Total Operations:** 12 seconds * 45 TOPS.
    - **Final Result:** **540 Tera-operations maximum before throttling.**
