title: On-Device Real-Time Video Pipeline Design for A17 Pro
scenario: You are designing an on-device real-time video processing pipeline for a
  live object tracking application targeting the Apple A17 Pro. The application needs
  to process 1080p video at 60 FPS. The model will run on the 16-core Neural Engine,
  which has access to the shared 8 GB unified memory. Given the unified memory architecture
  and the ~5W power envelope, analyze the data loading and preprocessing bottlenecks
  and specify a pipeline architecture that meets these requirements without draining
  the battery excessively.
question: How would you design a real-time A17 Pro video pipeline using zero-copy
  unified memory?
details:
  realistic_solution: The correct approach leverages zero-copy memory access since
    the CPU, GPU, and Neural Engine share the 8 GB unified memory. Preprocessing steps
    like color conversion (YUV to RGB) and resizing should be offloaded to the ISP
    or GPU using Metal Performance Shaders or Core Image to avoid CPU intervention.
    The pipeline should stream pixel buffers directly to the Neural Engine, minimizing
    memory bandwidth utilization and keeping within the ~5W power budget.
  common_mistake: Candidates often propose standard server-side batching or heavy
    CPU-based preprocessing (like using OpenCV for scaling and color conversion).
    This ignores the shared unified memory and high power cost of keeping the CPU
    active, leading to thermal throttling and battery drain.
  napkin_math: '1080p RGB frame at 60 FPS: 1920 * 1080 * 3 bytes * 60 = ~373 MB/s
    memory bandwidth for a single pass. If the CPU copies this for preprocessing,
    it doubles to ~746 MB/s, increasing power draw. The A17 Pro Neural Engine delivers
    35 TOPS; assuming our tracking model requires 50 GOPS per frame, 60 FPS requires
    3 TOPS, which is well within the 35 TOPS limit. The bottleneck is memory bandwidth
    and power, making zero-copy GPU/ISP preprocessing critical to stay under the 5W
    limit.'
