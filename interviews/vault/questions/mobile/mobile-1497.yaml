title: On-Device Real-Time Video Pipeline Design for A17 Pro
scenario: You are designing an on-device real-time video processing pipeline for a live object tracking application targeting the Apple A17 Pro. The application needs to process 1080p video at 60 FPS. Given the unified memory architecture and the ~5W power envelope, you must evaluate the data loading and preprocessing bottlenecks.
question: 'How would you design a real-time A17 Pro video pipeline using zero-copy unified memory to meet these requirements without excessively draining the battery?'
details:
  realistic_solution: The correct approach leverages zero-copy memory access since the CPU, GPU, and Neural Engine share the 8 GB unified memory. Preprocessing steps like color conversion (YUV to RGB) and resizing should be offloaded to the ISP or GPU using Metal Performance Shaders or Core Image to avoid CPU intervention. The pipeline should stream pixel buffers directly to the Neural Engine, minimizing memory bandwidth utilization and keeping within the ~5W power budget.
  common_mistake: |
    **The Pitfall:** Proposing standard server-side batching or heavy CPU-based preprocessing (like OpenCV).
    **The Rationale:** Candidates ignore the shared unified memory and the high power cost of keeping the CPU active.
    **The Consequence:** Thermal throttling and excessive battery drain due to redundant memory copying across the SoC.
  napkin_math: |
    **Assumptions & Constraints:**
    - Frame Size: 1080p RGB (1920 * 1080 * 3 bytes).
    - Frame Rate: 60 FPS.
    - NPU Compute: 35 TOPS.
    - Power Limit: ~5W.

    **Calculations:**
    - Single Pass Bandwidth: 1920 * 1080 * 3 * 60 = ~373 MB/s.
    - CPU Copy Overhead: ~746 MB/s (read + write).
    - Model Requirement: 50 GOPS/frame * 60 FPS = 3 TOPS.

    **Conclusion & Interpretation:**
    - **Result: 3 TOPS (Memory-Bound)**. Compute is under the 35 TOPS limit, but memory bandwidth and power become the bottleneck without zero-copy operations.
