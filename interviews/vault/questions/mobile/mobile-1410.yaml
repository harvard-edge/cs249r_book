title: Optimizing Encoder-Decoder on Snapdragon NPU
scenario: "You are deploying an on-device translation system using an encoder-decoder architecture on a smartphone equipped with a Qualcomm Hexagon NPU (Snapdragon 8 Gen 3). While the encoder processes the initial context rapidly, the autoregressive decoder phase is severely missing the 40 tokens per second latency target. The system has access to a shared 12-16 GB LPDDR5X memory pool and a 45 TOPS INT8 NPU."
question: "How should an encoder-decoder model be optimized on Snapdragon NPU for memory-bound autoregressive decoding?"
details:
  realistic_solution: The candidate should identify that autoregressive decoding is memory-bound because the entire model and KV cache must be loaded from LPDDR5X for every generated token. The solution is to quantize both weights and KV cache to INT8 to leverage the Hexagon NPU's native 45 TOPS INT8 support, cutting memory traffic in half, and potentially utilizing Grouped Query Attention to further shrink the KV cache footprint.
  common_mistake: |
    **The Pitfall:** Misdiagnosing the decoder as compute-bound.
    **The Rationale:** Candidates suggest reducing the number of layers to save FLOPs, failing to distinguish the compute-heavy nature of the encoder from the memory-bandwidth-bound nature of the decoder.
    **The Consequence:** Failed latency optimizations that do not address the I/O bottleneck.
  napkin_math: |
    - For a 1.5B parameter model in FP16, weights take `3GB`.
    - Generating 40 tokens/sec requires `3GB * 40 = 120 GB/s` of memory bandwidth, exceeding typical mobile limits.
    - Quantizing to INT8 reduces weights to `1.5GB`, requiring `60 GB/s`, which is feasible on LPDDR5X.
    - Computing 1.5B MACs at 40 tokens/sec = `120 GOPS`. This utilizes less than 1% of the 45 TOPS NPU compute capacity.
    - **Conclusion:** The bottleneck is entirely **memory bandwidth, not compute**, and quantization solves it.
