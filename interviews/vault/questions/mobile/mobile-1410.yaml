title: Optimizing Encoder-Decoder on Snapdragon NPU
scenario: "You are deploying an on-device translation system using an encoder-decoder architecture on a smartphone equipped with a Qualcomm Hexagon NPU. While the encoder processes the initial context rapidly, the autoregressive decoder phase is severely missing the 40 tokens per second latency target."
question: "How should an encoder-decoder model be optimized on a mobile NPU for memory-bound autoregressive decoding?"
details:
  realistic_solution: |
    Autoregressive decoding is heavily memory-bandwidth bound because the entire model and KV cache must be streamed from the shared LPDDR5X bus for every token generated. Implement W8A8 (INT8) quantization for both weights and KV cache to leverage the Hexagon NPU's native INT8 matrix extensions. This halves the memory traffic. Additionally, deploy Grouped Query Attention (GQA) to further compress the KV cache memory footprint.
  common_mistake: |
    **The Pitfall:** Misdiagnosing the decoder as compute-bound.
    **The Rationale:** Candidates suggest reducing the number of layers to save FLOPs, failing to distinguish the compute-heavy nature of the encoder from the memory-bandwidth-bound nature of the decoder.
    **The Consequence:** Failed latency optimizations that do not address the actual I/O bottleneck.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model size: 1.5B parameters.
       - Target throughput: 40 tokens/sec.
       - FP16 Weights: 3GB. INT8 Weights: 1.5GB.
    2. **Calculations:**
       - FP16 Bandwidth requirement: 3GB/token * 40 tokens/sec = 120 GB/s (Exceeds mobile LPDDR5X peak limits).
       - INT8 Bandwidth requirement: 1.5GB/token * 40 tokens/sec = 60 GB/s.
       - Compute requirement: 1.5B MACs * 40 tokens/sec = 120 GOPS (vs. typical 45 TOPS capacity).
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound.** The bottleneck is entirely **memory bandwidth, not compute**. Quantization solves it by fitting within the 60 GB/s envelope.
