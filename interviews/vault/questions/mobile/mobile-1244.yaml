title: On-Device CI/CD for Video Super-Resolution
scenario: You are architecting the CI/CD pipeline and model registry for an on-device real-time video super-resolution feature. Multiple teams are continuously training new model variants, but you must ensure that only models meeting strict hardware constraints are promoted.
question: "How would you design the end-to-end MLOps lifecycle to automate the compilation, hardware-in-the-loop profiling, and deployment of these models targeting an NPU with shared memory?"
details:
  realistic_solution: A robust L5 design integrates Hardware-in-the-Loop (HITL) testing directly into the CI/CD pipeline using a farm of target devices. The model registry tracks compiled model binaries, quantization schemes, and on-device profiling metrics alongside standard accuracy. The CI pipeline compiles the model, deploys it to the device farm, and evaluates latency and memory bandwidth usage while simulating concurrent ISP/GPU background workloads before allowing promotion.
  common_mistake: |
    **The Pitfall:** Designing cloud-centric pipelines that rely on generic proxy metrics (like MACs/FLOPs) instead of real hardware profiling.
    **The Rationale:** Candidates ignore the shared nature of mobile memory systems, failing to test models under realistic bandwidth contention with the ISP and GPU.
    **The Consequence:** Promoting models that perform well theoretically but completely crash the device in production due to LPDDR5X bandwidth starvation.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Target: 60 FPS pipeline.
       - NPU Compute: 34.7 TOPS.
       - Shared Memory: 12 GB LPDDR5X (~68.2 GB/s theoretical).
       - Background Contention: ISP/GPU consume 40 GB/s.
    2. **Calculations:**
       - Available NPU Bandwidth: 68.2 GB/s - 40 GB/s = ~28 GB/s.
       - Required Arithmetic Intensity to Saturate NPU: (34.7 * 10^12 OPs) / (28 * 10^9 bytes) = ~1239 OPs/byte.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound (Contention)**
       - Models must exceed an arithmetic intensity of ~1239 OPs/byte. The CI/CD pipeline must reject models below this threshold.
