title: The Double-Precision Mobile Tax
scenario: A data scientist writes a custom post-processing script for bounding boxes in Python, and you port it to C++ for the iOS app. In Python: `area = width * height * 0.5`. In C++: `float area = width * height * 0.5;`. The profiler flags this line as shockingly slow on the ARM CPU.
question: Why does using `0.5` instead of `0.5f` slow ARM NEON bounding-box postprocessing?
details:
  realistic_solution: 'The literal 0.5 in C++ is a double (64-bit), not a float. The compiler promotes the entire expression to double-precision, halving NEON SIMD throughput: a 128-bit register holds 4 floats but only 2 doubles. Additionally, the float-to-double and double-to-float casts add conversion instructions. Fix: use 0.5f to keep everything in 32-bit. On ARM NEON, this restores 4-wide vectorization and eliminates type promotion overhead, typically yielding a 2-3x speedup for tight arithmetic loops.'
  common_mistake: |
    **The Pitfall:** Blaming C++ for being "slower at floating point math" than Python.
    **The Rationale:** Developers unfamiliar with strict C++ typing assume literal numbers are naturally 32-bit floats.
    **The Consequence:** They write code that forces 64-bit double-precision operations, halving ARM NEON SIMD throughput.
  napkin_math: |
    1. **NEON Float Capacity:** A 128-bit NEON register holds four 32-bit floats (4 multiplications per clock cycle).
    2. **NEON Double Capacity:** A 128-bit NEON register holds only two 64-bit doubles.
    3. **Type Promotion Overhead:** Using `0.5` forces the compiler to promote `width` and `height` to doubles, halving vectorization throughput.
    4. **Conversion Overhead:** Casting types back and forth adds instructions.
    **Fixing `0.5` to `0.5f` restores 4-wide vectorization, yielding a 2-3x speedup.**
