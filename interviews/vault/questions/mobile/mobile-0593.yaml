title: The Double-Precision Mobile Tax
scenario: 'A data scientist writes a custom post-processing script for bounding boxes in Python, and you
  port it to C++ for the iOS app. In Python: `area = width * height * 0.5`. In C++: `float area = width
  * height * 0.5;`. The profiler flags this line as shockingly slow on the ARM CPU. Why?'
details:
  realistic_solution: 'The literal 0.5 in C++ is a double (64-bit), not a float. The compiler promotes
    the entire expression to double-precision, halving NEON SIMD throughput: a 128-bit register holds
    4 floats but only 2 doubles. Additionally, the float-to-double and double-to-float casts add conversion
    instructions. Fix: use 0.5f to keep everything in 32-bit. On ARM NEON, this restores 4-wide vectorization
    and eliminates type promotion overhead, typically yielding a 2-3x speedup for tight arithmetic loops.'
  common_mistake: '"C++ is just slower at floating point math than Python." Python relies on C under the
    hood; the issue is a specific C++ language default interacting with ARM architecture.'
  napkin_math: A 128-bit NEON register can hold four 32-bit floats, allowing 4 multiplications per clock
    cycle. It can only hold two 64-bit doubles, instantly halving throughput, plus the overhead of casting
    types back and forth.
