title: Hexagon NPU Transformer Scheduling for LLMs
scenario: You are tasked with optimizing an LLM inference pipeline on a mobile NPU. The complex computation graph includes numerous matrix multiplications, convolutions, and custom element-wise operations that generate heavy intermediate activations.
question: How would you design transformer operator scheduling on the NPU to maximize throughput and minimize memory traffic?
details:
  realistic_solution: |
    A realistic solution involves a hardware-aware multi-pronged approach:
    1. **Graph Analysis and Partitioning:** Partition the graph to identify subgraphs where execution can be localized strictly within the NPU's SRAM (e.g., TCM - Tightly Coupled Memory).
    2. **Hardware-Aware Layer Fusion:** Profile the model to apply compiler-driven fusion (e.g., MatMul-Add-ReLU, FlashAttention-2). This prevents intermediate tensors from ever spilling out to the slow LPDDR memory.
    3. **Memory Aware Scheduling (Tiling):** Implement a dynamic memory allocation strategy. Schedule operators that consume common intermediate tensors sequentially. Use advanced tiling techniques to process data in blocks that fit exactly into the SRAM.
    4. **Double Buffering:** For unavoidable data transfers, use asynchronous DMA with double buffering to completely hide the latency of fetching weights and activations behind the arithmetic execution of the systolic array.
  common_mistake: |
    **The Pitfall:** Blindly parallelizing operators across NPU cores without considering intermediate tensor locality.
    **The Rationale:** Candidates apply cloud-GPU paradigms, prioritizing compute saturation over memory locality, unaware of the severe penalty of LPDDR traffic on edge devices.
    **The Consequence:** Massive intermediate activations spill to main memory, causing the memory bus to become a catastrophic bottleneck while the NPU cores sit idle.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - NPU Bandwidth: ~60 GB/s (LPDDR5X).
       - NPU Compute: 45 TOPS.
       - Tensor Size: 1 GB of INT8 layer weights and intermediate activations.
    2. **Calculations:**
       - Unoptimized Memory Transfer Time (Read + Write): 2 GB / 60 GB/s = ~33 ms.
       - Compute Time (45 GOPS layer): 45 GOPS / 45 TOPS = 1 ms.
    3. **Conclusion & Interpretation:**
       **Result: 33ms transfer vs 1ms compute (Memory-Bandwidth-Bound).** Without operator fusion and localized SRAM scheduling, memory traffic completely dwarfs raw compute execution by a factor of 33x.
