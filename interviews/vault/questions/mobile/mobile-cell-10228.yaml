title: Evaluating Embedding Model Quality vs Size Tradeoff on A17 Pro
scenario: 'An A17 Pro (8GB, 35 TOPS) RAG app needs to choose between three embedding models: Model A (22M
  params, 128-dim, MRR@10=0.61, 25ms), Model B (33M params, 256-dim, MRR@10=0.72, 40ms), Model C (66M
  params, 384-dim, MRR@10=0.78, 80ms). The app performs 5 retrievals per user session. Evaluate which
  model maximizes quality within a 200ms retrieval budget per session and a 100MB memory limit for the
  embedding model.'
question: "How would you evaluate which model maximizes quality within a 200ms retrieval budget per session and a 100MB memory limit for the embedding model?"
details:
  realistic_solution: 'Eliminate Model C: 66M INT8 = 66MB (fits memory) but 5*80ms=400ms exceeds 200ms
    budget. Model A: 5*25ms=125ms (budget OK), 22MB INT8 (fits), MRR=0.61. Model B: 5*40ms=200ms (exactly
    at budget), 33MB INT8 (fits), MRR=0.72. Model B is optimal: 18% higher MRR than A at the exact budget
    limit. Validate Model B latency is P95 not mean — if 40ms is mean and P95 is 65ms, then 5*65ms=325ms
    exceeds budget. Use Model B with a 35ms per-embedding timeout (abort and use approximate result if
    exceeded) to guarantee budget compliance.'
  common_mistake: Choosing Model C because it has the highest MRR without checking the memory constraint
    (66M * 4 bytes = 264MB — exceeds 100MB limit even before quantization) or the latency budget (5 *
    80ms = 400ms > 200ms budget).
  napkin_math: 'Memory: Model A INT8: 22M*1=22MB. Model B INT8: 33MB. Model C INT8: 66MB. All fit within
    100MB. Latency: A: 5*25=125ms. B: 5*40=200ms. C: 5*80=400ms. Budget 200ms: A and B pass, C fails.
    Quality: B/A MRR ratio = 0.72/0.61=1.18 (18% improvement). B/C = 0.72/0.78=0.923 (7.7% worse than
    C). Model B gives 18% quality gain over A with same memory budget and exact latency compliance. Recommended:
    Model B with P95 validation.'
