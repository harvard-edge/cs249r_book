title: Diagnosing OOM during long-context Gemini Nano inference
scenario: You are deploying a summarization feature using Gemini Nano on the Google Tensor G3. The model
  runs flawlessly for short paragraphs, but when users attempt to summarize a long 4000-token document,
  the application frequently crashes with an Out-Of-Memory (OOM) error despite the device having 12 GB
  of LPDDR5X RAM. The model weights are already loaded correctly and fit within the allocated memory footprint.
  What is the most likely cause of this crash, and how would you diagnose the memory pressure during this
  long-context generation?
question: "What is the most likely cause of this crash, and how would you diagnose the memory pressure during this long-context generation?"
details:
  realistic_solution: The root cause is the dynamic memory allocation for the KV-cache, which grows linearly
    with the context length. To diagnose, I would profile the native memory allocations during the forward
    pass, specifically monitoring the tensor allocations for the key and value states. Given the Tensor
    G3's unified 12 GB LPDDR5X memory is shared with the Android OS and other apps, the actual available
    memory for the ML payload is strictly capped. The solution involves implementing a fixed-size KV-cache
    pre-allocation strategy or employing techniques like a sliding window attention to cap memory usage
    and prevent unbounded growth.
  common_mistake: Candidates often assume the OOM is due to the model weights themselves or the Android
    OS aggressively killing the background app without considering the dynamic memory growth during inference.
    They might suggest reducing the model size or applying heavier quantization, missing the critical
    insight that the crash specifically correlates with sequence length and the unmanaged growth of the
    KV-cache.
  napkin_math: 'Assume Gemini Nano has hidden dimension d=2048, 32 layers, and uses FP16 (2 bytes per
    element). The KV-cache stores both keys and values per token: 2 (K,V) * 2048 (dim) * 32 (layers) *
    2 bytes = 262,144 bytes (~256 KB) per token. For a 4000-token sequence, the KV-cache alone requires
    4000 * 256 KB = 1,024,000 KB, or roughly 1.02 GB. While the Tensor G3 has 12 GB LPDDR5X, the OS and
    background processes typically consume 6-8 GB, and the model weights (e.g., 1.8B params in FP16) consume
    ~3.6 GB. This leaves less than 1 GB of headroom for activations. Attempting to dynamically allocate
    an additional 1.02 GB for the KV-cache easily exceeds the app''s memory limit or fails due to memory
    fragmentation.'
