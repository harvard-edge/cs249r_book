title: Define Coresets for On-Device Fine-Tuning
scenario: You are deploying an on-device personalization pipeline for Gemini Nano on the Google Tensor
  G3. While the device features 12 GB of LPDDR5X RAM, strict system constraints limit the memory footprint
  available for background continuous learning. To minimize the data processed by the on-device TPU, you
  must use a data selection technique that extracts a small, mathematically rigorous subset of the data
  which approximates the full dataset's training dynamics. What is the formal ML term for this representative
  data subset?
question: "What ML term describes a small representative subset for Tensor G3 on-device personalization under tight memory limits?"
details:
  realistic_solution: The correct term is a 'coreset' (or coreset selection). A coreset is a minimal,
    weighted subset of data that rigorously approximates the geometry or loss landscape of the entire
    dataset. In mobile deployments like the Tensor G3, using coresets is crucial for data efficiency,
    allowing the on-device TPU to quickly fine-tune models without exhausting the shared 12 GB LPDDR5X
    memory or draining the battery.
  common_mistake: Candidates often confuse this concept with random sampling, stratified sampling, or
    generic data pruning without knowing the specific terminology. They fail to recall the specific mathematical
    definition of a subset that theoretically bounds the loss relative to the full dataset.
  napkin_math: Assume a user generates 50,000 interaction samples, each requiring a 1024-dimensional float16
    embedding (2 KB per sample). The full dataset requires 50,000 * 2 KB = 100 MB of memory. The Tensor
    G3 has 12 GB LPDDR5X RAM, but the OS might cap background ML data buffers at 20 MB. By recalling and
    applying a 10% coreset selection, the dataset size is reduced to 5,000 samples. 5,000 * 2 KB = 10
    MB. This fits comfortably within the 20 MB allocation, leaving room for optimizer states while leveraging
    the 7.5 TOPS TPU.
