title: The Real-time Rendering Wall
scenario: 'Your team needs to deploy a 20 GFLOP object detector on a Snapdragon 8 Gen 3 phone, but it
  currently runs at 200ms per frame, catastrophically missing the 16ms UI ''jank'' budget. You propose
  two solutions:'
details:
  realistic_solution: Option B is the correct approach. While unstructured pruning (Option A) reduces
    the theoretical FLOP count, it results in sparse weight matrices that are poorly suited for mobile
    NPUs. The Hexagon NPU cannot effectively skip the zero-value computations and its memory prefetching
    mechanisms are disrupted by the irregular data access, leading to little-to-no actual speedup. The
    latency would remain close to 200ms.
  common_mistake: Engineers often assume that FLOPs reduction from pruning translates directly to latency
    reduction on all hardware. They fail to account for the architectural specifics of hardware accelerators
    like mobile NPUs, which gain their performance from massively parallel, dense computations and are
    highly inefficient at handling the irregular memory access patterns of unstructured sparse models.
  napkin_math: 1. **Target Latency:** 16 ms. | 2. **Hardware:** Snapdragon 8 Gen 3 NPU, optimized for
    dense matrix operations. | 3. **Option A (Pruning):** The model is now 10 GFLOPs. However, due to
    unstructured sparsity, the architectural efficiency (η_arch) on the NPU is extremely low. `Effective
    Speedup ≈ FLOPs Reduction × η_arch` ≈ `2x × ~0%` ≈ `No Speedup`. The latency remains ~200ms. | 4.
    **Option B (Distillation):** The new model is dense and 1 GFLOP (20x smaller). For dense models, NPU
    efficiency is high. A first-order estimate of latency is `200 ms / 20` = `10 ms`. This is a realistic
    estimate that falls comfortably within the 16ms budget. | 5. **Conclusion:** Distillation to a smaller,
    dense architecture is the only viable path to meet the real-time constraint on this hardware.
  options:
  - Distillation only improves accuracy, it doesn't solve latency issues.
  - Pruning halves the FLOPs, so latency will become 100ms, which is a significant improvement.
  - A small, dense student model from distillation is NPU-friendly and will likely meet the 16ms budget,
    whereas the pruned model will see little speedup.
  - Neither will work; the only solution is to run the model on the cloud via an API call.
  correct_index: 2
