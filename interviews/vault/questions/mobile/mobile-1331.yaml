title: Calculate sustained FPS under A17 Pro thermal throttling
scenario: You are deploying a continuous object tracking model on an iPhone 15 Pro using the Apple A17 Pro Neural Engine. The A17 Pro's 16-core Neural Engine achieves a peak performance of 35 TOPS at approximately 5W. However, for a prolonged AR session, the device's thermal management system restricts the sustained power budget for the ANE to just 1.5W to avoid overheating. Your model requires 0.25 TOPS per inference.
question: What sustained FPS can an A17 Pro object tracker reach under a 1.5W ANE thermal power limit, assuming linear power scaling?
details:
  realistic_solution: The correct approach is to first determine the compute efficiency of the Apple A17 Pro Neural Engine in TOPS per Watt using the peak specifications. Then, apply this efficiency metric to the sustained thermal power envelope to find the maximum continuous TOPS available. Finally, divide the sustained TOPS by the model's compute requirement per frame to find the thermally safe frame rate.
  common_mistake: |
    **The Pitfall:** Assuming peak burst performance (35 TOPS) is available indefinitely.
    **The Rationale:** Candidates fail to calculate the TOPS/W efficiency metric to scale performance down to the sustained power budget.
    **The Consequence:** The calculated FPS is unrealistically high (e.g., 140 FPS) and will cause severe thermal throttling in production.
  napkin_math: |
    1. Peak efficiency: 35 TOPS / 5W = 7 TOPS/Watt.
    2. Sustained performance: 7 TOPS/Watt * 1.5W (thermal limit) = 10.5 TOPS.
    3. Sustained FPS: 10.5 TOPS / 0.25 TOPS/frame = 42 FPS.
    4. **Result: Maximum sustained frame rate is 42 FPS.**
