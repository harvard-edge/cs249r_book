title: 'The Phantom Reboot: Designing a Resilient Automotive ML Watchdog'
scenario: 'You are the ML Systems Engineer for a ''Driver Drowsiness Detection'' feature shipping in an EV fleet. The model runs on the car''s primary mobile-grade SoC. After launch, a critical bug appears: in specific lighting conditions, the model''s activations explode, causing a NaN propagation that freezes inference. The Vehicle Control Unit (VCU) runs a hardware watchdog expecting a heartbeat every 100ms. When inference freezes, the heartbeat stops, the watchdog fires, and the VCU violently reboots the entire infotainment SoC to recover.'
question: How should the drowsiness detector recover from NaN freezes without triggering the vehicle control watchdog reboot?
details:
  realistic_solution: Construct a multi-layered defense-in-depth architecture. Decouple the failure detection logic from the master VCU hardware watchdog. Implement an internal software watchdog operating on a tighter sub-100ms deadline. When it detects a stalled or NaN thread, it intercepts the crash, immediately dispatches a synthetic heartbeat to appease the VCU, securely dumps the problematic activation state to flash for fleet telemetry, and initiates a localized model reboot.
  common_mistake: |
    **The Pitfall:** Proposing a basic Python `try/except` block or relying exclusively on standard exception handling around the inference call.
    **The Rationale:** Candidates assume managing the immediate software exception is sufficient, utterly failing to consider physical hardware watchdogs, process-level state recovery, or capturing fleet-wide drift data.
    **The Consequence:** The hardware watchdog continues to trigger hard reboots across the fleet, and the underlying optical data-drift issue goes unpatched because zero diagnostic telemetry is persisted.
  napkin_math: |
    **Assumptions & Constraints:**
    - VCU Hardware Watchdog Timeout: 100ms.
    - Inference SLA: Must output state or send heartbeat before timeout.
    - Custom Software Watchdog Target: 80ms.

    **Calculations:**
    - Maximum heartbeat window: 100ms.
    - Internal software interrupt threshold: 80ms.
    - Recovery Safety Margin: 100ms - 80ms = 20ms.

    **Conclusion & Interpretation:**
    - **Result: 20 ms (System-Bound)**. Enforcing an internal 80ms software interrupt establishes a strict 20ms hardware safety buffer. This window is sufficient to intercept a NaN lockup and dispatch a synthetic ping to block catastrophic VCU failure.
