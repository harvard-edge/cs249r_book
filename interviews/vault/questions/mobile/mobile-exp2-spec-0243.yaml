title: Memory-Mapped NPU Inference Design on Snapdragon 8 Gen 3
scenario: We are deploying a 2B parameter conversational agent on a mobile device powered by the Qualcomm
  Hexagon NPU (Snapdragon 8 Gen 3). The application requires instant cold-start times but the Android
  OS frequently evicts background processes to preserve the shared 12-16 GB LPDDR5X memory. Design a memory-mapped
  inference system that utilizes shared memory between the heterogeneous CPU and NPU to achieve zero-copy
  weight loading and avoid redundant memory allocations.
question: "How would you design a memory-mapped inference system that utilizes shared memory between the heterogeneous CPU and NPU to achieve zero-copy weight loading and avoid redundant memory allocations?"
details:
  realistic_solution: The correct approach uses Android's DMA-BUF/ION allocators to carve out shared,
    zero-copy memory regions accessible by both the CPU and the Hexagon NPU. By mapping the INT8 model
    weights directly from storage into this shared buffer, the NPU can read the weights without duplicating
    the memory footprint. The design must also ensure these pages are properly pinned or mapped via the
    IOMMU to prevent page faults during real-time NPU execution.
  common_mistake: Candidates often propose standard POSIX `mmap` with `MAP_PRIVATE`, which creates copy-on-write
    overheads when the NPU driver and CPU access the same pages. They also frequently overlook that the
    Hexagon NPU requires specifically allocated contiguous memory (like DMA-BUF/ION) and cannot directly
    use standard CPU virtual memory pages.
  napkin_math: A 2B parameter model quantized to INT8 takes exactly 2GB. Standard loading duplicates weights
    into user-space and the NPU driver, consuming 4GB (up to 33% of the shared 12-16 GB LPDDR5X memory
    pool). A DMA-BUF memory-mapped approach keeps the system footprint at exactly 2GB. Furthermore, zero-copy
    mapping allows the 45 TOPS INT8 Hexagon NPU to bypass a ~500ms standard memory copy from storage,
    executing first layers instantly as memory is paged in.
