title: CI/CD Pipeline Graph Break Diagnosis
scenario: Your automated CI/CD pipeline pushes a quantized INT8 object detection model (90 GOPS) to the
  model registry. While the pipeline's generic simulator predicts an 8ms latency, production telemetry
  from devices running the Qualcomm Hexagon NPU (Snapdragon 8 Gen 3) shows a 30ms latency. The device
  features 45 TOPS INT8 compute, a heterogeneous CPU+GPU+NPU architecture, and shared 12-16 GB LPDDR5X
  memory. Profiling reveals unexpected CPU utilization during inference. What pipeline validation flaw
  led to this discrepancy, and what is the physical root cause on the device?
question: "What pipeline validation flaw led to this discrepancy, and what is the physical root cause on the device?"
details:
  realistic_solution: The root cause is a graph break caused by an operator (e.g., SiLU activation) unsupported
    by the Hexagon NPU, forcing a fallback to the CPU. The heterogeneous architecture must shuffle intermediate
    tensors via the shared LPDDR5X memory. The solution is to update the CI/CD pipeline to include hardware-in-the-loop
    (HITL) testing or to run the specific Qualcomm compiler during the CI build stage to fail the pipeline
    if unsupported NPU ops are detected.
  common_mistake: 'Candidates often blame thermal throttling or assume the model wasn''t quantized to
    INT8 correctly. They miss the MLOps lifecycle angle: the CI/CD pipeline failed to validate hardware-specific
    operator compatibility before updating the model registry, creating a severe training-serving skew.'
  napkin_math: 'Expected NPU latency: 90 GOPS / (45 TOPS INT8 * 25% utilization) = 8 ms. With a graph
    break, assuming 80 GOPS on NPU and 10 GOPS falling back to a 0.5 TOPS CPU core: NPU time = 80 / 11.25
    TOPS = 7.1 ms. CPU time = 10 GOPS / 0.5 TOPS = 20 ms. Moving a 4MB intermediate tensor over the shared
    12-16 GB LPDDR5X memory (assuming ~75 GB/s bandwidth) is fast (~0.05ms), but OS synchronization for
    the CPU-NPU handoff adds ~2ms. Total latency = 7.1 + 20 + 2 = 29.1 ms, aligning with the 30 ms symptom.'
