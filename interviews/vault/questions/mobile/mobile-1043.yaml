title: 'Mobile TCO Implement: Calculate Cost Per Inference for Mobile App'
scenario: Implement the complete cost-per-inference calculation for a mobile LLM app using Snapdragon 8 Gen 3 (45 TOPS INT8, 16GB, 4W). Model: Llama-3-8B INT4 (4GB). User makes 30 queries/day with 150 output tokens at 25 tok/s.
question: How would you calculate the inference time, energy per inference, annual energy cost per user, and cost if monetizing electricity as a service (at $0.10/kWh markup)?
details:
  realistic_solution: 'Decode: 150 tokens at 25 tok/s = 6 seconds. Prefill (100 input tokens): Snapdragon 8 Gen 3 prefill throughput ~500 tok/s = 0.2s. Total inference time: 6.2 seconds. Energy: 4W * 6.2s = 24.8J = 0.00689Wh per query. Annual: 30 * 365 * 0.00689Wh = 75.5Wh. Cost: 75.5 * $0.10/1000 = $0.00755/yr. At $0.10/kWh retail, cost-to-serve energy: $0.00755/yr per user. At 1M users: $7,550/yr total electricity cost from user device batteries. vs cloud serving 1M users: 1M*30*365*150*$0.001/1000=$1,642,500/yr. On-device saves $1.63M/yr in direct API costs.'
  common_mistake: |
    **The Pitfall:** Failing to separate the prefill phase from the decode phase when modeling mobile inference time and energy.
    **The Rationale:** Engineers assume a flat tokens-per-second rate, ignoring that the prompt prefill is a fast compute-bound operation while token generation is a slow memory-bandwidth-bound operation.
    **The Consequence:** Overestimating the time and energy required for queries with large prompts, breaking the accuracy of the TCO model.
  napkin_math: |
    - **Inference Time:** 0.2s prefill + 6.0s decode = 6.2s total.
    - **Energy per Inference:** 4W * 6.2s = 24.8 J = **~0.00689 Wh**.
    - **Annual Device Energy Cost:** 30 queries * 365 days * 0.00689 Wh = 75.5 Wh. At $0.10/kWh, cost is **~$0.00755/year per user**.
    - **Cloud Comparison (1M users):** 1M * 10,950 queries * 150 tokens * ($0.001 / 1000 tokens) = **~$1.64M/year**.
    - **Conclusion:** On-device serving saves over $1.6M annually in direct API costs for a 1M user base.
