title: 'Mobile TCO Implement: Calculate Cost Per Inference for Mobile App'
scenario: Implement the complete cost-per-inference calculation for a mobile LLM app using an INT4 model (4GB). User makes 30 queries/day with 100 input and 150 output tokens at 25 tok/s.
question: How would you calculate the inference time, energy per inference, annual energy cost per user, and cost if monetizing electricity as a service (at $0.10/kWh markup)?
details:
  realistic_solution: "The inference cycle must be decomposed into Time To First Token (TTFT) for prefill and Time Per Output Token (TPOT) for decode. Assuming a prefill rate of 500 tok/s, TTFT for 100 tokens is 0.2s. Decoding 150 tokens at 25 tok/s takes 6.0s. Total inference time is 6.2 seconds per query. At a nominal 4W power draw, each query consumes 24.8 Joules (0.00689 Wh). Over a year (30 queries/day), the device consumes 75.5 Wh. At retail electricity rates ($0.10/kWh), the annual energy cost per user is $0.00755. For an enterprise deployment of 1M users, on-device serving shifts ~$1.64M/yr of direct cloud API costs to essentially zero cost."
  common_mistake: |
    **The Pitfall:** Failing to separate the prefill phase from the decode phase when modeling mobile inference time and energy.
    **The Rationale:** Engineers assume a flat tokens-per-second rate, ignoring that prompt prefill is a fast compute-bound operation while token generation is a slow memory-bandwidth-bound operation.
    **The Consequence:** Overestimating the time and energy required for queries with large prompts, breaking the accuracy of the TCO model.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Power draw: 4W.
       - Queries: 30/day, 100 input tokens, 150 output tokens.
       - Prefill rate: 500 tok/s. Decode rate: 25 tok/s.
       - Electricity cost: $0.10/kWh. Cloud API cost: $0.001/1k tokens.
    2. **Calculations:**
       - Inference time: 100/500 (0.2s prefill) + 150/25 (6.0s decode) = 6.2s total.
       - Energy per inference: 4W * 6.2s = 24.8 J = ~0.00689 Wh.
       - Annual device energy: 30 * 365 * 0.00689 Wh = 75.45 Wh.
       - Annual energy cost/user: 75.45 Wh / 1000 * $0.10 = $0.00755.
       - Cloud equivalent (1M users): 1M * (30 * 365) * 150 * ($0.001 / 1000) = $1,642,500/year.
    3. **Conclusion & Interpretation:**
       - **Result: Economically Dominant.** On-device inference shifts over $1.6M annually in direct cloud API costs for a 1M user base to negligible on-device battery drain.
