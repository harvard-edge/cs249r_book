title: 'Mobile Transformer Cost Optimization: On-Device vs Streaming Hybrid'
scenario: A mobile LLM app uses Tensor G3 (7.5 TOPS, 12GB, ~68GB/s) for on-device
  inference. Phi-3-Mini INT4 (1.9GB, 27.9ms/tok) gives P99=2.79s for 100 tokens (<
  3s SLO). When network is good (< 100ms RTT), cloud H100 ($0.001/1K tokens) gives
  P50=500ms. Design an optimal hybrid policy that minimizes cost while maintaining
  P99<3s across network conditions. Quantify the cost per 1000 daily queries.
question: How would you quantify the cost per 1000 daily queries?
details:
  realistic_solution: 'On-device: always P99=2.79s, $0/query. Cloud (good network):
    P50=500ms, P99=1.5s (with 100ms RTT + 1.4s inference). Cost: $0.001/1000 tokens
    * 100 tokens/query = $0.0001/query. Hybrid policy: attempt cloud first, fallback
    to on-device if cloud RTT > 150ms. Network good (70% of time): cloud used. Network
    marginal (30%): on-device. P99 of hybrid: max(cloud_P99 * P_cloud_good, on-device_P99
    * P_on_device). P99: P(>3s) = P(cloud fails) * P(on-device > 3s) = 0.3 * P(2.79s
    > 3s) = 0 (on-device always <3s). Hybrid P99 = 2.79s ✓. Cost: 70% * $0.0001 +
    30% * $0 = $0.00007/query. 1000 queries: $0.07/day. vs pure cloud: $0.10/day.
    Savings: 30%.'
  common_mistake: 'Always routing to cloud when available (for lower latency) without
    accounting for: (1) per-query cloud cost that accumulates, (2) network unreliability
    causing P99 violations when fallback to on-device is needed, (3) privacy concerns.'
  napkin_math: 'On-device: $0, P99=2.79s. Cloud: $0.0001/query, P99=1.5s. Hybrid (70%
    cloud, 30% on-device): P99=max(1.5s, 2.79s)=2.79s. Cost: 0.7*$0.0001+0.3*$0=$0.00007.
    1000 queries: $0.07/day. Pure cloud: $0.10/day. Savings: $0.03/day=30%. Annual:
    $10.95 saved per device. Privacy: 30% on-device queries always private. For 1M
    users: $10.95M/yr savings. But: hybrid adds 3 seconds overhead when falling back
    (detect timeout + switch). Better: parallel request: send to cloud AND compute
    on-device simultaneously. Use whichever arrives first. Double compute for cloud
    queries but guarantee P99=min(cloud,device).'
