title: Monitoring On-Device ML Health on Snapdragon 8 Gen 3 NPU
scenario: You are tasked with deploying a critical on-device ML model for real-time inference on a mobile device powered by the Snapdragon 8 Gen 3 Hexagon NPU. The model's reliability and performance are paramount.
question: What key telemetry metrics would you collect from the NPU and application to monitor runtime health and detect degradation?
details:
  realistic_solution: A robust solution involves collecting a blend of hardware and software metrics. Key NPU telemetry includes NPU utilization percentage, power consumption, temperature (to detect throttling), and memory usage on the LPDDR5X (e.g., how much of the 12-16GB is being used). Application-level telemetry should track inference latency (P95, P99), throughput (inferences per second), success/error rates, and the frequency of straggler inferences. This data can be aggregated locally and periodically pushed to a backend monitoring system. Alerting thresholds should be set for critical metrics like latency spikes, NPU overload, or thermal warnings. Straggler detection can be implemented by flagging inferences exceeding a defined latency threshold.
  common_mistake: |
    **The Pitfall:** Focusing solely on model-level metrics (e.g., accuracy, loss) while neglecting hardware-specific telemetry.
    **The Rationale:** Candidates often lack experience with the physical realities of edge deployment, missing the difference between application-level latency and pure NPU inference time.
    **The Consequence:** The team is blind to critical system-level issues like thermal throttling, memory pressure, and NPU starvation, leading to unresolved production regressions.
  napkin_math: |
    * Hardware capacity: 45 TOPS (INT8)
    * Assume an inference requires 4.5 TOPS: NPU can theoretically sustain 10 inferences per second.
    * If the application demands a real-time rate of 30 FPS, each inference must complete within ~33ms.
    * Memory budget: If the model occupies 2 GB of the 12-16 GB LPDDR5X, monitoring memory pressure is essential.
    * **Monitoring P99 latency against the 33ms budget is crucial for detecting stragglers and dropped frames.**
