title: Designing an INT8 Quantization Strategy for On-Device Object Detection on Google Tensor G3
scenario: You are tasked with deploying a real-time object detection model on a mobile device powered by the Google Tensor G3. The FP32 model exceeds memory and latency constraints. Your goal is to design a comprehensive quantization strategy to transform this model into an INT8 equivalent to meet the performance requirements.
question: How would you design an INT8 quantization strategy for Tensor G3 on-device object detection to meet <50ms latency and <200MB footprint constraints?
details:
  realistic_solution: A realistic solution involves a systematic, iterative approach. Begin with data-aware PTQ using a highly representative calibration dataset. Analyze activation distributions and identify quantization-sensitive layers through tools like Quantization Simulators or by observing per-layer accuracy drop. Employ mixed-precision quantization, selectively keeping critical layers (e.g., the final classification head or layers with significant dynamic range) in FP16, while quantizing others to INT8. Utilize asymmetric zero-point arithmetic for activations to better preserve information. For convolutional and fully connected layers, implement per-channel quantization to mitigate issues arising from varying activation ranges across different channels. If PTQ fails to meet accuracy targets, transition to Quantization-Aware Training (QAT) with techniques like fake quantization during fine-tuning, allowing the model to learn robustness to quantization noise. Finally, thoroughly benchmark and validate the quantized model end-to-end on the Google Tensor G3 hardware to account for specific TPU optimizations.
  common_mistake: |
    **The Pitfall:** Applying naive post-training quantization (PTQ) globally across the entire model.
    **The Rationale:** Candidates assume all layers tolerate INT8 equally, ignoring the sensitivity of final classification heads or skewed activation distributions.
    **The Consequence:** This leads to significant accuracy drops and fails to utilize per-channel quantization where it is most beneficial.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Original Model: 100M parameters (FP32).
       - Target constraints: <50ms latency, <200MB footprint.
    2. **Calculations:**
       - FP32 Model Size: 100M * 4 bytes = 400 MB.
       - INT8 Model Size: 100M * 1 byte = 100 MB.
       - Compute Throughput: INT8 operations require 4x fewer cycles per MAC than FP32.
    3. **Conclusion & Interpretation:**
       - **Result: 100 MB Footprint**. INT8 quantization achieves a **4x memory footprint reduction**, hitting the <200MB target and unlocking the specialized hardware acceleration needed to hit the <50ms latency target.
