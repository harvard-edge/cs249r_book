title: Analyzing Mobile Thermal Throttling using D/D/1 Queues
scenario: An AR app on an iPhone 15 uses the A17 Pro NPU. Frames arrive exactly every 16.6ms (60 FPS), and the NPU takes exactly 10ms to process a frame. Occasionally, thermal throttling extends processing to 20ms for short bursts.
question: Evaluate how the system queue length and frame dropping behavior changes during a 1-second thermal throttling burst.
details:
  realistic_solution: Normally, utilization is 10/16.6 = 60%, and the queue stays empty. During the 1-second burst (60 frames), processing takes 20ms while frames arrive every 16.6ms. The deficit per frame is roughly 3.4ms, meaning after 60 frames, the queue will accumulate about 204ms of backlog (~10 delayed frames).
  common_mistake: |
    **The Pitfall:** Using M/M/1 queuing formulas for deterministic arrival times.
    **The Rationale:** Candidates misapply standard stochastic queuing theory to rigid, clock-driven display pipelines.
    **The Consequence:** Theoretical predictions of queue length fail to match the real-world frame buffer backlog.
  napkin_math: |
    *   **Deficit per Frame:** `20ms (processing) - 16.6ms (arrival) = 3.4ms deficit`
    *   **Total Backlog (1 second burst = 60 frames):** `3.4ms * 60 = 204ms backlog`
    *   **Queue Length:** `204ms / 20ms processing time = 10.2 frames`
    *   **Result:** **The queue accumulates roughly 10 delayed frames during the 1-second burst.**
