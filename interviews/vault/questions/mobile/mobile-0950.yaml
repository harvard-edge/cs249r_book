title: 'KV-Cache: Fluency — Decode Throughput vs Context Length Trade-off on A17 Pro'
scenario: For a 1B INT4 LLM on A17 Pro (35 TOPS, 8GB, 68 GB/s unified memory), compute decode throughput at context lengths 256, 1024, 4096. The model has 24 layers, 8 KV heads, head_dim=128. Show the KV bandwidth contribution at each context length.
question: How does KV cache bandwidth affect decode throughput at 256, 1024, and 4096 tokens on A17 Pro?
details:
  realistic_solution: Decode time per token = weight_load_time + KV_read_time + compute_time. Weight load is constant. KV read grows linearly. Find crossover where KV > weight load.
  common_mistake: Computing only KV bandwidth without including weight loading bandwidth; not identifying which term dominates at different context lengths.
  napkin_math: 'INT4 model: 1B × 0.5B = 500MB. Weight load per decode step: 500MB / 68 GB/s = 7.35ms. KV per token: 24 × 2 × 8 × 128 × 2B (bf16, even if weights INT4) = 98.3KB. At 256 tokens: KV = 256 × 98.3KB = 25.2MB, KV time = 0.37ms. Compute: 1B × 2 FLOPs / 35 TOPS = ~0.06ms. Total: 7.35 + 0.37 + 0.06 = 7.78ms → 128 tok/sec. At 1024 tokens: KV = 100.7MB, time = 1.48ms. Total: 7.35 + 1.48 + 0.06 = 8.89ms → 112 tok/sec. At 4096 tokens: KV = 402MB, time = 5.91ms. Total: 7.35 + 5.91 + 0.06 = 13.32ms → 75 tok/sec. KV crossover (KV time = weight time): tokens = 500MB / 98.3KB = 5086 tokens. At 5K tokens, KV read equals weight read. Beyond 5K, KV dominates.'
