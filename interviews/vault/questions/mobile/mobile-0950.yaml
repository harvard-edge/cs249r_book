title: 'KV-Cache: Fluency — Decode Throughput vs Context Length Trade-off on A17 Pro'
scenario: 'For a 1B INT4 LLM on an NPU with 68 GB/s unified memory, you are evaluating autoregressive decode throughput at context lengths of 256, 1024, and 4096. The model has 24 layers, 8 KV heads, and a head dimension of 128.'
question: 'How does KV cache bandwidth degradation affect decode throughput across 256, 1024, and 4096 context tokens?'
details:
  realistic_solution: |
    Autoregressive decode time per token is strictly bounded by memory bandwidth. While the model weight loading time remains constant per step, the KV cache read size grows linearly with sequence length, eventually dominating the memory bus and crushing throughput.
  common_mistake: |
    **The Pitfall:** Calculating only KV cache bandwidth while completely omitting the massive, static model weight loading overhead.
    **The Rationale:** Candidates tunnel-vision on the scaling context variable and forget the baseline cost of loading the full LLM weights per step.
    **The Consequence:** Wildly overestimating decode throughput for short contexts and failing to identify the exact crossover token count.
  napkin_math: |
    **Assumptions & Constraints:**
    - 1B INT4 model = 500 MB.
    - Bandwidth = 68 GB/s.
    - KV footprint = 24 * 2 * 8 * 128 * 2 bytes = 98.3 KB/token.

    **Calculations:**
    - Weight load = 500 MB / 68 GB/s = 7.35ms.
    - Context 256 KV = 25.2 MB (0.37ms).
    - Total 256 = 7.72ms (128 tokens/sec).
    - Context 4096 KV = 402 MB (5.91ms).
    - Total 4096 = 13.26ms (75 tokens/sec).

    **Conclusion & Interpretation:**
    - **Result: Memory-Bandwidth-Bound**. KV cache fetches surpass model weight fetches exactly at 5086 tokens.
