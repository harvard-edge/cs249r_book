title: CI/CD Pipeline Graph Break Diagnosis
scenario: Your automated CI/CD pipeline pushes a quantized INT8 object detection model (90 GOPS). The simulator predicts an 8ms latency, but production telemetry shows a 30ms latency. Profiling reveals unexpected CPU utilization.
question: What pipeline validation flaw led to this discrepancy, and what is the physical root cause on the device?
details:
  realistic_solution: The physical root cause is a catastrophic graph break triggered by a single unsupported operator forcing a CPU fallback. The NPU compiler splits the graph, violently evicting tensor execution to the CPU and generating massive shared memory synchronization overhead. The MLOps pipeline failed by relying on idealized software simulators. CI/CD must mandate Hardware-In-The-Loop (HITL) physical testing or strict compiler-level linting to block graph splits before OTA deployment.
  common_mistake: |
    **The Pitfall:** Blaming the discrepancy on OS background tasks, thermal throttling, or flawed INT8 quantization.
    **The Rationale:** Engineers diagnose edge metrics using cloud telemetry playbooks, completely missing the idiosyncrasies of heterogeneous edge compilers.
    **The Consequence:** The true training-serving skew is totally missed. The graph break remains, CPU load stays maxed out, and the application permanently fails to meet real-time deadlines.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model compute: 90 GOPS (INT8).
       - NPU Capacity: 45 TOPS. Utilization: 25% (11.25 TOPS effective).
       - CPU Core: 0.5 TOPS capacity.
       - Graph Break scenario: 80 GOPS execute on NPU, 10 GOPS fall back to CPU.
    2. **Calculations:**
       - Ideal Expected NPU Latency: 90 GOPS / 11.25 TOPS = 8.0 ms.
       - Actual NPU Time: 80 GOPS / 11.25 TOPS = 7.1 ms.
       - Actual CPU Time: 10 GOPS / 0.5 TOPS = 20.0 ms.
       - Context Switch / OS sync overhead: ~2.0 ms.
       - Total Latency: 7.1 ms + 20.0 ms + 2.0 ms = 29.1 ms.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound (Graph Splitting).** A single unsupported operator offloads 10 GOPS to the slow CPU, utterly destroying the 8ms theoretical execution boundary and driving latency to 30ms.
