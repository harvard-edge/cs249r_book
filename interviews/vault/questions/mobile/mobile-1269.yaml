title: CI/CD Pipeline Graph Break Diagnosis
scenario: Your automated CI/CD pipeline pushes a quantized INT8 object detection model (90 GOPS) to the model registry. While the pipeline's generic simulator predicts an 8ms latency, production telemetry from devices running the Qualcomm Hexagon NPU (Snapdragon 8 Gen 3) shows a 30ms latency. The device features 45 TOPS INT8 compute, a heterogeneous CPU+GPU+NPU architecture, and shared 12-16 GB LPDDR5X memory. Profiling reveals unexpected CPU utilization during inference.
question: What pipeline validation flaw led to this discrepancy, and what is the physical root cause on the device?
details:
  realistic_solution: The root cause is a graph break caused by an operator (e.g., SiLU activation) unsupported by the Hexagon NPU, forcing a fallback to the CPU. The heterogeneous architecture must shuffle intermediate tensors via the shared LPDDR5X memory. The solution is to update the CI/CD pipeline to include hardware-in-the-loop (HITL) testing or to run the specific Qualcomm compiler during the CI build stage to fail the pipeline if unsupported NPU ops are detected.
  common_mistake: |
    **The Pitfall:** Blaming thermal throttling or assuming the model wasn't quantized to INT8 correctly.
    **The Rationale:** Candidates look at device-level metrics without considering the MLOps pipeline and hardware-specific operator compatibility.
    **The Consequence:** They miss the true training-serving skew caused by an operator graph break falling back to CPU, which requires CI/CD fixes.
  napkin_math: |
    - **Expected NPU Latency:** 90 GOPS / (45 TOPS INT8 × 25% utilization) = **8 ms**.
    - **Graph Break Scenario:** 80 GOPS on NPU, 10 GOPS on a 0.5 TOPS CPU core.
    - **NPU Time:** 80 GOPS / 11.25 TOPS = **7.1 ms**.
    - **CPU Time:** 10 GOPS / 0.5 TOPS = **20 ms**.
    - **Data Transfer & Sync:** Moving intermediate tensors over shared memory takes ~0.05 ms, but OS synchronization for handoff adds ~2 ms.
    - **Total Latency:** 7.1 + 20 + 2 = **29.1 ms** (aligning with the 30 ms symptom).
