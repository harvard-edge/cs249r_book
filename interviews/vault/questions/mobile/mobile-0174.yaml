title: The Voice Assistant Queue
scenario: You are building a real-time transcription feature for a voice assistant on a mobile device.
  The audio system provides a new chunk of audio for processing every 100ms. Your speech-to-text model
  takes, on average, 90ms to process one of these chunks on the device's NPU. Contrast the arrival rate
  with the processing rate and explain whether the inference queue will be stable over time.
question: "Will an audio inference queue stay stable if chunks arrive every 100ms and processing takes 90ms?"
details:
  realistic_solution: The system is stable. The key is to compare the time between arrivals (arrival interval)
    with the time it takes to process a single arrival (service time). Here, the arrival interval is 100ms
    and the service time is 90ms. Since the device can process a request faster than they arrive (`90ms
    < 100ms`), the queue of pending audio chunks will not grow indefinitely. The NPU will have approximately
    10ms of idle time between finishing one chunk and receiving the next, so it can always catch up. The
    NPU utilization will be high (90%), but the system remains stable.
  common_mistake: Confusing high resource utilization with instability. An engineer might see that the
    NPU is busy 90% of the time and incorrectly conclude that the system is "at its limit" and therefore
    unstable. Stability is determined only by whether the average arrival rate is less than the average
    processing rate.
  napkin_math: 'Arrival Interval = 100ms. Service Time = 90ms. Utilization = 90ms / 100ms = 90%. Since the Service Time (90ms) is strictly less than the Arrival Interval (100ms), the NPU can process chunks faster than they arrive, ensuring the queue remains stable over time.'
  options:
  - The system is unstable because at 90% utilization, there is no margin for error and the queue will
    eventually overflow.
  - The system is stable because the processing time (90ms) is less than the arrival interval (100ms).
  - The system is unstable because the work (90ms) takes much longer than the idle time (10ms).
  - The system is stable because mobile NPUs like the Snapdragon 8 Gen 3 (45 TOPS) are powerful enough
    for simple audio.
  correct_index: 1
