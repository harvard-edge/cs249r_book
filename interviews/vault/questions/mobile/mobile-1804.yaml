title: Mobile Quantization Review Spec
scenario: A team wants to quantize an on-device medical model from FP16 to INT8.
question: What must be reviewed before replacing an FP16 mobile medical model with an INT8 version?
details:
  realistic_solution: 'Review calibration data, per-class sensitivity, subgroup performance, activation outliers, latency, memory, battery, fallback plan, and hardware delegate coverage. Aggregate accuracy is insufficient for a safety-sensitive model.'
  common_mistake: |
    **The Pitfall:** Accepting INT8 because aggregate accuracy changes by less than 1%.
    **The Rationale:** Candidates look only at top-level metrics and fail to evaluate class-specific or subgroup performance.
    **The Consequence:** A rare but critical class (like a specific disease) regresses badly, silently compromising medical safety.
  napkin_math: |
    **Assumptions & Constraints:**
    - Dataset: 10,000 cases (9,900 healthy, 100 rare disease).
    - FP16 Accuracy: 100% healthy, 90% disease.
    - INT8 Accuracy: 100% healthy, 60% disease.

    **Calculations:**
    - Original FP16 Correct: 9,900 + 90 = 9,990 (99.9% overall).
    - Quantized INT8 Correct: 9,900 + 60 = 9,960 (99.6% overall).
    - Top-line Drop: 99.9% - 99.6% = 0.3%.
    - Subgroup Drop (Disease): 90% to 60% = 33% relative drop.

    **Conclusion & Interpretation:**
    - **Result: 33% subgroup regression (Precision-Bound)**. The aggregate accuracy metric completely masks a catastrophic failure in the minority class due to INT8 quantization collapse.
