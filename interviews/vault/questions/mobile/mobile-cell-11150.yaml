title: 'KV-Cache: Diagnose KV Cache Overflow Causing Mobile App Crashes'
scenario: Your 3B LLM app on Tensor G3 (7.5 TOPS, 12GB) crashes after ~30 minutes of conversation when
  context reaches ~3000 tokens. Users report SIGKILL from iOS memory pressure. Diagnose the KV cache memory
  leak and propose a fix.
details:
  realistic_solution: KV cache grows O(n) with conversation length. At 3000 tokens, KV cache size exceeds
    available RAM threshold, triggering OS memory pressure and SIGKILL.
  common_mistake: Blaming the model size without computing the actual KV cache memory growth; not tracking
    cumulative memory allocation per conversation turn.
  napkin_math: '3B model (INT4 quantized): 750MB. KV per token: 32 layers × 2 × 8 × 128 × 2B = 131KB per
    token (bf16). At 3000 tokens: 3000 × 131KB = 393MB. OS: 2GB. Model: 750MB. KV: 393MB. Activations
    + framework: 500MB. Total: 3.64GB. Available on 12GB device... but Tensor G3 shares memory with GPU.
    iOS apps typically get 3-4GB before memory pressure warnings, 5-6GB for SIGKILL. Wait: 12GB is total
    system RAM. iOS reserves 40%: 7.2GB available for apps. App at 3.64GB: shouldn''t crash. Re-examine:
    KV is likely in FP16 (not quantized): 3000 × 32 × 2 × 8 × 128 × 2B = 786MB KV (bf16). Plus multiple
    conversation histories cached? Or framework keeps gradient buffers? Diagnosis: profile with Instruments.
    Fix: (1) Use INT8 KV: 393MB. (2) Limit context to 2048: 2048 × 65.5KB (INT8) = 134MB. (3) Clear completed
    conversation KV on new conversation start. Total memory at 2048 INT8: 750 + 134 + 500 = 1.38GB — stable.'
