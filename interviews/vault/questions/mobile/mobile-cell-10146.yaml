title: Implement EfficientNet-B0 for Snapdragon 8 Gen 3 Hexagon NPU via QNN SDK
scenario: You are deploying EfficientNet-B0 (5.3M params, 0.39 GFLOPs) to a Samsung Galaxy S24 (Snapdragon
  8 Gen 3 Hexagon NPU, 45 TOPS) using the QNN SDK for offline deployment. The model has Swish (SiLU) activations
  and SE blocks. Implement the compilation pipeline with Hexagon-specific optimizations.
question: "How should EfficientNet-B0 be converted and optimized for Snapdragon 8 Gen 3 Hexagon deployment with the QNN SDK?"
details:
  realistic_solution: 'QNN conversion: (1) Export PyTorch → ONNX with static shapes (batch=1, input=1×3×224×224,
    opset=13); (2) Replace SiLU with approximation: hardswish or x × hardtanh(x+3,0,6)/6 (QNN-supported);
    (3) qnn-onnx-converter --input_network model.onnx --output_path model.cpp; (4) qnn-net-run with --backend
    libQnnHtp.so; (5) SE blocks: Hexagon HTP supports GlobalAveragePool as a native op. Verify latency
    < 3ms with qnn-net-run --duration 1000. If SE blocks cause issues, use qnn-model-lib-generator to
    inspect per-layer dispatch.'
  common_mistake: Using the generic ONNX → QNN conversion without disabling dynamic shapes, which prevents
    Hexagon HTP graph compilation and forces fallback to CPU; SE blocks with dynamic GAP also need static
    shape specification.
  napkin_math: 'EfficientNet-B0 INT8 on Hexagon HTP: 0.39G GOPS / 45 TOPS = 8.7μs theoretical. Published
    QNN benchmark: ~1.5ms batch=1. Overhead factor: 172×. Model weights INT8: 5.3M × 1B = 5.3MB. Hexagon
    HTP SRAM: ~8MB → entire model fits on-chip. SE block FC layers: 16 × C²/4 FLOPs = 16 × (varying C²
    terms) ≈ 5M FLOPs total. SE as % of total: 5M/390M = 1.3% FLOPs. HTP dispatch overhead for 16 SE blocks:
    16 × 2 FC layers × 0.1ms overhead = 3.2ms if not fused. Critical: ensure SE GAP + FC1 + FC2 + sigmoid
    + multiply are fused in QNN context.'
