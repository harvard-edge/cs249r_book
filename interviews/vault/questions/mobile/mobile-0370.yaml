title: The On-Device Training Battery Tax
scenario: You're an engineer on a team developing a driver-assist feature for a popular automotive mobile app. To improve personalization while preserving user privacy, you're A/B testing an on-device training approach against a cloud-based one. For the on-device variant, the model needs to train for 1 hour per week on the user's phone. During this training, the mobile SoC consumes an average of 3W of active power.
question: 'How would you calculate the total energy consumed over a 4-week test?'
details:
  realistic_solution: The correct way to calculate the total energy consumed is to multiply the power consumption rate by the total duration of the activity.
  common_mistake: |
    **The Pitfall:** Confusing power (instantaneous rate, in Watts) with energy (total quantity of work, in Watt-hours).
    **The Rationale:** Engineers report the power draw directly without multiplying by the duration of the workload.
    **The Consequence:** Reporting completely nonsensical energy metrics, leading to critical battery capacity miscalculations.
  napkin_math: |
    **Assumptions & Constraints:**
    - SoC Power: 3W active draw.
    - Training Duration: 1 hour (3600s) per week.
    - Test Duration: 4 weeks.
    - Standard Battery Capacity: 18.5 Wh (66,600 Joules).

    **Calculations:**
    - Weekly Energy = 3W * 1 hour = 3 Watt-hours (10,800 Joules).
    - Total Test Energy = 3 Wh * 4 weeks = 12 Watt-hours (43,200 Joules).
    - Battery Impact = 12 Wh / 18.5 Wh = ~65%.

    **Conclusion & Interpretation:**
    - **Result: 12 Wh (Power-Bound)**. The on-device training cycle consumes a massive 12 Wh over the month, equating to ~65% of a full battery charge.
  options:
  - '3 Wh'
  - '12 W'
  - '12 Wh'
  - '20 Wh'
  correct_index: 2
