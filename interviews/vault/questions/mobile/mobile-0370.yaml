title: The On-Device Training Battery Tax
scenario: You're an engineer on a team developing a driver-assist feature for a popular automotive mobile
  app. To improve personalization while preserving user privacy, you're A/B testing an on-device training
  approach against a cloud-based one. For the on-device variant, the model needs to train for 1 hour per
  week on the user's phone. During this training, the mobile SoC consumes an average of 3W of active power.
  Calculate the total energy consumed over a 4-week test.
question: "How would you calculate the total energy consumed over a 4-week test?"
details:
  realistic_solution: The correct way to calculate the total energy consumed is to multiply the power
    consumption rate by the total duration of the activity.
  common_mistake: The most common mistake is to confuse power (an instantaneous rate of energy transfer,
    measured in Watts) with energy (a total quantity of work, measured in Watt-hours). Engineers often
    report the power figure (3W) instead of calculating the total energy consumed over the entire period.
    Another error is calculating for only one week instead of the full four-week test duration.
  napkin_math: '1. Weekly Energy: On-device training takes 1 hour (3600s) per week. At 3W SoC power draw,
    energy = 3600s * 3W = 10,800 Joules. 2. Monthly Energy: 10,800 J * 4 weeks = 43,200 Joules. 3. Battery
    Impact: A standard 18.5 Wh battery holds 66,600 Joules. One month of weekly training cycles equates
    to ~65% of a full battery charge total. Staggering to run only while charging is highly recommended.'
  options:
  - 3 Wh
  - 12 W
  - 12 Wh
  - 20 Wh
  correct_index: 2
