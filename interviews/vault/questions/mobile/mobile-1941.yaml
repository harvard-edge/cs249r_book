title: Super-Resolution Compute Estimation
scenario: You are designing a real-time video super-resolution pipeline for the Snapdragon 8 Gen 3 Hexagon NPU.
question: Design a compute budget for the pipeline by computing required TOPS for 1080p at 30 FPS at 50 MACs/pixel, then specify whether the 45 TOPS NPU has the capacity headroom to also support a 4K mode at the same 30 FPS.
details:
  realistic_solution: 'For 1080p: 2.07M pixels * 50 MACs * 30 FPS * 2 OPS/MAC = 6.2 GOPS = 0.0062 TOPS. The 45 TOPS NPU has ~7000x headroom on compute alone, so 1080p is purely memory-bound. For 4K (3840x2160 = 8.29M pixels, 4x): 24.9 GOPS = 0.025 TOPS, still 1800x under capacity. The design implication is that scaling resolution does NOT consume compute - the binding constraint is LPDDR5 bandwidth feeding activations and weights, so the architectural decision should focus on activation tiling and weight residency in NPU SRAM, not compute provisioning.'
  common_mistake: |
    **The Pitfall:** Forgetting that 1 MAC = 2 OPS, or confusing GOPS with TOPS.
    **The Rationale:** Candidates incorrectly calculate requirements and over-provision NPU compute.
    **The Consequence:** Wasting engineering effort on compute architecture when the workload is severely memory-bandwidth bound.
  napkin_math: |
    - **1080p Resolution:** 1920 × 1080 = 2.07M pixels.
    - **1080p Compute:** 2.07M pixels × 50 MACs × 2 OPS/MAC × 30 FPS = 6.21 GOPS = **0.0062 TOPS**.
    - **4K Resolution:** 3840 × 2160 = 8.29M pixels.
    - **4K Compute:** 8.29M pixels × 50 MACs × 2 OPS/MAC × 30 FPS = 24.87 GOPS = **0.0249 TOPS**.
    - **Conclusion:** Both 1080p and 4K consume less than 0.1% of the 45 TOPS capacity, making them entirely memory-bound.
