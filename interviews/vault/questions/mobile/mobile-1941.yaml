title: Super-Resolution Compute Estimation
scenario: You are designing a real-time video super-resolution pipeline for a mobile NPU.
question: Design a compute budget for the pipeline by computing required TOPS for 1080p at 30 FPS at 50 MACs/pixel, then specify whether the 45 TOPS NPU has the capacity headroom to also support a 4K mode at the same 30 FPS.
details:
  realistic_solution: 'Calculating the raw compute reveals that even 4K upscaling consumes <0.1% of the NPU TOPS capacity. The design implication is that scaling resolution does NOT consume compute - the binding constraint is LPDDR5 bandwidth feeding activations and weights. The architectural decision should focus on activation tiling and weight residency in NPU SRAM, not compute provisioning.'
  common_mistake: |
    **The Pitfall:** Forgetting that 1 MAC = 2 OPS, or confusing GOPS with TOPS.
    **The Rationale:** Candidates incorrectly calculate requirements and over-provision NPU compute.
    **The Consequence:** Wasting engineering effort on compute architecture when the workload is severely memory-bandwidth bound.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Resolutions: 1080p (1920x1080 = 2.07M pixels), 4K (3840x2160 = 8.29M pixels).
       - Operations: 50 MACs/pixel (2 OPS/MAC).
       - Framerate: 30 FPS.
       - NPU Capacity: 45 TOPS.
    2. **Calculations:**
       - 1080p Compute: 2.07M * 50 * 2 * 30 = 6.21 GOPS = 0.0062 TOPS.
       - 4K Compute: 8.29M * 50 * 2 * 30 = 24.87 GOPS = 0.0249 TOPS.
       - Headroom: 4K consumes <0.1% of the 45 TOPS NPU.
    3. **Conclusion & Interpretation:**
       - **Result: 0.0249 TOPS peak compute required.**
       - **Bottleneck: Memory-Bandwidth Bound** (The workload consumes less than 0.1% of NPU compute capacity, proving the bottleneck shifts entirely to LPDDR5 bandwidth feeding activations and weights).
