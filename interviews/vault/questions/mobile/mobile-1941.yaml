title: Super-Resolution Compute Estimation
scenario: You are designing a real-time video super-resolution pipeline for the Snapdragon
  8 Gen 3 Hexagon NPU.
question: Calculate the required TOPS for 1080p video at 30 FPS using a model needing
  50 MACs per pixel, and determine if the 45 TOPS NPU is sufficient.
details:
  realistic_solution: A 1080p frame has 1920x1080 ~ 2.07M pixels. At 50 MACs/pixel,
    one frame takes ~103.6M MACs. At 30 FPS, total compute is ~3.1G MACs/sec. Since
    1 MAC = 2 OPS, this is ~6.2 GOPS. The 45 TOPS NPU easily handles this, indicating
    the workload will be purely memory bandwidth bound.
  common_mistake: Forgetting that 1 MAC equals 2 Operations, or confusing GOPS with
    TOPS (10^9 vs 10^12).
  napkin_math: 2e6 * 50 * 30 * 2 = 6e9 OPS = 0.006 TOPS < 45 TOPS.
