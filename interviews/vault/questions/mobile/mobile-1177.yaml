title: Real-Time Video Ingestion Compute Utilization
scenario: You are implementing a real-time video ingestion and processing pipeline on the Apple A17 Pro. The application captures continuous 60 FPS video directly into the shared 8 GB unified memory and routes the stream to the 16-core Neural Engine, running an object tracking model that requires 50 Giga-Operations (GOPs) per frame. Given the A17 Pro Neural Engine provides a peak of 35 TOPS within its ~5W power envelope.
question: What compute utilization does a 60 FPS A17 Pro video ingestion pipeline require for 50 GOPs per frame?
details:
  realistic_solution: |
    The correct approach is to calculate the total operations per second required by the pipeline and divide it by the NPU's maximum TOPS. An optimal solution also recognizes that leveraging the shared 8 GB unified memory prevents costly memory copies between the CPU and NPU during ingestion, keeping the power draw within the strict 5W budget while processing the stream.
  common_mistake: |
    **The Pitfall:** Confusing Giga-Operations with Tera-Operations or ignoring the frame rate multiplier.
    **The Rationale:** Candidates often calculate compute for a single frame but forget to scale it to the stream's FPS.
    **The Consequence:** They drastically underestimate the continuous power and compute demands on the NPU.
  napkin_math: |
    - Compute required per second: 50 GOPs/frame * 60 FPS = 3000 GOPs/sec.
    - Convert GOPs to TOPS: 3000 GOPs / 1000 = 3 TOPS.
    - Calculate utilization of the 16-core Neural Engine: (3 TOPS / 35 TOPS) * 100 = **8.57%** of the Apple A17 Pro's peak compute capacity.
