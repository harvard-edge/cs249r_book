title: Real-Time Video Ingestion Compute Utilization
scenario: You are implementing a real-time video ingestion pipeline capturing continuous 60 FPS video directly into shared unified memory. The stream routes to the NPU, running an object tracking model requiring 50 Giga-Operations (GOPs) per frame. The NPU provides a peak of 35 TOPS.
question: What compute utilization does a 60 FPS video ingestion pipeline require for 50 GOPs per frame?
details:
  realistic_solution: |
    Calculate total operations per second and map it against peak hardware TOPS. Crucially, the architecture leverages zero-copy buffer sharing within the unified memory architecture. By mapping the ISP output directly to the NPU virtual address space (via `CVPixelBuffer`), the system entirely sidesteps CPU-bound memory copies, preserving bandwidth and maintaining operations well within the strict ~5W thermal budget.
  common_mistake: |
    **The Pitfall:** Confusing Giga-Operations with Tera-Operations or ignoring the frame rate multiplier.
    **The Rationale:** Candidates often calculate compute for a single frame but forget to scale it to the stream's FPS.
    **The Consequence:** They drastically underestimate the continuous power and compute demands on the NPU.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model compute: 50 GOPs per frame.
    - Frame rate: 60 FPS.
    - NPU Peak compute: 35 TOPS (35,000 GOPs).

    **Calculations:**
    - Total compute required per second = 50 GOPs/frame * 60 FPS = 3000 GOPs/sec.
    - Convert to TOPS = 3000 / 1000 = 3 TOPS.
    - Compute utilization = (3 TOPS / 35 TOPS) * 100 = 8.57%.

    **Conclusion & Interpretation:**
    - **Result: 8.57% (Computationally Trivial)**. The pipeline utilizes less than 9% of peak compute capacity. The true architectural challenge is strictly memory management and ensuring a zero-copy pathway, not processing power.
