title: Real-Time Video Ingestion Compute Utilization
scenario: You are implementing a real-time video ingestion and processing pipeline
  on the Apple A17 Pro. The application captures continuous 60 FPS video directly
  into the shared 8 GB unified memory and routes the stream to the 16-core Neural
  Engine, running an object tracking model that requires 50 Giga-Operations (GOPs)
  per frame. Given the A17 Pro Neural Engine provides a peak of 35 TOPS within its
  ~5W power envelope, you need to determine the compute overhead of this streaming
  pipeline to ensure it is sustainable.
question: What compute utilization does a 60 FPS A17 Pro video ingestion pipeline
  require for 50 GOPs per frame?
details:
  realistic_solution: The correct approach is to calculate the total operations per
    second required by the pipeline and divide it by the NPU's maximum TOPS. An optimal
    solution also recognizes that leveraging the shared 8 GB unified memory prevents
    costly memory copies between the CPU and NPU during ingestion, keeping the power
    draw within the strict 5W budget while processing the stream.
  common_mistake: Candidates often confuse Giga-Operations (10^9) with Tera-Operations
    (10^12) or fail to multiply the per-frame compute by the frame rate of the incoming
    stream. They may also ignore the ~5W power constraint, assuming the device can
    sustain peak theoretical TOPS indefinitely without thermal throttling.
  napkin_math: '1. Compute required per second: 50 GOPs/frame * 60 FPS = 3000 GOPs/sec.
    2. Convert GOPs to TOPS: 3000 GOPs / 1000 = 3 TOPS. 3. Calculate utilization of
    the 16-core Neural Engine: (3 TOPS / 35 TOPS) * 100 = 8.57% of the Apple A17 Pro''s
    peak compute capacity.'
