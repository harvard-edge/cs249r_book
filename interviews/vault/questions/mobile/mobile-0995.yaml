title: 'Model Size Estimation: Diagnose Mobile OOM from KV-Cache Growth'
scenario: 'An iOS app (A17 Pro, 8GB) running a 1B INT4 LLM (500MB) receives OOM crashes after 15-20 conversation turns. The app worked fine for 10 turns.'
question: 'How would you diagnose the root cause of the OOM crashes and quantify a fix?'
details:
  realistic_solution: 'KV grows every turn. Turn 1: 512 tokens × 262KB = 134MB. Turn 10: 5120 tokens → 1.34GB. Turn 15: 7680 tokens → 2.01GB. Turn 20: 10240 tokens → 2.68GB. iOS memory at turn 20: 500MB model + 2.68GB KV + 3GB iOS/app = 6.18GB > 5GB iOS limit → crash at turn 18 (9216 tokens = 2.41GB KV → total 5.91GB). Fix: implement sliding window KV: keep only last 4096 tokens. KV caps at 1.07GB. Total: 500MB+1.07GB+3GB = 4.57GB ✓ for unlimited turns.'
  common_mistake: |
    **The Pitfall:** Blaming the static model weights for the OOM.
    **The Rationale:** Candidates forget that transformer context windows generate a dynamically growing Key-Value (KV) cache.
    **The Consequence:** Suggesting aggressive quantization or smaller models instead of fixing the unbounded KV-cache growth.
  napkin_math: |
    **Assumptions & Constraints:**
    - Memory Limit: 8GB (Total) - 3GB (iOS/App) = 5GB limit before OOM.
    - Available for KV Cache: 5GB - 500MB (Model Weights) = 4.5GB.
    - Let's align with details: Crash at 5GB iOS ceiling. 5GB - 500MB - 3GB = 1.5GB KV budget.
    - KV Size per Token: 262 KB.

    **Calculations:**
    - Tokens to Crash: 1.5 GB / 262 KB = ~5,725 tokens.
    - Turns to Crash: 5,725 tokens / 512 tokens/turn = ~11.2 turns.
    - Fix: Cap context at 4096 tokens. KV size = 4096 * 262 KB = 1.07 GB.

    **Conclusion & Interpretation:**
    - **Result: 1.07 GB (Memory-Bound)**. Capping the context at 4096 tokens ensures the KV cache stays under the 1.5 GB budget, preventing OOMs.
