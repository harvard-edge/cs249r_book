title: The Federated Learning Thermal Wall
scenario: 'You are an ML Systems Engineer on the ''Driver Cockpit'' team at a major automaker. Your team
  wants to personalize the driver alertness model using data from the in-cabin camera. The legal team
  has forbidden uploading raw video to the cloud due to extreme privacy sensitivity. Your product manager
  proposes A/B testing two approaches on a fleet of 1 million vehicles:'
details:
  realistic_solution: The correct diagnosis is that the thermal budget is the immediate, hard blocker.
    Inference workloads are typically 'bursty,' running for a few seconds at most. On-device training,
    however, requires a sustained, high-power compute load for several minutes. Running the SoC near its
    5W limit for 10 minutes straight will overwhelm its (likely passive) cooling solution. This causes
    the chip's temperature to rise, triggering thermal throttling. Throttling dramatically reduces the
    clock speed and compute performance (TOPS), making the 10-minute training session balloon to 30+ minutes
    or fail entirely. This ruins the user experience and makes the entire approach unreliable.
  common_mistake: 'Engineers often focus on the theoretical or secondary aspects of federated learning,
    like the privacy guarantees of gradients, the network cost of updates, or the battery drain. They
    fail to ground the problem in the primary physical constraint of a mobile System-on-a-Chip (SoC):
    sustained thermal dissipation. They miscalculate the scale of the problem relative to the platform.'
  napkin_math: Inference on a mobile SoC uses ~2W. A full training pass (forward + backward) needs ~3x
    the compute of inference and constant DRAM read/writes for gradients and optimizer states, consuming
    ~6W continuously. A smartphone/car SoC has a thermal envelope of ~5W before passive cooling fails.
    Running a 6W continuous training loop will cause thermal throttling within minutes, halting the system.
  options:
  - The network cost of uploading model updates daily from 1 million cars would be too expensive.
  - The daily energy consumption from on-device training would unacceptably drain the car's main battery.
  - The SoC will exceed its 5W thermal budget during the 10-minute training session, leading to severe
    performance throttling.
  - The privacy risk of model gradients leaking sensitive facial data is fundamentally unsolved and a
    legal blocker.
  correct_index: 2
