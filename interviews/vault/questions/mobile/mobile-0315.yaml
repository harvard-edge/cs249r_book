title: The Federated vs. Centralized Data Cost
scenario: 'You''re an ML systems engineer at a startup developing a new smart keyboard for mobile devices.
  To improve your prediction models, you need to analyze typing data from your users. Management is considering
  two strategies:'
details:
  realistic_solution: The correct approach is to first calculate the total data volume per day and then
    multiply by the cost per GB.
  common_mistake: The most common mistake is a unit conversion error, either forgetting to convert from
    Megabytes (MB) to Gigabytes (GB), or using the wrong conversion factor. This leads to an answer that
    is off by three orders of magnitude, making the cost seem catastrophic ($900,000/day). Another common
    error is to ignore one of the variables, like the data-per-user, and simply multiply the user count
    by the cost, leading to a wildly inaccurate but plausible-looking number ($90,000/day).
  napkin_math: '1. Daily Data: 1,000,000 users * 10 MB/user = 10,000,000 MB/day. 2. Convert to GB: 10,000,000
    MB / 1000 = 10,000 GB/day. 3. Cloud Bandwidth Cost: 10,000 GB * $0.09/GB = $900 per day. 4. Annual
    Cost: $900 * 365 = $328,500/year for centralized upload. 5. Federated Learning: Pushing a 100KB gradient
    instead reduces data by 100x to 100 GB/day ($9/day), saving over $325K annually and improving privacy.'
  options:
  - $900,000 per day
  - $90,000 per day
  - $900 per day
  - $9 per day
  correct_index: 2
