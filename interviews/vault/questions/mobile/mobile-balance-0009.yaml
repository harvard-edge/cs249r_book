title: Mobile Quantized Cache Size
scenario: A mobile app stores 500,000 embedding vectors. Each vector is 64 dimensions. INT8 stores one byte per dimension, while packed INT4 stores two 4-bit values per byte. Calculate cache size for both.
question: What cache size is needed for 500,000 64-dimensional embeddings in INT8 versus INT4?
details:
  realistic_solution: INT8 uses 500,000 x 64 bytes = 32 MB. INT4 uses half, 16 MB, before metadata and alignment. The memory win is useful if retrieval quality holds.
  common_mistake: Forgetting to multiply by vector dimension when estimating embedding cache size.
  napkin_math: INT8 = 500,000 x 64 = 32,000,000 B ≈ 32 MB. INT4 ≈ 16 MB.
