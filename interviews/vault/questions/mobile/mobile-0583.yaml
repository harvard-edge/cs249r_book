title: The Real-Time Video ML Frame Drop
scenario: Your video calling app applies a real-time background replacement model (DeepLabV3, 2.1M params, INT8) on a MediaTek Dimensity 9300. At 720p 30 FPS, the model runs in 12ms per frame — within the 33ms budget. But users report the video drops to 15 FPS during calls. The model isn't the bottleneck.
question: What's consuming the other 21ms per frame and causing the drop to 15 FPS?
details:
  realistic_solution: 'Serial pipeline totals 37ms: capture (5) + color (3) + ML (12) + composite (4) + downscale (3) + encode (8) + packetize (2). With jitter = ~15 FPS. Fix: pipeline stages so frame N processes through ML while N-1 encodes. Throughput limited by encoding (8ms = 125 FPS max). Reduce ML input to 360p: segmentation 12ms -> 4ms. With pipelining at 360p: sustained 30 FPS, one-frame latency (33ms). Encoding, not ML, is the true throughput bottleneck.'
  common_mistake: |
    **The Pitfall:** Assuming thermal throttling of the ML model is the sole cause.
    **The Rationale:** Candidates assume that because ML is computationally heavy, it must be the primary source of slowdowns.
    **The Consequence:** Even if throttled (e.g., 24ms), it fits the 33ms budget; ignoring the rest of the pipeline fails to explain the 15 FPS drop.
  napkin_math: |
    *   **Serial Pipeline Latency:** 5 (capture) + 3 (color) + 12 (ML) + 4 (composite) + 3 (downscale) + 8 (encode) + 2 (packetize) = 37 ms.
    *   **FPS Impact:** 37 ms latency limits throughput to ~27 FPS (dropping to 15 FPS with system jitter).
    *   **Pipelining Solution:** Processing ML and encoding concurrently on different frames.
    *   **New Throughput Bottleneck:** The longest stage (encode) is 8 ms.
    *   **Max Theoretical FPS:** 1000 ms / 8 ms = **125 FPS** (easily sustaining 30 FPS).
