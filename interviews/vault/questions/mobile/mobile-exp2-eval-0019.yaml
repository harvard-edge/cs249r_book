title: Heterogeneous Pipelining on Snapdragon 8 Gen 3
scenario: 'You are deploying a real-time 30 FPS video segmentation pipeline on a device powered by the
  Qualcomm Hexagon NPU (Snapdragon 8 Gen 3). The graph consists of a heavy INT8 CNN backbone and a custom
  FP16 attention-based post-processing head. You are evaluating two operator scheduling alternatives:
  Strategy A schedules all operators sequentially, running the INT8 backbone on the NPU and falling back
  to the CPU for the FP16 head to avoid complex synchronization. Strategy B partitions the graph, aggressively
  fusing the INT8 backbone on the NPU and pipelining the FP16 head asynchronously on the GPU, utilizing
  the shared 12-16 GB LPDDR5X memory for data handoffs. Which strategy provides better system-level throughput
  and why?'
details:
  realistic_solution: Strategy B is the correct approach for an L5 engineer. The Snapdragon 8 Gen 3 architecture
    utilizes a shared 12-16 GB LPDDR5X memory pool, meaning the NPU and GPU can pass intermediate tensors
    via zero-copy pointers rather than expensive memory copies. By pipelining the execution, the NPU can
    process frame N+1 at its peak 45 TOPS INT8 while the GPU simultaneously processes the FP16 head for
    frame N. This hides the latency of the attention head and maximizes overall hardware utilization.
  common_mistake: Candidates often mistakenly prefer Strategy A, overestimating the synchronization penalty
    between heterogeneous compute units. They fail to realize that falling back to the CPU for dense FP16
    operations will severely bottleneck the pipeline, negating the benefits of the NPU's speed.
  napkin_math: 'Assume the INT8 backbone requires 1.35 Tera-Operations (TOPs) per frame. NPU INT8 latency
    = 1.35 TOPs / 45 TOPS = 30 ms. Assume the FP16 head takes 25 ms on CPU and 15 ms on GPU. Strategy
    A (Sequential): 30 ms (NPU) + 25 ms (CPU) = 55 ms per frame (18 FPS, misses 30 FPS target). Strategy
    B (Pipelined NPU+GPU): Pipeline bottleneck is max(30 ms NPU, 15 ms GPU) = 30 ms per frame. Throughput
    = 1000 ms / 30 ms = 33.3 FPS, successfully meeting the real-time 30 FPS requirement with zero-copy
    overhead.'
