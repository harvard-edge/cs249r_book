title: Paged KV-Cache Architecture on A17 Pro
scenario: You are designing the KV-cache memory manager for a continuous on-device LLM assistant running
  on the Apple A17 Pro Neural Engine. The application must support multi-turn conversations scaling up
  to an 8K context window. Given the 16-core ANE and a strict 5W power envelope operating on a shared
  8 GB unified memory pool alongside the OS, GPU, and CPU, design a memory allocation and eviction architecture
  that guarantees the OS will not terminate the application due to memory starvation while maintaining
  interactive generation latency.
details:
  realistic_solution: A robust L5 design utilizes a paged KV-cache strategy that requests memory in small,
    non-contiguous blocks on-demand natively within the shared memory space. This avoids fragmentation
    and massive upfront allocation. To prevent OOM crashes, the architecture must include a semantic eviction
    policy (like StreamingLLM or H2O) that discards low-attention tokens, hard-capping the maximum cache
    size and guaranteeing enough memory is preserved for concurrent OS operations.
  common_mistake: Candidates frequently propose pre-allocating a contiguous block for the maximum context
    length, which triggers immediate OS memory warnings on an 8 GB unified system. They also often ignore
    the severe power spikes (breaching the 5W budget) caused by memory defragmentation or transferring
    large cache tensors across the memory bus.
  napkin_math: 'Assuming a 7B parameter model: 32 layers, 4096 hidden size. FP16 KV-cache size per token
    = 2 (K,V) * 32 * 4096 * 2 bytes = 512 KB. A full 8K context requires 8192 * 512 KB = 4 GB of memory.
    Model weights at 4-bit quantization consume ~3.5 GB. Combined, the model and cache take 7.5 GB. On
    the A17 Pro''s 8 GB unified memory, leaving only 0.5 GB guarantees an OS-level OOM kill. The design
    must mathematically cap the cache at ~1.5 GB (around 3K tokens active) to leave a safe 3 GB margin
    for the OS.'
