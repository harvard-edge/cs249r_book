title: The Mobile App's Cloud Bottleneck
scenario: You are a Staff ML Engineer on a mobile team launching an 'AI Retouch' feature. The user's phone sends data to a cloud endpoint that runs a large model on a multi-GPU server, and the result is streamed back. The end-to-end P99 latency target is 500ms, but live measurements show it's closer to 850ms.
question: Why does the AI Retouch backend spend 250ms moving only 50MB over PCIe Gen5?
details:
  realistic_solution: The issue is a software implementation bug causing the data transfer to be latency-bound instead of bandwidth-bound. A single, efficient DMA transfer of 50MB over a PCIe Gen5 bus should be orders of magnitude faster. The observed 250ms delay can only be explained if the software is performing thousands of tiny, separate transfers, with each one incurring the full PCIe latency overhead.
  common_mistake: |
    **The Pitfall:** Blaming PCIe bandwidth saturation or model execution time.
    **The Rationale:** Engineers often assume hardware limits or focus on the largest number in a profile instead of calculating if the hardware is being used efficiently.
    **The Consequence:** Unnecessary hardware upgrades or misdirected optimization efforts.
  napkin_math: |
    1. Single PCIe Gen5 transfer latency: ~1,000 ns (1 µs).
    2. Observed transfer time: 250 ms = 250,000 µs.
    3. Number of sequential transfers: 250,000 µs / 1 µs = 250,000 transfers.
    4. Average payload per transfer: 50 MB / 250,000 = **200 bytes per transfer**, proving the transfer is heavily fragmented and latency-bound.
  options:
  - The PCIe Gen5 bus is saturated and cannot handle the 50MB transfer load efficiently.
  - Model execution (400ms) is the primary bottleneck; the transfer time is secondary and should be ignored.
  - The data is being moved in thousands of small chunks, making the transfer latency-bound.
  - The server's InfiniBand network is causing contention on the PCIe bus, slowing down the transfer.
  correct_index: 2
