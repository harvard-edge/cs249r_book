title: The Million-Device Adapter Sync Storm
scenario: Your mobile app personalizes a model using 10 MB LoRA adapters synced from the cloud every 5
  minutes. The app has 1 million active users. Calculate the server-side egress bandwidth required and
  propose a scalable distribution architecture.
question: "How would you calculate the server-side egress bandwidth required and propose a scalable distribution architecture?"
details:
  realistic_solution: 'Server egress: 10 MB x 1M devices / 300s = 33 GB/s sustained. At cloud egress pricing
    ($0.08/GB), this costs 10 MB x 1M x 288 syncs/day = 2,880 TB/day = $230,400/day. Solutions: (1) CDN
    edge caching for shared adapter updates, (2) push-based delta updates (only changed bytes, ~500 KB),
    (3) staggered sync windows (not all at once), (4) peer-to-peer gossip for nearby devices.'
  common_mistake: 'Only considering per-device bandwidth (10 MB / 300s = 33 KB/s, trivial). The aggregate
    server-side cost is the real engineering challenge: 1M concurrent downloads create a massive egress
    bill and bandwidth requirement.'
  napkin_math: 'Aggregate BW: 10 MB x 1M / 300s = 33 GB/s. Daily egress: 10 MB x 1M x 288 = 2,880 TB.
    Cost at $0.08/GB: $230K/day. With delta compression (20x): 1.65 GB/s, $11.5K/day.'
