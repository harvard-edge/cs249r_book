title: The Million-Device Adapter Sync Storm
scenario: Your mobile app personalizes a model using 10 MB LoRA adapters synced from the cloud every 5 minutes. The app has 1 million active users.
question: What is the server-side egress bandwidth required and cost for syncing 10MB adapters every 5 minutes to 1 million users?
details:
  realistic_solution: 'Server egress: 10 MB x 1M devices / 300s = 33 GB/s sustained. At cloud egress pricing ($0.08/GB), this costs 10 MB x 1M x 288 syncs/day = 2,880 TB/day = $230,400/day. Solutions: (1) CDN edge caching for shared adapter updates, (2) push-based delta updates (only changed bytes, ~500 KB), (3) staggered sync windows (not all at once), (4) peer-to-peer gossip for nearby devices.'
  common_mistake: |
    **The Pitfall:** Only considering the per-device download bandwidth.
    **The Rationale:** 33 KB/s per device seems trivial, so candidates ignore the massive aggregate impact on the central server.
    **The Consequence:** An unexpectedly catastrophic cloud egress bill and network saturation that takes down the update servers.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Adapter Size: 10 MB per user.
       - Sync Frequency: Every 5 minutes (300 seconds).
       - User Base: 1,000,000 active users.
       - Cloud Egress Cost: $0.08 / GB.
    2. **Calculations:**
       - Bandwidth: (10 MB * 1,000,000) / 300 s = 33.3 GB/s.
       - Daily Egress Data: 10 MB * 1,000,000 * 288 syncs/day = 2.88 PB (2,880,000 GB).
       - Daily Cost: 2,880,000 GB * $0.08/GB = $230,400.
    3. **Conclusion & Interpretation:**
       - **Result: Network-Bound. The architecture demands a massive 33.3 GB/s sustained egress, burning $230,400 daily.**
