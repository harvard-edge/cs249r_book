title: Mobile Memory Pressure Spec
scenario: A 4B INT4 model uses about 2 GB of weights on a phone with 8 GB unified memory. The OS and foreground app use 3.5 GB, camera mode can reserve another 2 GB, and the assistant needs KV cache for long conversations. Specify the memory guardrails before enabling the feature.
question: What memory guardrails are required before enabling a 2 GB on-device model on an 8 GB unified-memory phone?
details:
  realistic_solution: The guardrails should include max context length, KV-cache cap, camera/background app exclusion rules, low-memory callbacks, mmap/page-cache behavior, and a fallback when free memory drops below a threshold. Static weights fit, but concurrent camera use leaves only about 2.5 GB before KV and runtime overhead.
  common_mistake: Approving the feature because weights fit, while ignoring unified-memory contention and dynamic KV-cache growth.
  napkin_math: Free memory during camera use = 8 - 3.5 - 2 = 2.5 GB. A 2 GB model leaves only 0.5 GB before KV cache, runtime buffers, and fragmentation.
