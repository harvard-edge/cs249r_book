title: Distillation Projection Layer Bottlenecks
scenario: We deployed a student vision model, distilled from a heavy teacher using feature-level distillation, onto the Samsung Exynos 2400 NPU. To align intermediate representations, the student architecture includes 10 additional 1x1 projection convolutions. Profiling shows the dual-core NPU (capable of 34.7 TOPS) is severely stalling, yielding only 20 FPS instead of the target 60 FPS.
question: Why are distillation projection layers a bottleneck on the Exynos 2400, and what student design avoids them?
details:
  realistic_solution: The optimal solution is to redesign the student model without the 1x1 projection layers and train it using only soft-target logit matching at the output layer. Since the Samsung Exynos 2400 shares LPDDR5X memory across the system, memory bandwidth is heavily contested by the ISP and GPU. The 1x1 projection layers are completely memory-bound; removing them drastically reduces memory traffic and allows the NPU to leverage its 34.7 TOPS on the core model operations without stalling on data fetches.
  common_mistake: |
    **The Pitfall:** Attempting to optimize the 1x1 projection convolutions through pruning or quantization.
    **The Rationale:** Engineers assume the bottleneck is computational and apply standard compression techniques, missing the fact that 1x1 convolutions on high-resolution feature maps have extremely low arithmetic intensity.
    **The Consequence:** Wasting optimization effort while the shared LPDDR5X memory bus remains completely saturated, leaving the NPU stalled.
  napkin_math: |
    - **Memory Traffic per Layer:** Input (8.38 MB) + Output (8.38 MB) + Weights (~0.13 MB) ≈ 16.9 MB.
    - **Total Memory Traffic:** 10 layers = 169 MB per frame.
    - **Bandwidth Demand:** At 60 FPS, this demands **10.14 GB/s** of bandwidth from the heavily contested LPDDR5X memory.
    - **Compute Utilization:** Compute per layer is ~2.14 MACs. For 10 layers at 60 FPS, this requires ~1.28 TOPS. The NPU utilization is a mere **3.7%** (1.28 / 34.7 TOPS).
    - **Conclusion:** Switching to pure logit matching drops the projection layers, saving 10.14 GB/s of bandwidth and instantly eliminating the stall.
