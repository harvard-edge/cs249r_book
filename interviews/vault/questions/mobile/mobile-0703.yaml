title: The Cross-SoC Accuracy Divergence
scenario: You deploy the same TFLite INT8 face verification model on a Pixel 8 Pro and a Samsung Galaxy S23. On Pixel, the false acceptance rate (FAR) is 0.1% — within spec. On Galaxy S23, the FAR jumps to 1.2% — 12x worse, making the biometric feature unusable. Same model binary, same test images.
question: Why does the same INT8 face verification model have 0.1% FAR on Pixel 8 Pro but 1.2% on Galaxy S23?
details:
  realistic_solution: 'Three sources cause divergent INT8 results across SoCs: (1) Different rounding modes in the NPU''s requantization step (round-half-up vs round-half-to-even). (2) Different implementations of transcendental approximations (reciprocal sqrt, exp) in the softmax/normalization layers. (3) Different accumulator bit-widths (INT16 vs INT32) for intermediate dot products. The face verification threshold sits on the steep tail of the impostor distribution — a systematic +0.056 cosine similarity shift on Snapdragon increases FAR from 0.1% to 1.2%. Fix: use per-SoC threshold calibration with a reference dataset, costing only 50 bytes of config per SoC family.'
  common_mistake: |
    **The Pitfall:** Blaming the NPU hardware as fundamentally "less accurate."
    **The Rationale:** Candidates assume MAC units compute incorrectly, missing that divergence stems from rounding modes and transcendental approximations.
    **The Consequence:** Wasting time trying to debug the INT8 matrix multiplications instead of simply calibrating the SoC-specific thresholds.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Transcendental Error: Reciprocal sqrt approximation gives ±0.005 per dimension.
       - Genuine pair similarity: 0.72.
       - Target Threshold: 0.65.
    2. **Calculations:**
       - Cosine Similarity Error: sqrt(128) * 0.005 = 0.056.
       - Margin Calculation: Genuine pair similarity (0.72) - Threshold (0.65) = 0.07.
       - Error Impact: 0.056 error consumes 80% of the 0.07 margin.
    3. **Conclusion & Interpretation:**
       - **Result: Precision-Bound.** Fixed-point math on Hexagon consumes the margin, spiking FAR from 0.1% to 1.2%.
