title: 'Model Size Estimation: Master Tradeoffs for Multi-Modal LLM on Mobile'
scenario: Design and evaluate the memory tradeoffs for a multi-modal LLM (language + vision) on Snapdragon 8 Gen 3 (16GB). Components: CLIP-ViT-B/32 vision encoder (87M params), projection MLP (10M params), 1B language model. Use INT4 for LM, INT8 for vision encoder.
question: How would you compute full memory layout and TPOT for text generation after image encoding?
details:
  realistic_solution: 'CLIP ViT-B/32 INT8: 87MB. Projection MLP INT8: 10MB. LM INT4: 500MB. Image features (197 tokens × 512 dim × 2B FP16): 202KB. KV-cache prefix (image tokens as KV): 197 tokens × 262KB/token = 51.5MB. KV pool for text gen (4096 text tokens): 4096×262KB=1.07GB. System: 4GB. Total: 4000+87+10+500+0.2+51.5+1070=5,718MB = 5.7GB of 16GB. TPOT: 500MB/77GB/s=6.5ms. Image encode (87M MACs at ViT-B scale: 17.5 GFLOPs / 45 TOPS = 0.39ms + overhead: ~10ms).'
  common_mistake: |
    **The Pitfall:** Forgetting the dynamic memory cost of the image feature tensor and vision tokens.
    **The Rationale:** Candidates focus solely on the static model weights and text KV cache.
    **The Consequence:** Underestimating the KV prefix size and generating OOM errors when processing high-resolution visual inputs.
  napkin_math: |
    *   **Vision INT8:** 87 MB. MLP: 10 MB. LM INT4: 500 MB.
    *   **Image Features:** 197 tokens * 512 dim * 2 bytes (FP16) = ~202 KB.
    *   **Image KV Prefix:** 197 tokens * 262 KB/token = **51.5 MB**.
    *   **Text KV Cache:** 4096 tokens * 262 KB/token = **1.07 GB**.
    *   **Total ML RAM:** 500 + 87 + 10 + 51.5 + 1070 = **~1.72 GB**.
    *   **TPOT (Memory Bound):** 500 MB LM / 77 GB/s = **~6.5 ms/token**.
