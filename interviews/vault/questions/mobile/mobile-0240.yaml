title: The Depthwise Efficiency Factor
scenario: You are reviewing a MobileNet-style architecture for a new on-device camera feature. A junior engineer has replaced all the standard 3x3 convolutions with 3x3 depthwise separable convolutions to save power.
question: What is the approximate reduction in computational cost (FLOPs) you'd expect to see in those layers?
details:
  realistic_solution: 'A 3x3 depthwise separable convolution reduces computation by a factor of approximately 8-9x compared to a standard 3x3 convolution. It factors the dense convolution into a 3x3 depthwise step followed by a 1x1 pointwise step. The computational saving approaches K^2, where K is the kernel size.'
  common_mistake: |
    **The Pitfall:** Guessing it provides a minor optimization (e.g., 2x or 3x) or confusing parameter reduction with compute reduction.
    **The Rationale:** Engineers fail to recognize the quadratic nature of the savings with respect to the kernel size.
    **The Consequence:** Underestimating the true impact on FLOPs, leading to poor scaling decisions for mobile deployments.
  napkin_math: |
    **Assumptions & Constraints:**
    - Standard convolution cost: K^2 * C_in * C_out * H * W.
    - Depthwise separable cost: (K^2 * C_in * H * W) + (C_in * C_out * H * W).
    - Kernel size (K): 3.

    **Calculations:**
    - Cost Ratio = (K^2 * C_in * C_out) / (K^2 * C_in + C_in * C_out).
    - Simplify: (K^2 * C_out) / (K^2 + C_out).
    - For K=3: (9 * C_out) / (9 + C_out).
    - As C_out -> large, ratio approaches 9.

    **Conclusion & Interpretation:**
    - **Result: ~9x (Compute-Reduction)**. The computational cost is reduced by nearly 9x for large channel counts, drastically lowering power consumption.
  options:
  - 'Roughly 2-3x (Trap: Underestimating quadratic scaling)'
  - Roughly 8-9x
  - 'Roughly 4-5x (Trap: Miscalculating K squared)'
  - 'It''s the same, but memory is reduced (Trap: Confusing params with FLOPs)'
  correct_index: 1
