title: The Depthwise Efficiency Factor
scenario: You're reviewing a MobileNet-style architecture for a new on-device camera feature. A junior
  engineer has replaced all the standard 3x3 convolutions with 3x3 depthwise separable convolutions to
  save power. What is the approximate reduction in computational cost (FLOPs) you'd expect to see in those
  layers?
details:
  realistic_solution: 'A 3x3 depthwise separable convolution reduces computation by a factor of approximately
    8-9x compared to a standard 3x3 convolution. This is because it factors the full, dense convolution
    into two much cheaper steps: a 3x3 depthwise step that operates on each input channel independently,
    followed by a 1x1 pointwise step that combines the channel outputs. The computational saving approaches
    K², where K is the kernel size. For a 3x3 kernel, the saving is close to 9x.'
  common_mistake: Engineers often recall that depthwise separable convolutions are 'more efficient' but
    drastically underestimate the magnitude of the savings. They might guess it's a minor optimization
    (e.g., 2x or 3x), not recognizing it's a near order-of-magnitude improvement that is fundamental to
    making modern CNNs viable on mobile.
  napkin_math: The computational ratio between a standard and a depthwise separable convolution is given
    by `(K² × C_out) / (K² + C_out)`. For a 3x3 kernel (K=3), this becomes `(9 × C_out) / (9 + C_out)`.
    As the number of output channels `C_out` becomes large (e.g., 256 or 512, which is common), the `+9`
    term in the denominator becomes negligible, and the ratio approaches `(9 × C_out) / C_out = 9`. Therefore,
    the computational cost is reduced by nearly 9x.
  options:
  - Roughly 2-3×
  - Roughly 8-9×
  - About 50% (a 1.5x improvement)
  - It's the same, but memory is reduced
  correct_index: 1
