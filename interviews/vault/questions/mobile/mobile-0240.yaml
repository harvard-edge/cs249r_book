title: The Depthwise Efficiency Factor
scenario: You're reviewing a MobileNet-style architecture for a new on-device camera feature. A junior engineer has replaced all the standard 3x3 convolutions with 3x3 depthwise separable convolutions to save power.
question: What is the approximate reduction in computational cost (FLOPs) you'd expect to see in those layers?
details:
  realistic_solution: 'A 3x3 depthwise separable convolution reduces computation by a factor of approximately 8-9x compared to a standard 3x3 convolution. This is because it factors the full, dense convolution into two much cheaper steps: a 3x3 depthwise step that operates on each input channel independently, followed by a 1x1 pointwise step that combines the channel outputs. The computational saving approaches K², where K is the kernel size. For a 3x3 kernel, the saving is close to 9x.'
  common_mistake: |
    **The Pitfall:** Guessing it provides a minor optimization (e.g., 2x or 3x).
    **The Rationale:** Engineers fail to recognize the quadratic nature of the savings and drastically underestimate its magnitude.
    **The Consequence:** Underestimating the true impact on FLOPs, leading to poor scaling decisions.
  napkin_math: |
    - Ratio between standard and depthwise separable = (K^2 * C_out) / (K^2 + C_out).
    - For a 3x3 kernel (K=3): (9 * C_out) / (9 + C_out).
    - As C_out becomes large, the +9 becomes negligible.
    - **The computational cost is reduced by nearly 9x.**
  options:
  - Roughly 2-3×
  - Roughly 8-9×
  - About 50% (a 1.5x improvement)
  - It's the same, but memory is reduced
  correct_index: 1
