title: Sizing an LLM for Exynos 2400 NPU Deployment
scenario: You are tasked with deploying a locally-running 7B parameter foundation model for on-device
  summarization on a device powered by the Samsung Exynos 2400. The platform features a dual-core NPU
  delivering 34.7 TOPS and shares a total of 12 GB of LPDDR5X RAM with the CPU, GPU, and ISP. Evaluate
  the feasibility of deploying this model under these hardware constraints, and propose an architectural
  sizing and quantization strategy that allows the model to run efficiently without starving the OS and
  other critical subsystems of memory.
details:
  realistic_solution: A realistic approach assumes only 4-6 GB of the 12 GB RAM is safely allocatable
    to the NPU for this task. To fit a 7B model, aggressive quantization like INT4 or a mixed-precision
    strategy is mandatory. The candidate should evaluate weight-only INT4 quantization to reduce the footprint
    to ~3.5 GB, leaving 1-2 GB for the KV cache and runtime workspace. They must also recognize that while
    the NPU's 34.7 TOPS provides ample compute for generation, the shared LPDDR5X memory bandwidth will
    dictate the actual token generation rate.
  common_mistake: Candidates often assume they have access to the full 12 GB of RAM for the model weights
    and KV cache, failing to account for the OS, background apps, CPU, GPU, and ISP sharing the same memory
    pool. They may also simply divide the 34.7 TOPS NPU compute capacity by the model FLOPs to estimate
    latency, ignoring the severe memory bandwidth bottleneck characteristic of LLM inference on mobile
    SoCs.
  napkin_math: A 7B parameter model in FP16 requires 14 GB of memory (7B * 2 bytes), exceeding the 12
    GB system total. Using INT4 quantization reduces weight memory to 3.5 GB (7B * 0.5 bytes). Allocating
    1.5 GB for the KV cache and activations brings the NPU footprint to 5.0 GB, fitting within a realistic
    6 GB budget. For performance, assuming typical LPDDR5X bandwidth of ~60 GB/s and memory-bound decoding,
    transferring 3.5 GB of weights per token yields a theoretical maximum of 60 / 3.5 ≈ 17 tokens per
    second, heavily underutilizing the 34.7 TOPS compute but providing an acceptable user experience.
