title: The Memory-Mapped Weight Strategy
scenario: Your team's mobile ML app has a 3-second cold start because it loads 300 MB of model weights into a malloc'd buffer at launch. The PM wants sub-500ms startup. You cannot make the model smaller.
question: How can mmap cut a 300 MB model startup from 3s to under 500ms without shrinking the model?
details:
  realistic_solution: |
    Replace malloc + read with mmap(). Memory-mapping the weight file maps it directly into the process virtual address space without copying data into physical RAM. The OS loads pages on demand. Startup drops from 3 seconds to <50 ms. First inference is slower due to page faults, but total time remains under the 500 ms target.
  common_mistake: |
    **The Pitfall:** Suggesting loading the model in a background thread and showing a loading screen.
    **The Rationale:** Candidates focus on hiding the delay rather than eliminating the underlying I/O bottleneck.
    **The Consequence:** The user still experiences a 3-second wait before the app is usable.
  napkin_math: |
    - malloc + read: 300 MB / 2 GB/s = 150ms I/O + 100ms allocation + 200ms framework init = 450ms minimum (often 3s with compilation).
    - mmap: 0ms upfront.
    - First inference: ~200 layers * ~1.5 MB weights per layer.
    - Page fault overhead: 300 MB / 4 KB pages = 75,000 faults. 75,000 faults * ~0.7 us/fault = 52.5 ms extra.
    - **Startup drops to <50ms, and first inference adds ~52.5ms overhead, easily beating the 500ms target.**
