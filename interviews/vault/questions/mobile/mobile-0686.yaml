title: The Memory-Mapped Weight Strategy
scenario: Your team's mobile ML app has a 3-second cold start because it loads 300 MB of model weights
  into a malloc'd buffer at launch. The PM wants sub-500ms startup. You can't make the model smaller.
  How do you eliminate the cold start without changing the model?
details:
  realistic_solution: 'Replace malloc + read with mmap(). Memory-mapping the weight file maps it directly
    into the process virtual address space without copying data into physical RAM. The OS loads pages
    on demand. Startup drops from 3 seconds to <50 ms (just the mmap syscall). First inference is ~50
    ms slower due to page faults: 300 MB / 4 KB pages = 75,000 faults * ~0.7 us/fault = 50 ms extra. But
    after the first pass, pages are cached. Total first-inference time: ~250 ms (model execution) + 50
    ms (faults) = 300 ms — under the 500 ms target. Second inference: 250 ms with zero fault overhead.
    Additional benefit: iOS/Android can evict mapped pages under memory pressure and re-fault them later,
    making the app a better memory citizen.'
  common_mistake: '"Load the model in a background thread and show a loading screen." This hides the delay
    but doesn''t eliminate it — the user still waits.'
  napkin_math: 'malloc + read: 300 MB / 2 GB/s (UFS 3.1) = 150ms I/O + 100ms allocation + 200ms framework
    init = 450ms minimum. With Core ML compilation: +2-5s. mmap: 0ms upfront. First inference: ~200 layers
    × ~1.5 MB weights per layer × page fault overhead ≈ 50ms extra on first run. Second inference: all
    pages cached, no overhead. Startup: **<50ms** vs 3 seconds.'
