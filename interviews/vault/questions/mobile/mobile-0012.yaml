title: The App Size Limit
scenario: Your model is 500 MB (FP32 weights). The App Store allows up to 200 MB for cellular downloads — anything larger requires WiFi. Your PM wants the app to work immediately after download, even on cellular.
question: How can a 500 MB FP32 model ship in an app that must stay under the 200 MB cellular download limit?
details:
  realistic_solution: 'Four strategies, from simplest to most complex: FP32 is 500 MB (over limit). INT8 is 125 MB, which fits under the 200 MB cellular limit. INT4 is 62.5 MB, which also fits. A distilled student model could be ~50 MB. Another option is a tiny 8 MB bundled app that downloads the 500 MB model in the background, but this requires WiFi and breaks the immediate user experience. For a seamless user experience, quantizing the model to INT8 is the best trade-off — it makes the app usable immediately on cellular networks while maintaining near-original accuracy.'
  common_mistake: |
    **The Pitfall:** Attempting to compress the model file with zip or gzip.
    **The Rationale:** Developers treat model weights like standard data files (text, images) and assume standard compression algorithms will work.
    **The Consequence:** Model weights are essentially random floating-point numbers with high entropy; zip only saves 5-10%, leaving the file well over the 200 MB limit.
  napkin_math: |
    1. **FP32 Size:** 500 MB (Over 200 MB limit).
    2. **INT8 Size:** 500 MB / 4 = 125 MB (Under 200 MB limit).
    3. **Cellular Download Time:** At 10 Mbps, 125 MB takes 100 seconds. 500 MB would take 400 seconds (and require WiFi).
    **Quantizing to INT8 fits the model within the 200 MB cellular limit with minimal accuracy loss.**
