title: The Pruning vs. Distillation Dilemma
scenario: Your team needs to run a large transformer model for a real-time video AR effect on a new mobile SoC. The model currently takes 80ms per frame, but the budget for 'no jank' is 16ms. An engineer proposes using 50% unstructured weight pruning to halve the FLOPs and achieve a 2x speedup.
question: Why is 50% unstructured pruning a poor path to the 16ms mobile deadline, and what compression technique should replace it?
details:
  realistic_solution: 'The proposal is critically flawed because mobile NPUs are designed as dense math engines. They use hardware like systolic arrays that are physically optimized for dense matrix multiplications. Unstructured pruning creates sparse weight matrices. These NPUs lack the complex indexing logic to dynamically skip zero-value weights. To execute a sparse layer, the NPU must either run the computation on a slower, general-purpose core or, more commonly, treat the sparse matrix as dense, executing a vast number of useless multiply-accumulate operations on zero-valued weights. The memory access patterns also become irregular and scattered, destroying cache locality. Consequently, 50% unstructured pruning yields almost zero speedup. The correct approach is Knowledge Distillation. By distilling the large model''s knowledge into a smaller, architecturally-distinct, and *dense* student model (e.g., one based on MobileNet-like principles), you create a model whose computations are dense matrix multiplications. These map perfectly to the NPU''s hardware, allowing it to run near its peak theoretical throughput. Distillation changes the problem to one the hardware is actually good at solving.'
  common_mistake: |
    **The Pitfall:** Assuming a reduction in theoretical FLOPs from unstructured pruning translates linearly to latency reduction.
    **The Rationale:** Candidates apply general-purpose CPU logic to specialized accelerators like mobile NPUs, which require dense compute patterns.
    **The Consequence:** Wasting time on unstructured pruning that yields almost zero speedup on hardware optimized for dense matrix multiplications.
  napkin_math: |
    **Assumptions & Constraints:**
    - Original latency: 80ms.
    - Assuming NPU is 35 TOPS, original model needs 80ms x 35 TOPS = 2.8 Tera-ops.

    **Calculations:**
    - With 50% unstructured pruning, ops are 1.4 Tera-ops.
    - Flawed logic: 1.4 Tera-ops / 35 TOPS = 40ms.
    - Reality: The NPU cannot exploit unstructured sparsity and still executes 2.8 Tera-ops at 80ms.
    - Distillation to a dense model requiring 0.7 Tera-ops (4x reduction).
    - Dense distilled latency = 0.7 Tera-ops / 35 TOPS = 20ms.

    **Conclusion & Interpretation:**
    - **Result: 20ms (Hardware Compatibility-Bound)**. Distillation to a dense model achieves real speedup, as NPUs cannot accelerate unstructured sparse computations.
