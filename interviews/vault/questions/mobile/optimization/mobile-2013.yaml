title: Mobile I/O Network Throttling
scenario: An iOS app streams video to a cloud API while running an on-device privacy filter on the A17 Pro. The upload code waits for each ACK before queuing the next filtered frame, and heavy local frame drops appear only when cellular drops to 3G.
question: Why does waiting for upload ACKs make local A17 Pro inference stagger and drop frames?
details:
  realistic_solution: The Neural Engine is not slowed by 3G itself. The app has coupled capture, inference, rendering, and upload acknowledgment in a synchronous path. On a slow network, ACK waits block the thread or queue that feeds frames to the A17 Pro and renderer. Uploads should move to an asynchronous queue with bounded buffering, dropping or coalescing uploads under backpressure while local inference/rendering continues.
  common_mistake: |
    **The Pitfall:** Assuming the A17 Pro Neural Engine senses connection speed and throttles itself natively.
    **The Rationale:** Candidates ignore thread-blocking software design flaws.
    **The Consequence:** Seeking hardware-level explanations for an I/O scheduling issue.
  napkin_math: |
    **Assumptions & Constraints:**
    - Frame Target: 30 FPS = 33.3 ms/frame.
    - 3G upload ACK wait in the synchronous path: ~500 ms.

    **Calculations:**
    - Synchronous queue stall: 500 ms.
    - Frame periods missed while blocked: 500 ms / 33.3 ms/frame = ~15 frame intervals.

    **Conclusion & Interpretation:**
    - **Result: up to ~15 frame intervals missed per blocked ACK.** The bottleneck is the app's synchronous I/O dependency and shared scheduling path, not cellular latency directly throttling the Neural Engine.
