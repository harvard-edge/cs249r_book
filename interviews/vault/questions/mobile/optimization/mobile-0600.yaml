title: The Sparse Illusion
scenario: 'Your team is shipping a new ''Smart Reply'' feature on your app, powered by a 100M parameter Transformer model. Users are reporting significant battery drain. Profiling confirms the model is the cause. Two solutions are proposed to create a smaller model: A) 50% unstructured weight pruning, or B) Distilling the model into a new, dense 50M parameter student model. Both achieve similar accuracy.'
question: How would you analyze the trade-offs and justify which approach is superior for a mobile deployment?
details:
  realistic_solution: Distillation is unequivocally superior for mobile deployment. Mobile NPUs (like Apple's ANE) are highly optimized for dense, regular matrix multiplications. Unstructured pruning introduces sparsity, which leads to irregular memory access patterns. This breaks cache locality and defeats the prefetching mechanisms in the memory controller, forcing frequent, high-power accesses to the main LPDDR5 DRAM. While the NPU performs fewer calculations, it spends most of its time idle, waiting for data. The distilled model, being smaller and dense, maps perfectly to the NPU's architecture. It has a smaller memory footprint for weights, smaller activation tensors (reducing memory bandwidth pressure), and allows the NPU to run at high utilization with predictable data access patterns, resulting in significantly lower latency and power consumption.
  common_mistake: |
    **The Pitfall:** Assuming unstructured sparsity directly translates to speedups.
    **The Rationale:** Engineers often think of FLOPs as the primary cost and assume that 50% fewer FLOPs from pruning equates to a 50% speedup, ignoring memory bandwidth.
    **The Consequence:** Unstructured pruning introduces irregular memory accesses, breaking cache locality and failing to reduce memory traffic or power on mobile SoCs.
  napkin_math: |
    **Assumptions & Constraints:**
    - 100M parameters in FP16 (200MB).
    - 20 tokens/sec generation speed.
    - Memory traffic power cost: ~1W per 10GB/s.

    **Calculations:**
    - Memory traffic: 200MB * 20 = 4GB/s.
    - Power cost: 4GB/s is ~0.4W.
    - 50% unstructured pruning: Still loads the dense 200MB tensor (or suffers irregular access), 0.4W.
    - Distillation to 50M: Drops footprint to 100MB, memory traffic to 2GB/s.

    **Conclusion & Interpretation:**
    - **Result: 0.2W saved (Memory-Bandwidth Bound)**. Dense distilled models maintain cache locality and reduce power consumption.
