title: The Cellular Model Download Failure
scenario: "Your AI writing assistant app downloads a 180 MB language model on first launch. Analytics show 40% of users in India and Southeast Asia never complete the download on 4G connections. The model server is hosted in us-east-1."
question: "Why does a 180 MB first-launch model download fail for 40% of India and Southeast Asia users on 4G?"
details:
  realistic_solution: |
    Large monolithic downloads on unstable cellular networks suffer from compounded drop probabilities over time. Implement chunked, resumable downloads (e.g., 5MB segments via HTTP Range requests). Additionally, apply INT4 post-training quantization to reduce the payload to ~45MB, and deploy regional CDN edge nodes in Mumbai/Singapore. Serve a microscopic 'lite' model immediately while the full model downloads asynchronously.
  common_mistake: |
    **The Pitfall:** Assuming a CDN solves fundamental network reliability issues.
    **The Rationale:** Engineers think "add a CDN edge node" fixes latency, missing the core problem: the download duration is too long for unstable connections without resumption.
    **The Consequence:** High user churn and uninstalls during onboarding.
  napkin_math: |
    **Assumptions & Constraints:**
    - Payload: 180 MB.
    - Effective 4G speed: 5 Mbps (0.625 MB/s).
    - Connection drop probability: 15% per minute.

    **Calculations:**
    - Monolithic download time: 180 MB / 0.625 MB/s = 288 seconds (4.8 minutes).
    - Survival probability: (1 - 0.15)^4.8 = 0.85^4.8 ≈ 0.458 (45% success rate).
    - Chunked approach (5 MB): 5 MB / 0.625 MB/s = 8 seconds per chunk (2% drop per chunk, perfectly resumable).

    **Conclusion & Interpretation:**
    - **Result: 45% monolithic success rate (Network-Reliability Bottleneck)**. Without resumption, the connection drop rate dominates. Chunking mitigates this entirely.
