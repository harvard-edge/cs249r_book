title: QAT for Text-to-Speech
scenario: A text-to-speech model sounds highly robotic after applying standard Post-Training Quantization (PTQ) to INT8 on a mobile NPU.
question: 'Design an optimization plan to recover acoustic fidelity without dropping back to FP16, addressing the dynamic range issues?'
details:
  realistic_solution: 'Implement Quantization-Aware Training (QAT) with Learnable Step Sizes (LSQ). By finetuning the model for a few epochs while simulating the INT8 bounds, the network learns to adapt its weight distributions around the clipping thresholds, preserving audio quality without sacrificing throughput.'
  common_mistake: |
    **The Pitfall:** Reverting to FP16 mixed precision.
    **The Rationale:** When standard PTQ fails, engineers often assume the model strictly requires higher precision to function.
    **The Consequence:** Halving the throughput of the NPU and doubling the memory bandwidth pressure, destroying efficiency.
  napkin_math: |
    **Assumptions & Constraints:**
    - Standard PTQ causes clipping of outlier activations.
    - Moving to FP16 halves throughput and doubles memory bandwidth pressure.

    **Calculations:**
    - INT8 provides a 4x reduction in weight size (e.g., 40MB -> 10MB) vs FP32.

    **Conclusion & Interpretation:**
    - **Result: 4x memory efficiency maintained (Memory-Bound)**. QAT preserves INT8 benefits while fixing clipping.
