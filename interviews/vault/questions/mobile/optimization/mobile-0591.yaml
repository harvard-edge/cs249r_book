title: The CoreML vs TFLite Performance Gap
scenario: You benchmark the same MobileNetV3-Large model on an iPhone using Core ML (1.8ms) and on an Android device using TFLite (5.2ms). TFLite on iPhone gets 4.1ms and the CoreML EP on Android gets 6.8ms.
question: What explains Core ML's 1.8 ms MobileNetV3 latency on iPhone versus TFLite's 5.2 ms on Android?
details:
  realistic_solution: 'The 2.9x latency gap (1.8ms vs 5.2ms) cannot be explained as pure silicon speed. The cross-device numbers show that runtime, compiler, delegate/backend choice, and device-specific integration all interact: TFLite is slower than Core ML on iPhone, and the CoreML EP is slower than TFLite on Android. The likely explanation is that Core ML on iPhone gets the best graph lowering, operator fusion, memory planning, and ANE backend selection for this model, while the other runtime/device combinations hit less optimal partitioning or fallback paths. The fix is to benchmark the same runtime on both devices, inspect delegate placement and fallbacks, and force single-backend execution where possible before attributing the gap to hardware.'
  common_mistake: |
    **The Pitfall:** Attributing the entire latency gap to pure silicon performance.
    **The Rationale:** Engineers see the 2.9x gap and assume one NPU is simply 3x faster than the other.
    **The Consequence:** They misdiagnose cross-platform performance, ignoring the massive impact of software-level compiler optimization and partition overheads.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Observed latencies: Core ML on iPhone = 1.8ms; TFLite on Android = 5.2ms; TFLite on iPhone = 4.1ms; CoreML EP on Android = 6.8ms.
       - The scenario does not provide TOPS, delegate partition counts, DMA traces, or per-op fallback data.
    2. **Calculations:**
       - Cross-platform gap = 5.2ms / 1.8ms = ~2.9x.
       - Same-device runtime gap on iPhone = 4.1ms / 1.8ms = ~2.3x.
       - Android CoreML EP vs Android TFLite = 6.8ms / 5.2ms = ~1.3x slower.
       - Because runtime swaps change latency substantially on the same or related device class, software lowering/backend selection is a major contributor.
    3. **Conclusion & Interpretation:**
       **Result: Runtime/Backend Interaction. The evidence supports compiler/runtime partitioning, fusion, memory planning, and backend selection as likely contributors. It does not prove that DMA is the dominant bottleneck or that Core ML has zero partition overhead.**
