title: The CoreML vs TFLite Performance Gap
scenario: You benchmark the same MobileNetV3-Large model on an iPhone using Core ML (1.8ms) and on an Android device using TFLite (5.2ms). TFLite on iPhone gets 4.1ms and the CoreML EP on Android gets 6.8ms.
question: What explains Core ML's 1.8 ms MobileNetV3 latency on iPhone versus TFLite's 5.2 ms on Android?
details:
  realistic_solution: 'The 2.9x latency gap (1.8ms vs 5.2ms) far exceeds the hardware gap. The extra latency comes from compiler optimization: Core ML compiles the entire graph as one fused ANE program with zero partition boundaries, while TFLite partitions across DSP and GPU, incurring ~2.25ms of inter-partition DMA overhead per frame. When TFLite runs on iPhone (4.1ms) vs Core ML on Pixel (6.8ms), the software advantage reverses. The fix: benchmark the same runtime on both devices to isolate hardware, or force single-delegate execution to measure true silicon speed.'
  common_mistake: |
    **The Pitfall:** Attributing the entire latency gap to pure silicon performance.
    **The Rationale:** Engineers see the 2.9x gap and assume one NPU is simply 3x faster than the other.
    **The Consequence:** They misdiagnose cross-platform performance, ignoring the massive impact of software-level compiler optimization and partition overheads.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Device A NPU: 35 TOPS.
       - Device B NPU: 22 TOPS.
       - Core ML compiles as a single fused program. TFLite partitions across DSP and GPU.
    2. **Calculations:**
       - Hardware compute ratio = 35 TOPS / 22 TOPS = ~1.6x.
       - Observed latency ratio = 5.2ms / 1.8ms = ~2.9x.
       - Software overhead factor = 2.9x / 1.6x = ~1.8x.
       - TFLite overhead (Device B) = ~2.1ms compute + ~2.25ms inter-partition DMA + ~0.85ms scheduling = 5.2ms.
    3. **Conclusion & Interpretation:**
       **Result: Interconnect-Bound (DMA). Core ML compiles the graph as a single fused program (0ms DMA overhead), whereas TFLite partitions it across NPU/GPU, adding massive memory transfer latency.**
