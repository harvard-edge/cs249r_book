title: The NNAPI Fragmentation Problem
scenario: "You deploy the same TFLite INT8 model across three Android flagships. Using NNAPI delegation, you measure 6ms, 9ms, and 22ms respectively depending on the hardware platform."
question: "Why does the same TFLite INT8 model exhibit a massive 3x latency regression (22ms vs 6ms) on a specific flagship Exynos NPU?"
details:
  realistic_solution: |
    Fragmentation in NNAPI driver OP coverage forces severe graph partitioning. On the slower device, unsupported depthwise variants or asymmetric INT8 operations cause the compiler to fallback to the CPU, introducing massive tensor transfer overheads (DMA) and breaking kernel fusion. Resolve this by deploying a simplified model graph containing only widely supported, standard operators to minimize cross-device variance.
  common_mistake: |
    **The Pitfall:** Assuming NPU hardware speed solely dictates execution latency.
    **The Rationale:** Engineers often blame a "slower NPU," failing to recognize compiler maturity and OP coverage fragmentation across Android SoC vendors.
    **The Consequence:** Poorly optimized models, unpredictable regressions, and battery drain on specific devices.
  napkin_math: |
    **Assumptions & Constraints:**
    - Fast NPU (Snapdragon): 95% coverage, 1 subgraph transition (0.5ms overhead).
    - Slow NPU (Exynos): 70% coverage, 10 subgraph transitions (10.7ms overhead).
    - Base NPU compute latency: ~5-6ms. CPU fallback: ~0.5-3ms.

    **Calculations:**
    - Fast Latency: 5ms (NPU) + 0.5ms (CPU) + 0.5ms (DMA) = 6ms.
    - Slow Latency: 8.3ms (NPU) + 3ms (CPU) + 10.7ms (DMA) = 22ms.

    **Conclusion & Interpretation:**
    - **Result: 10.7ms DMA overhead (Memory-Transfer Bottleneck)**. Graph partitioning creates a massive memory-transfer bottleneck due to poor OP coverage, overriding compute capabilities.
