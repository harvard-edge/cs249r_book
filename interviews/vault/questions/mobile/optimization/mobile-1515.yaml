title: Designing a Sparsity Strategy for A17 Pro ANE
scenario: You are tasked with deploying a 1.2 billion parameter vision-language model onto an iPhone 15 Pro, targeting the Apple A17 Pro Neural Engine (ANE). The model must run real-time inference at 30 FPS within a strict 2W power budget, utilizing the ANE's 35 TOPS capability. Given the 8GB unified memory shared with the CPU/GPU, you need to design a pruning and sparsity specification that can produce real hardware speedups without exceeding memory bandwidth or power constraints.
question: What pruning structure gives real A17 Pro ANE speedups for a 1.2B vision-language model at 30 FPS and 2W?
details:
  realistic_solution: The specification must mandate structured pruning that changes the compiled dense tensor shapes, such as pruning entire channels, attention heads, MLP widths, or blocks that Core ML can lower efficiently for the ANE. Do not assume arbitrary unstructured zeros or a private semi-structured sparsity pattern will be skipped. The deployment should re-export the pruned graph, profile it on device, and accept the pruning only if the compiled model reduces latency, bandwidth, and power while preserving accuracy.
  common_mistake: |
    **The Pitfall:** Proposing unstructured pruning to reduce parameters.
    **The Rationale:** Candidates assume simply zeroing out weights translates to faster execution, failing to realize NPUs require structured sparsity patterns (e.g., 16x16 blocks) to actually skip computations.
    **The Consequence:** Zero-values are still loaded and multiplied, yielding no latency or power improvements on the hardware.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model weights: 1.2B parameters at FP16 = 2.4 GB resident footprint.
    - Profiling for the target input shape shows ~1.8e12 INT8-equivalent ops per frame before pruning.
    - ANE peak: 35 TOPS; target: 30 FPS; power budget: 2W.

    **Calculations:**
    - Weight footprint: 1.2B * 2 bytes = 2.4 GB, which fits in unified memory but leaves little headroom.
    - Dense compute demand: 1.8e12 ops/frame * 30 frames/sec = 54e12 ops/sec = 54 TOPS, above the 35 TOPS peak.
    - 50% structured channel/head pruning: active ops drop to ~0.9e12 ops/frame if the compiler emits smaller dense tensors.
    - Pruned compute demand: 0.9e12 ops/frame * 30 frames/sec = 27e12 ops/sec = 27 TOPS.
    - Pruned weight footprint: 2.4 GB * 0.5 = ~1.2 GB before metadata/alignment overhead.

    **Conclusion & Interpretation:**
    - **Result: ~27 TOPS active demand, ~1.2 GB weights (Compute/Power-Bound)**. Structured pruning can make 30 FPS plausible only if profiling confirms the pruned graph maps to smaller ANE-supported dense shapes or documented sparse kernels.
