title: The Fusion Illusion
scenario: A junior engineer on your team has applied 50% unstructured weight pruning
  to a MobileNetV2 model, reducing its theoretical FLOPs by half. However, when they
  deploy it to an iPhone with an A17 Pro chip using CoreML, the end-to-end latency
  only improves by 10%. They are confused, as they expected a speedup closer to 2x.
question: How would you analyze the interaction between the CoreML runtime, the A17
  Pro's hardware, and the pruned model to explain this disappointing result?
details:
  realistic_solution: 'Unstructured pruning degrades dense matrix representations
    into sparse, irregular structures. This completely shatters the CoreML compiler''s
    ability to fuse adjacent operators (e.g., Conv-BN-ReLU). Instead of a single highly-optimized
    ANE kernel, the graph fragments into disjointed operators, triggering massive
    read/write traffic to LPDDR5X. The theoretical FLOP reduction is entirely eclipsed
    by the newly introduced memory-access overhead.

    '
  common_mistake: '**The Pitfall:** Believing that FLOPs are the primary driver of
    latency on mobile NPUs.

    **The Rationale:** Engineers often ignore the fact that unstructured pruning creates
    sparse, irregular memory access patterns that break compiler fusion.

    **The Consequence:** Pursuing unstructured pruning strategies that are hostile
    to the hardware, resulting in negligible real-world speedups.

    '
  napkin_math: '**Assumptions & Constraints:**

    - Hardware: A17 Pro. Ridge point: ~683 Ops/Byte.

    - Dense MobileNetV2 AI (Arithmetic Intensity): ~15-20 Ops/Byte.

    - Pruning: 50% unstructured (halves FLOPs, keeps memory footprint ~same due to
    sparse indices).


    **Calculations:**

    - Pruned AI: Drops to ~7.5-10 Ops/Byte.


    **Conclusion & Interpretation:**

    - **Result: 7.5-10 Ops/Byte AI (Memory-Bandwidth Bottleneck)**. Both dense and
    sparse models operate far below the ridge point. Halving compute yields minimal
    latency gains because the system is restricted by a memory-bandwidth bottleneck.

    '
