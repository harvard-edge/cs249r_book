title: LLM Operator Scheduling on Hexagon NPU
scenario: You are tasked with optimizing the inference latency and memory footprint of a critical, computationally intensive block within a large language model (LLM) for deployment on a mobile NPU. The LLM block consists of a sequence of operators, some of which are memory-bound (e.g., element-wise operations with large tensors), while others are compute-bound (e.g., matrix multiplications).
question: How would you schedule an LLM block on the NPU to reduce latency, reuse memory, exploit parallelism, and apply layer fusion to meet a 100ms latency target?
details:
  realistic_solution: |
    A realistic solution involves a multi-pronged approach: 1. **Computational Graph Analysis**: Represent the LLM block as a DAG to identify data dependencies. 2. **Memory-Aware Scheduling**: Employ algorithms to determine an execution order that maximizes in-place operations and minimizes peak memory footprint. 3. **Layer Fusion**: Identify sequences of operations that can be fused into a single kernel (e.g., FlashAttention) to reduce memory reads/writes. 4. **Parallelism Exploitation**: Schedule independent subgraphs to run concurrently. 5. **Profiling and Iteration**: Start with an initial schedule, use nsys profiling on the target NPU, analyze bottlenecks, and iteratively refine.
  common_mistake: |
    **The Pitfall:** Prioritizing compute utilization without adequately considering memory access patterns and bandwidth limitations.
    **The Rationale:** Candidates often focus purely on parallelizing matrix multiplications and maximizing TOPS utilization.
    **The Consequence:** Naive scheduling leads to excessive data movement between DRAM and NPU caches, significantly bottlenecking performance even if the NPU's raw compute is underutilized.
  napkin_math: |
    **Assumptions & Constraints:**
    - Budget for 100ms latency on 45 TOPS NPU.
    - 100 GOPS block requirement.
    - LPDDR5X bandwidth: ~50 GB/s.

    **Calculations:**
    - Compute limit: 45 TOPS * 0.1 sec = 4.5 Trillion INT8 operations.
    - Theoretical compute time: 100 * 10^9 / (45 * 10^12) = 2.2ms.
    - Transferring 1 GB of data takes ~20ms.

    **Conclusion & Interpretation:**
    - **Result: 20ms transfer vs 2.2ms compute (Memory-Bandwidth-Bound)**. Even small data transfers consume a massive portion of the latency budget compared to raw compute.
