title: The Real-time Rendering Wall
scenario: Your team needs to deploy a 20 GFLOP object detector on a mobile phone, but it currently runs at 200ms per frame, catastrophically missing the 16ms UI 'jank' budget.
question: 'Which model optimization is more likely to meet a 16ms mobile budget: unstructured pruning or dense distillation?'
details:
  realistic_solution: Option B is the correct approach. While unstructured pruning
    (Option A) reduces the theoretical FLOP count, it results in sparse weight matrices
    that are poorly suited for mobile NPUs. The Hexagon NPU cannot effectively skip
    the zero-value computations and its memory prefetching mechanisms are disrupted
    by the irregular data access, leading to little-to-no actual speedup. The latency
    would remain close to 200ms.
  common_mistake: |
    **The Pitfall:** Assuming FLOPs reduction from pruning translates directly to latency reduction.
    **The Rationale:** Candidates fail to account for the architectural specifics of hardware accelerators like mobile NPUs, which gain their performance from massively parallel, dense computations.
    **The Consequence:** Deploying an unstructured sparse model that yields zero speedup and misses the real-time deadlines entirely.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Target Latency: 16 ms.
       - Hardware: Mobile NPU (highly optimized for dense matrix ops, terrible at sparse ops).
       - Option A (Unstructured Pruning): Reduces model to 10 GFLOPs.
       - Option B (Dense Distillation): Reduces model to 1 GFLOP (20x smaller).
    2. **Calculations:**
       - Option A Effective Speedup = FLOPs Reduction * Architectural Efficiency (eta_arch). Due to unstructured sparsity, eta_arch = ~0. Latency remains ~200ms.
       - Option B Effective Speedup = Dense execution scales linearly. Latency = ~200 ms / 20 = 10 ms.
    3. **Conclusion & Interpretation:**
       **Result: Architectural Efficiency Bound. Distillation to a smaller, dense architecture mathematically achieves ~10ms latency, well within the 16ms budget, while unstructured pruning provides virtually zero speedup on NPU hardware.**
  options:
  - Distillation only improves accuracy, it doesn't solve latency issues.
  - Pruning halves the FLOPs, so latency will become 100ms, which is a significant improvement.
  - A small, dense student model from distillation is NPU-friendly and will likely meet the 16ms budget, whereas the pruned model will see little speedup.
  - Neither will work; the only solution is to run the model on the cloud via an API call.
  correct_index: 2
