title: 'Evaluate shared memory bandwidth contention during mobile task overlap'
scenario: 'On a mobile SoC, an AR app renders graphics while the NPU runs pose estimation. They share system memory. The NPU requires 50 GB/s bandwidth, the GPU requires 30 GB/s, and max SoC bandwidth is 60 GB/s.'
question: 'Evaluate how perfectly overlapping the NPU and GPU workloads will affect the AR frame latency.'
details:
  realistic_solution: 'Perfect overlap means the NPU and GPU execute concurrently, demanding 80 GB/s total memory bandwidth. Since the SoC is limited to 60 GB/s, severe memory contention will stall both processors. Instead of hiding latency, the overlap makes the pipeline heavily memory-bound, degrading latency for both the rendering and AI tasks.'
  common_mistake: |
    **The Pitfall:** Assuming that overlapping compute on independent cores always yields linear speedups.
    **The Rationale:** Candidates focus on compute isolation but ignore that the hardware shares the same unified memory controller.
    **The Consequence:** Optimization efforts backfire by creating severe bandwidth contention that throttles both processes.
  napkin_math: |
    **Assumptions & Constraints:**
    - NPU requires 50 GB/s. GPU requires 30 GB/s.
    - SoC shared unified memory maximum bandwidth is 60 GB/s.

    **Calculations:**
    - Combined demand: 50 GB/s + 30 GB/s = 80 GB/s.
    - Overage: 80 GB/s - 60 GB/s = 20 GB/s deficit.

    **Conclusion & Interpretation:**
    - **Result: 20 GB/s Deficit (Memory-Bound)**. The 80 GB/s demand severely exceeds the 60 GB/s SoC limit, stalling memory reads and degrading latency for both tasks instead of hiding it.
