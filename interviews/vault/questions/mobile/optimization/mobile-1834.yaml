title: Minimizing computational graph size for on-device fine-tuning on Snapdragon 8 Gen 3
scenario: You are implementing LoRA fine-tuning on a device with 8GB RAM for a 1B parameter LLM. Standard LoRA with rank=4 adds 2xrank trainable matrices per attention layer. The backward pass for 32 transformer layers with LoRA adapters takes 800ms, far too slow for interactive use.
question: How would you shrink the autograd graph for LoRA fine-tuning a 1B LLM?
details:
  realistic_solution: 'Wrap the frozen base model forward pass with torch.no_grad(). Compute frozen layer activations as detached tensors. Only the LoRA adapter computation (very small) needs the computational graph. This reduces backward graph size from 32 full attention layers to 32 LoRA adapters. Memory and time reduction: ~95%.'
  common_mistake: |
    **The Pitfall:** Keeping `requires_grad=True` on frozen base model parameters while fine-tuning with LoRA.
    **The Rationale:** Engineers think that correctly setting the optimizer to only update LoRA parameters is enough, but PyTorch still builds the computational graph for any operation where ANY tensor has `requires_grad=True`.
    **The Consequence:** This needlessly stores massive activation tensors for the full forward pass, wasting memory and dramatically slowing down the backward pass.
  napkin_math: |
    **Assumptions & Constraints:**
    - LLM Layers: 32.
    - Hidden size: 2048.
    - LoRA Rank: 4.
    - FP16 tensors: 2 bytes/element.

    **Calculations:**
    - If the frozen base forward is tracked, autograd must retain large per-layer activation tensors for 32 transformer layers.
    - A single batch-token hidden activation is 2048 * 2 bytes = 4 KB before intermediate tensors and batch/sequence scaling.
    - LoRA trainable weights per projection: 2048 * 4 + 4 * 2048 = 16,384 elements = 32 KB FP16.
    - Four LoRA projections per layer across 32 layers: 32 * 4 * 32 KB = about 4 MB of adapter weights.
    - Detaching the frozen base prevents storing the full base-model backward graph; only adapter inputs/outputs and LoRA parameters need gradient tracking.

    **Conclusion & Interpretation:**
    - **Result: much smaller autograd graph, not a fixed 267x speedup.** The defensible claim is memory reduction from full-layer activation tracking to LoRA-adapter tracking, with actual runtime savings depending on sequence length, checkpointing, and kernels.
