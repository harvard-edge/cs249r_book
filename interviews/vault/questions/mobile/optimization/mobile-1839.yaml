title: Profiling PyTorch Mobile image inference tensor copies
scenario: A PyTorch Mobile model processes images from the camera in real-time. Profiling shows 60% of inference time (12ms out of 20ms) is spent on memory operations, not compute. The model is a MobileNetV2 (3.4M params) which should be perfectly compute-bound.
question: How would you profile and remove unnecessary tensor copies in a PyTorch Mobile image pipeline?
details:
  realistic_solution: 'Convert to channels-last memory format: model = model.to(memory_format=torch.channels_last). Process input in NHWC natively. Fuse the uint8->float32 conversion and normalization into a single operation. Eliminate unnecessary .contiguous() calls.'
  common_mistake: |
    **The Pitfall:** Overlooking implicit tensor format conversions.
    **The Rationale:** Engineers forget that mobile camera frames arrive in NHWC format, while PyTorch expects NCHW, leading to implicit, non-contiguous memory copies when `.contiguous()` is called.
    **The Consequence:** The model becomes severely memory-bound, spending the majority of its execution time copying data rather than computing.
  napkin_math: |
    **Assumptions & Constraints:**
    - Camera frame: 1 x 3 x 720 x 1280 (uint8).
    - Memory Bandwidth: 50 GB/s.
    - Non-contiguous penalty: 20-30x.

    **Calculations:**
    - Frame elements: 3 * 720 * 1280 = 2,764,800.
    - uint8 frame size: 2,764,800 bytes = 2.76 MB.
    - float32 tensor size after cast: 2,764,800 * 4 bytes = 11.06 MB.
    - A separate NHWC-to-NCHW float32 copy reads and writes about 11.06 MB each, or 22.12 MB of memory traffic.
    - Ideal transfer time: 22.12 MB / 50 GB/s = 0.44 ms.
    - With a 20-30x non-contiguous/cache penalty, effective time is roughly 8.8-13.3 ms, matching the observed 12 ms memory cost.

    **Conclusion & Interpretation:**
    - **Result: Memory Copy Bound**. Converting to channels-last eliminates the NHWC to NCHW penalty, dropping memory time from 12ms to ~1-2ms.
