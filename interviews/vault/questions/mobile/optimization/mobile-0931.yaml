title: Flash Attention SRAM Tiling for Mobile NPU LLM Inference
scenario: Implement Flash Attention for a 1B LLM on a mobile NPU. The model has 16 heads, head dim 64, and must handle sequences up to 2048 tokens.
question: How would you specify tile sizes for flash attention given available SRAM, and compute memory savings vs standard attention?
details:
  realistic_solution: 'Use tile sizes so the on-chip working set fits SRAM: for Bq query tokens and Bkv key/value tokens, keep Q + K + V tiles, score scratch, output tile, and running softmax state under the SRAM budget with margin. With hidden = 16 heads * 64 dim = 1024 and FP16, each full hidden token vector is 2KB. If all 16 heads are tiled together, a 2MB SRAM budget rejects Bq=128, Bkv=256 because Q/K/V, score scratch, output, and state total about 2.25 MiB. Choose Bq=64, Bkv=256 for about 1.5 MiB of active tile state. Standard attention materializes the 16 * 2048 * 2048 FP16 score tensor (~128MiB); flash attention replaces that with roughly 1.5 MiB of tile state, a savings of about 126.5 MiB or 98.8% for the score/working buffer comparison.'
  common_mistake: |
    **The Pitfall:** Using generic tile sizes that spill to LPDDR5 or fail to maximize arithmetic intensity.
    **The Rationale:** Candidates do not verify the specific SRAM capacity of the hardware, or they fail to account for the unique tiling strategy required by Grouped-Query Attention (GQA).
    **The Consequence:** The model defaults to costly off-chip DRAM accesses, destroying the performance benefits of Flash Attention.
  napkin_math: |
    1. **Assumptions & Constraints:** Sequence=2048, heads=16, head_dim=64, FP16 precision (2 bytes per element), usable SRAM budget for one attention kernel tile ~= 2MB.
    2. **Calculations:** Hidden size = 16 * 64 = 1024. Each full Q, K, or V tensor is 2048 * 1024 * 2 bytes = 4,194,304 bytes (~4.0 MiB). Standard attention also materializes scores: 16 heads * 2048 query positions * 2048 key positions * 2 bytes = 134,217,728 bytes (~128 MiB). Candidate tile Bq=128, Bkv=256 uses Q 128*1024*2 = 256 KiB, K 256*1024*2 = 512 KiB, V 512 KiB, scores 16*128*256*2 = 1024 KiB when all heads are processed together, plus output/state ~= 256 KiB, for about 2.25 MiB. That exceeds a 2MB budget, so use Bq=64, Bkv=256: scores drop to 512 KiB and the working set is about 1.5 MiB. Score/working-buffer savings versus standard attention are about 128 MiB - 1.5 MiB = 126.5 MiB, or 126.5 / 128 ~= 98.8%.
    3. **Conclusion & Interpretation:** **Result: SRAM-Tile-Bound.** A 64x256 tile fits the stated 2MB SRAM budget with margin and avoids materializing the ~128 MiB standard attention score buffer, replacing it with roughly 1.5 MiB of active tile state and saving about 98.8% of that buffer memory.
