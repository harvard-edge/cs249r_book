title: TPU Kernel Fusion Limits
scenario: You are optimizing an on-device LLM for a mobile TPU with 8 MB internal SRAM. During ahead-of-time compilation, the compiler encounters a dense linear layer requiring 3.75 GOPs followed by a custom activation. The intermediate tensor produced is 18 MB. The compiler decides not to fuse these operations.
question: How would you explain the hardware constraints driving this compiler behavior and calculate the theoretical compute time for the linear layer?
details:
  realistic_solution: The framework compiler rejects the fusion because the 18 MB intermediate tensor exceeds the TPU's 8 MB internal SRAM capacity. Edge ML accelerators require intermediate fused states to fit entirely within on-chip memory to sustain high throughput and prevent stalling the compute units. Consequently, the compiler is forced to split the operators and materialize the 18 MB tensor in the slower 12 GB LPDDR5X memory.
  common_mistake: |
    **The Pitfall:** Assuming operator fusion is always universally optimal.
    **The Rationale:** Candidates often think operator fusion always works, ignoring the strict on-chip SRAM capacity limits of edge TPUs.
    **The Consequence:** They fail to realize that exceeding SRAM forces the compiler to spill intermediate states to slow main memory, crushing throughput.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Hardware: Mobile TPU (7.5 TOPS, 8 MB internal SRAM).
       - Intermediate Tensor Size: 18 MB.
       - Compute Workload: 3.75 GOPs.
    2. **Calculations:**
       - Theoretical compute time = 3.75 GOPs / 7500 GOPs/sec = 0.5 ms.
       - Fusion capacity deficit = 18 MB (required) - 8 MB (SRAM available) = +10 MB.
    3. **Conclusion & Interpretation:**
       **Result: Memory-Capacity Bound. Because the 18 MB intermediate tensor exceeds the 8 MB SRAM capacity, fusion fails, forcing an expensive LPDDR5X write penalty.**
