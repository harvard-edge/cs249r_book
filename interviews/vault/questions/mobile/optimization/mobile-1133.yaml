title: Designing a Distillation Pipeline for the A17 Pro Neural Engine
scenario: Your team needs to deploy a large language model to run locally on an Apple Neural Engine. The original teacher model is 14B parameters, which vastly exceeds the memory and thermal budgets.
question: How should a distilled LLM student be trained and sized to fit mobile memory, latency, and power constraints?
details:
  realistic_solution: The optimal design pairs sequence-level knowledge distillation with selective logit matching to train a heavily optimized student model, roughly 1.5B-2B parameters, tailored for the Apple Neural Engine execution path. Train the student on teacher-generated rationales and final answers, add logit matching on representative prompts, then quantization-aware tune or carefully calibrate for INT4. Architecturally, use grouped-query attention and a mobile-friendly hidden size/layer count so the weights, KV cache, activations, and runtime arenas stay inside a 2-3 GB ML working set while leaving most of the 8 GB unified memory for the OS, GPU, and apps.
  common_mistake: |
    **The Pitfall:** Proposing pure feature distillation without tailoring the student architecture to NPU constraints.
    **The Rationale:** Candidates forget the 8 GB unified memory is shared with the OS, GPU, and background apps, assuming the full memory is available for the model.
    **The Consequence:** The resulting model causes inefficient memory access patterns, aggressive OS eviction, and fails latency targets.
  napkin_math: |
    **Assumptions & Constraints:**
    - 8 GB unified memory is shared with OS, GPU, and apps; target a 2-3 GB ML working set.
    - 2B parameter student model in INT4.
    - Example student architecture: 24 layers, hidden size 2048, grouped-query attention with 8 KV heads at head dimension 128.
    - KV cache uses FP16 keys and values for a 2048-token context.

    **Calculations:**
    - Weight footprint = 2B parameters * 0.5 bytes = 1 GB.
    - KV per token = 24 layers x 2 tensors x 8 KV heads x 128 dims x 2 bytes = 98,304 bytes, or about 96 KB/token.
    - KV cache at 2048 tokens = 98,304 bytes/token x 2048 = about 201 MB.
    - Weights + KV = about 1.2 GB before activations, runtime arenas, and tokenizer buffers.
    - Decode compute per token is roughly 2 ops per parameter = 2B x 2 = 4 GOP/token.
    - At 25 tokens/sec, compute demand = 4 GOP/token x 25 token/sec = 100 GOP/s = 0.1 TOPS.

    **Conclusion & Interpretation:**
    - **Result: ~1.2 GB Weights+KV and ~0.1 TOPS Arithmetic at 25 tok/s**. The student size is plausible, but the deployment budget must still reserve memory and power for activations, runtime overhead, and unsupported graph partitions.
