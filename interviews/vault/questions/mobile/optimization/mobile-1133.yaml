title: Designing a Distillation Pipeline for A17 Pro NPU
scenario: Your team needs to deploy a large language model to run locally on an Apple Neural Engine. The original teacher model is 14B parameters, which vastly exceeds the memory and thermal budgets.
question: How should a distilled LLM student be trained and sized to fit mobile memory, latency, and power constraints?
details:
  realistic_solution: 'The optimal design pairs sequence-level knowledge distillation with selective logit matching to train a heavily optimized student model (e.g., 1.5B - 2B parameters) tailored for the NPU. The student should use grouped-query attention and be quantized to INT4 post-distillation. This ensures the model weights and KV cache fit comfortably within a safe 2-3 GB memory footprint, leaving the rest of the 8 GB shared memory for the system, while easily meeting latency goals on the 16-core NPU.'
  common_mistake: |
    **The Pitfall:** Proposing pure feature distillation without tailoring the student architecture to NPU constraints.
    **The Rationale:** Candidates forget the 8 GB unified memory is shared with the OS, GPU, and background apps, assuming the full memory is available for the model.
    **The Consequence:** The resulting model causes inefficient memory access patterns, aggressive OS eviction, and fails latency targets.
  napkin_math: |
    **Assumptions & Constraints:**
    - 8 GB unified memory budget (shared with OS).
    - 2B parameter student model in INT4.
    - KV cache for 2048-token context.

    **Calculations:**
    - Weight footprint = 2B parameters * 0.5 bytes = 1 GB.
    - KV cache = ~200 MB.
    - Total Footprint = 1.2 GB (fits easily in 8 GB).
    - Compute per token = ~4 Giga-operations (GOPS).
    - Compute at 25 tokens/sec = 100 GOPS (0.1 TOPS).

    **Conclusion & Interpretation:**
    - **Result: 1.2 GB footprint and 0.1 TOPS required (Memory Capacity-Bound).**
