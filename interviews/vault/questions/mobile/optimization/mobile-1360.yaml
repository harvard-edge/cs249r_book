title: Calculate 2:4 Structured Sparsity Speedup on Tensor G3
scenario: You are deploying a quantized on-device LLM. The model currently requires 10 GB of available memory and runs at 3.5 TOPS, underutilizing the NPU due to memory bandwidth bottlenecks. Linear layers account for 80% of both model parameters and operations. You apply a natively supported 2:4 structured sparsity pattern to the linear layers.
question: How does 2:4 structured sparsity change memory footprint and workload-effective TOPS for this LLM deployment?
details:
  realistic_solution: Implement 2:4 structured sparsity to alleviate memory bandwidth contention in the linear layers. Because the prompt states that linear layers are 80% of both parameters and operations, their 8 GB footprint falls to 4 GB while the remaining 2 GB is unchanged, giving 6 GB total memory. For throughput, the targeted 80% of work runs 2x faster and the remaining 20% is unchanged, so the workload speedup is 1 / (0.8 / 2 + 0.2) = 1.67x and the effective throughput rises from 3.5 TOPS to about 5.83 TOPS.
  common_mistake: |
    **The Pitfall:** Assuming unstructured sparsity or uniform 50% sparsity across the entire model.
    **The Rationale:** Candidates forget that 2:4 structured sparsity requires specific hardware support to skip computations.
    **The Consequence:** They mistakenly assume a proportional 2x speedup and memory reduction everywhere, failing to realize it only applies to targeted linear layers.
  napkin_math: |
    **Assumptions & Constraints:**
    - Initial Memory: 10 GB. Initial Compute: 3.5 TOPS.
    - Linear layers comprise 80% of the model's parameters and operations.
    - 2:4 structured sparsity reduces targeted weight footprint by 50% and doubles compute throughput for those layers.

    **Calculations:**
    - Linear memory: 10 GB * 0.8 = 8 GB. Non-linear memory: 10 GB * 0.2 = 2 GB.
    - New linear memory: 8 GB / 2 = 4 GB.
    - Total new memory: 4 GB + 2 GB = 6 GB.
    - Workload speedup = 1 / ((0.8 / 2) + 0.2) = 1 / 0.6 = 1.67x.
    - New workload-effective throughput = 3.5 TOPS * 1.67 = 5.83 TOPS.

    **Conclusion & Interpretation:**
    - **Result: 6 GB Memory, 5.83 TOPS Effective Throughput**.
