title: 'The Operator Fusion Fallacy'
scenario: Your team is deploying a new Transformer-based model to an Android phone using the Snapdragon 8 Gen 3 Hexagon NPU. systrace analysis reveals that although individual NPU operations are fast, the end-to-end latency is poor. The trace shows a pattern of many short, high-frequency NPU dispatches with significant idle gaps in between. A junior engineer proposes quantizing the model more aggressively, from INT8 down to INT4, arguing that making each mathematical operation faster will reduce the overall latency.
question: Why is aggressive quantization from INT8 to INT4 likely to fail to improve latency here, and what is the true underlying system bottleneck?
details:
  realistic_solution: 'The proposal is flawed because the bottleneck is not compute speed; it is dispatch overhead. Each call from the CPU to the NPU incurs a fixed latency cost for context switching, driver interaction, and data marshalling. For a Transformer with many small, sequential operations, this dispatch tax is paid for every single layer or operation that isn''t fused. Making the compute faster with INT4 quantization only shortens the time the NPU is busy, which makes the fixed dispatch overhead a larger percentage of the total time for each call. The true solution is Operator Fusion. The ML compiler (e.g., via the device delegate) must be capable of analyzing the graph, identifying sequential operations (like MatMul -> Add -> LayerNorm), and compiling them into a single, monolithic kernel. This single kernel is dispatched once, amortizing the dispatch overhead over a much larger chunk of computation and allowing the NPU to stay busy without constant CPU intervention.'
  common_mistake: |
    **The Pitfall:** Believing that faster individual operations directly translate to lower end-to-end latency.
    **The Rationale:** Candidates focus on the compute part of latency and ignore the dominant CPU-to-NPU dispatch overhead.
    **The Consequence:** They spend time aggressively quantizing, which paradoxically can increase overhead percentage, instead of addressing kernel fusion.
  napkin_math: |
    **Assumptions & Constraints:**
    - Unfused dispatch overhead: 30µs.
    - INT8 compute: 30µs.
    - INT4 compute: 15µs.

    **Calculations:**
    - Unfused INT8 latency = 3 * (30µs dispatch + 30µs compute) = 180µs.
    - Unfused INT4 latency = 3 * (30µs dispatch + 15µs compute) = 135µs (overhead is 66%).
    - Fused INT8 latency = 1 * 30µs dispatch + 90µs compute = 120µs.
    - Fused INT4 latency = 1 * 30µs dispatch + 45µs compute = 75µs.

    **Conclusion & Interpretation:**
    - **Result: 120µs vs 135µs (Overhead-Bound)**. The unfused INT4 approach (135µs) is slower than the fused INT8 approach (120µs), proving fusion is the critical optimization.
