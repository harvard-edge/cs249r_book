title: Dual-Core NPU Scheduling Bottleneck Analysis
scenario: You are optimizing the execution order of a two-branch neural network on the Samsung Exynos 2400 NPU. When you schedule two parallel convolution operators to run simultaneously on both NPU cores, the total execution time is slower than scheduling them sequentially on a single core.
question: How would you analyze why this scheduling choice degrades performance on this specific architecture?
details:
  realistic_solution: 'Parallel operator scheduling doubles the instantaneous memory bandwidth requirement. The concurrent memory requests from both NPU cores saturate the available shared LPDDR5X bus, causing severe memory stalls that completely erase the benefits of parallel compute execution.'
  common_mistake: |
    **The Pitfall:** Assuming NPU synchronization overhead or framework dispatch latency is the primary issue.
    **The Rationale:** Candidates fail to identify that the shared LPDDR5X memory architecture creates a severe bandwidth bottleneck.
    **The Consequence:** Optimizing framework code instead of restructuring memory accesses, leaving the performance degradation unsolved.
  napkin_math: |
    **Assumptions & Constraints:**
    - NPU Compute per Core: 17.35 TOPS.
    - Operator Memory Requirement: 5 MB each.
    - Effective Bandwidth Quota: ~30 GB/s.

    **Calculations:**
    - Operator Compute Time: 1.735 Tera-ops / 17.35 TOPS = 0.1 ms.
    - Parallel Memory Demand: 10 MB in 0.1 ms = 100 GB/s sustained bandwidth required.
    - Actual Transfer Time at 30 GB/s: 10 MB / 30 GB/s = ~0.33 ms.

    **Conclusion & Interpretation:**
    - **Result: 0.33 ms memory latency vs 0.1 ms compute (Memory-Bandwidth Bound)**. The concurrent operators saturate the shared LPDDR bus, creating extreme memory stalls that negate the dual-core compute advantage.
