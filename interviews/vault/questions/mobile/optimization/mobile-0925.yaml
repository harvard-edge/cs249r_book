title: 'Kernel Fusion: Recall — What is Operator Fusion on Neural Engines?'
scenario: On an A17 Pro, you are optimizing a mobile transformer model.
question: What is operator fusion on the A17 Pro Neural Engine, and which mobile transformer operations
  are commonly fused?
details:
  realistic_solution: 'Core ML compiler automatically fuses compatible operations into single Neural Engine
    invocations. The Neural Engine is fixed-function; Core ML abstracts this via its IR. Common fusions:
    Conv+BN+ReLU, Linear+GELU, Softmax+Top-K.'
  common_mistake: '**The Pitfall:** Thinking the developer must manually write fused kernels for the Neural
    Engine.

    **The Rationale:** Confusing the fixed-function Neural Engine compiler (Core ML) with programmable
    GPU kernels.

    **The Consequence:** Wasting engineering effort attempting to write manual Metal kernels when the
    Core ML compiler automatically fuses compatible operations.

    '
  napkin_math: "1. **Assumptions & Constraints:**\n   - A17 Pro Peak Compute: 35 TOPS.\n   - Memory Bandwidth:\
    \ 68 GB/s.\n   - 1B LLM Token Embedding: 4096 * 4B = 16 KB.\n   - Metal kernel launch overhead: ~10µs\
    \ per launch.\n2. **Calculations:**\n   - Ridge point: 35 TOPS / 68 GB/s = 515 OPS/byte.\n   - Elementwise\
    \ op: 1 OP/byte (memory-bound, 515x below ridge).\n   - Unfused (5 ops): 5 * 16 KB = 80 KB read/write.\
    \ Fused: 16 KB read/write.\n   - Total launch overhead (5 ops, 200 layers): 1000 launches * 10µs =\
    \ 10ms. Fused (1 op): 200 launches * 10µs = 2ms.\n3. **Conclusion & Interpretation:**\n   - **Result:\
    \ Overhead-Bound. Fusing 5 ops over 200 layers saves 8ms per token in launch overhead alone, dramatically\
    \ improving decoding speed.**\n"
