title: Operator Fusion on Mobile Neural Engines
scenario: On an A17 Pro, you are optimizing a mobile transformer model.
question: What is operator fusion on the A17 Pro Neural Engine, and which transformer operations are commonly fused?
details:
  realistic_solution: Core ML compiler automatically fuses compatible operations into single Neural Engine invocations. The Neural Engine is fixed-function; Core ML abstracts this via its IR. Common transformer fusions include Linear+bias+GELU, Q/K/V projection packing, attention score scaling+masking+softmax, and softmax+Top-K when shapes and precision are supported.
  common_mistake: |
    **The Pitfall:** Thinking the developer must manually write fused kernels for the Neural Engine.
    **The Rationale:** Confusing the fixed-function Neural Engine compiler (Core ML) with programmable GPU kernels.
    **The Consequence:** Wasting engineering effort attempting to write manual Metal kernels when the Core ML compiler automatically fuses compatible operations.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Operator fusion combines compatible adjacent graph operations into one compiler-scheduled Neural Engine invocation.
       - The main benefit is fewer intermediate tensors, fewer memory round trips, and fewer dispatch boundaries.
    2. **Calculations:**
       - No TOPS or bandwidth calculation is needed for this recall question.
       - Example: Linear -> bias add -> GELU can avoid materializing separate intermediate tensors between each operation.
       - Example: Conv -> batch norm -> ReLU can be compiled as one fused operation when shapes and precision are compatible.
    3. **Conclusion & Interpretation:**
       - **Result: Fewer Intermediate Operations.** Fusion improves mobile inference by reducing graph overhead and memory traffic, but the exact speedup depends on compiler support, tensor shapes, precision, and placement on the Neural Engine.
