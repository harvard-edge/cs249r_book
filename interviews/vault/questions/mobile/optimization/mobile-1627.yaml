title: Pruning for On-Device LLM Inference on Samsung Exynos 2400 NPU
scenario: A 10B parameter model must be pruned to run on a Samsung Exynos 2400 NPU (34.7 TOPS, 12 GB RAM). Original weights are FP16.
question: How do structured vs unstructured pruning methods align with the NPU's processing capabilities and memory bandwidth?
details:
  realistic_solution: A realistic solution would involve a hybrid approach. Start with structured pruning (e.g., channel pruning, block sparsity like 2:4 or 4:8) where possible, as these patterns are typically hardware-friendly for NPUs like the Exynos 2400. Profile the NPU's performance with different structured sparsity levels to identify the sweet spot where compute reduction directly translates to latency improvement without significant accuracy drop. For remaining model components or when finer-grained sparsity is absolutely necessary for accuracy recovery, consider using unstructured pruning followed by a sparsity-aware quantization scheme and a specialized runtime that can exploit irregular sparsity without incurring excessive overhead. Leveraging the 12GB LPDDR5X memory, also consider the memory access patterns of different pruning strategies and their impact on memory bandwidth utilization.
  common_mistake: |
    **The Pitfall:** Aggressively applying unstructured pruning for maximum parameter reduction.
    **The Rationale:** Candidates assume that simply reducing non-zero values mathematically equates to faster inference.
    **The Consequence:** Irregular sparse matrices cause cache misses and dynamic indexing overhead, completely nullifying the NPU's matrix-multiply acceleration.
  napkin_math: |
    - **Unpruned Model:** 10B * 2 bytes = 20 GB (Exceeds 12 GB RAM).
    - **Unstructured 50%:** Fits in 10 GB, but unstructured memory loads remain highly inefficient on rigid NPU architectures.
    - **Structured 50% (e.g., 2:4 block):** Physically removes contiguous data, dropping memory to 10 GB while allowing linear, perfectly cache-aligned reads.
    - **Final Result:** **Structured pruning cuts both memory and effective compute by exactly 50%, translating directly into sustained TOPS performance.**
