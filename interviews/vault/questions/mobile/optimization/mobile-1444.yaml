title: Exynos 2400 NPU Operator Lowering Tradeoffs
scenario: You are compiling an autoregressive vision-language model for the Samsung Exynos 2400 NPU. The system has a dual-core NPU capable of 34.7 TOPS, but its 12 GB LPDDR5X memory is shared across the CPU, GPU, and ISP. During ahead-of-time compilation, several novel attention operators fail to lower to the NPU and trigger CPU fallbacks.
question: How should unsupported attention operators be lowered or refactored for Exynos 2400 NPU delegation to prevent severe memory bandwidth bottlenecks?
details:
  realistic_solution: The ideal approach is to use graph optimization passes, like constant folding and operator fusion, to rewrite the unsupported attention mechanisms into standard matrix multiplications and supported activations. If a fallback is strictly required, the compiler must cluster CPU-bound operations to minimize context switching. The engineer should evaluate the cost of transferring intermediate tensors through the shared memory against the compute latency of the 34.7 TOPS NPU.
  common_mistake: |
    **The Pitfall:** Accepting CPU fallbacks without calculating the massive synchronization and memory transfer costs.
    **The Rationale:** Engineers often rely on automated compiler fallbacks to guarantee execution, failing to recognize that bouncing activations between the NPU and CPU over a shared memory bus destroys performance.
    **The Consequence:** The model experiences extreme latency degradation due to memory starvation, completely nullifying the 34.7 TOPS NPU advantage.
  napkin_math: |
    **Assumptions & Constraints:**
    - Effective Bandwidth: ~34 GB/s available to the NPU.
    - NPU Compute: 34.7 TOPS.
    - Activation Tensor Size: 20 MB per fallback.
    - Fallbacks required: 15.

    **Calculations:**
    - CPU Fallback Cost: 20 MB / 34 GB/s = ~0.6 ms.
    - Total Overhead: 15 fallbacks * 0.6 ms = 9 ms pure memory latency per inference.
    - Lost Compute: In 9 ms, a 34.7 TOPS NPU could have executed ~312 billion operations.

    **Conclusion & Interpretation:**
    - **Result: 9 ms overhead (Memory-Bound)**. Bouncing activations between the CPU and NPU over the shared bus destroys performance; graph rewriting is strictly necessary.
