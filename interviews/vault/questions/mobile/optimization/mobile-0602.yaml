title: The Speculative Speedup
scenario: You're deploying an INT4-quantized 7B LLM. The token rate is only ~10 tokens/sec. A colleague proposes implementing speculative decoding using a small 100M parameter draft model. The draft model generates 4 tokens that are accepted by the main model 75% of the time.
question: Why can speculative decoding speed up a mobile 7B LLM despite adding a second draft model?
details:
  realistic_solution: Speculative decoding directly circumvents the 'Memory Wall'. During autoregressive generation, single-batch token generation is fundamentally memory-bandwidth bound because each token requires streaming the entire 7B parameter weight matrix from slow DRAM. Speculative decoding allows the primary model to verify multiple draft tokens in a single forward pass, essentially executing batched verification. This transforms repeated memory-bound operations into a single compute-dense operation.
  common_mistake: |
    **The Pitfall:** Assuming that introducing a second model will strictly increase latency due to the additional FLOPs overhead.
    **The Rationale:** Engineers view LLMs identically to CNNs, assuming they are strictly compute-bound and that more operations identically equal higher latency.
    **The Consequence:** They completely discard speculative decoding, missing out on massive throughput multipliers achievable by optimizing for memory bandwidth rather than raw compute.
  napkin_math: |
    **Assumptions & Constraints:**
    - Memory bandwidth: ~77 GB/s.
    - 7B INT4 Model footprint: 3.5 GB.
    - 100M INT4 Draft model footprint: 50 MB.
    - Speculative batch size: 4 tokens.
    - Acceptance rate: 75%.

    **Calculations:**
    - Max theoretical single-token TPOT: 77 GB/s / 3.5 GB = 22 tokens/sec.
    - Draft generation cost: 4 * (50 MB / 77 GB/s) = ~2.6 ms.
    - Verification cost (batched pass): 3.5 GB / 77 GB/s = ~45 ms.
    - Accepted tokens per pass: 4 tokens * 0.75 = 3 tokens.

    **Conclusion & Interpretation:**
    - **Result: Memory-Bound Optimization**. By verifying multiple tokens in a single 45ms weight-streaming pass, speculative decoding exploits excess compute to mask memory bottlenecks, tripling observed throughput.
