title: The Operator Gap
scenario: You are deploying a model to a mobile NPU. The math should only take 10ms, but the actual inference latency is 15ms. You find two unsupported operators in your graph.
question: Based on the DMA flow, why do two unsupported ops cause a 50% latency penalty in a mobile NPU deployment?
details:
  realistic_solution: You are hitting graph partitioning overhead. The two unsupported operators split the graph into NPU and CPU islands, so tensors have to round-trip through DMA and synchronization barriers instead of staying resident on the NPU. The observed increase is 15ms - 10ms = 5ms, which is a 50% penalty relative to the 10ms NPU-only target. The fix is to eliminate partition boundaries by replacing unsupported ops with supported approximations or static-shape equivalents so the graph can execute as one delegated subgraph.
  common_mistake: |
    **The Pitfall:** Blaming the hardware and assuming the NPU is simply too slow for the model.
    **The Rationale:** Candidates see the high latency and assume compute limitation, rather than analyzing the graph execution trace.
    **The Consequence:** Attempting to use a drastically smaller model instead of fixing the graph partitioning overhead by substituting unsupported ops.
  napkin_math: |
    **Assumptions & Constraints:**
    - NPU expected inference: 10ms. Actual inference: 15ms.
    - 2 unsupported operators force NPU-CPU DMA fallback.

    **Calculations:**
    - Observed penalty: 15ms - 10ms = 5ms.
    - Relative penalty: 5ms / 10ms = 50%.
    - Approximate per-op round-trip cost: 5ms / 2 unsupported ops = 2.5ms per NPU-CPU-NPU fallback.

    **Conclusion & Interpretation:**
    - **Result: 5ms penalty from graph partitioning and synchronization.** The extra latency is a 50% slowdown relative to the 10ms NPU-only baseline and comes from DMA ping-pong plus CPU/NPU barriers around unsupported operators, not from the NPU's math throughput.
