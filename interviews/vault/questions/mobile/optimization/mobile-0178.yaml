title: 'The Fusion Overhead Tax'
scenario: 'You''re optimizing a vision model on a smartphone. A profiler shows two sequential operators, a 2D convolution and a ReLU, are taking up a significant portion of your latency budget. The intermediate activation tensor between them is 1 MB. The Conv compute takes 1.0 ms and the ReLU compute takes 0.1 ms. The phone''s SoC has LPDDR5 memory with a bandwidth of 51.2 GB/s.'
question: 'What percent overhead does an unfused Conv-ReLU memory roundtrip add for a 1 MB tensor at 51.2 GB/s?'
details:
  realistic_solution: |
    In the unfused case, the 1 MB intermediate tensor must be written to LPDDR5 DRAM and then read back by the next operator. In the fused case, the intermediate result stays in the NPU's much faster local SRAM, making the memory transfer time negligible.
  common_mistake: |
    **The Pitfall:** Focusing only on raw compute time and assuming memory access is free.
    **The Rationale:** Engineers forget that reading and writing even 1 MB of intermediate tensors to main memory constitutes a "tax" on latency.
    **The Consequence:** They underestimate latency overhead and miss critical opportunities for kernel fusion.
  napkin_math: |
    **Assumptions & Constraints:**
    - Intermediate tensor: 1 MB.
    - Bandwidth: 51.2 GB/s.
    - Compute time: 1.0 ms (Conv) + 0.1 ms (ReLU) = 1.1 ms.

    **Calculations:**
    - Memory traffic = 1 MB write + 1 MB read = 2 MB.
    - Transfer time = 2 MB / 51.2 GB/s = ~0.039 ms.
    - Overhead = 0.039 ms / 1.1 ms = ~3.5%.

    **Conclusion & Interpretation:**
    - **Result: 3.5% overhead (Memory-Bandwidth-Bound)**. Fusion saves a DRAM write/read roundtrip.
  options:
  - '~1.7% overhead. Fusion saves writing the intermediate tensor to DRAM.'
  - '0% overhead. The memory access time is negligible compared to compute.'
  - '~3.5% overhead. Fusion saves a DRAM write/read roundtrip.'
  - '~22% overhead. The memory bandwidth is the main bottleneck.'
  correct_index: 2
