title: Battery-Aware Sensor Batching
scenario: A smartwatch continuously monitors accelerometer data at 50Hz (every 20ms) to detect falls. A 2MB MLP runs on the CPU. Waking the CPU takes 15ms, and unbatched inference takes 2ms.
question: What sensor batching window minimizes smartwatch CPU duty cycle while preserving fall detection within a 1000ms SLA?
details:
  realistic_solution: |
    Use the largest batching window whose worst-case detection latency remains below the 1000ms SLA. With a full-window batching policy, an 800ms buffer holds 40 samples at 50Hz. One wake plus vectorized batch inference adds 23ms, for 823ms worst-case latency, while reducing CPU active time to 28.75ms per second. A larger 1000ms window would violate the SLA once wake and compute time are included, so 800ms is the best safe window among these coarse batching choices.
  common_mistake: |
    **The Pitfall:** Decreasing the sensor sampling frequency.
    **The Rationale:** Candidates assume that running the sensor slower is the only way to save battery, missing the power of batching and vectorization.
    **The Consequence:** Lowering the frequency destroys the model's ability to capture the high-frequency accelerometer signatures required to detect a fall accurately.
  napkin_math: |
    **Assumptions & Constraints:**
    - Sensing: 50Hz (20ms interval).
    - SLA: 1000ms.
    - Costs: 15ms wake, 2ms compute/sample.

    **Calculations:**
    - Unbatched Duty Cycle: 50 * (15+2)ms = 850ms active/sec (85%).
    - Candidate buffer window: 800ms = 0.8s * 50 samples/s = 40 samples.
    - Full-window detection latency: 800ms buffer + 15ms wake + 8ms vectorized batch compute = 823ms (<1000ms SLA).
    - Batch frequency: 1 / 0.8s = 1.25 wakeups/sec.
    - Batched Duty Cycle: 1.25 * (15+8)ms = 28.75ms active/sec = 2.875%.
    - A 1000ms buffer would require 1000ms + wake + compute, exceeding the SLA.

    **Conclusion & Interpretation:**
    - **Result: 800ms Window.** Batching reduces the CPU duty cycle from 85% to about 2.9% while safely meeting the 1-second detection SLA under a full-window batching policy.
