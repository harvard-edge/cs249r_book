title: Building a Hardware-Adaptive Inference Engine
scenario: You're building a mobile ML inference engine that must run the same model optimally across multiple SoCs. Each SoC has different operator support, memory hierarchies, and optimal data layouts.
question: How would you design a cross-platform inference engine that automatically adapts to each SoC's strengths without maintaining 5 separate model variants?
details:
  realistic_solution: |
    Design an Ahead-of-Time (AOT) to Just-in-Time (JIT) pipeline. Compile the model to a portable intermediate representation (e.g., MLIR/TensorIR). At first launch on-device, run a device-specific compiler pass to execute micro-benchmarks, build operator fusion plans, select optimal data layouts (NHWC vs NCHW), and partition across NPU/GPU using a latency LUT. Cache the compiled plan for 5ms reload on subsequent launches.
  common_mistake: |
    **The Pitfall:** Relying purely on generic runtimes and expecting optimal performance.
    **The Rationale:** Developers prioritize portability and developer experience over squeezing every drop of performance out of the silicon.
    **The Consequence:** Leaving 2-5x speedups on the table by missing SoC-specific operator fusions and memory layouts.
  napkin_math: |
    **Assumptions & Constraints:**
    - 5 Target SoCs
    - Generic IR Size: 15 MB
    - Platform-specific binary size: 15 MB each

    **Calculations:**
    - Shipping all binaries: 5 * 15 MB = 75 MB
    - Shipping Unified IR: 15 MB
    - Storage Savings: 75 MB - 15 MB = 60 MB

    **Conclusion & Interpretation:**
    - **Result: 60 MB (Storage and Compilation-Bound)**. Unified IR saves 60 MB storage while allowing JIT performance tuning.
