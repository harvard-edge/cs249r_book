title: 'Kernel Fusion: Realize Bandwidth Savings from Fusing Transformer Block on Snapdragon'
scenario: 'You need to realize bandwidth savings from fusing post-attention operations on a Snapdragon 8 Gen 3 for a 1B parameter model decode (batch=1). The operator sequence is: attention output -> Linear -> RMSNorm -> residual add -> gate.'
question: How much memory bandwidth does fusing post-attention operations save for a 1B decode block on Snapdragon 8 Gen 3?
details:
  realistic_solution: Calculate the activation IO saved by removing intermediate tensors, then compare it with the weight IO for the linear/gate matrices in this block. At batch=1 decode, a 4096-element FP16 activation is only 8KB. Fusing the post-attention chain removes reads and writes of those small intermediate vectors, but it does not remove the tens of MB of weight traffic for the linear and gate projections. The bandwidth saving is therefore on the order of tens to hundreds of KB per block, useful for launch reduction but negligible as a share of block memory traffic.
  common_mistake: |
    **The Pitfall:** Assuming kernel fusion universally delivers massive speedups, treating batch=1 inference identically to batch=128 training.
    **The Rationale:** Failing to physically separate the bandwidth cost of loading activations from the cost of loading network weights.
    **The Consequence:** Burning weeks of engineering effort writing custom fused Hexagon kernels that ultimately yield less than a 1% latency improvement.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: 1B parameters, hidden dim 4096 (batch=1).
    - Sequence operations: 7 distinct post-attention kernels, creating 6 intermediate activation tensors between kernels.
    - Memory Bandwidth: ~68 GB/s.

    **Calculations:**
    - One FP16 activation tensor: 4096 * 2B = 8192 bytes = 8 KiB.
    - Avoided intermediate traffic: each of 6 intermediate tensors would be written once and read once, so 6 * 2 * 8 KiB = 96 KiB saved.
    - Saved latency at peak bandwidth: 96 KiB / 68 GB/s = ~0.0014 ms.
    - Included weights for this block subset: two 4096x4096 INT8 projection matrices for Linear + Gate = 2 * 4096 * 4096 * 1B = 32 MiB.
    - Weight latency for those projections: 32 MiB / 68 GB/s = ~0.49 ms.
    - Activation traffic share saved: 96 KiB / (32 MiB + 96 KiB) = ~0.3%.

    **Conclusion & Interpretation:**
    - **Result: ~96 KiB saved per block (~0.0014 ms at peak bandwidth).** The direct bandwidth saving is about 0.3% of the Linear+Gate block traffic; most benefit from this fusion would come from fewer launches and less scheduling overhead, not reduced DRAM bytes.
