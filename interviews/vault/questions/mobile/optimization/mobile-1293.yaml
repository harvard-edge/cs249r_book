title: 'Heterogeneous Pipelining on Snapdragon 8 Gen 3'
scenario: 'You are deploying a real-time 30 FPS video segmentation pipeline on a device powered by the Qualcomm Hexagon NPU. The graph consists of a heavy INT8 CNN backbone and a custom FP16 attention-based post-processing head. You are evaluating two operator scheduling alternatives: Strategy A schedules all operators sequentially. Strategy B partitions the graph, aggressively fusing the INT8 backbone on the NPU and pipelining the FP16 head asynchronously on the GPU, utilizing shared LPDDR5X memory for data handoffs.'
question: 'Should a 30 FPS segmentation graph run the FP16 head on CPU sequentially or pipeline it on GPU?'
details:
  realistic_solution: |
    Strategy B is the correct approach for an L5 engineer. The architecture utilizes a shared 12-16 GB LPDDR5X memory pool, meaning the NPU and GPU can pass intermediate tensors via zero-copy pointers rather than expensive memory copies. By pipelining the execution, the NPU can process frame N+1 while the GPU simultaneously processes the FP16 head for frame N. This hides latency and maximizes hardware utilization.
  common_mistake: |
    **The Pitfall:** Overestimating synchronization penalties between heterogeneous compute units.
    **The Rationale:** Candidates prefer sequential execution (Strategy A) to avoid complexity, failing to realize that dense FP16 operations on the CPU will severely bottleneck the pipeline.
    **The Consequence:** The system misses the real-time 30 FPS target due to CPU bottlenecking.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target: 30 FPS (33.3 ms/frame).
    - NPU INT8 latency: ~30 ms.
    - CPU FP16 latency: ~25 ms.
    - GPU FP16 latency: ~15 ms.

    **Calculations:**
    - Strategy A (Sequential): 30 ms + 25 ms = 55 ms per frame -> 18 FPS.
    - Strategy B (Pipelined): max(30 ms, 15 ms) = 30 ms per frame -> 33.3 FPS.

    **Conclusion & Interpretation:**
    - **Result: 33.3 FPS (Compute-Bound)**. Pipelining successfully hides latency and meets the 30 FPS target.
