title: 'Dual-Core NPU Operator Scheduling for Memory Contention Mitigation'
scenario: 'A real-time vision model is deployed on a Samsung Exynos NPU, which features a dual-core architecture and shares 12 GB of LPDDR5X memory with the CPU, GPU, and ISP. During concurrent execution with a heavy ISP workload, the vision model experiences severe memory thrashing, dropping NPU compute utilization to just 30%.'
question: 'How should dual-core Exynos NPU operators be scheduled to reduce shared memory contention, and which operators should be parallelized?'
details:
  realistic_solution: 'Analyze the execution graph to classify operators by their arithmetic intensity. Schedule compute-bound operators in parallel across the dual cores to leverage the 34.7 TOPS capacity. Conversely, serialize the execution of memory-bound operators to constrain the peak bandwidth requirement and working set size, ensuring the ISP retains sufficient bandwidth. Apply layer fusion to intermediate operators to avoid materializing tensors to the shared memory.'
  common_mistake: |
    **The Pitfall:** Aggressively parallelizing all independent network branches across the dual-core NPU.
    **The Rationale:** Candidates assume that maximizing TOPS utilization is always the optimal strategy for performance.
    **The Consequence:** Parallel execution of memory-bound operators creates bandwidth bottlenecks in the shared LPDDR5X subsystem, exacerbating contention with the ISP and causing thrashing.
  napkin_math: |
    **Assumptions & Constraints:**
    - Dual-core Exynos NPU with 34.7 TOPS.
    - Target: 20 TOPS. Two memory-bound branches demand 4 GB/s each.

    **Calculations:**
    - Parallel execution bandwidth: 2 cores x 4 GB/s = 8 GB/s (causes thrashing).
    - Sequential execution bandwidth: 1 core active at a time = 4 GB/s.
    - Compute utilization for 20 TOPS: 20 / 34.7 = ~58%.

    **Conclusion & Interpretation:**
    - **Result: Compute Target Met (Memory-Bound)**. Serializing memory-bound operators eliminates the memory bottleneck while leaving sufficient TOPS to meet the compute target.
