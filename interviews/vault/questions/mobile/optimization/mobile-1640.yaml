title: Optimizing LLM Deployment on Snapdragon Hexagon NPU via Graph Compilation
scenario: "Your team is deploying a large language model (LLM) on a mobile device powered by a Hexagon NPU. During AOT compilation, a `CustomSwish` function (10% of 10B operations) is lowered into 5 basic INT8 ops. Concurrently, 20% of the model's original ops are removed via constant folding."
question: "How do CustomSwish lowering and constant folding change total INT8 operations and latency on the Snapdragon Hexagon NPU?"
details:
  realistic_solution: "Evaluate the net arithmetic delta on the computation graph. Calculate the expansion factor induced by breaking down the `CustomSwish` operator and subtract the total operations discarded by the constant folding pass. Despite graph optimization efforts, the architectural decision to use an unsupported custom operator dramatically increases total inference burden due to operator multiplication."
  common_mistake: |
    **The Pitfall:** Focusing only on the removed operations from constant folding and ignoring the multiplicative penalty of operator lowering.
    **The Rationale:** Candidates look for optimizations but fail to correctly quantify the expansion factor when custom operators are decomposed.
    **The Consequence:** Approving a model architecture that unexpectedly increases computational latency, missing performance SLAs in production.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Original Ops = 10 billion. NPU Peak Compute = 45 TOPS.
       - `CustomSwish` Ops = 10% of 10B = 1 billion.
       - Expansion factor = 5 ops per CustomSwish.
       - Constant Folded Ops = 20% of 10B = 2 billion.
    2. **Calculations:**
       - Lowering Penalty = 1B * 5 = 5B (Net increase = +4B ops).
       - Folding Savings = -2B ops.
       - New Total Ops = 10B + 4B - 2B = 12 billion ops.
       - Original Latency = 10B / 45 TOPS ≈ 0.22 ms.
       - New Latency = 12B / 45 TOPS ≈ 0.27 ms.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound.** Operator lowering overpowers the compiler optimizations, causing a net increase of 2 billion operations and raising theoretical latency to **0.27 ms**.
