title: CustomSwish Lowering and Constant Folding on Snapdragon Hexagon NPU
scenario: Your team is deploying a large language model (LLM) on a mobile device powered by a Hexagon NPU. During AOT compilation, a `CustomSwish` function (10% of 10B operations) is lowered into 5 basic INT8 ops. Concurrently, 20% of the model's original ops are removed via constant folding.
question: How do CustomSwish lowering and constant folding change total INT8 operations and latency on the Snapdragon Hexagon NPU?
details:
  realistic_solution: Evaluate the net arithmetic delta on the computation graph. The original graph has 10B INT8 ops, including 1B `CustomSwish` ops. Lowering replaces that 1B-op region with 5B primitive ops, adding +4B net ops, while constant folding removes 2B original ops. The compiled graph therefore has 12B ops, increasing theoretical latency on a 45 TOPS Hexagon NPU from about 0.22 ms to about 0.27 ms.
  common_mistake: |
    **The Pitfall:** Focusing only on the removed operations from constant folding and ignoring the multiplicative penalty of operator lowering.
    **The Rationale:** Candidates look for optimizations but fail to correctly quantify the expansion factor when custom operators are decomposed.
    **The Consequence:** Approving a model architecture that unexpectedly increases computational latency, missing performance SLAs in production.
  napkin_math: |
    **Assumptions & Constraints:**
    - Original Ops = 10 billion. NPU Peak Compute = 45 TOPS.
    - `CustomSwish` region = 10% of 10B = 1 billion original ops.
    - Lowering replaces each original `CustomSwish` op with 5 primitive INT8 ops.
    - Constant Folded Ops = 20% of 10B = 2 billion original ops.

    **Calculations:**
    - Lowered `CustomSwish` region = 1B * 5 = 5B primitive ops.
    - Net lowering delta = 5B replacement ops - 1B original ops = +4B ops.
    - Folding savings = -2B ops.
    - New Total Ops = 10B + 4B - 2B = 12B ops.
    - Original Latency = 10B / 45e12 ops/s = 0.000222 s = 0.22 ms.
    - New Latency = 12B / 45e12 ops/s = 0.000267 s = 0.27 ms.

    **Conclusion & Interpretation:**
    - **Result: 12B total INT8 ops and ~0.27 ms theoretical latency.** Relative to the original 10B graph, lowering plus folding creates a net increase of 2B ops, so latency rises by about 20%.
