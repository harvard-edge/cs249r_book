title: 'Kernel Fusion: Mastery — Fusion Strategy Across Heterogeneous Mobile Hardware'
scenario: 'You are deploying a 1B LLM across a heterogeneous fleet: 30% A17 Pro, 45% Snapdragon 8 Gen 3, 25% Tensor G3.'
question: How would you design a single unified model with hardware-adaptive fusion strategy that achieves 20 tokens/sec on all three platforms?
details:
  realistic_solution: |
    Ship one model architecture, one tokenizer, and one INT4 weight format, but compile or dispatch hardware-specific fused kernels behind the same graph IR. The graph marks required fusion groups: RMSNorm+linear input transform, QKV projection+RoPE packing, tiled attention/softmax/value reduction, MLP gate/up projection+SwiGLU+down projection, residual adds, and dequantize+matmul. At install time or first launch, select backend rules for ANE/Core ML, Hexagon/QNN, or Android NNAPI/vendor NPU: tile sizes, supported quantization layouts, SRAM limits, and fallback operators differ, but the semantic model remains one unified graph with backend-specific lowering.
  common_mistake: |
    **The Pitfall:** Designing a single static fusion graph across all devices.
    **The Rationale:** Assuming that an optimization strategy that works on A17 Pro translates directly to Hexagon or Tensor G3.
    **The Consequence:** Terrible performance on the non-primary target devices, missing the 20 tokens/sec requirement because of unoptimized memory access or missing operator fusions.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 1B INT4 model weights: 1B params * 4 bits = 0.5GB before scales/metadata.
       - Target: 20 tok/sec, or <= 50ms/token.
       - Use effective sustained bandwidth after kernel overhead, not peak DRAM bandwidth.
    2. **Calculations:**
       - A17 Pro effective path: 0.5GB / 25GB/s = 20ms weight stream + 8ms dequant/attention/launch overhead = 28ms/token (~36 tok/sec).
       - Snapdragon effective path: 0.5GB / 30GB/s = 16.7ms weight stream + 7ms overhead = 23.7ms/token (~42 tok/sec).
       - Tensor G3 conservative path: 0.5GB / 18GB/s = 27.8ms weight stream + 14ms overhead = 41.8ms/token (~24 tok/sec).
       - These estimates leave Tensor G3 the limiting platform; any CPU fallback in attention or MLP would exceed the 50ms/token budget.
    3. **Conclusion & Interpretation:**
       - **Result: Tensor G3 is the gating target at ~24 tok/sec.** A single INT4 model can meet 20 tok/sec only if the unified graph is lowered to fused NPU kernels on each backend and rejects or retunes shapes that would fall back to CPU.
