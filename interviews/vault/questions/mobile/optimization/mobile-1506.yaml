title: Exynos 2400 NPU Distillation Specification
scenario: Your team needs to deploy a real-time natural language query parser locally on an NPU. The device features a shared 12 GB RAM pool.
question: How would you specify distillation for an Exynos 2400 NPU-friendly student model?
details:
  realistic_solution: Specify a compact student built only from operators that compile efficiently to the Exynos 2400 NPU, such as dense/attention blocks, supported activations, layer norms, and static shapes. Train it with logit matching for parser decisions, intermediate feature distillation for semantic slots, and INT8 quantization-aware training so the deployed graph uses NPU-friendly precision without CPU fallback. Size the student to fit inside the app's share of the 12 GB RAM pool with room for tokenizer state, activations, and concurrent ISP/GPU use.
  common_mistake: |
    **The Pitfall:** Designing a student model optimized entirely for parameter reduction without validating specific NPU operator compatibility.
    **The Rationale:** Engineers prioritize arbitrary model compression techniques, totally ignoring how specific non-linear operations compile to hardware edges.
    **The Consequence:** The model falls back to the CPU, causing latency spikes and extra shared-memory traffic during concurrent ISP/GPU activity.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target RAM footprint: fit within the app's share of a 12 GB shared RAM pool.
    - Teacher Model (7B FP16): 14 GB.
    - Candidate Student Model: 300M INT8 parameters.
    - Runtime reserve for activations, tokenizer state, and workspaces: about 700 MB.
    - Practical app budget target: about 1.5 GB, leaving headroom for OS, camera, ISP, and GPU activity.

    **Calculations:**
    - Teacher footprint = 7B * 2 bytes = 14 GB, which cannot be resident on the device.
    - Student weight footprint = 300M * 1 byte = 300 MB.
    - Estimated deployed footprint = 300 MB weights + 700 MB runtime reserve = 1.0 GB.
    - Headroom against 1.5 GB target = 1.5 GB - 1.0 GB = 500 MB.

    **Conclusion & Interpretation:**
    - **Result: Memory-feasible NPU student**. Distillation should choose the largest operator-compatible INT8 student that stays under the practical memory target; latency must be confirmed with on-device benchmarks rather than TOPS division alone.
