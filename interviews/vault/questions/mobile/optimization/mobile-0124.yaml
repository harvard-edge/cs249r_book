title: The CoreML Custom Op Conversion Failure
scenario: When converting a PyTorch model with a custom `RotaryPositionEmbedding` (RoPE) layer to CoreML, it fails because `custom::rope` is unsupported.
question: Why is simply removing the RoPE layer a bad idea, and how should unsupported ops be handled in CoreML?
details:
  realistic_solution: 'Three approaches, ordered by preference: Approach 1 (decomposed): RoPE as 6 native ops per layer. ANE overhead: ~0.05ms per layer × 32 layers = **1.6ms** total. Full ANE delegation maintained. Approach 2 (custom converter): same runtime as approach 1 (converter runs at build time).  Approach 3 (MLCustomLayer): GPU dispatch per layer: 1ms × 64 calls = **64ms**. Plus ANE→GPU→ANE  transfers: 64 × 0.5ms = **32ms**. Total RoPE overhead: **96ms**.'
  common_mistake: |
    **The Pitfall:** Replacing custom attention mechanics with standard embeddings just to satisfy a compiler.
    **The Rationale:** Candidates falsely believe sinusoidal absolute embeddings are mathematically equivalent to rotary relative embeddings.
    **The Consequence:** Removing RoPE severely degrades perplexity and entirely breaks the model's ability to extrapolate to unseen sequence lengths.
  napkin_math: |
    - **Approach 1 (Decompose ops):** 6 native ops/layer * 0.05ms * 32 layers = 1.6ms ANE overhead.
    - **Approach 3 (Custom GPU layer):** GPU dispatch (64ms) + Transfers (32ms) = 96ms overhead.
    - **Final Result:** **Decomposing into native ops is ~60x faster than writing a custom GPU layer plugin.**
