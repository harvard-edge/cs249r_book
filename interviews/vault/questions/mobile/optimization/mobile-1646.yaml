title: 'Diagnosing NPU Latency on Samsung Exynos 2400: Operator Scheduling Challenges'
scenario: You are optimizing LLM inference latency on an edge NPU. Profiling reveals sub-optimal resource utilization due to issues with memory reuse, parallel operator execution, and layer fusion.
question: How would you diagnose the specific root causes of this performance bottleneck using NPU profiling tools?
details:
  realistic_solution: |
    The diagnostic process strictly demands separating computation limits from memory limits by defining the theoretical roofline lower bounds. First, calculate the theoretical pure compute time for the graph's MACs, and the pure memory transfer time for its tensor bytes. Whichever is larger represents the theoretical lower bound of the execution under perfect overlap. If your observed execution time significantly exceeds this bound, the delta precisely quantifies the latency wasted on kernel launch overhead, poor SRAM tiling (thrashing), or missed fusion passes. NPU profilers (e.g., nsys or vendor SDKs) are then used exclusively to trace these specific scheduling gaps and ensure operators form a tight, continuous execution stream without falling back to host CPU syncs.
  common_mistake: |
    **The Pitfall:** Applying general multi-threading CPU/GPU heuristics to fixed-path NPUs without modeling memory transfers.
    **The Rationale:** Candidates instinctively attempt to maximize parallelism across NPU cores, causing intermediate activations to spill back to LPDDR5X and thrashing the memory bus.
    **The Consequence:** A "parallelized" schedule that ironically runs significantly slower because LPDDR memory traffic penalties strictly dominate NPU execution delays.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - NPU Peak Compute ($C_{peak}$): e.g., 34.7 TOPS.
       - LPDDR Bandwidth ($BW_{peak}$): e.g., 60 GB/s.
       - Workload: $M$ MACs compute, $D$ bytes memory transferred.
    2. **Calculations:**
       - Minimum Compute Time: $(M \times 2) / C_{peak}$.
       - Minimum Transfer Time: $D / BW_{peak}$.
       - Theoretical Latency Bound: $\max(\text{Compute Time}, \text{Transfer Time})$.
       - Diagnostic Gap: Observed Latency - Theoretical Latency Bound.
    3. **Conclusion & Interpretation:**
       **Result: The Diagnostic Gap quantifies scheduling overhead (Scheduler-Bound).** Any latency mathematically exceeding the memory/compute bound directly isolates kernel launch delays and cache thrashing.
