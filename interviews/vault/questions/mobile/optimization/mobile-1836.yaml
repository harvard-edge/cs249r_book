title: Debugging gradient vanishing in a mobile RNN model on Snapdragon 8 Gen 3
scenario: A team trains a 3M parameter GRU-based model for time-series anomaly detection. The model processes 500-step sequences. After training for 200 epochs, the GRU's recurrent weights show near-zero gradient norms while output layer gradients are normal. Loss is decreasing but recurrent weights never update meaningfully.
question: How would you diagnose and fix vanishing recurrent gradients in a 500-step GRU trained natively on a mobile accelerator?
details:
  realistic_solution: Apply gradient clipping (e.g., `clip_grad_norm_` with max_norm=1.0) and enforce Truncated Backpropagation Through Time (TBPTT). By processing the 500 steps as 10 chunks of 50 steps and detaching the hidden state between chunks (`h.detach()`), gradient backpropagation is limited to 50 steps, preventing exponential vanishing. Verify with gradient norm logging per layer. Alternatively, migrate from GRU to a Transformer encoder, as self-attention provides a constant O(1) gradient path length.
  common_mistake: |
    **The Pitfall:** Training a GRU with Backpropagation Through Time (BPTT) over 500 steps without gradient clipping or temporal truncation.
    **The Rationale:** Candidates forget that even with GRU gating mechanisms, gradients vanish exponentially over extremely long sequences, inevitably causing floating-point underflow in FP32.
    **The Consequence:** Early-step gradients become effectively zero, completely preventing the recurrent weights from learning long-term dependencies.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 500-step GRU model.
       - FP32 underflow limit is 1.4e-45.
       - Jacobian eigenvalue decay factor ≈ 0.95.
    2. **Calculations:**
       - Exponential Vanishing: 0.95^500 = 7.4e-12.
       - FP32 Precision: Values rapidly approach the zero limit.
       - Truncated BPTT (T=50): 0.95^50 = 0.077.
    3. **Conclusion & Interpretation:**
       - **Result: Precision-Bound (TBPTT restores finite 0.077 gradient scale)**.
