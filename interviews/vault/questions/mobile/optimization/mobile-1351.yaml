title: 'Distillation Target Latency on Hexagon NPU'
scenario: 'Your team is deploying a real-time speech enhancement model to a flagship Android device featuring the Qualcomm Hexagon NPU (Snapdragon 8 Gen 3). The original ''Teacher'' FP32 model requires 225 GOPS per frame and is too slow. You must use knowledge distillation to train a smaller ''Student'' model that can run strictly within a 5ms latency budget per frame when quantized to INT8 on the NPU, which has a peak throughput of 45 TOPS INT8.'
question: 'What maximum GOPS per frame can a distilled Hexagon NPU speech enhancement student use to meet a 5ms budget?'
details:
  realistic_solution: 'To calculate the target size for the student model, we must first determine the effective compute available within the 5ms latency budget. We use a realistic NPU utilization factor (e.g., 25%) rather than peak TOPS. Once we have the effective operations per millisecond, we multiply by the latency budget to find the maximum GOPS the student model can possess to hit the target.'
  common_mistake: |
    **The Pitfall:** Assuming 100% utilization of the NPU's peak 45 TOPS.
    **The Rationale:** Candidates fail to account for memory bandwidth and scheduling overheads for small batch sizes (like real-time audio).
    **The Consequence:** The student model is designed too large and fails the 5ms latency budget in production.
  napkin_math: |
    **Assumptions & Constraints:**
    - Peak NPU Throughput = 45 TOPS = 45,000 GOPS.
    - Assume 25% effective utilization for INT8 streaming workloads.

    **Calculations:**
    - Effective Throughput = 45,000 * 0.25 = 11,250 GOPS.
    - Effective Operations per ms = 11,250 / 1000 = 11.25 GOPS/ms.

    **Conclusion & Interpretation:**
    - **Result: 56.25 GOPS (Compute-Bound)**. Maximum Student Model Complexity = 11.25 GOPS/ms * 5 ms = 56.25 GOPS.
