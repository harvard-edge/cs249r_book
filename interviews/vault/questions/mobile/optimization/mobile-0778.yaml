title: TFLite Delegate Graph Partitioning Trade-offs
scenario: You are deploying a 12MB computer vision model for real-time video processing (30 FPS) on Android devices via TensorFlow Lite. CPU execution yields 50ms/frame. You enable the NNAPI delegate to leverage the NPU, but latency surprisingly increases to 54ms/frame. Profiling reveals the model is partitioned into 5 subgraphs because of an unsupported custom Swish activation and a GatherNd op, causing constant CPU-NPU synchronization. The GPU delegate achieves 28ms/frame but draws 2.2W, exceeding your 1.5W thermal budget.
question: How would you evaluate the trade-offs and justify a design decision to meet both the 33ms latency and 1.5W power constraints?
details:
  realistic_solution: Evaluate each deployment path against both constraints. CPU is simple but fails latency at 50ms. GPU meets latency at 28ms but fails the 1.5W power budget at 2.2W. The current NNAPI path fails latency because unsupported Swish and GatherNd fragment the graph into 5 delegated/CPU subgraphs with synchronization overhead. The best design is to refactor or retrain the model so those ops become NNAPI-supported equivalents, then verify with the delegate report that the graph maps to one NPU subgraph. If the rewrites materially hurt accuracy or still do not delegate, the fallback decision is to use a smaller supported model rather than shipping the fragmented NNAPI path.
  common_mistake: |
    **The Pitfall:** Assuming that simply enabling a hardware delegate like NNAPI will universally improve performance.
    **The Rationale:** Engineers overlook operator support matrices and ignore the severe latency and power penalties of graph partitioning and CPU fallback.
    **The Consequence:** Releasing a model that is paradoxically slower and consumes more battery than a pure CPU implementation.
  napkin_math: |
    **Assumptions & Constraints:**
    - Fully delegated NPU target after operator rewrites: ~15ms and <1.0W.
    - Fragmented NNAPI measured latency: 54ms.
    - CPU measured latency: 50ms.
    - GPU measured latency and power: 28ms at 2.2W.
    - 5 subgraphs imply 4 boundaries between adjacent subgraphs on the execution path.
    - Driver overhead per switch: ~2ms.
    - RAM copy overhead per switch: 12MB / 10 GB/s = 1.2ms.

    **Calculations:**
    - Total overhead per switch = 2ms + 1.2ms = 3.2ms.
    - Total switching penalty = 4 x 3.2ms = 12.8ms.
    - Non-switch compute in the measured fragmented path = 54ms - 12.8ms = 41.2ms across NPU and CPU islands.
    - Constraint check: CPU 50ms > 33ms; GPU 28ms < 33ms but 2.2W > 1.5W; fragmented NNAPI 54ms > 33ms; rewritten single-subgraph NNAPI target ~15ms and <1.0W passes both.

    **Conclusion & Interpretation:**
    - **Result: choose rewritten NNAPI/NPU deployment if validation confirms accuracy and full delegation**. It is the only listed path that can satisfy both latency and power constraints.
