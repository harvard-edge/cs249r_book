title: The Speculative Decoding Memory Trap
scenario: To accelerate a 2B parameter LLM on a mobile SoC, your team implements speculative decoding. They use a tiny 150M parameter draft model to generate 4 candidate tokens, which the main 2B model then verifies in a single forward pass. This works on a cloud GPU, but on the mobile device, the app's memory usage balloons after a few hundred generated tokens, and the OS terminates it. The verification step is a single, parallel operation that should be compute-efficient.
question: Why does this time-saving algorithm lead to catastrophic memory failure on a mobile device, and what specific hardware constraint is being violated?
details:
  realistic_solution: |
    The failure is caused by peak memory pressure, not by permanently storing every rejected token in the main model's KV cache. During speculative decoding, the mobile runtime may hold the draft model, main model, current KV cache, candidate-token activations, verification buffers, and temporary KV state at the same time. Rejected tokens should be discarded or rolled back, but their transient buffers still raise the peak footprint. On a tight mobile budget, that peak can exceed the OS Jetsam limit even when steady-state accepted-token KV growth would fit.
  common_mistake: |
    **The Pitfall:** Blaming a software memory leak or the draft model's size.
    **The Rationale:** Candidates miss that speculative decoding trades extra transient buffers and duplicated model state for latency reduction.
    **The Consequence:** Wasting time debugging only application leaks while the implementation's peak working set continues to violate the mobile memory budget.
  napkin_math: |
    **Assumptions & Constraints:**
    - 2B main model resident memory plus runtime buffers: ~1.2GB.
    - Accepted-token KV cache after 200 tokens: 200 * 4 MB = 800 MB.
    - Speculative verification width: k=4 candidate tokens.
    - Transient verification workspace: about 4 candidate tokens * 4 MB/token = 16 MB, plus activation/scratch buffers.
    - OS Jetsam budget for the app: ~2GB.

    **Calculations:**
    - Standard steady footprint after 200 accepted tokens: 1.2GB + 800 MB = 2.0GB.
    - Speculative peak footprint: 2.0GB + 16 MB candidate KV + activation/scratch duplication.
    - Even a modest extra 100-200 MB of verification scratch pushes the app over a 2GB Jetsam threshold.
    - Rejected tokens do not need to remain in the committed KV cache; the failure is the temporary peak while verifying them.

    **Conclusion & Interpretation:**
    - **Result: steady-state near 2GB plus transient speculative buffers (Peak-Memory Capacity)**. Speculative decoding can trigger Jetsam by exceeding peak mobile memory headroom, not by universally multiplying persistent KV cache by 4x.
