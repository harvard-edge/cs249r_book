title: Mobile New 0010
scenario: An LLM runs on Orin with KV cache tiling. As sequence length grows from 100 to 1000, latency increases by a factor of 100 instead of 10. Profiling shows massive SRAM evictions during the attention mechanism.
question: Why does KV cache tiling latency grow quadratically as sequence length increases from 100 to 1000?
details:
  realistic_solution: The symptom is quadratic latency scaling in an attention layer, indicating a failure in KV cache tiling strategy. As the sequence length increases, the size of the Keys and Values exceeds the fast SRAM tile size. Because the software doesn't implement block-wise attention (like FlashAttention) properly, it repeatedly evicts and fetches the KV tensors from slow DRAM for every query token.
  common_mistake: |
    **The Pitfall:** Allocating monolithic buffers for sequence processing.
    
    **The Rationale:** Engineers use standard attention implementations that do not consider hardware tile limits for Keys and Values.
    
    **The Consequence:** The software repeatedly evicts and fetches the KV tensors from slow DRAM for every query token, destroying performance.
  napkin_math: |
    **Assumptions & Constraints:**
    - SRAM tile size: 256KB.
    - Small sequence (Seq=100) KV size: ~200KB.
    - Large sequence (Seq=1000) KV size: ~2MB.
    - Bandwidth: 100GB/s.

    **Calculations:**
    - Without FlashAttention, the system reads the 2MB KV cache from DRAM for every query.
    - DRAM traffic per layer = 1000 queries x 2MB = 2GB.
    - Latency impact = 2GB / 100GB/s = 20ms per layer.

    **Conclusion & Interpretation:**
    - **Result: 20ms per layer (Memory-Bound)**. A 100x jump in latency for a 10x sequence growth due to SRAM thrashing.
