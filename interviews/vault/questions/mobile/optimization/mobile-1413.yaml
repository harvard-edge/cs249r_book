title: Distillation Projection Layer Bottlenecks
scenario: We deployed a student vision model, distilled from a heavy teacher using feature-level distillation, onto an NPU. To align intermediate representations, the student architecture includes 10 additional 1x1 projection convolutions. Profiling shows the dual-core NPU is severely stalling, yielding only 20 FPS instead of the target 60 FPS.
question: Why are distillation projection layers a bottleneck on the NPU, and what student design avoids them?
details:
  realistic_solution: 'The 1x1 projection layers are severely memory-bound operations with extremely low arithmetic intensity. Because mobile NPUs share the memory bus with the ISP and GPU, these layers saturate the memory bandwidth, starving the NPU cores of data and causing severe stalling. The optimal architecture eliminates these 1x1 projection layers entirely. Instead of feature-level distillation that mandates these projections for dimensionality alignment, the student model should be trained using pure soft-target logit matching (response-based distillation) at the final output layer.'
  common_mistake: |
    **The Pitfall:** Attempting to optimize the 1x1 projection convolutions through pruning or quantization.
    **The Rationale:** Engineers assume the bottleneck is computational and apply standard compression techniques, missing the fact that 1x1 convolutions on high-resolution feature maps have extremely low arithmetic intensity.
    **The Consequence:** Wasting optimization effort while the shared memory bus remains completely saturated, leaving the NPU stalled.
  napkin_math: |
    **Assumptions & Constraints:**
    - 10 additional 1x1 projection layers.
    - Memory per layer: Input (8.38 MB) + Output (8.38 MB) + Weights (~0.13 MB) = 16.9 MB.
    - Target framerate: 60 FPS.
    - NPU throughput: 34.7 TOPS.

    **Calculations:**
    - Total memory traffic per frame: 10 layers * 16.9 MB = 169 MB.
    - Bandwidth demand: 169 MB * 60 FPS = 10.14 GB/s.
    - Compute utilization: ~2.14 MMACs per layer. 10 layers * 60 FPS = 1.28 GOPS.
    - NPU utilization: 1.28 GOPS / 34.7 TOPS = 0.0037%.

    **Conclusion & Interpretation:**
    - **Result: 10.14 GB/s (Memory Bandwidth-Bound)**. Switching to pure logit matching drops the projection layers, saving 10.14 GB/s of contested bandwidth and instantly eliminating the stall.
