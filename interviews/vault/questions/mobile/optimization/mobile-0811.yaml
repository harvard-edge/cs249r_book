title: Fake Quantization CPU Overhead
scenario: You quantize a MobileNet to INT8. The model size drops by 4x, but inference latency on the mobile
  CPU remains identical to the FP32 version. Profiling reveals the CPU's floating-point vector units are
  fully saturated.
question: Why did INT8 quantization reduce MobileNet size but not CPU inference latency?
details:
  realistic_solution: The symptom of unchanged latency combined with fully saturated FP32 Vector ALUs
    definitively points to "Fake Quantization". While the model weights are successfully compressed to
    INT8 on disk/RAM, the inference engine forcibly inserts transparent Dequantize nodes before every
    operation. At runtime, the engine casts the INT8 weights back up to FP32, completely consuming any
    time saved on memory fetches with continuous casting overhead, netting out to the exact same latency.
  common_mistake: '**The Pitfall:** Assuming that a smaller file size automatically and structurally guarantees
    faster quantized integer execution.

    **The Rationale:** Engineers observe the 4x weight reduction and naively assume the hardware compiler
    will natively utilize highly optimized INT8 integer ALUs without explicitly validating operator support.

    **The Consequence:** The system incurs hidden dequantization overhead continuously at runtime, completely
    negating any compute speedups and sometimes running even slower than the FP32 baseline.

    '
  napkin_math: "1. **Assumptions & Constraints:**\n   - Storage Target: FP32 (10 MB) -> INT8 (2.5 MB),\
    \ achieving 4x reduction.\n   - Execution path: Engine lacking native INT8 `Conv2D` operators.\n2.\
    \ **Calculations:**\n   - Actual Latency (FP32 Pipeline baseline): ~10 ms.\n   - Fake Quantization\
    \ Pipeline: Memory fetch time improves slightly, but continuous `Cast(INT8 -> FP32)` nodes inject\
    \ an additional overhead that perfectly offsets it.\n   - Total execution: ~10 ms (matching the FP32\
    \ baseline).\n3. **Conclusion & Interpretation:**\n   **Result: 10ms Fake Quantization Latency (Compute-Bound).**\
    \ The absence of strict INT8 hardware pathways forces runtime unrolling and continuous casting, completely\
    \ destroying any arithmetic acceleration and leaving latency unchanged.\n"
