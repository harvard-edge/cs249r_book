title: The iOS vs Android ML Framework Maze
scenario: Your company ships a cross-platform camera app with real-time style transfer. On iOS (iPhone
  15, A16 Bionic), the model runs at 22ms via CoreML. On Android (Pixel 8, Tensor G3), the same ONNX model
  runs at 45ms via TFLite with NNAPI delegate. The hardware specs are comparable.
question: Why is there a 2x performance gap, and how do you close it?
details:
  realistic_solution: 'The 2x gap is software stack friction, not hardware. CoreML compiles directly to
    ANE with tight fusion. Android NNAPI adds: (1) HAL dispatch (+3ms), (2) partial op coverage forcing
    CPU fallback (+12ms), (3) data copies between CPU/NPU (+4ms). Closing: bypass NNAPI with a direct
    hardware delegate (45->42ms), zero-copy buffers (42->38ms), replace unsupported ops (38->24ms). Gap:
    22ms vs 24ms = 1.09x (from 2x). NNAPI is an abstraction tax; direct vendor SDKs recover performance.'
  common_mistake: '**The Pitfall:** Assuming hardware inferiority.

    **The Rationale:** Candidates often state that Apple''s hardware is just faster, ignoring the comparable
    NPU TOPS (~17 TOPS vs ~20 TOPS).

    **The Consequence:** They miss the optimization opportunities entirely, failing to address the software
    stack abstraction tax (NNAPI HAL overhead, data copies, missing ops).

    '
  napkin_math: "1. **Assumptions & Constraints:**\n   - iOS (CoreML → ANE): 2ms prep + 18ms ANE + 2ms\
    \ post = 22ms.\n   - Android (NNAPI → TPU): 45ms total.\n2. **Calculations:**\n   - Android breakdown:\
    \ 2ms prep + 3ms NNAPI overhead + 24ms TPU + 4ms data copies + 12ms CPU fallback = 45ms.\n   - Bypass\
    \ NNAPI (direct hardware delegate): removes 3ms overhead, 45ms → 42ms.\n   - Zero-copy camera buffer:\
    \ removes 4ms copies, 42ms → 38ms.\n   - Replace instance norm (fallback) with group norm (supported):\
    \ removes 12ms fallback and 2ms prep, 38ms → 24ms.\n3. **Conclusion & Interpretation:**\n   - **Result:\
    \ Abstraction-Bound. Final gap: 22ms vs 24ms (1.09x).**\n"
