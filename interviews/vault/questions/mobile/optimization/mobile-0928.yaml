title: 'Kernel Fusion: Evaluate Quantized Attention Fusion on A17 Pro'
scenario: 'You are evaluating two attention implementations for a 3B LLM on an A17 Pro: (A) FP16 attention with no fusion, and (B) INT8 quantized attention with QK^T+softmax+V fusion for a 512-token sequence.'
question: 'How do FP16 unfused attention and INT8 fused attention compare for memory, latency, and accuracy?'
details:
  realistic_solution: 'Attention memory: QK^T matrix = seq² × heads × bytes. For short sequences (512), this may fit in L2 cache. By leveraging FlashAttention-style SRAM fusion, the INT8 fused implementation eliminates the need to materialize the QK^T matrix in unified memory, drastically reducing the bandwidth requirement.'
  common_mistake: |
    **The Pitfall:** Assuming INT8 attention merely provides a 2x compute speedup over FP16.
    **The Rationale:** Engineers scale TOPS linearly with precision without analyzing the memory bandwidth bottlenecks of the attention matrix.
    **The Consequence:** Overlooking FlashAttention-style SRAM fusion which eliminates massive off-chip DRAM traffic.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 3B model, 32 heads, dim 128, seq=512.
       - A17 Pro ANE bandwidth: ~68 GB/s.
       - 28 attention layers.
    2. **Calculations:**
       - (A) FP16 Unfused: Reads Q, K, V (12 MB) + writes QK^T (16.8 MB) + reads QK^T (16.8 MB) + writes output (4 MB) = 49.6 MB per layer. At 68 GB/s = 0.73 ms.
       - (B) INT8 Fused: Reads Q, K, V (6 MB) + writes output (4 MB) = 10 MB per layer. At 68 GB/s = 0.15 ms.
       - Total latency: (A) 28 * 0.73 ms = 20.4 ms vs (B) 28 * 0.15 ms = 4.2 ms.
    3. **Conclusion & Interpretation:**
       - **Result: 4.9x speedup (Memory Bandwidth-Bound vs SRAM Fused).**
