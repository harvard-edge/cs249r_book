title: Recall Knowledge Distillation Basics for Tensor G3
scenario: You are presenting an optimization strategy for deploying a lightweight version of Gemini Nano on the Google Tensor G3. As part of the technical overview, you must define the core mechanism of knowledge distillation used to compress the model for this hardware.
question: What is knowledge distillation and how does it train a smaller Tensor G3 student model?
details:
  realistic_solution: Knowledge distillation is an optimization process where a smaller 'student' model is trained to mimic a larger 'teacher' model. The core mechanism involves training the student to match the soft targets (the raw logit outputs or probability distribution) of the teacher model, rather than just the hard ground-truth labels.
  common_mistake: |
    **The Pitfall:** Confusing knowledge distillation with standard transfer learning or pruning.
    **The Rationale:** Candidates often state the student model is just trained on the same data as the teacher, forgetting the crucial aspect of logit matching.
    **The Consequence:** Suboptimal model compression and failure to capture the teacher's nuanced decision boundaries.
  napkin_math: |
    **Assumptions & Constraints:**
    - A large teacher model produces logits or probability distributions.
    - A smaller student model is trained for deployment on constrained mobile hardware.

    **Calculations:**
    - Standard supervised training matches hard labels such as the single correct class.
    - Distillation adds a loss term that makes the student match the teacher's softened output distribution.
    - The student can learn relative class probabilities and behavior patterns that are not present in hard labels alone.

    **Conclusion & Interpretation:**
    - **Result: Teacher-to-Student Compression.** The relevant mechanism is logit or probability matching; no Tensor G3 throughput calculation is needed for this recall question.
