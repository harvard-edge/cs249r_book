title: Define Fusion Requirements for Cross-Platform Mobile LLM SDK
scenario: You are writing the kernel fusion specification for a cross-platform mobile LLM SDK that targets A17 Pro, Snapdragon 8 Gen 3, and Tensor G3. The SDK must achieve >= 20 tokens/sec for a 1B INT4 model on all platforms.
question: What fusion requirements and platform adaptation rules should a cross-platform mobile LLM SDK specify to reach 20 tokens per second?
details:
  realistic_solution: 'Platform-specific fusion requirements with a minimum baseline. Required fusion groups: FlashAttention-2, BN fold, and Elementwise chain fusion (RMSNorm + bias). Platform-specific adapters: Core ML for ANE, QNN for Hexagon, XNNPack for Tensor G3.'
  common_mistake: |
    **The Pitfall:** Writing strictly platform-agnostic fusion requirements.
    **The Rationale:** Engineers assume fusion rules can be identical across hardware, completely ignoring heterogeneous SRAM sizes or unsupported ops.
    **The Consequence:** Impossible or highly suboptimal kernel implementations triggering silent CPU fallbacks.
  napkin_math: |
    **Assumptions & Constraints:**
    - Throughput target: >= 20 tokens/sec (<= 50ms per token).
    - Tensor G3 Model footprint: 500MB INT4.
    - Tensor G3 Bandwidth: ~68 GB/s.

    **Calculations:**
    - Memory IO Floor: 500MB / 68 GB/s = 7.35ms.
    - Allowable Compute/Overhead Budget: 50ms - 7.35ms = 42.65ms.

    **Conclusion & Interpretation:**
    - **Result: 42.65ms Budget (Overhead-Bound)**. Since the physical memory floor is 7.35ms, kernel fusion must eliminate sufficient kernel launch and VRAM/SRAM transfer overhead to keep total step time under 50ms.
