title: Knowledge Distillation for Vision Model Deployment on Snapdragon 8 Gen 3 NPU
scenario: You are tasked with deploying a large vision transformer (teacher model) to a mobile device powered by the Snapdragon 8 Gen 3 Hexagon NPU, which offers 45 TOPS INT8 performance and access to 12-16 GB LPDDR5X memory. The teacher model achieves 90% accuracy but is too large and slow for the NPU's latency requirements (under 20ms per inference for 224x224 input images). You decide to use knowledge distillation to create a smaller student model.
question: Design an implementation strategy detailing distillation techniques and how you would leverage the Snapdragon 8 Gen 3 NPU specs?
details:
  realistic_solution: A realistic solution would involve a multi-stage distillation process. Initially, use **logit matching** with a temperature scaling factor to transfer class probabilities, training the student model with a combined loss (soft target loss + hard target loss). Concurrently, explore **feature distillation** by aligning intermediate feature maps from the teacher and student models, especially if the student model is significantly smaller or has a different architecture. For the Snapdragon 8 Gen 3 NPU, ensure the student model is designed with INT8 quantization compatibility in mind from the start, or integrate a post-training quantization-aware distillation step. Profiling should be done iteratively on the target NPU to benchmark latency and memory use, allowing for fine-tuning of the student model architecture and distillation hyperparameters to meet the 20ms latency target while considering the LPDDR5X memory access patterns.
  common_mistake: |
    **The Pitfall:** Applying generic distillation techniques without enforcing INT8 quantization constraints during the training process.
    **The Rationale:** Candidates focus solely on model distillation math (logit matching) but distill into an FP32 student model, ignoring the edge hardware's required format.
    **The Consequence:** The resulting student model suffers catastrophic accuracy collapse when post-training quantized to INT8, or runs painfully slow if executed in FP16.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target Latency = 20 ms (50 Inferences / sec).
    - NPU Capacity = 45 TOPS (INT8) = 45,000 GOPS.
    - Assume peak LPDDR5X bandwidth available to the inference is 64 GB/s.
    - Candidate student model compute is ~20 GOPS, with ~50 MB weights and up to ~300 MB activation traffic per inference after fusion/reuse.

    **Calculations:**
    - Latency window per inference = 20 ms = 0.020 s.
    - Peak operations available in that window = 45,000 GOPS/s * 0.020 s = 900 GOP.
    - Candidate compute check: 20 GOP / 45,000 GOPS/s = 0.00044 s = 0.44 ms theoretical compute floor.
    - Bandwidth available in 20 ms = 64 GB/s * 0.020 s = 1.28 GB transferred at peak.
    - Traffic check: 50 MB weights + 300 MB activations = 350 MB, which is below the 1.28 GB ideal bandwidth window but still shares the 20 ms budget with compute, launch, synchronization, and non-ideal reuse.

    **Conclusion & Interpretation:**
    - **Result: This is a loose capacity check, not a feasibility proof.** The ~20 GOP student is not compute-limited on paper, but profiling must verify sustained NPU utilization, activation spills, repeated DRAM reads, and runtime overhead before the 20 ms target can be claimed.
