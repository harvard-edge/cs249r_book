title: 'Optimizing MobileNetV3 Operator Scheduling on Hexagon NPU'
scenario: 'You are tasked with deploying a MobileNetV3-large based image classification network onto the Snapdragon 8 Gen 3 Hexagon NPU. The NPU boasts 45 TOPS (INT8) peak performance and has access to 12-16 GB LPDDR5X memory with a peak theoretical bandwidth of 85 GB/s. The model''s sub-graph for a critical processing step involves several depthwise separable convolutions followed by point-wise convolutions and activation functions.'
question: 'How would you schedule depthwise, pointwise, and activation operators for low-latency MobileNetV3 execution on Hexagon NPU?'
details:
  realistic_solution: 'Develop an operator scheduling strategy that prioritizes layer fusion for common patterns (e.g., DepthwiseConv-ReLU-PointwiseConv, or PointwiseConv-Add-ReLU) to minimize intermediate writes to LPDDR5X and maximize data reuse within the NPU''s on-chip memory. Reorder operations to improve data locality and exploit the Hexagon''s dedicated tensor accelerators for matrix multiplications and its vector units for element-wise operations. The scheduler should consider memory pressure, data dependencies, and the heterogeneous nature of the NPU, potentially requiring custom kernel implementation for complex fused operators to fully leverage hardware intrinsics and minimize overhead.'
  common_mistake: |
    **The Pitfall:** Relying solely on off-chip LPDDR5X for intermediate tensor storage.
    **The Rationale:** Candidates fail to account for the NPU's specialized tightly coupled memory (TCM) and apply generic operator fusion rules.
    **The Consequence:** Severe memory bandwidth bottlenecks that dominate inference latency.
  napkin_math: |
    **Assumptions & Constraints:**
    - Unfused intermediate tensor: 10MB.
    - Writing to and reading from LPDDR5X incurs 20MB of memory traffic.

    **Calculations:**
    - At 85 GB/s, this transfer takes 20 MB / 85 GB/s = ~0.235 ms.

    **Conclusion & Interpretation:**
    - **Result: ~0.235 ms per tensor (Memory-Bound)**. For hundreds of tensors, this non-compute memory access dominates total inference latency unless mitigated by aggressive fusion and TCM utilization.
