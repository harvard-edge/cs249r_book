title: Unstructured Sparsity Inefficiency on Apple A17 Pro
scenario: Your team applies 50% unstructured pruning to a 100MB vision model requiring 10 trillion operations per inference, expecting a 2x speedup on a mobile neural engine with 35 TOPS peak throughput and shared unified memory. However, profiling reveals zero latency improvement and identical memory bandwidth consumption compared to the unpruned model.
question: Why does unstructured sparsity fail to yield hardware performance gains, and what is the expected compute-bound execution time?
details:
  realistic_solution: Dense mobile neural engines are designed to maximize throughput for regular contiguous matrix operations. Unstructured pruning leaves zero weights randomly scattered, so the dense kernels still read the same tensor layout and execute the same scheduled multiply-accumulate slots unless the compiler and hardware have explicit sparse support. With a 10 trillion operation inference on a 35 TOPS engine, the compute-bound lower bound is 10e12 ops / 35e12 ops/s = about 0.286 seconds. Because the dense execution schedule is unchanged, 50% unstructured sparsity does not reduce that time; structured pruning, such as filter or channel pruning, is needed to physically reduce tensor dimensions.
  common_mistake: |
    **The Pitfall:** Assuming a reduction in theoretical non-zero weights guarantees proportional execution speedup.
    **The Rationale:** Candidates confuse theoretical FLOPs with hardware execution, forgetting that dense systolic arrays cannot easily skip unstructured zeros.
    **The Consequence:** Wasting effort on unstructured pruning that provides zero latency or bandwidth benefits on standard NPUs.
  napkin_math: |
    **Assumptions & Constraints:**
    - Original work per inference: 10 trillion operations.
    - Peak ANE Throughput: 35 TOPS.

    **Calculations:**
    - Dense execution time lower bound: 10e12 ops / 35e12 ops/s = 0.286s = ~286 ms.
    - Theoretical non-zero math after pruning: 5e12 useful ops.
    - Dense hardware schedule without sparse skipping: still 10e12 scheduled ops.
    - Execution time remains: 10e12 ops / 35e12 ops/s = ~286 ms (0% speedup).

    **Conclusion & Interpretation:**
    - **Result: ~286 ms (Compute-Bound)**. Because unstructured zeros still occupy dense execution slots and the same memory layout is read, latency and bandwidth remain identical to dense execution.
