title: Structured Pruning for Apple A17 Pro Neural Engine
scenario: You are deploying a 1B parameter transformer model on a Neural Engine that shares memory. Unstructured magnitude pruning achieved 70% sparsity, but on-device latency did not improve.
question: Why does unstructured pruning fail to speed up inference, and what structured approach should replace it?
details:
  realistic_solution: The correct approach is to diagnose the lack of speedup as a hardware alignment issue and switch to structured pruning, such as channel or block pruning. By physically reducing the dimensions of the weight tensors, structured pruning directly reduces the memory footprint and bandwidth requirements, allowing the 16-core Neural Engine to operate on smaller dense matrices and effectively alleviating the memory bottleneck.
  common_mistake: |
    **The Pitfall:** Assuming unstructured sparsity natively translates to latency improvements on dense hardware.
    **The Rationale:** Candidates confuse theoretical FLOP reductions with actual hardware execution paths, which cannot efficiently skip random zeros.
    **The Consequence:** Deploying a model with degraded accuracy (from 70% unstructured pruning) but zero actual performance or memory bandwidth gains.
  napkin_math: |
    **Assumptions & Constraints:**
    - Memory Bandwidth: 50 GB/s.
    - Original Weights: 1 GB (INT8).
    - Unstructured Sparse Weights: Memory layout remains dense due to hardware limits.
    - Structured Sparse Weights (50% block pruning): 0.5 GB.

    **Calculations:**
    - Unpruned Weight-Read Time: 1 GB / 50 GB/s = 20ms per token if weights are streamed once.
    - Unstructured Pruned Weight-Read Time: still 1 GB / 50 GB/s = 20ms per token when the deployed layout remains dense.
    - Structured Pruned Weight-Read Time: 0.5 GB / 50 GB/s = 10ms per token for the weight-read portion.
    - End-to-End Latency: actual token latency also includes activation traffic, kernel launch, and scheduling overhead.

    **Conclusion & Interpretation:**
    - **Result: weight-read time drops from 20ms to 10ms per token (Memory-Bound)**. Structured pruning can deliver up to a 2x improvement for the weight-traffic portion because it physically reduces dense tensor size; end-to-end throughput must be measured after deployment.
