title: The Pruning Paradox
scenario: 'You are optimizing a small transformer model for on-device text completion on an NPU. You compare two strategies: (A) 50% unstructured magnitude pruning on the FFN layers, and (B) 25% structured pruning by removing entire attention heads. Strategy A reduces total MACs more than B, but profiling shows B is 1.5x faster.'
question: Why can structured attention-head pruning run faster than more aggressive unstructured pruning on a mobile NPU?
details:
  realistic_solution: 'The NPU, like most mobile accelerators, is optimized for dense, predictable computation. Strategy A (Unstructured) creates sparse weight matrices. To compute with these, it involves expensive gather operations to fetch weights from scattered memory locations, breaking the efficient pre-fetching and caching mechanisms. The overhead from index calculations and irregular data access negates the FLOPs savings. Strategy B (Structured) removes entire attention heads, preserving the dense, rectangular nature of all remaining matrix multiplications. The computation remains highly efficient and predictable, leading to a much larger real-world speedup.'
  common_mistake: |
    **The Pitfall:** Assuming fewer parameters automatically equals faster execution.
    **The Rationale:** Engineers focus solely on MAC count reduction, ignoring the regularity of the computation required by DSP/VLIW architectures.
    **The Consequence:** Unstructured pruning introduces irregular memory access and gather operations, completely negating any theoretical FLOPs savings.
  napkin_math: |
    **Assumptions & Constraints:**
    - Base Memory: 1M params * 2 bytes (FP16) = 2MB.
    - NPU optimized for dense, predictable computation.

    **Calculations:**
    - Strategy A (50% unstructured): 500k weights (1MB) + 500k 16-bit indices (1MB) = 2MB total traffic, plus gather overhead.
    - Strategy B (25% structured): Reduces dense weights to 1.5MB with zero index overhead.

    **Conclusion & Interpretation:**
    - **Result: Structured pruning minimizes memory traffic, achieving lower latency (Bandwidth-Bound).** Unstructured pruning destroys data locality and adds indexing overhead.
