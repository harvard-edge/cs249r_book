title: 'Kernel Fusion: Optimize SwiGLU Fusion for Mobile LLM on Tensor G3'
scenario: Your 1B LLM on a mobile NPU uses SwiGLU activation. Profiling shows the SwiGLU activation takes 8ms out of 50ms per token. The activation operates on a 4096-element vector.
question: Why is an 8ms SwiGLU activation unrealistic, and what fusion fix should remove the overhead?
details:
  realistic_solution: |
    8ms for SwiGLU on 4096 elements is not credible as arithmetic time. Even using a conservative ~30 scalar ops per element, the activation is only about 123K ops, which is nanoseconds of compute and well under a microsecond of memory traffic on an NPU-class path. The 8ms is almost certainly dispatch, CPU/NPU synchronization, tensor layout conversion, or a CPU fallback. The fix is to fuse the MLP path around SwiGLU: gate/up projection output, sigmoid or SiLU, elementwise multiply, optional requantization, and down projection should be one fused NPU subgraph or fused matmul+activation+mul path so the activation vector is not launched and materialized as a standalone kernel.
  common_mistake: |
    **The Pitfall:** Treating 8ms for a simple element-wise operation as realistic compute time.
    **The Rationale:** Candidates assume profiling output directly reflects computation time, missing that 8ms for 4K elements on an NPU indicates framework or transfer overhead.
    **The Consequence:** Spending time optimizing math that takes nanoseconds instead of fixing the micro-architecture dispatch bottlenecks.
  napkin_math: |
    **Assumptions & Constraints:**
    - Vector size = 4096 elements.
    - SwiGLU compute = ~30 scalar ops/element, including sigmoid/SiLU approximation and multiply.
    - NPU Compute = ~7.5 TOPS. Memory Bandwidth = ~50 GB/s.

    **Calculations:**
    - Total work = 4096 * 30 = 122,880 ops.
    - Compute Time = 122,880 / 7.5e12 seconds = 0.000016 ms.
    - Memory Access if standalone = gate read + up read + output write = 4096 elements * 2 bytes * 3 tensors = 24 KB.
    - Memory Time = 24 KB / 50 GB/s = 0.00048 ms.
    - Total Theoretical Time ≈ 0.0005 ms.
    - Slowdown vs reported profile: 8 ms / 0.0005 ms = 16,000x.

    **Conclusion & Interpretation:**
    - **Result: ~16,000x slower than the standalone theoretical limit.** The reported 8ms indicates dispatch/synchronization/layout overhead, so fuse SwiGLU into the surrounding MLP projection path rather than optimizing the elementwise math itself.
