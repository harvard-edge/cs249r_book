title: 'Kernel Fusion: Optimize SwiGLU Fusion for Mobile LLM on Tensor G3'
scenario: Your 1B LLM on a mobile NPU uses SwiGLU activation. Profiling shows the SwiGLU activation takes 8ms out of 50ms per token. The activation operates on a 4096-element vector.
question: Why is an 8ms SwiGLU activation unrealistic, and what fusion fix should remove the overhead?
details:
  realistic_solution: '8ms for SwiGLU on 4096 elements is clearly wrong computationally (4096 × 10 FLOPs = 41K FLOPs / 7.5 TOPS = 5.5ns). Root cause: the 8ms must be kernel dispatch overhead, CPU-GPU sync, or format conversion, not actual compute.'
  common_mistake: |
    **The Pitfall:** Treating 8ms for a simple element-wise operation as realistic compute time.
    **The Rationale:** Candidates assume profiling output directly reflects computation time, missing that 8ms for 4K elements on an NPU indicates framework or transfer overhead.
    **The Consequence:** Spending time optimizing math that takes nanoseconds instead of fixing the micro-architecture dispatch bottlenecks.
  napkin_math: |
    **Assumptions & Constraints:**
    - Vector size = 4096 elements.
    - SwiGLU compute = ~30 FLOPs/element.
    - NPU Compute = ~7.5 TOPS. Memory Bandwidth = ~50 GB/s.

    **Calculations:**
    - Total Compute = 4096 * 30 = 122,880 FLOPs.
    - Compute Time = 122.8 KFLOPs / 7.5 TOPS = 0.000016 ms.
    - Memory Access = 4096 elements * 2 bytes * 3 tensors = 24 KB.
    - Memory Time = 24 KB / 50 GB/s = 0.00048 ms.
    - Total Theoretical Time ≈ 0.0005 ms.

    **Conclusion & Interpretation:**
    - **Result: ~16,000x slower than theoretical limit (Dispatch-overhead-bound latency)**. The reported 8ms indicates massive CPU-GPU synchronization overhead that must be fused.
