title: 'Hybrid Cloud-Edge Translation'
scenario: 'Developing a real-time translation app that streams audio chunks to a cloud Whisper model while running a smaller local model for immediate feedback on an iPhone.'
question: 'Design an asynchronous execution pipeline that overlaps the cellular network I/O wait times with the A17 Pro Neural Engine''s local inference execution.'
details:
  realistic_solution: 'Utilize Grand Central Dispatch (GCD) or Swift Concurrency to fork execution upon receiving a 1-second audio chunk. Thread A initiates an async HTTP/2 stream to the cloud. Thread B queues the local ANE CoreML model. The UI displays the local ANE result within 40ms, and gracefully replaces it 200ms later when the cellular network callback fires.'
  common_mistake: |
    **The Pitfall:** Awaiting the cloud network request synchronously before dispatching the local model.
    **The Rationale:** Candidates design simple sequential pipelines instead of leveraging mobile async concurrency.
    **The Consequence:** The UI is blocked waiting for the network, completely neutralizing the latency benefits of edge compute.
  napkin_math: |
    **Assumptions & Constraints:**
    - Network Request Latency: 200ms.
    - Local Inference Latency: 40ms.

    **Calculations:**
    - Asynchronous Parallel Time: max(200ms, 40ms) = 200ms.

    **Conclusion & Interpretation:**
    - **Result: 200ms (I/O-Bound)**. The local result is displayed in 40ms, and total system wait time is strictly bounded by the 200ms network.
