title: 'CoreML vs PyTorch'
scenario: 'You are tasked with deploying a trained PyTorch model (.pth file) into a native iOS Swift application.'
question: 'Can you deploy a raw `.pt` or `.pth` PyTorch model directly into a native iOS Swift application?'
details:
  realistic_solution: 'No. The raw PyTorch model must be converted into Apple''s proprietary CoreML format (`.mlpackage` or `.mlmodel`) so that the iOS operating system can automatically route the operations to the Neural Engine, GPU, or CPU.'
  common_mistake: |
    **The Pitfall:** Thinking iOS natively supports PyTorch weight files.
    **The Rationale:** Developers coming from cloud environments assume they can simply `pip install torch` inside the iOS app.
    **The Consequence:** They fail to realize the model must be converted to an Apple-proprietary format to utilize hardware acceleration, stalling deployment.
  napkin_math: |
    **Assumptions & Constraints:**
    - Raw Model: MobileNetV2 (3.4M params) in FP32.
    - Target Format: CoreML package (downcasts to FP16).

    **Calculations:**
    - PyTorch FP32 Size: 3.4M × 4 bytes = 13.6 MB.
    - CoreML FP16 Size: 3.4M × 2 bytes = 6.8 MB.

    **Conclusion & Interpretation:**
    - **Result: 6.8 MB (I/O-Bound)**. The CoreML package is 2x smaller (6.8 MB) and fundamentally restructured to route operations directly to the Neural Engine, bypassing generic CPU execution.
  options:
  - 'Yes, iOS natively executes raw PyTorch files (.pt) using the Swift Torch API.'
  - 'Yes, but it requires FP16 conversion via `torch.half()` before loading.'
  - 'No, the model must be converted to the CoreML format for hardware acceleration on iOS.'
  - 'No, iOS only natively supports TensorFlow Lite models (.tflite).'
  correct_index: 2
