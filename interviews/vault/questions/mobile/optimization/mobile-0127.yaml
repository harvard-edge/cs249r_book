title: The WebGPU ML Inference
scenario: Your team debates shipping an ML feature as a native mobile SDK vs running it in the browser via WebGPU. The PM argues 'WebGPU means write once, run everywhere'. The model is a 50M parameter image classifier.
question: When is WebGPU a reasonable alternative to a native mobile ML SDK for a 50M-parameter image classifier?
details:
  realistic_solution: '50M INT8 model: native NPU = 1.8ms, WebGPU = 5.5ms steady-state. For a photo app (1 inference/action): 205.5ms (WebGPU) vs 201.8ms (native) — 3.7ms difference, imperceptible. Engineering: WebGPU 1 month vs native 3 months. WebGPU wins for: infrequent inference, latency > 10ms, instant updates. Native wins for: real-time camera (<16ms budget), sustained inference, NPU access. Compute gap ~3x; often irrelevant.'
  common_mistake: |
    **The Pitfall:** Assuming WebGPU is "just JavaScript" and inherently 10x slower than native.
    **The Rationale:** Engineers confuse modern WebGPU with older WebGL or CPU-bound JavaScript execution.
    **The Consequence:** Teams incorrectly dismiss WebGPU for lightweight models, missing out on instant updates.
  napkin_math: |
    **Assumptions & Constraints:**
    - Native NPU Latency: 1.8ms.
    - WebGPU Steady-State: 3.2ms compute + 0.3ms data + 2ms dispatch = 5.5ms.
    - UI overhead: 200ms.

    **Calculations:**
    - Total Latency: 205.5ms WebGPU vs 201.8ms Native.
    - Difference: 3.7ms.

    **Conclusion & Interpretation:**
    - **Result: 3.7ms difference is imperceptible, validating WebGPU for infrequent inferences (Latency-Bound).** Compute overhead matters little when dominated by UI latency.
