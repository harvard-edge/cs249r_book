title: The Generative Keyboard's Hidden Tax
scenario: You are optimizing an autoregressive model for a generative keyboard. Profiling reveals that per-token latency is high, but the NPU math time is low. A common pattern in the Transformer is `LayerNorm -> GeLU -> Add`, each executed as a separate kernel.
question: How much latency can fusing LayerNorm, GeLU, and Add save for a generative keyboard?
details:
  realistic_solution: |
    Fusing the operations can save about 50 us per token under the stated assumptions: roughly 12 us from reduced intermediate tensor traffic plus about 40 us from eliminating two extra kernel launches. The primary bottleneck is not the LayerNorm/GeLU/Add arithmetic itself, but the cost of extra DRAM round-trips and dispatch overhead on the mobile runtime.
  common_mistake: |
    **The Pitfall:** Focusing only on FLOPs.
    **The Rationale:** Candidates conclude the benefit is minimal because they ignore kernel launch overhead and DRAM round-trips on mobile SoCs.
    **The Consequence:** Leaving substantial latency overhead on the table, resulting in sluggish typing experience.
  napkin_math: |
    **Assumptions & Constraints:**
    - Tensor size: [1, 128, 768] FP16 (196.6 KB).
    - Bandwidth: 68 GB/s.
    - Kernel launch/dispatch overhead: ~20 us per kernel.
    - Simplified traffic model counts full-tensor reads/writes of intermediate activations.

    **Calculations:**
    - Unfused (3 kernels) = 4 reads + 3 writes = 7 * 196.6 KB = 1.376 MB.
    - Fused (1 kernel) = 2 reads + 1 write = 3 * 196.6 KB = 0.5898 MB.
    - Memory time saved = (1.376 MB - 0.5898 MB) / 68 GB/s = 11.56 µs.
    - Overhead saved = 2 launches * 20 µs = 40 µs.

    **Conclusion & Interpretation:**
    - **Result: ~51.5 us saved per token (Dispatch + Memory Traffic)**. About 11.6 us comes from less memory traffic and about 40 us comes from two fewer launches, so the dispatch assumption is required for the full estimate.
