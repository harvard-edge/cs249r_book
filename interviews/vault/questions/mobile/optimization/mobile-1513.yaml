title: Dual-Core NPU Operator Scheduling for Memory Contention
scenario: 'You are tasked with designing an operator execution schedule for a parallelized vision transformer deploying on a dual-core NPU. Your goal is to specify a scheduling strategy that balances parallel operator execution while preventing severe memory bandwidth bottlenecks caused by simultaneous large memory accesses.'
question: 'How should dual-core Exynos NPU scheduling interleave compute-bound and memory-bound operators?'
details:
  realistic_solution: 'The design should interleave compute-bound operators with memory-bound operators across the two cores. Furthermore, aggressive layer fusion (e.g., fusing MatMul with LayerNorm and GeLU) must be specified to keep intermediate activations within the NPU''s local SRAM. The scheduler should sequence independent high-bandwidth operators rather than parallelizing them, ensuring the shared memory bus remains unsaturated.'
  common_mistake: |
    **The Pitfall:** Assuming fully parallelizing independent network branches automatically yields peak performance.
    **The Rationale:** Engineers prioritize compute scaling without analyzing the shared memory constraint.
    **The Consequence:** Saturated LPDDR5X bus leading to massive NPU stalls and ISP frame drops.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Dual-core NPU peak: 34.7 TOPS.
       - LPDDR5X bandwidth: 68.2 GB/s.
       - Intermediate tensor size: 4 MB.
    2. **Calculations:**
       - Memory transfer time (4MB read + 4MB write) / 68.2 GB/s = 0.117 ms.
       - Parallelizing branches forces bus serialization, stalling compute.
       - Fusing operations keeps the 4 MB tensor in SRAM.
    3. **Conclusion & Interpretation:**
       - **Result: 8 MB memory traffic saved per block (Bandwidth Preservation).**
