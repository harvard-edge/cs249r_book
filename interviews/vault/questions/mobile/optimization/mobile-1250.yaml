title: Designing Structured Sparsity for NPU Deployment
scenario: You are tasked with deploying a 3 billion parameter transformer on a mobile device powered by an NPU. The device features 12 GB of shared LPDDR5X RAM, but system constraints leave only 4 GB available for your model's weights and activations. The NPU provides 45 TOPS of INT8 compute.
question: 'How would you design a pruning and sparsity architecture to fit this model within memory limits while maximizing NPU throughput?'
details:
  realistic_solution: 'The optimal design pairs hardware-aligned structured pruning (such as block sparsity or 2:4 sparsity) with INT8 quantization-aware training (QAT). Quantization immediately reduces the parameter footprint to fit the budget. Applying 50% structured sparsity allows the NPU''s tensor cores to skip zero-blocks at the hardware level, significantly reducing compute cycles and maximizing the shared LPDDR5X memory bandwidth utilization during inference.'
  common_mistake: |
    **The Pitfall:** Proposing unstructured pruning to reduce memory size.
    **The Rationale:** Candidates assume removing arbitrary weights linearly improves latency, ignorant of how NPU tensor accelerators require dense or specifically structured matrix operations.
    **The Consequence:** The unstructured sparse model fails to accelerate on the hardware, resulting in massive lookup overheads and worse latency than the dense baseline.
  napkin_math: |
    **Assumptions & Constraints:**
    - 3B parameters at FP16 = 6 GB.
    - 4 GB memory budget. 68 GB/s bandwidth.

    **Calculations:**
    - INT8 reduces to 3 GB.
    - 50% structured sparsity reduces GOPS.
    - Streaming 1.5 GB sparse weights at 68 GB/s takes 0.022s per token.
    - Realistic Throughput = 1 / 0.022 = ~45 tokens/sec.

    **Conclusion & Interpretation:**
    - **Result: ~45 tokens/sec (Memory-Bandwidth-Bound)**. Generation achieved with 50% structured sparsity.
