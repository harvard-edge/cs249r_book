title: The Jank-Inducing Mobile Generative Model
scenario: You are a mobile ML engineer deploying a new generative language model for an in-app sticker feature. The model is INT8 quantized, but you observe significant UI 'jank' (stuttering) during inference. The on-device profiler shows that the current 25ms inference time is dominated by ~1,000 sequential kernel calls. Each kernel takes ~15µs to execute, but there's a consistent ~10µs gap between each call where the accelerator appears idle.
question: What does the 'work-gap-work-gap' profiler pattern indicate, and how can operator fusion fix it?
details:
  realistic_solution: The model is severely dispatch-bound due to kernel launch overhead. Apply operator fusion via MLIR or a hardware-aware compiler to lower sub-graphs into a single fused kernel. This drastically minimizes the CPU-to-accelerator dispatches, maximizing NPU saturation and pulling inference under the strict VSYNC deadline.
  common_mistake: |
    **The Pitfall:** Misdiagnosing the stutter as a raw compute or memory bandwidth limitation.
    **The Rationale:** Engineers default to applying standard ML optimizations like unstructured pruning without analyzing execution traces.
    **The Consequence:** Shrinking the model size but failing to remove the actual kernel launch overhead bottleneck, leaving the jank unresolved.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model operations: 1,000 sequential kernels.
    - Compute execution time per kernel: 15 µs.
    - Dispatch overhead per kernel: 10 µs.
    - Latency deadline: < 16.6 ms (for 60 FPS).

    **Calculations:**
    - Total Compute: 1,000 * 15 µs = 15 ms.
    - Total Overhead: 1,000 * 10 µs = 10 ms.
    - Total Inference Time: 15 ms + 10 ms = 25 ms.

    **Conclusion & Interpretation:**
    - **Result: 10 ms overhead (Dispatch-Bound)**. Fusing operations removes the dispatch overhead, enabling the system to meet the 16.6 ms real-time VSYNC deadline.
  options:
  - 'The model is memory-bound: apply unstructured pruning to reduce footprint to 15ms. (Trap: 15ms compute without addressing overhead).'
  - 'The model is compute-bound: distill the architecture to save 10ms of compute. (Trap: ignores the 10ms idle gaps).'
  - 'The model is dispatch-bound due to kernel launch overhead: use operator fusion to combine sequential operations into fewer, larger kernels.'
  - 'The SoC is thermally throttling: add a 10ms cool-down period. (Trap: misinterprets idle gap as thermal throttling).'
