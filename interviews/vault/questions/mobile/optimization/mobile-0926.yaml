title: 'Kernel Fusion: Design Fusion Strategy for On-Device LLM on Snapdragon 8 Gen 3'
scenario: 'You are designing the kernel fusion strategy for a 1B parameter LLM (4-bit quantized) inference on Snapdragon 8 Gen 3 (45 TOPS INT8, 16GB). The model uses GQA attention (8 KV heads, 32 Q heads), RMSNorm, and SwiGLU activation. Target: 20 tokens/second (50ms/token).'
question: What operator fusion and execution-placement graph would you use for a 1B 4-bit GQA LLM on Snapdragon 8 Gen 3 to target 20 tokens/sec?
details:
  realistic_solution: |
    Use a graph that keeps quantized linear work on Hexagon and cuts to GPU only where the DSP cannot efficiently handle the attention kernel. Per layer: fuse RMSNorm -> QKV projection -> dequant/scale on Hexagon; split Q from grouped K/V; run RoPE and the fused QK^T -> scale -> mask -> softmax -> V attention kernel on Adreno or a supported attention backend; then return to Hexagon for output projection and fused RMSNorm -> gated MLP projections -> SwiGLU -> down projection. Avoid graph cuts inside RMSNorm+linear, QKV projection, or SwiGLU because those cuts create extra dequantization and memory traffic.
  common_mistake: |
    **The Pitfall:** Not accounting for the Hexagon DSP vs Adreno GPU split on Snapdragon — different op types run on different hardware units. Not all ops can be fused across the DSP/GPU boundary.
    **The Rationale:** Candidates often describe one ideal fused transformer block without checking which backend owns quantized matmuls, attention, RoPE, and elementwise ops. A fusion plan that crosses the DSP/GPU boundary may force dequantization, tensor copies, or unsupported delegate fallbacks.
    **The Consequence:** The implementation spends its token budget on layout conversion and device transfers, so the theoretical fused graph misses the 50ms/token target even though each individual kernel looks efficient.
  napkin_math: |
    **Assumptions & Constraints:**
    - 1B model, 4-bit quantization (500MB).
    - Snapdragon 8 Gen 3: LPDDR5 bandwidth ~68 GB/s, 45 TOPS.
    - 32 layers, hidden dimension 2048.
    - Target: 20 tokens/sec (50ms/token).

    **Calculations:**
    - Target latency budget: 1 / 20 tokens/sec = 50ms/token.
    - Weight traffic lower bound for one decode token: 500MB / 68 GB/s = ~7.4ms before cache misses, dequantization, scheduling, and attention overhead.
    - The fusion goal is not to save a single tensor read; it is to avoid repeated graph cuts across 32 layers.
    - A workable budget should keep per-layer overhead under roughly 50ms / 32 = 1.6ms/layer including projection, attention, MLP, and placement transitions.

    **Conclusion & Interpretation:**
    - **Result: Placement-Aware Fusion Graph**. The design should fuse quantized matmul blocks on Hexagon, use a single fused attention block where needed, and minimize DSP/GPU transfers. The math only gives a lower-bound budget; it does not prove the model already reaches 20 tokens/sec.
