title: Implementing gradient-based input attribution for on-device explainability on A17 Pro
scenario: 'You need to implement Integrated Gradients for explainability in a medical imaging app on an A17 Pro. IG requires computing gradients of the output with respect to the input pixel values, averaged over 50 interpolation steps between a baseline and the input image.'
question: 'How would you implement Integrated Gradients for on-device explainability on A17 Pro without 50 sequential passes?'
details:
  realistic_solution: 'Vectorize across interpolation steps using vmap: create a batched input of 50 interpolated images and run a single batched forward-backward pass. Enable gradient tracking only for the input tensor, not model parameters. Use torch.func.grad(model_fn)(batched_input) with vmap. This provides a dramatic speedup over sequential looping.'
  common_mistake: |
    **The Pitfall:** Running 50 separate forward-backward passes sequentially.
    **The Rationale:** Engineers default to basic loop constructs without utilizing `vmap` to vectorize across interpolation steps.
    **The Consequence:** Explanation takes ~1 second per image, which is too slow for an interactive UI.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - MobileNet-scale model (224x224x3).
       - 50 interpolation steps.
       - Single pass: 20 ms.
    2. **Calculations:**
       - Sequential IG: 50 * 20 ms = 1000 ms.
       - vmap batched (batch=50): compute parallelizes, but CPU gradient tracking adds ~50 ms.
       - Total batched approach: ~250 ms.
    3. **Conclusion & Interpretation:**
       - **Result: 4x speedup (Vectorized Graph Computation).**
