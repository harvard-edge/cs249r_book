title: The On-Device 7B LLM Mandate
scenario: You are the Lead ML Systems Engineer for a luxury automaker's 'AI Concierge'. The CEO mandated that the flagship 7B parameter LLM, currently running in the cloud, be deployed entirely on the car's 8GB infotainment SoC for a premium, always-on experience.
question: What end-to-end on-device deployment design can satisfy the 7B AI Concierge mandate under a 2GB memory budget, and when would you replace the raw 7B with a compressed student-verifier system?
details:
  realistic_solution: 'A successful design must first prove that the raw 7B cannot meet the 2GB resident-memory constraint, then propose the deployable substitute. INT4 quantization, paged weights, KV-cache caps, and fused kernels are necessary analysis steps, but the raw 7B still has a 3.5GB weight payload before KV cache, activations, runtime overhead, and fragmentation. The practical on-device architecture is therefore a compressed student-verifier system distilled from the 7B: a small draft/intent model for most turns, a larger verifier for quality and safety, strict context limits, quantized KV cache, and fallback to cloud or deferred execution for requests that require the full 7B behavior. This frames the problem as an end-to-end deployment tradeoff rather than a narrow kernel-fusion exercise.'
  common_mistake: |
    **The Pitfall:** Proposing a single solution, like "quantize to INT4".
    **The Rationale:** Candidates fail to realize that a 7B model at INT4 is still ~3.5GB, which breaks the 2GB memory budget.
    **The Consequence:** The proposed system will encounter Out-Of-Memory (OOM) errors and completely fail to run.
  napkin_math: |
    **Assumptions & Constraints:**
    - Base 7B Model (FP16): 14 GB.
    - Memory Budget Constraint: 2 GB available for inference.
    - Distilled Architecture: 500M Verifier (INT8), 100M Draft (INT8).

    **Calculations:**
    - Base INT4 Size: 7B * 0.5 bytes = 3.5 GB (Exceeds 2 GB).
    - Distilled Weights Size: (500M + 100M) * 1 byte = 600 MB.
    - KV Cache & Activations: ~400 MB.
    - Total Distilled Footprint: 600 MB + 400 MB = 1.0 GB.

    **Conclusion & Interpretation:**
    - **Result: 1.0 GB footprint (Memory-Capacity Bound)**. A 7B parameter model cannot fit a 2GB budget even with INT4 quantization; aggressive structural distillation is the only viable path.
