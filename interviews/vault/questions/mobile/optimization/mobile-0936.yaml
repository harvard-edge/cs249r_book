title: 'Kernel Fusion: Realize Fusion Plan for Production Mobile LLM Deployment'
scenario: Realize the complete fusion plan for shipping a 1B INT4 LLM (500MB) to 10M users on A17 Pro (35 TOPS, 8GB) and Snapdragon 8 Gen 3 (45 TOPS, 16GB).
question: How would you specify all fused op groups, their implementations, testing requirements, and expected latency for each platform?
details:
  realistic_solution: |
    Specify fusion by decode and prefill path, then implement per backend. Fuse RMSNorm + quantized linear for QKV and MLP projections; fuse INT4 dequant + matmul + bias/scale; fuse RoPE with Q/K preparation; use FlashAttention-style fused score, mask, softmax, and value accumulation for prefill; fuse residual add with the following norm where the backend supports it. On A17 Pro, package the graph through Core ML and verify which fusions the ANE compiler actually emits, with custom Metal kernels for unsupported attention or KV-cache paths. On Snapdragon, use QNN/HTP graph fusions or custom op packages for the same groups.

    Testing must include layer-level FP32 reference comparisons, end-to-end golden prompts, perplexity or task-quality regression gates, long-context KV-cache tests, thermal soak, and p50/p95 latency on both platforms. Use tolerances by tensor type rather than a single global number, for example tight tolerances for logits rank stability and calibrated INT4 error bounds for fused matmuls.
  common_mistake: |
    **The Pitfall:** Specifying fusion without a numerical correctness testing plan or ignoring platform-specific APIs.
    **The Rationale:** Developers often assume fused ops are mathematically identical and that one fusion approach works across all hardware.
    **The Consequence:** This leads to silent accuracy degradation or implementation failures across different NPUs (Apple ANE vs. Qualcomm Hexagon).
  napkin_math: |
    **Assumptions & Constraints:**
    - Target: 1B INT4 LLM (~500MB weights) on A17 Pro (~51GB/s effective memory path for this workload) and Snapdragon (~77GB/s effective memory path).
    - Decode latency is bounded by weight/KV memory traffic, kernel launch overhead, dequantization, matmul efficiency, and scheduler/thermal behavior.
    - Report platform latency as a measured target range, not as a precise value from bandwidth alone.

    **Calculations:**
    - Weight-traffic lower bound on A17 Pro: 500MB / 51GB/s = about 9.8ms/token before KV reads, compute, launches, and runtime overhead.
    - Weight-traffic lower bound on Snapdragon: 500MB / 77GB/s = about 6.5ms/token before the same overheads.
    - Fusion reduces launch count and intermediate tensors. If a 28-layer model avoids roughly 3 small launches per layer and each launch/scheduling gap costs 20-40us, launch savings are 28 * 3 * 20-40us = 1.7-3.4ms/token.
    - FlashAttention-style prefill should be validated by peak-memory counters: standard attention stores O(sequence^2 * heads) scores, while fused attention stores only active tiles plus running max/sum state. Do not convert that directly into decode latency without measurement.
    - Practical latency targets after fused kernels and profiling: A17 Pro about 18-25ms/token p50 for decode; Snapdragon about 14-20ms/token p50, with p95 and thermal limits reported separately.

    **Conclusion & Interpretation:**
    - **Result: Platform-Specific Fusion Plan With Measured Latency Ranges.** Bandwidth gives only a lower bound; the release spec should require the listed fused op groups, backend-specific implementations, numerical/quality gates, and profiled p50/p95 latency per platform.
