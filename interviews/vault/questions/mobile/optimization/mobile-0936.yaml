title: 'Kernel Fusion: Realize Fusion Plan for Production Mobile LLM Deployment'
scenario: Realize the complete fusion plan for shipping a 1B INT4 LLM (500MB) to 10M users on A17 Pro (35 TOPS, 8GB) and Snapdragon 8 Gen 3 (45 TOPS, 16GB).
question: How would you specify all fused op groups, their implementations, testing requirements, and expected latency for each platform?
details:
  realistic_solution: 'Platform-specific fusion implementations: (1) A17 Pro: Core ML .mlpackage with automatic ANE fusion. (2) Snapdragon: Qualcomm AI Engine (QNN SDK) with manual fusion specification. Test: compare output against FP32 reference, max error < 0.02.'
  common_mistake: |
    **The Pitfall:** Specifying fusion without a numerical correctness testing plan or ignoring platform-specific APIs.
    **The Rationale:** Developers often assume fused ops are mathematically identical and that one fusion approach works across all hardware.
    **The Consequence:** This leads to silent accuracy degradation or implementation failures across different NPUs (Apple ANE vs. Qualcomm Hexagon).
  napkin_math: |
    **Assumptions & Constraints:**
    - Target: 1B INT4 LLM (~500MB weights) on A17 Pro (~51GB/s effective memory path for this workload) and Snapdragon (~77GB/s effective memory path).
    - Report platform latency separately because the bandwidth and launch overhead assumptions differ.

    **Calculations:**
    - RMSNorm + Linear fusion: saves 4KB per layer (at hidden_size=2048, FP16). Over 28 layers = 112KB saved.
    - FlashAttention fusion during prefill avoids materializing one 512x512 score tile across 32 heads: 512 * 512 * 32 * 2B = 16,777,216 bytes = 16 MiB (~16.8 MB) per layer.
    - Over 28 layers, avoided score-buffer traffic is about 448 MiB (~470 MB decimal) for that prefill tile shape.
    - A17 Pro (51.2GB/s): Weight load 500MB / 51.2GB/s = ~10ms + 2ms overhead = 12ms (83 tok/sec).
    - Snapdragon (77GB/s): Weight load 500MB / 77GB/s = ~6.5ms + 1.5ms overhead = 8ms (125 tok/sec).

    **Conclusion & Interpretation:**
    - **Result: A17 Pro ~12ms/token (~83 tok/sec); Snapdragon ~8ms/token (~125 tok/sec).** Both are bandwidth-sensitive, but the expected latency must be reported per platform rather than as a single blended 125 tok/sec result.
