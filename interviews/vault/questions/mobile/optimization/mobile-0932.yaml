title: 'Kernel Fusion: Mastery — Optimize 3B LLM Decode Throughput on A17 Pro'
scenario: You are optimizing a 3B LLM (INT4 quantized, 1.5GB) decode on A17 Pro. Current throughput is 18 tokens/sec, and your target is 30 tokens/sec.
question: Which optimizations move a 3B INT4 LLM decode on A17 Pro from 18 to 30 tokens/sec, and by how much?
details:
  realistic_solution: |
    Start from the latency gap, not a blind list of tricks. Current latency is 55.6ms/token and the target is 33.3ms/token, so the implementation must remove at least 22.3ms/token. The bandwidth floor for streaming 1.5GB of INT4 weights from 68GB/s memory is about 22.1ms/token, leaving only about 11.2ms/token for dequantization, attention/KV reads, launches, scheduling, and format conversions. The optimizations that can plausibly close the gap are: static/AOT graph capture and preallocated buffers (~5-7ms), fused INT4 dequantize+matmul kernels with packed weights (~8-10ms), fused RMSNorm/RoPE/elementwise chains (~3-4ms), and paged INT8 KV cache with no per-token realloc/copy (~4-5ms). INT3 weight quantization is not the first recommendation unless quality validation proves it acceptable.
  common_mistake: |
    **The Pitfall:** Applying all optimizations blindly without measuring the current bottleneck.
    **The Rationale:** Candidates often assume compute is the limit for LLMs, when batch=1 decoding is almost entirely memory bandwidth-bound.
    **The Consequence:** Optimizing compute kernels yields marginal improvements, missing the 30 tok/sec target entirely.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Target: 30 tok/sec (33.3ms/token). Current: 18 tok/sec (55.6ms/token).
       - Hardware memory bandwidth budget: ~68 GB/s.
       - INT4 model weights streamed per decode token: 1.5 GB.
    2. **Calculations:**
       - Current latency: 1000 / 18 = 55.6ms/token.
       - Target latency: 1000 / 30 = 33.3ms/token.
       - Required reduction: 55.6 - 33.3 = 22.3ms/token.
       - Weight bandwidth floor: 1.5GB / 68GB/s = 22.1ms/token.
       - Target non-weight budget: 33.3 - 22.1 = 11.2ms/token.
       - Plausible measured savings plan: AOT graph + preallocated buffers saves 6ms; fused INT4 dequantize+matmul and packed weights save 9ms; fused RMSNorm/RoPE/elementwise kernels save 3.5ms; paged INT8 KV cache avoids realloc/copy and saves 4ms.
       - Total planned savings: 6 + 9 + 3.5 + 4 = 22.5ms/token.
       - Final latency: 55.6 - 22.5 = 33.1ms/token, or 1000 / 33.1 = 30.2 tok/sec.
    3. **Conclusion & Interpretation:**
       - **Result: 30.2 tok/sec if profiling confirms the stated savings.** The target is achievable by removing overhead around the INT4 bandwidth floor; unsupported extra weight quantization is a quality-risky fallback, not the primary path.
