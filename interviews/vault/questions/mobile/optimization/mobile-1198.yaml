title: Distilled Model Memory Contention
scenario: We distilled a large teacher model into a compact 25MB student model requiring 2.5 GOPS per frame. During a live camera feed using a shared unified memory architecture, actual inference latency spikes to 12 ms.
question: Why does latency spike during a live feed, and what is the effective memory bandwidth for loading the 25MB model?
details:
  realistic_solution: |
    The latency anomaly is caused by severe memory bus contention. Although the distilled 25MB model is highly compact, the unified memory architecture requires the NPU, ISP, CPU, and GPU to multiplex data across the same LPDDR5X bus. During a live camera feed, ISP and GPU traffic consume bandwidth, so the NPU stalls on weight, activation, or feature-map reads even though the arithmetic is tiny. Treat the 12ms observation as contention-stalled memory service, not proof that the model is freshly loaded every frame. Mitigate by fusing layers, reducing activation traffic, scheduling inference away from peak ISP/GPU bursts, and using on-chip/local buffering only where the hardware and compiler actually support it.
  common_mistake: |
    **The Pitfall:** Focusing solely on the NPU's TOPS capability and suggesting further model distillation.
    **The Rationale:** Candidates see a latency spike and immediately assume the model has too many parameters.
    **The Consequence:** They fail to recognize that the shared memory architecture is the actual bottleneck when the ISP and GPU are active.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model footprint: 25 MB. Model compute: 2.5 GOPS.
    - NPU Peak: 34.7 TOPS (34,700 GOPS).
    - Observed latency: 12 ms.

    **Calculations:**
    - Theoretical pure compute latency = 2.5 GOPS / 34,700 GOPS/sec = 0.000072 sec = 0.072 ms.
    - Discrepancy: 12 ms actual vs 0.072 ms ideal implies a 99.4% stall.
    - Inferred average loading throughput during the observed stall = 25 MB / 0.012 sec = 2083.3 MB/s = ~2.08 GB/s.

    **Conclusion & Interpretation:**
    - **Result: ~2.08 GB/s Inferred Average Loading Throughput**. This is not the peak LPDDR bandwidth; it is the effective throughput available to this model load during the live-feed stall, indicating memory-bus contention from the active camera pipeline.
