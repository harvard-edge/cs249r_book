title: A17 Pro NPU Distillation Pipeline Design
scenario: You are designing an off-device knowledge distillation pipeline to compress a 7B parameter teacher model into a sub-1B parameter student for real-time inference on the Apple A17 Pro Neural Engine. The target device features a 16-core NPU delivering 35 TOPS, operates under a strict ~5W power budget, and relies on an 8 GB unified memory architecture shared across the CPU, GPU, and NPU.
question: How should a 7B teacher be distilled into an A17 Pro student optimized for INT8 real-time inference?
details:
  realistic_solution: Train the student off-device, then deploy only the compact INT8 student on the phone. Use the 7B teacher to generate soft targets and rationales on representative mobile workloads, combine logit matching with task loss, and optionally distill intermediate features where the student has matching bottleneck layers. Include quantization-aware training, calibration on device-like inputs, operator coverage checks, and latency/power profiling so the final sub-1B model fits the A17 Pro memory and real-time inference constraints.
  common_mistake: |
    **The Pitfall:** Proposing on-device distillation or continuous fine-tuning.
    **The Rationale:** Candidates try to apply general "on-device learning" paradigms without calculating memory footprints.
    **The Consequence:** A mathematically impossible design, as a 7B teacher cannot fit within the 8 GB unified memory alongside the OS.
  napkin_math: |
    **Assumptions & Constraints:**
    - Available Unified Memory: 8 GB Total - 3.5 GB (OS/Apps) = ~4.5 GB.
    - NPU Compute Budget: 35 TOPS peak; 20% effective utilization is 7 TOPS, or 7,000 GOPS.

    **Calculations:**
    - Teacher Memory (7B FP16): about 14 GB for weights alone, so the teacher cannot be resident on an 8 GB phone with OS and app memory.
    - Student Memory (1B INT8): about 1 GB for weights before scales, activations, and runtime buffers, leaving room within the approximate 4.5 GB app budget.
    - If the deployed student costs tens to hundreds of GOP per generated token after real operator lowering, 7,000 GOPS effective supports interactive rates; exact tokens/sec must come from profiling, not a 2 GOP/token assumption.

    **Conclusion & Interpretation:**
    - **Result: Deploy the student, not the teacher**. Distillation and QAT happen off-device; the deliverable is an INT8 student whose measured memory, operator support, and thermal throughput meet the mobile target.
