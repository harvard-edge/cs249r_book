title: A17 Pro CPU-NPU Pipelining
scenario: Analyzing a video stylization app where the A17 Pro Neural Engine sits idle while the CPU applies pre-processing filters frame-by-frame.
question: Implement a producer-consumer queue that pipelines CPU pre-processing of frame N+1 with NPU inference of frame N, then derive the realized throughput from the per-stage timing.
details:
  realistic_solution: 'Currently, a frame takes 30ms CPU + 20ms NPU = 50ms total (20 FPS). By decoupling the stages into a producer-consumer queue, the CPU starts preparing Frame 2 immediately after passing Frame 1 to the NPU. The bottleneck becomes the slowest stage: max(30ms, 20ms) = 30ms per frame, yielding a solid 33 FPS.'
  common_mistake: |
    **The Pitfall:** Using a single-threaded blocking call like `model.predict(preprocess(frame))`.
    **The Rationale:** Candidates often default to sequential execution, failing to realize that the CPU and NPU can operate concurrently on different frames.
    **The Consequence:** The system suffers from hardware-level starvation, resulting in low throughput (FPS).
  napkin_math: |
    1. **Sequential Time:** 30ms CPU + 20ms NPU = 50ms total (20 FPS).
    2. **Pipelined Time:** The bottleneck is the slowest stage: max(30ms, 20ms) = 30ms per frame.
    3. **Realized Throughput:** 1000ms / 30ms = **33.3 FPS**.
