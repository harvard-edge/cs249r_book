title: 'Unstructured Pruning Performance Regression on A17 Pro'
scenario: 'You deploy a vision model with 75% unstructured sparsity to a 16-core mobile Neural Engine sharing 8 GB of unified memory. Despite a 4x reduction in theoretical FLOPs, profiling shows the inference latency increased by 20% compared to the dense model, while still drawing near maximum power.'
question: 'Why does 75% unstructured sparsity cause latency regression and high power draw on a mobile Neural Engine?'
details:
  realistic_solution: |
    Unstructured sparsity destroys NPU SIMD pipeline efficiency. Mobile accelerators lack dedicated hardware logic for sparse index decoding (e.g., CSR formats). The massive overhead of fetching scattered non-zero weights from LPDDR5X memory starves the dense matrix units, tanking hardware utilization.
  common_mistake: |
    **The Pitfall:** Assuming fewer non-zero parameters strictly guarantees a proportional reduction in inference latency.
    **The Rationale:** Relying on algebraic FLOPs calculations without understanding the strict memory alignment constraints of dense hardware accelerators.
    **The Consequence:** Deploying complex sparse models that regress in both latency and battery efficiency in production.
  napkin_math: |
    **Assumptions & Constraints:**
    - Dense layer = 10 GOPs.
    - NPU peak = 35 TOPS.
    - Dense utilization = 70% (24.5 TOPS).
    - Sparse FLOPs = 2.5 GOPs.

    **Calculations:**
    - Dense latency = 10 / 24,500 = 0.4 ms.
    - Sparse unaligned memory fetches crash NPU utilization to 2% (0.7 TOPS).
    - Sparse latency = 2.5 / 700 = 3.57 ms.

    **Conclusion & Interpretation:**
    - **Result: Compute-Bound (SIMD Starvation)**. Despite 4x fewer operations, execution takes nearly 9x longer due to zero SIMD utilization.
