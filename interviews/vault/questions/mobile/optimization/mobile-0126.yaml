title: The Dynamic Shape Recompilation
scenario: You run a text-to-image diffusion model on iOS via CoreML. Users can select any target resolution via a continuous slider between 256x256 and 512x512. The NPU generates an image in 2 seconds. However, changing the resolution slider causes the immediate next generation to take 15 seconds.
question: What is CoreML doing during those extra 13 seconds?
details:
  realistic_solution: You are experiencing synchronous Just-In-Time (JIT) Recompilation. Apple's Neural Engine (ANE) requires strictly static tensor shapes for maximum throughput. Changing the input dimensions forces the CoreML compiler to tear down the graph, recalculate memory arenas, and JIT compile a brand-new hardware-specific execution graph.
  common_mistake: |
    **The Pitfall:** Believing the 13 seconds is spent linearly allocating memory for a slightly larger output image.
    **The Rationale:** Confusing millisecond-level memory allocation overhead with massive graph compilation stalls.
    **The Consequence:** Wasting time tuning memory allocators instead of bucketing inputs into pre-warmed, discrete static shapes to eliminate compilation.
  napkin_math: |
    **Assumptions & Constraints:**
    - Steady-state inference compute: 2 seconds.
    - CoreML Graph JIT compilation penalty per novel shape: ~13 seconds.

    **Calculations:**
    - First inference (dynamic shape): 13s (JIT) + 2s (Compute) = 15 seconds.
    - Subsequent inference (cached shape): 0s (JIT) + 2s (Compute) = 2 seconds.
    - Bucketing to 3 pre-compiled shapes reduces compilation wait to 0s for user.

    **Conclusion & Interpretation:**
    - **Result: 15s (Compilation-Bound)**. Apple's Neural Engine requires static execution plans; dynamic shapes trigger massive JIT compilation stalls that must be avoided via pre-warmed shape bucketing.
