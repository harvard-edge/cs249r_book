title: Continuous On-Device Sensor Fusion and Inference Pipeline
scenario: Design a real-time, always-on sensor fusion pipeline (IMU, audio, and low-res video) for contextual
  awareness on a flagship smartphone powered by a Qualcomm Hexagon NPU (Snapdragon 8 Gen 3). The system
  must continuously stream and buffer multimodal data, compute temporal features, and run a multi-headed
  transformer model at 30 inferences per second. You must architect the heterogeneous workload across
  the CPU, GPU, and NPU while ensuring the 45 TOPS INT8 compute budget is utilized efficiently and the
  shared 12-16 GB LPDDR5X memory bandwidth is strictly managed to avoid starving foreground applications.
question: "How would you build a continuous sensor fusion pipeline using low-power hubs, zero-copy buffers, and NPU bursts?"
details:
  realistic_solution: A robust architecture leverages the low-power Sensor Hub/DSP for continuous data
    ingestion and lightweight feature extraction (e.g., audio MFCCs, IMU downsampling) before writing
    aggressively quantized features to a zero-copy ring buffer in the shared 12-16 GB LPDDR5X memory.
    The Hexagon NPU is then scheduled via Qualcomm's QNN SDK to execute the INT8 quantized model in controlled
    bursts, maximizing the 45 TOPS capability without waking the main CPU cores unnecessarily.
  common_mistake: Candidates often propose routing all raw sensor data directly to the NPU or relying
    heavily on the CPU for all continuous feature extraction. They fail to account for the memory bandwidth
    bottleneck and power draw of continuous streaming to the shared LPDDR5X memory, leading to thermal
    throttling and system-wide UI jank.
  napkin_math: Assuming the transformer model requires 0.8 GOPS per inference at 30 fps, the compute load
    is 24 GOPS, utilizing a mere ~0.05% of the NPU's 45 TOPS (45,000 GOPS) INT8 capacity, leaving massive
    headroom for efficiency. For memory, streaming raw 1080p video (1920x1080x3 bytes @ 30fps) would consume
    ~186 MB/s of the shared LPDDR5X bandwidth; by downsampling at the ISP/Sensor Hub to 224x224x3 @ 10fps
    before writing to main memory, bandwidth is reduced to ~1.5 MB/s, drastically cutting active power
    consumption and cache thrashing across the heterogeneous compute blocks.
