title: 'The Thermal Camera Defocus'
scenario: 'You deploy an edge ML model on a thermal security camera. It detects humans perfectly in the winter. In the summer, the camera enclosure heats up significantly, and the model''s accuracy drops to near zero. The camera isn''t thermal throttling, and the ambient temperature isn''t higher than a human body. Raw thermal images show they are completely blurry.'
question: 'What physical property of the hardware failed to cause blurry images in the summer heat?'
details:
  realistic_solution: 'Germanium lens thermal expansion. The coefficient causes ~50um lens shift over a 30C swing. With 10um depth of field, 50um destroys optical focus — sharp 10x10 pixel faces become blurry 30x30 gradients. The model processes garbage input correctly. Fix: (1) athermalized lens design with compensating materials, (2) autofocus with calibration target, or (3) software deconvolution (partial recovery). This is a physics problem, not an ML problem.'
  common_mistake: |
    **The Pitfall:** Claiming thermal cameras can't see humans when it's hot.
    **The Rationale:** Candidates ignore the specific symptom (blurry images) and rely on a misconception about thermal imaging contrast.
    **The Consequence:** Time is wasted debugging the ML model or data pipeline when the root cause is a mechanical hardware failure.
  napkin_math: |
    **Assumptions & Constraints:**
    - A Germanium lens has a high thermal expansion coefficient.
    - Over a 30°C temperature swing, the lens might shift by 50 micrometers.
    - The camera's depth of field is only 10 micrometers.

    **Calculations:**
    - A 50μm shift completely destroys optical focus.

    **Conclusion & Interpretation:**
    - **Result: Optical Failure (Hardware-Bound)**. A sharp 10x10 pixel human face becomes a blurry 30x30 gradient, ruining model accuracy.
