title: FP16 vs INT8 Memory Bandwidth Contention on Exynos NPU
scenario: You are deploying a real-time object detection model on a Samsung Exynos 2400 NPU. The system
  features a dual-core NPU with 34.7 TOPS and relies on a shared 12 GB LPDDR5X memory pool accessed concurrently
  by the CPU, GPU, and ISP. During live camera processing, the FP16 version of the model exhibits a latency
  of 40ms with exceptionally low NPU compute utilization, while the INT8 version achieves 15ms latency.
  Explain why the FP16 model suffers from high latency and low utilization despite the NPU having ample
  compute headroom.
details:
  realistic_solution: The bottleneck is memory bandwidth contention, not compute capacity. Because the
    12 GB LPDDR5X RAM is shared, the camera ISP (writing incoming frames) and GPU (rendering the UI) consume
    a massive portion of the system's memory bandwidth. The FP16 model doubles the size of weights and
    activations compared to INT8, demanding twice the memory bandwidth to feed the compute cores. This
    starves the dual-core NPU of data, causing it to stall while waiting for memory fetches, which perfectly
    explains the low compute utilization and the high 40ms latency.
  common_mistake: Candidates often focus exclusively on the 34.7 TOPS NPU compute capacity, assuming the
    NPU simply has fewer FP16 hardware multipliers than INT8 multipliers. They fail to account for the
    shared memory architecture and the system-level bandwidth constraints imposed by concurrent ISP and
    GPU operations.
  napkin_math: Assume the system's LPDDR5X bandwidth is 51.2 GB/s, with the ISP and GPU consuming 35 GB/s
    during a live camera feed, leaving 16.2 GB/s for the NPU. If evaluating the model requires moving
    200 million elements (weights + activations) per frame at 30 FPS, the FP16 model demands (200M * 2
    bytes * 30 FPS) = 12 GB/s of memory bandwidth. The INT8 model demands (200M * 1 byte * 30 FPS) = 6
    GB/s. With the 34.7 TOPS NPU processing data much faster than it can be loaded, the FP16 model consumes
    nearly all the remaining 16.2 GB/s bandwidth, creating severe memory stalls, whereas the INT8 model
    leaves ample headroom.
