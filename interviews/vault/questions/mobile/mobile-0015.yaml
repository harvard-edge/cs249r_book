title: The App Store ML Review Trap
scenario: Your team ships an iOS app with a Core ML model that performs on-device face stylization. Apple rejects the app because it crashes immediately on an older iPhone 8. The app works perfectly on your iPhone 15 Pro test devices.
question: Why does the Core ML model compilation step fail on older ANE hardware, and how must you design your model delivery to handle Apple's heterogeneous hardware matrix?
details:
  realistic_solution: Core ML models (`.mlpackage`) are compiled on-device during the first load into a hardware-specific `.mlmodelc` format. The iPhone 15 Pro has a 16-core A17 Pro Neural Engine (ANE) that supports modern operators (like grouped convolutions or specific attention mechanisms). The iPhone 8 (A11 Bionic) has a primitive 2-core ANE with a very restricted operator set. When Core ML attempts to compile the modern model on the A11, it encounters unsupported ops. If the fallback to GPU/CPU is disabled or exceeds memory limits, the compilation fails and the app crashes.
  common_mistake: |
    **The Pitfall:** Adding a simple try/catch block around the model load.
    **The Rationale:** Developers attempt to handle the framework exception to prevent the crash without addressing the underlying hardware incompatibility.
    **The Consequence:** The crash is prevented, but the feature is broken, guaranteeing an App Store rejection.
  napkin_math: |
    * iPhone 15 Pro ANE: ~35 TOPS. iPhone 8 ANE: ~0.6 TOPS (58x slower).
    * A 33ms frame on 15 Pro takes ~2 seconds on iPhone 8.
    * RAM: 8GB vs 2GB. A 150MB model fits easily in 15 Pro but triggers OOM on iPhone 8.
    * **The hardware gap (compute and memory) makes fallback execution impossible on older devices.**
