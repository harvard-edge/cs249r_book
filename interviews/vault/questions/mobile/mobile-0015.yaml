title: The App Store ML Review Trap
scenario: Your team ships an iOS app with a Core ML model that performs on-device face stylization. The
  app works perfectly on your iPhone 15 Pro test devices. Apple rejects the app during review because
  it crashes immediately on launch. You realize Apple's review team tested it on an older iPhone 8. Why
  does the Core ML model compilation step fail on older ANE hardware, and how must you design your model
  delivery to handle Apple's heterogeneous hardware matrix?
details:
  realistic_solution: Core ML models (`.mlpackage`) are compiled on-device during the first load into
    a hardware-specific `.mlmodelc` format. The iPhone 15 Pro has a 16-core A17 Pro Neural Engine (ANE)
    that supports modern operators (like grouped convolutions or specific attention mechanisms). The iPhone
    8 (A11 Bionic) has a primitive 2-core ANE with a very restricted operator set. When Core ML attempts
    to compile the modern model on the A11, it encounters unsupported ops. If the fallback to GPU/CPU
    is disabled or exceeds memory limits, the compilation fails and the app crashes.
  common_mistake: '"Just add a try/catch block around the model load." This prevents the crash but leaves
    the user with a broken feature, guaranteeing a rejection anyway.'
  napkin_math: 'iPhone 15 Pro ANE: ~35 TOPS. iPhone 8 ANE: ~0.6 TOPS. That''s a 58× compute difference.
    A model taking 33ms (30 FPS) on the 15 Pro would take ~2 seconds per frame on the iPhone 8, even if
    it could compile. The memory gap is also massive: 8GB RAM vs 2GB RAM. A 150MB model easily fits in
    the 15 Pro''s memory budget but will trigger an immediate OOM kill on the iPhone 8 before compilation
    even finishes.'
  options:
  - Just add a try/catch block around the model load.. This prevents the crash but leaves the user with
    a broken feature, guaranteeing a rejection anyway.
  - The bottleneck is in the software framework, not the hardware; switching to a lower-level API will
    achieve near-theoretical-peak performance.
  - Core ML models (`.mlpackage`) are compiled on-device during the first load into a hardware-specific
    `.mlmodelc` format. The iPhone 15 Pro has a 16-core A17 Pro Neural Engine (ANE) that supports modern
    operators (like grouped convolutions or specific attention mechanisms).
  - The memory leak is in the framework's autograd graph; disabling gradient computation with torch.no_grad()
    will fix it.
  correct_index: 2
