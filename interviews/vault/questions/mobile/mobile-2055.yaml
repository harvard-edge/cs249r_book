title: Persistent State Strategy for Background Training
scenario: A background federated learning task takes 5 minutes per round. The OS OOM killer evicts background apps with a Mean Time Between Failures of 3 minutes.
question: "How would you design a checkpointing strategy that ensures forward progress without destroying the device's NAND flash?"
details:
  realistic_solution: |
    Utilize an OS memory-pressure hook to flush checkpoints to NAND only when eviction is imminent, keeping intermediate micro-batches purely in volatile RAM.
  common_mistake: |
    **The Pitfall:** Recommending fixed-interval flash saves.
    **The Rationale:** Candidates rely on traditional server-side checkpointing logic without quantifying the mobile NAND wear out.
    **The Consequence:** The app will quickly degrade the user's local flash storage through gigabytes of daily write amplification.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Round time: 5 minutes.
       - Eviction MTBF: 3 minutes.
       - Checkpoint size: 50 MB.
    2. **Calculations:**
       - Required save frequency: 1 minute (to beat 3min MTBF).
       - Saves per 1000 rounds: 5 saves/round * 1000 = 5000 saves.
       - Flash writes: 5000 * 50 MB = 250 GB.
    3. **Conclusion & Interpretation:**
       - **Result: Flash Wearout.** Saving continuously generates 250GB of overhead, destroying NAND endurance. An OS memory-pressure hook is required to save only when eviction is imminent.
