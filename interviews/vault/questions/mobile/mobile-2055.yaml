title: Persistent State Strategy for Background Training
scenario: A background on-device federated learning task on a Snapdragon 8 Gen 3 takes
  5 minutes per round. The OS OOM killer evicts background apps with a Mean Time Between
  Failures of 3 minutes.
question: Evaluate a checkpointing design that ensures forward progress across 1000
  rounds without destroying the device's NAND flash through excessive write amplification.
details:
  realistic_solution: Saving the full model state (e.g., 50MB) every minute to NAND
    flash guarantees progress but writes 50GB over 1000 rounds, causing extreme flash
    wear. The evaluated solution must utilize an OS memory-pressure hook (e.g., onTrimMemory
    in Android) to flush checkpoints to NAND only when eviction is imminent, keeping
    intermediate micro-batches purely in volatile RAM.
  common_mistake: Recommending fixed-interval flash saves without quantifying the
    NAND wear out and latency hit caused by gigabytes of daily writes.
  napkin_math: 50MB * 1000 rounds * 5 saves/round = 250GB written (too high).
