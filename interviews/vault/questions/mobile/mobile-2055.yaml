title: Persistent State Strategy for Background Training
scenario: A background on-device federated learning task takes 5 minutes per round. The OS OOM killer evicts background apps with a Mean Time Between Failures of 3 minutes.
question: How would you design a checkpointing strategy that ensures forward progress without destroying the device's NAND flash?
details:
  realistic_solution: Utilize an OS memory-pressure hook to flush checkpoints to NAND only when eviction is imminent, keeping intermediate micro-batches purely in volatile RAM.
  common_mistake: |
    **The Pitfall:** Recommending fixed-interval flash saves.
    **The Rationale:** Candidates rely on traditional server-side checkpointing logic without quantifying the mobile NAND wear out.
    **The Consequence:** The app will quickly degrade the user's local flash storage through gigabytes of daily write amplification.
  napkin_math: |
    1. Identify frequency: With a 3-minute MTBF and 5-minute rounds, saves must happen frequently (e.g., every 1 minute) to make progress.
    2. Calculate total saves: 5 saves per round * 1000 rounds = 5000 saves.
    3. Calculate flash write volume: 50MB per save * 5000 saves = **250GB written**.
    4. Evaluate viability: 250GB of pure overhead writes is too high for mobile NAND endurance.
