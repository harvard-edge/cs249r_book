title: 'Network Bandwidth Bottlenecks: Recall LPDDR5X Bandwidth and Mobile Memory Hierarchy'
scenario: A mobile ML engineer asks about comparative memory bandwidth on modern mobile SoCs.
question: What is the memory bandwidth of LPDDR5X on Snapdragon 8 Gen 3, how does it compare to LPDDR5 on Tensor G3, and why does this matter for LLM inference?
details:
  realistic_solution: 'Snapdragon 8 Gen 3: LPDDR5X-4200, 4×16-bit channels. BW: 4×(4200MT/s × 16bits/8) = 4×8.4GB/s = 33.6GB/s? No: LPDDR5X-4200 at 4 channels × 64-bit each (but mobile: typically 2×64-bit): 2×4200MT/s×8B=67.2GB/s. Official: ~77GB/s. Tensor G3: LPDDR5 at 51.2GB/s. Difference: 77-51.2=25.8GB/s (50% more on SD8G3). Implication: 1B INT4 TPOT on SD8G3: 0.5GB/77=6.5ms. On Tensor G3: 0.5GB/51.2=9.8ms. 1.5× faster decode on Snapdragon.'
  common_mistake: |
    **The Pitfall:** Confusing LPDDR5X bandwidth with total memory bandwidth or ignoring shared memory limits.
    **The Rationale:** Candidates forget that the ~77 GB/s bandwidth is shared between CPU, GPU, DSP, and all other SoC components.
    **The Consequence:** Overestimating available bandwidth for LLM decode, leading to missed TPOT targets.
  napkin_math: |
    1. LPDDR5X Bandwidths: SD8G3 = 77 GB/s, A17 Pro = ~68 GB/s, Tensor G3 = ~51.2 GB/s.
    2. Compute TPOT for 1B INT4: 0.5 GB weights per token.
    3. SD8G3 TPOT: 0.5 GB / 77 GB/s = 6.5 ms.
    4. Tensor G3 TPOT: 0.5 GB / 51.2 GB/s = 9.8 ms.
    **Conclusion:** SD8G3 is 1.5x faster for LLM decode due entirely to memory bandwidth.
