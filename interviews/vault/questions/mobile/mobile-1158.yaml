title: Low Compute Utilization During On-Device Decoding
scenario: Your team deployed a 100M parameter encoder-decoder model for on-device
  translation on the Apple A17 Pro Neural Engine. Profiling shows that during the
  encoder phase, the 16-core Neural Engine achieves high utilization and processes
  the input prompt almost instantly. However, during the autoregressive decoder phase,
  text generation is sluggish, the device approaches its ~5W power limit quickly,
  and Neural Engine compute utilization drops below 2%. Given the A17 Pro's 35 TOPS
  capability and 8 GB of shared unified memory, what architectural characteristic
  of the encoder-decoder model causes this specific hardware symptom?
question: Given the A17 Pro's 35 TOPS capability and 8 GB of shared unified memory,
  what architectural characteristic of the encoder-decoder model causes this specific
  hardware symptom?
details:
  realistic_solution: The root cause is memory bandwidth starvation during autoregressive
    decoding. The encoder processes the input sequence in parallel, keeping the 16-core
    Neural Engine fully fed and efficiently leveraging the 35 TOPS. The decoder, however,
    generates one token at a time, requiring the entire weight matrix and growing
    KV cache to be loaded from the 8 GB unified memory for every single step. This
    constant fetching saturates the memory bus and causes high power draw, while the
    compute units sit idle waiting for data.
  common_mistake: Candidates often assume the 35 TOPS compute limit is the bottleneck
    for generation, or that the 8 GB shared memory is insufficient in capacity to
    hold the 100M parameter model. They fail to distinguish between the compute-bound
    nature of parallel encoding and the memory-bandwidth-bound nature of sequential
    autoregressive decoding.
  napkin_math: 'For a 100M parameter model quantized to 8-bit (100 MB weights): The
    A17 Pro Neural Engine delivers 35 TOPS. Generating 1 token takes ~200M operations.
    Compute time per token: 200M ops / 35 TOPS = ~0.0057 ms (175,000 tokens/sec theoretical
    compute bound). However, loading the 100 MB weights per token across a typical
    ~50 GB/s mobile memory bandwidth takes: 100 MB / 50 GB/s = 2 ms per token (500
    tokens/sec maximum memory bound). The decoder is memory-bandwidth bound by a factor
    of 350x, explaining the <1% compute utilization and the ~5W power drain from constant
    memory access.'
