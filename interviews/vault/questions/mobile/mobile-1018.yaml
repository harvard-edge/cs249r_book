title: 'Network Bandwidth Bottlenecks: Specify Bandwidth SLA for Mobile LLM App Quality'
scenario: Specify bandwidth requirements and QoS policies for a mobile LLM app on a device with 77 GB/s memory bandwidth. The app must guarantee TPOT < 25ms P95 for the LLM while maintaining 60fps display and always-on speech recognition.
question: What bandwidth reservations, priorities, throttles, and fallbacks are needed to keep mobile LLM TPOT under 25ms P95?
details:
  realistic_solution: 'Bandwidth reservations: Priority 1 (LLM decode, when active): 72GB/s. Priority 2 (display 60fps): 1.5GB/s. Priority 3 (ASR): 0.01GB/s. Priority 4 (other): 3.49GB/s. Total during LLM: 77GB/s. TPOT guarantee: 1.5GB/(77-1.5-0.01-background)=1.5/74.49=20.1ms < 25ms. Fallback: if background exceeds 3.49GB/s -> accept 25ms+ TPOT and emit warning. Throttle: if TPOT > 30ms for 5 consecutive tokens -> reduce display to 30fps (saves 0.75GB/s) -> release to LLM.'
  common_mistake: |
    **The Pitfall:** Specifying static bandwidth reservations without a dynamic fallback policy.
    **The Rationale:** Candidates assume peak hardware bandwidth is exclusively available and ignore operating system queuing behaviors under oversubscription.
    **The Consequence:** The LLM decode process misses its 25ms P95 SLA when background OS tasks spike.
  napkin_math: |
    1. Assumptions & Constraints:
       - Memory bandwidth: 77 GB/s.
       - Required LLM Bandwidth for 20ms TPOT: 1.5 GB / 20ms = 75 GB/s.
       - Display (60fps) = 1.5 GB/s, ASR = 0.01 GB/s, OS Baseline = 1 GB/s.
    2. Calculations:
       - Total requested: 75 + 1.5 + 0.01 + 1 = 77.51 GB/s (Exceeds 77 GB/s).
       - Throttle policy (Display to 30fps) saves 0.75 GB/s.
       - New total: 75 + 0.75 + 0.01 + 1 = 76.76 GB/s.
    3. Conclusion & Interpretation:
       - **Result: Fits within 77 GB/s budget, ensuring TPOT stays under 25ms (Bandwidth-Bound).**
