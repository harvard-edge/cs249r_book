title: Optimizing LLM Inference on Snapdragon 8 Gen 3 with INT4 Quantization
scenario: You are tasked with deploying a 7B parameter Large Language Model (LLM)
  on a mobile device powered by the Snapdragon 8 Gen 3 Hexagon NPU, which boasts 45
  TOPS (INT8) and 12-16 GB LPDDR5X memory. The current LLM uses INT8 quantization,
  but to meet stringent latency and memory footprint requirements for real-time conversational
  AI, you need to achieve sub-200ms per token generation and reduce memory usage by
  at least 30%. Your initial profiling shows that the memory bandwidth and compute
  utilization for INT8 are the primary bottlenecks. The model's weights and activations
  are currently quantized per-tensor with symmetric zero-point. Propose a comprehensive
  strategy to transition to INT4 quantization, detailing the challenges, calibration
  strategies, and how to quantify the expected performance gains, considering both
  PTQ and QAT approaches.
question: How would you optimize Snapdragon 8 Gen 3 LLM inference with INT4 quantization?
details:
  realistic_solution: 'A realistic solution involves a hybrid approach: start with
    robust PTQ calibration using a diverse, representative dataset for optimal per-channel
    quantization of weights and per-tensor dynamic quantization for activations. For
    critical layers exhibiting significant accuracy drops, employ Quantization-Aware
    Training (QAT) for a few epochs with a small learning rate to recover precision.
    Implement zero-point arithmetic carefully, ensuring the NPU''s custom instructions
    are utilized efficiently. Use fine-grained analysis to identify outlier channels
    or layers that would benefit more from mixed-precision (e.g., keeping sensitive
    layers in INT8 or FP16) if pure INT4 doesn''t meet accuracy targets. Leverage
    the Hexagon NPU''s specific SDK to map quantized operations for optimal performance
    and memory access patterns.'
  common_mistake: A common mistake is blindly applying INT4 post-training quantization
    (PTQ) without considering the impact of activation ranges and specific layer sensitivities,
    often leading to significant accuracy degradation. Another pitfall is neglecting
    the complexities of zero-point arithmetic when transitioning from symmetric INT8
    to asymmetric INT4, or mismanaging calibration datasets, which results in sub-optimal
    quantization parameters that don't effectively utilize the NPU's INT4 capabilities.
  napkin_math: '**Memory Reduction (from INT8 to INT4):** A 7B parameter model in
    INT8 requires ~7B * 1 byte/param = 7 GB. In INT4, it requires ~7B * 0.5 bytes/param
    = 3.5 GB. This represents a 50% memory reduction (3.5 GB saved), exceeding the
    30% target and fitting well within the 12-16 GB LPDDR5X. **Theoretical Compute
    Throughput (simplified):** Assuming a 2x efficiency gain for INT4 over INT8 (due
    to reduced data movement and potentially specialized INT4 units), the effective
    TOPS could theoretically double from 45 TOPS INT8 to ~90 effective TOPS INT4.
    This implies a significant reduction in computation time. **Latency Impact:**
    If both memory bandwidth and compute bottlenecks are effectively halved, an ideal
    latency reduction would be 2x. For example, if current INT8 takes 300ms/token,
    INT4 could theoretically achieve 150ms/token, meeting the sub-200ms target. Real-world
    gains might be 1.5x to 1.8x due to software overheads and varying layer complexities.'
