title: 'Edge Vision Model: CNN vs ViT Deployment'
scenario: You are deploying a real-time object detection model on a mobile phone with a Qualcomm NPU (8
  TOPS INT8, 2 MB SRAM). Compare deploying a MobileNetV2-based detector vs a Mobile ViT model of equivalent
  accuracy. Which architecture is better suited to this hardware, and why?
details:
  realistic_solution: 'MobileNetV2 wins on this hardware for several reasons: (1) Depthwise separable
    convolutions map perfectly to NPU hardware (fixed 3×3 or 5×5 kernels, regular memory access). (2)
    The activation tensors are small at each layer (pooling reduces spatial dimensions progressively),
    fitting in the 2 MB SRAM. (3) INT8 quantization is straightforward for conv layers (well-studied,
    minimal accuracy loss). Mobile ViT challenges: (1) Self-attention requires dynamic memory allocation
    for the $S \times S$ score matrix, which NPU compilers handle poorly. (2) Softmax and LayerNorm require
    FP16/FP32, forcing mixed-precision execution and NPU-to-CPU fallback. (3) Attention is memory-bandwidth-bound
    — wasteful on an NPU designed for high-compute-intensity convolutions. (4) Quantizing attention to
    INT8 often degrades quality more than quantizing convolutions.'
  common_mistake: Choosing ViT because it's 'newer' without considering the hardware constraints. Mobile
    NPUs are optimized for regular, channel-wise operations like depthwise separable convolutions — not
    the dynamic attention patterns in ViT.
  napkin_math: 'MobileNetV2: ~300M MACs (~600M FLOPs), peak activations ~1 MB (fits SRAM). On 8 TOPS NPU:
    600M FLOPs / 8 TFLOPS = 0.075 ms theoretical, but real-world NPU utilization is ~5-10% due to operator
    dispatch, data marshalling, and memory stalls. Realistic latency: ~2-3 ms. Mobile ViT: ~1 GFLOP with
    attention scores for 196 patches = 196^2 x 2B = ~75 KB per head x 12 heads = 0.9 MB (fits SRAM, but
    irregular access pattern). Dynamic shapes in attention prevent NPU kernel fusion. Realistic latency:
    ~40 ms due to NPU fallback to CPU for attention ops.'
