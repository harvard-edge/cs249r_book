title: Continuous Video Feature Ingestion Power Analysis
scenario: A streaming pipeline extracts features from a 60 FPS camera. Each frame requires 0.2 TOPS and 50 MB bandwidth. The NPU consumes 1W/10 TOPS; memory consumes 1W/10 GB/s. The thermal budget is 5W.
question: How much power does continuous 60 FPS feature ingestion consume, and why does a concurrent game exceed the thermal budget?
details:
  realistic_solution: 'The candidate must calculate both compute and memory power to find the pipeline''s baseline (1.5W). For the system behavior analysis, they should explain that unified memory is shared between the CPU, GPU, and NPU. The continuous 60 FPS ingestion creates persistent memory traffic that prevents the memory controllers from entering low-power sleep states. When a game runs simultaneously, the GPU''s high bandwidth demands stack on top of the streaming pipeline''s baseline, saturating the shared bus and easily pushing the entire System-on-Chip past the 5W thermal envelope, leading to severe throttling.'
  common_mistake: |
    **The Pitfall:** Ignoring the power cost of memory bandwidth.
    **The Rationale:** Candidates only calculate the compute power (1.2W) and wrongly assume the pipeline is lightweight enough.
    **The Consequence:** Failing to realize that continuous memory traffic prevents sleep states, causing the shared physical bus to quickly exceed thermal limits during concurrent tasks.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Compute Requirement: 0.2 TOPS/frame at 60 FPS.
       - Memory Bandwidth: 50 MB/frame at 60 FPS.
       - Compute Power Cost: 1W per 10 TOPS.
       - Memory Power Cost: 1W per 10 GB/s.
       - Thermal Budget: 5W.
    2. **Calculations:**
       - Compute Power: (0.2 TOPS * 60 FPS) = 12 TOPS. 12 TOPS * (1W / 10 TOPS) = 1.2 W.
       - Memory Power: (50 MB * 60 FPS) = 3 GB/s. 3 GB/s * (1W / 10 GB/s) = 0.3 W.
       - Baseline Power: 1.2 W + 0.3 W = 1.5 W.
    3. **Conclusion & Interpretation:**
       - **Result: Thermal-Bound.** The pipeline consumes 1.5 W (30% of the 5W budget) statically, causing throttling when a game triggers high GPU draw.
