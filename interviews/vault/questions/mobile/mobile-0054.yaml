title: The Cellular Download Wall
scenario: Your team has developed a new 250 MB generative AI model for your company's popular photo editing app. The lead engineer suggests bundling the model directly into the app binary for simplicity. The current app is 50 MB.
question: From a platform distribution perspective, what is the most critical, immediate problem with this approach?
details:
  realistic_solution: The combined size of the app (50 MB) and the model (250 MB) is 300 MB. This exceeds the ~200 MB over-the-air (OTA) download limit set by major mobile platforms like the Apple App Store and Google Play. Forcing users to be on Wi-Fi to download or update the app is a major deterrent that severely impacts acquisition rates. The standard practice is to use on-demand resource frameworks to download large assets like models after the initial installation.
  common_mistake: |
    **The Pitfall:** Focusing exclusively on total device storage or RAM constraints.
    **The Rationale:** Engineers without mobile-specific experience often overlook platform-enforced delivery mechanisms.
    **The Consequence:** The team ships an app update that cannot be downloaded over cellular networks, severely damaging user acquisition and update adoption rates.
  napkin_math: |
    **Assumptions & Constraints:**
    - Base App Binary = 50 MB
    - Model Asset = 250 MB
    - Cellular OTA limit = 200 MB

    **Calculations:**
    - Total Bundle Size = 50 MB + 250 MB = 300 MB
    - Margin vs Limit = 300 MB > 200 MB

    **Conclusion & Interpretation:**
    - **Result: 300 MB (Distribution Blocked)**. The 300 MB bundle exceeds the cellular OTA download limit, preventing mobile installs without Wi-Fi and destroying user acquisition metrics.
  options:
  - The model is too large to fit into the device's RAM during runtime.
  - It exceeds the ~200 MB cellular download limit, preventing users from installing the app without Wi-Fi.
  - The 300 MB app size will take up too much of the user's total phone storage.
  - Large app binaries significantly increase the time it takes for app store review and approval.
