title: 'Watchdog Resets from NPU Memory Contention'
scenario: A hazard detection system on the Exynos 2400 NPU experiences sporadic watchdog timer resets. These resets only occur concurrently with heavy CPU OS tasks and high-resolution ISP video streams.
question: What hardware architecture bottleneck causes these sudden latency spikes and watchdog resets?
details:
  realistic_solution: 'The root fault originates in Unified Memory Architecture (UMA). Despite abundant 34.7 TOPS compute, aggressive DMA requests from the CPU and ISP saturate the memory controller, starving the NPU of activations/weights. This non-deterministic memory starvation forces execution times past the strict WDT threshold, triggering hard resets.'
  common_mistake: |
    **The Pitfall:** Misdiagnosing the latency spikes as thermal throttling or insufficient NPU compute.
    **The Rationale:** Failing to consider the contention overhead on a unified memory architecture from concurrent CPU/ISP workloads.
    **The Consequence:** Applying optimizations to the NPU compute graph that do not resolve the memory starvation bottleneck.
  napkin_math: |
    **Assumptions & Constraints:**
    - NPU Compute: 34.7 TOPS.
    - Required data per frame: 100 MB.
    - Throttled bandwidth (due to ISP/CPU): 4 GB/s.

    **Calculations:**
    - Compute time: 173.5 GOPs / 34,700 GOPs/sec = 5 ms.
    - Data transfer time: 100 MB / 4000 MB/s = 25 ms.
    - Total latency: 5 ms + 25 ms = 30 ms.

    **Conclusion & Interpretation:**
    - **Result: 30 ms (Memory-Contention Bound)**. Latency of 30 ms exceeds a strict 10 ms watchdog threshold, triggering a reset.
