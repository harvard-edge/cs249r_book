title: Watchdog Resets from NPU Memory Contention
scenario: A hazard detection system on the Exynos 2400 NPU (34.7 TOPS, shared 12GB LPDDR5X) experiences sporadic watchdog timer resets. These resets only occur concurrently with heavy CPU OS tasks and high-resolution ISP video streams.
question: What hardware architecture bottleneck causes these sudden latency spikes and watchdog resets?
details:
  realistic_solution: The root cause is memory bandwidth contention on the shared 12 GB LPDDR5X. Although the dual-core NPU has sufficient compute at 34.7 TOPS, the heavy concurrent memory requests from the CPU and ISP saturate the memory controller. This starves the NPU of weight and activation data, destroying deterministic execution guarantees and causing the inference latency to exceed the watchdog timer's safety threshold.
  common_mistake: |
    **The Pitfall:** Misdiagnosing the latency spikes as thermal throttling or insufficient NPU compute.

    **The Rationale:** Failing to consider the contention overhead on a unified memory architecture from concurrent CPU/ISP workloads.

    **The Consequence:** Applying optimizations to the NPU compute graph that do not resolve the memory starvation bottleneck.
  napkin_math: |
    *   Compute time: 173.5 GOPs / 34,700 GOPs/sec = 5 ms.
    *   Required data per frame: 100 MB.
    *   Throttled bandwidth (due to ISP/CPU contention): 4 GB/s.
    *   Data transfer time: 100 MB / 4000 MB/s = 25 ms.
    *   Total latency: 5 ms + 25 ms = 30 ms.
    *   **Result:** Latency of 30 ms exceeds a strict 10 ms watchdog threshold, triggering a reset.
