title: Evaluating Adversarial Defenses on Snapdragon NPU
scenario: You are designing the defense mechanism for a real-time biometric authentication model running on a smartphone powered by a Qualcomm Hexagon NPU (Snapdragon 8 Gen 3). The system must be robust against physical adversarial presentation attacks.
question: 'Which adversarial defense is more efficient on Snapdragon 8 Gen 3: an INT8 NPU ensemble or randomized smoothing?'
details:
  realistic_solution: Option A is the superior system-level choice. The Hexagon NPU's 45 TOPS INT8 capacity can easily handle an ensemble of smaller models concurrently, keeping the entire pipeline within the NPU. This avoids cross-processor synchronization and prevents thrashing the shared 12-16 GB LPDDR5X memory, maintaining strict latency budgets for authentication while providing strong empirical robustness.
  common_mistake: |
    **The Pitfall:** Choosing randomized smoothing for its theoretical robustness guarantees without profiling its system-level overhead.
    **The Rationale:** Academic ML researchers often ignore the extreme cost of CPU/NPU synchronization and shared memory bus thrashing when bouncing multiple noisy variants across processors.
    **The Consequence:** Massive power drain, latency spikes, and failure to meet the real-time authentication deadline.
  napkin_math: |
    - **Input Frame:** 224x224x3 (~150 KB).
    - **Option A (INT8 Ensemble):** 3 models * 1 GOPS = 3 GOPS. Reads 150 KB once. Runs entirely in the low-power NPU.
    - **Option B (Randomized Smoothing):** 10 variants * 1 model = 20 GOPS. CPU must write 1.5 MB to shared memory and wake the NPU.
    - **Memory Traffic:** At 30 FPS, Option B demands **45 MB/s of continuous cross-component traffic**, preventing the CPU from sleeping.
    - **Conclusion:** Option A is vastly superior for system efficiency.
