title: Portable On-Device LLM Inference Across Mobile Platforms
scenario: 'You want to run a 3B parameter LLM on-device for a mobile chat app. Target
  devices: iPhone 15 Pro (A17 Pro, 8GB RAM, 35 TOPS ANE) and Samsung S24 (Snapdragon
  8 Gen 3, 12GB RAM, 45 TOPS NPU). The model must fit in memory and generate >10 tokens/sec
  on both. Design the portable serving architecture.'
question: How would you serve a 3B LLM at over 10 tok/s on both A17 Pro and Snapdragon
  8 Gen 3 without exceeding mobile memory?
details:
  realistic_solution: 'Architecture: (1) Model format: GGUF via llama.cpp, which runs
    on both Metal (iOS) and Vulkan/OpenCL (Android). (2) Quantization: W4 group quantization
    (Q4_K_M in GGUF) — 3B model weights = ~1.7GB. KV cache for 2048 context: ~200MB.
    Total ~1.9GB, fits both devices. (3) iOS: llama.cpp with Metal backend, leveraging
    Apple GPU (not ANE — attention ops are not ANE-friendly). (4) Android: llama.cpp
    with Vulkan backend for Adreno 750 GPU. (5) Token generation rate: Apple A17 Pro
    GPU achieves ~15-20 tok/sec for 3B Q4. Snapdragon 8G3 via Vulkan: ~12-16 tok/sec.
    Both exceed 10 tok/sec target.'
  common_mistake: Using the same quantization level on both platforms. iPhone 15 Pro
    has only 8GB RAM (shared with OS, ~5GB available for ML), while S24 has 12GB (8GB
    available). A 3B model at W4A16 takes ~1.5GB weights + KV cache — fits both, but
    iPhone is tighter.
  napkin_math: '3B params x 0.5625 bytes (Q4_K_M average) = 1.69GB weights. KV cache
    at 2048 tokens, 32 layers, 32 heads, 128 dim: 2048 x 32 x 2 x 32 x 128 x 2 bytes
    = 1.07GB. Total: 2.76GB. iPhone budget 5GB: fits. S24 budget 8GB: fits easily.'
