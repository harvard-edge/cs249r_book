title: Portable On-Device LLM Inference Across Mobile Platforms
scenario: 'You want to run a 3B parameter LLM on-device for a mobile chat app. Target devices: iPhone 15 Pro and Samsung Galaxy S24. The model must fit in memory and generate >10 tokens/sec on both.'
question: How would you serve a 3B LLM at over 10 tok/s on both A17 Pro and Snapdragon 8 Gen 3 without exceeding mobile memory?
details:
  realistic_solution: 'Architecture: (1) Model format: GGUF via llama.cpp, which runs on both Metal (iOS) and Vulkan/OpenCL (Android). (2) Quantization: W4 group quantization (Q4_K_M in GGUF) — 3B model weights = ~1.7GB. KV cache for 2048 context: ~200MB. Total ~1.9GB, fits both devices. (3) iOS: llama.cpp with Metal backend, leveraging Apple GPU (not ANE — attention ops are not ANE-friendly). (4) Android: llama.cpp with Vulkan backend for Adreno 750 GPU. (5) Token generation rate: Apple A17 Pro GPU achieves ~15-20 tok/sec for 3B Q4. Snapdragon 8G3 via Vulkan: ~12-16 tok/sec. Both exceed 10 tok/sec target.'
  common_mistake: |
    **The Pitfall:** Using the same quantization level on both platforms without checking constraints.
    **The Rationale:** iPhone 15 Pro has only 8GB RAM (shared with OS), while S24 has 12GB.
    **The Consequence:** The model will OOM on the iPhone if not aggressively quantized to W4.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Quantization: Q4_K_M (4-bit).
       - Parameters: 3B.
       - Context Length: 2048.
    2. **Calculations:**
       - Weights Size (Q4_K_M): 3B params * 0.5625 bytes = 1.69 GB.
       - KV Cache Size (2048 ctx): 2048 * 32 * 2 * 32 * 128 * 2 bytes = 1.07 GB.
       - Total Memory Required: 1.69 GB + 1.07 GB = 2.76 GB.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound.** 2.76 GB fits easily within the limits of both devices.
