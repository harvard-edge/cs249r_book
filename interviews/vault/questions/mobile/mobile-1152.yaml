title: Diagnosing High Latency in On-Device Gemini Nano Sanitization
scenario: "You are deploying Gemini Nano on the Google Tensor G3 to power a new on-device messaging assistant. To defend against prompt injection, user inputs are routed through a smaller, dedicated 'sanitizer' model before hitting the main LLM. However, telemetry shows that total response latency has spiked to over 1.5 seconds, even for short messages. The main Gemini Nano model is running optimally on the TPU, but the system is bottlenecking."
question: "How would you analyze the interaction between the models and the hardware to identify the root cause of the latency?"
details:
  realistic_solution: The root cause is likely memory bandwidth contention and CPU overhead. While the Tensor G3 has a capable TPU (7.5 TOPS), running a sequential pipeline means context switching and moving activations between memory and the TPU. If the sanitizer model is running on the CPU or DSP while Gemini Nano is swapped into the TPU, or if both are competing for the 12 GB LPDDR5X bandwidth, the overhead of loading weights and activations sequentially dominates the actual inference time.
  common_mistake: |
    **The Pitfall:** Assuming the TPU compute is too slow for two models.
    **The Rationale:** Candidates assume the compute capacity is lacking or that prompt attacks add compute, without investigating the sequential memory swapping overhead.
    **The Consequence:** Unnecessary model compression that fails to address the root cause.
  napkin_math: |
    - Assume the sanitizer model is 100M parameters (`100MB` in INT8) and Gemini Nano is 1.8B parameters (`1.8GB` in INT8).
    - The Tensor G3 LPDDR5X has roughly 50 GB/s bandwidth.
    - Swapping models sequentially adds `(100MB + 1.8GB) / 50 GB/s * 2 (read/write) = ~76ms` pure I/O overhead per turn.
    - **Conclusion:** The **76ms memory context switch** dominates the actual compute time (which is only ~50ms).
