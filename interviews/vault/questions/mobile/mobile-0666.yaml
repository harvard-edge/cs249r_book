title: The App Memory Pressure Levels
scenario: You are building an iOS app that runs a 1.2 GB CoreML model on a device with 6 GB RAM. During testing, the app works fine in isolation but gets killed when the user switches to Safari and back.
question: Why can a 1.2GB CoreML model be killed under iOS memory pressure, and how should weights be loaded to avoid Jetsam?
details:
  realistic_solution: iOS memory management aggressively issues Jetsam events to kill background apps, ensuring foreground fluidity. On a 6 GB device, the OS sets a hard Jetsam limit around 3 GB per app. With ~750 MB of base app overhead, the realistic foreground model budget is 2.25 GB. A 1.2 GB model works perfectly in isolation. However, when backgrounded, the Jetsam limit drops dramatically. To fix this, load the model weights using `mmap()`. Mmapped memory can be cleanly evicted by the OS when backgrounded and reloaded via page faults when brought to the foreground, preventing an OOM crash.
  common_mistake: |
    **The Pitfall:** Believing that "iOS has 6 GB, my model is 1.2 GB, so I have 4.8 GB free."
    **The Rationale:** This ignores that iOS reserves substantial memory for the kernel and system daemons, and background apps face draconian memory ceilings.
    **The Consequence:** The app inevitably crashes or gets killed in the background when the Jetsam limit drops.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Device RAM: 6.0 GB.
       - OS reserved RAM: ~1.8 GB.
       - Foreground Jetsam limit: ~3.0 GB.
       - App overhead: ~0.75 GB.
    2. **Calculations:**
       - Foreground budget = 3.0 GB - 0.75 GB = 2.25 GB.
       - Model size = 1.2 GB (fits easily in 2.25 GB foreground budget).
       - Background Jetsam limit < 1.95 GB (triggers kill).
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound (Capacity).** Use `mmap()` for weights so the OS can evict and reload pages without killing the app via Jetsam.
