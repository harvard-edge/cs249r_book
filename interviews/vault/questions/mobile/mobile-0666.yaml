title: The App Memory Pressure Levels
scenario: You're building an iOS app that runs a 1.2 GB CoreML model on an iPhone 15 with 6 GB RAM. During
  testing, the app works fine in isolation but gets killed when the user switches to Safari and back.
  Walk through iOS memory pressure levels and calculate at what model size your app starts getting killed
  on a 6 GB device.
question: "Why can a 1.2GB CoreML model be killed under iOS memory pressure, and how should weights be loaded to avoid Jetsam?"
details:
  realistic_solution: iOS memory management aggressively kills background apps to ensure foreground fluidity.
    On a 6 GB device, the OS reserves ~1.8 GB, setting a hard Jetsam limit around 3 GB per app. With ~750
    MB of base app overhead (UI, Swift runtime, image buffers), the realistic model budget is 3.0 GB -
    0.75 GB = 2.25 GB (absolute maximum) or 1.75 GB (safe). A 1.2 GB model works perfectly. However, when
    the user switches to Safari, your app is backgrounded and the Jetsam limit drops dramatically. To
    fix this, load the model weights using `mmap()` (the default for CoreML in recent iOS versions, but
    must be configured correctly). Mmapped memory can be cleanly evicted by the OS when backgrounded and
    reloaded when paged back in, preventing the app from being killed.
  common_mistake: '"iOS has 6 GB, my model is 1.2 GB, so I have 4.8 GB free." This ignores that iOS reserves
    substantial memory for the kernel, system daemons, and the foreground app gets a *fraction* of total
    RAM.'
  napkin_math: '6 GB device. OS: ~1.8 GB. Jetsam limit: ~3 GB. App overhead: ~750 MB. Model budget: 3.0
    - 0.75 = **2.25 GB** (aggressive) or 2.5 - 0.75 = **1.75 GB** (safe with headroom). A 2 GB model works
    in isolation but gets jetsammed under memory pressure. Use `mmap()` for weights — the OS can evict
    and reload pages without killing the app.'
