title: The Photo Segmentation Pipeline
scenario: A Portrait Mode photo pipeline on a Pixel 8 Pro (Tensor G3) consists of capture, depth estimation, person segmentation, and bokeh rendering. The user expects the result within 500ms. The Tensor G3 has a dual-core TPU at 10 TOPS and an Adreno-class GPU.
question: What is the latency breakdown for Pixel Portrait Mode, and which stage is the bottleneck?
details:
  realistic_solution: 'Break down each stage: ISP: 100ms (fixed). Depth: 45ms (TPU). Segmentation: 25ms (TPU). Bokeh at 12 MP: 130ms (GPU, bottleneck). Bokeh at 3 MP: 30ms (GPU). Total optimized: **200ms** (within 500ms budget, 60% margin). The ML stages (depth + segmentation) total 70ms — only 35% of the pipeline. The ISP and rendering dominate.'
  common_mistake: |
    **The Pitfall:** Assuming the ML model is always the performance bottleneck.
    **The Rationale:** Candidates default to focusing on deep learning inference latency, forgetting the end-to-end system context.
    **The Consequence:** They optimize the wrong components while the ISP processing and GPU rendering dominate the actual critical path.
  napkin_math: |
    - **ISP Time:** 100ms (fixed)
    - **Depth (TPU):** 45ms
    - **Segmentation (TPU):** 25ms
    - **Bokeh at 3 MP (GPU):** 30ms
    - **Total Latency:** 100 + 45 + 25 + 30 = 200ms.
    - **Final Result:** **ML stages total 70ms (35%); the true bottlenecks are the ISP and GPU rendering.**
