title: The Laggy Generative Uncrop
scenario: You are diagnosing a Generative Uncrop feature taking 1.5 seconds. Mobile network RTT is 80ms. The backend 10B parameter model is sharded across 4 H100 GPUs using tensor parallelism. Pure GPU compute is 150ms. Each of the 40 layers synchronizes a 250MB tensor across all 4 GPUs.
question: What inter-GPU communication bottleneck explains the 1.5s latency of the Generative Uncrop backend?
details:
  realistic_solution: The primary bottleneck is the interconnect bandwidth between the GPUs. The total time spent in communication overhead must be calculated and then used to find the system's effective bandwidth. A massive discrepancy between the calculated effective bandwidth and the expected bandwidth of a proper interconnect (like NVLink) points directly to an architectural problem, such as GPUs being in different chassis connected by slow networking.
  common_mistake: |
    **The Pitfall:** Fixating on familiar domains like mobile network latency or model size.
    **The Rationale:** Candidates fail to quantitatively isolate the overhead component (Total - Compute) to diagnose system-level bottlenecks.
    **The Consequence:** Recommending irrelevant optimizations while ignoring the massive inter-GPU communication bottleneck.
  napkin_math: |
    **Assumptions & Constraints:**
    - Non-compute backend time: 1.5s - 0.15s (compute) = 1.35s communication overhead.
    - Total model layers: 40
    - Data sync per layer: 250 MB

    **Calculations:**
    - Total data moved = 40 layers * 250 MB = 10,000 MB = 10 GB
    - Effective Bandwidth = 10 GB / 1.35s = 7.4 GB/s

    **Conclusion & Interpretation:**
    - **Result: 7.4 GB/s (Interconnect Bottleneck)**. 7.4 GB/s is consistent with PCIe Gen3/4 or Ethernet speeds, proving the GPUs lack high-speed NVLink (which provides ~900 GB/s), causing massive communication overhead.
