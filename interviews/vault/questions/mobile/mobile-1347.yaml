title: Calculating 3-bit AWQ Memory Footprint on A17 Pro
scenario: You are deploying a 7 billion parameter LLM on an iPhone 15 Pro using the
  Apple A17 Pro Neural Engine. The system features 8 GB of shared unified memory,
  but you are only allocated a strict 4.0 GB budget for the model weights to leave
  headroom for the OS and GPU tasks. To achieve this, you plan to use 3-bit Activation-aware
  Weight Quantization (AWQ) with a group size of 128, storing scales and zero-points
  in FP16. Calculate the total memory footprint of the weights and metadata to verify
  if it fits within the allocation.
question: How would you calculate the total memory footprint of the weights and metadata
  to verify if it fits within the allocation?
details:
  realistic_solution: The correct approach calculates the memory required for the
    packed low-bit weights and adds the overhead of the quantization metadata. For
    every group of 128 weights, AWQ must store an FP16 scale and an FP16 zero-point,
    which significantly adds to the total footprint.
  common_mistake: Candidates often simply multiply 7 billion by 3 bits and divide
    by 8 to get bytes, completely ignoring the memory overhead required for the group-wise
    quantization parameters (scales and zero points).
  napkin_math: 'Base weights: 7e9 parameters * 3 bits = 21e9 bits. 21e9 bits / 8 bits/byte
    = 2.625 GB. Number of groups: 7e9 / 128 = 54,687,500 groups. Metadata per group:
    16-bit scale + 16-bit zero-point = 32 bits = 4 bytes. Total metadata: 54,687,500
    groups * 4 bytes/group = 218,750,000 bytes = ~0.219 GB. Total memory footprint:
    2.625 GB + 0.219 GB = 2.844 GB. Since 2.844 GB < 4.0 GB, it fits within the A17
    Pro''s unified memory budget.'
