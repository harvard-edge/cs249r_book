title: Diagnosing NPU Compute Bottlenecks on Snapdragon 8 Gen 3
scenario: Your team is deploying a real-time semantic segmentation model requiring 12 GFLOPs per inference on a device featuring the Qualcomm Hexagon NPU (Snapdragon 8 Gen 3). The platform provides 45 TOPS INT8 compute and utilizes a shared 16 GB LPDDR5X memory pool. While the NPU has massive theoretical headroom, profiling reveals the model is struggling to hit 30 FPS and is severely bottlenecked.
question: How would you analyze the compute precision and shared memory architecture to diagnose the bottleneck and quantify the fix?
details:
  realistic_solution: The model is likely running in FP32 or FP16, meaning it cannot fully utilize the INT8-optimized Hexagon NPU and is saturating the shared memory bandwidth. The fix is to apply post-training quantization (PTQ) or quantization-aware training (QAT) to convert the model to INT8. This unlocks the 45 TOPS NPU throughput while simultaneously cutting the memory footprint and bandwidth requirements by up to 4x.
  common_mistake: |
    **The Pitfall:** Assuming the 45 TOPS peak compute applies to FP32 or FP16.
    **The Rationale:** Candidates see a large TOPS number and assume it represents raw generic computing power.
    **The Consequence:** Running unquantized models that starve the shared LPDDR5X memory bandwidth and force inefficient fallback.
  napkin_math: |
    *   **Compute Required:** 12 GFLOPs (FP32) = ~24 GOPS (INT8).
    *   **Target Throughput:** 24 GOPS * 30 FPS = 720 GOPS (0.72 TOPS).
    *   **NPU Capacity:** 45 TOPS (INT8).
    *   **Utilization:** 0.72 / 45 = **~1.6%** of peak INT8 capacity.
    *   **Conclusion:** By quantizing to INT8, the model easily fits within the NPU's capabilities and slashes memory bandwidth by 4x, achieving 30 FPS.
