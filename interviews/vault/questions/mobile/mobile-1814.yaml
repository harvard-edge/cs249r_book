title: Thermal Throttling Impact on Portable Model Benchmarks
scenario: You benchmark your model on an A17 Pro achieving 5ms latency for the first 100 inferences. By inference 500, latency has degraded to 12ms. The same model on Snapdragon 8 Gen 3 shows 4ms initial, degrading to 8ms.
question: Why do mobile benchmarks deteriorate, and how does this affect portability comparisons?
details:
  realistic_solution: 'Mobile thermal throttling reduces clock speeds by 30-60% under sustained load. A17 Pro: peak ANE/GPU clocks drop ~40% after thermal limit. Snapdragon 8G3: ~50% clock reduction. For fair portability comparison: (1) Warm up for 60 seconds before measuring. (2) Report sustained throughput (p50 latency over 5 minutes), not peak. (3) Include the thermal envelope: iPhone 15 Pro dissipates ~6W sustained, S24 ~8W sustained. (4) Test at ambient temperature matching deployment conditions. A model that is 20% faster cold-start may be 10% slower after thermal saturation.'
  common_mistake: |
    **The Pitfall:** Reporting the first-inference latency as the sustained performance benchmark.
    **The Rationale:** Engineers run a quick loop and report the best numbers, ignoring the reality of passive cooling in mobile devices.
    **The Consequence:** A cross-platform comparison based on cold-start numbers is misleading; a model that is 20% faster cold may be 10% slower after 60 seconds of thermal saturation.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - A17 Pro Throttling: Peak 35 TOPS, Sustained ~21 TOPS (40% throttle).
       - Snapdragon 8G3 Throttling: Peak 45 TOPS, Sustained ~22.5 TOPS (50% throttle).
    2. **Calculations:**
       - A17 Pro Sustained Latency: 5ms x (35/21) = 8.3ms.
       - Snapdragon Sustained Latency: 4ms x (45/22.5) = 8.0ms.
    3. **Conclusion & Interpretation:**
       - **Result: 8.3ms vs 8.0ms Sustained** (Thermal-Bound).
