title: The OTA Bandwidth Bottleneck
scenario: You're a Staff Engineer on an automotive OS team. You need to design the Over-the-Air (OTA) update strategy for a new 500 MB perception model being deployed to the vehicle fleet.
question: Which of the following is the most critical *physical constraint* to consider for the update delivery mechanism?
details:
  realistic_solution: The primary constraint is the unreliable and often low-bandwidth cellular connection. While storage space and CPU are factors, the sheer time and potential for failure during the download of a large file over a mobile network is the most pressing issue. A stable, multi-minute download is not guaranteed in a moving vehicle, making robust delta-updating, compression, and pause/resume logic absolutely critical.
  common_mistake: |
    **The Pitfall:** Underestimating the 'last mile' problem in mobile and automotive deployments.
    **The Rationale:** Engineers often focus on server-side scalability or on-device compute for installation, forgetting the physical realities of wireless networks.
    **The Consequence:** A brittle OTA system where large model downloads frequently fail or take an impractically long time on typical cellular connections.
  napkin_math: |
    - Let's quantify the best-case download time.
    - A 500 MB model downloaded over a typical 25 Mbps (3.125 MB/s) cellular connection takes 500 / 3.125 = 160 seconds.
    - **Result: Maintaining a continuous, uninterrupted connection for nearly 3 minutes in a moving vehicle is highly unlikely, making robust resume and delta-update logic mandatory.**
  options:
  - On-device flash storage capacity
  - CPU cycles required for model decompression
  - Unreliable, low-bandwidth cellular connectivity
  - Power consumption during the download
  correct_index: 2
