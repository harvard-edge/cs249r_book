title: 'Model Format Conversion: End-to-End LLM CoreML Stateful Deployment Mastery'
scenario: "You are the tech lead responsible for deploying a 3B-parameter LLM on iOS 18 and Android."
question: "How would you design the full multi-platform model format strategy for size and latency?"
details:
  realistic_solution: |
    Implement an asymmetric quantization strategy driven by distinct hardware memory limits. Deploy W4A16 (INT4 weights) on iOS to fit the strict unified memory constraints, and W8A16 (INT8 weights) on Android devices with 12-16GB RAM to maximize NPU throughput. Map computations to CoreML (ANE) and Qualcomm Hexagon (QNN) via respective delegates, optimizing Time-to-First-Token (TTFT) by tuning the prefill chunk size.
  common_mistake: |
    **The Pitfall:** Choosing the same quantization level for both platforms.
    **The Rationale:** Engineers fail to consider that flagship Android devices often have 12-16GB RAM (supporting INT8) while base iOS models frequently have 8GB or less (requiring INT4 to fit a 3B model safely).
    **The Consequence:** Out-of-memory (OOM) crashes on iOS or sub-optimal accuracy on Android.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: 3B parameters.
    - Prefill sequence: 256 tokens.
    - Android NPU: 45 TOPS. System overhead efficiency: ~30%.

    **Calculations:**
    - Prefill FLOPs: 2 * 256 tokens * 3,000,000,000 params = 1.536 TFLOPs.
    - Theoretical TTFT: 1.536 TFLOPs / 45 TOPS = 0.0341s (34.1ms).
    - Effective TTFT: 34.1ms / 0.30 efficiency = 113.6ms.

    **Conclusion & Interpretation:**
    - **Result: ~114ms effective TTFT (Compute-Bound Bottleneck)**. The system is compute-bound during prefill, heavily degraded by memory access and framework overheads.
