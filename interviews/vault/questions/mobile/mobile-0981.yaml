title: 'Model Format Conversion: End-to-End LLM CoreML Stateful Deployment Mastery'
scenario: "You are the tech lead responsible for deploying a 3B-parameter LLM on iOS 18 (A17 Pro, 8GB, 35 TOPS) and Android (Snapdragon 8 Gen 3, 16GB, 45 TOPS)."
question: "How would you design the full multi-platform model format strategy for size and latency?"
details:
  realistic_solution: 'TTFT for 256-token prefill on 3B INT8 model at 45 TOPS: theoretical ~34-68ms depending on whether FLOPs formula uses 1× or 2× multiplier. With system overhead, ~113ms is the corrected estimate.'
  common_mistake: |
    **The Pitfall:** Choosing the same quantization level for both platforms.
    **The Rationale:** Engineers fail to consider that Snapdragon has 16GB (can afford INT8) while A17 Pro has 8GB (requires INT4 to fit a 3B model).
    **The Consequence:** Out-of-memory crashes on iOS.
  napkin_math: |
    - FLOPs for 256 tokens: `2 * 256 * 3B = 1.536 TFLOPs`.
    - Android NPU (Snapdragon): `45 TOPS`.
    - Ideal time: `1.536 TFLOPs / 45 TOPS = 34.1ms`.
    - With KV write and system overhead (e.g., 30% efficiency): `34.1ms / 0.3 ≈ 113ms`.
    - **Conclusion:** The effective TTFT is **~113ms** on Android.
