title: Exynos 2400 Shared Memory Bottleneck Analysis
scenario: You are deploying a real-time video segmentation model to the Samsung Exynos 2400 NPU for a live camera filter application. Profiling shows that despite the dual-core NPU being rated for 34.7 TOPS, inference latency sporadically spikes by 40-60ms, dropping the frame rate. System traces indicate low NPU compute utilization but extremely high memory access wait times.
question: Based on the hardware architecture, how do you diagnose the root cause of this latency degradation?
details:
  realistic_solution: The root cause is memory bandwidth contention. The Samsung Exynos 2400 shares its 12 GB LPDDR5X memory across the CPU, GPU, ISP, and NPU. During live video processing, the ISP (processing high-res camera frames) and GPU (rendering the filters) consume massive memory bandwidth. The diagnosis requires using a system-wide profiler to overlay memory bandwidth utilization from the ISP and GPU with the NPU's execution timeline to confirm that burst memory requests from other blocks are starving the NPU.
  common_mistake: |
    **The Pitfall:** Assuming the model is compute-bound and suggesting aggressive pruning or quantization.
    **The Rationale:** Candidates focus solely on the model architecture and fail to recognize that mobile SoCs use unified memory systems shared across the CPU, GPU, ISP, and NPU.
    **The Consequence:** Optimization efforts fail because they do not address the true root cause: memory bandwidth starvation from other hardware blocks.
  napkin_math: |
    1. **Peak Bandwidth:** LPDDR5X theoretical peak is ~68.2 GB/s.
    2. **Contention:** ISP writing 4K 60FPS video (~1.5 GB/s) + GPU rendering UI/filters (40-50 GB/s) severely constrains available bandwidth.
    3. **Starvation Spike:** If instantaneous bursts drop NPU available bandwidth to 1 GB/s, a 50 MB model takes 50 MB / 1000 MB/s = 50ms just to load.
    **Result:** Even with 34.7 TOPS compute, a bandwidth bottleneck of **1 GB/s** completely explains the **40-60ms latency spikes**.
