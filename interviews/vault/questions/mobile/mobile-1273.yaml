title: Shared Memory Bottleneck Analysis
scenario: You are deploying a real-time video segmentation model to a mobile NPU for a live camera filter application. Profiling shows that despite the dual-core NPU being rated for 34.7 TOPS, inference latency sporadically spikes by 40-60ms, dropping the frame rate. System traces indicate low NPU compute utilization but extremely high memory access wait times.
question: Based on the hardware architecture, how do you diagnose the root cause of this latency degradation?
details:
  realistic_solution: The root cause is memory bandwidth contention. The mobile SoC shares its 12 GB memory across the CPU, GPU, ISP, and NPU. During live video processing, the ISP (processing high-res camera frames) and GPU (rendering the filters) consume massive memory bandwidth. The diagnosis requires using a system-wide profiler to overlay memory bandwidth utilization from the ISP and GPU with the NPU's execution timeline to confirm that burst memory requests from other blocks are starving the NPU.
  common_mistake: |
    **The Pitfall:** Assuming the model is compute-bound and suggesting aggressive pruning or quantization.
    **The Rationale:** Candidates focus solely on the model architecture and fail to recognize that mobile SoCs use unified memory systems shared across the CPU, GPU, ISP, and NPU.
    **The Consequence:** Optimization efforts fail because they do not address the true root cause: memory bandwidth starvation from other hardware blocks.
  napkin_math: |
    1. **Assumptions & Constraints:** Peak bandwidth is ~68.2 GB/s. ISP (1.5 GB/s) and GPU (40-50 GB/s) severely constrain available bandwidth. Model is 50 MB.
    2. **Calculations:** If instantaneous bursts drop available NPU bandwidth to 1 GB/s, loading the 50 MB model takes 50 MB / 1000 MB/s = 50ms.
    3. **Conclusion & Interpretation:** **Result: Memory Bandwidth-Bound.** System-level contention restricts the NPU to 1 GB/s, perfectly explaining the 40-60ms latency spikes regardless of 34.7 TOPS peak compute.
