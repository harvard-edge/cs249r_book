title: Continuous Video Feature Ingestion Power Analysis
scenario: You are profiling a continuous video ingestion pipeline on the Apple A17 Pro (35 TOPS, 5W thermal
  budget, 16-core Neural Engine, 8 GB shared unified memory). The pipeline extracts features from a 60
  FPS camera stream in real-time. Each frame requires 0.2 TOPS of compute and 50 MB of memory bandwidth
  for weights and activations. The unified memory consumes approximately 1W per 10 GB/s of active bandwidth,
  and the Neural Engine consumes 1W per 10 TOPS. Calculate the power consumption of this streaming feature
  extraction pipeline and explain why the shared memory architecture causes the device to rapidly exceed
  its 5W thermal budget when a standard mobile game is running simultaneously.
details:
  realistic_solution: The candidate must calculate both compute and memory power to find the pipeline's
    baseline (1.5W). For the system behavior analysis, they should explain that the 8 GB unified memory
    is shared between the CPU, GPU, and Neural Engine. The continuous 60 FPS ingestion creates persistent
    memory traffic that prevents the memory controllers from entering low-power sleep states. When a game
    runs simultaneously, the GPU's high bandwidth demands stack on top of the streaming pipeline's baseline,
    saturating the shared bus and easily pushing the entire System-on-Chip (SoC) past the 5W thermal envelope,
    leading to severe throttling.
  common_mistake: Candidates often only calculate the compute power (1.2W) and ignore the memory bandwidth
    power, falsely concluding the pipeline is too lightweight to cause issues. They also frequently miss
    that 'unified memory' means shared physical bandwidth, failing to account for contention with the
    GPU.
  napkin_math: 'Compute required: 0.2 TOPS/frame * 60 frames/sec = 12 TOPS. Compute power: 12 TOPS * (1W
    / 10 TOPS) = 1.2W. Memory bandwidth required: 50 MB/frame * 60 frames/sec = 3000 MB/sec = 3 GB/s.
    Memory power: 3 GB/s * (1W / 10 GB/s) = 0.3W. Total ML pipeline power: 1.2W + 0.3W = 1.5W. This consumes
    30% of the entire 5W device budget before the screen, CPU, or GPU have drawn any power for the game.'
