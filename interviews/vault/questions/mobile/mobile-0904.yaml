title: 'Dataset Curation: Optimize Data Pipeline for Federated Learning on Mobile'
scenario: 'Your federated learning system is running slowly: devices spend 45 seconds on local training but only 2 seconds on gradient computation. Profiling shows 43 seconds is data preprocessing.'
question: "How can the Tensor G3 federated learning preprocessing pipeline be optimized when preprocessing dominates local training time?"
details:
  realistic_solution: Optimize the preprocessing pipeline by eliminating redundant epoch computation. Utilize memory-mapped files to cache pre-tokenized features locally. Offload spatial augmentations to the mobile GPU via hardware-accelerated shaders.
  common_mistake: |
    **The Pitfall:** Treating federated learning epochs like traditional cloud epochs.
    **The Rationale:** Engineers assume data must be re-tokenized and re-augmented dynamically every round, as memory caching isn't strictly necessary on cloud servers.
    **The Consequence:** The mobile device spends massive CPU cycles repeating identical preprocessing steps, draining the battery and extending the training window unnecessarily.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Preprocessing: 43s for 200 examples = 215ms/example.
       - Breakdown: Tokenization = 150ms, Augmentation = 50ms, Other = 15ms.
    2. **Calculations:**
       - Pre-tokenize & Cache: Eliminates 150ms/example.
       - GPU Augmentation: Drops 50ms to 5ms.
       - New time = 200 * 20ms = 4 seconds.
    3. **Conclusion & Interpretation:**
       - **Result: I/O-Bound**. Total training drops from 45s to 6s (a 7.5x speedup) by bypassing CPU tokenization bottlenecks.
