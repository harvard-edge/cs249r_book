title: The Depthwise Separable Efficiency Gain
scenario: You are working on a vision model for a smartphone camera feature. The profiler shows a specific 3x3 standard convolutional layer is a major bottleneck on the mobile NPU. To meet latency SLAs, you replace it with a 3x3 depthwise separable convolution.
question: What is the approximate reduction in computational cost (FLOPs) you should expect from this change?
details:
  realistic_solution: 'The computational cost is reduced by a factor of roughly 8x to 9x. A dense 3x3 convolution computes spatial and channel dimensions simultaneously. A depthwise separable convolution aggressively decomposes this into a spatial phase (3x3 depthwise) and a channel phase (1x1 pointwise), radically slashing MAC operations.'
  common_mistake: |
    **The Pitfall:** Underestimating the efficiency gain by assuming a linear or incremental improvement.
    **The Rationale:** Forgetting the algebraic scaling laws of convolution, specifically that dense convolutions multiply by `C_in * C_out`, which the decomposition strictly avoids.
    **The Consequence:** Misjudging architectural trade-offs and potentially discarding depthwise separable architectures when optimizing for stringent mobile NPU bounds.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Standard Conv FLOPs: `K * K * C_in * C_out * H * W`.
       - Depthwise Separable FLOPs: `(K * K * C_in * H * W) + (C_in * C_out * H * W)`.
       - Kernel Size (K) = 3.
    2. **Calculations:**
       - FLOPs Ratio = `(9 * C_in * C_out) / (9 * C_in + C_in * C_out)`.
       - Assuming `C_out` is large, the `9 * C_in` term becomes negligible in the denominator.
       - Ratio ≈ `(9 * C_in * C_out) / (C_in * C_out)` = 9.
    3. **Conclusion & Interpretation:**
       **Result: Compute-Bound (Optimized). Replacing the standard convolution algebraically yields an ~8x to 9x reduction in raw FLOPs, eliminating the compute bottleneck.**
  options:
  - ~2-3× reduction (assuming standard grouped convolution scaling)
  - No significant reduction (assuming memory bounds negate compute savings)
  - ~8-9× reduction
  - ~27× reduction (incorrectly cubing the 3x3 kernel dimension)
  correct_index: 2
