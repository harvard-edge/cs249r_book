title: The Depthwise Separable Efficiency Gain
scenario: You are working on a vision model for a new smartphone camera feature. The profiler shows that
  a specific 3x3 standard convolutional layer is a major bottleneck on the mobile NPU. To meet the latency
  budget, you decide to replace it with a 3x3 depthwise separable convolution. What is the approximate
  reduction in computational cost (FLOPs) you should expect from this change?
question: "What is the approximate reduction in computational cost (FLOPs) you should expect from this change?"
details:
  realistic_solution: 'The computational cost is reduced by approximately a factor of 8-9x. A standard
    3x3 convolution performs a single, dense operation. A depthwise separable convolution splits this
    into two much cheaper steps: a 3x3 depthwise convolution (filtering each input channel independently)
    and a 1x1 pointwise convolution (linearly combining the filtered channels). The efficiency gain is
    roughly equal to the square of the kernel size.'
  common_mistake: Engineers often underestimate the efficiency gain, sometimes guessing a linear improvement
    based on the kernel dimension (e.g., 3x for a 3x3 kernel). They forget that the computational cost
    of a standard convolution scales with the number of input *and* output channels, a factor that depthwise
    separable convolutions largely eliminate from the most expensive part of the operation.
  napkin_math: The FLOPs for a standard convolution are proportional to `Kernel_Width × Kernel_Height
    × Input_Channels × Output_Channels`. For a 3x3 kernel, this is `9 × C_in × C_out`. The FLOPs for a
    depthwise separable convolution are `(Kernel_Width × Kernel_Height × Input_Channels) + (Input_Channels
    × Output_Channels)`. For a 3x3 kernel, this is `(9 × C_in) + (C_in × C_out)`. The ratio of standard
    to depthwise separable is `(9 × C_in × C_out) / (9 × C_in + C_in × C_out)`. When `C_out` is large,
    this ratio approaches `9`. So, the depthwise separable layer requires ~1/9th the FLOPs.
  options:
  - ~2-3× reduction
  - No significant reduction
  - ~8-9× reduction
  - '>50× reduction'
  correct_index: 2
