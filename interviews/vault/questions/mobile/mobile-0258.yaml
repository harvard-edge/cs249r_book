title: The Depthwise Separable Efficiency Gain
scenario: You are working on a vision model for a smartphone camera feature. The profiler shows a specific 3x3 standard convolutional layer is a major bottleneck on the mobile NPU. To meet latency, you replace it with a 3x3 depthwise separable convolution.
question: What is the approximate reduction in computational cost (FLOPs) you should expect from this change?
details:
  realistic_solution: 'The computational cost is reduced by approximately a factor of 8-9x. A standard 3x3 convolution performs a single, dense operation. A depthwise separable convolution splits this into two much cheaper steps: a 3x3 depthwise convolution and a 1x1 pointwise convolution.'
  common_mistake: |
    **The Pitfall:** Underestimating the efficiency gain, often guessing a linear improvement.
    **The Rationale:** Forgetting that standard convolution cost scales with both input and output channels, which depthwise separable eliminates.
    **The Consequence:** Misjudging architectural trade-offs when optimizing models for mobile NPUs.
  napkin_math: |
    - Standard FLOPs proportional to: `9 * C_in * C_out`.
    - Depthwise Separable FLOPs: `(9 * C_in) + (C_in * C_out)`.
    - Ratio: `(9 * C_in * C_out) / (9 * C_in + C_in * C_out)`.
    - As `C_out` becomes large, `9*C_in` is negligible, so ratio approaches `(9 * C_in * C_out) / (C_in * C_out) = 9`.
    - **The depthwise separable layer requires roughly ~1/9th the FLOPs (an 8-9x reduction).**
  options:
  - ~2-3× reduction
  - No significant reduction
  - ~8-9× reduction
  - '>50× reduction'
  correct_index: 2
