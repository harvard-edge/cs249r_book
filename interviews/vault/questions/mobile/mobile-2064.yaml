title: Bursty AR Frame Pipeline Analysis
scenario: An Apple A17 Pro Neural Engine (35 TOPS) processes AR headset tracking frames. Normally frames arrive at 60 FPS (16.6ms intervals), but ISP scheduling jitters cause frames to sometimes arrive in batches of three every 50ms.
question: Analyze how this bursty arrival pattern impacts the 99th percentile frame processing latency compared to a perfectly uniform arrival rate.
details:
  realistic_solution: With a uniform 16.6ms arrival and an inference time of, say, 10ms, there is no queueing delay; P99 latency is 10ms. Under the bursty condition, three frames arrive simultaneously. The first takes 10ms, the second waits 10ms and takes 10ms (20ms total), and the third waits 20ms and takes 10ms (30ms total). The P99 latency spikes from 10ms to 30ms strictly due to queueing delays from the batch arrival.
  common_mistake: |
    **The Pitfall:** Concluding that because average throughput matches (3 frames per 50ms), latency remains unaffected.
    **The Rationale:** Candidates often look at average bandwidth or throughput over a time window rather than instantaneous arrival rates.
    **The Consequence:** Failing to account for queueing delays that cause massive spikes in tail latency during bursty workloads.
  napkin_math: |
    - Uniform 16.6ms arrival, 10ms inference: No queueing delay, P99 = 10ms.
    - Bursty condition: 3 frames arrive simultaneously every 50ms.
    - Frame 1: 10ms processing (0ms wait) = 10ms latency.
    - Frame 2: 10ms processing + 10ms wait = 20ms latency.
    - Frame 3: 10ms processing + 20ms wait = 30ms latency.
    - **P99 latency spikes from 10ms to 30ms strictly due to queueing delays.**
