title: 'Dataset Curation: Mastery — On-Device Personalization Data Strategy for 1B Mobile Users'
scenario: You are the ML lead for a keyboard app with 1B users. The system must maintain ε=1.0 DP per year with monthly updates.
question: How would you design the complete on-device personalization data strategy (collection, privacy, local curation, federated aggregation, and global model updates)?
details:
  realistic_solution: '12 monthly rounds, ε=1.0 total → ε=0.083/round using composition. 1B devices: sample 0.01% = 100K/round. On-device: DP local training with clipping + noise. Gradient compression 10×. Server: secure aggregation. Hardware heterogeneity: unified LoRA training interface across mobile CPUs/GPUs.'
  common_mistake: |
    **The Pitfall:** Assuming mobile NPUs natively support backpropagation for training.
    **The Rationale:** Candidates see the high TOPS rating and assume it applies to training just as it does for inference.
    **The Consequence:** Designing a federated pipeline that completely fails because the hardware requires falling back to the mobile GPU or CPU for gradient calculations.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 1B devices, 12 rounds/year. DP Budget: ε=1.0/year.
       - LoRA parameters: 1M (FP16).
       - Compression ratio: 10x.
    2. **Calculations:**
       - ε ≈ 0.083/round.
       - Sampling Rate: 100K / 1B = 0.0001 (0.01%).
       - Gradient upload size: 1M params * 2 bytes = 2 MB/device.
       - Compressed size: 2 MB / 10 = 200 KB/device.
       - Total Bandwidth/round = 100K devices * 200 KB = 20 GB/round.
    3. **Conclusion & Interpretation:**
       - **Result: Bandwidth-Bound.** With heavy compression and conservative sampling, federated aggregation requires processing 20 GB of gradients per round.
