title: 'Dataset Curation: Mastery — On-Device Personalization Data Strategy for 1B Mobile Users'
scenario: You are the ML lead for a keyboard app with 1B users across iOS (A17 Pro, 35 TOPS) and Android (Snapdragon 8 Gen 3, 45 TOPS). The system must maintain ε=1.0 DP per year with monthly updates.
question: How would you design the complete on-device personalization data strategy (collection, privacy, local curation, federated aggregation, and global model updates)?
details:
  realistic_solution: '12 monthly rounds, ε=1.0 total → ε=0.083/round using composition. 1B devices: sample 0.01% = 100K/round. On-device: DP local training with clipping + noise. Gradient compression 10×. Server: secure aggregation. Hardware heterogeneity: unified LoRA training interface across mobile CPUs/GPUs (since NPUs do not typically support backpropagation).'
  common_mistake: |
    **The Pitfall:** Assuming mobile NPUs natively support backpropagation for training.
    **The Rationale:** Candidates see the high TOPS rating and assume it applies to training just as it does for inference.
    **The Consequence:** Designing a federated pipeline that completely fails because the hardware requires falling back to the mobile GPU or CPU for gradient calculations.
  napkin_math: |
    1. DP Budget per round: 12 rounds, ε=1.0/year -> ε ≈ 0.083/round.
    2. Sampling Rate: 100K / 1B = 0.0001.
    3. Gradient upload size: 1M LoRA params * 2 bytes (fp16) = 2 MB/device.
    4. Compressed size (10x): 200 KB/device.
    5. Total Bandwidth/round: 100K devices * 200 KB = **20 GB/round**.
