title: The Thermal Throttling Trap
scenario: Your team has developed a real-time AR filter model that runs at a blazing 15ms inference time
  on a fresh Android flagship. However, after 5 minutes of continuous use, the frame rate drops significantly,
  and inference latency rises to 40ms. What's the most likely root cause on a mobile SoC, and how would
  you investigate it?
question: "Why does a 15ms Android AR filter slow to 40ms after five minutes on a mobile SoC?"
details:
  realistic_solution: "The most likely root cause is **thermal throttling**. Mobile SoCs have strict thermal\
    \ limits due to their compact form factor and passive cooling. When an intensive workload (like continuous\
    \ ML inference on GPU/NPU) runs for an extended period, the chip's temperature rises. To prevent damage\
    \ and ensure user comfort, the SoC's firmware will reduce clock frequencies and/or core voltage (DVFS\
    \ - Dynamic Voltage and Frequency Scaling) of the compute units (CPU, GPU, NPU) once a thermal threshold\
    \ is crossed. This directly leads to reduced performance and increased inference latency.\n  To investigate:\n\
    \  1.  **Monitor SoC Temperature:** Use Android's `dumpsys battery` or `cat /sys/class/thermal/thermal_zone*/temp`\
    \ to observe core temperatures during sustained use.\n  2.  **Monitor Clock Frequencies:** Use `adb\
    \ shell cat /sys/devices/system/cpu/cpu*/cpufreq/scaling_cur_freq` (for CPU) and vendor-specific tools\
    \ (e.g., Qualcomm's Snapdragon Profiler, ARM's Streamline) for GPU/NPU to see if frequencies are dropping.\n\
    \  3.  **Power Consumption Analysis:** High power draw directly correlates with heat generation. Profiling\
    \ power consumption can confirm if the initial workload is pushing thermal limits."
  common_mistake: '"There''s a memory leak or an OS background process interfering." While possible, the
    consistent degradation over time strongly points to a physical constraint.'
  napkin_math: A typical mobile SoC can dissipate around 5-7W continuously before throttling. If your
    ML workload alone draws 3W, and other components (display, modem) draw 3W, you quickly hit thermal
    limits. A 20% reduction in clock frequency can easily double inference time if the model is compute-bound.
