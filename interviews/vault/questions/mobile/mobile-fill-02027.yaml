title: On-Device vs Cloud Inference Energy Budget on Tensor G3
scenario: A Pixel phone with Tensor G3 (7.5 TOPS) can run a voice assistant model locally in 80ms at 400mW,
  or offload to cloud in 200ms round-trip consuming 150mW for radio transmission. The user makes 200 voice
  queries/day. Compare energy consumption and analyze under what conditions cloud offload is more efficient.
question: "How would you compare energy consumption and analyze under what conditions cloud offload is more efficient?"
details:
  realistic_solution: 'On-device per query: 400mW × 80ms = 32mJ. Cloud per query: radio TX+RX = 150mW
    × 200ms = 30mJ + 50mW idle during cloud processing ≈ 40mJ total. Energy roughly equal per query! At
    200 queries/day: on-device = 200×32mJ=6.4J; cloud = 200×40mJ=8J. On-device is 20% more efficient at
    200 queries/day. Cloud wins if: (1) model too large for Tensor G3, (2) query rate exceeds on-device
    throughput, (3) radio energy amortized across multiple payload types. Cloud becomes worse if LTE radio
    required (LTE draws 1-2W vs WiFi 150mW).'
  common_mistake: Comparing only inference latency; forgetting to include radio energy for network round-trip
    which often dominates mobile energy budgets for cloud offload.
  napkin_math: 'On-device: 32mJ/query × 200/day = 6.4J/day. Cloud via WiFi: 40mJ/query × 200 = 8J/day.
    Via LTE (1.5W × 200ms = 300mJ/query): 60J/day → 9.4× worse than on-device. On-device wins for LTE-connected
    devices.'
