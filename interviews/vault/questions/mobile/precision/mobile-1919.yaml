title: A17 Pro LLM Quantization Protocol
scenario: A team wants to deploy a 7B parameter LLM on a mobile device, balancing weight size and perplexity.
question: Design an evaluation protocol to determine if 4-bit block-wise quantization with FP16 activations provides a strictly better latency-accuracy tradeoff than pure INT8 quantization on the Neural Engine?
details:
  realistic_solution: Design a paired benchmark on the actual supported mobile inference path for each format, not just a theoretical bandwidth comparison. Measure prefill and decode latency, tokens per second, peak memory, memory-controller utilization, ANE/GPU/CPU partitioning, power, thermals, and WikiText perplexity for the same prompts and batch size. Declare 4-bit strictly better only if it meets the perplexity budget and shows statistically lower end-to-end latency or energy on a supported kernel path. If 4-bit block-wise weights require CPU/GPU dequantization or unsupported Core ML operations, the protocol should report that penalty instead of assuming a Neural Engine speedup.
  common_mistake: |
    **The Pitfall:** Focusing solely on FLOPs instead of memory bandwidth.
    **The Rationale:** Candidates often measure compute operations, forgetting that autoregressive decoding is memory-bandwidth bound on mobile SoCs.
    **The Consequence:** Recommending a model based on theoretical compute efficiency rather than actual token generation latency.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model size = 7B parameters.
    - Compare only hardware-supported inference paths.
    - Strictly better requires meeting the accuracy budget and improving measured latency or energy.

    **Calculations:**
    - Pure INT8 Weight Footprint = 7B * 1 byte = 7 GB.
    - 4-bit Weight Footprint = 7B * 0.5 bytes = 3.5 GB.
    - Theoretical weight-fetch reduction = 7 GB / 3.5 GB = 2x.
    - Actual speedup must be measured because activations, dequantization, kernel fusion, cache behavior, and ANE support can dominate end-to-end latency.

    **Conclusion & Interpretation:**
    - **Result: benchmark-gated decision (Latency-Accuracy Tradeoff).** A 2x smaller weight footprint is only a hypothesis for faster decoding; strict superiority requires measured latency or energy gains at acceptable perplexity on a supported mobile execution path.
