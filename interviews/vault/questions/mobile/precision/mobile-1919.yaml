title: A17 Pro LLM Quantization Protocol
scenario: A team wants to deploy a 7B parameter LLM on a mobile device, balancing weight size and perplexity.
question: Design an evaluation protocol to determine if 4-bit block-wise quantization with FP16 activations provides a strictly better latency-accuracy tradeoff than pure INT8 quantization on the Neural Engine.
details:
  realistic_solution: 'Design a benchmark computing token-generation latency and WikiText perplexity. Pure INT8 requires a 7GB footprint; 4-bit weights with FP16 activations require 3.5GB. Since memory bandwidth dominates autoregressive decoding, the protocol must log memory bus utilization to prove that fetching 3.5GB in 4-bit format yields >1.5x speedup over INT8, offsetting the on-chip dequantization compute cost.'
  common_mistake: |
    **The Pitfall:** Focusing solely on FLOPs instead of memory bandwidth.
    **The Rationale:** Candidates often measure compute operations, forgetting that autoregressive decoding is memory-bandwidth bound on mobile SoCs.
    **The Consequence:** Recommending a model based on theoretical compute efficiency rather than actual token generation latency.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model size = 7B parameters.
    - Pure INT8 vs 4-bit block-wise quantization with FP16 activations.
    - Autoregressive decoding is strictly memory-bandwidth bound.

    **Calculations:**
    - Pure INT8 Weight Footprint = 7B * 1 byte = 7 GB.
    - 4-bit Weight Footprint = 7B * 0.5 bytes = 3.5 GB.
    - Speedup theoretically targets ~2x (7GB vs 3.5GB bandwidth cost).

    **Conclusion & Interpretation:**
    - **Result: >1.5x end-to-end speedup (Bandwidth-bound decoding)**. The protocol must verify this offsets the on-chip FP16 dequantization ALU cost.
