title: Quantization Strategy for On-Device Updates
scenario: Your team is deploying a new semantic segmentation model to millions of mobile devices. You need to achieve sub-50ms latency and a model size under 20MB. You're considering dynamic range quantization (DRQ) vs. quantization-aware training (QAT).
question: When should a mobile segmentation team choose QAT over DRQ, and when is DRQ better for OTA model iteration?
details:
  realistic_solution: 'Choose QAT when the segmentation model must meet the 20 MB package limit, preserve accuracy on dense per-pixel outputs, and run through an INT8-capable mobile backend with predictable sub-50ms latency. QAT trains with quantization effects in the loop, so weights, activations, and sensitive layers can be calibrated for the deployment runtime instead of relying on a post-training pass. DRQ is better for OTA iteration when the team needs to ship frequent candidate models quickly and can tolerate CPU-oriented weight-only quantization or backend-dependent activation handling with more validation risk. Recommendation: use QAT for the production launch path where accuracy and accelerator compatibility matter most, and use DRQ/PTQ for fast A/B or fallback builds when deployment velocity matters more than the last accuracy and latency gains.'
  common_mistake: |
    **The Pitfall:** Treating QAT as the only acceptable quantization path for every release.
    **The Rationale:** Candidates focus only on final-model accuracy and accelerator latency, overlooking that QAT adds retraining and validation cost to each OTA candidate.
    **The Consequence:** Extremely slow iteration cycles during A/B testing where speed-to-deploy is critical.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model target size: 20 MB.
    - Parameters: 18M.

    **Calculations:**
    - FP32 baseline size: 18M x 4 bytes = 72 MB (fails 20 MB target).
    - INT8 size (DRQ/QAT): 18M x 1 byte = 18 MB (meets 20 MB target).
    - Both DRQ/PTQ and QAT can satisfy the storage target if the final weights are stored as INT8.
    - DRQ/PTQ is fast to produce because it starts from a trained FP32/FP16 checkpoint, but runtime latency and accuracy depend heavily on whether the mobile backend accelerates the resulting graph.
    - QAT costs a retraining cycle, but it is the safer path when the production graph needs calibrated INT8 activations and stable accelerator execution.

    **Conclusion & Interpretation:**
    - **Result: 18 MB INT8 model size**. Size alone does not choose the method. QAT is the stronger production choice for sub-50ms, accuracy-sensitive segmentation on an INT8 mobile backend; DRQ/PTQ is better for rapid OTA experiments when iteration speed outweighs the risk of lower accuracy or less predictable acceleration.
