title: 'The Quantization Quirk'
scenario: 'Your team successfully quantizes a large image segmentation model from FP32 to INT8 for deployment on a mobile NPU, expecting significant speedup. However, after deployment, you notice that some operations, particularly custom layers or obscure activations, are still running in FP32 on the CPU.'
question: 'Why would some operations run in FP32 on the CPU despite the model being quantized?'
details:
  realistic_solution: 'This occurs because not all operations (operators) in a neural network graph are supported by the NPU''s INT8 instruction set or its dedicated hardware IP. Even if a model is quantized, if an operator within the graph (especially custom ops, less common activation functions like Swish, or complex control flow ops) is not recognized or supported by the NPU delegate''s INT8 implementation, the framework (e.g., TFLite) will typically fall back to executing that specific unsupported operator on the CPU, often in FP32. This creates a CPU-NPU dance where data is copied back and forth between CPU RAM and NPU memory for each unsupported op, incurring significant overhead (memory copies, context switching) and negating many of the benefits of NPU acceleration. The model isn''t fully INT8 *on the NPU* if it contains unsupported ops.'
  common_mistake: |
    **The Pitfall:** Assuming the quantization process completely failed.
    **The Rationale:** Developers assume that if the NPU isn't running the whole model, the conversion must be entirely broken.
    **The Consequence:** Missing the fact that specific unsupported operators are triggering expensive CPU fallbacks.
  napkin_math: |
    **Assumptions & Constraints:**
    - Transfer Penalty: 0.5 ms per NPU-CPU transfer.
    - Unsupported Ops: 5 ops causing fallbacks.

    **Calculations:**
    - Total Transfers: 5 * 2 (NPU->CPU, CPU->NPU) = 10 transfers.
    - Total Overhead: 10 transfers * 0.5 ms = 5.0 ms.

    **Conclusion & Interpretation:**
    - **Result: 5.0 ms (Compute-Bound Fallback)**. This overhead can double or triple the execution time of an otherwise fast NPU-optimized model.
