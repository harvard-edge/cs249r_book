title: Optimizing LLM Deployment on Snapdragon 8 Gen 3 Hexagon NPU with Mixed Precision
scenario: Your team is tasked with deploying a 7B parameter LLM for on-device inference on a flagship NPU. You are evaluating whether to quantize the FP32 model to FP16 or INT8.
question: Which quantization approach is mandatory for this mobile deployment scenario, and why?
details:
  realistic_solution: |
    An INT8 deployment strategy is physically mandatory. 
    1. **Memory Feasibility Check:** An FP32 7B model takes 28GB (Immediate OOM). Downcasting to FP16 drops this to 14GB, which still violently thrashes the strict OS memory limits (typically heavily capping background apps well below the physical 12-16 GB LPDDR5X limit).
    2. **INT8 Quantization (PTQ/QAT):** Quantizing to INT8 drops the weight footprint to a safe 7GB, creating the necessary 2-3GB of headroom for KV caches and system OS pages.
    3. **Hardware Affinity:** Flagship NPUs deploy massive, highly-tuned systolic arrays optimized specifically for INT8 matrix multiplications (e.g., hitting 45 TOPS). Deploying FP16 forces fallback to slower hardware pathways or unoptimized CPU delegates.
  common_mistake: |
    **The Pitfall:** Sizing the quantization requirement purely on theoretical compute throughput, ignoring physical memory bounds.
    **The Rationale:** Candidates focus on how fast FP16 vs INT8 runs, completely failing to calculate that an FP16 7B model will physically crash the edge device before the first token is generated.
    **The Consequence:** Wasting weeks trying to compile an FP16 model that fundamentally exceeds the device's LPDDR RAM constraints.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Target Hardware Memory: ~12 GB effective usable LPDDR5X.
       - Model: 7 Billion parameters.
       - Hardware Compute: Dedicated INT8 hardware acceleration.
    2. **Calculations:**
       - FP32 Size: 7B * 4 bytes = 28 GB (OOM).
       - FP16 Size: 7B * 2 bytes = 14 GB (Exceeds typical application allocation limits; guarantees OOM eviction).
       - INT8 Size: 7B * 1 byte = 7 GB (Fits safely with remaining headroom for KV Cache).
    3. **Conclusion & Interpretation:**
       **Result: INT8 is mandatory (Memory-Capacity-Bound).** FP16 physically breaches mobile RAM limits; INT8 is structurally required to boot.
