title: INT8 Versus FP16 Quantization for Mobile LLM Inference
scenario: Your team is tasked with deploying a 7B parameter LLM for on-device inference on a flagship NPU with about 12 GB of usable shared memory for the app and model runtime. You are evaluating whether to quantize the FP32 model to FP16 or INT8.
question: Which quantization approach is mandatory for this mobile deployment scenario, and why?
details:
  realistic_solution: |
    INT8 is mandatory among these two choices under the stated usable-memory budget. An FP32 7B model is about 28 GB, and FP16 is about 14 GB before KV cache, activations, runtime buffers, and OS memory pressure, so FP16 does not fit reliably. INT8 reduces weights to about 7 GB, which can fit if context length and runtime overhead are controlled, though it is not automatically safe for every device or app allocation. The engineer should use PTQ with calibration first, move to QAT if accuracy drops, and verify that the chosen NPU delegate has efficient INT8 kernels for the model's operators instead of falling back to CPU or GPU.
  common_mistake: |
    **The Pitfall:** Sizing the quantization requirement purely on theoretical compute throughput, ignoring physical memory bounds.
    **The Rationale:** Candidates focus on how fast FP16 vs INT8 runs, completely failing to calculate that an FP16 7B model will physically crash the edge device before the first token is generated.
    **The Consequence:** Wasting weeks trying to compile an FP16 model that fundamentally exceeds the device's LPDDR RAM constraints.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target hardware memory: about 12 GB effective usable LPDDR5X.
    - Model: 7 billion parameters.
    - Additional memory is needed for KV cache, activations, runtime buffers, and the OS.

    **Calculations:**
    - FP32 size: 7B * 4 bytes = 28 GB (does not fit).
    - FP16 size: 7B * 2 bytes = 14 GB (does not fit before overhead).
    - INT8 size: 7B * 1 byte = 7 GB (leaves roughly 5 GB before overhead and app limits).

    **Conclusion & Interpretation:**
    - **Result: INT8 is the practical minimum among FP16 and INT8 for this prompt.** It provides a plausible memory path, but context length and runtime overhead still need device validation.
