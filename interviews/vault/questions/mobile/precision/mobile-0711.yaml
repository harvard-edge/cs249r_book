title: W4A16 vs W4A4 Quantization for On-Device LLMs
scenario: You're deploying a 7B parameter LLM on a device with 12 GB RAM and LPDDR5X at 30 GB/s. You choose W4A16 quantization.
question: Why is W4A16 a better quantization scheme than W4A4 despite keeping activations at 16-bit precision?
details:
  realistic_solution: |
    W4A16 is the sweet spot for on-device LLMs because weights are static and memory-bound, while activations are dynamic and need precision to preserve outlier channels.
  common_mistake: |
    **The Pitfall:** Assuming W4A4 is strictly superior for maximum compression.
    **The Rationale:** Candidates overlook that generative model activations contain outlier channels with magnitudes 100x larger than typical values.
    **The Consequence:** Clamping these outlier activations to 4-bit destroys model accuracy and perplexity, rendering generative outputs unusable.
  napkin_math: |
    **Assumptions & Constraints:**
    - FP16 weights: 14 GB.
    - W4 weights: 7B parameters x 0.5 bytes = 3.5 GB, plus about 0.2 GB for scales/metadata.
    - Bandwidth: 30 GB/s.

    **Calculations:**
    - W4A16 weight footprint: 3.5 GB + 0.2 GB metadata = ~3.7 GB, which fits in 12 GB RAM.
    - W4A4 would reduce activation bandwidth, but 4-bit activations are much more sensitive to outlier channels and calibration error.
    - A lower-bound bandwidth check for streaming the compressed weights once is 3.7 GB / 30 GB/s = ~123 ms; real token latency depends on cache reuse, prefill vs decode shape, kernel efficiency, and memory traffic beyond the static weight file.

    **Conclusion & Interpretation:**
    - **Result: ~3.7 GB compressed weight footprint.** W4A16 gets the dominant static weights into memory while preserving activation precision for outlier-heavy LLM channels. It is usually a better quality/compatibility tradeoff than W4A4 unless the team has activation-aware calibration and kernels that prove W4A4 quality is acceptable.
