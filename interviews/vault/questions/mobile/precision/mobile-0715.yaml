title: The Granular Precision Architect
scenario: You are deploying a cutting-edge generative AI model on a mobile SoC. Achieving near FP32 accuracy is critical, but the model is too large and slow for FP16 inference, and a naive INT8 quantization causes unacceptable accuracy degradation. Different parts of the SoC support different precisions.
question: How would you design a hardware-aware mixed-precision quantization strategy for a mobile generative model?
details:
  realistic_solution: 'This requires a highly systematic and hardware-aware approach to mixed-precision quantization, often involving automated tools and iterative refinement. 1. **Layer-wise Sensitivity Analysis:** Define a robust accuracy metric relevant to the model''s task. Systematically quantize individual layers and measure the accuracy degradation. Analyze the Hessian matrix to identify sensitive layers. 2. **Hardware Capability Mapping:** Understand which operations are accelerated by which precision on specific compute units. 3. **Optimization Objective & Search:** Formulate the problem as an optimization: minimize latency/memory subject to an accuracy constraint. 4. **Runtime Support & Compiler Integration:** The inference runtime must support a graph where different nodes have different data types. 5. **Quantization-Aware Training (QAT):** For critical layers, use QAT.'
  common_mistake: |
    **The Pitfall:** Blindly applying INT8 everywhere and then reverting to FP16 only when errors occur.
    **The Rationale:** Candidates take a reactive approach rather than using automated layer-wise sensitivity analysis (like Hessian-aware profiles) matched against hardware capabilities.
    **The Consequence:** Suboptimal performance and power consumption, as operations are mapped to the wrong compute units or retain higher precision than mathematically necessary.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: 7B decoder-only LLM, 32 layers, hidden size 4096, 32 KV heads.
    - KV cache dtype: FP16, so each K or V element is 2 bytes.
    - Weight storage after mixed precision: most linear weights INT4 with sensitive layers kept at INT8/FP16, about 4.0 GB total.
    - Target device budget for this process: about 6 GB of usable RAM after OS, app, and allocator overhead.

    **Calculations:**
    - KV cache per token per layer = 2 tensors (K,V) * 4096 elements * 2 bytes = 16 KB.
    - KV cache per token for 32 layers = 16 KB * 32 = 512 KB/token.
    - KV cache at 2048 tokens = 512 KB * 2048 = 1.0 GB.
    - KV cache at 4096 tokens = 512 KB * 4096 = 2.0 GB.
    - Approximate peak at 4096 tokens = 4.0 GB weights + 2.0 GB KV + 0.4 GB activations/runtime = 6.4 GB.
    - Reducing context to 2048 tokens or quantizing KV to INT8 saves about 1.0 GB, bringing peak memory near 5.4 GB.

    **Conclusion & Interpretation:**
    - **Result: Memory-capacity bound.** The mixed-precision plan must account for both weights and KV cache; otherwise a 4K context can exceed a realistic mobile RAM budget even when the INT4 weight file alone appears to fit.
