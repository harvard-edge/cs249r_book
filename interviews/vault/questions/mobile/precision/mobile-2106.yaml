title: Symmetric vs Asymmetric MACs
scenario: A semantic segmentation model originally in FP32 must be deployed on a mobile DSP using INT8.
question: What is the impact of asymmetric vs symmetric quantization on the latency of the model's depthwise convolutional layers?
details:
  realistic_solution: |
    In mobile DSP depthwise convolution kernels, symmetric INT8 weights and activations usually map cleanly to tight vector MAC loops because the zero-point terms are zero. Asymmetric quantization can add zero-point handling for each channel or tensor, but the latency impact depends on the kernel: fixed weight offsets can often be precomputed, activation offsets may be fused into optimized kernels, and poorly optimized paths may still pay extra subtract or correction work. The practical answer is to benchmark the target DSP kernel and prefer symmetric or per-channel schemes when they preserve accuracy and hit the fast path.
  common_mistake: |
    **The Pitfall:** Believing all INT8 quantization schemes map identically to underlying hardware instructions.
    **The Rationale:** Candidates assume INT8 arithmetic always takes 1 operation, forgetting that asymmetric quantization introduces zero-point offsets that must be multiplied out.
    **The Consequence:** Deploying asymmetric models on DSPs can trigger unexpected latency regressions when the chosen kernel cannot fold or fuse the zero-point handling.
  napkin_math: |
    **Assumptions & Constraints:**
    - DSP Hardware computes Multiply-Accumulate (MAC) efficiently.
    - Asymmetric quantization maps FP to INT via scales and non-zero zero-points (Z).
    - Symmetric quantization enforces Z = 0.

    **Calculations:**
    - Symmetric inner loop: accumulate a * w with zero-point terms removed.
    - Asymmetric inner loop: accumulate (a - Za) * (w - Zw), but optimized kernels may precompute fixed weight terms and fuse activation corrections.
    - Depthwise sensitivity: each channel has fewer MACs than a dense convolution, so per-channel setup, offset correction, and memory layout overhead can be visible if not fused.

    **Conclusion & Interpretation:**
    - **Result: Kernel-dependent latency impact.** Symmetric quantization is more likely to use the fastest depthwise DSP path, while asymmetric quantization only causes a major slowdown when zero-point corrections remain on the critical path.
