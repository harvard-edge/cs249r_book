title: 'Google Tensor G3: Mixed-Precision Strategy for On-Device LLM Inference'
scenario: A large language model (LLM) is being deployed on a Google Tensor G3, which features a 7.5 TOPS TPU and 12 GB of LPDDR5X memory.
question: What are the primary considerations and trade-offs for choosing between FP16, BF16, and FP8 mixed-precision formats for LLM inference on this hardware?
details:
  realistic_solution: |
    For the Google Tensor G3, BF16 is attractive where the runtime and operators expose it because its FP32-like exponent range is more forgiving for LLM activations than FP16. FP16 is commonly available on mobile accelerators and may be faster or better supported, but its narrower dynamic range can require calibration or selective higher precision for sensitive layers. FP8 should not be assumed on this device: use it only if the actual TensorFlow Lite, vendor delegate, or on-device runtime proves that the needed operators run natively and accurately. The practical plan is to verify operator coverage first, then benchmark BF16/FP16 and any supported quantized path against memory, latency, thermal, and accuracy targets.
  common_mistake: |
    **The Pitfall:** Assuming all lower-precision formats are universally interchangeable without calibration.
    **The Rationale:** Neglecting the specific dynamic range requirements of LLM activations and the necessity of Quantization-Aware Training (QAT).
    **The Consequence:** Severe model accuracy degradation and potential overflow/underflow errors during inference.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: 7B parameters.
    - Memory limit: 12 GB RAM.

    **Calculations:**
    - FP32 footprint: 7B * 4 bytes = 28 GB.
    - BF16/FP16 footprint: 7B * 2 bytes = 14 GB.
    - FP8-like weight footprint, if truly supported: 7B * 1 byte = 7 GB before KV cache, activations, runtime overhead, and OS pressure.

    **Conclusion & Interpretation:**
    - **Result: FP16/BF16 weights alone exceed 12 GB, while 8-bit weights may fit only if the runtime supports them and overheads are controlled.** The format choice is memory-capacity-bound, but FP8 is not a safe default without device and toolchain validation.
