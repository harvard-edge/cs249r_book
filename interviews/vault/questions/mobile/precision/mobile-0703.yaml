title: The Cross-SoC Accuracy Divergence
scenario: You deploy the same TFLite INT8 face verification model on a Pixel 8 Pro and a Samsung Galaxy S23. On Pixel, the false acceptance rate (FAR) is 0.1% — within spec. On Galaxy S23, the FAR jumps to 1.2% — 12x worse, making the biometric feature unusable. Same model binary, same test images.
question: Why does the same INT8 face verification model have 0.1% FAR on Pixel 8 Pro but 1.2% on Galaxy S23?
details:
  realistic_solution: The same TFLite model can produce different INT8 numerics on different SoCs because delegates may use different kernels, fusion patterns, accumulator precision, rounding modes, and requantization behavior. In a face verifier, a small systematic embedding or cosine-score shift can matter because the acceptance threshold sits on the tail of the impostor distribution. The right response is not to assume one device is "wrong"; dump intermediate tensors, compare CPU reference vs each delegate, validate the full ROC curve per device family, and calibrate thresholds or force a more consistent kernel path if the product requires identical operating points.
  common_mistake: |
    **The Pitfall:** Blaming the NPU hardware as fundamentally "less accurate."
    **The Rationale:** Candidates assume the MAC units compute incorrectly, missing that the observed operating point can shift because the deployed graph uses different delegate kernels, fusion, rounding, and requantization details.
    **The Consequence:** Wasting time on a generic hardware blame instead of comparing tensor dumps and calibrating the verification threshold against a reference dataset.
  napkin_math: |
    **Assumptions & Constraints:**
    - Verification threshold: 0.65 cosine similarity.
    - Many impostor scores near the decision boundary fall in a narrow band, for example 0.64 to 0.66.
    - A delegate-specific numeric shift of even +0.01 in cosine score is plausible after different rounding, fusion, or normalization paths.

    **Calculations:**
    - A borderline impostor pair at 0.645 is rejected on the reference path because 0.645 < 0.65.
    - With a +0.01 score shift, the same pair becomes 0.655 and is accepted.
    - FAR can therefore change sharply if the impostor distribution is dense near the threshold, but the exact 0.1% to 1.2% jump must be measured from the evaluation set rather than derived from one tensor error.

    **Conclusion & Interpretation:**
    - **Result: threshold-sensitive numeric drift (Precision-Bound)**. Small SoC-dependent INT8 differences can move borderline scores across the face-verification threshold; quantify it with per-device ROC validation and threshold calibration.
