title: The Quantization Cliff
scenario: You are an ML engineer deploying a driver drowsiness detection model on a Snapdragon dashboard. To meet the 16ms per-frame budget, you converted it from FP32 to per-tensor symmetric INT8 quantization using a 1,000-image daytime calibration set.
question: Why can daytime-only INT8 calibration cause a driver drowsiness model to fail at night?
details:
  realistic_solution: |
    The root cause is a calibration dataset mismatch. The scaling factor for quantization was calculated using only daytime images, where the maximum activation value was ~50.0. This scaling factor is insufficient for night-time driving, where high-contrast scenes cause activation values to spike to ~300.0. These large values are 'clipped' or 'saturated' at the maximum INT8 value of 127.
  common_mistake: |
    **The Pitfall:** Blaming the model architecture or NPU hardware.
    **The Rationale:** Assuming the architecture is 'too sensitive' for INT8 or there's a hardware bug.
    **The Consequence:** Wasting time redesigning the model or switching to slower FP16 instead of fixing the calibration dataset.
  napkin_math: |
    **Assumptions & Constraints:**
    - Daytime max activation: 50.0.
    - Nighttime max activation spike: 300.0.
    - INT8 max value: 127.

    **Calculations:**
    - Values > 50.0 map to 127 (clipping).

    **Conclusion & Interpretation:**
    - **Result: Precision-Bound**. Information is destroyed because nighttime values of 300.0 are clipped to the same INT8 value as 50.0.
  options:
  - "The model architecture is too sensitive for INT8 and must be redesigned with explicit activation clipping functions like ReLU6."
  - "The calibration dataset was not representative of production data, causing activation saturation (overflow) during night-time inference."
  - "The mobile NPU has a hardware bug in its INT8 multiply-accumulate unit that causes it to produce erroneous high values."
  - "The per-tensor quantization scheme is flawed; switching to per-channel quantization is the only way to fix this."
  correct_index: 1
