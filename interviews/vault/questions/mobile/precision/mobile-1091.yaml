title: Analyzing 3-bit AWQ Overhead on Mobile TPUs
scenario: You are deploying a 7-billion parameter LLM on a mobile TPU capable of 7.5 TOPS. To fit within a strict 3 GB memory allocation, you apply 3-bit AWQ. Profiling reveals that while memory is reduced, generation is severely compute-bound and misses latency targets.
question: Why does 3-bit AWQ quantization cause a severe compute bottleneck on the mobile TPU architecture?
details:
  realistic_solution: |
    The mobile TPU is heavily optimized for native 8-bit or 16-bit precision, while 3-bit weights usually require packing formats that do not map cleanly to the accelerator's fast matrix kernels. Before the multiply, the runtime often has to unpack groups of 3-bit values, apply scales/zero-points, and materialize or emulate a supported representation such as INT8. That conversion work adds scalar or custom-kernel overhead, irregular memory access, and poor utilization. The result can be compute-bound unpacking and dequantization even though the packed model fits in memory.
  common_mistake: |
    **The Pitfall:** Assuming aggressive sub-4-bit quantization linearly lowers inference latency by scaling down memory bandwidth.
    **The Rationale:** Candidates accurately calculate bandwidth savings but entirely neglect the lack of native hardware support for custom bit-widths.
    **The Consequence:** The model latency is degraded by 2.5x due to the continuous ALU stalling from bit-shifting operations.
  napkin_math: |
    **Assumptions & Constraints:**
    - 7B parameters.
    - 3-bit packed footprint: 7B x 3 bits = 21 Gbits = 2.625 GB.
    - The TPU has native fast paths for INT8/FP16, not arbitrary 3-bit matrix multiply.
    - 3-bit values must be unpacked and scaled before or during the native compute kernel.

    **Calculations:**
    - Storage savings versus INT8: 7 GB - 2.625 GB = 4.375 GB.
    - Packing density is not equal to accelerator throughput: every group of packed weights needs bit extraction, sign/zero-point handling, and scaling.
    - If that unpack/dequantize path is not fused into a native high-throughput kernel, the added instructions and temporary data movement can dominate the saved DRAM traffic.
    - Therefore the bottleneck is the unsupported-bit-width emulation path, not the nominal packed model size.

    **Conclusion & Interpretation:**
    - **Result: Inefficient Emulation/Unpacking Bottleneck**. The 3-bit format saves storage, but latency can regress when the TPU must emulate it through unpacking and dequantization before native INT8/FP16 execution.
