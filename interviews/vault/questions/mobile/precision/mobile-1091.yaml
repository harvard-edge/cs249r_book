title: Analyzing 3-bit AWQ Overhead on Mobile TPUs
scenario: You are deploying a 7-billion parameter LLM on a mobile TPU capable of 7.5 TOPS. To fit within a strict 3 GB memory allocation, you apply 3-bit AWQ. Profiling reveals that while memory is reduced, generation is severely compute-bound and misses latency targets.
question: Why does 3-bit AWQ quantization cause a severe compute bottleneck on the mobile TPU architecture?
details:
  realistic_solution: |
    The mobile TPU is heavily optimized for native 8-bit or 16-bit precision, while 3-bit weights usually require inefficient packing formats that do not map cleanly to the accelerator's fast paths. The weights must be unpacked, bitmasked, shifted, and often expanded to a supported type such as INT8 before matrix multiplication. This can trade memory savings for extra instruction overhead, irregular access patterns, and poor accelerator utilization.
  common_mistake: |
    **The Pitfall:** Assuming aggressive sub-4-bit quantization linearly lowers inference latency by scaling down memory bandwidth.
    **The Rationale:** Candidates accurately calculate bandwidth savings but entirely neglect the lack of native hardware support for custom bit-widths.
    **The Consequence:** The model latency is degraded by 2.5x due to the continuous ALU stalling from bit-shifting operations.
  napkin_math: |
    **Assumptions & Constraints:**
    - 7B parameters.
    - 3-bit packed footprint: 7B * 3 bits = 21 Gbits = 2.625 GB.
    - INT8 expanded footprint for compute: 7 GB.
    - Available memory bandwidth: 25 GB/s under mobile system load.

    **Calculations:**
    - Packed 3-bit weight traffic: 2.625 GB / 25 GB/s = 105 ms if used directly.
    - Expanded INT8 traffic after unpacking: 7 GB / 25 GB/s = 280 ms equivalent traffic.
    - Expansion overhead: 7 GB - 2.625 GB = 4.375 GB of additional on-chip/off-chip movement and conversion work.

    **Conclusion & Interpretation:**
    - **Result: Inefficient emulation/unpacking bottleneck**. The 3-bit format saves storage, but the accelerator often pays conversion and data-movement overhead before using native kernels, so latency can regress instead of improving.
