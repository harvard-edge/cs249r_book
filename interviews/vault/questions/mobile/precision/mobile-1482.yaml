title: Google Tensor G3 TPU 16-bit Format Recall
scenario: You are optimizing the Gemini Nano LLM for on-device inference on the Google Tensor G3. To maximize throughput while maintaining dynamic range, you need to select the native 16-bit floating-point format designed by Google for TPUs.
question: What is the name of this format, and how many bits does it allocate to the exponent versus the fraction?
details:
  realistic_solution: The correct format is bfloat16 (Brain Floating Point). It allocates 8 bits for the exponent and 7 bits for the fraction (plus 1 sign bit). This design matches the dynamic range of FP32, making it highly robust for TPU inference without the need for complex loss scaling.
  common_mistake: |
    **The Pitfall:** Confusing bfloat16 with standard IEEE FP16.
    **The Rationale:** Candidates often incorrectly identify standard FP16 (5 bits for exponent) as the TPU's native format, failing to recall the format Google designed to avoid loss scaling.
    **The Consequence:** They miscalculate the dynamic range and design systems that suffer from underflow/overflow during quantization.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model Size: ~3 Billion parameters.
       - Precision: 16-bit float vs 32-bit float.
       - Native TPU Format: bfloat16.
    2. **Calculations:**
       - FP32 Model Size = 3B * 4 bytes = 12 GB.
       - Bfloat16 Model Size = 3B * 2 bytes = 6 GB.
       - Bfloat16 Bit Layout = 1 sign bit + 8 exponent bits + 7 fraction bits = 16 bits.
    3. **Conclusion & Interpretation:**
       **Result: Memory-Capacity Bound Optimization. Bfloat16 halves memory consumption (freeing 6 GB) while preserving the 8-bit exponent of FP32 for massive dynamic range.**
