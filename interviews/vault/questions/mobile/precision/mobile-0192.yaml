title: The On-Device Memory Diet
scenario: A mobile machine learning engineer is tasked with optimizing a 150 million parameter image segmentation model for a smartphone. The model's weights are currently stored in FP16 precision. To reduce the application's memory footprint, they plan to quantize the weights to INT8.
question: How would you compare the memory required for the weights before and after quantization, and calculate the total memory savings?
details:
  realistic_solution: 'Perform a direct footprint calculation based on the parameter count and byte-size of the data type. FP16 requires 2 bytes per parameter, while INT8 requires 1 byte, effectively halving the storage and memory payload.'
  common_mistake: |
    **The Pitfall:** Confusing the memory footprint of FP32 (4 bytes) with FP16 (2 bytes).
    **The Rationale:** Engineers assume standard 32-bit floats and overestimate the initial memory size and potential savings.
    **The Consequence:** Reporting vastly incorrect memory reductions, throwing off overall application memory budgets.
  napkin_math: |
    **Assumptions & Constraints:**
    - Parameters: 150 million.
    - Precision: FP16 (2 bytes), INT8 (1 byte).

    **Calculations:**
    - Initial Footprint (FP16): 150M * 2 bytes = 300 MB.
    - Target Footprint (INT8): 150M * 1 byte = 150 MB.
    - Memory Savings: 300 MB - 150 MB = 150 MB.

    **Conclusion & Interpretation:**
    - **Result: 150 MB saved (Memory-Capacity Bound)**. Halving the precision perfectly halves the static parameter payload.
  options:
  - 'The savings will be 75 MB.'
  - 'The savings will be 150 MB.'
  - 'The savings will be 300 MB.'
  - 'The savings will be 450 MB.'
