title: The Conversion Precision Loss
scenario: You convert a PyTorch model from FP32 to Core ML FP16 for the Apple Neural Engine. Overall accuracy drops 0.3% — acceptable. But one specific layer's output diverges by 12% from the FP32 reference.
question: Which layer type is most likely the culprit, and why?
details:
  realistic_solution: The most likely culprit is a normalization layer such as BatchNorm, LayerNorm, or InstanceNorm. These layers subtract nearly equal values and divide by a small standard deviation, so small FP16 rounding differences in the input, mean, variance, or epsilon can be amplified into a much larger output difference. This is especially likely when the rest of the model stays accurate but one layer diverges sharply. The right diagnosis is to inspect normalization statistics and precision settings for that layer, and keep the sensitive normalization computation or its parameters in higher precision if the mobile runtime supports it.
  common_mistake: |
    **The Pitfall:** Blaming the largest convolution block simply because it contains the most arithmetic.
    **The Rationale:** Candidates equate operation count with precision sensitivity, instead of looking for layers that subtract close values, divide by small variances, or use stored calibration statistics.
    **The Consequence:** Failing to inspect normalization layers where FP16 rounding can be amplified into a large local divergence.
  napkin_math: |
    **Assumptions & Constraints:**
    - Normalization uses y = (x - mean) / sqrt(variance + epsilon).
    - Local variance is small: variance = 1e-4, so standard deviation = 0.01.
    - FP16 rounding leaves an absolute error of about 0.001 in x - mean for this activation range.

    **Calculations:**
    - Normalized output error is approximately 0.001 / 0.01 = 0.10.
    - If the expected normalized activation magnitude is around 0.8, a 0.10 absolute error is 0.10 / 0.8 = 12.5% relative divergence.
    - The amplification comes from division by the small standard deviation, not from an arbitrary per-layer compounding factor.

    **Conclusion & Interpretation:**
    - **Result: about 12.5% local divergence (Precision-Bound)**. A normalization layer with small variance can plausibly turn a small FP16 rounding error into the observed 12% layer-level mismatch.
