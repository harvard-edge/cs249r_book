title: Diagnosing FP8 Activation Overflow on Tensor G3 TPU
scenario: You are deploying a 1.8B parameter model to a device. To maximize throughput, the team aggressively quantized both weights and activations to FP8. During testing, the model outputs become completely nonsensical when processing long documents with rare tokens.
question: What is causing this catastrophic degradation, and how would you resolve it while maintaining target latency?
details:
  realistic_solution: 'The root cause is numeric overflow caused by the limited dynamic range of the FP8 format (e.g., E4M3 caps at 448), which cannot represent the massive outlier activations typical in LLMs. The optimal solution is to implement an outlier-aware mixed-precision strategy, isolating the specific channel dimensions containing outliers. By computing only these few channels in BF16 while keeping the rest in FP8, the system avoids overflow while still leveraging the high throughput.'
  common_mistake: |
    **The Pitfall:** Blaming TPU hardware constraints or rolling back the entire model to FP16.
    **The Rationale:** Candidates fail to identify the specific numeric limitations of the FP8 format when handling outlier activations in LLMs.
    **The Consequence:** Throwing away the performance benefits of FP8 quantization unnecessarily.
  napkin_math: |
    **Assumptions & Constraints:**
    - Latency requirement: 15 tokens/s (27 GB/s bandwidth).
    - FP8 limitation: E4M3 caps around 448.
    - Outliers: ~1% of hidden state channels.

    **Calculations:**
    - Outlier isolation: 1% of 2048-dim hidden state mapped to BF16.
    - Bandwidth overhead: ~20 bytes per layer per token.
    - Total overhead: 20 bytes * 24 layers * 15 tokens/s = 7200 bytes/s (< 10 KB/s).

    **Conclusion & Interpretation:**
    - **Result: Precision-Bound.** Mixed-precision entirely eliminates overflow with < 10 KB/s bandwidth penalty.
