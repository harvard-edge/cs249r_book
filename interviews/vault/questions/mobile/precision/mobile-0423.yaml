title: The Corrupted Video Frame
scenario: You are optimizing a real-time portrait segmentation model for an iOS app. The original FP16 model works perfectly. To reduce power consumption on the Apple A17 Pro's Neural Engine, you apply post-training INT8 quantization. The model runs faster, but the output video is full of flickering black and magenta artifacts, especially around bright highlights.
question: Based on mobile hardware pipelines, what is the most likely cause of this post-quantization visual artifacting?
details:
  realistic_solution: The most likely cause is activation overflow due to a non-representative calibration dataset. If the calibration set lacked bright, specular highlights, the calculated dynamic range is too narrow. At inference, bright lights cause activation values to spike, exceeding the `[-128, 127]` INT8 range. The Neural Engine hardware clips (saturates) these values, introducing massive, non-linear error that propagates through the network.
  common_mistake: |
    **The Pitfall:** Blaming generic "precision loss" or looking for hardware bugs.
    **The Rationale:** Engineers fail to distinguish between graceful degradation (rounding errors) and catastrophic failure (dynamic range overflow).
    **The Consequence:** Teams abandon highly efficient INT8 quantization entirely because they incorrectly assume the format is inherently incompatible with their model.
  napkin_math: |
    - **Calibration:** Max activation value in calibration set = 150.0.
    - **Scale Factor (S):** S = 150.0 / 127 ≈ 1.18.
    - **Inference Spike:** A bright highlight produces a real activation of 400.0.
    - **Quantization Step:** q = 400.0 / 1.18 ≈ 339.
    - **Hardware Clipping:** 339 overflows INT8, hardware clips to the max value of 127.
    - **Dequantization:** r' = 127 * 1.18 ≈ 150.0.
    - **Result:** **The original value of 400.0 is truncated to 150.0 (a 62.5% error), causing cascading visual corruption.**
  options:
  - The INT8 format has lower precision, causing cumulative rounding errors to build up and corrupt the final output.
  - The Apple A17 Neural Engine has a hardware bug in its INT8 matrix multiplication units that is triggered by this model's architecture.
  - The calibration dataset was not representative, leading to activation values at inference time overflowing the INT8 dynamic range and getting clipped by the hardware.
  - The model's FP16 weights were not properly converted, and their range is too large to fit into INT8, causing them to be clipped before inference begins.
  correct_index: 2
