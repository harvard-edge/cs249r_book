title: Symmetric INT8 Quantization on Apple A17 Pro
scenario: "You are deploying a 4-layer fully connected network for gesture recognition on an Apple A17 Pro Neural Engine. A weight tensor has a float range of [-2.5, 2.5]."
question: "How would you apply symmetric INT8 quantization to this weight tensor, calculating the scale factor and the quantized integer value for a weight of 1.25?"
details:
  realistic_solution: |
    Symmetric INT8 quantization maps float values linearly to the [-127, 127] integer range, explicitly enforcing a zero-point of 0 to eliminate computational overhead during inference matrix multiplications. Calculate the scale factor by dividing the absolute maximum float value by 127, then divide the target weight by this scale and round to the nearest integer.
  common_mistake: |
    **The Pitfall:** Using the full 256 range [-128, 127] without perfectly centering zero.
    **The Rationale:** Candidates might unnecessarily apply an asymmetric zero-point shift for symmetric data.
    **The Consequence:** Increased computational overhead and potential accuracy degradation during inference.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target precision: Symmetric INT8. Integer range: [-127, 127].
    - Float range: [-2.5, 2.5]. Max absolute value = 2.5.
    - Target weight (W) = 1.25.

    **Calculations:**
    - Scale factor (S): 2.5 / 127 = 0.019685.
    - Quantized float: 1.25 / 0.019685 = 63.5.
    - Rounded integer: round(63.5) = 64.

    **Conclusion & Interpretation:**
    - **Result: Quantized value is 64 (Compute-Overhead Bottleneck Avoided)**. Symmetric quantization enforces a zero-point of 0, bypassing the compute-overhead bottleneck inherent to asymmetric zero-point operations.
