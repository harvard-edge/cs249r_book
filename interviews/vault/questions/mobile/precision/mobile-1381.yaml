title: Sub-3-bit LLM Deployment on Exynos NPU
scenario: You are leading the deployment of an 8B parameter generative assistant on the Samsung Exynos 2400. During heavy camera usage, concurrent subsystems reserve 8.5 GB, leaving only 3.5 GB for your model and KV cache.
question: How can an 8B assistant be quantized below 4 bits to fit the Exynos 2400 memory budget during heavy camera use?
details:
  realistic_solution: |
    The candidate should design a mixed-precision deployment where embeddings, output projection, and attention-sensitive layers remain near 4-bit, while most MLP blocks use 2-bit to 3-bit weight-only quantization such as AQLM, QuIP-style lattice quantization, or grouped GPTQ/AWQ variants. The runtime should keep weights in one packed read-only mapping, dequantize into the accelerator's supported INT8/FP16 execution path by tile, and reserve explicit memory for KV cache, scales, metadata, and scratch buffers. The goal is an average payload around 2.8-3.0 bits/parameter, not an unsupported custom NPU SRAM unpacking requirement.
  common_mistake: |
    **The Pitfall:** Proposing uniform 4-bit quantization (like standard AWQ or GPTQ).
    **The Rationale:** Engineers default to standard 4-bit quantization without doing the precise memory math required for extreme edge constraints.
    **The Consequence:** The model footprint reaches ~4 GB, overflowing the 3.5 GB limit before even allocating space for the KV context cache.
  napkin_math: |
    **Assumptions & Constraints:**
    - Available Memory: 12 GB Total - 8.5 GB (OS/ISP/GPU) = 3.5 GB.
    - KV Cache reservation: 0.5 GB.
    - Parameters: 8 Billion.

    **Calculations:**
    - Weight Budget = 3.5 GB - 0.5 GB = 3.0 GB.
    - If 0.15 GB is reserved for scales, codebooks, alignment, and graph metadata, packed weight payload budget = 2.85 GB.
    - Target average payload = (2.85 GB * 8 bits/byte) / 8B params = 2.85 bits/param.
    - Uniform 4-bit weights would require 8B * 0.5 bytes = 4.0 GB before KV cache or metadata, exceeding the 3.5 GB limit.
    - A mixed plan can keep 25% of weights at 4 bits and 75% at 2.5 bits: (0.25 * 4) + (0.75 * 2.5) = 2.875 bits/param, or about 2.875 GB of payload.

    **Conclusion & Interpretation:**
    - **Result: about 2.9 bits/parameter average.** The deployment is memory-capacity-bound: below-4-bit mixed precision is required, but the exact threshold comes from weights plus KV cache and metadata, not a per-token bandwidth calculation.
