title: 'Core ML Palettization vs GGUF Quantization for LLM on iPhone'
scenario: 'A team compares Apple Core ML palettization (4-bit lookup table per weight block) vs GGUF Q4_K_M (4-bit mixed quantization) for deploying Llama-3-8B on iPhone 15 Pro. Core ML achieves 12 tok/s with a 4.5GB model; GGUF achieves 15 tok/s with a 4.3GB model.'
question: 'Why does GGUF Q4_K_M reach 15 tok/s while Core ML palettization reaches 12 tok/s for Llama-3-8B on iPhone 15 Pro?'
details:
  realistic_solution: |
    Core ML palettization stores weights as 4-bit indices into a lookup table executed by the Neural Engine. It suffers from lookup table dereference overhead and graph compilation constraints. GGUF Q4_K_M uses mixed-precision (K-quant) running on the CPU with BLAS and Metal GPU fallback. The CPU+GPU combo effectively utilizes memory bandwidth for token generation.
  common_mistake: |
    **The Pitfall:** Assuming fewer bits directly yields faster inference.
    **The Rationale:** Candidates ignore the runtime engine, operator fusion, and hardware unit utilization, assuming quantization format is the sole determinant of speed.
    **The Consequence:** They misattribute the performance gap to the model size rather than execution overhead.
  napkin_math: |
    **Assumptions & Constraints:**
    - Memory Bandwidth (BW) limit: 68 GB/s.
    - GGUF size: 4.3GB.

    **Calculations:**
    - Time per token limit = 4.3GB / 68 GB/s = ~63 ms/token.
    - Theoretical max speed = 1000 ms / 63 ms = 15.9 tok/s.
    - GGUF utilization = 15 / 15.9 = 94%.
    - Core ML utilization = 12 / 15.9 = 75%.

    **Conclusion & Interpretation:**
    - **Result: 15.9 tok/s limit (Memory-Bandwidth-Bound)**. ANE scheduling overhead costs ~20% of max throughput.
