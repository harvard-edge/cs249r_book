title: Extreme Sub-4-bit Quantization on Samsung Exynos 2400 NPU
scenario: You are tasked with deploying a 7-billion parameter language model (LLM) on the Samsung Exynos 2400 NPU (34.7 TOPS, 12 GB LPDDR5X). To meet aggressive latency and memory footprint targets, you decide to explore extreme sub-4-bit quantization (e.g., INT2, INT3) using techniques like AWQ or GPTQ.
question: How would you evaluate extreme sub-4-bit quantization for an LLM on Exynos 2400 NPU?
details:
  realistic_solution: |
    First verify whether the Exynos 2400 deployment stack exposes native INT2 or INT3 kernels for the needed transformer operators; if it does not, treat sub-4-bit quantization as a compressed weight-storage format that must be unpacked or dequantized into INT8/FP16 for execution. Use AWQ or GPTQ for weight-only compression, keep sensitive layers such as embeddings, normalization, and logits at higher precision, and validate with task-specific calibration and accuracy tests. Then micro-benchmark the real runtime path: NPU placement, CPU/GPU fallback, dequantization overhead, memory bandwidth, KV-cache traffic, power, and end-to-end token latency. Gate deployment on measured results rather than on the 34.7 TOPS peak.
  common_mistake: |
    **The Pitfall:** Overlooking hardware limitations for non-standard integer arithmetic.
    **The Rationale:** Candidates assume generic quantization benefits apply everywhere without checking explicit hardware support for INT2/INT3.
    **The Consequence:** The model fails to execute efficiently because the NPU falls back to slower execution modes for unsupported data types.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: 7B params
    - Exynos RAM: 12 GB LPDDR5X
    - Exynos Compute: 34.7 TOPS peak INT8; native INT2/INT3 support is not assumed.
    - Generation rate target: 15 tokens/sec

    **Calculations:**
    - FP16 Size = 7B * 2 bytes = 14 GB (OOM)
    - INT4 weight size = 7B * 0.5 bytes = 3.5 GB before scales, KV cache, activations, and runtime overhead.
    - INT3 weight size = 7B * 0.375 bytes = 2.625 GB before metadata and unpacking overhead.
    - INT2 weight size = 7B * 0.25 bytes = 1.75 GB before metadata and unpacking overhead.
    - Decoder latency depends on reading quantized weights, KV-cache traffic, dequantization/unpacking, and operator placement; multiplying parameters by target tokens/sec does not model the full transformer decode path.

    **Conclusion & Interpretation:**
    - **Result: Sub-4-bit weights solve the raw weight-memory problem, but feasibility is runtime-bound.** Without native kernels, unpacking and fallback can dominate, so deployment must be proven by end-to-end latency, memory, power, and accuracy measurements.
