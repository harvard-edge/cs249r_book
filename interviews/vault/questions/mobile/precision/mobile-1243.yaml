title: Architecting Mixed-Precision Inference on A17 Pro
scenario: You are designing the inference architecture for a real-time semantic segmentation model deployed on the Apple A17 Pro Neural Engine. The model must run concurrently with a resource-heavy application sharing the 8 GB unified memory. You need to architect a precision strategy that utilizes the 16-core Neural Engine's 35 TOPS compute while staying within a strict 500MB memory budget and a ~5W power envelope to prevent thermal throttling.
question: What mixed-precision strategy fits an A17 Pro segmentation model within 500MB while preserving accuracy and power?
details:
  realistic_solution: 'Use a calibrated mixed-precision layout: quantize the convolution and projection weights that dominate size and bandwidth to INT8, keep normalization, small residual paths, and the final segmentation head in FP16 where accuracy is sensitive, and fuse dequantization with supported Neural Engine kernels. This gives a concrete memory fit while reducing shared-memory traffic; the power claim should be verified by profiling DRAM bandwidth and thermal behavior on representative frames.'
  common_mistake: |
    **The Pitfall:** Proposing a uniform INT8 quantization strategy to meet memory constraints.
    **The Rationale:** Candidates fail to evaluate the impact of uniform quantization on sensitive layers, and overlook the power impact of memory bandwidth on unified memory architectures.
    **The Consequence:** The model fits the memory budget but suffers severe accuracy degradation, or thermal throttles due to excessive DRAM fetches.
  napkin_math: |
    **Assumptions & Constraints:**
    - Original FP32 model size: 1.8GB.

    **Calculations:**
    - Quantizing 90% of weights to INT8: 1.8GB * 0.9 / 4 = 405MB.
    - Keeping the remaining 10% in FP16: 1.8GB * 0.1 / 2 = 90MB.
    - Total mixed-precision size: 405MB + 90MB = 495MB (fits 500MB budget).
    - This leaves only about 5MB for weight metadata inside the stated model-footprint target, so activations and runtime buffers must be budgeted separately or the INT8 share must increase.
    - A 100 GOP/frame workload at 35 TOPS peak would be 100 / 35,000 = about 2.9ms only as a best-case compute lower bound; mixed precision, memory traffic, and kernel overhead decide real latency and power.

    **Conclusion & Interpretation:**
    - **Result: 495MB model footprint (Memory-Bandwidth Sensitive)**. The allocation can fit the 500MB weight budget, but the design must validate accuracy-sensitive FP16 layers and profile bandwidth/power rather than assuming peak TOPS guarantees the thermal target.
