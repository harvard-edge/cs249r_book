title: Optimizing Sub-4-bit LLM Deployment on Google Tensor G3
scenario: Your team is deploying a 2B parameter LLM on the Google Tensor G3. Initial deployment using standard 8-bit weight quantization is functional, but token generation rates are slow.
question: How would you optimize a sub-4-bit LLM deployment on Tensor G3 for memory-bandwidth-bound decoding?
details:
  realistic_solution: Use an Android inference path that Tensor G3 actually supports, such as a vendor NNAPI delegate, LiteRT/TFLite delegate, or an on-device LLM runtime with tested INT4 weight-only kernels. Quantize offline with group-wise scales, pack weights in the runtime's expected layout, and rely on supported fused dequantization where available rather than assuming custom TPU SRAM kernels. If the supported path only accelerates INT8, keep the critical layers at INT8 or use hybrid CPU/GPU/NPU execution only after profiling shows the INT4 bandwidth savings exceed unpacking and scheduling overhead.
  common_mistake: |
    **The Pitfall:** Assuming reducing bit-width linearly improves speed without accounting for dequantization overhead.
    **The Rationale:** Engineers focus solely on the reduced memory payload, forgetting that sub-byte formats like INT4 often require unpacking to INT8/FP16 in SRAM before matrix multiplication.
    **The Consequence:** Implementing a quantization scheme that isn't natively supported, causing pipeline stalls that negate all memory bandwidth savings.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: 2B params. INT8 footprint: 2 GB.
    - LPDDR5X Bandwidth: ~60 GB/s. TPU Compute: 7.5 TOPS.
    - Approximate decode compute per token: 2B MACs = about 4 GOPS.
    - Assume weight traffic is streamed once per decode token; activations and KV-cache add overhead.

    **Calculations:**
    - INT8 Weight-Read Lower Bound: 2 GB / 60 GB/s = 33ms per token before KV-cache and kernel overhead.
    - Compute Lower Bound: 4 GOPS / 7,500 GOPS/sec = 0.53ms per token, so weight traffic dominates this estimate.
    - 4-bit Footprint: 2B * 0.5 bytes = 1 GB.
    - 4-bit Weight-Read Lower Bound: 1 GB / 60 GB/s = 16.7ms per token before dequantization, KV-cache, and scheduler overhead.
    - Practical Gain: speedup is bounded by the fraction of decode time spent reading weights and by fused dequantization efficiency.

    **Conclusion & Interpretation:**
    - **Result: up to 2x lower weight-read time (Memory-Bandwidth Bound)**. INT4 can reduce the dominant weight traffic from 33ms to 16.7ms per token, but end-to-end throughput only approaches that gain if fused dequantization and KV-cache traffic do not dominate.
