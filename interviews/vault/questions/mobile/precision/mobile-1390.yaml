title: On-Device FP8 Inference Design for LLM on A17 Pro
scenario: You are leading the deployment of a 3B parameter conversational LLM onto the Apple A17 Pro Neural Engine. The model must run entirely on-device to ensure privacy and offline capability. The A17 Pro features a 16-core Neural Engine delivering 35 TOPS within a ~5W envelope, sharing 8 GB of unified memory with the CPU/GPU.
question: How would you design mixed-precision FP8 activation inference for an on-device LLM on A17 Pro?
details:
  realistic_solution: |
    A robust L6+ solution separates weight precision from activation precision. Weights may be statically quantized to 4-bit or 8-bit depending on quality and hardware support, while activations in feed-forward layers use dynamic FP8 scaling per token or per channel to handle outliers. Crucial attention layers such as Query/Key projections can remain in FP16 or higher-precision FP8 formats to preserve generation quality. The design must explicitly map the batch-1 memory access pattern: FP8 activations reduce transient activation bandwidth and storage, but decode latency is still usually governed by repeatedly reading the 3B weights from unified memory.
  common_mistake: |
    **The Pitfall:** Proposing simple static quantization or uniform FP8 conversion.
    **The Rationale:** Candidates fail to address the dynamic range of activations in LLMs and overlook the shared unified memory bottleneck on mobile SoCs.
    **The Consequence:** Generating garbled text due to outlier clipping and missing latency targets because the system is memory-bound, not compute-bound.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: 3B parameters.
    - Compute: 35 TOPS, but batch-1 decode planning is usually memory-bandwidth-led.
    - Target throughput: 10 tokens/s.
    - Decode batch size: 1, so each generated token streams most model weights from shared memory.
    - FP8 here refers to activation tensors; weight precision is a separate W8 or W4 design choice.

    **Calculations:**
    - W8 weights size is approximately 3B params * 1 byte = 3 GB, ignoring small scale/metadata overheads.
    - W8 weight bandwidth at 10 tok/s = 3 GB/token * 10 tok/s = 30 GB/s.
    - W4 weights would be approximately 1.5 GB plus scales/packing overhead, or about 15+ GB/s at 10 tok/s.
    - FP8 activations can roughly halve activation storage versus FP16 for selected layers, but they do not halve weight traffic unless weights are also quantized.
    - Therefore the precision plan must budget both weight-stream bandwidth and FP8 activation scale/format conversion overheads.

    **Conclusion & Interpretation:**
    - **Result: memory-bandwidth-led FP8 activation design.** FP8 activations help dynamic range and transient memory use, but the speed target depends mainly on the chosen weight precision and measured unified-memory bandwidth, not on a simplified TOPS estimate.
