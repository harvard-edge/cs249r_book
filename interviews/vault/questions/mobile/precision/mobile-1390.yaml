title: On-Device FP8 Inference Design for LLM on A17 Pro
scenario: You are leading the deployment of a 3B parameter conversational LLM onto the Apple A17 Pro Neural Engine. The model must run entirely on-device to ensure privacy and offline capability. The A17 Pro features a 16-core Neural Engine delivering 35 TOPS within a ~5W envelope, sharing 8 GB of unified memory with the CPU/GPU.
question: How would you design mixed-precision FP8 activation inference for an on-device LLM on A17 Pro?
details:
  realistic_solution: 'A robust L6+ solution designs a selective mixed-precision approach: weights are statically quantized to 4-bit or 8-bit, while activations in feed-forward layers use dynamic FP8 scaling per-token or per-channel to handle outliers. Crucial attention layers (Query/Key projections) remain in FP16 to preserve generation quality. The design must explicitly map the memory access patterns, recognizing that at a batch size of 1 (typical for mobile UI), the bottleneck is memory bandwidth (reading the 3B weights), not the 35 TOPS of compute.'
  common_mistake: |
    **The Pitfall:** Proposing simple static quantization or uniform FP8 conversion.
    **The Rationale:** Candidates fail to address the dynamic range of activations in LLMs and overlook the shared unified memory bottleneck on mobile SoCs.
    **The Consequence:** Generating garbled text due to outlier clipping and missing latency targets because the system is memory-bound, not compute-bound.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: 3B parameters.
    - Compute: 35 TOPS.
    - Target throughput: 10 tokens/s.
    - Decode batch size: 1, so each generated token streams most model weights from shared memory.
    - Transformer decode cost estimate: roughly 2 operations per parameter per token.

    **Calculations:**
    - W8A8 weights size = 3 GB.
    - Bandwidth for 10 tok/s = 3 GB/token * 10 tok/s = 30 GB/s.
    - Compute per token = 2 * 3B ops = 6 GOPs.
    - Compute demand at 10 tok/s = 6 GOPs/token * 10 tok/s = 60 GOPS = 0.06 TOPS.
    - Ideal compute latency per token = 6 GOPs / 35 TOPS = 0.17 ms, far below the 100 ms/token throughput budget.

    **Conclusion & Interpretation:**
    - **Result: ~30 GB/s weight bandwidth for W8A8 at 10 tok/s (Memory Bandwidth-Bound).** FP8 activations help dynamic range and capacity, but the speed decision must be validated against measured weight bandwidth and quality, not assumed from FP8 alone.
