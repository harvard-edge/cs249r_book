title: The Cross-SoC Quantization Divergence
scenario: You ship a single INT8 TFLite object detection model for an autonomous drone. It must identify landing zones with >95% precision. Testing on Pixel 8 yields 97.2%. On Galaxy S23 yields 96.8%. On an international Galaxy S23 FE with Exynos 2200, precision drops to 91.3%, failing the safety threshold. It's the exact same model binary and test images.
question: Why does INT8 precision drop by 6% on the Exynos 2200, and how do you fix it without maintaining three separate models?
details:
  realistic_solution: |
    The precision drop is most likely a delegate/runtime mismatch rather than a different model. The Exynos 2200 path may select different TFLite delegate kernels, fusion boundaries, rounding behavior, saturation rules, or requantization paths than the Pixel and Galaxy S23 paths. Those differences can be enough to move objectness or class logits around safety thresholds, especially for small or low-contrast landing zones. Fix it with one model by validating CPU-reference vs delegate tensor dumps, disabling or falling back from sensitive delegate ops, improving representative calibration/QAT for the deployed delegates, and using per-SoC confidence-threshold calibration only after measuring ROC curves on the same safety dataset.
  common_mistake: |
    **The Pitfall:** Assuming the Exynos device is simply "less accurate" and defaulting to a heavier FP16 model.
    **The Rationale:** Engineers treat mobile delegates as black boxes, instead of checking whether kernel selection, fusion, calibration ranges, or thresholding changed the detector's operating point.
    **The Consequence:** Increasing model size and power without first testing cheaper fixes such as delegate fallbacks, better calibration, QAT, or measured per-SoC thresholds.
  napkin_math: |
    **Assumptions & Constraints:**
    - Safety precision threshold: 95%.
    - Measured precision on Exynos 2200 path: 91.3%.
    - Detector confidence threshold: 0.85.
    - Borderline landing-zone detections often sit near the threshold, for example 0.83 to 0.87.

    **Calculations:**
    - Precision shortfall: 95.0% - 91.3% = 3.7 percentage points.
    - A candidate with confidence 0.86 passes the 0.85 threshold on the reference path.
    - If delegate numeric drift changes that confidence by -0.03, it becomes 0.83 and fails.
    - The 3.7-point product failure is measured from the evaluation set; the per-example confidence shift must be confirmed with tensor dumps and ROC analysis.

    **Conclusion & Interpretation:**
    - **Result: 3.7-point precision shortfall on the Exynos 2200 path (Precision-Bound)**. Keep one model, but validate delegate behavior and calibrate thresholds or fallbacks per measured SoC family rather than relying on unsupported hardware assumptions.
