title: Mixed-Precision Inference Architecture on A17 Pro
scenario: You are designing the deployment architecture for a real-time video segmentation model on an Apple A17 Pro. The application demands 60 FPS processing while staying within the ~5W power envelope to prevent thermal throttling.
question: How should a 60 FPS A17 Pro segmentation model partition INT8 and FP16 work to balance speed, bandwidth, and accuracy?
details:
  realistic_solution: The optimal design runs the dense feature extraction backbone in INT8 on the Neural Engine to maximize compute capability within the 5W budget. The sensitive final upsampling layers and segmentation heads are kept in FP16. To minimize bandwidth on the unified memory, precision casting is fused with the final backbone layers, ensuring data remains in place and avoiding costly round-trips to the CPU.
  common_mistake: |
    **The Pitfall:** Suggesting naive post-training quantization to INT8 for the entire model.
    **The Rationale:** Candidates fail to recognize that segmentation output heads lose critical spatial resolution at lower precisions, and overlook the unified memory bottleneck.
    **The Consequence:** This results in degraded segmentation accuracy and proposes architectures that require expensive memory copies between the ANE and GPU.
  napkin_math: |
    **Assumptions & Constraints:**
    - Frame Rate: 60 FPS.
    - Compute per frame: 50 GOps.
    - Parameters: 30 Million.
    - Split: 80% INT8, 20% FP16.

    **Calculations:**
    - Total compute required: 60 FPS x 50 GOps/frame = 3 TOPS.
    - Weights footprint: (24M x 1B) + (6M x 2B) = 36MB.
    - Memory bandwidth: 36MB x 60 FPS = 2.16 GB/s.

    **Conclusion & Interpretation:**
    - **Result: 2.16 GB/s Bandwidth (Compute-Bound)**. Mixed precision achieves low thermal draw while reserving accurate output metrics.
