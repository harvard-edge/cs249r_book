title: Mixed-Precision Inference Architecture on A17 Pro
scenario: You are designing the deployment architecture for a real-time video segmentation model on an Apple A17 Pro. The application demands 60 FPS processing while staying within the ~5W power envelope to prevent thermal throttling.
question: How should a 60 FPS A17 Pro segmentation model partition INT8 and FP16 work to balance speed, bandwidth, and accuracy?
details:
  realistic_solution: The practical Core ML design keeps supported dense backbone or encoder blocks in INT8, or FP16 when INT8 kernels are not available, and lets the runtime place those blocks on the Apple Neural Engine where supported. Accuracy-sensitive decoder, upsampling, and segmentation-head operations should remain FP16 and may run on the GPU if the Neural Engine does not support the exact graph efficiently. The key is to minimize graph partitions and tensor format conversions across ANE/GPU boundaries, profile activation traffic, and avoid assuming arbitrary runtime precision fusion or explicit CPU round-trips that the platform does not guarantee.
  common_mistake: |
    **The Pitfall:** Suggesting naive post-training quantization to INT8 for the entire model.
    **The Rationale:** Candidates fail to recognize that segmentation output heads lose critical spatial resolution at lower precisions, and overlook the unified memory bottleneck.
    **The Consequence:** This results in degraded segmentation accuracy and proposes architectures that require expensive memory copies between the ANE and GPU.
  napkin_math: |
    **Assumptions & Constraints:**
    - Frame Rate: 60 FPS.
    - Compute per frame: 50 GOps.
    - Parameters: 30 Million.
    - Split: 80% INT8, 20% FP16.
    - Activation and feature-map traffic estimate: 120 MB/frame after tiling and reuse.

    **Calculations:**
    - Total compute required: 60 FPS x 50 GOps/frame = 3 TOPS.
    - Weight footprint: (24M x 1 byte) + (6M x 2 bytes) = 36 MB.
    - Weight-read bandwidth if the full weight footprint is streamed every frame: 36 MB x 60 FPS = 2.16 GB/s.
    - Activation bandwidth estimate: 120 MB/frame x 60 FPS = 7.2 GB/s.
    - Estimated model DRAM traffic: 2.16 GB/s + 7.2 GB/s = 9.36 GB/s before extra graph-partition copies.

    **Conclusion & Interpretation:**
    - **Result: 3 TOPS compute and roughly 9.36 GB/s modeled DRAM traffic.** The weight footprint alone is not the bottleneck; activation traffic and ANE/GPU partition boundaries determine whether the mixed-precision split stays within the 60 FPS power budget.
