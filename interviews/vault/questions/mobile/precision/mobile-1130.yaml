title: Architecting a Sub-4-bit LLM Pipeline for Samsung Exynos 2400
scenario: Your team is deploying a 7B parameter generative model on a mobile NPU. The device has 12 GB of LPDDR5X memory, but only 4 GB is strictly available for your application. You must architect an extreme quantization strategy to fit the model and KV cache in memory while preserving conversational accuracy.
question: How would you evaluate the design choices between techniques like GPTQ and AWQ, considering the NPU's hardware execution profile?
details:
  realistic_solution: |
    A robust design evaluates GPTQ and AWQ against both model quality and the mobile NPU execution path. GPTQ can deliver strong post-training accuracy at low bit widths, but it is calibration-sensitive and may produce packing schemes that are awkward for available kernels. AWQ is often more hardware-friendly because it protects activation-sensitive channels while keeping the bulk of weight-only quantization simple enough for group-wise mobile kernels. The recommended path is to choose the lowest group-wise weight format that the runtime actually accelerates, typically an INT4/AWQ-style weight-only layout with FP16 or INT8 activations, and reserve memory for KV cache and activations. Sub-4-bit formats should be accepted only if profiling shows that unpack/dequantization overhead and kernel support beat INT4 end to end.
  common_mistake: |
    **The Pitfall:** Proposing pure 2-bit or 3-bit weight-only quantization without budgeting for KV cache.
    **The Rationale:** Candidates focus purely on squeezing the weights into memory, forgetting that KV cache also requires significant RAM during generation.
    **The Consequence:** The model loads, but fails instantly with an OOM error upon receiving its first conversational prompt.
  napkin_math: |
    **Assumptions & Constraints:**
    - Available Memory: 4.0 GB.
    - Model: 7B parameters.
    - Candidate quantization: 3.2-bit average weight storage after scale/metadata overhead.

    **Calculations:**
    - Quantized Weights: 7B x (3.2 / 8) bytes = 2.8 GB.
    - Remaining Memory: 4.0 GB - 2.8 GB = 1.2 GB.

    **Conclusion & Interpretation:**
    - **Result: 1.2 GB remaining after weights (Memory-Bound).** That remainder must cover KV cache, activations, and runtime buffers, so the quantization choice is viable only if the NPU/runtime supports the format without excessive unpacking overhead.
