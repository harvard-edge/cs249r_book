title: The INT8 Memory Payoff
scenario: 'You''re optimizing a new augmented reality filter for the latest smartphone. Your MobileNet-style vision model has 7 million parameters and is currently stored in FP16 precision. To improve performance and reduce battery drain, your team decides to quantize the model''s weights to INT8.'
question: 'How would you explain the impact on the model''s static memory footprint and calculate the new size in megabytes?'
details:
  realistic_solution: 'Quantizing from FP16 (2 bytes per parameter) to INT8 (1 byte per parameter) halves the model''s static memory footprint.'
  common_mistake: |
    **The Pitfall:** Confusing the baseline precision or bits vs bytes.
    **The Rationale:** Candidates often assume FP32 (4 bytes) instead of the mobile-standard FP16 (2 bytes), or incorrectly calculate bits vs bytes.
    **The Consequence:** Miscalculating the absolute memory savings, which is critical for budgeting tight mobile memory.
  napkin_math: |
    **Assumptions & Constraints:**
    - Parameters: 7,000,000.
    - FP16 Size: 2 bytes per parameter.
    - INT8 Size: 1 byte per parameter.

    **Calculations:**
    - FP16 Baseline: 7,000,000 × 2 bytes = 14,000,000 bytes = 14 MB.
    - INT8 Quantized: 7,000,000 × 1 byte = 7,000,000 bytes = 7 MB.
    - Memory Saved: 14 MB - 7 MB = 7 MB (50% reduction).

    **Conclusion & Interpretation:**
    - **Result: Memory-Bound Optimization**. INT8 reduces the static footprint from 14 MB to **7 MB**, drastically lowering requisite memory bandwidth to load the weights.
  options:
  - '14 MB'
  - '7 MB'
  - '3.5 MB'
  - '28 MB'
