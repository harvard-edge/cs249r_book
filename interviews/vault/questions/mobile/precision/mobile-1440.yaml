title: Sizing W4A8 LLM Deployment on Snapdragon 8 Gen 3 Hexagon NPU
scenario: Your team is tasked with deploying a 7B parameter LLM for an on-device assistant on a flagship phone. The OS restricts your app's peak memory to 4 GB for both weights and KV cache.
question: How would you deploy a 7B LLM with W4A8 quantization under a 4 GB RAM limit, and what is its impact?
details:
  realistic_solution: |
    W4A8 is necessary but not automatically sufficient. The deployment must budget weights, KV cache, activations, runtime workspace, and fragmentation under the 4 GB cap. A feasible recipe is 4-bit weight storage with INT8 activations, a capped or sliding context window, preallocated KV cache, and device profiling to verify dequantization and memory traffic. If the required context pushes KV cache beyond the remaining headroom, the correct deployment choice is a smaller model, shorter context, or offloaded/cloud fallback rather than claiming the 7B model fits solely because the weights are 3.5 GB.
  common_mistake: |
    **The Pitfall:** Believing W4A8 doubles compute throughput.
    **The Rationale:** Candidates assume NPU MAC units operate natively on 4-bit, ignoring decompression requirements.
    **The Consequence:** Incorrectly forecasting compute speeds and missing that decoding remains fundamentally memory-bound.
  napkin_math: |
    **Assumptions & Constraints:**
    - Budget: 4 GB.
    - Model: 7B params.
    - Bandwidth: ~64 GB/s.
    - Compute: 45 TOPS INT8.
    - KV cache: 32 layers, 8 KV heads, head_dim 128, FP16 K/V.
    - Runtime workspace and activations: reserve 200 MB.

    **Calculations:**
    - W8A8 Size = 7B * 1 byte = 7 GB (Fails).
    - W4A8 weight size = 7B * 0.5 byte = 3.5 GB.
    - KV bytes/token = 2 (K/V) * 32 * 8 * 128 * 2 bytes = 131,072 bytes/token.
    - 2K-token KV cache = 2048 * 131,072 = 268 MB.
    - 4K-token KV cache = 4096 * 131,072 = 537 MB.
    - 2K total = 3.5 GB + 0.268 GB + 0.200 GB = 3.968 GB, leaving almost no margin.
    - 4K total = 3.5 GB + 0.537 GB + 0.200 GB = 4.237 GB, exceeding the cap.
    - Decode compute lower bound = 2 * 7B = 14 GOP/token; 14 GOP / 45 TOPS = 0.31 ms/token before memory and dequantization overhead.
    - If profiling shows the full 3.5 GB weight stream is read from DRAM per token, the bandwidth bound is 3.5 GB / 64 GB/s = 54.7 ms/token.

    **Conclusion & Interpretation:**
    - **Result: feasible only with a small context and tight residency control**. At 2K context the model barely fits; at 4K it does not. Latency and throughput must be measured from actual per-token DRAM traffic, but the compute lower bound is far below the likely memory/dequantization cost.
