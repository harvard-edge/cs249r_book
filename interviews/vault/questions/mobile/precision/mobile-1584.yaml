title: 'Extreme Quantization for On-Device LLM: A17 Pro Evaluation'
scenario: 'You are deploying a 7B large language model (LLM) on an iPhone-class Apple A17 Pro device with a published 35 TOPS Neural Engine peak and 8 GB unified memory. You have two quantized variants: Model A uses a sub-3-bit weight format, and Model B uses GPTQ/AWQ 4-bit weight quantization.'
question: How would you evaluate extreme quantization options for an on-device LLM on Apple A17 Pro considering power, performance, and latency?
details:
  realistic_solution: Evaluate the two variants as complete Core ML or Metal deployments, not just as bit-widths. Run offline accuracy checks first, then profile on device for model placement, fallback behavior, token latency at the target context length, memory footprint including KV cache, and sustained power/thermal behavior. Model B's 4-bit weights are more likely to map to supported mobile inference paths, while Model A may save memory but can lose if sub-3-bit weights must be unpacked or dequantized before execution. Choose the variant with measured accuracy, latency, and energy per token, not the one with the smallest checkpoint.
  common_mistake: |
    **The Pitfall:** Selecting extreme quantization based entirely on memory footprint without testing ALU unpacking cost.
    **The Rationale:** Candidates assume 2-bit always doubles performance of 4-bit by strictly looking at bandwidth math.
    **The Consequence:** Deploying a 2-bit model that runs 3x slower and hotter because the NPU lacks native sub-4-bit ALUs and stalls doing bitmasking.
  napkin_math: |
    **Assumptions & Constraints:**
    - Memory footprint: 7B parameters.
    - Model B (4-bit) requires ~3.5 GB.
    - Model A (2-bit) needs ~1.75 GB.
    - A17 Pro Neural Engine peak is not the same as sustained LLM decode throughput.

    **Calculations:**
    - 4-bit weights: 7B * 0.5 bytes = 3.5 GB before scales, KV cache, activations, and runtime overhead.
    - 2-bit weights: 7B * 0.25 bytes = 1.75 GB before metadata and unpacking overhead.
    - If sub-3-bit weights are unpacked into 4-bit, INT8, or FP16 buffers during execution, part of the memory saving can turn into extra memory traffic and latency.
    - End-to-end token time must include attention/KV-cache traffic, operator coverage, dequantization, thermal throttling, and CPU/GPU fallback.

    **Conclusion & Interpretation:**
    - **Result: Model A has the smaller stored weights, but Model B may be faster and more energy efficient if it uses supported kernels.** Pick by measured on-device latency, energy, memory headroom, and accuracy rather than ideal TOPS math.
