title: The Cross-Platform Confidence Divergence
scenario: You train a single PyTorch image classification model and deploy it as CoreML on iOS and TFLite
  on Android. Both use INT8 quantization. For the same test image, the iOS model outputs 87% confidence
  while the Android model outputs 71% confidence.
question: Where do CoreML and TFLite INT8 conversion differences make iOS show 87% confidence while Android
  shows 71%?
details:
  realistic_solution: 'Conversion steps introduce platform-specific numerical divergence. 1) Quantization
    schemas: TFLite vs CoreML use different asymmetric calibration, shifting raw logits. 2) Hardware LUTs:
    TFLite INT8 softmax uses limited-precision Lookup Tables for exp(), while CoreML promotes to FP16.
    3) Exponentiation: Small logit discrepancies are magnified by the softmax exponential, causing a massive
    post-softmax confidence shift. Fix by applying temperature scaling or threshold calibration per-platform.

    '
  common_mistake: '**The Pitfall:** Assuming requantizing with the same calibration data guarantees identical
    outputs across platforms.

    **The Rationale:** Developers often treat quantization as a deterministic mathematical function, ignoring
    vendor-specific LUTs and compiler optimizations.

    **The Consequence:** Unexplained UX divergences and silent accuracy regressions across iOS and Android.

    '
  napkin_math: '**Assumptions & Constraints:**

    - FP32 Logits: [2.59, 0.0, 0.0]

    - CoreML computes FP16 Softmax.

    - TFLite INT8 Quantization calibrates such that logit 2.59 dequantizes to 1.58 due to LUT constraints.


    **Calculations:**

    - Reference Softmax (iOS): exp(2.59) / (exp(2.59) + exp(0.0) + exp(0.0)) = 13.33 / (13.33 + 2) = 0.87
    (87%).

    - INT8 TFLite (Android): exp(1.58) / (exp(1.58) + exp(0.0) + exp(0.0)) = 4.85 / (4.85 + 2) = 0.71
    (71%).


    **Conclusion & Interpretation:**

    - **Result: 16% shift (Precision/Math-Bound)**. LUT saturation and asymmetric calibration swings confidence
    by 16% across platforms.

    '
