title: 'INT8 Quantization Memory Bandwidth Analysis'
scenario: 'We are deploying a 2 billion parameter model to the Samsung Exynos 2400 NPU, which features a dual-core NPU with 34.7 TOPS and shares 12 GB of LPDDR5X memory with the CPU and ISP. During profiling, we find the NPU compute utilization is only at 25%, yet the FP16 model is capped at 15 FPS. When we switch to INT8 Post-Training Quantization, the FPS exactly doubles to 30 FPS, even though the compute utilization remains low.'
question: 'Why does INT8 PTQ double throughput from 15 FPS to 30 FPS while compute utilization stays at 25%?'
details:
  realistic_solution: 'Because the 12 GB LPDDR5X memory is shared across the entire SoC, memory bandwidth is highly constrained. Since compute is only at a fraction of its capacity, the system is memory-bound. Quantizing from FP16 (2 bytes) to INT8 (1 byte) halves the memory payload transferred from RAM to the NPU per inference. In a strictly bandwidth-bound scenario, halving the data transfer requirement directly doubles the achievable frame rate.'
  common_mistake: |
    **The Pitfall:** Attributing the speedup to the NPU computing INT8 faster than FP16.
    **The Rationale:** Candidates assume that lower precision always accelerates the compute units.
    **The Consequence:** Failing to recognize that the system is completely memory-bound, and the NPU was already starved for data.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model Size: 2B params.

    **Calculations:**
    - FP16 Weight Bandwidth (15 FPS): 2B params * 2 bytes = 4 GB. 4 GB * 15 FPS = 60 GB/s.
    - INT8 Weight Bandwidth (30 FPS): 2B params * 1 byte = 2 GB. 2 GB * 30 FPS = 60 GB/s.

    **Conclusion & Interpretation:**
    - **Result: 60 GB/s (Memory-Bound)**. The shared LPDDR5X bus is saturated. Halving the precision cuts the memory payload in half, allowing twice as many frames to be read per second.
