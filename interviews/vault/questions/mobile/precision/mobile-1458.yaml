title: 'Quantization Sizing for Exynos 2400 Shared Memory Budget'
scenario: 'Your team is porting a 4-billion parameter language model to the Samsung Exynos 2400 NPU for an on-device translation feature. The device features 34.7 TOPS from a dual-core NPU, but relies on a unified 12 GB LPDDR5X memory pool shared heavily with the CPU, GPU, and the camera ISP. Given the shared memory contention, you must evaluate whether standard PTQ INT8 or an aggressive mixed-precision INT4/INT8 strategy is required.'
question: 'What quantization plan fits a generative model into the Exynos 2400 shared memory budget?'
details:
  realistic_solution: 'At L5, the candidate should immediately identify that generative tasks are memory-bandwidth bound rather than compute-bound. They should recommend INT4 weight-only quantization with INT8 or FP16 activations to minimize memory footprint and bandwidth usage, ensuring the 12 GB shared pool has enough headroom for the camera ISP and OS while maintaining acceptable token generation speeds.'
  common_mistake: 'Candidates often solely focus on the NPU''s 34.7 TOPS compute capacity and conclude that INT8 is sufficient since the NPU has plenty of compute. They fail to account for the shared nature of the 12 GB memory pool, ignoring that a naive INT8 model will severely bottleneck the ISP and GPU during concurrent workloads.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Model size: 4B parameters.
    - Exynos 2400 Shared Memory: 12 GB LPDDR5X (~50-60 GB/s bandwidth).
    - Compute: 34.7 TOPS.

    **Calculations:**
    - FP16 Footprint: 4B * 2 bytes = 8 GB (leaves only 4 GB for OS/GPU/ISP -> OOM risk).
    - INT8 Footprint: 4B * 1 byte = 4 GB. Speed: 4 GB / ~50-60 GB/s = ~12-15 tokens/sec.
    - INT4 Footprint: 4B * 0.5 bytes = 2 GB. Speed: 2 GB / ~50-60 GB/s = ~24-30 tokens/sec.

    **Conclusion & Interpretation:**
    - **Result: 2 GB Footprint (Memory-Bound).** INT4 weight quantization securely fits within the 12 GB shared budget and maximizes generation speed up to 30 tokens/sec.
