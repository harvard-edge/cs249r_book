title: The Headlight Saturation Problem
scenario: You are deploying a lane-detection CNN to a car's main computer (mobile-class SoC). To meet the 30 FPS target, you use post-training static quantization to convert the model from FP16 to INT8. The model performs perfectly in daytime test drives, but at night, it completely fails to detect lane lines whenever oncoming headlights appear. Debugging tools show activation values in the first three convolutional layers frequently clamping at the INT8 max value of 127 during these night-time failure cases.
question: 'What is the most likely cause of this night-time failure, and how would you solve it?'
details:
  realistic_solution: 'The root cause is a faulty calibration process. The dataset used for post-training quantization likely consisted of only daytime images. The dynamic range of these images is much lower than night scenes with bright headlights. The quantization scaling factor was therefore calculated based on a small activation range. When the model encounters headlights, the FP16 activation values drastically exceed this calibrated range and are clipped to the maximum INT8 value (127), erasing all gradient and texture information that the later layers need. The solution has two main paths: 1. Re-Calibrate with representative night-driving footage, or 2. Apply Mixed Precision, keeping the first few layers in FP16 to preserve their range.'
  common_mistake: |
    **The Pitfall:** Blaming the NPU performance, INT8 precision in general, or bugs in the quantization tool.
    **The Rationale:** Engineers often jump to hardware or tooling limitations rather than examining the data distribution used during the quantization process.
    **The Consequence:** Wasting time reverting to FP16 or trying different hardware instead of simply recalibrating the quantization ranges.
  napkin_math: |
    **Assumptions & Constraints:**
    - Daytime max activation = 5.0.
    - INT8 range [-128, 127]. Scale factor (S) = 5.0 / 127 = 0.0393.

    **Calculations:**
    - Night headlight activation reaches 50.0.
    - Quantized value = round(50.0 / 0.0393) = 1272.
    - 1272 is clamped to 127. Dequantized: 127 * 0.0393 = 5.0.

    **Conclusion & Interpretation:**
    - **Result: 90% dynamic range lost (Precision-Bound)**. Every activation between 5.0 and 50.0 is clamped to 5.0.
  options:
  - 'The mobile SoC''s NPU lacks the computational power for this model. The model needs to be pruned or a more powerful SoC is required.'
  - 'The calibration dataset was not representative, leading to a narrow quantization range and activation overflow on high-dynamic-range night images. Re-calibrate with better data or use mixed-precision for the input layers.'
  - 'INT8 precision is fundamentally insufficient for safety-critical perception tasks. The entire model must be reverted to FP16, sacrificing the performance gains.'
  - 'This is a sign of a bug in the TFLite/CoreML converter''s rounding implementation during quantization. You should try a different version of the conversion tool or report the issue.'
  correct_index: 1
