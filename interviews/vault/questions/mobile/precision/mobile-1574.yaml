title: Optimizing LLM Inference on Snapdragon 8 Gen 3 with INT4 Quantization
scenario: You are tasked with deploying a 7B parameter Large Language Model (LLM) on a mobile device powered by the Snapdragon 8 Gen 3 Hexagon NPU, which boasts 45 TOPS (INT8) and 12-16 GB LPDDR5X memory. The current LLM uses INT8 quantization, but to meet stringent latency and memory footprint requirements for real-time conversational AI, you need to achieve sub-200ms per token generation and reduce memory usage by at least 30%. Your initial profiling shows that the memory bandwidth and compute utilization for INT8 are the primary bottlenecks. The model's weights and activations are currently quantized per-tensor with symmetric zero-point.
question: How would you optimize Snapdragon 8 Gen 3 LLM inference with INT4 quantization to achieve sub-200ms TPOT and reduce memory footprint?
details:
  realistic_solution: Treat INT4 as a deployment change, not just a quantization flag. Convert the INT8 baseline to weight-only or W4A8 first, using per-channel or group-wise scales and a representative calibration set; keep activations and numerically sensitive layers in INT8 until accuracy and kernel support are proven. Use layer sensitivity tests to decide which projection, embedding, normalization, or output layers stay INT8/FP16, and apply short QAT only to layers that fail the accuracy target after PTQ. On Snapdragon 8 Gen 3, verify that the Hexagon runtime uses real INT4 kernels or efficient packed-weight dequantization, then combine INT4 with layout changes, operator fusion, KV-cache bandwidth reduction, and batching/pipelining tuned in Qualcomm profiling tools. Because the estimate shows INT4 alone may land near 210 ms/token, the plan should explicitly require additional kernel, fusion, or model-distillation gains before claiming sub-200 ms TPOT.
  common_mistake: |
    **The Pitfall:** Blindly applying INT4 post-training quantization (PTQ).
    **The Rationale:** Candidates do not consider the impact of activation ranges and specific layer sensitivities, and neglect zero-point complexities.
    **The Consequence:** The model suffers significant accuracy degradation and sub-optimal latency because calibration parameters don't effectively utilize the NPU's capabilities.
  napkin_math: |
    **Assumptions & Constraints:**
    - 7B decimal parameters, ignoring small metadata and scale overhead for a first-pass estimate.
    - INT8 weight storage: 1 byte per parameter.
    - INT4 weight storage: 0.5 bytes per parameter.
    - Current profiled TPOT: 300 ms/token, with weight bandwidth and compute utilization both contributing.

    **Calculations:**
    - INT8 raw weight storage: 7e9 * 1 byte = 7 GB.
    - INT4 raw weight storage: 7e9 * 0.5 bytes = 3.5 GB, a 50% weight-memory reduction and greater than the 30% footprint target before overheads.
    - If 60% of the 300 ms TPOT is weight-bandwidth sensitive and INT4 halves that portion, estimated TPOT = 300 ms * (0.40 non-weight + 0.60 / 2) = 210 ms/token.
    - Sub-200 ms would require additional gains from better kernels, per-channel quantization, operator fusion, KV-cache optimization, or a smaller/distilled model.

    **Conclusion & Interpretation:**
    - **Result: INT4 likely meets the memory target, but sub-200 ms TPOT is not guaranteed by halving weight precision alone.** The candidate should qualify the estimate with profiling and address KV cache, layer sensitivity, and NPU kernel efficiency.
