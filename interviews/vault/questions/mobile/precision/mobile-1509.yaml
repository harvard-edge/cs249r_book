title: Mixed-Precision Video Super-Resolution on Exynos 2400
scenario: You are tasked with specifying the precision requirements for a real-time video enhancement model running on the Samsung Exynos 2400 NPU. The system must process 30 FPS video while navigating the constraints of a shared 12 GB LPDDR5X memory pool utilized heavily by the ISP and GPU.
question: How would you specify mixed-precision (INT8/FP16) video super-resolution on Exynos 2400 to maintain fidelity without exceeding the 34.7 TOPS budget?
details:
  realistic_solution: The specification should identify sensitive layers (e.g., early feature extraction or final reconstruction) to remain in FP16, while transitioning the computationally dense, robust inner layers to INT8. The design must explicitly analyze the performance penalty of FP16, balancing the precision needs against the NPU compute limits and scheduling memory-intensive FP16 activations to avoid peak ISP contention on the shared LPDDR5X bus.
  common_mistake: |
    **The Pitfall:** Suggesting uniform INT8 quantization across the entire model to easily fit within the TOPS budget.
    **The Rationale:** Candidates assume that compute is the only bottleneck and ignore how aggressive quantization degrades sensitive feature extraction layers.
    **The Consequence:** The model fits the performance constraints but suffers from severe color-banding and visual artifacts, rendering the super-resolution useless.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Hardware: 34.7 TOPS (Exynos 2400 NPU).
       - Video: 30 FPS.
       - Pure INT8 Cost: 1.1 TOPS/frame * 30 FPS = 33 TOPS.
       - FP16 execution takes 2x the compute (half throughput).
    2. **Calculations:**
       - 90% INT8 / 10% FP16: (33 * 0.9) + (33 * 0.1 * 2) = 29.7 + 6.6 = 36.3 TOPS (exceeds budget).
       - 95% INT8 / 5% FP16: (33 * 0.95) + (33 * 0.05 * 2) = 31.35 + 3.3 = 34.65 TOPS (fits perfectly).
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound. Maximize fidelity by keeping exactly 5% of critical layers in FP16, fully utilizing the 34.7 TOPS ceiling.**
