title: The Quantization Fragmentation Trap
scenario: Your team ships a TFLite INT8 food recognition model. QA passes on Pixel 8 and Samsung Galaxy S24. A user on a Samsung Galaxy A54 reports the model identifies a banana as 'hot dog' with 94% confidence. You test the same image on Pixel 8 and it correctly identifies 'banana' at 97%. The model binary is byte-for-byte identical.
question: How can the same INT8 model produce different results on different SoCs?
details:
  realistic_solution: INT8 execution can differ across SoCs even with the same model binary because TFLite delegates may choose different kernels, fusion boundaries, accumulator precision, saturation behavior, rounding modes, and requantization paths. Those differences are usually small, but they can flip a classification when the top logits are close or when calibration ranges are brittle. Fix by comparing CPU reference output against each hardware delegate, validating on the target SoC families before shipping, and using per-channel quantization, representative calibration data, or delegate fallbacks for sensitive operators.
  common_mistake: |
    **The Pitfall:** Assuming INT8 execution is deterministically bitwise identical across different hardware.
    **The Rationale:** Engineers believe "INT8 is INT8" and assume fixed quantization parameters guarantee identical outputs.
    **The Consequence:** Models that pass QA on one device quietly fail on another because hardware delegates can differ in rounding, fusion, saturation, and requantization behavior.
  napkin_math: |
    **Assumptions & Constraints:**
    - Pixel top logits on the test image: banana = 6.20, hot dog = 6.05.
    - Classification margin: 6.20 - 6.05 = 0.15 logit.
    - Different INT8 delegate kernels can plausibly introduce small operator-level numeric differences after requantization.

    **Calculations:**
    - If the Galaxy path shifts banana by -0.10 and hot dog by +0.10, the logits become banana = 6.10 and hot dog = 6.15.
    - The top-1 class flips even though each individual shift is only about 0.10 logit.
    - This illustrative margin check explains why close decisions are vulnerable; it does not require assuming a specific vendor accumulator width.

    **Conclusion & Interpretation:**
    - **Result: small cross-SoC numeric drift can flip a narrow-margin decision (Precision-Bound)**. Validate delegate outputs per SoC family instead of assuming byte-identical INT8 inference.
