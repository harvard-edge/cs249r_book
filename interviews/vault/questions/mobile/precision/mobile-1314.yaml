title: 3-bit AWQ Footprint on Exynos 2400
scenario: You are tasked with deploying a 7B parameter LLM on a mobile device with a shared 12 GB LPDDR5X memory pool. To ensure the OS and other apps are not starved of memory, you apply 3-bit AWQ quantization.
question: How would you calculate the memory footprint of the weights and the compute required (in TOPS) to generate 20 tokens per second, and evaluate if the NPU compute capacity is a limiting factor?
details:
  realistic_solution: 'First, calculate the exact bit-level size of the weights and convert it to gigabytes to ensure it fits comfortably within the 12 GB shared RAM. Then, calculate the operations required per token (roughly 2 ops per parameter) and scale by the target token rate to find the required TOPS. Comparing this requirement to the Exynos 2400''s 34.7 TOPS capacity demonstrates that NPU compute is vastly over-provisioned for this specific bottleneck.'
  common_mistake: |
    **The Pitfall:** Miscalculating footprint by confusing bytes and bits for sub-byte quantization.
    **The Rationale:** Falsely assuming the 34.7 TOPS NPU will be fully utilized during autoregressive decoding.
    **The Consequence:** Failing to recognize that generative tasks are memory-bandwidth bound rather than compute bound, leading to incorrect architectural focus.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model: 7B parameters.
       - Quantization: 3-bit AWQ.
       - Target Throughput: 20 tokens/sec.
    2. **Calculations:**
       - Weight Footprint = 7,000,000,000 params * 3 bits/param = 21,000,000,000 bits.
       - Convert to Bytes = 21,000,000,000 / 8 bits/byte = 2.625 GB.
       - Compute per token = 7B params * 2 MACs/param = 14 GOPS.
       - Compute for 20 tokens/sec = 14 GOPS * 20 = 280 GOPS = 0.28 TOPS.
    3. **Conclusion & Interpretation:**
       **Result: Memory-Bandwidth Bound. The weight footprint (2.625 GB) safely fits in RAM, but the NPU utilization is extremely low (0.28 TOPS out of ~35 TOPS available), proving generation is entirely limited by memory bandwidth.**
