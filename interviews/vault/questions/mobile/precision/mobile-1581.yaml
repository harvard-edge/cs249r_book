title: Optimizing Mixed-Precision Inference on Exynos 2400 NPU for Mobile CV
scenario: Your team is deploying a large-scale computer vision model to a mobile app powered by the Samsung Exynos 2400 NPU (34.7 TOPS, 12 GB LPDDR5X). Initial profiling shows that while the FP32 model achieves target accuracy, inference latency is too high, and memory footprint exceeds practical limits. The NPU's FP16/BF16 capabilities are underutilized, but simply converting the entire model to FP16 causes a noticeable drop in accuracy for sensitive layers.
question: How would you diagnose bottlenecks and quantify mixed-precision optimization gains for a CV model on the Exynos 2400 NPU?
details:
  realistic_solution: 'The candidate should propose a systematic approach. First, analyze the model layer-by-layer for sensitivity to lower precision. Techniques include: 1) Quantization-Aware Training (QAT) or Post-Training Quantization (PTQ), specifically targeting FP16/BF16. 2) Employing mixed-precision recipes, where critical layers for accuracy are identified and kept in higher precision (e.g., FP32 or BF16), while less sensitive layers are converted to FP16. This requires iterative experimentation and profiling. 3) Implementing dynamic or static loss scaling during fine-tuning to prevent underflow of gradients in FP16 layers. 4) Leveraging hardware-aware optimization by utilizing the Exynos 2400 NPU''s specific FP16/BF16 acceleration capabilities and profiling tools to identify actual throughput and latency gains per layer. 5) Rigorously benchmarking different mixed-precision configurations on the target hardware to find the optimal balance between accuracy, latency, and memory consumption.'
  common_mistake: |
    **The Pitfall:** Naive blanket conversion of the entire model to FP16.
    
    **The Rationale:** Engineers assume all operations perfectly map to FP16 hardware without numerical stability issues or significant precision loss.
    
    **The Consequence:** Leads to immediate, catastrophic accuracy degradation without a targeted plan to fix it via loss scaling or selective precision mapping.
  napkin_math: |
    **Assumptions & Constraints:**
    - Baseline FP32 Model: 100M parameters, 400MB, 200ms latency.
    - Mixed-Precision Ratio: 70% of parameters converted to FP16.
    - Hardware throughput: 2x speedup for FP16 operations.

    **Calculations:**
    - Calculate Memory Savings: (0.3 x 400MB) + (0.7 x 200MB) = 120MB + 140MB = 260MB.
    - Calculate Performance Gain: (0.4 x 200ms) + (0.6 x 200ms / 2) = 80ms + 60ms = 140ms.

    **Conclusion & Interpretation:**
    - **Result: 140ms Latency (Memory-Feasible)**. Produces a 35% reduction in memory (to 260MB) and a 30% reduction in latency (to 140ms).
