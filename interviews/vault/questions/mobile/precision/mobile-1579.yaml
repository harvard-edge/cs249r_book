title: Optimizing LLM Inference on Apple A17 Pro with Mixed Precision
scenario: Your team is deploying a 7 billion parameter large language model (LLM) for on-device inference on the Apple A17 Pro (35 TOPS, 8 GB unified memory). The current FP32 model exceeds memory and power budgets.
question: How would you optimize Apple A17 Pro LLM inference with mixed precision to meet latency and energy budgets?
details:
  realistic_solution: |
    A realistic solution is inference-only and starts with memory feasibility. FP16 weights for a 7B model are about 14 GB, so the deployment needs weight compression rather than a blanket FP16 conversion. Use Core ML-supported quantization paths where possible, such as INT8 or weight-only lower-bit quantization with FP16 activations for precision-sensitive operations, and keep layer norms, embeddings, and logits at higher precision if accuracy requires it. Do not assume native FP8 Neural Engine support; validate the exact Core ML conversion, operator placement, fallback behavior, token latency, and energy on the target iPhone. If the compressed model still leaves too little headroom for KV cache and runtime buffers, reduce context length or model size.
  common_mistake: |
    **The Pitfall:** Aggressively quantizing all layers to the lowest precision without analysis.
    **The Rationale:** Candidates apply blanket FP8 or INT8 quantization, ignoring the sensitivity of normalization or classification heads and activation memory.
    **The Consequence:** Significant and unrecoverable accuracy degradation that ruins model utility.
  napkin_math: |
    **Assumptions & Constraints:**
    - FP32 weights: 7B params * 4 bytes/param = 28 GB.
    - FP16 weights: 7B params * 2 bytes/param = 14 GB.
    - 8-bit weights: 7B params * 1 byte/param = 7 GB before overhead.
    - Example runtime budget: reserve ~2 GB for OS/apps, ~0.25 GB for a short FP16 KV cache, and ~0.5-1.0 GB for activations/runtime buffers.

    **Calculations:**
    - 8-bit total estimate: 7 GB weights + 2 GB OS/apps + 0.25 GB KV cache + 0.5-1.0 GB activations/runtime = ~9.75-10.25 GB, which exceeds 8 GB.
    - 4-bit weight-only total estimate: 3.5 GB weights + 2 GB OS/apps + 0.25 GB KV cache + 0.5-1.0 GB activations/runtime = ~6.25-6.75 GB, leaving limited but plausible headroom.
    - Throughput and energy improvement must be measured through Core ML operator placement and fallback behavior; a generic numeric FP8 or INT8 speedup is not justified for this device.

    **Conclusion & Interpretation:**
    - **Result: 8-bit weights do not leave enough total memory headroom under these assumptions, while 4-bit weight-only quantization with selective FP16 is the safer inference plan.** The deployment must be gated by measured Core ML placement, latency, energy, and accuracy.
