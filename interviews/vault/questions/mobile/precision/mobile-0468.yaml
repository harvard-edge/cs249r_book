title: The Disappearing Cyclist
scenario: You are optimizing a pedestrian detection model for a smart dashcam app. You convert the model from FP16 to INT8 using post-training quantization (PTQ). Post-deployment, the app fails to detect cyclists specifically at night. You find that night-time images have high activation values from headlights compared to the daytime-heavy calibration set.
question: Why does INT8 PTQ make a dashcam miss cyclists at night when headlights create activation outliers?
details:
  realistic_solution: 'The root cause is a quantization-calibration mismatch leading to activation clipping. The PTQ process determines the scaling factor from the dynamic range in the calibration dataset. Headlights create values far outside this calibrated range, forcing hardware clamping. This massive loss of information destroys the features needed to identify the cyclist. Recalibrate with high-dynamic-range night scenes.'
  common_mistake: |
    **The Pitfall:** Blaming the hardware or the precision format itself, or assuming a full model retrain is necessary.
    **The Rationale:** Engineers fail to realize that the calibration dataset is the most frequent point of failure in real-world PTQ.
    **The Consequence:** Wasting resources on expensive retraining or abandoning INT8 entirely when a simple recalibration would suffice.
  napkin_math: |
    **Assumptions & Constraints:**
    - INT8 Range: 127 max.
    - Calibration Set Activations: [-20.0, 20.0].
    - Outlier Activation (Headlight): 50.0.

    **Calculations:**
    - INT8 Scaling Factor: 20.0 / 127 = ~0.157.
    - Quantizing Outlier: round(50.0 / 0.157) = 318.
    - Hardware Clamping: 318 clips to 127 (INT8 maximum).
    - De-quantized Error: 127 * 0.157 = 19.9.
    - Signal Loss: 50.0 vs 19.9 (>60% error).

    **Conclusion & Interpretation:**
    - **Result: >60% catastrophic signal loss (Precision-Bound)**. The static PTQ calibration scale severely clips dynamic HDR outliers, utterly destroying the feature representations.
  options:
  - 'The original FP16 model was overfit and must be retrained with more night-time data before quantization can be attempted.'
  - 'The A17 NPU has a hardware bug in its INT8 convolution kernels that is triggered by high-frequency image features.'
  - 'The calibration dataset was not representative, causing activation clipping (overflow) for the night-time cyclist images.'
  - 'The model''s architecture is inherently unstable for quantization, and INT8 precision is insufficient for this computer vision task.'
  correct_index: 2
