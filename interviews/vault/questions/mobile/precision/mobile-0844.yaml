title: 'Mobile Quality Tier Design'
scenario: 'A mobile app can ship INT8 to high-memory phones, INT4 to mid-tier phones, and 2-bit to low-memory phones.'
question: 'How would you design quality tiers for INT8, INT4, and 2-bit mobile model variants?'
details:
  realistic_solution: 'Define device eligibility, per-tier quality thresholds, fallback behavior, and telemetry. INT8 should be preferred when memory allows, AWQ/GPTQ INT4 can serve mid-tier devices after accuracy validation, and 2-bit should be limited to tasks where quality loss is acceptable or managed via dynamic speculative decoding fallback.'
  common_mistake: |
    **The Pitfall:** Maximizing device coverage by giving every low-memory device the most compressed model.
    **The Rationale:** Engineers prioritize successful app execution without tracking the severe accuracy cliffs associated with 2-bit quantization.
    **The Consequence:** A terrible user experience for low-end devices, resulting in poor reviews and churn.
  napkin_math: |
    **Assumptions & Constraints:**
    - Baseline: INT8 is 1x weight size.
    - INT4 is 0.5x weight size before metadata.
    - 2-bit is 0.25x weight size before metadata.

    **Calculations:**
    - Compare model size against total system RAM to allocate safe device tiers.

    **Conclusion & Interpretation:**
    - **Result: RAM-Tiered Deployment (Memory-Bound)**. Device eligibility should be bounded by RAM: e.g., >8GB gets INT8, 4-8GB gets INT4, <4GB gets 2-bit (only if QA validates accuracy).
