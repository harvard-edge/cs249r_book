title: The INT4 Accuracy Cliff
scenario: Your team wants to push the envelope on model size and latency, aiming for INT4 quantization for a critical on-device generative AI model.
question: What are the significant technical challenges you anticipate with INT4 quantization compared to INT8, and how would you mitigate them?
details:
  realistic_solution: INT4 has much less dynamic range than INT8, so the main challenges are larger quantization steps, higher sensitivity to outlier weights and activations, harder calibration, accumulated error across attention/MLP blocks, and uneven mobile kernel support. Mitigate with per-channel or groupwise scales, representative calibration data, mixed precision for sensitive layers or outlier channels, activation clipping/outlier preservation, and methods such as AWQ or GPTQ where they match the model and runtime. The decision should be based on measured accuracy, latency, memory bandwidth, and kernel availability, not compression ratio alone.
  common_mistake: |
    **The Pitfall:** Treating INT4 simply as a slightly smaller INT8.
    **The Rationale:** Engineers dangerously oversimplify the larger step size, outlier sensitivity, and calibration burden introduced by halving the bit-width.
    **The Consequence:** Releasing entirely unusable models suffering from catastrophic accuracy degradation.
  napkin_math: |
    **Assumptions & Constraints:**
    - INT8 Quantization: 8 bits (256 discrete bins).
    - INT4 Quantization: 4 bits (16 discrete bins).

    **Calculations:**
    - INT8 Step Size: (max - min) / 255.
    - INT4 Step Size: (max - min) / 15.
    - Step Size Ratio for the same range: 255 / 15 = 17x larger INT4 step.
    - Uniform quantization error is bounded by half a step, so the worst-case absolute rounding error is also about 17x larger for the same range.
    - Actual model error depends on distribution, calibration range, per-channel/groupwise scaling, outliers, and whether activations or only weights are quantized.

    **Conclusion & Interpretation:**
    - **Result: 17x larger step size for the same range (Quantization-Noise-Bound)**. INT4 can be viable, but it needs stronger calibration, outlier handling, groupwise/per-channel scaling, mixed precision for sensitive paths, and runtime kernels that actually deliver the intended speedup.
