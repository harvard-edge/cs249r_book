title: The INT4 Accuracy Cliff
scenario: Your team wants to push the envelope on model size and latency, aiming for INT4 quantization for a critical on-device generative AI model.
question: What are the significant technical challenges you anticipate with INT4 quantization compared to INT8, and how would you mitigate them?
details:
  realistic_solution: 'INT4 quantization introduces vastly larger step sizes than INT8. Mitigation requires advanced techniques like Activation-aware Weight Quantization (AWQ) or GPTQ to preserve critical salient weights.'
  common_mistake: |
    **The Pitfall:** Treating INT4 simply as a slightly smaller INT8.
    **The Rationale:** Engineers dangerously oversimplify the non-linear explosion of quantization noise introduced by halving the bit-width.
    **The Consequence:** Releasing entirely unusable models suffering from catastrophic accuracy degradation.
  napkin_math: |
    **Assumptions & Constraints:**
    - INT8 Quantization: 8 bits (256 discrete bins).
    - INT4 Quantization: 4 bits (16 discrete bins).

    **Calculations:**
    - INT8 Step Size: (max - min) / 255.
    - INT4 Step Size: (max - min) / 15.
    - Step Size Ratio: 255 / 15 = 17x larger step.
    - Noise Ratio: Noise scales with the square of the step size (17^2 = 289).

    **Conclusion & Interpretation:**
    - **Result: 289x Noise Ratio (Quantization-Noise-Bound)**. Halving the bit-width causes quantization noise to spike by ~289x. Standard calibration fails; advanced Hessian-based techniques are strictly required.
