title: Analyzing Quantization Outliers in CNN Accuracy
scenario: A mobile NPU accelerates an INT8 quantized ResNet, but accuracy drops significantly compared to the FP32 baseline.
question: Analyze the likely cause of this accuracy degradation and propose a calibration technique to fix it.
details:
  realistic_solution: The drop is likely due to extreme outliers in activation distributions
    being clipped by basic min-max quantization. Using KL-divergence (entropy) calibration
    or per-channel quantization for the weights preserves dynamic range without severe
    bin clipping.
  common_mistake: |
    **The Pitfall:** Assuming INT8 inherently lacks precision for CNNs.
    **The Rationale:** Candidates fail to identify flaws in the post-training quantization calibration method.
    **The Consequence:** Unnecessary fallback to FP16, sacrificing 50% memory and throughput performance instead of correctly tuning the quantizer.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model: ResNet.
       - Quantization: Post-Training Min-Max INT8.
       - Precision: INT8 allows exactly 255 discrete bins.
    2. **Calculations:**
       - If activation values range from [-2, 2], bin size = 4 / 255 = ~0.015.
       - If one extreme outlier is value 10, the range becomes [-2, 10].
       - New bin size = 12 / 255 = ~0.047.
       - Quantization error for all normal values increases by over 3x.
    3. **Conclusion & Interpretation:**
       **Result: Precision-Bound Quantization Error. A single outlier forces the min-max calibrator to stretch the 255 bins over a massive range, destroying the representational precision of the entire layer's normal activations.**
