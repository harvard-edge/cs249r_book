title: The Quantization Divergence Across SoCs
scenario: You deploy an INT4 quantized LLM (Gemma-2B) across three flagship phones using the same INT4 weight file. The same prompt produces noticeably different outputs on each device.
question: How can the same INT4 Gemma-2B weights produce different text on A18 Pro, Snapdragon 8 Gen 3, and Tensor G4?
details:
  realistic_solution: The same INT4 weight file does not guarantee bit-exact generation across phones. Divergence can come from different runtimes or delegates choosing different dequantization kernels, block/group scale layouts, accumulation precision, rounding modes, matrix multiplication tiling, softmax implementations, and sampling defaults. Small logit differences are then amplified by autoregressive decoding because an early token choice changes the entire continuation. Fix by standardizing the inference runtime and decoding parameters where possible, validating logits against a CPU reference, using consistent group quantization metadata, and forcing higher-precision accumulation or sensitive FP16/FP32 kernels for attention/softmax paths when needed.
  common_mistake: |
    **The Pitfall:** Assuming INT4 quantization is a universal, bit-exact standard.
    **The Rationale:** Candidates often think "INT4 is INT4," forgetting that dequantization formulas, grouping strategies, and accumulation precisions vary widely across runtimes and NPUs.
    **The Consequence:** This leads to mysterious semantic drift across devices, degrading the user experience on specific hardware.
  napkin_math: |
    **Assumptions & Constraints:**
    - INT4 group scale: 0.02 real units per quantized step.
    - Nearest-rounding quantization error per weight is bounded by half a step: +/-0.01.
    - Two runtimes use different but valid reduction orders and rounding, creating a small logit delta after a projection.

    **Calculations:**
    - If the top two next-token logits are 5.12 and 5.09, the margin is 0.03.
    - A device/runtime-specific logit delta of 0.04 can reorder those two tokens.
    - Once token N differs, token N+1 is conditioned on different text, so the generated continuations can diverge even when the original INT4 weights are identical.

    **Conclusion & Interpretation:**
    - **Result: token choice can flip with a 0.04 logit delta (Precision-Bound)**. The important issue is runtime numeric consistency and decoding sensitivity, not a fixed FP16-vs-BF16 device error constant.
