title: The Quantization Divergence Across SoCs
scenario: You deploy an INT4 quantized LLM (Gemma-2B) across three flagship phones using the same INT4 weight file. The same prompt produces noticeably different outputs on each device.
question: How can the same INT4 Gemma-2B weights produce different text on A18 Pro, Snapdragon 8 Gen 3, and Tensor G4?
details:
  realistic_solution: 'Four levels of divergence compound: (1) Dequantization format — A18 Pro uses FP16 (10-bit mantissa, ±0.004 error), Tensor G4 uses BF16 (7-bit mantissa, ±0.03 error). (2) Group size differences in INT4 packing (32 vs 64 vs 128 weights per scale factor). (3) Accumulation precision varies (FP16 vs FP32 intermediate sums). (4) Softmax implementation differences. Over 2048-dim dot products, BF16 accumulates 1.36 logit error vs FP16''s 0.18 — a 7.5x gap amplified by temperature sampling. Fix: standardize on a single runtime (e.g., llama.cpp) across all platforms with explicit FP32 accumulation in attention layers.'
  common_mistake: |
    **The Pitfall:** Assuming INT4 quantization is a universal, bit-exact standard.
    **The Rationale:** Candidates often think "INT4 is INT4," forgetting that dequantization formulas, grouping strategies, and accumulation precisions vary widely across runtimes and NPUs.
    **The Consequence:** This leads to mysterious semantic drift across devices, degrading the user experience on specific hardware.
  napkin_math: |
    **Assumptions & Constraints:**
    - FP16 mantissa has 10 bits (precision ~0.001); BF16 has 7 bits (precision ~0.008).
    - 2048-dim dot product.

    **Calculations:**
    - Per-weight dequantization error: +/-0.004 (FP16) vs +/-0.03 (BF16).
    - Over a 2048-dim dot product, accumulated error = sqrt(2048) * error.
    - FP16 error: sqrt(2048) * 0.004 = 0.18.
    - BF16 error: sqrt(2048) * 0.03 = 1.36.

    **Conclusion & Interpretation:**
    - **Result: 1.36 error in BF16 (Precision-Bound)**. The error shifts probabilities by ~15%, causing semantic drift.
