title: Snapdragon Hexagon NPU Mixed-Precision LLM Deployment
scenario: You are tasked with deploying a large language model on the Snapdragon 8 Gen 3 Hexagon NPU, which offers 45 TOPS for INT8 operations and has 12 GB of LPDDR5X memory. The model was initially trained in FP16 and has 10 billion parameters. Each parameter requires 2 bytes in FP16. You are considering converting the model to FP8 for inference to maximize throughput and minimize memory footprint. Assume a simple conversion where each FP16 parameter becomes an FP8 parameter (1 byte), and ignore activation memory for simplicity.
question: What is the percentage reduction in memory footprint, how many maximum parameters can fit in 12 GB using FP8, and what are the speed/accuracy trade-offs?
details:
  realistic_solution: |
    Implement a robust FP8 quantization and calibration pipeline, potentially utilizing quantization-aware training (QAT) or post-training quantization (PTQ) with techniques like AWQ or GPTQ to mitigate accuracy loss. Profile the model on the Snapdragon NPU for FP16, INT8, and FP8 (if supported natively/efficiently) to understand actual performance, power consumption, and latency. Prioritize using INT8 if the NPU is primarily optimized for it (45 TOPS INT8) and only opt for FP8 if the accuracy-performance trade-off is acceptable and the hardware adequately supports the chosen FP8 format. Leverage Qualcomm's AI Engine Direct SDK for optimized deployment and NPU-specific optimizations.
  common_mistake: |
    **The Pitfall:** Assuming FP8 conversion is always lossless or neglecting the complexity of proper calibration.
    **The Rationale:** Engineers often treat FP8 as a magic bullet for memory reduction without considering the specific NPU architecture.
    **The Consequence:** Significant accuracy degradation, or selecting an FP8 format (E5M2 vs E4M3) that the specific NPU does not natively support, negating performance benefits.
  napkin_math: |
    **Assumptions & Constraints:**
    - 10 billion parameters.
    - FP16: 2 bytes/param.
    - FP8: 1 byte/param.
    - 12 GB LPDDR5X memory.

    **Calculations:**
    - FP16 Model Memory: 10 billion parameters * 2 bytes/param = 20 GB.
    - FP8 Model Memory: 10 billion parameters * 1 byte/param = 10 GB.
    - Percentage Reduction: ((20 GB - 10 GB) / 20 GB) * 100% = 50%.
    - Max FP8 Parameters in 12 GB: 12 GB / 1 byte/param = 12 billion parameters.

    **Conclusion & Interpretation:**
    - **Result: 50% reduction (Memory-Capacity-Bound)**. Converting to FP8 allows the model to fit in RAM and leaves room for up to 12 billion total parameters.
