title: Sub-4-bit LLM Deployment on Google Tensor G3
scenario: Your team must deploy a 7B parameter LLM onto a Google Tensor G3-class phone with 12 GB LPDDR5X and mobile TPU/NPU acceleration exposed through supported Android runtimes. The model is currently FP16, resulting in a 14 GB footprint.
question: How can a 14 GB FP16 7B LLM be compressed below 4 bits for Tensor G3 without losing critical task accuracy?
details:
  realistic_solution: |
    Start by separating compression from executable arithmetic. AWQ/GPTQ-style 3-bit or mixed 2/3/4-bit weight-only quantization can reduce stored weights below 4 bits per parameter, but it is only deployable if the Android runtime has efficient kernels for that packed format. On Tensor G3-class mobile hardware, native sub-4-bit LLM execution should be treated as unlikely unless proven by the delegate; the realistic floor is usually 4-bit weight-only quantization, or INT8 where the accelerator requires it, with FP16/INT8 activations. Use QAT, calibration data, and small adapter tuning to recover accuracy. If sub-4-bit weights must be unpacked into INT8/FP16 for matmuls, benchmark the dequantization overhead and reject it if latency, power, or memory headroom regress.
  common_mistake: |
    **The Pitfall:** Applying naive quantization without addressing the hardware's INT8 execution constraints.
    **The Rationale:** Candidates overlook that the TPU requires INT8 mapping, meaning sub-4-bit weights must be unpacked efficiently, and ignore the necessity of QAT for accuracy recovery.
    **The Consequence:** The model either loses too much accuracy to be useful or runs slowly due to inefficient hardware utilization.
  napkin_math: |
    **Assumptions & Constraints:**
    - Original FP16 memory footprint: 7B params * 2 bytes/param = 14 GB.
    - Tensor G3-class Android runtimes support limited accelerated operator sets; native sub-4-bit LLM matmul support is not assumed.

    **Calculations:**
    - 4-bit weight footprint: 7B params * 0.5 bytes/param = 3.5 GB before scales, zero-points, KV cache, activations, and runtime overhead.
    - 3-bit weight footprint: 7B params * 0.375 bytes/param = 2.625 GB before metadata and unpacking overhead.
    - 2-bit weight footprint: 7B params * 0.25 bytes/param = 1.75 GB before metadata and unpacking overhead.
    - If kernels unpack sub-4-bit weights into INT8 or FP16, the memory-read savings may remain useful, but compute latency depends on packing format, dequantization cost, and operator placement.

    **Conclusion & Interpretation:**
    - **Result: Sub-4-bit weights can reduce storage below the 12 GB budget, but native execution is probably infeasible unless supported kernels exist.** A release-quality plan should use 4-bit as the practical deployment floor, with QAT or adapters for accuracy recovery, unless benchmarks prove a faster sub-4-bit path.
