title: Sub-4-bit LLM Deployment on Google Tensor G3
scenario: Your team must deploy a 7B parameter LLM onto a Google Tensor G3 device (7.5 TOPS INT8 TPU, 12 GB LPDDR5X). The model is currently FP16, resulting in a 14 GB footprint.
question: How can a 14 GB FP16 7B LLM be compressed below 4 bits for Tensor G3 without losing critical task accuracy?
details:
  realistic_solution: |
    Start from a deployment path the phone can actually run, such as TensorFlow Lite with the vendor delegate, NNAPI where applicable, or a supported CPU/GPU fallback. For accuracy, use AWQ/GPTQ-style weight-only quantization and validate against task data, but treat true sub-4-bit execution as a storage format unless the runtime exposes efficient kernels. On Tensor G3-class mobile hardware, 4-bit or 8-bit weight-only quantization with FP16/INT8 activations is more plausible than native 2-bit or 3-bit arithmetic. If sub-4-bit weights require unpacking or dequantization into INT8/FP16 at runtime, benchmark the overhead and reject the configuration if it misses latency or power targets. Use QAT or adapter tuning only to recover accuracy after the supported runtime path is identified.
  common_mistake: |
    **The Pitfall:** Applying naive quantization without addressing the hardware's INT8 execution constraints.
    **The Rationale:** Candidates overlook that the TPU requires INT8 mapping, meaning sub-4-bit weights must be unpacked efficiently, and ignore the necessity of QAT for accuracy recovery.
    **The Consequence:** The model either loses too much accuracy to be useful or runs slowly due to inefficient hardware utilization.
  napkin_math: |
    **Assumptions & Constraints:**
    - Original FP16 memory footprint: 7B params * 2 bytes/param = 14 GB.
    - Tensor G3 path supports INT8-style execution, but native sub-4-bit operator support is not assumed.

    **Calculations:**
    - 4-bit weight footprint: 7B params * 0.5 bytes/param = 3.5 GB before scales, zero-points, KV cache, activations, and runtime overhead.
    - 3-bit weight footprint: 7B params * 0.375 bytes/param = 2.625 GB before metadata and unpacking overhead.
    - 2-bit weight footprint: 7B params * 0.25 bytes/param = 1.75 GB before metadata and unpacking overhead.
    - If kernels unpack sub-4-bit weights into INT8 or FP16, the memory-read savings may remain useful, but compute latency depends on packing format, dequantization cost, and operator placement.

    **Conclusion & Interpretation:**
    - **Result: Sub-4-bit weights can reduce storage below the 12 GB budget, but feasibility is runtime-bound.** A release-quality plan must prove supported kernels, acceptable accuracy, and no slow fallback rather than relying on peak INT8 TOPS.
