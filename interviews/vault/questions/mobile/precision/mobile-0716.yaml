title: The Cross-Platform Confidence Score Divergence
scenario: Your medical imaging app runs the same diagnostic model on iOS and Android. Both models are converted from the same PyTorch checkpoint. A dermatologist reports that the same mole photo gets a 'high risk' score (0.87) on their iPhone but 'low risk' (0.42) on their Android. The model architecture and weights are identical pre-conversion.
question: Why do the confidence scores diverge by 0.45, and how do you guarantee cross-platform consistency for safety-critical applications?
details:
  realistic_solution: 'The probability divergence comes from compounding layers: Conversion (BatchNorm folding), Quantization (calibration shifts), and Accumulation (FP16 vs INT16 hardware logic). Use ONNX Runtime on both platforms to eliminate conversion divergence, maintain an FP32 classification head, and employ per-platform calibration to shrink residual divergence.'
  common_mistake: |
    **The Pitfall:** Assuming "Use the same quantization scheme on both platforms" is sufficient.
    **The Rationale:** Candidates forget that even with identical quantization, the underlying hardware runtime execution differs significantly.
    **The Consequence:** Unpredictable, silent failures in cross-platform numerical consistency causing medical misdiagnoses.
  napkin_math: |
    **Assumptions & Constraints:**
    - iPhone Risk Score: 0.87 (Logit: 1.90).
    - Android Risk Score: 0.42 (Logit: -0.32).
    - Required Logit Shift: 1.90 - (-0.32) = 2.22.

    **Calculations:**
    - Conversion Shift (BatchNorm folding): ±0.20.
    - Quantization Shift (Calibration differences): ±1.50.
    - Accumulation Shift (FP16 vs INT16): ±0.52.
    - Cumulative Worst-Case Divergence: 0.20 + 1.50 + 0.52 = 2.22.

    **Conclusion & Interpretation:**
    - **Result: 2.22 logit divergence (Precision-Bound)**. Cross-platform numerical inconsistencies compound through the stack, completely reversing the Sigmoid classification boundary.
