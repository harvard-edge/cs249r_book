title: The Cross-Platform Confidence Score Divergence
scenario: Your medical imaging app runs the same diagnostic model on iOS and Android. Both models are converted from the same PyTorch checkpoint. A dermatologist reports that the same mole photo gets a 'high risk' score (0.87) on their iPhone but 'low risk' (0.42) on their Android. The model architecture and weights are identical pre-conversion.
question: Why can the confidence scores diverge by 0.45, and how do you reduce and verify cross-platform consistency for safety-critical applications?
details:
  realistic_solution: The divergence can come from preprocessing differences, conversion rewrites, operator implementations, quantization calibration, and accumulation precision across the two runtimes. No runtime choice guarantees equivalence by itself. Treat the PyTorch model as the reference, freeze identical preprocessing, use the same exported graph where possible, keep numerically sensitive layers such as the final classification head at higher precision, calibrate with a shared representative dataset, and run golden-image conformance tests on real devices with explicit tolerances and a fallback or block-release policy when drift exceeds the safety threshold.
  common_mistake: |
    **The Pitfall:** Assuming "Use the same quantization scheme on both platforms" is sufficient.
    **The Rationale:** Candidates forget that even with identical quantization, the underlying hardware runtime execution differs significantly.
    **The Consequence:** Silent cross-platform drift can flip decisions near the classification threshold unless it is measured, bounded, and gated before release.
  napkin_math: |
    **Assumptions & Constraints:**
    - iPhone risk score: 0.87.
    - Android risk score: 0.42.
    - Probability-space gap: 0.87 - 0.42 = 0.45.

    **Calculations:**
    - logit(0.87) = ln(0.87 / 0.13) = 1.90.
    - logit(0.42) = ln(0.42 / 0.58) = -0.32.
    - Logit-space separation = 1.90 - (-0.32) = 2.22.
    - The 0.45 probability gap is therefore a symptom to debug, not proof that any specific layer contributed exactly 2.22 logits.

    **Conclusion & Interpretation:**
    - **Result: 0.45 probability gap / 2.22 logit gap.** The correct response is to localize the drift with matched preprocessing, per-op/device comparisons, shared calibration data, and release gates; it is not to assume a single tool eliminates cross-platform divergence.
