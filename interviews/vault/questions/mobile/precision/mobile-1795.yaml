title: Mixed-Precision BERT NaN Loss with Loss Scaling on Tensor G3
scenario: A mobile team trains a text classification model (BERT-base, 110M params) using mixed precision (FP16 forward, FP32 master weights) before quantizing for Tensor G3 deployment. During training, they observe NaN loss at step 1200 despite loss scaling.
question: Why might mixed-precision BERT training for Tensor G3 hit NaN loss at step 1200 despite loss scaling?
details:
  realistic_solution: NaNs can still occur with loss scaling when an anomalous batch, learning-rate transition, or unstable optimizer step produces FP16 activations or scaled gradients outside the representable range. Loss scaling protects small gradients from underflow; it does not prevent overflow unless the dynamic scaler detects the overflow, skips the optimizer step, and reduces the scale quickly enough. Check gradient norms, activation ranges, loss-scale history, and the exact batch before step 1200. Practical fixes are gradient clipping, lower learning rate or smoother warmup, dynamic loss scaling that backs off on overflow, and input validation for corrupted batches.
  common_mistake: |
    **The Pitfall:** Increasing the loss scale factor when NaNs appear.
    **The Rationale:** Candidates misunderstand the source of the NaN, which is gradient overflow exceeding the FP16 max boundary.
    **The Consequence:** Increasing the scale exacerbates the overflow, guaranteeing immediate training failure.
  napkin_math: |
    **Assumptions & Constraints:**
    - FP16 Max Value: ±65504.
    - Loss scaling multiplies gradients before the FP16 backward pass.
    - Overflow depends on individual tensor elements, not just the global gradient norm.

    **Calculations:**
    - A scaled FP16 tensor element overflows when abs(gradient_element * loss_scale) > 65504.
    - With loss_scale=512, any individual gradient element above about 65504 / 512 = 128 can overflow.
    - A global grad_norm threshold alone is not sufficient because one tensor element can overflow even when the aggregate norm looks acceptable.

    **Conclusion & Interpretation:**
    - **Result: possible FP16 overflow despite loss scaling**. Use dynamic scale backoff, gradient clipping, LR adjustment, and batch inspection rather than increasing the loss scale.
