title: Mixed Precision Training Impact on Convergence for Mobile NLP Model
scenario: A mobile team trains a text classification model (BERT-base, 110M params) using mixed precision (FP16 forward, FP32 master weights) before quantizing for Tensor G3 deployment. During training, they observe NaN loss at step 1200 despite loss scaling.
question: Why might mixed-precision BERT training for Tensor G3 hit NaN loss at step 1200 despite loss scaling?
details:
  realistic_solution: 'FP16 max value: 65504. Gradient NaN at step 1200 suggests learning rate warmup phase ending or a batch with anomalous gradients. Diagnostic: (1) Check gradient norms before the NaN step — if norm suddenly spikes to >1000, it''s a gradient explosion. (2) Check loss scale history — if scale was recently increased, it may be causing overflow. Fix: (a) Reduce LR by 10x. (b) Add gradient clipping (max_norm=1.0) to prevent FP16 overflow. (c) Use dynamic loss scaling with ''decrease_on_overflow=True'' with smaller initial scale (512 vs default 65536). (d) Check input data for corrupted batch (inf/nan in text tokenization). (e) If using gradient checkpointing, recomputed activations may accumulate FP16 errors. Root cause: most likely gradient explosion at LR scheduler transition — fix with gradient clipping.'
  common_mistake: |
    **The Pitfall:** Increasing the loss scale factor when NaNs appear.
    **The Rationale:** Candidates misunderstand the source of the NaN, which is gradient overflow exceeding the FP16 max boundary.
    **The Consequence:** Increasing the scale exacerbates the overflow, guaranteeing immediate training failure.
  napkin_math: |
    **Assumptions & Constraints:**
    - FP16 Max Value: ±65504.
    - Loss Scale Factor: Default is typically 65536.
    - Scale Adjustment: Scale=512.

    **Calculations:**
    - Gradient Overflow Threshold: grad_norm * loss_scale > 65504.
    - With Scale=512: Overflow occurs at local gradient > 128.

    **Conclusion & Interpretation:**
    - **Result: Gradient overflow (Precision-Bound)**. Adding gradient clipping prevents the scaled gradient from exceeding FP16 range, resolving the NaN loss.
