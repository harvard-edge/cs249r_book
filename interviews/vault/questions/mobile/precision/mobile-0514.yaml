title: The Saturated AR Filter
scenario: You are a Mobile ML Engineer optimizing a new AR filter that uses a MobileNetV3 backbone for feature extraction. The original FP32 model works perfectly. To meet the 16ms per-frame budget, you use post-training static quantization (PTQ) to convert the model to INT8. On your 10,000-image test set, the accuracy degradation is negligible. However, after shipping the feature, you get bug reports that the filter's output is a garbled mess only for users in bright, outdoor environments.
question: Why does INT8 PTQ make a MobileNetV3 AR filter glitch only in bright outdoor scenes?
details:
  realistic_solution: The root cause is a dynamic range mismatch. The dataset used for post-training static quantization calibration did not contain images with the same brightness and contrast as the real-world outdoor scenes. When float values exceed the calibration max, they are clipped to INT8 max, causing massive loss of information.
  common_mistake: |
    **The Pitfall:** Immediately blaming hardware bugs or model architectures for precision errors.
    **The Rationale:** Engineers jump to the most complex solutions like retraining with QAT without diagnosing the underlying data distribution issue.
    **The Consequence:** Wasting time on hardware debugging when the core problem is simply a mismatch between calibration data and production data.
  napkin_math: |
    **Assumptions & Constraints:**
    - Calibration range: [-2.0, +2.0] maps to INT8 [0, 255].
    - Bright outdoor scene activation: +5.0.

    **Calculations:**
    - Scale factor: 4.0 / 255 ≈ 0.0157 (Zero point = 128).
    - Quantization clipping: q = round(5.0 / 0.0157) + 128 = 447 -> clipped to 255 (INT8 max).
    - Dequantization error: (255 - 128) x 0.0157 = 1.99 ≈ 2.0.
    - True value was 5.0, captured value is 2.0.

    **Conclusion & Interpretation:**
    - **Result: 60% Loss (Precision-Bound)**. 60% of the signal is permanently lost due to clipping, causing catastrophic visual glitches.
  options:
  - The post-training quantization (PTQ) calibration dataset was not representative of production data, causing activation values to overflow the INT8 range in bright scenes.
  - The Neural Engine has a documented hardware bug when performing INT8 convolutions.
  - MobileNetV3's architecture uses swish activations which are numerically unstable in INT8.
  - The model was quantized using dynamic quantization, which is too slow.
