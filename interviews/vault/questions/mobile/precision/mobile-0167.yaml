title: The Quantization Energy Dividend
scenario: Your team is optimizing a new visual search feature for your mobile app. To improve battery life, you're considering post-training quantization.
question: About how much more energy-efficient is an INT8 MAC than an FP16 MAC for mobile inference?
details:
  realistic_solution: An INT8 MAC operation exhibits a massive ~5x energy-efficiency advantage over an FP16 MAC. This is a fundamental silicon physical invariant. The power reduction stems primarily from vastly simplified digital logic in the multiplier array, supplemented by diminished energy costs for data movement across the internal SRAM hierarchies.
  common_mistake: |
    **The Pitfall:** Assuming energy savings strictly adhere to linear bit-width ratios (e.g., dropping 16 bits to 8 bits results in a mere 2x saving).
    **The Rationale:** Confusing pure memory capacity scaling with the highly non-linear combinatorial cost of floating-point multiplier circuits at the gate level.
    **The Consequence:** Severely underestimating the battery-life value of INT8 quantization, leading teams to inappropriately abandon it if accuracy marginally drops.
  napkin_math: |
    **Assumptions & Constraints:**
    - Energy of a single physical FP16 MAC operation.
    - Energy of a single physical INT8 MAC operation.

    **Calculations:**
    - FP16 MAC Silicon Energy: ~1.5 picojoules (pJ).
    - INT8 MAC Silicon Energy: ~0.3 picojoules (pJ).
    - Energy Efficiency Ratio: 1.5 pJ / 0.3 pJ = 5.0.

    **Conclusion & Interpretation:**
    - **Result: 5.0 Ratio (Power-Bound)**. An INT8 MAC consumes exactly 5x less energetic overhead than an FP16 MAC.
  options:
  - 'About 2x more efficient (linear scaling with bit-width)'
  - 'About 5x more efficient'
  - 'About 18x more efficient (assuming FP32 vs INT8 scaling)'
  - 'The savings are negligible (<10%) due to conversion overhead'
