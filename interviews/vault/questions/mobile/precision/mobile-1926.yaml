title: CoreML INT8 Calibration
scenario: Compiling a PyTorch segmentation model to CoreML for the A17 Pro Neural Engine.
question: How would you apply Core ML post-training quantization with calibration while checking ANE compatibility and model-size impact?
details:
  realistic_solution: Use a Core ML Tools quantization path supported by the target iOS and model type, then validate that the compiled model still places the important operators on the ANE. Weight-only 8-bit quantization can reduce persistent weight storage, while activation quantization requires representative calibration data to estimate ranges for supported quantized operations. Run the calibrated model on device, inspect delegate or compute-unit placement and fallback, and compare latency and segmentation quality against the FP32 baseline instead of assuming every FP32 weight and activation becomes ANE-native INT8.
  common_mistake: |
    **The Pitfall:** Assuming a converted quantized model automatically runs fully on the ANE.
    **The Rationale:** Core ML may leave unsupported quantized operators in higher precision or partition them to CPU/GPU, and poor calibration data can produce bad activation ranges.
    **The Consequence:** The model may be smaller but slower or less accurate because fallback, casts, or miscalibrated ranges erase the expected INT8 benefit.
  napkin_math: |
    **Assumptions & Constraints:**
    - FP32 Size: 32 bits = 4 bytes per parameter.
    - INT8 Size: 8 bits = 1 byte per parameter.
    - Original persistent weight size: 10 MB, assuming weights dominate the model file.
    - Activation calibration affects runtime tensor ranges, not necessarily persistent model size.

    **Calculations:**
    - If all persistent weights are quantized from FP32 to INT8: 10 MB / 4 = 2.5 MB.
    - If only some weights or ops are quantized: final size is larger than 2.5 MB and must be measured after compilation.

    **Conclusion & Interpretation:**
    - **Result: conditional 2.5 MB weight footprint (Memory-Capacity-Bound).** The 4x shrink applies only when all persistent weights are quantized to 8-bit; ANE compatibility and activation behavior require on-device validation.
