title: The Int8 Quantization Activation Clipping
scenario: You quantize an image classification model to INT8 to run on a mobile DSP. The FP32 model had 92% accuracy. The INT8 model runs 4x faster but drops to 60% accuracy. The weights quantized perfectly, but debugging shows the activations in Layer 5 are completely saturated.
question: "What property of mobile activation functions causes Layer 5 activations to saturate at 127 after INT8 quantization on a mobile DSP?"
details:
  realistic_solution: The issue stems from unbounded activation functions (e.g., standard ReLU) causing extreme activation outliers. This breaks Post-Training Quantization (PTQ) static scaling factors. Implement ReLU6 or employ KL-divergence calibration to clip outliers and restore dynamic range.
  common_mistake: |
    **The Pitfall:** Concluding that INT8 simply lacks enough precision for deep networks.
    **The Rationale:** Candidates don't understand the mechanics of Post-Training Quantization (PTQ) scaling factors.
    **The Consequence:** They mistakenly reject INT8 entirely, resulting in massively slower FP16 models, or accept catastrophic 60% accuracy.
  napkin_math: |
    **Assumptions & Constraints:**
    - INT8 dynamic range: 127 (signed max).
    - Unbounded ReLU max: 50.
    - Clipped ReLU6 max: 6.
    
    **Calculations:**
    - Unbounded ReLU: Step size = 50 / 127 = 0.3937. A value of 1.0 quantizes to round(1.0/0.3937) = 3. Dequantized = 3 * 0.3937 = 1.181 (Error = 18.1%).
    - Clipped ReLU6: Step size = 6 / 127 = 0.0472. A value of 1.0 quantizes to round(1.0/0.0472) = 21. Dequantized = 21 * 0.0472 = 0.991 (Error = 0.88%).
    
    **Conclusion & Interpretation:**
    - **Result: Precision-Bound**. Unbounded activations crush the resolution of smaller values; capping the activation range restores INT8 precision.
