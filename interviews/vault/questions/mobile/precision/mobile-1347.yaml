title: Calculating 3-bit AWQ Memory Footprint
scenario: You are deploying a 7 billion parameter LLM on a device with 8 GB of unified memory. You have a strict 4.0 GB budget for model weights. You plan to use 3-bit AWQ with a group size of 128, storing scales and zero-points in FP16.
question: What is the total memory footprint of the weights and metadata, and does it fit within the 4.0 GB allocation?
details:
  realistic_solution: |
    The memory footprint includes both the packed low-bit weights and the overhead of quantization metadata. For every group of 128 weights, AWQ stores an FP16 scale and an FP16 zero-point, which significantly adds to the total size. The total footprint is ~2.84 GB, safely fitting the budget.
  common_mistake: |
    **The Pitfall:** Ignoring the memory overhead of the quantization parameters.
    **The Rationale:** Candidates simply multiply parameters by bits and divide by 8, forgetting that group-wise quantization requires storing scales and zero-points.
    **The Consequence:** Memory usage is underestimated, potentially causing out-of-memory (OOM) errors during inference.
  napkin_math: |
    **Assumptions & Constraints:**
    - 7B parameter model.
    - 3-bit AWQ with group size 128.
    - Metadata: 16-bit scale + 16-bit zero-point per group.
    - Budget: 4.0 GB.

    **Calculations:**
    - Base weights: 7B params * 3 bits = 21 Gb = 2.625 GB.
    - Number of groups: 7B / 128 = 54,687,500 groups.
    - Metadata per group: 16-bit (2 bytes) + 16-bit (2 bytes) = 4 bytes.
    - Total metadata: 54,687,500 groups * 4 bytes/group = 218,750,000 bytes ≈ 0.219 GB.
    - Total footprint: 2.625 GB + 0.219 GB = 2.844 GB.

    **Conclusion & Interpretation:**
    - **Result: 2.844 GB (Memory Capacity)**. Total memory footprint is 2.844 GB, which safely fits within the 4.0 GB budget.
