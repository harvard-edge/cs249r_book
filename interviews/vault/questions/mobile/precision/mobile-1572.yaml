title: LLM Quantization Strategy for Mobile NPU Throughput
scenario: You are tasked with deploying a pre-trained large language model (LLM) for on-device inference on a mobile NPU (12 GB LPDDR5X RAM). The current model is in FP32, has a memory footprint of 8 GB, and inference latency is critical for user experience. You need to achieve at least 4x throughput improvement over FP32 while maintaining an accuracy drop of no more than 1% on a benchmark dataset.
question: How would you design a comprehensive quantization strategy to meet these quantitative memory and throughput constraints?
details:
  realistic_solution: |
    Start with representative PTQ to INT8 because it cuts the 8 GB FP32 footprint to about 2 GB and gives the only simple path to the 4x storage and weight-bandwidth target. Use per-channel weight quantization, calibrated activation ranges, and zero-point handling that maps to supported mobile NPU kernels. Then profile the converted graph on target hardware: if INT8 operator coverage, fusion, and memory traffic do not deliver 4x throughput, fix unsupported operators or layouts before trying lower precision. If accuracy drops by more than 1%, run layer-wise sensitivity analysis and keep only sensitive layers in FP16/INT8 while applying QAT to recover accuracy; use INT4 only for insensitive weight-only layers when the runtime has efficient kernels. The final decision is based on measured benchmark accuracy and end-to-end throughput, not nominal bit width alone.
  common_mistake: |
    **The Pitfall:** Directly applying INT4 without intermediate INT8 validation.
    **The Rationale:** Candidates assume lower precision automatically solves the throughput problem without considering the destructive impact on accuracy.
    **The Consequence:** The model suffers severe accuracy degradation that is extremely hard to recover, failing the 1% drop constraint.
  napkin_math: |
    **Assumptions & Constraints:**
    - Original model: 8 GB footprint at FP32. Device memory: 12 GB limit.
    - Target: 4x throughput improvement.

    **Calculations:**
    - INT8 quantization memory size: 8 GB x (8 bits / 32 bits) = 2 GB.
    - FP32 weight reads per full model pass: up to 8 GB.
    - INT8 weight reads per full model pass: up to 2 GB, a 4x reduction in weight storage and potential weight bandwidth.
    - End-to-end throughput improvement depends on NPU INT8 kernel support, activation bandwidth, non-quantized operators, KV-cache traffic, and runtime overhead.

    **Conclusion & Interpretation:**
    - **Result: INT8 reduces the model from 8 GB to 2 GB and can provide up to 4x weight-bandwidth savings.** It does not inherently guarantee a 4x end-to-end throughput gain; meeting the target still requires profiling, operator coverage, fusion, and possibly mixed precision or QAT.
