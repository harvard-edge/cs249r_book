title: The INT8 Memory Halving
scenario: A 50 million parameter model currently uses 100 MB of memory for its weights in FP16 precision.
question: What is the final memory footprint when quantizing the 50 million parameter model from FP16 to INT8?
details:
  realistic_solution: 'The change from FP16 (Floating Point 16-bit) to INT8 (Integer 8-bit) means each parameter now requires half the storage. FP16 uses 2 bytes per parameter, while INT8 uses only 1 byte. Therefore, the memory footprint of the model weights is halved.'
  common_mistake: |
    **The Pitfall:** Confusing the reduction factor or byte ratios.
    **The Rationale:** Engineers might incorrectly divide by the bit number (8) instead of the byte ratio (2), or mistakenly compare against an FP32 baseline.
    **The Consequence:** Miscalculating the memory budget, leading to incorrect architectural sizing or unexpected Out-Of-Memory errors.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model size: 50,000,000 parameters.
    - Baseline (FP16): 2 bytes per parameter (100 MB total).
    - Target (INT8): 1 byte per parameter.

    **Calculations:**
    - Quantized size: 50,000,000 params * 1 byte/param = 50,000,000 bytes.
    - Storage footprint: 50 MB.

    **Conclusion & Interpretation:**
    - **Result: 50 MB (Memory-Bound)**. The INT8 model requires exactly 50 MB of storage, halving the footprint.
  options:
  - '25 MB, a 4x reduction.'
  - '12.5 MB, an 8x reduction.'
  - '50 MB, a 2x reduction.'
  - '100 MB, no change.'
