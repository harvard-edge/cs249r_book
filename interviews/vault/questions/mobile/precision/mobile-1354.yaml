title: Mixed-Precision Footprint on Snapdragon Hexagon NPU
scenario: 'You are deploying a 1.5 billion parameter transformer model on a Snapdragon Hexagon-class NPU with a 45 TOPS INT8 peak. You employ a mixed-precision strategy: 300M parameters in FP16, and 1.2B parameters in INT8. For the arithmetic-only lower bound, assume one INT8 MAC per INT8 parameter per generated token, 1 MAC = 2 ops for TOPS accounting, and ignore memory traffic.'
question: What is the exact mixed-precision model weight footprint and the theoretical minimum INT8 compute time per token?
details:
  realistic_solution: |
    Calculate exact memory footprints accounting for precision byte widths: 300M FP16 parameters use 600 MB and 1.2B INT8 parameters use 1.2 GB, for 1.8 GB total. For the arithmetic-only lower bound, 1.2B INT8 MACs per token equals 2.4B operations. Dividing 2.4e9 operations by 45e12 operations/s gives 5.33e-5 seconds, or 53.3 microseconds per token.
  common_mistake: |
    **The Pitfall:** Forgetting byte conversions and conflating MACs with OPs.
    **The Rationale:** Candidates overlook that FP16 requires 2 bytes per parameter, and frequently fail to multiply MACs by 2 to align with TOPS specifications.
    **The Consequence:** Calculating a severely undersized memory footprint and incorrectly estimating the compute bottleneck.
  napkin_math: |
    **Assumptions & Constraints:**
    - 300M params FP16 (2 bytes).
    - 1.2B params INT8 (1 byte).
    - Hexagon-class NPU INT8 peak: 45 TOPS.
    - Arithmetic-only lower bound: 1 INT8 MAC per INT8 parameter per token.
    - TOPS convention: 1 MAC = 2 operations.

    **Calculations:**
    - Memory = (300M * 2) + (1.2B * 1) = 600 MB + 1200 MB = 1.8 GB.
    - INT8 compute per token = 1.2B MACs * 2 ops/MAC = 2.4B ops.
    - Compute Time = 2.4e9 ops / 45e12 ops/s = 5.33e-5 s = 53.33 microseconds.

    **Conclusion & Interpretation:**
    - **Result: 1.8 GB footprint and 53.33 microseconds arithmetic-only INT8 floor.** This is a theoretical compute minimum, not an end-to-end latency claim.
