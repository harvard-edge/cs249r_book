title: Mixed-Precision Footprint on Hexagon NPU
scenario: 'You are deploying a 1.5 billion parameter transformer model on an NPU. You employ a mixed-precision strategy: 300M parameters in FP16, and 1.2B parameters in INT8.'
question: "What is the exact mixed-precision model weight footprint and the theoretical minimum INT8 compute time per token?"
details:
  realistic_solution: Calculate exact memory footprints accounting for precision byte widths. Translate the quantized parameter count into equivalent arithmetic operations (MACs to OPs) to establish the theoretical compute floor relative to peak NPU throughput.
  common_mistake: |
    **The Pitfall:** Forgetting byte conversions and conflating MACs with OPs.
    **The Rationale:** Candidates overlook that FP16 requires 2 bytes per parameter, and frequently fail to multiply MACs by 2 to align with TOPS specifications.
    **The Consequence:** Calculating a severely undersized memory footprint and incorrectly estimating the compute bottleneck.
  napkin_math: |
    **Assumptions & Constraints:**
    - 300M params FP16 (2 bytes).
    - 1.2B params INT8 (1 byte).
    - NPU 45 TOPS.
    
    **Calculations:**
    - Memory = (300M * 2) + (1.2B * 1) = 600 MB + 1200 MB = 1.8 GB.
    - Compute = 1.2B MACs * 2 = 2.4B OPs = 0.0024 TOPS.
    - Compute Time = 0.0024 / 45 = 53.33 microseconds.
    
    **Conclusion & Interpretation:**
    - **Result: Compute-Bound Floor**. The footprint is 1.8 GB, with a theoretical INT8 compute minimum of 53.33 µs per token.
