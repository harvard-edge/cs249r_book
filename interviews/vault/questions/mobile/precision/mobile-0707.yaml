title: The Neural Engine Quantization Cliff
scenario: A 1B parameter model is 2 GB at FP16, 1 GB at INT8, and 500 MB at INT4. Apple ANE supports INT8/FP16. Qualcomm Hexagon natively supports INT4.
question: What quantization choice should be used on Apple ANE versus Qualcomm Hexagon, and where is each platform's cliff?
details:
  realistic_solution: 'Each platform has a different optimal quantization point, and the cliff is where you fall off the NPU. On Apple ANE: INT8 is the sweet spot. FP16 = 2 GB fits in 2 GB available but leaves no room for KV-cache and activations (~300 MB), so it fails. INT8 = 1 GB + 300 MB overhead = 1.3 GB, fits comfortably, runs at 15 ms/token on ANE. INT4 = 500 MB memory savings, but ANE cannot execute INT4 natively. CoreML dequantizes INT4 to INT8 at runtime, routing through CPU/GPU instead of ANE. Latency jumps to 22 ms (47% slower than INT8) \u2014 this is the Apple cliff. On Qualcomm Hexagon: INT4 is the sweet spot. Hexagon NPU has native INT4 datapaths. FP16 = 2 GB (won''t fit). INT8 = 1 GB, 19.6 ms. INT4 = 500 MB, 9.8 ms \u2014 2x faster than INT8 because the datapath processes twice as many elements per cycle. The Qualcomm cliff is at FP16 (exceeds memory). Decision: deploy INT8 on Apple, INT4 on Qualcomm.'
  common_mistake: |
    **The Pitfall:** Blindly using INT4 everywhere for the smallest size.
    **The Rationale:** Assuming runtime dequantization on unsupported hardware (like Apple ANE) acts as a free compression layer.
    **The Consequence:** The compiler routes the INT4 layers entirely away from the NPU to the slower CPU/GPU, resulting in a massive latency cliff.
  napkin_math: |
    **Assumptions & Constraints:**
    - Memory Budget: 2 GB available RAM.
    - FP16 overhead: ~300 MB for KV-cache and activations.
    - Apple ANE supports INT8/FP16; Qualcomm Hexagon supports INT4/INT8.

    **Calculations:**
    - FP16 (Both): 2 GB + 300 MB = 2.3 GB (OOM).
    - Apple INT8: 1 GB + 300 MB = 1.3 GB (Fits, native speed).
    - Apple INT4: 500 MB + 300 MB = 0.8 GB (Fits, but CPU fallback adds 47% latency).
    - Qualcomm INT4: 500 MB + 300 MB = 0.8 GB (Fits, 2x faster than INT8).

    **Conclusion & Interpretation:**
    - **Result: Memory and Compute Bound cliffs.** Deploy INT8 on Apple and INT4 on Qualcomm.
