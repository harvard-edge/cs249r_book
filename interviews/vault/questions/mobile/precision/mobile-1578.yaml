title: Mixed-Precision LLM Deployment on Samsung Exynos 2400 NPU
scenario: You are tasked with deploying a 7B parameter Large Language Model (LLM) for real-time natural language understanding on a Samsung Exynos 2400 NPU (34.7 TOPS, 12 GB LPDDR5X memory). The objective is to achieve an inference latency of under 50ms per token while strictly adhering to the 12 GB memory budget. The initial LLM is trained in FP32.
question: How would you design a mixed-precision inference and fine-tuning strategy for a 7B LLM on the Exynos 2400 NPU?
details:
  realistic_solution: A realistic solution starts by separating inference from fine-tuning. For inference, FP16 weights are too large for the 12 GB budget once KV cache, activations, runtime buffers, and OS memory are included, so use a supported weight-only INT8 or INT4 path with FP16/BF16 activations for sensitive operations such as normalization and logits. FP8 should be considered only if the Exynos runtime and delegate expose native kernels for the relevant operators; otherwise dequantization overhead can erase the benefit. Full on-device fine-tuning of a 7B model is not feasible in this memory budget because optimizer state and gradients multiply memory use; practical adaptation would use a small LoRA/adapter update, quantized base weights, checkpointing, and careful validation, or move fine-tuning off device.
  common_mistake: |
    **The Pitfall:** Uniformly converting the entire FP32 model to a lower precision like FP16 or FP8.
    **The Rationale:** Developers prioritize speed and memory footprint without analyzing individual layer sensitivity to precision loss.
    **The Consequence:** Catastrophic accuracy drops occur, and fine-tuning causes gradient underflow because dynamic loss scaling was not utilized.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: 7B parameters.
    - Target constraints: <50ms latency per token, <12 GB memory limit.
    - NPU: 34.7 TOPS peak; sustained decode depends on memory bandwidth, operator coverage, and utilization.

    **Calculations:**
    - FP32 Memory: 7B × 4 bytes = 28 GB (OOM).
    - FP16 Memory: 7B × 2 bytes = 14 GB (OOM before KV cache and runtime overhead).
    - 8-bit weights: 7B × 1 byte = 7 GB for weights only, leaving about 5 GB for KV cache, activations, runtime buffers, and OS pressure.
    - 4-bit weights: 7B × 0.5 bytes = 3.5 GB for weights, leaving more practical headroom.
    - Fine-tuning with Adam-style optimizer state can require several extra bytes per parameter, so full 7B fine-tuning exceeds 12 GB even if the base weights are compressed.
    - 34.7 TOPS is a peak lower-bound input for compute time, not an end-to-end latency guarantee.

    **Conclusion & Interpretation:**
    - **Result: Inference is memory-capacity and runtime-support constrained; 8-bit may fit only with careful overhead control, while 4-bit weight-only quantization gives safer headroom.** Full on-device fine-tuning is outside the 12 GB budget except for small adapter-style updates.
