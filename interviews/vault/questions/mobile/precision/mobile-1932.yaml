title: Calculate model memory reduction accounting for static KV cache
scenario: Deploying an LLM on a mobile SoC, a team compares FP16 and INT4 weights. In FP16, the model parameters take 4GB and the KV cache strictly takes 1GB for the target context window.
question: Analyze the total memory savings factor when switching weights from FP16 to INT4, distinguishing the weight-only reduction from the system-level reduction once the static KV cache footprint is included.
details:
  realistic_solution: In FP16, total memory is 4GB (weights) + 1GB (KV cache) = 5GB. In INT4 (0.5 bytes/param), the weights shrink by 4x to 1GB. The new total footprint is 1GB (weights) + 1GB (KV cache) = 2GB. The overall system memory footprint shrinks from 5GB to 2GB, yielding a 2.5x reduction, heavily diluted by the unquantized static KV cache.
  common_mistake: |
    **The Pitfall:** Ignoring the static memory footprint of the KV cache.
    **The Rationale:** Candidates look only at the 4x reduction in weight size (FP16 to INT4) and extrapolate that to the entire system.
    **The Consequence:** They erroneously claim the application uses 4x less memory, drastically underestimating the actual baseline RAM required to run the model and risking OOM failures.
  napkin_math: |
    **Assumptions & Constraints:**
    - FP16 Weights: 4 GB.
    - KV Cache: 1 GB (Static).
    - INT4 Compression: 4x reduction.

    **Calculations:**
    - FP16 Total Memory: 4 GB (weights) + 1 GB (KV cache) = 5 GB.
    - INT4 Weight Memory: 4 GB / 4 = 1 GB.
    - INT4 Total Memory: 1 GB (weights) + 1 GB (KV cache) = 2 GB.
    - Total reduction factor: 5 GB / 2 GB = 2.5x.

    **Conclusion & Interpretation:**
    - **Result: 2.5x overall reduction (Memory-Capacity-Bound)**. The deployment is memory-capacity-bound by the uncompressed KV cache, breaking the 4x linear scaling assumption.
