title: The Quantization Memory Payoff
scenario: You are tasked with deploying a 7-billion parameter language model on a high-end mobile device. To reduce its memory footprint, you decide to quantize the model weights from FP16 to INT8.
question: What is the final memory requirement for a 7B parameter model's weights after quantizing from FP16 to INT8?
details:
  realistic_solution: 'INT8 representation uses exactly one byte for every parameter. Therefore, a 7-billion parameter model requires 7 GB to store its weights. This is a 50% reduction from the 14 GB required for FP16, but it is still far too large for a typical mobile application memory budget (often <2GB).'
  common_mistake: |
    **The Pitfall:** Applying a 4x reduction factor (FP32 to INT8) instead of the correct 2x factor (FP16 to INT8).
    **The Rationale:** Candidates memorize the "4x memory savings" rule of thumb for standard INT8 quantization without checking the baseline precision.
    **The Consequence:** Drastically underestimating the memory footprint and recommending an architecture that will crash the device.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: 7 Billion parameters.
    - Target format: INT8 (1 byte per parameter).
    - Baseline format: FP16 (2 bytes per parameter).

    **Calculations:**
    - FP16 Storage: 7 Billion * 2 bytes = 14 GB.
    - INT8 Storage: 7 Billion * 1 byte = 7 GB.

    **Conclusion & Interpretation:**
    - **Result: 7 GB (Memory-Capacity Bound)**. Quantization halves the storage to 7 GB, which remains a severe bound for mobile apps.
  options:
  - '14 GB'
  - '3.5 GB'
  - '7 GB'
  - '700 MB'
