title: Evaluating Mixed-Precision ViT on Snapdragon 8 Gen 3
scenario: Your team is deploying a 1B parameter Vision Transformer for real-time video processing. You must choose between pure FP16, pure INT8, and a mixed-precision approach (INT8 for linear layers, FP16 for softmax and layer normalization) to achieve 30 FPS.
question: Which precision strategy ensures a 1B parameter ViT achieves 30 FPS on a Snapdragon 8 Gen 3 Hexagon NPU?
details:
  realistic_solution: The mixed-precision approach is optimal. Heavy matrix multiplications (QKV projections, FFNs) must be quantized to INT8 to leverage the NPU tensor capacity and halve memory bandwidth pressure. However, precision-sensitive operations like Softmax, LayerNorm, and attention scores must strictly remain in FP16 to prevent catastrophic accuracy degradation. This perfectly leverages the heterogeneous SoC architecture without bottlenecking the system bus.
  common_mistake: |
    **The Pitfall:** Choosing pure INT8 quantization to maximize raw TOPS compute utilization.
    **The Rationale:** Engineers aggressively quantize all tensors to hit strict real-time frame rates without evaluating layer-specific numerical sensitivity.
    **The Consequence:** Operations requiring high dynamic range like Softmax and LayerNorm overflow, causing massive accuracy degradation that renders the model useless.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target framerate: 30 FPS.
    - Model weights: 1B parameters = 2.0 GB in FP16 or 1.0 GB in INT8.
    - Effective workload estimate: 1 TOP-equivalent per frame, counted on the same operation basis for each precision mode.
    - About 90% of operations are linear layers; about 10% are precision-sensitive softmax, attention scaling, and normalization.
    - Hardware limits: LPDDR5X bandwidth ~64 GB/s, NPU INT8 capacity 45 TOPS, FP16 capacity ~22.5 TOPS-equivalent.

    **Calculations:**
    - Total compute needed: 1 TOP/frame * 30 FPS = 30 TOPS-equivalent.
    - Pure FP16: needs ~30 TOPS-equivalent and, under a pessimistic full-weight streaming estimate, 2.0 GB/frame * 30 FPS = 60 GB/s. This is close to the memory limit and above the assumed FP16 compute capacity.
    - Pure INT8: needs ~30 INT8 TOPS and ~1.0 GB/frame * 30 FPS = 30 GB/s, which fits the rough compute and bandwidth budgets, but quantizing softmax and layer normalization is accuracy-risky.
    - Mixed Precision: INT8 handles ~27 TOPS and ~30 GB/s of weight traffic for the linear layers; FP16 handles only ~3 TOPS-equivalent for sensitive operations, within the FP16 budget.

    **Conclusion & Interpretation:**
    - **Result: Balanced mixed-precision path.** The rough model does not prove a single bottleneck, but it shows why INT8 linear layers plus FP16 sensitive operations is the defensible choice for bandwidth, compute, and accuracy.
