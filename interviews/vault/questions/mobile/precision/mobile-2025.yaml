title: A17 SLC-Resident Mixed-Precision Optimisation
scenario: A mobile NLP feature on A17 Pro must hold weights plus a 4 MB ping-pong activation buffer inside the 32 MB system-level cache (SLC). The OS reserves 6 MB of SLC. The model has 25M parameters (4M embedding, 3.2M outer attention, 17.8M bulk). The embedding requires FP16, outer attention requires INT8, and bulk tolerates INT4. Apple Neural Engine throughput scales 2x per precision drop (FP16=22.5 TOPS, INT8=45 TOPS, INT4=90 TOPS).
question: What is the mixed-precision allocation that fits the 26 MB SLC budget, honors per-layer precision floors, and maximizes throughput?
details:
  realistic_solution: |
    Per-tier weight footprint. (a) Embedding FP16: 4M * 2 B = 8.0 MB. (b) Outer attention INT8: 3.2M * 1 B = 3.2 MB. (c) Bulk INT4: 17.8M * 0.5 B = 8.9 MB. Total weights = 20.1 MB. Plus 4 MB ping-pong activation buffer = 24.1 MB - inside the 26 MB hard budget with 1.9 MB headroom. Effective TOPS = 0.712 * 90 + 0.128 * 45 + 0.160 * 22.5 = 73.4 TOPS-equivalent.
  common_mistake: |
    **The Pitfall:** Reporting only the all-INT4 footprint and overstating throughput.
    **The Rationale:** Ignoring per-layer accuracy sensitivity floors and failing to subtract OS-reserved SLC.
    **The Consequence:** Deploying a model that suffers severe F1 loss or causes cache thrashing by exceeding the available 26 MB SLC.
  napkin_math: |
    **Assumptions & Constraints:**
    - Budget: 32 MB - 6 MB OS = 26 MB.
    - Activations = 4 MB.

    **Calculations:**
    - Embedding (FP16): 4M * 2 bytes = 8 MB.
    - Outer Attn (INT8): 3.2M * 1 byte = 3.2 MB.
    - Bulk (INT4): 17.8M * 0.5 bytes = 8.9 MB.
    - Total weights = 8.0 + 3.2 + 8.9 = 20.1 MB.
    - Total footprint: 20.1 MB + 4 MB = 24.1 MB.
    - Effective TOPS: (17.8/25 * 90) + (3.2/25 * 45) + (4/25 * 22.5) = 64.08 + 5.76 + 3.6 = 73.44 TOPS.

    **Conclusion & Interpretation:**
    - **Result: 73.44 TOPS (Memory-Capacity-Bound)**. Fits within 26 MB budget while delivering ~73.4 effective TOPS.
