title: Audio Buffer Downsampling Accumulation
scenario: An iOS pipeline receives CoreAudio buffers of 1024 samples at 48kHz. The ML model requires fixed 16,000 sample windows of INT16 downsampled to 16kHz.
question: Implement the structural downsampling logic and calculate exactly how many 1024-sample CoreAudio buffers must be accumulated to run one ML inference.
details:
  realistic_solution: The sample rate reduces by a factor of 3 (48kHz to 16kHz). To generate 16,000 samples at 16kHz, the system must ingest 48,000 raw samples at 48kHz. Since buffers are 1024 samples, we need 48,000 / 1024 = 46.875. The system must accumulate 47 full buffers before firing.
  common_mistake: |
    **The Pitfall:** Dividing the required 16,000 samples directly by the 1024 buffer size.

    **The Rationale:** Ignoring the 3:1 downsampling ratio required before model ingestion.

    **The Consequence:** Accumulating too few samples, leading to temporal misalignment or model input errors.
  napkin_math: |
    *   Target samples needed: 16,000 at 16kHz.
    *   Downsampling ratio: 48kHz / 16kHz = 3.
    *   Raw samples required: 16,000 * 3 = 48,000 samples.
    *   Buffers required: 48,000 / 1024 = 46.875.
    *   **Result:** Must accumulate 47 full buffers before firing inference.
