title: Unstructured Pruning Performance Regression on A17 Pro
scenario: 'You deploy a vision model with 75% unstructured sparsity to the Apple A17 Pro Neural Engine, which features 16 cores, 35 TOPS peak throughput, and shares 8 GB of unified memory. Despite the 4x reduction in theoretical FLOPs, profiling shows the inference latency increased by 20% compared to the dense model while continuing to draw near the ~5W limit.'
question: 'Why can 75% unstructured sparsity make an A17 Pro vision model slower and still draw near the power limit?'
details:
  realistic_solution: 'Unstructured sparsity disrupts the NPU pipeline. Mobile NPUs lack dedicated hardware for sparse index decoding (e.g., CSR format). The overhead of fetching scattered non-zero weights from unified memory and the inability to fully utilize SIMD lanes tanks hardware utilization, making sparse logic slower and just as energy-intensive as dense execution.'
  common_mistake: |
    **The Pitfall:** Assuming fewer non-zero weights strictly guarantees proportional latency reduction.
    **The Rationale:** Candidates rely on theoretical FLOPs calculations without understanding the hardware constraints of dense matrix accelerators.
    **The Consequence:** Deploying unstructured sparse models that regress in both latency and energy efficiency.
  napkin_math: |
    1. **Dense Baseline:** 10 GOPs layer on 35 TOPS NPU. Assuming 70% utilization (24.5 TOPS), dense execution = 10 / 24,500 = **0.4 ms**.
    2. **Sparse Demand:** 75% sparsity reduces FLOPs to 2.5 GOPs.
    3. **Sparse Execution:** Irregular memory fetches drop effective NPU utilization to 2% (0.7 TOPS). Execution = 2.5 / 700 = **3.57 ms**.
    4. **Conclusion:** Despite a 4x reduction in operations, the layer runs almost 9x slower due to SIMD starvation.
