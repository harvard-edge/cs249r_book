title: The Saturated Night-Vision Model
scenario: You are a Mobile ML Engineer at a company building a smart dashcam app. You've trained a new
  traffic sign detection model that works great in FP16 on your development machine. To ship it on-device,
  you use post-training INT8 quantization (PTQ). After conversion, the overall accuracy drops by only
  2%, which seems acceptable. However, QA reports that the model completely fails to detect *any* signs
  in nighttime driving videos.
question: "Why can an INT8 dashcam sign detector work overall but fail completely on nighttime videos?"
details:
  realistic_solution: The most probable cause is a **quantization calibration mismatch**. The dataset
    used for PTQ calibration likely lacked sufficient examples of nighttime images. As a result, the computed
    quantization parameters (scale and zero-point) for the activation layers are skewed towards the dynamic
    range of daytime images. When a dark image is processed, its low-value activation signals are either
    clipped to zero or saturated because the INT8 range is being dominated by the parameters derived from
    bright images. This effectively erases the features the model needs to detect signs at night.
  common_mistake: Engineers often focus on the overall accuracy drop and blame the quantization process
    itself as being inherently lossy. They might incorrectly assume some operators aren't supported in
    INT8 on the NPU, or that the model architecture is simply not 'quantization-friendly'. These are plausible
    issues but miss the specific failure mode.
  napkin_math: Quantizing from FP16 to INT8 halves the memory footprint and bandwidth requirement. If
    the model has 100M parameters, FP16 takes 200MB, INT8 takes 100MB. On a 50GB/s memory bus, loading
    weights drops from 4ms to 2ms. More importantly, mobile NPUs have 2-4x more INT8 MACs than FP16 MACs.
    A 35 TOPS INT8 NPU runs the compute-heavy convolutions twice as fast, cutting a 16ms inference down
    to ~8ms.
  options:
  - The NPU drivers have a bug and don't support the specific convolution types used for processing low-light
    features.
  - The model is suffering from catastrophic forgetting during Quantization-Aware Training (QAT).
  - The calibration dataset lacked representative nighttime images, leading to incorrect quantization
    parameters that saturate activations for dark inputs.
  - The FP16 model was already numerically unstable, and the reduced precision of INT8 caused activations
    to collapse to zero.
  correct_index: 2
