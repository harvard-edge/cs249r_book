title: The Saturated Night-Vision Model
scenario: "You've trained a new traffic sign detection model that works great in FP16. To ship it on-device, you use post-training INT8 quantization (PTQ). After conversion, the overall accuracy drops by only 2%, but QA reports that the model completely fails to detect any signs in nighttime driving videos."
question: "Why can an INT8 dashcam sign detector work overall but fail completely on nighttime videos?"
details:
  realistic_solution: "The failure is caused by a quantization calibration mismatch. The calibration dataset for PTQ was likely skewed heavily toward daytime dynamic ranges. When extreme low-light or high-contrast (headlight) inputs arrive, the out-of-distribution FP32 signals overflow the calibrated scale factor, instantly saturating the INT8 representation and destroying critical edge features. Fixing this requires injecting night-time scenes into the calibration dataloader."
  common_mistake: |
    **The Pitfall:** Focusing on the overall accuracy drop and blaming the quantization process itself as being inherently lossy.
    **The Rationale:** Candidates incorrectly assume some operators aren't supported in INT8 on the NPU, or that the model architecture is simply not "quantization-friendly".
    **The Consequence:** Missing the specific failure mode (calibration mismatch) and failing to correct the dataset to include nighttime images for proper activation scaling.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - FP16 model = 200 MB. INT8 model = 100 MB.
       - Memory bandwidth = 50 GB/s. NPU INT8 throughput is 2-4x higher.
    2. **Calculations:**
       - FP16 weight load time = 200 MB / 50 GB/s = 4 ms.
       - INT8 weight load time = 100 MB / 50 GB/s = 2 ms.
       - Theoretical speedup = 16 ms inference halved to ~8 ms.
    3. **Conclusion & Interpretation:**
       - **Result: Precision-Bound.** The aggressive INT8 conversion effectively collapses the dynamic range of uncalibrated dark inputs, destroying nighttime features despite massive **latency and memory gains**.
  options:
  - The NPU drivers have a bug and don't support the specific convolution types used for processing low-light features.
  - The model is suffering from catastrophic forgetting during Quantization-Aware Training (QAT).
  - The calibration dataset lacked representative nighttime images, leading to incorrect quantization parameters that saturate activations for dark inputs.
  - The FP16 model was already numerically unstable, and the reduced precision of INT8 caused activations to collapse to zero.
  correct_index: 2
