title: LLM DVFS and Static Power Wall
scenario: Running a 4GB mobile LLM at max memory frequency (50GB/s bandwidth) draws 4W dynamic power for RAM and 1W static system power, taking 80ms per token. To save battery, you propose dropping frequency by 50%. Due to V^2f scaling, RAM dynamic power drops to 1W, but bandwidth drops to 25GB/s. The 1W static system power remains constant.
question: How would you calculate the energy per token for both the max frequency and 50% frequency states to determine if downclocking actually saves energy?
details:
  realistic_solution: Dynamic Voltage and Frequency Scaling (DVFS) reduces dynamic power significantly (proportional to V^2 * f), but it also increases the time required to complete a fixed workload (like generating one token). Because mobile SoCs have static power components (leakage current, display, background OS) that remain constant regardless of the ML workload's frequency, running slower means this static power is drawn for a longer duration. To evaluate the trade-off, we calculate the total energy (Joules = Watts * seconds) per token for both states. At max frequency, total energy is 0.40J per token. At half frequency, the time doubles to 160ms, resulting in 0.32J per token. Downclocking saves energy here, but less than the power drop suggests due to the static power penalty.
  common_mistake: |
    **The Pitfall:** Assuming that a 75% drop in dynamic power directly translates to an equivalent energy savings.
    **The Rationale:** Candidates ignore the increased execution time and the continuous static power leakage that occurs while the chip runs slower.
    **The Consequence:** Implementing DVFS states that paradoxically drain the battery faster because the "race to sleep" is interrupted by massive static power penalties over long durations.
  napkin_math: |
    1. Max Freq Time: 4GB / 50 GB/s = 0.08s (80 ms).
    2. Max Freq Power: 4W (dynamic) + 1W (static) = 5W.
    3. Max Freq Energy: 5W * 0.08s = 0.40 Joules.
    4. Half Freq Time: 4GB / 25 GB/s = 0.16s (160 ms).
    5. Half Freq Power: 1W (dynamic) + 1W (static) = 2W.
    6. Half Freq Energy: 2W * 0.16s = 0.32 Joules.
    7. Total savings: 0.40 - 0.32 = **0.08 Joules per token (20% savings)**.
