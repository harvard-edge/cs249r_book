title: Optimizing On-Device Drift Detection for Google Tensor G3
scenario: You are deploying a local intent recognition model alongside Gemini Nano on a Google Tensor G3 device. To detect data drift, a background service computes the KL divergence between real-time incoming text embeddings and a baseline distribution, but this causes severe battery drain and competes for memory bandwidth on the 12 GB LPDDR5X RAM, causing UI stutter.
question: "How do you analyze this computational bottleneck and quantify an optimized on-device drift detection strategy?"
details:
  realistic_solution: The bottleneck is continuous CPU-bound execution and excessive memory reads for small operations. The fix requires batching the requests and offloading the embedding projection and histogram building to the Tensor G3's TPU. By caching incoming data and computing Population Stability Index (PSI) using INT8 quantized embeddings in micro-batches during device idle windows, you leverage the TPU's matrix math efficiency while drastically reducing the time the memory bus is active.
  common_mistake: |
    **The Pitfall:** Proposing to offload the drift calculation to the cloud or simply sub-sampling the data.
    **The Rationale:** Candidates forget the privacy requirements of on-device LLMs or fail to realize that statistical distance metrics can be mapped to hardware accelerators.
    **The Consequence:** Defeating the privacy purpose of the edge deployment, or running continuous CPU workloads that prevent the SoC from entering sleep states.
  napkin_math: |
    * **Current (CPU Bound):** 10 samples/sec at 50 MFLOPs/sample = 500 MFLOPs continuous load. This keeps the CPU awake and the memory bus active.
    * **Optimized (TPU Batching):**
      * Batch 1,000 samples. Total workload = 1000 * 50 MFLOPs = 50 GOPS.
      * Tensor G3 TPU capability = 7.5 TOPS (7,500 GOPS).
      * TPU Compute Time = 50 GOPS / 7,500 GOPS = 6.6 milliseconds.
    * **Running a 6.6 ms TPU burst every 100 seconds instead of continuously polling the CPU virtually eliminates memory contention and battery drain.**
