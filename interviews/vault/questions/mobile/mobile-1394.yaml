title: Heterogeneous Scheduling for Multimodal Pipeline
scenario: You are tasked with deploying a real-time multimodal assistant on the Apple A17 Pro. The pipeline consists of a streaming audio encoder, a lightweight vision transformer, and a 3B-parameter 4-bit quantized LLM. The system must run continuously within a ~5W thermal envelope while sharing 8 GB of unified memory across the 16-core Neural Engine, 6-core GPU, and CPU.
question: How should a heterogeneous multimodal pipeline be scheduled to reduce memory traffic and NPU stalls?
details:
  realistic_solution: The optimal solution involves a dynamic, memory-aware scheduling graph. First, apply aggressive vertical and horizontal layer fusion (e.g., fusing QKV projections with attention operations) specifically targeted for the 16-core Neural Engine to keep intermediate activations in local SRAM. Second, implement a pipelined execution model where the CPU orchestrates sequence management, the GPU handles dynamic shape non-linearities, and the Neural Engine processes dense matrix math, using zero-copy buffers in the 8 GB unified memory to simply pass pointers rather than copying data between domains.
  common_mistake: |
    **The Pitfall:** Defaulting to a static layer-by-layer offloading strategy (e.g., sending all MatMuls to the NPU and unsupported ops to the CPU/GPU).
    **The Rationale:** Candidates often map individual ops to the best processor without considering the cost of data movement between them.
    **The Consequence:** This fails to account for the unified memory architecture, missing opportunities for zero-copy layer fusion, leading to severe memory bandwidth bottlenecks and thermal throttling before compute limits are reached.
  napkin_math: |
    - **Model Footprint:** 3B parameters at 4-bit = ~1.5 GB for weights.
    - **Bandwidth Demand:** 20 tokens/sec * 1.5 GB/token = **30 GB/s**.
    - **Compute Demand:** 3B params * 2 MACs * 20 tok/sec = 120 GOPS (0.12 TOPS), which is trivial compared to the A17 Pro's 35 TOPS.
    - **Intermediate Bandwidth Impact:** Without layer fusion, a single 10 MB activation written to and read from DRAM adds 10 MB * 2 (read+write) * 20 tok/sec = 400 MB/s.
    - **Savings:** Fusing 10 such layers saves 10 * 400 MB/s = **4 GB/s**, preserving the shared memory bus and lowering power.
