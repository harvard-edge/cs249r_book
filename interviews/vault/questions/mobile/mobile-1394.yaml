title: Heterogeneous Scheduling for Multimodal Pipeline
scenario: You are tasked with deploying a real-time multimodal assistant. The pipeline consists of a streaming audio encoder, a vision transformer, and a 3B-parameter 4-bit quantized LLM.
question: How should a heterogeneous multimodal pipeline be scheduled to reduce memory traffic and NPU stalls?
details:
  realistic_solution: Architect a dynamic, memory-aware scheduling graph centered entirely around data locality. Execute aggressive vertical and horizontal operator fusion on the NPU to force intermediate activations into local SRAM, preventing any spillage to the LPDDR5X bus. Implement zero-copy buffer pointers across the unified memory architecture for orchestration, ensuring the CPU handles sequence routing and the GPU maps non-linear shapes without ever physically duplicating payload data.
  common_mistake: |
    **The Pitfall:** Defaulting to a highly static layer-by-layer offloading strategy (dumping all MatMuls to NPU and leaving unsupported ops to CPU).
    **The Rationale:** Candidates mechanically map operators to the fastest silicon without modeling the severe penalty of data movement between the chips.
    **The Consequence:** Total failure to exploit zero-copy layer fusion creates overwhelming memory bandwidth bottlenecks, triggering aggressive thermal throttling long before raw compute limits are reached.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - LLM Model size: 3B parameters (INT4) = ~1.5 GB weights.
       - Target throughput: 20 tokens/sec.
       - NPU compute available: 35 TOPS.
    2. **Calculations:**
       - Weight Bandwidth Demand: 1.5 GB * 20 tok/sec = 30 GB/s.
       - Compute Demand: 3B params * 2 MACs * 20 tok/sec = 120 GOPS (0.12 TOPS).
       - No-fusion I/O penalty: Writing/reading a 10MB activation adds 400 MB/s (10 * 2 * 20).
       - Fusing 10 layers saves: 10 * 400 MB/s = 4.0 GB/s.
    3. **Conclusion & Interpretation:**
       - **Result: Memory Bandwidth-Bound.** Raw compute demand (0.12 TOPS) is trivial. Fusing layers to trap activations in SRAM prevents the catastrophic 4.0 GB/s bandwidth penalty, eliminating thermal throttling.
