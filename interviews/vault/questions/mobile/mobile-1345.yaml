title: Compute Latency on Exynos 2400 NPU
scenario: You are optimizing an on-device text summarization model for an Exynos 2400 NPU (34.7 TOPS). For a given input sequence, an encoder-decoder architecture requires 50 billion MACs, while a decoder-only architecture requires 80 billion MACs.
question: How would you calculate the theoretical compute-bound inference latency for both architectures on this NPU, and find the absolute difference in milliseconds?
details:
  realistic_solution: |
    To find the theoretical compute-bound latency, convert the MACs to Operations by multiplying by 2. Then, convert the total Operations to Tera-Operations (TOps) by dividing by 1,000 (since 1000 Giga-ops = 1 Tera-op). Finally, divide the model's TOps by the NPU's total TOPS capability (34.7) to get the time in seconds, and multiply by 1000 to get milliseconds.
  common_mistake: |
    **The Pitfall:** Confusing TOPS with MACs and failing unit conversions.
    **The Rationale:** Candidates forget that 1 MAC equals 2 operations and miscalculate Giga to Tera conversions.
    **The Consequence:** Latency calculations that are off by a factor of 2 or 1000.
  napkin_math: |
    - **Encoder-Decoder Compute:** 50B MACs * 2 = 100B Ops = 0.1 Tera-Ops.
    - **Encoder-Decoder Time:** 0.1 TOps / 34.7 TOPS = 0.00288 seconds (2.88 ms).
    - **Decoder-Only Compute:** 80B MACs * 2 = 160B Ops = 0.16 Tera-Ops.
    - **Decoder-Only Time:** 0.16 TOps / 34.7 TOPS = 0.00461 seconds (4.61 ms).
    - **Absolute Difference:** 4.61 ms - 2.88 ms = 1.73 ms.
    - **Result:** **1.73 ms difference.**
