title: Compute Latency on Exynos 2400 NPU
scenario: You are optimizing an on-device text summarization model for an edge NPU. For a given input sequence, an encoder-decoder architecture requires 50 billion MACs, while a decoder-only architecture requires 80 billion MACs.
question: Assuming a peak compute of 34.7 TOPS, how would you calculate the theoretical compute-bound inference latency for both architectures, and find the absolute difference in milliseconds?
details:
  realistic_solution: |
    To find the theoretical compute-bound latency, first convert the Multiply-Accumulate operations (MACs) into standard Operations by multiplying by 2 (since 1 MAC = 1 Multiply + 1 Add). Convert these total Operations into Tera-Operations (TOps). Finally, divide the total TOps for each architecture by the NPU's peak capability (34.7 TOPS) to get the latency in seconds, and scale by 1000 for milliseconds.
  common_mistake: |
    **The Pitfall:** Confusing TOPS with MACs and failing standard unit conversions.
    **The Rationale:** Candidates forget that hardware TOPS refers to single operations, whereas model complexity is often stated in MACs (which are two operations). They also frequently miscalculate Giga to Tera conversions.
    **The Consequence:** Architectural latency estimates that are off by exactly a factor of 2 or 1000, leading to structurally incorrect pipeline budgets.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Hardware: NPU with 34.7 TOPS (Tera-Operations Per Second).
       - Encoder-Decoder Model: 50 Billion MACs.
       - Decoder-Only Model: 80 Billion MACs.
       - Conversion: 1 MAC = 2 Operations.
    2. **Calculations:**
       - Enc-Dec Ops: 50B MACs * 2 = 100 Billion Ops = 0.1 TOps.
       - Enc-Dec Latency: 0.1 TOps / 34.7 TOPS = 0.00288 seconds (2.88 ms).
       - Dec-Only Ops: 80B MACs * 2 = 160 Billion Ops = 0.16 TOps.
       - Dec-Only Latency: 0.16 TOps / 34.7 TOPS = 0.00461 seconds (4.61 ms).
       - Absolute Difference: 4.61 ms - 2.88 ms = 1.73 ms.
    3. **Conclusion & Interpretation:**
       **Result: 1.73 ms difference (Compute-Bound).** The architectural shift linearly affects latency directly proportionally to the underlying MAC count delta.
