title: Architecting Mixed-Precision Inference on A17 Pro
scenario: You are designing the inference architecture for a real-time semantic segmentation model deployed
  on the Apple A17 Pro Neural Engine. The model must run concurrently with a resource-heavy application
  sharing the 8 GB unified memory. You need to architect a precision strategy (FP16, INT8, or mixed) that
  utilizes the 16-core Neural Engine's 35 TOPS compute while staying within a strict 500MB memory budget
  and a ~5W power envelope to prevent thermal throttling.
details:
  realistic_solution: The optimal design uses a mixed-precision approach where compute-heavy convolutions
    are quantized to INT8 to leverage the A17 Pro's maximum throughput, while precision-sensitive operations
    like LayerNorm and the final output head remain in FP16. This hybrid approach compresses the model
    footprint to fit the 500MB budget while maintaining accuracy, and drastically reduces DRAM fetches
    from the shared unified memory, which is crucial for staying within the 5W thermal envelope.
  common_mistake: Candidates often propose a uniform INT8 quantization strategy to meet memory constraints
    without evaluating the impact on sensitive layers. They also frequently overlook how the shared 8
    GB unified memory architecture makes memory bandwidth reduction just as critical for power savings
    (~5W limit) as pure compute efficiency.
  napkin_math: 'Original FP32 model size: 1.8GB. By utilizing an INT8 quantization strategy for 90% of
    the model weights, their size becomes 1.8GB * 0.9 / 4 = 405MB. The remaining 10% kept in FP16 to preserve
    accuracy becomes 1.8GB * 0.1 / 2 = 90MB. The new total size is 495MB, fitting safely within the 500MB
    budget. Assuming a 100 GOP/frame workload, running at the full 35 TOPS (INT8 throughput) takes ~2.8ms
    per frame compute time, allowing high frame rates while operating well under the ~5W limit.'
