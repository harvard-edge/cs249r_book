title: 'Specification: define mobile CNN requirements for real-time AR on A17 Pro'
scenario: You are writing the model specification for a real-time AR object recognition feature on iPhone 15 Pro (A17 Pro, 35 TOPS ANE, 8GB RAM). The feature must run at 30 FPS with <3ms inference latency, <4% battery drain/hr, and >85% top-1 accuracy on a 50-class AR dataset.
question: What technical specification should define this real-time AR mobile CNN?
details:
  realistic_solution: 'Spec: (1) Architecture: MobileNetV3-Large or EfficientNet-Lite family; (2) FLOPs: ≤0.4 GFLOPs (ANE achieves <2ms at this FLOP count, with 1ms headroom); (3) Accuracy: >85% top-1 on held-out 50-class AR dataset (not ImageNet); (4) ANE constraints: activations must be ReLU6, Hardswish, or Sigmoid only; all layer shapes static at compile time; no custom ops; min iOS 17; (5) Memory: model size ≤10MB INT8 (A17 Pro ANE model cache limit); (6) Latency target: <2ms ANE measured with Core ML Instruments; (7) Battery: <4% per hour at 30 FPS = <0.6W total inference power; (8) Test: 500 AR-context images, 5 lighting conditions, 3 occlusion levels.'
  common_mistake: |
    **The Pitfall:** Focusing entirely on generic FLOP counts while ignoring hardware-specific activation and layer constraints.
    **The Rationale:** Candidates specify standard ImageNet accuracy and general architectures without restricting custom ops or verifying ANE compatibility.
    **The Consequence:** The resulting model falls back to the CPU/GPU, completely failing the strict <3ms latency and 4% battery constraints.
  napkin_math: |
    - **Battery Constraint:** 4% of 13Wh battery = 0.52W per hour.
    - **System Overhead:** ~0.4W for CPU, display, camera.
    - **Remaining Budget:** 0.52W - 0.4W = 0.12W available for ANE.
    - **ANE Power:** At 1.5W active power, max duty cycle is 0.12W / 1.5W = 8%.
    - **Latency Limit:** At 30 FPS (33.3ms per frame), 8% duty cycle allows max 2.66ms inference.
    - **Final Result:** **<2ms ANE inference is a hard physical requirement, restricting architectures to highly optimized, ANE-compatible ops.**
