title: 'Specification: define mobile CNN requirements for real-time AR on A17 Pro'
scenario: You are writing the model specification for a real-time AR object recognition feature on iPhone 15 Pro (A17 Pro, 35 TOPS ANE, 8GB RAM). The feature must run at 30 FPS with <3ms inference latency, <4% battery drain/hr, and >85% top-1 accuracy on a 50-class AR dataset.
question: What technical specification should define this real-time AR mobile CNN?
details:
  realistic_solution: 'Spec: (1) Architecture: MobileNetV3-Large or EfficientNet-Lite tailored for ANE compilation; (2) FLOPs: ≤0.4 GFLOPs (guarantees <2ms ANE latency); (3) Constraints: Activations strictly ReLU6, Hardswish, or Sigmoid. All tensor shapes static to prevent CPU fallback; (4) Memory: ≤10MB INT8 to fit entirely in the ANE model cache; (5) Power: Must consume <0.12W continuous to fit the strict 4% battery drain budget while maintaining 30 FPS.'
  common_mistake: |
    **The Pitfall:** Focusing entirely on generic FLOP counts while ignoring hardware-specific activation and layer constraints.
    **The Rationale:** Candidates specify standard ImageNet architectures without restricting custom ops or verifying CoreML ANE compatibility.
    **The Consequence:** The resulting model falls back to the CPU/GPU, completely violating the strict <3ms latency and 4% battery constraints.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Target: 30 FPS (33.3ms/frame).
       - Battery limit: 4% of 13Wh battery = 0.52W/hr.
       - System Overhead: ~0.4W for OS/Display/Camera.
       - ANE Active Power: ~1.5W.
    2. **Calculations:**
       - ML Power Budget: 0.52W - 0.4W = 0.12W available.
       - ANE Duty Cycle: 0.12W / 1.5W = 8% maximum active time.
       - Max Latency per frame: 33.3ms * 0.08 = ~2.66ms.
    3. **Conclusion & Interpretation:**
       - **Result: Power-Bound.** The <3ms inference requirement is physically dictated by the strict 0.12W power budget, demanding highly optimized, ANE-native architectures.
