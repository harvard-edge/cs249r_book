title: Hardware-Aware NAS Latency on Hexagon NPU
scenario: We are designing a hardware-aware Neural Architecture Search (NAS) to find an optimal INT8 vision model for an NPU with a peak throughput of 45 TOPS. During the search phase, our fast latency predictor needs to estimate the strictly compute-bound latency for a candidate convolution block.
question: What is the theoretical compute latency for a 90M-MAC INT8 block on a 45 TOPS NPU?
details:
  realistic_solution: |
    Convert MACs to standard Operations (1 MAC = 2 OPs). Divide the total OPs by the hardware's peak throughput (45 TOPS) to determine the absolute minimum theoretical compute latency.
  common_mistake: |
    **The Pitfall:** Treating 1 Multiply-Accumulate (MAC) directly as 1 standard Operation (OP).
    **The Rationale:** Candidates fail to remember that a MAC requires two distinct mathematical operations: a multiplication and an addition.
    **The Consequence:** The latency predictor systematically underestimates compute time by 50%, causing the NAS to output architectures that miss production deadlines.
  napkin_math: |
    1. **Assumptions & Constraints:** 90,000,000 MACs. NPU peak = 45 TOPS (45 * 10^12 OPs/sec). 1 MAC = 2 OPs.
    2. **Calculations:** Total OPs = 90,000,000 * 2 = 180,000,000 OPs. Latency = 180,000,000 / 45,000,000,000,000 = 4.0 * 10^-6 seconds.
    3. **Conclusion & Interpretation:** **Result: Compute-Bound**. The theoretical hardware latency strictly evaluates to 4.0 microseconds.
