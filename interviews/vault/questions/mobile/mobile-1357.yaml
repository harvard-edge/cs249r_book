title: Hardware-Aware NAS Latency on Hexagon NPU
scenario: 'We are designing a hardware-aware Neural Architecture Search (NAS) to find an optimal INT8 vision model for the Qualcomm Hexagon NPU (Snapdragon 8 Gen 3). The NPU provides a peak throughput of 45 TOPS for INT8 operations and relies on a shared 16 GB LPDDR5X memory pool. During the search phase, our fast latency predictor needs to estimate the compute-bound inference latency for a candidate convolution block.'
question: 'What theoretical compute latency does a 90M-MAC INT8 block have on the Hexagon NPU?'
details:
  realistic_solution: 'Convert MAC operations to standard operations (1 MAC = 2 OPs). Divide total OPs by the peak INT8 throughput of the NPU (45 TOPS) to find absolute theoretical minimum compute latency.'
  common_mistake: |
    **The Pitfall:** Treating 1 MAC directly as 1 Operation (OP).
    **The Rationale:** Candidates fail to remember that a Multiply-Accumulate requires two mathematical operations (one multiply, one addition).
    **The Consequence:** The latency predictor systematically underestimates latency by a factor of 2x, causing the NAS to select models that miss deployment deadlines.
  napkin_math: |
    1. **Convert to Ops:** 90,000,000 MACs × 2 = 180,000,000 OPs.
    2. **Hardware Peak:** 45 TOPS = 45 × 10^12 OPs/sec.
    3. **Calculate Latency:** 180,000,000 / 45,000,000,000,000 = 4 × 10^-6 seconds = **4 microseconds**.
