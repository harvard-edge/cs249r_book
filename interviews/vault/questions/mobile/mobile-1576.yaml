title: Optimizing Large Language Model Inference with Mixed-Precision on Apple A17 Pro
scenario: You are optimizing an FP32 LLM for efficient inference on a mobile NPU. Your goal is to get the model under 100 ms/token within an 8 GB memory limit and ~5W budget.
question: Which mixed-precision plan gets an FP32 LLM under 100 ms/token on an NPU within 8 GB and ~5W?
details:
  realistic_solution: 'A realistic solution involves a multi-stage approach. First, profile the FP32 model to identify precision-sensitive layers. Then, apply mixed-precision systematically: start with FP16 for most layers, leveraging the NPU''s strong FP16 support. For critical layers, investigate FP8 or INT8 quantization using advanced techniques like QAT or PTQ with robust calibration datasets. For the unified memory constraint, prioritize techniques that minimize model size. Optimize batch sizes and operation fusion to ensure efficient utilization within the power envelope.'
  common_mistake: |
    **The Pitfall:** Naïvely quantizing to FP16 or INT8 without QAT or calibration.
    **The Rationale:** Candidates assume the hardware will perfectly compensate for standard PTQ, or fail to account for unified memory limits.
    **The Consequence:** This leads to severe accuracy degradation or constant memory-swapping OOM errors.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hardware: 8 GB limit, 35 TOPS NPU.
    - Target SLA: < 100 ms/token.
    - Model: 7B parameters. Compute: 100 GOPS/token.

    **Calculations:**
    - FP32 Memory: 7B * 4 bytes = 28 GB (Fails).
    - INT8 Memory: 7B * 1 byte = 7 GB (Fits).
    - Max Throughput: 35 TOPS / 100 GOPS = 350 tokens/sec (~3ms/token).

    **Conclusion & Interpretation:**
    - **Result: Compute takes 3ms/token, confirming bandwidth is the bottleneck (Bandwidth-Bound).** Memory bounds dictate the entire optimization strategy.
