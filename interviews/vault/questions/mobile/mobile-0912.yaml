title: 'Fault Tolerance: Evaluate On-Device vs Cloud Recovery for Mobile ML State'
scenario: 'A personalization model on Snapdragon 8 Gen 3 (45 TOPS INT8, 16GB) loses its LoRA adaptation state after a factory reset. Compare (A) cloud recovery: re-download from cloud backup (2MB LoRA state), vs (B) rebuild: re-run 500-example local training dataset. Evaluate recovery time, user experience, and privacy implications of each.'
question: How would you evaluate recovery time, user experience, and privacy implications of each?
details:
  realistic_solution: 'On-device inference latency for MobileNet-class models is in the millisecond range. Rebuilding locally on 500 examples takes only a few seconds on the mobile CPU/GPU and ensures zero user data leaves the device, vastly improving privacy compared to storing personalization states in the cloud. Re-downloading 2MB is fast, but presents a permanent data exfiltration risk for sensitive adaptive weights.'
  common_mistake: 'Always preferring cloud recovery without considering that cloud storage of personalization data is a privacy risk; erroneously dividing FP16/FP32 training FLOPs by INT8 inference TOPS to estimate training time, ignoring that NPUs typically lack backprop support.'
  napkin_math: 'Snapdragon 8 Gen 3: MobileNetV3 full inference model ~220M MACs = 0.44 GFLOPs. Training requires FP16/FP32 on CPU/GPU. Training on 500 examples (3x ops for backward pass) = 500 × 3 × 0.44 GFLOPs = 660 GFLOPs. Total compute time on a ~1.5 TFLOPS mobile GPU: 660 GFLOPs / 1500 GFLOPS = 0.44 seconds. Memory bandwidth will bottleneck this to a few seconds, still vastly faster than user perception.'
