title: 'Fault Tolerance: Evaluate On-Device vs Cloud Recovery for Mobile ML State'
scenario: A personalization model on Snapdragon 8 Gen 3 (45 TOPS INT8, 16GB) loses its LoRA adaptation state after a factory reset. Compare (A) cloud recovery: re-download from cloud backup (2MB LoRA state), vs (B) rebuild: re-run 500-example local training dataset.
question: How would you evaluate the recovery time, user experience, and privacy implications of cloud recovery vs local rebuilding?
details:
  realistic_solution: On-device inference latency for MobileNet-class models is in the millisecond range. Rebuilding locally on 500 examples takes only a few seconds on the mobile CPU/GPU and ensures zero user data leaves the device, vastly improving privacy compared to storing personalization states in the cloud. Re-downloading 2MB is fast, but presents a permanent data exfiltration risk for sensitive adaptive weights.
  common_mistake: |
    **The Pitfall:** Always preferring cloud recovery and dividing FP16/FP32 training FLOPs by INT8 inference TOPS to estimate training time.
    **The Rationale:** Candidates forget that NPUs typically lack backprop support and that cloud storage of personalization data is a severe privacy risk.
    **The Consequence:** Overestimating local training time by an order of magnitude and compromising user data privacy for no practical benefit.
  napkin_math: |
    1. **Inference Compute:** MobileNetV3 ~220M MACs = 0.44 GFLOPs.
    2. **Training Compute:** Training 500 examples (3x ops for backward pass) = 500 * 3 * 0.44 = 660 GFLOPs.
    3. **GPU Capacity:** Mobile GPU provides ~1.5 TFLOPS.
    4. **Total Compute Time:** 660 GFLOPs / 1500 GFLOPS = **0.44 seconds**.
    5. **Conclusion:** Even with memory bandwidth bottlenecks, rebuilding locally takes just seconds, entirely preserving privacy.
