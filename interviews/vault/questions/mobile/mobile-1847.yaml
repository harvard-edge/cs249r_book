title: Thermal Throttling Impact on Mobile Chiplet Burst Performance
scenario: A mobile app uses A17 Pro for real-time object detection at 30 FPS. Users
  report that performance degrades after 2 minutes of continuous use. Quantify the
  thermal throttling effect and propose a mitigation.
question: How large is A17 Pro thermal throttling after two minutes of 30 FPS object
  detection, and what mitigation fits?
details:
  realistic_solution: 'A17 Pro peak GPU: ~3.5 TFLOPS, sustained after 2 min: ~2.5
    TFLOPS (~30% reduction). Object detection models are latency-sensitive; switch
    to a smaller model (e.g., MobileNetV3 → MobileNetV2 on ANE) that fits in the ANE''s
    thermal envelope (<2W) rather than GPU (~5W). ANE thermal throttle is gentler
    (5-10% vs GPU''s 30%) because the ANE is designed for sustained low-power compute.'
  common_mistake: Increasing batch size to improve GPU utilization when thermal throttling
    occurs. Higher batch size increases power draw, accelerating throttle onset and
    worsening the degradation.
  napkin_math: 'A17 Pro GPU TDP burst: ~8W, sustained: ~4W. ANE sustained: ~1.5W.
    MobileNetV3 GPU: 600 MMACs/image at 30fps = 18,000 MMACs/s = 18 GMACs/s (well
    within sustained GPU). On ANE: same model at 35 TOPS INT8 = 18 GMACs/s / 35 TOPS
    = 0.05% utilization — thermal headroom is massive, no throttle.'
