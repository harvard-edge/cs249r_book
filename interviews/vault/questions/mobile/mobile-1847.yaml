title: Thermal Throttling Impact on Mobile Chiplet Burst Performance
scenario: A mobile app uses A17 Pro for real-time object detection at 30 FPS. Users report that performance degrades significantly after 2 minutes of continuous use.
question: How large is A17 Pro thermal throttling after two minutes of 30 FPS object detection, and what mitigation fits?
details:
  realistic_solution: 'A17 Pro peak GPU hits ~3.5 TFLOPS, but sustained after 2 min drops to ~2.5 TFLOPS (~30% reduction). Because object detection models are latency-sensitive, the mitigation is to switch to an efficient model (e.g., MobileNetV3) targeted specifically at the ANE. The ANE operates within a <2W thermal envelope compared to the GPU''s ~5W, making its thermal throttle far gentler (5-10%) and perfect for sustained real-time compute.'
  common_mistake: |
    **The Pitfall:** Increasing batch size to improve GPU utilization.
    **The Rationale:** Candidates attempt to force higher arithmetic intensity via batching, entirely ignoring the physical reality of heat dissipation on mobile SoCs.
    **The Consequence:** Higher batch size actively increases power draw, accelerating the onset of thermal throttling and worsening the degradation.
  napkin_math: |
    **Assumptions & Constraints:**
    - A17 Pro GPU TDP burst: ~8W, sustained: ~4W.
    - ANE sustained TDP: ~1.5W.
    - Model: 600 MMACs/image at 30 FPS.
    - ANE Compute: 35 TOPS INT8.

    **Calculations:**
    - Required throughput: 600 MMACs * 30 FPS = 18,000 MMACs/s = 18 GMACs/s (0.036 TOPS).
    - ANE Utilization: 0.036 TOPS / 35 TOPS = ~0.1%.

    **Conclusion & Interpretation:**
    - **Result: 0.1% Utilization (Thermal-Bound)**. The compute footprint is trivial. The GPU quickly overheats during sustained polling, whereas the ANE possesses massive thermal headroom and will not throttle.
