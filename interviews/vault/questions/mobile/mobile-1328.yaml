title: Structured Pruning Latency on Hexagon NPU
scenario: "We are deploying a quantized INT8 vision transformer to the Qualcomm Hexagon NPU (Snapdragon 8 Gen 3) for real-time video processing. The model requires 1.8 Tera-Operations per Second (TOPS) in its dense form to hit our target frame rate. To reduce power consumption and latency, we apply a 2:4 structured sparsity pattern, which the Hexagon NPU natively accelerates."
question: "How would you calculate the exact NPU utilization percentage required for this model after pruning, given the Hexagon's peak INT8 compute capacity?"
details:
  realistic_solution: The candidate should recall that 2:4 structured sparsity effectively halves the compute requirements for matrix multiplications on supported NPUs. By dividing the dense compute requirement by 2, they find the sparse compute requirement. Then, they divide this by the Hexagon NPU's peak 45 TOPS INT8 capability to find the utilization percentage.
  common_mistake: |
    **The Pitfall:** Ignoring the 2:4 sparsity reduction ratio or assuming unstructured sparsity yields the same latency improvements.
    **The Rationale:** Candidates often forget to adjust the total operations based on the 2:4 sparsity ratio before dividing by the peak TOPS.
    **The Consequence:** Incorrect calculation of NPU utilization, leading to poor hardware provisioning.
  napkin_math: |
    - Dense compute requirement: 1.8 TOPS.
    - Apply 2:4 structured sparsity reduction (50% operations removed): `1.8 TOPS / 2 = 0.9 TOPS required`.
    - Qualcomm Hexagon NPU (Snapdragon 8 Gen 3) peak INT8 performance: 45 TOPS.
    - Calculate utilization: `0.9 TOPS / 45 TOPS = 0.02`.
    - **Conclusion:** The required NPU utilization is **2%**.
