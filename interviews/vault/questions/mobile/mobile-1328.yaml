title: Structured Pruning Latency on Hexagon NPU
scenario: We are deploying a quantized INT8 vision transformer to the Qualcomm Hexagon NPU for real-time video processing. The model requires 1.8 TOPS in dense form to hit the frame rate. We apply a 2:4 structured sparsity pattern, which the Hexagon NPU natively accelerates.
question: How would you calculate the exact NPU utilization percentage required for this model after pruning, given the Hexagon's peak INT8 compute capacity?
details:
  realistic_solution: 2:4 structured sparsity effectively halves the compute requirements for matrix multiplications on supported NPUs. By dividing the dense compute requirement by 2, we find the sparse compute requirement, which is then divided by the NPU's peak capability.
  common_mistake: |
    **The Pitfall:** Ignoring the 2:4 sparsity reduction ratio or assuming unstructured sparsity yields the same hardware latency improvements.
    **The Rationale:** Candidates often forget to adjust the total operations based on the 2:4 sparsity ratio before dividing by the peak TOPS, or assume unstructured sparsity is hardware-accelerated.
    **The Consequence:** Incorrect calculation of NPU utilization, leading to poor hardware provisioning and power budgeting.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Dense compute requirement: 1.8 TOPS.
       - Sparsity pattern: 2:4 structured sparsity (50% reduction).
       - NPU Peak: 45 TOPS INT8.
    2. **Calculations:**
       - Sparse compute requirement: 1.8 TOPS * 0.5 = 0.9 TOPS.
       - Utilization percentage: 0.9 TOPS / 45 TOPS = 0.02 (2%).
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound (Low Utilization)**. The required NPU utilization drops to 2%, leaving massive headroom for other tasks or deep power saving states.
