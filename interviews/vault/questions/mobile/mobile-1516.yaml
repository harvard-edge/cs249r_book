title: Architecting for the Exynos 2400 NPU Roofline
scenario: You are designing the performance specifications for a real-time semantic segmentation model running on a device powered by the Samsung Exynos 2400 NPU. The product requirements demand 60 FPS processing for a high-resolution camera feed. The Exynos 2400 features a dual-core NPU capable of 34.7 TOPS, but crucially, it shares its 12 GB LPDDR5X memory subsystem with the CPU, GPU, and ISP, all of which are active during video capture.
question: How would you architect a 60 FPS real-time segmentation model for an NPU to remain compute-bound under shared-memory limits?
details:
  realistic_solution: A strong candidate will immediately construct a roofline model by estimating the realistic available memory bandwidth under system load, calculating the ridge point. They will specify that the model architecture must maximize data reuse (e.g., using fused operations, maximizing SRAM utilization, or heavily relying on 1x1 convolutions) to achieve an arithmetic intensity higher than the ridge point. They would recommend depthwise separable convolutions but correctly note that depthwise layers are highly memory-bound and might underutilize the 34.7 TOPS compute engine.
  common_mistake: |
    **The Pitfall:** Focusing only on peak TOPS and ignoring shared memory bandwidth limits.
    **The Rationale:** Candidates see a high TOPS number and assume compute is abundant without calculating the arithmetic intensity required to utilize it.
    **The Consequence:** Designing a model that is severely memory-bound, achieving a tiny fraction of peak performance.
  napkin_math: |
    *   **Peak Compute:** 34.7 TOPS (INT8).
    *   **Realistic Bandwidth:** ~15 GB/s (under heavy ISP/CPU load).
    *   **Required Arithmetic Intensity (Ridge Point):** 34.7 TOPS / 15 GB/s = **~2313 Ops/Byte**.
    *   **Standard Depthwise Conv Intensity:** ~1 Op/Byte.
    *   **Conclusion:** The model must aggressively fuse layers and use local SRAM, as standard operations will fall far short of the **2313 Ops/Byte** target.
