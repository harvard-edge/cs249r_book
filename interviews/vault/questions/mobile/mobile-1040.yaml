title: 'Mobile TCO Evaluation: A17 Pro vs Tensor G3 for On-Device ML App'
scenario: "Evaluate A17 Pro (35 TOPS, 8GB, 3W for LLM) vs Tensor G3 (7.5 TOPS, 12GB, 5W for LLM) for a medical transcription app using Whisper-large (1.5B params, requires >8GB for inference). Calculate per-transcription energy cost for a 15-minute real-time audio transcription."
question: "How would you calculate per-transcription energy cost, throughput, and model compatibility?"
details:
  realistic_solution: 15 minutes = 900 seconds. Energy = 5W × 900s/3600s/hr = 1.25 Wh (not 0.417 Wh from 300 seconds).
  common_mistake: |
    **The Pitfall:** Overlooking RAM limits and unit conversions.
    **The Rationale:** Candidates fail to notice that A17 Pro with 8GB cannot run Whisper-large (requires >8GB), and miscalculate time conversions (e.g. seconds to hours).
    **The Consequence:** Proposing hardware that will crash (OOM) and providing wildly incorrect battery drain estimates.
  napkin_math: |
    - Transcription time: `15 minutes = 900 seconds`.
    - Energy = `average_power * time`.
    - Tensor G3 Power = `5W`.
    - Time in hours = `900 / 3600 = 0.25 hr`.
    - Energy = `5W * 0.25 hr = 1.25 Wh`.
    - **Conclusion:** The Tensor G3 requires **1.25 Wh** of energy per transcription.
