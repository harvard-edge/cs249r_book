title: 'Mobile TCO Evaluation: A17 Pro vs Tensor G3 for On-Device ML App'
scenario: "Evaluate the Apple A17 Pro and Google Tensor G3 for a medical transcription app using Whisper-large (1.5B params, requires >8GB for inference)."
question: "How would you calculate per-transcription energy cost for a 15-minute real-time audio transcription, and determine model compatibility?"
details:
  realistic_solution: |
    First, validate hardware feasibility: the 1.5B parameter Whisper-large model requires >8GB of unified memory, immediately disqualifying the A17 Pro (which has exactly 8GB, partially reserved by iOS). For the Tensor G3 (12GB RAM, 5W inference power), calculate total energy by converting the 15-minute transcription window into hours, then multiply by the sustained 5W power draw.
  common_mistake: |
    **The Pitfall:** Overlooking hard RAM limits and bungling unit conversions.
    **The Rationale:** Candidates focus blindly on tops/compute speed and miscalculate time conversions (e.g., confusing seconds with hours).
    **The Consequence:** Proposing hardware that will immediately crash (OOM) and providing wildly incorrect battery drain estimates.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Transcription time: 15 minutes.
       - Tensor G3 Power: 5W. A17 Pro RAM: 8GB.
       - Model RAM requirement: >8GB.
    2. **Calculations:**
       - Time in hours: 15 min / 60 min/hr = 0.25 hr.
       - Energy (Tensor G3): 5W * 0.25 hr = 1.25 Wh.
    3. **Conclusion & Interpretation:**
       - **Result: 1.25 Wh (Tensor G3).** The A17 Pro fails completely due to a **memory-capacity bottleneck** (OOM). The Tensor G3 successfully completes the task using 1.25 Wh.
