title: The Saturated AR Filter
scenario: You are a Mobile ML Engineer at a social media company. You've been tasked with optimizing a new AR filter that uses a MobileNetV3 backbone for feature extraction. The original FP32 model works perfectly. To meet the 16ms per-frame budget on an Apple A17 Pro, you use post-training static quantization (PTQ) to convert the model to INT8. On your 10,000-image test set, the accuracy degradation is less than 0.5% and latency is excellent. However, after shipping the feature, you get bug reports that the filter's output is 'a garbled, glitchy mess' but only for users in bright, outdoor environments.
question: Why does INT8 PTQ make an A17 Pro MobileNetV3 AR filter glitch only in bright outdoor scenes?
details:
  realistic_solution: The root cause is a dynamic range mismatch. The dataset used for post-training static quantization calibration did not contain images with the same brightness and contrast as the real-world outdoor scenes. The activation values in some intermediate layers of the network are exceeding the [min, max] range captured during calibration. When these floating-point values are converted to INT8, they are 'clipped' to the min/max of the INT8 range (e.g., 127), causing a massive loss of information (overflow). This error then propagates and amplifies through the rest of the network, resulting in a nonsensical final output. The correct first step is to collect a more representative calibration dataset that includes these bright outdoor images and re-run the PTQ process.
  common_mistake: |
    **The Pitfall:** Immediately blaming hardware bugs or model architectures for precision errors.
    **The Rationale:** Engineers jump to the most complex solutions (like retraining with QAT) without diagnosing the underlying data distribution issue.
    **The Consequence:** Wasting time on hardware debugging when the core problem is simply a mismatch between calibration data and production data.
  napkin_math: |
    1. Calibration range: [-2.0, +2.0] maps to INT8 [0, 255].
    2. Scale factor: 4.0 / 255 ≈ 0.0157 (Zero point = 128).
    3. Outdoor scene activation: Bright sunlight produces +5.0.
    4. Quantization clipping: q = round(5.0 / 0.0157) + 128 = 447 -> clipped to 255 (INT8 max).
    5. Dequantization error: (255 - 128) * 0.0157 = 1.99 ≈ 2.0. True value was 5.0, meaning **60% of the signal is permanently lost**, causing visual glitches.
  options:
  - The post-training quantization (PTQ) calibration dataset was not representative of production data, causing activation values to overflow the INT8 range in bright scenes.
  - The Apple A17 Pro's Neural Engine has a documented hardware bug when performing INT8 convolutions, which is triggered by high-frequency patterns in outdoor images.
  - MobileNetV3's architecture uses swish activations which are numerically unstable and cannot be converted to INT8 without causing outputs to saturate.
  - The model was quantized using dynamic quantization, which is too slow for real-time AR filters and causes visual glitches as it computes ranges on-the-fly.
