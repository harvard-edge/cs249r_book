title: The 60 FPS Jank Budget
scenario: 'You''re building a new feature for a social media app: a real-time cat-ear filter on the camera
  preview. To feel smooth, the UI must run at a constant 60 FPS. Your ML model needs to process each frame
  from the camera. Explain the maximum permissible latency for your model''s inference to avoid causing
  UI ''jank'', and what ''jank'' means in this context.'
details:
  realistic_solution: The total time budget for a single frame at 60 FPS is approximately 16.67ms (1000ms
    / 60). 'Jank' occurs when the system cannot complete all the work for a frame (input, animation, layout,
    drawing, and ML inference) within this budget. This causes the frame to be displayed late, effectively
    being 'skipped', which the user perceives as a stutter or lag in the animation.
  common_mistake: Stating the model can take the full 16.67ms. This is a naive answer that ignores all
    other work happening on the main thread, such as UI drawing, layout calculations, animations, and
    other application logic. The ML inference is only *part* of the total frame time; it doesn't own the
    entire budget.
  napkin_math: Total Frame Budget = 1000 ms / 60 FPS = 16.67 ms.
  options:
  - 33.33ms.
  - 16.67ms.
  - Significantly less than 16.67ms, because the model shares the frame budget with UI rendering and other
    logic.
  - It depends entirely on the mobile NPU's peak TOPS.
  correct_index: 2
