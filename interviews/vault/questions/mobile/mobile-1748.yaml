title: DP-SGD on Google Tensor G3 for On-Device Federated Learning
scenario: You are designing a federated learning system for a next-word prediction model on mobile devices. The model needs to be trained with DP-SGD to protect user privacy.
question: How would you calibrate clipping norms and Gaussian noise for DP-SGD under on-device memory and compute limits?
details:
  realistic_solution: A realistic architecture involves adaptive noise calibration. Given the target privacy budget (epsilon), the clipping norm and noise scale are determined via sensitivity analysis. Given modern TPU capabilities, generating native noise vectors introduces negligible overhead. However, LPDDR RAM constraints dictate optimizing micro-batch sizes and employing ghost clipping to prevent Out-Of-Memory (OOM) evictions during per-example gradient materialization.
  common_mistake: |
    **The Pitfall:** Applying fixed, arbitrary noise scales independently of batch size and clipping norms.
    **The Rationale:** Candidates fail to scale the noise mathematically relative to the clipping threshold and the specific privacy budget.
    **The Consequence:** This leads to either an overly private (useless) or insufficiently private model, or an unacceptably slow training process if gradient clipping is unoptimized.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target epsilon (ε) = 8.
    - Clipping norm (C) = 1.0.
    - DP-SGD noise multiplier (σ) ≈ 0.8.

    **Calculations:**
    - Noise standard deviation: σ * C = 0.8 * 1.0 = 0.8.
    - Gaussian noise variance: (0.8)² = 0.64.

    **Conclusion & Interpretation:**
    - **Result: Variance 0.64 (Compute-Bound)**. The DP addition is completely compute-bound and trivial to execute natively on the NPU.
