title: DP-SGD on Google Tensor G3 for On-Device Federated Learning
scenario: You're designing a federated learning system for a next-word prediction
  model on mobile devices, specifically targeting the Google Tensor G3. The model,
  a small transformer, needs to be trained with DP-SGD (Differentially Private Stochastic
  Gradient Descent) to protect user privacy. Given the Google Tensor G3's specifications
  (7.5 TOPS on-device TPU, 12 GB LPDDR5X RAM), describe how you would approach noise
  calibration for DP-SGD, particularly considering the privacy budget (epsilon) and
  the privacy-utility tradeoff, within the constraints of on-device computation and
  memory. Focus on how the hardware capabilities influence your design choices for
  clipping norms and noise scale.
question: How would you calibrate clipping norms and Gaussian noise for Tensor G3
  DP-SGD under on-device memory and compute limits?
details:
  realistic_solution: A realistic solution involves dynamic or adaptive noise calibration.
    You would define a target privacy budget (epsilon) and then determine the clipping
    norm and noise scale iteratively or through a sensitivity analysis. Given the
    Tensor G3's 7.5 TOPS, you can afford more complex gradient clipping and noise
    addition operations. For the 12 GB LPDDR5X RAM, consider optimizing batch sizes
    and model parameter storage to minimize memory pressure, especially as DP-SGD
    often requires per-example gradients or larger batches for stable training. Implementing
    a mechanism to estimate the gradient sensitivity (e.g., L2-norm of gradients)
    on a representative subset of data can help in setting the clipping threshold.
    The noise scale would then be derived from the clipping norm and the desired privacy
    budget using standard DP-SGD formulas (e.g., for Gaussian mechanism). Prioritize
    efficient noise generation algorithms that can leverage the TPU.
  common_mistake: A common mistake is applying a fixed, arbitrary noise scale without
    considering the actual privacy requirements (epsilon, delta), the model's sensitivity,
    or the hardware's computational overhead. This often leads to either an overly
    private (low utility) or insufficiently private (high utility) model, or an unacceptably
    slow on-device training process due to excessive gradient clipping and noise generation.
  napkin_math: If your desired epsilon is 8 (a common value for utility), and your
    clipping norm (C) is 1, and you're using a Gaussian mechanism. For a given batch
    size, the noise multiplier (sigma) is typically proportional to C and inversely
    proportional to the square root of the batch size and epsilon. If epsilon is 8,
    a typical sigma might be around 0.5 to 1.0 for reasonable utility. You'd calculate
    the variance of the Gaussian noise as (sigma * C)^2. The Tensor G3's TOPS are
    relevant for the speed of operations, and the LPDDR5X RAM impacts how large your
    model and batch sizes can be, which in turn influences the noise scale and privacy
    guarantees. For instance, increasing the batch size (if memory allows) can sometimes
    allow for a smaller noise scale for the same epsilon, improving utility.
