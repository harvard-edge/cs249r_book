title: DP-SGD on Google Tensor G3 for On-Device Federated Learning
scenario: You're designing a federated learning system for a next-word prediction model on mobile devices, specifically targeting the Google Tensor G3. The model, a small transformer, needs to be trained with DP-SGD (Differentially Private Stochastic Gradient Descent) to protect user privacy.
question: How would you calibrate clipping norms and Gaussian noise for Tensor G3 DP-SGD under on-device memory and compute limits?
details:
  realistic_solution: A realistic solution involves dynamic or adaptive noise calibration. You would define a target privacy budget (epsilon) and then determine the clipping norm and noise scale iteratively or through a sensitivity analysis. Given the Tensor G3's 7.5 TOPS, you can afford more complex gradient clipping and noise addition operations. For the 12 GB LPDDR5X RAM, consider optimizing batch sizes and model parameter storage to minimize memory pressure, especially as DP-SGD often requires per-example gradients or larger batches for stable training. Implementing a mechanism to estimate the gradient sensitivity (e.g., L2-norm of gradients) on a representative subset of data can help in setting the clipping threshold. The noise scale would then be derived from the clipping norm and the desired privacy budget using standard DP-SGD formulas (e.g., for Gaussian mechanism). Prioritize efficient noise generation algorithms that can leverage the TPU.
  common_mistake: |
    **The Pitfall:** Applying fixed, arbitrary noise scales independently of batch size and clipping norms.
    **The Rationale:** Candidates fail to scale the noise mathematically relative to the clipping threshold and the specific privacy budget.
    **The Consequence:** This leads to either an overly private (useless) or insufficiently private model, or an unacceptably slow training process if gradient clipping is unoptimized.
  napkin_math: |
    - Let target epsilon (ε) = 8.
    - Clipping norm (C) = 1.0.
    - For typical DP-SGD, noise multiplier (σ) ≈ 0.5 to 1.0 to achieve ε=8 over standard epochs. Let σ = 0.8.
    - Noise standard deviation: σ * C = 0.8 * 1.0 = 0.8.
    - **Gaussian noise variance**: (0.8)² = **0.64**.
    - Adding this noise vector natively on the 7.5 TOPS TPU introduces negligible compute overhead.
