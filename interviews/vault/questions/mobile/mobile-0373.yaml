title: 'The Unstable Queue: Mobile Latency Collapse'
scenario: You are designing a live translation feature on a smartphone. The audio system provides a new chunk of audio every 100ms. Your model takes 120ms to process a single chunk.
question: What is the end-to-end latency for the fifth audio chunk when chunks arrive every 100ms but processing takes 120ms?
details:
  realistic_solution: 'The system is unstable because the service time (120ms) is strictly greater than the arrival interval (100ms). A queue grows indefinitely by 1 job every 5 cycles. For the 5th chunk, the end-to-end latency includes the growing queue wait time. End-to-end latency for chunk 5 = 600ms - 400ms = 200ms.'
  common_mistake: |
    **The Pitfall:** Focusing only on the single-request latency (120ms) and ignoring queue dynamics.
    **The Rationale:** Engineers assume latency is constant, forgetting that in a continuous streaming system without backpressure, ρ > 1 leads to unbounded queues.
    **The Consequence:** Latency degrades linearly with every new request, leading to inevitable system collapse and OOM.
  napkin_math: |
    **Assumptions & Constraints:**
    - Arrival interval: 100ms.
    - Processing time: 120ms.
    - Utilization (ρ) = 120 / 100 = 1.2 (> 1, unstable).

    **Calculations:**
    - Chunk 1: arrive T=0, start T=0, finish T=120. (Latency = 120ms).
    - Chunk 2: arrive T=100, start T=120, finish T=240. (Latency = 140ms).
    - Chunk 3: arrive T=200, start T=240, finish T=360. (Latency = 160ms).
    - Chunk 4: arrive T=300, start T=360, finish T=480. (Latency = 180ms).
    - Chunk 5: arrive T=400, start T=480, finish T=600. (Latency = 200ms).

    **Conclusion & Interpretation:**
    - **Result: 200 ms (Compute-Bound)**. Latency grows by 20ms per chunk, reaching 200ms by the fifth chunk.
  options:
    - 120 ms
    - 140 ms
    - 200 ms
    - 600 ms
