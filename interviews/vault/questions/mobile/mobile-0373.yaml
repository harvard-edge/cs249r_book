title: 'The Unstable Queue: Mobile Latency Collapse'
scenario: You are designing a live translation feature on a smartphone. The audio system provides a new chunk of audio every 100ms. Your model, running on the mobile NPU, takes 120ms to process a single chunk.
question: What is the end-to-end latency for the fifth audio chunk when chunks arrive every 100ms but processing takes 120ms?
details:
  realistic_solution: 'The system is unstable because service time (120ms) > arrival interval (100ms). A queue grows by 1 job every 5 cycles (on average). For the 5th chunk: Chunk 1 arrives T=0, done T=120. Chunk 2 arrives T=100, waits until T=120, done T=240. Chunk 3 arrives T=200, waits until T=240, done T=360. Chunk 4 arrives T=300, waits until T=360, done T=480. Chunk 5 arrives T=400, waits until T=480, done T=600. End-to-end latency for chunk 5 = 600 - 400 = 200ms (vs. 120ms for chunk 1).'
  common_mistake: |
    **The Pitfall:** Focusing only on the single-request latency (120ms) and ignoring queue dynamics.
    **The Rationale:** Engineers assume latency is constant, forgetting that in a streaming system, if processing time > arrival interval, the queue grows indefinitely.
    **The Consequence:** Latency degrades linearly with every new request, leading to system collapse.
  napkin_math: |
    - Rates: Arrival every 100ms, processing takes 120ms. Utilization ρ = 120/100 = 1.2 > 1 → unstable.
    - Chunk 1: arrive T=0, start T=0, finish T=120. Latency = 120ms.
    - Chunk 2: arrive T=100, start T=120, finish T=240. Latency = 140ms.
    - Chunk 3: arrive T=200, start T=240, finish T=360. Latency = 160ms.
    - Chunk 4: arrive T=300, start T=360, finish T=480. Latency = 180ms.
    - Chunk 5: arrive T=400, start T=480, finish T=600. Latency = **200ms**.
    - **Pattern: Latency grows by 20ms per chunk — unbounded queue growth.**
  options:
  - 120 ms
  - 80 ms
  - 200 ms
  - 600 ms
  correct_index: 2
