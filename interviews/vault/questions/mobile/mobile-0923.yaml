title: 'Fault Tolerance: Recall — What is an A/B Model Partition?'
scenario: You are deploying on-device models on a Snapdragon 8 Gen 3 device. You need to implement a strategy to safely update these models without breaking the app if a download gets corrupted.
question: What is an A/B model partition strategy, and why does it improve fault tolerance for on-device model updates?
details:
  realistic_solution: 'A/B model partition: store two versions of the model on device (A = current, B = new update). New model downloaded to B, validated, then A/B switch is atomic. If B fails: revert to A instantly. Only one model is active at a time.'
  common_mistake: |
    **The Pitfall:** Confusing A/B model partitions with A/B testing.
    **The Rationale:** Candidates think A/B partition means running both models simultaneously to measure user metrics.
    **The Consequence:** They propose complex runtime multiplexing rather than recognizing it as a simple, atomic failover mechanism.
  napkin_math: |
    - **Storage Cost:** 500MB model requires 1GB for dual (A/B) storage, which is <1% of modern 128GB+ device capacities.
    - **Switch Latency:** Atomic rename() syscall on a symlink takes ~1 microsecond.
    - **Recovery Time:** 100ms (to detect 100 test inference failures) + 1 microsecond (revert symlink).
    - **Final Result:** **Zero user-visible downtime with a guaranteed instantaneous rollback.**
