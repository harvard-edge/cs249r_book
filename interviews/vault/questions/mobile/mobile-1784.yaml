title: Batch Size 1 Optimization for Interactive LLM on Snapdragon 8 Gen 3
scenario: An on-device LLM assistant on Snapdragon 8 Gen 3 (45 TOPS INT8) always runs at batch_size=1 for interactive use. The 3B INT4 model (1.5GB) decodes at 10 tok/s while the NPU is only 8% utilized.
question: "How would you explain the utilization gap and propose how to increase decode throughput?"
details:
  realistic_solution: 'At batch=1 decode: each token requires loading all 1.5GB model
    weights once. Memory bandwidth becomes the bottleneck, not compute. Snapdragon
    8 Gen 3 memory bandwidth: ~50 GB/s LPDDR5X. Token decode latency: 1.5GB / 50 GB/s
    = 30ms = 33 tok/s theoretical. Measured 10 tok/s suggests additional overhead
    (dequantization, scheduling). NPU at 8% utilization is expected — it''s starved
    waiting for weight loads. Solutions: (1) speculative decoding to generate multiple
    tokens per weight load cycle; (2) draft model approach to increase tokens per
    memory bandwidth unit; (3) reduce model size further to INT3 or INT2.'
  common_mistake: |
    **The Pitfall:** Increasing batch size to improve NPU utilization.
    **The Rationale:** Candidates apply server-side optimization techniques without realizing that in interactive mobile mode, batch size must remain 1.
    **The Consequence:** Proposing solutions that fundamentally do not apply to the user's workload, failing to address the true memory bandwidth constraint.
  napkin_math: |
    - Model Size: 1.5 GB INT4.
    - Memory Bandwidth: ~50 GB/s.
    - Theoretical Decode Speed: 1.5 GB / 50 GB/s = 30 ms/token (33 tokens/s).
    - Measured Speed: 10 tokens/s (30% efficiency).
    - NPU Utilization Limit: (1.5 GB × 2 FLOPs/byte) / 45 TOPS = 6.6% theoretical max utilization.
    - **Conclusion:** The NPU is completely starved by memory bandwidth; compute optimizations will yield zero benefit.
