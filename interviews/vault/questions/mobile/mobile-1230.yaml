title: On-device Data Curation for Active Learning
scenario: You are designing a privacy-preserving on-device active learning pipeline for a smart reply feature powered by Gemini Nano. The system targets the Google Tensor G3, which features an on-device TPU delivering 7.5 TOPS and 12 GB of LPDDR5X RAM.
question: How should Gemini Nano on Tensor G3 curate low-confidence smart replies locally without exposing private text?
details:
  realistic_solution: A strong L5 design uses the on-device Gemini Nano model to score suggestion confidence, filtering low-confidence predictions into a local storage buffer. It leverages implicit user corrections as ground-truth labels. To manage bias, the architecture should include lightweight heuristic filters (e.g., regex, length checks) and stratified sampling based on metadata before storing. The system schedules curation and fine-tuning only when the device is idle and plugged in, ensuring the 12 GB memory is primarily available for user-facing applications.
  common_mistake: |
    **The Pitfall:** Proposing cloud-based active learning loops or complex on-device clustering algorithms.
    **The Rationale:** Candidates default to standard cloud ML pipelines or fail to account for the memory footprint of the LLM and OS when allocating space.
    **The Consequence:** Violates user privacy (cloud upload) or disrupts foreground tasks and exceeds memory budgets, leading to OOM crashes.
  napkin_math: |
    - Total Memory: 12 GB
    - OS footprint: 4 GB
    - 3B parameter Gemini Nano (4-bit) + KV Cache: ~2.5 GB
    - Remaining Memory: 12 - 4 - 2.5 = 5.5 GB
    - Local dataset curation buffer: 500 MB (fits within 5.5 GB)
    - Sample size: 2 KB
    - **Result: Curated samples capacity is 500 MB / 2 KB = 250,000 samples. At 7.5 TOPS, confidence scoring for 100 messages takes milliseconds.**
