title: DP-SGD Memory Wall on A17 Pro
scenario: 'A team is fine-tuning a 10-million parameter personalization model using DP-SGD on an NPU. To meet a stricter privacy budget, they increase the batch size from 32 to 256. However, they observe that training throughput drops exponentially, and the device quickly hits its ~5W thermal limit causing severe throttling.'
question: 'Why does increasing the DP-SGD batch size from 32 to 256 cause memory failure and thermal throttling?'
details:
  realistic_solution: 'Unlike standard SGD, DP-SGD requires materializing individual per-sample gradients for clipping. Increasing batch size drastically inflates memory footprint. The 8 GB unified memory limit is breached, forcing heavy swapping to NVMe storage. This starves the NPU and drives I/O power usage to the 5W thermal limit.'
  common_mistake: |
    **The Pitfall:** Attributing DP-SGD throttling to a lack of NPU compute capability.
    **The Rationale:** Candidates fail to understand the fundamental algorithmic difference that prevents DP-SGD from accumulating gradients in-place.
    **The Consequence:** Misdiagnosing memory thrashing as a compute limitation, resulting in futile attempts to optimize hardware execution speeds.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Base Gradient Size: 10 million parameters × 4 bytes = 40 MB.
       - Hardware: 8 GB unified memory limit.
    2. **Calculations:**
       - Standard SGD Memory: Accumulates in place = 40 MB.
       - DP-SGD (Batch 32): 32 × 40 MB = 1.28 GB (Comfortably fits in 8 GB RAM).
       - DP-SGD (Batch 256): 256 × 40 MB = 10.24 GB.
    3. **Conclusion & Interpretation:**
       **Result: Memory-Bound Thrashing.** The 10.24 GB footprint breaches the unified limit, forcing heavy OS-level swapping to NVMe storage, causing severe thermal throttling.
