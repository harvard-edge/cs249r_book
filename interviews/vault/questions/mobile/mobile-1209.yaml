title: Dual-Core NPU Operator Scheduling on Exynos 2400
scenario: You are deploying a multi-branch vision model to a Samsung Exynos 2400 NPU. The device features a dual-core NPU capable of 34.7 TOPS, sharing 12 GB of LPDDR5X memory with the CPU, GPU, and ISP. During performance profiling, you observe that scheduling two independent convolutional branches to run in parallel across the dual-core NPU takes 25% longer than executing them sequentially on a single core.
question: Why does this counter-intuitive scheduling behavior occur given the platform constraints?
details:
  realistic_solution: |
    When scheduled in parallel, the dual-core NPU requests data simultaneously for both branches, creating a bottleneck at the shared 12 GB LPDDR5X memory interface. Because the memory bandwidth is shared and potentially heavily utilized by other subsystems like the ISP processing camera frames, the parallel memory requests cause severe contention and memory stalls. Sequential execution avoids saturating the shared memory bus and allows for better L2 cache reuse between layers, resulting in lower overall latency despite underutilizing the peak 34.7 TOPS compute capacity.
  common_mistake: |
    **The Pitfall:** Assuming that parallelizing independent operations across multiple cores will always yield a linear speedup.
    **The Rationale:** Candidates fail to account for the shared unified memory architecture.
    **The Consequence:** They saturate the shared memory bus, creating severe contention that actually slows down execution.
  napkin_math: |
    - NPU might require a peak bandwidth of 20 GB/s to hit 34.7 TOPS.
    - Shared 12 GB LPDDR5X might only have 12 GB/s available after GPU/ISP usage.
    - Parallel scheduling demands 10 GB/s per core (20 GB/s total), exceeding the 12 GB/s limit and causing a 25% stall overhead.
    - Sequential scheduling demands only 10 GB/s, staying under the limit and avoiding stalls.
