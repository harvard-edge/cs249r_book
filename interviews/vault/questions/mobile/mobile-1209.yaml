title: Dual-Core NPU Operator Scheduling on Exynos 2400
scenario: You are deploying a multi-branch vision model to a dual-core NPU using shared unified memory. During profiling, you observe that scheduling two independent branches in parallel takes 25% longer than executing them sequentially on a single core.
question: Why does parallel operator scheduling on a multi-core mobile NPU counter-intuitively increase latency?
details:
  realistic_solution: |
    The regression is driven by LPDDR5X memory bus contention. While the dual-core NPU possesses immense compute capacity, concurrent execution of distinct branches issues overlapping, uncoordinated memory requests for unique weights and activations. This shatters spatial and temporal locality, flooding the shared unified memory controller and stalling both NPU cores simultaneously. Sequential execution maximizes deterministic L2 cache hit rates, allowing the single core to rapidly digest contiguous data without contending for the external bus, ultimately lowering total latency.
  common_mistake: |
    **The Pitfall:** Assuming that parallelizing independent operations across multiple cores will always yield a linear speedup.
    **The Rationale:** Candidates fail to account for the shared unified memory architecture.
    **The Consequence:** They saturate the shared memory bus, creating severe contention that actually slows down execution.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Workload: Two independent convolutional branches.
       - Architecture: Dual-core NPU, unified shared memory.
       - Observation: Parallel execution is 25% slower than sequential.
    2. **Calculations:**
       - Assume available memory bandwidth for NPU is 12 GB/s.
       - Single-core sequential demand: ~10 GB/s (fits within limits).
       - Dual-core parallel demand: 10 GB/s * 2 cores = 20 GB/s.
       - Deficit = 20 GB/s - 12 GB/s = -8 GB/s (severe saturation causing pipeline stalls).
    3. **Conclusion & Interpretation:**
       - **Result: Memory Bus Contention.** Parallel compute scaling is illusory on mobile SoCs when the operations are memory-bound. Saturation of the unified bus forces the cores to idle, making sequential execution significantly faster.
