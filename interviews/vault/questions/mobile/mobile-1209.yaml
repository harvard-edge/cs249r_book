title: Dual-Core NPU Operator Scheduling on Exynos 2400
scenario: You are deploying a multi-branch vision model to a Samsung Exynos 2400 NPU.
  The device features a dual-core NPU capable of 34.7 TOPS, sharing 12 GB of LPDDR5X
  memory with the CPU, GPU, and ISP. During performance profiling, you observe that
  scheduling two independent convolutional branches to run in parallel across the
  dual-core NPU takes 25% longer than executing them sequentially on a single core.
  Explain why this counter-intuitive scheduling behavior occurs given the platform
  constraints.
question: Why this counter-intuitive scheduling behavior occurs given the platform
  constraints?
details:
  realistic_solution: When scheduled in parallel, the dual-core NPU requests data
    simultaneously for both branches, creating a bottleneck at the shared 12 GB LPDDR5X
    memory interface. Because the memory bandwidth is shared and potentially heavily
    utilized by other subsystems like the ISP processing camera frames, the parallel
    memory requests cause severe contention and memory stalls. Sequential execution
    avoids saturating the shared memory bus and allows for better L2 cache reuse between
    layers, resulting in lower overall latency despite underutilizing the peak 34.7
    TOPS compute capacity.
  common_mistake: Candidates often assume that parallelizing independent operations
    across multiple NPU cores will always yield a linear speedup. They fail to account
    for the shared memory architecture where the NPU, CPU, GPU, and ISP compete for
    the same limited memory bandwidth.
  napkin_math: To hit the 34.7 TOPS peak, the NPU might require a peak bandwidth of
    20 GB/s. However, the shared 12 GB LPDDR5X memory might only have 12 GB/s available
    bandwidth after GPU and ISP reservations. Parallel scheduling demands 10 GB/s
    per core (20 GB/s total), exceeding the 12 GB/s limit and causing 25% stall overhead.
    Sequential scheduling demands only 10 GB/s, staying under the 12 GB/s limit and
    completing without memory-induced stalls.
