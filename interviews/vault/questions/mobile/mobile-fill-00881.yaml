title: Knowledge Distillation for Vision Model Deployment on Snapdragon 8 Gen 3 NPU
scenario: You are tasked with deploying a large vision transformer (teacher model) to a mobile device
  powered by the Snapdragon 8 Gen 3 Hexagon NPU, which offers 45 TOPS INT8 performance and access to 12-16
  GB LPDDR5X memory. The teacher model achieves 90% accuracy but is too large and slow for the NPU's latency
  requirements (under 20ms per inference for 224x224 input images). You decide to use knowledge distillation
  to create a smaller student model. Design an implementation strategy, specifically detailing the distillation
  technique(s) and how you'd leverage or account for the NPU's given specs.
question: "How would you design an implementation strategy, specifically detailing the distillation technique(s) and how you'd leverage or account for the NPU's given specs?"
details:
  realistic_solution: A realistic solution would involve a multi-stage distillation process. Initially,
    use **logit matching** with a temperature scaling factor to transfer class probabilities, training
    the student model with a combined loss (soft target loss + hard target loss). Concurrently, explore
    **feature distillation** by aligning intermediate feature maps from the teacher and student models,
    especially if the student model is significantly smaller or has a different architecture. For the
    Snapdragon 8 Gen 3 NPU, ensure the student model is designed with INT8 quantization compatibility
    in mind from the start, or integrate a post-training quantization-aware distillation step. Profiling
    should be done iteratively on the target NPU to benchmark latency and memory use, allowing for fine-tuning
    of the student model architecture and distillation hyperparameters to meet the 20ms latency target
    while considering the LPDDR5X memory access patterns.
  common_mistake: A common mistake is applying generic distillation techniques without considering the
    specific hardware constraints and capabilities. For instance, solely relying on logit matching might
    not capture the full feature richness, or neglecting the INT8 quantization capabilities of the NPU
    by only training with float32 student models, leading to suboptimal performance or memory footprint.
    Another mistake is not accounting for the LPDDR5X memory bandwidth in latency calculations, assuming
    raw TOPS translates directly to practical throughput without data movement overheads.
  napkin_math: Given the NPU's 45 TOPS INT8, if a 224x224 image inference requires 20ms (0.02 seconds),
    the NPU is capable of roughly 1 / 0.02 = 50 inferences per second. Each inference can utilize up to
    45 * 10^12 INT8 operations / 50 inferences/sec = 9 * 10^11 INT8 operations per inference. If the student
    model requires, say, 20 billion INT8 operations per inference, this leaves ample theoretical compute
    budget (900 GOPS vs 20 GOPS). However, actual performance is often bottlenecked by memory bandwidth.
    With 12-16 GB LPDDR5X, assuming a peak bandwidth of 64 GB/s, a 20ms inference can transfer 64 GB/s
    * 0.02 s = 1.28 GB of data. A student model with ~50MB parameters and intermediate activations per
    inference could easily fit, but if repeated memory accesses or large feature maps are involved, memory
    bandwidth becomes critical. The distillation process should aim to minimize data movement on the NPU.
