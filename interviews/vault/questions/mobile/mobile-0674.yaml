title: The Memory Bandwidth Bottleneck
scenario: You have two models, A and B. Model A is a small, shallow network with many tiny layers. Model B is a deep, wide network with fewer, larger layers. Both have roughly the same total number of MAC operations. On your target mobile NPU, Model A is consistently slower than Model B.
question: Why is Model A consistently slower than Model B on a mobile NPU despite having the same total MAC operations?
details:
  realistic_solution: 'The bottleneck is memory bandwidth and low Arithmetic Intensity. Model A, with many small layers, suffers from frequent DRAM round-trips to the NPU''s SRAM. Each tiny layer fails to saturate the MAC units (compute-bound) because the execution is memory-bound (operator launch overhead and memory fetching). Model B, with fewer, larger layers, exhibits higher spatial and temporal locality, maximizing SRAM reuse. Even with equivalent MACs, Model A is memory-bound by DRAM bandwidth, whereas Model B is closer to compute-bound.'
  common_mistake: |
    **The Pitfall:** Attributing the slowdown solely to the number of layers (operator launch overhead).
    **The Rationale:** Candidates focus on CPU-side dispatch overhead rather than the dominant physical cost of DRAM-to-SRAM data movement.
    **The Consequence:** Missing the primary bottleneck (memory bandwidth) and proposing ineffective optimizations like operator fusion instead of memory-aware architecture search.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Total MACs are equal for Model A and B.
       - Model A: 100 tiny layers, 1MB intermediate tensors.
       - Model B: 10 large layers, 1MB intermediate tensors.
    2. **Calculations:**
       - Model A traffic: 100 reads + 100 writes = 200MB per inference.
       - Model B traffic: 10 reads + 10 writes = 20MB per inference.
       - Traffic difference: Model A generates 10x more DRAM traffic.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound. Model A generates 10x more DRAM traffic, making it severely memory-bound compared to Model B.**
