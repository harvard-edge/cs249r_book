title: The Memory Bandwidth Bottleneck
scenario: You have two models, A and B. Model A is a small, shallow network with many tiny layers. Model B is a deep, wide network with fewer, larger layers. Both have roughly the same total number of MAC operations. On your target mobile NPU, Model A is consistently slower than Model B.
question: Why is Model A consistently slower than Model B on a mobile NPU despite having the same total MAC operations?
details:
  realistic_solution: The bottleneck is likely memory bandwidth and cache efficiency. Model A,
    with many small layers, implies frequent loading of small intermediate tensors from main system memory
    (DRAM) to the NPU's on-chip cache/registers, and then writing them back. Each tiny layer might not
    fully utilize the NPU's compute units if data isn't ready. This pattern leads to high data transfer
    overhead relative to computation. Model B, with fewer, larger layers, allows the NPU to process larger
    chunks of data with better temporal and spatial locality. Intermediate tensors might stay longer in
    faster on-chip caches, reducing trips to slower DRAM. Even if MACs are equal, memory access patterns
    dominate performance when data movement is high, especially for operations like element-wise additions,
    activations, or depthwise convolutions that are memory-bound rather than compute-bound.
  common_mistake: |
    **The Pitfall:** Attributing the slowdown to the number of layers alone.
    **The Rationale:** Candidates focus on layer-launch overhead rather than the dominant cost of data movement between DRAM and on-chip memory.
    **The Consequence:** Missing the primary bottleneck (memory bandwidth) and proposing ineffective optimizations like operator fusion instead of memory-aware architecture search.
  napkin_math: |
    - **Model A (100 tiny layers):** 1MB intermediate tensor * 100 reads + 100 writes = 200MB memory traffic per inference.
    - **Model B (10 large layers):** 1MB intermediate tensor * 10 reads + 10 writes = 20MB memory traffic per inference.
    - **Traffic Difference:** Model A generates 10x more memory traffic.
    - **Result:** **Model A is memory-bound**, severely degrading performance compared to compute-bound Model B.
