math_issues:
- 100 MB divided by 4 KB is exactly 25,600 pages (using 1024 KB/MB) resulting in 768ms blocking time.
  The text calculates 25,000 pages (using 1000 KB/MB) resulting in 750ms, which is inconsistent with binary
  memory prefixes used elsewhere.
