title: The Delegation Lottery
scenario: Your team ships an image classification model on Android using TFLite. On a Snapdragon 8 Gen 3 device, inference takes 4ms. A colleague adds a single custom post-processing op written as a TFLite Flex delegate.
question: Why does adding a single TFLite Flex post-processing op raise Snapdragon inference latency from 4ms to 38ms?
details:
  realistic_solution: NPU delegation is all-or-nothing *per subgraph*. When TFLite encounters an op the NPU (Hexagon/QNN) delegate doesn't support, it partitions the graph. The supported prefix runs on the NPU, then the intermediate tensor is copied back to CPU RAM for the unsupported op, and any remaining ops may not return to the NPU. The cost isn't the op — it's the round-trip data transfer across the on-chip NoC and the loss of NPU graph fusion. One incompatible op can shatter an otherwise fully-accelerated graph into three segments with two expensive hand-offs.
  common_mistake: |
    **The Pitfall:** Assuming the latency spike is caused by the computational complexity of the custom operation.
    **The Rationale:** Developers incorrectly believe that an accelerator executes operations sequentially and seamlessly hands them back to the CPU, ignoring the brutal cost of graph partitioning.
    **The Consequence:** Wasting time trying to optimize the math of the custom operation instead of fixing the graph to prevent execution domain context switching.
  napkin_math: |
    - **NPU Inference Time:** ~4ms.
    - **CPU Fallback Time:** ~35ms.
    - **Partitioning Overhead:** The unsupported Flex op forces a subgraph partition (NPU -> CPU context switch).
    - **Conclusion:** The latency explodes because you pay the memory transfer penalty across the system NoC plus the slower CPU execution speed for the un-fused tail of the graph.
