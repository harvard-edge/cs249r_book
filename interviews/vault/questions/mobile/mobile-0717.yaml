title: The Delegation Lottery
scenario: Your team ships an image classification model on Android using TFLite. On a high-end NPU, inference takes 4ms. A colleague adds a single custom post-processing op written as a TFLite Flex delegate.
question: Why does adding a single TFLite Flex post-processing op raise the inference latency from 4ms to 38ms?
details:
  realistic_solution: "The latency spike is caused by execution domain context switching and the breakdown of graph fusion, not the mathematical complexity of the op itself. NPU delegation is typically all-or-nothing per subgraph. When TFLite encounters an unsupported Flex op, it fractures the graph. The supported prefix executes on the NPU, forcing a costly memory transfer of the intermediate activation tensor across the Network-on-Chip (NoC) back to the CPU. The CPU executes the unsupported op, and any subsequent ops often remain trapped on the slower CPU domain."
  common_mistake: |
    **The Pitfall:** Assuming the latency spike is caused by the computational complexity of the custom operation.
    **The Rationale:** Developers incorrectly believe that an accelerator executes operations sequentially and seamlessly hands them back to the CPU, ignoring the brutal cost of graph partitioning.
    **The Consequence:** Wasting time trying to optimize the math of the custom operation instead of fixing the graph to prevent execution domain context switching.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - NPU continuous inference time: ~4ms.
       - Graph partitioned CPU fallback time: ~35ms.
    2. **Calculations:**
       - Partitioning overhead: Synchronizing the NPU to CPU and transferring the intermediate tensor across the NoC accounts for massive latency.
       - CPU execution: The un-fused tail of the graph runs at an order of magnitude lower FLOPS.
    3. **Conclusion & Interpretation:**
       - **Result: Memory Transfer & CPU Fallback-Bound.** The latency explodes due to the memory transfer penalty across the system NoC and the slower CPU execution speed for the fractured subgraph.
