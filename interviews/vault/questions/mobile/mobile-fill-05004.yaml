title: 'Roofline Comparison: CPU vs Neural Engine for LLM on A17 Pro'
scenario: You're running a 7B parameter LLM in INT4 (3.5GB model) on iPhone 15 Pro with A17 Pro. The Neural
  Engine delivers 35 TOPS INT8, but INT4 support is limited. CPU achieves 2 TFLOPS FP16 with AMX extensions.
  Memory bandwidth is 68 GB/s unified. At batch=1 decode, determine which compute unit is optimal.
details:
  realistic_solution: 'At batch=1 decode, each token requires loading 3.5GB weights once. Memory-bound
    ceiling = 68 GB/s → 3.5GB/68 GB/s ≈ 51ms/token = ~20 tok/s regardless of compute unit. CPU with AMX:
    2 TFLOPS / 14 GFLOPs per token = ~143 tokens/s — above the memory bandwidth ceiling of ~20 tok/s,
    confirming memory-bandwidth is the binding constraint. Neural Engine: even if fast, still memory-bandwidth
    limited. Winner is whichever unit has better INT4 dequantization pipeline and cache reuse. Apple''s
    Metal framework routes to ANE+CPU hybrid for best throughput.'
  common_mistake: Defaulting to Neural Engine without verifying INT4 datatype support; the NE may require
    dequantization overhead that negates its throughput advantage.
  napkin_math: 'Memory bound: 3.5GB / 68 GB/s = 51ms/token → 19.6 tok/s ceiling. 7B INT4 decode FLOPs/token
    = 2×7B = 14 GFLOP. CPU ceiling: 2000 GFLOPS / 14 GFLOP = 143 tok/s — comparable to the memory-bound
    ceiling of ~20 tok/s but still bandwidth-limited in practice. Both units are memory-bandwidth limited
    — optimize data layout, not compute.'
