title: Zero-Copy Memory Mapping for Hexagon NPU
scenario: Your team is deploying a 4GB INT8 generative AI model to the Qualcomm Hexagon
  NPU (Snapdragon 8 Gen 3). The current application uses standard POSIX read() to
  load the weights into a heap buffer before passing the pointer to the NPU delegate.
  Users on the 12GB shared LPDDR5X RAM variant are experiencing frequent app crashes
  during model initialization due to Android's Low Memory Killer (LMK). Analyze the
  memory bottleneck and propose an optimization to eliminate the initialization spike.
question: How would you analyze the memory bottleneck and propose an optimization
  to eliminate the initialization spike?
details:
  realistic_solution: The optimal approach is to use memory-mapped files (mmap) combined
    with Android's DMA-BUF/ION hardware memory allocators. By memory-mapping the model
    file directly and passing the hardware buffer file descriptor to the Hexagon NPU
    delegate, the NPU can execute zero-copy inferences directly from the shared LPDDR5X
    memory. This prevents allocating duplicate user-space buffers, avoids dirtying
    anonymous memory pages, and lets the OS page-in weights efficiently.
  common_mistake: Candidates often suggest compressing the model further or chunking
    the weights for sequential execution. They frequently miss that standard file
    I/O creates a duplicate copy of the weights in user-space RAM, or they suggest
    generic CPU mmap without considering how the heterogeneous CPU+GPU+NPU architecture
    needs to share access to the physical memory.
  napkin_math: 'Baseline memory spike: 4GB (file buffer) + 4GB (NPU buffer) = 8GB
    allocated. On a 12GB Snapdragon 8 Gen 3 device, the Android OS and background
    apps typically consume ~6-7GB, leaving ~5GB available. The 8GB spike exceeds available
    RAM, guaranteeing an LMK crash. With zero-copy mmap, the memory footprint is strictly
    the 4GB mapped memory (4GB < 5GB available). Furthermore, avoiding the UFS 4.0
    read copy (~4GB/s) eliminates ~1000ms of cold start latency, allowing the NPU
    to immediately start utilizing its 45 TOPS INT8 compute capacity via fast page
    faulting over the high-bandwidth LPDDR5X.'
