title: Zero-Copy Memory Mapping for Hexagon NPU
scenario: Your team is deploying a 4GB INT8 generative AI model to the Qualcomm Hexagon NPU. The current application uses standard POSIX read() to load weights into a heap buffer before passing the pointer to the NPU delegate. Users on the 12GB shared RAM variant are experiencing frequent app crashes during initialization due to Android's Low Memory Killer (LMK).
question: How would you analyze the memory bottleneck and propose an optimization to eliminate the initialization spike?
details:
  realistic_solution: The optimal approach is to use memory-mapped files (mmap) combined with Android's hardware allocators. By memory-mapping the model file directly, the NPU executes zero-copy inferences.
  common_mistake: |
    **The Pitfall:** Suggesting generic model compression or chunking.
    **The Rationale:** Candidates miss that standard file I/O creates a duplicate copy of the weights in user-space RAM.
    **The Consequence:** The proposed solution degrades model quality unnecessarily or fails to resolve the underlying memory duplication causing the crash.
  napkin_math: |
    1. Calculate baseline memory spike: 4GB (file buffer) + 4GB (NPU buffer) = 8GB allocated.
    2. Estimate available RAM: On a 12GB device, Android OS and background apps consume ~6-7GB, leaving ~5GB available.
    3. Identify the crash cause: 8GB spike > 5GB available, guaranteeing an LMK crash.
    4. Evaluate zero-copy mmap: The footprint becomes strictly the 4GB mapped memory (4GB < 5GB available).
    5. Calculate latency savings: Avoiding the UFS read copy (~4GB/s) eliminates **~1000ms** of cold start latency.
