title: Zero-Copy Memory Mapping for Hexagon NPU
scenario: You are deploying a 4GB INT8 generative AI model. The application uses POSIX read() to load weights into a heap buffer before passing the pointer. Users experience frequent app crashes during initialization due to Android's Low Memory Killer (LMK).
question: How would you analyze the memory bottleneck and propose an optimization to eliminate the initialization spike?
details:
  realistic_solution: |
    The optimal approach is to use memory-mapped files (mmap) combined with Android's hardware allocators. By memory-mapping the model file directly, the NPU executes zero-copy inferences.
  common_mistake: |
    **The Pitfall:** Suggesting generic model compression or chunking.
    **The Rationale:** Candidates miss that standard file I/O creates a duplicate copy of the weights in user-space RAM.
    **The Consequence:** The proposed solution degrades model quality unnecessarily or fails to resolve the underlying memory duplication causing the crash.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model Size: 4GB.
    - App available RAM limit: ~5GB.

    **Calculations:**
    - Baseline memory spike: 4GB (file buffer) + 4GB (NPU buffer) = 8GB allocated.
    - Zero-copy mmap footprint: 4GB mapped memory.

    **Conclusion & Interpretation:**
    - **Result: Memory Duplication OOM.** Standard POSIX read duplicates the 4GB model in user-space, breaching the 5GB app limit. Using mmap avoids the copy and the LMK crash.
