title: The Mobile Memory Wall
scenario: An audio processing model on a smartphone needs to apply a filter in real-time. The filter coefficients are stored in main system memory (LPDDR5).
question: Roughly how much slower is fetching those coefficients from DRAM compared to accessing a value already in the CPU's L1 cache?
details:
  realistic_solution: Accessing main system LPDDR5 DRAM is approximately 100 times slower than accessing the L1 cache. L1 cache latency is around 1 ns, while LPDDR5 latency is about 100 ns. This significant gap is the 'memory wall' and is a primary driver for using on-chip memory (SRAM) and specialized data paths in mobile NPUs.
  common_mistake: |
    **The Pitfall:** Underestimating the off-chip latency penalty.
    **The Rationale:** Engineers think memory access is a small factor (e.g., 5-10x) and fail to internalize that leaving the silicon die is a major time and energy event.
    **The Consequence:** Designing models that constantly fetch weights from DRAM instead of optimizing for SRAM caching, leading to poor performance and battery drain.
  napkin_math: |
    - CPU L1 cache latency: ~1 ns
    - LPDDR5 DRAM latency: ~100 ns
    - **Relative Slowdown: 100 ns / 1 ns = 100x slower**
    - Analogy: If 1 ns = 1 second, waiting for DRAM is 1 minute and 40 seconds.
  options:
  - ~10x slower
  - ~100x slower
  - ~1,000x slower
  - ~2x slower
  correct_index: 1
