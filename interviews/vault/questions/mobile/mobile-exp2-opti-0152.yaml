title: Structured Pruning for Apple A17 Pro Neural Engine
scenario: You are deploying a 1B parameter transformer model on the Apple A17 Pro Neural Engine, which
  provides 35 TOPS within a ~5W power envelope and shares 8 GB of unified memory. Initial profiling shows
  that memory bandwidth is bottlenecking the 16-core Neural Engine, preventing it from reaching peak utilization
  during inference. You applied unstructured magnitude pruning and achieved 70% sparsity, but the on-device
  latency did not improve.
question: "Why does unstructured pruning fail to speed up A17 Pro inference and what structured pruning should replace it?"
details:
  realistic_solution: The correct approach is to diagnose the lack of speedup as a hardware alignment
    issue and switch to structured pruning, such as channel or block pruning. By physically reducing the
    dimensions of the weight tensors, structured pruning directly reduces the memory footprint and bandwidth
    requirements, allowing the 16-core Neural Engine to operate on smaller dense matrices and effectively
    alleviating the memory bottleneck.
  common_mistake: Candidates often assume that high unstructured sparsity automatically translates to
    faster inference and lower memory bandwidth usage. They fail to analyze the hardware interaction,
    missing that the A17 Pro Neural Engine's dense matrix multiplication engines cannot efficiently skip
    unstructured zeros, resulting in the same dense memory access patterns.
  napkin_math: A 1B parameter model in INT8 requires 1 GB of memory. Assuming the unified memory bandwidth
    to the NPU is bottlenecked at ~50 GB/s, reading the weights takes 1 GB / 50 GB/s = 20ms per token
    (50 tokens/s limit). The 35 TOPS NPU needs only ~0.06ms for the 2 GOPs of compute, confirming it's
    severely memory bound. By applying 50% structured pruning (e.g., halving the hidden dimension), the
    model size becomes 0.5 GB. The memory read time drops to 0.5 GB / 50 GB/s = 10ms, effectively doubling
    the throughput to 100 tokens/s without exceeding the ~5W budget.
