title: Depthwise Convolutions on Tensor G3 TPU
scenario: Your team replaced a standard 3x3 convolution (256 input/output channels, 56x56 resolution) with a depthwise separable convolution to optimize a vision model for a mobile TPU. Although the theoretical operations were reduced by almost 9x, the actual layer latency only improved by 1.5x.
question: How would you analyze why the latency reduction does not scale linearly with the FLOP reduction on this specific hardware?
details:
  realistic_solution: |
    The standard convolution has high arithmetic intensity and efficiently utilizes the TPU compute units. Depthwise separable convolutions drastically reduce FLOPs but have a much lower arithmetic intensity, shifting the bottleneck from compute to memory bandwidth. Even with fast LPDDR5X memory, the TPU's compute units sit idle waiting for data, causing the execution to be memory-bound and resulting in sub-linear latency improvements.
  common_mistake: |
    **The Pitfall:** Assuming execution time is strictly proportional to FLOP count.
    **The Rationale:** Candidates fail to consider the arithmetic intensity of the operation and the high peak compute of modern NPUs compared to their memory bandwidth.
    **The Consequence:** Engineering effort is spent on operations that theoretically reduce FLOPs but fail to yield proportional latency improvements in production.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Standard Conv MACs: 56 * 56 * 3 * 3 * 256 * 256.
       - Depthwise Separable MACs: (56 * 56 * 3 * 3 * 256) + (56 * 56 * 1 * 1 * 256 * 256).
       - Hardware: 7.5 TOPS TPU, 12 GB LPDDR5X.
    2. **Calculations:**
       - Standard Conv MACs = 1.84 GMACs = 3.69 GFLOPs.
       - Depthwise Separable MACs = 7.2 MMACs + 205.5 MMACs = 212.7 MMACs = 0.42 GFLOPs.
       - FLOP Reduction = 3.69 / 0.42 = ~8.7x.
       - Compute-bound time (Standard) = 3.69 GFLOPs / 7.5 TOPS = ~0.49 ms.
    3. **Conclusion & Interpretation:**
       - **Low arithmetic intensity makes depthwise convolutions bound by memory bandwidth, yielding only a 1.5x speedup despite an 8.7x FLOP reduction. Bottleneck: Memory-Bound.**
