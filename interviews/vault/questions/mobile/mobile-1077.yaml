title: Shadow Deployment Frame Drops on Exynos NPU
scenario: You are executing a shadow deployment for a new video segmentation model on devices equipped with the Samsung Exynos 2400 NPU (dual-core, 34.7 TOPS, sharing 12 GB LPDDR5X RAM with the CPU/GPU/ISP). The baseline model (Model A) consumes 2 TOPS and 1.5 GB of RAM, while the new candidate model (Model B) consumes 4 TOPS and 2.0 GB of RAM. When the shadow deployment is enabled, both models process the live camera feed simultaneously.
question: Why does shadow deployment on Exynos 2400 drop camera frame rate despite low TOPS utilization?
details:
  realistic_solution: The performance degradation is caused by a memory capacity bottleneck, not a compute limitation. The Exynos 2400 uses a unified memory architecture where the 12 GB of RAM is shared across the CPU, GPU, ISP, and NPU. Because the non-NPU components consume 9 GB during operation, only 3 GB is left for the NPU. Running both models simultaneously requires 3.5 GB of RAM, which exceeds the available physical memory. This deficit forces the OS to aggressively compress or swap memory pages, stalling the NPU and destroying real-time inference latency despite ample TOPS.
  common_mistake: |
    **The Pitfall:** Assuming NPU compute bottlenecks, thermal throttling, or context switching overhead between the dual NPU cores.
    **The Rationale:** Candidates ignore the shared memory architecture of the Exynos 2400 and focus purely on TOPS.
    **The Consequence:** They focus optimization efforts on compute instead of addressing the fundamental memory capacity bottleneck.
  napkin_math: |
    - Total shared memory = 12.0 GB.
    - Memory locked by OS/ISP/GPU = 9.0 GB.
    - Available memory for NPU = 12.0 GB - 9.0 GB = 3.0 GB.
    - Memory required for shadow deployment = Model A (1.5 GB) + Model B (2.0 GB) = 3.5 GB.
    - Memory deficit = 3.5 GB - 3.0 GB = 0.5 GB.
    - Compute utilization = (2 TOPS + 4 TOPS) / 34.7 TOPS = ~17.3%.
    - **The system is memory bound and lacks 0.5 GB to run both models, causing OS page swapping and frame drops.**
