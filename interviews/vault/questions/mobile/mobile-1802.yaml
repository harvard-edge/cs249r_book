title: Mobile FL Parallelism Safety Spec
scenario: A mobile FL platform wants to double selected clients per round. Specify
  safeguards that prevent parallelism from harming user experience.
question: What safeguards are required before doubling selected mobile FL clients
  per round?
details:
  realistic_solution: Require charging/Wi-Fi eligibility, thermal limits, battery
    caps, dropout handling, secure aggregation capacity, per-device training time
    limits, and opt-out telemetry. More parallel clients must not translate into more
    visible battery drain or heat.
  common_mistake: Optimizing only convergence speed while ignoring client-side resource
    impact.
  napkin_math: If selected clients double but only half are eligible under battery/thermal
    gates, effective completed updates may not increase.
