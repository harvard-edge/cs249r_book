title: Mobile FL Parallelism Safety Spec
scenario: A mobile FL platform wants to double selected clients per round.
question: What safeguards are required before doubling selected mobile FL clients per round to prevent harming user experience?
details:
  realistic_solution: Require charging/Wi-Fi eligibility, thermal limits, battery caps, dropout handling, secure aggregation capacity, per-device training time limits, and opt-out telemetry. More parallel clients must not translate into more visible battery drain or heat.
  common_mistake: |
    **The Pitfall:** Optimizing only for server-side convergence speed by demanding more parallel clients.
    **The Rationale:** Federated Learning researchers treat mobile phones like dedicated cloud nodes.
    **The Consequence:** Mass thermal throttling, battery drain complaints, and high dropout rates that actually slow down training progress.
  napkin_math: |
    1. **Eligibility Gating:** If 200 clients are selected, check battery (>50%) and thermal state (normal).
    2. **Yield Rate:** If thermal/battery gates reject 60% of clients, only 80 clients participate.
    3. **Throughput Check:** Doubling selection from 100 to 200 might only increase participating clients from 40 to 80.
    **Without strict device-side gating, forcing 200 concurrent training runs would spike thermal dropouts and drain batteries.**
