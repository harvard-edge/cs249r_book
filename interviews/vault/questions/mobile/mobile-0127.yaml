title: The WebGPU ML Inference
scenario: Your team debates shipping an ML feature as a native mobile SDK (Core ML / TFLite) vs running it in the browser via WebGPU. The PM argues 'WebGPU means write once, run everywhere — no app review, instant updates, works on any device with a browser.' The model is a 50M parameter image classifier.
question: When is WebGPU a reasonable alternative to a native mobile ML SDK for a 50M-parameter image classifier?
details:
  realistic_solution: '50M INT8 model: native ANE = 1.8ms, WebGPU = 5.5ms steady-state (1.2s first-inference compilation). For a photo app (1 inference/action): 205.5ms (WebGPU) vs 201.8ms (native) — 3.7ms difference, imperceptible. Engineering: WebGPU 1 month vs native 3 months. WebGPU wins for: infrequent inference, latency > 10ms, instant updates. Native wins for: real-time camera (<16ms budget), sustained inference, NPU/ANE access. Compute gap ~3x; often irrelevant.'
  common_mistake: |
    **The Pitfall:** Assuming WebGPU is "just JavaScript" and inherently 10x slower than native.
    **The Rationale:** Engineers confuse modern WebGPU (which compiles WGSL to native GPU code) with older WebGL or CPU-bound JavaScript execution.
    **The Consequence:** Teams incorrectly dismiss WebGPU for lightweight models, missing out on instant updates and cross-platform deployment.
  napkin_math: |
    1. Native (ANE) Latency: 1.8ms (steady-state).
    2. WebGPU Steady-State: 3.2ms compute + 0.3ms data + 2ms dispatch = 5.5ms.
    3. Total Latency (with 200ms UI overhead): 205.5ms WebGPU vs 201.8ms Native.
    4. Difference: 3.7ms (imperceptible to humans).
    5. **Conclusion: For infrequent inferences, a 3.7ms latency penalty is a fair trade for saving 2 months of native cross-platform engineering.**
