title: The PagedAttention System Call Trap
scenario: You port a PagedAttention implementation to an Android flagship to prevent KV cache fragmentation.
  With a block size of 16, a 2000-token prompt causes severe decode latency jitter (varying wildly from
  40ms to 180ms per token) and massive CPU overhead (peaking at 100% on one core), even though the LLM
  is running entirely on the GPU.
details:
  realistic_solution: The root cause is CPU-bound driver API overhead. Mobile GPUs lack the advanced hardware
    scatter-gather Memory Management Units (MMUs) found in data center GPUs. To emulate PagedAttention,
    the inference engine must bind hundreds of separate memory descriptors (one for each 16-token block)
    to the GPU command buffer for every layer, on every token. Submitting these tiny, fragmented buffer
    bindings overwhelms the Android graphics driver (e.g., Vulkan/OpenCL), causing the CPU to bottleneck
    the GPU. The GPU sits idle waiting for the CPU to construct and submit the command buffers.
  common_mistake: Assuming the GPU is struggling to read from non-contiguous memory blocks due to cache
    misses.
  napkin_math: "2000 tokens / 16 block size = 125 blocks. \n32 layers * 125 blocks = 4,000 separate buffer\
    \ bindings per token generated. \nIf the mobile graphics driver takes 0.02ms per descriptor binding,\
    \ 4000 * 0.02ms = 80ms of pure CPU overhead per token. \nBecause the OS scheduler preempts the thread,\
    \ this latency is highly erratic, causing the observed 40-180ms jitter."
