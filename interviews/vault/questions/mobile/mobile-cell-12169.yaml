title: 'Network Bandwidth Bottlenecks: Design Offline-First Bandwidth Architecture for Rural Mobile LLM'
scenario: 'Design a bandwidth-aware inference architecture for a mobile health app (Tensor G3, 12GB, ~50
  GB/s) targeting rural areas with intermittent connectivity (2G: 0.1Mbps, 3G: 1Mbps, WiFi: 10Mbps). The
  app uses a 1B INT4 LLM for medical Q&A. Specify: on-device model configuration, model download strategy,
  graceful degradation for different connectivity levels, and cloud fallback criteria.'
question: "How would you specify : on-device model configuration, model download strategy, graceful degradation for different connectivity levels, and cloud fallback criteria?"
details:
  realistic_solution: 'On-device: 1B INT4 = 500MB. Download time at: WiFi: 500MB/1.25MB/s=400s=6.7min
    ✓. 3G: 500MB/125KB/s=4000s=67min (background download). 2G: 500MB/12.5KB/s=40000s=11hr (impractical).
    Strategy: pre-install via WiFi. Delta updates: 50MB avg / WiFi = 40s, 3G = 400s=6.7min (background).
    TPOT on Tensor G3: 500MB/50GB/s=10ms/token. Cloud fallback: use only when WiFi available + cloud latency
    < 2× on-device (RTT+server < 20ms). Graceful degradation: 2G (offline-only) → 1B on-device; 3G + cloud:
    hybrid (on-device for TTFT, cloud for long completions); WiFi + cloud: full cloud 13B model.'
  common_mistake: Designing only the cloud-fallback path without specifying on-device capability that
    works completely offline, or specifying a model too large to download on 2G.
  napkin_math: '1B INT4: 500MB. WiFi DL: 500/1.25MB/s=400s. 3G: 500/0.125MB/s=4000s. 2G: 500/0.0125=40000s
    (impractical — use pre-install). On-device TPOT: 0.5/50=10ms. Cloud (WiFi, H100): 7.8ms + 50ms RTT
    = 57.8ms/token. On-device faster! Even at WiFi. Recommendation: always use on-device for tokens, use
    cloud only for model updates and analytics.'
