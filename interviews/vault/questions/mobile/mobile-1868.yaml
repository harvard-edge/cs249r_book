title: Mobile DP Noise Versus Personalization
scenario: A mobile personalization feature clips user gradients at norm 1.0 and adds DP noise. Strong privacy with noise multiplier 2.0 reduces personalization lift from 5% to 1%, while multiplier 0.8 preserves 4% lift but weakens privacy.
question: "How would you evaluate the deployment decision between a DP noise multiplier of 2.0 versus 0.8 when personalization lift falls from 5% to 1%?"
details:
  realistic_solution: This is a privacy-utility tradeoff, not a pure accuracy decision. Multiplier 2.0 may be necessary for a strict privacy budget but nearly eliminates product lift. Multiplier 0.8 preserves value but may not meet policy. The decision requires target epsilon, risk tolerance, and user consent model before choosing.
  common_mistake: |
    **The Pitfall:** Choosing the setting with the best product metric (0.8) without verifying the privacy budget.
    **The Rationale:** ML engineers are trained to maximize accuracy/lift and may view DP parameters purely as regularization, ignoring strict legal or policy epsilon constraints.
    **The Consequence:** The model is deployed in violation of the organization's privacy guarantees, exposing the company to regulatory risk.
  napkin_math: |
    * Baseline lift = 5%
    * Noise multiplier 2.0 lift = 1% (Retains 1/5 or 20% of utility).
    * Noise multiplier 0.8 lift = 4% (Retains 4/5 or 80% of utility).
    * **This is a utility retention comparison; the final decision requires calculating the resulting privacy epsilon (ε) for both multipliers over the expected number of training rounds and checking against policy.**
