title: Federated Tree Aggregation
scenario: An A17 Pro device participates in federated learning where 10,000 devices send a 10MB update daily to the cloud.
question: Devise a hierarchical aggregation topology to handle the 100GB uplink traffic and reduce central server bottlenecking.
visual:
  kind: svg
  path: mobile-1962.svg
  alt: Tree structure showing devices connecting to regional nodes, which connect to the central cloud.
  caption: Hierarchical federated aggregation topology.
details:
  realistic_solution: Implement a tree topology where devices upload to regional edge servers (e.g., 100 servers handling 100 devices each). The edge servers aggregate the 10MB updates locally and send a single 10MB update to the central server, reducing central ingress from 100GB to 1GB.
  common_mistake: |
    **The Pitfall:** Assuming central servers easily scale network ingress.
    **The Rationale:** Candidates don't consider the massive latency, connection overhead, and cost of 10,000 concurrent mobile connections uploading simultaneously.
    **The Consequence:** The central server crashes or throttles, dropping many client updates and corrupting the federated learning round.
  napkin_math: |
    - Total naive ingress = 10,000 devices * 10 MB = 100,000 MB = 100 GB.
    - Hierarchical tree: 100 regional edge servers, each handling 100 devices.
    - Edge server aggregates 100 * 10 MB = 1,000 MB (1 GB) locally into a single 10 MB update.
    - Central server receives 100 updates * 10 MB = 1,000 MB (1 GB).
    - **Central ingress is reduced from 100 GB to 1 GB (100x reduction).**
