title: 'Federated Tree Aggregation'
scenario: A federated learning network involves 10,000 devices sending a 10MB update daily to the cloud.
question: How would you devise a hierarchical aggregation topology to handle the massive uplink traffic and reduce central server bottlenecking?
details:
  realistic_solution: 'Implement a hierarchical tree topology where devices upload to regional edge servers (e.g., 100 edge servers handling 100 devices each). The edge servers aggregate the updates locally and send a single 10MB aggregate update to the central server. This distributed approach radically reduces central network ingress and mitigates latency.'
  common_mistake: |
    **The Pitfall:** Assuming centralized cloud servers easily scale infinite network ingress.
    **The Rationale:** Candidates do not consider the massive latency, connection overhead, and infrastructure cost of 10,000 mobile devices executing concurrent TLS handshakes simultaneously.
    **The Consequence:** The central server crashes or throttles, dropping many client updates and corrupting the federated learning round.
  napkin_math: |
    **Assumptions & Constraints:**
    - Total devices: 10,000.
    - Update size: 10 MB.
    - Edge servers: 100.

    **Calculations:**
    - Naive central ingress = 10,000 * 10 MB = 100,000 MB = 100 GB.
    - Hierarchical aggregation = 100 edge servers * 10 MB = 1,000 MB = 1 GB.

    **Conclusion & Interpretation:**
    - **Result: 1 GB ingress (Network-Bound)**. Central ingress is reduced from 100 GB to 1 GB (100x reduction) via edge aggregation.
