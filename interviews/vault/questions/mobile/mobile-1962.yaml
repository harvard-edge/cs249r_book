title: Federated Tree Aggregation
scenario: An A17 Pro device participates in federated learning where 10,000 devices
  send a 10MB update daily to the cloud.
question: Devise a hierarchical aggregation topology to handle the 100GB uplink traffic
  and reduce central server bottlenecking.
visual:
  kind: svg
  path: mobile-1962.svg
  alt: Tree structure showing devices connecting to regional nodes, which connect
    to the central cloud.
  caption: Hierarchical federated aggregation topology.
details:
  realistic_solution: Implement a tree topology where devices upload to regional edge
    servers (e.g., 100 servers handling 100 devices each). The edge servers aggregate
    the 10MB updates locally and send a single 10MB update to the central server,
    reducing central ingress from 100GB to 1GB.
  common_mistake: Assuming central servers easily scale network ingress without considering
    the massive latency and cost of 10,000 concurrent connections.
  napkin_math: 10000 * 10 / 100 = 1000 MB central ingress
