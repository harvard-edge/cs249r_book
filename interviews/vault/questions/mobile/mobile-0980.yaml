title: 'Model Format Conversion: Full Stack LLM Conversion for On-Device iOS Deployment'
scenario: You need to convert and deploy a 1B-parameter LLaMA-style model to iOS using CoreML on an A17 Pro. The full stack includes PyTorch to ONNX to a CoreML stateful model with KV-cache, INT4 weight compression, and chunked prefill.
question: How do you evaluate conversion time, model size, TTFT, TPOT, and maximum context length for a 1B model in 8GB RAM?
details:
  realistic_solution: 'CoreML stateful: KV-cache stored as state variables, updated in-place. INT4: 500MB. Stateful model: add 32 layers × 2 (K,V) × max_seq × hidden_dim × 2B (FP16) state. At max_seq=4096, hidden=2048: 32×2×4096×2048×2 = 1.07GB KV state. Total: 500MB + 1.07GB = 1.57GB << 8GB. TTFT (512 tokens): chunked prefill at 128 tokens/chunk: 4 chunks × 7.3ms = 29.2ms. TPOT: 500MB / 68GB/s = 7.35ms/token. 50 tokens: 367.5ms. Total: 396.7ms.'
  common_mistake: |
    **The Pitfall:** Implementing KV-cache as standard model inputs instead of using CoreML stateful models.
    **The Rationale:** Developers often rely on older static graph conversion methods instead of leveraging iOS 18+ state variables for in-place updates.
    **The Consequence:** O(n^2) memory growth during generation, causing the app to crash with Out-Of-Memory (OOM) errors at context lengths > 512 tokens.
  napkin_math: |
    1. **INT4 Model Size:** 1B $\times$ 0.5 bytes = 500MB.
    2. **KV State (4096 ctx):** 32 layers $\times$ 2 (K,V) $\times$ 4096 seq $\times$ 2048 dim $\times$ 2 bytes = 1.07GB. Total RAM = 1.57GB (19.6% of 8GB).
    3. **TTFT (Chunked):** 4 chunks of 128 tokens. 128 $\times$ 1B $\times$ 2 / 35 TOPS = 7.3ms per chunk $\rightarrow$ 4 $\times$ 7.3 = 29.2ms.
    4. **TPOT:** 500MB / 68GB/s = 7.35ms/token.
    5. **Max Context:** (8GB - 500MB weights - 1GB OS) / (32 $\times$ 2 $\times$ 2048 $\times$ 2B) = 6.5GB / 0.26MB/token = **~25,000 tokens**.
