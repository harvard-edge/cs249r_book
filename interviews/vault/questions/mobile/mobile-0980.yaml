title: 'Model Format Conversion: Full Stack LLM Conversion for On-Device iOS Deployment'
scenario: 'Convert and deploy a 1B-parameter LLaMA-style model to iOS using CoreML
  on A17 Pro (35 TOPS, 8GB). The full stack: PyTorch → ONNX → CoreML stateful model
  with KV-cache, INT4 weight compression, and chunked prefill. Evaluate: conversion
  time, model size, TTFT, TPOT, and maximum context length fitting in 8GB.'
question: 'How would you evaluate : conversion time, model size, TTFT, TPOT, and maximum
  context length fitting in 8GB?'
details:
  realistic_solution: 'CoreML stateful: KV-cache stored as state variables, updated
    in-place. INT4: 500MB. Stateful model: add 32 layers × 2 (K,V) × max_seq × hidden_dim
    × 2B (FP16) state. At max_seq=4096, hidden=2048: 32×2×4096×2048×2 = 1.07GB KV
    state. Total: 500MB + 1.07GB = 1.57GB << 8GB. TTFT (512 tokens): chunked prefill
    at 128 tokens/chunk: 4 chunks × 2ms = 8ms. TPOT: 500MB / 68GB/s = 7.35ms/token.
    50 tokens: 367ms. Total: 375ms.'
  common_mistake: Not using CoreML stateful models (available iOS 18+) and instead
    implementing KV-cache as model inputs, which causes O(n²) memory growth and fails
    at context > 512 tokens.
  napkin_math: 'INT4 model: 1B × 0.5B = 500MB. KV state (4096 ctx): 32×2×4096×2048×2B
    = 32×2×4096×4096 bytes = 1.07GB. Total in RAM: 500MB + 1.07GB = 1.57GB of 8GB
    = 19.6%. TTFT chunked: 4×128-token chunks × Neural Engine prefill. 128×2×1B×2/(35TOPS)
    = 14.6ms per chunk → 4×14.6 = 58ms. TPOT: 500MB/68GB/s = 7.35ms. ✓ Max context
    at 8GB: (8GB - 500MB - 1GB OS) / (32×2×2048×2B per token) = 6.5GB / 0.26MB per
    token = 25K tokens max.'
