title: 'Kernel Fusion: Realize Bandwidth Savings from Fusing Transformer Block on Snapdragon'
scenario: You need to realize bandwidth savings from fusing post-attention operations on a Snapdragon 8 Gen 3 (45 TOPS INT8) for a 1B model decode (batch=1). The sequence is: attention output -> Linear -> RMSNorm -> residual add -> gate.
question: How much memory bandwidth does fusing post-attention operations save for a 1B decode block on Snapdragon 8 Gen 3?
details:
  realistic_solution: 'Activation bandwidth for post-attention sequence: the 4096-element vectors are tiny compared to the 4096x4096 weight matrices. Fusion saves activation reads/writes but those are negligible. Fusing is not worth the engineering effort for this workload.'
  common_mistake: |
    **The Pitfall:** Not distinguishing between weight bandwidth and activation bandwidth.
    **The Rationale:** Assuming fusing operations always yields huge gains without profiling where the bytes are moving.
    **The Consequence:** Wasting engineering effort writing custom fused kernels that yield less than a 1% speedup.
  napkin_math: |
    - Activations (4096 dim): 8 KB per tensor. Total activation reads/writes across 7 ops = 56 KB.
    - Activation time at 68 GB/s: 56 KB / 68 GB/s = 0.00082 ms.
    - Weights (Linear + Gate): 16 MB + 16 MB = 32 MB.
    - Weight time at 68 GB/s: 32 MB / 68 GB/s = 0.47 ms.
    - **Fusing saves 56 KB of activations (0.00082 ms), which is negligible compared to the mandatory 32 MB weight load (0.47 ms).**
