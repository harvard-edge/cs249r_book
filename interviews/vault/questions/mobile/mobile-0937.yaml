title: 'Kernel Fusion: Realize Bandwidth Savings from Fusing Transformer Block on Snapdragon'
scenario: 'You need to realize bandwidth savings from fusing post-attention operations on a Snapdragon 8 Gen 3 for a 1B parameter model decode (batch=1). The operator sequence is: attention output -> Linear -> RMSNorm -> residual add -> gate.'
question: How much memory bandwidth does fusing post-attention operations save for a 1B decode block on Snapdragon 8 Gen 3?
details:
  realistic_solution: 'Calculate the activation IO against the weight IO. At batch=1 decode, activation vectors (e.g., 4096 elements) are miniscule compared to loading the gigabytes of dense weight matrices. Kernel fusion eliminates activation reads/writes between the operations, but does nothing to the weight load bottleneck. The savings are statistically trivial.'
  common_mistake: |
    **The Pitfall:** Assuming kernel fusion universally delivers massive speedups, treating batch=1 inference identically to batch=128 training.
    **The Rationale:** Failing to physically separate the bandwidth cost of loading activations from the cost of loading network weights.
    **The Consequence:** Burning weeks of engineering effort writing custom fused Hexagon kernels that ultimately yield less than a 1% latency improvement.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: 1B parameters, hidden dim 4096 (Batch=1).
    - Sequence operations: 7 distinct post-attention ops.
    - Memory Bandwidth: ~68 GB/s.

    **Calculations:**
    - Activations (FP16): 4096 elements = 8 KB per tensor. Total I/O across 7 ops = 56 KB.
    - Activation latency: 56 KB / 68 GB/s = ~0.00082 ms.
    - Weights (Linear + Gate, INT8): 16 MB + 16 MB = 32 MB.
    - Weight latency: 32 MB / 68 GB/s = ~0.47 ms.

    **Conclusion & Interpretation:**
    - **Result: 0.47 ms (Memory-Bound)**. Fusing saves a negligible 56 KB (0.00082 ms) of activation bandwidth, an optimization completely swallowed by the mandatory 32 MB (0.47 ms) static weight fetch.
