title: On-Device LLM Federated Personalization on Tensor G3
scenario: You are designing a cross-device federated learning system to continuously
  personalize an on-device LLM (~1.8B parameters, similar to Gemini Nano) for a predictive
  text feature exclusively on the Google Tensor G3. The target devices feature a 7.5
  TOPS on-device TPU and 12 GB of LPDDR5X RAM. You must architect the local training
  loop and server aggregation strategy to handle highly non-IID user typing data,
  while keeping the daily upload payload under 10MB per user and staying strictly
  within the device's compute and memory constraints.
question: How would you personalize a Tensor G3 on-device LLM with federated LoRA
  under a 10 MB daily upload limit?
details:
  realistic_solution: The optimal architecture uses Parameter-Efficient Fine-Tuning
    (specifically LoRA) with a 4-bit quantized frozen base model to aggressively reduce
    memory footprint. To address the 10MB upload limit and non-IID data, the system
    should transmit only the quantized LoRA weights using a method like FedProx to
    constrain local updates and prevent client drift. The 7.5 TOPS TPU is utilized
    to rapidly compute the forward and backward passes for the adapters exclusively
    during device idle and charging states.
  common_mistake: Candidates often suggest full model fine-tuning with standard FedAvg,
    which requires storing full optimizer states that easily exceed available memory
    when combined with OS overhead in the 12 GB LPDDR5X RAM, and massively violates
    the 10MB communication budget. They also frequently ignore the severe non-IID
    nature of personal text, leading to catastrophic client drift.
  napkin_math: A 1.8B parameter base model at 4-bit quantization consumes ~0.9 GB
    of the 12 GB LPDDR5X RAM. Injecting rank-8 LoRA adapters adds roughly 1.8M trainable
    parameters. In FP16 (2 bytes/param), the adapter weights are 3.6 MB, and Adam
    optimizer states (momentum + variance) add 7.2 MB, keeping total training memory
    well under 1.5 GB. The 3.6 MB weight delta cleanly satisfies the <10MB upload
    budget. For compute, processing a batch of 1,000 tokens requires roughly 10.8
    Tera-operations (6 FLOPs per parameter per token); running on the 7.5 TOPS TPU,
    this localized burst of training takes approximately 1.5 seconds, having negligible
    impact on battery and thermals.
