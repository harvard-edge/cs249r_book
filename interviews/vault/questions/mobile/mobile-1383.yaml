title: On-Device LLM Federated Personalization on Tensor G3
scenario: You are designing a cross-device federated learning system to personalize an on-device 1.8B parameter LLM. You must handle non-IID user data while keeping the daily upload payload under 10MB per user.
question: How would you personalize an on-device LLM with federated LoRA under a 10 MB daily upload limit?
details:
  realistic_solution: |
    The optimal architecture uses LoRA with a 4-bit quantized frozen base model. Transmit only the quantized LoRA weights using FedProx to constrain local updates and prevent client drift.
  common_mistake: |
    **The Pitfall:** Proposing full model fine-tuning with standard FedAvg.
    **The Rationale:** Candidates default to full fine-tuning without considering that storing full optimizer states easily exceeds mobile memory limits and massively violates the 10MB communication budget.
    **The Consequence:** The system will crash due to OOM errors, fail to upload within budget, and suffer from catastrophic client drift due to non-IID data.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: 1.8B params.
    - Adapter: Rank-8 LoRA (~1.8M trainable params).
    - Payload limit: 10 MB.

    **Calculations:**
    - Adapter Size (FP16): 1.8M * 2 bytes = 3.6 MB.
    - Optimizer State (Adam): 3.6 MB * 2 = 7.2 MB.

    **Conclusion & Interpretation:**
    - **Result: Bandwidth Limit Respected.** Only the 3.6 MB LoRA weights are transmitted, easily satisfying the 10MB upload limit while avoiding OOM from full fine-tuning.
