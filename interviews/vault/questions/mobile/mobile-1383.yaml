title: On-Device LLM Federated Personalization on Tensor G3
scenario: You are designing a cross-device federated learning system to personalize an on-device LLM (~1.8B parameters) for a predictive text feature. You must architect the local training loop to handle non-IID user data while keeping the daily upload payload under 10MB per user.
question: How would you personalize an on-device LLM with federated LoRA under a 10 MB daily upload limit?
details:
  realistic_solution: The optimal architecture uses LoRA with a 4-bit quantized frozen base model. Transmit only the quantized LoRA weights using FedProx to constrain local updates and prevent client drift.
  common_mistake: |
    **The Pitfall:** Proposing full model fine-tuning with standard FedAvg.
    **The Rationale:** Candidates default to full fine-tuning without considering that storing full optimizer states easily exceeds mobile memory limits and massively violates the 10MB communication budget.
    **The Consequence:** The system will crash due to OOM errors, fail to upload within budget, and suffer from catastrophic client drift due to non-IID data.
  napkin_math: |
    1. Evaluate model size: 1.8B params at 4-bit consumes ~0.9 GB RAM.
    2. Evaluate adapter size: Rank-8 LoRA adds ~1.8M trainable parameters. In FP16, this is **3.6 MB**.
    3. Evaluate training memory: Adam states (momentum + variance) add 7.2 MB, keeping total training memory well under 1.5 GB.
    4. Check upload budget: The 3.6 MB weight delta satisfies the <10MB limit.
    5. Compute time: Processing 1,000 tokens requires ~10.8 Tera-operations. At 7.5 TOPS, this burst takes **~1.5 seconds**.
