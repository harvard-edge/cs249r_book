title: 'KV-Cache: Optimize KV Cache for Aggressive Memory Compression on A17 Pro'
scenario: 'Your 3B LLM (INT8) on an A17 Pro (35 TOPS, 8GB) needs to support an 8192-token context. The OS uses 2GB, and the INT8 model requires 3GB. This leaves 3GB available, but the KV cache for 8192 tokens consumes 537MB of the remaining 3GB.'
question: How should KV cache compression and offloading free memory for longer contexts on a 3B A17 Pro LLM?
details:
  realistic_solution: 'Three-tier KV compression: (1) Active KV (recent 2048 tokens): INT8 in RAM. (2) Warm KV (2048-6144 tokens): INT4 in RAM. (3) Cold KV (6144+ tokens): compressed to NAND flash.'
  common_mistake: |
    **The Pitfall:** Keeping the entire KV cache in uncompressed format in RAM.
    
    **The Rationale:** Candidates assume that since the initial 5.54GB fits within the 8GB limit, there is no need to aggressively optimize.
    
    **The Consequence:** Limits the ability to cache multiple conversations or extend context significantly, increasing OOM risk under background memory pressure.
  napkin_math: |
    1. **Calculate Base Size:** 8192 tokens × 32 layers × 2 (K,V) × 8 heads × 128 dim × 1 byte (INT8) = 537 MB.
    2. **Apply Compression Strategy:**
       - Active (2048 tokens): 2048 × 32 × 2 × 8 × 128 × 1B = 134 MB (INT8).
       - Warm (2048 tokens): 2048 × 32 × 2 × 8 × 128 × 0.5B = 67 MB (INT4).
       - Cold (4096 tokens): 4096 × 32 × 2 × 8 × 128 × 0.5B = 134 MB (INT4) compressed to flash.
    3. **Calculate Savings:** Total RAM used = 134 + 67 = 201 MB.
    4. **Result:** **336 MB of RAM saved**, enabling multi-conversation caching or extended contexts.
