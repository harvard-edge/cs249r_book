title: Split-Computing Compression Overhead
scenario: An iPhone offloads the latter half of a ResNet to a cloud server via 5G, compressing intermediate features via an autoencoder.
question: Diagnose why total end-to-end latency increases when compressing feature maps before 5G transmission, despite reducing payload size.
details:
  realistic_solution: The latency increase implies the compute time to run the autoencoder compression on the mobile device (and decompression on the cloud) exceeds the time saved by transmitting a smaller payload. On high-speed 5G, the network is less of a bottleneck than the heavy compression compute overhead.
  common_mistake: |
    **The Pitfall:** Assuming reducing payload size strictly reduces end-to-end latency.
    **The Rationale:** Candidates ignore the compute penalty of the compression algorithm.
    **The Consequence:** They mistakenly advocate for compression that increases overall end-to-end latency.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Compute time for compression (T_comp) = 50ms.
       - Transmit time compressed (T_tx) = 10ms.
       - Transmit time uncompressed (T_tx_uncompressed) = 40ms.
    2. **Calculations:**
       - Total latency compressed = 50ms + 10ms = 60ms.
       - Total latency uncompressed = 40ms.
    3. **Conclusion & Interpretation:**
       - **Result: 60ms > 40ms. Compute-Bound.** The compression compute overhead exceeds network bandwidth savings.
