title: The CoreML Model Compilation Jitter
scenario: 'You deploy a CoreML model in your iOS app. The `.mlmodel` file is bundled in the app. When
  the user taps ''Start Camera'', you initialize the model using `let model = try MyModel(configuration:
  config)`. The very first time the user taps this button after downloading the app, the UI freezes for
  3 seconds. Every subsequent tap is instant. What is iOS doing under the hood during that first initialization?'
details:
  realistic_solution: 'iOS compiles .mlmodel to ANE machine code on first init: operator fusion, memory
    planning, code generation = ~3 seconds for 50 layers. Fix: (1) Pre-compile with coremltools compile()
    to ship .mlmodelc directly. (2) Or compile on background thread at first launch and cache. (3) Never
    call MLModel init on main thread. The cache persists across launches. Weight loading is ~50ms; the
    3s is almost entirely compilation. This is the most common CoreML UX trap.'
  common_mistake: '"It''s loading the weights into memory." Loading a few megabytes of weights takes milliseconds,
    not 3 seconds.'
  napkin_math: Compiling a 50-layer network graph into ANE machine code involves aggressive operator fusion
    and memory planning, consuming billions of CPU cycles. This is a one-time 3000ms tax that destroys
    the first-impression UX if not hidden.
