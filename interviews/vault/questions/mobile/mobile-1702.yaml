title: Diagnosing Latency Spikes on Snapdragon 8 Gen 3 NPU
scenario: A new on-device AI model for real-time video analytics is deployed on mobile
  devices, leveraging the Snapdragon 8 Gen 3 Hexagon NPU (45 TOPS INT8, 12-16 GB LPDDR5X).
  Post-deployment, production health dashboards show intermittent, but significant,
  spikes in inference latency, particularly under sustained load. These spikes are
  not uniformly distributed across the device fleet and lead to observable user experience
  degradation. You need to identify the root cause of these performance anomalies.
  Describe your diagnostic strategy, focusing on the specific telemetry, alerting
  mechanisms, and dashboard insights you would employ to narrow down and resolve the
  issue.
question: How would you diagnose sustained-load latency spikes in a Snapdragon 8 Gen
  3 video analytics model using NPU telemetry?
details:
  realistic_solution: 'A realistic solution involves implementing granular, NPU-aware
    monitoring:

    1.  **NPU Utilization & Throughput**: Collect metrics on NPU core utilization,
    instruction per cycle (IPC), and actual INT8 operations per second to gauge processing
    load. Track model inference throughput (frames/sec).

    2.  **NPU Memory & Bandwidth**: Monitor memory usage within the 12-16 GB LPDDR5X
    for the NPU, and critical bandwidth metrics for data transfers between main memory
    and the NPU to detect saturation.

    3.  **Latency Breakdown**: Instrument the inference pipeline to break down total
    latency into: data preparation (CPU), data transfer to NPU, NPU execution time,
    and data transfer from NPU.

    4.  **Thermal Monitoring**: Directly monitor the NPU''s temperature and correlate
    with clock frequency scaling/throttling events.

    5.  **Error Rates**: Track NPU-specific error codes or watchdog resets.

    6.  **Straggler Detection**: Implement statistical analysis (e.g., p99 latency
    alerts) to identify individual inferences that significantly exceed expected durations,
    indicating stragglers.

    7.  **Alerting & Dashboards**: Configure alerts on anomalous deviations in NPU
    utilization, inference latency (especially p99), NPU temperature, and memory bandwidth.
    Develop production health dashboards that correlate these NPU metrics with device-specific
    metadata (OS version, app version, NPU driver version, device load) to identify
    patterns and potential correlations (e.g., specific NPU driver versions exhibiting
    issues). Focus on MTTR by ensuring diagnostic logs (e.g., NPU profiler traces)
    can be remotely triggered for affected devices.'
  common_mistake: A common mistake is to rely solely on high-level system metrics
    (e.g., overall CPU usage, general memory pressure) or basic model inference latency,
    without deep-diving into NPU-specific telemetry. This often leads to misattributing
    performance issues to generic system bottlenecks or the model itself, rather than
    specific NPU resource contention, thermal throttling, NPU memory bandwidth saturation
    (on the 12-16 GB LPDDR5X), or NPU driver/scheduler inefficiencies, making effective
    root cause analysis impossible.
  napkin_math: 'If the Snapdragon 8 Gen 3 Hexagon NPU provides 45 TOPS INT8, and our
    model requires, say, 15 TOps (tera operations total) per inference for a specific
    task. At 45 TOPS (tera operations per second) throughput, the NPU can perform
    45 TOPS / (15 TOps / inference) = 3 inferences per second. If our telemetry shows
    average throughput is only 1 inference/second during a latency spike, but NPU
    utilization is only at 40%, it indicates the NPU itself is not the bottleneck
    (40% of 3 inferences/sec = 1.2 inferences/sec, which is close). This disparity
    suggests that the issue is likely external to the NPU''s direct compute, such
    as: (1) contention for the 12-16 GB LPDDR5X memory bandwidth by other processes,
    (2) I/O bound issues, (3) data preprocessing on the CPU becoming a bottleneck,
    or (4) NPU task scheduling delays, rather than the NPU hitting its raw compute
    limit. Further investigation would then focus on memory access patterns or CPU-side
    bottlenecks.'
