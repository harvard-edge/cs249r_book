title: Diagnosing Latency Spikes on Snapdragon 8 Gen 3
scenario: You have deployed a real-time video processing model on Android devices equipped with the Qualcomm
  Hexagon NPU (Snapdragon 8 Gen 3). After a recent model update, your production health dashboards show
  a sudden increase in P99 inference latency, accompanied by user complaints about rapid battery drain.
  Telemetry indicates that overall NPU utilization has dropped, while traffic on the shared 12-16 GB LPDDR5X
  memory bus is heavily saturated. How do you diagnose the root cause of these symptoms using your knowledge
  of this heterogeneous architecture?
details:
  realistic_solution: The symptoms strongly indicate an operation fallback issue. The Snapdragon 8 Gen
    3 uses a heterogeneous architecture where the CPU, GPU, and NPU share the LPDDR5X memory. If the new
    model introduced operations not supported by the Hexagon NPU, those ops fall back to the CPU or GPU.
    This forces the system to constantly copy intermediate tensors back and forth across the shared memory
    bus, leading to the observed memory saturation, latency spikes, and severe battery drain. The fix
    requires profiling the model to identify the unsupported ops and replacing them with NPU-compatible
    alternatives.
  common_mistake: Candidates often assume the new model is simply too large or computationally heavy,
    suggesting generic solutions like heavier INT8 quantization or pruning. They fail to analyze the contradictory
    telemetry (low NPU utilization alongside high memory bandwidth) and miss the implications of heterogeneous
    computing on a shared memory bus.
  napkin_math: While the Hexagon NPU offers 45 TOPS INT8 for efficient compute, fallback destroys this
    efficiency. Assume a mid-network activation tensor is 4 MB. A single fallback requires writing 4 MB
    to LPDDR5X memory and reading it back to the CPU (8 MB total). At 30 FPS, one fallback point generates
    240 MB/s of memory traffic. If the model stutters between the NPU and CPU 10 times per inference,
    it creates 2.4 GB/s of continuous, unnecessary memory bandwidth overhead, rapidly draining the battery
    and causing thermal throttling.
