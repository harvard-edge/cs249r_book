title: 'Dataset Curation: Realize Cross-Device Dataset Consistency for Mobile Fleet'
scenario: 'You are rolling out a federated learning update to 50M mobile devices split between A17 Pro (35 TOPS, 8GB, iOS) and Snapdragon 8 Gen 3 (45 TOPS, 16GB, Android).'
question: 'How should cross-device federated learning enforce consistent tokenizers, data formats, and label schemas?'
details:
  realistic_solution: 'Bundle tokenizer with model as atomic unit. Use protobuf schema versioning for label formats. Enforce minimum dataset version check before participating in any training round. Use content-addressed storage (SHA256) for all dataset artifacts.'
  common_mistake: |
    **The Pitfall:** Deploying tokenizer updates separately from model updates.
    **The Rationale:** Candidates overlook that models and tokenizers are tightly coupled and version skew causes immediate garbage data.
    **The Consequence:** Tokenizer-model mismatch on devices, causing crashes or silent training corruption.
  napkin_math: |
    1. **Device Split:** 50M devices: 60% Android (30M Snapdragon), 40% iOS (20M A17 Pro).
    2. **Tokenizer Size:** SentencePiece 32K vocab = 2MB. Distributed with model update: already bundled.
    3. **Compatibility Check:** SHA256 of tokenizer file checked at round start. Mismatch rate (version skew): assume 2% of devices on old version = 1M excluded. Acceptable: 49M/50M = 98% participation.
    4. **Label Schema:** Protobuf backward compatible. Schema version byte added = 1 byte overhead per example. 1M examples × 1 byte = 1MB overhead per device (negligible).
    5. **Bandwidth Cost:** Monthly round bandwidth: 50M × 200KB gradients = 10TB. At $0.01/GB: **$100/round = $1,200/year.**
