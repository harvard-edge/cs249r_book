title: OOM Crash on A17 Pro During High-Res Inference
scenario: You are deploying a vision model on an iPhone 15 Pro with the Apple A17 Pro Neural Engine (16-core). The device has 8 GB of unified memory shared across CPU, GPU, and NPU. When processing a batch of high-resolution images (1024x1024), the application suddenly crashes due to a Jetsam event (OS-level memory eviction), despite the model weights only taking up 1.5 GB.
question: Why did the OS kill the process during high-res inference, and how does the unified memory architecture contribute?
details:
  realistic_solution: The crash occurs because the activation memory spikes significantly during high-resolution processing. Because the 8 GB is unified, the OS likely only grants a portion (e.g., 50-60%) to any single app to keep the system responsive. If the model's weights plus peak activations exceed this OS-enforced limit (around 4-5 GB), Jetsam will kill the app to protect system stability. The solution involves reducing batch size, using gradient checkpointing if training, or processing smaller tiles to lower peak activation memory.
  common_mistake: |
    **The Pitfall:** Assuming that if model weights fit in memory, the model will run fine.
    **The Rationale:** Engineers focus on the static parameter count and ignore the dynamic activation memory required during high-resolution forward passes.
    **The Consequence:** Unpredictable app crashes (Jetsam events) under load because activations drastically exceed the shared unified memory budget.
  napkin_math: |
    1. **Total Memory Budget:** 8 GB. OS/System Reserve ≈ 3 GB. Available to App ≈ 5 GB.
    2. **Weights:** 1.5 GB.
    3. **Activation Memory (Single Layer):** 1024x1024 at 256 channels (FP16) = 1024 * 1024 * 256 * 2 bytes = 536,870,912 bytes (512 MB).
    4. **Peak Activation Usage:** If a residual block needs 4 such feature maps in memory simultaneously, activation memory alone hits ~2 GB.
    5. **Total Footprint:** 1.5 GB (weights) + 2.0 GB (activations) + 1.0 GB (app/UI overhead) = 4.5 GB.
    **This pushes right against the OS-enforced 5 GB limit, triggering Jetsam to kill the app.**
