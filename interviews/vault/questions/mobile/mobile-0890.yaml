title: Realizing a Compound AI App with CoreML Multi-Model Orchestration on A17 Pro
scenario: An iOS developer needs to deploy a 3-model compound AI pipeline on A17 Pro (8GB, 35 TOPS ANE) using CoreML: a vision encoder (ResNet-50, 25MB), a text encoder (MobileBERT, 100MB INT8), and a generative model (GPT-2-medium, 300MB INT4). All three must run within a single app process with a total memory budget of 600MB.
question: How should CoreML load and schedule a three-model compound AI pipeline within a 600MB A17 Pro process budget?
details:
  realistic_solution: 'Sequential loading with explicit unload: (1) At app launch, load vision encoder only (25MB, fast: ~50ms from flash). Process camera input. (2) Unload vision encoder (MLModel = nil, trigger ARC dealloc). (3) Load text encoder (100MB, ~200ms). Process text. (4) Lazy load generative model on demand (300MB, ~600ms). Total at-rest: 25MB (if only vision active). Peak: 100+300=400MB during NLP+generation. With 100MB overhead: 500MB peak, within 600MB budget. CoreML tip: use MLModelConfiguration with computeUnits = .cpuAndNeuralEngine to allow ANE fallback to CPU for memory pressure situations.'
  common_mistake: |
    **The Pitfall:** Loading all three CoreML models simultaneously with `computeUnits=.all`.
    **The Rationale:** Developers assume iOS manages NPU SRAM effectively and keep all models actively loaded for simplicity.
    **The Consequence:** Competing models exhaust ANE memory and trigger OS-level evictions mid-inference, leading to unpredictable latency spikes or crashes.
  napkin_math: |
    - **Model Sizes:** 25 MB + 100 MB + 300 MB = 425 MB.
    - **Runtime Buffers:** ~75 MB peak.
    - **Total Peak Memory:** 500 MB (Fits within 600 MB budget).
    - **Load Times (NVMe at 3GB/s):** Vision (8ms), Text (33ms), Generative (100ms).
    - **Generative Throughput:** 345M parameters INT4 = 173 MB. ANE Bandwidth = 100 GB/s. Latency = 173 MB / 100 GB/s = 1.7ms/token (**~588 tok/sec**).
    - **Conclusion:** Sequential loading with explicit unloading perfectly meets the budget and performance constraints.
