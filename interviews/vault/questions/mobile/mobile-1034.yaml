title: 'Network Bandwidth Bottlenecks: Specification — Minimum BW for 10-Turn Conversation SLA'
scenario: Specify the minimum LPDDR5X memory bandwidth required for a mobile device to maintain TPOT < 40ms throughout a 10-turn conversation with a 3B INT4 LLM (each turn: 200 prompt tokens + 100 response tokens).
question: How would you derive the worst-case bandwidth requirement and compare against LPDDR5 (51.2 GB/s) vs LPDDR5X (77 GB/s)?
details:
  realistic_solution: 'Worst case: end of turn 10, decoding at context = 10×(200+100)=3000 tokens accumulated. KV/token: 524KB. KV total: 3000×524KB=1.572GB. Weight: 1.5GB. Total per decode step: 3.072GB. Required BW for TPOT < 40ms: 3.072GB / 0.040s = 76.8GB/s. LPDDR5 (51.2 GB/s): TPOT at turn 10 = 3.072/51.2=60ms > 40ms. FAILS. LPDDR5X (77 GB/s): 3.072/77=39.9ms ≈ 40ms. BARELY passes. Need 77 GB/s minimum. To have 20% headroom: 76.8/0.8=96 GB/s. Next-gen LPDDR5X-6400: ~102.4GB/s. Required for comfortable SLA.'
  common_mistake: |
    **The Pitfall:** Using the initial TPOT as the design point.
    **The Rationale:** Candidates evaluate the short context scenario but fail to compute the worst-case memory bandwidth needed at the longest context (the end of turn 10).
    **The Consequence:** The system will severely violate the 40ms SLA as the conversation progresses due to KV-cache scaling.
  napkin_math: |
    *   **Worst-case Context:** `10 turns * (200 + 100) tokens = 3000 tokens`
    *   **KV-cache total:** `3000 tokens * 524 KB/token = ~1.572 GB`
    *   **Memory per decode step:** `1.5 GB (weights) + 1.572 GB (KV) = 3.072 GB`
    *   **Target bandwidth:** `3.072 GB / 0.040s = 76.8 GB/s`
    *   **LPDDR5 Check:** `3.072 GB / 51.2 GB/s = 60ms > 40ms` (FAILS)
    *   **LPDDR5X Check:** `3.072 GB / 77 GB/s = 39.9ms < 40ms` (PASSES)
    *   **Result:** **76.8 GB/s is required, making LPDDR5X barely sufficient.**
