title: On-Device LLM Memory Architecture for Snapdragon 8 Gen 3
scenario: You need to architect an on-device text generation system using a 7-billion parameter language model for a flagship smartphone featuring the Qualcomm Hexagon NPU (Snapdragon 8 Gen 3). The device has 16 GB of shared LPDDR5X memory, but the OS and background apps strictly reserve 8 GB.
question: How would you design the memory allocation, quantization strategy, and execution pipeline to safely deploy this model while maximizing the 45 TOPS INT8 compute available on the NPU?
details:
  realistic_solution: The optimal architecture mandates quantizing the 7B model to 4-bit weights to fit within the strict 8 GB available RAM budget, including the KV cache. The design must offload the heavy matrix multiplication workloads to the Hexagon NPU to utilize its 45 TOPS INT8 engine using dynamic quantization or W4A8 execution, while orchestrating the CPU to handle non-quantizable operations.
  common_mistake: |
    **The Pitfall:** Overlooking the shared nature of the 16 GB LPDDR5X memory and assuming it is dedicated VRAM.
    **The Rationale:** Architects familiar with discrete GPUs apply the same mental model to mobile SoCs.
    **The Consequence:** Designs cause OS out-of-memory application kills, and fail to align quantization with the Hexagon NPU's specific INT8 acceleration.
  napkin_math: |
    - **FP16 Baseline:** 7B × 2 bytes = 14 GB (Exceeds 8 GB budget).
    - **INT4 Quantized Weights:** 7B × 0.5 bytes = **3.5 GB**.
    - **KV Cache Size:** Assuming 1024 context at FP16 = **~0.5 GB**.
    - **Total Memory Footprint:** 3.5 GB + 0.5 GB = **4.0 GB**.
    - **Conclusion:** Fits safely within the 8 GB available budget.
