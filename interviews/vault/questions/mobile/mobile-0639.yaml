title: The Federated Learning Device Heterogeneity
scenario: 'You''re running federated learning across 10,000 Android devices to train a next-word prediction
  model. Each round, the server selects 100 devices to train locally for 5 epochs and upload gradients.
  The round consistently fails — only 30-40 devices complete in the 10-minute window. Your fleet includes:
  Snapdragon 8 Gen 3 flagships (20%), Snapdragon 7 Gen 1 mid-range (35%), MediaTek Dimensity 700 budget
  (30%), and Samsung Exynos 1380 budget (15%). Why does device heterogeneity break federated learning,
  and how do you fix the round completion rate?'
question: "Why does device heterogeneity break federated learning, and how do you fix the round completion rate?"
details:
  realistic_solution: 'The round fails because of the **straggler problem** — the round completes only
    when all 100 selected devices finish. The slowest device determines round latency. Training time varies
    8x across the fleet: flagship 1.7 min, mid-range 6.7 min, budget 13.3 min. Upload at 5 Mbps for 200
    MB gradients: 5.3 min. Total for budget devices: 18.6 min >> 10-min window. Fix with a multi-pronged
    approach: (1) **Tiered cohorts**: group devices by capability. Train flagships with full model, mid-range
    with 50% fewer local epochs, exclude budget devices or give them a distilled sub-model. (2) **Gradient
    compression**: top-k sparsification (keep top 1%) reduces upload from 200 MB to 2 MB. Upload time:
    3.2s instead of 5.3 min. (3) **Asynchronous aggregation**: don''t wait for all 100. Set a quorum of
    70 devices — aggregate once 70 respond within 10 min. Stragglers'' updates are discarded or applied
    to the next round. (4) **Overbooking**: select 150 devices, use first 100 to respond. With these fixes,
    round completion rate jumps from 30-40% to 95%+. Convergence quality: async aggregation with 70/100
    quorum matches synchronous within 1.2x more rounds, but each round completes reliably.'
  common_mistake: '"Select only flagship devices for training — they''re fast enough." This introduces
    selection bias: flagship users have different typing patterns (more affluent, different demographics)
    than budget phone users. The model learns a biased distribution.'
  napkin_math: 'Round budget: 10 minutes. Training time: flagship 1.7 min, mid-range 6.7 min, budget 13.3
    min. Upload (200 MB, 5 Mbps): 5.3 min. Total: flagship 7 min ✓, mid-range 12 min ✗, budget 18.6 min
    ✗. With tiered training + gradient compression: flagship 1.7 + 0.05 = **1.75 min**. Mid-range: 4 +
    0.05 = **4.05 min**. Budget: 2.7 + 0.05 = **2.75 min**. All under 10 minutes. Round completion: **95%+**.
    Over-selection (150 → 100): expected wait for 100th device ≈ P95 of device completion time ≈ **5 min**.
    Rounds complete reliably.'
