title: The Federated Learning Device Heterogeneity
scenario: 'You''re running federated learning across 10,000 Android devices to train a next-word prediction model. Each round, the server selects 100 devices to train locally for 5 epochs and upload gradients. The round consistently fails — only 30-40 devices complete in the 10-minute window. Your fleet includes: Snapdragon 8 Gen 3 flagships (20%), Snapdragon 7 Gen 1 mid-range (35%), MediaTek Dimensity 700 budget (30%), and Samsung Exynos 1380 budget (15%).'
question: "Why does device heterogeneity break federated learning, and how do you fix the round completion rate?"
details:
  realistic_solution: 'The round fails because of the **straggler problem** — the round completes only when all 100 selected devices finish. The slowest device determines round latency. Training time varies 8x across the fleet: flagship 1.7 min, mid-range 6.7 min, budget 13.3 min. Upload at 5 Mbps for 200 MB gradients: 5.3 min. Total for budget devices: 18.6 min >> 10-min window. Fix with a multi-pronged approach: (1) **Tiered cohorts**: group devices by capability. Train flagships with full model, mid-range with 50% fewer local epochs, exclude budget devices or give them a distilled sub-model. (2) **Gradient compression**: top-k sparsification (keep top 1%) reduces upload from 200 MB to 2 MB. Upload time: 3.2s instead of 5.3 min. (3) **Asynchronous aggregation**: don''t wait for all 100. Set a quorum of 70 devices — aggregate once 70 respond within 10 min. Stragglers'' updates are discarded or applied to the next round. (4) **Overbooking**: select 150 devices, use first 100 to respond. With these fixes, round completion rate jumps from 30-40% to 95%+. Convergence quality: async aggregation with 70/100 quorum matches synchronous within 1.2x more rounds, but each round completes reliably.'
  common_mistake: |
    **The Pitfall:** Selecting only flagship devices for training to meet the deadline.
    **The Rationale:** Candidates optimize purely for round latency without considering the statistical distribution of the fleet.
    **The Consequence:** Introducing severe selection bias where the model only learns the typing patterns of affluent flagship users.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Round Budget: 10 minutes.
       - Original Training Time: Flagship (1.7 min), Mid-range (6.7 min), Budget (13.3 min).
       - Original Upload: 200 MB at 5 Mbps = 5.3 min.
    2. **Calculations:**
       - Unoptimized Budget Total Time: 13.3 min + 5.3 min = 18.6 min (> 10 min, FAILS).
       - Optimization: 50% fewer epochs for Mid-range (~3.35 min), Distilled sub-model for Budget (~2.7 min).
       - Gradient Compression: Top-1% sparsity reduces upload to 2 MB. New upload time = 3.2s (~0.05 min).
       - Optimized Total Times: Flagship (1.75 min), Mid-range (3.4 min), Budget (2.75 min).
    3. **Conclusion & Interpretation:**
       - **Result: I/O and Compute Bound (Mitigated)**
       - All devices now easily complete within the 10-minute window, raising the completion rate to 95%+.
