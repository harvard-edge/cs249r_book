title: 'Optimizing a Transformer Model on Snapdragon Hexagon NPU'
scenario: 'A large language model based on a transformer architecture is deployed on a mobile device equipped with a Hexagon NPU (45 TOPS INT8, 64 GB/s LPDDR5X bandwidth). Despite quantization to INT8, inference latency is consistently higher than the target 100ms per query. You suspect a bottleneck within the NPU''s compute, memory, or I/O subsystem using available profiling tools.'
question: 'How would you diagnose and optimize a transformer model bottleneck on a mobile NPU to reach the 100ms latency target?'
details:
  realistic_solution: 'Utilize Qualcomm''s Hexagon SDK profiling tools (e.g., Hexagon NN Direct Profiler, System Trace, HVX profiler) to analyze execution times of individual layers, memory access patterns, and data transfers between host CPU and NPU. Prioritize identifying if the bottleneck is compute-bound (e.g., inefficient matrix multiplications, underutilization of vector extensions like HVX), memory-bound (e.g., excessive data transfers, poor cache utilization), or I/O-bound (e.g., slow data loading from main memory). Subsequently, explore kernel optimization (e.g., custom HVX kernels), data layout changes, or model architecture adjustments (e.g., pruning, distillation) based on the identified bottleneck. For memory, investigate if LPDDR5X bandwidth is saturated during peak data transfers and optimize data locality.'
  common_mistake: |
    **The Pitfall:** Focusing solely on FLOPs/MACs and overlooking memory bandwidth or NPU-specific architectural quirks.
    **The Rationale:** Engineers are used to server-side optimization where compute is the primary bottleneck, and fail to realize mobile performance is overwhelmingly dictated by data movement.
    **The Consequence:** Optimization efforts are wasted on compute kernels while the system remains heavily memory-bound, failing to reach the 100ms latency target.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hexagon NPU: 45 TOPS INT8 compute. Memory: 64 GB/s LPDDR5X bandwidth.
    - Target latency: 100ms per query. Total data movement is ~20GB per inference.

    **Calculations:**
    - Compute limit (100ms): 45 TOPS x 0.1s = 4.5 trillion operations.
    - Memory limit (100ms): 64 GB/s x 0.1s = 6.4 GB of data movement.
    - Actual memory time (20GB): 20 GB / 64 GB/s = 312.5ms.

    **Conclusion & Interpretation:**
    - **Result: 312.5ms (Memory-Bound)**. If data movement exceeds 6.4 GB per inference (e.g., 20GB takes 312.5ms), the model is strictly memory-bound and will systematically miss the 100ms budget.
