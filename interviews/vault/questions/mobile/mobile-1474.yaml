title: Hexagon NPU Capacity for Drift Detection
scenario: You are deploying a real-time object detection model on the Snapdragon 8 Gen 3 Hexagon NPU. You plan to calculate Population Stability Index (PSI) on-device by caching INT8 activations.
question: What Hexagon NPU compute and shared-memory capacities are critical constraints for background drift detection?
details:
  realistic_solution: 'The correct answer retrieves the exact hardware specifications:
    the Snapdragon 8 Gen 3 Hexagon NPU is rated for 45 TOPS of INT8 compute, and it
    utilizes a heterogeneous architecture with a shared pool of 12-16 GB LPDDR5X memory.
    Understanding these constraints is critical because caching activations for drift
    detection directly impacts the shared memory available for primary inference.'
  common_mistake: |
    **The Pitfall:** Confusing dedicated VRAM with shared SoC memory.
    **The Rationale:** Candidates state generic mobile compute specs or assume the NPU has isolated memory unaffected by background caching.
    **The Consequence:** Designing a background drift detection system that unexpectedly starves the OS and GPU of memory bandwidth, causing system-wide lag.
  napkin_math: |
    - **Total Compute:** 45 TOPS (INT8).
    - **Available Compute:** 45 TOPS - 30 TOPS (primary model) = 15 TOPS for PSI.
    - **Total Shared Memory:** 12-16 GB LPDDR5X.
    - **Available Memory:** 16 GB - 2 GB (caching) = 14 GB for OS, GPU, and inference.
    - **Result:** The system operates within a **45 TOPS compute** and **16 GB shared memory** limit.
