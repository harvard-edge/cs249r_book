title: A17 Pro Neural Engine vs GPU for Real-Time Video
scenario: You are designing the inference pipeline for a real-time semantic segmentation
  model running on an iPhone 15 Pro. You must choose between executing the model on
  the GPU or the 16-core Apple A17 Pro Neural Engine. The Neural Engine provides 35
  TOPS at roughly 5W, sharing the 8 GB unified memory with the CPU and GPU. The model
  uses custom operations that are well-supported on the GPU but require CPU fallback
  if assigned to the Neural Engine. Which accelerator do you choose and how do you
  evaluate the system-level tradeoffs?
question: Should an iPhone 15 Pro segmentation model with GPU-supported custom ops
  run on GPU or A17 Pro Neural Engine?
details:
  realistic_solution: A strong L5 candidate evaluates the end-to-end pipeline rather
    than peak TOPS. Because the 8 GB unified memory is shared, frequent context switching
    between the Neural Engine and CPU for unsupported ops causes severe memory bandwidth
    contention and latency spikes. The correct approach is to either modify the model
    architecture to use NPU-compatible operations entirely, or execute the entire
    model on the GPU to keep the execution completely on-device without CPU synchronization
    overhead.
  common_mistake: Candidates often default to the Neural Engine purely based on its
    35 TOPS peak performance and ~5W power consumption. They fail to account for the
    latency and memory bandwidth overhead caused by CPU fallback for unsupported operations.
  napkin_math: Assume the model requires 105 Giga-Operations (GOPs). The 16-core Neural
    Engine theoretically processes this in 105 GOPs / 35 TOPS = 3.0 ms. However, if
    5% of operations fallback to the CPU, adding 15 ms of CPU compute and 4 ms of
    context-switching overhead, the total NPU path takes 3.0 + 15 + 4 = 22.0 ms. If
    the GPU can process the full 105 GOPs natively at a sustained 10.5 TOPS, the GPU
    path takes 105 GOPs / 10.5 TOPS = 10.0 ms, making it over 2x faster end-to-end
    despite the NPU's higher peak theoretical compute.
