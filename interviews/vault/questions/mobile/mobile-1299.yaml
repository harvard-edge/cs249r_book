title: A17 Pro Neural Engine vs GPU for Real-Time Video
scenario: You are designing the inference pipeline for a real-time semantic segmentation model running on an iPhone 15 Pro. The 16-core Apple A17 Pro Neural Engine provides 35 TOPS at roughly 5W, sharing the 8 GB unified memory with the CPU and GPU. The model uses custom operations that are well-supported on the GPU but require CPU fallback if assigned to the Neural Engine.
question: Should an iPhone 15 Pro segmentation model with GPU-supported custom ops run on the GPU or A17 Pro Neural Engine?
details:
  realistic_solution: A strong L5 candidate evaluates the end-to-end pipeline rather than peak TOPS. Because the 8 GB unified memory is shared, frequent context switching between the Neural Engine and CPU for unsupported ops causes severe memory bandwidth contention and latency spikes. The correct approach is to either modify the model architecture to use NPU-compatible operations entirely, or execute the entire model on the GPU to keep the execution completely on-device without CPU synchronization overhead.
  common_mistake: |
    **The Pitfall:** Defaulting to the NPU purely based on peak theoretical TOPS.
    **The Rationale:** Candidates often ignore the severe latency and memory bandwidth overhead caused by context switching between the NPU and CPU for unsupported operations.
    **The Consequence:** Deploying a pipeline that is slower end-to-end despite running on a 'faster' accelerator.
  napkin_math: |
    1. **NPU Path:** Assume model is 105 GOPs. NPU compute time = 105 GOPs / 35 TOPS = 3.0 ms. Add 15 ms CPU fallback compute + 4 ms context-switch overhead = 22.0 ms total.
    2. **GPU Path:** GPU natively runs 105 GOPs at sustained 10.5 TOPS = 10.0 ms total.
    3. **Conclusion:** **The GPU path is over 2x faster end-to-end because it avoids CPU synchronization overhead.**
