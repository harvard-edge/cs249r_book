title: On-Device Data Quality Gates for LLMs
scenario: You are tasked with designing the data quality and validation pipeline for an on-device smart keyboard running on the Google Tensor G3. The keyboard uses the optimized on-device Gemini Nano LLM to suggest full-sentence replies. The Tensor G3 features 12 GB LPDDR5X RAM and a TPU capable of 7.5 TOPS.
question: How would you design quality gates to filter out random pocket-dials, PII, and gibberish without degrading device performance?
details:
  realistic_solution: Design a multi-tiered, cascading validation pipeline. The first tier should use lightweight, zero-allocation heuristics (regex, character frequency tracking) written in C++/Rust to instantly drop gibberish with negligible memory overhead. The second tier for PII or complex anomaly detection should utilize a highly quantized (INT4) micro-model or a Bloom filter. This ensures the validation logic consumes minimal RAM, allowing the main Gemini Nano model to remain resident in memory without triggering OS-level app evictions.
  common_mistake: |
    **The Pitfall:** Proposing heavy, server-style data validation frameworks or secondary deep learning models.
    **The Rationale:** Candidates fail to account for the shared memory environment of mobile devices and the latency cost of context-switching between complex validation logic and the main LLM.
    **The Consequence:** The validation pipeline consumes excessive RAM and triggers OS-level app evictions, ruining the user experience.
  napkin_math: |
    1. **Memory Budget:** Out of 12GB RAM, OS takes ~4GB, Gemini Nano takes ~3GB. App budget for validation is tight (e.g., 200 MB).
    2. **Micro-Model Size:** A 5M parameter INT4 anomaly detection model requires only 5M * 0.5 bytes = 2.5 MB of RAM.
    3. **Compute Latency:** Executing this 2.5 MB model for 128 tokens requires ~1.28 Mega-operations.
    4. **Performance Impact:** On a 7.5 TOPS TPU, 1.28 Mega-operations takes **< 1 millisecond**, adding zero noticeable latency.
