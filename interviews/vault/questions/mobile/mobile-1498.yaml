title: On-Device Data Quality Gates for LLMs
scenario: You are tasked with designing the data quality and validation pipeline for
  an on-device smart keyboard running on the Google Tensor G3. The keyboard uses the
  optimized on-device Gemini Nano LLM to suggest full-sentence replies. Before feeding
  user keystroke sequences to the LLM, you must define data contracts and design quality
  gates to filter out random pocket-dials, PII, and gibberish. The Tensor G3 features
  12 GB LPDDR5X RAM and a TPU capable of 7.5 TOPS. Analyze the interactions between
  the validation pipeline, the LLM, and the hardware constraints to specify a system
  that ensures high-quality input without degrading device performance.
question: How would you analyze the interactions between the validation pipeline,
  the LLM, and the hardware constraints to specify a system that ensures high-quality
  input without degrading device performance?
details:
  realistic_solution: Design a multi-tiered, cascading validation pipeline. The first
    tier should use lightweight, zero-allocation heuristics (regex, character frequency
    tracking) written in C++/Rust to instantly drop gibberish with negligible memory
    overhead. The second tier for PII or complex anomaly detection should utilize
    a highly quantized (INT4) micro-model or a Bloom filter. This ensures the validation
    logic consumes minimal RAM, allowing the main Gemini Nano model to remain resident
    in memory without triggering OS-level app evictions.
  common_mistake: Candidates often propose heavy, server-style data validation frameworks
    (like Great Expectations) or suggest running a secondary deep learning model just
    for anomaly detection. They fail to account for the shared memory environment
    of mobile devices and the latency cost of context-switching between the validation
    logic and the main LLM.
  napkin_math: The Tensor G3 has 12 GB of LPDDR5X RAM. The OS consumes ~4 GB, and
    Gemini Nano requires ~2-3 GB, leaving ~5 GB for all other active and background
    apps. A strict memory budget for the keyboard app might be 200 MB. If we use a
    5-million parameter INT4 model for anomaly detection, it requires just 2.5 MB
    of RAM (5M * 0.5 bytes). Given the TPU's 7.5 TOPS capability, executing a 2.5
    MB model for a 128-token input requires roughly 1.28 Mega-operations, which takes
    less than 1 millisecond on the TPU, adding zero noticeable latency while protecting
    the LLM from processing garbage data.
