title: Sizing an LLM for Exynos 2400 NPU Deployment
scenario: You are tasked with deploying a locally-running 7B parameter foundation model for on-device summarization on a device powered by the Samsung Exynos 2400. The platform features a dual-core NPU delivering 34.7 TOPS and shares a total of 12 GB of LPDDR5X RAM with the CPU, GPU, and ISP.
question: How should a 7B LLM be sized for Exynos 2400 using quantization and KV-cache budgeting?
details:
  realistic_solution: A realistic approach assumes only 4-6 GB of the 12 GB RAM is safely allocatable to the NPU for this task. To fit a 7B model, aggressive quantization like INT4 or a mixed-precision strategy is mandatory. The candidate should evaluate weight-only INT4 quantization to reduce the footprint to ~3.5 GB, leaving 1-2 GB for the KV cache and runtime workspace. They must also recognize that while the NPU's 34.7 TOPS provides ample compute for generation, the shared LPDDR5X memory bandwidth will dictate the actual token generation rate.
  common_mistake: |
    **The Pitfall:** Assuming full access to the 12 GB RAM and calculating latency based purely on NPU TOPS.
    **The Rationale:** Candidates often forget that LPDDR5X memory is shared with the OS, background apps, CPU, GPU, and ISP, and that LLM inference on mobile is typically memory-bandwidth bound, not compute bound.
    **The Consequence:** Recommending a model size that triggers OOM errors or overestimating generation speed by orders of magnitude.
  napkin_math: |
    - **FP16 baseline:** 7B parameters * 2 bytes = 14 GB (exceeds 12 GB system total).
    - **INT4 quantization:** 7B parameters * 0.5 bytes = 3.5 GB for weights.
    - **KV cache & activations:** ~1.5 GB.
    - **Total NPU footprint:** 3.5 GB + 1.5 GB = 5.0 GB (fits realistic 6 GB budget).
    - **Performance estimation (memory-bound):** Typical LPDDR5X bandwidth is ~60 GB/s.
    - **Tokens per second:** 60 GB/s / 3.5 GB/token = **~17 tokens per second**.
