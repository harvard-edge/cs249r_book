title: Camera App Transition OOM on Exynos 2400
scenario: Your team deployed a real-time video segmentation model on a device powered by the Samsung Exynos 2400. Although the dual-core NPU easily handles the compute with its 34.7 TOPS, users report sudden app crashes (OOM) specifically when switching back and forth between the native camera app and your application.
question: Why does switching between the camera app and an Exynos 2400 segmentation app cause OOM despite the device having 12 GB of shared LPDDR5X memory?
details:
  realistic_solution: The root cause is OS-level memory eviction triggered by the Image Signal Processor (ISP) and memory fragmentation. When the camera app is active, the ISP aggressively allocates large, contiguous memory buffers from the shared 12 GB LPDDR5X pool for high-resolution processing. This creates severe memory pressure, causing the Android Low Memory Killer Daemon (LMKD) to evict your app. The solution involves pre-allocating a fixed, contiguous memory pool for NPU activations at startup to avoid runtime fragmentation failures.
  common_mistake: |
    **The Pitfall:** Assuming the app has a standard memory leak or reducing model size.
    **The Rationale:** Candidates fail to recognize the unified memory architecture where the Image Signal Processor (ISP) aggressively fragments the physical RAM pool.
    **The Consequence:** Standard memory optimizations fail because the true issue is a lack of contiguous memory blocks, not total available bytes.
  napkin_math: |
    1. **Memory Pool:** Total Shared LPDDR5X = 12.0 GB.
    2. **Usage Breakdown:** OS + Background = ~4.0 GB. Active Camera (ISP + GPU) = ~5.5 GB.
    3. **Remaining RAM:** 12.0 - 9.5 = ~2.5 GB free.
    4. **Fragmentation Failure:** The model requires 1.8 GB of *contiguous* memory for activations. The ISP fragments the 2.5 GB, causing allocation to fail and triggering the Low Memory Killer (**LMKD**).
