title: The Quantization Slowdown Paradox
scenario: Your team is optimizing a new generative text model for an on-device summarization feature. To reduce memory and accelerate inference, you apply post-training INT8 quantization using CoreML/TFLite. A microbenchmark running only the core model shows a 2x speedup per token. However, when integrated into the app, the total time to generate a 100-token summary is now 50% slower than the original FP16 model.
question: How would you evaluate the potential causes of this system-level slowdown, despite the core operation getting faster?
details:
  realistic_solution: The most likely cause is a 'Delegation Mismatch' or 'Graph-Splitting Overhead.' The NPU can only execute operations it supports. If the model contains unsupported ops, the execution graph is split. The system must copy intermediate activation tensors to the CPU to run the unsupported op, then back to the NPU. This CPU-NPU round trip involves driver calls, memory copies, and context switching, easily overwhelming the INT8 compute speedup.
  common_mistake: |
    **The Pitfall:** Focusing solely on the compute speedup of the quantized operations.
    **The Rationale:** Assuming the whole model benefits equally and blaming 'Python overhead' or 'the OS scheduler'.
    **The Consequence:** Missing the massive overhead from NPU-CPU graph splitting and memory copies.
  napkin_math: |
    - Original FP16 compute: 12 ms/token (all on GPU).
    - INT8 compute: 8 ms/token (NPU) + 0 ms (CPU triggers).
    - Graph splitting overhead: 4 memory copies per token (2 NPU->CPU, 2 CPU->NPU).
    - Copy time: 4 copies * 2.5 ms/copy = 10 ms transfer time.
    - Total INT8 latency: 8 ms compute + 10 ms transfer = 18 ms/token.
    - **18 ms is exactly 50% slower than the original 12 ms/token.**
