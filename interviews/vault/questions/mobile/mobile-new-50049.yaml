title: Unified Model Versioning for Multi-Platform Mobile Deployment
scenario: Your mobile ML team maintains 12 models across iOS (CoreML) and Android (TFLite). Each model
  has 3 variants (quality tiers). Model updates happen monthly. With 12 x 3 x 2 = 72 model files, version
  drift and compatibility bugs are your top operational issue. Design a model management system for portable
  mobile deployment.
details:
  realistic_solution: 'Build a model registry with automated conversion pipeline: (1) Source of truth:
    PyTorch checkpoints in a central model registry (MLflow/W&B) with version tags. (2) Conversion pipeline
    (CI/CD): each version automatically exports to ONNX, CoreML, and TFLite, with per-tier quantization
    (high=FP16, medium=INT8, low=INT4). (3) Validation gate: automated golden-input tests compare outputs
    across all formats, rejecting any conversion with >1% accuracy deviation. (4) Deployment: models are
    served from a CDN with a manifest file per app version specifying compatible model versions. (5) Monitoring:
    on-device telemetry reports model version, platform, and inference quality metrics. Total artifacts:
    still 72, but fully automated and validated.'
  common_mistake: Managing model files manually with naming conventions (model_v2_ios_high.mlmodel). This
    does not scale and provides no validation that iOS and Android variants of the same model produce
    equivalent outputs.
  napkin_math: 'Manual process: 72 models x 30min per conversion/validation = 36 hours per monthly release.
    Automated pipeline: 72 models x 5min CI = 6 hours compute (parallelized to 1 hour wall time). Engineer
    time: 1 hour review vs 36 hours manual. 36x efficiency gain.'
