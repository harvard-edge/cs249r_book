title: 'Architecting a Sub-4-bit LLM Pipeline for Samsung Exynos 2400'
scenario: 'Your team is deploying a 7B parameter generative model on a mobile NPU. The device has 12 GB of LPDDR5X memory, but only 4 GB is strictly available for your application. You must architect an extreme quantization strategy to fit the model and KV cache in memory while preserving conversational accuracy.'
question: 'How would you evaluate the design choices between techniques like GPTQ and AWQ, considering the NPU''s hardware execution profile?'
details:
  realistic_solution: 'A robust design leverages AWQ to aggressively quantize 99% of weights to 3-bit while keeping 1% of salient weight channels in FP16/INT8 to preserve accuracy. Store 3-bit weights in shared memory to minimize footprint, dynamically decompressing to INT8 in NPU SRAM during matrix multiplication.'
  common_mistake: |
    **The Pitfall:** Proposing pure 2-bit or 3-bit weight-only quantization without budgeting for KV cache.
    **The Rationale:** Candidates focus purely on squeezing the weights into memory, forgetting that KV cache also requires significant RAM during generation.
    **The Consequence:** The model loads, but fails instantly with an OOM error upon receiving its first conversational prompt.
  napkin_math: |
    **Assumptions & Constraints:**
    - Available Memory: 4.0 GB.
    - Model: 7B parameters, 3.2-bit average quantization.

    **Calculations:**
    - Quantized Weights: 7B * (3.2 / 8) bytes = 2.8 GB.
    - Remaining Memory: 4.0 GB - 2.8 GB = 1.2 GB.

    **Conclusion & Interpretation:**
    - **Result: 1.2 GB (Memory-Bound)**. 1.2 GB is safely preserved for the KV cache and activations.
