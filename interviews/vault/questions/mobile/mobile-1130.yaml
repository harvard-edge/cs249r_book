title: Architecting a Sub-4-bit LLM Pipeline for Samsung Exynos 2400
scenario: Your team is deploying a 7B parameter generative model on the Samsung Exynos
  2400 NPU, which features 34.7 TOPS and a dual-core architecture. The device has
  12 GB of LPDDR5X memory, but because it is shared with the CPU, GPU, and ISP, only
  4 GB is strictly available for your application. You must architect an extreme quantization
  strategy using sub-4-bit techniques to fit the model and KV cache in memory while
  preserving conversational accuracy. Evaluate the design choices between techniques
  like GPTQ and AWQ, considering the NPU's hardware execution profile.
question: How would you evaluate the design choices between techniques like GPTQ and
  AWQ, considering the NPU's hardware execution profile?
details:
  realistic_solution: A robust design leverages AWQ to aggressively quantize 99% of
    weights to 3-bit while keeping 1% of salient weight channels in FP16/INT8 to preserve
    accuracy. To execute on the Exynos 2400, the 3-bit weights are stored in the shared
    LPDDR5X memory to minimize bandwidth and footprint, then dynamically decompressed
    to INT8 or FP16 in the NPU's fast SRAM prior to matrix multiplication. This maximizes
    the 34.7 TOPS dual-core NPU compute while strictly adhering to the severe system-level
    memory constraints.
  common_mistake: Candidates often propose pure 2-bit or 3-bit weight-only quantization
    without accounting for the Exynos NPU's lack of native sub-4-bit arithmetic support.
    They also frequently fail to budget memory for the KV cache, focusing entirely
    on compressing the model weights into the 4 GB limit.
  napkin_math: 'Available memory: 4 GB (from 12 GB shared LPDDR5X). 7B model at 16-bit
    = 14 GB. Quantizing weights to 3.2-bit average (mixed precision): 7B * 3.2 bits
    / 8 bits/byte = 2.8 GB. Remaining memory for KV cache and activations: 4.0 GB
    - 2.8 GB = 1.2 GB. Peak NPU utilization is compute-bound at 34.7 TOPS during prefill,
    but decoding is memory-bandwidth bound, making the 2.8 GB compressed footprint
    critical for system viability.'
