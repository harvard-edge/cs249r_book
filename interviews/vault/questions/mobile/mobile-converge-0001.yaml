title: Mobile Training Chunk Size
scenario: A mobile personalization job needs 18 minutes total training time. The scheduler can run only 90-second background chunks before yielding to foreground use. Estimate the number of chunks required.
question: How many 90-second background chunks are needed for an 18-minute mobile personalization job?
details:
  realistic_solution: Eighteen minutes is 1,080 seconds. At 90 seconds per chunk, the job needs 12 chunks. The app should checkpoint between chunks so foreground interruptions lose at most one chunk.
  common_mistake: Starting one long training task and getting killed by the mobile OS before progress is saved.
  napkin_math: 18 min = 1,080 s. 1,080 / 90 = 12 chunks.
