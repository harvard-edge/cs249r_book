title: Diagnosing TPU Thermal Throttling on Tensor G3
scenario: Your team is deploying a continuous real-time summarization feature using Gemini Nano on the Google Tensor G3. During user testing, the first few summaries process smoothly, but after 5 minutes of continuous on-device inference, the processing time suddenly spikes by 3x. The Tensor G3 features an on-device TPU capable of 7.5 TOPS and 12 GB LPDDR5X memory.
question: Why does Tensor G3 Gemini Nano summarization slow down 3x after 5 minutes of continuous inference?
details:
  realistic_solution: The root cause is thermal throttling of the on-device TPU. While the Tensor G3 can hit 7.5 TOPS during short burst workloads, continuous LLM inference generates significant heat, prompting the OS thermal management to downclock the TPU to maintain safe ambient device temperatures. The correct diagnostic approach is to profile the SoC thermal sensors and TPU clock frequencies simultaneously to confirm the direct correlation between temperature thresholds being crossed and TPU frequency drops.
  common_mistake: |
    **The Pitfall:** Misdiagnosing the symptom as a memory leak or an unexpected I/O bottleneck.
    **The Rationale:** Candidates fail to recognize the physical differences between burst and sustained performance under strict mobile thermal constraints.
    **The Consequence:** They waste weeks investigating software bugs or aggressively quantizing, when the issue is fundamentally thermal.
  napkin_math: |
    - 1 summary = 15 tera-operations (TOPs).
    - Burst compute = 7.5 TOPS. Time = 15 / 7.5 = 2.0 seconds.
    - Throttled compute (e.g. 66% drop) = 2.5 TOPS.
    - Throttled time = 15 / 2.5 = 6.0 seconds.
    - **This perfectly explains the 3x spike (2s to 6s) in processing time.**
