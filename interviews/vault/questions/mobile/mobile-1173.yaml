title: Diagnosing TPU Thermal Throttling on Tensor G3
scenario: Your team is deploying a continuous real-time summarization feature using a local LLM on a flagship mobile device. During user testing, the first few summaries process smoothly, but after 5 minutes of continuous on-device inference, the processing time suddenly spikes by 3x.
question: Why does on-device LLM summarization slow down 3x after 5 minutes of continuous inference?
details:
  realistic_solution: 'The root cause is thermal throttling of the on-device TPU. While mobile SoCs can hit high peak TOPS during short burst workloads, continuous LLM inference generates significant heat, prompting the OS thermal management to downclock the NPU to maintain safe ambient device temperatures. The correct diagnostic approach is to profile the SoC thermal sensors and NPU clock frequencies simultaneously using tools like `nsys` or platform equivalents to confirm the direct correlation between temperature thresholds being crossed and frequency drops.'
  common_mistake: |
    **The Pitfall:** Misdiagnosing the symptom as a memory leak or an unexpected I/O bottleneck.
    **The Rationale:** Candidates fail to recognize the physical differences between burst and sustained performance under strict mobile thermal constraints.
    **The Consequence:** They waste weeks investigating software bugs or aggressively quantizing, when the issue is fundamentally thermal.
  napkin_math: |
    **Assumptions & Constraints:**
    - 1 summary = 15 tera-operations (TOPs).
    - Burst compute limit = 7.5 TOPS.
    - Throttled compute limit (e.g. 66% drop) = 2.5 TOPS.

    **Calculations:**
    - Burst processing time = 15 TOPS / 7.5 TOPS = 2.0 seconds.
    - Throttled processing time = 15 TOPS / 2.5 TOPS = 6.0 seconds.

    **Conclusion & Interpretation:**
    - **Result: 3x spike in processing time (Thermally-bound performance degradation)**. This perfectly explains the increase from 2s to 6s.
