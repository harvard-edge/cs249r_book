title: The Camera VSync Deadlock
scenario: Your mobile app captures camera frames, runs ML inference, and draws the bounding box to the screen. The screen refreshes at 60Hz (16.6ms). The ML model takes 12ms. The camera outputs frames at 60 FPS (16.6ms). Logically, you have 4.6ms of headroom per frame. However, the app consistently drops every other frame, running at a jittery 30 FPS.
question: "Why does a 12ms ML stage with 4.6ms of headroom still drop a 60Hz camera pipeline to 30 FPS?"
details:
  realistic_solution: 'Pipeline phase-misaligned with VSync. Camera arrives at offset 5ms. ML (12ms) completes at 17ms — 0.4ms past the 16.6ms VSync. Compositor waits until next VSync at 33.3ms = 30 FPS. Fix: decouple into async stages with ring buffers. Camera, ML, and render run independently. Render always composites the latest available result at VSync, regardless of ML timing. The 4.6ms margin becomes real when stages are decoupled.'
  common_mistake: |
    **The Pitfall:** "The phone is thermal throttling."
    **The Rationale:** Candidates assume performance drops are always due to heat, ignoring explicit latency metrics.
    **The Consequence:** Failing to diagnose a classic pipeline synchronization bug and fruitlessly trying to optimize an already-fast 12ms model.
  napkin_math: |
    **Assumptions & Constraints:**
    - Screen VSync interval = 16.6 ms (60 Hz).
    - ML Inference = 12.0 ms.

    **Calculations:**
    - If the camera frame arrives at an offset of 5.0 ms:
    - Frame ready to render = 5.0 ms + 12.0 ms = 17.0 ms.
    - 17.0 ms > 16.6 ms (missed the first VSync).
    - The Compositor must wait for the next VSync at 33.3 ms.
    - Throughput = 1000 ms / 33.3 ms = 30 FPS.

    **Conclusion & Interpretation:**
    - **Result: 30 FPS (Latency-Bound)**. Decoupling the stages with ring buffers ensures the render thread always hits the 16.6 ms deadline with the latest async ML result.
