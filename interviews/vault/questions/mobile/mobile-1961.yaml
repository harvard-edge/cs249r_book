title: Random Read Memory Bottleneck
scenario: Apple A17 Pro reads 8-byte values randomly from a 1GB embedding table. L2
  cache is 16MB. Hit rate is 10%. L2 bandwidth is 500GB/s, DRAM is 50GB/s.
question: Evaluate the effective memory bandwidth given the cache miss penalty.
visual:
  kind: svg
  path: mobile-1961.svg
  alt: Bar chart showing L2 BW, DRAM BW, and the resulting Effective BW being near
    DRAM
  caption: Effective Bandwidth Degradation
details:
  realistic_solution: Effective bandwidth = 1 / ( (hit_rate / L2_bw) + (miss_rate
    / DRAM_bw) ) = 1 / ( (0.1 / 500) + (0.9 / 50) ) = 1 / (0.0002 + 0.018) = 54.9
    GB/s. Performance collapses to DRAM speeds.
  common_mistake: Simply averaging the bandwidths (e.g., 0.1*500 + 0.9*50 = 95 GB/s),
    which violates Amdahl's Law for latency.
  napkin_math: 1 / 0.0182 = 54.9 GB/s.
