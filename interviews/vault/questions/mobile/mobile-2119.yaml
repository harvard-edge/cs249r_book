title: PagedAttention Fragmentation on Mobile
scenario: An iPhone 15 Pro (A17 Pro Neural Engine) runs a local 3B parameter assistant
  (24 layers, 16 KV heads, 128 head dim). The OS implements PagedAttention using 128-token
  pages, but user interaction is bursty, generating only 15 tokens per prompt.
question: Calculate the FP16 KV cache size per page, and analyze the memory fragmentation
  overhead introduced by the 128-token allocation strategy during a typical 15-token
  generation.
details:
  realistic_solution: KV cache per token is 2 (K+V) * 24 layers * 16 heads * 128 dim
    * 2 bytes (FP16) = 196.6 KB. A 128-token page consumes 128 * 196.6 KB = 25.1 MB.
    Because the user only generates 15 tokens, an entire 25.1 MB page is allocated
    but leaves 113 tokens empty. This results in 88.2% internal fragmentation, wasting
    ~22 MB of unified memory per request and causing severe memory pressure under
    concurrent usage.
  common_mistake: Importing cloud-optimized PagedAttention block sizes (128/256 tokens)
    directly to mobile inference engines, failing to realize that short interactions
    exhaust unified memory through internal fragmentation.
  napkin_math: Token size = 2 * 24 * 16 * 128 * 2B = 196.6 KB. Page size = 128 * 196.6
    KB = 25.1 MB. Waste = (128 - 15) / 128 = 88.2%.
