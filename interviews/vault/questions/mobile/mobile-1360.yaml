title: Calculate 2:4 Structured Sparsity Speedup on Tensor G3
scenario: You are deploying a quantized on-device LLM. The model currently requires 10 GB of available memory and runs at 3.5 TOPS, underutilizing the NPU due to memory bandwidth bottlenecks. You apply a natively supported 2:4 structured sparsity pattern to the linear layers.
question: How do 2:4 structured sparsity changes affect memory footprint and peak TOPS for the LLM deployment?
details:
  realistic_solution: |
    Implement 2:4 structured sparsity to alleviate memory bandwidth contention. This pattern enforces that exactly two out of every four adjacent weights in a linear layer are zero, allowing the hardware to pack the non-zero elements along with a 2-bit index matrix. Since linear layers typically constitute ~80% of an LLM's parameters, applying this sparsity halves their physical footprint and doubles the arithmetic throughput (since zero-multiplies are skipped at the hardware level). The remaining non-linear components (layer norms, embeddings) are unaffected.
  common_mistake: |
    **The Pitfall:** Assuming unstructured sparsity or uniform 50% sparsity across the entire model.
    **The Rationale:** Candidates forget that 2:4 structured sparsity requires specific hardware support to skip computations.
    **The Consequence:** They mistakenly assume a proportional 2x speedup and memory reduction everywhere, failing to realize it only applies to targeted linear layers.
  napkin_math: |
    **Assumptions & Constraints:**
    - Initial Memory: 10 GB. Initial Compute: 3.5 TOPS.
    - Linear layers comprise 80% of the model.
    - 2:4 structured sparsity reduces targeted weight footprint by 50% and doubles compute throughput.

    **Calculations:**
    - Linear memory: 10 GB * 0.8 = 8 GB. Non-linear memory = 2 GB.
    - New linear memory: 8 GB / 2 = 4 GB (ignoring 2-bit metadata overhead).
    - Total new memory: 4 GB + 2 GB = 6 GB.
    - Linear compute: 3.5 TOPS * 0.8 = 2.8 TOPS. Non-linear compute = 0.7 TOPS.
    - New linear compute: 2.8 TOPS * 2 = 5.6 TOPS.
    - Total new theoretical compute: 5.6 TOPS + 0.7 TOPS = 6.3 TOPS.

    **Conclusion & Interpretation:**
    - **Result: 6.3 TOPS (Memory Bandwidth-Bound)**. Applying 2:4 structured sparsity shrinks the memory footprint to 6 GB and boosts effective throughput to 6.3 TOPS, directly alleviating the LPDDR5X bottleneck and maximizing hardware utilization.
