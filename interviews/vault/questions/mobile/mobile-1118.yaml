title: KV-Cache OOM on A17 Pro Unified Memory
scenario: You are deploying a 3B parameter transformer (hidden size 3072, 32 layers)
  quantized to 4-bit precision on the Apple A17 Pro Neural Engine. The device has
  a shared 8 GB unified memory with the CPU/GPU, but the OS restricts your background
  app to a strict 2.5 GB memory limit. During a long-context generation task where
  the sequence length reaches 4000 tokens, the application crashes with an Out-Of-Memory
  (OOM) error. Explain why this happens by calculating the memory footprint of the
  system.
question: Why does a 3B 4-bit transformer with 4000-token context OOM under a 2.5
  GB A17 Pro background-app limit?
details:
  realistic_solution: The OOM occurs because the dynamic KV-cache memory pushes the
    total memory footprint over the 2.5 GB app limit. While the 4-bit weights consume
    a static 1.5 GB, the KV-cache required for 4000 tokens in FP16 format takes up
    too much space, exceeding the remaining 1.0 GB of available memory. The candidate
    should calculate both components to demonstrate exactly when the limit is breached.
  common_mistake: Candidates often only account for the static model weights and assume
    a 1.5 GB quantized model easily fits within the 2.5 GB budget. They frequently
    forget that the KV-cache grows linearly with sequence length and must be explicitly
    budgeted alongside activations in unified memory architectures.
  napkin_math: '1. Weights footprint: 3B params * 0.5 bytes (4-bit) = 1.5 GB. 2. KV-cache
    per token: 2 (K,V) * 32 layers * 3072 hidden size * 2 bytes (FP16) = 393,216 bytes
    (~0.39 MB). 3. KV-cache for 4000 tokens: 4000 * 0.39 MB = 1.56 GB. 4. Total memory
    footprint at 4000 tokens: 1.5 GB (weights) + 1.56 GB (KV-cache) = 3.06 GB. Since
    3.06 GB > the 2.5 GB app limit (out of the 8 GB shared unified memory), the app
    crashes.'
