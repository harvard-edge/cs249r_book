title: MobileNetV2 FLOPs vs Apple A17 Pro TOPS
scenario: You are deploying a custom object detection model based on a MobileNetV2 backbone to an iPhone
  15 Pro. The target deployment hardware is the Apple A17 Pro Neural Engine, which provides 35 TOPS (Trillion
  Operations Per Second) within a ~5W power envelope. Your model performs 1.5 GFLOPs (Giga Floating-Point
  Operations) per inference. Assuming 1 MAC = 2 Operations, and you can achieve 30% utilization of the
  peak Neural Engine TOPS for this specific architecture due to memory bandwidth constraints on the shared
  8 GB unified memory, calculate the theoretical maximum frame rate (FPS) you can achieve.
details:
  realistic_solution: First, find the effective throughput of the Neural Engine by applying the 30% utilization
    factor to the peak TOPS. Then, convert the model's GFLOPs requirement into the same unit (Operations).
    Finally, divide the effective operations per second by the operations required per frame to find the
    frames per second.
  common_mistake: Candidates often forget to convert between MACs and Operations (if the model specifies
    MACs) or mix up Giga (10^9) and Tera (10^12) prefixes. Another common error is ignoring the utilization
    factor and assuming the hardware will hit its theoretical peak of 35 TOPS, leading to wildly unrealistic
    FPS estimations.
  napkin_math: '1. Peak TOPS = 35 * 10^12 Ops/sec.

    2. Effective TOPS at 30% utilization = 35 * 0.30 = 10.5 * 10^12 Ops/sec.

    3. Model cost = 1.5 GFLOPs = 1.5 * 10^9 Ops/frame.

    4. Max FPS = (10.5 * 10^12 Ops/sec) / (1.5 * 10^9 Ops/frame) = (10.5 / 1.5) * 10^3 = 7 * 1000 = 7000
    FPS.'
