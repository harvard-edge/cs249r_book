title: CI/CD Release Gates for Hexagon NPU
scenario: You are designing the automated CI/CD pipeline to continuously deploy a
  real-time video segmentation model to devices powered by the Snapdragon 8 Gen 3.
  The pipeline compiles and quantizes the model to INT8 to leverage the Qualcomm Hexagon
  NPU. You must establish the automated hardware-in-the-loop release criteria, quantifying
  the maximum allowable model metrics to guarantee a strict 5ms latency budget while
  operating within a highly contented environment sharing the 12-16 GB LPDDR5X memory
  across the heterogeneous CPU, GPU, and NPU.
question: What CI/CD release gates should verify Hexagon NPU memory bandwidth, SRAM
  use, and CPU fallback risk?
details:
  realistic_solution: The CI/CD pipeline must enforce deployment gates based on memory
    bandwidth utilization and local SRAM capacity, not just MAC counts. The automated
    validation should simulate SoC-wide memory contention during inference. A robust
    pipeline will automatically reject INT8 models whose intermediate activations
    spill out of the NPU's local memory and force expensive round-trips to main memory.
  common_mistake: Candidates often base their automated CI/CD performance gates solely
    on the NPU's theoretical 45 TOPS peak compute. They fail to account for the shared
    nature of the LPDDR5X memory, where concurrent CPU and GPU workloads consume bandwidth,
    meaning a model that passes a synthetic CI test will fail latency SLAs in real-world
    heterogeneous production scenarios.
  napkin_math: Assume a 150 GOP INT8 model. At the Hexagon NPU's peak 45 TOPS, theoretical
    compute time is 150 / 45,000 = 3.33ms. However, if the model requires transferring
    50MB of weights and activations per frame over the shared LPDDR5X memory (assuming
    a conservative 40 GB/s effective bandwidth under heavy CPU/GPU contention), the
    data transfer alone takes 50MB / 40GB/s = 1.25ms. The total minimum latency is
    ~4.58ms, dangerously close to the 5ms SLA. The CI pipeline must therefore strictly
    cap the INT8 model's total memory traffic per inference to under 50MB.
