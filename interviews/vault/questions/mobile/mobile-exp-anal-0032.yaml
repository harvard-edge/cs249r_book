title: A17 Pro Neural Engine Memory Bottleneck
scenario: You are profiling a real-time language model running on the Apple A17 Pro. The SoC features
  a 16-core Neural Engine with 35 TOPS of compute operating at ~5W, and it shares an 8 GB unified memory
  pool with the CPU and GPU. For each token generated, the model requires 70 Giga-Operations (GOPS) of
  compute and must load 0.5 GB of weights. The profiler shows the Neural Engine is operating far below
  its 35 TOPS peak. If concurrent GPU rendering restricts the Neural Engine's available memory bandwidth
  to 25 GB/s, explain why the compute units are underutilized and identify the system bottleneck.
details:
  realistic_solution: The profiler indicates underutilization because the model is entirely memory-bound.
    In the Apple A17 Pro architecture, the Neural Engine shares unified memory with the CPU and GPU. Since
    the GPU is actively consuming bandwidth for rendering, the Neural Engine cannot load the 0.5 GB of
    weights fast enough to keep its 35 TOPS compute pipeline fed. The bottleneck is the constrained 25
    GB/s memory bandwidth, which leaves the compute units idling while waiting for data.
  common_mistake: Candidates often calculate latency solely based on the 35 TOPS peak compute limit, assuming
    execution is compute-bound. They fail to account for the shared 8 GB unified memory architecture where
    concurrent CPU/GPU workloads can starve the 16-core Neural Engine of essential memory bandwidth.
  napkin_math: 'Theoretical compute latency: 70 GOPS / 35,000 GOPS (35 TOPS) = 0.002 seconds (2 ms). Theoretical
    memory latency: 0.5 GB / 25 GB/s = 0.02 seconds (20 ms). Actual expected latency = max(2 ms, 20 ms)
    = 20 ms per token. The hardware''s compute-to-memory ratio is 35,000 / 25 = 1,400 OPS/byte, while
    the model''s arithmetic intensity is 70 / 0.5 = 140 OPS/byte. Since 140 << 1,400, the workload is
    severely memory bandwidth bound.'
