title: Absolute SRAM Savings from INT4 Quantization
scenario: A mobile application developer ports a 25M parameter NLP model from FP32
  down to INT4 to fit entirely in the A17 Pro's 32 MB system cache (SLC). The full
  FP32 model requires 100 MB, exceeding SLC; the team's goal is to fit weights +
  working activations in SLC to eliminate LPDDR5 traffic.
question: Formulate the quantization memory savings and calculate the absolute reduction
  in model footprint in megabytes.
details:
  realistic_solution: '25M parameters FP32 = 100 MB; INT4 = 25M * 0.5 = 12.5 MB.
    Absolute reduction = 87.5 MB. The 12.5 MB INT4 model fits in the 32 MB SLC with
    ~19.5 MB headroom for activations and KV-cache, eliminating LPDDR5 traffic for
    inference. Note: A17 Pro SLC is 32 MB (NOT large enough for a 50 MB FP16 model
    of similar parameter count, so 25M params at INT4 is the right sizing).'
  common_mistake: Assuming INT4 uses 1 byte (yielding 18.75 MB rather than the correct
    12.5 MB at 0.5 bytes), or sizing for an SLC larger than the A17 Pro''s actual
    32 MB.
  napkin_math: '25M * 4B - 25M * 0.5B = 87.5 MB reduction; final size = 12.5 MB
    fits in 32 MB SLC.'
