title: Absolute SRAM Savings from INT4 Quantization
scenario: A mobile application developer ports a 100M parameter NLP model from FP32
  down to INT4 to fit entirely in the A17 Pro's system cache.
question: Formulate the quantization memory savings and calculate the absolute reduction
  in model footprint in megabytes.
details:
  realistic_solution: FP32 requires 4 bytes per parameter; INT4 requires 0.5 bytes
    per parameter. The initial size is 400 MB. The quantized size is 50 MB. The absolute
    reduction is 400 - 50 = 350 MB.
  common_mistake: Assuming INT4 uses 1 byte, leading to a 300MB reduction rather than
    the correct 0.5 byte calculation.
  napkin_math: 100 * 4 - 100 * 0.5 = 350 MB
