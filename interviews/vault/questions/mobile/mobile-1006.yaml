title: 'Network Bandwidth Bottlenecks: Evaluate On-Device vs. Cloud for Bandwidth-Constrained Mobile Users'
scenario: 'A mobile app team evaluates on-device inference vs. cloud inference for users on a 5G network. The cloud inference requires uploading the prompt and downloading the response.'
question: 'How do end-to-end latencies for on-device and cloud LLM inference compare across 5G and LTE network conditions?'
details:
  realistic_solution: 'Prompt upload: 2KB + response download: 512B = 2.5KB total transfer. Transfer time even at LTE: 2.5KB/50Mbps=0.4ms (negligible). Network latency dominates: mmWave RTT=10ms, sub-6=30ms, LTE=50ms. Cloud: E2E = RTT + prefill(27ms at H100) + decode(128×7.8ms=998ms) = RTT+1025ms. On-device: 128×19.5ms=2496ms. Cloud at mmWave: 10+1025=1035ms. Cloud at LTE: 50+1025=1075ms. On-device: 2496ms. Cloud wins by 2.3× even at LTE. But on-device works offline and has no API cost.'
  common_mistake: |
    **The Pitfall:** Computing network time as data size divided by bandwidth and ignoring Round Trip Time (RTT).
    **The Rationale:** Engineers conflate bandwidth (throughput) with network latency.
    **The Consequence:** Incorrectly concluding that low-bandwidth networks (LTE) severely penalize small text payloads.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Cloud TPOT: 7.8 ms. On-device TPOT: 19.5 ms.
       - Data transfer size: 2.5 KB total.
       - RTT: 10 ms (mmWave), 30 ms (sub-6), 50 ms (LTE).
    2. **Calculations:**
       - Cloud latency: 128 tokens * 7.8 ms + 27 ms (prefill) + RTT = 1025 ms + RTT.
       - On-device latency: 128 * 19.5 ms = 2496 ms.
       - Cloud at LTE (50 ms RTT): 1025 + 50 = 1075 ms.
       - Data transfer time at LTE (50 Mbps): 2.5 KB / 50 Mbps = 0.4 ms (negligible).
    3. **Conclusion & Interpretation:**
       - **Result: Cloud is 2.3x faster even on LTE (Compute/Speed vs Privacy).**
