title: Estimating Inference FPS on Exynos 2400 NPU
scenario: We are deploying an on-device super-resolution model on a smartphone powered by the Samsung
  Exynos 2400 NPU. The Exynos 2400 features a dual-core NPU rated at 34.7 TOPS peak performance, sharing
  a 12 GB LPDDR5X memory pool with the CPU, GPU, and ISP. Our model requires 150 GOPS (Giga Operations)
  per high-resolution frame. Assuming memory bandwidth contention limits our realistic NPU hardware utilization
  to just 35% of its peak capacity, calculate the estimated frames per second (FPS) this device can process.
details:
  realistic_solution: A solid engineer first calculates the effective TOPS by applying the expected utilization
    factor to the theoretical peak performance. Once the true usable throughput is determined based on
    system constraints, they divide it by the compute cost per frame to find a realistic processing rate.
  common_mistake: Candidates often simply divide peak hardware performance (34.7 TOPS) by the model requirements
    (150 GOPS) to get an unrealistic ~231 FPS, completely ignoring the 35% utilization bottleneck caused
    by the shared LPDDR5X memory system.
  napkin_math: 1. Peak Performance = 34.7 TOPS = 34,700 GOPS. 2. Effective Performance = 34,700 GOPS *
    0.35 (utilization factor) = 12,145 GOPS. 3. Estimated FPS = 12,145 GOPS / 150 GOPS/frame = 80.96 FPS
    (approx 81 FPS).
