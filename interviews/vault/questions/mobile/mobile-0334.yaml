title: The Background Battery Killer
scenario: Your team is developing a 'Smart Albums' feature for a new photo gallery app. The feature runs
  in the background, waking up every 5 minutes to scan for new faces using an on-device model. Each scan
  takes 5 seconds, during which the phone's SoC draws about 4 Watts. When idle between scans, the background
  service draws a non-zero 20 milliwatts. What percentage of the battery will this consume in 24 hours?
question: "What percentage of the battery will this consume in 24 hours?"
details:
  realistic_solution: The correct way to solve this is to first calculate the total energy capacity of
    the battery in Watt-hours, then determine the average power consumption of the feature by considering
    both its active and idle states (the duty cycle), and finally calculate the total energy consumed
    over 24 hours.
  common_mistake: Engineers often focus only on the high-power active state and ignore the cumulative
    effect of the 'low power' idle state over a full day. Another common mistake is confusing power (Watts)
    with current (Amps) and failing to properly convert the battery's capacity from milliamp-hours (a
    unit of charge) to Watt-hours (a unit of energy) using the battery's voltage.
  napkin_math: 1. **Battery Capacity (Wh):** `4000 mAh` is `4 Ah`. Energy = `4 Ah * 3.8V = 15.2 Wh`.
  options:
  - ~3%
  - ~11%
  - ~14%
  - ~40%
  correct_index: 2
