title: 'KV-Cache: Fluency — GQA Memory Savings Calculation for Mobile LLM'
scenario: Compare MHA (32 KV heads) vs GQA (8 KV heads) vs MQA (1 KV head) KV cache memory for a 3B LLM
  (32 layers, head_dim=128, bf16) on Tensor G3 (7.5 TOPS, 12GB) at 2048-token context. Which fits in 12GB?
  Which allows the longest context?
details:
  realistic_solution: Available memory for KV = total RAM - OS - model weights - activations. Model weights
    don't change with KV head count (Q projection is same size; only K,V projections change).
  common_mistake: Not accounting for model weights when calculating available memory for KV cache; confusing
    the number of KV heads with number of attention groups.
  napkin_math: '3B model (INT4): 750MB. OS: 2GB. Activations: 200MB. Available KV: 12 - 0.75 - 2 - 0.2
    = 9.05GB. At 2048 tokens: MHA (32 KV heads): 2048 × 32 × 2 × 32 × 128 × 2B = 2048 × 524KB = 1.07GB.
    GQA-8: 2048 × 32 × 2 × 8 × 128 × 2B = 2048 × 131KB = 268MB. MQA (1 KV head): 2048 × 32 × 2 × 1 × 128
    × 2B = 2048 × 16.4KB = 33.6MB. All fit in 9.05GB at 2048 tokens. Max context (within 9.05GB): MHA:
    9.05GB / 524KB = 17,252 tokens. GQA-8: 9.05GB / 131KB = 69,007 tokens. MQA: 9.05GB / 16.4KB = 551,829
    tokens. All fit! At 12GB available, even MHA supports 17K-token context. Key constraint for Tensor
    G3: decode latency, not memory. At 2048 ctx decode: MHA KV BW = 1.07GB / 51 GB/s = 21ms. GQA-8 = 268MB
    / 51 GB/s = 5.3ms. MQA = 33.6MB / 51 GB/s = 0.66ms. Weight load: 750MB / 51 GB/s = 14.7ms. MHA total:
    35.7ms = 28 tok/sec. GQA: 20ms = 50 tok/sec. MQA: 15.4ms = 65 tok/sec. GQA-8 recommended: good quality
    + good throughput.'
