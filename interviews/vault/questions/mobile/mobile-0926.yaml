title: 'Kernel Fusion: Design Fusion Strategy for On-Device LLM on Snapdragon 8 Gen 3'
scenario: 'You are designing the kernel fusion strategy for a 1B parameter LLM (4-bit quantized) inference on Snapdragon 8 Gen 3 (45 TOPS INT8, 16GB). The model uses GQA attention (8 KV heads, 32 Q heads), RMSNorm, and SwiGLU activation. Target: 20 tokens/second (50ms/token).'
question: 'What fusion graph helps a 1B 4-bit GQA LLM on Snapdragon 8 Gen 3 reach 20 tokens/sec?'
details:
  realistic_solution: 'Snapdragon 8 Gen 3: Hexagon DSP (45 TOPS INT8, best for quantized matmuls) + Adreno GPU (10 TOPS FP16, best for attention/softmax). Design fusion graph aware of this split.'
  common_mistake: 'Not accounting for the Hexagon DSP vs Adreno GPU split on Snapdragon — different op types run on different hardware units. Not all ops can be fused across the DSP/GPU boundary.'
  napkin_math: |
    **Assumptions & Constraints:**
    - 1B model, 4-bit quantization (500MB).
    - Snapdragon 8 Gen 3: LPDDR5 bandwidth ~68 GB/s, 45 TOPS.
    - 32 layers, hidden dimension 2048.
    - Target: 20 tokens/sec (50ms/token).

    **Calculations:**
    - Weight loading time: 500MB / 68 GB/s = ~7.35ms.
    - Compute time: (1B * 2 FLOPs) / 45 TOPS = 0.044ms (Memory-dominated).
    - Fusion savings (RMSNorm + GEMM): 32 layers * (2048 * 2 bytes) * 2 = ~262KB.
    - Fusion time saved: 262KB / 68 GB/s = ~0.004ms.

    **Conclusion & Interpretation:**
    - **Result: 0.004ms Saved (Memory-Bound).** Kernel fusion yields negligible gains; the system already achieves ~80 tokens/sec (~12.4ms/token), exceeding the target without complex fusions.
