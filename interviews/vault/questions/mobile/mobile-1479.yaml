title: Tensor G3 KV Cache Paged Allocation
scenario: You are deploying a local LLM on a mobile device with 12 GB of LPDDR5X RAM shared with the OS. As sequence length increases during inference, the Key-Value (KV) cache consumes a massive contiguous memory footprint.
question: What specific memory management technique stores KV cache in non-contiguous physical blocks to eliminate external fragmentation?
details:
  realistic_solution: |
    Implement PagedAttention (or block-based KV caching). This technique partitions the continuous KV sequence into fixed-size, non-contiguous physical memory pages, completely eliminating external fragmentation and preventing memory reallocation overheads.
  common_mistake: |
    **The Pitfall:** Relying on contiguous memory allocation or standard OS-level swapping for the KV cache.
    **The Rationale:** Lacking familiarity with modern LLM tensor memory mechanics and applying legacy application memory heuristics.
    **The Consequence:** As the KV cache dynamically grows, the allocator fails to find contiguous blocks, triggering latency spikes from continuous reallocation and rapid OOM crashes.
  napkin_math: |
    1. **Assumptions & Constraints:** 32 layers, 2048 dim, FP16 (2 bytes). Context = 2048 tokens.
    2. **Calculations:** Cache per token = 2 * 32 * 2048 * 2 = 262,144 bytes (256 KB). Total cache = 256 KB * 2048 = 512 MB.
    3. **Conclusion & Interpretation:** **Result: Memory-Bound**. A fragmented 512 MB contiguous allocation easily triggers OOM; PagedAttention circumvents this.
