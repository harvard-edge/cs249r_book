title: Tensor G3 KV Cache Paged Allocation
scenario: 'You are deploying Gemini Nano on a Pixel device powered by the Google Tensor G3. The device features an on-device TPU capable of 7.5 TOPS and 12 GB of LPDDR5X RAM, which must be shared with the OS and other applications. As the sequence length increases during on-device LLM inference, the KV cache consumes a significant amount of memory.'
question: 'What specific memory management technique is used to store KV cache in non-contiguous memory blocks to eliminate external fragmentation?'
details:
  realistic_solution: 'The correct technique is PagedAttention (or block-based KV caching). It partitions the KV cache of a sequence into fixed-size blocks or pages that can be stored in non-contiguous physical memory, allowing the Tensor G3 to utilize its RAM efficiently without out-of-memory errors due to fragmentation.'
  common_mistake: |
    **The Pitfall:** Proposing generic OS-level swapping or standard contiguous memory allocation.
    **The Rationale:** Candidates lack knowledge of modern LLM-specific memory techniques and rely on traditional memory management concepts.
    **The Consequence:** The continuous reallocation and copying of growing contiguous KV buffers causes severe latency spikes and rapid OOM crashes.
  napkin_math: |
    1. **Model Dimensions:** 32 layers, hidden dimension of 2048, FP16 format (2 bytes).
    2. **Cache Per Token:** 2 (Key & Value) × 32 layers × 2048 dim × 2 bytes = 262,144 bytes (~256 KB).
    3. **Context Cost:** Storing a 2048-token context requires 262,144 × 2048 = 536,870,912 bytes = **512 MB** of the 12 GB available RAM.
