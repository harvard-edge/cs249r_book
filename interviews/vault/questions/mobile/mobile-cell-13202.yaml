title: 'Mobile Transformer Cost Implement: Calculate Token Budget for Mobile LLM'
scenario: 'Implement the maximum context length calculation for Phi-3-Mini-3.8B (INT4, 32 layers, 32 heads,
  head_dim=64) on Snapdragon 8 Gen 3 (45 TOPS, 16GB, 77GB/s) that meets: P99 < 2s for 100 output tokens,
  leaving 4GB RAM for OS. Calculate: model memory, KV cache per token, maximum context tokens given RAM
  constraint, and verify throughput SLO.'
details:
  realistic_solution: Max context = KV_budget / KV_per_token. Use consistent binary (GiB) or decimal (GB)
    throughout to avoid unit mixing errors.
  common_mistake: Calculating KV cache per token incorrectly by using hidden_dim instead of num_heads*head_dim*2(K+V)*num_layers,
    giving a 2-32x error.
  napkin_math: 'Max context calculation: memory_budget / bytes_per_token = KV cache budget / KV_per_token.
    If 4GB available for KV, KV_per_token = 131KB (32-layer GQA-8, fp16): max_tokens = 4GB / 131KB = 4×1024×1024KB
    / 131KB = 4,194,304 / 131 = 32,018 tokens ≈ 32K context. Use consistent units throughout: GB = 10^9
    or GiB = 2^30.'
