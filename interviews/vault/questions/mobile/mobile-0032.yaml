title: The Model Cache Eviction Problem
scenario: Your messaging app downloads ML models on-demand — a sticker suggestion model (8 MB), a smart
  reply model (12 MB), and a photo enhancement model (30 MB). You store them in the iOS Caches directory.
  Users complain that the photo enhancement feature 'takes forever to load' every few days. What's happening?
details:
  realistic_solution: iOS automatically purges the Caches directory when the device is low on storage.
    Your 30 MB photo enhancement model is the largest file in Caches and gets evicted first. Because it
    takes 12 seconds to re-download, users perceive the feature as broken or extremely slow. To fix this,
    you should move critical models to the Application Support or Documents directory so they aren't purged,
    or implement partial caching/predictive pre-loading.
  common_mistake: '"The CDN is slow — optimize the download speed." The download speed is fine. The problem
    is that the model keeps getting *deleted* and re-downloaded.'
  napkin_math: 'iPhone 64 GB, user has 4 GB free. iOS purge threshold: ~5 GB. Purge targets Caches directory.
    Your models: 8 + 12 + 30 = 50 MB. After purge: 30 MB model evicted first (largest). Re-download on
    LTE (20 Mbps): 30 MB / 2.5 MB/s = 12 seconds. User perception: "feature is broken." With partial caching:
    15 MB download = 6 seconds. With predictive pre-load: 0 seconds (already downloaded). Storage cost
    of permanent models: 20 MB out of 64 GB = 0.03% of device storage.'
