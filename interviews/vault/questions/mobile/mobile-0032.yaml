title: The Model Cache Eviction Problem
scenario: Your messaging app downloads ML models on-demand — a sticker suggestion model (8 MB), a smart reply model (12 MB), and a photo enhancement model (30 MB). You store them in the iOS Caches directory. Users complain that the photo enhancement feature takes forever to load every few days.
question: Why does a 30 MB photo-enhancement model in iOS Caches keep disappearing and taking 12s to reload?
details:
  realistic_solution: iOS automatically purges the Caches directory when the device is low on storage. Your 30 MB photo enhancement model is the largest file in Caches and gets evicted first. Because it takes 12 seconds to re-download, users perceive the feature as broken or extremely slow. To fix this, you should move critical models to the Application Support or Documents directory so they aren't purged, or implement partial caching/predictive pre-loading.
  common_mistake: |
    **The Pitfall:** Assuming the problem is a slow CDN or slow initial download speed.
    **The Rationale:** Engineers treat the symptoms (slow load times) as a network issue, forgetting how the iOS filesystem manages temporary storage under pressure.
    **The Consequence:** They waste time optimizing network calls while the OS continues to silently purge and delete the largest downloaded model.
  napkin_math: |
    1. **Assumptions & Constraints:** iOS purge threshold targets Caches. 30 MB model is the largest file. Network connection is 20 Mbps (2.5 MB/s).
    2. **Calculations:** Re-downloading 30 MB at 2.5 MB/s takes 30 MB / 2.5 MB/s = 12 seconds. Moving to permanent storage costs 50 MB / 64,000 MB = 0.07% of device storage.
    3. **Conclusion & Interpretation:** **Result: Network-Bound (Due to Cache Eviction).** The 12-second latency is entirely due to re-downloading an evicted file. Permanently caching it resolves the delay.
