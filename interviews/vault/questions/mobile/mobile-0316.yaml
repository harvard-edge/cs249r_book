title: The AR Filter's Bottleneck
scenario: You are an engineer at a social media company developing a new augmented reality filter for mobile devices. The core of your filter is a new convolutional layer. For a single inference pass, this layer performs 70 Giga-operations and requires moving a total of 200 MB of data.
question: Is a 70 GOPS, 200 MB convolution layer on the Neural Engine compute-bound or memory-bound?
details:
  realistic_solution: 'The layer is memory-bound. To determine this, we first calculate the layer''s Arithmetic Intensity (AI), which is the ratio of compute to memory operations. We then compare this AI to the hardware''s Ridge Point. If the AI is lower than the Ridge Point, the system is memory-bound; if it''s higher, it''s compute-bound.'
  common_mistake: |
    **The Pitfall:** Looking only at peak TOPS and assuming the workload is compute-bound.
    **The Rationale:** Engineers see a large number of operations and forget that without sufficient data from memory, compute units sit idle.
    **The Consequence:** Optimizing compute kernels when the actual bottleneck is memory bandwidth.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Layer Compute: 70 GOPS (70e9 Ops).
       - Layer Memory: 200 MB (200e6 Bytes).
       - Peak Compute: 35 TOPS (35e12 Ops/s).
       - Peak Bandwidth: 51.2 GB/s (51.2e9 Bytes/s).
    2. **Calculations:**
       - Arithmetic Intensity: 70e9 / 200e6 = 350 Ops/Byte.
       - Ridge Point: 35e12 / 51.2e9 = 683 Ops/Byte.
       - Comparison: 350 < 683.
       - Compute Time: 70e9 / 35e12 = 2.0 ms.
       - Memory Time: 200e6 / 51.2e9 = 3.9 ms.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound.** AI is strictly beneath the ridge point, making the layer bandwidth-choked (~2x slower than compute potential).
  options:
  - Compute-bound, because its Arithmetic Intensity (350 Ops/Byte) is less than the A17 Pro's Ridge Point (~683 Ops/Byte).
  - Memory-bound, because its Arithmetic Intensity is ~0.0028 Bytes/Op, which is very low.
  - Compute-bound, because 35 TOPS is a very high compute capability, so the layer will always be limited by the accelerator's speed.
  - Memory-bound, because its Arithmetic Intensity (350 Ops/Byte) is less than the A17 Pro's Ridge Point (~683 Ops/Byte).
