title: The AR Filter's Bottleneck
scenario: You are an engineer at a social media company developing a new augmented reality filter for
  mobile devices. The core of your filter is a new convolutional layer that runs on the Apple A17 Pro's
  Neural Engine. For a single inference pass, this layer performs 70 Giga-operations (INT8) and requires
  moving a total of 200 MB of data (activations and weights) from main memory. The A17 Pro's ANE has peak
  performance of 35 TOPS (INT8) and the LPDDR5 memory system provides 51.2 GB/s of bandwidth. Determine
  whether this layer is compute-bound or memory-bound.
question: "Is a 70 GOPS, 200 MB convolution layer on the A17 Pro Neural Engine compute-bound or memory-bound?"
details:
  realistic_solution: The layer is memory-bound. To determine this, we first calculate the layer's Arithmetic
    Intensity (AI), which is the ratio of compute to memory operations. We then compare this AI to the
    hardware's Ridge Point. If the AI is lower than the Ridge Point, the system is memory-bound; if it's
    higher, it's compute-bound.
  common_mistake: A common mistake is to only look at the high peak TOPS of the mobile accelerator and
    assume the workload must be compute-bound. Engineers often forget that without sufficient data from
    the memory system, the compute units will sit idle, making the application memory-bound. Another error
    is inverting the Arithmetic Intensity calculation to Bytes/Op, or misinterpreting the comparison (e.g.,
    thinking AI > Ridge Point means memory-bound).
  napkin_math: '1. **Layer AI:** 70 \u00d7 10^9 Ops / (200 \u00d7 10^6 Bytes) = 350 Ops/Byte.

    2. **Hardware Ridge Point:** 35 \u00d7 10^12 / (51.2 \u00d7 10^9) \u2248 683 Ops/Byte.

    3. **Compare:** AI (350) < Ridge Point (683) \u2192 layer is **memory-bound**.

    4. **Memory time:** 200 MB / 51.2 GB/s \u2248 3.9 ms. Compute time: 70 GOps / 35 TOPS = 2.0 ms. Memory
    is the bottleneck (~2\u00d7 slower).'
  options:
  - Compute-bound, because its Arithmetic Intensity (350 Ops/Byte) is less than the A17 Pro's Ridge Point
    (~683 Ops/Byte).
  - Memory-bound, because its Arithmetic Intensity is ~0.0028 Bytes/Op, which is very low.
  - Compute-bound, because 35 TOPS is a very high compute capability, so the layer will always be limited
    by the accelerator's speed.
  - Memory-bound, because its Arithmetic Intensity (350 Ops/Byte) is less than the A17 Pro's Ridge Point
    (~683 Ops/Byte).
  correct_index: 3
