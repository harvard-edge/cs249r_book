title: The AR Filter's Bottleneck
scenario: You are an engineer at a social media company developing a new augmented reality filter for mobile devices. The core of your filter is a new convolutional layer that runs on the Apple A17 Pro's Neural Engine. For a single inference pass, this layer performs 70 Giga-operations (INT8) and requires moving a total of 200 MB of data (activations and weights) from main memory.
question: "Is a 70 GOPS, 200 MB convolution layer on the A17 Pro Neural Engine compute-bound or memory-bound?"
details:
  realistic_solution: The layer is memory-bound. To determine this, we first calculate the layer's Arithmetic
    Intensity (AI), which is the ratio of compute to memory operations. We then compare this AI to the
    hardware's Ridge Point. If the AI is lower than the Ridge Point, the system is memory-bound; if it's
    higher, it's compute-bound.
  common_mistake: |
    **The Pitfall:** Looking only at peak TOPS and assuming the workload is compute-bound.
    **The Rationale:** Engineers see a large number of operations and forget that without sufficient data from memory, compute units sit idle.
    **The Consequence:** Optimizing compute kernels when the actual bottleneck is memory bandwidth.
  napkin_math: |
    - Layer Compute: 70 × 10⁹ Ops.
    - Layer Memory: 200 × 10⁶ Bytes.
    - Arithmetic Intensity (AI): 70×10⁹ / 200×10⁶ = 350 Ops/Byte.
    - Hardware Ridge Point: 35 TOPS (35×10¹²) / 51.2 GB/s (51.2×10⁹) ≈ 683 Ops/Byte.
    - Comparison: AI (350) < Ridge Point (683).
    - Execution Time: Compute time = 2.0 ms. Memory time = 3.9 ms.
    - **Conclusion:** The layer is memory-bound (~2× slower).
  options:
  - Compute-bound, because its Arithmetic Intensity (350 Ops/Byte) is less than the A17 Pro's Ridge Point
    (~683 Ops/Byte).
  - Memory-bound, because its Arithmetic Intensity is ~0.0028 Bytes/Op, which is very low.
  - Compute-bound, because 35 TOPS is a very high compute capability, so the layer will always be limited
    by the accelerator's speed.
  - Memory-bound, because its Arithmetic Intensity (350 Ops/Byte) is less than the A17 Pro's Ridge Point
    (~683 Ops/Byte).
