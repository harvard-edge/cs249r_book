title: Architecting Long-Context Attention on Tensor G3
scenario: You are designing the attention architecture for a new long-document summarization feature powered by Gemini Nano on the Google Tensor G3. The feature requires processing up to 8K tokens of context, but the system must operate within the device's 12 GB LPDDR5X shared memory and the TPU's 7.5 TOPS compute limit without freezing the OS.
question: How should Tensor G3 long-context summarization combine GQA, attention sinks, and sliding windows to fit 8K contexts?
details:
  realistic_solution: The optimal architecture combines Grouped-Query Attention (GQA) with an attention sink mechanism (retaining initial tokens) and a local sliding window. GQA drastically reduces the KV cache size and memory bandwidth requirements compared to MHA, offering a better quality-to-performance tradeoff than MQA. To fit the 8K context comfortably within the Tensor G3's constraints, the KV cache must be quantized to INT8, ensuring memory reads during the decoding phase do not stall the TPU.
  common_mistake: |
    **The Pitfall:** Proposing standard Multi-Head Attention (MHA) or pure sliding window attention.
    **The Rationale:** Candidates fail to realize MHA causes a severe memory bandwidth bottleneck during autoregressive decoding on mobile hardware, and pure sliding windows evict early document tokens needed for summarization.
    **The Consequence:** The model either starves the TPU for data (leading to extreme latency) or loses the critical document context needed for accurate summarization.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Hidden dimension: 2048, 16 layers.
       - Context limit: 8,192 tokens.
       - Memory bandwidth: ~50 GB/s.
    2. **Calculations:**
       - Standard MHA Footprint (FP16): 8,192 * 2048 * 2 (K+V) * 2 bytes * 16 layers = ~1.07 GB.
       - GQA (4x reduction) Footprint: 1.07 GB / 4 = ~268 MB.
       - INT8 Quantization (2x reduction): 268 MB / 2 = ~134 MB.
       - Bandwidth load per token: 134 MB / 50,000 MB/s = 2.68ms.
    3. **Conclusion & Interpretation:**
       - **Result: 373 tokens/sec limit**. Grouped-Query Attention combined with INT8 quantization shrinks the KV cache to 134 MB, safely avoiding the memory bandwidth wall on mobile.
