title: Architecting Long-Context Attention on Tensor G3
scenario: You are designing the attention architecture for a new long-document summarization
  feature powered by Gemini Nano on the Google Tensor G3. The feature requires processing
  up to 8K tokens of context, but the system must operate within the device's 12 GB
  LPDDR5X shared memory and the TPU's 7.5 TOPS compute limit without freezing the
  OS. Architect an attention scaling strategy (evaluating Multi-Query, Grouped-Query,
  and Sliding Window Attention) that minimizes memory bandwidth during decoding while
  preserving summarization accuracy. Justify your architectural tradeoffs.
question: How should Tensor G3 long-context summarization combine GQA, attention sinks,
  and sliding windows to fit 8K contexts?
details:
  realistic_solution: The optimal architecture combines Grouped-Query Attention (GQA)
    with an attention sink mechanism (retaining initial tokens) and a local sliding
    window. GQA drastically reduces the KV cache size and memory bandwidth requirements
    compared to MHA, offering a better quality-to-performance tradeoff than MQA. To
    fit the 8K context comfortably within the Tensor G3's constraints, the KV cache
    must be quantized to INT8, ensuring memory reads during the decoding phase do
    not stall the TPU.
  common_mistake: Candidates often propose standard Multi-Head Attention (MHA) without
    realizing it causes a severe memory bandwidth bottleneck during autoregressive
    decoding on mobile hardware. They may also suggest pure sliding window attention
    without understanding that summarization requires attending to early document
    tokens, which a naive window would evict.
  napkin_math: 'For a model with hidden size 2048 and 16 layers: Standard MHA KV cache
    at FP16 for 8K tokens requires 8192 * 2048 * 2 (K+V) * 2 bytes * 16 layers = ~1.07
    GB. Reading 1.07 GB per generated token heavily bottlenecks the LPDDR5X memory.
    Using GQA (e.g., 4 query heads per KV head) reduces this by 4x to ~268 MB. Applying
    INT8 quantization further halves this to ~134 MB. With the Tensor G3''s LPDDR5X
    bandwidth (typically ~50 GB/s), fetching 134 MB per token utilizes only a fraction
    of peak bandwidth, allowing the 7.5 TOPS TPU to achieve interactive generation
    speeds (>15 tokens/sec) without starving for data.'
