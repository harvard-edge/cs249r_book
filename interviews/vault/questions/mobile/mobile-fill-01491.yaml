title: On-Device ML Data Quality for Samsung Exynos 2400 NPU
scenario: "You are tasked with building a robust on-device machine learning pipeline for a new mobile\
  \ application that processes real-time sensor data (e.g., accelerometer, gyroscope, camera data) for\
  \ a critical feature. The application targets devices powered by the Samsung Exynos 2400 NPU, which\
  \ offers 34.7 TOPS for AI processing and 12 GB LPDDR5X memory. \n\nDesign a comprehensive data quality\
  \ and validation system for this on-device ML pipeline. Your design must address:\n1.  **Schema validation:**\
  \ How would you ensure incoming sensor data conforms to expected formats and types?\n2.  **Data contracts:**\
  \ How would you define and enforce agreements with upstream data sources (e.g., sensor drivers, pre-processing\
  \ modules) to prevent silent data issues?\n3.  **Quality gates:** What mechanisms would you implement\
  \ to prevent malformed or out-of-distribution data from reaching the ML model?\n4.  **Lineage tracking:**\
  \ How would you maintain visibility into data transformations and origins within the constrained mobile\
  \ environment?\n5.  **Anomaly detection:** How would you identify and handle unexpected patterns or\
  \ outliers in the sensor data stream or model inferences?\n\nCrucially, your design must consider the\
  \ limitations of a mobile environment, specifically optimizing for the Exynos 2400 NPU's specifications\
  \ (34.7 TOPS, 12 GB LPDDR5X) regarding computational budget, memory footprint, power consumption, and\
  \ latency requirements. Justify your architectural choices with these constraints in mind."
question: "**Anomaly detection:** How would you identify and handle unexpected patterns or outliers in the sensor data stream or model inferences?"
details:
  realistic_solution: 'A realistic solution would involve:

    1.  **Schema Validation:** Lightweight, compile-time schema definitions (e.g., Protobuf, FlatBuffers)
    with minimal runtime validation overhead. Use generated code for serialization/deserialization with
    built-in type checking.

    2.  **Data Contracts:** Clearly defined API contracts between modules, possibly enforced with unit
    tests and integration tests simulating edge cases. Versioning of data schemas.

    3.  **Quality Gates:** Simple, fast statistical checks (e.g., range checks, NaN/inf detection, basic
    distribution checks) implemented as custom NPU operations or tightly integrated pre-processing steps.
    Quantized, small anomaly detection models (e.g., tiny autoencoders, one-class SVMs) running on the
    NPU.

    4.  **Lineage Tracking:** Minimal metadata propagation (e.g., timestamp, source ID, version hash)
    embedded within data samples or in a lightweight, in-memory buffer. Aggregated logging for intermittent
    upload.

    5.  **Anomaly Detection:** On-device, NPU-accelerated anomaly detection using simple statistical models
    (e.g., moving averages, IQR) or highly optimized, quantized neural networks (e.g., shallow LSTMs,
    small autoencoders) deployed to leverage the 34.7 TOPS for real-time inference without significant
    power draw.'
  common_mistake: Candidates often propose server-side validation or heavy-weight data pipeline solutions
    that are not feasible for on-device execution due to resource constraints (TOPS, memory, power). Another
    common mistake is overlooking the need for lightweight, NPU-optimized anomaly detection, or failing
    to integrate validation steps directly into the on-device inference graph efficiently.
  napkin_math: "Given 34.7 TOPS for AI processing, if a typical sensor reading (e.g., a frame of accelerometer\
    \ data) requires 100 GOPS for primary inference, you have ~346 sensor readings per second capacity.\
    \ If you aim for 30 FPS, ~3,000 GOPS (3 TOPS) are used. This leaves ~34.7 - (0.1 TOPS * 30 FPS) =\
    \ 34.7 - 3 = 31.7 TOPS for data quality. \n\n- **Latency Budget:** If a total inference loop has 100ms\
    \ budget, and the core ML model takes 80ms, only 20ms remains for all pre-processing, validation,\
    \ and post-processing. Data quality checks must fit within this.\n- **Memory Footprint:** With 12\
    \ GB LPDDR5X, a small fraction (e.g., <100MB) can be allocated for validation models, metadata, and\
    \ buffers to avoid impacting primary model loading or system performance."
