title: Realizing a Hybrid On-Device and Cloud Compound AI Pipeline on Tensor G3
scenario: 'A Tensor G3 (7.5 TOPS, 12GB) app implements a hybrid compound AI pipeline: on-device embedding+retrieval
  (always local for privacy), with LLM generation either on-device (1B, 8 tok/s) or cloud-offloaded (GPT-4-class,
  100ms+generation). The switching decision happens per-query. Network RTT to cloud API is 80ms. Implement
  the decision logic and state handoff to ensure the correct context is available on whichever path executes.'
details:
  realistic_solution: 'Context sanitization before cloud offload: (1) PII scrubbing: run a fast regex
    + small classifier (5M model, 2ms) to detect and redact PII from retrieved chunks before cloud transmission.
    (2) Truncation to API budget: max 2000 tokens to keep API cost low. (3) Decision logic: route to cloud
    if: battery > 30% AND network_rtt < 200ms AND query_sensitivity_score < 0.5 (non-sensitive per classifier).
    On-device otherwise. State handoff: for cloud path, send sanitized_context + query + system_prompt
    (total < 2000 tokens). For on-device, send full retrieved context (no sanitization needed). Results
    are identical format — UI renders same way.'
  common_mistake: Sending the raw retrieved document chunks to the cloud API without truncating them to
    fit the API's token limits and without removing any personally identifiable information (PII) that
    was intentionally kept on-device. The privacy-preserving design is violated if full document text
    is sent to the cloud.
  napkin_math: 'On-device path: embed(133ms) + FAISS(5ms) + LLM prefill(224ms) + generate 50 tokens(6.25s)
    = 6.6s. Cloud path: embed(133ms) + FAISS(5ms) + PII scrub(2ms) + network(80ms) + cloud_gen(200ms)
    = 420ms. Cloud is 15.7x faster for same 50-token output. Battery: on-device LLM: 5W * 6.25s = 31.25J.
    Cloud: 5W*0.138s(embed+search) + 0.1W*0.282s(network idle) = 0.69+0.028=0.718J. Cloud saves 97.7%
    energy per query. Route to cloud whenever battery < 50% and network available — saves significant
    battery.'
