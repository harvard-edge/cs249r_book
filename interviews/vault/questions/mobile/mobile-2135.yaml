title: Wi-Fi Mesh Ring Mapping
scenario: A decentralized swarm of 8 robots uses Wi-Fi 6E mesh to synchronize a 15MB
  map via Ring AllReduce. The mesh relies on spanning tree protocol with a 50ms hop
  latency.
question: Create a topology-aware collective scheduling algorithm that minimizes total
  synchronization time, avoiding the degradation of a logical ring mapping onto a
  physical star.
details:
  realistic_solution: Mapping a logical ring over a physical spanning tree forces
    traffic through the central hub, doubling the hop count per step. The custom topology
    must replace the ring with a reduction tree matched exactly to the spanning tree,
    eliminating the 2x hop penalty and bounding sync latency to the tree depth.
  common_mistake: Blindly mapping a logical ring algorithm directly onto a physical
    star/tree mesh, causing central node congestion and doubling hop penalties.
  napkin_math: Logical ring sync = 7 steps * 2 hops * 50ms = 700ms. Tree sync = 3
    depth * 50ms = 150ms.
