title: The Depthwise Dividend
scenario: "You're a mobile ML engineer optimizing a real-time video filter. The main bottleneck is a standard 3x3 convolutional layer. Your colleague suggests replacing it with a 3x3 depthwise separable convolution."
question: "What is the approximate reduction in computational cost (FLOPs) for that single layer?"
details:
  realistic_solution: 'A depthwise separable convolution replaces a single, expensive standard convolution with two cheaper layers: a depthwise convolution (one filter per input channel) and a pointwise convolution (a 1x1 convolution to combine the outputs). The computational savings are typically around 8-9x for a 3x3 kernel.'
  common_mistake: |
    **The Pitfall:** Confusing the reduction in parameters with the reduction in computation, or ignoring the pointwise convolution.
    **The Rationale:** Engineers often only consider the depthwise part of the operation and forget to add the cost of the subsequent 1x1 pointwise convolution.
    **The Consequence:** A wild overestimation of the computational savings.
  napkin_math: |
    - The computational cost of a standard convolution is proportional to `K^2 * C_in * C_out`.
    - A depthwise separable convolution splits this into depthwise (`K^2 * C_in`) and pointwise (`C_in * C_out`).
    - The reduction ratio is `(K^2 * C_in + C_in * C_out) / (K^2 * C_in * C_out) = 1/C_out + 1/K^2`.
    - For a 3x3 kernel, `1/K^2` is `1/9`. Assuming `C_out` is large, the `1/C_out` term becomes negligible.
    - **Conclusion:** The reduction is roughly **1/9** (or an 8-9x reduction).
  options:
  - ~2x reduction
  - ~8-9x reduction
  - ~64x reduction
  - ~1x (no significant change)
  correct_index: 1
