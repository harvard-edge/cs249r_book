title: The Depthwise Dividend
scenario: You are a mobile ML engineer optimizing a real-time video filter. The main bottleneck is a standard 3x3 convolutional layer. A colleague suggests replacing it with a 3x3 depthwise separable convolution.
question: What is the approximate reduction in computational cost (FLOPs) for that single layer?
details:
  realistic_solution: 'A depthwise separable convolution replaces a single standard convolution with a depthwise convolution and a pointwise (1x1) convolution. The computational savings are typically around 8-9x for a 3x3 kernel, as the dense scaling drops drastically.'
  common_mistake: |
    **The Pitfall:** Confusing the reduction in parameters with the reduction in computation, or ignoring the pointwise convolution entirely.
    **The Rationale:** Engineers often only consider the depthwise part of the operation and forget to add the cost of the subsequent 1x1 pointwise convolution.
    **The Consequence:** A wild overestimation of the computational savings.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Standard convolution cost: K^2 * C_in * C_out * H * W.
       - Depthwise separable cost: (K^2 * C_in * H * W) + (C_in * C_out * H * W).
       - Kernel size (K): 3.
    2. **Calculations:**
       - Reduction ratio: (K^2 * C_in + C_in * C_out) / (K^2 * C_in * C_out) = 1/C_out + 1/K^2.
       - For a 3x3 kernel, 1/K^2 is 1/9. Assuming C_out is large, the 1/C_out term becomes negligible.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Reduction**. The reduction is roughly 1/9 (or an 8-9x reduction).
  options:
  - '~2x reduction (Trap: Underestimating quadratic scaling)'
  - ~8-9x reduction
  - '~64x reduction (Trap: Squaring the number of channels instead of kernel)'
  - ~1x (no significant change)
  correct_index: 1
