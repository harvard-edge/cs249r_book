title: LLM KV Cache Allocation Strategy on Tensor G3
scenario: 'You are deploying a 1.8B parameter on-device LLM (similar to Gemini Nano) on the Google Tensor G3, which features an on-device TPU and 12 GB of LPDDR5X shared memory. The system restricts the LLM process to a strict 2.5 GB memory budget to prevent OS-level eviction of essential background apps. You must choose between two KV cache management strategies for a multi-turn chat feature: Alternative A uses static pre-allocation of a maximum-length KV buffer at initialization, while Alternative B uses dynamic block-based allocation (like PagedAttention) to minimize memory usage for short prompts.'
question: "Should a 1.8B LLM on Tensor G3 use static or PagedAttention-style KV allocation under a 2.5 GB budget?"
details:
  realistic_solution: Alternative A (Static pre-allocation) is the superior choice for mobile deployment. Because mobile inference typically operates at a batch size of 1, the theoretical memory savings from dynamic allocation do not outweigh the risks of memory fragmentation. Pre-allocating the maximum required KV cache ensures a fixed, predictable memory footprint, completely avoiding runtime fragmentation and guaranteeing that the app will not suddenly trigger the Android low-memory killer (LMK) during prolonged usage.
  common_mistake: |
    **The Pitfall:** Blindly recommending dynamic block allocation (PagedAttention).
    **The Rationale:** Candidates know this is state-of-the-art for server-side LLMs and incorrectly apply it to batch=1 mobile environments.
    **The Consequence:** Dynamic allocation introduces severe memory fragmentation over time, triggering unpredictable Android Low Memory Killer (LMK) app crashes.
  napkin_math: |
    - **Memory Budget:** Total 2.5 GB. Weights: 1.8B @ INT8 = **1.8 GB**.
    - **Remaining Memory:** 2.5 GB - 1.8 GB = **700 MB**.
    - **KV Cache per Token:** 2 (K,V) * 16 layers * 2048 hidden dim * 2 bytes (FP16) = 131,072 bytes = **128 KiB**.
    - **Max Static KV Cache (2048 tokens):** 128 KiB * 2048 = 262,144 KiB = **256 MiB (~268 MB)**.
    - **Conclusion:** 268 MB comfortably fits inside the 700 MB budget. Static pre-allocation is safe and completely avoids fragmentation.
