title: Evaluating End-to-End Compound Pipeline Quality on Tensor G3 with a RAG Evals Suite
scenario: A Tensor G3 (7.5 TOPS, 12GB) on-device RAG system achieves individual stage metrics: retrieval recall@5=0.83, reranker NDCG@3=0.79, LLM groundedness=0.88 (fraction of claims traceable to retrieved docs). End-to-end user satisfaction (human eval on 100 queries) is only 0.61.
question: How would you evaluate the gap between individual stage metrics and the 0.61 end-to-end satisfaction score?
details:
  realistic_solution: 'Analyze error modes: (1) Retrieval miss (17% of queries): LLM receives irrelevant context, generates hallucinated answer — users rate these 0.1 satisfaction. Contribution: 0.17 * (1-0.1) = 0.153 satisfaction drag. (2) Reranker error (21% of remaining): correct doc retrieved but ranked below cutoff — LLM misses it. Contribution: 0.83 * 0.21 * 0.5 satisfaction drag = 0.087. (3) Grounding failure (12% remaining): LLM generates plausible but unsupported claims. 0.83*0.79*0.12 = 0.079 drag. Total drag: 0.153+0.087+0.079=0.319 from perfect 1.0 → theoretical max: 1-0.319=0.681. Observed 0.61 — additional 0.07 drag from response style issues (too verbose, wrong format). Primary fix target: retrieval recall (highest impact at 0.153).'
  common_mistake: |
    **The Pitfall:** Multiplying independent metrics (0.83 * 0.79 * 0.88 = 0.577) and assuming the 0.61 score is acceptable.
    **The Rationale:** Data scientists treat RAG stages as statistically independent events.
    **The Consequence:** Ignoring that errors compound in correlated ways (a bad retrieval leads to a confidently wrong LLM hallucination), masking the outsized damage caused by the retrieval stage.
  napkin_math: |
    1. **Naive Product Multiplication:** 0.83 * 0.79 * 0.88 = 0.577.
    2. **Retrieval Miss Error Drag:** 17% of queries have bad retrieval. 0.17 * (1.0 possible - 0.1 actual) = 0.153 satisfaction drag.
    3. **Reranker Error Drag:** Of the 83% successfully retrieved, 21% miss the cutoff. 0.83 * 0.21 * 0.5 impact = 0.087 drag.
    4. **Grounding Failure Drag:** 0.83 * 0.79 * 0.12 failure rate = 0.079 drag.
    **Retrieval misses cause the largest drag (0.153); improving recall from 0.83 to 0.93 would raise end-to-end satisfaction by roughly 0.10.**
