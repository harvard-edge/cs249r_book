title: The MobileNet Multiplier
scenario: 'When designing a CNN for a mobile device like a smartphone, engineers often replace standard 3x3 convolutions with 3x3 depthwise separable convolutions, a core component of architectures like MobileNet.'
question: 'What is the main advantage of replacing standard 3x3 convolutions with depthwise separable convolutions on mobile?'
details:
  realistic_solution: 'The primary advantage is a significant reduction in computational cost (FLOPs/MACs). It factors spatial filtering and channel combination into two much cheaper steps, dramatically lowering NPU execution time.'
  common_mistake: |
    **The Pitfall:** Confusing FLOP reduction with secondary memory sizing benefits.
    **The Rationale:** Engineers loosely associate efficiency with parameter counts rather than operational math intensity.
    **The Consequence:** Falsely analyzing model bottlenecks and optimizing the wrong resource when designing mobile vision architectures.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - C_in = 64, C_out = 128, Kernel = 3x3.
    2. **Calculations:**
       - Standard 3x3: 3 × 3 × 64 × 128 = 73,728 MACs.
       - Depthwise Separable: Depthwise (3 × 3 × 64) + Pointwise (1 × 1 × 64 × 128) = 576 + 8,192 = 8,768 MACs.
       - Efficiency Factor: 73,728 / 8,768 = 8.4x reduction.
    3. **Conclusion & Interpretation:**
       **Result: Compute-Bound Optimization.** Operations drop by an **8.4x factor**, directly lowering NPU execution time.
  options:
  - 'It significantly reduces the number of multiply-accumulate operations (MACs).'
  - 'It primarily reduces the peak activation memory needed during inference.'
  - 'It improves the model''s theoretical accuracy by capturing more complex spatial features.'
  - 'It reduces operations by roughly a 2.5x factor due to smaller spatial kernels.'
