title: The MobileNet Multiplier
scenario: When designing a CNN for a mobile device like a smartphone, engineers often replace standard
  3x3 convolutions with 3x3 depthwise separable convolutions, a core component of architectures like MobileNet.
  State the primary advantage of this substitution.
question: "What is the main advantage of replacing standard 3x3 convolutions with depthwise separable convolutions on mobile?"
details:
  realistic_solution: 'The primary advantage is a significant reduction in computational cost (FLOPs/MACs).
    A standard convolution performs filtering and channel combination in one step. A depthwise separable
    convolution factors this into two much cheaper steps: a ''depthwise'' step that applies a single filter
    to each input channel independently, and a ''pointwise'' step (a 1x1 convolution) that linearly combines
    the outputs of the depthwise step. This factorization dramatically lowers the required computation.'
  common_mistake: Engineers often confuse the primary benefit (a massive reduction in computation) with
    secondary effects like model size reduction. While related, the core motivation is reducing the number
    of FLOPs to meet the strict latency and power budgets of mobile NPUs. Another mistake is believing
    this efficiency comes for free; it's a trade-off that can slightly reduce model accuracy.
  napkin_math: 'Compare the operations for a 1x1 spatial map. Standard 3x3 Conv MACs: 3 * 3 * C_in * C_out
    = 9 * 64 * 128 = 73,728 MACs. Depthwise Separable MACs: Depthwise (3 * 3 * 64) + Pointwise (1 * 1
    * 64 * 128) = 576 + 8,192 = 8,768 MACs. The substitution drops compute from 73,728 to 8,768 MACs,
    an 8.4x efficiency gain.'
  options:
  - It significantly reduces the number of multiply-accumulate operations (MACs).
  - It primarily reduces the peak activation memory needed during inference.
  - It improves the model's theoretical accuracy by capturing more complex spatial features.
  - It allows the model to run on CPUs by avoiding unsupported NPU operations.
  correct_index: 0
