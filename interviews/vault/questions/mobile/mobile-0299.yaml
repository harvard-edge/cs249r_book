title: The A17 Pro's Arithmetic Intensity
scenario: A real-time video filter layer on an Apple A17 Pro performs 700 GOPs and reads 2 GB of data from system RAM per second. The A17 Pro Neural Engine has a peak of 35 TOPS (INT8) and 51.2 GB/s memory bandwidth.
question: Is this specific layer compute-bound or memory-bound based on its arithmetic intensity?
details:
  realistic_solution: To determine the bottleneck, we must compare the workload's Arithmetic Intensity (AI) to the hardware's ridge point. The ridge point is where the performance ceiling transitions from being memory-bound to compute-bound.
  common_mistake: |
    **The Pitfall:** Concluding a layer is compute-bound solely because it performs many operations.

    **The Rationale:** Failing to calculate the hardware's ridge point and compare it against the workload's arithmetic intensity.

    **The Consequence:** Wasting effort optimizing compute (e.g., pruning) when the bottleneck is memory bandwidth.
  napkin_math: |
    *   Workload Arithmetic Intensity (AI): 700 GOPs / 2 GB = 350 Ops/Byte.
    *   A17 Pro Ridge Point: 35 TOPS / 51.2 GB/s = 683 Ops/Byte.
    *   Comparison: 350 Ops/Byte < 683 Ops/Byte.
    *   **Result:** The layer is strictly memory-bound.
  options:
  - Compute-bound, because its Arithmetic Intensity of 350 Ops/Byte is much greater than the A17's ridge point of ~0.68 Ops/Byte.
  - Compute-bound, because the workload's Arithmetic Intensity (350 Ops/Byte) is less than the hardware's ridge point (~684 Ops/Byte).
  - Memory-bound, because the workload's Arithmetic Intensity (350 Ops/Byte) is less than the A17 Pro's ridge point (~684 Ops/Byte).
  - Memory-bound, because 2 GB/s is a large amount of data, which always indicates a memory bottleneck on mobile.
  correct_index: 2
