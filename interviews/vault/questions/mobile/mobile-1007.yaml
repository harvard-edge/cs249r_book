title: 'Network Bandwidth Bottlenecks: Evaluate Speculative Decoding Bandwidth Impact on Mobile'
scenario: Evaluate whether speculative decoding (using a 100M INT8 draft model + 3B INT4 target model) improves TPOT on a Snapdragon 8 Gen 3. The draft model generates 4 tokens per step, and the target model verifies them.
question: On Snapdragon 8 Gen 3, does a 100M draft plus 3B INT4 target improve TPOT after bandwidth costs?
details:
  realistic_solution: 'Expected tokens per speculative decoding step with K=4 proposals and α=0.8: (1 - 0.8^5)/(1 - 0.8) = 3.36. Target model weights: 3B INT4 = 1.5GB. Bandwidth: 77 GB/s. Reading target weights takes 1.5 / 77 = 19.5ms. The draft model (100M INT8 = 100MB) must be read 4 times, taking 4 × 100MB / 77 GB/s = 5.2ms. Total step time = 19.5 + 5.2 = 24.7ms. Generating 3.36 tokens in 24.7ms yields an effective TPOT of 24.7 / 3.36 = 7.35ms/token. Without speculative decoding, TPOT is 19.5ms. Speculative decoding improves TPOT by ~2.65x.'
  common_mistake: |
    **The Pitfall:** Assuming speculative decoding speeds up mobile inference without doing the bandwidth math.
    **The Rationale:** Ignoring the fact that the draft model weights must be read from memory K times per step.
    **The Consequence:** Implementing complex speculative decoding that actually degrades mobile performance due to bandwidth saturation.
  napkin_math: |
    1. **Assumptions & Constraints:** Snapdragon 8 Gen 3 (77 GB/s bandwidth). Draft: 100M INT8 (100MB). Target: 3B INT4 (1.5GB). K=4 proposals, α=0.8.
    2. **Calculations:**
       - Expected tokens per step: (1 - 0.8^5) / (1 - 0.8) = 3.36 tokens.
       - Target step read time: 1.5 GB / 77 GB/s = 19.5ms.
       - Draft step read time (4 passes): (4 * 100 MB) / 77 GB/s = 5.2ms.
       - Total step time: 19.5ms + 5.2ms = 24.7ms.
       - Effective TPOT: 24.7ms / 3.36 tokens = 7.35ms/token.
    3. **Conclusion & Interpretation:** **Speculative decoding yields a 2.65x speedup over the 19.5ms standard TPOT. Result: Memory-Bandwidth Bound.**
