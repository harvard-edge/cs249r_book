title: 'Network Bandwidth Bottlenecks: Evaluate Speculative Decoding Bandwidth Impact
  on Mobile'
scenario: Evaluate whether speculative decoding (using a 100M draft model + 3B INT4
  target model) improves TPOT on Snapdragon 8 Gen 3 (16GB, 77 GB/s). The draft model
  generates 4 tokens per step, target model verifies. Compare total bandwidth consumption
  and effective TPOT.
question: On Snapdragon 8 Gen 3, does a 100M draft plus 3B INT4 target improve TPOT
  after bandwidth costs?
details:
  realistic_solution: 'Expected tokens per speculative decoding step with K=4 proposals
    and α=0.8: (1 - 0.8^5)/(1 - 0.8) = 3.36. Target model weights: 3B INT4 = 1.5GB.
    Bandwidth: 77 GB/s. Reading target weights takes 1.5 / 77 = 19.5ms. The draft model (100M INT8 = 100MB)
    must be read 4 times, taking 4 × 100MB / 77 GB/s = 5.2ms. Total step time = 19.5 + 5.2 = 24.7ms.
    Generating 3.36 tokens in 24.7ms yields an effective TPOT of 24.7 / 3.36 = 7.35ms/token.
    Without speculative decoding, TPOT is 19.5ms. Speculative decoding improves TPOT by ~2.65x.'
  common_mistake: Assuming speculative decoding speeds up mobile inference the same
    as server-side without doing the bandwidth math (ignoring the fact that the draft model must be read K times);
    or incorrectly calculating the expected tokens using K instead of K+1 in the sum formula.
  napkin_math: 'Speculative decoding with K=4 draft tokens, acceptance rate α=0.8:
    E[accepted tokens] = sum_{k=0}^{K} α^k = (1 - α^(K+1)) / (1 - α) = (1 - 0.8^5) / (1 - 0.8)
    = (1 - 0.32768) / 0.2 = 3.36.
    Draft step time = 4 × 100MB / 77 GB/s = 5.2ms.
    Target step time ≈ 1.5GB / 77 GB/s = 19.5ms.
    Total step time = 24.7ms.
    Effective TPOT = 24.7ms / 3.36 = 7.35ms/token.
    Standard TPOT = 19.5ms / 1 = 19.5ms/token.'
