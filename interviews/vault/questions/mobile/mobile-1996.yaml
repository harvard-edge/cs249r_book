title: Diffusion Model Memory Bound Check
scenario: An on-device diffusion model runs 20 unrolled denoising steps on a Snapdragon
  8 Gen 3 (45 TOPS peak, 50 GB/s bandwidth).
question: Evaluate total MACs per step and implement an arithmetic intensity check
  to prove whether generation is compute-bound or memory-bound.
details:
  realistic_solution: Assume the UNet requires 1 Tera-MAC (2 TFLOPs) per step and
    weights are 2GB. Compute time per step at 45 TOPS is 2 TFLOPs / 45 TOPS = 44ms.
    Memory time per step is loading 2GB / 50 GB/s = 40ms. The arithmetic intensity
    is 2 TFLOPs / 2GB = 1000 FLOPs/byte. Since the hardware ratio is 45 TOPS / 50
    GB/s = 900 FLOPs/byte, the system is closely balanced but slightly compute-bound
    for a batch size of 1.
  common_mistake: Assuming diffusion models are entirely memory bound like LLMs; because
    CNN-based UNets reuse weights spatially, they have much higher arithmetic intensity.
  napkin_math: 45 TOPS / 50 GB/s = 900 OPs/byte. Model ratio = 1000 OPs/byte.
