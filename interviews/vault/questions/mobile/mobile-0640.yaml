title: Architecting a Multi-Model On-Device AI Assistant
scenario: 'You''re designing the on-device AI system for a next-generation smartphone assistant that must
  simultaneously support: (1) always-on wake word detection, (2) streaming speech recognition, (3) a 3B
  parameter LLM for reasoning, (4) text-to-speech for responses, and (5) real-time vision for ''point
  your camera and ask'' queries. The target device is the Apple A18 Pro (35 TOPS ANE, 8 GB RAM, 6-core
  CPU, 6-core GPU). All five models cannot fit in memory simultaneously. Design the memory management
  and scheduling system.'
details:
  realistic_solution: 'Design a **state-machine-driven model orchestrator** that loads models on-demand
    based on the conversation state:'
  common_mistake: '"Load all models at startup and keep them resident." Total model memory: wake word
    (500 KB) + ASR (200 MB) + LLM (1.7 GB INT4) + TTS (150 MB) + vision (300 MB) = 2.35 GB of weights
    alone. Add activation buffers, KV-cache, and framework overhead: ~4.5 GB total. On an 8 GB device
    with ~4 GB available to apps: it barely fits, leaving zero headroom for the OS, other apps, or memory
    spikes. iOS will kill your app within minutes.'
  napkin_math: 'Total model weights: 2.35 GB. Peak resident (worst state): 2.5 GB. Available memory: ~4
    GB. Headroom: 1.5 GB (safe). State transition latency: ASR load: 200 MB / 3 GB/s = 67 ms. LLM load:
    1.7 GB / 3 GB/s = 567 ms. With pre-loading: ~200 ms. TTS load: 150 MB / 3 GB/s = 50 ms. Total user-perceived
    latency from wake word to first response token: wake word (50 ms) + ASR streaming (~500 ms after speech
    ends) + LLM load (200 ms with pre-load) + first token (45 ms) = ~800 ms. Comparable to cloud assistants
    (~600 ms) but fully private. Energy per query: ASR (200 mW × 3 sec) + LLM (3W × 5 sec) + TTS (500
    mW × 3 sec) = 0.6 + 15 + 1.5 = 17.1 J. Battery: 17.1 / (16.8 Wh × 3600) = 0.028%. ~3500 queries per
    charge.'
