title: Architecting a Multi-Model On-Device AI Assistant
scenario: You're designing the on-device AI system for a next-generation smartphone assistant that must simultaneously support always-on wake word detection, streaming speech recognition, a 3B parameter LLM for reasoning, text-to-speech for responses, and real-time vision for 'point your camera and ask' queries. The target device is an Apple A18 Pro (8 GB RAM). All five models cannot fit in memory simultaneously.
question: How should the system orchestrate and schedule the wake word, ASR, 3B LLM, TTS, and vision models given the memory constraints?
details:
  realistic_solution: 'Design a **state-machine-driven model orchestrator** that loads models on-demand based on the conversation state:'
  common_mistake: |
    **The Pitfall:** Assuming all models can be kept permanently resident in RAM.
    **The Rationale:** Engineers sum up the weights and see it mathematically fits within the 8 GB total RAM spec.
    **The Consequence:** Completely ignoring the OS, other apps, activation buffers, KV-caches, and framework overhead, causing iOS to aggressively kill the app within minutes due to memory pressure.
  napkin_math: |
    1. Total model weights: 2.35 GB. Peak resident (worst state): 2.5 GB.
    2. Available memory safely left for app: ~4 GB (leaving 1.5 GB headroom).
    3. State transition latency: ASR load (200 MB / 3 GB/s = 67 ms), LLM load (1.7 GB / 3 GB/s = 567 ms, or ~200 ms with pre-load).
    4. Total user-perceived latency (wake word to first token): 50 ms (wake word) + ~500 ms (ASR streaming) + 200 ms (LLM pre-load) + 45 ms (first token) = ~800 ms.
    5. **Result: Fits safe memory bounds and achieves ~800 ms latency, directly comparable to cloud assistants (~600 ms) but fully private.**
