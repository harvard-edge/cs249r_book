title: The Battery Tax of Federated Learning
scenario: You are designing a federated learning system to fine-tune a keyboard prediction model directly
  on user smartphones. The training process runs in the background for a few minutes each day. From the
  user's perspective, what is the most critical resource consumed during this on-device training that
  creates a direct economic risk (e.g., user churn) for your application?
question: ", user churn) for your application?"
details:
  realistic_solution: The primary resource is the user's battery life. On-device training requires sustained
    SoC activity, which consumes significant power. This consumption directly reduces the phone's battery
    percentage, a highly visible and sensitive metric for users. If an application is perceived as a 'battery
    hog,' it faces a high risk of being uninstalled, leading to user churn and direct economic loss for
    the business.
  common_mistake: Engineers from a cloud background often incorrectly identify network bandwidth (for
    model updates) or on-device storage as the primary cost. While these are engineering constraints,
    they do not impact the user's daily experience as viscerally or consistently as battery drain. Users
    are highly sensitive to apps that reduce their device's uptime.
  napkin_math: 'Let''s estimate the daily battery cost. On-device training might draw ~2W of sustained
    power from the SoC. If training runs for 5 minutes (300 seconds) a day, the energy consumed is: `2
    W * 300 s = 600 Joules`. A typical smartphone battery is ~15 Wh, which is `15 Wh * 3600 J/Wh = 54,000
    Joules`. The daily training ''tax'' is `(600 J / 54,000 J) ≈ 1.1%` of the user''s total battery life.
    While small, this daily cost is cumulative and often happens alongside other app activities, making
    it a noticeable drain.'
  options:
  - Network bandwidth for model updates
  - On-device flash storage for the model
  - User battery life
  - On-device RAM for model parameters
  correct_index: 2
