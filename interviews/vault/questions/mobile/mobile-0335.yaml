title: The Battery Tax of Federated Learning
scenario: You are designing a federated learning system to fine-tune a keyboard prediction model directly on user smartphones. The training process runs in the background for a few minutes each day.
question: What is the most critical resource consumed during on-device training that risks user churn?
details:
  realistic_solution: The primary resource is the user's battery life. On-device backpropagation requires sustained SoC activity, which consumes significant power. This continuous thermal and energy draw directly impacts the battery percentage. If an application is perceived as a background battery drainer, the OS will flag it, leading to uninstallation and direct user churn.
  common_mistake: |
    **The Pitfall:** Misidentifying the primary user-facing resource cost.
    **The Rationale:** Engineers from a cloud background often incorrectly identify network bandwidth or on-device storage as the primary cost.
    **The Consequence:** They fail to optimize for sustained SoC power draw, leading to noticeable battery drain and high app uninstallation rates (churn).
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Training power draw: ~2 W.
       - Time per day: 5 minutes (300 seconds).
       - Typical smartphone battery: ~15 Wh (54,000 Joules).
    2. **Calculations:**
       - Energy consumed: 2 W * 300 s = 600 Joules.
       - Daily training tax: (600 J / 54,000 J) = 1.11%.
    3. **Conclusion & Interpretation:**
       - **Result: 1.11% battery drain.** The background training is strictly **Energy-Bound** and highly visible to the user OS telemetry.
  options:
  - Network bandwidth for model updates.
  - On-device flash storage for the model.
  - User battery life.
  - A 1.1% RAM reduction causing memory swapping.
  correct_index: 2
