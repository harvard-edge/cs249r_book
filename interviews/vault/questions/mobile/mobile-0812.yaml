title: Mobile New 0012
scenario: A custom INT8 inference engine on a DSP runs fast but accuracy drops to zero. You notice all the intermediate output tensors are saturated exactly to the value of 127. The FP32 model does not have this issue.
question: "Why do all INT8 DSP intermediate tensors saturate to 127 and destroy accuracy?"
details:
  realistic_solution: The symptom of outputs uniformly pegging to 127 is a classic sign of accumulator overflow. When performing dot products of INT8 values, the sum can quickly exceed the 8-bit maximum (127). The DSP must accumulate intermediate MACs into a wider register (INT32). If the compiler or custom kernel erroneously sets the accumulator to INT8, every sum clips immediately.
  common_mistake: |
    **The Pitfall:** Using INT8 data types for both the operands and the accumulator.
    **The Rationale:** Engineers might attempt to save register space or simplify the kernel design by keeping all variables in the same INT8 format.
    **The Consequence:** The intermediate sums quickly exceed the 8-bit maximum (127) and saturate, destroying the numerical range and the model's accuracy.
  napkin_math: |
    * INT8 range: -128 to 127
    * Example MAC operation: 50 * 50 = 2500
    * 2500 > 127, so in an INT8 accumulator, 2500 saturates to 127.
    * Summing 100 such values: 250,000.
    * In INT32, the sum is safely represented as 250,000.
    * **In INT8, the sum stays clipped at 127, losing all accumulated information.**
