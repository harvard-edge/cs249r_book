title: Diagnosing Sustained Performance Degradation on Exynos 2400 NPU
scenario: Your team is deploying a new AI-powered real-time video analytics application on a mobile device featuring a 34.7 TOPS NPU. Initial benchmarks show the NPU achieving near its peak 34.7 TOPS during short, burst inference tasks. However, during continuous operation processing a 30-minute 4K video stream, the NPU's performance consistently degrades by over 60% within the first 5 minutes, stabilizing at a much lower throughput. The device enclosure becomes significantly warm, and users report dropped frames and latency spikes.
question: "How would you diagnose the root cause of this sustained performance degradation and propose solutions?"
details:
  realistic_solution: 1. **Instrumentation & Monitoring:** Utilize on-device diagnostic tools and APIs (e.g., Android's Thermal API, vendor-specific tools) to simultaneously monitor NPU temperature, clock frequency, voltage, power consumption, and overall system performance metrics (FPS, latency) during both burst and sustained workloads. Log these metrics alongside ambient temperature data. 2. **Profile Workloads:** Isolate the specific NPU tasks causing the highest thermal load. Determine if the throttling is primarily NPU-centric, or if other components (CPU, GPU, memory controller for the LPDDR5X) are contributing significantly to the thermal budget. 3. **Thermal Modeling & Analysis:** Correlate performance drops with specific temperature thresholds and frequency reductions. Understand the thermal envelope of the device and the Exynos 2400 NPU's sustained power limits. 4. **Mitigation Strategies:** (a) **Software-driven:** Implement dynamic frequency and voltage scaling (DVFS) governors that prioritize sustained performance over peak burst for continuous workloads. Introduce intelligent workload scheduling that allows for brief cool-down periods if possible, or distributes tasks across less thermally constrained cores/components. (b) **Application-level:** Dynamically adjust model complexity or inference frequency based on real-time thermal readings. For example, switch to a lighter model variant or reduce frame processing rate if temperature rises. (c) **Design review (if applicable):** If in the early stages, suggest improved thermal interface materials or heat spreading solutions within the mobile device's mechanical design.
  common_mistake: |
    **The Pitfall:** Immediately optimizing the ML model or suggesting external cooling without profiling the thermal envelope.
    **The Rationale:** Candidates often assume the model is just "too big" rather than understanding the difference between peak (burst) power delivery and the sustained thermal dissipation limits of a mobile SoC.
    **The Consequence:** The underlying thermal throttling issue remains unresolved because the system is still allowed to exceed its continuous thermal budget.
  napkin_math: |
    1. **Assumptions & Constraints:** Peak performance is 34.7 TOPS. Performance degrades by 60%.
    2. **Calculations:** Effective Sustained Performance = 34.7 * 0.40 = 13.88 TOPS.
    3. **Conclusion & Interpretation:** Performance drops by a factor of 3 to stabilize temperatures at **13.88 TOPS**. **Result: Thermal-Bound**.
