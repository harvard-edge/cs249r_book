title: 'Model Format Conversion: Optimize TFLite Model Conversion for Snapdragon DSP'
scenario: A TFLite model (EfficientNet-Lite0, 4.7M params, 390M MACs) converts to a mobile NPU. Initial deployment shows 45ms latency vs. 8ms target. Profile shows 60% of ops run on the NPU and 40% on CPU due to unsupported ops.
question: Why does an EfficientNet-Lite0 TFLite model converted through the SDK show 45 ms latency instead of the 8 ms target?
details:
  realistic_solution: "The extreme latency inflation is caused by graph fragmentation and CPU execution bottlenecking. Because 40% of the network's operations (e.g., unsupported activations like Swish) are rejected by the NPU compiler, the framework defaults to the CPU. Mobile CPUs possess vastly lower theoretical throughput (GOPS) compared to NPUs (TOPS). Executing 40% of the 390M MACs on a thermal-constrained mobile CPU takes over 30ms. Furthermore, the cross-domain transfers of activation tensors between the NPU SRAM and CPU DRAM incur a heavy NoC synchronization tax, ensuring the 8ms target is irrevocably missed."
  common_mistake: |
    **The Pitfall:** Adding more DSP acceleration without identifying specific unsupported ops.
    **The Rationale:** Candidates assume performance can be fixed by throwing more hardware at it rather than looking at CPU fallback caused by operations like Swish.
    **The Consequence:** Time is wasted on DSP tuning when the bottleneck is structurally bound to CPU execution.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Total model MACs: 390M.
       - CPU fallback: 40% of operations.
       - Mobile CPU throughput: ~10 GOPS.
    2. **Calculations:**
       - Fallback MACs: 390M * 0.40 = 156M MACs.
       - Total fallback operations: 156M MACs * 2 (multiply-accumulate) = 312M Ops.
       - Time taken on CPU: 312,000,000 Ops / 10,000,000,000 Ops/s = 0.0312 seconds (31.2ms).
    3. **Conclusion & Interpretation:**
       - **Result: CPU Throughput-Bound.** The 31.2ms pure computation time on the CPU directly explains the ~45ms total latency, making the 8ms target mathematically impossible without full NPU fusion.
