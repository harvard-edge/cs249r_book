title: 'Model Format Conversion: Optimize TFLite Model Conversion for Snapdragon DSP'
scenario: A TFLite model (EfficientNet-Lite0, 4.7M params, 390M MACs) converts to Snapdragon 8 Gen 3 via QNN SDK. Initial deployment shows 45ms latency vs. 8ms target. Profile shows 60% of ops run on DSP (HTP) and 40% on CPU due to unsupported ops.
question: Why does an EfficientNet-Lite0 TFLite model converted through QNN show 45 ms latency instead of the 8 ms target?
details:
  realistic_solution: 'The 45ms latency is driven by the 40% of ops falling back to the CPU. 40% of 390M MACs = 156M MACs. A mobile CPU core at 10 GOPS (gigaops, not teraops) computing 156M MACs (312M ops) takes 312M / 10G = 31.2ms. Adding DSP execution time and memory transfer overhead easily reaches ~45ms. If the CPU were capable of 10 TOPS, it would take 0.03ms, which is unrealistic.'
  common_mistake: |
    **The Pitfall:** Adding more DSP acceleration without identifying specific unsupported ops.
    **The Rationale:** Candidates assume performance can be fixed by throwing more hardware at it rather than looking at CPU fallback caused by operations like Swish.
    **The Consequence:** Time is wasted on DSP tuning when the bottleneck is structurally bound to CPU execution.
  napkin_math: |
    * Fallback MACs: 40% of 390M = 156M MACs.
    * Inference at 10 GOPS CPU: 156M MACs × 2 ops = 312M ops per inference.
    * Time taken: 312M / 10G = 31.2ms.
    * **The 31.2ms CPU fallback time directly explains why latency is ~45ms instead of the 8ms target.**
