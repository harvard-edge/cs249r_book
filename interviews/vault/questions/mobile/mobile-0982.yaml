title: 'Model Format Conversion: Optimize TFLite Model Conversion for Snapdragon DSP'
scenario: 'A TFLite model (EfficientNet-Lite0, 4.7M params, 390M MACs) converts to
  Snapdragon 8 Gen 3 (45 TOPS) via QNN (Qualcomm Neural Network) SDK. Initial deployment
  shows 45ms latency vs. 8ms target. Profile: 60% of ops run on DSP (HTP), 40% on
  CPU due to unsupported ops. Diagnose and quantify the fix.'
question: Why does an EfficientNet-Lite0 TFLite model converted through QNN show 45
  ms latency instead of the 8 ms target?
details:
  realistic_solution: '156M MAC model at 10 GOPS (gigaops, not teraops): 156M / 10G
    = 15.6ms. Using 10 TOPS would give 0.016ms which is unrealistic for this hardware
    class.'
  common_mistake: Adding more DSP acceleration without first identifying which specific
    ops are falling back to CPU; EfficientNet uses Swish activation which is often
    unsupported on DSPs.
  napkin_math: 'Model 156M params, inference at 10 GOPS (not TOPS): 156M × 2 ops =
    312M ops per inference. At 10 GOPS: 312M / 10G = 31.2ms ≈ 15.6ms if we count only
    156M MACs (not ×2): 156M / 10G = 15.6ms. The 10G (GOPS) vs 10T (TOPS) distinction:
    10 GOPS = 10×10^9 ops/s, giving 15.6ms. 10 TOPS would give 0.0156ms — wrong by
    1000×.'
