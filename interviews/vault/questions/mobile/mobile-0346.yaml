title: The Jank Budget (mobile-0346)
scenario: You're an ML systems engineer on a mobile team building a new real-time AR filter. To prevent visual stutter, or 'jank', your rendering pipeline must deliver a new frame before the screen refreshes.
question: What is the standard, non-negotiable latency budget for your ML model's inference on a typical smartphone?
details:
  realistic_solution: 'The standard latency budget is approximately 16.67ms. Derived from the 60Hz refresh rate of most mobile displays, all work for a given frame—including ML inference, CPU processing, and GPU rendering—must complete within this 16.67ms window.'
  common_mistake: |
    **The Pitfall:** Confusing the UI rendering budget with video capture framerates.
    **The Rationale:** Engineers apply latency budgets from different domains, like the ~100ms acceptable for a cloud API call.
    **The Consequence:** The model routinely misses the UI refresh deadline, resulting in dropped frames and a stuttering user experience.
  napkin_math: |
    **Assumptions & Constraints:**
    - Display Refresh Rate: 60Hz.
    - Overhead pipeline (Camera, CPU pre/post, GPU render): ~6 ms total.

    **Calculations:**
    - Per-Frame Time Budget: 1000 ms / 60 frames = 16.67 ms.
    - Available Inference Budget: 16.67 ms - 6.0 ms = 10.67 ms.

    **Conclusion & Interpretation:**
    - **Result: 16.67 ms strict deadline (Latency-Bound)**. Exceeding the 16.67 ms total frame time breaks the UI refresh cycle, resulting in perceptible dropped frames or 'jank'.
  options:
  - '100 ms'
  - '33 ms'
  - '16 ms'
  - '1 ms'
  correct_index: 2
