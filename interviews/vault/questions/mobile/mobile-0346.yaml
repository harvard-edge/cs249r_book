title: The Jank Budget (mobile-0346)
scenario: You're an ML systems engineer on a mobile team building a new real-time AR filter. To prevent
  visual stutter, or 'jank', your rendering pipeline must deliver a new frame before the screen refreshes.
  What is the standard, non-negotiable latency budget for your ML model's inference on a typical smartphone?
question: "What is the standard, non-negotiable latency budget for your ML model's inference on a typical smartphone?"
details:
  realistic_solution: The standard latency budget is approximately 16ms. This is derived from the 60Hz
    refresh rate of most mobile displays. To maintain a smooth user experience, all work for a given frame—including
    ML inference, CPU processing, and GPU rendering—must complete within this 16.67ms window (1000ms /
    60 frames).
  common_mistake: Engineers often confuse the UI rendering budget (tied to the screen's 60Hz or 120Hz
    refresh rate) with video capture framerates (like 30 FPS, which gives a 33ms budget). Others apply
    latency budgets from different domains, like the ~100ms acceptable for a cloud API call, which would
    be disastrously slow on mobile.
  napkin_math: '60Hz display → 1000ms/60 = 16.67ms per frame. Budget breakdown: camera capture ~2ms, ML
    inference ≤10ms, CPU post-process ~2ms, GPU render ~2ms = 16ms total. If inference exceeds 10ms →
    frame drop → visible jank. 120Hz displays: 8.33ms budget, even tighter. At 30 FPS (budget apps): 33ms
    budget, more relaxed. 16ms is the universal mobile ML latency bar.'
  options:
  - 100 ms
  - 33 ms
  - 16 ms
  - 1 ms
  correct_index: 2
