title: On-Device Async Checkpointing
scenario: Snapdragon 8 Gen 3 running training at 2 batches/sec. The app might be killed by OS OOM. UFS flash write blocks for 100ms.
question: How can you implement an asynchronous checkpointing mechanism that bounds data loss to 10 seconds without slowing the training loop?
visual:
  kind: svg
  path: mobile-1957.svg
  alt: Timeline showing compute phase overlapping with flash write phase in a separate thread
  caption: Asynchronous Thread Checkpointing
details:
  realistic_solution: 10s = 20 batches. Spawn a background I/O thread. Main thread memcpy() weights to RAM buffer every 20 batches (takes ~10ms). Background thread writes RAM to flash. Hides 100ms flash latency completely.
  common_mistake: |
    **The Pitfall:** Writing synchronously to flash every batch.
    **The Rationale:** Candidates prioritize preventing any data loss over maintaining high training throughput.
    **The Consequence:** Adding 100ms to every step, drastically cutting the 2 batches/sec throughput.
  napkin_math: |
    *   **Batch Rate:** 2 batches/sec.
    *   **Time Window:** 10 seconds = 20 batches.
    *   **RAM Copy Latency:** ~10 ms.
    *   **Flash Write Latency:** 100 ms.
    *   **Conclusion:** Doing a fast RAM copy every 20 batches (10 ms) on the main thread and writing to flash (100 ms) in the background hides the latency entirely.
