title: On-Device Async Checkpointing
scenario: Snapdragon 8 Gen 3 running training at 2 batches/sec. The app might be killed
  by OS OOM. UFS flash write blocks for 100ms.
question: Implement an asynchronous checkpointing mechanism that bounds data loss
  to 10 seconds without slowing the training loop.
visual:
  kind: svg
  path: mobile-1957.svg
  alt: Timeline showing compute phase overlapping with flash write phase in a separate
    thread
  caption: Asynchronous Thread Checkpointing
details:
  realistic_solution: 10s = 20 batches. Spawn a background I/O thread. Main thread
    memcpy() weights to RAM buffer every 20 batches (takes ~10ms). Background thread
    writes RAM to flash. Hides 100ms flash latency completely.
  common_mistake: Writing synchronously to flash every batch, which adds 100ms per
    step and drastically cuts the 2 batches/sec throughput.
  napkin_math: 10ms RAM copy << 100ms Flash write.
