title: Encoder-Decoder Memory Bandwidth Advantage
scenario: You are evaluating two 2B-parameter models for an on-device translation feature targeting the Qualcomm Hexagon NPU. The options are a 2B-parameter decoder-only model and an encoder-decoder model (1B encoder, 1B decoder). Profiling reveals that the encoder-decoder model generates tokens significantly faster during the decoding phase.
question: Why does a 1B/1B encoder-decoder translation model decode faster than a 2B decoder-only model on Hexagon NPU?
details:
  realistic_solution: |
    Autoregressive generation at batch size 1 is heavily memory-bandwidth bound, meaning the NPU's compute units spend most of their time waiting for weights from memory. The decoding speed is gated by how fast weights can be read from the shared LPDDR5X RAM. Since the encoder-decoder model only evaluates its 1B decoder parameters during generation, it transfers half the data per token compared to loading the full 2B weights of the decoder-only model, resulting in much faster token generation.
  common_mistake: |
    **The Pitfall:** Assuming total parameter count dictates decoding latency.
    **The Rationale:** Candidates expect both 2B models to perform equally, failing to recognize that during autoregressive generation, an encoder-decoder model only loads the decoder's weights.
    **The Consequence:** Incorrect model selection, missing out on significant memory bandwidth reductions.
  napkin_math: |
    - **Assumptions:** LPDDR5X memory bandwidth ~64 GB/s, INT8 quantization (1 byte/param).
    - **2B decoder-only:** Generating one token requires loading 2 GB of weights. 2 GB / 64 GB/s = 31.25 ms/token (max ~32 tokens/sec).
    - **1B/1B encoder-decoder:** Decoding step only loads 1 GB of decoder weights. 1 GB / 64 GB/s = 15.6 ms/token (max ~64 tokens/sec).
    - **Compute constraint:** NPU offers 45 TOPS; each token requires ~2-4 GOPs, so compute is not the bottleneck.
    - **Result:** **The system is memory-bandwidth bound, favoring the smaller active parameter count of the encoder-decoder model.**
