title: Snapdragon Split Compute Margin
scenario: A Snapdragon 8 Gen 3 partitions an image generation task, offloading 40%
  of operations to a cloud server. The input image size is 3 MB, and the round-trip
  latency to the cloud is 100 ms.
question: Create a system design that determines the minimum network bandwidth required
  to match the local NPU speed of 40 TOPS if the operations represent 12 T-Ops total.
visual:
  kind: svg
  path: mobile-1883.svg
  alt: Diagram showing task split between local NPU and Cloud.
  caption: Split computation latency paths.
details:
  realistic_solution: Total compute takes $12 / 40 = 300$ ms locally. Offloading 40%
    (4.8 T-Ops) takes $300 \times 0.4 = 120$ ms on the NPU. For offloading to be faster,
    sending 3 MB + 100 ms RTT + cloud compute must be $< 120$ ms. Assuming infinite
    cloud speed, transmission must be $< 20$ ms. Bandwidth needed is $3\text{MB} /
    0.02\text{s} = 150\text{MB/s}$ (1.2 Gbps).
  common_mistake: Ignoring the base network round-trip time, which consumes the entire
    latency budget before any data is sent.
  napkin_math: Budget = 120ms. RTT = 100ms. Transmission budget = 20ms. 3MB / 0.02s
    = 150 MB/s = 1.2 Gbps.
