title: Snapdragon Split Compute Margin
scenario: A Snapdragon 8 Gen 3 partitions an image generation task, offloading 40% of operations to a cloud server. The input image size is 3 MB, and the round-trip latency to the cloud is 100 ms.
question: "Create a system design that determines the minimum network bandwidth required to match the local NPU speed of 40 TOPS if the operations represent 12 T-Ops total."
visual:
  kind: svg
  path: mobile-1883.svg
  alt: Diagram showing task split between local NPU and Cloud.
  caption: Split computation latency paths.
details:
  realistic_solution: 'To be faster than local compute, the network transmission time must fit inside the time saved by offloading, minus the unavoidable base round-trip time.'
  common_mistake: |
    **The Pitfall:** Forgetting to subtract the base network RTT from the latency budget.
    **The Rationale:** Candidates often calculate bandwidth required simply based on data size and target time, missing that physics (speed of light/routing) consumes a fixed chunk of time before data transfer even matters.
    **The Consequence:** Designing a hybrid system that is fundamentally slower than doing all the math locally on the device.
  napkin_math: |
    - **Local Time:** 12 T-Ops / 40 TOPS = 0.3s = 300 ms.
    - **Offloaded Local Time:** The 40% (4.8 T-Ops) executed locally takes 300 ms * 0.4 = 120 ms.
    - **Budget:** For offloading to match local speed, the entire cloud round-trip (Upload + RTT + Cloud Compute + Download) must be < 120 ms.
    - **Transmission Budget:** Assuming infinite cloud speed, removing the 100 ms RTT leaves exactly 20 ms for data transmission.
    - **Final Result:** 3 MB / 0.02s = 150 MB/s, which equals **1.2 Gbps required bandwidth**.
