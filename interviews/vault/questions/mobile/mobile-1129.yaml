title: Always-On Vision Architecture for Exynos 2400
scenario: Design an always-on continuous object tracking architecture for the Samsung Exynos 2400 NPU (34.7 TOPS, 12 GB shared LPDDR5X). The system must process 30 FPS video indefinitely without thermal throttling.
question: How would you design an always-on continuous object tracking architecture for the Samsung Exynos 2400 NPU?
details:
  realistic_solution: |
    A robust design heavily prioritizes operator fusion and spatial tiling to keep intermediate feature maps entirely within the NPU's internal SRAM. The candidate should architect a network using memory-efficient blocks (like depthwise separable convolutions) to minimize footprint, deliberately accepting more compute operations (which are cheap) to avoid writing intermediate states to the shared LPDDR5X (which is highly expensive).
  common_mistake: |
    **The Pitfall:** Designing solely to maximize 34.7 TOPS compute utilization.
    **The Rationale:** Candidates propose architectures that spill intermediate activations to DRAM, forgetting that off-chip memory access dominates the energy budget.
    **The Consequence:** Excessive power draw from DRAM access causing rapid thermal throttling.
  napkin_math: |
    - **Unfused DRAM Spill:** Spilling a 10 MB activation map at 30 FPS costs: 10 MB * 2 (read+write) * 30 FPS * 100 pJ/byte = 60 mW.
    - **Fused SRAM Retention:** Keeping that data in SRAM costs: 10 MB * 2 * 30 FPS * 1 pJ/byte = 0.6 mW.
    - **Energy Savings:** 60 mW - 0.6 mW = 59.4 mW.
    - **Result:** **Fusing layers to avoid DRAM writes saves 99% of the data movement energy for that operation.**
