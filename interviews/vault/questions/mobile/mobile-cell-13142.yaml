title: 'Mobile TCO Implement: Calculate Cost Per Inference for Mobile App'
scenario: 'Implement the complete cost-per-inference calculation for a mobile LLM app using Snapdragon
  8 Gen 3 (45 TOPS INT8, 16GB, 4W). Model: Llama-3-8B INT4 (4GB). User makes 30 queries/day with 150 output
  tokens at 25 tok/s. Calculate: inference time, energy per inference, annual energy cost per user, and
  cost if monetizing electricity as a service (at $0.10/kWh markup).'
details:
  realistic_solution: 'Decode: 150 tokens at 25 tok/s = 6 seconds. Prefill (100 input tokens): Snapdragon
    8 Gen 3 prefill throughput ~500 tok/s = 0.2s. Total inference time: 6.2 seconds. Energy: 4W * 6.2s
    = 24.8J = 0.00689Wh per query. Annual: 30 * 365 * 0.00689Wh = 75.5Wh. Cost: 75.5 * $0.10/1000 = $0.00755/yr.
    At $0.10/kWh retail, cost-to-serve energy: $0.00755/yr per user. At 1M users: $7,550/yr total electricity
    cost from user device batteries. vs cloud serving 1M users: 1M*30*365*150*$0.001/1000=$1,642,500/yr.
    On-device saves $1.63M/yr in direct API costs.'
  common_mistake: Not separating prefill time (compute-bound) from decode time (memory-bandwidth-bound)
    in mobile inference, which have different power profiles.
  napkin_math: 'Inference time: 0.2s prefill + 6s decode = 6.2s. Energy: 4W*6.2s=24.8J=0.00689Wh. Annual/user:
    30*365*0.00689=75.5Wh=$0.00755. 1M users: $7,550/yr device energy. Cloud cost at same volume: 1M*30*365*150*$0.001/1000=$1,642,500/yr.
    Savings: $1,634,950/yr. Break-even model maintenance: $200K/yr for on-device model updates << $1.63M
    savings. On-device clearly wins at scale. Per-inference cost: $0.00755/(30*365)=$0.000000689=0.69
    nano-$/inference. Cloud: $0.001/1000*150=$0.00015/inference=150 micro-$/inference. On-device 218,000x
    cheaper per inference (marginal cost).'
