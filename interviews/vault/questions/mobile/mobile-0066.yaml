title: The Accessibility Conflict
scenario: Your app uses an on-device ML model to auto-generate image descriptions for a social media feed on an iPhone 15 (A16 Bionic). Blind users relying on VoiceOver report that the app is unusable — VoiceOver reads 'image' for every photo instead of the ML-generated description. The model works correctly when you test it. Sighted users see the descriptions.
question: "Why does VoiceOver read 'image' before an iPhone 15 on-device description model finishes social feed inference?"
details:
  realistic_solution: The ML description is generated asynchronously, but VoiceOver reads the accessibility label at the moment the cell appears on screen — before the ML model has finished processing. Because requests are queued serially, the 50ms inference time per image compounds. By the time the user scrolls to the 10th image, the latency is 500ms, missing VoiceOver's ~200ms read window. The solution is to prefetch and process images further down the feed before they become visible, ensuring the `accessibilityLabel` is already populated when VoiceOver triggers.
  common_mistake: |
    **The Pitfall:** Assuming "VoiceOver can't read ML-generated text."
    **The Rationale:** Developers often mistakenly believe accessibility APIs fail to interact dynamically with ML processes, rather than recognizing it as a race condition.
    **The Consequence:** They write off the feature as impossible for blind users, severely degrading the accessibility of the application.
  napkin_math: |
    - **VoiceOver Delay:** ~200ms read window after a cell appears.
    - **Synchronous Queueing:** Inference is 50ms per image. With 10 visible cells, the last cell takes 10 * 50ms = **500ms** to process. 
    - **Result:** VoiceOver triggers at 200ms, but text arrives at 500ms (300ms too late).
    - **The Fix (Prefetching):** Prefetch 15 cells ahead. At a scroll speed of 5 cells/sec, this provides a 3-second lead time.
    - **Headroom:** 15 * 50ms = 750ms to process all prefetched cells. 3s - 0.75s = **2.25 seconds** of headroom.
