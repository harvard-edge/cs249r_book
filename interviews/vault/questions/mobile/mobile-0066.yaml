title: The Accessibility Conflict
scenario: Your app uses an on-device ML model to auto-generate image descriptions for a social media feed
  on an iPhone 15 (A16 Bionic). Blind users relying on VoiceOver report that the app is unusable — VoiceOver
  reads 'image' for every photo instead of the ML-generated description. The model works correctly when
  you test it. Sighted users see the descriptions. What's happening?
details:
  realistic_solution: The ML description is generated asynchronously, but VoiceOver reads the accessibility
    label at the moment the cell appears on screen — before the ML model has finished processing. Because
    requests are queued serially, the 50ms inference time per image compounds. By the time the user scrolls
    to the 10th image, the latency is 500ms, missing VoiceOver's ~200ms read window. The solution is to
    prefetch and process images further down the feed before they become visible, ensuring the `accessibilityLabel`
    is already populated when VoiceOver triggers.
  common_mistake: '"VoiceOver can''t read ML-generated text." VoiceOver reads whatever is in the `accessibilityLabel`
    property. The issue is timing, not capability.'
  napkin_math: 'VoiceOver read delay: ~200ms after cell appears. ML inference: 50ms per image. If inference
    starts when the cell appears: description ready at 50ms < 200ms VoiceOver delay → should work. But:
    inference is queued behind other images. With 10 visible cells, queue depth = 10. Serial processing:
    10 × 50ms = 500ms for the last cell. VoiceOver reads cell 10 at 200ms, but its description arrives
    at 500ms — **300ms too late**. Fix: prefetch 15 cells ahead. At scroll speed of 5 cells/second: prefetch
    gives 3 seconds lead time. 15 × 50ms = 750ms to process all prefetched cells. Headroom: **2.25 seconds**.
    All descriptions ready before VoiceOver needs them.'
