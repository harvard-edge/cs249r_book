title: Diagnosing TPU Utilization Drop in Gemini Nano Decoding
scenario: You are deploying a quantized version of Gemini Nano on the Google Tensor G3. The model and
  KV cache comfortably fit within the 12 GB LPDDR5X memory. However, during autoregressive decoding, generation
  speed is heavily degraded. Profiling shows the on-device TPU is drastically underutilizing its 7.5 TOPS
  capability, while the LPDDR5X memory bandwidth is unexpectedly saturated. What operator scheduling or
  graph execution issue is most likely causing this symptom?
details:
  realistic_solution: The root cause is operator fragmentation preventing layer fusion in the scheduling
    graph. If an operation (like a custom activation or normalization) isn't supported by the TPU, the
    scheduler forces a context switch back to the CPU. This breaks layer fusion, forcing the system to
    write intermediate activations back to the 12 GB main memory instead of keeping them in the TPU's
    local SRAM, thereby saturating the memory bandwidth and stalling the TPU.
  common_mistake: Candidates often misdiagnose this as a purely hardware limitation, assuming 7.5 TOPS
    is insufficient for LLMs, or they blame the overall model size without considering that 12 GB of LPDDR5X
    is more than enough for a mobile LLM. They fail to recognize how the execution order affects intermediate
    memory traffic.
  napkin_math: For a 3B parameter model at INT4, weight loading requires ~1.5 GB per token. The Tensor
    G3's LPDDR5X provides roughly 50 GB/s of bandwidth, yielding a theoretical memory-bound limit of ~33
    tokens/sec. If the scheduler breaks fusion across 32 layers, saving and loading a 2MB intermediate
    activation tensor per layer adds 128 MB of memory traffic per token. At 5 tokens/sec, this unfused
    scheduling wastes over 640 MB/s of bandwidth and introduces severe latency from host-device synchronizations,
    causing the TPU to idle far below its 7.5 TOPS peak.
