title: The On-Device Search Dilemma
scenario: Your V1 prototype uses a small Vision Transformer (ViT) but consistently misses the 16ms budget on the Apple A17 Pro, causing UI stutter. A Neural Architecture Search (NAS) has proposed a MobileNet-style CNN that is much faster but has 1.5% lower accuracy.
question: Why does the ViT miss the 16ms mobile jank budget compared with the NAS-proposed depthwise CNN?
details:
  realistic_solution: 'The true bottleneck is memory bandwidth. The ViT''s self-attention has a very low Arithmetic Intensity (Ops/Byte) and non-local memory access patterns for the attention map, leading to a high number of cache misses and causing the NPU compute units to stall. The CNN''s convolutional structure has vastly superior spatial locality.'
  common_mistake: |
    **The Pitfall:** Assuming Transformers are slow solely due to higher FLOP counts.
    **The Rationale:** Engineers compare FLOPs without realizing that on powerful mobile NPUs, raw compute is rarely the bottleneck, while memory bandwidth dominates latency.
    **The Consequence:** Incorrectly optimizing for FLOP reduction instead of memory access patterns.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - A17 Pro ridge point: ~683 Ops/Byte.
       - Sequence length: N = 256 patches. Feature dim: D = 128.
       - Target budget: 16ms.
    2. **Calculations:**
       - Compute (Q, K, V & Attention): 4 * N^2 * D = 4 * 256^2 * 128 = 33.5 MFLOPs.
       - Memory Load (Ideal Q, K, V): 3 * 256 * 128 * 2 bytes = 196 KB.
       - Arithmetic Intensity: 33.5 MFLOPs / 196 KB ≈ 171 Ops/Byte.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bandwidth-Bound**. Since 171 Ops/Byte << 683 Ops/Byte (hardware ridge point), the ViT is severely memory-bound. The NPU stalls waiting for DRAM.
  options:
  - The ViT's non-local memory access pattern for the attention map results in a high number of cache misses on the SoC, which is the primary bottleneck. The FLOP count is secondary.
  - The Apple A17's Neural Engine lacks hardware acceleration for the specific Softmax or LayerNorm ops in the ViT, forcing CPU fallback.
  - The ViT's computational cost scales quadratically with input tokens, making it ~7.4x more expensive (~67 MFLOPs vs ~9 MFLOPs). This FLOP gap is the root cause.
  - The model is bottlenecked by memory bandwidth, not compute. The fix is to quantize from FP16 to INT8, halving data movement and solving latency without changing architecture.
