title: The On-Device Search Dilemma
scenario: You're a mobile ML engineer building an on-device 'Visual Search' feature. Your V1 prototype
  uses a small Vision Transformer (ViT) and meets the accuracy goal, but it consistently misses the 16ms
  'jank' budget on your target device (Apple A17 Pro), causing UI stutter. A Neural Architecture Search
  (NAS) has proposed a MobileNet-style CNN using depthwise separable convolutions; it's much faster but
  has 1.5% lower accuracy. Your manager is hesitant to sacrifice accuracy and asks you to diagnose exactly
  *why* the ViT is so much slower.
details:
  realistic_solution: The correct diagnosis lies in the fundamental difference in algorithmic complexity.
    The ViT's self-attention mechanism has a computational cost that scales quadratically with the number
    of input tokens (i.e., patches), making its cost O(N^2 * D). In contrast, a depthwise separable convolution's
    cost scales linearly with the number of pixels, O(N * D^2), but with a much smaller constant factor.
    The calculation shows the ViT block requires ~67 MFLOPs, while the depthwise separable block requires
    only ~9 MFLOPs for the same-sized input. This ~7.4x difference in raw computation is the primary reason
    the ViT misses the tight 16ms budget, making the NAS-found CNN the only practical choice despite the
    minor accuracy hit.
  common_mistake: Engineers often have a hand-wavy sense that 'Transformers are slow' without being able
    to pinpoint the architectural reason and quantify it. A common mistake is to blame secondary effects
    like memory access patterns or suggest surface-level fixes like quantization, without addressing the
    core algorithmic complexity that makes the model non-viable for a real-time mobile budget.
  napkin_math: 'For 16x16 patches on a 256x256 image, N = 256 tokens. Feature dim D = 128. Self-attention
    compute is N^2 * D operations: 256 * 256 * 128 * 2 = 16.7M FLOPs. Reading the Q,K,V matrices from
    DRAM takes 3 * 256 * 128 * 2B = 196KB. AI = 16.7M / 196KB = 85 Ops/Byte. Since the A17 Pro ridge point
    is ~700 Ops/Byte, attention is massively memory-bound. The 16ms budget is blown waiting on DRAM reads,
    not compute.'
  options:
  - The ViT's non-local memory access pattern for the attention map results in a high number of cache
    misses on the SoC, which is the primary bottleneck. The FLOP count is secondary.
  - The Apple A17's Neural Engine lacks hardware acceleration for the specific Softmax or LayerNorm ops
    in the ViT, forcing them onto the less efficient CPU and causing the slowdown.
  - The ViT's self-attention has a computational cost that scales quadratically with input tokens (O(N^2*D)),
    making it ~7.4x more expensive (~67 MFLOPs vs ~9 MFLOPs) than the depthwise separable convolution,
    which scales linearly. This large FLOP gap is the root cause of the missed deadline.
  - The model is bottlenecked by memory bandwidth, not compute. The fix is to quantize the ViT from FP16
    to INT8, which will halve the data movement and solve the latency issue without changing the architecture.
  correct_index: 2
