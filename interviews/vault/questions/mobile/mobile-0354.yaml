title: The Airport Parking Battery Drain
scenario: You're designing a 'Sentry Mode Lite' for a new electric vehicle. The feature uses the infotainment SoC to wake up every 10 minutes, run an object detection model for 2 seconds, and then go back to a deep sleep state. The SoC consumes 4W while active and negligible power during sleep.
question: How much total energy, in Watt-hours, will this feature consume from the car's battery over a continuous 24-hour period?
details:
  realistic_solution: |
    Calculate the total active time over 24 hours (duty cycle) and multiply by the active power consumption. Proper power budgeting requires translating instantaneous Watts into energy (Watt-hours) to model the true impact on the EV's low-voltage battery over prolonged parking.
  common_mistake: |
    **The Pitfall:** Confusing instantaneous power (Watts) with energy over time (Watt-hours).
    **The Rationale:** Engineers often fail to properly calculate the duty cycle or make unit conversion errors when moving from seconds to hours.
    **The Consequence:** Vastly overestimating or underestimating the impact of a background feature on battery life.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Wake interval: 10 mins
       - Active duration: 2 seconds
       - Active Power: 4W
       - Total period: 24 hours
    2. **Calculations:**
       - Cycles per day: (24 hours * 60 min) / 10 = 144 cycles
       - Total active time: 144 * 2s = 288 seconds
       - Energy in Joules: 4W * 288s = 1152 Joules
       - Energy in Watt-hours: 1152 J / 3600 s/hr = 0.32 Wh
    3. **Conclusion & Interpretation:** **Total consumption is 0.32 Wh. Result: Duty-Cycle/Power-Bound.**
  options:
  - 96 Wh
  - 1152 Wh
  - 0.32 Wh
  - 19.2 Wh
  correct_index: 2
