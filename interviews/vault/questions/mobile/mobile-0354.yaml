title: The Airport Parking Battery Drain
scenario: You're designing a 'Sentry Mode Lite' for a new electric vehicle. The feature uses the car's mobile-grade infotainment SoC to wake up every 10 minutes, run an object detection model for 2 seconds, and then go back to a deep sleep state. The SoC consumes 4W while active and negligible power during sleep.
question: How much total energy, in Watt-hours, will this feature consume from the car's battery over a continuous 24-hour period?
details:
  realistic_solution: The correct approach is to calculate the total active time over 24 hours and multiply it by the active power consumption. First, find the number of cycles in a day, then find the total energy consumed.
  common_mistake: |
    **The Pitfall:** Confusing instantaneous power (Watts) with energy over time (Watt-hours).
    **The Rationale:** Engineers often fail to properly calculate the duty cycle or make unit conversion errors when moving from seconds to hours.
    **The Consequence:** Vastly overestimating or underestimating the impact of a background feature on battery life.
  napkin_math: |
    1. Cycles per Day = (24 hours * 60 min/hr) / 10 min/cycle = 144 cycles.
    2. Total active time = 144 cycles * 2s/cycle = 288 seconds.
    3. Energy in Joules = 4W * 288s = 1152 J.
    4. **Energy in Watt-hours = 1152 J / 3600 s/hr = 0.32 Wh.**
  options:
  - 96 Wh
  - 1152 Wh
  - 0.32 Wh
  - 19.2 Wh
  correct_index: 2
