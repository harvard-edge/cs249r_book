title: The MobileNet Parameter Diet
scenario: You are profiling a CNN on an Apple A17 Pro chip and find a performance bottleneck in a standard
  3x3 convolutional layer that has 128 input channels and 256 output channels. To improve performance,
  you replace it with a 3x3 depthwise separable convolution, a common pattern in mobile-optimized models
  like MobileNet. Identify the approximate reduction in the layer's parameter count.
details:
  realistic_solution: 'The primary advantage of a depthwise separable convolution is a dramatic reduction
    in both parameters and computation. It splits a standard convolution into two much cheaper operations:
    a 3x3 depthwise convolution (one filter per input channel) and a 1x1 pointwise convolution (to combine
    the channel outputs). The reduction in parameters is approximately equal to the square of the kernel
    size. For a 3x3 kernel, this results in an ~9x parameter reduction.'
  common_mistake: Engineers new to mobile optimization often underestimate the impact, guessing it's a
    minor 2-3x gain. Another common error is to confuse the reduction factor with the number of channels,
    or to believe that parameters and computational cost (FLOPs) are unrelated.
  napkin_math: The cost of a standard convolution is proportional to the kernel size squared times the
    input and output channels, while the separable version is a sum of two much smaller terms.
  options:
  - No change in parameters, only latency improves
  - ~2x reduction
  - ~256x reduction
  - ~9x reduction
  correct_index: 3
