title: Investigating Tail Latency Spikes Under Memory Pressure
scenario: An on-device LLM (Gemini Nano) is deployed on the Google Tensor G3 featuring a 7.5 TOPS TPU and 12 GB LPDDR5X memory. Production telemetry shows a recurring anomaly: when the OS broadcasts memory pressure warnings, the p99 token generation latency spikes from 40ms to over 800ms, while TPU utilization drops to near zero. The 1.8GB model weights are loaded via memory mapping (mmap).
question: Why does the TPU utilization drop during memory pressure events, and what is the expected tail latency floor assuming a flash storage read speed of 2.5 GB/s?
details:
  realistic_solution: Because the model weights are memory-mapped, the OS treats them as file-backed, clean pages. Under memory pressure, the OS evicts these pages from the 12 GB LPDDR5X RAM to free up space for other apps. When the model tries to access the weights for the next token, it triggers massive major page faults, forcing the system to block on I/O while fetching from flash storage and leaving the TPU starved for data.
  common_mistake: |
    **The Pitfall:** Blaming the TPU utilization drop on thermal throttling or CPU thread pausing.
    **The Rationale:** Candidates fail to understand the low-level OS interaction between mmap and memory pressure, where unmodified mapped files are instantly evicted from RAM.
    **The Consequence:** Misdiagnosing the latency spike as a compute bottleneck rather than a catastrophic flash I/O bottleneck caused by major page faults.
  napkin_math: |
    - **Evicted Payload:** 1.8 GB.
    - **Flash Read Bandwidth:** 2.5 GB/s.
    - **Major Page Fault Penalty:** 1.8 GB / 2.5 GB/s = 0.72 seconds (**720 ms**).
    - **Total Tail Latency:** 720 ms + 40 ms base generation = **760 ms**.
    - **Conclusion:** The math perfectly aligns with the >800ms p99 telemetry spikes.
