title: Exynos 2400 NPU Real-Time Power Budgeting
scenario: You are designing a real-time video segmentation pipeline for a smartphone powered by the Samsung Exynos 2400. The system requires processing 4K video at 30 FPS using the dual-core NPU, which is rated at a peak of 34.7 TOPS. The NPU shares a 12 GB LPDDR5X memory pool with the CPU, GPU, and ISP. To prevent thermal throttling during prolonged recording, the AI workload is strictly capped at a 2.5W power budget.
question: How would you specify a power management strategy and deployment architecture that ensures sustained 30 FPS performance without exceeding this cap?
details:
  realistic_solution: The candidate should analyze the interaction between compute and shared memory. They must specify aggressive quantization (e.g., INT8) and operator fusion to maximize operational intensity and keep activations in the NPU's local SRAM. Furthermore, they should propose using DVFS to drop the dual-core NPU to its lowest viable P-state that still meets the 33.3ms frame deadline, exploiting the $P \propto fV^2$ relationship to exponentially reduce dynamic power while leaving memory bandwidth for the ISP.
  common_mistake: |
    **The Pitfall:** Focusing solely on the massive 34.7 TOPS compute capacity.
    **The Rationale:** Candidates fail to account for the energy cost of shared memory bandwidth, proposing models that require continuous, power-hungry DRAM fetches.
    **The Consequence:** Quickly blowing past the 2.5W thermal budget due to high power consumption of LPDDR5X accesses compared to local NPU SRAM.
  napkin_math: |
    1. Latency budget at 30 FPS: 33.3 ms/frame.
    2. Compute requirement: A lightweight INT8 model uses 100 GOPS/frame (3 TOPS total), which is only ~8.6% of peak, allowing massive DVFS voltage reduction.
    3. Memory energy cost: 10 pJ/bit.
    4. Bad optimization fetch: 50MB/frame = 400 Mbits * 10 pJ = 4 mJ/frame.
    5. Memory power at 30 FPS: 4 mJ * 30 = 120 mW.
    6. Total Power: 800 mW (Compute at low P-state) + 120 mW (Memory) = **0.92W** (Safely under the 2.5W cap).
