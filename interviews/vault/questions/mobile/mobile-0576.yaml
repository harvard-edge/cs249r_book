title: The Metal Performance Shaders
scenario: Your team has a custom sparse attention mechanism that CoreML doesn't support natively — CoreML
  falls back to CPU for the attention layers, making the model 4× slower than expected. A colleague suggests
  rewriting the attention in Metal compute shaders to run on the Apple GPU. When is this Metal approach
  faster than CoreML, and when does it backfire?
details:
  realistic_solution: Metal Performance Shaders (MPS) and raw Metal compute shaders give you programmable
    GPU access, but the trade-offs are nuanced.
  common_mistake: '"Metal gives you direct GPU access, so it''s always faster than CoreML for custom ops."
    Metal compute shaders bypass CoreML''s graph optimizer, losing fusion opportunities and ANE delegation
    for the rest of the model.'
  napkin_math: 'Model: 100 layers, 20 are custom attention. CoreML (CPU fallback): 80 layers ANE (8ms)
    + 20 layers CPU (40ms) + 20 transfers (30ms) = **78ms**. Full Metal GPU: 100 layers GPU (30ms) = **30ms**.
    Hybrid CoreML + Metal custom layer: 80 layers ANE (8ms) + 20 layers GPU (6ms) + 2 transfers (3ms)
    = **17ms**. The hybrid approach is 4.6× faster than pure CoreML fallback and 1.8× faster than full
    Metal.'
