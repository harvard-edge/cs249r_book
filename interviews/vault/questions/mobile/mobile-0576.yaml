title: The Metal Performance Shaders
scenario: Your team has a custom sparse attention mechanism that CoreML falls back to CPU for, making the model 4x slower. A colleague suggests bypassing CoreML entirely by rewriting the entire graph in Metal compute shaders.
question: When is rewriting a custom layer in Metal compute shaders faster than CoreML, and when does it backfire?
details:
  realistic_solution: Metal Performance Shaders (MPS) grant programmable GPU access. A hybrid graph (CoreML on Apple Neural Engine + Metal on GPU for the custom op) prevents severe CPU fallback stalls. However, rewriting the *entire* model in pure Metal forces all operations off the highly efficient ANE, leading to a massive net slowdown.
  common_mistake: |
    **The Pitfall:** Assuming pure Metal GPU code is universally faster than CoreML because it provides direct, low-level hardware control.
    **The Rationale:** Forgetting that breaking out of the CoreML graph entirely abandons ANE (Neural Engine) delegation, shifting highly optimized matrix math back to the power-hungry GPU.
    **The Consequence:** Severely regressing overall model performance and destroying battery life by shifting ANE-accelerated layers to the GPU.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Ideal ANE compute time: 8ms.
       - CPU custom op fallback: 40ms. CPU-ANE sync overhead: 30ms.
       - GPU custom op: 6ms. GPU-ANE sync overhead: 3ms.
       - Full Model pure GPU execution: 30ms.
    2. **Calculations:**
       - CPU Fallback Total: 8ms (ANE) + 40ms (CPU) + 30ms (sync) = 78ms.
       - Full Metal GPU Total: 30ms.
       - Hybrid (CoreML ANE + Metal GPU): 8ms (ANE) + 6ms (GPU) + 3ms (sync) = 17ms.
    3. **Conclusion & Interpretation:**
       **Result: Compute/Sync-Bound. A hybrid ANE+Metal approach (17ms) is mathematically optimal. Forcing the entire graph to Metal (30ms) to bypass sync overhead incorrectly abandons the ANE's raw throughput.**
