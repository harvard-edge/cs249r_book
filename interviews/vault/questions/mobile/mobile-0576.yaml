title: The Metal Performance Shaders
scenario: Your team has a custom sparse attention mechanism that CoreML falls back to CPU for, making the model 4x slower. A colleague suggests rewriting it in Metal compute shaders.
question: When is rewriting a custom layer in Metal compute shaders faster than CoreML, and when does it backfire?
details:
  realistic_solution: Metal Performance Shaders (MPS) give you programmable GPU access. The hybrid approach (CoreML on ANE + Metal on GPU) can be faster than CPU fallback, but full Metal bypasses CoreML's graph optimizer and ANE entirely.
  common_mistake: |
    **The Pitfall:** Assuming Metal is always faster than CoreML because it provides direct GPU access.
    **The Rationale:** Forgetting that breaking the CoreML graph loses ANE (Neural Engine) delegation for the rest of the model.
    **The Consequence:** Making the model overall slower by shifting ANE-accelerated layers to the GPU.
  napkin_math: |
    - CPU Fallback: 80 ANE (8ms) + 20 CPU (40ms) + transfers (30ms) = 78ms.
    - Full Metal GPU: 100 GPU (30ms) = 30ms.
    - Hybrid (CoreML + Metal): 80 ANE (8ms) + 20 GPU (6ms) + transfers (3ms) = 17ms.
    - **The hybrid approach is 4.6x faster than CPU fallback and 1.8x faster than full GPU.**
