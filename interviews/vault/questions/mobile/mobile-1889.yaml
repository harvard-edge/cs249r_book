title: Vision Framework Pipelining
scenario: A video processing app on an iPhone 15 passes a 4K frame (24 MB) through CPU crop (5 ms), GPU filter (10 ms), and NPU detection (15 ms).
question: Apply pipeline engineering to determine the latency to process the 10th frame under full saturation.
visual:
  kind: svg
  path: mobile-1889.svg
  alt: Horizontal bars representing CPU, GPU, and NPU stages overlapping.
  caption: Video frame pipeline stages.
details:
  realistic_solution: 'The pipeline bottleneck is the NPU (15 ms), so the throughput is 1 frame per 15 ms. The first frame finishes at 5 + 10 + 15 = 30 ms. Frame 10 finishes 9 bottleneck cycles later: 30 + 9 * 15 = 165 ms. (Alternatively, max latency for the N-th frame is (N-1) * bottleneck + latency = 9 * 15 + 30 = 165 ms).'
  common_mistake: |
    **The Pitfall:** Simply multiplying the single-frame latency by the number of frames.
    **The Rationale:** Candidates completely ignore the pipelining overlap across heterogeneous compute units.
    **The Consequence:** Overestimating the total latency as 300ms instead of 165ms.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - CPU stage: 5 ms.
       - GPU stage: 10 ms.
       - NPU stage: 15 ms.
    2. **Calculations:**
       - Identify Bottleneck: NPU at 15 ms.
       - First Frame Completion: 5ms (CPU) + 10ms (GPU) + 15ms (NPU) = 30 ms.
       - Calculate Nth Frame: Latency = (N - 1) * bottleneck + first_frame_latency.
       - Compute 10th Frame: 9 * 15 ms + 30 ms = 165 ms.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound.** 165 ms.
