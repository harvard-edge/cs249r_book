title: Vision Framework Pipelining
scenario: A video processing app on an iPhone 15 (Apple A17) passes a 4K frame (24
  MB) through CPU crop (5 ms), GPU filter (10 ms), and NPU detection (15 ms).
question: Apply pipeline engineering to determine the latency to process the 10th
  frame under full saturation.
visual:
  kind: svg
  path: mobile-1889.svg
  alt: Horizontal bars representing CPU, GPU, and NPU stages overlapping.
  caption: Video frame pipeline stages.
details:
  realistic_solution: 'The pipeline bottleneck is the NPU (15 ms), so the throughput
    is 1 frame per 15 ms. The first frame finishes at $5 + 10 + 15 = 30$ ms. Frame
    10 finishes 9 bottleneck cycles later: $30 + 9 \times 15 = 165$ ms. (Alternatively,
    max latency for the $N$-th frame is $(N-1) \times \text{bottleneck} + \text{latency}
    = 9 \times 15 + 30 = 165$ ms).'
  common_mistake: Simply multiplying the single-frame latency (30ms) by 10 to get
    300ms, completely ignoring the pipelining overlap.
  napkin_math: Frame 1 = 30ms. Frame 10 = 30 + 9 * 15 = 165ms.
