title: 'The Sentient Dashcam: Designing for Hostile Automotive Environments'
scenario: You are the lead ML Systems Engineer designing a new 'Sentry Mode' for a line of electric vehicles. The feature must continuously monitor the vehicle's surroundings using a 4K camera and a perception model while the car is parked, detecting and recording threats (e.g., people loitering) within 5 seconds of their appearance.
question: What adaptive control system should manage Sentry Mode power and thermals while meeting a 5-second detection deadline?
details:
  realistic_solution: The correct approach is to design a dynamic control system, likely a state machine managed by a PID controller, that adapts the system's behavior based on real-time environmental feedback.
  common_mistake: |
    **The Pitfall:** Proposing a simple, static duty cycle (e.g., run inference for 1 second every 5 seconds).
    **The Rationale:** Candidates fail to adapt to environmental changes. A static cycle needlessly consumes power in cold/dark environments and causes thermal throttling in hot/sunny environments.
    **The Consequence:** The system either drains the battery too quickly or thermally throttles, failing to meet the latency requirement in adverse conditions.
  napkin_math: |
    1. **Energy Budget:** 12V aux battery (50 Ah = 600 Wh). 80% usable = 480 Wh. For 48 hours, power budget = 480 Wh / 48 h = **10W total**.
    2. **Active Power:** 4K sensor (0.8W) + SoC idle (1.2W) + NPU inference (3.5W) + DRAM/storage (0.5W) = 6.0W. Idle state = 2.0W.
    3. **Duty Cycle:** To average 10W, use a lightweight motion detector (0.3W) to trigger wake-up. Idle = 2.3W. Active = 6.0W. If active 5% of the time, average power = 0.95 * 2.3 + 0.05 * 6.0 = **2.5W** (within budget).
    4. **Thermal Constraint:** SoC thermal resistance is ~15°C/W. At 6.0W, ΔT = 90°C. If ambient is 60°C, junction hits 150°C (exceeds 105°C limit). Must throttle to <= 3.0W.
