title: 'The Sentient Dashcam: Designing for Hostile Automotive Environments'
scenario: You are the lead ML Systems Engineer designing a new 'Sentry Mode' for a line of electric vehicles. The feature must continuously monitor the vehicle's surroundings using a 4K camera and a perception model while the car is parked, detecting and recording threats (e.g., people loitering) within 5 seconds of their appearance.
question: What adaptive control system should manage Sentry Mode power and thermals while meeting a 5-second detection deadline?
details:
  realistic_solution: Implement a dynamic, tiered execution pipeline orchestrated by a PID controller or state machine. Rely on an ultra-low-power, always-on motion detection heuristic (e.g., DSP-based frame differencing) to trigger the heavier 4K perception model only when necessary. This aggressive duty-cycling minimizes idle power draw and prevents thermal runaway in high-ambient conditions by dynamically throttling frame rates when junction temperatures approach critical thresholds.
  common_mistake: |
    **The Pitfall:** Proposing a simple, static duty cycle (e.g., run inference for 1 second every 5 seconds) without hardware-aware thermal mitigation.
    **The Rationale:** Candidates fail to adapt to environmental changes, applying cloud-like static scheduling to a thermally constrained edge device.
    **The Consequence:** The system needlessly drains the 12V battery in cold environments and suffers catastrophic thermal throttling in hot conditions, missing the real-time detection deadline.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 12V aux battery (50 Ah = 600 Wh). 80% usable = 480 Wh.
       - 48-hour runtime -> Power budget = 480 Wh / 48 h = 10W.
       - Active Power: 6.0W. Idle state: 2.0W.
       - Ambient up to 60°C. SoC thermal resistance ~15°C/W.
    2. **Calculations:**
       - Duty Cycle Power: 5% active -> 0.95 * 2.3 + 0.05 * 6.0 = 2.485W.
       - Thermal at 6.0W: ΔT = 90°C. Junction Temp = 60°C + 90°C = 150°C.
    3. **Conclusion & Interpretation:**
       - Static 6.0W draw causes thermal failure (exceeds 105°C limit). Must throttle heavily.
       - **Result: Thermally-Bound (Max 3.0W Active Limit)**.
