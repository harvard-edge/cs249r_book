title: 'The Sentient Dashcam: Designing for Hostile Automotive Environments'
scenario: You are the lead ML Systems Engineer designing a new 'Sentry Mode' for a line of electric vehicles.
  The feature must continuously monitor the vehicle's surroundings using a 4K camera and a perception
  model while the car is parked, detecting and recording threats (e.g., people loitering) within 5 seconds
  of their appearance.
question: "What adaptive control system should manage Sentry Mode power and thermals while meeting a 5-second detection deadline?"
details:
  realistic_solution: The correct approach is to design a dynamic control system, likely a state machine
    managed by a PID controller, that adapts the system's behavior based on real-time environmental feedback.
  common_mistake: Proposing a simple, static duty cycle (e.g., 'run inference for 1 second every 5 seconds').
    This approach is naive because it fails to adapt. In low ambient temperatures with no sun, it would
    needlessly conserve power, potentially missing the latency target. In a hot, sunny environment, it
    would immediately cause thermal throttling and fail. Another common mistake is to only model the NPU's
    power draw, ignoring the significant, continuous power consumption of the 4K image sensor and the
    SoC's memory subsystem.
  napkin_math: '**1. Energy Budget Calculation:**

    - Typical EV 12V auxiliary battery: 50 Ah = 600 Wh.

    - Reserve 20% for vehicle systems: usable = 480 Wh.

    - Target Sentry Mode duration: 48 hours.

    - Power budget: 480 Wh / 48 h = **10W total**.


    **2. Component Power Breakdown:**

    - 4K image sensor (always-on): 0.8W.

    - SoC idle (memory refresh, I/O): 1.2W.

    - NPU active inference: 3.5W.

    - DRAM + storage writes: 0.5W.

    - Total during inference: 6.0W. Total during sleep: 2.0W (sensor still on).


    **3. Duty Cycle Design:**

    - To average 10W with a 5-second detection latency requirement:

    - Lightweight motion detector (on always-on sensor): triggers wake-up, costs 0.3W.

    - Idle state: sensor + motion detector = 2.3W.

    - Active state: full pipeline = 6.0W.

    - If threats appear 5% of the time: P_avg = 0.95 × 2.3 + 0.05 × 6.0 = **2.5W** → well within budget.

    - Worst case (continuous inference in hot sun, 60°C ambient): thermal throttle NPU to 1.5W → total
    4.0W, detection latency increases to ~8 seconds.


    **4. Thermal Model:**

    - SoC junction-to-ambient thermal resistance: ~15°C/W.

    - At 6.0W, ΔT = 90°C. If ambient = 60°C (parked in sun), junction = 150°C → exceeds 105°C limit.

    - Must throttle to ≤3W for junction = 60 + 45 = 105°C (safe).

    - PID controller adjusts inference frequency based on temperature sensor reading.'
