title: The Infotainment Jank
scenario: 'You''re a Staff ML Engineer at an automotive company. The new ''Active Lane Assist'' feature, powered by a Vision Transformer (ViT, 22M parameters), is causing noticeable UI lag on the infotainment system. The profiler shows inference is taking ~16.7ms, far exceeding the 16ms frame budget for a 60 FPS experience. The research team proposes two alternatives: (A) A MobileNetV3 variant (5.4M parameters). (B) A ViT-MoE model that has 25M total parameters but only activates a 4M parameter ''expert'' subset per inference.'
question: Which architecture should replace a janky ViT on an infotainment system, and why?
details:
  realistic_solution: The primary bottleneck is memory bandwidth, not compute. The self-attention mechanism in the ViT requires non-local, scattered memory accesses that thrash the cache and saturate the memory bus. MobileNetV3 provides better data locality and higher Arithmetic Intensity (AI).
  common_mistake: |
    **The Pitfall:** Focusing purely on active parameter count or FLOPs.
    **The Rationale:** Engineers assume compute is the bottleneck, ignoring the architectural differences in memory access patterns between Transformers and Convolutions.
    **The Consequence:** Choosing the ViT-MoE, which exacerbates memory thrashing and fails to fix the UI jank.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Target hardware peak performance: 45 TOPS.
       - Baseline ViT compute: 2 * 22M params = 44 MFLOPs (simplification).
       - Measured latency: 16.7ms.
    2. **Calculations:**
       - Achieved performance: 0.044 GFLOPs / 0.0167s = 2.63 GFLOPS.
       - Utilization: 2.63 GFLOPS / 45,000 GFLOPS = ~0.0058%.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound.** The abysmal utilization proves the model is heavily memory-bandwidth-bound, rewarding architectures with better data locality like CNNs.
  options:
  - The ViT is memory-bandwidth-bound due to attention's low arithmetic intensity. Choose the MobileNetV3, as its convolutional structure provides better data locality.
  - The ViT is compute-bound because 22M parameters is too large. Choose the ViT-MoE.
  - The problem is model size. Choose the ViT-MoE as it has fewer active parameters.
  - The bottleneck is likely an inefficient operator in the ViT model that isn't supported.
  correct_index: 0
