title: The Infotainment Jank
scenario: 'You''re a Staff ML Engineer at an automotive company, responsible for the performance of on-device
  models. The new ''Active Lane Assist'' feature, powered by a Vision Transformer (ViT, 22M parameters),
  is causing noticeable UI lag on the Snapdragon-powered infotainment system. The profiler shows inference
  is taking ~16.7ms, far exceeding the 16ms frame budget for a smooth 60 FPS experience. The research
  team proposes two alternatives to fix this: (A) A MobileNetV3 variant (5.4M parameters) discovered via
  Neural Architecture Search, known for its use of depthwise separable convolutions. (B) A ViT-MoE model
  that has 25M total parameters but only activates a 4M parameter ''expert'' subset per inference. Your
  task is to diagnose the bottleneck and choose the most promising path to meet the latency budget.'
question: "Which architecture should replace a janky ViT on a Snapdragon infotainment system, and why?"
details:
  realistic_solution: The primary bottleneck is memory bandwidth, not compute. The self-attention mechanism
    in the ViT requires non-local, scattered memory accesses that thrash the cache and saturate the memory
    bus, leading to high latency despite the NPU having ample compute headroom. This is evident by the
    extremely low utilization of the chip's peak TOPS.
  common_mistake: Focusing purely on active parameter count or FLOPs. The ViT-MoE has fewer active parameters
    (4M) than the MobileNetV3 (5.4M), making it seem like the more efficient choice. This ignores the
    architectural differences in memory access patterns, which is the dominant factor for latency on mobile
    hardware.
  napkin_math: 1. **Diagnose the Bottleneck with Utilization:** The target device is a Snapdragon 8 Gen
    3 with 45 TOPS (45 * 10^12 Ops/sec) peak performance. The baseline ViT model's approximate compute
    (assuming one pass per token/patch without sequence length scaling for simplicity) is `2 * 22M params
    = 44 MFLOPs`. At the measured 16.7ms latency, the *achieved* performance is `0.044 GFLOPs / 0.0167s
    = 2.63 GFLOPS (0.0026 TOPS)`.
  options:
  - The ViT is memory-bandwidth-bound due to attention's low arithmetic intensity. Choose the MobileNetV3,
    as its convolutional structure provides better data locality and a higher AI better suited for mobile
    hardware.
  - The ViT is compute-bound because 22M parameters is too large. Choose the ViT-MoE, as it has the fewest
    active parameters (4M vs 5.4M) and therefore the lowest FLOP count.
  - The problem is model size. Since both new models are smaller in active parameters than the original,
    either will work. Choose the ViT-MoE as it's a more modern architecture.
  - The bottleneck is likely an inefficient operator in the ViT model that isn't supported by the Snapdragon
    NPU. You should rewrite the custom Softmax layer before considering a new architecture.
  correct_index: 0
