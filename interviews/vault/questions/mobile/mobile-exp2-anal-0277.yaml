title: TPU Kernel Fusion Limits
scenario: You are optimizing an on-device LLM (Gemini Nano) for the Google Tensor G3. The platform features
  an on-device TPU capable of 7.5 TOPS, backed by 12 GB of LPDDR5X memory, and utilizes an internal SRAM
  of 8 MB for intermediate kernel operations. During ahead-of-time compilation, the graph compiler encounters
  a dense linear layer requiring 3.75 Giga-operations (GOPs) followed by a custom activation. The intermediate
  tensor produced is 18 MB. The compiler decides not to fuse these operations, opting instead to write
  the intermediate result out to the 12 GB main memory. Explain the hardware constraints driving this
  compiler behavior and calculate the theoretical compute time for the linear layer.
question: "How would you explain the hardware constraints driving this compiler behavior and calculate the theoretical compute time for the linear layer?"
details:
  realistic_solution: The framework compiler rejects the fusion because the 18 MB intermediate tensor
    exceeds the TPU's 8 MB internal SRAM capacity. Edge ML accelerators require intermediate fused states
    to fit entirely within on-chip memory to sustain high throughput and prevent stalling the compute
    units. Consequently, the compiler is forced to split the operators and materialize the 18 MB tensor
    in the slower 12 GB LPDDR5X memory.
  common_mistake: Candidates often assume that operator fusion is unconditionally optimal because it minimizes
    trips to main memory. They may fail to recognize that edge TPUs have strict on-chip memory limits,
    and exceeding them prevents kernel fusion.
  napkin_math: Compute workload = 3.75 GOPs. TPU Peak Throughput = 7.5 TOPS (7500 GOPs/sec). Minimum compute
    time = 3.75 / 7500 = 0.0005 seconds (0.5 ms). Since the 18 MB tensor > 8 MB SRAM, fusion fails, incurring
    a memory transfer penalty to the 12 GB LPDDR5X.
