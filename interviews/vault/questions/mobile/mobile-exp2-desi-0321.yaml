title: A17 Pro Unified Memory KV-Cache Architecture
scenario: You are architecting the KV-cache management for an on-device LLM summarizing long chat threads,
  targeting the Apple A17 Pro Neural Engine. The A17 Pro features 8 GB of shared unified memory, but to
  avoid OS termination, your app has a strict 2 GB peak memory budget, with the 4-bit quantized 3B model
  weights already consuming 1.5 GB. Design a memory-safe KV-cache allocation and eviction policy that
  allows the 16-core Neural Engine to process up to 4,000 tokens of context without exceeding the remaining
  500 MB budget.
details:
  realistic_solution: The best design uses a statically pre-allocated ring buffer capped at 450 MB to
    prevent OS-level OOM kills during dynamic allocation. To support 4,000 tokens, the architecture must
    incorporate KV-cache quantization (e.g., 4-bit or 8-bit) and an aggressive token eviction policy like
    Heavy-Hitter Oracle (H2O) to discard low-attention tokens, ensuring the cache footprint never breaches
    the physical limits of the unified memory pool.
  common_mistake: Candidates often propose complex, server-centric dynamic allocation schemes like PagedAttention
    without considering the severe penalty of dynamic memory spikes on mobile iOS. They also frequently
    fail to calculate the actual memory required for the maximum context length, missing that a naive
    implementation will instantly exceed the 500 MB remaining budget and crash the app.
  napkin_math: 'Total app memory budget: 2048 MB. Model weights: 1536 MB. Remaining for KV-cache and activations:
    512 MB. For a standard 3B model (32 layers, 3072 hidden size), an FP16 KV-cache takes: 2 bytes * 2
    (K, V) * 32 * 3072 = 393,216 bytes (~0.38 MB) per token. A full 4,000 token context requires 4000
    * 0.38 MB = 1520 MB. Since 1520 MB > 512 MB, storing 4K tokens in FP16 is impossible. Applying 4-bit
    KV quantization reduces this to ~0.09 MB/token, lowering the requirement to 380 MB, safely fitting
    into the 512 MB remaining budget alongside activations.'
