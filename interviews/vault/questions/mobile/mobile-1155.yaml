title: NPU Fallback from Data Contract Violations
scenario: You deployed an INT8-quantized model on the Qualcomm Hexagon NPU (Snapdragon
  8 Gen 3) which shares 16 GB LPDDR5X memory across its heterogeneous CPU+GPU+NPU
  architecture. The system enforces a strict data contract where input tensors must
  be properly normalized and cast to INT8. Telemetry shows that 5% of requests violate
  this quality gate due to a preprocessing bug, sending unclipped FP32 values instead.
  When these anomalous inputs arrive, inference latency spikes from 2ms to over 60ms,
  and CPU utilization hits 100%. Diagnose the root cause of this system behavior.
question: Why do FP32 preprocessing violations push a Snapdragon 8 Gen 3 Hexagon INT8
  model from 2 ms to over 60 ms?
details:
  realistic_solution: The data contract violation (FP32 values instead of INT8) forces
    the runtime to abandon the optimized Hexagon NPU execution path. To prevent application
    crashes, it dynamically falls back to the heterogeneous CPU to process the unquantized
    operations. The CPU lacks the dedicated INT8 acceleration and must compute in
    FP32, thrashing the shared LPDDR5X bus to load larger unquantized weights and
    activations, which destroys the latency budget.
  common_mistake: Candidates often assume the NPU silently clips the anomalous data
    or simply throws a fast error without a performance penalty. They fail to recognize
    that the AI runtime's validation layer detects the schema mismatch and triggers
    a silent, expensive fallback to the CPU.
  napkin_math: The Hexagon NPU provides 45 TOPS INT8. For a 90 GOPS model, NPU compute
    time is roughly 90e9 / 45e12 = 2 ms. If the data anomaly forces a CPU fallback
    (assuming a generous ~1.5 TFLOPS FP32 capacity for the CPU cores), compute time
    jumps to 90e9 / 1.5e12 = 60 ms. Furthermore, moving 50M FP32 parameters (200MB)
    over the shared LPDDR5X bus (max ~68.2 GB/s) takes at least 200MB / 68.2 GB/s
    = 2.93 ms of pure memory transfer time per inference, perfectly explaining the
    60ms+ latency spikes.
