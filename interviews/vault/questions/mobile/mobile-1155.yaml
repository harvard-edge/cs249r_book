title: NPU Fallback from Data Contract Violations
scenario: You deployed an INT8-quantized model on the Qualcomm Hexagon NPU which shares LPDDR5X memory across its heterogeneous architecture. The system enforces a strict data contract where input tensors must be properly normalized and cast to INT8. Telemetry shows that 5% of requests violate this quality gate due to a preprocessing bug, sending unclipped FP32 values instead. When these anomalous inputs arrive, inference latency spikes from 2ms to over 60ms.
question: Why do FP32 preprocessing violations push an INT8 model from 2 ms to over 60 ms?
details:
  realistic_solution: The data contract violation forces the runtime to abandon the optimized Hexagon NPU execution path. To prevent application crashes, it dynamically falls back to the heterogeneous CPU to process the unquantized operations. The CPU lacks the dedicated INT8 acceleration and must compute in FP32, thrashing the shared bus.
  common_mistake: |
    **The Pitfall:** Assuming the NPU silently clips the anomalous data without a performance penalty.
    **The Rationale:** Candidates fail to recognize that the AI runtime's validation layer detects the schema mismatch and triggers a silent, expensive fallback to the CPU.
    **The Consequence:** Misdiagnosis of latency spikes leading to wasted time optimizing the network layer instead of fixing the pipeline.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model: 90 GOPS.
       - NPU: 45 TOPS INT8.
       - CPU: 1.5 TFLOPS FP32.
       - Shared LPDDR5X bus: ~68.2 GB/s.
    2. **Calculations:**
       - NPU compute time = 90e9 / 45e12 = 2 ms.
       - CPU fallback compute = 90e9 / 1.5e12 = 60 ms.
       - FP32 parameters (200MB) transfer = 200MB / 68.2 GB/s = ~2.93 ms memory penalty.
    3. **Conclusion & Interpretation:**
       - **Result: 60ms latency. Compute-Bound/Memory-Bandwidth-Bound.** CPU fallback and bus thrashing cause the massive spike.
