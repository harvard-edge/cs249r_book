title: The Display Pipeline Collision
scenario: Your AR app overlays ML-generated segmentation masks on the camera feed at 60 FPS on an iPhone 14 Pro (A16 Bionic). When you enable the 120 Hz ProMotion display mode, the segmentation mask visibly lags behind the camera feed (objects move but the mask follows 1-2 frames behind). At 60 Hz, the lag is imperceptible, and your ML inference time remains completely unchanged.
question: Why does a 60 FPS AR segmentation mask lag visibly when the iPhone display switches to 120 Hz?
details:
  realistic_solution: 'The problem is pipeline phase misalignment between the camera, ML inference, and display refresh. At 60 Hz (16.7ms budget), inference takes 11ms, so the mask is displayed synchronously with the camera feed (age 16.7ms). At 120 Hz (8.3ms budget), inference still takes 11ms, meaning it spans two display frames. The camera updates every 8.3ms, but the mask updates every 16.7ms, creating an 8.3ms desync. Fix with motion-compensated reprojection: read the IMU gyroscope during inference and warp the stale mask to match the current camera frame using a 2D affine transform.'
  common_mistake: |
    **The Pitfall:** Assuming the ML model is too slow for 120 Hz and needs pruning or quantization.
    **The Rationale:** Engineers incorrectly believe that visual lag always indicates a compute bottleneck, missing the subtle synchronization issues of heterogeneous pipelines.
    **The Consequence:** Months of wasted effort optimizing a model that already runs fast enough, while completely ignoring the actual reprojection solution needed for AR.
  napkin_math: |
    - **60 Hz Pipeline:** Frame budget = 16.7ms. Inference = 11ms. Mask age when displayed = 16.7ms. Camera feed age = 16.7ms. (Synchronized).
    - **120 Hz Pipeline:** Frame budget = 8.3ms. Inference = 11ms (spans 2 frames). Mask age = 16.6ms, but camera feed updates at 8.3ms. 
    - **Desync:** 16.6ms - 8.3ms = 8.3ms visible lag.
    - **Visual Impact:** Typical hand motion is ~30 cm/s. Movement in 8.3ms = 2.5mm. At 30cm distance with a standard ~70 deg FOV, 2.5mm equates to roughly 7 pixels of visual lag.
    - **Result:** **The pipeline mismatch creates an 8.3ms desync (~7 pixels of lag), which requires IMU-based reprojection (<1ms cost) to correct.**
