validation_issues:
- The "Napkin Math" for the training frame size calculates a RAW single-channel Bayer format as 16 bits
  (2 bytes) per pixel, but then uses an RGB frame size of 3 bytes per pixel for serving, which introduces
  an apples-to-oranges comparison for the 'data reduction factor' for color representation, when the focus
  should be on resolution and compression artifact skew.
