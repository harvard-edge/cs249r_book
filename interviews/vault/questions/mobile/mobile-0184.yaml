title: The Camera Pre-processing Skew
scenario: You're developing a new 'Smart Coach' feature on a mobile app that analyzes a user's workout form using the phone's camera. The initial model was trained in the cloud on a dataset of 4K (3840x2160) raw camera sensor frames, where each pixel is represented by 16 bits (2 bytes). For on-device performance, the live camera feed is pre-processed into a 224x224 RGB image (3 bytes per pixel) before being fed to the model.
question: How would you explain the primary risk of this pipeline and calculate the approximate data reduction factor between a single training frame and a single serving frame?
details:
  realistic_solution: The primary risk is training-serving skew. The model, trained on high-fidelity RAW data, will likely underperform when running inference on the heavily compressed and differently processed RGB data it sees in the app. The on-device preprocessing pipeline (including downsampling and color space conversion) introduces artifacts that the model has not been trained to handle. The best practice is to ensure the training pipeline exactly mimics the on-device preprocessing to eliminate this skew.
  common_mistake: |
    **The Pitfall:** Focusing only on the resolution change (e.g., 4K vs 224p).
    **The Rationale:** Engineers ignore the change in color representation (RAW vs RGB) and artifacts introduced by downsampling.
    **The Consequence:** Deploying a model that suffers a massive accuracy drop in production due to training-serving skew.
  napkin_math: |
    - **Training Frame (RAW):** 3840 × 2160 pixels.
    - **RAW Size:** 8,294,400 pixels × 2 bytes/pixel (16-bit single channel) = **16.59 MB**.
    - **Serving Frame (RGB):** 224 × 224 pixels.
    - **RGB Size:** 50,176 pixels × 3 bytes/pixel (8-bit 3-channel) = **150 KB**.
    - **Data Reduction:** 16.59 MB / 150 KB = **~110x reduction**.
    - **Conclusion:** The model learned from 16-bit pristine 4K data, but must infer on compressed 224p 8-bit RGB with severe artifacts, causing massive skew.
  options:
  - A ~14x reduction. This is a typical and acceptable trade-off for mobile performance.
  - A ~330x reduction. This skew is caused by forgetting to account for the 3 color channels in the serving image.
  - A ~110x reduction. This causes training-serving skew because the on-device preprocessing artifacts are not in the training data.
  - A ~880x reduction. This level of compression is too high and indicates a miscalculation in bit-to-byte conversion.
  correct_index: 2
