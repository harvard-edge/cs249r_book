title: The Camera Pre-processing Skew
scenario: You're developing a new 'Smart Coach' feature on a mobile app that analyzes a user's workout
  form using the phone's camera. The initial model was trained in the cloud on a dataset of 4K (3840x2160)
  raw camera sensor frames, where each pixel is represented by 16 bits (2 bytes). For on-device performance,
  the live camera feed is pre-processed into a 224x224 RGB image (3 bytes per pixel) before being fed
  to the model. Explain the primary risk of this pipeline and calculate the approximate data reduction
  factor between a single training frame and a single serving frame.
details:
  realistic_solution: The primary risk is training-serving skew. The model, trained on high-fidelity RAW
    data, will likely underperform when running inference on the heavily compressed and differently processed
    RGB data it sees in the app. The on-device preprocessing pipeline (including downsampling and color
    space conversion) introduces artifacts that the model has not been trained to handle. The best practice
    is to ensure the training pipeline exactly mimics the on-device preprocessing to eliminate this skew.
  common_mistake: Engineers often focus only on the resolution change (e.g., '4K vs 224p') and ignore
    the change in color representation and processing (e.g., RAW vs. RGB). The root cause of the skew
    isn't just the size difference, but that the model was trained on pristine, perfectly processed data
    and now sees 'fast and lossy' data in production, including artifacts from on-the-fly downsampling
    and color conversion it never saw during training.
  napkin_math: '**1. Training frame size:** Resolution: 3840 x 2160 = 8,294,400 pixels. Bit depth: 16
    bits (2 bytes) per pixel, RAW (single channel Bayer). Size = 8,294,400 x 2 = **16,588,800 bytes ≈
    16.6 MB.** | **2. Serving frame size:** Resolution: 224 x 224 = 50,176 pixels. Channels: 3 (RGB),
    1 byte each. Size = 50,176 x 3 = **150,528 bytes ≈ 150 KB.** | **3. Data reduction factor:** 16,588,800
    / 150,528 = **~110x reduction.** | **4. Breakdown of reduction:** Resolution: (3840 x 2160) / (224
    x 224) = 8,294,400 / 50,176 = **165x** fewer pixels. Bit depth: 16-bit RAW → 8-bit RGB = **2x** fewer
    bytes per pixel. But RAW is 1 channel → RGB is 3 channels = **0.33x** (increases data). Net: 165 x
    2 x 0.33 = **~110x.** | **5. Risk:** This 110x compression involves lossy transformations (demosaicing,
    color space conversion, aggressive downsampling) that the training pipeline never applied. The model
    learned features from 16-bit RAW at 4K — it will see different artifacts at 224px RGB.'
  options:
  - A ~14x reduction. This is a typical and acceptable trade-off for mobile performance.
  - A ~330x reduction. This skew is caused by forgetting to account for the 3 color channels in the serving
    image.
  - A ~110x reduction. This causes training-serving skew because the on-device preprocessing artifacts
    are not in the training data.
  - A ~880x reduction. This level of compression is too high and indicates a miscalculation in bit-to-byte
    conversion.
  correct_index: 2
