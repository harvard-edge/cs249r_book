title: The Real-Time Filter Lag
scenario: 'You are a mobile ML engineer at a social media company, tasked with optimizing a new real-time video filter. The filter uses a custom neural network layer that is causing the app to drop frames, missing its 16ms per-frame budget. Your profiler isolates the problematic layer and provides the following data for a single inference pass on an Apple A17 Pro chip (35 TOPS, 51.2 GB/s): 7 Giga-Ops compute and 50 MB data movement.'
question: "Is the custom real-time filter layer memory-bound or compute-bound, and what arithmetic intensity evidence supports that?"
details:
  realistic_solution: The layer is memory-bound. To determine the bottleneck, we must calculate the layer's Arithmetic Intensity (AI) and compare it to the hardware's ridge point. The AI is the ratio of compute operations to bytes moved. If the layer's AI is lower than the hardware's ridge point, it cannot supply data fast enough to keep the compute units busy, making it memory-bound.
  common_mistake: |
    **The Pitfall:** Assuming any low frame rate must be a compute bottleneck.
    **The Rationale:** Engineers focus heavily on the "35 TOPS" headline spec, ignoring the memory bandwidth constraints necessary to feed those compute units.
    **The Consequence:** They aggressively prune parameters, which ruins model accuracy, without actually improving latency (the 'memory wall' trap).
  napkin_math: |
    - **Arithmetic Intensity (AI):** 7 GOps / 50 MB = **140 Ops/Byte**.
    - **Hardware Ridge Point:** 35 TOPS / 51.2 GB/s = **~683 Ops/Byte**.
    - **Conclusion:** Since AI (140) < Ridge Point (683), the custom layer is severely **memory-bandwidth bound**.
  options:
  - The layer is compute-bound because its 7 GOps are too much for the A17 Pro's 35 TOPS.
  - The layer is memory-bound because its Arithmetic Intensity (140 Ops/Byte) is less than the A17 Pro's ridge point (~683 Ops/Byte).
  - The layer is compute-bound because its Arithmetic Intensity (140 Ops/Byte) is a high number, indicating a heavy compute load.
  - The layer is neither compute-bound nor memory-bound; the bottleneck is likely power throttling on the SoC.
  correct_index: 1
