title: Thermal Degradation on Shared Memory NPU
scenario: 'You are deploying a real-time object tracking model for a camera application on the Samsung
  Exynos 2400 NPU. The NPU provides 34.7 TOPS across its dual-core architecture and shares 12 GB of LPDDR5X
  memory with the CPU, GPU, and ISP. During continuous 4K video recording, thermal management triggers
  a 50% frequency reduction on the NPU. You must evaluate two graceful degradation strategies: Option
  A dynamically loads a lightweight INT8 fallback model to maintain 60fps, while Option B keeps the resident
  model but sheds quality-of-service by dropping the tracking framerate to 30fps. Which is better?'
question: "Under a 50% Exynos 2400 NPU throttle, should tracking load an INT8 fallback model or drop from 60 FPS to 30 FPS?"
details:
  realistic_solution: Option B is the superior fail-operational strategy. By shedding the framerate, the
    system instantly reduces compute requirements without incurring any memory I/O penalty. This avoids
    competing with the ISP and GPU for the shared LPDDR5X bandwidth during a thermally constrained state,
    providing a seamless degradation in user experience without risking dropped camera frames.
  common_mistake: Candidates often choose Option A to maintain the high framerate, focusing purely on
    the compute reduction. They fail to account for the memory subsystem, forgetting that the 12 GB LPDDR5X
    is shared, and that loading new model weights during heavy ISP/GPU usage (4K recording) will cause
    severe memory contention and latency spikes.
  napkin_math: 'Baseline NPU capacity: 34.7 TOPS. Throttled capacity (50%): 17.35 TOPS. The primary model
    takes 0.5 TOPS/frame; at 60fps, it needs 30 TOPS (fails under throttling). Option A (Fallback model):
    Needs 0.2 TOPS/frame (12 TOPS total), but swapping a 50MB model into the shared 12 GB LPDDR5X while
    the ISP is heavily utilizing bandwidth for 4K video causes a pipeline stall. Option B (Halve framerate):
    0.5 TOPS * 30fps = 15 TOPS. 15 TOPS < 17.35 TOPS throttled limit. Zero memory swap cost, instantly
    resolving the thermal constraint.'
