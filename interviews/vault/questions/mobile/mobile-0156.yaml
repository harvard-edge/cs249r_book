title: The Delta Update Dilemma
scenario: Your team has trained a new 220 MB CV model. This exceeds the App Store's 200 MB cellular download limit. The new model is an evolution of a 50 MB v1 model already in your app binary. Analysis shows 45 MB of the v1 model is byte-for-byte identical to the new model.
question: What is the approximate size of a delta patch to upgrade the model, and does it solve the OTA limit?
details:
  realistic_solution: A delta patch works by shipping only the data that has changed between the two versions.
  common_mistake: |
    **The Pitfall:** Subtracting the total v1 file size instead of the shared byte size.
    **The Rationale:** Candidates confuse file size differences (220 MB - 50 MB = 170 MB) with the actual shared byte logic of a binary patch.
    **The Consequence:** The patch size will be incorrectly estimated, potentially leading to a rejected update if the true delta size exceeds the cellular threshold.
  napkin_math: |
    1. Identify new target model size: 220 MB.
    2. Identify identical shared data: 45 MB.
    3. Calculate delta patch size: 220 MB (total needed) - 45 MB (already on device) = **175 MB**.
    4. Evaluate solution: 175 MB is less than the 200 MB limit, so the patch strategy succeeds.
  options:
  - '`~170 MB`: Yes, the patch size is the difference between the new and old models and is under the 200 MB limit.'
  - '`~5 MB`: Yes, the patch is only the data that changed from the original 50 MB model.'
  - '`~175 MB`: Yes, the patch contains the new model''s data minus the shared portion, and is under the 200 MB limit.'
  - '`220 MB`: No, a patch is just a compressed version of the new model and won''t be small enough.'
  correct_index: 2
