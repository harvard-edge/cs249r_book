title: The Night-Vision Overflow
scenario: You are an ML Systems Engineer on an automotive team, tasked with deploying a CNN-based drowsiness
  detection model on a new vehicle's SoC, which features an NPU similar to an Apple A17 Pro (35 TOPS INT8).
  The FP16 model is highly accurate but at 40ms per inference, it fails to meet the 33ms (30 FPS) real-time
  requirement. You apply standard post-training static quantization (PTSQ) using a large, daytime driving
  dataset for calibration. The resulting INT8 model runs in 20ms, but its accuracy on critical night-driving
  test cases plummets from 99% to less than 50%. A debug visualizer shows that during these failing night
  cases (when the driver is illuminated by an infrared camera), activation values in several early convolutional
  layers are frequently clamped to the maximum INT8 value of 127. Given this data, how would you diagnose
  and solve this catastrophic performance drop?
details:
  realistic_solution: The diagnosis is a classic calibration mismatch. The dynamic range of activation
    values produced by the model when processing infrared night-time imagery is significantly different
    from the range produced by daytime imagery. The original calibration dataset did not include this
    data distribution, so the calculated scale factor is incorrect for night-time inputs. This causes
    high-magnitude activations to be clipped, or 'saturated', at the max value of 127, destroying the
    information they carry and leading to wrong predictions. The solution is to create a new, representative
    calibration dataset that includes a diverse mix of driving conditions (day, night, dawn, dusk, IR
    camera on/off) and re-run the post-training quantization. This will provide the quantizer with the
    true, full dynamic range of the tensors, allowing it to set scale and zero-point values that prevent
    clipping across all expected conditions.
  common_mistake: The most common mistake is to immediately blame the quantization process itself ('PTSQ
    is just not good enough') and jump to a much more expensive solution like Quantization-Aware Training
    (QAT). Another is to blame the model architecture, suggesting a lengthy redesign. These approaches
    skip the crucial diagnostic step of interrogating the data used for calibration, which is often the
    true root cause.
  napkin_math: 'Let''s verify the 40ms FP16 time. If the model is 0.7 TFLOPs and takes 40ms, throughput
    is 0.7T / 0.04s = 17.5 TFLOPS. The NPU has 35 TOPS INT8, meaning FP16 is likely 17.5 TFLOPS (half
    INT8 throughput). Converting to INT8 doubles compute throughput to 35 TOPS and halves memory bandwidth.
    0.7 T-Ops / 35 TOPS = 20ms. The math perfectly aligns: INT8 runs exactly twice as fast on this architecture.'
  options:
  - The calibration dataset is not representative of night-driving conditions, causing activation saturation.
    Re-quantize with a more diverse dataset including night-time samples.
  - Post-training quantization is too aggressive for this architecture. The only reliable solution is
    to implement full Quantization-Aware Training (QAT) to retrain the model from scratch.
  - The NPU likely has a hardware bug related to sparse feature maps from IR images. The problematic layers
    should be forced to run on the more reliable CPU.
  - The model's architecture is fundamentally unstable for 8-bit precision. It must be redesigned with
    more normalization layers or replaced with a different model family like MobileNetV3.
