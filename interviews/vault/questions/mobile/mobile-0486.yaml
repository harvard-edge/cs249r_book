title: The Night-Vision Overflow
scenario: You deploy a CNN-based drowsiness detection model on a vehicle's NPU. Post-training static quantization (PTSQ) using daytime driving data reduces latency from 40ms to 20ms, but accuracy on infrared night-driving inputs plummets to <50% because early layer activations clamp to the maximum INT8 value of 127.
question: How would you diagnose and solve this catastrophic performance drop under night-time conditions?
details:
  realistic_solution: 'The root cause is a severe calibration distribution mismatch. The dynamic range of activation tensors produced by the model when processing infrared night-time imagery significantly exceeds the range established by daytime imagery. Because the original calibration dataset lacked this out-of-distribution (OOD) data, the static scale factor is incorrectly bounded, causing high-magnitude activations to saturate and clip at the maximum INT8 value of 127, destroying spatial information. The solution is to construct a representative calibration dataset encompassing diverse driving conditions and re-run PTSQ calibration using KL-divergence or MinMax optimization.'
  common_mistake: |
    **The Pitfall:** Immediately blaming the quantization algorithm or the model architecture and resorting to expensive Quantization-Aware Training (QAT).
    **The Rationale:** Engineers fail to investigate the calibration dataset, assuming PTSQ is universally flawed rather than recognizing a simple data distribution mismatch.
    **The Consequence:** Wasting massive engineering resources on unnecessary retraining and architectural redesigns when a simple data fix would suffice.
  napkin_math: |
    **Assumptions & Constraints:**
    - FP16 latency: 40ms.
    - FP16 compute requirement: 0.7 TFLOPs.
    - NPU INT8 throughput: 35 TOPS.

    **Calculations:**
    - FP16 throughput: 0.7 TFLOPs / 0.04s = 17.5 TFLOPS.
    - INT8 throughput: 35 TOPS (2x FP16 compute).
    - Expected INT8 latency: 0.7 T-Ops / 35 TOPS = 0.02s = 20ms.

    **Conclusion & Interpretation:**
    - **Result: 20ms (Data Distribution-Bound)**. The math perfectly aligns, indicating the hardware is executing flawlessly. The accuracy failure is purely a mathematical mapping error caused by out-of-distribution infrared calibration scales.
  options:
  - 'The calibration dataset is not representative of night-driving conditions, causing activation saturation. Re-quantize with a more diverse dataset including night-time samples.'
  - 'Post-training quantization is too aggressive for this architecture. The only reliable solution is to implement full Quantization-Aware Training (QAT) to retrain the model from scratch.'
  - 'The NPU likely has a hardware bug related to sparse feature maps from IR images. The problematic layers should be forced to run on the more reliable CPU.'
  - 'The model''s architecture is fundamentally unstable for 8-bit precision. It must be redesigned with more normalization layers.'
