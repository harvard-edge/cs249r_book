title: The 16ms UI Jank Deadline
scenario: 'You''re building a ''Smart Reply'' feature for a chat app on a new smartphone. The on-device
  LLM, running on the phone''s NPU, achieves a Time Per Output Token (TPOT) of 2 milliseconds. Your UI
  engineering partners have a strict rule: any single operation on the main application thread cannot
  exceed 16 milliseconds to maintain a smooth 60 FPS user experience. To avoid UI ''jank'', what is the
  maximum number of tokens you can generate *synchronously* before you must implement a background-threaded
  generation strategy?'
details:
  realistic_solution: 'To stay within the 16ms budget for a 60 FPS UI, you can generate a maximum of 8
    tokens. The calculation is straightforward: divide the UI deadline by the time it takes to generate
    a single token (`16ms / 2ms/token`). If the required reply is longer than 8 tokens, the generation
    must be performed on a background thread, and the results posted back to the UI, perhaps token-by-token,
    to prevent blocking the main thread and causing visible stutter.'
  common_mistake: Engineers often forget that mobile performance is not just about raw throughput (tokens/sec)
    but about latency within a real-time UI loop. They might calculate the total time for a long reply
    (e.g., 20 tokens * 2ms = 40ms) and think it's 'fast', without realizing that 40ms is over two full
    frame budgets, causing noticeable freezing. Another mistake is confusing the deadline (16ms) with
    the number of frames per second (60), leading to incorrect calculations.
  napkin_math: 1. **Identify UI Deadline:** To maintain 60 FPS, each frame must be rendered in 1000ms
    / 60 ≈ 16.67ms. The budget is given as 16ms.
  options:
  - 32 tokens
  - 30 tokens
  - 8 tokens
  - 16 tokens
  correct_index: 2
