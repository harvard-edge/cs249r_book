title: The 16ms UI Jank Deadline
scenario: You're building a 'Smart Reply' feature for a chat app on a new smartphone. The on-device LLM, running on the phone's NPU, achieves a Time Per Output Token (TPOT) of 2 milliseconds. Your UI engineering partners have a strict rule: any single operation on the main application thread cannot exceed 16 milliseconds to maintain a smooth 60 FPS user experience.
question: To avoid UI 'jank', what is the maximum number of tokens you can generate synchronously before you must implement a background-threaded generation strategy?
details:
  realistic_solution: 'To stay within the 16ms budget for a 60 FPS UI, you can generate a maximum of 8 tokens. The calculation is straightforward: divide the UI deadline by the time it takes to generate a single token (`16ms / 2ms/token`). If the required reply is longer than 8 tokens, the generation must be performed on a background thread, and the results posted back to the UI, perhaps token-by-token, to prevent blocking the main thread and causing visible stutter.'
  common_mistake: |
    **The Pitfall:** Misunderstanding the relationship between latency throughput and UI refresh rates.
    **The Rationale:** Engineers calculate the total time for a reply (e.g., 20 tokens * 2ms = 40ms) and think it's 'fast', ignoring that 40ms blocks multiple 16ms UI frames.
    **The Consequence:** The app freezes noticeably while generating the response, causing a poor user experience.
  napkin_math: |
    - Frame budget at 60 FPS: 1000ms / 60 ≈ 16.67ms.
    - UI deadline given: 16ms.
    - Time per token: 2ms.
    - **Max tokens = 16ms / 2ms = 8 tokens.**
  options:
  - 32 tokens
  - 30 tokens
  - 8 tokens
  - 16 tokens
  correct_index: 2
