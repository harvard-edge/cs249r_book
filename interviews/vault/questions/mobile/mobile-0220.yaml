title: The 16ms UI Jank Deadline
scenario: You are building a 'Smart Reply' feature for a chat app. The on-device LLM achieves a Time Per Output Token (TPOT) of 2 milliseconds. Your UI engineering partners mandate that any main-thread operation cannot exceed 16 milliseconds to maintain a smooth 60 FPS experience.
question: To avoid UI 'jank', what is the maximum number of tokens you can generate synchronously before you must implement a background-threaded generation strategy?
details:
  realistic_solution: To stay within the 16ms budget for a 60 FPS UI, you can generate a maximum of 8 tokens synchronously. If the required reply is longer, the generation must be offloaded to a background thread, dispatching results back to the main thread asynchronously to prevent blocking frame rendering.
  common_mistake: |
    **The Pitfall:** Misunderstanding the relationship between latency throughput and UI refresh rates.
    **The Rationale:** Engineers calculate the total time for a reply (e.g., 20 tokens * 2ms = 40ms) and consider it "fast", ignoring that 40ms blocks multiple 16ms UI frames.
    **The Consequence:** The app freezes noticeably while generating the response, causing a severely degraded user experience.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Frame budget at 60 FPS ≈ 16.67ms.
       - Strict UI deadline: 16ms.
       - Token latency (TPOT): 2ms.
    2. **Calculations:**
       - Max tokens = 16ms / 2ms = 8 tokens.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound (Latency).** A maximum of 8 tokens can be generated synchronously without dropping frames.
  options:
  - 32 tokens
  - 60 tokens
  - 8 tokens
  - 16 tokens
  correct_index: 2
