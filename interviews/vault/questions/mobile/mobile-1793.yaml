title: Grouped Query Attention Memory Impact for Long Context on Snapdragon 8 Gen
  3
scenario: A mobile LLM (Mistral-7B-Instruct) with GQA (32 Q heads, 8 KV heads, head_dim=128)
  runs on Snapdragon 8 Gen 3. At 16K context, calculate the KV cache size and compare
  with MHA (32 KV heads). The model has 32 layers, deployed at INT4.
question: What KV cache size does GQA use for a 16K-context Mistral-7B on Snapdragon,
  and how does it compare with MHA?
details:
  realistic_solution: 'GQA KV cache (8 heads): 2 × 8 × 128 × 16384 × 32 layers × 2B
    (FP16) = 2×8×128×16384×32×2 = 2×8×128×32×16384×2 bytes. = 2 × 8 × 128 × 32 × 16384
    × 2 = 17,179,869,184 bits = wait, let me recalculate: per token = 2 (K+V) × 8
    heads × 128 dim = 2048 elements. FP16: 4096 bytes/token/layer. 32 layers: 131KB/token.
    16384 tokens: 131KB × 16384 = 2.1GB. MHA (32 heads): 2×32×128 = 8192 elements
    × 2B = 16384 bytes/token/layer × 32 layers = 512KB/token × 16384 = 8.4GB. GQA
    saving: 8.4/2.1 = 4× reduction. At INT4 GQA: 2.1GB/4 = 0.525GB (INT4 is 4× smaller
    than FP16). Fits in 12GB Snapdragon RAM alongside 3.5GB INT4 model and 4GB OS.'
  common_mistake: Quantizing only the KV cache values without quantizing the keys;
    both K and V should be stored in the same precision, and INT4 KV cache requires
    careful per-head scale factors.
  napkin_math: 'GQA KV per token: 2×8×128×2B = 4096B/layer × 32 = 131KB/token. 16K
    context: 131KB × 16384 = 2.1GB (FP16). MHA: 4× more = 8.4GB. INT4 GQA: 2.1GB /
    4 = 0.525GB. Model INT4: 3.5GB. Total: 3.5GB (model INT4) + 0.525GB (KV INT4)
    + 4GB OS = 8.025GB < 12GB. Fits.'
