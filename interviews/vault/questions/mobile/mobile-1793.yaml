title: Grouped Query Attention Memory Impact for Long Context on Snapdragon 8 Gen 3
scenario: A mobile LLM (Mistral-7B-Instruct) with GQA (32 Q heads, 8 KV heads, head_dim=128) runs on Snapdragon 8 Gen 3. The model has 32 layers, deployed at INT4.
question: What KV cache size does GQA use for a 16K-context Mistral-7B on Snapdragon, and how does it compare with MHA?
details:
  realistic_solution: 'GQA KV cache (8 heads) calculation reveals massive memory savings over traditional Multi-Head Attention (MHA). By reducing the KV heads from 32 down to 8, GQA reduces the KV cache size by a factor of 4. Furthermore, storing the KV cache in INT4 format reduces it by another factor of 4 compared to FP16. This allows a 16K context window to safely fit alongside the 3.5GB model weights within the 12GB RAM limit of the device.'
  common_mistake: |
    **The Pitfall:** Quantizing only the KV cache values without quantizing the keys, or failing to properly account for the bit-width reduction.
    **The Rationale:** Engineers often use standard FP16 KV cache formulas and forget to adjust for INT4 quantization across the full KV tensor.
    **The Consequence:** This leads to vast overestimations of memory required, resulting in the rejection of feasible long-context use cases.
  napkin_math: |
    - **GQA KV per token:** 2 (K+V) × 8 heads × 128 dim = 2048 elements.
    - **FP16 Size:** 2048 × 2 bytes = 4096 bytes/layer.
    - **Total Layers:** 4096 × 32 layers = **131 KB/token**.
    - **GQA 16K Context:** 131 KB × 16384 tokens = **2.1 GB** (FP16).
    - **MHA Comparison:** 32 heads vs 8 heads = 4× more = **8.4 GB**.
    - **INT4 Reduction:** INT4 is 4× smaller than FP16 (4 bits vs 16 bits).
    - **INT4 GQA:** 2.1 GB / 4 = **0.525 GB**.
    - **Total RAM:** 3.5 GB (model) + 0.525 GB (KV cache) + 4 GB (OS) = 8.025 GB < 12 GB.
