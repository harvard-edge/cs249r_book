title: Grouped Query Attention Memory Impact for Long Context on Snapdragon 8 Gen 3
scenario: A mobile LLM (Mistral-7B-Instruct) with GQA (32 Q heads, 8 KV heads, head_dim=128) runs on an NPU. The model has 32 layers, deployed at INT4.
question: What KV cache size does GQA use for a 16K-context Mistral-7B, and how does it compare with MHA?
details:
  realistic_solution: GQA significantly mitigates the memory penalty of long context scaling. By collapsing KV heads from 32 down to 8, GQA cuts the fundamental KV footprint by a factor of 4. Furthermore, implementing INT4 KV quantization compresses the tensor by another factor of 4 vs FP16. This 16x multiplicative reduction allows expansive context windows to reside safely in the highly constrained device RAM alongside the base weights.
  common_mistake: |
    **The Pitfall:** Applying standard MHA FP16 formulas and failing to account for the multiplicative reduction of GQA paired with integer quantization.
    **The Rationale:** Engineers mechanically apply default LLM formulas without tracing the architectural specifics of Grouped Query Attention or bit-width scaling.
    **The Consequence:** Drastically overestimating memory requirements, falsely classifying a feasible 16K context deployment as impossible and rejecting a viable product feature.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - GQA Config: 8 KV heads, 128 dim, 32 layers.
       - Context window: 16,384 tokens.
       - Quantization: INT4 (0.5 bytes per parameter).
    2. **Calculations:**
       - Elements per token: 2 (K+V) * 8 heads * 128 dim = 2048 elements.
       - FP16 bytes per token per layer: 2048 * 2 bytes = 4096 bytes.
       - Total FP16 KV size per token: 4096 bytes * 32 layers = 131 KB.
       - Total FP16 KV size (16K context): 131 KB * 16384 = 2.14 GB.
       - Total INT4 KV size (16K context): 2.14 GB / 4 = 0.53 GB.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound Optimization.** GQA combined with INT4 quantization massively compresses the KV cache from ~8.5 GB (standard MHA FP16) down to ~0.53 GB, fitting safely into edge device RAM.
