title: 'Mobile Transformer Cost Realization: Concrete Memory Layout for Mobile LLM'
scenario: 'Concretely calculate the memory layout for running Llama-3-1B (INT4, 32 layers, 2048 hidden, 32 heads, head_dim=64) as a draft model on Snapdragon 8 Gen 3 (16GB LPDDR5X). Account for: model weights, KV cache at 2048 context, OS overhead (4GB), and inference buffers.'
question: "Is there room for a 7B INT4 target model alongside the draft model for speculative decoding?"
details:
  realistic_solution: 'Llama-3-1B uses GQA with 8 KV heads (vs 32 Q heads). KV per token per layer: 2*8heads*64head_dim*1byte (INT8 KV)=1024 bytes per layer. 32 layers: 32KB per token. 2048 context: 32KB*2048=65MB KV. Draft model INT4: 1B*0.5=500MB. Total draft model+KV: 565MB. OS: 4GB. Activations/buffers: ~200MB. Total: 4.765GB. Available: 16-4.765=11.235GB. 7B INT4 target model: 7B*0.5=3.5GB. Add 7B KV (assuming same 8 KV heads, 32 layers for simplicity): 32KB*2048=65MB. 7B total: 3.565GB. Grand total: 4.765+3.565=8.33GB < 16GB. Fits! Speculative decoding with 1B+7B both resident: 8.33GB + buffers = ~9GB. 7GB headroom remaining. Confirmed feasible.'
  common_mistake: |
    **The Pitfall:** Calculating the KV cache using the hidden dimension instead of explicitly multiplying num_kv_heads by head_dim.
    **The Rationale:** Candidates forget that modern models like Llama-3 use Grouped Query Attention (GQA) which has significantly fewer KV heads than Q heads.
    **The Consequence:** Vastly overestimating the KV cache size and incorrectly concluding that speculative decoding is impossible on the device.
  napkin_math: |
    * **1B Draft Model (INT4):** 1B * 0.5 bytes = 500 MB.
    * **1B KV Cache (GQA with 8 KV heads):**
      * Per layer/token: 2 (K,V) * 8 heads * 64 dim * 1 byte (INT8) = 1,024 bytes (1 KB).
      * 32 layers = 32 KB / token.
      * 2048 tokens = 65 MB.
    * **Total 1B Allocation:** 500 MB + 65 MB = 565 MB.
    * **System Baseline:** 4 GB OS + 200 MB buffers + 565 MB (1B model) = 4.765 GB.
    * **Available Memory:** 16 GB - 4.765 GB = 11.235 GB.
    * **7B Target Model (INT4):** 7B * 0.5 bytes = 3.5 GB.
    * **7B KV Cache:** Assume similar 65 MB.
    * **Total 7B Allocation:** 3.565 GB.
    * **Final Check:** 11.235 GB available > 3.565 GB required.
    * **Yes, speculative decoding with both models easily fits, leaving over 7 GB of headroom.**
