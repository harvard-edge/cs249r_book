title: 'KV-Cache: Mastery — KV Cache Co-Design for Mobile LLM Architecture'
scenario: 'You are designing a new 1B LLM architecture specifically for Snapdragon 8 Gen 3 (45 TOPS INT8,
  16GB, 68 GB/s) targeting 30 tok/sec at 4096-token context. Co-design the model architecture and KV cache
  strategy together. Choose: num_layers, hidden_dim, num_KV_heads, KV quantization, and KV cache management
  policy.'
question: "How would you choose : num_layers, hidden_dim, num_KV_heads, KV quantization, and KV cache management policy?"
details:
  realistic_solution: 'Target: 30 tok/sec = 33.3ms per token. Bottleneck: weight loading + KV reading.
    Given KV at 4096 context, work backward to architecture choices.'
  common_mistake: Optimizing model architecture and KV cache independently; not using the decode throughput
    formula to work backward to architecture requirements.
  napkin_math: 'Target: 33.3ms per token at 4096 context. Budget: weight load = 33.3ms × 0.6 = 20ms →
    model size = 20ms × 68 GB/s = 1.36GB (INT4 weights). 1B model at INT4 = 500MB → headroom to 2.72B
    params. KV budget: 33.3ms × 0.35 = 11.7ms → KV size at 4096 ctx = 11.7ms × 68 GB/s = 795MB. KV per
    token: 795MB / 4096 = 194KB. Formula: num_layers × 2 × num_KV_heads × head_dim × 2B = 194KB. With
    24 layers, head_dim=128: 24 × 2 × n_kv × 128 × 2B = 194KB → n_kv = 194 × 1024 / (24 × 2 × 128 × 2)
    = 198,656 / 12,288 = 16.2. Use n_kv=16 (GQA-16). Check: 24 × 2 × 16 × 128 × 2B = 196,608B = 192KB/token.
    At 4096: 786MB KV. Weight load 500MB. Total BW: 500 + 786 = 1286MB at 68 GB/s = 18.9ms. + compute
    0.17ms. Total: 19.1ms → 52 tok/sec. Exceeds 30 tok/sec target! Alternative: use 32 layers with GQA-8
    (more depth, fewer KV heads). 32 × 2 × 8 × 128 × 2B = 131KB/token × 4096 = 537MB KV. Total BW: 500
    + 537 = 1037MB / 68 GB/s = 15.2ms → 65 tok/sec. Even better. Recommended architecture: 1B params,
    32 layers, hidden 2048, GQA-8 KV heads, INT4 weights, INT8 KV.'
