title: The Fusion Tax
scenario: You're optimizing a small CNN on a mobile device. You notice that the profiler shows many small, back-to-back operations running on the NPU.
question: "When a framework like Core ML or TensorFlow Lite applies operator fusion, what is the primary hardware cost it aims to reduce?"
details:
  realistic_solution: The primary cost reduced by kernel fusion is memory access overhead. Fusing sequential operations (e.g., Conv2D + BatchNorm + ReLU) allows intermediate activations to reside entirely in ultra-fast L1 SRAM, bypassing the heavily power-penalized round trip to LPDDR5 DRAM.
  common_mistake: |
    **The Pitfall:** Believing that fusion reduces the actual number of arithmetic computations (FLOPs).
    **The Rationale:** Candidates confuse "merging operations" with "doing less math," not realizing the same calculations occur but within a single loop.
    **The Consequence:** Misunderstanding the fundamental bottleneck of mobile ML, which is memory bandwidth, not compute.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Activation size: 1MB.
       - LPDDR5 read/write energy: ~100pJ/byte.
       - Compute energy: 0.1pJ/MAC.
    2. **Calculations:**
       - Memory Cost = 1M * 100pJ * 2 (read/write) = 200,000 nJ.
       - Compute Cost = 1M MACs * 0.1pJ = 100 nJ.
    3. **Conclusion & Interpretation:**
       - **Result: Energy-Bound**. DRAM access is 2,000x more expensive than compute; fusion saves ~200 µJ per layer by keeping activations in SRAM.
  options:
  - The total number of arithmetic computations (FLOPs).
  - The model's storage footprint on the device's flash memory.
  - The latency and power cost of writing intermediate tensors to main memory (DRAM).
  - The time spent delegating unsupported operators to the CPU.
