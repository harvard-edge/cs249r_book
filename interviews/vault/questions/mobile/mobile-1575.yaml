title: 'Google Tensor G3: Mixed-Precision Strategy for On-Device LLM Inference'
scenario: A machine learning engineer is tasked with deploying a large language model
  (LLM) onto a mobile device powered by the Google Tensor G3, which features a 7.5
  TOPS on-device TPU and 12 GB of LPDDR5X memory. To achieve the best possible inference
  performance and fit the model within memory constraints, the engineer is exploring
  various mixed-precision techniques. Describe the primary considerations for choosing
  between FP16, BF16, and FP8 formats for LLM inference on this specific hardware,
  and identify the typical challenges and benefits associated with each precision
  format in this context.
question: How would you choose a mixed-precision strategy for on-device LLM inference
  on Tensor G3?
details:
  realistic_solution: For the Google Tensor G3, BF16 is often a strong initial candidate
    for LLM inference due to its wider dynamic range (matching FP32's exponent range),
    which helps prevent overflow/underflow for LLM activations and weights without
    complex scaling. FP16 offers higher precision for normalized numbers but has a
    narrower dynamic range. FP8 (specifically E4M3 for weights/activations, or E5M2
    for weights, if supported natively by the Tensor G3's TPU) provides the greatest
    memory and speed advantages but typically necessitates extensive QAT and meticulous
    calibration to preserve model accuracy. The engineer should analyze the Tensor
    G3's specific TPU instruction set and memory architecture to identify which mixed-precision
    'recipes' are most efficient, and empirically test different precision mixes for
    various LLM layers, balancing the 12 GB LPDDR5X memory footprint with required
    accuracy and throughput.
  common_mistake: A common mistake is to assume that all lower-precision formats (FP16,
    BF16, FP8) are universally interchangeable or have uniform hardware support and
    performance benefits across all operations on the Google Tensor G3's TPU. Overlooking
    the specific dynamic range requirements of an LLM or neglecting the need for quantization-aware
    training (QAT) and calibration when moving to very aggressive low precision like
    FP8 can lead to significant accuracy degradation and inefficient utilization of
    the Tensor G3's capabilities.
  napkin_math: An LLM with 7 billion parameters would consume approximately 28 GB
    in FP32 (7B params * 4 bytes/param). Converting this to BF16 reduces memory to
    14 GB (7B params * 2 bytes/param), which is still slightly over the 12 GB LPDDR5X.
    This immediately suggests that further reduction, such as to FP8 (7B params *
    1 byte/param = 7 GB), or a hybrid BF16/FP8 strategy, is crucial to fit the model
    weights within the available memory. Regarding performance, if the Tensor G3's
    7.5 TOPS are optimized for lower precision (e.g., effectively delivering more
    operations per second at FP8 than FP16), then reducing precision could also lead
    to a theoretical increase in throughput, reducing inference latency.
