title: 'Google Tensor G3: Mixed-Precision Strategy for On-Device LLM Inference'
scenario: A large language model (LLM) is being deployed on a Google Tensor G3, which features a 7.5 TOPS TPU and 12 GB of LPDDR5X memory.
question: What are the primary considerations and trade-offs for choosing between FP16, BF16, and FP8 mixed-precision formats for LLM inference on this hardware?
details:
  realistic_solution: For the Google Tensor G3, BF16 is often a strong initial candidate for LLM inference due to its wider dynamic range (matching FP32's exponent range), which helps prevent overflow/underflow for LLM activations and weights without complex scaling. FP16 offers higher precision for normalized numbers but has a narrower dynamic range. FP8 (specifically E4M3 for weights/activations, or E5M2 for weights, if supported natively by the Tensor G3's TPU) provides the greatest memory and speed advantages but typically necessitates extensive QAT and meticulous calibration to preserve model accuracy. The engineer should analyze the Tensor G3's specific TPU instruction set and memory architecture to identify which mixed-precision 'recipes' are most efficient, and empirically test different precision mixes for various LLM layers, balancing the 12 GB LPDDR5X memory footprint with required accuracy and throughput.
  common_mistake: |
    **The Pitfall:** Assuming all lower-precision formats are universally interchangeable without calibration.

    **The Rationale:** Neglecting the specific dynamic range requirements of LLM activations and the necessity of Quantization-Aware Training (QAT).

    **The Consequence:** Severe model accuracy degradation and potential overflow/underflow errors during inference.
  napkin_math: |
    *   7B parameter LLM in FP32: 7B * 4 bytes = 28 GB.
    *   In BF16/FP16: 7B * 2 bytes = 14 GB (Exceeds 12 GB RAM limit).
    *   In FP8: 7B * 1 byte = 7 GB.
    *   **Result:** FP8 or a hybrid FP8/BF16 approach is mandatory to fit the model weights into available memory.
