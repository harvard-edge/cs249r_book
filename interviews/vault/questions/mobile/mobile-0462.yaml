title: The Headlight Blind Spot
scenario: 'You are an ML Systems Engineer on the autonomous driving team, tasked with optimizing a pedestrian
  detection model for a new vehicle''s mobile-based infotainment SoC (System on Chip). The FP16 version
  of the model has 99% accuracy in all conditions. To meet the power and latency budget, you use post-training
  quantization (PTQ) to convert the model to INT8. The model performs well in daytime test drives, but
  you discover a critical failure: it fails to detect pedestrians in over 50% of night-time scenes, especially
  when there are bright streetlights or oncoming headlights. Your telemetry shows that activation values
  in the first few convolutional layers spike dramatically in these high-contrast scenes. Diagnose the
  most likely root cause of this accuracy regression.'
details:
  realistic_solution: The root cause is activation overflow during the quantization process, driven by
    an unrepresentative calibration dataset. The presence of extremely bright pixels (from headlights)
    in night scenes creates a few activation values with huge magnitudes in the early layers. PTQ calibration
    calculates a single scaling factor for the entire layer based on the min/max values observed. To accommodate
    these rare, large outliers, the scale becomes very large. This catastrophically reduces precision
    for the vast majority of the activation values, which represent the actual pedestrian and background
    features. These features get 'crushed' to zero or near-zero integer values, rendering the pedestrian
    invisible to the model. The solution is to either use a more representative calibration set with HDR
    examples or apply mixed precision, keeping the first few volatile layers in FP16 and quantizing the
    rest to INT8.
  common_mistake: Engineers often attribute this failure to the general, unavoidable precision loss of
    INT8. They might immediately resort to expensive Quantization-Aware Training (QAT) without first diagnosing
    that the root cause is a *calibration dataset mismatch*. The post-training quantization (PTQ) is failing
    because its view of the world (the calibration data) didn't include the high dynamic range (HDR) scenarios
    the model sees in production, leading to incorrect scaling.
  napkin_math: Let's analyze one layer. With a normal daytime image, your activation values might range
    from [-20.0, 30.0]. The total range is 50. For INT8 [-128, 127], your quantization 'step size' (scale)
    is `50 / 255 ≈ 0.196`. A feature value of `1.0` is quantized to `round(1.0 / 0.196) = 5`.
  options:
  - The model's weights have overflowed the INT8 range because it was not trained with sufficient weight
    decay.
  - The mobile NPU lacks an optimized kernel for the convolutions used in the early layers, causing a
    fallback to the much slower CPU and breaking the real-time pipeline.
  - Activations in early layers are overflowing the 8-bit integer range due to high-contrast scenes, causing
    a catastrophic loss of precision for the majority of the feature data.
  - This is the expected, unavoidable accuracy drop from INT8. The model must be retrained from scratch
    using Quantization-Aware Training (QAT) to recover the lost accuracy.
  correct_index: 2
