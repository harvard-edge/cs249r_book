title: The Headlight Blind Spot
scenario: You are an ML Systems Engineer on an autonomous driving team optimizing a pedestrian detection model for an infotainment SoC. The FP16 model has 99% accuracy. Using post-training quantization (PTQ) to INT8, daytime accuracy remains high, but it fails to detect pedestrians in over 50% of night scenes with bright headlights. Telemetry shows activation values in early convolutional layers spike dramatically in these scenes.
question: Why does INT8 PTQ preserve daytime pedestrian accuracy but fail in high-contrast night scenes with headlights?
details:
  realistic_solution: The root cause is activation overflow during the quantization process, driven by an unrepresentative calibration dataset. The presence of extremely bright pixels (from headlights) in night scenes creates a few activation values with huge magnitudes in the early layers. PTQ calibration calculates a single scaling factor for the entire layer based on the min/max values observed. To accommodate these rare, large outliers, the scale becomes very large. This catastrophically reduces precision for the vast majority of the activation values, which represent the actual pedestrian and background features. These features get 'crushed' to zero or near-zero integer values, rendering the pedestrian invisible to the model. The solution is to either use a more representative calibration set with HDR examples or apply mixed precision, keeping the first few volatile layers in FP16 and quantizing the rest to INT8.
  common_mistake: |
    **The Pitfall:** Attributing the failure to unavoidable INT8 precision loss and resorting immediately to expensive Quantization-Aware Training (QAT).
    **The Rationale:** Engineers fail to diagnose that the root cause is a mismatch in the calibration dataset, which didn't include High Dynamic Range (HDR) scenarios.
    **The Consequence:** They waste significant time and compute on QAT when simply recalibrating the PTQ step with representative night-time images would solve the issue.
  napkin_math: |
    1. **Daytime Calibration:** Activation values range [-20.0, 30.0]. Total range is 50.
    2. **Daytime Scale:** INT8 uses 255 steps. Scale = 50 / 255 ≈ 0.196. A feature value of 1.0 quantizes to `round(1.0 / 0.196)` = 5.
    3. **Nighttime Spike:** Headlights cause activations to spike to 500.0. The new range is 520.
    4. **Nighttime Scale:** Scale = 520 / 255 ≈ 2.04. A critical feature value of 1.0 now quantizes to `round(1.0 / 2.04)` = 0.
    **Result:** The large quantization scale forced by the headlight outliers **crushes normal feature values to zero**, making pedestrians invisible.
  options:
  - The model's weights have overflowed the INT8 range because it was not trained with sufficient weight decay.
  - The mobile NPU lacks an optimized kernel for the convolutions used in the early layers, causing a fallback to the much slower CPU and breaking the real-time pipeline.
  - Activations in early layers are overflowing the 8-bit integer range due to high-contrast scenes, causing a catastrophic loss of precision for the majority of the feature data.
  - This is the expected, unavoidable accuracy drop from INT8. The model must be retrained from scratch using Quantization-Aware Training (QAT) to recover the lost accuracy.
  correct_index: 2
