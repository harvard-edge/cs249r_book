title: The Federated Learning Upload Tax
scenario: Your team is building a federated learning system to train a personalization model on mobile devices. The model has 5 million parameters. For privacy, you'll be using Federated Averaging, where each device sends its computed gradients (represented in FP16 precision) to the server.
question: "What is the primary communication bottleneck for the user, and what is the data payload size uploaded per training round?"
details:
  realistic_solution: The primary bottleneck for the user is the **upload bandwidth**. Sending a large data payload from a mobile device can be slow, consume a significant portion of a user's monthly data allowance, and drain the battery. The server sees the aggregate, but each individual user pays the upload cost.
  common_mistake: |
    **The Pitfall:** Underestimating the impact of upload payload size on the user's data plan.
    **The Rationale:** Engineers focus heavily on server-side compute costs and neglect that individual users bear the asymmetric mobile bandwidth and battery cost of uploading large gradient vectors.
    **The Consequence:** The app consumes massive amounts of user mobile data, leading to negative reviews and uninstalls.
  napkin_math: |
    1. **Assumptions & Constraints:** 5,000,000 parameters, FP16 precision (2 bytes/param).
    2. **Calculations:** 5,000,000 * 2 bytes = 10,000,000 bytes. 10,000,000 bytes = 10 MB.
    3. **Conclusion & Interpretation:** Upload payload is **10 MB per round**. **Result: Network-Bound**.
  options:
  - 5 MB
  - 20 MB
  - 10 MB
  - 40 MB
  correct_index: 2
