title: 'Network Bandwidth Bottlenecks: Design Memory Bandwidth Architecture for Mobile Multi-Model Inference'
scenario: Design a memory bandwidth-aware scheduling system for a Snapdragon 8 Gen 3 (16GB LPDDR5X, 77 GB/s) running 3 concurrent ML tasks: speech recognition (continuous, 1GB INT8 model, bandwidth: 2GB/s), LLM assistant (on-demand, 3B INT4, bandwidth: 76GB/s during decode), and camera depth estimation (at 30fps, 500MB FP16, bandwidth: 15GB/s).
question: How should a scheduler prevent memory bandwidth saturation across concurrent speech, LLM, and depth tasks?
details:
  realistic_solution: 'Total BW budget: 77GB/s. System overhead: 3GB/s. Available: 74GB/s. Speech: 2GB/s (constant). Depth: 15GB/s (at 30fps = 1/30 duty → avg 0.5GB/s). LLM: 76GB/s (during decode). Cannot coexist speech + depth + LLM: 2+15+76=93GB/s > 74GB/s. Schedule: when LLM is active, suspend depth estimation (acceptable if user is typing/talking, not looking at camera). Use priority queue: LLM > speech > depth. LLM active: speech 2GB/s + LLM 74GB/s = 76GB/s ✓. LLM idle: speech 2 + depth 15 = 17GB/s ✓.'
  common_mistake: |
    **The Pitfall:** Designing a simple time-sliced scheduler without tracking peak memory bandwidth demands.
    **The Rationale:** Candidates treat concurrency purely as a CPU/NPU sharing problem rather than an LPDDR5X bus capacity problem.
    **The Consequence:** Scheduling the LLM alongside depth estimation, resulting in 93 GB/s of demand on a 74 GB/s bus, causing immediate stalls and stuttering.
  napkin_math: |
    *   **Bus Limit:** 77 GB/s Total - 3 GB/s System = **74 GB/s Available**.
    *   **Task Demands:** Speech (2 GB/s), Depth (15 GB/s), LLM (76 GB/s peak decode).
    *   **Simultaneous Collision:** 2 + 15 + 76 = **93 GB/s** (Exceeds bus by 19 GB/s).
    *   **Pipelined Schedule:** Run LLM + Speech = 76 GB/s. Suspend depth while LLM decoding. Once decode finishes (45 ms), resume depth (15 GB/s) + Speech (2 GB/s) = 17 GB/s.
