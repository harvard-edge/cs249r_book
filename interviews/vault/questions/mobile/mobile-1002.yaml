title: 'Network Bandwidth Bottlenecks: Design Memory Bandwidth Architecture for Mobile Multi-Model Inference'
scenario: 'Design a memory bandwidth-aware scheduling system for a mobile SoC (16GB LPDDR5X, 77 GB/s) running 3 concurrent ML tasks: speech recognition (2GB/s), LLM assistant (76GB/s during decode), and camera depth estimation (15GB/s).'
question: How should a scheduler prevent memory bandwidth saturation across concurrent speech, LLM, and depth tasks?
details:
  realistic_solution: Implement a priority-based memory bandwidth scheduler that preempts non-critical tasks during peak LLM decode phases. Since the LLM decode strictly saturates the bus, suspend depth estimation dynamically, allowing speech recognition to run simultaneously.
  common_mistake: |
    **The Pitfall:** Designing a simple time-sliced scheduler without tracking peak memory bandwidth demands.
    **The Rationale:** Candidates treat concurrency purely as a CPU/NPU sharing problem rather than an LPDDR5X bus capacity problem.
    **The Consequence:** Scheduling the LLM alongside depth estimation, resulting in 93 GB/s of demand on a 74 GB/s bus, causing immediate stalls and stuttering.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Total Bus Limit: 77 GB/s.
       - System Overhead: 3 GB/s (74 GB/s available).
       - Task demands: Speech (2 GB/s), Depth (15 GB/s), LLM (76 GB/s peak).
    2. **Calculations:**
       - Simultaneous Collision: 2 GB/s + 15 GB/s + 76 GB/s = 93 GB/s.
       - Deficit: 93 GB/s - 74 GB/s = 19 GB/s overload.
       - Pipelined Schedule (LLM + Speech): 76 GB/s + 2 GB/s = 78 GB/s.
    3. **Conclusion & Interpretation:**
       - **Result:** Unmanaged execution exceeds the bus by **19 GB/s**.
       - **Bandwidth-Bound:** The scheduler must suspend the 15 GB/s depth task to allow LLM decode to proceed without extreme LPDDR thrashing.
