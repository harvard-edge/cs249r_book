title: Tensor G3 Operator Scheduling for Memory and Throughput Optimization
scenario: "You are tasked with deploying a large language model's (LLM) inference pipeline onto the Google Tensor G3 SoC. The LLM involves a critical sub-sequence of three operators: OpA, OpB, and OpC. OpA consumes an initial 1GB input tensor and produces a 0.5GB intermediate tensor (T1). OpB consumes T1 (0.5GB) and produces a 2GB intermediate tensor (T2). OpC consumes T2 (2GB) and produces a 0.5GB output tensor (T3)."
question: How would you schedule and fuse OpA, OpB, and OpC on Tensor G3 to reduce peak memory versus naive execution?
details:
  realistic_solution: 'The realistic solution involves constructing an operator dependency graph (DAG) and applying graph-level and hardware-aware optimizations. This includes:

    1.  **Memory-aware Scheduling:** Using algorithms that analyze tensor lifetimes to determine an execution order that minimizes the maximum concurrent memory footprint. This might involve rescheduling operators or prioritizing those that release large memory blocks.

    2.  **Operator Fusion:** Identifying opportunities to fuse multiple small, dependent operators (e.g., OpB and OpC here) into a single kernel. This eliminates the need to fully materialize intermediate tensors (like T2), significantly reducing memory bandwidth pressure and peak memory usage.

    3.  **Dataflow Analysis:** Precisely tracking when tensors are produced and consumed to enable immediate deallocation and maximize memory reuse.

    4.  **Hardware-aware Parallelism:** Leveraging the Tensor G3''s TPU for parallel execution of independent operations while carefully managing shared LPDDR5X memory access to avoid bottlenecks.'
  common_mistake: |
    **The Pitfall:** Prioritizing compute parallelism and executing operators sequentially without analyzing tensor lifetimes for fusion.
    **The Rationale:** Candidates treat operators as black boxes and rely entirely on topological sorting without considering memory materialization costs.
    **The Consequence:** Large intermediate tensors (like T2) are fully materialized in LPDDR5X, causing memory bandwidth stalls and peak memory spikes that can lead to OOM errors.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - OpA: 1GB In, 0.5GB Out (T1)
       - OpB: 0.5GB In, 2GB Out (T2)
       - OpC: 2GB In, 0.5GB Out (T3)
    2. **Calculations:**
       - Naive Peak Memory (OpB->OpC transition) = T2 (2GB) + T1 (0.5GB) = 2.5 GB
       - Fused Peak Memory (OpBC kernel) = T1 (0.5GB) + T3 (0.5GB) = 1.0 GB
       - OpA Peak Memory = 1GB + 0.5GB = 1.5 GB
    3. **Conclusion & Interpretation:**
       - **Result: 40% Peak Reduction. By fusing OpB and OpC, the massive 2GB T2 tensor is never materialized to LPDDR5X, dropping peak footprint from 2.5 GB down to 1.5 GB.**
