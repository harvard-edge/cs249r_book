title: The Fleet-Wide TCO Dilemma
scenario: You are an ML engineer at a car-sharing company with 2 million users. Your team wants to ship a new personalization feature that pre-warms the car's cabin. The feature can be trained either centrally or via federated learning.
question: Which cabin pre-warming training approach is cheaper once engineering operations cost is included?
details:
  realistic_solution: |
    Calculate the Total Cost of Ownership (TCO) for both options, including compute, data transfer, and the crucial engineering operations cost. While Federated Learning saves central compute, its operational overhead (maintaining complex client-side orchestrators and secure aggregators) often vastly exceeds basic central cloud costs for simple models.
  common_mistake: |
    **The Pitfall:** Focusing only on visible cloud compute and data transfer costs.
    **The Rationale:** Engineers assume Federated Learning saves money by reducing cloud compute, ignoring the massive operational overhead required to maintain it.
    **The Consequence:** Implementing a complex system that costs significantly more in engineering salaries than it saves in infrastructure.
  napkin_math: |
    **Assumptions & Constraints:**
    - Users: 2,000,000
    - Data Transfer: 10 KB/day per user
    - Transfer Cost: $0.09/GB
    - Central Compute: $4/day
    - FL Ops Overhead: $20,000

    **Calculations:**
    - Data Transfer: 2M * 10 KB/day = 20 GB/day = 7,300 GB/yr
    - Transfer Cost: 7,300 GB * $0.09/GB = $657/yr
    - Compute Cost: $4/day * 365 = $1,460/yr
    - Total Centralized TCO: $657 + $1,460 + $20,000 = $22,117

    **Conclusion & Interpretation:**
    - **Result: $22,117 (Operational Overhead-Bound)**. Centralized TCO is ~$22,117.
  options:
  - Federated Learning is cheaper because the weekly model updates result in less data transfer cost than daily user logs.
  - Centralized is cheaper because training one large model is more compute-efficient than aggregating millions of small ones.
  - Centralized is ~7x cheaper; the primary driver is the steep engineering and operational overhead of the Federated Learning system.
  - Federated Learning must be chosen because its privacy benefits are paramount and the company should bear any cost.
  correct_index: 2
