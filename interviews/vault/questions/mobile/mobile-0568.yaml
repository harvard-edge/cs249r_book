title: The Fleet-Wide TCO Dilemma
scenario: You are an ML engineer at a car-sharing company with 2 million users. Your team wants to ship a new personalization feature that pre-warms the car's cabin. The feature can be trained either centrally or via federated learning.
question: Which cabin pre-warming training approach is cheaper once engineering operations cost is included?
details:
  realistic_solution: The correct approach is to calculate the Total Cost of Ownership (TCO) for both options, including compute, data, and the crucial engineering operations cost.
  common_mistake: |
    **The Pitfall:** Focusing only on visible cloud compute and data transfer costs.
    **The Rationale:** Engineers assume Federated Learning saves money by reducing cloud compute, ignoring the massive operational overhead required to maintain it.
    **The Consequence:** Implementing a complex system that costs significantly more in engineering salaries than it saves in infrastructure.
  napkin_math: |
    1. Data Transfer: 2M users * 10 KB/day = 20 GB/day = 7,300 GB/yr.
    2. Transfer Cost: 7,300 GB * $0.09/GB = $657.
    3. Compute Cost: $4/day * 365 = $1,460.
    4. **Total Centralized TCO:** $657 (Data) + $1,460 (Compute) + $20,000 (Ops) = **$22,117**.
  options:
  - Federated Learning is cheaper because the weekly model updates (26TB/yr) result in less data transfer cost than the daily user logs (7.3TB/yr).
  - Centralized is cheaper because training one large model is more compute-efficient than aggregating millions of small ones, and this compute cost is the dominant factor.
  - Centralized is ~7x cheaper (~$22k vs ~$152k); the primary driver is the steep engineering and operational overhead of the Federated Learning system, not data or compute costs.
  - Federated Learning must be chosen because its privacy benefits are paramount and the company should bear any cost to avoid collecting user data.
  correct_index: 2
