title: Hardware-Aware NAS for Samsung Exynos 2400 NPU
scenario: You are tasked with deploying a real-time object detection model on an NPU. The primary goal is to achieve minimal inference latency while maintaining high accuracy on a given dataset.
question: "How would you approach a hardware-aware Neural Architecture Search (NAS) to find an optimal model architecture, specifically considering TOPS and memory constraints, and the implications of MCUNet-style approaches?"
details:
  realistic_solution: A realistic solution involves defining a NAS search space that explicitly incorporates hardware-relevant metrics (e.g., predicted latency, memory footprint derived from a hardware performance model or profile). Techniques like differentiable NAS or evolutionary algorithms can be employed, guided by a multi-objective optimization function that balances accuracy, latency, and memory usage. MCUNet's concept of micro-architecture search and joint design of neural network and inference engine could be adapted to leverage the NPU's specific architecture, potentially through fine-grained profiling or compiler-aware search strategies.
  common_mistake: |
    **The Pitfall:** Using generic FLOPs as a proxy for latency in the NAS search space.
    **The Rationale:** Candidates overlook specific hardware constraints like memory bandwidth, on-chip cache sizes, and varying precision throughputs.
    **The Consequence:** The NAS discovers architectures that are theoretically efficient but perform horribly in reality due to memory paging and poor hardware utilization.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Hardware: 34.7 TOPS NPU (16-bit integer math).
       - Model Compute Requirement: 100 GOPS.
    2. **Calculations:**
       - Theoretical Minimum Latency: (100 * 10^9) / (34.7 * 10^12) = ~2.8 ms.
       - Practical Latency Penalty: Memory access patterns and LPDDR5X data transfers will multiply this baseline.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound**
       - While theoretical compute fits a real-time budget, the working memory (activations) must fit within the NPU's on-chip SRAM cache to avoid severe LPDDR5X penalties.
