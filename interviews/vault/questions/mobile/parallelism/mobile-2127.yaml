title: BLE-Interval Scheduling for AR Pipelines
scenario: An asynchronous AR rendering pipeline operates across a watch, glasses, and phone communicating over BLE (2 Mbps) and Wi-Fi 6. The BLE link has a strict 20ms connection interval and Wi-Fi 6 has 5ms jitter.
question: Propose a scheduling strategy to minimize the pipeline bubble given the strict network constraints?
details:
  realistic_solution: Use the BLE 20ms connection event as the pipeline clock. Package watch-to-phone state updates so they are ready at least 5ms before each BLE event, reserve that 5ms as a Wi-Fi jitter guard for phone-to-glasses traffic, and double-buffer each stage so the renderer consumes batch k while the radios move batch k+1. Micro-batches should therefore be released on 20ms boundaries with a 5ms slack window rather than whenever compute finishes.
  common_mistake: |
    **The Pitfall:** Treating wireless links as continuous data streams.
    **The Rationale:** Engineers assume data is transmitted smoothly, ignoring the discrete, interval-based packet bursts of BLE.
    **The Consequence:** This misalignment causes micro-batches to frequently miss the 20ms BLE connection window, resulting in catastrophic frame drops.
  napkin_math: |
    **Assumptions & Constraints:**
    - BLE Interval: 20ms.
    - Wi-Fi Jitter: 5ms.
    - A micro-batch that misses a BLE event waits until the next 20ms event.
    - Double buffering lets the renderer consume batch k while radios prepare batch k+1.

    **Calculations:**
    - BLE opportunities occur at t = 0, 20, 40, ... ms.
    - Naive release after compute can land just after a BLE event, creating a worst-case bubble of nearly one full interval: about 20ms idle until the next BLE slot.
    - Aligned schedule targets each BLE event and requires Wi-Fi-dependent work to finish by 20ms - 5ms = 15ms for that interval.
    - The explicit guard reduces the scheduling bubble from up to 20ms to the 5ms jitter reserve; if jitter is within budget, the BLE slot is not missed.
    - Required buffering: one in-flight micro-batch plus one render-ready buffer, so the renderer consumes batch k while batch k+1 waits for the next 20ms radio release.
    - Steady-state throughput is therefore one released micro-batch every 20ms, with 5ms reserved for jitter and 15ms available for useful upstream preparation.

    **Conclusion & Interpretation:**
    - **Result: 20ms release cadence with a 5ms jitter guard and bounded bubble (Network-Cadence-Bound)**. Quantitatively, alignment avoids the worst-case 20ms missed-slot bubble and accepts a planned 5ms guard window per interval.
