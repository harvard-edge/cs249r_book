title: Designing an On-Device Continual Learning System
scenario: "You're designing a continual learning system for a mobile keyboard that adapts to each user's evolving vocabulary — new slang, work jargon, names of new contacts. The model must learn new patterns without forgetting old ones, train entirely on-device for privacy, and resist adversarial manipulation."
question: "How should a private mobile keyboard learn slang continuously on-device across heterogeneous hardware without catastrophic forgetting or data poisoning?"
details:
  realistic_solution: "Utilize Parameter-Efficient Fine-Tuning (PEFT), specifically LoRA adapters, to strictly bound the memory footprint. Freeze the base model and map it to storage via `mmap`. Maintain a small continuous replay buffer. To defend against data poisoning via malicious apps, implement a perplexity gating function: calculate perplexity on incoming training strings and reject inputs deviating >3x from the user's running average before allowing adaptation."
  common_mistake: |
    **The Pitfall:** Proposing full-model fine-tuning on recent data with a naive replay buffer.
    **The Rationale:** Candidates apply server-side training paradigms to mobile devices without considering the massive memory footprint of optimizer states for full weights.
    **The Consequence:** The training process causes catastrophic Out-Of-Memory (OOM) crashes on 4 GB RAM devices, and the lack of anomaly detection leaves the model vulnerable to adversarial data poisoning.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Frozen base model: 100 MB.
       - LoRA Adapters: 2.7 MB. Adam optimizer state: 2x adapter size.
       - Batch latency: 5 ms/sample. Perplexity check latency: 5 ms/sample.
    2. **Calculations:**
       - Peak Memory Footprint = 2.7 MB (Adapter) + 5.4 MB (Optimizer) + 0.5 MB (Buffer) = 8.6 MB.
       - Training Time (500 samples) = 500 * 5 ms (fwd) + 500 * 5 ms (bwd) = 5.0 s.
       - Security Check Time = 500 * 5 ms = 2.5 s.
       - Total Overhead Latency = 5.0 s + 2.5 s + 10.0 s (system) = 17.5 s.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound.** By freezing the base model and optimizing only the LoRA adapters, the total training footprint drops to **8.6 MB**, safely avoiding OOM limits and finishing execution in **17.5 seconds**.
