title: Drone Mesh Pipelining
scenario: A 5-node drone testbed runs a distributed 3D semantic segmentation model over a research mesh Wi-Fi link with measured 100ms stage compute and a synthetic 30ms worst-case multi-hop synchronization delay.
question: Create a micro-batch pipeline schedule that masks the 30ms mesh multi-hop synchronization delay, ensuring GPU utilization remains >80%?
details:
  realistic_solution: Partition the model into 5 ordered stages and run at least 2 micro-batches in flight per stage. At t=0, stage 1 computes micro-batch A for 100ms; at t=100ms it starts the 30ms mesh send for A while immediately computing micro-batch B from 100-200ms. Stage 2 receives A by t=130ms and computes A from 130-230ms, so its 30ms wait is hidden by stage 1's next 100ms compute window after warm-up. Repeat this staggered 100ms compute plus overlapped 30ms send pattern across all stages, with double buffers on each node for receive, compute, and send.
  common_mistake: |
    **The Pitfall:** Assuming static, tightly-coupled micro-batching works perfectly across wireless mesh hops.
    **The Rationale:** Candidates port cloud datacenter pipelining schedules without accounting for multi-hop mesh routing jitter.
    **The Consequence:** The schedule fails to hide network stalls, tanking GPU utilization far below the 80% target.
  napkin_math: |
    **Assumptions & Constraints:**
    - 100ms compute workload, 30ms multi-hop sync delay, >80% target utilization.

    **Calculations:**
    - Util = 100ms / (100ms + bubble) > 0.8.
    - Bubble must be < 25ms.
    - Unhidden 30ms sync gives 100 / 130 = 76.9% utilization, which misses the target.
    - With double-buffered overlap, steady-state exposed bubble is approximately 0ms because each 30ms send runs during the next 100ms compute slot.
    - Steady-state utilization after warm-up is approximately 100 / 100 = 100% for the compute stage, with fill and drain latency paid at sequence boundaries.

    **Conclusion & Interpretation:**
    - **Result: Double-buffered 2+ micro-batch pipeline (Network-Bound)**. The schedule meets the >80% target only if the 30ms mesh synchronization is overlapped with useful compute instead of inserted between compute stages.
