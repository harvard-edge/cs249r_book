title: Mobile Parallel Client Selection
scenario: A mobile Federated Learning (FL) round requires 20,000 successful client updates to advance. Historical telemetry shows 40% of selected clients initiate training, and 75% of those starters finish before the server deadline.
question: How many mobile clients must be invited to obtain 20,000 completed FL updates if 40% start and 75% of starters finish?
details:
  realistic_solution: To guarantee the 20,000 completed update threshold, calculate the compounded completion probability (the product of the initiation rate and the completion rate), then divide the target updates by this aggregate probability to aggressively over-provision the invitation pool.
  common_mistake: |
    **The Pitfall:** Inviting exactly 20,000 clients, completely ignoring device availability and pipeline dropout metrics.
    **The Rationale:** Treating asynchronous mobile edge devices as highly available, dedicated cloud worker nodes.
    **The Consequence:** The FL round catastrophically fails to meet the minimum update threshold for aggregation and the entire training epoch is discarded.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target updates required: 20,000.
    - Initiation Probability P(Start | Selected) = 0.40.
    - Completion Probability P(Finish | Start) = 0.75.

    **Calculations:**
    - Effective aggregate completion rate: 0.40 * 0.75 = 0.30 (30%).
    - Required invitation pool: 20,000 target / 0.30 success rate = 66,666.67.

    **Conclusion & Interpretation:**
    - **Result: 66,667 Clients (System-Bound)**. Exactly 66,667 clients must be selected to mathematically guarantee 20,000 aggregated updates, compensating for a 70% pipeline dropout rate.
