title: 'The On-Device Fine-Tuning Corruption: 3D Parallelism'
scenario: Your language learning app fine-tunes an on-device pronunciation model to each user's accent. After 2 weeks of personalization, 5% of users report the model accuracy drops to 60% and accepts clearly wrong pronunciations.
question: Why does on-device pronunciation personalization corrupt 5% of models after two weeks?
details:
  realistic_solution: The failure mode is Catastrophic Forgetting compounded by non-IID user input and interrupted optimizer states. Users repeating a narrow subset of phonemes cause local weights to heavily overfit, destroying the latent representations of generalized speech. Deploying Elastic Weight Consolidation (EWC) mitigates this by penalizing shifts on critical Fisher information matrices, paired with atomic UFS checkpointing to rollback interrupted training epochs.
  common_mistake: |
    **The Pitfall:** Blaming user data for systemic forgetting.
    **The Rationale:** Candidates assume the 5% of users are providing bad training data, given 95% of users improve.
    **The Consequence:** They ignore the catastrophic forgetting caused by highly non-IID local data and interrupted on-device optimizer states, leaving the systemic bug unfixed.
  napkin_math: |
    **Assumptions & Constraints:**
    - EWC Fisher matrix size: 20 MB.
    - Checkpoint write: 40 MB payload.
    - UFS 3.1 bandwidth: 1.5 GB/s.

    **Calculations:**
    - EWC Compute overhead: ~0.1 ms/batch.
    - Checkpoint writes: 40 MB / 1500 MB/s = 26.6 ms.

    **Conclusion & Interpretation:**
    - **Result: 26.6 ms penalty (Storage-IO-Bound)**. The atomic checkpointing is storage-IO-bound but fundamentally required to prevent model corruption.
