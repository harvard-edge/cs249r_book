title: The On-Device Fine-Tuning Pipeline
scenario: Your photo app has a 'search by description' feature powered by a CLIP-like model. Regional users complain of misclassifications, but privacy constraints prevent collecting user photos on central servers.
question: How would you design an on-device personalization system that adapts the model to each user's photo library?
details:
  realistic_solution: |
    Design an on-device Parameter-Efficient Fine-Tuning (PEFT) pipeline utilizing Low-Rank Adaptation (LoRA). The architecture freezes the heavy 150M parameter base model and maps it directly from storage using memory-mapped I/O (`mmap`). Only the small, newly injected LoRA adapter parameters (~73K) are loaded into active RAM and trained via backpropagation on the NPU using localized user data. This strict isolation allows instantaneous switching between regional models and completely avoids the devastating memory and thermal penalties of full on-device fine-tuning.
  common_mistake: |
    **The Pitfall:** Proposing to fine-tune the entire 150M parameter model on-device.
    **The Rationale:** Candidates default to standard cloud-based full fine-tuning.
    **The Consequence:** Training all parameters on a phone would take hours, drain the battery, and easily OOM.
  napkin_math: |
    **Assumptions & Constraints:**
    - Base Model: 150M parameters, FP16 (~300 MB).
    - LoRA Adapters: ~73K parameters (~294 KB).
    - Training load: 200 pairs * 50 steps.

    **Calculations:**
    - Memory for frozen weights (mmap'd): 0 MB of active RAM overhead.
    - Memory for trainable weights: ~294 KB.
    - Memory for intermediate activations: ~50 MB.
    - Total dynamic RAM footprint = ~50.3 MB.

    **Conclusion & Interpretation:**
    - **Result: 50.3 MB (Memory Capacity-Bound)**. Fine-tuning the entire 300MB model would demand gigabytes of dynamic activation memory, instantly OOM-killing the app. The LoRA architecture compresses the memory cost to under ~50MB, making on-device training viable.
