title: 'Apple A17 IPC Skew'
scenario: A mobile SoC runs a split language model where the CPU updates the KV cache and the NPU runs the linear layers, syncing via CoreMedia buffer queues.
question: Calculate the pipeline stall fraction per token given the NPU computes its chunk in 15ms, the CPU completes updates in 5ms, but IPC adds 3ms of skew per token.
details:
  realistic_solution: 'The effective bottleneck per token is the longer 15ms NPU time plus the 3ms IPC context switch penalty, resulting in an 18ms step time. The NPU stalls for the 3ms IPC overhead, while the CPU stalls for the entire 13ms difference. True pipeline latency must account for inter-processor communication overhead.'
  common_mistake: |
    **The Pitfall:** Assuming fully overlapped execution without accounting for the IPC context switch.
    **The Rationale:** Candidates assume the step time is simply the max(NPU, CPU) and forget the mandatory synchronization barrier incurred per token generation.
    **The Consequence:** They underestimate per-token latency and significantly overestimate overall system throughput.
  napkin_math: |
    **Assumptions & Constraints:**
    - NPU compute time: 15ms.
    - CPU compute time: 5ms.
    - IPC overhead: 3ms.

    **Calculations:**
    - Step time = max(15ms, 5ms) + 3ms = 18ms.
    - NPU stall time = 3ms (waiting on IPC sync).
    - Stall fraction = 3ms / 18ms = 16.6%.

    **Conclusion & Interpretation:**
    - **Result: 16.6% (I/O-Bound)**. The total pipeline stall fraction is 16.6% due to required synchronization.
