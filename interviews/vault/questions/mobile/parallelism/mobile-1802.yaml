title: Mobile FL Parallelism Safety Spec
scenario: A mobile FL platform wants to double selected clients per round.
question: What safeguards are required before doubling selected mobile FL clients per round to prevent harming user experience?
details:
  realistic_solution: Implement rigorous device-state telemetry gating (e.g., leveraging the OS BatteryManager API and ThermalState API). Ensure training only proceeds when the device is charging and on unmetered Wi-Fi. Limit continuous FL execution via a strict time-to-live (TTL) and mandate Secure Aggregation (SecAgg) protocol bounds. Increasing parallel clients blindly exacerbates straggler effects and causes unacceptable user-facing thermal degradation.
  common_mistake: |
    **The Pitfall:** Scaling concurrent FL clients to optimize server-side convergence without strict device-side gating.
    **The Rationale:** Treating mobile devices as homogeneous, dedicated cloud compute nodes rather than constrained, battery-operated edge devices.
    **The Consequence:** Rampant thermal throttling, catastrophic battery drain, and massive dropout rates (stragglers), which paradoxically stalls global model convergence.
  napkin_math: |
    **Assumptions & Constraints:**
    - Initial selection: 100 clients.
    - Proposed selection: 200 clients.
    - Yield rate without gating: 40%.
    - Thermal/Battery dropouts without gating: 60%.

    **Calculations:**
    - Current effective participants: 100 * 0.40 = 40 clients.
    - Proposed effective participants: 200 * 0.40 = 80 clients.
    - Cost of dropouts: 120 devices burn battery and heat up without successfully contributing to the round update.

    **Conclusion & Interpretation:**
    - **Result: Reliability-Bound**. Doubling concurrent clients without strict eligibility gating only multiplies wasted work and severe user-facing performance degradation.
