title: '5G FL Pipeline Bubble'
scenario: 'A federated edge pipeline uses 4 mobile devices over 5G NR (100 Mbps uplink) to partition a 50MB model update via micro-batches.'
question: 'Evaluate the pipeline bubble fraction if using 8 micro-batches per device, where each pass takes 50ms and 5G scheduling adds a 10ms barrier per micro-batch.'
details:
  realistic_solution: 'The pipeline bubble fraction follows the (p-1)/m scaling law, where p is the number of stages (devices) and m is the number of micro-batches. The 5G scheduling barrier extends the step time but doesn''t change the geometric bubble ratio of the pipeline fill/drain phases.'
  common_mistake: |
    **The Pitfall:** Using infinite bandwidth assumptions for mobile uplink or calculating raw step times without recognizing the geometric bubble fraction.
    **The Rationale:** Candidates focus entirely on the network throughput while forgetting the fundamental scaling laws of synchronous pipeline parallelism.
    **The Consequence:** The estimated pipeline efficiency is drastically overstated because the fill/drain overhead is ignored.
  napkin_math: |
    **Assumptions & Constraints:**
    - 4 mobile devices (stages, p = 4).
    - 8 micro-batches per device (m = 8).
    - 5G barrier is 10ms per micro-batch, pass is 50ms (total step 60ms).

    **Calculations:**
    - Pipeline bubble fraction formula: (p - 1) / m.
    - Bubble fraction = (4 - 1) / 8 = 3 / 8 = 0.375.
    - Pipeline efficiency = 1 - 0.375 = 0.625 (62.5%).

    **Conclusion & Interpretation:**
    - **Result: 37.5% Bubble (Protocol-Bound)**. The pipeline bubble fraction is 37.5%, heavily independent of the 10ms network barrier, bottlenecked mathematically by the small micro-batch count relative to the number of stages.
