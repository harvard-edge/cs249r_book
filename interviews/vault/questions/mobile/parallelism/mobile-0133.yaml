title: The Federated Learning Battery Drain
scenario: You implement Federated Learning to update a next-word prediction model directly on users' phones. The on-device training takes 10 minutes and consumes 2% of the battery. However, users complain that the app destroys battery life overnight.
question: If the math only takes 2% of the battery, where is the rest of the energy going?
details:
  realistic_solution: |
    The energy is being burned by the Cellular/Wi-Fi Radio Transmission. In Federated Learning, after the device computes the local weight updates via backpropagation, it must transmit those updates back to the central aggregator. Continuous radio baseband usage for large model uploads dominates the power budget compared to highly optimized NPU compute.
  common_mistake: |
    **The Pitfall:** Assuming compute is the only source of battery drain.
    **The Rationale:** Candidates often blame the memory intensity of the backpropagation algorithm, ignoring the massive energy cost of transmitting data over cellular or Wi-Fi networks.
    **The Consequence:** Failing to optimize the primary energy vampire (radio transmission) in federated learning deployments.
  napkin_math: |
    **Assumptions & Constraints:**
    - NPU Active Power: 1W
    - Training Duration: 10 mins (600s)
    - Cellular Radio Power: 2.5W

    **Calculations:**
    - Training Compute Energy: 1W * 600s = 600 Joules
    - Radio Transmission Energy (assuming 10 mins upload): 2.5W * 600s = 1500 Joules

    **Conclusion & Interpretation:**
    - **Result: 1500 Joules (Power/Network-Bound)**. Radio transmission uses significantly more energy than NPU compute.
