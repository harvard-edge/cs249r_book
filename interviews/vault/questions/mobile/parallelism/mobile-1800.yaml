title: Mobile Federated Parallelism Spec
scenario: A mobile training service wants to increase clients per round from 20,000 to 100,000.
question: What must be specified before scaling a mobile FL round from 20,000 to 100,000 selected clients?
details:
  realistic_solution: Specify aggregation bandwidth, secure aggregation fan-in, dropout tolerance, eligibility rules, client update size, privacy accounting, server validation throughput, and straggler deadline. More clients can improve coverage but can overload aggregation and privacy budgets.
  common_mistake: |
    **The Pitfall:** Scaling clients without evaluating aggregation overhead.
    **The Rationale:** Engineers assume more parallel clients strictly improves training, forgetting the quadratic costs of secure aggregation and network bandwidth.
    **The Consequence:** The server becomes overwhelmed by the incoming data, stalling the entire federated learning round.
  napkin_math: |
    **Assumptions & Constraints:**
    - Update size per client = 1 MB.
    - Total clients = 100,000.

    **Calculations:**
    - Total bandwidth required = 100,000 * 1 MB = 100,000 MB.

    **Conclusion & Interpretation:**
    - **Result: 100 GB per round (Network-Bandwidth Bound)**. The server must process massive bandwidth before secure-aggregation overhead.
