title: The Voice Assistant That Froze The Speedometer
scenario: Your team deploys a new voice assistant with an on-device LLM to your company's flagship electric vehicle. To maximize hardware utilization, you implement a continuous batching scheduler for the NPU. In single-query tests, the assistant is snappy. However, when QA tests it under realistic concurrent conditions, the digital speedometer and instrument cluster intermittently freeze.
question: Assess the situation: Why would an LLM scheduling optimization, designed to improve throughput, cause a catastrophic failure in the hard-real-time instrument cluster?
details:
  realistic_solution: This is a classic resource contention problem on a mobile System-on-Chip (SoC), specifically memory bandwidth starvation, directly caused by the continuous batching strategy. Continuous batching's goal is to keep the NPU 100% utilized by creating a persistent queue of work. This turns the NPU into a relentless, greedy consumer of the shared memory bus, constantly loading model weights and KV caches for its concurrent requests. On an SoC, the NPU, GPU (for the instrument cluster), and CPUs all share the same DRAM controller and bandwidth. The instrument cluster's small, periodic, but hard-real-time request to read its framebuffer from DRAM to the display controller gets stuck in the memory queue behind the NPU's massive, multi-gigabyte transfers. Queueing theory shows that as resource utilization approaches 100%, wait times explode non-linearly. The continuous batcher saturated the memory bus, causing the GPU's wait time to exceed its 16ms deadline, resulting in dropped frames and a system freeze. The optimization for LLM throughput directly starved the critical real-time rendering pipeline.
  common_mistake: |
    **The Pitfall:** Dismissing the freeze as purely an OS scheduler priority bug.
    **The Rationale:** Candidates assume CPU threads are the only contention point, missing the shared hardware memory bus.
    **The Consequence:** They tweak OS priorities indefinitely without realizing the NPU is physically saturating the DRAM controller.
  napkin_math: |
    *   **Bandwidth:** `77 GB/s`
    *   **7B INT4 Model:** `3.5 GB weights`
    *   **Single Query Speed:** `77 / 3.5 = 22 tok/s`
    *   **Batch 4 Throughput:** `4 * (77 / 3.5) = 88 tok/s`
    *   **Result:** **The continuous batcher forces 100% memory bus saturation, starving the GPU's 16ms render deadline.**
