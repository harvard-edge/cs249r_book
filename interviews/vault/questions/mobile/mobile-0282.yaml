title: The On-Device Memory Diet (mobile-0282)
scenario: You are shipping a new visual search feature on a flagship smartphone with 8GB of RAM. The app's
  total memory budget is 25% of the device's RAM. The core of the feature is a 150-million-parameter neural
  network, currently stored in FP16 precision. Calculate the memory required to load just the model's
  weights in FP16, and then calculate the memory required if you quantize it to INT8. Explain the implication
  of this change.
details:
  realistic_solution: The FP16 model requires 300 MB to store its weights, while the INT8 version requires
    150 MB. Quantizing the model from FP16 to INT8 cuts the memory required for weights in half. This
    is a critical optimization for mobile applications, as it reduces the app's overall memory pressure,
    decreases download size, and helps stay within the strict memory budgets imposed by the OS, preventing
    the app from being terminated.
  common_mistake: Engineers often confuse the memory multipliers for different precisions, for example,
    incorrectly assuming FP16 uses 4 bytes like FP32. Another common mistake is to confuse the inference
    memory footprint with the much larger training memory footprint, which includes gradients and optimizer
    states.
  napkin_math: '1. Memory Budget: 25% of 8GB RAM = 2GB (2,000MB) available. 2. Model Size: 150 million
    parameters in FP16 (2 bytes/param) requires 150M * 2B = 300MB of storage. 3. Activations & Overhead:
    Assuming activations and runtime overhead take ~2x model size (600MB), total footprint is ~900MB.
    4. Conclusion: 900MB is well within the 2GB limit, leaving 1.1GB for the visual search app''s UI and
    image buffers.'
  options:
  - '600 MB (FP16) and 300 MB (INT8). Mistake: Assumed FP16 uses 4 bytes (like FP32).'
  - 300 MB (FP16) and 150 MB (INT8). Correct calculation for both precisions.
  - '2.4 GB (FP16) and 1.2 GB (INT8). Mistake: Used the rule-of-thumb for training memory (16 bytes/param),
    not inference.'
  - '150 MB (FP16) and 75 MB (INT8). Mistake: Assumed FP16 uses 1 byte and INT8 uses 0.5 bytes.'
  correct_index: 1
