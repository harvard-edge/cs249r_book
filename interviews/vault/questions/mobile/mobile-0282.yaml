title: The On-Device Memory Diet (mobile-0282)
scenario: You are shipping a new visual search feature on a flagship smartphone with 8GB of RAM. The app's total memory budget is 25% of the device's RAM. The core of the feature is a 150-million-parameter neural network, currently stored in FP16 precision.
question: How much memory do FP16 vs INT8 weights need for a 150M-parameter visual search model on an 8 GB phone?
details:
  realistic_solution: The FP16 model requires 300 MB to store its weights, while the INT8 version requires 150 MB. Quantizing the model from FP16 to INT8 cuts the memory required for weights in half. This is a critical optimization for mobile applications, as it reduces the app's overall memory pressure, decreases download size, and helps stay within the strict memory budgets imposed by the OS, preventing the app from being terminated.
  common_mistake: |
    **The Pitfall:** Confusing the memory multipliers for different precisions.
    **The Rationale:** Engineers often incorrectly assume FP16 uses 4 bytes like FP32, or they confuse the inference memory footprint with the much larger training footprint.
    **The Consequence:** Unnecessary optimization efforts or failing to understand why an app is being terminated by the OS due to memory pressure.
  napkin_math: |
    1. Memory Budget: 25% of 8GB RAM = 2GB (2,000 MB).
    2. FP16 Model Size: 150M params * 2 bytes = 300 MB.
    3. INT8 Model Size: 150M params * 1 byte = 150 MB.
    4. Conclusion: Quantizing halves the weight footprint, saving **150 MB** of critical memory.
  options:
  - '600 MB (FP16) and 300 MB (INT8). Mistake: Assumed FP16 uses 4 bytes (like FP32).'
  - 300 MB (FP16) and 150 MB (INT8). Correct calculation for both precisions.
  - '2.4 GB (FP16) and 1.2 GB (INT8). Mistake: Used the rule-of-thumb for training memory (16 bytes/param), not inference.'
  - '150 MB (FP16) and 75 MB (INT8). Mistake: Assumed FP16 uses 1 byte and INT8 uses 0.5 bytes.'
  correct_index: 1
