title: Federated Learning Specification for Exynos 2400
scenario: Design a federated learning client specification for an on-device personalization model running
  on the Samsung Exynos 2400 NPU. The device features a dual-core NPU capable of 34.7 TOPS, but crucially
  shares its 12 GB LPDDR5X memory with the CPU, GPU, and ISP. You need to specify the local training loop
  constraints, memory budget, and synchronization frequency for a 50M parameter model to ensure it doesn't
  degrade the user experience while the camera or games are active. Break down the system interactions
  to define these safety and performance specifications.
question: "How would you design a federated learning client specification for an on-device personalization model running on the Samsung Exynos 2400 NPU?"
details:
  realistic_solution: The specification must include a context-aware resource manager that only schedules
    federated training when the device is idle, charging, and on Wi-Fi. To respect the shared memory architecture,
    the memory footprint should be strictly budgeted (e.g., capped at 500 MB) by using memory-efficient
    optimizers like SGD instead of Adam, and employing gradient accumulation with small batch sizes. The
    training loop must yield to higher-priority interrupts from the CPU or ISP.
  common_mistake: Candidates often treat the 12 GB RAM and 34.7 TOPS as dedicated to the ML workload,
    ignoring the shared nature of the LPDDR5X memory. They frequently propose large batch sizes or continuous
    training loops that would cause memory contention with the ISP during camera use, leading to OS-level
    out-of-memory kills or severe thermal throttling.
  napkin_math: A 50M parameter model in FP16 takes 100 MB for weights. Using Adam requires 300 MB for
    gradients and optimizer states (3 * 2 bytes * 50M), totaling ~400 MB (3.3% of the shared 12 GB LPDDR5X).
    If the NPU achieves ~17 TFLOPS in FP16 (half of its 34.7 TOPS INT8 peak), a backward pass for sequence
    length 128 requires roughly 38.4 GFLOPs. A batch size of 16 takes (16 * 38.4) / 17000 = ~36 ms per
    step. Duty-cycling this compute ensures the NPU doesn't saturate the shared memory bandwidth required
    by the GPU/ISP.
