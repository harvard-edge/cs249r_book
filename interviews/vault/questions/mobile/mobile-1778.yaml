title: Memory-Efficient Attention for On-Device LLM on A17 Pro
scenario: "You're deploying a 1B parameter LLM on A17 Pro (35 TOPS Neural Engine, 8GB unified memory) for on-device summarization with 2048-token context. Standard attention requires 16MB per layer for attention maps. With 24 layers and 16 heads, peak memory for attention alone is 6.1GB."
question: "How would you reduce attention memory for a 1B LLM with 2048-token context on A17 Pro?"
details:
  realistic_solution: 'Use Apple''s MLX framework which implements Flash Attention for Metal. Alternatively, use sliding window attention (context window 512 instead of 2048) to reduce the quadratic memory. With MLX: attention maps never materialize in full — tiled computation uses the M-series GPU efficiently. Set max context to 1024 for 8GB RAM budget.'
  common_mistake: |
    **The Pitfall:** Implementing full Flash Attention in Metal shaders expecting CUDA-like IO benefits on Apple's Neural Engine.
    **The Rationale:** Apple's Neural Engine does not support custom attention kernels; Metal GPU shaders are needed, and the unified memory architecture (CPU/GPU share DRAM) changes the bandwidth math.
    **The Consequence:** High engineering effort with negligible performance gains on mobile.
  napkin_math: |
    - A17 Pro: 8GB unified memory shared by CPU, GPU, ANE.
    - 1B model at INT4 = 500MB.
    - Activations per layer: `2048 * 2048 * 2 = 8MB`. 24 layers: 192MB activations.
    - Standard attention maps: `24 * 16 * 2048^2 * 2 = 3.2GB`.
    - Total standard memory: `500MB + 192MB + 3.2GB = 3.9GB`.
    - **Conclusion:** Flash Attention avoids storing the 3.2GB attention maps, saving **3.2GB** of memory and providing 1.2GB of headroom for the OS.
