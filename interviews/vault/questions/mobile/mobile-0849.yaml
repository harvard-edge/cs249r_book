title: 'Mobile Quantized Cache Size'
scenario: 'A mobile app stores 500,000 embedding vectors. Each vector is 64 dimensions. INT8 stores one byte per dimension, while packed INT4 stores two 4-bit values per byte.'
question: 'What cache size is needed for 500,000 64-dimensional embeddings in INT8 versus INT4?'
details:
  realistic_solution: 'INT8 uses 500,000 x 64 bytes = 32 MB. INT4 uses half, 16 MB, before metadata and alignment. The memory win is useful if retrieval quality holds.'
  common_mistake: |
    **The Pitfall:** Forgetting to multiply by vector dimension when estimating embedding cache size.
    **The Rationale:** Candidates count the number of vectors without accounting for the width of each vector.
    **The Consequence:** The cache memory requirement is grossly underestimated.
  napkin_math: |
    **Assumptions & Constraints:**
    - Vectors: 500,000.
    - Dimensions: 64.
    - Precision: INT8 (1 byte) vs packed INT4 (0.5 bytes).

    **Calculations:**
    - INT8 Size: 500,000 * 64 bytes = 32,000,000 bytes ≈ 32 MB.
    - INT4 Size: INT8 Size / 2 = 16,000,000 bytes ≈ 16 MB.

    **Conclusion & Interpretation:**
    - **Result: 16 MB (Memory-Bound)**. INT8 takes 32 MB, while packed INT4 takes 16 MB.
