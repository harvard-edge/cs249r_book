title: Designing On-Device Defenses for Exynos 2400 NPU
scenario: You are tasked with designing an on-device defense mechanism against adversarial perturbation attacks for a facial authentication model deployed on the Samsung Exynos 2400 NPU. The system must process camera frames in real-time while a secondary model detects adversarial noise before the main authentication model runs. The dual-core NPU provides 34.7 TOPS and shares a 12 GB LPDDR5X memory architecture with the CPU, GPU, and ISP.
question: How would you design on-device adversarial defenses for the Exynos 2400 NPU without blowing the latency or memory bandwidth budget?
details:
  realistic_solution: A realistic approach specifies a cascading pipeline where a lightweight preprocessing step disrupts high-frequency adversarial noise. A small, optimized detector model runs on one NPU core to flag suspicious frames, while the main authentication model runs concurrently on the second NPU core. This design minimizes main memory access by keeping intermediate tensors in NPU SRAM, preventing bandwidth starvation for the shared LPDDR5X.
  common_mistake: |
    **The Pitfall:** Proposing large adversarial purification models that ignore memory bandwidth limits.
    **The Rationale:** Candidates treat the NPU in isolation, forgetting that the 12 GB LPDDR5X is shared with the ISP streaming the camera frames.
    **The Consequence:** Pipeline stalls and dropped frames due to severe memory bandwidth contention, missing the strict 30 FPS requirement.
  napkin_math: |
    1. Latency budget at 30 FPS: 1000 ms / 30 = 33.3 ms per frame.
    2. Compute budget per frame: 34.7 TOPS / 30 FPS = ~1.15 Tera-Operations (1,150 GOPS).
    3. Total Model Compute: 500 GOPS (auth) + 150 GOPS (detector) = 650 GOPS (Fits within 1,150 GOPS).
    4. Bandwidth requirement: 50 MB/frame * 30 FPS = **1.5 GB/s**. This leaves ample headroom on the shared LPDDR5X bus.
