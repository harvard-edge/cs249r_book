title: Designing On-Device Defenses for Exynos 2400 NPU
scenario: You are tasked with designing an on-device defense mechanism against adversarial perturbation attacks for a facial authentication model deployed on a mobile dual-core NPU. The system must process camera frames at 30 FPS while a secondary model detects adversarial noise. The NPU shares memory with the CPU, GPU, and ISP.
question: How would you design on-device adversarial defenses for the NPU without blowing the latency or memory bandwidth budget?
details:
  realistic_solution: |
    Architect a highly constrained cascaded pipeline prioritizing edge memory locality. Execute a lightweight mathematical preprocessing step to intentionally distort high-frequency adversarial artifacts. A small, structurally optimized detector model operates on one NPU core to flag anomalies, running asynchronously with the main authenticator. Critically, intermediate feature maps must be pinned explicitly to NPU SRAM (Tightly Coupled Memory). This completely prevents intermediate tensors from flooding the LPDDR memory bus, dodging bandwidth contention with the ISP camera streams.
  common_mistake: |
    **The Pitfall:** Proposing massive adversarial purification transformer models that totally ignore LPDDR bandwidth physics.
    **The Rationale:** Candidates analyze NPU TOPS exclusively in a vacuum, structurally neglecting that the device's unified LPDDR architecture shares bandwidth dynamically with the ISP, CPU, and GPU.
    **The Consequence:** Immediate pipeline stalls and massive frame drops due to vicious memory bus contention, annihilating the real-time 30 FPS mandate.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Framerate Target: 30 FPS (33.3 ms per frame budget).
       - Hardware Compute/Bandwidth: 34.7 TOPS NPU, Shared LPDDR.
       - Pipeline Cost: Authenticator Model (500 GOPS) + Detector Model (150 GOPS).
       - I/O Footprint: 50 MB raw data per frame.
    2. **Calculations:**
       - Total Peak Compute Ceiling per frame: 34.7 TOPS / 30 FPS = ~1,156 GOPS.
       - Actual Combined Model Compute: 500 GOPS + 150 GOPS = 650 GOPS.
       - Bandwidth Verification: 50 MB/frame * 30 FPS = 1.5 GB/s load on the shared bus.
    3. **Conclusion & Interpretation:**
       **Result: 650 GOPS and 1.5 GB/s (Compute/Memory Safe).** The cascaded defense successfully preserves vast latency and bandwidth headroom as long as intermediate matrices avoid the LPDDR bus.
