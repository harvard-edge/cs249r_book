title: The Janky Background App
scenario: Your production mobile ML app experiences sporadic but significant latency spikes (e.g., from
  20ms to 150ms) during inference, even on high-end devices with plenty of theoretical headroom. These
  spikes are not correlated with thermal throttling. What common mobile systems issue is likely at play,
  and how would you try to identify the culprit?
question: "What common mobile systems issue is likely at play, and how would you try to identify the culprit?"
details:
  realistic_solution: "The most common issue is **resource contention from other background applications\
    \ or demanding OS services**. Even on powerful SoCs, mobile operating systems are designed to multitask.\
    \ Other apps (e.g., social media refreshing, email sync, game updates, background location services),\
    \ or even critical OS processes (e.g., garbage collection, system updates, logging, security scans),\
    \ can suddenly demand significant CPU cycles, GPU time, or memory bandwidth. When this happens, your\
    \ ML inference task, even if it has a relatively high priority, might be temporarily starved of resources,\
    \ leading to unpredictable latency spikes. This is particularly true if the background task is CPU-intensive\
    \ and your ML inference also has a significant CPU component (e.g., pre/post-processing, or a fallback\
    \ path).\n  To identify the culprit:\n  1.  **System Tracing:** Use Android's Systrace or Perfetto\
    \ (via `adb shell perfetto`) to capture detailed traces of CPU activity, GPU activity, memory usage,\
    \ and thread scheduling across the entire system during the latency spikes. Look for other process\
    \ IDs (PIDs) that become active or consume significant resources concurrently with your spikes.\n\
    \  2.  **Process Monitoring:** Use `adb shell top` or `adb shell dumpsys meminfo` to observe which\
    \ processes are consuming CPU and memory when the spikes occur.\n  3.  **Controlled Environment Testing:**\
    \ Test your app on a \"clean\" device with minimal other apps installed and background activity disabled.\
    \ If the spikes disappear, it confirms external interference."
  common_mistake: '"It''s a bug in our model or the TFLite runtime." While possible, "sporadic" and "significant"
    points to external factors.'
  napkin_math: A 20ms inference can easily jump to 150ms if your main thread is preempted for 100ms by
    a high-priority background service or another app's burst of activity. If a background app suddenly
    starts downloading a 100MB update, it can saturate Wi-Fi, CPU for decryption, and memory I/O, impacting
    your ML inference's data fetching or pre-processing.
