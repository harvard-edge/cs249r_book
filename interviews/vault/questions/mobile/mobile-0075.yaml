title: The Janky Background App
scenario: Your production mobile ML app experiences sporadic but significant latency spikes (e.g., from 20ms to 150ms) during inference, even on high-end devices with enormous theoretical compute headroom. These spikes are strictly not correlated with thermal throttling.
question: What common mobile systems issue is likely at play, and how would you try to identify the culprit?
details:
  realistic_solution: "The dominant failure mode is OS-level resource contention from competing background services. Modern mobile architectures are aggressively multitasking environments. System daemons (garbage collection, memory compression, I/O burst downloads) frequently preempt thread execution. To diagnose, utilize system tracing utilities (`nsys`, Android's `Perfetto`, or `Systrace`) to capture thread scheduling states during the exact temporal window of the spike, actively correlating your inference thread's wait-state with concurrent OS process IDs."
  common_mistake: |
    **The Pitfall:** Blaming the ML model weights, graph execution, or the TFLite runtime for the unpredictable latency spikes.
    **The Rationale:** Candidates tunnel-vision entirely onto the ML components, pretending the inference engine operates in an isolated, dedicated hardware vacuum.
    **The Consequence:** Months of engineering time are wasted attempting hyper-optimizations on the model graph when the root cause is external physical thread starvation.
  napkin_math: |
    **Assumptions & Constraints:**
    - Normal CPU/NPU inference latency: 20 ms.
    - Unexplained Tail Latency Spike: 150 ms.

    **Calculations:**
    - Execution penalty delta: 150 ms - 20 ms = 130 ms.
    - A high-priority OS scheduler preemption (e.g., a burst 100MB background app update) routinely stalls user-space threads for 100ms+ while saturating the memory bus.

    **Conclusion & Interpretation:**
    - **Result: 130 ms (Scheduling-Bound)**. The unpredictable 130ms penalty is a classic signature of thread starvation caused by concurrent high-priority OS tasks monopolizing the SoC.
