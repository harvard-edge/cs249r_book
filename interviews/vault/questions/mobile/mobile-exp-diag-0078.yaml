title: On-Device Fine-Tuning Battery Drain and Model Collapse
scenario: You are debugging a nightly on-device fine-tuning pipeline for the Gemini Nano LLM (2B parameters)
  on the Google Tensor G3. The pipeline collects 10,000 daily user interactions and attempts to fine-tune
  the model overnight using the on-device TPU. However, telemetry shows users are waking up to drained
  batteries, the fine-tuning process runs for over 4 hours while heavily taxing the 12 GB LPDDR5X memory,
  and the resulting model exhibits severe performance degradation (model collapse) on general tasks. Diagnose
  the root cause of this system failure and propose a data-centric solution.
question: "How would you diagnose the root cause of this system failure and propose a data-centric solution?"
details:
  realistic_solution: The root cause is the naive use of all collected daily data, which yields a terrible
    Information-Compute Ratio (ICR). Training on redundant daily noise causes model collapse (catastrophic
    forgetting) and exhausts the mobile thermal/battery budget. The solution is to implement on-device
    data pruning (coreset selection) to filter the 10,000 samples down to the most informative subset
    (e.g., top 5% highest loss interactions) prior to fine-tuning.
  common_mistake: Candidates often blame the memory bandwidth or suggest offloading the training entirely
    to the cloud. They frequently miss that the naive data selection strategy is the root cause of both
    the hardware exhaustion and the model collapse, failing to apply data efficiency techniques like coreset
    selection.
  napkin_math: 'Dataset size: 10,000 samples * 500 tokens/sample = 5 million tokens. Compute required
    for a 2B parameter model: 6 FLOPs * 2B params * 5M tokens = 60,000 TFLOPs. The Google Tensor G3 TPU
    provides 7.5 TOPS. Assuming 50% utilization due to memory bandwidth limits: 3.75 effective TOPS. Time
    required: 60,000 / 3.75 = 16,000 seconds (~4.4 hours), which drains the battery. Pruning to a 5% coreset
    reduces tokens to 250k, compute to 3,000 TFLOPs, and time to ~13 minutes.'
