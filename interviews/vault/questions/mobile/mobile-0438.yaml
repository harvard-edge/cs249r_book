title: The On-Device Generative AI OOM
scenario: Your team is fine-tuning a 7-billion parameter language model on a single H100 (80GB HBM). During training with the Adam optimizer, you immediately get a CUDA Out-Of-Memory (OOM) error.
question: Which strategy is most effective and direct to solve this specific OOM problem?
details:
  realistic_solution: Apply a parameter-sharding strategy like Fully Sharded Data Parallelism (FSDP) to distribute the optimizer state and gradients across multiple GPUs.
  common_mistake: |
    **The Pitfall:** Suggesting standard Data Parallelism (DDP).
    **The Rationale:** Candidates recognize DDP as a distributed training method but forget that DDP replicates the full model and optimizer state on every GPU.
    **The Consequence:** DDP will fail to resolve the OOM because each individual GPU still requires 98 GB of memory to hold the replicated state.
  napkin_math: |
    1. Calculate parameter memory: 7B params * 2 bytes (FP16) = 14 GB.
    2. Calculate optimizer memory: Adam requires 12 bytes/param * 7B = 84 GB.
    3. Total memory required: 14 GB + 84 GB = **98 GB**.
    4. Evaluate capacity: 98 GB > 80 GB HBM, resulting in OOM. FSDP divides this state across N GPUs.
  options:
  - Implement standard Data Parallelism (DDP) across two H100s to split the memory load.
  - Use Pipeline Parallelism to split the model layers between two H100s.
  - Implement Fully Sharded Data Parallelism (FSDP/ZeRO) across two H100s.
  - Switch from the Adam optimizer to SGD to reduce optimizer state memory.
  correct_index: 2
