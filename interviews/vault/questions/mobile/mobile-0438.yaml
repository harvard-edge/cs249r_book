title: The On-Device Generative AI OOM
scenario: Your team is fine-tuning a 7B parameter LLM on a single H100 GPU. During training with the Adam optimizer, you immediately get a CUDA Out-Of-Memory (OOM) error.
question: "Which strategy is most effective and direct to solve this specific OOM problem?"
details:
  realistic_solution: |
    Apply a parameter-sharding strategy like Fully Sharded Data Parallelism (FSDP) to distribute the optimizer state and gradients across multiple GPUs.
  common_mistake: |
    **The Pitfall:** Suggesting standard Data Parallelism (DDP).
    **The Rationale:** Candidates recognize DDP as a distributed training method but forget that DDP replicates the full model and optimizer state on every GPU.
    **The Consequence:** DDP will fail to resolve the OOM because each individual GPU still requires 98 GB of memory to hold the replicated state.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model: 7B parameters (FP16).
       - GPU VRAM: 80 GB.
    2. **Calculations:**
       - Parameter memory: 7B * 2 bytes = 14 GB.
       - Adam optimizer state: 7B * 12 bytes = 84 GB.
       - Total required: 14 GB + 84 GB = 98 GB.
    3. **Conclusion & Interpretation:**
       - **Result: Optimizer State OOM.** The 98 GB requirement exceeds the 80 GB limit. FSDP is needed to shard the optimizer state across multiple GPUs.
  options:
    - "Implement standard Data Parallelism (DDP) across two H100s."
    - "Use Pipeline Parallelism to split the model layers."
    - "Implement Fully Sharded Data Parallelism (FSDP/ZeRO) across two H100s."
    - "Switch to FP32 to compress the weights."
  correct_index: 2
