title: The Mobile GPU's Memory-Go-Round
scenario: You are optimizing a custom keyword-spotting model on a mobile chip. The profiler shows that a sequence of three operations (`Conv2D`, `BatchNorm`, `ReLU`) is taking up a significant portion of your 1.5ms latency budget, even though the model is small. The intermediate activation tensor between each operation is 1MB.
question: "Why is an unfused Conv2D-BatchNorm-ReLU sequence with 1 MB intermediates slow, and what optimization fixes it?"
details:
  realistic_solution: 'The bottleneck is memory bandwidth. Each separate operator writes its 1MB result to LPDDR5 memory, and the next operator reads it back. The solution is Operator Fusion, keeping intermediates in fast on-chip memory.'
  common_mistake: |
    **The Pitfall:** Focusing purely on computational complexity (FLOPs).
    **The Rationale:** Engineers assume small models must be fast, neglecting the massive overhead of memory round-trips between sequential ops.
    **The Consequence:** Suggesting drastic structural changes (like pruning) when a simple compiler optimization (fusion) solves the issue.
  napkin_math: |
    1. **Assumptions & Constraints:** LPDDR5 bandwidth ~51.2 GB/s (51.2 MB/ms). Intermediate tensor size is 1MB.
    2. **Calculations:** Transfer Cost: 1MB / 51.2 MB/ms = ~0.0195 ms. Unfused Overhead: 5 memory transfers * 0.0195 ms = ~0.1 ms.
    3. **Conclusion & Interpretation:** **~0.1 ms pure memory overhead**. Fusing operations eliminates this. **Result: Memory-Bandwidth-Bound**.
