title: Federated Training NPU Underutilization
scenario: Your team is deploying a cross-device federated learning model on smartphones
  equipped with the Qualcomm Hexagon NPU (Snapdragon 8 Gen 3). The hardware features
  a heterogeneous CPU+GPU+NPU architecture with 16 GB of shared LPDDR5X memory, and
  the NPU is capable of 45 TOPS INT8 compute. During the local on-device training
  phase of federated averaging, telemetry reveals that the training loop is unexpectedly
  slow, and the NPU utilization remains stubbornly below 1% of its peak capacity.
  Explain why this massive compute resource is severely underutilized during the local
  training phase.
question: Why this massive compute resource is severely underutilized during the local
  training phase?
details:
  realistic_solution: The local training process is heavily memory-bound due to the
    low arithmetic intensity of backpropagation with small batch sizes, requiring
    constant reading and writing of weights, activations, and gradients. While the
    Qualcomm Hexagon NPU delivers massive compute throughput (45 TOPS INT8), it relies
    on the shared LPDDR5X memory to fetch data. The memory bandwidth simply cannot
    feed the NPU fast enough, leaving the compute units starved for data and resulting
    in extremely low utilization.
  common_mistake: Candidates often misidentify the bottleneck as network communication
    latency, failing to recognize the question is specifically about the local on-device
    training phase. Others might incorrectly assume the NPU lacks support for backpropagation
    operations or is strictly thermally throttled, without analyzing the ratio of
    compute capability to memory bandwidth.
  napkin_math: Consider a fully connected layer with 1 million weights (1 MB in INT8).
    Processing a batch size of 1 requires reading 1 MB of weights and performing ~2
    million operations (MACs). This yields an arithmetic intensity of roughly 2 OPs/byte.
    To fully utilize the Qualcomm Hexagon NPU's 45 TOPS (45,000 GOPs) at an intensity
    of 2 OPs/byte, the system would require a staggering memory bandwidth of 22,500
    GB/s (45,000 / 2). Since shared LPDDR5X memory typically peaks around 60-80 GB/s
    (which must also be shared with the CPU and GPU), the maximum data delivery can
    only sustain roughly (80 GB/s * 2 OPs/byte) = 160 GOPs. This restricts the NPU
    to a maximum utilization of about 0.35% (160 / 45,000) of its peak compute, perfectly
    explaining the observed behavior.
