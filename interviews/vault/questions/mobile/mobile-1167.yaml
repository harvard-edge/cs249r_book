title: Diagnosing OOM on Exynos 2400 Shared Memory
scenario: Your team is deploying a 3B parameter conversational model with INT8 quantization onto a device featuring the Samsung Exynos 2400 NPU. The system has a shared 12 GB LPDDR5X memory pool across the CPU, GPU, ISP, and NPU. During a camera viewfinder session running simultaneously with the text inference, the NPU runtime suddenly throws an Out-Of-Memory (OOM) exception.
question: Why can a 3B INT8 conversational model OOM on Exynos 2400 during camera viewfinder despite 12 GB shared memory?
details:
  realistic_solution: The root cause is memory contention on the unified LPDDR5X bus. The OS, camera ISP, and background services reserve significant portions of the 12 GB pool. I would diagnose this by analyzing the system-wide memory map during the crash, calculating the actual free memory available to the NPU, and accounting for the model's runtime memory including weights, activations, and the KV cache.
  common_mistake: |
    **The Pitfall:** Assuming the entire 12 GB of memory is available exclusively for ML inference.
    **The Rationale:** Candidates calculate the static footprint of the model weights and ignore concurrent hardware blocks and OS background services.
    **The Consequence:** The model is deployed to production and crashes immediately when the user attempts to take a picture.
  napkin_math: |
    *   **Model Weights (3B INT8):** `3 GB`
    *   **Android OS Baseline:** `~4 GB`
    *   **Camera ISP / GPU Buffers:** `~2.5 GB`
    *   **KV Cache (1024 tokens):** `~0.5 GB`
    *   **Total System Commit:** `3 + 4 + 2.5 + 0.5 = 10.0 GB`
    *   **Result:** **This leaves just 2 GB of volatile headroom, which is instantly exhausted by fragmentation and background spikes.**
