title: Exynos 2400 NPU Telemetry and Straggler Detection System
scenario: You are tasked with designing a robust on-device telemetry and monitoring system for a real-time video processing model deployed on an NPU. The application runs continuously, sharing memory with the CPU, GPU, and ISP. The system must accurately detect thermal throttling and memory bandwidth contention (stragglers) without causing unacceptable profiling overhead.
question: "How should Exynos 2400 telemetry detect thermal throttling and memory stragglers with low reporting overhead?"
details:
  realistic_solution: A strong design aggregates telemetry on-device using a lightweight
    daemon that hooks into OS-level hardware performance counters. It calculates p90/p99
    latency percentiles and tracks NPU core utilization over 1-minute rolling windows.
    To detect stragglers accurately, the system correlates NPU execution delays with
    concurrent memory access spikes from the ISP/GPU in the shared 12 GB LPDDR5X pool.
    Alerts and compact histograms are batched and uploaded only during optimal radio
    conditions or when significant anomalies are detected.
  common_mistake: |
    **The Pitfall:** Proposing streaming raw inference latencies or high-frequency polling.
    **The Rationale:** Candidates fail to account for massive radio wake-up costs and often misattribute latency spikes to NPU thermal throttling rather than shared memory contention.
    **The Consequence:** The telemetry system severely degrades battery life and provides inaccurate root-cause diagnoses.
  napkin_math: |
    - Raw telemetry rate: 30 events/sec at 30 FPS.
    - Raw data size: 30 events/sec × 32 bytes/event × 3600s = ~3.4 MB/hour.
    - Aggregation payload: p50/p90/p99 (12B) + NPU util (4B) + peak memory BW (4B) = 20 bytes/minute.
    - Aggregated data size: 20 bytes/min × 60 mins = **1.2 KB/hour**.
    - **Conclusion:** Reduces hourly data transmission from 3.4 MB to 1.2 KB, massively minimizing radio wake-up costs.
