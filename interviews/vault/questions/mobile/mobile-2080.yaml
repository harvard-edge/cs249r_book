title: Queue Length Evaluation for Burst Processing on Neural Engine
scenario: A photo management app clusters photos overnight. The Neural Engine processes
  one photo every 20ms. The background daemon sends bursts of 100 photos every 5 seconds.
question: Evaluate the maximum queue length and the total time required to clear a
  single burst.
details:
  realistic_solution: A burst of 100 photos arrives instantaneously, making the maximum
    queue length exactly 100 photos. Processing them sequentially takes 100 * 20ms
    = 2000ms (2 seconds). Because the processing completes in 2 seconds, which is
    less than the 5-second interval between bursts, the queue clears fully before
    the next burst arrives.
  common_mistake: Assuming the queue will overflow over time without comparing the
    burst clearance time against the arrival interval.
  napkin_math: 100 * 0.02s = 2s < 5s interval.
