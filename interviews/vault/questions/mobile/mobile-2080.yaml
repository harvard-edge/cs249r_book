title: Queue Length Evaluation for Burst Processing on Neural Engine
scenario: A photo management app clusters photos overnight. The Neural Engine processes one photo every 20ms. The background daemon sends bursts of 100 photos every 5 seconds.
question: Evaluate the maximum queue length and the total time required to clear a single burst.
details:
  realistic_solution: A burst of 100 photos arrives instantaneously, making the maximum queue length exactly 100 photos. Processing them sequentially takes 100 * 20ms = 2000ms (2 seconds).
  common_mistake: |
    **The Pitfall:** Failing to verify burst clearance time against arrival interval.
    **The Rationale:** Candidates see burst traffic and assume the queue will overflow over time, without running the math to check if the interval allows full clearance.
    **The Consequence:** The team over-engineers complex load shedding logic for a queue that is already perfectly stable.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Burst size: 100 photos.
       - Processing time: 20ms per photo.
       - Burst interval: 5 seconds (5000ms).
    2. **Calculations:**
       - Max queue length = 100 photos.
       - Total burst processing time = 100 * 20ms = 2000ms (2 seconds).
       - Clearance check: 2s processing < 5s interval.
    3. **Conclusion & Interpretation:**
       - **Result: Stable System**. The 2-second processing time easily clears the queue before the next 5-second interval, ensuring complete stability.
