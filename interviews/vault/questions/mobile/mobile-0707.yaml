title: The Neural Engine Quantization Cliff
scenario: A 1B parameter model is 2 GB at FP16, 1 GB at INT8, and 500 MB at INT4. The phone has 2 GB available RAM. Apple ANE supports INT8/FP16. Qualcomm Hexagon supports INT4 natively.
question: What quantization choice should be used on Apple ANE versus Qualcomm Hexagon, and where is each platform's cliff?
details:
  realistic_solution: 'Each platform has a different optimal quantization point, and
    the cliff is where you fall off the NPU. On Apple ANE: INT8 is the sweet spot.
    FP16 = 2 GB fits in 2 GB available but leaves no room for KV-cache and activations
    (~300 MB), so it fails. INT8 = 1 GB + 300 MB overhead = 1.3 GB, fits comfortably,
    runs at 15 ms/token on ANE. INT4 = 500 MB memory savings, but ANE cannot execute
    INT4 natively. CoreML dequantizes INT4 to INT8 at runtime, routing through CPU/GPU
    instead of ANE. Latency jumps to 22 ms (47% slower than INT8) — this is the Apple
    cliff. On Qualcomm Hexagon: INT4 is the sweet spot. Hexagon NPU has native INT4
    datapaths. FP16 = 2 GB (won''t fit). INT8 = 1 GB, 19.6 ms. INT4 = 500 MB, 9.8
    ms — 2x faster than INT8 because the datapath processes twice as many elements
    per cycle. The Qualcomm cliff is at FP16 (exceeds memory). Decision: deploy INT8
    on Apple, INT4 on Qualcomm.'
  common_mistake: |
    **The Pitfall:** Blindly using INT4 everywhere for the smallest size.
    **The Rationale:** Assuming runtime dequantization on unsupported hardware (like Apple ANE) acts as a free compression layer.
    **The Consequence:** The compiler routes the INT4 layers entirely away from the NPU to the slower CPU/GPU, resulting in a massive latency cliff.
  napkin_math: |
    - **Memory Budget:** 2 GB available. FP16 (2GB weights + 300MB overhead) fails on both.
    - **Apple ANE:** INT8 (1GB + 300MB) fits and runs fast. INT4 must dequantize to CPU/GPU, dropping latency by 47% (the cliff).
    - **Qualcomm Hexagon:** INT4 (500MB + 300MB) fits and runs natively 2x faster than INT8. FP16 exceeds memory (the cliff).
    - **Result:** Deploy **INT8 on Apple** and **INT4 on Qualcomm**.
