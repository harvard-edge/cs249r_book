title: The Neural Engine Quantization Cliff
scenario: You're deploying a 1B parameter language model on-device. Apple's ANE supports INT8 and FP16
  but not INT4. Qualcomm's Hexagon NPU supports INT4 natively. Your model at FP16 is 2 GB, at INT8 is
  1 GB, and at INT4 is 500 MB. The phone has 6 GB RAM with 2 GB available. Walk me through the quantization
  decision for each platform and where the 'cliff' is.
question: "What quantization choice should be used on Apple ANE versus Qualcomm Hexagon, and where is each platform's latency or memory cliff?"
details:
  realistic_solution: 'Each platform has a different optimal quantization point, and the cliff is where
    you fall off the NPU. On Apple ANE: INT8 is the sweet spot. FP16 = 2 GB fits in 2 GB available but
    leaves no room for KV-cache and activations (~300 MB), so it fails. INT8 = 1 GB + 300 MB overhead
    = 1.3 GB, fits comfortably, runs at 15 ms/token on ANE. INT4 = 500 MB memory savings, but ANE cannot
    execute INT4 natively. CoreML dequantizes INT4 to INT8 at runtime, routing through CPU/GPU instead
    of ANE. Latency jumps to 22 ms (47% slower than INT8) — this is the Apple cliff. On Qualcomm Hexagon:
    INT4 is the sweet spot. Hexagon NPU has native INT4 datapaths. FP16 = 2 GB (won''t fit). INT8 = 1
    GB, 19.6 ms. INT4 = 500 MB, 9.8 ms — 2x faster than INT8 because the datapath processes twice as many
    elements per cycle. The Qualcomm cliff is at FP16 (exceeds memory). Decision: deploy INT8 on Apple,
    INT4 on Qualcomm.'
  common_mistake: '"Use INT4 everywhere for smallest size. On Apple, just dequantize INT4 to INT8 at runtime."
    Runtime dequantization INT4→INT8 on the ANE doesn''t work the way you''d hope. The ANE can''t execute
    INT4 operations — the CoreML compiler will route INT4-dequantized layers to the CPU or GPU instead
    of the ANE, destroying your latency.'
  napkin_math: 'Apple ANE (1B model): FP16 = 2 GB, 30ms (fits but slow). INT8 = 1 GB, 15ms (sweet spot
    ✓). INT4 = 500 MB, 22ms (memory savings but latency cliff ✗). Qualcomm Hexagon (1B model): FP16 =
    2 GB, 39ms. INT8 = 1 GB, 19.6ms. INT4 = 500 MB, 9.8ms (sweet spot ✓). Memory budget with 2 GB available:
    FP16 doesn''t fit on either (2 GB weights + KV-cache + activations > 2 GB). INT8 fits on both (1 GB
    + ~300 MB overhead = 1.3 GB). INT4 fits comfortably on Qualcomm (500 MB + 300 MB = 800 MB). Accuracy:
    INT8 = 0.5% perplexity increase vs FP16. INT4 (GPTQ) = 1.2% increase. Both acceptable for on-device
    assistant use cases.'
