title: Zero-Copy Video Pipeline
scenario: An iOS application feeds 4K 60fps camera frames into an INT8 CoreML model running on the Apple Neural Engine.
question: "Identify the data movement bottleneck if frames are passed as UIImages, and explain how to eliminate it."
details:
  realistic_solution: Passing UIImages requires the CPU to copy massive pixel buffers
    from the Image Signal Processor (ISP) into application memory, then to the NPU,
    draining battery. This is fixed by using CVPixelBuffer/IOSurface, allowing zero-copy
    memory pointer sharing directly between the ISP and NPU.
  common_mistake: |
    **The Pitfall:** Suggesting downsampling the image.
    **The Rationale:** Candidates assume the amount of data is the problem, rather than the architectural protocol of how the data is copied between memory spaces.
    **The Consequence:** Reducing model accuracy without solving the underlying battery drain caused by CPU memory copying.
  napkin_math: |
    - Image size: 4K resolution (3840×2160) × 4 bytes = 33 MB/frame.
    - Frame rate: 60 FPS.
    - Memory Copy Overhead: 33 MB × 60 = **~2.0 GB/s**.
    - **Conclusion:** Utilizing `CVPixelBuffer` allows zero-copy pointer sharing, eliminating this 2 GB/s overhead entirely.
