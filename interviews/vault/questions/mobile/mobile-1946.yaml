title: Zero-Copy Video Pipeline
scenario: An iOS application feeds 4K 60fps camera frames into an INT8 CoreML model
  running on the Apple A17 Pro Neural Engine.
question: Identify the data movement bottleneck if frames are passed as UIImages,
  and explain how to eliminate it.
details:
  realistic_solution: Passing UIImages requires the CPU to copy massive pixel buffers
    from the Image Signal Processor (ISP) into application memory, then to the NPU,
    draining battery. This is fixed by using CVPixelBuffer/IOSurface, allowing zero-copy
    memory pointer sharing directly between the ISP and NPU.
  common_mistake: Suggesting downsampling instead of addressing the memory-copy protocol
    overhead.
  napkin_math: 4K * 60fps * 4B = ~2 GB/s overhead
