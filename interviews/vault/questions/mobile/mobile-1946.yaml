title: Zero-Copy Video Pipeline
scenario: An iOS application feeds 4K 60fps camera frames into an INT8 CoreML model running on the Apple Neural Engine.
question: Identify the data movement bottleneck if frames are passed as UIImages, and explain how to eliminate it.
details:
  realistic_solution: |
    Passing UIImages requires the CPU to copy massive pixel buffers from the Image Signal Processor (ISP) into application memory, then to the NPU. This is fixed by using CVPixelBuffer, allowing zero-copy memory pointer sharing directly between ISP and NPU.
  common_mistake: |
    **The Pitfall:** Suggesting downsampling the image.
    **The Rationale:** Candidates assume the amount of data is the problem, rather than the architectural protocol of how data is copied between memory spaces.
    **The Consequence:** Reducing model accuracy without solving the underlying battery drain caused by CPU memory copying.
  napkin_math: |
    **Assumptions & Constraints:**
    - Image size: 4K (3840x2160), 4 bytes/pixel.
    - Frame rate: 60 FPS.

    **Calculations:**
    - Frame Size: 3840 * 2160 * 4 = 33.1 MB.
    - Memory Copy Overhead: 33.1 MB * 60 = ~1.99 GB/s.

    **Conclusion & Interpretation:**
    - **Result: Memory Copy Overhead.** Passing UIImages forces CPU copies, draining battery. CVPixelBuffer enables zero-copy sharing, eliminating the 2 GB/s bandwidth drain.
