title: Analyzing TTFT vs TPOT Bottlenecks
scenario: You are analyzing the end-to-end latency of a 3-billion parameter on-device
  LLM (Gemini Nano) running on a Google Tensor G3. The hardware features an on-device
  TPU with 7.5 TOPS and 12 GB of LPDDR5X memory. You observe that while the Time To
  First Token (TTFT) for a 50-token prompt is relatively fast, the Time Per Output
  Token (TPOT) is surprisingly slow, causing the total generation time for a 100-token
  response to be the major bottleneck. Explain why this latency breakdown occurs by
  analyzing the utilization of the TPU and memory.
question: Why this latency breakdown occurs by analyzing the utilization of the TPU
  and memory?
details:
  realistic_solution: End-to-end latency breaks down into TTFT (prefill) and TPOT
    (decode). During prefill, the TPU processes multiple input tokens in parallel,
    achieving high utilization of its 7.5 TOPS compute capacity. However, during the
    decode phase (TPOT), the system processes only one token at a time. This requires
    loading the entire model from the 12 GB LPDDR5X memory into the TPU for each token,
    making it memory-bandwidth bound. Consequently, the TPU is severely underutilized
    during decode, explaining why the per-token generation latency dictates the overall
    slowness.
  common_mistake: Candidates often assume the 7.5 TOPS TPU dictates the speed of all
    generation phases equally. They fail to decompose latency and realize that while
    prefill (TTFT) can saturate the TPU's compute, the decode phase (TPOT) is heavily
    bottlenecked by the LPDDR5X memory bandwidth because weights must be loaded for
    every single generated token.
  napkin_math: 'Assume the Gemini Nano model is 3B parameters at 8-bit (3 GB footprint,
    fitting well within the 12 GB LPDDR5X). TTFT compute for 50 tokens: 2 * 3B * 50
    = 300 GigaOps. At 7.5 TOPS, TTFT compute time = 300 / 7500 = 0.04s (40ms). TPOT
    compute for 1 token: 2 * 3B * 1 = 6 GigaOps (<1ms at 7.5 TOPS). However, TPOT
    is memory-bound: loading 3 GB weights at typical LPDDR5X bandwidth (e.g., 50 GB/s)
    takes 3 GB / 50 GB/s = 60ms per token. Total decode for 100 tokens = 100 * 60ms
    = 6.0s. Thus, memory-bound TPOT dominates the compute-bound TTFT.'
