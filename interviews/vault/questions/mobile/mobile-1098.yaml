title: Analyzing TTFT vs TPOT Bottlenecks
scenario: You are analyzing the end-to-end latency of a 3-billion parameter on-device LLM (Gemini Nano) running on a Google Tensor G3. The hardware features an on-device TPU with 7.5 TOPS and 12 GB of LPDDR5X memory. You observe that while the Time To First Token (TTFT) for a 50-token prompt is relatively fast, the Time Per Output Token (TPOT) is surprisingly slow, causing the total generation time for a 100-token response to be the major bottleneck.
question: Why does the end-to-end latency of an on-device LLM become heavily bottlenecked during the decode phase (TPOT) rather than the prefill phase (TTFT)?
details:
  realistic_solution: End-to-end latency breaks down into TTFT (prefill) and TPOT (decode). During prefill, the TPU processes multiple input tokens in parallel, achieving high utilization of its 7.5 TOPS compute capacity. However, during the decode phase (TPOT), the system processes only one token at a time. This requires loading the entire model from the 12 GB LPDDR5X memory into the TPU for each token, making it memory-bandwidth bound. Consequently, the TPU is severely underutilized during decode, explaining why the per-token generation latency dictates the overall slowness.
  common_mistake: |
    **The Pitfall:** Assuming the 7.5 TOPS TPU dictates the speed of all generation phases equally.
    **The Rationale:** Candidates fail to decompose latency and realize that while prefill can saturate compute, decode is bottlenecked by memory bandwidth because weights must be loaded for every single generated token.
    **The Consequence:** They focus on compute optimizations (like pruning) instead of memory-bound optimizations (like quantization or KV cache) for the decode phase.
  napkin_math: |
    - Gemini Nano: 3B parameters at 8-bit = 3 GB footprint.
    - TTFT compute for 50 tokens = 2 * 3B * 50 = 300 GigaOps.
    - TTFT time at 7.5 TOPS = 300 / 7500 = 0.04s (40ms).
    - TPOT compute for 1 token = 2 * 3B * 1 = 6 GigaOps (<1ms at 7.5 TOPS).
    - TPOT memory load = 3 GB weights.
    - TPOT time at 50 GB/s bandwidth = 3 GB / 50 GB/s = 60ms per token.
    - Total decode for 100 tokens = 100 * 60ms = 6.0s.
    - **Memory-bound TPOT (60ms) heavily dominates the compute-bound TTFT (40ms).**
