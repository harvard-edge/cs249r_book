title: On-Device vs Cloud Inference Energy Budget on Tensor G3
scenario: A Pixel phone with Tensor G3 can run a voice assistant model locally in 80ms at 400mW, or offload to cloud in 200ms round-trip consuming 150mW for WiFi radio transmission. The user makes 200 voice queries/day.
question: How would you compare energy consumption to analyze under what conditions cloud offload is more efficient?
details:
  realistic_solution: 'On-device per query: 400mW × 80ms = 32mJ. Cloud per query: radio TX+RX = 150mW × 200ms = 30mJ + 50mW idle during cloud processing ≈ 40mJ total. Energy roughly equal per query! At 200 queries/day: on-device = 200×32mJ=6.4J; cloud = 200×40mJ=8J. On-device is 20% more efficient at 200 queries/day. Cloud wins if: (1) model too large for Tensor G3, (2) query rate exceeds on-device throughput, (3) radio energy amortized across multiple payload types. Cloud becomes worse if LTE radio required (LTE draws 1-2W vs WiFi 150mW).'
  common_mistake: |
    **The Pitfall:** Comparing only inference latency and ignoring the network's energy tax.
    **The Rationale:** Candidates often forget to include the radio energy required for network round-trips.
    **The Consequence:** They falsely conclude cloud offload is always more energy-efficient, missing that LTE/WiFi transfers often dominate mobile energy budgets.
  napkin_math: |
    - **On-Device Energy:** 400mW * 80ms = 32mJ per query. At 200/day = 6.4J/day.
    - **Cloud Energy (WiFi):** 150mW * 200ms = 30mJ + 50mW idle (10mJ) = 40mJ per query. At 200/day = 8.0J/day.
    - **Cloud Energy (LTE):** 1.5W * 200ms = 300mJ per query. At 200/day = 60J/day.
    - **Final Result:** **On-device is more efficient than WiFi (by 20%) and vastly more efficient than LTE (by 9.4x).**
