title: Exynos 2400 NPU vs CPU Audio Offloading
scenario: You are evaluating whether to run a continuous audio processing model on the CPU or the Samsung
  Exynos 2400 NPU. The dual-core NPU provides a theoretical 34.7 TOPS, but shares its 12 GB LPDDR5X memory
  with the CPU, GPU, and ISP, typically limiting sustained ML throughput to 20% of peak due to bandwidth
  contention. If your model requires 4 TOPS to run in real-time and the CPU can only sustain 1 TOPS, calculate
  the effective NPU utilization and determine if the NPU can handle the workload.
details:
  realistic_solution: The candidate should identify that the shared 12 GB LPDDR5X memory architecture
    significantly reduces sustained NPU performance. They must calculate the effective TOPS, verify it
    exceeds the 4 TOPS requirement, and contrast this with the CPU's 1 TOPS limit to justify offloading
    to the NPU.
  common_mistake: Candidates often compare the 4 TOPS requirement directly to the 34.7 TOPS peak, concluding
    an 11.5% utilization, which ignores the shared memory bottleneck. They may also fail to explicitly
    compare the effective NPU performance against the CPU's capability to justify the accelerator choice.
  napkin_math: Effective NPU Performance = 34.7 TOPS * 0.20 = 6.94 TOPS. Required Performance = 4.0 TOPS.
    NPU Utilization = (4.0 / 6.94) * 100 = 57.6%. Since 4 TOPS < 6.94 TOPS, the Exynos 2400 NPU can handle
    the workload, whereas the CPU (1 TOPS) would drop frames.
