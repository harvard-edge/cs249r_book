title: The Cold Start Jitter
scenario: Your ML-powered camera app experiences a noticeable 'hiccup' the very first time a user opens it and tries to snap a photo, even though subsequent photo captures are instantaneous. The inference itself is fast.
question: What system-level factors contribute to this initial delay, and how would you optimize them?
details:
  realistic_solution: |
    The initial delay, often called 'cold start latency,' is due to several one-time setup costs. 1. Model Loading: Reading from flash storage into RAM via mmap. 2. Memory Allocation: Contiguous memory mapped for weights and KV cache. 3. Runtime Initialization: ML drivers warm up. 4. Accelerator Context: NPU/GPU SRAM buffer allocation and shader JIT compilation. Optimize via Ahead-of-Time (AOT) compilation and background pre-warming.
  common_mistake: |
    **The Pitfall:** Assuming the first inference is slower just because of simple CPU cache misses.
    **The Rationale:** Candidates underestimate the massive system-level setup costs involved in loading models and initializing hardware delegates.
    **The Consequence:** Failing to implement proper background warm-up strategies, resulting in a poor user experience and missed real-time deadlines.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model size: 50MB
       - Flash read speed: 1.2 GB/s
       - NPU Initialization: 100ms
       - SRAM Transfer: 10ms
    2. **Calculations:**
       - I/O Time: 50 MB / 1200 MB/s = ~42 ms
       - Total Latency: 42 ms + 100 ms + 10 ms = 152 ms
    3. **Conclusion & Interpretation:** **Total cold start latency is 152 ms. Result: Initialization-Bound.**
