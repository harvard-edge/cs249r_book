title: Quantizing a Large Language Model for Samsung Exynos 2400 NPU Deployment
scenario: You are tasked with deploying a pre-trained large language model (LLM) for on-device inference on a mobile NPU (12 GB LPDDR5X RAM). The current model is in FP32, has a memory footprint of 8 GB, and inference latency is critical for user experience. You need to achieve at least 4x throughput improvement over FP32 while maintaining an accuracy drop of no more than 1% on a benchmark dataset.
question: How would you design a comprehensive quantization strategy to meet these quantitative memory and throughput constraints?
details:
  realistic_solution: Start with Post-Training Quantization (PTQ) using a representative calibration dataset, evaluating both per-tensor and per-channel INT8 quantization for different layers. Implement zero-point aware quantization. If INT8 PTQ doesn't meet the accuracy target, analyze layer-wise sensitivity to identify critical layers. For sensitive layers, consider Quantization-Aware Training (QAT) or mixed-precision approaches (e.g., keeping specific layers in FP16/BF16) or even INT4 for less sensitive layers. Continuously profile the model on the NPU to identify bottlenecks and fine-tune the strategy.
  common_mistake: |
    **The Pitfall:** Directly applying INT4 without intermediate INT8 validation.
    **The Rationale:** Candidates assume lower precision automatically solves the throughput problem without considering the destructive impact on accuracy.
    **The Consequence:** The model suffers severe accuracy degradation that is extremely hard to recover, failing the 1% drop constraint.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Original model: 8 GB footprint at FP32. Device memory: 12 GB limit.
       - Target: 4x throughput improvement.
    2. **Calculations:**
       - INT8 quantization memory size: 8 GB * (8 bits / 32 bits) = 2 GB.
       - FP32 memory reads per token: 8 GB.
       - INT8 memory reads per token: 2 GB (a 4x reduction in required memory bandwidth).
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound.** Quantizing down to INT8 fits comfortably in the 12 GB RAM constraints and inherently delivers the required 4x theoretical throughput boost by clearing the memory bandwidth bottleneck.
