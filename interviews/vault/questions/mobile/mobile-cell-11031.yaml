title: 'Dataset Curation: Implement Privacy-Preserving Data Collection on Snapdragon'
scenario: You are implementing differential privacy for federated data collection on 10M Snapdragon 8
  Gen 3 (45 TOPS INT8, 16GB) devices. Each device contributes gradients after local training on user data.
  Implement DP-SGD with ε=1.0 and calculate the noise scale required, clipping threshold, and privacy
  accounting.
question: "How should DP-SGD be implemented for federated gradients on Snapdragon devices with epsilon 1.0?"
details:
  realistic_solution: 'DP-SGD: clip per-sample gradients to C=1.0, add Gaussian noise σ=C×noise_multiplier.
    Use Moments Accountant or RDP for privacy accounting. Subsampling: if 10K devices participate per
    round from 10M, sampling rate q=0.001 — provides strong amplification.'
  common_mistake: Using the same noise multiplier for all batch sizes without accounting for subsampling
    amplification; not tracking privacy budget across rounds.
  napkin_math: 'DP-SGD parameters: target ε=1.0, δ=1/10M=1e-7, T=100 rounds. Subsampling rate q = 10K/10M
    = 0.001. Using RDP accountant: noise multiplier σ ≈ 1.1 achieves ε=1.0 at T=100 rounds with q=0.001
    (from Opacus library tables). Clipping: C=1.0 (gradient norm clipping). Per-gradient noise: σ×C =
    1.1 added to each of N gradient coordinates. For 1M param LoRA model: add N(0, 1.1²) to each coordinate.
    Communication overhead: noise vectors same size as gradients — zero overhead. Privacy cost check:
    100 rounds × RDP(α=8) ≈ 0.01 per round → total ε ≈ 0.8 < 1.0. Verified.'
