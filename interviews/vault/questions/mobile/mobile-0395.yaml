title: The Squeeze-and-Excitation Question
scenario: MobileNetV3 adds squeeze-and-excitation (SE) blocks that increase FLOPs by 2%. Your colleague
  says 'that's wasted compute — remove them to speed up inference.' Why is your colleague wrong?
details:
  realistic_solution: 'SE blocks are a channel attention mechanism: global average pool → small FC layer
    → ReLU → small FC layer → sigmoid → channel-wise multiply. They learn *which channels matter* for
    each input, effectively giving the network input-dependent feature selection. The 2% FLOP increase
    buys a 2-3% accuracy improvement. This means you can use a *smaller* base model (e.g., MobileNetV3-Small
    instead of MobileNetV2-1.0) and still hit the same accuracy target — saving 30%+ FLOPs overall. The
    SE block''s operations (global pool, small FC) are also extremely NPU-friendly — they map to a few
    MAC operations on the Neural Engine with near-zero overhead.'
  common_mistake: '"2% more FLOPs = 2% slower inference." This treats all FLOPs as equal, ignoring the
    accuracy-per-FLOP trade-off.'
  napkin_math: 'MobileNetV2-1.0: 300 MFLOPs, 72% top-1 ImageNet. MobileNetV3-Small with SE: 56 MFLOPs,
    67.4% top-1. MobileNetV3-Large with SE: 219 MFLOPs, 75.2% top-1. To match MobileNetV2''s 72% accuracy:
    MobileNetV3 needs ~150 MFLOPs (with SE) vs 300 MFLOPs (without SE). The 2% FLOP overhead of SE enables
    a 50% total FLOP reduction at equal accuracy.'
