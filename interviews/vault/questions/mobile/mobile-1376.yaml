title: 'On-Device LLM Active Learning Curation on Tensor G3'
scenario: 'To continuously improve the on-device Gemini Nano model without sending raw user data to the cloud, you must synthesize an architecture that selects and pseudo-labels difficult examples entirely on-device using a temporarily loaded secondary teacher model.'
question: 'How should an on-device active learning system curate LLM personalization data on Tensor G3?'
details:
  realistic_solution: 'The optimal architecture uses an asynchronous, on-device teacher-student setup triggered only when the device is idle and charging. A lightweight heuristic filters high-entropy user interactions during the day. At night, the OS unloads the standard Nano student model, loads a highly quantized 3B parameter teacher model into the 12 GB LPDDR5X RAM, and generates high-quality pseudo-labels for the day''s hard examples. These curated pairs are then used to compute gradients for federated learning.'
  common_mistake: 'Candidates often propose sending raw user text to the cloud for human labeling, violating strict privacy constraints, or they ignore the memory and thermal bottlenecks of running inference on multiple LLMs simultaneously on a mobile device. They may also propose active learning strategies like Monte Carlo Dropout that require too many expensive forward passes, draining the battery.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Tensor G3: 12 GB LPDDR5X RAM, 7.5 TOPS TPU.
    - Teacher model: 3B parameters, INT4 quantized.
    - Pseudo-label length: 50 tokens.
    - Utilization: 20% effective TPU utilization (1.5 TOPS).

    **Calculations:**
    - Memory footprint: 3B * 0.5 bytes = 1.5 GB.
    - Compute per example: 3B * 2 * 50 = 300 GFLOPs.
    - Time per example: 300 GFLOPs / 1.5 TOPS = 0.2 seconds.
    - Time for 1000 examples: 1000 * 0.2 s = 200 seconds.

    **Conclusion & Interpretation:**
    - **Result: 200 seconds (Compute-Bound).** Curating 1000 hard examples takes under 4 minutes, making it highly feasible for a nightly background task.
