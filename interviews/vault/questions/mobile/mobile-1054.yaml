title: 'Mobile Transformer Cost Implement: Calculate Token Budget for Mobile LLM'
scenario: 'Implement the maximum context length calculation for Phi-3-Mini-3.8B (INT4,
  32 layers, 32 heads, head_dim=64) on Snapdragon 8 Gen 3 (45 TOPS, 16GB, 77GB/s)
  that meets: P99 < 2s for 100 output tokens, leaving 4GB RAM for OS. Calculate: model
  memory, KV cache per token, maximum context tokens given RAM constraint, and verify
  throughput SLO.'
question: 'How would you calculate : model memory, KV cache per token, maximum context
  tokens given RAM constraint, and verify throughput SLO?'
details:
  realistic_solution: 'Memory budget allows ~40K context (10 GiB KV). However, verifying the throughput SLO reveals a bottleneck: decoding 100 tokens under 2s requires TPOT < 20ms. At 77 GB/s, 20ms allows reading only 1.54 GB per token. The INT4 3.8B model alone is 1.9 GB, taking ~24.7ms to read (failing the 20ms SLO before even adding KV cache bandwidth). Thus, the throughput SLO cannot be met on this hardware without speculative decoding.'
  common_mistake: 'Calculating KV cache per token incorrectly by using hidden_dim instead of num_heads*head_dim*2(K+V)*num_layers, giving a 2-32x error, and completely failing to verify the throughput SLO which reveals the latency constraint is tighter than the memory constraint.'
  napkin_math: 'Max context: 16 GiB - 4 GiB (OS) - 1.9 GiB (model) = 10.1 GiB. KV/token = 2 * 32 * 32 * 64 * 2B = 256 KiB. Max tokens = 10.1 GiB / 256 KiB = 41,369 tokens. SLO check: 2s / 100 tokens = 20ms TPOT. Required BW for model alone = 1.9 GB / 0.02s = 95 GB/s > 77 GB/s. Actual TPOT (model only) = 1.9 / 77 = 24.7ms. 100 tokens take > 2.47s. SLO fails.'
