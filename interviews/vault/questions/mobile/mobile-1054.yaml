title: 'Mobile Transformer Cost Implement: Calculate Token Budget for Mobile LLM'
scenario: Implement the maximum context length calculation for Phi-3-Mini-3.8B (INT4, 32 layers, 32 heads, head_dim=64) on Snapdragon 8 Gen 3 (45 TOPS, 16GB, 77GB/s) that meets a target of P99 < 2s for 100 output tokens, leaving 4GB RAM for OS.
question: How would you calculate model memory, KV cache per token, max context tokens given RAM constraints, and verify the throughput SLO?
details:
  realistic_solution: 'Memory budget allows ~40K context (10 GiB KV). However, verifying the throughput SLO reveals a bottleneck: decoding 100 tokens under 2s requires TPOT < 20ms. At 77 GB/s, 20ms allows reading only 1.54 GB per token. The INT4 3.8B model alone is 1.9 GB, taking ~24.7ms to read (failing the 20ms SLO before even adding KV cache bandwidth). Thus, the throughput SLO cannot be met on this hardware without speculative decoding.'
  common_mistake: |
    **The Pitfall:** Incorrectly calculating KV cache size and ignoring the bandwidth-limited throughput SLO.
    **The Rationale:** Candidates often use `hidden_dim` instead of calculating `num_heads * head_dim * 2 * num_layers`, and they assume fitting in memory guarantees meeting the speed target.
    **The Consequence:** Off-by-32x errors in cache sizing, and deploying a model that fits in RAM but catastrophically fails the latency requirements.
  napkin_math: |
    *   **Model Memory:** 3.8B INT4 = ~1.9 GiB.
    *   **Available RAM:** 16 GiB - 4 GiB (OS) - 1.9 GiB (Model) = 10.1 GiB.
    *   **KV per token:** 2 (K+V) * 32 layers * 32 heads * 64 dim * 2 bytes = 262,144 bytes = **256 KiB**.
    *   **Max Tokens:** 10.1 GiB / 256 KiB = **~41,369 tokens**.
    *   **SLO Target:** 2s / 100 tokens = **20 ms TPOT**.
    *   **Actual TPOT (Bandwidth Bound):** 1.9 GiB / 77 GB/s = **~24.7 ms** (> 20 ms).
    *   **Conclusion:** The throughput SLO fails before even accounting for KV cache reads.
