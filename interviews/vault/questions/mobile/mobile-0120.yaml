title: The Thermal Throttling Prediction
scenario: Your video editing app runs a style transfer model at 30 FPS. For the first 45 seconds, inference takes a steady 12ms per frame on the Snapdragon 8 Gen 3 NPU. Then latency gradually climbs to 24ms over the next 30 seconds and stabilizes there. The user complains about 'stuttering after a minute.' You can't make the model faster.
question: How should a Snapdragon 8 Gen 3 style-transfer app stay smooth when thermal throttling doubles latency after 45s?
details:
  realistic_solution: 'Build a **thermal-aware inference scheduler** that predicts throttling and adapts before the user notices. The thermal time constant is ~45s. At full 4W power, the SoC throttles at 45s, halving NPU frequency and doubling latency from 12ms to 24ms (below 30 FPS). Strategy: (1) Monitor SoC temperature via thermal sensors and predict throttle onset 10s in advance using the thermal curve. (2) At T-10s, proactively switch from the high-quality model (12ms at 4W) to a pre-compiled lighter variant at 720p (7ms at 2W). At 2W, thermal equilibrium stays below the throttle threshold indefinitely. (3) The user sees 30s of full-quality output, then a graceful resolution reduction — never stuttering. Compare: without thermal management, users get 45s of quality then permanent stutter at 15 FPS. With thermal management, they get 30s of premium quality then unlimited smooth 30 FPS at slightly reduced resolution. User satisfaction: Option B scores 4.2/5 vs 2.8/5 in A/B testing. The key insight: it''s better to voluntarily reduce quality early than to involuntarily stutter later.'
  common_mistake: |
    **The Pitfall:** Treating thermal throttling strictly as a hardware or user environment problem.
    **The Rationale:** Developers often assume that if a model is fully optimized and still throttles, the only solutions are adding a bigger heat sink or telling users to take breaks.
    **The Consequence:** The application provides a poor, stuttering user experience because the software fails to adapt to inevitable hardware thermal limits.
  napkin_math: |
    1. **Thermal Time Constant:** τ ≈ 45s. Full 4W power triggers throttling at 45s.
    2. **Throttled State:** Latency doubles from 12ms (max frequency) to 24ms (half frequency).
    3. **Equilibrium State:** Running at 2W maintains thermal equilibrium below the 85°C threshold indefinitely.
    4. **User Experience Option A:** 12ms for 45s, then 24ms forever (drops to 15 FPS, visible stutter).
    5. **User Experience Option B:** Proactively predict throttle at T-10s. Burst at 4W for 30s (12ms), then switch to 720p model at 2W (7ms) indefinitely.
    **Result:** A thermal-aware scheduler trades a slight resolution drop for **unlimited 30 FPS smoothness**, eliminating the 24ms stutter.
