title: The Thermal Throttling Prediction
scenario: Your video editing app runs a style transfer model at 30 FPS. For the first 45 seconds, inference
  takes a steady 12ms per frame on the Snapdragon 8 Gen 3 NPU. Then latency gradually climbs to 24ms over
  the next 30 seconds and stabilizes there. The user complains about 'stuttering after a minute.' You
  can't make the model faster. How do you deliver a smooth user experience despite thermal throttling?
question: "How should a Snapdragon 8 Gen 3 style-transfer app stay smooth when thermal throttling doubles latency after 45s?"
details:
  realistic_solution: 'Build a **thermal-aware inference scheduler** that predicts throttling and adapts
    before the user notices. The thermal time constant is ~45s. At full 4W power, the SoC throttles at
    45s, halving NPU frequency and doubling latency from 12ms to 24ms (below 30 FPS). Strategy: (1) Monitor
    SoC temperature via thermal sensors and predict throttle onset 10s in advance using the thermal curve.
    (2) At T-10s, proactively switch from the high-quality model (12ms at 4W) to a pre-compiled lighter
    variant at 720p (7ms at 2W). At 2W, thermal equilibrium stays below the throttle threshold indefinitely.
    (3) The user sees 30s of full-quality output, then a graceful resolution reduction — never stuttering.
    Compare: without thermal management, users get 45s of quality then permanent stutter at 15 FPS. With
    thermal management, they get 30s of premium quality then unlimited smooth 30 FPS at slightly reduced
    resolution. User satisfaction: Option B scores 4.2/5 vs 2.8/5 in A/B testing. The key insight: it''s
    better to voluntarily reduce quality early than to involuntarily stutter later.'
  common_mistake: '"Add a bigger heat sink or tell users to take breaks." You can''t change the phone''s
    thermal design, and telling users to stop using the feature is not a product solution. The mistake
    is treating thermal throttling as a hardware problem when it''s a software scheduling problem.'
  napkin_math: 'Thermal time constant τ ≈ 45s. Full power: 4W → throttle at 45s. Half power: 2W → thermal
    equilibrium at 49°C above ambient = 74°C (below 85°C threshold) → never throttles. Strategy: burst
    at 4W for 30s (high quality), then sustain at 2W indefinitely (medium quality). Effective user experience:
    30s of premium quality + unlimited medium quality vs. 45s of premium + degraded stuttering quality.
    Latency profile: Option A (no thermal management): 12ms for 45s → 24ms forever (drops to 15 FPS, visible
    stutter). Option B (thermal-aware): 12ms for 30s → 7ms forever at 720p (locked 30 FPS, smooth). User
    satisfaction: Option B scores 4.2/5 vs Option A at 2.8/5 in internal testing.'
