title: NPU Preemption and CPU Fallback Optimization
scenario: You are deploying an on-device language model for real-time translation on a smartphone featuring a dedicated NPU. During heavy multitasking, the NPU is preempted by a higher-priority camera workload, causing latency to spike beyond the 200ms budget and forcing a fallback to the CPU.
question: How would you design NPU preemption handling and CPU fallback without crashing or stalling the user experience?
details:
  realistic_solution: 'The system must implement a degradation ladder that drops from the primary 3B parameter NPU model to a highly quantized 1B parameter INT8 model optimized for the CPU. By analyzing the shared LPDDR5X memory bandwidth and compute availability, the system ensures the fallback model fits within the remaining bandwidth quota without starving the GPU or CPU.'
  common_mistake: |
    **The Pitfall:** Assuming the CPU can immediately take over the exact same workload.
    **The Rationale:** Candidates ignore memory bandwidth saturation on the shared LPDDR5X pool.
    **The Consequence:** Falling back to a 3B model on the CPU causes severe cache thrashing and thermal throttling, stalling the device entirely.
  napkin_math: |
    **Assumptions & Constraints:**
    - Primary Model (3B INT8): 3 GB footprint, requires ~60 GB/s bandwidth for 20 tokens/sec.
    - Fallback Model (1B INT8): 1 GB footprint, requires 20 GB/s bandwidth for 20 tokens/sec.
    - Shared System Bandwidth: LPDDR5X maximum is ~68 GB/s.

    **Calculations:**
    - NPU Preemption Deficit: CPU execution of 3B model saturates the 68 GB/s bus.
    - Fallback Bandwidth Savings: 60 GB/s - 20 GB/s = 40 GB/s.

    **Conclusion & Interpretation:**
    - **Result: 40 GB/s bandwidth saved (Memory-Bandwidth Bound)**. Falling back to the CPU with the 3B model starves the system memory bus; gracefully degrading to a 1B model prevents memory bus saturation.
