title: The Backbone Bloat
scenario: Your mobile app has three different computer vision features (Face Detection, Face Mesh, and
  Segmentation). All three use the same MobileNetV3 backbone. Based on the VRAM diagram, what is the 'efficiency
  gap' in your model loading strategy?
details:
  realistic_solution: 'You have **Backbone Redundancy**. The app loads three identical copies of the backbone
    weights and computes the same features three times per frame. The fix is a **Multi-Task Architecture
    with Shared Backbone**: load the backbone once (12 MB), run it once (6ms), and branch into three lightweight
    task heads. This reduces memory by 64% and latency by 40%.'
  common_mistake: '"Run the models in parallel on different cores." The phone has one NPU — parallel execution
    doesn''t help. And you''d still waste 24 MB of memory.'
  napkin_math: '3 tasks with MobileNetV3 (12MB weights). Independent execution: 3 * 12MB = 36MB RAM, and
    3 * 2 TFLOPs = 6 TFLOPs compute. Shared backbone: Features extracted once (12MB RAM, 2 TFLOPs), then
    branched to 3 light heads. Saves 24MB RAM and cuts compute by 66%, dropping per-frame latency from
    18ms to 8ms.'
