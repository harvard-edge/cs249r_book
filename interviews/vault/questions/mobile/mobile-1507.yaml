title: Memory-Mapped NPU Inference Design on Snapdragon 8 Gen 3
scenario: We are deploying a 2B parameter conversational agent on a mobile device. The application requires instant cold-start times but the Android OS frequently evicts background processes to preserve the shared memory.
question: How would you design a memory-mapped inference system to achieve zero-copy weight loading and avoid redundant memory allocations?
details:
  realistic_solution: 'The correct approach uses Android''s DMA-BUF/ION allocators to carve out shared, zero-copy memory regions accessible by both the CPU and the NPU. By mapping the INT8 model weights directly from storage into this shared buffer, the NPU can read the weights without duplicating the memory footprint. The design must also ensure these pages are properly pinned or mapped via the IOMMU to prevent page faults during real-time execution.'
  common_mistake: |
    **The Pitfall:** Proposing standard POSIX `mmap` with `MAP_PRIVATE`.
    **The Rationale:** Candidates assume standard CPU memory mapping applies to NPUs, forgetting that NPUs require contiguous physical memory (like DMA-BUF) and `MAP_PRIVATE` creates copy-on-write overheads.
    **The Consequence:** Up to 33% of the device's shared memory pool is wasted on duplicated weights, increasing OS eviction rates.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: 2B params INT8 (2 GB).
    - Storage Speed: ~4 GB/s.

    **Calculations:**
    - Standard Load Footprint: Duplicated in user-space and driver = 4 GB.
    - Zero-Copy Footprint: DMA-BUF mapped = 2 GB.
    - Standard Copy Time: 2 GB / 4 GB/s = ~500 ms.

    **Conclusion & Interpretation:**
    - **Result: Memory-Bound.** Zero-copy mapping limits footprint to exactly 2 GB and totally eliminates the 500 ms storage bottleneck.
