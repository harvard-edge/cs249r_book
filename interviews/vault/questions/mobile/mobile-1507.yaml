title: Memory-Mapped NPU Inference Design on Snapdragon 8 Gen 3
scenario: We are deploying a 2B parameter conversational agent on a mobile device powered by the Qualcomm Hexagon NPU. The application requires instant cold-start times but the Android OS frequently evicts background processes to preserve the shared 12-16 GB LPDDR5X memory.
question: "How would you design a memory-mapped inference system to achieve zero-copy weight loading and avoid redundant memory allocations?"
details:
  realistic_solution: The correct approach uses Android's DMA-BUF/ION allocators to
    carve out shared, zero-copy memory regions accessible by both the CPU and the
    Hexagon NPU. By mapping the INT8 model weights directly from storage into this
    shared buffer, the NPU can read the weights without duplicating the memory footprint.
    The design must also ensure these pages are properly pinned or mapped via the
    IOMMU to prevent page faults during real-time NPU execution.
  common_mistake: |
    **The Pitfall:** Proposing standard POSIX `mmap` with `MAP_PRIVATE`.
    **The Rationale:** Candidates assume standard CPU memory mapping applies to NPUs, forgetting that NPUs require contiguous physical memory (like DMA-BUF/ION) and `MAP_PRIVATE` creates copy-on-write overheads.
    **The Consequence:** Up to 33% of the device's shared memory pool is wasted on duplicated weights, increasing OS eviction rates.
  napkin_math: |
    - Model Size: 2B parameters INT8 = 2 GB.
    - Standard Loading Footprint: Duplicated in user-space and driver = 4 GB.
    - Zero-Copy Footprint: Mapped via DMA-BUF = 2 GB.
    - Transfer Time (Standard): 2 GB / ~4 GB/s storage speed ≈ 500 ms penalty.
    - **Conclusion:** Zero-copy mapping keeps footprint at exactly 2 GB and bypasses the 500 ms storage copy for instant cold-starts.
