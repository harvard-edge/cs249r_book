title: Federated Checkpoint Thermal Impact
scenario: A mobile device using the Snapdragon 8 Gen 3 participates in federated learning. Every 2 minutes, the framework writes a 150MB FP32 model checkpoint to the UFS internal flash storage.
question: How do frequent heavy writes to non-volatile storage affect the System on Chip (SoC) thermal budget and background task execution?
details:
  realistic_solution: UFS flash storage writes are highly energy-intensive compared to LPDDR5 reads/writes. Writing 150MB every 2 minutes forces the storage controller to stay in high-power states, generating localized thermal load. Because mobile SoC thermal envelopes are strictly capped (often around 3-5W total), this additional heat forces the OS thermal governor to throttle CPU/GPU frequencies. Consequently, the background FL training itself runs slower, creating a negative feedback loop.
  common_mistake: |
    **The Pitfall:** Focusing solely on the CPU cycle cost of serialization.
    **The Rationale:** Candidates often ignore that NAND flash writes generate substantial heat on tightly integrated mobile boards.
    **The Consequence:** The system experiences unexpected thermal throttling during background FL, significantly slowing down training and potentially degrading user experience.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Checkpoint size: 150 MB
       - Frequency: 120 seconds
       - SoC Thermal Envelope: 3-5W total
    2. **Calculations:**
       - Sustained write rate = 150 MB / 120 s = 1.25 MB/s
    3. **Conclusion & Interpretation:**
       - **Result: Thermal Throttling. The continuous, energy-intensive flash memory writes generate localized heat that eats into the strict 3-5W SoC thermal envelope, triggering OS throttling on the CPU/GPU.**
