title: The Privacy vs. Battery-Life Tax
scenario: Your team is developing a driver assistance feature for a connected car's companion mobile app.
  You need to A/B test a new perception model against the current one. The privacy team is advocating
  for a Federated Learning (FL) approach to avoid uploading raw sensor data, requiring the mobile GPU
  to run at 3 Watts for 60 seconds. The product team is concerned about battery drain and prefers a Cloud
  approach, uploading 1 MB of sensor data via the cellular modem at 5 Watts for 3 seconds. Evaluate the
  energy trade-off.
question: "Which uses less energy for mobile A/B testing: 60s of 3W federated learning or a 3s, 5W cellular upload?"
details:
  realistic_solution: The correct approach is to calculate the total energy (Power × Time) for each scenario
    and compare them. The FL approach, despite avoiding data uploads, consumes significantly more energy
    because of the prolonged period of intense computation on the mobile SoC. The cloud approach uses
    a short, efficient burst of the cellular radio. This demonstrates a direct trade-off between user
    privacy (favored by FL) and user experience via battery life (favored by the cloud approach).
  common_mistake: Engineers often assume that avoiding network transmission is always the most energy-efficient
    option. They can underestimate the sustained power draw of the mobile SoC during active computation
    (for FL) and overestimate the energy cost of a short, high-speed data burst over a modern cellular
    modem.
  napkin_math: 'We use the formula: Energy = Power × Time.'
  options:
  - Cloud approach is much costlier (~1500 Joules), as uploading data is always expensive.
  - Both approaches consume roughly the same amount of energy (~150-180 Joules).
  - The FL approach is much costlier (~180 Joules vs ~15 Joules for the cloud).
  - The energy cost cannot be compared, as one is compute (Watts) and the other is data (MB).
