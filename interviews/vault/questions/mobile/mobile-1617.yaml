title: Hardware-aware NAS for Mobile LLM Deployment on Google Tensor G3
scenario: 'Your team is deploying a lightweight Large Language Model (LLM) for on-device
  inference on a Google Tensor G3. The Tensor G3 has a 7.5 TOPS (Tera Operations Per
  Second) on-device TPU and 12 GB LPDDR5X RAM. You''re using a hardware-aware Neural
  Architecture Search (NAS) approach, similar to MCUNet, to find an optimal LLM. The
  critical constraints are:

  1.  **Latency**: Inference time must be less than 50ms per token.

  2.  **Peak Memory**: Total memory usage (model weights + activations) must not exceed
  8 GB.


  You have a NAS search space where each candidate architecture is characterized by
  its estimated FLOPs, parameter count (`P`), and peak activation memory (`A` bytes).
  Model weights are quantized to 4-bit.


  As part of your fitness function for the NAS, you need a mechanism to heavily penalize
  architectures that violate the peak memory constraint. **Formulate the mathematical
  expression for a memory penalty term, `Penalty_Memory`, that you would add to your
  fitness function. This term should be zero if the memory constraint is met, and
  a positive, rapidly increasing value proportional to the excess memory if the constraint
  is violated.**


  Assume `P` is the total number of parameters and `A` is the peak activation memory
  in bytes. Your answer should define `Penalty_Memory` as a function of `P`, `A`,
  and any constants you deem necessary.'
question: What memory penalty term would you add to a Tensor G3 LLM NAS fitness function
  for 4-bit weights and an 8 GB peak memory limit?
details:
  realistic_solution: 'The memory penalty `Penalty_Memory` would be integrated into
    a broader multi-objective fitness function. First, calculate the total memory
    required: `TotalMemory = (P * 4 / 8) + A` bytes. Then, the penalty term could
    be `Penalty_Memory = C * max(0, TotalMemory - (8 * 1024^3))`, where `C` is a large
    positive constant (e.g., `1e9` per byte of excess memory) to ensure a steep penalty
    for any violation. This term, alongside other penalties for latency and a reward
    for accuracy, forms the overall fitness function: `Fitness = Accuracy - α * Penalty_Memory
    - β * Penalty_Latency`, where `α` and `β` are weighting factors.'
  common_mistake: A common mistake would be to ignore the specific 4-bit quantization
    when calculating parameter memory, leading to an inaccurate total memory footprint.
    Another mistake is using a linear penalty that is not steep enough to effectively
    eliminate memory-violating architectures early in the search, wasting computational
    resources.
  napkin_math: '1.  **Memory for 4-bit weights**: `P` parameters * `4 bits/parameter`
    / `8 bits/byte` = `P / 2` bytes.

    2.  **Total Memory**: `(P / 2) + A` bytes.

    3.  **Memory Constraint**: `(P / 2) + A <= 8 GB` (or `8 * 1024^3` bytes).

    4.  **Excess Memory**: `max(0, ((P / 2) + A) - (8 * 1024^3))` bytes.'
