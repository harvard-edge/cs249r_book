title: The Mobile Style Transfer Bottleneck
scenario: You're an engineer on a mobile AI team shipping a new real-time style transfer feature. The
  core of your feature is a convolutional network that processes video frames on an Apple A17 Pro.
details:
  realistic_solution: 'The model is memory-bound. To verify: Arithmetic intensity = Total FLOPs / Total
    memory traffic. For a typical style transfer CNN on mobile, the convolution layers have moderate arithmetic
    intensity (~5–20 Ops/Byte), but the A17 Pro''s Neural Engine has very high compute throughput (~35
    TOPS INT8) relative to its memory bandwidth (~51.2 GB/s), giving a ridge point of ~683 Ops/Byte. Since
    the model''s arithmetic intensity is far below this ridge point, it is memory-bound. The practical
    consequence: increasing compute precision (e.g., FP16 → INT8) won''t help much because the bottleneck
    is data movement, not computation. Instead, optimize by reducing memory traffic: fuse operations to
    keep intermediates in on-chip SRAM, use depthwise-separable convolutions to reduce parameter count,
    or apply channel pruning.'
  common_mistake: Engineers often miscalculate the arithmetic intensity by mixing up Giga- and Mega- prefixes,
    or by inverting the formula (Bytes/Op). A more subtle mistake is calculating the intensity correctly
    but then drawing the wrong conclusion, assuming that any model with billions of operations must be
    compute-bound without comparing it to the hardware's actual capabilities.
  napkin_math: '1. Define Arithmetic Intensity (AI): AI = Total Operations / Total Bytes Transferred.
    2. Example Conv Layer: Processing a 512x512 image with a 3x3 kernel, 64 input/output channels requires
    ~8.7 Billion MACs (~17.4 GOPs). 3. Memory Movement: Reading inputs + weights and writing outputs (FP16)
    takes ~67 MB. AI = ~260 Ops/Byte.'
  options:
  - Compute-bound; the model's Arithmetic Intensity is 200 Ops/Byte, and since this is a high number,
    the compute units must be the bottleneck.
  - Memory-bound; the model's Arithmetic Intensity is 0.2 Ops/Byte, which is far too low.
  - Memory-bound; the model's Arithmetic Intensity is 200 Ops/Byte, which is below the A17 Pro's hardware
    ridge point of ~683 Ops/Byte.
  - Compute-bound; the model requires 0.005 Bytes/Op, meaning very little data is needed per operation,
    so the bottleneck must be compute speed.
  correct_index: 2
