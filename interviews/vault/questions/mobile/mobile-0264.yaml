title: The Mobile Style Transfer Bottleneck
scenario: You're an engineer on a mobile AI team shipping a new real-time style transfer feature. The
  core of your feature is a convolutional network that processes video frames on an Apple A17 Pro. The critical
  layer processes a 512x512 image with a 3x3 kernel and 64 input/output channels (~19.3 GOPs), requiring
  ~67 MB of memory movement. The A17 Pro has 35 TOPS peak compute and 51.2 GB/s memory bandwidth.
question: "Why is a mobile style transfer CNN with arithmetic intensity below the A17 Pro ridge point memory-bound?"
details:
  realistic_solution: 'The model is memory-bound. To verify: Arithmetic intensity = Total FLOPs / Total
    memory traffic. For the example style transfer CNN layer on mobile, the arithmetic
    intensity is ~288 Ops/Byte, but the A17 Pro''s Neural Engine has very high compute throughput (~35
    TOPS INT8) relative to its memory bandwidth (~51.2 GB/s), giving a ridge point of ~683 Ops/Byte. Since
    the model''s arithmetic intensity is below this ridge point, it is memory-bound. The practical
    consequence: increasing NPU compute capacity alone won''t help much because the bottleneck
    is data movement, not computation. Instead, optimize by reducing memory traffic: quantize (e.g., FP16 → INT8) to halve data movement, fuse operations to
    keep intermediates in on-chip SRAM, use depthwise-separable convolutions to reduce parameter count,
    or apply channel pruning.'
  common_mistake: Engineers often miscalculate the arithmetic intensity by mixing up Giga- and Mega- prefixes,
    or by inverting the formula (Bytes/Op). A more subtle mistake is calculating the arithmetic intensity correctly
    but then drawing the wrong conclusion, assuming that any model with billions of operations must be
    compute-bound without comparing it to the hardware's actual capabilities.
  napkin_math: '1. Ridge Point: 35 TOPS / 51.2 GB/s = 683 Ops/Byte. 2. Define Arithmetic Intensity (AI): AI = Total Operations / Total Bytes Transferred. 3. Example Conv Layer: Processing a 512x512 image with a 3x3 kernel, 64 input/output channels requires ~9.66 Billion MACs (~19.3 GOPs). 4. Memory Movement: Reading inputs + weights and writing outputs (FP16) takes ~67 MB. AI = ~288 Ops/Byte. Since 288 < 683, the layer is strictly memory-bound.'
  options:
  - Compute-bound; the model's Arithmetic Intensity is ~288 Ops/Byte, and since this is a high number,
    the compute units must be the bottleneck.
  - Memory-bound; the model's Arithmetic Intensity is 0.2 Ops/Byte, which is far too low.
  - Memory-bound; the model's Arithmetic Intensity is ~288 Ops/Byte, which is below the A17 Pro's hardware
    ridge point of ~683 Ops/Byte.
  - Compute-bound; the model requires 0.005 Bytes/Op, meaning very little data is needed per operation,
    so the bottleneck must be compute speed.
