title: Real-time Edge ML System Design for Mobile Sensor Data
scenario: Design an edge ML system for real-time processing of high-frequency sensor
  data (e.g., IMU, audio, camera metadata) on a mobile device equipped with a Snapdragon
  8 Gen 3 Hexagon NPU. The NPU provides 45 TOPS INT8 performance and has access to
  12-16 GB LPDDR5X memory. The system needs to ingest data from multiple sensors,
  perform lightweight ML inference for anomaly detection or feature extraction with
  sub-10ms latency, and push aggregated insights to a cloud backend while minimizing
  power consumption and maintaining privacy. Detail the data pipeline, model deployment
  strategy, and considerations for optimizing NPU utilization and memory bandwidth.
question: How would you design an edge ML system for real-time processing of high-frequency
  sensor data (e.g., IMU, audio, camera metadata) on a mobile device equipped with
  a Snapdragon 8 Gen 3 Hexagon NPU?
details:
  realistic_solution: Implement a stream processing pipeline using a lightweight,
    quantized ML model (e.g., MobileNetV3, EfficientNet Edge TPU variant, or a custom
    tiny transformer) optimized for INT8 inference on the Hexagon NPU. Utilize the
    NPU's specialized DSP cores for pre-processing and post-processing tasks. Data
    ingestion should leverage hardware-accelerated sensor interfaces. Employ a circular
    buffer for incoming sensor data to manage memory efficiently. For aggregation,
    use a time-windowing approach (e.g., 100ms windows) before pushing to the cloud,
    potentially using MQTT or a similar lightweight protocol. Implement dynamic power
    management, scaling NPU clock speeds based on workload or available battery.
  common_mistake: Overlooking the strict memory and power constraints of edge devices,
    leading to models that are too large or computationally intensive for continuous
    real-time operation on the NPU without aggressive quantization or model slimming.
    Another common mistake is neglecting data synchronization and time-stamping across
    multiple high-frequency sensors, leading to data alignment issues.
  napkin_math: Given 45 TOPS INT8, if a model requires 100 Gops for inference, the
    theoretical maximum inferences per second is 45,000 Gops / 100 Gops = 450 inferences/second.
    To achieve sub-10ms latency (100 inferences/second), the model should ideally
    consume no more than 450 Gops. Memory bandwidth will be critical for moving sensor
    data into NPU-accessible memory and model weights. For 16 GB LPDDR5X, assuming
    typical bandwidths of 64-85 GB/s, constantly streaming 4 high-res sensors (e.g.,
    100MB/s each) could quickly saturate the bus if not managed carefully with on-chip
    caching and data reduction techniques.
