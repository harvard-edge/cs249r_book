title: Real-time Edge ML System Design for Mobile Sensor Data
scenario: Design an edge ML system for real-time processing of high-frequency sensor data (e.g., IMU, audio, camera metadata) on a mobile device equipped with a Snapdragon 8 Gen 3 Hexagon NPU. The system needs to ingest data from multiple sensors, perform lightweight ML inference for anomaly detection or feature extraction with sub-10ms latency, and push aggregated insights to a cloud backend while minimizing power consumption and maintaining privacy.
question: How would you design an edge ML system for real-time processing of high-frequency sensor data (e.g., IMU, audio, camera metadata) on a mobile device equipped with a Snapdragon 8 Gen 3 Hexagon NPU?
details:
  realistic_solution: Implement a stream processing pipeline using a lightweight, quantized ML model (e.g., MobileNetV3, EfficientNet Edge TPU variant, or a custom tiny transformer) optimized for INT8 inference on the Hexagon NPU. Utilize the NPU's specialized DSP cores for pre-processing and post-processing tasks. Data ingestion should leverage hardware-accelerated sensor interfaces. Employ a circular buffer for incoming sensor data to manage memory efficiently. For aggregation, use a time-windowing approach (e.g., 100ms windows) before pushing to the cloud, potentially using MQTT or a similar lightweight protocol. Implement dynamic power management, scaling NPU clock speeds based on workload or available battery.
  common_mistake: |
    **The Pitfall:** Overlooking the strict memory bandwidth and power constraints of continuous high-frequency data ingestion.
    **The Rationale:** Candidates propose large models or continuous cloud uploads, forgetting that constant polling and memory bus saturation drain the battery and miss latency targets.
    **The Consequence:** The system is too power-hungry for continuous operation and fails to synchronize multiple high-frequency sensors accurately.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Refresh Rate: 100 Hz (<10ms latency limit).
       - Compute Limit: 45 TOPS ($45 \times 10^{12}$ Ops/sec).
       - Sensor Streams: 4 high-res sensors at 100 MB/s each.
    2. **Calculations:**
       - Max Operations per window: 45 TOPS * 0.010 sec = 450 GOPs.
       - Continuous Bandwidth Load: 4 sensors * 100 MB/s = 400 MB/s.
       - Battery Drain: Streaming 400 MB/s to the CPU continuously prevents the SoC from entering deep sleep.
    3. **Conclusion & Interpretation:**
       - **Result: Under 450 GOPs required**. The ingestion architecture must bypass the CPU, using specialized hardware DSPs to process the 400 MB/s streams to meet latency and power constraints.
