title: Optimizing MobileNetV3 Operator Scheduling on Hexagon NPU
scenario: You are tasked with deploying a cutting-edge generative AI model, specifically a MobileNetV3-large
  based image classification network, onto the Snapdragon 8 Gen 3 Hexagon NPU. The NPU boasts 45 TOPS
  (INT8) peak performance and has access to 12-16 GB LPDDR5X memory with a peak theoretical bandwidth
  of 85 GB/s. The model's sub-graph for a critical processing step involves several depthwise separable
  convolutions followed by point-wise convolutions and activation functions. Your goal is to achieve the
  lowest possible inference latency while maintaining INT8 quantization accuracy. Describe how you would
  approach scheduling these operators for execution order optimization, memory reuse, and parallel execution
  on the Hexagon NPU.
question: "How would you schedule depthwise, pointwise, and activation operators for low-latency MobileNetV3 execution on Hexagon NPU?"
details:
  realistic_solution: Develop an operator scheduling strategy that prioritizes layer fusion for common
    patterns (e.g., DepthwiseConv-ReLU-PointwiseConv, or PointwiseConv-Add-ReLU) to minimize intermediate
    writes to LPDDR5X and maximize data reuse within the NPU's on-chip memory. Reorder operations to improve
    data locality and exploit the Hexagon's dedicated tensor accelerators for matrix multiplications and
    its vector units for element-wise operations. The scheduler should consider memory pressure, data
    dependencies, and the heterogeneous nature of the NPU, potentially requiring custom kernel implementation
    for complex fused operators to fully leverage hardware intrinsics and minimize overhead.
  common_mistake: Failing to account for the Hexagon NPU's specialized memory hierarchy, particularly
    its tightly coupled memory (TCM) or scratchpad memory, and relying solely on off-chip LPDDR5X for
    intermediate tensor storage, leading to severe memory bandwidth bottlenecks. Another common mistake
    is applying generic operator fusion rules without understanding the specific capabilities and limitations
    of the Hexagon's tensor accelerators and vector units, potentially leading to suboptimal utilization
    or increased register pressure.
  napkin_math: Consider a fused operator block (e.g., a fused DepthwiseConv-PointwiseConv) that processes
    an intermediate tensor of 10MB. If this tensor must be written to LPDDR5X and then read back due to
    poor scheduling or lack of fusion, it incurs 20MB of memory traffic. Given the LPDDR5X bandwidth of
    85 GB/s, this transfer alone takes approximately 20 MB / 85 GB/s = 0.000235 seconds. For a model with
    hundreds or thousands of such intermediate tensors, this non-compute bound memory access can easily
    dominate total inference latency if not aggressively optimized through fusion and on-chip memory utilization.
