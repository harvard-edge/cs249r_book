title: Architecting OOM-Resilient On-Device LLM Inference
scenario: You are designing an on-device LLM assistant for a flagship smartphone featuring the Qualcomm Hexagon NPU (Snapdragon 8 Gen 3) with a shared 12 GB LPDDR5X memory pool. The OS strictly enforces a dynamic 4 GB memory budget for background AI tasks to prevent eviction of user-facing apps.
question: "How should a Snapdragon 8 Gen 3 LLM assistant manage a growing KV cache under a dynamic 4 GB AI memory budget without triggering an OOM kill?"
details:
  realistic_solution: A robust design uses a paged KV cache system to eliminate memory fragmentation and allow dynamic, non-contiguous allocation of context blocks. The architecture should tightly integrate with OS memory pressure callbacks (e.g., memory warning signals) to preemptively evict older KV blocks or dynamically quantize the KV cache to INT8 on the fly, allowing the Hexagon NPU to continue processing without exceeding the fluctuating budget.
  common_mistake: |
    **The Pitfall:** Proposing static KV cache allocation and ignoring the shared nature of LPDDR5X memory.
    **The Rationale:** Candidates assume the AI budget is a hard, isolated partition, failing to account for dynamic OS eviction when foreground apps spike in memory usage.
    **The Consequence:** The LLM either wastes available capacity or crashes due to fragmentation and OS-level memory pressure.
  napkin_math: |
    * AI Budget = 4.0 GB.
    * Model weights (3B INT4) = 1.5 GB.
    * Available for KV + Activations = 4.0 - 1.5 = 2.5 GB.
    * Token KV size = 3072 (dim) * 32 (layers) * 2 (K&V) * 2 (bytes) = 393 KB.
    * Max theoretical context = 2.5 GB / 393 KB = ~6,360 tokens.
    * Standard contiguous allocation fragmentation loss = 20-30% (~750 MB wasted).
    * **Paged memory is required to eliminate the 750 MB fragmentation waste and dynamically adjust to OS memory pressure signals.**
