title: Mitigating Jetsam Evictions on A17 Pro NE
scenario: You are deploying a high-resolution vision model (50M parameters, FP16) on the Apple A17 Pro
  Neural Engine. The device has 8 GB of shared unified memory across the CPU, GPU, and the 16-core NE,
  operating within a ~5W power budget. Under heavy user load, the OS and camera daemon consume 6.5 GB
  of the unified memory, and your application is experiencing frequent OS-level Jetsam evictions during
  inference due to peak memory spikes. Analyze the memory bottleneck and quantify an optimization strategy
  to prevent OOM evictions.
details:
  realistic_solution: The optimal approach reduces both static weight footprint and peak dynamic activation
    memory to survive strict iOS Jetsam limits. First, quantize the model weights from FP16 to INT8. Second,
    implement spatial tiling for the input resolution, processing smaller patches sequentially, which
    drastically reduces the peak intermediate feature map size allocated in the shared memory.
  common_mistake: Candidates often assume unified memory means the Neural Engine can seamlessly swap to
    disk like a traditional desktop GPU, or they solely focus on quantizing weights while ignoring the
    massive memory footprint of intermediate feature map activations during forward passes.
  napkin_math: 'Available memory: 8 GB shared unified memory - 6.5 GB (OS/System) = 1.5 GB. Original FP16
    weights: 50M * 2 bytes = 100 MB. Peak activation for a 512x512x256 intermediate tensor at FP16: 512
    * 512 * 256 * 2 bytes = ~134 MB. Due to memory fragmentation and workspace buffers for the 16-core
    NE, actual allocation can spike to 3x the activation size (~400 MB), dangerously eating into the 1.5
    GB limit. Quantizing weights to INT8 saves 50 MB. Tiling the input to 256x256 reduces the peak activation
    to 33.5 MB (256 * 256 * 256 * 2 bytes). The 16-core NE''s 35 TOPS easily handles the sequential tile
    processing within the ~5W budget, while the peak memory footprint drops from ~500 MB to under 150
    MB, safely preventing OS-level eviction.'
