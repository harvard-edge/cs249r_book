title: Per-User LoRA Adapter Privacy on Mobile
scenario: A messaging app stores per-user LoRA adapters on-device for personalized
  response suggestions. A security researcher raises concern that adapter weights
  could leak user message content through model inversion attacks. Assess the risk
  and design mitigations.
question: How would you assess the risk and design mitigations?
details:
  realistic_solution: 'Risk assessment: LoRA r=4 adapters trained on user messages
    can memorize training examples if training data is small (<100 examples). Attack
    vector: attacker with physical device access extracts adapter files (e.g., via
    ADB backup), performs membership inference or direct reconstruction. Mitigations:
    (1) DP-SGD during on-device training: add calibrated Gaussian noise to gradients
    (epsilon=8, delta=1e-5) — provides mathematical privacy guarantee at modest accuracy
    cost (~2-5% for LoRA). (2) Encryption at rest: store adapter safetensors encrypted
    with device Secure Enclave key — prevents extraction without device unlock. (3)
    Obfuscation: add small random noise to adapter weights before serialization (noise
    sigma > 0.01) — model inversion becomes infeasible. (4) Limit training data retention:
    delete original training messages after adapter update, keep only aggregated statistics.'
  common_mistake: Dismissing model inversion attacks as theoretical and not applicable
    to LoRA adapters. Model inversion on adapter weights is harder than on full model
    weights, but LoRA adapters trained on user data without regularization can memorize
    specific phrases, especially rare words or proper nouns from the training set.
  napkin_math: 'DP-SGD privacy budget: for epsilon=8, delta=1e-5, with 100 training
    examples, batch=4, T=100 steps: noise multiplier sigma via Renyi DP accountant
    ~1.5. Gradient clipping norm C=1.0. Noise std per step = sigma * C = 1.5. LoRA
    gradient magnitude: typical ~0.01-0.1. SNR: 0.05 / 1.5 = 0.033 — very noisy. Accuracy
    impact on personalization: ~5-8% degradation. Privacy guarantee: probability of
    reconstructing any specific message < e^8 * 1e-5 — reasonable for non-adversarial
    scenarios.'
