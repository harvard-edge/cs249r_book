title: Per-User LoRA Adapter Privacy on Mobile
scenario: A messaging app stores per-user LoRA adapters on-device for personalized response suggestions. A security researcher raises concern that adapter weights could leak user message content through model inversion attacks.
question: How would you assess the risk and design mitigations?
details:
  realistic_solution: 'Risk assessment: LoRA r=4 adapters trained on user messages can memorize training examples if training data is small (<100 examples). Attack vector: attacker with physical device access extracts adapter files (e.g., via ADB backup), performs membership inference or direct reconstruction. Mitigations: (1) DP-SGD during on-device training: add calibrated Gaussian noise to gradients (epsilon=8, delta=1e-5). (2) Encryption at rest: store adapter safetensors encrypted with device Secure Enclave key. (3) Obfuscation: add small random noise to adapter weights before serialization. (4) Limit training data retention: delete original training messages after adapter update.'
  common_mistake: |
    **The Pitfall:** Dismissing model inversion attacks as theoretical and not applicable to LoRA adapters.
    **The Rationale:** Model inversion on adapter weights is harder than on full model weights.
    **The Consequence:** Teams deploy adapters without DP-SGD, allowing adapters trained on user data to memorize specific phrases, rare words, or proper nouns from private messages.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - DP-SGD Parameters: Epsilon=8, Delta=1e-5, Batch=4, T=100 steps.
       - Noise Formulation: Gradient clipping norm C=1.0. Noise multiplier sigma ≈ 1.5.
       - Typical LoRA gradient magnitude: ~0.01 to 0.1 (average 0.05).
    2. **Calculations:**
       - Noise std per step = sigma x C = 1.5.
       - Signal-to-Noise Ratio (SNR) = 0.05 / 1.5 = 0.033.
    3. **Conclusion & Interpretation:**
       - **Result: SNR = 0.033** (Privacy-Bound).
