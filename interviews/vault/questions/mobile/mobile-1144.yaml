title: Architecting Heterogeneous Profiling for NPU Latency
scenario: You are designing the execution and profiling architecture for a real-time AR pipeline running on the Snapdragon 8 Gen 3. The ML workload targets the Qualcomm Hexagon NPU (45 TOPS INT8), while graphics render on the GPU, with both sharing the 12-16 GB LPDDR5X memory pool.
question: How should a Snapdragon 8 Gen 3 profiling system distinguish NPU compute limits, sync overhead, and memory contention?
details:
  realistic_solution: Design a telemetry system that uses hardware-specific tracing tools (like Snapdragon Profiler) to capture NPU hardware performance counters alongside GPU and CPU traces. The architecture should correlate asynchronous NPU queue execution times with memory bus utilization metrics to differentiate compute-bound operations from bandwidth-starved NPU stalls.
  common_mistake: |
    **The Pitfall:** Proposing standard CPU/GPU profilers or inserting simple CPU timestamps.
    **The Rationale:** Candidates fail to account for the asynchronous nature of the Hexagon NPU DSP queues and the hidden latency of memory contention across the heterogeneous system.
    **The Consequence:** Misdiagnosing the bottleneck and applying optimizations to the wrong processing unit.
  napkin_math: |
    - 30 FPS pipeline budget: 33.3ms per frame.
    - 1.5 Tera-operation model compute time = 1.5 / 45 TOPS = 0.0333s (exactly 33.3ms).
    - Processing 250MB per frame demands 7.5 GB/s memory bandwidth (250MB * 30 FPS).
    - **If the GPU saturates the LPDDR5X bus, the NPU stalls, and actual latency significantly exceeds the 33.3ms compute bound.**
