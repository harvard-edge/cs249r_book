title: Snapdragon Checkpoint Resume
scenario: An application on the Snapdragon 8 Gen 3 performs on-device personalization
  overnight. The OS frequently suspends the app to save battery, forcing resumes from
  checkpoints.
question: Analyze the performance overhead of using JSON versus a memory-mapped binary
  format for saving the optimizer state to flash storage.
details:
  realistic_solution: JSON requires expensive string parsing, serialization, and memory
    allocation, blocking the CPU during resume cycles. A memory-mapped binary format
    allows the OS to page state directly from flash to RAM without deserialization
    overhead, drastically reducing wake time.
  common_mistake: Assuming flash storage I/O speed is the only bottleneck, ignoring
    the massive CPU serialization cost of text formats.
  napkin_math: T_resume_binary ≈ I/O_latency << T_parse_json
