title: Mobile KV-Cache Constraint
scenario: Snapdragon 8 Gen 3 running a 7B LLM (INT4 weights). A 32-layer, 32-head,
  128-dim architecture. You have 2GB RAM allocated for KV cache.
question: Analyze the KV-cache memory footprint for FP16 and determine how many 4096-token
  sessions can fit.
visual:
  kind: svg
  path: mobile-1952.svg
  alt: Stacked bar showing 3.5GB Weights and 2.0GB KV cache
  caption: RAM Allocation Profile
details:
  realistic_solution: KV per token = 2 bytes * 2 * 32 * 32 * 128 = 524,288 bytes (~0.5MB).
    For 4096 tokens, cache is 4096 * 0.5MB = 2GB. Exactly 1 session fits in the allocated
    RAM.
  common_mistake: Forgetting to multiply by 2 for both Keys and Values, underestimating
    memory by half.
  napkin_math: 0.5MB/token * 4096 tokens = 2GB.
