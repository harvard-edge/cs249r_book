title: Dual-Core NPU Scheduling Bottleneck Analysis
scenario: You are optimizing the execution order of a two-branch neural network on the Samsung Exynos 2400 NPU. The system features a dual-core NPU capable of 34.7 TOPS, utilizing a shared 12 GB LPDDR5X memory pool alongside the CPU, GPU, and ISP. When you schedule two parallel convolution operators to run simultaneously on both NPU cores, the total execution time is slower than scheduling them sequentially on a single core.
question: How would you analyze why this scheduling choice degrades performance on this specific architecture?
details:
  realistic_solution: While the dual-core NPU offers 34.7 TOPS of compute, parallel operator scheduling doubles the instantaneous memory bandwidth requirement. Because the 12 GB LPDDR5X is shared with active components like the CPU and ISP, the NPU rarely has access to the full theoretical memory bandwidth. The concurrent memory requests from both NPU cores saturate the available bus, causing severe memory stalls that completely erase the benefits of parallel compute execution.
  common_mistake: |
    **The Pitfall:** Assuming NPU synchronization overhead or framework dispatch latency is the primary issue.
    **The Rationale:** Candidates fail to identify that the shared LPDDR5X memory architecture creates a severe bandwidth bottleneck.
    **The Consequence:** Optimizing framework code instead of restructuring memory accesses, leaving the performance degradation unsolved.
  napkin_math: |
    - **Compute per Core:** 34.7 TOPS / 2 = 17.35 TOPS.
    - **Operator Workload:** 1.735 Tera-operations. Compute time = 1.735 / 17.35 = **0.1 ms**.
    - **Memory Requirement:** Fetching 5 MB per operator.
    - **Parallel Memory Demand:** 10 MB in 0.1 ms = **100 GB/s** sustained bandwidth.
    - **Available Bandwidth:** LPDDR5X max is ~68 GB/s (NPU's effective share is ~20-30 GB/s).
    - **Actual Transfer Time:** 10 MB / 30 GB/s = **~0.33 ms**.
    - **Conclusion:** The 0.33 ms memory wait heavily outweighs the 0.1 ms compute time. Cores stall waiting for memory, making parallel slower than sequential.
