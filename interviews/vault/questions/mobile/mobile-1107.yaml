title: Dual-Core NPU Scheduling Bottleneck Analysis
scenario: You are optimizing the execution order of a two-branch neural network on
  the Samsung Exynos 2400 NPU. The system features a dual-core NPU capable of 34.7
  TOPS, utilizing a shared 12 GB LPDDR5X memory pool alongside the CPU, GPU, and ISP.
  When you schedule two parallel convolution operators to run simultaneously on both
  NPU cores, the total execution time is slower than scheduling them sequentially
  on a single core. Analyze why this scheduling choice degrades performance on this
  specific architecture.
question: How would you analyze why this scheduling choice degrades performance on
  this specific architecture?
details:
  realistic_solution: While the dual-core NPU offers 34.7 TOPS of compute, parallel
    operator scheduling doubles the instantaneous memory bandwidth requirement. Because
    the 12 GB LPDDR5X is shared with active components like the CPU and ISP, the NPU
    rarely has access to the full theoretical memory bandwidth. The concurrent memory
    requests from both NPU cores saturate the available bus, causing severe memory
    stalls that completely erase the benefits of parallel compute execution.
  common_mistake: Candidates often assume that NPU synchronization overhead or framework
    dispatch latency is the primary issue. They fail to identify that the shared LPDDR5X
    memory architecture creates a severe bandwidth bottleneck when both NPU cores
    concurrently fetch large tensor data.
  napkin_math: Compute capacity per core is 34.7 TOPS / 2 = 17.35 TOPS. For an operator
    requiring 1.735 Tera-operations, compute time is 1.735 / 17.35 = 0.1 ms. If the
    operator requires fetching 5 MB of weights/activations, parallel execution of
    two operators demands 10 MB in 0.1 ms, which requires a sustained bandwidth of
    100 GB/s. Since the shared LPDDR5X maximum bandwidth is typically around 68 GB/s
    (and the NPU's effective share might only be 20-30 GB/s due to CPU/ISP contention),
    the parallel memory transfer takes ~0.33 ms. The NPU cores stall waiting for memory,
    making parallel scheduling slower due to contention overhead compared to sequential
    scheduling.
