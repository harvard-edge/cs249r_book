title: The Camera Pipeline Memory Contention
scenario: Your app runs a semantic segmentation model on live camera frames for an AR furniture placement
  feature. The phone's ISP (Image Signal Processor) is simultaneously processing raw Bayer sensor data
  into RGB frames. Both the ISP and your ML model compete for LPDDR5 DRAM bandwidth. On a Snapdragon 8
  Gen 3 with 51.2 GB/s total DRAM bandwidth, your ML inference latency is stable at 8ms when the camera
  is paused but spikes to 14ms during live preview. Why?
question: "Why does Snapdragon 8 Gen 3 camera-preview segmentation rise from 8 ms to 14 ms when the ISP uses LPDDR5?"
details:
  realistic_solution: 'The ISP and ML model share the same LPDDR5 bus. The ISP processes 4K frames in
    high-priority bursts consuming ~30 GB/s for 2ms per frame. During these bursts, ML bandwidth drops
    from 1.35 GB/s to ~0.6 GB/s because the ISP has higher QoS priority. Inference stretches proportionally:
    8ms x (1.35/0.6) = 18ms worst case; observed 14ms reflects partial overlap. Fix: use temporal scheduling
    — trigger ML inference immediately after the ISP burst completes (use camera frame-ready callbacks).
    This avoids bandwidth contention entirely, restoring stable 8ms latency.'
  common_mistake: '"The ISP and ML model are on different hardware blocks, so they don''t interfere."
    They are on different compute blocks, but they share the same DRAM bus. Memory bandwidth is a shared,
    finite resource — and on mobile SoCs, it''s the most contested resource in the system.'
  napkin_math: 'Total DRAM: 51.2 GB/s theoretical, ~35 GB/s effective. ISP burst: 30 GB/s for 2ms per
    frame. ML steady-state: 1.35 GB/s. During ISP burst overlap: ML bandwidth drops from 1.35 GB/s to
    ~0.6 GB/s (ISP has higher QoS priority). ML inference stretches: 8ms × (1.35/0.6) = 18ms worst case.
    Observed: 14ms (partial overlap — not all ML layers hit the burst window). After temporal scheduling:
    ML avoids ISP burst entirely → stable 8ms.'
