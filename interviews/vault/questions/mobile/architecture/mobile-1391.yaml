title: On-Device Multimodal Architecture for Snapdragon 8 Gen 3
scenario: You are architecting an on-device multimodal agent running a 7B parameter LLM and a real-time Vision Transformer simultaneously on a Qualcomm Hexagon NPU.
question: How would you architect a quantization and memory allocation strategy to fit a 7B LLM and ViT within 12-16GB RAM and 64GB/s while targeting 15 tok/s and 30 FPS?
details:
  realistic_solution: Use W4A8 quantization for the 7B LLM, an INT8 or mixed-precision KV-cache policy with a fixed 4K ring buffer, and admission control that reserves memory for the OS, camera, and compositor before starting the agent. Keep the ViT compact and schedule it on the NPU in alternating frame slots or on the GPU/ISP only if profiling shows the extra memory traffic still leaves LLM decode bandwidth. The runtime should partition memory into static weight mappings, bounded KV cache, vision input/output buffers, and temporary workspaces; it should target 15 tok/s and 30 FPS by time-slicing NPU work, reducing ViT resolution or LLM context when contention rises, and never promising both rates without measured headroom.
  common_mistake: |
    **The Pitfall:** Calculating static weight sizes and assuming it easily fits in RAM.
    **The Rationale:** Candidates fail to account for the dynamic KV cache footprint and the baseline 4-6GB OS memory reservation.
    **The Consequence:** The design triggers massive OS evictions and system crashes in production.
  napkin_math: |
    **Assumptions & Constraints:**
    - LLM Size: 7B parameters (INT4).
    - ViT weights and working buffers: 0.7 GB.
    - Context Length: 4K.
    - Bandwidth Target: 15 tok/s.

    **Calculations:**
    - LLM Weights (INT4): 7B * 0.5 bytes = 3.5 GB.
    - FP16 KV Cache: 4096 tokens * 32 layers * 4096 hidden * 2 (K,V) * 2 bytes = ~2.1 GB.
    - INT8 KV Cache option: ~1.1 GB, saving ~1.0 GB for activations and vision buffers.
    - Total ML RAM with INT8 KV: 3.5 GB + 1.1 GB + 0.7 GB + 0.5 GB workspace = 5.8 GB.
    - Decode compute estimate: 15 tok/s * 14 GOPs/token = 210 GOPS/s = 0.21 TOPS.
    - Worst-case uncached weight streaming: 15 tok/s * 3.5 GB = 52.5 GB/s before cache reuse and compression effects.

    **Conclusion & Interpretation:**
    - **Result: ~5.8 GB ML RAM and up to 52.5 GB/s LLM weight traffic (Memory-Bandwidth-Bound).** The design is plausible only with INT4 weights, bounded KV-cache, measured cache reuse, and scheduler headroom for the ViT.
