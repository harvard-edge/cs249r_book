title: The App Memory Diet
scenario: You're engineering an on-device machine learning capability targeted for a modern smartphone with 8 GB of physical RAM.
question: What is a reasonable rule-of-thumb memory budget for your entire feature, including the model and runtime activations, to avoid being terminated by the OS?
details:
  realistic_solution: A robust architectural budget allocates no more than 25% of total physical RAM (yielding 2 GB on an 8 GB device). This defensive limit accounts for the massive footprint of the host OS kernel, pre-allocated GPU unified memory, and persistent background services, guaranteeing the application avoids the low-memory killer (LMK) daemon.
  common_mistake: |
    **The Pitfall:** Assuming the ML application is entitled to the vast majority of the device's theoretical RAM (e.g., trying to map a 6 GB model).
    **The Rationale:** Engineers accustomed to scalable cloud containers or desktop workloads systematically ignore that mobile OS kernels violently protect background and system state limits.
    **The Consequence:** The model footprint drastically breaches the implicit memory ceiling, causing the OS to immediately and aggressively terminate the application process during startup.
  napkin_math: |
    **Assumptions & Constraints:**
    - Device Total RAM: 8 GB.
    - OS Kernel + System Services base allocation: ~3 GB.
    - Background Apps minimal allocation: ~1-2 GB.

    **Calculations:**
    - Recommended Safe Architectural Ceiling: 25% of Total RAM.
    - Target Budget Constraint: 8 GB * 0.25 = 2.0 GB.
    - Typical INT8 Model Footprint (500M params): 500 MB weights + 300 MB activations = 0.8 GB.

    **Conclusion & Interpretation:**
    - **Result: 2.0 GB (Memory-Bound)**. Capping the entire ML application footprint safely at 2 GB prevents fatal Out-Of-Memory (OOM) interventions from the OS.
  options:
  - '6 GB (Fails to account for OS footprint)'
  - '8 GB (Total theoretical RAM)'
  - '256 MB (Unnecessarily restrictive)'
  - '2 GB'
