title: 5G Remote KV Prefetching
scenario: A transformer's KV cache is split between local LPDDR5 and an edge server's NVMe SSD over a 5G mmWave connection (1 Gbps, 15ms ping).
question: What speculative prefetching mechanism for the remote KV blocks can hide the 15ms 5G synchronization latency?
details:
  realistic_solution: The 15ms ping represents a hard stall if fetched reactively. At an assumed 50ms/token generation speed, the local NPU must predict and issue the 5G fetch request at least 1 token in advance. Fetching a 1MB chunk takes 8ms plus the 15ms sync, totally 23ms, safely hiding behind the 50ms compute.
  common_mistake: |
    **The Pitfall:** Using a purely reactive paging strategy.
    **The Rationale:** Candidates often design systems that wait for a cache miss before requesting the remote block, ignoring network latency.
    **The Consequence:** A reactive fetch blocks the local NPU generation loop for at least 15ms on every remote cache miss, destroying token generation throughput.
  napkin_math: |
    **Assumptions & Constraints:**
    - Network Ping Sync = 15ms.
    - Bandwidth: 1 Gbps = 125 MB/s.
    - Target generation speed: 50ms/token.

    **Calculations:**
    - Fetch time for a 1MB chunk = 1MB / 125MB/s = 8ms.
    - Total fetch time = 15ms (ping) + 8ms (transfer) = 23ms.

    **Conclusion & Interpretation:**
    - **Result: 23ms fetch time (Network-Latency Bound)**. Fetching 1 token in advance safely hides the network latency behind the 50ms compute.
