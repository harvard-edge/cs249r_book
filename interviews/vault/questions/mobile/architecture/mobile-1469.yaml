title: MobileNet Depthwise Separable Convolution Recall
scenario: You are preparing a real-time vision model for deployment on Android devices equipped with a heterogeneous SoC. To maximize throughput on this hardware, you need to select a CNN architecture optimized for mobile inference.
question: What specific type of convolution operation, first popularized by the MobileNetV1 architecture, factorizes a standard convolution into two separate layers to drastically reduce computational cost?
details:
  realistic_solution: |
    The depthwise separable convolution. This operation splits a standard convolution into a depthwise convolution (applying a single filter per input channel) followed by a 1x1 pointwise convolution (combining the outputs). This factorization optimally utilizes INT8 compute on NPUs while drastically reducing required MAC operations and weight memory reads.
  common_mistake: |
    **The Pitfall:** Confusing it with grouped convolutions or inverted residuals.
    **The Rationale:** Candidates conflate various mobile architecture optimizations, failing to identify the fundamental operator that mathematically factorizes the dense MACs.
    **The Consequence:** Selecting suboptimal legacy operators that saturate the NPU and drain the battery.
  napkin_math: |
    **Assumptions & Constraints:**
    - Standard Conv vs Depthwise Separable.
    - 3x3 kernel, 64 in/out channels, 112x112 grid.

    **Calculations:**
    - Standard Conv: 3 * 3 * 64 * 64 * 112 * 112 = ~462.4 MFLOPs.
    - Depthwise: (3 * 3 * 64 * 112 * 112) = 7.2 MFLOPs.
    - Pointwise: (1 * 1 * 64 * 64 * 112 * 112) = 51.4 MFLOPs.
    - Total Separable: 7.2 + 51.4 = 58.6 MFLOPs.
    - Reduction: 462.4 / 58.6 = ~7.9x.

    **Conclusion & Interpretation:**
    - **Result: ~8x reduction (Compute-Bound)**. Factorization yields an ~8x reduction in compute.
