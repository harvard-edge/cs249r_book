title: Diagnosing Core ML ANE Fallback
scenario: A mobile team ports a Vision Transformer (ViT-Base) to Core ML for an iPhone 15 Pro (A17 Pro, 35 TOPS ANE). They expect high efficiency, but Instruments profiling reveals a latency of 140ms per frame. The trace shows execution constantly ping-ponging between the Apple Neural Engine (ANE) and the CPU.
question: What is the architectural root cause of this execution pattern, and how can it be analyzed and resolved to achieve target performance?
details:
  realistic_solution: The architectural root cause is graph fragmentation from ANE-unsupported operations, which forces CPU fallback and repeated ANE-CPU synchronization. Use the Core ML Performance Report to identify unsupported operations such as dynamic shapes, Einsum, or specific GELU variants. Then refactor the PyTorch/TensorFlow source to use static shapes and supported primitives, such as replacing Einsum with standard matmuls, so the entire graph can compile for ANE instead of ping-ponging between processors.
  common_mistake: |
    **The Pitfall:** Assuming the ANE is inherently slow at Transformer architectures.
    **The Rationale:** Candidates blindly restrict execution to the GPU, ignoring the massive memory synchronization overhead caused by CPU fallbacks.
    **The Consequence:** Missing the opportunity to properly compile for the ANE, leaving massive latency overheads unfixed.
  napkin_math: |
    **Assumptions & Constraints:**
    - Total measured latency: 140ms.
    - 12-layer ViT model with 2 switches per layer (24 total switches).
    - Synchronization overhead: ~4ms per switch.

    **Calculations:**
    - Sync cost = 24 switches * 4ms/switch = 96ms.
    - Compute time = 140ms - 96ms = 44ms (ANE + CPU).
    - If unsupported ops are rewritten so the graph stays on ANE, the 96ms synchronization cost is removed.
    - The remaining 44ms mixed compute is the conservative upper bound from the current trace; a fully ANE-delegated graph can target lower latency, such as ~15-44ms depending on operator coverage and model layout.

    **Conclusion & Interpretation:**
    - **Result: CPU/ANE synchronization overhead.** The measured 140ms is dominated by about 96ms of ping-pong cost; fixing unsupported operations removes that overhead and makes the realistic target the remaining ANE-dominated compute time, not a memory-bandwidth bottleneck.
