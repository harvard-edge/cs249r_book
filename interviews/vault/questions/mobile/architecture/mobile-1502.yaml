title: On-Device Summarization Architecture Selection for Snapdragon 8 Gen 3
scenario: Your team is building offline document summarization for a flagship smartphone utilizing the Hexagon NPU. You must design an architecture that minimizes memory bandwidth during generation for inputs up to 1000 tokens and short outputs of 50 tokens.
question: Which architecture should Snapdragon 8 Gen 3 use for long-input, short-output summarization and why?
details:
  realistic_solution: An encoder-decoder architecture is optimal for this asymmetric input/output constraint. The encoder processes the dense 1000-token input in a highly parallel pass, saturating the NPU compute. The decoder then generates 50 tokens using static cross-attention states rather than continuously re-reading a massive self-attention KV cache.
  common_mistake: |
    **The Pitfall:** Defaulting to a massive decoder-only LLM.
    **The Rationale:** Candidates immediately propose trending decoder-only architectures, ignoring that the KV cache for a 1000-token input must be continuously loaded from shared LPDDR5X memory during every auto-regressive step.
    **The Consequence:** A massive memory bandwidth bottleneck completely starving the NPU.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: 2B parameters (2GB INT8 footprint).
    - Target task: 1000 input tokens, 50 output tokens.
    - Evaluated architectures: 2B Decoder-Only vs. (1B Encoder + 1B Decoder).

    **Calculations:**
    - Decoder-only bandwidth (generation): 50 tokens * 2GB weights = 100GB transferred.
    - Enc-Dec bandwidth: 1B Encoder runs once (1GB loaded) + 1B Decoder runs 50 times (50 * 1GB = 50GB). Total = 51GB.

    **Conclusion & Interpretation:**
    - **Result: 51GB (Memory-Bandwidth-Bound)**. The Encoder-Decoder architecture halves the generative memory bandwidth pressure (from 100GB to 51GB) by avoiding redundant reads of the heavy input context from a KV cache.
