title: 'DPO for Mobile On-Device Alignment: Feasibility Analysis'
scenario: A mobile assistant team wants to run DPO-style alignment fine-tuning on-device on Snapdragon 8 Gen 3 (8 GB RAM).
question: How would you evaluate whether DPO or PPO is feasible and calculate the minimum memory requirements?
details:
  realistic_solution: DPO needs at minimum a policy model and a frozen reference model. For a 1B INT4 base at 0.5 GB each, weights alone are about 1.0 GB. Add LoRA optimizer state (~6 MB), activation/KV/workspace memory for policy and reference passes (~0.5-1.0 GB depending on sequence and batching), and allocator/framework headroom, so a practical lower bound is roughly 1.5-2.0 GB before app UI and OS pressure. PPO is riskier because implementation usually needs policy, reference, value/reward-related state, old-policy logits or rollout buffers, plus optimizer and activation memory. Even with INT4 bases, those terms can land around 4-5+ GB, which is fragile on an 8 GB phone where several GB are unavailable to the app.
  common_mistake: |
    **The Pitfall:** Assuming PPO is highly feasible on mobile devices.
    **The Rationale:** Candidates underestimate the memory footprint of PPO's 4 model instances and large rollout buffers.
    **The Consequence:** Proposing PPO leads to a design that will frequently trigger Android jetsam/OOM limits on an 8 GB device.
  napkin_math: |
    **Assumptions & Constraints:**
    - 1B INT4 policy model weights: 0.5 GB.
    - 1B INT4 reference model weights: 0.5 GB.
    - Rank-4 LoRA Adam states: ~6 MB.
    - Activation, KV/cache, framework, and allocator overhead are separate from stored model weights.

    **Calculations:**
    - DPO weight floor: policy 0.5 GB + reference 0.5 GB = 1.0 GB.
    - DPO training/runtime adders: ~6 MB LoRA Adam state + ~0.5-1.0 GB activations/KV/workspaces + allocator headroom.
    - Practical DPO lower bound: about 1.5-2.0 GB before the rest of the app and OS pressure.
    - PPO weight floor is implementation-dependent but commonly includes policy/reference plus value or reward-related state and old-policy/rollout data: roughly 2.0 GB or more in INT4-equivalent model storage.
    - PPO runtime adders: optimizer state, activations for multiple passes, rollout buffers, and logits can add another ~2-3+ GB.

    **Conclusion & Interpretation:**
    - **Result: DPO practical floor ~1.5-2.0 GB; PPO often ~4-5+ GB.** These are lower-bound feasibility estimates, not exact caps. DPO is the safer on-device choice because it avoids PPO's rollout buffers and extra model-role state.
