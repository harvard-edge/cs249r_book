title: 'DPO for Mobile On-Device Alignment: Feasibility Analysis'
scenario: A mobile assistant team wants to run DPO-style alignment fine-tuning on-device on Snapdragon 8 Gen 3 (8 GB RAM).
question: How would you evaluate whether DPO or PPO is feasible and calculate the minimum memory requirements?
details:
  realistic_solution: 'DPO requires only 2 models (policy + frozen reference). For 1B model INT4 (0.5 GB each): 2 × 0.5 GB = 1.0 GB for models + ~0.5 GB activations + ~6 MB Adam states for LoRA adapters = ~1.5 GB total. Snapdragon 8 Gen 3 has 8 GB LPDDR5X — DPO with LoRA fine-tuning of a 1B model is highly feasible. PPO would require 4 model instances. Even with INT4 bases, the optimizer states, activations for 4 models, and large rollout buffers push memory usage to ~4.5+ GB, which risks OS-level OOM kills on an 8 GB device where 3-4 GB are reserved for the system.'
  common_mistake: |
    **The Pitfall:** Assuming PPO is highly feasible on mobile devices.
    **The Rationale:** Candidates underestimate the memory footprint of PPO's 4 model instances and large rollout buffers.
    **The Consequence:** Proposing PPO leads to a design that will frequently trigger Android jetsam/OOM limits on an 8 GB device.
  napkin_math: |
    **Assumptions & Constraints:**
    - 1B INT4 policy model: 0.5 GB.
    - 1B INT4 reference model (frozen): 0.5 GB.
    - Rank-4 LoRA Adam states: ~6 MB.

    **Calculations:**
    - Activations (batch=1, seq=512): ~500 MB.
    - Total DPO memory: 1.5 GB.
    - PPO memory: 4 * 0.5 GB models + ~1 GB optimizer/activations + ~1.5 GB rollout = ~4.5 GB.

    **Conclusion & Interpretation:**
    - **Result: 1.5 GB (Memory-Bound)**. DPO is feasible (1.5 GB), but PPO (~4.5 GB) is highly risky due to 8 GB system limits.
