title: Diagnosing OOM on Shared Memory NPU Architectures
scenario: Your team is running an 8-billion parameter LLM quantized to INT8 on a Samsung Exynos 2400 NPU. The deployment runs perfectly in isolation, but users report severe Out-Of-Memory (OOM) crashes the moment they switch to a multi-modal feature that simultaneously activates the camera.
question: Why does an 8B INT8 Exynos 2400 LLM crash when a camera-based multimodal feature starts?
details:
  realistic_solution: 'A strong candidate will identify that the Exynos 2400 features a unified memory subsystem. The 8B INT8 model consumes roughly 8 GB just for weights. The OS requires around 2-3 GB. When the camera activates, the ISP and GPU allocate large high-resolution frame buffers. This combined memory pressure exceeds the shared 12 GB LPDDR5X capacity, triggering the Android Low Memory Killer Daemon (LMKD) to terminate the app.'
  common_mistake: |
    **The Pitfall:** Assuming dedicated accelerator VRAM.
    **The Rationale:** Candidates frequently assume the entire 12 GB of memory is dedicated to the NPU, calculating only the static weights.
    **The Consequence:** They fail to account for the shared memory architecture where the CPU, GPU, and ISP heavily consume the same LPDDR5X pool during concurrent operations.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Total shared LPDDR5X capacity: 12.0 GiB.
       - Model weights: 8 billion parameters * 1 byte (INT8) = 8.0 GiB.
       - Runtime activations (KV cache): ≈ 0.5 GiB.
       - OS base footprint: ≈ 2.5 GiB.
       - ISP/GPU frame buffers for camera: ≈ 1.5 GiB.
    2. **Calculations:**
       - Total LLM footprint = 8.5 GiB.
       - Total requested memory: 8.5 + 2.5 + 1.5 = 12.5 GiB.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound. Since 12.5 GiB > 12.0 GiB shared LPDDR5X capacity, the system inevitably crashes.**
