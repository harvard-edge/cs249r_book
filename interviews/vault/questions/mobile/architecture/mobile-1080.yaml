title: Analyzing GQA vs MHA Memory Bandwidth on Hexagon NPU
scenario: We are deploying a 7B parameter LLM on a device powered by a Qualcomm Hexagon NPU with 12 GB of shared LPDDR5X memory. The model uses Multi-Head Attention (MHA) and achieves acceptable prefill, but decode speed is bottlenecked. Switching to Grouped-Query Attention (GQA) with an 8:1 ratio improves decode latency dramatically.
question: Why does this architectural change provide such a significant speedup on this specific hardware?
details:
  realistic_solution: 'The performance improvement comes from a massive reduction in the KV cache memory footprint and the corresponding memory bandwidth required to read it during every decode step. In MHA, the entire KV cache must be loaded from the shared LPDDR5X memory to the NPU for every single token generated. By using GQA with an 8:1 ratio, the KV cache size is reduced by a factor of 8, drastically slashing the memory bandwidth requirements and allowing the NPU to generate tokens faster without stalling on memory reads.'
  common_mistake: |
    **The Pitfall:** Attributing the speedup solely to a reduction in compute operations (FLOPs).
    **The Rationale:** Candidates fail to recognize that autoregressive decode generation on edge devices is fundamentally memory bandwidth bound, not compute bound.
    **The Consequence:** Misidentifying the bottleneck prevents proper optimization of future architectures.
  napkin_math: |
    **Assumptions & Constraints:**
    - INT8 quantization (1 byte per parameter).
    - Sequence length: 1024 tokens.
    - MHA: 32 heads, 128 dim.
    - GQA 8:1: 4 KV heads, 128 dim.

    **Calculations:**
    - MHA KV cache: 2(K,V) x 32 heads x 128 dim x 1 byte = 8 KB per token. For 1024 tokens = 8 MB.
    - GQA KV cache: 2(K,V) x 4 heads x 128 dim x 1 byte = 1 KB per token. For 1024 tokens = 1 MB.

    **Conclusion & Interpretation:**
    - **Result: 1 MB (Memory Bandwidth-Bound)**. Reducing the memory read per step from 8 MB to 1 MB drastically slashes memory bandwidth requirements, unblocking the NPU.
