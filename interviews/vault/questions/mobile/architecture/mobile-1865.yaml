title: 'RLHF-Lite: Implicit Feedback Collection for Mobile Fine-Tuning'
scenario: A mobile keyboard app collects implicit user feedback (accept/reject/edit of autocomplete suggestions) to fine-tune a local LoRA adapter.
question: 'How would you design a lightweight on-device RLHF pipeline that runs without a dedicated reward model?'
details:
  realistic_solution: 'Lightweight RLHF without dedicated RM: (1) Reward signal design: accepted suggestion = +1, edited suggestion = partial reward based on edit distance (1 - editdist/len), rejected = -1, ignored after 3s = 0 (neutral). (2) Implicit reward calibration: normalize rewards per session to account for user behavior variance. Use z-score normalization per user. (3) Algorithm: use DPO-lite. When user accepts suggestion A over having previously rejected suggestion B on similar prompt, form a preference pair. Train LoRA update with DPO objective every 50 preference pairs (micro-update). (4) Privacy: all training data and adapter weights stay on device. Opt-in federated aggregation for global improvement. (5) Computational budget: DPO step on 1B model with 50 pairs, all on NPU at 10 TOPS: 100 forward passes * 1B * 6 FLOP * 128 tokens = 76.8T FLOP / 10T = 7.7 seconds. Run during background charging.'
  common_mistake: |
    **The Pitfall:** Treating implicit signals as equivalent to explicit preference labels without correction for selection bias.
    **The Rationale:** Candidates fail to account for the fact that users who accept suggestions may do so out of laziness rather than quality preference.
    **The Consequence:** The acceptance signal conflates brevity, relevance, and convenience, leading to a biased and ultimately degraded model.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: 1B params, Sequence Length: 128 tokens.
    - Compute Limit: 10 TOPS (NPU).
    - DPO Update Batch: 50 preference pairs (100 forward passes).

    **Calculations:**
    - Total FLOPs per Update: 100 passes * 1B params * 6 FLOPs * 128 tokens = 76.8 * 10^12 FLOPs (76.8 TFLOPs).
    - Compute Time: 76.8 TFLOPs / 10 TOPS = 7.68 seconds.
    - LoRA r=4 Adapter Size: <3MB total delta accumulated over 30 days.

    **Conclusion & Interpretation:**
    - **Result: 7.68 seconds (Compute-Bound)**. Running the DPO update step takes just ~7.7 seconds, allowing seamless background execution while charging.
