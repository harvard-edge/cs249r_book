title: 'RLHF-Lite: Implicit Feedback Collection for Mobile Fine-Tuning'
scenario: A mobile keyboard app collects implicit user feedback (accept/reject/edit of autocomplete suggestions) to fine-tune a local LoRA adapter.
question: How would you design a lightweight on-device RLHF pipeline that runs without a dedicated reward model?
details:
  realistic_solution: Lightweight RLHF without a dedicated reward model should convert implicit events into training data with clear semantics. Log the prompt, shown suggestion, user action, final committed text, latency, and context features. Treat accepted-as-is text as a positive example, edited text as a positive target if the edit is close enough to the suggestion, rejected suggestions as weak negatives, and ignored suggestions as missing or neutral unless the UI can distinguish seen-but-rejected from unseen. For pairwise training, create a preference pair only when the same or very similar prompt has both a committed/accepted completion and a rejected alternative; otherwise use weighted supervised LoRA updates on the committed text rather than calling it DPO. Normalize acceptance/edit scores only within the local user/session before thresholding or weighting examples, and never mix per-user statistics into a global label without aggregation safeguards. Train small, interruptible LoRA
    jobs only while idle, charging, and thermally cool; keep raw keystrokes and adapters on device, and use opt-in federated aggregation only with privacy controls.
  common_mistake: |
    **The Pitfall:** Treating implicit signals as equivalent to explicit preference labels without correction for selection bias.
    **The Rationale:** Candidates fail to account for the fact that users who accept suggestions may do so out of laziness rather than quality preference.
    **The Consequence:** The acceptance signal conflates brevity, relevance, and convenience, leading to a biased and ultimately degraded model.
  napkin_math: |
    **Assumptions & Constraints:**
    - Implicit signals are noisy: accept/edit/reject/ignore are not automatically explicit reward labels.
    - DPO-style training requires a chosen completion and a rejected completion for the same or very similar prompt.
    - Single accepted or edited events can still support weighted supervised LoRA training on the final committed text.
    - Per-user calibration must stay local or be aggregated with privacy controls to avoid leaking behavior statistics.

    **Calculations:**
    - Accepted suggestion with no edit: one positive completion with high weight.
    - Edited suggestion: use final committed text as the positive target; weight can decrease as edit distance grows.
    - Rejected suggestion: weak negative only if the user saw it and then typed or chose a better completion for the same context.
    - Valid preference pair count is bounded by matched contexts, not total events; 1,000 feedback events may yield far fewer pairwise examples.
    - A DPO-style LoRA batch with 50 valid pairs requires chosen and rejected sequences, so about 100 sequence evaluations plus backward/optimizer work. Non-paired events should use weighted SFT instead.

    **Conclusion & Interpretation:**
    - **Result: match the algorithm to the signal.** Use DPO-style updates only for real matched preference pairs; use weighted supervised LoRA for single committed completions, with local calibration, privacy controls, and background-only training.
