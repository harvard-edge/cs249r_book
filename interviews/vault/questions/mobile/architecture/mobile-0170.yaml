title: The Illusion of Symmetric Scaling
scenario: 'A mobile vision model, composed mostly of depthwise separable convolutions, currently requires 5 GFLOPs for a single inference. Your team is exploring two scaling strategies to improve accuracy: (A) doubling the width (number of channels) of all layers, or (B) doubling the input image resolution.'
question: How do doubling model width and doubling input resolution each change FLOPs for a 5 GFLOP mobile vision model?
details:
  realistic_solution: 'Both strategies result in a roughly 4x increase in computational cost, bringing the total to ~20 GFLOPs. FLOPs in a convolutional layer are proportional to the spatial dimensions (H, W) and the channel dimensions (Cin, Cout). Doubling the resolution increases the number of spatial locations by a factor of 4. In a depthwise separable block, doubling the width increases the FLOPs of the dominant 1x1 pointwise convolution by a factor of 4. Therefore, both strategies have a quadratic impact on computational requirements.'
  common_mistake: |
    **The Pitfall:** Assuming model scaling is linear with width or resolution.
    **The Rationale:** Engineers correctly remember that one factor scales quadratically, but incorrectly assume the other scales linearly.
    **The Consequence:** They significantly underestimate the computational cost of the upscaled model, missing real-time deadlines.
  napkin_math: |
    **Assumptions & Constraints:**
    - Base model cost: 5 GFLOPs.
    - Convolution FLOPs scale proportionally to width^2 and resolution^2.

    **Calculations:**
    - Strategy A (double width): FLOPs increase by 2^2 = 4x.
    - Strategy B (double resolution): FLOPs increase by 2^2 = 4x.
    - Base cost * 4 = 20 GFLOPs.

    **Conclusion & Interpretation:**
    - **Result: Both strategies result in ~20 GFLOPs (Compute-Bound).** Scaling either dimension significantly increases compute cost.
  options:
  - 'Both strategies result in ~10 GFLOPs.'
  - 'Width scaling: ~20 GFLOPs; Resolution scaling: ~10 GFLOPs.'
  - 'Both strategies result in ~20 GFLOPs.'
  - 'Width scaling: ~10 GFLOPs; Resolution scaling: ~20 GFLOPs.'
