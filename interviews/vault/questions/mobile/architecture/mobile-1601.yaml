title: Optimizing Large Transformer Inference on Snapdragon 8 Gen 3 NPU
scenario: You are tasked with deploying a 7 billion parameter LLM based on a Transformer architecture onto a mobile device. The model needs to process sequences up to 2048 tokens in real-time, targeting low-latency responses for a conversational AI application.
question: What architectural and algorithmic optimizations would you propose to manage memory bandwidth, computational limits, and KV-cache on the NPU's INT8 capabilities and limited memory?
details:
  realistic_solution: |
    Start with INT8/QAT because the 7B weights already consume about 7 GB before runtime memory. Then reduce bandwidth and KV growth directly: use GQA or MQA to shrink KV heads, quantize the KV cache if quality allows, and cap or window context when conversations exceed the 2048-token target. Prefer fused attention, fused dequant/matmul, and operator layouts supported by the Hexagon NPU so weights and activations move through memory fewer times. Speculative decoding is useful only if the draft model is small and resident enough to reduce latency without adding more bandwidth pressure. Avoid dynamic batching for the interactive path unless profiling shows it improves utilization without increasing per-user latency.
  common_mistake: |
    **The Pitfall:** Directly quantizing and deploying the model without considering memory bandwidth.
    **The Rationale:** Assuming that INT8 TOPS alone will guarantee performance without optimizing the attention mechanism.
    **The Consequence:** Failing to plan for memory-efficient KV-cache eviction or compression leads to excessive latency or OOM errors on mobile platforms.
  napkin_math: |
    **Assumptions & Constraints:**
       - Model Size: 7B parameters (INT8 = ~7 GB footprint).
       - Max Hardware RAM: 16 GB LPDDR5X (leaving ~9 GB for activations/KV-cache).
       - Sequence Length: 2048 tokens.
       - Architecture: 32 layers, 32 heads, 128 head dim.
    **Calculations:**
       - KV-Cache per layer = 2048 tokens * 32 heads * 128 dim * 2 (K+V) * 1 byte (INT8) = 16,777,216 bytes = 16 MiB.
       - Total KV-Cache = 16 MiB * 32 layers = 512 MiB per request.
       - Compute per generated token is on the order of one pass over 7B INT8 weights, roughly 7B MACs before attention and runtime overhead.
    **Conclusion & Interpretation:**
       **Result: Memory-capacity and bandwidth bound. The KV-cache estimate is 512 MiB per 2048-token request, not several GB, but 7 GB of weights plus activations, runtime buffers, and KV cache still leaves little margin. Use INT8/QAT for weights, GQA/MQA or windowed attention to reduce KV bandwidth, quantized KV cache to reduce growth, and NPU-specific fused kernels to reduce memory traffic.**
