title: Multi-Adapter Session Management on Mobile
scenario: A mobile app supports 5 personalized LLM modes (professional, casual, technical, creative, concise) each backed by a separate rank-4 LoRA adapter.
question: How would you design the session management system to efficiently switch between 5 LoRA adapters on an A17 Pro with 8 GB RAM?
details:
  realistic_solution: 'Keep one quantized base model resident and manage the 5 rank-4 LoRA adapters as small mode-specific state. Load the active adapter into a preallocated adapter buffer, keep the most recent or predicted next adapter in RAM, and asynchronously prefetch likely switches based on UI/session context. If the runtime requires static Core ML graphs, precompile merged variants for deployment, but still treat switching as a cache problem: keep only the active and one standby variant resident, evict least-recently-used modes, and avoid recompiling during a session. Budget switch latency around adapter copy/prefetch, not full base-model reloads.'
  common_mistake: |
    **The Pitfall:** Loading all 5 adapters into RAM simultaneously or assuming instantaneous weight swapping.
    **The Rationale:** Engineers assume mobile frameworks handle LoRA as dynamically as PyTorch on a cloud GPU, ignoring the fact that Core ML historically requires loading fully re-compiled graph variants.
    **The Consequence:** Suffer from heavy memory pressure or catastrophic latency due to recompiling the ML graph on every mode switch.
  napkin_math: |
    **Assumptions & Constraints:**
    - Base Model Size: 1B INT4 model = ~0.5 GB and remains resident.
    - Adapter Size: rank-4 LoRA adapter ≈ 1.5 MB.
    - Number of Modes: 5.
    - Storage Speed: local flash read budget ≈ 3 GB/s for sequential data.

    **Calculations:**
    - Adapter Storage: 5 * 1.5 MB = 7.5 MB.
    - Resident Memory: 0.5 GB base + 2 * 1.5 MB cached adapters ≈ 503 MB.
    - Cold Adapter Read: 1.5 MB / 3 GB/s ≈ 0.5ms before framework overhead.
    - Full Variant Reload Alternative: 0.5 GB / 3 GB/s ≈ 167ms, so avoid it on normal mode switches.

    **Conclusion & Interpretation:**
    - **Result: Resident Base Plus Adapter Cache.** Efficient session management keeps the base model loaded and swaps or prefetches lightweight adapters, making common switches memory-cheap and avoiding 167ms full-model reloads except as a fallback.
