title: Multi-Adapter Session Management on Mobile
scenario: A mobile app supports 5 personalized LLM modes (professional, casual, technical, creative, concise) each backed by a separate rank-4 LoRA adapter.
question: How would you design the session management system to efficiently switch between 5 LoRA adapters on an A17 Pro with 8 GB RAM?
details:
  realistic_solution: 'Pre-compile all 5 merged model variants at app install time (5 × 2 GB INT4 = 10 GB on disk, 2 GB in RAM per active model). Only load the active variant into RAM. Mode switches require: unload current model (release ~2 GB) and load new model (~50ms from NVMe at 6 GB/s). For low-latency switching (<200ms), keep 2 most-recently-used models in RAM (2 × 2 GB = 4 GB, leaving 4 GB for OS and other apps). Use MLModelConfiguration.computeUnits = .cpuAndNeuralEngine for background loading while current model serves.'
  common_mistake: |
    **The Pitfall:** Loading all 5 adapters into RAM simultaneously or assuming instantaneous weight swapping.
    **The Rationale:** Engineers assume mobile frameworks handle LoRA as dynamically as PyTorch on a cloud GPU, ignoring the fact that Core ML historically requires loading fully re-compiled graph variants.
    **The Consequence:** Suffer from heavy memory pressure or catastrophic latency due to recompiling the ML graph on every mode switch.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model Size: 1B INT4 model = ~0.5 GB.
    - Number of Modes: 5.
    - Storage Speed: A17 Pro NVMe at 3 GB/s.

    **Calculations:**
    - Storage (All 5 models): 5 * 0.5 GB = 2.5 GB.
    - Switch Latency (NVMe Load): 0.5 GB / 3 GB/s = 167ms.
    - Caching 2 models: 2 * 0.5 GB = 1.0 GB RAM footprint.

    **Conclusion & Interpretation:**
    - **Result: 167ms latency, 1.0 GB cache (Memory-Bound)**. Keeping 2 active models in RAM provides instantaneous toggling, while fallback to fast NVMe ensures switching within a 200ms budget.
