title: MobileNetV2 FLOPs vs Apple A17 Pro TOPS
scenario: You are deploying a custom object detection model based on a MobileNetV2 backbone to an iPhone 15 Pro. The Apple A17 Pro Neural Engine provides 35 TOPS. Your model performs 1.5 GFLOPs per inference. Assume 1 MAC = 2 Operations, and you can achieve 30% utilization of the peak Neural Engine TOPS due to memory bandwidth constraints.
question: What theoretical maximum FPS can a 1.5 GFLOPs MobileNetV2 model achieve on A17 Pro at 30% utilization?
details:
  realistic_solution: First, find the effective throughput of the Neural Engine by applying the 30% utilization factor to the peak TOPS. Then, convert the model's GFLOPs requirement into the same unit (Operations). Finally, divide the effective operations per second by the operations required per frame to find the frames per second.
  common_mistake: |
    **The Pitfall:** Ignoring utilization factors and unit conversions.
    **The Rationale:** Candidates often assume the hardware will hit its theoretical peak of 35 TOPS, and frequently mix up Giga (10^9) and Tera (10^12) prefixes or MACs vs. Operations.
    **The Consequence:** This leads to wildly unrealistic FPS estimations that fail to account for real-world memory bandwidth bottlenecks.
  napkin_math: |
    **Assumptions & Constraints:**
    - Apple A17 Pro Neural Engine: 35 TOPS.
    - MobileNetV2 model cost: 1.5 GFLOPs = 1.5 * 10^9 Ops/frame.
    - 30% utilization due to memory bandwidth.

    **Calculations:**
    - Peak TOPS = 35 * 10^12 Ops/sec.
    - Effective TOPS at 30% utilization = 35 * 0.30 = 10.5 * 10^12 Ops/sec.
    - Max FPS = (10.5 * 10^12 Ops/sec) / (1.5 * 10^9 Ops/frame) = 10500 / 1.5 = 7000 FPS.

    **Conclusion & Interpretation:**
    - **Result: 7000 FPS (Compute-Bound)**. Theoretical maximum FPS after accounting for utilization limits.
