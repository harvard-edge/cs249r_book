title: Hardware-Aware NAS for Mobile Video Segmentation
scenario: You are designing a real-time video segmentation model (60 FPS at 1080p) that will run exclusively on an NPU. Memory bandwidth is highly constrained during active camera use.
question: How would you design a hardware-aware NAS strategy that optimizes latency, DRAM bandwidth, and on-chip buffer reuse?
details:
  realistic_solution: A strong candidate will build a latency-and-bandwidth-aware NAS loop for segmentation blocks, using measured NPU latency, DRAM traffic, and on-chip SRAM reuse as first-class objectives. The search space should favor tiled convolutions, fused operators, early downsampling, and skip connections that reuse feature maps in local buffers, while penalizing blocks that repeatedly spill 1080p activations to LPDDR during active camera use. The predictor should be calibrated on-device under ISP contention and use a roofline-style constraint so candidate models are rejected when their measured memory traffic cannot meet the 16.6 ms frame budget.
  common_mistake: |
    **The Pitfall:** Focusing solely on minimizing FLOPs or parameter count in the NAS search space.
    **The Rationale:** Candidates assume lower FLOPs always equals faster execution, applying cloud intuition to edge environments and ignoring the shared memory bus.
    **The Consequence:** Selecting models heavily reliant on depthwise convolutions, causing severe memory stalls and missed 60 FPS deadlines.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target: 60 FPS (16.6 ms/frame latency budget).
    - Candidate model budget: 30 GOPs/frame after pruning the search space.
    - Available Bandwidth: ~20 GB/s (after ISP/GPU contention).

    **Calculations:**
    - Peak compute available per frame: 16.6 ms * 34.7 TOPS = ~576 GOPs, but the NAS target should leave large thermal and scheduling headroom.
    - Memory Allowance per Frame: 16.6 ms * 20 GB/s = 332 MB.
    - Candidate arithmetic intensity: 30 GOPs / 332 MB = ~90 Ops/Byte.
    - A block moving 1 GB/frame would require 1 GB / 20 GB/s = 50 ms of DRAM time, so it is rejected even if its FLOP count is low.

    **Conclusion & Interpretation:**
    - **Result: ~90 Ops/Byte target for a 30 GOP/frame candidate (Bandwidth-Constrained).** The NAS objective should optimize measured latency and traffic, not only FLOPs or a peak-compute roofline.
