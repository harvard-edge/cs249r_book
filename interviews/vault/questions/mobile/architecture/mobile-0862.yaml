title: Optimize EfficientNet-Lite0 for continuous inference battery life on A17 Pro
scenario: An iOS AR application runs EfficientNet-Lite0 (0.35 GFLOPs) at 30 FPS continuously on A17 Pro for object recognition in the camera viewfinder. Battery drain is 8% per hour. Target is < 4% per hour.
question: How can EfficientNet-Lite0 continuous AR inference cut battery drain below 4% per hour without changing architecture?
details:
  realistic_solution: |
    Cut average work rather than changing the architecture. Use adaptive inference scheduling driven by camera motion and scene change: run near 30 FPS during fast pans, 10-15 FPS for moderate motion, and 3-5 FPS for static scenes, reusing the last result between inferences. Also reduce the model input resolution or crop region when the AR target is stable, keep the MLModel instance warm and reused, batch no unnecessary frames, and profile the Core ML compute plan so preprocessing, resize, unsupported ops, and postprocessing do not fall back to expensive CPU/GPU paths.

    Setting Core ML compute units can encourage Neural Engine execution for supported graphs, but it does not guarantee that the CPU/GPU shut down between requests or that every op runs on ANE. The defensible goal is to reduce average inference duty cycle and avoid fallback, then measure total app power including camera capture, ISP, display, memory traffic, and rendering. Adaptive scheduling can plausibly get below 4%/hr only if the saved ML and preprocessing power is a large share of the measured 8%/hr drain.
  common_mistake: |
    **The Pitfall:** Simply halving the inference frequency from 30 FPS to 15 FPS unconditionally.
    **The Rationale:** Engineers assume battery drain scales linearly with FPS, failing to leverage hardware power gating or sensor-based adaptive strategies.
    **The Consequence:** While battery life improves, the AR experience degrades noticeably during fast camera pans, resulting in a poor user experience.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target 4% per hour.

    **Calculations:**
    1. **Baseline Power:** Assume a 15Wh battery. 8%/hr corresponds to 0.08 x 15Wh = 1.2Wh per hour, or 1.2W average app/device power during the AR session.
    2. **Target Power:** 4%/hr corresponds to 0.04 x 15Wh = 0.6W average, so the app must save about 0.6W.
    3. **Coherent Budget Example:** If camera/display/rendering/base AR work is 0.55W and ML-related inference, preprocessing, memory movement, and postprocessing are 0.65W at 30 FPS, total is 1.20W.
    4. **Adaptive Optimization:** Dropping average inference from 30 FPS to 10 FPS reduces the frame-dependent ML portion by about 3x. ML power becomes 0.65W / 3 = 0.22W if preprocessing and postprocessing scale with skipped frames.
    5. **New Total:** 0.55W base + 0.22W ML = 0.77W, or 0.77W / 15Wh = 5.1%/hr. Additional savings from lower input resolution, crop reuse, and eliminating CPU/GPU fallback must save about 0.17W more to reach 0.60W.

    **Conclusion & Interpretation:**
    **Result:** Adaptive frame skipping is necessary but may not be sufficient by itself. A defensible path to **<4% per hour** is average-rate reduction plus resolution/crop reduction, warm model reuse, and verified ANE execution with minimal CPU/GPU fallback, confirmed by whole-app power measurement.
