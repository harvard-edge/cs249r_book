title: Optimize EfficientNet-Lite0 for continuous inference battery life on A17 Pro
scenario: An iOS AR application runs EfficientNet-Lite0 (0.35 GFLOPs) at 30 FPS continuously on A17 Pro for object recognition in the camera viewfinder. Battery drain is 8% per hour. Target is < 4% per hour.
question: How can EfficientNet-Lite0 continuous AR inference cut battery drain below 4% per hour without changing architecture?
details:
  realistic_solution: 'Optimizations: (1) Adaptive inference rate: use CoreMotion to detect camera motion — if static (<0.1°/sec rotation), reduce to 5 FPS; if moderate, 15 FPS; if fast pan, 30 FPS. Average rate drops to ~10 FPS. (2) Enable ANE power gating: ensure model uses computeUnits=.neuralEngine (not .all) so A17 CPU/GPU shut down between inferences. (3) Warm model once, cache MLModel instance (avoid re-loading). (4) Use Core ML''s MLComputePlan to profile which operations fall to CPU. Expected: 10 FPS average × 2ms × 35 TOPS active power + idle between → ~2.5% battery/hr.'
  common_mistake: |
    **The Pitfall:** Simply halving the inference frequency from 30 FPS to 15 FPS unconditionally.
    **The Rationale:** Engineers assume battery drain scales linearly with FPS, failing to leverage hardware power gating or sensor-based adaptive strategies.
    **The Consequence:** While battery life improves, the AR experience degrades noticeably during fast camera pans, resulting in a poor user experience.
  napkin_math: |
    1. **Baseline Power:** 30 FPS × 2ms active ANE = 60ms active / 1000ms = 6% duty cycle. ANE power (1.5W active, 0.01W idle): `0.06 * 1.5 + 0.94 * 0.01 = 0.099W`.
    2. **System Overhead:** Pre/post-processing CPU/GPU adds ~0.3W, making total active inference ~0.4W. System base + display = 0.8W. Total = 1.2W.
    3. **Current Drain:** 8% of 15Wh battery = 1.2W. Target 4% = 0.6W. Need a 0.6W reduction.
    4. **Adaptive Optimization:** Using IMU to drop to 10 FPS average reduces duty cycle to 2%. ANE power drops to `0.02 * 1.5 = 0.03W`. Pre/post drops to ~0.1W. Total active inference drops from 0.4W to 0.13W.
    **Result:** By dropping to **10 FPS via adaptive motion tracking** and leveraging ANE power gating, inference power drops drastically, allowing the entire system to hit the **<4% per hour** target.
