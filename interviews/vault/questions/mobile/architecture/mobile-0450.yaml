title: The Battery-Draining Vision Transformer
scenario: You are leading development of an AR feature on a flagship mobile SoC. The feature uses a MobileNetV3 CNN for object detection. A junior engineer, following trends, trains a Vision Transformer (ViT) of equivalent parameter count and accuracy. During evaluation, you observe higher latency and 3x faster battery drain with the ViT model.
question: What is the fundamental architectural reason for this significant performance regression on a mobile device?
details:
  realistic_solution: |
    The root regression stems from the intrinsic data locality of the attention mechanism. A traditional CNN explicitly relies on localized, cache-friendly sliding windows that maximize highly efficient SRAM tiling. Conversely, dense self-attention computes permutations against the Key and Value matrices of every single sequence token continuously. This triggers scattered, entirely non-contiguous memory access across enormous memory spaces. On edge architectures, polling DRAM costs orders of magnitude more power than arithmetic ops. The NPU constantly idles on cache misses, while the overwhelming LPDDR DRAM traffic massively drains the battery.
  common_mistake: |
    **The Pitfall:** Falsely equating flat parameter counts directly with overall hardware and power performance.
    **The Rationale:** Engineers assume two identically sized models incur an identical performance profile, blindly ignoring exactly how spatial memory access patterns map to system caches.
    **The Consequence:** Deploying algorithmically trendy topologies that violently thrash edge LPDDR buses, resulting in profound latency spikes and unacceptable battery failure.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model: Vision Transformer, 14x14 grid (196 individual spatial tokens).
       - Hardware Bound: DRAM access is orders of magnitude more energy-expensive than reusing data from on-chip SRAM.
       - Observation to explain: Same parameter count and accuracy, but higher latency and 3x faster battery drain for the ViT.
    2. **Calculations:**
       - Dense attention compares every token with every other token: 196 * 196 = 38,416 token-pair scores per head, per layer.
       - Those scores require repeatedly reading and writing Q/K/V and attention activations with weak spatial locality.
       - A depthwise/mobile CNN reuses nearby pixels and weights in tiles, so much more of its working set can stay in SRAM.
    3. **Conclusion & Interpretation:**
       **Result: Memory-I/O-Bound.** The 3x battery drain is consistent with attention's poor locality and extra LPDDR traffic, not with parameter count alone. The napkin estimate identifies the bottleneck source; the exact 3x factor must come from profiling energy counters.
  options:
    - The MLP blocks in the ViT are larger than the equivalent CNN layers, requiring more peak compute.
    - Self-attention has poor data locality, causing a massive increase in energy-expensive random DRAM accesses.
    - The Apple Neural Engine is not optimized for the LayerNorm and Softmax operations used in Transformers.
    - The ViT's activation memory exceeds the L2 cache size, forcing it to use the slower main memory.
  correct_index: 1
