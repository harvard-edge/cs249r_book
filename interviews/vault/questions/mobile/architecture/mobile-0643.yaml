title: The Multi-Modal Sensor Fusion System
scenario: Design an on-device system for a fitness app that fuses camera, microphone, and accelerometer to provide real-time exercise form feedback. The three sensors run at different rates, produce different data types, and compete for compute resources.
question: How do you architect the fusion?
details:
  realistic_solution: 'Use an asynchronous multi-rate fusion architecture. Camera (30 Hz) drives pose estimation on the NPU (3.6 MB model, 8ms). Audio (16 kHz) feeds a lightweight rep counter on the DSP (1.2 MB, runs at 4 Hz). Accelerometer (50 Hz) streams to a motion classifier on the CPU. A fusion model (0.8 MB) runs at 1 Hz, consuming buffered outputs from all three. Total ML footprint: 5.6 MB. Power: ~800 mW total (NPU at 24% duty + camera), lasting 6.25% battery per hour-long workout. Key insight: decouple sensor rates from fusion rate — the fusion model doesn''t need 30 Hz updates, just 1 Hz form feedback.'
  common_mistake: |
    **The Pitfall:** Running three separate models and combining their outputs.
    **The Rationale:** It is architecturally simpler to maintain independent ML pipelines for each sensor modality.
    **The Consequence:** This triples the compute and memory cost, and discards cross-modal correlations.
  napkin_math: |
    **Assumptions & Constraints:**
    - Memory Footprint: Pose model (3.6 MB) + Audio model (1.2 MB) + Fusion model (0.8 MB).
    - Buffers: 30 frames x 17 keypoints x 3 coords x 4 bytes = 6 KB + 2 KB audio + 0.1 KB accel = ~8 KB.
    - Battery: 12.8 Wh total capacity.

    **Calculations:**
    - Total ML Memory: 3.6 + 1.2 + 0.8 = 5.6 MB.
    - Power: NPU at 24.3% duty x 2W = 0.486W. Camera = ~0.3W. Total = ~0.8W.
    - Battery Impact: 0.8 Wh used in a 1-hour workout. 0.8 Wh / 12.8 Wh = 6.25% drain.

    **Conclusion & Interpretation:**
    - **Result: 5.61 MB Footprint, 6.25% Drain (Compute-Bound)**. Asynchronous multi-rate architectures effectively conserve system resources on edge devices.
