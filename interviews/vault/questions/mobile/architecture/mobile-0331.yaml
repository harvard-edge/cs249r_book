title: 'Depthwise Separable Convolutions: FLOPs Reduction'
scenario: Your team is optimizing a real-time style transfer feature for a mobile app. The key bottleneck is a standard 3x3 convolution layer that maps a 128-channel input tensor to a 256-channel output. You propose replacing it with a 3x3 depthwise separable convolution.
question: What is the approximate reduction in computational cost (FLOPs) you would expect?
details:
  realistic_solution: |
    A depthwise separable convolution splits a standard convolution into two much cheaper steps: a 3x3 depthwise convolution (one filter per input channel) and a 1x1 pointwise convolution (to combine the channels). For 128 input channels and 256 output channels, the standard convolution costs 128 * 256 * 9 work units per output location, while the separable version costs 128 * 9 + 128 * 256. That is about an 8.7x reduction, so the closest option is ~9x.
  common_mistake: |
    **The Pitfall:** Forgetting that the 1x1 pointwise convolution accounts for the majority of the computation in a depthwise separable block.
    **The Rationale:** Engineers often calculate the reduction relative to the small initial depthwise spatial filtering step only.
    **The Consequence:** Massively overestimating the efficiency gains by ignoring the heavy cross-channel computation.
  napkin_math: |
    **Assumptions & Constraints:**
    - Input channels: 128.
    - Output channels: 256.
    - Kernel size: 3x3.

    **Calculations:**
    - Standard convolution cost per output location: 128 * 256 * 3 * 3 = 294,912 multiply-add units.
    - Depthwise cost per output location: 128 * 3 * 3 = 1,152 units.
    - Pointwise 1x1 cost per output location: 128 * 256 = 32,768 units.
    - Depthwise separable total: 1,152 + 32,768 = 33,920 units.
    - Reduction factor: 294,912 / 33,920 ≈ 8.7x.

    **Conclusion & Interpretation:**
    - **Result: ~8.7x Reduction**. The computational cost is reduced by approximately 9x, matching the closest option.
  options:
    - ~2x
    - ~9x
    - ~28x
    - ~256x
