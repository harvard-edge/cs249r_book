title: On-Device LLM Sizing for Apple A17 Pro
scenario: You are tasked with deploying a 7-billion parameter language model for real-time translation on a device utilizing the Apple A17 Pro Neural Engine.
question: How should a 7B LLM be sized and partitioned to fit within the 8 GB unified memory while efficiently leveraging the Neural Engine?
details:
  realistic_solution: A realistic approach requires aggressive 4-bit weight quantization, a bounded context window, and explicit KV-cache budgeting. The 7B weights are about 3.5 GB at INT4 before metadata, leaving only a narrow shared-memory margin for the OS, runtime, tokenizer, KV cache, and activations. Partition the graph according to the Apple runtime's supported execution providers, using the Neural Engine only for compatible subgraphs and leaving unsupported LLM operations on GPU/CPU as needed; compute feasibility must be measured with the actual Core ML/runtime stack.
  common_mistake: |
    **The Pitfall:** Assuming the entire 8 GB of unified memory is available for the model.
    **The Rationale:** Forgetting to account for the OS footprint and the dynamic KV cache required during text generation.
    **The Consequence:** The OS forcefully evicts the application or crashes due to memory exhaustion.
  napkin_math: |
    **Assumptions & Constraints:**
    - 7B parameter LLM.
    - Apple A17 Pro with 8 GB unified memory.
    - Must reserve memory for OS, runtime, tokenizer, activations, and dynamic KV cache.
    - Example deployment target: 4-bit weights and a reduced context length.

    **Calculations:**
    - 7B FP16 footprint: 7B * 2 bytes = 14 GB (Exceeds capacity).
    - 7B INT4 footprint: 7B * 0.5 bytes = 3.5 GB.
    - Quantization metadata and packing overhead can add several hundred MB, so budget weights as roughly 3.8-4.0 GB.
    - Reserve about 2.0-2.5 GB for OS and app/runtime overhead.
    - Remaining budget for KV cache and activations ≈ 8.0 GB - 4.0 GB - 2.5 GB = 1.5 GB.
    - Longer contexts increase KV cache linearly, so context length must be capped or KV cache must also be quantized.

    **Conclusion & Interpretation:**
    - **Result: Memory-capacity bound**. A 7B model can fit only with 4-bit weights, context limits, runtime overhead margins, and measured partitioning across supported Apple execution paths.
