title: The MobileNet Parameter Diet
scenario: You are profiling a CNN and replace a standard 3x3 convolutional layer (128 input channels,
  256 output channels) with a 3x3 depthwise separable convolution.
question: How much does a 3x3 depthwise separable convolution reduce parameters for 128 input and 256
  output channels?
details:
  realistic_solution: 'The primary advantage of a depthwise separable convolution is a dramatic reduction
    in both parameters and computation. It splits a standard convolution into two much cheaper operations:
    a 3x3 depthwise convolution (one filter per input channel) and a 1x1 pointwise convolution (to combine
    the channel outputs). The reduction in parameters is approximately equal to the square of the kernel
    size. For a 3x3 kernel, this results in an ~9x parameter reduction.'
  common_mistake: '**The Pitfall:** Underestimating the parameter reduction of depthwise separable convolutions.

    **The Rationale:** Engineers new to mobile optimization often guess a minor 2-3x gain, confuse the
    reduction with the channel count, or decouple parameters from compute cost.

    **The Consequence:** They fail to prioritize this crucial architectural shift, missing out on massive
    efficiency gains.

    '
  napkin_math: "**Assumptions & Constraints:**\n   - Kernel size (K): 3x3.\n   - Input channels (C_in):\
    \ 128.\n   - Output channels (C_out): 256.\n**Calculations:**\n   - Standard convolution params =\
    \ (K^2 * C_in * C_out) = 3^2 * 128 * 256 = 294,912.\n   - Separable convolution params = (K^2 * C_in)\
    \ + (C_in * C_out) = (3^2 * 128) + (128 * 256) = 1,152 + 32,768 = 33,920.\n   - Reduction factor =\
    \ 294,912 / 33,920 = ~8.69.\n**Conclusion & Interpretation:**\n   **Result: Compute-Bound Optimization.\
    \ This yields an ~9x reduction in parameters and MAC operations.**\n"
  options:
  - No change in parameters, only latency improves
  - ~2x reduction
  - ~256x reduction
  - ~9x reduction
  correct_index: 3
