title: 'Realization: build multi-model CNN ensemble on Snapdragon 8 Gen 3 with CPU+NPU split'
scenario: You need to run an ensemble of MobileNetV3-Small (0.056 GFLOPs) + EfficientNet-Lite0 (0.35 GFLOPs) simultaneously on a Snapdragon 8 Gen 3 device for a high-accuracy classification feature. Total combined latency must be <8ms with the final softmax results merged.
question: How should a MobileNetV3-Small and EfficientNet-Lite0 ensemble be split across Snapdragon compute units under 8ms?
details:
  realistic_solution: |
    Start with the larger EfficientNet-Lite0 on Hexagon HTP and profile whether MobileNetV3-Small can run concurrently on a separate queue, Adreno GPU, or Kryo CPU without starving the HTP path. If the QNN backend can schedule both graphs concurrently with acceptable contention, run them asynchronously and merge logits on the CPU after both futures complete. If contention is high, keep EfficientNet on HTP and place the smaller MobileNet on GPU/CPU, or run the models sequentially if the measured sum is still below 8ms.

    Parallel dispatch does not make latency exclusively equal to the slowest model; dispatch, preprocessing, memory bandwidth, synchronization, resource contention, and final merge all matter. The split should be chosen from on-device measurements, with the 8ms SLA evaluated end to end.
  common_mistake: |
    **The Pitfall:** Executing both models in strict sequential order on the Hexagon NPU.
    **The Rationale:** Assuming the NPU is the singular monolithic accelerator and failing to engage heterogeneous asynchronous dispatch.
    **The Consequence:** Artificially stacking latency (2ms + 0.5ms = 2.5ms) and discarding free parallel performance, which compounds dangerously at scale.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target SLA: < 8ms.
    - MobileNetV3-Small: 0.056 G-Ops. EfficientNet-Lite0: 0.35 G-Ops.
    - Use measured or profiled latencies for the release build; peak TOPS is not used as a practical latency estimate.

    **Calculations:**
    - Example measured EfficientNet-Lite0 HTP latency: 3.2ms.
    - Example measured MobileNetV3-Small GPU/CPU latency: 1.4ms.
    - Dispatch and synchronization overhead for two asynchronous runs: 0.4ms.
    - Logit merge and final softmax on CPU: 0.1ms.
    - Strict sequential estimate: 3.2ms + 1.4ms + 0.1ms = 4.7ms.
    - Concurrent heterogeneous estimate with no severe contention: max(3.2ms, 1.4ms) + 0.4ms + 0.1ms = 3.7ms.
    - Even if contention adds 1.5ms, total is 3.7ms + 1.5ms = 5.2ms, still under 8ms in this example.

    **Conclusion & Interpretation:**
    - **Result: Measured concurrent split can meet the 8ms SLA (Latency-Bound)**. Concurrency helps only if profiling shows limited contention; include dispatch, preprocessing, synchronization, and merge overheads in the SLA calculation.
