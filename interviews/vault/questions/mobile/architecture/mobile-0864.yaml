title: 'Realization: build multi-model CNN ensemble on Snapdragon 8 Gen 3 with CPU+NPU split'
scenario: You need to run an ensemble of MobileNetV3-Small (0.056 GFLOPs) + EfficientNet-Lite0 (0.35 GFLOPs) simultaneously on a Snapdragon 8 Gen 3 device for a high-accuracy classification feature. Total combined latency must be <8ms with the final softmax results merged.
question: How should a MobileNetV3-Small and EfficientNet-Lite0 ensemble be split across Snapdragon compute units under 8ms?
details:
  realistic_solution: 'Employ a highly concurrent heterogeneous split. Assign both models to the Hexagon HTP using asynchronous QNN concurrent execution queues, or pipeline EfficientNet to the HTP and MobileNet to the Kryo CPU/Adreno GPU. Given the extreme speed, parallel dispatch ensures the total pipeline latency is bottlenecked exclusively by the single slowest model. Merge the final vectors instantly on the CPU.'
  common_mistake: |
    **The Pitfall:** Executing both models in strict sequential order on the Hexagon NPU.
    **The Rationale:** Assuming the NPU is the singular monolithic accelerator and failing to engage heterogeneous asynchronous dispatch.
    **The Consequence:** Artificially stacking latency (2ms + 0.5ms = 2.5ms) and discarding free parallel performance, which compounds dangerously at scale.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target SLA: < 8ms.
    - Snapdragon 8 Gen 3 HTP (NPU): 45 TOPS.
    - MobileNetV3-Small: 0.056 G-Ops. EfficientNet-Lite0: 0.35 G-Ops.

    **Calculations:**
    - MV3-Small (NPU execution): 0.056 G-Ops / 45 TOPS ≈ 1.2μs theoretical -> ~0.5ms practical overhead limit.
    - Lite0 (NPU execution): 0.35 G-Ops / 45 TOPS ≈ 7.8μs theoretical -> ~2.0ms practical overhead limit.
    - Strict Sequential execution: 2.0ms + 0.5ms = 2.5ms.
    - Parallel Dispatch (Heterogeneous split): max(2.0ms, 0.5ms) = 2.0ms.
    - CPU Softmax Merge: 2000 FP32 additions on Kryo CPU ≈ negligible (~0.001ms).

    **Conclusion & Interpretation:**
    - **Result: 2.0 ms (Latency-Bound)**. Concurrent multi-processor execution completely absorbs the smaller model's runtime, bounding total pipeline latency to the slowest model (~2ms), effortlessly crushing the 8ms SLA.
