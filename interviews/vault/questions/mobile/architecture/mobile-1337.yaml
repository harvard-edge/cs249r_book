title: KV Cache Capacity on Exynos 2400
scenario: You are optimizing a 32-layer generative LLM for the Samsung Exynos 2400 NPU. While the NPU provides 34.7 TOPS of compute across its dual cores, token generation is memory-bound by the shared 12 GB LPDDR5X memory pool. After allocating memory for the model weights, OS, CPU, GPU, and ISP, you have exactly 1.5 GiB of RAM remaining strictly for the KV cache. The model has a hidden dimension of 4096, 32 query heads, head_dim 128, and uses FP16 (2 bytes/value). For MQA, each layer stores 1 KV head of dimension 128.
question: How would you calculate the maximum sequence length you can support if you implement standard Multi-Head Attention (MHA) versus Multi-Query Attention (MQA) with 1 KV head?
details:
  realistic_solution: |
    To find the maximum context length, calculate the memory footprint of a single token's KV cache across all layers, then divide the available memory by this per-token footprint. For MHA, each layer stores K and V across all 32 query heads, for 4096 values each. For MQA, each layer stores K and V for one shared KV head of dimension 128. With a 1.5 GiB cache budget, this gives 3,072 MHA tokens versus 98,304 MQA tokens.
  common_mistake: |
    **The Pitfall:** Forgetting to account for all dimensions of the KV cache.
    **The Rationale:** Candidates often forget to multiply by the number of layers (32) or forget that the KV cache stores both Keys and Values (x2).
    **The Consequence:** They incorrectly calculate the head dimension or memory per token, leading to drastically inflated sequence length estimates.
  napkin_math: |
    **Assumptions & Constraints:**
    - Generative LLM: 32 layers, hidden dimension 4096.
    - KV Cache budget: 1.5 GiB = 1536 MiB.
    - Precision: FP16 (2 bytes/value).
    - MQA convention: 1 shared KV head per layer with head_dim = 4096 / 32 = 128.

    **Calculations:**
    - MHA per-token footprint: 32 layers * 2 (K & V) * 4096 values * 2 bytes = 524,288 bytes = 512 KiB = 0.5 MiB.
    - Max MHA context: 1536 MiB / 0.5 MiB = 3,072 tokens.
    - MQA per-token footprint: 32 layers * 2 (K & V) * 128 values * 2 bytes = 16,384 bytes = 16 KiB = 0.015625 MiB.
    - Max MQA context: 1536 MiB / 0.015625 MiB = 98,304 tokens.

    **Conclusion & Interpretation:**
    - **Result: ~98K tokens (Memory-Bound).** Transitioning from MHA to MQA slashes memory requirements per token, enabling a nearly 32x increase in supported context length within the same 1.5 GB envelope.
