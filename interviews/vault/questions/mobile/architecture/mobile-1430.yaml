title: 'A17 Pro GQA Sizing for On-Device LLMs'
scenario: A 3B conversational agent on the Apple A17 Pro Neural Engine must handle up to 4K context windows within a strict 4 GB memory allocation and ~5W power envelope.
question: How should Grouped-Query Attention (GQA) be sized to reduce the KV-cache footprint compared to Multi-Head Attention (MHA)?
details:
  realistic_solution: 'The candidate should calculate the KV cache memory footprint and realize MHA will consume too much of the available memory budget. They should propose GQA (e.g., an 8:1 query-to-KV head ratio) to compress the KV cache. This prevents out-of-memory errors, allows the model weights (quantized to 4-bit) and KV cache to fit comfortably within the 4 GB memory constraints, and reduces memory access power consumption to stay under the ~5W limit.'
  common_mistake: |
    **The Pitfall:** Sizing only the model weights and ignoring the dynamic KV cache footprint.
    **The Rationale:** Assuming the 35 TOPS NPU compute is the sole bottleneck for long-context generation.
    **The Consequence:** Encountering out-of-memory (OOM) errors and exceeding power limits due to excessive memory access.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: 3B params, hidden size 3072, 32 layers.
    - Weights (4-bit): ~1.5 GB.
    - Memory limit: 4 GB.

    **Calculations:**
    - MHA KV cache (FP16, 4K context): 2 * 2 bytes * 32 layers * 4096 tokens * 3072 dim = 1.61 GB.
    - MHA Total Memory: 1.5 GB + 1.61 GB = 3.11 GB (dangerously close to 4GB with activations).
    - GQA (8:1 ratio) KV cache: 1.61 GB / 8 = ~201 MB.
    - GQA Total Memory: 1.5 GB + 201 MB = ~1.7 GB.

    **Conclusion & Interpretation:**
    - **Result: ~1.7 GB (Memory-Capacity Bound)**. Safely fits the 4 GB limit and reduces memory bandwidth pressure.
