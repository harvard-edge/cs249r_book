title: Triple-Buffered Pipeline for Bluetooth Text Streaming
scenario: An NPU generates LLM tokens at 20 tokens/sec. The detokenized text must stream over a Bluetooth connection that inherently adds 50ms of latency.
question: Create a pipelined software architecture that hides the Bluetooth transmission latency and ensures seamless UI text streaming?
details:
  realistic_solution: Create an asynchronous producer-detokenizer-sender pipeline using bounded queues. The NPU worker produces token IDs, a CPU worker detokenizes small chunks such as 2 tokens, and a Bluetooth sender drains encoded text packets independently. Size the queues for a few chunks, apply backpressure if Bluetooth throughput falls behind, and coalesce or pause UI updates rather than letting buffers grow without limit. In steady state, the 50ms transport delay can be overlapped with token generation, but it is not perfectly hidden under overload.
  common_mistake: |
    **The Pitfall:** Using a naive synchronous loop.
    **The Rationale:** Candidates often design a pipeline that generates, detokenizes, and sends tokens sequentially.
    **The Consequence:** The synchronous loop halts NPU token generation while waiting for the 50ms network ACK, destroying throughput.
  napkin_math: |
    **Assumptions & Constraints:**
    - Token generation speed: 20 tokens/sec.
    - Bluetooth transport latency: 50ms.

    **Calculations:**
    - Time per token = 1000ms / 20 tokens = 50ms/token.
    - Buffer chunk size of 2 tokens = 2 * 50ms = 100ms generation time.
    - Two-token chunk generation time: 2 * 50 ms = 100 ms.
    - A 50 ms transport delay can overlap with the next 100 ms generation window in steady state.

    **Conclusion & Interpretation:**
    - **Result: steady-state latency overlap.** Triple buffering can keep text updates smooth when Bluetooth throughput is at least the generated text rate, but bounded queues and backpressure are required when the link cannot drain fast enough.
