title: Real-Time Object Detection on Tensor G3
scenario: "Your team needs to specify a continuous real-time object detection architecture running on the Google Tensor G3. The system must process 30 frames per second at high resolution while concurrently running an on-device LLM (Gemini Nano)."
question: "How would you design a real-time object detector for Tensor G3 that balances compute and memory access?"
details:
  realistic_solution: "Specify an architecture with high arithmetic intensity, such as ConvNeXt or EfficientNet derivatives that utilize standard dense convolutions instead of purely depthwise operations. The model must maximize TPU matrix multiplication utilization without spamming the LPDDR5X memory bus, ensuring enough bandwidth is preserved for the concurrently executing Gemini Nano model."
  common_mistake: |
    **The Pitfall:** Defaulting to standard MobileNet-style depthwise separable convolutions to minimize FLOPs.
    **The Rationale:** Candidates focus solely on FLOPs and fail to analyze that depthwise layers are highly memory-bandwidth bound and have low arithmetic intensity.
    **The Consequence:** Causes severe contention with the concurrently running Gemini Nano model on the shared LPDDR5X bus, leading to frame drops and high latency.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Tensor G3 TPU: 7.5 TOPS. Gemini Nano uses 80%, leaving 1.5 TOPS.
       - Target: 30 FPS. Memory: Shared 12 GB LPDDR5X.
    2. **Calculations:**
       - Per-frame compute budget = 1.5 TOPS / 30 = 50 GOPs (25 GMACs).
       - EfficientNet-Lite0 footprint = ~400 MMACs (well under 25 GMACs).
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound.** A depthwise-heavy CNN heavily underutilizes the TPU (10-20%) because it stalls waiting for the memory bus shared with Gemini Nano; arithmetic intensity must dictate the design, not just FLOPs.
