title: INT8 Model Memory Footprint on Snapdragon 8 Gen 3
scenario: You are deploying a 3 billion parameter language model to a mobile device. You plan to use INT8 quantization. The device features 12 GB of shared memory, but the OS and background applications reserve 6 GB. Calculate the total memory footprint of the model, assuming a 25% memory overhead is required for the KV cache and activations.
question: What total memory footprint does a 3B INT8 model need with 25% KV/activation overhead, and does it fit?
details:
  realistic_solution: 'The correct approach involves calculating the footprint of the INT8 weights (1 byte per parameter) and then adding the specified 25% overhead for runtime state. Because modern mobile devices use a unified memory architecture, this total footprint must be compared against the remaining 6 GB of shared system RAM to verify that the deployment is feasible.'
  common_mistake: |
    **The Pitfall:** Forgetting the memory overhead required for runtime state.
    **The Rationale:** Candidates often calculate static weight sizes but forget that LLMs require dynamic memory for KV caches and intermediate activations.
    **The Consequence:** Deploying models that fail in production due to Out-of-Memory errors.
  napkin_math: |
    **Assumptions & Constraints:**
    - 3B parameters at INT8 precision.
    - Overhead for KV cache and activations = 25%.
    - Total Shared RAM = 12 GB. OS reserved = 6 GB.

    **Calculations:**
    - Weight Memory = 3B params * 1 byte/param = 3.0 GB.
    - Runtime State Overhead = 3.0 GB * 0.25 = 0.75 GB.
    - Total Application Footprint = 3.0 GB + 0.75 GB = 3.75 GB.
    - Available RAM = 12.0 GB - 6.0 GB = 6.0 GB.

    **Conclusion & Interpretation:**
    - **Result: 3.75 GB fits in 6.0 GB (Memory-capacity-bound success)**. The application fits comfortably without triggering OOM limits.
