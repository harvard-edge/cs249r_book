title: On-Device LLM Deployment Feasibility on Google Tensor G3
scenario: You are tasked with deploying a large language model (LLM) onto a mobile device powered by an NPU. The LLM has 7 billion parameters, with each parameter represented as a 16-bit floating point number (FP16).
question: How would you analyze whether this model can run effectively on the NPU, and what are the key considerations for achieving optimal performance?
details:
  realistic_solution: 'A realistic solution involves a multi-pronged approach: 1. Memory Footprint Calculation: Calculate the base model size (7B params * 2 bytes/param = 14 GB). Identify that this exceeds the 12 GB RAM. Discuss strategies like quantization (e.g., INT8) to reduce model size. 2. Computational Feasibility: Estimate the operations for a typical inference pass. Compare this to the NPU''s 7.5 TOPS. Discuss how quantization impacts FLOPs. 3. Profiling and Optimization: Emphasize the need for on-device profiling tools to identify bottlenecks.'
  common_mistake: |
    **The Pitfall:** Solely focusing on parameter count and raw TOPS without accounting for memory bandwidth and activations.
    **The Rationale:** Candidates underestimate runtime overheads and assume theoretical TOPS translates directly to inference speed.
    **The Consequence:** The model OOMs due to activation memory, or suffers massive latency because memory bandwidth is the true bottleneck.
  napkin_math: |
    **Assumptions & Constraints:**
    - 7B parameters. RAM limit: 12 GB.
    - Compute: 7.5 TOPS.
    - Inference FLOPs: 100 TFLOPS.

    **Calculations:**
    - Base Footprint: 7B * 2 bytes = 14 GB (> 12 GB available).
    - INT8 size: 7 GB (Fits).
    - Compute estimate: 100 TFLOPS / 7.5 TOPS = ~13.3 seconds.

    **Conclusion & Interpretation:**
    - **Result: Even with INT8 fitting memory, 7.5 TOPS requires heavy optimization to achieve interactive latency (Compute-Bound).**
