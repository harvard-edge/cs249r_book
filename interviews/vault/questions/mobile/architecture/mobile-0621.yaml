title: The CoreML Neural Engine Fallback
scenario: You compile a custom Transformer model for iOS using CoreML. You explicitly set `MLComputeUnits.all` to allow the OS to run it on the Neural Engine (ANE). The model runs, but it consumes massive battery and the phone gets hot. You check the profiler and discover it is running entirely on the GPU.
question: Why did CoreML silently reject the Neural Engine?
details:
  realistic_solution: CoreML silently falls back from ANE to GPU when an operator or graph pattern is unsupported by the ANE compiler. Common culprits include custom activations, dynamic shapes, certain attention patterns, or gather/scatter ops. The ANE may run the supported graph at roughly sub-watt to 1W power, while a sustained GPU fallback can draw several watts, so battery and thermals degrade even though `MLComputeUnits.all` was requested. Debug with Xcode Instruments' CoreML trace to see per-layer device assignment, then replace unsupported ops with ANE-compatible equivalents.
  common_mistake: |
    **The Pitfall:** Assuming that the whole model class is unsupported instead of checking the specific operators and graph patterns.
    **The Rationale:** Engineers equate a GPU fallback with lack of hardware capability rather than graph-level compiler incompatibilities.
    **The Consequence:** The model is left running on the GPU, destroying device battery life and thermal budgets.
  napkin_math: |
    **Assumptions & Constraints:**
    - Same fixed inference workload is compared on two device assignments.
    - ANE path: ~1W sustained while running the supported graph.
    - GPU fallback path: ~5W sustained for similar latency after CoreML rejects ANE placement.
    - Example runtime for the workload: 100ms.

    **Calculations:**
    - ANE energy: 1W * 0.100s = 0.10J.
    - GPU fallback energy: 5W * 0.100s = 0.50J.
    - Relative energy and heat for the same workload: 0.50J / 0.10J = 5x.

    **Conclusion & Interpretation:**
    - **Result: ~5x energy for the same inference (Thermal-Bound)**. The issue is unsupported ANE ops or graph patterns causing GPU fallback, not a generic failure of transformer models.
