title: 'Snapdragon 8 Gen 3: Encoder-Decoder Architecture Tradeoffs for On-Device AI'
scenario: 'A company is developing an on-device AI assistant for a smartphone powered by a Hexagon NPU. They are evaluating three architectural approaches for a core NLP task: an encoder-only model, a decoder-only model, and an encoder-decoder model.'
question: What are the latency, memory, and power tradeoffs among encoder-only, decoder-only, and encoder-decoder models?
details:
  realistic_solution: A realistic solution involves careful model quantization (leveraging the INT8 capability), pruning, and distillation to fit within the LPDDR5X memory budget. For decoder-only models, optimizing KV cache management and employing speculative decoding can reduce latency. Encoder-decoder models might require more aggressive partitioning between NPU and CPU/DSP to manage load.
  common_mistake: |
    **The Pitfall:** Underestimating the latency impact of sequential token generation in decoder-only models.
    **The Rationale:** Engineers often focus on the NPU's peak throughput without considering the dynamic memory requirements for decoder caches.
    **The Consequence:** This oversight can lead to unexpected memory exhaustion and failure to meet real-time latency targets.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model size: 3B parameters (FP16: 6GB, INT8: 3GB).
    - Decoder context: 2048 tokens, 32 heads, 32 layers.
    - NPU Compute: 45 TOPS (INT8).
    - Compute per token: ~25 GOPs.

    **Calculations:**
    - KV cache (FP16): 2048 x 32 x 128 (assuming 128 head dim) x 2 bytes x 32 layers x 2 (K+V) = ~1GB.
    - Compute theoretical limit: 45,000 GOPs/s / 25 GOPs/token = 1,800 tokens/second.
    - Practical throughput is gated by sequential memory loading.

    **Conclusion & Interpretation:**
    - **Result: 1GB KV Cache Overhead (Memory-Bandwidth-Bound)**. Dynamic KV cache memory demands dramatically constrain decoder models on edge NPU processors.
