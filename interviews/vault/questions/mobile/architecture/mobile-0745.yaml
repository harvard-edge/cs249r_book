title: The Backbone Bloat
scenario: Your mobile app has three different computer vision features (Face Detection, Face Mesh, and Segmentation). All three use the same MobileNetV3 backbone.
question: Based on the VRAM diagram, what is the 'efficiency gap' in your model loading strategy?
details:
  realistic_solution: 'You have **Backbone Redundancy**. The app loads three identical copies of the backbone weights and computes the same features three times per frame. The fix is a **Multi-Task Architecture with Shared Backbone**: load the backbone once (12 MB), run it once (5ms), and branch into three lightweight task heads (1ms each). This reduces memory by 66% and latency by 55%.'
  common_mistake: |
    **The Pitfall:** Assuming models can simply run in parallel.
    **The Rationale:** Candidates might suggest running the models in parallel on different cores, misunderstanding that the phone typically has one NPU.
    **The Consequence:** Parallel execution doesn't alleviate the core issue, and you'd still waste 24 MB of memory.
  napkin_math: |
    **Assumptions & Constraints:**
    - Three vision tasks using MobileNetV3.
    - Single task backbone requires 12MB RAM, 2 GFLOPs, 5ms latency, 1ms head.

    **Calculations:**
    - Independent execution: 3 tasks * 12MB = 36MB RAM, and 3 * 2 GFLOPs = 6 GFLOPs compute.
    - Independent latency: 3 * 6ms = 18ms.
    - Shared backbone: Features extracted once (12MB, 2 GFLOPs, 5ms), then branched to 3 heads (1ms each).
    - Latency: 5ms + 3*1ms = 8ms.

    **Conclusion & Interpretation:**
    - **Result: 8ms latency (Memory-Capacity Bound)**. Saves 24MB RAM and drops per-frame latency by 55%.
