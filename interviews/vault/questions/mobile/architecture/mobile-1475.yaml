title: Encoder vs Decoder Bottlenecks on A17 Pro
scenario: Your team is evaluating model architectures for an on-device translation feature running on the Apple A17 Pro Neural Engine. The chip relies on a shared unified memory pool. To make the right architectural choice between an encoder-heavy or decoder-heavy design, you must recall the fundamental hardware utilization difference between these two components.
question: By definition, which phase (encoder prefill or decoder generation) is typically compute-bound, and which is memory-bandwidth-bound?
details:
  realistic_solution: The candidate should recall that the encoder (prefill) phase processes multiple tokens in parallel and is typically compute-bound, easily saturating the Neural Engine's ALUs. In contrast, the decoder's autoregressive generation phase processes one token at a time and is strictly memory-bandwidth-bound, as it must repeatedly fetch weights from the unified memory.
  common_mistake: |
    **The Pitfall:** Candidates often incorrectly state that both phases are compute-bound.
    **The Rationale:** They only focus on the 35 TOPS specification of the 16-core Neural Engine, ignoring the sequential memory access penalty of autoregressive generation.
    **The Consequence:** This leads to poor architectural choices that underutilize the hardware and result in unexpected latency bottlenecks.
  napkin_math: |
    **Assumptions & Constraints:**
    - Compute required per token: ~2 GOPs.
    - A17 Pro peak: 35 TOPS.
    - Decoder memory read per token: 1 GB.
    - Bandwidth: 50 GB/s.

    **Calculations:**
    - Compute time at 35 TOPS: 2 GOPs / 35,000 GOPs/s = ~0.057 ms.
    - Memory time per token: 1 GB / 50 GB/s = 20 ms.

    **Conclusion & Interpretation:**
    - **Result: 20 ms Memory vs 0.057 ms Compute (Memory-Bandwidth-Bound)**. Sequential token generation is permanently gated by main memory limits over theoretical compute maximums.
  options:
  - Encoder prefill is compute-bound; decoder generation is memory-bandwidth-bound.
  - Encoder prefill is memory-bandwidth-bound; decoder generation is compute-bound.
  - Both phases are heavily compute-bound due to the 35 TOPS Neural Engine.
  - Both phases are heavily memory-bandwidth-bound due to the unified memory pool.
