title: The Shared GPU Contention
scenario: Your app runs a 12ms style transfer model on the GPU while simultaneously rendering a complex UI with animations at 60 FPS. Users report dropped frames and UI jank during inference. The GPU has a 16.67ms budget per frame for 60 FPS.
question: Why do a 12ms ML GPU kernel and 4ms UI render still drop frames, and what scheduling strategy prevents jank?
details:
  realistic_solution: 'The mobile GPU uses a non-preemptive tile-based deferred renderer. Once a compute or render command buffer starts executing, it runs to completion; the GPU cannot pause a long ML kernel mid-command to service a UI render pass. With a 12ms ML kernel and 4ms UI render, total work is 16ms, leaving only 0.67ms of the 16.67ms frame budget, so ordinary scheduling jitter causes dropped frames. Fix with chunked inference: split the model into about 6 sequential chunks of ~2ms each and submit UI work between chunks. Chunking does not make the full 12ms inference complete in 6ms; it reduces the maximum continuous GPU occupancy from 12ms to about 2ms, so UI work waits for one chunk instead of the entire model.'
  common_mistake: |
    **The Pitfall:** Assuming ML inference and UI rendering can be perfectly serialized within a single frame budget.
    **The Rationale:** Engineers calculate 12ms + 4ms < 16.67ms, ignoring GPU command buffer scheduling and the lack of preemption on mobile GPUs.
    **The Consequence:** The GPU cannot pause the 12ms ML kernel to service a UI render pass, resulting in dropped frames and visible jank.
  napkin_math: |
    **Assumptions & Constraints:**
    - Frame budget: 16.67ms (60 FPS).
    - ML execution: 12ms. UI render: 4ms.
    - GPU cannot preempt command buffers mid-execution.

    **Calculations:**
    - Unchunked margin: 16.67ms - (12ms + 4ms) = 0.67ms.
    - Chunked ML (6 chunks of 2ms): Max UI wait time = 2ms.
    - Worst-case UI blocking with chunking: one 2ms chunk, then 4ms render = ~6ms UI response path.
    - Total ML work is still 12ms across all chunks; chunking improves responsiveness and scheduling slack for UI work, not total inference cost.

    **Conclusion & Interpretation:**
    - **Result: Reduced worst-case blocking (Latency-Bound).** Chunking reduces maximum continuous GPU occupancy from 12ms to ~2ms so UI rendering can slip between chunks, but it should not be described as a 10.67ms end-to-end inference margin.
