title: Quantized LoRA Serving on Snapdragon 8 Gen 3
scenario: You are deploying a QLoRA-quantized 1B model with NF4 base weights and BF16 adapters on Snapdragon 8 Gen 3. The Hexagon NPU only supports INT8/INT4 arithmetic.
question: How should BF16 LoRA adapters run on Snapdragon 8 Gen 3 when Hexagon supports only INT8/INT4?
details:
  realistic_solution: 'Quantize adapter weights to INT8 at deployment time. INT8 LoRA adapters lose <0.5% quality for rank-4. The merged result (W_base + B×A in INT8) can then run entirely on Hexagon NPU. Alternative: use QNN SDK''s AIMET to run adapter compute on Adreno GPU in pipeline with Hexagon NPU.'
  common_mistake: |
    **The Pitfall:** Running LoRA adapter matmuls on the CPU as a fallback.
    **The Rationale:** Since the Hexagon NPU doesn't support BF16 natively, engineers fall back to the CPU without realizing this serializes execution and causes massive pipeline bubbles.
    **The Consequence:** Effective throughput is catastrophically cut by 40-60%.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hexagon NPU: 45 TOPS (INT8).
    - CPU Fallback: ~100 GFLOPS (FP32/BF16).
    - Adapter size: Rank-4, 786K MACs per decode step (1.57 MMACs total).

    **Calculations:**
    - Adapter INT8 compute time: 1.57M / 45T = 0.035 µs.
    - CPU fallback compute time: 1.57M / 100G = 15.7 µs.
    - Ratio: 15.7 µs / 0.035 µs = 448x.

    **Conclusion & Interpretation:**
    - **Result: 448x Slower (Compute-Bound)**. CPU fallback is ~448x slower than NPU execution. Adapters must be quantized to INT8 to prevent pipeline bubbles.
