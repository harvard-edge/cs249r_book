title: TFLite Deployment Across Fragmented Exynos NPUs
scenario: 'Your app ships a face mesh model to Samsung Galaxy phones. You test on the Galaxy S24 and it works great at 8ms. Then bug reports flood in: Galaxy S22 users get garbled outputs, and Galaxy S21 users see 45ms latency. All use the same model binary and TFLite version.'
question: How do you deploy one feature across three Exynos generations with different NPU operator support?
details:
  realistic_solution: |
    The product should ship one face-mesh feature, not pretend one model binary is compatible with every Exynos NPU. Use device-targeted delivery with a compatibility matrix and backend kill switch. Exynos 2400 (S24) gets the original NPU model at 8ms. Exynos 2200 (S22) gets a graph-rewritten model that avoids the grouped-conv compiler bug. Exynos 2100 (S21) gets a GPU-optimized TFLite path instead of accidental CPU fallback. The deployment contract is one feature with multiple validated artifacts selected by SoC capability.
  common_mistake: |
    **The Pitfall:** Blaming the TFLite runtime and waiting for a software patch.
    **The Rationale:** Engineers fail to realize that SoC manufacturers change NPU architectures aggressively between generations, leading to shifting operator support and compilation bugs.
    **The Consequence:** Leaving broken experiences in production for months while waiting for an upstream fix that may never arrive.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model A (Exynos 2400): 4.2 MB, 8ms on NPU.
    - Model B (Exynos 2200): 4.8 MB, 9ms on NPU after grouped-conv rewrite.
    - Model C (Exynos 2100): 4.0 MB, 12ms on GPU; the unoptimized single binary falls back to CPU at 45ms.
    - Market share: S24 35%, S22 50%, S21 15%.

    **Calculations:**
    - Single-binary fleet latency would include the broken S22 path and S21 CPU fallback, so it is not a valid release artifact.
    - Targeted-artifact weighted latency = (0.35 * 8ms) + (0.50 * 9ms) + (0.15 * 12ms) = 9.1ms.
    - Targeted artifacts add less than 5 MB per device because each device downloads only its compatible model.

    **Conclusion & Interpretation:**
    - **Result: Compatibility-targeted deployment.** Multi-artifact device targeting converts a broken universal binary into one feature with validated per-SoC execution paths and about 9.1ms weighted fleet latency.
