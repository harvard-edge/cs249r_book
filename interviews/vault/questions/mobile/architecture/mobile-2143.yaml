title: Orin RDMA Cache Lock
scenario: 4 Jetson AGX Orins executing a multi-modal agent model share a global KV cache pool over a 10GbE switch using RDMA.
question: How can a distributed KV cache allocation protocol mitigate the 10us RDMA lock synchronization cost when multiple Orins append to the same sequence?
details:
  realistic_solution: 'A naive token-by-token RDMA lock incurs a 40us contention bubble per step across the 4 nodes. The protocol must utilize block-level preallocation, acquiring an RDMA lock to reserve a 16-token chunk at once. This amortizes the 10us synchronization cost over 16 generation steps.'
  common_mistake: |
    **The Pitfall:** Designing a token-by-token locking mechanism over RDMA.
    **The Rationale:** Engineers map single-node autoregressive generation patterns directly to a distributed cluster without accounting for network round-trip overhead.
    **The Consequence:** Severe lock contention scaling that bottlenecks the entire cluster at the network switch layer.
  napkin_math: |
    **Assumptions & Constraints:**
    - Cluster: 4 Orins, 10GbE RDMA.
    - RDMA lock synchronization cost: 10us.
    - Chunk size: 16 tokens.

    **Calculations:**
    - Token-by-Token Lock: 4 nodes * 10us = 40us contention penalty per step.
    - Block Preallocation: Reserve 16 tokens with a single 10us lock.
    - Amortized Penalty: 40us / 16 = 2.5us per step.

    **Conclusion & Interpretation:**
    - **Result: 2.5us per step (Network-Bound)**. Amortized penalty drops to 2.5us per step, drastically reducing RDMA contention in this system.
