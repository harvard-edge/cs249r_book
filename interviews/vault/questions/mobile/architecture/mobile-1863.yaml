title: Per-User LoRA Adapter Privacy on Mobile
scenario: A messaging app stores per-user LoRA adapters on-device for personalized response suggestions. A security researcher raises concern that adapter weights could leak user message content through model inversion attacks.
question: How would you assess the risk and design mitigations?
details:
  realistic_solution: 'Risk assessment: LoRA r=4 adapters trained on a small set of user messages can memorize rare phrases, names, or message patterns. The realistic threats are membership inference, extraction of adapter files after device compromise, prompt-based leakage from the personalized model, and direct exposure of retained training data; generic reconstruction from a small adapter alone should not be presented as guaranteed. Mitigations: (1) threat-model attacker access to adapter files, prompts, backups, and device compromise paths. (2) Use DP-SGD only with a real privacy accountant and calibrated clipping/noise, accepting the quality tradeoff. (3) Encrypt adapters at rest with device-backed keys and restrict backup/export. (4) Minimize retention: delete raw examples after update, limit training steps, and test for memorization of rare phrases.'
  common_mistake: |
    **The Pitfall:** Dismissing model inversion attacks as theoretical and not applicable to LoRA adapters.
    **The Rationale:** Model inversion on adapter weights is harder than on full model weights.
    **The Consequence:** Teams deploy adapters without DP-SGD, allowing adapters trained on user data to memorize specific phrases, rare words, or proper nouns from private messages.
  napkin_math: |
    **Assumptions & Constraints:**
    - Privacy target: epsilon=8, delta=1e-5.
    - DP-SGD requires a privacy accountant and a sampling rate based on dataset size, batch size, and number of update steps.
    - Gradient clipping, secure aggregation of per-example gradients, and calibrated Gaussian noise are needed for a meaningful DP guarantee.

    **Calculations:**
    - Batch=4 and T=100 are not enough to derive a noise multiplier without the number of training examples and the accountant method.
    - For a small personal dataset, the sampling rate can be high, so achieving epsilon=8 may require enough noise to noticeably reduce adapter quality.
    - The mitigation should therefore combine DP-SGD with encrypted storage, limited training steps, deletion of raw examples, and evaluation for memorization of rare phrases.

    **Conclusion & Interpretation:**
    - **Result: Privacy-utility tradeoff.** Do not invent an SNR from average gradient magnitude. Choose DP-SGD parameters with a real accountant, then validate whether the personalized adapter still meets quality targets while reducing memorization risk.
