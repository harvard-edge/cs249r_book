title: Multi-Task Model Specification for On-Device AI Assistant on A17 Pro
scenario: You need to specify the architecture of an on-device AI assistant for iPhone 15 Pro that must handle speech recognition (streaming, <200ms latency), intent classification (50ms), and response generation (LLM, 10-15 tok/s) with a total memory budget of strictly 1.5GB.
question: Which model sizes, quantization levels, and execution units fit ASR, intent, and LLM generation in 1.5 GB on iPhone 15 Pro?
details:
  realistic_solution: 'The listed weights alone nearly fill the 1.5GB limit: Whisper-small INT4 is about 122MB, BERT-mini INT8 about 11MB, and Phi-2 INT4 about 1.35GB. That leaves only about 17MB before accounting for Core ML/runtime buffers, activations, tokenizer state, KV cache, and app memory, so this exact combination does not satisfy a strict total resident-memory budget. To fit safely, the design needs a smaller response model, a smaller ASR model, model streaming with mutually exclusive residency, or an explicitly larger memory budget. The execution units can still be ASR/intent on ANE and LLM decode on CPU/ANE hybrid, but memory capacity is the blocking constraint.'
  common_mistake: |
    **The Pitfall:** Designing three separate full-size models that compete for memory simultaneously.
    **The Rationale:** Treating each pipeline step in isolation rather than optimizing for the system's shared memory budget.
    **The Consequence:** The combined memory footprint causes severe OOM crashes or massive latency from page faults.
  napkin_math: |
    **Assumptions & Constraints:**
    - iPhone 15 Pro, strictly 1.5GB total memory budget.
    - ASR, Intent, and LLM models.

    **Calculations:**
    - Whisper-small INT4 = 122MB.
    - BERT-mini INT8 = 11MB.
    - Phi-2 INT4 = 1350MB.
    - Weights total = 122MB + 11MB + 1350MB = 1483MB.
    - Remaining headroom in a 1500MB budget: 1500MB - 1483MB = 17MB.
    - Runtime/activation/tokenizer/KV-cache overhead: comfortably more than 17MB for ASR plus LLM decode.
    - The strict budget applies to resident memory, not just stored model weights.

    **Conclusion & Interpretation:**
    - **Result: does not fit strict 1.5GB resident memory**. The weights alone are 1483MB, leaving too little headroom for runtime buffers and KV cache, so the model sizes or residency plan must be reduced.
