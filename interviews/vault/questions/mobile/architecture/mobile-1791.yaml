title: Multi-Task Model Specification for On-Device AI Assistant on A17 Pro
scenario: You need to specify the architecture of an on-device AI assistant for iPhone 15 Pro that must handle speech recognition (streaming, <200ms latency), intent classification (50ms), and response generation (LLM, 10-15 tok/s) with a total memory budget of strictly 1.5GB.
question: Which model sizes, quantization levels, and execution units fit ASR, intent, and LLM generation in 1.5 GB on iPhone 15 Pro?
details:
  realistic_solution: 'Speech recognition: Whisper-small (244M params) → INT4 = 122MB, runs on ANE. Streaming: chunk-based (1s windows), ANE throughput = 35 TOPS, Whisper-small 2.3 GFLOP/s = 0.066ms chunk → well within 200ms real-time. Intent classification: lightweight BERT-mini (11M params) INT8 = 11MB, runs on ANE concurrently. Response LLM: Phi-2 2.7B INT4 = 1.35GB — large but fits budget. Execution: Whisper on ANE (streaming background), intent on ANE (post-ASR, 50ms), LLM on CPU/ANE hybrid (decode). Pipeline: ASR feeds intent feeds LLM. No model is running simultaneously at full capacity.'
  common_mistake: |
    **The Pitfall:** Designing three separate full-size models that compete for memory simultaneously.
    **The Rationale:** Treating each pipeline step in isolation rather than optimizing for the system's shared memory budget.
    **The Consequence:** The combined memory footprint causes severe OOM crashes or massive latency from page faults.
  napkin_math: |
    **Assumptions & Constraints:**
    - iPhone 15 Pro, strictly 1.5GB total memory budget.
    - ASR, Intent, and LLM models.

    **Calculations:**
    - Whisper-small INT4 = 122MB.
    - BERT-mini INT8 = 11MB.
    - Phi-2 INT4 = 1350MB.
    - Total = 122MB + 11MB + 1350MB = 1483MB.
    - Latency: ASR (200ms) + intent (50ms) + first token (300ms) = 550ms response start.

    **Conclusion & Interpretation:**
    - **Result: 1483MB (Memory-Capacity Bound)**. Total fits the budget of 1500MB without simultaneous execution.
