title: Low Compute Utilization During On-Device Decoding
scenario: Your team deployed a 100M parameter encoder-decoder model for on-device translation on the Apple A17 Pro Neural Engine. Profiling shows that during the encoder phase, the Neural Engine achieves high utilization and processes the input prompt almost instantly. However, during the autoregressive decoder phase, text generation is sluggish, the device approaches its power limit quickly, and compute utilization drops below 2%.
question: Given the A17 Pro's 35 TOPS capability and 8 GB of shared unified memory, what architectural characteristic of the encoder-decoder model causes this specific hardware symptom?
details:
  realistic_solution: The root cause is memory bandwidth starvation during sequential autoregressive decoding. The encoder processes the input sequence in parallel, keeping the 16-core Neural Engine fed and efficiently leveraging the 35 TOPS. The decoder generates one token at a time, so it cannot batch across future tokens; each step reuses resident weights but still streams layer inputs, intermediate tensors, and an increasingly large KV cache through shared unified memory. That low arithmetic intensity saturates memory bandwidth and raises power draw while compute units wait for data.
  common_mistake: |
    **The Pitfall:** Confusing the bottlenecks of encoding vs decoding phases.
    **The Rationale:** Candidates often assume the 35 TOPS compute limit is the bottleneck for generation, or that the 8 GB shared memory is insufficient in capacity to hold the 100M parameter model.
    **The Consequence:** They fail to distinguish between the compute-bound nature of parallel encoding and the memory-bandwidth-bound nature of sequential autoregressive decoding, misdiagnosing the core issue.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Peak Compute: 35 TOPS (35,000 GOPS).
       - Mobile memory bandwidth: ~50 GB/s.
       - Model size: 100 MB weights, resident during decoding.
       - Decoder ops: 200M ops per token.
       - Per-token activation/KV/intermediate traffic: ~20 MB.
    2. **Calculations:**
       - Compute time per token: 200M ops / 35,000 GOPS = ~0.0057 ms under an ideal peak-compute bound.
       - Data-movement lower bound: 20 MB / 50 GB/s = ~0.4 ms per token before scheduling gaps and cache misses.
       - Compute-to-Memory ratio: 0.4 ms / 0.0057 ms = ~70x disparity.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound Sequential Decoding.** The bottleneck is not reloading the full model weights per token; it is the one-token-at-a-time decoder loop with growing KV/cache and intermediate traffic, which can leave accelerator compute units underutilized.
