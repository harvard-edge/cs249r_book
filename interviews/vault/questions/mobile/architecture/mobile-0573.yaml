title: The On-Device LLM Feasibility Check
scenario: Your PM saw Apple's on-device LLM demo and wants you to ship a 3B parameter chatbot in your app by next quarter.
question: Walk through the feasibility analysis — memory, compute, latency, and battery — to assess whether a 3B on-device chatbot can meet phone constraints?
details:
  realistic_solution: |
    Walk through each constraint and keep the conclusion conditional. INT4 weights are about 1.5 GB, but runtime memory also includes quantization metadata, KV cache, activations, and framework buffers, so a realistic short-context budget is closer to 2.0-2.4 GB. Decode latency cannot be proven from weight bandwidth alone; use benchmarked tok/s on the target NPU/GPU and account for thermal throttling. A 3B chatbot can be feasible for short contexts if the model is aggressively quantized, downloaded outside the app bundle, uses a bounded context window, and maintains acceptable sustained performance. It is not automatically feasible for long conversations or continuous use.
  common_mistake: |
    **The Pitfall:** Dismissing the request entirely by stating "3B parameters is too big for a phone — it's impossible."
    **The Rationale:** Engineers often anchor on FP16 or FP32 sizes, assuming a 3B model requires 6GB+ of RAM, which exceeds mobile app memory limits.
    **The Consequence:** The PM is given an overly pessimistic assessment, missing the opportunity to leverage INT4 quantization and NPU offloading which makes it feasible, albeit constrained.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: 3B parameters, INT4 quantization (0.5 bytes/param).
    - Runtime budget must include weights, quantization metadata, KV cache, activations, and framework buffers.
    - Short chat context: 1,024 tokens, with KV cache around 0.25-0.5 GB depending on architecture and cache precision.
    - Sustained NPU/GPU power during generation: roughly 1.5-3W, workload-dependent.

    **Calculations:**
    - Weights: 3B * 0.5 bytes = 1.5 GB.
    - Metadata/scales plus allocator overhead: roughly 0.2-0.4 GB.
    - KV cache and activations for a short context: roughly 0.3-0.5 GB.
    - Working memory estimate: 1.5 GB + 0.2-0.4 GB + 0.3-0.5 GB = about 2.0-2.4 GB.
    - Weight-streaming lower bound: 1.5 GB / 51.2 GB/s = 29 ms/token, but real decode latency may be higher or lower depending on cache reuse, NPU kernels, memory stalls, and thermal limits.
    - Energy example: 2W sustained for a 10s answer = 20J. A 40,000J battery has about 400J per 1%, so this is about 0.05% battery per short answer before display, radio, and thermal overhead.

    **Conclusion & Interpretation:**
    - **Result: Conditionally feasible.** A 3B INT4 chatbot can fit and feel responsive for short contexts on a high-end phone, but the release decision depends on measured sustained tok/s, bounded context length, memory headroom, and thermal behavior rather than weights-only math.
