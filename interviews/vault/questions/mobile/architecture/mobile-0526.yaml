title: The Keyboard Jank Crisis
scenario: You are a Mobile ML Engineer building a real-time 'smart reply' feature for a keyboard app. Your prototype, a 50M parameter Transformer model, is accurate but misses performance targets on a flagship phone (Snapdragon 8 Gen 3). It takes 45ms per inference and uses 150MB of memory (100MB for FP16 weights, 50MB for activations/KV cache), causing noticeable UI jank and violating the strict 100MB feature memory budget.
question: What architectural path best fixes a 50M Transformer keyboard model that misses latency and memory budgets?
details:
  realistic_solution: The core problem is the Transformer's architectural unfriendliness to mobile NPUs at a batch size of 1. It is memory-bandwidth bound and also exceeds the feature memory budget. Applying 4-bit quantization reduces the weight footprint from 100MB to 25MB, bringing total memory to 75MB and reducing the DRAM traffic per inference. That directly targets both the 100MB memory cap and the bandwidth pressure behind the 45ms latency.
  common_mistake: |
    **The Pitfall:** Fixating on a single metric like parameter count or total FLOPs to predict latency scaling.
    **The Rationale:** Engineers assume that halving the parameters will proportionally reduce latency. On mobile hardware, real-world latency is often dominated by memory bandwidth bottlenecks and fixed dispatch overheads.
    **The Consequence:** A 50% smaller Transformer might still be 80% as slow, leaving the model over budget and the application janky.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: 50M parameters.
    - Memory budget: 100MB max.
    - Snapdragon 8 Gen 3: ~77 GB/s bandwidth, ~45 TOPS (INT8).

    **Calculations:**
    - Current FP16 weight footprint: 50M * 2 bytes = 100MB.
    - Current ideal weight-read time: 100MB / 77 GB/s = ~1.3ms per inference before overhead and non-weight traffic.
    - Total FP16 memory: 100MB + 50MB (activations/KV) = 150MB (exceeds budget).
    - INT4 weight footprint: 50M * 0.5 bytes = 25MB.
    - INT4 ideal weight-read time: 25MB / 77 GB/s = ~0.33ms per inference before overhead and non-weight traffic.
    - Total INT4 memory: 25MB + 50MB = 75MB, which is 25MB under budget.

    **Conclusion & Interpretation:**
    - **Result: 75MB (Memory-Bandwidth Bound).** 4-bit INT4 quantization brings the footprint safely within the 100MB budget and cuts weight bandwidth demand by 4x, directly reducing the memory pressure causing jank.
  options:
    - The model is memory-bandwidth bound. Switch to a MobileNet-style CNN using depthwise separable convolutions to create larger, more parallelizable operations.
    - The model is too large. Shrink the Transformer to 25M parameters to cut the memory and compute costs by 50%, which will meet the latency target.
    - The NPU is being starved. Use a Neural Architecture Search (NAS) to automatically find a more efficient Transformer block.
    - The model is memory-bandwidth bound. Apply 4-bit quantization to the existing model to reduce weight traffic and meet the latency and memory targets.
  correct_index: 3
