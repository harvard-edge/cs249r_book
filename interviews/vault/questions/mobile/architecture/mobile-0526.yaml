title: 'The Keyboard Jank Crisis'
scenario: 'You are a Mobile ML Engineer building a real-time ''smart reply'' feature for a keyboard app. Your prototype, a 50M parameter Transformer model, is accurate but misses performance targets on a flagship phone (Snapdragon 8 Gen 3). It takes 45ms per inference and uses 150MB of memory (100MB for FP16 weights, 50MB for activations/KV cache), causing noticeable UI jank and violating the strict 100MB feature memory budget.'
question: 'What architectural path best fixes a 50M Transformer keyboard model that misses latency and memory budgets?'
details:
  realistic_solution: 'The core problem is the Transformer''s architectural unfriendliness to mobile NPUs at a batch size of 1. It is severely memory-bandwidth bound. To solve this, applying 4-bit quantization reduces the weight footprint from 100MB to 25MB, bringing the total memory to 75MB (within budget) and massively reducing the DRAM traffic per token, which drastically reduces latency.'
  common_mistake: 'Engineers often fixate on a single metric like parameter count or total FLOPs, assuming that scaling a model down (e.g., halving the parameters) will proportionally reduce latency. On mobile hardware, real-world latency is often dominated by memory bandwidth bottlenecks and the fixed overhead of dispatching many small, sequential operations. A 50% smaller Transformer might still be 80% as slow because it has the same number of layers and activation functions, which are costly from a memory access and dispatch perspective.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: 50M parameters.
    - Memory budget: 100MB max.
    - Snapdragon 8 Gen 3: ~77 GB/s bandwidth, ~45 TOPS (INT8).

    **Calculations:**
    - Current FP16 weight footprint: 50M * 2 bytes = 100MB.
    - Current memory reading time: 100MB / 77 GB/s = ~1.3ms per token.
    - Total FP16 memory: 100MB + 50MB (activations/KV) = 150MB (exceeds budget).
    - INT4 weight footprint: 50M * 0.5 bytes = 25MB.
    - Total INT4 memory: 25MB + 50MB = 75MB.

    **Conclusion & Interpretation:**
    - **Result: 75MB (Memory-Bound).** 4-bit INT4 quantization brings the footprint safely within the 100MB budget while quadrupling weight read speeds and eliminating the DRAM bandwidth bottleneck.
  options:
  - 'The model is memory-bandwidth bound. Switch to a MobileNet-style CNN using depthwise separable convolutions to create larger, more parallelizable operations.'
  - 'The model is too large. Shrink the Transformer to 25M parameters to cut the memory and compute costs by 50%, which will meet the latency target.'
  - 'The NPU is being starved. Use a Neural Architecture Search (NAS) to automatically find a more efficient Transformer block.'
  - 'The model is compute-bound. Apply 4-bit quantization to the existing model to increase throughput and meet the latency target.'
