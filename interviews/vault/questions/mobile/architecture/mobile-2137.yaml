title: Mobile KV Cache Capacity Before Spill
scenario: A local Llama-3-8B style model on an 8GB mobile SoC has a 4GB RAM budget reserved specifically for paged KV cache. Each cache page is 16MB, but the question is about capacity before flash spill.
question: What sequence length fits in the 4GB KV-cache budget before any flash spill, given 128KB KV per token?
details:
  realistic_solution: |
    With a clearly defined 4GB KV-cache budget and 128KB per token, the capacity limit is 32,768 tokens. The 16MB page size means each page holds 128 tokens, so filling the budget uses 256 pages. Page size affects allocation granularity and potential internal fragmentation for partially filled pages, but it does not change the maximum whole-token capacity when the 4GB budget is fully usable.
  common_mistake: |
    **The Pitfall:** Treating page allocation details as if they change the capacity answer.
    **The Rationale:** Candidates mix latency or allocator behavior into a question that only asks how many token KV entries fit in the reserved memory budget.
    **The Consequence:** They report a smaller or latency-weighted context length even though the spill threshold is set by bytes available divided by bytes per token.
  napkin_math: |
    **Assumptions & Constraints:**
    - Available Memory: 4GB = 4096MB.
    - Page size: 16MB.
    - Token KV size: 128KB.

    **Calculations:**
    - Pages: 4096MB / 16MB per page = 256 pages.
    - Tokens per page: 16MB / 128KB = 128 tokens per page.
    - Max Tokens: 4096MB / 128KB per token = 32,768 tokens.

    **Conclusion & Interpretation:**
    - **Result: 32,768 tokens (Memory-Capacity-Bound)**. The 16MB page size determines allocation granularity, not the capacity limit for a fully usable 4GB KV-cache budget, so the maximum sequence length before spill is 32,768 tokens.
