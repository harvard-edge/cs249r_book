title: Mobile KV Cache Capacity Before Spill
scenario: A local Llama-3-8B style model on an 8GB mobile SoC has a 4GB RAM budget reserved specifically for paged KV cache. Each page is 16MB, and page allocation adds 1ms of latency.
question: What sequence length fits in the 4GB KV-cache budget before any flash spill, given 128KB KV per token?
details:
  realistic_solution: |
    With a clearly defined 4GB KV-cache budget and 128KB per token, the capacity limit is 32,768 tokens. The 16MB page size means each page holds 128 tokens, so filling the budget uses 256 pages. The 1ms page-allocation penalty affects latency when pages are allocated, but it does not reduce the memory-capacity answer unless the prompt also sets a latency budget.
  common_mistake: |
    **The Pitfall:** Dividing remaining memory directly by token size.
    **The Rationale:** Candidates calculate theoretical bounds without accounting for the internal fragmentation and allocation barriers of large page boundaries.
    **The Consequence:** Failing to account for the cumulative memory controller sync penalties that impact real-time generation latency.
  napkin_math: |
    **Assumptions & Constraints:**
    - Available Memory: 4GB = 4096MB.
    - Page size: 16MB.
    - Sync penalty: 1ms per page.
    - Token KV size: 128KB.

    **Calculations:**
    - Pages: 4096MB / 16MB per page = 256 pages.
    - Sync Penalty: 256 pages * 1ms = 256ms total pause.
    - Max Tokens: 4096MB / 128KB per token = 32,768 tokens.

    **Conclusion & Interpretation:**
    - **Result: 32,768 tokens (Memory-Capacity-Bound)**. The 256ms cumulative allocation latency is a performance cost, not a capacity reduction, so the maximum sequence length before spill is 32,768 tokens under the stated 4GB KV-cache budget.
