title: 'Edge Vision Model: CNN vs ViT Deployment'
scenario: You are deploying a real-time object detection model on a mobile phone-class NPU with about 8 TOPS INT8 peak throughput and a small on-chip SRAM budget of about 2 MB.
question: 'Which architecture is better suited for this mobile INT8 NPU and small SRAM budget: MobileNetV2 or a Mobile ViT of equivalent accuracy, and why?'
details:
  realistic_solution: 'MobileNetV2 wins on this hardware for several reasons: (1) Depthwise separable convolutions map perfectly to NPU hardware (fixed 3×3 or 5×5 kernels, regular memory access). (2) The activation tensors are small at each layer (pooling reduces spatial dimensions progressively), fitting in the 2 MB SRAM. (3) INT8 quantization is straightforward for conv layers (well-studied, minimal accuracy loss). Mobile ViT challenges: (1) Self-attention requires dynamic memory allocation for the $S \times S$ score matrix, which NPU compilers handle poorly. (2) Softmax and LayerNorm require FP16/FP32, forcing mixed-precision execution and NPU-to-CPU fallback. (3) Attention is memory-bandwidth-bound — wasteful on an NPU designed for high-compute-intensity convolutions. (4) Quantizing attention to INT8 often degrades quality more than quantizing convolutions.'
  common_mistake: |
    **The Pitfall:** Choosing Vision Transformers (ViT) simply because they are the newer state-of-the-art architecture.
    **The Rationale:** Engineers assume ViT's parameter efficiency translates directly to mobile latency.
    **The Consequence:** They hit massive latency bottlenecks because NPUs are designed for static, channel-wise convolutions, not dynamic self-attention patterns.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hardware: 8 TOPS INT8 NPU, 2 MB SRAM.
    - MobileNetV2: 600M FLOPs, static channels.
    - Mobile ViT: 1 GFLOP, dynamic attention scores.

    **Calculations:**
    - MobileNetV2 ideal compute time: 600×10^6 ops / 8×10^12 ops/s = 7.5×10^-5 s = 0.075 ms.
    - Mobile ViT ideal compute time: 1×10^9 ops / 8×10^12 ops/s = 1.25×10^-4 s = 0.125 ms.
    - These ideal numbers are lower bounds; real latency is dominated by utilization, memory traffic, compiler support, and fallback behavior.

    **Conclusion & Interpretation:**
    - **Result: MobileNetV2 is the safer architecture for this NPU/SRAM target.** The FLOP lower bounds are both tiny, so the deciding factor is hardware fit: static convolutional layers map cleanly to INT8 NPU kernels and small SRAM tiles, while Mobile ViT attention and normalization are more likely to become memory- or compiler-bound.
