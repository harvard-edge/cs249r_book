title: Mobile LLM Architecture Tradeoffs
scenario: Your team is developing a new AI assistant feature for a high-end smartphone. The feature requires understanding complex user queries and generating concise responses within strict mobile constraints like low latency and minimal power consumption.
question: How would you justify your architectural choice, and what back-of-the-envelope calculations would you perform to validate its feasibility?
details:
  realistic_solution: 'Choose a task-specific hybrid rather than a 7B general decoder: a small encoder for intent, retrieval, and safety classification, plus a compact distilled decoder or encoder-decoder for short responses. Validate feasibility with memory, KV cache, and token-latency estimates. A 7B INT8 model uses about 7 GB for weights alone and leaves little room for app memory, activations, and KV cache on a 12 GB phone. A 500M-1B INT4/INT8 generator with GQA/MQA, response length caps, and quantized KV cache is a more credible mobile assistant target. Benchmark actual prefill, decode, tokenizer, and sampling latency with the vendor mobile SDK because sequential generation, not only parameter count, drives responsiveness.'
  common_mistake: |
    **The Pitfall:** Deploying a large, general-purpose decoder-only model without considering sequential generation costs.
    **The Rationale:** Developers overlook the fundamental differences in resource utilization between encoder-only, decoder-only, and full encoder-decoder architectures, particularly regarding KV cache memory.
    **The Consequence:** This leads to unacceptable latency, out-of-memory errors, or excessive battery drain due to memory bandwidth bottlenecks.
  napkin_math: |
    **Assumptions & Constraints:**
    - Phone RAM: 12 GB; assume 7-8 GB available to the app after OS and other services.
    - Candidate A: 7B INT8 decoder-only assistant.
    - Candidate B: 200M INT8 encoder plus 1B INT4/INT8 compact generator.
    - Short response target: 32 generated tokens; context target: 1024 cached tokens.

    **Calculations:**
    - Candidate A weights = 7B * 1 byte = 7 GB, leaving little memory for KV cache, activations, tokenizer buffers, and app state.
    - Candidate B weights ≈ 0.2 GB + 0.5-1.0 GB = 0.7-1.2 GB.
    - Example 7B KV cache with 32 layers and hidden size 4096 at FP16 = 32 * 2 * 4096 * 2 = 524,288 bytes/token.
    - At 1024 tokens, 7B KV cache ≈ 512 MB; at 4096 tokens, ≈ 2 GB.
    - Decode compute for 32 tokens is roughly 7B * 32 = 224B MACs for Candidate A versus about 1B * 32 = 32B MACs for Candidate B, before attention and runtime overhead.

    **Conclusion & Interpretation:**
    - **Result: Latency and Memory-Margin Bound.** The compact hybrid is the defensible mobile choice because it preserves several GB of memory headroom and cuts sequential decode work by roughly 7x versus a 7B INT8 decoder.
