title: The AR Jank Diagnosis
scenario: You are the lead ML engineer for an AR social media app. Users complain of 'jank' and high battery drain when using a 5M parameter Vision Transformer (ViT) filter. The ViT model takes 25ms per frame.
question: "Which model change gets a 5M-parameter ViT AR filter under a 16 ms A17 Pro frame budget?"
details:
  realistic_solution: Replace the architecturally-inefficient ViT with a mobile-optimized CNN (e.g., MobileNetV3 or EfficientNet). The N^2 complexity of self-attention heavily penalizes mobile DRAM. Utilize depthwise separable convolutions to maximize spatial locality and SRAM caching.
  common_mistake: |
    **The Pitfall:** Applying complex server-side optimizations (like MoE) or blindly trusting scaling laws.
    **The Rationale:** Engineers often assume that because ViTs work well in the cloud, they just need slightly fewer parameters to work on mobile, ignoring the high memory access costs of self-attention.
    **The Consequence:** They fail to solve the bottleneck because the fundamental memory access pattern of the architecture is still incompatible with mobile DRAM.
  napkin_math: |
    **Assumptions & Constraints:**
    - 5M param ViT, 256 tokens/frame, 30 FPS.
    - Budget: 16ms render budget.
    
    **Calculations:**
    - Bandwidth Cost = 30 * 5M * 2 bytes = 300 MB/s of raw weight streaming plus N^2 activation spills.
    
    **Conclusion & Interpretation:**
    - **Result: Bandwidth-Bound**. ViT is fundamentally bound by mobile DRAM power costs; an architectural swap to a CNN is mandatory.
