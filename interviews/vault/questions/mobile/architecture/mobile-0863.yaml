title: 'Realization: ship MobileNetV3 model update OTA with Core ML compilation on device'
scenario: You need to ship a MobileNetV3-Large model update to iPhone 15 Pro users (A17 Pro) via OTA, with the model compiled for ANE execution. The update is 5.4MB (INT8 weights).
question: How should a MobileNetV3 Core ML OTA update be delivered, compiled, validated, and rolled back within the setup target?
details:
  realistic_solution: |
    Pipeline: (1) publish a signed versioned manifest that names the current model, previous model, hash, minimum OS, and rollout percentage; (2) ship the .mlpackage, not a device-specific .mlmodelc, through the CDN; (3) download in the background, verify hash/signature, compile with MLModel.compileModel(at:), and store the compiled .mlmodelc in Application Support under its version; (4) validate the candidate with a small deterministic input set and inspect the compute plan/profiling signals available on the OS, recognizing that on-device compilation does not by itself guarantee ANE placement; (5) atomically promote the active-model pointer only after validation passes.

    Rollback should be operational, not just conceptual: keep the last known-good compiled model and manifest entry, record health metrics after promotion, and revert the active pointer to the previous version if compile, validation, startup load, crash rate, latency, or output sanity checks fail. Server-side rollback should set the manifest back to the previous version or reduce rollout to 0%, while clients that already downloaded the bad candidate should stop promoting it. The full 4MB compressed package plus compile is slightly over a 2-second first-use budget on 20 Mbps LTE, so the release needs prefetching or a verified delta package small enough to fit the target. User-visible impact is minimized, but not literally zero if download, compile, and validation sit on the first-use path.
  common_mistake: |
    **The Pitfall:** Shipping a pre-compiled MLModelc package for a specific device.
    **The Rationale:** Developers may not realize that iOS can compile on-device at first use, which takes <1 second on A17 Pro.
    **The Consequence:** The downloaded package is unnecessarily large (>50MB compiled) and locks to a specific iOS version.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model size: 5.4MB INT8 (gzipped to ~4MB).
    - Network: 20 Mbps LTE.
    - A17 Pro compilation: ~500ms.
    - Target setup time: < 2 seconds.
    - A delta path only satisfies the target if the manifest verifies that the compressed delta is about 2MB or smaller.

    **Calculations:**
    - Gzipped download: 4MB * 8 bits / 20 Mbps = 1.6s.
    - Compile: ~0.5s. Total: 1.6s + 0.5s = 2.1s (exceeds target).
    - Required delta for margin: 2MB * 8 bits / 20 Mbps = 0.8s.
    - Delta total if the signed delta is 2MB: 0.8s + 0.5s = 1.3s.

    **Conclusion & Interpretation:**
    - **Result: the full package misses the 2-second target, while a verified <=2MB delta or background prefetch can fit.** Use atomic promotion and manifest-driven rollback rather than promising zero-latency first install.
