title: The Mobile UI Jank Diagnosis
scenario: You are the lead ML engineer for a new flagship smartphone's driver safety feature. A neural architecture search (NAS) has produced a 20M parameter Vision Transformer (ViT) model for driver drowsiness detection. However, QA reports UI stuttering. The SoC requires a strict 16ms frame budget, but the model inference takes 25ms.
question: Why does a 20M-parameter ViT cause 25ms mobile UI jank, and what architecture class should replace it?
details:
  realistic_solution: 'The root cause is the immense memory traffic generated by the Vision Transformer architecture, making it ill-suited for a tight latency budget on mobile. The self-attention mechanism requires moving quadratically large activation tensors. Perform another NAS run, constraining the search space to mobile-first architectures like depthwise separable CNNs (e.g., MobileNet, EfficientNet-Lite) with higher arithmetic intensity.'
  common_mistake: |
    **The Pitfall:** Fixating on parameter count as the sole proxy for model cost.
    **The Rationale:** Engineers see ''20M parameters'' and assume the model is small, misdiagnosing the issue as operator incompatibility.
    **The Consequence:** Wasting time trying to optimize a fundamentally memory-bound architecture (ViT) instead of switching to a computationally dense CNN.
  napkin_math: |
    **Assumptions & Constraints:**
    - ViT Compute Cost: 4.6 GFLOPs.
    - NPU Compute Capacity: 35 TOPS.
    - Target Frame Budget: 16 ms.
    - Observed Latency: 25 ms.

    **Calculations:**
    - Theoretical Compute Time: 4.6 GFLOPs / 35 TOPS = ~0.13 ms.
    - Compute vs Memory Ratio: 25 ms total - 0.13 ms compute = 24.87 ms waiting for memory.

    **Conclusion & Interpretation:**
    - **Result: 99.4% of time spent on memory I/O (Memory-Bandwidth Bound)**. The quadratic memory scaling of ViT self-attention activations saturates the LPDDR bus, starving the NPU of data.
  options:
  - 'The model''s 20M parameters (40MB in FP16) are saturating the A17''s 51.2 GB/s memory bandwidth. Quantizing weights to INT8 would halve the memory pressure and fix the jank.'
  - 'The A17''s Neural Engine likely has poor support for the specific self-attention operations, causing the model to fall back to the much slower CPU.'
  - 'The Vision Transformer''s self-attention produces large activation tensors that saturate memory bandwidth. The model is memory-bound (~4.6 GFLOPs but 25ms latency), and should be replaced with a CNN architecture that has better data locality.'
  - 'The model is too dense. Applying Mixture-of-Experts (MoE) routing would reduce the active parameter count per frame and thus the latency.'
  correct_index: 2
