title: Hardware-aware NAS for Mobile LLM Deployment on Google Tensor G3
scenario: "Your team is deploying a lightweight Large Language Model (LLM) for on-device inference using hardware-aware Neural Architecture Search (NAS). The critical constraints are a 50ms per token latency limit and an 8 GB peak memory limit. Model weights are quantized to 4-bit."
question: "What memory penalty term would you add to an LLM NAS fitness function for 4-bit weights and an 8 GB peak memory limit?"
details:
  realistic_solution: "Create a multi-objective fitness function utilizing a hard constraint penalty. Construct the evaluation to explicitly model 4-bit quantization size mapping (`P_bytes = P_params / 2`). The penalty should trigger sharply once the combined parameter and activation footprint eclipses the strict 8GB threshold (e.g., `Penalty = max(0, footprint - 8GB) * massive_scalar`)."
  common_mistake: |
    **The Pitfall:** Ignoring the specific 4-bit quantization when calculating parameter memory.
    **The Rationale:** Candidates default to standard FP16 or FP32 sizes or use a linear penalty that is not steep enough.
    **The Consequence:** The NAS algorithm incorrectly calculates total footprint, failing to eliminate memory-violating architectures early and wasting massive computational search resources.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Parameter count (P), Activation peak (A).
       - Weights are 4-bit. Memory limit: 8 GB.
    2. **Calculations:**
       - Weight Memory = P parameters * 4 bits / 8 bits/byte = P / 2 bytes.
       - Total Memory = (P / 2) + A bytes.
       - Memory Constraint = (P / 2) + A <= 8 * 1024^3 bytes.
       - Excess Memory = max(0, ((P / 2) + A) - (8 * 1024^3)) bytes.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound.** The fitness function must enforce a steep penalty exactly when the total memory footprint exceeds **8 GB**, explicitly accounting for the halved weight footprint of the 4-bit representation.
