title: 'The Transformer vs CNN on Mobile'
scenario: 'ViT-Small (22M params, 4.6 GFLOPs) and MobileNetV3-Large (5.4M params, 0.22 GFLOPs) both achieve ~75% top-1 on ImageNet. On a Snapdragon 8 Gen 3, MobileNetV3 runs in 3ms while ViT-Small takes 35ms. Despite ViT having only 21x more FLOPs, it''s 12x slower.'
question: 'Why is ViT-Small disproportionately slower than MobileNetV3 on Snapdragon 8 Gen 3 despite having only 21x more FLOPs?'
details:
  realistic_solution: 'Memory access patterns, not arithmetic. MobileNetV3''s depthwise convolutions have ~50 FLOPs/byte arithmetic intensity — data stays in NPU SRAM. ViT''s attention operators have extremely low arithmetic intensity and often require reshaping and transposes that map poorly to the NPU''s fixed-function matrix units. While a single layer''s attention matrix (~461 KB) fits in SRAM, the complete forward pass forces excessive DRAM traffic. Furthermore, unsupported ops force costly delegation to the GPU. MobileNetV3 is compute-bound (good for NPU); ViT is memory-bound (bad for mobile).'
  common_mistake: |
    **The Pitfall:** Assuming latency scales linearly with FLOPs or parameter count.
    **The Rationale:** Candidates see a 21x FLOP difference and assume ViT's slowdown is purely computational, missing the memory-bound nature of attention mechanisms.
    **The Consequence:** Trying to optimize ViT by pruning FLOPs instead of addressing memory access patterns or switching to a CNN.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hardware: Snapdragon 8 Gen 3 (45 TOPS NPU, 51.2 GB/s Bandwidth).
    - MobileNetV3-Large: 0.22 GFLOPs.
    - ViT-Small: 4.6 GFLOPs. Attention matrices: 196x196.

    **Calculations:**
    - ViT Attention Memory: 196 × 196 × 6 heads × 2 bytes = ~461 KB per layer.
    - ViT DRAM Traffic: ~50 MB per forward pass.
    - ViT Memory Latency: 50 MB / 51.2 GB/s = ~1ms (ideal), but irregular access adds ~10x stall penalty (~10ms). GPU fallback adds ~20ms.

    **Conclusion & Interpretation:**
    - **Result: ~35 ms (Memory-Bandwidth-Bound)**. MobileNetV3 is compute-bound (~3ms), while ViT is severely memory-bound, taking ~35ms due to memory stalls and GPU fallback.
