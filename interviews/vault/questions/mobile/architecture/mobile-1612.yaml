title: LLM Deployment Feasibility on Mobile NPU
scenario: As a senior ML engineer at a mobile AI startup, you are tasked with deploying a new Large Language Model (LLM) onto a flagship smartphone. Your initial rough estimate suggests the LLM has approximately 7 billion parameters.
question: "What are your immediate concerns, and how would you perform a quick estimate to determine if deploying a 7B parameter LLM on a 12 GB device is achievable?"
details:
  realistic_solution: "A realistic approach involves: \n1. **Aggressive Quantization**: Assume INT4 quantization for weights. \n2. **Comprehensive Memory Estimation**: Calculate parameter memory, KV cache memory, and system overhead to compare against the 12 GB LPDDR5X. \n3. **TOPS-to-Latency Mapping**: Estimate the multiply-accumulates per inference forward pass."
  common_mistake: |
    **The Pitfall:** Only considering parameter count in FP32 or ignoring the KV cache memory footprint.
    **The Rationale:** Candidates fail to account for mandatory INT8/INT4 quantization for edge, and forget that generating tokens autoregressively requires substantial memory for the KV cache and OS.
    **The Consequence:** Recommending a deployment that immediately OOMs the device because the OS and context window devour the remaining memory.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: 7 billion parameters.
    - Hardware: 12 GB RAM, 34.7 TOPS NPU.

    **Calculations:**
    - Parameters (INT8): 7 billion * 1 byte = 7 GB.
    - KV Cache & OS Overhead: ~1.5 GB (KV) + ~3.5 GB (OS) = 5 GB.
    - Total Estimated Memory (INT8): 7 + 5 = 12 GB (Too close to limit).
    - OPs per token: 7 billion params * 2 = 14 GOPS.
    - Theoretical compute limit: 34,700 / 14 = ~2,400 tokens/sec.

    **Conclusion & Interpretation:**
    - **Result: 12 GB Total Memory (Memory-Bound)**. Compute is vast, but INT4 quantization (3.5 GB weights) is mandatory to fit safely within the 12 GB limit.
