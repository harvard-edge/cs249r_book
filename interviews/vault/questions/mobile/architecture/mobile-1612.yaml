title: LLM Deployment Feasibility on Mobile NPU
scenario: As a senior ML engineer at a mobile AI startup, you are tasked with deploying a new Large Language Model (LLM) onto a flagship smartphone. Your initial rough estimate suggests the LLM has approximately 7 billion parameters.
question: What are your immediate concerns, and how would you perform a quick estimate to determine if deploying a 7B parameter LLM on a 12 GB device is achievable?
details:
  realistic_solution: A realistic approach is to estimate memory first, then decode latency. FP16 weights are about 14 GB and cannot fit on a 12 GB phone. INT8 weights are about 7 GB, which may fit only with a short context and tight OS/runtime reserves; INT4 weights around 3.5 GB leave much healthier room for KV cache and activations. For compute, use roughly one MAC per parameter per generated token for the decoder block pass, then apply a sustained-utilization discount rather than assuming peak TOPS. The decision depends on target context length, token latency, KV precision, and thermal limits.
  common_mistake: |
    **The Pitfall:** Only considering parameter count in FP32 or ignoring the KV cache memory footprint.
    **The Rationale:** Candidates fail to account for mandatory INT8/INT4 quantization for edge, and forget that generating tokens autoregressively requires substantial memory for the KV cache and OS.
    **The Consequence:** Recommending a deployment that immediately OOMs the device because the OS and context window devour the remaining memory.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: 7 billion parameters.
    - Hardware: 12 GB RAM, 34.7 TOPS NPU.

    **Calculations:**
    - FP16 weights = 7B * 2 bytes = 14 GB, before KV cache or runtime buffers.
    - INT8 weights = 7B * 1 byte = 7 GB.
    - Example overhead = 3 GB OS/runtime + 1-2 GB KV/activations, so INT8 total ≈ 11-12 GB.
    - INT4 weights = 7B * 0.5 byte = 3.5 GB, leaving several GB for KV cache and buffers.
    - Decode compute ≈ 7B MACs/token. At 20% sustained use of 34.7 TOPS, usable throughput ≈ 6.94e12 ops/s, or about 6.94e12 / 7e9 ≈ 991 tokens/s before memory, sampling, and attention overhead.

    **Conclusion & Interpretation:**
    - **Result: Memory-Margin Bound.** INT8 may barely fit for short contexts, but INT4 or mixed precision is usually the safer deployment target because KV cache, allocator overhead, and thermals erode the nominal 12 GB budget.
