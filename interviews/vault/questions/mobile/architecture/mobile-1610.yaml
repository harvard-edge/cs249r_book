title: A17 Pro Mobile Model Memory Footprint
scenario: You are designing an on-device machine learning model for a new feature. The model needs to perform real-time semantic segmentation on 720p (1280x720) video streams at 30 FPS. The model's active parameters and intermediate activations must fit within a dedicated 500 MB memory budget to leave room for the OS.
question: Propose a simplified convolutional neural network architecture and estimate its peak memory footprint to determine if it is feasible given the 500 MB constraint.
details:
  realistic_solution: Propose a lightweight architecture like MobileNet or one using depthwise separable convolutions. Systematically calculate parameters per layer, sum them, and estimate the peak memory usage by identifying the largest activation tensor (e.g., in FP16).
  common_mistake: |
    **The Pitfall:** Neglecting the memory footprint of intermediate activations and input/output tensors.
    **The Rationale:** Candidates often only count trainable parameters, assuming the weights dominate the memory budget.
    **The Consequence:** Proposing architectures that seem small but crash during real-time streaming because activation maps exceed the 500 MB limit.
  napkin_math: |
    **Assumptions & Constraints:**
    - Input resolution: 1280 x 720.
    - Memory budget: 500 MB.
    - Data type: FP16 (2 bytes).

    **Calculations:**
    - Parameter Count (Conv Layer): `(Kernel_H x Kernel_W x In_Channels + 1) x Out_Channels`.
    - Weights Memory: `Total_Parameters x 2 bytes`.
    - Single Activation Map Memory: `1280 x 720 x Channels x 2 bytes`. Example with 32 channels: 1280 x 720 x 32 x 2 = ~59 MB.
    - Peak Memory Footprint = Weights Memory + Largest Activation Memory + I/O buffer Memory.

    **Conclusion & Interpretation:**
    - **Result: ~59 MB per map (Activation-Bound)**. High-resolution inputs make activation tensors the dominant factor in peak memory consumption, easily breaching the 500 MB budget.
