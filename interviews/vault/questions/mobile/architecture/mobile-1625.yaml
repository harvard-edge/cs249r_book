title: Optimizing Encoder-Decoder Architectures for Google Tensor G3 On-Device NLU
scenario: Your team is developing an on-device NLU feature targeting Google Tensor G3. You must choose between encoder-only, decoder-only, or encoder-decoder architectures to meet a strict <150ms latency budget.
question: How would you diagnose performance bottlenecks for each architecture on the Tensor G3 and quantify costs to make your recommendation?
details:
  realistic_solution: 'Rigorously profile memory bandwidth limitations using `nsys`. A decoder-only architecture generates tokens sequentially, slamming the memory bus (memory-bound). An encoder-only architecture processes tokens in parallel, fully saturating the TPU MAC arrays (compute-bound). For pure NLU classification, an INT8 quantized encoder-only model maximizes hardware throughput.'
  common_mistake: |
    **The Pitfall:** Choosing a decoder-only architecture based purely on cloud-based LLM trends or theoretical FLOPs.
    **The Rationale:** Ignoring the catastrophic impact of sequential autoregressive memory loads on mobile LPDDR5X bandwidth.
    **The Consequence:** Deploying a model that constantly stalls on the memory bus, missing the 150ms SLA entirely due to hardware starvation.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target SLA: 150 ms.
    - Tensor G3 TPU: 7.5 TOPS peak, ~50% practical utilization = ~3.75 effective TOPS.
    - Memory Bandwidth: ~50 GB/s.

    **Calculations:**
    - Available computation in 150ms: 3.75 TOPS * 0.15s = 562.5 Giga-Ops.
    - Encoder processing cost (0.5B param, INT8): 0.5B * 2 Ops * 500 tokens = 500 Giga-Ops.
    - Weight load latency (1 GB): 1 GB / 50 GB/s = 20 ms.

    **Conclusion & Interpretation:**
    - **Result: 500 GOPs (Compute-Bound)**. An encoder-only 0.5B INT8 model requires 500 GOPs and 20ms of loading time, successfully fitting inside the 562.5 GOP limit to satisfy the 150ms SLA.
