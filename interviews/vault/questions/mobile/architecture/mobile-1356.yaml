title: Tensor G3 LLM Memory Budgeting
scenario: We are deploying a 4 billion parameter LLM to a device with 12 GB of LPDDR5X memory. The Android system consumes 6 GB of RAM, and we require exactly 2 GB of memory for the KV cache and activation buffers.
question: How would you calculate the maximum standard quantization precision (in bits) we can use for the model weights to guarantee the model fits entirely within the remaining available RAM?
details:
  realistic_solution: Calculate available memory for weights by subtracting system overhead and runtime memory from total memory. Divide available memory by parameter count to find max bytes per parameter.
  common_mistake: |
    **The Pitfall:** Forgetting to reserve memory for the KV cache and system overhead.
    **The Rationale:** Candidates see 12GB total memory and assume they can dedicate a much larger portion to the model weights, ignoring the massive runtime footprint of the KV cache.
    **The Consequence:** The model OOMs immediately upon attempting to generate the first token, crashing the app.
  napkin_math: |
    **Assumptions & Constraints:**
    - Total Memory: 12 GB.
    - OS Overhead: 6 GB.
    - KV Cache/Activations: 2 GB.
    - Parameter count: 4 billion.

    **Calculations:**
    - Available memory for weights = 12 GB - 6 GB - 2 GB = 4 GB.
    - Max bytes per parameter = 4 GB / 4,000,000,000 parameters = 1 byte/parameter.
    - Bits conversion: 1 byte = 8 bits.

    **Conclusion & Interpretation:**
    - **Result: INT8 Precision Limit**. The strict memory budget enforces a maximum standard quantization of 8-bit (INT8) to prevent an OS out-of-memory crash.
