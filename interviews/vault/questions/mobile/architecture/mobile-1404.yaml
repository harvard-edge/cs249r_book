title: 'Optimizing Inverted Residuals on Google Tensor G3'
scenario: 'You are deploying a custom CNN based on the MobileNetV2 architecture for real-time video segmentation on the Google Tensor G3. During profiling, you notice that despite the 7.5 TOPS on-device TPU and ample 12 GB LPDDR5X RAM, your model is underutilizing the compute units and suffering from high memory bandwidth constraints. The bottleneck traces back to the inverted residual blocks with large expansion factors paired with depthwise convolutions.'
question: 'Why is this block design inefficient on the Tensor G3, and what structural change improves utilization?'
details:
  realistic_solution: 'The optimal approach is to replace standard inverted residual blocks with fused inverted residual blocks, similar to EfficientNet-EdgeTPU. By fusing the initial 1x1 expansion convolution and the 3x3 depthwise convolution into a single regular 3x3 convolution, you significantly increase the arithmetic intensity. This perfectly aligns with the Tensor G3 TPU''s strengths, trading a theoretical increase in total FLOPs for a massive reduction in intermediate memory accesses.'
  common_mistake: |
    **The Pitfall:** Suggesting aggressive quantization or pruning.
    **The Rationale:** Candidates misdiagnose the issue as a generic performance problem rather than an architectural mismatch with the TPU.
    **The Consequence:** Failing to fix the low arithmetic intensity of depthwise convolutions, leaving the model memory-bound.
  napkin_math: |
    **Assumptions & Constraints:**
    - Intermediate Tensor (Standard Block): 56x56 spatial, 1536 channels = 4.8M elements (~9.6 MB in FP16).

    **Calculations:**
    - Memory Latency (Read/Write): 9.6 MB / 60 GB/s bandwidth = ~0.32 ms.
    - Compute Latency (Fused Block): Fused 3x3 conv adds ~1.7 GFLOPs. At 7.5 TOPS = ~0.22 ms.

    **Conclusion & Interpretation:**
    - **Result: 0.1 ms reduction (Memory-Bound)**. Memory saved (0.32 ms) exceeds compute added (0.22 ms), yielding a net latency reduction while improving TPU utilization.
