title: On-Device LLM Evaluation for Tensor G3
scenario: 'Your team is deploying an on-device LLM to summarize incoming messages on a Google Tensor G3 with 12 GB RAM, where 6 GB is reserved for the OS. Both candidates can use the TPU delegate if their working set stays under the 6 GB app budget, and offline evaluation shows Model A has better summary quality. You must evaluate two options: Model A (3.2B parameter, INT4 weights only) and Model B (1.8B parameter, INT8 weights and activations).'
question: Which Tensor G3 summarization model option should be chosen after considering weights, KV cache, and TPU constraints?
details:
  realistic_solution: Model A (3.2B INT4) is the better choice if its measured summarization quality is required. Despite having more parameters, INT4 quantization gives it a smaller weight footprint than the 1.8B INT8 model. The working set also fits within the 6 GB app budget after adding a reasonable KV cache, so the TPU constraint is capacity and bandwidth rather than raw parameter count alone.
  common_mistake: |
    **The Pitfall:** Forgetting KV cache overhead and relying purely on parameter counts.
    **The Rationale:** Candidates frequently calculate only the memory required for the model weights and falsely assume that a lower parameter count always translates to a lower memory footprint.
    **The Consequence:** They fail to account for the KV cache size, which grows linearly with context length, leading to out-of-memory errors in production.
  napkin_math: |
    **Assumptions & Constraints:**
    - 12 GB Total RAM, 6 GB reserved for OS.
    - Model A: 3.2B parameters, INT4 weights.
    - Model B: 1.8B parameters, INT8 weights.
    - Model A KV cache estimate: 32 layers, 4096 hidden size, 1024-token context, FP16 K and V.

    **Calculations:**
    - Available RAM Budget: 12 GB - 6 GB = 6 GB.
    - Model A (INT4) Weights: 3.2B * 0.5 bytes = 1.6 GB.
    - Model B (INT8) Weights: 1.8B * 1 byte = 1.8 GB.
    - KV Cache for Model A: 2 tensors (K,V) * 32 layers * 1024 tokens * 4096 values * 2 bytes = 536,870,912 bytes = ~0.54 GB.
    - Total footprint for Model A: 1.6 GB + 0.54 GB = ~2.14 GB, leaving ~3.86 GB for activations, runtime buffers, and fragmentation.

    **Conclusion & Interpretation:**
    - **Result: ~2.14 GB working set before transient buffers.** Model A fits within the 6 GB budget and has the better measured quality, so it is the grounded choice under these assumptions.
