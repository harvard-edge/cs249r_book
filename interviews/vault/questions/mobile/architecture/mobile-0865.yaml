title: Recall depthwise separable convolution parameter count for MobileNetV2 first block
scenario: You are reviewing a MobileNetV2 implementation on Snapdragon 8 Gen 3. The first bottleneck block has input 112×112×32, expansion t=1 (no expand for first block), 3×3 depthwise at 32 channels, and project 32→16.
question: How would you calculate the exact parameter count and FLOPs for this block and explain why t=1 is used only in the first block?
details:
  realistic_solution: Depthwise 3×3 on 32 channels requires 288 params. Pointwise 32→16 requires 512 params. Total params = 800 (no biases). FLOPs for Depthwise is ~7.2M, and Pointwise is ~12.8M. Total is ~20.1M FLOPs. t=1 is used because the initial convolutional layer already expanded the input dimension; expanding it again in the first inverted residual block would cause unnecessary compute bloat.
  common_mistake: |
    **The Pitfall:** Including bias parameters or calculating standard convolution FLOPs.
    **The Rationale:** Candidates forget that MobileNetV2 uses `bias=False` in conv layers (handled by BatchNorm) or fail to separate the depthwise and pointwise steps.
    **The Consequence:** Parameter and FLOP counts are significantly overestimated.
  napkin_math: |
    **Assumptions & Constraints:**
    - Input: 112x112x32
    - Expansion t=1

    **Calculations:**
    - Depthwise 3x3 conv at 112x112: 2 * 32 * 9 * 112^2 = 7,225,344 FLOPs.
    - Pointwise 1x1 conv (32 -> 16) at 112x112: 2 * 32 * 16 * 112^2 = 12,845,056 FLOPs.
    - Total FLOPs: 7,225,344 + 12,845,056 = 20,070,400.
    - Total params: (3 * 3 * 32) + (32 * 16) = 288 + 512 = 800.

    **Conclusion & Interpretation:**
    - **Result: ~20.1M FLOPs (Compute-Bound)**. ~20.1M FLOPs and 800 parameters.
