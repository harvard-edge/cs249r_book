title: Exynos 2400 Shared Memory Model Sizing
scenario: You are deploying a quantized object detection model to an Exynos 2400 device with 12 GB of shared LPDDR5X memory. The team estimates that OS services reserve about 5.5 GB and GPU/ISP pipelines reserve about 2.5 GB during the workload.
question: How does shared LPDDR5X memory on Exynos 2400 affect the maximum feasible on-device model size?
details:
  realistic_solution: |
    The Samsung Exynos 2400 NPU operates in a unified/shared memory architecture. Its model weights, tensors, and runtime workspace are allocated from the same 12 GB LPDDR5X pool used by the CPU, GPU, ISP, OS, and apps. With the stated workload reservations, only about 4 GB remains for the NPU path, so the deployable model must leave room for activations and runtime buffers rather than merely fitting under total physical RAM.
  common_mistake: |
    **The Pitfall:** Assuming mobile NPUs have dedicated VRAM similar to discrete desktop GPUs.
    **The Rationale:** Candidates transfer knowledge from server environments, failing to account for mobile SoC unified memory constraints where RAM is shared.
    **The Consequence:** Deploying a model that technically fits the total RAM size but immediately crashes the device because it starves the OS, ISP, or GPU.
  napkin_math: |
    **Assumptions & Constraints:**
    - Total Shared Memory: 12 GB LPDDR5X.
    - OS & Background Services: ~5.5 GB.
    - GPU/ISP Pipelines: ~2.5 GB.

    **Calculations:**
    - Available for NPU = 12 GB - 5.5 GB - 2.5 GB = 4.0 GB

    **Conclusion & Interpretation:**
    - **Result: 4.0 GB (Memory-Capacity-Bound)**. The model footprint must stay under this limit.
