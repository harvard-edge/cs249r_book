title: 'Mastery: MobileNetV3 SE block impact on A17 Pro ANE vs Hexagon NPU'
scenario: MobileNetV3 uses SE blocks with reduction ratio r=4. The A17 Pro ANE and Snapdragon 8 Gen 3 Hexagon NPU have different handling of SE blocks.
question: How should MobileNetV3 SE blocks be handled on A17 Pro ANE versus Snapdragon Hexagon, and what latency overheads matter?
details:
  realistic_solution: 'A17 Pro ANE: SE blocks fully supported; GAP + two FC + sigmoid + scale are fused into a single ANE operation. Overhead: ~0.2ms for all SE blocks in MV3-Large. Accuracy gain: ~1.5pp. Worth keeping. Hexagon HTP v73: SE partially fused. GAP as native op, FC1+FC2+ReLU6+Hardsigmoid as fused block, final multiply is separate. If QNN compiler fuses properly: overhead ~0.3ms. If not fused: 12 separate dispatches × 0.1ms = 1.2ms overhead. Profile with nsys or qnn-net-run --profiling. Recommendation: keep SE for ANE; profile before deciding for Hexagon; consider SE reduction ratio r=8 to halve SE FLOPs.'
  common_mistake: |
    **The Pitfall:** Treating SE block removal as universally beneficial or detrimental without hardware profiling.
    **The Rationale:** Assuming all NPUs handle custom layer fusion similarly.
    **The Consequence:** Leaving SE blocks in for Hexagon (doubling latency) or removing them for ANE (sacrificing 1.5% accuracy for negligible speedup).
  napkin_math: |
    1. **Assumptions & Constraints:**
       - MV3-Large total SE FLOPs: ~3M FLOPs (1.4% of total 0.22G FLOPs).
       - A17 Pro ANE Compute: 35 TOPS.
       - Hexagon HTP Compute: 45 TOPS.
    2. **Calculations:**
       - A17 Pro ANE Compute Time: 3M FLOPs / 35 TOPS = 0.086µs.
       - A17 Pro ANE Practical Overhead (if separate): 15 blocks * 0.013ms = ~0.2ms (10% overhead on ~2.1ms total).
       - Hexagon HTP Compute Time: 3M FLOPs / 45 TOPS = 0.067µs.
       - Hexagon Overhead (if unfused): 12 dispatches * 0.1ms = 1.2ms.
    3. **Conclusion & Interpretation:**
       - **Result: Dispatch-Bound. Hexagon overhead adds 80% latency for 1.4% FLOPs. Remove SE for Hexagon.**
