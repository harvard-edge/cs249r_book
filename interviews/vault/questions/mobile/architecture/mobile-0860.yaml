title: 'Mastery: MobileNetV3 SE block impact on A17 Pro ANE vs Hexagon NPU'
scenario: MobileNetV3 uses SE blocks with reduction ratio r=4. The A17 Pro ANE and Snapdragon 8 Gen 3 Hexagon NPU have different handling of SE blocks.
question: How should MobileNetV3 SE blocks be handled on A17 Pro ANE versus Snapdragon Hexagon, and what latency overheads matter?
details:
  realistic_solution: |
    Keep the MobileNetV3 SE blocks for the A17 Pro ANE unless profiling shows fallback or a material latency problem. With Core ML, static SE subgraphs are often lowered efficiently enough that the accuracy benefit is worth the small overhead, but the exact fusion of GAP, FC/1x1, sigmoid or h-sigmoid, and scale is compiler- and OS-dependent rather than guaranteed as one operation.

    On Snapdragon Hexagon, treat SE as a profiling decision. QNN/HTP support for GAP, small FC layers, sigmoid-like activations, reshapes, broadcasts, and the final multiply depends on the SDK/backend version and quantization pattern. If those fragments remain on HTP, keep SE. If they cause repeated CPU fallback or synchronization, consider removing SE or using an SE-free variant for the Hexagon build while preserving the scenario's r=4 model for the ANE path.
  common_mistake: |
    **The Pitfall:** Treating SE block removal as universally beneficial or detrimental without hardware profiling.
    **The Rationale:** Assuming all NPUs handle custom layer fusion similarly.
    **The Consequence:** Leaving SE blocks in for Hexagon (doubling latency) or removing them for ANE (sacrificing 1.5% accuracy for negligible speedup).
  napkin_math: |
    1. **Assumptions & Constraints:**
       - MV3-Large total SE FLOPs: ~3M FLOPs (1.4% of total 0.22G FLOPs).
       - A17 Pro ANE Compute: 35 TOPS.
       - Hexagon HTP Compute: 45 TOPS.
       - Peak-throughput math is only a lower bound; measured latency is dominated by op lowering, memory movement, and dispatch for tiny SE fragments.
    2. **Calculations:**
       - A17 Pro ANE lower-bound compute time: 3,000,000 ops / 35,000,000,000,000 ops/s = 0.000086ms = 0.086µs.
       - Hexagon lower-bound compute time: 3,000,000 ops / 45,000,000,000,000 ops/s = 0.000067ms = 0.067µs.
       - These lower bounds are far below practical per-block overheads, so they should not be used as predicted latency.
       - Example dispatch sensitivity: if 12 unsupported SE fragments each add 0.1ms through fallback or synchronization, added latency is 12 x 0.1ms = 1.2ms.
       - If the SE subgraph stays fused or scheduled on the accelerator, the measured overhead may instead be a small fraction of a millisecond.
    3. **Conclusion & Interpretation:**
       - **Result: Dispatch-Bound Risk. Keep SE on ANE when profiling confirms accelerator execution; profile SE placement on Hexagon and remove or replace it only if fallback/synchronization overhead exceeds the accuracy benefit.**
