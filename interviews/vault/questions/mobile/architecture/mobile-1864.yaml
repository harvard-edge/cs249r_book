title: 'Adapter Selection Latency in Multi-Persona Mobile Assistant'
scenario: 'A mobile AI assistant has 5 LoRA adapters (professional, casual, technical, creative, child-safe) and selects the adapter based on conversational context. Adapter selection and load adds 200ms before first token.'
question: 'How would you reduce mobile assistant LoRA adapter selection and loading latency from 200ms to under 50ms?'
details:
  realistic_solution: 'End-to-end latency breakdown: context classification: 50ms if running 100M classifier on CPU, 5ms on NPU; adapter file load from storage: 15MB at 3 GB/s UFS 3.1 = 5ms; CPU-to-GPU transfer: 15MB at 34 GB/s = 0.4ms. Current 200ms breakdown likely: classifier on CPU (150ms) + storage read (50ms). Fix: (1) Pre-load all 5 adapters into GPU memory at app launch: 5 * 15MB = 75MB total, uses 1.25% of 6GB GPU-accessible unified memory, negligible; (2) Replace classifier with a lightweight embedding similarity (DistilBERT 66M, NPU: 5ms); (3) With all adapters pre-loaded, adapter switch = pointer swap = <1ms. Total: 5ms classification + 1ms switch = 6ms, well under 50ms.'
  common_mistake: |
    **The Pitfall:** Relying solely on fast SSD reading without addressing the classifier compute bottleneck.
    **The Rationale:** Candidates focus on adapter I/O but fail to recognize that running a 100M parameter context classifier on the CPU takes 150ms.
    **The Consequence:** They pre-load adapters into memory but still miss the 50ms target.
  napkin_math: |
    **Assumptions & Constraints:**
    - Pre-loaded Adapters Memory: 5 * 15 MB = 75 MB.
    - GPU Footprint Impact: 75 MB / 6000 MB = 1.25% of GPU memory.
    - NPU Classifier Latency (66M model at 10 TOPS): (66M * 6 FLOPs) / 10 TOPS = 39 microseconds (0.04ms).
    - Adapter Switch Time: <1ms.

    **Calculations:**
    - Classification Latency: 0.04ms.
    - Adapter Switch: 1ms.

    **Conclusion & Interpretation:**
    - **Result: 1.04ms (Compute-Bound)**. Total latency drops to 0.04ms + 1ms = 1.04ms, smashing the 50ms target.
