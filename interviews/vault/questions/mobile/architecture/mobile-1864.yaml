title: Adapter Selection Latency in Multi-Persona Mobile Assistant
scenario: A mobile AI assistant has 5 LoRA adapters (professional, casual, technical, creative, child-safe) and selects the adapter based on conversational context. Adapter selection and load adds 200ms before first token.
question: How would you reduce mobile assistant LoRA adapter selection and loading latency from 200ms to under 50ms?
details:
  realistic_solution: 'Current 200ms latency likely combines routing compute, adapter file I/O, deserialization, and runtime binding. Fix it by moving selection and loading off the first-token critical path: (1) keep the five 15MB adapters resident or prewarmed in unified memory when the assistant is active, for about 75MB total; (2) use a small routing model or embedding-similarity classifier sized for mobile accelerator execution, with a measured budget around 10-25ms rather than a large CPU classifier; (3) bind the selected adapter by switching an already-loaded adapter handle instead of reading and materializing weights; (4) asynchronously refresh likely next adapters as context changes. A realistic target is roughly 10-25ms for routing plus 1-5ms for adapter binding, leaving headroom under 50ms.'
  common_mistake: |
    **The Pitfall:** Relying solely on fast storage reads without addressing routing and adapter materialization.
    **The Rationale:** Candidates focus on adapter I/O but fail to recognize that CPU-side classification, deserialization, and runtime binding can dominate the first-token path.
    **The Consequence:** They pre-load adapters into memory but still miss the 50ms target.
  napkin_math: |
    **Assumptions & Constraints:**
    - Preloaded adapters: 5 * 15 MB = 75 MB in unified memory or an accelerator-accessible model arena.
    - Mobile routing model: small embedding or classifier path measured at about 10-25ms on the target accelerator.
    - Adapter binding from resident memory: about 1-5ms.
    - Target latency: under 50ms.

    **Calculations:**
    - Resident adapter memory: 75 MB, a modest but explicit mobile memory reservation.
    - Conservative fast path: 25ms routing + 5ms binding = 30ms.
    - Headroom to target: 50ms - 30ms = 20ms.
    - If adapters are not resident, storage read plus deserialization can easily consume the remaining headroom and reintroduce the 200ms path.

    **Conclusion & Interpretation:**
    - **Result: Latency budget met with preloading and lightweight routing.** The defensible goal is a measured sub-50ms path, not an idealized 1ms result from peak TOPS math.
