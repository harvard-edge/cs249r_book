title: LoRA Adapter Compatibility Across Model Version Updates
scenario: A mobile app ships with Phi-3 Mini 3.8B base model v1.0 and user-personalized LoRA adapters. The base model is updated to v1.1. 15% of users report the app performs worse after the update.
question: Why do Phi-3 Mini v1.0 LoRA adapters degrade for 15% of users after a v1.1 base-model update?
details:
  realistic_solution: 'LoRA adapter compatibility analysis: (1) Shape check: if v1.1 changed MLP hidden dimensions or added layers, old adapters will fail with shape mismatch, affecting 100% of users. Since only 15% are affected, shapes are compatible. (2) Weight space shift: if v1.1 used different post-training quantization or layer normalization changes, the weight distribution shifts. LoRA delta (B*A) is applied additively: W_new = W_v1.1 + B_v1.0 * A_v1.0. If B*A was trained to correct for v1.0-specific patterns that no longer exist in v1.1, it now applies incorrect corrections. (3) Diagnosis: 15% of users have highly personalized adapters (high rank, many training steps) with larger deltas, making them more sensitive. (4) Fix: trigger adapter re-validation on model update. Run 10 held-out prompts, compare to baseline. If score drops >5%, notify user and offer to reset or retrain from user history.'
  common_mistake: |
    **The Pitfall:** Assuming LoRA adapters trained on v1.0 are compatible with v1.1 if architecture shapes match.
    **The Rationale:** Candidates forget that weight initialization changes or normalization shifts in v1.1 cause the v1.0 adapter to apply incorrect corrections.
    **The Consequence:** Silent accuracy degradation for power users with heavily personalized adapters.
  napkin_math: |
    **Assumptions & Constraints:**
    - Adapter sizes: 30% users have large adapters (rank 8-16).
    - 50% of those notice degradation.

    **Calculations:**
    - Affected Population: 30% * 50% = 15% total affected.
    - LoRA Delta Magnitude (r=16): Frobenius norm ~0.5.
    - Weight Shift in v1.1: Minor update causes ~2% shift.
    - Compare Signals: Effective misalignment = 2% of base vs 0.5 adapter delta. SNR is borderline (25).

    **Conclusion & Interpretation:**
    - **Result: Borderline SNR (Data-Bound)**. Users with high-rank adapters have larger deltas that are sensitive to small base model weight shifts.
