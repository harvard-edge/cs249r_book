title: Implement MobileNetV3 fine-tuning pipeline for Core ML deployment on A17 Pro
scenario: You need to fine-tune a pre-trained MobileNetV3-Large on a 5-class custom dataset (2,000 images per class) and deploy it to a mobile Neural Engine via Core ML. The deployment must use the Neural Engine for <3ms inference.
question: 'How should you fine-tune and convert MobileNetV3-Large so it runs on the Neural Engine under 3ms?'
details:
  realistic_solution: 'ANE compatibility requires replacing SiLU with nn.Hardswish() before or during fine-tuning (very close approximation, <0.5pp accuracy impact). Pipeline: (1) Load timm MobileNetV3-Large pretrained; (2) Replace SiLU → Hardswish; (3) Fine-tune 50 epochs with AdamW, LR=1e-4, cosine schedule; (4) Export using torch.jit.trace; (5) Convert using coremltools with compute_units=ct.ComputeUnit.ALL; (6) Verify with Xcode Instruments that model runs on ANE.'
  common_mistake: |
    **The Pitfall:** Fine-tuning with PyTorch's default Swish/SiLU activation and directly converting to Core ML.
    **The Rationale:** Candidates assume all standard PyTorch activations seamlessly map to Apple Neural Engine (ANE) hardware blocks.
    **The Consequence:** coremltools falls back to CPU_AND_GPU execution because ANE doesn't natively support torch.nn.SiLU, missing the 3ms latency target.
  napkin_math: |
    **Assumptions & Constraints:**
    - 10,000 images, 50 epochs, batch size 32.
    - MobileNetV3-Large backward is ~0.66 GFLOPs. Hardware handles 15 TFLOPS.

    **Calculations:**
    - Total Steps = 10,000 / 32 * 50 = 15,625 steps.
    - Compute per Step = 32 * 0.66G = 21G FLOPs.
    - Step Time = 21G FLOPs / 15 TFLOPS = 1.4ms/step.
    - Total Time = 15,625 * 1.4ms = 21.9 seconds.

    **Conclusion & Interpretation:**
    - **Result: ~21.9 seconds (Compute-Bound)**. Total fine-tuning time.
