title: Orin Cache Line Fetch
scenario: An edge inference device manages a KV cache expanding by 64KB per token. PagedAttention transfers blocks from LPDDR5 to computing cores via 32-byte cache lines.
question: Design a block sizing strategy to minimize the 5us synchronization overhead per block fetch while keeping memory fragmentation under 10% for a 500-token chat.
details:
  realistic_solution: |
    Applying a PagedAttention strategy, we must balance the coarse granularity of large blocks (which reduces fetch synchronization barriers) against internal memory fragmentation (unused tokens reserved in the last block). Choosing a block size of 16 tokens (1MB total size per block) keeps the absolute worst-case fragmentation well within the 10% bounds while drastically reducing the total number of 5us block fetch barriers compared to single-token (64KB) granularity.
  common_mistake: |
    **The Pitfall:** Using massive block sizes (e.g., 1000 tokens) to minimize synchronization.
    **The Rationale:** Candidates over-optimize for latency by minimizing synchronization calls, completely failing to validate the strict memory fragmentation constraints required on edge devices.
    **The Consequence:** Memory fragmentation radically exceeds the 10% limit, causing early and catastrophic out-of-memory (OOM) errors during inference.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Expansion rate: 64 KB per token.
       - Sequence length: 500 tokens.
       - Maximum allowed memory fragmentation: < 10%.
       - Sync Barrier Cost: 5 µs per block fetch.
    2. **Calculations:**
       - Total active memory: 500 tokens * 64 KB = 32 MB.
       - Maximum fragmentation limit: 10% of 32 MB = 3.2 MB.
       - Candidate Block Size (16 tokens / 1 MB block):
         - Worst-case internal fragmentation (last block holds 1 active token): 15 unused tokens * 64 KB = 0.96 MB.
       - 0.96 MB < 3.2 MB (Passes Constraint).
       - Synchronization overhead: 500 fetches reduced to 32 fetches (0.16 ms sync time vs 2.5 ms).
    3. **Conclusion & Interpretation:**
       **Result: 1MB blocks yield 0.96MB waste and 0.16ms sync (Synchronization-Bound solved).** 16-token blocks mathematically satisfy strict memory bounds while accelerating the critical path.
