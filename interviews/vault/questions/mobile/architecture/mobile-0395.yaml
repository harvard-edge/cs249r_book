title: Why MobileNetV3 SE Blocks Improve Mobile Accuracy-Latency Trade-offs
scenario: MobileNetV3 adds squeeze-and-excitation (SE) blocks that increase FLOPs by 2%. Your colleague says 'that's wasted compute — remove them to speed up inference.'
question: Why are MobileNetV3 squeeze-and-excitation blocks worth 2% extra FLOPs on mobile hardware?
details:
  realistic_solution: SE blocks act as a lightweight channel attention mechanism that improves accuracy for a very small local FLOP cost. On mobile hardware, that trade-off can reduce end-to-end latency because the accuracy gain lets the model use a narrower or shallower backbone for the same quality target. The small SE overhead is usually cheaper than recovering the lost accuracy with wider convolutions throughout the network, so the net model can run faster even though each SE-enabled block has slightly more compute.
  common_mistake: |
    **The Pitfall:** Treating all FLOPs as equal and assuming any FLOP increase linearly degrades latency.
    **The Rationale:** Engineers ignore the accuracy-per-FLOP trade-off, cutting cheap attention layers and inadvertently degrading model quality.
    **The Consequence:** To recover the lost accuracy, the engineer will be forced to use a much larger backbone, resulting in a net negative performance.
  napkin_math: |
    **Assumptions & Constraints:**
    - Candidate backbone without SE: 160 MFLOPs.
    - Adding SE blocks increases local compute by about 2%.
    - The SE accuracy gain lets the team shrink the backbone to about 140 MFLOPs while preserving the target accuracy.

    **Calculations:**
    - SE overhead on the smaller backbone: 140 MFLOPs * 0.02 = 2.8 MFLOPs.
    - Total with SE: 140 MFLOPs + 2.8 MFLOPs = 142.8 MFLOPs.
    - Net reduction versus no-SE candidate: (160 - 142.8) / 160 ≈ 10.8%.

    **Conclusion & Interpretation:**
    - **Result: Better end-to-end latency trade-off.** The 2% SE overhead is worthwhile when it enables a smaller backbone, because the net model can use fewer total FLOPs and less latency at the same accuracy target.
