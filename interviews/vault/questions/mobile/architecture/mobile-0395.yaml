title: 'The Squeeze-and-Excitation Question'
scenario: 'MobileNetV3 adds squeeze-and-excitation (SE) blocks that increase FLOPs by 2%. Your colleague says ''that''s wasted compute — remove them to speed up inference.'''
question: 'Why are MobileNetV3 squeeze-and-excitation blocks worth 2% extra FLOPs on mobile hardware?'
details:
  realistic_solution: 'SE blocks act as a channel attention mechanism that provides input-dependent feature selection. The 2% FLOP increase buys a 2-3% accuracy improvement. This enables scaling down the base model size to hit the same accuracy target, saving significantly more FLOPs overall. Furthermore, SE blocks rely on global pooling and small FC layers that map extremely well to NPU MAC operations.'
  common_mistake: |
    **The Pitfall:** Treating all FLOPs as equal and assuming any FLOP increase linearly degrades latency.
    **The Rationale:** Engineers ignore the accuracy-per-FLOP trade-off, cutting cheap attention layers and inadvertently degrading model quality.
    **The Consequence:** To recover the lost accuracy, the engineer will be forced to use a much larger backbone, resulting in a net negative performance.
  napkin_math: |
    **Assumptions & Constraints:**
    - Baseline (MobileNetV2-1.0): 300 MFLOPs yields 72% top-1 ImageNet.
    - SE Model (MobileNetV3-Small with SE): 56 MFLOPs yields 67.4% top-1.

    **Calculations:**
    - Trade-off: To match MobileNetV2's 72% accuracy, MobileNetV3 needs ~150 MFLOPs (with SE) vs 300 MFLOPs (without SE).

    **Conclusion & Interpretation:**
    - **Result: Compute-Bound**. The 2% FLOP overhead of SE enables a 50% total FLOP reduction at equal accuracy.
