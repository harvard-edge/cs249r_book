title: 'Analyze EfficientNet-Lite0 vs MobileNetV3 accuracy-energy tradeoff on Snapdragon 8 Gen 3'
scenario: 'You are evaluating EfficientNet-Lite0 (75.1% top-1, 0.35 GFLOPs) versus MobileNetV3-Large (75.2% top-1, 0.22 GFLOPs) on a Snapdragon 8 Gen 3 with a 45 TOPS Hexagon NPU.'
question: 'How does EfficientNet-Lite0 compare to MobileNetV3-Large in energy consumption per inference on the Snapdragon 8 Gen 3 Hexagon DSP?'
details:
  realistic_solution: 'Hexagon NPU HTP (Hyper Tensor Processor): native support for depthwise conv, 1×1 pointwise, INT8/INT4. H-swish in MobileNetV3 must be decomposed to relu6(x+3)/6 × x — two operations on HTP. EfficientNet-Lite0 uses ReLU6 — direct HTP support, single operation. Despite 0.13 GFLOPs fewer, MobileNetV3-Large may be slower on Hexagon due to H-swish overhead. Energy: Hexagon NPU ~2W at full utilization; at 0.35G/45T = 0.78% utilization → ~0.016W for Lite0. At 0.22G/45T = 0.49% → ~0.01W for MV3. Difference: 0.006W — negligible. Profile with Qualcomm AI Hub to get actual numbers.'
  common_mistake: |
    **The Pitfall:** Comparing models exclusively by their GFLOPs count.
    **The Rationale:** Engineers assume lower GFLOPs directly equates to lower latency and lower energy consumption on all hardware.
    **The Consequence:** They fail to account for operator support; e.g., H-swish in MobileNetV3 maps poorly to the NPU compared to ReLU6, causing performance degradation.
  napkin_math: |
    **Assumptions & Constraints:**
    - MobileNetV3-Large: ~1.2ms latency, ~0.4W NPU power.
    - EfficientNet-Lite0: ~1.5ms latency, ~0.5W NPU power.

    **Calculations:**
    - MV3 Energy: 0.4W × 1.2ms = 0.48 mJ.
    - Lite0 Energy: 0.5W × 1.5ms = 0.75 mJ.
    - Efficiency Difference: 0.75 mJ / 0.48 mJ = 1.56x.

    **Conclusion & Interpretation:**
    - **Result: 1.56x efficiency (Energy-Bound)**. MobileNetV3 is 1.56x more energy efficient, but overall battery impact for 1000 daily inferences (0.48 J out of 54,000 J) remains negligible.
