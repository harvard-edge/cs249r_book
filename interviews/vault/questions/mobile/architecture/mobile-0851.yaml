title: Compare EfficientNet-Lite0 and MobileNetV3 per-inference energy on Snapdragon 8 Gen 3
scenario: You are evaluating EfficientNet-Lite0 (75.1% top-1, 0.35 GFLOPs) versus MobileNetV3-Large (75.2% top-1, 0.22 GFLOPs) on a Snapdragon 8 Gen 3 with a 45 TOPS Hexagon NPU.
question: How does EfficientNet-Lite0 compare to MobileNetV3-Large in energy consumption per inference on the Snapdragon 8 Gen 3 Hexagon DSP?
details:
  realistic_solution: |
    Compare energy per inference directly as power integrated over measured latency, not by scaling peak TOPS into watts. The scenario gives GFLOPs and accuracy, but it does not give measured latency, active power, quantization quality, or backend op placement, so it is not enough to prove which model is lower energy on the Snapdragon 8 Gen 3 Hexagon path.

    MobileNetV3-Large has fewer operations and nearly identical accuracy, so it is a reasonable first candidate to profile. However, operator support can narrow or reverse that gap: MobileNetV3's h-swish/h-sigmoid patterns may lower less cleanly than EfficientNet-Lite0's simpler ReLU6-style blocks on a particular QNN/HTP version. The correct release answer is therefore: lower GFLOPs suggests MobileNetV3-Large may be lower energy, but the comparison must be decided by on-device profiling of both converted graphs.
  common_mistake: |
    **The Pitfall:** Comparing models exclusively by their GFLOPs count.
    **The Rationale:** Engineers assume lower GFLOPs directly equates to lower latency and lower energy consumption on all hardware.
    **The Consequence:** They fail to account for operator support; e.g., H-swish in MobileNetV3 maps poorly to the NPU compared to ReLU6, causing performance degradation.
  napkin_math: |
    **Assumptions & Constraints:**
    - Use one consistent method: energy per inference = average active accelerator power × measured inference latency.
    - Scenario data: EfficientNet-Lite0 = 0.35 GFLOPs; MobileNetV3-Large = 0.22 GFLOPs.
    - Missing release data: measured latency, active power, quantization accuracy, and CPU/GPU fallback counts for each QNN graph.

    **Calculations:**
    - Arithmetic ratio: 0.35 GFLOPs / 0.22 GFLOPs = 1.59x more nominal work for EfficientNet-Lite0.
    - This ratio is only a profiling hypothesis. Energy must be computed as E_Lite0 = P_Lite0 × latency_Lite0 and E_MV3 = P_MV3 × latency_MV3 after both models are converted to the same backend.
    - If MobileNetV3 has fallback fragments or worse memory traffic, its lower GFLOPs may not translate to lower energy.

    **Conclusion & Interpretation:**
    - **Result: Indeterminate from the scenario alone.** MobileNetV3-Large is the likely first profiling candidate because it has 1.59x fewer GFLOPs, but the release decision requires measured Hexagon/QNN energy per inference for both models.
