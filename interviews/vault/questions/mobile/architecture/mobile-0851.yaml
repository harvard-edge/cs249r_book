title: Compare EfficientNet-Lite0 and MobileNetV3 per-inference energy on Snapdragon 8 Gen 3
scenario: You are evaluating EfficientNet-Lite0 (75.1% top-1, 0.35 GFLOPs) versus MobileNetV3-Large (75.2% top-1, 0.22 GFLOPs) on a Snapdragon 8 Gen 3 with a 45 TOPS Hexagon NPU.
question: How does EfficientNet-Lite0 compare to MobileNetV3-Large in energy consumption per inference on the Snapdragon 8 Gen 3 Hexagon DSP?
details:
  realistic_solution: |
    Compare energy per inference directly as power integrated over measured latency, not by scaling peak TOPS into watts. With the stated model sizes, MobileNetV3-Large has fewer operations and nearly identical accuracy, so it is the expected lower-energy candidate if both converted graphs stay on the Hexagon backend with similar quantization quality and no major fallback.

    Operator support can narrow or reverse that gap: MobileNetV3's h-swish/h-sigmoid patterns may lower less cleanly than EfficientNet-Lite0's simpler ReLU6-style blocks on a particular QNN/HTP version. The correct release answer is therefore: MobileNetV3-Large should use less energy per inference in the baseline comparison, but this must be confirmed with on-device profiling because activation lowering, quantization, memory traffic, and fallback behavior matter as much as GFLOPs at this size.
  common_mistake: |
    **The Pitfall:** Comparing models exclusively by their GFLOPs count.
    **The Rationale:** Engineers assume lower GFLOPs directly equates to lower latency and lower energy consumption on all hardware.
    **The Consequence:** They fail to account for operator support; e.g., H-swish in MobileNetV3 maps poorly to the NPU compared to ReLU6, causing performance degradation.
  napkin_math: |
    **Assumptions & Constraints:**
    - Use one consistent method: energy per inference = average active accelerator power × measured inference latency.
    - Example profiled values on the same device/backend:
      - MobileNetV3-Large: 1.2ms at 0.4W average active NPU power.
      - EfficientNet-Lite0: 1.5ms at 0.5W average active NPU power.

    **Calculations:**
    - MV3 Energy: 0.4W × 1.2ms = 0.48 mJ.
    - Lite0 Energy: 0.5W × 1.5ms = 0.75 mJ.
    - Energy ratio: 0.75 mJ / 0.48 mJ = 1.56x, so Lite0 uses about 56% more energy under these profiled assumptions.

    **Conclusion & Interpretation:**
    - **Result: MobileNetV3-Large is lower energy per inference under the stated measurements (Energy-Bound)**. Do not infer this from TOPS utilization alone; validate with Hexagon/QNN profiling because backend op coverage can change both latency and active power.
