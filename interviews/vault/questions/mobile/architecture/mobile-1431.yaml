title: 'Sizing Inverted Residuals for Hexagon NPU'
scenario: Your team is deploying a real-time vision model based on an inverted residual architecture. The target NPU provides 45 TOPS of INT8 compute and 64 GB/s of memory bandwidth.
question: How should inverted residual expansion ratios be chosen to hit a strict 15ms latency budget?
details:
  realistic_solution: 'Evaluate the NPUs compute-to-memory-bandwidth ratio (Roofline). The 45 TOPS are best utilized by operations with high arithmetic intensity. Trade theoretical FLOPs for hardware utilization by selectively replacing memory-bound depthwise convolutions with standard or grouped convolutions in early layers, thereby maximizing INT8 throughput while avoiding DRAM bandwidth bottlenecks.'
  common_mistake: |
    **The Pitfall:** Strictly minimizing FLOPs by aggressively maximizing depthwise separable convolutions everywhere.
    **The Rationale:** Candidates fail to perform a roofline analysis, overlooking that depthwise layers possess extremely low arithmetic intensity and are heavily memory-bound.
    **The Consequence:** The NPUs dense matrix math engines are severely underutilized, leading to poor real-world latency despite a low theoretical FLOP count.
  napkin_math: |
    **Assumptions & Constraints:**
    - NPU Compute: 45 TOPS (45,000 GOPS).
    - Memory Bandwidth: 64 GB/s.

    **Calculations:**
    - Required arithmetic intensity = 45,000 GOPS / 64 GB/s = ~703 ops/byte.
    - Depthwise conv (3x3 INT8) = (3*3*2 ops) / 2 bytes = 9 ops/byte.
    - 9 ops/byte << 703 ops/byte (massively memory-bound).

    **Conclusion & Interpretation:**
    - **Result: 703 ops/byte required (Memory-Bound)**. Sizing the model requires increasing channel counts (1x1 convolutions) to push arithmetic intensity closer to 703 ops/byte.
