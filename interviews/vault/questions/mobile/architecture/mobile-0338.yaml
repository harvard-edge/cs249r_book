title: 'The Mobile Memory Wall: Attention Scaling & Variants'
scenario: 'You''re evaluating if a new 7-billion parameter language model can be deployed on a high-end smartphone for on-device inference.'
question: 'How much memory is needed to load the FP16 weights of a 7B-parameter model for mobile inference?'
details:
  realistic_solution: |
    For inference with FP16 weights, each parameter requires 2 bytes of storage. Therefore, a 7-billion parameter model requires approximately 14 GB of memory just to load into RAM.
  common_mistake: |
    **The Pitfall:** Confusing inference memory requirements with training memory requirements.
    **The Rationale:** Candidates recall the rule of thumb that a model requires ~16 bytes per parameter (which includes Adam optimizer states and gradients for training).
    **The Consequence:** Incorrectly concluding that a model is too large for deployment, missing opportunities for on-device inference.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model size: 7 billion parameters.
    - Precision: FP16 (2 bytes per parameter).

    **Calculations:**
    - 7,000,000,000 * 2 bytes = 14,000,000,000 bytes = 14 GB

    **Conclusion & Interpretation:**
    - **Result: 14 GB (Memory-Capacity-Bound)**. The model requires 14 GB of memory just to load into RAM.
  options:
  - '112 GB'
  - '28 GB'
  - '14 GB'
  - '7 GB'
