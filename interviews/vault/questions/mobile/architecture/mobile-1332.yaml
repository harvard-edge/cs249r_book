title: A17 Pro KV-Cache Memory Budgeting
scenario: You are deploying a 2B parameter text summarization model on an Apple A17 Pro. The app has a strict 3 GB memory budget. Weights are 8-bit, KV-cache is 16-bit, layers=32, hidden_dim=2048.
question: What memory is needed for 2B INT8 weights plus a 1000-token FP16 KV cache, and does it fit within a 3GB budget?
details:
  realistic_solution: The candidate must recall the memory formulas for both model parameters and the KV-cache. They should establish the base weight memory first, then calculate the per-token KV-cache footprint (2 * layers * hidden_dim * bytes_per_element), and finally scale it by the sequence length to verify against the A17 Pro's memory constraint.
  common_mistake: |
    **The Pitfall:** Miscalculating the per-token byte requirement of the KV cache.
    **The Rationale:** Candidates often forget to double the size for Key/Value pairs or fail to account for 16-bit (2-byte) precision when the weights are 8-bit.
    **The Consequence:** They drastically underestimate dynamic memory footprint and deploy models that trigger instant OOMs during generation.
  napkin_math: |
    - **Weight Memory:** 2 billion parameters * 1 byte = 2 GB.
    - **KV Cache per Token:** 2 (K+V) * 32 layers * 2048 dim * 2 bytes = 262,144 bytes (~262 KB).
    - **Total KV Cache:** 262 KB * 1000 tokens = ~262 MB.
    - **Total Memory:** 2 GB + 262 MB = 2.262 GB.
    - **Final Result:** **At 2.262 GB, the model fits comfortably within the strict 3 GB OS budget.**
