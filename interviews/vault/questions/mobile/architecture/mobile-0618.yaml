title: The Google Tensor G4 TPU Trade-off
scenario: Google claims the Tensor G4 in the Pixel 9 Pro is purpose-built for AI workloads. Your team is choosing between the Pixel 9 Pro (Tensor G4) and the Galaxy S24 Ultra (Snapdragon 8 Gen 3) as the reference device for your on-device ML product. The Tensor G4 TPU is rated at 27 TOPS; the Hexagon NPU at 45 TOPS.
question: Should the team choose Pixel 9 Pro Tensor G4 or Snapdragon 8 Gen 3 based only on 27 versus 45 TOPS?
details:
  realistic_solution: 'TOPS alone is misleading. For LLM decode (memory-bandwidth-bound), what matters is bandwidth: Snapdragon 8 Gen 3 at 77 GB/s beats Tensor G4 at 51.2 GB/s, yielding ~22 vs ~15 tok/s for a 3.5GB INT4 model. But for sustained workloads, energy matters: Tensor G4 uses 24.5J per 100 tokens (7s x 3.5W) vs Snapdragon''s 36J (4.5s x 8W) — 32% less energy. For compute-bound prefill, the gap narrows to ~10%. Choose Snapdragon for speed-critical chat UX, Tensor G4 for battery-sensitive always-on assistants. Profile your actual workload on both devices before deciding.'
  common_mistake: |
    **The Pitfall:** Selecting hardware based solely on the highest peak TOPS number.
    **The Rationale:** Candidates assume more TOPS directly translates to faster inference, ignoring that TOPS is a theoretical maximum under ideal conditions that doesn't account for memory bandwidth or energy efficiency.
    **The Consequence:** The team may select a device that excels on paper but underperforms on real-world memory-bound workloads or drains battery unacceptably during sustained usage.
  napkin_math: |
    1. **LLM Decode (Memory Bound):** 7B INT4 (3.5 GB). Tensor G4 (51.2 GB/s) = 14.6 tok/s. Snapdragon (77 GB/s) = 22 tok/s. (Qualcomm wins).
    2. **Prefill (Compute Bound):** 512 tokens. 7B params require ~14 GFLOPs/token. Total = 512 × 14 = 7.168 TFLOPs.
    3. **Prefill Latency:** Tensor G4 (27 TOPS sustained) = 7.168 / 27 = 265ms. Snapdragon (30 TOPS sustained) = 7.168 / 30 = 239ms.
    4. **Energy (Sustained Workload):** Tensor G4: 7s × 3.5W = 24.5J. Snapdragon: 4.5s × 8W = 36J.
    **Result:** Snapdragon is faster for memory-bound tasks (**22 vs 14 tok/s**), but Tensor G4 consumes **32% less energy** for sustained workloads, making the choice dependent on the specific user experience goal.
