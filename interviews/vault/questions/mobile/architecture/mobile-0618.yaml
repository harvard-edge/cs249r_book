title: The Google Tensor G4 TPU Trade-off
scenario: Google claims the Tensor G4 in the Pixel 9 Pro is purpose-built for AI workloads. Your team is choosing between the Pixel 9 Pro (Tensor G4) and the Galaxy S24 Ultra (Snapdragon 8 Gen 3) as the reference device for your on-device ML product. The Tensor G4 TPU is rated at 27 TOPS; the Hexagon NPU at 45 TOPS.
question: Should the team choose Pixel 9 Pro Tensor G4 or Snapdragon 8 Gen 3 based only on 27 versus 45 TOPS?
details:
  realistic_solution: TOPS alone is misleading. Decode is often limited by effective bytes moved per generated token, not by the peak TOPS number. If each token requires streaming about 3.5 GB of INT4 weights and KV data, Snapdragon 8 Gen 3 at 77 GB/s has a bandwidth advantage over Tensor G4 at 51.2 GB/s. For compute-bound prefill, the sustained TOPS numbers matter more and the gap can be much smaller. Energy can reverse the product decision if Tensor sustains the workload at lower power. Choose based on measured decode latency, prefill latency, and joules per task for the actual model rather than the 27 versus 45 TOPS headline.
  common_mistake: |
    **The Pitfall:** Selecting hardware based solely on the highest peak TOPS number.
    **The Rationale:** Candidates assume more TOPS directly translates to faster inference, ignoring that TOPS is a theoretical maximum under ideal conditions that doesn't account for memory bandwidth or energy efficiency.
    **The Consequence:** The team may select a device that excels on paper but underperforms on real-world memory-bound workloads or drains battery unacceptably during sustained usage.
  napkin_math: |
    **Assumptions & Constraints:**
    - LLM Decode (Memory Bound): effective bytes moved per generated token is about 3.5 GB for a 7B INT4 model plus KV traffic.
    - Tensor G4 bandwidth: 51.2 GB/s. Snapdragon bandwidth: 77 GB/s.
    - Prefill (Compute Bound): 512 tokens. 7B params require ~14 GFLOPs/token.
    - Sustained prefill throughput: Tensor G4: 27 TOPS. Snapdragon: 30 TOPS.
    - Sustained decode power example: Tensor G4: 3.5W. Snapdragon: 8W.

    **Calculations:**
    - Decode lower bound from bandwidth: Tensor G4 = 51.2 GB/s / 3.5 GB/token = 14.6 tok/s. Snapdragon = 77 / 3.5 = 22.0 tok/s.
    - Prefill Total Compute: 512 * 14 = 7.168 TFLOPs.
    - Prefill Latency: Tensor G4 = 7.168 TFLOPs / 27 TOPS = 0.265s. Snapdragon = 7.168 / 30 = 0.239s.
    - Energy for 100 decode tokens at the bandwidth limit: Tensor G4 = (100 / 14.6)s * 3.5W = 24.0J. Snapdragon = (100 / 22.0)s * 8W = 36.4J.

    **Conclusion & Interpretation:**
    - **Result:** Snapdragon is faster in this bandwidth-bound decode estimate (22.0 vs 14.6 tok/s), while Tensor can use less energy per 100 tokens under the stated power assumptions. The correct decision depends on the product's speed-versus-battery target, not TOPS alone.
