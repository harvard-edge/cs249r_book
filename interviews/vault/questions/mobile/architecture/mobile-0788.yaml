title: The Context Length Latency Spike
scenario: A local mobile chat app runs a 2B parameter model using a mobile GPU. Decode latency is perfectly stable at 35ms/token. However, exactly when the conversation history reaches 1024 tokens, decode latency instantly jumps to 110ms/token and remains there. Device thermals are normal and there is no OS memory paging.
question: Why does mobile chat decode latency jump exactly at a 1024-token context length?
details:
  realistic_solution: The step-function increase in latency is caused by a hardware-specific FlashAttention tiling limit. Mobile GPUs have strictly limited threadgroup shared memory (e.g., 32KB per workgroup). FlashAttention does not need the full 1024-token context in SRAM; it streams K/V blocks through a small tile. The cliff appears when the engine's chosen block shape for contexts at or above 1024 tokens requires more shared memory than the shader can allocate, so the runtime silently falls back to a standard attention kernel that streams K and V from LPDDR5 for every generated token.
  common_mistake: |
    **The Pitfall:** Assuming the device ran out of RAM and started swapping to flash storage.
    **The Rationale:** Engineers equate sudden latency spikes to traditional OOM paging behavior.
    **The Consequence:** They attempt to reduce overall memory footprint rather than addressing the specific threadgroup shared memory limitations of the GPU shader.
  napkin_math: |
    **Assumptions & Constraints:**
    - Architecture: 32 layers, 8 heads, 64 dim (FP16).
    - Mobile GPU limitation: 32 KB max shared memory per workgroup.
    - Optimized attention streams K/V blocks through shared memory; it does not materialize the full sequence there.

    **Calculations:**
    - Safe tile example: 128 tokens * 64 dim * 2 bytes * 2 (K and V) = 32 KB, before shader scratch space.
    - If the 1024-token threshold makes the kernel select a larger K/V block, such as 256 tokens, the tile requires 256 * 64 * 2 * 2 = 64 KB, which exceeds a 32 KB shared-memory budget.
    - The runtime therefore falls back to standard attention for contexts at or above that threshold.
    - Fallback DRAM traffic per generated token still scales with context length: K+V reads = 1024 * 64 * 2 bytes * 2 = 256 KB per head per layer, or about 64 MB across 8 heads and 32 layers.

    **Conclusion & Interpretation:**
    - **Result: Standard Attention Fallback**. The 1024-token cliff is best explained by a per-tile shared-memory threshold that changes the selected kernel, not by needing the entire context in SRAM. The fallback adds tens of MB of K/V DRAM traffic per token and bottlenecks the GPU.
