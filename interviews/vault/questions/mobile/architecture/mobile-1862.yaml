title: On-Device LoRA OOM on an 8GB Phone
scenario: A mobile application fine-tunes a 1B model on-device using LoRA. Training on an 8GB device causes OOM errors at batch size 1, sequence length 128.
question: Why does LoRA training for a 1B model OOM at batch 1 on an 8GB phone, and how do you fix it?
details:
  realistic_solution: 'Memory breakdown for 1B model LoRA training (r=4, Q+V only): (1) Base model weights in FP16: ~2GB. (2) LoRA adapter weights: under 1MB. (3) Adam state for adapters only: a few MB. Those parts are not the problem. The real peak comes from training-time activations, autograd tape, temporary kernels, and runtime workspace. On an 8GB phone, the OS and allocator usually leave only about 5-6GB usable, so keeping the base model in FP16 plus backward activations can push peak memory past the budget even at batch size 1. Fix: freeze every base-model parameter, verify only LoRA params require grad, use gradient checkpointing and a shorter sequence length if needed, and prefer quantized frozen weights or an explicit QLoRA-style setup for the base model. Do not rely on torch.compile or JIT caching to reduce memory; those can increase peak usage.'
  common_mistake: |
    **The Pitfall:** Assuming LoRA is always memory-cheap because only the adapter weights are trainable.
    **The Rationale:** Candidates count the small adapter tensors but forget that backward activations, autograd metadata, optimizer state, temporary workspaces, and accidental unfrozen base weights still consume memory.
    **The Consequence:** The app OOMs at batch size 1 even though the LoRA adapter itself is tiny, and the team chases model-size changes before verifying what actually requires gradients.
  napkin_math: |
    **Assumptions & Constraints:**
    - Device RAM: 8GB (~5.5-6GB usable after OS/runtime overhead).
    - Base model weights (FP16): 1B params = ~2 GB.
    - LoRA adapter + optimizer state: only a few MB.
    - Training activations, autograd tape, and runtime workspace: several GB for a 1B transformer even at batch size 1.

    **Calculations:**
    - Base model + training workspace: ~2 GB + ~4 GB = ~6 GB.
    - Add LoRA params, optimizer state, and allocator slack: peak exceeds the ~5.5-6GB usable budget.

    **Conclusion & Interpretation:**
    - **Result: OOM from training-time workspace and activations, not LoRA adapter size.** Freeze the base model, checkpoint activations, and use quantized frozen weights if the goal is to make on-device training fit.
