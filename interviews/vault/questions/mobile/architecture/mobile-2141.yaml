title: Wearable BLE KV Offload
scenario: A wearable pin renders real-time audio with a 100ms end-to-end budget and offloads KV-cache context to a smartphone over BLE 5.2. Each request pays a 15ms BLE connection synchronization delay before KV bytes can transfer, so the context window is constrained by sync latency plus transfer time.
question: What is the maximum allowable context window before the 15ms BLE connection synchronization latency and transfer time exceed the 100ms real-time audio budget?
details:
  realistic_solution: Treat the 15ms BLE connection synchronization as separate fixed latency inside the 100ms audio budget, leaving 85ms for transfer. Under the idealized assumption that the full 2 Mbps is usable payload throughput, 85ms carries 170 Kb, or 21.25 KB. With 1 KB of KV cache per token, the maximum whole-token context is floor(21.25) = 21 tokens. Real BLE protocol overhead would reduce the usable payload rate, so 21 tokens is an optimistic upper bound unless 2 Mbps is explicitly measured as application payload throughput.
  common_mistake: |
    **The Pitfall:** Treating the BLE link as a continuous stream and calculating payload capacity using the full 100ms.
    **The Rationale:** Engineers ignore the physical realities of radio protocols, where connection synchronization intervals consume a fixed block of the real-time budget before any data moves.
    **The Consequence:** Designing a context window that mathematically cannot be transferred within the strict audio rendering deadline, causing audio dropout.
  napkin_math: |
    **Assumptions & Constraints:**
    - Real-time audio budget: 100ms.
    - BLE connection sync latency: 15ms.
    - BLE 5.2 throughput: 2 Mbps.
    - KV cache size per token: 1 KB.

    **Calculations:**
    - Effective transfer time: 100ms - 15ms = 85ms.
    - Total data transferred: 85ms * 2,000,000 bits/s = 170,000 bits.
    - Payload in Bytes: 170,000 bits / 8 = 21,250 Bytes = 21.25 KB.
    - Context limit: 21.25 KB / 1 KB/token = 21.25 tokens.

    **Conclusion & Interpretation:**
    - **Result: 21 full tokens under ideal 2 Mbps payload throughput (Network Latency-Bound)**. The fractional 21.25-token value must be floored, and real BLE overhead would lower the practical limit.
