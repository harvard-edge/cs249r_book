title: Sizing On-Device Translation Architectures
scenario: You are designing an on-device real-time translation system targeting a modern NPU. You need to evaluate the deployment tradeoffs between a 1B parameter encoder-decoder model and a 1.5B parameter decoder-only model.
question: How should an on-device translation architecture be sized for NPU memory-bandwidth limits?
details:
  realistic_solution: |
    Size the architecture around measured decode-time bandwidth, because batch-1 generation repeatedly touches decoder weights, KV cache, and attention state. The encoder-decoder model pays an upfront encoder cost once per source sentence, then reuses the encoder states while the decoder generates each target token and also reads cross-attention state. The decoder-only model has a simpler stack but carries a larger decoder working set per generated token. Use profiling to choose the design whose active decoder weights, KV cache, and attention-state reads stay resident or below the NPU bandwidth budget; the 500M/500M encoder-decoder is attractive only if its encoder-state cache fits and quality is comparable.
  common_mistake: |
    **The Pitfall:** Assuming fewer total parameters guarantees lower latency.
    **The Rationale:** Candidates falsely equate total parameter count directly to inference speed, missing the distinction between compute-bound prefill and bandwidth-bound generation.
    **The Consequence:** Deploying an encoder-decoder architecture that stalls the memory bus during cross-attention generation phases.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hardware: NPU with 35 TOPS peak, 50 GB/s sustained memory bandwidth.
    - Precision: 8-bit weights for sizing.
    - Models: 1B encoder-decoder (500M encoder/500M decoder) vs 1.5B decoder-only.
    - Translation request: 80 source tokens, 80 generated target tokens.
    - Encoder outputs are computed once and reused during decoding; weight-stream estimates below are pessimistic DRAM upper bounds for active decoder weights, not claims that every parameter must miss cache every token.

    **Calculations:**
    - Decoder-only active decoder-weight traffic upper bound: 1.5B * 1 byte = 1.5 GB/token, or 30 ms/token at 50 GB/s before KV traffic.
    - Encoder-decoder upfront encoder-weight traffic upper bound: 0.5 GB once for the source sentence.
    - Encoder-decoder active decoder-weight traffic upper bound: 0.5 GB/token, or 10 ms/token at 50 GB/s before decoder KV and cross-attention state reads.
    - Cross-attention state is reused from the encoded source; for 80 source tokens it is bounded by source length and layer width, not by the full decoder parameter count.
    - For 80 target tokens, pessimistic decoder-only weight traffic is 80 * 1.5 = 120 GB; encoder-decoder is 0.5 GB encoder + 80 * 0.5 GB decoder = 40.5 GB plus state/KV traffic.

    **Conclusion & Interpretation:**
    - **Result: no hard winner without cache-residency data.** The encoder-decoder design trades one upfront encoder pass and cross-attention reads for a smaller decoder working set; the decoder-only design avoids cross-attention but has more decoder state per token. Choose the one that profiling shows stays under the bandwidth budget at the target quality.
