title: Sizing On-Device Translation Architectures for A17 Pro
scenario: 'You are designing an on-device real-time translation system targeting a modern NPU. You need to evaluate the deployment tradeoffs between a 1B parameter encoder-decoder model and a 1.5B parameter decoder-only model.'
question: 'How should an on-device translation architecture be sized for NPU memory-bandwidth limits?'
details:
  realistic_solution: 'Analyze the memory bandwidth bottleneck during generation. Decoder-only loads 1.5B weights plus KV cache per token. Encoder-decoder (500M/500M) loads 500M decoder weights plus KV cache, but cross-attention repeatedly strains memory by accessing encoder states. The architecture choice must optimize memory access patterns, often favoring uniform decoder structures.'
  common_mistake: |
    **The Pitfall:** Assuming fewer total parameters guarantees lower latency.
    **The Rationale:** Candidates falsely equate total parameter count directly to inference speed, missing the distinction between compute-bound prefill and bandwidth-bound generation.
    **The Consequence:** Deploying an encoder-decoder architecture that stalls the memory bus during cross-attention generation phases.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hardware: NPU with 35 TOPS, 50 GB/s bandwidth.
    - Models: 1B encoder-decoder (500M/500M) vs 1.5B decoder-only.

    **Calculations:**
    - Compute insignificance: 1.5B MACs (3 GOPs) / 35 TOPS = ~0.08 ms compute time.
    - Decoder-Only Bandwidth: 1.5 GB / 50 GB/s = 30 ms per token memory load.
    - Encoder-Decoder Bandwidth: 0.5 GB / 50 GB/s = 10 ms per token (ignoring severe cross-attention memory overheads which dominate).

    **Conclusion & Interpretation:**
    - **Result: Bandwidth-Bound Generation**. Power is dominated by memory traffic (30ms vs 0.08ms compute). An optimal architecture must focus on cache hits and predictable memory access patterns over raw parameter count.
