title: 'Specification: define mobile CNN requirements for real-time AR on A17 Pro'
scenario: You are writing the model specification for a real-time AR object recognition feature on iPhone 15 Pro (A17 Pro, 35 TOPS ANE, 8GB RAM). The feature must run at 30 FPS with under 3ms inference latency, under 4% battery drain/hr, and above 85% top-1 accuracy on a 50-class AR dataset.
question: What technical specification should define this real-time AR mobile CNN?
details:
  realistic_solution: |
    The specification should define deployment behavior, not just an architecture name. Require a fully static Core ML CNN intended for ANE execution, with fixed input resolution, folded batch normalization, no dynamic control flow, no unsupported custom ops, and activations/operators verified against the target iOS/Core ML version. Use INT8 or FP16 only if validation shows the accuracy target is preserved, and require the converted model to avoid CPU/GPU fallback in the latency-critical path.

    Acceptance criteria: >85% top-1 on the 50-class AR validation set using the production camera preprocessing; p50 and p95 inference latency under 3ms on iPhone 15 Pro at 30 FPS; whole-app battery drain under 4%/hr measured in the AR scenario; model package size and activation memory bounded by measured load-time and thermal constraints; and output stability under sustained operation. Candidate families such as MobileNetV3 or EfficientNet-Lite are acceptable only if the converted, quantized, on-device build meets those measured criteria.
  common_mistake: |
    **The Pitfall:** Focusing entirely on generic FLOP counts while ignoring hardware-specific activation and layer constraints.
    **The Rationale:** Candidates specify standard ImageNet architectures without restricting custom ops or verifying CoreML ANE compatibility.
    **The Consequence:** The resulting model falls back to the CPU/GPU, completely violating the strict <3ms latency and 4% battery constraints.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Target: 30 FPS (33.3ms/frame).
       - Battery capacity: 13Wh.
       - Battery drain target: <4% per hour.
       - Latency target: <3ms inference per frame.
    2. **Calculations:**
       - Total allowed average power for the AR session: 0.04 x 13Wh / 1h = 0.52W.
       - A 3ms inference at 30 FPS has an inference duty fraction of 30 x 3ms = 90ms/s = 9%.
       - The 0.52W budget covers the whole feature: camera, ISP, display, rendering, preprocessing, memory traffic, inference, and postprocessing.
       - Therefore the model spec cannot derive a guaranteed latency from power alone. It must require both measured <3ms latency and measured whole-app <4%/hr battery drain under the same scenario.
    3. **Conclusion & Interpretation:**
       - **Result: Deployment-Bound Specification.** Define an ANE-compatible static model with supported ops, bounded input/activation sizes, validated INT8/FP16 accuracy above 85%, and on-device p95 latency and power measurements that meet the AR targets.
