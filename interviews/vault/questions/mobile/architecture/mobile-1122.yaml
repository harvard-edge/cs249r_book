title: Architecting a Real-Time Video Segmentation Model for Exynos NPU
scenario: You are tasked with designing a real-time background blur feature for 1080p video calls running at 30 FPS on a mobile NPU (34.7 TOPS). The device shares its 12 GB LPDDR5X memory across the CPU, GPU, ISP, and NPU. You must design the CNN architecture to maximize accuracy while strictly adhering to a 15ms per-frame latency budget.
question: How would you evaluate the trade-offs of using larger feature maps early in the network versus aggressive downsampling given the shared memory bandwidth constraints?
details:
  realistic_solution: A strong L5 design evaluates the accuracy gained from preserving early spatial detail against the bandwidth cost of repeatedly reading and writing large 1080p feature maps in shared LPDDR5X. Larger early maps can improve mask boundaries and reduce decoder burden, but only if the early blocks have enough arithmetic intensity and activation reuse to fit the 15ms frame budget. Aggressive downsampling lowers activation traffic and contention with the ISP/GPU, but can destroy fine edges if done before enough local texture has been encoded. A balanced design uses a small high-resolution stem, early stride-2 reduction once edge features are captured, skip connections or a lightweight decoder for detail recovery, and profiling of bytes moved per layer rather than choosing solely by FLOPs.
  common_mistake: |
    **The Pitfall:** Optimizing solely for FLOPs by aggressively using depthwise separable convolutions everywhere.
    **The Rationale:** Candidates rely on standard mobile CNN heuristics, ignoring that depthwise layers possess low arithmetic intensity and easily become memory bandwidth bound.
    **The Consequence:** The model hits the shared memory bandwidth wall, starving the ISP and GPU during the live video call and exceeding the 15ms latency budget.
  napkin_math: |
    **Assumptions & Constraints:**
    - Mobile NPU with 34.7 TOPS. Latency budget: 15ms per frame.
    - LPDDR5X bandwidth: 60 GB/s. Contention limits NPU to 30% (~18 GB/s).
    - Compute and memory budgets are separate constraints.

    **Calculations:**
    - Compute budget per frame: 34.7 TOPS x 0.015s = 520.5 GOPS.
    - Effective NPU memory traffic budget per frame: 18 GB/s x 0.015s = 270 MB moved.
    - 270 MB is not a feature-map size limit; it is the approximate total DRAM traffic available for weights, activations, reads, writes, and any graph partition transfers during the frame.

    **Conclusion & Interpretation:**
    - **Result: 520.5 GOPS compute budget and about 270 MB of DRAM traffic per frame.** If early high-resolution layers cause repeated activation traffic near or above 270 MB, the design becomes memory-bound; otherwise preserving early maps may be worth the accuracy improvement.
