title: Evaluating Transformer Architectures for On-Device Deployment on Apple A17 Pro
scenario: 'You are tasked with deploying a new Natural Language Understanding (NLU) model on an iPhone powered by the Apple A17 Pro chip (35 TOPS, ~5W budget, 8 GB RAM). Your team has two candidate Transformer-based models quantized to INT8: Model A (300M parameters) and Model B (50M parameters). Assume an average activation memory footprint of 4x the parameter memory during inference, and a peak operational throughput requirement of 200 inferences per second.'
question: How would you compare the two INT8 Transformer models for feasibility on A17 Pro across memory, throughput, and power?
details:
  realistic_solution: |
    Model B is the safer production choice unless Model A has a large accuracy advantage. Both models fit in 8 GB under the stated 4x activation assumption, but Model A consumes about 1.5 GB before app/OS buffers while Model B consumes about 250 MB. For throughput, assume Model A costs 30 GMAC/inference and Model B scales to about 5 GMAC/inference. At 30% sustained use of 35 TOPS, Model A supports about 350 inferences/sec raw and Model B about 2100 inferences/sec raw, so both clear 200 inferences/sec on compute. Power is the differentiator: Model A uses much more bandwidth and sustained NPU duty cycle, so it is riskier near the 5W thermal budget; Model B has more headroom for battery, UI responsiveness, and batching.
  common_mistake: |
    **The Pitfall:** Only considering parameter count for memory footprint.
    **The Rationale:** Candidates neglect activation memory, intermediate tensors, and system overhead, or directly compare TOPS to ops/sec without accounting for hardware efficiency.
    **The Consequence:** A model is selected that fits on disk but OOMs during inference or violates the power budget.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model A (300M params) and Model B (50M params).
    - INT8 weights: 1 byte/parameter.
    - Activation memory footprint is 4x the parameter memory.
    - A17 Pro peak: 35 TOPS; assume 30% sustained utilization = 10.5 TOPS.
    - Throughput target: 200 inferences/sec.
    - Unit convention: count 1 MAC as 2 operations; equivalently, compare GMAC/s to TOPS only after converting MACs to operations.

    **Calculations:**
    - Model A memory = 300 MB weights + 4 * 300 MB activations = 1.5 GB, plus app/runtime buffers.
    - Model B memory = 50 MB weights + 4 * 50 MB activations = 250 MB, plus app/runtime buffers.
    - Model A compute at 30 GMAC/inference and 200 inf/sec = 6,000 GMAC/s = about 12 TOPS under the 2 ops/MAC convention.
    - Model B compute at about 5 GMAC/inference and 200 inf/sec = 1,000 GMAC/s = about 2 TOPS under the same convention.
    - Sustained budget estimate = 35 TOPS * 30% = 10.5 TOPS.

    **Conclusion & Interpretation:**
    - **Result: Both fit memory, but Model A is compute/power-risky under a strict 2 ops/MAC convention.** Model A is near or slightly above the sustained 10.5 TOPS budget at 200 inf/sec, while Model B leaves much more bandwidth and power margin.
