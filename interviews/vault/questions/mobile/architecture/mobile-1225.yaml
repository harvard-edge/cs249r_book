title: Architecting an Efficient CNN for Exynos 2400 NPU
scenario: You are tasked with designing a real-time object detection CNN for a flagship smartphone. The system needs to process live 1080p video streams concurrently with heavy ISP tasks, relying on a shared unified memory pool.
question: How should an Exynos 2400 object-detection CNN backbone reduce memory bandwidth while using the NPU effectively?
details:
  realistic_solution: |
    A strong L5 design evaluates the tradeoff between FLOPs and memory access costs (MAC), favoring architectures with higher arithmetic intensity that keep intermediate activations within the NPU's local SRAM. To mitigate the shared LPDDR5X memory bottleneck, the architecture should incorporate aggressive spatial downsampling early in the network (e.g., using a stem layer with a large stride) and utilize INT8 quantization (or W8A8) to halve the activation memory footprint compared to FP16, alongside operation fusion to prevent costly trips to main memory.
  common_mistake: |
    **The Pitfall:** Defaulting to standard depthwise separable convolutions (like MobileNetV2).
    **The Rationale:** Candidates rely on standard mobile architectures without considering modern NPU constraints.
    **The Consequence:** They ignore the shared 12 GB LPDDR5X memory pool, failing to account for severe bandwidth contention when the ISP is simultaneously active.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target: Real-time 30 FPS processing of 1080p RGB video.
    - Compute budget: ~1.15 Tera-Operations per frame (34.7 TOPS / 30 FPS).
    - Input size: 1920 * 1080 * 3 bytes = 6.22 MB.

    **Calculations:**
    - Input bandwidth at 30 FPS = 6.22 MB * 30 = 186.6 MB/s.
    - If intermediate activations require 100 MB of reads/writes per frame: 100 MB * 30 FPS = 3.0 GB/s.
    - Total inference bandwidth demand: >3.18 GB/s.

    **Conclusion & Interpretation:**
    - **Result: >3.18 GB/s (Memory Bandwidth-Bound)**. A typical efficient CNN using 5 GOPS leaves massive compute headroom. The true constraint is the >3 GB/s demand on shared LPDDR5X memory, which severely impacts concurrent ISP operations unless activation memory footprint is aggressively minimized via quantization and fusion.
