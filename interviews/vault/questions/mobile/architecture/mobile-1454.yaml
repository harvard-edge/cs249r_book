title: Hardware-Aware NAS for Hexagon NPU Realization
scenario: You are leading the deployment of a real-time video super-resolution model. You need to use hardware-aware NAS to design an architecture that maximizes quality while strictly meeting a 16ms latency budget on the NPU.
question: How would you design a hardware-aware NAS search space to ensure the resulting architecture stays compute-bound without hitting NPU memory bandwidth limits?
details:
  realistic_solution: 'A strong L5 candidate will formulate a search space tailored to the NPU, favoring operators that map well to the hardware''s INT8 matrix math units, such as properly quantized convolutions with hardware-friendly channel counts. They will incorporate an on-device latency predictor or lookup table derived directly from the hardware, and ensure the memory bandwidth requirements fit within the shared memory budget when operating concurrently.'
  common_mistake: |
    **The Pitfall:** Constraining NAS solely on proxy metrics like FLOPs or parameter counts.
    **The Rationale:** Candidates ignore the NPU's specific INT8 arithmetic limits or the shared memory bandwidth wall.
    **The Consequence:** NAS selects operations that are fast on standard CPUs but unsupported or inefficient on NPU tensor accelerators, resulting in severe memory bottlenecks.
  napkin_math: |
    **Assumptions & Constraints:**
    - Peak Compute: 45 TOPS INT8 (Assume ~50% effective = 22.5 TOPS).
    - Latency Budget: 16ms (0.016s) per frame.
    - NPU Memory Bandwidth Allocation: ~60 GB/s.

    **Calculations:**
    - Max Operations: 22.5 TOPS * 0.016s = 360 GOPs per frame.
    - Max Data Transfer: 60 GB/s * 0.016s = 960 MB per frame.

    **Conclusion & Interpretation:**
    - **Result: Memory-Bound Risk.** NAS must strictly penalize architectures moving >960 MB/frame to stay compute-bound.
