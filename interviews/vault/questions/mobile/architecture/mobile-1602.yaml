title: A17 Pro Neural Engine and Depthwise Separable Convolutions
scenario: You are tasked with optimizing a CNN model for deployment on an NPU with 35 TOPS and 8 GB unified memory. Your team is considering depthwise separable convolutions.
question: How should depthwise separable convolutions be used to improve mobile inference efficiency without destroying accuracy?
details:
  realistic_solution: |
    Apply them primarily in the later, wider layers of the network where computational savings are most significant and the receptive field is already well-formed.
  common_mistake: |
    **The Pitfall:** Treating depthwise separable convolutions as a universal drop-in replacement.
    **The Rationale:** Candidates blindly apply the optimization to every layer, failing to realize that early layers have very few channels and need full representational capacity.
    **The Consequence:** The model suffers a catastrophic drop in accuracy, requiring extensive architectural rollback and retraining.
  napkin_math: |
    **Assumptions & Constraints:**
    - Standard MACs: 14x14 spatial, 3x3 kernel, 256 in, 512 out.

    **Calculations:**
    - Standard MACs: 14x14 * 3x3 * 256 * 512 = ~231.2M MACs.
    - Depthwise MACs: 14x14 * 3x3 * 256 = ~0.45M MACs.
    - Pointwise MACs: 14x14 * 256 * 512 = ~25.6M MACs.
    - Separable Total: 0.45M + 25.6M = ~26.1M MACs.

    **Conclusion & Interpretation:**
    - **Result: 8.8x MAC Reduction.** Applying this in later (high-channel) layers massively reduces MACs, saving power without the accuracy drop seen if applied to early layers.
