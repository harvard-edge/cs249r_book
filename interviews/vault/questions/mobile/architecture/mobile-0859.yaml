title: 'Mastery: explain compound scaling failure modes for mobile deployment'
scenario: Your team deployed an EfficientNet-B0 model (224x224, 0.39 GFLOPs) meeting a 5ms NPU SLA. A PM requests scaling up to B3 (300x300, 1.8 GFLOPs) for better accuracy while strictly maintaining the <5ms SLA.
question: Does EfficientNet-B3 fit the unchanged 5ms mobile NPU SLA, and where does compound scaling break down?
details:
  realistic_solution: |
    EfficientNet-B3 severely violates the 5ms SLA. Compound scaling breaks down on mobile NPUs because spatial resolution scaling fundamentally alters the hardware tiling strategy. High-resolution intermediate feature maps exceed the capacity of the NPU's localized SRAM (e.g., Hexagon HTP). This forces the compiler to slice the tensors into smaller spatial tiles, drastically increasing DMA transfers and scheduling overhead. While theoretical FLOPs increase by 4.6x, the non-linear tiling overhead scales quadratically with resolution, pushing latency far beyond linear projections.
  common_mistake: |
    **The Pitfall:** Projecting B3 latency purely by multiplying by the FLOP ratio.
    **The Rationale:** Candidates assume NPU latency scales linearly with theoretical FLOPs.
    **The Consequence:** They ignore that resolution scaling changes the NPU tiling strategy and that larger intermediate feature maps may exceed on-chip SRAM.
  napkin_math: |
    **Assumptions & Constraints:**
    - Baseline B0 latency: 1.5 ms (0.39 GFLOPs, 224x224).
    - Target B3: 1.8 GFLOPs, 300x300 resolution.
    - Target SLA: < 5 ms.

    **Calculations:**
    - Linear FLOP ratio = 1.8 GFLOPs / 0.39 GFLOPs = 4.6x.
    - Spatial resolution overhead = (300/224)^2 = 1.79x increase in spatial tile count.
    - Tiling penalty multiplier (empirical): ~1.15x to 1.2x.
    - Projected B3 Latency = 1.5 ms * 4.6 (FLOPs) * 1.15 (tiling penalty) = 7.93 ms.

    **Conclusion & Interpretation:**
    - **Result: 7.93 ms (Compute & Tiling-Bound)**. Projecting latency purely via FLOPs fails. The quadratic increase in spatial tiling overhead pushes the latency to ~8ms, definitively breaking the 5ms SLA. B2 (260x260) is the absolute limit.
