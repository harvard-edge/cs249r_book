title: Unstructured Pruning Latency on Snapdragon 8 Gen 3
scenario: A MobileViT-XS model (2.3M params, 0.7 GFLOPS) on Snapdragon 8 Gen 3 (45 TOPS) runs at 8ms. The team applies magnitude-based unstructured pruning to 50% of weights to target 4ms latency, but they observe only a 15% latency reduction.
question: Why does 50% unstructured pruning on MobileViT-XS yield only a 15% latency reduction on Snapdragon 8 Gen 3?
details:
  realistic_solution: Unstructured pruning creates 50% sparse weight matrices, but on a dense Qualcomm HTP/QNN execution path those zeros are still stored in dense tensors and processed by dense INT8 kernels. The original model takes 8ms for only 0.7 GFLOPS, so a 15% latency cut is consistent with smaller weight storage and better cache behavior, not with removing half of the NPU arithmetic. To target a true 4ms result, use structured pruning that removes channels or filters and exports smaller dense operators, or use an explicitly supported sparse runtime path if the deployment stack proves one exists.
  common_mistake: |
    **The Pitfall:** Expecting proportional speedups from unstructured sparsity on standard hardware.
    **The Rationale:** Candidates often believe unstructured pruning reduces FLOPs in a way the hardware can natively accelerate.
    **The Consequence:** On the dense HTP/QNN path, the hardware still performs dense work on tensors containing zeros, so latency improves only through memory and cache effects rather than a proportional compute reduction.
  napkin_math: |
    **Assumptions & Constraints:**
    - MobileViT-XS (2.3M params).
    - Snapdragon 8 Gen 3 HTP/QNN deployment uses dense INT8 kernels for this model.
    - Unstructured pruning yields 50% sparsity.
    - Baseline latency is 8 ms for 0.7 GFLOPS.

    **Calculations:**
    - Dense execution still schedules the same 0.7 GFLOPS of work; the sparse weights do not automatically become a 0.35 GFLOPS kernel.
    - Observed latency after pruning: 8 ms * (1 - 0.15) = 6.8 ms, not the 4 ms target.
    - The 1.2 ms improvement is plausibly from reduced weight traffic and cache misses, not guaranteed sparse compute acceleration.
    - Structured pruning (50% channels): removes entire filters -> 50% true FLOP reduction.

    **Conclusion & Interpretation:**
    - **Result: no automatic dense-kernel compute reduction.** The observed ~15% latency gain is a memory/cache effect on this dense deployment path, not a universal law for all sparse runtimes; structured pruning is needed to create smaller dense matrices the NPU can reliably accelerate.
