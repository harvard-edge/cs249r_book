title: Layer-wise Relevance Propagation for Pruning Sensitivity on Snapdragon 8 Gen 3
scenario: A MobileViT-XS model (2.3M params, 0.7 GFLOPS) on Snapdragon 8 Gen 3 (45 TOPS) runs at 8ms. The team applies magnitude-based unstructured pruning to 50% of weights to target 4ms latency, but they observe only a 15% latency reduction.
question: Why does 50% unstructured pruning on MobileViT-XS yield only a 15% latency reduction on Snapdragon 8 Gen 3?
details:
  realistic_solution: 'Unstructured pruning creates 50% sparse weight matrices. Standard Qualcomm HTP (Hexagon Tensor Processor) processes dense INT8 matrix operations — 50% zeros in dense format provide no speedup because the hardware still loads and multiplies all values (zero × anything = zero, but the multiply still occurs). Only 15% speedup likely came from reduced memory footprint (fewer cache misses, not compute reduction). To achieve 50% speedup: use structured pruning (remove entire channels/filters) → dense smaller matrices → full hardware acceleration. Alternative: use Qualcomm QNN SDK''s sparse acceleration if available on HTP v73.'
  common_mistake: |
    **The Pitfall:** Expecting proportional speedups from unstructured sparsity on standard hardware.
    **The Rationale:** Candidates often believe unstructured pruning reduces FLOPs in a way the hardware can natively accelerate.
    **The Consequence:** Standard NPUs process dense matrix operations, meaning the hardware still performs computations on zeros, resulting in no compute speedup and only minor memory-related gains.
  napkin_math: |
    **Assumptions & Constraints:**
    - MobileViT-XS (2.3M params).
    - Snapdragon 8 Gen 3 (45 TOPS) processes dense matrices.
    - Unstructured pruning yields 50% sparsity.

    **Calculations:**
    - Unstructured 50% sparsity: hardware still processes dense matrices -> 0% FLOP reduction.
    - Memory footprint reduction: 50% smaller model yields fewer cache misses -> observed ~15% speedup.
    - Structured pruning (50% channels): removes entire filters -> 50% true FLOP reduction.

    **Conclusion & Interpretation:**
    - **Result: 50% true reduction (Compute-Bound)**. Structured pruning must be used to create smaller dense matrices the NPU can accelerate.
