title: Optimizing On-Device Object Detection for Google Tensor G3
scenario: 'Your team is developing a new real-time augmented reality application for mobile devices, which relies heavily on on-device object detection. The current baseline object detection model (e.g., a standard ResNet-50 based Faster R-CNN) achieves the required accuracy but is too slow and consumes too much power for real-time operation (targeting <50ms inference latency).'
question: 'How would you redesign an on-device object detection model to meet sub-50ms latency while preserving accuracy and efficiency?'
details:
  realistic_solution: 'A realistic solution would involve leveraging a mobile-optimized CNN architecture like MobileNetV3 or EfficientNet (specifically designed for edge devices), incorporating depthwise separable convolutions and inverted residuals to drastically reduce FLOPs and parameter count while maintaining accuracy. The candidate should discuss fine-tuning a pre-trained model for the specific task, utilizing post-training or quantization-aware training to INT8 for efficient execution on the TPU. Furthermore, they should articulate how to map the model operations effectively to the 7.5 TOPS TPU for minimal latency.'
  common_mistake: |
    **The Pitfall:** Proposing to directly quantize the existing large ResNet-50 model without architectural redesign.
    **The Rationale:** Engineers often rely on post-training quantization as a silver bullet for latency, without realizing that macro-architectures built for server GPUs remain inefficient on mobile TPUs.
    **The Consequence:** The model remains too slow due to high FLOPs and poor memory access patterns that don't map well to the TPU.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target Latency: <50ms (0.05s).
    - TPU Compute: 7.5 TOPS peak (assume conservative 10% utilization = 0.75 TOPS usable).
    - Model Size Target: INT8 MobileNetV3-small (~2.5M parameters).

    **Calculations:**
    - Max Operations Budget: 0.75 × 10^12 ops/s × 0.05s = 37.5 GFLOPs.
    - Memory Bandwidth: 2.5MB fits entirely in the TPU's local SRAM cache.
    - Efficiency Gains: Depthwise separable convolutions reduce FLOPs by 8-9x vs standard ResNet-50.

    **Conclusion & Interpretation:**
    - **Result: Compute-Bound Architecture Optimization**. A MobileNet-based architecture eliminates slow DRAM trips and stays well under the 37.5 GFLOPs budget, easily achieving the **<50ms latency target**.
