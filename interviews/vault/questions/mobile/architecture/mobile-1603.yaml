title: Optimizing On-Device Object Detection for Google Tensor G3
scenario: Your team is developing a new real-time augmented reality application for mobile devices, which relies heavily on on-device object detection. The current baseline object detection model (e.g., a standard ResNet-50 based Faster R-CNN) achieves the required accuracy but is too slow and consumes too much power for real-time operation (targeting <50ms inference latency).
question: How would you redesign an on-device object detection model to meet sub-50ms latency while preserving accuracy and efficiency?
details:
  realistic_solution: |
    Replace the two-stage Faster R-CNN style detector with a mobile single-stage detector: MobileNetV3-SSD, YOLO-tiny, EfficientDet-Lite, or a custom anchor-light head on a mobile backbone. Reduce input resolution only as far as accuracy allows, simplify the feature pyramid to the few scales needed by the AR objects, reduce anchor count/classes per location, and use a cheap detection head with fused depthwise and pointwise convolutions. Train with quantization-aware INT8, distill from the accurate baseline, and benchmark pre/post-processing including NMS because those costs can dominate a small detector.
  common_mistake: |
    **The Pitfall:** Proposing to directly quantize the existing large ResNet-50 model without architectural redesign.
    **The Rationale:** Engineers often rely on post-training quantization as a silver bullet for latency, without realizing that macro-architectures built for server GPUs remain inefficient on mobile TPUs.
    **The Consequence:** The model remains too slow due to high FLOPs and poor memory access patterns that don't map well to the TPU.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target Latency: <50ms (0.05s).
    - TPU Compute: 7.5 TOPS peak; assume 15% sustained utilization for this detector = 1.125 TOPS usable.
    - Candidate detector: INT8 MobileNetV3-SSD/EfficientDet-Lite class model with about 3-5 GMAC backbone+head cost.
    - Pre/post-processing and NMS must fit in the same 50ms budget.

    **Calculations:**
    - Compute budget = 1.125e12 ops/s * 0.05s = 56.25 GOPS.
    - A 5 GMAC detector is roughly 10 GOPS if counting multiply and add separately.
    - Estimated NPU compute time = 10 GOPS / 1.125 TOPS ≈ 8.9ms.
    - Allocate 10-15ms for image resize, tensor copies, box decode, and NMS, leaving margin for kernel launch and memory stalls.

    **Conclusion & Interpretation:**
    - **Result: Pipeline-Latency Bound.** A mobile single-stage detector with simplified pyramid/head and INT8 QAT can plausibly fit under 50ms, but only if detection overhead and NMS are measured and kept within the non-compute budget.
