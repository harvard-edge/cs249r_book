title: Differential privacy for A17 Pro keyboard LoRA training
scenario: Apple's on-device personalization for a keyboard model uses LoRA fine-tuning on user text. You must design a differential privacy mechanism for rank-4 on-device training on an A17 Pro.
question: How would you design a differential privacy mechanism for rank-4 on-device LoRA training on the A17 Pro?
details:
  realistic_solution: 'DP-LoRA on device: (1) compute per-example gradients for only the trainable adapter weights; (2) clip each example or microbatch update to a fixed norm C chosen from representative gradient norms; (3) add Gaussian noise with scale sigma*C before applying or reporting the update; (4) use a moments/RDP accountant with the sampling rate, number of local steps, delta, and target epsilon to choose sigma; (5) cap training by battery, thermal state, and privacy budget. LoRA improves utility by reducing the trainable surface and compute cost, but DP noise is governed by clipping sensitivity, sampling, and the accountant, not by parameter count alone.'
  common_mistake: |
    **The Pitfall:** Applying standard DP-SGD clip norms designed for massive server-side training directly to mobile edge training.
    **The Rationale:** Engineers assume DP parameters are mathematically universal and fail to adjust for the vastly different gradient distributions on small local batches.
    **The Consequence:** Over-clipping (adding too much noise, destroying utility) or under-clipping (violating strict user privacy guarantees).
  napkin_math: |
    **Assumptions & Constraints:**
    - Trainable module: rank-4 LoRA adapter, not the frozen base model.
    - Clip norm: C chosen from per-example adapter gradient statistics.
    - Privacy target: epsilon and delta enforced by an RDP or moments accountant.

    **Calculations:**
    - Per-example clipping bounds update sensitivity to C regardless of the number of adapter parameters.
    - Gaussian noise is added as N(0, (sigma*C)^2) to each clipped aggregate.
    - The accountant composes privacy loss over sampled local steps; reducing steps, sampling rate, or clip norm can improve utility at the same privacy target.

    **Conclusion & Interpretation:**
    - **Result: Accountant-Bound DP-LoRA.** The design should tune C, sigma, sampling, and step count against a formal privacy accountant. LoRA helps mobile feasibility, but it does not automatically reduce DP noise by a parameter-count ratio.
