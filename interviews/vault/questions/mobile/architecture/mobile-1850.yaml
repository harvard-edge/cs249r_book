title: On-Device Personalization with Differential Privacy on Mobile
scenario: Apple's on-device personalization for a keyboard model uses LoRA fine-tuning on user text. You must design a differential privacy mechanism for rank-4 on-device training on an A17 Pro.
question: How would you design a differential privacy mechanism for rank-4 on-device LoRA training on the A17 Pro?
details:
  realistic_solution: 'DP-LoRA on device: (1) clip per-sample gradients of adapter weights at C=0.1 (empirically determined from adapter gradient percentile distribution on representative user data); (2) add Gaussian noise σ=C×√(2ln(1.25/δ))/ε to clipped gradients; (3) accumulate local updates before sending to the server for federated aggregation; (4) ε=8 per day budget (Apple''s reported standard for on-device learning). Key: adapter''s small parameter count (rank-4: 786K) means the noise added is dimensionally smaller than full model training, preserving utility.'
  common_mistake: |
    **The Pitfall:** Applying standard DP-SGD clip norms designed for massive server-side training directly to mobile edge training.
    **The Rationale:** Engineers assume DP parameters are mathematically universal and fail to adjust for the vastly different gradient distributions on small local batches.
    **The Consequence:** Over-clipping (adding too much noise, destroying utility) or under-clipping (violating strict user privacy guarantees).
  napkin_math: |
    **Assumptions & Constraints:**
    - Full model: 1B params. Rank-4 adapter: 786K params.
    - DP variables: bound C=0.1, budget epsilon=8.

    **Calculations:**
    - Noise Reduction Advantage: sqrt(1B / 786K) = ~35.6x less dimensional noise.
    - Per-Device SNR: With C=0.1 and epsilon=8, SNR is ~0.0017.
    - Federated Aggregation: Over N=10,000 devices improves SNR by sqrt(10000) = 100x.

    **Conclusion & Interpretation:**
    - **Result: ~0.17 Aggregated SNR (Privacy-Bound)**. The aggregated update becomes highly usable, proving LoRA's dimensional efficiency enables robust on-device differential privacy.
