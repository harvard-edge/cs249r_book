title: 'Evaluating Pipeline Sync Barriers on Snapdragons'
scenario: A Snapdragon 8 Gen 3 streams video frames. The CPU pre-processes frames (5ms) while the Hexagon NPU runs inference (8ms).
question: What is the pipeline's overall throughput and bottleneck if a strict memory synchronization barrier is added between every frame?
details:
  realistic_solution: 'With perfect pipelining, throughput is NPU-bound (8ms/frame or 125 fps). A sync barrier forces sequential execution (CPU then NPU), preventing the CPU from starting frame N+1 until NPU finishes frame N. This increases per-frame latency to 13ms and bottlenecks throughput to 1/13ms (76 fps).'
  common_mistake: |
    **The Pitfall:** Assuming throughput remains bound only by the heaviest stage (8ms).
    **The Rationale:** Failing to understand that a strict sync barrier destroys parallel overlapping, forcing entirely sequential execution.
    **The Consequence:** Overestimating pipeline performance by ~64%.
  napkin_math: |
    **Assumptions & Constraints:**
    - CPU pre-processing: 5ms.
    - NPU inference: 8ms.

    **Calculations:**
    - Pipelined throughput: 1000 / max(5, 8) = 125 FPS.
    - Sequential latency (with barrier): 5ms + 8ms = 13ms.
    - Synchronized throughput: 1000 / 13ms = 76 FPS.

    **Conclusion & Interpretation:**
    - **Result: 76 FPS (Throughput-Bound)**. Throughput degrades to 76 FPS, bottlenecked by the enforced sequential execution.
