title: The ANE vs GPU Power Efficiency
scenario: A colleague asserts that the mobile NPU is always 8× more efficient per watt than the mobile GPU, basing this on the NPU's INT8 TOPS rating versus the GPU's FP16 TFLOPS rating.
question: How should you compare NPU and GPU TOPS per watt, and when might the GPU still be preferable despite lower efficiency?
details:
  realistic_solution: 'First, normalize the comparison. NPU: 35 TOPS (INT8) at 2W -> **17.5 TOPS/W**. GPU: 2.15 TFLOPS (FP16) at 5W -> **0.43 TFLOPS/W**. As a rough comparable-op heuristic, count the GPU as ~4.3 INT8-equivalent TOPS, or 0.86 TOPS/W; this is not a true hardware-equivalence claim. The NPU is genuinely ~20x more energy-efficient for supported ops. However, the GPU can be preferable if the model relies on unsupported custom operations, avoids expensive CPU fallbacks, has better end-to-end latency, or reduces handoff/synchronization penalties.'
  common_mistake: |
    **The Pitfall:** Comparing INT8 TOPS to FP16 TFLOPS directly.
    **The Rationale:** Candidates perform raw division (35/2 vs 2.15/5) without normalizing data types or considering unsupported operations that force CPU fallback.
    **The Consequence:** Choosing the 'efficient' NPU for models with unsupported ops, resulting in worse end-to-end latency and higher total energy drain.
  napkin_math: |
    **Assumptions & Constraints:**
    - NPU: 35 TOPS (INT8) at 2W.
    - GPU: 2.15 TFLOPS (FP16) at 5W.
    - For a rough comparable-op view, count 1 FP16 operation as about 2 INT8-equivalent operations. This is a normalization heuristic, not a direct statement about the GPU's native INT8 hardware.

    **Calculations:**
    - NPU Efficiency = 35 TOPS / 2W = 17.5 TOPS/W.
    - GPU FP16 Efficiency = 2.15 TFLOPS / 5W = 0.43 TFLOPS/W.
    - Comparable-op GPU efficiency: 0.43 TFLOPS/W * 2 = 0.86 INT8-equivalent TOPS/W.
    - Native supported-op comparison: NPU is about 17.5 / 0.86 = 20x more efficient for ops it can run well.
    - Unsupported-op-heavy example: NPU path = 3ms supported NPU work + 8ms CPU fallback + 7.5ms handoff/synchronization = 18.5ms at about 3W average = 55.5 mJ.
    - Full GPU path example: 12ms at 5W = 60 mJ.

    **Conclusion & Interpretation:**
    - **Result: Fallback-bound efficiency trap.** The NPU remains far more efficient for supported INT8 kernels, but if unsupported operations force CPU fallback and synchronization, the GPU can be preferable for end-to-end latency and consistency even if its native TOPS/W is worse.
