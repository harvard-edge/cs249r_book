title: Designing a 32K Context Window for Google Tensor G3
scenario: You are designing an on-device document summarization feature for a Pixel device powered by the Google Tensor G3. The feature needs to handle a 32,768 (32K) token context window locally using an optimized LLM (like Gemini Nano). However, the device's 12 GB LPDDR5X RAM is heavily shared with the OS, leaving a strict 2 GB budget for the KV cache.
question: "How would you design a novel attention architecture and memory management strategy that fits a 32K context window within a 2 GB budget while maximizing TPU utilization?"
details:
  realistic_solution: A strong L6+ solution synthesizes Grouped-Query Attention (GQA) to drastically reduce the KV cache size, combined with Sliding Window Attention (SWA) or an attention sink mechanism to bound memory usage for streaming inputs. The candidate should design a block-wise computation strategy (similar to FlashAttention) tailored to keep active tiles within the TPU's local SRAM, minimizing expensive reads from the 12 GB LPDDR5X memory and keeping the 7.5 TOPS compute units fed.
  common_mistake: |
    **The Pitfall:** Suggesting standard Multi-Query Attention (MQA) without doing the math, or proposing sparse attention patterns.
    **The Rationale:** Candidates throw out buzzwords without verifying if MQA actually brings the 32K context below the strict 2 GB threshold, or they forget that sparse patterns run terribly on dense accelerators.
    **The Consequence:** The model either OOMs the device or the inference latency spikes drastically due to poor TPU compilation.
  napkin_math: |
    **Assumptions & Constraints:**
    - Baseline constraints: 16 layers, d=2048, 16 Q-heads.

    **Calculations:**
    - Standard MHA KV Cache: 2 (K,V) * 32,768 * 16 * 2048 * 2 bytes = 4.29 GB (Exceeds 2 GB).
    - GQA Solution: Use 2 KV heads (hidden dim drops to 256).
    - New KV Cache = 2 * 32,768 * 16 * 256 * 2 bytes = 536.8 MB (Fits comfortably).
    - TPU Compute: Attention scores (QK^T) for a 1024-token chunk requires 2 * 1024 * 32768 * 2048 = 137.4 GFLOPs.
    - At 7.5 TOPS, time = 137.4e9 / 7.5e12 = ~18.3 ms.

    **Conclusion & Interpretation:**
    - **Result: 536.8 MB (Memory-Bound)**. GQA shrinks the cache by 8x, making a 32K context window highly viable on mobile.
