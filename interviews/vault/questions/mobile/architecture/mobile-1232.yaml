title: Architecting Real-Time Translation on Tensor G3
scenario: Design an offline, real-time speech translation system for a device powered by the Google Tensor
  G3. The hardware features an on-device TPU with 7.5 TOPS optimized for on-device LLMs (Gemini Nano)
  and shares 12 GB of LPDDR5X RAM with the OS. You must evaluate the architectural tradeoffs between deploying
  a monolithic encoder-decoder model versus a decoupled pipeline (an encoder-only acoustic model feeding
  a decoder-only LLM) and justify your choice based on these hardware constraints.
question: How would you design an offline, real-time speech translation system for a device powered by
  the Google Tensor G3?
details:
  realistic_solution: 'The optimal design leverages a decoupled architecture: a lightweight encoder-only
    model for ASR and a 4-bit quantized decoder-only LLM for translation. This aligns perfectly with the
    Tensor G3''s hardware optimizations. The encoder processes audio streams efficiently in chunks, while
    the decoder-only LLM maximizes the TPU''s 7.5 TOPS and stays within a strict memory budget, avoiding
    the memory bandwidth bottlenecks typically associated with large cross-attention layers in traditional
    encoder-decoder setups.'
  common_mistake: '**The Pitfall:** Proposing a large monolithic encoder-decoder model and ignoring memory
    constraints.

    **The Rationale:** Candidates fail to recognize that the Tensor G3''s TPU is explicitly optimized
    for decoder-only LLMs like Gemini Nano.

    **The Consequence:** They assume the full 12 GB LPDDR5X is available, rather than allocating a safe
    1.5-2 GB budget for background ML tasks, leading to out-of-memory errors.'
  napkin_math: '**Assumptions & Constraints:**

    - 1.8B parameter decoder-only LLM at 4-bit quantization.

    - 12 GB LPDDR5X RAM with memory bandwidth of ~50 GB/s.

    - Target: 20 tokens/sec.


    **Calculations:**

    - Weights require ~0.9 GB.

    - Reading model for one token: 0.9 GB / 50 GB/s = 18 ms.

    - 20 tokens/sec = 50 ms/token.

    - Remaining time: 50 ms - 18 ms = 32 ms.


    **Conclusion & Interpretation:**

    - This comfortably leaves 32 ms for TPU compute (utilizing the 7.5 TOPS) and KV cache updates, proving
    the decoder-only approach is highly viable.'
