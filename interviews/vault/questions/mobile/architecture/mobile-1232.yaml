title: Architecting Real-Time Translation on Tensor G3
scenario: Design an offline, real-time speech translation system for a device powered by the Google Tensor G3. The SoC provides on-device ML acceleration and shares 12 GB of LPDDR5X RAM with the OS, but delegate support, operator coverage, and memory residency vary by model. You must evaluate the architectural tradeoffs between deploying a monolithic encoder-decoder model versus a decoupled pipeline (an encoder-only acoustic model feeding a decoder-only LLM) and justify your choice based on these hardware constraints.
question: How would you design an offline, real-time speech translation system for a device powered by the Google Tensor G3?
details:
  realistic_solution: A strong design evaluates both paths rather than assuming one is universally optimal. A compact end-to-end speech translation encoder-decoder can preserve prosody and translation context, but it is harder to fit and tune under mobile memory and latency limits. A decoupled pipeline with streaming ASR followed by a small quantized translation model is often easier to deploy, cache, test, and update, but it introduces ASR error propagation and may need text normalization or confidence-aware retries. Choose the pipeline only if its measured latency, memory, and quality meet the offline target; otherwise use a purpose-built compact sequence-to-sequence model.
  common_mistake: |
    **The Pitfall:** Proposing a large monolithic encoder-decoder model and ignoring memory constraints.
    **The Rationale:** Candidates overfit to advertised accelerator capability and fail to account for operator coverage, delegate fallbacks, and the smaller practical memory budget available to background ML tasks.
    **The Consequence:** They assume the full 12 GB LPDDR5X is available, rather than allocating a safe 1.5-2 GB budget for background ML tasks, leading to out-of-memory errors.
  napkin_math: |
    **Assumptions & Constraints:**
    - ASR encoder: 50-150 MB quantized weights plus streaming activations.
    - Translation model: 1.8B parameters at 4-bit needs about 0.9 GB for packed weights.
    - Runtime overhead includes KV cache, activations, tokenizer buffers, audio features, and delegate workspaces.
    - Target: real-time speech, so each 1 second audio chunk must finish in under about 1 second end-to-end.

    **Calculations:**
    - Translation weights: 1.8B * 0.5 bytes = 0.9 GB before metadata and packing overhead.
    - Add ASR weights, KV cache, activations, and runtime buffers: roughly 1.2-1.6 GB total working set for the decoupled path.
    - Latency budget must include ASR feature extraction/encoding, text handoff, autoregressive decoding, and post-processing; no single weight-size division proves viability.

    **Conclusion & Interpretation:**
    - The decoupled design is attractive because it keeps components small and independently measurable, but it is viable only after profiling the full pipeline. The monolithic encoder-decoder remains a valid choice if it gives better translation quality within the same memory and chunk-latency envelope.
