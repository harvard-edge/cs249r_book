title: Architecting an On-Device 3B LLM on an 8GB Phone
scenario: Design the complete system architecture for running a 3B parameter LLM on a phone with 8 GB RAM. The model must generate ≥20 tokens/second with 2048 context length.
question: How would you architect memory, inference, and UX to run a 3B parameter LLM at ≥20 tokens/sec on an 8GB phone?
details:
  realistic_solution: |
    Use a conservative on-device LLM architecture rather than promising that a tiny weight window can stream an arbitrary 3B model. Store the model as a separate INT4 download, but keep the quantized weights resident or memory-mapped with locked hot pages during an active session; flash paging should be a cold-start and resume mechanism, not the steady-state decode path. Use GQA/MQA and an INT8 or FP8 KV cache to keep 2048-token context manageable, reserve a fixed activation/scratch arena for the runtime, and cap context or summarize older turns when memory pressure rises. Run supported matmul/dequant kernels on the NPU or GPU through the vendor runtime, with CPU handling tokenizer, sampling, and unsupported control logic. For UX, stream tokens, use a small draft model only if it fits the same memory budget, evict on app backgrounding, and serialize compact session state rather than claiming instant full-cache resume in all cases.
  common_mistake: |
    **The Pitfall:** Loading the entire model into RAM and ignoring the KV cache.
    **The Rationale:** Candidates focus solely on INT4 weight quantization but fail to design a streaming architecture or address what happens during app switching.
    **The Consequence:** The app consumes too much resident memory, getting instantly killed by the OS (jetsam) when the user switches to a messaging app.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target: >=20 tokens/sec, 2048 context.
    - Hardware: 8 GB RAM phone, with about 3-4 GB safe app working set after OS and foreground apps.
    - Model footprint: 3B params at INT4 = 3B * 0.5 bytes = 1.5 GB.
    - Example KV geometry: 32 layers, 8 KV heads with GQA, head_dim 128, 2048 tokens, INT8 K and V.
    - Effective decode bandwidth is lower than peak because dequantization, cache reads, kernel launch overhead, and runtime scheduling consume headroom; assume 40% of a 100 GB/s peak.

    **Calculations:**
    - KV cache: 32 * 2048 * 8 * 128 * 2 tensors * 1 byte = 134,217,728 bytes = about 128 MiB.
    - Resident inference memory: 1.5 GB weights + 0.13 GB KV + 0.5 GB activation/scratch + 0.7 GB runtime, tokenizer, allocator, and fragmentation allowance = about 2.83 GB.
    - Theoretical full-weight read lower bound per decode token: 1.5 GB / 100 GB/s = 15 ms/token.
    - At 40% effective bandwidth: 1.5 GB / 40 GB/s = 37.5 ms/token, or 1000 / 37.5 = 26.7 tokens/sec.

    **Conclusion & Interpretation:**
    - **Result:** A 3B INT4 model can plausibly fit in an 8 GB phone with roughly a 2.8-3.2 GB active working set and can meet the 20 tokens/sec target if the vendor kernels sustain at least about 40% of peak memory bandwidth. The design should qualify performance with profiling rather than overpromising a 417 MB resident footprint or 67 tok/s decode.
