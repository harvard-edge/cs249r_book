title: Implement EfficientNet-B0 for Snapdragon 8 Gen 3 Hexagon NPU via QNN SDK
scenario: You are deploying EfficientNet-B0 to a Samsung Galaxy S24 using the QNN SDK for offline deployment. The model has Swish (SiLU) activations and SE blocks.
question: How should EfficientNet-B0 be converted and optimized for Snapdragon 8 Gen 3 Hexagon deployment with the QNN SDK?
details:
  realistic_solution: |
    Export PyTorch to ONNX with fixed batch and image dimensions, then validate the ONNX numerics against PyTorch before QNN conversion. For QNN HTP deployment, use an INT8/QDQ quantized graph with representative calibration data, static shapes, folded batch normalization, and activation patterns that the target QNN SDK and HTP backend actually support. SiLU should either be represented by a supported pattern, replaced with a validated approximation such as hard-swish, or left on another backend only if the latency budget allows it.

    Treat SE support as backend/version-specific. GlobalAveragePool, reshape, FC/1x1, sigmoid, multiply, and any broadcast in the SE path must be checked in the QNN converter report and profiling output; do not assume they are always fused or native on HTP. The release-quality path is: inspect converter warnings, confirm every latency-critical op is assigned to HTP, run qnn-net-run or the project profiler on device, compare outputs against the PyTorch reference, and keep a fallback plan if SiLU or SE blocks cause CPU execution.
  common_mistake: |
    **The Pitfall:** Using the generic ONNX -> QNN conversion without disabling dynamic shapes.
    **The Rationale:** Candidates overlook that Hexagon HTP compilation is sensitive to static shapes, quantization patterns, and support for the specific GAP, sigmoid, broadcast, and multiply ops used inside SE blocks.
    **The Consequence:** Unsupported or dynamically shaped fragments can prevent native HTP execution and force costly CPU fallback.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: EfficientNet-B0 (5.3M params, INT8).
    - End-to-end latency must be measured on the Galaxy S24/QNN SDK version used for release.
    - Use empirical component estimates rather than converting peak TOPS directly into latency.

    **Calculations:**
    - Baseline HTP-friendly INT8 EfficientNet-B0 latency must come from qnn-net-run or an on-device profiler for the exact SDK, OS, and input size.
    - If SE and SiLU patterns stay in the compiled HTP graph, their cost is included in that measured end-to-end latency.
    - If unsupported SE or SiLU fragments fall back to CPU, total latency becomes HTP graph time + fallback execution + synchronization + tensor-copy overhead.
    - The converter report and profiler should show whether the latency-critical path is a single HTP graph or a split graph with fallback islands.

    **Conclusion & Interpretation:**
    - **Result: Backend-Coverage Bottleneck**. The critical question is whether the static, quantized SiLU and SE subgraphs remain on HTP for the target QNN version and input size. Validate op assignment and end-to-end latency; peak 45 TOPS math is not a meaningful release latency estimate.
