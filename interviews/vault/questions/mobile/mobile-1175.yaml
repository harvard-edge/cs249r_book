title: Evaluating On-Device Data Quality Gates
scenario: You are designing a real-time data quality validation system for a 4K 60FPS live video processing pipeline on a mobile SoC. The pipeline must validate the input frame quality (detecting corruption or extreme noise) before inference. Option A uses a lightweight CNN on the NPU to filter bad frames. Option B uses traditional ISP statistics evaluated on the CPU. The device shares a 12 GB LPDDR5X memory architecture.
question: How would you evaluate these alternatives, considering the shared memory architecture, and recommend the better design?
details:
  realistic_solution: Option B is the better system-level design. The SoC shares its LPDDR5X memory across the CPU, GPU, ISP, and NPU. By leveraging ISP statistics that are already computed during frame capture, you avoid an extra memory read pass. The NPU's compute should be reserved for the main task, minimizing redundant data movement.
  common_mistake: |
    **The Pitfall:** Defaulting to Option A because the NPU has plenty of raw TOPS for a lightweight model.
    **The Rationale:** Candidates focus on compute availability and completely ignore the memory bandwidth cost of reading high-resolution frames multiple times.
    **The Consequence:** Reading the 4K 60FPS frame twice starves the CPU and ISP of shared memory bandwidth, causing dropped frames across the entire OS.
  napkin_math: |
    - **Single Read Bandwidth:** An uncompressed 4K 60FPS video stream (3840x2160x3 bytes * 60) requires ~1.5 GB/s.
    - **Double Read Bandwidth:** Reading the stream twice (once for NPU validation, once for inference) consumes ~3.0 GB/s.
    - **Result:** **Using CPU ISP metadata keeps validation read bandwidth at 0 GB/s, saving power and avoiding memory controller contention.**
