title: The GPU Context Switch Overhead
scenario: Your mobile game uses an ML model to generate textures dynamically. The ML model runs on the GPU using a Compute Shader. The game engine renders the 3D graphics on the same GPU using a Render Shader. The ML model takes 10ms. The rendering takes 10ms. But the total frame time is 28ms, dropping you below 60 FPS.
question: Where are the missing 8ms going?
details:
  realistic_solution: '8ms lost to GPU context switching. Transitioning compute shader (ML) <-> render shader (graphics) requires: flush in-flight ops, invalidate caches, reconfigure shader cores, reload pipeline state. Each transition: ~4ms. Two per frame = 8ms = 30% overhead. Fix: (1) run ML on NPU instead of GPU (no context switch). (2) Batch all compute before rendering (one switch = 4ms saved). (3) Use Vulkan async compute to overlap ML with non-dependent render passes.'
  common_mistake: |
    **The Pitfall:** Blaming the CPU or ignoring synchronization overhead.
    **The Rationale:** Candidates often assume the CPU is slow to launch the commands or that the GPU lacks compute power.
    **The Consequence:** They miss that hardware reconfiguration overhead (flushing pipelines, state changes) is consuming nearly 30% of the total GPU timeline.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - ML execution: 10ms.
       - Render execution: 10ms.
       - Context switch (ML to Render): 4ms.
       - Context switch (Render to ML): 4ms.
    2. **Calculations:**
       - Total per frame: 10 + 4 + 10 + 4 = 28ms.
    3. **Conclusion & Interpretation:**
       - **Result: Overhead-Bound. Missing 8ms is pure hardware state switching.**
