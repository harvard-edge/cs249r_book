title: The On-Device Training Memory Crisis
scenario: You are implementing on-device fine-tuning of a 32-layer transformer on a phone with 8 GB memory. The activation memory for backpropagation across all layers is ~537 MB. Together with KV cache and OS, memory is critically tight.
question: How much memory does gradient checkpointing save for 32-layer FP16 activations, and what compute cost does it add?
details:
  realistic_solution: Gradient checkpointing trades compute for memory by saving only a subset of activations (e.g., every sqrt(N) layers) and recomputing the rest during the backward pass. This shrinks the activation footprint from 537 MB to ~84 MB, rescuing ~453 MB of RAM. However, this forces a ~33% increase in total FLOPs. On a thermally constrained 5W device, this directly increases inference time and battery drain per step, representing a critical memory-compute tradeoff.
  common_mistake: |
    **The Pitfall:** Assuming gradient checkpointing is a "free" memory optimization.
    **The Rationale:** Candidates focus solely on the memory reduction (from 537 MB to 85 MB) to fit within RAM.
    **The Consequence:** They ignore that this trades memory for compute, adding ~33% more wall-clock time and significantly increasing energy consumption per step on a battery-powered device.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Full activations: 32 layers * 4 batch * 512 seq * 4096 dim * 2 bytes = 536.8 MB.
       - Checkpointing interval: Every 6th layer (~5 layers stored).
    2. **Calculations:**
       - Checkpointed size: ~5 layers * 16.7 MB/layer ≈ 83.8 MB.
       - Memory savings: 536.8 MB - 83.8 MB = 453 MB.
    3. **Conclusion & Interpretation:**
       - **Result: 453 MB saved / 33% compute penalty.** The system trades being **Memory-Capacity-Bound** for being **Energy-Bound**.
