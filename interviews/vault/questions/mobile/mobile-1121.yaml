title: Design On-Device Attention for Gemini Nano on Tensor G3
scenario: You are tasked with deploying a locally running LLM (similar to Gemini Nano)
  on the Google Tensor G3, which features an on-device TPU capable of 7.5 TOPS and
  shares a 12 GB LPDDR5X memory pool with the rest of the system. The product requirements
  demand a 4K context window for document summarization, but naive multi-head attention
  (MHA) consumes too much memory bandwidth and exceeds the strict latency budget.
  Design an attention architecture that optimizes for the G3's memory constraints
  and TPU capabilities while maintaining acceptable summarization quality.
question: How would you design an attention architecture that optimizes for the G3's
  memory constraints and TPU capabilities while maintaining acceptable summarization
  quality?
details:
  realistic_solution: The optimal design replaces standard MHA with Grouped-Query
    Attention (GQA) or Multi-Query Attention (MQA) to drastically reduce the KV cache
    size, directly addressing the memory bandwidth limits of the shared 12 GB LPDDR5X.
    Additionally, implementing a sliding window attention mechanism limits the maximum
    KV cache footprint for long documents, and the KV cache itself should be quantized
    to 8-bit. This architecture maximizes the 7.5 TOPS TPU utilization by ensuring
    compute isn't starved by memory transfers.
  common_mistake: Candidates often suggest simply quantizing the standard MHA KV cache
    without addressing the fundamental memory bandwidth bottleneck of loading the
    cache for every token generation. They might also propose complex sparse attention
    mechanisms that lack efficient TPU hardware support on the Tensor G3, leading
    to poor actual utilization despite theoretical flop reductions.
  napkin_math: For a 4K context with standard MHA (e.g., d_model=2048, 16 heads, 24
    layers, 16-bit float), the KV cache size is 4096 (tokens) * 2048 (dim) * 2 (K
    and V) * 24 (layers) * 2 (bytes) ≈ 768 MB. Reading this per token generation on
    mobile memory bandwidth takes significant time, capping generation speed. By using
    MQA (1 KV head of dim 128), the cache shrinks to 4096 * 128 * 2 * 24 * 2 ≈ 48
    MB, reducing memory transfer latency by 16x and allowing the 7.5 TOPS TPU to operate
    compute-bound rather than memory-bound.
