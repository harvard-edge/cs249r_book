title: Design On-Device Attention for Gemini Nano on Tensor G3
scenario: You are tasked with deploying a locally running LLM on the Google Tensor G3. The product requirements demand a 4K context window for document summarization, but naive multi-head attention (MHA) consumes too much memory bandwidth and exceeds the strict latency budget.
question: How would you design an attention architecture that optimizes for the G3's memory constraints and TPU capabilities while maintaining acceptable summarization quality?
details:
  realistic_solution: The optimal design replaces standard MHA with Grouped-Query Attention (GQA) or Multi-Query Attention (MQA) to drastically reduce the KV cache size, directly addressing the memory bandwidth limits. Additionally, implementing a sliding window attention mechanism limits the maximum KV cache footprint for long documents, and the KV cache itself should be quantized to 8-bit. This architecture maximizes the TPU utilization by ensuring compute isn't starved by memory transfers.
  common_mistake: |
    **The Pitfall:** Suggesting simple quantization of the standard MHA KV cache or unsupported sparse attention mechanisms.
    **The Rationale:** Engineers overlook the fundamental memory bandwidth bottleneck of loading the cache for every token and ignore the lack of efficient TPU hardware support for complex sparsity.
    **The Consequence:** The model remains severely memory-bound, and the TPU's compute capabilities are starved, failing latency requirements.
  napkin_math: |
    **Assumptions & Constraints:**
    - Context: 4K tokens.
    - Model layers: 24.
    - Precision: FP16 (2 bytes).

    **Calculations:**
    - Standard MHA KV Cache (4K context): 4096 tokens x 2048 dim x 2 (K&V) x 24 layers x 2 bytes = ~768 MB.
    - MQA/GQA KV Cache (4K context): 1 KV head of dim 128 -> 4096 x 128 x 2 (K&V) x 24 layers x 2 bytes = ~48 MB.
    - Improvement: 768 MB / 48 MB = 16x reduction.

    **Conclusion & Interpretation:**
    - **Result: 16x KV Cache Reduction (Memory-Bandwidth-Bound)**. MQA/GQA architectures bypass TPU memory bottlenecks to enable extensive context windows on mobile.
