title: Attention Head Pruning for On-Device Transformer on Snapdragon 8 Gen 3
scenario: "A mobile NLP team is running a 6-layer transformer (12 heads, d_model=768) for on-device text classification on Snapdragon 8 Gen 3 (45 TOPS INT8). Profiling shows attention accounts for 60% of latency at seq_len=512. They propose pruning 50% of heads."
question: "What are the latency and accuracy trade-offs of pruning 50% of attention heads in a 6-layer 12-head transformer on Snapdragon 8 Gen 3?"
details:
  realistic_solution: 'Attention FLOPs at seq=512, d=768, 12 heads per layer: QKV = 3x512x768x768x2 = 1.81B, QK^T = 12x512x512x64x2 = 402M, AV = 12x512x512x64x2 = 402M, O proj = 512x768x768x2 = 603M. Total attn per layer ≈ 3.22B FLOPs (19.3B for 6 layers). Pruning 6 heads (50%) without structural QKV pruning saves QK^T (6x512x512x64x2 = 201M), AV (201M), and O-proj (512x384x768x2 = 302M) FLOPs per layer. Total savings per layer = 704M FLOPs. For 6 layers, savings = 4.22B FLOPs out of 19.3B total attention FLOPs (≈ 22% of attention FLOPs). Actual latency reduction may be less due to memory access patterns and kernel launch overhead.'
  common_mistake: |
    **The Pitfall:** Treating head pruning as uniformly removing 50% of attention FLOPs.
    **The Rationale:** Engineers forget that positional encoding and layer norm costs are unchanged.
    **The Consequence:** Overestimating the latency reduction from head pruning.
  napkin_math: |
    - Total attention FLOPs for 6 layers: `19.3B FLOPs`.
    - Pruning 50% of heads saves: QK^T (`1,208M FLOPs`) + AV (`1,208M FLOPs`) + O-proj (`1,812M FLOPs`) = `~4,228M FLOPs` saved.
    - Percentage of attention FLOPs saved: `4,228M / 19,300M ≈ 22%`.
    - Latency reduction: `60% (attention time) * 22% ≈ 13%`.
    - **Conclusion:** Pruning 50% of heads only yields a **~13% total latency reduction**.
