title: The Mobile Power Chasm
scenario: Your team is designing an always-on ML feature for a smartphone. To estimate the impact on battery life, you must know the power characteristics of the hardware.
question: What is the approximate active-inference-to-deep-sleep power ratio for a mobile SoC?
details:
  realistic_solution: The power consumption ratio is enormous, typically on the order of 500,000-to-1 or greater. A modern mobile SoC under a heavy ML load can consume around 5 Watts, whereas its deep sleep power can be as low as 10 microwatts. This vast difference, or 'power chasm', is the single most important constraint driving the architecture of battery-powered ML systems.
  common_mistake: |
    **The Pitfall:** Underestimating the power delta between active inference and deep sleep.
    **The Rationale:** Software engineers often assume an 'idle' state is similar to a 'sleep' state, estimating the difference at around 100-1,000x.
    **The Consequence:** Designing aggressive background processing that fails to let the SoC enter deep sleep, rapidly draining the battery and leading to user uninstalls.
  napkin_math: |
    - **Active Inference Power:** ~5 W.
    - **Deep Sleep Power:** ~10 microwatts (0.00001 W).
    - **Ratio:** 5 W / 0.00001 W = **500,000x**.
  options:
  - 100x
  - 1,000x
  - 500,000x
  - 10x
  correct_index: 2
