title: Diagnosing OOM in On-Device LLM Shadow Rollout
scenario: You are running a shadow deployment of an upgraded on-device LLM on Google
  Tensor G3 devices. The new model silently processes user inputs in the background
  to log output differences against the active control model. However, telemetry from
  the shadow cohort reveals a massive spike in system-level OOM (Out Of Memory) app
  terminations and severe UI stuttering. Given the Google Tensor G3's architecture,
  including its on-device TPU (7.5 TOPS) and 12 GB LPDDR5X memory, diagnose the root
  cause of these device-level regressions during this specific rollout phase.
question: Why does a Tensor G3 shadow rollout cause OOM and UI stutter, and what rollout
  architecture avoids it?
details:
  realistic_solution: The root cause is RAM capacity exhaustion. Holding both the
    control and shadow models in memory concurrently starves the system, triggering
    the Android Low Memory Killer Daemon (LMKD) when the user opens other apps. The
    correct architectural fix is to abandon concurrent shadow rollouts for large models
    and instead use a true A/B canary rollout where only one model is loaded per device,
    or to deploy the new model as a LoRA adapter so both versions share the same base
    weights in memory.
  common_mistake: Candidates often misdiagnose the issue as a compute bottleneck on
    the TPU, assuming 7.5 TOPS isn't enough for concurrent inference, or they suggest
    tweaking CPU thread priorities. They frequently overlook the static memory capacity
    footprint required to host two separate LLMs simultaneously on a mobile SoC.
  napkin_math: Assuming an INT8 quantized 3.2B parameter LLM (like Gemini Nano), one
    model requires ~3.2 GB of RAM. A shadow deployment loading both control and treatment
    models consumes 6.4 GB. The Android OS and essential system services typically
    reserve ~4 GB. This leaves only 1.6 GB of the 12 GB LPDDR5X available for foreground
    applications. Launching a memory-intensive app like the Camera (which can require
    ~2 GB) immediately exceeds the 12 GB physical limit, causing LMKD to forcefully
    kill processes.
