title: The OTA Double-Storage Tax
scenario: Your app bundles a 50 million parameter computer vision model in FP32 format. You are shipping a new version quantized to INT8. Your update logic requires that both the old and new models exist on the user's flash storage simultaneously to allow for an instant rollback.
question: How would you calculate the total storage footprint required during this transition and what is the final number?
details:
  realistic_solution: To securely execute an atomic swap with rollback capability, the OTA partition must simultaneously host both formats. The 50M parameter model equates to 200 MB in FP32 and 50 MB in INT8. Therefore, the device mandates 250 MB of contiguous free UFS storage to execute the swap successfully.
  common_mistake: |
    **The Pitfall:** Forgetting the "double-storage tax" of safe rollouts.
    **The Rationale:** Engineers assume the old model is immediately deleted or only calculate the size of the incoming update.
    **The Consequence:** They fail to budget for the peak storage requirement, causing the OTA update to fail dynamically on devices with low available space.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Model size: 50 million parameters.
       - FP32: 4 bytes/parameter.
       - INT8: 1 byte/parameter.
    2. **Calculations:**
       - Original FP32 Model Size: 50M * 4 bytes = 200 MB.
       - Quantized INT8 Model Size: 50M * 1 byte = 50 MB.
       - Total storage required: 200 MB + 50 MB = 250 MB.
    3. **Conclusion & Interpretation:**
       - **Result: 250 MB.** The atomic OTA swap is **Storage-Capacity-Bound** during the transition phase.
  options:
  - 50 MB
  - 150 MB
  - 200 MB
  - 250 MB
  correct_index: 3
