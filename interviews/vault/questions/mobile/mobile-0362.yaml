title: The OTA Double-Storage Tax
scenario: You are an engineer on a mobile app team. Your app bundles a 50 million parameter computer vision
  model for a real-time filter feature. The current model is stored in FP32 format. To improve performance,
  you are shipping a new version quantized to INT8. For a safe rollout, your update logic requires that
  both the old and new models exist on the user's flash storage simultaneously to allow for an instant
  rollback. Explain how you would calculate the total storage footprint required during this transition
  and what the final number is.
details:
  realistic_solution: The correct approach is to calculate the storage size for each model individually
    and then sum them up. FP32 (single-precision float) uses 4 bytes per parameter, as defined by the
    IEEE 754 standard. INT8 (8-bit integer) uses 1 byte per parameter. Therefore, the total storage is
    the size of the old model plus the size of the new model.
  common_mistake: Engineers often underestimate the storage impact of safe OTA rollouts. A common mistake
    is to only consider the size of the new model being downloaded, or to assume the old model is immediately
    deleted. This ignores the 'double-storage tax' required to keep both models on disk for a period to
    ensure stability and allow for instant rollbacks, which is critical for maintaining a good user experience.
  napkin_math: '1. Original FP32 Model Size: 50 million parameters * 4 bytes/param = 200,000,000 bytes
    = 200 MB. 2. Quantized INT8 Model Size: 50 million parameters * 1 byte/param = 50,000,000 bytes =
    50 MB. 3. Storage Savings: 200 MB - 50 MB = 150 MB saved on-device. 4. Bandwidth Impact: The memory
    bandwidth required per inference drops by 4x, significantly improving FPS and reducing mobile NPU
    power draw.'
  options:
  - 50 MB
  - 150 MB
  - 200 MB
  - 250 MB
  correct_index: 3
