title: The OTA Double-Storage Tax
scenario: You are an engineer on a mobile app team. Your app bundles a 50 million parameter computer vision model for a real-time filter feature. The current model is stored in FP32 format. To improve performance, you are shipping a new version quantized to INT8. For a safe rollout, your update logic requires that both the old and new models exist on the user's flash storage simultaneously to allow for an instant rollback.
question: How you would calculate the total storage footprint required during this transition and what the final number is?
details:
  realistic_solution: The correct approach is to calculate the storage size for each model individually and then sum them up. FP32 (single-precision float) uses 4 bytes per parameter, as defined by the IEEE 754 standard. INT8 (8-bit integer) uses 1 byte per parameter. Therefore, the total storage is the size of the old model plus the size of the new model.
  common_mistake: |
    **The Pitfall:** Forgetting the "double-storage tax" of safe rollouts.
    **The Rationale:** Engineers assume the old model is immediately deleted or only calculate the size of the incoming update.
    **The Consequence:** They fail to budget for the peak storage requirement, causing the OTA update to fail dynamically on devices with low available space.
  napkin_math: |
    - Original FP32 Model Size: 50 million parameters * 4 bytes/param = 200 MB.
    - Quantized INT8 Model Size: 50 million parameters * 1 byte/param = 50 MB.
    - **Total storage required during transition:** 200 MB (old) + 50 MB (new) = **250 MB**.
  options:
  - 50 MB
  - 150 MB
  - 200 MB
  - 250 MB
  correct_index: 3
