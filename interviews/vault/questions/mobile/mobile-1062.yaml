title: Diagnose Thermal Throttling Cost Impact on A17 Pro Inference
scenario: An iOS app uses A17 Pro Neural Engine (35 TOPS) for real-time video style transfer at 30 FPS. After 90 seconds of continuous inference, FPS drops to 18 FPS due to thermal throttling. The model requires 180 GOPS per frame. Profiling shows peak power consumption of 4.2W during sustained inference, exceeding the 3.5W thermal budget.
question: How would you diagnose the cost impact of throttling on user experience and propose thermal-aware scheduling?
details:
  realistic_solution: |
    Throttled throughput: 18/30 = 60% of target. Model utilization at throttle: 35 TOPS × 0.60 throttle factor = 21 TOPS. Required: 180 GOPS × 30 = 5.4 TOPS — well within even throttled capacity. Actual bottleneck: sustained 4.2W → thermal accumulation in chassis. Fix: duty-cycle inference at 70% to stay under 3.5W budget: 4.2W × 0.70 = 2.94W < 3.5W. Effective FPS: 30 × 0.70 = 21 FPS (still below target but better than 18). Alternative: dynamic resolution scaling — reduce input by 25% (from 1080p to 810p): FLOPs = 0.5625x → 3.5W budget maintained at 30 FPS. Best: adaptive quality + quality/FPS preference UI.
  common_mistake: |
    **The Pitfall:** Treating thermal throttling as purely a performance issue without considering business impact.
    **The Rationale:** Engineers tend to focus on FLOPs and TOPS, ignoring how sustained power draw affects long-term app usability.
    **The Consequence:** For subscription-based apps, throttled inference reduces feature utility and directly increases customer churn—a quantifiable revenue cost.
  napkin_math: |
    **Assumptions & Constraints:**
    - Required compute: 180 GOPS * 30 FPS = 5.4 TOPS.
    - Capacity: 35 TOPS.
    - Thermal budget: 3.5W.
    - Peak power: 4.2W.

    **Calculations:**
    - Throttling ratio: 3.5W budget / 4.2W peak = 83.3%.
    - Frames/s at 83.3% power: 30 FPS * 0.833 = ~25 FPS.
    - Actual measured FPS is 18, meaning thermal throttling is non-linear and aggressive.
    - FLOPs reduction (810p): 0.75^2 = 0.5625x.
    - New power draw: 4.2W * 0.5625 = 2.36W.

    **Conclusion & Interpretation:**
    - **Result: 2.36W (Thermal-Bound)**. 2.36W < 3.5W thermal budget, allowing 30 FPS to be fully maintained.
