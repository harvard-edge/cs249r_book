title: The Memory Bandwidth Throttling
scenario: Your mobile application runs a 1080p semantic segmentation model on the NPU at 30 FPS. The NPU requires 4 GB/s of memory bandwidth to sustain this. The device has LPDDR5 RAM capable of 25 GB/s. However, when the user starts screen recording the app, the ML model drops to 12 FPS. The screen recording uses the hardware video encoder, not the NPU.
question: Why does a 1080p segmentation model drop from 30 FPS to 12 FPS when screen recording starts on the same memory bus?
details:
  realistic_solution: You hit the **System-level Memory Bandwidth Wall**. In a mobile System-on-Chip (SoC), all accelerators (CPU, GPU, NPU, ISP, Video Encoder, Display Controller) share a single physical interface to the LPDDR RAM (Unified Memory Architecture).
  common_mistake: |
    **The Pitfall:** Assuming the NPU and Video Encoder are sharing the same compute cores and starving each other of FLOPs.
    **The Rationale:** Engineers focus on compute utilization, forgetting that these are separate hardware blocks connected by a Unified Memory Architecture.
    **The Consequence:** They attempt to optimize the model's compute graph, which does nothing to alleviate the actual memory bandwidth contention.
  napkin_math: |
    - **Bandwidth Demand:** Display Controller (~1.5 GB/s) + Video Encoder (~2.0 GB/s) + NPU (4.0 GB/s) = 7.5 GB/s total.
    - **Effective Bandwidth:** While LPDDR5 peak is 25 GB/s, heavily interleaved access drops the effective bandwidth to ~8 GB/s.
    - **QoS Priorities:** The Display and Encoder have higher QoS priority and take their 3.5 GB/s.
    - **Remaining Bandwidth:** Only 4.5 GB/s remains for the NPU *and* CPU combined.
    - **Conclusion:** The NPU is **starved of memory bandwidth**, causing the frame rate drop.
