title: The Memory Bandwidth Throttling
scenario: Your mobile application runs a 1080p semantic segmentation model on the NPU at 30 FPS. The NPU
  requires 4 GB/s of memory bandwidth to sustain this. The device has LPDDR5 RAM capable of 25 GB/s. However,
  when the user starts screen recording the app, the ML model drops to 12 FPS. The screen recording uses
  the hardware video encoder, not the NPU. Why did the NPU slow down?
details:
  realistic_solution: You hit the **System-level Memory Bandwidth Wall**. In a mobile System-on-Chip (SoC),
    all accelerators (CPU, GPU, NPU, ISP, Video Encoder, Display Controller) share a single physical interface
    to the LPDDR RAM (Unified Memory Architecture).
  common_mistake: '"The NPU and Video Encoder are sharing the same compute cores." They are separate hardware
    blocks. The issue is the shared memory bus.'
  napkin_math: 'Display Controller needs ~1.5 GB/s. Video Encoder needs ~2.0 GB/s. NPU needs 4.0 GB/s.
    Total required: 7.5 GB/s. LPDDR5 peak is 25 GB/s, but heavily interleaved access drops effective bandwidth
    to ~8 GB/s. With QoS priorities, the Display and Encoder take their 3.5 GB/s, leaving only 4.5 GB/s
    for the NPU and CPU. The NPU starves.'
