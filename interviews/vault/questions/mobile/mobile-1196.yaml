title: Analyzing Hexagon NPU Fallback Degradation
scenario: A real-time video super-resolution pipeline runs on a mobile SoC using the NPU for inference. Under heavy thermal throttling, the OS scales down the NPU frequency by 40%, causing the primary INT8 model to miss the 33ms frame deadline. The system gracefully degrades by shedding the super-resolution task to the CPU using a lightweight fallback model instead of running a smaller INT8 model on the NPU.
question: "Why should a throttled video pipeline fall back to a CPU model instead of a smaller NPU model?"
details:
  realistic_solution: The system sheds the workload to the CPU because continuing to use the NPU, even with a smaller model, sustains heat generation in that specific SoC block and prevents recovery. By moving the task to the CPU, the thermal management system can quickly cool the NPU domain. Additionally, because the Snapdragon 8 Gen 3 uses shared 12-16 GB LPDDR5X memory, shifting to a simpler CPU-bound task reduces overall memory bandwidth contention during a critical thermal event.
  common_mistake: |
    **The Pitfall:** Assuming a smaller INT8 model on the NPU is always the best fallback.
    **The Rationale:** Candidates forget that mobile SoCs have shared thermal domains; keeping the NPU active prevents it from cooling down, regardless of the model size.
    **The Consequence:** The device remains in a thermally throttled state indefinitely, eventually leading to application crashes or hard OS-level throttling.
  napkin_math: |
    1. **Assumptions & Constraints:** Primary model 1.125 TOP/frame. Baseline NPU 45 TOPS. Throttled NPU capacity 45 * 0.60 = 27 TOPS.
    2. **Calculations:** Unthrottled: 1.125 / 45 = 25ms. Throttled: 1.125 / 27 = 41.7ms. CPU Fallback takes 15ms.
    3. **Conclusion & Interpretation:** CPU fallback takes 15ms, safely meeting the 33ms deadline while shedding **100% of NPU thermal load**. **Result: Thermal-Bound**.
