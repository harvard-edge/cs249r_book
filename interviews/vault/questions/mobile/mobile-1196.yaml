title: Analyzing Hexagon NPU Fallback Degradation
scenario: A real-time video super-resolution pipeline runs on a Snapdragon 8 Gen 3 using the Qualcomm Hexagon NPU for inference. Under heavy thermal throttling, the OS scales down the NPU frequency by 40%, causing the primary INT8 model to miss the 33ms frame deadline. The system gracefully degrades by shedding the super-resolution task to the CPU using a lightweight fallback model instead of running a smaller INT8 model on the NPU.
question: Why should a throttled Snapdragon video pipeline fall back to a CPU model instead of a smaller NPU model?
details:
  realistic_solution: The system sheds the workload to the CPU because continuing to use the NPU, even with a smaller model, sustains heat generation in that specific SoC block and prevents recovery. By moving the task to the CPU, the thermal management system can quickly cool the NPU domain. Additionally, because the Snapdragon 8 Gen 3 uses shared 12-16 GB LPDDR5X memory, shifting to a simpler CPU-bound task reduces overall memory bandwidth contention during a critical thermal event.
  common_mistake: |
    **The Pitfall:** Assuming a smaller INT8 model on the NPU is always the best fallback.
    **The Rationale:** Candidates forget that mobile SoCs have shared thermal domains; keeping the NPU active prevents it from cooling down, regardless of the model size.
    **The Consequence:** The device remains in a thermally throttled state indefinitely, eventually leading to application crashes or hard OS-level throttling.
  napkin_math: |
    1. **Primary Model Compute:** 1.125 TOP per frame.
    2. **Unthrottled Time:** 1.125 TOP / 45 TOPS = 25ms.
    3. **Throttled Capacity:** 45 TOPS * 0.60 = 27 TOPS.
    4. **Throttled Time:** 1.125 TOP / 27 TOPS = 41.7ms (misses 33ms deadline).
    5. **Smaller NPU Model:** Might take 33.3ms throttled, barely meeting the deadline but sustaining NPU heat.
    6. **CPU Fallback:** Takes 15ms, easily meeting the deadline while shedding **100% of the NPU power draw**.
