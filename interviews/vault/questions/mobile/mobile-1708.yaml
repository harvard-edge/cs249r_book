title: 'Optimizing On-Device ML Data Ingestion for Real-time Video on Google Tensor G3'
scenario: 'Your team is developing a real-time object detection application. The application processes live video streams from the camera sensor, with the ML model (requiring 192x192 RGB input) inferring efficiently on the NPU. However, users are reporting significant frame drops and increased latency. Initial profiling indicates the bottleneck is not the model inference, but rather the data pipeline stage responsible for ingesting raw 1080p (1920x1080) YUV 4:2:0 frames at 60 FPS, performing necessary pre-processing, and loading them into memory for NPU consumption.'
question: 'How would you diagnose the potential bottlenecks in this mobile data pipeline and propose concrete optimization strategies?'
details:
  realistic_solution: 'A realistic solution would involve several steps: 1) Analyzing the raw data rate from the camera sensor. 2) Investigating hardware-accelerated pre-processing capabilities (e.g., on-device ISP, dedicated image processors, or GPU shaders) to offload CPU-intensive tasks like scaling and color conversion. 3) Optimizing data transfer mechanisms to leverage direct memory access (DMA) paths from camera buffers to NPU-accessible memory regions, minimizing CPU copies. 4) Exploring efficient mobile-specific data formats and batching strategies that align with memory architecture and NPU input requirements.'
  common_mistake: |
    **The Pitfall:** Focusing immediately on optimizing the ML model's inference time or increasing the batch size.
    **The Rationale:** Engineers default to model optimization and overlook the massive data ingestion throughput limitations inherent to mobile video processing.
    **The Consequence:** The model gets faster, but frame drops persist because the CPU is still bottlenecked copying and converting multi-megabyte 1080p frames at 60 FPS.
  napkin_math: |
    **Assumptions & Constraints:**
    - Input: 1080p YUV 4:2:0 frames at 60 FPS.
    - Raw size: 1920 x 1080 x 1.5 bytes ≈ 3.11 MB/frame.
    - Inefficient pipeline involves 3 full-frame memory copies per frame.

    **Calculations:**
    - Base raw data rate: 3.11 MB/frame x 60 FPS = 186.6 MB/s.
    - Memory bandwidth with 3 copies: 186.6 MB/s x 3 = ~560 MB/s CPU read/write contention.
    - Software pre-processing CPU time per frame ≈ 50ms, limiting max throughput to 20 FPS.

    **Conclusion & Interpretation:**
    - **Result: 60 FPS via DMA (I/O-Bound)**. Leveraging hardware accelerators (ISP) and DMA reduces CPU memory contention to near zero, upgrading throughput from 20 FPS to a stable 60 FPS.
