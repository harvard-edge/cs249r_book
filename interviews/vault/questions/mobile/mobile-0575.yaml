title: The ANE vs GPU Power Efficiency
scenario: A colleague asserts that the mobile NPU is always 8× more efficient per watt than the mobile GPU, basing this on the NPU's INT8 TOPS rating versus the GPU's FP16 TFLOPS rating.
question: How should you compare NPU and GPU TOPS per watt, and when might the GPU still be preferable despite lower efficiency?
details:
  realistic_solution: 'First, normalize the comparison. NPU: 35 TOPS (INT8) at 2W → **17.5 TOPS/W**. GPU: 2.15 TFLOPS (FP16) at 5W → **0.43 TFLOPS/W**. In comparable INT8 terms, the GPU achieves ~4.3 TOPS → 0.86 TOPS/W. The NPU is genuinely ~20× more energy-efficient for supported ops. However, the GPU is preferable if the model relies heavily on custom operations not supported by the NPU, which force catastrophic CPU fallbacks.'
  common_mistake: |
    **The Pitfall:** Comparing INT8 TOPS to FP16 TFLOPS directly.
    **The Rationale:** Candidates perform raw division (35/2 vs 2.15/5) without normalizing data types or considering unsupported operations that force CPU fallback.
    **The Consequence:** Choosing the 'efficient' NPU for models with unsupported ops, resulting in worse end-to-end latency and higher total energy drain.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - NPU: 35 TOPS (INT8) at 2W.
       - GPU: 2.15 TFLOPS (FP16) at 5W.
       - 1 FP16 operation ≈ 2 INT8 operations in hardware equivalent cost.
    2. **Calculations:**
       - NPU Efficiency = 35 TOPS / 2W = 17.5 TOPS/W.
       - GPU FP16 Efficiency = 2.15 TFLOPS / 5W = 0.43 TFLOPS/W.
       - GPU INT8 Equivalent Efficiency = 0.86 TOPS/W. NPU is ~20x more energy-efficient natively.
       - If 50% ops are unsupported: NPU path = 3ms + 8ms (CPU fallback) + 7.5ms (handoff) = 18.5ms @ 3W = 55.5 mJ. GPU path = 12ms @ 5W = 60 mJ.
    3. **Conclusion & Interpretation:** **When unsupported ops are high, the NPU loses its efficiency advantage due to CPU fallback, making the GPU faster and more consistent.** Fallback-bound efficiency trap.
