title: Optimizing Sub-4-bit LLM Deployment on Google Tensor G3
scenario: Your team is deploying a 2B parameter LLM on the Google Tensor G3. Initial
  deployment using standard 8-bit weight quantization is functional, but user experience
  is suffering due to slow token generation rates. You need to analyze the system
  bottlenecks and evaluate implementing an extreme quantization technique (like 4-bit
  AWQ or GPTQ) to accelerate inference while staying within the constraints of the
  Tensor G3's TPU and memory architecture.
question: How would you optimize a sub-4-bit LLM deployment on Tensor G3 for memory-bandwidth-bound
  decoding?
details:
  realistic_solution: Implement a 4-bit group-wise quantization scheme (like AWQ)
    to compress the weights in the 12 GB LPDDR5X memory. Since LLM auto-regressive
    decoding is heavily memory bandwidth bound, reducing the weight size directly
    reduces memory fetch time. A fused custom kernel on the TPU should load the 4-bit
    weights and dequantize them to INT8 or FP16 in SRAM just-in-time for the matrix
    multiplication, hiding the unpacking latency behind the memory transfer.
  common_mistake: Candidates often assume that reducing bit-width linearly improves
    inference speed without considering dequantization overhead. They might fail to
    verify whether the TPU has native support for 4-bit math or if weights must be
    unpacked in SRAM, which can introduce pipeline stalls.
  napkin_math: A 2B parameter model in INT8 requires 2 GB of memory. Assuming typical
    LPDDR5X bandwidth of ~60 GB/s on the Google Tensor G3, the maximum memory-bound
    generation rate is 60 GB/s / 2 GB = 30 tokens/sec. The compute required per token
    is ~4 GOPs. With the TPU providing 7.5 TOPS, compute time per token is 4 GOPs
    / 7.5 TOPS = ~0.53 ms (capable of ~1800 tokens/sec). This proves the workload
    is entirely memory bandwidth bound. By applying 4-bit quantization, the weight
    footprint drops to 1 GB. The new bandwidth-limited speed is 60 GB/s / 1 GB = 60
    tokens/sec, doubling the throughput as long as the dequantization overhead remains
    under ~16 ms per token.
