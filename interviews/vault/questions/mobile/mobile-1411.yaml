title: Optimizing Sub-4-bit LLM Deployment on Google Tensor G3
scenario: Your team is deploying a 2B parameter LLM on the Google Tensor G3. Initial deployment using standard 8-bit weight quantization is functional, but token generation rates are slow.
question: How would you optimize a sub-4-bit LLM deployment on Tensor G3 for memory-bandwidth-bound decoding?
details:
  realistic_solution: Implement a 4-bit group-wise quantization scheme (like AWQ) to compress the weights in the 12 GB LPDDR5X memory. Since LLM auto-regressive decoding is heavily memory bandwidth bound, reducing the weight size directly reduces memory fetch time. A fused custom kernel on the TPU should load the 4-bit weights and dequantize them to INT8 or FP16 in SRAM just-in-time for the matrix multiplication, hiding the unpacking latency behind the memory transfer.
  common_mistake: |
    **The Pitfall:** Assuming reducing bit-width linearly improves speed without accounting for dequantization overhead.
    **The Rationale:** Engineers focus solely on the reduced memory payload, forgetting that sub-byte formats like INT4 often require unpacking to INT8/FP16 in SRAM before matrix multiplication.
    **The Consequence:** Implementing a quantization scheme that isn't natively supported, causing pipeline stalls that negate all memory bandwidth savings.
  napkin_math: |
    1. **INT8 Baseline:** 2B params = 2 GB. At ~60 GB/s bandwidth, memory-bound limit = 60 / 2 = 30 tokens/sec.
    2. **Compute Verification:** 4 GOPs/token on 7.5 TOPS TPU = ~0.53 ms compute time (capable of ~1800 tokens/sec). Workload is definitively memory-bound.
    3. **4-bit Optimization:** Weight footprint drops to 1 GB.
    4. **Conclusion:** The new bandwidth-limited speed is 60 / 1 = **60 tokens/sec**, effectively doubling throughput assuming dequantization overhead is hidden.
