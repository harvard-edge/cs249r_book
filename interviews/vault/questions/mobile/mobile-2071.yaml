title: 'Pedometer Power Calculation'
scenario: A fitness tracker utilizing a Snapdragon 8 Gen 3 sensor hub runs an inference model to detect steps. It consumes 50 mW for 20 ms during inference and sleeps at 1 mW for the remaining 480 ms of its 500 ms cycle.
question: Calculate the average power consumption of this step-detection cycle.
details:
  realistic_solution: 'The total cycle time is 500 ms. The energy used during active time is 50 mW * 20 ms = 1,000 mJ-ms. The energy used during sleep is 1 mW * 480 ms = 480 mJ-ms. Total energy per cycle is 1,480 mJ-ms. Average power is total energy divided by total time: 1480 / 500 = 2.96 mW.'
  common_mistake: |
    **The Pitfall:** Using a simple arithmetic mean of 50 and 1.
    **The Rationale:** Candidates completely ignore the time-weighted duty cycle.
    **The Consequence:** They vastly overestimate power consumption and incorrectly declare the feature unviable for battery life.
  napkin_math: |
    **Assumptions & Constraints:**
    - Cycle time = 500 ms.
    - Inference power = 50 mW, duration = 20 ms.
    - Sleep power = 1 mW, duration = 480 ms.

    **Calculations:**
    - Active energy = 50 mW * 20 ms = 1,000 mJ-ms.
    - Sleep energy = 1 mW * 480 ms = 480 mJ-ms.
    - Total energy per cycle = 1,000 + 480 = 1,480 mJ-ms.

    **Conclusion & Interpretation:**
    - **Result: 2.96 mW (Power-Bound)**. Average power = 1,480 mJ-ms / 500 ms = 2.96 mW.
