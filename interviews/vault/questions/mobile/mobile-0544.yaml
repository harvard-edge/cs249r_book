title: The Night-Vision Blind Spot
scenario: "You are a mobile ML engineer deploying a pedestrian detection model for a new driver-assistance app. You use a post-training quantization (PTQ) toolkit with a calibration set of 100 daytime images. During field testing, its accuracy collapses at night, completely missing pedestrians illuminated by headlights, but daytime accuracy remains high."
question: "Why does INT8 PTQ make a pedestrian detector miss night scenes when daytime calibration has only 100 images?"
details:
  realistic_solution: "The root cause is a catastrophic dataset mismatch during PTQ scale calibration. The daytime-only dataset created narrow activation min/max bounds. When high-intensity anomalies (headlights) enter the feed, their FP32 activations far exceed the narrow calibrated thresholds, causing severe saturation clipping at the INT8 limit of 127. The solution requires adding dark environment representations to the calibration set, or using Quantization-Aware Training (QAT)."
  common_mistake: |
    **The Pitfall:** Assuming the quantization process itself is inherently lossy or the NPU lacks operator support.
    **The Rationale:** Candidates fail to understand that Post-Training Quantization (PTQ) critically depends on the statistical distribution of the calibration dataset to set activation ranges.
    **The Consequence:** Missing the data mismatch root cause, leading to misguided attempts to swap model architectures instead of simply fixing the calibration dataset.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Daytime Max Activation: 15.0 (maps to INT8 max 127).
       - Nighttime Max Activation (headlights): 40.0.
    2. **Calculations:**
       - PTQ Scale Factor S = 15.0 / 127 ≈ 0.118.
       - Nighttime quantized value = round(40.0 / 0.118) = 339.
       - Clipped value = min(339, 127) = 127.
    3. **Conclusion & Interpretation:**
       - **Result: Precision-Bound.** The unrepresentative calibration set forces a scale factor that maps any signal above 15.0 to 127, completely saturating night-time activations and erasing critical feature details.
  options:
  - The MobileNet architecture's Hard-Swish activations are unstable for quantization and are causing numerical errors.
  - The phone's NPU has a hardware bug in its INT8 arithmetic unit that incorrectly handles high-value multiplications.
  - The calibration dataset lacked representative nighttime images, leading to incorrect quantization parameters that saturate activations for dark inputs.
  - The model is overfitting to the training data and needs to be completely retrained with a lower learning rate and more regularization.
  correct_index: 2
