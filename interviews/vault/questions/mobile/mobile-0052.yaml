title: The 50-Feature Mobile ML Platform
scenario: 'You''re the ML platform architect for a super-app (like WeChat or Grab) that has 50 different
  ML features: face filters, speech recognition, recommendation, fraud detection, OCR, translation, smart
  replies, and more. Each feature team wants to ship their own model. The app is already 300 MB. Users
  on budget phones with 3 GB RAM complain about performance. Design the mobile ML platform.'
details:
  realistic_solution: 'Shared ML infrastructure: common backbone (20 MB) + 50 task heads (~1 MB each,
    70 MB total). Resident memory: ~40 MB vs 1.75 GB naive (44x reduction). On 3 GB budget phone: 40 MB
    ML + 200 MB app = 240 MB, 1.26 GB headroom. Components: shared feature extractor, task head registry
    with lazy loading, unified memory manager with LRU eviction, single runtime. Each feature team publishes
    a task head, not a full model. A/B testing at the head level.'
  common_mistake: '"Let each team bundle their own model and runtime." 50 models × 20 MB average = 1 GB
    of models. 50 separate TFLite/CoreML runtimes competing for memory. The app becomes unusable.'
  napkin_math: 'Naive approach: 50 models × 20 MB = 1 GB models + 50 × 15 MB runtime = 1.75 GB total.
    Platform approach: 20 MB backbone + 50 × 1 MB heads (70 MB on disk, ~25 MB resident) + 15 MB shared
    runtime = 40 MB resident. Memory reduction: **44×**. App size: 300 MB app + 70 MB models (downloaded)
    vs 300 MB + 1 GB (bundled). Budget phone (3 GB RAM, ~1.5 GB available): naive approach OOMs. Platform
    approach: 40 MB ML + 200 MB app = 240 MB. Fits with 1.26 GB headroom.'
