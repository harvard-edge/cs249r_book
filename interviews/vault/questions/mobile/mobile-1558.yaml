title: Optimizing Real-Time Semantic Segmentation Latency on Samsung Exynos 2400 NPU
scenario: A real-time semantic segmentation model needs to process a 1080p video stream at 30 FPS on a mobile device powered by the Samsung Exynos 2400 NPU (34.7 TOPS INT8 peak). Each frame must be processed within a strict 33ms budget to prevent jank. The model, when deployed in FP16, requires approximately 500 GOPS per inference and consumes 3 GB of memory for its weights and intermediate activations. Despite the NPU's theoretical capacity, initial profiling shows inference times frequently spike to 45ms, leading to noticeable jank and occasional ANR timeouts.
question: How would you outline specific implementation strategies focusing on both compute and memory to achieve consistent sub-33ms latency?
details:
  realistic_solution: "1. **Comprehensive WCET Analysis & Profiling:** Utilize NPU-specific profiling tools to meticulously identify all pipeline stages contributing to latency spikes.\n2. **Model Optimization for NPU:** Aggressively apply INT8 quantization. Explore NPU-optimized model architectures or apply pruning techniques.\n3. **Data Pipeline & Asynchronous Processing:** Implement Direct Memory Access (DMA) for zero-copy data transfers. Design an interrupt-driven pipeline where the NPU signals completion to the CPU.\n4. **System-Level Resource Management:** Assign real-time priorities to the inference threads. Implement dynamic frequency scaling."
  common_mistake: |
    **The Pitfall:** Overlooking memory bandwidth constraints and data transfer overheads.
    **The Rationale:** Candidates often focus solely on FLOPs/TOPS and theoretical compute limits without considering the full end-to-end pipeline latency, including CPU-to-NPU data copies and OS scheduling.
    **The Consequence:** Proposed solutions fail to resolve real-world jank because the bottleneck is I/O and memory contention, not raw compute.
  napkin_math: |
    1. **Target Frame Budget:** 33 ms per frame (for 30 FPS).
    2. **Theoretical NPU Inference Time (FP16):** 500 GOPS / 34,700 GOPS/s = 14.4 ms. This confirms spikes to 45 ms are due to overheads.
    3. **Impact of INT8 Quantization:** Halves compute to 250 GOPS. New theoretical compute time = 250 GOPS / 34,700 GOPS/s = 7.2 ms. This frees up ~25.8 ms for overhead.
    4. **Memory Bandwidth Requirement:** 1080p RGB at 30 FPS requires ~186 MB/s input bandwidth. The 3 GB model plus activations require significant burst bandwidth, easily bottlenecking LPDDR5X (~50 GB/s peak) if not managed via DMA.
    5. **Conclusion:** **Aggressive INT8 quantization and zero-copy DMA transfers are necessary to meet the 33ms deadline.**
