title: Optimizing Real-Time Semantic Segmentation Latency on Samsung Exynos 2400 NPU
scenario: A real-time semantic segmentation model needs to process a 1080p video stream at 30 FPS on a mobile device. Each frame must be processed within a strict 33ms budget to prevent jank. The model, when deployed in FP16, requires approximately 500 GOPS per inference and consumes 3 GB of memory for its weights and intermediate activations. Despite the NPU's theoretical capacity, initial profiling shows inference times frequently spike to 45ms, leading to noticeable jank and occasional ANR timeouts.
question: How would you outline specific implementation strategies focusing on both compute and memory to achieve consistent sub-33ms latency?
details:
  realistic_solution: "1. **Comprehensive WCET Analysis & Profiling:** Utilize NPU-specific profiling tools like `nsys` to meticulously identify all pipeline stages contributing to latency spikes.\n2. **Model Optimization for NPU:** Aggressively apply INT8 quantization.\n3. **Data Pipeline & Asynchronous Processing:** Implement Direct Memory Access (DMA) for zero-copy data transfers. Design an interrupt-driven pipeline where the NPU signals completion to the CPU.\n4. **System-Level Resource Management:** Assign real-time priorities to the inference threads."
  common_mistake: |
    **The Pitfall:** Overlooking memory bandwidth constraints and data transfer overheads.
    **The Rationale:** Candidates focus solely on FLOPs/TOPS and theoretical compute limits without considering the full end-to-end pipeline latency, including CPU-to-NPU data copies and OS scheduling.
    **The Consequence:** Proposed solutions fail to resolve real-world jank because the bottleneck is I/O and memory contention, not raw compute.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Target frame budget = 33 ms per frame (30 FPS).
       - NPU peak = 34.7 TOPS.
       - FP16 compute = 500 GOPS. INT8 compute halves data movement and operations.
       - 1080p RGB 30 FPS input = ~186 MB/s burst bandwidth.
    2. **Calculations:**
       - FP16 Theoretical Compute Time = 500 GOPS / 34,700 GOPS/s = 14.4 ms.
       - Spike Overhead = 45 ms - 14.4 ms = 30.6 ms wasted on I/O.
       - INT8 Theoretical Compute Time = 250 GOPS / 34,700 GOPS/s = 7.2 ms.
       - INT8 Free time for overhead = 33 ms - 7.2 ms = 25.8 ms.
    3. **Conclusion & Interpretation:** **Aggressive INT8 quantization and zero-copy DMA transfers are necessary to meet the 33ms deadline by eliminating 30.6ms of I/O overhead.** Memory-bound pipeline.
