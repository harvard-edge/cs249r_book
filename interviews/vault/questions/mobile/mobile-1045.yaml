title: 'Mobile TCO Mastery: On-Device AI ROI for Mobile App Monetization'
scenario: 'A mobile app has 500K MAU. Premium tier ($10/mo) unlocks unlimited AI. Without on-device: 30% conversion, cloud costs $2/user/mo. With on-device: 50% conversion, cloud cost drops to $1.20/user/mo for on-device users. Development cost is $300K.'
question: What is the 2-year NPV and ROI for building on-device LLM capabilities?
details:
  realistic_solution: |
    Calculate the baseline net revenue, the on-device net revenue, and the delta. Apply a discount rate to find the 2-year present value, then subtract CapEx to find Net NPV and ROI.
  common_mistake: |
    **The Pitfall:** Ignoring the remaining cloud costs for on-device users.
    **The Rationale:** Candidates often assume "on-device" completely eliminates cloud costs, forgetting that complex queries still require cloud fallback.
    **The Consequence:** This leads to an overestimation of the net revenue and an artificially inflated ROI.
  napkin_math: |
    **Assumptions & Constraints:**
    - Discount Rate: 10% annual.
    - Baseline: 150K premium users.
    - On-device: 250K premium users.

    **Calculations:**
    - Baseline Net: (150K * $10) - (150K * $2) = $1.2M/mo.
    - On-device Net: (250K * $10) - (250K * $1.20) = $2.2M/mo.
    - Monthly Delta: $1M/mo ($12M/yr).
    - 2-year PV: $1M * ((1 - (1.008333)^-24) / 0.008333) = $21.67M.
    - Net NPV: $21.67M - $300K = $21.37M.

    **Conclusion & Interpretation:**
    - **Result: Extreme ROI.** The 2-year ROI is ($21.67M - $300K) / $300K = 7123%.
