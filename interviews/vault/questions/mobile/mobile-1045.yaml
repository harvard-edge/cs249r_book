title: 'Mobile TCO Mastery: On-Device AI ROI for Mobile App Monetization'
scenario: A mobile app has 500K MAU. Premium tier ($10/month) unlocks unlimited AI. Without on-device: 30% users on premium (cloud costs $2/user/month). With on-device: expect 50% premium conversion, but cloud cost drops to $1.20/user/month for on-device users due to complex fallback queries. Development cost is $300K.
question: What is the 2-year NPV and ROI for building on-device LLM capabilities?
details:
  realistic_solution: 'Before on-device: Revenue: $1.5M/month. Cloud cost: $300K/month. Net: $1.2M/month. After on-device: Revenue: $2.5M/month. New net: $2.2M/month. Monthly improvement: $1M/month. Annual: $12M. 2yr NPV at 10%: $12M PV annuity = $21.67M. Development: $300K. Net NPV: $21.37M. ROI: 7123%.'
  common_mistake: |
    **The Pitfall:** Ignoring the remaining cloud costs for on-device users.
    **The Rationale:** Candidates often assume "on-device" completely eliminates cloud costs, forgetting that complex queries still require cloud fallback.
    **The Consequence:** This leads to an overestimation of the net revenue and an artificially inflated ROI.
  napkin_math: |
    1. Calculate baseline net revenue: 500K * 30% * $10 = $1.5M/mo. Cloud cost: 500K * 30% * $2 = $300K/mo. Net = $1.2M/mo.
    2. Calculate on-device net revenue: 500K * 50% * $10 = $2.5M/mo. Cloud cost: 500K * 50% * $1.20 = $300K/mo. Net = $2.2M/mo.
    3. Calculate monthly improvement: $2.2M - $1.2M = $1.0M/mo.
    4. Calculate annual improvement: $1.0M * 12 = $12M.
    5. Calculate 2-year PV (10% annual rate, monthly discount 0.008333): $1M * ((1 - (1.008333)^-24) / 0.008333) = $21.67M.
    6. Calculate Net NPV: $21.67M - $300K = **$21.37M**.
    7. Calculate ROI: ($21.67M - $300K) / $300K = **7123%**.
