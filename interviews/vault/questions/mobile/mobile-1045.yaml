title: 'Mobile TCO Mastery: On-Device AI ROI for Mobile App Monetization'
scenario: 'Calculate the ROI for building on-device LLM capabilities into a mobile
  app using A17 Pro (35 TOPS, 8GB). The app has 500K MAU. Premium tier ($10/month)
  unlocks unlimited on-device AI. Without on-device: 30% users on premium (cloud costs
  $2/user/month at $0.001/1K token pricing). With on-device: expect 50% premium conversion,
  but cloud cost drops to only $1.20/user/month for on-device users due to complex fallback queries.
  Development cost: $300K. Calculate 2-year NPV.'
question: How would you calculate 2-year NPV?
details:
  realistic_solution: 'Before on-device: Revenue: 500K*0.30*$10=$1.5M/month. Cloud
    cost: 500K*0.30*$2=$300K/month. Net: $1.2M/month. After on-device: Revenue: 500K*0.50*$10=$2.5M/month.
    New net: $2.5M-$300K=$2.2M/month. Monthly improvement: $1M/month. Annual: $12M.
    2yr NPV at 10%: $12M PV annuity = $21.67M (monthly discount). Development: $300K.
    Net NPV: $21.37M. ROI: 7123%.'
  common_mistake: Not accounting for the fact that on-device users still need cloud
    fallback for complex queries, and calculating revenue only from premium subscribers
    without subtracting remaining cloud costs.
  napkin_math: 'Before: revenue=$1.5M/mo, cloud=$300K/mo, net=$1.2M/mo. After: revenue=$2.5M/mo
    (50% premium), cloud=$300K/mo (due to $1.20/mo fallback cost for 250K premium users), net=$2.2M/mo.
    Monthly increase: $1M. Annual: $12M. 2yr NPV at 10% annually (monthly discount rate
    10%/12=0.008333): PV = $1M * ((1-(1.008333)^-24)/0.008333) = $1M * 21.67
    = $21.67M. Dev cost $300K. Net: $21.37M. ROI: 7123%. Premium conversion lift (20pp:
    30%->50%) drives enormous value.'
