title: Design Strict Memory Bound LoRA Fine-Tuning
scenario: You must implement on-device LoRA fine-tuning for a 2B parameter model (4GB
  weights) on an Apple A17 Pro. The app's peak mutable RAM footprint must not exceed
  100MB.
question: Create a memory flow architecture that permits gradient calculation for
  LoRA adapters without loading the 4GB base weights into mutable app memory.
details:
  realistic_solution: The 4GB frozen base weights must be completely memory-mapped
    (mmap) as read-only, allowing the OS to stream them from storage to the Neural
    Engine via page cache without counting against app RAM limits. Forward pass activations
    are discarded immediately, except for the input tensors specifically feeding the
    low-rank adapters (rank=8). Gradients are explicitly computed only for these <10MB
    LoRA weights, fitting safely in 100MB.
  common_mistake: Allocating RAM for the base weights or saving all forward-pass activations
    for a full backpropagation tree, which instantly OOMs the 100MB budget.
  napkin_math: Base weights = 0MB RAM (mmap). LoRA grads ~10MB < 100MB budget.
