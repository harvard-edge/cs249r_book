title: The Federated Learning Bandwidth Fallacy
scenario: Your team is developing a personalized keyboard suggestion feature for an app with 10 million daily active users. You're comparing two training strategies: a centralized approach uploading 50 KB/day of raw data per user, or a Federated Learning approach uploading a 5 MB/day gradient update per user. Assume a data cost of $0.01/GB.
question: How do centralized and Federated Learning daily bandwidth costs compare for 10M keyboard users?
details:
  realistic_solution: |
    To properly evaluate the bandwidth trade-off, we must calculate the total data volume for each approach separately.

    **Centralized approach:** Each of 10M users uploads a small snippet of raw typing data (~50 KB/day).
    Total = 10M × 50 KB = 500 GB/day.

    **Federated Learning approach:** Each of 10M users uploads a model gradient update (~5 MB/day for a typical keyboard model).
    Total = 10M × 5 MB = 50,000 GB/day (50 TB/day).

    The FL approach moves **100× more data** across the network than centralized training. While it provides significant privacy benefits by never transmitting raw user data, the aggregate bandwidth cost is two orders of magnitude larger. This is a critical TCO factor: on mobile, bandwidth costs are often borne by the user (cellular data), which can impact user satisfaction, app churn, and even regulatory compliance in regions with expensive data plans.
  common_mistake: |
    **The Pitfall:** Assuming Federated Learning always reduces network bandwidth.
    **The Rationale:** Engineers often pattern-match 'privacy-preserving' to 'more efficient' in all dimensions, forgetting to calculate the actual data volume trade-off.
    **The Consequence:** This leads to massive unexpected bandwidth costs and user churn due to excessive cellular data consumption.
  napkin_math: |
    - **Centralized daily data:** 10,000,000 users * 50 KB = 500 GB.
    - **Centralized daily cost:** 500 GB * $0.01/GB = $5/day.
    - **FL daily data:** 10,000,000 users * 5 MB = 50,000 GB (50 TB).
    - **FL daily cost:** 50,000 GB * $0.01/GB = $500/day.
    - **Conclusion:** Federated learning is $500 / $5 = **100x more expensive** in bandwidth.
  options:
  - 'Centralized: $500/day, Federated: $5,000/day. Federated is 10x cheaper.'
  - 'Centralized: $50/day, Federated: $500/day. Federated is 10x more expensive.'
  - 'Centralized: $5/day, Federated: $500/day. Federated is 100x more expensive.'
  - 'Centralized: $5/day, Federated: $5/day. The costs are identical.'
