title: 'Model Size Estimation: Compare 1B vs. 3B LLM Memory on A17 Pro'
scenario: You are comparing deploying a 1B versus a 3B parameter language model on an A17 Pro device (8GB RAM, Neural Engine 35 TOPS). Both use INT4 quantization.
question: How would you evaluate the model size, KV-cache capacity at 4096 context, TPOT, and maximum number of conversation turns before context overflow?
details:
  realistic_solution: '1B model (hidden=2048, 32 layers, 32 KV heads, 64 dim): INT4 = 500MB. KV/token: 2×32×64×2B×32=262KB. App + OS: 3GB. KV budget: 8-3-0.5=4.5GB. Max tokens: 4.5GB/262KB=17,166. At 4096 ctx: 17166/4096=4.19 → 4 users or 1 user × 17K tokens. 3B model (hidden=3072, 32 layers, 32 KV heads, 128 dim): INT4=1.5GB. KV/token: 2×32×128×2B×32=524KB. KV budget: 8-3-1.5=3.5GB. Max: 3.5GB/524KB=6,679 tokens = 1 user × 4096 with 2.5K spare. TPOT: 1B 500MB/68GB/s=7.4ms. 3B 1.5GB/68GB/s=22ms.'
  common_mistake: |
    **The Pitfall:** Using the same KV-cache size formula without adjusting for differing model dimensions.
    **The Rationale:** Candidates forget that a 1B model has a smaller hidden dimension and fewer heads than a 3B model, which directly dictates the size of the KV-cache per token.
    **The Consequence:** They miscalculate the maximum context length or mistakenly conclude that neither model can fit within the constrained RAM budget.
  napkin_math: |
    1. **Memory Budgets:** 8GB total - 3GB (OS) = 5GB. 1B INT4 weights = 0.5GB (4.5GB for KV). 3B INT4 weights = 1.5GB (3.5GB for KV).
    2. **1B KV Cache (64 dim, 32 heads, 32 layers):** 2 × 32 × 64 × 2B × 32 = 262 KB/token. Max tokens = 4.5GB / 262 KB = ~17,166 tokens.
    3. **3B KV Cache (128 dim, 32 heads, 32 layers):** 2 × 32 × 128 × 2B × 32 = 524 KB/token. Max tokens = 3.5GB / 524 KB = ~6,679 tokens.
    4. **TPOT (Memory Bound at 68 GB/s):** 1B TPOT = 0.5GB / 68 GB/s = 7.4ms. 3B TPOT = 1.5GB / 68 GB/s = 22ms.
    **Result:** Both models support a single user at 4096 context, but the 1B model is **3× faster** (7.4ms vs 22ms TPOT) and holds **2.5× more context**.
