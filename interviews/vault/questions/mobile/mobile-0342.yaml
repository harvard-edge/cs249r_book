title: The RAG Update Bill
scenario: You're an engineer on a mobile app that uses a Retrieval-Augmented Generation (RAG) model. To keep the expert current, you must ship an Over-the-Air (OTA) update of its embedding database each month, containing vectors for 500,000 locations. Each location vector has 768 dimensions and is stored using FP16 precision.
question: How large is a monthly OTA embedding update for 500,000 locations with 768-dim FP16 vectors?
details:
  realistic_solution: The total size is approximately 768 MB. This is a massive payload for a monthly mobile update. It would likely violate app store guidelines for large updates, anger users by consuming their cellular data plans, and take up a significant amount of the device's flash storage. The realistic engineering solution would involve aggressive compression, vector quantization (e.g., to INT8 or binary), or moving the RAG retrieval to a server-side API.
  common_mistake: |
    **The Pitfall:** Forgetting the bytes-per-parameter cost of floating-point precision.
    **The Rationale:** Engineers often default to thinking in terms of raw parameter counts or assume 1 byte per value, forgetting that FP16 requires 2 bytes.
    **The Consequence:** This immediately doubles the expected payload size, resulting in updates that violate app store limits, consume user data plans, and exhaust device storage.
  napkin_math: |
    1. Vector Dimensions: 768 dimensions.
    2. Precision Cost: FP16 requires 2 bytes per dimension (768 * 2 = 1,536 bytes/vector).
    3. Total Size: 500,000 vectors * 1,536 bytes = 768,000,000 bytes.
    4. Conversion: 768,000,000 bytes / 1,000,000 = **768 MB total OTA payload.**
  options:
  - ~96 MB
  - ~384 MB
  - ~768 MB
  - ~1.54 GB
  correct_index: 2
