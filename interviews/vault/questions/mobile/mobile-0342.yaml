title: The RAG Update Bill
scenario: You're an engineer on a mobile app that uses a Retrieval-Augmented Generation (RAG) model for
  a 'local expert' feature. To keep the expert current, you must ship an Over-the-Air (OTA) update of
  its embedding database each month. This database contains vectors for 500,000 locations. Each location
  vector has 768 dimensions and is stored using FP16 precision. What is the approximate size of this monthly
  OTA update payload?
question: "How large is a monthly OTA embedding update for 500,000 locations with 768-dim FP16 vectors?"
details:
  realistic_solution: The total size is approximately 768 MB. This is a massive payload for a monthly
    mobile update. It would likely violate app store guidelines for large updates, anger users by consuming
    their cellular data plans, and take up a significant amount of the device's flash storage. The realistic
    engineering solution would involve aggressive compression, vector quantization (e.g., to INT8 or binary),
    or moving the RAG retrieval to a server-side API.
  common_mistake: The most common mistake is to forget the bytes-per-parameter cost of a given precision.
    Engineers often default to thinking in terms of raw parameter count, or incorrectly assume 1 byte
    per value (like INT8). They forget that FP16 requires 2 bytes per value, immediately doubling the
    payload size compared to an INT8-quantized equivalent.
  napkin_math: '1. Vector Dimensions: Each vector has 768 dimensions. 2. Precision: Using FP16, each dimension
    takes 2 bytes. 768 * 2 = 1,536 bytes per vector. 3. Total Database Size: 500,000 vectors * 1,536 bytes
    = 768,000,000 bytes. 4. Convert to MB: 768,000,000 bytes / 1024^2 ≈ 732 MB. 5. Conclusion: Pushing
    a 732 MB cellular OTA update monthly is too large; quantization or delta-updates are required.'
  options:
  - ~96 MB
  - ~384 MB
  - ~768 MB
  - ~1.54 GB
  correct_index: 2
