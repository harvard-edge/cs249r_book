title: Tensor G3 LLM Degradation Ladder
scenario: You are designing the smart reply system for a messaging app running on the Google Tensor G3.
  The system defaults to using the on-device Gemini Nano model, leveraging the TPU's 7.5 TOPS and 12 GB
  LPDDR5X memory for rich, contextual responses. However, during scenarios like 4K video recording or
  heavy thermal throttling, TPU availability drops and memory bandwidth becomes constrained. Design a
  graceful degradation architecture that ensures users always receive smart reply suggestions within a
  strict 300ms latency budget, regardless of system stress.
details:
  realistic_solution: Design a three-tier fail-operational degradation ladder. Tier 1 uses Gemini Nano
    on the TPU for high-quality responses. Tier 2 uses a tiny, continuously resident CPU-bound model (e.g.,
    heavily quantized MobileBERT) that activates if TPU latency predictions exceed 250ms due to thermal
    throttling or concurrent workloads. Tier 3 is a zero-compute static ruleset (canned responses like
    'Yes', 'No', 'On my way') that triggers if the CPU model also misses the SLA or if system memory pressure
    forces the eviction of all ML models.
  common_mistake: Candidates often suggest falling back to a cloud API when the device is stressed, ignoring
    that the user might be offline or that network latency will easily violate the 300ms SLA. Another
    mistake is failing to account for the memory eviction cost when trying to load a fallback model into
    the shared 12 GB LPDDR5X RAM while the system is already under memory pressure.
  napkin_math: The Tensor G3 TPU provides 7.5 TOPS. Assuming Gemini Nano requires roughly 30 GOPS/token,
    peak generation is 250 tokens/sec. A 15-token smart reply takes ~60ms under ideal conditions. If a
    concurrent task like 4K video recording consumes 6.0 TOPS of the TPU budget, only 1.5 TOPS remains.
    At 1.5 TOPS, generation drops to 50 tokens/sec, meaning a 15-token reply now takes 300ms. Factoring
    in prompt processing and UI rendering, this breaches the 300ms SLA, meaning the system scheduler must
    proactively shed the LLM quality-of-service to the Tier 2 CPU model whenever available TPU compute
    drops below 2.0 TOPS.
