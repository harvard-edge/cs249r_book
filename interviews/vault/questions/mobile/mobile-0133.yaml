title: The Federated Learning Battery Drain
scenario: You implement Federated Learning to update a next-word prediction model directly on users' phones. The on-device training takes 10 minutes and consumes 2% of the battery. However, users are complaining that the app is destroying their battery life overnight.
question: If the math only takes 2% of the battery, where is the rest of the energy going?
details:
  realistic_solution: The energy is being burned by the **Cellular/Wi-Fi Radio Transmission**. In Federated Learning, after the device computes the local weight updates (gradients), it must transmit those updates back to the central server.
  common_mistake: |
    **The Pitfall:** Assuming compute is the only source of battery drain.
    **The Rationale:** Candidates often blame the memory intensity of the backpropagation algorithm, ignoring the massive energy cost of transmitting data over cellular or Wi-Fi networks.
    **The Consequence:** Failing to optimize the primary energy vampire (radio transmission) in federated learning deployments.
  napkin_math: |
    1. **Training Compute:** NPU runs at 1W for 10 mins (600s) = 600 Joules.
    2. **Radio Transmission:** Transmitting large gradient updates over a cellular modem can easily consume 2-3W for an extended period, far exceeding the compute energy.
    3. **Conclusion:** **The primary energy drain is the cellular/Wi-Fi radio transmission of the model updates, not the math.**
