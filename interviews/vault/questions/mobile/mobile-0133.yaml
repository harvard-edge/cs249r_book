title: The Federated Learning Battery Drain
scenario: You implement Federated Learning to update a next-word prediction model directly on users' phones.
  The on-device training takes 10 minutes and consumes 2% of the battery. However, users are complaining
  that the app is destroying their battery life overnight. If the math only takes 2%, where is the energy
  going?
details:
  realistic_solution: The energy is being burned by the **Cellular/Wi-Fi Radio Transmission**. In Federated
    Learning, after the device computes the local weight updates (gradients), it must transmit those updates
    back to the central server.
  common_mistake: '"The backpropagation algorithm is using too much memory and causing swapping." While
    backprop is memory intensive, the primary energy vampire in Federated Learning isn''t the compute—it''s
    the radio.'
  napkin_math: 'NPU Training Compute: 1W * 10 mins (600s) = 600 Joules.'
