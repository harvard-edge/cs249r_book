title: 'Exynos 2400 NPU Video Enhancement CNN Architecture'
scenario: 'You are designing a real-time video enhancement CNN running on the Samsung Exynos 2400 NPU to process 4K 60fps video directly from the ISP. The NPU provides 34.7 TOPS across its dual cores and shares 12 GB of LPDDR5X memory with the CPU, GPU, and ISP.'
question: 'How would you design a custom CNN architecture that maximizes utilization of the NPU''s compute without bottlenecking the shared LPDDR5X memory during high-bandwidth concurrent ISP operations?'
details:
  realistic_solution: 'Design a custom architecture that relies on fused MBConv blocks or standard convolutions with optimized channel counts to increase arithmetic intensity, minimizing main memory trips. The architecture should explicitly partition tasks across the dual-core NPU while relying heavily on local SRAM to fuse layers and buffer intermediate activations, ensuring the shared 12 GB LPDDR5X bandwidth is preserved for the concurrent ISP and GPU workloads. Leverage zero-copy memory buffers (e.g., hardware buffer streams) to bypass CPU overhead.'
  common_mistake: |
    **The Pitfall:** Relying on standard inverted residual blocks (like MobileNet) which heavily use depthwise convolutions.
    **The Rationale:** Candidates assume mobile-friendly architectures are automatically optimal for all on-device tasks, forgetting the shared memory bottleneck.
    **The Consequence:** Depthwise convolutions have poor arithmetic intensity, severely bottlenecking on the shared LPDDR5X memory when the ISP is also active.
  napkin_math: |
    **Assumptions & Constraints:**
    - 4K at 60fps = 3840 * 2160 * 60 = ~500M pixels/sec.
    - Compute budget per pixel = 34.7 TOPS / 500M = ~69,400 OPs (or ~34,700 MACs) per pixel.
    - Typical 3x3 depthwise convolution arithmetic intensity: ~9 MACs/byte.

    **Calculations:**
    - Saturating 34.7 TOPS with depthwise convolutions requires (17.35e12 MACs / 9) = ~1.9 TB/s bandwidth.

    **Conclusion & Interpretation:**
    - **Result: 1.9 TB/s (Memory-Bandwidth Bound)**. Because LPDDR5X limit is ~50-60 GB/s, fused layers with AI >500 MACs/byte are required to keep NPU memory bandwidth under ~34 GB/s.
