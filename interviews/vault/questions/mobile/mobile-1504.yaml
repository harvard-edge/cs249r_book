title: Federated Learning Specification for Exynos 2400
scenario: Design a federated learning client specification for an on-device personalization model running on the Samsung Exynos 2400 NPU. The device features a dual-core NPU capable of 34.7 TOPS, but crucially shares its 12 GB LPDDR5X memory with the CPU, GPU, and ISP. You need to specify the local training loop constraints, memory budget, and synchronization frequency for a 50M parameter model to ensure it doesn't degrade the user experience while the camera or games are active.
question: How would you design a federated learning client specification that respects shared memory and thermal constraints on the Exynos 2400 NPU?
details:
  realistic_solution: The specification must include a context-aware resource manager that only schedules federated training when the device is idle, charging, and on Wi-Fi. To respect the shared memory architecture, the memory footprint should be strictly budgeted (e.g., capped at 500 MB) by using memory-efficient optimizers like SGD instead of Adam, and employing gradient accumulation with small batch sizes. The training loop must yield to higher-priority interrupts from the CPU or ISP.
  common_mistake: |
    **The Pitfall:** Proposing large batch sizes or continuous training loops.
    **The Rationale:** Treating the device's 12 GB RAM and 34.7 TOPS as entirely dedicated to ML, ignoring shared resources.
    **The Consequence:** Memory contention with the ISP during camera use, leading to OS-level OOM kills or thermal throttling.
  napkin_math: |
    1. Model + Optimizer: 50M FP16 (100MB) + Adam states (300MB) = ~400MB.
    2. Compute: Seq length 128 backward pass takes ~38.4 GFLOPs.
    3. Batch size 16 takes (16 * 38.4) / 17000 GFLOPS = 36ms per step.
    4. **Conclusion:** Duty-cycling this compute prevents saturating the shared memory bandwidth required by the GPU/ISP.
