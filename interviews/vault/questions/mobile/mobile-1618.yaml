title: Hardware-Aware NAS for On-Device Deployment on Samsung Exynos 2400 NPU
scenario: You are deploying a real-time object detection model on an NPU. The current model exceeds the 20ms latency target and the 8GB memory budget.
question: How would you define the search space, objective, and search strategy for NAS under strict latency and memory constraints?
details:
  realistic_solution: 'A realistic solution involves: 1. **Search Space Design:** Define a flexible search space for the object detection model (e.g., varying depth, width, kernel sizes) that maps efficiently to the NPU''s operations. 2. **Hardware Modeling/Profiling:** Develop an accurate proxy model for latency and memory consumption on the Samsung Exynos 2400 NPU. 3. **Objective Function:** Formulate a multi-objective optimization problem that balances accuracy, latency, and memory constraints (SRAM/DRAM/FLOPs). 4. **Search Strategy:** Employ an efficient search algorithm adapted to incorporate the hardware-aware objective function. 5. **Quantization:** Integrate quantization-aware training into the NAS loop.'
  common_mistake: |
    **The Pitfall:** Using theoretical FLOPs or parameter counts as direct proxies for latency and memory.
    **The Rationale:** Relying on standard academic NAS metrics that ignore real-world NPU operator utilization and SRAM capacity limits.
    **The Consequence:** Selecting a model that theoretically fits the FLOP budget but runs slowly due to NPU-incompatible operators or severe memory bandwidth bottlenecks.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Target Latency: 20 ms (0.02 s).
       - NPU Peak Compute: 34.7 TOPS (34.7 * 10^12 Ops/sec).
       - Realistic NPU Utilization: 20% (due to memory/IO overhead).
    2. **Calculations:**
       - Max Theoretical Ops in 20ms: 34.7 * 10^12 * 0.02 s = 694 GigaOps.
       - Realistic Ops Budget: 694 GigaOps * 0.20 = 138.8 GigaOps.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound constraint. NAS must limit the search space to models requiring < 138 GigaOps to realistically meet the 20ms deadline.**
