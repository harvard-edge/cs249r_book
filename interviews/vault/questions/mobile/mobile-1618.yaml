title: Hardware-Aware NAS for On-Device Deployment on Samsung Exynos 2400 NPU
scenario: Your team is tasked with deploying a new real-time object detection model
  on mobile devices featuring the Samsung Exynos 2400 NPU (34.7 TOPS, 12 GB LPDDR5X).
  The current state-of-the-art model achieves the required accuracy but exceeds the
  target latency of 20ms per inference and occupies too much memory (over 8 GB). You
  need to utilize Hardware-Aware Neural Architecture Search (NAS) to find an architecture
  that meets these strict performance and memory constraints, while maintaining accuracy
  within 1% of the baseline. Describe your approach to designing the search space,
  defining the hardware-aware objective function, and selecting an appropriate search
  strategy.
question: How would you define the search space, objective, and search strategy for
  NAS under Exynos 2400 latency and memory constraints?
details:
  realistic_solution: "A realistic solution involves: \n1. **Search Space Design:**\
    \ Define a flexible search space for the object detection model (e.g., varying\
    \ depth, width, kernel sizes, and block types within a known family like MobileNet\
    \ or EfficientNet variants) that can be easily mapped to the NPU's operations.\
    \ Consider operations known to be efficient on the Exynos NPU. \n2. **Hardware\
    \ Modeling/Profiling:** Develop an accurate proxy model for latency and memory\
    \ consumption on the Samsung Exynos 2400 NPU, either through direct profiling\
    \ of candidate architectures or by building a predictor based on architectural\
    \ features. For memory, specifically consider SRAM/DRAM usage for activations\
    \ and weights. \n3. **Objective Function:** Formulate a multi-objective optimization\
    \ problem that balances accuracy, latency, and memory. This could be a weighted\
    \ sum or a pareto-front optimization. For instance, `Objective = Accuracy - α\
    \ * Latency - β * Memory`, where α and β are penalty weights determined by the\
    \ constraint criticality. Explicitly incorporating SRAM/FLOPs/latency constraints\
    \ directly into the objective or as hard constraints is crucial. \n4. **Search\
    \ Strategy:** Employ an efficient search algorithm such as Differentiable NAS\
    \ (DARTS), Progressive NAS, or Evolutionary Algorithms, adapted to incorporate\
    \ the hardware-aware objective function. Given the need for precise hardware metrics,\
    \ an evolutionary algorithm or reinforcement learning approach that can query\
    \ the hardware proxy model might be more suitable than DARTS for highly accurate\
    \ latency prediction. For MCUNet-style approaches, consider techniques like TinyEngine\
    \ or NetAdapt, which prune and optimize models specifically for memory-constrained\
    \ edge devices, focusing on memory footprint reduction via compiler-aware compression\
    \ and hardware-specific operator fusion.\n5. **Quantization:** Integrate post-training\
    \ or quantization-aware training into the NAS loop or as a post-NAS step, as 8-bit\
    \ integer quantization will significantly impact memory and latency on NPUs like\
    \ the Exynos 2400."
  common_mistake: A common mistake is to focus solely on FLOPs or parameter count
    as proxies for latency and memory without actual hardware measurements or accurate
    hardware models. This often leads to models that theoretically look efficient
    but perform poorly on the target device due to NPU-specific bottlenecks (e.g.,
    memory bandwidth, operator support, quantization effects, or SRAM limitations
    not reflected in simple FLOPs/params). Another mistake is to use a search space
    that is either too large, making the search intractable, or too constrained, preventing
    the discovery of optimal architectures.
  napkin_math: Given the 34.7 TOPS (Tera Operations Per Second) of the Samsung Exynos
    2400 NPU, this translates to 34.7 x 10^12 operations/second. For a target latency
    of 20ms (0.02 seconds), the maximum allowable operations per inference is approximately
    `34.7 x 10^12 ops/s * 0.02 s = 694 x 10^9 = 694 Giga Operations`. The actual usable
    TOPS will be lower due to overhead, memory bandwidth, and non-optimal operator
    utilization. If a typical object detection model uses 10-20% of peak NPU utilization
    (a common optimistic assumption for complex models), then the effective TOPS might
    be around 3.5-7 TOPS, meaning the model should aim for a true operational budget
    of `(3.5 to 7) x 10^12 ops/s * 0.02 s = 70 to 140 Giga Operations`. For memory,
    with 12GB LPDDR5X, an 8GB target is conservative, leaving room for OS and other
    applications. However, on-chip SRAM is typically much smaller (e.g., few MBs),
    and models exceeding SRAM capacity will incur significant penalties due to frequent
    off-chip memory access. If a model's activation tensors alone exceed the NPU's
    internal SRAM, there will be substantial latency costs, regardless of the overall
    LPDDR5X capacity.
