title: A17 Pro Mobile Model Memory Footprint
scenario: You are designing an on-device machine learning model for a new feature on an iPhone, targeting the Apple A17 Pro chip with its 35 TOPS Neural Engine and 8 GB of unified memory. The model needs to perform real-time semantic segmentation on 720p (1280x720) video streams at 30 FPS. The model's active parameters and intermediate activations must fit within a dedicated 500 MB memory budget to leave room for the OS and other applications.
question: Propose a simplified convolutional neural network architecture and estimate its peak memory footprint to determine if it is feasible given the 500 MB constraint.
details:
  realistic_solution: A solid solution involves proposing a lightweight architecture common in mobile ML (e.g., depthwise separable convolutions). The candidate should systematically calculate parameters per layer, sum them for total parameters, and then estimate the peak memory usage by identifying the largest activation tensor. They should explicitly state assumptions about data types (e.g., FP16 for activations and weights) and include calculations for input/output buffers. A feasibility check against the 500 MB budget is essential, along with suggesting optimization strategies like quantization (INT8) if needed.
  common_mistake: |
    **The Pitfall:** Neglecting the memory footprint of intermediate activations and input/output tensors.
    **The Rationale:** Candidates often only count trainable parameters, assuming the weights dominate the memory budget.
    **The Consequence:** Proposing architectures that seem small but crash during real-time streaming because activation maps exceed the 500 MB limit.
  napkin_math: |
    1. Parameter Count (Conv Layer): `(Kernel_H * Kernel_W * In_Channels + 1) * Out_Channels`.
    2. Weights Memory (FP16): `Total_Parameters * 2 bytes/parameter`.
    3. Single Activation Map Memory (FP16): `Height * Width * Channels * 2 bytes/activation`.
    4. Peak Memory Footprint: Sum of **(Weights Memory + Largest Activation Memory + Input/Output buffer Memory)**.
