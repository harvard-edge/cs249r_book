title: The On-Device Assistant's First Word
scenario: You're scoping the user experience for a new on-device AI assistant on a flagship smartphone. The core of the assistant is a 7 billion parameter Large Language Model, which has been quantized to INT8. The phone's specification sheet lists a peak memory bandwidth of 77 GB/s from its LPDDR5x DRAM. For the assistant to feel 'instant,' the product team has set a strict Time-To-First-Token (TTFT) budget of 200ms.
question: Can a 7B INT8 assistant load its 7 GB weights over 77 GB/s LPDDR5X within a 200 ms TTFT budget?
details:
  realistic_solution: Yes, the approach is feasible. A 7B parameter model at INT8 precision requires 7 GB of storage. Transferring 7 GB over a 77 GB/s memory bus takes approximately 91 milliseconds, which is well within the 200ms perceptual budget for a fast response. This leaves over 100ms of slack for software overhead, prompt processing, and the initial forward pass.
  common_mistake: |
    **The Pitfall:** Using the wrong precision for the calculation.
    **The Rationale:** Engineers default to thinking in FP16 (2 bytes per parameter) for LLMs, but on-device quantization to INT8 (1 byte per parameter) is critical here.
    **The Consequence:** Doubling the calculated memory footprint and latency, potentially leading to incorrect conclusions about feasibility.
  napkin_math: |
    - Model Size = 7B * 1 byte/param = 7 GB.
    - Transfer Time = Size / Bandwidth = 7 GB / 77 GB/s = 0.0909 seconds.
    - Theoretical minimum latency = **~91 ms**.
  options:
  - ~182 ms. Yes, but it's very close to the budget limit.
  - ~727 ms. No, this is far too slow and will feel laggy.
  - ~91 ms. Yes, this is well within the 200ms budget.
  - ~11 ms. Yes, it's extremely fast, leaving plenty of budget.
  correct_index: 2
