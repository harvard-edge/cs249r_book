title: The Federated Learning Litmus Test
scenario: An automotive company wants to improve its driver-drowsiness detection model by learning from video snippets captured in its global fleet of vehicles.
question: What is the primary reason to use Federated Learning for driver-drowsiness video data instead of central collection?
details:
  realistic_solution: 'The primary motivation is **user privacy**. Regulations like GDPR and CCPA, along with intense user sensitivity, make it legally and ethically untenable to collect and store video data from inside a person''s private vehicle. Federated Learning is a privacy-preserving architecture that allows the model to be updated using local data without the raw, sensitive data ever leaving the car.'
  common_mistake: |
    **The Pitfall:** Confusing primary drivers (privacy) with secondary benefits (bandwidth savings).
    **The Rationale:** Candidates often focus on technical constraints like network bandwidth or compute availability rather than fundamental legal constraints.
    **The Consequence:** Designing a system that might still violate privacy if bandwidth allows central collection, rather than enforcing a strict privacy-first architecture.
  napkin_math: |
    **Assumptions & Constraints:**
    - A fleet of 100,000 cars capturing 1 minute of video (~5 MB) daily.

    **Calculations:**
    - Total daily data: 100,000 x 5 MB = 500 GB.
    - Centralizing 500 GB daily is technically trivial for a large company.

    **Conclusion & Interpretation:**
    - **Result: 500 GB (Privacy-Bound)**. The blocker is not network cost, but the impossibility of legally storing 500 GB of private in-cabin video daily.
  options:
  - 'To reduce network bandwidth costs from uploading terabytes of video data.'
  - 'To achieve higher final model accuracy compared to centralized training.'
  - 'To protect user privacy by not collecting or centralizing raw video data.'
  - 'To simplify the A/B testing process for new model architectures across the fleet.'
