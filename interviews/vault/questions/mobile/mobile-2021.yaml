title: Mobile AR FP16 Memory Bandwidth
scenario: An AR application on the Apple A17 Pro runs a 50M parameter FP16 feature
  matching model at 30 FPS. The memory bandwidth is roughly 50 GB/s.
question: Analyze the required memory bandwidth for the model weights alone and calculate
  what percentage of total system bandwidth this consumes.
details:
  realistic_solution: 50M parameters in FP16 take 100 MB. Loading these 30 times a
    second requires 100 MB * 30 = 3000 MB/s, or 3.0 GB/s. This consumes 3.0 / 50 =
    6% of the A17's total available bandwidth.
  common_mistake: Assuming parameters are FP32 (4 bytes) instead of FP16 (2 bytes),
    doubling the calculated bandwidth.
  napkin_math: 50 * 2 * 30 / 1000 = 3 GB/s. 3 / 50 = 6%
