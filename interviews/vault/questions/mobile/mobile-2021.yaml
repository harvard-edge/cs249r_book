title: Mobile AR FP16 Memory Bandwidth
scenario: An AR application on the Apple A17 Pro runs a 50M parameter FP16 feature matching model at 30 FPS. The memory bandwidth is roughly 50 GB/s.
question: Analyze the required memory bandwidth for the model weights alone and calculate what percentage of total system bandwidth this consumes.
visual:
  kind: svg
  path: mobile-2021.svg
  alt: Horizontal bars comparing compute time vs memory transfer time, clearly showing memory transfer as the bottleneck.
  caption: Memory Bandwidth vs Compute (Roofline proxy)
details:
  realistic_solution: 50M parameters in FP16 take 100 MB. Loading these 30 times a second requires 100 MB * 30 = 3000 MB/s, or 3.0 GB/s. This consumes 3.0 / 50 = 6% of the A17's total available bandwidth.
  common_mistake: |
    **The Pitfall:** Confusing precision byte sizes.
    **The Rationale:** Candidates often assume parameters are FP32 (4 bytes) by default instead of the stated FP16 (2 bytes).
    **The Consequence:** This incorrectly doubles the calculated bandwidth to 6.0 GB/s and 12%, misrepresenting the memory pressure.
  napkin_math: |
    - FP16 weight size: 50M parameters * 2 bytes = 100 MB.
    - Data rate at 30 FPS: 100 MB * 30 frames/sec = 3,000 MB/s = 3.0 GB/s.
    - Percentage of system bandwidth: 3.0 GB/s / 50 GB/s = **6%**.
