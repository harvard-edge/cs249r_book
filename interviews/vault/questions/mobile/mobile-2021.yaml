title: Mobile AR FP16 Memory Bandwidth
scenario: An AR application runs a 50M parameter FP16 feature matching model at 30 FPS. The memory bandwidth is roughly 50 GB/s.
question: Analyze the required memory bandwidth for the model weights alone and calculate what percentage of total system bandwidth this consumes.
details:
  realistic_solution: Loading 50M FP16 parameters requires fetching 100 MB per frame. At 30 FPS, the memory controller must sustain 3.0 GB/s solely for weights. This consumes 6% of the system's 50 GB/s unified bandwidth, asserting moderate but continuous pressure on the memory subsystem.
  common_mistake: |
    **The Pitfall:** Confusing precision byte sizes.
    **The Rationale:** Candidates often assume parameters are FP32 (4 bytes) by default instead of the stated FP16 (2 bytes).
    **The Consequence:** This incorrectly doubles the calculated bandwidth to 6.0 GB/s and 12%, misrepresenting the memory pressure.
  napkin_math: |
    **Assumptions & Constraints:**
    - Parameters: 50M.
    - Precision: FP16 (2 bytes/param).
    - Target framerate: 30 FPS.
    - Total bandwidth: 50 GB/s.

    **Calculations:**
    - FP16 weight size: 50M * 2 bytes = 100 MB.
    - Data rate: 100 MB * 30 = 3,000 MB/s = 3.0 GB/s.
    - Percentage: 3.0 / 50 = 0.06 (6%).

    **Conclusion & Interpretation:**
    - **Result: 6% Bandwidth Consumption (Bandwidth-Bound)**. The system is moderately bandwidth-bound by weight fetching.
