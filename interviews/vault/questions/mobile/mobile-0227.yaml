title: The Mobile Roofline Riddle
scenario: You're optimizing a real-time video style transfer filter on a new smartphone equipped with an Apple A17 Pro chip. The A17's Neural Engine (ANE) is rated for 35 TOPS (INT8) and has access to a unified memory system with 51.2 GB/s of bandwidth.
question: What is the arithmetic intensity of the style transfer model, and is it memory-bound on the A17 Pro?
details:
  realistic_solution: 'The model is **memory-bound**. The model''s Arithmetic Intensity (AI) is the ratio of its operations to its data movement: `7e9 Ops / 50e6 Bytes = 140 Ops/Byte`. The device''s ridge point (the AI required to become compute-bound) is `35e12 Ops/s / 51.2e9 Bytes/s ≈ 684 Ops/Byte`. Since the model''s AI (140) is significantly less than the device''s ridge point (684), the NPU will spend most of its time waiting for data. The memory subsystem is the bottleneck.'
  common_mistake: |
    **The Pitfall:** Judging Arithmetic Intensity in a vacuum.
    **The Rationale:** Engineers calculate 140 Ops/Byte and qualitatively assume it is a "high" number, incorrectly concluding the model is compute-bound.
    **The Consequence:** They fail to compare the model's AI to the hardware's specific Ridge Point, completely misunderstanding where the performance bottleneck lies.
  napkin_math: |
    - Model Arithmetic Intensity (AI): 7e9 Ops / 50e6 Bytes = 140 Ops/Byte.
    - Device Ridge Point: 35e12 Ops/sec / 51.2e9 Bytes/sec ≈ 684 Ops/Byte.
    - **140 < 684**, therefore the model is heavily **memory-bound**.
    - Attainable throughput = 140 * 51.2e9 = 7.17 TOPS (only 20% of 35 TOPS peak).
  options:
  - 140 Ops/Byte; Memory-bound, as its AI is far below the device's ridge point.
  - 140 Ops/Byte; Compute-bound, as this is a high operational intensity.
  - 684 Ops/Byte; Compute-bound, as the model's intensity will match the device's.
  - 17.5 Ops/Byte; Memory-bound, from incorrectly converting bytes to bits in the denominator.
  correct_index: 0
