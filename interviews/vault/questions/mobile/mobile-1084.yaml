title: A17 Pro Unified Memory Contention in Video Pipeline
scenario: Your team is deploying a real-time video processing pipeline on a mobile SoC. The 16-core Neural Engine provides 35 TOPS of compute at ~5W, but it shares 8 GB of unified memory with the CPU and GPU. During profiling, you observe that despite the Neural Engine being underutilized at 30% capacity, the system consistently drops frames below your 30 FPS target.
question: "Why does this data pipeline bottleneck the system despite the available compute overhead?"
details:
  realistic_solution: The bottleneck occurs due to memory bandwidth contention within the unified memory architecture. The CPU is performing heavy data transformations (like color space conversion or resizing) and writing to memory, while the 16-core Neural Engine simultaneously attempts to read this data for inference. To resolve this, the pipeline should utilize zero-copy memory buffers (such as IOSurface) to pass data directly from the camera ISP to the Neural Engine, eliminating intermediate CPU memory copies.
  common_mistake: |
    **The Pitfall:** Assuming the 35 TOPS compute capacity is the limiting factor and suggesting model optimization.
    **The Rationale:** Candidates frequently forget that mobile SoCs use unified memory, meaning CPU preprocessing directly competes with the NPU for memory bandwidth.
    **The Consequence:** Wasted effort on quantizing or pruning the model, when the actual bottleneck is data movement and memory contention.
  napkin_math: |
    1. **Assumptions & Constraints:** 4K frame (3840x2160x3) is ~25MB. Target is 30 FPS.
    2. **Calculations:** CPU Preprocessing Traffic: 25MB read + 25MB write = 50MB. NPU Inference Traffic: 25MB read. Total Traffic/Frame: 75MB. Bandwidth: 75MB * 30 FPS = 2.25 GB/s.
    3. **Conclusion & Interpretation:** **2.25 GB/s memory traffic** competes directly with OS/GPU traffic. **Result: Memory-Bandwidth-Bound**.
