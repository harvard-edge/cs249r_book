title: The Mobile Roofline Limit
scenario: An engineer is profiling a new neural network layer. The layer performs 10,000 INT8 operations for every 100 bytes of data it reads from memory.
question: "Is a layer with 100 Ops/Byte memory-bound or compute-bound on an NPU with 35 TOPS and 51.2 GB/s bandwidth?"
details:
  realistic_solution: |
    The layer is memory-bound. To determine this, we calculate the layer's Arithmetic Intensity (AI) and compare it to the hardware ridge point, which dictates the AI needed to saturate compute.
  common_mistake: |
    **The Pitfall:** Confusing absolute operations with Arithmetic Intensity.
    **The Rationale:** Engineers see 10,000 operations and assume the workload must be compute-intensive, without comparing it to the data moved.
    **The Consequence:** Incorrectly identifying the bottleneck and applying the wrong optimization strategies.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Workload AI: 10,000 Ops / 100 Bytes = 100 OPS/Byte.
       - Peak Compute: 35 TOPS.
       - Memory Bandwidth: 51.2 GB/s.
    2. **Calculations:**
       - Required Bandwidth: 35,000 GOPS / 100 OPS/Byte = 350 GB/s.
       - Hardware Ridge Point: 35 TOPS / 51.2 GB/s = ~683 OPS/Byte.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound.** The required bandwidth (350 GB/s) massively exceeds available bandwidth (51.2 GB/s), making the layer heavily memory-bound.
  options:
    - "140 Ops/Byte; Compute-bound"
    - "683 Ops/Byte; Compute-bound"
    - "100 Ops/Byte; Memory-bound"
    - "683 Ops/Byte; Memory-bound"
  correct_index: 2
