title: The Mobile Roofline Limit
scenario: An engineer on your team is profiling a new neural network layer on an Apple A17 Pro chip. They tell you the layer performs exactly 10,000 INT8 operations for every 100 bytes of data it reads from memory.
question: "Is a layer with 100 Ops/Byte memory-bound or compute-bound on an A17 Pro with 35 TOPS and 51.2 GB/s bandwidth?"
details:
  realistic_solution: The layer is **memory-bound**. To determine this, we calculate the layer's Arithmetic
    Intensity (AI) and compare it to the chip's ridge point. The ridge point is the AI needed to saturate
    the chip's compute.
  common_mistake: |
    **The Pitfall:** Confusing absolute operations with Arithmetic Intensity.
    **The Rationale:** Engineers see a large number of operations (10,000) and assume the workload must be compute-intensive, without comparing it to the data moved.
    **The Consequence:** Incorrectly identifying the bottleneck and applying the wrong optimization strategies.
  napkin_math: |
    - Arithmetic Intensity (AI): 10,000 Ops / 100 Bytes = 100 OPS/byte.
    - Hardware Peak Compute: 35 TOPS (35,000 Giga-OPS/sec).
    - Required Bandwidth: 35,000 Giga-OPS / 100 OPS/byte = 350 GB/s.
    - Hardware Bandwidth: 51.2 GB/s.
    - **Conclusion:** Required bandwidth (350 GB/s) massively exceeds available bandwidth (51.2 GB/s), making the layer heavily memory-bound.
  options:
  - Memory-bound, because its Arithmetic Intensity (100 Ops/Byte) is less than the chip's ridge point
    (~683 Ops/Byte).
  - Compute-bound, because its Arithmetic Intensity (100 Ops/Byte) is less than the chip's ridge point
    (~683 Ops/Byte).
  - Compute-bound, because performing 10,000 operations for only 100 bytes is a high ratio.
  - It's impossible to determine without knowing the power consumption (TOPS/W).
