title: The Mobile Memory Squeeze
scenario: You're deploying a 750 million parameter vision model to a new smartphone. The model weights are currently in FP16 format. Your team has a strict 1 GB memory budget for this model.
question: Does quantizing the 750M parameter FP16 model to INT8 allow it to fit within the 1 GB memory budget?
details:
  realistic_solution: Quantizing the model to INT8 reduces each parameter to 1 byte, bringing the total to 750 MB, which fits the budget.
  common_mistake: |
    **The Pitfall:** Misremembering the byte size of FP16.
    **The Rationale:** Candidates often incorrectly assume FP16 is 4 bytes or 1 byte per parameter, skewing the baseline footprint.
    **The Consequence:** The engineer concludes that quantization isn't necessary or isn't enough, leading to poor architectural deployment decisions.
  napkin_math: |
    1. Calculate FP16 size: 750,000,000 parameters * 2 bytes/param = **1.5 GB**.
    2. Evaluate against budget: 1.5 GB > 1.0 GB (Fails budget).
    3. Calculate INT8 size: 750,000,000 parameters * 1 byte/param = **750 MB**.
    4. Evaluate against budget: 750 MB < 1.0 GB. The quantized model successfully fits.
  options:
  - FP16 is 750 MB, INT8 is 375 MB. Both fit.
  - FP16 is 3.0 GB, INT8 is 1.5 GB. Neither fits.
  - FP16 is 1.5 GB, INT8 is 750 MB. The INT8 model fits.
  - FP16 is 1.5 GB, INT8 is 1.5 GB. There are no memory savings.
  correct_index: 2
