title: The Cross-Platform Model Optimization
scenario: Your company ships a speech recognition model to iOS (Core ML + ANE), Android Qualcomm (QNN
  + Hexagon), and Android Samsung (NNAPI + Exynos NPU). Each platform has different quantization support,
  operator coverage, and compiler optimizations. How many optimized model binaries do you actually need,
  and what does the build pipeline look like?
details:
  realistic_solution: 'You need **5-7 optimized binaries** from a single PyTorch source model, managed
    by an automated build pipeline: 1 for iOS ANE (Core ML), 1 for older iOS fallback, 1 for Android QNN
    (Qualcomm NPU), 1 for Samsung NNAPI, 1 for a generic Android GPU (Vulkan), and 1 for CPU fallback
    (e.g., TFLite XNNPACK). You must automate the export, quantization, and device-farm validation to
    maintain this cross-platform matrix.'
  common_mistake: '"Three binaries — one per platform." Three is the minimum if every platform had identical
    operator support and quantization. In reality, you need more because of operator coverage gaps and
    quantization format differences across NPU generations.'
  napkin_math: 'Build pipeline: 1 source model → 6 binaries. Conversion time: ~5 minutes per binary (automated).
    Validation: 6 × 1000 test samples × 50ms = 5 minutes. Total CI time: ~35 minutes per model update.
    Storage: 6 binaries × ~15 MB average = 90 MB total. Per-user download: 15 MB (one binary via conditional
    delivery). Engineering cost to set up pipeline: ~2 engineer-weeks. Ongoing maintenance: ~2 engineer-days
    per quarter (when new SoCs launch). Performance range: 4ms (iOS ANE) to 45ms (CPU fallback). 11× spread
    across the same model.'
