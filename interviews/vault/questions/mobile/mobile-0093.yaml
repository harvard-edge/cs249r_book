title: The Cross-Platform Model Optimization
scenario: 'Your company ships a speech recognition model to iOS, Android Qualcomm, and Android Samsung. Each platform has different quantization support, operator coverage, and compiler optimizations.'
question: 'How many optimized model binaries do you actually need, and what does the build pipeline look like?'
details:
  realistic_solution: 'You need **5-7 optimized binaries** from a single PyTorch source model, managed by an automated build pipeline: 1 for iOS ANE (Core ML), 1 for older iOS fallback, 1 for Android QNN (Qualcomm NPU), 1 for Samsung NNAPI, 1 for a generic Android GPU (Vulkan), and 1 for CPU fallback (e.g., TFLite XNNPACK). You must automate the export, quantization, and device-farm validation to maintain this cross-platform matrix.'
  common_mistake: |
    **The Pitfall:** Assuming "Three binaries — one per platform" is sufficient.
    **The Rationale:** Engineers underestimate operator coverage gaps and quantization format differences across NPU generations.
    **The Consequence:** Models silently falling back to slow CPU execution on modern devices due to missing ops.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Multiple platforms: iOS ANE, Android Hexagon, Android Exynos, CPU fallbacks.
       - Target deployment: 1 PyTorch source model.
    2. **Calculations:**
       - Required binaries: iOS ANE, older iOS fallback, Android QNN, Android NNAPI, generic GPU, CPU fallback = ~6 binaries.
       - Build Pipeline: 6 conversions * 5 min = 30 min.
       - Total Storage: 6 binaries * 15 MB = 90 MB.
    3. **Conclusion & Interpretation:**
       - **Result: 6 binaries (Matrix of NPU Compilations).**
