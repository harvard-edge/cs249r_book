title: Mobile New 0032
scenario: An on-device translation model averages 15ms per token. However, when the user scrolls quickly through the UI, token latency becomes extremely jittery, spiking up to 80ms randomly.
question: Why does on-device translation token latency spike when the user scrolls quickly through the UI?
details:
  realistic_solution: |
    The mobile OS prioritizes the UI thread (60Hz/120Hz rendering) to prevent jank. When scrolling, the OS preempts background ML worker threads, pushing them off the CPU cores, heavily delaying tensor operations or NPU dispatch commands. Mitigate by assigning proper QoS (Quality of Service) classes to ML threads, or moving synchronous execution entirely to the NPU to avoid CPU scheduler contention.
  common_mistake: |
    **The Pitfall:** Profiling models in isolated benchmark apps without simulating foreground UI thread interference.
    **The Rationale:** Engineers assume that baseline model performance directly translates to in-app performance, ignoring the shared nature of mobile compute resources.
    **The Consequence:** The model meets latency targets in testing but causes severe UI jank and poor user experience in production.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Normal compute: 15ms
       - UI render cycle: 16.6ms (60FPS)
       - Scroll event triggers 3 back-to-back UI frames
    2. **Calculations:**
       - OS preemption time: 3 * 16.6ms = ~50ms
       - Total ML latency = 15ms (compute) + 50ms (wait) = 65ms + OS overhead (~15ms) = 80ms
    3. **Conclusion & Interpretation:** **Total ML latency spikes to 80ms due to thread starvation. Result: OS Scheduler-Bound.**
