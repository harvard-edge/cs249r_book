title: Mobile New 0032
scenario: An on-device translation model averages 15ms per token. However, when the user scrolls quickly
  through the UI, token latency becomes extremely jittery, spiking up to 80ms randomly.
details:
  realistic_solution: The symptom of jittery ML latency during user interaction is caused by OS context
    switching and thread priority starvation. The mobile OS prioritizes the UI thread (usually 60Hz or
    120Hz rendering) to maintain a smooth user experience. When scrolling, the OS preempts the background
    ML worker threads, pushing them off the CPU cores, heavily delaying tensor operations or NPU dispatch
    commands.
  common_mistake: Profiling and serving models in isolated benchmark apps without simulating foreground
    UI thread interference.
  napkin_math: 'Normal compute: 15ms. UI render cycle: 16.6ms (60FPS). Scroll event triggers 3 back-to-back
    UI frames taking CPU priority. ML thread is preempted for 3 * 16.6 = 50ms. Total ML latency = 15ms
    compute + 50ms wait + OS overhead = 80ms spike.'
