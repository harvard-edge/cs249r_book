title: Unified Memory Architecture Impact on LLM Decode on A17 Pro
scenario: Apple A17 Pro uses unified memory architecture (UMA) where CPU, GPU, and Neural Engine share
  8GB LPDDR5 at 68 GB/s. A 7B INT4 model (3.5GB) is deployed for on-device inference. Analyze memory contention
  risks and bandwidth allocation strategy.
question: "How much does A17 Pro UMA contention slow 7B INT4 LLM decode under display, camera, and background bandwidth load?"
details:
  realistic_solution: 'Available bandwidth: 68 GB/s total. Display + OS background: ~5-8 GB/s baseline.
    Camera/ISP if active: 8-15 GB/s. Available for inference: ~45-55 GB/s. 7B INT4 decode bandwidth: 3.5GB
    model / bandwidth = latency per token. At 50 GB/s effective: 3.5GB/50GB/s = 70ms/token = 14 tok/s.
    With display active and background apps: effective bandwidth may drop to 35 GB/s → 100ms/token = 10
    tok/s. Strategy: Use priority QoS for inference thread, schedule inference during display blanking
    intervals, use model quantization to minimize weight footprint.'
  common_mistake: Assuming the Neural Engine gets dedicated memory bandwidth; in UMA, all processors compete
    for the same 68 GB/s, and OS background tasks, display, and inference all share this bandwidth.
  napkin_math: 'Total UMA: 68 GB/s. Background usage: 8-15 GB/s. Inference available: 50-60 GB/s. 3.5GB
    model / 50 GB/s = 70ms/token = 14 tok/s. With contention (35 GB/s effective): 100ms = 10 tok/s.'
