title: The OTA Battery Tax
scenario: You're planning to roll out a new 200 MB on-device generative AI model via an OTA background download. For a typical user on a cellular connection, the radio consumes a continuous 3 Watts during the download, the network speed is a steady 10 MB/s, and the phone has a standard 18.5 Wh battery.
question: "What fraction of a phone battery is used to download a 200 MB OTA model over cellular at 3W and 10 MB/s?"
details:
  realistic_solution: |
    The correct way to solve this is to first calculate the total time of the download, then use the device's power consumption during that time to find the total energy used, and finally compare that energy to the phone's total battery capacity.
  common_mistake: |
    **The Pitfall:** Focusing only on model storage size and ignoring the energy cost of downloading.
    **The Rationale:** Engineers underestimate the OpEx of downloading large files over cellular.
    **The Consequence:** Noticeable battery degradation across millions of users, leading to dissatisfaction and app uninstalls.
  napkin_math: |
    - **Download Time:** 200 MB / 10 MB/s = 20 seconds.
    - **Energy Consumed:** 3W * 20s = 60 Joules.
    - **Battery Capacity:** 18.5 Wh * 3600 seconds/hour = 66,600 Joules.
    - **Impact Ratio:** 60 J / 66,600 J = 0.0009.
    - **Result:** **0.09% battery drain.**
  options:
  - ~0.7%
  - ~3.15%
  - ~0.09%
  - ~0.03%
  correct_index: 2
