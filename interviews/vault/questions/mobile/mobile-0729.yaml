title: The "Unaccelerated Custom Op" Dilemma
scenario: You're integrating a novel graph neural network (GNN) model on a specific Android device with a proprietary NPU. The GNN has a custom aggregation operator not natively supported by TensorFlow Lite or the vendor's NPU SDK. Running this operator on the CPU causes a 20ms latency spike, making the overall model too slow.
question: "How do you accelerate a GNN custom aggregation op that causes a 20 ms CPU spike on a mobile NPU?"
details:
  realistic_solution: 'Accelerating a critical custom operator requires deep integration with the vendor''s hardware acceleration stack, developing a custom low-level kernel for the DSP/NPU that maps the aggregation efficiently to matrix multiplication or reduction primitives.'
  common_mistake: |
    **The Pitfall:** Treating the custom TFLite CPU operator as the final solution.
    **The Rationale:** Candidates assume that simply bridging the API gap with a standard C++ custom op resolves the deployment requirement.
    **The Consequence:** The model deploys successfully but fails real-world latency budgets due to the massive 20ms CPU bottleneck.
  napkin_math: |
    1. **Assumptions & Constraints:** CPU execution of the custom op takes 20ms. Target overall latency <5ms requires a 4-5x speedup for this specific operator.
    2. **Calculations:** Custom NPU/DSP kernels typically offer 10-100x speedups over mobile CPUs for dense vector operations.
    3. **Conclusion & Interpretation:** **10-100x speedup achievable**. **Result: Compute-Bound**.
