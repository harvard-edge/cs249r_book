title: The Core Premise of Federated Learning
scenario: You're on a team building a new smart keyboard feature that learns from user typing patterns.
  A junior engineer suggests just uploading all the raw text to your servers for training. As a senior
  engineer, you counter that Federated Learning is a better approach. What is the primary reason you'd
  state for using Federated Learning in this mobile context?
question: "What is the primary reason you'd state for using Federated Learning in this mobile context?"
details:
  realistic_solution: The primary and non-negotiable benefit of Federated Learning is that it preserves
    user privacy. Raw, sensitive data (like user text) never leaves the user's device. Instead, the model
    is trained locally, and only the resulting anonymous model updates (gradients or weights) are sent
    to a central server for aggregation. This design fundamentally eliminates the risk of a server-side
    data breach exposing raw user data.
  common_mistake: Engineers often mistakenly believe the primary benefit of Federated Learning is reducing
    network bandwidth or improving model accuracy. While it can affect those things, its core purpose
    is to architect a system that is private by design, which is a fundamentally different goal.
  napkin_math: 'The economic choice is clear when you compare the costs. The hardware cost of on-device
    training is minimal: a 10-second local training round on a mobile SoC consuming 4W of power uses only
    40 Joules of energy, a negligible battery impact. In contrast, the potential cost of a single data
    breach from centralizing petabytes of sensitive user text can easily run into the hundreds of millions
    of dollars, creating an existential risk for the product and company. Federated Learning trades a
    tiny, predictable energy cost for eliminating a catastrophic financial and reputational risk.'
  options:
  - It produces more accurate models by specializing on each user's data.
  - It keeps raw user data on the device, enhancing user privacy.
  - It reduces network bandwidth costs by sending small gradient updates instead of large datasets.
  - It allows for faster overall model training compared to centralized methods.
