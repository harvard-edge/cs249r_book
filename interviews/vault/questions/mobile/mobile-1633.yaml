title: Diagnosing Knowledge Distillation Deployment Issues on Google Tensor G3 for Mobile ML
scenario: You are deploying a distilled Student vision model onto a Tensor G3 (7.5 TOPS, 12 GB RAM) for 30 FPS object detection. Offline benchmarks show 20ms inference. On-device, inference intermittently spikes to 100ms, causing frame drops, alongside higher-than-expected memory usage.
question: How would you diagnose intermittent latency spikes and high memory use in a distilled student model on Tensor G3?
details:
  realistic_solution: 'Use device profiling tools to capture real-time inference traces and memory usage. Investigate if logit matching caused overly complex feature maps that thrash the LPDDR5X memory. Consider re-evaluating distillation vs. pruning for this specific memory-bandwidth constraint.'
  common_mistake: |
    **The Pitfall:** Assuming offline latency benchmarks translate directly to on-device performance.
    **The Rationale:** Ignoring device-specific memory access patterns and TPU utilization bottlenecks.
    **The Consequence:** Deploying a model that thrashes memory and drops frames in production despite passing CI tests.
  napkin_math: |
    - Frame budget (30 FPS): 1000 ms / 30 = 33.3 ms.
    - Required compute per frame: (7.5 T-Ops) / 30 = 250 G-Ops.
    - Spike duration: 100 ms (achieves only 10 FPS).
    - High memory usage indicates logit matching created overly complex feature maps that exceed local cache, causing LPDDR5X thrashing.
    - **Spikes to 100ms indicate the TPU is severely memory-bound by bloated intermediate activations, missing the 33.3ms budget.**
