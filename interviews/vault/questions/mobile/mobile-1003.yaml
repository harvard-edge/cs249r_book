title: 'Network Bandwidth Bottlenecks: Design Bandwidth-Efficient On-Device LLM Pipeline'
scenario: Design a bandwidth-efficient decode pipeline for a 3B INT4 LLM on A17 Pro
  (8GB, 68 GB/s Neural Engine bandwidth) targeting TPOT < 30ms. The baseline INT4
  model uses 1.5GB. Show how weight tiling, prefetching, and KV-cache memory layout
  can improve effective bandwidth utilization beyond the naive 1.5GB/token approach.
question: How would you design a bandwidth-efficient decode pipeline for a 3B INT4
  LLM on A17 Pro (8GB, 68 GB/s Neural Engine bandwidth) targeting TPOT < 30ms?
details:
  realistic_solution: 'A naive 3B INT4 decode requires loading 1.5GB of weights per token. At 68 GB/s, memory transfer alone takes 1.5GB / 68GB/s = 22ms per token. While compute takes <1ms, the 22ms memory wall dominates. To ensure TPOT stays strictly < 30ms under OS background contention, the pipeline must: 1) Use speculative decoding (e.g., K=3 draft tokens) to verify multiple tokens per 1.5GB read, increasing effective bandwidth utilization; 2) Interleave weight prefetching with the previous layer''s compute to hide overhead; 3) Use a continuous PagedAttention KV-cache layout with INT8 quantization to minimize fragmentation and reduce KV read bandwidth at longer contexts.'
  common_mistake: 'Assuming weight tiling reduces main memory reads during autoregressive decode (batch size 1). Tiling improves SRAM locality for compute-bound prefill, but decode is strictly memory-bound; weights must be read from LPDDR5X once per token regardless of tiling.'
  napkin_math: 'Naive TPOT: 1.5GB / 68 GB/s = 22.05ms (memory) + 0.1ms (compute) = 22.15ms. Target < 30ms is achieved theoretically, but OS contention can spike this. Speculative decoding with 100M draft model (50MB): Draft TPOT = 50MB / 68 GB/s = 0.7ms. For K=3, draft takes 2.1ms. Target verify = 22.1ms. Total step = 24.2ms. If 2 tokens are accepted on average, effective TPOT = 24.2 / 2 = 12.1ms, vastly improving effective bandwidth utilization beyond the naive 1.5GB/token limit.'
