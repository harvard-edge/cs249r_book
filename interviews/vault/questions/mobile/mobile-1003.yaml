title: 'Network Bandwidth Bottlenecks: Design Bandwidth-Efficient On-Device LLM Pipeline'
scenario: Design a bandwidth-efficient decode pipeline for a 3B INT4 LLM targeting TPOT < 30ms. The baseline INT4 model uses 1.5GB.
question: How would you design a bandwidth-efficient decode pipeline for a 3B INT4 LLM targeting TPOT < 30ms by leveraging weight tiling, prefetching, and KV-cache layouts?
details:
  realistic_solution: A naive 3B INT4 decode requires loading 1.5GB of weights per token. At 68 GB/s, memory transfer alone takes 22ms per token. While compute takes <1ms, the memory wall dominates. To ensure TPOT stays strictly < 30ms under OS background contention, the pipeline must implement speculative decoding (e.g., K=3 draft tokens) to verify multiple tokens per 1.5GB read, increasing effective bandwidth utilization. Use PagedAttention KV-cache layout with INT8 quantization to minimize fragmentation and reduce read bandwidth.
  common_mistake: |
    **The Pitfall:** Assuming weight tiling alone reduces main memory reads during autoregressive decode.
    **The Rationale:** Candidates confuse compute-bound prefill optimizations (SRAM locality) with memory-bound decode realities.
    **The Consequence:** Failing to realize that decode requires reading full weights from LPDDR5X once per token regardless of tiling, missing the TPOT SLA.
  napkin_math: |
    1. **Assumptions & Constraints:**
      - Memory Bandwidth: 68 GB/s.
      - Model Size: 3B INT4 = 1.5 GB.
      - Target TPOT: < 30 ms.
    2. **Calculations:**
      - Naive Decode Cost: 1.5 GB / 68 GB/s = 22 ms/token (memory limit).
      - Draft Model Decode Cost (50MB): 50 MB / 68 GB/s = 0.7 ms/token.
      - Speculative Step (K=3): Draft 3 tokens (2.1 ms) + Verify 1.5 GB (22 ms) = 24.1 ms.
      - Effective TPOT (if 2 accepted): 24.1 ms / 2 tokens = 12.05 ms/token.
    3. **Conclusion & Interpretation:**
      - **Result: Memory-Bound Decode.** Speculative decoding drastically improves effective bandwidth utilization, safely meeting the <30ms target.
