title: A17 Pro NPU Latency and Energy Calculation
scenario: You are deciding whether to offload a quantized int8 vision model from the
  CPU to the Apple A17 Pro Neural Engine to improve efficiency. The model requires
  70 Giga-Operations (GOPS) per inference. The 16-core Neural Engine features a peak
  performance of 35 TOPS at ~5W, but only achieves 50% utilization due to bandwidth
  constraints from the shared 8 GB unified memory. Calculate the expected inference
  latency in milliseconds and the energy consumed per inference in millijoules to
  quantify the benefit of NPU offloading.
question: How would you calculate the expected inference latency in milliseconds and
  the energy consumed per inference in millijoules to quantify the benefit of NPU
  offloading?
details:
  realistic_solution: To determine if offloading is worthwhile, we first calculate
    the effective NPU throughput by applying the 50% utilization factor. We then divide
    the workload size (70 GOPS) by the effective throughput to find the latency. Finally,
    multiplying the latency by the NPU's power consumption (5W) gives the energy consumed
    per inference.
  common_mistake: Candidates often calculate latency using the theoretical peak throughput
    of 35 TOPS rather than the effective throughput, ignoring memory constraints.
    They may also confuse the units between TOPS, GOPS, and Joules, leading to incorrect
    energy estimations.
  napkin_math: '1. Peak Throughput = 35 TOPS = 35,000 GOPS.

    2. Effective Throughput = 35,000 GOPS * 0.50 = 17,500 GOPS.

    3. Latency = Workload / Effective Throughput = 70 GOPS / 17,500 GOPS = 0.004 seconds
    = 4.0 ms.

    4. Energy per Inference = Power * Latency = 5W * 0.004s = 0.02 Joules = 20 mJ.'
