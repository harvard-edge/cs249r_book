title: The Real-Time Translation Jank
scenario: 'You''re debugging a new on-device translation feature running on a flagship smartphone (like
  one with an Apple A17 Pro). The UX team reports the UI is ''janky'' whenever the translation is active.
  You measure the model''s performance: it takes **150ms to generate the first token (TTFT)** after the
  user stops speaking, and then **30 tokens per second for subsequent tokens (TPOT)**. The UI team''s
  render budget to avoid jank is **16ms per frame**. Compare the model''s token generation latency to
  the UI frame budget and explain if the model is the source of the jank.'
details:
  realistic_solution: The model is the primary source of jank. The UI requires rendering a new frame every
    16ms. The model's generation rate is 30 tokens per second, which needs to be converted to latency
    per token. At 30 tokens/sec, each token takes 1000ms / 30 = ~33.3ms to generate. Since 33.3ms is more
    than double the 16ms frame budget, the model's inference is blocking the main UI thread for over two
    full frame durations for every single token it produces, causing severe stuttering.
  common_mistake: Engineers often focus on throughput (tokens/second) as a measure of 'speed' and assume
    a high number is good enough. They fail to convert this rate into per-token latency and compare it
    directly against hard deadlines like the UI render loop (16ms for 60fps). They might also incorrectly
    dismiss the per-token generation time as insignificant compared to the initial TTFT.
  napkin_math: '`Tokens per Second = 30` | `UI Frame Budget = 16 ms`'
  options:
  - No, 30 tokens per second is a high throughput, so the model isn't the bottleneck.
  - Yes, the main issue is the 150ms startup time (TTFT). The ongoing generation is fast enough.
  - Yes, at ~33.3ms per token, inference blocks the 16ms render thread.
  - No, but only because the TTFT of 150ms misses several 16ms frames upfront.
  correct_index: 2
