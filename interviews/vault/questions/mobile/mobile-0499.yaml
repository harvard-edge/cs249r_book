title: The Mobile Transformer Jank Puzzle
scenario: You are a mobile ML engineer at a top social media company, responsible for a new real-time video filter. The filter uses a small Vision Transformer (ViT) model to apply a 'comic book' effect. During testing on a flagship phone (Apple A17 Pro), you observe severe UI jank; the filter is only running at 15 FPS instead of the required 30 FPS. Using the phone's profiler, you see that the Apple Neural Engine (ANE) utilization is surprisingly low, around 30%, but the system's memory bandwidth is completely saturated.
question: Why does an A17 Pro ViT video filter hit only 15 FPS with 30% ANE utilization but saturated memory bandwidth?
details:
  realistic_solution: 'The bottleneck is that the Vision Transformer''s self-attention mechanism is memory-bound, not compute-bound. The quadratic complexity of the attention calculation (`O(N^2*d)` where N is the number of patches) requires large intermediate matrices (`Q @ K.T`) to be read from and written to memory. This floods the memory bus, preventing the NPU from being fed data fast enough, hence the low utilization despite the high memory traffic. The A17 Pro''s NPU is ''starving'' for data. The correct architectural solution is to replace the ViT with a model designed for high arithmetic intensity on mobile, such as a modern CNN using depthwise separable convolutions (e.g., MobileNetV4), which has better data locality and a higher ratio of computations to memory accesses.'
  common_mistake: |
    **The Pitfall:** Assuming low NPU utilization means the model is "too small" and increasing batch size will fix it.
    **The Rationale:** Engineers misinterpret low compute utilization as a lack of work, ignoring that the processor is starving because the memory bus is saturated.
    **The Consequence:** Increasing batch size worsens the memory bottleneck, further degrading FPS and causing more jank.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Chip Peak Compute: 35 TOPS.
       - Memory Bandwidth: 51.2 GB/s.
    2. **Calculations:**
       - Ridge Point: 35 TOPS / 51.2 GB/s = ~684 Ops/Byte.
       - ViT Self-Attention (Q @ K.T): Generates O(N^2 * d) memory traffic, forcing low AI.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound. The arithmetic intensity (Ops/Byte) of ViT attention is far below the 684 Ops/Byte ridge point, starving the NPU.**
  options:
  - The model is too small for the NPU, and the batch size should be increased to improve utilization.
  - The NPU driver has a bug causing inefficient scheduling of Transformer operations, and it should be reported to the vendor.
  - The ViT's self-attention is memory-bound; its arithmetic intensity is too low for the A17's hardware balance.
  - The model must be quantized from FP16 to INT8, as the computational load is clearly too high.
  correct_index: 2
