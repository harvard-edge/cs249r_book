title: Evaluate depthwise separable vs standard conv for on-device training on Snapdragon
  8 Gen 3
scenario: You are designing an on-device personalization system that fine-tunes the
  last 3 MBConv blocks of MobileNetV3 on A17 Pro (35 TOPS, 8GB RAM) using 50 labeled
  images per class. Evaluate whether depthwise separable convolutions or standard
  convolutions in these final blocks better balance training speed and accuracy for
  on-device learning.
question: How would you evaluate whether depthwise separable convolutions or standard
  convolutions in these final blocks better balance training speed and accuracy for
  on-device learning?
details:
  realistic_solution: 'While depthwise separable convolutions drastically reduce forward-pass FLOPs, backpropagation through depthwise layers is often not natively supported on mobile NPUs like the ANE, causing a fallback to the CPU. A standard convolution might execute entirely on the NPU. Therefore, despite a higher FLOP count, standard convolutions can train faster on-device by avoiding the severe CPU fallback and cross-processor memory copy overhead.'
  common_mistake: Assuming on-device training follows the same compute/memory tradeoffs
    as cloud training; ignoring that backpropagation through depthwise layers on ANE
    is not natively supported and falls back to CPU, making depthwise backward passes
    10\u00d7 slower than forward on A17 Pro.
  napkin_math: 'Consider a standard 3x3 conv at 7x7 resolution with 160 channels: 2 \times 7 \times 7 \times 160 \times 160 \times 3 \times 3 \approx 22.6M FLOPs. A depthwise separable equivalent requires only \approx 2.65M FLOPs (an 8.5x reduction). However, if the backward pass for the depthwise layer falls back to the CPU, transferring the 160-channel activation tensor across the SoC and executing on the CPU will easily incur latency that exceeds the time the ANE would take to execute the full 22.6M FLOP standard convolution.'
