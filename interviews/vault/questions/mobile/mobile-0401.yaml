title: The Real-Time Stutter
scenario: You are developing a real-time video filter that must run at 30 FPS (33ms per frame). On a new
  device, all 100 layers of your model delegate to the NPU in FP16, meeting the 33ms budget. On an older
  device, 95 of the layers run on the NPU, but 5 custom layers in a sequential block fall back to the
  CPU in FP32. You measure the NPU taking 25ms for the 95 layers, and each CPU layer taking 3ms. The OS
  vendor documentation states each NPU-CPU context switch incurs a 1ms overhead. Diagnose the performance
  bottleneck by calculating the total frame latency on the older device.
details:
  realistic_solution: The device is dropping frames because the total latency exceeds the 33ms budget.
    The total latency is the sum of the NPU compute time, the CPU compute time, and the context-switching
    overhead. The five layers falling back to the CPU create a significant compute bottleneck, which,
    when added to the NPU time and overhead, pushes the total latency over the threshold. The fix is to
    optimize the CPU portion by creating an INT8-quantized implementation for the 5 fallback layers, drastically
    reducing their 15ms execution time.
  common_mistake: Engineers often focus on just one part of the latency equation. They might blame the
    context-switch overhead as the 'killer', or see a 95% delegation ratio and assume it's 'good enough'
    without doing the math. They fail to calculate the actual time spent on the CPU, which is often the
    dominant factor in a partial fallback scenario.
  napkin_math: '1. **Target Latency**: 1000ms / 30 FPS = 33.3ms per frame. 2. **Compute Latency**: 25ms
    (NPU) + 5 × 3ms (CPU) = 40ms. 3. **Context Switch Overhead**: Assuming the 5 CPU layers are sequential,
    there is 1 switch from NPU to CPU, and 1 switch back to NPU. 2 switches × 1ms = 2ms. 4. **Total Latency**:
    40ms + 2ms = 42ms. 42ms > 33.3ms, resulting in dropped frames.'
  options:
  - The NPU is too slow. 25ms for 95 layers is the main bottleneck; the model needs to be pruned to run
    faster on the NPU.
  - The 2ms context switch overhead is the primary issue, as it adds nearly 10% to the latency budget.
    The model must be re-architected to remove all unsupported ops.
  - The total latency is ~42ms (25ms NPU + 15ms CPU + 2ms overhead), exceeding the 33ms budget. The 15ms
    spent on the CPU is the main bottleneck.
  - A 95% delegation ratio is simply not high enough for real-time video; you must achieve at least 99%
    for the feature to be viable.
  correct_index: 2
