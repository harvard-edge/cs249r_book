title: Real-Time Sensor Data Ingestion and Anomaly Detection on Edge NPU
scenario: You are tasked with designing a low-latency system for real-time processing of high-frequency sensor data (e.g., accelerometers) on a mobile device equipped with an NPU (34.7 TOPS, 12 GB LPDDR5X). The sensor generates data at 1 kHz, with each sample being 16 bytes. The goal is to perform anomaly detection on a 1-second rolling window of data, with results available within 50ms of the window ending.
question: How would you ingest 1 kHz sensor data and run 1-second-window anomaly inference on the NPU within 50ms?
details:
  realistic_solution: Implement a double-buffering or ring-buffer strategy within a memory region accessible by both the CPU and NPU. Utilize Direct Memory Access (DMA), if available, for efficient, low-overhead data transfer from the sensor interface to these buffers. The CPU's role would primarily be to manage the buffers and trigger NPU inference. The NPU processes 1-second batches of data from one buffer while the other buffer is being filled.
  common_mistake: |
    **The Pitfall:** Under-optimizing data movement and buffering.
    **The Rationale:** Naive implementations rely on frequent small data transfers between CPU and NPU memory, causing severe context switching.
    **The Consequence:** Memory bandwidth saturation and high latency that breaks real-time inference deadlines.
  napkin_math: |
    1. Data Rate: 1 kHz * 16 bytes = 16 KB/s. Window Size: 1 sec = 16 KB.
    2. Inference Time Budget: 50 ms.
    3. Required Bandwidth: 16 KB / 0.05 s = 320 KB/s.
    4. **Compute Check:** 10M MACs / 17.35T MACs/s = ~0.57 microseconds. **Compute is abundant; data staging is the true bottleneck.**
