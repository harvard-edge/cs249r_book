title: Real-Time Sensor Data Ingestion and Anomaly Detection on Edge NPU
scenario: You are tasked with designing a low-latency system for real-time processing of high-frequency sensor data. The sensor generates data at 1 kHz, with each sample being 16 bytes. The goal is to perform anomaly detection on a 1-second rolling window.
question: How would you ingest 1 kHz sensor data and run 1-second-window anomaly inference on the NPU within 50ms?
details:
  realistic_solution: |
    Implement a zero-copy ring-buffer strategy within a memory region accessible by both the CPU and NPU. Utilize Direct Memory Access (DMA) for efficient, low-overhead data transfer from the sensor interface to these buffers. The CPU manages buffer states and triggers NPU inference via lightweight interrupts. The NPU processes 1-second batches from one buffer partition while the DMA fills the next.
  common_mistake: |
    **The Pitfall:** Under-optimizing data movement and buffering.
    **The Rationale:** Naive implementations rely on frequent small data transfers between CPU and NPU memory, causing severe context switching.
    **The Consequence:** Memory bandwidth saturation and high latency that breaks real-time inference deadlines.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Data Rate: 1 kHz * 16 bytes = 16 KB/s
       - Window Size: 1 sec = 16 KB
       - Inference Time Budget: 50 ms
    2. **Calculations:**
       - Required Bandwidth: 16 KB / 0.05 s = 320 KB/s
       - Compute Check: 10M MACs / 17.35T MACs/s = ~0.57 microseconds
    3. **Conclusion & Interpretation:** **Compute is instantaneous; optimal buffering is required to manage 320 KB/s. Result: I/O Staging-Bound.**
