title: Mobile Quality Tier Design
scenario: A mobile app can ship INT8 to high-memory phones, INT4 to mid-tier phones, and 2-bit to low-memory phones. Design a quality-tier policy.
question: How would you design quality tiers for INT8, INT4, and 2-bit mobile model variants?
details:
  realistic_solution: Define device eligibility, per-tier quality thresholds, fallback behavior, and telemetry. INT8 should be preferred when memory allows, INT4 can serve mid-tier devices after accuracy validation, and 2-bit should be limited to tasks where quality loss is acceptable.
  common_mistake: Maximizing device coverage by giving every low-memory device the most compressed model without tracking quality cliffs.
  napkin_math: 'Relative weight sizes versus INT8: INT4 is 0.5x, 2-bit is 0.25x, before metadata.'
