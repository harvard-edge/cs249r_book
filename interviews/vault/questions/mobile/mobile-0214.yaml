validation_issues:
- The 'Napkin Math' calculation in step 2 for FL Overhead is incorrect; it calculates
  50MB per user, but states 50TB daily bandwidth, which implies 1 million users *
  50MB each, but the conclusion says 'Centralized is 5x cheaper' - the initial data
  point 10KB vs 50MB is 5000x difference not 5x. The reasoning for FL's data tax is
  accurate, but the napkin math is inconsistent and incorrect.
