title: The Federated Learning Data Tax
scenario: We're considering a 'smart reply' feature for our mobile messaging app.
  The two options are centralized training vs. Federated Learning (FL).
question: How much more daily bandwidth can Federated Learning use than centralized
  upload for a smart reply feature?
details:
  realistic_solution: 'FL uploads more data per user than centralized. Centralized:
    10 KB/day of raw data. FL: gradient = model size (e.g., 500 KB compressed per
    round). With 4 rounds/day = 2 MB/day — 200x more than centralized. FL trades bandwidth
    for privacy: more bytes, but noisy gradients, not raw keystrokes. Break-even depends
    on regulatory cost: GDPR compliance + breach liability for centralized data often
    exceeds FL''s bandwidth cost.'
  common_mistake: Engineers often assume that because Federated Learning is 'private'
    and processes data locally, it must be more efficient in every dimension. They
    forget that sending a full model weight update can be orders of magnitude larger
    than sending the small piece of raw data it was trained on.
  napkin_math: '1. Evaluate Centralized Cost: At 10 KB per user per day, with 1 Million
    users, total data = 1,000,000 * 10 KB = 10 GB per day. 2. FL Overhead: Sending
    model weight updates (e.g., 50 MB per user) for Federated Learning vastly exceeds
    the 10 KB raw payload. Centralized collection is exponentially cheaper here.'
  options:
  - Federated Learning uploads 100x more data (1 MB vs 10 KB)
  - Centralized training uploads more data because raw text is less efficient than
    model weights.
  - Federated Learning uploads 200x more data (2 MB vs 10 KB)
  - They are roughly equal; the privacy benefit has no significant data cost.
  correct_index: 2
