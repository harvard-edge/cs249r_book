title: 'Network Bandwidth Bottlenecks: Implement Memory-Bandwidth-Bound TPOT Derivation'
scenario: You need to derive the memory-bandwidth-bound Time Per Output Token (TPOT) formula for on-device LLM autoregressive decode.
question: How do you derive the memory-bandwidth-bound TPOT formula, and what is the latency for a 3B INT4 model on a device with 77 GB/s bandwidth?
details:
  realistic_solution: |
    The TPOT formula under bandwidth constraints is simply the model size in bytes divided by the memory bandwidth. This holds strictly when the arithmetic intensity is below the hardware roofline ridge point. For batch size 1, LLM decode is universally memory-bandwidth-bound.
  common_mistake: |
    **The Pitfall:** Applying the bandwidth formula blindly without verifying arithmetic intensity against the roofline ridge point.
    **The Rationale:** Memorizing formulas without understanding the piecewise transition between compute-bound and memory-bound regimes.
    **The Consequence:** Calculating wildly incorrect latency estimates for high-batch or high-intensity workloads where compute actually dominates.
  napkin_math: |
    1. **Assumptions & Constraints:** 3B INT4 model = 1.5 GB. Bandwidth = 77 GB/s. Arithmetic Intensity (AI) = 4 FLOPs/byte. Ridge point > 1000 FLOPs/byte.
    2. **Calculations:** AI (4) << Ridge Point. TPOT = 1.5 GB / 77 GB/s = 0.01948 seconds.
    3. **Conclusion & Interpretation:** **Result: Memory-Bandwidth-Bound**. The TPOT strictly follows the memory bandwidth curve, resulting in ~19.5ms per token.
