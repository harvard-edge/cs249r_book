title: 'Network Bandwidth Bottlenecks: Implement Memory-Bandwidth-Bound TPOT Derivation'
scenario: 'You need to derive the memory-bandwidth-bound Time Per Output Token (TPOT) formula for on-device LLM decode.'
question: 'How do you derive memory-bandwidth-bound TPOT for mobile LLM decode, and what are the TPOT results for (A) 1B INT8 on A17 Pro (68 GB/s), (B) 3B INT4 on Snapdragon 8 Gen 3 (77 GB/s), and (C) 7B INT4 on Tensor G3 (50 GB/s)?'
details:
  realistic_solution: 'Formula: TPOT_bw = model_size_bytes / memory_bandwidth. Validity: only when arithmetic_intensity < ridge_point. All three cases are memory-bandwidth-bound for batch size 1.'
  common_mistake: |
    **The Pitfall:** Applying the bandwidth formula without verifying the arithmetic intensity against the hardware ridge point.
    **The Rationale:** Candidates memorize the TPOT formula but forget it is a piecewise function that shifts to compute-bound if intensity > ridge point.
    **The Consequence:** Providing incorrect latency estimates for scenarios where compute is the actual bottleneck.
  napkin_math: |
    1. **(A) 1B INT8 on A17 Pro (68 GB/s):** Model = 1GB. Ridge = 35T/68G = 514 FLOPs/byte. AI = 2 FLOPs/byte (2 << 514, BW-bound). TPOT = 1GB / 68GB/s = **14.7ms**.
    2. **(B) 3B INT4 on Snapdragon (77 GB/s):** Model = 1.5GB. Ridge = 90T/77G = 1169 FLOPs/byte. AI = 4 FLOPs/byte (4 << 1169, BW-bound). TPOT = 1.5GB / 77GB/s = **19.5ms**.
    3. **(C) 7B INT4 on Tensor G3 (50 GB/s):** Model = 3.5GB. Ridge = ~1800 FLOPs/byte. AI = 4 FLOPs/byte (4 << 1800, BW-bound). TPOT = 3.5GB / 50GB/s = **70.0ms**.
