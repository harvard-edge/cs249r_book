details:
  realistic_solution: 'Stage rates: download = 150 Mbps = 18.75 MB/s; decrypt
    = 1200 MB/s; UFS write = 4000 MB/s; NPU mapped-ingest = 6000 MB/s.
    Pipeline rate is gated by the slowest stage - download at 18.75 MB/s -
    so end-to-end streaming time = 2048 MB / 18.75 = 109.2 s. The 64 MB ring
    buffer matters only if a downstream stage stalls; here download is 64x
    slower than the next-slowest stage (decrypt) and 320x slower than UFS, so
    the rings stay nearly empty. Pipeline fill+drain (one ring per stage) =
    64/1200 + 64/4000 + 64/6000 = 53 + 16 + 11 = 80 ms (negligible). Total =
    109.2 s + 0.08 s = 109.3 s, comfortably inside the 180 s SLA. Adding the
    NPU mapping stage does not change the answer because download remains the
    binding stage; even with an NPU at 1 GB/s the bind would still be download.'
  common_mistake: 'Concluding UFS or NPU bandwidth dominates and ignoring that
    pipeline rate equals the slowest stage. A second common slip: counting the
    full NPU pre-load time as additive to streaming, when in an overlapped
    pipeline only the fill/drain bubble is paid once.'
  napkin_math: 'Stages: 18.75 -> 1200 -> 4000 -> 6000 MB/s. Bind = 18.75 MB/s.
    Stream = 2048/18.75 = 109.2 s. Fill+drain = 64*(1/1200 + 1/4000 + 1/6000)
    = 80 ms. Total = 109.3 s < 180 s SLA.'
