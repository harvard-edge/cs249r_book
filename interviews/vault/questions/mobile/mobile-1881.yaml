title: 5G Model Update Bottleneck
scenario: A Snapdragon 8 Gen 3 phone downloads an updated 2GB INT8 LLM over a 5G connection
  averaging 150 Mbps, before distributing sub-modules to the NPU.
question: Create a specification for the maximum tolerable latency budget for the
  download and memory transfer phases if the update must complete in under 3 minutes.
visual:
  kind: svg
  path: mobile-1881.svg
  alt: A fanout diagram showing data flowing from the Cloud to a Phone and then to
    its NPU.
  caption: Model download and local transfer pipeline.
details:
  realistic_solution: A 2GB payload is $2 \times 8 = 16$ Gigabits. Over 150 Mbps,
    download takes $16,000 / 150 = 106.6$ seconds. Transferring 2GB over UFS 4.0 to
    RAM and NPU takes less than 1 second. The 3-minute (180s) budget leaves a generous
    72-second margin for network fluctuations or connection drops.
  common_mistake: Confusing Megabytes per second (MB/s) with Megabits per second (Mbps)
    when calculating the download time.
  napkin_math: 2GB = 16Gb. 16,000Mb / 150Mbps = 106s. 106s < 180s budget.
