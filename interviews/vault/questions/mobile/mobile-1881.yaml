title: 5G Model Update Bottleneck
scenario: A Snapdragon 8 Gen 3 phone downloads an updated 2 GB INT8 LLM over
  a 5G connection averaging 150 Mbps, mmap-decrypts-and-rehashes chunks on a
  single Cryptography Extension core (1.2 GB/s sustained), serialises them to
  UFS 4.0 storage (4 GB/s sequential write), and finally pre-loads the
  decrypted weights into the Hexagon NPU's mapped tensor heap (the NPU SMMU
  can ingest weights at ~6 GB/s once memory-mapped). Each pipeline stage has
  a 64 MB ring buffer (page-pool); all four stages can overlap end-to-end.
question: Create a specification of per-stage rates for the four-stage Cloud
  -> 5G modem -> Crypto/UFS -> NPU load pipeline, identify the binding
  bottleneck under the 64 MB ring constraint, and determine whether the
  3-minute end-to-end SLA is feasible. Quantify the pipeline fill+drain cost
  added by the downstream NPU mapping stage and confirm whether it changes
  the SLA outcome.
