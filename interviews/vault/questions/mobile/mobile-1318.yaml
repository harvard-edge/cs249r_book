title: A17 Pro NPU Distillation Throughput
scenario: You are deploying a distilled student model for real-time inference on the Apple A17 Pro Neural Engine. The 16-core NPU provides a theoretical peak of 35 TOPS at roughly 5W, drawing from a shared 8 GB unified memory.
question: What maximum IPS and energy per inference does the distilled A17 Pro student achieve at 60% utilization if it requires 0.5 GOPS per inference?
details:
  realistic_solution: The correct approach scales the theoretical peak TOPS by the expected hardware utilization to find the effective compute throughput. Dividing this effective throughput by the per-inference compute cost yields the realistic inferences per second. The energy per inference is the continuous power draw divided by this throughput.
  common_mistake: |
    **The Pitfall:** Assuming 100% compute utilization and botching unit conversions.
    **The Rationale:** Candidates divide 35 directly without applying the 60% realistic utilization factor, and often confuse TOPS with GOPS.
    **The Consequence:** The calculated IPS is inflated by 66%, and the energy estimates are wildly incorrect by orders of magnitude.
  napkin_math: |
    - Peak Compute: 35 TOPS = 35,000 GOPS.
    - Effective Compute (60% utilization): 35,000 * 0.6 = 21,000 GOPS.
    - Throughput: 21,000 GOPS / 0.5 GOPS/inference = 42,000 inferences/second.
    - Energy per inference: 5 Watts (Joules/sec) / 42,000 inferences/sec = **0.119 mJ**.
