title: A17 Pro NPU Distillation Throughput
scenario: You are deploying a distilled student model for real-time inference on a mobile NPU. The NPU provides a theoretical peak of 35 TOPS at 5W. The model requires 0.5 GOPS per inference.
question: What maximum IPS and energy per inference does the distilled student achieve at 60% NPU utilization?
details:
  realistic_solution: The architecture scales the theoretical peak TOPS by the sustained hardware utilization limit (60%) to establish the effective compute envelope. By dividing this effective throughput by the operational footprint (0.5 GOPS), we derive the inferences per second (IPS). The energy consumption is derived by amortizing the continuous 5W power draw over the realized IPS.
  common_mistake: |
    **The Pitfall:** Assuming 100% compute utilization and botching unit conversions.
    **The Rationale:** Candidates divide 35 directly without applying the 60% realistic utilization factor, and often confuse TOPS with GOPS.
    **The Consequence:** The calculated IPS is inflated by 66%, and the energy estimates are wildly incorrect by orders of magnitude.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Peak Compute: 35 TOPS (35,000 GOPS).
       - Expected Utilization: 60%.
       - Workload: 0.5 GOPS/inference.
       - Power: 5W (5 Joules/sec).
    2. **Calculations:**
       - Effective Compute: 35,000 * 0.60 = 21,000 GOPS.
       - Throughput (IPS): 21,000 GOPS / 0.5 GOPS/inference = 42,000 IPS.
       - Energy per inference: 5 J/s / 42,000 inferences/sec = 0.000119 J = 0.119 mJ.
    3. **Conclusion & Interpretation:**
       - **Result: 42,000 IPS / 0.119 mJ.** The deployment is highly efficient and operates within **Compute-Bound** limits at 60% utilization.
