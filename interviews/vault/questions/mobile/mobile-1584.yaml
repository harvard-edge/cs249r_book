title: 'Extreme Quantization for On-Device LLM: A17 Pro Evaluation'
scenario: 'You are tasked with deploying a cutting-edge large language model (LLM) onto the Apple A17 Pro chip. You have two highly quantized model variants: Model A, aggressively quantized to a sub-3-bit format, and Model B, optimized using GPTQ/AWQ for 4-bit integer quantization. The Apple A17 Pro features a 35 TOPS Neural Engine, operates within a ~5W power envelope, and has 8 GB of unified memory.'
question: 'How would you evaluate extreme quantization options for an on-device LLM on Apple A17 Pro considering power, performance, and latency?'
details:
  realistic_solution: 'Perform offline accuracy evaluations for baseline degradation. Next, profile on-device to measure true end-to-end latency, power, and memory footprints. Analyze the effective throughput against theoretical TOPS, ensuring that sub-3-bit variants don''t incur massive unpacking penalties that destroy the battery budget.'
  common_mistake: |
    **The Pitfall:** Selecting extreme quantization based entirely on memory footprint without testing ALU unpacking cost.
    **The Rationale:** Candidates assume 2-bit always doubles performance of 4-bit by strictly looking at bandwidth math.
    **The Consequence:** Deploying a 2-bit model that runs 3x slower and hotter because the NPU lacks native sub-4-bit ALUs and stalls doing bitmasking.
  napkin_math: |
    **Assumptions & Constraints:**
    - Memory Footprint: 7B parameters.
    - Model B (4-bit) requires ~3.5 GB.
    - Model A (2-bit) needs ~1.75 GB.
    - Peak Efficiency Target: 35 TOPS / 5W = 7 TOPS/W.

    **Calculations:**
    - Ideal Compute Bound: 1 TeraOp required for a 4-bit model forward pass.
    - At 35 TOPS, theoretically ~28ms.
    - The Catch: If 2-bit unpacking takes 5 additional integer operations per weight, the compute load jumps to 6 TeraOps.

    **Conclusion & Interpretation:**
    - **Result: Compute-Bound**. Taking 168ms and exceeding the thermal budget.
