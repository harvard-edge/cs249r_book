title: On-Device Active Learning Data Selection
scenario: You are building an on-device data curation pipeline for a smart camera app to identify and upload hard edge-cases. The app processes a continuous 30 FPS 1080p video stream.
question: How should a mobile device score a 30 FPS 1080p stream for active learning without disrupting foreground apps and shared memory?
details:
  realistic_solution: 'The solution should use a lightweight, single-pass proxy model on the 16-core Neural Engine for scoring, keeping compute utilization minimal. Crucially, frames must be downsampled before buffering. A hierarchical cascade should be used to evaluate uncertainty and select data, ensuring the background memory footprint remains small enough not to trigger OS memory pressure warnings.'
  common_mistake: |
    **The Pitfall:** Buffering uncompressed high-resolution frames in main memory.
    **The Rationale:** Candidates treat mobile memory like cloud servers, forgetting that unified RAM is strictly shared with the OS and foreground apps.
    **The Consequence:** The background process consumes hundreds of megabytes, instantly triggering OS memory pressure warnings and app termination (jetsam).
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Stream: 30 FPS at 1080p (1920x1080x3 bytes = 6.22 MB/frame).
       - Buffer duration: 3 seconds (90 frames).
       - Proxy Model: 2 GOPS, 224x224x3 input (150 KB/frame).
       - Hardware: 35 TOPS NPU.
    2. **Calculations:**
       - Raw Buffer Size: 90 frames * 6.22 MB = 559.8 MB.
       - Downsampled Buffer Size: 90 frames * 150 KB = 13.5 MB.
       - Compute Load: 2 GOPS * 30 FPS = 60 GOPS.
       - NPU Utilization: 60 GOPS / 35,000 GOPS = 0.17%.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound optimization. Downsampling prevents OOM by reducing memory from 560MB to 13.5MB, consuming only 0.17% of NPU compute.**
