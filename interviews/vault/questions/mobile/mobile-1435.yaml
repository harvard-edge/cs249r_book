title: On-Device Active Learning Data Selection
scenario: You are building an on-device data curation pipeline for a smart camera app to identify and upload hard edge-cases. The app processes a continuous 30 FPS 1080p video stream.
question: How should a mobile device score a 30 FPS 1080p stream for active learning without disrupting foreground apps and shared memory?
details:
  realistic_solution: The solution should use a lightweight, single-pass proxy model
    on the 16-core Neural Engine for scoring, keeping compute utilization minimal.
    Crucially, frames must be downsampled before buffering. A hierarchical cascade
    should be used to evaluate uncertainty and select data, ensuring the background
    memory footprint remains small enough not to trigger OS memory pressure warnings.
  common_mistake: |
    **The Pitfall:** Buffering uncompressed high-resolution frames in memory.
    **The Rationale:** Candidates treat mobile memory like cloud servers, forgetting that unified RAM is shared with the OS and foreground apps.
    **The Consequence:** The background process consumes hundreds of megabytes, triggering OS memory pressure warnings and app termination.
  napkin_math: |
    - **Raw Memory Buffering:** 3 seconds at 30 FPS = 90 frames.
    - **1080p Size:** 1920 * 1080 * 3 bytes = 6.2 MB/frame. Buffer = 90 * 6.2 = 558 MB (prohibitive for background).
    - **Downsampled Size:** 224x224x3 = 150 KB/frame. Buffer = 90 * 150 KB = 13.5 MB.
    - **Compute Load:** 2 GOPS proxy model * 30 FPS = 60 GOPS.
    - **Result:** Downsampling reduces memory to **13.5 MB** and compute to **0.17% of a 35 TOPS NPU**, making it background-safe.
