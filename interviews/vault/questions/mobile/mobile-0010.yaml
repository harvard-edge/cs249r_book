title: The Conversion Cliff
scenario: You trained a PyTorch model with a custom GELU activation and grouped query attention. You convert
  it to CoreML for iPhone deployment. The conversion succeeds with no errors, but on-device accuracy is
  significantly worse than your PyTorch baseline. What went wrong?
details:
  realistic_solution: 'Silent operator approximation. CoreML (and TFLite) converters handle unsupported
    ops by substituting approximate implementations. GELU might be replaced with a sigmoid-based approximation
    (`x * sigmoid(1.702 * x)`) instead of the exact erf-based version your model was trained with. Grouped
    query attention may be decomposed into a sequence of reshapes and standard attention ops that introduces
    numerical drift. The conversion "succeeds" because the graph is structurally valid, but the mathematical
    behavior has shifted. The fix: always run a numerical comparison (max absolute error, cosine similarity)
    between the original and converted model on a reference dataset *before* deployment.'
  common_mistake: '"Quantization during conversion caused the accuracy drop." But you haven''t quantized
    — the model is FP16 in both cases.'
  napkin_math: 'GELU exact: $x \cdot \Phi(x)$ where $\Phi$ is the Gaussian CDF. GELU approximate: $x \cdot
    \sigma(1.702x)$. Max absolute difference between the two: ~0.004 at $x \approx -1.5$. Across millions
    of activations over dozens of layers, these errors compound. A model with 24 transformer layers can
    accumulate enough drift to shift top-1 accuracy by 1–3%.'
