title: The Conversion Cliff
scenario: You trained a PyTorch model with a custom GELU activation and grouped query attention. You convert it to CoreML for iPhone deployment. The conversion succeeds with no errors, but on-device accuracy is significantly worse than your PyTorch baseline.
question: What went wrong during the seemingly successful PyTorch to CoreML conversion?
details:
  realistic_solution: 'Silent operator approximation. CoreML (and TFLite) converters handle unsupported ops by substituting approximate implementations. GELU might be replaced with a sigmoid-based approximation (`x * sigmoid(1.702 * x)`) instead of the exact erf-based version your model was trained with. Grouped query attention may be decomposed into a sequence of reshapes and standard attention ops that introduces numerical drift. The conversion "succeeds" because the graph is structurally valid, but the mathematical behavior has shifted. The fix: always run a numerical comparison (max absolute error, cosine similarity) between the original and converted model on a reference dataset *before* deployment.'
  common_mistake: |
    **The Pitfall:** Blaming precision quantization for structural graph changes.
    **The Rationale:** Developers immediately assume that the conversion quantized the model to INT8, even if the model remained in FP16.
    **The Consequence:** They waste time auditing precision constraints instead of realizing that the converter silently swapped unsupported exact ops for approximate ones.
  napkin_math: |
    1. GELU exact difference from approximate: ~0.004 max absolute error at $x \approx -1.5$.
    2. Compounding errors: Across millions of activations in 24 layers, the ~0.004 error compounds massively.
    3. Conclusion: **This tiny per-activation mathematical drift fundamentally shifts the network output, resulting in a 1-3% accuracy drop without any runtime warnings.**
