title: The Predictive Text Deadline
scenario: Your team is optimizing a predictive text feature powered by an on-device LLM for a new smartphone. The feature must suggest the next 5 tokens of a sentence within 500ms to feel responsive. Based on performance profiling, you've measured that the Time To First Token (TTFT) is 150ms, and the subsequent Time Per Output Token (TPOT) is 50ms.
question: Does the model meet the 500ms latency deadline for generating exactly 5 tokens?
details:
  realistic_solution: "Yes, the model easily meets the real-time deadline. The end-to-end latency for an autoregressive LLM is the sum of the TTFT (which handles prompt prefill and the generation of the 1st token) and the TPOT for the remaining N-1 tokens. Total Latency = 150ms (Token 1) + 4 * 50ms (Tokens 2-5) = 350ms. The system has 150ms of headroom against the 500ms budget."
  common_mistake: |
    **The Pitfall:** Multiplying the TPOT by the total number of tokens (5) and adding it to the TTFT.
    **The Rationale:** Engineers perform lazy mental math, forgetting that the first token's generation time is fully encapsulated within the TTFT metric.
    **The Consequence:** Incorrectly forecasting latency budgets, leading to unnecessary model quantization or performance optimizations.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Deadline: 500ms.
       - Total tokens to generate: 5.
       - TTFT (Time To First Token): 150ms.
       - TPOT (Time Per Output Token): 50ms.
    2. **Calculations:**
       - Time for Token 1 (Prefill + Decode): 150ms.
       - Time for Tokens 2-5: 4 tokens * 50ms = 200ms.
       - Total End-to-End Latency: 150ms + 200ms = 350ms.
    3. **Conclusion & Interpretation:**
       - **Result: Within Deadline.** 350ms strictly passes the 500ms constraint with 150ms of headroom to spare.
  options:
  - "400ms. It meets the deadline with 100ms to spare."
  - "250ms. It meets the deadline with 250ms to spare."
  - "350ms. It meets the deadline with 150ms to spare."
  - "750ms. It fails to meet the deadline."
  correct_index: 2
