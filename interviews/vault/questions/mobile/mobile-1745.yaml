title: 'DP-SGD on Mobile NPU: Securing User Data for Federated Learning'
scenario: A health tech company is developing an on-device federated learning (FL) system for early disease detection using a mobile NPU. User sensor data and activity patterns are highly sensitive. The model will be trained locally on mobile devices, with only aggregated model updates sent to a central server. The goal is to efficiently train a MobileNetV2 variant (~3.5M parameters, FP16) on the NPU while guaranteeing strong privacy.
question: 'How would you implement differentially private federated learning for a MobileNetV2 health model on the mobile NPU?'
details:
  realistic_solution: 'Implement client-side DP-SGD by leveraging the NPU''s capabilities for efficient vector operations to perform L2 norm clipping of gradients. Calibrate the Gaussian noise by carefully selecting the noise multiplier (sigma) based on the desired total epsilon and delta, considering the number of training rounds and the chosen clipping bound (sensitivity). Employ an adaptive clipping strategy that dynamically adjusts the clipping threshold to minimize the privacy-utility trade-off. Quantize gradients to lower precision (e.g., 8-bit or 4-bit integers) before adding noise to reduce memory bandwidth and computation, taking advantage of the NPU''s integer arithmetic capabilities. The 12 GB LPDDR5X memory on the Exynos 2400 is ample for storing model parameters and gradients for a MobileNetV2 variant, but optimizing memory access patterns for gradient clipping and noise addition is crucial for performance.'
  common_mistake: |
    **The Pitfall:** Applying standard DP-SGD without optimizing the L2 clipping and noise generation for the NPU's vector architecture.
    **The Rationale:** Candidates treat DP-SGD purely as a mathematical formula, overlooking the hardware penalty of massive random number generation and per-example gradient clipping.
    **The Consequence:** Local training times balloon to unacceptable levels, draining the battery and causing the mobile OS to kill the background training task.
  napkin_math: |
    **Assumptions & Constraints:**
    - 3.5M FP16 params.
    - 34.7 TOPS NPU.
    - DP operations (clipping, noise) take ~10M ops per step.

    **Calculations:**
    - 10M operations / 34.7 TOPS = ~0.0003 ms per step.

    **Conclusion & Interpretation:**
    - **Result: ~0.0003 ms per step (Compute-Bound)**. DP-SGD compute overhead.
