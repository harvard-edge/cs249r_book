title: On-Device Multimodal Architecture for Snapdragon 8 Gen 3
scenario: You are architecting an on-device multimodal agent running a 7B parameter LLM and a real-time Vision Transformer simultaneously on a Qualcomm Hexagon NPU (Snapdragon 8 Gen 3).
question: How would you architect a quantization and memory allocation strategy to fit a 7B LLM and ViT within the 12-16GB RAM and 64GB/s limits, guaranteeing 15 tok/s and 30 FPS without OS evictions?
details:
  realistic_solution: A robust L6+ architecture uses W4A8 (4-bit weight, 8-bit activation) quantization for the LLM to fit the Hexagon NPU's INT8 pipelines while halving memory bandwidth demands. The ViT is pipelined onto the GPU or a dedicated ISP block, isolating its memory traffic. A ring-buffer is designed for the KV cache to enforce a strict memory ceiling, ensuring the total ML payload never exceeds 6.5GB, thereby safely coexisting with the OS in the shared memory pool.
  common_mistake: |
    **The Pitfall:** Calculating static weight sizes and assuming it easily fits in RAM.
    **The Rationale:** Candidates fail to account for the dynamic KV cache footprint and the baseline 4-6GB OS memory reservation.
    **The Consequence:** The design triggers massive OS evictions and system crashes in production.
  napkin_math: |
    1. LLM Weights (INT4): 7B * 0.5 bytes = 3.5 GB.
    2. KV Cache (4K context, FP16): 4096 (tokens) * 32 (layers) * 32 (heads) * 128 (head_dim) * 2 (K,V) * 2 (bytes/FP16) = ~2.1 GB.
    3. Total ML RAM: 3.5 GB (LLM) + 2.1 GB (KV) + 0.5 GB (ViT) = 6.1 GB.
    4. Compute Validation: 15 tok/s * 14 GOps = 210 GOps/s (0.21 TOPS, fits in 45 TOPS).
    5. Bandwidth Validation: Autoregressive decoding requires loading all weights per token. 15 tok/s * 3.5 GB = 52.5 GB/s.
    **Conclusion:** Fits well within LPDDR5X 64 GB/s limits, proving INT4 is mandatory over INT8.
