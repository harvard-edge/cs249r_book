title: Design speculative decoding architecture for memory-bound mobile serving
scenario: "You are designing an on-device serving engine for a 2B parameter LLM using INT4 quantization (1 GB weights). Memory bandwidth limits autoregressive token generation to 15 tokens/s."
question: "Propose an architectural modification to the serving engine that increases total system throughput for background tasks without exceeding the existing memory bandwidth."
details:
  realistic_solution: "Integrate a continuous batching runtime with speculative decoding (e.g., Medusa or EAGLE). By executing parallel verifications of multiple drafted tokens within a single weight-loading pass, the system radically boosts arithmetic intensity. This shifts operations from purely memory-bound weight fetches into compute-bound dense verifications."
  common_mistake: |
    **The Pitfall:** Suggesting standard prompt-phase batching without considering decoding limits.
    **The Rationale:** Candidates apply standard server-side batching intuition without realizing that autoregressive decoding is strictly memory-bandwidth bound per token.
    **The Consequence:** System memory footprint blows up via KV caches without meaningfully increasing token throughput, crashing the mobile serving engine.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Weight Size: 1 GB (INT4).
       - Bandwidth limit: 15 tokens/sec.
    2. **Calculations:**
       - Time per autoregressive fetch step = 1 GB / (15 * 1 GB/s) = ~66 ms per fetch.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound.** By replacing sequential generation with speculative continuous batching, the system transforms single-token memory fetches into batched parallel verifications, directly bypassing the **66ms** memory bottleneck.
