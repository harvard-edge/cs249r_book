title: Design speculative decoding architecture for memory-bound mobile serving
scenario: You are designing an on-device serving engine for a 2B parameter LLM using
  INT4 quantization (1 GB weights) on a Snapdragon 8 Gen 3. Memory bandwidth limits
  autoregressive token generation to 15 tokens/s.
question: Propose an architectural modification to the serving engine that increases
  total system throughput for background tasks without exceeding the existing memory
  bandwidth.
details:
  realistic_solution: Implement continuous batching combined with speculative decoding.
    By drafting multiple tokens using a tiny sub-model or existing hidden states and
    verifying them in a single parallel pass, the system maximizes utilization of
    the 1GB memory bandwidth loaded per step. This increases overall tokens/sec by
    replacing sequential weight fetches with batched verifications.
  common_mistake: Suggesting standard batching alone without realizing it increases
    memory footprint via KV caches, or ignoring the strict memory bandwidth bound.
  napkin_math: 1GB weights / 15 tok/s = 66ms per autoregressive fetch step
