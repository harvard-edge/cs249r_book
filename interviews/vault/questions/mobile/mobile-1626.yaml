title: Differentiating Pruning Techniques for Mobile ML Acceleration on Tensor G3
scenario: You are optimizing a large language model (LLM) for on-device inference. To reduce model size and latency, you are considering applying pruning techniques.
question: How do unstructured and structured pruning differ for speedups, implementation complexity, and TPU friendliness?
details:
  realistic_solution: Unstructured pruning removes individual weights, leading to highly irregular sparsity patterns. While it can achieve high model compression, it often requires specialized sparse matrix multiplication kernels or hardware support that might not be fully optimized on mobile NPUs, potentially leading to limited real-world speedups. Structured pruning, conversely, removes entire channels, filters, or layers, resulting in smaller, dense models. These dense structures are typically much more hardware-friendly for accelerators designed for dense matrix operations, yielding more predictable and often greater actual speedups, even if the absolute sparsity percentage is lower than unstructured pruning for a comparable accuracy.
  common_mistake: |
    **The Pitfall:** Assuming unstructured pruning yields proportional speedups on mobile accelerators.
    **The Rationale:** Candidates focus on raw sparsity percentages and forget that unstructured sparse matrices create irregular memory access patterns that NPUs handle poorly.
    **The Consequence:** Applying unstructured pruning that reduces parameter count but actually decreases inference speed.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Dense baseline requires 100 GFLOPS. NPU peak = 7.5 TOPS.
       - 50% Structured Pruning reduces requirements strictly by half.
       - 50% Unstructured Pruning creates irregular memory access matrices.
    2. **Calculations:**
       - Dense utilization: 100 GFLOPS on 7.5 TOPS ≈ 1.3% of theoretical peak.
       - Structured: 50 GFLOPS maintains dense matrix hardware optimization. Predictable 2x speedup.
       - Unstructured: 50 GFLOPS workload runs at 10% of dense efficiency due to sparse-index pointer chasing.
    3. **Conclusion & Interpretation:** **Structured pruning guarantees predictable hardware speedups on dense-optimized mobile NPUs, while unstructured pruning fragments memory bandwidth.** Architecture-bound optimization trap.
