title: Differentiating Pruning Techniques for Mobile ML Acceleration on Tensor G3
scenario: You are optimizing a large language model (LLM) for on-device inference on the Google Tensor G3, which features a 7.5 TOPS on-device TPU and 12 GB LPDDR5X. To reduce model size and latency, you're considering applying pruning techniques.
question: How do unstructured and structured pruning differ for speedups, implementation complexity, and TPU friendliness on Tensor G3?
details:
  realistic_solution: Unstructured pruning removes individual weights, leading to highly irregular sparsity patterns. While it can achieve high model compression, it often requires specialized sparse matrix multiplication kernels or hardware support that might not be fully optimized on the Tensor G3's TPU, potentially leading to limited real-world speedups. Structured pruning, conversely, removes entire channels, filters, or layers, resulting in smaller, dense models. These dense structures are typically much more hardware-friendly for accelerators designed for dense matrix operations, such as the Tensor G3's TPU, yielding more predictable and often greater actual speedups, even if the absolute sparsity percentage is lower than unstructured pruning for a comparable accuracy.
  common_mistake: |
    **The Pitfall:** Assuming unstructured pruning yields proportional speedups on mobile accelerators.
    **The Rationale:** Candidates focus on raw sparsity percentages and forget that unstructured sparse matrices create irregular memory access patterns that NPUs handle poorly.
    **The Consequence:** Applying unstructured pruning that reduces parameter count but actually decreases inference speed.
  napkin_math: |
    1. **Dense Performance:** A layer requiring 100 GFLOPS on a 7.5 TOPS (7500 GFLOPS) TPU uses ~1.3% of theoretical peak.
    2. **Structured Pruning:** 50% structured pruning reduces requirements to 50 GFLOPS (~0.67% of peak). The dense structure remains hardware-friendly, yielding predictable speedups.
    3. **Unstructured Pruning:** Halving FLOPs to 50 GFLOPS might run at only 10% of peak dense performance due to irregular memory overheads, negating theoretical gains.
    4. **Conclusion:** **Structured pruning provides better real-world speedups on dense-optimized mobile TPUs.**
