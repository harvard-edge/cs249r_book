title: 'Kernel Fusion: Optimize Attention Fusion for Long-Context Mobile LLM'
scenario: Your 1B LLM on A17 Pro (35 TOPS Neural Engine, 8GB) currently supports 512-token context at
  25 tokens/sec but users request 4096-token context. Without fusion, the O(n²) attention matrix would
  be 4096²×8heads×2B = 268MB per layer. Analyze feasibility and design an optimized attention fusion strategy
  for 4096-context on 8GB device.
question: "How would you analyze feasibility and design an optimized attention fusion strategy for 4096-context on 8GB device?"
details:
  realistic_solution: 'Flash attention is mandatory for 4096 context: attention matrix 268MB × 28 attention
    layers = 7.5GB — exceeds available memory. Flash attention keeps only tiles in SRAM.'
  common_mistake: Assuming 4096-context is impossible without flash attention; not quantifying how much
    of the 8GB device RAM is available for KV cache and attention.
  napkin_math: 'At 512 context: attn matrix 512²×8×2B = 4.2MB per layer × 28 = 117MB. Fine for 8GB. At
    4096 context: 4096²×8×2B = 268MB per layer × 28 = 7.5GB — exceeds 8GB RAM (minus OS ~2GB, model 1.5GB
    → only 4.5GB free). Flash attention: never materializes full matrix. Tile 32×32 on SRAM: SRAM usage
    = 2 × 32 × 32 × 2B × 8 heads = 33KB. 8GB RAM usage: Q,K,V = 3 × 4096 × 128 × 8 × 2B = 25.2MB per layer
    × 28 = 706MB. KV cache: 28 × 2 × 4096 × 128 × 8 × 2B = 1.41GB. Model weights: 1.5GB. OS: 2GB. Total:
    0.706 + 1.41 + 1.5 + 2 = 5.6GB. Fits in 8GB. Token latency at 4096 context: KV read per token = 1.41GB
    / 68 GB/s = 20.7ms just for KV. Plus weights 22ms. Total: 42.7ms → 23.4 tok/sec. Near 25 tok/sec target.
    Feasible with flash attention.'
