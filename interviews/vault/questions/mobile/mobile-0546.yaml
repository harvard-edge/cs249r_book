title: The AI Keyboard Jank
scenario: You are the lead ML engineer for a new AI keyboard using an on-device LLM for predictive text. Profiling on a flagship NPU shows isolated requests have a Time-To-First-Token (TTFT) of 80ms and a Time-Per-Output-Token (TPOT) of 50ms. In production, the keyboard severely freezes.
question: Why does static batching cause the AI keyboard to freeze despite acceptable single-request TTFT and TPOT?
details:
  realistic_solution: |
    Static batching causes severe head-of-line blocking. The entire batch must stall until the longest sequence completes. This drastically inflates the P99 tail latency for short predictive text completions. Implementing continuous (in-flight) batching allows completed sequences to evict immediately, unblocking the UI thread.
  common_mistake: |
    **The Pitfall:** Optimizing for average throughput while ignoring the P99 tail latency induced by static queueing policies.
    **The Rationale:** Misdiagnosing interface lag as an NPU hardware limitation rather than tracing the request lifecycle through the batch scheduler.
    **The Consequence:** The main UI thread blocks while waiting for long sequences to finish, resulting in catastrophic interface jank.
  napkin_math: |
    1. **Assumptions & Constraints:** TTFT = 80ms. TPOT = 50ms. Max sequence in batch = 10 tokens. UI budget = 16ms (60Hz).
    2. **Calculations:** 10-token process time = 80ms + (50ms * 9) = 530ms. Static batch wait time for all queries = 530ms.
    3. **Conclusion & Interpretation:** **Result: Latency-Bound**. Static batching forces a 530ms delay, violently exceeding the 16ms UI budget and causing severe jank.
  options:
  - The latency equals (80ms + 50ms) * 4 = 520ms, proving the NPU is saturated and batch size must decrease.
  - The 80ms TTFT is inherently too slow for real-time UI, causing the jank.
  - Static batching forces short requests to wait ~530ms for the longest sequence to finish via head-of-line blocking.
  - The average latency of 330ms indicates the shared LPDDR5 memory bus is saturated.
