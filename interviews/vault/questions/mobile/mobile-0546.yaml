title: The AI Keyboard Jank
scenario: You are the lead ML engineer for a new AI keyboard on a flagship smartphone. The keyboard uses
  an on-device LLM to generate predictive text. Profiling on an Apple A17 Pro (35 TOPS NPU) shows that
  for a single, isolated request, the Time-To-First-Token (TTFT) is 80ms and the Time-Per-Output-Token
  (TPOT) is 50ms.
details:
  realistic_solution: 'The problem is **head-of-line blocking** caused by the static batching policy.
    The entire batch, including very short requests, must wait for the single longest request to complete.
    This creates an unacceptable tail latency. The P99 latency for a new request is the processing time
    of a full batch, which is dictated by the longest job: `TTFT + (TPOT * longest_sequence)`. This calculates
    to `80ms + (50ms/token * 10 tokens) = 580ms`. This 580ms delay is over 36x the standard 16ms budget
    to avoid UI jank on a mobile device, causing the main thread to stall and the keyboard to freeze.
    The correct fix is to implement **continuous batching** (or in-flight batching), where completed sequences
    are immediately evicted from the batch and new requests are swapped in, preventing short jobs from
    getting stuck behind long ones.'
  common_mistake: Engineers often misdiagnose the bottleneck. They either blame the hardware (NPU is saturated)
    because utilization is high, or they focus on the average case latency, completely missing the impact
    of tail latency caused by head-of-line blocking. They forget that in a UI, the P99 latency, not the
    average, is what the user feels as 'jank'.
  napkin_math: 1. **Calculate time for the longest request:** The total time is the prompt processing
    (TTFT) plus the token generation time (TPOT * length).
  options:
  - The NPU is saturated. The latency is the sum of all operations, roughly (80ms + 50ms) * 4 = 520ms.
    The batch size must be reduced.
  - The 80ms TTFT is too slow for a real-time UI. This initial delay is the primary cause of the jank,
    and prompt processing must be optimized.
  - The latency is ~580ms due to head-of-line blocking, where short requests are stuck waiting for the
    longest (10-token) request to finish in the static batch.
  - The average latency is 80ms + (50ms * 5 tokens) = 330ms. This is too slow and indicates a memory bandwidth
    bottleneck on the SoC.
  correct_index: 2
