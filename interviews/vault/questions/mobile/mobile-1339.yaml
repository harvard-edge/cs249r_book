title: Estimating Inference FPS on Exynos 2400 NPU
scenario: We are deploying an on-device super-resolution model on a smartphone powered by the Samsung Exynos 2400 NPU. The Exynos 2400 features a dual-core NPU rated at 34.7 TOPS peak performance, sharing a 12 GB LPDDR5X memory pool with the CPU, GPU, and ISP. Our model requires 150 GOPS (Giga Operations) per high-resolution frame. Assuming memory bandwidth contention limits our realistic NPU hardware utilization to just 35% of its peak capacity.
question: What FPS can the Exynos 2400 process for a 150 GOPS super-resolution model at 35% utilization?
details:
  realistic_solution: A solid engineer first calculates the effective TOPS by applying the expected utilization factor to the theoretical peak performance. Once the true usable throughput is determined based on system constraints, they divide it by the compute cost per frame to find a realistic processing rate.
  common_mistake: |
    **The Pitfall:** Dividing peak hardware performance by model requirements.
    **The Rationale:** Candidates ignore real-world utilization bottlenecks caused by the shared LPDDR5X memory system.
    **The Consequence:** They calculate an unrealistic ~231 FPS, overestimating the system's capabilities.
  napkin_math: |
    * Peak Performance: 34.7 TOPS = 34,700 GOPS.
    * Effective Performance: 34,700 GOPS * 0.35 (utilization factor) = 12,145 GOPS.
    * Estimated FPS: 12,145 GOPS / 150 GOPS/frame = 80.96 FPS.
    * **Estimated processing rate: ~81 FPS.**
