title: On-Device LLM Guardrails against Prompt Injection
scenario: You are designing an on-device LLM-based personal assistant running entirely on the Apple A17 Pro. The system reads incoming text messages to schedule events but must defend against prompt injection and data exfiltration attacks hidden in malicious texts. The hardware features a 16-core Neural Engine delivering 35 TOPS at ~5W, and 8 GB of unified memory shared across CPU, GPU, and NPU.
question: How would you architect a defense-in-depth strategy that robustly filters adversarial inputs and sanitizes outputs without violating memory constraints or draining the battery?
details:
  realistic_solution: |
    The optimal design uses a cascading defense mechanism. First, employ a lightweight, quantized (INT8) encoder-only model (e.g., MobileBERT) running efficiently on the Neural Engine to classify inputs for prompt injection before they reach the main LLM. The primary LLM should be a 3B-4B parameter model quantized to 4-bit to fit comfortably in memory. Finally, use strict output parsing and regex-based sanitization running on the CPU to prevent sensitive data exfiltration.
  common_mistake: |
    **The Pitfall:** Proposing a secondary, large LLM as a dedicated guardrail.
    **The Rationale:** Candidates default to using powerful LLMs for safety checks without considering resource limits.
    **The Consequence:** This exceeds the 8 GB unified memory constraint when running alongside the primary model and the OS.
  napkin_math: |
    - Primary LLM: 4B parameters at 4-bit requires ~2 GB memory.
    - Guardrail model: 25M parameters at INT8 requires ~25 MB.
    - Combined footprint: **~2.025 GB** (leaves ~6 GB for OS/apps).
    - Guardrail compute: ~0.1 GOPS per token.
    - On 35 TOPS NPU: adds roughly **0.003 ms** of latency per token (draws negligible power).
