title: On-Device Drift Detection for Translation Models
scenario: You are designing the monitoring specification for an on-device neural machine translation model running locally on the Google Tensor G3. The model processes user audio inputs that frequently include slang and new vocabulary not present in the training data, leading to concept drift.
question: How would you design a privacy-preserving drift detection system for Tensor G3 translation models using local embeddings and federated analytics?
details:
  realistic_solution: Design a federated analytics pipeline where the Tensor G3 computes feature embeddings and activation distributions locally during inference. These lightweight summary statistics are stored in a small ring buffer in the 12 GB LPDDR5X memory. Periodically, under idle conditions (device charging and on Wi-Fi), the device calculates drift metrics like Population Stability Index (PSI) against baseline distributions and sends only the aggregated metrics to the cloud.
  common_mistake: |
    **The Pitfall:** Uploading raw user inputs to the cloud or running complex continuous statistical tests on the TPU.
    **The Rationale:** Cloud-native engineers default to centralized telemetry and overlook the strict bandwidth, privacy, and active-compute budgets of mobile devices.
    **The Consequence:** Violating user privacy, draining the battery, and starving the primary translation model of its 7.5 TOPS budget.
  napkin_math: |
    - **Embedding Size:** 512-dimensional FP16 = 1 KB per second of audio.
    - **Storage Need:** 1 hour of daily audio = 3.6 MB. A week of data = ~25 MB (negligible in 12 GB LPDDR5X).
    - **Compute Load:** Computing Population Stability Index (PSI) takes ~0.1 TOPS.
    - **Conclusion:** Running the aggregation once daily during idle charging easily fits the TPU's 7.5 TOPS budget and completely avoids raw data egress.
