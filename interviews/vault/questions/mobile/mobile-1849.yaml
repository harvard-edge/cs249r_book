title: LoRA Inference Optimization on A17 Pro Neural Engine
scenario: You are deploying a fine-tuned LLM with LoRA adapters on A17 Pro. The Core ML compiler rejects the dynamic LoRA application as a non-statically-shapeable graph.
question: Why does Core ML reject dynamic LoRA on A17 Pro, and how should the adapters be compiled?
details:
  realistic_solution: 'Merge LoRA adapters into base weights before Core ML compilation. The merged weights are static and Core ML can fully optimize the computation graph for ANE. For multiple adapters, compile separate Core ML models per adapter.'
  common_mistake: |
    **The Pitfall:** Trying to pass adapter weights as dynamic inputs to Core ML.
    **The Rationale:** Treating Core ML like PyTorch and ignoring the Neural Engine's requirement for static graph compilation.
    **The Consequence:** The model falls back to the CPU, running 11x slower than native ANE execution.
  napkin_math: |
    - 1B INT4 Model: 0.5 GB.
    - Rank-4 Adapter: 2 * 4 * 2048 * 24 * 2 bytes = ~1.6 MB.
    - 10 variants: 10 * (0.5 GB + 1.6 MB) = ~5.0 GB.
    - Fits easily in 8 GB RAM.
    - **Merge adapters into base weights statically ahead of time to maintain 35 TOPS ANE performance with only a 1.6 MB per-adapter footprint penalty.**
