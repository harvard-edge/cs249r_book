title: LoRA Inference Optimization on A17 Pro Neural Engine
scenario: You are deploying a fine-tuned LLM with LoRA adapters on A17 Pro. The Core
  ML compiler rejects the dynamic LoRA application as a non-statically-shapeable graph.
  Explain why and propose a solution.
question: Why does Core ML reject dynamic LoRA on A17 Pro, and how should the adapters
  be compiled?
details:
  realistic_solution: 'Merge LoRA adapters into base weights before Core ML compilation:
    W_merged = W_base + (alpha/rank) × B × A. The merged weights are static and Core
    ML can fully optimize the computation graph for ANE. For multiple adapters, compile
    separate Core ML models per adapter — at rank-4 overhead (A17 Pro 8 GB RAM): base
    model 2 GB INT4 + each adapter adds <1 MB overhead, so 10 adapters = 10 MB additional.
    Use MLModel.load() with model assets to swap adapter variants.'
  common_mistake: Trying to pass adapter weights as dynamic inputs to Core ML. ANE
    kernels require static shapes at compile time; dynamic adapter injection creates
    variable-rank matrix operations that Core ML cannot pre-schedule on the ANE.
  napkin_math: 'A17 Pro RAM: 8 GB. 1B model INT4: 0.5 GB. Rank-4 adapter: 2×4×2048×24×2B
    = 786K × 2B = 1.6 MB. 10 adapter variants: 10 × (0.5 GB + 1.6 MB) ≈ 5.0 GB — fits
    in 8 GB RAM. Core ML compilation time: ~30s per model variant (done at install
    time, not runtime). Inference latency with merged adapter vs dynamic: merged uses
    full ANE at 35 TOPS; dynamic would fall back to CPU (~3 TOPS) = 11x slower.'
