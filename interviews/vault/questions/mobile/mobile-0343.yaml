title: The Mobile Energy Culprit
scenario: Your team has developed an 'Eco-Driving' background feature running a small 10MB neural network on a smartphone to analyze accelerometer data. Users are complaining about unexpected battery drain.
question: Which part of a background mobile neural network usually dominates energy use at the hardware level?
details:
  realistic_solution: Accessing off-chip DRAM memory consumes vastly more energy than on-chip computation. For most mobile ML models, the energy cost of fetching weights and activations from the main memory into the Neural Processing Unit's (NPU) local SRAM is the dominant factor in the power budget, not the arithmetic operations themselves. This is due to the physics of wire capacitance over physical distance.
  common_mistake: |
    **The Pitfall:** Assuming that executing the MAC (multiply-accumulate) operations consumes the most energy.
    **The Rationale:** Engineers focus on model FLOPs or TOPS as the primary metric of 'work', ignorant of the physical energy costs of moving electrons across silicon.
    **The Consequence:** Optimizing the wrong part of the architecture (e.g., pruning compute) while failing to address the true bottleneck: memory bandwidth.
  napkin_math: |
    1. **Compute Cost:** A 16-bit MAC operation costs ~0.1 pJ.
    2. **Memory Access Cost:** A 32-bit DRAM access costs ~100 pJ.
    3. **Ratio:** Fetching data from DRAM is **~1000x more expensive** than computing it. Memory movement heavily dominates the total energy budget.
  options:
  - Executing the FP16/INT8 multiply-accumulate (MAC) operations in the NPU.
  - Reading sensor data from the phone's accelerometer.
  - Moving model weights and activations from system DRAM to the NPU's local memory.
  - Writing inference results to the app's log file on flash storage.
  correct_index: 2
