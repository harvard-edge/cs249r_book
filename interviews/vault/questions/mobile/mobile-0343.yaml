title: The Mobile Energy Culprit
scenario: Your team has developed an 'Eco-Driving' feature for an automotive companion app. It runs a
  small, 10MB neural network in the background on the user's smartphone, analyzing accelerometer data
  to give driving tips. Users are complaining about unexpected battery drain. Based on the fundamental
  physics of mobile SoCs, identify the operation that is likely consuming the most energy.
details:
  realistic_solution: Accessing off-chip DRAM memory consumes vastly more energy than on-chip computation.
    For most mobile ML models, the energy cost of fetching weights and activations from the main memory
    into the Neural Processing Unit's (NPU) local SRAM is the dominant factor in the power budget, not
    the arithmetic operations themselves. This is due to the physics of wire capacitance over physical
    distance.
  common_mistake: Engineers often focus exclusively on the FLOPs or TOPS of the model, assuming the computation
    itself is the main energy hog. They forget that on-device, moving data from the main system DRAM to
    the NPU's local memory (SRAM) is an extremely expensive operation in energy terms, often dominating
    the total power budget.
  napkin_math: The energy cost of a single 32-bit DRAM access is approximately 580 times higher than the
    energy for a single 16-bit floating-point operation. Even if a model performs hundreds of operations
    per byte fetched, the sheer energy cost of memory access quickly dominates the total power consumption,
    leading to significant battery drain.
  options:
  - Executing the FP16/INT8 multiply-accumulate (MAC) operations in the NPU.
  - Reading sensor data from the phone's accelerometer.
  - Moving model weights and activations from system DRAM to the NPU's local memory.
  - Writing inference results to the app's log file on flash storage.
  correct_index: 2
