title: The Voice Assistant's First Word
scenario: You are optimizing an on-device voice assistant that uses a small LLM to generate streaming
  responses. To ensure the user perceives the assistant as immediately responsive after they ask a question,
  which of the following latency metrics is the most critical to minimize?
details:
  realistic_solution: The most critical metric is Time to First Token (TTFT). This is the time from the
    end of the user's prompt to the model producing its first output token. For interactive applications
    like a voice assistant, a low TTFT (e.g., < 300ms) provides immediate feedback that the system is
    working, which is more important for perceived responsiveness than the speed of the subsequent words.
  common_mistake: Engineers often mistakenly focus on overall throughput (Time Per Output Token, or TPOT)
    or total generation time. While a fast stream is important, the user's perception of 'lag' is almost
    entirely determined by the delay before the first word appears. A system can feel slow even with high
    throughput if the initial delay is long.
  napkin_math: 'Consider two models: | **Model A (High TPOT):** TTFT = 800ms, TPOT = 50ms/token | **Model
    B (Low TTFT):** TTFT = 300ms, TPOT = 80ms/token'
  options:
  - Time Per Output Token (TPOT)
  - Total generation time for the full response
  - Time to First Token (TTFT)
  - NPU delegation ratio
  correct_index: 2
