title: Distilling LLMs for Tensor G3 TPU Deployment
scenario: You are tasked with deploying a large language model to mobile devices powered by the Google Tensor G3 chip, which is optimized for on-device LLMs like Gemini Nano. To fit within the 12 GB LPDDR5X system memory while leaving ample room for the OS, you must design a distillation pipeline to transfer knowledge from a 7B parameter teacher to a 1.5B parameter student model.
question: How would you distill an LLM for Tensor G3 TPU deployment using hardware-friendly student architecture choices?
details:
  realistic_solution: A strong L5 candidate will advocate for hardware-aware distillation, selecting a student architecture with TPU-friendly operators (e.g., grouped-query attention). They will evaluate layer-wise feature distillation combined with logit matching, while simultaneously applying quantization-aware training (QAT) to INT8. This ensures the 1.5B student not only matches the teacher's quality but executes seamlessly on the G3 TPU without memory bandwidth bottlenecks.
  common_mistake: |
    **The Pitfall:** Proposing standard KL-divergence logit matching without considering specific hardware constraints.
    **The Rationale:** Candidates fail to realize that the student architecture must be strictly co-designed for INT8 matrix multiplication on the TPU.
    **The Consequence:** The distilled model achieves high accuracy but suffers from terrible on-device latency due to memory bandwidth bottlenecks.
  napkin_math: |
    - **Student Size (FP16):** 1.5B params × 2 bytes = 3 GB.
    - **Student Size (INT8 QAT):** 1.5B params × 1 byte = **1.5 GB** (Leaves ample OS headroom).
    - **Compute Required:** 1.5B params × 2 ops/param = 3 GOPs per token.
    - **Throughput Target:** 15 tokens/sec.
    - **Total Compute:** 15 tok/s × 3 GOPs/tok = **45 GOPS** (0.045 TOPS).
    - **NPU Headroom:** 0.045 TOPS is <1% of the G3's 7.5 TOPS capacity.
    - **Conclusion:** The model is entirely memory-bandwidth bound. Architectural choices (like GQA) during distillation must prioritize minimizing memory traffic, not compute.
