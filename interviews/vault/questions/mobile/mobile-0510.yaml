title: The Stuttering On-Device Assistant
scenario: 'You are a Mobile ML Engineer building a real-time, on-device voice assistant powered by a 3B
  parameter LLM on a flagship smartphone (Apple A17 Pro). Users report the experience is ''laggy'' and
  the UI ''stutters'' when the assistant''s response is streamed to the screen. You diagnose the issue
  with the following performance metrics:'
question: "What scheduling architecture should an on-device voice assistant use to reduce queueing delay during generation?"
details:
  realistic_solution: The correct approach is to move from request-level scheduling to token-level scheduling,
    a technique exemplified by **continuous batching**. In the context of a single user on mobile, this
    means that if the user interrupts or sends a new query, the system doesn't have to wait for the entire
    current generation to complete. The new request can be immediately added to the processing queue.
    The NPU then co-processes the prompt for the new request and the next token for the old request in
    the same batch. This drastically reduces the wait time for the new request, making the system feel
    responsive. It's a direct application of queueing theory to prevent a long-running task from blocking
    shorter, higher-priority ones.
  common_mistake: 'Engineers often misdiagnose the bottleneck. They might blame the hardware (NPU TOPS)
    or the model size, suggesting quantization as a complete fix. While helpful, quantization alone is
    unlikely to get an 80ms TPOT below the 16ms UI deadline. The core issue is architectural: a single
    inference task monopolizes the compute resource for too long, starving the UI. Simply moving the work
    to a background thread doesn''t solve this if the UI is still forced to wait 80ms for the next piece
    of data to render.'
  napkin_math: The diagnosis is a direct comparison of the generation latency to the UI's real-time deadline.
  options:
  - Apply aggressive 4-bit quantization to the model to reduce TPOT below the 16ms deadline.
  - Redesign the UI to be fully asynchronous, only displaying the full text once the entire sequence is
    generated in the background.
  - Implement continuous batching to process new user input at the token-level alongside existing generation,
    minimizing queueing delay.
  - Conclude the A17 Pro's 35 TOPS are insufficient and offload inference to the cloud.
  correct_index: 2
