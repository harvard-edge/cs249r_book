title: The Stuttering On-Device Assistant
scenario: You are a Mobile ML Engineer building a real-time, on-device voice assistant powered by a 3B parameter LLM on a flagship smartphone. Users report the experience is 'laggy' and the UI 'stutters' when the assistant's response is streamed to the screen.
question: "What scheduling architecture should an on-device voice assistant use to reduce queueing delay during generation?"
details:
  realistic_solution: The correct approach is to move from request-level scheduling to token-level scheduling, a technique exemplified by **continuous batching**. In the context of a single user on mobile, this means that if the user interrupts or sends a new query, the system doesn't have to wait for the entire current generation to complete. The new request can be immediately added to the processing queue. The NPU then co-processes the prompt for the new request and the next token for the old request in the same batch. This drastically reduces the wait time for the new request, making the system feel responsive. It's a direct application of queueing theory to prevent a long-running task from blocking shorter, higher-priority ones.
  common_mistake: |
    **The Pitfall:** Assuming the hardware is too slow and resorting to aggressive model quantization or background threading.
    **The Rationale:** Engineers misdiagnose the bottleneck as purely compute-bound, ignoring the architectural flaw of request-level scheduling monopolizing the NPU.
    **The Consequence:** The UI thread continues to starve while waiting for long-running inference tasks to yield, failing to resolve the stutter.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - UI Render Deadline: 16 ms (60 FPS).
       - Current TPOT (Time Per Output Token): ~80 ms.
    2. **Calculations:**
       - Generation Latency vs UI Deadline: 80 ms > 16 ms.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound (Scheduling)**
       - A single monolithic inference call blocks the UI for 80 ms. Implementing continuous batching (token-level scheduling) allows the system to yield and interleave UI updates, resolving the perceived jank.
  options:
  - Apply aggressive 4-bit quantization to the model to reduce TPOT below the 16ms deadline.
  - Redesign the UI to be fully asynchronous, only displaying the full text once the entire sequence is generated in the background.
  - Implement continuous batching to process new user input at the token-level alongside existing generation, minimizing queueing delay.
  - Conclude the NPU TOPS are insufficient and offload inference to the cloud.
  correct_index: 2
