title: The Transformer's Mobile Traffic Jam
scenario: Your team has a MobileNetV2-based object detector that meets your real-time performance budget, running in 15ms on an Apple A17 Pro's Neural Engine. A junior engineer replaces the CNN backbone with a Vision Transformer (ViT) of a similar parameter count. Profiling shows the new ViT-based model takes 50ms per frame, missing the 16ms budget.
question: Why does a ViT object detector with a similar parameter count run far slower than MobileNetV2 on a mobile NPU?
details:
  realistic_solution: |
    The most likely cause is that the Vision Transformer's self-attention mechanism is memory-bandwidth bound, while the MobileNetV2's depthwise separable convolutions are compute-bound (or at least, far more compute-intensive). Mobile NPUs like the A17's have extremely high peak compute (35 TOPS) but relatively limited memory bandwidth (~51.2 GB/s). The efficiency of the hardware is dictated by Arithmetic Intensity (AI) — the ratio of operations performed to data moved. The ViT's self-attention performs an all-to-all comparison between image patches, resulting in a low AI that constantly fetches data from the slow device DRAM. Conversely, CNNs (especially depthwise separable ones) exhibit high data reuse, performing many computations on the same small patch of data held in fast on-chip SRAM. The NPU is essentially stalling, waiting for data, which causes the massive increase in latency.
  common_mistake: |
    **The Pitfall:** Assuming parameter count or FLOPs dictate latency.
    **The Rationale:** Engineers forget that on mobile, memory access patterns are frequently the true bottleneck, missing the importance of Arithmetic Intensity.
    **The Consequence:** Selecting or designing architectures that heavily underutilize the NPU due to memory stalls.
  napkin_math: |
    - **A17 Pro compute:** 35 TOPS
    - **A17 Pro memory bandwidth:** ~51.2 GB/s
    - **Ridge point:** 35 TOPS / 51.2 GB/s ≈ 683 Ops/Byte
    - **ViT self-attention AI:** Very low (all-to-all patch comparisons, O(N^2) memory reads with low compute per read).
    - **CNN depthwise conv AI:** High data reuse from on-chip SRAM.
    - **Result:** **The ViT model is severely memory-bandwidth bound, operating far below the 683 Ops/Byte ridge point and causing the NPU to stall.**
  options:
  - The ViT has a larger total activation memory size, which overflows the NPU's limited on-chip SRAM.
  - The Vision Transformer has significantly more total FLOPs (Floating Point Operations) than the MobileNetV2.
  - The ViT's self-attention has low Arithmetic Intensity, making it memory-bandwidth bound on the NPU.
  - The A17 Neural Engine lacks optimized hardware kernels for the Softmax and LayerNorm operations within the ViT.
  correct_index: 2
