title: On-device PSI Calculation for Predicted Class Drift on Snapdragon NPU
scenario: 'A mobile application leverages an on-device image classification model running on a Snapdragon
  8 Gen 3 Hexagon NPU (45 TOPS INT8, 12-16 GB LPDDR5X). The model processes incoming images and outputs
  predictions for 10 distinct classes. To ensure the model''s reliability, you are tasked with implementing
  an hourly data drift detection mechanism focused on the distribution of these predicted classes. You''ve
  chosen the Population Stability Index (PSI) as your metric.


  1.  How would you efficiently store the necessary aggregated class counts on the NPU for hourly PSI
  calculation, comparing the last hour''s predicted class distribution (current) against a pre-defined
  baseline from training? Provide a numerical estimate for the memory footprint (in bytes) required for
  one hour''s current population counts.

  2.  Provide the exact formula for calculating the PSI for this 10-class categorical feature.'
question: "How would you store hourly predicted-class counts and compute PSI for a 10-class Snapdragon on-device classifier?"
details:
  realistic_solution: 'For hourly PSI calculation, an efficient approach would be to aggregate the counts
    for each of the 10 predicted classes into a simple array or list of integers (e.g., 32-bit integers)
    on the device. This aggregated data for the ''current'' hour would then be compared against a pre-computed
    and stored ''baseline'' distribution (also a list of 10 counts or percentages).


    **Memory Footprint:** If each class count is stored as a 32-bit integer (4 bytes), then 10 classes
    * 4 bytes/class = 40 bytes. This is a negligible memory footprint compared to the NPU''s 12-16 GB
    LPDDR5X.


    **PSI Formula:** The Population Stability Index (PSI) for a categorical feature is calculated as:


    ```

    PSI = \sum_{i=1}^{N} ( (P_{\text{current},i} - P_{\text{baseline},i}) \times \ln(P_{\text{current},i}
    / P_{\text{baseline},i}) )

    ```


    Where:

    *   `N` is the number of bins or categories (here, `N=10` classes).

    *   `P_{current,i}` is the percentage of observations in the `i`-th bin for the current population.

    *   `P_{baseline,i}` is the percentage of observations in the `i`-th bin for the baseline population.


    **Important Note:** To avoid issues with division by zero or `ln(0)`, a small epsilon (e.g., 0.0001)
    should be added to `P_{current,i}` or `P_{baseline,i}` if they are zero. For example, `(P_{current,i}
    + \epsilon) / (P_{baseline,i} + \epsilon)`.'
  common_mistake: Candidates might propose overly complex data structures or statistical methods that
    consume excessive memory or compute, which is impractical for an edge device like the Snapdragon NPU.
    Another common oversight is failing to handle zero counts in PSI calculation, leading to division-by-zero
    or log(0) errors.
  napkin_math: '1.  **Memory for current counts (10 classes):** 10 classes * 4 bytes/class (for 32-bit
    int) = 40 bytes.

    2.  **PSI Formula:** `PSI = Σ ( (P_current - P_baseline) * ln(P_current / P_baseline) )` for all 10
    classes.'
