title: Unified Memory Contention Between NPU and GPU Execution
scenario: An AR application on an iPhone 15 Pro (A17 chip) runs object tracking on
  the Neural Engine while the GPU renders the scene. Both share the same unified memory
  architecture.
question: Analyze why aggressively pipelining the NPU inference and GPU rendering
  might cause frame drops despite sufficient theoretical compute capacity for both.
details:
  realistic_solution: While pipelining overlaps compute mathematically, both the NPU
    and GPU concurrently stress the shared unified memory bandwidth. If the combined
    peak memory bandwidth requests exceed the LPDDR5 hardware limits, memory stalls
    occur, delaying execution pipelines and causing missed rendering deadlines.
  common_mistake: Assuming that physically decoupled compute units (NPU and GPU) are
    completely independent and ignoring shared memory bus contention.
  napkin_math: NPU BW + GPU BW > unified memory BW implies memory stall.
