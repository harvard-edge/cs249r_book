title: Unified Memory Contention Between NPU and GPU Execution
scenario: An AR application on a mobile device runs object tracking on the NPU while the GPU renders the scene. Both share the same unified memory architecture. The NPU requires 50 GB/s bandwidth, the GPU requires 30 GB/s, and the max SoC bandwidth is 60 GB/s.
question: Analyze why aggressively pipelining the NPU inference and GPU rendering might cause frame drops despite sufficient theoretical compute capacity for both.
details:
  realistic_solution: While pipelining overlaps compute mathematically, both the NPU and GPU concurrently stress the shared unified memory bandwidth. If the combined peak memory bandwidth requests exceed the hardware limits, memory stalls occur, delaying execution pipelines and causing missed rendering deadlines.
  common_mistake: |
    **The Pitfall:** Assuming that overlapping compute on independent cores always yields linear speedups.
    **The Rationale:** Candidates view physically decoupled compute units (NPU and GPU) as completely independent, ignoring the unified memory bus.
    **The Consequence:** Pipelining predictions are wildly inaccurate because shared memory bus contention bottlenecks both processes.
  napkin_math: |
    - **Combined Demand:** The NPU requires 50 GB/s and the GPU requires 30 GB/s.
    - **Hardware Limit:** The total concurrent demand is 80 GB/s, which exceeds the SoC's 60 GB/s maximum shared bandwidth.
    - **Result:** **The 80 GB/s demand severely exceeds the 60 GB/s SoC limit, stalling memory reads and degrading latency for both tasks.**
