title: The Profiling Tool Blind Spot
scenario: You profile your ML inference pipeline on a Pixel 7 (Tensor G2) using Android's Systrace. The
  trace shows your inference function takes 12ms. You then profile with TFLite's built-in benchmark tool,
  which reports 8ms. Finally, you use Perfetto and see 15ms. Three tools, three numbers. Which one is
  'right,' and why do they disagree?
details:
  realistic_solution: 'All three are correct for their scope. TFLite benchmark (8ms): pure compute. Systrace
    (12ms): +4ms app overhead (JNI, allocation, copies). Perfetto (15ms): +system interference (scheduler,
    memory pressure, GC). For production: use Perfetto P95/P99. At 16.7ms frame budget, 8ms benchmark
    says ''headroom'' but P99=20ms means dropping 1 in 100 frames. Rule of thumb: multiply benchmark by
    1.5-2x for production P95 on mobile.'
  common_mistake: '"Use the lowest number — the benchmark tool is the most accurate because it''s closest
    to the inference engine." The lowest number is the most misleading for production performance.'
  napkin_math: 'TFLite benchmark: 8ms (compute only). App overhead: +4ms (copies, JNI, allocation). System
    interference P50: +1ms, P95: +3ms, P99: +8ms. Production P50: 13ms. Production P95: 15ms. Production
    P99: 20ms. If your frame budget is 16.7ms (60 FPS), the 8ms benchmark says "plenty of headroom." The
    P99 of 20ms says "you''ll drop 1 in 100 frames." Test with the right tool for the right question.'
