title: The Cellular Model Download Failure
scenario: "Your AI writing assistant app downloads a 180 MB language model on first launch. Analytics show 40% of users in India and Southeast Asia never complete the download on 4G connections. The model server is hosted in us-east-1."
question: "Why does a 180 MB first-launch model download fail for 40% of India and Southeast Asia users on 4G?"
details:
  realistic_solution: '180 MB at 5 Mbps on Indian 4G takes 288 sec. With 15% drop rate/min, survival probability: (0.85)^4.8 = 45%. Fix: (1) Chunk into 5 MB segments with resume (per-chunk drop: 2%, near-100% completion). (2) Quantize to INT4 (45 MB, 72 sec, ~82% success as monolithic). (3) Regional CDN in Mumbai/Singapore. (4) 5 MB lite model for immediate use while full model downloads. Never design >50 MB monolithic downloads for emerging markets.'
  common_mistake: |
    **The Pitfall:** Assuming a CDN solves fundamental network reliability issues.
    **The Rationale:** Engineers think "add a CDN edge node" fixes latency, missing the core problem: the download is too large for unreliable mobile connections.
    **The Consequence:** High user churn during onboarding.
  napkin_math: |
    - `180 MB` at 5 Mbps effective (`0.625 MB/s`) takes `288 sec` (4.8 min).
    - Connection drop probability per minute on Indian 4G: `~15%`.
    - Probability of surviving 4.8 minutes: `(1 - 0.15)^4.8 = 0.85^4.8 ≈ 0.45 = 45%` success.
    - With `5 MB` chunks: per-chunk time = `8 sec`. Drop probability per chunk: `~2%`.
    - **Conclusion:** By using **5 MB chunks with resumption**, the success rate approaches **100%**.
