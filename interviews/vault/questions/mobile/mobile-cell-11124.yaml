title: 'Kernel Fusion: Implement Fused Conv+BN+ReLU for Mobile CNN on Snapdragon'
scenario: Implement a fused Conv+BN+ReLU layer for MobileNetV3 inference on Snapdragon 8 Gen 3 Hexagon
  DSP (45 TOPS INT8). The layer processes 112×112×32 activations with 32→64 channel 3×3 conv. Specify
  the fusion implementation, verify correctness, and quantify memory bandwidth savings.
details:
  realistic_solution: 'BN fold: pre-compute fused conv weight W'' = W × γ/σ and bias b'' = β - γμ/σ for
    each output channel. At inference: Conv(x) with W'',b'' and ReLU = Conv+BN+ReLU. This is a pre-processing
    step, not a runtime fusion.'
  common_mistake: Not folding BN into conv at inference (BN weights can be absorbed into conv weights
    and bias). This is the most common and impactful mobile fusion.
  napkin_math: 'Input: 112×112×32. Conv 3×3×32→64: weights 3×3×32×64 = 18,432 INT8 params = 18KB. BN params:
    γ,β,μ,σ for 64 channels = 64×4×4B = 1KB. Fold: W''[k] = W[k] × γ[k]/σ[k] for each output channel k.
    b''[k] = β[k] - γ[k]×μ[k]/σ[k]. One-time pre-computation: 64 × (18,432 multiplies) = 1.18M ops — done
    once, not at inference. Memory savings: unfused: Conv output 112×112×64 × 1B = 802KB written + read
    for BN. Folded: zero intermediate write. Savings: 1.6MB per layer. At Snapdragon LPDDR5 68 GB/s: 1.6MB
    / 68 GB/s = 0.024ms per layer. MobileNetV3 has ~20 such layers: 20 × 0.024ms = 0.47ms total savings.
    At 30 fps (33ms budget), savings = 1.4% — modest but free (zero accuracy cost).'
