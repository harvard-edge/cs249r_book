title: Exynos 2400 NPU Roofline Analysis for Mobile Workload Optimization
scenario: You are tasked with optimizing a generative AI model for deployment on the Samsung Exynos 2400 NPU, which offers 34.7 TOPS (INT8) and is paired with 12 GB LPDDR5X memory. The model's current performance bottleneck is unclear.
question: How would you perform a roofline analysis for a mobile generative workload on Exynos 2400 NPU to determine if it is compute or memory-bound?
details:
  realistic_solution: '1. Characterize Workload: Determine the total number of operations (e.g., MACs) and the total memory access (reads and writes) required by the generative AI model for a given inference.

    2. Identify Roofline Ceilings: Calculate the theoretical peak compute performance (34.7 TOPS for INT8 operations) and estimate the theoretical peak memory bandwidth of the 12 GB LPDDR5X. A common estimation for LPDDR5X bandwidth is around 68 GB/s (e.g., ~8.5 Gbps per pin * 64-bit bus / 8 bits/byte).

    3. Calculate Operational Intensity: Compute the operational intensity of the model, which is the ratio of total operations to total memory access (e.g., FLOPs/Byte or Ops/Byte).

    4. Plot on Roofline Chart: Construct a Roofline plot. Plot the model''s achieved or estimated performance against its operational intensity. Compare this point to the ''compute ceiling'' (flat line at peak TOPS) and the ''memory wall'' (sloped line derived from memory bandwidth) to visually identify if the workload is primarily compute-bound or memory-bound.

    5. Predict Utilization: Based on where the workload falls on the roofline, predict the maximum achievable performance given the identified bottleneck and consequently estimate the effective utilization of the NPU''s theoretical compute capacity.'
  common_mistake: |
    **The Pitfall:** Incorrectly assuming a workload is purely compute-bound due to high theoretical TOPS.
    **The Rationale:** Candidates do not adequately consider the practical memory bandwidth limitations of LPDDR5X.
    **The Consequence:** Optimization efforts are wasted entirely on compute efficiency, yielding zero real-world latency gains.
  napkin_math: |
    - Peak Compute = 34.7 TOPS (34.7 * 10^12 ops/s).
    - Peak Memory Bandwidth = 68 GB/s (68 * 10^9 Bytes/s).
    - Ridge Point (Operational Intensity) = Peak Compute / Peak Memory Bandwidth.
    - 34.7 * 10^12 / 68 * 10^9 = **510 ops/byte.**
    - **Workloads below 510 ops/byte are memory-bound; workloads above are compute-bound.**
