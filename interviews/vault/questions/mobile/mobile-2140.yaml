title: Wi-Fi 6 MAC Bubble Inference
scenario: Distributed inference of a 13B model partitioned across two iPads connected
  by Wi-Fi 6 (800 Mbps). Node 1 handles first half layers, Node 2 the rest.
question: Evaluate the network stall time induced by sending a 2MB KV cache update
  per generation step, accounting for Wi-Fi 6's 3ms MAC layer synchronization bubble.
details:
  realistic_solution: The 2MB (16Mb) KV payload requires 20ms of raw transmission
    time over the 800 Mbps link. However, the 3ms MAC layer bubble must be added per
    token generation, resulting in a 23ms total network stall every single step of
    the autoregressive loop.
  common_mistake: Missing the per-token cumulative cost of the 3ms MAC layer bubble,
    which severely destroys autoregressive generation latency compared to raw bandwidth.
  napkin_math: 16Mb / 800Mbps = 20ms. Total sync = 20ms + 3ms = 23ms network stall
    per token.
