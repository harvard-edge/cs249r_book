title: 'KV-Cache: Fluency — KV Cache Size Estimation for 1B Mobile LLM'
scenario: 'Estimate the KV cache size for a 1B LLM (24 layers, GQA 8 KV heads, head_dim=128,
  bf16) on Snapdragon 8 Gen 3 (45 TOPS, 16GB) at three context lengths: 512, 2048,
  and 8192 tokens. Is a 4096-token conversation feasible in available memory?'
question: Is a 4096-token conversation feasible in available memory?
details:
  realistic_solution: KV per token = num_layers × 2 (K and V) × num_KV_heads × head_dim
    × bytes_per_element. Multiply by context length.
  common_mistake: Forgetting to account for both K and V tensors (factor of 2); using
    wrong formula for GQA head count.
  napkin_math: 'KV per token: 24 × 2 × 8 × 128 × 2B = 98,304B = 98.3KB. At 512 tokens:
    512 × 98.3KB = 50.3MB. At 2048 tokens: 2048 × 98.3KB = 201MB. At 8192 tokens:
    8192 × 98.3KB = 805MB. 4096 tokens: 4096 × 98.3KB = 403MB. Memory budget: 16GB
    total. OS: 2GB. Model (INT4): 500MB. KV at 4096 ctx: 403MB. Framework overhead:
    500MB. Total: 3.4GB << 16GB. Easily feasible. Even 8192-token context: 2GB total
    → still fits. Snapdragon 8 Gen 3''s 16GB allows very long contexts. Main constraint
    becomes decode latency: at 8192 tokens, KV read = 805MB / 68 GB/s = 11.8ms. Add
    weight load 7.35ms = 19.15ms → 52 tok/sec. Reasonable performance even at 8K context.'
