title: 'KV-Cache: Fluency — KV Cache Size Estimation for 1B Mobile LLM'
scenario: 'You must estimate the KV cache size for a 1B LLM (24 layers, GQA 8 KV heads, head_dim=128, bf16) on a mobile device (16GB RAM) at three context lengths: 512, 2048, and 8192 tokens.'
question: Is a 4096-token conversation feasible in the available memory on this device?
details:
  realistic_solution: KV per token = num_layers × 2 (K and V) × num_KV_heads × head_dim × bytes_per_element. Multiply by context length.
  common_mistake: |
    **The Pitfall:** Forgetting to account for both K and V tensors (factor of 2).
    **The Rationale:** Candidates casually estimate the cache size but forget that Attention requires both Keys and Values, missing a 2x multiplier.
    **The Consequence:** The memory footprint is under-estimated by 50%, leading to unexpected OOM errors during deployment.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Device RAM: 16 GB. LLM size: ~1B params.
       - Model dims: 24 layers, 8 KV heads, 128 head_dim, BF16 (2 bytes).
    2. **Calculations:**
       - KV Cache Per Token: 24 layers * 2 (K&V) * 8 heads * 128 dims * 2 bytes = 98,304 bytes (~98.3 KB).
       - Cache for 4096 context: 4096 * 98.3 KB = 402.6 MB.
       - Total Memory: OS (2GB) + Model (2GB) + Overhead (0.5GB) + KV Cache (0.4GB) = ~4.9 GB.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound.** A 4096-token conversation consumes only ~403 MB for the KV cache, easily fitting into the 16 GB budget safely alongside the OS.
