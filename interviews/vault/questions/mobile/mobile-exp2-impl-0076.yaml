title: Calculate Maximum Context Length for Gemini Nano
scenario: You are deploying a 1.8 billion parameter int4-quantized LLM (Gemini Nano) on a Google Tensor
  G3 device. While the device features 12 GB LPDDR5X RAM and 7.5 TOPS, the OS imposes a strict 2.0 GB
  memory limit on your background AI service to prevent OS-level eviction of other apps. The runtime and
  activation buffers consume a fixed 400 MB overhead. Assuming the KV cache consumes 0.4 MB per token
  and 1 GB = 1000 MB, calculate the maximum context window (in tokens) the system can support without
  triggering an OOM eviction.
details:
  realistic_solution: To find the maximum context length, you must first calculate the memory required
    to hold the int4 model weights. Next, subtract both the model weight memory and the fixed runtime
    overhead from the total OS-imposed memory budget to find the memory available strictly for the KV
    cache. Finally, divide this available memory by the per-token KV cache consumption to determine the
    token limit.
  common_mistake: Candidates often miscalculate the memory footprint of the int4 weights, assuming 1 byte
    per parameter instead of 0.5 bytes. They also frequently forget to subtract the fixed runtime overhead
    before dividing the remaining memory by the per-token KV cache size.
  napkin_math: '1. Calculate weight memory: 1.8 billion parameters * (4 bits / 8 bits/byte) = 900 MB.

    2. Calculate total fixed memory: 900 MB (weights) + 400 MB (overhead) = 1300 MB.

    3. Calculate available memory for KV cache: 2000 MB (total budget) - 1300 MB = 700 MB.

    4. Calculate maximum context window: 700 MB / 0.4 MB/token = 1750 tokens.'
