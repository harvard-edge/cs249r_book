title: 'KV-Cache: Design KV Cache Management for On-Device LLM Chat App'
scenario: Design the KV cache management system for a chat application using a 1B LLM on Snapdragon 8 Gen 3 (45 TOPS INT8, 16GB). Users expect multi-turn conversations of 10-20 turns (500-2000 tokens total).
question: How would you design the KV cache management system for a chat application using a 1B LLM on Snapdragon 8 Gen 3 (45 TOPS INT8, 16GB)?
details:
  realistic_solution: 'Sliding window KV cache with importance-based retention: keep first N tokens (system prompt + first user turn) + last M tokens (recent context). Compress middle with summarization.'
  common_mistake: |
    **The Pitfall:** Truncating context by discarding old tokens without compression.
    **The Rationale:** Candidates apply simple FIFO truncation to manage memory limits, losing crucial early conversation context.
    **The Consequence:** The chat assistant forgets the user's initial instructions, breaking conversation coherence.
  napkin_math: |
    * 1B model INT8 KV per token: 24 layers × 2 (K,V) × 8 heads × 128 dim × 1B = 49.2KB.
    * Available RAM for KV: 16GB - 0.5GB model - 2GB OS = 13.5GB.
    * Max theoretical tokens: 13.5GB / 49.2KB = 274,390 tokens (massive headroom).
    * Context limit (positional): 4096 tokens × 49.2KB = 201MB KV.
    * **Since 201MB is trivial on a 16GB device, memory is not a concern; the strategy must focus purely on maintaining context within the 4096 token limit via summarization.**
