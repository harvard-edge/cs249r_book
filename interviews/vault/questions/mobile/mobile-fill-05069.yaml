title: On-Device Federated Learning Round Feasibility on Snapdragon 8 Gen 3
scenario: A federated learning system trains a keyboard prediction model (LSTM, 2M params, FP32) locally
  on Snapdragon 8 Gen 3 (45 TOPS INT8). Each device runs 10 local epochs on 1000 samples (64-dim input,
  batch=32). Estimate training time, memory, and battery impact per FL round.
question: "How long, how much memory, and how much battery does a 10-epoch LSTM FL round cost on Snapdragon 8 Gen 3?"
details:
  realistic_solution: 'LSTM training on FP32: Snapdragon 8 Gen 3 CPU FP32 performance ~50 GFLOPS (Cortex-X4
    with NEON). LSTM 2M params: FWD FLOPs ≈ 2×2M×64×10 (seq_len) = 2.56B. BWD ≈ 2×FWD = 5.12B. Total per
    sample: 7.68B FLOPs. 1000 samples × 10 epochs = 10,000 iterations. Per batch (32): 32 × 7.68B = 245.8B
    FLOPs. Steps: 10,000/32 = 312.5 steps. Total FLOPs: 312.5 × 245.8B = 76.8 TFLOPS. At 50 GFLOPS: 76.8T/50G
    = 1536 seconds = 25.6 minutes. Memory: 2M params × 4B × 3 (weights+grad+optimizer) = 24MB — trivial.
    Battery: 25.6 min at 3W CPU = 78mWh = 0.6% of 12,000mAh battery. Feasible if scheduled during charging.'
  common_mistake: Using INT8 TOPS for training throughput; on-device FL training typically runs in FP32
    for gradient accuracy, and mobile NPUs often don't support FP32 backward pass natively.
  napkin_math: 'FLOPs per round: 10K samples × 10 epochs × 7.68B/sample = 76.8 TFLOPS. CPU FP32: 50 GFLOPS.
    Time: 76.8T/50G = 1536s = 25.6 min. Memory: 24MB. Battery: 3W × 25.6/60 hr = 1.28 Wh / 44.4 Wh (12000mAh×3.7V)
    = 2.9%. Run during charging.'
