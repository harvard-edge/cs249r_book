title: On-Device Model Drift Diagnosis on Google Tensor G3
scenario: A new on-device object detection model was recently deployed to mobile devices powered by the
  Google Tensor G3, utilizing its 7.5 TOPS on-device TPU and 12 GB LPDDR5X memory for inference. Initial
  A/B tests showed promising results, but after a few weeks, user reports indicate a noticeable drop in
  detection accuracy, particularly for newly observed object classes. The model was trained using a standard
  CI/CD pipeline, and the model registry indicates the deployed version matches the one that passed all
  pre-deployment validation tests. As an ML engineer, you are tasked with diagnosing the root cause of
  this performance degradation. Outline your investigation steps, focusing on MLOps lifecycle elements.
question: "How would you outline your investigation steps, focusing on MLOps lifecycle elements?"
details:
  realistic_solution: "1. **Data Drift Monitoring:** Implement or review existing input data monitoring\
    \ for the on-device model. Compare current production data distributions (e.g., feature statistics,\
    \ image characteristics) with the training dataset used for the deployed model. Look for shifts in\
    \ object types, lighting conditions, or environmental factors. \n2. **Experiment Tracking Analysis:**\
    \ Review the experiment tracking system for the deployed model version. Confirm its performance metrics\
    \ (e.g., mAP, recall, precision) on various data slices during validation. Check if any data slices\
    \ resembling the current problematic scenarios were underrepresented or performed poorly during initial\
    \ validation.\n3. **Reproducibility Verification:** Use the model registry to confirm the exact lineage\
    \ of the deployed model – including training code, dataset versions, hyper-parameters, and environment\
    \ configurations. Rule out any discrepancies between the validated model and the one deployed. \n\
    4. **Training-Serving Skew Check:** Compare pre-processing and post-processing logic in the training\
    \ pipeline with the on-device inference pipeline. Even minor differences (e.g., image normalization,\
    \ resizing, or bounding box format conversions) can lead to significant performance drops. \n5. **On-Device\
    \ Diagnostics:** If feasible, gather anonymized on-device logs related to inference (e.g., inference\
    \ latency, TPU utilization, memory usage) to ensure the Google Tensor G3 is operating within expected\
    \ parameters and resource constraints are not causing unexpected behavior or data corruption."
  common_mistake: Immediately retraining and redeploying the model without a thorough diagnosis, leading
    to recurrent issues, or focusing solely on code-level bugs without considering data drift or training-serving
    skew.
  napkin_math: An object detection model on the Tensor G3 needs to process a 1080p image (approx. 2 million
    pixels). If the model requires 5 operations per pixel for inference, estimate the total operations
    required per frame. Given the Tensor G3's 7.5 TOPS (trillions of operations per second), how many
    frames per second could the TPU theoretically process? If the model size is 250MB, what percentage
    of the 12GB LPDDR5X memory does it consume?
