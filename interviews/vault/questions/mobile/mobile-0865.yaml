title: Recall depthwise separable convolution parameter count for MobileNetV2 first
  block
scenario: You are reviewing a MobileNetV2 implementation on Snapdragon 8 Gen 3. The
  first bottleneck block has input 112×112×32, expansion t=1 (no expand for first
  block), 3×3 depthwise at 32 channels, and project 32→16. Calculate the exact parameter
  count and FLOPs for this block and explain why t=1 is used only in the first block.
question: How would you calculate the exact parameter count and FLOPs for this block
  and explain why t=1 is used only in the first block?
details:
  realistic_solution: 'Depthwise 3×3 on 32 channels: 3×3×32 = 288 params. Pointwise 32→16: 32×16 = 512 params. Total params = 800 (no biases). FLOPs: Depthwise (2×32×9×112²) = 7.2M + Pointwise (2×32×16×112²) = 12.8M. Total = ~20.1M FLOPs.'
  common_mistake: Including bias parameters in the count when MobileNetV2 uses no
    bias (bias=False) in conv layers — all normalization is done by BatchNorm which
    has its own γ,β parameters; counting BN parameters as conv parameters. Or calculating
    standard convolution FLOPs instead of depthwise separable.
  napkin_math: 'Depthwise 3×3 conv at 112×112: FLOPs = 2 × 32 × 9 × 112 × 112 = 7,225,344.
    Pointwise 1×1 conv 32→16 at 112×112: FLOPs = 2 × 32 × 16 × 112 × 112 = 12,845,056.
    Total FLOPs = 7,225,344 + 12,845,056 = 20,070,400 ≈ 20.1M FLOPs. Total params = 288 + 512 = 800.'
