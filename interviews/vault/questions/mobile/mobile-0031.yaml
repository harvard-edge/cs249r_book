title: The Mobile ML CI/CD Pipeline
scenario: Your ML team trains models in PyTorch on cloud GPUs. Your mobile team consumes Core ML and TFLite models. Currently, the handoff is a Slack message with a Google Drive link. Last month, someone shipped a model trained on the wrong dataset, and it took 3 days to notice.
question: How should CI/CD stop PyTorch-to-Core ML/TFLite handoffs from shipping a wrong-dataset model?
details:
  realistic_solution: 'Build a model-aware CI/CD pipeline. (1) Model registry (not Git) stores versioned artifacts with dataset hash, hyperparameters, metrics. (2) Automated conversion: PyTorch -> ONNX (2 min) -> CoreML + TFLite (6 min). (3) Quality gates: accuracy on golden test set within 1% of baseline (catches wrong-dataset in 15 min, not 3 days). (4) On-device testing via Firebase Test Lab ($3/version). (5) Cryptographic signing. Total: 18 min, $30/week.'
  common_mistake: |
    **The Pitfall:** "Just add the model to the app's git repo and use pull requests for review."
    **The Rationale:** Standard software engineering practices rely on Git for versioning, and engineers blindly apply this to ML artifacts.
    **The Consequence:** The repo balloons with 200MB binary blobs, clones take forever, and diffs are completely unreadable, fundamentally breaking the developer experience.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Old Handoff Time: 3 days to detect failure.
       - Firebase Test Lab Cost: ~$5/device-hour.
    2. **Calculations:**
       - CI/CD Latency: PyTorch -> ONNX (2m) -> CoreML (3m) -> TFLite (3m) -> On-device Test (10m) = 18 minutes total.
       - Device Test Cost: 0.2 hours * 3 devices * $5 = $3 per run.
       - Weekly Cost: 10 versions/week = $30/week.
    3. **Conclusion & Interpretation:**
       - **Result: Automated Verification. Replacing manual Slack handoffs with an 18-minute CI/CD pipeline costs $30/week and prevents 3-day regressions.**
