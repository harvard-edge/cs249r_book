title: A17 Paged Cache Fragmentation
scenario: A local Llama-3-8B on an iPhone 15 Pro (A17 Pro, 8GB RAM) allocates paged KV cache in 16MB blocks over the unified memory bus. 4GB is reserved for weights and iOS.
question: Analyze the maximum sequence length supported before spilling to flash, given 128KB KV per token and a 1ms memory controller synchronization per page allocation.
details:
  realistic_solution: With 4GB available and 128KB per token, raw math suggests 32,768 tokens. However, the cache is allocated in 16MB blocks (128 tokens per block). The allocation of 256 blocks incurs a 256ms cumulative memory controller sync penalty, capping the real-time context limit slightly lower due to OS fragmentation.
  common_mistake: |
    **The Pitfall:** Dividing remaining memory directly by token size.
    **The Rationale:** Candidates calculate theoretical bounds without accounting for the internal fragmentation and allocation barriers of large page boundaries.
    **The Consequence:** Failing to account for the cumulative memory controller sync penalties that impact real-time generation latency.
  napkin_math: |
    - Available Memory: 4GB = 4096MB.
    - Pages: 4096MB / 16MB per page = 256 pages.
    - Sync Penalty: 256 pages * 1ms = 256ms total pause.
    - Max Tokens: 4096MB / 128KB per token = 32,768 tokens.
    - **The cache supports roughly 32,768 tokens, though real-time limits are slightly lower due to the 256ms allocation sync penalties.**
