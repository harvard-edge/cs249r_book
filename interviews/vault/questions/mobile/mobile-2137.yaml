title: A17 Paged Cache Fragmentation
scenario: A local Llama-3-8B on an iPhone 15 Pro (A17 Pro, 8GB RAM) allocates paged
  KV cache in 16MB blocks over the unified memory bus. 4GB is reserved for weights
  and iOS.
question: Analyze the maximum sequence length supported before spilling to flash,
  given 128KB KV per token and a 1ms memory controller synchronization per page allocation.
details:
  realistic_solution: With 4GB available and 128KB per token, raw math suggests 31,250
    tokens. However, the cache is allocated in 16MB blocks (125 tokens per block).
    The allocation of 256 blocks incurs a 256ms cumulative memory controller sync
    penalty, capping the real-time context limit slightly lower due to OS fragmentation.
  common_mistake: Dividing remaining memory directly by token size without accounting
    for the internal fragmentation and allocation barriers of the 16MB page boundaries.
  napkin_math: 4096MB / 16MB = 256 pages. Sync = 256 * 1ms = 256ms total pause. 4096MB
    / 128KB = 32,768 max tokens.
