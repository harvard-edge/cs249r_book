title: The Distributed Training Scaling Failure
scenario: You are an ML Engineer responsible for developing a new real-time video segmentation feature for a mobile app. To achieve the required on-device performance, you are distilling a small student model from a very large 'teacher' model trained in the cloud. Your team observes that the distributed training job for the teacher model is scaling poorly. When scaling from 2 to 8 multi-GPU nodes, throughput only improved by 1.5x instead of the expected ~4x. Your infrastructure team provides a profiling report: within each 8-GPU (H100) node, GPU utilization is high and NVLink traffic is normal. However, the AllReduce operation, which synchronizes gradients across nodes, shows extremely high latency. All nodes are physically located in the same datacenter rack.
question: What cross-node interconnect bottleneck explains poor scaling when teacher-model training grows from 2 to 8 H100 nodes?
details:
  realistic_solution: |
    The most likely cause is that the servers are connected with a standard, low-bandwidth interconnect like 10/40Gbps Ethernet using the TCP/IP stack, instead of a high-performance fabric like InfiniBand with RDMA (Remote Direct Memory Access). Standard TCP/IP requires data to be copied from GPU memory to CPU memory, processed by the kernel's network stack, and then sent. This introduces massive latency and CPU overhead.
  common_mistake: |
    **The Pitfall:** Focusing on intra-node bottlenecks like PCIe or NVLink.
    **The Rationale:** Misinterpreting high GPU utilization as efficiency, ignoring that GPUs are waiting on network I/O.
    **The Consequence:** Failing to diagnose that the TCP/IP stack and lack of RDMA are choking the inter-node AllReduce synchronization.
  napkin_math: |
    - **Gradient Size:** ~10 GB per step.
    - **10 Gbps Ethernet:** ~1.25 GB/s. Ring-AllReduce takes ~8 seconds per step.
    - **400 Gbps InfiniBand:** ~50 GB/s. Ring-AllReduce takes ~0.2 seconds per step.
    - **Conclusion:** TCP/IP CPU overhead and low bandwidth bottleneck the GPUs during synchronization.
  options:
  - The PCIe Gen5 bus connecting the GPUs to the CPU is saturated.
  - NVLink 4.0 bandwidth between GPUs within each node is the bottleneck.
  - The servers are connected with standard Ethernet instead of an RDMA-capable interconnect like InfiniBand.
  - The model is too small, leading to low arithmetic intensity on the H100s.
  correct_index: 2
