title: 'The Distributed Training Scaling Failure'
scenario: 'You are an ML Engineer responsible for developing a new real-time video segmentation feature for a mobile app. To achieve the required on-device performance, you are distilling a small student model from a very large teacher model trained in the cloud. Your team observes that the distributed training job for the teacher model is scaling poorly, with throughput improving by only 1.5x instead of the expected 4x when scaling from 2 to 8 multi-GPU nodes. Profiling reveals high intra-node GPU utilization and normal NVLink traffic, but the AllReduce synchronization operation exhibits extremely high latency.'
question: 'What cross-node interconnect bottleneck explains poor scaling when teacher-model training grows from 2 to 8 nodes?'
details:
  realistic_solution: |
    The deployment lacks a high-performance RDMA fabric (e.g., InfiniBand or RoCEv2), relying instead on standard TCP/IP over Ethernet. This forces gradient synchronizations through the kernel network stack, causing severe CPU overhead and memory bandwidth saturation during the Ring-AllReduce operations.
  common_mistake: |
    **The Pitfall:** Focusing on intra-node bottlenecks like PCIe or NVLink.
    **The Rationale:** Misinterpreting high GPU utilization as execution efficiency, ignoring that GPUs are blocked on network I/O during synchronization.
    **The Consequence:** Failing to diagnose the TCP/IP stack overhead, leading to wasted effort optimizing single-node compute.
  napkin_math: |
    **Assumptions & Constraints:**
    - Gradient size is ~10 GB per step.
    - Ethernet provides 10 Gbps (1.25 GB/s).
    - InfiniBand provides 400 Gbps (50 GB/s).

    **Calculations:**
    - Ethernet time = 10 GB / 1.25 GB/s = 8 seconds per step.
    - InfiniBand time = 10 GB / 50 GB/s = 0.2 seconds per step.

    **Conclusion & Interpretation:**
    - **Result: Network-Bound**. TCP/IP CPU overhead and low bandwidth strictly bottleneck the GPUs during synchronization.
  options:
  - 'The latency is 8 seconds per step, indicating the PCIe Gen5 bus connecting the GPUs to the CPU is saturated.'
  - 'The throughput is 1.5x, meaning NVLink 4.0 bandwidth between GPUs within each node is the bottleneck.'
  - 'The latency is 8 seconds per step due to using standard Ethernet instead of an RDMA-capable interconnect like InfiniBand.'
  - 'The model''s low arithmetic intensity limits the speedup to 1.5x, requiring larger batch sizes.'
  correct_index: 2
