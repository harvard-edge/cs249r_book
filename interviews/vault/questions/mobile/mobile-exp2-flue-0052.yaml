title: Watchdog Timer Sizing for Hexagon NPU
scenario: You are deploying a driver monitoring model on a system utilizing the Qualcomm Hexagon NPU (Snapdragon
  8 Gen 3). The INT8 model requires 90 Giga-Operations (GOPs) per frame. To comply with functional safety
  standards, you must configure a hardware watchdog timer for the NPU. Assuming the CPU and GPU are heavily
  contending for the shared 16 GB LPDDR5X memory, you are required to apply a 3x safety margin over the
  theoretical peak execution time to establish the worst-case execution time (WCET).
details:
  realistic_solution: The correct approach requires calculating the absolute minimum compute time using
    the NPU's peak INT8 performance, then multiplying by the safety margin to account for memory stalls.
    Setting the watchdog timer exactly at this WCET ensures it triggers on genuine hardware or software
    hangs without penalizing normal memory contention on the heterogeneous SoC.
  common_mistake: Candidates often fail to calculate the theoretical peak execution time correctly from
    TOPS, or they ignore the impact of shared memory contention on deterministic execution, setting the
    watchdog too tight and causing false system resets.
  napkin_math: '1. Identify NPU theoretical peak: 45 TOPS = 45,000 GOPs/sec. 2. Calculate theoretical
    compute time: 90 GOPs / 45,000 GOPs/sec = 0.002 seconds (2 ms). 3. Apply the 3x safety margin for
    LPDDR5X memory contention: 2 ms * 3 = 6 ms. The watchdog timer must be set to 6 ms.'
