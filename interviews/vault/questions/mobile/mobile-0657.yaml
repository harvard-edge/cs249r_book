title: The Autonomous Dashcam's Thermal Budget
scenario: 'You are the Principal Engineer at a startup building a smart dashcam for ride-sharing fleets.
  The primary feature is real-time, on-device driver drowsiness detection. Your constraints are severe:
  the device is a self-contained unit mounted on the dashboard, powered by a small internal battery and
  a small solar panel for energy harvesting. It cannot be plugged into the car''s power. It must operate
  reliably through a 10-hour shift, even on overcast days, in a vehicle that can get extremely hot in
  direct sunlight. The core of the device is a modern mobile SoC (like a Snapdragon 8 Gen 3).'
question: "Why is continuous powerful vision inference infeasible for the autonomous dashcam, and what duty-cycled architecture is required?"
details:
  realistic_solution: The premise of 'continuous monitoring' with a powerful vision model on a battery-powered
    mobile device is a lie. An L6+ answer must immediately identify this and build an architecture around
    intelligent, hierarchical duty cycling.
  common_mistake: Engineers often focus on a single constraint, leading to an unworkable design. A junior
    engineer might say 'just use a bigger battery,' which ignores the thermal crisis and cost/size issues.
    Another common mistake is to assume the peak performance of the mobile NPU (e.g., 35-45 TOPS) is continuously
    available. This is false; peak performance is thermally unsustainable. A senior engineer must design
    for the *average* power draw, not the peak, and understand that the thermal budget is often more constraining
    than the energy budget.
