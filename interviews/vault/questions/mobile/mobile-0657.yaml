title: The Autonomous Dashcam's Thermal Budget
scenario: You are the Principal Engineer at a startup building a smart dashcam for ride-sharing fleets. The device is a self-contained unit powered by a small internal battery and a solar panel. It must operate reliably through a 10-hour shift in a hot vehicle.
question: Why is continuous powerful vision inference infeasible for the autonomous dashcam, and what duty-cycled architecture is required?
details:
  realistic_solution: The premise of 'continuous monitoring' with a powerful vision model on a battery-powered mobile device is a lie. An L6+ answer must immediately identify this and build an architecture around intelligent, hierarchical duty cycling.
  common_mistake: |
    **The Pitfall:** Assuming peak NPU TOPS can be sustained continuously.
    **The Rationale:** Engineers often focus on the theoretical peak performance (e.g., 45 TOPS) and ignore severe thermal and energy constraints.
    **The Consequence:** Sustained heavy workloads rapidly drain the small battery and induce catastrophic thermal throttling, rendering the device useless in a hot environment.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - SoC: Heavy vision models draw ~5-7W.
       - Shift duration: 10 hours.
       - Typical dashcam battery capacity: ~10-15 Wh.
    2. **Calculations:**
       - Total energy required = 5 W * 10 h = 50 Wh.
       - Energy deficit = 50 Wh (required) > 15 Wh (available).
    3. **Conclusion & Interpretation:**
       **Result: Power-Bound. A hierarchical, duty-cycled architecture using a sub-1W wake-word or low-res motion sensor is required to keep average power draw below 1.5W.**
