title: Hexagon NPU Memory Bandwidth Bottleneck Analysis
scenario: You deploy a streaming sequence-to-sequence model using INT8 weights on a Qualcomm Hexagon NPU. During batch-size=1 inference profiling, you observe the NPU is only achieving about 1.5 TOPS.
question: Why does batch-size-1 INT8 sequence inference on the Hexagon NPU achieve only about 1.5 TOPS despite a 45 TOPS peak?
details:
  realistic_solution: The system is exhibiting a severe memory bandwidth bottleneck because the weights are being streamed from the shared LPDDR5X DRAM rather than fitting into the NPU's faster on-chip SRAM. For tasks with low data reuse (like batch-size 1 inference on linear layers), the compute units process INT8 operations much faster than the memory controller can supply the weights. Consequently, the NPU execution units stall while waiting for DRAM fetches, capping the effective TOPS far below the 45 TOPS theoretical limit.
  common_mistake: |
    **The Pitfall:** Guessing that the NPU is thermal throttling or hitting an OS-level power constraint.
    **The Rationale:** Candidates fail to identify the main memory bandwidth wall and do not check the arithmetic intensity required to sustain peak NPU utilization.
    **The Consequence:** Missing the fundamental bottleneck of batch-size=1 autoregressive inference, proposing incorrect solutions like changing the clock speed instead of optimizing memory access.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - NPU Peak Compute: 45 TOPS.
       - LPDDR5X Bandwidth: 77 GB/s.
       - Target: Batch-size 1 INT8 inference.
    2. **Calculations:**
       - Required Arithmetic Intensity = 45,000 GOPS / 77 GB/s = 584 OPs/Byte.
       - Actual Intensity (batch-size 1, minimal cache reuse) ≈ 20 OPs/Byte.
       - Max Achievable Performance = 77 GB/s * 20 OPs/Byte = 1,540 GOPS = 1.54 TOPS.
    3. **Conclusion & Interpretation:**
       **Result: ~1.54 TOPS peak due to lack of arithmetic intensity (Memory Bandwidth-Bound).**
