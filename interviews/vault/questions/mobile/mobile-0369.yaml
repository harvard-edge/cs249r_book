title: The App Memory Budget Rule
scenario: You're A/B testing a new on-device personalization model. The initial version is causing the
  OS to terminate your app on some low-end test devices. To set a performance budget for the next iteration,
  you consult common mobile development heuristics. What is the generally accepted maximum percentage
  of a device's total RAM that a single application should use to avoid being terminated by the operating
  system?
question: "What is the generally accepted maximum percentage of a device's total RAM that a single application should use to avoid being terminated by the operating system?"
details:
  realistic_solution: The correct rule of thumb is approximately 25%. Mobile operating systems reserve
    significant amounts of RAM for themselves and other background processes. Exceeding this soft limit
    puts your application at a high risk of being terminated, which leads to a poor user experience and
    can negatively impact A/B test results by creating sample bias. For a device with 8 GB of RAM, this
    means your app's total memory footprint should stay below a hard ceiling of 2 GB.
  common_mistake: Engineers, especially those from cloud backgrounds, often underestimate how aggressively
    mobile operating systems (like iOS and Android) manage memory. They might assume they have access
    to most of the device's RAM, leading to models that are too large and cause the app to be jettisoned
    (killed) when another process needs memory or the OS performs background tasks.
  napkin_math: 'Device with 8 GB RAM: | 8 GB Total RAM * 0.25 (Budget Ratio) = 2 GB Maximum App Memory'
  options:
  - 50%. The app should be able to use half the available system memory.
  - 75%. The foreground app has priority and can use most of the memory.
  - 25%. This leaves sufficient memory for the OS and other background processes.
  - 10%. To be completely safe, the app should use a minimal footprint.
  correct_index: 2
