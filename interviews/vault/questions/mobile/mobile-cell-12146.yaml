title: 'Network Bandwidth Bottlenecks: Evaluate WiFi vs. Cellular Bandwidth for Mobile Cloud ML'
scenario: 'A mobile app offers hybrid inference: use cloud API when WiFi available, fall back to on-device
  1B INT4 LLM (TPOT 7.4ms on A17 Pro). The cloud API (H100) achieves 7.8ms TPOT but adds network RTT.
  Compare E2E latency on: WiFi 802.11ax (2.4Gbps, 5ms RTT), 5G mmWave (4Gbps, 10ms RTT), 4G LTE (100Mbps,
  50ms RTT). At what network condition does on-device win?'
question: "At what network condition does on-device win?"
details:
  realistic_solution: 'Cloud E2E (128 tokens): RTT + prefill (256T at H100 13B: 27ms) + decode (128×7.8ms=998ms)
    = RTT + 1025ms. On-device E2E: 128×7.4ms=947ms. Break-even: cloud_E2E = on-device: RTT + 1025 = 947
    → RTT = -78ms. Cloud is never faster than on-device for this task! On-device at 7.4ms/token wins vs
    H100 at 7.8ms/token + any RTT. Switch: if cloud uses 70B model (4ms/token H100): 128×4+RTT=512+RTT.
    On-device: 947ms. Break-even: 512+RTT=947 → RTT=435ms. Cloud 70B wins if RTT < 435ms (always true).'
  common_mistake: Computing transfer time for prompt/response without noting it's negligible (2.5KB at
    any modern network speed) and that RTT dominates.
  napkin_math: 'On-device 1B: 947ms for 128 tokens. Cloud 13B H100: 1025+RTT ms. 1025>947 → on-device
    always wins for 13B cloud. Cloud 70B H100: TPOT=140GB/3.35TB/s=41.8ms/token. 128×41.8+RTT=5350+RTT
    ms >> 947ms. On-device still wins. Cloud 70B with INT4 (35GB/3.35TB/s=10.4ms/token): 128×10.4+RTT=1331+RTT
    > 947ms. On-device wins! 1B model on-device actually faster than 70B INT4 H100 for 128 tokens due
    to RTT. For quality: 70B >> 1B, so use cloud for quality-sensitive queries.'
