title: The Interconnect Choke Point
scenario: You are profiling a real-time semantic segmentation model. It has CPU preprocessing followed by NPU inference. The end-to-end latency is significantly higher than the sum of CPU preprocessing and NPU inference times.
question: What SoC-level component likely causes the discrepancy between sum of stage times and end-to-end latency, and how is its impact quantified?
details:
  realistic_solution: The likely bottleneck is the **SoC interconnect** (e.g., ARM's AMBA AXI bus or proprietary
    interconnects like Qualcomm's NoC - Network on Chip). When the CPU finishes preprocessing, the resulting
    image tensor (e.g., FP32 or INT8) must be transferred from CPU-visible DRAM to the NPU's local memory
    or cache for inference. This data transfer is not instantaneous and consumes valuable time, especially
    for high-resolution images or large tensors. The interconnect has finite bandwidth and latency, and
    contention from other SoC components (GPU, display controller, modem) can further degrade performance.
  common_mistake: |
    **The Pitfall:** Blaming CPU-NPU software synchronization overhead.
    **The Rationale:** Developers assume API calls or driver wakes are the primary delay, ignoring the physical time it takes to move large tensors across the SoC.
    **The Consequence:** Failing to optimize data layout, precision, or placement, leaving the physical data movement bottleneck unresolved.
  napkin_math: |
    - **Data Transfer Size:** 1080p image (1920x1080x3) in FP32 (4 bytes) = 24.88 MB.
    - **Interconnect Bandwidth:** Assume effectively 10 GB/s.
    - **Transfer Latency:** 24.88 MB / 10 GB/s = 2.48 ms.
    - **Result:** Interconnect data movement adds a hidden **2.48 ms** to end-to-end latency.
