title: The Interconnect Choke Point
scenario: 'You are profiling a real-time semantic segmentation model on a mobile SoC. The pipeline consists
  of two main stages: complex image preprocessing on the CPU (e.g., tone mapping, color space conversion)
  followed by neural network inference on the NPU. You observe that the end-to-end latency is significantly
  higher than the sum of CPU preprocessing time and NPU inference time. What SoC-level component is likely
  causing this discrepancy, and how would you quantify its impact?'
details:
  realistic_solution: The likely bottleneck is the **SoC interconnect** (e.g., ARM's AMBA AXI bus or proprietary
    interconnects like Qualcomm's NoC - Network on Chip). When the CPU finishes preprocessing, the resulting
    image tensor (e.g., FP32 or INT8) must be transferred from CPU-visible DRAM to the NPU's local memory
    or cache for inference. This data transfer is not instantaneous and consumes valuable time, especially
    for high-resolution images or large tensors. The interconnect has finite bandwidth and latency, and
    contention from other SoC components (GPU, display controller, modem) can further degrade performance.
  common_mistake: '"The CPU-NPU synchronization overhead." While synchronization exists, the primary bottleneck
    for large data transfers is often the physical data movement itself.'
  napkin_math: A 1080p image (1920x1080) with 3 channels, FP32, is $1920 \times 1080 \times 3 \times 4
    \text{ bytes} \approx 24.8 \text{ MB}$. If the interconnect bandwidth between CPU and NPU is effectively
    10 GB/s, the transfer would take $\frac{24.8 MB}{10 GB/s} = \frac{24.8 \times 10^6 \text{ bytes}}{10
    \times 10^9 \text{ bytes/s}} \approx 2.48 \text{ ms}$. This 2.48ms is *pure transfer time* and adds
    directly to end-to-end latency, often unnoticed if not explicitly profiled. If the bandwidth is lower
    or under contention, this time increases.
