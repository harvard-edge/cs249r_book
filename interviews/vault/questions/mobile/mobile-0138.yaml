title: The CPU Fallback Energy Tax
scenario: Your team has a new operator in a mobile CNN that isn't supported by the NPU, forcing it to run on the CPU. The initial implementation uses standard 32-bit floats. A teammate proposes rewriting the operator to use 8-bit integers to save power.
question: Approximately how much more energy-efficient is the INT8 version compared to the FP32 version for that specific operation?
details:
  realistic_solution: |
    An INT8 operation consumes approximately 18 times less energy than an FP32 operation. The energy of arithmetic operations is determined by the number of transistors switching, and the complexity of an N-bit multiplier scales roughly as N^2, not N. Therefore, reducing the bit-width from 32 to 8 yields a much greater than 4x improvement in energy efficiency.
  common_mistake: |
    **The Pitfall:** Assuming energy savings scale linearly with bit-width reduction.
    **The Rationale:** Engineers intuitively divide 32 by 8, forgetting that multiplier energy scales quadratically.
    **The Consequence:** Underestimating the critical importance of quantization for on-device battery life.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - FP32 MAC energy: ~3.7 pJ
       - INT8 MAC energy: ~0.2 pJ
    2. **Calculations:**
       - Efficiency Improvement: 3.7 pJ / 0.2 pJ = 18.5x
    3. **Conclusion & Interpretation:** **INT8 is ~18.5x more efficient than FP32. Result: Precision-Bound.**
  options:
  - ~4x more efficient
  - ~2x more efficient
  - ~18x more efficient
  - ~100x more efficient
  correct_index: 2
