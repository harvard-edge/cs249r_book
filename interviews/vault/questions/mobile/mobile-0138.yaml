title: The CPU Fallback Energy Tax
scenario: Your team has a new operator in a mobile CNN that isn't supported by the phone's NPU, forcing
  it to run on the main CPU. The initial implementation uses standard 32-bit floats (FP32). A teammate
  proposes rewriting the operator to use 8-bit integers (INT8) to save power. Approximately how much more
  energy-efficient is the INT8 version compared to the FP32 version for that specific operation?
question: "Approximately how much more energy-efficient is the INT8 version compared to the FP32 version for that specific operation?"
details:
  realistic_solution: An INT8 operation consumes approximately 18 times less energy than an FP32 operation.
    The energy of arithmetic operations is determined by the number of transistors switching, and the
    complexity of an N-bit multiplier scales roughly as N², not N. Therefore, reducing the bit-width from
    32 to 8 yields a much greater than 4x improvement in energy efficiency.
  common_mistake: Engineers often mistakenly assume the energy savings are linear with the reduction in
    bit-width, guessing it might be 4x (32 bits / 8 bits). This ignores that the energy cost of a multiplier,
    a key component in ML ops, scales quadratically with bit-width, leading to a much larger-than-expected
    energy saving.
  napkin_math: 'According to standard hardware invariants, the energy ratio between FP32 and INT8 compute
    is a physical constant based on transistor switching. An FP32 MAC operation consumes approximately
    3.7 pJ of energy, while an INT8 MAC consumes roughly 0.2 pJ. Thus, reducing precision yields a massive
    energy saving: 3.7 pJ / 0.2 pJ = 18.5x efficiency improvement.'
  options:
  - ~4× more efficient
  - ~2× more efficient
  - ~18× more efficient
  - ~100× more efficient
  correct_index: 2
