title: The Real-Time Dashcam Dilemma
scenario: You're building a real-time 'dashcam' feature for a mobile app running on a smartphone with an Apple A17 Pro NPU, which delivers 35 TOPS for INT8 inference. To avoid UI 'jank', your entire detection pipeline must finish within a 16ms budget per frame. Your lightweight object detection model requires approximately 2 Giga-Ops to process one object proposal.
question: How many objects can your system theoretically detect in a single frame before dropping below the real-time deadline?
details:
  realistic_solution: The correct approach is to first calculate the total number of operations the NPU can perform within the given time budget, and then divide that by the number of operations required per object.
  common_mistake: |
    **The Pitfall:** Making a unit conversion error, typically by failing to convert the 16ms deadline into seconds to match the seconds unit in TOPS (Tera-Ops Per Second).
    **The Rationale:** Ignoring the time budget entirely and trying to divide the headline TOPS number by the Ops-per-object.
    **The Consequence:** Leading to a wildly incorrect answer (e.g., millions of objects instead of hundreds).
  napkin_math: |
    - NPU Peak: 35 TOPS = 35e12 ops/s.
    - Time Budget: 16ms = 0.016s.
    - Total ops in budget = 35e12 * 0.016 = 560e9 = 560 Giga-Ops.
    - Per object computation: 2 Giga-Ops.
    - **Max objects = 560 / 2 = 280 objects per frame.**
    - *(In practice, memory transfers and scheduling overhead reduce this by ~30-50%, so realistic max ~140-200 objects)*
  options:
  - 17 objects
  - 280,000 objects
  - 280 objects
  - 1 object
  correct_index: 2
