title: 'Dataset Curation: Implement Privacy-Preserving Data Collection on Snapdragon'
scenario: You are implementing differential privacy for federated data collection on 10M mobile devices. Each device contributes gradients after local training on user data. You need to implement DP-SGD with ε=1.0.
question: "How should DP-SGD be implemented for federated gradients on mobile devices to achieve epsilon 1.0, and what are the required parameters?"
details:
  realistic_solution: 'DP-SGD: clip per-sample gradients to C=1.0, add Gaussian noise σ=C×noise_multiplier. Use Moments Accountant or RDP for privacy accounting. Subsampling: if 10K devices participate per round from 10M, sampling rate q=0.001 — provides strong amplification.'
  common_mistake: |
    **The Pitfall:** Using a static noise multiplier without accounting for subsampling amplification.
    **The Rationale:** Engineers apply standard DP-SGD formulas directly, ignoring that sampling a small fraction of a large device pool drastically strengthens the privacy guarantee.
    **The Consequence:** Adding excessive, unnecessary noise to the gradients, severely degrading model utility and convergence.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Target ε = 1.0, δ = 1/10M = 1e-7, Rounds T = 100.
       - Devices per round = 10,000 out of 10,000,000.
    2. **Calculations:**
       - Subsampling rate q = 10,000 / 10,000,000 = 0.001.
       - Using RDP accountant with q=0.001 and T=100: noise multiplier σ ≈ 1.1 achieves ε=1.0.
       - Per-gradient coordinate noise = σ * C = 1.1 (add N(0, 1.1²)).
       - 100 rounds * RDP(α=8) ≈ 0.01 per round → total ε ≈ 0.8.
    3. **Conclusion & Interpretation:**
       - **Result: Privacy-Bound**. Total ε ≈ 0.8 < 1.0, verifying strong amplification from subsampling.
