validation_issues:
- The Napkin Math for 'Standard Conv MACs' includes '10,000' twice in the multiplication '9 x 10,000 x
  10,000', leading to a calculation of 900 MMACs instead of 900 Million MACs (900 * 10^6). If 100x100
  spatial resolution, then 100x100 spatial elements, so calculation should be 3x3 x 100 (Cin) x 100 (Cout)
  x (100x100 spatial) = 9 * 100 * 100 * 10000 = 9e9 MACs = 9000 MMACs or 9 GMACs. This leads to a severe
  math error.
- The value '900 MMACs' for standard convolution is likely a typo and should be much higher given the
  parameters. The statement '9 x 10,000 x 10,000' is mathematically 900,000,000 which is 900 MMACs, but
  10,000 is (100x100), not two separate factors of 10,000.
- The '8.25x computational reduction' from 900 MMACs to 109 MMACs is inaccurate if the initial 900 MMACs
  figure is itself incorrect; the actual reduction factor should be calculated based on correct initial
  and final MACs.
