title: Mobile NPU Polling Power Drain
scenario: A fitness app on a Snapdragon 8 Gen 3 queries the NPU every 100ms. The NPU
  wake/sleep transitions take 50ms at 1W, and the inference takes 5ms at 2W. Sleep
  power is 0W.
question: Diagnose the power inefficiency and calculate the average power consumption
  of this NPU polling pattern.
details:
  realistic_solution: 'The inefficiency is heavy transition overhead relative to compute
    time. Total cycle is 100ms. Energy per cycle: (50ms * 1W) + (5ms * 2W) = 50mJ
    + 10mJ = 60mJ. Average power is 60mJ / 100ms = 0.6W.'
  common_mistake: Summing the power states directly (1W + 2W) instead of calculating
    energy integrals over the specific time intervals.
  napkin_math: (50*1 + 5*2) / 100 = 60 / 100 = 0.6 W
