title: 'Mobile NPU Polling Power Drain'
scenario: 'A fitness app on a mobile SoC queries the NPU every 100ms. The NPU wake/sleep transitions take 50ms at 1W, and the inference takes 5ms at 2W. Sleep power is 0W.'
question: 'Diagnose the power inefficiency and calculate the average power consumption of this NPU polling pattern.'
details:
  realistic_solution: 'The inefficiency is heavy transition overhead relative to compute time. Total cycle is 100ms. Energy per cycle: (50ms x 1W) + (5ms x 2W) = 50mJ + 10mJ = 60mJ. Average power is 60mJ / 100ms = 0.6W.'
  common_mistake: |
    **The Pitfall:** Summing the power states directly (1W + 2W) instead of integrating over time.
    **The Rationale:** Candidates mistake power measurements (Watts) for total energy output (Joules), ignoring the time component of the duty cycle.
    **The Consequence:** The calculated power drain is fundamentally wrong, leading to wildly inaccurate battery drain estimates.
  napkin_math: |
    **Assumptions & Constraints:**
    - Cycle: 100ms.
    - Transitions: 50ms at 1W. Inference: 5ms at 2W. Sleep: 45ms at 0W.

    **Calculations:**
    - Transition Energy: 0.050s x 1W = 0.050 Joules (50mJ).
    - Inference Energy: 0.005s x 2W = 0.010 Joules (10mJ).
    - Total Energy per cycle: 50mJ + 10mJ = 60mJ.
    - Average Power: 60mJ / 100ms = 0.6W.

    **Conclusion & Interpretation:**
    - **Result: 0.6W (Overhead-Bound)**. The average power consumption is 0.6W, heavily dominated by the transition overhead (50mJ vs 10mJ compute).
