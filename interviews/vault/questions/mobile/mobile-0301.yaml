title: The MobileNet Multiplier (mobile-0301)
scenario: You're reviewing a pull request for a new feature on a mobile app that needs to run a real-time object detection model. A junior engineer has implemented a core layer using a standard 3x3 convolution.
question: What is the primary reason you would ask them to refactor this to use a depthwise separable convolution instead?
details:
  realistic_solution: 'The primary benefit is a massive reduction in computational cost (Multiply-Accumulate operations, or MACs). A standard convolution performs spatial and channel-wise filtering in a single, costly step. Depthwise separable convolutions factor this into two, much cheaper steps:'
  common_mistake: |
    **The Pitfall:** Believing the goal is to improve accuracy or underestimating the sheer scale of the computational reduction.
    **The Rationale:** Engineers assume it's a minor optimization (e.g., 20-30% improvement).
    **The Consequence:** Missing the fact that it is typically an order of magnitude (8-9x) fewer MACs, which is often the difference between running at a smooth 30 FPS versus a sluggish 3 FPS on a mobile processor.
  napkin_math: |
    - **Standard Conv:** 3 × 3 × 64 × 64 = 36,864 MACs per pixel.
    - **Depthwise Separable Conv:** (3 × 3 × 64) + (64 × 64) = 576 + 4,096 = 4,672 MACs per pixel.
    - **Reduction:** 36,864 / 4,672 = **~7.9x reduction in compute**.
  options:
  - It is required for compatibility with mobile NPUs like the Apple ANE.
  - It significantly improves model accuracy over a standard convolution.
  - It drastically reduces the number of computations (MACs).
  - It's a legacy technique that only speeds up training, not inference.
  correct_index: 2
