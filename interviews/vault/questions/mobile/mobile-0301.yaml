title: The MobileNet Multiplier (mobile-0301)
scenario: You're reviewing a pull request for a new feature on a mobile app that needs to run a real-time object detection model. A junior engineer has implemented a core layer using a standard 3x3 convolution.
question: What is the primary reason you would ask them to refactor this to use a depthwise separable convolution instead?
details:
  realistic_solution: Depthwise separable convolutions provide a massive, non-negotiable reduction in mathematical computational cost. By decoupling spatial filtering from channel-wise projection, the operation slashes Multiply-Accumulate operations (MACs) by nearly an order of magnitude. This structural efficiency is the absolute baseline requirement for unlocking 30+ FPS real-time vision pipelines on thermal-constrained edge processors.
  common_mistake: |
    **The Pitfall:** Dismissing the refactor as a minor, fractional performance tweak or mistakenly assuming it primarily targets model accuracy.
    **The Rationale:** Engineers used to throwing raw server-side GPU math at problems underestimate the extreme mathematical bloat of standard 3x3 convolutions.
    **The Consequence:** Merging horribly inefficient layers that immediately choke the mobile NPU, turning a fluid 30 FPS feature into an unusable 3 FPS slideshow.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Layer config: 3x3 spatial kernel, 64 input channels, 64 output channels.
       - Compare standard convolution vs. depthwise separable convolution.
    2. **Calculations:**
       - Standard MACs per pixel: 3 * 3 * 64 * 64 = 36,864 MACs.
       - Depthwise Separable MACs: (3 * 3 * 64) + (64 * 64) = 576 + 4,096 = 4,672 MACs.
       - Reduction factor: 36,864 / 4,672 = ~7.9x.
    3. **Conclusion & Interpretation:**
       - **Result: Compute-Bound.** Depthwise separable convolutions provide an order-of-magnitude ~8x reduction in raw compute cost, making them mandatory for mobile vision.
  options:
  - It maps perfectly to NPU compiler backends.
  - It increases spatial resolution precision.
  - It yields an ~8x reduction in Multiply-Accumulate operations (MACs).
  - It prevents FP16 overflow errors.
  correct_index: 2
