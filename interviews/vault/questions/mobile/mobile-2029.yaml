title: Identifying Bandwidth Bottlenecks in Mobile Video Processing
scenario: A real-time video processing app on a Snapdragon 8 Gen 3 buffers 4K frames
  in LPDDR5X memory before feeding them to the Hexagon NPU. The pipeline currently
  experiences frame drops despite the NPU reporting only 60% utilization.
question: Identify the likely bottleneck in the data pipeline and calculate the required
  memory bandwidth to sustain 60 FPS for uncompressed 4K (3840x2160, 3 channels, 8-bit)
  input.
details:
  realistic_solution: The bottleneck is likely memory bandwidth exhaustion or copy
    overhead rather than compute. To sustain 60 FPS for 4K video, each frame is ~24.88
    MB. The pipeline requires 24.88 MB * 60 FPS = 1.49 GB/s continuous bandwidth just
    for a single read pass, not accounting for intermediate buffer copies or OS overhead.
  common_mistake: Assuming the NPU's compute capacity limits performance without checking
    the data transfer requirements and forgetting the 3 color channels.
  napkin_math: 3840 * 2160 * 3 * 60 = 1.49 GB/s
