title: Apple A17 Pro KV-Cache Sizing and Memory Pressure for LLM Inference
scenario: Imagine you're optimizing an on-device LLM inference pipeline for an iPhone 15 Pro, which utilizes the Apple A17 Pro chip featuring a 35 TOPS Neural Engine and 8 GB of unified memory. You are tasked with determining the optimal KV-cache size for a transformer model with 7B parameters and a context window of 4096 tokens.
question: How does KV-cache sizing impact overall system memory availability for other applications and the operating system?
details:
  realistic_solution: To manage KV-cache memory pressure on the Apple A17 Pro, one must recall that the KV-cache for a single token typically stores two vectors (key and value) per attention head per layer. For a given model, this translates to 2 * num_layers * num_attention_heads * head_dimension * bytes_per_element for each token. Efficient techniques like Paged Attention are crucial for dynamic memory allocation and reducing fragmentation. Implementing a suitable cache eviction policy (e.g., LRU, approximated LRU, or custom heuristics based on model usage patterns) is vital to discard less relevant past tokens. Quantizing the KV-cache to lower precision (e.g., int8 or even int4) can significantly reduce its memory footprint without severe performance degradation. Furthermore, developers must consider the unified memory constraints, balancing the KV-cache needs with system overhead and other application requirements.
  common_mistake: |
    **The Pitfall:** Underestimating the memory footprint of the KV-cache.
    **The Rationale:** Developers often only consider the static weight sizes, forgetting the dynamic cache and the shared nature of Apple's unified memory.
    **The Consequence:** Excessive page evictions, thrashing, and out-of-memory (OOM) crashes as the context length grows.
  napkin_math: |
    *   **Model Specs:** 32 layers, 32 heads, 128 head_dim.
    *   **KV per Token:** 2 (K+V) * 32 layers * 32 heads * 128 dim * 2 bytes (FP16) = 524,288 bytes = **512 KB**.
    *   **Total KV Cache Size:** 4096 tokens * 512 KB/token = **2.0 GB**.
    *   **Conclusion:** The KV cache alone consumes ~25% of the entire 8 GB unified memory, creating massive pressure alongside the OS and 7B model weights.
