title: The Janky Visual Search
scenario: You're a mobile ML engineer optimizing a 'Visual Search' feature. The app sends an image to a multi-GPU cloud backend. You observe that while P50 latency is acceptable at 300ms, P99 latency is over 1500ms, causing a janky user experience. The backend team tells you they are using a Mixture-of-Experts (MoE) model sharded across 8 GPUs in a single server. A profiler shows that when the router gate selects certain combinations of experts, the end-to-end inference time spikes dramatically.
question: Given that the mobile network latency is consistently around 50ms and the model's compute-per-expert is stable, what is the most likely cause of this high latency variance?
details:
  realistic_solution: 'The most likely cause is a bottleneck in the server''s internal interconnect. The server is likely using multiple GPUs connected only by the PCIe bus, without a high-speed NVLink fabric. When the MoE model''s router selects experts that reside on GPUs attached to different CPU sockets, their communication must traverse the slow inter-socket link (e.g., UPI/xGMI) in addition to the PCIe bus. This creates significant and variable latency compared to when experts on the same CPU socket are chosen. This is a classic topology-induced bottleneck.'
  common_mistake: |
    **The Pitfall:** Blaming the external mobile network or a software bug.
    **The Rationale:** Engineers don't realize that within a single multi-GPU server, the internal interconnect topology (PCIe vs NVLink, NUMA nodes) creates massive performance cliffs.
    **The Consequence:** Wasting time debugging the mobile client or TCP stack when the variance is fundamentally baked into the server's hardware topology and the MoE router.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - NVLink 4.0 latency: ~500 ns.
       - PCIe Gen5 latency: ~1,000 ns (1 µs).
       - Cross-socket UPI hop latency: ~100-200 ns.
    2. **Calculations:**
       - Cross-socket PCIe transfer: 1,000 ns + 100 ns = 1,100 ns.
       - Latency penalty: 1,100 ns vs 500 ns (>2x per transfer).
    3. **Conclusion & Interpretation:**
       - **Result: Interconnect-Bound. 'Bad' MoE routing across CPU sockets takes >2x the time of intra-socket routing, and this small difference is amplified by thousands of MoE collective algorithm steps, causing the P99 latency spikes.**
  options:
  - The backend's InfiniBand network, used for RDMA, is dropping packets, causing high-latency fallbacks.
  - The model's KV-cache is spilling from HBM to much slower system RAM, but only for certain inputs that activate the largest experts.
  - The server lacks full NVLink connectivity, and the MoE router is picking experts on GPUs across different CPU sockets, forcing slow communication over the PCIe bus and inter-socket links.
  - The mobile client's cellular connection has high packet loss, and TCP retransmission delays are causing the latency spikes.
  correct_index: 2
