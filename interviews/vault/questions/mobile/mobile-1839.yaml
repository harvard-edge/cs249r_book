title: Profiling and eliminating unnecessary tensor copies in mobile autograd pipeline
scenario: A PyTorch Mobile model on A17 Pro (35 TOPS, 8GB) processes images from the camera in real-time. Profiling shows 60% of inference time (12ms out of 20ms) is spent on memory operations, not compute. The model is a MobileNetV2 (3.4M params) which should be perfectly compute-bound.
question: How would you profile and remove unnecessary tensor copies in a PyTorch Mobile image pipeline on A17 Pro?
details:
  realistic_solution: 'Convert to channels-last memory format: model = model.to(memory_format=torch.channels_last). Process input in NHWC natively. Fuse the uint8->float32 conversion and normalization into a single operation. Eliminate unnecessary .contiguous() calls by ensuring all operations support non-contiguous tensors or by using channels-last throughout. Result: memory ops should drop from 12ms to ~2ms.'
  common_mistake: |
    **The Pitfall:** Overlooking implicit tensor format conversions.
    **The Rationale:** Engineers forget that mobile camera frames arrive in NHWC format, while PyTorch expects NCHW, leading to implicit, non-contiguous memory copies when `.contiguous()` is called.
    **The Consequence:** The model becomes severely memory-bound, spending the majority of its execution time copying data rather than computing.
  napkin_math: |
    - **Camera frame:** 1 x 3 x 720 x 1280 = 2.76 MB (uint8)
    - **uint8 to float32 cast:** 2.76 MB * 4 = 11 MB
    - **NHWC to NCHW conversion:** 11 MB copied
    - **Total intermediate memory:** 22 MB
    - **Ideal transfer time at 50 GB/s:** 22 MB / 50 GB/s = 0.44 ms
    - **Actual time with non-contiguous cache misses (20-30x penalty):** **10-12 ms**
    - **Channels-last savings:** Drops memory time back to **~1-2 ms**
