title: Jank Analysis in Tensor G3 Camera Pipeline
scenario: You are analyzing a real-time camera translation pipeline running at 30 FPS (33.3ms budget) on a device with a Google Tensor G3 chip. The pipeline consists of CPU pre-processing (10ms) and text extraction using Gemini Nano on the on-device TPU (15ms inference). Despite the raw compute time being 25ms, the system frequently drops frames and causes UI jank.
question: Why is the 33.3ms frame budget being missed, considering the shared memory architecture?
details:
  realistic_solution: |
    The missed deadlines are caused by the CPU-TPU handoff overhead. Passing a processed frame from the CPU to the TPU requires cache flushes, memory barriers, and TPU driver scheduling. This synchronization overhead adds non-deterministic latency that consumes the 8.3ms buffer, pushing the total execution time past the 33.3ms deadline.
  common_mistake: |
    **The Pitfall:** Assuming compute times fit well within the budget without considering system overhead.
    **The Rationale:** Candidates often just add the compute times (10ms + 15ms = 25ms) and miss the latency introduced by memory synchronization, cache flushing, and OS scheduling.
    **The Consequence:** They fail to identify the true bottleneck and propose ineffective compute optimizations.
  napkin_math: |
    - Frame budget at 30 FPS = 33.3ms.
    - Total raw compute = 10ms (CPU) + 15ms (TPU) = 25ms.
    - Margin for overhead = 33.3ms - 25ms = 8.3ms.
    - The software overhead for context switching, CPU cache invalidation, and waking the TPU block often takes 5-10ms.
    - **If this handoff takes 9ms, total time becomes 25ms + 9ms = 34ms > 33.3ms, resulting in dropped frames.**
