title: On-Device Dataset Curation for Bias Mitigation on Snapdragon 8 Gen 3
scenario: Your team is developing a real-time, on-device object detection model for
  a new mobile application, deployed on devices powered by the Snapdragon 8 Gen 3
  Hexagon NPU (45 TOPS INT8, 12-16 GB LPDDR5X). The model's initial performance is
  excellent in well-lit, urban environments but shows significant degradation in low-light
  conditions and rural settings, indicating a severe dataset bias. You are tasked
  with designing a comprehensive dataset curation strategy to mitigate this bias,
  ensure robust performance across diverse real-world scenarios, and scale annotation
  workflows globally. How would you leverage the NPU's capabilities for data selection,
  implement active learning for edge cases, and establish robust inter-annotator agreement
  processes, all while managing annotation costs and user privacy concerns for a global
  application?
question: How would you use Snapdragon NPU active learning and annotation workflows
  to mitigate low-light and rural detection bias?
details:
  realistic_solution: 'Implement a closed-loop active learning pipeline: deploy a
    lightweight ''uncertainty'' model or anomaly detection on the Snapdragon NPU (leveraging
    its 45 TOPS INT8) to identify and prioritize challenging or out-of-distribution
    samples directly from user devices. Develop a federated learning-inspired data
    selection mechanism to securely aggregate privacy-preserving metadata (e.g., inference
    confidence, environmental telemetry) without raw data transfer. Establish a multi-stage
    annotation workflow with clear guidelines, frequent inter-annotator agreement
    checks (e.g., Fleiss'' Kappa for multi-class bounding box annotations), and a
    continuous feedback loop to refine annotation standards. Focus initial annotation
    efforts on the high-priority, NPU-identified biased samples.'
  common_mistake: A common mistake is to ignore the on-device inference characteristics
    and simply collect more 'diverse' data without targeted selection or active learning.
    This leads to inefficient annotation spend on redundant samples and persistent
    performance gaps on critical edge cases specific to the NPU's operational environment,
    rather than systematically addressing the observed bias.
  napkin_math: If your NPU can process 45 TOPS INT8 and an object detection inference
    takes 200 GOPS, you can run roughly (45 * 10^12) / (200 * 10^9) = 225 inferences
    per second. If you monitor 1 million active devices, and each device contributes
    100 'uncertain' frames per day, that's 100 million frames/day. If 0.1% of these
    are deemed high-value for annotation, you need to label 100,000 frames daily.
    At an average cost of $0.50 per frame, this implies a daily annotation budget
    of $50,000, underscoring the necessity for highly efficient active learning selection
    to remain cost-effective and scalable.
