title: The Mobile UI Jank Budget
scenario: You're an engineer on a mobile AI team implementing a new on-device generative feature. To maintain
  a smooth 60 FPS user experience and avoid UI 'jank', what is the approximate latency budget for a single
  inference call that needs to run on the main thread before the next frame is drawn?
details:
  realistic_solution: The latency budget is approximately 16ms. A mobile device display running at a 60Hz
    refresh rate draws a new frame every 1/60th of a second. If an inference task blocks the main UI thread
    for longer than this, the system misses its deadline to prepare the next frame, resulting in visible
    stutter or 'jank'.
  common_mistake: Engineers accustomed to cloud environments often misjudge mobile latency constraints.
    They might think 100ms is a fast response time, but on mobile, anything over 16ms can cause the UI
    to drop frames and feel unresponsive. Another common error is confusing the 60 FPS UI budget (~16ms)
    with the 30 FPS budget (~33ms) common in gaming.
  napkin_math: '1. Frame Time Limit: To maintain a smooth 60 FPS UI without jank, each frame must render
    in exactly 1000ms / 60 = 16.67ms. 2. Overhead: Assume OS rendering and app logic consume ~6.67ms.
    3. Inference Budget: This leaves a strict latency budget of 16.67ms - 6.67ms = 10ms for the on-device
    generative model inference. 4. Hardware requirement: The NPU must complete the forward pass within
    10ms.'
  options:
  - ~1 ms
  - ~16 ms
  - ~33 ms
  - ~100 ms
  correct_index: 1
