title: The Mobile UI Jank Budget
scenario: You're an engineer on a mobile AI team implementing a new on-device generative feature.
question: "To maintain a smooth 60 FPS user experience and avoid UI 'jank', what is the approximate latency budget for a single inference call that needs to run on the main thread before the next frame is drawn?"
details:
  realistic_solution: 'The latency budget is approximately 16ms. A mobile device display running at a 60Hz refresh rate draws a new frame every 1/60th of a second.'
  common_mistake: |
    **The Pitfall:** Overestimating allowable latency on mobile.
    **The Rationale:** Engineers accustomed to cloud environments often think 100ms is a "fast" response time, ignoring how displays actually render.
    **The Consequence:** The ML task overshoots the frame boundary, causing the UI to drop frames and feel extremely unresponsive to the user.
  napkin_math: |
    - **Frame Duration:** To maintain 60 FPS, a frame must render in 1000ms / 60 = 16.67ms.
    - **Overhead:** OS rendering and app logic consume ~6ms.
    - **Final Result:** The hard budget for the inference call is **~10-16 ms**.
  options:
  - ~1 ms
  - ~16 ms
  - ~33 ms
  - ~100 ms
  correct_index: 1
