title: CI/CD Hardware Fallback on Tensor G3
scenario: Your automated ML CI/CD pipeline deploys nightly builds of an on-device LLM to Android devices. An architecture update passed all server-side accuracy metrics but caused a severe latency regression on the Google Tensor G3. Profiling reveals an unsupported activation function caused the Edge TPU to fall back to the CPU.
question: How should CI/CD catch Tensor G3 TPU fallbacks before release, and what is the latency cost of this failure?
details:
  realistic_solution: Integrate the Edge TPU compiler into the CI/CD pipeline to fail builds if CPU fallbacks are detected before registering the model. Replacing the unsupported op ensures the 2B parameter model stays entirely on the TPU, leveraging its 7.5 TOPS and the 12 GB LPDDR5X memory efficiently without costly context switches.
  common_mistake: |
    **The Pitfall:** Suggesting changing the activation function without fixing the MLOps pipeline to include hardware-in-the-loop (HITL) compilation checks.
    **The Rationale:** Engineers treat the symptom (the unsupported op) instead of the systemic failure (the pipeline pushing uncompiled hardware fallbacks).
    **The Consequence:** The exact same latency regression will happen again on the next architecture update.
  napkin_math: |
    1. **Pure TPU Compute:** 4 GFLOPs / 7.5 TOPS = ~0.53 ms per token.
    2. **CPU Fallback Penalty:** Transferring a 2MB tensor takes ~0.03 ms, but CPU compute overhead adds ~5 ms per token.
    3. **Total per Token:** ~5.5 ms.
    4. **Response Latency (200 tokens):** Pure TPU = ~106 ms. CPU Fallback = **1,100 ms (1.1 seconds)**.
