title: Graceful Degradation for On-Device ML on Apple A17 Pro
scenario: You are designing an on-device machine learning system for a flagship mobile application running on a device with a 35 TOPS Neural Engine and a ~5W power budget. The application leverages multiple ML models for real-time video analysis (object detection, segmentation), natural language understanding, and computational photography. Your primary goal is to ensure core functionalities remain responsive and reliable even under adverse conditions such as prolonged heavy usage leading to thermal throttling, low battery states, or sudden peaks in computational demand.
question: "How would you design a graceful degradation strategy for this system, detailing degradation ladders, model fallbacks, and QoS shedding?"
details:
  realistic_solution: 'Implement a multi-tiered degradation ladder based on continuous
    monitoring of device state (temperature, battery level, Neural Engine utilization,
    available memory). Establish a hierarchy of models for each ML task: a high-fidelity/high-TOPS
    model, a medium-fidelity/medium-TOPS model, and a low-fidelity/highly-optimized
    model (or even a heuristic fallback). Use quality-of-service (QoS) shedding to
    dynamically reduce inference frequency, batch sizes, or disable less critical
    features. For critical functionalities (e.g., safety features), prioritize fail-operational
    modes, perhaps by switching to the lowest-power, minimal-accuracy model. Leverage
    the 8GB unified memory by optimizing model quantization (e.g., 8-bit
    integer inference) to reduce memory pressure and improve Neural Engine efficiency.
    Integrate a dynamic power/TOPS budget manager that adjusts model selection and
    inference parameters to stay within real-time thermal and power limits, potentially
    utilizing CPU/GPU fallbacks only for extreme edge cases where the Neural Engine
    is unavailable or insufficient.'
  common_mistake: |
    **The Pitfall:** Designing a rigid system without dynamic adaptation.
    **The Rationale:** Candidates often only consider accuracy-based model fallbacks without linking them quantitatively to specific hardware constraints like TOPS or memory bandwidth.
    **The Consequence:** The resulting solutions are either overly aggressive (unnecessarily disabling features) or fail to maintain critical QoS during thermal or power degradation.
  napkin_math: |
    - Neural Engine: 35 TOPS, ~5W budget (Efficiency: ~7 TOPS/W).
    - **Scenario 1: Peak Demand**
    - Desired TOPS: 18 (Object) + 12 (NLP) + 10 (Photo) = 40 TOPS (Exceeds max).
    - QoS shedding: Reduce photography to 5 TOPS. Total = 35 TOPS (5W).
    - **Scenario 2: Thermal Throttling**
    - Available TOPS drops to 50% (17.5 TOPS).
    - Degradation: Switch to medium-res Object (8 TOPS) + simplified NLP (5 TOPS) + disable Photo (0 TOPS).
    - Total consumed: 13 TOPS.
    - Power consumed: 13 TOPS / 7 TOPS/W ≈ **1.85W** (Safely within reduced budget).
