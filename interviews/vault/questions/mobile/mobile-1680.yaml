title: Graceful Degradation for On-Device ML on Apple A17 Pro
scenario: You are designing an on-device machine learning system for a flagship mobile application. The application leverages multiple ML models for real-time video analysis, natural language understanding, and computational photography. Your primary goal is to ensure core functionalities remain responsive and reliable even under adverse conditions such as prolonged heavy usage.
question: How would you design a graceful degradation strategy for this system, detailing degradation ladders, model fallbacks, and QoS shedding?
details:
  realistic_solution: 'Implement a multi-tiered degradation ladder based on continuous monitoring of device state (temperature, battery level, NPU utilization, available memory). Establish a hierarchy of models for each ML task: a high-fidelity/high-TOPS model, a medium-fidelity/medium-TOPS model, and a low-fidelity/highly-optimized model (or even a heuristic fallback). Use quality-of-service (QoS) shedding to dynamically reduce inference frequency, batch sizes, or disable less critical features. For critical functionalities, prioritize fail-operational modes, perhaps by switching to the lowest-power model. Leverage shared memory by optimizing model quantization to reduce memory pressure. Integrate a dynamic power/TOPS budget manager that adjusts parameters to stay within thermal limits.'
  common_mistake: |
    **The Pitfall:** Designing a rigid system without dynamic adaptation.
    **The Rationale:** Candidates often only consider accuracy-based model fallbacks without linking them quantitatively to specific hardware constraints like TOPS or memory bandwidth.
    **The Consequence:** The resulting solutions are either overly aggressive (unnecessarily disabling features) or fail to maintain critical QoS during thermal or power degradation.
  napkin_math: |
    **Assumptions & Constraints:**
    - NPU limits: 35 TOPS max, ~5W thermal budget (Efficiency: ~7 TOPS/W).
    - Degradation threshold: Thermal throttling drops compute to 50% (17.5 TOPS).

    **Calculations:**
    - Peak Demand: 18 TOPS (Object) + 12 TOPS (NLP) + 10 TOPS (Photo) = 40 TOPS (Exceeds max, triggers QoS shed to 35).
    - Throttled Scenario (17.5 TOPS available): Switch to medium Object (8 TOPS) + simple NLP (5 TOPS) + disable Photo (0 TOPS) = 13 TOPS.
    - Throttled Power: 13 TOPS / 7 TOPS/W \u2248 1.85 W.

    **Conclusion & Interpretation:**
    - **Result: Compute-Bound.** Downgrading model precision and disabling secondary features maintains QoS at ~1.85W, avoiding thermal failure.
