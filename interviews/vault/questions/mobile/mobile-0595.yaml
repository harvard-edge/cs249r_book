title: The CPU-GPU Asynchronous Desync
scenario: Your mobile app applies an ML filter to a live video feed. The camera produces frames at 30 FPS. The GPU runs the ML filter in 20ms. The CPU submits the job to the GPU, waits for it to finish using `glFinish()`, and then renders it to the screen. You notice the framerate is only 22 FPS, even though 20ms is well under the 33ms deadline.
question: What pipeline rule did you break?
details:
  realistic_solution: |
    You broke the pipeline by forcing Synchronous Execution (`glFinish()`). This call violently blocks the CPU until the GPU has completely drained its pipeline, destroying concurrency. Instead of double-buffering, the CPU idles for the entire GPU execution. Furthermore, the synchronization boundary forces alignment with display vsync, adding dead time. The fix is asynchronous double-buffered submission.
  common_mistake: |
    **The Pitfall:** Assuming `glFinish()` is required for correctness.
    **The Rationale:** Candidates incorrectly believe they must explicitly stall the CPU to prevent tearing, failing to understand that graphics APIs manage asynchronous fences inherently.
    **The Consequence:** The entire pipeline becomes serialized, drastically reducing throughput and turning a 50 FPS theoretical pipeline into 22 FPS.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - CPU submit/postprocess: 5ms + 5ms = 10ms.
       - GPU ML filter: 20ms.
       - Vsync alignment penalty (due to forced stall): ~15ms.
    2. **Calculations:**
       - Serialized (glFinish): 5ms (CPU prep) + 20ms (GPU) + 5ms (CPU render) + 15ms (vsync alignment) = 45ms per frame.
       - Framerate: 1000ms / 45ms = ~22.2 FPS.
       - Asynchronous (Double-buffered): Effective time is max(CPU, GPU) = max(10ms, 20ms) = 20ms per frame.
       - Max Async Framerate: 1000 / 20ms = 50 FPS (capped at screen refresh).
    3. **Conclusion & Interpretation:**
       - **Serialization causes frames to take 45ms (22 FPS). Bottleneck: Concurrency/Synchronization Overhead.**
