title: A17 Pro ISP to NPU Pipeline
scenario: An Apple A17 Pro Neural Engine (35 TOPS) runs segmentation on 4K 60fps video. The image signal processor (ISP) writes 12 MB raw frames to memory, taking 2 ms. The NPU requires 3 ms to read and process.
question: Determine the maximum achievable frame rate if the ISP and NPU execute sequentially without pipelining.
visual:
  kind: svg
  path: mobile-1979.svg
  alt: Throughput bar chart showing 2ms ISP write followed by 3ms NPU read.
  caption: Sequential data pipeline latency stages.
details:
  realistic_solution: |
    Sequential execution means each frame takes 2 ms (ISP) + 3 ms (NPU) = 5 ms. Maximum throughput is 1000 ms / 5 ms = 200 frames per second. Even though 60fps is requested, the system can easily handle it.
  common_mistake: |
    **The Pitfall:** Assuming parallel pipelined execution.
    **The Rationale:** Candidates divide 1000 by the max latency stage (3ms -> 333fps) despite the prompt specifying sequential processing.
    **The Consequence:** Overestimating throughput capabilities and designing broken timing budgets.
  napkin_math: |
    - **Sequential Latency:** 2 ms (ISP) + 3 ms (NPU) = 5 ms per frame.
    - **Max Throughput:** 1000 ms / 5 ms = 200 fps.
    - **Result:** **200 frames per second.**
