title: A17 Pro ISP to NPU Pipeline
scenario: An edge pipeline runs segmentation on 4K video. The image signal processor (ISP) writes 12 MB raw frames to memory, taking 2 ms. The NPU requires 3 ms to read and process.
question: Determine the maximum achievable frame rate if the ISP and NPU execute sequentially without pipelining.
visual:
  kind: svg
  path: mobile-1979.svg
  alt: Throughput bar chart showing 2ms ISP write followed by 3ms NPU read.
  caption: Sequential data pipeline latency stages.
details:
  realistic_solution: |
    Strictly sequential execution mandates that each stage completes fully before the next begins. Therefore, each single frame requires 2 ms (ISP write) + 3 ms (NPU read/compute) = 5 ms of absolute wall-clock time. The maximum possible throughput is simply the mathematical inverse of this total latency: 1000 ms / 5 ms = 200 frames per second. Even without complex asynchronous pipelining, the system easily fulfills a 60 FPS budget.
  common_mistake: |
    **The Pitfall:** Incorrectly applying pipeline parallelism math to a strictly sequential system.
    **The Rationale:** Candidates see multiple components and instinctively divide 1000ms by the maximum single bottleneck stage (3ms -> 333fps), completely ignoring the prompt's constraint that the stages run sequentially.
    **The Consequence:** Overestimating system throughput capabilities, leading to dropped frames when deployed to hardware lacking parallel DMAs.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Execution Model: Strictly sequential (ISP stage -> NPU stage).
       - ISP write latency: 2 ms.
       - NPU read & compute latency: 3 ms.
    2. **Calculations:**
       - Total Latency per Frame: 2 ms + 3 ms = 5 ms.
       - Maximum Throughput: 1000 ms / 5 ms = 200 FPS.
    3. **Conclusion & Interpretation:**
       **Result: 200 FPS maximum (Latency-Bound).** Sequential timing dictates throughput is the strict sum of stages, not the max of the bottleneck.
