title: Adversarial Randomized Smoothing Latency on A17 Pro
scenario: You are deploying a sensitive document detection model on an iPhone using the Apple A17 Pro
  Neural Engine. To defend against adversarial patch attacks, you implement a randomized smoothing technique
  that runs inference 10 times on randomly augmented variations of each input frame. Given the base model
  requires 700 GOPS per inference, calculate the theoretical maximum robust frames per second (FPS) and
  the energy consumed per robust prediction, assuming the 16-core Neural Engine runs at 100% utilization
  delivering 35 TOPS at a continuous ~5W power draw.
details:
  realistic_solution: The candidate should calculate the total operations for a single robust prediction
    by multiplying the base model operations by the number of smoothing iterations. They then use the
    peak throughput of the A17 Pro to determine the robust FPS. Finally, dividing the total power draw
    by the FPS yields the energy consumed per prediction.
  common_mistake: Candidates often forget to account for the 10x inference multiplier required by randomized
    smoothing, or they miscalculate the unit conversions between GOPS and TOPS. They may also struggle
    to relate power (Watts) to energy per inference (Joules).
  napkin_math: 'Base model operations: 700 GOPS = 0.7 TOPS. Total operations per robust prediction = 10
    inferences * 0.7 TOPS = 7 TOPS. Theoretical maximum robust FPS = 35 TOPS (Neural Engine limit) / 7
    TOPS per robust prediction = 5 FPS. Energy per robust prediction = 5W (Joules/sec) / 5 FPS = 1 Joule
    per robust prediction.'
