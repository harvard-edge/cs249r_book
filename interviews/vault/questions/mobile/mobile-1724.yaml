title: On-Device Rare Class Data Curation for Snapdragon NPU
scenario: Your team is developing an on-device computer vision feature for real-time anomaly detection. The current model performs poorly on rare categories due to class imbalance. You estimate needing 5,000 additional high-quality annotated instances to achieve a 10% improvement.
question: "How many expert annotation person-hours are needed to collect 5,000 rare-class instances at 30 seconds per image?"
details:
  realistic_solution: Implement an active learning pipeline utilizing model uncertainty to surfacing high-value instances. Establish inter-annotator agreement (e.g., Cohen's Kappa) and factor in the raw human-in-the-loop time bottlenecks required for expert data curation.
  common_mistake: |
    **The Pitfall:** Underestimating the manual labor and cost of rare-class data curation.
    **The Rationale:** Teams often assume active learning magically generates labels, ignoring the human-in-the-loop bottleneck.
    **The Consequence:** Project timelines slip massively because expert annotation hours were not budgeted.
  napkin_math: |
    **Assumptions & Constraints:**
    - Required instances: 5,000.
    - Annotation time: 30 seconds/image.
    
    **Calculations:**
    - Total Time: 5,000 * 30 seconds = 150,000 seconds.
    - Minutes: 150,000 / 60 = 2,500 minutes.
    - Hours: 2,500 / 60 = 41.67 hours.
    
    **Conclusion & Interpretation:**
    - **Result: Human-Bound**. Requires roughly 42 dedicated person-hours of expert annotation, a significant pipeline bottleneck.
