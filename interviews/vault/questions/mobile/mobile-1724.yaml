title: On-Device Rare Class Data Curation for Snapdragon NPU
scenario: Your team is developing an on-device computer vision feature for a flagship smartphone, leveraging the Snapdragon 8 Gen 3 Hexagon NPU's capabilities (45 TOPS INT8, 12-16 GB LPDDR5X). You are responsible for ensuring the robustness of an object detection model identifying rare environmental anomalies (e.g., specific types of industrial waste) in real-time. The current model performs poorly on these rare categories due to severe class imbalance, and you estimate needing 5,000 additional high-quality annotated instances to achieve a target 10% improvement.
question: "How many expert annotation person-hours are needed to collect 5,000 rare-class instances at 30 seconds per image?"
details:
  realistic_solution: 'Implement a phased active learning approach: initially, use model uncertainty or diversity sampling to select batches of unlabelled data. Prioritize these for expert annotation. Establish strict, detailed annotation guidelines and conduct regular calibration sessions with annotators. Utilize inter-annotator agreement metrics (e.g., Kappa score) to monitor quality and provide feedback. For efficiency, consider semi-automated annotation tools or pre-labeling by a weaker model where appropriate, followed by human review. Finally, iterate on the model training and data curation strategy based on performance metrics on a held-out validation set.'
  common_mistake: |
    **The Pitfall:** Underestimating the manual labor and cost of rare-class data curation.
    **The Rationale:** Teams often assume active learning magically generates labels, ignoring the human-in-the-loop bottleneck.
    **The Consequence:** Project timelines slip massively because expert annotation hours were not budgeted.
  napkin_math: |
    - **Total Time:** 5,000 instances * 30 seconds/instance = **150,000 seconds**.
    - **Minutes:** 150,000 / 60 = **2,500 minutes**.
    - **Hours:** 2,500 / 60 = **41.67 hours**.
    - **Conclusion:** Requires roughly 42 dedicated person-hours of expert annotation.
