title: On-Device Rare Class Data Curation for Snapdragon NPU
scenario: Your team is developing an on-device computer vision feature for a flagship
  smartphone, leveraging the Snapdragon 8 Gen 3 Hexagon NPU's capabilities (45 TOPS
  INT8, 12-16 GB LPDDR5X). You are responsible for ensuring the robustness of an object
  detection model identifying rare environmental anomalies (e.g., specific types of
  industrial waste) in real-time. The current model, trained on a large public dataset,
  performs poorly on these rare categories due to severe class imbalance. You've decided
  to implement an active learning strategy for dataset curation to collect more relevant
  examples. If collecting and annotating a single image with such rare objects takes,
  on average, 30 seconds for an expert annotator, and you estimate needing 5,000 additional
  high-quality annotated instances to achieve a target 10% improvement in detection
  accuracy for this rare class, how many person-hours would be required for this specific
  data curation effort?
question: How many expert annotation person-hours are needed to collect 5,000 rare-class
  instances at 30 seconds per image?
details:
  realistic_solution: 'Implement a phased active learning approach: initially, use
    model uncertainty or diversity sampling to select batches of unlabelled data.
    Prioritize these for expert annotation. Establish strict, detailed annotation
    guidelines and conduct regular calibration sessions with annotators. Utilize inter-annotator
    agreement metrics (e.g., Kappa score) to monitor quality and provide feedback.
    For efficiency, consider semi-automated annotation tools or pre-labeling by a
    weaker model where appropriate, followed by human review. Finally, iterate on
    the model training and data curation strategy based on performance metrics on
    a held-out validation set.'
  common_mistake: Overlooking the long-tail problem in datasets and underestimating
    the cost and complexity of curating data for rare classes. Another common mistake
    is failing to establish clear annotation guidelines, leading to low inter-annotator
    agreement and inconsistent data quality, which can negate the benefits of adding
    more data.
  napkin_math: 'Total annotation time = 5,000 instances * 30 seconds/instance = 150,000
    seconds.

    Convert to minutes: 150,000 seconds / 60 seconds/minute = 2,500 minutes.

    Convert to hours: 2,500 minutes / 60 minutes/hour = 41.67 hours. So, approximately
    42 person-hours.'
