title: Exynos 2400 NPU Telemetry and Straggler Detection System
scenario: You are tasked with designing a robust on-device telemetry and monitoring system for a real-time
  video processing model deployed on the Samsung Exynos 2400 NPU. The application runs continuously, utilizing
  the dual-core NPU with its 34.7 TOPS capacity, while sharing the 12 GB LPDDR5X memory with the CPU,
  GPU, and ISP. The system must accurately detect thermal throttling and memory bandwidth contention (stragglers)
  without causing unacceptable profiling overhead, and must define an efficient strategy for reporting
  production health to the backend.
question: "How should Exynos 2400 telemetry detect thermal throttling and memory stragglers with low reporting overhead?"
details:
  realistic_solution: A strong design aggregates telemetry on-device using a lightweight daemon that hooks
    into OS-level hardware performance counters. It calculates p90/p99 latency percentiles and tracks
    NPU core utilization over 1-minute rolling windows. To detect stragglers accurately, the system correlates
    NPU execution delays with concurrent memory access spikes from the ISP/GPU in the shared 12 GB LPDDR5X
    pool. Alerts and compact histograms are batched and uploaded only during optimal radio conditions
    or when significant anomalies are detected.
  common_mistake: Candidates often propose streaming raw inference latencies or high-frequency polling
    mechanisms to the backend, which severely degrades battery life. They also frequently fail to account
    for the unified memory architecture, misattributing latency spikes to NPU thermal throttling when
    they are actually caused by ISP/GPU memory bandwidth contention.
  napkin_math: Running telemetry for a 30 FPS video stream generates 30 events/sec. At 32 bytes per raw
    event, this yields ~3.4 MB/hour of raw data. By aggregating this on-device into 1-minute summaries
    containing p50, p90, p99 latencies (12 bytes), NPU utilization % (4 bytes), and peak memory bandwidth
    usage out of the shared 12 GB LPDDR5X pool (4 bytes), the payload becomes 20 bytes/minute. This reduces
    the hourly data transmission from 3.4 MB to just 1.2 KB, massively minimizing radio wake-up costs
    while maintaining full system observability.
