title: The JNI Boundary Crossing
scenario: You write a highly optimized C++ inference engine using XNNPACK for Android. Your Java app calls
  `runInference(float[] image)` natively via JNI. The C++ code executes in 5ms. However, the app measures
  18ms per frame. What is JNI doing that consumes 13ms of overhead?
question: "What is JNI doing that consumes 13ms of overhead?"
details:
  realistic_solution: 'JNI''s GetByteArrayElements copies the entire Java byte array into native memory
    (6.2 MB for 1080p). After inference, results are copied back via SetByteArrayRegion. Two 6.2 MB memcpy
    operations on a mobile CPU at ~2 GB/s take ~6ms each, totaling ~12ms. Add JNI call overhead and GC
    pressure from pinning: 13ms total. Fix: use a DirectByteBuffer (zero-copy — Java and C++ share the
    same memory pointer), or allocate a persistent native buffer via Android''s HardwareBuffer/AHardwareBuffer.
    This eliminates both copies, reducing overhead from 13ms to <0.5ms.'
  common_mistake: '"JNI function calls are just slow." The function call itself takes microseconds. The
    massive overhead comes from data marshaling.'
  napkin_math: 1080p RGB = 1920*1080*3 = 6.2MB. JNI array copy requires reading and writing. 6.2MB * 2
    (read+write) = 12.4MB. Across two boundaries (in/out) = 24.8MB. On Cortex-X4 (~30GB/s memcpy), that's
    ~0.8ms ideal, but cache misses and JNI pinning overhead drag this to 10-13ms. Zero-copy DirectByteBuffer
    is required.
