title: The JNI Boundary Crossing
scenario: You write a highly optimized C++ inference engine using XNNPACK for Android. Your Java app calls `runInference(float[] image)` natively via JNI. The C++ code executes in 5ms. However, the app measures 18ms per frame.
question: What is JNI doing that consumes 13ms of overhead?
details:
  realistic_solution: JNI's `GetByteArrayElements` implicitly copies the entire Java byte array into native memory (6.2 MB for 1080p). After inference, results are copied back. Two 6.2 MB memcpy operations on a mobile CPU cache architecture take ~12ms, plus JNI GC pinning overhead. The systemic fix utilizes a `DirectByteBuffer` for zero-copy memory sharing, or allocates a persistent `AHardwareBuffer`, eliminating the massive memory movement and dropping overhead to <0.5ms.
  common_mistake: |
    **The Pitfall:** Blaming JNI function call overhead instead of memory marshalling.
    **The Rationale:** Developers assume crossing the Java/native boundary is fundamentally slow due to context switching.
    **The Consequence:** They spend time optimizing function arguments rather than addressing the massive 24.8 MB memory copy operation, which is easily solved by using zero-copy buffers.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 1080p RGB image size: 1920 * 1080 * 3 bytes ≈ 6.22 MB.
       - JNI copies data in and out of native heap.
    2. **Calculations:**
       - JNI array copy requires reading and writing (in and out): 6.22 MB * 2 = 12.44 MB per copy.
       - Total data moved across boundaries: 12.44 MB * 2 = 24.88 MB.
    3. **Conclusion & Interpretation:**
       - **Result: 24.88 MB memcpy.** The 13ms overhead is entirely **Memory-Bandwidth-Bound** due to redundant data marshalling.
