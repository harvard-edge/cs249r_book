title: Analyzing Compound AI Pipeline Thermal Throttling on Snapdragon 8 Gen 3
scenario: A Snapdragon 8 Gen 3 (45 TOPS, 16GB) device runs a compound AI pipeline: camera embedding (5ms, 2W), semantic search (8ms, 1W), and on-device LLM (300ms, 12W). After 90 seconds of continuous use, the device throttles: LLM inference slows from 300ms to 480ms, embedding slows from 5ms to 9ms.
question: How would you analyze the thermal contribution of each pipeline stage and determine which stage to optimize first to recover performance?
details:
  realistic_solution: 'Analyze thermal energy per second: LLM: 12W * (300ms/query) * (queries/s). If 2 queries/s: 12 * 0.3 * 2 = 7.2W continuous. Embedding: 2W * (5ms/embed) * (10 embeds/s for camera stream at 2fps) = 2 * 0.005 * 2... recalc at 30fps: 2W * 0.005s * 30fps = 0.3W continuous. LLM dominates at 7.2W. Primary optimization: reduce LLM power via CPU power cap and INT4 quantization. INT4 reduces compute per token, but LLM is memory-bound on mobile — bandwidth reduction from INT4 cuts power ~30%: 12W → 8.4W, reducing throttle trigger time from 90s to ~135s.'
  common_mistake: |
    **The Pitfall:** Automatically optimizing the slowest stage (LLM) without calculating its time-averaged thermal contribution.
    **The Rationale:** Engineers assume the highest latency component must be the worst thermal offender, forgetting that a fast but highly frequent component (like a 30fps camera embedding) could dominate the power budget.
    **The Consequence:** Wasting engineering effort optimizing a low-impact stage while the system continues to violently thermal throttle.
  napkin_math: |
    - **LLM Thermal Load:** 12W * (300ms * 2 queries/s) = 7.2W.
    - **Embedding Thermal Load:** 2W * (5ms * 30 fps) = 0.3W.
    - **Search Thermal Load:** 1W * (8ms * 2 queries/s) = 0.016W.
    - **Total Active Power:** 7.2W + 0.3W + 0.016W = ~7.52W.
    - **Throttling Budget:** The SoC sustained passive cooling budget is ~4W. At 7.52W, the device hits its thermal cap in ~90s and downclocks all components (1.6x latency increase).
    - **Conclusion:** The LLM contributes 95% of the heat. By applying INT4 quantization to reduce memory bandwidth power, LLM power drops to ~8.4W, significantly delaying or reducing the severity of the throttle.
