title: The Adaptive Power Maestro
scenario: For a critical real-time ML feature (e.g., video stabilization using optical flow) on a mobile
  device, you need to guarantee a minimum inference rate (e.g., 30 FPS) while simultaneously minimizing
  average power consumption. The computational load can vary significantly depending on scene complexity.
  How would you design a system to dynamically adapt the SoC's operating parameters to meet both the performance
  and power constraints?
question: "How would you design a system to dynamically adapt the SoC's operating parameters to meet both the performance and power constraints?"
details:
  realistic_solution: "This requires a sophisticated **Dynamic Voltage and Frequency Scaling (DVFS)**\
    \ strategy, potentially combined with adaptive workload management:\n  1.  **Performance Monitoring\
    \ Loop:** Continuously monitor the actual inference latency (and thus FPS) of the ML model.\n  2.\
    \  **Predictive Workload Estimation:** Estimate the complexity of the current frame/scene. For optical\
    \ flow, this might involve analyzing motion vectors, texture richness, or simply using the previous\
    \ frame's inference time as a predictor for the next.\n  3.  **DVFS Governor Interaction:**\n    \
    \  *   **Target-based Control:** Instead of fixed frequencies, aim for a target latency. If current\
    \ latency is too high, request a higher frequency/voltage for the NPU/GPU. If latency is well below\
    \ the target, request a lower frequency/voltage.\n      *   **OS Scheduler Hints:** Utilize platform-specific\
    \ APIs (e.g., Android `PerformanceHintManager`, `cpu_boost` sysfs interface) to communicate the performance\
    \ requirements to the OS's CPU/NPU governors. The OS can then adjust DVFS and scheduling priorities.\n\
    \      *   **Custom Governor (if available/necessary):** For highly specialized scenarios, a custom\
    \ user-space governor could be implemented (often requires root/privileged access or kernel modifications,\
    \ less common for app developers).\n  4.  **Thermal Feedback:** Integrate thermal sensor readings.\
    \ If the device is approaching thermal limits, prioritize frequency reduction over performance to\
    \ prevent throttling, possibly degrading gracefully (e.g., dropping to 25 FPS instead of 30 FPS).\n\
    \  5.  **Power-Performance Curves:** Characterize the NPU/GPU's power consumption at different frequency/voltage\
    \ points for your specific workload. This allows for intelligent decisions: for example, if 80% of\
    \ max frequency gives 95% of max performance but only 60% of max power, it's a sweet spot.\n  6. \
    \ **Adaptive Batching/Model Switching:** If the NPU can handle it, dynamically adjust batch size.\
    \ For very low scene complexity, switch to a lighter model variant; for high complexity, consider\
    \ temporarily increasing frequency or even offloading a portion to the CPU/GPU if latency is critical\
    \ and power budget allows.\n  7.  **Idle State Management:** Ensure the NPU/GPU quickly returns to\
    \ low-power idle states when no ML computation is active."
  common_mistake: '"Just set the NPU to max frequency." This guarantees performance but ignores power
    efficiency, leading to rapid battery drain and thermal throttling.'
  napkin_math: A mobile NPU might have frequency steps from 200MHz (0.1W) to 1.5GHz (3W). If the target
    is 30 FPS (33ms/frame) and a simple scene takes 10ms at 800MHz, the system can reduce frequency to
    ~400MHz, lowering power significantly while staying within the 33ms budget. If a complex scene takes
    25ms at 800MHz, it might need to boost to 1.2GHz to stay below 33ms, but this will consume more power.
    The goal is to find the lowest frequency that meets the target.
