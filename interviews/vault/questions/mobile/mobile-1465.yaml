title: Exynos 2400 Shared Memory Budgeting
scenario: We are deploying a 3B parameter conversational AI assistant locally on a smartphone powered by the Samsung Exynos 2400 NPU. The system features 12 GB of shared LPDDR5X memory, but system engineers have hard-capped the NPU allocation at 3.5 GB to prevent OS instability and background app eviction.
question: How should Exynos 2400 shared memory be allocated for a 3B LLM and its KV cache to support a 2048-token context?
details:
  realistic_solution: A strong candidate will rule out FP16 weights (which would take 6GB) and propose 4-bit weight quantization (e.g., AWQ/GPTQ) to compress the 3B model. They will calculate the KV-cache footprint at maximum context and size the activation buffers. Finally, they will evaluate the remaining headroom and suggest KV-cache quantization or sliding window attention if prefill memory threatens the 3.5 GB cap.
  common_mistake: |
    **The Pitfall:** Assuming the entire 12 GB LPDDR5X pool is available for the model.
    **The Rationale:** Failing to account for the shared memory architecture of mobile SoCs and the KV-cache growth.
    **The Consequence:** Proposing FP16 weights or insufficient KV cache sizing, leading to guaranteed Out-Of-Memory (OOM) crashes.
  napkin_math: |
    - Total NPU Budget: 3.5 GB.
    - Weights (INT4): 3B params * 0.5 bytes = 1.5 GB. With ~10% overhead = ~1.65 GB.
    - KV-Cache (FP16): 32 layers * 3072 dim * 2 (K&V) * 2 bytes = 393,216 bytes/token (384 KB).
    - Full 2048 Context: 384 KB * 2048 = 786,432 KB = 768 MB = ~0.75 GB.
    - Activations: ~400 MB (0.4 GB).
    - Total Peak Memory: 1.65 GB + 0.75 GB + 0.4 GB = 2.8 GB.
    - **Leaves ~700 MB of safety margin under the 3.5 GB cap.**
