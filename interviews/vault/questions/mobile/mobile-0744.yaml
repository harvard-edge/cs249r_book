title: The Burst Benchmarking Illusion
scenario: Your mobile model runs at 30 FPS during internal demos, but users complain that it slows down to 12 FPS after a minute of use.
question: Based on the performance timeline, what physical protection mechanism is engaging inside the smartphone?
details:
  realistic_solution: You are hitting the Sustained Thermal Envelope. Mobile SoCs support high TOPS only for short "bursts." For continuous inference, the device throttles to its sustained thermal design power (sTDP), often 40-60% of peak. The fix is to target sustained performance or implement adaptive frame rates.
  common_mistake: |
    **The Pitfall:** Concluding the phone is defective or needs active cooling.
    **The Rationale:** Engineers apply desktop heuristics where fans mitigate load, ignoring mobile thermal envelopes.
    **The Consequence:** Releasing a model that works for 60 seconds then degrades terribly in production.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Target frame rate: 30 FPS.
       - Sustained TOPS is ~50% of Peak.
    2. **Calculations:**
       - Sustained frame rate = 30 FPS * 0.50 = 15 FPS.
    3. **Conclusion & Interpretation:**
       - **Result: 15 FPS. Thermal-Bound.** DVFS throttling permanently degrades performance after 60 seconds.
