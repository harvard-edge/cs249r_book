title: The Burst Benchmarking Illusion
scenario: Your mobile model runs at 30 FPS during internal demos, but users complain that it slows down
  to 12 FPS after a minute of use. Based on the performance timeline, what physical protection mechanism
  is engaging inside the smartphone?
details:
  realistic_solution: You are hitting the **Sustained Thermal Envelope**. Mobile SoCs support high TOPS
    only for short "bursts." For continuous inference, the device throttles to its sustained thermal design
    power (sTDP), often 40-60% of peak. The fix is to target sustained performance (e.g., design for 20
    TOPS, not 45 TOPS peak), implement adaptive frame rates based on `ThermalState`, or use the NPU instead
    of the GPU to halve heat generation.
  common_mistake: '"The phone is defective" or "Add a cooling fan." You can''t attach a fan to a user''s
    phone. The phone is working exactly as designed — DVFS (Dynamic Voltage and Frequency Scaling) protects
    the SoC from thermal damage.'
  napkin_math: Sustained TOPS is typically ~50% of Peak. If your model requires 100% of peak TOPS to hit
    30 FPS, you are guaranteed to drop to 15 FPS once the thermal envelope is saturated (~60 seconds).
