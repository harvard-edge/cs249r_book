title: Designing KV-Cache for Exynos 2400 NPU Shared Memory
scenario: You are tasked with deploying a 7B parameter LLM for on-device summarization on a device featuring the Samsung Exynos 2400 NPU. The system provides 34.7 TOPS and relies on a unified 12 GB LPDDR5X memory pool. The mobile OS and background processes reserve 6 GB of this memory, and the 4-bit quantized model weights consume 3.5 GB.
question: How should Exynos 2400 manage a 4096-token KV cache for a 7B LLM without unified-memory OOM kills?
details:
  realistic_solution: A robust design uses a paged KV-cache with a dynamic memory ceiling tied to OS memory pressure signals. Since the Exynos 2400 shares its memory across all SoC components, the KV-cache should be allocated in small, non-contiguous pages (e.g., 16 tokens per block) to avoid fragmentation. Furthermore, an eviction policy (like Heavy Hitter Oracle or LRU) must be implemented to preemptively discard less critical tokens when the available memory buffer shrinks below a safe threshold.
  common_mistake: |
    **The Pitfall:** Allocating a single contiguous tensor for the maximum context length.
    **The Rationale:** Candidates assume the remaining memory can be statically dedicated without accounting for OS memory spikes.
    **The Consequence:** The unified 12 GB pool fragments, and the app is terminated by the OS when the ISP or GPU demands sudden allocations.
  napkin_math: |
    - Total Shared Memory = 12 GB.
    - Reserved for OS/Background = 6 GB. Model Weights = 3.5 GB.
    - Available for KV-cache and workspace = 12 - 6 - 3.5 = 2.5 GB.
    - 7B model (32 layers, 32 heads, 128 head dim) FP16 KV-cache for 1 token: 2 bytes * 2 * 32 * 32 * 128 = 0.5 MB.
    - 4096-token context = 4096 * 0.5 MB = 2.048 GB.
    - **This leaves only ~460 MB for the workspace and OS spikes, making dynamic paged allocation critical.**
