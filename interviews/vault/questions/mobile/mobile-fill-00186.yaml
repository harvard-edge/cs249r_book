title: On-Device LLM KV-Cache Optimization for Google Tensor G3
scenario: You are tasked with deploying a large language model (LLM) for an on-device AI assistant on
  a smartphone powered by the Google Tensor G3 chip. This chip features a 7.5 TOPS (INT8) on-device TPU
  and 12 GB LPDDR5X unified memory. The LLM needs to efficiently handle conversational contexts ranging
  from short queries to complex, multi-turn dialogues with varying lengths. Design a KV-cache management
  strategy that optimizes for inference performance and memory utilization under these specific hardware
  constraints. Consider how to mitigate memory pressure from long contexts and what eviction policies
  would be most suitable.
details:
  realistic_solution: A robust solution would involve implementing a paged attention mechanism to efficiently
    manage KV-cache memory as non-contiguous blocks, minimizing fragmentation. Employ an adaptive eviction
    policy (e.g., a variant of LFU or a utility-based approach that prioritizes tokens based on their
    predicted future relevance) rather than simple LRU. Further optimize by exploring aggressive quantization
    (e.g., INT4 or INT8) for the KV-cache entries themselves to significantly reduce memory footprint,
    carefully evaluating the performance-accuracy trade-off on the Tensor G3's TPU capabilities.
  common_mistake: A common mistake is to implement a naive, fixed-size KV-cache or a simple FIFO/LRU eviction
    policy without considering the specific LPDDR5X memory bandwidth limitations and the dynamic nature
    of conversational lengths. This often leads to excessive cache thrashing, frequent recomputation of
    KV pairs for older tokens, or out-of-memory errors on the 12 GB constraint, severely impacting user
    experience and responsiveness.
  napkin_math: Consider an LLM with 20 transformer layers, 24 attention heads, and a head dimension of
    96. If KV-cache entries are quantized to INT8 (1 byte per value), then for a single token, the KV-cache
    size is approximately `2 (K+V) * 20 (layers) * 24 (heads) * 96 (dim) * 1 (byte/value) = 92,160 bytes
    (~90 KB)`. For a target maximum context length of 4096 tokens, the total KV-cache could reach `4096
    tokens * 90 KB/token = 368,640 KB (~360 MB)`. While this might seem manageable for a single sequence,
    if the system needs to support 10 concurrent conversational contexts or background tasks, the KV-cache
    requirement alone would be `3.6 GB`, putting significant memory pressure on the 12 GB LPDDR5X, especially
    alongside model weights, OS, and other application data.
