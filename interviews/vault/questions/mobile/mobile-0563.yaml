title: The Predictive Charging TCO Dilemma
scenario: You are the ML Systems Engineer for a new 'Predictive Charging' feature in your company's EV companion app, which has 1 million users. The feature learns driving habits from on-device sensors. The product team has major privacy concerns about uploading raw user data.
question: Which predictive charging training approach is cheaper, and how does participation rate change the TCO calculation?
details:
  realistic_solution: |
    Calculate the total daily data transfer for each approach and multiply it over a year. The Federated Learning approach is significantly cheaper because even though each upload is larger, the total number of uploads is much smaller (e.g., 10% of the user base vs. 100%). This demonstrates a scenario where privacy-preserving techniques also yield significant bandwidth cost savings.
  common_mistake: |
    **The Pitfall:** Focusing only on payload size and ignoring participation rates.
    **The Rationale:** Engineers incorrectly conclude FL is more expensive because a 5MB model update is 5x larger than a 1MB raw data payload, ignoring that FL usually involves a fraction of the user base.
    **The Consequence:** Rejecting a privacy-preserving architecture based on a flawed total cost of ownership (TCO) calculation.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Total Users: 1,000,000
       - Centralized: 1 MB/day per user (100% participation)
       - Federated: 5 MB/day per user (10% participation = 100,000 users)
       - Transfer Cost: $0.09/GB
    2. **Calculations:**
       - Centralized Data: 1M * 1 MB = 1 TB/day = 365 TB/year
       - Centralized Cost: 365,000 GB * $0.09/GB = $32,850/year
       - Federated Data: 100K * 5 MB = 500 GB/day = 182.5 TB/year
       - Federated Cost: 182,500 GB * $0.09/GB = $16,425/year
       - Savings: $32,850 - $16,425 = $16,425
    3. **Conclusion & Interpretation:** **Federated Learning is ~$16,500 cheaper per year. Result: Network Transfer-Bound.**
  options:
  - Centralized is cheaper by ~$131,400 because FL uploads 5MB per user instead of 1MB.
  - Federated Learning is more expensive by ~$147,825 assuming 100% participation for 5MB uploads.
  - Federated Learning is cheaper by ~$16,425 because the 10% participation rate offsets the 5x larger payload.
  - Both approaches cost exactly $32,850 because bandwidth compresses model updates.
  correct_index: 2
