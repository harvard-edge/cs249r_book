title: The Predictive Charging TCO Dilemma
scenario: You are the ML Systems Engineer for a new 'Predictive Charging' feature in your company's EV companion app, which has 1 million users. The feature learns driving habits from on-device sensors to recommend optimal charging times. The product team has major privacy concerns about uploading raw user data.
question: Which predictive charging training approach is cheaper, and how does participation rate change the TCO calculation?
details:
  realistic_solution: The correct way to solve this is to calculate the total daily data transfer for each approach and multiply it over a year. The Federated Learning approach is significantly cheaper because even though each upload is larger, the total number of uploads is much smaller (10% of the user base vs. 100%). This demonstrates a scenario where a privacy-preserving technique also yields a significant cost saving, making it a clear win.
  common_mistake: |
    **The Pitfall:** Focusing only on payload size and ignoring participation rates.
    **The Rationale:** Engineers incorrectly conclude FL is more expensive because a 5MB model update is 5x larger than a 1MB raw data payload, ignoring that FL usually involves a fraction of the user base.
    **The Consequence:** Rejecting a privacy-preserving architecture based on a flawed total cost of ownership (TCO) calculation.
  napkin_math: |
    1. **Centralized Cost:** 1M users * 1 MB/day = 1 TB/day = 365 TB/year. At $0.09/GB, cost = $32,850/year.
    2. **Federated Cost:** 100K users (10% participation) * 5 MB/day = 500 GB/day = 182.5 TB/year. At $0.09/GB, cost = $16,425/year.
    3. **Difference:** $32,850 - $16,425 = $16,425 savings.
    4. **Conclusion:** **Federated Learning is ~$16,500 cheaper per year because the lower participation rate overrides the larger payload size.**
  options:
  - Centralized is cheaper by over $70,000 because the FL model uploads are much larger.
  - Federated Learning is more expensive by ~ $15,000 because the model is 5x larger than the raw data.
  - Federated Learning is cheaper by ~ $16,500.
  - Both approaches have roughly the same annual cost.
