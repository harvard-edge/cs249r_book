title: The Watchdog Timer Deadline
scenario: 'You are building a driver drowsiness detection feature for a mobile app. It uses the front camera and a CNN, running continuously. For safety reasons, the system must fully recover from a fatal inference hang (e.g., a driver bug or corrupted model) within a hard deadline of 500ms. Your mobile OS provides a ''watchdog'' service: if your process doesn''t ''ping'' the service at a regular interval, the OS will kill and restart it. The OS restart process itself takes a fixed 100ms.'
question: "What is the maximum value you can set for the watchdog timer's timeout period to guarantee the 500ms recovery deadline?"
details:
  realistic_solution: The total time budget for recovery is 500ms. The OS's restart action consumes 100ms of that budget, which occurs *after* the watchdog times out. This means the timeout must be detected no later than 400ms after the initial hang to meet the deadline. Therefore, the watchdog timer's maximum timeout period must be set to 400ms. The application's 'ping' or 'check-in' logic should then be configured to run at a significantly faster rate (e.g., every 100-200ms) to provide a safety margin against normal system jitter and prevent false-positive reboots.
  common_mistake: |
    **The Pitfall:** Setting the application's 'ping' interval exactly equal to the maximum timeout boundary.
    **The Rationale:** Developers calculate the absolute mathematical limit but fail to account for routine system jitter, scheduler preemption, or garbage collection spikes.
    **The Consequence:** Any minor OS lag causes the ping to miss the deadline, resulting in destructive false-positive reboots of a perfectly healthy app.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Hard Recovery Deadline: 500ms.
       - OS Fixed Restart Time: 100ms.
    2. **Calculations:**
       - Available Watchdog Budget: 500ms - 100ms = 400ms.
       - Safe Ping Interval: Must be significantly < 400ms (e.g., 200ms).
    3. **Conclusion & Interpretation:**
       - **Result: Latency-Bound (Safety Critical)**
       - The absolute maximum watchdog timeout is 400ms. However, the app must ping the service at 100-200ms intervals to safely avoid false-positive termination.
  options:
  - 500ms. The watchdog should be set to the full deadline.
  - 100ms. It should match the OS restart time.
  - 400ms. This leaves exactly enough time for the OS to reboot within the deadline.
  - 600ms. The sum of the deadline and the restart time.
