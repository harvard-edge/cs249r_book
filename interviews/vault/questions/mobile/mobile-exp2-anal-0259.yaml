title: Analyzing Shadow Deployment OOM on Exynos 2400
scenario: You are monitoring a shadow deployment of a new 4GB language model on devices with the Samsung
  Exynos 2400 NPU. The device has a shared 12 GB LPDDR5X memory pool across the CPU, GPU, ISP, and the
  dual-core NPU. During the rollout, both the existing 2GB vision model and the new 4GB language model
  process the same camera stream simultaneously to compare outputs in the background. However, crash rates
  due to Out-Of-Memory (OOM) errors spike significantly when the camera app is open. Why is the shadow
  deployment failing on this specific hardware architecture?
details:
  realistic_solution: The crash happens because the Exynos 2400 uses a unified memory architecture with
    12 GB LPDDR5X shared across all subsystems. When the camera is active, the ISP and GPU consume significant
    memory for image processing and UI rendering. Running both models simultaneously during the shadow
    deployment exceeds the available free memory threshold, triggering the Android low memory killer (LMK).
    The solution is to switch from a concurrent shadow deployment to a fractional A/B rollout, routing
    distinct user sessions to either the new or old model.
  common_mistake: Candidates often assume that because 4GB + 2GB = 6GB, the simultaneous shadow deployment
    easily fits within the 12GB total RAM limit. They fail to account for the shared memory architecture
    where the OS, camera ISP buffers, display GPU buffers, and background apps consume the majority of
    the RAM pool.
  napkin_math: 'Total device RAM: 12.0 GB. Baseline OS + background apps: ~4.5 GB. Camera ISP + GPU buffers
    during viewfinder: ~2.5 GB. Remaining free RAM pool: 12.0 - 4.5 - 2.5 = 5.0 GB. Models combined for
    shadow mode: 4.0 GB (LLM) + 2.0 GB (Vision) = 6.0 GB. Memory deficit = 6.0 GB - 5.0 GB = 1.0 GB. The
    shadow deployment requires 1.0 GB more than the shared 12 GB LPDDR5X can provide.'
