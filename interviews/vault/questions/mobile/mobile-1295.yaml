title: Evaluating On-Device Toxicity Guardrails for A17 Pro
scenario: You are deploying a generative AI text feature on iOS devices powered by the Apple A17 Pro. You must implement a toxicity and PII filtering guardrail. Option A is a 100M parameter BERT-based classifier running locally. Option B is a cloud-based LLM evaluator that guarantees 99.9% accuracy but requires network calls.
question: Which toxicity guardrail design is better for a mobile deployment prioritizing strict PII privacy and low latency?
details:
  realistic_solution: 'Option A is the superior choice. Running the guardrail locally on the A17 Pro ensures PII never leaves the device, directly addressing the privacy constraint. The A17 Pro Neural Engine is highly optimized for this workload. While a 100M parameter model may have slightly lower accuracy than a massive cloud LLM, it can be quantized and domain-adapted to serve as a fast, highly conservative gate. The deterministic low latency is critical for the user experience, whereas cloud network jitter would degrade the product.'
  common_mistake: |
    **The Pitfall:** Defaulting to a massive cloud LLM to maximize safety classification accuracy.
    **The Rationale:** Candidates prioritize the 99.9% accuracy metric of the cloud evaluator, ignoring the absolute constraint that PII cannot be transmitted over the network.
    **The Consequence:** Designing a system that violates privacy regulations and introduces massive network jitter into a real-time UI.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: 100M params, INT8 (100 MB footprint).
    - Token sequence: 128 tokens.
    - Apple A17 Pro ANE: 35 TOPS.

    **Calculations:**
    - Compute Operations: 2 * 100M * 128 = 25.6 GOPS.
    - Theoretical Compute Time: 25.6 GOPS / 35,000 GOPS/s = 0.73 ms.

    **Conclusion & Interpretation:**
    - **Result: < 4ms (Compute-Bound)**. Even at 20% hardware utilization, inference takes < 4ms, adding imperceptible latency while keeping PII on-device.
