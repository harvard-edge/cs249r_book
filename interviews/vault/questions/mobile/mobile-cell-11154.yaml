title: 'KV-Cache: Evaluate Sliding Window vs Full KV Cache for Mobile LLM'
scenario: 'Compare two KV cache strategies for a 1B LLM on Tensor G3 (7.5 TOPS, 12GB) for a long-running
  conversation: (A) full KV cache (grows unboundedly), (B) sliding window (window size 512 tokens). Evaluate
  memory, quality, and latency over a 50-turn, 3000-token conversation.'
details:
  realistic_solution: 'Full KV: memory grows linearly, latency grows linearly with context. Sliding window:
    constant memory and latency, but loses information from >512 turns ago. Quality impact depends on
    conversation type.'
  common_mistake: Assuming sliding window has no quality impact; not quantifying memory savings; not accounting
    for the constant latency benefit of sliding window for very long conversations.
  napkin_math: 'KV per token: 24 layers × 2 × 8 KV heads × 128 × 2B = 98.3KB. At turn 50 (3000 tokens):
    Full KV: 3000 × 98.3KB = 295MB. Latency at 3000 tokens: 295MB / 51 GB/s (Tensor G3 est.) + weight
    load 500MB / 51 GB/s = 5.78ms + 9.8ms = 15.58ms → 64 tok/sec. Sliding window (512): always 512 × 98.3KB
    = 50.3MB. Latency: constant 50.3MB/51 GB/s + 9.8ms = 0.99ms + 9.8ms = 10.79ms → 92.7 tok/sec. Constant.
    Memory: full KV at 3000 tokens = 295MB + 750MB model + 2GB OS = 3.05GB. Fine on 12GB. Sliding window:
    50.3MB KV = 3.32× less memory. Quality: for coding assistant (need full context) → full KV. For chitchat
    (recent 512 tokens sufficient) → sliding window fine. At 10K turns: full KV = 10K × 98.3KB = 983MB.
    Still fits on 12GB device. Latency: 983MB / 51 GB/s = 19.3ms KV read alone. Sliding window stays 0.99ms.
    Long conversations: sliding window wins on latency.'
