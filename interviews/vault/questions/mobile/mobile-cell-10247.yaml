title: Specifying Model Update and Rollback Contract for Compound AI on Snapdragon 8 Gen 3
scenario: 'A Snapdragon 8 Gen 3 (45 TOPS, 16GB) compound AI app ships model updates OTA (over-the-air)
  for its 3-model pipeline: embedding model (33MB), reranker (22MB), LLM (500MB INT4). A bad LLM update
  caused a 15% increase in user-reported incoherent responses on 500,000 devices before detection. Write
  a specification for a safe model update and rollback protocol that can detect quality regressions and
  roll back within 1 hour of deployment.'
question: "What OTA model update and rollback protocol can detect a bad compound AI model and revert within one hour?"
details:
  realistic_solution: 'Staged rollout specification: (1) Canary phase (0-1h): deploy to 0.1% of fleet
    (500 devices). Collect automated quality signals: coherence score (lightweight judge model running
    locally), user thumbs-down rate, latency P95. Alert threshold: if thumbs-down rate increases > 2%
    or coherence drops > 5% relative to baseline, halt rollout automatically. (2) Each device maintains
    previous model version (1GB total for current + prior LLM): enables local instant rollback without
    re-download. (3) Kill-switch: server-side feature flag forces devices to use prior version within
    60 seconds of flag change — no OTA required for rollback. (4) Rollback trigger: automated at 30-minute
    mark if quality metrics breach threshold in canary group.'
  common_mistake: Implementing rollback at the infrastructure level (pulling the OTA update) without considering
    that devices download updates asynchronously — by the time a quality regression is detected, 30-90%
    of the fleet may have already updated, and rollback requires pushing another large OTA (500MB LLM)
    to affected devices.
  napkin_math: 'Fleet: 500,000 devices. OTA sizes: embedding(33MB) + reranker(22MB) + LLM(500MB) = 555MB
    per update. Keep 1 prior version: +555MB storage per device. Canary (0.1%): 500 devices. Detection
    latency: 30 minutes of quality data collection. If alert fires at 30min: rollout stopped at 0.1% adoption.
    Without canary: at 30min, ~15% fleet (75,000 devices) might have updated via background download.
    Rollback OTA: 500MB LLM to 75,000 devices = 37.5TB of rollback data at $0.09/GB CDN cost = $3,375
    in CDN costs avoided. Local rollback via kill-switch: 0 bytes — instant, $0 CDN.'
