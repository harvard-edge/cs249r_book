title: A17 NPU Deterministic Queue
scenario: An Apple A17 Pro Neural Engine processes live dictation text. Tokens arrive
  at 10 tokens/sec. The NPU processes each token in a constant 20 ms.
question: Calculate the average queue depth and total latency per token, treating
  the system as an M/D/1 queue.
visual:
  kind: svg
  path: mobile-1882.svg
  alt: Line chart comparing M/M/1 vs M/D/1 wait times.
  caption: M/M/1 vs M/D/1 delay comparison.
details:
  realistic_solution: Arrival rate $\lambda = 10$, service time $D = 0.02$ s. Utilization
    $\rho = \lambda D = 0.2$. Average queue length for M/D/1 is $L_q = \rho^2 / (2(1-\rho))
    = 0.04 / 1.6 = 0.025$ tokens. The average wait time $W_q = L_q / \lambda = 0.0025$
    s. Total latency is $20 + 2.5 = 22.5$ ms.
  common_mistake: Applying M/M/1 queueing delay formulas which overestimate the delay
    by a factor of 2 compared to deterministic service times.
  napkin_math: rho = 10 * 0.02 = 0.2. Wq = (0.2 * 0.02) / (2 * 0.8) = 2.5ms. Total
    = 22.5ms.
