title: On-Device Differential Privacy for Mobile ML
scenario: Your mobile keyboard app on A17 Pro (35 TOPS, 8 GB) collects typing patterns to improve next-word prediction. Apple's privacy requirements mandate local differential privacy (LDP) — noise is added on-device before any data leaves the phone.
question: With 100M users each contributing one data point per day, what epsilon provides meaningful utility for model improvement, and how does LDP's accuracy compare to central DP?
details:
  realistic_solution: 'In LDP, each user''s data is randomized before leaving the device. For a frequency estimation protocol (e.g., RAPPOR): with epsilon = 4 per user, the randomized response preserves the true value with probability e^4 / (1 + e^4) ≈ 98.2%. The estimation error formula (e^ε + 1) / (2√N × (e^ε - 1)) with ε=4, N=100M gives an absolute error of ≈ 0.000052, while the simpler bound 1/(ε√N) gives 0.000025. Both are tiny, meaning aggregate frequency estimation is highly accurate. However, LDP provides weaker guarantees than central DP for the same epsilon: central DP with ε=1 on 100M users gives comparable accuracy to LDP with ε=4 on 100M users. The tradeoff: LDP requires no trusted server (data is private before leaving the device), while central DP requires trust in the aggregation server. On A17 Pro: randomized response computation is trivial — one random number generation per data point, ~0.1ms, negligible battery impact.'
  common_mistake: |
    **The Pitfall:** Using central DP epsilon values for Local Differential Privacy.
    **The Rationale:** Candidates apply standard ε=1 central DP targets to local differential privacy architectures.
    **The Consequence:** Because noise is added to each individual data point before aggregation, an ε=1 in LDP completely destroys utility; LDP requires higher epsilons (like ε=4) to maintain signal.
  napkin_math: |
    - LDP estimation absolute error (ε=4, N=100M): ≈ 1 / (4 * √100,000,000) = 1 / 40,000 = **0.000025**.
    - Central DP error (ε=1, N=100M): 1 / (1 * 100,000,000) = **0.00000001**.
    - On-device compute for LDP: 2 operations (1 coin flip, 1 conditional) ≈ 0.1ms.
    - **Conclusion:** Both errors are tiny for 100M users, but LDP requires higher epsilon to achieve comparable utility due to pre-aggregation noise.
