title: On-Device Differential Privacy for Mobile ML
scenario: Your mobile keyboard app on A17 Pro (35 TOPS, 8 GB) collects typing patterns
  to improve next-word prediction. Apple's privacy requirements mandate local differential
  privacy (LDP) — noise is added on-device before any data leaves the phone. With
  100M users each contributing one data point per day, what epsilon provides meaningful
  utility for model improvement, and how does LDP's accuracy compare to central DP?
question: With 100M users each contributing one data point per day, what epsilon provides
  meaningful utility for model improvement, and how does LDP's accuracy compare to
  central DP?
details:
  realistic_solution: 'In LDP, each user''s data is randomized before leaving the
    device. For a frequency estimation protocol (e.g., RAPPOR): with epsilon = 4 per
    user, the randomized response preserves the true value with probability e^4 /
    (1 + e^4) ≈ 98.2%. The estimation error formula (e^ε + 1) / (2√N × (e^ε - 1))
    with ε=4, N=100M gives an absolute error of ≈ 0.000052, while the simpler bound 1/(ε√N) gives 0.000025.
    Both are tiny, meaning aggregate frequency estimation is highly accurate. However, LDP
    provides weaker guarantees than central DP for the same epsilon: central DP with
    ε=1 on 100M users gives comparable accuracy to LDP with ε=4 on 100M users. The
    tradeoff: LDP requires no trusted server (data is private before leaving the device),
    while central DP requires trust in the aggregation server. On A17 Pro: randomized
    response computation is trivial — one random number generation per data point,
    ~0.1ms, negligible battery impact.'
  common_mistake: Using the same epsilon values as central DP. LDP requires much higher
    epsilon per user because noise is added before aggregation. Central DP adds noise
    once to the aggregate; LDP adds noise to each individual contribution.
  napkin_math: 'LDP (ε=4, N=100M): frequency estimation absolute error ≈ (e^ε + 1) / (2 × √N
    × (e^ε - 1)) = (54.6 + 1) / (2 × 10000 × (54.6 - 1)) ≈ 0.000052 (using the complex
    formula). The simpler bound 1/(ε × √N) = 1/(4 × 10000) = 0.000025 is also cited
    as an approximation. Central DP (ε=1, N=100M): error = 1/(ε × N) = 1e-8 (much
    smaller). On-device compute: 1 random coin flip + 1 conditional report = 2 operations.
    Battery: 0.1ms × 1 nJ/op = negligible. Network: 1 data point = 100 bytes/day.
    Total fleet bandwidth: 100M × 100 bytes = 10 GB/day.'
