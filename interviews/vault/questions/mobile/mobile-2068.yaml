title: Image Resizing Memory Pipeline
scenario: Before an Apple A17 Pro Neural Engine processes a camera frame, the CPU
  resizes a raw uncompressed 4K (3840x2160) RGB 8-bit image to a 224x224 RGB 8-bit
  input tensor.
question: Calculate the absolute minimum system memory read and write bandwidth consumed
  purely by this resizing step for a single frame.
details:
  realistic_solution: 'The input 4K image is 3840 * 2160 * 3 bytes = 24,883,200 bytes
    (roughly 24.9 MB). The CPU must read this entirely. The resized output image is
    224 * 224 * 3 bytes = 150,528 bytes (roughly 150 KB). The CPU writes this output.
    The absolute minimum memory footprint is the sum of these operations: ~25.03 MB
    per frame. At 30 FPS, this trivially consumes ~750 MB/s of LPDDR5 bandwidth.'
  common_mistake: Only calculating the size of the output tensor and ignoring the
    necessary memory read of the full high-resolution camera buffer.
  napkin_math: 3840 * 2160 * 3 + 224 * 224 * 3 = 25033728 bytes.
