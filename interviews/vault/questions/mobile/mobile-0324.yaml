title: The Mobile Roofline Dilemma (mobile-0324)
scenario: You're profiling a new object detection model on an Apple A17 Pro to see if it can run in real-time.
  According to the hardware specifications, the A17's Neural Engine (ANE) delivers 35 TOPS for INT8 operations,
  and the shared LPDDR5 memory system provides 51.2 GB/s of bandwidth. Your profiler shows that a single
  inference pass executes 70 Giga-operations (GOps) and requires reading a total of 200 MB of data (weights
  and activations). Based on these numbers, is your model's performance more likely to be limited by the
  ANE's compute speed or the memory system's bandwidth? Explain your reasoning.
question: "Based on these numbers, is your model's performance more likely to be limited by the ANE's compute speed or the memory system's bandwidth?"
details:
  realistic_solution: The model is **memory-bound**. To determine this, we must compare the model's Arithmetic
    Intensity (AI) to the hardware's Ridge Point. The AI must be *greater* than the Ridge Point for a
    workload to be compute-bound.
  common_mistake: Engineers often misinterpret the headline TOPS number, assuming that a high peak compute
    capability automatically means workloads will be compute-bound. They fail to account for the memory
    bandwidth required to 'feed' the processor. If the processor spends most of its time waiting for data,
    it cannot achieve its peak TOPS, and the workload is actually memory-bound.
  napkin_math: Ridge Point = Peak Compute / Peak Bandwidth = 35 TOPS / 51.2 GB/s ≈ 684 Ops/Byte
  options:
  - Compute-bound, because the Arithmetic Intensity (350 Ops/Byte) is less than the hardware's Ridge Point
    (~684 Ops/Byte).
  - Memory-bound, because the model's Arithmetic Intensity is only 0.35 Ops/Byte.
  - Memory-bound, because the model's Arithmetic Intensity (350 Ops/Byte) is lower than the hardware's
    Ridge Point (~684 Ops/Byte).
  - Compute-bound, because the model requires 70 Giga-operations, which is a very large compute load for
    a mobile device.
  correct_index: 2
