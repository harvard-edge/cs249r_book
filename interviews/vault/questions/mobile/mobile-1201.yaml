title: Analyzing Mmap Latency Spikes on Snapdragon 8 Gen 3
scenario: You are deploying a 2GB INT8 LLM onto a device powered by a Qualcomm Hexagon
  NPU (Snapdragon 8 Gen 3) which shares 16GB of LPDDR5X memory across the CPU, GPU,
  and NPU. The weights are memory-mapped (mmap) from storage to avoid blocking the
  main thread during cold starts. However, telemetry shows that the first inference
  token takes 500ms to generate, while subsequent tokens only take 33ms. Explain why
  this severe latency spike happens during the initial generation phase on this architecture.
question: Why this severe latency spike happens during the initial generation phase
  on this architecture?
details:
  realistic_solution: The spike occurs due to major page faults. When the NPU executes
    the first token, it accesses the memory-mapped weights, triggering the OS to halt
    execution and read the required pages from slower UFS storage into the shared
    LPDDR5X memory. The initial forward pass incurs the I/O latency of loading the
    model. Subsequent tokens are fast because the weights are now cached in physical
    RAM.
  common_mistake: Candidates often assume the NPU is initially bottlenecked by its
    45 TOPS INT8 compute capacity or that mmap instantly loads the entire model into
    memory. They fail to recognize that mmap only creates virtual memory mappings,
    and physical memory pages are fetched via major page faults only when accessed.
  napkin_math: Assuming UFS 4.0 storage at 4 GB/s sequential read. Page-faulting the
    2GB INT8 model into the shared 16GB LPDDR5X memory takes 2 GB / 4 GB/s = 0.5 seconds
    (500ms), matching the cold start latency. Once cached, a forward pass over 2GB
    at roughly 60 GB/s shared memory bandwidth takes 2 GB / 60 GB/s = ~33ms per token,
    efficiently feeding the 45 TOPS NPU.
