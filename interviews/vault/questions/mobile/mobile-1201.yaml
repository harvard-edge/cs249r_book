title: Analyzing Mmap Latency Spikes on Snapdragon 8 Gen 3
scenario: You are deploying a 2GB INT8 LLM onto a device powered by a Qualcomm Hexagon NPU which shares 16GB of LPDDR5X memory. The weights are memory-mapped (mmap) from storage to avoid blocking the main thread during cold starts. Telemetry shows the first inference token takes 500ms to generate, while subsequent tokens take 33ms.
question: Why does a 500ms latency spike occur during the initial generation phase for a memory-mapped 2GB INT8 LLM?
details:
  realistic_solution: The spike occurs due to major page faults. When the NPU executes the first token, it accesses the memory-mapped weights, triggering the OS to halt execution and read the required pages from slower UFS storage into the shared LPDDR5X memory. The initial forward pass incurs the I/O latency of loading the model. Subsequent tokens are fast because the weights are now cached in physical RAM.
  common_mistake: |
    **The Pitfall:** Assuming memory-mapped (mmap) weights are instantly loaded into physical RAM.
    
    **The Rationale:** Developers confuse the creation of virtual memory mappings with the actual allocation and loading of physical memory pages.
    
    **The Consequence:** They fail to anticipate major page faults blocking execution on the first inference pass, leading to severe UX stutter.
  napkin_math: |
    1. **Calculate Page-Fault Latency:** Assume UFS 4.0 storage provides ~4 GB/s sequential read speed.
    2. **Load Model:** Faulting the 2GB INT8 model into RAM takes 2 GB / 4 GB/s = 0.5 seconds (500 ms).
    3. **Calculate Warm Latency:** Once cached in RAM, a forward pass over 2GB at 60 GB/s bandwidth takes 2 GB / 60 GB/s ≈ 33 ms.
    4. **Result:** The 500ms spike perfectly maps to the **initial I/O latency of paging the model from UFS storage** into shared memory.
