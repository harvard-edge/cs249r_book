title: Analyzing iOS Jetsam Eviction on A17 Pro Unified Memory
scenario: You deployed a style transfer model on an iPhone 15 Pro (A17 Pro). The device has 8 GB of unified memory. Your model consumes 1.5 GB. Yet, the OS consistently terminates your app via Jetsam when the user switches to the native Camera app.
question: Why does this memory pressure eviction occur despite the theoretical availability within the 8 GB limit?
details:
  realistic_solution: |
    The A17 Pro uses a unified memory architecture. When the Camera app opens, the ISP and GPU demand massive memory allocations for uncompressed computational photography buffers. System memory pressure spikes past the iOS Jetsam critical threshold (~85%), forcing the OS to kill the largest non-critical consumer (your ML app) to prevent dropped camera frames.
  common_mistake: |
    **The Pitfall:** Treating unified memory as a static pool dedicated to the app.
    **The Rationale:** Candidates fail to account for the ISP and GPU aggressively competing for the same physical memory during high-demand foreground operations.
    **The Consequence:** Models are sized too large for realistic multitasking scenarios, leading to frequent app crashes in production.
  napkin_math: |
    - Total Unified Memory = 8.0 GB.
    - Base iOS + system daemons footprint = ~2.5 GB.
    - Foreground Camera app (4K buffers + ISP + GPU) = ~3.5 GB.
    - System usage before ML app = 6.0 GB.
    - Total allocation with ML app = 6.0 + 1.5 GB = 7.5 GB (93.7% of total memory).
    - **iOS Jetsam triggers at ~85% (6.8 GB), forcing eviction of the 1.5 GB ML app.**
