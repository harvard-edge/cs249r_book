title: Analyzing iOS Jetsam Eviction on A17 Pro Unified Memory
scenario: You deployed a real-time style transfer model on an iPhone 15 Pro, utilizing
  the Apple A17 Pro Neural Engine. The device has 8 GB of unified memory shared across
  the CPU, GPU, and the 16-core NE. Your model consumes exactly 1.5 GB of memory for
  weights and activations, leaving plenty of apparent free space, yet the OS consistently
  terminates your app via Jetsam when the user switches to the native Camera app.
  Explain why this memory pressure eviction occurs despite the theoretical availability
  within the 8 GB limit.
question: Why this memory pressure eviction occurs despite the theoretical availability
  within the 8 GB limit?
details:
  realistic_solution: The issue stems from the unified memory architecture of the
    A17 Pro coupled with aggressive iOS memory management (Jetsam). When the Camera
    app opens, the ISP and GPU demand massive, sudden memory allocations for uncompressed
    computational photography buffers. Since the A17 Pro shares its 8 GB across all
    subsystems, the total system memory pressure rapidly spikes past the critical
    threshold. Jetsam intervenes and kills the largest non-critical consumer—your
    1.5 GB ML app—to guarantee the foreground camera experience doesn't drop frames.
  common_mistake: Candidates often assume the 8 GB of memory is a static pool where
    the app can safely claim its 1.5 GB as long as `used < total`. They fail to account
    for the 'unified' architecture, meaning the Neural Engine competes directly with
    the GPU and Image Signal Processor (ISP) for the exact same physical memory during
    high-demand operations.
  napkin_math: Total Unified Memory = 8.0 GB. Base iOS + system daemons footprint
    ≈ 2.5 GB. Foreground Camera app (4K buffers + ISP + GPU) dynamically allocates
    ≈ 3.5 GB. Total system usage before ML app = 6.0 GB. Adding the ML app's 1.5 GB
    brings total allocation to 7.5 GB (93.7% of total memory). iOS Jetsam typically
    triggers critical eviction when system memory pressure exceeds ~85% (6.8 GB),
    meaning the 1.5 GB footprint pushes the system mathematically past the high-water
    mark, forcing OS-level eviction.
