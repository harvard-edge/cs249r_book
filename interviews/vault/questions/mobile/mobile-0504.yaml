title: 'The Sluggish Smart Reply: Real-Time Deadlines'
scenario: You are optimizing a new on-device "smart reply" feature powered by a 2B parameter LLM. Profiling shows that once generation starts, each subsequent token takes ~80ms (Time Per Output Token), meeting the design spec. However, the Time To First Token (TTFT) is frequently over 300ms, missing the 100ms UI "jank" budget. Your system currently collects up to 4 user requests before sending them to the NPU for a single inference pass. A new request arrives roughly every 500ms.
question: Why does static batching make smart reply TTFT exceed 300 ms even though TPOT is 80 ms?
details:
  realistic_solution: The static batching policy is the bottleneck. Waiting to form a batch of 4 introduces a significant 'head-of-line blocking' delay for the first request in the batch. The system should be changed to prioritize TTFT. The best approach is to implement a dynamic or 'continuous' batching strategy. For example, the system could enforce a maximum wait time (e.g., 20ms). After 20ms, it dispatches whatever requests are in the queue, even if it's just a single request. This trades off theoretical throughput (larger batches are more efficient) for much lower user-perceived latency, which is critical for a real-time UI feature.
  common_mistake: |
    **The Pitfall:** Assuming high TTFT is caused by a slow model or underpowered hardware.
    **The Rationale:** Engineers focus exclusively on the model's inference time, forgetting that scheduling and queueing delays can dwarf raw computation time.
    **The Consequence:** Wasted effort shrinking or quantizing the model when the latency is entirely artificial due to the batching policy.
  napkin_math: |
    1. **Batching Policy:** Statically waits for 4 requests.
    2. **Arrival Rate:** 1 request every 500ms.
    3. **Queueing Delay:** The first request must wait for 3 more to arrive.
    4. **Total Wait:** 3 * 500ms = **1500ms**.
    5. **Conclusion:** Queueing delay massively exceeds the 100ms TTFT budget before inference even begins.
  options:
  - The 2B parameter model is too large for the mobile NPU, causing slow inference.
  - The static batching policy is introducing excessive queuing delay before inference begins.
  - LPDDR5 memory bandwidth is saturated, creating a bottleneck when loading model weights for each batch.
  - The CPU is too slow at tokenizing and preparing the input tensors, starving the NPU.
  correct_index: 1
