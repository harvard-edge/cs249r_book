title: Tiered Sensor Gating
scenario: An always-on face detection model on an iPad drains the battery in 4 hours
  if the Apple Neural Engine (ANE) runs continuously at 30 fps.
question: Design a multi-tiered duty-cycling strategy to extend battery life using
  the ambient light sensor and ISP motion detection.
details:
  realistic_solution: 'Implement a cascaded wake-up pipeline: 1) The ultra-low-power
    ambient light sensor disables the system in dark rooms. 2) The low-power ISP runs
    lightweight background motion detection (e.g., at 5 fps). 3) Only when motion
    is detected is the ANE activated to run the heavy face detection model. This gates
    the ANE''s active time to under 5% of the day.'
  common_mistake: Waking up the high-power main application cores to process the light
    or motion sensor data, which negates the power savings of shutting down the ANE.
  napkin_math: 2W ANE gated to 5% duty cycle = 0.1W average power.
