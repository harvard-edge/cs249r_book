title: LLaMA-3 8B INT8 Quantization Memory Budget on Snapdragon 8 Gen 3
scenario: You are deploying a quantized 8-billion parameter LLM onto a flagship Android device powered by a Qualcomm Snapdragon 8 Gen 3 SoC. The device has 16 GB of shared LPDDR5X memory, but the OS and background apps reserve a hard baseline of 6 GB. You plan to run the model on the Hexagon NPU using INT8 weights and INT8 activations.
question: What is the memory footprint for an 8B INT8 Snapdragon LLM plus a 2048-token KV cache, and does it fit?
details:
  realistic_solution: 'First, calculate the memory needed for the INT8 weights (1 byte per parameter). Then, calculate the KV cache size using the standard formula: 2 * batch_size * context_length * hidden_size * num_layers * bytes_per_element. Finally, verify that the sum of the model weights and the KV cache fits within the available user-space memory (Total RAM - OS Reserved).'
  common_mistake: |
    **The Pitfall:** Forgetting the KV cache or unified memory architecture.
    **The Rationale:** Candidates often calculate only static weight size and assume NPUs have dedicated VRAM instead of sharing system RAM.
    **The Consequence:** Deploying models that immediately trigger OOM crashes because the dynamic runtime memory was unaccounted for.
  napkin_math: |
    1. **Available Memory:** 16 GB (Total) - 6 GB (OS) = 10 GB available.
    2. **Model Weights:** 8 billion parameters * 1 byte/param (INT8) = 8 GB.
    3. **KV Cache Size:** 2 (K and V) * 32 (layers) * 4096 (hidden size) * 2 bytes (FP16) = 524,288 bytes (~0.5 MB/token).
    4. **Total KV Cache:** 2048 tokens * 0.5 MB = 1 GB.
    5. **Total Footprint:** 8 GB + 1 GB = 9 GB.
    6. **Conclusion:** **The 9 GB footprint fits within the 10 GB available shared memory.**
