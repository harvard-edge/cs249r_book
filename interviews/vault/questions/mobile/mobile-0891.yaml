title: Realizing On-Device Agent State Persistence Across App Backgrounding on Snapdragon 8 Gen 3
scenario: A Snapdragon 8 Gen 3 (45 TOPS, 16GB) agentic app loses its multi-step task state when the user switches apps. The agent maintains: current task plan (JSON, 2KB), conversation history (20 turns, ~4000 tokens as text = 16KB), intermediate tool results (up to 50KB), and FAISS query context (10 recent query embeddings, 10*384*4=15.4KB). Android may kill the app process when backgrounded.
question: How should an Android agent persist lightweight state so it can resume within 500ms after backgrounding?
details:
  realistic_solution: 'Serialize only the lightweight state: task_plan(2KB) + conversation_history_as_text(16KB) + tool_results(50KB) + query_embeddings(15.4KB) = 83.4KB total. Write to SharedPreferences or Room DB on every state change (not just on background). On resume: (1) Read state from DB: 83.4KB at 3GB/s NVMe = 0.028ms — negligible. (2) KV cache is NOT persisted — rebuild by running prefill on restored conversation history. Prefill 4000 tokens at Snapdragon 8 Gen 3: 4000*2*1B/(45e12*0.3)=592ms — too slow. Alternative: store only last 512 tokens verbatim and summarized older turns (200 tokens). Prefill 712 tokens: 105ms. Total resume: 0.028+105+50=155ms well within 500ms.'
  common_mistake: |
    **The Pitfall:** Serializing the full agent state, including the massive KV cache, to disk on every background event.
    **The Rationale:** Teams try to save all state to avoid prompt re-evaluation, not realizing the I/O cost.
    **The Consequence:** Saving a 50MB+ KV cache causes 500ms+ write delays, lagging the background transition and risking data corruption if killed mid-write.
  napkin_math: |
    - **Lightweight State Size:** 2KB + 16KB + 50KB + 15.4KB = **83.4 KB**.
    - **State Read/Write Latency:** 83.4 KB / 3 GB/s (NVMe) = **0.028 ms**.
    - **KV Cache Rebuild Cost (4000 tokens):** 4000 × 2 × 1B / (45 TOPS × 0.3 util) = **~592 ms** (Too slow).
    - **Optimized Prefill (712 tokens):** Last 512 + 200 summarized. 712 × 2 × 1B / (45e12 × 0.3) = **~105 ms**.
    - **Total Resume Time:** 0.028 ms (Read) + 105 ms (Prefill) + 50 ms (Warm-up) = **~155 ms** (< 500ms SLA).
