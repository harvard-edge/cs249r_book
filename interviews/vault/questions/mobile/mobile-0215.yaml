title: The Mobile VFX Bottleneck
scenario: You're an engineer at a mobile gaming company optimizing a real-time visual effect that uses
  a CNN on an iPhone 15 Pro (A17 Pro chip). After profiling a critical convolutional layer, you find it
  executes 700 Million INT8 MAC operations and requires reading 7 MB of data (weights and activations)
  from DRAM for a single inference. Using the hardware specs provided, calculate the layer's Arithmetic
  Intensity and explain whether it is compute-bound or memory-bound.
question: "What is the arithmetic intensity of a 700M-MAC layer reading 7 MB, and is it memory-bound on an A17 Pro?"
details:
  realistic_solution: The layer's Arithmetic Intensity of 200 ops/byte must be compared to the A17 Pro's
    hardware ridge point. If the Neural Engine's ridge point exceeds 200 ops/byte (typical for modern
    NPUs), the layer is memory-bound and the team should focus on memory optimization techniques like
    layer fusion and cache-friendly data layouts rather than trying to optimize the mathematical operations
    further.
  common_mistake: Engineers often calculate the Arithmetic Intensity correctly but fail to compare it
    against the hardware's 'ridge point'. They might see a large number of operations and incorrectly
    assume the workload is compute-bound, or see a low AI value and not understand its implication. Another
    common error is forgetting that a MAC (Multiply-Accumulate) is 2 operations, leading to an AI that
    is off by 2x.
  napkin_math: '1. Calculate Total Operations: A MAC performs 1 multiply and 1 add. 700 Million MACs *
    2 ops/MAC = 1.4 Billion INT8 Operations (1.4 GOPs). 2. Calculate Arithmetic Intensity (AI): 1.4 GOPs
    / 7 MB of data read = 1.4 * 10^9 / (7 * 10^6) = 200 ops/byte. This AI of 200 ops/byte must be compared
    to the A17 Pro''s Neural Engine ridge point to determine if the layer is compute-bound or memory-bound.'
  options:
  - Compute-bound; 1.4 Billion operations is a heavy workload that will saturate the ANE's compute units.
  - Memory-bound; the AI is 100 Ops/Byte, which is less than the A17 Pro's ridge point.
  - Memory-bound; the AI is 200 Ops/Byte, which is less than the A17 Pro's ridge point of ~683 Ops/Byte.
  - Compute-bound; the AI is 200 Ops/Byte, and any AI over 100 is typically considered high enough to
    be compute-bound.
  correct_index: 2
