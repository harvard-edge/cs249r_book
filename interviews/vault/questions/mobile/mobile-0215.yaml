title: The Mobile VFX Bottleneck
scenario: You're an engineer at a mobile gaming company optimizing a real-time visual effect that uses a CNN on an iPhone 15 Pro (A17 Pro chip). After profiling a critical convolutional layer, you find it executes 700 Million INT8 MAC operations and requires reading 7 MB of data (weights and activations) from DRAM for a single inference.
question: What is the arithmetic intensity of this layer, and is it compute-bound or memory-bound on an A17 Pro?
details:
  realistic_solution: The layer's Arithmetic Intensity of 200 ops/byte must be compared to the A17 Pro's hardware ridge point. If the Neural Engine's ridge point exceeds 200 ops/byte (typical for modern NPUs), the layer is memory-bound and the team should focus on memory optimization techniques like layer fusion and cache-friendly data layouts rather than trying to optimize the mathematical operations further.
  common_mistake: |
    **The Pitfall:** Failing to calculate the hardware ridge point.
    **The Rationale:** Candidates see 1.4 Billion operations and mistakenly assume the sheer volume makes it compute-bound, or they forget that 1 MAC = 2 Ops.
    **The Consequence:** Spending weeks optimizing math operations instead of focusing on memory-fusion techniques.
  napkin_math: |
    *   **Total Operations:** 700 Million MACs * 2 ops/MAC = 1.4 Billion INT8 Ops.
    *   **Data Transferred:** 7 MB.
    *   **Arithmetic Intensity (AI):** 1.4 * 10^9 Ops / (7 * 10^6 Bytes) = **200 Ops/Byte**.
    *   **A17 Pro Ridge Point:** ~683 Ops/Byte (35 TOPS / 51.2 GB/s).
    *   **Conclusion:** Since AI (200) < Ridge Point (683), the workload is **Memory-Bound**.
  options:
  - Compute-bound; 1.4 Billion operations is a heavy workload that will saturate the ANE's compute units.
  - Memory-bound; the AI is 100 Ops/Byte, which is less than the A17 Pro's ridge point.
  - Memory-bound; the AI is 200 Ops/Byte, which is less than the A17 Pro's ridge point of ~683 Ops/Byte.
  - Compute-bound; the AI is 200 Ops/Byte, and any AI over 100 is typically considered high enough to be compute-bound.
  correct_index: 2
