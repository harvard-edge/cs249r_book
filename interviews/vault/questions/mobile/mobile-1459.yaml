title: Sizing On-Device Guardrails on Hexagon NPU
scenario: You are deploying a 3B-parameter generative AI assistant on flagship devices
  featuring the Qualcomm Hexagon NPU (Snapdragon 8 Gen 3). Corporate governance mandates
  a strict on-device Responsible AI guardrail to intercept toxic output and redact
  PII before displaying it to the user. Given the shared 12-16 GB LPDDR5X memory and
  45 TOPS INT8 NPU, design the guardrail execution architecture and quantify its memory,
  latency, and compute footprint when running concurrently with the main generative
  model.
question: How would you size on-device guardrail inference on Hexagon NPU for low-latency
  generated text checks?
details:
  realistic_solution: The optimal approach is to deploy a heavily distilled, INT8-quantized
    encoder model (e.g., 100M parameters) dedicated to guardrails, running chunk-by-chunk
    on the generated text. By utilizing the NPU's 45 TOPS INT8 capability for the
    guardrail while the main model generates tokens, we can hide the verification
    latency. Pinning the 100MB guardrail model in memory prevents expensive reloading
    and bandwidth contention with the main model's KV cache.
  common_mistake: Candidates often propose running a secondary LLM for guardrailing,
    failing to realize the extreme memory bandwidth contention it causes. They also
    frequently forget to budget for the OS memory overhead on shared LPDDR5X RAM or
    ignore the latency impact of context-switching the NPU between the main model
    and the guardrail.
  napkin_math: 'Available RAM: 12GB - 4GB (OS/System) = 8GB ML budget. Main 3B model
    (INT4) + KV Cache = ~2.0GB. Guardrail model (100M params, INT8) = 100MB footprint.
    Compute per 50-token chunk: 100M * 50 * 2 = 10B OPs = 0.01 Tera-OPs (0.01 TOPs).
    Hexagon NPU compute time at 45 TOPS INT8 = 0.01 / 45 = ~0.22ms. Memory read time
    for 100MB at ~68GB/s (LPDDR5X) = ~1.47ms. Total latency overhead per chunk is ~1.7ms,
    running asynchronously without bottlenecking the main generation.'
