title: The Jetsam Guillotine
scenario: Your AR app crashes with a 'SIGKILL' (Jetsam kill) when users take a high-resolution photo, even though your app is only using 822 MB of its 2 GB memory limit.
question: Based on the RAM diagram, what is the 'invisible' resource consumer causing the OS to kill your process?
details:
  realistic_solution: You are hitting a Shared Resource RAM Collision. The camera ISP service runs in a separate process but shares the same physical RAM pool. During photo capture, the ISP HDR pipeline can consume >1.2 GB. When combined with the OS and your app, total demand exceeds 4 GB, and the OS terminates the app.
  common_mistake: |
    **The Pitfall:** Assuming app memory limits exist in a vacuum.
    **The Rationale:** Engineers typically blame their own model size and propose quantization without recognizing that the camera ISP's memory allocation is completely invisible and out of their control.
    **The Consequence:** Wasted time over-quantizing a model that already fits in the app's budget, while the system crashes persist.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - App footprint: 0.82 GB.
       - OS footprint: 1.5 GB.
       - Camera ISP (HDR pipeline): ~1.2 GB.
       - Total System RAM Limit: 4.0 GB.
    2. **Calculations:**
       - Total Active Memory: 1.5 GB + 1.2 GB + 0.82 GB = 3.52 GB.
       - Remaining Headroom: 4.0 GB - 3.52 GB = 0.48 GB.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Capacity-Bound (Jetsam)**. The system operates perilously close to the 4 GB boundary. A slight spike in OS or ISP background allocations immediately triggers a Jetsam kill.
