title: 'Network Bandwidth Bottlenecks: Implement TPOT Formula and Arithmetic Intensity Analysis'
scenario: 'Implement the arithmetic intensity analysis for a 1B INT4 LLM decode step on A17 Pro (35 TOPS
  Neural Engine, 68 GB/s). Compute: arithmetic intensity (FLOPs/byte), peak FLOPS-bound TPOT, peak BW-bound
  TPOT, and determine which bottleneck applies. Show the roofline model calculation.'
details:
  realistic_solution: 'Model: 1B params INT4. Decode step: process 1 token through all layers. FLOPs:
    2 × 1B params × 1 token = 2B FLOPs. Bytes read: 500MB INT4 weights (all must be read once). Arithmetic
    intensity: 2B FLOPs / 0.5GB = 4 FLOPs/byte. Ridge point (NE): 35 TOPS / 68 GB/s = 514 FLOPs/byte.
    Since 4 << 514, strongly memory-bandwidth-bound. BW-bound TPOT: 0.5GB / 68GB/s = 7.35ms. FLOPS-bound
    TPOT: 2B / 35T = 0.057ms. Actual TPOT ≈ 7.35ms (BW-limited, not compute). To become compute-bound:
    need batch ≥ 514/4 = 128.5 → batch ≥ 129 tokens simultaneously.'
  common_mistake: Computing arithmetic intensity using full model FLOPs without noting that decode processes
    only 1 token at a time, making it heavily memory-bandwidth-bound regardless of compute capability.
  napkin_math: 'Arithmetic intensity: 2B FLOPs / 0.5GB = 4 FLOPs/byte. Ridge: 35T/68G=514 FLOPs/byte.
    4 << 514 → BW-bound. TPOT: max(2B/35T, 0.5/68) = max(0.057ms, 7.35ms) = 7.35ms. To shift to compute-bound:
    batch B where B×2B FLOPs / 0.5GB = 514: B=514×0.5/2=128.5 tokens. Batch=129: TPOT=129×2B/(35T)=7.37ms
    (break-even). Above batch=129: compute-bound.'
