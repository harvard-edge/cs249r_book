title: Real-Time Sensor Fusion Ingestion Sizing
scenario: You are designing a continuous real-time sensor fusion and gesture recognition pipeline for
  an AR application running on a device powered by the Samsung Exynos 2400 NPU. The system ingests streaming
  data from dual cameras (60fps) and IMU sensors, computing spatial features in real-time before passing
  them to the dual-core NPU for gesture classification. Given the shared 12 GB LPDDR5X memory architecture
  and 34.7 TOPS compute capacity, size the buffer requirements and evaluate the memory bandwidth tradeoffs
  to ensure zero dropped frames without starving the concurrent ISP or GPU workloads.
question: "How would you size real-time sensor fusion ingestion using shared memory ring buffers?"
details:
  realistic_solution: An L5 candidate will evaluate the shared memory architecture and propose an early-fusion,
    event-driven pipeline where the ISP writes downsampled regions of interest (ROIs) directly to a fixed-size
    ring buffer. By keeping the ingestion buffer extremely lean, they avoid cache thrashing and memory
    bus contention. Furthermore, they will partition the dual-core NPU workloads, dedicating one core
    to the continuous, low-latency stream processing to ensure predictable scheduling, while minimizing
    main memory round-trips.
  common_mistake: Candidates often treat the NPU's 34.7 TOPS as entirely available for the ML model, ignoring
    the pipeline overhead and the fact that memory bandwidth on the shared 12 GB LPDDR5X is the actual
    bottleneck. They frequently design ingestion pipelines that queue uncompressed video frames in memory,
    leading to bandwidth saturation when the CPU, GPU, and ISP concurrently access the same shared memory
    pool.
  napkin_math: Dual 1080p cameras at 60fps in RGB generate 1920x1080 * 3 bytes * 60fps * 2 cameras = 746
    MB/s of raw streaming data. If naive double-buffering is used in the shared 12 GB LPDDR5X, raw ingestion
    alone consumes ~1.5 GB/s of memory bandwidth. A continuous gesture model requiring 50 GOPS per frame
    at 60fps demands 3 TOPS (50 * 10^9 * 60). The Exynos 2400 NPU has 34.7 TOPS, meaning compute utilization
    is comfortably low at ~8.6%. However, if the raw video stream thrashes the cache, forcing the model's
    50MB INT8 weights to reload from main memory every frame, it adds 3 GB/s (50MB * 60) of bandwidth
    overhead, proving that ingestion sizing must aggressively downsample before hitting main memory.
