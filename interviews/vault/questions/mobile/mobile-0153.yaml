title: Federated Averaging's Blind Spot
scenario: You are the ML engineer for a popular mobile keyboard app with 10 million users. After a recent update, your federated analytics dashboard shows that global next-word-prediction accuracy dropped by just 1%, from 80% to 79%. Digging deeper, you find this drop is entirely caused by a silent bug affecting a specific phone model that represents 20% of your user base.
question: "How can this seemingly small global drop hide a significant problem, and what is the actual accuracy degradation for the affected 20% of users?"
details:
  realistic_solution: |
    The core issue is that federated averaging smooths out errors across the entire fleet. A large error in a smaller segment gets diluted when averaged with the 80% of the fleet that has no error. The 1% global drop is not noise; it is a signal of a concentrated problem. The 2 million users in the affected segment are experiencing a significant degradation that is 5 times worse than the global metric suggests.
  common_mistake: |
    **The Pitfall:** Trusting the aggregate metric implicitly.
    **The Rationale:** Seeing a 1% global drop, engineers might deprioritize it as statistical noise. They fail to recognize that federated averaging smooths out errors across the entire fleet.
    **The Consequence:** A severe, concentrated failure affecting a large sub-population of users is ignored.
  napkin_math: |
    - **Global accuracy drop:** 1%
    - **Affected segment size:** 20% (0.2)
    - **Unaffected segment size:** 80% (0.8)
    - **Equation:** (0.8 * 0%) + (0.2 * Local Drop) = 1%
    - **Solve for Local Drop:** 0.2 * Local Drop = 1% -> Local Drop = 1% / 0.2 = 5%
    - **Result:** **The accuracy for the affected segment dropped by 5%.**
  options:
  - The accuracy for affected users dropped by 1%. The problem is being exaggerated.
  - The accuracy for affected users dropped by 20%. The model is completely broken for them.
  - The accuracy for affected users dropped by 5%. A significant degradation is being masked by the fleet average.
  - It's impossible to tell the local drop without knowing the new local accuracy value directly.
  correct_index: 2
