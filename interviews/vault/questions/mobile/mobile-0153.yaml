title: Federated Averaging's Blind Spot
scenario: "You are the ML engineer for a mobile keyboard app with 10 million users. A recent update shows global next-word-prediction accuracy dropped by just 1%. Digging deeper, you find this drop is entirely caused by a silent bug affecting a specific phone model that represents 20% of your user base."
question: "How can this seemingly small global drop hide a significant problem, and what is the actual accuracy degradation for the affected 20% of users?"
details:
  realistic_solution: |
    Federated averaging mathematically masks catastrophic heterogeneous client failures by diluting them across the majority healthy population. A 1% global fleet drop isolated entirely to a 20% user cohort indicates a severe, concentrated regression. Deploy stratified performance monitoring and device-specific telemetry aggregation to detect anomalies inside specific hardware configurations rather than relying on blunt fleet-wide averages.
  common_mistake: |
    **The Pitfall:** Trusting the aggregate metric implicitly.
    **The Rationale:** Seeing a 1% global drop, engineers might deprioritize it as statistical noise, failing to recognize that federated averaging smooths out errors.
    **The Consequence:** A severe, concentrated failure affecting a large sub-population of users is ignored.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Global accuracy drop: 1% (0.01).
       - Affected cohort size: 20% (0.20).
       - Unaffected cohort size: 80% (0.80), drop = 0%.
    2. **Calculations:**
       - Equation: (0.80 * 0%) + (0.20 * Local Drop) = 1%.
       - 0.20 * Local Drop = 0.01.
       - Local Drop = 0.01 / 0.20 = 0.05 (5%).
    3. **Conclusion & Interpretation:**
       - **Result: 5% localized degradation.** The global average masks the severity. This highlights a critical **observability bottleneck** in federated systems.
  options:
  - The accuracy for affected users dropped by 1%. The problem is being exaggerated.
  - The accuracy for affected users dropped by 20%. The model is completely broken for them.
  - The accuracy for affected users dropped by 5%. A significant degradation is being masked by the fleet average.
  - It's impossible to tell the local drop without knowing the new local accuracy value directly.
  correct_index: 2
