title: Federated Averaging's Blind Spot
scenario: You are the ML engineer for a popular mobile keyboard app with 10 million users. After a recent
  update, your federated analytics dashboard shows that global next-word-prediction accuracy dropped by
  just 1%, from 80% to 79%. Digging deeper, you find this drop is entirely caused by a silent bug affecting
  a specific phone model that represents 20% of your user base. Explain how this seemingly small global
  drop can hide a significant problem and calculate the actual accuracy degradation experienced by users
  of that specific phone model.
details:
  realistic_solution: The core issue is that federated averaging smooths out errors across the entire
    fleet. A large error in a smaller segment gets diluted when averaged with the 80% of the fleet that
    has no error. The 1% global drop is not noise; it is a signal of a concentrated problem. The 2 million
    users in the affected segment are experiencing a significant degradation that is 5 times worse than
    the global metric suggests.
  common_mistake: Engineers often trust the aggregate metric implicitly. Seeing a 1% global drop, they
    might deprioritize it as statistical noise or a minor regression. They fail to recognize that in a
    federated system, a small global average change can mask a severe, concentrated failure affecting
    a large sub-population of users.
  napkin_math: The global accuracy drop is the weighted average of the accuracy drops across all user
    segments.
  options:
  - The accuracy for affected users dropped by 1%. The problem is being exaggerated.
  - The accuracy for affected users dropped by 20%. The model is completely broken for them.
  - The accuracy for affected users dropped by 5%. A significant degradation is being masked by the fleet
    average.
  - It's impossible to tell the local drop without knowing the new local accuracy value directly.
  correct_index: 2
