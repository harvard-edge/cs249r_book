title: The Speculative Decoding Gambit
scenario: On a mobile device, your main 7B LLM generates at 5 tokens/second (memory-bandwidth-bound). You add a 150M draft model that runs at 20 tokens/second. The draft model proposes 4 tokens at a time, and on average 3 are accepted by the verifier.
question: What is the effective token throughput with speculative decoding?
details:
  realistic_solution: 'Draft time: 4 tokens / 20 tok/s = 0.2s. Verification: 1 forward pass of large model = 0.2s. Total: 0.4s for 4 accepted tokens (3 accepted + 1 from verification). Effective: 4/0.4 = 10 tok/s, a 2x speedup over the baseline 5 tok/s.'
  common_mistake: |
    **The Pitfall:** Assuming speculative decoding speeds simply add together.
    **The Rationale:** Engineers fail to realize that the large verifier model evaluates multiple draft tokens in a single batch forward pass, costing the same time as generating one token.
    **The Consequence:** They misunderstand the mechanism that breaks the memory-bandwidth bottleneck.
  napkin_math: |
    1. Main model generation speed: 5 tok/s (200ms per token).
    2. Draft model generation speed: 20 tok/s (50ms per token).
    3. Draft time for 4 tokens: 4 * 50ms = 200ms.
    4. Verification time (1 forward pass of main model): 200ms.
    5. Total cycle time: 200ms + 200ms = 400ms.
    6. Tokens yielded: 3 draft accepted + 1 verified = 4 tokens.
    7. **Effective throughput: 4 tokens / 0.4 seconds = 10 tok/s.**
  options:
  - A) 25 tok/s. The draft and main model speeds simply add together.
  - B) 10 tok/s. Draft takes 200ms, verification takes 200ms, yielding 4 tokens per 400ms cycle.
  - C) 5 tok/s. Speculative decoding cannot improve throughput on a bandwidth-bound device.
  - D) 20 tok/s. The draft model does all the work and the verifier only rejects occasionally.
  correct_index: 1
