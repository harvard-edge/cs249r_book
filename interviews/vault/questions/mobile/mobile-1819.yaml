title: 'Chiplet Interconnect Bandwidth for Multi-Model Mobile'
scenario: 'A Snapdragon 8 Gen 3 phone runs 3 concurrent ML models: face detection on NPU (2 TOPS), background blur on GPU (1.5 TFLOPS FP16), and voice recognition on DSP (0.5 TOPS). All share 68.3 GB/s LPDDR5X bandwidth.'
question: 'How would you calculate total memory bandwidth demand and determine if the NoC is the bottleneck?'
details:
  realistic_solution: 'Face detection (MobileNetV2-SSD, 3.4M params INT8 = 3.4 MB): runs at 30 fps. Weight load: 3.4 MB × 30 = 102 MB/s. Activations: peak 5 MB × 30 × 2 (read+write) = 300 MB/s. Total: 402 MB/s. Background blur (DeepLabV3, 11M params FP16 = 22 MB): runs at 30 fps. Weight: 22 × 30 = 660 MB/s. Activations: 12 × 30 × 2 = 720 MB/s. Total: 1,380 MB/s. Voice (Conformer, 30M params INT8 = 30 MB): runs continuously, 100 inferences/s. Weight: 30 × 100 = 3,000 MB/s. Activations: 2 × 100 × 2 = 400 MB/s. Total: 3,400 MB/s. Grand total: 5,182 MB/s = 5.18 GB/s. LPDDR5X at 68.3 GB/s: utilization = 7.6% — NOT the bottleneck. The NoC (60 GB/s) is also far from saturated. The bottleneck is compute, not interconnect, for these small models.'
  common_mistake: 'Summing only the model weight loads and ignoring activation memory traffic. Each model generates intermediate activations that must be read/written through the memory hierarchy, often exceeding weight load bandwidth.'
  napkin_math: |
    **Assumptions & Constraints:**
    - LPDDR5X bandwidth: 68.3 GB/s.
    - NoC bandwidth: 60 GB/s.

    **Calculations:**
    - Face detection load: 402 MB/s.
    - Background blur load: 1,380 MB/s.
    - Voice recognition load: 3,400 MB/s.
    - Total bandwidth demand: 5,182 MB/s (5.18 GB/s).
    - LPDDR5X utilization: 5.18 GB/s / 68.3 GB/s = 7.6%.
    - NoC utilization: 5.18 GB/s / 60 GB/s = 8.6%.

    **Conclusion & Interpretation:**
    - **Result: 5.18 GB/s (Compute-Bound).** Bottleneck shifts to bandwidth only for models >500M params at real-time rates (Crossover: 500M * 1 byte * 30 fps = 15 GB/s = 22% of LPDDR5X).
