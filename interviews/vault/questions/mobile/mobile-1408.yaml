title: Optimizing On-Device Calibration Data Curation for NPU
scenario: We are deploying an on-device personalization model to the Qualcomm Hexagon
  NPU (Snapdragon 8 Gen 3) for privacy-preserving visual search. To utilize the NPU's
  45 TOPS INT8 compute, we must perform on-device post-training quantization using
  the user's local photo gallery. The initial implementation randomly samples and
  loads 5,000 full-resolution photos for the calibration dataset, but it frequently
  crashes the application due to out-of-memory errors on the device's shared 16 GB
  LPDDR5X memory.
question: How would you curate calibration data for NPU quantization without loading
  the full image corpus into memory?
details:
  realistic_solution: The solution is to optimize the calibration dataset curation
    through a streaming, core-set selection approach. Instead of loading all images
    simultaneously, we stream images sequentially, using the CPU to extract lightweight
    embeddings and selecting a highly diverse, representative subset of 500 images.
    This curated subset is then processed on the NPU in small batches to compute the
    precise INT8 scaling factors, fully resolving the memory bottleneck while maintaining
    post-quantization accuracy.
  common_mistake: Candidates often suggest moving calibration to the GPU or cloud,
    ignoring privacy constraints and failing to realize that the CPU, GPU, and NPU
    all share the same 16 GB LPDDR5X memory pool. They may also suggest aggressively
    downsampling the images before curation, which distorts the activation distributions
    needed for accurate INT8 calibration.
  napkin_math: An uncompressed 12-megapixel image requires roughly 36 MB of memory
    (12,000,000 pixels * 3 bytes). Loading 5,000 random images simultaneously requires
    180 GB of RAM, which makes it impossible to fit in the Snapdragon 8 Gen 3's 16
    GB LPDDR5X shared memory. By curating a diverse subset of 500 images and streaming
    them for calibration in batches of 16, the active memory footprint drops to 16
    * 36 MB = 576 MB. Assuming a 10 GOPS model, running the 500 curated images through
    the 45 TOPS NPU requires 5,000 GOPs (5 TOPS), which takes only ~0.11 seconds of
    compute, proving memory capacity—not compute—was the fatal bottleneck.
