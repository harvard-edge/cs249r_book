title: Mobile Assistant Latency Budget
scenario: A mobile assistant has a 250 ms interaction budget. On a Snapdragon NPU,
  encoder inference takes 70 ms, decoder setup takes 25 ms, app scheduling adds 20
  ms, and network fallback adds 120 ms only when local confidence is below threshold.
  Size the local path and decide how much headroom remains before fallback is needed.
question: How much latency headroom remains on the local mobile path before a 250
  ms budget is exceeded?
details:
  realistic_solution: The local path is 70 + 25 + 20 = 115 ms, leaving 135 ms of headroom.
    If network fallback is invoked, total becomes 235 ms, still under 250 ms but with
    only 15 ms headroom. The design should keep fallback rare and monitor P95/P99
    scheduling variance.
  common_mistake: Looking only at NPU inference and ignoring app scheduling and fallback
    latency.
  napkin_math: Local = 70 + 25 + 20 = 115 ms. Headroom = 250 - 115 = 135 ms. With
    fallback = 115 + 120 = 235 ms.
