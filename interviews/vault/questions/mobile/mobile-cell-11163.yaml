title: 'KV-Cache: Optimize KV Pruning for Token Budget on Snapdragon 8 Gen 3'
scenario: 'Your 1B LLM on Snapdragon 8 Gen 3 (45 TOPS INT8, 16GB) has a 2048-token KV cache budget. Long
  legal documents require 8192 tokens. Implement and compare two KV pruning strategies: (A) stride-based
  retention (keep every 4th token), (B) attention-score-based retention (H2O: keep top-25% by cumulative
  attention). Evaluate quality preservation and latency.'
details:
  realistic_solution: H2O (attention-based) significantly outperforms stride-based for documents with
    uneven information density (legal documents have key clauses and boilerplate). Stride-based may be
    faster to compute. Evaluate both on actual legal QA benchmarks.
  common_mistake: Using stride-based pruning for all tasks regardless of content structure; not computing
    the actual quality difference between uniform vs importance-based pruning.
  napkin_math: 'From 8192 tokens, retain 2048 = 25%. Stride-based: keep tokens 0, 4, 8, 12... always evenly
    spaced. Misses: important clauses may fall in removed tokens. H2O: tracks cumulative attention weights
    per token across all layers and heads. Keep top-512 + last 1536 most recently generated. Quality on
    legal QA: stride-based typically 15-25% worse than H2O for key clause retrieval. H2O compute overhead:
    track 8192 attention scores per layer per step. 32 layers × 8192 tokens × 4B = 1MB tracking buffer.
    Update each step: 32 × 8192 multiplications = 262K ops → at 45 TOPS: 0.006µs — negligible. Pruning
    step (every 100 tokens generated): sort 8192 scores (O(n log n)): 8192 × 13 = 106K ops → 0.002µs.
    H2O overhead: effectively zero. Latency at 2048 effective KV: 2048 × 49.2KB/token (INT8) = 100.7MB
    KV read. At 68 GB/s: 1.48ms. Plus weight load (500MB INT4): 7.35ms. Total: 8.83ms → 113 tok/sec. H2O
    quality retention: 85-90% of full-context performance (vs 60-75% for stride).'
