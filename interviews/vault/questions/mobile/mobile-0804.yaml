title: Mobile New 0003
scenario: An image segmentation model runs perfectly on a mobile NPU in 20ms. You replace the ReLU activations with SiLU to boost accuracy. Suddenly, latency spikes to 850ms, and the SoC CPU usage maxes out to 100%.
question: Why did replacing ReLU with SiLU make the mobile NPU segmentation model jump from 20ms to 850ms?
details:
  realistic_solution: 'The massive latency spike and high CPU utilization are symptoms of operator fallback. The NPU compiler does not natively support the SiLU activation. Consequently, the execution graph fractures: the NPU computes the convolution, copies the tensor back to system DRAM, the CPU computes SiLU, and copies it back to the NPU. This CPU execution and memory roundtrip completely destroys performance.'
  common_mistake: |
    **The Pitfall:** Assuming all standard framework activation functions are implemented in hardware by mobile NPU vendors.
    **The Rationale:** Developers accustomed to cloud GPUs take operator support for granted.
    **The Consequence:** Unintentionally breaking the execution graph, causing severe CPU fallback and latency spikes.
  napkin_math: |
    * NPU Conv: 2ms. Tensor size: 10MB.
    * DRAM copy NPU to CPU: 10MB / 10GB/s = 1ms.
    * CPU SiLU execution: 10M elements × 20 cycles / 2GHz = 100ms.
    * CPU to NPU copy: 1ms.
    * Total latency per layer: 2ms + 1ms + 100ms + 1ms = 104ms.
    * **For an 8-layer network, total latency is 8 × 104ms = 832ms, explaining the massive jump.**
