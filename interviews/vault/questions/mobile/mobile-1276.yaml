title: NPU Frame Drops During Real-Time Sensor Ingestion
scenario: Your team deployed a real-time object detection model on the Samsung Exynos 2400 NPU to process high-resolution video streams directly from the camera. During testing, the pipeline experiences severe stuttering and drops frames, failing to maintain 30 FPS. Profiling shows that the dual-core NPU is only operating at 30% of its maximum 34.7 TOPS capacity, but system memory access times have skyrocketed.
question: Why does Exynos 2400 NPU frame processing stutter at 30 FPS with only 30% NPU utilization but high memory latency?
details:
  realistic_solution: The root cause is memory bandwidth saturation and bus contention across the shared 12 GB LPDDR5X memory, which serves the CPU, GPU, ISP, and NPU. Because the Image Signal Processor (ISP) and NPU share the same physical memory, inefficient ingestion—such as copying frames between CPU buffers and NPU buffers instead of using zero-copy hardware buffers—saturates the memory bus and starves the NPU.
  common_mistake: |
    **The Pitfall:** Assuming compute capacity is the bottleneck.
    **The Rationale:** Candidates incorrectly guess the NPU lacks TOPS or needs further quantization, failing to recognize memory bandwidth saturation from unoptimized data ingestion.
    **The Consequence:** Unnecessary model compression that degrades accuracy without fixing the underlying memory bus contention.
  napkin_math: |
    1. **Baseline Bandwidth:** 4K 60 FPS stream (3840 x 2160 x 3 bytes x 60) requires ~1.49 GB/s.
    2. **Inefficient Copies:** Copying from ISP -> CPU buffer -> NPU buffer triples bandwidth to ~4.5 GB/s just for data movement.
    3. **Conclusion:** **This heavy memory traffic competes with the OS and GPU on the shared LPDDR5X bus, starving the NPU despite low compute utilization.**
