title: NPU Frame Drops During Real-Time Sensor Ingestion
scenario: Your team deployed a real-time object detection model on a mobile NPU to process high-resolution video streams directly from the camera. During testing, the pipeline experiences severe stuttering and drops frames, failing to maintain 30 FPS. Profiling shows that the NPU is only operating at 30% of its maximum capacity, but system memory access times have skyrocketed.
question: Why does NPU frame processing stutter at 30 FPS with only 30% NPU utilization but high memory latency?
details:
  realistic_solution: The root cause is memory bandwidth saturation and bus contention across the shared LPDDR5X memory, which serves the CPU, GPU, ISP, and NPU. Because the Image Signal Processor (ISP) and NPU share the same physical memory, inefficient ingestion—such as copying frames between CPU buffers and NPU buffers instead of using zero-copy hardware buffers—saturates the memory bus and starves the NPU.
  common_mistake: |
    **The Pitfall:** Assuming compute capacity is the bottleneck.
    **The Rationale:** Candidates incorrectly guess the NPU lacks TOPS or needs further quantization, failing to recognize memory bandwidth saturation from unoptimized data ingestion.
    **The Consequence:** Unnecessary model compression that degrades accuracy without fixing the underlying memory bus contention.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Video Stream = 4K (3840 x 2160) at 60 FPS, 3 bytes/pixel (RGB).
       - NPU utilization = 30%.
       - Pipeline copies memory from ISP to CPU to NPU instead of zero-copy.
    2. **Calculations:**
       - Base Bandwidth = 3840 * 2160 * 3 bytes * 60 = 1.49 GB/s.
       - Unoptimized Memory Copies (ISP -> CPU -> NPU) = 1.49 GB/s * 3 = 4.47 GB/s raw data movement overhead.
    3. **Conclusion & Interpretation:** **This heavy, redundant memory traffic saturates the shared LPDDR5X bus, completely starving the NPU despite its low 30% compute utilization.** Memory-bandwidth-bound starvation.
