title: Designing for Memory Pressure on Google Tensor G3
scenario: You are tasked with deploying a large language model (LLM) onto a mobile device powered by the
  Google Tensor G3. This device features a 7.5 TOPS on-device TPU and 12 GB of LPDDR5X memory. The LLM,
  when fully loaded, requires 10 GB of memory for its weights and activations, and an additional 4 GB
  during inference for intermediate tensors. Your goal is to optimize the LLM for real-time, low-latency
  inference on this platform while strictly avoiding out-of-memory (OOM) errors and minimizing memory
  fragmentation, which can lead to performance degradation over long sessions. Design a system that efficiently
  manages memory pressure, considering techniques like gradient accumulation (if applicable for dynamic
  batching inference), OS-level eviction strategies, and overall memory footprint reduction.
details:
  realistic_solution: 'A robust solution would involve a multi-pronged approach:

    1.  **Quantization & Pruning:** Aggressively quantize the LLM (e.g., to 4-bit or 2-bit integer) and
    prune redundant layers/neurons to reduce the base model size, ideally bringing it well under 10 GB.

    2.  **Dynamic Tensor Management:** Implement a custom memory allocator (or leverage an existing on-device
    ML framework''s allocator) that proactively reuses memory blocks for intermediate tensors, possibly
    using a memory pool or slab allocator to combat fragmentation.

    3.  **OS-level Interaction:** Interface with the OS''s memory management APIs to influence page eviction
    policies (e.g., advising on page usage with `madvise` on Linux-based Android) or to understand memory
    pressure signals.

    4.  **Model Partitioning/Offloading:** If the model still exceeds physical memory, explore partitioning
    the model and offloading less frequently accessed layers or parts of the computation to external storage
    (e.g., NVMe or even slower flash, although this impacts latency) or streaming weights as needed.

    5.  **Batching/Gradient Accumulation (Inference Context):** While gradient accumulation is typically
    for training, dynamic batching for inference can also be a memory concern. If multiple small requests
    are batched, ensure the batch size is dynamically adjusted based on available memory. If ''gradient
    accumulation'' is meant in a broader sense of accumulating operations to reduce peak memory, it could
    involve fusing operations or strategically delaying memory allocations until strictly necessary.

    6.  **Memory Profiling:** Utilize on-device profiling tools (e.g., Android GPU Inspector, Perfetto)
    to accurately measure peak memory usage and identify fragmentation hotspots.'
  common_mistake: A common mistake is to only consider the static memory footprint of the model weights,
    ignoring dynamic allocations for activations, intermediate tensors, and OS overheads. Another pitfall
    is to apply desktop-centric memory management strategies without accounting for the constrained and
    often non-contiguous memory access patterns typical of mobile LPDDR5X, leading to excessive fragmentation
    or unexpected OOMs during peak load.
  napkin_math: 'Given 12 GB LPDDR5X total, and assuming 2 GB for OS/system processes, we have 10 GB usable
    for the LLM. If the LLM requires 10 GB for weights + 4 GB for activations/intermediate tensors (total
    14 GB peak), it will OOM.

    *   **Quantization:** Reducing model precision from FP16 (2 bytes/param) to INT4 (0.5 bytes/param)
    yields a 4x memory reduction. A 10 GB model in FP16 becomes 2.5 GB in INT4.

    *   **Activation Compression:** If activations are FP16, 4 GB represents `4 * 1024^3 / 2 = 2 * 10^9`
    parameters/activations. If we can compress these by 2x or use techniques like activation checkpointing,
    we can reduce this to 2 GB.

    *   **New Total:** 2.5 GB (weights) + 2 GB (activations) = 4.5 GB, which is well within the 10 GB
    usable memory. This simple calculation shows the potential impact of quantization alone, making the
    problem tractable.'
