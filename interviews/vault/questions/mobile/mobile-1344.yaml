title: 'On-Device MMD Drift Window Sizing'
scenario: 'You are designing an on-device statistical drift detection system for a vision model deployed on the Apple A17 Pro. You compute the Maximum Mean Discrepancy (MMD) between a reference set and a sliding window of actual serving embeddings. The 16-core Neural Engine extracts these 512-dimensional float16 embeddings. The OS restricts your background drift process to a strict 50 MB memory limit.'
question: 'How many embeddings and minutes of history fit in a 50MB A17 Pro drift-detection window at 30 FPS?'
details:
  realistic_solution: 'The correct approach is to calculate the precise byte size of a single embedding and divide the strict 50 MB memory budget by this size. MMD is an effective statistical detection method for high-dimensional data, but on mobile platforms like the A17 Pro, shared unified memory constraints dictate the sample size. A 50 MB budget is realistic to avoid OS kills while maintaining a sufficiently large sample size for reliable MMD calculation over a roughly 28-minute sliding window.'
  common_mistake: |
    **The Pitfall:** Overestimating memory limits for background mobile ML processes.
    **The Rationale:** Candidates fail to realize that shared unified memory architecture restricts background processes strictly to prevent foreground app stutter.
    **The Consequence:** The background drift detector allocates a large MMD window, causing the OS to forcefully kill the process.
  napkin_math: |
    **Assumptions & Constraints:**
    - Background memory limit: 50 MB.
    - Embedding format: 512 dimensions, float16 (2 bytes/dim).
    - Inference rate: 30 FPS.

    **Calculations:**
    - Embedding Size: 512 × 2 = 1,024 bytes.
    - Budget in Bytes: 50 × 1024 × 1024 = 52,428,800 bytes.
    - Max Embeddings: 52,428,800 / 1024 = 51,200 embeddings.
    - Time Window: 51,200 embeddings / 30 FPS = 1,706.67 seconds.

    **Conclusion & Interpretation:**
    - **Result: 51,200 embeddings (Memory-Capacity-Bound)**. The 50 MB window holds 51,200 embeddings, providing ~28.4 minutes of historical drift detection before eviction.
