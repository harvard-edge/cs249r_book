title: Mobile New 0002
scenario: A Cortex-M4 (168MHz) runs a 1D convolution with 13 input channels. The latency is 3x higher
  than an identically structured layer with 16 channels, despite doing 20% fewer theoretical MACs. Profiling
  shows high core active time.
question: "Why can a 13-channel Cortex-M4 convolution be 3x slower than a 16-channel convolution with more MACs?"
details:
  realistic_solution: The symptom of higher latency for fewer channels points to a compiler alignment
    fallback. Libraries like CMSIS-NN optimize for multiples of 4 channels using SIMD instructions (e.g.,
    SMLAD) to perform 2 MACs per cycle. With 13 channels, the compiler falls back to a scalar unrolled
    loop, taking multiple cycles per MAC. The root cause is the abandonment of vectorization due to unaligned
    channel counts.
  common_mistake: Believing latency strictly scales down linearly with FLOP count and ignoring compiler
    alignment and SIMD rules.
  napkin_math: '16-ch SIMD: 16 MACs = 8 cycles (2 MACs/cycle). 13-ch scalar: 13 MACs * 2 cycles/MAC =
    26 cycles. Latency ratio = 26 / 8 = 3.25x latency multiplier despite 13 < 16.'
