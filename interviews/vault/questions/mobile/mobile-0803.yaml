title: Mobile New 0002
scenario: 'A Cortex-M4 (168MHz) runs a 1D convolution with 13 input channels. The latency is 3x higher than an identically structured layer with 16 channels, despite doing 20% fewer theoretical MACs.'
question: 'Why can a 13-channel Cortex-M4 convolution be 3x slower than a 16-channel convolution with more MACs?'
details:
  realistic_solution: 'The symptom of higher latency for fewer channels points to a compiler alignment fallback. Compilers optimize for multiples of 4 channels using SIMD instructions to perform 2 MACs per cycle. With 13 channels, the compiler abandons vectorization and falls back to a scalar unrolled loop, taking multiple cycles per MAC.'
  common_mistake: |
    **The Pitfall:** Assuming latency scales perfectly linearly with FLOP counts.
    **The Rationale:** Candidates memorize FLOPs = latency, completely ignoring low-level compiler memory alignment and vectorization rules.
    **The Consequence:** Designing theoretically optimal models that compile into incredibly slow scalar loops, destroying real-world performance.
  napkin_math: |
    1. **Aligned Execution (16-ch SIMD):** 16 MACs = 8 cycles (2 MACs/cycle via SIMD).
    2. **Unaligned Execution (13-ch scalar):** 13 MACs × 2 cycles/MAC = 26 cycles.
    3. **Latency Ratio:** 26 / 8 = **3.25x latency increase**, making the 13-channel operation over 3x slower despite fewer MACs.
