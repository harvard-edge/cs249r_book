title: Sizing KV-Cache for On-Device LLMs on Tensor G3
scenario: You are deploying a 3B parameter model, similar to Gemini Nano, on the Google Tensor G3 for an on-device document summarization feature. The device features 12 GB of LPDDR5X RAM, but Android OS and background apps reserve 8 GB, leaving a strict 4 GB budget for your ML workload. You need to evaluate the system-level tradeoffs between context length limits, KV-cache quantization, and memory bandwidth, ensuring the workload respects the 4 GB memory limit and effectively utilizes the 7.5 TOPS TPU.
question: How should KV-cache and model weights be sized for a Tensor G3 on-device LLM?
details:
  realistic_solution: The optimal solution requires aggressive quantization of the model weights (e.g., 4-bit) to free up memory for the KV-cache, alongside architectural choices like Grouped-Query Attention (GQA). By evaluating the exact memory footprint of the KV-cache for an 8k context window, the candidate should conclude that 4-bit weight quantization combined with fp16 or int8 KV-cache provides the best balance of context length and generation speed, keeping the total footprint well under the 4 GB limit and avoiding out-of-memory crashes.
  common_mistake: |
    **The Pitfall:** Focusing solely on the model weight size without considering the KV-cache.
    **The Rationale:** Candidates often assume a 3B model will simply fit in the budget, neglecting the linear memory growth of the KV-cache at long sequence lengths.
    **The Consequence:** They miss that generation on mobile is deeply memory-bandwidth bound rather than compute bound, resulting in out-of-memory crashes or severe bottlenecking.
  napkin_math: |
    *   **KV-cache per token:** `2 (K, V) * 32 layers * 128 (head dim) * 8 (KV heads) * 2 bytes = 131,072 bytes (128 KB/token)`
    *   **KV-cache for 8,192 context:** `8192 * 128 KB = 1,048,576 KB ≈ 1.0 GB`
    *   **Quantized Weights:** `3B model at 4-bit = ~1.5 GB`
    *   **Total Memory Footprint:** `1.5 GB (weights) + 1.0 GB (KV cache) = 2.5 GB`
    *   **Bandwidth Requirement:** `10 tokens/sec * 2.5 GB = 25 GB/s`
    *   **Result:** **2.5 GB fits within the 4 GB budget, and 25 GB/s is feasible on LPDDR5X.**
