title: Sizing KV-Cache for On-Device LLMs on Tensor G3
scenario: You are deploying a 3B parameter model, similar to Gemini Nano, on the Google
  Tensor G3 for an on-device document summarization feature. The device features 12
  GB of LPDDR5X RAM, but Android OS and background apps reserve 8 GB, leaving a strict
  4 GB budget for your ML workload. You need to evaluate the system-level tradeoffs
  between context length limits, KV-cache quantization, and memory bandwidth, ensuring
  the workload respects the 4 GB memory limit and effectively utilizes the 7.5 TOPS
  TPU.
question: How should KV-cache and model weights be sized for a Tensor G3 on-device
  LLM?
details:
  realistic_solution: The optimal solution requires aggressive quantization of the
    model weights (e.g., 4-bit) to free up memory for the KV-cache, alongside architectural
    choices like Grouped-Query Attention (GQA). By evaluating the exact memory footprint
    of the KV-cache for an 8k context window, the candidate should conclude that 4-bit
    weight quantization combined with fp16 or int8 KV-cache provides the best balance
    of context length and generation speed, keeping the total footprint well under
    the 4 GB limit and avoiding out-of-memory crashes.
  common_mistake: Candidates often focus solely on the model weight size (e.g., assuming
    a 3B int8 model takes 3GB and fits in the 4GB budget) while neglecting the linear
    memory growth of the KV-cache at long sequence lengths. They also frequently miss
    that generation on mobile is deeply memory-bandwidth bound rather than compute
    bound, rendering the 7.5 TOPS theoretical limit secondary to LPDDR5X constraints.
  napkin_math: 'Assume a 3B model with 32 layers, head dimension of 128, and 8 KV
    heads (GQA). KV-cache per token (fp16) = 2 (K, V) * 32 layers * 128 (head dim)
    * 8 (KV heads) * 2 bytes = 131,072 bytes (128 KB/token). For an 8,192 token context
    window: 8192 * 128 KB = 1,024 MB (1 GB). A 3B model quantized to 4-bit takes ~1.5
    GB. Total memory = 1.5 GB (weights) + 1.0 GB (KV cache) = 2.5 GB, which safely
    fits within the 4 GB available on the Tensor G3''s 12 GB LPDDR5X. To generate
    at 10 tokens/sec, the memory bandwidth required is roughly 10 * 2.5 GB = 25 GB/s,
    which is feasible on LPDDR5X but highlights why 8-bit weights (requiring ~55 GB/s)
    would bottleneck generation.'
