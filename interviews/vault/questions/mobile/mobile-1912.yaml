title: INT4 Quantization Bandwidth Impact
scenario: Deploying a transformer model on the Apple A17 Pro Neural Engine. The weights
  are quantized from FP16 to INT4 (0.5 bytes/param).
question: Calculate the factor by which memory bandwidth requirements are reduced
  and explain the secondary cache effect.
visual:
  kind: svg
  path: mobile-1912.svg
  alt: Bar chart comparing FP16 footprint spilling out of SRAM vs INT4 footprint fitting
    entirely inside.
  caption: Cache Footprint Reduction
details:
  realistic_solution: Moving from FP16 (2 bytes) to INT4 (0.5 bytes) reduces the raw
    weight memory payload by a factor of 4. Secondarily, because the footprint is
    4x smaller, more weights fit directly inside the Neural Engine's L1/L2 SRAM cache
    hierarchy, exponentially reducing cache misses and expensive LPDDR5 main memory
    trips.
  common_mistake: Only identifying the 4x linear bandwidth reduction without mentioning
    the non-linear benefit of increased cache hit rates.
  napkin_math: 2 bytes / 0.5 bytes = 4x reduction
