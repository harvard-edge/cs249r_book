title: Safety-Critical LLM Fallback Design on Tensor G3
scenario: You are designing an emergency real-time voice-to-text hazard alert system running on a Google Tensor G3 device (featuring an on-device TPU with 7.5 TOPS and 12 GB LPDDR5X RAM). To achieve functional safety certification, the system must guarantee deterministic execution and a failure recovery time of under 150ms. You must evaluate two designs. Alternative A runs the optimized Gemini Nano model entirely on the TPU with a software watchdog on the application OS. Alternative B runs the main model on the TPU but keeps a smaller, deterministic fallback model pinned to a CPU core with a strict hardware watchdog timer.
question: Which Tensor G3 hazard-alert fallback design meets a 150ms safety recovery SLA, and why?
details:
  realistic_solution: 'Alternative B is the superior choice for meeting safety certification. While the TPU provides excellent throughput, its asynchronous execution makes tight worst-case execution time (WCET) bounds difficult to prove. Isolating a fallback model on a dedicated CPU core with a hardware watchdog guarantees the 150ms recovery SLA even if the main TPU pipeline hangs, fulfilling safety requirements without bottlenecking the 12 GB LPDDR5X memory.'
  common_mistake: |
    **The Pitfall:** Choosing Alternative A to maximize TPU usage and avoid CPU synchronization.
    **The Rationale:** Candidates assume software watchdogs on a mobile OS are sufficient for real-time guarantees.
    **The Consequence:** The system fails functional safety certification because a non-real-time OS scheduler cannot guarantee deterministic recovery times.
  napkin_math: |
    **Assumptions & Constraints:**
    - Alternative A TPU Execution: ~80 ms.
    - Alternative A OS Scheduler Jitter: ~50 ms.
    - Alternative A Context Switch: ~100 ms.
    - Alternative B TPU Timeout: 80 ms.
    - Alternative B Hardware Interrupt: <5 ms.
    - Alternative B CPU Fallback Execution: 40 ms.

    **Calculations:**
    - Alt A Worst-case Recovery: 80 + 50 + 100 = 230 ms (Fails 150ms SLA).
    - Alt B Worst-case Recovery: 80 + 5 + 40 = 125 ms (Passes 150ms SLA).

    **Conclusion & Interpretation:**
    - **Result: 125 ms recovery (Latency-Bound)**. Isolating a fallback model on a dedicated CPU core with a hardware watchdog guarantees the 150ms recovery SLA even if the main TPU pipeline hangs.
