title: 'Kernel Fusion: Evaluate Core ML vs ONNX Runtime Fusion for iPhone LLM'
scenario: Compare Core ML (A17 Pro Neural Engine, 35 TOPS) vs ONNX Runtime (iOS, CPU/GPU) for running a 1B INT4 quantized LLM.
question: How would you evaluate kernel fusion depth, tokenization throughput, first-token latency, and subsequent-token latency?
details:
  realistic_solution: 'Core ML: deep hardware integration, Neural Engine optimized, automatic fusion, but limited operator support for cutting-edge quantization schemes. ONNX Runtime: more flexible operator support, good for INT4 via specific EPs, may run on CPU or GPU. For latest quantization, may need custom Metal shaders.'
  common_mistake: |
    **The Pitfall:** Assuming Core ML always wins on Apple hardware simply because it is first-party.
    **The Rationale:** Candidates fail to realize that while Core ML excels at Neural Engine integration, it often lacks support for cutting-edge, non-standard quantization schemes (like certain 4-bit variants).
    **The Consequence:** Developers might force a model through Core ML, inadvertently triggering massive CPU fallbacks that run slower than a pure Metal/GPU implementation via ONNX Runtime.
  napkin_math: |
    1. **Prefill (Compute Bound):** 1B INT4 model. Batch 1, 512 tokens. Compute = 512 × 1B × 2 = 1.024T FLOPs. ANE (35 TOPS) = 29.3ms. Metal GPU (16 TFLOPS) = 64ms.
    2. **Decode (Memory Bound):** 1 token. Weight reads = 0.5 GB. Bandwidth = 68 GB/s. Memory latency = 0.5 GB / 68 GB/s = 7.35ms/token (~136 tok/sec).
    3. **Decode Compute:** 1B × 2 FLOPs / 35T = 0.057ms.
    4. **CPU Fallback:** A17 Pro CPU (12 GFLOPS INT8) prefill = 1.024T / 12G = 85.3 seconds.
    **Result:** Core ML on the ANE is fastest for prefill (**~29ms**) if operators are supported. If unsupported, falling back to ONNX Runtime on the Metal GPU (**64ms**) prevents the catastrophic **85s CPU penalty**.
