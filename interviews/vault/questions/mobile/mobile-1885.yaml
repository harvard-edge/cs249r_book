title: Snapdragon Camera Pipelining
scenario: On a Snapdragon 8 Gen 3, a camera pipeline feeds the ISP (2 ms), memory
  copy to NPU (3 ms), NPU inference (10 ms), and display render (5 ms) sequentially.
question: Create a pipeline architecture layout that calculates the maximum throughput
  (fps) and latency if only the ISP and NPU can run concurrently.
visual:
  kind: svg
  path: mobile-1885.svg
  alt: Gantt chart showing parallel pipeline stages bottlenecked by 10ms NPU.
  caption: Concurrent pipeline stages.
details:
  realistic_solution: Without pipelining, latency is $2+3+10+5 = 20$ ms (50 fps).
    With ISP and NPU overlapping across frames, the bottleneck stage determines throughput.
    The bottleneck is NPU inference at 10 ms. Thus, max throughput is $1/0.010 = 100$
    fps. End-to-end latency for a single frame remains 20 ms.
  common_mistake: Assuming pipelining reduces the end-to-end latency of a single frame
    rather than just increasing overall throughput.
  napkin_math: Bottleneck = max(2, 3, 10, 5) = 10ms. Throughput = 1000ms / 10ms =
    100 fps.
