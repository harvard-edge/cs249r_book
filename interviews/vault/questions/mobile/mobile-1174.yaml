title: CNN Architecture Choice for Hexagon NPU
scenario: 'You are leading the deployment of a high-resolution real-time semantic
  segmentation model for a camera application targeting the Qualcomm Hexagon NPU (Snapdragon
  8 Gen 3). You are evaluating two backbone architectures: a MobileNetV3-style network
  that relies heavily on depthwise separable convolutions and squeeze-and-excitation
  (SE) blocks, and an EfficientNet-Lite variant that removes SE blocks and scales
  depth and width differently. The target device boasts 45 TOPS of INT8 compute and
  utilizes a shared 12 GB LPDDR5X memory pool across its heterogeneous CPU, GPU, and
  NPU. Which architectural design patterns are most optimal for maximizing utilization
  on this specific NPU, and what tradeoffs must you make?'
question: Which architectural design patterns are most optimal for maximizing utilization
  on this specific NPU, and what tradeoffs must you make?
details:
  realistic_solution: On the Snapdragon 8 Gen 3 Hexagon NPU, memory bandwidth from
    the shared LPDDR5X is the primary bottleneck for operations with low arithmetic
    intensity. While depthwise convolutions reduce FLOPs, they are heavily memory-bound.
    Furthermore, SE blocks involve global pooling and small fully connected layers
    that perform poorly on NPUs and require costly context switching or fallback to
    the CPU/GPU. The EfficientNet-Lite architecture, which omits SE blocks and balances
    the compute-to-memory-access ratio, is the better choice. It allows the 45 TOPS
    INT8 matrix engines to remain fed and utilized, achieving lower real-world latency
    despite potentially having higher theoretical FLOPs than the MobileNetV3 alternative.
  common_mistake: Candidates often assume that minimizing theoretical FLOPs (e.g.,
    using extensive depthwise convolutions) will automatically result in the lowest
    latency. They frequently fail to account for the memory bandwidth bottleneck or
    the poor utilization of NPU matrix multiply units when executing low arithmetic
    intensity operations like depthwise convolutions or global average pooling found
    in SE blocks.
  napkin_math: Consider a standard depthwise convolution layer (3x3 kernel, 256 channels,
    112x112 spatial dimensions) in INT8. Data movement = (Inputs + Outputs + Weights)
    = (112*112*256) + (112*112*256) + (3*3*256) ≈ 6.42 MB. FLOPs = 112*112*256*3*3*2
    ≈ 57.8 MFLOPs. Arithmetic intensity = 57.8 MFLOPs / 6.42 MB ≈ 9 OPS/Byte. The
    Snapdragon 8 Gen 3 LPDDR5X bandwidth is roughly 68 GB/s (or 68,000 MB/s). The
    system's peak compute-to-bandwidth ratio is 45 TOPS / 68 GB/s ≈ 661 OPS/Byte.
    Since the layer's intensity (9) is vastly lower than the machine balance (661),
    the operation is strictly memory-bound. Time = 6.42 MB / 68,000 MB/s ≈ 0.094 ms.
    The NPU utilization is only (57.8 MFLOPs / 0.094 ms) / 45 TOPS ≈ 1.3%. This demonstrates
    why optimizing for memory access rather than pure FLOPs is critical on this architecture.
