title: CNN Architecture Choice for Hexagon NPU
scenario: 'You are leading the deployment of a high-resolution real-time semantic segmentation model for a camera application targeting the Qualcomm Hexagon NPU (Snapdragon 8 Gen 3). You are evaluating two backbone architectures: a MobileNetV3-style network that relies heavily on depthwise separable convolutions and squeeze-and-excitation (SE) blocks, and an EfficientNet-Lite variant that removes SE blocks and scales depth and width differently. The target device boasts 45 TOPS of INT8 compute and utilizes a shared 12 GB LPDDR5X memory pool across its heterogeneous CPU, GPU, and NPU.'
question: Which architectural design patterns are most optimal for maximizing utilization on this specific NPU, and what tradeoffs must you make?
details:
  realistic_solution: On the Snapdragon 8 Gen 3 Hexagon NPU, memory bandwidth from the shared LPDDR5X is the primary bottleneck for operations with low arithmetic intensity. While depthwise convolutions reduce FLOPs, they are heavily memory-bound. Furthermore, SE blocks involve global pooling and small fully connected layers that perform poorly on NPUs and require costly context switching or fallback to the CPU/GPU. The EfficientNet-Lite architecture, which omits SE blocks and balances the compute-to-memory-access ratio, is the better choice. It allows the 45 TOPS INT8 matrix engines to remain fed and utilized, achieving lower real-world latency despite potentially having higher theoretical FLOPs than the MobileNetV3 alternative.
  common_mistake: |
    **The Pitfall:** Minimizing theoretical FLOPs instead of memory access.
    **The Rationale:** Candidates assume architectures like MobileNetV3 with depthwise convolutions and SE blocks are optimal because they reduce FLOPs.
    **The Consequence:** They select a network that relies on low arithmetic intensity operations, heavily bottlenecking on LPDDR5X bandwidth and leaving 98% of the NPU's 45 TOPS idle.
  napkin_math: |
    - Depthwise Conv Data: (112x112x256 in) + (112x112x256 out) + (3x3x256 weights) ≈ 6.42 MB.
    - Depthwise Conv FLOPs: 112 * 112 * 256 * 3 * 3 * 2 ≈ 57.8 MFLOPs.
    - Arithmetic Intensity: 57.8 MFLOPs / 6.42 MB ≈ 9 OPS/Byte.
    - Hexagon Ridge Point: 45 TOPS / 68 GB/s ≈ 661 OPS/Byte.
    - Utilization: 9 / 661 = **~1.3%** NPU utilization (strictly memory-bound).
