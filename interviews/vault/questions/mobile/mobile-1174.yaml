title: CNN Architecture Choice for Hexagon NPU
scenario: You are evaluating a MobileNetV3-style network versus an EfficientNet-Lite variant for a real-time semantic segmentation model. The target device utilizes a shared 68 GB/s LPDDR5X memory pool across its heterogeneous compute engines.
question: Which architectural design patterns are most optimal for maximizing utilization on this specific NPU, and what tradeoffs must you make?
details:
  realistic_solution: EfficientNet-Lite is vastly superior. Depthwise separable convolutions in MobileNet possess extremely low arithmetic intensity, heavily bottlenecking on LPDDR5X bandwidth. Furthermore, Squeeze-and-Excitation (SE) blocks utilize global average pooling, forcing costly context switches to the CPU. By dropping SE blocks and utilizing standard convolutions, EfficientNet-Lite raises the Operational Intensity, feeding the matrix engines and bypassing the memory wall.
  common_mistake: |
    **The Pitfall:** Minimizing theoretical FLOPs instead of memory access.
    **The Rationale:** Candidates assume architectures like MobileNetV3 with depthwise convolutions and SE blocks are optimal because they reduce FLOPs.
    **The Consequence:** They select a network that relies on low arithmetic intensity operations, heavily bottlenecking on LPDDR5X bandwidth and leaving 98% of the NPU's TOPS idle.
  napkin_math: |
    **Assumptions & Constraints:**
    - HW: 45 TOPS, 68 GB/s. Ridge Point: 661 OPS/Byte.
    - Depthwise Conv Data: (112x112x256 in) + (112x112x256 out) + (3x3x256 weights) ≈ 6.42 MB.

    **Calculations:**
    - Depthwise Conv FLOPs: 112 * 112 * 256 * 3 * 3 * 2 ≈ 57.8 MFLOPs.
    - Arithmetic Intensity: 57.8 MFLOPs / 6.42 MB ≈ 9 OPS/Byte.
    - Utilization: 9 / 661 = ~1.36% NPU utilization.

    **Conclusion & Interpretation:**
    - **Result: 1.36% Utilization (Memory-Bandwidth-Bound)**. The layer is fatally memory-bandwidth-bound, ignoring NPU capacity.
