title: Diagnosing TPU Thermal Throttling on Tensor G3
scenario: Your team is deploying a continuous real-time summarization feature using Gemini Nano on the
  Google Tensor G3. During user testing, the first few summaries process smoothly, but after 5 minutes
  of continuous on-device inference, the processing time suddenly spikes by 3x. Given that the Tensor
  G3 features an on-device TPU capable of 7.5 TOPS and 12 GB LPDDR5X memory, diagnose the root cause of
  this severe and sudden performance degradation.
details:
  realistic_solution: The root cause is thermal throttling of the on-device TPU. While the Tensor G3 can
    hit 7.5 TOPS during short burst workloads, continuous LLM inference generates significant heat, prompting
    the OS thermal management to downclock the TPU to maintain safe ambient device temperatures. The correct
    diagnostic approach is to profile the SoC thermal sensors and TPU clock frequencies simultaneously
    to confirm the direct correlation between temperature thresholds being crossed and TPU frequency drops.
  common_mistake: Candidates often misdiagnose this symptom as a memory leak consuming the 12 GB LPDDR5X
    or an unexpected I/O bottleneck. They tend to suggest memory profiling or aggressive weight quantization
    rather than recognizing the physical differences between burst and sustained performance under strict
    mobile thermal constraints.
  napkin_math: Assume generating a single summary requires 15 tera-operations (TOPs). At the peak burst
    performance of 7.5 TOPS, one summary takes 2.0 seconds (15 / 7.5 = 2s). After 5 minutes of continuous
    use, heat accumulation forces the thermal management system to throttle the TPU clock speed by roughly
    66% to cool the SoC. The sustained compute performance drops to 2.5 TOPS (7.5 * 0.333). Processing
    the same 15 TOPs workload now takes 6.0 seconds (15 / 2.5 = 6s), accurately explaining the observed
    3x spike in processing time.
