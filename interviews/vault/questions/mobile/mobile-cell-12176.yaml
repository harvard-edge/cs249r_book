title: 'Network Bandwidth Bottlenecks: Master Memory Bus Analysis for Multi-LLM Mobile App'
scenario: 'A productivity mobile app (Snapdragon 8 Gen 3, 16GB, 77 GB/s) runs two simultaneous LLM tasks:
  (1) a 1B INT4 email summarizer (background, 500MB, running at 10 tokens/s to stay under thermal limits)
  and (2) a 3B INT4 assistant (foreground, 1.5GB, TPOT target < 25ms). Analyze whether both can run simultaneously
  without bandwidth saturation, derive the scheduling constraint, and specify a token-interleaved execution
  schedule.'
question: "How would you analyze whether both can run simultaneously without bandwidth saturation, derive the scheduling constraint, and specify a token-interleaved execution schedule?"
details:
  realistic_solution: 'Summarizer: 10 tokens/s = 1 token per 100ms. Per token BW: 500MB in 100ms = 5MB/ms
    sustained = 5GB/s. Assistant: TPOT < 25ms → 1.5GB/25ms = 60GB/s peak during decode. Total peak: 5+60=65GB/s
    < 77GB/s ✓ (barely). But: assistant decode is bursty (60GB/s for 25ms, then idle for next token arrival).
    Summarizer: 100ms period, 5GB/s average. Interleaved schedule: Assistant token decode (25ms at 60GB/s)
    → Summarizer token decode (1.5ms at 333GB/s? No: both at same time average). Time-sliced: 25ms: assistant
    at 60GB/s. Remaining 75ms: summarizer catches up. 500MB/(75ms)=6.67GB/s. Total per 100ms: 25ms×60+75ms×6.67
    = 1500+500.25 = 2000.25MB = 20GB avg << 77GB/s.'
  common_mistake: Treating the two models as temporally independent when they compete for the same LPDDR5X
    bus in real-time; the analysis must be in bandwidth-time units.
  napkin_math: 'Per 100ms window: Assistant: 1.5GB in 25ms=60GB/s × 25ms = 1.5GB. Summarizer: 500MB in
    100ms=5GB/s avg. Average: (1.5+0.5)/0.1s = 20GB/s << 77GB/s. Peak during assistant decode: 60GB/s
    (summarizer paused) < 77GB/s ✓. Schedule: assistant runs first (25ms), then summarizer runs (remaining
    75ms: 500MB/75ms=6.67GB/s). No conflict. Both tasks complete within 100ms window. Assistant TPOT:
    25ms ✓. Summarizer: 10 tokens/s ✓.'
