title: Analyzing Hexagon NPU Fallback Degradation
scenario: A real-time video super-resolution pipeline runs on a Snapdragon 8 Gen 3 using the Qualcomm
  Hexagon NPU for inference. Under heavy thermal throttling, the OS scales down the NPU frequency by 40%,
  causing the primary INT8 model to miss the 33ms frame deadline. The system gracefully degrades by shedding
  the super-resolution task to the CPU using a lightweight fallback model instead of running a smaller
  INT8 model on the NPU. Given the heterogeneous CPU+GPU+NPU architecture and shared 12-16 GB LPDDR5X
  memory, explain why the system chose this specific CPU fallback strategy.
question: "Why should a throttled Snapdragon video pipeline fall back to a CPU model instead of a smaller NPU model?"
details:
  realistic_solution: The system sheds the workload to the CPU because continuing to use the NPU, even
    with a smaller model, sustains heat generation in that specific SoC block and prevents recovery. By
    moving the task to the CPU, the thermal management system can quickly cool the NPU domain. Additionally,
    because the Snapdragon 8 Gen 3 uses shared 12-16 GB LPDDR5X memory, shifting to a simpler CPU-bound
    task reduces overall memory bandwidth contention during a critical thermal event.
  common_mistake: Candidates often assume that deploying a smaller, quantized INT8 model on the same throttled
    NPU is always the optimal fallback path. They fail to account for the shared thermal domain of the
    heterogeneous SoC, where keeping the NPU active prevents the silicon from cooling down rapidly.
  napkin_math: 'Original Qualcomm Hexagon NPU capacity: 45 TOPS INT8. Primary model requires 1.125 TOPS
    per frame, taking 25ms at full clock (1.125 / 45 = 0.025s). A 40% thermal throttle reduces effective
    capacity to 27 TOPS, which increases inference latency to 1.125 / 27 = 41.7ms, missing the 33ms (30
    FPS) deadline. A smaller NPU model might take 20ms unthrottled (33.3ms throttled, barely meeting the
    deadline but keeping the NPU active). The CPU fallback model completes in 15ms, guaranteeing the 33ms
    deadline is met while shedding 100% of the NPU power draw.'
