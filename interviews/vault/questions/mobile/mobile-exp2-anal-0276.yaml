math_issues:
- Incorrect inference time calculation. A model requiring 1.5 TOPS per frame at 45 TOPS capacity would
  take 33.3ms (1.5 / 45), not 25ms. Alternatively, taking 25ms at 45 TOPS means the model requires 1.125
  TOPS, not 1.5 TOPS.
