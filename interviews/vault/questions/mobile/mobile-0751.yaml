title: The ANE Efficiency Advantage
scenario: Your team is evaluating mobile SoCs for an always-on image classification app. The Apple A17 Pro advertises 35 TOPS from its Neural Engine at a sustained power draw of approximately 5W.
question: What is the compute efficiency in TOPS per watt, and why does this metric matter more than raw TOPS for a mobile device?
details:
  realistic_solution: 35 TOPS / 5W = 7 TOPS/W. On a mobile device, the binding constraint is the battery, not peak compute. A chip that delivers 7 TOPS/W means each watt of battery power yields 7 trillion INT8 operations per second. This is the metric that determines how many inferences you can run before the battery dies.
  common_mistake: |
    **The Pitfall:** Focusing only on peak TOPS without considering power consumption.
    **The Rationale:** Marketing materials emphasize peak TOPS, leading engineers to use it as the sole proxy for hardware capability.
    **The Consequence:** Selecting a chip with higher peak TOPS but lower efficiency leads to a battery-constrained workload dying much faster in the field.
  napkin_math: |
    - **Efficiency:** 35 TOPS / 5W = **7 TOPS/W**.
    - **Battery Impact:** At 18.5 Wh battery, running the ANE at full power drains the battery in ~3.7 hours (18.5 Wh / 5W).
  options:
  - A) 3.5 TOPS/W. Mobile chips sacrifice efficiency for portability.
  - B) 7 TOPS/W. The battery is the binding constraint, so efficiency per watt determines inference budget.
  - C) 35 TOPS/W. The 5W figure is idle power, not compute power.
  - D) 175 TOPS/W. Neural Engines achieve superlinear efficiency at low precision.
  correct_index: 1
