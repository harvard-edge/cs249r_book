title: NPU Audio Duty Cycle
scenario: An always-on audio listener on an Apple A17 Pro draws 5W when the NPU is
  active and 0.1W when sleeping.
question: If the NPU wakes up for 200ms every 1 second, calculate the average power
  consumption.
details:
  realistic_solution: The duty cycle is 20%. Multiply the active power by 0.2 and
    the sleep power by 0.8, then sum them to find the true average power consumption.
  common_mistake: Using a simple arithmetic mean of 5W and 0.1W without weighting
    by time.
  napkin_math: (5W * 0.2) + (0.1W * 0.8) = 1.0W + 0.08W = 1.08W.
