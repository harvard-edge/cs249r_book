title: The Autopilot OTA Budget
scenario: 'You are an engineer on an automotive team deploying a new driver-assist model. The new model has 60 million parameters and is stored in FP16 format. Company policy dictates that any over-the-air (OTA) update delivered via cellular must be under 150 MB to avoid high data costs for customers.'
question: 'Can a 60M-parameter FP16 driver-assist model fit under a 150 MB cellular OTA limit?'
details:
  realistic_solution: 'Yes, the model fits within the OTA budget. The size is calculated by multiplying the number of parameters by the size of the data type. For FP16, each parameter requires 2 bytes.'
  common_mistake: |
    **The Pitfall:** Confusing precision formats and defaulting to FP32 size.
    **The Rationale:** Engineers often instinctively multiply parameter counts by 4 bytes (FP32) instead of the specified 2 bytes (FP16).
    **The Consequence:** Calculating an incorrect size of 240MB, leading to false rejection of a perfectly valid model deployment.
  napkin_math: |
    1. **Parameter Count:** 60,000,000 parameters.
    2. **Format Size:** FP16 uses 2 bytes per parameter.
    3. **Base Weights Size:** 60,000,000 × 2 bytes = 120,000,000 bytes (120 MB).
    4. **Overhead:** Assuming ~10 MB for metadata and execution code.
    5. **Total Size:** 120 MB + 10 MB = **130 MB**, which is strictly under the 150 MB OTA limit.
  options:
  - 'No, the model is ~240 MB, which is over the 150 MB limit.'
  - 'Yes, the model is only ~60 MB, which is well under the limit.'
  - 'Yes, the model is ~130 MB, which is under the 150 MB limit.'
  - 'No, you cannot determine the file size from the parameter count alone.'
  correct_index: 2
