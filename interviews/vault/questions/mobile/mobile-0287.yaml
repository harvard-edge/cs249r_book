title: The Autopilot OTA Budget
scenario: You are an engineer on an automotive team deploying a new 60-million parameter driver-assist model stored in FP16 format. Company policy dictates that any cellular over-the-air (OTA) update must be under 150 MB to prevent high customer data costs.
question: Does a 60M-parameter FP16 model fit within a strict 150 MB cellular OTA payload limit?
details:
  realistic_solution: |
    Yes, the model easily fits. In FP16 precision, each parameter requires exactly 2 bytes. The base weights consume 120 MB, leaving ample headroom for metadata and inference binaries within the 150 MB OTA constraint.
  common_mistake: |
    **The Pitfall:** Incorrectly calculating payload size by assuming FP32 (4 bytes per parameter) for an FP16 model.
    **The Rationale:** Engineers routinely default to standard 32-bit floating-point heuristics when sizing models, ignoring the explicitly stated half-precision format.
    **The Consequence:** Falsely projecting a 240 MB payload and erroneously blocking a perfectly valid deployment.
  napkin_math: |
    1. **Assumptions & Constraints:** 60,000,000 parameters. Data type is FP16 (2 bytes/parameter). OTA limit is 150 MB.
    2. **Calculations:** 60,000,000 * 2 bytes = 120,000,000 bytes (120 MB). Overheads ~10 MB. Total = 130 MB.
    3. **Conclusion & Interpretation:** **Result: Constraint Met**. 130 MB is strictly under the 150 MB limit.
  options:
  - No, the payload requires 240 MB (FP32), which exceeds the 150 MB limit.
  - Yes, the payload requires 60 MB (INT8), well under the limit.
  - Yes, the payload requires roughly 130 MB (FP16 + metadata), fitting the limit.
  - No, parameter count alone cannot determine the binary payload size.
  correct_index: 2
