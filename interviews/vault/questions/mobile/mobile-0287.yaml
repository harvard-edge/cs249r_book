title: The Autopilot OTA Budget
scenario: You are an engineer on an automotive team deploying a new driver-assist model. The new model has 60 million parameters and is stored in FP16 format. Company policy dictates that any over-the-air (OTA) update delivered via cellular must be under 150 MB to avoid high data costs for customers. Can you ship this new model within the budget? Explain the calculation.
question: "Can a 60M-parameter FP16 driver-assist model fit under a 150 MB cellular OTA limit?"
details:
  realistic_solution: Yes, the model fits within the OTA budget. The size is calculated by multiplying the number of parameters by the size of the data type. For FP16, each parameter requires 2 bytes.
  common_mistake: The most common mistake is to confuse precision formats. Engineers often calculate using FP32 (4 bytes/param) by default, or mistakenly use INT8 (1 byte/param), leading to a 2x error in either direction. This completely changes the decision on whether to ship.
  napkin_math: '1. Model Weights: The model has 60,000,000 parameters. 2. FP16 Format: FP16 uses 2 bytes per parameter. 3. Base Size: 60M params * 2 bytes = 120,000,000 bytes. 4. Convert to MB: 120,000,000 bytes / 1,000,000 bytes/MB = 120 MB. 5. Overhead: Assuming 10 MB for metadata and binary execution code, the total payload is ~130 MB. 6. Conclusion: 130 MB is strictly under the 150 MB cellular OTA limit, so the update can be safely pushed without Wi-Fi.'
  options:
  - No, the model is ~240 MB, which is over the 150 MB limit.
  - Yes, the model is only ~60 MB, which is well under the limit.
  - Yes, the model is ~120 MB, which is under the 150 MB limit.
  - No, you cannot determine the file size from the parameter count alone.
  correct_index: 2
