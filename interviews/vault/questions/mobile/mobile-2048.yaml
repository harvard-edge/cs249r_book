title: NPU SRAM vs LPDDR5 Contention
scenario: An always-on audio transcription model running on a Snapdragon 8 Gen 3 causes
  noticeable UI and audio playback stutters when it loads weights.
question: Explain how migrating model parameters from main LPDDR5 memory to NPU-dedicated
  SRAM resolves system-wide stuttering.
details:
  realistic_solution: The LPDDR5 system memory bus is shared by the CPU, GPU, and
    audio subsystems. Constant memory accesses by the NPU saturate the bus bandwidth,
    starving audio playback buffers. By pinning the model in the NPU's localized,
    dedicated SRAM, inference executes with high bandwidth and zero system bus contention,
    eliminating the stutter.
  common_mistake: Attributing the stutter to CPU compute starvation rather than shared
    memory bus contention.
  napkin_math: 1 model localized to NPU SRAM saves bus traffic.
