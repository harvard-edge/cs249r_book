title: NPU SRAM vs LPDDR5 Contention
scenario: An always-on audio transcription model running on a Snapdragon 8 Gen 3 causes noticeable UI and audio playback stutters when it loads weights.
question: Explain how migrating model parameters from main LPDDR5 memory to NPU-dedicated SRAM resolves system-wide stuttering.
details:
  realistic_solution: The LPDDR5 system memory bus is shared by the CPU, GPU, and audio subsystems. Constant memory accesses by the NPU saturate the bus bandwidth, starving audio playback buffers. By pinning the model in the NPU's localized, dedicated SRAM, inference executes with high bandwidth and zero system bus contention, eliminating the stutter.
  common_mistake: |
    **The Pitfall:** Attributing the stutter to CPU compute starvation.
    **The Rationale:** Candidates fail to recognize that the LPDDR5 system memory bus is shared across the CPU, GPU, and audio subsystems.
    **The Consequence:** Optimizations focus on reducing compute instead of addressing the memory bandwidth contention that is actually starving the audio buffers.
  napkin_math: |
    - LPDDR5 bandwidth is shared among CPU, GPU, and NPU.
    - Constant NPU accesses to main memory saturate the bus, starving other subsystems.
    - **Pinning the model to NPU SRAM eliminates main memory bus traffic, resolving the stutter.**
