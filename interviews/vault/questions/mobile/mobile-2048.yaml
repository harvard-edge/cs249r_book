title: NPU SRAM vs LPDDR5 Contention
scenario: An always-on audio transcription model running on a Snapdragon 8 Gen 3 device causes highly noticeable UI and audio playback stutters precisely when it loads weights into the accelerator.
question: Explain how migrating model parameters from main LPDDR5 memory to NPU-dedicated SRAM resolves system-wide stuttering.
details:
  realistic_solution: The main LPDDR5 system memory bus is intrinsically shared by the CPU, GPU, and audio subsystems. Continuous high-bandwidth parameter accesses by the NPU saturate this central bus, literally starving the audio playback DMA buffers and UI render queues. By pinning the model physically inside the NPU's localized, dedicated SRAM (e.g., Hexagon TCM), inference executes with immense bandwidth and absolutely zero system bus contention, eliminating the stutter.
  common_mistake: |
    **The Pitfall:** Attributing the stutter to CPU compute starvation or OS thread scheduling.
    **The Rationale:** Candidates fail to recognize the physical hardware architecture, specifically that the LPDDR5 system memory bus is a highly contested, unified bottleneck shared across all discrete SoC subsystems.
    **The Consequence:** Mitigation attempts focus on reducing CPU compute threads instead of relocating data, failing to resolve the actual memory bandwidth contention that is starving the audio buffers.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - LPDDR5 Memory Bandwidth: ~68 GB/s (Shared).
       - Concurrent system consumers: CPU, GPU (UI), ISP, Audio DSP, NPU.
    2. **Calculations:**
       - NPU fetching weights via the main bus continuously disrupts time-critical Audio DSP DMA transfers.
       - Pinning weights directly to NPU-dedicated SRAM reduces the NPU's LPDDR5 traffic load to exactly 0 GB/s.
    3. **Conclusion & Interpretation:**
       **Result: Bandwidth-Bound (Contention). Relocating the model entirely into local NPU SRAM eliminates main memory bus traffic, immediately resolving the starvation of the audio buffers and UI rendering queues.**
