title: On-Device Object Detection Dataset Curation for Snapdragon 8 Gen 3 NPU
scenario: You are leading the ML engineering effort for a new mobile application that
  performs real-time object detection on user-generated video streams. The target
  device is a smartphone equipped with the Snapdragon 8 Gen 3 Hexagon NPU, offering
  45 TOPS (INT8) compute and 12-16 GB LPDDR5X memory. Initial deployment of a model
  trained on publicly available datasets has revealed significant performance degradation
  due to domain shift and inherent biases. Design a robust and scalable dataset curation
  and labeling strategy to continuously improve model performance on diverse real-world
  mobile data. How would you leverage the on-device capabilities, ensure high inter-annotator
  agreement, and proactively identify and mitigate dataset biases to maintain a production-ready
  model?
question: How would you leverage the on-device capabilities, ensure high inter-annotator
  agreement, and proactively identify and mitigate dataset biases to maintain a production-ready
  model?
details:
  realistic_solution: Implement a continuous active learning pipeline where the on-device
    model, running efficiently on the Hexagon NPU (leveraging its 45 TOPS INT8 for
    inference), identifies samples with high uncertainty or high error rates in real-world
    scenarios. These samples are then prioritized for human annotation. Establish
    clear, evolving annotation guidelines, conduct regular inter-annotator agreement
    checks (e.g., using Fleiss' Kappa or similar metrics) with feedback loops for
    annotator training. Proactively monitor dataset distributions for demographic
    or scenario-based biases by analyzing metadata and model performance across different
    segments, augmenting data collection from underrepresented groups, and employing
    techniques like re-sampling or re-weighting during training. Consider federated
    learning approaches for privacy-preserving data collection from a diverse user
    base.
  common_mistake: Ignoring the device-specific data characteristics and collection
    constraints, over-relying on generic public datasets, or failing to establish
    rigorous inter-annotator agreement protocols and bias detection mechanisms early
    in the pipeline.
  napkin_math: "Storage: 50,000 frames/month * 200KB/frame = 10 GB/month, or 120 GB/year. Inference: Given the NPU's 45 TOPS (INT8), a typical object detection model (e.g., MobileNetV3-SSD) operating at 15 ms per frame has a throughput of ~66 FPS. In one hour (3600s), continuous operation processes 3600 * 66 = 237,600 frames. If 5% are uncertain, it successfully flags 11,880 'uncertain' frames per hour on-device for active learning selection."
