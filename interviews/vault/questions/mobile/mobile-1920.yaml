title: Snapdragon NPU/GPU Cache Thrashing
scenario: Diagnosing severe thermal throttling during sustained augmented reality
  rendering where the Snapdragon 8 Gen 3 NPU and GPU fight for LPDDR5 bandwidth.
question: Formulate a diagnostic plan using performance counters to pinpoint L3 cache
  thrashing between the Hexagon NPU and Adreno GPU, and propose a tiling fix.
details:
  realistic_solution: Use Snapdragon Profiler to monitor System Level Cache (SLC)
    hit rates. A massive drop indicates the 8MB SLC is being thrashed. The proposed
    fix is to synchronize the GPU render passes with the NPU inference loops, passing
    smaller 2MB texture tiles back and forth so they remain resident in the SLC instead
    of flushing to LPDDR5.
  common_mistake: Suggesting lowering the NPU clock speed, which does not solve the
    underlying cache eviction policy conflict.
  napkin_math: 2MB tile + 2MB map < 8MB SLC
