title: Snapdragon NPU/GPU Cache Thrashing
scenario: Diagnosing severe thermal throttling during sustained augmented reality rendering where the NPU and GPU fight for LPDDR5 bandwidth.
question: 'Formulate a diagnostic plan using performance counters to pinpoint L3 cache thrashing between the NPU and GPU, and propose a tiling fix.'
details:
  realistic_solution: Use Snapdragon Profiler to monitor System Level Cache (SLC) hit rates. A massive drop indicates the 8MB SLC is being thrashed. The proposed fix is to synchronize the GPU render passes with the NPU inference loops, passing smaller 2MB texture tiles back and forth so they remain resident in the SLC instead of flushing to LPDDR5.
  common_mistake: |
    **The Pitfall:** Suggesting lowering the NPU clock speed to fix thermal throttling.
    **The Rationale:** Candidates assume thermal limits are solely driven by clock frequencies and static power draw.
    **The Consequence:** Failing to solve the underlying cache eviction conflict, which guarantees LPDDR5 bandwidth contention remains the true heat source.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hardware: System Level Cache (SLC) capacity is 8MB.
    - Tiling Dimensions: 2MB texture tile + 2MB feature map.

    **Calculations:**
    - Combined Working Set per Pass = 2MB + 2MB = 4MB.
    - SLC Headroom: 8MB - 4MB = 4MB.

    **Conclusion & Interpretation:**
    - **Result: 4MB (Memory-Bound)**. By passing 4MB payloads back and forth, the working set remains fully resident in the 8MB SLC, bypassing the LPDDR5 memory controller entirely and resolving the thermal issue.
