title: The On-Device 7B LLM Mandate
scenario: You are the new Lead ML Systems Engineer for a luxury automaker's 'AI Concierge' project. The CEO has mandated that the flagship 7B parameter LLM, currently running in the cloud, be deployed entirely on the car's next-gen infotainment SoC for a premium, always-on experience. The hardware is powerful but constrained: its specs are equivalent to an Apple A17 Pro (35 TOPS INT8, 8GB LPDDR5 RAM).
question: What system design can fit and run a mandated 7B AI Concierge model within a 2GB on-device memory budget?
details:
  realistic_solution: 'A successful strategy requires a multi-faceted approach, creating a novel system from several advanced techniques: knowledge distillation, aggressive quantization, and deploying a smaller student-verifier architecture rather than the raw 7B model.'
  common_mistake: |
    **The Pitfall:** Proposing a single solution, like "quantize to INT4".
    **The Rationale:** Candidates fail to realize that a 7B model at INT4 is still ~3.5GB, which breaks the 2GB memory budget.
    **The Consequence:** The proposed system will encounter Out-Of-Memory (OOM) errors and completely fail to run.
  napkin_math: |
    - **Base 7B Model (FP16):** 7B params × 2 bytes/param = 14 GB. (Exceeds 2GB budget).
    - **Quantized 7B Model (INT4):** 7B params × 0.5 bytes/param = 3.5 GB. (Exceeds 2GB budget).
    - **Proposed Distilled Hierarchy (INT8):**
      - Verifier Model: 500M params × 1 byte = 500 MB.
      - Draft Model: 100M params × 1 byte = 100 MB.
    - **Total Weights:** 600 MB.
    - **KV Cache + Activations:** ~400 MB.
    - **Peak Footprint:** 600 MB + 400 MB = **1.0 GB** (< 2GB budget). Success.
