title: A17 NPU Wake Break-Even for Activity Recognition
scenario: A fitness app runs a 50 MFLOP activity model on an NPU. The NPU draws 1.0 W active, 10 mW gated. Wake takes 2 ms at 1.0 W, sleep takes 0.5 ms at 1.0 W. Compute takes 0.8 ms. User perception requires 10 Hz updates.
question: "Implement the per-second energy accounting to compute the break-even rate for always-on vs rate-gating, and recommend the best rate."
details:
  realistic_solution: Calculate total active energy per cycle encompassing wake, compute, and sleep transitional states. Derive the linear energy equation to determine the break-even frequency against an always-on baseline. Configure the system to operate at the absolute minimum acceptable UX frequency.
  common_mistake: |
    **The Pitfall:** Ignoring the wake/sleep transition energy tax entirely.
    **The Rationale:** Candidates treat hardware sleep states as instantaneously free, focusing only on the 0.8ms compute time.
    **The Consequence:** They wrongly conclude that rapidly waking and sleeping the NPU at very high rates is cheap, draining the battery through hidden transition overhead.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Active: 1.0 W. Gated: 10 mW.
       - Wake: 2 ms. Sleep: 0.5 ms. Compute: 0.8 ms.
       - Target rate: 10 Hz.
    2. **Calculations:**
       - Per-Activation = 2ms + 0.8ms + 0.5ms = 3.3 ms (3.3 mJ).
       - Energy E(N) = N * 3.3 mJ + (1000 - 3.3*N)*0.01 W = 3.267*N + 10 mJ/s.
       - Break-even: 1000 = 3.267*N + 10 -> N ≈ 303 Hz.
    3. **Conclusion & Interpretation:**
       - **Result: Energy-Bound**. Rate gating is strictly superior; 10 Hz consumes 42.7 mJ/s, perfectly satisfying the UX requirement while minimizing transitions.
