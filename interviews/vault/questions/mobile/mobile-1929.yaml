title: A17 NPU Wake Break-Even for Activity Recognition
scenario: A fitness app on Apple A17 Pro runs a 50 MFLOP activity recognition model
  on the Neural Engine. The NPU draws 1.0 W when active and 10 mW when rail-gated.
  The wake transition takes 2 ms during which the rail draws 1.0 W (rail charge-up),
  and a sleep transition adds 0.5 ms at 1.0 W (cache flush to LPDDR before gating).
  The model itself completes in 0.8 ms of active compute per inference. The team must
  choose an inference rate from {1, 5, 10, 30} Hz that minimises energy per second,
  given that user-perceived responsiveness only requires updates every 100 ms (10
  Hz).
question: Implement the per-second energy accounting that includes (a) wake charge-up
  energy, (b) compute energy, (c) sleep flush energy, and (d) the residual sleep current
  between activations. Compute the break-even rate above which always-on (no rail
  gating, just keep NPU active for the second) becomes cheaper than rate-gating, and
  recommend the best rate from the candidate set.
details:
  realistic_solution: 'Per-activation active time = wake 2 ms + compute 0.8 ms + sleep
    0.5 ms = 3.3 ms at 1.0 W -> 3.3 mJ per activation. Per-second energy E(N) = N
    * 3.3 mJ + (1000 - 3.3*N) ms * 0.01 W = 3.27 * N + 10 mJ/s. Sweep: E(1) = 13.3,
    E(5) = 26.4, E(10) = 42.7, E(30) = 108.1. The always-on baseline = 1000 ms * 1.0
    W = 1000 mJ/s. Solving E(N) = 1000 gives the break-even rate N_be = (1000 - 10)
    / 3.27 ~= 303 Hz - far above any practical inference rate, so rate-gating always
    wins for this workload. Among the candidate rates, 10 Hz is the right choice:
    it exactly matches the 100 ms UX requirement, costs 42.7 mJ/s (~23x less than
    always-on), and provides 4x the sample rate of 1 Hz at only 3.2x the energy. 30
    Hz costs 2.5x more energy than 10 Hz for no UX benefit.'
  common_mistake: Ignoring the wake/sleep transition energy (treating sleep as instantaneously
    free) and concluding the higher-rate option is always-better. Or computing the
    break-even by comparing only compute energy, missing that the 2.5 ms transition
    tax dominates.
  napkin_math: Per-activation active = 2 + 0.8 + 0.5 = 3.3 ms at 1 W = 3.3 mJ. E(N)
    = 3.27N + 10 mJ/s. Always-on = 1000 mJ/s. Break-even at N ~ 303 Hz. Pick 10 Hz
    -> 42.7 mJ/s (23x better than always-on).
