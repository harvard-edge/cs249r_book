title: A17 NPU Wake Break-Even for Activity Recognition
scenario: A fitness app on Apple A17 Pro runs a 50 MFLOP activity recognition model on the Neural Engine. The NPU draws 1.0 W when active and 10 mW when rail-gated. The wake transition takes 2 ms during which the rail draws 1.0 W (rail charge-up), and a sleep transition adds 0.5 ms at 1.0 W (cache flush to LPDDR before gating). The model itself completes in 0.8 ms of active compute per inference. The team must choose an inference rate from {1, 5, 10, 30} Hz that minimises energy per second, given that user-perceived responsiveness only requires updates every 100 ms (10 Hz).
question: "Implement the per-second energy accounting to compute the break-even rate for always-on vs rate-gating, and recommend the best rate."
details:
  realistic_solution: 'Calculate the total active time per inference (wake + compute + sleep). Formulate the energy equation for N Hz. Compare the energy of rate-gating to the flat 1000 mJ/s cost of leaving the NPU always on to find the break-even. Since the break-even is absurdly high, select the lowest acceptable UX rate (10 Hz).'
  common_mistake: |
    **The Pitfall:** Ignoring the wake/sleep transition energy tax entirely.
    **The Rationale:** Candidates treat hardware sleep states as instantaneously free, focusing only on the 0.8ms compute time.
    **The Consequence:** They wrongly conclude that rapidly waking and sleeping the NPU at very high rates is cheap, draining the battery through hidden transition overhead.
  napkin_math: |
    - **Per-Activation Time:** 2ms (wake) + 0.8ms (compute) + 0.5ms (sleep) = 3.3 ms.
    - **Per-Activation Energy:** 3.3 ms at 1.0 W = 3.3 mJ.
    - **Energy Equation E(N):** N * 3.3 mJ + (1000 - 3.3*N)*0.01 W = 3.267*N + 10 mJ/s.
    - **Options Evaluation:** E(1) = 13.3 mJ/s, E(5) = 26.3 mJ/s, E(10) = 42.7 mJ/s, E(30) = 108.0 mJ/s.
    - **Break-even against Always-On:** 1000 mJ/s = 3.267*N + 10 -> N ≈ 303 Hz.
    - **Final Result:** Rate gating is strictly superior. The optimal rate is **10 Hz at 42.7 mJ/s**, perfectly matching the UX requirement while saving maximum energy.
