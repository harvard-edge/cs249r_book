title: Compare duty cycle energy efficiency for mobile activity recognition
scenario: A fitness app on an Apple A17 Pro Neural Engine continuously runs a 50 MFLOP
  activity recognition model. The NPU consumes 1W when active and 10mW when asleep,
  with a 2ms wake-up latency penalty.
question: Apply per-frame energy accounting to compute the total energy of (a) immediate
  30 FPS processing and (b) a 10 Hz batched duty cycle, then determine which approach
  consumes less energy per second of operation.
details:
  realistic_solution: At 30 FPS, computing takes <1ms, but waking up 30 times adds
    60ms of active power (1W) wake latency per second. At 10 Hz, waking up 10 times
    adds only 20ms of wake latency, keeping the device in the 10mW sleep state for
    an additional 40ms per second. The 10 Hz duty cycle amortizes the wake-up penalty,
    significantly improving overall energy efficiency.
  common_mistake: Ignoring the hardware wake-up latency and assuming energy is strictly
    proportional to total FLOPs computed.
  napkin_math: 30 * 2ms = 60ms vs 10 * 2ms = 20ms wake penalty
