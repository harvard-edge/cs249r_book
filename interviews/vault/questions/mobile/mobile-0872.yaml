title: Designing a Resilient Agent Fallback Architecture for Intermittent Connectivity on Snapdragon 8 Gen 3
scenario: A mobile app uses a cloud-first compound AI agent (200ms cloud latency) with an on-device fallback (1B LLM, 8 tok/s). Network connectivity drops for 15% of session time. You need to design a graceful degradation architecture with SLAs of <500ms cloud response and <2s on-device response.
question: How should a mobile compound AI agent switch gracefully between cloud and on-device modes during intermittent connectivity?
details:
  realistic_solution: 'Predictive mode switching: Dual-path: launch cloud call AND start on-device embedding simultaneously. If cloud responds < 500ms, cancel on-device. If cloud fails, on-device is already 200ms ahead. Keep last 5 turns of conversation in a compressed context buffer for instant on-device context restoration.'
  common_mistake: |
    **The Pitfall:** Implementing a simple try/catch that switches to on-device on the first timeout.
    **The Rationale:** Waiting for a 3-second cloud timeout before even starting the heavy on-device prefill.
    **The Consequence:** Causing multi-second delays during the cloud-to-device transition, ruining the user experience.
  napkin_math: |
    - Cloud path: 200ms latency + 100ms gen = 300ms.
    - On-device decode (50 tokens @ 40 tok/s): 1250 ms.
    - On-device prefill (512 tokens): 57 ms.
    - Total on-device: 1307 ms.
    - Dual-path switch: If cloud fails at 300ms, on-device has already finished prefill and 243ms of decode.
    - **Effective user latency on cloud failure is only 300ms (wait) + 1007ms (remaining) = ~1.3s.**
