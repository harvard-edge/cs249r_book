title: Optimizing Encoder-Decoder Architectures for Google Tensor G3 On-Device NLU
scenario: Your team is developing an on-device Natural Language Understanding (NLU) feature for a mobile
  application, targeting devices powered by the Google Tensor G3. The feature needs to understand complex
  user queries and generate concise, context-aware responses. An initial prototype uses a cloud-based
  encoder-decoder transformer model, but this approach is infeasible for on-device deployment due to latency
  and resource constraints. The Google Tensor G3 offers a 7.5 TOPS (Tera Operations Per Second) on-device
  TPU and 12 GB of LPDDR5X memory. Your task is to propose and justify the optimal model architecture
  (encoder-only, decoder-only, or an optimized encoder-decoder variant) that can operate within stringent
  latency budgets (e.g., <150ms per inference) and memory limits, while maintaining acceptable accuracy.
  How would you diagnose the potential performance bottlenecks for each architecture on the Tensor G3
  and quantify the system costs (latency, memory, power) to make your recommendation?
details:
  realistic_solution: 'A realistic solution involves a multi-pronged approach: 1. **Quantification & Benchmarking:**
    Conduct early benchmarking of representative small encoder-only (e.g., MobileBERT, MiniLM), decoder-only
    (e.g., small GPT-2), and encoder-decoder (e.g., DistilBART, small T5) models, all aggressively quantized
    to INT8, on a Tensor G3 or similar mobile TPU. 2. **Memory Analysis:** Accurately estimate memory
    footprints for weights and activations, ensuring they comfortably fit within the 12 GB LPDDR5X limit,
    considering potential swapping or cache misses. 3. **Latency Profiling:** Profile inference latency
    focusing on token generation rates for decoders (sequential) vs. parallel processing for encoders.
    Identify the specific bottleneck (compute-bound vs. memory-bound). 4. **Architecture Selection:**
    If understanding is paramount and generation is short/templated, an encoder-only model might suffice.
    For complex generation, a highly compressed encoder-decoder with techniques like knowledge distillation,
    pruning, and optimized attention mechanisms (e.g., efficient attention variants) would be necessary.
    A decoder-only might be too memory-hungry or inefficient for diverse NLU tasks. 5. **Power Considerations:**
    Integrate power consumption estimates (e.g., mAh/inference) as a critical cost metric.'
  common_mistake: A common mistake is to focus purely on model accuracy or theoretical FLOPs/TOPS without
    considering the practical implications of memory bandwidth (LPDDR5X) and on-device TPU utilization,
    especially for sequential operations common in decoders. Candidates might overlook the critical role
    of INT8 quantization for maximizing effective TOPS on mobile TPUs, or fail to account for activation
    memory footprint alongside model weights. Another error is not systematically quantifying the trade-offs,
    leading to qualitative rather than data-driven architectural decisions.
  napkin_math: 'Given 7.5 TOPS (INT8) and 12 GB LPDDR5X memory (approx. 50 GB/s bandwidth):


    *   **Compute:** For a 150ms latency target, the model can consume `7.5 TOPS * 0.150s = 1.125 Tera
    Operations`. If a typical mobile TPU achieves ~50% sustained utilization, the effective budget is
    `0.5 * 1.125 Tera Operations = 562.5 Giga Operations`. A model with 500 million (0.5B) INT8 parameters
    might require ~500 GOPS for a single forward pass, making it a viable candidate. Larger models (e.g.,
    1-2B params) would push this limit.


    *   **Memory:** For INT8, 1 billion parameters equates to approximately 1 GB of weights. For a 12
    GB LPDDR5X system, allowing 2-4 GB for the OS and other apps, the model weights + activations should
    ideally be under 8-10 GB. A 5 billion parameter INT8 model would consume 5 GB for weights, leaving
    ~7 GB for activations. If activations are large (e.g., batch size, sequence length), this could become
    a memory bottleneck. Memory bandwidth also dictates how quickly weights/activations can be moved;
    a 1GB model loaded from DRAM at 50 GB/s takes 20ms, contributing significantly to latency if not cached
    effectively.


    *   **Tradeoff:** Encoder-only models typically have lower parameter counts and more parallel operations,
    making them memory and compute efficient. Decoder-only models, especially for generation, can have
    high memory usage due to auto-regressive state and large parameter counts. Encoder-decoder models
    are a balance but require careful compression. The bottleneck will often shift from compute-bound
    to memory-bandwidth-bound as models get smaller and more quantized.'
