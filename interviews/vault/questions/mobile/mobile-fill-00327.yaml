title: Memory Optimization for 7B LLM Inference on Samsung Exynos 2400 NPU
scenario: "You are deploying a 7 billion parameter (FP16) Large Language Model (LLM) for real-time inference\
  \ on a Samsung Exynos 2400 NPU, which features 12 GB of LPDDR5X memory and 34.7 TOPS. Initial deployment\
  \ attempts encounter Out-Of-Memory (OOM) errors, as the model's FP16 weights alone consume 14 GB. You\
  \ must implement memory-saving strategies to allow the model to fit and run efficiently. The inference\
  \ pipeline involves tokenizing input sequences of up to 512 tokens and generating output sequences of\
  \ up to 128 tokens. Assuming a KV cache for attention mechanisms, where each key/value pair for a single\
  \ head and token takes `2 * hidden_size * num_attention_heads * sequence_length` bytes for FP16, and\
  \ the model has `32` attention heads and a `hidden_size` of `4096`. \n\n1. Given the 12 GB LPDDR5X memory\
  \ and the 7 billion FP16 parameters (2 bytes/parameter) LLM, what is the minimum *integer* quantization\
  \ bit-width (e.g., INT8, INT4) required for the model weights to reduce their footprint sufficiently\
  \ to allow at least 2 GB for activations, KV cache, and other runtime buffers? Show the calculation.\
  \ \n2. For the given KV cache parameters (`hidden_size` 4096, `num_attention_heads` 32, max output `sequence_length`\
  \ 128, FP16), calculate the total memory consumed by the KV cache for a single inference request. Provide\
  \ the formula and the resulting value in MB."
question: ", INT8, INT4) required for the model weights to reduce their footprint sufficiently to allow at least 2 GB for activations, KV cache, and other runtime buffers?"
details:
  realistic_solution: 'Employ a multi-pronged approach:

    1. **Weight Quantization**: Quantize model weights to INT8 or INT4 using techniques like Grouped Quantization
    or AWQ (Activation-aware Weight Quantization) to reduce the model size, while carefully evaluating
    accuracy degradation.

    2. **KV Cache Optimization**: Implement PagedAttention or FlashAttention to efficiently manage KV
    cache memory, potentially offloading older cache entries to system RAM if latency permits, or employing
    techniques like token pruning.

    3. **Dynamic Tensor Management**: Utilize custom memory allocators or frameworks that minimize memory
    fragmentation and optimize tensor lifecycle.

    4. **Operator Fusion/Kernel Optimization**: Reduce intermediate tensor creation through operator fusion
    and custom NPU kernels, and ensure efficient data movement between memory tiers.'
  common_mistake: Overlooking the cumulative memory footprint of activations, KV cache, and intermediate
    tensors, not just model weights. Another common mistake is applying aggressive quantization without
    evaluating its impact on model accuracy and NPU performance characteristics for different quantization
    schemes.
  napkin_math: "1. **Weight Quantization Bit-Width Calculation:**\n   - Model size (FP16): 7 * 10^9 parameters\
    \ * 2 bytes/parameter = 14 GB\n   - Target memory for weights (allowing 2GB for others): 12 GB - 2\
    \ GB = 10 GB\n   - Required reduction factor for weights: 14 GB / X bytes per param = 10 GB => X =\
    \ 1.4 bytes per param (average)\n   - FP16 (2 bytes) to INT8 (1 byte) is a 2x reduction, resulting\
    \ in 7 GB.\n   - INT8 (1 byte/parameter) is the minimum integer quantization bit-width required to\
    \ fit within 10 GB (7GB < 10GB).\n\n2. **KV Cache Memory Calculation (for max output sequence length,\
    \ batch_size=1):**\n   - Formula: `2 * num_layers * num_heads * head_dim * sequence_length * bytes_per_element`\n\
    \   - Values: `num_layers = 32`, `num_heads = 32`, `head_dim = 128`, `sequence_length = 128`, `bytes_per_element\
    \ = 2` (for FP16)\n   - Calculation: `2 * 32 * 32 * 128 * 128 * 2 bytes = 67,108,864 bytes`\n   -\
    \ Conversion to MB: `67,108,864 bytes / (1024 * 1024) = 64 MB`"
