title: Analyzing Manifest Chunking for Flaky Networks
scenario: A mobile app downloads a 2GB model update over an unstable 4G connection, with frequent multi-second connection drops.
question: Analyze why breaking the file into 10MB chunks with a manifest file is superior to a single monolithic HTTP request.
details:
  realistic_solution: |
    A single monolithic request often restarts from zero upon a connection drop. Chunking allows the client to track downloaded segments via the manifest and resume by requesting only the missing 10MB parts, making forward progress monotonic across drops.
  common_mistake: |
    **The Pitfall:** Relying solely on TCP window retries.
    **The Rationale:** Candidates assume network protocols will automatically handle long disconnections without application-layer intervention.
    **The Consequence:** The download constantly restarts from zero, wasting massive amounts of bandwidth and never completing on flaky networks.
  napkin_math: |
    - **Total File Size:** 2000 MB.
    - **Chunk Size:** 10 MB.
    - **Calculation:** 2000 MB / 10 MB = 200 chunks.
    - **Result:** **The client makes progress in 200 verifiable segments.**
