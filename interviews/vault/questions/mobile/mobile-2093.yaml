title: Analyzing Manifest Chunking for Flaky Networks
scenario: A mobile app downloads a 2GB model update over an unstable 4G connection,
  with frequent multi-second connection drops.
question: Analyze why breaking the file into 10MB chunks with a manifest file is superior
  to a single monolithic HTTP request.
details:
  realistic_solution: A single monolithic request often restarts from zero upon a
    connection drop. Chunking allows the client to track downloaded segments via the
    manifest and resume by requesting only the missing 10MB parts, making forward
    progress monotonic across drops.
  common_mistake: Assuming TCP window retries will handle long disconnections without
    application-layer chunking.
  napkin_math: 2000MB / 10MB = 200 chunks
