title: 'Latency Decomposition: Size Inference Latency Budget for AR App on A17 Pro'
scenario: An augmented reality iOS app must overlay semantic segmentation on the camera feed in real time. The A17 Pro (35 TOPS Neural Engine) runs a segmentation model (MobileNetV3 backbone, 5M params INT8, 2.8 GOPs) at 60fps.
question: What latency budget does each AR segmentation pipeline stage consume on A17 Pro, and how much 60 FPS slack remains?
details:
  realistic_solution: 'Camera capture: 0ms (streaming, always available). Pre-process (GPU): 1ms. Inference: 2.8G/35T ≈ 0.08ms + 2ms overhead = 2ms. Post-process (argmax over 1280×720×21 classes): CPU naive 8ms, Metal compute 1ms. Metal render: 2ms. Display commit: must finish by 15ms before vsync. Total: 1+2+1+2 = 6ms. Budget: 10ms slack. Can add second model or increase resolution.'
  common_mistake: |
    **The Pitfall:** Assuming 60fps provides a full 16.7ms for computation.
    **The Rationale:** Candidates often sum the compute stages up to 16.7ms, forgetting the rendering and vsync deadlines.
    **The Consequence:** The pipeline misses the display commit deadline, causing skipped frames and jittery AR overlays.
  napkin_math: |
    1. Neural Engine Compute: 2.8 GOPs / 35 TOPS = 0.08ms.
    2. Framework overhead: ~2ms.
    3. Post-process Argmax on Metal (1280x720x21 = 19.4M ops @ 1 TFLOPS): ~1ms.
    4. Metal render: ~2ms. Pre-process (GPU): ~1ms.
    5. Total Pipeline Latency: 2ms (Inference) + 1ms (Post) + 2ms (Render) + 1ms (Pre) = 6ms.
    6. 60fps budget = 16.7ms.
    7. Conclusion: **16.7ms - 6ms = 10.7ms of remaining slack.**
