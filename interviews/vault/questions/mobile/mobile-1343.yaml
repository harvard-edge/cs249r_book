title: On-Device Active Learning Throughput
scenario: You are designing an on-device active learning pipeline to curate difficult
  edge-case images for server-side labeling. The pipeline runs in the background on
  a device powered by a Samsung Exynos 2400 NPU. The dual-core NPU is capable of 34.7
  TOPS, but since it shares its 12 GB LPDDR5X RAM with the CPU, GPU, and ISP, you
  must limit your background data selection task to just 2% of peak NPU compute to
  avoid thermal throttling and memory bandwidth contention. If your uncertainty-scoring
  model requires 12.5 GOPS per inference, how many frames per minute can you evaluate
  to curate your dataset?
question: 5 GOPS per inference, how many frames per minute can you evaluate to curate
  your dataset?
details:
  realistic_solution: The solution requires converting the total NPU capacity to the
    correct scale, applying the background utilization constraint, and then dividing
    by the model's computational cost. We convert TOPS to GOPS, apply the 2% constraint
    to find allowable compute per second, divide by the model's cost to get frames
    per second, and multiply by 60 to determine the curation throughput per minute.
  common_mistake: Candidates often fail to correctly convert TOPS (Tera Operations
    Per Second) to GOPS (Giga Operations Per Second), or they forget to multiply by
    60 to convert frames per second to frames per minute. Another common error is
    ignoring the 2% utilization constraint entirely.
  napkin_math: '1. Total NPU capacity: 34.7 TOPS = 34,700 GOPS.

    2. Allowable background compute: 34,700 GOPS * 0.02 = 694 GOPS.

    3. Frames evaluated per second: 694 GOPS / 12.5 GOPS/frame = 55.52 frames/second.

    4. Frames evaluated per minute for dataset curation: 55.52 * 60 = 3,331.2 frames/minute
    (or ~3,331 frames).'
