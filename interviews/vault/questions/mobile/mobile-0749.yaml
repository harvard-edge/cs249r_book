title: The Radio Energy Wall
scenario: You optimize your activity-tracking model down to 3 mW. However, the app still drains the battery
  by 10% per hour because it uploads labels to your server every 5 minutes. Based on the power breakdown,
  where is your optimization effort being wasted?
question: "Why does uploading 3 mW activity labels every 5 minutes still drain 10% battery per hour?"
details:
  realistic_solution: 'You are hitting the **Radio Wake Overhead**. The cellular radio consumes ~800 mW
    every time it wakes from idle. Waking it every 5 minutes for a tiny payload prevents the radio from
    staying in its low-power state. The fix is **Batching and Delegation**: buffer results locally and
    upload once per hour, and use the OS''s low-power activity co-processor (like Apple''s M-series) instead
    of a custom always-on CPU loop.'
  common_mistake: '"Retrain the model to be even smaller." The model''s 3 mW is already negligible compared
    to the system overhead.'
  napkin_math: 'Radio: 800 mW × 10s (wake + tail) × 12 times/hr = 26.7 mWh. Model: 3 mW × 1 hr = 3 mWh.
    The radio wake is ~9x more expensive than the actual ML work.'
