title: The MobileNet Migration Diagnosis
scenario: You are a Staff ML Engineer on a mobile team developing a new 'visual sticker suggestion' feature.
  The prototype uses a custom ResNet-style model that analyzes the live camera preview. On a flagship
  phone (like an Apple A17 Pro), you observe significant UI 'jank' because the model inference takes 45ms,
  blowing past the 16ms per-frame budget for a smooth 60fps experience.
details:
  realistic_solution: The correct solution is to replace the standard 3x3 convolution with a 3x3 depthwise
    separable convolution, which is the foundational block of MobileNet and other efficient mobile architectures.
    This architectural change drastically reduces the number of multiply-accumulate (MAC) operations while
    preserving much of the model's expressive power.
  common_mistake: Engineers often misdiagnose the bottleneck, focusing only on parameter count instead
    of computational cost (FLOPs/MACs). Another common error is jumping to overly complex or inappropriate
    solutions like NAS or Transformers before applying fundamental, targeted optimizations. Some may also
    incorrectly calculate the savings from a depthwise separable convolution.
  napkin_math: 'For ResNet layer: Cin=256, Cout=256, K=3, H=112, W=112. MACs = H * W * K^2 * Cin * Cout
    = 112 * 112 * 3^2 * 256 * 256 = 7.4 billion MACs (14.8 GFLOPs). On A17 Pro (35 TOPS), compute time
    is 14.8G / 35T = 0.42ms. But memory read is 256*112*112*2 = 6.4MB. Very compute-heavy, but feasible.'
  options:
  - Use Neural Architecture Search (NAS) to discover a more efficient layer configuration.
  - Replace the 3x3 convolutional layer with a Vision Transformer (ViT) block.
  - Replace the layer with a 3x3 depthwise separable convolution.
  - Reduce the layer's kernel size from 3x3 to 1x1 to reduce parameters by 9x.
  correct_index: 2
