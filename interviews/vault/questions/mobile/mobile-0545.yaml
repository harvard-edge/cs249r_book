title: The MobileNet Migration Diagnosis
scenario: You are a Staff ML Engineer on a mobile team developing a new 'visual sticker suggestion' feature. The prototype uses a custom ResNet-style model that analyzes the live camera preview. On a flagship phone (like an Apple A17 Pro), you observe significant UI 'jank' because the model inference takes 45ms, blowing past the 16ms per-frame budget for a smooth 60fps experience.
question: "Which architectural change should replace the slow ResNet-style layer to meet the mobile visual sticker budget?"
details:
  realistic_solution: 'Replace the standard 3x3 convolution with a 3x3 depthwise separable convolution. This drastically reduces the number of multiply-accumulate (MAC) operations while preserving expressive power.'
  common_mistake: |
    **The Pitfall:** Over-complicating the solution or misdiagnosing the core math bottleneck.
    **The Rationale:** Engineers jump to NAS or Transformers without calculating the massive FLOPs cost of a standard ResNet 3x3 convolution block on high-res input.
    **The Consequence:** Deploying overly complex architectures that don't address the fundamental arithmetic intensity problem.
  napkin_math: |
    - **Baseline ResNet Cost:** Cin=256, Cout=256, K=3, H=112, W=112.
    - **MAC Calculation:** MACs = 112 * 112 * 9 * 256 * 256 = 7.4 billion MACs (14.8 GFLOPs).
    - **Time Check:** On A17 Pro (35 TOPS), compute time is theoretically 0.42ms, but memory read is 6.4MB per layer.
    - **Final Result:** A standard 3x3 is too heavy per-layer; switching to a **depthwise separable convolution** structurally resolves the MAC and memory bottleneck.
