title: Orin RDMA Cache Lock
scenario: 4 Jetson AGX Orins executing a multi-modal agent model share a global KV
  cache pool over a 10GbE switch using RDMA.
question: Create a distributed KV cache allocation protocol that mitigates the 10us
  RDMA lock synchronization cost when multiple Orins append to the same sequence.
details:
  realistic_solution: A naive token-by-token RDMA lock incurs a 40us contention bubble
    per step across the 4 nodes. The protocol must utilize block-level preallocation,
    acquiring an RDMA lock to reserve a 16-token chunk at once. This amortizes the
    10us synchronization cost over 16 generation steps.
  common_mistake: Designing a token-by-token locking mechanism over RDMA, leading
    to severe lock contention scaling rather than using block-level preallocation.
  napkin_math: Token lock = 4 * 10us = 40us per step. Block lock (16 tokens) = 40us
    / 16 = 2.5us amortized penalty.
