title: Exynos 2400 NPU Deployment for a Transformer-based Object Detector
scenario: Your team developed a large-scale object detection model trained in PyTorch. You are tasked with deploying this model on a flagship mobile device, leveraging its NPU. The strict performance target is 30 FPS inference with an average latency under 30ms for 1080p input frames.
question: How would you convert, optimize, and validate a PyTorch object detector for 30 FPS on a mobile NPU?
details:
  realistic_solution: |
    A robust L5 architectural deployment involves: 1. **Export & Translation**: Export via ONNX to a format like TFLite, utilizing vendor-specific SDKs (e.g., Qualcomm SNPE or Samsung ENN). 2. **Operator Mapping**: Profile using `nsys` to isolate complex operations (e.g., non-maximum suppression, custom attention) that trigger expensive fallbacks to the CPU. 3. **Quantization Strategy**: Execute Quantization-Aware Training (QAT) to generate a robust INT8 model, radically shrinking the memory footprint to circumvent main bus saturation. 4. **Hardware Fusion**: Ensure the compiler aggressively fuses activation functions into the convolution blocks to maintain intermediate tensors strictly within NPU SRAM.
  common_mistake: |
    **The Pitfall:** Attempting a direct, 'one-shot' conversion of the PyTorch model to TFLite or ONNX.
    **The Rationale:** Candidates assume automatic converters will perfectly optimize for specific NPUs without prior profiling.
    **The Consequence:** This leads to critical operators falling back to the CPU, suboptimal quantization, and failure to meet latency requirements.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target: 30 FPS (33.3 ms/frame budget). SLA Target: < 30 ms.
    - NPU Peak capability: 34.7 TOPS.
    - Compute requirement: e.g., 10 Giga-Operations (GOPs) per frame.

    **Calculations:**
    - Theoretical ideal compute time = 10 GOPs / 34,700 GOPs/sec = ~0.29 ms.
    - Compute headroom = 30 ms - 0.29 ms = 29.71 ms available for I/O and overhead.

    **Conclusion & Interpretation:**
    - **Result: 29.71 ms headroom (Memory/IO-Bound)**. With a massive 29.7ms of compute headroom, performance hinges entirely on minimizing memory bus trips and avoiding CPU fallbacks. Direct 'one-shot' compilation without profiling guarantees SLA failure.
