title: Bounding Box Quantization Shift
scenario: An INT8 object detection model on an Apple A17 Pro yields shifted bounding box coordinates compared to FP32, while classification confidence remains perfectly matched.
question: How can a per-channel quantization scale inspection diagnose if the regression stems from asymmetric saturation in the regression head?
details:
  realistic_solution: Classification outputs are tightly bounded (e.g., [0, 1] after softmax) and quantize cleanly. Bounding box coordinates, however, predict large pixel values (e.g., [0, 1024]). If the regression head uses symmetric quantization (centered at 0), it wastes half of the 256 available INT8 bins on negative pixel values that don't exist. This effectively halves the resolution, causing coordinate shift errors. Applying asymmetric quantization utilizes the full [0, 255] range for positive coordinates, cutting the quantization error in half.
  common_mistake: |
    **The Pitfall:** Diagnosing coordinate shifts as an NPU arithmetic or driver bug.
    **The Rationale:** Engineers overlook that bounding boxes are strictly non-negative and assume standard symmetric quantization works universally across all model heads.
    **The Consequence:** Wasting effort debugging hardware integration rather than fixing the precision collapse caused by wasted quantization bins.
  napkin_math: |
    1. **Symmetric INT8:** Mapping bounds [0, 1024] forces a symmetric range of [-1024, 1024].
    2. **Symmetric Resolution:** 2048 range / 255 bins = 8 pixels per bin.
    3. **Asymmetric INT8:** Maps exactly to [0, 1024].
    4. **Asymmetric Resolution:** 1024 range / 255 bins = 4 pixels per bin.
    5. **Conclusion:** Symmetric quantization halves the resolution to **8 pixels per bin**, causing the observed coordinate shift errors.
