title: Bounding Box Quantization Shift
scenario: An INT8 object detection model on an Apple A17 Pro yields shifted bounding
  box coordinates compared to FP32, while classification confidence remains perfectly
  matched.
question: Apply a per-channel quantization scale inspection to diagnose if the regression
  stems from asymmetric saturation in the coordinate regression head.
details:
  realistic_solution: Classification outputs are tightly bounded (e.g., [0, 1] after
    softmax) and quantize cleanly. Bounding box coordinates, however, predict large
    pixel values (e.g., [0, 1024]). If the regression head uses symmetric quantization
    (centered at 0), it wastes half of the 256 available INT8 bins on negative pixel
    values that don't exist. This effectively halves the resolution, causing coordinate
    shift errors. Applying asymmetric quantization utilizes the full [0, 255] range
    for positive coordinates, cutting the quantization error in half.
  common_mistake: Diagnosing this as an NPU arithmetic bug rather than recognizing
    the precision collapse caused by symmetric bounds on strictly non-negative spatial
    coordinates.
  napkin_math: Symmetric INT8 on [0, 1024] forces range [-1024, 1024], resolution
    = 2048/255 = 8px. Asymmetric gives 1024/255 = 4px.
