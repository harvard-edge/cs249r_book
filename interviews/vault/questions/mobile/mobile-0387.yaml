title: The Drowsy Driver's Battery Drain (mobile-0387)
scenario: 'You''re building a ''drowsiness detection'' feature that runs on a smartphone''s SoC. According
  to your profiler, the SoC consumes 3W of power while the ML model is actively running. To save battery,
  you implement a duty cycle: the feature is active for 50% of the time during a drive (e.g., runs for
  1 second, sleeps for 1 second). For a continuous 1-hour drive, calculate the total energy, in Watt-hours
  (Wh), that this feature consumes from the phone''s battery.'
details:
  realistic_solution: The correct answer is 1.5 Wh. The solution requires applying the formula for energy
    consumption that incorporates the duty cycle. You multiply the active power consumption by the duty
    cycle ratio and the total time period.
  common_mistake: The most common mistake is to ignore the duty cycle, calculating the energy consumption
    as if the feature were active 100% of the time. This overestimates the battery drain by a factor of
    2. Another error is to confuse power (Watts), an instantaneous rate of energy transfer, with energy
    (Watt-hours), the total amount of work done over a period.
  napkin_math: Energy = Power × Duty Cycle × Time
  options:
  - 3.0 Wh
  - 6.0 Wh
  - 1.5 Wh
  - 0.05 Wh
  correct_index: 2
