title: A17 Pro Unified Memory Contention in Video Pipeline
scenario: Your team is deploying a real-time video processing pipeline on the Apple A17 Pro. The 16-core
  Neural Engine provides 35 TOPS of compute at ~5W, but it shares 8 GB of unified memory with the CPU
  and GPU. During profiling, you observe that despite the Neural Engine being underutilized at 30% capacity,
  the system consistently drops frames below your 30 FPS target. Explain why this data pipeline is bottlenecking
  the system despite the available compute overhead.
details:
  realistic_solution: The bottleneck occurs due to memory bandwidth contention within the unified memory
    architecture. The CPU is performing heavy data transformations (like color space conversion or resizing)
    and writing to memory, while the 16-core Neural Engine simultaneously attempts to read this data for
    inference. To resolve this, the pipeline should utilize zero-copy memory buffers (such as IOSurface)
    to pass data directly from the camera ISP to the Neural Engine, eliminating intermediate CPU memory
    copies.
  common_mistake: Candidates often assume the 35 TOPS compute capacity is the limiting factor and suggest
    optimizing or quantizing the model further. They fail to recognize that the shared 8 GB unified memory
    architecture means data preprocessing on the CPU competes directly with the Neural Engine for memory
    bandwidth.
  napkin_math: Target latency for 30 FPS is 33.3ms per frame. A raw 4K video frame (3840x2160x3 bytes
    for RGB) is roughly 25MB. If the CPU copies it during preprocessing (25MB read + 25MB write) and the
    Neural Engine reads it (25MB), that requires 75MB of memory traffic per frame. At 30 FPS, this consumes
    2.25 GB/s of bandwidth purely for data movement, which competes with the OS and GPU in the shared
    8 GB memory pool, causing memory stalls before the 35 TOPS compute limit is ever reached.
