title: On-Device Data Drift Detection for Real-time ML on Samsung Exynos 2400 NPU
scenario: You are designing an on-device machine learning system for a critical user-facing feature on a Samsung Galaxy device, leveraging the Samsung Exynos 2400 NPU (34.7 TOPS, 12 GB LPDDR5X). The ML model, a neural network for real-time image processing, is deployed directly on the NPU. Due to evolving user behavior and environmental conditions, data distribution shifts are anticipated, which could severely degrade model performance and user experience.
question: How would you design a robust, low-overhead on-device drift detector for an Exynos 2400 image model with reliable fallback triggers?
details:
  realistic_solution: 'An L5 engineer would propose an adaptive, lightweight, and NPU-optimized drift detection strategy. This would involve:

    1.  **Feature Selection**: Identifying key, representative features whose distribution changes are strong indicators of model drift, rather than monitoring all features.

    2.  **Statistical Method**: Employing a method like Population Stability Index (PSI) or a simplified form of A/B divergence (e.g., Jensen-Shannon divergence) on binned feature distributions. These metrics are chosen for their interpretability and lower computational overhead compared to full KL divergence. Alternatively, monitoring simpler metrics like mean, variance, or specific percentiles for critical features.

    3.  **Sampling Strategy**: Implementing a robust sampling strategy (e.g., reservoir sampling or time-windowed sampling) to continuously collect small, representative batches of inference data from the NPU. This data would then be compared against a baseline distribution (e.g., from the training set or a recent stable period).

    4.  **NPU Optimization**: Leveraging the Exynos 2400 NPU''s 34.7 TOPS for efficient tensor operations involved in feature extraction and statistical calculations. Specific NPU acceleration libraries (e.g., TFLite delegates for NPU) would be used. Quantization-aware drift detection logic could further reduce computational and memory footprint, utilizing the NPU''s 12 GB LPDDR5X for temporary data storage and comparison baselines.

    5.  **Thresholding & Alerting**: Dynamically adjusting drift thresholds based on a moving average or historical volatility of the chosen metrics. Upon detection of significant drift, the system would trigger an immediate local fallback to a more robust, albeit potentially less performant, model version stored on-device, and log data for asynchronous upload and retraining in the cloud.'
  common_mistake: |
    **The Pitfall:** Proposing full KL divergence on high-dimensional data over large batches.
    **The Rationale:** Candidates apply cloud-scale drift detection metrics without adapting for mobile hardware.
    **The Consequence:** Continuous drift calculation drains the battery and steals critical NPU compute from the primary real-time model.
  napkin_math: |
    1. Inference rate: 50 inferences/sec.
    2. Sampling rate: 1% = 0.5 inferences/sec.
    3. Drift ops per sample: 10 features * 100 ops/feature = 1,000 ops.
    4. Total drift ops/sec: 0.5 * 1,000 = 500 ops/sec.
    5. NPU Capacity: 34.7 TOPS (34.7 * 10^12 ops/sec).
    6. Utilization: 500 / 34.7e12 = negligible overhead.
    7. Memory footprint: 10 baselines * 100 bins * 4 bytes = 4 KB.
    8. **Conclusion: Continuous detection requires < 0.0001% of NPU capacity and 4KB RAM.**
