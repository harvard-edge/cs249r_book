title: 'Kernel Fusion: Realize Bandwidth Savings from Fusing Transformer Block on Snapdragon'
scenario: 'Realize the bandwidth savings from fusing the post-attention operations on Snapdragon 8 Gen
  3 (45 TOPS INT8, 16GB). For a 1B model decode (batch=1), the post-attention sequence is: attention output
  (4096-element) → Linear → RMSNorm → residual add → gate. Quantify savings per layer and total.'
details:
  realistic_solution: 'Activation bandwidth for post-attention sequence: the 4096-element vectors are
    tiny compared to the 4096×4096 weight matrices. Fusion saves activation reads/writes but those are
    negligible. The real insight: don''t bother fusing these for decode — weights dominate.'
  common_mistake: Not distinguishing between weight bandwidth (dominant, can't be fused away) and activation
    bandwidth (small, can be fused). Students often confuse which is the bottleneck.
  napkin_math: 'Post-attention ops (decode, batch=1, 4096 hidden): Attention output: 4096 × 2B = 8KB.
    Linear projection: weight 4096×4096×1B = 16MB, output 8KB. RMSNorm: 8KB in, 8KB out. Residual: 8KB
    + 8KB = 16KB. Gate linear: weight 4096×4096×1B = 16MB, output 8KB. Total activation bandwidth (all
    post-attn tensors): 8+8+8+8+8+8+8 = 56KB. At 68 GB/s: 0.00082ms. Weight bandwidth: 16MB + 16MB = 32MB.
    At 68 GB/s: 0.47ms. Ratio: weights are 32MB / 0.056MB = 571× larger. Fusing all activation ops: saves
    all 56KB activation HBM traffic = 0.00082ms per layer. 28 layers: 0.023ms total savings. Vs total
    decode time (28 layers × 0.47ms weight load + everything = ~20ms): savings = 0.11%. Not worth engineering
    effort for this workload. Fusion target for mobile decode: focus on attention (huge savings), not
    tiny activation ops.'
