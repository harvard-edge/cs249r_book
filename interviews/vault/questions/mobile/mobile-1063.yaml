title: Analyze Transformer Token Budget on Snapdragon 8 Gen 3
scenario: 'A mobile AI assistant uses a 1B parameter transformer on Snapdragon 8 Gen
  3 (45 TOPS Hexagon NPU, 77 GB/s LPDDR5X, 12GB RAM). The model is INT4 quantized
  (500MB weights). Analyze the memory allocation for supporting 4K context window
  with 10 concurrent conversation turns, given: 32 layers, 8 KV heads, 64 head dimension,
  4K tokens per turn.'
question: 'How would you analyze the memory allocation for supporting 4K context window
  with 10 concurrent conversation turns, given: 32 layers, 8 KV heads, 64 head dimension,
  4K tokens per turn?'
details:
  realistic_solution: 'Available RAM: 12GB total. OS + Android: 4GB. App + model weights:
    500MB + 500MB app = 1GB. Available for KV: 12 - 4 - 1 = 7GB. KV per token: 2(KV)
    × 32L × 8H × 64D × 2B (FP16) = 65,536B = 64KB/token. Per turn at 4K context: 4096
    × 64KB = 256MB. 10 turns: 10 × 256MB = 2,560MB = 2.5GB < 7GB available. Headroom:
    4.5GB. Maximum supported concurrent turns at 4K context: 7GB / 256MB = 27.3 →
    27 turns. But attention over 10×4K=40K total context: O(40K²) × 32L computation
    may be intractable at decode speed — context compression needed.'
  common_mistake: Allocating KV cache for max context per conversation without considering
    that phone RAM must also support OS, app code, and other active processes (typically
    4-6GB consumed by Android).
  napkin_math: 'KV/token: 2×32×8×64×2B=65,536B=64KB. Per turn 4K: 256MB. 10 turns:
    2.5GB. Available: 7GB. Headroom for 27 turns. But decode at 40K total context:
    memory reads = 40K×64KB=2.5GB per decode step. At 77 GB/s: 32ms per decode token
    (vs 500MB weights at 6.5ms). Context dominates at >8K tokens.'
