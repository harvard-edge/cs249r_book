title: The Drowsiness Detection TCO Dilemma
scenario: 'You are the ML Systems Engineer for a popular smart driving assistant app with 1 million daily
  active users. The product team wants to A/B test a new ''Driver Drowsiness Detection'' feature and has
  proposed two implementations: Option A) Centralized Cloud Inference, where images are uploaded continuously,
  and Option B) On-Device Inference with Federated Learning (FL), where the model runs locally and only
  updates are sent. The PM is concerned about the $100K upfront FL infrastructure cost and potential user
  churn from battery drain. Based on the provided metrics, which option is more cost-effective?'
details:
  realistic_solution: The correct method is to calculate and compare the total annual cost of both options.
    Option A's cost is a direct operational expense (OpEx) driven by data egress and cloud compute. Option
    B's cost is an indirect business expense, calculated as revenue lost from increased user churn. Comparing
    the quantified costs reveals the most economically sound strategy.
  common_mistake: Engineers often focus only on the most obvious cost (e.g., cloud compute) and ignore
    or miscalculate second-order costs like data egress. Others may have a qualitative bias, assuming
    'federated learning is too complex' or 'cloud is always expensive' without performing a quantitative
    Total Cost of Ownership (TCO) analysis. An L3 candidate must correctly model and compare both direct
    operational costs and indirect business costs like churn.
  napkin_math: "### Option A: Centralized Annual Cost\n1. **Data upload**: 1M users × 1 image/min × 60\
    \ min/day active × 50 KB/image = 3 TB/day.\n2. **Cloud egress/ingress**: ~$0.09/GB × 3,000 GB/day\
    \ = **$270/day**.\n3. **Cloud inference**: 1M users × 60 inferences/day × 10ms/inference = 600,000\
    \ GPU-seconds/day.\n   - 600,000s / 3600 = 166.7 GPU-hours/day × $3.50/hr (A100) = **$583/day**.\n\
    4. **Annual cost**: ($270 + $583) × 365 = **~$311K/year**.\n\n### Option B: On-Device (FL) Annual\
    \ Cost\n1. **On-device inference**: Runs on phone NPU at ~5ms/inference, ~0.5 mJ/inference.\n   -\
    \ 60 inferences/day × 0.5 mJ = 30 mJ/day = 30/3600 mWh = 0.00833 mWh/day → 0.000056% of a 15,000 mWh\
    \ battery.\n2. **User churn from battery drain**: Negligible battery impact → negligible churn.\n\
    3. **FL aggregation server**: Weekly model updates. 1M × 10 KB gradient = 10 GB/round.\n   - Server\
    \ cost: ~$500/month = **$6,000/year**.\n4. **Engineering**: $100K one-time FL infrastructure.\n5.\
    \ **Year 1 total**: $100K + $6K = **$106K**.\n\n### Comparison\n- Option A: ~$311K/year recurring.\n\
    - Option B: ~$106K Year 1, ~$6K/year thereafter.\n- **Savings Year 1**: $205K. **Savings Year 2+**:\
    \ $305K/year.\n- Privacy benefit: No facial data leaves the device."
  options:
  - The federated approach is too expensive; the revenue lost from 0.5% churn is over $250,000.
  - The centralized approach is cheaper because the cloud inference cost is minimal, and data transfer
    costs are negligible for small clips.
  - The centralized approach's annual cost is over $200k, dominated by data egress and inference, making
    the federated option's ~$25k churn cost far cheaper.
  - Both options are roughly equivalent in cost once you factor in the engineering salary required to
    maintain the Federated Learning infrastructure.
  correct_index: 2
