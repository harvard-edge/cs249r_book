title: Multi-Chiplet Thermal Throttle Recovery for Mobile Gaming
scenario: A mobile gaming application running AI-enhanced rendering on a Dimensity
  9300-class chiplet experiences thermal throttling after 15 minutes of gameplay.
  NPU utilization drops from 85% to 40%. CPU governor stays at max. Describe the throttling
  cascade and how to redesign the thermal workload schedule.
question: How would you explain NPU throttling in a mobile chiplet gaming workload
  and redesign the thermal schedule?
details:
  realistic_solution: 'Mobile chiplets share a single TDP envelope (~10-15W for flagship
    SoCs). When GPU+CPU+NPU all run simultaneously, their combined power exceeds the
    sustained TDP, triggering the thermal daemon (THERMAL HAL) to throttle the highest-power
    component. On Dimensity 9300: 4x Cortex-X4 big cores + 4x A720 mid + NPU all on
    same package. Fix: implement EAS (Energy Aware Scheduling) with NPU-aware thermal
    governors. During sustained AI-enhanced rendering: (1) Park 2 of 4 big CPU cores
    when NPU is active; (2) Use NPU for AI upscaling but reduce GPU shading resolution
    by 10%; (3) Implement thermal headroom budgeting — monitor skin temperature and
    preemptively reduce workload before throttle threshold. Android Thermal API (IThermal
    HAL 2.0) provides callbacks for proactive management.'
  common_mistake: Treating NPU and CPU as independent thermal domains that can be
    throttled separately. On a mobile chiplet sharing a package thermal budget, heavy
    CPU load raises package temperature, which triggers NPU throttling even if the
    NPU itself is within its local thermal limit.
  napkin_math: 'Dimensity 9300 TDP: 10W sustained. CPU at max: 5W. GPU at max: 4W.
    NPU at max: 2W. Total: 11W > 10W → 1W over budget. Throttle: reduce NPU from 2W
    to 1W → 50% compute reduction → NPU utilization drops from 85% to ~42%. Matches
    observed 40%. Fix: CPU at 3.5W (park 2 big cores) + GPU 4W + NPU 2W = 9.5W < 10W
    → all components run at full speed within thermal budget.'
