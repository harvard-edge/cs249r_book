title: Multi-Chiplet Thermal Throttle Recovery for Mobile Gaming
scenario: A mobile gaming application running AI-enhanced rendering on a Dimensity 9300-class chiplet experiences thermal throttling after 15 minutes of gameplay. NPU utilization drops from 85% to 40%. CPU governor stays at max.
question: How would you explain NPU throttling in a mobile chiplet gaming workload and redesign the thermal schedule?
details:
  realistic_solution: 'Mobile chiplets share a single TDP envelope (~10-15W for flagship SoCs). When GPU+CPU+NPU all run simultaneously, their combined power exceeds the sustained TDP, triggering the thermal daemon (THERMAL HAL) to throttle the highest-power component. On Dimensity 9300: 4x Cortex-X4 big cores + 4x A720 mid + NPU all on same package. Fix: implement EAS (Energy Aware Scheduling) with NPU-aware thermal governors. During sustained AI-enhanced rendering: (1) Park 2 of 4 big CPU cores when NPU is active; (2) Use NPU for AI upscaling but reduce GPU shading resolution by 10%; (3) Implement thermal headroom budgeting — monitor skin temperature and preemptively reduce workload before throttle threshold. Android Thermal API (IThermal HAL 2.0) provides callbacks for proactive management.'
  common_mistake: |
    **The Pitfall:** Treating the NPU and CPU as independent thermal domains that throttle separately.
    **The Rationale:** Developers assume that if the NPU utilization drops, it's because the NPU itself overheated due to a heavy ML workload.
    **The Consequence:** They fail to realize that heavily loaded CPU/GPU cores raise the entire package temperature, triggering a shared Thermal HAL to throttle the NPU even if its local power draw is small.
  napkin_math: |
    1. **TDP Envelope:** Dimensity 9300 sustained TDP is 10W.
    2. **Unmanaged Power:** CPU at max (5W) + GPU at max (4W) + NPU at max (2W) = 11W total.
    3. **Throttling Action:** 11W exceeds the 10W budget by 1W. The Thermal HAL throttles the NPU from 2W to 1W, halving its compute (85% utilization drops to ~42%).
    4. **Proactive Fix:** Park 2 big CPU cores (reducing CPU to 3.5W).
    **Result:** CPU (3.5W) + GPU (4W) + NPU (2W) = **9.5W**. This is under the **10W TDP**, allowing the NPU to run at full speed without throttling.
