title: The Mobile 'Jank' Budget
scenario: You are designing a real-time text completion feature for a smartphone keyboard. The feature uses an on-device language model to suggest the next word as the user types.
question: To ensure the UI remains perfectly smooth and never 'stutters', what is the approximate latency budget your model inference must meet for a 60Hz display?
details:
  realistic_solution: |
    The latency budget is approximately 16ms. Most mobile displays refresh at 60Hz, meaning a new frame is drawn every 16.67ms. Exceeding this budget blocks the UI thread, causing dropped frames and perceived stutter ('jank').
  common_mistake: |
    **The Pitfall:** Applying cloud latency standards to mobile UI development.
    **The Rationale:** Engineers confuse backend P99 targets (e.g., 100ms) with the much stricter requirements of a 60Hz mobile display loop.
    **The Consequence:** The application feels unresponsive and frustrating to use.
  napkin_math: |
    - Screen Refresh Rate: 60 Hz.
    - Milliseconds per second: 1000 ms.
    - **Latency budget per frame: 1000 ms / 60 = 16.67 ms.**
  options:
  - 100 ms
  - 33 ms
  - 16 ms
  - 1 ms
  correct_index: 2
