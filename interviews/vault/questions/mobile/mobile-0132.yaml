title: The Memory-Mapped File Deadlock
scenario: You are using `mmap` to load a 100 MB model on Android. The model loads instantly, which is
  great. However, during the first few seconds of inference, the UI thread occasionally stalls for 50-100ms.
  You are running inference on a background thread. Why is a background memory read stalling the foreground
  UI?
question: "Why is a background memory read stalling the foreground UI?"
details:
  realistic_solution: You hit the **mmap Page Fault I/O Contention**. 100 MB model = 25,000 page faults
    (at 4 KB/page). If each random read takes 0.1ms, that's 2.5 seconds of sustained I/O saturation. The
    UI thread's read request is statistically guaranteed to get stuck
  common_mistake: '"The background thread is using 100% of the CPU." The OS scheduler would preempt it;
    it wouldn''t cause a 100ms hard lock.'
  napkin_math: 100 MB model = 25,000 page faults (at 4 KB/page). If each random read takes 0.1ms, that's
    2.5 seconds of sustained I/O saturation. The UI thread's read request is statistically guaranteed
    to get stuck in traffic.
