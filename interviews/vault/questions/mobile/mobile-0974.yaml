title: 'MLOps Lifecycle: Size OTA Update Bandwidth for 100M Mobile App Users'
scenario: A mobile app with 100M users (60M iOS, 40M Android) needs a monthly OTA model update. iOS models are 45MB; Android models are 38MB. Assume 60% of users update within 1 week of release.
question: What monthly OTA model update bandwidth and CDN cost result for 100M users, and how much can delta updates save?
details:
  realistic_solution: 'iOS: 60M × 60% × 45MB = 1,620TB. Android: 40M × 60% × 38MB = 912TB. Total week 1: 2,532TB. Remaining 40% over next 3 weeks: 60M×40%×45MB + 40M×40%×38MB = 1,080+608 = 1,688TB. Monthly total: 4,220TB = 4.22PB. At $0.045/GB (negotiated CDN): $189,900/month. Delta compression (45MB/38MB → 5MB diff): 100M users × 5MB = 500TB → $22,500/month. Delta updates save $167,400/month.'
  common_mistake: |
    **The Pitfall:** Calculating bandwidth simply as total users multiplied by model size.
    **The Rationale:** Candidates fail to apply the adoption rate timeline and ignore platform-specific model sizes.
    **The Consequence:** This leads to grossly overestimating peak bandwidth requirements and missing the massive cost-saving potential of delta updates.
  napkin_math: |
    - **Total Base Data:** (60M * 45MB) + (40M * 38MB) = 2,700TB + 1,520TB = 4,220TB.
    - **Monthly Total:** 4,220TB = 4.22PB.
    - **Full Update Cost:** 4,220,000 GB * $0.045/GB = $189,900/month.
    - **Delta Compression Data:** 100M users * 5MB diff = 500TB.
    - **Delta Update Cost:** 500,000 GB * $0.045/GB = $22,500/month.
    - **Final Result:** **Delta updates save $167,400/month.**
