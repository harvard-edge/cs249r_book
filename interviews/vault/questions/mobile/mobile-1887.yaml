title: Snapdragon KV Memory Limit
scenario: A Snapdragon 8 Gen 3 running Llama-3-8B is constrained to a maximum 500
  MB memory footprint for the KV cache to avoid evicting background apps.
question: Analyze the maximum sequence length supported under this footprint constraint.
  (Assume 32 layers, 8 KV heads, 128 head dim, FP16).
visual:
  kind: svg
  path: mobile-1887.svg
  alt: Bar chart comparing token context counts and their memory consumption.
  caption: Token limit given a 500MB constraint.
details:
  realistic_solution: KV cache per token = $2 \times 32 \times 8 \times 128 \times
    2 = 131,072$ bytes (128 KB). Max tokens = $500\text{MB} / 128\text{KB} = 500,000,000
    / 131,072 = 3814$ tokens. To stay strictly under the limit, the context window
    must be capped at 3814 tokens.
  common_mistake: Not accounting for both Key and Value tensors, leading to a calculated
    limit that is double the actual capacity.
  napkin_math: 128 KB / token. 500 * 1024 / 128 = 500 * 8 = 4000 tokens (approx, exactly
    3814).
