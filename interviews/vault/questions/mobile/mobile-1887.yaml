title: Snapdragon KV Memory Limit
scenario: A Snapdragon 8 Gen 3 running Llama-3-8B is constrained to a maximum 500 MB memory footprint for the KV cache to avoid evicting background apps. The model uses 32 layers, 8 KV heads, a head dimension of 128, and FP16 precision.
question: "Analyze the maximum sequence length supported under this 500 MB footprint constraint."
visual:
  kind: svg
  path: mobile-1887.svg
  alt: Bar chart comparing token context counts and their memory consumption.
  caption: Token limit given a 500MB constraint.
details:
  realistic_solution: KV cache per token = $2 \times 32 \times 8 \times 128 \times 2 = 131,072$ bytes (128 KB). Max tokens = $500\text{MB} / 128\text{KB} = 524,288,000 / 131,072 = 4000$ tokens. To stay strictly under the limit, the context window must be capped at 4000 tokens.
  common_mistake: |
    **The Pitfall:** Not accounting for both Key and Value tensors in the calculation.
    **The Rationale:** Candidates often calculate the size of a single attention tensor and forget that the KV cache stores both representations.
    **The Consequence:** The calculated token limit is double the actual capacity, leading to unexpected OOM kills when the context window fills up.
  napkin_math: |
    * KV size per token = 2 (K & V) * 32 (layers) * 8 (heads) * 128 (dim) * 2 (bytes for FP16)
    * KV size per token = 131,072 bytes = 128 KB
    * Total budget = 500 MB = 500 * 1024 KB = 512,000 KB
    * Max sequence length = 512,000 KB / 128 KB/token = 4000 tokens
    * **The context window must be strictly capped at 4000 tokens.**
