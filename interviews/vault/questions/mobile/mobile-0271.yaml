title: The Federated Energy Tax
scenario: 'Your team is building a next-word prediction feature for a smart keyboard app with 10 million
  users. You have two options for training:'
question: "Why can Federated Learning consume more total system energy than centralized training at fleet scale?"
details:
  realistic_solution: Federated Learning is significantly more expensive in terms of total, system-wide
    energy consumption. The cost is effectively offloaded from the company's servers to the energy consumed
    by the global fleet of user devices. While each phone only uses a few watts for a short period, the
    aggregate energy across millions of devices far exceeds the energy consumed by a few datacenter GPUs
    for a centralized training run. Companies accept this higher total energy cost (a 'privacy tax') as
    a trade-off for not having to collect and store sensitive user data.
  common_mistake: Engineers often focus on the high power draw of a single datacenter GPU (~700W) and
    wrongly conclude that centralized training must be more expensive. This thinking fails to account
    for the massive scale of the device fleet, where small, individual costs multiplied by millions of
    users become an enormous total cost.
  napkin_math: Assume 1 million users participate in one round of FL, and each phone's SoC draws an average
    of 4W for 5 minutes (300 seconds) while training.
  options:
  - Centralized, because a 700W datacenter GPU uses far more power than a 5W phone.
  - They are roughly equal; the powerful server's work balances out the distributed work of many weak
    devices.
  - Federated Learning, because the aggregate energy consumed by millions of phones exceeds the server's
    energy budget.
  - Centralized, because transmitting raw data from millions of devices to the server consumes the most
    energy.
