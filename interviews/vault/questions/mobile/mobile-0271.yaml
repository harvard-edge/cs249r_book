title: The Federated Energy Tax
scenario: Your team is building a next-word prediction feature for a smart keyboard app with 10 million users. You have two options for training: centralized server training or on-device federated learning.
question: Why can Federated Learning consume more total system energy than centralized training at fleet scale?
details:
  realistic_solution: Federated Learning is significantly more expensive in terms of total, system-wide energy consumption. The cost is effectively offloaded from the company's servers to the energy consumed by the global fleet of user devices. While each phone only uses a few watts for a short period, the aggregate energy across millions of devices far exceeds the energy consumed by a few datacenter GPUs for a centralized training run. Companies accept this higher total energy cost (a 'privacy tax') as a trade-off for not having to collect and store sensitive user data.
  common_mistake: |
    **The Pitfall:** Concluding that centralized training is more expensive because a single datacenter GPU draws ~700W.
    **The Rationale:** Engineers focus on the high power draw of a single GPU and fail to account for the massive multiplier effect of a millions-strong mobile fleet.
    **The Consequence:** TCO models for energy fundamentally misunderstand where the true computational cost of federated learning lies.
  napkin_math: |
    - **Individual Device Energy:** Each phone draws 4W for 300 seconds (5 minutes) = 1,200 Joules per round.
    - **Fleet Energy:** 10 million users * 1,200 Joules = 12,000,000,000 Joules (12 Gigajoules) per training round.
    - **Result:** **The aggregate energy of 10 million 4W phones drastically outweighs the energy footprint of a centralized datacenter GPU cluster.**
  options:
  - Centralized, because a 700W datacenter GPU uses far more power than a 5W phone.
  - They are roughly equal; the powerful server's work balances out the distributed work of many weak devices.
  - Federated Learning, because the aggregate energy consumed by millions of phones exceeds the server's energy budget.
  - Centralized, because transmitting raw data from millions of devices to the server consumes the most energy.
