title: The Conversion Precision Loss
scenario: You convert a PyTorch model from FP32 to Core ML FP16 for the Apple Neural Engine. Overall accuracy
  drops 0.3% — acceptable. But one specific layer's output diverges by 12% from the FP32 reference. Which
  layer type is most likely the culprit, and why?
details:
  realistic_solution: 'The most likely culprits are **BatchNorm** and **activation functions with wide
    dynamic range**. BatchNorm computes $\hat{x} = (x - \mu) / \sqrt{\sigma^2 + \epsilon}$. In CoreML''s
    FP16 conversion, a documented bug causes the epsilon parameter to remain FP32 while mean values are
    cast to FP16, creating type mismatches that produce large errors (Apple coremltools issues #2470,
    #2625). Even without the bug, dividing by a small variance in FP16 amplifies rounding errors.'
  common_mistake: '"The convolution layers are losing precision." Standard Conv2D layers are highly robust
    to FP16 — their outputs are sums of many small products, which average out rounding errors.'
  napkin_math: 'LayerNorm with σ² = 1e-4. FP32 precision: ~7 decimal digits → division accurate to 0.0001%.
    FP16 precision: ~3 decimal digits → division accurate to 0.1%. Relative error amplification: 0.1%
    / 0.0001% = 1000×. If the layer output range is [0, 1], a 0.1% error = 0.001 absolute. After 10 subsequent
    layers each amplifying by 1.1×: 0.001 × 1.1¹⁰ = 0.0026 → 12% divergence on a feature with range [0,
    0.02] is entirely plausible.'
