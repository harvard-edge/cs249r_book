title: The Conversion Precision Loss
scenario: You convert a PyTorch model from FP32 to Core ML FP16 for the Apple Neural Engine. Overall accuracy drops 0.3% — acceptable. But one specific layer's output diverges by 12% from the FP32 reference.
question: Which layer type is most likely the culprit, and why?
details:
  realistic_solution: 'The most likely culprits are **BatchNorm** and **activation functions with wide dynamic range**. BatchNorm computes $\hat{x} = (x - \mu) / \sqrt{\sigma^2 + \epsilon}$. In CoreML''s FP16 conversion, a documented bug causes the epsilon parameter to remain FP32 while mean values are cast to FP16, creating type mismatches that produce large errors (Apple coremltools issues #2470, #2625). Even without the bug, dividing by a small variance in FP16 amplifies rounding errors.'
  common_mistake: |
    **The Pitfall:** Blaming standard convolution layers for losing precision.
    **The Rationale:** Candidates assume that because convolutions make up the bulk of the network, they must be responsible for the largest errors.
    **The Consequence:** Failing to check normalization layers, missing that Conv2D outputs are sums that average out rounding errors.
  napkin_math: |
    *   **LayerNorm Variance:** σ² = 1e-4.
    *   **FP32 Precision:** ~7 decimal digits = 0.0001% division accuracy.
    *   **FP16 Precision:** ~3 decimal digits = 0.1% division accuracy.
    *   **Error Amplification:** 0.1% / 0.0001% = **1000x**.
    *   **Compound Error:** 0.001 absolute error amplified across 10 subsequent layers (1.1x each) = 0.001 * 1.1^10 = **0.0026**.
    *   **Conclusion:** A 0.0026 error on a feature range of [0, 0.02] equals a **13% divergence**, entirely explaining the issue.
