title: Unified Memory Coherency for Mobile Chiplet Camera Pipeline
scenario: On a mobile chiplet with unified memory (CPU + ISP + NPU sharing LPDDR5),
  camera frames captured by the ISP die cause cache coherency stalls when passed to
  the NPU die for on-device inference. Frame-to-inference latency is 8ms but hardware
  specs suggest 3ms. Diagnose.
question: How would you diagnose and fix unified-memory cache coherency stalls between
  an ISP die and NPU die in a camera pipeline?
details:
  realistic_solution: 'Root cause: ISP writes frames to LPDDR5 through a write-combining
    buffer without cache coherent marking; NPU has stale cache lines from previous
    frame. The coherency flush sequence: ISP issues dsb() (data sync barrier) + cache
    maintenance operations on the written frame buffer before signaling NPU. NPU must
    issue a cache invalidate for the frame buffer region before reading. On ARM systems:
    use DMA-coherent buffers (dma_alloc_coherent) rather than normal cached buffers
    for ISP-to-NPU handoffs. This maps the frame buffer as non-cacheable for the ISP
    path, eliminating the flush-invalidate round-trip. Alternatively, use ION/DMA-BUF
    with cache sync at handoff boundaries.'
  common_mistake: 'Immediately suspecting memory bandwidth saturation. Engineers profile
    memory utilization and see it at 60% — seemingly not saturated — and cannot explain
    the latency. The actual issue is coherency protocol overhead: the NPU must invalidate
    its cache lines before reading ISP output, and the ISP must flush its write buffers
    before signaling the NPU.'
  napkin_math: '4K frame buffer: 3840x2160x1.5 (YUV420) = 12.4 MB. Cache maintenance
    on 12.4 MB: ARM cache line = 64B, 12.4MB/64B = 204,800 cache lines. clean+invalidate
    per line: ~20ns → 4.1ms. This accounts for ~5ms of the 8ms – 3ms = 5ms latency
    gap! DMA-coherent (non-cached) eliminates all cache maintenance: NPU can read
    directly from DRAM after ISP DMA completes. DMA write: 12.4MB at 68 GB/s = 182us.
    NPU read: 12.4MB / 34 GB/s (NPU share) = 365us. Total: ~550us → close to 3ms target
    (other overhead: ISP processing, NPU kernel launch).'
