title: The Slow Style Transfer
scenario: You are a Staff ML Engineer on a mobile team developing an 'AI Photo Booth' feature. The app
  offloads a burst of photos to a cloud backend for a complex style transfer effect. The backend runs
  on a server with multiple H100 GPUs.
details:
  realistic_solution: 'The most likely cause is an architectural misconfiguration in the server. The H100
    GPUs are likely installed in standard motherboard PCIe slots that are not connected by an NVLink bridge.
    This forces all peer-to-peer (P2P) communication to travel ''up'' to the CPU''s root complex and back
    ''down'' over the PCIe bus, which is an order of magnitude slower than the direct, high-bandwidth
    path provided by NVLink.

    The ~8 second transfer time for a large data payload distributed across GPUs is characteristic of
    a PCIe Gen4 bus bottleneck, not a software issue or a problem with the much faster NVLink interconnect.'
  common_mistake: Engineers often blame software (e.g., driver settings, CPU copies) or the network (InfiniBand)
    for latency inside a server. Another common mistake is to assume all multi-GPU servers are architected
    identically with high-speed interconnects, without realizing that using standard PCIe slots without
    a proper NVLink bridge is a common and critical misconfiguration that forces communication over a
    much slower bus.
  napkin_math: 'Transferring 250GB of intermediate feature maps between H100 GPUs via PCIe Gen4 (32GB/s)
    takes 250GB / 32GB/s = 7.8 seconds. If we use NVLink (900GB/s for H100), the transfer takes 250GB
    / 900GB/s = 0.27 seconds. For a real-time ''Photo Booth'' user experience, an 8-second delay just
    for moving data is unacceptable. Note: a single H100 has only 80GB of VRAM, so 250GB of intermediate
    activations must be distributed across multiple GPUs or streamed in chunks. Routing the models to
    the same NVLink domain removes this 7.5s bottleneck.'
  options:
  - The GPUs are in different server racks, and the latency comes from the InfiniBand network connection
    between them.
  - A CUDA driver misconfiguration is forcing data to be copied to CPU host memory before being transferred
    to the other GPUs.
  - The server lacks an NVLink bridge, forcing the GPUs to communicate over the much slower PCIe bus.
  - The 250 GB data transfer is simply too large for any interconnect, and this ~4 second latency is expected
    even with NVLink.
  correct_index: 2
