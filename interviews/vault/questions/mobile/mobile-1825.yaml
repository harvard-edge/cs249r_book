title: Mobile Quantization Memory Budget
scenario: A mobile team must fit a 3B-parameter model into a 2 GB model-memory budget.
question: Which precision formats fit a 3B-parameter model into a 2 GB mobile memory budget before metadata overhead?
details:
  realistic_solution: FP16 needs 6 GB and INT8 needs 3 GB, so neither fits. INT4 needs 1.5 GB, which fits before scale/zero-point metadata and runtime buffers. The feasible path is INT4 plus careful metadata packing and accuracy validation.
  common_mistake: |
    **The Pitfall:** Assuming INT8 is always small enough for mobile deployment.
    **The Rationale:** Candidates assume standard 8-bit quantization is a cure-all without calculating the exact footprint required.
    **The Consequence:** The model consumes 3 GB, exceeding the strict 2 GB memory budget and resulting in an OOM error.
  napkin_math: |
    1. Assumptions & Constraints:
       - Model parameters: 3B.
       - Memory budget: 2 GB.
    2. Calculations:
       - FP16 Footprint: 3B * 2 bytes = 6 GB.
       - INT8 Footprint: 3B * 1 byte = 3 GB.
       - INT4 Footprint: 3B * 0.5 bytes = 1.5 GB.
    3. Conclusion & Interpretation:
       - **Result: Only INT4 (1.5 GB) fits within the 2 GB budget (Memory-Capacity-Bound).**
