title: Mobile Quantization Memory Budget
scenario: A mobile team must fit a 3B-parameter model into a 2 GB model-memory budget.
  Compare FP16, INT8, and INT4 weights and decide which precisions are feasible before
  metadata overhead.
question: Which precision formats fit a 3B-parameter model into a 2 GB mobile memory
  budget before metadata overhead?
details:
  realistic_solution: FP16 needs 6 GB and INT8 needs 3 GB, so neither fits. INT4 needs
    1.5 GB, which fits before scale/zero-point metadata and runtime buffers. The feasible
    path is INT4 plus careful metadata packing and accuracy validation.
  common_mistake: Assuming INT8 is always enough for mobile deployment without multiplying
    parameters by bytes per weight.
  napkin_math: 'FP16: 3B x 2 B = 6 GB. INT8: 3B x 1 B = 3 GB. INT4: 3B x 0.5 B = 1.5
    GB.'
