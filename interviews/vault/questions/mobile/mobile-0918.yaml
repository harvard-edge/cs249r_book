title: 'Fault Tolerance: Mastery — Systematic Failure Mode Analysis for Mobile ML'
scenario: Conduct a systematic failure mode analysis (FMEA) for a production on-device ML system on Snapdragon 8 Gen 3 (45 TOPS INT8, 16GB RAM) serving 10M users. The system runs inference continuously and nightly fine-tuning.
question: What are the top 5 failure modes, their probability, impact, and mitigations with quantitative analysis?
details:
  realistic_solution: 'Top 5 by Risk Priority Number (RPN = Severity × Occurrence × Detectability). Rank: (1) Model weight corruption, (2) OOM crash, (3) Checkpoint corruption, (4) Distribution shift (silent failure), (5) Battery drain.'
  common_mistake: |
    **The Pitfall:** Listing only hardware failures.
    **The Rationale:** Candidates ignore software and data quality failures that are vastly more common in ML systems.
    **The Consequence:** They build robust hardware failovers but the system still fails silently due to model drift or OOM crashes.
  napkin_math: |
    - (1) Weight corruption: Severity=9, Occ=2, Det=3 -> RPN=54. (Mitigation: SHA256 checks).
    - (2) OOM during fine-tuning: Severity=5, Occ=4, Det=8 -> RPN=160. (Mitigation: Memory guards).
    - (3) Checkpoint corruption: Severity=7, Occ=2, Det=2 -> RPN=28.
    - (4) Distribution shift: Severity=8, Occ=5, Det=9 -> RPN=360. (Mitigation: Monitor confidence drops).
    - (5) Battery drain: Severity=6, Occ=6, Det=2 -> RPN=72. (Mitigation: Charge+WiFi only).
    - **Distribution shift (RPN=360) and OOM (RPN=160) are the highest priority risks to mitigate.**
