title: 'Fault Tolerance: Mastery — Systematic Failure Mode Analysis for Mobile ML'
scenario: Conduct a systematic failure mode analysis (FMEA) for a production on-device
  ML system on Snapdragon 8 Gen 3 (45 TOPS INT8, 16GB RAM) serving 10M users. The
  system runs inference continuously and nightly fine-tuning. Identify the top 5 failure
  modes, their probability, impact, and mitigations with quantitative analysis.
question: What would you identify as the top 5 failure modes, their probability, impact,
  and mitigations with quantitative analysis?
details:
  realistic_solution: 'Top 5 by Risk Priority Number (RPN = Severity × Occurrence
    × Detectability). Rank: (1) Model weight corruption, (2) OOM crash, (3) Checkpoint
    corruption, (4) Distribution shift (silent failure), (5) Battery drain.'
  common_mistake: Listing only hardware failures; not including software and data
    quality failures that are more common in ML systems.
  napkin_math: '(1) Weight corruption: Severity=9, Occurrence=2 (1/year), Detection=3
    (SHA256 check catches). RPN=54. Mitigation: A/B partitions. (2) OOM during fine-tuning:
    Severity=5 (training lost, inference OK), Occurrence=4 (1/month on low RAM), Detection=8
    (hard to detect before crash). RPN=160. Mitigation: guard with availableMemory()
    check before training start. (3) Checkpoint corruption: Severity=7, Occurrence=2
    (1/year), Detection=2 (CRC check). RPN=28. (4) Distribution shift: Severity=8
    (wrong predictions silently), Occurrence=5 (common), Detection=9 (very hard to
    detect). RPN=360. Highest RPN! Mitigation: monitor prediction confidence distribution;
    alert if P(top-1) drops > 20%. (5) Battery drain: Severity=6, Occurrence=6 (training
    > 2% battery), Detection=2 (user sees it). RPN=72. Mitigation: training only when
    charging + WiFi. Priority: fix (4) first, then (2).'
