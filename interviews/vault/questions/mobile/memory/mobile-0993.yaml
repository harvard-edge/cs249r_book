title: On-Device LLM Memory Audit for iOS KV Cache and Jetsam Limits
scenario: Perform a complete on-device memory audit for a production iOS app running a 1B-parameter INT4 LLM for real-time conversation. Account for a multi-turn context (10 turns x 512 tokens each).
question: How would you verify the system stays under the 5GB practical ceiling?
details:
  realistic_solution: Verify the target with both a byte-level budget and on-device peak RSS tests against the measured 5GB practical ceiling for the target device class; do not treat that number as a universal iOS Jetsam limit. Budget 500MB for the 1B INT4 model and about 600MB for CoreML, heap, metadata, and activations. With the stated 32-layer, 32-head, 64-dim layout, use 128KB/token for FP16 KV in this audit, so the 10-turn target is about 1.77GB total and has large headroom. Enforce a truncation or sliding-window policy around the measured safe token limit, and validate worst-case multi-turn sessions under thermal, background, and memory-pressure conditions.
  common_mistake: |
    **The Pitfall:** Statistically analyzing a long multi-turn conversation as independent chunks of identical memory cost.
    **The Rationale:** Engineers completely fail to model the mathematically cumulative, ever-expanding nature of the autoregressive KV-cache.
    **The Consequence:** The system validates correctly under short tests but consistently crashes via fatal OS Out-Of-Memory (OOM) triggers deep into real-world conversational user flows.
  napkin_math: |
    **Assumptions & Constraints:**
    - Practical measured app memory ceiling for the target device class: 5.0 GB.
    - Model Footprint (1B INT4): 500 MB.
    - Fixed Overhead: 600 MB (Metal + Metadata + Heap + Activations).
    - KV Cache (FP16 audit layout): 32 layers, 32 heads, 64 dim = 128 KB/token.

    **Calculations:**
    - Target tokens (10 turns * 512 tokens): 5,120 tokens.
    - KV Cache memory: 5,120 * 128 KB = 655 MB, about 0.67 GB.
    - Total Audit Footprint: 500 MB + 600 MB + 0.67 GB = 1.77 GB.
    - 20 Turns (10,240 tokens): KV about 1.34 GB; total RAM about 2.44 GB.
    - 30 Turns (15,360 tokens): KV about 2.01 GB; total RAM about 3.11 GB.
    - Safe token ceiling before policy headroom: (5.0 GB - 1.1 GB fixed/model) / 128 KB per token is about 31K tokens.

    **Conclusion & Interpretation:**
    - **Result: Memory-Bound but safe for the stated 10-turn target.** The 10-turn case is about 1.77 GB, and even 30 turns is about 3.11 GB; production should still cap or evict context below the measured safe ceiling and verify peak RSS on real devices.
