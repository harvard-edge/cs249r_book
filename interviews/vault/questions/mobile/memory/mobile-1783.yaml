title: Unified Memory Architecture Impact on LLM Decode on A17 Pro
scenario: A mobile SoC uses unified memory architecture (UMA) where CPU, GPU, and Neural Engine share LPDDR5 at 68 GB/s. A 7B INT4 model (3.5GB) is deployed for on-device inference.
question: How much does UMA contention slow 7B INT4 LLM decode under display, camera, and background bandwidth load?
details:
  realistic_solution: 'Account for baseline display and OS background bandwidth (~5-8 GB/s) and camera ISP bandwidth. Deducting these from the UMA maximum provides the effective bandwidth for inference. Mitigate this by using priority QoS for the inference thread and scheduling generation during display blanking intervals.'
  common_mistake: |
    **The Pitfall:** Assuming the Neural Engine gets dedicated memory bandwidth.
    **The Rationale:** Candidates ignore UMA constraints, where all processors compete for the same interconnect pool.
    **The Consequence:** Drastically overestimating real-world token generation speed.
  napkin_math: |
    **Assumptions & Constraints:**
    - Total UMA Bandwidth: 68 GB/s.
    - INT4 Model Weights: 3.5 GB per token.
    - Heavy Contention Load (Display/ISP/Background): Drops effective bandwidth to 35 GB/s.

    **Calculations:**
    - Uncontended Effective Bandwidth: 50 GB/s.
    - Uncontended Latency: 3.5 GB / 50 GB/s = 70 ms/token (14.2 tok/s).
    - Contended Latency: 3.5 GB / 35 GB/s = 100 ms/token (10.0 tok/s).

    **Conclusion & Interpretation:**
    - **Result: 10 tok/s under heavy load (Memory-Bandwidth Bound)**. The UMA forces the NPU to compete with the OS, meaning token generation speeds degrade sharply during multi-tasking.
