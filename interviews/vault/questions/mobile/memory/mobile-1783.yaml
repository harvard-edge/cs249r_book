title: Unified Memory Architecture Impact on LLM Decode on A17 Pro
scenario: A mobile SoC uses unified memory architecture (UMA) where CPU, GPU, and Neural Engine share LPDDR5 at 68 GB/s. A 7B INT4 model (3.5GB) is deployed for on-device inference while display/OS uses 8 GB/s, camera ISP uses 20 GB/s, and background tasks use 5 GB/s.
question: How much does UMA contention slow 7B INT4 LLM decode under display, camera, and background bandwidth load?
details:
  realistic_solution: Account for display/OS, camera ISP, and background bandwidth before estimating decode throughput. With 8 + 20 + 5 = 33 GB/s consumed by other clients, the inference path gets roughly 68 - 33 = 35 GB/s before protocol overhead and contention effects. Under a simple streaming roofline for the 3.5GB INT4 weights, decode drops from about 19 tok/s uncontended to about 10 tok/s under load, so the slowdown is roughly 48%. Mitigate this with priority QoS, better weight layout and prefetching, camera-aware scheduling, and avoiding generation during peak ISP bursts when possible.
  common_mistake: |
    **The Pitfall:** Assuming the Neural Engine gets dedicated memory bandwidth.
    **The Rationale:** Candidates ignore UMA constraints, where all processors compete for the same interconnect pool.
    **The Consequence:** Drastically overestimating real-world token generation speed.
  napkin_math: |
    **Assumptions & Constraints:**
    - Total UMA Bandwidth: 68 GB/s.
    - Simple roofline assumption: effective decode traffic streams up to 3.5 GB of INT4 weights per generated token.
    - Display/OS load: 8 GB/s.
    - Camera ISP load: 20 GB/s.
    - Background load: 5 GB/s.

    **Calculations:**
    - Contending bandwidth: 8 + 20 + 5 = 33 GB/s.
    - Remaining inference bandwidth: 68 - 33 = 35 GB/s.
    - Uncontended latency: 3.5 GB / 68 GB/s = 51.5 ms/token (19.4 tok/s).
    - Contended Latency: 3.5 GB / 35 GB/s = 100 ms/token (10.0 tok/s).
    - Slowdown: 10.0 / 19.4 = 0.52x throughput, or about 48% lower tok/s.

    **Conclusion & Interpretation:**
    - **Result: ~10 tok/s under camera/display load.** UMA contention cuts the simple roofline throughput by about half because the NPU shares bandwidth with display, ISP, CPU, and background clients.
