title: KV-Cache Pressure on Google Tensor G3 for Long Contexts
scenario: You are deploying a 7B parameter LLM for on-device inference. Your LLM uses 32 attention heads, a head dimension of 128, and consists of 30 layers. Initial tests show significant latency spikes and occasional out-of-memory errors with longer prompts.
question: How should a mobile LLM manage KV cache for 2048-token context to avoid latency spikes and OOMs?
details:
  realistic_solution: |
    Treat the KV cache as a first-class memory budget item. Cap context length for the mobile tier, use sliding-window or chunked attention when full 2048-token history is not required, and apply INT8 or lower-bit KV-cache quantization after measuring quality. If memory pressure remains, selectively cache fewer layers or heads, or offload cold cache blocks only when the transfer cost is acceptable. Paged allocation can reduce allocator fragmentation and avoid over-reserving cache blocks, but it does not remove the KV-cache capacity requirement. FlashAttention-style kernels can reduce attention scratch memory and bandwidth, but they should not be presented as the main fix for KV-cache size.
  common_mistake: |
    **The Pitfall:** Underestimating the KV-cache's memory footprint for long contexts.
    **The Rationale:** Developers used to cloud deployments often ignore KV-cache size until it causes an OOM on mobile devices.
    **The Consequence:** Severe latency spikes and application crashes due to excessive page faults or memory exhaustion.
  napkin_math: |
    **Assumptions & Constraints:**
    - 30 layers, 32 heads, 128 dim
    - Context: 2048 tokens
    - Data type: FP16 (2 bytes)
    - This sizing uses the corpus convention that the listed per-head cache width already represents the stored K/V cache vector set.

    **Calculations:**
    - KV Cache per token: 30 layers * 32 heads * 128 dim * 2 bytes = 245,760 bytes (~0.234 MiB)
    - Total KV Cache: 245,760 bytes/token * 2048 tokens = 503,316,480 bytes = ~480 MiB

    **Conclusion & Interpretation:**
    - **Result: ~480 MiB (Memory Capacity-Bound)**. The KV cache is still large enough to cause mobile memory pressure, so context caps, paging, and KV-cache quantization remain important.
