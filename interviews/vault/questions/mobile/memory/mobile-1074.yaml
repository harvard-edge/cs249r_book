title: KV-Cache Quantization for On-Device LLM
scenario: You are running a 3B LLM (32 layers, 4 KV heads, head_dim=64) on a device with 16 GB RAM and a 4 GB app budget. INT4 weights use 1.5 GB. You need 2K context for a chat app.
question: How would you compare FP16 vs INT8 vs INT4 KV-cache strategies for maximum concurrent conversations?
details:
  realistic_solution: |
    KV per token per layer (FP16): 2 × 4 × 64 × 2B = 1,024 B. Per token (32 layers): 32 KB. Budget after weights + overhead: 4 GB - 1.5 GB - 0.5 GB = 2 GB for KV-cache. (1) FP16 KV (32 KB/token): 2K context = 64 MB per conversation. Max conversations: 31. (2) INT8 KV (16 KB/token): 2K context = 32 MB per conversation. Max: 62. Quality: <0.5% perplexity degradation. (3) INT4 KV (8 KB/token): 2K context = 16 MB per conversation. Max: 125. Quality: 2-5% perplexity degradation. Recommendation: INT8 for keys + INT4 for values (asymmetric quantization). Keys are more sensitive because they directly multiply with queries. This 'K8V4' scheme: 12 KB/token → 24 MB per conversation → 83 concurrent conversations.
  common_mistake: |
    **The Pitfall:** Assuming KV-cache quantization below INT8 is always acceptable without analyzing quality loss.
    **The Rationale:** Developers often linearly extrapolate quantization benefits without understanding that keys are more sensitive than values.
    **The Consequence:** INT4 KV-cache introduces significant quantization noise in attention scores, leading to incoherent outputs on long sequences.
  napkin_math: |
    **Assumptions & Constraints:**
    - KV Budget: 4 GB (app) - 1.5 GB (weights) - 0.5 GB (overhead) = 2 GB.
    - 2K context window.

    **Calculations:**
    - FP16: 32 KB/tok → 64 MB/conv → Max conversations: 2 GB / 64 MB = 31.
    - INT8: 16 KB/tok → 32 MB/conv → Max conversations: 2 GB / 32 MB = 62.
    - INT4: 8 KB/tok → 16 MB/conv → Max conversations: 2 GB / 16 MB = 125.
    - K8V4 (Asymmetric): 12 KB/tok → 24 MB/conv → Max conversations: 2 GB / 24 MB = 83.

    **Conclusion & Interpretation:**
    - **Result: 83 conversations (Memory-Capacity-Bound)**. K8V4 maximizes concurrency with acceptable quality.
