title: KV-Cache Quantization for On-Device LLM
scenario: You are running a 3B LLM (32 layers, 4 KV heads, head_dim=64) on a device with 16 GB RAM and a 4 GB app budget. INT4 weights use 1.5 GB. You need 2K context for a chat app.
question: How would you compare FP16 vs INT8 vs INT4 KV-cache strategies for maximum concurrent conversations?
details:
  realistic_solution: |
    KV per token per layer in FP16: 2 (K+V) × 4 KV heads × 64 head_dim × 2 bytes = 1,024 B. Across 32 layers, that is 32 KB/token. Budget after weights + runtime overhead: 4 GB - 1.5 GB - 0.5 GB = 2 GB for KV-cache. For a 2K context, FP16 uses 64 MB per conversation, so it supports about 31 concurrent conversations. INT8 halves the KV bytes to 16 KB/token, 32 MB per conversation, or about 62 conversations. INT4 quarters the FP16 KV bytes to 8 KB/token, 16 MB per conversation, or about 125 conversations. If the only objective is maximum concurrency, INT4 wins; if quality is also weighted, INT8 may be the safer production choice.
  common_mistake: |
    **The Pitfall:** Assuming KV-cache quantization below INT8 is always acceptable without analyzing quality loss.
    **The Rationale:** Developers often linearly extrapolate quantization benefits without understanding that keys are more sensitive than values.
    **The Consequence:** INT4 KV-cache introduces significant quantization noise in attention scores, leading to incoherent outputs on long sequences.
  napkin_math: |
    **Assumptions & Constraints:**
    - KV Budget: 4 GB (app) - 1.5 GB (weights) - 0.5 GB (overhead) = 2 GB.
    - 2K context window.
    - Model: 32 layers, 4 KV heads, head_dim=64.

    **Calculations:**
    - FP16 per token: 2 (K+V) x 4 x 64 x 2 bytes x 32 layers = 32 KB/token.
    - FP16 per conversation: 32 KB/token x 2048 tokens = 64 MB. Max: 2 GB / 64 MB = 31.
    - INT8 per conversation: 16 KB/token x 2048 tokens = 32 MB. Max: 2 GB / 32 MB = 62.
    - INT4 per conversation: 8 KB/token x 2048 tokens = 16 MB. Max: 2 GB / 16 MB = 125.

    **Conclusion & Interpretation:**
    - **Result: 125 conversations with INT4 KV (Memory-Capacity-Bound)**. INT4 maximizes concurrency among the listed strategies; INT8 trades half that concurrency for lower quality risk.
