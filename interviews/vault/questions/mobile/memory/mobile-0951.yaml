title: 'KV-Cache: Fluency — GQA Memory Savings Calculation for Mobile LLM'
scenario: Compare MHA (32 KV heads) vs GQA (8 KV heads) vs MQA (1 KV head) KV cache memory for a 3B INT4 LLM (32 layers, head_dim=128, bf16 KV cache) at 2048-token context.
question: How do MHA, GQA, and MQA KV-cache sizes affect maximum context for a 3B INT4 LLM?
details:
  realistic_solution: MHA, GQA, and MQA change only the number of KV heads stored per token, not the model weight size. With 32 layers, head_dim 128, and BF16 KV, the per-token KV footprint is layers * 2 * kv_heads * head_dim * 2 bytes. That gives 512 KiB/token for MHA-32, 128 KiB/token for GQA-8, and 16 KiB/token for MQA. Under an 8.3 GB KV budget, maximum context is roughly 15.8K tokens for MHA, 63.3K for GQA-8, and 506K for MQA. At 2048 tokens all fit, but GQA-8 is usually the best mobile tradeoff because it cuts KV memory and bandwidth 4x versus MHA while retaining more quality head capacity than MQA.
  common_mistake: |
    **The Pitfall:** Confusing the number of KV heads with the number of attention groups.
    **The Rationale:** Candidates fail to accurately calculate the per-token KV footprint, often miscounting the head dimensions or missing the 2x multiplier for key/value pairs.
    **The Consequence:** Grossly mis-estimating available context length, leading to suboptimal architectural decisions (e.g., choosing MQA when GQA-8 fits perfectly with better quality).
  napkin_math: |
    **Assumptions & Constraints:**
    - Available KV Memory Budget: 8.3 GB.
    - Model configuration: 32 layers, 128 head dimension, BF16 (2 bytes).
    - Context: 2048 tokens.

    **Calculations:**
    - Per-token MHA (32 heads): 32 * 2 * 32 * 128 * 2B = 524,288 bytes = 512 KiB/token.
    - Per-token GQA-8: 32 * 2 * 8 * 128 * 2B = 131,072 bytes = 128 KiB/token.
    - Per-token MQA: 32 * 2 * 1 * 128 * 2B = 16,384 bytes = 16 KiB/token.
    - 2048-token MHA: 2048 * 512 KiB = 1.00 GiB.
    - 2048-token GQA-8: 2048 * 128 KiB = 256 MiB.
    - 2048-token MQA: 2048 * 16 KiB = 32 MiB.
    - Max Context (MHA): 8.3 GB / 524,288 bytes = ~15,831 tokens.
    - Max Context (GQA-8): 8.3 GB / 131,072 bytes = ~63,324 tokens.
    - Max Context (MQA): 8.3 GB / 16,384 bytes = ~506,592 tokens.

    **Conclusion & Interpretation:**
    - **Result: KV Head Count Sets Context Capacity**. All three strategies fit at 2048 tokens, but GQA-8 gives a 4x context and bandwidth improvement over MHA while usually preserving better quality than MQA.
