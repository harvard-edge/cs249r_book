title: 'KV-Cache: Fluency — GQA Memory Savings Calculation for Mobile LLM'
scenario: Compare MHA (32 KV heads) vs GQA (8 KV heads) vs MQA (1 KV head) KV cache memory for a 3B INT4 LLM (32 layers, head_dim=128, bf16 KV cache) at 2048-token context.
question: How do MHA, GQA, and MQA KV-cache sizes affect maximum context for a 3B INT4 LLM?
details:
  realistic_solution: Available memory for KV = total RAM - OS - model weights - activations. Model weights don't change with KV head count.
  common_mistake: |
    **The Pitfall:** Confusing the number of KV heads with the number of attention groups.
    **The Rationale:** Candidates fail to accurately calculate the per-token KV footprint, often miscounting the head dimensions or missing the 2x multiplier for key/value pairs.
    **The Consequence:** Grossly mis-estimating available context length, leading to suboptimal architectural decisions (e.g., choosing MQA when GQA-8 fits perfectly with better quality).
  napkin_math: |
    **Assumptions & Constraints:**
    - Available KV Memory Budget: 8.3 GB.
    - Model configuration: 32 layers, 128 head dimension, BF16 (2 bytes).
    - Context: 2048 tokens.

    **Calculations:**
    - MHA (32 heads): 2048 * 32 * 2 * 32 * 128 * 2B = 1.07 GB.
    - GQA (8 heads): 2048 * 32 * 2 * 8 * 128 * 2B = 268 MB.
    - MQA (1 head): 2048 * 32 * 2 * 1 * 128 * 2B = 33.6 MB.
    - Max Context (MHA): 8.3 GB / 524 KB = 15,839 tokens.
    - Max Context (GQA-8): 8.3 GB / 131 KB = 63,358 tokens.

    **Conclusion & Interpretation:**
    - **Result: Memory Fits All; GQA Optimal**. All strategies easily fit within the 8.3GB budget at 2048 tokens, proving decode bandwidth is the real bottleneck.
