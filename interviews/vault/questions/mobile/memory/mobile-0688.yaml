title: The Multi-Model Memory Sharing
scenario: A camera app runs three models (face detection, landmarks, segmentation)
  that share a MobileNetV3-Small backbone. Currently, they deploy as three independent
  monolithic models with 3 identical copies of the backbone.
question: How much memory does a shared-backbone architecture save on a 1.5 MB INT8
  backbone, and what runtime tradeoff occurs on the Apple ANE?
details:
  realistic_solution: 'Three independent MobileNetV3-Small models duplicate the backbone
    3x: 4.5 MB weights + 6 MB activations = 10.5 MB. A shared-backbone multi-head
    model uses 1.5 MB backbone + 0.65 MB heads + 2 MB activations = 4.15 MB (63% savings).
    However, on the ANE, CoreML compiles models as monolithic graphs — you cannot
    share subgraphs between compiled models. The shared model runs backbone once (3ms)
    then 3 heads sequentially (1.5ms total) = 4.5ms. Versus 3 independent models in
    parallel across ANE cores: 4ms. The shared approach is slower if you have enough
    ANE parallelism, but saves critical memory on budget devices.'
  common_mistake: '**The Pitfall:** Assuming subgraphs can be shared dynamically at
    runtime on the ANE.

    **The Rationale:** Treating CoreML models like dynamic PyTorch graphs instead
    of monolithic compiled binaries.

    **The Consequence:** Failing to realize that a multi-head model forces sequential
    execution of the heads, potentially increasing latency.

    '
  napkin_math: '**Assumptions & Constraints:**

    - Independent models: 3x 1.5 MB backbone + 3x 0.2 MB head + 3x 2 MB activations
    = 11.1 MB.

    - Shared architecture: 1.5 MB backbone + 0.65 MB heads + 2 MB activations = 4.15
    MB.

    - Latency (Independent): Parallel across ANE cores = 4ms.

    - Latency (Shared): Sequential graph execution = 3ms (backbone) + 1.5ms (heads)
    = 4.5ms.


    **Calculations:**

    - Memory Savings: 11.1 MB - 4.15 MB = 6.95 MB.

    - Percentage Savings: 6.95 / 11.1 ≈ 63%.


    **Conclusion & Interpretation:**

    - **Result: Saves 6.95 MB memory but sacrifices parallel execution throughput
    (Compute-Bound).**

    '
