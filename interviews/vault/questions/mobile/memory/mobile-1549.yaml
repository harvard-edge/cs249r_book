title: Optimizing LLM Inference with Memory-Mapped Weights on Samsung Exynos 2400 NPU
scenario: You are tasked with optimizing a large language model (LLM) for real-time inference on the Samsung Exynos 2400 NPU. The model weights alone exceed the NPU's available on-chip memory but can fit within the main memory. To minimize load times and enable efficient sharing across multiple inference processes, you decide to leverage memory-mapped files for loading model weights.
question: How would you optimize memory-mapped LLM weights on Exynos 2400 to reduce cold-start latency and efficiently share memory across processes?
details:
  realistic_solution: 'The solution involves using `mmap` with `MAP_SHARED` to map the model weight file into the virtual address space. To minimize cold start latency, employ explicit pre-faulting strategies such as `madvise(MADV_WILLNEED)` or `mlock` on the entire mapped region immediately after `mmap`. This proactively loads the weight data into memory, preventing on-demand page faults during the critical first inference. For shared memory across processes, the `MAP_SHARED` flag inherently allows multiple processes to share the same physical pages backing the mapped file, ensuring a single physical copy of the model weights.'
  common_mistake: |
    **The Pitfall:** Simply using `mmap` without proactive page fault management or `MAP_SHARED`.
    **The Rationale:** Unaware that OS demand-paging incurs massive latency overhead per page during the first inference pass, or ignoring cross-process duplication.
    **The Consequence:** Results in terrible cold-start latency (seconds to minutes) and out-of-memory errors when multiple processes load separate physical copies of the weights.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Weight size: 8 GiB.
       - Sequential read bandwidth: 68 GB/s.
       - Page size: 4 KB.
       - Page fault latency: 50 µs/fault.
    2. **Calculations:**
       - Fast load: 8 GB / 68 GB/s = ~0.117 seconds.
       - Number of pages: 8 GiB / 4 KB = 2,097,152 pages.
       - Cold start fault time: 2,097,152 * 50 µs = 104.8 seconds.
       - Shared memory footprint (5 processes): 5 * 8 GiB = 40 GiB (OOM). Using MAP_SHARED: collapses to 8 GiB.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound. Cold start latency is effectively removed with pre-faulting, avoiding over 100 seconds of page fault delays.**
