title: The Eviction Threshold
scenario: An ML engineer is profiling a new video editing app on a flagship Android device with 12 GB of RAM. They notice that when applying a complex, multi-frame style transfer filter, the app is frequently terminated by the OS.
question: What is the approximate memory usage (in GB) at which an app on a 12 GB Android device is likely targeted for OS eviction?
details:
  realistic_solution: The operating system is terminating the app because it's exceeding its allocated memory budget and causing system-wide memory pressure. This is a standard mechanism on both Android (Low Memory Killer daemon) and iOS (Jetsam) to maintain system stability. Given a device with 12 GB of RAM, we can estimate the eviction threshold using the 25% rule of thumb. The app is likely being terminated when its memory usage spikes above 3 GB.
  common_mistake: |
    **The Pitfall:** Assuming app terminations are random bugs or solely related to high CPU usage.
    
    **The Rationale:** Many developers are not quantitatively aware of the hard memory limits imposed by mobile operating systems, focusing only on compute profiling.
    
    **The Consequence:** They optimize the wrong resource, and their application continues to crash under memory pressure.
  napkin_math: |
    **Assumptions & Constraints:**
    - Total RAM: 12 GB.
    - OS Heuristic: Background eviction limit is ~25% of total RAM.

    **Calculations:**
    - Eviction Threshold: 12 GB x 0.25 = 3 GB.

    **Conclusion & Interpretation:**
    - **Result: 3 GB (Memory-Bound)**. The app is targeted for eviction when it exceeds 3 GB of memory usage.
  options:
  - 6 GB. The app is allowed to use half the system RAM.
  - 3 GB. The app is exceeding the standard 25% memory budget.
  - 9 GB. The OS is malfunctioning; it should reserve at least 75% for the foreground app.
  - 12 GB. The app is only terminated if it tries to allocate more RAM than the device physically has.
  correct_index: 1
