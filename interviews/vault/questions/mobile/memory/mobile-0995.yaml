title: 'Model Size Estimation: Diagnose Mobile OOM from KV-Cache Growth'
scenario: An iOS app (A17 Pro, 8GB) running a 1B INT4 LLM (500MB) receives OOM crashes after 15-20 conversation
  turns. The app worked fine for 10 turns.
question: How would you diagnose the root cause of the OOM crashes and quantify a fix?
details:
  realistic_solution: 'KV grows every turn. Turn 1: 512 tokens × 262KB = 134MB. Turn 10: 5120 tokens →
    1.34GB. Turn 15: 7680 tokens → 2.01GB. Turn 18: 9216 tokens → 2.41GB KV. Total app memory at turn
    18: 500MB model + 2.41GB KV = 2.91GB. This approaches the ~3GB iOS per-app memory limit, leading to
    jetsam crashes between turn 15 and 20. Fix: implement sliding window KV: keep only last 4096 tokens.
    KV caps at 1.07GB. Total app memory: 500MB + 1.07GB = 1.57GB ✓ for unlimited turns.'
  common_mistake: '**The Pitfall:** Blaming the static model weights for the OOM.

    **The Rationale:** Candidates forget that transformer context windows generate a dynamically growing
    Key-Value (KV) cache.

    **The Consequence:** Suggesting aggressive quantization or smaller models instead of fixing the unbounded
    KV-cache growth.

    '
  napkin_math: '**Assumptions & Constraints:**

    - Per-App Memory Limit: ~3 GB.

    - Model Footprint: 500 MB.

    - Available for KV Cache: 3 GB - 0.5 GB = 2.5 GB.

    - KV Size per Token: 262 KB.


    **Calculations:**

    - Tokens to Crash: 2.5 GB / 262 KB = ~9,541 tokens.

    - Turns to Crash: 9,541 tokens / 512 tokens/turn = ~18.6 turns.

    - Fix: Cap context at 4096 tokens. KV size = 4096 * 262 KB = 1.07 GB.


    **Conclusion & Interpretation:**

    - **Result: 1.07 GB (Memory-Bound)**. Capping the context at 4096 tokens ensures the KV cache stays
    well under the 2.5 GB budget, preventing OOMs.

    '
