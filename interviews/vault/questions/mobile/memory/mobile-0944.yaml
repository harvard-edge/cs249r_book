title: 'KV-Cache: Diagnose KV Cache Thrashing in Concurrent Mobile LLM Requests'
scenario: 'Your mobile app runs two parallel LLM tasks: a background summarization (1B model, 2048 tokens KV) and foreground chat (1B model, 512 tokens KV). You observe a 3x slowdown in chat when summarization runs simultaneously.'
question: Why does A17 Pro foreground chat slow 3x when a 1B background summarizer holds a 2048-token KV cache?
details:
  realistic_solution: Both decoders repeatedly scan their KV caches from shared unified memory. The foreground chat scans about 512 tokens of KV per generated token, while the background summarizer scans about 2048 tokens. If they run concurrently, the foreground request competes with a much larger streaming read, causing bandwidth sharing, cache eviction, and scheduler stalls. The 3x slowdown is therefore a shared-memory bandwidth and scheduling problem; mitigate it by serializing decode steps, lowering background priority, quantizing KV, or pausing summarization while foreground chat is active.
  common_mistake: |
    **The Pitfall:** Assuming GPU compute contention is the primary problem.
    **The Rationale:** Candidates fail to realize that parallel LLM decoding tasks are extremely memory-bandwidth intensive rather than compute intensive.
    **The Consequence:** Trying to optimize the model's compute graph when the actual solution requires managing shared memory bandwidth.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Approximate KV footprint per context token for this model: 98.3 KB.
       - Foreground Chat KV read per generated token: 512 tokens * 98.3 KB = ~50 MB.
       - Background Summarization KV read per generated token: 2048 tokens * 98.3 KB = ~201 MB.
       - Shared unified memory bandwidth is finite and the effective per-task share drops under concurrent streaming reads.
    2. **Calculations:**
       - Chat isolated KV demand = ~50 MB per foreground decode step.
       - Background KV demand = ~201 MB per background decode step.
       - If both decoders are active at the same cadence, total KV streaming demand per pair of decode steps is 50 MB + 201 MB = 251 MB.
       - The foreground task is only 50 / 251 = ~20% of the KV bytes but must wait for bandwidth shared with the 4x larger background scan.
       - In practice this does not imply exactly 5x slower end-to-end latency because some work is fixed or scheduled separately, but a 2-3x foreground slowdown is plausible once bandwidth sharing, cache eviction, and task scheduling are included.
    3. **Conclusion & Interpretation:**
       **Result: Memory-Bandwidth Contention. The background task adds about 201 MB of KV streaming pressure beside the chat task's 50 MB per decode step, so foreground latency can grow toward the observed 3x unless decode is serialized, deprioritized, or the KV cache is compressed.**
