title: Mitigating Mobile DRAM Thermal Throttling
scenario: "A real-time video segmentation app running on a Snapdragon 8 Gen 3 Hexagon NPU exhibits severe frame drops after 2 minutes. Profiling reveals the LPDDR5 memory controller is thermally throttling due to continuous off-chip activation writes."
question: "Formulate an architectural change to the model's execution strategy to eliminate off-chip intermediate activation memory traffic."
details:
  realistic_solution: "Apply deep operator fusion and spatial tiling. By slicing the image spatially and fusing adjacent operations (e.g., cascading Depthwise -> BatchNorm -> ReLU -> Pointwise), the entire feature map depth chunk can reside cleanly within the NPU's local SRAM. This completely evicts the necessity of routing intermediate tensor layers through off-chip LPDDR5 memory, entirely mitigating the thermal build-up."
  common_mistake: |
    **The Pitfall:** Proposing to increase the NPU clock speed or aggressively lower model precision.
    **The Rationale:** Candidates incorrectly diagnose memory bandwidth symptoms as a compute or precision deficiency.
    **The Consequence:** Failing to eliminate the root cause (writing intermediate states to main memory), leaving the memory controller completely thermally throttled.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Intermediate activations are currently flushed to off-chip LPDDR5 memory between layers.
    2. **Calculations:**
       - Operator Fusion / SRAM Tiling explicitly caches intermediate outputs directly into on-chip memory.
    3. **Conclusion & Interpretation:**
       - **Result: Thermal-Bound.** Implementing aggressive operator fusion drives off-chip intermediate activation writes from **100% to 0%**, completely eliminating the DRAM thermal bottleneck.
