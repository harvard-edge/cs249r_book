title: LLM KV Cache Allocation Strategy on Tensor G3
scenario: 'You are deploying a 1.8B parameter on-device LLM on the Google Tensor G3. The system restricts the LLM process to a strict 2.5 GB memory budget to prevent OS-level eviction of essential background apps. You must choose between two KV cache management strategies for a multi-turn chat feature: Alternative A uses static pre-allocation of a maximum-length KV buffer at initialization, while Alternative B uses dynamic block-based allocation (like PagedAttention) to minimize memory usage for short prompts.'
question: Should a 1.8B LLM on Tensor G3 use static or PagedAttention-style KV allocation under a 2.5 GB budget?
details:
  realistic_solution: Alternative A (static pre-allocation) is the better choice for this constrained mobile deployment. Because mobile inference typically operates at batch size 1, the memory savings from dynamic allocation may not outweigh the risk of allocator churn and fragmentation over long sessions. Pre-allocating the maximum required KV cache gives the app a fixed, predictable footprint and materially reduces the chance of a late-session Android low-memory killer event.
  common_mistake: |
    **The Pitfall:** Blindly recommending dynamic block allocation (PagedAttention).
    **The Rationale:** Candidates know this is state-of-the-art for server-side LLMs and incorrectly apply it to batch=1 mobile environments.
    **The Consequence:** Dynamic allocation introduces severe memory fragmentation over time, triggering unpredictable Android Low Memory Killer (LMK) app crashes.
  napkin_math: |
    **Assumptions & Constraints:**
    - Total budget: 2.5 GB.
    - Weights: 1.8B parameters at INT8 ≈ 1.8 GB.
    - Nominal headroom after weights: 2.5 GB - 1.8 GB = 0.7 GB.
    - KV configuration: 16 layers, 16 attention heads, head dimension 128, FP16 KV values.

    **Calculations:**
    - Hidden dimension check: 16 heads * 128 dim/head = 2048 hidden dim.
    - KV cache per token: 2 (K,V) * 16 layers * 16 heads * 128 dim/head * 2 bytes = 131,072 bytes = 128 KB.
    - Static maximum cache for 2048 tokens: 128 KB * 2048 = 256 MB.
    - Weights plus cache: 1.8 GB + 0.256 GB = 2.056 GB, leaving about 0.444 GB for runtime overhead inside the 2.5 GB budget.

    **Conclusion & Interpretation:**
    - **Result: Static Pre-allocation.** The fixed 256 MB KV cache fits in the post-weight headroom and reduces fragmentation risk, but it does not literally eliminate all allocator or system-memory risk.
