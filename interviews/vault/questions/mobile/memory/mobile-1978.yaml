title: Hexagon NPU TCM Spilling Impact
scenario: A convolutional layer on a Snapdragon 8 Gen 3 Hexagon NPU exceeds the capacity of the Tightly Coupled Memory (TCM), forcing the runtime to spill activations to the LPDDR5x RAM.
question: Evaluate the performance impact of missing the NPU's TCM and spilling memory traffic to main memory.
visual:
  kind: svg
  path: mobile-1978.svg
  alt: Bar chart displaying a massive latency spike when missing TCM and hitting LPDDR5x.
  caption: 'Access Latency: TCM vs LPDDR5x Spilling.'
details:
  realistic_solution: TCM provides deterministic, sub-nanosecond access latency with immense internal bandwidth necessary to feed the MAC arrays. Spilling to LPDDR5x introduces significant latency (50-100ns) and restricts bandwidth to under 100 GB/s. This drastically lowers the arithmetic intensity, starving the tensor units and bottlenecking inference on memory I/O.
  common_mistake: |
    **The Pitfall:** Underestimating the performance penalty of a TCM miss on mobile architecture.
    
    **The Rationale:** Thinking LPDDR5x is fast enough to seamlessly hide the cache miss, neglecting the strict determinism requirements of hardware MAC arrays.
    
    **The Consequence:** The model suffers massive latency spikes and falls short of real-time deadlines due to severe bandwidth contention.
  napkin_math: |
    **Assumptions & Constraints:**
    - TCM access latency: ~1 ns.
    - LPDDR5x spill access latency: ~100 ns.

    **Calculations:**
    - Calculate ratio of miss penalty: 100 ns / 1 ns = 100x.

    **Conclusion & Interpretation:**
    - **Result: 100x Penalty (Latency-Bound)**. Spilling activations to main memory incurs a massive 100x latency penalty, violating strict determinism requirements.
