title: The Background Batching Bottleneck
scenario: Your mobile OS runs a 3B LLM. A foreground chat runs at 20 tok/s. When the OS schedules a background summarizer concurrently, total system throughput plummets to 12 tok/s.
question: Why does adding a background summarizer reduce total LLM throughput instead of improving batching efficiency?
details:
  realistic_solution: The added summarizer turns the workload into a memory-bandwidth and locality problem. A single foreground decode stream can reuse a predictable sequence of weight reads and KV-cache accesses, but interleaving a second sequence adds another KV-cache working set and forces the scheduler to bounce between less-contiguous memory regions. The fix is not to assume larger batches will help automatically; preserve contiguous weight streaming and KV locality with smarter scheduling, chunked prefill, sequence grouping, or short decode micro-batches that keep memory access patterns merged and predictable.
  common_mistake: |
    **The Pitfall:** Assuming the NPU ran out of compute ALUs.
    **The Rationale:** Engineers accustomed to cloud GPUs assume adding batch size scales throughput linearly until compute saturation is reached.
    **The Consequence:** They wrongly attempt to optimize the arithmetic intensity of the model, failing to fix the memory access patterns that are the actual bottleneck.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: INT4 3B with a large weight and KV-cache working set.
    - Foreground chat alone runs at 20 tok/s.
    - Foreground plus background summarizer drops total throughput to 12 tok/s.
    - The system is memory-locality-limited, so useful bandwidth depends on access order, cache/TLB behavior, and scheduler grouping.

    **Calculations:**
    - If batching improved compute efficiency, adding the summarizer would raise or at least preserve total tokens/sec.
    - Instead, total throughput falls from 20 tok/s to 12 tok/s, a 40% drop.
    - The drop is consistent with interleaved decode streams disrupting contiguous weight access and adding a second KV-cache working set.
    - The relevant metric is measured memory-stall time and useful bandwidth per token from traces, not a fixed "model size per token" formula.

    **Conclusion & Interpretation:**
    - **Result: Bandwidth/Locality-Bound**. Total decode speed drops because the summarizer increases memory traffic and disrupts contiguous weight and KV-cache access, so batching only helps if the scheduler preserves locality.
