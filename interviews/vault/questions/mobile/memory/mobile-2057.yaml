title: 'Memory Bandwidth Bound for Mobile Autoregression'
scenario: 'A 1.5B parameter language model is quantized to 4-bit and deployed on a mobile processor. The target generation speed is 15 tokens/sec.'
question: 'What is the minimum memory bandwidth required to read the weights during generation, and can an Apple A17 Pro support it?'
details:
  realistic_solution: |
    A 1.5B parameter model at 4 bits (0.5 bytes) per weight requires 0.75 GB of memory. For autoregressive generation with batch size 1, the entire weight matrix must be loaded from RAM for every single generated token. Therefore, 15 tokens/s requires 0.75 GB * 15 = 11.25 GB/s. Since 11.25 GB/s is well below the A17's 50 GB/s limit, the target is heavily compute-bound, not bandwidth-bound.
  common_mistake: |
    **The Pitfall:** Calculating bandwidth using FP16 weights instead of the 4-bit INT4 representation.
    **The Rationale:** Candidates mechanically apply 2 bytes per parameter without adjusting for the stated aggressive quantization.
    **The Consequence:** Incorrectly concluding the model is bandwidth-bound and cannot meet the 15 tokens/sec target.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model Size: 1.5 billion parameters.
    - Precision: 4-bit INT4 (0.5 bytes per param).
    - Target Speed: 15 tokens/sec.
    - Hardware Limit: A17 Pro (50 GB/s bandwidth).

    **Calculations:**
    - Footprint = 1.5 billion * 0.5 bytes = 0.75 GB.
    - Required Bandwidth = 0.75 GB/token * 15 tokens/sec = 11.25 GB/s.

    **Conclusion & Interpretation:**
    - **Result: 11.25 GB/s (Compute-Bound)**. 11.25 GB/s is < 50 GB/s, meaning memory bandwidth is not the bottleneck.
