title: VRAM Budgeting for a Mobile ML Model on Samsung Exynos 2400 NPU
scenario: You are tasked with deploying a large language model (LLM) for on-device inference on a smartphone powered by an NPU with 12 GB of LPDDR5X memory. The LLM has 7 billion parameters (FP16).
question: How would you budget mobile model memory across weights, activations, and training state to fit within 12 GB?
details:
  realistic_solution: |
    Start by rejecting the unmodified plan: 7B FP16 weights alone need about 14 GB, so they cannot fit in a 12 GB mobile memory budget before activations, KV cache, runtime buffers, or OS headroom. For inference, budget weights first, then reserve memory for the KV cache at the target context length, peak activations/scratch buffers, and safety headroom. A practical deployment would require weight quantization, such as INT8 or INT4, context-length limits, KV-cache quantization if needed, and profiling on the target NPU. If the question includes training state, full on-device training is out of scope for this budget: Adam-style optimizer state and gradients would add many bytes per parameter, so only adapter-style or off-device fine-tuning is plausible.
  common_mistake: |
    **The Pitfall:** Only accounting for static model weights while ignoring activations and KV-cache.
    **The Rationale:** Engineers focus purely on parameter size and forget that dynamic memory requirements scale linearly with sequence length.
    **The Consequence:** Models that fit on disk immediately crash with Out-Of-Memory (OOM) errors as soon as inference begins on longer sequences.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model Size: 7 Billion parameters.
    - Precision: FP16 weights use 2 bytes/param; INT8 weights use 1 byte/param.
    - KV-cache example: batch 1, 512 tokens, 32 layers, 32 attention heads, head_dim 128, FP16 cache.
    - Total RAM Budget: 12 GB.

    **Calculations:**
    - FP16 weights: 7e9 params * 2 bytes = 14 GB, which exceeds the 12 GB device budget before runtime memory.
    - INT8 weights: 7e9 params * 1 byte = 7 GB, leaving about 5 GB for OS headroom, activations, KV cache, and runtime buffers.
    - KV cache: 2 (K+V) * 1 batch * 512 tokens * 32 layers * 32 heads * 128 head_dim * 2 bytes = 268,435,456 bytes, about 256 MiB.
    - Training state with Adam-like optimization would be far larger than inference: gradients plus optimizer moments add many bytes per parameter, so even INT8 inference weights do not make full training fit.

    **Conclusion & Interpretation:**
    - **Result: FP16 does not fit; quantized inference may fit, full training does not.** The budget must start with quantized weights, then reserve KV-cache, activation, runtime, and OS headroom explicitly.
