title: 4K Image Memory Tiling
scenario: A computer vision model needs to process a 4K image (8.3MP, 3 channels). The neural engine shares system RAM but has a limited ultra-fast L2 cache.
question: Specify the memory allocation sequence and tile sizes to process the 4K image without thrashing main memory?
details:
  realistic_solution: Allocate two reusable 256x256x3 INT8 tile buffers plus any required halo rows in the accelerator-local SRAM/L2 working set. Stream the 4K image tile by tile from LPDDR5X, run the fused operators on one tile while prefetching the next, flush only the completed output tile, and reuse the same buffers. If profiling shows the halo or intermediate activations exceed the L2 ceiling, reduce the tile edge to 128 pixels rather than allocating the full frame.
  common_mistake: |
    **The Pitfall:** Allocating the entire 4K tensor continuously in system RAM.
    **The Rationale:** Developers assume the OS and hardware will perfectly page and manage large allocations automatically.
    **The Consequence:** Triggering massive L2 cache evictions, causing severe memory thrashing and bandwidth saturation on the shared bus.
  napkin_math: |
    **Assumptions & Constraints:**
    - Image Specs: 4K (8.3 MP), 3 channels.
    - Model Precision: INT8 (1 byte/channel).
    - Tile Dimensions: 256 x 256 pixels.

    **Calculations:**
    - Tile Size: 256 * 256 * 3 channels * 1 byte = 196,608 bytes.
    - Tile Size in KB: 196,608 / 1024 = 192 KB.

    **Conclusion & Interpretation:**
    - **Result: 192 KB input tile before halos/intermediates (Memory-Bound)**. This is a reasonable starting tile size, but it must be checked against the actual L2/SRAM budget and operator working set; tiling reduces main-memory thrashing rather than guaranteeing it is entirely eliminated.
