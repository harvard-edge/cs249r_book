title: Unpredictable Latency Spikes
scenario: Your real-time ML model on Android generally achieves a 30ms latency, but
  occasionally you observe unpredictable spikes up to 100-200ms. These spikes don't
  correlate with thermal throttling, NPU utilization drops, or obvious background
  app activity.
question: How would you diagnose and mitigate these latency spikes, focusing on memory
  management within the ML inference pipeline?
details:
  realistic_solution: 'The unpredictable latency spikes, when other common causes
    are ruled out, often point to **dynamic memory allocation overhead and heap fragmentation**
    within the inference process.

    '
  common_mistake: '**The Pitfall:** Blaming the OS scheduler or garbage collection
    indiscriminately.

    **The Rationale:** While common, the prompt explicitly rules out obvious background
    activity and notes stable NPU utilization, pointing to pipeline-specific memory
    issues.

    **The Consequence:** Ignoring the real issue of dynamic memory allocation and
    heap fragmentation within the inference code.

    '
  napkin_math: '**Assumptions & Constraints:**

    - Single malloc overhead: Tens of nanoseconds to several microseconds (varies
    by fragmentation/contention).

    - Inference allocations: Suppose 1000 malloc calls are made dynamically during
    inference.


    **Calculations:**

    - Accumulated delay: 1000 calls * 50μs average = 50,000μs (50ms).


    **Conclusion & Interpretation:**

    - **Result: 50ms accumulated latency (Memory-Allocation Bottleneck)**. This 50ms
    overhead easily turns a stable 30ms latency into an unpredictable 80ms+ spike.

    '
