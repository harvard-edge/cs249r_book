title: Compare MHA vs GQA KV-Cache Memory on Mobile LLMs
scenario: You are selecting between MHA (16 KV heads) and GQA (4 KV heads) for a new 1B LLM design targeting a mobile SoC with 4096-token context windows.
question: How would you compare MHA with 16 KV heads versus GQA with 4 KV heads for memory, bandwidth, quality, and architecture impact?
details:
  realistic_solution: MHA keeps 16 KV heads and therefore stores the full 512 MiB KV cache for the whole 32-layer, 4096-token context. It is architecturally simple and can preserve the most attention capacity, but it spends more RAM and KV bandwidth during decode. GQA with 4 KV heads changes the attention architecture so groups of query heads share KV heads; for the same context it reduces the total KV cache to about 128 MiB and cuts KV read bandwidth by 4x. The tradeoff is a possible small quality loss or retraining/tuning requirement, especially for tasks that depend on fine-grained long-context attention. On a memory-constrained mobile SoC, prefer GQA when the measured quality delta is acceptable for the product target; keep MHA only if quality regressions are material and the memory/bandwidth budget can still support the target context and latency.
  common_mistake: |
    **The Pitfall:** Overestimating Grouped-Query Attention (GQA) quality loss.
    **The Rationale:** Candidates assume reducing KV heads from 16 to 4 will severely degrade output coherence.
    **The Consequence:** They unnecessarily sacrifice massive amounts of memory for standard MHA, ignoring that modern LLMs use GQA with minimal quality tradeoff to vastly improve mobile inference efficiency.
  napkin_math: |
    **Assumptions & Constraints:**
    - MHA dimensions: 32 layers, 16 KV heads, 128 head_dim, 4096 context length.
    - GQA option: 4 KV heads with the same layers, head_dim, and context length.
    - Precision: INT8 (1 byte/element).

    **Calculations:**
    - MHA KV cache elements: 2 (K and V) * 32 * 16 * 128 * 4096 = 536,870,912 elements.
    - MHA INT8 footprint: 536,870,912 bytes = 536.9 MB decimal = 512 MiB.
    - GQA-4 KV cache elements: 2 * 32 * 4 * 128 * 4096 = 134,217,728 elements.
    - GQA-4 INT8 footprint: 134,217,728 bytes = 134.2 MB decimal = 128 MiB.
    - Memory and decode KV-read bandwidth reduction: 512 MiB / 128 MiB = 4x.

    **Conclusion & Interpretation:**
    - **Result: GQA Cuts KV Memory and Bandwidth by 4x.** MHA requires 512 MiB for the 4096-token cache, while GQA-4 requires 128 MiB. The architecture should prefer GQA if quality tests show an acceptable regression.
