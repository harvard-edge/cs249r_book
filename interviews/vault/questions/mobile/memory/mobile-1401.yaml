title: On-Device LLM Budgeting for Snapdragon 8 Gen 3
scenario: You are designing an on-device conversational agent using a 7B parameter LLM. The device has 12 GB of shared memory, but the OS permanently reserves 6 GB. You must adhere to a strict 6 GB unified memory budget for weights, activations, and a 4096-token KV-cache.
question: How should a 7B on-device LLM be budgeted under a 6 GB memory cap while supporting a 4096-token context window?
details:
  realistic_solution: A robust L6+ solution starts with the exact 6 GB app budget. Quantize the 7B weights to 4-bit, giving a ~3.5 GB static footprint because 7B weights at 1 byte/parameter are about 7 GB and exceed the cap before KV or workspace. For a 4096-token context, FP16 KV-cache is roughly 2.15 GB only for a 32-layer model whose KV width equals the full 4096 hidden size; GQA models can be smaller. Use INT8 or grouped low-bit KV-cache to bring this conservative KV estimate to ~1.07 GB, reserve roughly 0.8-1.0 GB for activations/workspaces/token buffers, and enforce admission control that shortens context or batch size when the estimate approaches 6 GB.
  common_mistake: |
    **The Pitfall:** Forgetting that mobile memory is unified and overlooking KV-cache scaling.
    **The Rationale:** Candidates treat the 6 GB as dedicated VRAM exclusively for weights.
    **The Consequence:** Proposing INT8 weights alone, which are about 7 GB for a 7B model, or unquantized KV-caches that leave no safe activation headroom.
  napkin_math: |
    **Assumptions & Constraints:**
    - Available app budget: 6.0 GB decimal from a 12 GB device with 6 GB reserved by the OS.
    - 7B Model at 4-bit weights: 7B * 0.5 byte = 3.5 GB.
    - Conservative model shape estimate: 32 layers, 4096-token context, KV width 4096 per layer.
    - KV cache stores K and V for each token and layer.

    **Calculations:**
    - FP16 KV-cache = 4096 tokens * 32 layers * 4096 KV width * 2 (K,V) * 2 bytes = 2,147,483,648 bytes = 2.15 GB.
    - 4-bit weights + FP16 KV = 3.5 GB + 2.15 GB = 5.65 GB, leaving only ~0.35 GB for activations and runtime overhead.
    - INT8 KV-cache with the same KV width = 2.15 GB / 2 = 1.07 GB.
    - 4-bit weights + INT8 KV + 0.9 GB activations/workspace = 3.5 GB + 1.07 GB + 0.9 GB = 5.47 GB.

    **Conclusion & Interpretation:**
    - **Result: ~5.47 GB peak budget with INT8 KV-cache (Fits 6 GB Budget).** 4-bit weights are necessary but not sufficient; KV-cache quantization and activation headroom make the 4096-token window feasible.
