title: Architecting OOM-Resilient On-Device LLM Inference
scenario: You are designing an on-device LLM assistant for a flagship smartphone. The OS strictly enforces a dynamic 4 GB memory budget for background AI tasks to prevent eviction of user-facing apps.
question: How should an LLM assistant manage a growing KV cache under a dynamic 4 GB AI memory budget without triggering an OOM kill?
details:
  realistic_solution: A robust mobile design bounds the KV cache instead of letting it grow until OOM. Use fixed-size KV blocks or a sliding-window cache, reserve headroom for activations and OS pressure, compact or evict older blocks when memory callbacks arrive, and apply admission control when a new request would exceed the budget. Paged-style block allocation can reduce fragmentation, but the primary policy is capped context, predictable allocation, and graceful backpressure.
  common_mistake: |
    **The Pitfall:** Proposing static KV cache allocation and ignoring the shared nature of mobile memory.
    **The Rationale:** Candidates assume the AI budget is a hard, isolated partition, failing to account for dynamic OS eviction when foreground apps spike in memory usage.
    **The Consequence:** The LLM either wastes available capacity or crashes due to fragmentation and OS-level memory pressure.
  napkin_math: |
    **Assumptions & Constraints:**
    - AI Budget = 4.0 GB.
    - Model weights (3B INT4) = 1.5 GB.
    - Token KV size = 3072 (dim) * 32 (layers) * 2 (K&V) * 2 bytes = 393,216 bytes, about 384 KiB.

    **Calculations:**
    - Available for KV + Activations = 4.0 - 1.5 = 2.5 GB.
    - Reserve about 0.5 GB for activations, allocator overhead, and OS pressure response.
    - KV budget after reserve is about 2.0 GB.
    - Max FP16 KV context = 2.0 GiB / 384 KiB per token = about 5,460 tokens before safety margins.
    - A block allocator or sliding cache can reclaim complete token blocks and compact free lists, but the exact fragmentation savings must be measured.

    **Conclusion & Interpretation:**
    - **Result: Memory-Bound**. The assistant should enforce a capped context window, evict or summarize old KV blocks under memory pressure, and reject or shrink requests before the OS kills the process.
