title: Zero-Copy LLM Architecture on Google Tensor G3
scenario: You are leading the deployment of a 2B parameter LLM on the Google Tensor G3 (12 GB LPDDR5X). Multiple system apps need concurrent access to this model for instant text processing.
question: How would you design a memory-mapped inference architecture to achieve zero-copy weight sharing across processes?
details:
  realistic_solution: |
    Package the quantized weights as an aligned, immutable, file-backed model image and map it read-only with mmap in every client or in a shared inference service. The OS page cache then backs all processes with the same physical pages, while each process keeps only lightweight private state such as tokenizer buffers, KV cache, and session metadata. A service daemon can centralize scheduling and accelerator access, but the key zero-copy property is shared read-only page mappings, not per-process weight loads. Use page-aligned tensors, versioned model files, warmup/prefetch when allowed, and avoid claims that hardware DMA directly supports every mapped buffer unless the target driver explicitly exposes that path.
  common_mistake: |
    **The Pitfall:** Suggesting standard per-process weight loading or failing to align mmap buffers.
    **The Rationale:** Treating the mobile OS like a standard server environment without zero-copy DMA considerations.
    **The Consequence:** Exhausting RAM (multiple 1GB copies) and incurring massive 250ms+ cold start latencies from UFS reads.
  napkin_math: |
    **Assumptions & Constraints:**
    - 2B INT4 weights: 2B * 0.5 bytes = 1.0 GB before scales and alignment.
    - Packed model image with metadata/alignment: about 1.1 GB.
    - 3 concurrent apps, each with 50 MB of private session state.
    - Warm page-cache bandwidth: 50 GB/s effective memory read bandwidth for a lower-bound weight scan.

    **Calculations:**
    - Without sharing: 3 apps * 1.1 GB = 3.3 GB of weight memory, plus private state.
    - With shared mmap: 1.1 GB shared weights + 3 * 50 MB private state = 1.25 GB resident.
    - Memory saved = 3.3 GB - 1.1 GB = 2.2 GB of duplicated weights.
    - Warm first-token weight scan lower bound = 1.1 GB / 50 GB/s = 22 ms.
    - First-token compute and accelerator scheduling are separate from the zero-copy memory-sharing estimate and must be profiled on the deployed graph.
    - Cold start from storage is much slower than the warm-cache lower bound and depends on UFS and page-fault behavior, so it must be hidden with install-time or idle prefetch.

    **Conclusion & Interpretation:**
    - **Result: about 2.2 GB saved across three apps, with a 22 ms warm-cache memory lower bound.** Shared mmap avoids duplicate weight pages and reduces warm TTFT, but it does not by itself guarantee sub-50 ms TTFT under cold-cache or contended accelerator conditions.
