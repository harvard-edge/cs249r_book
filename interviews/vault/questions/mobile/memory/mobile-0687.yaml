title: The On-Device RAG Memory Budget
scenario: 'Your team is building an on-device RAG system on a Galaxy S24 Ultra with 12 GB RAM. The components: a 3B LLM in INT4 (1.5 GB), an embedding model (100 MB), a vector database of 500K document chunks with 768-dim embeddings, and retrieved context fed to the LLM.'
question: Does a Galaxy S24 Ultra on-device RAG stack fit with a 3B INT4 LLM and 500K 768-dim embeddings?
details:
  realistic_solution: 'Calculate each component: The 3B INT4 model takes 1.5 GB. The embedding model takes 100 MB. A naive Full HNSW index for 500K 768-dim embeddings takes ~2.19 GB. By replacing it with a Product Quantization (PQ) compressed index, the size shrinks to ~31 MB, saving 2.16 GB (98.6% reduction). Recall drops slightly but remains acceptable. Factoring in the KV-cache and overhead, the total optimized memory footprint is around 5.59 GB. On a 12 GB device, this represents a 46.6% utilization, leaving a safe margin for the OS and multitasking. If it doesn''t fit, the naive HNSW vector database is the first thing that has to go, replaced by a quantized index.'
  common_mistake: |
    **The Pitfall:** Adding just the model sizes and assuming the 12GB RAM is sufficient.
    **The Rationale:** Candidates forget to account for KV-cache growth and the massive vector database index overhead.
    **The Consequence:** The system immediately goes Out-Of-Memory when the full HNSW index is loaded into RAM.
  napkin_math: |
    **Assumptions & Constraints:**
    - 3B INT4 LLM = 1.5 GB, Embedding Model = 100 MB
    - 500K embeddings, 768-dim FP32

    **Calculations:**
    - Full HNSW (FP32) = 500,000 * 768 * 4 bytes = 1.536 GB + 10% overhead = ~1.7 GB
    - Naive Memory Total = 1.5 + 0.1 + 1.7 = 3.3 GB
    - PQ Compressed (64 bytes/vector) = 500,000 * 64 bytes = ~32 MB
    - Optimized Memory Total = 1.5 + 0.1 + 0.032 = ~1.63 GB

    **Conclusion & Interpretation:**
    - **Result: ~1.63 GB (Memory-Optimized via Compression)**. Product Quantization (PQ) shrinks the vector index by >98% (1.7 GB to 32 MB), easily fitting the entire RAG stack within the 12 GB RAM with ample headroom for the OS.
