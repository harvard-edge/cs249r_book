title: The On-Device RAG Memory Budget
scenario: 'Your team is building an on-device RAG system on a Galaxy S24 Ultra with 12 GB RAM. The components: a 3B LLM in INT4 (1.5 GB), an embedding model (100 MB), a vector database of 500K document chunks with 768-dim embeddings, and retrieved context fed to the LLM.'
question: Does a Galaxy S24 Ultra on-device RAG stack fit with a 3B INT4 LLM and 500K 768-dim embeddings?
details:
  realistic_solution: Calculate each component separately. The 3B INT4 LLM is about 1.5 GB and the embedding model is about 100 MB. The raw 500K x 768 FP32 embedding vectors are 1.536 GB, and an HNSW graph adds link/metadata overhead; with about 64 neighbors at 4 bytes each plus metadata, the naive index is roughly 1.7 GB. Add a few hundred MB for KV-cache and runtime buffers, and the naive stack is around 3.8-4.2 GB before OS and app overhead, which can fit on a 12 GB flagship but leaves less multitasking headroom. A PQ index with 64-byte compressed vectors still needs graph metadata, so it is roughly 32 MB of codes plus ~150 MB of graph/metadata, or about 180 MB total. The optimized stack is roughly 2.3-2.7 GB plus app overhead, making the vector index the right component to compress if memory pressure appears.
  common_mistake: |
    **The Pitfall:** Adding just the model sizes and assuming the 12GB RAM is sufficient.
    **The Rationale:** Candidates forget to account for KV-cache growth and the massive vector database index overhead.
    **The Consequence:** The system immediately goes Out-Of-Memory when the full HNSW index is loaded into RAM.
  napkin_math: |
    **Assumptions & Constraints:**
    - 3B INT4 LLM = 1.5 GB, Embedding Model = 100 MB
    - 500K embeddings, 768-dim FP32
    - HNSW graph overhead estimate: 64 neighbor links/vector * 4 bytes plus metadata.
    - KV-cache and runtime buffers for retrieved context: ~0.4-0.8 GB.

    **Calculations:**
    - Raw FP32 vector storage = 500,000 * 768 * 4 bytes = 1.536 GB.
    - HNSW graph links = 500,000 * 64 * 4 bytes = 128 MB, plus metadata/allocator overhead ≈ 50 MB.
    - Naive vector index total ≈ 1.536 GB + 0.178 GB = ~1.7 GB.
    - Naive RAG memory = 1.5 GB LLM + 0.1 GB embedder + 1.7 GB vector index + 0.4-0.8 GB KV/runtime = ~3.7-4.1 GB.
    - PQ compressed vectors = 500,000 * 64 bytes = 32 MB.
    - PQ/HNSW index total ≈ 32 MB compressed codes + ~178 MB graph/metadata = ~210 MB.
    - Optimized RAG memory = 1.5 GB + 0.1 GB + 0.21 GB + 0.4-0.8 GB = ~2.2-2.6 GB.

    **Conclusion & Interpretation:**
    - **Result: Fits, but the vector index is the compression target.** The naive stack is roughly 4 GB plus app/OS pressure; PQ reduces vector storage substantially but does not eliminate HNSW graph and KV-cache overhead.
