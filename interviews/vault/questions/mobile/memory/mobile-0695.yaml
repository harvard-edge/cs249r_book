title: The SLC Cache Eviction
scenario: You are designing an always-on audio classifier for a mobile SoC. The model is 2 MB and the SoC has a 4 MB System-Level Cache (SLC). You pin the model to the SLC. It runs perfectly at 1 mW. However, the moment the user turns on the screen and scrolls the UI, the audio model's power consumption spikes to 15 mW, even though the CPU/NPU usage hasn't changed.
question: 'Why does UI scrolling ruin the ML power budget of an always-on audio classifier?'
details:
  realistic_solution: 'The 4 MB SLC (System-Level Cache) is shared among all SoC subsystems. When the screen turns on, the GPU display compositor and CPU UI rendering generate a stream of cache-line fills that evict your 2 MB ML model from the SLC. Each inference now reads from DRAM instead of SLC: energy per read jumps from 5 pJ/byte (SLC) to 100 pJ/byte (DRAM) — a 20x increase. Fix: use SoC-specific cache partitioning (if available), or accept DRAM cost and optimize model to <512 KB to fit in L2 cache, which is private to the NPU.'
  common_mistake: |
    **The Pitfall:** Attributing the power spike to the screen itself rather than the model's memory access patterns.
    **The Rationale:** Candidates think "screen takes power," missing that the question specifically states the *model's* power consumption spiked.
    **The Consequence:** Failing to recognize shared cache pollution, leading to an architecture that drains battery during interactive device usage.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model size 2 MB.
    - SLC read cost 5 pJ/byte.
    - DRAM read cost 100 pJ/byte.

    **Calculations:**
    - SLC Read Cost: 2 MB * 5 pJ/byte = 10 µJ.
    - DRAM Read Cost: 2 MB * 100 pJ/byte = 200 µJ.

    **Conclusion & Interpretation:**
    - **Result: 20x energy cost explosion (Memory-Bandwidth-Bound)**. Occurs due to DRAM eviction.
