title: The Unified Memory Architecture Advantage
scenario: Apple's M4 and A-series chips use a unified memory architecture. Qualcomm's Snapdragon 8 Gen 3 also uses shared physical memory. Your colleague says 'they're the same thing — both share memory.'
question: What architectural difference lets Apple's unified memory avoid copies that Qualcomm's shared DRAM still requires?
details:
  realistic_solution: |
    Apple's unified memory architecture shares a single physical address space across CPU, GPU, and NPU — a tensor computed by the NPU can be read by the GPU with zero copies, just a pointer handoff. Qualcomm's shared DRAM requires each accelerator to maintain its own virtual address space with separate page tables, requiring explicit DMA copies between compute units.
  common_mistake: |
    **The Pitfall:** Believing that because both chips share the same physical DRAM, there's no difference in data accessibility.
    **The Rationale:** Engineers confuse sharing physical memory with a unified memory architecture (shared virtual address space).
    **The Consequence:** Failing to realize that separate address spaces require explicit, costly DMA copies between compute units, drastically reducing effective pipeline performance.
  napkin_math: |
    **Assumptions & Constraints:**
    - 5-stage pipeline, 50 MB intermediate tensors.
    - Budget: 60 FPS (16.7ms budget).

    **Calculations:**
    - Apple Unified Memory: 5 × 2ms compute + 0ms transfers = 10ms.
    - Qualcomm Shared DRAM: 5 × 2ms compute + 4 × 2ms DMA copies = 18ms.

    **Conclusion & Interpretation:**
    - **Result: 18ms (Memory-Bandwidth-Bound)**. At 60 FPS, Qualcomm cannot run this pipeline; Apple can.
