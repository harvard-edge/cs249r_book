title: Flash Attention Kernel Portability to Snapdragon Hexagon DSP
scenario: A team wants to run a 3B transformer model with 4096-token context on Snapdragon 8 Gen 3 for real-time translation. They propose porting the Flash Attention CUDA kernel to the Hexagon DSP.
question: How would you evaluate porting Flash Attention to Hexagon DSP versus using GPU attention operators?
details:
  realistic_solution: 'Use Qualcomm''s QNN SDK which has a built-in optimized attention operator for the Adreno GPU (not Hexagon). The Adreno GPU on Snapdragon 8 Gen 3 supports custom ops via QNN Graph API. For seq_len=4096, use the Adreno-optimized attention with tiling to its 256KB shared memory. Hexagon DSP is better suited for post-processing, not attention.'
  common_mistake: |
    **The Pitfall:** Directly porting CUDA Flash Attention logic to Hexagon HVX intrinsics.
    **The Rationale:** Candidates treat all accelerators as equivalent, forgetting that CUDA warp semantics have no equivalent on VLIW architectures.
    **The Consequence:** Wasting engineering cycles writing incompatible kernel tiles instead of leveraging built-in QNN Adreno operators.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hexagon DSP TCM (Tightly Coupled Memory) = 32KB.
    - Tile Size (d=64): Q (4KB) + K (4KB) + V (4KB) = 12KB (Fits in TCM).
    - DSP Throughput: 512 GMAC/s (~1 TOPS).

    **Calculations:**
    - Attention FLOPs (seq=4096, d=64, 1 head): 2 * 4096^2 * 64 = 2.1 GFLOPs.
    - DSP Latency: 2.1 GFLOPs / 1 TOPS = 2.1ms/head.
    - Total Latency: 2.1ms * 32 heads * 4 layers = 270ms.

    **Conclusion & Interpretation:**
    - **Result: 270ms (Compute-Bound)**. DSP is too slow at 270ms. Adreno GPU (~10 TOPS) processes this in 27ms, making DSP strictly compute-bound.
