title: On-Device Federated Gradient Accumulation on A17 Pro
scenario: A mobile federated learning framework accumulates gradients on a mobile NPU for a personalization model (10M parameters). The training batch runs in 50 mini-batches before uploading.
question: How would you calculate gradient accumulation memory overhead and whether it fits alongside the inference workload?
details:
  realistic_solution: 'Model parameters: 10M × 4B = 40MB. Gradients (FP32): 40MB. Optimizer states (Adam: m, v): 2×40MB=80MB. Activations per mini-batch (assume batch=1, 1MB): 1MB. Total training memory: 40+40+80+1=161MB. Inference workload: assume 200MB for other apps + 100MB OS = 300MB. Total: 461MB out of 8GB. Fits easily. Mobile DRAM bandwidth ~100GB/s for LPDDR5 — gradient accumulation at 50 mini-batches adds 50×40MB=2GB writes but in background, acceptable.'
  common_mistake: |
    **The Pitfall:** Calculating only parameter memory.
    **The Rationale:** Candidates often forget to account for gradient and optimizer state memory during federated training.
    **The Consequence:** Significantly underestimating the true memory footprint of on-device training.
  napkin_math: |
    **Assumptions & Constraints:**
    - 10M parameter model.
    - FP32 required for gradient calculation and Adam optimizer states (m, v).
    - Accumulation over 50 mini-batches. Mobile DRAM bandwidth = 100 GB/s.

    **Calculations:**
    - Weights = 10M * 4 bytes = 40 MB.
    - Gradients = 10M * 4 bytes = 40 MB.
    - Adam Optimizer States = 2 * 40 MB = 80 MB.
    - Total Training State = 160 MB (≈2% of total 8GB RAM).
    - Gradient Accumulation Traffic = 50 batches * 40 MB = 2 GB. Time = 2 GB / 100 GB/s = 20 ms.

    **Conclusion & Interpretation:**
    - **Result: 160 MB footprint fits on-device (Memory-capacity-bound feasibility check)**. The 2 GB of memory traffic is negligible when run as a background task.
