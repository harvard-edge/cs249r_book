title: 'KV-Cache: Specification — KV Cache Budget for Multi-Turn Code Completion'
scenario: Specify the KV cache budget for a code completion assistant using a 3B LLM. Requirements include a 16K-token codebase context, real-time completion (< 1s to first token), and < 50ms per subsequent token.
question: How would you specify the KV cache budget, quantization, layout, and context management for this code completion assistant?
details:
  realistic_solution: 'To meet the <50ms TPOT SLA at 77 GB/s bandwidth, total memory reads must stay under about 3.85GB per generated token. With 1.5GB INT4 weights, the KV read budget is about 2.35GB. A standard FP16 MHA cache for a 16K context is about 8.6GB, so it fails bandwidth even before runtime overhead. Specify GQA with 8 KV heads and INT8 KV storage: the 16K KV cache is about 1.07GB, making the bandwidth lower bound roughly 33ms/token before compute and scheduling overhead. For the <1s TTFT SLA, require persistent prompt caching or background prefill for the codebase; a 16K full prefill is too large to guarantee interactively from a TOPS-only estimate.'
  common_mistake: |
    **The Pitfall:** Focusing only on total memory capacity and ignoring bandwidth limits.
    **The Rationale:** Engineers assume that if a KV cache fits in RAM, it will perform well.
    **The Consequence:** Reading a massive FP16 KV cache for every generated token severely violates the decode latency SLA due to memory bandwidth bottlenecks.
  napkin_math: |
    **Assumptions & Constraints:**
    - Decode SLA limit: 50ms. Bandwidth: 77 GB/s.
    - INT4 3B model weights: 1.5 GB.
    - Representative transformer shape: 32 layers, 32 MHA KV heads or 8 GQA KV heads, head_dim 128.

    **Calculations:**
    - Read budget per token: 50ms * 77 GB/s = 3.85 GB.
    - Max KV allowed: 3.85 GB - 1.5 GB = 2.35 GB.
    - FP16 MHA KV bytes per token = 32 * 2 * 32 * 128 * 2 bytes = 524,288 bytes.
    - FP16 MHA KV (16K tokens): 16,384 * 524,288 bytes = 8.00 GiB = 8.59 GB.
    - MHA bandwidth lower bound = (1.5 GB weights + 8.59 GB KV) / 77 GB/s = 131ms/token (Fails).
    - INT8 GQA KV bytes per token = 32 * 2 * 8 * 128 * 1 byte = 65,536 bytes.
    - INT8 GQA KV (16K tokens): 16,384 * 65,536 bytes = 1.00 GiB = 1.07 GB.
    - GQA bandwidth lower bound = (1.5 GB weights + 1.07 GB KV) / 77 GB/s = 33.4ms/token before compute/runtime overhead (Passes bandwidth budget).
    - Prefill: a 16K prompt requires a full transformer prefill with attention and memory traffic across all layers; do not claim a precise TTFT from TOPS alone. Treat persistent prompt caching as required to reliably meet <1s TTFT.

    **Conclusion & Interpretation:**
    - **Result: INT8 GQA meets the bandwidth side of the 50ms TPOT SLA; persistent prompt caching is required for the 16K TTFT SLA.**
