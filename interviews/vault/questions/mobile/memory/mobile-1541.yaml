title: 'KV-Cache Memory Optimization on Snapdragon 8 Gen 3 for Long Contexts'
scenario: 'You are deploying a large language model with an 8k token context window on a device powered by the Snapdragon 8 Gen 3 Hexagon NPU, which features 45 TOPS INT8 compute and 12-16 GB LPDDR5X memory. During continuous inference, you observe intermittent latency spikes and OOM errors. Investigation reveals that the KV-cache is consuming an unexpectedly large portion of memory.'
question: 'How would you analyze the memory pressure causes and propose strategies to optimize KV-cache management for the Hexagon NPU?'
details:
  realistic_solution: 'Implement a paged attention mechanism to decouple logical token positions from physical memory addresses, allowing for non-contiguous KV-cache storage and reducing fragmentation. Introduce a dynamic cache eviction policy, such as a Least Recently Used (LRU) variant or a token-level eviction strategy, to proactively free up memory for less critical or older context segments when memory pressure builds. Explore KV-cache quantization techniques (e.g., INT8 for K/V) if the Hexagon NPU''s architecture supports efficient computation with such formats. Additionally, consider grouped-query attention (GQA) or multi-query attention (MQA) during model architecture selection or adaptation, as these can significantly reduce the KV-cache size by sharing K/V projections across multiple attention heads.'
  common_mistake: |
    **The Pitfall:** Relying solely on Post-Training Quantization (PTQ) of the model weights.
    **The Rationale:** Candidates focus on shrinking the static model footprint, ignoring the dynamic, unbounded growth of the KV-cache during long contexts.
    **The Consequence:** OOM errors persist because the KV-cache still consumes the available memory buffer, even with smaller weights.
  napkin_math: |
    **Assumptions & Constraints:**
    - KV per Layer: 128 heads * 128 dim * 2 bytes (FP16) * 2 (K+V) = 65,536 bytes = 64 KB.

    **Calculations:**
    - KV per Token: 32 layers * 64 KB = 2 MB per token.
    - Total KV Cache Size: 8000 tokens * 2 MB/token = 16 GB.

    **Conclusion & Interpretation:**
    - **Result: 16 GB (Memory-Bound)**. The KV-cache alone completely saturates the 12-16 GB LPDDR5X memory, guaranteeing OOM errors without techniques like GQA.
