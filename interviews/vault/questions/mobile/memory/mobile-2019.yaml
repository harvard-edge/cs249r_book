title: SRAM Tiling for 4K Video Upscaling
scenario: You are designing a custom video upscaler on an Apple A17 Pro (35 TOPS, ~50 GB/s bandwidth). We want to tile 4K frames (3840x2160 RGB) through the Neural Engine's SRAM to avoid writing intermediate activations to main memory.
question: Formulate the caching strategy and calculate the minimum SRAM required to hold one horizontal tile strip allowing for a 3x3 receptive field overlap.
details:
  realistic_solution: A full row of 4K RGB requires 3840 x 3 bytes = 11.52 KB. A 3x3 convolution requires buffering 3 continuous rows simultaneously. The minimum SRAM for the input buffer is 11.52 KB x 3 = 34.56 KB.
  common_mistake: |
    **The Pitfall:** Calculating the size of an entire frame rather than caching minimal line buffers.
    **The Rationale:** Candidates forget that convolutions only require a small local neighborhood (the receptive field) to operate, not the entire image at once.
    **The Consequence:** They falsely conclude that the SRAM is too small to handle 4K video, leading them to route data through the slow, power-hungry main DRAM.
  napkin_math: |
    1. **Row Size:** A full row of 4K RGB requires 3840 pixels × 3 channels (bytes) = 11,520 bytes = 11.52 KB.
    2. **Receptive Field:** A 3x3 convolution requires buffering 3 continuous rows simultaneously to compute the sliding window.
    3. **SRAM Required:** 3 rows × 11.52 KB/row = 34.56 KB.
    **Result:** A minimum of **~34.5 KB** of SRAM is required to hold the three line buffers necessary for a 3x3 convolution pass.
