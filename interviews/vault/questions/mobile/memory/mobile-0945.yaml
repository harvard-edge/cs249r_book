title: 'KV-Cache: Diagnose Attention Head Selection Causing Memory Inefficiency'
scenario: Your 1B LLM on a mobile NPU uses Multi-Head Attention (MHA) with 16 heads, head_dim=64. A colleague suggests switching to GQA with 4 KV heads.
question: 'How would you diagnose the current memory inefficiency and quantify the GQA improvement?'
details:
  realistic_solution: 'MHA has 16 Q heads and 16 KV heads. GQA-4 has 16 Q heads, 4 KV heads. The KV cache size is proportional to num_KV_heads, so GQA reduces KV cache memory consumption and bandwidth requirements by 4x with minimal quality loss.'
  common_mistake: |
    **The Pitfall:** Assuming GQA primarily optimizes compute (TOPS).
    **The Rationale:** Candidates fail to connect the number of KV heads to the physical size of the KV cache, misunderstanding that decode is memory-bound.
    **The Consequence:** They miss the core mechanism of the speedup, which is halving the data streamed from LPDDR5 during generation.
  napkin_math: |
    **Assumptions & Constraints:**
    - MHA KV cache (16 heads), GQA-4 KV cache (4 heads).
    - LPDDR5 bandwidth is 68 GB/s. Context is 2048.

    **Calculations:**
    - MHA Cache: 24 layers * 2 * 16 heads * 64 dim * 2B * 2048 = 201MB.
    - GQA-4 Cache: 24 * 2 * 4 * 64 * 2B * 2048 = 50.3MB.
    - MHA Read = 201MB / 68 GB/s = 2.96ms.
    - GQA Read = 50.3MB / 68 GB/s = 0.74ms.

    **Conclusion & Interpretation:**
    - **Result: ~27% throughput improvement (Memory-Bandwidth-Bound)**. Total decode time drops by 2.22ms per token.
