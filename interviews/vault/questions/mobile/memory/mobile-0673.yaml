title: The Silent Eviction
scenario: Your iOS app loads a 400 MB CoreML model into memory. Users report that switching to another app and back causes a 3-second freeze. Instruments shows no crash.
question: Why does returning to an iOS app with a 400 MB mmap CoreML model cause a 3-second freeze?
details:
  realistic_solution: |
    iOS memory pressure eviction. iPhones have no swap space. When the user switches to a memory-hungry app (a game, Safari with many tabs), the OS reclaims memory from backgrounded apps by evicting their mapped pages. Your 400 MB model was memory-mapped (`mmap`) — the pages were clean, so iOS silently discards them without killing the process. When the user returns, every model page triggers a page fault and must be re-read from flash storage (NVMe). 400 MB at ~1.5 GB/s sequential flash read ≈ 270ms, but random page faults are far slower — you see 2–3 seconds of stalls as the working set faults back in during the first inference.
  common_mistake: |
    **The Pitfall:** Concluding simply that "the model file is being re-read from disk every time."
    **The Rationale:** Developers often miss the nuanced mechanics of iOS memory pressure, mmap, and silent clean-page eviction.
    **The Consequence:** Misdiagnosing the problem and attempting incorrect fixes instead of addressing the fundamental memory pressure and working set size.
  napkin_math: |
    **Assumptions & Constraints:**
    - Total RAM: iPhone 15 Pro has 8 GB total.
    - App Budget: Your app gets ~2–3 GB.
    - Model Size: A 400 MB model is 15–20% of your app's budget.
    - Page Fault Cost: Flash random read (4K pages) is ~50 µs/page.

    **Calculations:**
    - Total Pages: 400 MB / 4 KB = 100,000 pages.
    - Theoretical max stall: 100,000 pages × 50 µs = 5 seconds worst case.

    **Conclusion & Interpretation:**
    - **Result: 5 seconds (I/O-Bound)**. First inference stalls for 2-3 seconds as the evicted working set heavily page faults back into memory.
