title: 'VRAM Budgeting for 7B LLM Inference on Apple A17 Pro'
scenario: 'You are tasked with deploying a 7 billion parameter (7B) Large Language Model (LLM) for on-device inference on the Apple A17 Pro chip. The A17 Pro features a 35 TOPS Neural Engine and 8 GB of unified memory. Your goal is to achieve real-time performance.'
question: 'How would you budget a 7B LLM for Apple A17 Pro unified memory and explicitly account for KV-cache growth?'
details:
  realistic_solution: 'For a 7B LLM on 8 GB unified memory, aggressive quantization (e.g., 4-bit) for weights is essential, reducing the model footprint to ~3.5 GB. The KV-cache should also be quantized (e.g., 8-bit) and its size carefully managed based on sequence length and batch size. Techniques like FlashAttention or similar attention mechanisms can reduce activation memory. Dynamic memory management, stream processing, or even offloading less frequently used layers to CPU memory (if performance critical) might be considered, though less ideal for real-time mobile inference.'
  common_mistake: |
    **The Pitfall:** Overlooking the memory footprint of the KV-cache and activation tensors.
    **The Rationale:** Candidates focus solely on parameter count and weight quantization, ignoring the quadratic memory growth of attention mechanisms.
    **The Consequence:** The LLM works for two prompts and then instantly crashes iOS due to Jetsam limits.
  napkin_math: |
    **Assumptions & Constraints:**
    - Unified Memory: 8 GB.
    - Model: 7B parameters.
    - Quantization: INT4 weights, INT8 KV-Cache.

    **Calculations:**
    - INT4 Weights (7B parameters): ~3.5 GB.
    - KV-Cache (INT8): ~512 MB.
    - Activations: ~500 MB.
    - Total Memory: 3.5 + 0.5 + 0.5 = 4.5 GB.

    **Conclusion & Interpretation:**
    - **Result: 4.5 GB (Memory-Bound)**. Total is 4.5 GB, leaving just enough room for the OS on an 8 GB device.
