title: 'KV-Cache: Design KV Cache Management for On-Device LLM Chat App'
scenario: A chat application uses a 1B LLM on Snapdragon 8 Gen 3 (45 TOPS INT8, 16GB). Users expect multi-turn conversations of 10-20 turns (500-2000 tokens total).
question: How would you design the KV cache management system for this application?
details:
  realistic_solution: 'Sliding window KV cache with importance-based retention: keep first N tokens (system prompt + first user turn) + last M tokens (recent context). Compress middle with summarization.'
  common_mistake: |
    **The Pitfall:** Truncating context by discarding old tokens without compression.
    **The Rationale:** Candidates apply simple FIFO truncation to manage memory limits, losing crucial early conversation context.
    **The Consequence:** The chat assistant forgets the user's initial instructions, breaking conversation coherence.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: 1B params, INT8 KV Cache
    - Architecture: 24 layers, 8 heads, 128 dim
    - Device RAM: 16GB (13.5GB available for KV)

    **Calculations:**
    - KV size per token = 24 (layers) * 2 (K,V) * 8 (heads) * 128 (dim) * 1 byte = 49,152 bytes = 49.15 KB
    - Context limit (4096 tokens) = 4096 * 49.15 KB = 201.3 MB
    - Max theoretical tokens = 13.5 GB / 49.15 KB = ~274,000 tokens

    **Conclusion & Interpretation:**
    - **Result: 201.3 MB (Positional/Algorithmic Constraint)**. A 4096-token KV cache uses only ~201 MB (trivial on a 16GB device). Memory capacity is not the bottleneck; management must focus on summarization to stay within the model's 4096 positional limit.
