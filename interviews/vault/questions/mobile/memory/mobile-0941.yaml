title: 'KV-Cache: Design KV Cache Management for On-Device LLM Chat App'
scenario: A chat application uses a 1B LLM with a 4096-token context window on Snapdragon 8 Gen 3 (45 TOPS INT8, 16GB). Users expect multi-turn conversations of 10-20 turns (500-2000 tokens total).
question: How would you design the KV cache management system for this application?
details:
  realistic_solution: 'Sliding window KV cache with importance-based retention: keep first N tokens (system prompt + first user turn) + last M tokens (recent context). Compress middle with summarization.'
  common_mistake: |
    **The Pitfall:** Truncating context by discarding old tokens without compression.
    **The Rationale:** Candidates apply simple FIFO truncation to manage memory limits, losing crucial early conversation context.
    **The Consequence:** The chat assistant forgets the user's initial instructions, breaking conversation coherence.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: 1B params, INT8 KV Cache
    - Architecture: 24 layers, 8 KV heads, 128 dim
    - Model context window: 4096 tokens
    - Device RAM: 16GB (13.5GB available for KV)

    **Calculations:**
    - KV size per token = 24 (layers) * 2 (K,V) * 8 (heads) * 128 (dim) * 1 byte = 49,152 bytes = 48 KiB = 49.15 KB decimal.
    - Model context limit (4096 tokens) = 4096 * 49,152 bytes = 201,326,592 bytes = 192 MiB = 201.3 MB decimal.
    - Max theoretical tokens from a 13.5 GB decimal memory budget = 13.5e9 bytes / 49,152 bytes per token = ~274,700 tokens.

    **Conclusion & Interpretation:**
    - **Result: 192 MiB / 201.3 MB for the full model window.** The governing constraint is the model's 4096-token positional window, not the 16GB RAM budget. KV management should preserve useful conversation state through windowing and summarization rather than implying the device can extend this model past its trained context limit.
