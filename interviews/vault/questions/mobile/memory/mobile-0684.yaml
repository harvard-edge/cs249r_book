title: The Mobile Memory Controller Puzzle
scenario: You're optimizing an on-device LLM on an SoC with LPDDR5X (68.3 GB/s theoretical peak bandwidth). Your 4-bit quantized 7B model is 3.5 GB, and profiling shows each generated token streams roughly one full model pass from DRAM, so a perfect memory-bandwidth-bound implementation would generate about 19.5 tokens/sec. You measure 11 tokens/sec.
question: Where is the missing 44% of theoretical LPDDR5X memory bandwidth during generation?
details:
  realistic_solution: |
    The 19.5 tok/s estimate is a roofline-style upper bound: it assumes each generated token streams roughly one full 3.5 GB model pass from DRAM and perfectly uses the 68.3 GB/s LPDDR5X peak. In a real edge system, effective bandwidth is reduced by several overlapping factors:
    1. Constant DRAM hardware refresh cycles steal ~7% of up-time.
    2. Competing traffic from asynchronous ISP, Display, and CPU components claims another ~14%.
    3. The LLM's non-sequential weight access across different layers heavily fragments access, causing LPDDR row-buffer misses. Opening and closing memory pages can strip away a large additional share of efficiency.
    Optimizations must focus on contiguous weight layouts (e.g., interleaving weights to match the NPU access pattern) and blocking background hardware traffic (like camera streams) during generation.
  common_mistake: |
    **The Pitfall:** Directly dividing the theoretical LPDDR5X bandwidth spec by the model size to calculate generation tokens per second.
    **The Rationale:** Candidates fail to account for row-buffer page open/close latency penalties and OS-level traffic contention on unified memory buses.
    **The Consequence:** Over-promising product KPIs to leadership and ignoring critical software-level memory layout optimizations.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Peak Hardware Bandwidth: 68.3 GB/s.
       - Model Size: 3.5 GB (4-bit quantized 7B model).
       - Memory traffic per generated token: about one full 3.5 GB weight stream.
       - Expected generation: 19.5 tok/s. Actual: 11 tok/s.
    2. **Calculations:**
       - Ideal token rate = 68.3 GB/s / 3.5 GB/token = 19.5 tok/s.
       - Illustrative effective-bandwidth model, treating overlapping losses as a rough attribution rather than independent physical constants:
       - Hardware refresh penalty: about 7% of peak, or ~4.8 GB/s.
       - System contention from display/CPU traffic: about 14% of peak, or ~9 GB/s.
       - Row-buffer/page overhead from fragmented access: about 30% of peak, or ~16.3 GB/s.
       - Approximate realized bandwidth: 68.3 - 4.8 - 9 - 16.3 = 38.2 GB/s.
       - Measured Token Rate: 38.2 GB/s / 3.5 GB/token = 10.91 tokens/sec.
    3. **Conclusion & Interpretation:**
       **Result: about 38.2 GB/s effective bandwidth (Memory-Bandwidth-Bound).** The 10.9 tok/s estimate matches the measured 11 tok/s, but the percentages are heuristic attribution for an effective-bandwidth model, not a precise proof that the losses add independently.
