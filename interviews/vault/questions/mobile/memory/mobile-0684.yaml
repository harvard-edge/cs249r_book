title: The Mobile Memory Controller Puzzle
scenario: You're optimizing an on-device LLM on an SoC with LPDDR5X (68.3 GB/s theoretical peak bandwidth). Your 4-bit quantized 7B model (3.5 GB) should generate tokens at 19.5 tokens/sec if fully memory-bandwidth-bound. You measure 11 tokens/sec.
question: Where is the missing 44% of theoretical LPDDR5X memory bandwidth during generation?
details:
  realistic_solution: |
    Theoretical peak bandwidth relies on perfect, sequential burst reads. In a real edge system, effective bandwidth is severely cannibalized by four factors:
    1. Constant DRAM hardware refresh cycles steal ~7% of up-time.
    2. Competing traffic from asynchronous ISP, Display, and CPU components claims another ~14%.
    3. The LLM's non-sequential weight access across different layers heavily fragments access, causing LPDDR row-buffer misses. Opening and closing memory pages strips away an additional ~30% of efficiency.
    Optimizations must focus on contiguous weight layouts (e.g., interleaving weights to match the NPU access pattern) and blocking background hardware traffic (like camera streams) during generation.
  common_mistake: |
    **The Pitfall:** Directly dividing the theoretical LPDDR5X bandwidth spec by the model size to calculate generation tokens per second.
    **The Rationale:** Candidates fail to account for row-buffer page open/close latency penalties and OS-level traffic contention on unified memory buses.
    **The Consequence:** Over-promising product KPIs to leadership and ignoring critical software-level memory layout optimizations.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Peak Hardware Bandwidth: 68.3 GB/s.
       - Model Size: 3.5 GB (4-bit quantized 7B model).
       - Expected generation: 19.5 tok/s. Actual: 11 tok/s.
    2. **Calculations:**
       - Hardware Refresh Penalty: -7% (loss of ~4.8 GB/s).
       - System Contention (Display/CPU): -14% (loss of ~9 GB/s).
       - Random Access / Page Overhead: -30% (loss of ~16.3 GB/s).
       - Effective Realized Bandwidth: 68.3 - 4.8 - 9 - 16.3 = 38.2 GB/s.
       - Measured Token Rate: 38.2 GB/s / 3.5 GB/token = 10.91 tokens/sec.
    3. **Conclusion & Interpretation:**
       **Result: 38.2 GB/s effective bandwidth (Memory-Bandwidth-Bound).** System overhead and unoptimized memory access patterns consistently bleed away nearly half of edge bandwidth.
