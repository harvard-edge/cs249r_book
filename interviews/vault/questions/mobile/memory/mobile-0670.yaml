title: 'The Quantization Bandwidth Boon'
scenario: You quantize a large image segmentation model from FP32 to INT8, reducing its size from 200MB to 50MB. While the model load time improved, the inference latency only decreased by 15%, not the 4x you expected from the size reduction.
question: What is a primary reason for this limited latency improvement on a memory-bound mobile NPU?
details:
  realistic_solution: 'The primary reason is that memory bandwidth often becomes the bottleneck before computation throughput is fully utilized. While the model weights are compressed, the intermediate activations still need to be aggressively moved between caches and DRAM. If the model is already memory-bound, reducing weight size alone yields diminishing returns if the activation memory footprint remains the dominant factor in bus traffic.'
  common_mistake: |
    **The Pitfall:** Assuming that reducing weight size by 4x automatically reduces inference latency by 4x.
    **The Rationale:** Engineers focus purely on theoretical INT8 compute throughput, ignoring that memory bandwidth limits the movement of both weights and activations.
    **The Consequence:** They are surprised when quantization yields minimal returns, failing to optimize the activation footprint.
  napkin_math: |
    **Assumptions & Constraints:**
    - Weights (W): 200 MB FP32 -> 50 MB INT8.
    - Activations (A): 300 MB (unchanged by weight quantization).

    **Calculations:**
    - FP32 Total Data = W (200) + A (300) = 500 MB.
    - INT8 Total Data = W (50) + A (300) = 350 MB.
    - Speedup = 500 MB / 350 MB = 1.42x (~30% reduction in traffic).

    **Conclusion & Interpretation:**
    - **Result: 1.42x speedup (Memory-Bound)**. The observed minimal improvement implies intermediate activations heavily dominate the total memory traffic.
