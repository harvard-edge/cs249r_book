title: 'Model Size Estimation: Realize Memory Layout Comparison Across 3 Mobile Platforms'
scenario: 'Compare the memory layout and TPOT for deploying a 1B INT4 LLM on three platforms: (A) A17 Pro (8GB, 68 GB/s NE bandwidth), (B) Snapdragon 8 Gen 3 (16GB, 77 GB/s), (C) Tensor G3 (12GB, ~50 GB/s estimated).'
question: "How do A17 Pro, Snapdragon 8 Gen 3, and Tensor G3 compare on memory budget, concurrent KV-cache users, and TPOT for a 1B INT4 LLM?"
details:
  realistic_solution: 'A (A17 Pro): OS 2.5GB. Model 0.5GB. KV (2048 ctx, 262KB/token): 537MB. Budget: 8-2.5-0.5-0.537=4.46GB residual. Max users: 4.46/0.537=8.3 → 8 concurrent users. TPOT: 0.5/68=7.4ms. B (Snapdragon): OS 3GB. KV: 537MB. Budget: 16-3-0.5-0.537=11.96GB. Users: 11.96/0.537=22. TPOT: 0.5/77=6.5ms. C (Tensor G3): OS 3.5GB. Budget: 12-3.5-0.5-0.537=7.46GB. Users: 13.9. TPOT: 0.5/50=10ms. Snapdragon wins on concurrency; A17 Pro wins on TPOT; Tensor G3 middle ground.'
  common_mistake: |
    **The Pitfall:** Using a static, identical OS memory overhead assumption for all three platforms.
    **The Rationale:** Candidates ignore the stark differences between iOS and Android memory management, and how specific OEM firmwares (like Pixel's Tensor features) eat into RAM.
    **The Consequence:** Wildly inaccurate concurrency estimations, overestimating Android capacity or underestimating iOS efficiency.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: 1B parameters INT4 = 0.5 GB.
    - KV Cache: 2048 tokens @ 262 KB/token = 537 MB (~0.537 GB).

    **Calculations:**
    - A17 Pro (8 GB): OS Overhead: 2.5 GB. Budget: 8 - 2.5 - 0.5 = 5.0 GB available. Users: 5.0 / 0.537 = 9 concurrent users. TPOT: 0.5 GB / 68 GB/s = 7.4 ms.
    - Snapdragon 8 Gen 3 (16 GB): OS Overhead: 3.0 GB. Budget: 16 - 3 - 0.5 = 12.5 GB available. Users: 12.5 / 0.537 = 23 concurrent users. TPOT: 0.5 GB / 77 GB/s = 6.5 ms.
    - Tensor G3 (12 GB): OS Overhead: 3.5 GB. Budget: 12 - 3.5 - 0.5 = 8.0 GB available. Users: 8.0 / 0.537 = 14 concurrent users. TPOT: 0.5 GB / 50 GB/s = 10.0 ms.

    **Conclusion & Interpretation:**
    - **Result: 16GB RAM wins (Memory-Bound)**. Snapdragon leads on capacity (16GB RAM wins); A17/Snapdragon tie on TPOT.
