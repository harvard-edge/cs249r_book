title: Architecting Memory-Mapped Inference for Gemini Nano on Tensor G3
scenario: You are tasked with deploying Gemini Nano on the Google Tensor G3. The model needs to be available instantly across multiple system applications without duplicating its memory footprint.
question: How would you design a memory-mapped weight loading strategy that minimizes cold-start delay for these apps while avoiding duplicate weight copies in the shared memory pool?
details:
  realistic_solution: The ideal design uses a privileged model service that maps immutable weight files with `mmap` and `MAP_SHARED`, so multiple client apps reference the same physical file-backed pages instead of loading private copies. A background service should prefetch and optionally lock the hot startup pages, such as tokenizer tables, metadata, and the earliest weight shards, while keeping the rest demand-paged under OS memory pressure. The accelerator runtime may still stage weights into driver-managed buffers or SRAM tiles, so this is a best-effort cold-start reduction strategy rather than a guarantee of zero delay. It reduces duplicate RSS across apps, but page faults, storage latency, and runtime initialization must still be budgeted.
  common_mistake: |
    **The Pitfall:** Loading the entire model into RAM separately for each application process via standard file I/O.
    **The Rationale:** Candidates often default to standard POSIX reads, ignoring the shared memory limits and the zero cold-start delay requirement for multi-tenant inference.
    **The Consequence:** The system experiences severe out-of-memory (OOM) errors, OS-level app kills, and unacceptable cold-start delays across applications.
  napkin_math: |
    **Assumptions & Constraints:**
       - Gemini Nano (3.2B parameters, INT4) = about 1.6 GB weight file before runtime overheads.
       - Shared LPDDR5X RAM = 12 GB total.
    **Calculations:**
       - Naive Loading: 3 apps loading separately consumes 4.8 GB (40% of the 12 GB RAM).
       - Shared mmap Strategy: using `mmap` with `MAP_SHARED`, the shared weight pages are resident once, about 1.6 GB before metadata, page-cache behavior, and accelerator/runtime buffers.
    **Conclusion & Interpretation:**
       - Mmapping prevents multi-tenant weight duplication, but total resident usage can exceed 1.6 GB because hot pages, private metadata, KV cache, and runtime buffers are not all shared.
       - **Result: Memory-Capacity Bound (Saves 3.2 GB RAM)**.
