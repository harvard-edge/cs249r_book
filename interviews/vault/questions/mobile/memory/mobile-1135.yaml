title: Architecting Memory-Mapped Inference for Gemini Nano on Tensor G3
scenario: You are tasked with deploying Gemini Nano on the Google Tensor G3. The model needs to be available instantly across multiple system applications without duplicating its memory footprint.
question: How would you design a memory-mapped weight loading strategy that guarantees zero cold-start delay for these apps while respecting the shared memory pool?
details:
  realistic_solution: The ideal design leverages `mmap` with `MAP_SHARED` to map the model weights directly from storage into virtual memory. The Tensor G3's TPU can then access these shared memory pages directly without intermediate copying. A background system service should pin the most critical initial layers in memory using `mlock` to ensure instant first-token generation, while the rest of the model is paged in on-demand, allowing multiple apps to share the exact same physical memory pages.
  common_mistake: |
    **The Pitfall:** Loading the entire model into RAM separately for each application process via standard file I/O.
    **The Rationale:** Candidates often default to standard POSIX reads, ignoring the shared memory limits and the zero cold-start delay requirement for multi-tenant inference.
    **The Consequence:** The system experiences severe out-of-memory (OOM) errors, OS-level app kills, and unacceptable cold-start delays across applications.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Gemini Nano (3.2B parameters, INT4) = 1.6 GB footprint.
       - Shared LPDDR5X RAM = 12 GB total.
    2. **Calculations:**
       - Naive Loading: 3 apps loading separately consumes 4.8 GB (40% of the 12 GB RAM).
       - Shared mmap Strategy: Using `mmap` with `MAP_SHARED`, the physical memory footprint remains strictly 1.6 GB (13.3% of RAM).
    3. **Conclusion & Interpretation:**
       - Mmapping prevents multi-tenant memory bloat and avoids duplicating weights.
       - **Result: Memory-Capacity Bound (Saves 3.2 GB RAM)**.
