title: OOM Diagnosis for LLM Context Extension on A17 Pro
scenario: 'An on-device LLM (Phi-2, 2.7B, INT4) on an iPhone 15 Pro crashes with OOM at 2048 token context. The app was tested at 512 tokens without issues.'
question: 'How would you diagnose the memory growth pattern and identify what causes the OOM at 2048 tokens?'
details:
  realistic_solution: 'Memory at 512 tokens: model 1.35GB + KV cache + activations fits in app limits. At 2048 tokens: Activations during prefill (full attention) skyrocket because the QK^T matrix scales quadratically. iOS app memory limit is ~2.5GB before jetsam kills the process. At 2048 token prefill, peak memory exceeds 2.5GB resulting in OOM. Fix: (1) Use FlashAttention to avoid materializing QK^T matrix. (2) Use chunked prefill: process 256 tokens at a time.'
  common_mistake: |
    **The Pitfall:** Attributing the OOM solely to the linear growth of the KV cache.
    **The Rationale:** Engineers forget that during the prefill phase, the unfused full attention matrix scales as O(N^2).
    **The Consequence:** Failing to implement FlashAttention or chunked prefill, resulting in prefill OOMs on mobile.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Phi-2 2.7B INT4 weights: 1.35 GB.
       - iOS jetsam memory limit: ~2.5 GB.
       - Context size: 2048 tokens, 32 heads, full attention.
    2. **Calculations:**
       - KV Cache at 2048 tokens: ~536 MB.
       - QK^T prefill attention matrix: 32 heads * 2048 * 2048 * 2B = 268 MB.
       - Total Memory: 1.35 GB + 0.536 GB + 0.268 GB + ~0.05 GB (activations) = ~2.20 GB (Hits iOS limit).
       - Chunked prefill (256 tokens): QK^T max = 32 * 256 * 2048 * 2B = ~33.5 MB.
    3. **Conclusion & Interpretation:**
       - **Result: O(N^2) attention matrix causes the OOM (Memory Spikes).**
