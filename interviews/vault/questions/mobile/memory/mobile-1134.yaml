title: Paged KV-Cache Architecture on A17 Pro
scenario: You are designing the KV-cache memory manager for a continuous on-device 7B parameter LLM assistant running on a mobile Neural Engine. The application must support multi-turn conversations scaling up to an 8K context window. Given a strict 5W power envelope and a shared 8 GB unified memory pool alongside the OS, GPU, and CPU, you must design a memory allocation and eviction architecture.
question: How should a mobile KV-cache manager support 8K contexts without triggering OOM or latency spikes?
details:
  realistic_solution: A robust L5 design utilizes a paged KV-cache strategy that requests memory in small, non-contiguous blocks on-demand within the shared memory space. This avoids fragmentation and massive upfront allocation. To prevent OOM crashes, the architecture must include a semantic eviction policy (like StreamingLLM or H2O) that discards low-attention tokens, hard-capping the resident cache around the memory actually available after weights, runtime buffers, and an OS/GPU reserve. The full 8K logical context can be supported only with paging and eviction; all 8K tokens should not be resident at once on this memory budget.
  common_mistake: |
    **The Pitfall:** Proposing to pre-allocate a contiguous memory block for the maximum context length.
    **The Rationale:** Engineers assume standard server-side KV-cache strategies apply directly to mobile without realizing the strict limitations of a unified memory system.
    **The Consequence:** The aggressive upfront allocation triggers immediate OS memory warnings or OOM crashes, and forces massive power spikes during memory defragmentation.
  napkin_math: |
    **Assumptions & Constraints:**
    - 8 GB total unified memory. Model weights (4-bit) = 3.5 GB.
    - Reserve for OS, GPU, app runtime, and allocator headroom: about 3.0 GB.
    - 7B model: 32 layers, 4096 hidden size. FP16 KV-cache.
    - Target: 8K context window.

    **Calculations:**
    - KV-cache size per token: 2 x 32 x 4096 x 2 bytes = 524,288 bytes = 512 KiB.
    - 8K context memory: 8192 x 512 KiB = 4 GiB.
    - Safe cache budget: 8 GB - 3.5 GB model - 3.0 GB reserve = about 1.5 GB.
    - Active resident token cap: 1.5 GiB / 512 KiB per token = 3072 tokens, or about 3K active tokens.

    **Conclusion & Interpretation:**
    - **Result: about a 1.5 GB resident cache cap (~3K active tokens).** An uncapped 8K resident cache plus weights leaves too little headroom for mobile OS/GPU/runtime activity and creates high OOM risk.
