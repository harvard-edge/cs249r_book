title: Random Read Memory Bottleneck
scenario: Apple A17 Pro reads 8-byte values randomly from a 1GB embedding table. L2 cache is 16MB. Hit rate is 10%. L2 bandwidth is 500GB/s, DRAM is 50GB/s.
question: What is the effective memory bandwidth given the cache miss penalty?
visual:
  kind: svg
  path: mobile-1961.svg
  alt: Bar chart showing L2 BW, DRAM BW, and the resulting Effective BW being near DRAM
  caption: Effective Bandwidth Degradation
details:
  realistic_solution: |
    Effective bandwidth = 1 / ( (hit_rate / L2_bw) + (miss_rate / DRAM_bw) ) = 1 / ( (0.1 / 500) + (0.9 / 50) ) = 1 / (0.0002 + 0.018) = 54.9 GB/s. Performance collapses to DRAM speeds.
  common_mistake: |
    **The Pitfall:** Simply averaging the bandwidths (e.g., 0.1*500 + 0.9*50 = 95 GB/s).
    **The Rationale:** Candidates intuitively apply a weighted average to throughput, which violates Amdahl's Law for latency.
    **The Consequence:** Massively overestimating the effective bandwidth, failing to realize that performance collapses almost entirely to DRAM speeds during random access.
  napkin_math: |
    **Assumptions & Constraints:**
    - L2 hit rate: 10% (0.1).
    - L2 bandwidth: 500 GB/s.
    - DRAM miss rate: 90% (0.9).
    - DRAM bandwidth: 50 GB/s.

    **Calculations:**
    - Effective bandwidth = 1 / ((0.1 / 500) + (0.9 / 50)).
    - 1 / (0.0002 + 0.018) = 1 / 0.0182.

    **Conclusion & Interpretation:**
    - **Result: 54.9 GB/s (Memory-Bandwidth-Bound)**. Performance collapses almost entirely to DRAM speeds during random access.
