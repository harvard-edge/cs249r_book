title: Calculate Maximum Context Length for a Mobile INT4 LLM
scenario: You are deploying a 1.8 billion parameter int4-quantized LLM on a flagship mobile SoC. The OS imposes a strict 2.0 GB memory limit on your background AI service to prevent OS-level eviction of other apps. The runtime and activation buffers consume a fixed 400 MB overhead. Assume the KV cache consumes 0.4 MB per token.
question: What maximum context window can a 1.8B INT4 mobile LLM service support under a 2.0 GB memory limit?
details:
  realistic_solution: |
    The 1.8B INT4 weights occupy 900 MB, and the runtime overhead adds 400 MB, leaving 700 MB of the 2.0 GB service limit for KV cache. At 0.4 MB per token, the maximum context window is 700 / 0.4 = 1,750 tokens. The service should cap context at or below 1,750 tokens before accounting for any extra safety margin.
  common_mistake: |
    **The Pitfall:** Miscalculating the memory footprint of INT4 weights or forgetting the static runtime overhead.
    **The Rationale:** Candidates often intuitively assume 1 byte per parameter (which is INT8) instead of the 0.5 bytes required for INT4, or they completely forget to subtract the massive fixed buffer overheads allocated by the NPU runtime.
    **The Consequence:** Grossly overestimating or underestimating the permissible context window, deploying a system that routinely triggers Out-Of-Memory (OOM) crashes in production.
  napkin_math: |
    **Assumptions & Constraints:**
    - Strict Application Budget: 2000 MB (2.0 GB).
    - Model Weights: 1.8 Billion parameters at INT4 precision (0.5 bytes/parameter).
    - Fixed Overhead: 400 MB (Runtime buffers and execution allocations).
    - KV Cache cost: 0.4 MB per generated token.

    **Calculations:**
    - Weight footprint: 1.8 Billion * 0.5 bytes = 900 MB.
    - Baseline Static footprint: 900 MB (weights) + 400 MB (overhead) = 1300 MB.
    - Available memory for KV Cache: 2000 MB - 1300 MB = 700 MB.
    - Maximum context window: 700 MB / 0.4 MB/token = 1750 tokens.

    **Conclusion & Interpretation:**
    - **Result: 1,750 tokens maximum context (Memory-Capacity-Bound).** Exceeding this boundary risks OS background eviction or an out-of-memory failure.
