title: 'Model Size Estimation: Specify Maximum On-Device LLM for Target Memory Constraint'
scenario: 'You are building an Android app on Snapdragon 8 Gen 3 (16GB). The app must coexist with the Android system (3GB), maintain an 8192-token context window, achieve TPOT < 50ms, and stay under 80% memory utilization for stability.'
question: 'How would you derive the maximum model family, precision, max parameter count, and expected accuracy to satisfy these constraints?'
details:
  realistic_solution: 'Memory constraint (80% of 16GB = 12.8GB): 12.8 - 3 (OS) = 9.8GB for ML. KV (8192 tokens, unknown model size): use 3B model estimates: 524KB/token * 8192 = 4.29GB. Model budget: 9.8-4.29=5.51GB. AWQ/GPTQ INT4: 5.51/0.5B per param = 11B params max. TPOT constraint: INT4 weight size = 11B * 0.5B = 5.5GB. 5.5GB/77GB/s = 71.4ms > 50ms target. Reduce to 7B INT4: 3.5GB. TPOT: 3.5/77=45.5ms. KV (7B model, 32 layers, 32 KV heads, 128 dim): 524KB * 8192 = 4.29GB. Total: 3+3.5+4.29=10.79GB < 12.8GB. Spec: 7B INT4, MMLU ~66%.'
  common_mistake: |
    **The Pitfall:** Not solving the constraint system simultaneously.
    **The Rationale:** Candidates set model size, then check TPOT, then check memory sequentially, missing that they are coupled through the choice of precision.
    **The Consequence:** They recommend a configuration that violates one or more of the strict system constraints.
  napkin_math: |
    **Assumptions & Constraints:**
    - Memory budget: 80% of 16GB = 12.8GB. Less OS (3GB) = 9.8GB.
    - TPOT < 50ms at 77GB/s bandwidth: max weight size = 50ms * 77GB/s = 3.85GB.

    **Calculations:**
    - Max INT4 parameters: 3.85GB / 0.5 bytes/param = 7.7B params. Choose 7B INT4 (3.5GB).
    - KV cache for 8192 tokens (7B model): ~4.29GB.
    - Total ML footprint: 3.5GB + 4.29GB = 7.79GB.
    - Total system memory: 3GB (OS) + 7.79GB (ML) + 1GB (App) = 11.79GB.

    **Conclusion & Interpretation:**
    - **Result: 73.7% utilization (Memory-Bound)**. 11.79GB / 16GB = 73.7% utilization (meets <80% constraint), with TPOT of 45.5ms.
