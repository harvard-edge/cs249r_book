title: 'The App Memory Budget: Memory Hierarchy Design'
scenario: You're an ML engineer scoping a new feature for a standard smartphone app. The target user device has 8 GB of RAM.
question: What maximum ML feature memory budget is reasonable on a smartphone with 8 GB of RAM?
details:
  realistic_solution: There is no universal smartphone rule that an app can safely use 25% of physical RAM. Mobile memory limits depend on OS policy, device class, app foreground/background state, current system pressure, and the rest of the app's footprint. For a standard foreground app on an 8 GB phone, a reasonable ML feature budget is usually well below total RAM, often in the few-hundred-MB range unless platform-specific testing and documented limits justify more. Among these choices, 0.5 GB is the most defensible planning budget.
  common_mistake: |
    **The Pitfall:** Assuming the vast majority of physical RAM is actually allocatable to a single user-space application.
    **The Rationale:** Engineers operating with workstation or cloud VM mental models assume the OS overhead is negligible relative to the total pool.
    **The Consequence:** Pushing massive models that immediately trigger severe memory warnings and subsequent process termination by the mobile operating system.
  napkin_math: |
    **Assumptions & Constraints:**
    - Total Device RAM: 8 GB.
    - No portable fixed percentage of total RAM is guaranteed to a mobile app.
    - Standard app must leave memory for the OS, UI framework, other app code/data, graphics buffers, and transient allocations.
    - Conservative planning budget for the ML feature: single-digit percentage of total RAM unless profiling proves more is safe.

    **Calculations:**
    - Candidate conservative ML feature budget: 8 GB * 0.06 = 0.48 GB ≈ 0.5 GB.
    - A 2 GB feature budget would consume 25% of device RAM before counting the rest of the app, which is not a generally safe cross-platform assumption.

    **Conclusion & Interpretation:**
    - **Result: Conservative Memory Budget.** Use about 0.5 GB as a planning answer here, then validate against platform-specific memory limits and real device pressure tests.
  options:
    - 8.0 GB (100% Allocation)
    - 4.0 GB (50% Allocation)
    - 2.0 GB (25% Allocation)
    - 0.5 GB (6% Allocation)
