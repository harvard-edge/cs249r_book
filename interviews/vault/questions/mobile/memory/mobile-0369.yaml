title: 'The App Memory Budget Rule'
scenario: 'You''re A/B testing a new on-device personalization model. The initial version causes the OS to terminate your app on low-end test devices. You need to set a strict performance budget for the next iteration to avoid being jettisoned.'
question: 'What is the generally accepted maximum percentage of a device''s total RAM that a single application should use to avoid OS termination?'
details:
  realistic_solution: 'The correct rule of thumb is approximately 25%. Mobile operating systems reserve significant amounts of RAM for themselves and other background processes. Exceeding this soft limit puts your application at a high risk of being terminated, which leads to a poor user experience and can negatively impact A/B test results by creating sample bias. For a device with 8 GB of RAM, this means your app''s total memory footprint should stay below a hard ceiling of 2 GB.'
  common_mistake: |
    **The Pitfall:** Underestimating how aggressively mobile operating systems manage memory.
    **The Rationale:** Engineers from cloud backgrounds assume they have access to nearly all physical RAM, neglecting OS reservations and background process needs.
    **The Consequence:** The model forces the app memory footprint too high, causing frequent terminations, poor UX, and biased A/B test results.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target Device: 8 GB total RAM.
    - OS Constraint: Safe budget for a single foreground app is ~25%.

    **Calculations:**
    - Maximum App Footprint: 8 GB × 0.25 = 2 GB.

    **Conclusion & Interpretation:**
    - **Result: 2 GB (Memory-Capacity-Bound)**. The app must stay below a 2 GB hard ceiling to avoid catastrophic OS eviction via LMKD.
  options:
  - '50%. 8 GB × 0.50 = 4 GB, assuming the foreground app can use half the memory.'
  - '75%. 8 GB × 0.75 = 6 GB, assuming priority gives it most of the RAM.'
  - '25%. 8 GB × 0.25 = 2 GB, leaving sufficient memory for the OS and background tasks.'
  - '10%. 8 GB × 0.10 = 800 MB, to be overly safe.'
  correct_index: 2
