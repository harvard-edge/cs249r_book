title: 'KV-Cache: Evaluate KV Cache Quantization Strategies on A17 Pro'
scenario: 'For a 1B LLM on A17 Pro, compare KV cache strategies: (A) FP16 KV, (B) INT8 KV with per-head quantization, (C) INT4 KV with per-head quantization. The model targets 2048-token conversations.'
question: How do FP16, INT8, and INT4 KV caches trade memory, bandwidth, quality, and complexity for a 1B LLM?
details:
  realistic_solution: |
    FP16 KV is the quality and implementation baseline: no quantization error and the simplest attention kernels, but the highest memory footprint and bandwidth per decoded token. INT8 per-head KV quantization stores scale/zero-point metadata for each layer, K/V tensor, and KV head, then dequantizes inside or immediately before the attention kernel. INT8 usually offers the balanced tradeoff: roughly half the FP16 KV memory and bandwidth with modest quality risk after calibration. INT4 roughly quarters the FP16 payload bytes, but has higher long-context quality and dequantization risk and should be gated by perplexity/task-quality tests. On A17 Pro this requires a backend path that can read quantized KV efficiently, such as a supported Core ML path or a custom Metal attention kernel.
  common_mistake: |
    **The Pitfall:** Overlooking quantization overhead and context error accumulation.
    **The Rationale:** Candidates blindly assume INT4 is twice as fast as INT8 without accounting for dequantization compute stalls or the massive quality degradation in long sequences.
    **The Consequence:** Recommending INT4 arbitrarily, which creates extreme hallucination and quality drops at the end of a 2048-token context window.
  napkin_math: |
    **Assumptions & Constraints:**
    - Baseline Constants: 1B model, 24 layers, 8 KV heads, dim 128.
    - Quantization Overhead: one FP16 scale and one FP16 zero-point per K/V tensor per KV head, counted as per-token read traffic in this conservative estimate: 2 (K,V) * 8 heads * 2 values * 2B = 64B/token/layer. If scales are cached per block/head, decode bandwidth overhead is lower.
    - Context Length: 2048 tokens.
    - Hardware Bandwidth: 68 GB/s.

    **Calculations:**
    - (A) FP16: 24 layers * 2 (K,V) * 8 KV heads * 128 dim * 2B = 98,304 bytes/token = 96 KiB/token. At 2048 context = 201,326,592 bytes = 192 MiB. Bandwidth time = 201,326,592 bytes / 68 GB/s = 2.96ms.
    - Quantization metadata across all layers under the conservative per-token-read assumption: 64B/layer * 24 = 1536 bytes/token = 1.5 KiB/token.
    - (B) INT8 payload: 24 * 2 * 8 * 128 * 1B = 49,152 bytes/token = 48 KiB/token. With metadata: 49.5 KiB/token. At 2048 context = 99 MiB. Bandwidth time = 103,809,024 bytes / 68 GB/s = 1.53ms.
    - (C) INT4 payload: 24 * 2 * 8 * 128 * 0.5B = 24,576 bytes/token = 24 KiB/token. With metadata: 25.5 KiB/token. At 2048 context = 51 MiB. Bandwidth time = 53,477,376 bytes / 68 GB/s = 0.79ms.

    **Conclusion & Interpretation:**
    - **Result: Bandwidth-Bound.** INT8 cuts the KV read from 192 MiB to 99 MiB at 2048 tokens, reducing the bandwidth component from ~2.96ms to ~1.53ms under the conservative metadata-read model. INT4 reduces it further to 51 MiB and ~0.79ms, but quality and dequantization overhead determine whether that extra saving is acceptable.
