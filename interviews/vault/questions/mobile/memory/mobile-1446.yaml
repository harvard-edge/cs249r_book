title: KV-Cache Sizing for On-Device LLMs
scenario: You are deploying a 1.8B parameter on-device LLM optimized for the Google Tensor G3 to support a background document summarization feature. The mobile OS enforces a strict 1.5 GB peak memory budget for background ML tasks.
question: How do you design a KV-cache strategy and calculate the maximum context length for a 1.8B LLM within a 1.5 GB background memory budget?
details:
  realistic_solution: The candidate should treat Tensor G3 as a mobile SoC with a strict background-process memory cap, not as a server accelerator. Quantize the 1.8B weights to INT4, reserve fixed workspace for activations and runtime buffers, and preallocate the remaining memory as a bounded KV cache. Use GQA to reduce KV heads, then manage the cache with a fixed-size ring buffer or sliding-window policy so background summarization cannot grow past the 1.5 GB limit. The computed context length is an approximate upper bound under the chosen overhead and architecture assumptions, not a guaranteed usable maximum. If a document exceeds the profiled token limit, chunk it or summarize hierarchically rather than allowing unbounded cache growth.
  common_mistake: |
    **The Pitfall:** Assuming the full 12 GB device RAM is available for model execution.
    **The Rationale:** Candidates design for raw hardware specs, ignoring the strict OS-level background app limits designed to preserve foreground UI fluidity.
    **The Consequence:** Building an implementation that gets instantly killed by the iOS/Android OOM killer during background summarization.
  napkin_math: |
    **Assumptions & Constraints:**
    - Background Budget: 1.5 GB.
    - Model: 1.8B params, INT4 (0.5 bytes/param) = 900 MB.
    - Reserved activations/runtime workspace: 250 MB.
    - KV Cache specs: FP16 (2 bytes), 32 layers, 4 KV heads (GQA), 128 head dim.

    **Calculations:**
    - Remaining Budget: 1.5 GB - 900 MB - 250 MB = 350 MB.
    - KV-Cache per Token: 2 (K+V) * 32 * 4 * 128 * 2 bytes = 65,536 bytes/token.
    - Max Context Upper Bound: 350 MB / 65,536 bytes/token = ~5,341 tokens.

    **Conclusion & Interpretation:**
    - **Result: ~5,300 tokens upper bound (Memory-Capacity Bound)**. After reserving runtime overhead, the usable context should be capped below this value and verified on device.
