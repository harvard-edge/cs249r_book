title: KV-Cache Sizing for On-Device LLMs
scenario: You are deploying a 1.8B parameter on-device LLM optimized for the Google Tensor G3 to support a background document summarization feature. The mobile OS enforces a strict 1.5 GB peak memory budget for background ML tasks.
question: How do you design a KV-cache strategy and calculate the maximum context length for a 1.8B LLM within a 1.5 GB background memory budget?
details:
  realistic_solution: 'The candidate should quantize the model weights to INT4 to fit the core model within the budget, reserving the remainder for activations and the KV-cache. They should recognize that server-side dynamic PagedAttention adds unnecessary overhead for deterministic edge TPUs, instead opting for a statically allocated ring buffer. By evaluating the use of GQA to reduce the number of KV heads, they can maximize the context window supported by the tight memory budget.'
  common_mistake: |
    **The Pitfall:** Assuming the full 12 GB device RAM is available for model execution.
    **The Rationale:** Candidates design for raw hardware specs, ignoring the strict OS-level background app limits designed to preserve foreground UI fluidity.
    **The Consequence:** Building an implementation that gets instantly killed by the iOS/Android OOM killer during background summarization.
  napkin_math: |
    **Assumptions & Constraints:**
    - Background Budget: 1.5 GB.
    - Model: 1.8B params, INT4 (0.5 bytes/param) = 900 MB. Workspace: 100 MB.
    - KV Cache specs: FP16 (2 bytes), 32 layers, 4 KV heads (GQA), 128 head dim.

    **Calculations:**
    - Remaining Budget: 1.5 GB - 900 MB - 100 MB = 500 MB.
    - KV-Cache per Token: 2 (K+V) * 32 * 4 * 128 * 2 bytes = 65,536 bytes/token.
    - Max Context: 500 MB / 65,536 bytes/token = ~7,629 tokens.

    **Conclusion & Interpretation:**
    - **Result: ~7,629 tokens (Memory-Capacity Bound)**. The maximum context length is ~7,629 tokens, constrained tightly by the OS limit.
