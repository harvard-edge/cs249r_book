title: 'The App Memory Budget'
scenario: 'You''re building a new ''AI stylist'' feature for a fashion app. It uses a generative model to let users ''try on'' clothes. Your target device is a high-end smartphone with 8 GB of RAM. As a systems engineer, you need to give the team a safe memory budget for the entire application to avoid being terminated by the operating system.'
question: 'What app memory budget is safe for an AI stylist feature on an 8 GB smartphone?'
details:
  realistic_solution: 'A standard rule of thumb for mobile development is that a single application should not exceed about 25% of the total device RAM. This provides a safe margin, accounting for the OS''s own needs and ensuring a stable user experience. For a device with 8 GB of RAM, the safe memory budget for your entire application is approximately 2 GB.'
  common_mistake: |
    **The Pitfall:** Assuming the application can use the majority of the advertised device RAM (e.g., 6 GB out of 8 GB).
    **The Rationale:** Engineers forget that the OS, critical background services, and other apps all consume a protected share of memory.
    **The Consequence:** Exceeding the implicit budget leads to 'Jetsam' or 'LMK' events, forcefully terminating the app.
  napkin_math: |
    **Assumptions & Constraints:**
    - Total Device RAM = 8 GB.
    - Safe Rule of Thumb for App Budget = 25%.

    **Calculations:**
    - 8 GB * 0.25 = 2 GB safe memory budget.

    **Conclusion & Interpretation:**
    - **Result: 2 GB (Memory-Bound)**. 8 GB * 0.25 = 2 GB safe memory budget.
  options:
  - '6 GB. The OS only needs about 2 GB.'
  - '8 GB. The app can use all available memory.'
  - '2 GB. The app gets about a quarter of the total RAM.'
  - '4 GB. The app can safely use half of the device''s RAM.'
