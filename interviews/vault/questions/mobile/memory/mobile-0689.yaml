title: The On-Device Fine-Tuning Corruption
scenario: Your app performs on-device fine-tuning of a 100M parameter image classifier to personalize for the user's specific objects. After 50 fine-tuning steps, the model's accuracy on the user's objects improves from 60% to 92%. But the model's accuracy on the original 1000 ImageNet classes drops from 85% to 12%.
question: How can you personalize a 100M image classifier without dropping original accuracy from 85% to 12%?
details:
  realistic_solution: Full fine-tuning updates all 100M parameters, leading to catastrophic forgetting that overwrites pre-trained features. Low-Rank Adaptation (LoRA) freezes the base model and trains only a tiny adapter (e.g., rank 4, ~400K parameters). LoRA can achieve high accuracy on user objects while largely preserving base accuracy because the backbone remains unchanged and only the adapter is selected or merged for personalization. The base model remains immutable on flash memory; only the tiny adapter and its optimizer state are modified, making this a strong approach for memory-constrained on-device fine-tuning.
  common_mistake: |
    **The Pitfall:** Proposing to use a lower learning rate or heavier regularization to prevent catastrophic forgetting during full fine-tuning.
    **The Rationale:** A lower learning rate slows forgetting but does not prevent it, and mobile optimization requires fast adaptation.
    **The Consequence:** The model still drifts and loses its base accuracy over time, rendering it useless for original tasks while thrashing device memory.
  napkin_math: |
    **Assumptions & Constraints:**
    - Base model: 100M parameters, FP32.
    - Optimizer: Adam with two FP32 moment tensors.
    - Training stores FP32 gradients for trainable parameters.
    - LoRA adapter (rank 4): 400K trainable parameters, FP32.

    **Calculations:**
    - Full fine-tuning trainable state = 400 MB weights + 400 MB gradients + 800 MB Adam moments = 1.6 GB, before activations.
    - LoRA trainable state = 1.6 MB adapter weights + 1.6 MB gradients + 3.2 MB Adam moments = 6.4 MB, before activations.
    - Trainable-state reduction = 1.6 GB / 6.4 MB = 250x.
    - The frozen 400 MB backbone still exists for inference, but it does not need gradients or Adam state.

    **Conclusion & Interpretation:**
    - **Result: 250x trainable-state reduction (Memory-Bound)**. LoRA freezes the backbone, dramatically reducing training memory and mitigating catastrophic forgetting, though adapter quality and routing still need validation.
