title: 'KV-Cache Layout for NPU Acceleration'
scenario: The Apple Neural Engine (ANE) requires specific 4D tensor dimension alignments for optimal performance. The default KV-cache is stored as [layers, 2, kv_heads, seq_len, head_dim].
question: What is the optimal memory layout for the ANE, and why does innermost dimension alignment matter?
details:
  realistic_solution: 'NPU layout considerations: The ANE processes data in fixed 8KB tiles, with the innermost dimension mapped to the vector processing unit (16-wide for FP16). Optimal layout: [batch, seq_len, kv_heads, head_dim] — ''interleaved'' format. Why: (1) During attention, for each query position, the NPU loads K values across all sequence positions for a given head. If seq_len is an outer dimension, loading K[head_h, :, :] requires strided access across the seq_len dimension — poor locality. (2) With [batch, seq_len, kv_heads, head_dim], all heads for a given sequence position are contiguous. The NPU can load a tile of [seq_chunk, kv_heads × head_dim] contiguously. (3) Head_dim=64 with FP16 = 128 bytes, which is 16 × 8B — aligns with ANE''s 128-byte cache line. (4) Padding: if kv_heads × head_dim does not align to 128 bytes, pad to the next multiple. With 4 × 64 × 2B = 512 bytes (already aligned). Spec: use [batch, seq_len, kv_heads, head_dim] with head_dim padded to 64 (already satisfied). Convert from GPU format during model export to CoreML.'
  common_mistake: |
    **The Pitfall:** Using the standard GPU `[B, H, S, D]` layout on an NPU.
    **The Rationale:** Assuming memory access patterns that are optimal for parallel GPU threads map efficiently to NPU vector processing units.
    **The Consequence:** Severe memory bandwidth bottlenecks due to strided, non-contiguous cache line fetches.
  napkin_math: |
    **Assumptions & Constraints:**
    - ANE cache line: 128 bytes.
    - GPU layout: `[B, H, S, D]` (strided access).
    - NPU layout: `[B, S, H, D]` (interleaved heads).

    **Calculations:**
    - Interleaved size: 4 heads * 64 dim * 2 bytes = 512 bytes per position.
    - Alignment: 512 bytes is exactly 4 cache lines.

    **Conclusion & Interpretation:**
    - **Result: 100% cache utilization (Memory-Bandwidth Bound)**. 100% cache utilization compared to ~25% with the strided GPU layout.
