title: Android SoC NPU KV Cache Size Estimation
scenario: You are deploying a 4-bit quantized 7B LLM on an Android SoC NPU with a 12 GB shared memory
  pool. The Android OS requires 5.5 GB of RAM to prevent the Low Memory Killer from terminating background
  apps, and the 4-bit model weights consume 3.5 GB. The model uses an FP16 KV cache with 32 layers and
  a 4096 hidden dimension.
question: How do you calculate the maximum number of tokens the KV cache can hold before exhausting the
  remaining shared memory?
details:
  realistic_solution: Subtract the OS and model weight memory from the total shared pool to determine
    the available KV cache capacity. Then, calculate the per-token KV footprint by multiplying 2 (for
    Key and Value) by the number of layers, hidden dimension, and FP16 byte size, and divide the available
    memory by this per-token size.
  common_mistake: '**The Pitfall:** Forgetting to account for the Android OS memory footprint, or calculating
    only the Key vector instead of both Key and Value.

    **The Rationale:** In unified memory architectures like mobile SoCs, the NPU and CPU share the same
    physical RAM pool. Failing to subtract the OS baseline means the calculation assumes a dedicated memory
    pool that doesn''t exist.

    **The Consequence:** The estimated KV cache size will far exceed physical limits, leading the Android
    Low Memory Killer Daemon (LMKD) to aggressively terminate the application during extended context
    generations.'
  napkin_math: '**Assumptions & Constraints:**

    - Total Memory = 12 GB; OS reserved = 5.5 GB; Model weights = 3.5 GB.

    - Remaining memory for KV cache = 12 - (5.5 + 3.5) = 3.0 GB (approx 3000 MB).

    - KV precision = FP16 (2 bytes); Architecture = 32 layers, 4096 hidden dimension.


    **Calculations:**

    - Memory per token = 2 (K & V) * 32 (layers) * 4096 (hidden dim) * 2 (bytes) = 524,288 bytes = 0.5
    MB.

    - Maximum tokens = 3000 MB / 0.5 MB/token = 6000 tokens.


    **Conclusion:**

    The available 3.0 GB of memory can support approximately 6,000 tokens in the KV cache before triggering
    shared memory exhaustion.'
