title: The Activation Memory Footprint
scenario: You are profiling a CNN on a mobile device. A specific intermediate layer produces a feature map with dimensions 64x64 and 128 channels.
question: Assuming the model processes one frame at a time (batch size 1) and uses half-precision floating point (FP16), what is the memory required to store this single activation map?
details:
  realistic_solution: The correct calculation multiplies the spatial dimensions, the channel depth, and the size of each element in bytes. For FP16, each element is 2 bytes.
  common_mistake: |
    **The Pitfall:** Forgetting a term in the memory calculation formula.
    **The Rationale:** Engineers often forget to multiply by the number of channels or the bytes-per-element (FP16 = 2 bytes).
    **The Consequence:** The activation memory footprint is underestimated by 1-2 orders of magnitude, causing unexpected OOM errors.
  napkin_math: |
    1. **Dimensions:** Batch Size (B) = 1, Height (H) = 64, Width (W) = 64, Channels (C) = 128.
    2. **Precision:** FP16 uses 2 bytes per element.
    3. **Calculation:** Memory = B * H * W * C * 2 bytes = 1 * 64 * 64 * 128 * 2 = 1,048,576 bytes.
    4. **Result:** Exactly **1 MB** of SRAM/DRAM.
  options:
  - ~8 KB
  - ~512 KB
  - ~1 MB
  - ~10 MB
  correct_index: 2
