title: Optimizing LLM Memory Footprint on Apple A17 Pro for On-Device Inference
scenario: You are tasked with deploying a large language model (LLM) for a new on-device AI feature on an iPhone powered by the Apple A17 Pro chip. This chip features a 35 TOPS Neural Engine, operates within a ~5W power envelope, and critically, shares 8 GB of unified memory with the CPU. The target LLM is a 7-billion parameter model.
question: How would you design a strategy to fit this model within the memory constraints while maximizing inference speed and minimizing power consumption?
details:
  realistic_solution: |
    Use an inference-specific deployment plan: quantize weights to INT4 or use a smaller distilled model, keep batch size at 1, limit context length, and manage the KV-cache with sliding windows, paging, compression, or eviction. INT8 weights alone leave almost no headroom once KV-cache, activations, Core ML/runtime buffers, and the OS share the same 8 GB pool, so the practical strategy is weight-only INT4 plus reduced context or a smaller model. Prefer kernels that stay on the Neural Engine and avoid CPU/GPU fallback because extra memory traffic raises power.
  common_mistake: |
    **The Pitfall:** Only accounting for model weights and neglecting KV-cache.
    **The Rationale:** Candidates focus entirely on static model size and treat unified memory like discrete GPU memory.
    **The Consequence:** The model frequently OOMs during inference as context grows, or causes severe system-wide memory pressure.
  napkin_math: |
    **Assumptions & Constraints:**
    - Unified memory budget: 8 GB.
    - Model: 7B parameters.
    - KV-cache dimensions: 32 layers, 32 heads, 128 dim, FP16 precision.
    - Context length: 2048 tokens.

    **Calculations:**
    - FP16 weights: 7B * 2 bytes = 14 GB.
    - INT8 weights: 7B * 1 byte = 7 GB.
    - INT4 weights: 7B * 0.5 byte = 3.5 GB.
    - KV-cache per token: 32 layers * 32 heads * 128 dim * 2 bytes * 2 (K/V) = 524,288 bytes = 512 KB.
    - KV-cache for 2048 tokens: 512 KB * 2048 = 1 GB.
    - INT8 + KV-cache alone: 7 GB + 1 GB = 8 GB before activations, runtime buffers, and OS headroom.
    - INT4 + KV-cache: 3.5 GB + 1 GB = 4.5 GB before overhead.

    **Conclusion & Interpretation:**
    - **Result: INT8 7B with a 2k-token KV-cache exceeds practical 8 GB headroom (Memory Capacity-Bound).** INT4 or a smaller/distilled model plus KV-cache reduction is required for a realistic on-device deployment.
