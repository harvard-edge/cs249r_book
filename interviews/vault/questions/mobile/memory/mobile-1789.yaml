title: On-Device KV Cache Memory Budget for LLM
scenario: A flagship smartphone runs an on-device LLM assistant (2B parameters, INT4) with 4096 context. The KV cache uses 28 layers, 16 KV heads, head_dim=256, and FP16 format. A user conversation reaches 3000 tokens.
question: What KV-cache memory does the 2B INT4 LLM use at 3000 tokens with 28 layers, 16 KV heads, and FP16 cache?
details:
  realistic_solution: 'KV cache at 3000 tokens: 2 (K+V) × 28 layers × 16 heads × 256 head_dim × 3000 tokens × 2B (FP16) = 2×28×16×256×3000×2 = 2×28×16×256×6000B = 2×28×24.6MB = 2×690MB = 1.38GB. Model weights: 2B INT4 = 1GB. Total: 2.38GB. System reserve: ~3GB (Android OS, camera, apps). Available for ML: 12-3 = 9GB. Current usage: 2.38GB — comfortable. At 4096 context (max): KV = 1.88GB. Total: 2.88GB — still fine. Risk: if running multiple on-device models simultaneously or with large batch.'
  common_mistake: |
    **The Pitfall:** Assuming the KV cache uses INT4 quantization just because the model weights do.
    **The Rationale:** Candidates confuse weight quantization with activation quantization, unaware that most on-device runtimes keep the KV cache in FP16 or INT8 to maintain generation quality.
    **The Consequence:** They drastically underestimate the memory footprint, missing potential Out-Of-Memory (OOM) risks during long conversations.
  napkin_math: |
    1. **Assumptions & Constraints:** 2B INT4 weights = 1 GB. KV cache uses 28 layers, 16 heads, 256 head_dim, FP16 (2 bytes). 3000 tokens. 9 GB available ML RAM.
    2. **Calculations:** KV per token = 2 (K+V) × 28 × 16 × 256 × 2 = 458,752 bytes (~448 KB). Total at 3000 tokens = 458,752 × 3000 = 1,376,256,000 bytes ≈ 1.38 GB. Total ML memory = 1.38 GB + 1.0 GB = 2.38 GB.
    3. **Conclusion & Interpretation:** **Result: Memory Capacity-Bound.** At 3000 tokens, the KV cache takes 1.38 GB. Total ML memory is 2.38 GB / 9 GB (26%), which is well within constraints.
