title: The Zero-Copy Imperative
scenario: You're building a real-time video effects application that applies an ML filter to a camera feed. Despite a 5ms NPU inference time, you observe 100ms end-to-end latency.
question: How do memory copies affect a real-time mobile video pipeline, and what zero-copy design should replace them?
details:
  realistic_solution: |
    Replace the CPU-mediated frame pipeline with shared external image buffers. The camera writes each frame into an IOSurface/AHardwareBuffer-style pool in the native camera format. The preprocessing step binds that same buffer as a GPU/NPU texture or tensor view, applying color conversion and resize in-place or as a shader into another buffer from the same pool. The NPU delegate consumes the shared buffer handle directly, and the display compositor presents the output buffer without copying it back through a CPU bitmap.

    The design needs explicit buffer ownership, fences, and a small ring of reusable buffers so camera capture, NPU inference, and display composition can overlap without staging queues. The goal is not just saving the raw copy time; it is removing CPU tensor conversion, format churn, and multi-frame framework buffering that turn a 5ms model into a 100ms user-visible pipeline.
  common_mistake: |
    **The Pitfall:** Suggesting faster memory or ignoring the OS overhead.
    **The Rationale:** Candidates underestimate the sheer CPU cost and framework queuing latency triggered by physically moving 8MB frames across memory boundaries.
    **The Consequence:** Developers will try to optimize the 5ms NPU model instead of fixing the pipeline architecture, completely failing to resolve the 100ms end-to-end latency.
  napkin_math: |
    **Assumptions & Constraints:**
    - Frame: 1080p RGBA (1920*1080*4 = 8.3MB).
    - Bandwidth: 30 GB/s.
    - Naive pipeline has four to six full-frame handoffs plus queueing between camera, CPU tensor conversion, NPU output, GPU composition, and display.

    **Calculations:**
    - Copy latency: 8.3MB / 30 GB/s = ~0.27ms per copy.
    - Raw copy time: 4-6 copies * 0.27ms = ~1.1-1.6ms.
    - Queueing impact: three buffered stages at 30 FPS can hold up to 3 * 33.3ms = ~100ms before a frame is displayed.

    **Conclusion & Interpretation:**
    - **Result: Framework Overhead.** Raw memory movement is small but not free; the large 100ms symptom comes from buffered handoffs, synchronization, and vsync alignment across memory domains. Zero-copy shared buffers reduce copies and, more importantly, remove staging queues that dominate the 5ms NPU time.
