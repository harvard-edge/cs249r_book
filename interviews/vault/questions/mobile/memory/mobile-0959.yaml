title: 'KV-Cache: Recall — What is a KV Cache and Why Does It Matter for Mobile LLM?'
scenario: You are deploying a 1B parameter LLM on a mobile device and configuring the generation pipeline.
question: What is a KV cache, why does mobile LLM decoding need it, and how does generation compute scale without it?
details:
  realistic_solution: 'The KV cache stores the Key and Value tensors for all previously generated tokens. This avoids recomputing K and V for historical tokens at each new generation step. Without a KV cache, generating the nth token requires O(n) computation, meaning total generation of N tokens scales quadratically at O(N^2). With a KV cache, each step requires O(1) new computation, scaling the total generation linearly at O(N).'
  common_mistake: |
    **The Pitfall:** Confusing the KV cache with general model weights caching in RAM.
    **The Rationale:** Candidates dont understand that without a KV cache, the attention mechanism must be fully recomputed over the entire sequence history for every single new token.
    **The Consequence:** They fail to recognize the O(N^2) scaling, resulting in generation times that quickly become unusable on mobile constraints.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: 1B parameters.
    - Sequence length: 512 tokens.
    - NPU Compute: 35 TOPS.

    **Calculations:**
    - Without cache compute: sum(1..512) ≈ 131,328 token-equivalent comps. 131,328 * 1B * 6 FLOPs ≈ 788T FLOPs (22.5s at peak).
    - With cache compute per step: 1 token = 1B * 6 FLOPs = 6B FLOPs (0.17ms at peak).

    **Conclusion & Interpretation:**
    - **Result: 0.17ms vs 22.5s (Compute-Bound)**. The KV cache provides a massive algorithmic speedup, shifting the bottleneck from O(N^2) compute to O(N) memory bandwidth.
