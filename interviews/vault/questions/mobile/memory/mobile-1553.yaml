title: Optimizing Large Language Models on Google Tensor G3 for Mobile
scenario: You are deploying an LLM on a smartphone powered by the Google Tensor G3 (7.5 TOPS, 12 GB LPDDR5X). The LLM requires 10 GB of memory for its weights and activations, occasionally exceeding the available 12 GB during variable memory usage, leading to Out-Of-Memory (OOM) errors.
question: How would you optimize large language model deployment on Tensor G3 for mobile memory and latency?
details:
  realistic_solution: |
    Use concrete mobile inference controls rather than training-oriented techniques. Quantize weights and, where supported, activations or KV cache; cap the context window or use sliding-window attention to bound KV-cache growth; use operator fusion and static memory planning to reduce activation and scratch peaks; and route supported subgraphs through NNAPI or the Tensor accelerator while keeping unsupported operators from forcing large CPU fallback buffers. Profile peak memory by stage, then reduce the largest live tensors with smaller batch sizes, shorter contexts, KV-cache compression, and model variants distilled for the mobile tier.
  common_mistake: |
    **The Pitfall:** Focusing only on peak memory usage without accounting for dynamic activations.
    **The Rationale:** Candidates often forget OS overhead, memory fragmentation, or the massive dynamic activation footprint of long-context generation.
    **The Consequence:** Naive attempts to squeeze large models onto mobile devices fail unpredictably under load, causing sudden app crashes.
  napkin_math: |
    **Assumptions & Constraints:**
    - Total device RAM = 12 GB, shared with OS and apps.
    - Current model peak = 10 GB for weights plus activations, with variable runtime buffers sometimes pushing above the safe app budget.
    - Example split: 8 GB weights and 2 GB peak activations/scratch before optimization.

    **Calculations:**
    - Current modeled peak: 8 GB weights + 2 GB activations/scratch = 10 GB, leaving too little headroom for OS, allocator fragmentation, and KV-cache variation.
    - INT8 weight quantization example: 8 GB weights -> 4 GB weights.
    - New peak before other changes: 4 GB weights + 2 GB activations/scratch = 6 GB.
    - Additional controls such as context limits and KV-cache quantization reduce variable memory spikes rather than relying on OS paging behavior.

    **Conclusion & Interpretation:**
    - **Result: reduce the 10 GB peak to roughly 6 GB in this example, then bound variable KV-cache and activation spikes.** The fix is targeted inference optimization, not gradient accumulation or vague OS memory control.
