title: Memory-Efficient Attention for On-Device LLM on A17 Pro
scenario: You are deploying a 1B parameter LLM on A17 Pro for on-device summarization with 2048-token context. With 24 layers and 16 heads, peak memory for standard attention maps is massive.
question: How would you reduce attention memory for a 1B LLM with 2048-token context on A17 Pro?
details:
  realistic_solution: 'Use Apple''s MLX framework which implements FlashAttention for Metal. Attention maps never materialize in full — tiled computation uses the M-series GPU efficiently, entirely avoiding the massive OOM spike.'
  common_mistake: |
    **The Pitfall:** Implementing custom FlashAttention in Metal shaders expecting CUDA-like SRAM IO benefits on the Neural Engine.
    **The Rationale:** Apple's Neural Engine does not support custom attention kernels; Metal GPU shaders must be used, and unified memory architecture shifts the bottleneck.
    **The Consequence:** High engineering effort with negligible performance gains, or worse, CPU fallback.
  napkin_math: |
    **Assumptions & Constraints:**
    - A17 Pro: 8GB unified memory.
    - Model: 1B params INT4 (500MB).
    - Context: 2048 tokens, 24 layers, 16 heads.

    **Calculations:**
    - Activations per layer: 2048 * 2048 * 2 bytes = 8MB.
    - Standard attention maps (all layers/heads): 24 * 16 * 2048^2 * 2 bytes = 3.2GB.
    - Total standard memory: 500MB + 192MB (activations) + 3.2GB (maps) = 3.9GB.

    **Conclusion & Interpretation:**
    - **Result: 3.2GB Saved (Memory-Capacity-Bound)**. Standard attention consumes 3.2GB just for attention maps. FlashAttention prevents materializing these maps, saving 3.2GB of RAM and preventing Jetsam eviction.
