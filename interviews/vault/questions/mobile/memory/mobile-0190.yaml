title: The TinyML vs Mobile Memory Arena
scenario: An engineer successfully deployed a 250KB keyword spotting model on a Cortex-M7 microcontroller. They are porting it to a flagship smartphone with 12GB of RAM, believing memory will no longer be a concern.
question: Why can a 250 KB keyword model that fits a Cortex-M7 tensor arena still face memory constraints on a 12 GB phone?
details:
  realistic_solution: 'The TinyML device uses a statically-allocated, contiguous block of fast on-chip SRAM. The mobile phone uses OS-managed, higher-latency, off-chip DRAM subject to aggressive Jetsam evictions and page faults.'
  common_mistake: |
    **The Pitfall:** Assuming "RAM is RAM" across the hardware hierarchy.
    **The Rationale:** Engineers unfamiliar with embedded systems fail to distinguish between static SRAM and OS-managed, virtualized DRAM.
    **The Consequence:** Unexpected out-of-memory errors or page faults ruining latency targets on a device with vastly more total memory.
  napkin_math: |
    **Assumptions & Constraints:**
    - Cortex-M7 SRAM: 250 KB contiguous.
    - Mobile DRAM: 12 GB total.
    - OS app limit (foreground): ~25% of total RAM.

    **Calculations:**
    - Mobile App Budget: 12 GB * 0.25 = 3 GB.
    - Ratio: 3 GB (3,145,728 KB) / 250 KB ≈ 12,582x.

    **Conclusion & Interpretation:**
    - **Result: ~12,582x Ratio (Memory-Hierarchy-Bound)**. Although the mobile app possesses ~12,500x more memory, it is OS-managed, virtualized DRAM suffering from page faults, vastly differing from the deterministic, single-cycle SRAM of a microcontroller.
  options:
  - 'The mobile app can use all 12GB of RAM, making it over 48,000x larger. (Trap: Assuming no OS caps)'
  - The mobile app's budget is orders of magnitude larger (~12,000x), but it's higher-latency DRAM managed by an OS, unlike the microcontroller's dedicated high-speed SRAM.
  - 'The memory is the same type (RAM), so the only difference is the amount available. (Trap: Missing SRAM vs DRAM difference)'
  - 'The mobile OS overhead consumes most of the RAM, so the actual available memory is similar to the TinyML device. (Trap: Numerically false)'
