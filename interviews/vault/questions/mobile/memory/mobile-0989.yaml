title: 'Model Size Estimation: Compare 1B vs. 3B LLM Memory on A17 Pro'
scenario: You are comparing deploying a 1B versus a 3B parameter language model on an A17 Pro device. Both use INT4 quantization.
question: Using the INT4 sizes, memory, KV dims, and decode TPOT below, how do model size, KV capacity at 4096 ctx, decode latency, and max retained context before overflow compare?
details:
  realistic_solution: '1B model: INT4 weights are 500MB. With 8GB RAM and 3GB reserved for OS/app overhead, the remaining budget after weights is 4.5GB. Using 32 layers, 32 KV heads, and 64-dim KV heads, KV/token = 2 x 32 layers x 32 KV heads x 64 dim x 2 bytes = 262KB/token, so the KV budget holds about 17K tokens, or roughly 4.2 separate 4096-token windows. 3B model: INT4 weights are 1.5GB, leaving 3.5GB for KV. With 32 layers, 32 KV heads, and 128-dim KV heads, KV/token = 524KB/token, so the KV budget holds about 6.7K tokens, or one full 4096-token window plus about 2.6K tokens of headroom. TPOT should come from measured decode performance, not weight-size divided by memory bandwidth; if measurements show about 7.4ms/token for 1B and 22ms/token for 3B under the same runtime, the 1B model has lower latency and much larger retained-context headroom.'
  common_mistake: |
    **The Pitfall:** Using the same KV-cache size formula without adjusting for differing model dimensions.
    **The Rationale:** Candidates forget that a 1B model has a smaller hidden dimension and fewer heads than a 3B model, which directly dictates the size of the KV-cache per token.
    **The Consequence:** They miscalculate the maximum context length or mistakenly conclude that neither model can fit within the constrained RAM budget.
  napkin_math: |
    **Assumptions & Constraints:**
    - Device RAM Budget: 8GB total - 3GB OS = 5GB available.
    - 1B Model: INT4 (0.5GB weights), 64-dim KV heads, 32 KV heads, 32 layers.
    - 3B Model: INT4 (1.5GB weights), 128-dim KV heads, 32 KV heads, 32 layers.
    - Measured decode TPOT on this runtime: 1B ~= 7.4ms/token, 3B ~= 22ms/token.

    **Calculations:**
    - 1B KV size: 2 * 32 layers * 32 KV heads * 64 dim * 2 bytes = 262 KB/token. KV budget = 5GB - 0.5GB = 4.5GB. Max retained tokens = 4.5GB / 262KB ~= 17,166.
    - 3B KV size: 2 * 32 layers * 32 KV heads * 128 dim * 2 bytes = 524 KB/token. KV budget = 5GB - 1.5GB = 3.5GB. Max retained tokens = 3.5GB / 524KB ~= 6,679.
    - 1B retained context capacity: 17,166 / 4,096 ~= 4.2 full 4096-token windows.
    - 3B retained context capacity: 6,679 / 4,096 ~= 1.6 full 4096-token windows.
    - Decode TPOT must be measured or modeled from per-token compute and memory traffic; static weight size divided by peak bandwidth is only a lower-bound streaming estimate.

    **Conclusion & Interpretation:**
    - **Result: The 1B model is the safer mobile choice for latency and long context.** Both models fit a 4096-token context, but the 1B model has about 4.2 context windows of KV capacity versus about 1.6 for the 3B model, and measured decode TPOT should be used instead of a bandwidth-only shortcut.
