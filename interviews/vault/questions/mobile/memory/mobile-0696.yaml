title: The On-Device LLM Memory Architecture
scenario: 'Your PM wants to run a 3B parameter LLM on a phone with 8 GB RAM. In FP16, the weights alone are 6 GB. The OS uses 3 GB. You have 5 GB available.'
question: 'How can a 3B FP16 LLM run on a phone when weights need 6 GB and the OS leaves 5 GB free?'
details:
  realistic_solution: 'Design a paged weight streaming system: partition the model into chunks on fast UFS 4.0 flash storage. Maintain a 1 GB resident memory buffer. During inference, prefetch chunk N+1 while computing chunk N to hide load latency. Use LRU eviction to manage chunks dynamically.'
  common_mistake: |
    **The Pitfall:** Claiming it is impossible or immediately resorting exclusively to quantization.
    **The Rationale:** Candidates see limits exceeded and refuse to leverage fast modern storage (UFS 4.0) for active streaming pipelines.
    **The Consequence:** Blocking premium full-precision features requested by product teams when creative storage engineering can solve it.
  napkin_math: |
    **Assumptions & Constraints:**
    - Memory Deficit: 3B × 2 bytes = 6 GB (Exceeds 5 GB free RAM).
    - Storage: UFS 4.0 flash storage (4.2 GB/s read speed).
    - Streaming Setup: 1 GB resident memory buffer for 256 MB chunks.

    **Calculations:**
    - Load Time: 256 MB / 4.2 GB/s ≈ 61ms per chunk.
    - Compute Time: 4 blocks compute = 60ms.
    - Overlapped Execution: Prefetching overlaps 61ms load with 60ms compute = ~1ms stall per chunk.
    - Total Latency: 32 layers / 4 = 8 chunks. 8 chunks × 60ms compute = 480ms compute per token. Add 8ms total stall.

    **Conclusion & Interpretation:**
    - **Result: I/O-Bound**. The streamed FP16 inference operates at **488ms/token**, proving streaming via UFS 4.0 makes running oversized models feasible without quantization.
