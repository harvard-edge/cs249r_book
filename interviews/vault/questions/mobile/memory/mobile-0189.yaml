title: The Mobile KV-Cache Budget
scenario: You're deploying a small 2-billion-parameter LLM on a flagship mobile phone for an on-device assistant feature. The model has 24 layers, 16 attention heads, and a head dimension of 64. To maintain a responsive user experience, you need to support a context window of 4096 tokens.
question: "How much FP16 KV-cache memory is required for a 24-layer, 16-head LLM with 4096 tokens?"
details:
  realistic_solution: The correct way to calculate the KV-cache size is to account for the Key and Value tensors for every token in the sequence, across all layers and heads. The memory footprint is determined by the sequence length, not the total number of model parameters.
  common_mistake: |
    **The Pitfall:** Calculating half the required size or confusing dimensions.
    **The Rationale:** Candidates often forget that the KV-cache stores both a Key and a Value tensor for each token, or they use the wrong precision.
    **The Consequence:** The resulting memory estimation is off by a factor of 2 or 4, leading to incorrect hardware budgeting.
  napkin_math: |
    **Assumptions & Constraints:**
    - 24 layers, 16 heads, head_dim = 64.
    - Context window = 4096 tokens.
    - Precision = FP16 (2 bytes per parameter).

    **Calculations:**
    - Memory per token = 2 (K and V) * 24 * 16 * 64 * 2 bytes = 98,304 bytes.
    - Total Memory = 98,304 bytes * 4096 tokens = 402,653,184 bytes.

    **Conclusion & Interpretation:**
    - **Result: ~384 MB (Memory-Bound)**. Total KV-cache memory required is ~384 MB.
  options:
  - ~192 MB
  - ~384 MB
  - ~768 MB
  - ~96 MB
  correct_index: 1
