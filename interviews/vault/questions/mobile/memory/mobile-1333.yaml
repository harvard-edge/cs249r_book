title: LLaMA-3 8B INT8 Quantization Memory Budget on Snapdragon 8 Gen 3
scenario: You are deploying a quantized 8-billion parameter LLM onto a flagship mobile device. The device has 16 GB of shared memory, but the OS and background apps reserve a hard baseline of 6 GB. You plan to run the model on the NPU using INT8 weights and INT8 activations.
question: What is the memory footprint for an 8B INT8 model plus a 2048-token KV cache, and does it fit?
details:
  realistic_solution: 'First, calculate the memory needed for the INT8 weights (1 byte per parameter). Then, calculate the KV cache size using the standard formula: 2 * batch_size * context_length * hidden_size * num_layers * bytes_per_element. Finally, verify that the sum of the model weights and the KV cache fits within the available user-space memory (Total RAM - OS Reserved).'
  common_mistake: |
    **The Pitfall:** Forgetting the KV cache or unified memory architecture.
    **The Rationale:** Candidates often calculate only static weight size and assume NPUs have dedicated VRAM instead of sharing system RAM.
    **The Consequence:** Deploying models that immediately trigger OOM crashes because the dynamic runtime memory was unaccounted for.
  napkin_math: |
    **Assumptions & Constraints:**
    - Available Memory = 16 GB - 6 GB = 10 GB.
    - Model: 8B parameters, INT8 quantization.
    - KV Cache: 32 layers, 4096 hidden size, FP16 (2 bytes). Target = 2048 tokens.

    **Calculations:**
    - Weight Memory = 8B params * 1 byte/param = 8.0 GB.
    - KV-Cache per token = 2 (K+V) * 32 layers * 4096 dim * 2 bytes = 524,288 bytes (~0.5 MB).
    - Total KV-Cache (2048 tokens) = 2048 * 0.5 MB = 1.0 GB.
    - Total Footprint = 8.0 GB + 1.0 GB = 9.0 GB.

    **Conclusion & Interpretation:**
    - **Result: 9 GB fits in 10 GB (Memory-capacity-bound deployment)**. The total footprint strictly fits within the available shared memory.
