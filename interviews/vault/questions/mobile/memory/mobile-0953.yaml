title: 'KV-Cache: Mastery — KV Cache Co-Design for Mobile LLM Architecture'
scenario: You are designing a new 1B LLM architecture specifically for an NPU (45 TOPS INT8, 68 GB/s bandwidth) targeting 30 tok/sec at 4096-token context.
question: How would you co-design the model architecture and KV cache management policy to meet the target?
details:
  realistic_solution: Co-design the attention mechanism alongside memory boundaries. Abandon standard Multi-Head Attention (MHA) which inflates KV-cache. Implement Grouped-Query Attention (GQA) to radically compress the KV footprint, ensuring both weights and cache stream over the memory bus within the per-token latency budget.
  common_mistake: |
    **The Pitfall:** Designing model depth/heads without working backward from memory bandwidth limits.
    **The Rationale:** Candidates often use standard desktop LLM dimension ratios, assuming TOPS is the main constraint.
    **The Consequence:** The model achieves high theoretical TOPS but fails real-world tok/sec targets because the KV cache is too large to stream over the memory bus every step.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target: 30 tok/sec (33.3ms/token).
    - Model: 1B params at INT4 effective storage = ~500 MB weight traffic if weights are streamed once per decode step.
    - Context: 4096.
    - Bandwidth: 68 GB/s.
    - KV cache: BF16 GQA-8 with 32 layers, 8 KV heads, head_dim 128.

    **Calculations:**
    - GQA-8 KV read at 4096 tokens = 32 * 2 * 8 * 128 * 2B * 4096 = 536,870,912 bytes = 512 MiB = 536.9 MB.
    - New-token KV write = 32 * 2 * 8 * 128 * 2B = 131,072 bytes = 0.13 MB, negligible versus the full KV read.
    - Bandwidth lower bound = (500 MB weight read + 536.9 MB KV read + 0.13 MB write) / 68 GB/s = 15.25ms/token.
    - Bandwidth-only upper bound = 1 / 0.01525s = ~65 tok/sec before compute, scheduling, and kernel overhead.

    **Conclusion & Interpretation:**
    - **Result: Bandwidth Feasibility Check**. The memory-traffic bound is below the 33.3ms/token target, leaving about 18ms/token for compute and runtime overhead. If measured overhead exceeds that margin, reduce KV heads, context, or weight traffic further.
