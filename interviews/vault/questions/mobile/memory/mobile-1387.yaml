title: LLM Memory Co-Design on Exynos 2400 NPU
scenario: You are leading the deployment of a 4B parameter local LLM on the Samsung Exynos 2400 NPU for real-time live captioning. During concurrent 4K video recording, the ISP and GPU consume massive bandwidth, causing severe memory starvation and high latency during the LLM's autoregressive generation phase.
question: How do you design a memory hierarchy and execution architecture to guarantee 20 tokens/s generation without dropping camera frames?
details:
  realistic_solution: |
    A robust design treats 20 tokens/s as a shared-memory scheduling problem. Use a 4B-class INT4 model with GQA to keep KV traffic small, a paged KV cache with only the current tile staged in accelerator scratch, and QoS limits that reserve ISP/GPU bandwidth before LLM decode starts. To reduce weight traffic, use a small resident draft model for speculative decoding so each main-model verification pass emits several accepted tokens, or use an equivalent batching scheme that amortizes main-model weight reads. The guarantee is conditional: admission control must prove the measured main-weight, KV, activation, and draft traffic stays inside the reserved LLM bandwidth before camera recording and decode run together. The runtime should prefetch model pages asynchronously, pace decode around camera frame deadlines, and degrade to a smaller model or lower token rate if acceptance rate or bandwidth headroom drops.
  common_mistake: |
    **The Pitfall:** Treating the device's RAM as dedicated NPU memory and focusing solely on compute limits.
    **The Rationale:** Candidates forget that mobile architectures use shared memory pools, where the ISP and GPU compete fiercely for bandwidth during multitasking.
    **The Consequence:** Designing a quantization strategy that still starves the system of bandwidth, resulting in dropped camera frames and terrible UI stutter during generation.
  napkin_math: |
    **Assumptions & Constraints:**
    - Main model: 4B parameters (INT4) = 2 GB.
    - Target rate: 20 tokens/sec.
    - LPDDR5X peak bandwidth: ~68 GB/s.
    - ISP/GPU concurrent bandwidth requirement: 35 GB/s.
    - Reserve 10 GB/s as guard bandwidth for OS, display, CPU/GPU bursts, and controller overhead.
    - Available LLM bandwidth while camera is active: 68 - 35 - 10 = 23 GB/s.
    - Speculative acceptance target: 4 accepted tokens per main-model verification pass, where one pass rereads the main model once to verify a draft block.

    **Calculations:**
    - Per-token LLM bandwidth budget at 20 tokens/s: 23 GB/s / 20 tokens/s = 1.15 GB/token.
    - Naive main-model bandwidth if weights are streamed once per output token: 2 GB/token * 20 tokens/s = 40 GB/s.
    - Naive total bandwidth before KV/activation traffic: 40 + 35 + 10 = 85 GB/s (exceeds 68 GB/s).
    - Speculative main-model passes = 20 tokens/s / 4 tokens/pass = 5 passes/s.
    - Main-model bandwidth with speculation = 2 GB/pass * 5 passes/s = 10 GB/s.
    - Weight traffic per emitted token after speculation = 10 GB/s / 20 tokens/s = 0.5 GB/token.
    - Remaining LLM budget for draft, KV, activations, and page misses = 23 - 10 = 13 GB/s, or 0.65 GB/token.
    - System bandwidth if measured non-weight LLM traffic stays within that allowance = 35 + 10 + 23 = 68 GB/s.

    **Conclusion & Interpretation:**
    - **Result: 20 tokens/s requires an LLM budget of at most 23 GB/s, with non-weight traffic capped near 13 GB/s after speculative amortization.** The target is defensible only if profiling confirms draft, KV, activation, and page-miss traffic fits that allowance; without amortizing main-model weight reads, camera traffic exceeds the shared-memory budget.
