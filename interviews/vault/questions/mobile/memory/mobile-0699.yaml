title: The CoreML Multi-Array Pre-allocation
scenario: You run a CoreML video processing pipeline at 60 FPS on iOS. The model prediction takes 5ms. However, the Instruments profiler shows your app is constantly triggering the OS memory allocator and occasionally dropping frames due to memory spikes. You are creating a new `MLMultiArray` for the output every frame.
question: How do you eliminate per-frame MLMultiArray allocation spikes in a 60 FPS Core ML video pipeline?
details:
  realistic_solution: 'Creating a new 10 MB tensor wrapper or copy every frame can create up to 600 MB/s of allocator churn. On iOS this shows up as ARC releases, malloc/free pressure, heap fragmentation, and memory spikes, not garbage-collector pauses. There is no public MLPredictionOptions.outputBackings API for forcing Core ML to write MLMultiArray outputs into a caller-supplied buffer. Fix the pipeline by reusing the buffers you do control: pre-allocate MLMultiArray inputs and post-processing scratch arrays, pass them through an MLFeatureProvider, avoid copying the model output into a fresh MLMultiArray, and use CVPixelBufferPool for image-like outputs when the model interface can be represented as pixel buffers. The goal is to keep per-frame tensor allocation out of the hot path and validate in Instruments that remaining Core ML-owned output allocation is bounded.'
  common_mistake: |
    **The Pitfall:** Concluding that CoreML memory allocations are outside of developer control.
    **The Rationale:** Candidates assume that because the framework returns a new object, memory reuse is impossible at the API level.
    **The Consequence:** The app continues to suffer from allocator pressure and dropped frames because hundreds of megabytes of avoidable memory churn is left unoptimized.
  napkin_math: |
    **Assumptions & Constraints:**
    - Video pipeline running at 60 FPS. Output tensor size: 10 MB per frame.
    - Target: Maintain 60 FPS without allocator-driven frame stalls.

    **Calculations:**
    - Avoidable Allocation Churn: 10 MB/frame x 60 FPS = 600 MB/s of tensor allocation/copy traffic.
    - Reused caller-owned buffers: the 10 MB/frame scratch allocation is removed from the hot path, though Core ML may still allocate or retain framework-owned output objects.

    **Conclusion & Interpretation:**
    - **Result: up to 600 MB/s less avoidable churn (Memory-Bound)**. Buffer reuse and pixel-buffer pools reduce allocator pressure, but the correct claim is reduced per-frame churn rather than guaranteed zero allocation or garbage-collector elimination.
