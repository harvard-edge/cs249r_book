title: 'Model Size Estimation: Master Tradeoffs for Multi-Modal LLM on Mobile'
scenario: 'You need to design and evaluate the memory tradeoffs for a multi-modal LLM (language + vision) on a 16GB mobile SoC. The components include a CLIP-ViT-B/32 vision encoder (87M params, INT8), projection MLP (10M params, INT8), and a 1B language model (INT4).'
question: How would you compute full memory layout and TPOT for text generation after image encoding?
details:
  realistic_solution: Pre-allocate the full context window and map out KV cache limits to avoid dynamic allocation overhead. Execute vision encoding sequentially, retaining the 197 token projections in memory as a static KV prefix, enabling optimized flash-attention kernels for text generation.
  common_mistake: |
    **The Pitfall:** Forgetting the dynamic memory cost of the image feature tensor and vision tokens.
    **The Rationale:** Candidates focus solely on the static model weights and text KV cache.
    **The Consequence:** Underestimating the KV prefix size and generating OOM errors when processing high-resolution visual inputs.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model parameters: Vision INT8 (87 MB), MLP INT8 (10 MB), LM INT4 (500 MB).
    - KV Context: 197 image tokens, 4096 text tokens.
    - Precision: FP16 KV cache (262 KB/token).
    - SoC Bandwidth: 77 GB/s.

    **Calculations:**
    - Image KV Prefix: 197 tokens * 262 KB/token = 51.6 MB.
    - Text KV Cache: 4096 tokens * 262 KB/token = 1.07 GB.
    - Total ML RAM: 500 MB + 87 MB + 10 MB + 51.6 MB + 1.07 GB = 1.72 GB.
    - Memory-Bound TPOT: 500 MB (LM) / 77 GB/s = ~6.5 ms/token.

    **Conclusion & Interpretation:**
    - **Result: 1.72 GB, 6.5 ms TPOT (Memory-Bound)**. Generation latency is strictly dominated by the time required to stream 500 MB of INT4 weights through the LPDDR bus.
