title: Multimodal Mobile LLM Memory Layout and TPOT Estimate
scenario: You need to design and evaluate the memory tradeoffs for a multi-modal LLM (language + vision) on a 16GB mobile SoC. The components include a CLIP-ViT-B/32 vision encoder (87M params, INT8), projection MLP (10M params, INT8), and a 1B language model (INT4).
question: How would you compute full memory layout and TPOT for text generation after image encoding?
details:
  realistic_solution: Compute the static weights first, then add the vision-prefix and text KV cache that remain resident during generation. The CLIP encoder is 87MB INT8, the projection MLP is 10MB INT8, and the 1B INT4 language model is about 500MB. The 197 image tokens add about 51.6MB of KV state, and a 4096-token text window adds about 1.07GB, so the active ML footprint after image encoding is about 1.72GB before framework activations and allocator slack. A simple bandwidth lower bound for decode is 0.5GB / 77GB/s = 6.5ms/token for streaming LM weights, but real TPOT should be reported as higher because attention over the image/text KV cache, activations, kernel efficiency, and memory contention also contribute.
  common_mistake: |
    **The Pitfall:** Forgetting the dynamic memory cost of the image feature tensor and vision tokens.
    **The Rationale:** Candidates focus solely on the static model weights and text KV cache.
    **The Consequence:** Underestimating the KV prefix size and generating OOM errors when processing high-resolution visual inputs.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model parameters: Vision INT8 (87 MB), MLP INT8 (10 MB), LM INT4 (500 MB).
    - KV Context: 197 image tokens, 4096 text tokens.
    - Precision: FP16 KV cache (262 KB/token).
    - SoC Bandwidth: 77 GB/s.

    **Calculations:**
    - Image KV Prefix: 197 tokens * 262 KB/token = 51.6 MB.
    - Text KV Cache: 4096 tokens * 262 KB/token = 1.07 GB.
    - Total ML RAM: 500 MB + 87 MB + 10 MB + 51.6 MB + 1.07 GB = 1.72 GB.
    - LM weight streaming lower bound: 0.5 GB / 77 GB/s = ~6.5 ms/token.
    - Practical TPOT must be >= 6.5 ms/token because decode also reads KV cache blocks, writes the new token's KV state, and pays kernel/activation overhead.

    **Conclusion & Interpretation:**
    - **Result: ~1.72 GB active ML memory plus runtime slack; >=6.5 ms/token TPOT lower bound.** The memory layout fits comfortably in 16GB, but the bandwidth calculation is a lower bound rather than a complete latency prediction.
