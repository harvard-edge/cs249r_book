title: KV-Cache Impact on Mobile Thermal Throttling
scenario: Your on-device 3B LLM generates the first 200 tokens at 15 tokens/sec on A17 Pro, but by token 800, speed drops to 6 tokens/sec. The device feels warm. Your colleague blames thermal throttling. You suspect KV-cache growth also contributes.
question: How much of a 3B LLM slowdown from 15 tok/s at token 200 to 6 tok/s at token 800 is KV growth versus heat?
details:
  realistic_solution: |
    KV-cache growth is measurable, but the given data is not enough to assign an exact percentage of the slowdown to KV reads. At token 200, attention reads about 200 x 32 KB = 6.4 MB of KV per decode step. At token 800, it reads about 800 x 32 KB = 25.6 MB. The incremental KV traffic is therefore 19.2 MB per token, which is small compared with a 1.5 GB INT4 weight stream for a 3B model. The observed latency worsens from 66.7 ms/token to 166.7 ms/token, a 100 ms/token increase. Unless effective memory bandwidth has collapsed to an implausibly low value, 19.2 MB of extra KV reads cannot by itself explain a 100 ms/token regression. Diagnosis: KV growth contributes, but heat, sustained-clock reduction, runtime scheduling, and lower effective memory bandwidth dominate this sub-1K-context slowdown. KV-cache growth becomes a primary bottleneck at much longer contexts or for models whose weight traffic is much smaller relative to KV traffic.
  common_mistake: |
    **The Pitfall:** Attributing the entire slowdown solely to thermal throttling.
    **The Rationale:** Candidates fail to recognize that growing KV-cache linearly increases memory bandwidth requirements per decode step.
    **The Consequence:** Optimization efforts are misdirected entirely toward cooling rather than KV-cache compression.
  napkin_math: |
    **Assumptions & Constraints:**
    - KV at 200 tokens: 200 x 32 KB = 6.4 MB per decode step.
    - KV at 800 tokens: 800 x 32 KB = 25.6 MB per decode step.
    - Observed throughput: 15 tok/s at token 200 and 6 tok/s at token 800.
    - 3B INT4 weight stream is roughly 1.5 GB per decode step.

    **Calculations:**
    - Observed latency at 200 tokens: 1 / 15 = 66.7 ms/token.
    - Observed latency at 800 tokens: 1 / 6 = 166.7 ms/token.
    - Observed slowdown: 166.7 ms - 66.7 ms = 100 ms/token.
    - Incremental KV traffic: 25.6 MB - 6.4 MB = 19.2 MB/token.
    - Incremental KV traffic versus weight traffic: 19.2 MB / 1.5 GB = about 1.3%.
    - To explain the full 100 ms/token slowdown from KV alone, effective bandwidth for the extra KV reads would need to be 19.2 MB / 0.1 s = 192 MB/s, far below a credible sustained mobile memory bandwidth for this workload.

    **Conclusion & Interpretation:**
    - **Result: KV Growth Is a Minor Contributor, Not the Main Cause**. The numbers support a qualitative conclusion: the 15 tok/s to 6 tok/s drop is dominated by sustained-performance effects rather than KV growth alone.
