title: KV-Cache Impact on Mobile Thermal Throttling
scenario: Your on-device 3B LLM generates the first 200 tokens at 15 tokens/sec on A17 Pro, but by token 800, speed drops to 6 tokens/sec. The device feels warm. Your colleague blames thermal throttling. You suspect KV-cache growth also contributes.
question: How much of a 3B LLM slowdown from 15 tok/s at token 200 to 6 tok/s at token 800 is KV growth versus heat?
details:
  realistic_solution: |
    KV-cache growth is measurable but too small to explain the observed slowdown. At token 200, attention reads about 200 x 32 KB = 6.4 MB of KV per decode step. At token 800, it reads about 800 x 32 KB = 25.6 MB. Against a 1.5 GB INT4 weight stream, the incremental KV growth is only 19.2 MB, or about 1.3% of the per-token weight traffic. The observed latency worsens from 1/15 s = 66.7 ms/token to 1/6 s = 166.7 ms/token, a 100 ms/token increase. Even at a throttled 60 GB/s memory bandwidth, the extra KV traffic from token 200 to token 800 costs only about 19.2 MB / 60 GB/s = 0.32 ms/token. The rest of the drop must come from thermal throttling, reduced sustained clocks, scheduling overhead, and lower effective memory bandwidth. Diagnosis: KV growth contributes well under 1% of the observed slowdown for this 3B, sub-1K-context case; heat and sustained-performance throttling dominate. KV-cache growth becomes a primary bottleneck at much longer contexts or for models whose weight traffic is much smaller relative to KV traffic.
  common_mistake: |
    **The Pitfall:** Attributing the entire slowdown solely to thermal throttling.
    **The Rationale:** Candidates fail to recognize that growing KV-cache linearly increases memory bandwidth requirements per decode step.
    **The Consequence:** Optimization efforts are misdirected entirely toward cooling rather than KV-cache compression.
  napkin_math: |
    **Assumptions & Constraints:**
    - KV at 200 tokens: 6.4 MB (0.4% of 1.5GB weight load).
    - KV at 800 tokens: 25.6 MB (1.7% of 1.5GB weight load).
    - Observed throughput: 15 tok/s at token 200 and 6 tok/s at token 800.
    - Use 60 GB/s as a conservative throttled memory-bandwidth estimate for incremental KV cost.

    **Calculations:**
    - Observed latency at 200 tokens: 1 / 15 = 66.7 ms/token.
    - Observed latency at 800 tokens: 1 / 6 = 166.7 ms/token.
    - Observed slowdown: 166.7 ms - 66.7 ms = 100 ms/token.
    - Incremental KV traffic: 25.6 MB - 6.4 MB = 19.2 MB/token.
    - Incremental KV latency at 60 GB/s: 19.2 MB / 60 GB/s = 0.32 ms/token.
    - KV share of observed slowdown: 0.32 ms / 100 ms = 0.3%.

    **Conclusion & Interpretation:**
    - **Result: <1% KV Growth, >99% Sustained-Performance Effects**. KV growth is not the causal driver of this 15 tok/s to 6 tok/s drop; heat-related throttling and runtime scheduling dominate.
