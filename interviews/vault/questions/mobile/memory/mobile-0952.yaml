title: 'KV-Cache: Implement KV Cache Size Limiter for Mobile LLM Memory Safety'
scenario: Implement a KV cache size limiter for a 1B LLM on a flagship mobile platform. The limiter must prevent OOM crashes when context grows long, apply graceful truncation at an 80% memory threshold, and preserve the most informative tokens.
question: How should a 1B LLM cap KV cache at an 80% memory threshold while preserving key tokens?
details:
  realistic_solution: Implement a hard KV budget from the usable KV memory pool and trigger eviction when the allocated KV pages reach 80% of that pool. Pin system prompt and other protected tokens, retain recent tokens, and use a standard importance policy such as H2O-style cumulative attention scores to keep heavy-hitter tokens while evicting low-score older tokens. If the cache still exceeds the watermark after eviction, summarize older context or reject further context growth before allocation so the app never crosses the OOM boundary.
  common_mistake: |
    **The Pitfall:** Implementing a naive FIFO truncation that drops the oldest tokens first.
    **The Rationale:** Candidates treat KV cache like a generic ring buffer, forgetting that early tokens (e.g., system prompt) contain critical instruction context.
    **The Consequence:** The LLM abruptly "forgets" its personality and instructions, leading to incoherent or out-of-character responses.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Total RAM: 8 GB. Reserved for OS/Framework/Model: 3.2 GB.
       - Available KV RAM = 4.8 GiB. Safety margin trigger = 80% of 4.8 GiB = 3.84 GiB.
       - Representative 1B KV shape: 24 layers, 8 KV heads, head_dim 64, BF16 KV cache.
       - KV per token = 24 * 2 * 8 * 64 * 2 bytes = 49,152 bytes = 48 KiB/token.
    2. **Calculations:**
       - Safe KV token capacity = 3.84 GiB / 49,152 bytes ≈ 83,886 tokens.
       - 4096-token cache = 4096 * 49,152 bytes = 192 MiB, so no eviction is needed for short contexts.
       - 128K-token running conversation = 128,000 * 49,152 bytes ≈ 5.86 GiB, exceeding the 3.84 GiB trigger by ~2.02 GiB.
       - Tokens to evict or summarize at 128K = 128,000 - 83,886 ≈ 44,114 tokens, while pinning system prompt and other high-attention tokens.
    3. **Conclusion & Interpretation:**
       - **Result: Long-Context Memory Guardrail.** The 80% threshold is a cap on the usable KV budget, not total device RAM. A normal 4096-token prompt fits, but extended conversations need eviction, summarization, or rejection before the retained KV cache grows past ~84K tokens.
