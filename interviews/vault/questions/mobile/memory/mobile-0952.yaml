title: 'KV-Cache: Implement KV Cache Size Limiter for Mobile LLM Memory Safety'
scenario: "Implement a KV cache size limiter for a 1B LLM on a flagship mobile platform. The limiter must prevent OOM crashes when context grows long, apply graceful truncation at an 80% memory threshold, and preserve the most informative tokens."
question: "How should a 1B LLM cap KV cache at an 80% memory threshold while preserving key tokens?"
details:
  realistic_solution: "Implement a semantic KV eviction policy such as H2O (Heavy Hitter Oracle) or Sinkhole attention. Maintain the system prompt tokens (first N tokens) and continuously track cumulative attention scores to preserve high-value tokens, while discarding low-attention historical tokens to stay under the 80% watermark in an O(n) check."
  common_mistake: |
    **The Pitfall:** Implementing a naive FIFO truncation that drops the oldest tokens first.
    **The Rationale:** Candidates treat KV cache like a generic ring buffer, forgetting that early tokens (e.g., system prompt) contain critical instruction context.
    **The Consequence:** The LLM abruptly "forgets" its personality and instructions, leading to incoherent or out-of-character responses.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Total RAM: 8 GB. Reserved for OS/Framework/Model: 3.2 GB.
       - Available KV RAM = 4.8 GB. Safety margin trigger = 80% of 4.8 GB = 3.84 GB.
       - KV per token (INT4) = ~98.3 KB. Context limit = 4096 tokens.
    2. **Calculations:**
       - Theoretical Token Capacity = 3.84 GB / 98.3 KB ≈ 39,062 tokens.
       - Max Context Memory = 4096 tokens * 98.3 KB ≈ 403 MB.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound.** The 4096-token context limit requires only **403 MB**, well below the 3.84 GB threshold; memory safety via truncation is technically not a practical concern for a 1B model on an 8GB device.
