title: INT4 Quantization Bandwidth Impact
scenario: You are deploying a transformer model on the Apple A17 Pro Neural Engine. The weights are quantized from FP16 to INT4 (0.5 bytes/param).
question: By what factor are memory bandwidth requirements reduced, and what is the secondary cache effect?
visual:
  kind: svg
  path: mobile-1912.svg
  alt: Bar chart comparing FP16 footprint spilling out of SRAM vs INT4 footprint fitting entirely inside.
  caption: Cache Footprint Reduction
details:
  realistic_solution: Moving from FP16 (2 bytes) to INT4 (0.5 bytes) reduces the raw weight memory payload by a factor of 4. Secondarily, because the footprint is 4x smaller, more weights fit directly inside the Neural Engine's L1/L2 SRAM cache hierarchy, exponentially reducing cache misses and expensive LPDDR5 main memory trips.
  common_mistake: |
    **The Pitfall:** Ignoring the non-linear benefits of quantization on the cache.
    **The Rationale:** Candidates easily identify the 4x linear bandwidth reduction but often forget that a smaller footprint changes cache dynamics.
    **The Consequence:** They miss that the footprint fitting entirely inside the Neural Engine's L1/L2 SRAM cache hierarchy exponentially reduces cache misses and expensive LPDDR5 trips.
  napkin_math: |
    **Assumptions & Constraints:**
    - FP16 precision: 2 bytes per parameter.
    - INT4 precision: 0.5 bytes per parameter.

    **Calculations:**
    - Bandwidth reduction: 2 bytes / 0.5 bytes = 4x.

    **Conclusion & Interpretation:**
    - **Result: 4x reduction (Memory-Bandwidth Bound)**. The INT4 footprint fits entirely inside the Neural Engine's SRAM cache, exponentially reducing misses.
