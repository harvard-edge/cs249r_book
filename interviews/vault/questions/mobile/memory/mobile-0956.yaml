title: 'KV-Cache: Optimize KV Pruning for Token Budget on Snapdragon 8 Gen 3'
scenario: 'Your 1B LLM on Snapdragon 8 Gen 3 (up to about 60 TOPS class NPU capability depending on vendor metric, 16GB) has a 2048-token KV cache budget. Long legal documents require 8192 tokens. You must evaluate two KV pruning strategies: (A) stride-based retention (keep every 4th token), (B) attention-score-based retention (H2O: keep top-25% by cumulative attention).'
question: For an 8192-token legal document on a 2048-token KV budget, should Snapdragon 8 Gen 3 use stride pruning or H2O?
details:
  realistic_solution: H2O (attention-based) significantly outperforms stride-based for documents with uneven information density (legal documents have key clauses and boilerplate). Stride-based may be faster to compute. Evaluate both on actual legal QA benchmarks.
  common_mistake: |
    **The Pitfall:** Using stride-based pruning for all tasks regardless of content structure.
    **The Rationale:** Candidates assume uniform pruning is 'good enough' and ignore the actual quality difference for documents with uneven information density.
    **The Consequence:** Critical information (like legal clauses) is dropped, leading to poor model performance.
  napkin_math: |
    **Assumptions & Constraints:**
    - From 8192 tokens, retain 2048 = 25%.
    - H2O needs a cumulative importance score for each candidate token, not a full per-head KV copy.
    - Example score buffer: 8192 tokens * 4 bytes/token = 32 KiB if scores are aggregated across layers.
    - If scores are tracked per layer: 32 layers * 8192 tokens * 4 bytes = 1,048,576 bytes = 1 MiB.

    **Calculations:**
    - Stride pruning keeps token positions 0, 4, 8, ... and ignores which legal clauses received attention.
    - H2O keeps the 2048 highest-scoring tokens, so the retained set can include dense clauses, definitions, and cross-references even when they are not uniformly spaced.
    - Selecting top 2048 from 8192 scores is a small CPU/GPU-side bookkeeping pass relative to LLM decode, but it should be measured as memory traffic and kernel overhead rather than converted directly from peak TOPS.

    **Conclusion & Interpretation:**
    - **Result: Prefer H2O for Quality-Critical Legal Contexts**. Both methods meet the 2048-token budget; stride is simpler and deterministic, while H2O spends a small tracking buffer and periodic selection pass to preserve semantically important tokens.
