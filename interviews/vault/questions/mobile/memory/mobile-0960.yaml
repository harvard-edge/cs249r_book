title: Production Mobile LLM KV Cache Requirements on A17 Pro
scenario: A production mobile LLM chat app serves 10M users. The app supports a 3B parameter model and 4096-token contexts.
question: What KV cache memory, quantization, eviction, and recovery requirements should a production A17 Pro chat app specify?
details:
  realistic_solution: 'Implement PagedAttention with isolated KV storage per conversation. Quantization: INT8 Grouped-Query Attention (GQA) for baseline, INT4 for max context. Eviction: Background conversations'' KV offloaded to flash memory. Recovery: KV is dropped under heavy memory pressure and asynchronously recomputed (prefilled) upon app resume, with user-visible latency budgeted from measurement rather than a fixed TOPS-only estimate.'
  common_mistake: |
    **The Pitfall:** Not specifying per-conversation KV isolation or leveraging GQA quantization.
    **The Rationale:** Treating mobile LLM memory like cloud endpoints without strict per-user hardware boundaries.
    **The Consequence:** Context leakage between chats and severe memory ballooning that results in the OS killing the application process.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model: 3B parameters INT4.
    - Context: 4096 tokens, 32 layers, 8 KV heads, 128 head_dim.
    - Hardware: A17 Pro (35 TOPS).

    **Calculations:**
    - INT8 KV bytes per token = 32 layers * 2 (K/V) * 8 KV heads * 128 head_dim * 1 byte = 65,536 bytes = 64 KiB/token.
    - 4096-token INT8 KV cache = 4096 * 64 KiB = 256 MiB = 268.4 MB per active conversation.
    - INT4 KV option = 128 MiB = 134.2 MB per active conversation, at possible quality cost from KV quantization.
    - A dropped 4096-token cache requires a prefill pass over the prompt to rebuild K/V. A dense-model lower bound is 4096 * 3B params * 2 ops ≈ 24.6 TOPS-seconds; real prefill also includes attention, memory traffic, scheduling, and thermal effects, so production recovery latency must be measured and hidden behind background recompute where possible.

    **Conclusion & Interpretation:**
    - **Result: 268 MB INT8 KV per Active Conversation**. Production requirements should specify isolated per-chat KV allocation, INT4 fallback for pressure, eviction/offload policy, and measured prefill recovery behavior.
