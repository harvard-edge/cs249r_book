title: A17 Pro Unified Memory KV-Cache Architecture
scenario: You are architecting the KV-cache management for an on-device LLM summarizing long chat threads. To avoid OS termination, your app has a strict 2 GB peak memory budget, with the 4-bit quantized 3B model weights already consuming 1.5 GB.
question: How would you design a memory-safe KV-cache allocation and eviction policy that allows processing up to 4,000 tokens of context without exceeding the remaining 500 MB budget?
details:
  realistic_solution: The best design uses a statically pre-allocated ring buffer capped below the remaining memory budget to prevent OS-level OOM kills during dynamic allocation. To support 4,000 tokens, use quantized KV storage with fixed-size slots and simple eviction or truncation when the cap is reached; policies such as H2O can improve quality, but the core requirement is bounded allocation plus quantized KV.
  common_mistake: |
    **The Pitfall:** Proposing complex dynamic allocation schemes like PagedAttention without calculating maximum cache footprint.
    **The Rationale:** Candidates rely on server-side intuition, ignoring the severe penalties of dynamic memory spikes on mobile OS limits.
    **The Consequence:** The model breaches the physical limits of the unified memory pool, triggering immediate application crashes.
  napkin_math: |
    **Assumptions & Constraints:**
    - Total app budget = 2048 MB.
    - Model weights = 1536 MB.
    - Operational KV budget is capped at 500 MB to match the prompt and leave guard-band below the arithmetic 512 MB remainder.
    - 3B model: 32 layers, 3072 hidden size.

    **Calculations:**
    - Arithmetic remainder = 2048 MB - 1536 MB = 512 MB, but the allocator policy should enforce a 500 MB KV cap.
    - FP16 KV-cache/token = 2 (K, V) x 32 x 3072 x 2 bytes = 393,216 bytes, about 384 KiB.
    - Full 4,000 token context (FP16) = 4000 x 384 KiB = about 1.46 GiB, which exceeds the 512 MB budget.
    - Ideal 4-bit KV quantization is a 4x reduction: about 96 KiB/token before scales and block metadata.
    - 4-bit 4,000 token context = 4000 x 96 KiB = about 375 MiB, or roughly 384 MB, before metadata.

    **Conclusion & Interpretation:**
    - **Result: ~384 MB before metadata (Memory-Bound)**. FP16 is impossible; quantized KV must use a fixed-capacity ring buffer with eviction or truncation so raw cache plus metadata stays under the strict 500 MB cap.
