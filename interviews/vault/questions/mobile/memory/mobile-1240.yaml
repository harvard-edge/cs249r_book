title: A17 Pro Unified Memory KV-Cache Architecture
scenario: You are architecting the KV-cache management for an on-device LLM summarizing long chat threads. To avoid OS termination, your app has a strict 2 GB peak memory budget, with the 4-bit quantized 3B model weights already consuming 1.5 GB.
question: How would you design a memory-safe KV-cache allocation and eviction policy that allows processing up to 4,000 tokens of context without exceeding the remaining 500 MB budget?
details:
  realistic_solution: The best design uses a statically pre-allocated ring buffer capped at 450 MB to prevent OS-level OOM kills during dynamic allocation. To support 4,000 tokens, the architecture must incorporate 4-bit KV-cache quantization and an aggressive token eviction policy like Heavy-Hitter Oracle (H2O).
  common_mistake: |
    **The Pitfall:** Proposing complex dynamic allocation schemes like PagedAttention without calculating maximum cache footprint.
    **The Rationale:** Candidates rely on server-side intuition, ignoring the severe penalties of dynamic memory spikes on mobile OS limits.
    **The Consequence:** The model breaches the physical limits of the unified memory pool, triggering immediate application crashes.
  napkin_math: |
    **Assumptions & Constraints:**
    - Total app budget = 2048 MB.
    - Model weights = 1536 MB.
    - 3B model: 32 layers, 3072 hidden size.

    **Calculations:**
    - Remaining RAM = 2048 MB - 1536 MB = 512 MB.
    - FP16 KV-cache/token = 2 (K, V) x 32 x 3072 x 2 bytes = 393,216 bytes (~0.38 MB).
    - Full 4,000 token context (FP16) = 4000 x 0.38 MB = 1520 MB (Fails: 1520 > 512).
    - 4-bit KV quantization reduces footprint to ~0.09 MB/token.
    - 4-bit 4,000 token context = 4000 x 0.09 MB = 360 MB.

    **Conclusion & Interpretation:**
    - **Result: 360 MB (Memory-Bound)**. FP16 is impossible; the design mandates 4-bit quantization to safely fit the 360 MB cache into the remaining 512 MB pool alongside activations.
