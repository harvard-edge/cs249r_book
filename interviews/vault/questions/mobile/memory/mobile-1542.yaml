title: On-Device LLM KV-Cache Optimization for Google Tensor G3
scenario: You are tasked with deploying a large language model (LLM) for an on-device AI assistant on a smartphone powered by the Google Tensor G3 chip. The LLM needs to efficiently handle conversational contexts ranging from short queries to complex, multi-turn dialogues with varying lengths.
question: How would you design a KV-cache management strategy that optimizes inference performance and mitigates memory pressure on the 12GB constraint for long contexts?
details:
  realistic_solution: 'A robust solution would involve implementing a paged attention mechanism to efficiently manage KV-cache memory as non-contiguous blocks, minimizing fragmentation. Employ an adaptive eviction policy (e.g., a variant of LFU or a utility-based approach that prioritizes tokens based on their predicted future relevance) rather than simple LRU. Further optimize by exploring aggressive quantization (e.g., INT4 or INT8) for the KV-cache entries themselves to significantly reduce memory footprint, carefully evaluating the performance-accuracy trade-off on the Tensor G3''s TPU capabilities.'
  common_mistake: |
    **The Pitfall:** Implementing a naive, fixed-size KV-cache with simple FIFO/LRU eviction.
    **The Rationale:** Candidates ignore the strict 12 GB LPDDR5X bandwidth limits and dynamic conversational lengths.
    **The Consequence:** Excessive cache thrashing, frequent recomputations, out-of-memory errors, and severe unresponsiveness.
  napkin_math: |
    **Assumptions & Constraints:**
    - Context Limit: 4096 tokens.
    - Format: INT8.

    **Calculations:**
    - KV-Cache Per Token (INT8): 2 (K,V) * 20 (layers) * 24 (heads) * 96 (dim) * 1 (byte) = 92,160 bytes (~90 KB).
    - Total KV-Cache (4096 tokens): 4096 * 90 KB = ~360 MB.
    - Concurrency Impact: 10 concurrent contexts or background tasks = 3.6 GB.

    **Conclusion & Interpretation:**
    - **Result: 3.6 GB (Memory-Bound)**. 3.6 GB KV-Cache requirement alone puts massive pressure on the 12 GB shared RAM.
