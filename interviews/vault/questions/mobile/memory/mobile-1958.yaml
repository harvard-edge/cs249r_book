title: INT8 Context Window Doubling
scenario: An on-device LLM context length hits 4096 tokens, pushing total RAM use over the iOS App limit. Model weights take 1GB.
question: Analyze how KV-cache quantization (FP16 to INT8) impacts memory limits and maximum sequence length.
visual:
  kind: svg
  path: mobile-1958.svg
  alt: Bar chart comparing 3GB total RAM for FP16 vs 2GB total RAM for INT8
  caption: 'RAM Footprint: FP16 vs INT8 KV Cache'
details:
  realistic_solution: |
    At 4096 tokens, the FP16 KV cache consumes 2GB, bringing total RAM to 3GB. By applying KV-cache quantization (e.g., INT8 or INT4 block-wise quantization), the cache size halves to 1GB. This frees up 1GB of RAM, enabling the system to double the context window to 8192 tokens without exceeding the strict OS memory limits.
  common_mistake: |
    **The Pitfall:** Quantizing model weights instead of the KV-cache.
    **The Rationale:** Candidates often assume that if a model OOMs, the weights must be reduced, missing that sequence length memory pressure is governed entirely by the KV cache scaling.
    **The Consequence:** Unnecessarily degrading model quality by aggressively quantizing weights while failing to solve the context window bottleneck.
  napkin_math: |
    **Assumptions & Constraints:**
    - Context Length: 4096 tokens
    - App Memory Limit: 3 GB
    - Model Weights: 1 GB
    - Current FP16 KV Cache: 2 GB

    **Calculations:**
    - INT8 Quantized KV Cache = 2 GB / 2 = 1 GB
    - New Total RAM (4096 tokens) = 1 GB (weights) + 1 GB (KV) = 2 GB
    - Max Context Length at 3 GB limit = 2 GB available for KV / (1 GB / 4096 tokens) = 8192 tokens

    **Conclusion & Interpretation:**
    - **Result: 8192 tokens (Memory Capacity-Bound)**. INT8 quantization doubles sequence length to 8192 tokens.
