title: 'KV-Cache: Evaluate Sliding Window vs Full KV Cache for Mobile LLM'
scenario: You must compare two KV cache strategies for a 1B LLM for a long-running conversation. The strategies are (A) full KV cache and (B) sliding window (window size 512 tokens).
question: How would you evaluate memory, quality, and latency over a 50-turn, 3000-token conversation for these two KV cache strategies?
details:
  realistic_solution: 'Full KV: memory grows linearly, latency grows linearly with context. Sliding window: constant memory and latency, but loses information from >512 turns ago. Quality impact depends on conversation type.'
  common_mistake: |
    **The Pitfall:** Ignoring latency and memory benefits of sliding windows.
    **The Rationale:** Candidates often assume sliding window has no quality impact, or they fail to quantify the memory savings and constant latency benefits for very long contexts.
    **The Consequence:** Deploying a full KV cache that eventually OOMs or becomes unacceptably slow during long conversations.
  napkin_math: |
    **Assumptions & Constraints:**
    - Conversation length: 50 turns, 3000 tokens total across the conversation.
    - Sliding window size: 512 tokens.
    - KV per token: 98.3 KB.
    - Bandwidth: 51 GB/s for KV traffic only; model weights and compute are separate decode costs.

    **Calculations:**
    - Full KV Memory (3000 tokens): 3000 * 98.3 KB = 295 MB.
    - Sliding Window Memory (512 tokens): 512 * 98.3 KB = 50.3 MB.
    - KV bandwidth lower bound at the final token:
      - Full KV: 295 MB / 51 GB/s = 5.8 ms of KV traffic.
      - Sliding window: 50.3 MB / 51 GB/s = 1.0 ms of KV traffic.
    - The weight-read and compute cost must be added to both strategies, so these are not end-to-end token latencies.

    **Conclusion & Interpretation:**
    - **Result: Memory and KV-Bandwidth Bound**. Sliding window uses ~5.86x less KV memory and reduces the context-dependent KV traffic by the same factor, but it trades away access to tokens older than the 512-token window.
