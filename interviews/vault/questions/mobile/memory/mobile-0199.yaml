title: 'The OS Kill Switch: Mobile Memory'
scenario: 'Your team is planning to deploy a new generative model to your mobile app. The target device is a high-end smartphone with 8 GB of RAM.'
question: 'What maximum total app memory budget should you target on an 8 GB smartphone to avoid OS termination?'
details:
  realistic_solution: 'The correct rule of thumb is to target approximately 25% of the total device RAM for your entire application process. On a device with 8 GB of RAM, this translates to a 2 GB budget. This budget must accommodate not just the ML model''s weights, but also runtime activations, the application''s UI, and all other process heap. Exceeding this is risky and can lead to the OS terminating your app.'
  common_mistake: 'Engineers accustomed to cloud or desktop environments often assume they can use a large fraction (50-75%) of the device''s RAM. They forget that mobile operating systems like iOS and Android reserve significant memory for themselves and other background processes, and will aggressively terminate any single app that exceeds its ''fair share'' to preserve system stability and user experience.'
  napkin_math: |
    **Assumptions & Constraints:**
    - Device RAM: 8 GB.
    - Safe app budget ratio: ~25% of total device RAM.

    **Calculations:**
    - Total App Budget: 8 GB * 0.25 = 2 GB.

    **Conclusion & Interpretation:**
    - **Result: 2 GB (Memory-Bound).** Exceeding a 2 GB allocation on an 8 GB device dramatically increases the risk of OS-level termination, enforcing strict limits on model sizing.
  options:
  - '6 GB'
  - '8 GB'
  - '2 GB'
  - '500 MB'
  correct_index: 2
