title: KV-Cache Persistence Across App Sessions on Mobile
scenario: Your on-device LLM assistant must maintain conversation context across app backgrounding. iOS kills backgrounded apps within 30 seconds. The KV-cache for a 2K-token conversation is 64 MB.
question: How would you design a KV-cache persistence strategy that avoids re-prefilling tokens when the app is relaunched?
details:
  realistic_solution: 'Strategy: use OS-permitted state restoration, with KV-cache persistence as a best-effort optimization rather than a guarantee of arbitrary background execution. (1) On UIApplicationDidEnterBackground, request background execution time and attempt to serialize the 64 MB KV tensor to the app''s sandbox directory, but also persist the token IDs and conversation metadata so the app can re-prefill if iOS suspends or kills it before the write completes. Uncompressed persistence on iPhone-class NVMe at ~2 GB/s write takes about 32ms in a favorable foreground-to-background window, but production code must handle shorter windows, thermal limits, energy pressure, and sandboxed file protection. (2) On app relaunch, an uncompressed 64 MB read at ~3 GB/s takes about 21ms, skipping prefill only when the cache file is complete and compatible. (3) Compression: LZ4-compress the KV-cache before writing. FP16 KV data compresses ~1.5x to about 43 MB, so write time is about 21ms and read
    time is about 14ms; add roughly 3-5ms to decompress into the runtime KV tensor. (4) Validation/security: include a hash of the model version + conversation token IDs, encrypt the serialized state at rest, and store a schema version so stale or incompatible caches are invalidated and re-prefilled. (5) Memory pressure handling: register for UIKit memory warnings. On low-memory warning, proactively serialize if allowed and free KV-cache, but rely on durable user-visible conversation state as the correctness path. (6) Alternative: quantize KV to INT4 for persistence (16 MB, 8ms write/5ms read), dequantize to FP16 on reload after measuring quality impact for the target model.'
  common_mistake: |
    **The Pitfall:** Relying on background tasks to keep the KV-cache alive in RAM.
    **The Rationale:** Mobile developers used to cloud environments assume they can keep memory hot indefinitely, fighting strict OS background suspension rules.
    **The Consequence:** The OS forcefully terminates the app, losing the cache and forcing a slow, battery-draining re-prefill on the next launch.
  napkin_math: |
    **Assumptions & Constraints:**
    - KV-Cache Size: 64 MB (FP16).
    - Flash Storage Write Speed: ~2 GB/s approximate device-level throughput.
    - Flash Storage Read Speed: ~3 GB/s approximate device-level throughput.
    - Background execution, thermal state, encryption, and app-sandbox I/O can reduce sustained throughput.
    - LZ4 Compression Ratio: ~1.5x (43 MB compressed).
    - 2K tokens prefill time: ~500 ms.

    **Calculations:**
    - Uncompressed Write Time: 64 MB / 2 GB/s = ~32 ms.
    - Uncompressed Read Time: 64 MB / 3 GB/s = ~21 ms.
    - Compressed Write Time: 43 MB / 2 GB/s = ~21 ms.
    - Compressed Read Time: 43 MB / 3 GB/s = ~14 ms.
    - LZ4 Decompression Time: ~3-5 ms.
    - Compressed Reload Time: 14 ms read + ~5 ms decompression = ~19 ms.
    - Prefill Latency Saved: 500 ms - 19 ms = ~481 ms.

    **Conclusion & Interpretation:**
    - **Result: ~19ms compressed reload time under favorable I/O conditions.** The I/O read is about 14ms, total reload after decompression is about 19ms, and the strategy can save roughly 480ms of compute-bound prefill latency on app resume if background execution, security, and versioning constraints are handled.
