title: Multi-Turn Chat Degradation
scenario: In a mobile voice assistant using a 3B LLM, the first turn has a TTFT of 150ms. By the tenth turn with an accumulated 2000 tokens, TTFT degrades to 4500ms, though decode speed remains constant. The profiler shows no thermal throttling.
question: Why does multi-turn mobile chat TTFT degrade as history grows while decode speed stays constant?
details:
  realistic_solution: |
    The TTFT degradation indicates a failure to maintain a persistent, appendable KV cache across dialogue turns. Without a stateful memory buffer, the LLM is forced to execute a full prefill over the entire conversation history for every new turn. Prefill attention work grows roughly with the square of context length, while decode speed can remain constant because each generated token still performs the same incremental step once the cache exists for that turn. The fix is to keep a pre-allocated, ring-buffered or paged KV cache alive across JNI/C++ boundaries so each new turn only prefills the newly appended prompt tokens instead of recomputing the full 2000-token history.
  common_mistake: |
    **The Pitfall:** Assuming the decode phase is slowing down due to the larger KV cache.
    **The Rationale:** Candidates see latency degrade and assume memory bandwidth during token generation is the issue.
    **The Consequence:** This contradicts the constant decode speed metric and leads them to optimize the wrong phase.
  napkin_math: |
    **Assumptions & Constraints:**
    - Prefill compute scales quadratically $O(N^2)$. Decode phase is linear.
    - Turn 1 context: 100 tokens. TTFT: 150ms.
    - Turn 10 context: 2000 tokens. TTFT: 4500ms.

    **Calculations:**
    - Turn 1 attention operations roughly proportional to $100^2 = 10,000$.
    - Turn 10 attention operations roughly proportional to $2000^2 = 4,000,000$.
    - Context length grows 20x, so full-prefill attention work grows about $20^2 = 400x$.
    - Observed TTFT grows from 150ms to 4500ms, a 30x increase, which is directionally consistent with repeated full-prefill work plus fixed overheads, kernel effects, and non-attention costs.

    **Conclusion & Interpretation:**
    - **Result: Full-Prefill Recompute.** The growing history inflates TTFT because each turn recomputes the accumulated context instead of reusing persisted KV state. Persisting the KV cache removes that repeated full-history prefill; the exact recovered TTFT depends on the number of new prompt tokens and device kernels.
