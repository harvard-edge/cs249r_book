title: Multi-Turn Chat Degradation
scenario: In a mobile voice assistant using a 3B LLM, the first turn has a TTFT of 150ms. By the tenth turn with an accumulated 2000 tokens, TTFT degrades to 4500ms, though decode speed remains constant. The profiler shows no thermal throttling.
question: Why does multi-turn mobile chat TTFT degrade as history grows while decode speed stays constant?
details:
  realistic_solution: |
    The catastrophic TTFT degradation indicates a failure to maintain a persistent, appendable KV Cache across dialogue turns. Without a stateful memory buffer, the LLM is forced to execute a full re-computation of the entire context history during the 'Prefill' phase for every new turn. Attention computation scales quadratically $O(N^2)$ with sequence length, causing exponential latency bloat. The solution is architecting a pre-allocated, ring-buffered KV cache (e.g., using PagedAttention) that persists across JNI/C++ boundaries, ensuring each turn only computes attention for the *new* tokens, dropping TTFT back to ~15ms.
  common_mistake: |
    **The Pitfall:** Assuming the decode phase is slowing down due to the larger KV cache.
    **The Rationale:** Candidates see latency degrade and assume memory bandwidth during token generation is the issue.
    **The Consequence:** This contradicts the constant decode speed metric and leads them to optimize the wrong phase.
  napkin_math: |
    **Assumptions & Constraints:**
    - Prefill compute scales quadratically $O(N^2)$. Decode phase is linear.
    - Turn 1 context: 100 tokens. TTFT: 150ms.
    - Turn 10 context: 2000 tokens. TTFT: 4500ms.

    **Calculations:**
    - Turn 1 attention operations roughly proportional to $100^2 = 10,000$.
    - Turn 10 attention operations roughly proportional to $2000^2 = 4,000,000$.
    - Compute complexity multiplier = 4,000,000 / 10,000 = 400x increase.
    - Projected TTFT based on compute scaling: massive delay (hardware vectorization mitigates it down to the observed 4500ms).

    **Conclusion & Interpretation:**
    - **Result: 400x increase (Prefill Compute-Bound)**. The quadratic scaling of the self-attention mechanism during a full recompute obliterates latency. Persisting the KV Cache is an absolute architectural mandate for mobile multi-turn applications.
