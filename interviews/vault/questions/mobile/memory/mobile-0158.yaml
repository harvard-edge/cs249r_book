title: The App Memory Guillotine
scenario: You're designing a new real-time camera filter for an Android app.
question: What safe memory budget should an Android ML feature target on a phone with 8 GB of RAM?
details:
  realistic_solution: A safe rule of thumb is that a single foreground application can use about 25% of the total system RAM. For a device with 8 GB of RAM, this means your application's total memory footprint, including the model, activations, and UI, should stay below ~2 GB.
  common_mistake: |
    **The Pitfall:** Assuming mobile apps can use the majority of the device's RAM.
    **The Rationale:** Engineers accustomed to desktop development forget that mobile operating systems aggressively protect RAM for background services and the OS to ensure a smooth UI.
    **The Consequence:** The ML feature easily exceeds the implicit budget, triggering rapid eviction ('jank' or an OS kill) during usage.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Total system RAM: 8 GB.
       - OS heuristic: ~25% safe foreground application budget.
    2. **Calculations:**
       - 8 GB * 0.25 = 2 GB limit.
    3. **Conclusion & Interpretation:**
       - **Result: 2 GB memory footprint limit. Exceeding this risks OOM kills.**
  options:
  - Roughly 6-7 GB, since the OS only needs about 1-2 GB.
  - Approximately 2 GB.
  - Around 4 GB, which is half of the total RAM.
  - Unlimited, as long as the user isn't running other apps.
  correct_index: 1
