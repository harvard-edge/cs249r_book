title: Android TFLite Model Loading OOM on a 4 GB Phone
scenario: 'Your Android app loads two ML models: a face detection model (15 MB) and a face mesh model (8 MB). On a Samsung Galaxy A14, the app works fine in isolation. But when the user has WhatsApp, Chrome, and Spotify running, your app crashes with an OOM error.'
question: Your models only use 23 MB — how can that cause OOM on a 4 GB device?
details:
  realistic_solution: Android OOM is governed by the app process budget and by heap/native allocations, not by the phone's total 4 GB of RAM. The 23 MB of TFLite files are only the serialized weights; loading can add interpreter objects, tensor arenas, input/output buffers, activation scratch space, and duplicated model buffers if the files are read into byte arrays. With a 50 MB app baseline, 23 MB of copied weights, and 50-70 MB of runtime arena and image buffers, the process can approach or exceed a budget-class device's practical memory limit. Fixes include memory-mapped model files to avoid duplicate heap copies, reducing peak tensor arenas, releasing intermediate image buffers, and profiling native plus Java heap on the target device.
  common_mistake: |
    **The Pitfall:** Believing there must be a memory leak since 23 MB of models "can't possibly" cause OOM on a 4 GB device.
    **The Rationale:** Engineers confuse total physical RAM with the strict per-app heap limits enforced by the Android OS.
    **The Consequence:** They spend hours hunting for non-existent memory leaks instead of switching to memory-mapped loading.
  napkin_math: |
    **Assumptions & Constraints:**
    - Practical process budget on the target budget device: roughly 128-192 MB before OOM risk from heap/native pressure.
    - App baseline usage: ~50 MB.
    - Model File Size: 23 MB.

    **Calculations:**
    - Eager copied load: 23 MB model bytes held in the app + 23 MB file-backed/runtime copy risk + ~50-70 MB tensor arena, activations, and I/O buffers = ~96-116 MB model-related memory.
    - Total process memory: ~50 MB app baseline + ~96-116 MB model-related memory = ~146-166 MB.
    - That fits in isolation on some devices but can fail once camera/image buffers, fragmentation, or background pressure reduce available headroom.
    - Memory-mapped loading removes the eager 23 MB heap copy and keeps clean weight pages file-backed, reducing peak process pressure by roughly the copied model size rather than by the whole runtime arena.

    **Conclusion & Interpretation:**
    - **Result: Memory-Capacity-Bound.** A 23 MB serialized model can drive OOM because runtime tensors and duplicate loading buffers dominate the peak; mmap helps by avoiding heap duplication, but activation and image-buffer peaks must still be controlled.
