title: OOM Crash on A17 Pro During High-Res Inference
scenario: You are deploying a vision model on an iPhone 15 Pro. When processing a batch of high-resolution images (1024x1024), the application suddenly crashes due to a Jetsam event (OS-level memory eviction), despite the model weights only taking up 1.5 GB.
question: Why did the OS kill the process during high-res inference, and how does the unified memory architecture contribute?
details:
  realistic_solution: The crash is driven by peak activation memory spikes during high-resolution forward passes. In iOS's unified memory architecture, the app, model weights, activations, graphics resources, and temporary accelerator workspaces all compete for the same physical RAM, and Jetsam limits vary with device state rather than following a fixed percentage of total RAM. When the sum of static weights, peak activation buffers, app heap, and temporary buffers leaves too little headroom, Jetsam can kill the process. The solution requires tiling the input via patch-based inference, fusing operations to avoid materializing intermediate tensors in DRAM, or implementing dynamic activation recomputation.
  common_mistake: |
    **The Pitfall:** Assuming that if model weights fit in memory, the model will execute without memory pressure.
    **The Rationale:** Engineers focus strictly on the static parameter count and ignore the dynamic activation memory required during high-resolution forward passes.
    **The Consequence:** Unpredictable app crashes (Jetsam events) under load because massive intermediate feature maps drastically exceed the shared unified memory budget.
  napkin_math: |
    **Assumptions & Constraints:**
    - Total unified RAM: 8 GB. Practical app headroom varies by OS state, foreground pressure, graphics load, and Jetsam priority.
    - Weights footprint: 1.5 GB.
    - Activation map: 1024x1024 spatial, 256 channels, FP16 (2 bytes/element).
    - Residual block peak: Requires 4 concurrent feature maps.
    - App/UI overhead: 1.0 GB.
    - Allocator, NPU workspace, and temporary tensor overhead: 0.7-1.2 GB.

    **Calculations:**
    - Single feature map: 1024 * 1024 * 256 * 2 bytes = 536.8 MB.
    - Peak activation memory: 4 * 536.8 MB = 2.15 GB.
    - Subtotal before temporary overhead: 1.5 GB (weights) + 2.15 GB (activations) + 1.0 GB (app) = 4.65 GB.
    - Estimated peak with workspace/allocator overhead: 4.65 GB + 0.7-1.2 GB = 5.35-5.85 GB.

    **Conclusion & Interpretation:**
    - **Result: Memory-pressure risk, not a fixed deterministic budget**. A 5.35-5.85 GB peak can approach or exceed practical foreground headroom on an 8 GB device once the OS, camera/graphics, and other resident memory are considered, making Jetsam likely under pressure.
