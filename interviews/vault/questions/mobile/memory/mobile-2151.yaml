title: 'KV-Cache: Diagnose Latency Spikes in Dynamic Paged Allocation'
scenario: You implemented a paged KV-cache for a 2B LLM on a flagship mobile device, dynamically allocating
  memory in 16-token blocks as the conversation grows. Around 3,000 tokens, generation pauses for over
  a second exactly at page allocation boundaries. Shortly after, the app is terminated by the OS Low Memory
  Killer (LMK), even though diagnostics show 1GB of 'free' memory.
question: Why do these severe latency spikes and OOM kills occur at allocation boundaries despite available
  memory, and what mobile OS dynamic drives this behavior?
details:
  realistic_solution: On mobile operating systems, 'free' memory often includes compressed RAM or cached
    background apps. Dynamically requesting new KV cache pages forces the OS to synchronously compress
    existing memory or terminate background processes to satisfy the allocation, causing massive blocking
    latency. The rapid sequence of fragmented allocations eventually trips the LMK's aggressive thresholds,
    resulting in a SIGKILL.
  common_mistake: '**The Pitfall:** Assuming dynamic memory allocations execute in constant time as long
    as there is mathematically ''free'' RAM.

    **The Rationale:** Engineers accustomed to server environments expect allocations to be fast and to
    fail gracefully only when physical memory is truly exhausted.

    **The Consequence:** The model stutters severely at page boundaries due to thread-blocking OS interventions,
    and the app is abruptly killed without warning to protect system stability.'
  napkin_math: '**Assumptions & Constraints:** KV cache per token is 0.5 MB. A 16-token page requires
    8 MB. System RAM is highly utilized.


    **Calculations:** A normal DRAM access for 8 MB at 50 GB/s bandwidth takes ~0.16 ms. However, if the
    allocation triggers the OS memory compressor or a background app kill, the system call can block for
    500-1000 ms.


    **Conclusion:** The latency at page boundaries jumps by over 3000x compared to a normal read because
    the allocation falls off the fast path, dominating the token generation time.'
