title: Implementing Shared mmap for Edge LLMs
scenario: You are deploying a 15 GB INT8 LLM on a Jetson Orin running two separate inference processes. Both processes need read-only access to the exact same model weights.
question: How much RAM does shared read-only mmap save for two Jetson Orin processes loading the same 15 GB INT8 LLM, and which flags are required?
details:
  realistic_solution: The implementation must use the PROT_READ and MAP_SHARED flags in the mmap call. MAP_SHARED allows both processes to map their virtual memory addresses to the exact same underlying physical pages in the OS page cache.
  common_mistake: |
    **The Pitfall:** Using MAP_PRIVATE instead of MAP_SHARED.
    **The Rationale:** Candidates fail to understand POSIX mmap flags, accidentally creating Copy-On-Write boundaries that strictly duplicate physical memory.
    **The Consequence:** Massive, unnecessary duplication of weights causing an immediate out-of-memory crash.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target Device: Jetson Orin.
    - Model: 15 GB INT8 footprint.
    - Processes: 2 isolated inference endpoints.

    **Calculations:**
    - Independent Memory Load: 15 GB * 2 = 30 GB.
    - Shared mmap Load: 15 GB (first process) + 0 GB (second process page hits) = 15 GB.
    - Memory Saved: 30 GB - 15 GB = 15 GB.

    **Conclusion & Interpretation:**
    - **Result: 15 GB Saved (Memory-Capacity-Bound)**. By utilizing PROT_READ and MAP_SHARED, exactly 15 GB of physical RAM is saved, safely isolating dual processes within limits.
