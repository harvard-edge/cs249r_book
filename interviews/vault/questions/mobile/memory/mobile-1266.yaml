title: Diagnosing Page Thrashing on Apple A17 Pro
scenario: You have deployed a 3 GB int8 language model on an iPhone 15 Pro utilizing the Apple A17 Pro Neural Engine. To optimize memory, you load the weights using memory mapping (mmap) rather than loading them directly into RAM. Telemetry shows that inference latency is normally around 200ms, but when users switch to the camera app and then back to your app, inference latency spikes to over 2.5 seconds, accompanied by severe UI stuttering.
question: Why does an mmap-backed 3GB A17 Pro language model spike to over 2.5 seconds after switching from the camera app?
details:
  realistic_solution: The root cause is OS-level page thrashing. The A17 Pro uses 8 GB of shared unified memory. When a memory-intensive app like the camera opens, iOS can reclaim inactive mmap-backed model pages from the page cache to make room for GPU, ISP, and app buffers. When the user switches back, inference touches those weights again and triggers hard page faults that reload pages from NVMe into unified memory before the affected layers can proceed. The stall is page-fault recovery and storage I/O latency, not a direct Neural Engine compute-limit problem.
  common_mistake: |
    **The Pitfall:** Assuming mmap completely bypasses RAM or blaming the compute limits of the Neural Engine.
    **The Rationale:** Candidates forget the physical realities of the unified memory architecture and the OS page cache behavior.
    **The Consequence:** They chase phantom NPU optimizations while the system suffers from catastrophic I/O bottlenecks.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hardware: 8 GB Unified Memory.
    - Application needs while camera is foreground: iOS (~2.5 GB), camera pipeline plus GPU/ISP buffers (~3 GB), and other foreground/cache pressure (~2.5 GB).
    - Model mmap cache: 3 GB weights, reclaimable when inactive.
    - Storage Bandwidth (NVMe): ~1.2 GB/s.

    **Calculations:**
    - If only iOS and camera are counted: 8 GB - 2.5 GB - 3 GB = 2.5 GB remaining, so at least 0.5 GB of a 3 GB model cache must be reclaimed.
    - With additional foreground/cache pressure, reclaim can approach the full 3 GB mmap cache.
    - Page fault recovery time: 0.5 GB / 1.2 GB/s ≈ 0.42s minimum; 3.0 GB / 1.2 GB/s ≈ 2.5s worst case before decompression, scheduling, and UI stalls.

    **Conclusion & Interpretation:**
    - **Result: Disk I/O Bound.** The observed 2.5s spike is consistent with near-complete eviction of the mmap cache; partial eviction would produce a smaller but still visible stall.
