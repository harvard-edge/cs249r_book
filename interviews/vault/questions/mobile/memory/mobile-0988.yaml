title: 'Model Size Estimation: Design Memory-Efficient LLM Stack for Android Flagship'
scenario: Design a memory-efficient stack for running a 3B-parameter LLM on a flagship 16GB mobile device. The assistant app must coexist with the OS overhead and allow the user to switch to other apps without OOM-killing the LLM process.
question: How should a mobile device allocate precision, KV cache, and context length for a 3B LLM in 16 GB RAM?
details:
  realistic_solution: |
    Allocate a strictly budgeted memory pool to prevent OS eviction. Android OS requires ~3GB; standard app overhead (JVM, UI) takes ~1GB. Leaving ~12GB. To maximize headroom, quantize the 3B model to INT4 (W4A16), reducing weight footprint to 1.5GB. Allocate a fixed 3GB ring-buffer for the KV cache to prevent dynamic allocation fragmentation. For a 3B model (32 layers, 32 heads, 128 dim), the KV cache is ~524KB per token, yielding a max context of ~5,725 tokens. Wrap the LLM inference engine in an Android Foreground Service to elevate process priority, and implement an `onPause` callback to aggressively page the KV cache to flash storage, reloading on `onResume`.
  common_mistake: |
    **The Pitfall:** Designing for 16GB total RAM without reserving memory for the OS.
    **The Rationale:** Candidates assume all advertised device memory is available to their application.
    **The Consequence:** They fail to reserve memory for the Android system, background processes, and JVM heap, leading to immediate OOM kills.
  napkin_math: |
    **Assumptions & Constraints:**
    - Total RAM: 16 GB. Bandwidth: 77 GB/s.
    - OS + App Overhead: 3 GB + 1 GB = 4 GB.
    - Model: 3B parameters, quantized to INT4 (0.5 bytes/param).
    - Target: Maximize context length without triggering OOM.

    **Calculations:**
    - Model Weights (INT4): 3B * 0.5 bytes = 1.5 GB.
    - Base Memory Used: 4 GB (OS/App) + 1.5 GB (Weights) = 5.5 GB.
    - KV Cache Size for 4096 tokens: 4096 * (2 * 32 * 32 * 128 * 2 bytes) = 2.15 GB.
    - Total Resident Memory: 5.5 GB + 2.15 GB = 7.65 GB.
    - Available Background Headroom: 16 GB - 7.65 GB = 8.35 GB.
    - TPOT: 1.5 GB / 77 GB/s = 19.5 ms/token.

    **Conclusion & Interpretation:**
    - **Result: 19.5 ms/token (Memory Capacity-Bound)**. A 3B INT4 model with a 4096-token context consumes under 50% of system RAM, leaving a safe 8.35GB buffer for background apps. The 19.5ms TPOT easily meets real-time conversational thresholds.
