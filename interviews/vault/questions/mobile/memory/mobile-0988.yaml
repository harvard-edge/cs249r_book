title: 3B LLM Memory Budgeting on 16GB Android Devices
scenario: Design a memory-efficient stack for running a 3B-parameter LLM on a flagship 16GB mobile device. The assistant app must coexist with the OS overhead and allow the user to switch to other apps without OOM-killing the LLM process.
question: How should a mobile device allocate precision, KV cache, and context length for a 3B LLM in 16 GB RAM?
details:
  realistic_solution: |
    Allocate a strictly budgeted memory pool to prevent OS eviction. Reserve about 4GB for Android system and app overhead, then quantize the 3B model to INT4 (W4A16), reducing the weight footprint to 1.5GB. Size the KV cache explicitly instead of letting it grow without bound. For a 3B model with 32 layers, 32 KV heads, and 128-dimensional heads in FP16, the KV cache is 524,288 bytes/token = 512 KiB/token. A 3.0GB decimal KV budget supports about 5720 tokens; a 3 GiB binary budget supports 6144 tokens. In practice, choose a smaller cap, such as 4K tokens, if the app must coexist with other foreground work. Use a foreground service to reduce eviction risk, but do not assume KV cache should be paged to flash.
  common_mistake: |
    **The Pitfall:** Designing for 16GB total RAM without reserving memory for the OS.
    **The Rationale:** Candidates assume all advertised device memory is available to their application.
    **The Consequence:** They fail to reserve memory for the Android system, background processes, and JVM heap, leading to immediate OOM kills.
  napkin_math: |
    **Assumptions & Constraints:**
    - Total RAM: 16 GB.
    - OS + App Overhead: 3 GB + 1 GB = 4 GB.
    - Model: 3B parameters, quantized to INT4 (0.5 bytes/param).
    - Target: Maximize context length without triggering OOM.

    **Calculations:**
    - Model Weights (INT4): 3B * 0.5 bytes = 1.5 GB.
    - Base Memory Used: 4 GB (OS/App) + 1.5 GB (Weights) = 5.5 GB.
    - KV bytes/token: 2 (K,V) * 32 layers * 32 KV heads * 128 dim * 2 bytes = 524,288 bytes = 512 KiB.
    - KV Cache Size for 4096 tokens: 4096 * 524,288 bytes = 2.00 GiB = 2.15 GB decimal.
    - Total Resident Memory: 5.5 GB + 2.15 GB = 7.65 GB.
    - Available Background Headroom: 16 GB - 7.65 GB = 8.35 GB.
    - KV budget for 3.0 GB decimal: 3.0e9 bytes / 524,288 bytes per token ≈ 5722 tokens.
    - KV budget for 3 GiB binary: 3 * 1024^3 bytes / 524,288 bytes per token = 6144 tokens.

    **Conclusion & Interpretation:**
    - **Result: Memory capacity is the governing constraint.** A 3B INT4 model with a 4K context fits with substantial headroom on a 16GB device, and a fixed 3GB-class KV budget supports roughly 5.7K-6.1K tokens depending on decimal vs binary units. Use a fixed KV cap and keep headroom for other apps instead of paging the cache to flash.
