title: 3B LLM Memory Budgeting on 16GB Android Devices
scenario: Design a memory-efficient stack for running a 3B-parameter LLM on a flagship 16GB mobile device. The assistant app must coexist with the OS overhead and allow the user to switch to other apps without OOM-killing the LLM process.
question: How should a mobile device allocate precision, KV cache, and context length for a 3B LLM in 16 GB RAM?
details:
  realistic_solution: |
    Allocate a strictly budgeted memory pool to prevent OS eviction. Reserve about 4GB for Android system and app overhead, then quantize the 3B model to INT4 (W4A16), reducing the weight footprint to 1.5GB. Size the KV cache explicitly instead of letting it grow without bound. For a 3B model with 32 layers, 32 heads, and 128-dimensional heads, the KV cache is about 524KB per token, so a 3GB KV budget supports about 6,144 tokens. In practice, choose a smaller cap, such as 4K tokens, if the app must coexist with other foreground work. Use a foreground service to reduce eviction risk, but do not assume KV cache should be paged to flash.
  common_mistake: |
    **The Pitfall:** Designing for 16GB total RAM without reserving memory for the OS.
    **The Rationale:** Candidates assume all advertised device memory is available to their application.
    **The Consequence:** They fail to reserve memory for the Android system, background processes, and JVM heap, leading to immediate OOM kills.
  napkin_math: |
    **Assumptions & Constraints:**
    - Total RAM: 16 GB. Bandwidth: 77 GB/s.
    - OS + App Overhead: 3 GB + 1 GB = 4 GB.
    - Model: 3B parameters, quantized to INT4 (0.5 bytes/param).
    - Target: Maximize context length without triggering OOM.

    **Calculations:**
    - Model Weights (INT4): 3B * 0.5 bytes = 1.5 GB.
    - Base Memory Used: 4 GB (OS/App) + 1.5 GB (Weights) = 5.5 GB.
    - KV Cache Size for 4096 tokens: 4096 * (2 * 32 * 32 * 128 * 2 bytes) = 2.15 GB.
    - Total Resident Memory: 5.5 GB + 2.15 GB = 7.65 GB.
    - Available Background Headroom: 16 GB - 7.65 GB = 8.35 GB.
    - KV budget for 3 GB: 3 GB / 524 KB per token ≈ 6,144 tokens.
    - TPOT: 1.5 GB / 77 GB/s = 19.5 ms/token.

    **Conclusion & Interpretation:**
    - **Result: Memory capacity is the governing constraint.** A 3B INT4 model with a 4K context fits comfortably on a 16GB device, and a 3GB KV budget supports roughly 6K tokens. Use a fixed KV cap and keep some headroom for other apps instead of paging the cache to flash.
