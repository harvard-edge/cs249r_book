title: The Camera Pipeline Memory Contention
scenario: Your app runs a semantic segmentation model on live camera frames for an AR furniture placement feature. The phone's ISP is simultaneously processing raw Bayer sensor data into RGB frames. Both the ISP and your ML model compete for LPDDR5 DRAM bandwidth. Your ML inference latency is stable at 8ms when the camera is paused but spikes to 14ms during live preview.
question: Why does camera-preview segmentation rise from 8 ms to 14 ms when the ISP uses LPDDR5?
details:
  realistic_solution: The ISP and ML model share the same LPDDR5 bus, so live preview adds high-priority DRAM bursts and memory-controller arbitration that reduce the effective bandwidth available to the segmentation model. The NPU compute may be unchanged, but its tensor reads and writes wait behind ISP traffic, stretching inference from 8 ms to 14 ms. Fix the pipeline with bounded buffering, temporal scheduling around known ISP burst windows, lower preview bandwidth, or QoS/bandwidth partitioning where the platform supports it; do not assume a live preview can always trigger ML only after the ISP finishes.
  common_mistake: |
    **The Pitfall:** Assuming different hardware blocks operate entirely independently.
    **The Rationale:** Candidates know the ISP and NPU are distinct, isolated compute units, forgetting they share the same physical DRAM bus.
    **The Consequence:** The engineer wastes time optimizing NPU ops when the bottleneck is actually physical memory starvation.
  napkin_math: |
    **Assumptions & Constraints:**
    - Total effective DRAM ~35 GB/s.
    - ML steady-state bandwidth while the camera is paused: 1.35 GB/s.
    - ISP preview bursts take priority for part of the inference window.

    **Calculations:**
    - The 8 ms paused-camera inference represents a fixed amount of memory traffic.
    - To stretch that same traffic to 14 ms, the average bandwidth available to ML during preview is 1.35 GB/s * (8 ms / 14 ms) ≈ 0.77 GB/s.
    - That is a ~43% effective bandwidth share for ML during the affected window; the rest is lost to ISP priority bursts, row-buffer disruption, and arbitration overhead.

    **Conclusion & Interpretation:**
    - **Result: 14ms latency (Memory-Bandwidth-Bound)**. The preview path does not slow the NPU compute itself; it reduces the average DRAM bandwidth available to the model during overlapping ISP bursts.
