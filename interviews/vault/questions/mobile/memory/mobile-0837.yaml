title: SRAM Tiling for Super-Resolution
scenario: "You are designing an on-device super-resolution pipeline for the Apple A17 Pro Neural Engine using a U-Net model. The model has 8MB of weights, but processing a 4K image requires 48MB of activation memory, exceeding the NPU's local SRAM budget of 16MB."
question: "Formulate a spatial tiling strategy that minimizes main memory trips, specifying the maximum tile size and overlap given the remaining SRAM budget."
details:
  realistic_solution: "Calculate the remaining SRAM threshold by strictly isolating the required weight payload. Use the remaining budget to determine a unified patch dimension limit (including halo margins) that safely operates inside the SRAM boundaries. Then, engineer the inference loop to process patch by patch, completely bypassing main memory activation spillage."
  common_mistake: |
    **The Pitfall:** Forgetting to subtract the 8MB weight memory from the total 16MB SRAM budget.
    **The Rationale:** Candidates focus exclusively on calculating the activation memory footprint and forget that weights must concurrently reside in SRAM.
    **The Consequence:** The calculated tile size exceeds the physical SRAM limit, forcing the NPU to spill activations to main memory and destroying the performance gains of tiling.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Total NPU SRAM: 16 MB. Model Weights: 8 MB.
       - Target: RGB input/output, ~6 bytes per pixel activation footprint.
    2. **Calculations:**
       - Remaining SRAM for activations = 16 MB - 8 MB = 8 MB.
       - Maximum pixels per tile = 8 MB / 6 bytes ≈ 1.33 million pixels.
       - Tile Dimension = sqrt(1,333,333) ≈ 1154 pixels.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound.** To prevent catastrophic main memory spilling, the spatial tiling strategy must be strictly constrained to patches no larger than **1152x1152 pixels**.
