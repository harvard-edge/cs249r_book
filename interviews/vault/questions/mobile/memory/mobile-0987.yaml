title: 'Model Size Estimation: Design On-Device ML Memory Architecture for Dual-Model iPhone App'
scenario: Design the on-device memory architecture for an app that simultaneously runs a real-time portrait mode segmentation model (10M params INT8) for viewfinder preview at 60fps and a high-quality portrait model (50M params FP16) triggered on photo capture.
question: How should the app keep preview and high-quality portrait models in memory while meeting 60 FPS?
details:
  realistic_solution: 'Resident: preview model only (10MB INT8, ~50MB activations for 60fps). On capture trigger: load HQ model (100MB FP16). Memory: iOS + app: 2GB. Preview model: 60MB. Camera buffers: 3x4032x3024x3B (HEIF=~36MB per frame compressed; raw = 36MB x 3 buffers) -> use YUV420: 4032x3024x1.5=18.3MB x 3 buffers = 54.9MB. HQ model (on-demand): 100MB. KV-cache: N/A (CNN). Total: 2000+60+55+100=2215MB of 8192MB = 27%. Headroom for other app memory.'
  common_mistake: |
    **The Pitfall:** Keeping all models continuously resident in memory.
    **The Rationale:** Candidates often load all models at startup, missing that high-quality capture is a one-shot operation that doesn't need to run at 60 FPS.
    **The Consequence:** This unnecessarily consumes memory, increasing the risk of OS Jetsam evictions.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Preview Model (INT8): 10MB weights + ~50MB activations.
       - Camera Buffers (YUV420): 4032x3024x1.5 bytes = 18.3MB per frame, 3 buffers.
       - High-Quality Model (FP16): 50M params * 2 bytes = 100MB weights.
    2. **Calculations:**
       - Preview footprint = 10MB + 50MB = 60MB.
       - Buffer footprint = 18.3MB * 3 = 54.9MB.
       - Total continuous memory footprint = 60MB + 54.9MB = 114.9MB.
       - Total memory with HQ resident = 114.9MB + 100MB = 214.9MB.
    3. **Conclusion & Interpretation:**
       **Result: Memory-Bound Architecture. Loading the 100MB HQ model only on demand saves significant memory, and loading it from NVMe storage at 3 GB/s takes just ~33ms, well within acceptable capture latencies.**
