title: Mobile KV-Cache Constraint
scenario: A mobile processor is running a 7B LLM with INT4 weights, utilizing a 32-layer, 32-head, 128-dim
  architecture. You have exactly 2GB RAM allocated for the KV cache.
question: Analyze the KV-cache memory footprint for FP16 and determine how many 4096-token sessions can
  fit within the 2GB allocation.
visual:
  kind: svg
  path: mobile-1952.svg
  alt: Stacked bar showing 3.5GB Weights and 2.0GB KV cache
  caption: RAM Allocation Profile
details:
  realistic_solution: KV per token = 2 bytes * 2 * 32 * 32 * 128 = 524,288 bytes (~0.5MB). For 4096 tokens,
    cache is 4096 * 0.5MB = 2GB. Exactly 1 session fits in the allocated RAM.
  common_mistake: '**The Pitfall:** Forgetting to account for both Keys and Values in the calculation.

    **The Rationale:** Engineers compute the single tensor dimensions but neglect the ''2'' multiplier
    necessary for both states.

    **The Consequence:** Underestimating memory by exactly 50%, leading to production OOM crashes.

    '
  napkin_math: "1. **Assumptions & Constraints:**\n   - 32 layers, 32 heads, 128 dim.\n   - Precision:\
    \ FP16 (2 bytes).\n   - Allocation: 2 GB RAM.\n2. **Calculations:**\n   - KV per token = 2 bytes *\
    \ 2 (Key/Value) * 32 * 32 * 128 = 524,288 bytes (~0.5 MB).\n   - Max Context size: 4096 tokens * 0.5\
    \ MB = 2048 MB = 2 GB.\n3. **Conclusion & Interpretation:**\n   - **Result: Exactly 1 session fits\
    \ (Hard Memory Constraint).**\n"
