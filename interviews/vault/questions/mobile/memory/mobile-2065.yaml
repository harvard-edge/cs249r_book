title: 'NPU Memory Tiling for Attention'
scenario: 'A mobile NPU must compute exact dot-product attention for a sequence length of 4096. System LPDDR5 bandwidth is bottlenecking the generation phase.'
question: 'Design a memory tiling architecture that partitions the query, key, and value matrices into the NPU''s localized SRAM to minimize LPDDR5 fetch requests.'
details:
  realistic_solution: 'Implement FlashAttention-2 by tiling Query, Key, and Value matrices into NPU SRAM. Dynamically compute the Softmax denominator per block to avoid spilling the O(N^2) attention matrix to LPDDR5 DRAM.'
  common_mistake: |
    **The Pitfall:** Proposing standard matrix multiplication tiling without handling the Softmax denominator.
    **The Rationale:** Candidates forget that Softmax is a nonlinear operation requiring global information across the row.
    **The Consequence:** The design forces a full write-back of the massive N^2 attention matrix to DRAM, completely neutralizing the benefits of SRAM tiling.
  napkin_math: |
    **Assumptions & Constraints:**
    - Sequence Length: 4096.
    - Tile Block Size: 128x128.

    **Calculations:**
    - Tiles per Dimension: 4096 / 128 = 32 tiles.

    **Conclusion & Interpretation:**
    - **Result: 32 tiles (Memory-Bound)**. Memory complexity is reduced from O(N^2) to O(N * d^2 / M), fitting within NPU SRAM limits.
