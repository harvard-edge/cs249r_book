title: NPU Memory Tiering Specification
scenario: An LLM inference engine runs on a mobile NPU. The 7B parameter INT4 model exceeds the fast NPU SRAM but fits entirely in the device's main memory.
question: Create a layer execution and weight-tiering specification to maximize the auto-regressive token generation rate, detailing how to utilize the fast SRAM?
details:
  realistic_solution: Since auto-regressive token generation at batch size 1 is dominated by weight streaming, the execution plan should assume the 3.5GB INT4 weight set is streamed from main memory once per generated token unless a layer or tile is explicitly resident in fast SRAM. At 77 GB/s, full-weight streaming alone costs about 45ms/token, so SRAM should be used as a scratchpad for the currently executing layer tiles, dequantization buffers, and small hot metadata needed by the NPU kernels. The remaining weights should be laid out for sequential streaming from main memory; any KV-cache residency or LM-head pinning recommendation must be justified by the actual SRAM capacity and measured access frequency, not assumed from this bandwidth calculation alone.
  common_mistake: |
    **The Pitfall:** Trying to partition layers such that compute and memory overlap perfectly.
    **The Rationale:** Candidates ignore that auto-regressive decoding is overwhelmingly memory-bandwidth bound rather than compute-bound.
    **The Consequence:** Complex scheduling logic is created that provides zero performance benefit over simple sequential streaming.
  napkin_math: |
    **Assumptions & Constraints:**
    - 7B INT4 model size: ~3.5 GB.
    - Memory bandwidth: ~77 GB/s.
    - Baseline model: each generated token streams the full weight set once from main memory.

    **Calculations:**
    - Full-weight streaming time = 3.5 GB / 77 GB/s = 0.045s = ~45ms per generated token.
    - Baseline maximum throughput from weight streaming alone = 1 / 0.045s ≈ 22 tokens/sec.
    - KV-cache reads/writes are additional traffic and should be modeled separately from this weight-streaming lower bound.

    **Conclusion & Interpretation:**
    - **Result: ~22 tokens/sec Weight-Streaming Baseline.** This rate follows only from streaming 3.5GB of weights per token at 77 GB/s; SRAM tiering should reduce stalls by keeping active tiles and kernel scratch data local, while KV-cache placement requires a separate capacity and traffic analysis.
