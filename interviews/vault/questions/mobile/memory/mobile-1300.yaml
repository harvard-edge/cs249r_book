title: 'Mmap Strategies for Shared Memory'
scenario: 'You are leading the deployment of a 4-billion parameter language model on a mobile NPU. To mitigate cold start latency, you must evaluate two memory management alternatives: Alternative A uses `mmap` with `mlock` to pin the entire 8 GB model into RAM on app launch, while Alternative B uses pure `mmap` to load pages on demand during inference.'
question: "Should an 8GB FP16 model on a shared-memory architecture use mmap plus mlock or demand-paged mmap for predictable cold starts?"
details:
  realistic_solution: 'Alternative A (using `mmap` with `mlock`) is the superior choice for predictable latency. While pure `mmap` solves the initial cold start, the shared memory architecture means background processes can easily cause page evictions. The NPU will bottleneck on memory bandwidth if it constantly waits for page faults from storage.'
  common_mistake: |
    **The Pitfall:** Choosing pure mmap to minimize startup time.
    **The Rationale:** Blindly applying desktop lazy-loading techniques to memory-constrained mobile environments.
    **The Consequence:** Severe latency spikes caused by continuous page faults and thrashing as the OS evicts pages for other UI components.
  napkin_math: |
    **Assumptions & Constraints:**
    - Model Size: 4B params FP16 = 8 GB.
    - Available Shared RAM: 12 GB Total - 3 GB (OS/GPU) = 9 GB remaining.

    **Calculations:**
    - Page Fault Time: Fetching 2 MB chunk from UFS 4.0 (4 GB/s) takes 0.5 ms.
    - Compute Time: NPU processes 2 MB in < 0.1 ms.

    **Conclusion & Interpretation:**
    - **Result: Page Fault Thrashing (I/O-Bound)**. Pure mmap on shared memory leads to continuous page eviction and severe latency spikes during NPU processing.
