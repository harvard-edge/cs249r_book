title: Dynamic KV-Cache Paging for A17 Pro Unified Memory
scenario: You are designing the LLM inference engine for iOS running on the Apple A17 Pro. The system requires continuous background summarization using a 7B parameter model.
question: How should an iOS LLM engine manage KV-cache pages on the Apple A17 Pro's unified memory to avoid OOM while preserving Neural Engine utilization?
details:
  realistic_solution: A robust L6+ design must implement an OS-aware, multi-tiered KV-cache system with fixed-size pages and a hard resident budget. Keep the active attention window and most recent hot KV pages resident in Neural Engine-friendly packed buffers, spill colder pages in quantized or compressed form, and evict semantic low-value spans when iOS memory-pressure signals arrive. Schedule prefetch and compaction outside the decode critical path so the Neural Engine sees stable buffer residency instead of page faults or allocator churn. PagedAttention-style block allocation is useful, but it must be adapted to unified memory, app limits, display buffers, and OS reclaim behavior rather than assuming a dedicated server GPU memory pool.
  common_mistake: |
    **The Pitfall:** Proposing server-side solutions like standard PagedAttention.
    **The Rationale:** Candidates do not account for the A17 Pro's unified memory architecture where the OS can forcefully reclaim memory, incorrectly assuming the entire 8 GB is available for the LLM.
    **The Consequence:** The system crashes due to out-of-memory errors because it ignores the memory footprint of the OS, display buffers, and background apps.
  napkin_math: |
    **Assumptions & Constraints:**
    - Device memory example: 8 GiB unified memory.
    - 7B model at 4-bit quantization needs ~3.5 GiB resident for weights and runtime buffers.
    - iOS, display, and background apps reserve ~3 GiB.
    - Reserve ~0.25 GiB for allocator fragmentation, page tables, metadata, and prefetch slack.
    - Architecture has 32 layers and 4096 hidden dimension.

    **Calculations:**
    - Raw remaining memory = 8 GiB - 3.5 GiB - 3 GiB = 1.5 GiB.
    - Practical KV budget after overhead = 1.5 GiB - 0.25 GiB = 1.25 GiB.
    - FP16 KV cache per token = 2 (K&V) * 2 bytes * 32 * 4096 = 524,288 bytes = 512 KiB = 0.5 MiB.
    - Resident FP16 context in 1.25 GiB = 1.25 * 1024 MiB / 0.5 MiB = 2560 tokens.
    - FP16 KV cache for 8K context = 8192 tokens * 0.5 MiB/token = 4096 MiB = 4 GiB.

    **Conclusion & Interpretation:**
    - **Result: Memory-Bound.** An 8K FP16 KV cache needs roughly 4 GiB, far above a practical ~1.25 GiB resident KV budget. Fixed-size pages, hot-window residency, quantized cold pages, and prefetch outside the decode path preserve Neural Engine utilization by avoiding page faults and buffer churn during token generation.
