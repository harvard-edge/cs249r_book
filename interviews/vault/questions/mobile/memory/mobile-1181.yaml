title: Dynamic KV-Cache Paging for A17 Pro Unified Memory
scenario: "You are designing the LLM inference engine for iOS running on the Apple A17 Pro. The system requires continuous background summarization using a 7B parameter model."
question: "How should an iOS LLM engine manage KV-cache pages on the Apple A17 Pro's unified memory to avoid OOM while preserving Neural Engine utilization?"
details:
  realistic_solution: "A robust L6+ design must implement an OS-aware, multi-tiered KV-cache system with semantic eviction. It must directly interface with iOS memory pressure warnings (`didReceiveMemoryWarning`) to dynamically quantize the KV cache to Int4 or drop less-important tokens to maintain resident limits. Server-side techniques like PagedAttention alone are insufficient as they assume dedicated memory."
  common_mistake: |
    **The Pitfall:** Proposing server-side solutions like standard PagedAttention.
    **The Rationale:** Candidates do not account for the A17 Pro's unified memory architecture where the OS can forcefully reclaim memory, incorrectly assuming the entire 8 GB is available for the LLM.
    **The Consequence:** The system crashes due to out-of-memory errors because it ignores the memory footprint of the OS, display buffers, and background apps.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - 7B model (4-bit quantization) needs ~3.5 GB of unified memory.
       - iOS and background apps reserve ~3 GB.
       - Architecture has 32 layers and 4096 hidden dimension.
    2. **Calculations:**
       - Available memory for KV cache = 8 GB - 3.5 GB - 3 GB = 1.5 GB.
       - FP16 KV cache per token = 2 (K&V) * 2 bytes * 32 * 4096 = 512 KB.
       - Max context length in 1.5 GB = 1.5 GB / 512 KB = 3072 tokens.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound. To support an 8K context, the design must quantize the KV cache to 4-bit (reducing token footprint to 128 KB, expanding capacity to 12,288 tokens) or implement strict semantic eviction.**
