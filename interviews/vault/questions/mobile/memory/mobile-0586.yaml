title: The On-Device Vector Search Gone Wrong
scenario: 'Your note-taking app implements on-device semantic search using a 384-dim embedding model and a locally stored FAISS flat index. A power user with 50,000 notes reports search takes 8 seconds and sometimes returns completely wrong results.'
question: 'Why does FAISS flat search over 50,000 notes take 8 seconds and return stale recipe matches on an iPhone 14 Pro?'
details:
  realistic_solution: 'Two bugs: performance and correctness. Performance: FAISS flat scan over 73.2 MB causes 4,688 page faults x 1.5ms = 7.0s cold. Fix: IVF index (2.2 MB scan, 15ms) or HNSW (<1ms). Correctness: stale embeddings from edited/deleted notes cause phantom matches. An edited recipe note retains its old embedding, matching ''meeting notes.'' Fix: version-track embeddings, reindex on edits. With PQ8: index = 400 KB, fits in memory. Two separate bugs need two separate fixes.'
  common_mistake: |
    **The Pitfall:** Recommending an approximate index like HNSW to fix both latency and correctness.
    **The Rationale:** Engineers identify O(n) scans as the performance culprit and assume a faster index fixes everything.
    **The Consequence:** HNSW makes search fast, but fails to address the stale embeddings bug, meaning fast searches still return wrong notes.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Notes: 50,000. Dims: 384. Flat Index Footprint: ~73.2 MB.
       - I/O overhead: 1.5 ms per page fault.
    2. **Calculations:**
       - Cold start page faults: 4,688 faults * 1.5 ms = ~7.0 seconds.
       - PQ8 memory footprint: 50,000 notes * 8 bytes = 400 KB (+ codebook).
    3. **Conclusion & Interpretation:**
       - **Result: PQ8 Search < 1 ms (I/O Bottleneck Eliminated).**
