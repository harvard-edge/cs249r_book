title: The NCHW vs NHWC Memory Layout
scenario: You train a PyTorch model on an NVIDIA GPU using the standard `NCHW` memory layout. You convert it to TFLite and deploy it on an Android phone's CPU. The model accuracy is fine, but it runs 3x slower than a comparable model trained natively in TensorFlow.
question: Why does an NCHW PyTorch model run 3x slower than an NHWC-style TFLite model on an Android CPU?
details:
  realistic_solution: 'NCHW stores channels contiguously (all R, all G, all B); NHWC stores pixels contiguously (RGB per pixel). For 3x3 conv on CPU: NCHW requires 64 strided reads (~20 cycles each, cache misses); NHWC allows sequential reads (~2 cycles). 10x memory access cost makes identical arithmetic 3x slower. Fix: transpose to NHWC during conversion. GPU prefers NCHW; CPU/NPU prefer NHWC. Always match layout to target hardware.'
  common_mistake: |
    **The Pitfall:** Assuming TensorFlow is just natively better optimized for Android than PyTorch.
    **The Rationale:** Engineers attribute the performance difference to framework overhead rather than the underlying physical memory layout of the tensors.
    **The Consequence:** They waste time trying to optimize the PyTorch runtime instead of simply transposing the memory layout to NHWC during conversion.
  napkin_math: |
    **Assumptions & Constraints:**
    - NHWC (Sequential): Contiguous memory read takes ~2 cycles.
    - NCHW (Strided): Strided memory read (cache miss) takes ~20 cycles.
    - Convolution: 3x3 with 64 channels.

    **Calculations:**
    - Memory Access Cost: 20 cycles (NCHW) vs 2 cycles (NHWC) = 10x slower memory fetch.
    - Overall Execution: Memory access latency dominates, resulting in 3x slower end-to-end execution.

    **Conclusion & Interpretation:**
    - **Result: 3x Execution Latency (Memory-Bandwidth-Bound)**. Implicit memory layout mismatches critically bottleneck CPU cache hit ratios during convolution.
