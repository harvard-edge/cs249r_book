title: KV-Cache OOM on A17 Pro Unified Memory
scenario: You are deploying a 3B parameter transformer (hidden size 3072, 32 layers) quantized to 4-bit precision. The device has shared unified memory, but the OS restricts your background app to a strict 2.5 GB memory limit. During a long-context generation task reaching 4000 tokens, the application crashes with an Out-Of-Memory (OOM) error.
question: "Why does a 3B 4-bit transformer with 4000-token context OOM under a 2.5 GB background-app limit?"
details:
  realistic_solution: The dynamic KV-cache memory allocation pushes the total memory footprint over the 2.5 GB app limit. While 4-bit weights consume a static 1.5 GB, the unquantized FP16 KV-cache scales linearly with context length, eventually breaching the remaining 1.0 GB boundary.
  common_mistake: |
    **The Pitfall:** Only accounting for the static model weights.
    **The Rationale:** Candidates assume a 1.5 GB quantized model effortlessly fits inside a 2.5 GB boundary, completely ignoring dynamic memory.
    **The Consequence:** The application immediately crashes via OOM kill during long-context generation.
  napkin_math: |
    **Assumptions & Constraints:**
    - App limit: 2.5 GB.
    - Model: 3B params, 4-bit quantization.
    - KV Cache: 32 layers, 3072 hidden size, FP16 (2 bytes), 4000 tokens.
    
    **Calculations:**
    - Weights: 3 * 10^9 * 0.5 bytes = 1.5 GB.
    - KV Cache per Token: 2 (K,V) * 32 * 3072 * 2 bytes = 393,216 bytes (~0.39 MB).
    - KV Cache Total: 4000 * 0.39 MB = 1.56 GB.
    - Total Memory: 1.5 GB + 1.56 GB = 3.06 GB.
    
    **Conclusion & Interpretation:**
    - **Result: Memory-Bound**. 3.06 GB > 2.5 GB App Limit, leading to a guaranteed OOM crash.
