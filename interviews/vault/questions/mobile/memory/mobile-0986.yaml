title: 'Model Size Estimation: Analyze Why Mobile LLM Needs INT4 Despite 8GB RAM'
scenario: 'An engineer asks why a 3B parameter model needs INT4 quantization to run. They wonder if 8GB shouldn''t be enough for a 6GB FP16 model.'
question: 'Why does a 3B parameter model require INT4 quantization to run on an 8GB iPhone 16 Pro?'
details:
  realistic_solution: |
    8GB total. iOS system reserve: ~2GB (kernel, IOKit, Metal framework, NE firmware). App memory pressure: iOS kills apps > 4-5GB in practice. Available for ML app: ~3-4GB effective. 3B FP16: 6GB doesn't fit. 3B INT4: 1.5GB weights. KV at 2048 ctx (32 layers, 32 heads, 128 dim): 2048x524KB=1.07GB FP16. App + KV + model: 1.5+1.07+1GB app = 3.57GB. Fits in 4GB budget. INT4 is required not because of raw RAM but due to OS overhead and KV-cache needs.
  common_mistake: |
    **The Pitfall:** Assuming all physical RAM is available exclusively for the ML model.
    **The Rationale:** Developers accustomed to cloud environments fail to account for the mobile OS's strict memory reservations and aggressive app-killing policies for memory pressure.
    **The Consequence:** Deploying FP16 or INT8 models that instantly crash in production because they exceed the true effective memory budget.
  napkin_math: |
    **Assumptions & Constraints:**
    - Physical RAM: 8GB.
    - iOS Reserves: 2GB.
    - Safe App Budget: 4GB.

    **Calculations:**
    - FP16 Model: 6GB > 4GB (Fails).
    - INT8 Model: 3GB (weights) + 1GB (KV cache) + 0.5GB (app overhead) = 4.5GB (Fails).
    - INT4 Model: 1.5GB (weights) + 1GB (KV cache) + 0.5GB (app overhead) = 3.0GB (Safe).

    **Conclusion & Interpretation:**
    - **Result: 3GB footprint (Memory-Capacity-Bound)**. INT4 is mandatory to stay under the 4GB OS kill threshold.
