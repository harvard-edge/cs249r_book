title: 'Model Size Estimation: Analyze Why Mobile LLM Needs INT4 Despite 8GB RAM'
scenario: An engineer asks why a 3B parameter model needs INT4 quantization to run. They wonder if 8GB shouldn't be enough for a 6GB FP16 model.
question: Why does a 3B parameter model require INT4 quantization to run on an 8GB iPhone 16 Pro?
details:
  realistic_solution: |
    8GB total does not mean 8GB is available to the model. iOS and frameworks reserve roughly 2GB, and a production app should stay near a 3-4GB effective ML budget to avoid memory-pressure kills. A 3B FP16 model needs about 6GB for weights alone, so it does not fit. A 3B INT4 model uses about 1.5GB for weights. For an illustrative FP16 KV cache at 2048 tokens with 32 layers, 32 KV heads, and head_dim 128, KV bytes/token = 2 (K,V) * 32 * 32 * 128 * 2 = 524,288 bytes = 512 KiB, so 2048 tokens require 1.00 GiB = 1.07GB decimal. INT4 weights + FP16 KV + app/runtime overhead is roughly 1.5GB + 1.07GB + 1GB = 3.57GB, which fits a 4GB effective budget. INT4 is required because weights, context-length-dependent KV cache, and runtime overhead must fit the app budget, not because all physical RAM is available.
  common_mistake: |
    **The Pitfall:** Assuming all physical RAM is available exclusively for the ML model.
    **The Rationale:** Developers accustomed to cloud environments fail to account for the mobile OS's strict memory reservations and aggressive app-killing policies for memory pressure.
    **The Consequence:** Deploying FP16 or INT8 models that instantly crash in production because they exceed the true effective memory budget.
  napkin_math: |
    **Assumptions & Constraints:**
    - Physical RAM: 8GB.
    - iOS Reserves: 2GB.
    - Safe ML app budget before memory pressure risk: ~4GB.
    - Illustrative FP16 KV cache: 32 layers, 32 KV heads, head_dim 128, 2048 context.
    - App/runtime overhead: ~1GB.

    **Calculations:**
    - FP16 Model: 3B * 2 bytes = 6GB > 4GB effective app budget (Fails).
    - FP16 KV bytes/token = 2 (K,V) * 32 layers * 32 KV heads * 128 dim * 2 bytes = 524,288 bytes = 512 KiB.
    - FP16 KV at 2048 tokens = 2048 * 512 KiB = 1.00 GiB = 1.07GB decimal.
    - INT8 Model: 3GB (weights) + 1.07GB (KV cache) + 1GB (app/runtime overhead) = 5.07GB (Fails).
    - INT4 Model: 1.5GB (weights) + 1.07GB (KV cache) + 1GB (app/runtime overhead) = 3.57GB (Fits).

    **Conclusion & Interpretation:**
    - **Result: ~3.57GB footprint (Memory-Capacity-Bound)**. INT4 is required because weights, KV cache, and app overhead must fit within the effective mobile app budget, not because the full 8GB of physical RAM is available to the model.
