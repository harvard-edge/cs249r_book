title: LLM KV Cache Impact on Unified Memory System Cache
scenario: A generative AI model keeps its 1 GB KV cache in unified LPDDR5 memory, requiring frequent reads by the NPU during token generation.
question: How does the unified memory architecture impact the system level cache (SLC) hit rate and overall memory power during a long sequence generation?
details:
  realistic_solution: During long-sequence autoregressive generation, KV reads have a working set far larger than the system level cache, so SLC locality is likely poor and many accesses fall through to LPDDR5. The hit rate is not exactly 0% because attention kernels may tile, reuse recent keys/values, and benefit from prefetching, but the cache cannot hold the full 1GB KV state. Low locality increases LPDDR5 traffic, cache eviction pressure, and memory power.
  common_mistake: |
    **The Pitfall:** Assuming unified memory guarantees fast on-chip SRAM access for all data.
    **The Rationale:** Candidates think "unified" means the entire KV cache fits in or is managed efficiently by the fast system level cache.
    **The Consequence:** They underestimate memory power consumption and system-wide cache eviction effects during long sequence generation.
  napkin_math: |
    **Assumptions & Constraints:**
    - KV Cache size: 1 GB.
    - System Level Cache (SLC) size: ~16-32 MB.

    **Calculations:**
    - Size Ratio: 1 GB / 32 MB = ~31x larger than the largest assumed SLC.
    - The SLC can hold at most about 32 MB / 1,024 MB = ~3% of the KV cache at one time.

    **Conclusion & Interpretation:**
    - **Result: likely low SLC hit rate, not a guaranteed 0% hit rate.** Because the KV working set dwarfs SLC capacity, long-context generation tends to drive frequent LPDDR5 reads and higher memory power unless the attention implementation improves locality through tiling or caching recent blocks.
