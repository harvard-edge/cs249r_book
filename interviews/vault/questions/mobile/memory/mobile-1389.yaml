title: On-Device Fine-Tuning Memory Orchestration
scenario: You are designing a background on-device fine-tuning pipeline for a 2B parameter text model. The operating system guarantees eviction if your background service exceeds a strict 2.0 GB footprint. The base model is quantized to 4-bit, but memory fragmentation and activation memory during backprop constantly trigger OOMs.
question: How should memory be orchestrated for on-device fine-tuning with a 4-bit base model and LoRA adapters to maintain the footprint under 2.0 GB?
details:
  realistic_solution: Keep the 4-bit base model frozen and train only small LoRA adapter weights, so gradients and optimizer state are allocated for adapter parameters rather than the full 2B model. Use a bounded arena for adapter tensors, optimizer state, activations, and temporary workspaces; memory-map the frozen base weights through normal Android model loading paths instead of requiring one huge contiguous dmabuf. Combine micro-batch size 1-2, short sequence windows, activation checkpointing, and early admission checks so the service refuses or defers training when the estimated peak would exceed the 2.0 GB background limit.
  common_mistake: |
    **The Pitfall:** Treating 4-bit fine-tuning like full-model training and allocating gradients plus optimizer state for every base weight.
    **The Rationale:** Candidates focus on the weight format but miss that backprop memory is dominated by trainable parameters, optimizer state, activations, and temporary workspaces.
    **The Consequence:** The job may pass the static weight check but exceed the background memory cap once training starts, causing OOMs, service kills, or severe latency for foreground apps.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target memory limit: 1.9 GB (to avoid 2.0 GB LMK eviction).
    - Base weights (2B INT4) = 1.0 GB.
    - Trainable LoRA adapters plus gradients and optimizer state: ~120 MB.
    - Runtime workspace and allocator reserve: ~200 MB.

    **Calculations:**
    - Activations with micro-batch=1-2, sequence<=512, and checkpointing: ~250 MB.
    - Safety margin for fragmentation, tokenizer buffers, and framework overhead: ~250 MB.
    - Total Peak Memory: 1.0 GB + 120 MB + 200 MB + 250 MB + 250 MB = 1.82 GB.

    **Conclusion & Interpretation:**
    - **Result: Peak memory is ~1.82 GB, leaving ~180 MB below the 2.0 GB cap (Memory-Capacity-Bound).** The key is freezing the base model and bounding adapter training memory, not relying on a universal contiguous dmabuf.
