title: Applying iOS Jetsam Footprint Limits to LLMs
scenario: An iOS app allocates a contiguous 4GB array for an unoptimized transformer model on an 8GB RAM device.
question: How do memory management principles explain what happens when the app footprint approaches system limits?
details:
  realistic_solution: iOS does not provide desktop-style swap for ordinary app memory. A 4GB contiguous allocation on an 8GB device can trigger severe memory pressure because the app competes with the OS, graphics, frameworks, and other processes for physical RAM. Jetsam termination is based on priority bands, app state, current pressure, and process footprint; the foreground app can be killed directly under severe pressure rather than after a fixed background-app kill sequence.
  common_mistake: |
    **The Pitfall:** Assuming standard desktop OS behavior.
    **The Rationale:** Many engineers expect iOS to transparently page the excess multi-gigabyte memory to NVMe storage.
    **The Consequence:** The app gets OOM-killed by Jetsam, leading to a poor user experience.
  napkin_math: |
    **Assumptions & Constraints:**
    - Allocation size: 4GB.
    - Total device RAM: 8GB.
    - Usable RAM is less than total RAM because the OS, frameworks, graphics, and other processes also consume memory.

    **Calculations:**
    - Memory Footprint Ratio: 4GB / 8GB = 50%.
    - Contiguous allocation risk: a single model buffer consumes half of physical RAM before activations, temporary tensors, UI memory, and framework overhead.

    **Conclusion & Interpretation:**
    - **Result: High Jetsam Risk**. The exact kill point is not a fixed percentage; approaching this footprint creates memory pressure and may cause Jetsam to terminate the app based on system state and priority.
