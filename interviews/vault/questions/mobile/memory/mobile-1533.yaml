title: Google Tensor G3 VRAM Budget Components
scenario: On the Google Tensor G3, which features 12 GB of LPDDR5X unified memory, you are tasked with deploying a machine learning model.
question: How do model weights, intermediate activations, and the KV-cache consume and impact a 12 GB LPDDR5X inference budget?
details:
  realistic_solution: For inference, split the 12 GB budget into static weights, temporary activations/workspace, KV-cache, and OS/app headroom. Quantize weights to INT8 or INT4 to reduce the static footprint, cap batch size and sequence length to bound activations, and use sliding-window or paged KV-cache policies so long conversations do not grow without limit. Optimizer states are training memory and should not be part of a mobile inference budget.
  common_mistake: |
    **The Pitfall:** Underestimating the memory consumption of dynamic components like activations and KV-cache.
    **The Rationale:** Candidates often focus purely on the static weight size, forgetting that sequences and batches scale dynamically and compete directly with the Android OS in unified memory.
    **The Consequence:** The model fits in theory but crashes immediately in practice due to OOM errors during inference.
  napkin_math: |
    **Assumptions & Constraints:**
    1. Weight Memory: A 7 billion parameter model in FP16 (2 bytes/param) requires 14 GB.

    **Calculations:**
    2. Constraint Verification: 14 GB exceeds the total 12 GB device RAM.
    3. Quantization Necessity: INT8 quantization (1 byte/param) drops weight size to 7 GB.

    **Conclusion & Interpretation:**
    4. Remaining Budget: This leaves 5 GB for the OS, apps, intermediate activations, and KV-cache, making strict context limits mandatory.
