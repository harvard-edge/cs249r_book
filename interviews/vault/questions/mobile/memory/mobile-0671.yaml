title: 'The OOM Crash on Older iPhones'
scenario: A photo editing app uses a 28 MB Core ML style transfer model that runs perfectly on 6 GB RAM devices. On 4 GB RAM devices, the app exhibits a 12% crash rate with `EXC_RESOURCE` `MEMORY` exceptions.
question: Why does the 28 MB model cause out-of-memory crashes on 4 GB RAM devices, and how can it be fixed?
details:
  realistic_solution: 'Model file size (28 MB) is not runtime memory. At 1080p, the style transfer model allocates activation tensors that peak at ~288 MB during inference. iPhone 11 (4 GB RAM) gives apps ~1.1 GB, but the photo editor''s baseline (camera preview, gallery cache, undo stack) already consumes 600-800 MB, leaving only 300-500 MB headroom. The 288 MB ML peak pushes total past the jetsam limit. Fix: detect available memory via os_proc_available_memory(), downscale input to 540p on older devices (peak drops to ~91 MB), and use Core ML''s MLPredictionOptions to limit intermediate buffer sizes.'
  common_mistake: |
    **The Pitfall:** Equating model file size with runtime memory footprint.
    **The Rationale:** Assuming a 28 MB weight file only consumes 28 MB of RAM during execution.
    **The Consequence:** Failing to account for the massive peak activation tensors generated during inference, leading to unexpected OOM crashes.
  napkin_math: |
    **Assumptions & Constraints:**
    - Device memory budget: ~2 GB total, ~1.1 GB available to app after OS.
    - App baseline (camera + UI): ~600 MB.
    - Remaining memory headroom: ~500 MB.
    - Peak 1080p model activations: ~288 MB.

    **Calculations:**
    - Total usage (1080p): 600 MB + 288 MB = 888 MB (Dangerously close to jetsam limit; adding a 200MB undo stack causes OOM).
    - Fix (540p input): Peak activations drop to ~91 MB.
    - Total usage (540p): 600 MB + 91 MB = 691 MB.

    **Conclusion & Interpretation:**
    - **Result: 691 MB (Memory-Capacity Bound)**. 691 MB total usage safely fits within the strict ~1.1 GB jetsam memory limit.
