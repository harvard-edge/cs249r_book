title: 'The Memory-Mapped File Deadlock'
scenario: 'You are using `mmap` to load a 100 MB model on Android. The model loads instantly, which is great. However, during the first few seconds of inference, the UI thread occasionally stalls for 50-100ms. You are running inference on a background thread.'
question: 'Why is a background memory read stalling the foreground UI?'
details:
  realistic_solution: 'You hit the **mmap Page Fault I/O Contention**. 100 MB model = 25,000 page faults (at 4 KB/page). If each random read takes 0.1ms, that''s 2.5 seconds of sustained I/O saturation. The UI thread''s read request is statistically guaranteed to get stuck'
  common_mistake: |
    **The Pitfall:** Assuming the CPU is completely saturated.
    **The Rationale:** Candidates often think the background thread is using 100% of the CPU and starving the UI thread.
    **The Consequence:** They miss the underlying I/O contention and propose thread priority fixes that won't resolve the 100ms hard locks.
  napkin_math: |
    **Assumptions & Constraints:**
    - Memory to Load: 100 MB model.
    - Page Size: 4 KB/page.
    - Random Read Time: 0.1ms per read.

    **Calculations:**
    - Page Faults: 100 MB / 4 KB = 25,000 page faults.
    - I/O Time: 25,000 * 0.1ms = 2500ms.

    **Conclusion & Interpretation:**
    - **Result: 2.5s (I/O-Bound)**. 2.5 seconds of sustained I/O saturation, meaning UI read requests are statistically guaranteed to get stuck.
