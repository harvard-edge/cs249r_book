title: LLM Memory Budget Specification for A17 Pro
scenario: Your team is building an on-device local summarization feature using a 7 billion parameter LLM targeting the Apple A17 Pro. The device has 8 GB of shared unified memory across the CPU, GPU, and 16-core Neural Engine, but you must reserve 3 GB for the OS and foreground apps to avoid jetsam terminations.
question: Under stated 7B LLM assumptions, how should the 5 GB A17 Pro memory budget be split across weights, KV-cache, and activations?
details:
  realistic_solution: |
    To meet the 5 GB budget on the A17 Pro under the stated assumptions, the model weights must be quantized to 4-bit, reducing their footprint to about 3.5 GB. Assuming a 32-layer model with hidden size 4096 and FP16 K/V tensors, a 2048-token KV-cache consumes about 1.0 GB. The remaining 0.5 GB is the peak activation and runtime workspace budget, so the plan is approximate and depends on the exact architecture and compiler buffers.
  common_mistake: |
    **The Pitfall:** Treating the 8 GB as dedicated VRAM or calculating weight footprint at FP16 (14 GB).
    **The Rationale:** Engineers often forget the shared nature of unified memory and fail to apply aggressive quantization assumptions necessary for mobile.
    **The Consequence:** Immediately out-of-memory (OOM) crashing the device because OS overhead is ignored and models are too large.
  napkin_math: |
    **Assumptions & Constraints:**
    - Total Memory: 8 GB.
    - OS/Apps reservation: 3 GB.
    - Context length: 2048 tokens.
    - Model: 7B parameters.
    - KV-cache estimate assumes 32 layers, hidden size 4096, FP16 K and V tensors.

    **Calculations:**
    - Available Memory Budget: 8 GB Total - 3 GB OS/Apps = 5 GB.
    - 4-bit Quantized Weights: 7 billion params * 0.5 bytes = 3.5 GB.
    - FP16 KV-cache for 2048 tokens: 2 (K & V) * 2048 tokens * 32 layers * 4096 dim * 2 bytes = 1,073,741,824 bytes = 1.0 GB.
    - Remaining memory for activations: 5.0 GB - 3.5 GB - 1.0 GB = 0.5 GB.

    **Conclusion & Interpretation:**
    - **Result: 3.5 GB weights + ~1.0 GB KV-cache + ~0.5 GB activations/workspace = 5.0 GB (Memory-Capacity-Bound)**. This is a budget allocation under explicit architecture assumptions, not an exact property of all 7B models.
