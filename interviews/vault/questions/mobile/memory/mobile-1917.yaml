title: A17 Pro NPU Activation Tiling
scenario: You are designing an on-device diffusion model architecture constrained by the Apple A17 Pro Neural Engine's unified memory.
question: How would you pipeline UNet activations to avoid system-RAM spills when tensors peak at 120MB and NPU SRAM is 32MB?
details:
  realistic_solution: The candidate should specify spatial tiling of the UNet feature maps into 4 distinct chunks. By processing a 30MB tile through fused convolution and activation layers before moving to the next, the entire intermediate state remains within the 32MB NPU SRAM. This minimizes unified memory bus traffic and prevents DRAM spilling.
  common_mistake: |
    **The Pitfall:** Attempting to fit the entire 120MB tensor into SRAM at once.
    **The Rationale:** Engineers from cloud environments are unaccustomed to strict 32MB hardware SRAM limits and ignore the spatial locality of convolutional UNet architectures.
    **The Consequence:** The NPU constantly spills intermediate activations to unified memory, saturating the bus and destroying inference latency.
  napkin_math: |
    **Assumptions & Constraints:**
    - Tensor Size: 120 MB.
    - SRAM Limit: 32 MB.
    - Tiling Strategy: Divide the spatial dimensions into 4 chunks.

    **Calculations:**
    - Tile Size: 120 MB / 4 = 30 MB.

    **Conclusion & Interpretation:**
    - **Result: 30 MB tile size (Memory-Bound)**. Slicing the UNet activation allows it to fit cleanly within the 32 MB SRAM, minimizing external memory traffic and DRAM spilling.
