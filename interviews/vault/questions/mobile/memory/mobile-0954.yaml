title: 'KV-Cache: Mastery — Long-Context KV Cache Strategy for Mobile Code Assistant'
scenario: Design the KV cache strategy for a 3B LLM code assistant on an edge device with 8GB RAM that must handle 32K-token codebases. The current 4096-token limit is insufficient.
question: How would you design a memory-efficient KV cache, eviction policy, and quality preservation strategy for a 32K context?
details:
  realistic_solution: |
    Deploying a 32K full KV cache in BF16 is unsafe on an 8GB device once the OS, model weights, activations, and allocator fragmentation are included. The solution requires compounding structural memory optimizations:
    1. **INT4 KV Cache Quantization:** Downcasting KV caches to 4-bit shrinks the memory requirement by 4x.
    2. **Local Sliding Window Attention:** Expire/evict standard tokens outside a sliding 4096-token local window.
    3. **Attention Sinks (Landmarks):** Preserve the first ~1024 tokens permanently. Combining INT4 with a 5120-token active window radically reduces the footprint, easily fitting in memory.
  common_mistake: |
    **The Pitfall:** Proposing architectural changes (like Ring Attention) without actively calculating the hard hardware memory limits.
    **The Rationale:** Candidates lean on trendy academic papers but fail to quantify the impossibility of holding a 4.2 GB cache in a constrained 8GB device already running an OS and model weights.
    **The Consequence:** Designing an elegant software system that immediately triggers a hard OS-level OOM crash upon processing its first large codebase.
  napkin_math: |
    **Assumptions & Constraints:**
    - Target Context: 32,768 tokens.
    - Architecture: 3B model (32 layers, GQA-8, 128 head_dim). Precision: BF16 (2 bytes/param).
    - System Overhead: 8GB total - 2GB OS - 0.75GB Weights = ~5.25 GB available RAM.

    **Calculations:**
    - BF16 GQA-8 bytes per token = 32 layers * 2 (K+V) * 8 KV heads * 128 dim * 2 bytes = 131,072 bytes = 128 KiB/token.
    - Full 32K BF16 KV Cache: 32,768 tokens * 128 KiB/token = 4.00 GiB = 4.29 GB.
    - Capacity Check: 4.29 GB cache in a 5.25 GB budget leaves less than 1 GB for activations, runtime buffers, and fragmentation, so it is not a safe production allocation.
    - Optimized Strategy (INT4 + Window + Sinks):
      - INT4 KV bytes per token = 128 KiB / 4 = 32 KiB/token.
      - Full 32K INT4 KV cache = 32,768 * 32 KiB = 1.00 GiB = 1.07 GB.
      - Apply Windowing (4096 local + 1024 sink = 5120 active tokens).
      - Final Footprint: 5120 * 32 KiB = 160 MiB = ~168 MB.

    **Conclusion & Interpretation:**
    - **Result: ~168 MB optimized active KV cache (Memory-Capacity-Bound solved).** GQA-8 defines the 128 KiB BF16 per-token baseline; INT4 quantization and a sink-plus-window retention policy reduce the active cache to a production-safe footprint.
