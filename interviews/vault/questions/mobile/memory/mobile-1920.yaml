title: Snapdragon NPU/GPU Cache Thrashing
scenario: Diagnosing severe thermal throttling during sustained augmented reality rendering where the NPU and GPU fight for LPDDR5 bandwidth.
question: Formulate a diagnostic plan using performance counters to pinpoint SLC cache thrashing between the NPU and GPU, and propose a tiling fix?
details:
  realistic_solution: |
    Use Snapdragon Profiler to correlate SLC hit/miss rate, eviction count, LPDDR5 read/write bandwidth, GPU/NPU stall cycles, and thermal/power counters during overlapping render and inference windows. Thrashing is indicated by rising SLC misses and evictions, higher LPDDR5 traffic, and stalls that line up with concurrent GPU/NPU dispatches. The fix is to tile and schedule work so each phase has a bounded working set: for example, process one 2MB texture tile with its 2MB feature tile, finish the NPU consumer before launching the next GPU producer for that tile, and avoid overlapping dispatches whose combined live data exceeds the SLC residency budget.
  common_mistake: |
    **The Pitfall:** Suggesting lowering the NPU clock speed to fix thermal throttling.
    **The Rationale:** Candidates assume thermal limits are solely driven by clock frequencies and static power draw.
    **The Consequence:** Failing to solve the eviction conflict leaves cache-miss amplification and extra LPDDR5 traffic in place, so throttling returns under sustained load.
  napkin_math: |
    **Assumptions & Constraints:**
    - Hardware: System Level Cache (SLC) capacity is 8MB.
    - Candidate tile working set: 2MB texture tile + 2MB feature tile.
    - Cache residency also depends on access pattern, associativity, prefetching, and competing traffic.

    **Calculations:**
    - Combined Working Set per Pass = 2MB + 2MB = 4MB.
    - Nominal SLC Headroom = 8MB - 4MB = 4MB.
    - Diagnostic signal for success = SLC miss and eviction counters fall while LPDDR5 bandwidth and accelerator stall cycles decrease.

    **Conclusion & Interpretation:**
    - **Result: cache-aware tiling hypothesis (Memory-Bound).** A 4MB live tile set fits nominally under an 8MB SLC, but counters must confirm improved residency; capacity alone does not guarantee LPDDR5 bypass or eliminate throttling.
