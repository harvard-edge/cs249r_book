title: The 25% Rule for Mobile Memory
scenario: You are scoping a new on-device ML feature for a flagship smartphone that has 8 GB of total RAM.
question: What ML feature memory budget follows from the 25% rule on an 8 GB flagship smartphone?
details:
  realistic_solution: The standard convention limits foreground features to a maximum of 25% of total device RAM. This caps the allocation at 2 GB, reserving the remaining 6 GB for the OS framework, system daemon overhead, and multi-tasking UI layers.
  common_mistake: |
    **The Pitfall:** Assuming application code has access to the full advertised hardware RAM.
    **The Rationale:** Cloud engineers expect isolated containers, completely ignoring aggressive mobile OS memory managers.
    **The Consequence:** Models load into memory but are swiftly OOM-killed by the OS watchdog the moment a user switches apps.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Total Physical RAM: 8 GB.
       - Safe Allocation Rule: 25% of total capacity.
    2. **Calculations:**
       - Safe Budget: 8 GB * 0.25 = 2 GB.
    3. **Conclusion & Interpretation:**
       - **Result: Memory-Bound.** Exceeding the strict 2 GB allocation practically guarantees process termination under OS memory pressure.
  options:
  - 6 GB
  - 4 GB
  - 2 GB
  - 512 MB
  correct_index: 2
