title: A17 Pro Off-Chip Spilling
scenario: You are designing a custom memory manager for a transformer-based video upscaler on the Apple A17 Pro. Large intermediate activations spill to the unified LPDDR5 system RAM.
question: Design an allocation strategy to minimize DRAM bandwidth waste, and compute the arithmetic intensity required to avoid bottling on RAM.
visual:
  kind: svg
  path: mobile-1902.svg
  alt: Bar chart comparing Apple A17 Pro SRAM bandwidth to LPDDR5 system memory bandwidth.
  caption: Memory Hierarchy Bandwidth on Mobile SoC
details:
  realistic_solution: Propose deep operator fusion to keep activations strictly in the SRAM/cache. To sustain the NPU's 35 TOPS over a 50 GB/s bus, the architecture must match the arithmetic intensity ratio of compute to memory bandwidth to prevent I/O stalling.
  common_mistake: |
    **The Pitfall:** Treating unified DRAM as free or low-latency memory.
    **The Rationale:** Candidates fail to recognize that while mobile SoCs have unified memory avoiding PCIe copies, the bandwidth is vastly lower than on-chip cache.
    **The Consequence:** Severe system bottlenecks on RAM I/O, completely failing to utilize the 35 TOPS compute power.
  napkin_math: |
    **Assumptions & Constraints:**
    - Peak Compute: 35 TOPS (35,000 GOPS).
    - Unified Memory Bandwidth: 50 GB/s (LPDDR5).

    **Calculations:**
    - Required Arithmetic Intensity = Peak Compute / Memory Bandwidth.
    - Ratio: 35,000 GOPS / 50 GB/s = 700 ops/byte.

    **Conclusion & Interpretation:**
    - **Result: 700 ops/byte (Memory-Bandwidth-Bound)**. To sustain 35 TOPS over a 50 GB/s bus, operations must exceed an arithmetic intensity of 700 ops/byte, mandating aggressive operator fusion.
