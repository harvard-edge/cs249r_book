title: The Delivery Paradox
scenario: You're shipping an on-device LLM assistant (3B parameters, INT4) to a global Android app with 500 million installs. The quantized model is 1.7 GB. Google Play's install-time APK limit is 150 MB, and on-demand delivery via Play Asset Delivery has a 2 GB limit. Design the model delivery system.
question: What breaks at this scale that doesn't break in a demo?
details:
  realistic_solution: 'At 500M installs, the system design must address CDN Cost (delta updates are required), Storage constraints (forcing on-demand delivery), Memory constraints (mmap paging), Delivery limits, and Network reliability (resume-on-failure). Downloading the full 1.7GB model repeatedly causes massive CDN bills and device storage exhaustion.'
  common_mistake: |
    **The Pitfall:** "Just use on-demand download after install — it's under 2 GB."
    **The Rationale:** Engineers assume that if a payload technically fits within platform limits, the deployment is viable, ignoring CDN unit economics.
    **The Consequence:** Prohibitive CDN bills ($8.5M per minor update) and massive uninstall rates from users with constrained storage.
  napkin_math: |
    **Assumptions & Constraints:**
    - User Base: 500 Million Installs.
    - Payload: 1.7 GB (INT4 Model).
    - Base CDN Cost: $0.01 per GB.

    **Calculations:**
    - Naive Update CDN Cost: 500M * 1.7 GB * $0.01/GB = $8.5 Million/update.
    - Brotli Compression (~60%): 500M * 1.02 GB * $0.01/GB = $5.1 Million/update.
    - Delta Patching (~6% of full size): 1.7 GB * 0.06 = 0.102 GB.
    - Delta Update Cost: 500M * 0.102 GB * $0.01/GB = $510,000/update.

    **Conclusion & Interpretation:**
    - **Result: $8.5M naive vs $510K delta (Network-Cost Bound)**. At fleet scale, transferring the full monolithic tensor for every minor update is financially ruinous; patching is mandatory.
  options:
  - 'The safest strategy is to update firmware and model in a single atomic package to avoid version skew between them.'
  - 'The OOM is caused by memory fragmentation in the Python runtime; running garbage collection before inference will prevent it.'
  - 'Just use on-demand download after install — it''s under 2 GB. This works for a prototype but collapses at 500M-device scale.'
  - 'At 500M installs, every decision multiplies by 500M. The system design must address five interacting constraints: 1. CDN Cost: Downloading 1.7 GB for every minor update is prohibitively expensive ($8.5M/update).'
  correct_index: 3
