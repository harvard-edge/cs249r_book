title: The Delivery Paradox
scenario: You're shipping an on-device LLM assistant (3B parameters, INT4) to a global Android app with 500 million installs. The quantized model is 1.7 GB. Google Play's install-time APK limit is 150 MB, and on-demand delivery via Play Asset Delivery has a 2 GB limit. Design the model delivery system.
question: What breaks at this scale that doesn't break in a demo?
details:
  realistic_solution: 'At 500M installs, every decision multiplies by 500M. The system design must address five interacting constraints: 1. **CDN Cost**: Downloading 1.7 GB for every minor update is prohibitively expensive ($8.5M/update). Delta updates are required. 2. **Storage constraints**: 1.7 GB is too large for the base app, forcing on-demand asset delivery. 3. **Memory constraints**: Loading INT4 weights requires efficient mmap and memory paging to avoid immediate OOM on background app swaps. 4. **Delivery limits**: Play Asset Delivery allows up to 2 GB for on-demand fast-follow packs. 5. **Network reliability**: A 1.7 GB download will frequently fail on cellular networks, requiring robust resume-on-failure logic.'
  common_mistake: |
    **The Pitfall:** "Just use on-demand download after install — it's under 2 GB."
    **The Rationale:** Engineers assume that if it fits within Google Play limits, the problem is solved, ignoring massive CDN costs and user storage limits.
    **The Consequence:** Prohibitive download bills ($8.5M per minor update) and massive uninstall rates from users with low storage.
  napkin_math: |
    - **Base CDN Cost:** 500M installs × 1.7 GB × $0.01/GB = **$8.5M per update**.
    - **Brotli Compression:** ~60% of original = 500M × 1.02 GB × $0.01/GB = **$5.1M**.
    - **Delta Updates:** Sending only changed layers (~6% of full size) = 1.7 GB × 0.06 = 0.102 GB.
    - **Delta Update Cost:** 500M × 0.102 GB × $0.01/GB = **$510K**.
    - **Cost Reduction:** $8.5M / $510K = **~16.6x cost reduction**.
    - **Storage Constraint:** Median budget phone has ~15 GB free space. 1.7 GB consumes 11% of free space, causing immediate user uninstalls.
  options:
  - The safest strategy is to update firmware and model in a single atomic package to avoid version skew between them.
  - The OOM is caused by memory fragmentation in the Python runtime; running garbage collection before inference will prevent it.
  - Just use on-demand download after install — it's under 2 GB. This works for a prototype but collapses at 500M-device scale.
