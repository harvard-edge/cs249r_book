title: Chiplet ISA Heterogeneity and ML Framework Portability
scenario: A mobile chiplet combines an ARM Cortex-X4 CPU die, an Imagination IMG DXT GPU die, and a custom
  NPU die from a third vendor. A developer using ONNX Runtime reports that model operators fall back to
  CPU instead of NPU. Diagnose the portability issue.
question: "How would you diagnose the portability issue?"
details:
  realistic_solution: 'The NPU execution provider is missing or incomplete. ONNX Runtime selects execution
    providers in priority order: custom EP → CUDA/ROCm → CPU. If the NPU EP is not registered or does
    not support the specific ONNX ops in the model (e.g., GroupQuery Attention, RMS Norm), those ops fall
    back to CPU. Fix: (1) Install the vendor NPU SDK which includes the ONNX RT execution provider; (2)
    Check supported op list with ep.GetSupportedNodes(); (3) For unsupported ops, apply operator fusion
    to replace them with composite ops the NPU supports; (4) Consider using the QNN execution provider
    if the NPU is Qualcomm Hexagon (standard for Snapdragon chiplets).'
  common_mistake: Assuming ONNX Runtime automatically dispatches to all available accelerators. ONNX Runtime's
    execution provider selection is based on registered providers and their supported operator lists.
    A custom NPU requires a vendor-supplied ONNX Runtime execution provider that maps ONNX ops to NPU
    instructions.
  napkin_math: 'Model with 80 ops, 15 unsupported on NPU. CPU fallback for 15 ops: each runs at 1 TOPS
    CPU vs 10 TOPS NPU. If 15 ops account for 40% of compute: time on CPU = 0.4 * total_compute / 1 TOPS.
    On NPU: 0.4 * total_compute / 10 TOPS. CPU fallback: 10x slower for those ops → end-to-end slowdown
    = 1 / (0.6 + 0.4*10*0.1) → wait, recalculate. If all on NPU: T = compute/10. With 40% on CPU: T =
    0.6*compute/10 + 0.4*compute/1 = 0.06c + 0.4c = 0.46c. All NPU: 0.1c. Slowdown: 4.6x — significant.'
