title: Chiplet ISA Heterogeneity and ML Framework Portability
scenario: A mobile chiplet combines an ARM Cortex-X4 CPU die, an Imagination IMG DXT GPU die, and a custom NPU die from a third vendor. A developer using ONNX Runtime reports that model operators fall back to CPU instead of NPU.
question: How would you diagnose the ONNX Runtime portability issue for operators falling back to the CPU?
details:
  realistic_solution: 'The NPU execution provider is missing or incomplete. ONNX Runtime selects execution providers in priority order: custom EP → CUDA/ROCm → CPU. If the NPU EP is not registered or does not support the specific ONNX ops in the model (e.g., GroupQuery Attention, RMS Norm), those ops fall back to CPU. Fix: (1) Install the vendor NPU SDK which includes the ONNX RT execution provider; (2) Check supported op list with ep.GetSupportedNodes(); (3) For unsupported ops, apply operator fusion to replace them with composite ops the NPU supports; (4) Consider using the QNN execution provider if the NPU is Qualcomm Hexagon (standard for Snapdragon chiplets).'
  common_mistake: |
    **The Pitfall:** Assuming ONNX Runtime automatically dispatches to all available accelerators.
    **The Rationale:** Candidates often think execution provider selection is automatic, missing that a custom NPU requires a vendor-supplied execution provider mapping ONNX ops to NPU instructions.
    **The Consequence:** The missing or incomplete execution provider causes unsupported ops to fall back to the CPU, destroying performance.
  napkin_math: |
    1. Assume a model with 80 ops, 15 unsupported on NPU.
    2. CPU runs at 1 TOPS vs NPU at 10 TOPS.
    3. If 15 ops account for 40% of compute: time on CPU = 0.4c / 1. Time on NPU = 0.6c / 10.
    4. Total time = 0.4c + 0.06c = 0.46c.
    5. If all on NPU: Total time = 1.0c / 10 = 0.1c.
    6. Slowdown: 0.46c / 0.1c = **4.6x slowdown due to CPU fallback.**
