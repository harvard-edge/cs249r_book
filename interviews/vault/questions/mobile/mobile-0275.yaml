title: The Mobile Jank Budget (mobile-0275)
scenario: You're an engineer on a team building a new 'AI Styles' feature for a live video chat app. This
  feature applies an artistic filter to each frame in real-time. To ensure a smooth user experience, your
  model's inference time must fit within a specific budget to avoid visual stutter, or 'jank'. What is
  the approximate total frame time budget you must stay under on a typical 60Hz mobile display?
details:
  realistic_solution: The latency budget is approximately 16ms. This is derived from the refresh rate
    of a standard 60Hz mobile display. The entire rendering pipeline for a single frame, including OS
    overhead, UI rendering, and model inference, must complete within this window to avoid dropping a
    frame and causing perceptible stutter.
  common_mistake: Engineers often confuse the user-facing latency budget on mobile with the more relaxed
    P99 deadlines of cloud services (~100ms) or the hard real-time deadlines of industrial edge devices
    (~33ms). They forget that mobile 'smoothness' is directly tied to the physics of the screen's refresh
    rate.
  napkin_math: 'A 60Hz display refreshes 60 times per second. The time budget for one frame is the inverse
    of the refresh rate:'
  options:
  - ~100 ms
  - ~33 ms
  - ~16 ms
  - ~1 ms
  correct_index: 2
