title: The Mobile Jank Budget (mobile-0275)
scenario: You're an engineer on a team building a new 'AI Styles' feature for a live video chat app. This feature applies an artistic filter to each frame in real-time. To ensure a smooth user experience, your model's inference time must fit within a specific budget to avoid visual stutter, or 'jank'.
question: What is the approximate total frame time budget you must stay under on a typical 60Hz mobile display?
details:
  realistic_solution: The latency budget is approximately 16ms. This is derived from the refresh rate of a standard 60Hz mobile display. The entire rendering pipeline for a single frame, including OS overhead, UI rendering, and model inference, must complete within this window to avoid dropping a frame and causing perceptible stutter.
  common_mistake: |
    **The Pitfall:** Confusing the local UI frame budget with server-side response deadlines.
    **The Rationale:** Cloud engineers assume 100ms latency is "instant," forgetting that visual UI rendering must map exactly to screen hardware refresh rates.
    **The Consequence:** Applying a 100ms budget to a live video feed causes massive dropped frames and jitter.
  napkin_math: |
    1. Assumptions & Constraints:
       - Refresh rate: 60Hz (60 frames per second).
    2. Calculations:
       - Frame time: 1000 ms / 60 frames.
       - Budget = 16.67 ms.
    3. Conclusion & Interpretation:
       - **Result: The total per-frame budget is ~16.67 ms (Latency-Bound).**
  options:
  - ~100 ms
  - ~33 ms
  - ~16 ms
  - ~1 ms
  correct_index: 2
