title: The Illusion of Symmetric Scaling
scenario: 'A mobile vision model, composed mostly of depthwise separable convolutions, currently requires
  5 GFLOPs for a single inference. Your team is exploring two scaling strategies to improve accuracy:
  (A) doubling the width (number of channels) of all layers, or (B) doubling the input image resolution.
  Assuming other factors remain constant, interpret how each strategy impacts the computational cost and
  calculate the new estimated FLOPs.'
details:
  realistic_solution: 'Both strategies result in a roughly 4x increase in computational cost, bringing
    the total to ~20 GFLOPs. FLOPs in a convolutional layer are proportional to the spatial dimensions
    (H, W) and the channel dimensions (Cin, Cout).

    1. Doubling the resolution (H, W → 2H, 2W) increases the number of spatial locations where convolutions
    are applied by a factor of 4.

    2. In a depthwise separable block, the cost is dominated by the `1x1` pointwise convolution. Doubling
    the width (Cin, Cout → 2Cin, 2Cout) increases the FLOPs of this dominant layer by a factor of 4.

    Therefore, both scaling strategies have the same, quadratic impact on computational requirements.'
  common_mistake: Engineers often mistakenly assume scaling is linear, believing that doubling the width
    or resolution will only double the FLOPs. Another common error is to correctly remember that one factor
    scales quadratically but assume the other scales linearly, failing to recognize that both width and
    resolution have a quadratic impact on computation in standard 2D convolutional layers.
  napkin_math: The general scaling rule for FLOPs is FLOPs ∝ width² × resolution².
  options:
  - Both strategies result in ~10 GFLOPs.
  - 'Width scaling: ~20 GFLOPs; Resolution scaling: ~10 GFLOPs.'
  - Both strategies result in ~20 GFLOPs.
  - 'Width scaling: ~10 GFLOPs; Resolution scaling: ~20 GFLOPs.'
