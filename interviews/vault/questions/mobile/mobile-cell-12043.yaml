title: 'MLOps Lifecycle: End-to-End Mobile MLOps with Personalization Pipeline'
scenario: A mobile health app uses on-device ML (Tensor G3, 7.5 TOPS, 12GB) for personalized activity
  recognition. The system fine-tunes a base model (10M params INT8, 10MB) using 30 days of on-device sensor
  data, then uploads adapter weights for fleet aggregation. Design the full lifecycle including on-device
  training, privacy-preserving aggregation, global model update, and OTA distribution to 5M devices.
details:
  realistic_solution: 'On-device fine-tuning: last 2 layers only, 200K params × 30 days data × 1000 samples/day.
    Training: 30K gradient steps on Tensor G3 at 7.5 TOPS? Actually forward pass dominated; backprop through
    2 layers only: 0.4M FLOPs/step × 30K steps = 12G FLOPs total over 30 days = 400M FLOPs/day — trivial
    (seconds/day). Adapter upload: 200K × 4 bytes = 0.8MB. 5M devices × 0.8MB = 4TB/aggregation round.
    Federated avg on H100: 5M gradient tensors, 200K dim each = 5M × 200K × 4B = 400TB to sum (streaming,
    never stored all at once). OTA: 10MB × 5M = 50TB.'
  common_mistake: Attempting to fine-tune full 10M param model on-device (Tensor G3 has limited backprop
    support); in practice, only the last 2 layers (200K params) are trainable on-device.
  napkin_math: 'On-device training: 200K params × 2 (forward+backward) × 30K steps = 12B FLOPs. At 7.5
    TOPS: 12B/7.5T = 1.6ms. Per day: 30K/30 = 1000 steps/day: 0.053ms/day — runs in background trivially.
    Adapter: 200K × 4B = 0.8MB. Upload 5M × 0.8MB = 4TB. CDN $360 at $0.09/GB. Global model OTA: 10MB
    × 5M = 50TB → $4,500/round.'
