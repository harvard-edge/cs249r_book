title: The Cloud-Native Fallacy on Mobile
scenario: An AI team, accustomed to cloud development, proposes porting their multi-stage generative pipeline
  directly to a flagship mobile device. The first model generates a 512MB latent tensor, which is fed
  to a second refiner model. They argue, "On the cloud, we pay a huge latency tax sending this tensor
  over NVLink between GPUs. On a mobile SoC, the models share the same memory, so the transfer should
  be trivial.
details:
  realistic_solution: 'The team''s assumption is dangerously flawed. While the physical distance is smaller,
    the system architecture and constraints are entirely different. The analysis must differentiate between
    protocol, topology, and the primary constraint: power.'
  common_mistake: Focusing only on theoretical peak bandwidth and latency specs. A junior engineer might
    say, "NVLink is ~900 GB/s and LPDDR5x is ~77 GB/s, so the mobile transfer is simply ~12x slower."
    This answer completely misses the architectural and power differences, which are the dominant constraints
    on mobile.
  napkin_math: 'Moving a 512MB tensor to CPU/GPU on a mobile SoC (e.g., 51.2GB/s bandwidth): Transfer
    takes 512MB / 51.2GB/s = 10ms. But doing this per frame at 30fps = 15.3GB/s continuous traffic! Mobile
    memory consumes ~1W per 10GB/s, so this tensor move alone burns 1.5W, instantly causing thermal throttling.'
