title: 'The Background Battery Drainer'
scenario: 'A new ambient intelligence feature on a smartphone runs a small keyword-spotting model. It wakes the SoC, runs inference for 0.5 seconds, and then goes back to sleep. This cycle repeats every 10 seconds. When active, the SoC consumes 3 Watts. The phone has a 19 Watt-hour battery.'
question: 'Assuming negligible power consumption during sleep, what percentage of a 19Wh phone battery does a 0.5-second, 3W task every 10 seconds use in 24 hours?'
details:
  realistic_solution: |
    The correct approach is to first calculate the feature's duty cycle (the fraction of time it is active). Use this to find the total active hours over a 24-hour period. Then, multiply the active hours by the active power consumption (in Watts) to get the total energy consumed (in Watt-hours). Finally, express this energy as a percentage of the phone's total battery capacity.
  common_mistake: |
    **The Pitfall:** Confusing power (Watts) with energy (Watt-hours) and miscalculating duty cycle.
    **The Rationale:** An engineer might calculate the drain assuming the 3W is drawn continuously, leading to physically impossible results.
    **The Consequence:** Leading to a wildly incorrect result (72Wh consumed from a 19Wh battery).
  napkin_math: |
    **Assumptions & Constraints:**
    - Active time: 0.5 seconds per 10 seconds.
    - Power: 3 Watts.
    - Battery: 19 Wh.

    **Calculations:**
    - Duty Cycle = 0.5s / 10s = 0.05 (5%).
    - Active time in 24h = 24h * 0.05 = 1.2 hours.
    - Energy consumed = 3 Watts * 1.2 hours = 3.6 Wh.
    - Percentage = (3.6 Wh / 19 Wh) * 100 = 18.94%.

    **Conclusion & Interpretation:**
    - **Result: 18.9% (Power-Bound)**. The task consumes a massive ~19% of total battery.
  options:
  - 'Over 100%. The feature consumes 72Wh, which isn''t possible.'
  - 'Around 3.2%. The feature is active for about 0.2 hours per day.'
  - 'Around 18.9%. The feature is active for 1.2 hours and consumes 3.6Wh.'
  - 'Around 6.3%. The duty cycle is 1/60, leading to 1.2Wh of consumption.'
