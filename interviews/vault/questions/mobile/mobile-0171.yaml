title: The Mobile Jank Deadline
scenario: You're designing an on-device feature that applies a generative AI filter to a live camera feed
  for a social media app. To ensure a smooth, 60 FPS user experience, what is the absolute maximum latency
  your model inference can have before the user perceives 'jank' or stutter?
question: "To ensure a smooth, 60 FPS user experience, what is the absolute maximum latency your model inference can have before the user perceives 'jank' or stutter?"
details:
  realistic_solution: Approximately 16ms. A 60Hz display refreshes every 16.67ms (1000ms / 60). If model
    inference plus all other UI work for a frame exceeds this budget, a frame is dropped, leading to visible
    stutter or 'jank'.
  common_mistake: Confusing mobile UI rendering deadlines with web service latency budgets. Many engineers
    recall the ~100ms number for web requests, but on mobile, the physics of the display dictate a much
    stricter budget. Dropping a single frame at 60 FPS is immediately noticeable.
  napkin_math: Frame Budget = 1000 ms / Refresh Rate. For a standard 60 FPS display, this is `1000 / 60
    ≈ 16.67 ms`. This is the total time the system has to render everything for that frame, including
    model inference, UI drawing, and OS overhead.
  options:
  - ~100 ms
  - ~33 ms
  - ~16 ms
  - ~1 ms
  correct_index: 2
