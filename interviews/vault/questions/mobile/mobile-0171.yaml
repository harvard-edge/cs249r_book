title: The Mobile Jank Deadline
scenario: You're designing an on-device feature that applies a generative AI filter to a live camera feed for a social media app.
question: To ensure a smooth, 60 FPS user experience, what is the absolute maximum latency your model inference can have before the user perceives jank?
details:
  realistic_solution: The physical reality of a 60Hz display necessitates a hard 16.67ms render deadline per frame (1000ms / 60). If model inference, plus OS dispatch overhead, plus UI compositing exceeds this window, VSync is missed and a frame drops, creating perceptible stutter (jank).
  common_mistake: |
    **The Pitfall:** Assuming standard web-service latency SLAs (e.g., 100ms response times) apply to local camera pipelines.
    **The Rationale:** Recalling human perception guidelines for asynchronous UI updates instead of hardware-locked display refresh cycles.
    **The Consequence:** The model is optimized for 100ms, causing 5 out of every 6 frames to drop, yielding an entirely unusable and broken camera experience.
  napkin_math: |
    1. **Assumptions & Constraints:**
       - Target Display Refresh Rate: 60 FPS.
       - Conversion: 1000 milliseconds per second.
    2. **Calculations:**
       - Hardware Frame Budget: 1000 ms / 60 frames = 16.666... ms/frame.
    3. **Conclusion & Interpretation:**
       **Result: Latency-Bound. The absolute maximum latency budget to complete inference, UI drawing, and OS overhead is strictly ~16.67 ms.**
  options:
  - ~100 ms (Standard web latency target)
  - ~33 ms (30 FPS budget)
  - ~16 ms
  - ~1 ms (Audio processing target)
