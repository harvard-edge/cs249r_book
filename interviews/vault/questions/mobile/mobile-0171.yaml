title: The Mobile Jank Deadline
scenario: You're designing an on-device feature that applies a generative AI filter to a live camera feed for a social media app.
question: To ensure a smooth, 60 FPS user experience, what is the absolute maximum latency your model inference can have before the user perceives jank?
details:
  realistic_solution: Approximately 16ms. A 60Hz display refreshes every 16.67ms (1000ms / 60). If model inference plus all other UI work for a frame exceeds this budget, a frame is dropped.
  common_mistake: |
    **The Pitfall:** Confusing mobile UI rendering deadlines with web service latency budgets.
    **The Rationale:** Recalling the standard ~100ms budget for web requests instead of physical display refresh rates.
    **The Consequence:** Dropping frames, leading to a visibly stuttering and broken camera experience.
  napkin_math: |
    - Refresh Rate: 60 FPS.
    - Frame Budget: 1000 ms / 60 frames = 16.67 ms/frame.
    - **The total budget for inference, UI drawing, and OS overhead is ~16.67 ms.**
  options:
  - ~100 ms
  - ~33 ms
  - ~16 ms
  - ~1 ms
  correct_index: 2
