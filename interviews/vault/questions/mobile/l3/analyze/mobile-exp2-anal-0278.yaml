schema_version: 1
id: mobile-exp2-anal-0278
title: Distilled Model Memory Contention
topic: knowledge-distillation
status: published
provenance: imported
scenario: We distilled a large teacher model into a compact 25MB student model targeted for the Samsung
  Exynos 2400 NPU. The platform provides 34.7 TOPS via a dual-core NPU, but its 12 GB LPDDR5X memory pool
  is shared with the CPU, GPU, and ISP. The student model requires 2.5 GOPS per frame. During a live camera
  feed, the actual inference latency spikes to 12 ms. Explain why this happens given the shared memory
  architecture, and calculate the effective memory bandwidth available to the NPU assuming the entire
  25MB model must be loaded from main memory per frame.
details:
  realistic_solution: The system behavior occurs because the dual-core NPU is starved for memory bandwidth.
    During a live camera feed, the ISP and GPU heavily utilize the shared 12 GB LPDDR5X memory pool, creating
    contention. Even though the distilled model is small, the NPU stalls while waiting to read the 25MB
    of weights and activations, overriding the benefits of distillation. To fix this, we would need to
    leverage NPU-local SRAM to pin weights or fuse operations to minimize LPDDR5X roundtrips.
  common_mistake: Candidates often focus solely on the 34.7 TOPS compute capacity and suggest further
    distillation or quantization, failing to recognize that the shared memory architecture is the actual
    bottleneck when the ISP and GPU are active.
  napkin_math: Theoretical Compute Latency = 2.5 GOPS / 34.7 TOPS = 0.072 ms. Since the actual latency
    is 12 ms, the model is completely memory-bound. Effective Memory Bandwidth = 25 MB / 12 ms = 2.08
    GB/s. The NPU is only receiving ~2.08 GB/s of bandwidth due to contention with the ISP and GPU.
