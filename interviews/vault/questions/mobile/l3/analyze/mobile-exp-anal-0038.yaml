schema_version: 1
id: mobile-exp-anal-0038
title: A17 Pro Unified Memory Contention Analysis
topic: safety-certification
status: published
provenance: imported
scenario: You are analyzing a watchdog timer reset in a mobile health monitoring app deployed on the Apple
  A17 Pro. The system features a 16-core Neural Engine capable of 35 TOPS at ~5W, sharing 8 GB of unified
  memory with the CPU and GPU. Under normal conditions, the vital-sign analysis model executes in 15ms.
  However, when the device simultaneously renders complex AR graphics, the model execution time spikes
  to 30ms, causing the 25ms safety watchdog timer to trigger a system reset. Explain why this non-deterministic
  execution occurs and calculate the constrained memory bandwidth.
details:
  realistic_solution: The root cause is memory bandwidth contention inherent to the shared unified memory
    architecture. Even with 35 TOPS of compute, the Neural Engine cannot process data it hasn't received.
    When the GPU demands massive bandwidth for AR rendering, the memory controller arbitrates the shared
    bus, severely reducing the bandwidth available to the Neural Engine. Under severe contention (49 GB/s
    to GPU), transfer time rises to 15ms, yielding total latency of 15ms + 5ms = 20ms — still under the
    25ms watchdog in this example. However, real contention is variable; occasional demand spikes beyond
    49 GB/s will push total latency over the 25ms threshold, causing intermittent watchdog resets.
  common_mistake: Candidates often assume the 16-core Neural Engine lacks sufficient compute (35 TOPS)
    or that the ~5W power envelope is causing thermal throttling. They fail to recognize that the shared
    8 GB unified memory architecture creates a single point of contention where the GPU can starve the
    Neural Engine of memory bandwidth, breaking deterministic execution.
  napkin_math: 'Assume the Apple A17 Pro has a peak unified memory bandwidth of 50 GB/s. The vital-sign
    model requires loading 15 MB of weights/activations per pass. Under normal conditions (15ms latency:
    5ms compute + 10ms memory transfer), required bandwidth is 15 MB / 0.010 s = 1.5 GB/s. If the AR rendering
    GPU task suddenly consumes 49 GB/s, only 1.0 GB/s remains for the Neural Engine. New memory transfer
    time = 15 MB / 1.0 GB/s = 15ms. Total latency = 15ms (transfer) + 5ms (compute) = 20ms. Since 20ms
    < 25ms, the watchdog does not trigger in this specific scenario, but in practice contention is variable
    and can push latency past the 25ms threshold.'
