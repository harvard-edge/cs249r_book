schema_version: 1
id: mobile-exp2-anal-0285
title: CI/CD to Tensor G3 Deployment Discrepancy
topic: mlops-lifecycle
status: published
provenance: imported
scenario: A 3.2B parameter LLM, optimized for on-device LLM (Gemini Nano) use cases, passes all CI/CD
  latency and memory tests in a generic emulated environment and is promoted by the model registry. However,
  when serving in production on a Google Tensor G3 (equipped with an On-device TPU delivering 7.5 TOPS
  and 12 GB LPDDR5X memory), the application consistently crashes due to Out-Of-Memory (OOM) errors and
  severe latency spikes. Given that the CI/CD pipeline successfully validated an INT8 quantized model,
  explain why this training-serving environment mismatch occurs specifically on this target hardware.
details:
  realistic_solution: The CI/CD pipeline lacked Hardware-In-The-Loop (HITL) testing for the specific Tensor
    G3 TPU compiler. The model registry deployed an INT8 model containing operators unsupported by the
    physical TPU. This forced the runtime to partition the graph and execute the unsupported layers on
    the CPU, which required dequantizing the weights back to FP32. This drastically increased the memory
    footprint beyond the device's limits and bypassed the TPU's compute, causing OOM and latency spikes.
  common_mistake: Candidates often assume the 12 GB LPDDR5X memory is insufficient for the INT8 model,
    or blame the 7.5 TOPS as being too slow, without analyzing the underlying execution fallback mechanism
    caused by poor CI/CD fidelity.
  napkin_math: 'INT8 model footprint: 3.2B params * 1 byte = 3.2 GB. FP32 dequantized footprint during
    CPU fallback: 3.2B params * 4 bytes = 12.8 GB. Since 12.8 GB > 12 GB total LPDDR5X memory on the Tensor
    G3 (which also must host the OS), this guarantees an OOM crash. Ideal TPU compute per token: (2 *
    3.2B ops) / 7.5 TOPS = ~0.85 ms, but CPU fallback completely negates this hardware acceleration.'
