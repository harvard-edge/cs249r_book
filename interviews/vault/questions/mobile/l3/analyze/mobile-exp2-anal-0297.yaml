schema_version: 1
id: mobile-exp2-anal-0297
title: A17 Pro Neural Engine Roofline Bottleneck
topic: roofline-analysis
status: published
provenance: imported
scenario: You are profiling a real-time vision transformer on the Apple A17 Pro. The 16-core Neural Engine
  provides 35 TOPS of peak compute at ~5W, sharing an 8 GB unified memory pool that delivers approximately
  50 GB/s of bandwidth to the NPU. Your profiler shows the model is only achieving 7 TOPS of actual throughput
  despite having no other system contention. The model requires 35 GOPS of compute per inference and transfers
  250 MB of data (weights and activations) per pass. Using the roofline model, explain why the Neural
  Engine utilization is stuck at exactly 20% of its theoretical peak.
details:
  realistic_solution: The underlying cause is that the workload is severely memory-bound, not compute-bound
    or thermally throttled. By applying the roofline model, we can determine the hardware's ridge point
    and the model's arithmetic intensity. Because the model's arithmetic intensity is significantly lower
    than the hardware's ridge point, it hits the sloping memory bandwidth roof long before it can saturate
    the Neural Engine's flat compute capacity roof. The shared unified memory simply cannot feed the NPU
    fast enough for this specific operator mix.
  common_mistake: Candidates often jump to conclusions about thermal throttling since the chip operates
    under a strict ~5W mobile power envelope, or they assume the 16-core NPU is suffering from poor operator
    scheduling and parallelization. They fail to apply the roofline formula to formally diagnose the system
    constraint.
  napkin_math: '1. Hardware Ridge Point = 35 TOPS (35,000 GOPS) / 50 GB/s = 700 OPs/byte. 2. Model Arithmetic
    Intensity = 35 GOPS / 250 MB (0.25 GB) = 140 OPs/byte. 3. Roofline check: Since 140 OPs/byte < 700
    OPs/byte, the workload is deep in the memory-bound region. 4. Max Achievable Performance = Memory
    Bandwidth * Arithmetic Intensity = 50 GB/s * 140 OPs/byte = 7,000 GOPS = 7 TOPS.'
