schema_version: 1
id: mobile-exp-anal-0000
title: Shadow Deployment Frame Drops on Exynos NPU
topic: ab-rollout-strategies
status: published
provenance: imported
scenario: You are executing a shadow deployment for a new video segmentation model on devices equipped
  with the Samsung Exynos 2400 NPU (dual-core, 34.7 TOPS, sharing 12 GB LPDDR5X RAM with the CPU/GPU/ISP).
  The baseline model (Model A) consumes 2 TOPS and 1.5 GB of RAM, while the new candidate model (Model
  B) consumes 4 TOPS and 2.0 GB of RAM. When the shadow deployment is enabled, both models process the
  live camera feed simultaneously. You observe that the camera framerate abruptly drops from 30 FPS to
  10 FPS, even though the combined compute requirement (6 TOPS) is only a fraction of the 34.7 TOPS available.
  Given that the OS, ISP, and GPU consistently lock 9 GB of the shared memory during 4K video recording,
  analyze why this severe performance degradation occurs.
details:
  realistic_solution: The performance degradation is caused by a memory capacity bottleneck, not a compute
    limitation. The Exynos 2400 uses a unified memory architecture where the 12 GB of RAM is shared across
    the CPU, GPU, ISP, and NPU. Because the non-NPU components consume 9 GB during operation, only 3 GB
    is left for the NPU. Running both models simultaneously requires 3.5 GB of RAM, which exceeds the
    available physical memory. This deficit forces the OS to aggressively compress or swap memory pages,
    stalling the NPU and destroying real-time inference latency despite ample TOPS.
  common_mistake: Candidates often assume the performance drop is due to NPU compute bottlenecks, thermal
    throttling, or context switching overhead between the dual NPU cores, ignoring the shared memory architecture
    of the Exynos 2400.
  napkin_math: Total shared memory = 12.0 GB. Memory locked by OS/ISP/GPU = 9.0 GB. Available memory for
    NPU = 12.0 GB - 9.0 GB = 3.0 GB. Memory required for shadow deployment = Model A (1.5 GB) + Model
    B (2.0 GB) = 3.5 GB. Memory deficit = 3.5 GB - 3.0 GB = 0.5 GB. Compute utilization = (2 TOPS + 4
    TOPS) / 34.7 TOPS = ~17.3%.
