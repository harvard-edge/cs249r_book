schema_version: 1
id: mobile-exp-anal-0020
title: Exynos 2400 Shared Memory Exhaustion
topic: kv-cache-management
status: published
provenance: imported
scenario: You are deploying a 4-bit quantized 7B parameter LLM on a Samsung Exynos 2400 NPU, which features
  34.7 TOPS and a shared 12 GB LPDDR5X memory pool across the CPU, GPU, ISP, and NPU. The Android OS and
  background apps consume 5.5 GB, and the 4-bit model weights consume 3.5 GB. The model uses FP16 for
  the KV cache, with 32 layers and a 4096 hidden dimension. During a long chat session, when the context
  length reaches exactly 6,000 tokens, the generation speed suddenly drops from 15 tokens/sec to 1 token/sec,
  and a background app is killed. Explain why this specific performance cliff happens at this exact context
  length based on the hardware specs.
details:
  realistic_solution: The candidate must calculate the exact size of the KV cache per token and demonstrate
    that at 6,000 tokens, the system hits the hard 12 GB RAM limit. Because the Exynos 2400 uses a shared
    memory pool, NPU memory allocations compete directly with Android OS memory. Exhausting this pool
    forces the OS to kill background apps and thrash memory pages, severely bottlenecking memory bandwidth
    and destroying generation speed.
  common_mistake: Candidates often assume the NPU's 34.7 TOPS compute limit is the bottleneck for long
    sequences, ignoring the shared memory architecture. They frequently fail to calculate the KV cache
    size to realize the OS is triggering the Low Memory Killer due to absolute memory exhaustion.
  napkin_math: KV cache per token = 2 (Key and Value) * 32 (layers) * 4096 (hidden dimension) * 2 bytes
    (FP16) = 524,288 bytes (0.5 MB). KV cache for 6,000 tokens = 6,000 * 0.5 MB = 3,000 MB (~3.0 GB).
    Total memory consumed = 5.5 GB (OS) + 3.5 GB (Weights) + 3.0 GB (KV cache) = 12.0 GB. Free memory
    = 12.0 GB (Total Exynos 2400 Shared LPDDR5X) - 12.0 GB = 0 GB.
