schema_version: 1
id: mobile-exp-anal-0036
title: Guardrail Latency on Tensor G3 TPU
topic: responsible-ai
status: published
provenance: imported
scenario: You are deploying Gemini Nano on the Google Tensor G3 alongside a toxicity guardrail model to
  ensure Responsible AI compliance. The observed system behavior is that when the assistant generates
  a long response (500 tokens), the guardrail model consistently misses its 100ms latency SLA, causing
  unverified text to briefly render. The Tensor G3 features an on-device TPU providing 7.5 TOPS and shares
  12 GB of LPDDR5X memory. Gemini Nano consumes a constant 4.0 TOPS during continuous generation, and
  the guardrail model requires 0.4 Tera-operations to analyze the full 500-token sequence. Explain why
  the guardrail misses its SLA under these conditions.
details:
  realistic_solution: The failure happens because the TPU's compute capacity is oversubscribed when running
    both models concurrently. The guardrail requires a specific compute throughput to meet its 100ms SLA,
    but Gemini Nano consumes more than half of the total TPU budget during active generation. Because
    the combined TOPS requirement exceeds the hardware limit, the TPU throttles the guardrail execution,
    stretching its latency beyond the acceptable window. A real-world mitigation would involve either
    pausing text generation during the safety check or chunking the guardrail execution to run incrementally.
  common_mistake: Candidates often assume the 12 GB LPDDR5X memory bandwidth is the bottleneck, or they
    vaguely mention 'device overload' without calculating the exact compute oversubscription on the TPU.
  napkin_math: 'Guardrail throughput required for SLA: 0.4 Tera-operations / 0.1 seconds = 4.0 TOPS. Gemini
    Nano active compute: 4.0 TOPS. Total simultaneous compute needed: 4.0 TOPS + 4.0 TOPS = 8.0 TOPS.
    Google Tensor G3 TPU capacity: 7.5 TOPS. Hardware deficit: 8.0 TOPS - 7.5 TOPS = 0.5 TOPS oversubscribed.
    Actual available compute for the guardrail: 7.5 TOPS - 4.0 TOPS = 3.5 TOPS. Actual guardrail latency:
    0.4 Tera-operations / 3.5 TOPS = 0.114 seconds (114ms), causing the 100ms SLA to fail.'
