schema_version: 1
id: mobile-exp2-anal-0296
title: Guardrail Latency on Tensor G3
topic: responsible-ai
status: published
provenance: imported
scenario: An application on the Google Tensor G3 uses a 2.5 billion parameter INT8 guardrail model to
  classify inputs for safety. The Tensor G3 has an on-device TPU delivering 7.5 TOPS and 12 GB LPDDR5X
  RAM providing 50 GB/s of memory bandwidth. The system dynamically loads the guardrail model weights
  from RAM into the TPU for a single inference step. Telemetry reveals a strict latency floor of exactly
  50ms before compute even begins. Explain why this latency floor exists.
details:
  realistic_solution: The 50ms latency floor is caused by the time it takes to transfer the model weights
    from the LPDDR5X RAM to the TPU. In mobile ML deployment, memory bandwidth is often the primary bottleneck
    for large models, not the compute TOPS. Guardrails dynamically loaded into memory will incur this
    massive I/O penalty.
  common_mistake: Candidates often assume the bottleneck is the TPU's compute capability (TOPS) and try
    to calculate the FLOPs required for the inference, completely missing that dynamically loading a model
    of this size is entirely memory-bandwidth bound.
  napkin_math: 'Model size: 2.5 billion parameters * 1 byte (INT8) = 2.5 Gigabytes (GB). Memory transfer
    time: 2.5 GB / 50 GB/s (Memory Bandwidth) = 0.05 seconds = 50 milliseconds. Compute time (for a typical
    short prompt) on 7.5 TOPS is negligible (< 5ms), making the 50ms memory transfer the dominant factor.'
