schema_version: 1
id: mobile-exp2-anal-0294
title: Per-Channel INT8 Latency on Exynos 2400
topic: quantization-fundamentals
status: published
provenance: imported
scenario: You are deploying an INT8 quantized transformer model on a Samsung Exynos 2400 NPU. The model
  easily fits within the shared 12 GB LPDDR5X memory. When switching from per-tensor to per-channel quantization
  to recover a 3% accuracy drop, you observe a 20% increase in inference latency, despite the dual-core
  NPU being rated for a massive 34.7 TOPS. Explain why changing the quantization granularity causes this
  latency regression on this specific hardware architecture.
details:
  realistic_solution: The bottleneck is memory bandwidth and access patterns, not compute. At 34.7 TOPS,
    the dual-core NPU can consume data much faster than the shared LPDDR5X can provide it, meaning the
    workload is heavily memory-bound. Per-channel quantization requires loading a unique scale and zero-point
    for every output channel during the matrix multiplication. Because the 12 GB LPDDR5X memory is actively
    shared with the CPU, GPU, and ISP, fetching these additional quantization parameters per channel interrupts
    the continuous burst-reads of weights, stalling the NPU MAC arrays and increasing overall latency.
  common_mistake: Candidates often incorrectly guess that per-channel quantization increases the number
    of MAC operations required, failing to realize that the core matrix multiplication compute remains
    identical. They also frequently overlook the shared nature of the memory system and assume the 34.7
    TOPS compute limit is the bottleneck.
  napkin_math: Consider a 4096x4096 linear layer. Compute = 2 * 4096 * 4096 = 33.5 Mega-Operations. At
    34.7 TOPS, ideal compute time is 33.5M / 34.7T = ~0.96 microseconds. The INT8 weights are 16.7 MB.
    To load 16.7 MB in 0.96 us requires ~17.4 TB/s of bandwidth, but LPDDR5X provides only ~50-60 GB/s,
    making it strictly memory-bound. Per-channel quantization adds 4096 scales and 4096 zero-points (approx
    32 KB total). While small, fetching these parameters per row breaks the contiguous 16.7 MB weight
    fetch into 4096 separate, smaller fetches. In a system where LPDDR5X bandwidth is shared with the
    CPU/GPU/ISP, these discontinuous memory accesses destroy burst efficiency, causing the 20% latency
    overhead.
