schema_version: 1
id: mobile-exp2-anal-0293
title: Unstructured Pruning Performance Regression on A17 Pro
topic: pruning-sparsity
status: published
provenance: imported
scenario: You deploy a vision model with 75% unstructured sparsity to the Apple A17 Pro Neural Engine,
  which features 16 cores, 35 TOPS peak throughput, and shares 8 GB of unified memory. Despite the 4x
  reduction in theoretical FLOPs, profiling shows the inference latency increased by 20% compared to the
  dense model while continuing to draw near the ~5W limit. Apply your knowledge of dense hardware accelerators
  to explain why this unstructured sparsity causes a performance regression.
details:
  realistic_solution: The A17 Pro Neural Engine achieves its 35 TOPS through massive parallel dense matrix
    operations across its 16 cores. Unstructured sparsity disrupts this pipeline by introducing irregular
    memory access patterns and requiring sparse index decoding (e.g., CSR format) which lacks dedicated
    hardware support on standard NPUs. The overhead of fetching scattered non-zero weights from the 8
    GB unified memory and the inability to fully utilize the SIMD lanes causes a massive drop in effective
    utilization, making it slower than simply executing zero-multiplies densely.
  common_mistake: Candidates often assume that fewer non-zero weights automatically translate to proportional
    speedups, ignoring underlying hardware execution semantics. They frequently fail to recognize that
    mobile NPUs are heavily optimized for dense, contiguous matrix multiplications and struggle with irregular
    data layouts.
  napkin_math: Consider a dense layer requiring 10 GOPs. On the A17 Pro (35 TOPS), assuming 70% utilization,
    dense execution takes 10 / (35,000 * 0.7) = ~0.4 ms. With 75% unstructured sparsity, the required
    FLOPs drop to 2.5 GOPs. However, sparse index overhead and irregular fetches from the 8 GB unified
    memory might drop effective NPU utilization to just 2% of peak (0.7 TOPS). The sparse execution time
    then becomes 2.5 / 700 = ~3.57 ms. Thus, despite a 4x FLOP reduction, the layer runs almost 9x slower.
