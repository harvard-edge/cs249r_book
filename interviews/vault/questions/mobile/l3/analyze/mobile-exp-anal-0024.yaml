schema_version: 1
id: mobile-exp-anal-0024
title: OOM Crash on A17 Pro During High-Res Inference
topic: memory-pressure-management
status: published
provenance: imported
scenario: You are deploying a vision model on an iPhone 15 Pro with the Apple A17 Pro Neural Engine (16-core).
  The device has 8 GB of unified memory shared across CPU, GPU, and NPU. When processing a batch of high-resolution
  images (1024x1024), the application suddenly crashes due to a Jetsam event (OS-level memory eviction),
  despite the model weights only taking up 1.5 GB. Explain why the OS killed the process and how the unified
  memory architecture contributes to this behavior under pressure.
details:
  realistic_solution: The crash occurs because the activation memory spikes significantly during high-resolution
    processing. Because the 8 GB is unified, the OS likely only grants a portion (e.g., 50-60%) to any
    single app to keep the system responsive. If the model's weights plus peak activations exceed this
    OS-enforced limit (around 4-5 GB), Jetsam will kill the app to protect system stability. The solution
    involves reducing batch size, using gradient checkpointing if training, or processing smaller tiles
    to lower peak activation memory.
  common_mistake: Candidates often assume that if weights fit in memory (1.5 GB < 8 GB), the model should
    run fine. They forget to account for activation memory, workspace buffers required by the NPU, and
    the fact that 'unified memory' means the OS, UI, and background apps are actively competing for that
    same 8 GB pool.
  napkin_math: 'Total Memory: 8 GB. OS/System Reserve (estimate): ~3 GB. Available to App: ~5 GB. Model
    Weights: 1.5 GB. Activation size for 1024x1024 input at an intermediate layer with 256 channels (FP16):
    1024 * 1024 * 256 * 2 bytes = 536 MB per layer. If a residual block needs to keep 3-4 such feature
    maps in memory simultaneously, activation memory alone hits ~2 GB. Total app memory = 1.5 GB (weights)
    + 2 GB (activations) + 1 GB (app overhead) = 4.5 GB, pushing right up against the ~5 GB limit, triggering
    Jetsam.'
