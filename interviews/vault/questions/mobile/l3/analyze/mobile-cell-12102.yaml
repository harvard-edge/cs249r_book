id: mobile-cell-12102
title: 'Model Size Estimation: Analyze Why Mobile LLM Needs INT4 Despite 8GB RAM'
topic: model-size-estimation
status: published
provenance: imported
scenario: 'An engineer asks: ''The iPhone 16 Pro has 8GB RAM, so why does a 3B parameter model need INT4
  quantization to run? Shouldn''t 8GB be enough for a 6GB FP16 model?'' Explain the full memory accounting
  and why the constraint is tighter than expected.'
details:
  realistic_solution: '8GB total. iOS system reserve: ~2GB (kernel, IOKit, Metal framework, NE firmware).
    App memory pressure: iOS kills apps > 4-5GB in practice. Available for ML app: ~3-4GB effective. 3B
    FP16: 6GB — doesn''t fit. 3B INT8: 3GB — fits barely (leaves 0-1GB for KV + app). 3B INT4: 1.5GB weights.
    KV at 2048 ctx (32 layers, 32 heads, 128 dim): 2048×524KB=1.07GB FP16. App + KV + model: 1.5+1.07+1GB
    app = 3.57GB. Fits in 4GB budget. INT4 is required not because of raw RAM but due to OS overhead and
    KV-cache needs.'
  common_mistake: Assuming all 8GB RAM is available for the ML model; iOS reserves significant memory
    for the OS, other app processes, and the Neural Engine firmware.
  napkin_math: 'iPhone 8GB physical. iOS reserves: 2GB (Metal GPU buffers, kernel, NE firmware, system
    processes). Available to app: 6GB. But iOS aggressively kills apps > 4-5GB to prevent system pressure.
    Safe budget: 4GB. 3B FP16: 6GB > 4GB. 3B INT8: 3GB + 1GB KV + 0.5GB app = 4.5GB — risky. 3B INT4:
    1.5GB + 1GB KV + 0.5GB = 3GB safe ✓.'
