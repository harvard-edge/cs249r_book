id: mobile-fill-02010
title: On-Device Inference Queue Latency on A17 Pro
topic: queueing-theory
status: draft
provenance: imported
scenario: An iOS app uses the A17 Pro Neural Engine (35 TOPS, 8GB) for real-time photo enhancement. Users
  submit requests at 5/s during burst editing sessions. Each enhancement takes 150ms. What is the mean
  end-to-end latency and p99, and should the UX team expect snappy responses?
details:
  realistic_solution: 'λ=5/s, μ=6.67/s, ρ=0.75. M/M/1 mean wait Wq = ρ/(μ(1-ρ)) = 0.75/(6.67×0.25) = 450ms.
    Mean total W = 150+450=600ms. p99 ≈ 4.6/μ(1-ρ) = 4.6/1.67 = 2.75s! Recommendation: queue UX feedback
    immediately (show preview), cap λ to 3/s with debouncing (ρ=0.45 → Wq=125ms, W=275ms total).'
  common_mistake: Quoting only service time (150ms) as the user-perceived latency; ignoring queuing delay
    at ρ=0.75.
  napkin_math: 'ρ=5×0.15=0.75. Wq=0.75/(6.67×0.25)=450ms. p99≈2.75s. With rate limit λ=3/s: ρ=0.45, Wq=0.45/(6.67×0.55)=123ms.
    p99≈820ms — borderline acceptable for photo editing.'
