schema_version: 1
id: mobile-exp2-anal-0268
title: INT8 Calibration Dataset Bias
topic: dataset-curation
status: published
provenance: imported
scenario: We are deploying an INT8 object detection model on the Qualcomm Hexagon NPU (Snapdragon 8 Gen
  3), leveraging its 45 TOPS INT8 compute and shared 12-16 GB LPDDR5X memory. The model processes video
  at 30 frames per second. To perform post-training quantization, we curated a calibration dataset by
  taking the first 1,000 sequential frames from a 24-hour continuous video stream. While the FP32 model
  has high accuracy across all lighting conditions, the INT8 model running on the NPU shows a 40% accuracy
  drop specifically on nighttime scenes. Explain why this system behavior happens based on the dataset
  curation strategy.
details:
  realistic_solution: The accuracy drop is caused by a highly biased calibration dataset. By selecting
    the first 1,000 sequential frames, the dataset captures only a single lighting condition (likely daytime),
    meaning the INT8 activation ranges (scale and zero-point) are optimized exclusively for those conditions.
    When nighttime images are processed on the NPU, their activations fall outside this calibrated range,
    causing severe clipping and precision loss. The solution is to curate a calibration dataset by sampling
    diversely across the entire 24-hour distribution.
  common_mistake: Candidates often blame the INT8 precision itself or the Hexagon NPU's hardware architecture
    for being inherently insufficient for low-light images, missing the fundamental flaw in how the calibration
    dataset was curated.
  napkin_math: 1,000 frames at 30 FPS = 33.3 seconds of video, representing just 33.3 / 86,400 seconds
    = 0.038% of the 24-hour distribution. Despite having access to the heterogeneous CPU+GPU+NPU system
    and shared 12-16 GB LPDDR5X memory which could easily buffer a diverse dataset, the curation strategy
    severely bottlenecked the representation. The Hexagon NPU's 45 TOPS INT8 compute relies on static
    parameters derived from this 0.038% slice; lacking nighttime data, INT8 quantization clips out-of-distribution
    nighttime activations, causing the 40% accuracy drop.
