schema_version: 1
id: mobile-exp-anal-0040
title: Thermal Throttling in Shared NPU/ISP Pipelines
topic: thermal-management
status: published
provenance: imported
scenario: You are deploying a continuous camera processing pipeline on the Samsung Exynos 2400 NPU. The
  system uses the shared 12 GB LPDDR5X memory to pass high-resolution frames between the ISP and the dual-core
  NPU, which boasts a peak throughput of 34.7 TOPS. The mobile device has a strict continuous thermal
  dissipation limit of 4.0W for the SoC to prevent chassis overheating. If the ISP and shared memory subsystem
  consume a constant 1.5W during this workload, and the NPU consumes 3.5W when operating at its peak 34.7
  TOPS, explain why running the NPU at maximum capacity causes thermal throttling, and calculate the maximum
  sustained NPU performance.
details:
  realistic_solution: Because the memory is shared across the CPU, GPU, ISP, and NPU, constant data movement
    from the camera sensor keeps the memory controller active, consuming 1.5W. This leaves only 2.5W of
    the 4.0W total thermal budget for the NPU. To avoid thermal throttling, the system governor must cap
    the NPU utilization to match the remaining thermal headroom, reducing the burst performance of 34.7
    TOPS down to a lower sustained throughput.
  common_mistake: Candidates often assume the NPU can utilize the entire thermal budget, ignoring the
    power consumed by the ISP and the shared 12 GB LPDDR5X memory subsystem. They calculate sustained
    performance based only on the NPU's peak power, failing to subtract the baseline power required for
    continuous data movement.
  napkin_math: 1. Total SoC thermal budget = 4.0W. 2. ISP and shared memory baseline power = 1.5W. 3.
    Available power for NPU = 4.0W - 1.5W = 2.5W. 4. NPU maximum sustainable utilization = 2.5W / 3.5W
    (peak NPU power) = 71.4%. 5. Maximum sustained NPU performance = 34.7 TOPS * 0.714 = 24.78 TOPS.
