schema_version: 1
id: mobile-exp-anal-0003
title: Analyzing GQA vs MHA Memory Bandwidth on Hexagon NPU
topic: attention-scaling
status: published
provenance: imported
scenario: We are deploying a 7B parameter LLM on a device powered by a Qualcomm Hexagon NPU (Snapdragon
  8 Gen 3) with 12 GB of shared LPDDR5X memory. The model uses standard Multi-Head Attention (MHA) and
  achieves acceptable prefill latency, but decode token generation speed is severely bottlenecked. When
  we switch the model architecture to Grouped-Query Attention (GQA) with an 8:1 query-to-KV head ratio,
  the decode latency improves dramatically, even though the total parameter count barely changes. Explain
  why this architectural change provides such a significant speedup on this specific hardware.
details:
  realistic_solution: The performance improvement comes from a massive reduction in the KV cache memory
    footprint and the corresponding memory bandwidth required to read it during every decode step. In
    MHA, the entire KV cache must be loaded from the shared LPDDR5X memory to the NPU for every single
    token generated. By using GQA with an 8:1 ratio, the KV cache size is reduced by a factor of 8, drastically
    slashing the memory bandwidth requirements and allowing the NPU to generate tokens faster without
    stalling on memory reads.
  common_mistake: Candidates often incorrectly attribute the speedup to a reduction in compute operations
    (FLOPs) required for the attention mechanism. They fail to recognize that autoregressive decode generation
    on edge devices is heavily memory bandwidth bound, not compute bound.
  napkin_math: 'Assume sequence length 1024, hidden size 4096, 32 heads (128 dim per head), INT8 KV cache.
    MHA KV cache size per token: 2 (K,V) * 32 heads * 128 dim * 1 byte = 8 KB. Total for 1024 tokens:
    8 MB. Generating 1 token requires reading this 8 MB from LPDDR5X. GQA (8:1) has 4 KV heads. KV cache
    per token: 2 * 4 * 128 * 1 = 1 KB. Total for 1024 tokens: 1 MB. Reducing the memory read per step
    from 8 MB to 1 MB directly alleviates the bandwidth bottleneck on the shared LPDDR5X, allowing better
    utilization of the 45 TOPS INT8 NPU.'
