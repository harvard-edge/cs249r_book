schema_version: 1
id: mobile-exp-anal-0014
title: Analyzing 3-bit AWQ Overhead on Tensor G3
topic: extreme-quantization
status: published
provenance: imported
scenario: You are deploying a 7-billion parameter LLM on a smartphone powered by the Google Tensor G3,
  which features an on-device TPU capable of 7.5 TOPS and shares 12 GB of LPDDR5X memory. To fit the model
  within a strict 3 GB memory allocation, you apply 3-bit AWQ (Activation-aware Weight Quantization).
  Profiling reveals that while the memory footprint is successfully reduced, the auto-regressive token
  generation is severely compute-bound and exhibits higher latency than expected, failing to reach the
  theoretical peak of 7.5 TOPS. Explain why this specific quantization strategy causes a compute bottleneck
  on this architecture.
details:
  realistic_solution: The Tensor G3 TPU is highly optimized for 8-bit or 16-bit operations but lacks native
    silicon support for 3-bit matrix multiplications. Consequently, the 3-bit weights must be unpacked
    and cast to a supported precision (like INT8) in the ALU pipelines before the multiply-accumulate
    operations can occur. This unpacking overhead consumes significant compute cycles, shifting the system
    from being memory-bandwidth bound to compute-bound, thereby throttling the generation speed despite
    the available 7.5 TOPS.
  common_mistake: Candidates often assume that extreme quantization linearly improves latency by proportionally
    reducing memory bandwidth pressure, failing to account for the lack of native sub-4-bit ALU support
    and the compute penalty of on-the-fly weight unpacking.
  napkin_math: A 7B parameter model at 3-bit precision requires (7 * 10^9 * 3) / 8 bytes = 2.625 GB of
    the 12 GB LPDDR5X memory, fitting the 3 GB budget. Generating 1 token ideally requires 2 * 7B = 14
    GOPS. At the TPU's peak of 7.5 TOPS (7500 GOPS), the ideal compute latency is 14 / 7500 = 1.86 ms
    per token. However, if unpacking each 3-bit weight to INT8 requires 3 additional ALU instructions
    (masking, shifting, casting), the compute load per token increases to (2 + 3) * 7B = 35 GOPS. The
    new compute-bound latency becomes 35 / 7500 = 4.66 ms per token, a 2.5x degradation that explains
    the observed compute bottleneck.
