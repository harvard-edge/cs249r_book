schema_version: 1
id: mobile-exp2-anal-0273
title: 3-bit vs 4-bit Unpacking Overhead on Tensor G3
topic: extreme-quantization
status: published
provenance: imported
scenario: Your team is deploying a 3 Billion parameter generative model to the Google Tensor G3 platform,
  which features an on-device TPU with 7.5 TOPS and 12 GB of LPDDR5X memory. To minimize memory footprint,
  the team applies 3-bit GPTQ extreme quantization instead of standard 4-bit. However, profiling shows
  that during auto-regressive decoding, the 3-bit model generates tokens significantly slower than the
  4-bit version. Given the hardware specs, explain why the smaller 3-bit model exhibits worse latency
  than the larger 4-bit model.
details:
  realistic_solution: The Google Tensor G3's TPU is optimized for standard precisions like INT8 and INT4
    for on-device LLMs like Gemini Nano. It lacks native hardware instructions to directly compute or
    efficiently unpack 3-bit integers. Consequently, the 3-bit weights must be unpacked to INT4 or FP16
    using complex bit-shifting and masking operations. This dequantization overhead transforms a memory-bound
    process into a severe compute bottleneck, often forcing fallbacks to slower CPU/DSP cores and completely
    negating any memory read speedups.
  common_mistake: Candidates often assume that because LLM decoding is memory-bandwidth bound, any reduction
    in model size will proportionally increase inference speed. They fail to account for the lack of native
    hardware support for odd-bit formats and the resulting computational overhead.
  napkin_math: For a 3B parameter model, 4-bit requires reading 1.5 GB per token, while 3-bit requires
    1.125 GB. Assuming a typical 60 GB/s memory bandwidth from the 12 GB LPDDR5X, 3-bit saves 0.375 GB
    / 60 GB/s = 6.25 ms of read time per token. However, unpacking 3-bit data requires complex masking
    (e.g., 5 ops per weight = 15 Giga-ops total). While the TPU provides 7.5 TOPS for native ops, non-native
    3-bit unpacking kernels may run at a fraction of this efficiency or fallback to the CPU. If the fallback
    compute path only sustains 100 Giga-ops/sec for these specific integer manipulations, unpacking adds
    15 GOPS / 100 GOPS = 150 ms of latency per token, overwhelmingly dwarfing the 6.25 ms memory advantage.
