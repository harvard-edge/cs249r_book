schema_version: 1
id: mobile-exp-anal-0018
title: TPU Graph Operator Fusion Performance Anomaly
topic: graph-compilation
status: published
provenance: imported
scenario: You are profiling the ahead-of-time compilation of a custom transformer model for the Google
  Tensor G3. The device features an on-device TPU with 7.5 TOPS and 12 GB LPDDR5X memory. After the compiler
  applies an aggressive operator fusion pass (combining LayerNorm and MatMul into a single fused kernel),
  you observe that the fused subgraph executes significantly slower than the original unfused operations.
  Explain why this happens given the hardware architecture.
details:
  realistic_solution: The degradation happens because the Tensor G3's TPU compiler lacks a highly optimized,
    hand-tuned kernel for that specific fused LayerNorm+MatMul combination. While fusion avoids writing
    intermediate activations to the LPDDR5X memory, the generic fused kernel suffers from low arithmetic
    intensity and poor utilization of the TPU's matrix multiply units. The compute penalty of a poorly
    utilized TPU outweighs the memory bandwidth savings of fusion.
  common_mistake: Candidates often assume that graph compiler optimizations, particularly operator fusion,
    will strictly improve performance by reducing memory trips. They frequently fail to account for kernel
    optimization maturity or how generic fused kernels might underutilize specific hardware accelerators.
  napkin_math: Assume a MatMul operation requires 8.3 Mega-FLOPs. Using the optimized standalone kernel
    at 6 TOPS (80% of the 7.5 TOPS peak), it takes 1.38 microseconds. The generic fused kernel only achieves
    1 TOPS (poor utilization), taking 8.3 microseconds. The unfused method requires writing/reading a
    4KB intermediate tensor to the 12 GB LPDDR5X. Assuming 50 GB/s bandwidth, this transfer takes 0.08
    microseconds. Total unfused time (1.38 + 0.08 = 1.46 us) is significantly faster than the fused time
    (8.3 us), validating the slowdown.
