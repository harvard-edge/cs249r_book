schema_version: 1
id: mobile-exp2-anal-0279
title: Exynos Shared Memory KV-Cache Eviction
topic: kv-cache-management
status: published
provenance: imported
scenario: You are deploying a 4B parameter int8 LLM on the Samsung Exynos 2400 NPU (dual-core, 34.7 TOPS)
  to process live transcriptions. The SoC utilizes a shared 12 GB LPDDR5X memory pool across the CPU,
  GPU, ISP, and NPU. Users report that the transcription abruptly crashes with an Out-Of-Memory (OOM)
  error exactly when the context reaches 4,000 tokens, but only if they are simultaneously using the camera
  (which heavily utilizes the ISP). Given that the OS reserves 3.5 GB, the active ISP pipeline reserves
  2.5 GB, the model weights consume 4.0 GB, and the KV cache requires 0.5 MB per token, explain why this
  specific token threshold triggers an OOM eviction in this unified memory architecture.
details:
  realistic_solution: In a shared memory system like the Exynos 2400, the NPU does not have dedicated
    VRAM. The baseline system and the ISP (when the camera is active) lock down large contiguous memory
    segments. By calculating the remaining memory pool after the OS, ISP, and model weights are loaded,
    we can see that the free RAM is severely constrained. When the dynamic KV-cache allocation hits 4,000
    tokens, it exhausts the last remaining bytes of the shared 12 GB pool, forcing the Linux kernel OOM
    killer to terminate the NPU task to protect critical system and ISP stability. Mitigating this requires
    paged attention or aggressive KV-cache eviction policies that monitor system-wide memory pressure.
  common_mistake: Candidates often look only at the total 12 GB LPDDR5X memory and assume there is plenty
    of room for both the 4 GB model and the KV cache, neglecting the unified memory architecture. They
    fail to deduct the concurrent allocations from the OS and the ISP, missing why the 4,000-token mark
    specifically causes the memory manager to thrash and kill the NPU process.
  napkin_math: 'Total Memory Pool: 12.0 GB (12,288 MB). Baseline OS/System overhead: 3.5 GB. Active ISP
    camera buffers: 2.5 GB. Static Model Weights (4B int8): 4.0 GB. Total Reserved Memory: 3.5 + 2.5 +
    4.0 = 10.0 GB. Remaining Shared Memory for KV-Cache: 12.0 GB - 10.0 GB = 2.0 GB (2,048 MB). KV-Cache
    size at failure: 4,000 tokens * 0.5 MB/token = 2,000 MB. The 2,000 MB KV-Cache leaves less than 50
    MB of free memory, instantly triggering an OOM eviction from OS background spikes.'
