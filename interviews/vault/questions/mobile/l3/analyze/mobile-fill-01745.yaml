schema_version: 1
id: mobile-fill-01745
title: Token-Level Safety Classifier Bottleneck
topic: adversarial-robustness
status: published
provenance: imported
scenario: To defend against prompt injection and model extraction, we deploy a continuous safety classifier
  alongside an on-device LLM (Gemini Nano, 3.2B parameters, 4-bit) on the Google Tensor G3. The G3 features
  a TPU with 7.5 TOPS and 12 GB of LPDDR5X memory. The safety classifier (200M parameters, 8-bit) evaluates
  every single generated token. When activated, the generation speed drops drastically from 20 tokens/sec
  to 5 tokens/sec, despite the TPU compute utilization remaining under 15%. Explain why this system behavior
  occurs.
details:
  realistic_solution: The severe drop in throughput is caused by memory cache thrashing and bandwidth
    contention. Autoregressive generation requires streaming the entire model's weights from RAM for every
    token. By forcing the system to also load the safety classifier's weights for every token, the TPU
    constantly context-switches, destroying memory locality and drastically reducing the effective bandwidth
    of the LPDDR5X memory.
  common_mistake: Candidates often blame the TPU compute capacity (TOPS), assuming that running two models
    simultaneously exhausts the 7.5 TOPS. They fail to recognize that autoregressive text generation and
    token-by-token classification are heavily memory-bandwidth bound, not compute bound.
  napkin_math: 'LLM size: 3.2B params * 0.5 bytes = 1.6 GB. Classifier size: 200M params * 1 byte = 0.2
    GB. Total weights loaded per token = 1.8 GB. At the original 20 tokens/sec, the LLM alone required
    1.6 GB * 20 = 32 GB/s of bandwidth. To maintain 20 tokens/sec with the defense, the system would need
    1.8 GB * 20 = 36 GB/s. While within theoretical LPDDR5X limits (~60 GB/s), the constant context switching
    drops effective bandwidth. At the observed 5 tokens/sec, the system is only achieving an effective
    bandwidth of 1.8 GB * 5 = 9.0 GB/s due to memory thrashing overhead.'
