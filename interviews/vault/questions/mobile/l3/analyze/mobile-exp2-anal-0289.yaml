schema_version: 1
id: mobile-exp2-anal-0289
title: NAS Preference for Compute-Bound Layers on Exynos
topic: neural-architecture-search
status: published
provenance: imported
scenario: You are deploying a hardware-aware NAS to optimize a vision model for the Samsung Exynos 2400
  NPU, which features 34.7 TOPS and shares 12 GB of LPDDR5X memory with the CPU, GPU, and ISP. During
  the search process, you observe that the NAS consistently rejects architectures composed of many lightweight
  depthwise-separable convolutions in favor of architectures using standard dense convolutions. This happens
  even though the selected dense architectures have 3x higher theoretical FLOPs. Why does the NAS optimizer
  heavily penalize the lower-FLOP architectures on this specific SoC?
details:
  realistic_solution: Because the 12 GB LPDDR5X memory is shared across the CPU, GPU, ISP, and dual-core
    NPU, the effective memory bandwidth available to the NPU is heavily constrained. Depthwise convolutions
    have a very low arithmetic intensity (OPS/byte) and are fundamentally memory-bound, leaving the massive
    compute capacity of the NPU idle while waiting for data. Standard dense convolutions possess a much
    higher arithmetic intensity, allowing them to remain compute-bound and efficiently utilize the NPU's
    resources, thus finishing faster despite the larger amount of total work.
  common_mistake: Candidates often mistakenly assume that lower theoretical FLOPs always equate to lower
    latency, arguing that the NAS optimizer has an incorrect latency lookup table. They frequently fail
    to analyze the system-level memory contention caused by the shared LPDDR5X architecture.
  napkin_math: Assume the NPU is allocated roughly 25% of a typical LPDDR5X 68 GB/s peak bandwidth, yielding
    17 GB/s of effective bandwidth. The Exynos 2400 NPU has a peak compute of 34.7 TOPS. A typical depthwise
    convolution has an arithmetic intensity of ~20 OPS/byte, meaning maximum throughput is 17 GB/s * 20
    OPS/byte = 340 GOPS (0.34 TOPS, under 1% utilization). A dense convolution has an arithmetic intensity
    of ~400 OPS/byte, yielding 17 GB/s * 400 OPS/byte = 6.8 TOPS. Even with 3x the FLOPs, the dense layer's
    20x higher throughput results in the layer executing roughly 6.6x faster on the hardware.
