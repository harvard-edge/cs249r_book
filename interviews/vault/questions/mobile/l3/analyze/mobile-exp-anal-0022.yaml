schema_version: 1
id: mobile-exp-anal-0022
title: Hexagon NPU Memory Bandwidth Bottleneck Analysis
topic: memory-hierarchy-design
status: published
provenance: imported
scenario: You deploy a streaming sequence-to-sequence model using INT8 weights on the Qualcomm Hexagon
  NPU (Snapdragon 8 Gen 3). The hardware provides 45 TOPS INT8 compute and shares 16 GB of LPDDR5X memory
  (providing roughly 77 GB/s bandwidth) across the heterogeneous CPU+GPU+NPU system. During batch-size=1
  inference profiling, you observe the NPU is only achieving about 1.5 TOPS. Based on the memory hierarchy,
  explain why the system exhibits this drastically lowered utilization.
details:
  realistic_solution: The system is exhibiting a severe memory bandwidth bottleneck because the weights
    are being streamed from the shared LPDDR5X DRAM rather than fitting into the NPU's faster on-chip
    SRAM. For tasks with low data reuse (like batch-size 1 inference on linear layers), the compute units
    process INT8 operations much faster than the memory controller can supply the weights. Consequently,
    the NPU execution units stall while waiting for DRAM fetches, capping the effective TOPS far below
    the 45 TOPS theoretical limit.
  common_mistake: Candidates often guess that the NPU is thermal throttling, hitting an OS-level power
    constraint, or executing unoptimized fallback operations on the CPU. They frequently fail to identify
    the main memory bandwidth wall and do not check the arithmetic intensity required to sustain peak
    NPU utilization.
  napkin_math: Required Arithmetic Intensity = Peak Compute / Memory Bandwidth. NPU Peak Compute = 45,000
    GOPS (45 TOPS). LPDDR5X Bandwidth = 77 GB/s. Minimum intensity to prevent memory stalling = 45,000
    / 77 = 584 Operations per Byte. If the model loads an INT8 weight (1 byte) to perform 1 MAC (2 operations)
    with minimal reuse, its intensity is ~2 OPs/Byte to ~20 OPs/Byte depending on local caching. At 20
    OPs/Byte, the maximum achievable performance = 77 GB/s * 20 OPs/Byte = 1,540 GOPS = 1.54 TOPS.
