schema_version: 1
id: mobile-exp-anal-0004
title: Depthwise Convolutions on Tensor G3 TPU
topic: cnn-efficient-design
status: published
provenance: imported
scenario: Your team replaced a standard 3x3 convolution (256 input/output channels, 56x56 resolution)
  with a depthwise separable convolution to optimize a vision model for the Google Tensor G3. The target
  hardware features an on-device TPU capable of 7.5 TOPS and is backed by 12 GB of LPDDR5X memory. Although
  the theoretical operations were reduced by almost 9x, the actual layer latency only improved by 1.5x.
  Analyze why the latency reduction does not scale linearly with the FLOP reduction on this specific hardware.
details:
  realistic_solution: The standard convolution has high arithmetic intensity and efficiently utilizes
    the 7.5 TOPS TPU compute units. Depthwise separable convolutions drastically reduce FLOPs but have
    a much lower arithmetic intensity, shifting the bottleneck from compute to memory bandwidth. Even
    with fast 12 GB LPDDR5X memory, the TPU's compute units sit idle waiting for data, causing the execution
    to be memory-bound and resulting in sub-linear latency improvements.
  common_mistake: Candidates often assume that execution time is strictly proportional to FLOP count.
    They fail to consider the arithmetic intensity of the operation and the high peak compute (7.5 TOPS)
    of the Tensor G3 TPU compared to its memory bandwidth.
  napkin_math: 'Standard Conv MACs: 56 * 56 * 3 * 3 * 256 * 256 = 1.84 GMACs (3.69 GFLOPs). Depthwise
    Separable MACs: (56 * 56 * 3 * 3 * 256) + (56 * 56 * 1 * 1 * 256 * 256) = 7.2 MMACs + 205.5 MMACs
    = 212.7 MMACs (0.42 GFLOPs). FLOP Reduction: 3.69 / 0.42 = ~8.7x. The Tensor G3 TPU provides 7.5 TOPS.
    Compute-bound theoretical time for standard conv = 3.69 GFLOPs / 7.5 TOPS = ~0.49 ms. However, the
    low arithmetic intensity of depthwise convolutions makes them bound by the LPDDR5X memory bandwidth
    rather than the TPU''s 7.5 TOPS, yielding only a 1.5x speedup.'
