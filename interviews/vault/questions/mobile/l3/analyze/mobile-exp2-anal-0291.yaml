schema_version: 1
id: mobile-exp2-anal-0291
title: Always-On Inference Power Discrepancy
topic: power-budgeting
status: published
provenance: imported
scenario: You are deploying an always-on background model on the Apple A17 Pro Neural Engine. The hardware
  provides up to 35 TOPS at a peak power of ~5W across its 16 cores. Your model requires only 0.35 TOPS
  to run in real-time, but profiling reveals the system power consumption increases by 1.2W during inference.
  Given that the Neural Engine shares 8 GB of unified memory with the CPU and GPU, explain why the total
  power consumption is significantly higher than the theoretical compute power.
details:
  realistic_solution: The power discrepancy is primarily driven by the shared 8 GB unified memory architecture
    and baseline SoC power states. While the NPU compute cost is minimal, fetching model weights and keeping
    the memory controller active requires substantial energy. Furthermore, running the Neural Engine continuously
    prevents the system from entering a low-power deep sleep state, adding a high baseline static power
    draw that eclipses the small dynamic power of the compute workload.
  common_mistake: Candidates often assume power scales linearly with TOPS and blame the discrepancy solely
    on NPU inefficiency or background OS tasks. They frequently forget to account for the energy cost
    of memory movement and the systemic power overhead of keeping the SoC awake.
  napkin_math: 'Apple A17 Pro Neural Engine efficiency: 35 TOPS / 5W = 7 TOPS/W. Theoretical compute power
    for 0.35 TOPS: 0.35 TOPS / 7 TOPS/W = 0.05W (50mW). Observed system power delta: 1.2W. Unaccounted
    overhead: 1.2W - 0.05W = 1.15W. If the model requires 4 GB/s of memory bandwidth, and unified memory
    access costs ~200 pJ/byte, the memory power is 4e9 bytes/s * 200e-12 J/byte = 0.8W. The remaining
    0.35W is the static power overhead of keeping the memory controller and SoC active.'
