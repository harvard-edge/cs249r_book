id: mobile-cell-12139
title: 'Network Bandwidth Bottlenecks: Analyze Thermal Throttling Impact on Mobile Bandwidth'
topic: network-bandwidth-bottlenecks
status: published
provenance: imported
scenario: An iPhone 16 Pro (A17 Pro, 8GB, 68 GB/s Neural Engine bandwidth) shows TPOT for a 1B INT4 LLM
  degrading from 7.4ms to 14ms after 5 minutes of sustained inference. The model is 500MB. Analyze the
  root cause using bandwidth and thermal reasoning.
details:
  realistic_solution: 'Baseline TPOT: 500MB/68GB/s=7.35ms. After 5min: 500MB/effective_BW=14ms → effective_BW=500/0.014=35.7GB/s.
    Throttle ratio: 35.7/68=52.5%. A17 Pro under sustained load at 35 TOPS: 3.5 TOPS×0.8W=2.8W dissipated.
    Sustained: thermal limit triggers around 40°C junction. Apple throttles NE to 50-60% to maintain thermal
    envelope. Fix: (1) Implement forced cooling (case cooling), (2) introduce inference pauses (100ms
    every 2s → average 5% duty, no throttle), (3) reduce NE clock via CoreML configuration (reduces TPOT
    to 11ms but sustained).'
  common_mistake: Assuming software or memory leak caused the slowdown; the key signal is the 5-minute
    time constant, consistent with thermal throttling of the Neural Engine.
  napkin_math: 'Unthrottled: 68GB/s. Throttled: 35.7GB/s (52% throttle). TPOT change: 7.4→14ms = 1.9×
    slowdown. Thermal: NE at 35TOPS × 0.5V×(frequency scaling) → at 50% throttle: 17.5 TOPS, BW ≈ 50%
    of 68=34GB/s. Consistent. Fix with pauses: 100ms pause every 2000ms = 5% pause. NE duty: 95%. Thermal
    power: 2.8W×0.95=2.66W (below throttle threshold for most ambient temps). Avg TPOT: 7.4ms/0.95 = 7.8ms
    effective.'
