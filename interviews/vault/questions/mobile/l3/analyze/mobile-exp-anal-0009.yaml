schema_version: 1
id: mobile-exp-anal-0009
title: Dataset Padding Impact on NPU Utilization
topic: dataset-curation
status: published
provenance: imported
scenario: You are deploying a vision model on the Qualcomm Hexagon NPU (Snapdragon 8 Gen 3), which features
  45 TOPS of INT8 compute and a shared 12-16 GB LPDDR5X memory subsystem. Your dataset curation strategy
  relies on annotating high-resolution 4K (3840x2160) images padded to square dimensions (3840x3840) to
  preserve the aspect ratio for the model. During inference, you observe that the NPU utilization drops
  to a fraction of its peak 45 TOPS, and the system behavior shifts from compute-bound to severely memory-bound.
  Analyze why this specific data annotation and padding strategy degrades the NPU's effective TOPS.
details:
  realistic_solution: The NPU is heavily underutilized because the shared LPDDR5X memory bandwidth is
    consumed by loading useless padding pixels. The Hexagon NPU processes localized tensor operations;
    feeding it massively padded inputs forces unnecessary memory fetches and zero-multiply accumulates,
    bottlenecking the system at the memory interface rather than the compute units. A better curation
    strategy involves smart cropping or aspect-ratio-aware bucketing during annotation to avoid large
    padded inferences.
  common_mistake: Candidates often blame the INT8 quantization process or the NPU's raw compute limits
    without realizing that the data formatting strategy dictates the memory access patterns, starving
    the compute units.
  napkin_math: 'Native 4K image: 3840 x 2160 x 3 bytes = 24.88 MB. Padded 3840x3840 image: 3840 x 3840
    x 3 bytes = 44.23 MB. Memory overhead per frame: 44.23 MB - 24.88 MB = 19.35 MB. At a target of 30
    FPS, the padding alone wastes 19.35 MB * 30 = 580.5 MB/s of memory bandwidth. Because the NPU shares
    the LPDDR5X bus with the CPU and GPU, this excessive fetching starves the 45 TOPS INT8 engines, tanking
    utilization.'
