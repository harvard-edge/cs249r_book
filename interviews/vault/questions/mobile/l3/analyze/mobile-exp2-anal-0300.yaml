schema_version: 1
id: mobile-exp2-anal-0300
title: Analyzing Sustained vs Burst Performance on Exynos 2400
topic: thermal-management
status: published
provenance: imported
scenario: You are deploying a continuous real-time video enhancement model on the Samsung Exynos 2400
  NPU. The SoC features a dual-core NPU with a peak burst performance of 34.7 TOPS and utilizes a shared
  12 GB LPDDR5X memory pool alongside the CPU, GPU, and ISP. During the first 60 seconds of processing,
  the model achieves a steady 60 FPS. However, after 3 minutes of continuous execution, the system framerate
  suddenly drops to 35 FPS, despite no changes to the input workload, background tasks, or memory allocation.
  Explain why this performance degradation occurs and calculate the theoretical sustained TOPS required
  to maintain the degraded framerate.
details:
  realistic_solution: The 34.7 TOPS rating of the Exynos 2400 is a peak burst metric that cannot be sustained
    indefinitely in a passively cooled mobile device. As the SoC heats up from continuous NPU and shared
    memory controller usage, the OS thermal governor aggressively throttles the NPU clock frequency to
    stay within the thermal envelope. The performance drop to 35 FPS reflects the device settling into
    its maximum sustained thermal state.
  common_mistake: Candidates often mistakenly attribute the framerate drop to memory leaks or OS background
    process scheduling rather than recognizing the transition from burst to sustained performance limits.
    They frequently overlook how the shared 12 GB LPDDR5X memory controller heavily contributes to the
    overall SoC thermal budget during continuous video workloads.
  napkin_math: Assuming the model fully saturates the NPU at its peak to achieve 60 FPS, the compute cost
    is 34.7 TOPS / 60 FPS = 0.578 TOPS per frame. When the thermal governor throttles the system to a
    sustained 35 FPS, the available sustained compute drops to 35 FPS * 0.578 TOPS/frame = 20.23 TOPS.
    This indicates the Exynos 2400 NPU retains approximately 58% (20.23 / 34.7) of its peak compute capacity
    under sustained thermal load.
