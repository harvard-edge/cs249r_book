schema_version: 1
id: mobile-exp2-impl-0087
title: On-Device Real-Time Sensor Ingestion Throughput for G3 TPU
topic: streaming-ingestion
status: published
provenance: imported
scenario: You are implementing a real-time health monitoring feature that ingests high-frequency sensor
  data (accelerometer, gyroscope, PPG) to detect anomalies. The application runs on a Google Tensor G3
  device, and you need to process this stream on-device to ensure privacy and low latency. The feature
  computation involves a sliding window over the last 10 seconds of data, sampled at 100Hz per sensor.
  Each sample is a 32-bit float.
details:
  realistic_solution: The correct approach involves calculating the raw data rate, sizing the circular
    buffer to hold the 10-second window, and ensuring the memory bandwidth is sufficient for continuous
    ingestion while the TPU processes batches. Given the 12 GB LPDDR5X RAM, the memory capacity is ample,
    but the focus must be on the ingestion rate and batch preparation latency.
  common_mistake: Candidates often miscalculate the memory bandwidth requirements or forget to account
    for the overhead of buffering and window overlap, leading to an underestimation of the memory footprint.
    They might also incorrectly assume the CPU is the bottleneck rather than memory bandwidth when transferring
    data to the TPU.
  napkin_math: '1. Raw data rate: 3 sensors * 100 samples/sec * 4 bytes/sample = 1200 bytes/sec.

    2. 10-second window size: 1200 bytes/sec * 10 seconds = 12,000 bytes (approx 11.7 KB).

    3. If the model runs inference every 1 second (100 samples per sensor), we process an 11.7 KB batch
    every second.

    4. Transferring 11.7 KB to the TPU is negligible compared to the 12 GB LPDDR5X bandwidth (typically
    >30 GB/s), meaning ingestion and transfer will take well under a millisecond, leaving the TPU''s 7.5
    TOPS fully available for the anomaly detection model inference.'
