id: mobile-exp2-impl-0081
title: Operator Fusion Latency on Hexagon NPU
topic: operator-scheduling
status: published
provenance: imported
scenario: You are optimizing operator scheduling for a vision model on a Qualcomm Hexagon NPU (Snapdragon
  8 Gen 3) which features 45 TOPS INT8 compute and shares 16 GB of LPDDR5X memory. The model has a sequence
  of three INT8 operators requiring 22.5 GOPs, 45 GOPs, and 22.5 GOPs of compute. In an unfused schedule,
  intermediate activations must be written to and read from the shared LPDDR5X memory between operators,
  totaling 45 MB of memory traffic at an effective bandwidth of 45 GB/s. Assuming the compute achieves
  100% of peak TOPS and does not overlap with memory transfers, calculate the exact total execution time
  in milliseconds for both the unfused schedule and a fully fused schedule where intermediate activations
  remain in the NPU's SRAM.
details:
  realistic_solution: The optimal solution requires calculating the theoretical minimum compute latency
    from the NPU's peak TOPS and adding the memory I/O latency for the unfused case. Fusing the operators
    completely eliminates the LPDDR5X trips, resulting in a schedule bounded entirely by the 45 TOPS INT8
    compute limit.
  common_mistake: Candidates often incorrectly convert between Tera-operations (10^12) and Giga-operations
    (10^9), or fail to quantify the exact latency penalty of LPDDR5X memory trips in the unfused schedule.
  napkin_math: Total Compute = 22.5 + 45 + 22.5 = 90 GOPs. Compute Latency = 90 * 10^9 OPs / (45 * 10^12
    OPs/sec) = 0.002 seconds = 2.0 ms. Unfused Memory Latency = 45 * 10^6 Bytes / (45 * 10^9 Bytes/sec)
    = 0.001 seconds = 1.0 ms. Unfused Total Time = 2.0 ms (compute) + 1.0 ms (memory) = 3.0 ms. Fused
    Total Time = 2.0 ms (memory traffic is eliminated).
