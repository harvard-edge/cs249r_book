schema_version: 1
id: mobile-exp2-impl-0071
title: Quantifying NPU Quantization Bias
topic: fairness-evaluation
status: published
provenance: imported
scenario: You are deploying an on-device toxicity classifier to a Qualcomm Hexagon NPU (Snapdragon 8 Gen
  3), leveraging its heterogeneous CPU+GPU+NPU architecture. To utilize the NPU's 45 TOPS INT8 compute
  and fit within a strict 2GB allocation of the shared 12-16 GB LPDDR5X memory, you quantize the model
  from FP32 to INT8. Your evaluation dataset contains 10,000 actual negative samples for the majority
  demographic and 2,000 actual negative samples for a minority demographic. The original FP32 model produced
  100 false positives for the majority and 20 for the minority. The quantized INT8 model produces 150
  false positives for the majority and 100 for the minority. Calculate the Predictive Equality (False
  Positive Rate difference) gap for both models to quantify the fairness degradation.
details:
  realistic_solution: The correct approach is to calculate the FPR for each subgroup by dividing the false
    positives by the total actual negatives in that subgroup. Then, subtract the minority FPR from the
    majority FPR to find the gap. Comparing the FP32 gap to the INT8 gap isolates the disparate impact
    introduced by the low-precision NPU pipeline.
  common_mistake: Candidates often calculate the absolute difference in false positive counts rather than
    normalizing by the subgroup population size to find the False Positive Rate (FPR). They may also fail
    to recognize that hardware-aware optimizations like INT8 quantization can have disproportionate impacts
    on minority subgroups.
  napkin_math: FP32 FPR Majority = 100 / 10,000 = 1%. FP32 FPR Minority = 20 / 2,000 = 1%. FP32 Gap =
    1% - 1% = 0%. INT8 FPR Majority = 150 / 10,000 = 1.5%. INT8 FPR Minority = 100 / 2,000 = 5%. INT8
    Gap = 5% - 1.5% = 3.5%. The INT8 quantization to hit 45 TOPS on the Hexagon NPU introduced a 3.5%
    Predictive Equality gap.
